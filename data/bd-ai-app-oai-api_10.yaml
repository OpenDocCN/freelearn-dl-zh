- en: <st c="3">Speech Recognition and Text-to-Speech with the Whisper API</st>
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="3">使用 Whisper API 进行语音识别和语音合成</st>
- en: <st c="62">Welcome to</st> [*<st c="74">Chapter 10</st>*](B22414_10.xhtml#_idTextAnchor120)
    <st c="84">of our journey into the world of cutting-edge AI technologies.</st>
    <st c="148">In this chapter, we’ll embark on an exploration of the remarkable</st>
    **<st c="214">Whisper API</st>**<st c="225">. Harnessing the</st> <st c="242">power
    of advanced speech recognition and translation, the Whisper API opens exciting
    possibilities for transforming audio into text.</st> <st c="375">Imagine having
    the ability to transcribe conversations, interviews, podcasts, or any spoken content
    effortlessly.</st> <st c="489">Whether you aim to extract valuable insights from
    multilingual audio files or create accessible content for a global audience, the
    Whisper API has</st> <st c="636">you covered.</st>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="62">欢迎来到</st> [*<st c="74">第 10 章</st>*](B22414_10.xhtml#_idTextAnchor120)
    <st c="84">我们探索尖端人工智能技术世界的旅程。</st> <st c="148">在本章中，我们将开始探索令人瞩目的</st> **<st c="214">Whisper
    API</st>**<st c="225">。借助先进的语音识别和翻译能力，Whisper API 为将音频转换为文本开辟了令人兴奋的可能性。</st> <st
    c="242">想象一下，能够轻松转录对话、访谈、播客或任何口语内容的能力。</st> <st c="375">无论你旨在从多语言音频文件中提取有价值的见解，还是为全球受众创建可访问的内容，Whisper
    API 都能为你提供解决方案。</st> <st c="489">Whisper API 涵盖了广泛的语音，确保与各种语音需求兼容。</st>
- en: <st c="648">In this chapter, we will do a deep dive into the core functionalities
    of the Whisper API by developing a language transcription project using Python.</st>
    <st c="799">We’ll get acquainted with its essential endpoints, namely transcriptions
    and translations, which form the backbone of its speech-to-text capabilities.</st>
    <st c="950">With its state-of-the-art open source model, Whisper equips developers
    with powerful tools to seamlessly transcribe audio files in multiple languages
    and even translate them into English.</st> <st c="1138">The Whisper API handles
    an extensive range of languages, ensuring compatibility with diverse speech requirements.</st>
    <st c="1252">It can be utilized in smart speakers, hands-free devices, and other
    voice-enabled technologies, enhancing user experiences by providing accurate and
    responsive speech</st> <st c="1419">synthesis capabilities.</st>
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="648">在本章中，我们将通过使用 Python 开发语言转录项目来深入探讨 Whisper API 的核心功能。</st> <st c="799">我们将熟悉其基本端点，即转录和翻译，这些构成了其语音转文本能力的基础。</st>
    <st c="950">凭借其最先进的开源模型，Whisper 为开发者提供了强大的工具，可以无缝地将音频文件转录成多种语言，甚至翻译成英语。</st> <st
    c="1138">Whisper API 处理广泛的语音，确保与各种语音需求兼容。</st> <st c="1252">它可以用于智能扬声器、免提设备和其他语音启用技术，通过提供准确和响应迅速的语音合成能力来提升用户体验。</st>
- en: <st c="1442">In a world where global communication is more important than ever,
    the translations endpoint of the Whisper API plays a vital role.</st> <st c="1575">This
    endpoint not only transcribes audio files but also translates them into English,
    bridging the gap between languages and facilitating</st> <st c="1713">seamless
    understanding.</st>
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="1442">在全球化交流比以往任何时候都重要的世界里，Whisper API 的翻译端点发挥着至关重要的作用。</st> <st c="1575">此端点不仅转录音频文件，还将它们翻译成英语，弥合语言之间的差距，促进</st>
    <st c="1713">无缝理解。</st>
