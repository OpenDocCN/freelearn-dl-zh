- en: <st c="1943">By the end of this chapter, you will have gained a comprehensive
    understanding of the Whisper API and its remarkable capabilities, including speech-to-text
    conversion and language translation.</st> <st c="2137">You will also have learned
    how to leverage the API to transcribe audio files accurately, translate them into
    English, handle longer inputs, and unlock the potential of spoken language in</st>
    <st c="2324">your applications.</st>
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="1943">在本章结束时，你将全面了解 Whisper API 及其卓越功能，包括语音转文本转换和语言翻译。</st> <st c="2137">你还将学习如何利用
    API 准确转录音频文件，将其翻译成英语，处理更长的输入，并在你的应用程序中释放口语的潜力。</st>
