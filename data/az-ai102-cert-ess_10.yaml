- en: '10'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: 'Practical AI Implementation: Industry Use Cases, Technical Patterns, and Hands-On
    Projects'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实践AI实施：行业用例、技术模式和动手项目
- en: Important note
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: 'If you’re solely focused on passing the *AI-102: Azure AI Engineer Associate
    Certification* exam, you can proceed directly to [*Chapter 11*](B31034_11.xhtml#_idTextAnchor203)
    for targeted practice. However, I strongly encourage you to circle back to this
    chapter after earning your certification or if you want to reinforce your knowledge.
    Its real-world examples and project references will deepen your expertise and
    serve as an excellent springboard for advancing your AI career.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '如果你只专注于通过**AI-102: Azure AI工程师认证考试**，你可以直接跳转到[*第11章*](B31034_11.xhtml#_idTextAnchor203)进行有针对性的练习。然而，我强烈建议你在获得认证后或想要巩固知识时回到这一章。其中的实际案例和项目参考将加深你的专业知识，并为你提升AI职业生涯提供一个极好的跳板。'
- en: 'In this chapter, we’ll explore how AI is transforming businesses by examining
    advanced technical patterns and hands-on projects, focusing on three main approaches:
    **Build Your Own Custom Copilot**, which enables personalized AI solutions such
    as retail assistants or automated underwriting; **Chat with Your Data**, a method
    for securely tapping into proprietary data in a conversational manner; and **Document
    Processing and Summarization**, which automates the extraction of insights from
    complex files for faster, more accurate decision-making.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我们将通过检查高级技术模式和动手项目来探讨AI如何改变企业，重点关注以下三种主要方法：**构建自己的自定义副驾驶**，这使个性化AI解决方案（如零售助手或自动化承保）成为可能；**与数据对话**，这是一种以对话方式安全地访问专有数据的方法；以及**文档处理和摘要**，它自动从复杂文件中提取见解，以实现更快、更准确的决策。
- en: We’ll also dig into the **Retrieval-Augmented Generation** (**RAG**) pattern—one
    of the most robust techniques for interactive Q&A with custom data—and learn about
    **Document Intelligence** for structured and unstructured data extraction, plus
    the fundamentals of **AI Search** with integrated vectorization and semantic indexing.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将深入研究**检索增强生成**（**RAG**）模式——这是一种用于与自定义数据进行交互式问答的最稳健技术之一——并了解**文档智能**用于结构化和非结构化数据提取，以及**AI搜索**的基本原理，包括集成向量和语义索引。
- en: 'This chapter covers the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: Explore real-world AI applications across industries, showcasing how technical
    patterns like custom copilots and chat-based retrieval transform business operations.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索跨行业的实际AI应用，展示自定义副驾驶和基于聊天的检索等技术模式如何改变业务运营。
- en: Access curated GitHub repositories packed with hands-on solution accelerators,
    designed to help you build, deploy, and adapt AI solutions in your own Azure environment.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问精心挑选的GitHub仓库，其中包含大量实用的解决方案加速器，旨在帮助你构建、部署和调整你自己的Azure环境中的AI解决方案。
- en: You’ll gain hands-on experience applicable to real-world AI roles in Azure.
    This chapter equips you not only with certification knowledge but also with the
    practical expertise to deliver concrete AI solutions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 你将获得适用于Azure中实际AI角色的实践经验。这一章不仅为你提供了认证知识，还提供了将具体AI解决方案付诸实践的实际专业知识。
- en: Industry use cases and key technical patterns
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 行业用例和关键技术模式
- en: As a data/AI solution architect, I’ve witnessed firsthand how AI accelerates
    innovation across industries by solving complex challenges—everything from automating
    invoice approvals to powering sophisticated product recommendations. In the following
    sections, we’ll walk through examples of how AI patterns get deployed in real
    scenarios. While this chapter won’t directly appear on your AI-102 exam, it will
    significantly boost your readiness for real-world AI solution design.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据/AI解决方案架构师，我亲眼见证了AI如何通过解决复杂挑战来加速各个行业的创新——从自动化发票审批到提供复杂的产品推荐。在接下来的章节中，我们将通过实际场景中的AI模式部署案例进行探讨。虽然这一章不会直接出现在你的AI-102考试中，但它将显著提高你对实际AI解决方案设计的准备程度。
- en: Modern AI tools in enterprise
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 企业中的现代AI工具
- en: 'Today’s AI platforms have made it possible to address problems that were previously
    considered too time-consuming or repetitive. Common technical patterns such as
    **Custom Copilots**, **Chat with Your Data**, and **Document Processing** make
    it easier for organizations to do the following:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的AI平台使得解决以前被认为耗时或重复的问题成为可能。常见的如**自定义副驾驶**、**与数据对话**和**文档处理**等技术模式，使组织更容易做到以下事情：
- en: '**Streamline workflows**: Automate manual tasks such as data entry, invoice
    matching, and legal contract review'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化工作流程**：自动化数据录入、发票匹配和法律合同审查等手动任务'
- en: '**Improve accuracy**: Reduce human error with well-designed models that handle
    large datasets in seconds'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高准确性**：通过设计良好的模型在几秒钟内处理大量数据集，减少人为错误'
- en: '**Enable smarter decisions**: Aggregate and analyze data from multiple sources,
    offering relevant insights in near real time'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启用更明智的决策**：从多个来源汇总和分析数据，提供近乎实时的相关见解'
- en: Here are some of the patterns that enable these benefits.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些实现这些益处的模式。
- en: Build Your Own Custom Copilot
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建您自己的定制副驾驶
- en: 'A Custom Copilot acts like a personalized AI assistant. It can simulate scenarios,
    answer domain-specific questions, and guide users through processes. Here are
    a couple of instances:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 定制副驾驶就像一个个性化的AI助手。它可以模拟场景、回答特定领域的疑问，并指导用户完成流程。以下是一些实例：
- en: '**Retail example**: A global e-commerce platform launched an in-app *shopping
    copilot* that analyzes user behavior, inventory levels, and previous purchases
    to generate personalized suggestions. The result was a smoother shopping experience,
    reduced cart abandonment, and a clear boost in sales conversions.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零售示例**：一个全球电子商务平台推出了一款内置的*购物副驾驶*，该副驾驶分析用户行为、库存水平和以往购买记录，以生成个性化建议。结果是购物体验更加顺畅，购物车放弃率降低，销售额转化率明显提升。'
- en: '**Financial services example**: Banks use custom copilots to assist financial
    advisors in simulating investment options for clients—improving both advisor productivity
    and customer engagement through tailored recommendations.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融服务示例**：银行使用定制的副驾驶来协助财务顾问为客户模拟投资选项——通过定制化的建议提高顾问的生产力和客户参与度。'
- en: When designing a custom copilot, consider hooking it up to your existing datasets
    (such as CRM records or historical user logs) so that you can generate truly personalized
    insights. Also, ensure that you maintain strong data governance—especially in
    regulated industries such as finance or healthcare.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 设计定制副驾驶时，考虑将其连接到现有的数据集（如CRM记录或历史用户日志），以便您可以生成真正个性化的见解。同时，确保您保持强大的数据治理——特别是在金融或医疗保健等受监管行业。
- en: Chat with Your Data
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与您的数据聊天
- en: 'Many organizations are discovering that AI chatbots can securely access internal
    data, resulting in faster response times and better user experiences. Although
    chatbots have been around for some time, the new wave of **Large Language Models**
    (**LLMs**) takes them to a more intuitive and context-aware level:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 许多组织发现，人工智能聊天机器人可以安全地访问内部数据，从而缩短响应时间并提升用户体验。尽管聊天机器人已经存在一段时间了，但新一代的**大型语言模型**（**LLMs**）将它们提升到了更直观和情境感知的水平：
- en: '**Insurance example**: A major insurance provider created a chatbot that retrieves
    data from claims, policies, and underwriting documents. This drastically cut down
    the time spent searching for claim information, improving both agent productivity
    and customer satisfaction.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保险示例**：一家主要的保险公司创建了一个聊天机器人，该机器人从索赔、保单和承保文件中检索数据。这大幅减少了搜索索赔信息所需的时间，提高了代理人的生产力和客户满意度。'
- en: '**Healthcare example**: Hospitals increasingly deploy chatbots to manage appointments,
    address patient questions, and provide general health guidance. By integrating
    a secure data layer, these chatbots can reference patient records or physician
    schedules in real time.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗保健示例**：医院越来越多地部署聊天机器人来管理预约、回答患者问题并提供一般健康指导。通过集成安全的数据层，这些聊天机器人可以实时参考患者记录或医生日程。'
- en: For a chatbot to be truly effective, integrate it with a well-architected data
    store that includes vector-based search and robust access controls (especially
    critical in sectors such as healthcare and finance). This ensures quick retrieval
    of relevant information while respecting strict privacy requirements.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 要使聊天机器人真正有效，需要将其与一个架构良好的数据存储库集成，该存储库包括基于向量的搜索和强大的访问控制（特别是在医疗保健和金融等关键领域）。这确保了快速检索相关信息的同时，尊重严格的隐私要求。
- en: Document Processing and Summarization
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文档处理和摘要
- en: 'Document processing is no longer limited to simple **Optical Character Recognition**
    (**OCR**). Modern AI solutions can understand context, extract critical insights,
    and even summarize entire documents:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 文档处理不再局限于简单的**光学字符识别**（**OCR**）。现代人工智能解决方案可以理解上下文，提取关键见解，甚至总结整个文档：
- en: '**Mortgage example**: Mortgage providers leverage AI to scan and interpret
    loan applications, credit reports, and property valuations. This automated approach
    significantly speeds up the approval cycle, reduces manual errors, and allows
    employees to focus on more value-driven tasks such as client relationships.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**抵押贷款示例**: 抵押贷款提供者利用人工智能扫描和解释贷款申请、信用报告和财产估值。这种自动化方法显著加快了审批周期，减少了人为错误，并使员工能够专注于更有价值的任务，如客户关系。'
- en: '**Healthcare example**: Large hospital networks utilize Azure AI to summarize
    clinical notes and patient interactions. The results are more consistent record-keeping
    and a reduction in administrative overhead—allowing medical professionals to spend
    more time with patients.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗保健示例**: 大型医院网络利用Azure AI总结临床记录和患者互动。结果是有序的记录保存和行政负担的减少——使医疗专业人员有更多时间与患者相处。'
- en: AI across industries
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行业间的人工智能
- en: 'AI solutions have tangible impacts across sectors such as finance, healthcare,
    retail, manufacturing, and energy. Here are a few illustrative examples (see *Figure
    10**.1* for a snapshot of different industry verticals):'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能解决方案在金融、医疗保健、零售、制造和能源等各个领域产生了有形的影响。以下是一些有代表性的例子（参见*图10.1*以了解不同行业垂直领域的快照）：
- en: '![Figure 10.1 – User experience in various industry verticals](img/B31034_10_001.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图10.1 – 各个行业垂直领域的用户体验](img/B31034_10_001.jpg)'
- en: Figure 10.1 – User experience in various industry verticals
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1 – 各个行业垂直领域的用户体验
- en: 'Let’s explore how AI is transforming industries by solving real-world challenges,
    unlocking new opportunities, and driving innovation across sectors:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨人工智能如何通过解决现实世界挑战、开启新机遇并在各个领域推动创新来改变行业：
- en: '**Financial services**: AI solutions in financial services streamline fraud
    detection, empower advisors, and improve compliance workflows:'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融服务**: 金融服务中的AI解决方案简化了欺诈检测、赋予顾问权力并改进合规工作流程：'
- en: '**Example**: A leading bank used Azure AI to analyze payment patterns and detect
    fraudulent activities in real time, providing immediate alerts to mitigate risks.
    This improved both customer trust and operational efficiency.'
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**: 一家领先的银行利用Azure AI分析支付模式并实时检测欺诈活动，提供即时警报以减轻风险。这提高了客户信任和运营效率。'
- en: '**Applications**: AML detection, loan approvals, financial education, and simulations
    for advisor empowerment.'
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用**: 反洗钱检测、贷款审批、金融教育和为顾问赋能的模拟。'
- en: '**Health and life sciences**: Providers, payors, and pharmaceutical companies
    are leveraging AI to improve patient care, streamline operations, and accelerate
    drug discovery:'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗和生命科学**: 提供者、支付者和制药公司正在利用人工智能改善患者护理、简化运营并加速药物发现：'
- en: '**Example**: A pharmaceutical company used Azure AI to analyze datasets of
    chemical compounds and clinical trials, significantly reducing the time required
    for drug discovery'
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**: 一家制药公司利用Azure AI分析化学化合物和临床试验的数据集，显著减少了药物发现所需的时间'
- en: '**Applications**: Ambient clinical intelligence, automated claim management,
    and personalized marketing strategies for healthcare providers and payors'
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用**: 环境临床智能、自动索赔管理和为医疗提供者和支付者量身定制的营销策略'
- en: '**Retail**: AI is reshaping retail with conversational commerce, personalized
    marketing, and supply chain optimization:'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零售**: 人工智能正在通过对话式商业、个性化营销和供应链优化重塑零售业：'
- en: '**Example**: A retailer used Azure AI to personalize marketing campaigns, increasing
    customer engagement and conversion rates by delivering targeted promotions based
    on purchasing behavior'
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**: 一家零售商利用Azure AI个性化营销活动，通过基于购买行为的定向促销提高客户参与度和转化率'
- en: '**Applications**: Conversational analytics, customer segmentation, and real-time
    inventory management'
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用**: 对话式分析、客户细分和实时库存管理'
- en: '**Manufacturing**: Smart factory operations and predictive maintenance powered
    by AI help manufacturers reduce downtime and optimize production:'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制造业**: 由人工智能驱动的智能工厂运营和预测性维护帮助制造商减少停机时间并优化生产：'
- en: '**Example**: An automotive manufacturer adopted Azure AI for predictive maintenance,
    allowing them to identify equipment failures before they occurred, significantly
    reducing costs and improving schedules'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**: 一家汽车制造商采用Azure AI进行预测性维护，使其能够在设备发生故障之前识别出故障，从而显著降低成本并改善进度'
- en: '**Applications**: Root cause analysis, product lifecycle management, and real-time
    monitoring'
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用**: 根本原因分析、产品生命周期管理和实时监控'
- en: '**Energy and sustainability**: AI supports energy optimization, climate modeling,
    and **Environmental, Social, and Governance** (**ESG**) reporting, enabling organizations
    to meet sustainability goals:'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能源和可持续性**：AI支持能源优化、气候建模和**环境、社会和治理**（**ESG**）报告，使组织能够实现可持续性目标：'
- en: '**Example**: An energy company implemented Azure AI for climate modeling and
    financial optimization, improving resource allocation and reducing environmental
    impact'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：一家能源公司实施了Azure AI进行气候建模和财务优化，改善了资源配置并减少了环境影响'
- en: '**Applications**: Risk modeling, waste reduction, and facility optimization'
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用**：风险评估、废物减少和设施优化'
- en: These examples showcase how AI is not just about automating tasks—it’s about
    unlocking new opportunities, improving customer satisfaction, and driving growth.
    With Azure AI solutions, businesses across all sectors are finding innovative
    ways to solve their most pressing challenges.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例展示了AI不仅仅是自动化任务——它是关于开启新机遇、提高客户满意度和推动增长。借助Azure AI解决方案，各行业的业务都在寻找创新的方法来解决他们最紧迫的挑战。
- en: The next section is a pivotal part of this book, designed to help you apply
    the knowledge gained from [*Chapter 1*](B31034_01.xhtml#_idTextAnchor014) through
    *8*. It encourages you to get hands-on by provisioning Azure resources in your
    subscription, making modifications, or even contributing your work to your preferred
    repositories. Familiarizing yourself with these repository projects will position
    you as a strong candidate for AI-related roles in Azure, whether you’re looking
    to switch careers or enhance your current role, and you’ll be well prepared to
    tackle various AI initiatives in your professional environment.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节是本书的关键部分，旨在帮助您将从[*第一章*](B31034_01.xhtml#_idTextAnchor014)到*8*所获得的知识应用于实践。它鼓励您通过在您的订阅中配置Azure资源、进行修改，甚至将您的作品贡献到您偏好的仓库中来亲身体验。熟悉这些仓库项目将使您成为Azure中AI相关角色的有力候选人，无论您是想转换职业还是提升现有职位，您都将为应对专业环境中各种AI项目做好准备。
- en: Learning accelerators projects on GitHub
  id: totrans-54
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GitHub上的学习加速器项目
- en: I’ve included the following references to real-world GitHub repositories that
    the Microsoft team, including myself, frequently use when collaborating with customers.
    These repositories serve as accelerators, enabling customers to quickly launch
    and execute **Proof-Of-Concept** (**PoC**) projects tailored to their unique requirements,
    rather than starting from scratch.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我包括了一些现实世界GitHub仓库的引用，包括我自己在内的微软团队在与客户合作时经常使用。这些仓库作为加速器，使客户能够快速启动和执行针对其独特需求的**概念验证**（**PoC**）项目，而不是从头开始。
- en: Developed by Microsoft employees and individual contributors, these open source
    GitHub repositories cover diverse use cases and commonly leverage patterns such
    as RAG. They are designed to adapt to various technology stacks, data sources,
    architectures, and environments, providing a flexible foundation for development.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 由微软员工和个人贡献者开发的开源GitHub仓库涵盖了各种用例，并普遍采用RAG等模式。它们旨在适应各种技术堆栈、数据源、架构和环境，为开发提供灵活的基础。
- en: Important note
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: This section does not aim to walk through every detail of the GitHub repositories
    listed. Each repository already includes comprehensive documentation and step-by-step
    guides for hands-on experimentation. Instead, the goal here is to introduce these
    curated resources and show you how to effectively use them to accelerate your
    own AI projects.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 本节的目标不是详细介绍所列出的GitHub仓库的每个细节。每个仓库都已经包含了全面的文档和动手实验的逐步指南。相反，目标在于介绍这些精选资源，并展示如何有效地使用它们来加速您自己的AI项目。
- en: Please note that these repositories are actively maintained and continuously
    evolving—with new features, enhancements, and bug fixes being added over time.
    Be sure to check the respective README files and update logs for the latest developments
    as you explore and implement these solutions.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这些仓库正在积极维护并持续发展——随着时间的推移，会添加新功能、增强功能和错误修复。在探索和实施这些解决方案时，请务必查看相应的README文件和更新日志，以获取最新进展。
- en: Chat your own data
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与您的数据聊天
- en: This section will explore four different flavors of the RAG pattern for interacting
    with your own data. Each flavor is associated with its own GitHub repository,
    which provides extensive, detailed guides. Here, I will provide a high-level overview
    of what each project entails. For a deeper understanding and step-by-step instructions,
    please visit the respective GitHub links.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将探讨四种不同的 RAG 模式，用于与自己的数据交互。每种模式都与其自己的 GitHub 仓库相关联，提供了详尽的详细指南。在此，我将提供每个项目内容的概述。对于更深入的理解和逐步说明，请访问相应的
    GitHub 链接。
- en: Chat your own data with the RAG pattern
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 RAG 模式与自己的数据聊天
- en: This solution offers a ChatGPT-like interface for interacting with your own
    documents, leveraging the RAG pattern ([https://github.com/Azure-Samples/azure-search-openai-demo](https://github.com/Azure-Samples/azure-search-openai-demo)).
    It uses Azure OpenAI for GPT models and Azure AI Search for data indexing and
    retrieval as illustrated in the following architectural diagram. This is a widely
    applicable use case that enables users to configure parameters directly from the
    UI, with continuous enhancements such as data upload through a user-friendly interface
    and complete chat traceability for LLM conversations. Built with a Python backend,
    the solution also includes versions in JavaScript, .NET, and Java, accessible
    via the project’s README file.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 此解决方案提供了一个类似于 ChatGPT 的界面，用于与自己的文档交互，利用 RAG 模式 ([https://github.com/Azure-Samples/azure-search-openai-demo](https://github.com/Azure-Samples/azure-search-openai-demo))。它使用
    Azure OpenAI 的 GPT 模型以及 Azure AI Search 进行数据索引和检索，如下面的架构图所示。这是一个广泛适用的用例，使用户能够直接从
    UI 中配置参数，并持续进行增强，如通过用户友好的界面上传数据以及 LLM 对话的完整聊天可追溯性。该解决方案使用 Python 后端构建，还包括 JavaScript、.NET
    和 Java 版本，可通过项目的 README 文件访问。
- en: '![Figure 10.2 – Architect diagram (source: https://github.com/Azure-Samples/azure-search-openai-demo)](img/B31034_10_002.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.2 – 架构图（来源：https://github.com/Azure-Samples/azure-search-openai-demo）](img/B31034_10_002.jpg)'
- en: 'Figure 10.2 – Architect diagram (source: [https://github.com/Azure-Samples/azure-search-openai-demo](https://github.com/Azure-Samples/azure-search-openai-demo))'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.2 – 架构图（来源：[https://github.com/Azure-Samples/azure-search-openai-demo](https://github.com/Azure-Samples/azure-search-openai-demo)）
- en: 'The sample application uses a fictional company, Contoso Electronics, enabling
    employees to query internal documents such as policies and job descriptions. Key
    features include multi-turn chat and single-turn Q&A, answer citations, and UI
    settings to customize behavior. Azure AI Search supports document indexing, retrieval,
    and vectorization, while optional features include GPT-4 for image-based reasoning,
    speech input/output for accessibility, automated user login via Microsoft Entra,
    and performance monitoring with Application Insights as shown in the following
    screenshot:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 该示例应用程序使用一家虚构公司 Contoso Electronics，使员工能够查询内部文档，如政策和职位描述。主要功能包括多轮聊天和单轮问答、答案引用以及
    UI 设置以自定义行为。Azure AI Search 支持文档索引、检索和向量化，可选功能包括基于图像推理的 GPT-4、语音输入/输出以提高可访问性、通过
    Microsoft Entra 的自动用户登录以及使用 Application Insights 进行性能监控，如下面的截图所示：
- en: '![Figure 10.3 – Main chat](img/B31034_10_003.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.3 – 主要聊天](img/B31034_10_003.jpg)'
- en: Figure 10.3 – Main chat
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.3 – 主要聊天
- en: 'The next screen allows users to modify configuration settings:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个屏幕允许用户修改配置设置：
- en: '![Figure 10.4 – Chat UI interface (source: https://github.com/Azure-Samples/azure-search-openai-demo)](img/B31034_10_004.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.4 – 聊天 UI 界面（来源：https://github.com/Azure-Samples/azure-search-openai-demo）](img/B31034_10_004.jpg)'
- en: 'Figure 10.4 – Chat UI interface (source: [https://github.com/Azure-Samples/azure-search-openai-demo](https://github.com/Azure-Samples/azure-search-openai-demo))'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.4 – 聊天 UI 界面（来源：[https://github.com/Azure-Samples/azure-search-openai-demo](https://github.com/Azure-Samples/azure-search-openai-demo)）
- en: This solution is a widely adopted approach across industries for interacting
    with your own data through chat. It is built on the concepts of AI Search, Document
    Intelligence, and Generative AI, as discussed in [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140)
    and *8*.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 此解决方案是跨行业广泛采用的方法，用于通过聊天与自己的数据交互。它是基于 AI 搜索、文档智能和生成式 AI 的概念，如第 7 章[*](B31034_07.xhtml#_idTextAnchor140)
    和第 8 章所述。
- en: RAG voice using Azure AI Search and GPT-4o Realtime API for audio
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Azure AI Search 和 GPT-4o 实时 API 进行音频的 RAG 语音
- en: A public preview of the Realtime API was introduced on October 1, 2024, allowing
    developers to create low-latency, multimodal experiences with natural speech-to-speech
    interactions, similar to ChatGPT’s Advanced Voice Mode. This API uses six preset
    voices, enabling seamless, conversational interactions.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 2024 年 10 月 1 日推出了实时 API 的公开预览，允许开发者创建低延迟、多模态体验，具有自然语音到语音的交互，类似于 ChatGPT 的高级语音模式。此
    API 使用六个预设声音，实现无缝、对话式的交互。
- en: Important note
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: For the latest information on Azure OpenAI model deployment schedules, visit
    the official Azure documentation at [https://learn.microsoft.com/en-us/azure/ai-services/openai/whats-new](https://learn.microsoft.com/en-us/azure/ai-services/openai/whats-new).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 有关 Azure OpenAI 模型部署的最新信息，请访问官方 Azure 文档 [https://learn.microsoft.com/en-us/azure/ai-services/openai/whats-new](https://learn.microsoft.com/en-us/azure/ai-services/openai/whats-new)。
- en: 'Additionally, audio input and output capabilities are being added to the Chat
    Completions API, which supports text and audio responses without the low-latency
    benefit of the Realtime API. This means developers can now use a single API call
    for both text and audio input/output in their applications, eliminating the need
    to combine multiple models for speech-enabled experiences. Check out a quick demo
    here: [https://youtu.be/fVbS-zpIqvY?si=YhGfyjUlhWQnJbX5](https://youtu.be/fVbS-zpIqvY?si=YhGfyjUlhWQnJbX5).'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，音频输入和输出功能正在添加到 Chat Completions API 中，该 API 支持文本和音频响应，但不如实时 API 具有低延迟优势。这意味着开发者现在可以在他们的应用程序中使用单个
    API 调用来处理文本和音频输入/输出，从而消除了需要结合多个模型以实现语音增强体验的需求。在此处查看快速演示：[https://youtu.be/fVbS-zpIqvY?si=YhGfyjUlhWQnJbX5](https://youtu.be/fVbS-zpIqvY?si=YhGfyjUlhWQnJbX5)。
- en: 'Some of the key benefits are as follows:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 一些关键好处如下：
- en: '**Simplified development**: Previously, developers needed separate models for
    speech recognition, inference, and text-to-speech. Now, both APIs handle the entire
    process, with the Realtime API offering faster response times and more natural
    interactions by streaming audio.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化开发**：以前，开发者需要为语音识别、推理和语音合成分别使用不同的模型。现在，这两个 API 都处理整个流程，实时 API 通过流式传输音频提供更快的响应时间和更自然的交互。'
- en: '**Persistent connection**: The Realtime API uses a WebSocket connection to
    communicate with GPT-4o, supporting function calling to enable actions such as
    placing orders or fetching customer data in real time.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持久连接**：实时 API 使用 WebSocket 连接与 GPT-4o 通信，支持函数调用以实现实时放置订单或获取客户数据等操作。'
- en: '**Use cases**: Targeted applications include customer support, language learning,
    and other voice-enabled user experiences. Early testing with partners has shown
    promising results in these areas.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：目标应用包括客户支持、语言学习和其他带有语音的用户体验。与合作伙伴的早期测试在这些领域显示出有希望的结果。'
- en: These features enhance conversational experiences by supporting natural voice
    interactions and enabling seamless integration with various applications.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这些功能通过支持自然语音交互和实现与各种应用的无缝集成来增强对话体验。
- en: '*Figure 10**.5* demonstrates how to implement RAG in voice-based applications
    using the GPT-4o Realtime API.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 10.5* 展示了如何使用 GPT-4o 实时 API 在基于语音的应用中实现 RAG。'
- en: '![Figure 10.5 – App pattern for RAG with a real-time audio-enabled model (source:
    https://github.com/Azure-Samples/aisearch-openai-rag-audio)](img/B31034_10_005.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.5 – 带实时音频功能的 RAG 应用程序模式（来源：https://github.com/Azure-Samples/aisearch-openai-rag-audio）](img/B31034_10_005.jpg)'
- en: 'Figure 10.5 – App pattern for RAG with a real-time audio-enabled model (source:
    [https://github.com/Azure-Samples/aisearch-openai-rag-audio](https://github.com/Azure-Samples/aisearch-openai-rag-audio))'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.5 – 带实时音频功能的 RAG 应用程序模式（来源：[https://github.com/Azure-Samples/aisearch-openai-rag-audio](https://github.com/Azure-Samples/aisearch-openai-rag-audio)）
- en: 'It uses two main components to support RAG workflows as shown in the preceding
    diagram:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 它使用两个主要组件来支持 RAG 工作流程，如前图所示：
- en: '**Function calling**: The GPT-4o Realtime API supports function calling, allowing
    the model to use tools for search and grounding. The model processes audio input
    and uses function calls to query a knowledge base for relevant information.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**函数调用**：GPT-4o 实时 API 支持函数调用，允许模型使用搜索和定位工具。模型处理音频输入，并使用函数调用查询知识库以获取相关信息。'
- en: '**Real-time middle tier**: This component separates client-side tasks from
    server-side functions, handling secure model configuration and access to the knowledge
    base. The client only manages audio traffic, while the server manages function
    calls and configuration, enhancing security by keeping sensitive credentials on
    the backend.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时中间层**：此组件将客户端任务与服务器端功能分开，处理安全的模型配置和访问知识库。客户端仅管理音频流量，而服务器管理功能调用和配置，通过在后端保留敏感凭证来增强安全性。'
- en: The key workflow involves the model listening to audio input and using a `search`
    function call to fetch relevant passages from the knowledge base via Azure AI
    Search. When results are returned, the model generates a grounded response via
    audio output.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 关键工作流程涉及模型监听音频输入，并使用 `search` 函数调用来通过 Azure AI 搜索从知识库中检索相关段落。当返回结果时，模型通过音频输出生成基于事实的响应。
- en: To manage citations, a `report_grounding` tool identifies grounding sources
    without including file names or URLs in spoken output, ensuring transparency in
    responses.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 要管理引用，`report_grounding` 工具识别基础来源，但不包括文件名或 URL 在语音输出中，确保响应的透明度。
- en: 'Some of the benefits of this pattern are as follows:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 此模式的一些好处如下：
- en: '**Low latency**: The Realtime API, combined with Azure AI Search, provides
    low-latency responses, enhancing user experience in conversational voice applications'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低延迟**：实时 API 与 Azure AI 搜索结合，提供低延迟响应，增强对话式语音应用的用户体验。'
- en: '**Backend security**: All sensitive configurations and credentials are securely
    stored in the backend, with Azure OpenAI and Azure AI Search offering advanced
    security features such as network isolation, Entra ID, and encryption.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**后端安全**：所有敏感配置和凭证都安全地存储在后端，Azure OpenAI 和 Azure AI 搜索提供高级安全功能，如网络隔离、Entra
    ID 和加密。'
- en: Chat with your own data solution accelerator
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与您自己的数据解决方案加速器聊天
- en: This solution accelerator combines the advanced capabilities of Azure AI Search
    and LLMs to deliver a seamless conversational search experience ([https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator](https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator)).
    Using an Azure OpenAI GPT model and an Azure AI Search index generated from your
    data, this solution integrates into a web application, providing a natural language
    interface with built-in speech-to-text functionality for efficient search queries,
    as illustrated in *Figure 9**.6*. Users can easily upload files, connect to storage,
    and handle the technical setup to process and transform documents. Everything
    is deployable within your own subscription to accelerate the adoption of this
    innovative technology.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 此解决方案加速器结合了 Azure AI 搜索和 LLMs 的高级功能，以提供无缝的对话式搜索体验 ([https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator](https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator)).
    使用 Azure OpenAI GPT 模型和从您的数据生成的 Azure AI 搜索索引，此解决方案集成到 Web 应用程序中，提供具有内置语音到文本功能的人工智能语言界面，以实现高效的搜索查询，如图
    *图 9*。6* 所示。用户可以轻松上传文件，连接到存储，并处理技术设置以处理和转换文档。所有内容都可以在您的订阅内部署，以加速创新技术的采用。
- en: '![Figure 10.6 – Chat with your own data solution architecture (source: https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator)](img/B31034_10_006.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.6 – 与您自己的数据解决方案架构聊天（来源：https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator)](img/B31034_10_006.jpg)'
- en: 'Figure 10.6 – Chat with your own data solution architecture (source: [https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator](https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator))'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.6 – 与您自己的数据解决方案架构聊天（来源：[https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator](https://github.com/Azure-Samples/chat-with-your-data-solution-accelerator))
- en: 'This repository provides a comprehensive solution for users looking to query
    their data using natural language. It includes an intuitive ingestion system supporting
    multiple file types, streamlined deployment, and a support team for maintenance.
    The solution accelerator demonstrates both push and pull ingestion options and
    supports orchestrations such as Semantic Kernel, LangChain, OpenAI Functions,
    and Prompt Flow. It is designed as a foundation for implementing RAG patterns
    but is not intended for immediate production use without careful testing and data
    evaluation. Key features include the following:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 此存储库为希望使用自然语言查询其数据的用户提供了一个全面的解决方案。它包括支持多种文件类型的直观摄取系统、简化的部署和维护支持团队。解决方案加速器展示了推送和拉取摄取选项，并支持如Semantic
    Kernel、LangChain、OpenAI Functions和Prompt Flow等编排。它被设计为实施RAG模式的基础，但不建议未经仔细测试和数据评估就用于即时生产使用。主要功能包括以下内容：
- en: Conversational search using Azure OpenAI with your data
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Azure OpenAI和您的数据进行对话式搜索
- en: Document upload and processing
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文档上传和处理
- en: Indexing of public web pages
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公共网页的索引
- en: Customizable prompt configurations
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可定制的提示配置
- en: Multiple chunking strategies for data processing
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据处理的多种分块策略
- en: This repository is ideal for scenarios where customization beyond the standard
    Azure OpenAI functionality is required. By default, it includes specific RAG configurations,
    such as chunk size, overlap, retrieval/search types, and system prompts. Before
    moving to production, evaluate and fine-tune these settings to optimize retrieval
    and response generation for your data. For RAG evaluation insights, refer to the
    RAG Experiment Accelerator at [https://github.com/microsoft/rag-experiment-accelerator](https://github.com/microsoft/rag-experiment-accelerator).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 此存储库非常适合需要超出标准Azure OpenAI功能定制的场景。默认情况下，它包括特定的RAG配置，如块大小、重叠、检索/搜索类型和系统提示。在生产之前，评估和微调这些设置以优化数据检索和响应生成。有关RAG评估见解，请参阅[https://github.com/microsoft/rag-experiment-accelerator](https://github.com/microsoft/rag-experiment-accelerator)的RAG实验加速器。
- en: 'The solution accelerator offers several advanced capabilities:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案加速器提供了几个高级功能：
- en: Model grounding using both internal data and public web content
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用内部数据和公共网络内容进行模型固化的方法
- en: Backend support for *custom* and *On Your Data* conversational flows
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 后端支持*自定义*和*数据本地化*的对话流程
- en: Advanced prompt engineering tools
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高级提示工程工具
- en: Admin interface for real-time data ingestion, inspection, and configuration
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时数据摄取、检查和配置的管理员界面
- en: Flexible push or pull models for data ingestion, with integrated vectorization
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据摄取的灵活推送或拉取模型，集成了向量化功能
- en: AI-powered Call Center Intelligence Accelerator
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AI驱动的呼叫中心智能加速器
- en: 'The Call Center Intelligence Accelerator is designed to significantly reduce
    operational costs in call centers while enhancing efficiency and customer satisfaction
    ([https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence)).
    Leveraging Azure Speech, Azure Language, and Azure OpenAI (GPT-3) services, this
    accelerator enables real-time and post-call analytics, allowing call centers to
    extract, redact, and analyze call transcriptions for valuable insights. These
    insights can help managers evaluate performance, monitor customer sentiment, and
    analyze conversation topics, all displayed in an interactive Power BI dashboard.
    The following diagram depicts key business outcomes that this solution could help
    accelerate:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: Call Center Intelligence Accelerator旨在显著降低呼叫中心的运营成本，同时提高效率和客户满意度([https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence))。利用Azure语音、Azure语言和Azure
    OpenAI（GPT-3）服务，此加速器可实现实时和通话后的分析，使呼叫中心能够提取、编辑和分析通话记录，以获得有价值的见解。这些见解可以帮助管理者评估绩效、监控客户情绪和分析对话主题，所有这些都在交互式Power
    BI仪表板中展示。以下图表描述了此解决方案可能帮助加速的关键业务成果：
- en: '![Figure 10.7 – Business outcomes of the accelerator (source: https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence)](img/B31034_10_007.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.7 – 加速器的业务成果（来源：https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence)](img/B31034_10_007.jpg)'
- en: 'Figure 10.7 – Business outcomes of the accelerator (source: [https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence))'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.7 – 加速器的业务成果（来源：[https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence))
- en: 'The preceding figure illustrates a solution architecture for AI-Powered Call
    Center Intelligence, showcasing two primary components: **Real-Time Intelligence**
    and **Post-Call Analytics**:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的图示展示了 AI 驱动的呼叫中心智能解决方案架构，展示了两个主要组件：**实时智能**和**通话后分析**：
- en: '**Real-Time Intelligence**: This component supports live transcription and
    analysis during a call to provide immediate insights and suggested actions to
    agents. Key technical features include the following:'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时智能**：此组件支持在通话期间进行实时转录和分析，为代理提供即时洞察和建议操作。关键技术特性包括以下内容：'
- en: '**Live Transcription** using Azure Speech Service for real-time audio processing'
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Azure 语音服务进行**实时转录**以处理实时音频
- en: '**Entity Extraction & PII Redaction** with Azure Language Service to secure
    sensitive data'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Azure 语言服务进行**实体提取和 PII 纠正**以保护敏感数据
- en: '**Conversation Summarization & Business Insights** via Azure OpenAI Service
    for actionable intelligence'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过 Azure OpenAI 服务进行**对话摘要和业务洞察**以提供可操作的智能
- en: A web-based app simulates agent-customer interactions, showcasing how Azure
    AI enhances agent capabilities as a co-pilot
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个基于网页的应用模拟了代理-客户互动，展示了 Azure AI 如何作为副驾驶增强代理的能力
- en: For setup, refer to the *Real-time Intelligence* section for detailed instructions
    at [https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence/blob/main/call-intelligence-realtime/README.md](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence/blob/main/call-intelligence-realtime/README.md).
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于设置，请参阅[https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence/blob/main/call-intelligence-realtime/README.md](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence/blob/main/call-intelligence-realtime/README.md)中的*实时智能*部分以获取详细说明。
- en: '**Post-Call Analytics**: This component focuses on analyzing calls after they
    conclude, generating insights that drive continuous improvement in call handling
    and compliance. Core features include the following:'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通话后分析**：此组件专注于分析通话结束后的情况，生成推动通话处理和合规性持续改进的洞察。核心功能包括以下内容：'
- en: '**Batch Speech-to-Text Processing** with Azure Speech for large-scale transcription
    and speaker separation'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Azure 语音进行**批量语音到文本处理**以进行大规模转录和说话人分离
- en: '**PII Extraction and Redaction** to protect sensitive information'
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PII 提取和纠正**以保护敏感信息'
- en: '**Sentiment Analysis and Opinion Mining** to gauge customer emotions at various
    points in the conversation'
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感分析和意见挖掘**以衡量对话中不同点的客户情绪'
- en: '**Data Visualization** with Power BI to make insights accessible and actionable'
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Power BI 进行**数据可视化**以使洞察易于访问和操作
- en: These components leverage Azure AI services to enhance call center operations
    by providing insights during and after customer interactions.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这些组件利用 Azure AI 服务在客户互动期间和之后提供洞察，从而增强呼叫中心运营。
- en: Key tools and integrations include Azure Speech-to-Text for transcribing audio,
    Azure Language Service for extracting key information, and Azure OpenAI Service
    for advanced real-time processing. Insights are stored in CRM systems for effective
    customer relationship management, while Power BI visualizes post-call data for
    trend analysis and operational improvements.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 关键工具和集成包括 Azure 语音到文本进行音频转录，Azure 语言服务提取关键信息，以及 Azure OpenAI 服务进行高级实时处理。洞察存储在
    CRM 系统中，以实现有效的客户关系管理，而 Power BI 可视化通话后数据，以进行趋势分析和运营改进。
- en: '![Figure 10.8 – Azure key services (source: https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence)](img/B31034_10_008.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.8 – Azure 关键服务（来源：https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence)](img/B31034_10_008.jpg)'
- en: 'Figure 10.8 – Azure key services (source: [https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence))'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.8 – Azure 关键服务（来源：[https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence](https://github.com/amulchapla/AI-Powered-Call-Center-Intelligence)）
- en: Together, these components streamline call center operations, boosting both
    customer satisfaction and organizational efficiency.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这些组件共同简化了呼叫中心运营，提高了客户满意度和组织效率。
- en: The next section delves into an exciting way to access and retrieve data from
    a database using plain English. By providing the entire database schema to an
    LLM, the model gains a contextual understanding of the data structure, including
    table names and column details. This enables the LLM to interpret natural language
    queries, convert them into SQL statements to retrieve the relevant data, and present
    the results in plain English rather than raw SQL output.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将深入探讨一种使用普通英语访问和检索数据库数据的新颖方法。通过向大型语言模型提供整个数据库架构，模型获得了对数据结构的上下文理解，包括表名和列细节。这使得大型语言模型能够解释自然语言查询，将它们转换为
    SQL 语句以检索相关数据，并以普通英语而不是原始 SQL 输出呈现结果。
- en: For instance, if you ask, “What was the sales revenue in the USA in August 2003?”,
    the response would be, “The total sales revenue in the USA for August 2003 was
    approximately $164,602.67.” Let’s dive deeper into how this fascinating capability
    works!
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你问，“2003 年 8 月美国销售额是多少？”，回答将是，“2003 年 8 月美国总销售额约为 164,602.67 美元。”让我们深入了解这一令人着迷的功能是如何工作的！
- en: 'The RAG pattern with database: using function calling to access and query structured
    data'
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有数据库的 RAG 模式：使用函数调用访问和查询结构化数据
- en: One of the most powerful applications of Azure OpenAI is the ability to access
    structured data using natural language. This is made possible through `https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/function`-calling
    in Azure OpenAI’s documentation.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: Azure OpenAI 最强大的应用之一是能够使用自然语言访问结构化数据。这通过 Azure OpenAI 文档中的 `https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/function`
    调用得以实现。
- en: In this solution pattern, we build a **database agent** using Azure OpenAI,
    Azure SQL, and Azure App Service. Instead of requiring users to write complex
    SQL queries, the model interprets their natural language questions, translates
    them into SQL using function calls, and then executes the queries to return grounded,
    human-readable responses.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在此解决方案模式中，我们使用 Azure OpenAI、Azure SQL 和 Azure App Service 构建了一个 **数据库代理**。我们不需要用户编写复杂的
    SQL 查询，模型可以解释他们的自然语言问题，将它们转换为 SQL 使用函数调用，然后执行查询以返回基于事实、易于理解的结果。
- en: Let’s look at how it works.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看它是如何工作的。
- en: 'Here’s the step-by-step process when a user asks a question:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户提问时的逐步过程如下：
- en: '**Chat prompt**: The user has entered the question, “What was the sales revenue
    in the USA in August 2003?”'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天提示**：用户输入了问题，“2003 年 8 月美国销售额是多少？”'
- en: '`Function get_table_schema completed`: This step retrieves the schema of the
    table, providing the agent with information on the table’s structure'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Function get_table_schema completed`：此步骤检索表的架构，为代理提供有关表结构的详细信息'
- en: '`Function get_table_rows completed`: This retrieves the data rows, which may
    help the agent understand the content of the table and perform checks before executing
    the SQL query'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Function get_table_rows completed`：此步骤检索数据行，这可能有助于代理理解表格内容并在执行 SQL 查询之前进行检查'
- en: '`Function query_azure_sql completed`: This is the final function call that
    executes a SQL query on the Azure SQL database'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Function query_azure_sql completed`：这是最终的函数调用，在 Azure SQL 数据库上执行 SQL 查询'
- en: '`query_azure_sql` function executes a SQL query to calculate the total sales
    revenue in the USA for August 2003:'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`query_azure_sql` 函数执行 SQL 查询以计算 2003 年 8 月美国总销售额：'
- en: '[PRE0]'
  id: totrans-144
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '`164602.66999999995`*   **Final answer**: The application interprets the function
    output and responds to the user’s question with the formatted answer: “Total sales
    revenue in the USA for August 2003 was approximately $164,602.67”'
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`164602.66999999995`   **最终答案**：应用程序解释函数输出，并以格式化的答案响应用户的问题：“2003 年 8 月美国总销售额约为
    164,602.67 美元”'
- en: Architecture overview
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 架构概述
- en: 'The overall solution uses three main components:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 整体解决方案使用三个主要组件：
- en: '**Azure OpenAI GPT-4**: Powers the natural language understanding, SQL generation,
    and function calling orchestration'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure OpenAI GPT-4**：提供自然语言理解、SQL 生成和函数调用编排'
- en: '**Azure SQL Database**: Stores the structured data to be queried'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure SQL 数据库**：存储要查询的结构化数据'
- en: '**Azure Container Instance (App Backend)**: Hosts backend logic, executes validated
    queries, and protects sensitive credentials'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure 容器实例 (App 后端)**: 托管后端逻辑，执行验证过的查询，并保护敏感凭证'
- en: '![Figure 10.9 – Architecture diagram](img/B31034_10_09.jpg)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.9 – 架构图](img/B31034_10_09.jpg)'
- en: Figure 10.9 – Architecture diagram
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.9 – 架构图
- en: The function calling workflow ensures that the model doesn’t directly access
    the database. Instead, it acts as an orchestrator—generating query intents, which
    are validated and executed securely by the backend.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 函数调用工作流程确保模型不会直接访问数据库。相反，它充当协调者——生成查询意图，这些意图由后端验证并安全执行。
- en: Why this matters
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么这很重要
- en: This pattern brings the power of RAG into structured data environments. Instead
    of retrieving text documents, it enables real-time access to relational databases
    using a combination of LLM reasoning and secure backend orchestration.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式将 RAG 的力量带入结构化数据环境。它不是检索文本文档，而是通过结合 LLM 推理和安全的后端协调，实现实时访问关系数据库。
- en: 'Key benefits include the following:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 主要好处包括以下内容：
- en: '**No SQL knowledge needed**: End users can ask questions in natural language'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无需 SQL 知识**：最终用户可以用自然语言提问'
- en: '**Safe and controlled execution**: All SQL queries are validated and managed
    server-side'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全可控的执行**：所有 SQL 查询都经过验证并在服务器端管理'
- en: '**Grounded answers**: Every response is generated based on live data from your
    trusted systems'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于事实的答案**：每个响应都是基于您信任的系统中的实时数据生成的'
- en: Document Intelligence
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文档智能
- en: 'One popular use case for AI is supporting data extraction from unstructured
    data. By combining Document Intelligence with LLM models, we can significantly
    improve the accuracy of data extraction. I’ve written an article discussing this
    concept in more detail: [https://techcommunity.microsoft.com/blog/azure-ai-services-blog/maximizing-data-extraction-precision-with-dual-llms-integration-and-human-in-the/4236728](https://techcommunity.microsoft.com/blog/azure-ai-services-blog/maximizing-data-extraction-precision-with-dual-llms-integration-and-human-in-the/4236728).'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的一个流行用例是支持从非结构化数据中提取数据。通过将文档智能与 LLM 模型相结合，我们可以显著提高数据提取的准确性。我已撰写了一篇文章，更详细地讨论了这一概念：[https://techcommunity.microsoft.com/blog/azure-ai-services-blog/maximizing-data-extraction-precision-with-dual-llms-integration-and-human-in-the/4236728](https://techcommunity.microsoft.com/blog/azure-ai-services-blog/maximizing-data-extraction-precision-with-dual-llms-integration-and-human-in-the/4236728)。
- en: The following GitHub repositories focus on Document Intelligence and provide
    sample code and data to help improve accuracy in data extraction.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 以下 GitHub 仓库专注于文档智能，并提供示例代码和数据，以帮助提高数据提取的准确性。
- en: No-code hack for tackling non-standard table recognition in GenAI
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非代码方法解决 GenAI 中的非标准表格识别问题
- en: One of the primary challenges in RAG for document processing is maintaining
    accuracy, especially in extracting data from non-standard tables. Complex table
    structures—common in financial documents and reports—demand advanced pre-processing
    techniques to capture relationships across various columns and sub-columns. Simple
    OCR tools, such as Azure Document Intelligence, are helpful but struggle with
    the vast variety of document formats, especially those with intricate layouts.
    The solution lies in adaptive pre-processing rather than relying on a single,
    all-encompassing model.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在文档处理中，RAG 的一个主要挑战是保持准确性，尤其是在从非标准表格中提取数据时。复杂的表格结构——在财务文件和报告中很常见——需要高级预处理技术来捕捉跨各种列和子列的关系。简单的
    OCR 工具，如 Azure 文档智能，很有帮助，但难以处理大量文档格式，尤其是那些布局复杂的格式。解决方案在于自适应预处理，而不是依赖于单一的全能模型。
- en: Non-standard tables present unique challenges, as they do not follow fixed row
    and column counts, and often contain merged cells, bilingual content, or nested
    columns. Traditional code-based solutions were effective but required constant
    updates to handle new layouts. The current approach leverages the GPT-4o model
    and Azure Document Intelligence’s latest capabilities to enable a no-code solution
    for table extraction, making it easier to adapt to diverse layouts without heavy
    coding ([https://github.com/denlai-mshk/nocodetable](https://github.com/denlai-mshk/nocodetable)).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 非标准表格带来独特的挑战，因为它们不遵循固定的行和列数，并且通常包含合并单元格、双语内容或嵌套列。传统的基于代码的解决方案虽然有效，但需要不断更新以处理新的布局。当前的方法利用
    GPT-4o 模型和 Azure 文档智能的最新功能，实现表格提取的无代码解决方案，使其更容易适应不同的布局而无需大量编码 ([https://github.com/denlai-mshk/nocodetable](https://github.com/denlai-mshk/nocodetable))。
- en: A table transformation flow converts tables into a row-based, markdown format
    that retains 2D relationships in a way LLMs can understand more intuitively. For
    maximum accuracy, well-designed prompts and *few-shot examples* are essential
    in guiding GPT-4o through the flattening process. By translating data into clear,
    row-based statements, LLMs can process relationships efficiently, increasing speed
    and accuracy in data retrieval. This also allows missing values to be auto-filled,
    marked with `{auto-fill}` for verification.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 表格转换流程将表格转换为基于行的、Markdown 格式，以使 LLMs 能够更直观地理解二维关系。为了达到最大精度，精心设计的提示和*少量示例*对于引导
    GPT-4o 通过扁平化过程至关重要。通过将数据转换为清晰的、基于行的语句，LLMs 可以有效地处理关系，提高数据检索的速度和精度。这还允许自动填充缺失值，并用
    `{auto-fill}` 标记以供验证。
- en: In short, by adopting a no-code, prompt-driven approach and flattening non-standard
    tables into simplified markdown statements, LLMs can more effectively interpret
    and retrieve complex document data, improving accuracy and confidence in AI search
    results. Please visit the repository for more details.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，通过采用无代码、提示驱动的方案，并将非标准表格扁平化为简化的 Markdown 语句，LLMs 可以更有效地解释和检索复杂的文档数据，提高 AI
    搜索结果的准确性和信心。请访问存储库以获取更多详细信息。
- en: The following image illustrates a document ingestion pipeline designed to process
    and analyze documents, extract information, and index it for retrieval using AI-driven
    tools.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图像展示了设计用于处理和分析文档、提取信息以及使用 AI 驱动的工具对其进行索引的文档摄取管道。
- en: '![Figure 10.10 – Document Intelligence ingestion pipeline (source: https://github.com/denlai-mshk/nocodetable)](img/B31034_10_10.jpg)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.10 – 文档智能摄取管道（来源：https://github.com/denlai-mshk/nocodetable)](img/B31034_10_10.jpg)'
- en: 'Figure 10.10 – Document Intelligence ingestion pipeline (source: [https://github.com/denlai-mshk/nocodetable](https://github.com/denlai-mshk/nocodetable))'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.10 – 文档智能摄取管道（来源：[https://github.com/denlai-mshk/nocodetable](https://github.com/denlai-mshk/nocodetable))
- en: 'The pipeline consists of several components, each performing a specific function,
    ultimately enabling seamless ingestion, transformation, and indexing of document
    data:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 管道由几个组件组成，每个组件执行特定功能，最终实现文档数据的无缝摄取、转换和索引：
- en: '**Blob upload event/scheduled trigger**: The process starts with a document
    being uploaded to blob storage or a scheduled event that triggers the ingestion
    pipeline.'
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Blob 上传事件/计划触发器**：过程从将文档上传到 Blob 存储或触发摄取管道的计划事件开始。'
- en: '**Semantic chunking**: Documents are broken down into smaller, semantically
    meaningful chunks. This allows for easier processing and more accurate data extraction
    from individual sections of a document.'
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**语义分块**：文档被分解成更小、语义上有意义的块。这允许更容易地处理文档的各个部分，并从单个部分中提取更准确的数据。'
- en: '**OCR per page/chunk**: OCR is applied to each page. This step is used to extract
    text from scanned images or document pages. If tables are detected within the
    document, they are processed differently (as noted in the next steps).'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**每页/块 OCR**：OCR 应用于每一页。此步骤用于从扫描图像或文档页面中提取文本。如果在文档中检测到表格，它们将按不同的方式处理（如以下步骤所述）。'
- en: '**Table detection and flattening**: When a table is present, the system leverages
    a **no-code table recognition** feature to recognize and process the table.'
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**表格检测和扁平化**：当存在表格时，系统利用**无代码表格识别**功能来识别和处理表格。'
- en: A prompt is used to *flatten* the tabular data into individual rows in a markdown
    format. This restructuring captures the 2D context of the table, making it easier
    to analyze each row of data independently.
  id: totrans-176
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示用于将表格数据*扁平化*为 Markdown 格式中的单独行。这种重构捕捉了表格的二维上下文，使得独立分析每一行数据变得更加容易。
- en: '**Document Intelligence**: This component, labeled as **Layout: 2024-02-29
    (Preview)**, enhances document understanding by leveraging Document Intelligence
    capabilities. It helps in identifying and extracting structured data (such as
    tables) without requiring code, enabling Markdown output for better organization.'
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文档智能**：此组件标记为**布局：2024-02-29（预览**），通过利用文档智能功能增强文档理解。它有助于在不要求代码的情况下识别和提取结构化数据（如表格），并生成
    Markdown 输出以实现更好的组织。'
- en: '**Azure OpenAI (GPT-4)**: Azure OpenAI’s GPT-4 model (specifically dated 2024-05-13)
    is used to further analyze and process the flattened data. This may involve understanding
    the content contextually, refining data extraction, or enhancing responses based
    on the extracted data.'
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Azure OpenAI (GPT-4)**：Azure OpenAI 的 GPT-4 模型（具体日期为 2024-05-13）用于进一步分析和处理扁平化数据。这可能涉及上下文理解内容、细化数据提取或基于提取的数据增强响应。'
- en: '**AI search with vectorized indexing**: After processing, the data is indexed
    using vector embeddings to enable efficient, semantic-based search. The vectorized
    indexing allows users to perform complex, contextual searches on the document
    content, which is now stored in a searchable format.'
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于向量索引的 AI 搜索**：处理后的数据使用向量嵌入进行索引，以实现基于语义的高效搜索。向量索引允许用户在文档内容上执行复杂的、上下文相关的搜索，这些内容现在以可搜索的格式存储。'
- en: 'Let’s go over some additional notes:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一些额外的注意事项：
- en: '**No-code table recognition**: This feature allows the pipeline to identify
    and process tables without custom coding, simplifying the extraction of structured
    data'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无代码表格识别**：此功能允许管道识别和处理表格而无需自定义编码，简化了结构化数据的提取。'
- en: '**Markdown and 2D context**: The table data is converted into a markdown format,
    with each row treated individually to retain the relational (2D) context of the
    table'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Markdown 和 2D 上下文**：表格数据被转换为 Markdown 格式，每一行单独处理以保留表格的（2D）关系上下文。'
- en: '**Text-embedding in AI Search**: Embedding the processed document data in a
    searchable format enables advanced AI-powered search capabilities, allowing users
    to retrieve information based on context rather than exact keywords'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI 搜索中的文本嵌入**：将处理后的文档数据嵌入到可搜索的格式中，使高级 AI 驱动的搜索功能成为可能，允许用户根据上下文而不是精确关键词检索信息。'
- en: This pipeline leverages Azure’s OpenAI and AI Search tools to process documents
    through OCR, semantic chunking, table recognition, and vectorized indexing. The
    result is a robust document processing solution capable of extracting structured
    information from diverse document types, making it searchable and accessible for
    users in a highly contextualized manner.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 此管道利用 Azure 的 OpenAI 和 AI 搜索工具通过 OCR、语义分块、表格识别和向量索引处理文档。结果是强大的文档处理解决方案，能够从多种文档类型中提取结构化信息，以高度上下文化的方式使其可搜索和可访问。
- en: Azure Document Intelligence code samples repository
  id: totrans-185
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Azure 文档智能代码示例仓库
- en: The Azure Document Intelligence code samples repository provides resources for
    using Azure AI Document Intelligence to analyze text and structured data from
    documents using machine learning ([https://github.com/Azure-Samples/document-intelligence-code-samples](https://github.com/Azure-Samples/document-intelligence-code-samples)).
    This cloud-based Azure service enables the development of intelligent document
    processing solutions to manage and process large volumes of data efficiently,
    enhancing operations, decision-making, and innovation.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: Azure 文档智能代码示例仓库提供了使用 Azure AI 文档智能分析文档中的文本和结构化数据的资源，使用机器学习（[https://github.com/Azure-Samples/document-intelligence-code-samples](https://github.com/Azure-Samples/document-intelligence-code-samples)）。此基于云的
    Azure 服务使开发智能文档处理解决方案成为可能，以高效地管理和处理大量数据，增强运营、决策和创新。
- en: The repository includes code samples for multiple languages, including Python
    (default), .NET, Java, and JavaScript. It defaults to the latest preview version
    (v4.0, 2024-02-29-preview), with earlier versions (v3.1, 2023-07-31-GA) also available.
    Key sections include **Features**, **Prerequisites**, **Setup**, **Running Samples**,
    and **Next Steps**, offering a comprehensive guide to getting started with and
    exploring the service’s capabilities.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 仓库包含多种语言的代码示例，包括 Python（默认）、.NET、Java 和 JavaScript。默认为最新预览版本（v4.0，2024-02-29-preview），早期版本（v3.1，2023-07-31-GA）也提供。关键部分包括**功能**、**先决条件**、**设置**、**运行示例**和**下一步操作**，提供了一本全面的指南，用于开始使用并探索该服务的功能。
- en: AI Search
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 搜索
- en: One of the key features of implementing RAG patterns is ensuring the retrieval
    of relevant and accurate data for effective communication with LLMs, which relies
    on AI Search. With the introduction of integrated data chunking and embedding,
    the process is now simplified—from data ingestion to retrieval. Let’s explore
    the details further.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 实施 RAG 模式的一个关键特性是确保检索到相关且准确的数据，以有效地与 LLM 进行沟通，这依赖于 AI 搜索。随着集成数据分块和嵌入的引入，该过程现在简化了——从数据摄入到检索。让我们进一步探讨细节。
- en: Integrated data chunking and embedding
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 集成数据分块和嵌入
- en: 'Integrated data chunking and embedding in Azure AI Search simplify the process
    of ingesting, processing, and indexing data from various sources, providing a
    seamless and user-friendly experience. By automating complex tasks such as data
    chunking, enrichment, vectorization, and indexing, it eliminates the need for
    manually creating and configuring individual components such as indexers, skillsets,
    and vector fields. With its intuitive interface, users can efficiently navigate
    the entire workflow, from data ingestion to making data searchable, streamlining
    operations, and enhancing efficiency. Here’s a detailed breakdown based on the
    diagram:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Search 中的集成数据分块和嵌入简化了从各种来源摄取、处理和索引数据的过程，提供了一个无缝且用户友好的体验。通过自动化数据分块、丰富、向量化和索引等复杂任务，它消除了手动创建和配置索引器、技能集和向量字段等单个组件的需求。凭借其直观的界面，用户可以高效地导航整个工作流程，从数据摄取到使数据可搜索，简化操作并提高效率。以下是基于图表的详细分解：
- en: '![Figure 10.11 – Integrated data chunking and embedding](img/B31034_10_011.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.11 – 集成数据分块和嵌入](img/B31034_10_011.jpg)'
- en: Figure 10.11 – Integrated data chunking and embedding
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.11 – 集成数据分块和嵌入
- en: 'Let’s have a look at the workflow:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看工作流程：
- en: '**Data source integration**: Azure AI Search pulls data from various sources,
    such as **OneLake**, **Blob Storage**, **ADLSv2**, and **SQL databases**. Incremental
    change tracking ensures up-to-date content is always available for indexing.'
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据源集成**：Azure AI Search 从各种来源获取数据，例如 **OneLake**、**Blob Storage**、**ADLSv2**
    和 **SQL 数据库**。增量更改跟踪确保始终可用最新内容进行索引。'
- en: '**File format cracking**: The system processes diverse file formats, including
    PDFs, Office documents, and images. It even handles nested images within documents,
    ensuring that all content is accessible for indexing.'
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文件格式破解**：系统处理各种文件格式，包括 PDF、Office 文档和图像。它甚至处理文档中的嵌套图像，确保所有内容都可用于索引。'
- en: '`text-embedding-ada-002`, `text-embedding-3-small`, or `text-embedding-3-large`
    to generate vector arrays'
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `text-embedding-ada-002`、`text-embedding-3-small` 或 `text-embedding-3-large`
    生成向量数组
- en: '**Custom embedding skills**, pointing to external models on Azure or other
    platforms'
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自定义嵌入技能**，指向 Azure 或其他平台上的外部模型'
- en: '**Azure AI Vision skill (preview)**, which uses the multimodal API for extracting
    embeddings from images and other content'
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Azure AI Vision 技能（预览**），使用多模态 API 从图像和其他内容中提取嵌入'
- en: '**AML skill**, linking to selected models in the Azure AI Studio model catalog'
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**AML 技能**，链接到 Azure AI Studio 模型目录中选定的模型'
- en: '**Vectorization**: Text and images are converted into embeddings (numerical
    vectors) that capture the semantic meaning of the content. Azure supports embedding
    generation using tools such as OpenAI, AI Vision, or custom models. These embeddings
    are used for both indexing and querying.'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**向量化**：文本和图像被转换为嵌入（数值向量），这些向量捕获了内容的语义意义。Azure 支持使用 OpenAI、AI Vision 或自定义模型等工具生成嵌入。这些嵌入用于索引和查询。'
- en: '**Indexing**: The processed data is stored in a document index, a chunk index,
    or both. These indexes enable fast and accurate retrieval during search queries.'
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**索引**：处理后的数据存储在文档索引、块索引或两者中。这些索引在搜索查询期间能够实现快速和准确的检索。'
- en: Integrated data chunking and embedding in Azure AI Search revolutionize how
    data is indexed and searched. By breaking data into meaningful chunks and converting
    it into semantic embeddings, the system delivers faster, more accurate, and contextually
    relevant results. This capability is ideal for organizations dealing with large-scale,
    complex datasets, supporting applications like chat-style search and hybrid search
    with unparalleled efficiency.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Search 中的集成数据分块和嵌入彻底改变了数据的索引和搜索方式。通过将数据分解成有意义的块并将其转换为语义嵌入，系统提供了更快、更准确且与上下文相关的结果。这种能力非常适合处理大规模、复杂数据集的组织，支持聊天式搜索和混合搜索，效率无与伦比。
- en: 'Integrated data chunking and embedding can be created through two methods:
    the **Azure portal** or the **SDK**. This section provides a high-level overview
    of both approaches. For detailed guidance, refer to the official documentation:
    [https://learn.microsoft.com/en-us/azure/search/vector-search-integrated-vectorization](https://learn.microsoft.com/en-us/azure/search/vector-search-integrated-vectorization).'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 集成数据分块和嵌入可以通过两种方法创建：**Azure 门户** 或 **SDK**。本节提供了这两种方法的概述。有关详细指导，请参阅官方文档：[https://learn.microsoft.com/en-us/azure/search/vector-search-integrated-vectorization](https://learn.microsoft.com/en-us/azure/search/vector-search-integrated-vectorization)。
- en: Using the Azure AI Search Portal
  id: totrans-205
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Azure AI搜索门户
- en: To streamline data ingestion and search experience, Azure AI Search now offers
    a simplified method for setting up integrated chunking and embedding—directly
    from the Azure portal. This low-code approach eliminates the need to manually
    configure complex components like indexers, skillsets, or vector fields. Instead,
    it offers a guided experience that lets you connect to a data source, generate
    embeddings, and index your content with just a few clicks.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化数据摄取和搜索体验，Azure AI搜索现在提供了一种简化的方法来设置集成分块和嵌入——直接从Azure门户进行。这种低代码方法消除了手动配置复杂组件（如索引器、技能集或向量字段）的需求。相反，它提供了一个引导式体验，让您只需几步点击即可连接到数据源、生成嵌入并索引内容。
- en: 'To get started, follow these steps from the Azure portal:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，请按照以下步骤从Azure门户操作：
- en: '**Navigate to your AI Search resource**: Open the Azure portal and select the
    AI Search resource you created in *Exercise 1: Creating an Azure AI Search service*
    of [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140).'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**导航到您的AI搜索资源**：打开Azure门户，选择您在[*第7章*](B31034_07.xhtml#_idTextAnchor140)的*练习1：创建Azure
    AI搜索服务*中创建的AI搜索资源。'
- en: '**Click Import and vectorize data**: On the overview page of your search resource,
    locate and click the **Import and vectorize data** option, as shown in the following
    screenshot.'
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**点击导入和向量化数据**：在您的搜索资源概览页面上，找到并点击**导入和向量化数据**选项，如图下截图所示。'
- en: '![Figure 10.12 – Import and vectorize data](img/B31034_10_012.jpg)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![图10.12 – 导入和向量化数据](img/B31034_10_012.jpg)'
- en: Figure 10.12 – Import and vectorize data
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.12 – 导入和向量化数据
- en: '**Connect to your data source**: Choose a data source type—such as Azure Blob
    Storage, Azure SQL, or Azure Data Lake Storage Gen2\. The system supports various
    structured and unstructured formats, including PDFs, Office documents, and image
    files. Ensure that your selected source includes some sample or test files to
    proceed with the setup.'
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**连接到您的数据源**：选择数据源类型——例如Azure Blob存储、Azure SQL或Azure Data Lake Storage Gen2。系统支持各种结构化和非结构化格式，包括PDF、Office文档和图像文件。确保您所选的源包含一些样本或测试文件以继续设置。'
- en: '**Vectorize your text data**: Choose an embedding model from your Azure OpenAI
    or multi-service account. For example, you might **select text-embedding-ada-002**,
    **text-embedding-3-small**, or **text-embedding-3-large**, depending on the precision
    and performance required.'
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**向量化您的文本数据**：从您的Azure OpenAI或多服务帐户中选择一个嵌入模型。例如，您可能**选择text-embedding-ada-002**、**text-embedding-3-small**或**text-embedding-3-large**，具体取决于所需的精度和性能。'
- en: '**(Optional) Enable image vectorization and OCR**: If your data includes image
    files, you can enable vectorization of visual content using the Azure AI Vision
    (preview) skill. You can also choose to extract text from images for indexing—ideal
    for scanned documents or image-based PDFs.'
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**（可选）启用图像向量和OCR**：如果您的数据包含图像文件，您可以使用Azure AI Vision（预览）技能启用视觉内容的向量化。您还可以选择从图像中提取文本以进行索引——非常适合扫描文档或基于图像的PDF文件。'
- en: '**Enable semantic ranking**: Toggle this option to improve the relevance of
    results by applying a semantic ranker on top of your indexed data. This enhances
    the quality of responses returned by LLMs when querying your search index.'
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**启用语义排序**：切换此选项，通过在索引数据上应用语义排序器来提高结果的相关性。这增强了当查询您的搜索索引时，LLM返回的响应质量。'
- en: '**Schedule indexing runs**: Define how often the pipeline should refresh your
    search index by re-ingesting data. Options include on-demand, periodic scheduling,
    or change tracking for incremental updates.'
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**安排索引运行**：定义管道应多久刷新一次搜索索引，通过重新摄取数据。选项包括按需、定期安排或变更跟踪以进行增量更新。'
- en: ✅ Tip
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 小贴士
- en: This portal-based workflow is an ideal entry point for teams new to Azure AI
    Search or those looking to rapidly prototype RAG-based applications without writing
    code.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 此基于门户的工作流程是对于新接触Azure AI搜索或希望快速原型化基于RAG的应用程序而不编写代码的团队的理想起点。
- en: By using this guided setup, you’re not just indexing content—you’re enabling
    advanced AI-powered retrieval with embedded vector semantics. This is the foundation
    for building solutions such as chat with your data, intelligent search assistants,
    and contextual Q&A experiences across your enterprise data.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用此引导设置，您不仅是在索引内容——您还在嵌入向量语义的基础上启用了高级AI驱动的检索。这是构建与数据聊天、智能搜索助手以及跨企业数据的上下文问答体验等解决方案的基础。
- en: Top of Form
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表单顶部
- en: Bottom of Form
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表单底部
- en: '`azure-search-integrated-vectorization-sample.ipynb` Jupyter Notebook file
    in the `integrated-vectorization/chapter9` folder. The folder will provide a comprehensive
    guide to implementing integrated vectorization and search capabilities using Azure
    Cognitive Search. It demonstrates how to index documents and generate embeddings
    with Azure OpenAI and custom models, enabling advanced search types such as vector
    search, hybrid search, and semantic hybrid search.'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`azure-search-integrated-vectorization-sample.ipynb` Jupyter Notebook 文件位于
    `integrated-vectorization/chapter9` 文件夹中。该文件夹将提供使用 Azure 认知搜索实现集成向量和搜索功能的全面指南。它演示了如何使用
    Azure OpenAI 和自定义模型索引文档并生成嵌入，从而实现高级搜索类型，如向量搜索、混合搜索和语义混合搜索。'
- en: Key components include skillsets such as OCR (for text extraction), text chunking,
    and embedding generation using Azure OpenAI or custom models. These skills are
    configured in an indexer to process data from sources such as Blob Storage, converting
    content into embeddings and storing it efficiently in an index. The notebook explores
    various search methodologies, including vector similarity matching, hybrid keyword
    and vector-based search, and semantic searches for enhanced context and relevance.
  id: totrans-223
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 关键组件包括技能集，如 OCR（用于文本提取）、文本分块和嵌入生成，使用 Azure OpenAI 或自定义模型。这些技能在索引器中配置，以处理来自 Blob
    存储等数据源的数据，将内容转换为嵌入并高效地存储在索引中。笔记本探讨了各种搜索方法，包括向量相似度匹配、混合关键字和基于向量的搜索以及语义搜索以增强上下文和相关性。
- en: The implementation covers data preparation, metadata preservation, and schema
    definition for indexing, supporting diverse query formats such as plain text and
    vector-based queries. Use cases include comparing complex datasets (e.g., insurance
    plans) and extracting meaningful insights through hybrid or semantic search. By
    emphasizing efficient data processing, scalability, and improved search relevance,
    the notebook serves as a valuable resource for developing advanced search solutions
    with Azure Cognitive Search.
  id: totrans-224
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 实现包括数据准备、元数据保留和索引的架构定义，支持多种查询格式，如纯文本和基于向量的查询。用例包括比较复杂的数据集（例如，保险计划）以及通过混合或语义搜索提取有意义的见解。通过强调高效数据处理、可扩展性和改进的搜索相关性，笔记本成为开发
    Azure 认知搜索高级搜索解决方案的有价值资源。
- en: Important note
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: If you’re unfamiliar with running Jupyter Notebook files in Visual Studio Code,
    you can find detailed instructions at [https://code.visualstudio.com/docs/datascience/jupyter-notebooks](https://code.visualstudio.com/docs/datascience/jupyter-notebooks).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还不熟悉在 Visual Studio Code 中运行 Jupyter Notebook 文件，你可以在[https://code.visualstudio.com/docs/datascience/jupyter-notebooks](https://code.visualstudio.com/docs/datascience/jupyter-notebooks)找到详细的说明。
- en: Summary
  id: totrans-227
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored how AI is not just a theoretical concept—it’s already
    enhancing business outcomes across multiple industries. From creating domain-specific
    copilots and chatbots to streamlining document processing and structuring database
    queries in plain English, these patterns are delivering tangible ROI for organizations.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了人工智能不仅仅是一个理论概念——它已经在多个行业中增强了商业成果。从创建特定领域的共飞行员和聊天机器人，到简化文档处理和用普通英语构建数据库查询，这些模式为组织带来了可衡量的投资回报。
- en: We also covered a suite of open source accelerators that can speed up your AI
    development—whether it’s conversation-driven solutions (RAG with GPT-4o), real-time
    analytics in call centers, or advanced text extraction in complex documents.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还介绍了一系列开源加速器，这些加速器可以加快你的 AI 开发速度——无论是以对话驱动的解决方案（RAG 与 GPT-4o）、呼叫中心的实时分析，还是复杂文档的高级文本提取。
- en: Finally, we looked at how Azure AI Search, with integrated vector embedding,
    plays a pivotal role in ensuring relevant, high-quality results for your AI-driven
    applications. By leveraging these tools, you’ll be in an excellent position to
    roll out sophisticated AI solutions that don’t just pass an exam but also make
    a genuine impact in the real world.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们探讨了 Azure AI Search 如何通过集成向量嵌入在确保 AI 驱动应用程序的相关性和高质量结果中发挥关键作用。通过利用这些工具，你将处于推出复杂的
    AI 解决方案的有利位置，这些解决方案不仅通过考试，而且在现实世界中产生真正的影响。
- en: For the hands-on learner, I encourage you to dive into the GitHub projects mentioned
    throughout this chapter. Try deploying them in your own Azure subscription, tweak
    the parameters, experiment with different data types, and share your findings
    with the community. If you can demonstrate mastery in these advanced topics, you’ll
    stand out as a formidable AI engineer—ready to tackle nearly any enterprise AI
    challenge.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 对于动手学习的你，我鼓励你深入本章中提到的 GitHub 项目。尝试在你的 Azure 订阅中部署它们，调整参数，尝试不同的数据类型，并将你的发现与社区分享。如果你能在这些高级主题上展示出精通，你将作为一个强大的
    AI 工程师脱颖而出——准备好应对几乎任何企业级 AI 挑战。
- en: In the next chapter, we’ll dive into exam preparation strategies and explore
    45 mock exam questions with detailed explanations.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将深入探讨考试准备策略，并探讨 45 个模拟考试问题及其详细解释。
