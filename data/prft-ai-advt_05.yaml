  zh: 第二部分
- en: Charting the Course
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 规划路线
- en: With the foundations and a good orientation in place, it’s time to chart your
    own course. In this part, you’ll learn how to take ownership of your AI roadmap,
    identify pain points and bottlenecks, and map them against AI’s capabilities.
    We’ll explore practical techniques for spotting opportunities, designing concrete
    use cases, and sequencing them into a structured AI roadmap. By the end of this
    part, you’ll be equipped to move from vague ambition to a prioritized plan of
    action.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在打好基础和明确方向之后，是时候规划你自己的路线了。在本部分，你将学习如何掌握你的AI路线图，识别痛点与瓶颈，并将它们与AI的能力相对应。我们将探讨发现机会、设计具体用例并将它们按顺序排列成结构化AI路线图的实用技巧。到本部分结束时，你将准备好从模糊的雄心壮志转变为优先行动计划的优先级。
