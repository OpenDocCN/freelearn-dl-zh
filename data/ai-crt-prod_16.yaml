- en: '12'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: Automation AI with Digital Assistants and Agents
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数字助手和代理的自动化人工智能
- en: Modern voice-driven digital assistants such as Siri and Google Assistant seemed
    like magic when they were first introduced, but the limits of their capabilities
    soon became clear. Though digital assistants are still remarkably useful to create
    appointments and reminders, to launch apps, and to dictate our messages, modern
    LLMs like ChatGPT can do a lot more than that—with voice, even. Why haven’t our
    digital assistants simply been replaced with LLMs?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当Siri和谷歌助手等现代语音驱动数字助手最初推出时，它们看起来像是魔法，但它们能力的局限性很快变得明显。尽管数字助手在创建约会和提醒、启动应用程序和口述信息方面仍然非常有用，但像ChatGPT这样的现代LLMs甚至可以做更多的事情——甚至包括语音。为什么我们的数字助手没有简单地被LLMs取代呢？
- en: The answer to this is complex and is a mix of privacy, reliability, and cost
    concerns. Regardless, the process has already begun. It seems inevitable that
    Google Assistant will eventually be completely replaced by Gemini, and that Siri
    will become smarter.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题的答案很复杂，是隐私、可靠性和成本担忧的混合体。无论如何，这个过程已经开始了。似乎不可避免的是，谷歌助手最终将被Gemini完全取代，而Siri将变得更聪明。
- en: The unreliability of today’s basic assistants is a key reason why they aren’t
    used more already, while privacy is a key flashpoint with LLMs. Cost is also a
    concern, and using general-purpose LLMs to answer every current request to digital
    assistants would need a significant boost in power.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的基本助手不可靠是它们没有被更广泛使用的关键原因，而隐私是LLMs的关键争议点。成本也是一个担忧，使用通用LLMs来回答数字助手的所有当前请求需要显著提升计算能力。
- en: Yet, even though the challenges are huge, so are the potential impacts. In this
    forward-looking chapter, we’ll look at how digital assistants are likely to evolve
    over the next few years, how creative professionals may find them useful, and
    why many previous attempts to integrate AI-powered tools into our daily lives
    have failed.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管挑战巨大，但潜在的影响也同样巨大。在本章前瞻性的内容中，我们将探讨数字助手在未来几年内可能的发展趋势，创意专业人士如何可能发现它们的有用之处，以及为什么许多之前尝试将人工智能工具整合到我们日常生活中都失败了。
- en: Modern operating systems are currently adapting to a future where LLMs have
    a more tightly integrated place in our computing lives, and the potential for
    automation is huge. While not every application you use today can be automated,
    either because they’re not set up for it or because the process is too cumbersome
    for most people to manage, this is set to change.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 现代操作系统目前正在适应一个未来，其中大型语言模型（LLMs）在我们的计算生活中有更紧密的整合位置，自动化潜力巨大。虽然今天你使用的每个应用程序都不一定能自动化，要么是因为它们没有为此做好准备，要么是因为过程对大多数人来说过于繁琐而难以管理，但这种情况即将改变。
- en: In this chapter, I’ll draw a distinction between *digital assistants*, which
    follow simple instructions, and *agents*, which perform a chain of tasks for you,
    sometimes including concrete actions. There’s some fuzziness in the middle—you
    might ask a digital assistant to perform agentic tasks—but it’s a good place to
    draw the line for now.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我将区分**数字助手**和**代理**，前者遵循简单的指令，后者为你执行一系列任务，有时包括具体行动。中间可能存在一些模糊性——你可能会要求数字助手执行代理任务，但就目前而言，这是一个很好的划分点。
- en: You’ve probably already interacted in some way with AI-powered agents, likely
    through an automated telephone system. Once only found at larger companies, today,
    it’s possible for individuals to create agents for their own use or perhaps to
    talk to clients on their behalf. Agents could help you with creative tasks such
    as marketing, perform and summarize research, provide someone to talk to, or act
    as a virtual call center.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经以某种方式与人工智能代理互动过了，很可能是通过自动电话系统。以前只在大公司中存在，如今，个人可以创建用于自己使用的代理，或者代表客户与他们交谈。代理可以帮助你完成创意任务，如市场营销，执行并总结研究，提供交谈对象，或充当虚拟呼叫中心。
- en: While today’s LLMs are happy to do research for you, agents perform more complex
    tasks such as planning your schedule and booking your holidays or buying your
    lunch and having it delivered. Some humans won’t ever trust an AI with their credit
    card details, but I’m sure many will, and the further humans are removed from
    decision-making, the greater the risks.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然今天的LLMs乐于为你进行研究，但代理执行更复杂的任务，如规划你的日程、预订假期或购买午餐并送货上门。有些人永远不会信任AI处理他们的信用卡信息，但我确信许多人会，而且人类与决策的距离越远，风险就越大。
- en: Agentic tools aren’t just useful to creative professionals, but they’re likely
    to be an important part of the public AI narrative and worth a look. Today, tools
    branded as “agents” are available from major AI providers. Also, building an LLM
    directly into a browser (as Atlas now builds ChatGPT into its browser) can bring
    additional agentic abilities, filling out forms or completing purchases while
    you watch.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 代理工具不仅对创意专业人士有用，而且它们很可能是公众AI叙事的重要组成部分，值得一看。今天，从主要的AI提供商那里可以获得标有“代理”的工具。此外，将LLM直接集成到浏览器中（就像Atlas现在将ChatGPT集成到其浏览器中一样）可以带来额外的代理能力，在你观看的同时填写表格或完成购买。
- en: Through much of this book, I’ve tried to keep a focus on practical, testable
    solutions, but as the agentic story is still being built, this chapter looks a
    little further into the future. Agents and our future digital assistants are both
    important, but parts of this story are still in beta.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书的大部分内容中，我试图关注实用、可测试的解决方案，但随着代理故事的构建仍在进行中，这一章节将目光投向了更远的未来。代理和我们的未来数字助理都很重要，但这个故事的部分内容仍在测试阶段。
- en: 'In this chapter, we’ll look at the following:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我们将探讨以下内容：
- en: Digital assistants, today and into the future
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字助理，今天和未来
- en: AI-powered wearables
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI驱动的可穿戴设备
- en: AI-powered browsers
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI驱动的浏览器
- en: 'Agents: doing complex tasks for you'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理：为你执行复杂任务
- en: It’s a multi-pronged story, across mobile, desktop, and voice interaction models.
    Let’s start with digital assistants.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个多角度的故事，涵盖了移动、桌面和语音交互模型。让我们从数字助理开始。
- en: Digital assistants, today and into the future
  id: totrans-18
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数字助理，今天和未来
- en: 'When you ask today’s digital assistants to do something for you, it’s typically
    a simple operation in a single application: setting a timer, taking a photo, or
    reminding you of a task when you get home. Voice is a transformational part of
    the package here, as it allows you to perform tasks on a screen that’s too small
    to be convenient, or while you’re otherwise engaged.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当你要求今天的数字助理为你做某事时，通常是在单个应用程序中执行的一个简单操作：设置定时器、拍照或在你回家时提醒你任务。语音是这一套件中的变革性部分，因为它允许你在屏幕太小不方便操作或你正忙于其他事情时执行任务。
- en: LLMs such as ChatGPT and Claude are smarter than Siri or Google Assistant, so
    why can’t they do everything that today’s digital assistants can? Firstly, because
    they don’t have access to all the same data, and secondly, because a new LLM-based
    system has to handle nearly everything that the current system can, or some users
    will refuse to use it.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 与Siri或谷歌助手相比，ChatGPT和Claude等LLM更智能，那么为什么它们不能做今天数字助理能做的所有事情呢？首先，因为它们无法访问所有相同的数据，其次，因为基于新LLM的系统必须处理当前系统几乎能处理的所有事情，否则一些用户将拒绝使用它。
- en: This “partial replacement problem” has played out already with some Google phones
    that have transitioned from Google Assistant to Gemini as the built-in voice assistant.
    If a quick, simple task (such as setting an alarm) that was once handled explicitly
    by Google Assistant is handled less well by Gemini, that’s a failure in the eyes
    of many. Replacing existing systems is hard, and replacing the digital assistants
    used by billions of users is very hard indeed.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这种“部分替代问题”已经在一些从谷歌助手过渡到Gemini作为内置语音助手的谷歌手机上显现出来。如果一个曾经由谷歌助手明确处理的简单任务（比如设置闹钟）在Gemini处理得不够好，这在许多人看来就是失败。替换现有系统很困难，替换数十亿用户使用的数字助理更是难上加难。
- en: Still, it seems inevitable that digital assistants will be upgraded to the point
    where they can do many things that agents do. It’s happening for Gemini, it’s
    expected for Siri, and even Microsoft’s Copilot now has an optional friendly blob-like
    face named Mico ([https://arstechnica.com/gadgets/2025/10/microsoft-makes-copilot-human-centered-with-a-90s-style-animated-assistant/](https://arstechnica.com/gadgets/2025/10/microsoft-makes-copilot-human-centered-with-a-90s-style-animated-assistant/)).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，似乎数字助理最终将被升级到能够执行代理所能做的许多事情的程度。Gemini正在这样做，Siri预计也会这样做，甚至微软的Copilot现在也有一个可选的友好、类似
    blob 的面部表情，名为Mico ([https://arstechnica.com/gadgets/2025/10/microsoft-makes-copilot-human-centered-with-a-90s-style-animated-assistant/](https://arstechnica.com/gadgets/2025/10/microsoft-makes-copilot-human-centered-with-a-90s-style-animated-assistant/))。
- en: 'This isn’t Microsoft’s first tilt at digital assistants. Here are a few past
    attempts:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是微软第一次尝试数字助理。以下是一些过去的尝试：
- en: The animated paperclip **Clippy** ([https://en.wikipedia.org/wiki/Office_Assistant](https://en.wikipedia.org/wiki/Office_Assistant))
    lived in Microsoft Word in the 1990s, famous for “*It looks like you’re writing
    a letter*.”
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在20世纪90年代的Microsoft Word中，有一个名为**Clippy**的动画回形针，因其“*看起来你正在写信*”而闻名。
- en: '**Microsoft Bob** ([https://en.wikipedia.org/wiki/Microsoft_Bob](https://en.wikipedia.org/wiki/Microsoft_Bob))
    was a short-lived attempt to provide a more friendly user interface to Windows
    3.1, introducing a cartoon dog called Rover and the Comic Sans font. Unsuccessful,
    the product was introduced in March 1995 but discontinued in August of the same
    year.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微软Bob** ([https://en.wikipedia.org/wiki/Microsoft_Bob](https://en.wikipedia.org/wiki/Microsoft_Bob))
    是一个短暂的尝试，旨在为Windows 3.1提供更友好的用户界面，引入了一只名为Rover的卡通狗和Comic Sans字体。这个产品在1995年3月推出，但在同年8月就停产了。'
- en: '**Cortana** ([https://en.wikipedia.org/wiki/Cortana_(virtual_assistant)](https://en.wikipedia.org/wiki/Cortana_(virtual_assistant)))
    was Microsoft’s most recent attempt, first demonstrated in 2014, but it was replaced
    by the AI-powered Copilot in 2023.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Cortana** ([https://en.wikipedia.org/wiki/Cortana_(virtual_assistant)](https://en.wikipedia.org/wiki/Cortana_(virtual_assistant)))
    是微软最新的尝试，首次在2014年展示，但它在2023年被AI驱动的Copilot所取代。'
- en: While traditional digital assistants have access to your local data, such as
    contacts and emails, cloud-based LLMs don’t have the same privileges. Each of
    us stores a great deal of personal data on our phones, and we don’t want that
    made public. In contrast, chats with LLMs (on free accounts at least) are often
    used to train those LLMs further.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然传统的数字助手可以访问你的本地数据，如联系人电子邮件，但基于云的LLM没有相同的权限。我们每个人都在手机上存储了大量的个人数据，我们不希望这些数据被公开。相比之下，与LLM的聊天（至少在免费账户中）通常被用来进一步训练这些LLM。
- en: In a world where most large tech companies (with the exception of Apple) make
    money selling your personal data to advertisers, many people are wary of trusting
    third parties with their calendars, files, and emails. They’re also right to be
    wary of data loss if the wrong files were to be deleted by a malfunctioning AI.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个大多数大型科技公司（苹果公司除外）通过向广告商出售你的个人数据来赚钱的世界里，许多人对于将他们的日历、文件和电子邮件托付给第三方持谨慎态度。他们也有理由担心，如果错误的文件被一个故障的AI删除，可能会导致数据丢失。
- en: Apple’s response to this has been to move slowly and carefully, but the features
    in Apple Intelligence were designed with privacy in mind. The simplest tasks are
    run on-device, while more complex tasks are run in Apple’s own Private Cloud Compute
    environment, to which Apple itself does not have access ([https://security.apple.com/blog/private-cloud-compute/](https://security.apple.com/blog/private-cloud-compute/)).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 苹果公司对此的反应是缓慢而谨慎，但苹果智能的功能设计时考虑到了隐私。最简单的任务在设备上运行，而更复杂的任务则在苹果自己的私有云计算环境中运行，苹果公司本身无法访问该环境
    ([https://security.apple.com/blog/private-cloud-compute/](https://security.apple.com/blog/private-cloud-compute/))。
- en: 'Even if an LLM provides all the features of today’s digital assistants, and
    the privacy issues are overcome, there’s a third problem: how to talk to all your
    apps. Siri or Google Assistant can handle basic tasks that tie into common operating
    system features, such as email or messaging, but third-party apps must explicitly
    tell the system what they can do and how those features can be used. An LLM needs
    not just this knowledge, but an easy way to tell those apps to do things.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 即使LLM提供了今天数字助手的所有功能，并且隐私问题得到了解决，还有一个第三问题：如何与所有你的应用交流。Siri或Google Assistant可以处理与常见操作系统功能相关的基本任务，如电子邮件或消息，但第三方应用必须明确告诉系统它们可以做什么以及如何使用这些功能。LLM不仅需要这种知识，还需要一种简单的方式来告诉这些应用执行操作。
- en: Today, this process is somewhat manual and involves building custom automations.
    For example, if you want to get more out of Siri, you could create a *shortcut*
    (in the system-wide automation engine called **Shortcuts**) that performs actions
    in one or more apps, then trigger it with your voice. Alternatively, on desktop
    platforms, you might rely on scripting support, or even on simulating clicks or
    button presses. Not all apps support shortcuts or scripting, and simulating button
    presses is error-prone and unreliable.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，这个过程在一定程度上是手动的，需要构建自定义自动化。例如，如果你想从Siri那里获得更多功能，你可以创建一个*快捷方式*（在系统级自动化引擎**Shortcuts**中），它可以在一个或多个应用中执行操作，然后通过你的声音来触发它。或者，在桌面平台上，你可能依赖于脚本支持，甚至模拟点击或按钮按压。并非所有应用都支持快捷方式或脚本，模拟按钮按压是容易出错且不可靠的。
- en: In short, most automation systems today are rigid and brittle; they break easily.
    A universal way for an LLM to understand and control any app could mean that an
    AI could (finally) start doing more of our work for us. Since 2016, apps on Apple
    platforms have been able to declare *App Intents*, which describe the functions
    they can perform, the data they expect as input, and what they’ll provide as output.
    These aren’t human-facing; they’re to help apps talk to one another.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，当今大多数自动化系统都是刚性和脆弱的；它们容易崩溃。一种通用的方法，让大型语言模型（LLM）理解和控制任何应用程序，可能意味着人工智能（AI）最终可以开始为我们做更多的工作。自2016年以来，苹果平台上的应用程序已经能够声明*App
    Intents*，这些声明描述了它们可以执行的功能、它们期望作为输入的数据以及它们将提供的输出。这些不是面向人类的；它们是为了帮助应用程序相互交流。
- en: Apple has also integrated *foundation models* (basic LLMs) into the system-wide
    automation system, Shortcuts. In the latest operating systems, Apple Intelligence
    lets you generate output from an on-device model, a private model on Apple’s servers,
    or even ChatGPT, and then do something with that output. While many LLM outputs
    are plain English, text formats such as JSON enable flexible inter-app communication
    strategies.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 苹果还将*基础模型*（基本的LLM）集成到系统级自动化系统Shortcuts中。在最新的操作系统中，苹果智能允许你从设备上的模型、苹果服务器上的私有模型，甚至是ChatGPT生成输出，然后对输出进行操作。虽然许多LLM的输出是纯英文，但如JSON这样的文本格式允许灵活的跨应用程序通信策略。
- en: 'Here are some examples of uses you could put this to: [https://appleinsider.com/inside/ios-26/tips/how-to-use-apple-intelligence-in-shortcuts-to-save-time-every-day?utm_medium=social&utm_source=threads](https://appleinsider.com/inside/ios-26/tips/how-to-use-apple-intelligence-in-shortcuts-to-save-time-every-day?utm_medium=social&utm_source=threads).
    Foundation models are a useful bridge between LLMs and today’s automation solutions,
    but they don’t necessarily open the floodgates to full system control.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可以使用的例子：[https://appleinsider.com/inside/ios-26/tips/how-to-use-apple-intelligence-in-shortcuts-to-save-time-every-day?utm_medium=social&utm_source=threads](https://appleinsider.com/inside/ios-26/tips/how-to-use-apple-intelligence-in-shortcuts-to-save-time-every-day?utm_medium=social&utm_source=threads)。基础模型是LLM和今天的自动化解决方案之间有用的桥梁，但它们并不一定打开通往全面系统控制的闸门。
- en: Some upcoming systems might be more comprehensive. Let’s take a quick tour through
    some ways in which existing computer systems could be controlled by AI tools.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一些即将推出的系统可能更加全面。让我们快速浏览一下现有计算机系统可能被AI工具控制的一些方式。
- en: 'MCP: a cross-platform future automation system'
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP：跨平台未来自动化系统
- en: If digital assistants are going to take on more agentic properties, LLMs will
    need to be able to interact more directly with apps, and that’s where Anthropic’s
    **Model Context Protocol** (**MCP**) ([https://modelcontextprotocol.io/docs/getting-started/intro](https://modelcontextprotocol.io/docs/getting-started/intro))
    comes in. While *App Intents* and *foundation models* are Apple-only, MCP is a
    cross-platform solution that connects most LLMs to permitted data sources and
    apps, providing a new, secure connective layer.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数字助手将要承担更多的代理属性，LLM将需要能够更直接地与应用程序交互，这就是Anthropic的**模型上下文协议（MCP**）([https://modelcontextprotocol.io/docs/getting-started/intro](https://modelcontextprotocol.io/docs/getting-started/intro))发挥作用的地方。虽然*App
    Intents*和*基础模型*仅限于苹果，但MCP是一个跨平台解决方案，它将大多数LLM连接到允许的数据源和应用程序，提供了一个新的、安全的连接层。
- en: In theory, if an operating system enables support for MCP, and the apps on that
    system support MCP, an LLM could control your apps for you, performing many more
    tasks than today’s digital assistants or automation techniques can. Indeed, this
    gets very much into the territory of agents, and that’s probably where we’re heading
    eventually, but this level of control would also allow LLMs to perform a wider
    variety of simple tasks directly for you.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上，如果一个操作系统支持MCP，并且该系统上的应用程序支持MCP，那么LLM可以为你控制应用程序，执行比今天的数字助手或自动化技术更多的任务。确实，这非常接近代理的领域，而且这可能是我们最终要走向的方向，但这种控制水平也将允许LLM为你直接执行更广泛的各种简单任务。
- en: How far away is this? We can’t be sure, but initial MCP support is expected
    to arrive in macOS and iOS soon ([https://appleinsider.com/articles/25/09/22/ios-26-could-get-a-major-ai-boost-with-the-model-context-protocol](https://appleinsider.com/articles/25/09/22/ios-26-could-get-a-major-ai-boost-with-the-model-context-protocol))
    and it’s coming to Windows, too ([https://developer.microsoft.com/en-us/windows/agentic/](https://developer.microsoft.com/en-us/windows/agentic/)).
    Details are yet to be finalized, but there’s movement behind the scenes.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这有多远？我们无法确定，但初步的MCP支持预计很快就会出现在macOS和iOS上（[https://appleinsider.com/articles/25/09/22/ios-26-could-get-a-major-ai-boost-with-the-model-context-protocol](https://appleinsider.com/articles/25/09/22/ios-26-could-get-a-major-ai-boost-with-the-model-context-protocol)），它也将来到Windows（[https://developer.microsoft.com/en-us/windows/agentic/](https://developer.microsoft.com/en-us/windows/agentic/)）。细节尚未最终确定，但幕后有进展。
- en: Interestingly, an unreleased Mac-based AI-powered automation tool called **Sky**
    was recently acquired by OpenAI ([https://openai.com/index/openai-acquires-software-applications-incorporated/](https://openai.com/index/openai-acquires-software-applications-incorporated/)),
    so we can expect further progress in this area.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，一个名为**Sky**的基于Mac的AI自动化工具（[https://openai.com/index/openai-acquires-software-applications-incorporated/](https://openai.com/index/openai-acquires-software-applications-incorporated/)）最近被OpenAI收购，因此我们可以期待在这个领域取得进一步的进展。
- en: Since it’s going to take some time before all our apps, operating systems, and
    LLMs are MCP-ready, an intermediate step could be for AI tools to drive our computers
    for us, using standard human user interfaces. That work is happening, but if an
    AI can understand how our software works, could we ask it to look at our screens
    and teach us how to use new apps? Surely, if a computer knows how our software
    works, this should be easy… right?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的所有应用、操作系统和LLM都将在MCP准备好之前需要一些时间，一个中间步骤可能是让AI工具为我们驱动电脑，使用标准的人类用户界面。这项工作正在进行中，但如果AI能理解我们的软件是如何工作的，我们能否要求它查看我们的屏幕并教我们如何使用新应用？当然，如果电脑知道我们的软件是如何工作的，这应该很容易……对吧？
- en: AI assistance with desktop apps
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 桌面应用的AI辅助
- en: '**Gemini Live** ([https://gemini.google/overview/gemini-live/](https://gemini.google/overview/gemini-live/))
    can watch you use your computer, then answer your questions informed by what it
    sees you doing. Other systems can perform this trick too, but Gemini Live is publicly
    available and easy to access—try it if you like.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**Gemini Live** ([https://gemini.google/overview/gemini-live/](https://gemini.google/overview/gemini-live/))
    可以观察你使用电脑的情况，然后根据你所做的事情给出有针对性的回答。其他系统也能做到这一点，但Gemini Live是公开可用的，并且易于访问——如果你喜欢，可以试试看。'
- en: While this sounds great, it’s far from perfect and quickly becomes frustrating.
    Essentially, the AI system has the understanding of someone who’s read a manual
    about a program but is not an expert themselves.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这听起来很棒，但它远非完美，很快就会变得令人沮丧。本质上，AI系统对程序手册的理解程度相当于一个阅读过手册但不是专家的人。
- en: I tested this by asking Gemini to watch me use Adobe InDesign, omitting important
    details from my questions, and seeing whether it could still guide me to the best
    answer available. I’ve taught design and video apps to students many times, in-person
    and over a screen share and video call, so I know what to expect and what the
    answers should be, but a novice won’t.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过让Gemini观察我使用Adobe InDesign，省略问题中的重要细节，并观察它是否能引导我找到最佳答案来测试这一点。我多次亲自或通过屏幕共享和视频通话教授学生设计和视频应用，所以我清楚预期和答案应该是什么，但新手可能不会。
- en: '![Figure 12.1 – Here’s the opening splash screen in InDesign, with my basic
    question and a response](img/B34247_12_1.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图12.1 – 这是InDesign中的启动屏幕，包含我的基本问题和回答](img/B34247_12_1.png)'
- en: Figure 12.1 – Here’s the opening splash screen in InDesign, with my basic question
    and a response
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1 – 这是InDesign中的启动屏幕，包含我的基本问题和回答
- en: When I dropped a hint about being in Australia, Gemini did correctly suggest
    A4 as a common page size. This is just the kind of thing I was hoping for, but
    I’d have preferred Gemini to recognize where I was and realize this on its own.
    More troubling, even though I’d said I was making a flyer, it didn’t think to
    mention including a 3-mm bleed until I explicitly said I was printing it 2,000
    times.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当我暗示自己身处澳大利亚时，Gemini正确地建议了A4作为常见的页面尺寸。这正是我所期望的，但我更希望Gemini能识别出我的位置并自行意识到这一点。更令人不安的是，尽管我说我在制作传单，但它直到我明确表示要打印2000次时，才想到要提到包括3毫米出血。
- en: '![Figure 12.2 – Bleed is important for most professionally printed documents,
    and should have been mentioned without my prompting](img/B34247_12_2.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图12.2 – 装订出血对于大多数专业印刷文档来说很重要，而且应该在我提醒之前就提到](img/B34247_12_2.png)'
- en: Figure 12.2 – Bleed is important for most professionally printed documents,
    and should have been mentioned without my prompting
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2 – 装订出血对于大多数专业印刷文档来说很重要，而且应该在我提醒之前就提到
- en: Judging from how some of the advice was expressed, it felt like I was being
    guided by someone who had just learned the app rather than someone who knows the
    app well. A novice user could easily follow these instructions and be led into
    disaster—the AI didn’t really understand best practice and simply answered the
    question asked rather than providing the information really needed.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 从一些建议的表达方式来看，感觉我就像是被一个刚刚学会使用这个应用的人引导，而不是一个对应用非常熟悉的人。一个新手用户很容易遵循这些指示，却可能走向灾难——AI并没有真正理解最佳实践，只是简单地回答了提出的问题，而不是提供真正需要的信息。
- en: In a similar experiment run by Mark Spencer of Ripple Training ([https://youtu.be/dCj7-BgjlOI?si=0VJDPYEvW8j29hIU](https://youtu.be/dCj7-BgjlOI?si=0VJDPYEvW8j29hIU)),
    he tried to get an AI to teach him Final Cut Pro, and I think it’s fair to say
    his experience was worse than mine.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在Ripple Training的马克·斯宾塞（Mark Spencer）进行的一个类似实验中（[https://youtu.be/dCj7-BgjlOI?si=0VJDPYEvW8j29hIU](https://youtu.be/dCj7-BgjlOI?si=0VJDPYEvW8j29hIU)），他试图让AI教他使用Final
    Cut Pro，我认为可以说他的体验比我更糟糕。
- en: While it got some things right, it got plenty wrong, referring to non-existent
    buttons and shortcut keys. Mark’s an expert and knew the answers to all the questions
    he asked, but a novice would have tried, failed, and given up.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然它做了一些正确的事情，但也有很多错误，提到了不存在的按钮和快捷键。马克是一位专家，他知道他问的所有问题的答案，但一个新手可能会尝试、失败，然后放弃。
- en: When learning, reading a manual isn’t enough; you need *informed experience*.
    There’s a huge gap between a reference manual and a teaching manual, and humans
    need to be taught in a more organic way. Software companies will often teach the
    “official” way to perform a feature, but trainers who know that a feature doesn’t
    work properly are smart enough to tell you so.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习过程中，阅读手册是不够的；你需要*有见地的经验*。参考手册和教学手册之间存在巨大的差距，人类需要以更有机的方式进行教学。软件公司通常会教授执行功能的“官方”方式，但知道某个功能不正常的有经验的培训师会足够聪明地告诉你这一点。
- en: Today, I can’t recommend asking a computer to teach you how to use software,
    and this is *easy mode* compared to asking a computer to do something for us.
    How can I expect a computer to do tasks *for me* when it can’t even tell me how
    to do it reliably? To do it for me, an AI needs to get every tiny step correct
    along the way, and a basic mistake early can cause huge problems later on.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我无法推荐让计算机教你如何使用软件，这与*简单模式*相比。当计算机连如何可靠地告诉我如何做都做不到时，我怎么能期望它为我完成任务呢？为了为我完成任务，AI需要确保每一步都正确无误，而早期的基本错误可能会导致后续出现巨大问题。
- en: Continuing unreliability is a huge reason why AI is not yet (and possibly not
    ever) ready to take over from humans at all these tasks. Yes, MCP would make this
    faster and easier, but if that speed doesn’t also come with reliability, we won’t
    be able to trust an LLM with all our data. Let’s step into statistics to understand
    why.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 持续的不可靠性是AI尚未（可能永远都不会）准备好取代人类完成所有这些任务的一个巨大原因。是的，MCP可以使这个过程更快、更简单，但如果这种速度没有伴随可靠性，我们就无法信任LLM处理我们所有的数据。让我们进入统计学来了解原因。
- en: 'Reliability: how many 9s do you need?'
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可靠性：你需要多少个9？
- en: A term often used as a high standard for the availability of a computer system
    is known as **five 9s**, meaning that it’s available 99.999% of the time, or just
    over 5 minutes a year of downtime. Let’s apply that metric to the reliability
    of an AI system instead.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常用来衡量计算机系统可用性高标准的术语被称为**五个9**，意味着它有99.999%的时间可用，或者说一年中只有超过5分钟的停机时间。让我们将这个指标应用到AI系统的可靠性上。
- en: If a system makes 1 mistake in 100 decisions, it’s 99% reliable—two 9s. A system
    that’s wrong 1 time in 100,000 decisions would be 99.999% reliable—five 9s. So,
    how reliable does a system need to be when giving advice?
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个系统在100次决策中犯了一个错误，那么它的可靠性是99%——两个9。一个在100,000次决策中犯一次错误的系统将是99.999%可靠的——五个9。那么，在提供建议时，系统需要有多高的可靠性？
- en: When taking advice, I simply expect that advice to be *mostly* reliable, and
    I probably don’t even need to get to two 9s (99%) in terms of reliability. But
    screen-watching AIs are nowhere near two 9s yet; if you compare a screen-watching
    system’s claimed knowledge to what an expert would tell you, they’re probably
    around 80% correct, and that’s just not enough. Bluntly, if 20% of what a human
    told me was wrong, I wouldn’t trust them, and I’d stop listening to them entirely.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在接受建议时，我仅仅期望这些建议*大部分*是可靠的，我可能甚至不需要达到两个9（99%）的可靠性。但是，屏幕监控的AI还远远没有达到两个9；如果你比较屏幕监控系统的声称知识与专家告诉你的内容，它们可能只有大约80%是正确的，这远远不够。坦白说，如果一个人告诉我的20%是错误的，我就不会信任他们，并且我会完全停止听他们的话。
- en: But advice has a lower threshold for success than performing tasks, and LLMs
    are known to hallucinate, to panic when pushed, to ignore directions. When you
    ask someone to do your job for you, they’ve got to do it to your standard.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，提供建议的成功门槛比执行任务要低，而大型语言模型（LLMs）是出了名的会幻想、在压力下恐慌、忽略指令。当你要求某人替你完成工作时，他们必须按照你的标准来完成。
- en: So, if you’re passing a small office job to a junior human colleague, you may
    be able to tolerate a few mistakes. If you can check the results yourself, then
    an imperfect result can be corrected, either on your own or by asking your colleague
    to fix the problem.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你将一个小型办公室的工作交给初级同事，你可能能够容忍一些错误。如果你可以自己检查结果，那么不完美的结果可以被纠正，无论是你自己还是通过要求同事解决问题。
- en: The same is true for a job you pass onto an AI but remember that each sub-task
    carries a risk of failure. The less confidence you have, the more frequently you’ll
    need to check on progress.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这同样适用于你转交给AI的工作，但请记住，每个子任务都存在失败的风险。你的信心越低，你就需要越频繁地检查进度。
- en: A 20% failure rate in someone’s work output would be a huge problem, and right
    now, AI models trained to operate regular computers often sit below 80% on their
    benchmarks. Simply, we’re not there yet, and according to Sayash Kapoor, we’ll
    need new techniques to get there ([https://youtu.be/d5EltXhbcfA?si=hoajlz1CVJg351bp](https://youtu.be/d5EltXhbcfA?si=hoajlz1CVJg351bp)).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果某人的工作产出失败率达到了20%，那将是一个巨大的问题，而现在，训练用于操作常规计算机的AI模型在基准测试中通常低于80%。简单来说，我们还没有达到那个水平，根据Sayash
    Kapoor的说法，我们需要新的技术才能达到([https://youtu.be/d5EltXhbcfA?si=hoajlz1CVJg351bp](https://youtu.be/d5EltXhbcfA?si=hoajlz1CVJg351bp))。
- en: '![Figure 12.3 – Gemini 2.5 Computer Use’s performance on common benchmarks,
    from https://blog.google/technology/google-deepmind/gemini-computer-use-model/](img/B34247_12_3.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图12.3 – Gemini 2.5计算机使用在常见基准上的性能，来源：https://blog.google/technology/google-deepmind/gemini-computer-use-model/](img/B34247_12_3.png)'
- en: Figure 12.3 – Gemini 2.5 Computer Use’s performance on common benchmarks, from
    https://blog.google/technology/google-deepmind/gemini-computer-use-model/
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3 – Gemini 2.5计算机使用在常见基准上的性能，来源：https://blog.google/technology/google-deepmind/gemini-computer-use-model/
- en: As tasks get more critical and as there’s less time to verify that output, reliability
    becomes even more important. Reliability is already one reason why people stop
    using digital assistants; they either don’t hear correctly, or they can’t perform
    the actions requested, or they simply fail to do it.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 随着任务的日益关键，以及验证输出所需的时间减少，可靠性变得更加重要。可靠性已经是人们停止使用数字助手的一个原因；他们要么没有正确听到，要么无法执行请求的动作，或者他们根本就没有完成。
- en: In some AI-assisted situations like a self-driving car, there’s no room for
    error. On the road, there’s often very little time to react to a steering mistake
    a car has made, and a flaw in this software can be quickly fatal.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在一些人工智能辅助的场景中，例如自动驾驶汽车，容错空间几乎为零。在道路上，通常几乎没有时间来反应汽车所犯的转向错误，而这个软件的缺陷可能很快就会导致致命。
- en: 'Uncertain reliability is a fundamental issue facing self-driving software being
    added to regular cars: it’s very difficult to transition from a system that’s
    “pretty good” to “perfect.” How can you safely transition from not trusting the
    car to completely trusting the car? At what point can you relax?'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在常规汽车中添加自动驾驶软件所面临的不确定性可靠性是一个基本问题：从“相当不错”的系统过渡到“完美”的系统非常困难。你如何安全地从不相信汽车过渡到完全信任汽车？在什么点上你可以放松？
- en: If the software is merely “assistive,” it isn’t expected to be perfect—let’s
    say it’s 99% there. A human driver is intended to remain attentive and ready to
    take control should the software make a mistake—and I do regularly have to take
    control of my own car when it suddenly slows down for shadows. However, as the
    software gets better, humans will inevitably grow to trust it. At 99.999% correct
    behavior, with fewer interventions needed, a human is likely to relax and stop
    paying attention. When, finally, there is a problem, something the car should
    avoid but doesn’t, a human can’t react in time.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果软件仅仅是“辅助”的，那么人们并不期望它完美——比如说它是99%。人类驾驶员的目的是保持警觉，并在软件出错时准备接管控制——我确实经常在我自己的车突然减速避让阴影时接管控制。然而，随着软件的改进，人类不可避免地会越来越信任它。当软件的行为正确率达到99.999%，需要的干预更少时，人类可能会放松并停止关注。当最终出现问题时，比如汽车应该避免但未能避免的情况，人类可能无法及时反应。
- en: To be fair, humans aren’t perfect either, and in the grand scheme of things,
    the average future AI driver may end up being safer than the average human driver.
    The difference is that when an AI makes a mistake, it’s likely to be one that
    a human would not, such as driving into the side of an overturned truck. The AI
    had never seen it, or its sensors couldn’t detect it properly, but a human simply
    wouldn’t make the same mistake.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 公平地说，人类也不是完美的，从大局来看，平均未来的AI驾驶员可能比平均人类驾驶员更安全。区别在于，当AI犯错时，它可能犯的是人类不太可能犯的错误，比如撞到翻倒的卡车侧面。AI从未见过这种情况，或者其传感器无法正确检测到它，但人类根本不会犯同样的错误。
- en: Digital assistants face far lower stakes, but a similar problem of trust, and
    the more steps there are in a process, the higher the chances that one of them
    fails. Today, if Siri fails to do something, you’ll sigh, fire up the right app,
    and do it yourself. But what if a “smarter” system confidently says it’s done
    it—how do you know?
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 数字助手面临的风险较低，但存在类似的问题，即信任问题，而且一个过程中的步骤越多，其中一个步骤失败的可能性就越高。今天，如果Siri无法完成某项任务，你会叹气，打开正确的应用，然后自己完成。但如果你有一个“更聪明”的系统自信地说它已经完成了，你怎么知道呢？
- en: How can you be sure they’re going to do a job correctly and completely when
    they’ve failed so often in the past? If ChatGPT couldn’t tell you how many “r”s
    there are in “strawberry” last year, how can you transition to asking a future
    version of ChatGPT to book a holiday with your credit card? This might be a task
    that works most of the time, but one time out of a thousand, it buys the wrong
    plane ticket or sends you to a city’s alternate (but less convenient) airport.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当他们过去经常失败时，你怎么能确保他们会正确且完整地完成任务？如果ChatGPT去年无法告诉你“strawberry”中有多少个“r”，你怎么能过渡到要求未来的ChatGPT用你的信用卡预订假期？这可能是一个大多数时候都能正常工作的任务，但每千次中可能有一次会买错机票，或者把你送到一个城市的替代（但不太方便）机场。
- en: As more of us trust more of our data to more powerful systems, we’ll hear of
    more disasters. Today, you can hook your credit card into an LLM and ask it to
    order and deliver a product to you—say, a bottle of water. And though that might
    work most of the time, given the stakes, there will be scammers ready to take
    advantage of newly empowered bots. The more levels of automation we put between
    ourselves and the products and services we purchase, the higher the chance of
    a scam.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们越来越多地将我们的数据托付给更强大的系统，我们将听到更多灾难的消息。今天，你可以将你的信用卡连接到LLM，并要求它为你订购并送货上门——比如一瓶水。尽管这可能大多数时候都能正常工作，但考虑到风险，总会有骗子准备利用新授权的机器人。我们在自己与购买的产品和服务之间设置的自动化层级越多，诈骗的风险就越高。
- en: For now, I think it’s likely that firm barriers will remain between digital
    assistants and all the apps and data on our computers. We’ll be a little more
    explicit about the data we provide to AI-powered systems, and digital assistants
    will gradually become more capable.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 目前来看，我认为数字助手和所有电脑上的应用程序和数据之间可能仍然存在坚固的障碍。我们将对提供给AI驱动系统的数据进行更明确的说明，数字助手将逐渐变得更加有能力。
- en: While I expect digital assistants from the major players in phones (Apple and
    Google) to continue to dominate here, there have been several attempts to sidestep
    these behemoths. Is it likely that an AI-powered hardware device could come from
    another player? Let’s see.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我预计来自手机主要玩家（苹果和谷歌）的数字助手将继续在这里占据主导地位，但已经有人尝试绕过这些巨头。一个由AI驱动的硬件设备可能来自其他玩家吗？让我们看看。
- en: AI-powered wearables
  id: totrans-77
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI驱动的可穿戴设备
- en: One area of exploration in the AI field has been a new kind of device that’s
    not a phone, a watch, a tablet, or a personal computer. The **Humane AI Pin**
    was an unsuccessful attempt to create an AI-powered wearable device that listened
    to your voice and performed tasks for you. While the agentic potential of this
    device was part of the appeal, I think it’s fair to say that appeal wasn’t realized,
    and the AI Pin was discontinued within a year. The **Rabbit R1** was another unsuccessful
    attempt to break into this market, and though this wasn’t a wearable, it made
    similar claims of being able to perform more complex tasks on your behalf.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI领域的一个探索领域是创建一种新型的设备，它既不是手机，也不是手表、平板电脑或个人电脑。**Humane AI Pin**是创建一个能够听你说话并为你执行任务的AI驱动可穿戴设备的一次失败尝试。虽然这个设备的代理潜力是吸引人的部分，但我认为可以说这种吸引力并没有实现，AI
    Pin在一年内就被停止生产了。**Rabbit R1**是另一个进入这个市场的失败尝试，尽管这并不是一个可穿戴设备，但它提出了能够代表你执行更复杂任务的主张。
- en: In the real world, these devices haven’t been able to integrate well enough
    into our existing device ecosystems to crack the market. Most of our devices have
    screens, and as this is a far more efficient way to transmit information than
    voice alone, it seems inevitable that screen-less devices will struggle to handle
    tasks that require complex human input.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，这些设备还没有足够地融入我们现有的设备生态系统，以至于无法打开市场。我们的大多数设备都有屏幕，而且这比仅仅使用声音传输信息要高效得多，因此，无屏幕设备在处理需要复杂人类输入的任务时可能会遇到困难。
- en: Some devices available today set their sights a little lower, focusing on transcription.
    They aim to listen to everything you hear, transcribe it, then let you interact
    with it, summarizing meetings and helping you find forgotten details of conversations.
    In practice, these screenless wearables (such as the **Limitless AI Pendant**)
    don’t seem to have caught on yet.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 一些今天可用的设备将目标定得稍低一些，专注于转录。它们的目标是监听你听到的所有内容，将其转录下来，然后让你与之互动，总结会议并帮助你找到对话中遗忘的细节。实际上，这些无屏幕的可穿戴设备（如**Limitless
    AI Pendant**）似乎还没有流行起来。
- en: It’s hard to fit additional wearable devices into our lives. If you already
    have a digital watch and a phone, you’d probably prefer to use one of those devices
    to tackle transcription than add a third device. While an AI service built around
    transcription only works when you activate it, this can be a plus, as regular
    humans may not be keen to be constantly recorded.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 将额外的可穿戴设备融入我们的生活是件困难的事情。如果你已经拥有一块数字手表和一部手机，你可能会更倾向于使用这些设备中的任何一个来处理转录任务，而不是添加第三个设备。虽然围绕转录构建的AI服务只有在激活时才工作，但这可能是一个优点，因为普通人可能不愿意被持续记录。
- en: 'To try this yourself, you can use one of the transcription apps mentioned in
    an earlier chapter, such as MacWhisper, but a few services that can offer smart
    AI analysis of transcripts include the following:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 要自己尝试，你可以使用前面章节中提到的转录应用程序之一，例如MacWhisper，但以下是一些可以提供智能AI分析转录的服务：
- en: Granola.ai ([https://granola.ai](https://granola.ai))
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Granola.ai ([https://granola.ai](https://granola.ai))
- en: Otter.ai ([https://otter.ai](https://otter.ai))
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Otter.ai ([https://otter.ai](https://otter.ai))
- en: ChatGPT (using *Record* mode in the macOS app)
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT（在macOS应用中使用*Record*模式）
- en: Returning to wearables, smart glasses seem like the next commonly worn item
    to be tech-ed up, though the video recording aspects of today’s more limited devices
    have caused issues, too. Can you trust a massage therapist (who needs her smart
    glasses to see) to not be recording her sessions? While Meta’s **Ray-Ban** **Smart
    Glasses** include a flashing LED to indicate that the camera is in use, this LED
    can be blocked, creating a new privacy problem.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 回到可穿戴设备，智能眼镜似乎将成为下一个被技术升级的常见穿戴物品，尽管今天这些设备有限的视频录制功能也引发了一些问题。你能信任一个按摩师（需要她的智能眼镜来观察）不会记录她的疗程吗？虽然Meta的**雷朋****智能眼镜**包括一个闪烁的LED灯来指示相机正在使用中，但这个LED灯可以被遮挡，从而产生一个新的隐私问题。
- en: In the future, when glasses become much more capable, will a user be able to
    wear smart glasses while watching a movie in a theater? Back in 2014, the **Motion
    Picture Association of America** (**MPAA**) banned wearable recording devices
    (including Google Glass at the time) from movie theaters ([https://www.androidcentral.com/piracy-concerns-spur-google-glass-wearables-ban-movie-theaters](https://www.androidcentral.com/piracy-concerns-spur-google-glass-wearables-ban-movie-theaters)),
    but can that stand when people need those same devices to see at all?
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来，当眼镜的功能变得更加强大时，用户能否在电影院看电影时佩戴智能眼镜？回到2014年，**美国电影协会**（**MPAA**）禁止在电影院使用可穿戴记录设备（包括当时的谷歌眼镜）（[https://www.androidcentral.com/piracy-concerns-spur-google-glass-wearables-ban-movie-theaters](https://www.androidcentral.com/piracy-concerns-spur-google-glass-wearables-ban-movie-theaters)），但当人们需要这些相同的设备来观看时，这能站得住脚吗？
- en: Time will tell whether these devices replace phones for many or most people,
    but I suspect that we’ll have a mix of devices in use for some time yet. Many
    in tech promote a narrative of “killer” devices that completely destroy others,
    but outside the near-total annihilation of traditional dumb phones by the iPhone
    (and subsequent clones), replacing old devices takes time.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 时间会证明这些设备是否会取代许多人或大多数人的手机，但我怀疑我们还会在一段时间内使用多种设备。许多科技界人士推广“杀手级”设备的叙事，这些设备会完全摧毁其他设备，但除了iPhone（及其后续克隆产品）几乎完全摧毁了传统哑手机之外，取代旧设备需要时间。
- en: For a user to replace one device with another, a new device needs to do everything
    their current device does *well enough*. Watches didn’t replace phones; they augmented
    them. Because we share information by showing each other our phones, I don’t see
    smart glasses completely replacing phones for a while yet.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 对于用户用一种设备取代另一种设备，新设备需要足够好地完成他们当前设备所做的一切。手表没有取代手机；它们只是增加了手机的功能。因为我们通过展示彼此的手机来共享信息，我不认为智能眼镜在一段时间内会完全取代手机。
- en: The AI-powered wearable market is set for a shakeup with an expected new OpenAI
    device designed by Jony Ive, well-known for his work at Apple. But unless this
    new device does something amazing, much better than existing options and without
    omitting any important features, it’ll augment rather than replace.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: AI驱动的可穿戴市场预计将因Jony Ive设计的新OpenAI设备而动荡，Jony Ive因其在苹果公司的工作而闻名。但除非这款新设备能做出一些惊人的事情，比现有选项更好，并且不遗漏任何重要功能，否则它将只会增加而不是取代。
- en: After all, a key reason for the Humane AI Pin’s failure was the lack of a screen
    and the lack of integration. While the integrated green laser projector was innovative,
    the information density and image quality were far too low to compete with a phone.
    Photo quality was similarly lacking and wasn’t well integrated.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，Humane AI Pin失败的关键原因是没有屏幕和缺乏整合。虽然集成的绿色激光投影仪是创新的，但信息密度和图像质量远远低于手机，无法与之竞争。照片质量同样不足，并且没有很好地整合。
- en: Still, the new OpenAI device could succeed where the AI Pin failed, simply because
    there’s more money behind it, and ChatGPT is widely known and used. Time will
    tell.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，新的OpenAI设备可能会在AI Pin失败的地方取得成功，仅仅是因为它背后有更多的资金，而且ChatGPT广为人知且被广泛使用。时间会证明一切。
- en: AI-powered browsers
  id: totrans-93
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI驱动的浏览器
- en: The World Wide Web has seen a massive influence from AI recently. Web publishers
    have seen marked drops in traffic as Google’s AI summaries mean that fewer visitors
    click through to original sources. It seems that AI’s influence will grow further
    due to a confluence of factors.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网最近受到了AI的巨大影响。由于谷歌的AI摘要意味着更少的访客点击到原始来源，网络出版商的流量明显下降。似乎由于多种因素的结合，AI的影响将进一步扩大。
- en: 'First, Google itself is de-emphasizing search results almost completely with
    its new **AI Mode**. As of late October 2025, any Google search I make now has
    the option of AI Mode, which essentially sends the phrase to Gemini. I tried this:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，谷歌本身几乎完全淡化了其新**AI模式**的搜索结果。截至2025年10月底，我现在进行的任何谷歌搜索都有AI模式的选择，这本质上是将短语发送到Gemini。我试了试：
- en: '[PRE0]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Before we get into the response, the main issue is that it’s not a well-crafted
    question. If a student asked me this, I’d ask more questions to figure out their
    problem(s) before offering a solution. Google’s response, as you may have expected,
    gives fairly generic advice that’s a little uneven, and sometimes dated.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们讨论回应之前，主要问题是它不是一个精心制作的问题。如果学生问我这个问题，我会问更多问题来了解他们的问题（们），然后再提供解决方案。正如你所预期的，谷歌的回应给出了相当通用的建议，有些地方不太均匀，有时还过时。
- en: '![Figure 12.4 – Google’s AI Mode gives an imperfect response to an imperfect
    question](img/B34247_12_4.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图12.4 – 谷歌的AI模式对一个不完美的提问给出了不完美的回答](img/B34247_12_4.png)'
- en: Figure 12.4 – Google’s AI Mode gives an imperfect response to an imperfect question
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.4 – 谷歌的AI模式对一个不完美的问题给出了不完美的回应
- en: 'While I appreciate that an article I wrote called *Final Cut Pro X: The Best
    Advanced Shortcut Keys* is the top-linked article in the short block of external
    links shown, I wrote this article about 10 years ago. Other advice refers to unofficial
    *adjustment layers*, while an update in the last year introduced official *adjustment
    clips*, and proxies won’t always help you work more quickly.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我欣赏我写的名为《Final Cut Pro X：最佳高级快捷键》的文章是短块外部链接中链接最多的文章，但我写这篇文章已经有10年了。其他建议提到了非官方的*调整层*，而去年的一次更新引入了官方的*调整剪辑*，代理并不总是能帮助你更快地工作。
- en: You’ll get similar results asking the same questions in any web-connected LLM,
    and I’ve found that AI-powered answers can often give better results for detailed
    questions. There’s obvious utility in having an AI sitting alongside a search
    engine when that’s what you’re looking for, but I think traditional search still
    has value.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何联网的LLM中提出相同的问题，你都会得到类似的结果，我发现AI驱动的答案对于详细的问题往往能给出更好的结果。当你寻找的是AI时，拥有一个AI坐在搜索引擎旁边显然是有用的，但我认为传统的搜索仍然有价值。
- en: As Google search becomes more AI-driven, you may wish to explore alternate search
    engines such as DuckDuckGo ([https://duckduckgo.com](https://duckduckgo.com))
    and Kagi ([https://kagi.com](https://kagi.com)) if AI can’t find a good result
    quickly.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 随着谷歌搜索变得更加以AI驱动，如果你希望探索其他搜索引擎，如DuckDuckGo ([https://duckduckgo.com](https://duckduckgo.com))
    和Kagi ([https://kagi.com](https://kagi.com))，那么当AI无法快速找到好的结果时，你可能愿意尝试这些。
- en: Comet is an AI-powered browser from Perplexity that takes over search, and the
    response to the same question I asked about Final Cut Pro felt like a random grab-bag
    of generic advice.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: Comet是来自Perplexity的AI浏览器，它接管了搜索功能，我对Final Cut Pro提出的问题的回应感觉像是一个随机的通用建议大杂烩。
- en: '![Figure 12.5 – Perplexity offering a poorly expressed grab-bag response to
    my imperfect question](img/B34247_12_5.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图12.5 – Perplexity对我提出的不完美问题提供的表达不佳的杂烩式回应](img/B34247_12_5.png)'
- en: Figure 12.5 – Perplexity offering a poorly expressed grab-bag response to my
    imperfect question
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.5 – Perplexity对我提出的不完美问题提供的表达不佳的杂烩式回应
- en: 'However, the real power of an AI browser is to perform functions on the web
    page you’re looking at, not just for better search. I went to the home page of
    Reddit, brought up the Assistant from the top right of the window, and asked it
    to summarize the page. In general, this was accurate, and hilariously, it includes
    a headline about Reddit suing Perplexity in these headlines (on 23 October 2025):'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，AI浏览器的真正力量在于对您正在查看的网页执行功能，而不仅仅是更好的搜索。我访问了Reddit的首页，从窗口的右上角调出助手，并要求它总结页面。总的来说，这是准确的，而且有趣的是，这些标题中包括Reddit起诉Perplexity的新闻（在2025年10月23日）：
- en: '![Figure 12.6 – This Perplexity summary of Reddit includes a story about Reddit
    suing Perplexity](img/B34247_12_6.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图12.6 – 这份Perplexity对Reddit的总结包括Reddit起诉Perplexity的故事](img/B34247_12_6.png)'
- en: Figure 12.6 – This Perplexity summary of Reddit includes a story about Reddit
    suing Perplexity
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.6 – 这份Perplexity对Reddit的总结包括Reddit起诉Perplexity的故事
- en: While summarizing a page is an obvious use, the key reason I suspect most of
    the LLM makers are getting into browsers is that they’ll drive more traffic to
    their own LLMs. If you start on a Wikipedia page about World War II and ask the
    on-board AI for a summary of pivotal moments, that’s convenient. If you then want
    that information shown in a timeline diagram, that’s LLM territory, and in this
    case, Perplexity ends up being the one you’re using. Microsoft Edge includes Copilot,
    and we can expect further integration there. I would expect Google Chrome to include
    Gemini at some point, too.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然总结页面是一个明显的用途，但我怀疑大多数LLM制造商进入浏览器的主要原因是这将推动更多流量到他们自己的LLM。如果你从关于第二次世界大战的维基百科页面开始，并要求内置AI总结关键时刻，这是方便的。如果你还想将这些信息以时间线图的形式展示，那么这就是LLM的领域，在这种情况下，Perplexity最终成为你使用的工具。Microsoft
    Edge包括Copilot，我们预计那里会有进一步的整合。我也期待谷歌Chrome在某个时候包括Gemini。
- en: Firing up the just-launched (at time of writing) **ChatGPT Atlas** browser (Mac
    only, paid accounts only for now), it’s a little different from Comet. You’ll
    start on the **Home** page, where typing a query in the top bar simply sends it
    to ChatGPT, which is happy to reference past chats in its answer. Compared to
    Google and Comet, it gave a slightly better answer, possibly informed by the context
    of my past enquiries.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 启动刚刚发布的（撰写本文时）**ChatGPT Atlas**浏览器（目前仅限Mac，且仅限付费账户），它与Comet略有不同。您将从**主页**开始，在顶部栏中输入查询会直接发送到ChatGPT，它乐于在其回答中引用过去的对话。与Google和Comet相比，它给出了稍微更好的答案，可能是根据我过去询问的上下文信息。
- en: For a more traditional search, you must click the **Search** icon, to the right
    of **Home**, and from that page, you can see a Google search with its AI overview
    at the top. This may suit you, but I’m not sure that ChatGPT’s own response is
    always what I’m initially looking for—it’s an extra layer of interpretation between
    me and the original information.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更传统的搜索，您必须点击位于**主页**右侧的**搜索**图标，从该页面，您可以看到带有其AI概览的Google搜索。这可能适合您，但我不确定ChatGPT自己的回答是否总是我最初想要的——它在我和原始信息之间增加了一层解释。
- en: Yes, a good AI summary is likely to present more information more quickly than
    a traditional search, but sometimes I just want to read a few separate pages in
    full, then make up my own mind. Atlas makes asking ChatGPT easier, while making
    traditional search less accessible. On the plus side, it’s possible to right-click
    on any selected text and send it to ChatGPT for more information, clarification,
    or a summary, and that can be helpful.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，一个好的AI摘要可能会比传统搜索更快地呈现更多信息，但有时我只是想阅读几个单独的页面全文，然后自己做出决定。Atlas使询问ChatGPT变得更容易，同时使传统搜索不那么容易访问。优点在于，您可以在任何选定的文本上右键单击并将其发送到ChatGPT以获取更多信息、澄清或摘要，这可能很有帮助。
- en: 'For a far more negative take, here’s Anil Dash’s review: [https://www.anildash.com/2025/10/22/atlas-anti-web-browser/](https://www.anildash.com/2025/10/22/atlas-anti-web-browser/).
    While I disagree with some of his points (as he did, I searched for `Taylor Swift`
    and was shown links to her official website and other web sources in the results,
    while he was not), it’s a detailed view that’s worth a read.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更负面的看法，这里有Anil Dash的评论：[https://www.anildash.com/2025/10/22/atlas-anti-web-browser/](https://www.anildash.com/2025/10/22/atlas-anti-web-browser/)。虽然我不同意他的某些观点（正如他一样，我搜索了“Taylor
    Swift”，结果显示了她的官方网站和其他网络资源，而他没有），但这是一个值得阅读的详细观点。
- en: Even if you don’t need an LLM alongside your browsing, one of the key reasons
    you might choose to use Atlas is that it offers **Agent mode**, which offers to
    *take over your browsing* and perform complex tasks for you.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 即使您不需要在浏览时使用LLM，您选择使用Atlas的一个关键原因可能是它提供了**代理模式**，它承诺**接管您的浏览**并为您执行复杂任务。
- en: '![Figure 12.7 – Agent mode in ChatGPT Atlas](img/B34247_12_7.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图12.7 – ChatGPT Atlas的代理模式](img/B34247_12_7.png)'
- en: Figure 12.7 – Agent mode in ChatGPT Atlas
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.7 – ChatGPT Atlas的代理模式
- en: So, is this the promised future where AIs start doing things for us? With the
    history of our past ChatGPT interactions to guide it, can we offload some tasks
    to an AI safely? Let’s take a deeper look in the next section.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这是人工智能开始为我们做事的承诺未来吗？有了我们过去与ChatGPT互动的历史作为指导，我们可以安全地将一些任务委托给人工智能吗？让我们在下一节中深入探讨。
- en: 'Agents: doing complex tasks for you'
  id: totrans-118
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理：为您执行复杂任务
- en: 'The terminology here has gotten messy, so let’s clarify a few terms:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的术语已经变得混乱，让我们澄清一些术语：
- en: '**ChatGPT Atlas’s Agent mode** is running within a browser on your computer,
    with ChatGPT able to step in and take control.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ChatGPT Atlas的代理模式**是在您的计算机浏览器中运行的，ChatGPT可以介入并接管控制。'
- en: '**ChatGPT Agent** is a browser in a box that runs on OpenAI’s servers. You
    can input your own personal information if you wish, but you’re not performing
    tasks on your own computer.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ChatGPT代理**是一个运行在OpenAI服务器上的浏览器盒子。如果您愿意，可以输入您自己的个人信息，但您不是在自己的计算机上执行任务。'
- en: '**ChatGPT’s custom GPTs** are specially trained versions of ChatGPT tailored
    to fix a specific problem, and you may give them agentic tasks.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ChatGPT的定制GPT**是针对特定问题特别训练的ChatGPT版本，您可以给它们分配代理任务。'
- en: Starting with Atlas, I tried to use it to research external SSD prices, a task
    familiar to video editors, and asked it to build a spreadsheet of the top 10 4
    TB external SSDs in Australia. On my behalf, it interrogated many sites, asked
    me to log in to my Google account, created a Google Sheet, populated it with useful
    data, and then revised that sheet on request.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 从Atlas开始，我尝试使用它来研究外部SSD的价格，这是一项视频编辑人员熟悉的工作，并要求它创建一个包含澳大利亚前10款4TB外部SSD的电子表格。代表我，它查询了许多网站，要求我登录到我的Google账户，创建了一个Google表格，用有用的数据填充它，然后根据要求修改了该表格。
- en: '![Figure 12.8 – Atlas can start logged out or logged in, but if you want a
    spreadsheet, it’ll ask you to log in to Google Docs](img/B34247_12_8.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图12.8 – Atlas可以未登录或已登录开始，但如果你想使用电子表格，它会要求你登录到Google Docs](img/B34247_12_8.png)'
- en: Figure 12.8 – Atlas can start logged out or logged in, but if you want a spreadsheet,
    it’ll ask you to log in to Google Docs
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.8 – Atlas可以未登录或已登录开始，但如果你想使用电子表格，它会要求你登录到Google Docs
- en: In some ways, it’s fascinating to watch ChatGPT “thinking” out loud as it completes
    this task. Because it controls the regular Google Docs user interface, deleting
    rows and moving data around as I watch, it’s less efficient than normal ChatGPT,
    making odd mistakes while typing in the prices. I would have expected it to maintain
    an internal version of the data and then simply repopulate the whole spreadsheet,
    but it did get there eventually.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，观看ChatGPT在完成任务时大声“思考”是非常有趣的。因为它控制着常规的Google Docs用户界面，在我观看时删除行和移动数据，这使得它比正常的ChatGPT效率低，在输入价格时犯了一些奇怪的错误。我原本期望它会维护一个内部的数据版本，然后简单地重新填充整个电子表格，但最终它还是做到了。
- en: '![Figure 12.9 – Asking for revisions to my original request took longer than
    expected](img/B34247_12_9.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图12.9 – 要求对原始请求进行修订花费的时间比预期更长](img/B34247_12_9.png)'
- en: Figure 12.9 – Asking for revisions to my original request took longer than expected
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.9 – 要求对原始请求进行修订花费的时间比预期更长
- en: 'In another test, I asked my family what they wanted to eat for dinner, with
    several specific dietary requests, and then asked Atlas to order it. There were
    four items in the full request, and Atlas did manage to correctly add each of
    them to the order before stopping, as requested. Here’s part of the process, showing
    Atlas thinking, trying to figure out how to select **No Egg**:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一个测试中，我询问我的家人他们晚餐想吃些什么，提出了几个具体的饮食要求，然后要求Atlas下单。完整请求中有四项内容，Atlas确实在停止之前正确地将每一项都添加到了订单中。以下是部分过程，展示了Atlas在思考，试图弄清楚如何选择**无蛋**：
- en: '![Figure 12.10 – Atlas’s public thinking process when selecting dietary requirements](img/B34247_12_10.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图12.10 – Atlas在选择饮食要求时的公开思考过程](img/B34247_12_10.png)'
- en: Figure 12.10 – Atlas’s public thinking process when selecting dietary requirements
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.10 – Atlas在选择饮食要求时的公开思考过程
- en: While it’s compelling to watch this in real time, I don’t think it’s something
    I’d regularly want an AI to do, simply because it’s not fast enough. The process
    took more than six minutes, with misclicks adding significant time, and it would
    have been much quicker to do it myself.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然实时观看很有吸引力，但我认为这不是我经常想让AI做的事情，仅仅因为它不够快。整个过程花费了超过六分钟，误操作增加了大量时间，我自己来做会更快。
- en: ChatGPT Agent performs similar jobs in a similar way, but in its own browser
    in the cloud, not yours. In this context, if you need to give it access to your
    own personal accounts, it’ll ask you to log in manually. The two approaches are
    similar, but Atlas has less friction.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT代理以类似的方式执行类似的工作，但它在云端的浏览器中执行，而不是你的浏览器中。在这种情况下，如果你需要让它访问你自己的个人账户，它会要求你手动登录。这两种方法很相似，但Atlas的摩擦更少。
- en: AI is most useful when given a tedious task that would have been difficult to
    do on my own, and ordering food is easier for a human than an AI at this point
    in time. This is especially true if you already know what you want, and I’m not
    really interested in letting an AI decide my diet.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 当AI被分配一项原本自己难以完成的繁琐任务时，它最有用，而在这个时候，对于人类来说，点餐比AI更容易。这尤其适用于你已经知道你想要什么的情况，而我并不真的想让AI决定我的饮食。
- en: So, what about a task where the outcome isn’t as fixed? As previously mentioned,
    some caution is warranted when trusting an AI with important tasks or expensive
    purchases. Anil Dash (in the article linked previously) tried to book a flight
    with Atlas, and while it was able to navigate to the purchase page, the flight
    dates requested had changed from his original request. Traditional pre-AI search
    did better here.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，对于结果并不固定的任务呢？如前所述，当信任 AI 执行重要任务或昂贵购买时，一些谨慎是必要的。Anil Dash（在之前链接的文章中）尝试使用 Atlas
    预订航班，尽管它能够导航到购买页面，但请求的航班日期已经从他的原始请求中更改。传统的 AI 之前的搜索在这里做得更好。
- en: As a counterpoint, Ars Technica gave Atlas a number of low-consequence tasks
    ([https://arstechnica.com/features/2025/10/we-let-openais-agent-mode-surf-the-web-for-us-heres-what-happened/](https://arstechnica.com/features/2025/10/we-let-openais-agent-mode-surf-the-web-for-us-heres-what-happened/))
    with mostly good results. If you want to start using this yourself, beware of
    security concerns. If humans can be fooled into clicking malicious links, an LLM
    certainly can too—and it may not recognize red flags like a human would.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 作为对比，Ars Technica 给 Atlas 分配了一些低风险的任务 ([https://arstechnica.com/features/2025/10/we-let-openais-agent-mode-surf-the-web-for-us-heres-what-happened/](https://arstechnica.com/features/2025/10/we-let-openais-agent-mode-surf-the-web-for-us-heres-what-happened/))，结果大多良好。如果你想自己开始使用，请注意安全风险。如果人类会被骗点击恶意链接，LLM
    当然也会——而且它可能不会像人类那样识别红旗。
- en: AI browsers do have a place, and whether you just want to integrate an LLM’s
    core services with traditional web browsing or embrace agentic functionality,
    they’re worth a look. Equally, if you prefer using traditional web search (while
    that’s still an option!), then perhaps using a regular browser is just fine.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: AI 浏览器确实有其存在的空间，无论你是想将 LLM 的核心服务与传统网页浏览集成，还是希望拥抱代理功能，它们都值得一试。同样，如果你更喜欢使用传统的网络搜索（尽管这仍然是一个选项！），那么使用常规浏览器可能就足够了。
- en: 'While I can see that there’s potential for automation with more predictable
    workflows built around formal text and fixed processes, most creative workflows
    are a little fluffy. Several agent-related tools sit adjacent to creative workflows
    and might be valuable to you. While I won’t be exploring them here, they include
    the following:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我可以看到，围绕正式文本和固定流程构建的更可预测的工作流程具有自动化的潜力，但大多数创意工作流程都有些模糊。一些与创意工作流程相邻的代理相关工具可能对你很有价值。虽然我不会在这里探讨它们，但它们包括以下内容：
- en: '**Motion** ([https://usemotion.com](https://usemotion.com)) is a popular AI-powered
    scheduling system that offers to manage your time for you, including project tracking.
    On its higher-tier plans, it offers to create AI employees to manage sales, marketing,
    and other tasks (not to be confused with Apple Motion, an underrated animation
    program that’s well-integrated with Final Cut Pro).'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运动** ([https://usemotion.com](https://usemotion.com)) 是一个流行的 AI 驱动的调度系统，它承诺为你管理时间，包括项目跟踪。在其高级计划中，它提供创建
    AI 员工来管理销售、营销和其他任务（不要与 Apple Motion 混淆，这是一个与 Final Cut Pro 集成良好的、被低估的动画程序）。'
- en: '**Notion** ([https://www.notion.com](https://www.notion.com)) is an AI-powered
    workspace including wikis, project tracking, notes, and documents. It includes
    AI agents that can perform tasks on the data created within its systems, and scales
    to teams.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Notion** ([https://www.notion.com](https://www.notion.com)) 是一个 AI 驱动的办公空间，包括维基、项目跟踪、笔记和文档。它包括可以在其系统中执行任务的
    AI 代理，并且可以扩展到团队规模。'
- en: '**ElevenLabs Agents** ([https://elevenlabs.io/app/agents](https://elevenlabs.io/app/agents))
    is a feature of ElevenLabs that aims to replace a traditional telephone answering
    system. Workflows here allow you to connect synthetic voices (examined in an earlier
    chapter) with LLMs to let you guide user interactions using English language instructions
    connected in a graph. A testing platform is also included.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ElevenLabs 代理** ([https://elevenlabs.io/app/agents](https://elevenlabs.io/app/agents))
    是 ElevenLabs 的一个功能，旨在取代传统的电话应答系统。这里的流程允许你将合成声音（在前面章节中已探讨）与 LLM 连接起来，使用英语语言指令在图中引导用户交互。还包括一个测试平台。'
- en: These tools are far from the only agent-focused tools in the market, but we’re
    straying a long way from “creative” territory, so I’ll leave it there.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具远非市场上唯一的以代理为中心的工具，但我们已经远离了“创意”领域，所以我就此打住。
- en: While we’re off-topic, one tool which isn’t an agent, but which *is* a fascinating
    example of what we might be using in the future is **Sesame** ([https://www.sesame.com](https://www.sesame.com)).
    Right now, they offer a preview of a chatbot, with two voices, Maya and Miles.
    (Mobile apps with the same “Sesame” name appear to be unconnected scams.)
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们离题了，但有一个工具并不是一个代理，但却是我们未来可能会使用的有趣例证，那就是**芝麻** ([https://www.sesame.com](https://www.sesame.com)).
    目前，他们提供了一个聊天机器人的预览，有两个声音，玛雅和迈尔斯。（同名“芝麻”的移动应用似乎是不相关的骗局。）
- en: Sesame doesn’t perform tasks; it’s a voice-only chatbot that’s happy to talk,
    acting as a sounding board or helping you work through a decision. Intriguingly,
    it has ethics, and I’ll leave you to chat with it yourself to discover the details.
    It’s fast to respond, sounds quite human-like, and is the closest system I’ve
    heard to the synthetic companion from the movie *Her*.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 芝麻不执行任务；它是一个仅限语音的聊天机器人，乐于交谈，充当一个回声板或帮助你处理决策。引人入胜的是，它有道德规范，我会让你自己与它聊天来发现细节。它响应迅速，听起来相当像人，是我所听到的最接近电影《她》中合成伴侣的系统。
- en: Rather than AI-powered text summaries, this is perhaps closer to the AI future
    many of us imagined. It seems that many humans use LLMs simply as someone to talk
    to, and if risks are appropriately mitigated, it could be very popular.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能比我们许多人想象的AI未来更接近。看起来许多人类只是把LLM当作一个可以交谈的人，如果风险得到适当的缓解，它可能会非常受欢迎。
- en: To close this section, let’s take a closer look at one more kind of agent, potentially
    as a useful way to answer questions and perform tasks specific to a company or
    a domain of expertise.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在结束这一部分之前，让我们更深入地看看另一种类型的代理，这可能是一种有用的方式来回答特定于公司或专业领域的问题和执行任务。
- en: Building a custom GPT
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建自定义GPT
- en: First up, know that this process is on the edge of the scope of the book, so
    I’ll approach this only at a high level. Doing this well is a technical process,
    but if you’re that way inclined, feel free to dive deeper.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，要知道这个过程超出了本书的范围边缘，所以我只会从高层次来探讨。做好这件事是一个技术过程，但如果你有这个倾向，请随意深入研究。
- en: Building a custom GPT is a different beast entirely from using an agentic browser.
    Essentially, this process lets you build a specialized version of ChatGPT, one
    that can answer questions with additional knowledge and context, and a clear focus
    on a particular subject area. Many already exist and clicking **Explore** in the
    ChatGPT sidebar is a great place to get started.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 构建自定义GPT与使用代理浏览器完全不同。本质上，这个过程让你能够构建一个ChatGPT的专用版本，它可以回答包含额外知识和背景的问题，并专注于特定主题领域。许多已经存在，点击ChatGPT侧边栏中的**探索**是一个很好的开始。
- en: '![Figure 12.11 – Looking for ideas? Many custom GPTs are publicly accessible](img/B34247_12_11.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图12.11 – 寻找灵感？许多自定义GPT都是公开可访问的](img/B34247_12_11.png)'
- en: Figure 12.11 – Looking for ideas? Many custom GPTs are publicly accessible
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.11 – 寻找灵感？许多自定义GPT都是公开可访问的
- en: If you’re a creative in a company with a written cache of codified, domain-specific
    knowledge, you might be able to use this to build an agent to help your junior
    staff. Perhaps a client might want your help creating an agent to advise their
    own staff?
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一家公司中的创意人员，拥有大量编码化、特定领域的知识库，你可能能够利用这些知识构建一个代理来帮助你的初级员工。也许客户可能希望你能帮助他们创建一个代理来向自己的员工提供建议？
- en: Alternatively, you might want a custom GPT to answer questions in a domain of
    expertise adjacent to your own. However, since that’s knowledge you don’t already
    have, it’s likely to be a product you purchase from someone else, not a custom
    GPT you make yourself.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你可能希望一个自定义GPT能够回答与你自己的专业领域相邻领域的问题。然而，由于那是一种你尚未拥有的知识，它很可能是你从别人那里购买的产品，而不是你自己制作的自定义GPT。
- en: Creating a custom GPT isn’t a trivial process, and you may need to go through
    the process a few times to get it right. The order in which you add knowledge
    to a custom GPT matters, and if you do it in the wrong way, you can end up with
    a bot that simply doesn’t work properly.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 创建自定义GPT不是一个简单的过程，你可能需要多次尝试才能正确完成。你向自定义GPT添加知识的顺序很重要，如果你以错误的方式做，最终可能会得到一个根本无法正常工作的机器人。
- en: If you fail at your first attempt, try building again with slightly different
    content, or even the same content in a different order. Developers can use backend
    API tools, but the more user-friendly frontend approach can work just as well
    or even better.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你第一次尝试失败，尝试用稍微不同的内容重新构建，或者甚至以不同的顺序使用相同的内容。开发者可以使用后端API工具，但更用户友好的前端方法也可以同样有效，甚至更好。
- en: '![Figure 12.12 – Some of the frontend configuration fields in the custom GPT
    creation UI](img/B34247_12_12.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图 12.12 – 定制 GPT 创建 UI 中的部分前端配置字段](img/B34247_12_12.png)'
- en: Figure 12.12 – Some of the frontend configuration fields in the custom GPT creation
    UI
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12.12 – 定制 GPT 创建 UI 中的部分前端配置字段
- en: Your goal here should be to narrow the scope of what an LLM tries to do. The
    *vanilla* ChatGPT tries to be all things to all people, but a custom GPT needs
    focus.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目标应该是缩小 LLM 尝试做的事情的范围。*原味* ChatGPT 努力成为所有人的所有事物，但定制 GPT 需要专注。
- en: 'Give it instructions on how to behave: effectively, a custom system prompt.
    This should constrain it to a specific set of tasks, guiding how it should interact
    and how it should speak to its target audience. Of course, you’ll also need to
    upload documents containing any domain-specific knowledge your bot needs. This
    could be a set of guidelines, processes, or a user guide for custom software programs.'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 给它如何表现的指令：实际上，这是一个定制的系统提示。这应该将其限制在特定的任务集中，指导它如何与其目标受众互动以及如何交流。当然，你还需要上传包含任何机器人所需特定领域知识的文档。这可能是一套指南、流程或定制软件程序的用户手册。
- en: Definitely keep an eye on privacy. Though custom GPTs are tied to paid accounts
    (and not used to train ChatGPT itself), it’s still possible to make a custom GPT
    *public*. If you’re including top-secret company data, you’ll obviously need to
    make sure that it remains *private*.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 一定要关注隐私。尽管定制 GPT 与付费账户相关联（并且不用于训练 ChatGPT 本身），但仍然有可能使定制 GPT *公开*。如果你包含机密公司数据，显然你需要确保它保持
    *私密*。
- en: On the other hand, you might want to create a custom GPT that is available to
    the public. This could share some of your knowledge for the price of an email
    address, to help you build your own audience. It’s up to you.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，你可能想要创建一个对公众开放的定制 GPT。这可以通过电子邮件地址的价格分享一些你的知识，以帮助你建立自己的受众。这取决于你。
- en: Still, if you’ve created a custom GPT, as users may not know the best questions
    to ask, they may struggle to get the best from it. By providing guidance as to
    the best ways to use your custom GPT and even providing examples of prompts that
    work well with it, you’ll give your users a better chance of success.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，如果你已经创建了一个定制的 GPT，由于用户可能不知道最佳提问方式，他们可能难以充分利用它。通过提供关于如何最佳使用你的定制 GPT 的指导，甚至提供与它配合良好的提示示例，你将给用户更大的成功机会。
- en: For some ideas on how this can work best, I spoke to Anna Harrison of **RAMMP**
    ([https://www.rammp.com](https://www.rammp.com)), a company that develops custom
    GPTs to help small business clients with marketing.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 关于如何最好地实现这一目标的一些想法，我采访了 **RAMMP** 的安娜·哈里森（[https://www.rammp.com](https://www.rammp.com)），这是一家开发定制
    GPT 以帮助小型企业客户进行营销的公司。
- en: 'RAMMP builds a custom GPT for each of its clients, training it with information
    about that client’s business, their current social media output, and their goals.
    After the training, each client has a custom agent, a personal marketing advisor,
    and an assistant with a unique personality. This could mirror the client themselves
    or someone else. To help users get the most from their agent, RAMMP also includes
    two other components:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: RAMMP 为每位客户构建一个定制的 GPT，使用该客户业务信息、当前社交媒体输出以及他们的目标进行训练。训练完成后，每位客户都将拥有一个定制的代理，一个个人营销顾问，以及一个具有独特个性的助手。这可以反映客户本人或其他人。为了帮助用户充分利用他们的代理，RAMMP
    还包括另外两个组件：
- en: '**Diagnostic**, a tool to audit current marketing efforts and find out where
    conversion isn’t working.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**诊断**，一个用于审计当前营销活动并找出转化效果不佳的地方的工具。'
- en: '**Helpers**, a library of workflow prompts you can ask the custom GPT to solve
    specific problems. These prompts might include a quarterly SEO audit, creating
    a marketing strategy, or setting out a social media calendar.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**助手**，一个你可以要求定制 GPT 解决特定问题的流程提示库。这些提示可能包括季度 SEO 审计、创建营销策略或制定社交媒体日历。'
- en: Throughout this book, I’ve recommended trying to use AI tools in a field close
    to your existing knowledge, and this approach gels with that. A business owner
    or freelancer knows their products and their customers but may not know the best
    way to market themselves.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在整本书中，我建议尝试在接近你现有知识领域的领域使用 AI 工具，这种方法与此相符。一个企业主或自由职业者了解他们的产品和客户，但可能不知道如何最好地推广自己。
- en: By giving clients an extra nudge, telling them what’s going wrong and how to
    best prompt their agent, knowledge gaps are neatly filled. If you’re considering
    creating a custom GPT, think about how its users will communicate with it, and
    guide them if you can.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 通过给客户一个额外的推动，告诉他们出了什么问题以及如何最好地提示他们的代理，知识差距将得到很好的填补。如果你在考虑创建一个定制的GPT，考虑一下它的用户将如何与之沟通，并在可能的情况下引导他们。
- en: Custom GPT functionality allows regular humans to explore the potential agentic
    future on their own, without having to know all the details of APIs or explore
    code. It’s a next step that not all will want to explore, but which could solve
    problems that the regular ChatGPT (and other LLMs) cannot.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 定制的GPT功能允许普通人探索潜在的代理未来，而不必了解所有API的细节或探索代码。这是一步不是所有人都会想要探索的，但它可能解决常规ChatGPT（以及其他LLM）无法解决的问题。
- en: Other AI providers have similar, but not identical, functionality. If custom
    GPTs don’t work for you, perhaps explore Claude Projects ([https://support.claude.com/en/articles/9517075-what-are-projects](https://support.claude.com/en/articles/9517075-what-are-projects)),
    which let you upload additional private documents and collaborate with other users.
    You might also want to explore one of the more specific agent-focused tools, such
    as Motion, Notion, or **Zapier** ([https://zapier.com/agents](https://zapier.com/agents)),
    though all these services have slightly different capabilities.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 其他AI提供商有类似但不完全相同的功能。如果你觉得定制的GPT不适合你，也许可以探索Claude Projects ([https://support.claude.com/en/articles/9517075-what-are-projects](https://support.claude.com/en/articles/9517075-what-are-projects))，它允许你上传额外的私人文档并与其他用户协作。你也许还想要探索一些更专注于代理的工具，例如Motion、Notion或**Zapier**
    ([https://zapier.com/agents](https://zapier.com/agents))，尽管所有这些服务都有略微不同的功能。
- en: The future is going to be fascinating. Let’s wrap up this chapter, and then
    the whole book.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 未来将会非常迷人。让我们结束这一章，然后整本书。
- en: Summary
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Speaking to digital assistants on phones was a big innovation, but like any
    new technology, we got used to it, found its limits, and it didn’t end up changing
    the world. I suspect LLMs will, over the next few years, seamlessly take over
    from less powerful digital assistants.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在手机上与数字助手交谈是一项重大创新，但就像任何新技术一样，我们习惯了它，发现了它的局限性，最终它并没有改变世界。我怀疑在接下来的几年里，LLM将无缝地取代那些功能较弱的数字助手。
- en: With increased capability, more of us will start to offload more of our working
    tasks to agents of one kind or another—but not everyone, not every job, and not
    all of the time. If LLM-powered digital assistants do change the world, it’ll
    be in small steps.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 随着能力的提升，我们中越来越多的人将开始将更多的工作任务委托给各种类型的代理——但并非所有人、不是所有工作、也不是所有时间。如果由大型语言模型（LLM）驱动的数字助手真的能改变世界，那也将会是渐进式的改变。
- en: We might start by manually automating what we’re already doing, but if AI tools
    can become reliable enough, the tasks we trust them with will grow larger. They
    might be slower than us today, but once they start talking directly to the data
    structures behind the apps we use, they’ll be faster than we ever were.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能从手动自动化我们正在做的事情开始，但如果AI工具足够可靠，我们委托给它们的任务将会更多。它们可能比我们今天慢，但一旦它们开始直接与我们使用的应用程序背后的数据结构对话，它们将比我们更快。
- en: Browsers are a useful stepping stone, but many creatives work in regular desktop
    apps, not just on the web. Soon enough, though, automation engines will get better
    at controlling our regular computers, and things that are hard for experts will
    become easier for everyone. Hopefully, we’ll have more time to produce better
    work, not just make more work in the same amount of time.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 浏览器是一个有用的垫脚石，但许多创意人士在常规桌面应用程序中工作，而不仅仅是网页上。不过，很快，自动化引擎将更好地控制我们的常规计算机，那些对专家来说困难的事情将变得对每个人来说都更容易。希望我们会有更多的时间来创作更好的作品，而不仅仅是用同样的时间创造更多的作品。
- en: Will these agents be better than humans? Not on every metric, and they won’t
    be used in every task. Many agents and custom GPTs will find their niches, and
    some will be a perfect fit. But many creative jobs will remain manual, and many
    existing creative people will never use AI.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这些代理会比人类更好吗？在每一个衡量标准上都不一定，它们也不会在每一个任务中使用。许多代理和定制的GPT将找到自己的领域，其中一些将完美匹配。但许多创造性工作将保持手工操作，许多现有的创造性人士可能永远不会使用AI。
- en: That’s just fine. There’s room for many different approaches, and AI will bring
    new ways to express creativity, too.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 这完全没问题。有足够的空间容纳许多不同的方法，AI也将带来新的表达创造力的方式。
- en: Final thoughts
  id: totrans-179
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最后的想法
- en: If you’re a creative professional interested in the potential of AI-powered
    tools, I hope this book has helped you understand not just what’s possible but
    also what’s worth pursuing. Anyone who sees the creation process as a worthwhile
    task rather than a chore to be outsourced probably has mixed views on AI right
    now.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一位对AI工具潜力感兴趣的创意专业人士，我希望这本书能帮助你不仅理解可能做到的事情，还理解值得追求的事情。任何将创作过程视为一项有价值任务而不是外包的琐事的人，现在可能对AI持有复杂的看法。
- en: In the **U****tility AI** space, there are many ways to optimize workflows while
    leaving you entirely in control of the process. There are few downsides to being
    able to find a photo or video more quickly, or to asking an AI for feedback on
    your thoughts. Many of these tools run offline, with no ongoing costs—a win all
    round.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在**实用AI**领域，有无数种方法可以优化工作流程，同时让你完全控制整个过程。能够更快地找到照片或视频，或者请求AI对你的想法提供反馈，几乎没有缺点。许多这些工具都是离线运行的，没有持续的成本——这是一个全面的胜利。
- en: In the **G****enerative AI** space, there’s huge potential for seeing how new
    ideas could work, for collaborative brainstorming, and some tools make otherwise
    cost-prohibitive VFX or retouching tasks attainable within normal budgets. But
    GenAI is best used as part of a greater whole, and clients who’ve been sold the
    lie “just do it with AI” will discover that this works about as well as “just
    fix it in post.”
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在**生成AI**领域，有巨大的潜力来了解新想法如何工作，用于协作头脑风暴，以及一些工具使得原本成本高昂的视觉效果或修图任务在正常预算内变得可行。但生成AI最好作为更大整体的一部分来使用，那些被卖掉“只用AI就能做到”的谎言的客户会发现，这和“只在后期修复”一样有效。
- en: In the **A****utomation AI** space, there’s the potential to take away the tedium
    from some tasks, but don’t expect perfect results. When we recognize the limitations
    of today’s tools and embrace the best aspects of them, they can really help, even
    if they can’t do the whole job. There’s huge potential here, but it’s just over
    the horizon.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在**自动化AI**领域，有可能从一些任务中消除乏味，但不要期待完美的结果。当我们认识到今天工具的限制并接受它们的最佳方面时，它们确实能有所帮助，即使它们不能完成整个工作。这里有很大的潜力，但它只是在地平线上。
- en: However you use AI, never lose sight of what you enjoy about what you do. If
    you’re a designer, an editor, a retoucher, or a photographer, you probably enjoy
    getting your hands a little dirty with the tools, making many small changes toward
    a final vision. Those details matter, and they’re the ones most at risk for those
    who adopt AI for every task.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你如何使用AI，永远不要忘记你享受的事情。如果你是设计师、编辑、修图师或摄影师，你可能喜欢用工具动手，朝着最终愿景进行许多小的改变。这些细节很重要，而且对于那些将AI用于每个任务的人来说，它们是最容易受到风险威胁的。
- en: AI systems often encourage us to think of tasks at a high level, like a CEO.
    If a CEO wants a task completed, they ask their staff to do it, and the CEO doesn’t
    worry about the details. But somewhere down the line, those staff do make a whole
    lot of tiny, informed decisions on the CEO’s behalf, and those decisions matter.
    If nobody sweats the details, such as when an AI falls back to a default setting,
    the overall product can suffer.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统通常鼓励我们像CEO一样从高层次思考任务。如果CEO想要完成一项任务，他们会要求他们的员工去做，而CEO不会担心细节。但在这个过程中，那些员工确实代表CEO做出了许多微小的、明智的决定，而这些决定很重要。如果没有人关注细节，比如当AI退回到默认设置时，整体产品可能会受到影响。
- en: We saw this happen with template-based design systems before AI, and that’s
    not going to stop. Not all clients care that their designs look unique, but if
    they want to stand out, they should. Templated systems and AI-driven content tend
    toward homogeneity, but great design brings something extra.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在AI之前就已经看到了基于模板的设计系统发生这种情况，而且这种情况不会停止。并不是所有客户都关心他们的设计看起来是否独特，但如果他们想要脱颖而出，他们应该这样做。模板系统和AI驱动的内容倾向于同质化，但伟大的设计会带来额外的价值。
- en: Often, the job of a creative is to dive deep into the details, interrogating
    each decision and analyzing its consequences. What if that pause is held a little
    longer, or that title made a little larger, or that word just a shade more grandiloquent?
    These changes matter, maybe not in ways that are immediately obvious at the highest
    level, but they sum to a greater whole.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，创意工作者的工作就是深入细节，质疑每一个决定并分析其后果。如果那个暂停时间稍微长一点，或者那个标题稍微大一点，或者那个词稍微夸张一点，这些改变很重要，也许在最高层次上并不立即明显，但它们汇总成更大的整体。
- en: Another issue is that if you can suddenly make anything (at a lower quality
    setting), then you’re entirely free from constraints… but *constraints inspire
    creativity*. A blank page is easier to fill if you have a 300-word limit; a one-page
    flyer is easier to complete with a style guide in hand. An endless supply of low-grade
    imagery doesn’t help focus a vision.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个问题是你如果可以突然制作任何东西（在较低的质量设置下），那么你就完全不受约束了……但是*约束激发创造力*。如果你有一个300字的限制，那么填写空白页面会更容易；如果你手头有风格指南，那么完成一页传单会更容易。源源不断的低质量图像并不能帮助聚焦视野。
- en: It’s also valuable to be a novice sometimes. When you learn a new skill, somewhat
    adjacent to your existing skills, you’ll try to map your existing knowledge onto
    the new area. Sometimes that fails, but sometimes it inspires new techniques.
    The same magic can happen when you work with other professionals, and if we rely
    on AI to fill in human-shaped gaps, we’ll see less of it.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，成为一个新手也是很有价值的。当你学习一项新技能，它与你的现有技能多少有些关联时，你会尝试将你的现有知识映射到新领域。有时这会失败，但有时会激发新技术。当你与其他专业人士合作时，同样的魔法也会发生，如果我们依赖AI来填补人类形状的空白，我们将看到更少的这种魔法。
- en: In the creative industries especially, insights are often found when you work
    across different media or collaborate with other specialists, and the best of
    these are when you compare notes and discover unexpected synchronicities. These
    are not insights discovered in committees.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是在创意产业中，当你在不同的媒体之间工作或与其他专家合作时，往往会发现洞察力，其中最好的是当你比较笔记并发现意外的同步性时。这些不是在委员会中发现的洞察力。
- en: If we’re not careful, extensive use of AI could bring a generation of people
    who create without enjoying creating. If you only prompt rather than make, chasing
    ROI instead of beauty, your work will be lacking. It’s not a bad thing to bring
    the power of creation to those who have great ideas, but AI *alone* isn’t the
    way to make the best work.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们不小心，广泛使用AI可能会带来一代人，他们虽然创造了东西，但并不享受创造的过程。如果你只是提示而不是制作，追求回报率而不是美感，你的作品将缺乏内涵。把创作的力量带给那些有伟大想法的人不是坏事，但AI*单独*并不是制作最佳作品的途径。
- en: In more sinister ways, AI could shrink the pool of expert creatives, as fewer
    people grow their skills by using them. Creative muscles must be exercised, and
    prompting for results is like taking a taxi rather than walking.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 在更险恶的方式上，AI可能会缩小专家创意的群体，因为越来越少的人通过使用它们来提高自己的技能。创意肌肉必须得到锻炼，而仅仅提示结果就像乘坐出租车而不是步行一样。
- en: With or without AI, implementation details matter, and if we all start taking
    the details for granted, we’ll be worse off for it. Avoiding tedium is fine, but
    don’t let your skills atrophy by passing every job to AI tools. AI is fantastic
    as an assistant and an idea factory, or to help with specific elements of a task,
    but replacing humans will lead to worse creative output.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是否有AI，实施细节都很重要，如果我们都开始把细节视为理所当然，那我们会因此变得更糟。避免乏味是可以的，但不要让你的技能因为把所有工作都交给AI工具而退化。AI作为助手和创意工厂，或者帮助完成任务的特定元素，是非常棒的，但取代人类将导致更差的创意输出。
- en: Yet, I do think there’s plenty of scope to use AI well. If you can perform a
    task, and there’s any chance you might learn new skills by doing it, then do it.
    But if it’s a boring job that you’ve done before, you’re short on time, and Automation
    AI is a net win, why not? Beyond saving time, if inspiration runs dry, Gen AI
    can give you more new ideas than you can use, and Utility AI can help you work
    more efficiently.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我认为充分利用AI的空间还是很大的。如果你能完成一项任务，并且有可能通过这样做学习新技能，那么就去做吧。但如果这是一项你已经做过的无聊工作，你时间紧迫，而自动化AI是一个净赢的局面，为什么不呢？除了节省时间，如果灵感枯竭，通用AI可以给你提供比你能够使用的更多新想法，而效用AI可以帮助你更高效地工作。
- en: 'What’s next? AI isn’t going away, but I would expect the current landscape
    to change hugely over the next few years. Here are a few predictions:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是什么？AI不会消失，但我预计未来几年当前的格局将发生巨大变化。以下是一些预测：
- en: Superintelligence? Unlikely.
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超级智能？不太可能。
- en: AI bubble bursting, and some AI companies going under? Likely.
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI泡沫破裂，一些AI公司倒闭？很可能。
- en: Pricing chaos? Probably.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定价混乱？可能吧。
- en: GenAI images and videos getting better? Of course.
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通用AI的图像和视频变得更好？当然。
- en: Hallucinations and imperfections? Continuing.
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 幻觉和不完美？持续进行中。
- en: Social issues from AI overuse? Yep.
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI过度使用导致的社会问题？是的。
- en: Privacy problems from lax security? Already a problem without AI.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于安全措施不力导致的隐私问题？在AI出现之前就已经是问题。
- en: AI addiction? It’s already happened.
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI成瘾？这已经发生了。
- en: There’s nothing more certain than change, and it’ll be a wild ride from here.
    We’ve never been able to *wish* for things before, and a whole new world awaits.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 没有什么比变化更确定的了，从这里开始将是一场狂野的旅程。我们以前从未能够*愿望*得到某些东西，而现在一个全新的世界等待着。
- en: Thank you so much for taking these first few steps with me.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 非常感谢您与我一起迈出这几步。
