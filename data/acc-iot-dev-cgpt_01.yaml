  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: IoT Essentials, All You Should Know
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 物联网基础知识，你应了解的一切
- en: In this chapter, you will go through the concepts and definitions of the **Internet
    of Things** (**IoT**) as defined by the industry, as well as its remarkable evolution
    milestones since its inception. By understanding the historical context and outlook
    of IoT, you will gain valuable insights into its significance and potential applications
    in the market.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将了解物联网（IoT）的概念和定义，这是由行业定义的，以及自其诞生以来的显著演变里程碑。通过了解物联网的历史背景和未来展望，你将对其重要性和在市场中的潜在应用获得宝贵的见解。
- en: Furthermore, you will zoom into the wide-ranging market that IoT addresses and
    various industries and sectors where its impact is most prominent. From healthcare
    to transportation, from smart homes to industrial automation, IoT has revolutionized
    the way we live, work, and interact with our environment. You will explore these
    real-world applications and the transformative power of IoT in shaping our society.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你将深入了解物联网所涉及的广泛市场以及其影响最为突出的各个行业和领域。从医疗保健到交通，从智能家居到工业自动化，物联网已经彻底改变了我们生活、工作和与环境互动的方式。你将探索这些现实世界的应用以及物联网在塑造我们社会中的变革力量。
- en: By the end of this chapter, you will have acquired a solid foundation and a
    well-rounded understanding of essential concepts and knowledge required to embark
    on your journey into the intricate world of IoT. You will be fully prepared to
    explore the details and intricacies of IoT as we dive deeper into the subject
    matter in subsequent chapters of this book.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将获得坚实的知识基础和全面的理解，这些是开始探索物联网复杂世界的必要概念和知识。你将完全准备好在本书后续章节中深入探讨物联网的细节和复杂性。
- en: In the engineering projects in [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302),
    with the assistance of ChatGPT, you will learn to program C++ code on an ESP32
    **microcontroller unit** (**MCU**), send diverse sensors’ data through your home
    Wi-Wi network, and store, analyze, and visualize live and dynamic sensor data
    on the **Amazon Web Services** (**AWS**) cloud. In this chapter, we will acquaint
    ourselves with these terms so as to build the right foundation.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第11章*](B22002_11.xhtml#_idTextAnchor302)的工程项目中，借助ChatGPT的帮助，你将学习如何在ESP32
    **微控制器单元**（**MCU**）上编写C++代码，通过你的家庭Wi-Fi网络发送各种传感器的数据，并在**亚马逊网络服务**（**AWS**）云上存储、分析和可视化实时和动态的传感器数据。在本章中，我们将熟悉这些术语，以便打下正确的基础。
- en: 'This chapter covers the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: The evolving definition of IoT
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物联网的演变定义
- en: Addressable markets
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可寻址市场
- en: How IoT impacts us
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物联网对我们产生的影响
- en: The evolving definition of IoT
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 物联网（IoT）的演变定义
- en: IoT has never stopped evolving its definition since its debut in the 1990s.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 自20世纪90年代首次亮相以来，物联网从未停止过其定义的演变。
- en: 'According to Gartner ([https://www.gartner.com/en/information-technology/glossary/internet-of-things](https://www.gartner.com/en/information-technology/glossary/internet-of-things)),
    the concept of IoT is defined as follows:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Gartner ([https://www.gartner.com/en/information-technology/glossary/internet-of-things](https://www.gartner.com/en/information-technology/glossary/internet-of-things))的定义，物联网的概念如下：
- en: “The Internet of Things (IoT) is the network of physical objects that contain
    embedded technology to communicate and sense or interact with their internal states
    or the external environment.”
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: “物联网（IoT）是包含嵌入式技术的物理对象网络，用于通信、感知或与其内部状态或外部环境交互。”
- en: However, as of today, this definition may seem a little cliché and out of date.
    Initially, the notion of IoT was specifically designed to support traditional
    **machine-to-machine** (**M2M**) communication within manufacturing plants, where
    it was constrained by wired copper twists, Ethernet cables, and power supply cords.
    It was typically deployed in a fixed scenario with no mobility, scalability, elasticity,
    power consumption, and cost efficiency.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，截至今天，这个定义可能显得有些陈词滥调，过时了。最初，物联网的概念是专门为支持制造工厂内的传统**机器对机器**（**M2M**）通信而设计的，它受到有线铜线、以太网电缆和电源线的限制。它通常部署在固定场景中，没有移动性、可扩展性、弹性、功耗和成本效益。
- en: Since 1999, when IoT was officially named by Kevin Ashton, MIT’s Executive Director
    of Auto-ID Labs, it has been making significant strides in various areas. This
    is thanks to breakthroughs in industrial innovations such as silicon chipsets,
    wireless technologies, and cloud services. IoT no longer operates solely on a
    local network but goes beyond massive geographical areas on a vast scale. IoT
    is now expanding its reach beyond homes, residential and commercial areas, campuses,
    and cities, and is even reaching deserts, barren zones, oceans, and aerospace.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 自从1999年，物联网（IoT）被MIT Auto-ID实验室执行董事凯文·阿什顿正式命名以来，它在各个领域都取得了显著的进步。这得益于工业创新方面的突破，如硅芯片组、无线技术和云服务。物联网不再仅仅在本地网络中运行，而是在广阔的地域上跨越了巨大的地理区域。物联网现在正在将其范围扩展到家庭、住宅和商业区域、校园和城市之外，甚至触及沙漠、荒地、海洋和航空航天领域。
- en: Looking back, the evolution of IoT has experienced several remarkable leaps
    since its inception. These leaps include improvements in deployment coverage,
    power consumption, cost structure, and architecture, as described next.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，物联网自诞生以来经历了几个显著的飞跃。这些飞跃包括部署覆盖范围、功耗、成本结构和架构的改进，如下所述。
- en: Deployed from fixed to mobility
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从固定部署到移动部署
- en: The year 2000 was a pivotal moment for the IoT explosion. It marked a significant
    milestone in the advancement of IoT applications. This was made possible by the
    industrial innovation of low-cost 802.11 Wi-Fi networks, which were rapidly and
    widely adopted in both homes and enterprises. The introduction of the 802.11 Wi-Fi
    network brought about a revolution for IoT devices. They were no longer solely
    reliant on cables (although a power cable might still be necessary), but could
    now benefit from the convenience of mobility. This groundbreaking development
    enabled IoT devices to be seamlessly connected through wireless connectivity in
    residential, commercial, and business spots, whether they were stationary or on
    the move. This was a monumental shift in the IoT landscape, paving the way for
    even greater possibilities and innovations in the future.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 2000年是物联网爆炸性增长的转折点。它标志着物联网应用进步的一个重大里程碑。这是由于低成本802.11 Wi-Fi网络的工业创新，这些网络迅速且广泛地被家庭和企业采用。802.11
    Wi-Fi网络的引入为物联网设备带来了革命。它们不再仅仅依赖于电缆（尽管可能仍然需要电源线），现在可以享受移动性的便利。这一开创性的发展使得物联网设备能够通过无线连接无缝地连接到住宅、商业和商业场所，无论它们是静止的还是移动的。这是物联网领域的一个重大转变，为未来的更大可能性和创新铺平了道路。
- en: 802.11 Wi-Fi is not the only option dominating the home and enterprise spaces;
    there are other new players that provide local mobility as well, including the
    802.15.1 family of Bluetooth and **Bluetooth Low Energy** (**BLE**) and the 802.15.4
    family comprising ZigBee, Thread, and Matter, and Sub-GHz Z-Wave.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 802.11 Wi-Fi并不是唯一主导家庭和企业空间的选项；还有其他新的参与者提供本地移动性，包括蓝牙802.15.1系列、**蓝牙低功耗**（**BLE**）和由ZigBee、Thread和Matter以及Sub-GHz
    Z-Wave组成的802.15.4系列。
- en: Mobility from a local area to a wide area
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从本地区域到广域区域的移动性
- en: The year 2005 was a significant catalyst for boosting IoT with the introduction
    of **service provider**’s (**SP**) 3G cellular networks, including **Code-Division
    Multiple** **Access** (**CDMA**) and the **Universal Mobile Telecommunications
    System** (**UMTS**). These networks offered faster and wider area mobility connectivity,
    enabling a greater variety of devices to connect to the internet at will. This
    breakthrough has opened up numerous opportunities for IoT applications in various
    areas, including beyond residential and campus, spanning cities and rural areas.
    Some examples of these applications include fleet management, smart agriculture,
    and asset tracking.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 2005年，随着**服务提供商**（**SP**）的3G蜂窝网络的引入，包括**码分多址**（**CDMA**）和**通用移动通信系统**（**UMTS**），对物联网的推动起到了重要的催化作用。这些网络提供了更快、更广泛的区域移动连接性，使得更多种类的设备能够随意连接到互联网。这一突破为物联网在各个领域的应用开辟了众多机会，包括住宅和校园之外，跨越城市和农村地区。这些应用的例子包括车队管理、智能农业和资产管理。
- en: Heading into the year 2010, the introduction of 4G/**Long-Term Evolution** (**LTE**)
    technology accelerated the growth of IoT by providing higher data rates. In 2020,
    the era of 5G brought even more rapid progress. As a result, IoT has penetrated
    almost every population corner of the world, transforming the way we live and
    work.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 进入2010年，4G/**长期演进**（**LTE**）技术的引入通过提供更高的数据速率加速了物联网的增长。到了2020年，5G时代带来了更加迅速的进步。因此，物联网几乎渗透到世界的每一个人口角落，改变了我们的生活方式和工作方式。
- en: Presence from city to barren fields
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从城市到荒野的覆盖范围
- en: The wide area expansion of the IoT footprint is not solely tied to the coverage
    of traditional 4G/LTE and 5G cellular networks provided by SPs. In less populated
    areas such as barren fields, forests, mountains, offshore, and even oceans, where
    SPs are hesitant to offer coverage due to unwise investment, industries are adopting
    new wireless technologies to provide IoT coverage. Examples of such technologies
    include **low-power wide area networks** (**LPWANs**), such **as Long-Term Evolution
    Category M** (**LTE-M**), **Narrow Band Internet of Things** (**NB-IOT**), **long-range
    wide-area network from LoRa Alliance** (**LoRaWAN**), **Sigfox**, and **Low Earth
    Orbit** (**LEO**) networks, such as SpaceX Starlink and Amazon Kuiper, which do
    not rely on traditional SPs.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 物联网足迹的广泛扩展并不仅仅与SPs提供的传统4G/LTE和5G蜂窝网络的覆盖范围相关。在人口较少的地区，如荒野、森林、山区、海上甚至海洋，由于投资不明智，SPs犹豫不决提供覆盖，这些行业正在采用新的无线技术来提供物联网覆盖。这些技术的例子包括**低功耗广域网**（**LPWAN**），如**长期演进类别M**（**LTE-M**）、**窄带物联网**（**NB-IoT**）、来自LoRa联盟的**长距离广域网**（**LoRaWAN**）、**Sigfox**和**低地球轨道**（**LEO**）网络，如SpaceX
    Starlink和Amazon Kuiper，它们不依赖于传统的SPs。
- en: LTE-M and NB-IoT are both derived from SPs’ cellular networks. Unlike traditional
    4G/LTE and 5G technologies, which strive to provide high data rates to mobile
    phones, LTE-M and NB-IoT prioritize wider coverage and superior lower power consumption
    for battery-powered IoT devices with reduced receiving sensitivity, bandwidth,
    and data rates, which are distinct from conventional 4G/LTE and 5G networks.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: LTE-M和NB-IoT都源自SPs的蜂窝网络。与旨在为移动电话提供高数据速率的传统4G/LTE和5G技术不同，LTE-M和NB-IoT优先考虑更广泛的覆盖范围和优异的较低功耗，为电池供电的物联网设备提供降低的接收灵敏度、带宽和数据速率，这些与传统4G/LTE和5G网络不同。
- en: LoRaWAN is an industrial standard supported by the LoRa Alliance. It is designed
    to provide long-range coverage and low power consumption for various IoT applications.
    By operating on **unlicensed spectrum** (such as the band allocated for **Industrial,
    Scientific, and Medical** (**ISM**)), LoRaWAN offers accessibility to a wide range
    of users who are interested in utilizing it for their IoT projects. This standard
    ensures that devices can communicate over long distances while consuming minimal
    power, making it an ideal choice for many IoT scenarios.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: LoRaWAN是由LoRa联盟支持的工业标准。它旨在为各种物联网应用提供长距离覆盖和低功耗。通过在**未授权频谱**（例如分配给**工业、科学和医疗**（**ISM**）的频段）上运行，LoRaWAN为对利用它进行物联网项目感兴趣的各种用户提供了可访问性。该标准确保设备可以在长距离上通信，同时消耗最少的能量，使其成为许多物联网场景的理想选择。
- en: SpaceX Starlink and Amazon Kuiper LEO satellite constellations will be instrumental
    in facilitating the deployment of IoT applications in those areas. With their
    extensive coverage and high-speed connectivity, these satellite networks will
    empower various IoT devices and enable seamless data transmission, enhancing communication
    and connectivity for users in remote and underserved regions. Furthermore, the
    integration of SpaceX Starlink and Amazon Kuiper LEO with IoT technologies will
    unlock new possibilities for industries such as agriculture, transportation, and
    environmental monitoring, revolutionizing the way we collect, analyze, and utilize
    data for improved decision-making and efficiency.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: SpaceX Starlink和Amazon Kuiper LEO卫星星座将在促进这些地区的物联网应用部署中发挥关键作用。凭借其广泛的覆盖范围和高速连接，这些卫星网络将赋予各种物联网设备能力，实现无缝数据传输，增强偏远和未充分服务地区用户的通信和连接性。此外，SpaceX
    Starlink和Amazon Kuiper LEO与物联网技术的集成将为农业、交通和环境监测等行业解锁新的可能性，彻底改变我们收集、分析和利用数据以改善决策和效率的方式。
- en: Throughput from Mb/s to Gb/s
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从Mb/s到Gb/s的吞吐量
- en: When IoT was initially designed for M2M communication in manufacturing plants,
    it was commonly accomplished using RS232 or RS485 wire interfaces. The twisted
    wire limited the data rate from a few hundred kilobits per second up to 10 Mb/s.
    However, with the emergence of advanced technologies such as Wi-Fi 5, Wi-Fi 6,
    4G/LTE, and 5G, the maximum data rate has significantly increased to a range of
    over 100 Mb/s to 1 Gb/s. This tremendous enhancement in data transfer capabilities
    has opened up a multitude of new possibilities for IoT applications.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当物联网最初是为制造工厂中的机器对机器（M2M）通信而设计时，通常使用RS232或RS485有线接口来实现。绞合线限制了数据率，从每秒几百千比特到10
    Mb/s。然而，随着Wi-Fi 5、Wi-Fi 6、4G/LTE和5G等先进技术的出现，最大数据率显著提高，达到100 Mb/s到1 Gb/s的范围。这种数据传输能力的巨大提升为物联网应用开辟了无数新的可能性。
- en: One of the major benefits of these advancements is the ability to support high-definition
    video surveillance. With the increased data rate, IoT devices can now transmit
    high-quality video feeds, allowing for better monitoring and security. This is
    particularly useful in areas such as public spaces, where surveillance is crucial
    for ensuring safety.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这些进步的主要好处之一是能够支持高清视频监控。随着数据率的提高，物联网设备现在可以传输高质量的视频流，从而实现更好的监控和安全。这在公共空间等需要确保安全的关键领域尤其有用。
- en: Another exciting possibility enabled by these advancements is the immersive
    experiences they can provide. With the higher data rate, IoT devices can now support
    technologies such as **augmented reality** (**AR**) and **virtual reality** (**VR**).
    This means that users can have more interactive and engaging experiences, whether
    it’s through AR apps that overlay digital information onto the real world or VR
    simulations that transport them to virtual environments.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这些进步带来的另一个令人兴奋的可能性是它们可以提供的沉浸式体验。随着数据率的提高，物联网设备现在可以支持诸如**增强现实**（**AR**）和**虚拟现实**（**VR**）等技术。这意味着用户可以拥有更多互动和吸引人的体验，无论是通过将数字信息叠加到现实世界上的AR应用，还是通过将他们带到虚拟环境中的VR模拟。
- en: Battery life from days to years
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 电池寿命从几天到几年
- en: Chasing a high data rate for IoT applications is not always necessary. While
    some IoT applications do require high data rates, it is important to consider
    that there are also many instances where external power input is not available.
    In these cases, the IoT applications must be powered by batteries that need to
    last for several years. As a trade-off, these applications can accept very low
    data rates ranging from a few bytes per second to a few hundred kilobits per second,
    and have higher latency of up to a few seconds.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于物联网应用来说，追求高数据率并不总是必要的。虽然一些物联网应用确实需要高数据率，但重要的是要考虑到也存在许多外部电源输入不可用的情况。在这些情况下，物联网应用必须由需要持续数年的电池供电。作为权衡，这些应用可以接受非常低的数据率，从每秒几字节到每秒几百千比特，并且具有高达几秒的更高延迟。
- en: Recognizing this need, in addition to continue exploring high data rate technology,
    industries also shifted their focus toward developing technologies offering low
    data rates and low power consumption. This has led to the emergence of various
    wireless technologies that cater to these requirements. LoRaWAN, which was mentioned
    earlier, is one such example. Other notable technologies include NB-IOT and LTE-M,
    which are offered by SPs through their cellular networks. Additionally, there
    is **Bluetooth Low Energy Long Range** (**BLE-LR**), and 802.11 ah Wi-Fi Halow.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到这一需求，除了继续探索高数据率技术外，行业还将其重点转向开发提供低数据率和低功耗的技术。这导致了各种无线技术的出现，以满足这些需求。之前提到的LoRaWAN就是这样一个例子。其他值得注意的技术包括由服务提供商（SPs）通过其蜂窝网络提供的NB-IOT和LTE-M。此外，还有**低功耗蓝牙长距离**（**BLE-LR**）和802.11
    ah Wi-Fi Halow。
- en: Networking from point-to-point and point-to-multipoint to mesh and star topologies
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从点对点、点对多点网络到网状和星型拓扑结构
- en: Traditional M2M communication, such as RS232 (point-to-point) and RS485 (point-to-multipoint)
    has limitations when it comes to the scale of nodes and communication distance.
    In order to overcome these limitations and expand IoT connectivity beyond manufacturing
    plants to residential, community, city, and rural areas, industries have developed
    mesh topologies. These mesh topologies connect IoT devices as child nodes and
    bridge to each other to deliver data to parent nodes, enabling a wider coverage
    area. Examples of mesh topologies include BLE and ZigBee meshes for smart homes
    and Wi-SUN meshes for utility smart metering.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的M2M通信，如RS232（点对点）和RS485（点对多点）在节点规模和通信距离方面存在局限性。为了克服这些局限性，并将物联网连接扩展到制造工厂之外的住宅、社区、城市和农村地区，行业开发了网状拓扑结构。这些网状拓扑结构将物联网设备作为子节点连接起来，并通过相互桥接将数据传输到父节点，从而实现更广泛的覆盖范围。网状拓扑结构的例子包括智能家居的BLE和ZigBee网状结构，以及用于智能电表的Wi-SUN网状结构。
- en: By implementing mesh topologies, the scale and coverage of IoT networks have
    been significantly extended. However, this expansion also brings forth new challenges,
    such as increased networking complexity, less efficient usage of radio resources,
    and higher device power consumption. Despite these challenges, the benefits of
    mesh topologies in terms of connectivity and coverage make them a viable solution
    for some specific use cases, as mentioned previously.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施网状拓扑结构，物联网网络的规模和覆盖范围得到了显著扩展。然而，这种扩展也带来了新的挑战，如网络复杂性增加、无线电资源使用效率降低和设备功耗更高。尽管存在这些挑战，但网状拓扑结构在连接和覆盖方面的优势使其成为某些特定用例的可行解决方案，如前所述。
- en: To address these challenges and meet the growing demands of industries, various
    networking approaches have been explored. One widely used option is the star topology,
    which offers networking simplicity, such as LoRaWAN, NB-IOT, LTE-M, and LEO satellite
    networks.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对这些挑战并满足行业日益增长的需求，已经探索了各种网络方法。一个广泛使用的选择是星型拓扑，它提供了网络简单性，如LoRaWAN、NB-IoT、LTE-M和LEO卫星网络。
- en: In a star topology, the IoT device can easily connect to an access device with
    just one radio hop. This access device can take the form of a LoRaWAN gateway,
    the base station (that is, eNodeB ) in a cellular network, or even a LEO satellite.
    This type of networking is known for its **Plug and Play** (**PnP**) functionality,
    making it easy to set up and use. Furthermore, it allows IoT devices to conserve
    power by entering deep sleep mode when they are not actively executing tasks,
    thereby reducing overall power consumption compared to a mesh topology where every
    device needs to be always on to bridge the network.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在星型拓扑中，物联网设备可以通过仅一个无线电跳转轻松连接到接入设备。这种接入设备可以是LoRaWAN网关、蜂窝网络中的基站（即eNodeB）甚至LEO卫星。这种类型的网络以其**即插即用**（**PnP**）功能而闻名，使其易于设置和使用。此外，它允许物联网设备在不执行任务时进入深度睡眠模式，从而节省能量，与需要始终开启以桥接网络的网状拓扑结构相比，整体功耗更低。
- en: Intelligence at edge node
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 边缘节点智能
- en: In the era of M2M communication, IoT devices, known as slave nodes, collect
    and transmit untapped protocol data to their upstream nodes, such as the RS232
    or RS485 master node. The main function of these IoT devices is to forward raw
    data without locally possessing intelligence. However, industries have recognized
    the benefits of developing local computing capabilities for IoT devices. This
    includes using containers on top of the device OS, Google TensorFlow, and AWS
    IoT Greengrass.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在M2M通信时代，物联网设备，也称为从节点，收集和传输未开发协议数据到其上游节点，如RS232或RS485主节点。这些物联网设备的主要功能是转发原始数据，而不在本地拥有智能。然而，行业已经认识到为物联网设备开发本地计算能力的好处。这包括在设备操作系统之上使用容器、Google
    TensorFlow和AWS IoT Greengrass。
- en: Edge intelligence provides significant advantages to IoT by processing untapped
    data locally using predefined algorithms instead of sending all raw data upstream
    indiscriminately. This approach leads to savings in backhaul bandwidth consumption,
    reduced application decision latency, and offloading work from the cloud.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘智能通过使用预定义的算法在本地处理未开发的数据，而不是无差别地将所有原始数据上传，为物联网提供了显著的优势。这种方法导致回程带宽消耗节省，应用决策延迟减少，以及从云端卸载工作。
- en: While the benefits of edge intelligence are significant, it is important to
    note that it may not be suitable for every IoT application. This is due to increased
    requirements for IoT device hardware design, such as the need for a powerful processor,
    larger memory, and high-power consumption.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然边缘智能的好处是显著的，但重要的是要注意，它可能并不适合每个物联网（IoT）应用。这是由于对物联网设备硬件设计的要求增加，例如需要强大的处理器、更大的内存和高功耗。
- en: AI and ML
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能（AI）和机器学习（ML）
- en: The evolution of intelligence does not stop at IoT devices alone. Industries
    are continuously pushing **artificial intelligence** (**AI**) and **machine learning**
    (**ML**) capabilities into the IoT cloud. By leveraging AI and ML algorithms,
    cloud platforms such as AWS and Microsoft Azure empower businesses to analyze
    and make sense of vast amounts of IoT data. These platforms provide advanced tools
    and services that enable organizations to develop intelligent applications, automate
    processes, and make data-driven decisions.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 智能化的演变不仅仅局限于物联网设备。各行业正在不断将**人工智能**（**AI**）和**机器学习**（**ML**）能力推向物联网云。通过利用AI和ML算法，云平台如AWS和Microsoft
    Azure使企业能够分析和理解大量物联网数据。这些平台提供了高级工具和服务，使组织能够开发智能应用、自动化流程并做出数据驱动的决策。
- en: One key advantage of integrating AI and ML into the cloud is the scalability
    and flexibility it offers. With the ability to scale resources on demand, businesses
    can easily handle the increasing volume, velocity, and variety of IoT data. This
    ensures that organizations can process and analyze data in real time, enabling
    them to respond quickly to changing conditions and make informed decisions.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI和ML集成到云中的关键优势是它提供的可扩展性和灵活性。通过按需扩展资源的能力，企业可以轻松处理物联网数据的增加量、速度和多样性。这确保了组织能够实时处理和分析数据，使他们能够快速响应变化的情况并做出明智的决策。
- en: Furthermore, AI and ML algorithms can uncover patterns, trends, and correlations
    in IoT data that might otherwise go unnoticed. This allows businesses to gain
    valuable insights into customer behavior, operational efficiency, and predictive
    maintenance, among other things. By leveraging these insights, organizations can
    optimize processes, improve customer experiences, and drive innovation.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，AI和ML算法可以在物联网数据中揭示可能被忽视的模式、趋势和相关性。这使企业能够从客户行为、运营效率、预测性维护等方面获得宝贵的见解。通过利用这些见解，组织可以优化流程、改善客户体验并推动创新。
- en: In addition to processing and analyzing IoT data, cloud platforms also provide
    the infrastructure and tools needed to train and deploy AI models. This enables
    businesses to build intelligent applications that can learn and adapt over time,
    improving their performance and accuracy. With services such as Amazon SageMaker
    and **Azure Machine Learning** (**AML**), organizations can easily develop, train,
    and deploy AI models without the need for extensive computational resources or
    expertise.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 除了处理和分析物联网数据外，云平台还提供了训练和部署AI模型所需的基础设施和工具。这使得企业能够构建能够学习和适应时间智能应用，提高其性能和准确性。通过像Amazon
    SageMaker和**Azure机器学习**（**AML**）这样的服务，组织可以轻松开发、训练和部署AI模型，而无需大量的计算资源或专业知识。
- en: Moreover, cloud-powered AI and ML bring the benefits of accessibility and affordability.
    By leveraging the cloud, businesses of all sizes can access cutting-edge AI and
    ML capabilities without the need for significant upfront investments in infrastructure
    or specialized talent. This democratization of AI allows organizations to level
    the playing field and compete in an increasingly data-driven world.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，云驱动的AI和ML带来了可访问性和经济性的好处。通过利用云服务，各种规模的企业都可以访问前沿的AI和ML能力，而无需在基础设施或专业人才上进行大量前期投资。这种AI的民主化使得组织能够在日益数据驱动的世界中实现竞争的公平性。
- en: With its exponential growth and rapid expansion from its initial purpose, IoT
    has ambitiously embraced and integrated various innovative technologies within
    a relatively short span of time. Its primary objective is to cater to an extensive
    market, extending beyond just homes and campuses to industries, cities, and even
    rural areas. By doing so, IoT seeks to revolutionize and transform the way we
    live, work, and interact with technology on a global scale, which proactively
    extending its addressable markets from residential, neighborhood, campus, city
    and rural areas. Let’s learn more about it next.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 随着其从最初目的的指数级增长和快速扩张，物联网在相对较短的时间内大胆地接纳并整合了各种创新技术。其主要目标是满足广泛的市场需求，不仅限于家庭和校园，还包括工业、城市甚至农村地区。通过这样做，物联网旨在在全球范围内革命性地改变我们的生活方式、工作方式以及与技术的互动方式，主动扩展其可触及的市场，从住宅、邻里、校园、城市和农村地区扩展出去。让我们在下一节中了解更多相关信息。
- en: Addressable markets
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 可触及市场
- en: When exploring the IoT addressable market, there are several approaches available
    to make segmentation possible, such as differentiating from technology specifications,
    application designs, business models, or applicable verticals. However, this chapter
    will focus on an easy-to-understand market segmentation approach based on the
    application’s premises. This approach can be especially beneficial for beginners
    to precisely identify their target market for innovation. By understanding where
    applications are being deployed, beginners can gain valuable insights into the
    specific needs and challenges of various locations.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索物联网可触及市场时，有几种方法可以实现细分，例如根据技术规格、应用设计、商业模式或适用的垂直行业进行区分。然而，本章将重点介绍一种基于应用场所的易于理解的市场细分方法。这种方法对于初学者来说特别有益，可以帮助他们精确地确定其创新的目标市场。通过了解应用部署的位置，初学者可以深入了解不同地点的具体需求和挑战。
- en: Residential
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 住宅
- en: A smart home is a convenient and accessible environment for beginners to practice
    their first IoT innovations. It provides a low-hanging fruit scenario for newbie
    developers to experiment with their innovation.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 智能家居是初学者练习他们第一次物联网创新的便利和可访问的环境。它为新开发者提供了一个低门槛的实验创新场景。
- en: One major advantage of a smart home is its easy access to existing home Wi-Fi
    networks, eliminating the need for additional network infrastructure. Additionally,
    the power supply is not a concern as IoT devices can be powered by DC power from
    wall sockets. Even for IoT devices that require batteries, replacing them is effortless
    when needed.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 智能家居的一个主要优势是它能够轻松访问现有的家庭Wi-Fi网络，消除了额外网络基础设施的需求。此外，电源供应也不是问题，因为物联网设备可以从墙壁插座获取直流电源。即使是需要电池的物联网设备，在需要更换时也很容易操作。
- en: There are already several major vendors that offer a central hub solution for
    hosting smart home applications, including Google Home, Amazon Alexa, and Apple
    HomeKit. Beginners can follow these vendors’ specifications to ensure compatibility
    and seamless integration of their IoT innovations into mobile applications and
    cloud platforms. This is particularly important for the recent smart home interworking
    protocols of **If This Then That** (**IFTTT**) and Matter.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 已经有几家主要供应商提供中央枢纽解决方案，用于托管智能家居应用，包括Google Home、Amazon Alexa和Apple HomeKit。初学者可以遵循这些供应商的规范，以确保其物联网创新与移动应用程序和云平台兼容并实现无缝集成。这对于最近出现的智能家居互操作协议**如果这个，那么那个**（**IFTTT**）和**Matter**尤为重要。
- en: 'The following is a list of the top 10 popular smart home applications:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一份最受欢迎的10大智能家居应用列表：
- en: Indoor temperature and humidity monitoring
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 室内温度和湿度监测
- en: Smoke/flame detectors
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 烟/火焰探测器
- en: Security cameras
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全摄像头
- en: Smart lighting/bulbs
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能照明/灯泡
- en: Smart thermostats
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能恒温器
- en: Smart locks
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能锁
- en: Smart doorbells
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能门铃
- en: Smart wall power socket
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能墙壁插座
- en: Smart garage door opener
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能车库门开启器
- en: Smart trash bin
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能垃圾桶
- en: Without a doubt, the primary focus for IoT deployment is at home due to its
    significant market scale and easy **go-to-market** (**GTM**) approach. In comparison,
    IoT applications designed for commercial and business markets present higher requirements
    for product quality, management, reliability, and security, along with the potential
    for higher profit margins.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，物联网部署的主要焦点在家用领域，这得益于其巨大的市场规模和易于**市场推广**（**GTM**）的方法。相比之下，为商业和商务市场设计的物联网应用对产品质量、管理、可靠性和安全性有更高的要求，同时也有可能获得更高的利润率。
- en: Security concerns pertaining to the use of IoT applications within the home
    environment primarily revolve around potential breaches of privacy. These concerns
    arise from the fact that these IoT devices, which are increasingly becoming pervasive
    in our daily lives, are often connected to the internet and, therefore, carry
    the inherent risk of sensitive personal information being exposed to unauthorized
    individuals or entities.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 与家庭环境中使用物联网应用相关的安全担忧主要围绕潜在的隐私侵犯。这些担忧源于这些物联网设备，它们在我们的日常生活中越来越普遍，通常连接到互联网，因此存在敏感个人信息被未授权的个人或实体暴露的风险。
- en: Commercial and business
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业和商务
- en: IoT applications in commercial and business locations can be easily extended
    from smart home applications. For instance, a smoke detector can be used in both
    homes and business buildings. However, accessing enterprise Wi-Fi networks poses
    challenges due to the security mechanisms implemented for enterprise-grade access.
    While accessing a home Wi-Fi network requires simply using the Wi-Fi **service
    set identifier** (**SSID**) and password, accessing an enterprise Wi-Fi network
    requires support for **Wi-Fi Protected Access 2** (**WPA2**), 802.1X **Extensible
    Authentication Protocol** (**EAP**), and **Remote Authentication Dial-In User
    Service** (**RADIUS**) authentication.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 商业和商务场所的物联网应用可以轻松地从智能家居应用扩展。例如，烟雾探测器可以在家庭和商业建筑中使用。然而，由于企业级访问所实施的安全机制，访问企业Wi-Fi网络面临挑战。虽然访问家庭Wi-Fi网络只需简单地使用Wi-Fi服务集标识符（SSID）和密码，但访问企业Wi-Fi网络则需要支持Wi-Fi保护接入2（WPA2）、802.1X可扩展认证协议（EAP）和远程认证拨号用户服务（RADIUS）认证。
- en: When it comes to installing and managing IoT devices within a business location,
    there are two usual challenges. Firstly, finding an external power supply above
    the floor is not always easy. You cannot simply lay power cords inside the building
    as you please. Secondly, if you are deploying hundreds of devices, you will need
    to create a management solution to effectively monitor and manage them.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到在商业场所安装和管理物联网设备时，通常有两个挑战。首先，在地板上方找到外部电源并不总是容易。你不能随意在建筑内铺设电源线。其次，如果你要部署数百个设备，你需要创建一个管理解决方案来有效地监控和管理它们。
- en: 'The following is a list of the top 10 popular IoT applications within commercial
    and business locations:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在商业和商务场所中排名前十的流行物联网应用列表：
- en: Indoor temperature and humidity monitoring
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 室内温度和湿度监测
- en: Smoke/flame detectors
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 烟雾/火焰探测器
- en: Security cameras
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全摄像头
- en: Smart lighting/bulbs
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能照明/灯泡
- en: Smart **Heating, Ventilation, and Air Conditioning** (**HVAC**) management
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能供暖、通风和空调（HVAC）管理
- en: Smart parking
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能停车
- en: Asset tracking and inventory management
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资产跟踪和库存管理
- en: Water leakage detection
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 水泄漏检测
- en: Building intrusion detection
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建筑入侵检测
- en: Occupancy detection
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 占用检测
- en: The IoT applications designed for commercial and business markets mainly focus
    on indoor deployment, while at its adjacent segment, penetrating the community
    and campus market has to overcome challenges from the deployment of IoT applications
    in open spaces, the outdoor case, which raises the bar to the product’s robustness
    and reliability.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 为商业和商务市场设计的物联网应用主要关注室内部署，而在其相邻的社区和校园市场，要克服在开放空间、户外部署物联网应用的挑战，这提高了产品的鲁棒性和可靠性标准。
- en: Securing IoT applications in commercial and business environments involves regular
    device updates, strong authentication, secure boot processes, and **hardware security
    modules** (**HSMs**) to protect devices. Network security is enhanced through
    encryption, network segmentation, firewalls, and **intrusion detection systems**
    (**IDSs**). Data security measures include encrypting data at rest and in transit,
    strict access controls, and data minimization. Cloud security involves secure
    APIs, compliance with regulations, and regular security audits. Physical security
    measures include access control and tamper detection.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业和商务环境中确保物联网应用的安全涉及定期设备更新、强认证、安全的引导过程以及**硬件安全模块（HSMs**）来保护设备。网络安全通过加密、网络分段、防火墙和**入侵检测系统（IDSs**）得到增强。数据安全措施包括加密静态数据和传输中的数据、严格的访问控制和数据最小化。云安全涉及安全的API、符合法规和定期的安全审计。物理安全措施包括访问控制和篡改检测。
- en: Neighborhood and campus
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 社区和校园
- en: Most IoT applications in neighborhood and campus settings are primarily focused
    on outdoor use cases. The process of building IoT applications in neighborhood
    and campus environments poses greater challenges compared to commercial and business
    premises. These challenges include the need for outdoor ruggedized design, reliable
    wireless connectivity, and power supply availability.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在社区和校园环境中的大多数物联网应用主要关注户外用例。在社区和校园环境中构建物联网应用的过程与商业和办公场所相比，面临着更大的挑战。这些挑战包括需要户外加固设计、可靠的无线连接和电源供应可用性。
- en: When IoT devices come to outdoor hardware designs, they adhere to the **Ingress
    Protection standard** (**IP grade**). This standard ensures that the hardware
    is capable of withstanding various environmental factors and conditions, such
    as dust, water, and extreme temperatures. By following the IP grade, manufacturers
    can ensure that their outdoor hardware is durable, reliable, and suitable for
    outdoor deployments. Whether it is for smart city infrastructure, rural area applications,
    or neighborhood and campus settings, outdoor hardware needs to be designed with
    the utmost consideration for protection and resilience. The details will be explained
    in the *Device types* section of [*Chapter 3*](B22002_03.xhtml#_idTextAnchor068).
    Wireless connectivity in the neighborhood and campus poses a challenge. Ideally,
    a public 802.11 Wi-Fi network should be able to meet the requirements. However,
    IoT devices must support WPA2, 802.1X EAP, and RADIUS authentication, as with
    the security access mechanism used in enterprise networks. In case a public 802.11
    Wi-Fi network is not available, alternative networks should be explored.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当物联网设备进入户外硬件设计时，它们遵循**防护等级标准**（**IP等级**）。该标准确保硬件能够承受各种环境因素和条件，如灰尘、水和极端温度。通过遵循IP等级，制造商可以确保其户外硬件耐用、可靠，并适合户外部署。无论是用于智能城市基础设施、农村地区应用还是社区和校园环境，户外硬件的设计必须充分考虑保护和弹性。具体细节将在[*第3章*](B22002_03.xhtml#_idTextAnchor068)的[*设备类型*](B22002_03.xhtml#_idTextAnchor068)部分进行解释。社区和校园中的无线连接面临挑战。理想情况下，公共802.11
    Wi-Fi网络应该能够满足需求。然而，物联网设备必须支持WPA2、802.1X EAP和RADIUS身份验证，就像在企业网络中使用的安全访问机制一样。如果公共802.11
    Wi-Fi网络不可用，应探索其他网络。
- en: One option is to access the 4G/LTE or 5G network provided by local SPs. To do
    this, your IoT device module needs to have a compatible cellular module. You will
    also need to purchase a SIM card and data plan from the SPs. Another option is
    to access the LoRaWAN network hosted by local public LoRaWAN operators. The worst-case
    scenario is that you build your own private LoRaWAN network, although this option
    can be complex and costly.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 一种选择是接入当地服务提供商（SP）提供的4G/LTE或5G网络。为此，您的物联网设备模块需要具备兼容的蜂窝模块。您还需要从SP那里购买SIM卡和数据计划。另一种选择是接入由当地公共LoRaWAN运营商托管的LoRaWAN网络。最坏的情况是，您需要构建自己的私有LoRaWAN网络，尽管这个选项可能复杂且成本高昂。
- en: Another major challenge in neighborhood and campus settings is the availability
    of an external power supply for IoT devices. It can be difficult to find an accessible
    power source or to lay down power cables to the installation location. To address
    this issue, it is recommended to design IoT devices with low power consumption,
    incorporating solar panels or rechargeable batteries.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在社区和校园环境中，另一个主要挑战是物联网设备的外部电源供应。找到可访问的电源或铺设电源线到安装位置可能很困难。为了解决这个问题，建议设计低功耗的物联网设备，并集成太阳能板或可充电电池。
- en: 'The following is a list of the top 10 popular IoT applications within neighborhood
    and campus locations:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在社区和校园位置内最受欢迎的10个物联网应用列表：
- en: Smart pathway lighting
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能路径照明
- en: Smoke/flame detectors
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 烟雾/火焰探测器
- en: Security cameras
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全摄像头
- en: Smart parking
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能停车
- en: Smart water irrigation
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能灌溉
- en: Smart health care
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能医疗保健
- en: Asset/pet tracking
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资产/宠物追踪
- en: Smart waste management
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能垃圾管理
- en: Wireless emergency button
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无线紧急按钮
- en: Facility security
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设施安全
- en: The neighborhood and campus markets need to support IoT applications either
    by fixed installations or local mobility within a limited area. In most cases,
    enterprise Wi-Fi and private LoRaWAN networks are the preferred cost-effective
    options. 4G/LTE and 5G can also be considered, but cost is always the top concern.
    For the city market, in addition to cost, wide area mobility, seamless coverage,
    and business scalability also matter.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 社区和校园市场需要通过固定安装或限定区域内的本地移动性来支持物联网应用。在大多数情况下，企业Wi-Fi和私有LoRaWAN网络是首选的经济高效选项。4G/LTE和5G也可以考虑，但成本始终是首要考虑因素。对于城市市场，除了成本外，广域移动性、无缝覆盖和业务可扩展性也很重要。
- en: In terms of security considerations, neighborhood and campus spaces are significantly
    more vulnerable to potential attacks. This increased vulnerability is due to the
    openness of these spaces, which allows users to bring their own IoT devices. For
    example, a user might bring a device such as a pet tracking tag. These devices,
    while useful and convenient, can inadvertently introduce security risks into the
    network, thereby increasing the potential for unauthorized access and attacks.
    Therefore, it’s crucial to have robust security measures in place to mitigate
    these risks and protect the network.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在安全考虑方面，社区和校园空间对潜在攻击的脆弱性显著增加。这种增加的脆弱性是由于这些空间的开放性，允许用户携带自己的物联网设备。例如，用户可能会携带一个宠物追踪标签。这些设备虽然有用且方便，但可能会无意中引入网络安全风险，从而增加未经授权的访问和攻击的可能性。因此，实施强大的安全措施来减轻这些风险并保护网络至关重要。
- en: Cities
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 城市
- en: When IoT applications are deployed in cities, they can be seen as an expanded
    version of community and campus environments, but on a larger scale and with more
    challenges. The main challenges are ensuring wide area mobility, seamless coverage,
    and business scalability. To address these challenges, one option is to utilize
    a 4G/LTE or 5G network provided by local SPs or access the public LoRaWAN network
    from local LoRaWAN operators.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当物联网应用在城市中部署时，它们可以被视为社区和校园环境的扩展版本，但规模更大，挑战更多。主要挑战是确保广域移动性、无缝覆盖和业务可扩展性。为了应对这些挑战，一个选择是利用本地服务提供商提供的4G/LTE或5G网络，或者从本地LoRaWAN运营商那里接入公共LoRaWAN网络。
- en: 'The following is a list of the top 10 popular IoT applications within cities:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在城市中排名前10的流行物联网应用列表：
- en: Smart street lighting
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能街灯
- en: Noise detection
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 噪音检测
- en: Security cameras
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全摄像头
- en: Smart parking
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能停车
- en: Smart water irrigation
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能灌溉
- en: Connected car
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 联网汽车
- en: Asset/pet tracking
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资产/宠物追踪
- en: Smart waste management
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能垃圾管理
- en: Air quality monitoring
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 空气质量监测
- en: Facility security
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设施安全
- en: The city market is the most complex and challenging segment, especially due
    to its geographic space. The rural market is also a challenging one, as it often
    lacks cellular network coverage despite having IoT applications deployed over
    large areas.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 城市市场是最复杂和最具挑战性的部分，这主要归因于其地理空间。农村市场也是一个挑战，因为它尽管在大面积部署了物联网应用，但往往缺乏蜂窝网络覆盖。
- en: Security considerations for IoT deployment in cities are also a multifaceted
    challenge. As cities become increasingly interconnected and reliant on IoT technologies
    for their functioning, the importance of ensuring the security of these systems
    escalates significantly. Foremost among security concerns is the complexity arising
    from the sheer number of interconnected devices. Cities deploying IoT technologies
    may be dealing with millions of devices, each representing a potential point of
    vulnerability. These devices, ranging from traffic sensors to smart meters, all
    need to be secured to prevent malicious actors from exploiting them, which is
    a daunting task due to their sheer number and diversity. Data security is another
    major concern. The vast amount of data generated by IoT devices needs to be securely
    transmitted, stored, and processed. This data often includes sensitive personal
    information, making its security a key priority. Any breach in data security could
    have severe implications, ranging from privacy violations to significant operational
    disruptions.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在城市中部署物联网的安全考虑也是一个多方面的挑战。随着城市越来越互联互通，越来越依赖物联网技术来维持其运作，确保这些系统的安全性变得至关重要。首要的安全问题是由于大量互联设备产生的复杂性。部署物联网技术的城市可能正在处理数百万个设备，每个设备都代表一个潜在的安全漏洞点。这些设备，从交通传感器到智能电表，都需要得到保护，以防止恶意行为者利用它们，这是一个由于数量庞大和多样性而令人畏惧的任务。数据安全是另一个主要问题。物联网设备产生的海量数据需要安全地传输、存储和处理。这些数据通常包括敏感的个人隐私信息，因此其安全性是一个关键优先事项。任何数据安全漏洞都可能产生严重的影响，从隐私侵犯到重大的运营中断。
- en: Rural areas
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 农村地区
- en: IoT applications deployed in rural areas are most relevant to agriculture, the
    natural environment, and wildlife tourism. In most cases, there is a lack of cellular
    network coverage. The options include accessing the public LoRaWAN network from
    local LoRaWAN operators, building your own private LoRaWAN network, or accessing
    LEO satellite networks. However, both hardware costs (**CapEx**) and data plans
    (**OpEx**) are always a concern.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在农村地区部署的物联网应用最相关的是农业、自然环境野生动物旅游。在大多数情况下，存在蜂窝网络覆盖不足的问题。可选择的方案包括从当地LoRaWAN运营商那里接入公共LoRaWAN网络，建立自己的私有LoRaWAN网络，或接入LEO卫星网络。然而，无论是硬件成本（**CapEx**）还是数据计划（**OpEx**），总是存在担忧。
- en: 'The following is a list of the top 10 popular IoT applications within cities:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在城市中部署的前10个最受欢迎的物联网应用列表：
- en: Soil moisture monitoring
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 土壤湿度监测
- en: Wildfire detection
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 野火检测
- en: Air quality monitoring
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 空气质量监测
- en: River water pollution monitoring
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 河流水污染监测
- en: Flood monitoring
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 洪水监测
- en: Landslide alerting
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 山体滑坡警报
- en: Animal tracking
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动物追踪
- en: Fleet management
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 车队管理
- en: Security cameras
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全摄像头
- en: Facility security
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设施安全
- en: The rural area market is witnessing the flourishing of IoT applications related
    to agriculture production, environment protection, and natural disaster-proofing.
    However, wireless connectivity remains a top concern that needs to be addressed.
    As with the industrial market, there are numerous options available for resolving
    this issue.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 农村地区的市场正在见证与农业生产、环境保护和自然灾害防护相关的物联网应用的蓬勃发展。然而，无线连接仍然是一个需要解决的主要问题。与工业市场一样，有众多选项可用于解决这个问题。
- en: Security considerations for rural areas are often less complex than those for
    cities. The primary reason behind this is that rural areas are likely to have
    fewer types of IoT applications. For example, in a city, IoT technology might
    be used for everything from traffic management systems to smart home applications
    and environmental monitoring. In contrast, in a rural setting, the applications
    might be more limited, perhaps focusing mainly on agriculture or weather monitoring.
    This limited scope can result in fewer security concerns, simply because there
    are fewer potential points of vulnerability. However, it’s still crucial to have
    robust security measures in place, regardless of the complexity or scope of the
    IoT deployment.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 农村地区的安全考虑通常比城市简单。主要原因是农村地区可能拥有更少的物联网应用类型。例如，在城市中，物联网技术可能被用于从交通管理系统到智能家居应用和环境保护的各个方面。相比之下，在农村环境中，应用可能更加有限，可能主要关注农业或天气监测。这种有限的范围可能导致更少的安全问题，仅仅是因为潜在的安全漏洞点更少。然而，无论物联网部署的复杂度或范围如何，实施稳健的安全措施仍然至关重要。
- en: Industries
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工业
- en: IoT is also an indispensable component of Industry 4.0\. It empowers a multitude
    of industrial processes such as smart manufacturing, predictive maintenance, and
    **supply-chain optimization** (**SCO**). Through the collection and analysis of
    real-time data, IoT enhances automation, improves energy management, ensures quality
    control, and enables customized production.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 物联网（IoT）也是工业4.0不可或缺的组成部分。它赋能了众多工业流程，如智能制造、预测性维护和**供应链优化**（**SCO**）。通过收集和分析实时数据，物联网增强了自动化，改善了能源管理，确保了质量控制，并实现了定制化生产。
- en: However, the integration of IoT in industrial environments is not without challenges.
    These include ensuring robust security measures to protect against cyberattacks,
    achieving interoperability among a diverse range of devices, managing vast volumes
    of data, and scaling systems efficiently. Balancing the costs of implementation,
    addressing privacy concerns, obtaining the necessary technical expertise, and
    maintaining reliability in demanding industrial environments are also significant
    hurdles to overcome.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，物联网在工业环境中的集成并非没有挑战。这包括确保强大的安全措施以抵御网络攻击，实现各种设备的互操作性，管理大量数据，以及高效地扩展系统。平衡实施成本、解决隐私问题、获得必要的专业技术以及在苛刻的工业环境中保持可靠性也是需要克服的重大障碍。
- en: Despite these challenges, overcoming them is of paramount importance for industries
    to fully leverage the potential of IoT. The increased efficiency, innovation,
    and competitiveness that IoT offers can revolutionize industrial processes and
    significantly enhance productivity and profitability.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在这些挑战，但克服它们对于行业充分利用物联网的潜力至关重要。物联网提供的提高效率、创新和竞争力可以彻底改变工业流程，并显著提高生产率和盈利能力。
- en: In the industrial market, IoT applications are often unique, leading to a wide
    variety of wireless connectivity options across different verticals. Depending
    on the specific needs and requirements of the industry, various wireless connectivity
    options can be utilized. These may include Wi-Fi 6, 6E, and 7, private 4G/LTE
    such as **Citizens Broadband Radio Service** (**CBRS**), 5G **Ultra-Reliable Low
    Latency Communications** (**URLLC**), **WiSUN** mesh, **ISA100**, and **WirelessHART**
    for more specialized applications.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在工业市场中，物联网应用通常具有独特性，导致不同垂直行业之间存在广泛的无线连接选项。根据行业的具体需求和需求，可以采用各种无线连接选项。这些可能包括Wi-Fi
    6、6E和7，私有4G/LTE，如**公民宽带无线电服务**（**CBRS**），5G **超可靠低延迟通信**（**URLLC**），**WiSUN**网状网络，**ISA100**和**WirelessHART**用于更专业的应用。
- en: 'The following is a list of the top 10 popular IoT applications within industries:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在工业领域内最受欢迎的10大物联网应用列表：
- en: Smart metering
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能计量
- en: '**Supervisory Control and Data** **Acquisition** (**SCADA**)'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控与数据采集**（**SCADA**）'
- en: Automotive mobile robotics
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 汽车移动机器人
- en: Security cameras
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全摄像头
- en: Pipeline leakage monitoring
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管道泄漏监测
- en: Preventive maintenance
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预防性维护
- en: Fleet management
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 车队管理
- en: Asset tracking
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资产追踪
- en: '**Hazardous location** (**Hazloc**) monitoring'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**危险区域**（**Hazloc**）监测'
- en: Facility security and people safety
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设施安全和人员安全
- en: The **industrial IoT** (**IIOT**) market is unique compared to other IoT markets
    because each vertical, such as utilities, mining, oil and gas, manufacturing,
    and transportation, has its own specific requirements. This requires special expertise
    from IoT application developers in these industries. This situation raises the
    bar for market penetration.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他物联网市场相比，**工业物联网**（**IIOT**）市场具有独特性，因为每个垂直行业，如公用事业、采矿、石油和天然气、制造和运输，都有自己的特定要求。这要求物联网应用开发者在这些行业拥有特殊的专业知识。这种情况提高了市场渗透的门槛。
- en: We are seeing the widespread use of IoT applications in many markets, such as
    homes, cities, and industries. This expansion is not only changing our immediate
    surroundings but also influencing various aspects of our lives. In the next section,
    we will discuss the real effects of this technological revolution. We will look
    at how IoT is changing convenience and efficiency in our homes, promoting sustainable
    and smart solutions in our cities, and transforming processes and safety measures
    in industries. Each of these areas shows the diverse impact of IoT, highlighting
    its significant role in the era of digital transformation.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到物联网应用在许多市场得到广泛应用，如家庭、城市和工业。这种扩展不仅改变了我们的直接环境，还影响了我们生活的各个方面。在下一节中，我们将讨论这次技术革命的真正影响。我们将探讨物联网如何改变我们家庭的便利性和效率，推动城市中的可持续和智能解决方案，以及改变工业中的流程和安全措施。这些领域都展示了物联网的多样化影响，突显了它在数字化转型时代的重要作用。
- en: How IoT impacts us
  id: totrans-152
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 物联网对我们的影响
- en: Following the stride of IoT expanding into new spaces, it consistently impacts
    us from every corner, every dimension, and every time. Some of them you are just
    aware of, with tangible benefits that catch your attention remarkably; some of
    them you are ignoring because they have already been part of your daily life for
    many years.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 随着物联网向新空间的扩展步伐，它始终从各个角落、各个维度和每一次接触中影响我们。其中一些是你意识到的，它们带来的实际好处显著地吸引了你的注意；而另一些你可能正在忽视，因为它们已经是你日常生活的一部分多年了。
- en: In summary, there are four key improvements that have been brought about by
    the expansion of IoT into various spaces. These improvements have had a significant
    impact on our lives, making them more comfortable, safe, efficient, and environmentally
    friendly.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，物联网向各个空间的扩展带来了四个关键性的改进。这些改进对我们生活产生了重大影响，使我们的生活更加舒适、安全、高效和环保。
- en: Living comfort and safety improvement
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生活舒适度和安全性提升
- en: In our daily lives, IoT has brought about numerous benefits, greatly enhancing
    our comfort and safety within various areas of our living spaces.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的日常生活中，物联网（IoT）带来了众多好处，极大地提升了我们在居住空间各个领域的舒适度和安全性。
- en: Personal care
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 个人护理
- en: Personal care is one of the most popular IoT applications among individuals,
    typically using a smartwatch to measure heart rate, blood oxygen level, walking
    steps, and location. With the widespread adoption of BLE and the streamlined Matter
    protocol, increasingly portable IoT devices are being connected to mobile devices
    and forwarding real-time data to the cloud platform.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 个人护理是个人中最受欢迎的物联网应用之一，通常使用智能手表来测量心率、血氧水平、步数和位置。随着蓝牙（BLE）的广泛应用和Matter协议的简化，越来越多的便携式物联网设备正在连接到移动设备，并将实时数据转发到云端平台。
- en: In the past, your grandpa may have measured his blood pressure daily and then
    written the value down in his notebook. He would then bring the recorded daily
    data to his family doctor during monthly visits. While IoT technology makes it
    more convenient and enables easy data delivery to family doctors, there are new
    innovative blood pressure monitors in the market that have BLE connectivity to
    mobile phone apps and then to cloud platforms. The collected daily data is recorded
    and aggregated in mobile phone apps and forwarded to the cloud. Family doctors
    can have real-time visibility into people’s blood pressure management situation
    and can even be promptly alerted by abnormal events.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，你的爷爷可能每天测量血压，然后将数值记录在他的笔记本上。他会在每月的访问中将记录的每日数据带给家庭医生。而物联网技术使得这一过程更加方便，并能够轻松地将数据传输给家庭医生。市场上出现了新的创新血压计，它们具有与手机应用和云平台连接的蓝牙（BLE）功能。收集到的每日数据在手机应用中记录和汇总，并转发到云端。家庭医生可以实时了解人们的血压管理情况，甚至可以及时收到异常事件的警报。
- en: Today, thanks to low-power-consumption MCUs, sensors, and wireless technologies,
    battery-powered IoT applications are increasingly emerging in the field of personal
    care, especially for the elderly, children, and individuals with disabilities.
    While smart wearables remain the most popular option in the market, we are also
    witnessing other innovations; for example, a BLE- and LoRaWAN-equipped wireless
    emergency button on necklaces for the elderly can trigger alerts anywhere to associated
    caregivers in case of emergencies; a location tracking tag on children’s backpacks
    that transmits GPS information to parents’ mobile apps through ubiquitous 4G/LTE
    networks; a blind cane equipped with ultrasound sensors to detect distance to
    obstacles in front of blind people and sound an alarm if they are too close.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，得益于低功耗MCU、传感器和无线技术，电池供电的物联网应用在个人护理领域日益增多，尤其是为老年人、儿童和残疾人。虽然智能可穿戴设备仍然是市场上最受欢迎的选择，但我们也在见证其他创新；例如，为老年人佩戴的带有BLE和LoRaWAN的无线紧急按钮可以在紧急情况下向相关护理人员发出警报；儿童背包上的位置追踪标签通过无处不在的4G/LTE网络将GPS信息传输到父母的移动应用；为盲人配备超声波传感器的拐杖，可以检测盲人前方障碍物的距离，并在他们太靠近时发出警报。
- en: Sweet home
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 甜蜜的家
- en: Home is a cozy place to relax and unwind, and it has also become a shining stage
    where IoT is actively dancing. Thanks to home Wi-Fi connectivity, people now have
    the power to remotely control a wide range of smart home appliances with just
    a few taps on their smartphones. This technological advancement has truly transformed
    the way we interact with our homes.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 家是一个舒适的地方，可以放松和放松心情，它也已经成为物联网积极舞动的闪亮舞台。多亏了家庭Wi-Fi的连接，人们现在只需在智能手机上轻点几下，就能远程控制各种智能家居设备。这项技术进步真正改变了我们与家互动的方式。
- en: Imagine having a smart thermostat that not only measures the room temperature
    in real time but also automatically adjusts the home HVAC system to your desired
    level of comfort. Gone are the days of manually adjusting the thermostat; now,
    you can simply use your smartphone to ensure that your home is always at the perfect
    temperature. Forgot to turn off the HVAC when you left home? No worries! You can
    either remotely turn it off through mobile apps, or your smart thermostat system
    can automatically turn it off when it detects that nobody is staying in the room.
    But that is not all. With a smart power wall outlet, you can schedule your home
    appliances to turn on or off at specific times, allowing you to save electricity
    and reduce your carbon footprint. Gone are the days of accidentally leaving appliances
    on; now, you can have peace of mind knowing that your home is energy-efficient
    and environmentally friendly. And let us not forget about smart lighting bulbs.
    These innovative lighting solutions can automatically switch on or off based on
    ambient brightness. Say goodbye to fumbling around in the dark or wasting energy
    by leaving lights on during the day.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下拥有一个智能恒温器，它不仅能实时测量室内温度，还能自动调节家庭HVAC系统到您想要的舒适水平。手动调节恒温器的日子已经过去了；现在，您只需使用智能手机就可以确保您的家始终保持完美的温度。离开家时忘记关闭HVAC？不用担心！您可以通过移动应用远程关闭它，或者当智能恒温器系统检测到房间里没有人时，它会自动关闭。但这还不是全部。有了智能电源插座，您可以安排您的家用电器在特定时间开启或关闭，这样您可以节省电力并减少碳足迹。不小心让电器保持开启的日子已经过去了；现在，您可以安心地知道您的家是节能和环保的。而且，我们不要忘记智能照明灯泡。这些创新的光照解决方案可以根据环境亮度自动开关。告别在黑暗中摸索或白天留下灯光浪费能源的日子。
- en: Furthermore, IoT has greatly improved safety in residential spaces. By leveraging
    diverse IoT technologies, home security systems have become more intelligent,
    offering a wider range of features to ensure the security and peace of mind of
    homeowners. These systems now include wireless surveillance cameras, motion sensors,
    and smart windows and door locks, which work together to provide a comprehensive
    security solution. Through internet connectivity and mobile phone apps, users
    can easily access live video feeds from their surveillance cameras, receive instant
    notifications about any suspicious activity detected by the motion sensors, and
    even remotely lock or unlock their doors. More smart security-related applications
    are coming from smart home industries. For example, traditionally, home smoke
    detectors would only sound alarms locally within the house. However, with IoT
    integration, smoke detectors can now send alerts to your mobile phone apps through
    the internet, allowing homeowners to receive notifications about potential fire
    hazards even when they are away from home. This added layer of connectivity and
    convenience ensures that homeowners can take immediate action to prevent any potential
    disasters.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，物联网在住宅空间的安全性方面也取得了极大的提升。通过利用各种物联网技术，家庭安全系统变得更加智能，提供了更广泛的功能，以确保业主的安全和安心。这些系统现在包括无线监控摄像头、运动传感器和智能门窗锁，它们协同工作，提供全面的安全解决方案。通过互联网连接和手机应用程序，用户可以轻松访问监控摄像头的实时视频流，接收运动传感器检测到的任何可疑活动的即时通知，甚至可以远程锁定或解锁他们的门。更多智能安全相关应用正来自智能家居行业。例如，传统上，家庭烟雾报警器只会在家内本地发出警报。然而，通过物联网集成，烟雾报警器现在可以通过互联网将警报发送到您的手机应用程序，使业主即使在离家在外也能收到关于潜在火灾危险的提醒。这一额外的连接和便利性确保了业主可以立即采取行动，防止任何潜在灾难。
- en: Operational efficiency improvement
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运营效率提升
- en: Premises such as businesses, commercials, merchandise stores, school campuses,
    and cities serve as battlegrounds for IoT to fight against operational inefficiency.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 商业、商业区、商品店、校园和城市等场所是物联网对抗运营低效率的战场。
- en: Energy saving
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 节能
- en: Energy consumption at these locations is the largest factor contributing to
    operational costs. This includes costs related to electricity, water, and gas.
    With the advent of IoT technology, there are innovative solutions available to
    optimize electricity consumption specifically for lighting and HVAC systems. By
    implementing IoT technology, business owners can improve energy efficiency and
    reduce costs. With IoT, ceiling lighting and HVAC systems can be intelligently
    controlled to work according to the actual demands of the building. This means
    that the lights and air conditioning will only be turned on when needed, rather
    than being constantly on.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这些地点的能源消耗是导致运营成本最大的因素。这包括与电力、水和燃气相关的成本。随着物联网技术的出现，有创新的解决方案可用于优化照明和暖通空调系统的电力消耗。通过实施物联网技术，企业主可以提高能源效率并降低成本。借助物联网，天花板照明和暖通空调系统可以智能控制，根据建筑的实际需求工作。这意味着灯光和空调只有在需要时才会打开，而不是持续开启。
- en: A real-life example that demonstrates the application of smart energy technology
    is in meeting rooms. In these spaces, IoT sensors are utilized to detect human
    activity. When these sensors detect that there is no activity in the meeting room,
    the system is automatically triggered to dim the lighting and air conditioning,
    reducing their intensity or turning them off completely.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 一个展示智能能源技术应用的真实例子是在会议室。在这些空间中，物联网传感器被用来检测人类活动。当这些传感器检测到会议室没有活动时，系统会自动触发，降低灯光和空调的强度或完全关闭。
- en: Predictive maintenance
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测性维护
- en: Commercial buildings are equipped with a wide array of machines and equipment
    that are critical for their proper functioning and the safety and comfort of the
    people inside. These machines include water pumps, gas valves, ventilation systems,
    air conditioning compressors, and many more. Any malfunction or failure in these
    systems can have profound consequences. However, with the help of IoT sensors,
    it is now possible to monitor and track the performance of these machines in real
    time. These sensors can detect any anomalies or deviations from normal operating
    conditions and predict potential malfunctions or failures before they occur. This
    allows for proactive and preventive maintenance measures to be taken, ensuring
    that any issues are addressed before they escalate and cause disruptions. By implementing
    IoT sensors, commercial buildings can greatly improve their operational efficiency,
    reduce downtime, and enhance the overall safety and comfort of their occupants.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 商业建筑配备了各种机器和设备，这些对于其正常运作以及室内人员的安全和舒适至关重要。这些机器包括水泵、气阀、通风系统、空调压缩机等等。这些系统中的任何故障或故障都可能导致严重后果。然而，借助物联网传感器，现在可以实时监控和跟踪这些机器的性能。这些传感器可以检测任何异常或偏离正常操作条件的情况，并在它们发生之前预测潜在的故障或故障。这允许采取主动和预防性的维护措施，确保任何问题在升级并造成干扰之前得到解决。通过实施物联网传感器，商业建筑可以大大提高其运营效率，减少停机时间，并提高其居民的总体安全和舒适度。
- en: A real-life example is the use of vibration monitoring applications on air conditioning
    compressors. In this case, an IoT sensor is attached to the compressors to record
    vibration range data. The sensor then sends the real-time data to the cloud. The
    system administrator can access online visibility to monitor the operational status
    of the compressor and will be alerted if the data analysis predicts the need for
    maintenance.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 一个现实生活中的例子是在空调压缩机上使用振动监测应用。在这种情况下，一个物联网传感器被连接到压缩机上以记录振动范围数据。然后，传感器将实时数据发送到云端。系统管理员可以在线访问以监控压缩机的运行状态，如果数据分析预测需要维护，系统将发出警报。
- en: Another case in commercial buildings is the detection of water leakage. This
    is a frequent problem that can lead to severe damage if not addressed promptly.
    To address this issue, water leakage detection sensors can be strategically installed
    at the corners of the room where water pipelines are more prone to leaks. These
    sensors continuously monitor for any drops of water leakage and immediately alert
    the building administrators in case of any. This proactive approach ensures that
    any potential water leakage is identified and dealt with swiftly, minimizing the
    risk of extensive damage and providing a safe and secure environment for everyone
    using the meeting rooms.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业建筑中，另一个案例是检测水泄漏。这是一个常见问题，如果未能及时解决，可能会导致严重损坏。为了解决这个问题，可以在房间角落的战略位置安装水泄漏检测传感器，这些位置的水管更容易发生泄漏。这些传感器会持续监控任何水泄漏的迹象，并在发生任何情况时立即向建筑物管理员发出警报。这种主动方法确保任何潜在的水泄漏都能被迅速识别和处理，从而最大限度地减少广泛损坏的风险，并为使用会议室的每个人提供一个安全和舒适的环境。
- en: Environmental protection improvement
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 环境保护改善
- en: Open field spaces such as natural areas, forests, national parks, mountains,
    rivers, offshore areas, and oceans are remarkable occasions for adopting IoT applications.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 开阔地带，如自然区域、森林、国家公园、山脉、河流、近海区域和海洋，是采用物联网应用的绝佳场合。
- en: Disaster warning
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 灾害预警
- en: Disaster monitoring is an extremely important aspect of environmental protection.
    The ability to effectively monitor and respond to disasters is crucial for saving
    lives and minimizing damage. In areas where there is often no cellular coverage,
    innovative IoT applications utilizing alternative wireless backhauls, such as
    LoRaWAN and LEO satellites, have emerged as key players in disaster monitoring
    efforts.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 灾害监测是环境保护的一个极其重要的方面。有效地监测和应对灾害的能力对于拯救生命和最大限度地减少损害至关重要。在通常没有蜂窝覆盖的地区，利用替代无线回程的创新物联网应用，如LoRaWAN和LEO卫星，已成为灾害监测工作中的关键参与者。
- en: A real case is a volcano activity monitoring application through vibration sensors
    with LoRaWAN wireless backhaul. These vibration sensors are strategically installed
    in the volcano area to continuously monitor the vibration data of rocks in real
    time. This valuable data is then transmitted to a cloud platform where scientists
    and researchers can access and analyze it. By utilizing this advanced technology,
    experts are able to closely observe and study volcanic activity, enabling them
    to make more accurate predictions and take necessary precautions to ensure the
    safety of nearby communities and infrastructure.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 一个真实的案例是通过LoRaWAN无线回程的振动传感器对火山活动进行监控的应用。这些振动传感器被战略性地安装在火山区域，以实时监控岩石的振动数据。这些宝贵的数据随后被传输到云平台，科学家和研究人员可以访问并分析它。通过利用这项先进技术，专家能够密切观察和研究火山活动，使他们能够做出更准确的预测，并采取必要的预防措施，以确保附近社区和基础设施的安全。
- en: Another example of how IoT technology is being used is in the detection of wildfires
    in California. Flame detection sensors have been installed in areas prone to wildfires.
    If a fire starts, these sensors will be triggered and send an alarm to the cloud,
    allowing the government to take immediate action. This is an important development
    as it helps in the early detection and prevention of wildfires, ultimately protecting
    lives and property.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 物联网技术被应用的另一个例子是在加利福尼亚州检测野火。火焰检测传感器已被安装在易发生野火的地区。如果发生火灾，这些传感器将被触发并向云平台发送警报，使政府能够立即采取行动。这是一个重要的发展，因为它有助于早期检测和预防野火，最终保护生命和财产安全。
- en: Pollution monitoring
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 污染监测
- en: Pollution control is one of the significant benefits brought by IoT to environmental
    protection. In addition to disaster monitoring, IoT technology has facilitated
    the development and implementation of various smart sensors for pollution detection.
    These sensors can detect a wide range of pollutants, including but not limited
    to carbon dioxide (CO2), ammonia (NH3), nitrogen oxides (NOx), alcohol, benzene,
    smoke, particulate matter (PM2.5), acetone, thinner, formaldehyde, and water quality.
    By utilizing these smart sensors, environmental agencies and organizations can
    effectively monitor and mitigate pollution levels, leading to a healthier and
    safer environment for all.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 污染控制是物联网为环境保护带来的显著好处之一。除了灾害监测外，物联网技术还促进了各种智能传感器的发展和应用，用于污染检测。这些传感器可以检测包括但不限于二氧化碳（CO2）、氨（NH3）、氮氧化物（NOx）、酒精、苯、烟雾、颗粒物（PM2.5）、丙酮、稀释剂、甲醛和水质量在内的广泛污染物。通过利用这些智能传感器，环境机构和组织可以有效地监控和减轻污染水平，从而为所有人创造一个更健康、更安全的环境。
- en: A real-life example to consider is the implementation of air quality sensors
    on the factory chimney. These highly advanced sensors are designed to accurately
    measure the quality of exhaust emissions. By doing so, they provide valuable data
    that can be seamlessly transmitted to the government’s central monitoring system.
    This allows for continuous monitoring and analysis of the factory’s environmental
    impact, aiding in the enforcement of regulations and the implementation of necessary
    measures to ensure improved air quality.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 一个值得考虑的真实案例是在工厂烟囱上实施空气质量传感器。这些高度先进的传感器被设计用来准确测量废气排放的质量。通过这样做，它们提供了可以无缝传输到政府中央监控系统的宝贵数据。这允许对工厂的环境影响进行持续监控和分析，有助于执行法规并实施必要的措施，以确保改善空气质量。
- en: A similar case is river water quality monitoring sensors. By installing these
    sensors at the riverside, particularly near factories or residential areas, the
    government can effectively monitor the quality of river water. This monitoring
    system plays a crucial role in ensuring the health and safety of both the environment
    and the people living nearby. Additionally, these sensors provide valuable data
    that can be used for further analysis and decision-making regarding water management
    and pollution control measures.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个类似的案例是在河边安装河流水质监测传感器。通过在河流附近，尤其是工厂或住宅区附近安装这些传感器，政府可以有效地监控河流水质。这个监控系统在确保环境和附近居民的健康与安全方面发挥着至关重要的作用。此外，这些传感器提供了可用于进一步分析和决策的有价值的数据，包括但不限于水管理和污染控制措施。
- en: Industrial productivity improvement
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工业生产率提升
- en: Industries such as manufacturing, utilities, oil and gas, mining, transportation,
    and agriculture are always significantly benefited by IoT technologies.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 制造业、公用事业、石油和天然气、采矿、交通和农业等行业始终显著受益于物联网技术。
- en: Cost savings
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本节约
- en: One of the major advantages of implementing IoT is the significant cost savings,
    particularly in terms of labor costs. This cost reduction can be attributed to
    the automation and optimization of various processes and tasks made possible by
    IoT technology. By leveraging IoT devices and systems, businesses can streamline
    their operations, eliminate manual and time-consuming tasks, and increase efficiency.
    This not only leads to cost savings but also allows for the reallocation of resources
    to other areas of the business, fostering growth and innovation.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 实施物联网的一个主要优势是显著的成本节约，尤其是在劳动力成本方面。这种成本降低可以归因于物联网技术实现的自动化和流程及任务的优化。通过利用物联网设备和系统，企业可以简化其运营，消除手动和时间消耗的任务，并提高效率。这不仅导致成本节约，还允许将资源重新分配到业务的其它领域，促进增长和创新。
- en: A real case is the **Advanced Metering Infrastructure** (**AMI**) in the utilities
    industry. There are millions of electricity meters within a state in the US, and
    it is super costly to assign technicians to read such scale of meters on every
    street and every month. Nowadays, IoT has introduced various wireless technologies,
    such as 802.15.4 mesh, for collecting data from those meters. In other countries,
    utility companies are now using LoRaWAN, NB-IoT, and LTE-M for the same purpose.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 一个真实的案例是公用事业行业中的**高级计量基础设施**（**AMI**）。在美国的一个州内，有数百万个电表，派遣技术人员到每个街道每月读取如此规模的电表成本极高。如今，物联网引入了各种无线技术，如802.15.4网状网络，用于收集这些电表的数据。在其他国家，公用事业公司现在使用LoRaWAN、NB-IoT和LTE-M来达到同样的目的。
- en: Another case is smart water irrigation in the agriculture business. To conserve
    water during irrigation, farmers currently install soil moisture sensors in the
    ground. These sensors measure the water saturation level and report it to the
    customer service center. If the water saturation meets the requirements of the
    plants, the irrigation system will be stopped. Additionally, the customer service
    center will determine the daily water irrigation volume based on the local climate
    forecast. If rain is predicted for the following day, they will adjust the water
    irrigation volume accordingly.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个案例是农业领域的智能灌溉。为了在灌溉过程中节约用水，农民目前在地里安装土壤湿度传感器。这些传感器测量水的饱和度并将结果报告给客服中心。如果水的饱和度达到植物的需求，灌溉系统将会停止。此外，客服中心会根据当地的气候预报确定每日的灌溉水量。如果预测第二天有雨，他们将会相应地调整灌溉水量。
- en: Scale expansion
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 规模扩展
- en: Wireless IoT technology is revolutionizing the industrial scale by eliminating
    the constraints of cables, providing greater flexibility and convenience for industrial
    customers. With its ability to connect various devices and collect real-time data,
    wireless IoT technology enables businesses to optimize their operations, improve
    efficiency, and make informed decisions. Additionally, this technology opens new
    possibilities for automation, remote monitoring, predictive maintenance, and enhanced
    safety measures in industrial settings. The widespread adoption of wireless IoT
    technology is transforming industries and driving innovation across sectors, leading
    to increased productivity, cost savings, and improved overall performance.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 无线物联网技术通过消除电缆的限制，为工业客户提供更大的灵活性和便利性，正在改变工业规模。凭借其连接各种设备和收集实时数据的能力，无线物联网技术使企业能够优化其运营，提高效率，并做出明智的决策。此外，这项技术还为工业环境中的自动化、远程监控、预测性维护和增强安全措施开辟了新的可能性。无线物联网技术的广泛应用正在改变行业，推动各领域的创新，导致生产率提高、成本节约和整体性能改善。
- en: One example of a real case is the implementation of **Autonomous Mobility Robotics**
    (**AMR**) in various settings such as manufacturing plants, warehouses, and logistic
    distribution centers. IoT has made it more convenient to provide Wi-Fi, 4G/LTE,
    and 5G connectivity to AMR units at any location where customers wish to establish
    a new site.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一个真实的案例是在各种环境中实施**自主移动机器人**（**AMR**），如制造工厂、仓库和物流配送中心。物联网使得在任何客户希望建立新站点的位置为AMR单元提供Wi-Fi、4G/LTE和5G连接变得更加方便。
- en: Summary
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we embarked on a journey through the fundamental concepts of
    IoT, gained insights into its vast and ever-expanding market, and explored how
    IoT seamlessly integrates into various markets, from our personal spaces in homes
    to the broader realms of cities and industries. The chapter also shed light on
    the profound impact of IoT, illustrating how it is not just reshaping our interactions
    with technology but also revolutionizing our day-to-day efficiency, sustainability,
    and overall quality of life. By understanding the basics and recognizing the major
    influence of IoT, we set the stage for delving deeper into each of its architecture’s
    composed elements and got ready to practice the 10 engineering projects listed
    in [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302), including hardware illustration,
    ChatGPT prompt templates, and example codes.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们开始了对物联网基本概念的探索之旅，对其广阔且不断扩大的市场有了深入了解，并探讨了物联网如何无缝地融入各种市场，从我们家里的个人空间到更广泛的城镇和工业领域。本章还揭示了物联网的深远影响，说明了它不仅正在重塑我们与技术互动的方式，而且正在彻底改变我们的日常效率、可持续性和整体生活质量。通过了解基础知识并认识到物联网的主要影响，我们为深入探讨其架构的各个组成部分做好了准备，并准备好实践第11章中列出的10个工程项目，包括硬件说明、ChatGPT提示模板和示例代码。
- en: Further reading
  id: totrans-195
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: There are many professional books talking about IoT from different perspectives,
    the following book is highly recommended which were written my former talent colleagues.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多专业书籍从不同角度讨论物联网，以下这本书非常推荐，是由我以前的天才同事所写。
- en: '*IoT F*[*undamentals*](https://www.amazon.com/David-Hanes/e/B001JP501O/ref=dp_byline_cont_book_1)*:
    Networking Technolo*[*gies, Protocols, a*](https://www.amazon.com/s/ref=dp_byline_sr_book_3?ie=UTF8&field-author=Patrick+Grossetete&text=Patrick+Grossetete&sort=relevancerank&search-alias=books)*nd*
    [*Use Cases fo*](https://www.amazon.com/s/ref=dp_byline_sr_book_4?ie=UTF8&field-author=Robert+Barton&text=Robert+Barton&sort=relevancerank&search-alias=books)*r*
    [*the Internet*](https://www.amazon.com/s/ref=dp_byline_sr_book_5?ie=UTF8&field-author=Jerome+Henry&text=Jerome+Henry&sort=relevancerank&search-alias=books)
    *of Things, David Hanes, Gonzalo Salgueiro, Patrick Grossetete, Robert Barton,
    Jerome Henry,* *Cisco Press*.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '*物联网基础*[*：网络技术、协议、应用案例*](https://www.amazon.com/David-Hanes/e/B001JP501O/ref=dp_byline_cont_book_1)*，作者：David
    Hanes, Gonzalo Salgueiro, Patrick Grossetete, Robert Barton, Jerome Henry, *Cisco
    Press*。'
- en: 'It’s a good idea to acquaint yourself with key terms associated with IoT before
    moving forward. Following are some of them:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续前进之前，了解与物联网相关的关键术语是个好主意。以下是一些：
- en: '| **Term** | **Explanation** |'
  id: totrans-199
  prefs: []
  type: TYPE_TB
  zh: '| **术语** | **解释** |'
- en: '| --- | --- |'
  id: totrans-200
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| **IoT** | **Internet of Things**, a network of interconnected devices that
    can collect and exchange data using embedded sensors, software, and other technologies.
    |'
  id: totrans-201
  prefs: []
  type: TYPE_TB
  zh: '| **物联网** | **物联网**，一个由相互连接的设备组成的网络，这些设备可以使用嵌入式传感器、软件和其他技术收集和交换数据。|'
- en: '| **Gateway** | An aggregate device that stays between the end device and the
    internet, providing secured wired or wireless connectivity and data transport
    protocol support. |'
  id: totrans-202
  prefs: []
  type: TYPE_TB
  zh: '| **网关** | 位于终端设备和互联网之间的聚合设备，提供安全的有线或无线连接和数据传输协议支持。|'
- en: '| **End device** | An individual device at the end of the IoT network to generate
    data or execute commands, usually comprising an MCU, sensors, actuators, and wireless
    backhaul. |'
  id: totrans-203
  prefs: []
  type: TYPE_TB
  zh: '| **终端设备** | 物联网网络末端的单个设备，用于生成数据或执行命令，通常包括微控制器、传感器、执行器和无线回程。|'
- en: '| **MCU** | Microcontroller unit, a compact process in an embedded system.
    |'
  id: totrans-204
  prefs: []
  type: TYPE_TB
  zh: '| **MCU** | 微控制器单元，嵌入式系统中的紧凑型过程。|'
- en: '| **Sensor** | A device that detects and responds to some type of input from
    the physical environment, such as temperature, light, pressure, and so on. |'
  id: totrans-205
  prefs: []
  type: TYPE_TB
  zh: '| **传感器** | 一种检测并对物理环境中的某些类型输入做出响应的设备，例如温度、光线、压力等。|'
- en: '| **Actuator** | A device responsible for moving or controlling a mechanism
    or system, often receiving an operational indication from an upstream control
    system. |'
  id: totrans-206
  prefs: []
  type: TYPE_TB
  zh: '| **执行器** | 负责移动或控制机械或系统的设备，通常从上游控制系统接收操作指示。|'
- en: '| **Node** | A node is typically a physical device or a data point in a network
    that can send, receive, or route data. |'
  id: totrans-207
  prefs: []
  type: TYPE_TB
  zh: '| **节点** | 节点通常是网络中的物理设备或数据点，可以发送、接收或路由数据。|'
- en: '| **Edge computing** | A method of optimizing cloud computing systems by performing
    data processing at the edge of the network, near the source of the data. |'
  id: totrans-208
  prefs: []
  type: TYPE_TB
  zh: '| **Edge computing** | 一种通过在网络边缘，即数据源附近进行数据处理来优化云计算系统的方法。 |'
- en: '| **Cloud computing** | A model that enables easy and convenient access to
    a shared pool of configurable computing resources (such as networks, servers,
    storage, applications, analytics, and intelligence services) through the internet.
    |'
  id: totrans-209
  prefs: []
  type: TYPE_TB
  zh: '| **Cloud computing** | 一种通过互联网方便、便捷地访问共享的可配置计算资源池（如网络、服务器、存储、应用程序、分析和智能服务）的模型。
    |'
- en: '| **Wireless backhaul** | The use of wireless communication systems to transport
    data from remote network edges to a central network, or the core of the network.
    |'
  id: totrans-210
  prefs: []
  type: TYPE_TB
  zh: '| **Wireless backhaul** | 使用无线通信系统将数据从远程网络边缘传输到中心网络或网络核心的方法。 |'
- en: '| **4G/LTE** | The fourth generation of the cellular network standard, offering
    faster data transfer rates than 3G networks. |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| **4G/LTE** | 4G/LTE 移动网络标准的第四代，比 3G 网络提供更快的传输速率。 |'
- en: '| **5G** | The fifth generation of the cellular network standard, offering
    higher speeds and reduced latency compared to 4G/LTE. |'
  id: totrans-212
  prefs: []
  type: TYPE_TB
  zh: '| **5G** | 5G 移动网络标准的第五代，与 4G/LTE 相比，提供更高的速度和更低的延迟。 |'
- en: '| **NB-IOT** | **Narrowband IoT**, a low-power **wide area network** (**WAN**)
    radio technology standard from 4G/LTE that focuses on wide coverage, low cost,
    long battery life, and high connection density. |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '| **NB-IOT** | **窄带物联网**，4G/LTE 标准中的一种低功耗广域网（WAN）无线电技术标准，专注于广泛的覆盖、低成本、长电池寿命和高连接密度。
    |'
- en: '| **LTE-M** | **Long-Term Evolution for Machine**, a type of low-power WAN
    radio technology from 4G/LTE standard tailored for IoT, allowing for longer battery
    life and better indoor coverage. |'
  id: totrans-214
  prefs: []
  type: TYPE_TB
  zh: '| **LTE-M** | **机器长期演进**，4G/LTE 标准中的一种低功耗广域网（WAN）无线电技术，针对物联网进行了定制，允许更长的电池寿命和更好的室内覆盖。
    |'
- en: '| **Wi-Fi** | A wireless technology that provides wireless network connections,
    following the *IEEE 802.11* family of standards, to various devices such as computers,
    smartphones, and smart home devices without physical wired connections. |'
  id: totrans-215
  prefs: []
  type: TYPE_TB
  zh: '| **Wi-Fi** | 一种无线技术，遵循 *IEEE 802.11* 标准系列，为各种设备如电脑、智能手机和智能家居设备提供无线网络连接，无需物理有线连接。
    |'
- en: '| **Wi-Fi 6** | 802.11ax Wi-Fi. |'
  id: totrans-216
  prefs: []
  type: TYPE_TB
  zh: '| **Wi-Fi 6** | 802.11ax Wi-Fi。 |'
- en: '| **Wi-Fi 6E** | An extension of Wi-Fi 6, operating in the 6 GHz frequency
    band, providing faster speeds and lower latencies. |'
  id: totrans-217
  prefs: []
  type: TYPE_TB
  zh: '| **Wi-Fi 6E** | Wi-Fi 6 的扩展，在 6 GHz 频段运行，提供更快的速度和更低的延迟。 |'
- en: '| **Wi-Fi 7** | 802.11be Wi-Fi. |'
  id: totrans-218
  prefs: []
  type: TYPE_TB
  zh: '| **Wi-Fi 7** | 802.11be Wi-Fi。 |'
- en: '| **Wi-Fi HaLow** | 802.11ah Wi-Fi, a Wi-Fi specification developed for IoT;
    its main distinction lies in its use of sub-1 GHz license-exempt bands. |'
  id: totrans-219
  prefs: []
  type: TYPE_TB
  zh: '| **Wi-Fi HaLow** | 802.11ah Wi-Fi，为物联网开发的 Wi-Fi 规范；其主要区别在于其使用免许可证的 sub-1 GHz
    频段。 |'
- en: '| **LoRa** | A spread spectrum modulation technique derived from **chirp spread
    spectrum** (**CSS**) technology, designed for long-range, low-power communication
    between IoT devices. |'
  id: totrans-220
  prefs: []
  type: TYPE_TB
  zh: '| **LoRa** | 一种源自 **跳频扩频**（**CSS**）技术的扩频调制技术，专为物联网设备之间的长距离、低功耗通信设计。 |'
- en: '| **LoRaWAN** | A low-power, wide-area networking **Media Access Control**
    (**MAC**) layer protocol based on the LoRa modulation, designed for wirelessly
    connecting battery-operated “things” to the internet in regional, national, or
    global networks, and is commonly used in IoT applications such as smart cities
    and IIoT. |'
  id: totrans-221
  prefs: []
  type: TYPE_TB
  zh: '| **LoRaWAN** | 一种基于 LoRa 调制的低功耗广域网（WAN）**媒体访问控制**（**MAC**）层协议，旨在将电池供电的“事物”无线连接到区域、国家或全球网络，常用于物联网应用，如智能城市和工业物联网。
    |'
- en: '| **BLE** | **Bluetooth Low Energy**, a wireless personal area network technology
    designed and marketed for novel applications in healthcare, fitness, beacons,
    security, and home entertainment. |'
  id: totrans-222
  prefs: []
  type: TYPE_TB
  zh: '| **BLE** | **蓝牙低功耗**，一种无线个人区域网络技术，设计和营销用于医疗保健、健身、信标、安全和家庭娱乐等新型应用。 |'
- en: '| **BLE-LR** | **Bluetooth Low Energy Long Range**, an extension of BLE, optimized
    for long-range connectivity. |'
  id: totrans-223
  prefs: []
  type: TYPE_TB
  zh: '| **BLE-LR** | **蓝牙低功耗长距离**，蓝牙的扩展，针对长距离连接进行了优化。 |'
- en: '| **ZigBee** | A low-power, wireless mesh networking technology, based on the
    *IEEE 802.15.4* standard, commonly used for connecting simple, smart devices such
    as home automation systems and IoT sensors. |'
  id: totrans-224
  prefs: []
  type: TYPE_TB
  zh: '| **ZigBee** | 一种基于 *IEEE 802.15.4* 标准的低功耗无线网状网络技术，常用于连接简单的智能设备，如智能家居系统和物联网传感器。
    |'
- en: '| **Matter** | An open source, royalty-free connectivity standard that enables
    reliable, secure communication among a wide range of smart devices. |'
  id: totrans-225
  prefs: []
  type: TYPE_TB
  zh: '| **Matter** | 一种开源、免版税的连接标准，能够实现各种智能设备之间可靠、安全的通信。 |'
- en: '| **Thread** | A low-power, wireless mesh networking protocol designed for
    IoT devices to communicate on a local network. |'
  id: totrans-226
  prefs: []
  type: TYPE_TB
  zh: '| **Thread** | 一种专为物联网设备设计的低功耗无线网状网络协议，用于在本地网络中进行通信。|'
- en: '| **MQTT** | **Message Queuing Telemetry Transport**, a lightweight, **publish-subscribe**
    (**pub/sub**) network protocol, ideal for the minimal-bandwidth, high-latency
    communication required in various IoT applications, such as remote monitoring.
    |'
  id: totrans-227
  prefs: []
  type: TYPE_TB
  zh: '| **MQTT** | **消息队列遥测传输**（Message Queuing Telemetry Transport），一种轻量级的**发布/订阅**（publish-subscribe，简称pub/sub）网络协议，非常适合在多种物联网应用中所需的低带宽、高延迟通信，例如远程监控。|'
- en: '| **Raspberry Pi** | A small and all-in-one computer that you can use to learn
    programming and for practical projects, widely used in IoT for its versatility.
    |'
  id: totrans-228
  prefs: []
  type: TYPE_TB
  zh: '| **Raspberry Pi** | 一款小型一体机，可用于学习编程和进行实际项目，因其多功能性在物联网领域得到广泛应用。|'
- en: '| **Arduino** | An open source electronics platform, known for its accessible
    software and versatile hardware boards, extensively utilized in education, prototyping,
    and DIY (Do It Yourself) projects, enabling enthusiasts and professionals alike
    to develop interactive gadgets that can sense and manipulate the physical environment.
    |'
  id: totrans-229
  prefs: []
  type: TYPE_TB
  zh: '| **Arduino** | 一个开源的电子平台，以其易用的软件和多功能硬件板而闻名，广泛应用于教育、原型设计和DIY（Do It Yourself）项目中，使爱好者和专业人员都能开发出能够感知和操作物理环境的交互式小工具。|'
- en: '| **RISC-V** | An open standard **instruction set architecture** (**ISA**)
    based on established **reduced instruction set computer** (**RISC**) principles,
    often used in microprocessors for IoT devices due to its flexibility and adaptability.
    |'
  id: totrans-230
  prefs: []
  type: TYPE_TB
  zh: '| **RISC-V** | 一种基于已确立的**精简指令集计算机**（reduced instruction set computer，简称RISC）原则的**指令集架构**（instruction
    set architecture，简称ISA），由于其灵活性和适应性，常用于物联网设备的微处理器中。|'
