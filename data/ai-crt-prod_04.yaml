  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你将了解所有增强你现有创意任务的工具，帮助你找到镜头、选择图像的某个部分、在长视频剪辑中定位文字、在长篇论文中揭示意义，等等。
