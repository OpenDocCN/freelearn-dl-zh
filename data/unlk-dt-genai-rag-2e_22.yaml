- en: '19'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '19'
- en: Advanced RAG with Complete Memory Integration
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 完整记忆集成的先进 RAG
- en: In [*Chapter 18*](B34736_18_ePub.xhtml#_idTextAnchor447), we built the foundation
    of procedural memory, which is a domain-agnostic learning system that enables
    agents to extract patterns from conversations and apply them at the appropriate
    hierarchical level. We saw how this system transforms static agents into adaptive
    ones, learning what works for different users, communities, and tasks. But that
    was just the beginning. Now, we need to integrate this procedural memory with
    the episodic and semantic memories from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422)
    to create a complete cognitive architecture, and explore the practical considerations
    that make these systems production-ready.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [*第 18 章*](B34736_18_ePub.xhtml#_idTextAnchor447) 中，我们构建了程序性记忆的基础，这是一个领域无关的学习系统，它使代理能够从对话中提取模式并在适当的分层级别上应用它们。我们看到了这个系统如何将静态代理转变为适应性代理，学习对不同用户、社区和任务有效的方法。但这只是开始。现在，我们需要将这个程序性记忆与来自
    [*第 17 章*](B34736_17_ePub.xhtml#_idTextAnchor422) 的情景记忆和语义记忆集成，以创建一个完整的认知架构，并探讨使这些系统适用于生产的实际考虑因素。
- en: This chapter completes the journey by showing you how to create a fully integrated
    **Cognitive Architectures for Language Agents** (**CoALA**) agent that combines
    all memory types for truly intelligent behavior. We’ll explore LangMem’s different
    learning algorithms and when each excels, dive into the critical decisions around
    metric design that fundamentally shape how your agent evolves, and provide a complete
    framework for adapting this architecture to any domain. Whether you’re building
    a healthcare assistant, an educational tutor, or a customer service bot, this
    chapter equips you with everything needed to deploy production-ready learning
    agents.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章通过向您展示如何创建一个完全集成的 **语言代理的认知架构**（**CoALA**）代理，该代理结合了所有内存类型以实现真正的智能行为来完成旅程。我们将探索
    LangMem 的不同学习算法以及何时每个算法表现最佳，深入到围绕度量设计的关键决策，这些决策从根本上塑造了您的代理如何进化，并提供了一个将此架构适应任何领域的完整框架。无论您是在构建医疗助手、教育导师还是客户服务机器人，本章都为您提供了部署生产就绪学习代理所需的一切。
- en: Before we dive in, let’s clarify the relationship between the libraries and
    custom code in this chapter.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入之前，让我们明确本章中库和自定义代码之间的关系。
- en: LangMem is a real, open source library from LangChain that provides the core
    primitives for memory extraction and prompt optimization (`create_memory_manager`,
    `create_prompt_optimizer`). However, LangMem itself doesn’t provide a complete
    agent architecture. Throughout *Chapters 17* to *18*, we’ve been building a custom
    framework on top of LangMem that implements the CoALA pattern with hierarchical
    learning, domain separation, and integrated memory types. The files you’ll work
    with, including `coala_agent.py`, `procedural_memory.py`, `domain_agent.py`, and
    the domain-specific implementations, are all custom code created for this book.
    They demonstrate how to architect production-ready learning agents using LangMem’s
    building blocks. All of this code is available in the GitHub repository, ready
    for you to use, modify, and adapt to your own domains.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: LangMem 是 LangChain 提供的一个真实、开源的库，它为内存提取和提示优化提供了核心原语（`create_memory_manager`，`create_prompt_optimizer`）。然而，LangMem
    本身并不提供完整的代理架构。在 *第 17 章* 到 *第 18 章* 的过程中，我们一直在 LangMem 的基础上构建一个自定义框架，实现了具有分层学习、领域分离和集成内存类型的
    CoALA 模式。你将需要处理的文件，包括 `coala_agent.py`、`procedural_memory.py`、`domain_agent.py`
    以及特定领域的实现，都是为这本书编写的自定义代码。它们展示了如何使用 LangMem 的构建块来设计生产就绪的学习代理。所有这些代码都可在 GitHub 仓库中找到，供你使用、修改和适应你自己的领域。
- en: 'In this chapter, we’ll cover the following key topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下关键主题：
- en: Code lab 19.1 – creating a full CoALA agent with integrated memory systems
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 19.1 – 创建一个具有集成内存系统的完整 CoALA 代理
- en: 'LangMem’s learning algorithms: choosing the right approach'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangMem 的学习算法：选择正确的途径
- en: 'Designing domain metrics: the art of measuring success'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计领域度量：衡量成功的艺术
- en: 'Adapting to your domain: from investment advisor to any expert system'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适应您的领域：从投资顾问到任何专家系统
- en: The foundation we laid in [*Chapter 18*](B34736_18_ePub.xhtml#_idTextAnchor447)
    with procedural memory now needs to be integrated with the episodic and semantic
    memories from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422). While [*Chapter
    18*](B34736_18_ePub.xhtml#_idTextAnchor447) showed how procedural memory learns
    and adapts strategies, the real power emerges when all three memory types work
    together – episodic memory providing conversation context, semantic memory supplying
    extracted facts, and procedural memory applying learned strategies.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在 [*第 18 章*](B34736_18_ePub.xhtml#_idTextAnchor447) 中建立的基础，现在需要与来自 [*第 17
    章*](B34736_17_ePub.xhtml#_idTextAnchor422) 的情景记忆和语义记忆集成。虽然 [*第 18 章*](B34736_18_ePub.xhtml#_idTextAnchor447)
    展示了程序性记忆如何学习和适应策略，但真正的力量在于所有三种记忆类型共同工作 – 情景记忆提供对话上下文，语义记忆提供提取的事实，程序性记忆应用学习到的策略。
- en: Let’s build this complete system and see how the memories reinforce each other
    to create truly adaptive, intelligent agents.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建这个完整的系统，看看记忆是如何相互加强，以创建真正适应性强、智能的代理。
- en: Technical requirements
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'To complete the hands-on exercises in this chapter, you’ll need the following
    software and resources:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成本章的动手练习，你需要以下软件和资源：
- en: '**Development environment**: You’ll need a Python 3.8+ environment capable
    of running the code. While the examples can be run in various ways (Python scripts,
    IDE, or command line), using a Jupyter Notebook environment is recommended as
    it allows you to step through the code cell by cell and observe the learning progression
    at each stage.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发环境**：你需要一个能够运行代码的 Python 3.8+ 环境。虽然示例可以通过多种方式运行（Python 脚本、IDE 或命令行），但推荐使用
    Jupyter Notebook 环境，因为它允许你逐个步骤地执行代码单元格，并观察每个阶段的进度。'
- en: '**Software** **requirements**:'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**软件** **要求**：'
- en: '**Python 3.8 or higher**: Required for running the code labs.'
  id: totrans-17
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python 3.8 或更高版本**：运行代码实验室所必需。'
- en: '**pip package manager**: For installing Python dependencies .'
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pip 软件包管理器**：用于安装 Python 依赖项。'
- en: '**OpenAI API access**: You’ll need an OpenAI API key for GPT model access and
    embeddings generation. Store your key securely in an `env.txt` file as `OPENAI_API_KEY=your_key_here`.'
  id: totrans-19
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI API 访问**：你需要一个 OpenAI API 密钥来访问 GPT 模型和生成嵌入。请将你的密钥安全地存储在 `env.txt`
    文件中，格式为 `OPENAI_API_KEY=your_key_here`。'
- en: '**Text editor or IDE**: VS Code, PyCharm, Jupyter Notebook, or similar for
    writing and running Python code.'
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本编辑器或 IDE**：VS Code、PyCharm、Jupyter Notebook 或类似工具，用于编写和运行 Python 代码。'
- en: '**Git** (optional): For cloning the GitHub repository.'
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Git**（可选）：用于克隆 GitHub 仓库。'
- en: '**Hardware requirements**:'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬件** **要求**：'
- en: '**Minimum 8GB RAM** (16GB recommended for smooth performance with vector databases)'
  id: totrans-23
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**至少 8GB RAM**（推荐 16GB 以获得与向量数据库顺畅性能）。'
- en: '**2 GB free disk space** for dependencies, vector stores, and persistent memory
    storage'
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2 GB 空闲磁盘空间** 用于依赖项、向量存储和持久性内存存储'
- en: '**Internet connection** for downloading packages and accessing the OpenAI API'
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互联网连接** 用于下载软件包和访问 OpenAI API'
- en: '**Chapter resources**:'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**章节资源**：'
- en: '**GitHub repository**: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_19](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_19)'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub 仓库** [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_19](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_19)'
- en: '**Complete code files**: The code lab (`19.1`) is available in the GitHub repository
    for reference'
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完整代码文件**：代码实验室（`19.1`）在 GitHub 仓库中提供参考。'
- en: The completed code in the GitHub repository can serve as a reference if you
    need to verify your implementation at any step.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在任何步骤需要验证你的实现，GitHub 仓库中的完成代码可以作为参考。
- en: Code lab 19.1 – creating a complete CoALA agent with integrated memory systems
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室 19.1 – 创建一个具有集成记忆系统的完整 CoALA 代理
- en: With the procedural memory system fully functional and tested, we’re ready to
    integrate it with the episodic and semantic memories from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422).
    Next, we’ll create the complete CoALA agent that combines all three memory types
    for truly intelligent, adaptive behavior.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在程序性记忆系统完全功能并经过测试后，我们准备将其与来自 [*第 17 章*](B34736_17_ePub.xhtml#_idTextAnchor422)
    的情景记忆和语义记忆集成。接下来，我们将创建一个完整的 CoALA 代理，该代理结合了所有三种记忆类型，以实现真正智能、自适应的行为。
- en: Step 1 – create the complete agent with all memory types
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 1 步 – 创建包含所有记忆类型的完整代理
- en: Now, we integrate our domain-agnostic procedural memory system with the baseline
    agent to create a complete CoALA agent. This demonstrates how all three memory
    types work together through a clean, modular architecture where domain-specific
    logic remains completely isolated from the core memory systems.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将我们的领域无关的程序记忆系统与基线代理集成，以创建一个完整的CoALA代理。这展示了三种内存类型如何通过一个干净、模块化的架构协同工作，其中领域特定逻辑与核心记忆系统完全隔离。
- en: 'We’ll start by importing the necessary components:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先导入必要的组件：
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The imports reveal the modular structure of our system. The `CoALAAgent` class
    is the domain-agnostic core that integrates all three memory types. The domain-specific
    components all come from the `domain_investment` directory, including `InvestmentAdvisorAgent`
    (which implements the domain interface), the data generator, and test utilities.
    This separation means switching domains requires only changing these imports to
    point to a different domain directory.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 导入揭示了我们的系统模块化结构。`CoALAAgent`类是领域无关的核心，它集成了所有三种内存类型。所有领域特定组件都来自`domain_investment`目录，包括实现领域接口的`InvestmentAdvisorAgent`、数据生成器和测试工具。这种分离意味着切换领域只需要更改这些导入以指向不同的领域目录。
- en: 'Next, we initialize our domain agent and create the full CoALA agent:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们初始化我们的领域代理并创建完整的CoALA代理：
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`InvestmentAdvisorAgent` encapsulates all investment-specific logic: prompts,
    community definitions, success metrics, and task categorization. It also manages
    its own directory structure, keeping all domain data isolated. The `CoALAAgent`
    class receives this domain agent and automatically uses the domain’s memory directory
    for persistence, delegates all domain-specific decisions to the domain agent,
    and integrates all three memory types using the domain’s interface. The `optimization_algorithm`
    parameter selects which LangMem learning approach to use; we’ll explore the alternatives
    later in this chapter.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '`InvestmentAdvisorAgent`封装了所有投资特定的逻辑：提示、社区定义、成功指标和任务分类。它还管理自己的目录结构，将所有领域数据隔离。`CoALAAgent`类接收这个领域代理并自动使用领域的内存目录进行持久化，将所有领域特定决策委托给领域代理，并使用领域的接口集成所有三种内存类型。`optimization_algorithm`参数选择使用哪种LangMem学习方法；我们将在本章后面探讨这些替代方案。'
- en: 'Now, let’s test the agent’s baseline capabilities:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们测试代理的基线能力：
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This test message exercises the full agent before any learning has occurred.
    The agent can respond using its base knowledge, but lacks the procedural strategies
    that would make its advice truly personalized. By capturing `initial_stats` before
    this interaction, we establish a baseline for measuring learning progress.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这个测试消息在发生任何学习之前就测试了完整的代理。代理可以使用其基本知识进行响应，但缺乏使其建议真正个性化的程序策略。通过在这次交互之前捕获`initial_stats`，我们为衡量学习进度建立了一个基线。
- en: 'The key architectural achievement here is the complete separation of concerns:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的关键架构成就是关注点的完全分离：
- en: '**Domain agent creation**: `InvestmentAdvisorAgent` encapsulates all investment-specific
    logic in the `domain_investment` directory. This includes the following:'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**领域代理创建**：`InvestmentAdvisorAgent`封装了`domain_investment`目录中的所有投资特定逻辑。这包括以下内容：'
- en: Investment-specific prompts for learning and response generation
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资特定的提示用于学习和响应生成
- en: Community definitions (conservative retirees, aggressive millennials, etc.)
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社区定义（保守的退休人员、激进的千禧一代等）
- en: Success metrics specific to investment outcomes
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专门针对投资结果的成功指标
- en: Task categorization for investment queries
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资查询的任务分类
- en: The domain agent also manages its own directory structure, keeping all domain-specific
    data and memory stores isolated. This means you could run multiple domain agents
    simultaneously without any interference.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 领域代理还管理自己的目录结构，将所有领域特定数据和内存存储隔离。这意味着你可以同时运行多个领域代理而不会相互干扰。
- en: '**CoALA agent integration**: The `CoALAAgent` class is completely domain-agnostic.
    It receives the domain agent and automatically does the following:'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**CoALA代理集成**：`CoALAAgent`类完全不受领域限制。它接收领域代理并自动执行以下操作：'
- en: Uses the domain’s memory directory for persistence
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用领域的内存目录进行持久化
- en: Delegates to the domain for all domain-specific decisions
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将所有领域特定决策委托给领域
- en: Integrates all three memory types using the domain’s interface
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用领域的接口集成所有三种内存类型
- en: This clean separation means creating a new domain (such as healthcare or education)
    requires zero changes to the core CoALA agent; just implement a new domain agent
    following the same interface.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这种干净的分离意味着创建一个新的领域（如医疗保健或教育）不需要对核心CoALA代理进行任何更改；只需按照相同的接口实现一个新的领域代理。
- en: '**Memory system integration**: The full agent seamlessly integrates all three
    memory types from the CoALA framework:'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**记忆系统集成**：完整的代理无缝集成了CoALA框架中的所有三种记忆类型：'
- en: '**Episodic memory**: Stores complete conversations using the domain’s summary
    format'
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情景记忆**：使用领域的摘要格式存储完整的对话'
- en: '**Semantic memory**: Extracts facts using the domain’s extraction prompts'
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义记忆**：使用领域的提取提示提取事实'
- en: '**Procedural memory**: Learns strategies using the domain’s learning prompts
    and success metrics'
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**程序记忆**：使用领域的学习提示和成功指标学习策略'
- en: 'This integration enables what LangMem calls **cross-reference analysis**. When
    a user asks about rebalancing, the agent can do the following:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这种集成使得LangMem所说的**交叉引用分析**成为可能。当用户询问关于再平衡的问题时，代理可以执行以下操作：
- en: Recall their past conversations about investments (episodic)
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回忆他们关于投资的过去对话（情景）
- en: Access their stored risk profile and goals (semantic)
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问他们存储的风险配置文件和目标（语义）
- en: Apply the most successful rebalancing strategy for similar users (procedural)
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用对类似用户最成功的再平衡策略（程序）
- en: All while the domain agent handles the investment-specific interpretation of
    these memories.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，领域代理处理这些记忆的投资特定解释。
- en: 'Now let’s verify the initialization by examining the agent’s initial state
    and testing its baseline capabilities:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们通过检查代理的初始状态和测试其基线能力来验证初始化：
- en: '[PRE3]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This is the expected output:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE4]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The initialization confirms our modular architecture is working correctly:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化确认我们的模块化架构正在正确工作：
- en: '**Domain recognition**: The system recognizes its working with `InvestmentAdvisorAgent`,
    but would work identically with any other domain agent'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域识别**：系统识别其正在与`InvestmentAdvisorAgent`一起工作，但会以相同的方式与任何其他领域代理一起工作'
- en: '**Isolated memory store**: The memory store is located within the domain’s
    directory (`domain_investment/domain_memory_store`), keeping all domain data isolated'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隔离的记忆存储**：记忆存储位于领域的目录内（`domain_investment/domain_memory_store`），保持所有领域数据隔离'
- en: '**Clean initial state**: Starting with zero documents and zero strategies confirms
    we have a fresh system ready for learning'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**干净的初始状态**：从零文档和零策略开始，确认我们有一个全新的系统，准备好学习'
- en: '**Generic initial response**: The test response is reasonable but generic;
    the agent provides general investment advice without any learned patterns or personalization'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通用的初始响应**：测试响应是合理的但通用的；代理提供一般性的投资建议，没有任何学习模式或个性化'
- en: The initial response demonstrates the baseline capability. The agent can discuss
    rebalancing using its base knowledge, but it lacks the procedural strategies that
    would make its advice truly effective. The response is coherent and relevant,
    but it is missing the specific, actionable steps that procedural learning will
    provide.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 初始响应展示了基线能力。代理可以使用其基础知识讨论再平衡，但它缺乏使建议真正有效的程序策略。响应是连贯且相关的，但它缺少程序学习将提供的具体、可操作的步骤。
- en: 'The following architectural benefits are demonstrated:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 以下展示了以下架构优势：
- en: '**Modularity**: The entire investment domain is self-contained in `domain_investment/`'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模块化**：整个投资领域都包含在`domain_investment/`中'
- en: '**Reusability**: The same `CoALAAgent` class works with any domain'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可重用性**：相同的`CoALAAgent`类可以与任何领域一起工作'
- en: '**Isolation**: Domain data and memories are kept separate from the core system'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隔离**：领域数据和记忆与核心系统保持分离'
- en: '**Extensibility**: Adding a new domain is as simple as creating a new domain
    directory and agent'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：添加一个新的领域就像创建一个新的领域目录和代理一样简单'
- en: This clean architecture means that a healthcare organization could take this
    same code, create a `domain_healthcare` directory with `HealthcareAgent`, and
    have a fully functional healthcare advisor without touching any of the core memory
    system code.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这种干净的架构意味着一个医疗保健组织可以采用相同的代码，创建一个包含`HealthcareAgent`的`domain_healthcare`目录，并拥有一个完全功能化的医疗保健顾问，而无需触及任何核心记忆系统代码。
- en: With our full agent initialized and ready, we can now load domain-specific conversation
    data to train all three memory systems simultaneously. Next, we’ll demonstrate
    how the agent learns from realistic conversations, building its knowledge base
    across episodic, semantic, and procedural memories.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的完整代理初始化并准备就绪后，我们现在可以加载特定领域的对话数据以同时训练所有三个记忆系统。接下来，我们将展示代理如何从现实对话中学习，构建其关于情景、语义和程序性记忆的知识库。
- en: Step 2 – load synthetic investment data
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步 - 加载合成投资数据
- en: We’ll now load realistic investment advisor conversations that demonstrate various
    patterns, such as successful portfolio discussions, failed advisory attempts,
    and different client segments. This data will train our agent’s procedural memory
    to recognize what works, while maintaining complete isolation within the domain’s
    directory structure.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将加载展示各种模式的真实投资顾问对话，例如成功的投资组合讨论、失败的咨询尝试和不同的客户群体。这些数据将训练我们的代理的程序性记忆，以识别哪些有效，同时在领域目录结构内保持完全隔离。
- en: 'The data loading process is straightforward. We check for existing conversation
    data and load it, or generate new data if needed:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 数据加载过程很简单。我们检查现有的对话数据并加载它，或者在需要时生成新数据：
- en: '[PRE5]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The data loading process demonstrates the domain’s self-contained nature. `InvestmentAdvisorAgent`
    manages its own data directory (`domain_investment/investment_advisor_data/`),
    keeping all domain-specific data isolated from the core system. This means multiple
    domains can coexist without interference; a healthcare domain would use `domain_healthcare/healthcare_data/`,
    an education domain would use `domain_education/education_data/`, and so on.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 数据加载过程展示了该领域的自包含特性。`InvestmentAdvisorAgent`管理其自身的数据目录（`domain_investment/investment_advisor_data/`），将所有特定领域的数据与核心系统隔离。这意味着多个领域可以共存而不相互干扰；医疗保健领域会使用`domain_healthcare/healthcare_data/`，教育领域会使用`domain_education/education_data/`，等等。
- en: 'The synthetic data generator creates realistic investment advisor conversations
    with rich contextual information that LangMem’s data collection layer requires:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据生成器创建LangMem数据收集层所需的具有丰富上下文信息的真实投资顾问对话：
- en: '**Conversation metadata**:'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话元数据**：'
- en: '**Success indicators**: Whether the conversation achieved its goal'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成功指标**：对话是否达到了其目标'
- en: '**Satisfaction scores**: Client satisfaction ratings (1–5 scale)'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**满意度评分**：客户满意度评分（1-5级）'
- en: '**Behavioral signals**: Tracked patterns such as `provided_specific_data` and
    `personalized_response`'
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为信号**：追踪的图案，如`提供的特定数据`和`个性化响应`'
- en: '**Query types**: Performance analysis, rebalancing, risk assessment, tax planning,
    and so on'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查询类型**：绩效分析、再平衡、风险评估、税务规划等'
- en: '**Data diversity**: The generated conversations represent various investment
    scenarios and client types. This diversity is crucial for LangMem’s trajectory
    clustering capabilities; the system needs examples of both successful and failed
    interactions to identify what distinguishes them. The following applies to our
    investment advisor:'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据多样性**：生成的对话代表了各种投资场景和客户类型。这种多样性对于LangMem的轨迹聚类能力至关重要；系统需要成功和失败的交互的例子来识别它们之间的区别。以下适用于我们的投资顾问：'
- en: Some clients prefer detailed explanations, while others want quick answers
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些客户更喜欢详细的解释，而另一些则希望得到快速答案
- en: Certain approaches work better for retirees versus young professionals
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 某些方法对退休人士比年轻专业人士更有效
- en: Tax discussions require different handling than performance reviews
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 税收讨论需要不同于绩效评估的处理方式
- en: 'In other domains, this diversity would capture the following:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他领域，这种多样性会捕捉到以下内容：
- en: '**Healthcare**: Different patient communication styles, symptom presentations,
    treatment responses'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗保健**：不同的患者沟通风格、症状表现、治疗反应'
- en: '**Education**: Various learning speeds, subject difficulties, engagement patterns'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育**：不同的学习速度、学科难度、参与模式'
- en: '**Customer service**: Issue types, escalation paths, resolution strategies'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户服务**：问题类型、升级路径、解决方案策略'
- en: The behavioral signals in the data correspond to what LangMem calls “rich contextual
    information beyond simple logging.” These signals help the system identify subtle
    patterns – for instance, that successful technical troubleshooting includes diagnostic
    questions early in the conversation, while jumping to solutions correlates with
    failure.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 数据中的行为信号对应于LangMem所说的“超越简单日志的丰富上下文信息。”这些信号帮助系统识别微妙的模式——例如，成功的技术故障排除在对话早期就包括诊断问题，而跳到解决方案则与失败相关。
- en: 'Let’s examine the loaded data to understand its characteristics:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查加载的数据以了解其特征：
- en: '[PRE6]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'This is the expected output:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE7]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'The data shows realistic patterns essential for procedural learning:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 数据显示了程序性学习所必需的现实模式：
- en: '**Mixed success rates**: Not all conversations succeed (70.2% success rate),
    reflecting real-world complexity. This variation enables the system to learn what
    distinguishes success from failure.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合成功率**：并非所有对话都成功（70.2%的成功率），反映了现实世界的复杂性。这种变化使系统能够学习区分成功与失败的因素。'
- en: '**Variable satisfaction**: Average satisfaction of 3.0/5.0 shows significant
    room for improvement – exactly what procedural memory aims to achieve through
    learning.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可变满意度**：平均满意度为3.0/5.0显示出显著的改进空间——这正是程序性记忆通过学习旨在实现的目标。'
- en: '**Behavioral patterns**: The sample conversation shows two active behavioral
    signals. These signals will help identify correlations; for example, `provided_specific_data`
    often correlates with higher satisfaction in investment discussions.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为模式**：样本对话显示了两个活跃的行为信号。这些信号将帮助识别相关性；例如，`provided_specific_data`通常与投资讨论中的更高满意度相关。'
- en: '**Diverse user base**: 50 unique users provide enough diversity for community
    segmentation while keeping the dataset manageable for demonstration.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多样化的用户基础**：50个独特的用户提供了足够的多样性以进行社区细分，同时保持数据集在演示中可管理。'
- en: '**Isolated data storage**: The data location confirms that everything stays
    within the domain directory (`domain_investment/investment_advisor_data/`), while
    memories will be stored in the domain’s memory directory (`domain_investment/domain_memory_store/`).
    This complete isolation means you could delete the entire `domain_investment/`
    directory, and the core system would remain intact.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**独立数据存储**：数据位置确认所有内容都保持在域目录内（`domain_investment/investment_advisor_data/`），而记忆将被存储在域的记忆目录中（`domain_investment/domain_memory_store/`）。这种完全隔离意味着您可以删除整个`domain_investment/`目录，而核心系统将保持完整。'
- en: The sample conversation demonstrates a successful performance inquiry with specific
    portfolio data and moderate satisfaction (3.0/5.0). This type of interaction will
    be analyzed to extract patterns that can be applied to similar future queries.
    Notice the conversational, natural language style – `hey how are my investments
    doing?` – which reflects real user interactions rather than formal queries.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 样本对话演示了使用特定投资组合数据和适度满意度（3.0/5.0）的成功绩效查询。此类交互将被分析以提取可应用于类似未来查询的模式的模式。注意对话式的自然语言风格——“嘿，我的投资情况怎么样？”——这反映了真实用户交互而不是正式查询。
- en: 'The domain agent’s data directory structure keeps everything organized:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 域代理的数据目录结构保持一切井然有序：
- en: '`investment_advisor_data/`: Contains generated conversations and patterns'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`investment_advisor_data/`：包含生成的对话和模式'
- en: '`domain_memory_store/`: Will contain episodic, semantic, and procedural memories'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`domain_memory_store/`：将包含情景、语义和程序性记忆'
- en: All paths managed by the domain agent, not hardcoded in the core system
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有路径都由域代理管理，而不是在核心系统中硬编码
- en: Now, let’s process baseline conversations to establish our agent’s initial learning
    state, demonstrating how procedural memory extracts patterns from these domain-specific
    interactions while the core system remains agnostic to the investment context.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们处理基线对话以建立我们的代理的初始学习状态，展示程序性记忆如何从这些特定领域的交互中提取模式，同时核心系统对投资背景保持无意识。
- en: Step 3 – process baseline conversations for initial learning
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步 - 处理基线对话以进行初始学习
- en: Now, we’ll process our first batch of conversations to establish the agent’s
    initial learning state. This demonstrates how LangMem’s pattern mining segments
    conversations into functional units and identifies successful behavioral patterns
    that become procedural rules across multiple hierarchical scopes, all while maintaining
    the domain-agnostic architecture.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将处理我们的第一批对话以建立代理的初始学习状态。这展示了LangMem的模式挖掘如何将对话分割成功能单元，并识别出在多个层次范围内成为程序性规则的成功的模式，同时保持域无关的架构。
- en: 'We’ll process 30 baseline conversations and examine the learning that occurs
    across all 3 memory systems:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将处理30个基线对话并检查所有3个记忆系统中发生的学习：
- en: '[PRE8]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The `process_baseline_conversations` processing function (imported from the
    domain’s test scenarios) encapsulates the complex learning pipeline while keeping
    the main code clean. This demonstrates how domain-specific processing logic can
    be modularized and reused across different experiments.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '`process_baseline_conversations`处理函数（从领域的测试场景中导入）封装了复杂的学习管道，同时保持主要代码的整洁。这展示了如何将特定领域的处理逻辑模块化并在不同的实验中重用。'
- en: 'The following shows LangMem’s three-phase pipeline in action:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 以下展示了LangMem的三阶段管道在实际操作中的表现：
- en: '**Extraction phase**: The system pulls conversations into the appropriate memory
    stores. Complete interactions go into episodic memory for future reference, while
    specific facts get extracted into semantic memory using the domain’s extraction
    prompts. This comprehensive data collection captures what LangMem calls “rich
    contextual information,” and not just what was said, but how successful it was,
    what behavioral signals were present, and what outcomes resulted.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提取阶段**：系统将对话拉入适当的记忆存储。完整的交互进入情景记忆以供未来参考，而具体事实则使用领域的提取提示提取到语义记忆中。这种全面的数据收集捕捉了LangMem所说的“丰富上下文信息”，不仅包括所说的话，还包括其成功程度、存在的行为信号以及产生的结果。'
- en: '**Analysis phase**: The pattern mining process employs both explicit success
    indicators (conversations with `success=true` and `satisfaction ≥4.0`) and implicit
    behavioral signals to identify what works. This demonstrates LangMem’s success
    correlation analysis; only patterns from high-performing conversations become
    procedural rules. The system segments users into communities based on their characteristics,
    enabling what LangMem calls “trajectory clustering,” where similar user types
    are grouped to identify segment-specific patterns.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析阶段**：模式挖掘过程使用显式成功指标（`success=true`和`satisfaction ≥4.0`的对话）和隐性行为信号来识别有效的方法。这展示了LangMem的成功相关性分析；只有高性能对话中的模式成为程序规则。系统根据用户的特征将用户分割成社区，使LangMem所说的“轨迹聚类”成为可能，即相似的用户类型被分组以识别特定段落的模式。'
- en: '**Synthesis phase**: The `learn_from_interaction` method transforms identified
    patterns into concrete procedural rules at multiple scopes. Global patterns that
    work universally get stored at the global level, while user-specific preferences
    remain personalized. This hierarchical organization prevents overgeneralization,
    which is a critical safety feature that ensures advice appropriate for aggressive
    millennials doesn’t get applied to conservative retirees.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**综合阶段**：`learn_from_interaction`方法将识别到的模式转换成多个范围内的具体程序规则。适用于普遍情况的全球模式存储在全局级别，而用户特定的偏好保持个性化。这种分层组织防止了过度泛化，这是一个关键的安全功能，确保适合激进的千禧一代的建议不会应用于保守的退休人员。'
- en: The community assignment logic demonstrates emergent segmentation. Rather than
    requiring predefined user categories, the system discovers meaningful groups through
    actual usage patterns. For our investment advisor, communities form around age
    and risk tolerance combinations. In healthcare, they might form around condition
    types and treatment responses. In education, they might form around learning styles
    and subject preferences.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 社区分配逻辑展示了涌现的分割。系统不是要求预定义的用户类别，而是通过实际使用模式发现有意义的群体。对于我们投资顾问来说，社区围绕着年龄和风险承受能力组合形成。在医疗保健领域，它们可能围绕着疾病类型和治疗反应形成。在教育领域，它们可能围绕着学习风格和学科偏好形成。
- en: The tracking and reporting provide the transparency that LangMem emphasizes.
    Every learned pattern can be traced back to the specific conversations that generated
    it, enabling developers to understand exactly why the system learned what it did.
    This auditability is crucial for production deployments where procedural learning
    must be explainable and reversible.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪和报告提供了LangMem所强调的透明度。每个学习到的模式都可以追溯到生成它的特定对话，使开发者能够确切了解系统为什么学习它所学习的内容。这种可审计性对于必须可解释和可逆的生产部署至关重要。
- en: 'Let’s examine what the system learned from these baseline conversations:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看系统从这些基线对话中学到了什么：
- en: '[PRE9]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'This is the expected output:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE10]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The results show successful multi-scope learning from just 30 baseline conversations:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示，仅从30个基线对话中就实现了成功的多范围学习：
- en: '**Memory integration success**:'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆集成成功**：'
- en: '**30 episodic memories stored**: Complete conversations for future reference'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存储30个情景记忆**：完整对话供未来参考'
- en: '**71 semantic facts extracted**: Specific knowledge about users, preferences,
    and investment concepts'
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提取了71个语义事实**：关于用户、偏好和投资概念的具体知识'
- en: '**10 procedural strategies learned**: Concrete action patterns distributed
    across scopes'
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习到的10种程序策略**：分布在各个范围内的具体行动模式'
- en: '**Learned strategies distribution**:'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习策略分布**：'
- en: '**Two global strategies**: Universal patterns that work across all users'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**两种全局策略**：适用于所有用户的通用模式'
- en: '**Four user strategies**: Personalized approaches for three specific individuals
    (some users have multiple strategies)'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**四种用户策略**：针对三个特定个人的个性化方法（一些用户有多个策略）'
- en: '**Two community strategies**: Patterns for the identified communities'
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**两种社区策略**：已识别社区的图案'
- en: '**Two task strategies**: Specialized procedures for different query types'
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**两种任务策略**：针对不同查询类型的专用程序'
- en: This distribution demonstrates LangMem’s ability to automatically determine
    the appropriate learning scope. The system learned that certain patterns work
    universally and belong at the global level, while others remain user or community-specific.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这种分布展示了LangMem自动确定适当学习范围的能力。系统了解到某些模式具有普遍性，属于全局级别，而其他模式则保持用户或社区特定。
- en: '**Community formation**: Two communities emerged naturally from the data:'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**社区形成**：数据自然出现两个社区：'
- en: '`moderate_professionals`: Three members identified through shared characteristics'
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`moderate_professionals`：通过共享特征识别的三个成员'
- en: '`aggressive_millennials`: One member with distinct risk preferences'
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`aggressive_millennials`：一个具有独特风险偏好的成员'
- en: Each community has distinct successful patterns; moderate professionals might
    prefer balanced approaches, while aggressive millennials favor growth-oriented
    strategies. This segmentation enables nuanced responses that avoid the one-size-fits-all
    problem.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 每个社区都有独特的成功模式；中等专业人士可能更喜欢平衡的方法，而激进的千禧一代则青睐增长导向的策略。这种细分使得能够提供细微的响应，避免了“一刀切”的问题。
- en: '**Success rate baseline**: The `0.85` average success rate represents the confidence
    in these initial strategies. As the system processes more conversations and receives
    performance feedback, these rates will adjust based on real-world effectiveness.
    Strategies that consistently succeed will see their confidence increase, while
    those that fail will be downweighted or eventually removed.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成功率基线**：`0.85`的平均成功率代表对这些初始策略的信心。随着系统处理更多对话并收到性能反馈，这些比率将根据现实世界的有效性进行调整。持续成功的策略将看到其信心增加，而失败的策略将被降权或最终移除。'
- en: 'The procedural memory now contains 10 concrete strategies with specific steps,
    not vague suggestions. Each strategy includes the following:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 程序记忆现在包含10个具有特定步骤的具体策略，而不是模糊的建议。每个策略包括以下内容：
- en: The exact steps to follow
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要遵循的确切步骤
- en: The conditions under which it applies
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应用的条件
- en: The confidence level based on historical performance
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于历史表现的置信水平
- en: Domain-specific metrics tracked by the investment advisor
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资顾问跟踪的特定领域指标
- en: This formalization into “specific conditional structures” is what makes the
    learning actionable and measurable. The domain agent handles all investment-specific
    interpretation, while the core procedural memory system manages the learning mechanics.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这种将学习形式化为“特定条件结构”的做法使得学习可操作和可衡量。领域代理处理所有特定投资的解释，而核心程序记忆系统管理学习机制。
- en: With baseline learning established across all three memory types, the agent
    is now equipped with initial knowledge and strategies. Next, we’ll test the agent
    with new queries to see how it applies these learned strategies, then process
    more challenging scenarios to trigger procedural adaptation.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有三种记忆类型上建立基线学习后，代理现在配备了初始知识和策略。接下来，我们将用新的查询测试代理，看看它如何应用这些学习到的策略，然后处理更具挑战性的场景以触发程序适应。
- en: Step 4 – test improved performance and trigger adaptations
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步 - 测试改进后的性能并触发适应
- en: We’ll test the agent’s improved capabilities using its learned strategies, then
    process additional conversations that will trigger procedural memory updates,
    demonstrating LangMem’s continuous learning and adaptation based on feedback.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用代理学习到的策略测试其改进的能力，然后处理将触发程序记忆更新的额外对话，展示LangMem基于反馈的持续学习和适应。
- en: 'Let’s first test how the agent applies its learned strategies, then process
    additional conversations to trigger adaptations:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先测试代理如何应用其学习到的策略，然后处理额外的对话以触发适应：
- en: '[PRE11]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: These test queries are designed to trigger the learned strategies at different
    hierarchical levels. The sustainable investing query should activate user-specific
    or task-specific strategies if available, falling back through the hierarchy as
    needed. The rebalancing query tests whether the system can apply appropriate strategies
    based on the user profile. The agent’s responses now incorporate the specific
    steps learned from successful conversations, demonstrating how procedural memory
    improves response quality.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 这些测试查询旨在在不同层次上触发学习到的策略。可持续投资的查询如果可用，应激活用户特定或任务特定的策略，并在需要时通过层次结构回退。再平衡查询测试系统是否可以根据用户资料应用适当的策略。代理的响应现在结合了从成功对话中学到的具体步骤，展示了程序记忆如何提高响应质量。
- en: The performance feedback processing simulates real-world usage where strategies
    receive varying success signals. By processing conversations 30–40 (beyond the
    initial baseline), we’re testing how the system adapts to new data patterns. Each
    strategy update uses the domain agent’s success scoring, which, for investments,
    weighs returns heavily but also considers satisfaction and goal achievement.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 性能反馈处理模拟了现实世界的使用情况，其中策略会接收到不同的成功信号。通过处理30-40（超出初始基线）的对话，我们测试了系统如何适应新的数据模式。每次策略更新都使用领域代理的成功评分，对于投资而言，它高度重视回报，但也考虑满意度和目标达成情况。
- en: For our investment advisor example, the system applies learned strategies and
    then refines them based on outcomes. In healthcare, this would be like applying
    a diagnostic protocol and adjusting it based on patient outcomes. In customer
    service, it would mean following an escalation path and refining it based on resolution
    rates. In education, it would involve using teaching techniques and adapting them
    based on student comprehension.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的投资顾问示例，系统应用学习到的策略，然后根据结果对其进行细化。在医疗保健领域，这就像应用诊断方案并根据患者结果进行调整。在客户服务中，这意味着遵循升级路径并根据解决率进行细化。在教育领域，这涉及使用教学技巧并根据学生的理解情况进行调整。
- en: 'Now, let’s see how the agent performed and what adaptations occurred:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看代理的表现以及发生了哪些适应：
- en: '[PRE12]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'This is the expected output:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE13]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'The results demonstrate sophisticated learning and adaptation:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 结果展示了复杂的学习和适应：
- en: '**Strategy application**: Both test queries successfully triggered personalized
    strategies (85% confidence), showing that the system has learned user-specific
    patterns. The responses are tailored to each user’s profile; note how both responses
    mention `conservative investment approach` and specific portfolio details, demonstrating
    that the agent is combining procedural strategies with semantic facts about the
    users.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略应用**：两个测试查询都成功触发了个性化策略（85%置信度），表明系统已经学会了用户特定的模式。响应针对每个用户的个人资料定制；注意两个响应都提到了`保守的投资方法`和具体的投资组合细节，这表明代理正在将程序策略与关于用户的语义事实相结合。'
- en: '**Performance adaptation**: The feedback processing shows realistic strategy
    evolution:'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能适应**：反馈处理显示了现实策略的演变：'
- en: 'Some strategies improved (`balanced_rebalancing`: 68%)'
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '一些策略得到了改进（`balanced_rebalancing`: 68%）'
- en: 'Others declined based on poor outcomes (`conservative_sustain`: 82% → 74%)'
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '其他策略因结果不佳而放弃（`conservative_sustain`: 82% → 74%）'
- en: Multiple adaptations to the same strategy show continuous refinement
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对同一策略的多次适应显示了持续的细化
- en: This realistic mix of improvements and degradations reflects real-world learning
    where not every attempt succeeds. The system’s ability to lower confidence when
    strategies fail is as important as raising it when they succeed.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这种现实中的改进与退化的混合反映了现实世界的学习过程，并非每一次尝试都能成功。当策略失败时，系统降低信心与成功时提高信心同样重要。
- en: '**Memory integration**: The final state shows comprehensive learning across
    all three memory types:'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆集成**：最终状态显示了所有三种记忆类型的全面学习：'
- en: '**40 episodic/semantic documents**: Rich conversation history and extracted
    facts'
  id: totrans-174
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**40个情节/语义文档**：丰富的对话历史和提取的事实'
- en: '**12 procedural strategies**: Evolved from the initial 10 through learning
    and adaptation'
  id: totrans-175
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**12个程序策略**：通过学习和适应从最初的10个策略进化而来'
- en: '**Complete isolation**: All data remains in the domain directories'
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全隔离**：所有数据都保留在领域目录中'
- en: The adaptation details reveal which specific strategies are being refined. Notice
    how `conservative_sustain` appears multiple times. This strategy is being continuously
    adjusted based on performance, demonstrating the system’s ability to fine-tune
    individual strategies rather than wholesale replacement.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 适应细节揭示了正在细化的特定策略。注意`conservative_sustain`策略出现多次。这个策略正在根据性能持续调整，展示了系统调整个别策略而不是全面替换的能力。
- en: 'Here are the key insights from this step:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是这个步骤的关键见解：
- en: '**Personalization works**: The agent successfully applies user-specific strategies,
    showing that hierarchical retrieval is functioning'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化有效**：代理成功应用用户特定的策略，表明分层检索正在工作'
- en: '**Continuous learning**: Strategies adapt based on performance, not just initial
    learning'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续学习**：策略根据表现而非仅初始学习进行适应'
- en: '**Realistic evolution**: Not all adaptations are improvements; the system can
    recognize and downweigh failing strategies'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现实进化**：并非所有适应都是改进；系统可以识别并降低失败策略的权重'
- en: '**Domain isolation**: All learning happens within the domain’s directories,
    maintaining clean separation'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域隔离**：所有学习都在领域目录内进行，保持清晰的分离'
- en: 'The feedback processing demonstrates LangMem’s multi-source feedback triangulation.
    The domain agent’s weighted formula reflects investment priorities: 50% actual
    returns, 30% client satisfaction, and 20% goal achievement. The momentum-based
    update (80% old, 20% new) prevents single outliers from drastically changing strategies
    while still allowing adaptation. This enables what LangMem calls **safe rollback**:
    if a strategy’s performance consistently degrades, we can identify the problem
    through the adaptation history and potentially revert.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈处理展示了LangMem的多源反馈三角测量。领域代理的加权公式反映了投资优先级：50%实际回报，30%客户满意度，20%目标达成。基于动量的更新（80%旧，20%新）防止单个异常值剧烈改变策略，同时仍允许适应。这使LangMem称为**安全回滚**：如果策略的表现持续下降，我们可以通过适应历史识别问题，并可能回滚。
- en: With the agent now trained on baseline conversations and adapted through performance
    feedback, we’re ready to demonstrate the complete learning progression. Next,
    we’ll show how all three memory types work together through extended training
    to create an increasingly sophisticated investment advisor.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在代理现在基于基线对话进行训练并通过性能反馈进行适应后，我们准备好展示完整的学习进度。接下来，我们将展示所有三种记忆类型如何通过扩展训练协同工作，以创建一个越来越复杂的投资顾问。
- en: Step 5 – complete learning progression and hierarchical retrieval
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步 - 完整学习进度和分层检索
- en: We’ll showcase the complete learning journey, demonstrating how LangMem transforms
    our agent from a generic advisor into a sophisticated system that learns and adapts
    from every interaction, all while maintaining the clean separation between domain
    logic and core memory systems.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将展示完整的学习旅程，展示LangMem如何将我们的代理从通用顾问转变为一个从每次互动中学习和适应的复杂系统，同时保持领域逻辑和核心记忆系统之间的清晰分离。
- en: 'Let’s process additional conversations and demonstrate the full capabilities
    of our integrated memory system:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们处理额外的对话并展示我们集成记忆系统的全部功能：
- en: '[PRE14]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This comprehensive demonstration shows the full power of the integrated memory
    system. The processing function handles additional conversations beyond the baseline,
    but with LangMem’s quality filtering, only high-satisfaction conversations (4.5+/5.0)
    contribute to learning. This selective approach ensures the agent incorporates
    only proven successful patterns.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这全面的演示展示了集成记忆系统的全部力量。处理函数处理超出基线的基础对话，但通过LangMem的质量过滤，只有高满意度的对话（4.5+/5.0）对学习做出贡献。这种选择性的方法确保代理仅纳入经过验证的成功模式。
- en: The code processes 50 additional conversations through the domain-agnostic procedural
    memory system, which delegates all investment-specific decisions to the domain
    agent. This same processing pipeline would work identically for a healthcare domain
    learning from patient interactions or an education domain learning from tutoring
    sessions.
  id: totrans-190
