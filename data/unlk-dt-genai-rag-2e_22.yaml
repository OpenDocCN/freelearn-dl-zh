- en: 'Through this code lab, we’ve demonstrated how procedural memory transforms
    an investment advisor agent from providing generic responses to delivering personalized,
    continuously improving advice. The agent has achieved the following:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个代码实验室，我们展示了程序性记忆如何将投资顾问代理从提供通用响应转变为提供个性化、持续改进的建议。该代理实现了以下成果：
- en: 15 distinct strategies across multiple scopes (4 global, 5 user, 3 community,
    and 3 task)
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在多个范围内（4个全局、5个用户、3个社区和3个任务）有15种不同的策略
- en: 82% average success rate through continuous adaptation
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过持续适应，平均成功率达到了82%
- en: 5 different client segments with specific needs discovered through usage
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过使用发现5个具有特定需求的客户细分市场
- en: 18 strategy adaptations based on performance feedback
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于性能反馈的18种策略调整
- en: Full integration of all three memory types for comprehensive responses
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全集成所有三种记忆类型以提供全面响应
- en: Most importantly, this entire system is domain-agnostic. The procedural memory
    system, the CoALA agent, and the learning pipeline would work identically with
    a healthcare, education, or customer service domain. Only the domain agent implementation
    differs, showcasing the power of proper architectural separation.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是，整个系统是领域无关的。程序记忆系统、CoALA智能体和学习管道在医疗保健、教育或客户服务领域将工作方式相同。只有领域智能体实现不同，展示了适当架构分离的力量。
- en: 'This demonstrates LangMem’s core promise: transforming agents from static responders
    into dynamic learners that evolve with each conversation, enabling continuous
    improvement without expensive retraining cycles. The hierarchical learning approach
    ensures that patterns are applied at the appropriate scope, preventing overgeneralization
    while maximizing the benefit of learned knowledge across similar contexts. And
    the modular architecture ensures this powerful learning capability can be applied
    to any domain simply by implementing the domain agent interface.'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 这展示了LangMem的核心承诺：将智能体从静态的响应者转变为动态的学习者，它们随着每次对话而进化，使持续改进无需昂贵的重新训练周期。分层学习方法确保模式在适当的范围内应用，防止过度泛化，同时最大化学习知识在类似情境中的效益。模块化架构确保这种强大的学习能力可以通过实现领域智能体接口简单地应用于任何领域。
- en: Next, we’ll explore how to choose the right learning algorithm for your specific
    use case, examining the trade-offs between `prompt_memory`'s efficiency, `gradient`'s
    failure analysis capabilities, and `metaprompt`'s deep pattern discovery.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探讨如何为您的特定用例选择正确的学习算法，检查`prompt_memory`的效率、`gradient`的失败分析能力以及`metaprompt`的深度模式发现之间的权衡。
- en: 'LangMem’s learning algorithms: choosing the right approach'
  id: totrans-229
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LangMem的学习算法：选择正确的方法
- en: While our code lab demonstrated procedural memory using the `prompt_memory`
    algorithm, LangMem provides three distinct approaches for extracting and optimizing
    behavioral patterns, each suited to different use cases and complexity levels.
    We will discuss these in the upcoming sections.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们的代码实验室使用`prompt_memory`算法展示了程序记忆，但LangMem提供了三种不同的方法来提取和优化行为模式，每种方法都适合不同的用例和复杂程度。我们将在接下来的章节中讨论这些内容。
- en: 'prompt_memory: efficient single-pass learning'
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: prompt_memory：高效的单次遍历学习
- en: The `prompt_memory` algorithm, which we used in *Code lab 18-1*, extracts procedural
    knowledge with just a single LLM call. It analyzes conversation trajectories to
    identify successful patterns and transforms them directly into actionable rules.
    This approach works well for most production use cases where you need quick adaptation
    with minimal computational overhead. The algorithm excels at identifying clear
    cause-and-effect relationships and is particularly effective for well-defined
    domains with relatively straightforward success metrics.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在*Code lab 18-1*中使用的`prompt_memory`算法，只需一个LLM调用即可提取程序知识。它分析对话轨迹以识别成功的模式，并将它们直接转换为可执行规则。这种方法对于大多数需要快速适应且计算开销最小的生产用例非常有效。该算法擅长识别清晰的因果关系，对于具有相对简单成功指标的定义明确的领域特别有效。
- en: 'gradient: critique and proposal separation'
  id: totrans-233
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: gradient：批评和提案分离
- en: The `gradient` algorithm takes a different approach by separating the critique
    phase from the proposal phase. It first analyzes what went wrong in failed interactions,
    building a comprehensive understanding of failure modes. Then, in a separate phase,
    it proposes specific improvements to address these issues. This critique-proposal
    split enables precise, targeted improvements and is particularly valuable when
    you need to understand not just what works, but why certain approaches fail. `gradient`
    is especially useful in high-stakes domains where understanding failure modes
    is as important as identifying success patterns.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: '`gradient`算法采取不同的方法，通过将批评阶段与提案阶段分离。它首先分析失败交互中出了什么问题，构建对失败模式的全面理解。然后，在单独的阶段，它提出具体的改进措施来解决这些问题。这种批评-提案分割可以实现精确、有针对性的改进，并且当您需要了解不仅是什么有效，而且为什么某些方法失败时特别有价值。`gradient`在理解失败模式与识别成功模式同样重要的高风险领域特别有用。'
- en: 'metaprompt: multi-stage reflection for complex patterns'
  id: totrans-235
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: metaprompt：复杂模式的分阶段反思
- en: For more complex domains where patterns aren’t immediately obvious, the `metaprompt`
    algorithm employs multi-stage reflection. It first generates initial hypotheses
    about what might work, then iteratively refines these through multiple analysis
    passes. Each stage examines the patterns from different angles, capturing nuanced
    relationships that simpler approaches might miss. This makes `metaprompt` ideal
    for domains with subtle success indicators or where the relationship between actions
    and outcomes involves multiple intermediate steps.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 对于模式不是立即明显的更复杂领域，`metaprompt`算法采用多阶段反思。它首先生成关于可能有效的工作的初始假设，然后通过多次分析迭代地细化这些假设。每个阶段从不同的角度检查模式，捕捉到简单方法可能错过的细微关系。这使得`metaprompt`非常适合具有微妙成功指标或涉及多个中间步骤的动作与结果之间关系的领域。
- en: Choosing the right algorithm
  id: totrans-237
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择正确的算法
- en: 'Your choice of algorithm should depend on your specific needs:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 您选择的算法应取决于您的具体需求：
- en: Use `prompt_memory` for production systems that need efficient, real-time learning
    with good-enough accuracy
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于需要高效、实时学习且精度足够的生产系统使用`prompt_memory`
- en: Use `metaprompt` when dealing with complex domains where patterns require deep
    analysis to uncover
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当处理需要深入分析以揭示模式的复杂领域时使用`metaprompt`
- en: Use `gradient` when failure analysis is critical, and you need a detailed understanding
    of what doesn’t work
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当失败分析至关重要且您需要了解什么不起作用时使用`gradient`
- en: All three algorithms integrate seamlessly with the hierarchical learning structure
    we’ve demonstrated, automatically determining the appropriate scope for each learned
    pattern and maintaining the same safety features such as gradual rollouts and
    rollback capabilities.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 所有三种算法都与我们展示的分层学习结构无缝集成，自动确定每个学习模式的适当范围，并保持相同的安全功能，如逐步推出和回滚能力。
- en: Combining algorithms for comprehensive learning
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结合算法进行综合学习
- en: 'While we’ve presented these algorithms individually, they can and often should
    be used together in sophisticated production systems. You might use `prompt_memory`
    for rapid initial learning during early deployment, then periodically run `metaprompt`
    analyses on accumulated data to discover deeper patterns that quick extraction
    missed. Meanwhile, `gradient` could continuously analyze failure cases in the
    background, ensuring that your system not only learns from successes but also
    systematically improves its failure modes. This multi-algorithm approach provides
    both immediate adaptability and long-term sophistication. For example, a healthcare
    system might use `prompt_memory` for real-time learning during patient interactions,
    `metaprompt` for weekly deep analysis of treatment patterns, and `gradient` to
    understand why certain interventions failed. The algorithms complement each other:
    `prompt_memory` provides quick wins, `gradient` prevents repeated failures, and
    `metaprompt` uncovers subtle optimizations that only become visible across many
    interactions.'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们已经单独介绍了这些算法，但在复杂的生产系统中，它们可以并且通常应该一起使用。您可能会在早期部署期间使用`prompt_memory`进行快速初始学习，然后定期运行`metaprompt`分析累积数据，以发现快速提取中遗漏的更深层模式。同时，`gradient`可以在后台持续分析失败案例，确保您的系统不仅从成功中学习，而且系统地改进其失败模式。这种多算法方法提供了即时的适应性和长期的专业性。例如，一个医疗保健系统可能会在患者互动期间使用`prompt_memory`进行实时学习，使用`metaprompt`进行每周的治疗模式深度分析，以及使用`gradient`来了解为什么某些干预措施失败。这些算法相互补充：`prompt_memory`提供快速的成功，`gradient`防止重复失败，而`metaprompt`揭示只有通过许多交互才能变得明显的微妙优化。
- en: How multi-algorithm learning works in practice
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多算法学习在实际中是如何工作的
- en: When using multiple algorithms together, they operate on the same conversation
    history but extract complementary insights at different depths and timescales.
    The system maintains all discovered rules in a unified procedural memory, using
    confidence scores and timestamps to resolve conflicts when multiple rules address
    the same situation.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用多个算法一起时，它们在相同的对话历史中操作，但在不同的深度和时序上提取互补的见解。系统在统一的过程记忆中维护所有发现的规则，使用置信度分数和时间戳来解决当多个规则针对同一情况时出现的冲突。
- en: The practical workflow follows a temporal hierarchy. During live operation,
    `prompt_memory` runs frequently on small batches of recent conversations, providing
    rapid adaptation to emerging patterns. These quick extractions catch obvious improvements,
    such as “users prefer specific numbers over vague statements,” within minutes
    of the pattern appearing. Meanwhile, `gradient` runs as a background process,
    focusing specifically on failed interactions, building a comprehensive understanding
    of what doesn’t work and why. This failure analysis prevents the system from repeating
    mistakes and identifies edge cases that success-focused learning might miss.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 实际的工作流程遵循时间层次结构。在实时操作期间，`prompt_memory` 在最近的小批对话上频繁运行，快速适应新出现的模式。这些快速提取在模式出现后几分钟内捕捉到明显的改进，例如“用户更喜欢具体的数字而不是模糊的陈述”。同时，`gradient`
    作为后台进程运行，专注于失败的交互，全面理解什么不起作用以及为什么。这种失败分析防止系统重复错误，并识别出成功导向的学习可能错过的边缘情况。
- en: Periodically, perhaps daily or weekly, `metaprompt` performs a deep analysis
    of the accumulated conversation history. Because it examines hundreds or thousands
    of interactions together, `metaprompt` can identify subtle correlations that aren’t
    visible in smaller samples. It might discover that users who ask about volatility
    in morning hours require more emotional reassurance, or that certain phrase combinations
    predict follow-up questions with 85% accuracy.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 定期进行，可能是每天或每周，`metaprompt` 对累积的对话历史进行深入分析。因为它一起检查数百或数千次交互，`metaprompt` 可以识别出在较小样本中不可见的微妙相关性。它可能会发现，在上午时段询问波动性的用户需要更多的情感保证，或者某些短语组合可以以
    85% 的准确率预测后续问题。
- en: These algorithms don’t replace each other’s findings; they build a layered understanding.
    Each rule is tagged with its source algorithm, confidence level, and the number
    of conversations it was derived from. When multiple rules could apply to a situation,
    the system prioritizes based on specificity (user-specific beats generic), confidence
    (rules validated across more conversations win), and recency (newer patterns may
    reflect changing user needs).
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 这些算法不会相互取代彼此的发现；它们构建了一个分层理解。每条规则都标记有它的源算法、置信水平和它是由多少次对话推导出来的。当多个规则可能适用于某种情况时，系统根据具体性（用户特定的优于通用的）、置信度（在更多对话中验证过的规则获胜）和最近性（较新的模式可能反映了不断变化的需求）进行优先排序。
- en: The accumulated rules create an increasingly sophisticated strategy library.
    A rule discovered by `prompt_memory` with 70% confidence might later be validated
    by `metaprompt` across thousands of conversations, boosting its confidence to
    95%. Conversely, a pattern that seemed universal might be refined by `gradient`'s
    failure analysis to include important exceptions. This continuous refinement happens
    automatically, with the system tracking which rules get applied, how often they
    succeed, and when they need updating.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 积累的规则创建了一个越来越复杂的策略库。`prompt_memory` 以 70% 的置信度发现的规则可能会后来在数千次对话中被 `metaprompt`
    验证，将其置信度提升到 95%。相反，看似普遍的模式可能通过 `gradient` 的失败分析被细化，包括重要的例外。这种持续的细化是自动发生的，系统跟踪哪些规则被应用，它们成功多频繁，以及何时需要更新。
- en: The key insight is that different algorithms excel at different types of learning.
    `prompt_memory` provides immediate responsiveness, `gradient` ensures robustness
    by learning from failures, and `metaprompt` discovers the non-obvious patterns
    that separate good systems from great ones. Together, they create a learning system
    that adapts quickly, fails rarely, and continuously discovers deeper insights
    about what truly drives user satisfaction.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的洞见在于不同的算法在不同类型的学习中表现出色。`prompt_memory` 提供即时的响应，`gradient` 通过学习失败来确保稳健性，而
    `metaprompt` 发现将优秀系统与卓越系统区分开来的非显而易见的模式。它们共同创造了一个快速适应、很少失败并能持续发现关于真正驱动用户满意度的更深层次见解的学习系统。
- en: Hands-on exploration
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 亲手探索
- en: To help you explore these different approaches, the GitHub repository includes
    a bonus code lab (*Code lab 19-Bonus*) that demonstrates all three algorithms
    working with the same conversation data. You’ll see firsthand how `prompt_memory`
    quickly extracts actionable strategies, how `gradient` identifies and addresses
    failure patterns, and how `metaprompt` discovers non-obvious relationships through
    iterative analysis.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您探索这些不同的方法，GitHub 仓库包含一个附加的代码实验室（*代码实验室 19-附加*），展示了所有三个算法与相同的对话数据一起工作。您将亲眼看到
    `prompt_memory` 如何快速提取可操作的策略，`gradient` 如何识别和解决失败模式，以及 `metaprompt` 如何通过迭代分析发现非显而易见的关系。
- en: 'With an understanding of how different algorithms extract patterns, we now
    turn to an equally critical question: how do you define what “success” means for
    your agent? The next section explores designing domain metrics, which is the compass
    that guides what your agent learns.'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解不同算法如何提取模式，我们现在转向一个同样关键的问题：您如何定义代理的“成功”含义？下一节将探讨设计领域指标，这是指导代理学习方向的指南。
- en: 'Designing domain metrics: the art of measuring success'
  id: totrans-255
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设计领域指标：衡量成功的艺术
- en: The `domain_metrics` dictionary is where you encode what success means for your
    agent, and these choices fundamentally shape how your agent evolves. The metrics
    you choose and how you weigh them determine not just what your agent learns, but
    what kind of agent it becomes.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '`domain_metrics` 字典是您编码代理成功含义的地方，这些选择从根本上塑造了代理如何演变。您选择的指标以及您如何权衡它们不仅决定了代理学习的内容，还决定了代理成为何种类型的代理。'
- en: 'Single goal optimization: clarity with consequences'
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单一目标优化：清晰性与后果
- en: 'When you optimize for a single metric, the agent develops laser focus. An investment
    advisor optimizing solely for returns (100%) will learn aggressive strategies:
    leveraging margin trading, concentrating positions in high-growth sectors, and
    timing market volatility. The procedural memory will rapidly converge on patterns
    that maximize this single objective.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 当您优化单一指标时，代理会发展出激光般的专注力。仅优化回报率（100%）的投资顾问将学会激进的战略：利用保证金交易、在高增长部门集中仓位，以及利用市场波动性。程序性记忆将迅速收敛到最大化这一单一目标的模式。
- en: However, single-metric optimization often leads to unintended behaviors. That
    returns-only investment agent might learn to recommend risky options to conservative
    retirees because, historically, risk correlates with returns. A customer service
    agent optimizing only for speed might learn to close tickets quickly without actually
    solving problems. A healthcare agent focused solely on treatment adherence might
    become pushy and ignore patient concerns.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，单一指标优化往往会导致意想不到的行为。仅关注回报的投资代理可能会学会向保守的退休者推荐风险较高的选项，因为从历史上看，风险与回报相关。仅优化速度的客户服务代理可能会学会快速关闭工单而不实际解决问题。专注于治疗依从性的医疗代理可能会变得过于积极，忽视患者的担忧。
- en: 'Multi-goal balancing: realism with complexity'
  id: totrans-260
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多目标平衡：现实主义与复杂性
- en: Most production systems require balancing multiple objectives. Our investment
    advisor uses returns (50%), satisfaction (30%), and goal achievement (20%). This
    weighting creates an agent that primarily seeks performance but won’t sacrifice
    client relationships for marginal gains.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数生产系统需要平衡多个目标。我们的投资顾问使用回报率（50%）、满意度（30%）和目标达成（20%）。这种权重设置创建了一个主要寻求绩效但不会为了微小的收益牺牲客户关系的代理。
- en: The priority weights act as “exchange rates” between goals. With our 50/30/20
    split, the agent learns that it can accept a 3% return decrease if it increases
    satisfaction by 5% (since 0.03 × 50 = 1.5 points lost, while 0.05 × 30 = 1.5 points
    gained). This mathematical relationship shapes every learned strategy.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 优先级权重在目标之间充当“汇率”。在我们的50/30/20分割中，代理学会，如果它能通过提高满意度5%来接受3%的回报率下降（因为0.03 × 50 =
    1.5分损失，而0.05 × 30 = 1.5分获得），这种数学关系塑造了每个学习策略。
- en: 'Consider different weightings for the same three metrics:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑对同一三个指标的不同权重：
- en: '**Conservative (20/60/20)**: Prioritizes satisfaction, learning strategies
    such as *Always explain risks thoroughly* and *Confirm understanding at each step*'
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保守型（20/60/20）**：优先考虑满意度，学习策略如*始终彻底解释风险*和*在每一步确认理解*'
- en: '**Goal-focused (20/20/60)**: Develops strategies aligned with client objectives,
    such as *Regularly review progress against retirement targets*'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标导向（20/20/60）**：制定与客户目标一致的战略，例如*定期审查退休目标的进展*'
- en: '**Balanced (33/33/34)**: No clear priority, leading to moderate strategies
    that avoid extremes'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平衡型（33/33/34）**：没有明确优先级，导致避免极端的适度策略'
- en: Each weighting creates a distinctly different agent personality and behavioral
    pattern. Your choice of weights should reflect your true priorities, as the agent
    will optimize exactly what you tell it to – whether that aligns with your actual
    goals or not.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 每个权重都会创建一个明显不同的代理个性和行为模式。您选择的权重应反映您的真实优先级，因为代理将优化您告诉它的内容——无论这是否符合您的实际目标。
- en: But what happens when your metrics inevitably conflict with each other? Understanding
    how the system resolves these tensions reveals much about how procedural learning
    actually works in practice.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 但当你的指标不可避免地相互冲突时会发生什么？了解系统如何解决这些紧张关系，可以揭示实际中程序学习是如何工作的。
- en: Conflict resolution through weights
  id: totrans-269
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过权重解决冲突
- en: Conflicts between metrics are inevitable and revealing. When a high-return strategy
    consistently generates low satisfaction, the agent must choose based on their
    weights. This is where procedural memory becomes sophisticated; it learns conditional
    strategies, such as *Use aggressive strategies only for users who explicitly prioritize
    returns*.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 指标之间的冲突是不可避免的，也是揭示性的。当高回报策略持续产生低满意度时，代理必须根据其权重进行选择。这就是程序记忆变得复杂的地方；它学习条件策略，例如*仅对明确优先考虑回报的用户使用激进策略*。
- en: 'The system handles conflicts by doing the following:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 系统通过以下方式处理冲突：
- en: '**Learning segmented approaches**: Different strategies for users who value
    different metrics'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习分段方法**: 为重视不同指标的用户提供不同的策略'
- en: '**Developing conditional rules**: For example, *If user is risk-averse, prioritize
    satisfaction over returns*'
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发条件规则**: 例如，*如果用户风险规避，优先考虑满意度而非回报*'
- en: '**Finding creative solutions**: Strategies that improve multiple metrics simultaneously'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**寻找创造性的解决方案**: 同时提高多个指标的策略'
- en: '**Accepting trade-offs**: Explicitly choosing which metric to sacrifice when
    necessary'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接受权衡**: 在必要时明确选择牺牲哪个指标。'
- en: This conflict resolution capability is what makes multi-metric optimization
    powerful; rather than forcing a single approach on all users, the agent learns
    nuanced strategies that adapt to individual preferences and contexts. The procedural
    memory system naturally discovers these conditional patterns as it analyzes which
    approaches work for which users.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 这种冲突解决能力使得多指标优化变得强大；而不是强迫所有用户采用单一方法，代理学习细微的策略，以适应个人偏好和情境。程序记忆系统在分析哪些方法适用于哪些用户时，自然发现这些条件模式。
- en: Beyond understanding how individual metrics interact, certain patterns in metric
    design have emerged as particularly effective across different domains. Let’s
    explore these proven approaches to structuring your metrics.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 了解了单个指标如何相互作用之后，某些指标设计模式在各个领域都显示出特别有效的趋势。让我们探索这些经过验证的方法来构建你的指标结构。
- en: Metric design patterns
  id: totrans-278
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 指标设计模式
- en: 'When designing your domain metrics, certain patterns have proven effective
    across different applications. Understanding these patterns helps you avoid common
    pitfalls and create metric frameworks that guide your agent toward genuinely useful
    behavior:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计你的领域指标时，某些模式在不同的应用中已被证明是有效的。了解这些模式有助于你避免常见的陷阱，并创建指导代理向真正有用的行为发展的指标框架：
- en: '**Complementary metrics**: Choose metrics that naturally align. For healthcare,
    treatment effectiveness, patient satisfaction, and safety compliance work together
    as safe treatments tend to be effective and satisfying.'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互补指标**: 选择自然对齐的指标。在医疗保健领域，治疗效果、患者满意度和安全合规性协同工作，因为安全的治疗往往有效且令人满意。'
- en: '**Tension metrics**: Deliberately include competing goals to prevent extreme
    behaviors. For customer service, resolution speed versus customer satisfaction
    creates healthy tension that prevents both rushed closures and excessive time
    spent.'
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**紧张指标**: 故意包含竞争目标，以防止极端行为。在客户服务中，解决速度与客户满意度之间的紧张关系防止了匆忙关闭和过度花费时间。'
- en: '**Guard rail metrics**: Include metrics that act as safety constraints. For
    education, learning speed is the primary metric, but with comprehension and student
    well-being as guards against an overwhelming pace.'
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全指标**: 包含作为安全约束的指标。在教育领域，学习速度是主要指标，但理解力和学生福祉作为防止压倒性速度的防护措施。'
- en: '**Hierarchical metrics**: Structure metrics in tiers. Primary metrics (must
    exceed threshold), optimization metrics (maximize these), and monitoring metrics
    (track but don’t optimize). This prevents the agent from gaming the system by
    sacrificing critical requirements for marginal improvements.'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分层指标**: 将结构指标分层。主要指标（必须超过阈值）、优化指标（最大化这些指标）和监控指标（跟踪但不优化）。这防止了代理通过牺牲关键要求以换取微小改进来操纵系统。'
- en: Effective metric design typically combines several of these patterns. A well-designed
    framework might use complementary metrics for core objectives, tension metrics
    to prevent extremes, and guard rails to protect critical constraints, thereby
    creating a comprehensive system that guides your agent toward genuinely valuable
    behavior.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的指标设计通常结合了这些模式中的几个。一个设计良好的框架可能会使用互补指标来满足核心目标，张力指标来防止极端情况，以及保护关键约束的护栏，从而创建一个全面的系统，引导你的代理走向真正有价值的行为。
- en: Understanding these patterns is essential for initial setup, but the real impact
    becomes clear over time. The next section explores evolution over time and how
    your metrics compound to fundamentally shape what your agent becomes.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些模式对于初始设置至关重要，但真正的效果会在时间中逐渐显现。下一节将探讨随时间演化的过程以及你的指标如何累积，从而从根本上塑造你的代理成为的样子。
- en: Evolution over time
  id: totrans-286
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随时间演化的过程
- en: Your metric choices determine your agent’s long-term trajectory. An agent optimizing
    for user satisfaction develops increasingly empathetic, explanatory strategies.
    One optimizing for efficiency becomes increasingly streamlined and automated.
    Over hundreds of interactions, these differences compound into fundamentally different
    agents.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 你的指标选择决定了你的代理的长期轨迹。一个以用户满意度为优化目标的代理会发展出越来越有同理心和解释性的策略。一个以效率为优化目标的代理会变得越来越精简和自动化。经过数百次交互，这些差异会累积成本质上不同的代理。
- en: The procedural memory system will discover surprising optimizations within your
    metric framework. Given returns/satisfaction/goals weights, it might learn that
    discussing tax implications early improves all three metrics – a non-obvious pattern
    that emerges from the interaction between metrics.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 程序记忆系统将在你的指标框架内发现令人惊讶的优化。考虑到回报/满意度/目标权重，它可能会发现早期讨论税收影响可以提高所有三个指标——一个从指标之间的交互中出现的非直观模式。
- en: Practical recommendations
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实用建议
- en: Start with two or three core metrics that capture your essential objectives.
    More metrics create complexity without necessarily improving behavior. Weigh them
    to reflect your true priorities, remembering that equal weights rarely reflect
    real-world values.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 从两个或三个核心指标开始，这些指标能够捕捉你的基本目标。更多的指标会增加复杂性，但不一定能改善行为。权衡它们以反映你的真实优先级，记住，相等的权重很少能反映现实世界的价值。
- en: Monitor for metric gaming – strategies that technically improve metrics while
    violating their spirit. An agent might learn to improve “satisfaction” by making
    unrealistic promises. Regular auditing of learned strategies helps catch these
    distortions.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 监测指标游戏化——那些在技术上提高指标同时违反其精神的行为策略。一个代理可能会学会通过做出不切实际的承诺来提高“满意度”。定期审计学习到的策略有助于捕捉这些扭曲。
- en: Consider metric schedules. Starting with satisfaction-heavy weights during early
    deployment to ensure user acceptance, then gradually shifting toward performance
    metrics as the agent proves reliable. The procedural memory system adapts to these
    changing priorities, enabling controlled evolution of agent behavior.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑指标的时间表。在早期部署时，以满意度为重点的权重确保用户接受，然后随着代理证明其可靠性，逐渐转向性能指标。程序记忆系统适应这些变化优先级，使代理行为的可控演化成为可能。
- en: Remember that `domain_metrics` isn’t just configuration – it’s the value system
    that shapes your agent’s personality, capabilities, and blind spots. Choose thoughtfully,
    as these metrics determine not just what your agent learns, but what kind of assistant
    it becomes.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，`domain_metrics`不仅仅是一个配置——它塑造你的代理个性、能力和盲点的价值观体系。明智地选择，因为这些指标不仅决定了你的代理学习的内容，还决定了它成为什么样的助手。
- en: 'Adapting to your domain: from an investment advisor to any expert system'
  id: totrans-294
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 适应你的领域：从投资顾问到任何专家系统
- en: 'The architecture we’ve built isn’t hiding its domain-agnostic nature; we deliberately
    isolated all investment-specific logic into the `domain_investment` directory.
    This clean separation makes it straightforward to create agents for any domain:
    healthcare, education, customer service, or beyond. Here’s the framework for adapting
    this system to your needs.'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建的架构并没有隐藏其领域无关性；我们故意将所有特定投资的逻辑隔离到`domain_investment`目录中。这种清晰的分离使得为任何领域创建代理变得简单：医疗保健、教育、客户服务，或更多。以下是适应这一系统以满足你需求的框架。
- en: Domain conversion framework
  id: totrans-296
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 领域转换框架
- en: 'To create a new domain (e.g., `domain_educator` for a tutoring agent), you
    need to convert four key files:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个新的领域（例如，为辅导代理创建`domain_educator`），你需要转换四个关键文件：
- en: '**Domain agent** (`educator_agent.py`):'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域代理** (`educator_agent.py`):'
- en: Replace `InvestmentAdvisorAgent` with `EducatorAgent`
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将`InvestmentAdvisorAgent`替换为`EducatorAgent`
- en: 'Update `get_community_definitions()`: Change from risk tolerance/age groups
    to learning styles/grade levels'
  id: totrans-300
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新 `get_community_definitions()`：从风险承受能力/年龄组更改为学习风格/年级
- en: 'Modify `identify_task_type()`: Swap financial tasks (rebalancing, tax planning)
    for educational ones (homework help, concept explanation, practice problems)'
  id: totrans-301
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改 `identify_task_type()`：将金融任务（再平衡、税务规划）替换为教育任务（作业帮助、概念解释、练习问题）
- en: 'Adjust `calculate_success_score()`: Use weight comprehension (50%), engagement
    (30%), and progress (20%) instead of returns/satisfaction'
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整 `calculate_success_score()`：使用理解度（50%）、参与度（30%）和进度（20%）而不是回报/满意度
- en: 'Update `domain_metrics`: Track `quiz_scores`, `time_to_mastery`, and `concept_connections`
    instead of `portfolio_performance`'
  id: totrans-303
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新 `domain_metrics`：跟踪 `quiz_scores`、`time_to_mastery` 和 `concept_connections`
    而不是 `portfolio_performance`
- en: '**Domain prompts** (`educator_prompts.py`):'
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域提示** (`educator_prompts.py`):'
- en: Replace investment terminology with educational language throughout all prompts
  id: totrans-305
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在所有提示中用教育语言替换投资术语
- en: Change `portfolio` to `learning progress`, `returns` to `comprehension`, and
    `risk` to `difficulty level`
  id: totrans-306
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 `portfolio` 替换为 `学习进度`，`returns` 替换为 `理解度`，`risk` 替换为 `难度级别`
- en: Update the extraction focus from financial facts to educational ones (learning
    pace, subject struggles, and preferred examples)
  id: totrans-307
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将提取焦点从金融事实更改为教育事实（学习节奏、学科困难和偏好示例）
- en: Maintain the same JSON structure but with education-specific fields
  id: totrans-308
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持相同的 JSON 结构，但包含教育特定的字段
- en: '**Data generator** (`educator_data.py`):'
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据生成器** (`educator_data.py`):'
- en: Replace portfolio templates with student profiles (visual learner, struggling
    reader, and advanced math)
  id: totrans-310
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将投资模板替换为学生档案（视觉学习者、阅读有困难的学生和高级数学）
- en: Swap financial holdings for subjects and topics (algebra, biology, and essay
    writing)
  id: totrans-311
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将金融持股转换为学科和主题（代数、生物学和论文写作）
- en: 'Update conversation templates: `How''s my portfolio?` becomes `Can you explain
    photosynthesis?`'
  id: totrans-312
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新对话模板：`我的投资组合怎么样？`变为`你能解释光合作用吗？`
- en: Change success metrics from returns/satisfaction to comprehension/engagement
    scores
  id: totrans-313
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将成功指标从回报/满意度更改为理解度/参与度分数
- en: '**Test scenarios** (`educator_test_scenarios.py` or integrated):'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试场景** (`educator_test_scenarios.py` 或集成):'
- en: Convert investment scenarios to educational ones
  id: totrans-315
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将投资场景转换为教育场景
- en: Replace *market volatility concerns* with *test anxiety* scenarios
  id: totrans-316
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 *市场波动担忧* 替换为 *测试焦虑* 场景
- en: 'Update expected behaviors: `explain jargon` becomes `break down complex concepts`'
  id: totrans-317
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新预期行为：`解释术语`变为`分解复杂概念`
- en: These conversions maintain the same structural logic while translating domain
    concepts. The goal is to preserve the underlying patterns of user interaction
    and success measurement while adapting the vocabulary and context to your new
    domain.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 这些转换在保持相同结构逻辑的同时，将领域概念进行翻译。目标是保留用户交互和成功测量的基本模式，同时将词汇和上下文适应到新的领域。
- en: With these four files defined, the next step is leveraging an LLM to accelerate
    the conversion process and ensure consistency across your domain implementation.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义了这四个文件之后，下一步是利用 LLM 加速转换过程并确保领域实现的一致性。
- en: Conversion strategy with LLMs
  id: totrans-320
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 LLM 的转换策略
- en: The most efficient approach is to use your preferred LLM to help with the conversion.
    Here is an example prompt:`I have an investment advisor agent implementation.
    Help me convert these components to an education tutor domain. Here's the investment_advisor_agent.py`
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 最有效的方法是使用你偏好的 LLM 来帮助转换。以下是一个示例提示：“我有一个投资顾问代理实现。帮助我将这些组件转换为教育辅导领域。这是 investment_advisor_agent.py”
- en: '`file: [paste code]. Convert this to educator_agent.py maintaining the same
    interface but replacing investment concepts with educational ones.`'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: '`file: [粘贴代码]。将其转换为 educator_agent.py，保持相同的接口但用教育概念替换投资概念。`'
- en: 'The LLM will preserve the structure while translating domain concepts. Key
    mappings to verify include the following:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 将在翻译领域概念的同时保留结构。需要验证的关键映射包括以下内容：
- en: '**Communities**: Risk profiles → learning styles'
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**社区**：风险配置文件 → 学习风格'
- en: '**Tasks**: Financial operations → educational activities'
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务**：金融操作 → 教育活动'
- en: '**Metrics**: Monetary performance → learning outcomes'
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**指标**：货币表现 → 学习成果'
- en: '**Contexts**: Portfolio state → student progress'
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文**：投资状态 → 学生进度'
- en: These mappings form the conceptual bridge between domains. By systematically
    translating each element, you ensure that the procedural memory system can apply
    the same learning patterns in your new context; hierarchical learning works the
    same whether organizing investors by risk tolerance or students by learning style.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 这些映射形成了领域之间的概念桥梁。通过系统地翻译每个元素，您确保程序性记忆系统可以在您的新环境中应用相同的学习模式；分层学习在按风险承受能力组织投资者或按学习风格组织学生时都起作用。
- en: Once you’ve completed the conversion, organizing your new domain properly ensures
    that it integrates seamlessly with the core system. The next section shows the
    directory structure that makes this modular architecture work.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 完成转换后，正确组织您的新领域确保它与核心系统无缝集成。下一节将展示使这种模块化架构工作的目录结构。
- en: Directory structure for new domain
  id: totrans-330
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 新领域的目录结构
- en: 'Your new domain follows the same organizational pattern as the investment advisor,
    keeping all domain-specific code isolated in its own directory:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 您的新领域遵循与投资顾问相同的组织模式，将所有特定领域的代码隔离在其自己的目录中：
- en: '[PRE17]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The beauty of this architecture is that the core system (`coala_agent.py`, `procedural_memory.py`,
    and `baseline_agent.py`) remains untouched. You’re only translating domain concepts
    within a consistent interface. The procedural memory system will automatically
    learn what works for students instead of investors, the semantic memory will extract
    educational facts instead of financial ones, and the episodic memory will store
    tutoring sessions instead of advisory conversations, all without modifying a single
    line of the core infrastructure.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构的美丽之处在于，核心系统（`coala_agent.py`、`procedural_memory.py`和`baseline_agent.py`）保持不变。您只需在一致的接口中翻译领域概念。程序性记忆系统将自动学习对学生有效的方法，而不是对投资者有效的方法，语义记忆将提取教育事实而不是金融信息，情景记忆将存储辅导课程而不是咨询对话，所有这些都不需要修改核心基础设施的任何一行代码。
- en: 'This domain modularity means you can run multiple specialized agents simultaneously,
    each learning and improving within its expertise while sharing the same underlying
    cognitive architecture. Whether you’re building a medical diagnostic assistant,
    a legal research aide, or a cooking instruction bot, the pattern remains the same:
    implement the domain interface, let procedural memory discover what works, and
    watch your agent evolve from generic responses to domain expertise.'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 这种领域模块化意味着您可以同时运行多个专业智能体，每个智能体在其专业领域内学习和改进，同时共享相同的底层认知架构。无论您是在构建医疗诊断助手、法律研究助手还是烹饪指导机器人，模式都是相同的：实现领域接口，让程序性记忆发现什么有效，并观察您的智能体从通用响应发展到领域专业知识。
- en: 'Putting it all together: the complete CoALA architecture'
  id: totrans-335
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将所有内容综合起来：完整的CoALA架构
- en: The journey through procedural memory optimization reveals a fundamental shift
    in how we architect AI agents. No longer are we limited to static systems that
    repeat the same behaviors regardless of experience; instead, we can build domain-agnostic
    learning frameworks that enable agents to adapt and improve through every interaction.
    The modular architecture we’ve developed, with complete separation between core
    memory systems and domain-specific logic, represents a crucial evolution in RAG
    systems. While traditional RAG retrieves documents and memory-enhanced RAG retrieves
    personalized context, procedural memory optimizes the very mechanisms by which
    agents operate, creating a meta-learning layer that continuously refines behavior
    based on empirical performance.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 通过程序性记忆优化之旅揭示了我们在构建AI智能体方面的根本转变。我们不再受限于静态系统，这些系统无论经验如何都会重复相同的行为；相反，我们可以构建领域无关的学习框架，使智能体能够通过每一次交互进行适应和改进。我们开发的模块化架构，核心记忆系统和特定领域逻辑的完全分离，代表了RAG系统的重要进化。虽然传统的RAG检索文档，增强记忆的RAG检索个性化上下文，程序性记忆优化了智能体操作的机制，创建了一个基于经验性能持续改进行为的元学习层。
- en: Throughout this chapter, we’ve explored how procedural memory transforms self-improving
    agents from theory into deployable reality. The hierarchical learning approach
    ensures that patterns are applied at the appropriate scope, preventing over-generalization
    while maximizing learned knowledge. The comprehensive feedback loops enable continuous
    refinement, with every interaction potentially improving future performance.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了程序性记忆如何将自我改进的智能体从理论转化为可部署的现实。分层学习方法确保模式在适当的范围内应用，防止过度泛化，同时最大化学习到的知识。综合反馈循环使持续改进成为可能，每一次交互都有可能提高未来的表现。
- en: This procedural capability represents the final piece of a larger puzzle. Let’s
    examine how all four memory types work together to create a complete cognitive
    architecture.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 这种程序性能力是更大谜题的最后一部分。让我们考察所有四种记忆类型如何协同工作，以创建一个完整的认知架构。
- en: 'Integration: four memory types working together'
  id: totrans-339
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成：四种记忆类型协同工作
- en: The integration of procedural memory with the semantic and episodic memory systems
    from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422) creates a complete
    CoALA-based cognitive architecture. Your agents now possess working memory for
    immediate context, episodic memory for recalling specific experiences, semantic
    memory for storing facts and knowledge, and procedural memory for encoding and
    refining behavioral patterns. This complete memory system transforms agents from
    simple question-answering tools into sophisticated cognitive systems that maintain
    context, remember interactions, accumulate knowledge, and continuously improve
    their performance, all the while maintaining the modularity that makes them practical
    to deploy and maintain.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 程序性记忆与来自[*第17章*](B34736_17_ePub.xhtml#_idTextAnchor422)的语义和情景记忆系统的集成，创建了一个完整的基于CoALA的认知架构。您的代理现在拥有工作记忆以处理即时上下文，情景记忆以回忆特定经历，语义记忆以存储事实和知识，以及程序性记忆以编码和细化行为模式。这个完整的记忆系统将代理从简单的问答工具转变为复杂的认知系统，它们保持上下文，记住交互，积累知识，并持续改进性能，同时保持使它们易于部署和维护的模块化。
- en: The code lab demonstrated this architecture working across different contexts;
    the same core system that powers our investment advisor could drive a healthcare
    assistant, educational tutor, or customer service bot simply by swapping the domain
    agent implementation. This modularity transforms procedural memory from an interesting
    research concept into a practical tool for building production-ready adaptive
    agents.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 代码实验室展示了该架构在不同场景下的工作情况；驱动我们的投资顾问的核心系统，只需通过交换领域代理实现，就可以驱动医疗助手、教育导师或客户服务机器人。这种模块化将程序性记忆从有趣的研究概念转变为构建生产就绪自适应代理的实用工具。
- en: 'With the theoretical foundation and architectural principles established, the
    practical question becomes: how do you actually implement this in production?
    The next section addresses the real-world implications of deploying learning agents.'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 在确立了理论基础和架构原则之后，实际问题是：如何在生产中实际实施？下一节将探讨部署学习代理的现实世界影响。
- en: 'Practical implications: enabling rapid innovation'
  id: totrans-343
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际影响：促进快速创新
- en: As you implement procedural memory in your own systems, remember that this modular
    approach is not just about code organization. It’s also about enabling rapid innovation.
    Domain experts can create specialized agents without understanding the intricacies
    of memory systems. Machine learning engineers can improve the core learning algorithms
    without domain expertise. Organizations can deploy multiple domain-specific agents
    using the same infrastructure. This separation of concerns transforms procedural
    memory from an interesting research concept into a practical tool for building
    production-ready adaptive agents.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 当您在自己的系统中实现程序性记忆时，请记住，这种模块化方法不仅仅是关于代码组织。它还关于促进快速创新。领域专家可以创建专业代理，而无需了解记忆系统的复杂性。机器学习工程师可以在没有领域专业知识的情况下改进核心学习算法。组织可以使用相同的架构部署多个特定领域的代理。这种关注点的分离将程序性记忆从有趣的研究概念转变为构建生产就绪自适应代理的实用工具。
- en: The transformation from static to learning agents represents more than a technical
    upgrade; it’s a fundamental reimagining of what AI assistants can be. By giving
    your agents the ability to learn from experience within a clean, maintainable
    architecture, you’re not just improving their performance metrics. You’re creating
    systems that build genuine expertise in their domains, that become more valuable
    over time, and that adapt to the unique needs of each deployment context while
    remaining manageable and extensible.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 从静态代理到学习代理的转变，不仅仅是一个技术升级，它是对人工智能助手可能性的根本重新构想。通过为您的代理提供在干净、可维护的架构中从经验中学习的能力，您不仅提高了它们的性能指标。您正在创建在其领域内建立真正专业知识、随时间增值，并且能够适应每个部署场景的独特需求，同时保持可管理和可扩展的系统。
- en: Summary
  id: totrans-346
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter completed our exploration of the CoALA memory framework by integrating
    procedural memory with episodic and semantic systems, creating agents that not
    only remember and know but also learn and adapt. We’ve seen how LangMem’s learning
    algorithms enable different approaches to pattern extraction, how domain metrics
    shape agent evolution, and how clean architectural separation makes these sophisticated
    systems practical to build and maintain. The investment advisor we built demonstrates
    the full power of this approach – transforming from a generic responder into a
    personalized, continuously improving expert through the integration of all three
    memory types.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将程序性记忆与情景和语义系统相结合，本章完成了我们对CoALA记忆框架的探索，创建了不仅能够记住和了解，还能学习和适应的智能体。我们看到了LangMem的学习算法如何使不同的模式提取方法成为可能，领域度量如何塑造智能体的进化，以及清晰的架构分离如何使这些复杂的系统易于构建和维护。我们构建的投资顾问展示了这种方法的全貌——通过整合所有三种记忆类型，从通用的响应者转变为个性化、持续改进的专家。
- en: As we close this exploration of RAG agents and the CoALA memory framework, you
    stand equipped with knowledge that remains at the very heart of modern AI innovation.
    The fundamental principles you’ve internalized – hierarchical learning, domain-agnostic
    architectures, continuous adaptation, and modular design – will serve you well
    regardless of how the field evolves. Thank you for joining me on this journey
    through advanced RAG systems and adaptive agent architectures. The future of AI
    isn’t just about smarter algorithms but about building systems that enable continuous
    learning and improvement, and you’re now equipped to be part of that exciting
    evolution!
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们结束对RAG智能体和CoALA记忆框架的探索，你将掌握的知识仍然是现代人工智能创新的精髓。你内化的基本原理——分层学习、领域无关的架构、持续适应和模块化设计——将使你在该领域如何发展的情况下都能受益。感谢你加入我，共同探索高级RAG系统和自适应智能体架构。人工智能的未来不仅仅是更智能的算法，而是构建能够实现持续学习和改进的系统，而你现在已经准备好成为这一激动人心的演变的一部分！
- en: '|'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
