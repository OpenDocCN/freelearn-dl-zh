- en: '<st c="0">Part 3: ChatGPT, DALL-E, and Whisper APIs for Desktop Apps Development</st>'
  id: totrans-321
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="0">第3部分：用于桌面应用程序开发的ChatGPT、DALL-E和Whisper API</st>
- en: <st c="71">In this part, your attention will be directed toward the creation
    of desktop applications, broadening your expertise in an array of artificial intelligence
    APIs.</st> <st c="234">You will explore AI art by seamlessly integrating the ChatGPT
    and DALL-E APIs to infuse your applications with captivating artistic capabilities.</st>
    <st c="380">Additionally, you will explore the realm of language translation and
    transcription through the utilization of the Whisper API.</st> <st c="507">Throughout
    this part, you will be exposed to various desktop application frameworks such
    as Tkinter, PyQt, and the Microsoft Office APIs, enabling you to craft robust
    and</st> <st c="678">feature-rich applications.</st>
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="71">在本部分，您的注意力将转向桌面应用程序的创建，扩展您在一系列人工智能API方面的专业知识。</st> <st c="234">您将通过无缝集成ChatGPT和DALL-E
    API来探索人工智能艺术，为您的应用程序注入吸引人的艺术能力。</st> <st c="380">此外，您将通过使用Whisper API探索语言翻译和转录领域。</st>
    <st c="507">在本部分中，您将接触到各种桌面应用程序框架，如Tkinter、PyQt和Microsoft Office API，使您能够构建强大且功能丰富的应用程序。</st>
- en: <st c="704">This part has the</st> <st c="723">following chapters:</st>
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="704">本部分包含以下章节：</st> <st c="723">：</st>
