    <st c="34538">元素被设置为具有其父容器宽度的</st> `<st c="34573">70%</st>` <st c="34576">，颜色为浅灰色。</st>
    <st c="34626">代表提交按钮的`<st c="34630">input[type="submit"]</st>` <st c="34650">元素具有蓝色背景色，当鼠标悬停</st>
    <st c="34773">在其上时，光标变为指针。</st>
- en: <st c="34781">The</st> `<st c="34786">Responsive styles</st>` <st c="34803">section
    uses media queries to apply specific styles when the maximum width of the viewport
    is</st> `<st c="34898">767px</st>` <st c="34903">or less.</st> <st c="34913">In
    this case, it reduces the padding of the</st> `<st c="34957">.container</st>`
    <st c="34967">and</st> `<st c="34972">main</st>` <st c="34976">elements, decreases
    the font size of headings to</st> `<st c="35026">20px</st>`<st c="35030">, and
    adjusts the padding of the</st> `<st c="35063">textarea</st>` <st c="35071">and</st>
    `<st c="35076">input[type="submit"]</st>` <st c="35096">elements.</st> <st c="35107">These
    styles ensure that the quiz generator application is visually appealing and adapts
    well to different screen sizes, providing a better</st> <st c="35247">user experience.</st>
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="34781">`<st c="34786">响应式样式</st>` <st c="34803">部分使用媒体查询在视口的最大宽度为</st>
    `<st c="34898">767px</st>` <st c="34903">或更小时应用特定样式。</st> <st c="34913">在这种情况下，它减少了`.container`
    <st c="34957">和</st> `<st c="34972">main</st>` <st c="34976">元素的填充，将标题的字体大小减少到</st>
    `<st c="35026">20px</st>`<st c="35030">，并调整了`<st c="35063">textarea</st>` <st
    c="35071">和</st> `<st c="35076">input[type="submit"]</st>` <st c="35096">元素的填充。</st>
    <st c="35107">这些样式确保了测验生成应用程序在视觉上吸引人，并能很好地适应不同的屏幕尺寸，提供更好的</st> <st c="35247">用户体验。</st>
- en: <st c="35263">So far, we have</st> <st c="35279">successfully</st> <st c="35292">constructed
    the entire user interface for the quiz generation feature of our application.</st>
    <st c="35383">Our next step is to integrate the ChatGPT API service and implement
    the</st> <st c="35455">necessary views.</st>
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="35263">到目前为止，我们已经</st> <st c="35279">成功</st> <st c="35292">构建了我们应用程序测验生成功能的整个用户界面。</st>
    <st c="35383">我们的下一步是集成ChatGPT API服务并实现必要的视图。</st> <st c="35455">正确答案应该在哪里以及如何显示</st>
- en: <st c="35471">Creating ChatGPT API views with Django</st>
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <st c="35471">使用Django创建ChatGPT API视图</st>
- en: <st c="35510">Now that we have</st> <st c="35527">completed the frontend, we
    will</st> <st c="35560">explore how to incorporate this powerful ChatGPT API into
    our Django views, enabling us to harness the capabilities of ChatGPT to generate</st>
    <st c="35699">quiz questions.</st>
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="35510">现在我们已经</st> <st c="35527">完成了前端开发，我们将</st> <st c="35560">探索如何将这个强大的ChatGPT
    API集成到我们的Django视图中，使我们能够利用ChatGPT的能力来生成</st> <st c="35699">测验问题。</st>
- en: <st c="35714">Asking ChatGPT to generate a response in a specific structure
    can be a challenging task, as we need to define very specific instructions about
    how the questions in our quiz should be generated.</st> <st c="35909">Having that
    in mind, our ChatGPT prompt should meet the</st> <st c="35965">following requirements:</st>
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="35714">要求ChatGPT以特定结构生成响应可能是一项具有挑战性的任务，因为我们需要定义非常具体的指令，说明我们的测验中的问题应该如何生成。</st>
    <st c="35909">考虑到这一点，我们的ChatGPT提示应该满足以下要求：</st> <st c="35965">以下要求：</st>
- en: <st c="35988">A variable holding the text that we want to create questions for
    should be passed as a separate variable.</st> <st c="36095">That will enable our
    app to work with different types</st> <st c="36149">of text.</st>
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="35988">一个变量应该传递我们想要创建问题的文本。</st> <st c="36095">这将使我们的应用程序能够处理不同类型的</st>
    <st c="36149">文本。</st>
- en: <st c="36157">The prompt should consist of instructions that specify</st> <st
    c="36213">the following:</st>
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="36157">提示应该包含以下指令，以指定</st> <st c="36213">以下：</st>
- en: <st c="36227">The number</st> <st c="36239">of questions</st>
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="36227">问题的数量</st> <st c="36239">个
- en: <st c="36251">Where and how the correct answer should</st> <st c="36292">be
    displayed</st>
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="36251">提示应该包含以下指令：</st> <st c="36213">以下：</st>
- en: <st c="36304">What type of question ChatGPT should generate (multiple-choice,</st>
    <st c="36369">open-answer, etc.)</st>
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="36304">ChatGPT应生成哪种类型的问题（多项选择、开放式回答等）</st>
- en: <st c="36387">It is a good</st> <st c="36401">practice to create such requirements
    every time you want to design a ChatGPT prompt and test whether the API response
    meets the expected response, based on your</st> <st c="36562">prompt definition.</st>
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="36387">每次您想要设计一个ChatGPT提示并测试API响应是否符合您的提示定义时，创建这样的要求是一个好习惯。</st> <st
    c="36401">基于您的</st> <st c="36562">提示定义</st>，检查API响应是否符合预期。</st>
- en: <st c="36580">Inside the</st> `<st c="36592">quiz_app</st>` <st c="36600">folder
    of your Django project, you will need to create two essential files –</st> `<st
    c="36678">config.py</st>` <st c="36687">and</st> `<st c="36692">services.py</st>`<st
    c="36703">. The</st> `<st c="36709">config.py</st>` <st c="36718">file serves
    as a container for your ChatGPT API key, allowing you to securely store and access
    it within your application.</st> <st c="36842">This key is crucial to establish
    a connection with the ChatGPT API service.</st> <st c="36918">The</st> `<st c="36922">services.py</st>`
    <st c="36933">file, on the other hand, plays a pivotal role in housing the necessary
    functions</st> <st c="37015">that will enable you to interact with the ChatGPT
    API within your Django views.</st> <st c="37095">These functions will facilitate
    communication with the API, allowing you to generate quiz questions dynamically
    based on</st> <st c="37216">user input:</st>
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="36580">在您的Django项目中的`<st c="36592">quiz_app</st>` `<st c="36600">文件夹内，您需要创建两个基本文件——</st>
    `<st c="36678">config.py</st>` `<st c="36687">和</st> `<st c="36692">services.py</st>`<st
    c="36703">。` `<st c="36709">config.py</st>` `<st c="36718">文件作为存储您的ChatGPT API密钥的容器，允许您在应用程序中安全地存储和访问它。</st>
    <st c="36842">此密钥对于建立与ChatGPT API服务的连接至关重要。</st> <st c="36918">另一方面，`<st c="36922">services.py</st>`
    `<st c="36933">文件在容纳必要的函数中扮演着关键角色，这些函数将使您能够在Django视图中与ChatGPT API交互。</st> <st
    c="37015">这些函数将促进与API的通信，允许您根据</st> <st c="37216">用户输入</st> 动态生成测验问题：</st>
- en: <st c="37227">services.py</st>
  id: totrans-164
  prefs: []
