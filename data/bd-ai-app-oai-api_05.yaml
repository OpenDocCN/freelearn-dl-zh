- en: <st c="2">Quiz Generation App with ChatGPT and Django</st>
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="2">使用ChatGPT和Django创建问答应用</st>
- en: <st c="45">In this chapter, we will delve into the exciting world of combining
    the power of</st> **<st c="127">ChatGPT</st>**<st c="134">, a cutting-edge</st>
    <st c="150">language</st> <st c="160">model, with</st> **<st c="172">Django</st>**<st
    c="178">, the widely acclaimed Python framework for app development.</st> <st
    c="239">Together, we will explore how to build a dynamic and interactive exam</st>
    <st c="309">generation application that leverages</st> **<st c="347">Artificial</st>**
    **<st c="358">Intelligence</st>** <st c="370">(</st>**<st c="372">AI</st>**<st
    c="374">).</st>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="45">在本章中，我们将深入探讨将</st> **<st c="127">ChatGPT</st>**<st c="134">，一个前沿的</st>
    <st c="150">语言</st> <st c="160">模型</st>，与</st> **<st c="172">Django</st>**<st
    c="178">，广受赞誉的Python应用开发框架</st> <st c="239">相结合的激动人心的世界。</st> <st c="309">我们将探索如何构建一个动态且交互式的考试</st>
    <st c="347">生成应用</st>，该应用利用</st> **<st c="358">人工智能</st>** <st c="370">(</st>**<st
    c="372">AI</st>**<st c="374">)。</st>
- en: <st c="377">In the previous chapters, we primarily focused on Flask, a lightweight
    and basic web framework.</st> <st c="474">However, in this chapter, we will focus
    on Django, a robust and advanced framework that has been instrumental in constructing
    some of the most renowned and widely used applications, including Instagram, Dropbox,
    and Pinterest.</st> <st c="701">You will have the opportunity to explore the capabilities
    of Django, which include features such as database management, an authentication
    system, an admin interface, and</st> <st c="872">form handling.</st>
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在前几章中，我们主要关注了Flask，一个轻量级和基本的Web框架。</st> <st c="474">然而，在本章中，我们将重点关注Django，一个强大且高级的框架，它在构建一些最著名和最广泛使用的应用程序中发挥了关键作用，包括Instagram、Dropbox和Pinterest。</st>
    <st c="701">您将有机会探索Django的功能，包括数据库管理、认证系统、管理界面以及</st> <st c="872">表单处理。</st>
- en: <st c="886">You will learn how to build a Django project from scratch, including
    setting up the environment and creating the foundational components for your application.</st>
    <st c="1046">We will focus on creating the framework and views for a quiz generation
    app.</st> <st c="1123">You will explore the integration of ChatGPT and Django,
    enabling you to use AI for quiz generation.</st> <st c="1223">To ensure a comprehensive
    learning experience, we will cover two essential views within the application.</st>
    <st c="1328">One view will allow users to generate quizzes by inputting study
    material and executing the ChatGPT API, resulting in the generation of relevant
    questions that will be stored in a database.</st> <st c="1518">The other view
    will enable users to conveniently download any previously</st> <st c="1591">generated
    tests.</st>
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="886">您将学习如何从头开始构建Django项目，包括设置环境和创建应用程序的基础组件。</st> <st c="1046">我们将专注于创建问答应用的框架和视图。</st>
    <st c="1123">您将探索ChatGPT和Django的集成，使您能够使用AI进行问答生成。</st> <st c="1223">为了确保全面的学习体验，我们将介绍应用中的两个基本视图。</st>
    <st c="1328">一个视图将允许用户通过输入学习材料和执行ChatGPT API来生成问答，相关的问题将被存储在数据库中。</st> <st c="1518">另一个视图将使用户能够方便地下载之前</st>
    <st c="1591">生成的测试。</st>
- en: <st c="1607">In this chapter, you will explore several key topics essential
    for developing a robust Django application.</st> <st c="1715">You will begin by
    installing Django and creating your first running project, laying the foundation
    for your application.</st> <st c="1836">After that, you will build Django views
    specifically tailored for an exam generation application, followed by integrating
    the ChatGPT API with Django to intercept responses in the backend.</st> <st c="2025">To
    enhance the user experience, you will utilize Bootstrap templates to create a
    visually appealing interface.</st> <st c="2136">Furthermore, you will learn how
    to store and fetch ChatGPT responses securely in a database, ensuring data integrity
    and security.</st> <st c="2267">Finally, the chapter will guide you through adding
    file download functionality to your application, rounding out your skill set and
    enabling you to deliver a comprehensive and functional</st> <st c="2454">web application.</st>
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="1607">在本章中，您将探索开发健壮的 Django 应用程序所必需的几个关键主题。</st> <st c="1715">您将从安装 Django
    并创建您的第一个运行项目开始，为您的应用程序打下基础。</st> <st c="1836">之后，您将构建针对考试生成应用程序定制的 Django 视图，然后与
    Django 集成 ChatGPT API 以在后台拦截响应。</st> <st c="2025">为了提升用户体验，您将利用 Bootstrap 模板创建一个视觉上吸引人的界面。</st>
    <st c="2136">此外，您将学习如何安全地将 ChatGPT 响应在数据库中存储和检索，确保数据完整性和安全性。</st> <st c="2267">最后，本章将指导您将文件下载功能添加到您的应用程序中，完善您的技能集，并使您能够交付一个全面且功能齐全的</st>
    <st c="2454">网络应用程序。</st>
- en: <st c="2470">In this chapter, we will cover the</st> <st c="2506">following
    topics:</st>
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="2470">在本章中，我们将涵盖以下</st> <st c="2506">主题：</st>
- en: <st c="2523">Building a</st> <st c="2535">Django project</st>
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="2523">构建一个</st> <st c="2535">Django 项目</st>
- en: <st c="2549">Creating the exam app frame</st> <st c="2578">and views</st>
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="2549">创建考试应用框架</st> <st c="2578">和视图</st>
- en: <st c="2587">Integrating ChatGPT and Django for</st> <st c="2623">quiz generation</st>
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="2587">将 ChatGPT 和 Django 集成用于</st> <st c="2623">测验生成</st>
- en: <st c="2638">Storing and downloading</st> <st c="2663">generated quizzes</st>
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="2638">存储和下载</st> <st c="2663">生成的测验</st>
- en: <st c="2680">By the end of this chapter, you will have the knowledge and skills
    to employ the ChatGPT API to generate examination questions derived from any provided</st>
    <st c="2834">study material.</st>
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="2680">在本章结束时，您将具备使用 ChatGPT API 生成任何提供的</st> <st c="2834">学习材料派生的考试问题的知识和技能。</st>
- en: <st c="2849">Technical requirements</st>
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="2849">技术要求</st>
- en: <st c="2872">You will need to cover some basic software installations before
    continuing with this chapter.</st> <st c="2967">In addition, the installation
    of the Django web framework will be demonstrated in the</st> <st c="3053">next
    section.</st>
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="2872">在继续本章内容之前，您需要完成一些基本软件的安装。</st> <st c="2967">此外，Django 网络框架的安装将在下一节中演示。</st>
- en: <st c="3066">The project has the following</st> <st c="3097">technical prerequisites:</st>
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="3066">该项目有以下</st> <st c="3097">技术先决条件：</st>
- en: <st c="3121">Python version 3.7 or higher installed on your</st> <st c="3169">local
    machine</st>
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="3121">在您的</st> <st c="3169">本地机器上安装 Python 3.7 或更高版本</st>
- en: <st c="3182">A code editor, with VSCode recommended for an</st> <st c="3229">optimal
    experience</st>
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="3182">一个代码编辑器，推荐使用 VSCode 以获得</st> <st c="3229">最佳体验</st>
- en: <st c="3247">An OpenAI API key to access the necessary</st> <st c="3290">API
    functionalities</st>
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: <st c="3247">一个 OpenAI API 密钥，用于访问必要的</st> <st c="3290">API 功能</st>
- en: <st c="3309">You can access the code examples used in this chapter on GitHub
    at the provided</st> <st c="3390">repository:</st> [<st c="3402">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="3478">.</st>
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="3309">您可以在提供的</st> <st c="3390">存储库</st> <st c="3402">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="3478">中访问本章使用的代码示例。</st>
- en: <st c="3479">Building a Django project</st>
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="3479">构建 Django 项目</st>
- en: <st c="3505">In this section, we</st> <st c="3525">will embark on the exciting
    journey of building a Django project that forms the foundation of our quiz generation
    application.</st> <st c="3653">We will guide you through the step-by-step process
    of setting up and structuring your Django project, ensuring that you have a solid
    groundwork to build upon.</st> <st c="3812">By the end of this section, you will
    have a fully functional Django project that can facilitate the automated generation
    of quizzes based on</st> <st c="3953">study materials.</st>
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="3505">在本节中，我们将开始一段激动人心的旅程，构建一个作为我们测验生成应用基础的Django项目。</st> <st c="3525">我们将引导您逐步设置和构建您的Django项目，确保您有一个坚实的基础来继续。</st>
    <st c="3653">在本节结束时，您将拥有一个功能齐全的Django项目，可以基于</st> <st c="3812">学习材料自动生成测验。</st>
- en: <st c="3969">Our adventure begins with</st> <st c="3996">the installation of
    Django and the creation of a new Django project.</st> <st c="4065">We will walk
    you through the process of setting up your development environment, including
    the installation of Python and the Django framework.</st> <st c="4209">With Django
    in place, we will use the command-line interface to generate a new Django project,
    providing you with the necessary directory structure and initial</st> <st c="4369">configuration
    files.</st>
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="3969">我们的冒险从</st> <st c="3996">安装Django和创建新的Django项目开始。</st> <st c="4065">我们将向您介绍设置开发环境的过程，包括Python和Django框架的安装。</st>
    <st c="4209">在Django设置完成后，我们将使用命令行界面生成一个新的Django项目，为您提供必要的目录结构和初始</st> <st c="4369">配置文件。</st>
- en: <st c="4389">We can start by creating a new VSCode project called</st> `<st
    c="4443">QuizApp</st>`<st c="4450">. Now, let’s click on the VSCode</st> `<st
    c="4651">pip</st>`<st c="4654">:</st>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="4389">我们可以先创建一个名为</st> `<st c="4443">QuizApp</st>`<st c="4450">的新VSCode项目。</st>
    现在，让我们点击VSCode的</st> `<st c="4651">pip</st>`<st c="4654">：</st>
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: <st c="4676">Next, you can run the following command to create a new Django
    project in</st> <st c="4751">the terminal:</st>
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="4676">接下来，您可以在终端中运行以下命令来创建一个新的Django项目：</st>
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: <st c="4804">When you run this command, Django’s command-line utility, called</st>
    `<st c="4870">django-admin</st>`<st c="4882">, creates a new project directory
    with the specified name,</st> `<st c="4941">quiz_project</st>`<st c="4953">. This
    directory will contain the necessary files and folders to start a</st> <st c="5026">Django
    project.</st>
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="4804">当您运行此命令时，Django的命令行工具，称为</st> `<st c="4870">django-admin</st>`<st
    c="4882">，将创建一个具有指定名称的新项目目录，</st> `<st c="4941">quiz_project</st>`<st c="4953">。此目录将包含启动Django项目所需的文件和文件夹。</st>
- en: <st c="5041">The</st> `<st c="5046">startproject</st>` <st c="5058">command</st>
    <st c="5066">initializes the project structure by generating the</st> <st c="5119">following
    files:</st>
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5041">`<st c="5046">startproject</st>` <st c="5058">命令</st> <st c="5066">通过生成以下文件来初始化项目结构：</st>
    <st c="5119">以下文件：</st>
- en: '`<st c="5135">manage.py</st>`<st c="5145">: A command-line utility that allows
    you to interact with various Django commands and manage</st> <st c="5239">your
    project.</st>'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="5135">manage.py</st>`<st c="5145">：一个命令行工具，允许您与各种Django命令交互并管理</st>
    <st c="5239">您的项目。</st>'
- en: '`<st c="5252">quiz_project</st>`<st c="5265">: The project directory, which
    will have the same name as the one specified in the command.</st> <st c="5358">This
    directory serves as the root of your Django project and contains configuration
    files and other</st> <st c="5458">project-specific components.</st>'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="5252">quiz_project</st>`<st c="5265">：项目目录，其名称将与命令中指定的名称相同。</st> <st
    c="5358">此目录作为您Django项目的根目录，包含配置文件和其他</st> <st c="5458">项目特定组件。</st>'
- en: <st c="5486">Inside the project directory, you will find the following files</st>
    <st c="5551">and directories:</st>
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目目录内，您将找到以下文件和目录：
- en: '`<st c="5567">__init__.py</st>`<st c="5579">: An empty file that marks the
    directory as a</st> <st c="5626">Python package</st>'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="5567">__init__.py</st>`<st c="5579">：一个空文件，标记目录为一个</st> <st c="5626">Python包</st>'
- en: '`<st c="5640">settings.py</st>`<st c="5652">: The configuration file where
    you define various settings for your Django project, including database settings,
    middleware, and</st> <st c="5782">installed apps</st>'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="5640">settings.py</st>`<st c="5652">：配置文件，您在其中定义Django项目的各种设置，包括数据库设置、中间件和</st>
    <st c="5782">已安装的应用程序</st>'
- en: '`<st c="5796">urls.py</st>`<st c="5804">: The URL configuration file that defines
    the mapping between URLs and views for</st> <st c="5886">your project</st>'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="5796">urls.py</st>`<st c="5804">: 定义您项目URL与视图之间映射的URL配置文件。</st>'
- en: '`<st c="5898">wsgi.py</st>`<st c="5906">: The</st> **<st c="5913">Web Server
    Gateway Interface</st>** <st c="5941">(</st>**<st c="5943">WSGI</st>**<st c="5947">)
    configuration file used</st> <st c="5974">for</st> <st c="5977">deployment</st>'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="5898">wsgi.py</st>`<st c="5906">: 用于部署的**<st c="5913">Web服务器网关接口</st>**
    <st c="5941">(</st>**<st c="5943">WSGI</st>**<st c="5947">) 配置文件。</st>'
- en: <st c="5988">You can further customize</st> <st c="6014">and develop your Django
    project by defining models, views, and templates and configuring settings based
    on your</st> <st c="6127">application’s requirements.</st>
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5988">您可以通过定义模型、视图和模板以及根据应用程序的需求配置设置来进一步自定义和开发您的Django项目。</st>
- en: <st c="6154">In Django, a project is a collection of settings, configurations,
    and multiple apps that work together to create a web application.</st> <st c="6287">An
    app, on the other hand, is a modular component within a Django project that serves
    a specific purpose or functionality.</st> <st c="6410">For this reason, in our</st>
    `<st c="6434">quiz_project</st>`<st c="6446">, we can create a new application</st>
    <st c="6480">as follows:</st>
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="6154">在Django中，一个项目是一组设置、配置和多个应用程序的集合，这些应用程序协同工作以创建一个网络应用程序。</st> <st
    c="6287">另一方面，应用程序是Django项目中的一个模块化组件，它服务于特定的目的或功能。</st> <st c="6410">因此，在我们的</st>
    `<st c="6434">quiz_project</st>`<st c="6446">中，我们可以创建一个新的应用程序</st> <st c="6480">如下：</st>
- en: '[PRE2]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: <st c="6544">The purpose of our newly created application will be to generate
    AI questions and enable users to download them.</st> <st c="6658">A new directory
    is generated with the specified app name,</st> `<st c="6716">quiz_app</st>`<st
    c="6724">. This directory contains the necessary files and folders to develop
    your Django app.</st> <st c="6810">Let’s explore the typical project structure
    and files within the</st> <st c="6875">app directory:</st>
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="6544">我们新创建的应用程序的目的将是生成AI问题并允许用户下载它们。</st> <st c="6658">将根据指定的应用程序名称生成一个新目录，</st>
    `<st c="6716">quiz_app</st>`<st c="6724">。 此目录包含开发您的Django应用程序所需的必要文件和文件夹。</st>
    <st c="6810">让我们探索</st> <st c="6875">应用程序目录</st> 内的典型项目结构和文件：</st>
- en: '`<st c="6889">admin.py</st>`<st c="6898">: This file is used to register your
    app’s models with the Django admin interface.</st> <st c="6982">You can customize
    how your models are displayed and interacted with on the</st> <st c="7057">admin
    site.</st>'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<st c="6889">admin.py</st>`<st c="6898">: 此文件用于将您的应用程序模型注册到Django管理界面。</st>
    <st c="6982">您可以根据需要自定义模型在管理站点上的显示和交互方式。</st>'
- en: '`<st c="7068">apps.py</st>`<st c="7076">: This file defines the app configuration,
    including the name of the app, and uses initialization functions when the application</st>
    <st c="7206">is started.</st>'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
