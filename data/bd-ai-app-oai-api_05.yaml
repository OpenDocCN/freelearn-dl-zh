- en: <st c="33523">When you launch your quiz generator at this point, you will see
    that while all the fields are visible, their visual presentation may not be aesthetically
    pleasing.</st> <st c="33688">This is because we have only incorporated HTML elements
    thus far.</st> <st c="33754">To enhance their appearance, we need to introduce
    some CSS styling.</st> <st c="33822">To do that, you can create a new CSS file
    called</st> `<st c="33871">quiz_style.css</st>` <st c="33885">inside the</st>
    `<st c="33897">quiz_project/static/css</st>` <st c="33920">directory.</st> <st
    c="33932">You can find the CSS file content</st> <st c="33966">here:</st> [<st
    c="33972">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter05%20QuizApp/quiz_project/quiz_project/static/css/quiz_style.css</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter05%20QuizApp/quiz_project/quiz_project/static/css/quiz_style.css)<st
    c="34130">.</st>
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="33523">当你此时启动你的测验生成器时，你会看到虽然所有字段都是可见的，但它们的视觉呈现可能并不美观。</st> <st c="33688">这是因为我们迄今为止只包含了HTML元素。</st>
    <st c="33754">为了增强它们的视觉效果，我们需要引入一些CSS样式。</st> <st c="33822">为此，你可以在</st> `<st
    c="33871">quiz_style.css</st>` <st c="33885">文件中创建一个新的CSS文件，该文件位于</st> `<st c="33897">quiz_project/static/css</st>`
    <st c="33920">目录下。</st> <st c="33932">你可以在这里找到CSS文件的内容</st> <st c="33966">：</st>
    [<st c="33972">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter05%20QuizApp/quiz_project/quiz_project/static/css/quiz_style.css</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter05%20QuizApp/quiz_project/quiz_project/static/css/quiz_style.css)<st
    c="34130">。</st>
- en: <st c="34131">Here, we define the styles for the</st> `<st c="34167">body</st>`<st
    c="34171">,</st> `<st c="34173">container</st>`<st c="34182">, and</st> `<st c="34188">main</st>`
    <st c="34192">elements.</st> <st c="34203">The</st> `<st c="34207">body</st>`
    <st c="34211">element is set to use the Arial font family and has a white background.</st>
    <st c="34284">The</st> `<st c="34288">container</st>` <st c="34297">class specifies
    a maximum width of</st> `<st c="34333">960px</st>`<st c="34338">, while the</st>
    `<st c="34350">main</st>` <st c="34354">element, which holds our application,
    also has a box shadow effect and a border radius</st> <st c="34442">of</st> `<st
    c="34445">5px</st>`<st c="34448">.</st>
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="34131">在这里，我们定义了</st> `<st c="34167">body</st>`<st c="34171">、</st> `<st
    c="34173">container</st>`<st c="34182">和</st> `<st c="34188">main</st>` <st c="34192">元素的风格。</st>
    <st c="34203">`<st c="34207">body</st>` <st c="34211">元素被设置为使用Arial字体家族，并具有白色背景。</st>
    <st c="34284">`<st c="34288">container</st>` <st c="34297">类指定最大宽度为</st> `<st
    c="34333">960px</st>`<st c="34338">，而包含我们的应用程序的`<st c="34350">main</st>` <st c="34354">元素，也具有阴影效果和</st>
    `<st c="34442">5px</st>`<st c="34445">的边框半径。</st>。
- en: <st c="34449">Then, we can define the styles for the</st> `<st c="34489">textarea</st>`
    <st c="34497">and</st> `<st c="34502">submit</st>` <st c="34508">button elements.</st>
    <st c="34526">The</st> `<st c="34530">textarea</st>` <st c="34538">element is
    set to have a width of</st> `<st c="34573">70%</st>` <st c="34576">of its parent
    container with a light gray color.</st> <st c="34626">The</st> `<st c="34630">input[type="submit"]</st>`
    <st c="34650">element, which represents a submit button, has a blue background
