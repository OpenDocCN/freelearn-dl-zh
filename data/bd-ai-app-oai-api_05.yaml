- en: <st c="12269">In Django, the relations between views, app URLs, and project
    URLs form a crucial structure to handle and route web requests.</st> <st c="12396">The</st>
    <st c="12399">flow begins with views, which are Python functions or classes responsible
    for processing specific HTTP requests and returning appropriate responses.</st>
    <st c="12549">Each view corresponds to a particular functionality or page within
    your application.</st> <st c="12634">Those views can be shown to users by being
    assigned a unique URL.</st> <st c="12700">Since, in Django, a project can have
    more than one application, those URLs are first defined at an app level in</st>
    `<st c="12812">quiz_app/urls.py</st>`<st c="12828">. Those URLs are then passed
    to the project-level</st> `<st c="12878">urls.py</st>` <st c="12885">file located
    in the</st> `<st c="12906">quiz_project</st>` <st c="12918">directory for our
    project (see</st> *<st c="12950">Figure 5</st>**<st c="12958">.2</st>*<st c="12960">).</st>
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="12269">在Django中，视图、应用URL和项目URL之间的关系构成了处理和路由Web请求的关键结构。</st> <st c="12396">流程从视图开始，视图是负责处理特定HTTP请求并返回适当响应的Python函数或类。</st>
    <st c="12549">每个视图对应于应用程序中的特定功能或页面。</st> <st c="12634">这些视图可以通过分配唯一的URL向用户展示。</st>
    <st c="12700">由于在Django中，一个项目可以有多个应用程序，因此这些URL首先在</st> `<st c="12812">quiz_app/urls.py</st>`<st
    c="12828">中的应用级别定义。然后，这些URL被传递到位于</st> `<st c="12878">urls.py</st>` <st c="12885">文件中的项目级别，该文件位于我们的项目目录</st>
    `<st c="12906">quiz_project</st>` <st c="12918">中（参见</st> *<st c="12950">图5</st>**<st
    c="12958">.2</st>*<st c="12960">）。</st>
