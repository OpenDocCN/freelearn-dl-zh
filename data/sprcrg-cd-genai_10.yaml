- en: Part 3
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分
- en: Road to an Open, Agentic Ecosystem
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开放、代理生态系统的道路
- en: This part introduces the emerging landscape of enterprise-ready AI agents, with
    a special focus on the infrastructure, protocols, and responsible design practices
    that make large-scale agent deployments possible.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分介绍了企业级AI代理的兴起格局，特别关注使大规模代理部署成为可能的基础设施、协议和负责任的设计实践。
- en: We begin by exploring the next generation of open protocols that aim to standardize
    and scale multi-agent collaboration—such as MCP, A2A, and NLWeb—which are set
    to play a foundational role in enabling cross-platform and cross-agent interoperability.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先探索旨在标准化和扩展多代理协作的下一代开放协议，如MCP、A2A和NLWeb，这些协议将在实现跨平台和跨代理互操作性方面发挥基础性作用。
- en: We’ll then dive into how enterprises can ensure responsible AI practices when
    deploying autonomous agents. Topics include agent evaluation, safety filters,
    guardrails, and the importance of human-in-the-loop systems in high-stakes scenarios.
    You’ll also learn strategies to optimize costs and maintain performance at scale.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将深入探讨企业在部署自主代理时如何确保负责任的AI实践。包括代理评估、安全过滤器、安全带以及在高风险场景中人类在回路系统的重要性。你还将学习优化成本并维持大规模性能的策略。
- en: Finally, this part reflects on the broader evolution of agentic systems—from
    prototypes to production—and offers a forward-looking perspective on where the
    field is headed and what to expect from intelligent software in the near future.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，本部分回顾了代理系统的更广泛演变——从原型到生产——并展望了该领域未来的发展方向以及未来几年智能软件的预期。
