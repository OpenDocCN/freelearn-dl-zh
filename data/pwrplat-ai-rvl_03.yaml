- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: Talking to ChatGPT
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与ChatGPT对话
- en: If you’re reading this book, you’ve probably at least heard the hype surrounding
    ChatGPT. But, have you actually seen what it does? How it works? Know what a prompt
    is? How to interact with one?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在阅读这本书，你可能至少听说过围绕ChatGPT的炒作。但是，你实际上看到它做什么了吗？它是如何工作的？你知道什么是提示吗？如何与之互动？
- en: Maybe you’ve tinkered with it a bit, so your next questions will probably be
    things such as *How do I send data to it?* and *How do I get data back from it?*
    *What are tokens and why are* *they important?*
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你已经对其进行了些探索，所以你接下来的问题可能是一些诸如*我该如何向它发送数据？*和*我该如何从它那里获取数据？*以及*什么是令牌，为什么它们很重要？*这样的问题。
- en: If so, you’ve come to the right place. In this chapter, we’re going to do a
    little bit of exploration with the ChatGPT interface to get familiar with how
    it works and then shift to Power Automate, where you’ll learn the basics of processing
    ChatGPT data.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样，你就来对地方了。在本章中，我们将通过ChatGPT界面进行一些探索，以熟悉其工作方式，然后转向Power Automate，在那里你将学习处理ChatGPT数据的基础知识。
- en: Working with ChatGPT as a user
  id: totrans-5
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 作为用户与ChatGPT合作
- en: Working with ChatGPT as a user is very simple. To begin, you simply need to
    open a web browser and navigate to [https://chat.openai.com](https://chat.openai.com).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 作为用户与ChatGPT合作非常简单。首先，你只需打开一个网络浏览器并导航到[https://chat.openai.com](https://chat.openai.com)。
- en: Setting up
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 设置
- en: Hopefully, you’ve already started a ChatGPT account (it was part of the assignments
    in[*Chapter 2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment
    to Support* *AI Services*).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你已经开始了一个ChatGPT账户（它是[*第2章*](B21234_02.xhtml#_idTextAnchor027)，*配置支持AI服务的环境*)的作业之一）。
- en: 'Once there, log in using the credentials you signed up with earlier:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦登录，请使用你之前注册的凭据登录：
- en: '![Figure 3.1 – Logging in to ChatGPT](img/B21234_03_01.jpg)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图3.1 – 登录ChatGPT](img/B21234_03_01.jpg)'
- en: Figure 3.1 – Logging in to ChatGPT
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1 – 登录ChatGPT
- en: 'Once you’ve logged in, you can immediately start sending questions (**prompts**)
    to the model, as shown in *Figure 3**.2*:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你登录，你就可以立即开始向模型发送问题（**提示**），如图*图3.2*所示：
- en: '![Figure 3.2 – Sending a prompt to ChatGPT](img/B21234_03_02.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图3.2 – 向ChatGPT发送提示](img/B21234_03_02.jpg)'
- en: Figure 3.2 – Sending a prompt to ChatGPT
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2 – 向ChatGPT发送提示
- en: After entering a prompt, ChatGPT will respond with content (in this case, ideas
    for pizza side dishes).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入提示后，ChatGPT将以内容（在这种情况下，是披萨配菜的想法）进行回应。
- en: 'You’re not limited to just submitting simple questions to ChatGPT – you can
    even submit scenarios and background information to help guide ChatGPT’s responses.
    This framing is referred to as **context**. For example, you can provide context
    to ChatGPT in several ways:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你不仅限于向ChatGPT提交简单的问题，你甚至可以提交场景和背景信息以帮助指导ChatGPT的回应。这种框架被称为**上下文**。例如，你可以通过以下几种方式向ChatGPT提供上下文：
- en: Explain string theory to a 10-year-old.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向一个10岁的孩子解释弦理论。
- en: You are a technical writer. Describe the steps necessary to mix mortar.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是一位技术作家。描述混合砂浆所需的步骤。
- en: You are a web developer. Generate basic HTML code for a web page with a simple
    one-level menu.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是一位网页开发者。为具有简单一级菜单的网页生成基本的HTML代码。
- en: 'Here is a list of animals: tiger, cat, dog, grizzly bear, antelope, spider.
    Arrange them in a list from smallest to largest.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这里有一份动物列表：老虎、猫、狗、灰熊、羚羊、蜘蛛。将它们按从小到大的顺序排列。
- en: ChatGPT is conversational, allowing you to refer back to previous prompts and
    responses to further refine your output.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是会话式的，允许你回顾之前的提示和回应，以进一步细化你的输出。
- en: So, what’s a token?
  id: totrans-22
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 那么，什么是令牌？
- en: I’m glad you asked! This will come up when you’re interacting with ChatGPT (or
    other language models and services). In the context of ChatGPT, a token is the
    smallest unit of text that the model processes. It could be as small as a single
    character, commonly used groups of letters, prefixes, and suffixes, or even whole
    words, depending on how the model is configured.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴你问了这个问题！当你与ChatGPT（或其他语言模型和服务）互动时，这会出现。在ChatGPT的上下文中，令牌是模型处理的最小文本单元。它可能小到单个字符，常见的字母组合、前缀和后缀，甚至整个单词，具体取决于模型的配置。
- en: From a cost and billing perspective, models typically charge you based on how
    many tokens you’re submitting and how many tokens you’re getting back as a response.
    Let’s use the example prompt featured in Figure 3.2 – What are three side dishes
    I can serve with pizza?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 从成本和计费的角度来看，模型通常根据你提交的令牌数量以及你收到的作为响应的令牌数量来收费。让我们以图3.2中展示的示例提示为例 – 我可以提供哪些披萨配菜？
- en: 'Using a tool such as OpenAI’s Tokenizer, you can figure out how much this request
    is going to cost to send:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 使用像 OpenAI 的 Tokenizer 这样的工具，你可以计算出发送此请求将花费多少成本：
- en: '![Figure 3.3 – Viewing the Tokenizer’s result](img/B21234_03_03.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.3 – 查看Tokenizer的结果](img/B21234_03_03.jpg)'
- en: Figure 3.3 – Viewing the Tokenizer’s result
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.3 – 查看Tokenizer的结果
- en: As you can see, this request costs 11 tokens. The area at the bottom shows how
    OpenAI breaks apart the sentence.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，这个请求花费了 11 个令牌。底部区域显示了 OpenAI 如何拆分句子。
- en: Response tokens are tallied the same way. With this in mind, you may find it
    useful (or necessary, depending on your budget) to frame questions and response
    criteria in such a way that minimizes token usage. Depending on what services
    you are consuming, your usage may be counted differently. It’s always important
    to understand the pricing and charge models to make sure you don’t end up with
    an unexpected bill!
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 响应令牌的计数方式相同。考虑到这一点，你可能发现将问题和响应标准以最小化令牌使用的方式框架化是有用的（或者根据你的预算，这是必要的）。根据你所消费的服务，你的使用可能被不同地计算。始终了解定价和计费模式非常重要，以确保你不会收到意外的账单！
- en: With the accounting tasks out of the way, we’ll look at sending data to ChatGPT.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理完会计任务后，我们将查看如何将数据发送到 ChatGPT。
- en: Sending prompts to ChatGPT
  id: totrans-31
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 向 ChatGPT 发送提示
- en: Working with ChatGPT as an end user is pretty simple. So, how hard is it to
    do the same thing with Power Automate? The answer, it turns out, is that it isn’t
    that bad.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 作为最终用户与 ChatGPT 一起工作相当简单。那么，使用 Power Automate 做同样的事情有多难呢？答案是，这并不那么糟糕。
- en: 'You have two main options for passing data to the OpenAI ChatGPT service itself:
    the built-in HTTP (Premium) connector or a third-party OpenAI connector. We’ll
    go through both options quickly, and you can adapt whichever you like to suit
    your purposes.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你有两个主要选项可以将数据传递给 OpenAI ChatGPT 服务本身：内置的 HTTP（高级）连接器或第三方 OpenAI 连接器。我们将快速介绍这两种选项，你可以根据需要调整其中任何一个。
- en: Both of the examples will be built as instant cloud flows with a simple text
    prompt. For both examples, you’ll need the OpenAI API key that you created in
    [*Chapter 2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to
    Support* *AI Services*.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个示例都将通过简单的文本提示构建为即时云流。对于这两个示例，你需要你在 [*第 2 章*](B21234_02.xhtml#_idTextAnchor027)，*配置支持*
    *AI 服务* 的环境中创建的 OpenAI API 密钥。
- en: HTTP
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: HTTP
- en: The HTTP method is the more complex method of the two but also gives you the
    most flexibility.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: HTTP 方法是两种方法中更复杂的一种，但它也提供了最大的灵活性。
- en: Updated parameter information
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 更新后的参数信息
- en: Like all cloud services, OpenAI may change endpoints and other parameters without
    notice. You can get the most updated endpoints and parameters at [https://platform.openai.com/api-reference/completions](https://platform.openai.com/api-reference/completions).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 就像所有云服务一样，OpenAI 可能会不事先通知就更改端点和其他参数。你可以在 [https://platform.openai.com/api-reference/completions](https://platform.openai.com/api-reference/completions)
    获取最新的端点和参数。
- en: 'To start building the flow, follow these steps:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始构建流程，请按照以下步骤操作：
- en: Launch a web browser and navigate to the Power Automate web portal ([https://make.powerautomate.com](https://make.powerautomate.com)).
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动网页浏览器并导航到 Power Automate 网络门户 ([https://make.powerautomate.com](https://make.powerautomate.com))。
- en: 'From the navigation menu, click **Create**, and then, under **Start from blank**,
    select **Instant cloud flow**. See *Figure 3**.4*:'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从导航菜单中，点击 **创建**，然后，在 **从空白开始** 下选择 **即时云流**。见 *图 3**.4*：
- en: '![Figure 3.4 – The Power Automate portal](img/B21234_03_04.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.4 – Power Automate 门户](img/B21234_03_04.jpg)'
- en: Figure 3.4 – The Power Automate portal
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.4 – Power Automate 门户
- en: 'On the **Build an instant cloud flow** page, add a **Flow name** value and
    then select the **Manually trigger a flow** trigger. Click **Create**:'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **构建即时云流** 页面上，添加一个 **流名称** 值，然后选择 **手动触发流** 触发器。点击 **创建**：
- en: '![Figure 3.5 – Creating a blank instant cloud flow](img/B21234_03_05.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.5 – 创建空白即时云流](img/B21234_03_05.jpg)'
- en: Figure 3.5 – Creating a blank instant cloud flow
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.5 – 创建空白即时云流
- en: In the canvas area, click **Manually trigger a flow** to expand the trigger.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在画布区域，点击 **手动触发流** 以展开触发器。
- en: 'Click **Add an input** and select the **Text** input type:'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **添加输入** 并选择 **文本** 输入类型：
- en: '![Figure 3.6 – Selecting an input type](img/B21234_03_06.jpg)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.6 – 选择输入类型](img/B21234_03_06.jpg)'
- en: Figure 3.6 – Selecting an input type
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.6 – 选择输入类型
- en: In the `Prompt`.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `提示` 中
- en: Why does my Power Automate canvas look different?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我的 Power Automate 画布看起来不同？
- en: Depending on your settings, you may be viewing the Classic Power Automate canvas
    or the new designer interface. You can switch between the experiences using the
    **New designer** toggle in the top right-hand portion of the page. The interfaces
    are a little bit different, so feel free to adapt and use whichever one you prefer.
    If you switch the view partway through a design, you’ll be prompted to save your
    work before continuing.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您的设置，您可能正在查看经典 Power Automate 画布或新的设计器界面。您可以使用页面右上角的 **新设计器** 开关在两种体验之间切换。界面略有不同，因此请随意调整并使用您更喜欢的任何一个。如果在设计过程中切换视图，您将需要在继续之前保存您的作品。
- en: Click **New step**.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **新建步骤**。
- en: 'In the **Choose an operation** dialogue, select the **HTTP (****Premium)**
    trigger:'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **选择操作** 对话框中，选择 **HTTP (高级)** 触发器：
- en: '![Figure 3.7 – Selecting the HTTP (Premium) trigger](img/B21234_03_07.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.7 – 选择 HTTP (高级) 触发器](img/B21234_03_07.jpg)'
- en: Figure 3.7 – Selecting the HTTP (Premium) trigger
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.7 – 选择 HTTP (高级) 触发器
- en: 'Fill out the first part of the HTTP action with the following data:'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 HTTP 动作的第一个部分填写以下数据：
- en: '| **Method** | `Post` |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| **方法** | `Post` |'
- en: '| **URI** | `https://api.openai.com/v1/chat/completions` |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| **URI** | `https://api.openai.com/v1/chat/completions` |'
- en: 'Next, you’ll need to add two different headers. Headers are informational data
    that are sent during the HTTP transaction. In this case, you’ll be sending an
    *Authorization* header, containing your OpenAI API key, as well as the *Content-Type*
    header, which describes the type of data transaction:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要添加两个不同的头部。头部是在 HTTP 事务期间发送的信息数据。在这种情况下，您将发送一个包含您的 OpenAI API 密钥的 *Authorization*
    头部，以及描述数据事务类型的 *Content-Type* 头部：
- en: '| **Header** | **Value** |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| **头部** | **值** |'
- en: '| Authorization | `Bearer <OpenAI` `API key>` |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| 授权 | `Bearer <OpenAI API key>` |'
- en: '| Content-Type | `application/json` |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| 内容类型 | `application/json` |'
- en: 'Finally, you’ll need to enter values for the `Body` parameter. `Body` will
    contain information about the type of model being used, the prompt dynamic content
    object, the number of completions to return, and other instructional information.
    See *Figure 3**.8*:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，您需要为 `正文` 参数输入值。`正文` 将包含有关正在使用的模型类型、提示动态内容对象、要返回的完成数量以及其他指导信息。见 *图 3.8*：
- en: '| **Body** |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| **正文** |'
