- en: 'When you were reviewing the output from your test flows, you probably noticed
    that ChatGPT’s answers (or responses) were structured in a particular way:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 当你审查测试流程的输出时，你可能会注意到 ChatGPT 的答案（或响应）是以特定的方式组织的：
- en: '![Figure 3.20 – ChatGPT response data](img/B21234_03_20.jpg)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.20 – ChatGPT 响应数据](img/B21234_03_20.jpg)'
- en: Figure 3.20 – ChatGPT response data
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.20 – ChatGPT 响应数据
- en: The structure, which is `name:value` pair structure or notation.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 结构，它是 `name:value` 对结构或表示法。
- en: So, what exactly is JSON?
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，JSON 究竟是什么呢？
- en: 'Let’s take a look at a few fields in our example:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看我们例子中的几个字段：
- en: '[PRE19]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: In this example, the body tag or name is used to indicate the contents of the
    JSON response. In the `name:value` context, `body` is the name, and everything
    between the opening and closing curly braces (the `{` and `}` characters) is its
    value.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，body 标签或名称用于表示 JSON 响应的内容。在 `name:value` 上下文中，`body` 是名称，而大括号 `{` 和 `}`
    之间的所有内容都是其值。
- en: 'JSON also allows you to nest objects using the same structure or notation.
    In this case, the next `name:value` pair is `"object": "text_completion"`, defining
    `object` as `name` and `text_completion` as its value. This process of nesting
    `name:value` pairs can extend to a depth of 64 levels.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 'JSON 还允许你使用相同的结构或表示法嵌套对象。在这种情况下，下一个 `name:value` 对是 `"object": "text_completion"`，将
    `object` 定义为 `name`，将 `text_completion` 定义为其值。这种嵌套 `name:value` 对的过程可以扩展到 64 个级别。'
- en: 'In addition to simple `name:value` pairs, JSON also supports an array construct.
    Where a `name:value` pair indicates a one-to-one relationship between a name and
    its corresponding value, an array can be thought of as a one-to-many relationship.
    For example, I have five children:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 除了简单的 `name:value` 对之外，JSON 还支持数组构造。一个 `name:value` 对表示名称与其对应值之间的一对一关系，而数组可以被视为一对多关系。例如，我有五个孩子：
- en: Liberty
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Liberty
- en: Hudson
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hudson
- en: Glory
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Glory
- en: Anderson
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Anderson
- en: Victory
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Victory
- en: An array of kids, indeed! In JSON, array objects are denoted by square brackets
    (`[` and `]`).
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确实是一个孩子的数组！在 JSON 中，数组对象由方括号 `[` 和 `]` 表示。
- en: 'Were I to describe my children in JSON format, I might construct a data sample
    like this:'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我用 JSON 格式描述我的孩子，我可能会构建一个像这样的数据样本：
- en: '[PRE20]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: JSON array objects can also contain their own `name:value` pairs, each grouping
    denoted by its own set of curly braces.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: JSON 数组对象也可以包含它们自己的 `name:value` 对，每个分组由其自己的大括号集合表示。
- en: 'Here’s an example:'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '[PRE21]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: One of the benefits of JSON is that it’s human-readable and very easy to understand.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: JSON 的一个好处是它易于阅读和理解。
- en: Now that I’ve satisfied my kids by featuring them in a book, let’s shift back
    to handling ChatGPT’s JSON-formatted output.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我已经通过在书中突出他们的特点来满足孩子们，让我们回到处理 ChatGPT 的 JSON 格式化输出的任务上来。
- en: Working with ChatGPT’s JSON output in Power Automate
  id: totrans-183
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Power Automate 中处理 ChatGPT 的 JSON 输出
- en: We could just print the body of the response, but as you saw in Figure 3.15,
    the body contains a lot more than just the text output. The actual data we want
    is stored as one of the `name:value` pairs in the `choices` sub-object. To access
    just that portion of the data, we’ll use an expression as part of a `compose`
    action to extract the output we’re looking for and save it to a variable for later
    use.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以只打印响应体，但正如你在图 3.15 中看到的，响应体包含的不仅仅是文本输出。我们真正想要的数据存储在 `choices` 子对象中的一个 `name:value`
    对中。为了只访问这部分数据，我们将使用 `compose` 动作中的表达式来提取我们想要的输出，并将其保存到变量中以供以后使用。
- en: 'From the Power Automate flow, you can follow these steps:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 从Power Automate流程中，你可以按照以下步骤操作：
- en: 'After the **HTTP** action, select **New step**:'
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**HTTP**操作之后，选择**新建步骤**：
- en: '![Figure 3.21 – Adding a new step](img/B21234_03_21.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![图3.21 – 添加新步骤](img/B21234_03_21.jpg)'
- en: Figure 3.21 – Adding a new step
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.21 – 添加新步骤
- en: In the **Choose an operation** box, search for and select the **Compose** action.
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**选择一个操作**框中，搜索并选择**Compose**操作。
- en: Select the **Inputs** box of the **Compose** action. If necessary, click the
    **Add dynamic content** link to surface the flyout.
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**Compose**操作的**输入**框。如果需要，点击**添加动态内容**链接以显示弹出窗口。
- en: 'In the expression builder box, start typing `outputs` and select the **outputs**
    function:'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在表达式构建器框中，开始键入`outputs`并选择**outputs**函数：
- en: '![Figure 3.22 – Adding the triggerOutputs function](img/B21234_03_22.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图3.22 – 添加triggerOutputs函数](img/B21234_03_22.jpg)'
- en: Figure 3.22 – Adding the triggerOutputs function
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.22 – 添加triggerOutputs函数
- en: 'You can complete the rest of the function with this text:'
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以用以下文本完成其余的功能：
- en: '[PRE22]'
  id: totrans-195
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Let’s dig into this expression:'
  id: totrans-196
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 让我们深入探讨这个表达式：
- en: In this example, `'HTTP'` references the preceding action. We’re looking for
    the result of that action (hence the `outputs` function). The `?` character is
    used to choose the element, parameter, or sub-object that we want to reference.
    In this case, we’re selecting the body element. From looking at the output of
    the test flow in *Figure 3**.20*, we know that the body element itself has many
    sub-elements or sub-objects (`body/choices`.
  id: totrans-197
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这个例子中，`'HTTP'`引用了前面的操作。我们正在寻找该操作的结果（因此使用`outputs`函数）。`?`字符用于选择我们想要引用的元素、参数或子对象。在这种情况下，我们正在选择body元素。从查看测试流程的输出*图3.20*中，我们知道body元素本身有许多子元素或子对象（`body/choices`）。
- en: Depending on the type of outputs that are being generated, `[0]`). The name
    of the name/value pair we’re looking for inside that element is called **text**.
  id: totrans-198
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 根据生成的输出类型，`[0]`)。我们在这个元素内部寻找的名称/值对的名称是**text**。
- en: So, when reading the expression, it says “*Using the outputs of the HTTP action,
    look in the body/choices element, select the first element, and then inside that
    element, capture the value for the* *text object*.”
  id: totrans-199
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 因此，当阅读表达式时，它说“*使用HTTP操作的输出，在body/choices元素中查找，选择第一个元素，然后在该元素内部，捕获* *text对象*的值。”
- en: Next, click **Add step**.
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，点击**添加步骤**。
- en: Select the **Initialize** **variable** action.
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**初始化** **变量**操作。
- en: In the `ComposeOutput`, and set **Type** to **String**.
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`ComposeOutput`中，并将**类型**设置为**字符串**。
- en: 'In the **Value** box, add the dynamic content token representing the **Outputs**
    content object of the **Compose** variable, as shown in *Figure 3**.23*:'
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**值**框中，添加表示**Compose**变量**输出**内容对象的动态内容令牌，如图*图3.23*所示：
- en: '![Figure 3.23 – Adding the Initialize variable step](img/B21234_03_23.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![图3.23 – 添加初始化变量步骤](img/B21234_03_23.jpg)'
- en: Figure 3.23 – Adding the Initialize variable step
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.23 – 添加初始化变量步骤
- en: When you’re finished, click **Save** and then re-test.
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当你完成时，点击**保存**然后重新测试。
- en: 'At this point, you can go to the flow’s run history and check the output:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，你可以转到流程的运行历史记录并检查输出：
- en: '![Figure 3.24 – Viewing the flow’s output](img/B21234_03_24.jpg)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图3.24 – 查看流程的输出](img/B21234_03_24.jpg)'
- en: Figure 3.24 – Viewing the flow’s output
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.24 – 查看流程的输出
- en: That’s it! You’ve successfully sent data to and received it from ChatGPT (and
    learned a little about JSON along the way).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！你已经成功地将数据发送到ChatGPT并接收了数据（并且在过程中学习了一些关于JSON的知识）。
- en: Summary
  id: totrans-211
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you took your first steps in using ChatGPT and Generative AI
    with Power Platform. With the sample flows you created, you were able to take
    input, send it to ChatGPT using two different actions, and then extract the responses.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你迈出了使用ChatGPT和生成式AI与Power Platform相结合的第一步。通过你创建的示例流程，你能够接收输入，使用两个不同的操作将其发送到ChatGPT，然后提取响应。
- en: In the next chapter, we’re going to look at using AI to help build more complex
    flows.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章，我们将探讨使用AI来帮助构建更复杂的流程。
