- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: 'Beyond the Build: Gaining Leadership Support for AI Initiatives'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超越构建：为AI项目获得领导层支持
- en: 'Imagine this: you have identified the use case, the right technology, and talent,
    all the analysis is done, and you know your metrics, **return on investment**
    ( **ROI** ), and so on, and it seems like the perfect time to start building your
    solution. Not so fast! You still need the resources to build the solution, so
    you must present all that analysis to someone who can provide that to you, a.k.a.
    your senior leadership. This is the most critical yet undermined step in the overall
    AI strategy. Most technical folks think crunching data and building models is
    their primary role, but this is far from the truth. Even as a data scientist,
    you must learn to sell your proposed AI solution to the senior leadership and
    end users.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：你已经确定了用例、合适的技术和人才，所有分析都已完成，你知道你的指标、**投资回报率**（**ROI**）等，看起来是开始构建解决方案的完美时机。但等等！你仍然需要资源来构建解决方案，所以你必须向能提供这些资源的人展示所有这些分析，也就是你的高级管理层。这是整体AI战略中最关键但被忽视的一步。大多数技术人员认为处理数据和构建模型是他们的主要角色，但这远非事实。即使作为数据科学家，你也必须学会向高级管理层和最终用户推销你提出的AI解决方案。
- en: 'To put this in context, let me give you an example: a company wants to expand
    its reach to an entirely new user base (this could be Gen Z or a small business).
    To support this goal, you propose to develop an AI-driven strategy to prospect
    and onboard the new user base into the ecosystem. If you think about it, this
    requires significant investment: purchasing external data, conducting text mining
    and analysis, building a predictive model, and integrating the solution with legacy
    systems. To build this, you need buy-in from senior leadership.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让大家更好地理解，让我给你们举一个例子：一家公司希望扩大其覆盖范围，进入全新的用户群体（这可能是一代Z或小型企业）。为了支持这一目标，你提议开发一个由AI驱动的策略，以吸引和引导新用户群体进入生态系统。如果你这么想，这需要大量的投资：购买外部数据，进行文本挖掘和分析，构建预测模型，以及将解决方案与旧系统集成。为了构建这个，你需要高级管理层的支持。
- en: Throughout this chapter, you will discover practical tips on how technical teams
    can secure sponsorship from senior leadership. To better illustrate these concepts,
    we will conclude with a case study demonstrating how these strategies are applied
    in the real world.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将发现关于技术团队如何从高级管理层获得赞助的实用技巧。为了更好地说明这些概念，我们将以一个案例研究结束，展示这些策略如何在现实世界中应用。
- en: 'We will cover the following key topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下关键主题：
- en: Getting started with the discussion
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始讨论
- en: Crafting the AI narrative – from vision to buy-in
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建AI叙事——从愿景到支持
- en: How AI got the CXO support – a hypothetical scenario
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI如何获得CXO支持——一个假设场景
- en: Getting started with the discussion
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始讨论
- en: 'To get the buy-in, you would probably start the discussion using a few slides
    that entail the following:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得支持，你可能会用几页幻灯片开始讨论，包括以下内容：
- en: '**Primary and secondary research** : This might include the total number of
    new users in the US by specific parameters, such as state, net worth, and so on.
    This is to raise excitement among senior leadership about the market’s potential.
    You might get these numbers from online reports (McKinsey, Bain, etc.), or you
    might perform back-of-the-napkin calculations to derive them. You might also be
    able to get this data by scouting within the company’s internal database or speaking
    with someone who might have analyzed this population.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初级和次级研究**：这可能包括美国特定参数（如州、净资产等）下新增用户总数。这是为了在高级管理层中提升对市场潜力的兴奋度。你可能从在线报告（麦肯锡、贝恩等）中获得这些数字，或者你可能通过纸条计算来推导它们。你也可能通过在公司内部数据库中侦察或与可能分析过该人群的人交谈来获取这些数据。'
- en: '**Data selection** : If it’s a completely new user base, chances are you might
    have to buy the data, so you will include a list of vendors and the cost of procuring
    the data. This is where you should also call out any internal data you will use
    for the analysis or the final outreach product. One thing to note here is that
    it is not just about data collection but also about the transformations you would
    need to ingest it within your product. You don’t have to call it out explicitly,
    but you should remember it while you are starting the build.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据选择**：如果是一个全新的用户群体，你可能需要购买数据，因此你需要包括一个供应商列表和数据获取成本。这也是你应该指出你将用于分析或最终推广产品的任何内部数据的地方。需要注意的是，这不仅仅关于数据收集，还包括你需要进行哪些转换才能在你的产品中吸收这些数据。你不必明确指出，但在开始构建时你应该记住这一点。'
- en: '**AI selection** : Depending on the audience, you might have to cover the AI
    techniques at a high level or go into the weeds of things. The AI strategy is
    a broader term, but here it refers to mentioning whether it is a **machine learning**
    ( **ML** ) solution or a Gen AI solution. This will determine the rest of the
    parameters that we discussed in the previous chapter, such as the required technology,
    talent, cost, and so on.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI选择**：根据受众，你可能需要在较高层次上涵盖AI技术，或者深入探讨细节。AI策略是一个更广泛的概念，但在这里它指的是提到这是一个**机器学习**（**ML**）解决方案还是通用AI解决方案。这将决定我们在上一章中讨论的其余参数，例如所需的技术、人才、成本等等。'
- en: '**Roadmap** : Chances are that you wouldn’t be launching an AI solution on
    day 1 and be done with it, so it’s essential to define precise milestones and
    set expectations within the first few discussions. This is an evolving step, so
    it is important to be proactive about updating the milestones.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**路线图**：很可能你不会在第一天就推出一个AI解决方案并完成它，因此定义精确的里程碑并在最初的几次讨论中设定期望是至关重要的。这是一个不断发展的步骤，因此重要的是要主动更新里程碑。'
- en: '**Setting expectations** : This is another critical step, as it clarifies that
    the AI solution will not solve all their problems but is rather a step in the
    right direction. For example, if you are building an internal chatbot, the expectations
    might be that suddenly the productivity will skyrocket, and all the people will
    just focus on innovation and creativity. While an internal chatbot will help with
    productivity, there could be a steep learning curve for individuals on how to
    prompt effectively and how to balance between their own judgment and responses
    by the chatbot. Such expectation settings and transparency should accelerate senior
    leadership support. During the expectation-setting phase, it is also important
    to highlight the iterative nature of AI/ML products; hence, the expectations for
    Phase 0 will be different from Phase 1.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设定期望**：这是另一个关键步骤，因为它明确了AI解决方案不会解决所有问题，而是一个正确的方向上的步骤。例如，如果你正在构建一个内部聊天机器人，期望可能是突然生产力会激增，所有人都会专注于创新和创造力。虽然内部聊天机器人可以帮助提高生产力，但个人在如何有效地提示以及如何在他们的判断和聊天机器人的响应之间取得平衡方面可能会有一个陡峭的学习曲线。这种期望设定和透明度应该会加速高级领导的支持。在设定期望阶段，还重要的是要强调AI/ML产品的迭代性质；因此，第0阶段的期望将与第1阶段不同。'
- en: Let’s take an example. For any AI solution, the milestones might look like data
    preparation, testing your hypothesis, refining the hypothesis, evaluating your
    solution, deploying to production, and then continuous monitoring. This is not
    a one-size-fits-all, but general guidance on what your milestones might look like.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们举一个例子。对于任何AI解决方案，里程碑可能看起来像数据准备、测试你的假设、完善假设、评估你的解决方案、部署到生产，然后持续监控。这不是一刀切的方法，而是关于你的里程碑可能看起来像什么的通用指导。
- en: Throughout the AI development lifecycle, you need the support of your senior
    leadership. This chapter will serve as a guide on how to gain that buy-in and
    the steps to take proactively to achieve it successfully. Let’s dive deeper!
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个AI开发生命周期中，你需要得到高级领导的支撑。本章将作为指导，说明如何获得他们的支持以及采取哪些主动措施以成功实现它。让我们深入了解！
- en: Crafting the AI narrative – from vision to buy-in
  id: totrans-18
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建AI叙事——从愿景到支持
- en: 'Getting the buy-in and sponsorship involves multiple steps; here are a few
    best practices to consider when building the story:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 获得支持和赞助涉及多个步骤；以下是在构建故事时需要考虑的一些最佳实践：
- en: 'Engage the right stakeholders early on and throughout the process:'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在早期和整个过程中与合适的利益相关者建立联系：
- en: Bringing the right people into the decision-making process early, such as data
    scientists, AI specialists, and business leaders, is crucial. This is why **Chief
    Data Officers** ( **CDOs** ) and **Chief Data and Analytics Officers** ( **CDAOs**
    ) play an increasingly vital role. Having the right stakeholders on board ensures
    smoother project execution and increases the likelihood of securing necessary
    resources. When businesses are actively invested in AI solutions, the adoption
    process becomes a pull effect, where leaders are asking for these solutions, rather
    than a push effect, where you are forcing adoption.
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在决策过程中尽早引入合适的人员，例如数据科学家、AI专家和业务领导者，至关重要。这就是为什么**首席数据官**（**CDOs**）和**首席数据和分析官**（**CDAOs**）的作用越来越重要。拥有正确的利益相关者确保项目执行更加顺利，并增加了获得必要资源的机会。当企业积极投资于AI解决方案时，采用过程成为一种拉力效应，领导者是要求这些解决方案，而不是一种推力效应，即您在强制采用。
- en: Involving the stakeholders is essential even after the solution has been built
    so that you can continue to get feedback and improve the AI solution. Business
    needs, user needs, and data inputs evolve over time, and so should the AI solution.
    Your stakeholders will play a pivotal role in communicating those evolving needs.
  id: totrans-22
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使解决方案已经建成，涉及利益相关者也是至关重要的，这样您就可以继续获取反馈并改进AI解决方案。业务需求、用户需求和数据输入会随着时间的推移而演变，AI解决方案也应如此。您的利益相关者将在传达这些演变需求中扮演关键角色。
- en: Pro tip
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧
- en: The best way to ensure that the business stakeholders are involved is to provide
    them with regular updates on the progress of your AI solution.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 确保业务利益相关者参与的最佳方式是提供他们关于您的AI解决方案进展的定期更新。
- en: Also, please don’t treat this relationship as transactional; instead, focus
    on building long-term relationships with stakeholders. This will help you build
    trust with them and also provide a pleasant working experience. Another important
    thing to keep in mind is to know the long-term and short-term goals of your stakeholders
    and leadership so you can fulfill those through your solution. This way, everyone
    has skin in the game, and it is a meaningful experience for everyone.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请不要将这种关系视为交易性的；相反，专注于与利益相关者建立长期关系。这将帮助您与他们建立信任，并提供愉快的合作体验。另一个需要记住的重要事情是了解您的利益相关者和领导层的长期和短期目标，这样您就可以通过您的解决方案来实现这些目标。这样，每个人都有所投入，这对每个人来说都是一次有意义的体验。
- en: Include the “so-what” in your slides. The first question senior leadership will
    ask is, “ *So what?* ”. This is your chance to justify the investment. Hence,
    it is essential to be proactive and include it in your initial slides. This will
    keep them engaged and interested in getting involved in the technical aspects
    of the presentation. The “so what” can be answered using the primary and secondary
    research you performed. Some examples of this are potential market size, revenue,
    and so on that the solution could bring once it is deployed.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的幻灯片中包含“那么呢”。高层领导首先会问的问题是，“*那么呢？*”。这是您证明投资合理性的机会。因此，在初始幻灯片中主动包含它是至关重要的。这将使他们保持参与并感兴趣于参与演示的技术方面。“那么呢”可以通过您所进行的初级和次级研究来回答。一些例子包括一旦部署，解决方案可能带来的潜在市场规模、收入等。
- en: Pro tip
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧
- en: It’s always good to get a perspective on your slides (especially this one) from
    someone who directly reports to senior leadership or has known them for a year
    before the presentation. This will ensure that a fresh set of eyes reviews your
    presentation and provides you with candid feedback.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 总是从直接向高层领导汇报或在一年的演示之前就认识他们的人那里获得您幻灯片（尤其是这一张）的视角是很好的。这将确保有一组新视角审查您的演示，并提供坦率的反馈。
- en: 'Perform due diligence on your data:'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对您的数据进行尽职调查：
- en: The CXOs are usually well-versed with data such as market size, industry trends,
    and so on. If referring to numbers from public reports, refer to multiple sources
    before including them in your pitch deck. If the numbers are too far from the
    truth, it will set a negative tone for the presentation.
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: CXO们通常对市场大小、行业趋势等数据了如指掌。如果引用来自公开报告的数字，请在您的提案演示文稿中包含它们之前，参考多个来源。如果数字与事实相差太远，这将为演示文稿设定一个消极的基调。
- en: For any internal aggregated data, ask the SMEs to review it before you put it
    in the deck. This will be your safety cushion when asked to justify the numbers.
  id: totrans-31
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何内部汇总数据，在您将其放入演示文稿之前，请要求行业专家进行审查。当被要求证明数字时，这将作为您的安全垫。
- en: Pro tip
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧
- en: Performing due diligence is usually time-consuming; it is recommended to include
    a week or two extra for these checks before you schedule your presentation.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 进行尽职调查通常耗时较长；建议在安排演示之前，为这些检查额外预留一周或两周的时间。
- en: 'Present the roadmap of your product:'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展示你的产品路线图：
- en: Get comfortable with the fact that you wouldn’t be able to achieve a perfect
    solution on day 1, and neither will anyone fund it just because you said it would
    work. You need to show incremental progress to get the right buy-in. Lay out what
    you plan to achieve and when (i.e., show your milestones along with the proposed
    outcome of each milestone).
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 习惯于这样一个事实，即你第一天可能无法实现完美的解决方案，也没有人会仅仅因为你说了它会工作就为其提供资金。你需要展示渐进的进步以获得正确的支持。列出你计划实现的内容以及何时实现（即展示你的里程碑以及每个里程碑的预期成果）。
- en: For example, the first phase of the roadmap could be building a solution for
    a limited user base. The milestones within that phase would be procuring data,
    ingesting data, building the first version of the model, sending the recommendations
    to that limited user base, getting feedback, and analyzing the results, just to
    name a few. This is just an example of a phase and milestone; it is best to modify
    these based on the framework followed in your organization.
  id: totrans-36
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，路线图的第一阶段可能是为有限的用户群体构建解决方案。该阶段的里程碑可能包括获取数据、摄取数据、构建模型的第一个版本、向该有限用户群体发送推荐、获取反馈和分析结果，仅举几个例子。这只是阶段和里程碑的一个例子；最好根据你组织遵循的框架来修改这些内容。
- en: Depending on the type of solution and the organization, there is a possibility
    that you won’t have all the answers on day 1. There is a strong possibility that
    the outcome from the first phase will determine whether you will proceed to the
    next phase. If that is the case, then keep the roadmap at a high level and plan
    for a limited time. There is no point in planning for the next 5 years if the
    solution might not see the light of day in the next 5 months.
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据解决方案的类型和组织，第一天可能不会得到所有答案。有很大可能性，第一阶段的结果将决定你是否会进入下一阶段。如果是这样，那么请将路线图保持在高层次，并计划有限的时间。如果解决方案在接下来的五个月内可能不会见光，那么为五年后制定计划是没有意义的。
- en: Pro tip
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 小贴士
- en: The hardest part about building AI solutions is knowing when to stop or pivot.
    Having a phase-wise mindset and analyzing results after each phase will assist
    you in making an informed choice.
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 建立AI解决方案最困难的部分是知道何时停止或转变方向。具有阶段性思维并在每个阶段分析结果将帮助你做出明智的选择。
- en: 'Schedule regular check-ins:'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安排定期的检查：
- en: This one can be tricky, as senior leadership is often swamped and might not
    have the time to connect regularly. However, it is extremely important to keep
    them in the loop about the development of your solution and inform them about
    the progress.
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这可能有点棘手，因为高级管理层通常非常忙碌，可能没有时间定期进行交流。然而，让他们了解你解决方案的发展情况并告知他们进度非常重要。
- en: This check-in should not only include the progress or the wins, but also the
    challenges you might be facing, and whether you need their help in mitigating
    any of those.
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这种检查不仅应包括进度或胜利，还应包括你可能会遇到的挑战，以及你是否需要他们的帮助来减轻这些挑战。
- en: Pro tip
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: You can also send email updates instead of scheduling regular meetings.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以通过发送电子邮件更新来代替安排定期的会议。
- en: Start with the basics first, such as the data and any prerequisites needed.
    When pitching the AI solution, it is tempting to boil the ocean and share the
    larger vision of the AI solution. While that is important, it is also essential
    to highlight the prerequisites first. This usually includes a comprehensive data
    strategy. This can entail the kind of data you need, the cost of procuring the
    data, any movement from on-premises to the cloud, and any access controls you
    might require. Presenting these aspects shows the clarity you have for the data
    and prepares the senior leadership for any kind of investment you might need from
    them.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先从基础知识开始，例如数据和所需的任何先决条件。在推销AI解决方案时，人们往往会试图全面介绍AI解决方案的更大愿景。虽然这很重要，但首先强调先决条件也同样关键。这通常包括全面的数据策略。这可能包括你需要的数据类型、获取数据的成本、从本地到云的迁移，以及你可能需要的任何访问控制。展示这些方面可以显示出你对数据的清晰认识，并为高级管理层准备他们可能需要的任何投资。
- en: Pro tip
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: It is a good idea to spend time with the infrastructure and data teams to get
    their input on the art of buying/curating the data, and the timelines to achieve
    the same. This will help you get a realistic timeline for data delivery, and you
    can adjust the other timelines accordingly.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 与基础设施和数据团队合作，了解他们在购买/整理数据方面的见解，以及实现这一目标的时间表，这是一个好主意。这将帮助你获得数据交付的合理时间表，并相应地调整其他时间表。
- en: Be upfront about the expectations. While it’s tempting to think that an AI or
    ML-driven solution can solve all your problems, we know this is not 100% true.
    Hence, it is crucial to convey the expectations of the product realistically.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 坦诚地表达期望。虽然认为人工智能或机器学习驱动的解决方案可以解决所有问题很诱人，但我们知道这并不完全正确。因此，真实地传达产品的期望至关重要。
- en: For example, let’s say that user engagement is declining for one of the products.
    You are tasked with analyzing and finding the reason for the decline. Once you
    perform the analysis, you find that most of your users have outgrown that product,
    so even though you might add a new user base, it will take a while for the engagement
    to grow, or worse, it might not grow at all.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设某个产品的用户参与度正在下降。你被要求分析和找出下降的原因。一旦你完成了分析，你会发现大多数用户已经超过了那个产品，所以即使你可能会增加新的用户基础，参与度的增长也需要一段时间，或者更糟糕的是，可能根本不会增长。
- en: Another example is that with the advent of ChatGPT, many companies are trying
    to transform their customer engagement bots to be more accurate. While the latest
    technology, such as GPT-4, might solve the issue, there could be underlying data
    challenges that no model could solve.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子是，随着ChatGPT的出现，许多公司都在尝试将他们的客户互动机器人转变为更准确。虽然最新的技术，如GPT-4，可能解决这个问题，但可能存在模型无法解决的潜在数据挑战。
- en: Lay out the challenges. Every AI solution comes with its own set of challenges.
    While it can block your product development, it also allows us to rethink our
    AI strategy. It is always good to highlight the challenges in building an AI solution
    for senior leadership.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列出挑战。每个AI解决方案都伴随着它自己的挑战。虽然它可能会阻碍你的产品开发，但它也让我们有机会重新思考我们的AI策略。向高层领导强调构建AI解决方案的挑战总是好的。
- en: 'Always have an elevator pitch:'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总是准备好一个电梯演讲：
- en: Your senior leaders are limited in time and energy, so when they ask you what
    you have been up to, you should always have a minute of interesting pitch. This
    serves as a constant reminder of your product, and it also gets your product talked
    about in rooms where you are not present.
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的高层领导时间和精力有限，所以当他们问你最近在忙什么时，你应该总是有一个有趣的演讲来吸引他们的注意。这有助于不断提醒你的产品，并且还能让你的产品在没有你出席的房间里被讨论。
- en: You can also use this elevator pitch in informal chats with senior leadership,
    maybe during meet-and-greets or internal events.
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你也可以在非正式的与高层领导的交流中使用这个电梯演讲，比如在见面或内部活动中。
- en: Pro tip
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Instead of focusing on the algorithm, focus on the *what* and *why* of the workstream
    to have an impactful conversation.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 不要专注于算法，而要关注工作流程的*是什么*和*为什么*，以便进行有影响力的对话。
- en: 'Let’s imagine a hypothetical scenario where a data scientist is building a
    recommendation engine for the firm, and the managing director meets them in the
    elevator and asks, “ *How is it going?* ”. The pitch might be the following sample
    response:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一个假设的场景，一个数据科学家正在为公司构建推荐引擎，而总经理在电梯里遇见他们并问道，“*进展如何？*”。他们的回答可能是以下这个样例：
- en: “We’re building a recommendation engine that’s already boosting engagement by
    over 20%. One challenge we faced early on was bias in the training data; it was
    skewing results toward a narrow user segment. To fix it, we rebalanced the dataset
    and introduced a feedback loop that adapts recommendations in real time. Now,
    the system personalizes content more accurately across diverse user profiles.
    It’s exciting to see how this is driving both customer satisfaction and conversion.
    Happy to share more if you’re interested!”
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: “我们正在构建一个推荐引擎，它已经使参与度提高了超过20%。我们早期面临的一个挑战是训练数据中的偏差；它使结果偏向于一个狭窄的用户群体。为了解决这个问题，我们重新平衡了数据集，并引入了一个实时调整推荐的反馈循环。现在，系统可以更准确地针对不同的用户档案进行内容个性化。看到这一点如何推动客户满意度和转化率，我们感到非常兴奋。如果你感兴趣，我很乐意分享更多！”
- en: Have a plan B. The speed of innovation, especially within AI, is unmatched right
    now. With the advent of new models, priorities and strategies are bound to change.
    Having a plan B helps you prepare for factors you could control and some you couldn’t.
    Plan B will help you pivot or pause the project if an extreme situation arises.
    Consider that you have been in touch with your compliance team from day 1 and
    are negotiating the terms and conditions of the cloud platform. On the other hand,
    you are also speaking with the cloud provider about the evidence you could present
    to your cloud team. Despite you being proactive about everything, the cloud platform
    has not yet met specific auditory requirements, and they need some time to launch
    those for you. This is a situation where, most likely, you wouldn’t be able to
    migrate your project to production and would have to halt the development.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定B计划。目前，创新的步伐，尤其是在人工智能领域，是无与伦比的。随着新模型的推出，优先级和策略必然会发生变化。制定B计划可以帮助你为可控和不可控的因素做好准备。如果出现极端情况，B计划将帮助你调整或暂停项目。考虑到你从第一天起就与合规团队保持联系，并正在协商云平台的条款和条件。另一方面，你也在与云服务提供商讨论你可以向云团队展示的证据。尽管你在所有事情上都积极主动，但云平台尚未满足特定的审计要求，他们需要一些时间来为你推出这些要求。这是一个你很可能无法将项目迁移到生产环境并不得不暂停开发的情况。
- en: Pro tip
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧
- en: You do not have to present this to leadership on day 1. Rather, it is a plan
    for you to have in your back pocket when someone asks or when such a situation
    arises. This is the last resort. Best practice is to build the AI solution in
    a modular (loosely coupled) fashion. This way, you can try to replace the components
    that don’t work rather than scrap the entire solution.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必在第一天就向领导层展示这一点。相反，这是一个在你需要时可以放在口袋里的计划。这是最后的手段。最佳实践是在模块化（松散耦合）的方式下构建人工智能解决方案。这样，你可以尝试替换那些不起作用的组件，而不是废弃整个解决方案。
- en: All the preceding pointers are for data scientists or the technical community,
    but there is also an inherent responsibility of the senior leadership to cultivate
    and embrace the AI culture. Change brings anxiety within an organization. With
    AI, we have seen people worried about their jobs, and the anxiety is justified.
    Building AI solutions not only requires technical expertise but also a culture
    where new ideas and innovations are welcomed.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的前文建议都是针对数据科学家或技术社区，但高级领导层也有培养和拥抱人工智能文化的内在责任。变革会在组织中带来焦虑。在人工智能领域，我们看到了人们对工作岗位的担忧，这种焦虑是有道理的。构建人工智能解决方案不仅需要技术专长，还需要一个欢迎新想法和创新的文化。
- en: 'Developers and technical leaders need to seek support from upper management
    to celebrate the AI-first mindset. Here are a couple of things CXOs can do to
    achieve the same:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 开发人员和技术领导者需要寻求上级管理的支持，以庆祝人工智能优先的思维模式。以下是CXO可以采取的一些措施来实现同样的目标：
- en: '**Invest in AI upskilling** : It is vital to hold AI seminars to upskill everyone
    in the company. Learning about the topic alleviates fear and cultivates a growth
    mindset. Learning can also be promoted by celebrating folks who are continuously
    completing certifications and motivating others to do the same.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资于人工智能技能提升**：举办人工智能研讨会，让公司每个人都提升技能至关重要。了解这个话题可以减轻恐惧并培养成长心态。通过庆祝那些持续完成认证的人，并激励他人效仿，也可以促进学习。'
- en: '**Focus on hands-on experience** : Hold hackathons within the company to foster
    innovation. Teams can develop a use case or pick up one that they wanted to work
    on for a long time but couldn’t due to time constraints. This is also a great
    way to develop new use cases that might benefit the company in the long run. Another
    great way to foster this is to hold apprenticeship programs where focused groups
    and experts work on an existing project. Still, as a stretch assignment, selected
    apprentices can continue to work on their day-to-day tasks and take this as an
    opportunity to learn new skills within the company.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注重实践经验**：在公司内举办黑客马拉松，以促进创新。团队可以开发一个用例，或者选择一个他们长时间想要工作但受限于时间无法进行的用例。这也是开发可能长期为公司带来益处的新的用例的绝佳方式。另一种促进这种做法的方式是举办学徒计划，其中专注的群体和专家在一个现有项目上工作。此外，作为一项拓展任务，选定的学徒可以继续他们的日常任务，并将这视为在公司内学习新技能的机会。'
- en: In this section, we explored the best practices that technical teams can utilize
    to secure sponsorship from senior leadership. While executing any AI project is
    a costly endeavor, obtaining this sponsorship is a crucial step for successful
    implementation. Additionally, we discussed proactive measures that CXOs can take,
    such as investing in employee upskilling to prepare their workforce for an AI-driven
    future.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了技术团队可以利用的最佳实践，以获得高级领导层的赞助。虽然执行任何人工智能项目都是一项成本高昂的举措，但获得这种赞助是实现成功的关键步骤。此外，我们还讨论了CXO可以采取的主动措施，例如投资于员工技能提升，以准备他们的劳动力适应人工智能驱动的未来。
- en: In the next section, we will illustrate how these practices can be applied by
    examining a hypothetical case study of a regulated company that successfully gained
    CXO support.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将通过考察一个成功获得CXO支持的监管公司的假设案例研究，来说明这些实践如何应用。
- en: How AI got the CXO support – a hypothetical scenario
  id: totrans-68
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能如何获得CXO的支持——一个假设场景
- en: This is the story of a highly regulated company that aimed to build internal
    copilots to boost employee productivity.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个高度监管的公司试图建立内部共飞行员以提高员工生产力的故事。
- en: 'Here were the key challenges in this initiative and how they were mitigated:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个倡议中，关键的挑战以及如何缓解它们如下：
- en: At first, leadership was hesitant to approve the budget to try proof of concepts
    (PoCs) or MVPs, afraid of the compliance and regulatory officers. What helped
    to solve this was involving compliance teams in the beginning to get the required
    paperwork done, so the developers could focus on building. Boundaries were set,
    such as not rolling out any PoC to external customers for the first few months.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最初，领导层对批准预算以尝试概念验证（PoC）或最小可行产品（MVP）持犹豫态度，担心合规和监管官员。解决这个问题的一个方法是让合规团队从一开始就参与进来，完成所需的文件工作，这样开发者就可以专注于构建。设定了一些边界，例如在前几个月内不向外部客户推出任何PoC。
- en: Once the teams started building, there was cannibalization within the firm.
    Multiple teams were working on similar use cases with competing priorities. Having
    one common **center of excellence** ( **CoE** ) helped mitigate the issue. The
    CoE was a central place that knew about all the AI initiatives and would flag
    if multiple teams were working on the same use case. So either the teams would
    combine their efforts or pivot into something different.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦团队开始构建，公司内部就出现了竞争。多个团队正在处理类似用例，具有竞争性的优先级。拥有一个共同的**卓越中心**（**CoE**）有助于缓解这个问题。CoE是一个中心位置，了解所有的人工智能倡议，如果多个团队正在处理相同的用例，它会发出警告。因此，团队要么合并他们的努力，要么转向不同的方向。
- en: Not everyone welcomes change; few leaders were ready to take the risks, but
    some were extremely apprehensive. So the ones who led the charge became an example
    for others. They were celebrated within the firm, which led to inspiring more
    people to come up with new ideas.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 并非每个人都欢迎变革；很少有领导者愿意承担风险，但有些人非常谨慎。因此，那些带头的人成为了他人的榜样。他们在公司内部受到了庆祝，这激励了更多的人提出新想法。
- en: Gen AI was a black box for them. To bridge this gap, they invited experts to
    educate their employees on Gen AI and organized hackathons to help teams get comfortable
    with the technology. At the end of these hackathons/PoCs, teams presented their
    working demos to senior leadership, who were amazed by the potential of the technology.
    The company leveraged the CoE to vet these MVPs and eventually migrate the most
    impactful ones to production. The small working demo from the hackathon was supported
    by the right talent, resources, and legal buy-in.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 对于他们来说，通用人工智能（Gen AI）是一个黑盒子。为了弥合这一差距，他们邀请了专家教育员工了解通用人工智能，并组织黑客马拉松帮助团队熟悉这项技术。在这些黑客马拉松/PoC结束时，团队向高级管理层展示了他们的工作演示，管理层对这项技术的潜力感到震惊。公司利用核心能力中心（CoE）对这些MVP进行审查，并将最具影响力的产品迁移到生产中。黑客马拉松中的小型工作演示得到了合适的人才、资源和法律支持的认可。
- en: Within eight months, one of the projects was rolled out to thousands of users.
    This project was a digital co-worker that helped analysts quickly pull data, write
    code, and documentation, so the developers could be more efficient. Feedback indicated
    that analysts who previously spent over five hours writing queries and answering
    business stakeholders’ questions could now do so within an hour. They used the
    extra time to focus on strategic projects and found greater job satisfaction as
    they were no longer bogged down by mundane tasks. Some analysts even upskilled
    themselves on Gen AI to think of more use cases that could empower their peers.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在八个月内，其中一个项目推广给了数千名用户。这个项目是一个数字同事，帮助分析师快速提取数据、编写代码和文档，从而使开发者更加高效。反馈表明，以前花费超过五小时编写查询和回答业务利益相关者问题的分析师现在可以在一个小时内完成。他们利用额外的时间专注于战略项目，并发现由于不再被日常任务拖累，他们的工作满意度更高。一些分析师甚至提升了他们在生成式人工智能（Gen
    AI）方面的技能，以思考更多能够赋权同侪的用例。
- en: The product’s success was so significant that it received industry accolades
    and inspired competitors.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 该产品的成功非常显著，以至于它获得了行业赞誉并激发了竞争对手。
- en: 'Here are the key lessons/takeaways from this case study:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是从这个案例研究中得出的关键教训/收获：
- en: Educating your organization’s people and empowering them to innovate not only
    elevates the organization but also sparks a domino effect, fostering a culture
    of continuous forward-thinking.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育您组织的人员并赋予他们创新的能力不仅能够提升组织，还能引发多米诺效应，培养持续向前思考的文化。
- en: Slides alone often fall short in showcasing the true impact of AI; you need
    a working demo to make the value tangible. Hackathons serve as an excellent way
    to achieve this, allowing teams to experiment, build, and experience AI’s potential
    firsthand.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单独的幻灯片往往不足以展示人工智能的真实影响；你需要一个工作演示来使价值具体化。黑客马拉松是实现这一目标的绝佳方式，它允许团队进行实验、构建并亲身体验人工智能的潜力。
- en: Clearly demonstrating value through measurable success is crucial; time saved
    is often a key metric in these cases.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过可衡量的成功清楚地展示价值至关重要；节省的时间通常是这些情况的关键指标。
- en: Done is better than perfect, so it is always a good idea to celebrate progress
    rather than chasing perfection.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成比完美更好，因此庆祝进步而不是追求完美总是一个好主意。
- en: Hackathons are a great way to kick-start PoCs development, and developers often
    thrive in a competitive environment.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黑客马拉松是启动PoC开发的好方法，开发者往往在竞争环境中表现出色。
- en: At the start of the AI journey, establishing a CoE with dedicated resources
    is essential to drive adoption and long-term success.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在人工智能之旅的起点，建立一个拥有专用资源的中心（CoE）对于推动采用和长期成功至关重要。
- en: The case study serves as a mirror for enterprises that are skeptical about the
    impact of Gen AI within their teams or organizations. The first step to overcoming
    this skepticism is education, making upskilling a valuable starting point. While
    the benefits are not guaranteed, it is crucial to embrace the AI wave by beginning
    small but meaningful initiatives. This approach allows you to assess whether the
    impact is substantial enough to warrant scaling up or pivoting to another use
    case.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 本案例研究为那些对团队或组织中生成式人工智能（Gen AI）的影响持怀疑态度的企业提供了一个镜子。克服这种怀疑的第一步是教育，将技能提升作为一个有价值的起点。虽然好处不能保证，但通过从小而意义重大的举措开始，拥抱人工智能浪潮至关重要。这种方法允许你评估影响是否足够大，以至于可以扩大规模或转向另一个用例。
- en: Summary
  id: totrans-85
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter emphasized the importance of securing sponsorship from senior leadership
    for AI projects. It provided practical tips for technical teams on how to gain
    this support and concluded with a case study that demonstrates the real-world
    application of these strategies.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 本章强调了从高级领导层获得赞助对人工智能项目的重要性。它为技术团队提供了获得这种支持的实际建议，并以一个展示这些策略实际应用的案例研究结束。
- en: In the next chapter, we will focus on the steps following the securing of sponsorship,
    which involve starting the building process through a successful PoC.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将关注获得赞助后的步骤，这些步骤涉及通过成功的概念验证（PoC）开始构建过程。
