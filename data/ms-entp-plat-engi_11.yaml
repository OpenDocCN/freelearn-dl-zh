- en: '11'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: 'From Vision to Reality: Mastering Enterprise Platform Engineering'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从愿景到现实：掌握企业平台工程
- en: The final chapter of this book brings together the insights, strategies, and
    knowledge accumulated throughout our exploration of Platform Engineering. *Mastering
    Enterprise Platform Engineering* is not just a title. It is a clarion call to
    inspire and motivate you to apply these principles in your organization, driving
    transformation and achieving lasting success.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本书最后一章汇集了我们探索平台工程过程中积累的见解、策略和知识。*掌握企业平台工程*不仅仅是一个标题。它是一声响亮的号召，旨在激励和鼓舞你将这些原则应用于你的组织中，推动转型并实现持久成功。
- en: This chapter will wrap up the journey we’ve undertaken, emphasizing the importance
    of Platform Engineering in delivering business value and preparing for the future.
    By the end of the chapter, you will be motivated and equipped with the practical
    steps needed to implement what you have learned from this book. These steps are
    designed to drive transformation and help you achieve enduring success in your
    organization. This practical approach will instill confidence in your ability
    to apply Platform Engineering principles effectively.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将总结我们所走过的旅程，强调平台工程在提供商业价值和为未来做准备中的重要性。到本章结束时，你将充满动力，并具备从本书中学到的实际步骤，以实施你所学到的知识。这些步骤旨在推动转型，并帮助你实现组织中持久的成功。这种实用方法将增强你有效应用平台工程原则的能力的信心。
- en: This chapter empowers you to drive transformative change by embedding platform
    engineering into the core of your organization, cultivating a culture of agility,
    efficiency, and innovation. It guides you in delivering sustainable business value
    through the development of scalable and resilient platforms that enhance developer
    productivity and streamline workflows. Additionally, it prepares you to lead the
    future of platform engineering by leveraging AI, automation, and emerging technologies
    to stay ahead of evolving industry trends.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章通过将平台工程融入你组织的核心，培养敏捷、高效和创新的文化，赋予你推动变革的能力。它指导你通过开发可扩展和弹性的平台来提供可持续的商业价值，这些平台可以提升开发者的生产力并简化工作流程。此外，它还为你利用AI、自动化和新兴技术来保持对不断发展的行业趋势的领先地位，准备引领平台工程的未来。
- en: The strategies are in place, the vision is clear, and the opportunity is now.
    It’s time to build, innovate, and lead. The evolution of Platform Engineering
    is just beginning. The real question is not whether AI and automation will redefine
    the future but who will shape it. Those who take action today will define the
    path forward.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 策略已经到位，愿景清晰，机遇就在眼前。是时候建设、创新和领导了。平台工程的演变才刚刚开始。真正的问题不是AI和自动化是否会重新定义未来，而是谁将塑造它。那些今天采取行动的人将定义前进的道路。
- en: 'We will be covering the following main headings in this chapter:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主要标题：
- en: From lessons learned to future wins
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从经验教训到未来胜利
- en: Strategic planning and continuous improvement
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战略规划和持续改进
- en: Delivering business value through Platform Engineering
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过平台工程实现商业价值
- en: 'The future of Platform Engineering: 10 predictions for the next 5 years'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台工程的未来：未来5年的10个预测
- en: 'Seize the future: Your role in shaping Platform Engineering'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 把握未来：你在塑造平台工程中的作用
- en: From lessons learned to future wins
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从经验教训到未来胜利
- en: As we reach this pivotal point, we must recognize the transformative progress
    we’ve made. This book has been more than just a guide—it has served as your strategic
    compass through the complexities of Platform Engineering. Within these pages,
    we hope you have uncovered a wealth of insights, tools, and strategies, all designed
    to revolutionize your technical infrastructure and your organization’s cultural
    and strategic fabric. This journey has been one of transformation, equipping you
    with strategies that reshape not only technology but also culture, operations,
    and business impact. Every insight and framework this book explores is a building
    block for driving meaningful change.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们达到这个关键点时，我们必须认识到我们所取得的变革性进步。这本书不仅仅是一本指南——它在你通过平台工程的复杂性时充当了你的战略指南。在这些页面中，我们希望你已经发现了一笔丰富的见解、工具和策略，所有这些都被设计用来彻底改变你的技术基础设施和组织的文化和战略结构。这次旅程是一次变革，它为你提供了策略，不仅重塑了技术，还重塑了文化、运营和商业影响。本书所探讨的每一个见解和框架都是推动有意义变革的基石。
- en: To build a resilient, scalable, and high-impact platform, we must first ensure
    our foundation is unshakable. The principles we’ve explored form the bedrock of
    effective Platform Engineering—guiding the path from initial adoption to enterprise-wide
    transformation. Let’s distill these foundational elements and reaffirm the core
    strategies that drive success.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建一个弹性、可扩展且具有高影响力的平台，我们首先必须确保我们的基础稳固。我们探讨的原则构成了有效平台工程的基石——指导从初始采用到企业级转型的路径。让我们提炼这些基础元素并重申那些推动成功的核心策略。
- en: Foundations and principles
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基础和原则
- en: Platform Engineering is the cornerstone of modern digital enterprises, providing
    the structured foundation to scale, automate, and streamline software development
    and delivery. Its principles are deeply rooted in DevOps, cloud-native architectures,
    automation, and self-service enablement, ensuring that platforms remain resilient,
    flexible, and optimized for business agility.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程是现代数字企业的基石，提供了结构化的基础以实现扩展、自动化和简化软件开发与交付。其原则深深植根于DevOps、云原生架构、自动化和自助服务能力，确保平台保持弹性、灵活并优化业务敏捷性。
- en: Throughout this book, we have emphasized that Platform Engineering is not just
    about technology—it is about creating an ecosystem that empowers developers, removes
    friction, and accelerates business value delivery. From building **internal developer
    platforms** (**IDPs**) to automating **continuous integration and continuous deployment**
    (**CI/CD**) workflows and implementing scalable infrastructure, the principles
    of Platform Engineering help organizations move faster, reduce complexity, and
    enhance developer experience.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在整本书中，我们一直强调平台工程不仅仅是关于技术——它关乎构建一个赋能开发者、消除摩擦并加速业务价值交付的生态系统。从构建**内部开发者平台**（**IDPs**）到自动化**持续集成和持续部署**（**CI/CD**）工作流程以及实施可扩展的基础设施，平台工程的原则帮助组织更快地发展、减少复杂性并提升开发者体验。
- en: 'Core principles that drive Platform Engineering success are as follows:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 推动平台工程成功的核心原则如下：
- en: '**DevOps as the foundation**: Platform Engineering extends DevOps principles
    by centralizing infrastructure, governance, and tooling into self-service capabilities.
    This enables teams to focus on development while reducing operational overhead.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DevOps作为基础**：平台工程通过将基础设施、治理和工具集中到自助服务能力中扩展了DevOps原则。这使得团队能够专注于开发同时减少运营开销。'
- en: '**Platform as a product mindset**: A successful platform treats developers
    as customers, ensuring that tools, workflows, and automation enhance productivity
    rather than creating additional friction. Measuring platform adoption and developer
    satisfaction ensures continuous improvement.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以平台为产品的思维模式**：一个成功的平台将开发者视为客户，确保工具、工作流程和自动化能够提高生产力而不是增加额外的摩擦。衡量平台采用率和开发者满意度确保持续改进。'
- en: '**Architecting for scale and resilience**: Cloud-native architectures, containerization
    (Kubernetes), and declarative infrastructure management (IaC) enable scalable
    and resilient platforms that support enterprise-wide efficiency.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为规模和弹性而设计**：云原生架构、容器化（Kubernetes）和声明式基础设施管理（IaC）使可扩展且具有弹性的平台得以支持企业级效率。'
- en: '**Automation and self-service**: Removing repetitive manual processes through
    CI/CD automation, golden paths, and IDP integrations reduces cognitive load for
    developers and accelerates feature delivery.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化和自助服务**：通过CI/CD自动化、黄金路径和IDP集成移除重复的手动流程，减少开发者的认知负荷并加速功能交付。'
- en: '**Security and compliance by design**: Integrating policy-as-code, automated
    security scanning, and access controls ensures that security is embedded within
    development workflows without slowing down innovation.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计时的安全和合规性**：通过集成策略即代码、自动安全扫描和访问控制确保安全嵌入到开发工作流程中，而不会减缓创新。'
- en: '**Continuous improvement and observability**: Implementing platform-wide telemetry,
    feedback loops, and performance monitoring ensures that engineering teams can
    optimize workflows based on real-world usage data.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续改进和可观察性**：实施平台级遥测、反馈循环和性能监控，确保工程团队能够根据实际使用数据优化工作流程。'
- en: By adhering to these principles, organizations reduce time-to-market, enhance
    reliability, and drive continuous innovation. This approach ensures that Platform
    Engineering is an enabler of operational efficiency and a strategic driver of
    business success.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些原则，组织可以缩短上市时间，提高可靠性，并推动持续创新。这种方法确保平台工程是运营效率的推动者和业务成功的战略驱动者。
- en: 'Key insights include the following:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 关键见解包括以下内容：
- en: Platform Engineering is the next evolution of DevOps, enabling centralized governance
    while maintaining team autonomy.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台工程是 DevOps 的下一阶段进化，它实现了集中治理的同时保持团队自主性。
- en: A well-architected platform enhances developer experience, accelerates software
    delivery, and ensures long-term scalability.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个架构良好的平台可以提升开发者体验，加速软件交付，并确保长期的可扩展性。
- en: Automation, self-service, and observability are critical to platform success
    and adoption.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化、自助服务和可观察性对于平台的成功和采用至关重要。
- en: Treating the platform as a product ensures that developer needs are prioritized,
    leading to better adoption and efficiency.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将平台视为产品确保开发者需求得到优先考虑，从而带来更好的采用率和效率。
- en: Security and compliance must be embedded in platform workflows to maintain speed
    without compromising protection.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全性和合规性必须嵌入到平台工作流程中，以在保持速度的同时不损害保护。
- en: Cultural transformation
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文化转型
- en: Cultural transformation is the foundation of high-performing Platform Engineering
    teams. A successful platform is not just a collection of tools and automation—it
    thrives on a culture that encourages innovation, fosters psychological safety,
    and aligns engineering efforts with business outcomes. Without this foundation,
    even the most advanced platforms risk becoming underutilized, rigid, or misaligned
    with organizational needs.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 文化转型是高性能平台工程团队的基础。一个成功的平台不仅仅是一系列工具和自动化，它依赖于一种鼓励创新、培养心理安全感并将工程努力与业务成果对齐的文化。没有这个基础，即使是最先进的平台也可能会被低效使用、僵化或与组织需求脱节。
- en: 'Here are some key insights:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些关键见解：
- en: Culture defines the success of Platform Engineering. A generative, high-trust
    culture fosters innovation, efficiency, and developer satisfaction, while bureaucratic
    and control-driven environments create friction and slow progress.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文化定义了平台工程的成功。一种生成性、高度信任的文化可以促进创新、效率和开发者满意度，而官僚主义和控制驱动的环境则会产生摩擦并减缓进步。
- en: Platform teams must operate with a “platform as a product” mindset. By treating
    developers as customers, measuring adoption through **developer experience** (**DX**)
    surveys and **net promoter score** (**NPS**) scores, and continuously refining
    workflows, platform teams ensure their solutions drive business impact.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台团队必须以“平台即产品”的心态运营。通过将开发者视为客户，通过**开发者体验**（**DX**）调查和**净推荐值**（**NPS**）评分来衡量采用率，并持续优化工作流程，平台团队确保他们的解决方案产生业务影响。
- en: The POWER framework accelerates cultural transformation. Organizations can build
    an ecosystem where Platform Engineering delivers measurable value at scale by
    focusing on purpose, outcomes, workflow optimization, empowerment, and reducing
    manual toil.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: POWER 框架加速文化转型。组织可以通过关注目的、成果、工作流程优化、赋权以及减少人工劳动，建立一个平台工程在规模上提供可衡量价值的生态系统。
- en: Psychological safety fuels high-performance teams. A culture where failures
    are treated as learning opportunities rather than risks leads to higher innovation
    velocity and stronger collaboration. For example, Google’s Project Aristotle found
    that psychological safety was the top factor in high-performing teams.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 心理安全感是高性能团队的动力。将失败视为学习机会而不是风险的文化，将导致更高的创新速度和更强的协作。例如，谷歌的阿基里斯项目发现，心理安全感是高性能团队的最重要因素。
- en: Continuous measurement is key to cultural transformation. Organizations must
    track cultural and platform success through developer satisfaction scores, time-to-onboard,
    **change failure rate** (**CFR**), and innovation velocity to ensure alignment
    with business goals.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续测量是文化转型的关键。组织必须通过开发者满意度评分、入职时间、**变更失败率**（**CFR**）和创新速度来跟踪文化和平台的成功，以确保与业务目标保持一致。
- en: 'Practical strategies for cultural transformation include the following:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 文化转型的实用策略包括以下内容：
- en: '**Emphasizing DX**: Treat internal developers as customers. Conduct regular
    DX surveys, track NPS scores for platform adoption, and refine onboarding experiences.
    For example, Spotify’s Backstage project was built to improve the DX by providing
    a centralized, self-service developer portal.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强调开发者体验（DX）**：将内部开发者视为客户。定期进行DX调查，跟踪平台采用率的NPS分数，并优化上线体验。例如，Spotify的Backstage项目就是为了通过提供集中式、自助服务的开发者门户来改善DX而建立的。'
- en: '**Promoting a learning culture**: Encourage internal hackathons, brown-bag
    sessions, and game days where teams experiment with new technologies without fear
    of failure. Psychological safety plays a key role—teams that feel safe to take
    risks and learn from mistakes innovate faster and build more resilient platforms.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推广学习文化**：鼓励内部黑客松、棕色袋会议和游戏日，在这些活动中，团队可以无畏失败地尝试新技术。心理安全感起着关键作用——那些感到安全、敢于冒险并从错误中学习成长的团队创新更快，并构建更具有弹性的平台。'
- en: '**Psychological safety and blameless postmortems**: Implement a culture where
    failures are learning opportunities, not career risks. Measure progress by tracking
    CFR and **mean time to recover** (**MTTR**)—two key indicators of how well teams
    recover from mistakes and improve over time.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**心理安全和无责复盘**：实施一种文化，将失败视为学习机会，而不是职业风险。通过跟踪CFR和**平均恢复时间**（MTTR）来衡量进展——这两个关键指标衡量了团队从错误中恢复和随时间改进的能力。'
- en: '**Cross-team collaboration**: Platform teams should act as enablers, not gatekeepers.
    Create feedback loops between product, security, and infrastructure teams to align
    efforts with business priorities. Use innovation velocity—measuring the number
    of internal tools created—as a leading indicator of how well platform teams empower
    developers.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨团队协作**：平台团队应作为推动者，而不是守门人。在产品、安全和基础设施团队之间建立反馈循环，以使努力与业务优先事项保持一致。使用创新速度——衡量内部工具创建的数量——作为平台团队如何赋予开发者权力的领先指标。'
- en: '**Continuous measurement**: The success of cultural transformation must be
    quantifiable. Organizations should track the following:'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续测量**：文化转型的成功必须是可以量化的。组织应跟踪以下指标：'
- en: Developer satisfaction scores (DX surveys and NPS) to gauge how well the platform
    serves its users.
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发者满意度评分（DX调查和NPS）以衡量平台如何服务于其用户。
- en: Time to onboard new engineers, measuring how quickly a developer becomes productive
    on the platform.
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上线新工程师的时间，衡量开发者如何在平台上快速变得高效。
- en: Operational metrics such as MTTR and CFR to indicate resilience, stability,
    and iterative improvement.
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营指标，如MTTR和CFR，以表明弹性、稳定性和迭代改进。
- en: Cultural transformation requires continuous reinforcement, leadership commitment,
    and iterative improvements. As organizations embed Platform Engineering within
    their strategy, a culture of empowerment, experimentation, and psychological safety
    drives sustainable success. AI is becoming an indispensable force in Platform
    Engineering to accelerate this transformation further, enabling automation, intelligence,
    and adaptive decision-making at scale.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 文化转型需要持续的强化、领导层的承诺和迭代改进。随着组织将平台工程融入其战略，赋权、实验和心理安全的文化推动了可持续的成功。AI正在成为平台工程中不可或缺的力量，以进一步加速这一转型，实现规模化的自动化、智能和适应性决策。
- en: AI in Platform Engineering
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平台工程中的AI
- en: Integrating AI into Platform Engineering has revolutionized how organizations
    automate, optimize, and secure their platforms. From code generation and predictive
    maintenance to AI-driven security and real-time optimizations, AI is transforming
    how platforms are built and managed. Generative AI tools such as GitHub Copilot,
    GitLab Duo, and Amazon Q Developer enhance developer productivity, while machine
    learning models in AWS SageMaker and Azure AI enable proactive infrastructure
    monitoring and anomaly detection.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI集成到平台工程中已经彻底改变了组织自动化、优化和保障其平台的方式。从代码生成和预测性维护到AI驱动的安全和实时优化，AI正在改变平台的建设和管理方式。GitHub
    Copilot、GitLab Duo和Amazon Q Developer等生成式AI工具提高了开发者的生产力，而AWS SageMaker和Azure AI中的机器学习模型则实现了主动的基础设施监控和异常检测。
- en: Companies leveraging AI in Platform Engineering have achieved faster software
    delivery, increased resilience, and enhanced security. Netflix’s chaos engineering
    practices, powered by AI, have ensured service reliability at a global scale,
    while GitLab Duo’s AI-driven workflows have streamlined CI/CD automation and security
    scanning. AI-powered analytics in Tableau and Power BI have enabled organizations
    such as Walmart and JPMorgan Chase to optimize business strategies, while AI-based
    cloud automation tools such as AWS Auto Scaling have driven sustainability and
    cost efficiency.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 利用人工智能进行平台工程的公司实现了更快的软件交付、更高的弹性和增强的安全性。Netflix 的由人工智能驱动的混沌工程实践确保了全球范围内的服务可靠性，而
    GitLab Duo 的人工智能驱动的流程简化了 CI/CD 自动化和安全扫描。Tableau 和 Power BI 的人工智能分析使沃尔玛和摩根大通等组织能够优化业务策略，而
    AWS Auto Scaling 等基于人工智能的云自动化工具推动了可持续性和成本效率。
- en: By embedding AI into Platform Engineering, organizations reduce operational
    complexity, improve decision-making, and enhance platform resilience. AI-powered
    solutions offer scalability, real-time optimization, and proactive threat detection,
    ensuring platform teams remain agile, efficient, and innovative. The future of
    Platform Engineering is AI-driven, and organizations that embrace these advancements
    will gain a significant competitive advantage.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将人工智能嵌入平台工程，组织可以降低运营复杂性，改善决策，并增强平台弹性。人工智能驱动的解决方案提供可扩展性、实时优化和主动威胁检测，确保平台团队保持敏捷、高效和创新能力。平台工程的未来将由人工智能驱动，拥抱这些进步的组织将获得显著的竞争优势。
- en: 'Here are some key insights:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些关键见解：
- en: AI is redefining Platform Engineering, from automation to intelligence. Traditional
    platforms relied on manual workflows; AI now enables self-optimizing, self-healing
    platforms that enhance efficiency and resilience at scale.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能正在从自动化到智能重新定义平台工程。传统的平台依赖于手动工作流程；现在人工智能使平台能够自我优化、自我修复，从而在规模上提高效率和弹性。
- en: Generative AI is not replacing developers—it’s amplifying them. AI-powered tools
    such as GitHub Copilot and GitLab Duo remove developer toil, accelerating software
    delivery while allowing engineers to focus on high-value innovation.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式人工智能并不是在取代开发者——它是在增强他们。GitHub Copilot 和 GitLab Duo 等人工智能驱动的工具减轻了开发者的负担，加速了软件交付，同时让工程师能够专注于高价值创新。
- en: AI-driven security is a necessity, not an option. With evolving cyber threats,
    AI-powered anomaly detection and predictive security analytics are now critical
    components of secure software supply chains.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能驱动的安全是必需的，而不是选择。随着网络威胁的不断演变，人工智能驱动的异常检测和预测性安全分析现在是安全软件供应链的关键组成部分。
- en: AI transforms cloud infrastructure from reactive to proactive. AI-driven resource
    optimization, predictive scaling, and cost governance tools are replacing manual
    capacity planning, ensuring platforms are cost-efficient, scalable, and resilient.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能将云基础设施从被动转变为主动。人工智能驱动的资源优化、预测性扩展和成本治理工具正在取代手动容量规划，确保平台成本效益高、可扩展且具有弹性。
- en: The future of Platform Engineering belongs to those who embrace AI now. Organizations
    that integrate AI into their IDPs, security frameworks, and operational workflows
    today will define the next era of technological leadership, leaving behind those
    who resist change.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台工程的未来属于那些现在就拥抱人工智能的人。今天将人工智能集成到其 IDP、安全框架和运营流程中的组织将定义下一个技术领导时代，将那些抵制变革的人抛在后面。
- en: AI is redefining Platform Engineering, driving smarter automation, intelligent
    infrastructure, and proactive security. The future will be shaped by AI-enhanced
    observability, self-healing systems, and real-time decision-making frameworks
    that eliminate inefficiencies and optimize operations at scale. Organizations
    that embed AI into their IDPs, security frameworks, and cloud operations will
    unlock unparalleled efficiency, ensuring continuous innovation and resilience.
    As Platform Engineering enters an AI-first era, investing in AI-driven platforms
    is no longer optional—it is the key to future-proofing infrastructure, streamlining
    developer experiences, and sustaining long-term competitive advantage.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在重新定义平台工程，推动更智能的自动化、智能基础设施和主动安全。未来将由人工智能增强的可观察性、自我修复系统和实时决策框架塑造，这些框架消除了低效并优化了大规模运营。将人工智能嵌入其
    IDP、安全框架和云运营的组织将解锁无与伦比的效率，确保持续创新和弹性。随着平台工程进入人工智能优先的时代，投资人工智能驱动的平台不再是可选的——它是确保基础设施未来安全、简化开发者体验和维持长期竞争优势的关键。
- en: Security and compliance
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全与合规
- en: Security and compliance have been recurring themes, emphasizing their critical
    importance in the digital age. We explored best practices for integrating security
    into every stage of the development life cycle, from design to deployment. Understanding
    regulatory requirements and implementing continuous monitoring strategies were
    highlighted as essential to ensure your platforms remain secure and compliant.
    Maintaining robust security and compliance standards is non-negotiable in today’s
    digital landscape.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 安全和合规一直是反复出现的主题，强调了它们在数字时代中的关键重要性。我们探讨了将安全整合到开发生命周期的每个阶段（从设计到部署）的最佳实践。了解监管要求并实施持续监控策略被强调为确保您的平台保持安全和合规的必要条件。在今天的数字环境中，保持强大的安全和合规标准是不可或缺的。
- en: We discussed how integrating security measures at every stage of the development
    life cycle can mitigate risks and protect sensitive information. Continuous monitoring
    and adherence to regulatory standards are essential for maintaining a secure and
    compliant platform. By prioritizing security and compliance, organizations can
    build trust with their stakeholders and ensure the longevity of their platform
    initiatives. Furthermore, adopting a proactive approach to security helps anticipate
    potential threats and vulnerabilities, minimizing the risk of breaches and ensuring
    the platform’s integrity.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了如何在开发生命周期的每个阶段整合安全措施，以减轻风险并保护敏感信息。持续监控和遵守监管标准对于维护一个安全和合规的平台至关重要。通过优先考虑安全和合规，组织可以与其利益相关者建立信任，并确保其平台项目的长期性。此外，采取主动的安全方法有助于预测潜在的威胁和漏洞，最小化数据泄露的风险，并确保平台的安全性。
- en: 'The key takeaways are as follows:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点如下：
- en: '**Best practices**: Integrating security at every stage of development is fundamental
    to protecting assets and maintaining trust.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最佳实践**：在开发的每个阶段整合安全是保护资产和维持信任的基本要求。'
- en: '**Regulatory compliance**: Adhering to regulatory requirements is essential
    for avoiding legal pitfalls and ensuring operational integrity.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规性监管**：遵守监管要求对于避免法律陷阱和确保运营完整性至关重要。'
- en: '**Continuous monitoring**: Ongoing monitoring and adaptation are necessary
    to maintain a secure and compliant environment.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续监控**：持续的监控和调整是维护安全和合规环境所必需的。'
- en: Ensuring robust security and compliance lays the foundation for resilient and
    trustworthy platform operations. With these safeguards in place, organizations
    can now focus on scaling their platforms efficiently while maintaining optimal
    performance under increasing demand.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 确保强大的安全和合规性为弹性和值得信赖的平台运营奠定了基础。有了这些保障措施，组织现在可以专注于高效地扩展其平台，同时在不断增长的需求下保持最佳性能。
- en: Scalability and performance
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可扩展性和性能
- en: Our discussion on scalability and performance provided the tools and techniques
    needed to handle growing demands and maintain high performance levels. For instance,
    horizontal scaling involves adding more servers to your system to handle increased
    traffic, while vertical scaling involves upgrading your existing servers to handle
    more load. These insights are crucial for ensuring that your platforms can meet
    the needs of your users while maintaining efficiency and reliability. Scalability
    and performance are critical aspects of Platform Engineering that determine the
    platform’s ability to support growth and deliver consistent user experiences while
    maintaining efficiency and reliability.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们关于可扩展性和性能的讨论提供了处理不断增长的需求并保持高性能水平所需的工具和技术。例如，水平扩展涉及向您的系统添加更多服务器以处理增加的流量，而垂直扩展则涉及升级现有服务器以处理更大的负载。这些见解对于确保您的平台能够满足用户需求，同时保持效率和可靠性至关重要。可扩展性和性能是平台工程的关键方面，决定了平台支持增长和提供一致用户体验的能力，同时保持效率和可靠性。
- en: Optimizing load balancing was also discussed as a critical factor in maintaining
    high performance. By mastering these techniques, organizations can ensure their
    platforms are equipped to handle increasing demands and deliver reliable, efficient
    services to their users. Implementing these strategies not only enhances user
    satisfaction but also contributes to the overall stability and resilience of the
    platform, enabling businesses to thrive even during peak usage periods.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 优化负载均衡也被讨论为维持高性能的关键因素。通过掌握这些技术，组织可以确保其平台能够应对不断增长的需求，并向用户提供可靠、高效的服务。实施这些策略不仅提升了用户满意度，还促进了平台的整体稳定性和韧性，使企业在高峰使用期间也能繁荣发展。
- en: 'Here are some key insights:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些关键见解：
- en: '**Scaling strategies**: Effective scaling strategies are vital for accommodating
    growth and ensuring continuous performance.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**扩展策略**：有效的扩展策略对于适应增长和确保持续性能至关重要。'
- en: '**Auto-scaling**: Dynamic resource adjustment through auto-scaling enhances
    operational efficiency and reliability.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动扩展**：通过自动扩展动态调整资源，可以提升操作效率和可靠性。'
- en: '**Load balancing**: Optimizing load distribution is crucial for maintaining
    performance and preventing system overloads.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负载均衡**：优化负载分配对于维持性能和防止系统过载至关重要。'
- en: Achieving scalability and performance is only as effective as the teams that
    build and maintain the platform. Organizations must cultivate high-performance
    platform teams equipped with the right skills, culture, and strategic alignment
    to sustain growth and innovation.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 实现可扩展性和性能的有效性取决于构建和维护平台的团队。组织必须培养配备正确技能、文化和战略一致性的高性能平台团队，以维持增长和创新。
- en: Building high-performance Platform Engineering teams
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建高性能平台工程团队
- en: Creating and sustaining high-performance Platform Engineering teams is crucial
    for driving innovation, efficiency, and long-term business impact. High-performing
    teams are not just assembled but intentionally built through strategic hiring,
    cultural alignment, and continuous development. Organizations that invest in well-defined
    team structures, clear roles, and leadership-driven enablement create environments
    where platform teams operate at peak efficiency, drive developer productivity,
    and align with business objectives. Organizations can cultivate resilient, high-performing
    teams that consistently deliver value by applying the 5Es framework—Empathize,
    Empower, Engage, Entrust, and Equip.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 创建和维持高性能平台工程团队对于推动创新、效率和长期业务影响至关重要。高性能团队不是随意组建的，而是通过战略招聘、文化一致性和持续发展有意识地构建的。投资于明确团队结构、清晰角色和领导驱动的赋能的组织，能够创造平台团队在最高效率下运作、推动开发者生产力并符合业务目标的环境。通过应用5E框架——同理心、赋权、参与、信任和装备，组织可以培养出有韧性、高性能的团队，持续创造价值。
- en: Successful platform teams are built on strong leadership, continuous learning,
    and a relentless focus on DX. The ability to attract, retain, and develop top
    talent while fostering an inclusive and psychologically safe culture sets the
    best platform teams apart. An empowered, engaged, and well-supported team enhances
    platform capabilities and accelerates business transformation.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的平台团队建立在强大的领导力、持续学习和对DevOps的持续关注之上。吸引、保留和发展顶尖人才，同时培养包容性和心理安全的文化的能力，使最佳平台团队脱颖而出。一个赋权、参与度高且得到充分支持的团队可以提升平台能力并加速业务转型。
- en: 'Key insights are as follows:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 关键见解如下：
- en: High-performing platform teams require a strong foundation in structure, culture,
    and leadership. Clearly defined roles, collaborative team dynamics, and a product
    mindset ensure that Platform Engineering efforts align with business objectives.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高性能平台团队需要具备结构、文化和领导力的坚实基础。明确的角色定义、协作的团队动态和产品思维确保平台工程的努力与业务目标保持一致。
- en: Hiring for high performance goes beyond technical skills. Identifying candidates
    who demonstrate ownership, problem-solving abilities, and adaptability ensures
    that teams are technically competent, collaborative, innovative, and resilient.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高性能的招聘不仅限于技术技能。识别那些表现出所有权、解决问题的能力和适应性的人选，确保团队在技术上胜任、协作、创新和有韧性。
- en: Sustaining high performance requires continuous investment in learning, leadership,
    and recognition. A culture of psychological safety, continuous improvement, and
    shared accountability keeps teams engaged, motivated, and aligned with strategic
    goals.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维持高性能需要持续投资于学习、领导力和认可。一个心理安全感、持续改进和共同问责制的文化能够保持团队的参与度、动力并与战略目标保持一致。
- en: Effective leadership is the driving force behind Platform Engineering success.
    Leaders must provide a clear vision, structured goal-setting (OKRs and KPIs),
    and empowerment while fostering an environment of experimentation and innovation.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有效的领导力是平台工程成功背后的驱动力。领导者必须提供清晰的愿景、结构化的目标设定（OKR和KPI）以及赋权，同时营造实验和创新的环境。
- en: The best platform teams measure their impact and continuously evolve. Metrics
    such as DX scores, onboarding time, deployment frequency, and CFR provide tangible
    insights into team efficiency, platform adoption, and overall effectiveness.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最佳平台团队衡量其影响并持续进化。如DX分数、入职时间、部署频率和CFR等指标为团队效率、平台采用率和整体有效性提供了有形的见解。
- en: High-performing platform teams don’t just emerge—they are built with intention,
    investment, and continuous refinement. By combining structured hiring, leadership-driven
    alignment, and a culture of growth and accountability, organizations can create
    platform teams that consistently deliver business value and technological excellence.
    Those that prioritize collaboration, empower their teams, and embrace continuous
    learning will define the future of Platform Engineering.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的平台团队并非自然形成，而是通过有意识的构建、投资和持续优化而来。通过结合结构化招聘、领导力驱动的对齐以及增长和问责制文化，组织可以创建持续提供商业价值和技术卓越的平台团队。那些优先考虑协作、赋权团队并拥抱持续学习的组织将定义平台工程的未来。
- en: The shift to Platform Engineering is a vital evolution that equips you with
    the strategic vision and leadership skills necessary to drive real impact. Each
    principle and strategy we’ve examined serves as a foundation, empowering you to
    create and manage platforms that are resilient, adaptable, and ready for the future.
    As we move forward, it’s crucial to focus on the strategic planning and continuous
    improvement that will ensure these platforms not only meet today’s demands but
    also set the stage for sustained success.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 向平台工程的转变是一次至关重要的演变，它为您提供了推动真正影响的战略视野和领导力技能。我们审视的每个原则和策略都是一个基础，使您能够创建和管理具有弹性、适应性和为未来做好准备的平台。随着我们继续前进，关注战略规划和持续改进对于确保这些平台不仅满足今天的需求，而且为持续成功奠定基础至关重要。
- en: Strategic planning and continuous improvement
  id: totrans-88
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 战略规划和持续改进
- en: As we journey through the multifaceted world of Platform Engineering, it becomes
    clear that integrating various tools, techniques, and frameworks is essential
    for achieving maximum impact. This section will provide a cohesive strategy for
    implementing these insights in your organization, offering practical steps and
    solutions to overcome common challenges and ensure successful outcomes.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们穿越平台工程的多元世界时，很明显，整合各种工具、技术和框架对于实现最大影响至关重要。本节将提供一个连贯的策略，以在您的组织中实施这些见解，提供实用的步骤和解决方案，以克服常见挑战并确保成功的结果。
- en: Platform Engineering is not just about adopting the latest tools or following
    the newest trends; it is about creating a holistic, integrated approach that aligns
    with your business objectives. It requires a deep understanding of the interplay
    between technology, processes, and people. By synthesizing the knowledge gained
    from previous chapters, organizations can create a robust and dynamic Platform
    Engineering strategy that drives continuous improvement and innovation.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程不仅仅是采用最新的工具或追随最新的趋势；它是一种全面、整合的方法，与您的业务目标相一致。这需要深入理解技术、流程和人员之间的相互作用。通过综合前几章获得的知识，组织可以创建一个强大且动态的平台工程策略，推动持续改进和创新。
- en: The strategic role of Platform Engineering
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平台工程的战略角色
- en: At its core, Platform Engineering is about creating an environment where technology
    and business strategies converge. By implementing the right tools and practices,
    organizations can unlock new levels of innovation and efficiency. This strategic
    alignment ensures that every platform aspect—from development to deployment—contributes
    to the organization’s overarching goals.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程的核心在于创建一个技术策略与商业策略融合的环境。通过实施合适的工具和实践，组织可以解锁新的创新和效率水平。这种战略对齐确保了从开发到部署的每个平台方面都为组织的整体目标做出贡献。
- en: For example, adopting a Platform Engineering mindset can help businesses stay
    ahead of the competition by enabling faster response times to market changes,
    improving product quality, and enhancing customer satisfaction. It allows organizations
    to be more agile, adapting quickly to new opportunities and challenges, thus maintaining
    a competitive edge in an ever-evolving market landscape. This proactive approach
    is not only about keeping up with technological advancements but also about anticipating
    and shaping the future of the industry.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，采用平台工程思维可以帮助企业通过更快地响应市场变化、提高产品质量和增强客户满意度来保持竞争优势。它使组织更加敏捷，能够快速适应新的机遇和挑战，从而在不断变化的市场环境中保持竞争优势。这种主动方法不仅关乎跟上技术进步，还关乎预见和塑造行业的未来。
- en: Additionally, the strategic role of Platform Engineering includes fostering
    cross-functional collaboration, breaking down silos, and promoting a unified vision
    across the organization. By integrating Platform Engineering into the core business
    strategy, organizations can ensure that technology investments drive meaningful
    outcomes, supporting growth and long-term success.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，平台工程的战略角色还包括促进跨职能协作、打破壁垒并在整个组织中推广统一的愿景。通过将平台工程整合到核心商业策略中，组织可以确保技术投资产生有意义的成果，支持增长和长期成功。
- en: Building a cohesive business strategy
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建一致的商业策略
- en: 'The first step in integrating Platform Engineering practices is to develop
    a cohesive strategy that aligns with your organization’s goals. This strategy
    should encompass the selection of appropriate tools, the establishment of robust
    processes, and the cultivation of a supportive culture. Here’s a roadmap to guide
    you:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 整合平台工程实践的第一步是制定一个与组织目标一致的一致策略。这个策略应包括适当工具的选择、稳健流程的建立以及支持性文化的培养。以下是一个指导路线图：
- en: '**Assessment and planning**: Begin by thoroughly assessing your current infrastructure,
    workflows, and pain points. Identify areas where Platform Engineering can bring
    the most significant benefits. Develop a detailed plan that outlines the goals,
    timelines, and resources needed for implementation. This initial assessment helps
    identify gaps and opportunities and ensures that the strategy is tailored to the
    organization’s specific needs.'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估和规划**：首先，彻底评估您当前的基础设施、工作流程和痛点。确定平台工程可以带来最大效益的领域。制定一个详细的计划，概述实施所需的目标、时间表和资源。这一初步评估有助于识别差距和机遇，并确保策略符合组织的具体需求。'
- en: '**Tool selection and integration**: Choose the tools and technologies that
    best fit your organization’s needs. This could include container orchestration
    tools such as Kubernetes, CI/CD platforms such as GitLab, and automation frameworks
    such as WSO2 Choreo. Ensure these tools are seamlessly integrated to create a
    unified platform supporting continuous delivery and operational efficiency. The
    integration of tools should be driven by a clear understanding of how they complement
    each other and contribute to the overall platform strategy.'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**工具选择和集成**：选择最适合您组织需求的工具和技术。这可能包括容器编排工具如Kubernetes、CI/CD平台如GitLab以及自动化框架如WSO2
    Choreo。确保这些工具无缝集成，以创建支持持续交付和运营效率的统一平台。工具的集成应基于对它们如何相互补充并贡献于整体平台策略的清晰理解。'
- en: '**Process optimization**: Implement processes that streamline development and
    deployment workflows. Adopt practices such as **infrastructure as code** (**IAC**),
    CI/CD, and automated testing. These processes reduce manual intervention, minimize
    errors, and accelerate delivery cycles. Process optimization is an ongoing effort
    that requires regular review and adaptation to evolving business and technological
    landscapes.'
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**流程优化**：实施简化开发和部署工作流程的流程。采用如**基础设施即代码**（**IAC**）、持续集成/持续部署（CI/CD）和自动化测试等实践。这些流程减少了人工干预，最小化了错误，并加速了交付周期。流程优化是一个持续的努力，需要定期审查和适应不断变化的企业和技术环境。'
- en: '**Cultural transformation**: Foster a culture that embraces change, encourages
    collaboration, and prioritizes continuous improvement. Empathic leadership and
    clear communication are crucial to transforming your team. Encourage cross-functional
    teams to work together, share knowledge, and innovate. Building a culture of trust
    and openness is essential for overcoming resistance to change and fostering a
    sense of ownership and accountability among team members.'
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文化转型**：培养一种拥抱变化、鼓励协作并优先考虑持续改进的文化。同理心领导和清晰的沟通对于转变团队至关重要。鼓励跨职能团队协作，共享知识，并创新。建立信任和开放的文化对于克服对变化的阻力以及培养团队成员的归属感和责任感至关重要。'
- en: Creating a roadmap for implementation
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 制定实施路线图
- en: 'Creating a detailed roadmap is essential to ensure a successful Platform Engineering
    transformation. Here’s a step-by-step guide:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 制定详细的路线图对于确保平台工程转型成功至关重要。以下是一个逐步指南：
- en: '**Define objectives**: Clearly define what you aim to achieve with Platform
    Engineering. Set measurable goals such as reduced time-to-market, improved deployment
    frequency, and enhanced system reliability. These objectives should align with
    the organization’s strategic goals and provide a clear direction for the transformation
    effort. Establishing **key performance indicators** (**KPIs**) can help track
    progress and measure success.'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义目标**：明确您希望通过平台工程实现的目标。设定可衡量的目标，例如缩短上市时间、提高部署频率和增强系统可靠性。这些目标应与组织的战略目标一致，并为转型努力提供明确的方向。建立**关键绩效指标**（**KPIs**）有助于跟踪进度和衡量成功。'
- en: '**Develop a timeline**: Outline a realistic timeline for implementation, with
    milestones and checkpoints to track progress. Allow flexibility to accommodate
    unforeseen challenges and adjustments. A well-structured timeline helps maintain
    focus and ensure that the project stays on track. Regularly revisiting and adjusting
    the timeline based on project developments can ensure that the roadmap remains
    relevant and achievable. Involving key stakeholders in the timeline creation process
    can also help gain their buy-in and support for the project.'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**制定时间表**：概述一个现实的实施时间表，包括里程碑和检查点以跟踪进度。允许灵活性以应对不可预见挑战和调整。一个结构良好的时间表有助于保持专注并确保项目按计划进行。根据项目发展定期回顾和调整时间表可以确保路线图保持相关性和可实现性。在时间表创建过程中涉及关键利益相关者也有助于获得他们的认可和支持。'
- en: '**Allocate resources**: Identify the resources required, including personnel,
    budget, and technology. Ensure that you have the necessary support from leadership
    and stakeholders. Effective resource allocation is critical for ensuring that
    the transformation efforts are adequately supported and can achieve the desired
    outcomes. Incorporating resource planning tools can help manage and optimize the
    use of resources throughout the project. This step should include contingency
    planning to address potential resource shortfalls and unexpected challenges.'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分配资源**：确定所需的资源，包括人员、预算和技术。确保您获得领导和利益相关者的必要支持。有效的资源分配对于确保转型努力得到充分支持并能实现预期成果至关重要。在整个项目中采用资源规划工具可以帮助管理和优化资源的使用。此步骤应包括应急计划，以应对潜在的资源短缺和意外挑战。'
- en: '**Monitor and adjust**: Continuously monitor progress against your objectives
    and adjust as needed. Use metrics and feedback to refine processes and ensure
    you are on track to achieve your goals. Regular review and adaptation are essential
    for maintaining momentum and ensuring continuous improvement. Establishing a robust
    feedback loop with stakeholders and team members can provide valuable insights
    for iterative improvements. Additionally, using advanced analytics and reporting
    tools can provide real-time visibility into project performance, enabling proactive
    adjustments.'
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**监控和调整**：持续监控与目标进度，并根据需要调整。使用指标和反馈来完善流程，确保你正朝着实现目标的方向前进。定期的审查和调整对于保持势头和确保持续改进至关重要。与利益相关者和团队成员建立稳健的反馈循环，可以为迭代改进提供宝贵的见解。此外，使用高级分析和报告工具可以提供项目性能的实时可见性，从而实现主动调整。'
- en: Fostering a culture of continuous improvement
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 培养持续改进的文化
- en: Organizations must move beyond static methodologies to thrive in an evolving
    digital landscape and embed continuous improvement as a core strategic function.
    This means establishing structured mechanisms for iterative learning, innovation,
    and feedback loops rather than treating improvement as an ad hoc initiative. Successful
    organizations proactively evaluate emerging technologies, optimize processes,
    and refine platform capabilities to maintain a competitive edge.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 组织必须超越静态方法，在不断发展的数字领域中蓬勃发展，并将持续改进嵌入为核心战略功能。这意味着建立结构化的机制，用于迭代学习、创新和反馈循环，而不是将改进视为一项临时性活动。成功的组织积极评估新兴技术，优化流程，并完善平台能力，以保持竞争优势。
- en: A culture of continuous improvement requires more than just adopting new tools—it
    demands a shift in mindset. Encouraging teams to experiment with emerging frameworks,
    refine operational models, and challenge the status quo ensures adaptability and
    resilience. Structured internal innovation programs, cross-functional hackathons,
    and investment in technical upskilling enable platform teams to push boundaries
    and turn incremental optimizations into transformational advancements. Netflix’s
    chaos engineering, which fosters resilience by simulating failures, and the POWER
    framework for cultural transformation exemplify how structured experimentation
    can drive continuous improvement. Similarly, as discussed in earlier chapters,
    AI-powered predictive observability showcases how platforms can leverage intelligent
    automation to refine operations and improve reliability.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 持续改进的文化不仅仅需要采纳新的工具——它要求思维方式的转变。鼓励团队尝试新兴框架，完善运营模式，并挑战现状，确保了适应性和韧性。结构化的内部创新项目、跨职能黑客马拉松以及技术提升的投资，使平台团队能够突破边界，将渐进式优化转化为变革性进步。Netflix的混沌工程，通过模拟故障来培养韧性，以及文化变革的POWER框架，展示了结构化实验如何推动持续改进。同样，如前几章所述，AI驱动的预测可观察性展示了平台如何利用智能自动化来优化运营并提高可靠性。
- en: Collaboration is the catalyst for sustained improvement. Active participation
    in open source communities, industry working groups, and internal knowledge-sharing
    forums accelerates learning and ensures organizations remain ahead of evolving
    best practices. GitHub’s InnerSource model, where organizations apply open source
    principles internally to foster innovation, is a prime example of how knowledge-sharing
    accelerates learning. Additionally, organizations such as Google and Microsoft,
    which institutionalize continuous learning through engineering excellence programs
    and post-mortem-driven development, demonstrate how structured improvement efforts
    translate into long-term success.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 协作是持续改进的催化剂。积极参与开源社区、行业工作组以及内部知识共享论坛，可以加速学习并确保组织始终处于不断发展的最佳实践的前沿。GitHub的内部源模型，即组织在内部应用开源原则以促进创新，是知识共享如何加速学习的典型案例。此外，像谷歌和微软这样的组织，通过工程卓越计划和事后驱动的开发制度化持续学习，展示了结构化改进努力如何转化为长期成功。
- en: Platform Engineering is not just about delivering technology—it’s about shaping
    an organization’s ability to evolve. Strategic, data-driven continuous improvement
    transforms Platform Engineering from a support function into a value-generating
    powerhouse, enabling faster innovation cycles, greater developer satisfaction,
    and long-term business differentiation.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程不仅仅是交付技术——它关乎塑造组织适应能力。战略性的、数据驱动的持续改进将平台工程从支持功能转变为价值创造的核心动力，促进更快的创新周期、更高的开发者满意度和长期业务差异化。
- en: Delivering business value through Platform Engineering
  id: totrans-112
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过平台工程交付业务价值
- en: Platform Engineering is not just about creating scalable infrastructure or streamlined
    workflows—its true impact lies in delivering tangible business value. Every decision,
    tool, and process must ultimately contribute to faster innovation, improved developer
    productivity, reduced operational overhead, and increased competitive advantage.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程不仅仅是创建可扩展的基础设施或简化工作流程——其真正的价值在于交付可衡量的业务价值。每个决策、工具和流程都必须最终有助于加快创新、提高开发者生产力、减少运营成本并增加竞争优势。
- en: 'To successfully translate Platform Engineering investments into business outcomes,
    organizations must focus on three key areas: maximizing DX, operationalizing efficiency
    at scale, and driving measurable business impact.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功将平台工程投资转化为业务成果，组织必须关注三个关键领域：最大化开发体验（DX）、在规模上实现运营效率，以及推动可衡量的业务影响。
- en: Elevating developer experience as a business enabler
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将开发者体验提升为业务推动者
- en: The most direct way to deliver business value through Platform Engineering is
    by enhancing DX. Developer productivity, velocity, and satisfaction directly impact
    product delivery timelines, feature innovation, and operational resilience. A
    frictionless developer experience leads to faster time-to-market, higher software
    quality, and better talent retention.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 通过平台工程提升开发体验（DX）来交付业务价值的最直接方式是增强开发体验。开发者的生产力、速度和满意度直接影响产品交付时间表、功能创新和运营弹性。无摩擦的开发体验导致上市时间更快、软件质量更高，以及更好地保留人才。
- en: 'Key actions to maximize developer experience include the following:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 最大化开发者体验的关键行动包括以下内容：
- en: '**Invest in IDPs**: Enable self-service workflows for developers by automating
    environment provisioning, deployment processes, and infrastructure access.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资于开发者体验计划（IDPs）**：通过自动化环境配置、部署流程和基础设施访问，为开发者启用自助式工作流程。'
- en: '**Minimize cognitive load**: Standardize development workflows with golden
    paths, well-documented APIs, and intuitive onboarding processes to reduce friction.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最小化认知负荷**：通过黄金路径、详尽的API文档和直观的入职流程标准化开发工作流程，以减少摩擦。'
- en: '**Streamline tooling and workflows**: Remove redundant tooling and ensure seamless
    integrations between CI/CD, observability, and security pipelines.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化工具和工作流程**：移除冗余工具并确保CI/CD、可观测性和安全管道之间的无缝集成。'
- en: Organizations that prioritize developer experience as a business imperative
    have seen tangible results. Spotify’s Backstage IDP reduced onboarding time for
    new engineers by 55%, allowing them to contribute to production faster. Google’s
    DX initiatives cut deployment friction, leading to a 45% reduction in time spent
    on non-coding tasks. These improvements accelerate developer velocity, reduce
    burnout, and increase overall innovation capacity, reinforcing platform engineering’s
    role as a key driver of business success.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 将开发者体验作为业务要务的组织已经看到了可衡量的成果。Spotify的Backstage IDP将新工程师的入职时间缩短了55%，使他们能够更快地参与生产。Google的DX举措减少了部署摩擦，导致在非编码任务上的时间减少了45%。这些改进加速了开发者速度，减少了倦怠，并增加了整体创新能力，强化了平台工程作为业务成功关键驱动者的作用。
- en: Driving operational efficiency at scale
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在规模上推动运营效率
- en: The second pillar of delivering business value through Platform Engineering
    involves optimizing resource utilization, reducing inefficiencies, and ensuring
    cost-effectiveness. A well-architected platform enables predictable scaling, improves
    infrastructure reliability, and automates repetitive operational tasks, freeing
    teams to focus on higher-value initiatives.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 通过平台工程交付业务价值的第二个支柱涉及优化资源利用、减少低效并确保成本效益。一个设计良好的平台能够实现可预测的扩展，提高基础设施可靠性，并自动化重复性运营任务，使团队能够专注于更高价值的项目。
- en: 'Key actions to optimize efficiency include the following:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 优化效率的关键行动包括以下内容：
- en: '**Adopt FinOps and intelligent cost optimization**: Implement AI-driven observability,
    workload rightsizing, and auto-scaling strategies to optimize infrastructure spending.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**采用FinOps和智能成本优化**：实施AI驱动的可观察性、工作负载调整和自动扩展策略，以优化基础设施支出。'
- en: '**Automate everything possible**: Use IaC, automated deployments, and self-healing
    mechanisms to eliminate manual interventions.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尽可能自动化**：使用IaC、自动化部署和自愈机制来消除手动干预。'
- en: '**Enhance platform resilience**: Introduce continuous performance tuning, chaos
    engineering, and proactive monitoring to reduce outages and service disruptions.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强平台弹性**：引入持续的性能调整、混沌工程和主动监控，以减少故障和服务中断。'
- en: Many leading organizations have leveraged Platform Engineering to drive operational
    efficiency at scale. Netflix’s chaos engineering practices proactively test failure
    scenarios, ensuring platform resilience and minimizing customer impact during
    outages. Similarly, Uber’s AI-powered FinOps approach optimizes cloud expenditures,
    leading to a 30% reduction in infrastructure costs while maintaining performance.
    When embedded within platform strategy, these examples highlight how operational
    efficiency directly translates to cost savings and improved service reliability.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 许多领先的组织已经利用平台工程在规模上推动运营效率。Netflix的混沌工程实践主动测试故障场景，确保平台弹性并最小化故障期间对客户的影响。同样，Uber的基于AI的FinOps方法优化了云支出，在保持性能的同时，将基础设施成本降低了30%。当这些例子嵌入到平台战略中时，它们突出了运营效率如何直接转化为成本节约和改进的服务可靠性。
- en: Aligning Platform Engineering with business metrics
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将平台工程与业务指标对齐
- en: The final step in maximizing business value is ensuring that Platform Engineering
    aligns with key business KPIs and strategic objectives. It’s not enough for platform
    teams to deliver outstanding technology—they must quantify their impact in terms
    that executives and stakeholders understand.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 最大化业务价值的最后一步是确保平台工程与关键业务KPI和战略目标对齐。平台团队不仅要提供卓越的技术，还必须用高管和利益相关者能够理解的方式来量化其影响。
- en: 'Key actions for business alignment include the following:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 业务对齐的关键行动包括以下内容：
- en: '**Define and track success metrics**: Align Platform Engineering KPIs with
    business outcomes such as deployment frequency, lead time for changes, and revenue
    impact from platform improvements.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义和跟踪成功指标**：将平台工程的关键绩效指标与业务成果对齐，例如部署频率、变更的领先时间和平台改进带来的收入影响。'
- en: '**Showcase business impact**: Regularly present data-driven insights on how
    platform initiatives accelerate innovation, improve reliability, and drive revenue
    growth.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**展示业务影响**：定期展示数据驱动的见解，说明平台举措如何加速创新、提高可靠性和推动收入增长。'
- en: '**Embed continuous feedback loops**: Collaborate with product, engineering,
    and leadership teams to iterate on platform priorities based on real business
    needs.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入持续反馈循环**：与产品、工程和领导团队合作，根据真实业务需求迭代平台优先事项。'
- en: Organizations that successfully align Platform Engineering with business strategy
    create direct value for customers and stakeholders alike. Capital One’s platform
    modernization efforts led to an 80% reduction in deployment time, accelerating
    digital banking feature releases and improving customer experience. Shopify’s
    developer-centric platform investments enhanced engineering throughput, enabling
    faster feature rollouts and reducing time-to-market for merchants. These examples
    illustrate how Platform Engineering catalyzes revenue growth and competitive differentiation
    when strategically aligned with business priorities.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 成功将平台工程与业务战略对齐的组织，可以为客户和利益相关者创造直接价值。Capital One的平台现代化努力导致部署时间减少了80%，加速了数字银行功能的发布，并改善了客户体验。Shopify以开发者为中心的平台投资增强了工程吞吐量，使功能推出更快，并缩短了商家的上市时间。这些例子说明了当平台工程与业务优先事项战略对齐时，如何催化收入增长和竞争优势。
- en: Platform Engineering is not just an infrastructure investment but a force multiplier
    that drives business agility, efficiency, and innovation. Organizations can ensure
    their platform investments yield measurable business value by focusing on developer
    experience, operational efficiency, and business alignment.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程不仅是一项基础设施投资，而且是一种倍增器，它推动业务敏捷性、效率和创新能力。组织可以通过关注开发者体验、运营效率和业务对齐，确保其平台投资产生可衡量的业务价值。
- en: Companies that prioritize Platform Engineering as a strategic function—rather
    than a backend operational concern—position themselves to outpace competitors,
    deliver superior digital experiences, and future-proof their technology ecosystems.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 将平台工程作为战略功能而非后台运营关注点的公司，将自己定位在超越竞争对手、提供卓越的数字体验和确保其技术生态系统面向未来的位置。
- en: As Platform Engineering matures, new challenges and opportunities emerge. AI-driven
    automation, predictive observability, and self-optimizing systems reshape how
    platforms are designed, built, and operated. The future of Platform Engineering
    will be defined by intelligent systems, adaptive infrastructure, and even deeper
    integration with business strategy. Organizations that embrace these advancements
    will not just keep up with industry shifts—they will lead the next wave of digital
    transformation.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 随着平台工程的成熟，新的挑战和机遇出现。基于AI的自动化、预测性可观察性和自我优化系统重塑了平台的设计、构建和运营方式。平台工程的未来将由智能系统、适应性基础设施以及与业务战略的更深入集成来定义。拥抱这些进步的组织不仅能够跟上行业变革，还将引领下一波数字化转型。
- en: 'The future of Platform Engineering: 10 predictions for the next 5 years'
  id: totrans-139
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 平台工程的未来：未来5年的10个预测
- en: As technology accelerates, Platform Engineering is at a pivotal crossroads,
    poised to redefine how software is built, deployed, and managed. The next 5 to
    10 years will see seismic shifts in developer workflows, automation, and platform
    capabilities, fundamentally reshaping the role of platform engineers, developers,
    and AI-driven automation. Here are 10 predictions we make about Platform Engineering
    and its long-term trajectory.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 随着技术的加速发展，平台工程正处于一个关键的十字路口，准备重新定义软件的构建、部署和管理方式。未来5到10年将见证开发者工作流程、自动化和平台能力的地震性转变，从根本上重塑平台工程师、开发者和AI驱动自动化角色的作用。以下是关于平台工程及其长期轨迹的10个预测。
- en: 1\. Developers will evolve into product architects, not just coders
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 开发者将演变成为产品架构师，而不仅仅是编码者
- en: The role of developers will shift away from writing boilerplate code and configuring
    infrastructure to becoming strategic product architects who focus on business
    logic, user experience, and system design. AI-powered agent-based development
    will handle repetitive coding, allowing developers to curate, orchestrate, and
    fine-tune AI-generated solutions rather than manually write every line of code.
    Low-code and no-code platforms will merge with traditional software engineering,
    creating hybrid development ecosystems where human expertise enhances AI-generated
    artifacts instead of replacing them.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者的角色将从编写样板代码和配置基础设施转变为成为专注于业务逻辑、用户体验和系统设计的战略产品架构师。基于AI的基于代理的开发将处理重复性编码，让开发者能够策划、编排和微调AI生成的解决方案，而不是手动编写每一行代码。低代码和无代码平台将与传统软件工程融合，创造混合开发生态系统，其中人类专业知识增强AI生成的工件，而不是取代它们。
- en: '*By 2027, AI will be an integral co-developer, turning software engineers into
    high-level system designers who guide, validate, and optimize AI-driven code generation*'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2027年，AI将成为一个不可或缺的联合开发者，将软件工程师转变为高级系统设计师，他们指导、验证和优化AI驱动的代码生成*'
- en: This shift reflects an industry-wide move toward DX as the ultimate productivity
    metric. Instead of measuring success by lines of code, teams will measure how
    quickly they can deliver meaningful features that solve real business problems.
    As AI tools take over mundane tasks—such as boilerplate code and environment setup—engineers
    will devote more time to architecting resilient systems, collaborating with stakeholders,
    and refining user experiences. This evolution boosts developer satisfaction and
    ensures a more substantial alignment between technology and business strategy.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变反映了整个行业向DX（数字化体验）作为最终生产率指标的转变。团队将不再通过代码行数来衡量成功，而是衡量他们能够多快地交付有意义的特性，解决真正的业务问题。随着AI工具接管日常任务——如样板代码和环境设置——工程师将更多地投入到构建弹性系统、与利益相关者合作和改进用户体验中。这种演变提高了开发者的满意度，并确保了技术与业务战略之间更紧密的协调。
- en: How organizations can prepare
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Organizations should invest in AI-powered coding assistants (e.g., GitHub Copilot
    or GitLab Duo) and promote design-thinking workshops encouraging developers to
    view their work through a product lens. Implement dual career tracks—one focusing
    on deep technical leadership and the other on product-focused system design—to
    accommodate varied skill sets and aspirations. Leaders must recognize and reward
    developers’ architectural and strategic contributions, reinforcing the message
    that software engineering success is measured by impact, not just code volume.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 组织应投资于 AI 驱动的编码助手（例如，GitHub Copilot 或 GitLab Duo）并推广设计思维研讨会，鼓励开发者从产品角度看待他们的工作。实施双重职业路径——一个专注于深入的技术领导，另一个专注于以产品为中心的系统设计——以适应不同的技能集和抱负。领导者必须认可并奖励开发者的架构和战略贡献，强化软件工程成功以影响而非代码量来衡量的信息。
- en: '2\. The end of tool fragmentation: Integrated, self-service developer experiences'
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 工具碎片化的终结：集成、自助式开发者体验
- en: The current challenge of integrating fragmented DevOps and platform tools will
    give way to unified, intelligent IDPs that provide a seamless, self-service experience
    for developers. Cognitive AI layers will replace the need for manual tool orchestration,
    allowing engineers to define high-level intents while the platform autonomously
    provisions, secures, and optimizes infrastructure in real time.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 当前整合碎片化 DevOps 和平台工具的挑战将让位于统一的、智能的 IDP，为开发者提供无缝、自助式体验。认知 AI 层将取代手动工具编排的需求，允许工程师定义高级意图，而平台自主地提供、安全和优化基础设施。
- en: '*Within three years, organizations that still rely on manually stitched-together
    DevOps tooling will fall behind. Fully integrated, AI-enhanced IDPs will become
    the gold standard, providing developers with an intuitive, frictionless experience*'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '*在三年内，仍然依赖手动拼接的 DevOps 工具的组织将落后。完全集成、AI 增强的 IDP 将成为黄金标准，为开发者提供直观、无摩擦的体验*'
- en: Today’s DevOps landscape is flooded with specialized tools for CI/CD, monitoring,
    security, and more. Although each tool is powerful, lack of integration often
    leads to manual handoffs, repeated configurations, and inconsistent governance.
    The future points to all-in-one platforms where these capabilities converge, guided
    by AI to simplify developer tasks. By abstracting complexity behind cohesive interfaces,
    developers will no longer waste time reconciling disparate systems.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，DevOps 领域充斥着用于 CI/CD、监控、安全和更多领域的专业工具。尽管每个工具都很强大，但缺乏集成往往导致手动交接、重复配置和不一致的治理。未来指向的是集成的平台，这些能力在这里汇聚，由
    AI 引导以简化开发者的任务。通过在统一的界面后抽象复杂性，开发者将不再浪费时间协调不同的系统。
- en: How organizations can prepare
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: 'Adopt or build an IDP that unifies your CI/CD, observability, security, and
    infrastructure provisioning. Integrate AI-based recommendations to guide developers
    in selecting optimal build pipelines or security policies. Encourage developer
    feedback loops—through surveys and usage analytics—to refine the platform continuously.
    Make the platform a product: define product owners, set roadmap priorities, and
    measure adoption and satisfaction to ensure ongoing evolution toward seamless
    self-service.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 采用或构建一个统一的 CI/CD、可观察性、安全和基础设施供应的 IDP。集成基于 AI 的建议，以指导开发者选择最佳构建管道或安全策略。鼓励开发者反馈循环——通过调查和使用分析——以持续改进平台。将平台视为产品：定义产品负责人、设定路线图优先级，并衡量采用率和满意度，以确保持续向无缝自助式服务发展。
- en: 3\. Platform Engineering will shift from infrastructure to AI-driven orchestration
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 平台工程将从基础设施转向 AI 驱动的编排
- en: Platform Engineering will evolve beyond infrastructure provisioning and automation,
    becoming the central nervous system of intelligent, AI-driven orchestration. AI
    will dynamically optimize cloud resources, predict failures before they occur,
    and enable fully autonomous platforms that require minimal human intervention.
    Workflows will be intent-driven, where developers specify desired outcomes, and
    AI handles execution.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程将超越基础设施供应和自动化，成为智能、AI 驱动的编排的中心神经系统。AI 将动态优化云资源，预测故障发生之前，并使需要最小人工干预的完全自主平台成为可能。工作流程将是意图驱动的，其中开发者指定所需的成果，而
    AI 负责执行。
- en: '*By 2030, AI-driven orchestration will make manual infrastructure tuning and
    operations obsolete, shifting Platform Engineering to governance, policy enforcement,
    and strategic automation*'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '*到 2030 年，AI 驱动的编排将使手动基础设施调整和操作过时，将平台工程转向治理、政策执行和战略自动化*'
- en: The need for real-time, event-driven architectures will grow as businesses demand
    instant adaptability to workload spikes, cost optimizations, and security threats.
    AI will observe and act autonomously, rerouting workloads, mitigating risks, and
    enforcing governance in real time.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 随着企业对即时适应工作负载峰值、成本优化和安全威胁的需求增加，对实时、事件驱动的架构的需求将会增长。AI 将会自主观察和行动，重新路由工作负载，减轻风险，并在实时中执行治理。
- en: How organizations can prepare
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Organizations must invest in AI-native platforms that support autonomous policy
    enforcement, AI-enhanced FinOps, and predictive maintenance. Adopt serverless-first
    architectures where possible, allowing AI to allocate resources dynamically based
    on demand forecasting models. Train platform engineers to think beyond infrastructure
    automation and embrace AI-driven orchestration and policy-based governance.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 组织必须投资于支持自主政策执行、AI增强的FinOps和预测性维护的AI原生平台。在可能的情况下采用无服务器优先的架构，允许AI根据需求预测模型动态分配资源。培训平台工程师超越基础设施自动化，拥抱AI驱动的编排和基于政策的治理。
- en: 4\. Security will become predictive and autonomous
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 安全将变得预测性和自主性
- en: Instead of reacting to security incidents, AI-powered security frameworks will
    proactively detect vulnerabilities, enforce compliance, and mitigate threats before
    they materialize. AI-driven anomaly detection will flag unusual behaviors across
    networks, applications, and cloud environments, significantly reducing the **mean
    time to detect** (**MTTD**) and **mean time to** **respond** (**MTTRespond**).
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是对安全事件做出反应，AI驱动的安全框架将主动检测漏洞，执行合规性，并在它们显现之前减轻威胁。AI驱动的异常检测将在网络、应用程序和云环境中标记不寻常的行为，显著减少**平均检测时间**（**MTTD**）和**平均响应时间**（**MTTRespond**）。
- en: '*By 2028, AI-powered security analytics, anomaly detection, and automated threat
    response will be the industry standard, with manual security management becoming
    obsolete*'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2028年，AI驱动的安全分析、异常检测和自动威胁响应将成为行业标准，手动安全管理将变得过时*'
- en: Security tools will shift from rule-based detection to adaptive, learning-based
    models that self-tune in response to evolving threats. AI will continuously validate
    supply chain security, flagging vulnerabilities in third-party dependencies and
    ensuring secure code generation.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 安全工具将从基于规则的检测转向自适应、基于学习的模型，这些模型会根据不断发展的威胁自我调整。AI将持续验证供应链安全，标记第三方依赖中的漏洞，并确保安全代码生成。
- en: How organizations can prepare
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Implement AI-driven security tools such as machine learning-powered **intrusion
    detection systems** (**IDSs**), automated compliance auditing, and continuous
    attack surface monitoring. Foster AI security collaborations between DevSecOps
    and platform teams to ensure security is not just an afterthought but an integrated,
    autonomous process.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 实施AI驱动的安全工具，如机器学习驱动的**入侵检测系统**（**IDSs**）、自动合规性审计和持续攻击面监控。促进DevSecOps和平台团队之间的AI安全合作，确保安全不仅仅是事后考虑，而是一个集成、自主的过程。
- en: 5\. AI agents will replace traditional IT operations
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. AI代理将取代传统的IT运营
- en: Routine infrastructure management tasks—such as patching, monitoring, scaling,
    and failure recovery—will no longer require human intervention. AI agents will
    autonomously monitor systems, detect anomalies, and initiate self-healing responses,
    minimizing downtime and operational overhead.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 常规的基础设施管理任务——如打补丁、监控、扩展和故障恢复——将不再需要人工干预。AI代理将自主监控系统，检测异常，并启动自我修复响应，最小化停机时间和运营开销。
- en: '*By 2029, AI-powered IT operations (AIOps) will replace traditional human-driven
    infrastructure management, significantly reducing manual intervention in platform
    operations*'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2029年，AI驱动的IT运营（AIOps）将取代传统的人工驱动的基础设施管理，显著减少平台运营中的手动干预*'
- en: As AI matures, IT operations will transition from reactive to proactive, then
    fully autonomous. Self-healing architectures will detect patterns leading to failures
    and resolve issues before they impact users. Organizations will experience unprecedented
    levels of uptime and operational efficiency without human operators manually troubleshooting
    incidents.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI的成熟，IT运营将从被动转向主动，然后完全自主。自我修复架构将检测导致故障的模式，并在它们影响用户之前解决问题。组织将体验到前所未有的正常运行时间和运营效率，无需人工操作员手动解决事件。
- en: How organizations can prepare
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Invest in AIOps platforms such as Datadog, Dynatrace, and Splunk that integrate
    machine learning models to detect anomalies, forecast failures, and automate remediation.
    Train platform engineers to shift from hands-on troubleshooting to governance
    and oversight of AI-driven operations. Encourage a proactive IT culture, where
    teams focus on optimizing AI workflows rather than firefighting incidents.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 投资于如Datadog、Dynatrace和Splunk等AIOps平台，这些平台集成了机器学习模型以检测异常、预测故障并自动化修复。培训平台工程师从手动故障排除转向AI驱动的操作的治理和监督。鼓励积极的IT文化，其中团队专注于优化AI工作流程而不是处理突发事件。
- en: 6\. Developer experience will overtake cost as the primary KPI for platform
    teams
  id: totrans-171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 开发者体验将超越成本成为平台团队的主要KPI
- en: While cost efficiency has traditionally been a primary KPI for platform teams,
    the next decade will see DX become the dominant measure of success. Organizations
    will prioritize developer satisfaction, productivity, and onboarding speed as
    the key indicators of Platform Engineering excellence.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然成本效率传统上一直是平台团队的主要KPI，但下一个十年将看到DX成为衡量成功的主要指标。组织将优先考虑开发者满意度、生产力和入职速度，作为平台工程卓越的关键指标。
- en: '*By 2027, the best-performing engineering organizations will measure success
    by how well their platforms enable developers to ship high-quality code—not just
    by how much they reduce infrastructure costs*'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2027年，表现最佳的技术团队将衡量成功的标准是他们的平台如何使开发者能够交付高质量的代码——而不仅仅是通过降低基础设施成本*'
- en: A poor developer experience leads to friction, delays, and shadow IT, forcing
    teams to bypass internal platforms. In contrast, platforms with intuitive self-service
    workflows, minimal cognitive load, and precise documentation will drive adoption,
    efficiency, and innovation.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 糟糕的开发者体验会导致摩擦、延误和影子IT，迫使团队绕过内部平台。相比之下，具有直观的自助工作流程、最小认知负荷和精确文档的平台将推动采用、效率和创新能力。
- en: How organizations can prepare
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Establish developer experience teams focused on continuously improving IDP usability,
    documentation, and automation. Use metrics such as lead time for changes (DORA),
    NPS for developers, and onboarding time for new hires to track progress. Make
    developer productivity a board-level priority, ensuring platform investments align
    with developer needs rather than just cost savings.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 建立专注于持续改进IDP可用性、文档和自动化的开发者体验团队。使用如变更的领先时间（DORA）、开发者的NPS和新人入职时间等指标来跟踪进度。将开发者生产力作为董事会层面的优先事项，确保平台投资与开发者需求相一致，而不仅仅是成本节约。
- en: 7\. AI and observability will converge for predictive operations
  id: totrans-177
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. AI和可观测性将汇聚以实现预测性操作
- en: Observability will evolve from passive monitoring to predictive, AI-driven operations.
    Platforms will leverage large-scale AI models to detect early warning signals,
    proactively resolve incidents, and automatically fine-tune performance based on
    user demand and system load. Full stack observability, powered by AI, will replace
    traditional monitoring dashboards.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 可观测性将从被动监控发展到预测性、AI驱动的操作。平台将利用大规模AI模型来检测早期预警信号，主动解决事件，并根据用户需求和系统负载自动调整性能。由AI驱动的全栈可观测性将取代传统的监控仪表板。
- en: '*By 2026, AI-powered predictive observability will be a standard in enterprise
    platforms, reducing downtime and eliminating the need for manual issue triaging*'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2026年，AI驱动的预测性可观测性将成为企业平台的标准，减少停机时间并消除手动问题分类的需求*'
- en: Today’s observability stacks rely heavily on logs, metrics, and traces, requiring
    human intervention to interpret signals, identify root causes, and remediate issues.
    AI-driven observability will shift from reactive troubleshooting to predictive
    intelligence, where machine learning models analyze historical data, real-time
    telemetry, and anomaly detection patterns to anticipate failures before they occur.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的可观测性堆栈严重依赖日志、指标和跟踪，需要人工干预来解释信号、识别根本原因和修复问题。AI驱动的可观测性将从被动故障排除转变为预测性智能，其中机器学习模型分析历史数据、实时遥测和异常检测模式，以预测在发生之前可能出现的问题。
- en: Instead of engineers responding to alerts, AI will automatically diagnose problems,
    suggest fixes, and, in many cases, execute remediations autonomously. This transformation
    will reduce **mean time to resolution** (**MTTResolution**), eliminate manual
    triaging, and improve system reliability. Over time, AI-driven observability will
    become adaptive, dynamically adjusting infrastructure configurations to optimize
    performance without human intervention. Organizations will unlock a new era of
    reliability, efficiency, and operational intelligence by embedding predictive
    monitoring, automated diagnostics, and autonomous system tuning into platform
    operations.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 取代工程师响应警报，AI将自动诊断问题，提出解决方案，并在许多情况下自主执行修复。这种转型将减少**平均解决时间**（**MTTResolution**），消除手动分类，并提高系统可靠性。随着时间的推移，AI驱动的可观察性将变得自适应，动态调整基础设施配置以优化性能，无需人为干预。通过将预测监控、自动诊断和自主系统调优嵌入到平台操作中，组织将开启一个可靠性、效率和运营智能的新时代。
- en: How organizations can prepare
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: To stay ahead, organizations must adopt AI-driven observability platforms such
    as New Relic AI, Datadog Watchdog, Dynatrace Davis AI, and Splunk AIOps, which
    integrate machine learning for anomaly detection and predictive analytics. Instead
    of relying on static threshold-based alerts, engineering teams must shift toward
    context-aware, AI-driven incident prioritization, where critical failures are
    identified based on business impact rather than isolated technical anomalies.
    Automating **root cause analysis** (**RCA**) will also be essential, leveraging
    AI to correlate system dependencies and past telemetry data to pinpoint potential
    issues before they escalate. Furthermore, self-healing automation should be tightly
    integrated with observability tools, enabling AI to trigger remediation when predefined
    failure patterns are detected automatically.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持领先地位，组织必须采用AI驱动的可观察性平台，如New Relic AI、Datadog Watchdog、Dynatrace Davis AI和Splunk
    AIOps，这些平台集成了机器学习进行异常检测和预测分析。工程团队必须转向基于上下文的、AI驱动的事件优先级排序，其中关键故障是根据业务影响而不是孤立的技术异常来识别的。自动化**根本原因分析**（**RCA**）也将至关重要，利用AI关联系统依赖和过去遥测数据，在问题升级之前确定潜在问题。此外，自愈自动化应与可观察性工具紧密集成，使AI能够在自动检测到预定义的故障模式时触发修复。
- en: 8\. Platform teams will standardize multi-cloud architectures
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 平台团队将标准化多云架构
- en: Organizations will move beyond single-cloud dependencies, embracing multi-cloud
    architectures with AI-driven workload orchestration and higher levels of on-premises
    clouds. Intelligent platforms will dynamically distribute workloads across clouds
    based on cost, latency, and regulatory requirements.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 组织将超越单一云的依赖，采用AI驱动的作业编排和更高水平的本地云的多云架构。智能平台将根据成本、延迟和监管要求动态地在云之间分配工作负载。
- en: '*By 2027, organizations will treat multi-cloud as the default architecture,
    leveraging AI for intelligent workload placement and cost optimization*'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2027年，组织将把多云作为默认架构，利用AI进行智能工作负载放置和成本优化*'
- en: The risks of vendor lock-in, cloud outages, and geopolitical instability will
    drive companies to design cloud-agnostic architectures. AI will automatically
    adjust resource allocations across AWS, Azure, Google Cloud, and edge computing
    environments, ensuring optimal performance and cost efficiency.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 供应商锁定、云服务中断和地缘政治不稳定的风险将促使公司设计云无关的架构。AI将自动调整AWS、Azure、Google Cloud和边缘计算环境中的资源分配，确保最佳性能和成本效率。
- en: How organizations can prepare
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Invest in Kubernetes, Terraform, and AI-driven workload orchestration tools
    that abstract away cloud provider dependencies. Train platform teams to design
    cloud-agnostic systems, leveraging service meshes, API gateways, and edge computing
    to distribute workloads efficiently.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 投资于Kubernetes、Terraform和AI驱动的作业编排工具，这些工具可以抽象化云提供商的依赖。培训平台团队设计云无关的系统，利用服务网格、API网关和边缘计算来高效地分配工作负载。
- en: 9\. AI will enable autonomous governance and compliance
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9. AI将使自主治理和合规成为可能
- en: The burden of manually enforcing security policies, compliance standards, and
    governance frameworks will be eliminated by AI-driven automation. AI will continuously
    monitor, audit, and enforce compliance in real time, reducing the risk of human
    error.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 通过AI驱动的自动化，将消除手动执行安全策略、合规标准和治理框架的负担。AI将实时持续监控、审计和执行合规性，降低人为错误的风险。
- en: '*By 2035, AI-driven compliance enforcement will replace manual security audits,
    reducing regulatory risks and ensuring real-time adherence to industry standards*'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2035年，AI驱动的合规性执行将取代手动安全审计，降低监管风险并确保实时遵守行业标准*'
- en: Regulatory compliance today is often a reactive, time-consuming process. AI-driven
    policy as code, automated compliance scanning, and anomaly detection will enable
    real-time, proactive governance. Security and compliance teams will focus on high-level
    strategies while AI continuously enforces best practices.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的合规性通常是一个反应性、耗时的过程。AI驱动的政策作为代码、自动化合规性扫描和异常检测将实现实时、主动治理。安全和合规团队将专注于高级策略，而AI持续执行最佳实践。
- en: How organizations can prepare
  id: totrans-194
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Adopt AI-powered security tools that automatically detect vulnerabilities, enforce
    policies, and audit compliance. Use continuous compliance monitoring platforms
    (e.g., Wiz, Lacework, or Prisma Cloud) to address risks proactively before they
    become incidents. Encourage a security-first culture where compliance is baked
    into development workflows, not treated as an afterthought.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 采用自动检测漏洞、执行政策和审计合规性的AI安全工具。使用持续合规性监控平台（例如，Wiz、Lacework或Prisma Cloud）在风险成为事件之前主动应对风险。鼓励一种以安全为首要文化的做法，将合规性融入开发工作流程，而不是将其视为事后考虑。
- en: '10\. The future of work: AI-enhanced, human-driven platform teams'
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10. 工作的未来：AI增强、人类驱动的平台团队
- en: AI will not replace platform engineers but fundamentally transform their roles.
    Instead of focusing on manual infrastructure management, debugging, and operational
    maintenance, platform teams will act as AI system architects, policy enforcers,
    and innovation enablers.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: AI不会取代平台工程师，而是从根本上改变他们的角色。不再专注于手动基础设施管理、调试和运营维护，平台团队将作为AI系统架构师、政策执行者和创新推动者。
- en: '*By 2028, AI will handle 80% of routine platform operations, allowing engineers
    to focus on governance, optimization, and AI-human collaboration*'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: '*到2028年，AI将处理80%的常规平台操作，使工程师能够专注于治理、优化和AI-人类协作*'
- en: Platform engineers will evolve into strategic enablers of AI-driven workflows,
    ensuring platform reliability, security, and developer productivity. The role
    will shift from manual execution to AI governance, balancing autonomous intelligence
    with human oversight.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程师将演变成为AI驱动工作流程的战略推动者，确保平台可靠性、安全性和开发者生产力。角色将从手动执行转变为AI治理，平衡自主智能与人类监督。
- en: How organizations can prepare
  id: totrans-200
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织如何准备
- en: Train platform engineers in AI ethics, policy automation, and AI-augmented operations.
    Encourage collaboration between platform teams and AI researchers to refine AI-driven
    automation continuously. Redefine success metrics to measure AI’s impact on efficiency,
    security, and developer enablement.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 对平台工程师进行AI伦理、政策自动化和AI增强操作培训。鼓励平台团队和AI研究人员之间的合作，以持续改进AI驱动自动化。重新定义成功指标，以衡量AI对效率、安全和开发者赋能的影响。
- en: AI, automation, and continuous evolution will define the next five years of
    Platform Engineering. Organizations that embrace these trends will gain a competitive
    edge, improve developer experience, and unlock unprecedented efficiencies. The
    future belongs to those who leverage AI not as a replacement for human expertise
    but as a force multiplier—amplifying the capabilities of developers and platform
    teams alike.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: AI、自动化和持续进化将定义未来五年平台工程的发展。拥抱这些趋势的组织将获得竞争优势，提升开发者体验，并解锁前所未有的效率。未来属于那些将AI视为不是取代人类专业知识的力量，而是作为倍增器——增强开发者和平台团队的能力的人。
- en: 'Organizations that hesitate to adopt AI-enhanced platforms risk falling behind,
    burdened by manual processes, fragmented tooling, and outdated architectures.
    The imperative is clear: invest in AI-driven automation, prioritize developer
    experience, and build platforms that are intelligent, scalable, and future-proof.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 拖延采用AI增强平台的风险是落后，负担着手动流程、碎片化工具和过时架构。明确的必要性是：投资AI驱动自动化，优先考虑开发者体验，并构建智能、可扩展和面向未来的平台。
- en: The evolution of Platform Engineering is just beginning. The real question is
    not whether AI and automation will redefine the future, but who will shape it.
    Those who take action today will define the path forward.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程的演变才刚刚开始。真正的问题不是AI和自动化是否会重新定义未来，而是谁将塑造它。那些今天采取行动的人将定义前进的道路。
- en: 'Seize the future: Your role in shaping Platform Engineering'
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 把握未来：你在塑造平台工程中的作用
- en: Platform Engineering is no longer just a technical discipline—it is the foundation
    for innovation, agility, and sustained business growth. The decisions made today
    will define the competitive landscape for years to come. Are you ready to lead
    the charge? The future belongs to those who seize opportunities, challenge the
    status quo, and create scalable, developer-centric ecosystems that drive real
    business value. The time to lead the charge is now. Are you ready?
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程不再仅仅是一个技术学科，它是创新、敏捷和持续业务增长的基础。今天所做的决策将定义未来多年的竞争格局。你准备好领导这场变革了吗？未来属于那些抓住机遇、挑战现状并创建可扩展、以开发者为中心的生态系统以推动真实商业价值的人。领导这场变革的时刻已经到来。你准备好了吗？
- en: 'Three fundamental shifts must occur to optimally harness the power of Platform
    Engineering: a commitment to continuous reinvention, the courage to embrace AI
    and automation, and a relentless focus on developer experience. These principles
    will define the next generation of high-performance engineering teams.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最佳地利用平台工程的力量，必须发生三个根本性的转变：对持续革新的承诺、拥抱人工智能和自动化的勇气，以及对开发者体验的无尽关注。这些原则将定义下一代高性能工程团队。
- en: 'Continuous reinvention: Staying ahead in a changing world'
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 持续革新：在变化的世界中保持领先
- en: The pace of technological change is accelerating, and what works today may not
    work tomorrow. High-performing organizations don’t just adapt—they continuously
    reinvent themselves. This means breaking free from rigid legacy systems, challenging
    outdated processes, and fostering a culture of relentless experimentation. The
    ability to reinvent is not just a choice but a necessity in today’s dynamic business
    environment.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 技术变革的速度正在加快，今天有效的方法可能明天就不再适用。表现优异的组织不仅适应变化，而且不断自我革新。这意味着摆脱僵化的遗留系统、挑战过时的流程，并培养一种不懈实验的文化。在今天的动态商业环境中，能够自我革新不仅仅是一个选择，更是一种必要性。
- en: Successful teams think beyond today’s solutions and build modular and scalable
    platforms designed for continuous evolution. They cultivate architectural flexibility,
    ensuring their platforms integrate new tools, accommodate emerging technologies,
    and scale effortlessly as business needs evolve.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的团队不仅思考今天的解决方案，还构建模块化和可扩展的平台，这些平台旨在持续进化。他们培养架构灵活性，确保其平台能够整合新工具，适应新兴技术，并在业务需求演变时轻松扩展。
- en: 'Organizations that invest in learning, challenge complacency, and create an
    environment where innovation thrives will define the future. The question is:
    Will you be one of them?'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习、挑战自满并创造一个创新蓬勃发展的环境方面进行投资的组织将定义未来。问题是：你将成为其中之一吗？
- en: 'AI and automation: The new imperative in Platform Engineering'
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能和自动化：平台工程的新趋势
- en: We are entering an AI-first era where automation is no longer a luxury but a
    business imperative. AI-driven observability, intelligent workflows, and self-healing
    systems will transform how platforms operate, allowing organizations to move from
    reactive maintenance to proactive innovation.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正进入一个以人工智能为先导的时代，自动化不再是奢侈品，而是商业的必要条件。由人工智能驱动的可观察性、智能工作流和自愈系统将改变平台运作的方式，使组织能够从被动维护转变为主动创新。
- en: This shift isn’t just about efficiency—it’s about unlocking human potential.
    Platform teams can focus on strategic innovation rather than routine maintenance
    by automating repetitive tasks, reducing toil, and embedding intelligence into
    infrastructure. The most successful organizations will be those that leverage
    AI to augment human expertise, not replace it, ensuring that human creativity
    and problem-solving skills remain at the forefront of Platform Engineering.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变不仅仅是关于效率，更是关于释放人类潜能。平台团队可以通过自动化重复性任务、减少繁琐工作和将智能嵌入基础设施，专注于战略创新而不是常规维护。最成功的组织将是那些利用人工智能来增强人类专业知识，而不是取代它，确保人类创造力和解决问题的技能在平台工程中始终处于前沿。
- en: To shape the future, organizations must prioritize investing in AI-driven automation
    today. It’s not an afterthought but a core pillar of their platform strategy.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 为了塑造未来，组织必须优先考虑今天投资于由人工智能驱动的自动化。这不仅仅是一个事后考虑，而是其平台战略的核心支柱。
- en: 'Developer experience: The key to sustainable innovation'
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开发者体验：可持续创新的关键
- en: The success of Platform Engineering is measured by its impact on developers.
    A frictionless, intuitive, and empowering developer experience is the key to accelerating
    software delivery, reducing cognitive load, and fostering innovation.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程的成功是以其对开发者的影响来衡量的。一个无摩擦、直观且赋权的开发者体验是加速软件交付、减少认知负荷和促进创新的关键。
- en: Organizations must rethink how they enable their engineers—shifting from rigid
    control to developer empowerment. IDPs, golden paths, and self-service automation
    will define the new standard for developer enablement.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 组织必须重新思考如何赋能他们的工程师——从刚性控制转向开发者赋能。IDP（集成开发平台）、黄金路径和自助自动化将定义开发者赋能的新标准。
- en: The future of Platform Engineering is not about controlling developers—it’s
    about unleashing them. Organizations prioritizing developer experience will see
    increased adoption, greater productivity, and faster innovation cycles. Those
    that don’t? They risk developer frustration and shadow IT and operational bottlenecks
    that will hinder progress.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程的未来不在于控制开发者，而在于释放他们的潜能。那些优先考虑开发者体验的组织将看到更高的采用率、更高的生产力和更快的创新周期。反之，那些不这么做的人可能会面临开发者挫败感、影子IT和运营瓶颈，这些都可能阻碍进步。
- en: The evolution of Platform Engineering is deeply intertwined with the changing
    nature of applications and how they are built, deployed, and maintained. Platforms
    must adapt to meet new demands as software architectures shift toward distributed,
    event-driven, and AI-enhanced models. The next frontier lies in creating adaptive,
    intelligent platforms that support modern application development and anticipate
    future needs.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程的演变与应用程序变化本质以及它们如何构建、部署和维护紧密相连。随着软件架构向分布式、事件驱动和人工智能增强模型转变，平台必须适应新的需求。下一个前沿在于创建自适应、智能的平台，这些平台支持现代应用程序开发并预测未来的需求。
- en: The evolution of platforms and applications
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平台和应用程序的演变
- en: The boundaries between platforms and applications are rapidly shifting, leading
    to a future where development environments are increasingly modular, flexible,
    and responsive. This transformation is exemplified by the rise of composable architectures,
    where platforms are built from interchangeable plug-and-play components. This
    shift toward modularity allows developers to create and deploy applications with
    unprecedented speed and precision, perfectly aligning with the dynamic demands
    of modern markets.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 平台和应用程序之间的界限正在迅速变化，引领着一个未来，其中开发环境将越来越模块化、灵活和响应。这种转型体现在可组合架构的兴起，其中平台由可互换的即插即用组件构建。这种向模块化的转变允许开发者以前所未有的速度和精度创建和部署应用程序，完美地与现代市场的动态需求相匹配。
- en: As platforms continue to evolve, they will increasingly blur the lines between
    infrastructure and software, creating systems that are not just cohesive but also
    adaptive. This is particularly evident in the rise of serverless architectures,
    which abstract the underlying infrastructure entirely, allowing developers to
    focus solely on application logic. Industry leaders such as AWS Lambda, Microsoft
    Azure Functions, and Google Cloud Functions are already showcasing the potential
    of serverless technologies to automatically scale applications in response to
    demand, reducing costs and improving efficiency. These advancements will drive
    the development of more sophisticated tools that empower developers to push the
    boundaries of what’s possible, ensuring that their applications meet—and exceed—the
    expectations of users and markets.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 随着平台继续演进，它们将越来越多地模糊基础设施和软件之间的界限，创造出既统一又自适应的系统。这一点在无服务器架构的兴起中尤为明显，它完全抽象了底层基础设施，使开发者能够专注于应用程序逻辑。像AWS
    Lambda、Microsoft Azure Functions和Google Cloud Functions这样的行业领导者已经展示了无服务器技术自动响应需求扩展应用程序的潜力，降低成本并提高效率。这些进步将推动更复杂工具的发展，使开发者能够突破可能的边界，确保他们的应用程序满足并超越用户和市场的期望。
- en: Emerging technologies such as quantum computing, edge computing, and 6G will
    further accelerate this evolution. These advancements will enable real-time processing
    and decision-making at the edge, reducing latency and enhancing user experiences.
    As platforms become more distributed and intelligent, they will support a wide
    range of applications, from smart cities to autonomous vehicles, driving transformative
    change across industries.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如量子计算、边缘计算和6G等新兴技术将进一步加速这一演变。这些进步将使边缘实现实时处理和决策，降低延迟并提升用户体验。随着平台变得更加分布化和智能化，它们将支持从智能城市到自动驾驶汽车等各种应用，推动整个行业的变革性变化。
- en: As the boundaries between platforms and applications continue to dissolve, the
    integration of emerging technologies will redefine how we develop, manage, and
    deploy solutions. By embracing these advancements and strategically positioning
    your organization at the forefront of this evolution, you ensure that your platforms
    are not only prepared for the future but are also driving innovation and delivering
    exceptional value. The choices you make today will determine your organization’s
    ability to lead tomorrow—now is the time to act decisively and shape the future.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 随着平台和应用程序之间的界限不断消融，新兴技术的整合将重新定义我们开发、管理和部署解决方案的方式。通过拥抱这些进步并战略性地将您的组织置于这一演变的尖端，您确保您的平台不仅为未来做好准备，而且还能推动创新并实现卓越的价值。您今天所做的选择将决定您组织明天领导的能力——现在是果断行动和塑造未来的时刻。
- en: Building the future starts now
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建设未来从现在开始
- en: The organizations that will lead in the coming years are not waiting for the
    future to arrive—they are actively shaping it. Platform Engineering is the bridge
    between technology and business success, and those who invest in continuous reinvention,
    AI-driven automation, and developer-centric platforms will define the next decade
    of software innovation. This is not just about survival but about thriving and
    leading in the digital age.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来几年中将引领的组织不是等待未来的到来，而是在积极塑造它。平台工程是技术和商业成功之间的桥梁，那些投资于持续创新、人工智能驱动的自动化和以开发者为中心的平台的人将定义下一个十年的软件创新。这不仅关乎生存，还关乎在数字时代繁荣和领导。
- en: The most forward-thinking companies are already laying the groundwork for intelligent,
    self-optimizing platforms, creating seamless developer experiences, and embedding
    AI into their operational fabric. They are not asking *if* but *how fast*. They
    understand that delaying innovation is just another way of falling behind.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 最具前瞻性的公司已经在为智能、自我优化的平台打下基础，创造无缝的开发者体验，并将人工智能嵌入到其运营结构中。他们不是在问“是否”，而是在问“多快”。他们明白，延迟创新只是落后于时代的另一种方式。
- en: But transformation doesn’t happen by accident. It requires bold leadership,
    strategic execution, and the willingness to challenge conventions. Organizations
    that fail to adapt will be left struggling with inefficiencies, technical debt,
    and frustrated developers, while those that embrace this shift will drive unparalleled
    agility, efficiency, and market leadership.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 但转型并非偶然发生。它需要大胆的领导力、战略执行力和挑战传统意愿。未能适应的组织将陷入效率低下、技术债务和沮丧的开发者之中，而那些拥抱这一转变的组织将推动无与伦比的敏捷性、效率和市场领导力。
- en: This is the inflection point. The convergence of AI, automation, and Platform
    Engineering has created an unprecedented opportunity to reimagine how technology
    fuels business success. Organizations that seize this moment will survive, thrive,
    innovate, and lead.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这是转折点。人工智能、自动化和平台工程的融合创造了前所未有的机会，重新思考技术如何推动商业成功。抓住这一时刻的组织将生存、繁荣、创新和领导。
- en: The question is not whether Platform Engineering will evolve but who will drive
    that evolution.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是平台工程是否会发展，而不是谁将推动这一发展。
- en: Will you be the one to lead?
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 你将成为那个领导者吗？
- en: Summary
  id: totrans-233
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: As we conclude our journey, it’s essential to recognize the comprehensive blueprint
    this book has provided—from the initial vision to the tangible reality of mastering
    Platform Engineering This book has equipped you with a comprehensive strategy,
    from vision to reality, guiding you through foundational principles to advanced
    capabilities, and providing a roadmap to build resilient, scalable, and high-impact
    Platform Engineering practices. The insights and strategies shared here are not
    just concepts but actionable imperatives. The future belongs to those taking decisive
    steps, leveraging Platform Engineering as a force multiplier, and driving meaningful
    transformation. The blueprint is in your hands. Now is the time to execute, innovate,
    and lead.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束旅程之际，认识到本书提供的全面蓝图至关重要——从最初的愿景到掌握平台工程的切实现实。本书为您提供了从愿景到现实的全面策略，引导您通过基础原则到高级能力，并提供了一条构建弹性、可扩展和具有高影响力的平台工程实践的路线图。这里分享的见解和策略不仅限于概念，而是可执行的要务。未来属于那些采取果断步骤、利用平台工程作为倍增器并推动有意义转型的人。蓝图就在您的手中。现在是执行、创新和领导的时候了。
- en: Key takeaways
  id: totrans-235
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: 'Here are the key takeaways from this book:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是本书的关键要点：
- en: '**Platform Engineering as a competitive advantage**: Beyond efficiency, Platform
    Engineering is a strategic enabler that drives agility, accelerates innovation,
    and enhances developer experience, positioning organizations for long-term market
    leadership.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平台工程作为竞争优势**：除了效率之外，平台工程是一种战略推动者，它推动敏捷性、加速创新并提升开发者体验，使组织能够长期保持市场领导地位。'
- en: '**AI-driven future**: Integrating AI into Platform Engineering is not optional—it
    is the defining force of the next generation of platforms. Organizations that
    leverage AI for automation, observability, and decision intelligence will outpace
    their competition.'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能驱动的未来**：将人工智能集成到平台工程中不是可选的——它是下一代平台的决定性力量。利用人工智能进行自动化、可观察性和决策智能的组织将超越其竞争对手。'
- en: '**Ecosystem thinking**: The most successful platform teams don’t just build
    tools; they cultivate ecosystems. By fostering collaboration, shared knowledge,
    and self-service enablement, they create a foundation for continuous growth and
    adaptability.'
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生态系统思维**：最成功的平台团队不仅构建工具，还培育生态系统。通过促进协作、共享知识和自助服务能力，他们为持续增长和适应性打下基础。'
- en: '**From vision to reality**: Platform Engineering is a transformation, not a
    project. The principles and strategies outlined in this book provide a roadmap
    to move from strategy to execution, ensuring sustained impact and enterprise-wide
    success.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从愿景到现实**：平台工程是一种转型，而非项目。本书中概述的原则和策略提供了一条从战略到执行的路线图，确保持续的影响和全企业范围内的成功。'
- en: Call to action
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 行动号召
- en: 'As you stand at the threshold of implementing the knowledge and insights gained
    from this book, we encourage you to take decisive steps toward transforming your
    organization. Here are actionable steps to guide you on this journey:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 当您站在将本书中获得的知识和见解付诸实践的前沿时，我们鼓励您采取果断措施，转型您的组织。以下是一些可操作的步骤，以指导您在这段旅程中前进：
- en: '**Adopt a Platform Engineering mindset**: Embrace the principles and strategies
    discussed in this book. Develop a cohesive plan that aligns with your business
    objectives and fosters a culture of continuous improvement.'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '**采纳平台工程思维**：接受本书中讨论的原则和策略。制定一个与您的业务目标一致并促进持续改进文化的整体计划。'
- en: '**Leverage advanced technologies**: Integrate AI, automation, and the platformless
    approach to enhance operational efficiency and drive innovation. Stay informed
    about emerging trends and adapt your strategies accordingly.'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '**利用先进技术**：整合人工智能、自动化和无平台方法，以提升运营效率并推动创新。关注新兴趋势，并相应调整您的策略。'
- en: '**Empower your teams**: Invest in training and development to equip your teams
    with the skills and knowledge needed to succeed. Foster a collaborative environment
    that encourages experimentation and learning.'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '**赋权您的团队**：投资于培训和开发，为您的团队提供成功所需的技能和知识。营造一个鼓励实验和学习协作的环境。'
- en: '**Measure and optimize**: Continuously monitor the performance of your platforms
    and make data-driven decisions to optimize processes. Use metrics to track progress
    and identify areas for improvement.'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: '**衡量和优化**：持续监控您平台的表现，并基于数据驱动决策来优化流程。使用指标跟踪进度并识别改进领域。'
- en: '**Stay agile and forward-thinking**: Maintain a forward-thinking mindset, always
    looking for ways to innovate and stay ahead of the competition. Embrace change
    and be willing to adapt to new challenges and opportunities.'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: '**保持敏捷和前瞻性思维**：保持前瞻性思维，始终寻找创新和保持领先于竞争对手的方法。拥抱变化，并愿意适应新的挑战和机遇。'
- en: The future of Platform Engineering holds immense potential for those willing
    to embrace it. By implementing the insights and strategies discussed in this book,
    you have the power to transform your organization, drive significant business
    value, and shape the future of technology. The journey may be challenging, but
    the rewards are substantial. As pioneers in Platform Engineering, you have the
    opportunity to lead the way, creating a more efficient, innovative, and successful
    future for your organization and the industry as a whole.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程的未来对愿意拥抱它的人来说具有巨大的潜力。通过实施本书中讨论的见解和策略，您有权改变您的组织，推动显著的商业价值，并塑造技术的未来。这条路可能充满挑战，但回报是巨大的。作为平台工程的先驱，您有机会引领潮流，为您的组织以及整个行业创造一个更高效、更具创新性和更成功的未来。
- en: Great Platform Engineering is more than technology—it’s about enabling people,
    accelerating innovation, and creating thriving ecosystems. The pioneers of this
    movement will not just react to change; they will define it. You have the tools,
    the knowledge, and the leadership potential to shape the future—one that is scalable,
    intelligent, and built for continuous evolution.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的平台工程不仅仅是技术——它是关于赋能人们、加速创新和创造繁荣生态系统的。这一运动的先驱们不仅会应对变化；他们将会定义它。您拥有工具、知识和领导潜力，可以塑造未来——一个可扩展、智能且为持续进化而构建的未来。
- en: The path ahead will require vision, resilience, and an unwavering commitment
    to excellence. Every step you take toward refining your platforms and embracing
    new technologies brings you closer to achieving enduring success. The knowledge
    you’ve gained from this book is a testament to your commitment to excellence.
    Now, it’s time to put that knowledge into action, drive transformation, and become
    a catalyst for change in the world of Platform Engineering.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 前方的道路将需要远见、韧性和对卓越的坚定不移的承诺。您每向前迈出一步，改进您的平台并拥抱新技术，都会让您更接近实现持久成功。您从本书中获得的知识是对您对卓越承诺的证明。现在，是时候将知识付诸实践，推动变革，成为平台工程世界变革的催化剂。
- en: Step forward with confidence, apply what you have learned, and take charge of
    redefining how platforms power the modern enterprise. The next chapter of Platform
    Engineering is yours to write—make it extraordinary!
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 带着自信迈出步伐，应用您所学到的知识，并负责重新定义平台如何为现代企业供电。平台工程的下一个篇章属于您——让它变得非凡！
