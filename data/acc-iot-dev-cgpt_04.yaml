  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: Wireless Connectivity, the Nervous Pathway to Delivering IoT Data
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 无线连接，物联网数据传输的神经通路
- en: In the architecture of IoT, wireless connectivity functions as a conduction
    subsystem, like the nervous pathways within the human body that transmit *biological
    electrical* signals (sensor data or actuator command) between neural cells (IoT
    end devices) and the brain (backend cloud platform).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在物联网架构中，无线连接功能作为一个传导子系统，类似于人体内的神经通路，传递*生物电*信号（传感器数据或执行器命令），在神经细胞（物联网终端设备）和大脑（后端云平台）之间传输。
- en: In this chapter, you will learn the fundamental knowledge points about wireless
    data communication that beginners should know when building their IoT innovations.
    This knowledge will provide you with a solid foundation to understand the intricacies
    of wireless data transmission, receiving, and signal processing.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习构建物联网创新时初学者应了解的无线数据通信的基本知识点。这些知识将为你理解无线数据传输、接收和信号处理的复杂性提供一个坚实的基础。
- en: By exploring the details of popular wireless technologies such as BLE, Wi-Fi,
    LTE-M, and NB-IOT in the domains of 4G/LTE and 5G, you will gain a comprehensive
    understanding of their capabilities and limitations.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 通过探索4G/LTE和5G领域内流行的无线技术（如BLE、Wi-Fi、LTE-M和NB-IoT）的细节，你将全面了解它们的性能和局限性。
- en: By the end of this chapter, you will have acquired a wealth of knowledge that
    will empower you to confidently navigate the realm of wireless data communication
    in the context of IoT innovation.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将获得丰富的知识，这将使你能够自信地导航物联网创新背景下的无线数据通信领域。
- en: In the engineering projects from [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302)
    onward, with the assistance of ChatGPT, you will practice Wi-Fi client stack coding
    on ESP32 MCU to access the internet through your home Wi-Fi network.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 从[*第11章*](B22002_11.xhtml#_idTextAnchor302)开始，在ChatGPT的帮助下，你将练习在ESP32微控制器上编写Wi-Fi客户端堆栈代码，通过你的家庭Wi-Fi网络访问互联网。
- en: 'This chapter covers the following topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: 10 knowledge points about wireless data communication
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无线数据通信的10个知识点
- en: BLE
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蓝牙（BLE）
- en: Wi-Fi
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Wi-Fi
- en: 4G/LTE and 5G
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 4G/LTE和5G
- en: 10 knowledge points about wireless data communication
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 无线数据通信的10个知识点
- en: In [*Chapter 2*](B22002_02.xhtml#_idTextAnchor047), we discussed diverse IoT
    networks covered by BLE, Wi-Fi, LoRaWAN, 4G/LTE, 5G, and LEO. They all fall under
    the domain of wireless data communication. Understanding how wireless data communication
    works from the Physical Layer in detail can be challenging and daunting, especially
    for people without a strong professional background.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第2章*](B22002_02.xhtml#_idTextAnchor047)中，我们讨论了由蓝牙、Wi-Fi、LoRaWAN、4G/LTE、5G和LEO覆盖的多种物联网网络。它们都属于无线数据通信的范畴。从物理层详细了解无线数据通信的工作方式可能具有挑战性和令人畏惧，尤其是对于那些没有强大专业背景的人来说。
- en: Nevertheless, for beginners who strive to apply their IoT innovation to business,
    it is necessary to spend time grasping the intricacies of the low layers of wireless
    technology, such as the Physical Layer and Data Link Layer. Knowing the basics
    of how wireless data communication works in the field can be helpful for your
    innovation development process and field pilot.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于努力将物联网创新应用于商业的初学者来说，花时间掌握无线技术底层（如物理层和数据链路层）的复杂性是必要的。了解无线数据通信在实地如何工作的基础知识，对你的创新开发过程和实地试点可能有所帮助。
- en: To assist you on this journey, we’ll cover 10 important technical facts about
    wireless data communication that beginners should be aware of. These facts will
    serve as a foundation for your understanding and enable you to delve deeper into
    the subject matter.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你在这一旅程中，我们将涵盖10个关于无线数据通信的初学者应了解的重要技术事实。这些事实将成为你理解的基础，并使你能够更深入地研究这一主题。
- en: OSI model
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OSI模型
- en: 'The architecture model of wireless data communication technology follows a
    widely accepted industry standard called the **Open Systems Interconnection**
    (**OSI**) model. OSI is a framework that’s used to understand and standardize
    the functions of a data communication system, regardless of whether it is wired
    or wireless. The OSI model was developed by the **International Organization for
    Standardization** (**ISO**) in the 1970s. It was designed to organize and streamline
    the different functions of data communication effectively. The OSI model divides
    the data communication end-to-end functions into seven layers, each with a specific
    purpose. The following table shows the seven-layer model and how each layer contributes
    to the data communication process:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 无线数据通信技术的架构模型遵循一个广泛接受的行业标准，称为**开放系统互联**（**OSI**）模型。OSI 是一个用于理解和标准化数据通信系统功能的框架，无论是有线还是无线。OSI
    模型是在 20 世纪 70 年代由**国际标准化组织**（**ISO**）开发的。它旨在有效地组织和简化数据通信的不同功能。OSI 模型将端到端的数据通信功能划分为七个层次，每个层次都有其特定的目的。下表显示了七层模型以及每一层如何对数据通信过程做出贡献：
- en: '| **Layers** | **Function Description** |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
  zh: '| **层** | **功能描述** |'
- en: '| --- | --- |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| 7, Application | Interacts with software applications that act as a data
    communicating component. It facilitates services such as email, file transfer,
    web browsing, instant messaging, voice and video telephony, and video streaming.
    |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
  zh: '| 7, 应用层 | 与充当数据通信组件的软件应用程序交互。它促进了电子邮件、文件传输、网页浏览、即时消息、语音和视频电话以及视频流等服务。|'
- en: '| 6, Presentation | Translates data between the format the network requires
    and the format the computer expects. It handles data encryption and decryption,
    as well as data compression, such as **Secure Sockets Layer** (**SSL**) encryption.
    |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
  zh: '| 6, 表示层 | 在网络所需的格式和计算机期望的格式之间转换数据。它处理数据加密和解密，以及数据压缩，例如**安全套接字层**（**SSL**）加密。|'
- en: '| 5, Session | Manages the sessions or connections between applications. It
    establishes, manages, and terminates connections between two or more devices.
    |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| 5, 会话层 | 管理应用程序之间的会话或连接。它建立、管理和终止两个或多个设备之间的连接。|'
- en: '| 4, Transport | Ensures complete data transfer and controls the reliability
    of a given link through flow control, segmentation/desegmentation, and error control,
    such as **Transmission Control Protocol** (**TCP**) and **User Datagram** **Protocol**
    (**UDP**). |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| 4, 传输层 | 确保完整的数据传输，并通过流量控制、分段/解分段和错误控制（如**传输控制协议**（**TCP**）和**用户数据报协议**（**UDP**））来控制给定链路的可靠性。|'
- en: '| 3, Network | Manages device addressing, tracks the location of devices on
    the network, and determines the best way to move data. It is responsible for routing
    and forwarding packets across network boundaries, such as **Internet Protocol**
    (**IP**) addresses. |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| 3, 网络 | 管理设备寻址，跟踪网络中设备的地理位置，并确定移动数据的最优方式。它负责在网络边界（如**互联网协议**（**IP**）地址）之间路由和转发数据包。|'
- en: '| 2, Data Link | Comprises two sublayers: **Logical Link Control** (**LLC**)
    and **Media Access Control** (**MAC**). It is responsible for node-to-node data
    transfer and error detection and correction in the physical layer, such as MAC
    addresses in Ethernet and Wi-Fi. |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| 2, 数据链路层 | 由两个子层组成：**逻辑链路控制**（**LLC**）和**媒体访问控制**（**MAC**）。它负责节点到节点的数据传输以及在物理层中进行错误检测和纠正，例如以太网和
    Wi-Fi 中的 MAC 地址。|'
- en: '| 1, Physical | Deals with the physical connection between devices and the
    transmission and reception of raw bit streams over a physical medium (such as
    cables, fiber optics, or wireless). |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| 1, 物理层 | 处理设备之间的物理连接以及通过物理介质（如电缆、光纤或无线）传输和接收原始比特流。|'
- en: Table 4.1 – The OSI model’s 7 layers
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4.1 – OSI 模型的 7 层
- en: It is important to understand that when it comes to different wireless communication
    technologies, there may not be a big difference between Layer 3 (Network) and
    Layer 7 (Application). However, it is worth noting that there can be significant
    differences in functionality and characteristics at Layer 1 (Physical) and Layer
    2 (Data Link). These differences at the lower layers can have a significant impact
    on the overall performance and efficiency of the wireless communication system.
    So, it is necessary to carefully analyze and evaluate Layer 1 and Layer 2 as they
    play a critical role in shaping the behavior and capabilities of the wireless
    network.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要理解，当涉及到不同的无线通信技术时，第3层（网络）和第7层（应用）之间可能没有太大的区别。然而，值得注意的是，在第1层（物理）和第2层（数据链路）的功能和特性上可能会有显著差异。这些低层的差异可以对无线通信系统的整体性能和效率产生重大影响。因此，有必要仔细分析和评估第1层和第2层，因为它们在塑造无线网络的行为和能力方面发挥着关键作用。
- en: Physical layer
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 物理层
- en: 'The physical layer is the most important in the OSI model, especially for wireless
    communication technologies such as BLE, Wi-Fi, and 4G/LTE. This layer is responsible
    for sending and receiving the raw bitstream over the physical medium, which is
    done using electromagnetic waves in wireless technologies. The transmission process
    involves a few key steps: converting digital bits into analog signals using DAC,
    preparing these signals for transmission through proper modulation, and sending
    them using the antenna. On the receiving side, these steps are done in reverse
    order: the antenna receives the electromagnetic waves or signals, which are then
    demodulated and converted back to digital signals using ADC. We’ll cover these
    in more detail in the *Signal* *processing* section.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 物理层在OSI模型中最为重要，尤其是在像BLE、Wi-Fi和4G/LTE这样的无线通信技术中。这一层负责在物理介质上发送和接收原始比特流，在无线技术中这通过电磁波完成。传输过程涉及几个关键步骤：使用DAC将数字比特转换为模拟信号，通过适当的调制准备这些信号以进行传输，并使用天线发送它们。在接收端，这些步骤以相反的顺序进行：天线接收电磁波或信号，然后通过解调并使用ADC将它们转换回数字信号。我们将在*信号处理*部分更详细地介绍这些内容。
- en: Data link layer
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据链路层
- en: 'The data link layer is an important part of the data communication process,
    especially in wireless networks. It is located above the physical layer in the
    OSI model. This layer has two sub-layers: the **Logical Link Control** (**LLC**)
    Layer and the **Media Access Control** (**MAC**) layer. Each sub-layer has specific
    functions to ensure effective and reliable communication. Some of the tasks it
    handles are error detection and correction, frame synchronization, and controlling
    access to the physical medium. In wireless communications, this layer also includes
    channel encoding/decoding and interleaving/de-interleaving, which are important
    for reliable data transmission and work closely with the physical layer.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 数据链路层是数据通信过程中的一个重要部分，尤其是在无线网络中。它在OSI模型中位于物理层之上。这一层包含两个子层：**逻辑链路控制**（**LLC**）层和**媒体访问控制**（**MAC**）层。每个子层都有特定的功能以确保有效和可靠的通信。它处理的一些任务包括错误检测和纠正、帧同步以及控制对物理介质的访问。在无线通信中，这一层还包括信道编码/解码和交织/解交织，这对于可靠的数据传输非常重要，并且与物理层紧密合作。
- en: The approach to medium access varies across different wireless technologies.
    For instance, Wi-Fi operates on a contention-based model, where clients compete
    with each other to access the spectrum for data transmission. This process is
    typically managed using protocols such as **Carrier-Sense Multiple Access with
    Collision Avoidance** (**CSMA/CA**). Conversely, in 4G/LTE networks, the access
    to the spectrum is more structured and is coordinated by the base station, known
    as the 4G/LTE eNodeB. In this scenario, the eNodeB allocates specific time and
    spectrum resources to each 4G/LTE client, facilitating organized and scheduled
    access to the spectrum for efficient data transmission.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 中介访问的方法在不同无线技术中各不相同。例如，Wi-Fi采用基于争用的模型，客户端之间相互竞争以访问用于数据传输的频谱。这个过程通常通过如**载波侦听多路访问与碰撞避免**（**CSMA/CA**）这样的协议进行管理。相反，在4G/LTE网络中，频谱的访问更加结构化，并由基站（称为4G/LTE
    eNodeB）进行协调。在这种情况下，eNodeB为每个4G/LTE客户端分配特定的时频资源，从而促进有组织和计划化的频谱访问，以实现高效的数据传输。
- en: Signal processing
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 信号处理
- en: The signal processing of wireless data communication is a complex and intricate
    process that involves numerous steps. Data transmission begins with encoding and
    modulating the information to be sent. This ensures that the data is converted
    into a suitable format for reliable wireless transmission. Next, the modulated
    signal is transmitted through the air using various techniques such as frequency
    hopping or spread spectrum. This helps ensure that the signal is robust and can
    withstand interference or noise. Once the signal reaches the receiver, it undergoes
    demodulation to extract the original information. Finally, the decoded data is
    processed and interpreted by the receiving device, allowing the recipient to access
    and utilize the transmitted information.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 无线数据通信的信号处理是一个复杂且错综的过程，涉及众多步骤。数据传输始于对要发送的信息进行编码和调制。这确保了数据被转换为适合可靠无线传输的格式。接下来，调制信号通过跳频或扩频等技术在空中传输。这有助于确保信号稳健，能够抵御干扰或噪声。一旦信号到达接收器，它就会进行解调以提取原始信息。最后，解码后的数据由接收设备处理和解释，使接收者能够访问和使用传输的信息。
- en: 'The following flow chart is a basic diagram representing the signal process
    for wireless data communication:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 以下流程图是表示无线数据通信信号处理的基本图：
- en: '![Figure 4.1 – Wireless data communication flow](img/B22002_04_01.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图4.1 – 无线数据通信流程](img/B22002_04_01.jpg)'
- en: Figure 4.1 – Wireless data communication flow
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1 – 无线数据通信流程
- en: Electromagnetic waves
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 电磁波
- en: According to Maxwell’s equations, wireless data is propagated in the form of
    electromagnetic waves in the air. Maxwell’s equations are the basis of classical
    electromagnetism, classical optics, and electric and magnetic circuits. These
    equations give a mathematical model for electric, optical, and radio technologies,
    such as power generation, electric motors, wireless communication, lenses, radar,
    and more. They explain how electric and magnetic fields are created by charges,
    currents, and changes in the fields.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 根据麦克斯韦方程，无线数据以电磁波的形式在空中传播。麦克斯韦方程是经典电磁学、经典光学和电磁电路的基础。这些方程为电力生成、电动机、无线通信、透镜、雷达等技术提供了数学模型。它们解释了电荷、电流和场的变化如何产生电场和磁场。
- en: 'Electromagnetic waves are formed by two oscillating fields: an electric field
    (E) and a magnetic field (B). The electric and magnetic fields oscillate in phase,
    meaning there is no phase shift between the waveforms of the electric and magnetic
    fields, so the peaks and troughs of these fields are perfectly aligned, resulting
    in synchronized oscillations. Secondly, the electric and magnetic fields are orthogonal
    to each other, as is their direction of propagation, forming 90° angles with one
    another.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 电磁波是由两个振荡场形成的：一个电场（E）和一个磁场（B）。电场和磁场是同相振荡的，这意味着电场和磁场波形之间没有相位差，因此这些场的峰值和谷值完美对齐，导致同步振荡。其次，电场和磁场彼此垂直，它们的传播方向也是如此，彼此形成90°的角度。
- en: 'The following is a 3D view of electromagnetic waves in the air:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对空中电磁波的3D视图：
- en: '![Figure 4.2 – Electromagnetic waves in the air](img/B22002_04_02.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图4.2 – 空中的电磁波](img/B22002_04_02.jpg)'
- en: Figure 4.2 – Electromagnetic waves in the air
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2 – 空中的电磁波
- en: It is important to know that acoustic waves and electromagnetic waves are different.
    Acoustic waves, also called sound waves, are created when particles vibrate in
    a medium such as air or water. Electromagnetic waves are made when electric and
    magnetic fields interact, and they do not need a medium to travel through.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要知道声波和电磁波是不同的。声波，也称为声波，是在空气或水等介质中的粒子振动时产生的。电磁波是在电场和磁场相互作用时产生的，并且它们不需要介质来传播。
- en: In our daily lives, sunlight consists of natural electromagnetic waves. Besides
    the commonly known wireless communication technologies, such as Wi-Fi, Bluetooth,
    and cellular networks, electromagnetic waves are also utilized in radio and TV
    broadcasting, microwave ovens, remote controls, GPS, military and civil radar
    systems, home illumination light, and medical X-rays, among other applications.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的日常生活中，阳光由自然电磁波组成。除了众所周知的无线通信技术，如Wi-Fi、蓝牙和蜂窝网络之外，电磁波还用于无线电和电视广播、微波炉、遥控器、GPS、军事和民用雷达系统、家用照明灯和医疗X射线等多种应用。
- en: Frequency and wavelength
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 频率和波长
- en: Frequency and wavelength play a vital role in determining how electromagnetic
    waves propagate and interact with the environment. Understanding the relationship
    between frequency and wavelength is essential for comprehending how wireless signals
    are transmitted, received, and manipulated.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 频率和波长在确定电磁波如何传播和与环境相互作用方面起着至关重要的作用。理解频率与波长之间的关系对于理解无线信号的传输、接收和处理至关重要。
- en: Frequency
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 频率
- en: Frequency is a unit that’s used to measure how often the same waves (regardless
    of electromagnetic waves or sound waves) are repeated within a given timeframe,
    typically expressed in cycles per second or **hertz** (**Hz**). The frequency
    of sound waves that people can hear spans from about 20 Hz to 20,000 Hz (20 kHz).
    The frequency that’s allowed for Wi-Fi is 2.4GHz, 5GHz, and 6GHz (Wi-Fi 6E).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 频率是一个单位，用于衡量在给定时间内相同波（无论电磁波还是声波）重复的频率，通常以每秒周期数或**赫兹**（**Hz**）表示。人耳能听到的声波频率范围大约是20
    Hz到20,000 Hz（20 kHz）。允许Wi-Fi使用的频率是2.4GHz、5GHz和6GHz（Wi-Fi 6E）。
- en: 'The following figure shows the frequency waveform of 2.4 GHz versus 5 GHz in
    a-1 nanosecond (**10^-9** seconds) period:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图显示了2.4 GHz与5 GHz在-1纳秒（**10^-9**秒）周期内的频率波形：
- en: '![Figure 4.3 – Frequency waveform of 2.4 GHz versus 5 GHz](img/B22002_04_03.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图4.3 – 2.4 GHz与5 GHz的频率波形](img/B22002_04_03.jpg)'
- en: Figure 4.3 – Frequency waveform of 2.4 GHz versus 5 GHz
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.3 – 2.4 GHz与5 GHz的频率波形
- en: Wavelength
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 波长
- en: 'Wavelength is the distance between successive peaks (or any identical points)
    in a wave, measured in **meters** (**m**). The relationship between frequency
    and wavelength in electromagnetic waves is inverse and governed by a simple equation:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 波长是波中连续峰值（或任何相同点）之间的距离，以**米**（**m**）为单位。电磁波中频率与波长的关系是反比的，并由一个简单的方程式控制：
- en: '**Speed of Light = Frequency ×** **Wavelength**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**光速 = 频率 × 波长**'
- en: Here, the speed of light (in a vacuum) is approximately 3 × 10 8 **meters per**
    **second** (**m/s**).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，光速（在真空中）大约是3 × 10^8 **米每秒**（**m/s**）。
- en: From this equation, you can see that as the frequency increases, the wavelength
    decreases, and vice versa. The higher the frequency of a wave, the shorter its
    wavelength.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个方程式中，你可以看出，随着频率的增加，波长减小，反之亦然。波的频率越高，其波长越短。
- en: For example, visible sunlight ranges from 400 to 700 **nanometers** (**nm**)
    in wavelength. In terms of frequency, this corresponds to about 430 **terahertz**
    (**THz**) to 750 THz. 5G **millimeter wave** (**mmWave**) in cellular networks
    refers to the frequency range of 24 GHz to 100 GHz, which corresponds to wavelengths
    between 1 mm and 10 mm.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可见光在波长上从400到700 **纳米**（**nm**）不等。从频率的角度来看，这相当于大约430 **太赫兹**（**THz**）到750
    THz。蜂窝网络中的5G **毫米波**（**mmWave**）指的是24 GHz到100 GHz的频率范围，对应的波长在1毫米到10毫米之间。
- en: 'The following is the wavelength chart showing 2.4 GHz versus 5GHz at 1 cycle:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的波长图表显示了2.4 GHz与5GHz在1周期时的对比：
- en: '![Figure 4.4 – Wavelength of 2.4 GHz versus 5 GHz](img/B22002_04_04.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图4.4 – 2.4 GHz与5 GHz的波长](img/B22002_04_04.jpg)'
- en: Figure 4.4 – Wavelength of 2.4 GHz versus 5 GHz
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.4 – 2.4 GHz与5 GHz的波长
- en: Frequency allocation
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 频率分配
- en: Typically, the frequency that’s managed by a country’s regulatory authority
    is allocated for various purposes, which include both military and civilian uses.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，一个国家的监管机构管理的频率分配用于各种目的，包括军事和民用。
- en: '**Military frequency**:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**军事频率**：'
- en: Frequencies allocated for military use are often designated for defense and
    national security purposes
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 军事用途分配的频率通常被指定用于国防和国家安全目的
- en: These may include military communication, navigation, radar, and other specialized
    military applications
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些可能包括军事通信、导航、雷达和其他专业军事应用
- en: The specific frequencies that are allocated for military use are usually not
    publicly disclosed for security reasons
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于安全原因，分配给军事用途的具体频率通常不会公开披露
- en: '**Civilian frequency**:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**民用频率**：'
- en: Civilian frequency refers to the frequencies allocated for non-military use.
    This broad category includes a variety of commercial, private, and public uses.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 民用频率是指分配给非军事用途的频率。这个广泛的类别包括各种商业、私人和国有用途。
- en: Examples include commercial broadcasting (radio and TV), cellular networks (such
    as 4G/LTE and 5G), Wi-Fi, satellite communication, emergency services, aviation
    communication, and more.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子包括商业广播（广播和电视）、蜂窝网络（如4G/LTE和5G）、Wi-Fi、卫星通信、紧急服务、航空通信等。
- en: The allocation of these frequencies is typically managed by a national regulatory
    body (such as the Federal Communications Commission in the United States) and
    is often made public.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些频率的分配通常由国家监管机构（如美国的联邦通信委员会）管理，并且通常公开。
- en: The wireless spectrum that’s used by IoT applications falls to the civil frequency.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 用于物联网应用的无线频谱属于民用频率。
- en: Spectrum regulation
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 频谱监管
- en: The electromagnetic wave spectrum in a country encompasses the full range of
    frequencies, from the lowest to the highest, that are allocated for all types
    of uses, including civil, military, scientific, and industrial applications. It
    includes all frequencies that are legally approved and regulated by national or
    regional authorities. For instance, The **International Telecommunication Union**
    (**ITU**) plays a crucial role in coordinating global spectrum allocation, which
    involves setting guidelines for assigning specific frequency bands for various
    terrestrial or space radio communication services to prevent international interference.
    In the United States, the **Federal Communications Commission** (**FCC**) regulates
    radio, television, wire, satellite, and cable communications. Similarly, the **European
    Telecommunications Standards Institute** (**ETSI**) is responsible for standardizing
    information and communications technologies in European countries.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一个国家的电磁波频谱涵盖了从最低到最高的所有频率范围，这些频率被分配给各种用途，包括民用、军事、科学和工业应用。它包括所有由国家或地区当局合法批准和监管的频率。例如，**国际电信联盟**（**ITU**）在协调全球频谱分配方面发挥着关键作用，这涉及到为各种地面或太空无线电通信服务分配特定频段的标准，以防止国际干扰。在美国，**联邦通信委员会**（**FCC**）负责监管无线电、电视、有线、卫星和有线电视通信。同样，**欧洲电信标准研究院**（**ETSI**）负责欧洲国家的信息和通信技术标准化。
- en: 'Within the civilian usage of the spectrum, there are typically two categories:
    **licensed spectrum** and **unlicensed spectrum**. Let’s take a closer look:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在频谱的民用使用中，通常有两种类别：**授权频谱**和**非授权频谱**。让我们更详细地了解一下：
- en: The **licensed spectrum** requires entities to obtain a license from the country
    or regional authority for usage. This spectrum is often designated for public
    and nationwide services such as cellular networks such as 4G/LTE and 5G, as well
    as broadcast radio and television, where reliable and interference-free communication
    is essential. Any device transmitting signal within the licensed spectrum must
    obtain the license from a country regulation authority, such as the FCC in the
    US.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**授权频谱**要求实体从国家或地区当局获得使用许可。这种频谱通常指定用于公共和全国性服务，例如蜂窝网络（如4G/LTE和5G）、广播无线电和电视，在这些服务中，可靠且无干扰的通信至关重要。任何在授权频谱内传输信号的设备都必须从国家监管机构，如美国的FCC，获得许可。'
- en: The **unlicensed spectrum** refers to radio frequencies that do not require
    a government license to use, but devices operating in these bands must still follow
    certain technical standards to minimize interference and make efficient use of
    the spectrum. The ISM band is a specific part of the unlicensed spectrum that
    was originally reserved for non-telecommunications purposes such as industrial,
    scientific, and medical uses. The ISM bands are now widely utilized by various
    wireless technologies, including Wi-Fi (at 2.4 GHz, 5 GHz, and 6 GHz), Bluetooth,
    ZigBee, and Thread (all at 2.4 GHz), as well as LoRaWAN and Wireless Hart (typically
    at 433 MHz, 868 MHz, and 915 MHz).
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非授权频谱**指的是不需要政府许可即可使用的无线电频率，但在此频段内运行的设备必须遵循某些技术标准，以最小化干扰并有效利用频谱。ISM频段是非授权频谱的一个特定部分，最初是为非电信目的而预留的，例如工业、科学和医疗用途。ISM频段现在被各种无线技术广泛使用，包括Wi-Fi（在2.4
    GHz、5 GHz和6 GHz）、蓝牙、ZigBee和Thread（所有在2.4 GHz），以及LoRaWAN和Wireless Hart（通常在433 MHz、868
    MHz和915 MHz）。'
- en: Spectrum bandwidth
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 频谱带宽
- en: The spectrum bandwidth refers to the width, or range, of frequencies that a
    communication channel or signal occupies in the electromagnetic spectrum. It is
    a fundamental concept in telecommunications and wireless communications, indicating
    the capacity of a channel to carry information.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 频谱带宽指的是通信信道或信号在电磁频谱中占据的频率宽度或范围。它是电信和无线通信中的一个基本概念，表明信道携带信息的能力。
- en: For instance, Wi-Fi that operates at the 2.4 GHz frequency covers a range of
    frequencies from 2.4 GHz to 2.4835 GHz. This range is also known as the total
    channel bandwidth and is approximately 83.5 MHz. Wi-Fi operating at the 5 GHz
    band covers a range from 5.150 GHz to 5.850 GHz, offering more than 600 MHz of
    spectrum bandwidth. Please note that the exact frequency boundaries can vary by
    region due to different regulatory environments.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，工作在2.4 GHz频率的Wi-Fi覆盖了从2.4 GHz到2.4835 GHz的频率范围。这个范围也被称为总信道带宽，大约为83.5 MHz。工作在5
    GHz频段的Wi-Fi覆盖范围从5.150 GHz到5.850 GHz，提供了超过600 MHz的频谱带宽。请注意，由于不同的监管环境，确切的频率界限可能因地区而异。
- en: Channel bandwidth
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信道带宽
- en: The channel bandwidth is the frequency range allocated to each communication
    channel, measured in Hz. It represents the difference between the highest and
    lowest frequencies within a channel. For instance, according to the **Institute
    of Electrical and Electronics Engineers** (**IEEE**) 802.11 b/g/n standards, Wi-Fi
    operating at 2.4 GHz band ranges from 2.4 GHz to 2.4835 GHz, which offers a total
    bandwidth of approximately 83.5 MHz. Within this spectrum, the standard defines
    11 overlapping channels (in most countries), each with a channel bandwidth of
    20 MHz.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 信道带宽是分配给每个通信信道的频率范围，以Hz为单位。它表示信道内最高频率和最低频率之间的差异。例如，根据**电气和电子工程师协会**（**IEEE**）802.11
    b/g/n标准，工作在2.4 GHz频段的Wi-Fi从2.4 GHz到2.4835 GHz，提供了大约83.5 MHz的总带宽。在此频谱内，标准定义了11个重叠的信道（在大多数国家），每个信道的带宽为20
    MHz。
- en: dB, dBm, and dBi
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: dB, dBm, 和 dBi
- en: '**Decibel** (**dB**), **decibel-milliwatts** (**dBm**), and **decibel-isotropic**
    (**dBi**) are essential power units in wireless communication, each serving a
    specific purpose. dB is used for relative power levels, dBm for absolute power
    levels, and dBi for antenna gain. A clear understanding of these terms is fundamental
    for professionals working with wireless systems and networks:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**分贝**（**dB**）、**分贝毫瓦**（**dBm**）和**分贝全向**（**dBi**）是无线通信中重要的功率单位，每个单位都服务于特定的目的。dB用于相对功率水平，dBm用于绝对功率水平，dBi用于天线增益。对这些术语的清晰理解对于从事无线系统和网络工作的专业人士至关重要：'
- en: '**dB**:'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**dB**：'
- en: '**Definition**: A relative unit of measurement expressing the ratio between
    two values. It is a logarithmic unit that’s used to describe a change in value
    (such as power or intensity).'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义**：表示两个值之间比率的相对度量单位。它是一个对数单位，用于描述值的变化（如功率或强度）。'
- en: '**Usage**: dB is used to represent gain, loss, and relative levels in signals.
    It is dimensionless since it describes a ratio.'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用法**：dB用于表示信号中的增益、损耗和相对水平。它是无单位的，因为它描述的是一个比率。'
- en: '**Example**: Saying an amplifier provides a gain of 10 dB means it increases
    the power level of the input signal by a factor corresponding to 10 dB.'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：说一个放大器提供10 dB的增益意味着它将输入信号的功率水平增加了与10 dB相对应的倍数。'
- en: '**dBm**:'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**dBm**：'
- en: '**Definition**: An absolute unit of power in decibels, referenced to 1 **milliwatt**
    (**mW**).'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义**：以1 **毫瓦**（**mW**）为参考的绝对功率分贝单位。'
- en: '**Usage**: dBm is used to define a power level on an absolute scale. It is
    widely used in wireless communications to express transmitter output power, receiver
    sensitivity, and more.'
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用法**：dBm用于定义一个绝对尺度上的功率水平。它在无线通信中被广泛用于表示发射机输出功率、接收机灵敏度等。'
- en: '**Example**: A power level of 0 dBm corresponds to 1 mW. A signal with a power
    level of -10 dBm is less powerful than one with 0 dBm.'
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：0 dBm的功率水平对应于1 mW。功率水平为-10 dBm的信号比功率水平为0 dBm的信号弱。'
- en: '**dBi**:'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**dBi**：'
- en: '**Definition**: A measure of antenna gain. It compares the power radiated by
    an antenna to the power radiated by a hypothetical isotropic antenna, which evenly
    distributes energy in all directions.'
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义**：天线增益的度量。它比较天线辐射的功率与一个假想的全向天线辐射的功率，该天线在所有方向上均匀分布能量。'
- en: '**Usage**: dBi is used to indicate how effectively an antenna can direct or
    focus energy in a particular direction compared to the isotropic antenna.'
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用法**：dBi用于表示天线相对于全向天线在特定方向上有效地定向或聚焦能量的程度。'
- en: '**Example**: An antenna with a gain of 3 dBi means it can focus the signal
    power 3 dB higher than an isotropic antenna in a particular direction.'
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：增益为3 dBi的天线意味着它可以在特定方向上比全向天线聚焦信号功率高3 dB。'
- en: 'Let’s look at the key differences:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看关键的区别：
- en: '**dB versus dBm**: dB is a relative measure (ratio) without reference to an
    absolute scale, whereas dBm is an absolute measure referenced to a specific power
    level (1 mW; when you say 0 dBm, it means the power level is equal to 1 mW).'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**dB与dBm的比较**: dB是一个没有参考绝对刻度的相对度量（比率），而dBm是一个相对于特定功率水平（1 mW；当你说0 dBm时，意味着功率水平等于1
    mW）的绝对度量。'
- en: '**dBm versus dBi**: dBm measures power levels, while dBi measures antenna gain.
    dBm is about the signal’s strength, and dBi is about how effectively an antenna
    can transmit or receive signals in a specific direction.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**dBm与dBi的比较**: dBm测量功率水平，而dBi测量天线增益。dBm关于信号的强度，而dBi关于天线在特定方向上传输或接收信号的有效性。'
- en: Transmission power
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传输功率
- en: Transmission power, often referred to as transmitter power or TX power, is a
    key concept in wireless communication. It refers to the amount of electrical power
    used by a radio transmitter when sending out a signal. Transmission power is typically
    measured in **watts** (**W**) or more commonly in mW, and sometimes it is represented
    in decibels relative to a milliwatt (dBm). For instance, a transmission power
    of 1 mW is equivalent to 0 dBm.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 传输功率，通常被称为发射机功率或TX功率，是无线通信中的一个关键概念。它指的是无线电发射机在发送信号时使用的电功率。传输功率通常以**瓦特**（**W**）或更常见地以mW来衡量，有时它以相对于毫瓦（dBm）的分贝表示。例如，1
    mW的传输功率相当于0 dBm。
- en: There are country or regional regulatory limits on how much power can be used
    for transmission in different wireless bands and applications. These limits are
    set by organizations such as the FCC in the United States and the ETSI in Europe
    to avoid interference with other wireless services and to minimize health risks
    associated with electromagnetic exposure.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在不同的无线频段和应用中，对传输功率的使用有国家或地区性的监管限制。这些限制由美国联邦通信委员会（FCC）和欧洲电信标准协会（ETSI）等组织设定，以避免与其他无线服务的干扰，并最小化与电磁暴露相关的健康风险。
- en: '**Effective Radiated Power** (**ERP**) and **Effective Isotropic Radiated Power**
    (**EIRP**) are important concepts in the field of wireless communication, particularly
    when discussing the power output or strength of a transmitter (TX power). Both
    terms describe the power level of a radio signal in terms of its effectiveness
    compared to a reference power. Let’s take a closer look:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**有效全向辐射功率**（**ERP**）和**有效全向辐射功率**（**EIRP**）是无线通信领域的重要概念，尤其是在讨论发射机（TX功率）的输出功率或强度时。这两个术语都是用相对于参考功率的有效性来描述无线电信号的功率水平。让我们更详细地看看：'
- en: '**ERP**:'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ERP**:'
- en: '**Definition**: ERP refers to the amount of power that a theoretical half-wave
    dipole antenna would need to emit to produce the same signal strength as the actual
    transmitting antenna in the direction of its highest gain'
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义**: ERP指的是一个理论上的半波偶极子天线为了产生与实际发射天线在其最高增益方向上相同的信号强度而需要发射的功率。'
- en: '**Calculation**: ERP is calculated based on the transmitter’s output power,
    the transmission line losses, and the gain of the antenna compared to a half-wave
    dipole antenna'
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算**: ERP是根据发射机的输出功率、传输线损耗以及与半波偶极子天线的增益来计算的。'
- en: ERP (dB) = TX Power (dBm) + Antenna Gain (dBi) − Line Losses (dB)
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ERP (dB) = 发射功率 (dBm) + 天线增益 (dBi) − 线路损耗 (dB)
- en: '**Usage**: ERP is commonly used in broadcasting and for VHF and UHF television
    antennas'
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用途**: ERP通常用于广播以及VHF和UHF电视天线'
- en: '**EIRP**:'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**EIRP**:'
- en: '**Definition**: EIRP is the equivalent power that an isotropic antenna (which
    radiates power uniformly in all directions) would emit to produce the same signal
    strength as the actual antenna in its strongest direction.'
  id: totrans-111
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义**: EIRP是指一个全向天线（在所有方向上均匀辐射功率）为了产生与实际天线在其最强方向上相同的信号强度而需要发射的等效功率。'
- en: '**Calculation**: EIRP is like ERP but uses an isotropic antenna as the reference.
    It considers the transmitter power, antenna gain relative to an isotropic radiator
    (dBi), and line losses.'
  id: totrans-112
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算**: EIRP类似于ERP，但使用全向天线作为参考。它考虑了发射机功率、相对于全向辐射器的天线增益（dBi）和线路损耗。'
- en: EIRP (dB) = TX Power (dBm) + Antenna Gain (dBi) − Line Losses (dB).
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: EIRP (dB) = 发射功率 (dBm) + 天线增益 (dBi) − 线路损耗 (dB)。
- en: '**Usage**: EIRP is widely used in the context of satellite communication and
    mobile cellular networks.'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用途**: EIRP在卫星通信和移动蜂窝网络环境中被广泛使用。'
- en: Signal strength and quality
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 信号强度和质量
- en: Signal strength and quality are critical factors in wireless technology. Understanding
    how signal strength is measured and its impact on wireless communication reliability
    and performance is essential, especially for beginners.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 信号强度和质量是无线技术中的关键因素。了解信号强度是如何测量的以及它对无线通信可靠性和性能的影响是至关重要的，尤其是对于初学者来说。
- en: '**Signal strength** refers to the power level of a wireless signal that’s received
    by a device from a source, such as a Wi-Fi access point. It is a direct measure
    of the power level of the received signal, without any specific reference to a
    scale or index:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**信号强度**是指设备从源（如Wi-Fi接入点）接收到的无线信号的功率水平。它是接收到的信号功率的直接度量，没有任何特定的参考尺度或指标：'
- en: '**Measurement**: This is typically quantified in dBm. Higher dBm values indicate
    a stronger signal.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测量**：这通常以dBm为单位量化。更高的dBm值表示更强的信号。'
- en: '**Impact on network performance**: A stronger signal usually translates to
    improved network performance, evidenced by higher data rates and more stable connections.
    Weak signals can lead to reduced data rates, connection instability, and a limited
    range.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对网络性能的影响**：更强的信号通常意味着网络性能的改善，这体现在更高的数据速率和更稳定的连接上。弱信号可能导致数据速率降低、连接不稳定和范围受限。'
- en: '**Signal quality**, distinct from signal strength, focuses on the clarity and
    integrity of the wireless signal. It encompasses two critical factors, the **Received
    Signal Strength Indicator** (**RSSI**) and the **Signal-to-Noise Ratio** (**SNR**),
    both of which are vital for the accurate reception and interpretation of data:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**信号质量**，与信号强度不同，关注无线信号的清晰度和完整性。它包括两个关键因素，即**接收信号强度指示器**（**RSSI**）和**信噪比**（**SNR**），这两者对于数据的准确接收和解释至关重要：'
- en: '**RSSI**: RSSI is an estimate of the signal strength that a wireless device
    receives from an access point. Though expressed in dBm, it is a relative index
    and not standardized, meaning its values can differ between devices. A higher
    RSSI value, closer to 0 dBm, typically indicates a stronger signal. For example,
    -50 dBm is considered a better signal strength than -100 dBm.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RSSI**: RSSI是指无线设备从接入点接收到的信号强度的估计值。虽然以dBm表示，但它是一个相对指标，并未标准化，这意味着其值可能在不同设备之间有所不同。更高的RSSI值，接近0
    dBm，通常表示更强的信号。例如，-50 dBm被认为比-100 dBm的信号强度更好。'
- en: '**SNR**: SNR is a crucial metric for assessing signal quality in wireless communications
    that measures the difference between the signal strength (*S*) and the level of
    background noise (*N*), typically expressed in dB. A higher SNR suggests a clearer
    signal concerning the noise, leading to better wireless performance. For instance,
    an SNR value of 25 dB or higher is usually indicative of a robust and reliable
    Wi-Fi connection. However, external interferences, such as from microwaves or
    other Wi-Fi networks, can negatively impact signal quality.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SNR**：SNR是评估无线通信中信号质量的关键指标，它衡量信号强度（*S*）与背景噪声水平（*N*）之间的差异，通常以dB表示。更高的SNR表明信号相对于噪声更清晰，从而带来更好的无线性能。例如，SNR值为25
    dB或更高的通常表明Wi-Fi连接稳健且可靠。然而，来自微波或其他Wi-Fi网络的外部干扰可能会对信号质量产生负面影响。'
- en: The basic formula for SNR in terms of power is SN R dB = S / N, where *S* is
    the signal power and *N* is the noise power. Both should be in the same units
    (for example, W or mW). While SNR is commonly expressed in dB, there are instances
    where you may need it as a plain ratio. In these cases, you can convert SN R db
    into SN R ratio by using the SN R ratio = 10 SNR dB _ 10  formula.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: SNR的功率基本公式为SNR dB = S / N，其中*S*是信号功率，*N*是噪声功率。两者应使用相同的单位（例如，W或mW）。虽然SNR通常以dB表示，但在某些情况下，您可能需要将其作为纯比率。在这些情况下，您可以使用SNR比率
    = 10^SNR dB / 10的公式将SNR dB转换为SNR比率。
- en: Shannon’s Law and theoretical channel capacity
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习与理论信道容量
- en: '**Shannon’s Law**, formulated by Claude Shannon, is a fundamental theorem in
    information theory that defines the maximum data rate (or channel capacity) that
    can be achieved over a communication channel under given conditions without error.
    It is crucial for understanding the limits of what can be transmitted over a channel,
    especially in wireless communication.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**Shannon’s Law**，由克劳德·香农提出，是信息论中的一个基本定理，它定义了在给定条件下，在通信信道上无误差地实现的最大数据速率（或信道容量）。它对于理解在信道上可以传输的内容的极限至关重要，尤其是在无线通信中。'
- en: 'Shannon’s Law is expressed in the following formula to calculate the maximum
    channel capacity:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习的公式如下，用于计算最大信道容量：
- en: C = B × log 2 (1 + SN R ratio)
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: C = B × log 2 (1 + SNR 比率)
- en: 'Here, we have the following:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们有以下内容：
- en: '*C* is the theoretical channel capacity (maximum error-free data speed in bits
    per second that can be handled by a communication channel, known as the maximum
    channel data rate)'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*C* 是理论信道容量（通信信道可以处理的每秒最大无误差数据速率，称为最大信道数据速率）'
- en: '*B* is the bandwidth of the channel (in hertz)'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*B* 是信道的带宽（以赫兹为单位）'
- en: S is the average signal power received over the bandwidth calculated in watts
    (or volts squared)
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: S 是在带宽内接收到的平均信号功率，以瓦特（或伏特平方）计算
- en: N is the average interference power or noise over the bandwidth calculated in
    watts (or volts squared)
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: N 是在瓦特（或伏特平方）中计算的带宽内平均干扰功率或噪声
- en: SNR is the **SNR** of the communication signal to the Gaussian noise interference
    depicted as the linear power ratio
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SNR 是通信信号相对于高斯噪声干扰的 SNR，表示为线性功率比
- en: Shannon’s Law implies that the data rate can be increased either by increasing
    the bandwidth of the channel or by improving the SNR. However, there is a theoretical
    limit to the data rate that can be achieved even with a remarkably high SNR.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 深圳定律表明，可以通过增加信道带宽或提高信噪比来增加数据速率。然而，即使信噪比非常高，数据速率也有理论上的极限。
- en: 'For instance, to assume a bandwidth of 20 MHz and an SNR of 30 dB for a Wi-Fi
    channel, the maximum channel capacity is calculated as follows:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设 Wi-Fi 信道具有 20 MHz 的带宽和 30 dB 的信噪比，最大信道容量计算如下：
- en: 'Convert 30 dB of SNR from dB to ratio: SN R ratio = 10 30 _ 10 = 1000'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 将 30 dB 的 SNR 从 dB 转换为比率：SNR 比率 = 10^(30/10) = 1000
- en: C = B × log 2 (1 + SN R ratio) = 20,000,000 * log 2 (1 + 1000) ≈ 200Mbps
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: C = B × log 2 (1 + SNR 比率) = 20,000,000 × log 2 (1 + 1000) ≈ 200Mbps
- en: This capacity indicates the theoretical upper limit of data transmission for
    a 20 MHz Wi-Fi channel, given the SNR at 30 dB.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 此容量表示在 30 dB 的信噪比下，20 MHz Wi-Fi 信道的数据传输的理论上限
- en: Modulation
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调制
- en: '**Modulation** is a basic process in wireless communication that changes a
    carrier wave to encode information so that it can be sent through the air. It
    is important for transmitting data effectively and efficiently over wireless channels.
    The specific technique that’s used depends on factors such as the needs of the
    application, the distance of the transmission, the data rate, and the conditions
    of the environment.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**调制**是无线通信中的基本过程，它将载波波改变以编码信息，使其可以通过空气发送。这对于在无线信道上有效地高效地传输数据非常重要。所使用的具体技术取决于应用的需求、传输距离、数据速率和环境条件等因素。'
- en: 'The following are the key functions of modulation in the wireless communication
    process:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在无线通信过程中的调制的关键功能：
- en: '**Digital and analog signals**: Modulation can be applied to both digital and
    analog signals. In digital modulation, a digital signal (such as binary data)
    modulates the carrier wave. In analog modulation, an analog signal (such as a
    voice or music) performs the modulation.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数字和模拟信号**：调制可以应用于数字和模拟信号。在数字调制中，数字信号（如二进制数据）调制载波波。在模拟调制中，模拟信号（如语音或音乐）执行调制。'
- en: '**Conversion process**: For digital signals, modulation often involves converting
    these signals into an analog format suitable for transmission over a radio frequency
    channel. This conversion is essential because electromagnetic waves transmitted
    through space are inherently analog.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转换过程**：对于数字信号，调制通常涉及将这些信号转换为适合通过射频信道传输的模拟格式。这种转换是必要的，因为通过空间传播的电磁波本质上是模拟的。'
- en: '**Carrier wave**: The carrier wave, typically a high-frequency sinusoidal wave,
    is modified as per the information signal. This modification can be in terms of
    amplitude, frequency, phase, or a combination of these aspects.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**载波波**：载波波，通常是高频正弦波，根据信息信号进行修改。这种修改可以是幅度、频率、相位或这些方面的组合。'
- en: '**Frequency allocation**: Modulation allows signals to be transmitted over
    specific frequency channels, allowing for multiple different transmissions to
    occur simultaneously in different frequency bands, thus efficiently utilizing
    the electromagnetic spectrum.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**频率分配**：调制允许信号在特定的频率信道中传输，使得可以在不同的频率带中同时进行多个不同的传输，从而有效地利用电磁频谱。'
- en: '**Environment adaptation**: Different modulation techniques offer varying degrees
    of resistance to interference and noise, making some more suitable than others
    for certain environments or transmission distances.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境适应**：不同的调制技术对干扰和噪声的抵抗程度不同，这使得某些技术在某些环境或传输距离下比其他技术更适合。'
- en: 'Analog modulation schemes are used to transmit analog information, such as
    audio or video signals, using a carrier wave of a certain frequency. In analog
    modulation, some aspect of the carrier wave is varied as per the analog signal’s
    amplitude, frequency, or phase:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟调制方案用于使用特定频率的载波波传输模拟信息，如音频或视频信号。在模拟调制中，载波波的一些方面会根据模拟信号的幅度、频率或相位进行变化：
- en: '**Amplitude modulation** (**AM**): This modulation scheme changes the strength
    of the carrier signal based on the message signal. AM is used in AM radio broadcasting,
    aviation radio, and earlier television broadcasting systems.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幅度调制**（**AM**）：这种调制方案根据消息信号改变载波信号的强度。AM用于调幅广播、航空无线电和早期的电视广播系统。'
- en: '**Frequency modulation** (**FM**): This modulation scheme changes the frequency
    of the carrier signal in response to the message signal. FM is widely used for
    FM radio broadcasting and has a higher resistance to noise and interference compared
    to AM.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**频率调制**（**FM**）：这种调制方案根据消息信号改变载波信号的频率。FM在调频广播中得到了广泛的应用，并且与AM相比，对噪声和干扰的抵抗能力更强。'
- en: '**Phase modulation** (**PM**): This scheme changes the phase of the carrier
    signal according to the message signal.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相位调制**（**PM**）：这种方案根据消息信号改变载波信号的相位。'
- en: 'Digital modulation schemes are methods that are used in communication systems
    to transmit digital information using a carrier wave. Unlike analog modulation,
    which transmits analog signals, digital modulation encodes digital data into the
    carrier wave. Some examples of popular modulation schemes are provided here:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 数字调制方案是通信系统中用于使用载波波传输数字信息的方法。与传输模拟信号的模拟调制不同，数字调制将数字数据编码到载波波中。以下是一些流行的调制方案的示例：
- en: '**Gaussian Frequency Shift Keying** (**GFSK**) is a modulation scheme that
    uses a Gaussian filter to shape the frequency spectrum of the transmitted signal.
    GFSK modulates data by varying the frequency of the carrier wave. The Gaussian
    filter reduces bandwidth and interference. GFSK is widely used in BLE and low-power
    radio frequency applications.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高斯频率移键控**（**GFSK**）是一种调制方案，它使用高斯滤波器来塑造传输信号的频率谱。GFSK通过改变载波波的频率来调制数据。高斯滤波器可以减少带宽和干扰。GFSK在蓝牙低功耗和射频应用中得到了广泛的应用。'
- en: '**Phase Shift Keying** (**PSK**) is an important modulation scheme that uses
    different phase angles to represent symbols. PSK encodes data by changing the
    phase of the carrier signal. It has various levels, such as **Binary PSK** (**BPSK**),
    **Quadrature PSK** (**QPSK**), or higher-order PSK (for example, 8-PSK), depending
    on how many bits are encoded per symbol. The higher the PSK level, the higher
    the data rate, but also the higher the noise sensitivity and the lower the power
    efficiency. PSK is commonly used in Wi-Fi, RFID, Bluetooth Classic, and satellite
    communications.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相移键控**（**PSK**）是一种重要的调制方案，它使用不同的相位角度来表示符号。PSK通过改变载波信号的相位来编码数据。它有各种级别，例如**二进制PSK**（**BPSK**）、**正交PSK**（**QPSK**）或更高阶的PSK（例如，8-PSK），这取决于每个符号编码的位数。PSK的级别越高，数据速率越高，但噪声敏感性也越高，功率效率越低。PSK常用于Wi-Fi、RFID、蓝牙经典和卫星通信。'
- en: '**Quadrature Amplitude Modulation** (**QAM**) is an advanced modulation technique
    that combines amplitude and phase modulation. It enables higher data rate transmission
    and is widely used in digital communication systems. QAM combines amplitude modulation
    with phase shift keying, allowing for increased information per symbol. QAM can
    have diverse levels, such as 16-QAM, 64-QAM, and 256-QAM or higher, depending
    on how many bits are encoded per symbol. The higher the QAM level, the higher
    the data rate, but also the higher the noise sensitivity and the lower the power
    efficiency. QAM is simple to implement and has good spectral efficiency, but it
    is vulnerable to fading and nonlinear distortion.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正交幅度调制**（**QAM**）是一种高级调制技术，它结合了幅度调制和相位调制。它能够实现更高的数据速率传输，并且在数字通信系统中得到广泛应用。QAM将幅度调制与相移键控相结合，允许每个符号携带更多的信息。QAM可以有多种级别，如16-QAM、64-QAM、256-QAM或更高，这取决于每个符号编码的位数。QAM级别越高，数据速率越高，但噪声敏感性也越高，功率效率越低。QAM易于实现，具有良好的频谱效率，但容易受到衰落和非线性失真的影响。'
- en: '**Orthogonal Frequency-Division Multiplexing** (**OFDM**) is a frequency multiplexing
    technique that divides the whole available bandwidth into smaller chunks for efficient
    data transmission. It splits the total spectrum into many narrow subcarriers,
    each with a different frequency and not interfering with each other. OFDM can
    use any modulation scheme, such as QAM or PSK, on each subcarrier, depending on
    the channel conditions and the data rate required. This means these subcarriers
    can be modulated independently using different modulation schemes by QAM or PSK.
    OFDM has several advantages, including high efficiency, resistance to signal fading,
    and adaptability to different channels. OFDM with QAM is widely used in Wi-Fi
    5, 6, and 7, 4G/LTE, and 5G.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正交频分复用**（**OFDM**）是一种频分复用技术，它将整个可用带宽分成更小的块，以实现高效的数据传输。它将总频谱分成许多窄的子载波，每个子载波具有不同的频率，并且不会相互干扰。OFDM可以在每个子载波上使用任何调制方案，如QAM或PSK，这取决于信道条件和所需的数据速率。这意味着这些子载波可以通过QAM或PSK独立调制，使用不同的调制方案。OFDM具有多个优点，包括高效率、抗信号衰落和适应不同信道的能力。使用QAM的OFDM在Wi-Fi
    5、6、7，4G/LTE和5G中得到广泛应用。'
- en: Antenna technology
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 天线技术
- en: Antennas play a pivotal role in wireless communication systems, serving as the
    interface between devices and the airwaves. They convert electrical signals into
    electromagnetic waves for transmission and vice versa for reception. Understanding
    the fundamentals of antenna operation and design is crucial, especially for those
    new to wireless technology.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 天线在无线通信系统中扮演着关键角色，作为设备和无线电波之间的接口。它们将电信号转换为电磁波进行传输，反之亦然，用于接收。理解天线操作和设计的基本原理至关重要，尤其是对于无线技术新手来说。
- en: 'The following are the basic functions of antennas:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是天线的基本功能：
- en: '**Converting signals**: Antennas are designed to efficiently convert electrical
    signals into electromagnetic waves and back. This involves electromagnetic radiation
    and reception.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转换信号**：天线被设计成高效地将电信号转换为电磁波，反之亦然。这涉及到电磁辐射和接收。'
- en: '**Resonance**: Most antennas are resonant devices, which means they naturally
    oscillate at specific frequencies. The size and shape of an antenna typically
    determine its resonant frequencies.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**谐振**：大多数天线都是谐振装置，这意味着它们会在特定频率下自然振荡。天线的尺寸和形状通常决定了其谐振频率。'
- en: '**Polarization**: This refers to the orientation of the electric field of the
    radiated wave. Antennas can be polarized vertically, horizontally, or circularly.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**极化**：这指的是辐射波的电场方向。天线可以是垂直极化、水平极化或圆极化。'
- en: '**Gain**: Antenna gain is a measure of how well the antenna directs or concentrates
    the signal in a particular direction. Higher gain antennas can transmit and receive
    signals more effectively at greater distances but usually have narrower coverage
    areas.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增益**：天线增益是衡量天线在特定方向上如何有效地引导或集中信号的一个指标。高增益天线可以在更远的距离上更有效地发送和接收信号，但通常覆盖范围较窄。'
- en: 'Let’s look at different types of antennas and their use cases:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看不同类型的天线及其应用场景：
- en: '**Patch antennas**: Patch antennas are compact antennas that are commonly used
    in IoT end devices, mobile phones, and wireless routers. These antennas are highly
    regarded for their low profile, which allows them to be easily mounted on flat
    surfaces. In addition, patch antennas offer excellent performance in terms of
    signal reception and transmission. Their compact size also makes them ideal for
    applications where space is limited.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贴片天线**: 贴片天线是紧凑型天线，常用于物联网终端设备、移动电话和无线路由器。这些天线因其低矮的轮廓而备受推崇，这使得它们可以轻松地安装在平坦的表面上。此外，贴片天线在信号接收和传输方面表现出色。它们紧凑的尺寸也使它们成为空间有限的应用的理想选择。'
- en: '**Panel antennas**: They are designed to transmit and receive signals in a
    specific direction, offering increased signal strength and coverage. Panel antennas
    consist of multiple antenna elements arranged in a panel-like structure, allowing
    for focused and efficient signal transmission. These antennas are often used in
    applications such as point-to-point communication, wireless backhaul, and outdoor
    wireless networks.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**面板天线**: 它们设计用于在特定方向传输和接收信号，提供增强的信号强度和覆盖范围。面板天线由多个天线单元组成，排列成类似面板的结构，允许集中和高效的信号传输。这些天线常用于点对点通信、无线回程和户外无线网络等应用。'
- en: '**Omnidirectional antennas**: These antennas are designed to radiate and receive
    signals in all horizontal directions, providing a wide coverage area. They are
    commonly used in various applications, including home Wi-Fi routers and base stations
    for cellular networks. With their ability to transmit and receive signals in all
    directions, omnidirectional antennas ensure a reliable and consistent signal strength
    throughout the coverage area, making them an ideal choice for situations where
    signal coverage needs to be extended in all directions.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全向天线**: 这些天线设计用于在所有水平方向辐射和接收信号，提供广泛的覆盖区域。它们在多种应用中都很常见，包括家用Wi-Fi路由器和蜂窝网络基站。由于它们能够在所有方向上传输和接收信号，全向天线确保在整个覆盖区域内信号强度可靠且一致，使它们成为需要向所有方向扩展信号覆盖的理想选择。'
- en: '**Dipole antennas**: The simplest form of antenna, they consist of two conductive
    elements. They are used in various applications, from FM radios to more complex
    systems.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偶极天线**: 这是天线最简单的形式，由两个导电元件组成。它们用于从FM收音机到更复杂的系统等各种应用。'
- en: '**Yagi-Uda antennas**: These are directional antennas that are known for their
    high gain. They are commonly used in television reception and point-to-point communication
    links.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**八木-宇达天线**: 这些是高增益的定向天线，常用于电视接收和点对点通信链路。'
- en: '**Dish antennas**: These dish-shaped antennas, also known as parabolic antennas,
    are highly directional antennas with high gain. Used for satellite communication
    and radio telescopes.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**抛物面天线**: 这些呈碟形的天线，也称为抛物面天线，是高度定向且增益高的天线。用于卫星通信和射电望远镜。'
- en: 'The following factors will influence which antenna you choose:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 以下因素将影响您选择哪种天线：
- en: '**Frequency of operation**: Different antennas are optimized for different
    frequency bands'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作频率**: 不同的天线针对不同的频段进行了优化'
- en: '**Directionality**: Whether the application requires directional or omnidirectional
    coverage'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**方向性**: 应用是否需要定向或全向覆盖'
- en: '**Physical size and form factor**: Constraints based on the device or system
    the antenna is being integrated into'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**物理尺寸和形状因素**: 基于天线将被集成到其中的设备或系统的限制'
- en: '**Environment**: Indoor, outdoor, urban, or rural environments can all influence
    the type of antenna used'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境**: 室内、室外、城市或乡村环境都可能影响所使用的天线类型'
- en: Propagation distance
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 传播距离
- en: 'Propagation distance in wireless communication is a measure of how far a signal
    can travel from its source while maintaining effectiveness and reliability. It
    is a crucial aspect to consider in the design and deployment of wireless systems
    as several factors can affect how a signal propagates through space. Let’s take
    a closer look:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 无线通信中的传播距离是指信号从其源头传播多远仍能保持有效性和可靠性。在设计部署无线系统时，这是一个需要考虑的关键方面，因为多个因素会影响信号如何在空间中传播。让我们更详细地看看：
- en: '**Transmitter power**: The strength of the signal at its source significantly
    impacts how far it can travel, but maximum transmitter power is limited by country
    regulations.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发射功率**: 信号在其源头的强度显著影响其可以传播的距离，但最大发射功率受国家法规限制。'
- en: '**Receiver sensitivity**: The ability of the receiver to detect the minimum
    level of a signal is key to determining the maximum distance. It specifies the
    characteristics of the wireless chipset from each vendor.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接收灵敏度**：接收器检测信号最小水平的能力是确定最大距离的关键。它指定了每个供应商的无线芯片组的特点。'
- en: '**Antenna types**: Both the transmitting and receiving antennas’ gain, type,
    and orientation play a role in signal propagation.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**天线类型**：发射和接收天线的增益、类型和方向在信号传播中发挥作用。'
- en: '**Frequency of the signal**: Higher frequency signals tend to have shorter
    propagation distances due to increased attenuation, especially by obstacles.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信号的频率**：由于衰减增加，尤其是障碍物的影响，高频信号往往具有较短的传播距离。'
- en: '**Environmental conditions**: Physical barriers, atmospheric conditions, and
    interference from other sources can degrade signal strength over distance.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境条件**：物理障碍物、大气条件和来自其他来源的干扰可能会随着距离的增加而降低信号强度。'
- en: Link budget
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 链路预算
- en: In wireless communication systems, we use the link budget to evaluate the distance
    the signal can travel. It accounts for all the gains and losses in the system,
    such as transmitter power, antenna gains, path loss, and obstacles.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在无线通信系统中，我们使用链路预算来评估信号可以传播的距离。它考虑了系统中的所有增益和损耗，例如发射器功率、天线增益、路径损耗和障碍物。
- en: 'The link budget has two parts: the **uplink budget** for transmitting data
    from the user device to the access point, and the **downlink budget** for transmitting
    data from the access point to the user device. Both budgets limit the actual distance
    the signal can travel.'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 链路预算分为两部分：用于从用户设备向接入点传输数据的**上行链路预算**，以及用于从接入点向用户设备传输数据的**下行链路预算**。这两个预算都限制了信号实际可以传播的距离。
- en: 'The uplink budget (in dBm) can be calculated by the following formula:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 上行链路预算（以dBm为单位）可以通过以下公式计算：
- en: Uplink Budget = P TX, Up + G TX, Up − L TX, Up − L Pathloss, Up − L RX, Up +
    G RX, Up
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 上行链路预算 = P TX, Up + G TX, Up − L TX, Up − L Pathloss, Up − L RX, Up + G RX,
    Up
- en: 'Here, we have the following:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们有以下内容：
- en: P TX, Up is the transmitter power of the user device (in dBm)
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P TX, Up 是用户设备的发射功率（以dBm为单位）
- en: G TX, Up is the transmitter antenna gain of the user device (in dBi)
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: G TX, Up 是用户设备的发射天线增益（以dBi为单位）
- en: L TX, Up is the losses in the transmitting system (such as cable loss, connector
    loss, etc.) of the user device (in dB)
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: L TX, Up 是用户设备的发射系统（如电缆损耗、连接器损耗等）中的损耗（以dB为单位）
- en: L Pathloss, Up is the path loss for the uplink (in dB)
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: L Pathloss, Up 是上行链路的路径损耗（以dB为单位）
- en: L RX, Up is the losses in the receiving system (such as cable loss, connector
    loss, and more) of the access point or base station (in dB)
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: L RX, Up 是接入点或基站（如电缆损耗、连接器损耗等）的接收系统中的损耗（以dB为单位）
- en: G RX, Up is the receiver antenna gain of the access point or base station (in
    dBi)
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: G RX, Up 是接入点或基站的接收天线增益（以dBi为单位）
- en: 'The downlink budget (in dBm) can be calculated by the following formula:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 下行链路预算（以dBm为单位）可以通过以下公式计算：
- en: Downlink Budget = P TX, Down + G TX, Down − L TX, Down − L Pathloss, Down −
    L RX, Down + G RX, Down
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 下行链路预算 = P TX, Down + G TX, Down − L TX, Down − L Pathloss, Down − L RX, Down
    + G RX, Down
- en: 'Here, we have the following:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们有以下内容：
- en: P TX, Down is the transmitter power of the access point or base station (in
    dBm)
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P TX, Down 是接入点或基站的发射功率（以dBm为单位）
- en: G TX, Down is the transmitter antenna gain of the access point or base station
    (in dBi)
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: G TX, Down 是接入点或基站的发射天线增益（以dBi为单位）
- en: L TX, Down is the losses in the transmitting system (such as cable loss, connector
    loss, and so on) of the access point or base station (in dB)
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: L TX, Down 是接入点或基站的发射系统（如电缆损耗、连接器损耗等）中的损耗（以dB为单位）
- en: L Pathloss, Down is the path loss for the downlink (in dB)
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: L Pathloss, Down 是下行链路的路径损耗（以dB为单位）
- en: L RX, Down is the losses in the receiving system (such as cable loss, connector
    loss, and so on) of the user device (in dB)
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: L RX, Down 是用户设备的接收系统（如电缆损耗、连接器损耗等）中的损耗（以dB为单位）
- en: G RX, Down is the receiver antenna gain of the user device (in dBi)
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: G RX, Down 是用户设备的接收天线增益（以dBi为单位）
- en: Comparing the link budget with receiver sensitivity
  id: totrans-203
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将链路预算与接收灵敏度进行比较
- en: Incorporating receiver sensitivity into the link budget equation is important
    when determining if a communication link will work reliably. Receiver sensitivity
    is the minimum signal strength needed for the receiver to understand the signal.
    It is important to compare the link budget with the receiver sensitivity. If the
    link budget is equal to or greater than the receiver sensitivity, the link is
    viable. In other words, the received signal strength must be equal to or greater
    than the receiver’s sensitivity for reliable communication.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 在确定通信链路是否能够可靠工作时，将接收灵敏度纳入链路预算方程是很重要的。接收灵敏度是接收器理解信号所需的最小信号强度。将链路预算与接收灵敏度进行比较很重要。如果链路预算等于或大于接收灵敏度，则链路是可行的。换句话说，接收到的信号强度必须等于或大于接收器的灵敏度，才能保证可靠的通信。
- en: For example, if the downlink budget is -65 dBm and the user device’s wireless
    chipset claims its receiver sensitivity is -90 dBm, the downlink is considered
    feasible.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果下行链路预算为-65 dBm，而用户设备的无线芯片组声称其接收灵敏度为-90 dBm，则下行链路被认为是可行的。
- en: By now, you should have a basic understanding of the fundamental aspects of
    wireless data communications. These are significantly important for the success
    of IoT applications in actual field deployment.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，你应该已经对无线数据通信的基本方面有了基本的了解。这些对于物联网在实际现场部署中的成功至关重要。
- en: In the following sections, we will apply this knowledge to popular wireless
    technologies such as BLE, Wi-Fi, LTE-M, and NB-IoT in the context of 4G/LTE and
    5G cellular technologies.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下章节中，我们将将这些知识应用于4G/LTE和5G蜂窝技术背景下流行的无线技术，如BLE、Wi-Fi、LTE-M和NB-IoT。
- en: BLE
  id: totrans-208
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: BLE
- en: The concepts of Bluetooth, Bluetooth Classic, and BLE are often misunderstood
    and confused by beginners. It is important to understand these concepts to fully
    grasp the capabilities and functionalities of Bluetooth technology.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝牙、蓝牙经典和BLE的概念常常被初学者误解和混淆。理解这些概念对于全面掌握蓝牙技术的功能和特性至关重要。
- en: '**Bluetooth** is a wireless technology that allows devices to communicate and
    transfer data over short distances. It has become widely popular and is used in
    various applications, such as connecting smartphones to wireless headsets or transferring
    files between devices.'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '**蓝牙**是一种无线技术，允许设备在短距离内进行通信和数据传输。它已经变得非常流行，并被用于各种应用，例如将智能手机连接到无线耳机或在不同设备之间传输文件。'
- en: '**Bluetooth Classic**, also known as Bluetooth **Basic Rate/Enhanced Data Rate**
    (**BR/EDR**), is the original version of Bluetooth technology. It is commonly
    used for audio streaming, file transfer, and other applications that require a
    continuous and steady connection. Bluetooth Classic provides a higher data transfer
    rate but consumes more power compared to BLE.'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: '**蓝牙经典**，也称为蓝牙**基本速率/增强数据速率**（**BR/EDR**），是蓝牙技术的原始版本。它通常用于音频流媒体、文件传输和其他需要持续稳定连接的应用。与BLE相比，蓝牙经典提供更高的数据传输速率，但功耗更大。'
- en: BLE is a power-efficient version of Bluetooth technology. It was introduced
    to address the growing demand for devices with low power consumption, such as
    fitness trackers, smartwatches, and other IoT devices. BLE is designed for short
    bursts of data transmission, making it ideal for applications that require intermittent
    communication and long battery life.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: BLE是蓝牙技术的节能版本。它被引入以应对对低功耗设备（如健身追踪器、智能手表和其他物联网设备）日益增长的需求。BLE设计用于短时间的数据传输，使其非常适合需要间歇性通信和长电池寿命的应用。
- en: 'BLE has emerged as the most widely adopted wireless technology in IoT applications,
    particularly in the domains of smart home and personal wearables. BLE has become
    a ubiquitous technology that’s embedded in billions of devices today, from smartphones
    and computers to IoT devices and medical equipment. Such significant success stems
    from its user-friendly connectivity experience for end users, as well as the benefits
    it provides to IoT innovation developers: low cost, low power consumption, long-range,
    easy integration, and low effort to quickly deploy in home and individual usage
    scenarios. With the rapid growth of IoT, BLE has become an indispensable component,
    enabling massive power-consumption-sensitive IoT devices to communicate and interact
    with the cloud.'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝牙低功耗（BLE）已成为物联网应用中最广泛采用的无线技术，尤其是在智能家居和个人可穿戴设备领域。BLE已成为今天数亿设备中普遍存在的技术，从智能手机和电脑到物联网设备和医疗设备。这种显著的成功源于它为最终用户提供的用户友好的连接体验，以及它为物联网创新开发者提供的益处：低成本、低功耗、长距离、易于集成、以及在家和个体使用场景中快速部署的低成本。随着物联网的快速增长，BLE已成为一个不可或缺的组成部分，使大量功耗敏感的物联网设备能够与云进行通信和交互。
- en: History and current status
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 历史及现状
- en: The history of Bluetooth technology is quite fascinating and is marked by collaboration,
    innovation, and the drive to create a universal wireless communication standard.
    Bluetooth is named after a 10th-century Scandinavian king, Harald “Bluetooth”
    Gormsson, who is known for uniting Danish tribes into a single kingdom. The name
    was intended to reflect the technology’s ability to unite communication protocols.
    The development of Bluetooth technology began in 1994 by Ericsson, a Swedish telecommunications
    company. The aim was to develop a wireless alternative to RS-232 data cables.
    In 1998, five companies – Ericsson, Nokia, IBM, Toshiba, and Intel – formed the
    Bluetooth **Special Interest Group** (**SIG**), a not-for-profit organization
    to oversee the development of Bluetooth standards and licensing of Bluetooth technologies.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝牙技术的历史非常迷人，其特点是合作、创新和推动创建通用无线通信标准的动力。蓝牙是以10世纪斯堪的纳维亚国王哈拉尔“蓝牙”戈姆松的名字命名的，他因将丹麦部落联合成一个单一王国而闻名。这个名字旨在反映该技术统一通信协议的能力。蓝牙技术的发展始于1994年，由瑞典电信公司爱立信开始。目标是开发一种无线替代RS-232数据电缆。1998年，五家公司——爱立信、诺基亚、IBM、东芝和英特尔——成立了蓝牙**特别兴趣小组**（**SIG**），这是一个非营利组织，负责监督蓝牙标准的开发和蓝牙技术的许可。
- en: Bluetooth 1.0 to 3.0 – the age of Bluetooth Classic
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 蓝牙1.0至3.0——蓝牙经典时代
- en: 'The initial Bluetooth specification (version 1.0 and 1.0B) was published in
    1999\. It utilized *GFSK* as its modulation scheme. GFSK employed a shifting carrier
    between two frequencies to represent 1s and 0s. This resulted in a data rate of
    Bluetooth 1.0 limited to 1 Mbps and a range of up to 10 meters. When Bluetooth
    2.0 was released in 2004, GFSK was replaced by two newer modulation schemes: π/4
    DQPSK and 8DPSK. These schemes used changes in the phase of the waveforms to transmit
    information instead of frequency modulation. As a result, the data rate of Bluetooth
    achieved 2 Mbps and 3 Mbps, respectively. Bluetooth 3.0, which came out in 2009,
    improved the data rate to 24 Mbps by adding support for IEEE 802.11\. This release
    was a significant milestone for Bluetooth as it paved the way for major technological
    advancements in wireless data communication, providing reliable and high-speed
    connections for short-range wireless solutions.'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝牙最初的规范（版本1.0和1.0B）于1999年发布。它使用*GFSK*作为其调制方案。GFSK通过在两个频率之间切换载波来表示1s和0s。这导致蓝牙1.0的数据速率限制在1
    Mbps，范围可达10米。当2004年发布蓝牙2.0时，GFSK被两种较新的调制方案所取代：π/4 DQPSK和8DPSK。这些方案使用波形相位的改变来传输信息，而不是频率调制。因此，蓝牙的数据速率分别达到2
    Mbps和3 Mbps。2009年发布的蓝牙3.0通过添加对IEEE 802.11的支持，将数据速率提高到24 Mbps。这次发布是蓝牙的一个重要里程碑，因为它为无线数据通信的重大技术进步铺平了道路，为短距离无线解决方案提供了可靠的高速连接。
- en: 'However, at that moment, one major issue prevented Bluetooth from being widely
    used in IoT: power consumption. Bluetooth 1.0 to 3.0, also called **Bluetooth
    Classic**, were not energy-efficient, causing IoT devices to quickly drain their
    batteries. This made them impractical for power-consumption-sensitive IoT applications.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在那个时刻，一个主要问题阻止了蓝牙在物联网中的广泛应用：功耗。蓝牙1.0至3.0，也称为**蓝牙经典**，并不节能，导致物联网设备快速耗尽电池。这使得它们在功耗敏感的物联网应用中不切实际。
- en: Bluetooth 4.0 to 5.3 and beyond – the era of BLE
  id: totrans-219
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 蓝牙4.0至5.3及以后——BLE的时代
- en: To meet the growing demand for low-power consumption IoT devices, Bluetooth
    4.0 introduced a new type of Bluetooth called BLE in 2010\. BLE in Bluetooth 4.0
    operates at a lower data rate of 1 Mbps using the GFSK modulation scheme. While
    this data rate may not be suitable for products such as wireless speakers or video
    streaming, which require a consistently high data rate, it benefits IoT applications
    that only need to send small bursts of data at regular intervals or on demand.
    For example, a fitness wearable device transmits your heart rate to your smartphone
    through a mobile app every few minutes. By prioritizing low energy usage, BLE
    enables many IoT applications to be powered by coin-cell batteries for weeks or
    even months. This makes them practical and efficient.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 为了满足对低功耗物联网设备的日益增长的需求，蓝牙4.0在2010年引入了一种名为BLE的新蓝牙类型。蓝牙4.0中的BLE以1 Mbps的较低数据速率运行，使用GFSK调制方案。虽然这种数据速率可能不适合无线扬声器或视频流媒体等需要持续高数据率的产品，但它对仅需要定期或按需发送小数据包的物联网应用有益。例如，一个健身可穿戴设备每隔几分钟通过移动应用将你的心率传输到你的智能手机。通过优先考虑低能耗，BLE使得许多物联网应用能够由纽扣电池供电数周甚至数月。这使得它们既实用又高效。
- en: 'The release of Bluetooth 5.0 in 2016 marked a significant improvement over
    the previous BLE standards. Bluetooth 5.0 introduced different PHYs as below and
    data rates to meet the varying requirements of IoT applications:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 2016年发布的蓝牙5.0在之前的BLE标准上实现了显著改进。蓝牙5.0引入了以下不同的PHY和数据速率，以满足物联网应用的多样化需求：
- en: '**Standard PHY**: This continued the 1 Mbps data rate from Bluetooth 4.0, balancing
    speed with power efficiency for standard BLE applications.'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Standard PHY**：这继续了蓝牙4.0的1 Mbps数据速率，在速度和功耗效率之间取得平衡，适用于标准BLE应用。'
- en: '**LE Coded PHY**: This offers a new PHY option for 125 kbps and 500 kbps, specifically
    designed for long-range communication with potential extended distances of up
    to 200 meters under optimal conditions. BLE with LE Coded PHY in Bluetooth 5.0
    was called **BLE Long** **Range** (*BLE-LR*).'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LE Coded PHY**：这为125 kbps和500 kbps提供了新的PHY选项，专门设计用于长距离通信，在最佳条件下可能扩展到200米的距离。蓝牙5.0中带有LE
    Coded PHY的BLE被称为**BLE Long Range** (*BLE-LR*)。'
- en: In 2020, Bluetooth 5.2 was published, introducing a new PHY known as **LE 2M
    PHY**. This new PHY supports the 2 Mbps data rate. It doubled the data rate compared
    to the original BLE standard while maintaining low power consumption, which is
    beneficial for applications requiring both efficiency and speed.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年，发布了蓝牙5.2，引入了一种名为**LE 2M PHY**的新PHY。这种新PHY支持2 Mbps的数据速率。与原始BLE标准相比，数据速率翻倍，同时保持低功耗，这对需要效率和速度的应用有益。
- en: While Bluetooth 5.2 brought enhancements to BLE, including improvements to the
    LE Coded PHY, which could potentially increase range, the claim of over 400 meters
    might be theoretical. In practical use, such ranges are often not achievable due
    to factors such as environmental interference, physical obstructions, and the
    capabilities of specific Bluetooth hardware.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然蓝牙5.2对BLE进行了增强，包括对LE Coded PHY的改进，这可能有助于增加范围，但超过400米的说法可能是理论上的。在实际使用中，由于环境干扰、物理障碍和特定蓝牙硬件的能力等因素，这样的范围往往难以实现。
- en: Bluetooth 5.3, released in 2022, introduced several enhancements aimed at improving
    the performance, efficiency, and reliability of Bluetooth devices. While it did
    not introduce major changes like previous versions, it focused on refining existing
    features.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年发布的蓝牙5.3引入了旨在提高蓝牙设备性能、效率和可靠性的多项增强功能。虽然它没有像之前版本那样引入重大变化，但它专注于改进现有功能。
- en: Standard organization
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 标准组织
- en: Bluetooth technology is regulated by global standards created and maintained
    by the Bluetooth SIG. The Bluetooth SIG is an organization that oversees the development
    of Bluetooth standards and licenses Bluetooth technologies and trademarks to manufacturers.
    The Bluetooth SIG also offers certification programs for products to ensure they
    meet the required standards for quality and compatibility. In addition to complying
    with Bluetooth SIG standards, Bluetooth devices must also adhere to regional and
    international regulations regarding wireless communication, such as those set
    by the FCC in the United States or ETSI in Europe.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝牙技术受全球标准的监管，这些标准由蓝牙SIG创建和维护。蓝牙SIG是一个监督蓝牙标准发展并授权制造商使用蓝牙技术和商标的组织。蓝牙SIG还提供产品认证计划，以确保产品符合质量兼容性的要求标准。除了遵守蓝牙SIG标准外，蓝牙设备还必须遵守有关无线通信的区域和国际法规，例如美国联邦通信委员会（FCC）或欧洲电信标准协会（ETSI）设定的法规。
- en: In 2000, to create a formal standard recognized by the broader engineering community,
    the IEEE adopted and standardized the Bluetooth protocol as IEEE 802.15.1\. IEEE
    802.15.1 provides the protocol and layers definition for Bluetooth, covering aspects
    from the **Physical Layer** (**PHY**) up to the link layer. It was aimed at ensuring
    interoperability and defining the technical specifications for Bluetooth wireless
    technology, particularly for short-range wireless communication.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 2000年，为了创建一个被更广泛的工程界认可的正式标准，IEEE采用了并标准化了蓝牙协议，作为IEEE 802.15.1。IEEE 802.15.1为蓝牙提供了协议和层定义，涵盖了从**物理层**（**PHY**）到链路层的各个方面。其目的是确保互操作性并定义蓝牙无线技术的技术规范，特别是针对短距离无线通信。
- en: Ecosystem players
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生态系统参与者
- en: 'Bluetooth SIG consists of over 35,000 member companies in telecommunications,
    computing, networking, and consumer electronics. The widespread adoption of these
    standards has led to a vast ecosystem of Bluetooth-enabled devices. In addition
    to enormous chipset manufacturers, the Bluetooth ecosystem includes players, contributors,
    and developers from various domains:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝牙SIG由超过35,000家来自电信、计算、网络和消费电子领域的会员公司组成。这些标准的广泛应用导致了大量蓝牙设备生态系统的形成。除了庞大的芯片制造商外，蓝牙生态系统还包括来自各个领域的参与者、贡献者和开发者：
- en: Consumer electronics
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 消费电子产品
- en: Healthcare devices
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医疗设备
- en: Smart home
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能家居
- en: Smart building
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能建筑
- en: Location services
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定位服务
- en: Logistic applications
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物流应用
- en: Car infotainment
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 车载娱乐系统
- en: 'The following table outlines the various specifications:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格概述了各种规格：
