  id: totrans-318
  prefs: []
  type: TYPE_TB
  zh: '| 频谱扩散 | DSSS | DSSS | DSSS |'
- en: '| Subcarrier spacing | 312.5 KHz | 78.125 KHz | 78.125 KHz |'
  id: totrans-319
  prefs: []
  type: TYPE_TB
  zh: '| 子载波间隔 | 312.5 KHz | 78.125 KHz | 78.125 KHz |'
- en: '| Modulation scheme | OFDM + 256-QAM | OFDMA + 1024-QAM | OFDMA + 4096-QAM
