  id: totrans-240
  prefs: []
  type: TYPE_TB
  zh: '| **规格** | **BLE** | **蓝牙经典** |'
- en: '| --- | --- | --- |'
  id: totrans-241
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
