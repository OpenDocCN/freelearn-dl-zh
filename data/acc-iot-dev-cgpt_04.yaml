  id: totrans-242
  prefs: []
  type: TYPE_TB
  zh: '| 频段 | 2.4GHz ISM频段，范围从2.402 – 2.480 GHz | 2.4GHz ISM频段，范围从2.402 – 2.480 GHz
    |'
