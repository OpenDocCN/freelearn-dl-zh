  id: totrans-247
  prefs: []
  type: TYPE_TB
  zh: '| 调制方案 | GFSK | GFSK、π/4 DQPSK、8DPSK |'
- en: '| Data rate | LE 2M PHY: 2 Mb/sLE 1M PHY: 1 Mb/sLE Coded PHY (S=2): 500 Kb/sLE
    Coded PHY (S=8): 125 Kb/s | EDR PHY (8DPSK): 3 Mb/sEDR PHY (π/4 DQPSK): 2 Mb/sBR
    PHY (GFSK): 1 Mb/s |'
  id: totrans-248
  prefs: []
  type: TYPE_TB
  zh: '| 数据速率 | LE 2M PHY：2 Mb/sLE 1M PHY：1 Mb/sLE编码PHY（S=2）：500 Kb/sLE编码PHY（S=8）：125
    Kb/s | EDR PHY（8DPSK）：3 Mb/sEDR PHY（π/4 DQPSK）：2 Mb/sBR PHY（GFSK）：1 Mb/s |'
