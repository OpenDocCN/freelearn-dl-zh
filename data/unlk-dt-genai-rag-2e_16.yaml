- en: Ontology-Based Knowledge Engineering for Graphs
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于本体的图知识工程
- en: Knowledge engineering forms the foundation of effective agentic RAG systems.
    In [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284), we introduced you to
    agents, but in their most basic form. In this chapter, we explore how ontologies,
    which are formal representations of domain knowledge, provide the semantic backbone
    that enables AI agents to have more advanced reasoning with precision and clarity.
    Unlike traditional retrieval methods that rely solely on vector similarity or
    keyword matching, ontology-based approaches give your agents an explicit understanding
    of concepts, relationships, and constraints within their domain.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 知识工程是有效智能体 RAG 系统的基础。在 [*第 12 章*](B34736_12_ePub.xhtml#_idTextAnchor284) 中，我们向您介绍了智能体，但它们是最基本的形式。在本章中，我们探讨本体如何作为领域知识的正式表示，提供语义骨干，使
    AI 智能体能够以精确和清晰的方式进行更高级别的推理。与仅依赖于向量相似性或关键词匹配的传统检索方法不同，基于本体的方法使您的智能体对其领域中的概念、关系和约束有明确的理解。
- en: In this chapter, we’ll implement a financial ontology using **Protégé**, the
    industry-standard tool for ontology development. This hands-on approach will demonstrate
    how to transform domain expertise into machine-readable knowledge structures that
    support sophisticated reasoning capabilities.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将使用 **Protégé**（行业标准的本体开发工具）实现一个金融本体。这种实践方法将展示如何将领域专业知识转化为支持复杂推理能力的机器可读知识结构。
