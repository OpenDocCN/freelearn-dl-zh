- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: Modernization Using AI
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用人工智能进行现代化
- en: In today’s rapidly evolving digital landscape, businesses face a critical inflection
    point, a moment when they can either maintain the status quo or redefine what’s
    possible. For organizations worldwide, this inflection point centers on the modernization
    of legacy systems that have become both essential to operations and increasingly
    difficult to maintain. According to recent studies, 80–90% of application modernization
    projects fail, highlighting the enormous challenges organizations face when attempting
    to update their critical systems [1,2].
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天快速发展的数字环境中，企业面临着关键的转折点，这是一个他们可以维持现状或重新定义可能性的时刻。对于全球的组织来说，这个转折点集中在现代化那些已经成为运营关键且越来越难以维护的遗留系统上。根据最近的研究，80-90%的应用现代化项目失败，突显了组织在尝试更新其关键系统时所面临的巨大挑战
    [1,2]。
- en: This chapter explores how AI is transforming the modernization landscape, offering
    new approaches to overcome traditional barriers and accelerate the journey to
    modern, flexible, and scalable systems.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了人工智能如何改变现代化格局，提供了新的方法来克服传统障碍并加速通往现代、灵活和可扩展系统的旅程。
- en: 'By the end of this chapter, you will understand the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将了解以下内容：
- en: The fundamental challenges that cause most modernization projects to fail
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导致大多数现代化项目失败的根本挑战
- en: Why traditional approaches to modernization are increasingly unsustainable
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么传统的现代化方法越来越不可持续
- en: How AI can accelerate specific aspects of the modernization process
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能如何加速现代化进程的特定方面
- en: The limitations of AI and where human expertise remains essential
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能的限制以及人类专业知识仍然至关重要的地方
- en: The role of modern data platforms, such as MongoDB, in successful modernization
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现代数据平台（如MongoDB）在成功现代化中的作用
- en: Practical approaches to implementing a repeatable modernization approach with
    AI
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用人工智能实施可重复现代化方法的实用方法
- en: How testing strategies can be enhanced with AI to reduce modernization risk
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何通过人工智能增强测试策略以降低现代化风险
- en: Real-world results from a leading private bank’s successful transformation
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自领先私人银行成功转型的实际成果
- en: The modernization challenge
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 现代化挑战
- en: Businesses worldwide are struggling to modernize their outdated software. They
    face pressure to cut operational expenses, accelerate the delivery of new features,
    integrate AI, and meet security and compliance standards. The emergence of AI,
    particularly GenAI, has created renewed enthusiasm for tackling these modernization
    challenges.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 全球企业都在努力现代化其过时的软件。他们面临着削减运营成本、加速新功能的交付、集成人工智能以及满足安全和合规标准的压力。人工智能（尤其是生成式人工智能）的出现，为解决这些现代化挑战重新激发了热情。
- en: 'However, getting there isn’t easy. Some of the key obstacles to application
    modernization include the following:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，达到这一目标并不容易。应用现代化过程中的一些关键障碍包括以下内容：
- en: '**Extended timelines and cost overruns**: Large-scale application rewrites
    are notoriously difficult to estimate accurately. They often stretch project timelines
    and budgets to unsustainable levels, creating financial strain and eroding organizational
    support. What begins as an 18-month project frequently extends to three years
    or more, with costs far exceeding initial expectations.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延长的时间表和成本超支**：大规模应用程序的重写通常难以准确估计。它们往往将项目的时间表和预算延长到不可持续的水平，造成财务压力并削弱组织支持。最初18个月的项目经常延长到三年或更长时间，成本远超初始预期。'
- en: '**Leadership turnover and loss of momentum**: The prolonged nature of modernization
    projects can be subject to leadership changes, with initial champions of the rewrite
    moving on. This leaves new management to inherit an expensive, ongoing, and often
    poorly understood endeavor, which can erode confidence and lead to project abandonment.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领导层更迭和动力的丧失**：现代化项目的长期性质可能会受到领导层变化的影响，最初的改革倡导者可能会离开。这导致新的管理层继承一个昂贵、持续进行且通常理解不足的项目，这可能会削弱信心并导致项目放弃。'
- en: '**The moving target phenomenon**: While the new system is being built, the
    legacy system continues to evolve. New features are added and bugs are fixed in
    the old code. The rewrite team must constantly play catch-up, trying to achieve
    feature parity with a moving target. This parallel development effectively doubles
    their workload, making it nearly impossible for the new system ever truly to replace
    the old one.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**移动目标现象**：当新系统正在构建时，旧系统仍在不断进化。在旧代码中添加新功能和修复错误。重写团队必须不断追赶，试图与移动目标实现功能对等。这种并行开发实际上将他们的工作量翻倍，使得新系统真正取代旧系统变得几乎不可能。'
- en: '**Undocumented complexities and the second-system effect**: Legacy systems
    often contain years of accumulated business logic, undocumented edge cases, and
    *features* that were originally bugs. A complete rewrite risks losing this critical
    institutional knowledge. Furthermore, developers may fall prey to the *second-system
    effect*, overdesigning the new system with excessive features and an overly generalized
    architecture, adding unnecessary complexity and delaying completion. As one study
    on mainframe application rewrites found, “*9 in 10 rewrite projects don’t succeed
    on their initial attempt*,” with reasons including complex integration and inadequate
    tools [3].'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未记录的复杂性和第二系统效应**：旧系统通常包含多年的累积业务逻辑、未记录的边缘情况和最初是错误的*功能*。完全重写可能会丢失这种关键的组织知识。此外，开发者可能会成为*第二系统效应*的受害者，过度设计新系统，添加过多的功能和过于通用的架构，增加不必要的复杂性并延迟完成。正如一项关于大型机应用程序重写的研究发现，“*10个重写项目中只有1个在初次尝试中成功*”，原因包括复杂的集成和工具不足
    [3]。'
- en: '*Figure 5.1* illustrates the vicious cycle many organizations face when attempting
    to modernize legacy systems. It shows how extended timelines lead to leadership
    changes, which cause shifting requirements and scope creep, ultimately resulting
    in project delays or failure. The cycle highlights why traditional approaches
    to modernization often fall short and why new AI-assisted methodologies are needed
    to break this pattern. Ultimately, these combined factors create a high probability
    of failure for large-scale rewrites, leading to significant financial losses and
    a reluctance within organizations to undertake similar modernization efforts in
    the future.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.1*展示了许多组织在尝试现代化旧系统时面临的恶性循环。它显示了延长的时间表如何导致领导层变化，进而导致需求变化和范围蔓延，最终导致项目延迟或失败。这个循环突出了为什么传统的现代化方法往往不足，以及为什么需要新的AI辅助方法来打破这种模式。最终，这些综合因素为大规模重写创造了很高的失败概率，导致重大经济损失，并使组织在未来不愿进行类似的现代化努力。'
- en: '![](img/B34136_05_01.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_05_01.png)'
- en: 'Figure 5.1: Vicious cycle when attempting legacy system modernization'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1：尝试旧系统现代化时的恶性循环
- en: MongoDB has developed a comprehensive approach to *modernization* that encompasses
    skilled engineers, comprehensive AI-powered tooling, and processes forged from
    the experience of working with many customers worldwide. Many of these customers
    talk about an ideal scenario that would involve an AI system autonomously managing
    the entire modernization lifecycle, from environment creation and code refactoring
    to testing and production migration. However, this level of automation remains
    a distant aspiration.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB已经开发了一种全面的现代化方法，包括熟练的工程师、全面的AI工具，以及从与世界各地许多客户合作的经验中提炼出的流程。许多客户谈论了一个理想的场景，即涉及一个AI系统自主管理整个现代化生命周期，从环境创建和代码重构到测试和生产迁移。然而，这种自动化程度仍然是一个遥远的愿望。
- en: Motivations for modernization
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现代化的动机
- en: 'Despite the challenges, organizations continue to pursue modernization initiatives
    because the cost of inaction outweighs the risk of change. Understanding these
    motivations provides important context for how AI can help address the underlying
    needs. There are two primary motivations behind modernization for most organizations:
    the fear of falling behind the competition due to a lack of agility caused by
    brittle, inflexible legacy systems, and the growing pressure and investment to
    just keep the lights on with old business-critical systems.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在挑战，但组织仍然继续追求现代化倡议，因为不采取行动的成本超过了改变的风险。了解这些动机为AI如何帮助解决潜在需求提供了重要背景。大多数组织现代化背后的两个主要动机是：由于脆弱、不灵活的旧系统导致的缺乏敏捷性而落后于竞争的恐惧，以及保持旧业务关键系统的运行所面临的日益增长的压力和投资。
- en: 'Business imperatives: Competitive pressure and innovation'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业必要性：竞争压力和创新
- en: Organizations don’t modernize their technology stack simply because it’s aging;
    they do so because legacy systems increasingly constrain business objectives.
    Modern digital infrastructure enables companies to pivot quickly as markets shift
    and customer expectations evolve. When competitors can launch new features in
    days rather than months, modernization becomes a strategic imperative, not a technical
    preference.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 组织不是简单地因为技术老化而进行技术栈的现代化；他们这样做是因为传统系统越来越多地限制了业务目标。现代数字基础设施使公司能够快速适应市场变化和客户期望的变化。当竞争对手可以在几天内而不是几个月内推出新功能时，现代化成为战略上的必要，而不是技术上的偏好。
- en: Against a backdrop of aggressive competition, legacy applications are an existential
    threat to most organizations, often creating invisible barriers to innovation.
    Development teams spend the majority of their time maintaining these brittle systems
    rather than investing in the new capabilities they need to compete effectively.
    By addressing these constraints, modernization frees both human and computational
    resources to focus on innovation and competitive differentiation, including the
    integration of AI, real-time services, and advanced analytics.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在激烈的竞争背景下，传统应用程序对大多数组织来说是一个生存威胁，常常创造无形的技术创新障碍。开发团队的大部分时间都花在维护这些脆弱的系统上，而不是投资于他们需要以有效竞争的新能力。通过解决这些限制，现代化释放了人力和计算资源，以便专注于创新和竞争优势，包括AI集成、实时服务和高级分析。
- en: 'Technical limitations: The growing burden of legacy architecture'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术限制：传统架构日益增长的压力
- en: 'Behind most modernization initiatives lie several common technical challenges
    that eventually become impossible to ignore:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数现代化倡议的背后，都存在几个共同的技术挑战，最终变得无法忽视：
- en: '**Architectural inflexibility**: Monolithic legacy applications resist change
    by their very nature. What might be a simple feature addition in a modern, modular
    system often requires cascading modifications across tightly coupled components
    in older architectures. This inflexibility dramatically increases the cost and
    risk of even minor changes, creating a growing backlog of needed improvements
    that get delayed time and again, because of the fear of disruption of service
    through unavoidable downtime.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构僵化**：单体传统应用程序由于其本质而抵制变化。在现代模块化系统中可能只是一个简单的功能添加，在较老的架构中通常需要跨紧密耦合组件进行级联修改。这种僵化性大大增加了即使是微小变更的成本和风险，导致需要改进的待办事项不断积压，一次又一次地因为担心服务中断而推迟。'
- en: '**Performance constraints**: Legacy systems typically weren’t designed for
    cloud deployment or to handle today’s transaction volumes and data growth. As
    demands increase, these systems hit performance ceilings that can’t be overcome
    without fundamental redesign. These limitations become particularly acute when
    organizations attempt to implement AI capabilities that require real-time data
    processing and analysis.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能限制**：传统系统通常不是为了云部署或处理当今的交易量和数据增长而设计的。随着需求的增加，这些系统会遇到无法通过根本性重新设计克服的性能瓶颈。当组织试图实施需要实时数据处理和分析的AI能力时，这些限制变得尤为突出。'
- en: '**Security exposure**: Outdated frameworks and unpatched components create
    growing security vulnerabilities. While many vendors happily provide extended
    support for these legacy systems, the cost of this is often breathtaking and far
    exceeds that of even the most complex modernization programs. This inability to
    update increases compliance risk, particularly as regulations such as GDPR, HIPAA,
    and PCI-DSS continue to evolve with more stringent requirements,. as discussed
    in greater detail in [*Chapter 4*](04.xhtml#_idTextAnchor074)*,* *Trustworthy
    AI,* *Compliance, and Data Governance*.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全风险**：过时的框架和未修补的组件创造了不断增长的安全漏洞。虽然许多供应商愿意为这些传统系统提供扩展支持，但这种支持的成本通常令人震惊，远远超过即使是复杂的现代化项目。这种无法更新的能力增加了合规风险，尤其是在GDPR、HIPAA和PCI-DSS等法规继续随着更严格的要求而演变的情况下，正如在[*第4章*](04.xhtml#_idTextAnchor074)*，*可信AI、合规性和数据治理*中更详细讨论的那样。'
- en: The motivations for modernization are clear; there is no company of any significant
    size operating today that does not already have some kind of modernization program
    in place, operating with varying degrees of success. In fact, many companies have
    already begun to wonder whether this new world of GenAI, which promises so much,
    could be just the ticket they need to freedom from legacy chains.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现代化的动机是明确的；今天没有哪家规模较大的公司没有某种现代化计划在运行，且效果各不相同。事实上，许多公司已经开始质疑这个承诺如此之多的GenAI新世界，是否正是他们摆脱遗留链束缚所需要的良方。
- en: Why AI alone isn’t the answer
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么AI单独不是答案
- en: 'While AI tools offer impressive capabilities, any developer with even the briefest
    experience using them will quickly realize that they fall short as complete modernization
    solutions for several reasons:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI工具提供了令人印象深刻的性能，但任何有哪怕一点使用经验的开发者都会很快意识到，由于以下几个原因，它们作为完整的现代化解决方案存在不足：
- en: '**Reliability concerns**: GenAI models produce non-deterministic output, meaning
    you cannot be guaranteed to get the same outcome with the same inputs. This unpredictability
    creates significant risk because AI-generated code may contain subtle logic errors,
    security vulnerabilities, or compliance issues that only surface in production
    environments.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可靠性问题**：GenAI模型产生非确定性输出，这意味着你不能保证用相同的输入得到相同的结果。这种不可预测性带来了重大风险，因为AI生成的代码可能包含微妙的逻辑错误、安全漏洞或合规性问题，这些问题只有在生产环境中才会显现。'
- en: '**Context limitations**: LLMs struggle with the scope and complexity of enterprise
    applications. Most modernization efforts involve interconnected systems with dozens
    or hundreds of components. LLMs lack the ability to maintain context across this
    breadth of code, making them prone to introducing errors at system boundaries
    where dependencies are most critical.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文限制**：LLMs在处理企业应用程序的广度和复杂性方面存在困难。大多数现代化工作涉及数十或数百个组件的互联系统。LLMs缺乏在如此广泛的代码中保持上下文的能力，这使得它们容易在系统边界处引入错误，而依赖性在这里最为关键。'
- en: '**Engineering judgment**: AI systems cannot replicate the accumulated wisdom
    and nuanced decision-making that experienced architects and engineers bring to
    modernization projects. When evaluating legacy code, senior engineers make critical
    judgment calls about which components to refactor, replace, or retain based on
    business impact, risk assessment, and future scalability needs. While AI can analyze
    code, it cannot effectively balance immediate migration needs against long-term
    strategic goals or prioritize modernization efforts based on business value versus
    technical effort.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工程判断**：AI系统无法复制经验丰富的架构师和工程师在现代化项目中带来的积累的智慧以及细微的决策能力。在评估遗留代码时，资深工程师会基于业务影响、风险评估和未来可扩展性需求，做出关于哪些组件需要重构、替换或保留的关键判断。虽然AI可以分析代码，但它无法有效地平衡短期迁移需求与长期战略目标，也不能根据业务价值与技术努力来优先考虑现代化工作。'
- en: Coding assistants mark a transformative period for developer productivity by
    automating routine assignments. However, these assistants face inherent limitations
    mirroring those of GenAI, given their foundational reliance on such technologies.
    That hasn’t stopped many developers, charged with modernizing applications, from
    picking up these coding tools and wondering how far they can push them towards
    their modernization goals. It quickly becomes obvious that the greater the complexity
    of work you give the coding assistants, the more time you spend hunting for and
    fixing bugs that the LLM has introduced. There is an obvious law of diminishing
    returns at play, to the point at which, without experience, processes, and tooling
    as support, it’s easier and safer to just modernize by using traditional software
    development practices.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 编码助手通过自动化常规任务，标志着开发者生产力的转型时期。然而，这些助手面临着与GenAI相似的固有局限性，因为它们的基础依赖于这些技术。但这并没有阻止许多负责现代化应用程序的开发者拿起这些编码工具，思考他们能将这些工具推进到现代化目标的何种程度。很快就会变得明显，你给编码助手的工作越复杂，你花费在寻找和修复LLM引入的bug上的时间就越多。显然，存在一个收益递减定律，到了没有经验、流程和工具支持的情况下，仅仅使用传统的软件开发实践进行现代化更为容易和安全。
- en: '![](img/B34136_05_02.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_05_02.png)'
- en: 'Figure 5.2: Evolution from traditional software development to software factory'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.2：从传统软件开发到软件工厂的演变
- en: '*Figure 5.2* illustrates three stages of software development evolution: traditional
    software development (manual coding with established methods, slower for large
    changes, more costly and risky), AI-enabled software development (LLM-assisted
    development that increases individual productivity and enhances traditional coding
    processes but struggles with complexity), and software factory (industrialized,
    automated processes designed for speed and scale that transform legacy systems
    efficiently). Each stage shows increasing levels of automation and capability,
    demonstrating how AI integration progresses from individual assistance to comprehensive
    automated development factories.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.2* 展示了软件开发演化的三个阶段：传统软件开发（使用既定方法进行手动编码，对大型变更较慢，成本更高且风险更大）、AI赋能的软件开发（LLM辅助的开发提高了个人生产力并增强了传统编码流程，但难以处理复杂性），以及软件工厂（为速度和规模而设计的工业化、自动化流程，能够高效地转换遗留系统）。每个阶段都显示了自动化和能力的不断提高，展示了AI集成如何从个人辅助发展到全面的自动化开发工厂。'
- en: Unlocking innovation with AI-powered modernization
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用AI赋能的现代化释放创新
- en: MongoDB’s structured, proven approach to modernization helps organizations leverage
    AI to transform legacy applications into modern, scalable, and performant solutions.
    Developed in response to the fact that nearly 80% of enterprise applications still
    run on outdated technology, the approach combines AI-powered tools, specialized
    automation, and human software development expertise to reduce modernization risk
    and accelerate results [2].
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB对现代化的结构化、经过验证的方法帮助组织利用AI将遗留应用程序转换为现代、可扩展和性能卓越的解决方案。该方法的开发是为了应对近80%的企业应用程序仍在使用过时技术的现实，它结合了AI工具、专门的自动化和人类软件开发专业知识，以降低现代化风险并加速结果
    [2]。
- en: At its core, MongoDB’s modernization approach is a software-powered process
    that accelerates the individual steps of a modernization journey. It begins with
    application discovery, where AI tools analyze existing code bases and database
    structures, map system interdependencies, and generate early documentation. In
    close partnership with customers, the MongoDB team then generates test cases,
    particularly valuable for applications lacking formal testing frameworks, and
    iteratively converts legacy code into modern code, refining it based on test results
    until the system passes all quality checks. While not yet a fully automated *assembly
    line* process, the approach is evolving toward greater efficiency and automation
    with each iteration.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB的现代化方法的核心是一个软件驱动的流程，它加速了现代化旅程的各个步骤。它从应用程序发现开始，其中AI工具分析现有的代码库和数据库结构，映射系统依赖关系，并生成早期文档。与客户紧密合作，MongoDB团队随后生成测试用例，这对于缺乏正式测试框架的应用程序尤其有价值，并迭代地将遗留代码转换为现代代码，根据测试结果进行优化，直到系统通过所有质量检查。虽然目前还不是完全自动化的*装配线*过程，但该方法随着每次迭代正朝着更高的效率和自动化方向发展。
- en: Achieving modernization at an enterprise scale and complexity necessitates a
    robust toolkit **leveraging AI**, **automation**, and a **modern data platform**.
    No single tool currently provides a complete end-to-end solution for complex code
    refactoring, dependency analysis, SQL conversion, and large-scale data migration.
    This is why MongoDB leverages a toolchain approach in its modernization efforts,
    integrating over 25 (and growing) specialized tools for distinct tasks.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在企业规模和复杂性方面实现现代化需要一套强大的工具集，**利用AI**、**自动化**和**现代数据平台**。目前没有任何单一工具能够提供针对复杂代码重构、依赖分析、SQL转换和大规模数据迁移的完整端到端解决方案。这就是为什么MongoDB在其现代化努力中采用工具链方法，整合了超过25（且仍在增长）个针对不同任务的专用工具。
- en: The rest of this section will break down the essential components of that factory
    approach, from its data foundations and orchestration patterns to its GenAI-accelerated
    steps, testing principles, and real-world performance benchmarks.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 本节剩余部分将分解该工厂方法的基本组件，从其数据基础和编排模式到其GenAI加速步骤、测试原则和现实世界的性能基准。
- en: Start with the right data foundation
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从正确的数据基础开始
- en: Relational databases have served as enterprise workhorses for more than 40 years,
    but their design imposes fundamental constraints on modern application development.
    Developers must fragment data across multiple tables, implement complex joins,
    and maintain rigid schemas that resist change. As application needs evolve, this
    architectural mismatch slows velocity, increases cognitive load, and taxes innovation.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 关系型数据库已经作为企业工作马超过40年，但它们的设计对现代应用程序开发施加了基本限制。开发者必须在多个表中分割数据，实现复杂的连接，并维护抗拒变化的刚性模式。随着应用程序需求的发展，这种架构不匹配减缓了速度，增加了认知负荷，并考验了创新。
- en: Today’s workloads, including real-time analytics and AI-powered features, demand
    a data platform that can handle diverse data types, scale horizontally, and adapt
    quickly to changing requirements. Advanced document database platforms such as
    MongoDB provide that foundation. By aligning data storage with the way developers
    already structure information in their applications, document models remove the
    impedance mismatch that slows delivery and complicates system design.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的负载，包括实时分析和人工智能驱动的功能，需要一个能够处理多种数据类型、水平扩展并能快速适应变化需求的数据平台。像MongoDB这样的高级文档数据库平台提供了这个基础。通过将数据存储与开发者已经在应用程序中结构化信息的方式对齐，文档模型消除了减缓交付和复杂系统设计的阻抗不匹配。
- en: 'MongoDB offers a unified data platform that natively supports a wide range
    of use cases: operational transactions, time series data, text and vector search,
    IoT telemetry, and more, all through a single document model and query interface.
    This eliminates the need for workload-specific databases, reducing the complexity,
    security risk, and operational cost, while accelerating innovation.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB提供了一个统一的数据平台，它原生支持广泛的使用案例：操作事务、时间序列数据、文本和向量搜索、物联网遥测等，所有这些都可以通过单个文档模型和查询接口实现。这消除了对特定工作负载数据库的需求，降低了复杂性、安全风险和运营成本，同时加速了创新。
- en: '![](img/B34136_05_03.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图5.3：MongoDB的统一数据平台架构](img/B34136_05_03.png)'
- en: 'Figure 5.3: MongoDB’s unified data platform architecture'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.3：MongoDB的统一数据平台架构
- en: '*Figure 5.3* illustrates how MongoDB enables diverse workloads through a single
    core dataset. All workloads operate on the same underlying architecture, optimized
    for performance, scalability, resilience, and security across global, multi-cloud,
    and on-premises environments.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.3*展示了MongoDB如何通过单一核心数据集实现多样化的工作负载。所有工作负载都运行在相同的底层架构上，该架构针对性能、可扩展性、弹性和安全性进行了优化，适用于全球、多云和本地环境。'
- en: 'Beyond operational efficiency, MongoDB’s document model empowers developers
    to build modern AI-powered applications at a pace that legacy relational systems
    simply can’t match. Because most modern applications already use JSON-formatted
    data for internal objects, APIs, events, and integrations, storing that data in
    the same shape unlocks meaningful benefits:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 除了运营效率之外，MongoDB的文档模型使开发者能够以传统关系型系统无法比拟的速度构建现代人工智能驱动的应用程序。因为大多数现代应用程序已经使用JSON格式的数据用于内部对象、API、事件和集成，将数据以相同的形式存储可以解锁有意义的优势：
- en: '**Natural data mapping**: Documents map directly to objects in languages such
    as Java, reducing boilerplate code and simplifying the use of modern frameworks
    and development libraries'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然数据映射**：文档直接映射到Java等语言中的对象，减少了样板代码并简化了现代框架和开发库的使用'
- en: '**Agility and developer productivity**: Flexible schemas align with agile development
    practices and rapid iteration common with modern languages, without the friction
    of complex SQL schema migrations'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**敏捷性和开发者生产力**：灵活的模式与敏捷开发实践和现代语言中常见的快速迭代相一致，无需复杂SQL模式迁移的摩擦'
- en: '**Readability and reduced cognitive load**: Developers can interact with full,
    self-contained objects (such as a user profile or product SKU) without having
    to stitch data together across multiple tables'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可读性和降低认知负荷**：开发者可以与完整的、自包含的对象（如用户资料或产品SKU）交互，而无需在多个表中拼接数据'
- en: '**Performance and infrastructure efficiency**: Denormalized JSON (BSON) documents
    reduce query complexity, speed up results, and improve infrastructure efficiency
    at scale'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能和基础设施效率**：非规范化JSON（BSON）文档减少了查询复杂性，加快了结果，并在规模上提高了基础设施效率'
- en: This contrast becomes especially clear when relational and document-based models
    are viewed side by side.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当关系型和基于文档的模型并排放置时，这种对比变得尤为清晰。
- en: '![](img/B34136_05_04.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图5.4：关系型和文档数据模型的对比](img/B34136_05_04.png)'
- en: 'Figure 5.4: Contrasting relational and document data models'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.4：对比关系型和文档数据模型
- en: '*Figure 5.4* compares a normalized relational schema with a document-based
    model. On the left, related data is split across multiple tables, requiring joins
    to reassemble a complete record. On the right, MongoDB stores the full object
    in a single JSON document, mirroring how it’s used in the application.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.4*比较了规范化的关系模式与基于文档的模型。在左侧，相关数据分散在多个表中，需要连接才能重新组装完整的记录。在右侧，MongoDB将整个对象存储在单个JSON文档中，反映了它在应用程序中的使用方式。'
- en: Together, the document model and unified data platform form a powerful foundation
    for software development. Already proven for modern applications, MongoDB is being
    embraced as the ideal solution for AI-powered applications too. Increasingly,
    organizations across all industry verticals are discovering that these same attributes
    are essential for scalable modernization. When combined with experienced engineering
    teams and a repeatable framework, this approach opens the door to large-scale
    application transformation at a pace the industry has not seen before.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 一起，文档模型和统一数据平台构成了软件开发的一个强大基础。MongoDB已经在现代应用程序中得到验证，现在也被视为人工智能应用程序的理想解决方案。越来越多的组织发现，这些相同的属性对于可扩展的现代化也是必不可少的。当与经验丰富的工程团队和可重复的框架结合时，这种方法打开了以前行业未曾见过的规模化应用程序转型的门户。
- en: Automating the modernization factory process
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动化现代化工厂流程
- en: 'Any traditional factory relies on repeatable processes to deliver consistent
    and reliable outcomes. MongoDB’s approach to modernization for enterprise applications
    follows the same principle: using automation to scale the transformation of legacy
    systems in a controlled and efficient way. Regardless of tooling, the modernization
    approach follows a common pattern. Within that pattern, each project has its own
    nuances, requiring humans to adapt tools and processes to the customer’s unique
    environment, architecture, and priorities.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 任何传统工厂都依赖于可重复的过程来提供一致和可靠的结果。MongoDB对企业应用程序的现代化方法遵循相同的原则：使用自动化以受控和高效的方式扩展对遗留系统的转换。无论工具如何，现代化方法都遵循一个共同的模式。在这个模式中，每个项目都有其独特的细微差别，需要人类根据客户的独特环境、架构和优先级调整工具和流程。
- en: 'Each iteration of the factory includes the following:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 工厂的每次迭代都包括以下内容：
- en: '**Analyze**: Understand the legacy system’s structure, dependencies, and business
    logic.'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析**：了解遗留系统的结构、依赖关系和业务逻辑。'
- en: '**Test generation**: Build comprehensive tests to validate system behavior.'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测试生成**：构建全面的测试以验证系统行为。'
- en: '**Code transform and test**: Convert legacy code and data to modern formats
    while preserving functional equivalence.'
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代码转换和测试**：将遗留代码和数据转换为现代格式，同时保持功能等效性。'
- en: '**Deploy and migrate**: Move the transformed application to the new platform
    with minimal disruption.'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**部署和迁移**：以最小的干扰将转换后的应用程序迁移到新平台。'
- en: '**Repeat**: Apply these steps iteratively for each modernization phase.'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重复**：对每个现代化阶段迭代应用这些步骤。'
- en: The size and scope of each iteration depends on factors such as the customer’s
    deployment strategy and tooling. In general, smaller and more frequent iterations
    reduce risk and provide earlier feedback.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 每次迭代的规模和范围取决于客户部署策略和工具等因素。一般来说，较小且更频繁的迭代可以降低风险并提供更早的反馈。
- en: This section explores how AI enhances and accelerates these processes while
    maintaining the necessary human oversight. First, we will examine how the factory
    itself is orchestrated and how AI optimizes the modernization process.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了人工智能如何增强和加速这些过程，同时保持必要的人类监督。首先，我们将考察工厂本身的协调方式以及人工智能如何优化现代化过程。
- en: 'Orchestration: how the factory is automated'
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**编排**：工厂的自动化方式'
- en: AI-focused workflows are ushering in a new era for orchestration tooling. MongoDB
    uses LangFlow as the foundation for automation within its modernization factories
    due to its tight integration with LLMs and speed to create and update agentic
    flows. One of the key capabilities enabled by this orchestration layer is the
    ability for LLMs not only to generate code or scripts, but also to diagnose and
    fix the errors they produce. These self-correcting workflows are designed using
    LangFlow’s visual interface, as shown in *Figure 5.5*.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 以人工智能为重点的工作流程正在引领编排工具的新时代。MongoDB由于其与LLMs的紧密集成以及创建和更新代理流程的速度，使用LangFlow作为其现代化工厂自动化的基础。这个编排层的一个关键能力是LLMs不仅能够生成代码或脚本，还能够诊断和修复它们产生的错误。这些自我纠正的工作流程是使用LangFlow的视觉界面设计的，如图*图5.5*所示。
- en: '![](img/B34136_05_05.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_05_05.png)'
- en: 'Figure 5.5: LangFlow orchestration workflow for AI agent development'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.5：用于AI代理开发的LangFlow编排工作流
- en: '*Figure 5.5* shows the LangFlow visual workflow interface used in MongoDB’s
    approach to modernization for creating and managing AI orchestration workflows.
    The interface displays a capability-based workflow design with various connected
    components, demonstrating how LangFlow enables tight integration with LLMs and
    provides a visual approach to creating and updating agentic workflows, simplifying
    the development of AI-powered automation processes through its drag-and-drop workflow
    builder.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.5* 展示了MongoDB在创建和管理AI编排工作流时使用的LangFlow可视化工作流界面。该界面显示了一个基于能力的流程设计，包含各种连接的组件，展示了LangFlow如何实现与LLMs的紧密集成，并提供了一种创建和更新代理工作流的视觉方法，通过其拖放工作流构建器简化了AI驱动的自动化流程的开发。'
- en: Of course, orchestration only delivers value when paired with tools to automate.
    In the next section, we won’t focus on specific tools, but on the strategic areas
    where AI is making the biggest impact across the modernization lifecycle. Given
    how quickly the tooling landscape evolves, focusing on *where* and *how* AI is
    used will offer more enduring value than analyzing individual tools.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，编排只有在与自动化工具结合使用时才能产生价值。在下一节中，我们不会关注特定的工具，而是关注AI在现代生命周期中产生最大影响的战略领域。鉴于工具领域的发展速度如此之快，关注AI的使用“哪里”和“如何”将比分析单个工具提供更持久的价值。
- en: Where AI accelerates the process
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI加速流程的地方
- en: 'As discussed earlier, MongoDB’s modernization approach does not treat GenAI
    as a magic wand. Anyone who’s tried to fully automate modernization using LLMs
    knows the pitfalls: brittle output, hidden errors, and time-consuming rework that
    defeats the purpose. Instead, MongoDB engineers use AI as part of a carefully
    assembled toolkit to accelerate key tasks while maintaining control, precision,
    and accountability.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，MongoDB的现代化方法并不将GenAI视为魔杖。任何尝试使用LLMs完全自动化现代化的人都知道其中的陷阱：脆弱的输出、隐藏的错误，以及耗时且无效的重工作，这些都违背了初衷。相反，MongoDB工程师将AI视为精心组装的工具包的一部分，以加速关键任务，同时保持控制、精确和问责制。
- en: This section explores where AI is delivering the biggest performance and productivity
    gains, starting with analysis.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了AI在分析中实现的最大性能和生产率提升。
- en: Analysis
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析
- en: The first step in any modernization effort is gaining a clear understanding
    of the legacy system, how it’s constructed, what it does, and how complex it truly
    is. In one case, MongoDB’s analysis revealed that a code base was nearly four
    times larger than the customer initially believed. This early insight helped right-size
    the project scope and avoid costly surprises later.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 任何现代化工作的第一步是明确了解遗留系统，它的构建方式，它做什么，以及它真正有多复杂。在一个案例中，MongoDB的分析显示，代码库的规模几乎是客户最初认为的四倍。这一早期洞察有助于合理调整项目范围，避免后续的昂贵意外。
- en: 'Here’s how AI helps accelerate and enhance the analysis process:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是AI如何帮助加速和增强分析过程的方法：
- en: '**System analysis and documentation**: Many large systems lack up-to-date documentation.
    LLMs help fill this gap by analyzing code to generate summaries of the application
    functionality and core capabilities. They can effectively provide an overview
    of an application and identify core domains, programming languages, frameworks,
    and business processes. Combined with static code parsers and database-specific
    tools, they can also extend their reach into stored procedures, triggers, and
    database schemas. However, one gap that often results from the system analysis
    is the downstream implications. While LLMs can help document direct integrations,
    they often lack the context of the entire ecosystem. This is where an organization’s
    repository of architecture or integration models becomes valuable, as LLMs can
    use them to highlight key areas of focus for integrations.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统分析和文档**：许多大型系统缺乏最新的文档。LLMs通过分析代码来生成应用程序功能核心能力的摘要，帮助填补这一空白。它们可以有效地提供一个应用程序的概述，并识别核心领域、编程语言、框架和业务流程。结合静态代码解析器和特定数据库的工具，它们还可以扩展到存储过程、触发器和数据库模式。然而，系统分析通常会导致一个缺口，即下游影响。虽然LLMs可以帮助记录直接集成，但它们通常缺乏整个生态系统的背景。这就是一个组织的架构或集成模型库变得有价值的地方，因为LLMs可以使用它们来突出集成关注的关键区域。'
- en: '**Dependency mapping**: A crucial outcome of the AI-assisted dependency graphs
    helps teams visualize deep interdependencies across the code base. Starting with
    *leaf nodes*, components with few or no dependencies, enables faster, lower-risk
    progress. This targeted approach helps avoid the inefficiency of attempting to
    resolve a large, interconnected code base in its entirety. Modernization efforts
    often involve the migration to a microservices architecture. Dependency graphs
    provide valuable insights into helping identify potential bounded contexts and
    service interdependencies. While LLMs provide reasonable recommendations, subject
    matter experts are still required to ensure that the services are appropriate.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**依赖关系映射**：AI辅助的依赖关系图的一个关键成果是帮助团队可视化代码库中的深层依赖关系。从**叶节点**开始，即具有少量或没有依赖关系的组件，可以更快、更低风险地取得进展。这种有针对性的方法有助于避免尝试一次性解决整个大型、相互关联的代码库的低效性。现代化努力通常涉及迁移到微服务架构。依赖关系图提供了有价值的见解，有助于识别潜在的边界上下文和服务依赖关系。虽然LLM提供了合理的建议，但仍然需要主题专家来确保服务是适当的。'
- en: '**Schema transformation**: One major area of analysis involves understanding
    the database schema and determining the appropriate document collections and structures.
    First, MongoDB’s **Relational Migrator** (**RM**) tool leverages AI behind the
    scenes to do just this. Besides providing a recommendation, RM allows the user
    to tweak the document structures. Secondly, leveraging LLMs to evaluate the application
    entities, such as **Plain Old Java Objects (POJOs**) or **Enterprise JavaBeans
    (EJBs**), provides additional insight into the structure of the application. Often,
    there are nuances or contextual considerations that LLMs cannot account for, and
    a human in the loop is necessary. One critical point to remember is that MongoDB’s
    flexibility means it is very easy to change document structures as you progress.
    Not spending endless hours debating every detail of the document allows teams
    to start converting code, saving valuable time and money. When the team uncovers
    something that needs to change in the document, the cost of change is very low.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式转换**：分析的一个主要领域涉及理解数据库模式并确定适当的文档集合和结构。首先，MongoDB的**关系迁移器**（**RM**）工具在幕后利用AI来完成这项工作。除了提供推荐外，RM还允许用户调整文档结构。其次，利用大型语言模型（LLM）评估应用程序实体，如**普通Java对象（POJOs**）或**企业JavaBeans（EJBs**），可以提供对应用程序结构的额外见解。通常，存在LLM无法考虑的细微差别或情境性考虑，需要人工介入。一个需要记住的关键点是，MongoDB的灵活性意味着在进展过程中很容易更改文档结构。不花费无数小时争论文档的每一个细节，可以让团队开始转换代码，节省宝贵的时间和金钱。当团队发现文档中需要更改的内容时，更改的成本非常低。'
- en: '**Knowledge augmentation**: Using MongoDB Atlas Vector Search, teams can create
    RAG systems to store and semantically search project documentation, code, and
    best practices. Leveraging RAG is useful for creating internal chatbots or search
    tools that enable developers to query vast amounts of project documentation, code,
    analysis reports, and modernization best practices. Having an easily accessible,
    current knowledge base is another time-saver made possible by AI.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识增强**：使用MongoDB Atlas Vector Search，团队可以创建RAG系统来存储和语义搜索项目文档、代码和最佳实践。利用RAG对于创建内部聊天机器人或搜索工具非常有用，这些工具使开发者能够查询大量的项目文档、代码、分析报告和现代化最佳实践。拥有易于访问的、最新的知识库是AI带来的另一个节省时间的功能。'
- en: For leaders, all of this contributes to greater confidence. Modernization can
    be done safely, at scale, and without disrupting core operations. As we’ll see
    in the next section, this analysis foundation is what makes a test-first strategy
    not only possible, but essential.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 对于领导者来说，所有这些都增加了信心。现代化可以在安全、规模化的情况下进行，而不会干扰核心运营。正如我们将在下一节中看到的，这个分析基础使得测试优先策略不仅成为可能，而且是必要的。
- en: Test generation
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试生成
- en: Focusing on testing in the early stages of modernization is critical for ensuring
    business functions remain intact. Many efforts stall, fail, or never begin due
    to the fear of breaking a solution that has worked for years. Proactively addressing
    this risk is essential for minimizing issues and fostering confidence throughout
    the modernization process.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 早期现代化阶段关注测试对于确保业务功能保持完整至关重要。许多努力因担心破坏多年来一直有效的解决方案而停滞不前、失败或从未开始。积极应对这种风险对于最小化问题和在整个现代化过程中建立信心至关重要。
- en: End-to-end testing
  id: totrans-95
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 端到端测试
- en: Many large-scale applications lack adequate end-to-end tests, forcing subject
    matter experts to verify every change manually. While unit testing is essential
    (and covered in the next section), early modernization work benefits most from
    end-to-end behavioral testing, particularly when generated using real application
    activity rather than code prompts alone.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 许多大型应用程序缺乏足够的端到端测试，迫使领域专家手动验证每个更改。虽然单元测试是必不可少的（并在下一节中介绍），但早期现代化工作从端到端行为测试中获益最大，尤其是当使用真实的应用活动生成而不是仅使用代码提示时。
- en: '*Figure 5.6* visualizes a more reliable strategy: capturing inputs, outputs,
    and database state changes during runtime to reflect real-world business workflows
    accurately. With this context in hand, including API traffic (HTTP, JSON, HTML),
    database state changes, and the underlying schema, LLMs can generate accurate,
    meaningful test cases.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.6* 展示了一个更可靠的策略：在运行时捕获输入、输出和数据库状态变化，以准确反映现实世界的业务工作流程。有了这个上下文，包括API流量（HTTP、JSON、HTML）、数据库状态变化和底层架构，LLMs可以生成准确、有意义的测试用例。'
- en: '![](img/B34136_05_06.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_05_06.png)'
- en: 'Figure 5.6: End-to-end test generation using application behavior capture'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.6：使用应用程序行为捕获进行端到端测试生成
- en: 'This method outperforms code-only prompting, which often fails due to missing
    business logic and application state. Once the behavioral context is captured,
    LLMs can generate tests in frameworks such as Cucumber, Karate, or others, thereby
    accelerating coverage in a format that integrates with existing QA pipelines.
    Additionally, vectorizing these generated tests and storing them in a knowledge
    base adds long-term value: developers can query the system’s business logic semantically
    and reuse key patterns across domains.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法优于仅代码提示，后者往往由于缺少业务逻辑和应用状态而失败。一旦捕获了行为上下文，LLMs可以在Cucumber、Karate或其他框架中生成测试，从而加速以与现有QA管道集成的格式进行覆盖。此外，将这些生成的测试矢量化并存储在知识库中增加了长期价值：开发者可以以语义方式查询系统的业务逻辑并跨领域重用关键模式。
- en: Paper-based testing
  id: totrans-101
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 基于纸张的测试
- en: Old applications often rely on static, human-readable test plans, stored as
    documents but never executed automatically. LLMs offer a quick path to automation
    here. Given access to digital test documents, they can parse and transform them
    into executable scenarios. If the documents are too long or inconsistently structured,
    teams can either split them manually or vectorize them to support semantic search
    and test generation through RAG.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 旧应用程序通常依赖于静态的、可读的测试计划，以文档形式存储但从未自动执行。LLMs在这里提供了一个快速实现自动化的途径。如果可以访问数字测试文档，它们可以解析并转换成可执行的场景。如果文档太长或不一致，团队可以手动拆分它们或将它们矢量化以支持通过RAG进行语义搜索和测试生成。
- en: It is a simple matter for an LLM to parse the document and generate a test scenario.
    However, the context limitations of LLMs can be problematic. There are several
    approaches to addressing this challenge. One is to manually break apart the tests,
    and another is to vectorize the documents. Vectorizing the documents enables someone
    to ask test-specific questions of the data and to generate tests.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: LLM解析文档并生成测试场景是一件简单的事情。然而，LLMs的上下文限制可能存在问题。有几种方法可以解决这个挑战。一种是将测试手动拆分，另一种是将文档矢量化。文档矢量化使人们能够对数据进行测试特定的提问并生成测试。
- en: Besides a lack of automated testing, many applications lack test data or test
    environments. It is beyond the scope of this book to address building test environments
    or defining your test data management strategy, as these items are unique to each
    organization and its testing maturity. After closing the most critical testing
    gaps, the next step is to start the actual code transformation.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 除了缺乏自动化测试外，许多应用程序还缺乏测试数据或测试环境。本书的范围不包括构建测试环境或定义您的测试数据管理策略，因为这些项目对每个组织及其测试成熟度都是独特的。在关闭最关键的测试差距之后，下一步是开始实际的代码转换。
- en: Code transformation and testing
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码转换和测试
- en: 'Modernizing applications comes in many different shapes and sizes. Modernization
    efforts may encompass one or more of the following areas: migrating logic out
    of stored procedures and migrating to MongoDB, replacing application servers/runtimes
    (such as JBoss and WebLogic), modernizing older frameworks (including Oracle Forms
    and WCF), and migrating to different languages (like Kotlin, Scala, etc.).'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序现代化有多种不同的形式和规模。现代化努力可能包括以下一个或多个领域：将逻辑从存储过程迁移出来并迁移到MongoDB，替换应用程序服务器/运行时（如JBoss和WebLogic），现代化较旧的框架（包括Oracle
    Forms和WCF），以及迁移到不同的语言（如Kotlin、Scala等）。
- en: 'The general approach for modernization isn’t unique and follows a common pattern:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现代化的通用方法并不独特，遵循一个常见的模式：
- en: Test generation
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试生成
- en: Code transformation and testing
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码转换和测试
- en: Comparative testing
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较测试
- en: Code cleanup and optimization
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码清理和优化
- en: Once all issues are resolved and the code is functionally equivalent, the effort
    to optimize becomes greatly reduced. Some teams may choose to optimize during
    the transformation phase, but that introduces more complexity and can make debugging
    more difficult. This chapter focuses on the core transformation process and doesn’t
    delve into the post-transformation optimization process, as these situations are
    very unique to each modernization effort. Let’s dive into the overall process.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦所有问题都得到解决，代码在功能上等效，优化所需的努力就会大大减少。一些团队可能会选择在转换阶段进行优化，但这会引入更多的复杂性，并可能使调试更加困难。本章重点介绍核心转换过程，并不深入探讨转换后的优化过程，因为这些情况对每个现代化努力都非常独特。让我们深入了解整个过程。
- en: By taking a test-driven approach, MongoDB’s modernization strategy aims to deliver
    complex modernizations safely. Therefore, the first step is to close any lower-level
    testing gaps. Regardless of the testing technologies used, LLMs can dramatically
    reduce the time required to generate or improve tests.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 通过采用测试驱动的方法，MongoDB的现代化策略旨在安全地交付复杂的现代化。因此，第一步是关闭任何低级测试差距。无论使用哪种测试技术，LLMs都可以显著减少生成或改进测试所需的时间。
- en: '**Unit testing**: There are numerous preexisting solutions for generating unit
    tests, so this chapter doesn’t go into depth on the topic. Newer, agentic tools
    are appearing on the market, such as Qodo Cover [5], that aim to identify and
    close unit testing gaps leveraging LLMs. One of the clever approaches in MongoDB’s
    modernization solution leverages dependency reports to ensure that unit tests
    are generated for all dependent classes. This approach enables an iterative delivery
    approach while ensuring all dependent classes are testable. By automating test
    generation and leveraging dependency graphs, organizations can achieve a consistent
    and safe migration strategy.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单元测试**：存在许多生成单元测试的现有解决方案，因此本章不会深入探讨该主题。市场上出现了新的、基于代理的工具，如Qodo Cover [5]，旨在利用LLMs识别和关闭单元测试差距。MongoDB现代化解决方案中的一个巧妙方法是通过依赖报告确保为所有依赖类生成单元测试。这种方法使迭代交付方法成为可能，同时确保所有依赖类都是可测试的。通过自动化测试生成并利用依赖图，组织可以实现一致且安全的迁移策略。'
- en: '**Integration testing**: First, let’s align on the term *integration testing*,
    which, for the context of this book, is testing code and other infrastructure
    components, such as databases. A different approach is needed for integration
    testing due to the increased complexity of testing a broader spectrum of an application.
    One effective strategy is to follow a similar pattern to end-to-end testing. Execute
    the code block (Java, stored proc, etc.) and capture the inputs, outputs, and
    state changes. Then feed this information, relevant source code, and the testing
    strategy (boundary tests, Fuzz, Monkey, etc.) to the LLM to generate the automated
    tests. To reduce the amount of labor involved to verify that the generated results
    are valid, utilize an LLM to score the output tests. This is done by feeding the
    original prompt, inputs, and generated test cases into the LLM and prompting it
    to score the tests. Humans can then inspect the test cases with lower scores to
    validate their effectiveness. Integration testing must address both the current
    solution and the new solution. At each step in the modernization process, equivalent
    tests should be run against the current and the new solution to ensure equivalence.
    This will be discussed in more detail in the *Comparative Testing* section.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成测试**：首先，让我们就“集成测试”这个术语达成一致，在这个书的背景下，集成测试是指测试代码和其他基础设施组件，例如数据库。由于测试应用更广泛范围的复杂性增加，需要不同的方法来进行集成测试。一种有效策略是遵循与端到端测试相似的模式。执行代码块（Java、存储过程等），并捕获输入、输出和状态变化。然后，将此信息、相关源代码和测试策略（边界测试、模糊测试、猴子测试等）输入LLM以生成自动化测试。为了减少验证生成结果是否有效所需的工作量，利用LLM对输出测试进行评分。这是通过将原始提示、输入和生成的测试用例输入LLM，并提示它评分测试来完成的。然后，人类可以检查评分较低的测试用例以验证其有效性。集成测试必须解决当前解决方案和新解决方案。在现代化过程的每个步骤中，都应针对当前解决方案和新解决方案运行等效测试，以确保等效性。这将在“比较测试”部分中更详细地讨论。'
- en: '**End-to-end testing**: As additional test scenarios are identified, they will
    follow the preceding approach. It isn’t uncommon for edge cases to be identified
    once teams focus on transformation-specific business capabilities.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**端到端测试**：随着识别出更多的测试场景，它们将遵循前面的方法。一旦团队专注于转换特定的业务能力，识别边缘情况并不罕见。'
- en: AI-powered code transformation
  id: totrans-117
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: AI驱动的代码转换
- en: 'Code modernization complexity varies greatly, but the following approach has
    proven successful regardless of complexity in accelerating delivery:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 代码现代化复杂度差异很大，但以下方法在加速交付方面，无论复杂度如何都已被证明是成功的：
- en: '**Recommend**: LLMs have dramatically improved in their ability to recommend
    an approach for transforming code. Prompt the LLM with the dependency reports
    and migration goals, such as converting Java to Kotlin, to provide a strategy
    for approaching the code transformation. You must include in the prompt basic
    details about how you want to approach the transformation, such as starting with
    capabilities without any dependencies or focusing on one business capability,
    such as adding a new customer. For the best results, review the LLM’s response,
    identify any gaps or concerns, and ask it to improve the prompt with these details.
    After a few iterations, you will have a tailored prompt, specific to your modernization
    goals, that yields a well-planned approach for the modernization. This cannot
    replace subject matter experts who have context well beyond what the LLM can process,
    but it provides a solid foundation to begin.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推荐**：大型语言模型（LLM）在推荐代码转换方法的能力上有了显著提升。通过向LLM提供依赖报告和迁移目标，例如将Java转换为Kotlin，来提供代码转换的策略。您必须在提示中包含关于您如何进行转换的基本细节，例如从没有任何依赖的能力开始，或者专注于一个业务能力，例如添加新客户。为了获得最佳结果，请审查LLM的响应，识别任何差距或关注点，并要求它根据这些细节改进提示。经过几次迭代后，您将获得一个针对您的现代化目标的定制提示，从而产生一个周密的现代化方法。这不能取代那些对LLM处理范围之外的上下文有深入了解的主题专家，但它提供了一个坚实的基础来开始。'
- en: '**Convert/compile/repair/test**: MongoDB’s factory-based approach uses an agentic,
    closed-loop strategy to automate the conversion and eliminate a significant volume
    of mundane work. Humans are in the loop to direct the overall process and determine
    which aspects of the application to migrate. They are also in the loop to step
    in when the automated transform, build, test, and repair loop becomes stuck and
    the LLMs cannot correctly resolve the problems. *Figure 5.7* illustrates the automated,
    closed-loop, code transformation workflow. When tests pass, the process completes
    successfully. When tests fail, the system automatically loops back to an LLM repair
    phase that analyzes the failures and attempts to fix issues before re-entering
    the transformation cycle, creating a self-correcting automated modernization pipeline
    with human oversight only when the automated loop cannot resolve problems.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转换/编译/修复/测试**：基于工厂的MongoDB方法使用代理式、闭环策略来自动化转换并消除大量繁琐的工作。人类参与整个过程，以指导应用程序迁移的各个方面。他们还参与其中，当自动转换、构建、测试和修复循环陷入停滞且LLM无法正确解决问题时介入。*图5.7*展示了自动化的闭环代码转换工作流程。当测试通过时，过程成功完成。当测试失败时，系统自动回退到LLM修复阶段，分析失败原因并尝试在重新进入转换周期之前修复问题，创建一个具有人类监督的自我纠正自动化现代化管道，仅在自动循环无法解决问题时才需要人类介入。'
- en: Besides addressing issues in the process, humans are needed to review code and
    refine the code conversion prompts. Early in the process, you need to experiment
    with various prompts to determine what yields the best results. LLMs are becoming
    very skilled at generating and improving prompts. Provide the LLM with the original
    prompt and the improvements desired. Repeat this process for each unique aspect
    of the application. For example, prompts to convert EJBs to POJOs and repositories
    targeting databases will need to be altered for asynchronous communications.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 除了解决过程中的问题外，还需要人类来审查代码并完善代码转换提示。在过程的早期，你需要尝试各种提示以确定哪种方法能产生最佳结果。LLM在生成和改进提示方面变得越来越熟练。向LLM提供原始提示和期望的改进。为应用程序的每个独特方面重复此过程。例如，将EJB转换为POJOs以及针对数据库的存储库的提示需要为异步通信进行修改。
- en: '![](img/B34136_05_07.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_05_07.png)'
- en: 'Figure 5.7: Closed-loop build process'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.7：闭环构建过程
- en: '**Translation challenges**'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**翻译挑战**'
- en: MongoDB’s approach to modernization employs AI-powered tools and workflows tailored
    for specific code transformations, including SQL to Java, Java to Kotlin, SQL
    to **MongoDB Query Language** (**MQL**), and more. Large language models require
    specific context to perform these translations effectively. For instance, converting
    PL/SQL to Java necessitates both the relevant database schema and the PL/SQL code.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB对现代化的方法采用AI驱动的工具和工作流程，针对特定的代码转换进行定制，包括SQL到Java、Java到Kotlin、SQL到**MongoDB查询语言**（**MQL**）等。大型语言模型需要特定的上下文才能有效地执行这些翻译。例如，将PL/SQL转换为Java需要相关的数据库模式和PL/SQL代码。
- en: To overcome challenges with large or complex code translations by LLMs, several
    strategies are employed and tailored to the situation. In many instances, the
    code is first broken down into logical units or code blocks. Then, the LLM transforms
    each code block and uses the previously converted code as input to the prompt.
    So, the transformed code is iteratively built one layer at a time.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 为了克服LLM在大型或复杂代码翻译中的挑战，采用了多种策略，并根据具体情况进行了定制。在许多情况下，代码首先被分解成逻辑单元或代码块。然后，LLM转换每个代码块，并使用先前转换的代码作为提示的输入。因此，转换后的代码是逐层迭代构建的。
- en: However, in extreme cases, this iterative, compounding approach doesn’t work
    due to the size of the code. To overcome these situations, we’ve developed a patent-pending
    technique that takes a different approach. This alternative approach avoids the
    compounding code challenges by building and testing in very small increments.
    Each increment is translated into the destination language and then tested. While
    the increments do build upon each other, each translation is independent, ensuring
    that the LLM isn’t presented with too large a code file. By testing one increment
    at a time, any bugs are quickly identified.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在极端情况下，由于代码的大小，这种迭代、复利的做法不起作用。为了克服这些情况，我们开发了一种专利待批技术，采用不同的方法。这种替代方法通过非常小的增量构建和测试来避免复利代码挑战。每个增量被翻译成目标语言并随后进行测试。虽然增量是相互依赖的，但每个翻译都是独立的，确保LLM不会面对过大的代码文件。通过一次测试一个增量，任何错误都能迅速被发现。
- en: As each logical unit is modernized, it is imperative to test that the old and
    new solutions produce the same results. The next section discusses where AI has
    proven incredible levels of acceleration at comparative testing.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 随着每个逻辑单元的现代化，测试新旧解决方案产生相同结果至关重要。下一节将讨论在比较测试中，AI 已经证明具有令人难以置信的加速水平。
- en: Comparative testing
  id: totrans-129
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 比较测试
- en: One of the most critical steps in modernization is comparing the legacy system
    and the new one to ensure the business logic remains intact, processes behave
    as expected, and data is preserved. MongoDB’s modernization approach uses a like-for-like
    conversion strategy early in the process to minimize the challenges in comparing
    the results. At this stage, the performance and scale of the new system are suboptimal,
    but acceptable because the initial goal is modernization without breaking the
    business logic. Once the new code is confirmed to be correct, optimization for
    non-functional requirements begins, unlocking the true agility and performance
    of the modernized system.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 现代化过程中最关键的步骤之一是对比旧系统和新系统，以确保业务逻辑保持完整，流程按预期运行，数据得到保留。MongoDB 的现代化方法在早期阶段采用类似转换策略，以最小化比较结果时的挑战。在此阶段，新系统的性能和规模可能不是最优的，但可以接受，因为初始目标是现代化而不破坏业务逻辑。一旦新代码被确认正确，就开始针对非功能性需求进行优化，从而释放现代化系统的真正灵活性和性能。
- en: While LLMs have not proven effective at directly comparing large or complex
    data results, they excel at generating the utilities and test scripts needed to
    validate data equivalence.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然LLMs在直接比较大型或复杂的数据结果方面尚未证明有效，但它们在生成验证数据等价性的实用工具和测试脚本方面表现出色。
- en: '*Figure 5.8* illustrates a simplified relational schema (left) alongside a
    modern document structure (right). In the relational model, fields use names such
    as `FIRST_NAME`, while the document model uses `firstName` and embeds related
    data such as job and department details. LLMs can identify these structural patterns
    and generate the code required to perform the side-by-side comparisons.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.8* 展示了一个简化的关系模式（左侧）和现代文档结构（右侧）。在关系模型中，字段使用如 `FIRST_NAME` 这样的名称，而文档模型使用
    `firstName` 并嵌入相关数据，如职位和部门详情。LLMs 可以识别这些结构模式并生成执行并行比较所需的代码。'
- en: '![](img/B34136_05_08.png)![](img/B34136_05_09.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_05_08.png)![](img/B34136_05_09.png)'
- en: 'Figure 5.8: Database structures'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.8：数据库结构
- en: With this iterative and test-driven approach, integration errors are typically
    easy to catch, especially when the data is isolated. More interesting challenges
    arise when downstream systems begin interacting with the data after it is written.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种迭代和测试驱动的方法，集成错误通常很容易捕捉，尤其是在数据被隔离的情况下。更有趣的挑战出现在下游系统在数据编写后开始与数据交互时。
- en: Once the code is validated and proven to be accurate, we can then start optimizing
    it.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦代码经过验证并被证明是准确的，我们就可以开始对其进行优化。
- en: Code cleanup and optimization
  id: totrans-137
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码清理和优化
- en: 'Once the transformed code has passed initial testing, there’s a valuable opportunity
    to leverage LLMs for code improvements and system optimizations. Because adequate
    tests have been built throughout the process, these changes can be done iteratively,
    quickly, and safely:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦转换后的代码通过了初始测试，就有机会利用LLMs进行代码改进和系统优化。因为在整个过程中已经构建了足够的测试，这些更改可以迭代、快速且安全地进行：
- en: '**Code comments**: LLMs have proven very effective at commenting code, even
    inferring the meaning of obscure variable names or acronyms. These comments can
    also serve as source material for other artifacts, such as Swagger API documentation
    or onboarding guides.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码注释**：LLMs 在注释代码方面证明非常有效，甚至可以推断出晦涩的变量名称或缩写的含义。这些注释还可以作为其他工件（如 Swagger API
    文档或入职指南）的源材料。'
- en: '**Code readability**: Another common practice is for LLMs to improve the readability
    of code. Common use cases include the following:'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码可读性**：另一个常见的做法是让大型语言模型（LLMs）提高代码的可读性。常见的用例包括以下：'
- en: Improving variable and function names to make them more readable
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进变量和函数名称以提高可读性
- en: Refactoring large methods into smaller, testable units
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将大型方法重构为更小、可测试的单元
- en: Rewriting complex conditional logic for maintainability
  id: totrans-143
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重写复杂的条件逻辑以提高可维护性
- en: Enforcing code formatting to adhere to an organization’s coding standards
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强制代码格式以符合组织的编码标准
- en: Removing duplicate or unreachable code
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除重复或不可达的代码
- en: '**Code optimization**: LLMs can help identify bottlenecks, but this process
    can be tricky and may yield some unexpected results. Always establish a clear
    performance baseline before embarking on code optimization. When used responsibly,
    LLMs can help to do the following:'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码优化**：LLMs可以帮助识别瓶颈，但这个过程可能很棘手，并可能产生一些意外的结果。在开始代码优化之前，始终要建立一个清晰的性能基线。当负责任地使用时，LLMs可以帮助做到以下几点：'
- en: Reduce memory usage
  id: totrans-147
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少内存使用
- en: Improve execution speed
  id: totrans-148
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高执行速度
- en: Optimize thread or concurrency handling
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化线程或并发处理
- en: Deploying and migrating
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部署和迁移
- en: Organizations have unique approaches for deploying code, including environment
    propagation, gated checks, use of feature toggles, CI/CD pipeline tooling, and
    more. AI can assist in these areas, but acceleration gains are often minimal due
    to the custom nature of each pipeline. However, most mature organizations have
    already automated these workflows, making them well-suited to a factory-type model.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 组织在部署代码方面有独特的方法，包括环境传播、门控检查、使用功能开关、CI/CD管道工具等。AI可以协助这些领域，但由于每个管道的定制性质，加速收益通常很小。然而，大多数成熟组织已经自动化了这些工作流程，使它们非常适合工厂型模型。
- en: With the additional tests generated throughout the process, there’s an opportunity
    to further optimize pipelines for efficiency and automation. AI can recommend
    ongoing changes to improve deployment speed, reduce manual intervention, and increase
    reliability.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个过程中生成的额外测试提供了进一步优化管道以提高效率和自动化的机会。AI可以推荐持续的变化来提高部署速度、减少人工干预并提高可靠性。
- en: Each application modernization effort will have its own unique requirements
    for migrating to the new solution. Some teams may choose to run legacy and modern
    systems side by side and slowly migrate, while others may opt to carve out individual
    capabilities and migrate one piece at a time.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 每个应用程序现代化工作都将有其迁移到新解决方案的独特要求。一些团队可能会选择并行运行遗留和现代系统，并缓慢迁移，而其他团队可能会选择分割出单个功能并逐个迁移。
- en: For a deeper exploration of migration strategies, we recommend Martin Fowler’s
    *Patterns for Legacy Displacement* [4].
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 对于对迁移策略的更深入探讨，我们推荐阅读Martin Fowler的《遗留系统替换模式》[4]。
- en: Establishing a repeatable modernization process
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立可重复的现代化过程
- en: A key outcome of adopting a software factory approach to modernization, especially
    one enhanced by AI, is the ability to establish a repeatable process. Once successful
    patterns for test generation, code transformation, deployment, and migration are
    identified and refined for a specific type of legacy system or application component,
    these patterns can be repeated for similar modernization efforts. This repeatability
    is not about simply doing the same thing over and over, but about creating a well-defined,
    efficient, and continuously improving workflow.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 采用软件工厂方法进行现代化改造的关键成果，尤其是通过AI增强的，是能够建立可重复的过程。一旦确定了针对特定类型的遗留系统或应用程序组件的测试生成、代码转换、部署和迁移的成功模式，并且对这些模式进行了识别和优化，这些模式就可以在类似的现代化工作中重复使用。这种可重复性并不仅仅是简单地重复做同样的事情，而是关于创建一个定义明确、高效且持续改进的工作流程。
- en: 'The continuous improvement cycle is fueled by feedback from each modernization
    iteration. As teams complete transformations and deployments, they gather insights
    into the effectiveness of the AI tools, the accuracy of generated tests, the efficiency
    of the transformation workflows, and the challenges encountered during migration.
    This feedback is used to:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 持续改进周期是由每个现代化迭代中的反馈驱动的。随着团队完成转换和部署，他们可以收集有关AI工具的有效性、生成的测试的准确性、转换工作流程的效率以及迁移过程中遇到的挑战的见解。这些反馈被用于：
- en: 'Refine AI prompts and models: Improve the instructions given to LLMs for tasks
    like code recommendation, transformation, and test generation to yield better
    results in future iterations.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼AI提示和模型：改进LLMs在代码推荐、转换和测试生成等任务中给出的指令，以在未来的迭代中获得更好的结果。
- en: 'Optimize workflows: Streamline the automated conversion, build, test, and repair
    loops to reduce manual intervention and accelerate the process.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化工作流程：简化自动转换、构建、测试和修复循环，以减少人工干预并加快流程。
- en: 'Enhance testing strategies: Adapt and improve testing methodologies based on
    the types of issues discovered in previous modernization efforts.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增强测试策略：根据在之前的现代化工作中发现的问题类型，调整和改进测试方法。
- en: 'Update documentation and best practices: Capture the lessons learned and successful
    techniques in documentation that can be used to guide subsequent modernization
    projects.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新文档和最佳实践：在文档中捕捉到已学到的经验和成功的技术，这些可以用来指导后续的现代化项目。
- en: By actively incorporating these improvements, the repeatable modernization process
    becomes more efficient and effective over time. This allows organizations to tackle
    a larger volume of legacy modernization with increased speed and reduced risk,
    moving closer to a fully modernized digital landscape. The goal is to create a
    self-sustaining cycle where each completed modernization project contributes to
    making the next one smoother and more successful.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 通过积极采用这些改进，可重复的现代化过程随着时间的推移变得更加高效和有效。这使组织能够以更高的速度和更低的风险处理更大数量的遗留现代化，更接近完全现代化的数字景观。目标是创造一个自我维持的循环，其中每个完成的现代化项目都有助于使下一个项目更加顺畅和成功。
- en: To illustrate these principles and their real-world impact, consider the following
    case study.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这些原则及其现实世界的影响，可以考虑以下案例研究。
- en: '**AI-powered modernization transforms core banking systems**'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI驱动的现代化转型改变了核心银行系统**'
- en: A longstanding private bank faced the challenge of modernizing hundreds of legacy
    applications that had become a barrier to innovation. As part of a multi-year
    transformation initiative, the bank partnered with MongoDB to accelerate its modernization
    using GenAI-powered tooling and methodologies.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 一家历史悠久的私人银行面临着现代化数百个遗留应用程序的挑战，这些应用程序已成为创新的障碍。作为一项多年转型计划的一部分，该银行与MongoDB合作，利用GenAI驱动的工具和方法加速其现代化。
- en: 'The effort began with two of the bank’s most critical systems: its portfolio
    management platform and its online banking interface. MongoDB developed tailored
    AI tooling for the bank’s architecture, combining scripts, prompts, and migration
    logic adapted to its technology stack. GenAI was applied across multiple modernization
    tasks, including:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 该工作始于银行最关键的两大系统：其投资组合管理平台和其在线银行界面。MongoDB为银行的架构开发了定制的AI工具，结合了脚本、提示和适应其技术堆栈的迁移逻辑。GenAI被应用于多个现代化任务中，包括：
- en: Legacy code analysis and translation
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遗留代码分析和翻译
- en: Schema migration from relational models to MongoDB
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从关系型模型到MongoDB的架构迁移
- en: Data movement and transformation
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据移动和转换
- en: Middleware migration (from Java stacks to cloud-native runtimes)
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中间件迁移（从Java堆栈到云原生运行时）
- en: Functional test generation and automation
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能测试生成和自动化
- en: Working in tandem with MongoDB’s experts, the bank adopted a test-first, iterative
    approach. This preserved business logic, reduced risk, and allowed value to be
    delivered continuously throughout the project.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 与MongoDB的专家协同工作，银行采用了一种以测试为先、迭代的策略。这保留了业务逻辑，降低了风险，并使项目在整个过程中持续交付价值。
- en: 'The results were substantial:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是显著的：
- en: Code migration was up to 60 times faster than previous manual efforts
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码迁移比之前的手动工作快60倍
- en: Application migration accelerated by a factor of 20
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用迁移速度提高了20倍
- en: Regression testing dropped from days to hours
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回归测试从几天缩短到几小时
- en: Repetitive tasks were automated, freeing expert capacity and compressing timelines
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化重复性任务，释放专家资源并压缩时间表
- en: 'Several core principles contributed to the bank’s success:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 几个核心原则有助于银行的成功：
- en: A document-based data model aligned naturally with application design
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于文档的数据模型与应用设计自然对齐
- en: Automated test scaffolding preserved business logic and reduced human error
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化测试脚手架保留了业务逻辑并减少了人为错误
- en: Human-AI collaboration enabled faster delivery without sacrificing control
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人机协作使交付速度更快，同时不牺牲控制
- en: Incremental delivery supported early wins and broader adoption![](img/Spotlight_Icon.png)
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增量交付支持早期成功和更广泛的采用![突出图标](img/Spotlight_Icon.png)
- en: This case underscores the transformative potential of GenAI when paired with
    the right data platform, technical expertise, and delivery approach. What was
    once considered too risky or complex is now achievable at enterprise scale.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这个案例强调了GenAI与合适的数据平台、技术专长和交付方法相结合时的变革潜力。曾经被认为风险太大或过于复杂的事情，现在在企业规模上变得可行。
- en: 'This success story shows that when AI is paired with the right data model,
    expert oversight, and an iterative approach, modernization can be achieved at
    scale. While legacy transformation projects have historically failed at rates
    as high as 80–90%, these results demonstrate that this trend can be reversed through
    a combination of AI capabilities, proven methodologies, strong data foundations,
    and expert guidance This example has been anonymized for editorial clarity. To
    learn more, see: [https://mdb.link/private-bank-modernizes-legacy-banking-technology](https://mdb.link/private-bank-modernizes-legacy-banking-technology).'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这个成功案例表明，当人工智能与合适的数据模型、专家监督和迭代方法相结合时，可以大规模实现现代化。虽然遗留系统转型项目历史上失败率高达80-90%，但这些结果证明，通过人工智能能力、经过验证的方法、强大的数据基础和专家指导的组合，可以扭转这一趋势。此示例已被匿名化以增强编辑清晰度。了解更多信息，请参阅：[https://mdb.link/private-bank-modernizes-legacy-banking-technology](https://mdb.link/private-bank-modernizes-legacy-banking-technology)。
- en: Summary
  id: totrans-185
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Modernizing legacy systems represents one of the most challenging yet potentially
    rewarding initiatives an organization can undertake. While the risks are significant,
    with 80–90% of modernization projects failing due to extended timelines, leadership
    turnover, moving targets, and undocumented complexities, the cost of inaction
    continues to grow as legacy systems constrain business agility and innovation.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 现代化遗留系统是组织可以采取的最具挑战性但也是最有回报的举措之一。虽然风险很大，因为80-90%的现代化项目因延长的时间表、领导层变动、移动的目标和未记录的复杂性而失败，但采取不行动的成本持续增长，因为遗留系统限制了商业敏捷性和创新。
- en: AI offers powerful new capabilities to accelerate and de-risk the modernization
    journey, but it’s not a silver bullet. The non-deterministic nature of AI, its
    context limitations, and the continued need for human engineering judgment mean
    that AI works best as part of a comprehensive modernization approach that combines
    automated tools with human expertise.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能为加速和降低现代化旅程的风险提供了强大的新能力，但它不是万能的。人工智能的非确定性、其上下文限制以及持续需要人为工程判断意味着人工智能最好作为综合现代化方法的一部分，该方法结合了自动化工具和人类专业知识。
- en: MongoDB’s approach to modernization embodies this hybrid strategy, leveraging
    AI for system analysis, test generation, and code transformation while maintaining
    human oversight for architectural decisions and business logic validation. The
    methodology emphasizes an iterative, testing-first approach that reduces risk
    through small increments and continuous validation. By generating comprehensive
    tests before transformation and using closed-loop automation for build-test-repair
    cycles, organizations can modernize with greater confidence and speed.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB对现代化的方法体现了这种混合策略，利用人工智能进行系统分析、测试生成和代码转换，同时保持对架构决策和业务逻辑验证的人为监督。该方法强调迭代、测试优先的方法，通过小步骤和持续验证来降低风险。通过在转换前生成全面的测试，并使用闭环自动化进行构建-测试-修复周期，组织可以更有信心和速度地实现现代化。
- en: Starting with the right data foundation and moving beyond the limitations of
    relational databases to the flexibility and power of the document model, organizations
    can not only modernize their legacy systems but also position themselves for future
    innovation and growth. The document model’s natural alignment with modern application
    development patterns eliminates impedance mismatches and enables the diverse workloads
    that AI-powered applications demand.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 从正确的数据基础开始，并超越关系型数据库的限制，转向文档模型的灵活性和强大功能，组织不仅能够现代化其遗留系统，还能为未来的创新和增长定位自己。文档模型与现代化应用开发模式的自然对齐消除了阻抗不匹配，并满足了由人工智能驱动的应用程序所需求的各种工作负载。
- en: Throughout *Part 1, AI and Key Concepts*, we’ve explored the fundamental concepts,
    technologies, and approaches that enable AI-powered modernization. In *Part 2,
    Real-world case studies and implementations*, we’ll examine how AI is being applied
    across various industry verticals, beginning with a focus on manufacturing and
    motion in the next chapter. These case studies will demonstrate how the principles
    and methodologies discussed so far translate into tangible business outcomes and
    competitive advantages.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一部分“人工智能和关键概念”中，我们探讨了使人工智能驱动的现代化成为可能的基本概念、技术和方法。在第二部分“现实世界的案例研究和实施”中，我们将研究人工智能如何被应用于各个行业垂直领域，下一章将重点关注制造和运动。这些案例研究将展示所讨论的原则和方法如何转化为可衡量的商业成果和竞争优势。
