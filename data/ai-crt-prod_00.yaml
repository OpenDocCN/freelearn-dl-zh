- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Artificial intelligence is one of the most divisive technologies of our time,
    especially for creatives. If you believe the hype, it’ll replace all filmmakers
    and photographers within a couple of years, and nobody will ever create anything
    by hand again. But hype rarely translates to reality.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是我们这个时代最具争议的技术之一，尤其是对于创意人士来说。如果你相信炒作，它将在几年内取代所有电影制片人和摄影师，而且再也没有人会用手动创造任何东西。但炒作很少转化为现实。
- en: Instead, in this book, you’ll see how AI has the potential to help creatives
    become more creative. It is true that AI will perform some tasks that creatives
    might have once been given, but clients who don’t see the value of a human would
    have already been using templates and presets. When it comes to jobs that require
    creativity, humans still win.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，在这本书中，您将看到AI如何有可能帮助创意人士变得更加有创造力。确实，AI将执行一些创意人士曾经被分配的任务，但那些看不到人类价值的客户已经在使用模板和预设。当涉及到需要创造力的工作，人类仍然占上风。
- en: 'A creative person can, if they wish, augment their capabilities by using the
    right AI tools and avoiding others. A common refrain I hear among creatives is
    to describe a tool as “good AI” or “machine learning, but not AI,” but this distinction
    can be better expressed as **U****tility AI** or **A****utomation AI** versus
    **G****enerative AI** (more on this in [*Chapter 1*](Chapter_1.xhtml#_idTextAnchor014)):'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果创意人士愿意，可以通过使用正确的AI工具并避免使用其他工具来增强他们的能力。我在创意人士中经常听到的一个常见的说法是描述一个工具为“好的AI”或“机器学习，但不是AI”，但这种区别可以更好地表达为**实用AI**或**自动化AI**与**生成式AI**（更多内容见[*第一章*](Chapter_1.xhtml#_idTextAnchor014))：
- en: '**Utility AI**: Recognition, classification, and understanding'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实用AI**: 识别、分类和理解'
- en: '**Generative AI**: Creation of text, images, video, audio, and more'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成式AI**: 文本、图像、视频、音频等的创作'
- en: '**Automation AI**: Performing tasks humans usually would'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化AI**: 执行人类通常执行的任务'
- en: Some tasks are boring, tedious, or even impossible for a human to do well. Today,
    **U****tility AI** tools can help you perform a task, or, if it’s more predictable,
    **A****utomation AI** can do it for you. Few creatives want to select pixels one
    by one or trace outlines frame by frame, and even if an AI tool isn’t perfect,
    a human can often benefit from its help. Some jobs can be automated or made easier;
    others are best done by hand. It’s up to you.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 有些任务无聊、乏味，甚至对人类来说难以做好。今天，**实用AI**工具可以帮助你完成任务，或者，如果它更可预测，**自动化AI**可以为你完成。很少有创意人士愿意一个像素一个像素地选择像素，或者一帧一帧地追踪轮廓，即使AI工具并不完美，人类也常常能从它的帮助下受益。有些工作可以自动化或简化；其他工作最好手工完成。这取决于你。
- en: Even though **G****enerative AI** attracts most of the hate, that doesn’t mean
    it’s all bad; it depends on how you use it. While copyright and ethical concerns
    are real (see [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor035)), remember that
    in the development process, while you’re coming up with ideas, almost anything
    goes. Hollywood directors use soundtracks from other movies while they edit new
    ones, and mood boards at every level are filled with other people’s work. This
    isn’t a new concept, and if you do it right, it’s possible to use Generative AI
    to help develop ideas while humans create the finished product.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管**生成式AI**吸引了大部分的仇恨，但这并不意味着它全是坏的；这取决于你如何使用它。虽然版权和伦理问题确实是存在的（见[*第二章*](Chapter_2.xhtml#_idTextAnchor035)），但记住，在开发过程中，当你提出想法时，几乎任何事情都是可能的。好莱坞导演在编辑新电影时，会使用其他电影的配乐，每个级别的情绪板都充满了别人的作品。这不是一个新概念，如果你做得正确，使用生成式AI帮助开发想法，同时人类创造最终产品是可能的。
- en: To help you make sense of the huge number of tools and apps employing AI-powered
    features, I’ve taken a broad view here, testing as many web-based services and
    locally run apps as possible. While I have included step-by-step instructions
    for some of the better-hidden features in desktop apps, for easy-to-use websites,
    I’ve focused mostly on results.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您理解大量使用AI功能工具和应用程序，我在这里采取了广泛的视角，尽可能测试了尽可能多的基于网络的服务和本地运行的应用程序。虽然我已经为一些桌面应用程序中隐藏得较好的功能提供了逐步说明，但对于易于使用的网站，我主要关注结果。
- en: As this is a book primarily for non-technical creatives, most of the solutions
    examined here are public-facing apps and services. Enthusiasts and developers
    may wish to explore the world of open source models, but most designers aren’t
    coders, and you won’t need to code to follow the examples here.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这本书主要是为非技术创意人士编写的，因此这里检查的大多数解决方案都是面向公众的应用程序和服务。热衷者和开发者可能希望探索开源模型的世界，但大多数设计师不是编码者，您不需要编码就能遵循这里的示例。
- en: 'Throughout, I’ve tried to give an honest appraisal of how well these systems
    fulfill their promises when given real-world problems. While some just didn’t
    work well for me, they may work for you. Indeed, the speed of change in AI means
    those systems have probably changed since I tested them: some will have improved,
    some will be more expensive, and some may no longer exist.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个过程中，我试图诚实地评估这些系统在面临现实世界问题时实现其承诺的程度。虽然有些对我来说效果不佳，但它们可能对你有效。确实，AI变化的速度意味着这些系统在我测试它们之后可能已经发生了变化：一些可能会改进，一些可能会更昂贵，而一些可能已经不存在了。
- en: New models and new tools will continue to appear—some have come out between
    writing the chapters and this preface—and you should always be ready to test on
    your own. But always be wary of hype, because it’s possible for a solution to
    be technically impressive and still useless.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 新的模型和新的工具将继续出现——一些在撰写章节和前言之间已经出现——你应该总是准备好亲自测试。但始终要警惕炒作，因为一个解决方案可能在技术上令人印象深刻，但仍然无用。
- en: As you explore AI tools for creative professionals, you’ll be promised the world.
    Sometimes, you’ll be amazed at how quickly a boring job (such as transcription)
    can be performed. At other times, the juxtaposition of amazement and disappointment
    can be jarring, such as when I asked an AI to write a song about friends on holiday
    at the beach. It was amazing to be given 4 passable songs in 30 seconds, but disappointing
    (and hilarious) that 2 of the songs were from the perspective of a robot pool
    cleaner.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当你探索为创意专业人士设计的AI工具时，你会被许以世界。有时，你会对一项枯燥的工作（如转录）能如此迅速地完成感到惊讶。在其他时候，惊讶和失望的并置可能会令人震惊，例如当我要求AI写一首关于海滩度假朋友的歌时。在30秒内得到4首可接受的歌是令人惊讶的，但其中两首歌是从机器人泳池清洁工的角度来的，这既令人失望（又好笑）。
- en: 'Exploring these tools has been a wild and fascinating ride, and I’m sure it’s
    going to stay that way for some time to come. On your own travels, expect imperfection:
    take the good and discard the bad. But don’t let a robot replace your creativity.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 探索这些工具是一次疯狂而迷人的旅程，我相信它还将持续一段时间。在你自己的旅途中，预期会有不完美：取其精华，去其糟粕。但不要让机器人取代你的创造力。
- en: Who this book is for
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向的对象
- en: This book is for creative professionals who want to understand AI better, so
    they can use AI in their creative practice. It’s not a book to help anyone replace
    creative humans or their creativity.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是为希望更好地理解AI的创意专业人士所写，以便他们能在自己的创意实践中使用AI。这不是一本帮助任何人取代创意人类或其创造力的书。
- en: What this book covers
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor014), *The AI Story So Far*, introduces
    AI technologies, discusses how they work, and lists many tools you may wish to
    investigate further.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第1章*](Chapter_1.xhtml#_idTextAnchor014)，*迄今为止的AI故事*，介绍了AI技术，讨论了它们的工作原理，并列出了你可能希望进一步调查的许多工具。'
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor035), *Ethics*, considers the ethical
    and copyright issues around the use of AI.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第2章*](Chapter_2.xhtml#_idTextAnchor035)，*伦理*，考虑了围绕AI使用的伦理和版权问题。'
- en: '[*Chapter 3*](Chapter_3.xhtml#_idTextAnchor047), *Utility AI with Audio*, discusses
    transcription, beat matching, stem splitting, and audio cleanup tools.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第3章*](Chapter_3.xhtml#_idTextAnchor047)，*音频实用AI*，讨论了转录、节拍匹配、声部分割和音频清理工具。'
- en: '[*Chapter 4*](Chapter_4.xhtml#_idTextAnchor062), *Utility AI with Images and
    Video*, explores how to use AI tools to organize and classify your media, select
    people and objects, reframe, convert for stereoscopic delivery, and more.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第4章*](Chapter_4.xhtml#_idTextAnchor062)，*图像和视频实用AI*，探讨了如何使用AI工具来组织和分类你的媒体，选择人物和物体，重新构图，为立体放映转换，等等。'
- en: '[*Chapter 5*](Chapter_5.xhtml#_idTextAnchor096), *Utility AI with Text*, looks
    at summarizing, grammar, verification, and reformatting with regard to written
    content.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第5章*](Chapter_5.xhtml#_idTextAnchor096)，*文本实用AI*，探讨了关于书面内容的总结、语法、验证和重新格式化。'
- en: '[*Chapter 6*](Chapter_6.xhtml#_idTextAnchor113), *Generative AI with Text*,
    stays with text to look at rewriting it, citing other works, coming up with ideas,
    and translating. It also looks at using AI to help with accessibility needs.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](Chapter_6.xhtml#_idTextAnchor113)，*文本生成式AI*，专注于文本的重写、引用其他作品、提出想法和翻译。它还探讨了使用AI来帮助满足可访问性需求。'
- en: '[*Chapter 7*](Chapter_7.xhtml#_idTextAnchor125), *Generative AI with Images*,
    shows you how to manipulate existing images and create entirely new ones from
    text or image sources. It considers photos, vector art, and 3D models, as well
    as mood boards and ideation.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](Chapter_7.xhtml#_idTextAnchor125)，*使用图像的生成式AI*，向您展示了如何从现有图像中操作并创建完全由文本或图像源生成的新图像。它考虑了照片、矢量艺术、3D模型，以及情绪板和创意。'
- en: '[*Chapter 8*](Chapter_8.xhtml#_idTextAnchor140), *Generative AI with Video*,
    takes an honest look at how clips can be extended and created from text, images,
    or other videos, as well as how to transform existing videos into something entirely
    new.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](Chapter_8.xhtml#_idTextAnchor140)，*使用视频的生成式AI*，诚实地探讨了如何从文本、图像或其他视频中扩展和创建剪辑，以及如何将现有视频转变为全新的内容。'
- en: '[*Chapter 9*](Chapter_9.xhtml#_idTextAnchor157), *Generative AI with Audio*,
    explores the world of synthetic audio, including sound effects, music, speech,
    voice cloning, and replacing part of an existing recording, along with audio translation.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](Chapter_9.xhtml#_idTextAnchor157)，*使用音频的生成式AI*，探讨了合成音频的世界，包括音效、音乐、语音、声音克隆以及替换现有录音的部分，以及音频翻译。'
- en: '[*Chapter 10*](Chapter_10.xhtml#_idTextAnchor170), *Automation AI with Images*,
    shows you several tools that use AI to perform tasks on your behalf, including
    culling images, retouching, and performing other processing tasks. You will also
    see how to use AI to write scripts to help with design tasks.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](Chapter_10.xhtml#_idTextAnchor170)，*使用图像的自动化AI*，向您展示了几个使用AI为您代劳执行任务的工具，包括删除图片、修图以及其他处理任务。您还将了解如何使用AI编写脚本以帮助设计任务。'
- en: '[*Chapter 11*](Chapter_11.xhtml#_idTextAnchor183), *Automation AI with Video*,
    looks at several tools that automate video editing, from simple silence removal,
    through simpler editing tools, to full prompt-based editing assistants.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](Chapter_11.xhtml#_idTextAnchor183)，*使用视频的自动化AI*，探讨了几个自动化视频编辑的工具，从简单的静音移除，到更简单的编辑工具，再到基于提示的全编辑助手。'
- en: '[*Chapter 12*](Chapter_12.xhtml#_idTextAnchor190), *Automation AI with Digital
    Assistants and Agents*, takes a look at how digital assistants are likely to develop
    further, at AI-powered wearables and browsers, and at the potential of agents.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第12章*](Chapter_12.xhtml#_idTextAnchor190)，*使用数字助手和代理的自动化AI*，探讨了数字助手可能如何进一步发展，AI驱动的可穿戴设备和浏览器，以及代理的潜力。'
- en: To get the most out of this book
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 要充分利用这本书
- en: The more creative areas you’re familiar with (such as photography, design, retouching,
    video editing, and writing), the more useful you’ll find this book, but the book
    has been written with a general audience in mind.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 您越熟悉更具创意的领域（例如摄影、设计、修图、视频编辑和写作），您会发现这本书越有用，但本书的编写是以普通读者为对象的。
- en: Most tools in this book are cloud-based, while some can be run on a local computer.
    A modern Mac will be able to run all the local apps mentioned in this book; a
    modern PC will be able to run most of them.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的大多数工具都是基于云的，而一些可以在本地计算机上运行。一台现代Mac可以运行本书中提到的所有本地应用程序；一台现代PC可以运行其中大多数。
- en: You don’t need a custom PC with a powerful graphics card, and you don’t need
    to know how to code.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要配备强大显卡的定制PC，也不需要知道如何编码。
- en: Download the color images
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下载彩色图像
- en: 'The free PDF version of the book includes color images of the screenshots/diagrams
    used in this book. You can download it here: [https://packt.link/gbp/9781806025817](https://packt.link/gbp/9781806025817).'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 书的免费PDF版本包含了本书中使用的截图/图表的彩色图像。您可以从这里下载：[https://packt.link/gbp/9781806025817](https://packt.link/gbp/9781806025817)。
- en: Conventions used
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: '`CodeInText`: Indicates prompts and other typed input. For example: “I’m just
    going to ask the tool to do it in plain English: `Remove the people from this
    image`.”'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '`CodeInText`：表示提示和其他输入。例如：“我将要求工具用普通英语执行：`从这张图片中移除人物`。”'
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this: “Today, the existing tools are augmented by **Generative Remove** and **Generative
    Fill**, two fully generative features that draw on Adobe Stock images licensed
    for the purpose.”'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要单词或屏幕上看到的单词。例如，菜单或对话框中的单词在文本中显示为：“今天，现有的工具通过**生成式移除**和**生成式填充**这两个完全生成式功能得到增强，这些功能利用了Adobe
    Stock授权的图像。”'
- en: Warnings or important notes appear like this.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要注意事项看起来像这样。
- en: Tips and tricks appear like this.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士和技巧看起来像这样。
- en: Get in touch
  id: totrans-42
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 联系我们
- en: Feedback from readers is always welcome.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎读者反馈。
- en: '**General feedback**: If you have questions about any aspect of this book or
    have any general feedback, please email us at `customercare@packt.com` and mention
    the book’s title in the subject of your message.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般反馈**：如果您对本书的任何方面有疑问或有任何一般反馈，请通过`customercare@packt.com`给我们发送电子邮件，并在邮件主题中提及本书的标题。'
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
    content, mistakes do happen. If you have found a mistake in this book, we would
    be grateful if you reported this to us. Please visit [http://www.packt.com/submit-errata](http://www.packt.com/submit-errata),
    click **Submit Errata**, and fill in the form.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**勘误表**：尽管我们已经尽一切努力确保内容的准确性，但错误仍然可能发生。如果您在此书中发现错误，我们将不胜感激，如果您能向我们报告此错误。请访问[http://www.packt.com/submit-errata](http://www.packt.com/submit-errata)，点击**提交勘误**，并填写表格。'
- en: '**Piracy**: If you come across any illegal copies of our works in any form
    on the internet, we would be grateful if you would provide us with the location
    address or website name. Please contact us at `copyright@packt.com` with a link
    to the material.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**盗版**：如果您在互联网上以任何形式发现我们作品的非法副本，如果您能提供位置地址或网站名称，我们将不胜感激。请通过`copyright@packt.com`与我们联系，并提供材料的链接。'
- en: '**If you are interested in becoming an author**: If there is a topic that you
    have expertise in and you are interested in either writing or contributing to
    a book, please visit [http://authors.packt.com/](http://authors.packt.com/).'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
