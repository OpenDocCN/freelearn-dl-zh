- en: '1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: Generative Artificial Intelligence (GAI) in Accounting
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 会计中的生成式人工智能（GAI）
- en: “It’s slow, it’s buggy, it doesn’t do a lot of things very well, but neither
    did the very earliest computers.”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: “它很慢，有很多bug，做很多事情都不太好，但最早的计算机也是如此。”
- en: – Sam Altman, OpenAI CEO and co-founder
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: – Sam Altman，OpenAI首席执行官和联合创始人
- en: The field of accounting, traditionally perceived as a bastion of manual processes
    and number crunching, is witnessing a transformative revolution – the advent of
    **Generative Artificial Intelligence** (**GAI**). This groundbreaking technology
    is not just another tool in the accountant’s arsenal; it also represents a paradigm
    shift in how financial data is processed, analyzed, and utilized. At the heart
    of this transformation is the ability of GAI to automate complex tasks, glean
    deeper insights from vast datasets, and enhance decision-making processes. In
    this chapter, we embark on a journey to uncover the intricate workings, applications,
    and profound impact of GAI in the realm of accounting.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 会计领域，传统上被视为手工流程和数字处理的堡垒，正见证一场变革性的革命——**生成式人工智能**（**GAI**）的兴起。这项开创性的技术不仅仅是会计人员武器库中的另一个工具；它还代表着处理、分析和利用财务数据方式的范式转变。这一变革的核心是GAI自动化复杂任务、从大量数据集中获得更深入的见解以及增强决策过程的能力。在本章中，我们将踏上探索GAI在会计领域复杂运作、应用和深远影响的旅程。
- en: We begin by tracing the origins and evolution of AI in the context of accounting,
    providing a historical perspective that highlights the significant milestones
    leading to the current state of AI technology. The journey from the earliest computers,
    which were slow and limited in capability, to the present-day marvels of AI mirrors
    the evolution of accounting practices themselves.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先追溯了AI在会计背景下的起源和演变，提供了一个历史视角，突出了导致当前AI技术状态的显著里程碑。从最初缓慢且功能有限的计算机到当今AI的奇迹，这一旅程反映了会计实践本身的演变。
- en: As we delve deeper, we will explore the technical requirements to harness GAI
    in accounting. This includes not just the hardware and software but also the mindset
    needed to effectively integrate AI into traditional accounting workflows. A critical
    aspect of our exploration is understanding how GAI, particularly tools such as
    ChatGPT and its sister **Large Language Models** (**LLMs**), is making waves in
    the accounting sector. From the nuances of their language processing capabilities
    to the creative potential they unlock, these AI tools are redefining the boundaries
    of what’s possible in accounting.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进一步深入，我们将探讨在会计中利用GAI的技术要求。这不仅包括硬件和软件，还包括有效整合AI到传统会计工作流程所需的心态。我们探索的关键方面之一是理解GAI，特别是像ChatGPT及其姐妹**大型语言模型**（**LLMs**）这样的工具，如何在会计领域掀起波澜。从它们语言处理能力的细微差别到它们所释放的创造性潜力，这些AI工具正在重新定义会计领域可能性的边界。
- en: But it’s not just about the capabilities of GAI. This chapter also addresses
    common fears and misconceptions about AI, offering a balanced view of its potential
    benefits and limitations. We aim to demystify AI, moving beyond the hype to a
    grounded understanding of its practical applications and ethical considerations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但这不仅仅关乎GAI的能力。本章还讨论了关于AI的常见恐惧和误解，提供了一个平衡的观点，探讨了其潜在的好处和局限性。我们旨在揭开AI的神秘面纱，超越炒作，深入理解其实际应用和伦理考量。
- en: As we proceed, we will cover a range of topics, including the roles of AI in
    public and private accounting tax departments, its implications for society at
    large, and the skills accountants need to thrive in this new AI-driven landscape.
    This chapter serves as your foundational guide to understanding GAI’s transformative
    role in accounting. It’s an exploration of a technology that is not just changing
    how we work with numbers but also reshaping the very fabric of the accounting
    profession.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续前进的过程中，我们将涵盖一系列主题，包括AI在公共和私营会计税务部门中的作用、其对社会的整体影响，以及会计师在新的AI驱动环境中成功所需的技能。本章作为您理解GAI在会计中变革性角色的基础指南。它是对一种技术的探索，这种技术不仅正在改变我们处理数字的方式，而且正在重塑会计职业的实质。
- en: Prerequisites
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前提条件
- en: The integration of GAI into the accounting sector necessitates a robust technical
    infrastructure, encompassing a range of tools and software designed to harness
    AI’s potential. This technology, while powerful, requires the right environment
    to thrive and deliver its full capabilities.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 将GAI整合到会计领域需要强大的技术基础设施，包括一系列旨在利用AI潜力的工具和软件。这项技术虽然强大，但需要合适的环境才能蓬勃发展并发挥其全部功能。
- en: 'The essential tools for effective AI application are as follows:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的AI应用的基本工具如下：
- en: '**Capable web browsers**: The first step in accessing AI tools such as ChatGPT
    is through a web browser. Modern browsers such as Chrome, Edge, Firefox, or Safari
    are essential for seamless interaction with AI platforms.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**功能强大的网络浏览器**：访问AI工具如ChatGPT的第一步是通过网络浏览器。现代浏览器如Chrome、Edge、Firefox或Safari对于与AI平台的无缝互动至关重要。'
- en: '**AI platform access**: Registration and access to AI platforms such as OpenAI
    are crucial. For instance, OpenAI’s website provides access to various versions
    of GAI tools, including the widely used ChatGPT models.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI平台访问**：注册和访问AI平台如OpenAI至关重要。例如，OpenAI的网站提供了各种GAI工具的访问权限，包括广泛使用的ChatGPT模型。'
- en: '**Intellectual curiosity**: Beyond technical tools, a mindset of intellectual
    curiosity is fundamental. Engaging with AI technology requires an openness to
    explore, experiment, and adapt to new ways of processing and analyzing data.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**求知欲**：除了技术工具之外，求知欲的心态是基础。与AI技术互动需要开放的心态去探索、实验，并适应新的数据处理和分析方式。'
- en: 'The following are the AI-enabled accounting software that will be required:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 下述是需要的AI赋能的会计软件：
- en: '**Automated data processing tools**: AI-enhanced accounting software, such
    as QuickBooks with its AI features, automates mundane tasks such as data entry,
    categorization, and reconciliations, significantly reducing manual workload.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化数据处理工具**：如QuickBooks等增强AI的会计软件自动化了诸如数据录入、分类和对账等日常任务，显著减少了人工工作量。'
- en: '**Advanced analysis and reporting**: Software such as Xero, integrated with
    AI, offers advanced data analytics capabilities. It enables accountants to extract
    deeper insights from financial data, produce comprehensive reports, and provide
    strategic advice based on data-driven predictions.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级分析和报告**：如Xero等与AI集成的软件提供了高级数据分析能力。它使会计师能够从财务数据中提取更深入的见解，生成全面的报告，并根据数据驱动的预测提供战略建议。'
- en: 'The data analysis tools are as follows:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析工具如下：
- en: '**Predictive analytics**: Tools such as IBM Cognos Analytics employ AI to perform
    predictive analysis, offering forward-looking insights that are crucial for strategic
    planning and decision-making.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测分析**：如IBM Cognos Analytics等工具使用AI进行预测分析，提供前瞻性的见解，这对于战略规划和决策至关重要。'
- en: '**Data visualization**: AI-powered data visualization tools, such as Tableau,
    transform complex datasets into understandable and actionable insights. These
    tools are crucial for accountants to communicate financial data effectively.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据可视化**：AI驱动的数据可视化工具，如Tableau，将复杂的数据集转化为可理解且可操作的见解。这些工具对于会计师有效地传达财务数据至关重要。'
- en: 'The data management systems are as follows:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 数据管理系统如下：
- en: '**Secure cloud storage**: Cloud storage solutions such as AWS or Microsoft
    Azure, equipped with AI, offer secure and scalable options to store vast amounts
    of financial data.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全云存储**：配备AI的云存储解决方案，如AWS或Microsoft Azure，提供安全且可扩展的选项，用于存储大量财务数据。'
- en: '**Data security and compliance**: AI integration also demands robust security
    protocols. Encryption, secure data transfer, and compliance with standards such
    as the General Data Protection Regulation (GDPR) and California Consumer Privacy
    Act (CCPA) are critical components of a comprehensive AI-based accounting system.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据安全和合规性**：AI整合还要求强大的安全协议。加密、安全数据传输以及符合通用数据保护条例（GDPR）和加州消费者隐私法案（CCPA）等标准是全面基于AI的会计系统的关键组成部分。'
- en: AI innovations in accounting – automated calculations and predictive analysis
  id: totrans-24
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 会计领域的AI创新——自动化计算和预测分析
- en: The advent of AI in accounting has marked a significant leap forward in how
    financial data is processed and analyzed. Central to this advancement is the role
    of AI in automating complex calculations and providing predictive analytics, two
    areas that are profoundly reshaping the landscape of accounting.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 会计领域人工智能的出现标志着在处理和分析财务数据方面的一个重大飞跃。这一进步的核心是人工智能在自动化复杂计算和提供预测分析中的作用，这两个领域正在深刻地重塑会计领域。
- en: Automating complex calculations
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动化复杂计算
- en: Discover how automating complex calculations can streamline processes, increase
    accuracy, and save valuable time, transforming the way data is analyzed and utilized.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 了解如何通过自动化复杂计算来简化流程、提高准确性和节省宝贵时间，从而改变数据分析和利用的方式。
- en: '**Efficiency and accuracy**: AI has transformed traditional accounting calculations
    from being time-consuming and error-prone to efficient and highly accurate. Tools
    powered by AI algorithms can handle intricate calculations, such as tax estimations,
    depreciation schedules, and financial projections, with remarkable speed and precision.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率和准确性**：人工智能已经将传统的会计计算从耗时且易出错转变为高效且高度准确。由人工智能算法驱动的工具可以以惊人的速度和精度处理复杂的计算，例如税收估算、折旧计划以及财务预测。'
- en: '**Adaptive algorithms**: Modern AI systems in accounting software can adapt
    to changing financial environments and regulations. They continuously learn from
    new data, ensuring that calculations stay accurate and compliant with current
    tax laws and financial reporting standards.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自适应算法**：会计软件中的现代人工智能系统可以适应不断变化的财务环境和法规。它们从新的数据中持续学习，确保计算保持准确并符合当前的税法以及财务报告标准。'
- en: '**Error reduction**: The automation of calculations significantly reduces the
    risk of human error. For businesses with complex financial structures, this ensures
    compliance and accuracy in their financial reporting, which is critical for both
    internal assessments and regulatory adherence.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误减少**：计算自动化的实施显著降低了人为错误的风险。对于具有复杂财务结构的企业来说，这确保了其财务报告的合规性和准确性，这对于内部评估和监管遵守至关重要。'
- en: Providing predictive analytics
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提供预测分析
- en: '**Forecasting and planning**: AI’s predictive analytics capabilities are a
    game-changer for financial forecasting and planning. By analyzing historical data
    patterns, AI can predict future financial scenarios, helping accountants and business
    leaders make more informed strategic decisions.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测和规划**：人工智能的预测分析能力是财务预测和规划的一个游戏改变者。通过分析历史数据模式，人工智能可以预测未来的财务场景，帮助会计师和商业领导者做出更明智的战略决策。'
- en: '**Insightful data interpretation**: AI goes beyond mere data processing; it
    interprets data to provide actionable insights. This involves identifying financial
    trends, potential risks, and opportunities, thereby guiding businesses in optimizing
    their financial performance.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深入的数据解读**：人工智能不仅超越了单纯的数据处理，它还能解读数据以提供可操作的见解。这包括识别金融趋势、潜在风险和机遇，从而指导企业在优化其财务表现方面。'
- en: '**Customized financial advice**: AI algorithms can tailor their analyses to
    specific business needs. This means that the financial advice provided by AI is
    not generic but customized to the unique financial situation of each business,
    leading to more effective tax strategies and financial planning.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定制化财务建议**：人工智能算法可以根据特定业务需求定制其分析。这意味着人工智能提供的财务建议不是通用的，而是根据每个企业的独特财务状况定制的，从而带来更有效的税收策略和财务规划。'
- en: 'The following table provides an overview of the impact of AI on accounting:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格概述了人工智能对会计的影响：
- en: '| **Area** **of impact** | **Description of the** **AI innovation** | **Impact
    on** **accounting practice** |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| **影响领域** | **人工智能创新的描述** | **对会计实践的影响** |'
- en: '| Automated data processing | AI algorithms automate tasks such as data entry
    and categorization, reducing manual effort. | Increases efficiency, reduces errors,
    and allows accountants to focus on higher-level tasks. |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 自动数据处理 | 人工智能算法自动化数据输入和分类等任务，减少人工工作量。 | 提高效率，减少错误，并使会计师能够专注于更高层次的任务。 |'
- en: '| Predictive analysis | AI uses historical data to predict future financial
    scenarios and trends. | Enhances financial planning and strategic decision-making
    with data-driven insights. |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 预测分析 | 人工智能使用历史数据来预测未来的财务场景和趋势。 | 通过数据驱动的见解，增强财务规划和战略决策。 |'
- en: '| Enhanced compliance monitoring | AI systems continuously monitor financial
    transactions for compliance with regulations. | Improves compliance accuracy and
    reduces the risk of regulatory penalties. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 增强合规监控 | AI系统持续监控财务交易，以确保符合法规。 | 提高合规准确性，降低监管处罚的风险。|'
- en: '| Advanced reporting capabilities | AI tools analyze financial data and generate
    comprehensive reports. | Provides deeper insights and clearer financial pictures
    for businesses and stakeholders. |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 高级报告功能 | AI工具分析财务数据并生成综合报告。 | 为企业和利益相关者提供更深入的见解和更清晰的财务状况。|'
- en: '| Personalized financial advice | AI customizes financial advice based on individual
    business needs and scenarios. | Tailors financial strategies to specific company
    contexts, leading to more effective outcomes. |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 定制化财务建议 | AI根据个人业务需求和场景定制财务建议。 | 根据特定公司环境定制财务策略，导致更有效的结果。|'
- en: Table 1.1 - The impact of AI on accounting
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 表1.1 - AI对会计的影响
- en: In this tabular overview, we reviewed the impact of AI on accounting, including
    AI innovations and their impact. In the upcoming section, we will take a deep
    dive into case studies and real-world applications.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个表格概览中，我们回顾了AI对会计的影响，包括AI创新及其影响。在接下来的部分，我们将深入探讨案例研究和实际应用。
- en: Case studies and real-world applications
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 案例研究和实际应用
- en: Now, we will analyze some case studies and real-world applications that will
    help us understand the impact of AI.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将分析一些案例研究和实际应用，这将帮助我们了解AI的影响。
- en: A small business application of AI in action – revolutionizing Brewed Awakenings’
    finances with QuickBooks Online
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI在小型企业中的应用实例 - 使用QuickBooks Online革新Brewed Awakenings的财务
- en: 'Consider *Brewed Awakenings*, a cozy coffee shop in a vibrant neighborhood.
    As a small business with limited staff, managing finances, especially tax planning
    and compliance, was always a significant challenge. Here’s how AI helped them
    overcome it:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一下*Brewed Awakenings*，一家位于充满活力的社区中的温馨咖啡馆。作为一个员工数量有限的小型企业，管理财务，尤其是税务规划和合规，一直是一个重大的挑战。以下是AI如何帮助他们克服这一挑战的例子：
- en: '**The implementation of QuickBooks Online**: Brewed Awakenings implemented
    QuickBooks Online, an AI-powered accounting software widely used by small businesses.
    This software offers automated expense tracking, invoice management, and streamlined
    tax calculations.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**QuickBooks Online的实施**：Brewed Awakenings实施了QuickBooks Online，这是一款由AI驱动的会计软件，被众多小型企业广泛使用。该软件提供自动费用跟踪、发票管理和简化的税务计算。'
- en: '**Efficiency and accuracy in financial management**: The adoption of QuickBooks
    Online led to significant improvements in efficiency. The software’s AI capabilities
    allowed for the automatic categorization of expenses and seamless integration
    with bank and credit card transactions, reducing manual data entry and errors.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**财务管理中的效率和准确性**：QuickBooks Online的采用导致了效率的显著提高。该软件的AI功能允许自动分类费用，并与银行和信用卡交易无缝集成，减少了手动数据输入和错误。'
- en: '**Strategic financial insights**: One of the standout features of QuickBooks
    Online is its ability to provide predictive insights. The AI algorithms analyzed
    the coffee shop’s financial data to forecast cash flow trends and identify potential
    financial risks, aiding in more informed decision-making.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略财务见解**：QuickBooks Online的一个突出特点是它提供预测性见解的能力。AI算法分析了咖啡馆的财务数据，预测现金流趋势和识别潜在财务风险，从而有助于更明智的决策。'
- en: '**Enhanced tax planning and compliance**: The software’s tax calculation tools
    were particularly beneficial. QuickBooks Online helped the coffee shop accurately
    estimate tax liabilities, keep track of deductible expenses, and stay compliant
    with changing tax laws.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强税务规划和合规**：该软件的税务计算工具特别有益。QuickBooks Online帮助咖啡馆准确估计税务负债，跟踪可抵扣费用，并保持与不断变化的税法的合规性。'
- en: '**Outcome and impact**: Integrating QuickBooks Online transformed Brewed Awakenings’
    approach to financial management. The time saved on accounting tasks was redirected
    toward customer service and business growth strategies. The coffee shop not only
    experienced an increase in operational efficiency but also gained valuable financial
    insights, enabling better strategic planning and financial health.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果和影响**：整合QuickBooks Online改变了Brewed Awakenings的财务管理方式。在会计任务上节省的时间被重新分配到客户服务和业务增长策略上。这家咖啡馆不仅提高了运营效率，还获得了宝贵的财务见解，从而实现了更好的战略规划和财务健康。'
- en: A small business application – AI’s impact on Cityscape Consulting
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 小型商业应用 – AI对城市景观咨询公司的影响
- en: 'Consider the case of *Cityscape Consulting*, a small architectural firm specializing
    in urban design. With a lean team and a focus on innovative projects, managing
    the firm’s finances, especially budgeting, accounting, and tax compliance, was
    a significant challenge. Here’s how AI helped them overcome it:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一下*城市景观咨询公司*的案例，这是一家专注于城市设计的中小型建筑设计公司。凭借精简的团队和创新项目的重点，管理公司的财务，尤其是预算、会计和税务合规，是一个重大的挑战。以下是AI如何帮助他们克服这一挑战的：
- en: '**Implementation of Xero – AI-powered accounting software**: To streamline
    its financial processes, Cityscape Consulting implemented Xero, an AI-powered
    accounting software tailored for small businesses. Known for its intuitive interface
    and smart features, Xero was an ideal choice for the firm’s dynamic needs.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施Xero – AI驱动的会计软件**：为了简化其财务流程，城市景观咨询公司实施了Xero，这是一款针对小型企业的AI驱动会计软件。以其直观的界面和智能功能而闻名，Xero是公司动态需求的理想选择。'
- en: '**Enhancements in efficiency** **and accuracy**:'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率和准确性的提升**：'
- en: '**Automated financial tasks**: Xero’s AI capabilities automated several key
    accounting tasks. This included instant bank transaction imports, smart categorization
    of expenses, and reconciliations. This automation drastically reduced manual entry
    and the potential for human error.'
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化财务任务**：Xero的AI功能自动化了几个关键的会计任务。这包括即时银行交易导入、智能分类费用和核对。这种自动化大大减少了手动输入和人为错误的可能性。'
- en: '**Real-time financial overview**: The software provided a real-time view of
    the firm’s cash flow and financial health. With all financial data centralized,
    the team could access up-to-date information for quick decision-making.'
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时财务概览**：该软件提供了公司现金流和财务状况的实时视图。由于所有财务数据都集中在一起，团队可以访问最新的信息，以便快速做出决策。'
- en: '**Improved decision-making and** **strategic planning**:'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进决策和战略规划**：'
- en: '**Predictive financial insights**: Xero’s AI-driven analytics offered predictive
    insights into the firm’s financial performance. This included forecasting future
    cash flow based on past trends, which was crucial for strategic budgeting and
    project planning.'
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测性财务洞察**：Xero的AI驱动分析为公司的财务表现提供了预测性洞察。这包括基于过去趋势预测未来的现金流，这对于战略预算和项目规划至关重要。'
- en: '**Tailored business advice**: The AI in Xero analyzed Cityscape Consulting’s
    financial data to provide tailored advice. It identified cost-saving opportunities
    and tax deduction suggestions, alerting the firm to potential financial pitfalls.'
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定制化商业建议**：Xero中的AI分析了城市景观咨询公司的财务数据，以提供定制化建议。它识别了节省成本的机遇和税收减免建议，提醒公司潜在的财务陷阱。'
- en: '**Streamlining tax processes and compliance**: Xero simplified complex tax
    processes, ensuring that Cityscape Consulting stayed compliant with the latest
    tax regulations. Automated tax calculations and easy tax return filing reduced
    the stress and time involved in meeting tax obligations.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化税务流程和合规性**：Xero简化了复杂的税务流程，确保城市景观咨询公司符合最新的税务法规。自动化的税务计算和简单的税务申报减少了满足税务义务的压力和时间。'
- en: '**The outcome and impact on** **the business**:'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果和业务影响**：'
- en: '**Transformed financial management**: The integration of Xero transformed Cityscape
    Consulting’s approach to financial management. The firm experienced a notable
    increase in efficiency, allowing the team to devote more time to client projects
    and business growth.'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**财务管理的转型**：Xero的集成改变了城市景观咨询公司对财务管理的看法。公司效率显著提高，使团队能够将更多时间投入到客户项目和业务增长上。'
- en: '**Enhanced decision-making**: The strategic insights provided by Xero’s AI
    capabilities empowered the firm to make better-informed financial decisions. This
    led to more effective budget management, improved project profitability, and a
    stronger financial foundation for future growth.'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强决策能力**：Xero的AI功能提供的战略洞察使公司能够做出更明智的财务决策。这导致了更有效的预算管理、项目盈利能力的提升以及未来增长的更坚实的财务基础。'
- en: A large corporation application – AI at GlobalTech Enterprises
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型公司应用 – 全球科技企业中的AI
- en: 'In a large corporation such as *GlobalTech Enterprises*, an international technology
    conglomerate, accounting and financial management are inherently complex. The
    corporation faces challenges such as managing finances across different countries,
    complying with diverse tax laws, and handling large volumes of transactions. Here’s
    how AI helped them overcome it:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在像 *GlobalTech Enterprises* 这样的大型跨国科技公司中，会计和财务管理本身就很复杂。该企业面临着管理不同国家的财务、遵守不同的税法以及处理大量交易等挑战。以下是人工智能如何帮助他们克服这些挑战的说明：
- en: '**The integration of IBM Watson in financial operations**: GlobalTech Enterprises
    integrated IBM Watson, an advanced AI platform known for its deep learning capabilities
    and natural language processing. Watson was employed to handle and analyze the
    enormous volume of financial data generated across various global subsidiaries.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IBM Watson 在财务运营中的整合**：GlobalTech Enterprises 整合了 IBM Watson，这是一个以其深度学习能力和自然语言处理而闻名的先进人工智能平台。Watson
    被用于处理和分析全球子公司产生的庞大财务数据量。'
- en: '**Addressing complex** **accounting scenarios**:'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决复杂的会计场景**：'
- en: '**Automated international compliance**: Watson’s AI algorithms were programmed
    to understand and comply with international tax laws and regulations. This automation
    ensured accurate financial reporting across different jurisdictions and reduced
    the risk of non-compliance.'
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化的国际合规性**：Watson 的人工智能算法被编程以理解和遵守国际税法和法规。这种自动化确保了在不同司法管辖区内的准确财务报告，并降低了违规风险。'
- en: '**Predictive financial modeling**: IBM Watson provided predictive modeling
    capabilities, allowing GlobalTech Enterprises to forecast financial trends, market
    shifts, and potential risks on a global scale. This helped in strategic financial
    planning and investment decision-making.'
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测性财务建模**：IBM Watson 提供预测建模能力，使 GlobalTech Enterprises 能够预测全球范围内的财务趋势、市场变化和潜在风险。这有助于战略性的财务规划和投资决策。'
- en: '**Efficient transaction processing**: The AI system streamlined transaction
    processing, handling everything from invoices to inter-company transfers efficiently.
    This not only improved accuracy but also freed up valuable time for the finance
    team to focus on strategic tasks.'
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效的交易处理**：人工智能系统简化了交易处理，从发票到公司间转账都能高效处理。这不仅提高了准确性，还让财务团队能够有更多时间专注于战略任务。'
- en: '**Ethical and** **regulatory considerations**:'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**伦理和监管考量**：'
- en: '**Protecting sensitive information**: In an AI-driven environment, especially
    in a large corporation such as GlobalTech Enterprises, protecting sensitive financial
    data is paramount. Watson ensured strict adherence to data privacy standards such
    as GDPR and CCPA, employing robust encryption and secure data handling practices.'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保护敏感信息**：在以人工智能驱动的环境中，尤其是在像 GlobalTech Enterprises 这样的大型企业中，保护敏感的财务数据至关重要。Watson
    确保严格遵守数据隐私标准，如 GDPR 和 CCPA，采用强大的加密和安全的处理数据实践。'
- en: '**Regular audits and compliance checks**: Continuous monitoring and regular
    audits of the AI system were conducted to ensure compliance with evolving data
    privacy laws and corporate governance standards. This included vulnerability checks
    and updates to security protocols.'
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期审计和合规检查**：对人工智能系统进行持续监控和定期审计，以确保符合不断变化的数据隐私法律和企业治理标准。这包括漏洞检查和安全协议的更新。'
- en: '**Ethical** **AI usage**:'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**伦理人工智能的使用**：'
- en: '**Transparency in AI operations**: Ensuring transparency in how AI algorithms
    process and analyze data was crucial. This transparency helped maintain trust
    among stakeholders and ensured that financial decisions were made on an ethical
    basis.'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能操作的透明度**：确保人工智能算法处理和分析数据的方式透明至关重要。这种透明度有助于维护利益相关者的信任，并确保财务决策基于伦理基础。'
- en: '**Bias and fairness in AI**: GlobalTech Enterprises ensured that its AI system
    was free from biases, particularly in areas such as credit risk assessment and
    fraud detection. Regular reviews and updates were made to the AI algorithms to
    ensure fairness and accuracy in all financial processes.'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能中的偏差与公平性**：GlobalTech Enterprises 确保其人工智能系统无偏见，特别是在信用风险评估和欺诈检测等领域的偏见。该企业定期审查和更新人工智能算法，以确保所有金融流程的公平性和准确性。'
- en: As we have analyzed the case studies, let’s prepare for an AI-driven future
    with accounting by delving deep into the factors, which we will discuss in the
    following section.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分析案例研究，让我们为会计领域的人工智能驱动未来做好准备，深入探讨以下章节中将要讨论的因素。
- en: Preparing for an AI-driven future in accounting
  id: totrans-80
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为会计领域的AI驱动未来做准备
- en: We need the necessary skills and training, and we also need to implement AI
    in accounting departments for an AI-driven future.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要必要的技能和培训，并且还需要在会计部门实施AI，以实现AI驱动的未来。
- en: The necessary skills and training
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 必要的技能和培训
- en: As the accounting profession rapidly evolves with the integration of AI, accountants
    need to equip themselves with a new set of skills and undergo specialized training.
    This preparation is crucial for thriving in an AI-driven environment, where the
    fusion of technological savvy and traditional accounting expertise is key.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 随着会计职业与AI的融合迅速发展，会计师需要装备自己一套新技能并接受专业培训。这种准备对于在AI驱动环境中蓬勃发展至关重要，在这个环境中，技术敏锐性和传统会计专业知识相结合是关键。
- en: A fundamental understanding of AI and machine learning
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对AI和机器学习的基本理解
- en: Gaining a fundamental understanding of AI and machine learning is crucial for
    navigating and leveraging the advancements of the modern technological era.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 获得AI和机器学习的基本理解对于导航和利用现代技术时代的进步至关重要。
- en: '**AI literacy**: Accountants must have a basic understanding of AI, including
    how machine learning algorithms work and how AI systems process and analyze data.
    This foundational knowledge is crucial for effectively leveraging AI tools in
    accounting practices.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI素养**：会计师必须对AI有一个基本的理解，包括机器学习算法的工作原理以及AI系统如何处理和分析数据。这种基础知识对于在会计实践中有效利用AI工具至关重要。'
- en: '**Machine learning concepts**: A grasp of basic machine learning concepts,
    such as data training, model building, and algorithmic decision-making, is essential.
    Understanding these concepts helps accountants interpret AI-generated insights
    and apply them accurately in financial scenarios.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习概念**：掌握基本机器学习概念，如数据训练、模型构建和算法决策，是必不可少的。理解这些概念有助于会计师解读AI生成的洞察力，并在财务场景中准确应用。'
- en: Data analysis and management skills
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据分析和管理技能
- en: Mastering data analysis and management skills is essential for making informed
    decisions and driving strategic success in today’s data-driven world.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今数据驱动的世界中，掌握数据分析和管理技能对于做出明智的决策和推动战略成功至关重要。
- en: '**Data proficiency**: In an AI-driven environment, accountants need to be proficient
    in data analysis. This includes understanding data sources, ensuring data quality,
    and effectively structuring and interpreting large datasets.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据熟练度**：在AI驱动环境中，会计师需要精通数据分析。这包括理解数据来源、确保数据质量以及有效地构建和解读大型数据集。'
- en: '**Data interpretation**: Beyond number crunching, accountants should develop
    the ability to interpret complex data outputs from AI systems, transforming raw
    data into actionable financial insights.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据解读**：除了数字处理，会计师应该培养解读AI系统复杂数据输出的能力，将原始数据转化为可操作的财务洞察。'
- en: Technology literacy and software proficiency
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技术素养和软件熟练度
- en: Developing technology literacy and software proficiency is vital for staying
    competitive and effective in the digital age.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字时代保持竞争力和有效性，发展技术素养和软件熟练度至关重要。
- en: '**Software familiarity**: Familiarity with AI-integrated accounting software,
    such as QuickBooks Online, Xero, or IBM Watson, is necessary. Accountants should
    be comfortable navigating these platforms and integrating them into existing workflows.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**软件熟悉度**：熟悉AI集成会计软件，如QuickBooks Online、Xero或IBM Watson，是必要的。会计师应该能够轻松导航这些平台并将它们整合到现有工作流程中。'
- en: '**Adaptability to new tools**: The ability to quickly adapt to new software
    and tools is vital, as AI technology is continuously evolving. This adaptability
    ensures accountants can always leverage the most advanced features available.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适应新工具的能力**：快速适应新软件和工具的能力至关重要，因为AI技术正在不断演变。这种适应性确保会计师可以始终利用最先进的功能。'
- en: Critical thinking and strategic decision-making
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 批判性思维和战略决策
- en: Enhancing critical thinking and strategic decision-making abilities is crucial
    for addressing complex challenges and achieving long-term success in any field.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 提升批判性思维和战略决策能力对于应对复杂挑战和在各个领域实现长期成功至关重要。
- en: '**Analytical skills**: AI provides valuable insights, but the final decision-making
    rests with the accountant. Critical thinking and analytical skills are essential
    for evaluating AI-generated recommendations and making informed financial decisions.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析技能**：人工智能提供了有价值的见解，但最终决策权在于会计师。批判性思维和分析技能对于评估人工智能生成的建议和做出明智的财务决策是必不可少的。'
- en: '**Strategic advisory**: Accountants should be prepared to shift from traditional
    roles to more advisory capacities, where they use AI-generated insights to provide
    strategic financial advice to clients or stakeholders.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略咨询**：会计师应准备好从传统角色转变为更具咨询性的角色，在那里他们使用人工智能生成的见解为客户提供或利益相关者提供战略财务建议。'
- en: Continuous learning and professional development
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 持续学习和专业发展
- en: Embracing continuous learning and prioritizing professional development is key
    to staying adaptable and thriving in an ever-evolving global landscape.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 接受持续学习和优先考虑专业发展是适应不断变化的世界并繁荣发展的关键。
- en: '**Ongoing education**: The field of AI is dynamic, with constant developments.
    Accountants must commit to ongoing education and training to stay abreast of the
    latest AI advancements and applications in accounting.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续教育**：人工智能领域是动态的，不断有新的发展。会计师必须承诺持续教育和培训，以跟上会计领域最新的人工智能进步和应用。'
- en: '**Professional development courses**: Engaging in professional development
    courses, webinars, and workshops focused on AI in accounting can provide accountants
    with the necessary knowledge and skills to remain competitive.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业发展课程**：参与专注于会计中人工智能的专业发展课程、网络研讨会和研讨会，可以为会计师提供保持竞争力的必要知识和技能。'
- en: 'The following table summarizes the skills required in an AI-driven environment:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格总结了在人工智能驱动环境中所需的技能：
- en: '| **Skill/training area** | **Description** | **Importance in** **AI-driven
    accounting** |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| **技能/培训领域** | **描述** | **在人工智能驱动会计中的重要性** |'
- en: '| AI and machine learning understanding | A basic understanding of AI operations
    and machine learning concepts. | Crucial for leveraging AI tools effectively.
    |'
  id: totrans-106
  prefs: []
  type: TYPE_TB
  zh: '| 人工智能和机器学习理解 | 对人工智能操作和机器学习概念的基本理解。 | 对于有效利用人工智能工具至关重要。 |'
- en: '| Data analysis and management | Proficiency in interpreting and managing large
    datasets. | Essential for transforming data into actionable insights. |'
  id: totrans-107
  prefs: []
  type: TYPE_TB
  zh: '| 数据分析和管理 | 熟练解读和管理大数据集的能力。 | 对于将数据转化为可操作见解至关重要。 |'
- en: '| Technology literacy and software proficiency | Familiarity with AI-integrated
    accounting software and adaptability to new tools. | Important for navigating
    AI platforms and integrating them into workflows. |'
  id: totrans-108
  prefs: []
  type: TYPE_TB
  zh: '| 技术素养和软件熟练度 | 对人工智能集成会计软件的熟悉度以及对新工具的适应性。 | 对于导航人工智能平台并将其集成到工作流程中很重要。 |'
- en: '| Critical thinking and strategic decision-making | Ability to evaluate AI
    insights and make informed financial decisions. | Key to utilizing AI insights
    for strategic financial advice. |'
  id: totrans-109
  prefs: []
  type: TYPE_TB
  zh: '| 批判性思维和战略决策 | 评估人工智能见解并做出明智财务决策的能力。 | 对于利用人工智能见解提供战略财务咨询至关重要。 |'
- en: '| Continuous learning and professional development | Commitment to ongoing
    education in AI advancements and applications. | Necessary to stay updated with
    the rapidly evolving field of AI. |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
  zh: '| 持续学习和专业发展 | 对人工智能进步和应用的持续教育的承诺。 | 对于跟上人工智能快速发展的领域至关重要。 |'
- en: Table 1.2 – The necessary skills and training in an AI-driven environment
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 表1.2 – 人工智能驱动环境中的必要技能和培训
- en: Now that we’ve reviewed the skills required, let’s now focus on implementing
    AI in accounting departments.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经审查了所需的技能，让我们现在关注在会计部门实施人工智能。
- en: Implementing AI in accounting departments
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在会计部门实施人工智能
- en: 'Successfully integrating AI into accounting departments requires a strategic
    approach that considers both technological and human factors. Here are key strategies
    to effectively implement AI in accounting workflows and departments:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 成功地将人工智能融入会计部门需要一种考虑技术和人为因素的策略方法。以下是有效实施人工智能于会计工作流程和部门的关键策略：
- en: Strategic assessment and planning
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 战略评估和规划
- en: Navigating the integration of AI into accounting departments requires strategic
    assessment and meticulous planning to maximize efficiency, accuracy, and overall
    organizational success.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能融入会计部门需要战略性的评估和细致的规划，以最大化效率、准确性和整体组织成功。
- en: '**Identify key areas for AI implementation**: Begin by assessing current accounting
    processes to identify areas where AI can bring the most value, such as data entry,
    report generation, or compliance monitoring'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定AI实施的关键领域**：首先评估当前的会计流程，以确定AI可以带来最大价值的领域，例如数据录入、报告生成或合规性监控。'
- en: '**Set clear objectives**: Define clear goals for what you want to achieve with
    AI, whether it’s improving efficiency, enhancing accuracy, or providing better
    financial insights'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设定明确的目标**：明确您希望通过AI实现的目标，无论是提高效率、增强准确性还是提供更好的财务洞察。'
- en: Choosing the right AI tools
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择合适的AI工具
- en: Selecting the appropriate AI tools is pivotal in successfully integrating AI
    into accounting departments, ensuring efficiency, accuracy, and strategic value
    in financial processes.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的AI工具对于成功将AI融入会计部门至关重要，确保在财务流程中实现效率、准确性和战略价值。
- en: '**Select appropriate AI solutions**: Choose AI tools and software that align
    with your department’s specific needs. Consider factors such as compatibility
    with existing systems, scalability, and the specific accounting tasks you want
    to automate or enhance.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择合适的AI解决方案**：选择与您部门特定需求相匹配的AI工具和软件。考虑因素包括与现有系统的兼容性、可扩展性以及您希望自动化或增强的具体会计任务。'
- en: '**Vendor evaluation and selection**: Evaluate different AI vendors and software
    providers. Look for vendors with robust support, a strong track record in accounting
    AI, and the flexibility to adapt to your organization’s needs.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**供应商评估和选择**：评估不同的AI供应商和软件提供商。寻找具有强大支持、在会计AI领域有良好记录且能够适应您组织需求的供应商。'
- en: Training and skill development
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 培训与技能发展
- en: Incorporating training and skill development programs is essential for effectively
    implementing AI within accounting departments, ensuring seamless integration and
    maximizing its potential benefits.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在会计部门有效实施AI，确保无缝集成并最大化其潜在效益，融入培训和技能发展计划是至关重要的。
- en: '**Educate and train staff**: Provide training for your accounting team on how
    to use AI tools. This can include formal training sessions, workshops, or online
    courses. Focus on both the technical aspects of the AI tools and how to interpret
    AI-generated insights.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育和培训员工**：为您的会计团队提供如何使用AI工具的培训。这可能包括正式的培训课程、研讨会或在线课程。关注AI工具的技术方面以及如何解读AI生成的洞察。'
- en: '**Foster a culture of continuous learning**: Encourage an organizational culture
    that values continuous learning and adaptation. As AI technology evolves, so should
    the skills and knowledge of your accounting team.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培养持续学习的文化**：鼓励一种重视持续学习和适应的组织文化。随着AI技术的演变，您的会计团队的技能和知识也应随之发展。'
- en: Integration and phased implementation
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 集成与分阶段实施
- en: Incorporating integration and phased implementation strategies is essential
    for effectively integrating AI into accounting departments, ensuring seamless
    adoption and maximizing its transformative potential.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 将集成和分阶段实施策略融入会计部门，对于有效集成AI、确保无缝采用并最大化其变革潜力至关重要。
- en: '**Seamless Integration**: Ensure that the AI tools integrate smoothly with
    your existing accounting systems and workflows. This might require IT support
    or collaboration with the AI tool providers.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无缝集成**：确保AI工具与您现有的会计系统和工作流程顺利集成。这可能需要IT支持或与AI工具提供商的合作。'
- en: '**Phased approach**: Implement AI tools in a phased manner, starting with less
    complex tasks and gradually moving to more advanced applications. This allows
    for adjustment and fine-tuning as you go along.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分阶段方法**：分阶段实施AI工具，从较简单的任务开始，逐步过渡到更高级的应用。这允许您在实施过程中进行调整和微调。'
- en: Collaboration and communication
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 协作与沟通
- en: Incorporating AI into accounting departments requires effective collaboration
    and communication to ensure successful integration and maximize its transformative
    potential.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI融入会计部门需要有效的协作和沟通，以确保成功集成并最大化其变革潜力。
- en: '**Collaboration between departments**: Foster collaboration between your accounting
    department, IT, and other relevant departments. Cross-departmental collaboration
    is crucial for the successful integration of AI.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部门间的协作**：促进会计部门、IT和其他相关部门之间的协作。跨部门协作对于AI成功集成至关重要。'
- en: '**Effective communication**: Communicate the benefits and changes brought by
    AI integration to all stakeholders, including accounting staff, management, and
    other departments. Transparency in communication helps to manage expectations
    and facilitate smooth adoption.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有效沟通**：向所有利益相关者，包括会计人员、管理层和其他部门，传达AI整合带来的好处和变化。沟通的透明度有助于管理期望并促进顺利采用。'
- en: Monitoring and continuous improvement
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 监控和持续改进
- en: Implementing AI in accounting departments requires a commitment to monitoring
    and continuous improvement to ensure efficiency, accuracy, and alignment with
    organizational goals.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在会计部门实施人工智能需要致力于监控和持续改进，以确保效率、准确性和与组织目标的协调一致。
- en: '**Regular performance review**: Monitor the performance of AI tools regularly.
    Gather feedback from users and analyze how well the AI tools meet your objectives.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期性能审查**：定期监控AI工具的性能。收集用户反馈并分析AI工具满足目标的情况。'
- en: '**Iterative improvement**: Use the feedback and performance data to continuously
    improve and optimize the AI integration. Be prepared to make adjustments and updates
    to your AI strategy as needed.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代改进**：利用反馈和性能数据持续改进和优化人工智能整合。准备好根据需要调整和更新您的AI策略。'
- en: Data governance and security
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据治理和安全
- en: Establishing robust data governance and security protocols is paramount for
    ensuring the successful and ethical integration of AI within accounting departments.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在会计部门成功和道德地整合人工智能，建立强大的数据治理和安全协议至关重要。
- en: '**Robust data governance**: Implement strong data governance policies to manage
    the data used by AI tools. Ensure compliance with data protection regulations
    and maintain high data quality standards.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强大的数据治理**：实施强大的数据治理政策来管理AI工具使用的数据。确保符合数据保护法规并维持高标准的数据质量。'
- en: '**Ensure data security**: Given the sensitive nature of financial data, ensure
    robust security measures are in place. This includes secure data storage, encryption,
    and regular security audits.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确保数据安全**：鉴于财务数据的敏感性，确保有强大的安全措施。这包括安全的数据存储、加密和定期的安全审计。'
- en: 'The following table summarizes the strategies for implementing AI:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格总结了实施AI的策略：
- en: '| **Strategy** | **Key actions** | **Goal** |'
  id: totrans-144
  prefs: []
  type: TYPE_TB
  zh: '| **策略** | **关键行动** | **目标** |'
- en: '| Strategic assessment and planning | Assess current processes, identify AI
    integration areas, and set clear objectives. | Identify optimal areas for applying
    AI and define success metrics. |'
  id: totrans-145
  prefs: []
  type: TYPE_TB
  zh: '| 战略评估和规划 | 评估当前流程，确定AI整合领域，并设定明确目标。 | 确定应用AI的最佳领域并定义成功指标。 |'
- en: '| Choosing the right AI tools | Select AI solutions that align with specific
    needs and evaluate vendors. | Ensure that the chosen AI tools are well-suited
    and effective for the department’s needs. |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| 选择合适的AI工具 | 选择符合特定需求的AI解决方案并评估供应商。 | 确保所选AI工具适合且有效满足部门需求。 |'
- en: '| Training and skill development | Provide technical and interpretative training
    and foster a continuous learning culture. | Equip staff with the necessary skills
    and knowledge to use AI effectively. |'
  id: totrans-147
  prefs: []
  type: TYPE_TB
  zh: '| 培训和技能发展 | 提供技术和解释性培训，并培养持续学习的文化。 | 为员工提供使用AI所需的技能和知识。 |'
- en: '| Integration and phased implementation | Integrate AI tools with existing
    systems, implementing them in phases. | Ensure smooth integration without disrupting
    existing workflows, allowing for adjustment. |'
  id: totrans-148
  prefs: []
  type: TYPE_TB
  zh: '| 集成和分阶段实施 | 将AI工具与现有系统集成，分阶段实施。 | 确保平稳集成，不干扰现有工作流程，允许调整。 |'
- en: '| Collaboration and communication | Foster cross-departmental collaboration
    and maintain transparent communication. | Ensure all stakeholders are aligned
    and informed about AI integration. |'
  id: totrans-149
  prefs: []
  type: TYPE_TB
  zh: '| 协作与沟通 | 促进跨部门协作并保持透明沟通。 | 确保所有利益相关者都对AI整合保持一致并了解情况。 |'
- en: '| Monitoring and continuous improvement | Regularly review performance and
    iteratively improve applying AI. | Optimize AI usage based on feedback and performance,
    adapting to evolving needs. |'
  id: totrans-150
  prefs: []
  type: TYPE_TB
  zh: '| 监控和持续改进 | 定期审查性能并迭代改进AI应用。 | 根据反馈和性能优化AI使用，适应不断变化的需求。 |'
- en: '| Data governance and security | Implement robust data governance policies
    and ensure strong data security measures. | Protect sensitive financial data and
    comply with data protection regulations. |'
  id: totrans-151
  prefs: []
  type: TYPE_TB
  zh: '| 数据治理和安全 | 实施强大的数据治理政策并确保强大的数据安全措施。 | 保护敏感的财务数据并遵守数据保护法规。 |'
- en: Table 1.3 – Implementing AI in accounting departments
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1.3 – 在会计部门实施人工智能
- en: As AI continues to revolutionize accounting practices, its successful implementation
    promises to streamline processes, enhance accuracy, and empower accounting departments
    to deliver greater value to their organizations.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能继续革命性地改变会计实践，其成功的实施有望简化流程，提高准确性，并赋予会计部门向其组织提供更多价值的权力。
- en: Summary
  id: totrans-154
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: As we conclude this chapter, we will reflect on the transformative role of GAI
    in accounting. This chapter has provided a comprehensive overview of GAI’s evolution,
    its technical requirements, and its groundbreaking applications in the field of
    accounting. We have seen how AI innovations such as automated calculations, predictive
    analysis, and enhanced compliance monitoring are reshaping the accounting landscape,
    offering increased efficiency, accuracy, and deeper financial insights.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束这一章时，我们将反思GAI在会计中的变革性作用。本章提供了GAI演变、其技术要求和其在会计领域开创性应用的全面概述。我们看到了人工智能创新，如自动化计算、预测分析和增强合规监控如何重塑会计格局，提供更高的效率、准确性和更深入的财务洞察。
- en: Looking ahead, the future of AI in accounting is bright and full of potential.
    We anticipate further advancements in AI technologies, leading to even more sophisticated
    tools for financial analysis and decision-making. The role of accountants is set
    to evolve, with a greater emphasis on strategic advisory and data interpretation,
    leveraging the power of AI.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，会计领域的人工智能前景光明且充满潜力。我们预计人工智能技术将取得进一步的发展，这将导致金融分析和决策工具更加复杂。会计师的角色预计将发生演变，更加注重战略咨询和数据解读，利用人工智能的力量。
