- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: The Platform Engineering Ecosystem
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 平台工程生态系统
- en: Recently, Platform Engineering has become a staple for those interested in DevOps
    solutions to accelerate time to market. Just like DevOps engineers, platform engineers
    have become the up-and-coming roles to hire as a new skill set to potentially
    fix old problems. Platform Engineering is not just about installing a single software
    solution or implementing configuration as code but adjusting the entire delivery
    ecosystem. Ecosystems are systems of interacting parts, in this case, all the
    parts needed to create an operational environment. Good platforms incorporate
    numerous tools and capabilities to achieve success. Integrating those tools within
    different aspects of the platform is a key element of effective platforms. Further,
    those tools should be incorporated into **Continuous Integration/Continuous Deployment**
    (**CI/CD**) pipelines through a DevOps methodology.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，平台工程已成为对DevOps解决方案感兴趣的人的必备技能，以加速上市时间。就像DevOps工程师一样，平台工程师已成为招聘的新技能角色，以解决潜在的老问题。平台工程不仅仅是安装单个软件解决方案或实施配置代码，而是调整整个交付生态系统。生态系统是相互作用的部件系统，在这种情况下，所有创建操作环境的部件。好的平台结合了众多工具和能力以实现成功。将这些工具集成到平台的不同方面是有效平台的关键要素。此外，这些工具应通过DevOps方法集成到**持续集成/持续部署**（**CI/CD**）管道中。
- en: In this chapter, you’ll gain insights into selecting and integrating the tools
    and practices that align with your platform strategy. We’ll explore how to incorporate
    essential tools into various platform architectures and identify the technologies
    that most effectively support platform performance and scalability. You’ll also
    learn how to implement Kubernetes-based solutions for building and managing containers
    across the platform. Finally, we’ll cover how to integrate pipelines into the
    platform build, focusing on how platforms manage these pipelines to ensure reliability,
    scalability, and consistent delivery of new features.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将深入了解选择和集成与您的平台战略相一致的工具和实践。我们将探讨如何将基本工具融入各种平台架构中，并确定最有效地支持平台性能和可扩展性的技术。您还将学习如何实施基于Kubernetes的解决方案，以在平台范围内构建和管理容器。最后，我们将介绍如何将管道集成到平台构建中，重点关注平台如何管理这些管道以确保可靠性、可扩展性和新功能的持续交付。
- en: 'We will be covering the following main topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下主要主题：
- en: The essential platform ecosystem tools
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重要的平台生态系统工具
- en: Orchestrating the platform ecosystem
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协调平台生态系统
- en: Platform software delivery ecosystems
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台软件交付生态系统
- en: The three sections in this chapter each address the key areas to understand
    to integrate platforms. The first section discusses legacy tools through building
    infrastructure, addressing baseline configurations, and integrating version control.
    The next section deals with orchestrating the system to ensure all pieces function
    correctly. Finally, the last section discusses converting the platform into a
    delivery engine, expediting the delivery of production applications to the user.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中的三个部分各自针对了解集成平台的关键领域。第一部分通过构建基础设施、处理基本配置和集成版本控制来讨论传统工具。下一部分处理协调系统以确保所有部件正常工作。最后，最后一部分讨论将平台转换为交付引擎，加快生产应用程序交付给用户。
- en: The essential Platform Engineering tools
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 重要的平台工程工具
- en: Starting an ecosystem can be challenging. When we think about ecosystems, we
    typically think about how to integrate with an existing ecosystem rather than
    building one from scratch. You must consider not only the tools desired but also
    the conjunction of those tools in operating successfully. A platform with broad
    tool options that do not interact with each other can increase operation costs
    and provide only a small amount of value, if any. Integrating a platform ecosystem
    requires evaluating and comparing multiple interactions to find the best fit for
    your organization.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 启动一个生态系统可能会具有挑战性。当我们思考生态系统时，我们通常考虑如何与现有的生态系统集成，而不是从头开始构建。你必须考虑的不仅仅是所需的工具，还有这些工具在成功运营中的结合。一个具有广泛工具选项但彼此不交互的平台可能会增加运营成本，并且如果有的话，只能提供少量价值。集成平台生态系统需要评估和比较多个交互，以找到最适合您组织的最佳匹配。
- en: 'A number of years ago, one of us received a locked aquarium with a plant, a
    snail, and two African Dwarf frogs in about 350 milliliters of water as a holiday
    gift. The idea was that the ecosystem would be self-sustainable: the frogs would
    eat the plant and the snail would eat the waste. Every participant would be happy,
    and no external cleaning would be required other than the occasional feeding.
    The drawback was that the frogs required 7.5 liters of water each to be social.
    This meant the frogs first killed the snail and then fought each other to the
    death. At first, we thought that the snail and the frog had been sick, so we simply
    replaced them. The same thing happened several times before we realized what was
    happening. At that point, we decided to leave a single frog in the tank, with
    a plant, and we had to clean the tank regularly. The ecosystem was much different
    from what had been intended. The same thought applies to the platform ecosystem.
    Platforms that are too small consume local resources and prevent broad expansion.
    There must be an expert balance for the platform to function successfully.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 几年前，我们中的一个收到了一个装有植物、蜗牛和两只非洲侏儒青蛙的封闭水族箱，大约350毫升的水作为节日礼物。想法是生态系统将实现自给自足：青蛙会吃掉植物，蜗牛会吃掉废物。每个参与者都会满意，除了偶尔的喂食外，不需要外部清洁。缺点是青蛙需要每人7.5升水才能社交。这意味着青蛙首先杀死蜗牛，然后相互战斗至死。起初，我们以为蜗牛和青蛙生病了，所以我们简单地更换了它们。在意识到发生了什么之前，这种情况发生了好几次。那时，我们决定在水族箱里只留下一只青蛙，加上一株植物，并且我们必须定期清洁水族箱。生态系统与预期大相径庭。同样的思考也适用于平台生态系统。过小的平台会消耗本地资源并阻碍广泛扩张。平台要成功运作，必须有一个专家平衡。
- en: Engineering an effective platform goes beyond just identifying different pieces
    that worked well in a different scenario. Many times, we have seen a presentation
    at a conference or an online demonstration that offers multiple different, and
    apparently integrated, capabilities. In some cases, the integration was the result
    of significant manual work, and in others, those translations happened behind
    the scenes within a proprietary software black box. Combining those elements within
    the platform you build requires identifying those linkages and finding the best
    way to make them work consistently. The goal is a single platform that offers
    integrated success for anyone involved, moving beyond the individual developer
    to a broad scope of activities.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 设计一个有效的平台不仅仅是识别在不同场景中表现良好的不同部分。很多时候，我们在会议或在线演示中看到过多个不同且显然集成的功能。在某些情况下，集成是大量手动工作的结果，而在其他情况下，这些转换是在专有软件黑盒中幕后发生的。在您构建的平台中结合这些元素需要识别这些联系并找到使它们持续工作的最佳方式。目标是提供一个单一的平台，为所有参与者提供集成的成功，超越个人开发者，涵盖广泛的业务活动。
- en: 'Beyond simple integration, two other elements should be considered within a
    platform ecosystem: compute and storage. Remember, using the cloud means using
    someone else’s servers. **Compute** describes the resources available to conduct
    computing actions and manage threads through the virtual CPUs available. **Storage**
    relates to the persistent disk space available on those instances. AWS offers
    EC2 instances with set numbers, while Azure tends to separate by function, as
    does Google. A sample of the top-level options for the various functions is shown
    as follows:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在平台生态系统中，除了简单的集成外，还应考虑两个其他元素：计算和存储。记住，使用云意味着使用他人的服务器。"**计算**"描述了可用于执行计算操作和管理线程的虚拟CPU所提供的资源。"**存储**"与那些实例上可用的持久磁盘空间相关。AWS提供具有固定数量的EC2实例，而Azure倾向于按功能分离，谷歌也是如此。以下显示了各种功能的顶级选项示例：
- en: '![](img/B24465_04_1.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_04_1.jpg)'
- en: 'Figure 4.1: Sample environments'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1：示例环境
- en: As AWS was the first to implement this, their cloud offerings provide detail
    to a more technical specification as the first purchasers wanted to know exactly
    what they received. The later entrants in selling cloud space offer a more packaged
    format, to integrate with the functions the customer desires. Each of these providers
    offers multiple offerings beyond basic compute, some of which may be beneficial
    in engineering your platform.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于AWS是第一个实施这一功能的，他们的云产品提供了更详细的技术规格，因为早期购买者想知道他们确切得到了什么。后来进入销售云空间的参与者提供了一种更包装化的格式，以整合客户希望的功能。这些提供商中的每一个都提供了超出基本计算的多项服务，其中一些可能对您的平台设计有益。
- en: Functionally derived options tend to use autoscaling, which can create challenges
    in assessing pricing early. Techniques can be used to automatically adjust compute
    and store resources based on demand, meaning you never miss a customer. But this
    can also lead to excessive charges if a developer leaves an instance running.
    Another detail is whether you require basic CPUs to host apps or are diving into
    a machine learning application that requires GPU access from the cloud provider.
    A third key element for the cloud provider is bandwidth for how fast cloud machines
    communicate with external users. Any type of platform will require some detailed
    research on best-fit cloud options, which, unfortunately, is beyond the scope
    of this chapter.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 功能衍生选项倾向于使用自动扩展，这可能会在早期评估定价时造成挑战。可以使用技术自动根据需求调整计算和存储资源，这意味着你永远不会错过任何客户。但这也可能导致开发者忘记关闭实例而造成过度收费。另一个细节是，你是否需要基本的CPU来托管应用程序，或者你是否正在开发需要从云服务提供商那里获取GPU访问权限的机器学习应用程序。对于云服务提供商来说，第三个关键元素是带宽，即云机器与外部用户通信的速度。任何类型的平台都将需要对最适合的云选项进行详细研究，不幸的是，这超出了本章的范围。
- en: There are many different elements to consider when developing a unique platform
    ecosystem. We will dive further into some of the technical and process elements
    required to bring those various tools to life in the platform. As with the frog
    scenario, you want to be sure that the included elements have sufficient space
    and then interact together. Some tools require cloud connections, a larger amount
    of compute, or more storage available to conduct multiple activities. Each of
    those interactions must be addressed when building an effective ecosystem.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发独特的平台生态系统时，需要考虑许多不同的元素。我们将进一步探讨一些技术流程元素，这些元素是使各种工具在平台上得以实现的关键。正如青蛙的例子一样，你想要确保包含的元素有足够的空间，并且能够相互交互。一些工具需要云连接、更多的计算资源或更多的存储空间来执行多项活动。在构建有效的生态系统时，必须解决这些交互问题。
- en: The next section breaks down the pieces in order to discuss the constraints
    and challenges associated with each element. In [*Chapter 1*](B24465_01.xhtml#_idTextAnchor015),
    these additions were considered from a generic standpoint of what was possible
    in engineering. [*Chapter 2*](B24465_02.xhtml#_idTextAnchor037) then added where
    these pieces fit into the overall architecture. This section addresses the **Infrastructure
    as Code** (**IaC**), **Configuration Management** (**CM**), version control, and
    monitoring solution elements. The next section addresses specific demands for
    Kubernetes and service mesh options, while the last considers CI/CD. This allows
    us to explore the required elements in greater depth.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分将分解各个部分，以便讨论与每个元素相关的约束和挑战。在[*第一章*](B24465_01.xhtml#_idTextAnchor015)中，这些添加从工程可能性的通用角度进行了考虑。[*第二章*](B24465_02.xhtml#_idTextAnchor037)随后添加了这些部分在整体架构中的位置。本节讨论了**基础设施即代码**（**IaC**）、**配置管理**（**CM**）、版本控制和监控解决方案元素。下一个部分将讨论Kubernetes和服务网格选项的具体需求，而最后一部分将考虑CI/CD。这使我们能够更深入地探讨所需元素。
- en: Infrastructure as code
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基础设施即代码
- en: When starting with a platform, we should think about everything that follows
    as IaC. This means that all the basic parts of the environment are unpacked and
    connected to the initial installation. This allows for the unpacking of all the
    material all at once. You can think about this as having movers who leave all
    the boxes in the living room versus movers who unpack all the boxes to place items
    in the same configuration as in the previous house. This provides advantages in
    rapidly being able to update new versions and automating those unpacking elements,
    as well as reducing the need to manually configure items when unpacking.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当从平台开始时，我们应该将所有后续内容都视为IaC。这意味着环境的所有基本部分都被解包并连接到初始安装。这允许一次性解包所有材料。你可以将这想象为搬家工人将所有箱子留在客厅，而不是将所有箱子解包以将物品放置在类似于前一个房子的配置中。这提供了快速更新新版本和自动化解包元素的优势，同时减少了在解包时手动配置物品的需求。
- en: 'The previous chapter mentioned using Terraform as a declarative language. **Declarative
    IaC** means only the end requirements are specified, while the platform, in this
    case, Terraform, handles the steps. The other option is **imperative code**, where
    the exact elements are defined and the interpreting system does not deviate from
    those steps. Chef is an example of an imperative tool. Examples of declarative
    IaC with Terraform are shown here:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 前一章提到了使用 Terraform 作为声明式语言。**声明式 IaC** 意味着只指定最终需求，而平台（在这种情况下是 Terraform）处理步骤。另一种选择是
    **命令式代码**，其中确切元素被定义，而解释系统不会偏离这些步骤。Chef 是一个命令式工具的例子。这里展示了使用 Terraform 的声明式 IaC
    的示例：
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: You can see how various high-level categories are called through the script.
    In using an imperative language, each call relates to a lower-level script to
    call forward. When Terraform calls a resource or a version that has backend information,
    it allows the code to create the required elements. As an example, this would
    create a `t3.large` EC2 instance that sets an IP address, allows user access,
    manages security, and coordinates interactions without specifying those elements
    directly in the code.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过脚本看到如何调用各种高级类别。在使用命令式语言时，每个调用都与一个较低级别的脚本相关联，以调用后续操作。当 Terraform 调用一个具有后端信息的资源或版本时，它允许代码创建所需元素。例如，这将创建一个
    `t3.large` EC2 实例，设置 IP 地址，允许用户访问，管理安全，并协调交互，而不需要在代码中直接指定这些元素。
- en: 'Instead of listing the provider and resources within the code, the language
    in Chef would call a script that had those items listed as a distinct file. Chef’s
    features help align all the different code elements but can still pose challenges
    over time. Writing and developing in Chef are completely different areas of study.
    As a quick reference, Chef uses cookbooks that contain resources, or recipes as
    a collection of resources. A resource is a Ruby block stating a type, a name,
    properties associated with values, and a set of actions. However, within the Chef
    community, many recipes and cookbooks already exist that can be quickly modified
    to apply to your use case. Here is a sample of the format, and then what a resource
    line might look like to install an open source Java development kit, or OpenJDK:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Chef 中，不是在代码中列出提供者和资源，而是使用语言调用一个包含这些项目的独立文件的脚本。Chef 的功能有助于对齐所有不同的代码元素，但仍然可能在一段时间后带来挑战。在
    Chef 中编写和开发是完全不同的研究领域。作为一个快速参考，Chef 使用包含资源的 cookbooks，或者将资源作为资源集合的食谱。资源是一个 Ruby
    块，声明一个类型、一个名称、与值关联的属性以及一系列动作。然而，在 Chef 社区中，已经存在许多可以快速修改以适用于您用例的食谱和 cookbooks。以下是一个格式示例，以及一个资源行可能看起来像安装开源
    Java 开发工具包（或 OpenJDK）的例子：
- en: '[PRE1]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: These lines then use a similar approach to generate recipes that are composed
    of a number of resources. The functions can be linked together into the overall
    cookbook to execute the infrastructure across the desired platform. You can easily
    see the increased control allowed with the imperative approach but also the increased
    time required to build and deliver. The Chef exception is when a community element
    already provides sufficient services.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这些行使用类似的方法生成由多个资源组成的食谱。这些功能可以链接到整体 cookbooks 中，以在所需平台上执行基础设施。你可以很容易地看到命令式方法允许的增强控制，但也需要更多的时间和努力来构建和交付。Chef
    的例外是当社区元素已经提供了足够的服务时。
- en: In implementing a platform infrastructure, imperative code would build a unique
    tool set based on local instructions every time, while with declarative code,
    high-level modifications could be made to alter instances, clusters, and additional
    tools. Many third-party tools that you may want to use in infrastructure already
    have their portion of IaC developed. The challenge becomes integrating those declarative
    and imperative elements into an overall element that creates the platform. That
    initial IaC should set code versions, potential linkages, and cloud structures.
    Obviously, the full IaC for your platform will likely be much longer. Implementing
    IaC provides some significant security benefits, such as traceability, version
    control, and reducing manual intervention for routine fixes. Part of a successful
    IaC integration depends on how it implements CM tools to configurations beyond
    the initial environment variables.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施平台基础设施时，命令式代码会根据本地指令每次构建一个独特的工具集，而使用声明式代码，可以对实例、集群和额外的工具进行高级修改。你可能想在基础设施中使用的许多第三方工具已经开发了它们的部分IaC。挑战在于将这些声明式和命令式元素整合成一个创建平台的整体元素。最初的IaC应该设置代码版本、潜在链接和云结构。显然，你平台的完整IaC可能会更长。实施IaC提供了一些重要的安全优势，例如可追溯性、版本控制和减少日常修复的手动干预。成功的IaC集成的一部分取决于它如何实现CM工具来配置超出初始环境变量的配置。
- en: Configuration management tools
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置管理工具
- en: The primary goal for our CM tools is to structure hardware and software usage.
    An initial interpretation may be that good CM practice means only authorized changes
    are allowed within a system. When examining our DevOps practices, the goal becomes
    to automate those configurations, allowing easy deployment. Implementing these
    goals moves system administration from a manual approach to an automated solution.
    For example, when setting up an EC2 cloud on Amazon, you can choose the size,
    the Linux distribution desired, security features, and a variety of other options.
    These selections allow the management of resources on demand, with each user selecting
    the desired options, rather than depending on a third party. The traditional practice
    was submitting a ticket to a help desk, waiting for resolution, and hoping all
    the parameters were correct. Automation removes the bottleneck and enables a faster
    flow.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们CM工具的主要目标是结构化硬件和软件的使用。一种初始的解释可能认为良好的CM实践意味着只允许在系统中进行授权的更改。当我们审视我们的DevOps实践时，目标变成了自动化这些配置，以便轻松部署。实现这些目标将系统管理从手动方法转变为自动化解决方案。例如，在亚马逊上设置EC2云时，你可以选择大小、所需的Linux发行版、安全功能以及各种其他选项。这些选择允许按需管理资源，每个用户选择所需的选项，而不是依赖第三方。传统的做法是提交一个工单到帮助台，等待解决，并希望所有参数都是正确的。自动化消除了瓶颈并使流程更快。
- en: One challenge with CM from the platform context is that each element requires
    some configuration elements. While the initial IaC provides some options, further
    configuration requires additional changes. Adds in version control, CI/CD pipelines,
    and Kubernetes implementation also require managed configuration approaches. The
    challenge is in separating the various CM elements into manageable and integrated
    pieces. Returning to the definition of approving only authorized pieces, our platform
    CM tools should be the ones that are in between the initial system launch and
    the ongoing development work. Going back to our woodshop analogy from previous
    chapters, think about CM as how the different tools are placed on the workbench
    for different users. Good CM can be applied at multiple levels, but this definition
    has some limits for effective learning.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 从平台的角度来看，CM的一个挑战是每个元素都需要一些配置元素。虽然初始IaC提供了一些选项，但进一步的配置需要额外的更改。添加版本控制、CI/CD管道和Kubernetes实施也需要管理的配置方法。挑战在于将各种CM元素分离成可管理和集成的部分。回到我们之前章节中的木工店类比，想想CM就像不同的工具如何放置在工作台上供不同的用户使用。良好的CM可以在多个层面上应用，但这个定义对有效的学习有一些限制。
- en: The best practices for our CM mean we can assign an identification, baseline,
    version control and audit practices against a regular process. The previous chapter
    discussed using Ansible, Chef, and Puppet to deploy and control CM. With IaC creating
    the framework and interactions between all the tools, CM should then approach
    how those tools are structured within the process. As an example, our IaC deploys
    an IDE, a workflow tool, a chat function, and a CI/CD process. What we want to
    do with configuration is create one place where a new user can access those applications
    and virtual devices.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们配置管理的最佳实践意味着我们可以将标识、基线、版本控制和审计实践分配给一个常规流程。前一章讨论了使用Ansible、Chef和Puppet来部署和控制配置管理。随着基础设施即代码（IaC）创建所有工具之间的框架和交互，配置管理应该接着考虑这些工具在流程中的结构。例如，我们的IaC部署了一个集成开发环境（IDE）、一个工作流程工具、一个聊天功能和CI/CD流程。我们想要通过配置实现的是创建一个地方，让新用户可以访问这些应用程序和虚拟设备。
- en: 'One example would be using a Terraform instance to create accounts within all
    those different tools when an overall CM tool is utilized. When starting, this
    splash page would provide a basic introductory view. The user would then create
    some workflow structure likely based on an organization, team, and individual
    user. The organization level would create properties to allow a certain set of
    tools to be used. For example, one user group on the platform might want exclusively
    Go-based tools, while another might need Jupyter Notebook and Anaconda. The CM
    tool links those tools, allowing teams to be created with those same tools, and
    then moving to users. *Figure 4**.2* demonstrates how these links might be constructed:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子是当使用整体配置管理工具时，使用Terraform实例在所有这些不同的工具中创建账户。在开始时，这个启动页面会提供一个基本的简介视图。然后，用户会创建一些工作流程结构，这很可能是基于组织、团队和个人用户。组织级别会创建属性，允许使用一组特定的工具。例如，平台上的一个用户组可能只想使用基于Go的工具，而另一个可能需要Jupyter
    Notebook和Anaconda。配置管理工具将这些工具链接起来，允许团队使用相同的工具创建，然后转向用户。*图4.2*展示了这些链接可能如何构建：
- en: '![](img/B24465_04_2.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_04_2.jpg)'
- en: 'Figure 4.2: Configuration management example'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2：配置管理示例
- en: You can see the wide selection of possible tools at the organization level,
    which are whittled down to only the tools needed for the team. This helps to manage
    license control and reduce costs. In the example, if **Tool 1** was an asynchronous
    chat tool such as Mattermost, it might be shared between teams, while **Tool 8**
    might be a GitHub application that allows each team to manage their own version
    control. Then, the teams differ on which other applications might be used. These
    selections can be expanded to allow for one toolset within the collaboration environment
    and another in the deployment targets, allowing shared pipelines and CI/CD spaces
    as well.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到组织级别的广泛工具选择，这些选择被缩减到仅适用于团队的工具。这有助于管理许可证控制和降低成本。在示例中，如果**工具1**是一个异步聊天工具，如Mattermost，它可能在团队之间共享，而**工具8**可能是一个GitHub应用程序，允许每个团队管理自己的版本控制。然后，团队在可能使用的其他应用程序上有所不同。这些选择可以扩展，允许在协作环境中使用一个工具集，在部署目标中使用另一个，从而允许共享管道和CI/CD空间。
- en: In looking at the links between tools, some of the important elements are the
    specification for which features are allowed, specified endpoints, and connections
    to secret services that hold passwords and encryption keys. These systems might
    be shared but proper CM ensures only the right person accesses them at the right
    time. The next aspects of CM tie into version control by only allowing the right
    software to reach production. This is because an effective version control tool
    can manage configuration settings as well as software settings.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在考察工具之间的联系时，一些重要的元素包括允许哪些功能的规范、指定的端点和连接到存储密码和加密密钥的秘密服务。这些系统可能被共享，但适当的配置管理确保只有正确的人在正确的时间访问它们。配置管理的下一个方面与版本控制相结合，只允许正确的软件达到生产状态。这是因为一个有效的版本控制工具可以管理配置设置以及软件设置。
- en: Software version control systems
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 软件版本控制系统
- en: Software **Version Control Systems** (**VCSs**), sometimes referred to as source
    control, are the functions that allow tracking and implementing software code
    changes. Their primary purpose is to deliver consistent quality across a process,
    ensuring all users are submitting through the same function. The most widely known
    tool for VCS is GitHub. GitLab expands its capabilities, and both offer additional
    paid options. Some alternative VCSs, are Bitbucket, **Subversion** (**SVN**),
    and Mercurial, which offer a different perspective. The most important element
    is tracking the original code and then managing forks and branches to this code,
    as well as integrating those changes into new baselines. Each of these comes with
    multiple options to display and demonstrate integration. GitKraken, in their web
    documentation ([https://www.gitkraken.com/](https://www.gitkraken.com/)), shows
    how different versions can be visually displayed.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 软件版本控制系统（**VCSs**），有时被称为源代码控制，是允许跟踪和实施软件代码更改的功能。它们的主要目的是在整个过程中提供一致的质量，确保所有用户都通过相同的函数提交。最知名的VCS工具是GitHub。GitLab扩展了其功能，两者都提供额外的付费选项。一些替代的VCS包括Bitbucket、**Subversion**（**SVN**）和Mercurial，它们提供了不同的视角。最重要的元素是跟踪原始代码，然后管理对此代码的分支和合并，以及将这些更改集成到新的基线中。每个系统都提供了多种选项来显示和演示集成。GitKraken在其网络文档（[https://www.gitkraken.com/](https://www.gitkraken.com/))中展示了如何以视觉方式显示不同的版本。
- en: When visiting the page, one can see samples of various GitKraken implementations.
    The different colors and branching lines on a GitKraken model show how different
    changes link to the main source code. Blue lines show the baseline code while
    the green, purple, and indigo branches show when the code has been split. This
    allows determining exactly where a change was made and what was included.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 访问页面时，可以看到各种GitKraken实现的示例。GitKraken模型上的不同颜色和分支线显示了不同的更改如何链接到主源代码。蓝色线条显示基线代码，而绿色、紫色和靛蓝色分支显示代码被拆分的情况。这允许确定更改的确切位置以及包含的内容。
- en: 'To understand the VCS options, we must briefly review what might be included.
    The basic approach remains relatively simple: you establish a repository and then
    allow users to duplicate it to make corrections. The most common options integrate
    distributed version control, allowing multiple users to work at the same time.
    Repositories can include a single set that must be replicated or multiple file
    branches allowing users to work on an entire element or a smaller set. Examine
    the following figure to see how those options might be integrated:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解版本控制系统的选项，我们必须简要回顾可能包含的内容。基本方法仍然相对简单：你建立一个仓库，然后允许用户复制它以进行修正。最常见的选项集成了分布式版本控制，允许多个用户同时工作。仓库可以包括必须复制的单个集合，或者多个文件分支，允许用户对整个元素或较小的集合进行工作。查看以下图示，了解这些选项可能如何集成：
- en: '![](img/B24465_04_3.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_04_3.jpg)'
- en: 'Figure 4.3: Version control illustration'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.3：版本控制图示
- en: Similar to the GitKraken illustration, but without the pretty colors, the preceding
    figure shows how different teams can branch different versions to work. The diagram
    indicates that one set of teams can work on an isolated application to build SSO
    integration and user tools, another can work on system admin tools and database
    recovery, while a third team can work on documentation. If these branches do not
    overlap, then each can be fully tested and reintroduced without affecting other
    teams. If they do overlap, good VCSs allow approving specific changes. When the
    two branches are merged back to the repository and then deployed, all the changes
    would be visible to the user. Each merge is accompanied by pipeline results, merge
    requests, and approvals, showing exactly where each change became a part of the
    baseline.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 与GitKraken图示类似，但没有漂亮的颜色，前面的图示显示了不同的团队如何分支不同的版本进行工作。该图表明，一组团队可以针对隔离的应用程序构建SSO集成和用户工具，另一组可以工作在系统管理工具和数据库恢复上，而第三组团队可以工作在文档上。如果这些分支不重叠，那么每个分支都可以完全测试并重新引入，而不会影响其他团队。如果它们重叠，良好的VCS允许批准特定的更改。当两个分支合并回仓库并部署时，所有更改都会对用户可见。每次合并都伴随着管道结果、合并请求和批准，显示了每个更改如何成为基线的一部分。
- en: Legacy tool observability
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 旧工具的可观察性
- en: 'Merely deploying the different tools is not sufficient. You must be able to
    observe that all elements are functioning correctly and establish metrics. As
    an easy reference, three basic metrics can be used for each of the preceding elements
    to create observability. These categories with the associated metrics are listed
    here:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 仅仅部署不同的工具是不够的。你必须能够观察到所有元素都在正确运行并建立指标。作为一个简单的参考，可以为前述每个元素使用三个基本指标来创建可观察性。这些类别及其相关指标如下所示：
- en: '**Infrastructure as code**: Deployed version, **Lead Time to Change** (**LTC**),
    system operations.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础设施即代码**：部署版本，**变更领先时间**（LTC），系统操作。'
- en: '**Configuration as code**: Deployed version, time to restore, bug reports.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**配置即代码**：部署版本，恢复时间，错误报告。'
- en: '**Version control systems**: Deployment frequency, LTC, value stream flow.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**版本控制系统**：部署频率，长期变更（LTC），价值流流程。'
- en: When deploying IaC, there are three key observability elements. The first element
    is the deployed version. Since each IaC element deploys a complete package, it
    is important to know the version. This allows for changes in security controls,
    operational items, and other features. If you establish the platform as a core
    element within the DevOps process, then measuring the LTC shows the difference
    between each new version. All metrics should be correlated and measured at multiple
    levels, including individual, team, project, and organization. This allows an
    organization to measure how long it takes to adapt or change the overall platform.
    Also important is the influence of various events on the overall value stream.
    IaC should also create initial dashboards showing elements for storage and compute
    usage at a minimum. These operational metrics create the ability to plan resource
    usage and manage system operability.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在部署IaC时，有三个关键的可观察性元素。第一个元素是部署版本。由于每个IaC元素部署一个完整的包，了解版本很重要。这允许在安全控制、操作项目和其他功能上进行更改。如果你将平台作为DevOps过程中的核心元素，那么测量LTC显示了每个新版本之间的差异。所有指标都应相关联并在多个层面进行测量，包括个人、团队、项目和组织。这允许组织测量适应或改变整体平台所需的时间。同样重要的是，各种事件对整体价值流的影响。IaC还应创建至少显示存储和计算使用元素的初始仪表板。这些操作指标创造了规划资源使用和管理系统可用性的能力。
- en: Monitoring configuration as code enables some key metrics across the platform.
    When deploying configurations, similar to managing infrastructure, you must always
    know which configurations customers are executing and in which clusters. This
    allows quick analysis when problems occur to determine whether they are user errors
    or system problems. This leads to the next metric, understanding the time to restore.
    When a platform supports rapid development for multiple teams, any bugs must be
    addressed quickly. The common understanding is that bugs are things the system
    should do but does not, compared to new features, which are things you want the
    system to do but do not appear in the current baseline. The last critical metric
    is understanding those bug reports and being able to compile an overall perspective
    of how configuration as code functions within the platform.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 监控配置作为代码可以在平台上启用一些关键指标。在部署配置时，类似于管理基础设施，你必须始终知道客户正在执行哪些配置以及它们在哪些集群中。这允许在出现问题时快速分析，以确定它们是用户错误还是系统问题。这导致下一个指标，即理解恢复时间。当一个平台支持多个团队的快速开发时，任何错误都必须迅速解决。普遍的理解是，错误是系统应该做但未做的事情，与新的功能相比，新的功能是你希望系统做但当前基线中未出现的事情。最后一个关键指标是理解那些错误报告，并能够从整体上了解配置作为代码在平台中的功能。
- en: The last section, and most clearly tied to the **DevOps Research Association**
    (**DORA**) metrics, is understanding the VCS. The DORA metrics are deployment
    frequency, mean time to change, change failure rate, mean time to recover. The
    distinction between baseline code, forks, branches, and integration allows you
    to analyze deployment frequency, that is, how often new code deploys. This integrates
    with the LTC in showing how long an organization takes to submit a new idea, develop
    new code, and then push that code into production. The first two metrics then
    support the broader value stream flow analysis for how the deployed code directly
    supports profit. One of the main goals of having efficient platforms is rapid
    profitability, so understanding how much each new version costs and the revenue
    generated is key to enabling the high-level adoption of platform models within
    the organization.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个部分，与**DevOps研究协会**（**DORA**）的指标最为紧密相关，是理解版本控制系统（VCS）。DORA指标包括部署频率、平均变更时间、变更失败率、平均恢复时间。基线代码、分支、分支和集成的区别允许你分析部署频率，即新代码部署的频率。这整合了LTC（长期承诺），显示了组织提交新想法、开发新代码并将其推入生产所需的时间。前两个指标支持更广泛的价值流流程分析，以展示部署的代码如何直接支持利润。拥有高效平台的主要目标之一是快速盈利，因此理解每个新版本的成本和产生的收入对于在组织内推广平台模型至关重要。
- en: We will now take those initial concepts and bring them together. This section
    has outlined all the pieces required before you even start creating a platform.
    The next section details the path to start creating a production application.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将那些初始概念整合在一起。本节概述了在开始创建平台之前所需的全部组件。下一节将详细说明开始创建生产应用程序的路径。
- en: Orchestrating the platform ecosystem
  id: totrans-54
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 协调平台生态系统
- en: 'At this point in the DevOps journey, in moving forward from initial DevOps
    implementations in 2011, most companies understand that containers and microservices
    are the primary tools for success. Not all successful models require microservices;
    some can still use monolith-type approaches to gain success, but those instances
    are few. The following is an explanation of the two approaches:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在DevOps之旅的这个阶段，从2011年最初的DevOps实施向前推进，大多数公司都明白容器和微服务是成功的主要工具。并非所有成功的模式都需要微服务；一些仍然可以使用单体类型的方案来获得成功，但这些情况很少。以下是对两种方法的解释：
- en: '**Microservices**: Architectural model using loosely coupled, focused services
    with logical operations based on reusable capability in using lightweight protocols
    to maximize cloud compute and store functions.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微服务**：使用松散耦合、专注的服务和基于可重用能力的逻辑操作的建筑模型，通过使用轻量级协议来最大化云计算和存储功能。'
- en: '**Monolith**: Single, unified software application, entirely self-contained
    and independent. Tends to lack flexibility for revision and reversion especially
    when developers are working in parallel.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单体**：单一、统一的软件应用程序，完全自包含且独立。当开发人员并行工作时，往往缺乏修订和回滚的灵活性。'
- en: Delivering cutting-edge software, maintaining constant updates, and eliminating
    bugs requires teams of developers to make rapid changes without worrying about
    infrastructure. Container-based systems work based on efficient container orchestration
    systems and integrated monitoring across multiple clusters.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 提供前沿的软件，保持持续的更新，并消除错误，需要开发团队快速做出改变，而不必担心基础设施。基于容器的系统通过高效的容器编排系统和跨多个集群的集成监控来工作。
- en: Container orchestration systems
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 容器编排系统
- en: The standard for most container orchestration remains **Kubernetes**. Kubernetes
    functions as a portable, extensible model for managing containerized workloads
    with a wide range of services available. Alternatives are systems such as **Docker
    Swarm** and **Apache Mesos**, which present simpler, albeit less feature-rich,
    options. In a traditional deployment model, one operating system runs all the
    applications. This has moved to virtualized services where a shared hypervisor
    creates different virtual machines, each with its own operating system. Container
    models, such as Kubernetes, share the system kernel between multiple containers
    to better manage the efficiency of individual containers.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数容器编排来说，标准仍然是**Kubernetes**。Kubernetes作为一个可移植、可扩展的模型，用于管理容器化工作负载，并提供了一系列广泛的服务。替代方案包括**Docker
    Swarm**和**Apache Mesos**，它们提供了更简单但功能较少的选项。在传统的部署模型中，一个操作系统运行所有应用程序。这已经转变为虚拟化服务，其中共享的虚拟机管理程序创建了不同的虚拟机，每个虚拟机都有自己的操作系统。例如Kubernetes这样的容器模型，在多个容器之间共享系统内核，以更好地管理单个容器的效率。
- en: 'The primary advantage of running containers is a distinction between the build
    and release cycles compared to deployed functions. Containers have three primary
    attributes: they should be distributed, ephemeral, and immutable. Distributed
    means containers can operate in multiple machines, clusters, zones, or regions
    with the same effects. Multiple instantiations can support similar functions and
    report back to a common database while maintaining operational integrity. Ephemeral
    means you never depend on a single running container but on the base code supporting
    instantiating the same container across multiple clusters to generate similar
    effects. This allows the creation of temporary and replaceable effects. Containers
    do not get fixed; you build a new image and destroy the old container when the
    new one deploys. Finally, good container programming is immutable, meaning once
    deployed, while the data through those containers can be modified, the baseline
    code never changes. Maximizing these three characteristics is one of the reasons
    Kubernetes approaches have been so successful from among the orchestration choices.
    The following figure (*Figure 4**.4*) demonstrates a high-level architecture for
    each of these orchestration concepts:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 运行容器的主要优势在于与已部署函数相比，构建和发布周期之间的区别。容器有三个主要属性：它们应该是可分布的、短暂的且不可变的。可分布意味着容器可以在多台机器、集群、区域或地区中运行，产生相同的效果。多个实例可以支持类似的功能并向公共数据库报告，同时保持操作完整性。短暂意味着你永远不依赖于单个运行的容器，而是依赖于支持在多个集群中实例化相同容器的基代码，以产生类似的效果。这允许创建临时且可替换的效果。容器不会固定不变；当新容器部署时，你将构建一个新的镜像并销毁旧容器。最后，良好的容器编程是不可变的，这意味着一旦部署，尽管通过这些容器的数据可以被修改，但基线代码永远不会改变。最大化这三个特性是Kubernetes方法之所以在编排选择中如此成功的原因之一。以下图（*图4.4*）展示了这些编排概念的每个高级架构：
- en: '![](img/B24465_04_4.jpg)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_04_4.jpg)'
- en: 'Figure 4.4: Kubernetes architecture'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.4：Kubernetes架构
- en: Kubernetes offers several advantages over traditional hosting approaches. These
    advantages include service discovery, load balancing, automated rollout, self-healing
    approaches, and secrets management. When implementing Kubernetes, other benefits
    often appear but the aforementioned advantages are the primary benefits to successful
    Platform Engineering. Service discovery enables you to use embedded commands to
    discover which containers are currently running, while load balancing distributes
    compute and store needs across multiple containers. Service discovery can expand
    to allow containers to find and communicate with each other as well, a critical
    function when dealing with microservices. Automated rollout refers to linking
    deployments to the CI/CD process, ensuring only current versions are available
    to the user. The self-healing approach integrates load balancing and good security
    practices by ensuring that whenever a container fails, the system can kill the
    process and launch another container with minimal user impact. Finally, secrets
    management allows secrets such as passwords and program keys to be centrally stored
    and encrypted while still being accessible to multiple container deployments.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes相较于传统托管方法提供了多项优势。这些优势包括服务发现、负载均衡、自动化部署、自我修复方法和密钥管理。在实施Kubernetes时，其他好处也常常显现，但上述优势是成功平台工程的主要优势。服务发现允许您使用内嵌命令来发现当前正在运行的容器，而负载均衡则将计算和存储需求分配到多个容器中。服务发现还可以扩展，允许容器相互发现并通信，这在处理微服务时是一个关键功能。自动化部署指的是将部署与CI/CD流程相连接，确保用户只能获得当前版本。自我修复方法通过确保容器失败时系统能够终止进程并启动另一个容器，从而整合负载均衡和良好的安全实践，以最小化对用户的影响。最后，密钥管理允许将密码和程序密钥等密钥集中存储和加密，同时仍然可供多个容器部署访问。
- en: '![](img/B24465_04_05.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_04_05.jpg)'
- en: 'Figure 4.5: Docker architecture'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.5：Docker架构
- en: Docker offers a different approach through an open platform that distinguishes
    applications from infrastructure. This system creates images and containers while
    using namespaces to preserve the isolated workspace within the container. Docker
    Swarm varies from Kubernetes in that it is tied to the Docker API, rather than
    being an independent solution. You still use nodes, services, and load balancers
    to manage actions, but the connection to the Docker API makes it more linear than
    Kubernetes. While being potentially easier to install at first, the functionality
    and automation are limited compared to the Kubernetes toolbase. A clear example
    is that Docker only uses **Transport-Level Security** (**TLS**), while Kubernetes
    can use multiple security options through RBAC, SSL, TLS, and various secrets
    management tools. Another example is that Docker Swarm only monitors through third-party
    integrations, while Kubernetes has both internal monitoring and third-party options.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: Docker通过一个区分应用程序和基础设施的开源平台提供了一种不同的方法。该系统创建镜像和容器，同时使用命名空间来保留容器内的隔离工作空间。Docker
    Swarm与Kubernetes的不同之处在于它与Docker API相关联，而不是一个独立解决方案。您仍然使用节点、服务和负载均衡器来管理操作，但与Docker
    API的连接使得它比Kubernetes更线性。虽然一开始可能更容易安装，但与Kubernetes工具集相比，其功能和自动化有限。一个明显的例子是，Docker仅使用**传输层安全性**（**TLS**），而Kubernetes可以通过RBAC、SSL、TLS和各种密钥管理工具使用多种安全选项。另一个例子是，Docker
    Swarm仅通过第三方集成进行监控，而Kubernetes既有内部监控也有第三方选项。
- en: '![](img/B24465_04_6.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_04_6.jpg)'
- en: 'Figure 4.6: Mesos architecture'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.6：Mesos架构
- en: The third orchestration system, Apache Mesos, takes another design approach
    to address more advanced containers and data distribution. This leads Mesos to
    be primarily a resource management tool, ensuring containers can reach the right
    databases, make appropriate requests and changes, and maintain high availability.
    This approach enables supporting tens of thousands of nodes, which can be difficult
    for other applications. Mesos is not technically a container orchestration tool
    but a higher-level function that can support tools running container orchestration.
    Within Mesos, the Marathon tool is the one that provides those functions. Like
    Docker, Mesos does not have an integrated monitoring solution but can manage containers
    to report on those solutions. The core goal of Mesos is executing diverse workloads
    on a common platform.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个编排系统Apache Mesos采用另一种设计方法来处理更高级的容器和数据分布。这使得Mesos主要成为一个资源管理工具，确保容器能够到达正确的数据库，进行适当的请求和更改，并保持高可用性。这种方法使得支持数万个节点成为可能，这对于其他应用程序来说可能很困难。Mesos在技术上不是一个容器编排工具，而是一个更高层次的函数，可以支持运行容器编排的工具。在Mesos内部，Marathon工具是提供这些功能的一个工具。像Docker一样，Mesos没有集成的监控解决方案，但可以管理容器以报告这些解决方案。Mesos的核心目标是执行在通用平台上的各种工作负载。
- en: You should remember that no container orchestration system solves all problems,
    which is why it is merely part of the overall platform solution. Each of these
    tools could play a part within Platform Engineering, but the first step is choosing
    the development community supported. Docker offers quick options for application
    developers to move into microservices and run something. Kubernetes uses Docker
    containers but also integrates with the underlying infrastructure. Mesos specializes
    in running organization-critical workloads on thousands of machines and across
    multiple data centers. This comparison helps with picking the right platform.
    For most platforms, Kubernetes will be the easy choice. For start-ups focused
    on reaching market, Docker Swarm likely becomes the best option. For a mature
    business running thousands of containers and globally integrated databases, Mesos
    will likely be the best option. Our targeted community is that middle ground,
    building a stable platform, integrating infrastructure, allowing observability,
    and managing resources, which is why most examples in this book will suggest Kubernetes.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该记住，没有容器编排系统能够解决所有问题，这就是为什么它仅仅是整体平台解决方案的一部分。这些工具中的每一个都可能在平台工程中发挥作用，但第一步是选择得到开发社区支持的。Docker为应用开发者提供了快速选项，使他们能够转向微服务并运行某些东西。Kubernetes使用Docker容器，但也与底层基础设施集成。Mesos擅长在数千台机器和多个数据中心上运行组织关键的工作负载。这种比较有助于选择正确的平台。对于大多数平台来说，Kubernetes将是容易的选择。对于专注于进入市场的初创公司，Docker
    Swarm可能是最佳选择。对于运行数千个容器和全球集成数据库的成熟企业，Mesos可能是最佳选择。我们的目标社区是那个中间地带，构建稳定的平台，集成基础设施，允许可观察性，并管理资源，这就是为什么本书中的大多数示例都会建议使用Kubernetes。
- en: Kubernetes interfaces
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Kubernetes接口
- en: There are two substantial Kubernetes interfaces that are critical to mention
    in building a platform. The first is Crossplane ([https://www.crossplane.io/](https://www.crossplane.io/)),
    which connects Kubernetes within the cluster to external, non-Kubernetes resources.
    This uses a **Custom Resource Definition** (**CRD**) to represent external functions
    as native Kubernetes objects so each responds to standard Kubernetes commands
    (*Figure 4**.5*).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建平台时，有两个重要的Kubernetes接口需要提及。第一个是Crossplane ([https://www.crossplane.io/](https://www.crossplane.io/))，它将集群内的Kubernetes与外部、非Kubernetes资源连接起来。这通过**自定义资源定义**（**CRD**）将外部功能表示为原生Kubernetes对象，以便每个对象都能响应标准的Kubernetes命令（*图4.5*）。
- en: '![](img/B24465_04_7.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B24465_04_7.jpg)'
- en: 'Figure 4.7: Crossplane integration'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.7：Crossplane集成
- en: This overwrites some of the advantages of Docker Swarm in using a common API
    by making a Kubernetes API that treats all external functions similarly. You can
    then implement a Kubernetes solution without having the end-state resource or
    container written in Kubernetes, limiting the burden on the developer. Crossplane
    can be a key advantage in controlling Platform Engineering within your platform
    design. Investigating emerging tools such as Crossplane can help with finding
    missing pieces in your platform orchestration.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创建一个将所有外部功能同等对待的 Kubernetes API，这种方法覆盖了 Docker Swarm 使用通用 API 的一些优势。这样，你就可以在不将最终状态资源或容器编写为
    Kubernetes 的情况下实现 Kubernetes 解决方案，从而减轻开发者的负担。Crossplane 可以成为控制平台设计中平台工程的关键优势。研究新兴工具如
    Crossplane 可以帮助你在平台编排中找到缺失的部分。
- en: Another type of common tool associated with Kubernetes involves sidecar security,
    such as Istio ([https://istio.io/](https://istio.io/)) or Linkerd ([https://linkerd.io/](https://linkerd.io/)).
    Both tools provide an open source service mesh to enhance orchestration capabilities.
    These service mesh tools add functions such as traffic management and security,
    and can increase observability without having to refactor the company’s own code.
    These functions operate using a transparent process linked to service instances.
    A comparison can be made to how OTel operates within the containers; these tools
    operate next to the container at the service mesh level. Each takes advantage
    of Kubernetes interactions to establish a control plane to integrate data. When
    previously discussing architectural patterns, challenges in maintaining observability
    were discussed. These tools can integrate observability and management into common
    functions without disrupting application development.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Kubernetes 相关的另一类常见工具涉及边车安全，例如 Istio ([https://istio.io/](https://istio.io/))
    或 Linkerd ([https://linkerd.io/](https://linkerd.io/))。这两个工具都提供了一个开源的服务网格，以增强编排能力。这些服务网格工具增加了诸如流量管理和安全等功能，可以在不重构公司自身代码的情况下提高可观察性。这些功能通过与服务实例关联的透明过程运行。可以将这些工具与
    OTel 在容器内的工作方式进行比较；这些工具在服务网格级别位于容器旁边。每个工具都利用 Kubernetes 交互来建立控制平面以集成数据。在之前讨论架构模式时，讨论了保持可观察性的挑战。这些工具可以将可观察性和管理集成到常见功能中，而不会干扰应用程序开发。
- en: Monitoring and logging
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控和日志
- en: Prometheus offers powerful monitoring capabilities and works particularly well
    with Kubernetes, while the Elastic stack (Elasticsearch, Logstash, and Kibana)
    offers comprehensive logging solutions that excel in data visualization and analysis.
    These tools are first integrated at the collaboration point of the platform and
    then extend through webhooks into the deployment targets. Building these tools
    into the overall platform provides the ability to store data within a stable framework
    and monitor ongoing activities.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: Prometheus 提供强大的监控功能，与 Kubernetes 的配合尤为出色，而 Elastic stack（Elasticsearch、Logstash
    和 Kibana）则提供全面的日志解决方案，在数据可视化和分析方面表现卓越。这些工具首先在平台的协作点上集成，然后通过 webhooks 扩展到部署目标。将这些工具构建到整体平台中，可以提供在稳定框架内存储数据并监控持续活动的能力。
- en: Orchestration observability
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编排可观察性
- en: 'Orchestration observability comprises four key pillars: metrics, logs, traces,
    and measurements. You should remember that orchestration denotes an action while
    observability denotes a measurement. When discussing orchestration observability,
    we are talking about using orchestration actions to create a foundation for useful
    metrics. Useful to remember here is that observability is the final step of the
    observation process. The first element is deciding on points to observe, making
    the desired data observable, and then creating observability to report that data
    through the appropriate metrics.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 编排可观察性包括四个关键支柱：指标、日志、跟踪和度量。你应该记住，编排表示一个动作，而可观察性表示一个测量。在讨论编排可观察性时，我们是在谈论使用编排动作来创建有用指标的基础。在这里值得记住的是，可观察性是观察过程的最终步骤。第一个要素是决定要观察的点，使所需数据可观察，然后创建可观察性，通过适当的指标报告这些数据。
- en: 'Kubernetes observation can be based on several key areas: cluster and Pod monitoring,
    Deployment and Ingress metrics, persistent storage, and control plane metrics.
    Platform architecture establishes a Kubernetes baseline within the collaboration
    and deployment targets, so cluster monitoring ensures those nodes are functioning
    effectively. This helps determine how the applications are running within the
    node and the resources used overall. Cluster monitoring ties into Pod monitoring,
    ensuring not only that the entire cluster functions but also that each application
    functions.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes观察可以基于几个关键领域：集群和Pod监控、部署和入口指标、持久存储和控制平面指标。平台架构在协作和部署目标内建立Kubernetes基线，因此集群监控确保这些节点有效运行。这有助于确定应用程序在节点内的运行情况以及整体使用的资源。集群监控与Pod监控相结合，不仅确保整个集群运行良好，还确保每个应用程序运行良好。
- en: The next element of Kubernetes observation to consider is a tool such as Prometheus,
    which can be used to monitor active Kubernetes Deployments. Common metrics are
    compute utilization through the CPU and the overall Kubernetes state and memory.
    Establishing a Prometheus server creates a data model based on key-value pairs
    to enable query language, scrape targets for service discovery, and integrate
    modular components.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 需要考虑的Kubernetes观察的下一个元素是像Prometheus这样的工具，它可以用来监控活动的Kubernetes部署。常见的指标是通过CPU的计算机利用率和整体Kubernetes状态和内存。建立Prometheus服务器创建了一个基于键值对的数据模型，以启用查询语言，抓取目标进行服务发现，并集成模块化组件。
- en: In establishing a Prometheus architecture, there are several basic steps.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立Prometheus架构时，有几个基本步骤。
- en: 'The first steps are to pull data from the Kubernetes API (**1**), microservice
    autodiscovery (**2a**), or directly from Kubernetes nodes into the Prometheus
    server (**2b**). The Prometheus server then forwards information to an alert manager
    and visualization dashboard (**3** and **4**). The alert manager can then individually
    notify users (**5**) through asynchronous messages. The following architecture
    shows how different data can be incorporated (*Figure 4**.8*):'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是从Kubernetes API（**1**）、微服务自动发现（**2a**）或直接从Kubernetes节点将数据拉入Prometheus服务器（**2b**）。然后Prometheus服务器将信息转发到警报管理器和可视化仪表板（**3**和**4**）。警报管理器可以通过异步消息单独通知用户（**5**）。以下架构显示了如何将不同的数据集成（*图4.8*）：
- en: '![](img/B24465_04_8.jpg)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_04_8.jpg)'
- en: 'Figure 4.8: Sample Prometheus architecture'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.8：Prometheus架构示例
- en: This diagram shows how an effective tool can convert data from existing linked
    discovery into the Kubernetes orchestration, incorporate autodiscovery such as
    Fluentd, and push alerts and visualization. Another common tool for autodiscovery
    is OTel. Grafana is often used to display metrics. The visualization of metrics
    creates the desired observability for the overall architecture and applications.
    Further reading on Prometheus and specific implementations is available at [https://prometheus.io/](https://prometheus.io/).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了如何一个有效的工具可以将现有链接发现的数据转换为Kubernetes编排，集成自动发现如Fluentd，并推送警报和可视化。另一个常用的自动发现工具是OTel。Grafana通常用于显示指标。指标的可视化创建了整体架构和应用的期望可观察性。关于Prometheus和特定实现的进一步阅读可在[https://prometheus.io/](https://prometheus.io/)找到。
- en: These tools are just part of the solution as full capability depends on having
    effective CI/CD processes aligned with your DevOps culture.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具只是解决方案的一部分，因为完整的功能取决于拥有与您的DevOps文化相一致的有效CI/CD流程。
- en: Platform software delivery ecosystems
  id: totrans-90
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 平台软件交付生态系统
- en: 'The last step in our essential ecosystem for Platform Engineering incorporates
    pipelines to deliver software. Delivering software involves moving from a coded
    idea to where customers can interact with delivered software. Pipelines are the
    step-by-step directions to build code and then allow deployment. The standard
    approach involves creating tasks, which are grouped into jobs, which are then
    grouped into stages within the pipeline. Passing each stage of the pipeline allows
    the code to progress to the next stage and then deploy. Each task produces artifacts
    that are observable to quickly detect any bugs or defects within those pipelines.
    This helps clarify when a merge has been successful and when additional coding
    may be required. Incorporating effective tools into the platform ecosystem focuses
    on three knowledge areas: establishing CI/CD tools, integrating DevOps practices,
    and observing pipelines.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们平台工程基本生态系统的最后一步是整合软件交付的管道。软件交付涉及从编码的想法转移到客户可以与之交互的交付软件的地方。管道是逐步构建代码并允许部署的指导。标准方法包括创建任务，这些任务被分组为作业，然后这些作业在管道内被分组为阶段。通过管道的每个阶段，代码可以进步到下一个阶段并部署。每个任务都会产生可观察的工件，这有助于快速检测那些管道中的任何错误或缺陷。这有助于明确合并何时成功，何时可能需要额外的编码。将有效工具整合到平台生态系统中，重点关注三个知识领域：建立CI/CD工具、整合DevOps实践和观察管道。
- en: CI/CD tools
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CI/CD工具
- en: The first step in understanding a CI/CD tool ecosystem is understanding that
    all vendors aim to make sticky options. These sticky options ensure that once
    development begins, user options are limited to remaining on the current tool,
    enabling continuing revenue for these tools. Despite tools ranging from open source
    to premium options, the more connected options a CI/CD solution can offer, the
    better chance for return usage. Even with that understanding, there are some exceptional
    tools that enable delivering CI/CD solutions. The top candidates within the ecosystem
    are Jenkins, GitLab, and CircleCI. These tools are followed by less comprehensive
    but still manageable tools, such as Bitbucket, Spinnaker, Argo CD, and Harness.
    The most common distinction between these tools is how much CI/CD each offers
    as a part of an integrated platform. You can see this distinction in that GitLab
    offers a full DevOps platform, while Jenkins creates a dedicated automation server.
    Then, there are extended options, such as Azure Pipelines, which is capable of
    using AWS CI/CD elements to supplement the internal pipelines.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 理解CI/CD工具生态系统的第一步是认识到所有供应商都旨在提供粘性选项。这些粘性选项确保一旦开发开始，用户选项就限于继续使用当前工具，从而为这些工具带来持续的收入。尽管工具从开源到高级选项不等，但CI/CD解决方案能提供的连接选项越多，其再次使用的可能性就越大。即使有这种理解，也有一些异常的工具能够提供CI/CD解决方案。生态系统中的顶级候选者包括Jenkins、GitLab和CircleCI。这些工具之后是更不全面但仍可管理的工具，如Bitbucket、Spinnaker、Argo
    CD和Harness。这些工具之间最常见区别是它们作为集成平台一部分提供的CI/CD程度。您可以在GitLab提供完整的DevOps平台，而Jenkins创建一个专门的自动化服务器中看到这种区别。然后，还有扩展选项，如Azure
    Pipelines，它能够使用AWS CI/CD元素来补充内部管道。
- en: A 2023 CI tool survey ([https://www.jetbrains.com/lp/devecosystem-2022/team-tools/#do-you-use-any-of-the-following-tools-in-the-cloud-](https://www.jetbrains.com/lp/devecosystem-2022/team-tools/#do-you-use-any-of-the-following-tools-in-the-cloud-))
    shows that most organizations use Jenkins (47%), GitHub Actions (27%), GitLab
    CI (27%), and Azure DevOps (13%). While the survey focused on tool usage, factors
    for selecting the right tool included development workflows, usability, pipeline
    configuration and feedback, scalability, and security. Factors associated with
    but external to the tool included selecting for cost efficiency and hosting model.
    Some of these elements (development workflow, usability, scalability, security,
    and cost) were previously discussed as part of the platform ecosystem, and handling
    those issues concurrently provides a benefit to the core platform. This leaves
    the core element as selecting an appropriate tool within the platform as the configuration.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 2023 年 CI 工具调查 ([https://www.jetbrains.com/lp/devecosystem-2022/team-tools/#do-you-use-any-of-the-following-tools-in-the-cloud-](https://www.jetbrains.com/lp/devecosystem-2022/team-tools/#do-you-use-any-of-the-following-tools-in-the-cloud-))
    显示，大多数组织使用 Jenkins（47%）、GitHub Actions（27%）、GitLab CI（27%）和 Azure DevOps（13%）。虽然调查侧重于工具的使用，但选择合适工具的因素包括开发工作流程、可用性、管道配置和反馈、可扩展性和安全性。与工具相关但外部因素包括选择成本效益和托管模式。其中一些元素（开发工作流程、可用性、可扩展性、安全性和成本）之前作为平台生态系统的一部分进行了讨论，同时处理这些问题可以给核心平台带来好处。这留下了核心元素，即在平台中选择合适的工具作为配置。
- en: The first part of a pipeline addresses how the initial pipeline is configured.
    Some code uses direct code as YAML files, which could include a variety of approaches
    from Terraform or Helm charts. YAML has become one of the most common approaches.
    Even tools that offer **Graphical User Interfaces** (**GUIs**) to create pipelines
    then translate into some form of YAML. Working directly from coding languages
    can offer options to rewrite pipelines quicker, but again, many processes are
    shortened through the GUIs. For instance, GitLab separates pipelines into jobs
    as individual instructions, runners that execute jobs, and stages that combine
    different jobs (*Figure 4**.9*).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 管道的第一个部分解决初始管道的配置方式。一些代码使用直接代码作为 YAML 文件，这可能包括来自 Terraform 或 Helm 图表的各种方法。YAML
    已经成为最常见的方法之一。即使提供 **图形用户界面**（**GUI**）以创建管道的工具，也会将其转换为某种形式的 YAML。直接从编程语言工作可以提供快速重写管道的选项，但同样，许多过程通过
    GUIs 被缩短。例如，GitLab 将管道分为作业作为单独的指令、执行作业的运行者和组合不同作业的阶段（*图 4.9*）。
- en: '![](img/B24465_04_9.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B24465_04_9.jpg)'
- en: 'Figure 4.9: Sample pipeline for GitLab'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.9：GitLab 的示例管道
- en: Jenkins offers stages along the top of its display but presents jobs on a different
    window. The Jenkins visualization compares the number of times each stage was
    run and the time it took for each stage. Both GitLab and Jenkins applications
    call jobs from the individual elements within the pipeline stages. Executing jobs
    leads to the next element of workflow configuration. Many of the differences in
    the various ecosystem tools are more about style than substance. The best way
    to get familiar with them is to try the different options. The underlying functionality
    remains similar. The challenge then becomes how you align different teams if they
    are each using different tools. Platforms provide opinionated decisions and allow
    tailored training to ensure all employees meet the same standards. Some of these
    initial standards are addressed by how the DevOps culture handles the delivery
    process.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: Jenkins 在其显示的顶部提供阶段，但将作业展示在不同的窗口中。Jenkins 可视化比较了每个阶段运行的次数以及每个阶段所需的时间。GitLab
    和 Jenkins 应用程序都从管道阶段内的各个元素中调用作业。执行作业导致工作流程配置的下一个元素。各种生态系统工具之间的许多差异更多的是关于风格而不是实质。熟悉它们的最佳方式是尝试不同的选项。底层功能保持相似。挑战在于如何使使用不同工具的不同团队保持一致。平台提供有见地的决策，并允许定制培训以确保所有员工达到相同的标准。其中一些初始标准通过
    DevOps 文化如何处理交付过程得到解决。
- en: DevOps integration
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DevOps 集成
- en: 'DevOps involves flow, feedback, and improvement, and these are strongly reflected
    within the CI/CD environment and the chosen pipelines. Using known DevOps best
    practices shows all pipelines should be structured into the following four areas:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: DevOps 涉及流程、反馈和改进，这些在 CI/CD 环境和选择的管道中得到强烈反映。使用已知的 DevOps 最佳实践表明，所有管道都应该结构化为以下四个区域：
- en: '**Develop**: Initial code push. Moves code from the source repository into
    the pipeline and conducts static tests to ensure basic formatting and language
    errors are removed. Potential artifacts include code files and review logs.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发**：初始代码推送。将代码从源代码库移动到管道中，并执行静态测试以确保移除基本的格式化和语言错误。可能的工件包括代码文件和审查日志。'
- en: '**Build**: Uses the code file to build into integrated source code, making
    changes to the baseline and again verifying through static testing that new code
    elements continue to work and variables remain consistent. Potential artifacts
    include integrated code files, review logs, and version control.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建**：使用代码文件构建集成源代码，修改基线，并通过静态测试再次验证新代码元素是否继续工作且变量保持一致。可能的工件包括集成代码文件、审查日志和版本控制。'
- en: '**Test**: Runs integrated code against a number of tests, such as functional,
    system, or unit, to reveal any errors in execution. This can include security
    tests. Moves the code from a static element into a completed application. Potential
    artifacts include test reports, vulnerability analysis, **Software Bill of Materials**
    (**SBOM**), and code files.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试**：对集成代码运行一系列测试，如功能测试、系统测试或单元测试，以揭示执行中的任何错误。这可能包括安全测试。将代码从静态元素移动到完整的应用程序。可能的工件包括测试报告、漏洞分析、**软件物料清单**（**SBOM**）和代码文件。'
- en: '**Deploy**: Deploys the final version to production. Ensures completed software
    matches the selected environments. Potential artifacts include working applications
    and production logs.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部署**：将最终版本部署到生产环境中。确保完成的软件与所选环境匹配。可能的工件包括运行中的应用程序和生产日志。'
- en: Each stage has a specific role that is characterized by the defined artifacts.
    When matching the desired CI/CD strategy to a DevOps framework, the goal should
    be identifying the tasks and jobs needed to complete each stage. Identifying those
    elements helps you select the artifacts needed. As an example, the level of security
    artifacts needed can vary greatly between different use cases. A retail store
    might only run vulnerabilities after deploying code for real-time changes, while
    a financial institution might be more concerned with underlying gaps. The artifacts
    allow you to make detailed decisions about pipeline stages.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 每个阶段都有一个特定的角色，其特征是定义的工件。当将所需的CI/CD策略与DevOps框架匹配时，目标应该是确定完成每个阶段所需的任务和作业。识别这些元素有助于您选择所需的工件。例如，不同用例中所需的安全工件水平可能会有很大差异。一家零售店可能只在部署代码进行实时更改后运行漏洞，而金融机构可能更关注潜在差距。这些工件使您能够对管道阶段做出详细的决定。
- en: One common DevOps concern is whether all code items need to pass all pipeline
    stages. In some instances, the code is deployed to a test instance for user acceptance
    or other factors. That test instance may not require the fully detailed tests
    desired if an application is moving directly to a production environment. Selecting
    tasks and jobs within stages allows you to comment out, or turn off, pipeline
    tasks at any stage. The final artifacts should reflect the unsupported areas.
    If you make the assumption that any pipeline passes all implemented functions,
    it can still lead to errors later. The platform’s strength is in delegating those
    decisions about pipeline task requirement to the admin level, rather than allowing
    the user to graduate poor applications. This helps to improve the overall quality.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的DevOps问题是是否所有代码项都需要通过所有管道阶段。在某些情况下，代码被部署到测试实例以供用户验收或其他因素。如果应用程序直接移动到生产环境，则该测试实例可能不需要完全详细的测试。在阶段内选择任务和作业允许您在任何阶段注释掉或关闭管道任务。最终的工件应反映不受支持的区域。如果您假设任何管道都通过了所有实现的功能，这仍然可能导致以后的错误。该平台的优势在于将关于管道任务要求的决策委托给管理员级别，而不是允许用户毕业质量较差的应用程序。这有助于提高整体质量。
- en: Another benefit of platform DevOps is the ability to create multiple pipelines
    within set repositories. This means that while the user may not be able to turn
    off pipeline elements, they can start by selecting a pipeline with fewer elements.
    This allows code to be built to different completion levels. It also aids in upskilling
    individuals by gradually using more advanced pipelines. An example might be a
    coding element passed between one dev team and another to execute a specific function.
    Security, functional, and smoke tests might be a step too far for those early
    stages, leading to a specific dev pipeline for that one team. Having a centralized
    template allows the organization to more thoroughly understand how, and why, which
    code passes which pipelines.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 平台DevOps的另一个好处是能够在设置好的仓库内创建多个管道。这意味着虽然用户可能无法关闭管道元素，但他们可以从选择包含较少元素的管道开始。这允许代码以不同的完成程度构建。它还有助于通过逐步使用更高级的管道来提升个人技能。一个例子可能是一个编码元素在开发团队之间传递以执行特定功能。对于早期阶段来说，安全、功能和烟雾测试可能太过复杂，导致为该团队创建一个特定的开发管道。拥有集中式模板允许组织更深入地了解代码是如何以及为什么通过哪些管道。
- en: While emphasizing artifacts, you can sometimes lose track of why those artifacts
    are important. The artifacts within the pipeline allow for comparison between
    different pipelines, and different results from the same pipeline. If the security
    scanner or SBOM tool is always the same, reverting to the platform standard, the
    different results can be compared through a diff tool (a difference checker) to
    quickly spot the changes between items. In security results, some vulnerabilities
    might be just manual, such as having a backup power supply, so elements within
    the pipeline can be grayed out or turned off so those vulnerabilities do not appear.
    Making these changes at a platform pipeline level then automatically adjusts the
    artifacts and prevents users from chasing errors that cannot be fixed with code.
    This leads then to the final element of being able to observe the pipeline effectively.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在强调工件时，有时会失去对为什么这些工件重要的跟踪。管道内的工件允许比较不同的管道，以及同一管道的不同结果。如果安全扫描器或SBOM工具始终相同，回归到平台标准，不同的结果可以通过diff工具（差异检查器）进行比较，以快速发现项目之间的变化。在安全结果中，一些漏洞可能是手动操作，例如有备用电源供应，因此管道内的元素可以被灰色显示或关闭，这样那些漏洞就不会出现。在平台管道级别进行这些更改后，会自动调整工件，并防止用户追逐无法用代码修复的错误。这最终导致能够有效地观察管道的最后要素。
- en: Pipeline observability
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管道可观察性
- en: In our opinion, pipelines are one of the most overused and least understood
    concepts within modern software development. Pipelines depict the processing element
    chain, with each output contributing to the following input. Pipelines begin with
    the previous CI/CD elements, but a well-built software pipeline adds factors for
    monitoring and operations. The challenge becomes ensuring you differentiate between
    the software pipeline as a conceptual tool and aspects of those pipelines as software
    tools. In managing observability within the platform ecosystem, the pipeline should
    be treated like the software approaches to create functional code.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们看来，管道是现代软件开发中最被过度使用且理解最少的理念之一。管道描绘了处理元素链，每个输出都为后续输入做出贡献。管道始于之前的CI/CD元素，但一个构建良好的软件管道会添加监控和运维的因素。挑战在于确保你能够区分软件管道作为一个概念工具和作为软件工具的方面。在管理平台生态系统中的可观察性时，应该将管道视为创建功能性代码的软件方法。
- en: Pipeline observability depends on being able to collect, process, and route
    logs from the pipeline process to any other location that is owned and managed.
    Here, the observability comes from compiling the artifacts associated with the
    pipeline stages. Where the artifacts arrive depends on the early choices you make
    about the pipeline. One of the primary goals here is using a diff tool to distinguish
    between various elements. **Diff** tools come in different formats and languages
    but compare the output from one section to another. Comparing changes between
    different builds allows feedback and continuous improvement to be key DevOps parts
    of the essential platform ecosystem.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 管道可观察性依赖于能够收集、处理和路由管道过程中的日志到任何由其拥有和管理的地方。在这里，可观察性来自于编译与管道阶段相关的工件。工件到达的位置取决于你对管道早期所做的选择。这里的主要目标之一是使用差异工具来区分不同的元素。**差异**工具有不同的格式和语言，但比较不同部分之间的输出。比较不同构建之间的更改允许反馈和持续改进成为关键DevOps平台生态系统的一部分。
- en: As we close this section, one of our favorite stories about pipelines comes
    to mind. A development team we were working with had recently been introduced
    to DevSecOps. They called us and informed us that all their security issues had
    been solved, the new feature was integrated into the pipeline, and the product
    was secure. We asked to see the security log results and received a blank look.
    Rather than creating security logs, the security tool within the pipeline was
    set to “true,” meaning the only requirement was for the security scanner to run.
    This, obviously, is not the goal for secure software development. Platforms help
    create opinionated pipelines, so the needed artifacts are always created, rather
    than leaving those decisions to developers. With the team, we adjusted the pipeline,
    set up a diff tool, and were clearly able to demonstrate the risk changes between
    one version and the next. Consolidating these issues and knowing the needed parts
    helps bring the platform ecosystem from an initial design to a workable infrastructure.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束本节时，我们想起了关于管道的一个最喜欢的例子。我们曾与一个开发团队合作，他们最近刚刚接触DevSecOps。他们打电话给我们，告诉我们所有安全问题都已解决，新功能已集成到管道中，产品是安全的。我们要求查看安全日志结果，却得到了一个茫然的表情。而不是创建安全日志，管道内的安全工具被设置为“true”，这意味着唯一的要求是运行安全扫描器。这显然不是安全软件开发的目标。平台帮助创建有偏见的管道，因此所需的工件总是被创建，而不是将这些决定留给开发者。与团队一起，我们调整了管道，设置了差异工具，并清楚地展示了版本之间风险变化的差异。整合这些问题并了解所需的部分有助于将平台生态系统从初始设计转变为可工作的基础设施。
- en: Summary
  id: totrans-113
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter started by introducing the concept of a platform ecosystem, with
    a platform being more than a single tool but rather the interaction of multiple
    tools working together. We discussed establishing IaC for the basic platform tools
    and then using configuration as code to establish working areas. Choosing options
    early may cause an initial training burden but this is made up for by the time
    gained in delivering working applications.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 本章首先介绍了平台生态系统的概念，平台不仅仅是一个单一的工具，而是多个工具协同工作的交互。我们讨论了为基本平台工具建立基础设施即代码（IaC），然后使用配置即代码来建立工作区域。早期选择选项可能会造成初始培训负担，但通过交付工作应用节省的时间可以弥补这一点。
- en: We next focused on those working applications by looking at how you orchestrate
    the platform environment. This section built an understanding of how different
    systems can be configured for different elements as you move from the core platform
    cluster to the deployment targets, and containers within those targets. Multiple
    options were considered but the preferred approach for this book remains working
    in Kubernetes to deliver efficient tools. While Kubernetes is not always the most
    effective as an out-of-the-box solution, it offers sufficient power at the platform
    level to make the needed changes.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们通过观察如何编排平台环境来关注那些工作应用。本节建立了一个理解，即当你从核心平台集群移动到部署目标以及目标内部的容器时，不同的系统可以配置为不同的元素。考虑了多种选项，但本书中推荐的方法仍然是使用Kubernetes来提供高效工具。虽然Kubernetes作为一个现成的解决方案并不总是最有效的，但它提供了足够的平台级能力来实现所需的变化。
- en: Lastly, we discussed the importance of CI/CD systems as the end element of the
    platform ecosystem. All applications must pass through pipelines, so having the
    right tool is important. Tools such as GitLab, Circle CI, and Jenkins were all
    considered, but the best solution will be the one that is right for your team.
    The next chapter moves beyond these initial solutions to discuss how AI-generated
    solutions can help expedite the build and deploy phases associated with your platform.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们讨论了CI/CD系统作为平台生态系统的最终元素的重要性。所有应用程序都必须通过管道，因此拥有合适的工具非常重要。GitLab、Circle CI和Jenkins等工具都曾考虑过，但最佳解决方案将是适合您团队的那一个。下一章将超越这些初始解决方案，讨论AI生成的解决方案如何帮助加速与平台相关的构建和部署阶段。
- en: Call to action
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 行动呼吁
- en: Determine the right IaC/configuration as code integration to support the platform’s
    architecture and requirements.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定合适的IaC/配置代码集成以支持平台架构和需求。
- en: Implement monitoring solutions and confirm data arrives at the right elements
    for action.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施监控解决方案并确认数据到达正确的元素以采取行动。
- en: Confirm the CI/CD tools generate the right artifacts for continuous observability.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确认CI/CD工具生成正确的工件以支持持续可观察性。
- en: 'Part 2: Execute **Run Enterprise Platforms with Precision**'
  id: totrans-121
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分：精确执行**运行企业平台**
- en: This part equips us to operate modern platforms securely, intelligently, and
    efficiently. We will integrate AI, observability, security, performance tuning,
    and platform team design to manage platforms in production environments. Each
    chapter focuses on execution with clarity, so we can deliver stability, scale,
    and speed under real-world conditions.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
