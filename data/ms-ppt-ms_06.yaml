  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分
- en: Creating More Creative and Impactful Visuals
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建更具创意和影响力的视觉元素
- en: In the second part of the book, we’ll discuss how to leverage AI tools, such
    as M365 Copilot, as a content creation starting point. We’ll also learn about
    the visual and multimedia tools in the application that can help avoid text-heavy
    slides while adding visual interest with meaningful animations, transitions, and
    interactivity in presentation content. A chapter on third-party add-ins will put
    forward some of the best productivity and creative tools in the industry. By the
    end of this part, you’ll have the knowledge needed to create more creative and
    impactful visuals in your presentations.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第二部分，我们将讨论如何利用AI工具，如M365 Copilot，作为内容创作的起点。我们还将了解应用中的视觉和多媒体工具，这些工具可以帮助避免文字过多的幻灯片，并通过有意义的动画、过渡和互动性在演示内容中增加视觉兴趣。关于第三方插件的一章将提出一些行业中最优秀的生产力和创意工具。到本部分结束时，您将拥有在演示中创建更具创意和影响力的视觉元素所需的知识。
