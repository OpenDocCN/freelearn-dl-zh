- en: '11'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: Financial Services and the Next Wave of AI
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 金融服务业和人工智能的下一波浪潮
- en: In today’s rapidly evolving financial landscape, AI has emerged as the cornerstone
    of modern banking transformation. As financial institutions worldwide race to
    embrace AI technologies, a new paradigm is taking shape, one where intelligent
    systems evolve from simple prediction to autonomous action, revolutionizing everything
    from customer experience to risk management across the financial services value
    chain.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天快速发展的金融环境中，人工智能已成为现代银行转型的基石。随着全球金融机构竞相拥抱人工智能技术，一个新的范式正在形成，其中智能系统从简单的预测发展到自主行动，从客户体验到风险管理，在整个金融服务价值链上实现革命性变革。
- en: This chapter explores how AI is transforming financial services and creating
    unprecedented opportunities for efficiency, personalization, and innovation.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了人工智能如何改变金融服务并创造前所未有的效率、个性化和创新机会。
- en: 'By the end of this chapter, you will understand the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将了解以下内容：
- en: How **generative AI** (**GenAI**) is transforming key use cases in banking
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成式人工智能**（**GenAI**）如何改变银行业的核心用例'
- en: The ways AI is enhancing customer experiences through intelligent, conversational
    interactions
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能通过智能、对话式交互增强客户体验的方式
- en: Advanced approaches to financial crime prevention and regulatory compliance
    using AI
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用人工智能进行金融犯罪预防和监管合规的先进方法
- en: Real-world examples of operational data stores that can also serve as AI feature
    stores, powering both prediction and generation
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实际操作数据存储的实例，这些实例也可以作为人工智能特征存储，为预测和生成提供动力
- en: How domain-specific embeddings are revolutionizing search, compliance, and contextual
    analysis in finance
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何使特定领域的嵌入革命性地改变金融领域的搜索、合规和上下文分析
- en: Design principles and reference architectures for building and deploying agentic
    AI, balancing innovation, security, and regulatory trust
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建和部署代理式人工智能的设计原则和参考架构，平衡创新、安全和监管信任
- en: The evolution of AI in finance
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 金融领域人工智能的演变
- en: 'AI’s journey in finance began with predictive analytics: leveraging historical
    and real-time data to assess credit risk, flag fraud, forecast market shifts,
    and predict customer churn. These use cases remain foundational, delivering critical
    business value and driving operational efficiency. Financial institutions need
    robust, real-time feature stores enabling scalable access to the rich, governed
    data that predictive models require to optimize decisions and outcomes.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在金融领域的旅程始于预测分析：利用历史和实时数据来评估信用风险、标记欺诈、预测市场变化和预测客户流失。这些用例仍然是基础性的，提供了关键的商业价值并推动了运营效率。金融机构需要强大的、实时的特征存储，以实现可扩展地访问预测模型所需的丰富、受控数据，以优化决策和结果。
- en: 'The arrival of GenAI expanded the field. With **large language models** (**LLMs**)
    and **retrieval-augmented generation** (**RAG**), financial institutions are now
    automating and enhancing tasks once considered too complex: generating policy
    documents, responding to regulatory queries, summarizing large compliance filings,
    and powering conversational banking for clients and employees alike. GenAI uplevels
    intelligence from “*what might happen*” to “*let me generate*, *synthesize*, *and
    explain*,” unlocking even more value from both structured and unstructured data.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的到来扩大了该领域。随着**大型语言模型**（**LLMs**）和**检索增强生成**（**RAG**），金融机构现在正在自动化和增强以前被认为过于复杂的任务：生成政策文件、回应监管查询、总结大量合规文件，并为客户和员工提供对话式银行服务。生成式人工智能将智能从“*可能发生什么*”提升到“*让我生成、综合和解释*”，从而从结构化和非结构化数据中释放出更多价值。
- en: 'Today, we stand at the threshold of the next major advance: agentic AI. Unlike
    predictive and generative approaches that support decision-making or content creation,
    agentic AI delivers autonomous, goal-driven agents that can perceive, reason,
    and act within defined parameters. Think of agentic AI as the *digital relationship
    manager* or *virtual compliance officer* proactively monitoring markets, adapting
    to regulatory changes, managing workflows, and engaging with clients in real time,
    all while continuously learning and improving.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们站在下一个重大进步的门槛上：代理式人工智能。与支持决策或内容创建的预测和生成方法不同，代理式人工智能提供的是自主、目标驱动的代理，它们可以在定义的参数内感知、推理和行动。将代理式人工智能视为*数字关系经理*或*虚拟合规官员*，它们积极监控市场、适应监管变化、管理工作流程，并在实时与客户互动，同时不断学习和改进。
- en: 'This evolution from predictive AI to GenAI to agentic AI demands a data platform
    that is both flexible and powerful:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 从预测人工智能到通用人工智能再到代理人工智能的这种演变，需要既灵活又强大的数据平台：
- en: For **predictive AI**, financial institutions need robust, real-time feature
    stores, where machine learning features are stored, versioned, and accessed seamlessly
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于**预测人工智能**，金融机构需要稳健、实时的特征存储，其中机器学习特征被存储、版本化并无缝访问
- en: For **GenAI**, they require integration of structured data and unstructured
    data, spanning transaction records, documents, emails, images, voice recordings,
    video content, and domain-specific knowledge bases to accelerate language models,
    Vector Search, and context retrieval
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于**通用人工智能（GenAI**），这需要整合结构化数据和非结构化数据，涵盖交易记录、文档、电子邮件、图像、语音录音、视频内容以及特定领域的知识库，以加速语言模型、向量搜索和上下文检索
- en: For **agentic AI**, a unified substrate and operational agility are essential
    for agents to perceive the world, remember context, make informed decisions, and
    act with confidence
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于**代理人工智能**，统一的底层和操作敏捷性对于代理感知世界、记住上下文、做出明智的决策并自信地行动至关重要
- en: In financial services, these AI waves are not isolated; they build upon one
    another. Leaders continue to rely on robust predictive models, amplified by generative
    automation, orchestrated by agentic systems that adapt and govern in real time.
    Modern and intelligent databases such as MongoDB, with their flexible architecture
    and deep integration capabilities, such as MongoDB’s integration with Voyage AI,
    offer best-in-class embedding models and rerankers and are uniquely positioned
    to support this hybrid landscape.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融服务领域，这些人工智能浪潮并非孤立存在；它们相互依存。领导者继续依赖稳健的预测模型，这些模型通过生成自动化得到增强，由能够实时适应和管理的代理系统进行编排。现代智能数据库，如MongoDB，凭借其灵活的架构和深度集成能力，例如MongoDB与Voyage
    AI的集成，提供一流的嵌入模型和重排器，并独特地定位以支持这种混合环境。
- en: The power of finance-specific embeddings
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 财务特定嵌入的力量
- en: In financial services, precision, context, and explainability are essential.
    Whether analyzing regulatory disclosures, automating compliance workflows, or
    engaging clients with intelligent assistants, AI systems must interpret complex
    language and domain-specific constructs with a high degree of accuracy. General-purpose
    LLMs, trained broadly across internet content, often struggle with the specialized
    terminology, abbreviations, and structured formats that define the financial world.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融服务中，精确性、情境和可解释性至关重要。无论是分析监管披露、自动化合规工作流程还是与智能助手互动，人工智能系统都必须以高精度解释复杂语言和特定领域的结构。
- en: '**Domain-specific embeddings**, particularly those tuned for finance, are a
    foundational solution to this challenge. These embeddings are designed to capture
    the semantics, patterns, and regulatory context unique to the industry, enabling
    AI models to do the following:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**特定领域的嵌入**，尤其是那些针对财务领域进行调整的嵌入，是解决这一挑战的基础性解决方案。这些嵌入旨在捕捉行业特有的语义、模式和监管环境，使人工智能模型能够做到以下方面：'
- en: '**Accurately interpret financial documents**, from earnings calls and filings
    to contracts and risk reports'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**准确解读财务文件**，从收益电话会议和申报文件到合同和风险评估报告'
- en: '**Surface relevant insights** using RAG or semantic search, improving accuracy
    and reducing hallucinations'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用RAG或语义搜索**呈现相关见解**，提高准确性并减少幻觉
- en: '**Support explainability**, making outputs more auditable and compliant with
    regulatory expectations'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持可解释性**，使输出更具可审计性并符合监管预期'
- en: '**Deliver just-in-time intelligence**, drawing on domain knowledge instantly
    to guide decision-making'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供即时情报**，即时利用领域知识来指导决策'
- en: Recent developments in this space, such as Voyage AI’s `voyage-finance-2` embeddings,
    demonstrate how domain-tuned models outperform general-purpose alternatives in
    finance-specific tasks. Benchmark results have shown significantly improved relevance
    in information retrieval and question-answering over financial texts.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 该领域最近的发展，如Voyage AI的`voyage-finance-2`嵌入，展示了如何针对特定领域调整的模型在财务特定任务中优于通用替代品。基准测试结果表明，在金融文本的信息检索和问答方面，相关性显著提高。
- en: These finance-specific embeddings allow developers to build AI applications
    that are not only more context aware but also more aligned with the rigorous standards
    of the financial industry.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些特定于财务的嵌入允许开发者构建不仅更加情境感知，而且与金融行业严格标准更加一致的AI应用。
- en: As financial institutions adopt GenAI and agentic AI, *embedding domain knowledge
    directly into model representations will be critical* to building systems that
    are intelligent, trustworthy, and operationally resilient.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 随着金融机构采用通用人工智能和代理人工智能，*将领域知识直接嵌入到模型表示中将成为构建智能、值得信赖且具有操作弹性的系统的关键*。
- en: "Learn more about Voyages AI’s finance embeddings in this blog post: [https://blog.voyageai.com/2024/06/03/domain-specific-embeddings-finance-edition-voyage-finance-2/](https://blog.voyageai.com/2024/06/03/domain-specific-embeddings-finance-edition-voyage-fi\uFEFF\
    nance-2/)."
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中了解更多关于Voyages AI的金融嵌入技术：[https://blog.voyageai.com/2024/06/03/domain-specific-embeddings-finance-edition-voyage-finance-2/](https://blog.voyageai.com/2024/06/03/domain-specific-embeddings-finance-edition-voyage-finance-2/).
- en: Transforming credit applications with AI
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用AI改造信用申请
- en: The same AI progression from predictive AI to GenAI to agentic AI is profoundly
    reshaping how credit applications are assessed, processed, and scored. Traditionally,
    credit scoring was based on rigid rules and limited historical data, often excluding
    individuals with thin or no credit files. Predictive AI began to address these
    limitations by using machine learning to forecast loan defaults based on historical
    patterns in credit behavior.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 从预测人工智能到通用人工智能再到代理人工智能的相同AI进步，正在深刻地重塑信用申请的评估、处理和评分方式。传统上，信用评分基于僵化的规则和有限的历史数据，通常排除了信用记录薄弱或没有信用记录的个人。预测人工智能开始通过使用机器学习来预测基于信用行为历史模式的贷款违约，从而开始解决这些限制。
- en: As the industry moved toward alternative credit scoring, AI models started incorporating
    non-traditional data sources such as rental history, utility payments, and digital
    footprints, offering a broader and more inclusive view of creditworthiness. This
    shift enabled lenders to assess risk with greater nuance and serve previously
    overlooked segments.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 随着行业向替代信用评分转变，AI模型开始整合非传统数据源，如租赁历史、公用事业支付和数字足迹，提供了一个更广泛、更具包容性的信用价值评估视角。这一转变使贷方能够以更细微的方式评估风险，并为以前被忽视的细分市场提供服务。
- en: 'Today, GenAI and agentic AI are driving the next leap forward, creating a more
    adaptive, intelligent, and inclusive credit ecosystem:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，通用人工智能（GenAI）和代理人工智能正在推动下一个飞跃，创造一个更加适应、智能和包容的信用生态系统：
- en: GenAI enhances data understanding and synthesis, making it possible to extract
    and structure information from unstructured sources such as bank statements, income
    proofs, or email correspondence. It can also generate human-readable explanations
    of complex decisions and create synthetic data that fills gaps in limited datasets,
    offering a more holistic view of financial behavior.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通用人工智能增强了数据理解和综合能力，使得从银行对账单、收入证明或电子邮件往来等非结构化来源中提取和结构化信息成为可能。它还可以生成对复杂决策的人类可读解释，并创建填补有限数据集空白的合成数据，从而提供对金融行为的更全面视角。
- en: Agentic AI brings autonomous, goal-driven capabilities that allow systems to
    manage entire credit workflows, automating document collection, verifying identity,
    adapting scoring logic in response to regulation changes, and even guiding applicants
    through the process interactively and intelligently.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理人工智能带来了自主、目标驱动的功能，使系统能够管理整个信用工作流程，自动化文件收集、验证身份、根据监管变化调整评分逻辑，甚至以交互式和智能的方式引导申请人通过流程。
- en: 'This progression delivers benefits across several dimensions:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这种进步在多个维度上带来益处：
- en: '**Adaptability**: AI models continuously learn and evolve in response to changing
    economic conditions and consumer behaviors. This ensures credit scoring systems
    remain accurate, responsive, and relevant in dynamic financial environments.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适应性**：AI模型会持续学习并适应不断变化的经济条件和消费者行为，这确保了信用评分系统在动态的金融环境中保持准确性、响应性和相关性。'
- en: '**Fraud detection**: AI detects anomalies and suspicious activity in real time
    by analyzing patterns across applications and transaction histories.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欺诈检测**：AI通过分析申请和交易历史中的模式，实时检测异常和可疑活动。'
- en: '**Predictive analysis**: Machine learning techniques uncover correlations and
    indicators of credit risk from vast, complex datasets, going beyond what rule-based
    systems can detect.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测分析**：机器学习技术从庞大的、复杂的数据集中揭示出信用风险的关联性和指标，超越了基于规则的系统能够检测到的范围。'
- en: '**Behavioral scoring**: For individuals lacking credit history, AI can generate
    dynamic risk assessments based on real-time financial behavior and spending habits.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行为评分**：对于缺乏信用历史的人来说，AI可以根据实时金融行为和消费习惯生成动态风险评估。'
- en: '**Transparency in declinations**: AI can help explain why a credit application
    was denied, moving beyond binary decisions to offer actionable, human-readable
    feedback.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**拒绝的透明度**：人工智能可以帮助解释为什么拒绝信用申请，超越二元决策，提供可操作的、人类可读的反馈。'
- en: Despite the clear benefits, **transparency and explainability** remain common
    concerns, particularly among financial institutions subject to regulatory scrutiny.
    The complexity of deep learning models has historically made it difficult to explain
    decisions to consumers and regulators. Fortunately, advancements in **explainable
    AI** (**XAI**), including techniques such as **SHapley Additive exPlanations**
    (**SHAP**) values and **Local Interpretable Model-agnostic Explanations** (**LIME**)
    plots, now provide visibility into how models arrive at their conclusions, helping
    demystify the *black box* and restore trust in AI-driven decisions.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有明显的益处，**透明度和可解释性**仍然是常见的担忧，尤其是在受到监管审查的金融机构中。深度学习模型的复杂性历史上使得向消费者和监管机构解释决策变得困难。幸运的是，**可解释人工智能**（**XAI**），包括如**SHapley
    Additive exPlanations**（**SHAP**）值和**Local Interpretable Model-agnostic Explanations**（**LIME**）图等技术，现在可以提供模型得出结论的可见性，有助于揭开“黑盒”的面纱并恢复对人工智能驱动决策的信任。
- en: Moreover, GenAI can complement these techniques by generating natural language
    explanations for credit outcomes, further bridging the gap between complex model
    logic and human understanding.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，GenAI可以通过生成关于信用结果的自然语言解释来补充这些技术，进一步弥合复杂模型逻辑与人类理解之间的差距。
- en: Building a smarter credit system with MongoDB
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用MongoDB构建更智能的信用系统
- en: Supporting this evolution requires a modern, flexible data platform. MongoDB,
    with its document-based data model and developer-friendly architecture, is ideally
    suited to power AI-driven credit workflows.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 支持这一演变需要一个现代、灵活的数据平台。MongoDB，凭借其基于文档的数据模型和开发者友好的架构，非常适合为人工智能驱动的信用工作流程提供动力。
- en: 'Key advantages include the following:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 主要优势包括以下内容：
- en: '**Simplified data capture and processing**: By leveraging JSON for online application
    forms, institutions can streamline data ingestion, reduce redundancy, and improve
    processing speed. The document model excels at managing diverse data types, such
    as personal, financial, and employment, without sacrificing structure.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化的数据捕获和处理**：通过利用JSON在线应用程序表单，机构可以简化数据摄取，减少冗余，并提高处理速度。文档模型擅长管理多种数据类型，如个人、财务和就业数据，而不会牺牲结构。'
- en: '**AI-enhanced credit scoring**: With MongoDB’s developer data platform, a unified
    suite of data services built around a cloud-native database, financial institutions
    can build a 360-degree view of each customer by combining structured, semi-structured,
    and unstructured data sources.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能增强的信用评分**：借助MongoDB的开发者数据平台，一个围绕云原生数据库构建的统一数据服务套件，金融机构可以通过结合结构化、半结构化和非结构化数据源来构建每个客户的360度视图。'
- en: '**Transparent declinations with LLMs**: LLMs integrated with MongoDB can interpret
    the outputs of complex machine learning models such as XGBoost. Instead of issuing
    vague or templated rejections, LLMs can generate personalized, understandable
    explanations that improve customer experience and aid compliance.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用LLMs进行透明的拒绝**：与MongoDB集成的LLMs可以解释复杂机器学习模型（如XGBoost）的输出。LLMs可以生成个性化的、可理解的解释，而不是发布模糊或模板化的拒绝，从而改善客户体验并帮助合规。'
- en: 'For example, the credit decision pipeline illustrated in *Figure 11.1* is used
    for predicting delinquency probability and credit scoring. This pipeline involves
    several key stages: data collection, processing, risk profile generation, model
    development, data transformation, and decision collection.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，图*11.1*中所示的信用决策流程用于预测违约概率和信用评分。此流程涉及几个关键阶段：数据收集、处理、风险概貌生成、模型开发、数据转换和决策收集。
- en: The outcome of the credit scoring could mean an approval or declination of the
    credit application. Understanding the reasons behind a decline is especially vital
    for both regulatory compliance and customer experience. LLMs, integrated with
    platforms such as MongoDB, can enhance explainability. For instance, LLMs can
    interpret the outputs of complex models such as XGBoost to generate clear, human-readable
    explanations for why an application was declined, moving beyond simple templated
    messages that only convey the final status.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 信用评分的结果可能意味着信用申请被批准或拒绝。理解拒绝的原因对于合规性和客户体验都至关重要。与MongoDB等平台集成的LLMs可以增强可解释性。例如，LLMs可以解释复杂模型如XGBoost的输出，为申请被拒绝的原因生成清晰、易于理解的解释，而不仅仅是传达最终状态的简单模板信息。
- en: '![](img/B34136_11_01.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_11_01.png)'
- en: 'Figure 11.1: Architecture of the data processing pipeline for predicting the
    probability of delinquency and credit scoring'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.1：预测违约概率和信用评分的数据处理流程架构
- en: This diagram illustrates the end-to-end data processing pipeline for credit
    risk assessment, showing how customer data flows through the collection, processing,
    risk profiling, model development, and decision-making stages to produce accurate
    delinquency predictions. In *Figure 11.2*, you can see the architecture explaining
    credit scoring using an LLM.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 该图展示了信用风险评估的端到端数据处理流程，展示了客户数据如何通过收集、处理、风险评估、模型开发和决策阶段流动，以产生准确的违约预测。在*图11.2*中，你可以看到使用LLM解释信用评分的架构。
- en: '![](img/B34136_11_02.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_11_02.png)'
- en: 'Figure 11.2: Architecture of the credit application declination'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.2：信用申请拒绝的架构
- en: This visualization demonstrates how LLMs can be integrated into credit decision
    systems to provide clear, understandable explanations for application declinations,
    improving transparency and customer experience. In cases where a credit application
    is declined, the interaction should not end with a rejection. Instead, it presents
    a valuable opportunity for institutions to retain engagement by offering personalized,
    alternative credit products that better align with the applicant’s financial profile.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 该可视化展示了如何将LLMs（大型语言模型）集成到信用决策系统中，为申请拒绝提供清晰、易懂的解释，从而提高透明度和客户体验。在信用申请被拒绝的情况下，互动不应以拒绝结束。相反，这为机构提供了一个宝贵的机会，通过提供与申请者财务状况更匹配的个性化替代信用产品来保持参与度。
- en: Traditional recommendation engines typically rely on static rule-based systems
    or collaborative filtering models, which may lack the flexibility to respond to
    nuanced customer needs or evolving product offerings. These systems often struggle
    to contextualize why an applicant was declined and what viable alternatives exist.
    GenAI changes this dynamic entirely.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的推荐引擎通常依赖于静态的基于规则的系统或协同过滤模型，这些模型可能缺乏灵活性，无法响应细微的客户需求或不断变化的产品供应。这些系统往往难以解释为什么申请者被拒绝以及存在哪些可行的替代方案。GenAI完全改变了这种动态。
- en: By leveraging customer data, credit scoring outcomes, and real-time product
    availability, GenAI models can function as intelligent recommendation engines,
    proactively suggesting suitable alternatives tailored to an applicant’s risk profile,
    income, credit behavior, and preferences. For example, if a personal loan application
    is declined due to insufficient credit history, a GenAI model might recommend
    a more basic credit card with lower fees without premium features, a small installment
    loan with lenient terms, and/or a financial literacy product to build creditworthiness.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用客户数据、信用评分结果和实时产品可用性，GenAI模型可以作为智能推荐引擎，主动建议适合申请者风险状况、收入、信用行为和偏好的替代方案。例如，如果个人贷款申请因信用记录不足而被拒绝，GenAI模型可能会推荐一张费用较低且无额外功能的更基本的信用卡，或是一笔条款宽松的小额分期贷款，以及/或一个金融素养产品来建立信用。
- en: In addition to generating product matches, LLMs can explain why a particular
    alternative is being offered, improving transparency and building trust. This
    level of personalization and clarity was previously difficult to achieve with
    conventional recommendation systems.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 除了生成产品匹配之外，LLMs还可以解释为什么提供特定的替代方案，提高透明度并建立信任。这种程度个性化与清晰度在传统的推荐系统中难以实现。
- en: 'The following architecture demonstrates how GenAI can be integrated into a
    credit decisioning pipeline, not just to assess risk but to provide *next-best-action
    recommendations* that keep customers engaged, informed, and supported through
    their financial journey:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 以下架构展示了如何将生成式人工智能集成到信用决策流程中，不仅用于评估风险，还提供*最佳下一步行动建议*，以保持客户在财务旅程中的参与、知情和支持：
- en: '![](img/B34136_11_03.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_11_03.png)'
- en: 'Figure 11.3: Architecture of the alternative credit product recommendations'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.3：替代信用产品推荐架构
- en: '*Figure 11.3* illustrates the comprehensive architecture of an alternative
    credit product recommendation system. It shows how user interactions through the
    web UI trigger API calls, leveraging LangChain’s MultiQueryRetriever and MongoDB
    Vector Search to process raw chunked documents from a private knowledge base on
    MongoDB. It retrieves relevant credit card suggestions and summarized documents,
    which are then fed into an LLM-powered reasoning engine for query refinement and
    knowledge processing. Ultimately, refined credit card product suggestions are
    delivered through an intelligent system that combines vector-based document retrieval,
    multi-query processing, and LLM reasoning to provide personalized financial product
    recommendations.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '*图11.3*展示了替代信用产品推荐系统的综合架构。它展示了用户通过Web UI进行交互如何触发API调用，利用LangChain的MultiQueryRetriever和MongoDB向量搜索处理来自MongoDB私有知识库的原始分块文档。它检索相关的信用卡建议和总结文档，然后输入到由LLM驱动的推理引擎中进行查询优化和知识处理。最终，通过结合基于向量的文档检索、多查询处理和LLM推理的智能系统，提供个性化的金融产品推荐。'
- en: Learn how the convergence of alternative data, AI, and GenAI is reshaping the
    foundations of credit scoring at [https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/credit-card-application-with-generative-ai/](https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/credit-card-application-with-generative-ai/).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 了解替代数据、人工智能和生成式人工智能的融合如何重塑信用评分的基础，请参阅[https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/credit-card-application-with-generative-ai/](https://www.mongodb.com/docs/atlas/architecture/current/solutions-library/credit-card-application-with-generative-ai/)。
- en: '**Base39’s AI-powered credit analysis**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**Base39的AI驱动信用分析**'
- en: Besides the use of alternative data, predictive AI, and GenAI, agentic AI is
    also now being applied in the credit decision domain. One such firm is Base39\.
    Base39 is a financial technology provider based in São Paulo, Brazil. Its core
    offerings are centered on providing advanced services for credit and risk analysis.
    Base39 was established to disrupt credit analysis by harnessing the power of AI
    with MongoDB Atlas Vector Search and Amazon Bedrock.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 除了使用替代数据、预测人工智能和生成式人工智能外，代理人工智能现在也被应用于信用决策领域。其中一家公司是Base39。Base39是一家位于巴西圣保罗的金融科技公司。其核心服务集中在提供信用和风险评估的高级服务。Base39成立是为了利用MongoDB
    Atlas向量搜索和Amazon Bedrock的AI力量颠覆信用分析。
- en: Base39 realized that existing credit analysis produces financial decisions that
    are insufficiently comprehensive, primarily due to data scarcity. Essential data,
    such as income verification, employment history, and credit score, represent a
    fraction of the information required. Furthermore, gathering and selecting these
    data points is heavily reliant on subjective processes. This complex and highly
    manual process can extend over several days and yield inaccurate and incomplete
    results.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: Base39意识到现有的信用分析产生的金融决策不够全面，这主要是因为数据稀缺。必要的数据，如收入验证、就业历史和信用评分，仅占所需信息的很小一部分。此外，收集和选择这些数据点高度依赖于主观过程。这个复杂且高度手动的过程可能需要几天时间，并产生不准确和不完整的结果。
- en: While predictive machine learning algorithms are designed to handle basic scoring,
    the combined efforts with GenAI enhance data feeding, result interpretation, and
    *what-if* analyses. GenAI streamlines the updating of model parameters by analyzing
    historical data patterns. This eliminates the need for manual updates in spreadsheets
    or configurations. The LLM serves as a smart assistant for risk analysts, delivering
    recommendations and guiding the analyst to select the most pertinent data sources
    and fields for each loan scenario.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然预测机器学习算法旨在处理基本评分，但与生成式人工智能的结合增强了数据输入、结果解释和“如果...将会发生什么”分析。生成式人工智能通过分析历史数据模式简化了模型参数的更新，从而消除了在电子表格或配置中进行手动更新的需求。LLM作为风险分析师的智能助手，提供推荐并指导分析师为每种贷款场景选择最相关的数据源和字段。
- en: '*“MongoDB underpins the data layer, providing flexible schema support, vector
    search for LLM context, and a managed deployment model that aligns with Base39’s
    developer-first philosophy.”*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*“MongoDB 为数据层提供支撑，提供灵活的架构支持、LLM 上下文的向量搜索以及与 Base39 开发者优先哲学相一致的管理部署模式。”*'
- en: — **Bruno Nunes, CEO, Base39**
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: — **布鲁诺·努内斯，Base39 首席执行官**
- en: MongoDB Atlas is the core component behind Base39’s feature store. A feature
    store is a tool or system used in machine learning to store, manage, and serve
    data known as *features*. Features are individual measurable properties or characteristics
    used in machine learning models to make predictions. MongoDB’s native search capabilities
    over both structured (enriched financial) and unstructured (behavioral) data via
    Atlas Vector Search make it critical for the assessment process.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB Atlas 是 Base39 特性存储的核心组件。特性存储是机器学习中用于存储、管理和提供称为“特性”的数据的工具或系统。特性是用于机器学习模型进行预测的个别可测量属性或特征。MongoDB
    通过 Atlas 向量搜索在结构化（丰富金融）和非结构化（行为）数据上的原生搜索能力，对于评估过程至关重要。
- en: '![](img/Spotlight_Icon.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Spotlight_Icon.png)'
- en: With Atlas Vector Search, Base39 was able to accelerate feature retrieval and
    dynamically update their machine learning models. This flexibility is critical
    for making real-time adjustments to credit policies. By using the data retrieved
    by Vector Search, Base39 can augment the LLM’s recommendations with domain-specific
    context, thereby increasing their reliability and accuracy for risk assessors.
    This avoids manually sifting through numerous documents or configuration files.
    Last but not least, one of the cutting-edge innovations and key differentiators
    of Base39’s solution lies in the autonomy achieved through its agentic AI approach.
    Base39’s model can perceive, reason, and act based on data. It employs a **chain-of-thought**
    (**CoT**) methodology, a reasoning method where AI breaks down complex problems
    into sequential steps. This enables the required autonomy for analyzing information
    and making decisions tailored to the particular individual loan’s content. This
    enables the collection of credit information to be dynamic and hyper-personalized
    without having to prescribe many rules like in traditional rule-based AI automation
    systems (which, anyway, cannot exhaustively decide what information needs to be
    collected from the credit applicants). This agentic AI approach opens up infinite
    potential for more accurate and comprehensive credit profiles and eventual credit
    decisions.Learn more about the Base39 story at [https://www.mongodb.com/solutions/customer-case-studies/base39](https://www.mongodb.com/solutions/customer-case-studies/base39).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 Atlas 向量搜索，Base39 能够加速特性检索并动态更新其机器学习模型。这种灵活性对于实时调整信用政策至关重要。通过使用向量搜索检索到的数据，Base39
    可以用特定领域的上下文增强 LLM 的推荐，从而提高其对于风险评估者的可靠性和准确性。这避免了手动筛选大量文档或配置文件。最后但同样重要的是，Base39
    解决方案的一个尖端创新和关键差异化因素在于其通过代理式 AI 方法实现的自主性。Base39 的模型可以根据数据感知、推理和行动。它采用 **思维链**（**CoT**）方法，这是一种将复杂问题分解为连续步骤的推理方法。这为分析信息和针对特定个人贷款内容做出决策所需的自主性提供了可能。这使得收集信用信息变得动态和高度个性化，而无需像传统基于规则的
    AI 自动化系统那样规定许多规则（这些系统无论如何也无法穷尽决定需要从信用申请人那里收集哪些信息）。这种代理式 AI 方法为更准确和全面的信用档案以及最终的信用决策开辟了无限潜力。了解更多关于
    Base39 的故事，请访问 [https://www.mongodb.com/solutions/customer-case-studies/base39](https://www.mongodb.com/solutions/customer-case-studies/base39)。
- en: While AI transforms customer-facing credit decisions, it is equally revolutionary
    in how banks manage internal knowledge and operations.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 随着 AI 改变面向客户的信用决策，它在银行如何管理内部知识和运营方面同样具有革命性。
- en: Revolutionizing enterprise knowledge management in banking with GenAI
  id: totrans-77
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用 GenAI 革新银行的企业知识管理
- en: Efficient access to and utilization of enterprise knowledge are paramount. Internal
    employees across various departments rely on vast amounts of information, ranging
    from policies and procedures to regulatory guidelines and product details. Traditional
    **enterprise knowledge management** (**EKM**) systems often fall short in providing
    seamless and intuitive access to this information. GenAI presents a transformative
    opportunity to revolutionize EKM within banks, empowering employees with intelligent
    tools that significantly enhance productivity and decision-making.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 高效获取和使用企业知识至关重要。各个部门的内部员工依赖于大量的信息，从政策和程序到监管指南和产品细节。传统的**企业知识管理系统**（**EKM**）往往无法提供无缝且直观的信息访问。通用人工智能（GenAI）为银行内的EKM革命提供了变革性的机会，通过智能工具赋能员工，显著提高生产力和决策能力。
- en: Challenges of traditional EKM systems in banking
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 传统EKM系统在银行业中的挑战
- en: 'Traditional EKM systems have played a central role in organizing information
    within banks, but they are increasingly challenged by evolving business and regulatory
    demands. These systems often struggle to deliver accurate, timely, and contextually
    relevant information, suffering from several limitations:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的EKM系统在银行内部信息组织方面发挥了核心作用，但随着商业和监管需求的演变，它们正面临越来越多的挑战。这些系统往往难以提供准确、及时和上下文相关的信息，存在几个局限性：
- en: '**Information silos**: Knowledge can be fragmented across disparate systems
    and departments, making it difficult for employees to find a holistic view of
    a particular topic'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信息孤岛**：知识可能分散在不同的系统和部门中，使员工难以找到特定主题的全面视角。'
- en: '**Complex search interfaces**: Keyword-based search often yields irrelevant
    results, requiring employees to spend significant time sifting through documents
    to find the information they need'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂的搜索界面**：基于关键词的搜索往往产生不相关的结果，需要员工花费大量时间筛选文档以找到所需信息。'
- en: '**Outdated or difficult-to-understand content**: Policies and procedures can
    be lengthy, complex, and not easily digestible, hindering quick comprehension
    and application'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过时或难以理解的内容**：政策和程序可能冗长、复杂且不易消化，阻碍了快速理解和应用。'
- en: '**Lack of contextual awareness**: Traditional systems often fail to understand
    the specific context of an employee’s query, leading to generic and unhelpful
    responses'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺乏上下文意识**：传统系统往往无法理解员工查询的具体上下文，导致提供通用的、无用的回答。'
- en: '**High maintenance overhead**: Keeping knowledge bases up to date and relevant
    requires significant manual effort'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高维护成本**：保持知识库的更新和相关性需要大量的手动工作。'
- en: These limitations hinder operational efficiency and compliance. Overcoming these
    challenges necessitates the adoption of more advanced, context-aware EKM solutions.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这些局限性阻碍了运营效率和合规性。克服这些挑战需要采用更先进、上下文感知的EKM解决方案。
- en: How GenAI is transforming EKM systems in banking
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GenAI如何改变银行业EKM系统
- en: GenAI offers powerful capabilities to overcome these limitations and create
    more effective and user-friendly EKM systems for internal bank employees. Many
    banks have begun implementing GenAI chatbots, often first consolidating data into
    a central enterprise knowledge repository to power their new generation of intelligent
    knowledge management applications.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI提供强大的功能来克服这些限制，为内部银行员工创建更有效和用户友好的EKM系统。许多银行已经开始实施GenAI聊天机器人，通常首先将数据整合到一个中央企业知识库中，以支持其新一代智能知识管理应用。
- en: 'Here are some of the key features often implemented in such services:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些此类服务中经常实施的关键功能：
- en: '**Natural language querying and conversational search**: GenAI enables employees
    to ask questions in natural language, just as they would to a colleague. The AI
    can understand the intent behind the query and provide precise and relevant answers,
    significantly reducing search time and frustration.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言查询和对话式搜索**：GenAI使员工能够用自然语言提问，就像向同事提问一样。AI可以理解查询背后的意图，并提供精确和相关的答案，显著减少搜索时间和挫折感。'
- en: '**Intelligent document summarization**: GenAI can automatically summarize lengthy
    policies, procedures, and regulatory documents, providing employees with concise
    overviews and key takeaways. This allows for quicker understanding and application
    of critical information.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能文档摘要**：GenAI可以自动总结冗长的政策、程序和监管文件，为员工提供简洁的概述和关键要点。这有助于更快地理解和应用关键信息。'
- en: '**Contextualized information retrieval**: By understanding the user’s role,
    their department, and the context of their query, GenAI can provide more tailored
    and relevant information, avoiding generic responses.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境化信息检索**：通过理解用户的角色、其部门以及查询的上下文，GenAI可以提供更定制化和相关的信息，避免泛泛的回答。'
- en: '**Dynamic knowledge generation**: GenAI can synthesize information from multiple
    sources to answer complex questions that might not be explicitly addressed in
    a single document. This allows employees to get comprehensive answers to nuanced
    queries.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态知识生成**：GenAI可以从多个来源综合信息来回答可能未在单一文档中明确解决的问题。这使得员工能够获得对复杂查询的全面答案。'
- en: '**Personalized knowledge recommendations**: Based on an employee’s past queries
    and their role, GenAI systems can proactively recommend relevant knowledge and
    updates, ensuring they stay informed about critical information.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化知识推荐**：根据员工的过去查询和其角色，GenAI系统可以主动推荐相关的知识和更新，确保他们了解关键信息。'
- en: '**Automated knowledge base updates**: GenAI can assist in keeping knowledge
    bases up to date by identifying outdated information and suggesting revisions
    based on new regulations or internal policy changes, reducing manual maintenance.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动知识库更新**：GenAI可以通过识别过时信息并根据新法规或内部政策变化提出修订建议来帮助保持知识库的更新，从而减少手动维护。'
- en: '**Enhanced knowledge sharing and collaboration**: GenAI can facilitate internal
    knowledge sharing by identifying subject matter experts based on employee queries
    and connecting them for direct collaboration. It can also summarize key discussion
    points from internal forums and meetings, making knowledge more accessible.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强知识共享和协作**：GenAI可以通过根据员工查询识别主题专家并将他们连接起来进行直接协作来促进内部知识共享。它还可以总结内部论坛和会议中的关键讨论要点，使知识更易于获取。'
- en: These capabilities not only improve operational efficiency but also strengthen
    compliance and decision-making across the organization. As banks continue to adopt
    GenAI-powered EKM systems, they are laying the groundwork for more agile, informed,
    and collaborative knowledge ecosystems that evolve alongside regulatory and business
    demands.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这些能力不仅提高了运营效率，还加强了整个组织的合规性和决策能力。随着银行继续采用GenAI驱动的EKM系统，它们正在为更敏捷、更信息丰富和更协作的知识生态系统打下基础，这些系统与监管和业务需求同步发展。
- en: Use cases of GenAI for internal EKM systems in banks
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 银行内部EKM系统中GenAI的应用用例
- en: 'Several practical use cases highlight how banks are leveraging or can leverage
    GenAI for internal EKM:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 几个实际用例突出了银行如何利用或可以利用GenAI进行内部EKM：
- en: '**Compliance and regulatory inquiries**: Employees can quickly get answers
    to complex regulatory questions by asking in natural language, with the GenAI
    system synthesizing information from various compliance documents'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规和监管查询**：员工可以通过自然语言提问，GenAI系统会综合来自各种合规文件的信息，快速获得复杂的监管问题的答案。'
- en: '**Product knowledge support**: Front-office staff can rapidly access detailed
    information about banking products and services to answer customer inquiries accurately
    and efficiently'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品知识支持**：前台工作人员可以快速访问关于银行产品和服务的详细信息，以便准确高效地回答客户咨询。'
- en: '**Internal policy and procedure guidance**: Employees can easily understand
    and navigate internal policies and procedures through natural language queries
    and summaries'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部政策和程序指导**：员工可以通过自然语言查询和摘要轻松理解和导航内部政策和程序。'
- en: '**IT support and troubleshooting**: Internal IT teams can leverage GenAI to
    quickly find solutions to technical issues by querying knowledge bases and documentation
    using natural language'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IT支持和故障排除**：内部IT团队可以通过使用自然语言查询知识库和文档来快速找到技术问题的解决方案。'
- en: '**Onboarding and training**: New employees can quickly get up to speed by asking
    questions about internal processes and accessing relevant training materials through
    a GenAI-powered EKM system'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**入职和培训**：新员工可以通过询问关于内部流程的问题并通过GenAI驱动的EKM系统访问相关培训材料来快速熟悉情况。'
- en: '**Risk management insights**: Risk analysts can leverage GenAI to synthesize
    information from various risk reports and identify emerging trends and potential
    issues'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险管理洞察**：风险分析师可以利用GenAI从各种风险报告中综合信息，识别新兴趋势和潜在问题。'
- en: These use cases demonstrate how GenAI-powered EKM can streamline access to critical
    information, reduce operational bottlenecks, and enhance employee productivity,
    ultimately enabling banks to respond more quickly and effectively to both internal
    needs and external demands.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这些用例展示了GenAI驱动的EKM如何简化对关键信息的访问，减少运营瓶颈，并提高员工生产力，最终使银行能够更快、更有效地响应内部需求和外部需求。
- en: Architectural considerations for GenAI-powered EKM systems
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GenAI驱动的EKM系统的架构考虑
- en: 'Implementing GenAI for EKM in a banking environment requires careful architectural
    design with a focus on integration, security, and scalability. A critical aspect
    of this design is the data platform consideration, as the effectiveness of GenAI
    heavily relies on the ability to store, manage, and efficiently retrieve diverse
    types of enterprise knowledge. Key considerations include the following:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在银行环境中实施GenAI用于EKM需要仔细的架构设计，重点关注集成、安全和可扩展性。该设计的关键方面是数据平台考虑，因为GenAI的有效性高度依赖于存储、管理和高效检索各种企业知识的能力。主要考虑因素包括以下内容：
- en: '**Integration with existing knowledge infrastructure**: The GenAI system must
    seamlessly integrate with the bank’s existing systems. This often involves building
    connectors and APIs to access information from disparate systems. A central operational
    data store can consolidate data from various sources, providing a unified view
    for the GenAI system.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与现有知识基础设施的集成**: GenAI系统必须与银行现有的系统无缝集成。这通常涉及构建连接器和API以访问来自不同系统的信息。一个中央操作数据存储库可以整合来自各种来源的数据，为GenAI系统提供一个统一的视图。'
- en: '**Data platform selection**: Choosing the right data platform is fundamental.
    Modern databases capable of handling structured, semi-structured, and unstructured
    data, as well as supporting advanced indexing and search capabilities, are essential.
    Document-oriented storage excels at managing diverse enterprise knowledge assets.
    This multimodal approach proves crucial for effective GenAI applications.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据平台选择**: 选择合适的数据平台是基础。能够处理结构化、半结构化和非结构化数据，并支持高级索引和搜索能力的现代数据库是必不可少的。文档存储在管理多样化的企业知识资产方面表现出色。这种多模态方法对于有效的GenAI应用至关重要。'
- en: '**Secure data access and governance**: Given the highly sensitive nature of
    banking data, robust security measures are paramount. Features including access
    controls and encryption ensure data protection and compliance.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全数据访问和治理**: 由于银行数据的敏感性极高，稳健的安全措施至关重要。包括访问控制和加密在内的功能确保数据保护和合规性。'
- en: '**Choice of GenAI models and platforms**: Banks need to choose appropriate
    LLMs and the underlying infrastructure (cloud or on-premises). The architecture
    should allow for easy integration with these models.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GenAI模型和平台的选择**: 银行需要选择合适的LLM（大型语言模型）及其底层基础设施（云或本地）。架构应允许轻松集成这些模型。'
- en: '**RAG**: To ensure that GenAI responses are accurate and grounded in the bank’s
    specific knowledge, implementing RAG is crucial. Integrated search and Vector
    Search capabilities are particularly well suited to support RAG implementations,
    efficiently storing, indexing, and retrieving diverse data types, including text
    content and their corresponding vector embeddings for semantic similarity searches,
    ensuring that GenAI has context for its responses.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RAG**: 为了确保生成式人工智能（GenAI）的响应准确，并基于银行的具体知识，实施RAG（Retrieval-Augmented Generation）至关重要。集成搜索和向量搜索功能特别适合支持RAG的实施，能够高效地存储、索引和检索各种数据类型，包括文本内容和相应的向量嵌入，用于语义相似度搜索，确保GenAI的响应有上下文支持。'
- en: '**Scalability and performance**: The EKM system must handle a large volume
    of queries. Auto-scaling features ensure scalability and low-latency responses,
    meeting peak demand.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性和性能**: EKM系统必须处理大量查询。自动扩展功能确保可扩展性和低延迟响应，以满足高峰需求。'
- en: '**Monitoring and explainability**: Implementing robust monitoring of the GenAI
    system’s performance and accuracy is essential. Storing logs and metadata about
    queries and responses aids in analysis and explainability.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控和可解释性**: 对GenAI系统性能和准确性的稳健监控是必不可少的。存储有关查询和响应的日志和元数据有助于分析和可解释性。'
- en: '**UI and workflow integration**: The GenAI-powered EKM system should have an
    intuitive UI and be integrated into existing workflows. A flexible data model
    allows for easy adaptation to changing requirements and seamless integration.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户界面和工作流程集成**: GenAI驱动的EKM系统应具有直观的用户界面，并集成到现有的工作流程中。灵活的数据模型允许轻松适应不断变化的需求，并实现无缝集成。'
- en: By addressing these considerations holistically, banks can create a GenAI-powered
    EKM architecture that not only meets stringent security and compliance requirements
    but also delivers measurable gains in efficiency, knowledge accessibility, and
    decision-making quality.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 通过全面解决这些考虑因素，银行可以创建一个由GenAI驱动的EKM架构，不仅满足严格的安保和合规要求，还能在效率、知识可访问性和决策质量方面带来可衡量的收益。
- en: '**An Asian bank’s GenAI chatbot implementation**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**亚洲银行的GenAI聊天机器人实施**'
- en: One of the progressive banks in Asia implemented a GenAI chatbot for an internal
    application to enhance the operational efficacy of the staff. The chatbot offers
    features such as content generation, text summarization, and language translation,
    helping employees improve work efficiency. It also assists in retrieving regulations,
    procedures, business contacts, application forms, and documents, saving employees
    significant time on information searches.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 亚洲一家进步银行实施了一个GenAI聊天机器人，用于内部应用，以增强员工的工作效率。聊天机器人提供内容生成、文本摘要和语言翻译等功能，帮助员工提高工作效率。它还协助检索法规、程序、业务联系人、申请表和文件，为员工节省了大量信息搜索时间。
- en: The bank’s technology leadership openly acknowledges that developing effective
    GenAI applications presents unique hurdles, foremost among them being the art
    and science of prompt engineering – crafting the instructions given to the AI
    model. The quality of the AI’s output is highly dependent on the clarity and specificity
    of these prompts. Recognizing this, the bank is actively evolving its application
    development culture. They strategically adjust the responsibility, encouraging
    business users, those with deep domain knowledge, to become *champions* in the
    GenAI development life cycle, particularly in refining and adjusting prompts.
    This marks a departure from conventional software development, where IT typically
    handles the bulk of the technical implementation.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 银行的技术领导层公开承认，开发有效的GenAI应用面临独特的挑战，其中最重要的是提示工程的艺术和科学——即制定提供给AI模型的指令。AI输出的质量高度依赖于这些提示的清晰度和具体性。认识到这一点，银行正在积极演变其应用开发文化。他们战略性地调整责任，鼓励业务用户、那些具有深厚领域知识的人成为GenAI开发生命周期的*冠军*，特别是在完善和调整提示方面。这标志着与传统软件开发的不同，在传统软件开发中，IT通常负责大部分技术实施。
- en: '![](img/Spotlight_Icon.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![Spotlight_Icon.png](img/Spotlight_Icon.png)'
- en: To facilitate this cultural shift, the bank has instituted internal GenAI training
    programs aimed at equipping business personnel with essential prompt engineering
    skills. This organizational adaptation aims to bridge the gap between technical
    capability and business needs, ensuring GenAI tools and applications are maximally
    relevant and effective by directly incorporating user expertise into the fine-tuning
    process. The bank is also exploring automated prompt enhancement techniques to
    further streamline this process.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 为了促进这种文化转变，银行已经建立了内部GenAI培训计划，旨在为业务人员提供必要的提示工程技能。这种组织适应旨在弥合技术能力与业务需求之间的差距，确保GenAI工具和应用最大限度地相关和有效，通过直接将用户专业知识纳入微调过程。银行还在探索自动提示增强技术，以进一步简化这一过程。
- en: Furthermore, the bank understands the internal chatbot does not exist in isolation
    but is part of a broader, interconnected ecosystem of AI applications within the
    banking group and its subsidiaries. While serving a distinct internal purpose,
    it shares the underlying GenAI technology push and potentially leverages common
    data infrastructure with initiatives in other areas.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，银行认识到内部聊天机器人并非孤立存在，而是银行集团及其子公司更广泛、相互关联的AI应用生态系统的一部分。尽管它服务于特定的内部目的，但它共享了底层GenAI技术推动力，并可能与其他领域的倡议共享共同的数据基础设施。
- en: 'The following figure shows the knowledge workflow:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 下图显示了知识工作流程：
- en: '![](img/B34136_11_04.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![B34136_11_04.png](img/B34136_11_04.png)'
- en: 'Figure 11.4: RAG knowledge system workflow'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.4：RAG知识系统工作流程
- en: This diagram illustrates the seamless flow of information between various components
    in an AI-powered customer support system, showing how user queries are processed
    through Vector Search, enriched with context, and transformed into natural language
    responses.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了AI驱动的客户支持系统中各个组件之间信息无缝流动的情况，展示了用户查询是如何通过向量搜索处理，增加上下文，并转化为自然语言响应的。
- en: The impact of GenAI on EKM systems
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GenAI对EKM系统的影响
- en: 'The integration of GenAI into EKM systems promises significant benefits for
    banks:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 将GenAI集成到EKM系统中为银行带来了显著的好处：
- en: '**Increased employee productivity**: Faster and easier access to knowledge
    empowers employees to perform their tasks more efficiently'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高员工生产力**：更快、更轻松地获取知识使员工能够更高效地完成任务'
- en: '**Improved decision-making**: Access to comprehensive and contextualized information
    enables employees to make more informed and timely decisions'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进决策**：获取全面和上下文相关的信息使员工能够做出更明智和及时的决策'
- en: '**Enhanced employee experience**: User-friendly GenAI-powered EKM systems can
    reduce frustration and improve job satisfaction by making it easier for employees
    to find the information they need'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强员工体验**：用户友好的通用人工智能驱动的EKM系统可以通过使员工更容易找到所需信息来减少挫折感并提高工作满意度'
- en: '**Reduced errors and improved compliance**: Accurate and readily available
    knowledge of policies and regulations can help reduce errors and ensure better
    compliance'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少错误和改进合规性**：对政策和法规的准确和易于获取的知识可以帮助减少错误并确保更好的合规性'
- en: '**Faster onboarding and training**: New hires can become productive more quickly
    with intelligent access to training materials and internal knowledge'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更快地入职和培训**：新员工可以通过智能访问培训材料和内部知识更快地变得富有生产力'
- en: '**Better knowledge retention**: GenAI systems can help preserve institutional
    knowledge by making it easily accessible and searchable, even as employees leave
    or roles change'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好的知识保留**：通用人工智能系统可以通过使其易于访问和搜索来帮助保存机构知识，即使员工离职或角色发生变化也是如此'
- en: While these internal applications of GenAI are transforming how banks operate
    behind the scenes, the technology is equally revolutionary in customer-facing
    applications, reshaping how financial institutions interact with and serve their
    clients.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然通用人工智能的这些内部应用正在改变银行幕后运营的方式，但这项技术在面向客户的应用中同样具有革命性，重塑了金融机构与客户互动和服务的方式。
- en: Better digital banking experiences through AI-driven interactions
  id: totrans-137
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过AI驱动的交互提供更好的数字银行体验
- en: This shift toward customer-centric AI is creating more intuitive, personalized,
    and intelligent banking experiences. To meet rising expectations, banks are adopting
    AI-powered platforms built on LLMs and smart automation. This transformation requires
    a flexible, scalable data foundation essential for modern AI-driven banking.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这种向以客户为中心的AI的转变正在创造更直观、个性化、智能的银行体验。为了满足不断增长的需求，银行正在采用基于大型语言模型（LLMs）和智能自动化的AI平台。这种转型需要灵活、可扩展的数据基础，这对于现代AI驱动的银行至关重要。
- en: Elevating customer experience with GenAI
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提升客户体验的通用人工智能
- en: GenAI introduces advanced capabilities such as intelligent chatbots and virtual
    assistants, enabling banks to provide real-time, context-aware support. These
    AI-driven tools can interpret complex customer inquiries, access relevant information,
    and deliver concise, personalized responses instantly. This not only enhances
    customer satisfaction but also streamlines operations by reducing reliance on
    traditional customer service channels.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 通用人工智能引入了高级功能，如智能聊天机器人和虚拟助手，使银行能够提供实时、上下文感知的支持。这些AI驱动的工具可以解释复杂的客户查询，访问相关信息，并立即提供简洁、个性化的响应。这不仅提高了客户满意度，还通过减少对传统客户服务渠道的依赖来简化运营。
- en: Beyond assistance, GenAI also enables proactive banking. AI systems can surface
    insights derived from transaction data, usage trends, and behavioral analytics
    to recommend personalized financial products, notify users about unusual activity,
    or guide them through life events such as buying a home or saving for education.
    Rather than simply reacting to queries, banks can now anticipate customer needs,
    offering a seamless and value-rich experience.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 除了提供帮助之外，通用人工智能（GenAI）还使主动银行成为可能。AI系统可以挖掘来自交易数据、使用趋势和行为分析得出的见解，以推荐个性化的金融产品，通知用户关于异常活动的信息，或引导他们通过生活中的事件，如购买房屋或为教育储蓄。银行现在不仅可以简单地响应查询，还可以预测客户需求，提供无缝且价值丰富的体验。
- en: Incorporating GenAI into banking workflows fundamentally changes how financial
    services are delivered. Customers engage with their bank through natural conversation
    rather than rigid forms or dropdowns. Instead of reading through dense policy
    documents, they receive AI-generated summaries and explanations tailored to their
    questions. The bank becomes a true financial partner, available 24/7, scalable,
    and intelligent.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 将通用人工智能融入银行工作流程从根本上改变了金融服务提供的方式。客户通过与银行的天然对话而非僵化的表格或下拉菜单进行互动。他们不再需要阅读密集的政策文件，而是收到针对他们问题的AI生成的摘要和解释。银行成为真正的金融伙伴，全天候可用，可扩展且智能。
- en: AI-powered digital banking data foundations
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI驱动的数字银行数据基础
- en: Implementing AI in modern banking requires more than powerful models; it demands
    a flexible, real-time data foundation. A document-based architecture is ideal
    for managing complex banking data such as customer profiles, transaction histories,
    account behaviors, and unstructured content such as FAQs or policy documents,
    all in one place. This unified model allows AI systems to access rich, contextual
    information instantly, driving more accurate, personalized, and responsive customer
    experiences.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代银行中实施AI不仅需要强大的模型，还需要灵活、实时的数据基础。基于文档的架构非常适合管理复杂的银行数据，如客户档案、交易历史、账户行为以及FAQ或政策文档等非结构化内容，所有这些都在一个地方。这种统一模型允许AI系统即时访问丰富的上下文信息，从而推动更准确、个性化、响应迅速的客户体验。
- en: Modern data platforms such as MongoDB also support advanced AI patterns such
    as RAG, allowing banking assistants to instantly retrieve relevant documents and
    generate precise answers tailored to customer queries, whether it’s explaining
    mortgage terms or flagging a suspicious charge.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 现代数据平台如MongoDB也支持如RAG等高级AI模式，允许银行助手即时检索相关文档并生成针对客户查询的精确答案，无论是解释抵押贷款条款还是标记可疑费用。
- en: Additionally, robust aggregation frameworks let smart agents analyze real-time
    account activity, spending trends, or loan balances in combination with historical
    data, enabling proactive insights and decision support. Security and compliance
    are essential, with features such as encryption, fine-grained access controls,
    and auditing being critical for any AI handling sensitive personal financial data.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，强大的聚合框架允许智能代理分析实时账户活动、支出趋势或贷款余额，结合历史数据，从而实现主动洞察和决策支持。安全和合规性至关重要，加密、细粒度访问控制和审计等特性对于处理敏感个人金融数据的任何AI都至关重要。
- en: With seamless integration into modern AI ecosystems and support for event-driven
    architectures, the right data platform empowers banks to automate workflows, personalize
    engagement at scale, and bring intelligent services to market faster, making it
    a core enabler of AI-powered digital banking.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 通过无缝集成到现代AI生态系统并支持事件驱动架构，合适的数据平台使银行能够自动化工作流程，大规模个性化互动，并更快地将智能服务推向市场，使其成为AI驱动数字银行的核心推动力。
- en: Reference solution architecture for AI-powered customer support
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI驱动的客户支持参考解决方案架构
- en: To enable these capabilities, a reference architecture designed to enhance customer
    interactions using GenAI is essential. At the core of this architecture is MongoDB,
    serving as the centralized platform for storing and accessing both structured
    and unstructured data.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这些功能，一个旨在通过GenAI增强客户交互的参考架构是必不可少的。该架构的核心是MongoDB，作为存储和访问结构化和非结构化数据的集中化平台。
- en: The process begins with data ingestion and transformation, where policy documents,
    frequently asked questions, product information, and other text-heavy resources
    are processed using **natural language processing** (**NLP**) techniques. NLP
    uses computational methods to analyze and understand human language, extracting
    meaning, structure, and context from unstructured text. These documents are broken
    into smaller segments and converted into vector embeddings. Both the original
    text and the embeddings are stored in MongoDB, leveraging its vector search capabilities
    for efficient retrieval.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 该流程始于数据摄取和转换，其中政策文件、常见问题、产品信息和其他文本密集型资源使用**自然语言处理**（**NLP**）技术进行处理。NLP使用计算方法来分析和理解人类语言，从非结构化文本中提取意义、结构和上下文。这些文件被分解成更小的片段并转换为向量嵌入。原始文本和嵌入都存储在MongoDB中，利用其向量搜索功能进行高效检索。
- en: When a new interaction occurs, whether initiated by voice, chatbot, or form
    input, the user query is vectorized in the same way. The application then performs
    a semantic similarity search across stored vectors, retrieving the most relevant
    content aligned with the user’s intent. This approach enables accurate, context-aware
    responses that improve both efficiency and customer satisfaction.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 当发生新的交互时，无论是由语音、聊天机器人还是表单输入触发的，用户查询都会以相同的方式进行向量化。应用程序随后在存储的向量上执行语义相似度搜索，检索与用户意图最相关的最相关内容。这种方法可以实现准确、上下文感知的响应，从而提高效率和客户满意度。
- en: '*Figure 11.5* illustrates the end-to-end flow of an AI-powered customer support
    system.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '*图11.5* 展示了AI驱动的客户支持系统的端到端流程。'
- en: '![](img/B34136_11_05.png)Figure 11.5: Process and component interactions from
    AI-powered customer support'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '![图11.5](img/B34136_11_05.png)图11.5：AI驱动的客户支持流程和组件交互'
- en: The diagram shows how user queries are processed, enriched with contextual data,
    and transformed into personalized responses through the integration of Vector
    Search, language models, and operational data. These retrieved documents, enriched
    with additional context from operational data (such as account history or eligibility
    criteria), are passed into a language model that generates a natural language
    response.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 该图展示了用户查询是如何被处理的，通过整合向量搜索、语言模型和运营数据，这些查询被丰富上下文信息，并转化为个性化的响应。这些检索到的文档，通过运营数据（如账户历史或资格标准）的额外上下文信息进行丰富，然后传递给一个语言模型，该模型生成自然语言响应。
- en: This architecture relies heavily on real-time access to multiple forms of data.
    For example, transaction metadata, user profiles, and behavioral signals are all
    stored in MongoDB and can be aggregated as needed. By using Atlas Triggers, the
    system can also react dynamically. For instance, if a customer asks about an overdraft,
    the system could trigger a lookup of current balances and payment schedules before
    responding.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 此架构严重依赖于对多种形式数据的实时访问。例如，交易元数据、用户配置文件和行为信号都存储在MongoDB中，并且可以根据需要聚合。通过使用Atlas触发器，系统还可以动态响应。例如，如果客户询问透支问题，系统可以在响应之前触发对当前余额和支付计划的查找。
- en: This modular architecture is designed to integrate with the broader AI stack,
    including LLM orchestration frameworks (such as LangChain or LlamaIndex), and
    deployment environments that manage AI models and workflows. MongoDB sits at the
    intersection of all these layers, enabling both the storage and the dynamic retrieval
    of the high-value data that AI agents depend on.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模块化架构旨在与更广泛的AI堆栈集成，包括LLM编排框架（如LangChain或LlamaIndex），以及管理AI模型和工作流程的部署环境。MongoDB位于所有这些层级的交汇处，使得AI代理依赖的高价值数据的存储和动态检索成为可能。
- en: As banks enhance customer interactions through AI, they must simultaneously
    strengthen their defenses against increasingly sophisticated financial crimes.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 随着银行通过人工智能增强客户互动，它们必须同时加强防御，以应对日益复杂的金融犯罪。
- en: AI-enhanced financial crime mitigation and compliance
  id: totrans-158
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 增强人工智能的金融犯罪缓解和合规性
- en: AI is transforming risk and compliance in financial services through real-time
    fraud detection, automated regulatory interpretation, and smarter decision-making.
    MongoDB provides the flexible, scalable data foundation these AI systems rely
    on, especially for handling diverse data in **know your customer** (**KYC**) and
    **anti-money laundering** (**AML**) processes, from documents to voice and images.
    As fincrime grows more sophisticated and regulations become increasingly complex,
    AI and cutting-edge data platforms are enabling institutions to stay ahead, turning
    risk into resilience and compliance into a competitive advantage.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在通过实时欺诈检测、自动法规解释和更智能的决策，改变金融服务中的风险和合规性。MongoDB为这些AI系统提供了灵活、可扩展的数据基础，尤其是在处理**了解你的客户**（**KYC**）和**反洗钱**（**AML**）过程中的多样化数据，从文件到声音和图像。随着金融犯罪变得更加复杂，法规变得越来越复杂，人工智能和尖端数据平台正在帮助机构保持领先，将风险转化为弹性，将合规性转化为竞争优势。
- en: Fincrime has evolved dramatically in recent years, with criminals leveraging
    advanced technologies and exploiting vulnerabilities in digital systems. Traditional
    detection methods that rely on static rules and predefined thresholds struggle
    to keep pace with these sophisticated schemes. At the same time, regulatory requirements
    continue to expand, creating significant compliance burdens for financial institutions.
    The costs of inadequate fincrime prevention are substantial, encompassing monetary
    losses, regulatory penalties, reputational damage, and diminished customer trust.
    To address these challenges, institutions need adaptive solutions capable of responding
    to emerging threats while maintaining operational efficiency.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，金融犯罪发生了巨大变化，犯罪分子利用先进的技术并利用数字系统中的漏洞。依赖于静态规则和预定义阈值的传统检测方法难以跟上这些复杂的计划。同时，监管要求持续扩大，给金融机构带来了重大的合规负担。不充分的金融犯罪预防成本巨大，包括货币损失、监管罚款、声誉损害和客户信任度下降。为了应对这些挑战，机构需要能够应对新兴威胁的同时保持运营效率的适应性解决方案。
- en: Strengthening financial crime mitigation with AI
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用人工智能加强金融犯罪缓解
- en: In general terms, **fincrime** represents a comprehensive collection of policies,
    controls, analytics, and investigations to prevent, detect, report, and recover
    from any criminal activity that could not only harm customers, but, even more
    critically, damage financial institutions’ reputation. Thus, it is considered
    a major operational risk that needs to be addressed accordingly.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 从广义上讲，**fincrime** 代表了一整套政策、控制、分析和调查措施，旨在预防、检测、报告和从任何可能不仅损害客户，而且更关键的是损害金融机构声誉的犯罪活动中恢复。因此，它被视为需要相应应对的主要操作风险。
- en: Among the different potential threats, the most common are fraud management
    (asset loss), AML (asset origins), sanction compliance (asset legality), and all
    the operational risks mainly due to weak governance, antiquated screening, lack
    of process controls, or poor data quality and validation. All of these threats
    could be substantially augmented and become undetectable by sophisticated techniques
    in cyberspace, making manual checks futile. Therefore, cyber-threats must be encountered
    by the equivalent modern technologies, making AI the perfect fit as the right
    solution to optimize fincrime mitigation technical capabilities.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在不同的潜在威胁中，最常见的是欺诈管理（资产损失）、反洗钱（资产来源）、制裁合规（资产合法性），以及主要由于治理薄弱、筛选过时、缺乏流程控制或数据质量差和验证不足而导致的所有运营风险。所有这些威胁都可能被大幅增强，并在网络空间中变得难以检测，使得人工检查变得徒劳。因此，必须用相应的现代技术来应对网络威胁，使AI成为优化fincrime缓解技术能力的理想解决方案。
- en: Emerging trends redefining the future of AI in compliance
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重新定义AI在合规领域未来趋势的新趋势
- en: AI, especially GenAI, is emerging as a vital tool in helping organizations shift
    from reactive risk mitigation to proactive governance. At the core of this transformation
    are flexible data platforms designed to support real-time, AI-driven decision-making
    at scale. For instance, traditional fraud detection systems rely on static rules
    and predefined thresholds. These are increasingly ineffective against modern fraud
    techniques, which are fast, adaptive, and often hidden within legitimate activity.
    AI enhances risk management by learning from historical and real-time data, detecting
    anomalies, and identifying patterns of suspicious behavior.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: AI，尤其是生成式AI，正在成为帮助组织从被动风险缓解转向主动治理的关键工具。这一变革的核心是灵活的数据平台，旨在支持大规模的实时、AI驱动决策。例如，传统的欺诈检测系统依赖于静态规则和预定义的阈值。这些规则越来越无法有效对抗现代欺诈技术，这些技术快速、适应性强，通常隐藏在合法活动中。AI通过学习历史和实时数据、检测异常和识别可疑行为模式来增强风险管理。
- en: GenAI goes further by enabling scenario modeling and synthetic fraud simulations,
    helping organizations test hypotheses and uncover previously unknown threat vectors.
    AI-driven systems can detect not just individual fraudulent actions but coordinated,
    multi-channel fraud networks. By integrating with modern data platforms such as
    MongoDB, these systems gain access to a unified, contextualized view of data across
    sources, enhancing detection and decision accuracy.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI更进一步，通过实现场景建模和合成欺诈模拟，帮助组织测试假设并揭露以前未知的威胁向量。AI驱动的系统不仅可以检测单个欺诈行为，还可以检测协调的、多渠道的欺诈网络。通过与如MongoDB等现代数据平台集成，这些系统可以访问来自多个来源的统一、上下文化的数据视图，从而提高检测和决策的准确性。
- en: 'Enabling all these AI capabilities requires a data platform that can not only
    store vast historical and real-time transaction data but also efficiently serve
    this data to various AI models, from predictive anomaly detectors to generative
    models for simulation, often in real time or near-real time. By having a modern
    data platform, financial institutions can unlock smart capabilities such as the
    following:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 实现所有这些AI能力需要一个数据平台，它不仅能存储大量的历史和实时交易数据，还能高效地为各种AI模型提供服务，从预测异常检测器到用于模拟的生成模型，通常在实时或接近实时。通过拥有现代化的数据平台，金融机构可以解锁以下智能能力：
- en: '**XAI**: As regulatory scrutiny increases, financial institutions need AI systems
    that can explain their decisions. XAI approaches provide transparency into how
    AI models reach conclusions, satisfying regulatory requirements for accountability
    while maintaining detection accuracy. Leading data platforms support this explainability
    by preserving the relationships between data points and decisions.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**XAI**：随着监管审查的加强，金融机构需要能够解释其决策的AI系统。XAI方法提供了对AI模型如何得出结论的透明度，满足监管要求的问责制，同时保持检测的准确性。领先的数据平台通过保留数据点和决策之间的关系来支持这种可解释性。'
- en: '**Proactive risk sensing**: Rather than just responding to known patterns,
    advanced AI systems can anticipate emerging risks by analyzing subtle changes
    in behavior and market conditions. This forward-looking approach requires a flexible
    data foundation that can integrate diverse signals and support real-time analytics.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动风险感知**：不仅仅是响应已知的模式，先进的AI系统可以通过分析行为和市场条件中的微妙变化来预测新兴风险。这种前瞻性方法需要一个灵活的数据基础，能够整合各种信号并支持实时分析。'
- en: '**Federated learning for collaborative defense**: Financial institutions are
    exploring federated learning techniques that allow them to collectively train
    fraud detection models without sharing sensitive customer data. This collaborative
    approach strengthens the entire financial ecosystem while preserving privacy and
    confidentiality. Modern data platforms with sophisticated security features are
    essential for implementing these sophisticated approaches.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**联邦学习以协作防御**：金融机构正在探索联邦学习技术，允许它们在不共享敏感客户数据的情况下集体训练欺诈检测模型。这种协作方法加强了整个金融生态系统，同时保护隐私和机密性。具有复杂安全功能的现代数据平台对于实施这些复杂方法至关重要。'
- en: Together, these capabilities position financial institutions to stay ahead of
    evolving threats, meet regulatory demands with confidence, and transform compliance
    from a defensive necessity into a strategic advantage.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这些能力共同使金融机构能够领先于不断发展的威胁，自信地满足监管要求，并将合规性从防御性的必要性转变为战略优势。
- en: AI for regulatory intelligence and policy automation
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用于监管智能和政策自动化的AI
- en: 'The primary goal of fincrime prevention is to stop criminal activity while
    ensuring regulatory compliance. GenAI is transforming this space by creating powerful
    new capabilities for detecting and preventing fincrime:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 犯罪预防的主要目标是阻止犯罪活动，同时确保符合监管要求。GenAI通过创建强大的新能力来检测和预防金融犯罪，正在改变这一领域：
- en: '**Synthetic fraud datasets**: GenAI can create synthetic datasets of fraudulent
    transactions that mimic novel attack patterns not yet observed in the wild. This
    allows financial institutions to train their detection systems proactively, preparing
    for emerging threats before they materialize in actual attacks.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合成欺诈数据集**：GenAI可以创建模拟野外尚未观察到的全新攻击模式的欺诈交易合成数据集。这允许金融机构主动训练其检测系统，在真实攻击发生之前为新兴威胁做好准备。'
- en: '**Adversarial testing**: By simulating sophisticated fraud attempts, GenAI
    helps institutions identify vulnerabilities in their existing controls. These
    simulations can model complex, multi-channel attacks that traditional testing
    methods might miss.'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对抗性测试**：通过模拟复杂的欺诈尝试，GenAI帮助机构识别其现有控制中的漏洞。这些模拟可以模拟复杂的多渠道攻击，而传统的测试方法可能会错过。'
- en: '**Anomaly generation**: Rather than waiting for rare fraud events to occur
    naturally, GenAI can produce realistic anomalies that help improve detection models,
    particularly for low-frequency but high-impact fraud scenarios.'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常生成**：而不是等待罕见的欺诈事件自然发生，GenAI可以生成逼真的异常数据，有助于改进检测模型，特别是对于低频但影响大的欺诈场景。'
- en: AI also helps institutions interpret regulations, translate them into internal
    policies, and monitor ongoing adherence. GenAI can read and summarize legal texts,
    extract obligations, and suggest enforcement policies. Intelligent autonomous
    agents, that is, AI-powered systems that can perceive their environment, make
    decisions, and take actions to achieve specific goals, continuously validate operational
    activities against regulatory requirements, flagging noncompliant behavior in
    real time.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: AI还帮助机构解释法规，将它们转化为内部政策，并监控持续的遵守情况。GenAI可以阅读并总结法律文本，提取义务，并建议执行政策。智能自主代理，即能够感知其环境、做出决策并采取行动以实现特定目标的AI系统，可以持续验证运营活动是否符合监管要求，实时标记不合规行为。
- en: 'With modern data platforms as the underlying foundation, compliance systems
    benefit from real-time access to critical data: customer profiles, transactions,
    communications, and audit logs. The document model of platforms such as MongoDB
    allows organizations to store regulatory interpretations, compliance rules, and
    contextual metadata in a format that is easily searchable and traceable, enabling
    efficient, automated compliance checks and auditable reporting.'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 以现代数据平台作为基础，合规系统从实时访问关键数据中受益：客户档案、交易、通信和审计日志。MongoDB 等平台文档模型允许组织以易于搜索和追踪的格式存储法规解释、合规规则和上下文元数据，从而实现高效的自动化合规检查和可审计的报告。
- en: MongoDB’s role in KYC and AML
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MongoDB 在 KYC 和 AML 中的作用
- en: AI is transforming risk and compliance in financial services through real-time
    fraud detection, automated regulatory interpretation, and smarter decision-making.
    Modern data platforms such as MongoDB provide the flexible, scalable data foundation
    these AI systems rely on, especially for handling diverse data in KYC and AML,
    from documents to voice and images.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实时欺诈检测、自动法规解释和更智能的决策，AI 正在改变金融服务中的风险和合规性。现代数据平台，如 MongoDB，为这些 AI 系统提供了灵活、可扩展的数据基础，尤其是在处理客户身份识别（KYC）和反洗钱（AML）中的多样化数据时，从文件到语音和图像。
- en: MongoDB enables financial institutions to ingest and store unstructured data
    such as scanned IDs, biometric information, and customer support voice logs alongside
    structured data such as transactions and account histories. This allows AI models
    to perform deeper, multimodal analysis. For example, GenAI can transcribe and
    analyze voice interactions for suspicious intent, or detect document forgeries
    using image data.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB 允许金融机构同时摄取和存储非结构化数据，例如扫描的身份证件、生物识别信息和客户支持语音记录，以及结构化数据，如交易和账户历史记录。这使得
    AI 模型能够执行更深入的多模态分析。例如，GenAI 可以转录和分析语音交互以检测可疑意图，或使用图像数据检测文件伪造。
- en: MongoDB Atlas further enhances this by offering built-in capabilities such as
    full-text search, Vector Search (for similarity matching), and integration with
    machine learning pipelines. With these features, institutions can compare customer-submitted
    documents to known fraud patterns, run facial recognition or voiceprint validation,
    and perform semantic searches across customer interactions, enabling a much richer
    KYC/AML risk assessment process.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB Atlas 通过提供内置功能进一步增强了这一点，例如全文搜索、向量搜索（用于相似度匹配）以及与机器学习管道的集成。有了这些功能，机构可以将客户提交的文件与已知的欺诈模式进行比较，运行面部识别或声纹验证，并在客户交互中执行语义搜索，从而实现更丰富的
    KYC/AML 风险评估流程。
- en: An AI-first approach to risk and compliance begins with a dynamic, single-customer
    view, as shown in *Figure 11.6*. MongoDB Atlas ingests structured and unstructured
    data from internal systems, customer touchpoints, and external sources, which
    is then processed by AI models to detect potential fraud or compliance violations
    based on learned behaviors and regulatory logic. Diverse data sources, including
    structured transaction data, unstructured documents, and external datasets, are
    integrated into a unified profile, enabling comprehensive risk assessment and
    personalized service delivery.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 首先采用以 AI 为中心的风险管理方法，从动态的单客户视图开始，如图 11.6 所示。MongoDB Atlas 从内部系统、客户接触点和外部来源摄取结构化和非结构化数据，然后由
    AI 模型处理，根据学习到的行为和法规逻辑检测潜在的欺诈或合规违规。包括结构化交易数据、非结构化文档和外部数据集在内的多样化数据源被整合到一个统一的个人资料中，从而实现全面的风险评估和个性化的服务交付。
- en: '![](img/B34136_11_06.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_11_06.png)'
- en: 'Figure 11.6: Converged data store for building a dynamic customer profile'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.6：构建动态客户资料的融合数据存储
- en: Once this single view is built, it can be combined with additional unstructured
    data, such as sanction watchlists and AML policies, along with transactional data,
    for comprehensive analysis. The flexibility of MongoDB’s document model enables
    this multimodal database approach. After the data is converged into a complete
    dataset, MongoDB’s Vector Search can identify similar vector representations of
    known suspicious activities, as shown in *Figure 11.7*. This ensures that only
    high-likelihood fraudulent transactions are flagged for review, reducing false
    positives while maintaining detection accuracy.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦构建了这一单一视图，它可以与额外的非结构化数据相结合，例如制裁观察名单和AML政策，以及交易数据，进行综合分析。MongoDB文档模型的灵活性使得这种多模态数据库方法成为可能。数据汇聚成完整数据集后，MongoDB的向量搜索可以识别已知可疑活动的相似向量表示，如图*图11.7*所示。这确保了只有高概率的欺诈交易被标记为审查，从而减少误报同时保持检测准确性。
- en: '![](img/B34136_11_07.png)Figure 11.7: Real-time transaction screening using
    Vector Search'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '![图11.7：使用向量搜索的实时交易筛选](img/B34136_11_07.png)图11.7：使用向量搜索进行实时交易筛选'
- en: Vector Search plays a critical role in real-time transaction screening, enabling
    the comparison of incoming transactions against established patterns of suspicious
    activity. By leveraging this approach, financial institutions can significantly
    reduce false positives, improve detection accuracy, and respond faster to potential
    threats.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 向量搜索在实时交易筛选中发挥着关键作用，它使得将传入交易与已建立的可疑活动模式进行比较成为可能。通过利用这种方法，金融机构可以显著减少误报，提高检测准确性，并更快地应对潜在威胁。
- en: Strategic business benefits
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 战略业务优势
- en: 'The implementation of AI-driven real-time transaction screening and Vector
    Search capabilities can deliver the following measurable strategic capabilities
    for financial institutions:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: AI驱动的实时交易筛选和向量搜索功能的实现可以为金融机构带来以下可衡量的战略能力：
- en: '**Better fraud detection**: AI models powered by MongoDB’s real-time data access
    can catch subtle fraud signals across large datasets, reducing false positives
    and speeding response times.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更好的欺诈检测**：由MongoDB的实时数据访问支持的AI模型可以在大型数据集中捕捉微妙的欺诈信号，减少误报并加快响应时间。'
- en: '**Improved compliance**: Automated interpretation and enforcement of regulations
    reduce manual overhead and audit risks.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进的合规性**：自动解释和执行法规减少了人工成本和审计风险。'
- en: '**Enhanced KYC/AML**: The ability to store and analyze unstructured customer
    data enriches identity verification and risk scoring.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强的KYC/AML**：存储和分析非结构化客户数据的能力丰富了身份验证和风险评估。'
- en: '**Increased agility**: IT departments can rapidly adapt to new regulatory mandates
    or emerging fraud typologies, as MongoDB’s flexible schema supports iterative
    development and quick deployment of new data models and AI-driven rules without
    lengthy database redesign cycles.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高的敏捷性**：IT部门可以快速适应新的监管要求或新兴的欺诈类型，因为MongoDB的灵活模式支持迭代开发和快速部署新的数据模型和AI驱动规则，无需漫长的数据库重新设计周期。'
- en: '**Operational efficiency**: AI automation and integrated data workflows free
    human teams to focus on high-value tasks.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营效率**：AI自动化和集成数据工作流程释放了人力资源，使其能够专注于高价值任务。'
- en: '**Regulatory trust**: By providing a unified data platform with comprehensive
    audit trails for AI-driven decisions, IT decision-makers can help their institutions
    more effectively demonstrate robust controls and accountability to regulators,
    fostering greater trust and potentially reducing scrutiny.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监管信任**：通过提供统一的数据平台和AI驱动决策的全面审计跟踪，IT决策者可以帮助其机构更有效地向监管机构展示稳健的控制和问责制，从而增强信任并可能减少审查。'
- en: As fincrime continues to evolve, AI-powered prevention systems will become increasingly
    sophisticated. Comprehensive techniques such as federated learning, which allows
    models to be trained across multiple institutions without sharing sensitive data,
    promise to enhance detection capabilities while preserving privacy and confidentiality.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 随着金融犯罪不断演变，AI驱动的预防系统将变得越来越复杂。如联邦学习等综合技术，允许模型在多个机构之间进行训练而不共享敏感数据，有望提高检测能力同时保护隐私和机密性。
- en: Autonomous intelligent agents represent the next frontier, with systems that
    can proactively hunt for suspicious patterns, adapt defenses in real time, and
    even predict emerging threats before they materialize. These systems will require
    robust data platforms that can handle complex, interconnected data and support
    real-time decision-making at scale.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 自主智能代理代表了下一个前沿，拥有能够主动寻找可疑模式、实时调整防御措施，甚至在它们实现之前预测新兴威胁的系统。这些系统将需要能够处理复杂、相互关联的数据并支持大规模实时决策的强大数据平台。
- en: By investing in AI-powered fincrime prevention built on flexible, scalable data
    platforms such as MongoDB, financial institutions can stay ahead of evolving threats
    while reducing operational costs and maintaining regulatory compliance.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 通过投资基于灵活、可扩展的数据平台（如MongoDB）的AI驱动的金融犯罪预防，金融机构可以在降低运营成本的同时保持合规，并保持对不断发展的威胁的领先地位。
- en: Beyond traditional risk management, AI is also transforming how institutions
    approach environmental and social responsibility.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 除了传统的风险管理之外，AI也在改变机构如何处理环境和社会责任。
- en: Multimodal and AI-driven ESG analysis
  id: totrans-201
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多模态和AI驱动的ESG分析
- en: The profound impact of **environmental, social, and governance** (**ESG**) principles
    is evident, driven by regulatory changes, especially in Europe, compelling financial
    institutions to integrate ESG into investment and lending decisions. Regulations
    such as the EU **Sustainable Finance Disclosure Regulation** (**SFDR**) and the
    EU Taxonomy Regulation are examples of such directives that require financial
    institutions to consider environmental sustainability in their operations and
    investment products. Investors’ demand for sustainable options has surged, leading
    to increased ESG-focused funds. The regulatory and commercial requirements, in
    turn, drive banks to also improve their green lending practices. This shift is
    strategic for financial institutions, attracting clients, managing risks, and
    creating long-term value.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '**环境、社会和治理**（**ESG**）原则的深远影响显而易见，这得益于监管变革，尤其是在欧洲，迫使金融机构将ESG整合到投资和贷款决策中。例如，欧盟的**可持续金融披露法规**（**SFDR**）和欧盟分类法规是此类指令的例子，要求金融机构在其运营和投资产品中考虑环境可持续性。投资者对可持续选项的需求激增，导致专注于ESG的资金增加。监管和商业需求反过来又促使银行改善其绿色贷款实践。这种转变对金融机构来说是战略性的，可以吸引客户、管理风险并创造长期价值。'
- en: However, financial institutions face many challenges in managing different aspects
    of improving their ESG analysis. The key challenges include defining and aligning
    standards and processes, and managing the flood of rapidly changing and varied
    data to be included for ESG analysis purposes.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，金融机构在管理提高其ESG分析的不同方面时面临着许多挑战。主要挑战包括定义和协调标准及流程，以及管理为ESG分析目的而包括的快速变化和多样化的数据洪流。
- en: AI can help to address these key challenges in not only an automatic but also
    an adaptive manner via techniques such as machine learning. Financial institutions
    and ESG solution providers have already used AI to extract insights from corporate
    reports, social media, and environmental data, improving the accuracy and depth
    of ESG analysis. As the market demands a more sustainable and equitable society,
    predictive AI combined with GenAI can also help to reduce bias in lending to create
    a fairer and more inclusive financing while improving the predictive powers. The
    power of AI can help facilitate the development of sophisticated sustainability
    models and strategies, marking a leap forward in integrating ESG into broader
    financial and corporate practices.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以通过机器学习等技术以自动和自适应的方式帮助解决这些关键挑战。金融机构和ESG解决方案提供商已经使用AI从企业报告、社交媒体和环境数据中提取见解，提高了ESG分析的准确性和深度。随着市场对更可持续和公平社会的需求增加，预测AI与GenAI的结合也有助于减少贷款中的偏见，创造更公平、更具包容性的融资，同时提高预测能力。AI的力量有助于促进复杂可持续模型和策略的发展，标志着将ESG融入更广泛的金融和公司实践的重大进步。
- en: Under the broader umbrella of ESG, environmental and climate risk is a key challenge
    for financial and non-financial institutions alike. With climate change accelerating
    at an unprecedented rate, millions of assets are at risk. Institutions will need
    intelligent climate data analytics to manage the climate risk and find better
    risk-adjusted opportunities.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在更广泛的ESG框架下，环境和气候风险对金融和非金融机构都是一个关键挑战。随着气候变化以前所未有的速度加速，数百万资产面临风险。机构将需要智能气候数据分析来管理气候风险并找到更好的风险调整机会。
- en: '**Ambee’s climate data platform**'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '**Ambee的气候数据平台**'
- en: Ambee, a fast-growing climate tech start-up based in India, is making waves
    in the world of environmental data with its mission to create a sustainable future.
    With over 1 million daily active users, Ambee provides proprietary climate and
    environmental data-as-a-service to empower governments, healthcare organizations,
    and private companies to make informed decisions about their policies and business
    strategies.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: Ambee是一家总部位于印度的快速成长的气候技术初创公司，以其创造可持续未来的使命在环境数据领域引起了轰动。拥有超过100万日活跃用户，Ambee提供专有的气候和环境数据服务，以帮助政府、医疗保健组织和私营公司就其政策和商业战略做出明智的决策。
- en: MongoDB Atlas has been at the core of Ambee’s database architecture, supporting
    their AI and machine learning models. The firm leveraged MongoDB Atlas to manage
    its extensive and diverse environmental datasets. Processing approximately 4 terabytes
    of data daily from over 800,000 sensors and 11 Earth observation satellites, Ambee
    faced challenges in scaling and ensuring rapid API responses. By adopting MongoDB
    Atlas, the company centralized its data storage, which streamlined data access
    and reduced the need for complex joins across multiple tables. This transition
    enabled Ambee to scale from handling 60,000 API calls per month in 2020 to approximately
    790 million by 2023, all while improving API response times from 2 seconds to
    under 300 milliseconds.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB Atlas一直是Ambee数据库架构的核心，支持他们的AI和机器学习模型。该公司利用MongoDB Atlas来管理其广泛且多样化的环境数据集。Ambee每天处理来自超过80万个传感器和11颗地球观测卫星的大约4太字节的数据，面临着扩展和确保快速API响应的挑战。通过采用MongoDB
    Atlas，公司集中了其数据存储，简化了数据访问，并减少了在多个表之间进行复杂连接的需求。这一转型使Ambee从2020年每月处理60,000次API调用扩展到2023年约79亿次，同时将API响应时间从2秒缩短到300毫秒以下。
- en: Ambee’s data provides users with precise environmental insights within a <1
    Km² radius. To achieve this high level of accuracy and granularity, Ambee required
    a platform capable to not only support a large volume of data but also to be able
    to support extensive geospatial needs. MongoDB Atlas perfectly fits their requirements
    due to its rapid geospatial querying capabilities. For instance, with MongoDB,
    they can query the nearest location to a given coordinate within 20 milliseconds,
    even with millions of geospatial data points.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: Ambee的数据为用户提供了一个半径小于1平方公里范围内的精确环境洞察。为了达到这种高精度和粒度，Ambee需要一个平台，不仅能够支持大量数据，还能够支持广泛的地理空间需求。MongoDB
    Atlas因其快速地理空间查询能力完美地满足了他们的需求。例如，使用MongoDB，他们可以在20毫秒内查询给定坐标最近的地点，即使有数百万个地理空间数据点。
- en: '![](img/Spotlight_Icon.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![Spotlight_Icon](img/Spotlight_Icon.png)'
- en: The performance, scalability, and multimodal capabilities of MongoDB Atlas support
    Ambee’s AI-driven services, such as forecasting forest fires and providing real-time
    air quality and pollen data. Additionally, MongoDB Atlas Search facilitates text
    search functionalities, including partial, wildcard, and autocomplete searches,
    enhancing the platform’s ability to deliver precise information swiftly.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB Atlas的性能、可扩展性和多模态能力支持Ambee的AI驱动服务，例如预测森林火灾和提供实时空气质量和花粉数据。此外，MongoDB
    Atlas Search促进了文本搜索功能，包括部分搜索、通配符搜索和自动完成搜索，增强了平台快速提供精确信息的能力。
- en: MongoDB’s role in ESG data management
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MongoDB在ESG数据管理中的作用
- en: MongoDB’s dynamic architecture revolutionizes ESG data management, handling
    semi-structured and unstructured data. Its flexible schema nature allows the adaptation
    of data models as ESG strategies evolve. Advanced text search capabilities efficiently
    analyze vast semi-structured data for informed ESG reporting. Support for Vector
    Search enriches ESG analysis with multimedia content insights.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB的动态架构革新了ESG数据管理，能够处理半结构化和非结构化数据。其灵活的架构特性允许数据模型随着ESG策略的发展而适应。高级文本搜索功能能够高效地分析大量半结构化数据，为ESG报告提供信息。支持向量搜索则通过多媒体内容洞察丰富了ESG分析。
- en: Incorporating LLMs enhances MongoDB’s capacity to process ESG textual content,
    automating sentiment extraction, summarization, and trend identification. Combining
    LLMs with vector data management capabilities, GenAI applications can be created
    to interpret the complex and evolving sustainability taxonomy and guide the investment
    and financing processes in a compliant manner. This AI-driven approach, supported
    by MongoDB’s robust data management, offers a sophisticated means of analyzing
    extensive narrative data in ESG reporting.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 结合LLM（大型语言模型）增强了MongoDB处理ESG文本内容的能力，自动化情感提取、总结和趋势识别。结合LLM与矢量数据管理能力，可以创建GenAI应用来解释复杂且不断演变的可持续性分类法，并指导合规的投资和融资流程。这种由AI驱动的、由MongoDB强大的数据管理支持的途径，为分析ESG报告中大量叙事数据提供了一种复杂的方法。
- en: Furthermore, MongoDB supports geospatial and network graph analytics, providing
    a powerful combination of analytics to identify the physical risks associated
    with climate change (e.g., floods or wildfires) to assets financed by banks or
    investment firms and for assessing supply chain impacts of the climate risks.
    The risk analytics can then enable targeted strategies for risk mitigation and
    supply chain resilience.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，MongoDB支持地理空间和网络图分析，提供了一种强大的分析组合，以识别与气候变化（例如洪水或野火）相关的物理风险，这些风险与银行或投资公司融资的资产相关，并评估气候风险对供应链的影响。风险分析可以随后实现针对风险缓解和供应链弹性的针对性策略。
- en: With the evolution of agentic AI, new sustainability use cases are emerging.
    For example, agentic AI applications can serve as intelligent copilots for relationship
    managers during green loan origination, ensuring ESG compliance and eligibility
    in real time. Agentic AI can continuously monitor ESG disclosures and external
    media to detect greenwashing, autonomously trigger risk alerts, and recommend
    mitigation steps for compliance teams. In supply chain management, agentic AI
    agents can proactively map climate vulnerabilities of suppliers, simulate disruption
    scenarios, and orchestrate automated resilience measures, driving more sustainable
    procurement and operations.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 随着代理AI的发展，新的可持续性用例正在出现。例如，代理AI应用可以作为绿色贷款发起过程中关系经理的智能副驾驶，确保实时ESG合规性和资格。代理AI可以持续监控ESG披露和外部媒体，以检测漂绿行为，自主触发风险警报，并为合规团队推荐缓解措施。在供应链管理中，代理AI代理可以主动绘制供应商的气候脆弱性，模拟中断场景，并编排自动化的弹性措施，推动更可持续的采购和运营。
- en: Leveraging the out-of-box, rich, multimodal capabilities and integrated AI tooling,
    MongoDB’s data platform is an ideal foundation for advancing the use of AI to
    agentic AI applications, as it can serve as a real-time operational and analytical
    data store for ingesting, storing, and organizing all relevant ESG, regulatory,
    and contextual data that agentic AI agents require to make informed, autonomous
    decisions. By seamlessly integrating with AI models and supporting real-time event
    processing, MongoDB enables agentic AI to monitor ESG risks, trigger alerts, and
    orchestrate workflows across lending, compliance, or supply chain modules, all
    using operational ESG data.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 利用即插即用、丰富、多模态的功能和集成AI工具，MongoDB的数据平台是推进AI在代理AI应用中使用的理想基础，因为它可以作为实时操作和分析数据存储，用于摄取、存储和组织代理AI代理做出明智、自主决策所需的所有相关ESG、监管和情境数据。通过无缝集成AI模型并支持实时事件处理，MongoDB使代理AI能够监控ESG风险、触发警报，并在贷款、合规或供应链模块中编排工作流程，所有这些均使用操作ESG数据。
- en: AI-driven ESG policy and regulatory compliance
  id: totrans-218
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 驱动ESG政策和监管合规的AI
- en: AI can play a transformative role in ESG policy analysis and regulatory interpretation
    by automating the ingestion, understanding, and synthesis of complex and frequently
    changing regulations across jurisdictions. Utilizing advanced NLP and machine
    learning models, AI can rapidly analyze lengthy regulatory texts, accurately extract
    key requirements, and compare them against an organization’s current policies
    and practices. This enables compliance teams to quickly identify gaps, overlaps,
    or potential violations, and receive actionable recommendations for policy updates.
    AI-powered tools can also track regulatory changes in real time, generating concise
    summaries and alerting relevant stakeholders to new obligations or opportunities,
    significantly reducing manual effort and the risk of oversight.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以通过自动化跨司法管辖区复杂且经常变化的法规的摄入、理解和综合，在ESG政策分析和监管解释中发挥变革性作用。利用先进的NLP和机器学习模型，AI可以快速分析冗长的监管文本，准确提取关键要求，并将其与组织的当前政策和实践进行比较。这使得合规团队能够快速识别差距、重叠或潜在的违规行为，并收到政策更新的可操作建议。AI驱动的工具还可以实时跟踪监管变化，生成简洁的摘要，并提醒相关利益相关者新的义务或机会，显著减少人工努力和监管风险。
- en: Agentic AI systems can autonomously monitor multiple regulatory jurisdictions,
    proactively initiate reviews or policy updates when new ESG requirements are detected,
    orchestrate internal workflows for cross-departmental compliance, and even assist
    in drafting initial responses or disclosures to regulators.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 智能代理AI系统可以自主监控多个监管司法管辖区，在检测到新的ESG要求时，主动启动审查或政策更新，协调跨部门合规的内部工作流程，甚至协助起草对监管机构的初步回应或披露。
- en: For example, in a real-time use case, agentic AI can continuously scan official
    publications from international regulators and, upon detecting a newly issued
    ESG rule, automatically update internal policy documents, create tailored action
    items for compliance teams, and trigger notifications for impacted business units,
    all within minutes of the regulation’s release. However, recognizing the importance
    of institutional control and accountability, many organizations can implement
    a *man-in-the-loop* approach, where AI-driven recommendations, updates, and action
    items are routed to human experts for review and approval before any final decisions
    or public disclosures are made. This ensures that while AI brings speed and consistency
    to ESG policy processes, critical judgments and final controls remain in the hands
    of experienced professionals. For global financial institutions navigating an
    ever-evolving ESG regulatory landscape, both traditional and agentic AI-driven
    policy analysis, combined with human oversight, offer a scalable and consistent
    way to maintain compliance, optimize reporting, and confidently pursue sustainability
    objectives.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一个实时用例中，智能代理AI可以持续扫描国际监管机构的官方出版物，并在检测到新的ESG规则后，在法规发布后的几分钟内自动更新内部政策文件，为合规团队创建定制的行动项，并触发受影响业务单元的通知。然而，认识到机构控制和问责制的重要性，许多组织可以实施*人工介入*的方法，其中AI驱动的建议、更新和行动项在做出任何最终决定或公开披露之前，都会被路由到人类专家进行审查和批准。这确保了虽然AI为ESG政策流程带来了速度和一致性，但关键判断和最终控制仍然掌握在经验丰富的专业人士手中。对于在全球不断变化的ESG监管环境中航行的全球金融机构，传统和智能代理AI驱动的政策分析，结合人类监督，提供了一种可扩展且一致的方法来维持合规性、优化报告并自信地追求可持续性目标。
- en: MongoDB’s value extends beyond ESG data management, accelerating productivity
    for developers and data science teams. Its intuitive data model, analytical tools,
    and AI integrations streamline the development and deployment of data-driven applications,
    making MongoDB pivotal for organizations advancing their ESG agendas efficiently.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB的价值不仅限于ESG数据管理，它还能加速开发人员和数据科学团队的效率。其直观的数据模型、分析工具和AI集成简化了数据驱动应用程序的开发和部署，使MongoDB对于推进ESG议程的组织至关重要。
- en: '*Figure 11.8* represents an enterprise ESG solution architecture with the boxes
    labeled with a leaf where MongoDB can be deployed to support the ESG data analytics
    services.'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: '*图11.8* 表示了一个企业ESG解决方案架构，其中标有叶子的框表示MongoDB可以部署以支持ESG数据分析服务。'
- en: '![](img/B34136_11_08.png)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_11_08.png)'
- en: 'Figure 11.8: Blueprint for enterprise ESG solution architecture using MongoDB'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.8：使用MongoDB的企业ESG解决方案架构蓝图
- en: This illustrates a complete ESG solution architecture, highlighting the integration
    points where MongoDB can be deployed to support data collection, analysis, and
    reporting across ESG domains.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 这展示了完整的ESG解决方案架构，突出了MongoDB可以部署以支持ESG领域数据收集、分析和报告的集成点。
- en: Straight-through payments processing powered by AI
  id: totrans-227
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 由人工智能驱动的端到端支付处理
- en: The payments sector is undergoing rapid transformation. As corporate clients
    demand faster, smarter, and more efficient services, financial institutions are
    turning to AI to enable real-time, data-driven decision-making and automation.
    Central to unlocking these benefits is not just AI itself, but the foundational
    technology that supports it, most notably, flexible, scalable, and high-performance
    data infrastructure such as MongoDB.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 支付行业正在经历快速转型。随着企业客户对更快、更智能、更高效的服务的要求增加，金融机构正在转向人工智能来实现实时、数据驱动的决策和自动化。解锁这些益处的关键不仅在于人工智能本身，还在于支持它的基础技术，尤其是灵活、可扩展和性能卓越的数据基础设施，如MongoDB。
- en: This section explores how **straight-through payment processing** (**STP**),
    the seamless, end-to-end execution of payment transactions without manual intervention,
    is being revolutionized by AI, and how MongoDB provides a critical backbone for
    this transformation.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了如何通过人工智能革命性地改变**端到端支付处理**（**STP**），即无需人工干预的支付交易的无缝执行，以及MongoDB如何为这一转型提供关键的支持。
- en: Business outlook
  id: totrans-230
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业展望
- en: The payments industry stands at the cusp of a profound transformation, driven
    by AI. With the rise of real-time transactions, digital banking expectations,
    and complex compliance requirements, banks and financial institutions are under
    increasing pressure to deliver more intelligent, automated, and personalized services.
    AI is no longer just an innovation initiative; it’s becoming a business imperative.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 支付行业正处于深刻转型的边缘，这一转型由人工智能驱动。随着实时交易、数字银行期望和复杂的合规要求的兴起，银行和金融机构面临着越来越大的压力，需要提供更智能、自动化和个性化的服务。人工智能不再仅仅是创新项目；它正成为一项业务必要性。
- en: 'Several forces are converging to make AI a cornerstone of modern payments processing:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 几种力量正汇聚在一起，使人工智能成为现代支付处理的基础：
- en: '**Customer expectations**: Both retail and corporate customers now demand real-time
    insights, seamless payment experiences, and predictive services such as cash flow
    forecasting or anomaly alerts.'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户期望**：零售和公司客户现在都要求实时洞察、无缝支付体验以及现金流量预测或异常警报等预测服务。'
- en: '**Operational complexity**: Traditional manual workflows in payment reconciliation,
    fraud checks, and routing are increasingly untenable due to growing transaction
    volumes.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营复杂性**：由于交易量的增长，传统的手动工作流程在支付对账、欺诈检查和路由方面越来越难以维持。'
- en: '**Competitive pressures**: Fintech disruptors and digital-native banks are
    leveraging AI to differentiate themselves. Traditional banks risk falling behind
    if they don’t evolve quickly.'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**竞争压力**：金融科技颠覆者和数字原生银行正在利用人工智能来区分自己。如果传统银行不能快速进化，它们可能会落后。'
- en: '**Regulatory demands**: Regulations such as PSD2, ISO 20022, and real-time
    payment schemes (e.g., RTP, FedNow) require financial institutions to modernize
    infrastructure and data workflows, which aligns well with AI’s data-hungry nature.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监管需求**：如PSD2、ISO 20022和实时支付方案（例如，RTP、FedNow）等法规要求金融机构现代化基础设施和数据工作流程，这与人工智能对数据的渴求性质相吻合。'
- en: In corporate banking, AI adoption is particularly strategic. According to Celent’s
    research, 73% of corporate banks reported clear revenue opportunities from investments
    in advanced analytics. On the other hand, 30% of banks increasing their investment
    in payments technology have ranked AI as a high priority [1].
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在公司银行业务中，人工智能的采用尤其具有战略意义。根据Celent的研究，73%的公司银行报告称，从投资高级分析中获得了明确的收入机会。另一方面，30%增加支付技术投资银行将人工智能列为高优先级[1]。
- en: This emphasis is not only on incremental efficiencies but also on new business
    models and monetizable value-added services, such as real-time financial dashboards,
    automated forecasting, and smart liquidity tools.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 这种强调不仅在于增量效率，还在于新的商业模式和可货币化的增值服务，例如实时财务仪表板、自动化预测和智能流动性工具。
- en: The role of GenAI
  id: totrans-239
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通用人工智能（GenAI）的作用
- en: 'The emergence of GenAI and LLMs has added new dimensions to AI’s role in payments:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 通用人工智能（GenAI）和大型语言模型（LLMs）的出现为人工智能在支付中的作用增添了新的维度：
- en: '**Natural language interfaces**: Clients can now query payment data conversationally
    (`"What are my outstanding receivables over $10,000 this quarter?"`), transforming
    the user experience'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言界面**：客户现在可以通过对话查询支付数据（例如：“这个季度我超过10,000美元的未收账款是什么？”），从而改变用户体验'
- en: '**Code generation and testing**: GenAI tools enhance developer productivity,
    allowing for faster creation of payment processing logic, validations, and compliance
    checks'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码生成和测试**：生成式人工智能工具提高了开发者的生产力，允许更快地创建支付处理逻辑、验证和合规性检查'
- en: '**Data summarization and reporting**: LLMs can synthesize vast volumes of transaction
    data into insights, summaries, or regulatory reports, reducing reliance on manual
    data handling'
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据汇总和报告**：大型语言模型可以将大量交易数据综合成见解、摘要或监管报告，减少对人工数据处理的依赖'
- en: However, the application of GenAI introduces challenges in data security, explainability,
    and regulatory compliance, especially when handling sensitive financial information,
    making data architecture and governance critical enablers.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，生成式人工智能的应用在数据安全、可解释性和合规性方面带来了挑战，尤其是在处理敏感的财务信息时，使数据架构和治理成为关键推动因素。
- en: '![](img/B34136_11_09.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_11_09.png)'
- en: 'Figure 11.9: Payments key drivers'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.9：支付关键驱动因素
- en: This diagram illustrates the foundational architecture of modern real-time payment
    systems, showing how the central processing core manages comprehensive payment
    workflows by integrating input capabilities such as real-time personalization,
    automated categorization, fraud prevention, and compliance monitoring with output
    services including data adjustments, process integration, payment settlement,
    and 24/7 execution to enable seamless, secure, and continuous payment processing
    with real-time operational capabilities.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了现代实时支付系统的基本架构，展示了中央处理核心如何通过集成输入能力（如实时个性化、自动分类、欺诈预防和合规监控）以及输出服务（包括数据调整、流程集成、支付结算和全天候执行）来管理全面的支付工作流程，以实现具有实时操作能力的无缝、安全、连续的支付处理。
- en: 'The success of AI in payments depends fundamentally on a robust data infrastructure.
    AI models are only as good as the data they are trained on, and the insights they
    produce are only as trustworthy as the systems that manage that data. This is
    where MongoDB plays a pivotal role:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在支付领域的成功从根本上取决于一个强大的数据基础设施。人工智能模型的好坏取决于它们训练的数据，它们产生的见解的可信度也取决于管理这些数据系统的可靠性。这正是MongoDB发挥关键作用的地方：
- en: '**Unified data layer**: MongoDB enables organizations to unify disparate data
    sources (payment messages, account data, customer profiles, and logs) into a single
    view, structured and ready for analytics or machine learning pipelines'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统一数据层**：MongoDB使组织能够将不同的数据源（支付消息、账户数据、客户资料和日志）统一到一个视图，结构化并准备好进行数据分析或机器学习管道'
- en: '**Real-time analytics and AI readiness**: Its ability to support streaming,
    time-series, and high-volume transactional workloads ensures AI applications are
    responsive and scalable'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时分析和人工智能就绪性**：其支持流式、时间序列和高容量事务性工作负载的能力确保人工智能应用具有响应性和可扩展性'
- en: '**Modern developer experience**: MongoDB’s rich developer ecosystem, integrating
    with Python, Spark, TensorFlow, and vector databases, makes it ideal for building
    and iterating on AI-driven features'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现代开发者体验**：MongoDB丰富的开发者生态系统，与Python、Spark、TensorFlow和向量数据库集成，使其成为构建和迭代人工智能驱动功能的理想选择'
- en: With a unified, scalable, and AI-ready data foundation, MongoDB empowers payment
    providers to harness AI with speed, accuracy, and confidence, driving innovation
    while ensuring trust in every transaction.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 借助统一、可扩展和人工智能就绪的数据基础，MongoDB使支付提供商能够快速、准确、有信心地利用人工智能，推动创新，同时确保每一笔交易的可信度。
- en: 'Despite the promise, integrating AI into STP presents significant data challenges:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管前景光明，但将人工智能集成到STP（Straight-Through Processing）中仍然面临着重大的数据挑战：
- en: '**Volume and variety**: Payment systems process millions of transactions in
    diverse formats and from disparate sources'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数量和多样性**：支付系统以不同的格式和来自不同来源处理数百万笔交易'
- en: '**Real-time processing**: Many AI applications depend on streaming or near-real-time
    data processing'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时处理**：许多人工智能应用依赖于流式或接近实时的数据处理'
- en: '**Data quality and normalization**: Legacy formats and inconsistent data structures
    hinder model performance'
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据质量和标准化**：遗留格式和不一致的数据结构阻碍了模型性能'
- en: '**Auditability and governance**: AI, especially GenAI, requires transparent
    data handling for regulatory compliance'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可审计性和治理**：人工智能，尤其是生成式人工智能，需要透明的数据处理以符合监管要求'
- en: 'These challenges demand a database platform that’s agile and scalable and handles
    structured, semi-structured, and unstructured data. MongoDB delivers unique capabilities
    tailored for AI-driven STP systems:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 这些挑战需要一种能够敏捷和可扩展地处理结构化、半结构化和非结构化数据的数据库平台。MongoDB为AI驱动的STP系统提供独特的功能：
- en: '**Flexible data modeling**: MongoDB’s document-oriented model allows for the
    seamless integration of diverse financial data sources, such as transaction histories,
    invoices, and market data, into a unified format. This flexibility is crucial
    for accurate cash flow forecasting, or for supporting several payment schemas,
    including ISO 20022, facilitating intelligent routing decisions.'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活的数据建模**：MongoDB的文档型模型允许无缝地将各种金融数据源，如交易历史、发票和市场数据，整合到统一格式中。这种灵活性对于准确的现金流预测或支持包括ISO
    20022在内的多种支付方案至关重要，它有助于智能路由决策。'
- en: '**High-performance queries**: The database’s indexing and aggregation capabilities
    allow for swift analysis of transaction patterns, aiding in the detection of fraudulent
    activities.'
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高性能查询**：数据库的索引和聚合功能允许快速分析交易模式，有助于检测欺诈活动。'
- en: '**Secure data handling**: Features such as encryption at rest and in transit,
    along with role-based access control, ensure sensitive financial data is protected
    during analysis.'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全的数据处理**：包括静态和传输中的加密以及基于角色的访问控制等功能，确保在分析过程中敏感的金融数据得到保护。'
- en: '**Data validation**: Built-in schema validation helps in identifying and correcting
    anomalies in payment data, reducing the need for manual intervention.'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据验证**：内置的架构验证有助于识别和纠正支付数据中的异常，减少手动干预的需求。'
- en: '**Real-time data processing**: With features such as change streams and time-series
    collections, MongoDB enables real-time tracking and analysis of financial transactions,
    facilitating timely insights into cash positions.'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时数据处理**：凭借变更流和时间序列集合等特性，MongoDB能够实时跟踪和分析金融交易，促进对现金头寸的及时洞察。'
- en: '**Integration with analytics tools**: MongoDB’s compatibility with tools such
    as Apache Spark and its own aggregation framework supports complex analytical
    queries necessary for forecasting models.'
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与分析工具的集成**：MongoDB与Apache Spark等工具的兼容性及其自身的聚合框架支持复杂的分析查询，这对于预测模型是必要的。'
- en: '**Operational resilience**: MongoDB’s replication and sharding capabilities
    ensure high availability and scalability, which are essential for processing and
    rerouting payments efficiently.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营弹性**：MongoDB的复制和分片功能确保了高可用性和可伸缩性，这对于高效处理和重新路由支付至关重要。'
- en: '**Multi-cloud and hybrid readiness**: MongoDB Atlas, the fully managed cloud
    platform, enables banks to run AI workloads across on-premises, public cloud,
    or hybrid environments, which is critical for compliance and data residency needs
    in global banking.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多云和混合云就绪**：MongoDB Atlas，这个完全管理的云平台，使银行能够在本地、公共云或混合环境中运行AI工作负载，这对于全球银行业的合规性和数据居住需求至关重要。'
- en: The ultimate goal is to accelerate development and AI-adoption while enabling
    real-time analytics as a key technological enabler for modern payments processing.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 最终目标是加速开发和AI的采用，同时使实时分析成为现代支付处理的关键技术推动者。
- en: The road ahead
  id: totrans-268
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前方的道路
- en: As the payments industry enters a new phase of digitization, the fusion of AI
    and scalable data infrastructure will define future leaders. STP is no longer
    a technical aspiration; it is a strategic imperative. MongoDB empowers banks to
    realize this vision by making it easy to manage, analyze, and act on payments
    data in real time. By investing in flexible data architectures and AI-enabling
    technologies today, banks will not only enhance their current offerings but also
    lay the foundation for continuous innovation tomorrow.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 随着支付行业进入数字化的新阶段，AI和可扩展数据基础设施的结合将定义未来的领导者。STP（Straight-Through Processing）不再是一个技术愿景；它是一个战略需求。MongoDB通过简化实时管理、分析和采取支付数据的行动，使银行能够实现这一愿景。通过投资灵活的数据架构和AI赋能技术，银行不仅可以增强其当前的产品，还可以为明天的持续创新奠定基础。
- en: Capital markets
  id: totrans-270
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 资本市场
- en: The capital markets sector faces unique challenges in managing vast amounts
    of diverse data in a fast-paced, high-stakes environment. Modern financial institutions
    require flexible and scalable data platforms that can address the demands of data-intensive
    trading operations. Effective data architecture enables the integration of real-time
    market trends, alternative data sources, regulatory information, and customer
    profiles while facilitating seamless connections across various functions in the
    capital markets business.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 资本市场部门在管理大量多样化数据方面面临着独特的挑战，这些数据需要在快速、高风险的环境中处理。现代金融机构需要灵活且可扩展的数据平台，能够满足数据密集型交易操作的需求。有效的数据架构能够整合实时市场趋势、替代数据源、监管信息和客户档案，同时促进资本市场业务中各个职能之间的无缝连接。
- en: 'AI can address several financial services industry challenges, including the
    following:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可以解决金融服务业的几个挑战，包括以下内容：
- en: '**Risk management**: Improves resilience to market volatility through real-time
    monitoring, adaptive decision-making, and automated risk mitigation, thereby reducing
    human error.'
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险管理**：通过实时监控、适应性决策和自动化风险缓解来提高对市场波动的抗性，从而减少人为错误。'
- en: '**Data analytics**: Enhances data processing by seamlessly ingesting unstructured
    inputs such as news sentiment and social media data, harnessing GenAI and RAG
    solutions for deeper analytics and more precise insights.'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据分析**：通过无缝摄取非结构化输入，如新闻情绪和社交媒体数据，利用生成式人工智能（GenAI）和RAG解决方案进行更深入的分析和更精确的见解来增强数据处理。'
- en: '**Regulatory compliance**: Streamlines operations by automating reporting,
    detecting anomalies, preventing fraud, and improving auditability.'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规监管**：通过自动化报告、检测异常、预防欺诈和提升可审计性来简化运营。'
- en: '**Customer service**: Improves human-AI collaboration to optimize customer
    service with AI assistants, while automating workflows to make financial institutions
    more agile, responsive, and cost-efficient.'
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户服务**：通过人工智能助手优化客户服务，改善人机协作，同时自动化工作流程，使金融机构更加敏捷、响应迅速且成本效益高。'
- en: Modern data platforms with robust high-performance data ingestion, real-time
    analytics, advanced security, and support for time-series data strengthen financial
    services organizations’ ability to unlock actionable insights and drive smarter
    decision-making. AI capabilities and Vector Search technologies enable capital
    markets to adapt to evolving market conditions, changes in regulatory requirements,
    and client needs. Whether it’s transforming market data management, enhancing
    trading strategies, optimizing risk management, or streamlining compliance reporting,
    the right data architecture provides the agility to innovate and excel in a rapidly
    changing financial services landscape.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 具有强大高性能数据摄取、实时分析、高级安全和支持时间序列数据功能的现代数据平台，增强了金融服务组织解锁可操作见解和推动更明智决策的能力。人工智能能力和向量搜索技术使资本市场能够适应不断变化的市场条件、监管要求变化和客户需求。无论是转型市场数据管理、增强交易策略、优化风险管理还是简化合规报告，合适的数据架构提供了在快速变化的金融服务领域中创新和卓越的灵活性。
- en: Reimagining investment portfolio management with agentic AI
  id: totrans-278
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用代理人工智能重新构想投资组合管理
- en: Risk management in capital markets is becoming increasingly complex and data-driven,
    presenting significant challenges for investment portfolio managers. The need
    to process vast amounts of diverse data, from real-time market data to unstructured
    social media data, demands a level of flexibility and scalability that traditional
    systems struggle to keep up with.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 资本市场的风险管理正变得越来越复杂和以数据驱动，这对投资组合经理提出了重大挑战。从实时市场数据到非结构化社交媒体数据的大量多样化数据处理需求，要求具备传统系统难以跟上水平的灵活性和可扩展性。
- en: AI agents, a type of AI that can operate autonomously and take actions based
    on goals and real-world interactions, are set to transform how investment portfolios
    are managed [2]. According to Gartner, 33% of enterprise software applications
    will include agentic AI by 2028, up from less than 1% in 2024\. At least 15% of
    day-to-day work decisions are made autonomously through AI agents [3]. The right
    data architecture can support these AI agents to effectively transform the landscape
    of investment portfolio management. By leveraging the combination of LLMs, RAG,
    and advanced Vector Search capabilities, AI agents can analyze vast financial
    datasets, detect patterns, and adapt in real time to changing conditions dynamically.
    This advanced intelligence elevates decision-making and empowers portfolio managers
    to enhance portfolio performance, manage market risks more effectively, and perform
    precise assets impact analysis.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理，一种可以自主操作并根据目标和现实世界交互采取行动的AI类型，预计将改变投资组合的管理方式[2]。根据Gartner的预测，到2028年，将有33%的企业级软件应用包含代理AI，而到2024年这一比例将低于1%。至少有15%的日常工作决策是通过AI代理自主做出的[3]。合适的数据架构可以支持这些AI代理有效地改变投资组合管理的格局。通过利用LLM、RAG和高级向量搜索能力的组合，AI代理可以分析庞大的金融数据集，检测模式，并实时动态地适应变化条件。这种高级智能提升了决策水平，并赋予投资组合经理增强投资组合表现、更有效地管理市场风险和执行精确的资产影响分析的能力。
- en: Intelligent investment portfolio management
  id: totrans-281
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能投资组合管理
- en: Investment portfolio management is the process of selecting, balancing, and
    monitoring a mix of financial assets such as stocks, bonds, commodities, and derivatives
    to achieve a higher **return on investment** (**ROI**) while managing risk effectively
    and proactively. It involves thoughtful asset allocation, diversification to mitigate
    market volatility, continuous monitoring of market conditions, and the performance
    of underlying assets to stay aligned with investment objectives.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 投资组合管理是选择、平衡和监控股票、债券、商品和衍生品等金融资产组合的过程，以在有效且主动地管理风险的同时实现更高的**投资回报率**（**ROI**）。它涉及深思熟虑的资产配置、多元化以减轻市场波动、持续监控市场状况和底层资产的表现，以保持与投资目标的一致性。
- en: To stay relevant today, investment portfolio management requires the integration
    of diverse, unstructured alternative data, such as financial news, social media
    sentiment, and macroeconomic indicators, alongside structured market data such
    as price movements, trading volumes, indexes, spreads, and historical execution
    records. This complex data integration presents a new level of sophistication
    in portfolio analytics, as outlined in *Figure 11.10*. It requires a flexible,
    scalable, unified data platform that can efficiently store, retrieve, and manage
    such diverse datasets, and pave the way for building next-gen portfolio management
    solutions.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持相关性，投资组合管理需要整合多样化的非结构化替代数据，如金融新闻、社交媒体情绪和宏观经济指标，以及结构化的市场数据，如价格变动、成交量、指数、价差和历史执行记录。这种复杂的数据集成在投资组合分析中呈现出新的复杂程度，如*图11.10*所示。它需要一个灵活、可扩展、统一的数据平台，能够高效地存储、检索和管理这些多样化的数据集，并为构建下一代投资组合管理解决方案铺平道路。
- en: '![](img/B34136_11_10.png)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_11_10.png)'
- en: 'Figure 11.10: Investment portfolio analysis'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.10：投资组合分析
- en: This diagram illustrates the comprehensive architecture of modern investment
    portfolio analysis systems, showing how the central analytics engine integrates
    diverse data inputs including trading data (historical trades, orders, and best
    execution metrics), market data (prices, volumes, indexes, yields, ratings, order
    book data, volatility, and spreads), and unstructured macroeconomic data from
    multiple formats (image, text, video, and audio) to deliver core portfolio management
    functions, including risk management, recommendation generation, optimization,
    reallocation, and back-testing capabilities that enable intelligent decision-making
    and proactive market risk mitigation through MongoDB’s flexible schema for accelerated
    data ingestion across various sources.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了现代投资组合分析系统的综合架构，展示了中心分析引擎如何整合多样化的数据输入，包括交易数据（历史交易、订单和最佳执行指标）、市场数据（价格、成交量、指数、收益率、评级、订单簿数据、波动性和价差），以及来自多种格式的非结构化宏观经济数据（图像、文本、视频和音频），以提供核心的投资组合管理功能，包括风险管理、推荐生成、优化、再分配和回测能力，这些能力通过MongoDB灵活的模式加速跨各种来源的数据摄取，从而实现智能决策和主动的市场风险缓解。
- en: Incorporating MongoDB’s flexible schema accelerates data ingestion across various
    data sources, such as real-time market feeds, historical performance records,
    and risk metrics. New portfolio management solutions, enabled with the alternative
    data, support more intelligent decision-making and proactive market risk mitigation.
    This paradigm shift realizes deeper insights, enhances alpha generation, and refines
    asset reallocation with greater precision, underscoring the critical role of data
    in intelligent portfolio management.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 通过MongoDB的灵活模式加速跨各种数据源的数据摄取，如实时市场流、历史表现记录和风险指标。新的投资组合管理解决方案，通过替代数据启用，支持更智能的决策和主动的市场风险缓解。这种范式转变实现了更深入的洞察，增强了alpha生成，并提高了资产再分配的精确度，强调了数据在智能投资组合管理中的关键作用。
- en: How MongoDB unlocks AI-powered portfolio management
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MongoDB如何解锁人工智能驱动的投资组合管理
- en: AI-powered portfolio asset allocation has become a desirable characteristic
    of modern investment strategies. By leveraging AI-based portfolio analysis, portfolio
    managers gain access to advanced tools that provide insights tailored to specific
    financial objectives and risk tolerances. This approach optimizes portfolio construction
    by recommending an alternate mix of assets ranging from equities and bonds to
    **Exchange Traded Funds (ETF’s**) and emerging opportunities while continuously
    assessing the evolving market conditions.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能驱动的投资组合资产配置已成为现代投资策略的一个理想特性。通过利用基于人工智能的投资组合分析，投资组合经理可以获取到提供针对特定财务目标和风险承受能力的洞察力的先进工具。这种方法通过推荐从股票和债券到**交易所交易基金（ETFs**）和新兴机会的替代资产组合来优化投资组合构建，同时持续评估不断变化的市场条件。
- en: 'The following figure illustrates a proposed workflow for AI-powered investment
    portfolio management that brings diverse market data, including stock price, **volatility
    index** (**VIX**), and macroeconomic inductors such as GDP, interest rate, and
    unemployment rate, into an AI analysis layer to generate actionable and more intelligent
    insights:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了人工智能驱动的投资组合管理流程，该流程将包括股价、**波动率指数（VIX**）和宏观经济指标（如GDP、利率和失业率）在内的多样化市场数据引入人工智能分析层，以生成可操作且更智能的洞察：
- en: '![](img/B34136_11_11.png)'
  id: totrans-291
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_11_11.png)'
- en: 'Figure 11.11: AI-powered portfolio management workflow'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.11：人工智能驱动的投资组合管理流程
- en: This diagram illustrates the end-to-end architecture of AI-powered investment
    portfolio management systems. It shows a three-stage workflow that starts with
    processing data ingestion from market events (such as GDP, interest rates, unemployment,
    news, and social media through APIs, connectors, and triggers) and market data,
    such as stock prices, VIX, ETF, bonds, and commodity data via stream processing
    and time-series collection. It then feeds into centralized AI and analytics capabilities
    (such as portfolio risk analysis, market impact analysis, sentiment analysis,
    macroeconomics, and volatility analysis using aggregation, Vector Search, embedding,
    and analytics). Finally, it delivers actionable insights through AI assistants
    (such as answering portfolio manager questions via prompts and queries) and comprehensive
    reporting (explanations and recommendations through Atlas Charts and reports)
    to enable intelligent, data-driven investment decision-making for portfolio managers.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了人工智能驱动的投资组合管理系统端到端架构。它显示了三个阶段的流程，从处理来自市场事件（如GDP、利率、失业、新闻和社交媒体）的数据摄取和市场数据（如股价、VIX、ETF、债券和商品数据）开始，通过流处理和时间序列收集。然后，它输入到集中的AI和数据分析能力（如使用聚合、向量搜索、嵌入和数据分析进行的投资组合风险分析、市场影响分析、情绪分析、宏观经济分析和波动率分析）。最后，通过AI助手（如通过提示和查询回答投资组合经理的问题）和全面报告（通过Atlas图表和报告的解释和建议）提供可操作的洞察，以实现投资组合经理的智能、数据驱动的投资决策。
- en: MongoDB’s versatile document modelunlocks a more intuitive way for the storage
    and retrieval of structured, semi-structured, and unstructured data. This is aligned
    with the way developers structure the objects inside the applications.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB的多功能文档模型为存储和检索结构化、半结构化和非结构化数据提供了一种更直观的方式。这与开发者构建应用程序内部对象的方式相一致。
- en: In capital markets, time series are often used to store time-based trading data
    and market data. MongoDB time-series collections are optimal for analyzing data
    over time. They are designed to efficiently ingest large volumes of market data
    with high performance and dynamic scalability. Discovering insights and patterns
    from MongoDB time-series collections is easier and more efficient due to faster
    underlying ingestion and retrieval mechanisms.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 在资本市场中，时间序列通常用于存储基于时间的交易数据和市场数据。MongoDB 时间序列集合非常适合分析随时间变化的数据。它们设计用于高效地以高性能和动态可伸缩性摄取大量市场数据。由于底层摄取和检索机制的快速，从
    MongoDB 时间序列集合中发现洞察力和模式更加容易和高效。
- en: By taking advantage of MongoDB Atlas Charts’ business intelligence dashboard
    and evaluating advanced AI-generated investment insights, portfolio managers gain
    access to sophisticated capabilities that integrate high-dimensional insights
    derived from diverse datasets, revealing new patterns that can lead to enhanced
    decision-making for alpha generation and higher portfolio performance.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用 MongoDB Atlas Charts 的商业智能仪表板和评估高级 AI 生成的投资洞察力，投资组合经理可以访问集成来自不同数据集的高维洞察力的复杂功能，揭示可能导致增强决策、alpha
    生成和更高投资组合绩效的新模式。
- en: 'MongoDB Atlas Vector Search plays a critical role in the analysis of market
    news sentiment by enabling the context-aware retrieval of related news articles.
    Traditional keyword-based searches often fail to capture semantic relationships
    between news stories, while Vector Search, powered by embeddings, allows for a
    more contextual understanding of how different articles relate to a stock sentiment.
    The following capabilities power a more context-aware and accurate approach to
    market news sentiment analysis:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB Atlas 向量搜索在市场新闻情感分析中发挥着关键作用，通过启用相关新闻文章的上下文感知检索。传统的基于关键词的搜索往往无法捕捉新闻故事之间的语义关系，而由嵌入模型驱动的向量搜索允许对不同文章如何与股票情感相关联有更语境化的理解。以下能力为市场新闻情感分析提供了一种更上下文感知和准确的方法：
- en: '**Storing news as vectors**: When stock-related news is ingested, each news
    article is vectorized as a high-dimensional numerical representation using an
    embedding model. These embeddings encapsulate the meaning and context of the text,
    rather than just individual words. The raw news articles are embedded and stored
    in MongoDB as vectors.'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将新闻存储为向量**：当摄取与股票相关的新闻时，每篇新闻文章都使用嵌入模型将其矢量化为一个高维数值表示。这些嵌入封装了文本的意义和上下文，而不仅仅是单个单词。原始新闻文章被嵌入并存储在
    MongoDB 中作为向量。'
- en: '**Finding related news**: Vector Search is used to find news articles based
    on similarity algorithms, even if they don’t contain the exact same stock information.
    This helps in identifying patterns and trends across multiple news articles based
    on contextual similarity.'
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查找相关新闻**：向量搜索用于根据相似性算法查找新闻文章，即使它们不包含完全相同的股票信息。这有助于根据上下文相似性在多篇文章中识别模式和趋势。'
- en: '**Enhancing sentiment calculation**: Instead of relying on a single news sentiment,
    a final sentiment score is aggregated from multiple related news articles with
    similar and relevant content. This prevents one individual outlier news article
    from influencing the result and provides a more holistic view of market news sentiment.'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强情感计算**：不是依赖于单一的新闻情感，而是从多个相关新闻文章中聚合最终的情感得分，这些文章具有相似和相关的内容。这防止了单个异常新闻文章影响结果，并提供了对市场新闻情感的更全面视角。'
- en: MongoDB Atlas Vector Search transforms market news sentiment analysis by going
    beyond simple keywords to capture deeper context and connections, empowering smarter,
    more reliable insights for better investment decisions.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB Atlas 向量搜索通过超越简单的关键词，捕捉更深层次的上下文和关联，从而将市场新闻情感分析提升到新的高度，为更明智、更可靠的洞察力提供支持，以做出更好的投资决策。
- en: Intelligent investment portfolio management with AI agents
  id: totrans-302
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能投资组合管理，配备 AI 代理
- en: AI agents are positioned to revolutionize portfolio management by shifting from
    rule-based to adaptive, context-aware, and AI-powered decision-making. AI-enabled
    portfolio management applications continuously learn, adapt, and optimize investment
    strategies more proactively and effectively. The future isn’t about AI replacing
    portfolio managers, but rather humans and AI working together to create more intelligent,
    adaptive, and risk-aware portfolios. Portfolio managers who leverage AI gain a
    competitive edge and deeper insights to significantly enhance portfolio performance.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理旨在通过从基于规则的决策转向自适应、情境感知和AI驱动的决策来革新投资组合管理。AI赋能的投资组合管理应用持续学习、适应和更主动、更有效地优化投资策略。未来不是AI取代投资组合经理，而是人类与AI合作，创建更智能、自适应和风险意识强的投资组合。利用AI的投资组合经理将获得竞争优势和更深入的见解，从而显著提升投资组合表现。
- en: The solution illustrated in *Figure 11.12* includes a data ingestion application,
    three AI agents, and a market insight application that work in harmony to create
    a more intelligent, insights-driven approach to portfolio management.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图11.12*中展示的解决方案包括一个数据摄取应用、三个AI代理和一个市场洞察应用，它们协同工作，为投资组合管理创造一个更智能、以洞察力驱动的途径。
- en: 'The data ingestion app continuously collects market data, storing it in MongoDB
    as time series or standard collections. The datasets ingested include the following:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 数据摄取应用持续收集市场数据，将其作为时间序列或标准集合存储在MongoDB中。摄取的数据集包括以下内容：
- en: '**Market data**: Collects and processes real-time market data, including prices,
    volumes, trade activity, and VIX'
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场数据**：收集和处理实时市场数据，包括价格、成交量、交易活动和VIX'
- en: '**Market news**: Captures and extracts market and stock-related news. News
    data is vectorized and stored in MongoDB'
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场新闻**：捕捉和提取与市场和股票相关的新闻。新闻数据被矢量化并存储在MongoDB中'
- en: '**Market indicators**: Retrieves key macroeconomic financial indicators, such
    as GDP, interest rate, and unemployment rate'
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场指标**：检索关键宏观经济金融指标，如GDP、利率和失业率'
- en: The market analysis agent and market news agent have AI analytical workflows.
    They run based on a daily schedule in a fully automated fashion, producing the
    expected output and storing it in MongoDB. The market assistant agent has a more
    dynamic workflow and is designed to play the role of assistant to the portfolio
    manager. It works based on prompt engineering and agentic decision-making. The
    market assistant agent is capable of responding to questions about asset reallocation
    and market risks based on current market conditions and brings the new AI-powered
    insights to portfolio managers.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 市场分析代理和市场新闻代理具有AI分析工作流程。它们根据每日日程以完全自动化的方式运行，生成预期的输出并将其存储在MongoDB中。市场助理代理具有更动态的工作流程，旨在扮演投资组合经理的助手角色。它基于提示工程和代理决策工作。市场助理代理能够根据当前市场条件回答关于资产再分配和市场风险的问题，并将新的AI驱动的见解带给投资组合经理。
- en: 'Each agent plays a distinct role in the overall workflow to produce intelligent
    insights:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 每个代理在整体工作流程中扮演着独特的角色，以产生智能见解：
- en: '**Market analysis agent**: Analyzes market trends, volatility, and patterns
    to generate insights related to the risk of portfolio assets'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场分析代理**：分析市场趋势、波动性和模式，以生成与投资组合资产风险相关的见解'
- en: '**Market news agent**: Assesses the news sentiment for each of the assets by
    analyzing news that directly and indirectly can impact the portfolio performance.
    This agent is empowered by MongoDB Vector Search'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场新闻代理**：通过分析直接影响和间接影响投资组合表现的新闻，评估每个资产的新闻情绪。此代理由MongoDB矢量搜索赋能'
- en: '**Market assistant agent**: On demand and through a prompt, answers the portfolio
    manager’s questions about market trends, risk exposure, and portfolio allocation
    by using data sources and insights that other agents create'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场助理代理**：根据需求和使用其他代理创建的数据和见解，通过提示回答投资组合经理关于市场趋势、风险敞口和投资组合配置的问题'
- en: The market insight application is a visualization layer that provides charts,
    dashboards, and reports for portfolio managers, with a series of actionable investment
    insights from the outputs created by AI agents. This information is generated
    based on a predetermined daily schedule automatically and presented to portfolio
    managers.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 市场洞察应用是一个可视化层，为投资组合经理提供图表、仪表板和报告，其中包括由AI代理生成的系列可操作投资见解。这些信息基于预定的每日日程自动生成，并呈现给投资组合经理。
- en: '![](img/B34136_11_12.png)Figure 11.12: Investment portfolio management powered
    by MongoDB AI agents'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: '![图11.12：由MongoDB人工智能代理驱动的投资组合管理](img/B34136_11_12.png)'
- en: As illustrated here, the investment portfolio management is powered by MongoDB
    AI agents, showing how specialized AI agents (market analysis agent, market assistant
    agent, and market news agent) leverage LLM and graph orchestration capabilities
    to process data from the data ingestion application (market data, news, and indicators)
    through MongoDB’s Vector Search functionality, enabling seamless integration with
    the market insight application (charts, dashboards, and reports) to deliver intelligent,
    prompt-driven responses to investment portfolio managers through a unified AI-powered
    ecosystem that combines real-time data processing, advanced analytics, and conversational
    interfaces for enhanced investment decision-making.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 如此所示，投资组合管理是由MongoDB人工智能代理驱动的，展示了如何通过专门的AI代理（市场分析代理、市场助手代理和市场新闻代理）利用LLM和图编排能力处理来自数据摄取应用（市场数据、新闻和指标）的数据，通过MongoDB的向量搜索功能，实现与市场洞察应用（图表、仪表板和报告）的无缝集成，通过一个结合实时数据处理、高级分析和对话界面的统一人工智能生态系统，为投资组合经理提供智能、即时驱动的响应，以增强投资决策。
- en: '![](img/B34136_11_13.png)'
  id: totrans-317
  prefs: []
  type: TYPE_IMG
  zh: '![图11.13](img/B34136_11_13.png)'
- en: 'Figure 11.13: Market assistant ReAct agent architecture'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.13：市场助手ReAct代理架构
- en: AI agents enable portfolio managers to take an intelligent and risk-based approach
    by analyzing the impact of market conditions on the portfolio and its investment
    goals. The AI agents capitalize on MongoDB’s powerful capabilities, including
    the aggregation framework and Vector Search, combined with embedding and GenAI
    models to perform intelligent analysis and deliver insightful portfolio recommendations.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代理使投资组合经理能够通过分析市场条件对投资组合及其投资目标的影响，采取智能和基于风险的方法。人工智能代理利用MongoDB强大的功能，包括聚合框架和向量搜索，结合嵌入和生成式AI模型，进行智能分析和提供有洞察力的投资组合推荐。
- en: For more details on AI agents, see [*Chapter 2*](02.xhtml#_idTextAnchor028),
    *What Sets GenAI*, *RAG*, *and Agentic AI Apart*.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于人工智能代理的详细信息，请参阅[*第2章*](02.xhtml#_idTextAnchor028)，*什么是生成式AI、RAG和代理式AI的区别*。
- en: The expanding role of AI in financial services
  id: totrans-321
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能在金融服务中的扩展作用
- en: As we close this section, it’s clear that AI is a powerful force reshaping the
    future of financial services, and MongoDB is enabling the AI transformation journey.
    AI success is a function of the right data architecture, scalability, quality,
    accessibility, and agility. MongoDB’s flexible document model, Vector Search,
    and comprehensive developer data platform provide the backbone for AI applications.
    The AI shift from experimentation to enterprise adoption requires a strategic
    rethink of how data, models, and decisions flow through the organization. Whether
    you’re driving innovation, managing risk, or building next-generation customer
    experiences, the financial institutions that lead over the next decade won’t just
    adopt AI; they will embed it into every decision, every product, and every client
    interaction.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束本节时，很明显，人工智能是一个强大的力量，正在重塑金融服务的前景，MongoDB正在推动人工智能转型之旅。人工智能的成功是正确数据架构、可扩展性、质量、可访问性和敏捷性的函数。MongoDB灵活的文档模型、向量搜索和全面的开发者数据平台为人工智能应用提供了基础。从实验到企业采用的人工智能转变需要战略性地重新思考数据、模型和决策如何在组织中流动。无论你是推动创新、管理风险还是构建下一代客户体验，未来十年领先的金融机构不仅会采用人工智能；它们会将人工智能嵌入到每一个决策、每一个产品和每一次客户互动中。
- en: With the rise of agentic AI, financial services institutions have great potential
    to redefine how to manage risk more intelligently, optimize complex workflows,
    and deliver hyper-personalized client experiences. As autonomous AI agents advance,
    they offer the potential to transform decision-making from reactive to proactive,
    combined with reasoning and actions, moving beyond merely a data response into
    a deeper understanding of cause and effect, empowering financial institutions
    with greater precision and smarter solutions. As we look ahead, those who effectively
    harness the potential of AI will be best positioned to lead in this rapidly evolving
    financial services landscape, setting a new standard for agility, innovation,
    and customer trust.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 随着代理人工智能的兴起，金融服务机构有巨大的潜力重新定义如何更智能地管理风险、优化复杂的工作流程，并交付高度个性化的客户体验。随着自主人工智能代理的进步，它们提供了将决策从被动转变为主动、结合推理和行动的潜力，超越了仅仅是对数据的响应，进入对因果关系更深入的理解，赋予金融机构更高的精度和更智能的解决方案。展望未来，那些有效利用人工智能潜力的人将处于领先地位，引领快速发展的金融服务领域，设定新的敏捷性、创新和客户信任标准。
- en: 'The following are additional examples of how AI is transforming financial services:'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些人工智能如何改变金融服务领域的额外示例：
- en: '**Advanced customer behavior and KYC analytics**: Vector Search enables sophisticated
    customer profiling by correlating behavioral patterns with unstructured data sources,
    including emails, social media activity, and transaction narratives. This provides
    deeper insights into customer risk profiles and enables more accurate identity
    verification processes.'
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级客户行为和KYC分析**：向量搜索通过将行为模式与包括电子邮件、社交媒体活动和交易叙述在内的非结构化数据源相关联，实现复杂的客户画像。这提供了对客户风险配置文件的更深入见解，并使身份验证过程更加准确。'
- en: '**Intelligent market research**: AI systems can rapidly synthesize market intelligence
    by searching across vast repositories of research reports, earnings calls, regulatory
    filings, and news sources. Semantic similarity enables analysts to discover non-obvious
    connections and emerging trends across different market segments and geographies.'
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能市场研究**：人工智能系统可以通过搜索大量的研究报告、收益电话、监管文件和新闻来源，快速综合市场情报。语义相似性使分析师能够在不同的市场细分和地理区域发现非显而易见的联系和新兴趋势。'
- en: '**Large document intelligence for regulatory filings**: AI-powered document
    processing transforms how financial institutions handle complex regulatory submissions.
    Systems can automatically extract, validate, and cross-reference data across hundreds
    of pages of regulatory documents, ensuring compliance while reducing manual review
    time from weeks to hours.'
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大型文档智能用于监管文件**：人工智能驱动的文档处理改变了金融机构处理复杂监管提交的方式。系统可以自动提取、验证和交叉引用数百页监管文件中的数据，确保合规性，同时将手动审查时间从数周缩短至数小时。'
- en: '**AI-powered financial application code generation**: Development teams leverage
    AI to accelerate the creation of financial applications by generating compliant
    code snippets, API integrations, and regulatory validation logic. This enables
    the faster deployment of new financial products while maintaining strict security
    and compliance standards.'
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能驱动的金融应用程序代码生成**：开发团队利用人工智能通过生成符合规定的代码片段、API集成和监管验证逻辑来加速金融应用程序的创建。这使新金融产品的部署更加迅速，同时保持严格的安全和合规标准。'
- en: '**Retail banking dynamic product pricing**: AI-powered real-time pricing enables
    banks to instantly adjust fees and rebates based on market conditions, service
    costs, and customer behavior. By analyzing live data, AI can optimize pricing
    for competitiveness, profitability, and responsiveness, ensuring agility in dynamic
    payment environments.'
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零售银行业务动态产品定价**：通过人工智能驱动的实时定价，银行能够根据市场条件、服务成本和客户行为即时调整费用和返利。通过分析实时数据，人工智能可以优化定价以增强竞争力、盈利性和响应速度，确保在动态支付环境中保持灵活性。'
- en: '**Treasury liquidity and cash flow forecasting**: Dynamic cash positioning
    using AI-enabled dashboards provides real-time cash flow visibility and prediction.
    By leveraging AI in scenario analysis and modeling various economic conditions,
    banks can proactively adjust funding strategies.'
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**财务流动性现金流预测**：使用人工智能驱动的仪表板进行动态现金流定位，提供实时现金流可见性和预测。通过在情景分析和建模各种经济条件时利用人工智能，银行可以主动调整资金策略。'
- en: '**Payment smart routing**: AI-enabled payment smart routing leverages dynamic
    decision-making and continuous learning to intelligently optimize every transaction
    in real time. AI analyzes several conditions, fees, exchange rates, and historical
    patterns to proactively select the most efficient and cost-effective routes. As
    payment ecosystems become more complex and global, smarter AI-driven routing is
    essential to navigate shifting regulations, rising transaction volumes, and increasing
    demand for speed, cost efficiency, and reliability.'
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支付智能路由**：人工智能驱动的支付智能路由利用动态决策和持续学习，实时智能优化每一笔交易。人工智能分析多个条件、费用、汇率和历史模式，主动选择最有效和成本效益最高的路线。随着支付生态系统变得更加复杂和全球化，更智能的人工智能驱动路由对于应对不断变化的法规、不断增长的交易量以及日益增长的对速度、成本效率和可靠性的需求至关重要。'
- en: These emerging applications demonstrate how AI continues to push the boundaries
    of what’s possible in financial services, enabling institutions to operate with
    greater intelligence, efficiency, and customer focus than ever before.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 这些新兴应用展示了人工智能如何持续推动金融服务领域的可能性边界，使机构能够以前所未有的智能、效率和客户关注度进行运营。
- en: 'For more information and resources, visit the *MongoDB for Financial Services*
    page at: [https://www.mongodb.com/solutions/industries/financial-services](https://www.mongodb.com/solutions/industries/financial-services).'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 如需更多信息及资源，请访问[https://www.mongodb.com/solutions/industries/financial-services](https://www.mongodb.com/solutions/industries/financial-services)上的*MongoDB
    for Financial Services*页面。
- en: Summary
  id: totrans-334
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we’ve explored the transformative impact of AI on the financial
    services industry, tracing its evolution from predictive analytics to GenAI and
    now to agentic AI. We’ve seen how these technologies are revolutionizing EKM,
    customer experiences, fincrime prevention, ESG analysis, credit applications,
    and payments processing.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了人工智能对金融服务行业的变革性影响，追溯了其从预测分析到生成式人工智能，再到代理式人工智能的演变。我们看到了这些技术如何正在革命性地改变企业知识管理、客户体验、金融犯罪预防、ESG分析、信贷申请和支付处理。
- en: The financial services industry stands at a pivotal moment where AI is not just
    enhancing existing processes but fundamentally reimagining how financial institutions
    operate and deliver value. From intelligent chatbots that provide personalized
    customer support to sophisticated fraud detection systems that can anticipate
    new attack vectors, AI is enabling unprecedented levels of efficiency, personalization,
    and security.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 金融服务行业正处于一个关键时刻，人工智能不仅正在增强现有流程，而且从根本上重新构想了金融机构的运营和价值交付方式。从提供个性化客户支持的人工智能聊天机器人到能够预测新攻击向量的复杂欺诈检测系统，人工智能正在实现前所未有的效率、个性化和安全性。
- en: Looking ahead, the continued evolution of agentic AI promises even more profound
    changes, with autonomous systems that can perceive, reason, and act within defined
    parameters. These intelligent agents will increasingly serve as digital relationship
    managers, virtual compliance officers, and automated risk analysts, working alongside
    human experts to drive better outcomes for financial institutions and their customers.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，代理式人工智能的持续发展预示着更加深刻的变化，具有感知、推理和在一定参数内行动的自主系统。这些智能代理将越来越多地作为数字关系经理、虚拟合规官员和自动化风险分析师，与人类专家并肩工作，为金融机构及其客户创造更好的结果。
- en: Key to this transformation is the underlying data infrastructure. Modern, flexible
    data platforms such as MongoDB provide the foundation that AI systems need to
    access, analyze, and act on diverse data in real time. The integration of domain-specific
    intelligence, such as finance-specialized embedding models, further enhances the
    accuracy and relevance of AI applications in this highly regulated industry.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 这一转型的基础是底层数据基础设施。现代、灵活的数据平台，如MongoDB，为人工智能系统提供了访问、分析和实时采取行动的多样化数据的基础。将特定领域的智能，如金融专业嵌入模型，进一步提高了人工智能在此高度监管行业中的应用的准确性和相关性。
- en: As we’ve seen through various case studies, from Asia Bank’s GenAI chatbot to
    Ambee’s climate data platform to Base39’s credit analysis solution, financial
    institutions that embrace AI and build on robust data foundations are gaining
    significant competitive advantages. They’re able to make better decisions faster,
    provide more personalized customer experiences, and navigate complex regulatory
    landscapes with greater confidence.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们从各种案例研究中看到的，从亚洲银行的GenAI聊天机器人到Ambee的气候数据平台，再到Base39的信用分析解决方案，那些拥抱AI并建立在稳健数据基础上的金融机构正在获得显著的竞争优势。他们能够更快地做出更好的决策，提供更加个性化的客户体验，并更有信心地应对复杂的监管环境。
- en: As we move into the next chapter, on insurance, we’ll see how many of these
    same AI technologies and approaches are being applied to transform another critical
    sector of the financial services industry, with its own unique challenges and
    opportunities.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进入下一章，关于保险，我们将看到许多相同的AI技术和方法是如何应用于转变金融服务业的另一个关键领域，该领域具有其独特的挑战和机遇。
