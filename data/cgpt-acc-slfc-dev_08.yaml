  type: TYPE_NORMAL
  zh: 这段代码不安全，因为它有以下原因：
- en: It queries inside a loop, which means if the trigger processes multiple records
    simultaneously, you’ll hit the SOQL query limit quickly
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它在循环内查询，这意味着如果触发器同时处理多个记录，您将迅速达到SOQL查询限制
- en: It performs DML operations inside the loop, which again can quickly hit DML
    limits if you’re processing multiple records
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它在循环内执行DML操作，如果您正在处理多个记录，这可能会迅速达到DML限制
