- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Security, Compliance, and Risk Management
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 安全、合规性和风险管理
- en: DevOps often appears as **DevSecOps** to emphasize security, but any operational
    solution requires security. Building a platform focuses on delivering value, allowing
    others to develop, and securing from end to end. Platforms provide the opportunity
    to provide secure by default solutions with details like vulnerability tracking,
    software bill of materials, and patching solutions before software ever reaches
    the customer. Comprehensive security and risk management solutions also manage
    those who connect to platforms, especially in PaaS and SaaS solutions. To further
    expedite delivery, AI tools can influence security outcomes, prevent inevitable
    manual failures, and support full-spectrum risk solutions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: DevOps通常以**DevSecOps**的形式出现，以强调安全，但任何运营解决方案都需要安全。构建平台侧重于交付价值、允许他人开发并从端到端进行保护。平台提供了提供默认安全解决方案的机会，包括漏洞跟踪、软件物料清单和补丁解决方案，在软件到达客户之前。全面的网络安全和风险管理解决方案还管理连接到平台的人员，特别是在PaaS和SaaS解决方案中。为了进一步加快交付，AI工具可以影响安全结果，防止不可避免的手动失败，并支持全面的风险解决方案。
- en: The question regarding computers and software development frequently requires
    providing a secure offering. The most secure systems are those with no connections.
    However, while hardware in a vault may be virtually inaccessible, it also serves
    no purpose. Having functional and valuable software means having connections,
    and those links create risk. This chapter is not about pipelines or CI/CD but
    about making the platform to support those eventual actions.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 关于计算机和软件开发的问题通常需要提供一个安全的产品。最安全的系统是没有连接的系统。然而，虽然保险库中的硬件可能几乎无法访问，但它也没有任何用途。拥有功能性和有价值的软件意味着拥有连接，而这些链接创造了风险。本章不是关于管道或CI/CD，而是关于使平台支持这些最终行动。
- en: 'In this chapter, we return to security basics to create the basics for platforms
    as secure by default and manage any extraneous risk. The following topics are
    covered:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们回归到安全基础，以创建默认安全的基础平台并管理任何额外的风险。以下主题将得到涵盖：
- en: Designing a secure-by-default platform
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计默认安全平台
- en: Network management and security practices
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络管理和安全实践
- en: Leveraging AI for security enhancements
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用AI进行安全增强
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: There are no specific technical requirements for this section. A basic understanding
    of architectural concepts, security scanners, and **identity and access management**
    (**IDAM**) will be helpful.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本节没有具体的技术要求。对架构概念、安全扫描器和**身份和访问管理**（**IDAM**）的基本理解将有所帮助。
- en: Designing a secure-by-default platform
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设计默认安全平台
- en: Designing a secure platform starts with the idea that securing the platform
    considers internal and external threats. Security starts with two basic ideas,
    all security tools exist to either signal an alert that something is happening
    or guard against an event. Sometimes, one combines guarding and signaling in that
    there is an alert, and then the protection goes into place. The idea is similar
    to a bank vault receiving an alert and the big bars slamming across the vault
    area.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 设计默认安全平台始于这样一个想法：保护平台考虑了内部和外部威胁。安全始于两个基本思想，所有安全工具都存在是为了发出警报表明有事情发生或防止事件发生。有时，将保护和警报结合起来，即存在警报，然后保护措施就会实施。这个想法类似于银行保险库收到警报，然后大铁栅栏迅速关闭。
- en: This thought then becomes the platform ideation. Ideation, as a concept, considers
    further formulating a thought or idea. Everyone today seeks secure software development
    with DevSecOps and Agile practices all shifting left. Despite shifting left, security
    remains bolted on to processes rather than integral to delivery, and no exchange
    exists to moderate values between functional and secure within application development.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '这种想法随后成为平台构思。构思作为一个概念，考虑进一步形成思想或想法。今天，每个人都寻求使用DevSecOps和敏捷实践进行安全的软件开发，所有这些都在向左移动。尽管向左移动，但安全仍然被附加到流程中，而不是成为交付的一部分，并且没有交换来调节应用程序开发中功能和安全的价值观。 '
- en: Platforms integrate the idea that individuals experience security practices,
    move on to define guidelines for creating secure work, and then mix the two concepts
    to establish a platform as secure by default. When developing platform security,
    needed security functions are not bolted on but instead form initial core design.
    Program managers distinguish between *security* and *functionality* . Security
    are aspects adding to compliance, access, authorization, or regulatory requirements
    while function criteria are more tightly tied to what a program does. From the
    developer’s perspective, all functions are functions; they merely accomplish different
    ends. Shifting left as a security function appears in [*Chapter 1*](B24465_01.xhtml#_idTextAnchor015)
    as a basic concept of Platform Engineering
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 平台整合了个人体验安全实践的想法，然后转向定义创建安全工作的指南，最后将这两个概念结合起来，以建立一个默认安全的平台。在开发平台安全时，所需的安全功能不是附加的，而是形成初始核心设计。项目经理区分了*安全*和*功能*。安全是增加合规性、访问、授权或监管要求方面的方面，而功能标准则更紧密地与项目所做的工作相关。从开发者的角度来看，所有功能都是功能；它们只是完成不同的目标。作为安全功能，向左移动的概念在[*第一章*](B24465_01.xhtml#_idTextAnchor015)中作为平台工程的基本概念出现。
- en: The platform security model relies on functions featuring external observability,
    internal integration, and end-user implementation perspectives. Security scans
    and dashboards should be integral to executed processes without thinking about
    the task. The question should never be if the scan ran, but which scan was run
    and how the results were displayed. Just like with early architecture requirements,
    security begins with questions about *what to secure*, *how to secure it*, and
    then *is there security* (i.e., demonstrating that security exists). Asking these
    questions begins the meta-approach to integrate the platform’s multiple tasks
    into a common security framework. This common integration supports the software
    value chain. It is not enough to secure the initial login, one file within a framework,
    or a single vulnerability. Comprehensive platform security addresses all issues
    by creating the fence, adding a gate, and then putting bells on the swinging door.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 平台安全模型依赖于具有外部可观察性、内部集成和最终用户实施视角的功能。安全扫描和仪表板应该成为执行过程的一部分，而无需考虑任务。问题永远不应该是扫描是否运行，而是运行了哪个扫描以及结果是如何显示的。就像早期架构要求一样，安全始于关于*要保护什么*、*如何保护它*以及*是否存在安全*（即证明安全存在）的问题。提出这些问题开始将平台的多个任务整合到一个共同的安全框架中的元方法。这种共同集成支持软件价值链。仅仅保护初始登录、框架中的一个文件或单个漏洞是不够的。全面的平台安全通过建立围栏、增加一个门，然后在摆动的门上挂上铃铛来解决所有问题。
- en: All security practices should start as part of Agile software development. Above,
    we referenced developers see no difference between development, operational, and
    security functions. All items are simply a function with a specific set of results.
    When building a secure-by-default platform, part of the question should be how
    much security will be needed. Security experts will expound that more security
    is always needed, but sometimes the security resides in the basics or the Layer
    8 humans rather than integrating another tool. *Layer 8 humans* refers to the
    seven-layer OSI model with the humorous approach that humans interacting with
    the system are level 8.The first step in any value chain is to assess how value
    affects overall objectives to create profitable products and services. Security
    perspectives can shift radically depending on an individual’s perceptions about
    objectives. These shifts require a broad introduction to understand how thinking
    about security experiences clarifies understanding of platforms.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 所有安全实践都应作为敏捷软件开发的一部分开始。上面，我们提到开发者看不到开发、运营和安全功能之间的区别。所有项目都只是一个具有特定结果集的功能。当构建默认安全平台时，部分问题应该是需要多少安全。安全专家会详细说明总是需要更多的安全，但有时安全存在于基础或第8层人类，而不是集成另一个工具。"第8层人类"指的是七层OSI模型，以幽默的方式指出与系统交互的人类是第8层。任何价值链的第一步是评估价值如何影响整体目标，以创造有利可图的产品和服务的。安全观点可以根据个人对目标的看法发生根本性的变化。这些变化需要广泛的介绍，以了解思考安全体验如何阐明对平台的了解。
- en: Too much security can be as harmful as too little security, posing a risk to
    the number of users rather than active users. The wrong types of security, and
    adding dynamic tools to an internal database can add cost and slow performance.
    The inability to create observability within security tools might catch an issue
    but prevent resolution. The ideas behind security are as important as the actual
    implementation. These initial areas decompose into people, processes, and technology
    across the team, organization, and enterprise levels. Each offers solutions that
    affect platform outcomes.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 过度的安全措施可能和不足的安全措施一样有害，它对用户数量的风险而非活跃用户的风险构成威胁。错误类型的安全措施，以及将动态工具添加到内部数据库中可能会增加成本并降低性能。无法在安全工具中创建可观察性可能会捕捉到问题但阻止了解决。安全理念背后的思想与实际实施同样重要。这些初始领域在团队、组织和企业层面分解为人员、流程和技术。每个领域都提供了解决方案，这些方案会影响平台的结果。
- en: Basics of security ideation
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全理念基础
- en: Thinking about thinking is a meta-concept best understood by applying a phenomenological
    outlook. The concept of modern phenomenology, as a philosophical practice, originated
    with Descartes as a follow-on from the Socratic method. Phenomenology suggests
    that all aspects center on the thing itself. Things, in this case, security, are
    influenced by creation, observation, and experience to create a layered understanding.
    Creation for the platform occurs through shared development, observation from
    internal and external users, and the security experience as the platform combines
    functions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 思考思考是一个元概念，最好通过应用现象学视角来理解。现代现象学的概念，作为一种哲学实践，起源于笛卡尔，作为苏格拉底方法的后续。现象学表明，所有方面都集中在事物本身上。在这种情况下，事物（例如，安全）受到创造、观察和经验的影响，以形成层次化的理解。平台的创造通过共享开发，观察来自内部和外部用户，以及平台结合功能时的安全体验。
- en: Phenomenological thought suggests all experiences, and one’s experience of those
    things, including concepts, begins with the process observer. Only by understanding
    the observer’s perspective can one build understanding. The three core aspects
    of understanding are *the presence and absence of the thing*, *identity as manifold
    through the expression and expressed artifacts*, and *clarifying parts versus
    wholes during the experience*. Phenomenology does not create new understanding,
    rather it attempts to clarify the existing experience as understanding.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现象学思想表明，所有经验，以及一个人对这些事物的体验，包括概念，都始于过程观察者。只有通过理解观察者的视角，一个人才能建立理解。理解的三个核心方面是*事物的存在与缺失*，*通过表达和表达的艺术品表现出的多面性*，以及*在体验中澄清部分与整体*。现象学并不创造新的理解，而是试图澄清现有的体验作为理解。
- en: While esoteric, these terms readily apply to platform security. In presence
    and absence, one assesses how security relates between different elements within
    the collaboration or deployment targets. The root cause for identity in the experience
    reflects the need for **Single Sign On** (**SSO**), identity management tools,
    and the roles expressed as part of the **Role-based Access Controls** (**RBAC**)
    or **Attribute-based Access Controls** (**ABAC**) controls. The last element,
    parts versus wholes, is crucial in platform security. One can secure a single
    tool or multiple tools, to change platform levels within various applications.
    Think about a net of overlapping circles, each protecting a particular area, and
    requiring control elements when one passes across a line. *Figure 7**.1* shows
    how confusing those security perspectives might be when looking from a top level.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些术语可能有些晦涩，但它们很容易应用于平台安全。在存在与缺失方面，一个人评估安全如何在不同协作或部署目标内的不同元素之间相关联。在体验中身份的根本原因反映了**单点登录**（**SSO**）、身份管理工具以及作为**基于角色的访问控制**（**RBAC**）或**基于属性的访问控制**（**ABAC**）控制一部分所表达的角色需求。最后一个元素，部分与整体，在平台安全中至关重要。一个人可以保护单个工具或多个工具，以改变各种应用程序中的平台级别。想象一个重叠的圆圈网，每个圆圈保护一个特定区域，并在穿过一条线时需要控制元素。*图7.1*显示了从高级别看这些安全视角可能多么令人困惑。
- en: '![](img/B24465_07_01.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_07_01.jpg)'
- en: 'Figure 7.1 – Security control zones: Theoretical'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1 – 安全控制区域：理论
- en: Each circle represents a potentially different security consideration for a
    different area. Users tend to start with external access and move to internal,
    lateral accesses as moving across the environment. At the far end, customers also
    have external access to production elements. Starting from the left, the initial
    access zones need user and password security, the cluster needs identity and internal
    data protection, monitoring tools might need to be separated from the average
    developer, applications in deployment targets need container-level protection,
    and then monitoring and protection from the customers who use applications on
    the net. One common attack method, **SQL injection**, uses the capability to put
    certain characters into program inputs to affect program execution. One must block
    these areas while still allowing creation freedom across the platform. Understanding
    these areas requires knowing the conceptual security pattern for your platform.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 每个圆圈代表不同区域可能具有的不同安全考虑。用户通常从外部访问开始，然后移动到内部和横向访问，跨越环境。在远端，客户也有对生产元素的外部访问。从左侧开始，初始访问区域需要用户和密码安全，集群需要身份和内部数据保护，监控工具可能需要与普通开发者分离，部署目标中的应用程序需要容器级别的保护，然后是来自使用网络应用程序的客户进行的监控和保护。一种常见的攻击方法，**SQL注入**，利用将某些字符放入程序输入的能力来影响程序执行。必须在允许平台上的创建自由的同时阻止这些区域。理解这些区域需要了解您平台的概念安全模式。
- en: Expanding to conceptual security looks differently at true facts versus assumptions.
    Conceptual security relates to the experience of “the thing itself” by removing
    the outside observer’s perspective. Descartes used meditations on the thing to
    connect his faith to the physical. Another philosopher, Edmund Husserl, distinguished
    between material content and logical generality within the analyzed observations.
    It does not matter if the outside observer sees a fence or a moat as long as no
    castle access exists without using the approved gate. These distinctions carry
    over into building platform security by identifying what is known to be true,
    what should be true, and actions taken if the overall elements are false.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展到概念安全时，对真实事实与假设的看法有所不同。概念安全通过去除外部观察者的视角，与“事物本身”的经验相关联。笛卡尔通过关于事物的沉思将他的信仰与物理联系起来。另一位哲学家，埃德蒙·胡塞尔，在分析观察中区分了物质内容和逻辑普遍性。只要没有使用批准的入口，外部观察者看到的是栅栏还是护城河并不重要。这些区分在构建平台安全时得以延续，通过识别已知为真实的事物、应该为真实的事物以及当整体元素为假时采取的行动。
- en: 'Coding allows a much clearer distinction to define experienced artifacts than
    philosophy. We suggest these distinctions are valid when assessing security as
    few distinguish between security concepts and the material representation delivered
    by development. At a high level, one can quickly think about three common security
    distinctions: *compliance*, *technical guardrails*, and *vulnerabilities*. Each
    offers different construction, but the user experiences all as a secure by default
    platform.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 编码允许比哲学更清晰地定义经验性的工件。我们建议这些区分在评估安全时是有效的，因为很少有人能区分安全概念和开发提供的物质表示。在较高层次上，可以快速考虑三个常见的安全区分：*合规性*、*技术护栏*和*漏洞*。每个都提供不同的构建方式，但用户都将其体验为一个默认安全的平台。
- en: 'A common example starts with observing the physical rather than the more challenging
    conceptual understanding. Husserl used the term “eidetic” as essential, so eidetic
    reduction expands our understanding of the core concept. When one observes a table,
    it holds multiple physical and conceptual eidetic layers depending on observation.
    Depending on where one physically observes the table, it may be a rectangle, a
    rhombus, or even a triangle. Conceptually, a table can be a place to eat, meet,
    or hold things for later use. Some tables support gaming, puzzles or other purposes.
    The eidetic understanding might then be that the essence of a table is something
    to do with the capacity, whether intellectually or physically, that a table holds.
    The same applies to the security concept: every security artifact must guard or
    signal, and the challenge remains in creating effective, interlocking artifacts.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的例子是从观察物理现象开始，而不是更具挑战性的概念理解。胡塞尔使用“直观”一词作为基本概念，因此直观还原扩展了我们对核心概念的理解。当观察一张桌子时，它根据观察可能包含多个物理和概念上的直观层次。根据一个人在物理上观察桌子的位置，它可能是一个矩形、菱形，甚至三角形。从概念上讲，桌子可以是一个吃饭、会面或为以后使用保存物品的地方。一些桌子支持游戏、拼图或其他用途。直观理解可能就是桌子的本质与桌子所拥有的能力有关，无论是智力上的还是身体上的。同样的，对于安全概念：每个安全工具都必须保护或发出信号，挑战在于创造有效且相互关联的工具。
- en: Security for people, process, and technology
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人员、流程和技术安全
- en: 'For security, the eidetic ideation would be moving from the essential concrete
    object or idea to the pure essence derived by reducing the ideas to core components.
    This ideation applies when looking at security: does it appear as a comfort blanket
    to reduce risk, a process involving different individuals at different stages,
    or a technical solution to vulnerabilities and challenges? In a DevOps perspective,
    one adds observation layers, pipeline artifacts, and external interaction with
    customers, managers, and product owner. Each area functions as an individual part
    and an integrated whole through, describing outcomes with eidetic reduction, and
    demonstrating functionality.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于安全，直观理念是从基本的具体对象或理念转向通过减少到核心组件而得到的纯粹本质。这种理念在审视安全时适用：它是否看起来像一张减少风险的舒适毯，涉及不同阶段的个体，或者是一个解决漏洞和挑战的技术解决方案？在DevOps视角中，人们添加观察层、管道工具和与客户、经理和产品所有者的外部互动。每个区域作为一个单独的部分，通过直观还原描述结果，并展示功能，作为一个整体运作。
- en: Security ideation begins with people. One cannot experience, leaving out potential
    future AI options, without a person to describe the experience. Organizations
    all acquire people with roles, skills, and talents from multiple areas. An individual’s
    background creates their experiential lens, and those lenses influence security
    outcomes. Each individual creates value and an understanding of value through
    judging security based on an individual perspective.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 安全理念始于人。没有人的描述，就无法体验（不考虑未来可能的AI选项）。组织从多个领域招聘具有角色、技能和才能的人。个人的背景创造了他们的经验视角，这些视角影响安全结果。每个人通过根据个人视角判断安全来创造价值和对价值的理解。
- en: To return from the esoteric to the physical, companies often use **red-team
    assessments** to gauge security levels. A red team is a designated group of individuals
    who attempt to penetrate the security surrounding a platform, a system, or even
    a building. Many of these red teams start by requiring software implanted within
    the platform. Then, security areas that might prevent that item from working are
    disabled. However, this fundamentally changes the experience as that root item
    would not exist in the initial construct. This thought equates to testing only
    the front door while ignoring the yard’s fence, guard dog, and land mines.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 为了从深奥的理论回归到实际物理层面，公司通常使用**红队评估**来衡量安全级别。红队是一组被指定试图渗透平台、系统甚至建筑周围安全防护的个人。许多红队从要求在平台内植入软件开始。然后，会禁用可能阻止该物品正常工作的安全区域。然而，这从根本上改变了体验，因为那个根元素在初始构建中并不存在。这种想法等同于只测试前门，而忽略了院子的栅栏、看门狗和地雷。
- en: A developer might bring previous security experience with no development, work
    at a company that experienced multiple breaches, or endless hours chasing vulnerabilities.
    An Ops person might want to use security to reduce time on call, ease fixes, and
    minimize downtime. A product owner might want to sell more products and build
    a public image. The customer might want to know if their public data is protected.
    Each brings ideation, and an area is eidetically reduced to consider part and
    wholes, identity, and presence or absence before addressing other layers.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者可能带着没有开发经验的安全经验，在一个经历过多次安全漏洞的公司工作，或者花费无数小时追逐漏洞。运维人员可能希望通过安全措施减少待命时间，简化修复，并最小化停机时间。产品负责人可能希望销售更多产品并建立公众形象。客户可能想知道他们的公共数据是否受到保护。每个人都带来了想法，一个领域被细致地缩小以考虑部分和整体、身份和存在与否，在解决其他层次之前。
- en: Ideation can be a singular event or the sum of the entire process. The process
    integrates individual pieces to accomplish end goals. The process takes multiple
    tasks, creates artifacts representing each, and constructs an understanding about
    how guarding and signaling must occur. The presence or absence of those artifacts
    defines how they experience the overall task. The expressed identity reflects
    whether a security scan happened, did the scan was complete, and how patching
    contributes to the experience.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 思想可以是一个单一事件，也可以是整个过程的总和。过程将各个部分整合起来以实现最终目标。过程将多个任务整合起来，为每个任务创建代表其的工件，并构建关于如何进行保护和信号传递的理解。这些工件的存在与否定义了它们如何体验整体任务。所表达的身份反映了是否进行了安全扫描、扫描是否完成以及补丁如何影响体验。
- en: Further, one must consider whether the security process constitutes a whole
    experience or merely the parts of the process creating the whole element. In the
    platform, the security experience should be an integrated part of the whole. Processes
    can be accelerated or derailed due to the presence of people and technology within
    the individual elements.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，必须考虑安全过程是否构成一个整体体验，或者仅仅是构成整体元素的过程的一部分。在平台上，安全体验应该是整体的一部分。由于个人元素中存在人和技术，流程可能会加速或脱轨。
- en: The final assessed element, in today’s cybersecurity environment, must be the
    technology to either develop processes or augment people. Technology contains
    material elements but remains vital to the platform experience. Specific security
    requirements across on-premise, cloud, or mobile systems can change an individual’s
    interaction with those elements. Later elements within this chapter focus on the
    technical pieces implemented with the understanding that people and processes
    can all change the technology. For example, if one leaves their keys hanging in
    the lock, how secure the door may be never matters.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天的网络安全环境中，最终评估的元素必须是技术，无论是开发流程还是增强人员。技术包含物质元素，但对平台体验至关重要。在本地、云或移动系统中，特定的安全要求可能会改变个人与这些元素互动的方式。本章后面的部分将关注实施的技术组件，理解到人和流程都可以改变技术。例如，如果一个人把钥匙挂在锁上，门的安全性可能永远无关紧要。
- en: We often blame technological failures without fully comprehending the interaction
    through people and processes. In many ways, *DevSecOps*, or *PaaS, IaaS, CI/CD,
    Infrastructure as Code*, and *Configuration as Code* are all previously ideated
    in a way to shape user interaction. The platform expands this by creating specific
    ideated platforms with defined experiences required to achieve secure outcomes.
    The variables remain to see whether those defining terms communicate the experience
    one has with various tools. In some cases, with some of the more advanced tools
    and metrics, it may be possible to examine how the technology experiences the
    user as much as the user experiences the technology. Understanding those experiences
    guides the next two sections in what must be secured and how to secure those elements.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们常常在没有充分理解人与流程的相互作用的情况下，将技术故障归咎于技术本身。在许多方面，*DevSecOps*、*PaaS、IaaS、CI/CD、基础设施即代码*和*配置即代码*等概念都是以前以塑造用户交互的方式提出的。平台通过创建具有特定体验的特定平台来扩展这一点，这些体验是为了实现安全结果而定义的。变量仍然存在，看那些定义性术语是否能够传达与各种工具互动的经验。在某些情况下，使用一些更先进的工具和指标，可能可以检查技术如何体验用户，就像用户如何体验技术一样。理解这些体验指导了下一两个部分，即必须保护什么以及如何保护这些元素。
- en: What to secure
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 要保护什么
- en: 'After understanding the conceptual approach, the question for designing our
    secure by default platform should be: *what do I secure within the workspace*?
    The first area to secure should be **external access**. Defining external access
    describes the process that allows transit to the platform and from circle to circle
    across the security architecture. Each circle appears as a **trust circle**, those
    within a circle can make changes, and communicating with other circles requires
    consensus through technical handshakes. These accesses are balanced against **internal
    vulnerabilities** within the different elements, preventing vulnerabilities from
    releasing in deployed software. Finally, one must secure **data at rest** and
    **data in motion**. The ways operational tools conduct business and users manage
    data all matter to the security outcomes.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在理解了概念方法之后，设计我们默认安全平台的问题应该是：*我在工作空间中要保护什么*？首先需要保护的是**外部访问**。定义外部访问描述了允许平台间以及安全架构中不同圈层之间传输的过程。每个圈层都表现为一个**信任圈**，圈内的成员可以做出更改，与其他圈层通信则需要通过技术握手达成共识。这些访问与不同元素内部的**内部漏洞**相平衡，防止漏洞在部署的软件中释放。最后，必须保护**静态数据**和**动态数据**。操作工具开展业务和用户管理数据的方式都对安全结果至关重要。
- en: External access
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 外部访问
- en: 'External access lies in two spots: accessing the platform initially and traversing
    across different elements. This access can also extend to dependencies within
    the programs, later referenced as a Software Bill of Materials. Initial security
    determines who can log in to see the platform and decides which areas they can
    attend. Think of external security as buying a ticket to a carnival; the initial
    access allows one into the carnival, but the rides and games require different
    tickets. One can purchase properties at the front gate or as one reaches the required
    segments.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 外部访问存在于两个地方：最初访问平台以及穿越不同的元素。这种访问还可以扩展到程序内的依赖关系，后来被称为软件物料清单。初始安全决定了谁可以登录查看平台，并决定他们可以访问哪些区域。将外部安全想象成购买游乐园的门票；初始访问允许进入游乐园，但游乐设施和游戏需要不同的门票。一个人可以在入口处或到达所需区域时购买门票。
- en: In implementing the overall architecture, the initial security should be to
    the primary collaboration platform, creating a user account that can view all
    potential items but with limited edit properties. Different user roles within
    RBAC as developer, manager, or admin can limit the ability to reach unique tools
    or properties within those tools. One should subdivide roles into different elements
    depending on the type of tool. An initial example often occurs from the IDE. One
    might want a developer to be able to create branches, fork repositories, and write
    code but restrict merge permissions to approved individuals. The same individual
    may be approved to work within a project but not create new projects. This security
    creates logging for what has happened and prevents potential errors.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施整体架构时，初始安全应该是主要协作平台，创建一个可以查看所有潜在项目但编辑属性有限的用户账户。在RBAC（基于角色的访问控制）中，不同的用户角色如开发者、经理或管理员可以限制访问独特工具或工具内属性的能力。应根据工具类型将角色细分到不同的元素中。一个常见的初始例子通常来自IDE。可能希望开发者能够创建分支、分叉仓库并编写代码，但限制合并权限给批准的个人。同一个人可能被批准在项目中工作，但不能创建新项目。这种安全机制会记录发生的事件，并防止潜在的错误。
- en: Traversing across different elements requires exchanging artifacts. The token
    between one element should empower the second element and allow the exchange of
    trusted data. Some of these become more of an internal vulnerability, but initial
    structuring requires architecting which elements each element requires. A typical
    example is the **Software Bill of Materials** (**SBOM**) that many production
    elements use. This artifact compiles all the dependencies used by software, usually
    in a textual format, but details the specific links used by the software. These
    artifacts include library versions, recent updates, and sometimes the elements
    required for the software to be successful. Understanding external vulnerabilities
    allows conversion to addressing internal vulnerabilities within tools.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在不同的元素之间进行遍历需要交换工件。一个元素之间的令牌应该赋予第二个元素权力，并允许交换受信任的数据。其中一些可能更多地成为内部漏洞，但初始结构需要设计每个元素需要哪些元素。一个典型的例子是**软件物料清单**（**SBOM**），许多生产元素都使用这个工件。这个工件编译了软件使用的所有依赖项，通常以文本格式，但详细说明了软件使用的特定链接。这些工件包括库版本、最近更新，有时还包括软件成功所需的元素。理解外部漏洞有助于将它们转换为解决工具内部漏洞的方法。
- en: 'Internal vulnerabilities: Common Vulnerabilities and Exposures and patching'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 内部漏洞：常见漏洞与暴露和修补
- en: Internal vulnerabilities are those inherent within any element of software.
    They are not part of the external dependency but elements within the desired software.
    These can be the properties within the software, such as allowing the creation
    of other artifacts, the presence of embedded secrets, or errors allowing malicious
    or misguided conversion. As mentioned above, SQL injection presents a typical
    example of an internal error with tools, even those integrated into a platform.
    SQL injection is when some software treats entries within the program as code,
    executes commands or allows unintended functions.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 内部漏洞是指软件任何元素中固有的。它们不是外部依赖的一部分，而是所需软件内部的元素。这些可以是软件中的属性，例如允许创建其他工件、存在嵌入的秘密或允许恶意或误导性转换的错误。如上所述，SQL注入是工具内部错误的一个典型例子，即使是集成到平台中的工具。SQL注入是指某些软件将程序内的条目视为代码，执行命令或允许未预期的功能。
- en: One advantage of a platform is that integrating various tools can reduce the
    potential scope of internal errors. Efficiently setting up the RBAC from the previous
    element can prevent escalation of privilege between different tools. For example,
    an error that allows escalation on one tool, from user permissions to administrative
    permissions within the IDE, would require a different access point to allow similar
    access within a deployment or management stack. These internal controls are a
    best practice between different tools on the platform.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 平台的一个优点是，整合各种工具可以减少内部错误潜在的范围。从先前的元素中高效地设置RBAC可以防止不同工具之间权限的升级。例如，一个允许在IDE中从用户权限升级到管理权限的错误，需要不同的访问点来允许在部署或管理堆栈中实现类似的访问。这些内部控制是平台不同工具之间的一种最佳实践。
- en: To ensure the best performance, one should keep up with current **Common Vulnerabilities
    and Exposures** (CVEs) and required patches. The U.S. government sponsors the
    CVE library (cve.mitre.org) and uses the Mitre Company to proliferate errors within
    tools. Anyone can submit a CVE, and most companies respond reasonably quickly
    to mitigate any identified threats. The recent Solar Winds hack (2023) against
    the U.S. government was only possible because some customers failed to make required
    patches to systems ([https://www.techtarget.com/whatis/feature/SolarWinds-hack-explained-Everything-you-need-to-know](https://www.techtarget.com/whatis/feature/SolarWinds-hack-explained-Everything-you-need-to-know)).
    The SBOM is the initial guide but platform maintainers should strive to ensure
    all systems possess the latest updates and patches. From a security perspective,
    one reason for continuous development is to ensure potential hackers do not have
    enough time to find and exploit holes within the software. None of the best patches
    can help if the data supporting those applications is not secured.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保最佳性能，应关注当前的**通用漏洞和暴露**（CVEs）和所需的补丁。美国政府赞助CVE库（cve.mitre.org），并使用Mitre公司来在工具中传播错误。任何人都可以提交CVE，大多数公司都会迅速响应以减轻任何已识别的威胁。最近的针对美国政府的SolarWinds黑客攻击（2023年）之所以可能，仅仅是因为一些客户未能对系统进行必要的补丁更新（[https://www.techtarget.com/whatis/feature/SolarWinds-hack-explained-Everything-you-need-to-know](https://www.techtarget.com/whatis/feature/SolarWinds-hack-explained-Everything-you-need-to-know)）。SBOM是初始指南，但平台维护者应努力确保所有系统都拥有最新的更新和补丁。从安全角度来看，持续开发的一个原因是为了确保潜在的黑客没有足够的时间在软件中找到并利用漏洞。如果支持这些应用程序的数据没有得到保护，即使是最优秀的补丁也无法提供帮助。
- en: Data
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据
- en: 'Securing data falls into two major categories: data at rest and data in motion.
    Data within the platform should be considered *at rest* when contained in a deployment
    target or within a cluster and *in motion* when moving between clusters or across
    the network. Despite being in motion between containers, data can be secured within
    the cluster at rest by establishing shared repositories and databases. Sharing
    permissions occurs through tokens and RBAC controls, as discussed above. The rationale
    for sharing the tokens within the cluster is to maximize ease of use for each
    user and when working with teams between users.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 保护数据分为两大类：静止数据和移动数据。当数据包含在部署目标或集群内部时，平台内的数据应被视为*静止*；当数据在集群之间或网络中移动时，则被视为*移动*。尽管数据在容器之间移动，但可以通过建立共享存储库和数据库来在集群内部静止地保护数据。权限共享通过令牌和前面讨论过的RBAC控制来实现。在集群内部共享令牌的合理性是为了最大化每个用户的易用性，以及在用户之间团队合作时。
- en: Constructing shared data within clusters does not preclude creating individual
    data sites. It may be advantageous not to share data between teams or individuals
    at specific points, even when on shared resources. Implementing RBAC continues
    to work at those solutions. Implementing effective data security allows the creation
    of encryption keys associated with the data shared between individuals.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在集群内部构建共享数据不会阻止创建个人数据站点。在某些特定点上，即使是在共享资源上，不共享团队或个人之间的数据也可能是有利的。实施RBAC在这些解决方案中仍然有效。实施有效的数据安全允许创建与个人之间共享的数据相关联的加密密钥。
- en: This pattern does open possibilities for malicious insiders, those with permissions
    on the cluster that take inappropriate actions. Some actions are technical, in
    locking down different areas and some are policy-based. Technical solutions amount
    to tighter RBAC controls that can prevent the platform from operating as a DevOps
    fundamental. The preferred solution for these individuals is a policy one, do
    not allow individuals who have left the company to have access, and have comprehensive
    rules for user behavior in place. One of the preferred policies is least privilege,
    ensuring users never have more access than needed to do their job. Then, the policy
    solutions can be mitigated by technical signaling when bad behavior happens rather
    than stopping an event that may be good in some contexts.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式确实为恶意内部人员打开了可能性，那些在集群上拥有权限并采取不当行动的人。一些行动是技术性的，例如锁定不同的区域，而另一些则是基于政策的。技术解决方案相当于更严格的RBAC控制，这可以防止平台作为DevOps基础运行。这些个人的首选解决方案是政策性的，不允许离职人员访问，并制定全面的用户行为规则。首选政策之一是最小权限，确保用户永远不会拥有完成工作所需之外的访问权限。然后，当发生不良行为时，可以通过技术信号来缓解政策解决方案，而不是停止可能在某些情况下是好事的事件。
- en: How to secure the platform
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何保护平台
- en: Several standard approaches exist to secure platforms effectively through technical
    means. The first approach, as referenced, is to implement SSO tools using proven
    user directories. After that, encryption methods can go a long way towards securing
    data, preventing password misuse, and protecting code, even in production. Finally,
    as part of the platform’s operational construct and security tools, the implemented
    gadgets prevent new security problems from reaching the platform or proliferating
    across the functions. Gadgets include scanners across the platform, monitoring
    deployed applications, and pipeline tools that prevent errors from reaching production.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 存在几种标准方法，可以通过技术手段有效地保护平台。第一种方法，如前所述，是使用经过验证的用户目录实现SSO工具。之后，加密方法可以大大提高数据的安全性，防止密码滥用，并保护代码，即使在生产环境中也是如此。最后，作为平台操作结构和安全工具的一部分，实施的小工具可以防止新的安全问题到达平台或在整个功能中传播。这些小工具包括平台上的扫描器、监控部署的应用程序以及防止错误到达生产的管道工具。
- en: Single-Sign-On (SSO)
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 单点登录（SSO）
- en: SSO applications create an authentication method that allows users to access
    multiple websites with one set of credentials. The converse to this is password
    managers that require different communication but store all elements in the same
    place. A sample of the SSO process appears in *Figure 7**.2*.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: SSO应用程序创建了一种身份验证方法，允许用户使用一组凭证访问多个网站。与此相反的是，需要不同通信但存储所有元素在同一位置的密码管理器。SSO过程的示例见*图7.2*。
- en: '![](img/B24465_07_2.jpg)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_07_2.jpg)'
- en: Figure 7.2 – SSO process
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2 – SSO过程
- en: Password managers would arrive before the connection began, providing input
    in *stage 4* for the **Optional Login**. The **Identity Provider** allows a primary
    connection or verifies more advanced access based on the password. The returned
    token then tells the service provider what properties to release. These identity
    properties often align with the SSO through an authentication protocol, typically
    either a **Lightweight Directory Access Protocol** (**LDAP**) or **Secure Assertion
    Markup** **Language** (**SAML**).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 密码管理器会在连接开始之前出现，在*阶段4*为**可选登录**提供输入。**身份提供者**允许主要连接或根据密码验证更高级的访问。返回的令牌然后告诉服务提供商要释放哪些属性。这些身份属性通常通过身份验证协议与SSO对齐，通常是**轻量级目录访问协议**（**LDAP**）或**安全断言标记语言**（**SAML**）。
- en: LDAP provides an industry standard to manage directory information. These functions
    are frequently separate from establishing a token, but verify a particular login
    has the permissions to use a token. As a process, a platform can establish an
    LDAP directory with user names and attributes, and then each user can log in.
    LDAP can divide into simple authentications, where a correct name and password
    connect a user, or integrate with a **Simple Authentication and Security Layer**
    (**SASL**). SASL solutions require authentication before matching users against
    the overall directory.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: LDAP提供了一种行业标准来管理目录信息。这些功能通常与建立令牌分开，但会验证特定登录是否具有使用令牌的权限。作为一个过程，一个平台可以建立包含用户名和属性的LDAP目录，然后每个用户都可以登录。LDAP可以分为简单的身份验证，其中正确的用户名和密码将用户与系统连接，或者与**简单身份验证和安全层**（**SASL**）集成。SASL解决方案需要在将用户与整体目录匹配之前进行身份验证。
- en: LDAP is widely available, and some top-performing programs are **OpenLDAP**
    or **Apache Directory Server**. These then pair with administrative tools such
    as **Apache Directory Studio**, **Jxeplorer Java LDAP browser**, or **LDAP Admin
    Tool** to manage accounts on those directories. One set of tools creates the initial
    process and the other manages tools for those implementations.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: LDAP广泛可用，一些顶级程序是**OpenLDAP**或**Apache Directory Server**。然后，它们与诸如**Apache Directory
    Studio**、**Jxeplorer Java LDAP浏览器**或**LDAP Admin Tool**等管理工具配对，以管理这些目录上的账户。一组工具创建初始过程，而另一组则管理这些实现的管理工具。
- en: SAML implementations work with identity providers to verify users. They then
    provided an XML authentication exchange to confirm the user. The benefit of this
    over LDAP is that SAML typically occurs outside the domain while LDAP functions
    are within the domain. It may be possible to use both in establishing LDAPs within
    a particular cluster or cloud, while using SAML tokens for external access. The
    SAML authentication can then be connected to the directory for verifying which
    services are available at particular locations.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: SAML实现与身份提供者合作以验证用户。然后他们提供了一个XML身份验证交换来确认用户。与LDAP相比，这种方法的优点是SAML通常发生在域外，而LDAP功能是在域内进行的。在特定集群或云中建立LDAPs时，可能同时使用两者，同时使用SAML令牌进行外部访问。然后可以将SAML身份验证连接到目录，以验证特定位置可用的服务。
- en: The top question for the platform may be *which SSO I should use*? The answer
    is that one depends on a particular capability rather than any specific software
    in a platform. Multiple tools are available; one should look for the tool with
    the most integration across the capabilities you need. These functions in the
    collaborative and deployment environments use the SSO. In any case, identity within
    the SSO should be encrypted at rest or in transit to prevent outside users from
    observing passwords.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 对于平台来说，最关键的问题可能是*我应该使用哪种SSO*？答案是这取决于特定的功能，而不是平台中的任何特定软件。有多种工具可用；应该寻找在所需功能方面具有最多集成的工具。这些在协作和部署环境中的功能使用SSO。在任何情况下，SSO中的身份在静止或传输时都应该加密，以防止外部用户观察到密码。
- en: Encryption basics
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加密基础
- en: 'All the discussion about encryption leads to a quick return to basic standards.
    Encryption has three basic forms: symmetric, asymmetric, and quantum keys. **Symmetric
    encryption** uses a single key to encrypt and decrypt the data. This model is
    known as **“Secret Key” encryption** because one must prevent third parties from
    seeing the key. The strengths include speed and cryptographic strength but the
    weakness is one must exchange keys before communicating securely. Two types of
    symmetric encryption exist; **block**, where set bit chains are encrypted through
    a secret key, and **stream**, where data encrypts during streaming without being
    retained in system memory. One of the challenges is that every key usage leaks
    some data about the encryption. Just like old-school cryptography, the more coded
    messages one has, the easier to find the overall key. Symmetric keys do not include
    metadata about creation dates, user practices, or life spans, making it necessary
    to use **key management systems**. Examples of symmetric systems include Triple
    Data Encryption (3DES), Advanced Encryption Standard (AES), Data Encryption Standard
    (DES), and Rivest Cipher 4()RC4.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 所有关于加密的讨论都迅速回到了基本标准。加密有三种基本形式：对称加密、非对称加密和量子密钥。**对称加密**使用单个密钥来加密和解密数据。这种模型被称为**“密钥加密”**，因为必须防止第三方看到密钥。其优点包括速度和加密强度，但缺点是在安全通信之前必须交换密钥。存在两种类型的对称加密；**块加密**，通过密钥加密设置位链，和**流加密**，在数据流中加密数据而不保留在系统内存中。一个挑战是每个密钥的使用都会泄露一些关于加密的数据。就像老式的密码学一样，编码消息越多，找到整体密钥就越容易。对称密钥不包括创建日期、用户习惯或寿命的元数据，因此需要使用**密钥管理系统**。对称系统的例子包括三重数据加密（3DES）、高级加密标准（AES）、数据加密标准（DES）和Rivest
    Cipher 4（RC4）。
- en: '**Asymmetric keys** depend on public and private keys and appear in *Figure
    7**.2*, which details SSO practices. This practice is also known as public key
    encryption. The asymmetric encryption process is slower, and the keys are much
    larger in overall bits. At a high level, the system uses a pairing between public
    and private keys to decode messages. **Transport Layer Security** (**TLS**) and
    **Secure Socket Layer** (**SSL**) systems use partial asymmetric approaches, with
    users obtaining a public key from a website and then linking to their private
    key to maintain security. Symmetric keys primarily use 128 or 256-bit functions,
    while asymmetric keys must be 2048 bits or more. Examples of asymmetric keys include
    Diffie-Hellman, **Elliptic Curve Cryptography** (**ECC**), El Gamal, **Digital
    Signature Algorithm** (**DSA**), and **Rivest-Shamir-Aldeman** (**RSA**).'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**非对称密钥**依赖于公钥和私钥，并在*图7**.2中显示，该图详细说明了单点登录（SSO）实践。这种做法也被称为公钥加密。非对称加密过程较慢，密钥的位数也更大。从高层次来看，系统使用公钥和私钥之间的配对来解码消息。**传输层安全性**（**TLS**）和**安全套接字层**（**SSL**）系统使用部分非对称方法，用户从网站获取公钥，然后将其链接到他们的私钥以保持安全性。对称密钥主要使用128位或256位函数，而非对称密钥必须是2048位或更多。非对称密钥的例子包括Diffie-Hellman、**椭圆曲线密码学**（**ECC**）、El
    Gamal、**数字签名算法**（**DSA**）和**Rivest-Shamir-Aldeman**（**RSA**）。'
- en: '**Quantum encryption** is an advanced topic and remains more theoretical than
    practical for day-to-day operations. These methods currently occurs in either
    **Quantum Key Distribution** (**QKD**) or **coin flipping**. In QKD, participants
    exchange polarized photons. The unique quantum properties mean any observation
    of the photon changes the properties of the other. Thus, any eavesdropping would
    affect the key received at either end and break the sequence. Coin flipping uses
    an agreement between users on polarized filters rather than the actual state,
    ensuring that only one valid key exists for the two users.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**量子加密**是一个高级主题，在日常操作中仍更多是理论上的，而不是实际应用。这些方法目前存在于**量子密钥分发**（**QKD**）或**抛硬币**中。在QKD中，参与者交换偏振光子。独特的量子特性意味着对光子的任何观察都会改变另一个光子的特性。因此，任何窃听都会影响两端接收到的密钥并破坏序列。抛硬币使用用户之间关于偏振滤波器的协议，而不是实际状态，确保两个用户之间只有一个有效的密钥。'
- en: Another important consideration with quantum computing is its potential impact
    on key decoding. **Grover's algorithm**, a quantum search technique, significantly
    reduces the number of items that need to be examined—from a typical (N/2 – 1)
    items, where N is the number of items in a set, in classical search to just the
    square root of N items in the quantum context—making key searches far more efficient.
    This means if one is randomly trying 1,000 possible options for a key, classical
    computing must try 499 alternatives, while a quantum approach requires only 37\.
    This drastically reduces the time to commit brute-force decryption against public
    or private keys. One way to ensure all data is successfully encrypted is by putting
    suitable scanners and testing tools inside the pipeline. Even the best security
    on the local platform requires network management to ensure those moving onto
    one’s platforms are secure.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个与量子计算相关的重要考虑是其对密钥解码的潜在影响。**Grover算法**，一种量子搜索技术，显著减少了需要检查的项目数量——从经典搜索中的典型（N/2
    – 1）个项目，其中N是集合中的项目数量，到量子环境中的N的平方根个项目——这使得密钥搜索变得远更高效。这意味着如果随机尝试1000个可能的密钥选项，经典计算必须尝试499个替代方案，而量子方法只需要37个。这极大地减少了针对公钥或私钥进行暴力破解解码所需的时间。确保所有数据都成功加密的一种方法是在管道中放置合适的扫描器和测试工具。即使是本地平台上的最佳安全性也需要网络管理来确保那些进入平台的人是安全的。
- en: Scanners and pipelines
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 扫描器和管道
- en: Security scans within the pipeline are part of the overall DevSecOps concept.
    Implementing these tools prevents harmful code from reaching production. A typical
    scanning package within a pipeline includes static testing to confirm coding practices,
    functional tests to verify elements, dependency scans to verify all called classes
    and objects exist, and run-time tests to verify that code runs as intended.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 管道内的安全扫描是整体DevSecOps概念的一部分。实施这些工具可以防止有害代码进入生产环境。管道内的典型扫描包包括静态测试以确认编码实践、功能测试以验证元素、依赖性扫描以验证所有调用的类和对象是否存在，以及运行时测试以验证代码按预期运行。
- en: When moving past the initial pipeline, developers frequently use **smoke testing**.
    Smoke testing originated with mechanical engineering, as when activating new devices,
    they did not catch on fire, smoke, shake, or malfunction. Scans can also include
    regularly assessing deployed code to ensure new CVEs do not create vulnerabilities.
    The entire inventory of platform operations requires evaluation on a regular timeframe.
    New code testing occurs during development, but scanning on a weekly, quarterly,
    or other periodic timeframe prevents errors from reaching baseline capabilities.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当超出初始管道时，开发者经常使用**烟雾测试**。烟雾测试起源于机械工程，当激活新设备时，它们不会起火、冒烟、震动或出现故障。扫描还可以包括定期评估已部署的代码，以确保新的CVE不会创建漏洞。平台操作的全部库存需要定期评估。新代码测试发生在开发过程中，但每周、季度或其它周期性的扫描可以防止错误达到基线能力。
- en: Pipelines should incorporate security scans into multiple stages with different
    jobs configured across the *build*, *test*, *deploy*, and *operate* phases. At
    the build stages, scanners conduct static analysis to verify code and functional
    code blocks. During testing, dynamic scans can evaluate what elements code calls,
    what ports are in place and verify embedded secrets are either removed or encrypted.
    During deployment, security tools verify against existing dependency CVEs, and
    ensure only the appropriate and approved networks are connected. Each security
    item produces artifacts for comparison with diff tools to ensure all security
    risks are understood. To be clear, `diff` tools do not solve problems, only highlight
    changes in security posture from one pipeline run to the next.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 管道应将安全扫描整合到多个阶段，不同作业配置在**构建**、**测试**、**部署**和**运营**阶段。在构建阶段，扫描器执行静态分析以验证代码和功能代码块。在测试期间，动态扫描可以评估代码调用的元素、配置的端口，并验证嵌入的秘密是否已被移除或加密。在部署期间，安全工具会验证现有依赖项的CVE，并确保仅连接适当的和批准的网络。每个安全项都会生成用于与diff工具比较的工件，以确保所有安全风险都得到理解。明确地说，`diff`工具不解决问题，只是突出显示从一次管道运行到下一次的安全状态变化。
- en: One best practice is incorporating `diff` tools directly into the pipeline.
    This practice allows creating artifacts directly showing security changes rather
    than handling the process later. Another best practice is incorporating pipeline
    tools that generate SBOM documentation upon deployment. The SBOM shows all the
    software and versions incorporated within the deployed guide, and aids in completing
    later audits for the platform to obtain security certification.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 一种最佳实践是将`diff`工具直接集成到管道中。这种做法允许直接创建显示安全变化的工件，而不是在之后处理该过程。另一种最佳实践是在部署时集成生成SBOM文档的管道工具。SBOM显示了部署指南中包含的所有软件和版本，并有助于平台在后续审计中获得安全认证。
- en: Multiple operational tools are available as open-source or by a vendor to scan
    operational inventories. **OpenScap**, **Zed Attack Proxy** (**ZAP**), **Snyk**,
    and **Anchore’s Syft** or **Gype** are effective scanning tools. **Tenable’s Nessus**
    and **Qualsys** focus on networks, while anti-virus companies like **McAfee**,
    **Norton**, and **BitDefender** offer more detailed looks at singular nodes or
    small networks. Again, combining multiple tools into the platform structure will
    create the best value.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 可用的多种操作工具作为开源或由供应商提供，用于扫描操作库存。**OpenScap**、**Zed Attack Proxy**（**ZAP**）、**Snyk**、**Anchore的Syft**或**Gype**是有效的扫描工具。**Tenable的Nessus**和**Qualsys**专注于网络，而像**McAfee**、**Norton**和**BitDefender**这样的反病毒公司则提供对单个节点或小型网络的更详细检查。再次强调，将多个工具结合到平台结构中可以创造最佳价值。
- en: Network management and security practices use
  id: totrans-72
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 网络管理和安全实践使用
- en: Securing the platform moves beyond the user experience portion to the networks
    and tools where platforms reside. Data and information move through channels,
    requiring secure practices to ensure adequate security. In this case, we are not
    talking about those on the platform but the path through which they reach the
    platform as the network tools. These include a variety of protocols such as **Transmission
    Control Protocol** (**TCP**), **Internet Protocol** (**IP**), **Hypertext Transfer
    Protocol** (**HTTP**) the most common as well as some others. Communication models
    can be point-to-point, client-server, or publish-subscribe but each involves handshakes
    within the network.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 保护平台不仅超越了用户体验部分，还扩展到平台所在的网络和工具。数据和信息通过渠道传输，需要采取安全措施以确保足够的安全。在这种情况下，我们不是在谈论平台上的那些人，而是在网络工具中他们到达平台的路径。这包括各种协议，如**传输控制协议**（**TCP**）、**互联网协议**（**IP**）、**超文本传输协议**（**HTTP**），这是最常见的，以及一些其他协议。通信模型可以是点对点、客户端-服务器或发布-订阅，但每种都涉及网络内的握手。
- en: As an important background, Google initially drove the change from HTTP to HTTPS,
    a protocol using SSL, and then moved to TLS. The company began using HTTPS in
    2008, implementing full-testing in 2014 and 2018, marking sites not using the
    HTTPS protocol as “Not Secure”. HTTPS uses the SSL interaction, which exchanges
    certificates, based on a public key, between the browsers. Once the connection
    is verified, the web server uses the public key access to send a secret key and
    establish a secure connection. TLS is a newer and updated version of SSL, removing
    existing vulnerabilities. As mentioned above, in patching, even security protocols
    are constantly rewired and reconfigured by stakeholders to eliminate vulnerabilities.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 作为重要的背景，谷歌最初推动了从HTTP到HTTPS的变革，这是一个使用SSL的协议，然后转向TLS。该公司从2008年开始使用HTTPS，在2014年和2018年实施了全面测试，将不使用HTTPS协议的网站标记为“不安全”。HTTPS使用基于公钥的SSL交互，浏览器之间交换证书。一旦连接得到验证，Web服务器使用公钥访问发送一个密钥并建立安全连接。TLS是SSL的一个较新和更新的版本，消除了现有的漏洞。如上所述，在修补过程中，甚至安全协议也是由利益相关者不断重新布线和重新配置，以消除漏洞。
- en: Another important thing to remember across network management is the SYN-ACK
    handshake, expressing **synchronization** (**SYN**) and **acknowledgment** (**ACK**).
    In a typical handshake, the user sends a synchronization message to the server
    using the TCP or HTTPS function with an initial sequence number. Synchronization
    contains an initial sequence number, and the server responds with its own sequence
    number. The system increments these numbers to create the ACK message. Exchanging
    functions verifies for both systems the establishment of a secure path. The challenge
    can be ensuring the establishment of the correct path when communicating. Network
    tools that help ensure that platform users take the right path are functions including
    firewalls, traffic monitoring, and zero-trust policies.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在网络管理中，还有另一件重要的事情需要记住，那就是SYN-ACK握手，表示**同步**（**SYN**）和**确认**（**ACK**）。在典型的握手过程中，用户使用TCP或HTTPS功能向服务器发送一个同步消息，其中包含一个初始序列号。同步包含一个初始序列号，服务器以自己的序列号进行响应。系统增加这些数字以创建ACK消息。交换功能验证了两个系统之间安全路径的建立。挑战在于确保在通信时建立正确的路径。帮助确保平台用户走正确路径的网络工具包括防火墙、流量监控和零信任策略。
- en: Firewalls
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 防火墙
- en: '**Firewalls** are tools that prevent non-approved traffic from entering the
    service. They are security systems designed to prevent authorized access to or
    from an existing network. In considering a platform, typically, positions from
    firewalls would be after the initial user access and between any cluster sets.
    Firewalls fill a traditional security role in guarding against intrusion and signaling
    if a non-approved access is detected or approved. One can deploy firewalls as
    hardware, software, or cloud-based systems. These three can be configured at different
    points to secure different platform aspects.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**防火墙**是防止未经批准的流量进入服务的工具。它们是设计用来防止对现有网络的授权访问或从其访问的安全系统。在考虑一个平台时，通常，防火墙的位置会在初始用户访问之后以及任何集群集之间。防火墙在防止入侵和检测到未经批准的访问时发出信号，发挥着传统的安全作用。防火墙可以部署为硬件、软件或基于云的系统。这三个可以在不同的点进行配置，以保护不同平台方面的安全。'
- en: The most common use for firewalls is preventing outside users from interfacing
    with private networks. In our platform design, the firewall would prevent unauthorized
    users from reaching the initial access point, and additional firewalls would prevent
    users from moving between clusters. As with other tools, the best firewall for
    the platform is the one that works best for your system.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 防火墙最常见的使用方法是防止外部用户与私有网络交互。在我们的平台设计中，防火墙将阻止未经授权的用户到达初始访问点，额外的防火墙将阻止用户在集群之间移动。与其他工具一样，最适合平台的防火墙是那个最适合您系统的防火墙。
- en: 'There are some elements to choose from in picking the best firewall approach.
    The first is whether the system deploys as hardware, software, cloud, or some
    combination of those locations. For our platform installation, some factors to
    consider are compatibility, scalability, performance, and manageability:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择最佳的防火墙方法时，有一些元素可供选择。首先是系统是作为硬件、软件、云，还是这些位置的某种组合进行部署。对于我们平台的安装，需要考虑的一些因素包括兼容性、可扩展性、性能和可管理性：
- en: '**Compatibility** addresses how well the firewall works with the platform systems.
    Compatibility can be found in operating systems, applications, hardware and security
    features. Firewalls need to seamlessly integrate and control traffic regardless
    of which system, or combinations of systems might appear.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**兼容性**涉及防火墙与平台系统协同工作的程度。兼容性可以在操作系统、应用程序、硬件和安全功能中找到。防火墙需要无缝集成并控制流量，无论出现哪种系统，或系统的组合。'
- en: '**Scalability** is also a top concern for platforms, as user numbers may vary
    quickly. Scalability within the firewall addresses the ability to rapidly scale
    between numbers of users. Firewalls must manage high user numbers but also be
    able to switch to other firewalls if the system becomes overwhelmed. Distributed
    Denial of Service (DDoS) attacks frequently seek to send more traffic than a firewall
    or server can handle, causing the system to shut down. Network Protocols play
    a key role in scalability, allowing systems to auto-detect limits, manage between
    firewall elements, and keep systems from failing.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**也是平台关注的重点之一，因为用户数量可能会迅速变化。防火墙内的可扩展性解决了在用户数量之间快速扩展的能力。防火墙必须管理大量用户，但也要能够在系统过载时切换到其他防火墙。分布式拒绝服务（DDoS）攻击通常试图发送比防火墙或服务器能处理的更多流量，导致系统关闭。网络协议在可扩展性中扮演着关键角色，允许系统自动检测限制，在防火墙元素之间进行管理，并防止系统失败。'
- en: '**Performance** is always important. One needs to assess how well a firewall
    works on the platform, how fast it passes traffic, and whether high availability
    exists. Each of these will vary from system to system and require testing for
    the expected platform load. This traffic point is an excellent spot to use Chaos
    Engineering to test for extreme loads. High availability with firewalls usually
    assesses if a secondary firewall will be activated when the initial load becomes
    too high. If a firewall load becomes excessive, the inability to move to secondary
    locations can impact user satisfaction through throttling traffic'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能**始终很重要。需要评估防火墙在平台上的工作效果，它传递流量的速度，以及是否存在高可用性。这些都会因系统而异，并需要针对预期平台负载进行测试。这个流量点是使用混沌工程测试极端负载的绝佳位置。防火墙的高可用性通常评估当初始负载过高时是否会激活备用防火墙。如果防火墙负载过高，无法转移到次要位置可能会通过限制流量影响用户满意度。'
- en: '**Manageability**, the final category, reflects how easy a firewall is to use.
    In a cloud environment, using PaaS manageability might be a low concern as the
    same teams always manage that firewall. If one chooses to deploy a platform to
    multiple enterprise locations, this might increase in importance as one needs
    to train others in operation. The last part of manageability reflects how your
    selected firewalls contribute to traffic monitoring practices in the following
    paragraphs.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可管理性**，最后一个类别，反映了防火墙使用的便捷性。在云环境中，使用PaaS可管理性可能不是特别关注的问题，因为相同的团队总是管理那个防火墙。如果选择将平台部署到多个企业地点，这可能变得更加重要，因为需要培训他人进行操作。可管理性的最后一部分反映了所选防火墙如何有助于以下段落中描述的流量监控实践。'
- en: Multiple ways exist to manage these factors. As with other areas, conducting
    a subjective and objective scoring against firewall categories can provide a strong
    comparative measure.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 存在多种方式来管理这些因素。与其他领域一样，对防火墙类别进行主观和客观评分可以提供强大的比较指标。
- en: Traffic management
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 流量管理
- en: Establishing good firewalls contributes to a solid **traffic management** process.
    Platforms are designed for multiple users, arriving from different locations and
    accomplishing different goals, so solid traffic management is essential. The key
    factors associated with traffic management are visibility, identifying user and
    organization habits, and establishing baselines. Once one sets these fundamental
    factors appropriately, the next step is finding appropriate remediation strategies.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 建立良好的防火墙有助于巩固**流量管理**过程。平台是为多个用户设计的，他们来自不同的地点，完成不同的目标，因此良好的流量管理是必不可少的。与流量管理相关的关键因素包括可见性、识别用户和组织习惯以及建立基线。一旦适当地设置了这些基本因素，下一步就是找到适当的补救策略。
- en: '**Visibility** within traffic management should address OSI layers two through
    seven. The platform concentrates on layers three through six, but since firewalls
    control traffic, the visibility needs to extend past those to the initial layers
    connecting with functions. Expanding observable layers account for north-south
    traffic within the cloud and east-west traffic from cluster to cluster or cloud
    to cloud. Despite having firewalls, these benefit from using **Test Access Points**
    (**TAP**) and **Switch Port Analyzers** (**SPAN**) to help monitor traffic.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在流量管理中，**可见性**应解决 OSI 七层模型中的第二层到第七层。该平台专注于第三层到第六层，但由于防火墙控制流量，可见性需要扩展到连接功能的初始层。扩展可观察的层包括云内部的南北流量以及集群到集群或云到云的东-west
    流量。尽管有防火墙，但它们仍然受益于使用**测试访问点**（**TAP**）和**交换机端口分析仪**（**SPAN**）来帮助监控流量。
- en: '**TAP**: Passive device that copies network traffic and sends it to a monitoring
    tool. PhanTap is one example available as opensource from GitHub'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TAP**：一种被动设备，用于复制网络流量并将其发送到监控工具。PhanTap 是一个从 GitHub 可用作为开源的例子。'
- en: '**SPAN**: Forward copies of all incoming and outgoing packets from the existing
    switch to another port for analysis. Examples include the open-source tool WireShark
    which is a common favorite among those first learning network integration'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SPAN**：从现有交换机转发所有入站和出站数据包的副本到另一个端口以进行分析。例如，开源工具 WireShark 是那些刚开始学习网络集成的人的常见首选。'
- en: Both devices act without disrupting the flow of traffic, merely creating visibility
    for secondary and tertiary tools. TAP placement occurs between any two connected
    infrastructure pieces, whether physical or virtual, and SPANs often appear in
    baseline network equipment.
  id: totrans-90
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这两种设备在不会干扰流量流的情况下工作，只是为次要和三级工具提供可见性。TAP 的放置发生在任何两个连接的基础设施组件之间，无论是物理的还是虚拟的，而
    SPAN 通常出现在基线网络设备中。
- en: The TAP captures inbound and outbound traffic, including all layer two and three
    packets. This device enables a full copy of multi-directional network traffic.
    SPAN ports tend to be more accessible and available at low user cost. The disadvantage
    of SPANs is that this traffic may not be prioritized and drops during high-traffic
    periods. The drop can then lead to holes in the visibility since the system does
    not achieve the full line rate. Combining the two systems provides a practical
    step into developing user behavior patterns.
  id: totrans-91
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: TAP 捕获入站和出站流量，包括所有二层和三层数据包。该设备能够完整复制多方向网络流量。SPAN 端口通常更容易访问，并且用户成本较低。SPAN 的缺点是，在高峰时段，这种流量可能不会被优先处理，并可能导致数据丢失。数据丢失可能导致可见性出现漏洞，因为系统无法达到全线路速率。结合这两个系统，为开发用户行为模式提供了一个实用的步骤。
- en: Establishing monitoring allows for *identifying user and organization habits*.
    These patterns allow one to rapidly differentiate between what might be an attack
    on the platform and what is standard behavior. One difficulty with behavior is
    that substantial data must exist before starting. in the next section, we discuss
    using AI/ML tools to facilitate analysis; however, the first step is using architectural
    diagrams to envision what items communicate with others and what the standard
    patterns look like. Advanced monitoring tools such as **DataDog**, **Honeycomb**,
    and **Salt** are options as their initial installation provides some basic behavior
    patterns for Day 1\. Many of these may first seem like infrastructure management
    but offer the advanced analytics necessary for monitoring. These can then be modified
    as one’s platform becomes more mature
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立监控可以*识别用户和组织习惯*。这些模式允许人们快速区分可能对平台发起攻击的行为和标准行为。行为的一个困难是，在开始之前必须存在大量数据。在下一节中，我们将讨论使用AI/ML工具来促进分析；然而，第一步是使用架构图来设想哪些项目与其他项目通信以及标准模式看起来像什么。高级监控工具如**DataDog**、**Honeycomb**和**Salt**是选项，因为它们的初始安装提供了一些基本的行为模式。许多这些工具最初可能看起来像是基础设施管理，但提供了监控所需的先进分析。随着平台的成熟，这些工具可以被修改。
- en: The priority for traffic management is to assess how different users implement
    the platform. Good monitoring practices show which tools are used most often,
    how those tools are used and identify bottlenecks within the platform. Accentuating
    standard monitoring tools with internal metrics occurs through virtual tools such
    as a personal favorite, **Open** **Telemetry** (**OTEL**).
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交通管理的优先级是评估不同用户如何实施该平台。良好的监控实践显示了最常使用的工具，这些工具的使用方式以及识别平台内的瓶颈。通过虚拟工具如个人最喜欢的**Open**
    **Telemetry** (**OTEL**)来强调标准监控工具与内部指标的结合。
- en: '**OTEL**: An open-source observability framework includes various tools, APIs,
    and **Software Development Kits** (**SDK**). Enables teams to instrument, create,
    collect, and then export telemetry data to other tools to understand system performance
    and behavior. OTEL was a **Cloud Native Computing Foundation** (**CNCF**) project
    that merged two earlier projects, OpenTracing and OpenCensus. As open-source,
    the tool is free to download, has extensive documentation online, and a wide user
    community. Documentation and community are two essential parts we always consider
    when adding open-source tools to our platform. OTEL aims to provide details about
    multiple steps that traditional traffic management may miss.'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OTEL**：一个开源的可观察性框架，包括各种工具、API和**软件开发工具包**（**SDK**）。它使团队能够进行仪表化、创建、收集，然后导出遥测数据到其他工具，以了解系统性能和行为。OTEL是**云原生计算基金会**（**CNCF**）的一个项目，它合并了两个早期项目，OpenTracing和OpenCensus。作为开源工具，它免费下载，在线有广泛的文档，以及庞大的用户社区。文档和社区是我们添加开源工具到平台时始终考虑的两个基本部分。OTEL旨在提供关于多个步骤的详细信息，这些步骤是传统交通管理可能忽略的。'
- en: 'The last traffic management step should be *establishing baselines*. Previously
    mentioned was using existing vendors to contribute and creating multiple collection
    points. Baselines originate from three primary sources: dev, test, and ops. First,
    those creating the platform have ideas about how traffic should flow based on
    the initial architecture. These baselines allow the creation of initial patterns
    to suggest traffic monitoring points. In the test phases, use cases allow experimenting
    with some patterns users might follow that the devs neglected. Testing use cases
    can include bad login attempts, moving incompatible formats between tools, or
    downloading data to personal devices.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后的交通管理步骤应该是*建立基线*。之前提到的是使用现有供应商来贡献并创建多个收集点。基线主要来自三个来源：开发、测试和运维。首先，创建平台的人根据初始架构对流量应该如何流动有一些想法。这些基线允许创建初始模式，以建议流量监控点。在测试阶段，用例允许实验一些开发者可能忽略的用户可能遵循的模式。测试用例可以包括不良登录尝试、在工具之间移动不兼容的格式或下载数据到个人设备。
- en: Testing then moves to operations, the platform deploys with actual users who
    choose to ignore everything the devs thought or tested. Chaos engineering practices
    in the operations can help cover even unthought attempts. An old planning instructor
    once told us that tests are not complete until the system has been secured against
    an invasion by Elvis clones from Mars.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 测试随后转向运营阶段，平台部署给实际用户，这些用户选择忽略开发者认为或测试过的所有内容。运营中的混沌工程实践可以帮助覆盖甚至未考虑到的尝试。一位老规划讲师曾告诉我们，直到系统已经抵御了来自火星的猫王克隆人的入侵，测试才算完成。
- en: This naturally leads to how AI can enhance one’s security deployments.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这自然引出了AI如何增强安全部署的问题。
- en: Leveraging AI for security enhancement
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用AI增强安全
- en: The most important part of AI for the security environment is gaining another
    set of eyes to help with risk management and mitigation. Attention economics is
    a concept that frequently applies in any business but, especially in software
    security. The concept details that the more areas one’s attention has to deal
    with, the less attention is paid to any one item. In DevOps, attention economics
    expresses as context switching that occurs when one changes from one task to another,
    requiring a focused realignment. AI can be that security checker who never is
    distracted, cannot become bored with the repetitive work, and takes no coffee
    or lunch breaks. The below figure highlights all the potential places AI potentially
    integrates across the DevSecOps continuum.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 对于安全环境来说，AI最重要的部分是获得另一双眼睛来帮助进行风险管理和缓解。注意力经济学是一个在商业中经常适用的概念，但在软件安全中尤其如此。这个概念详细说明了，一个人需要处理的问题区域越多，对任何单一项目的关注就越少。在DevOps中，注意力经济学表现为当一个人从一个任务切换到另一个任务时发生的上下文切换，需要集中精力重新调整。AI可以成为那个永远不会分心的安全检查员，不会对重复性工作感到厌倦，而且不需要咖啡或午餐休息。下面的图示突出了AI在DevSecOps连续体中可能整合的所有潜在位置。
- en: '![](img/B24465_07_03.jpg)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_07_03.jpg)'
- en: 'Figure 7.3 – AI in the DevSecOps continuum Credit: Trac Bannon, Mitre Security
    Specialist'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3 – DevSecOps连续体中的AI 信用：Trac Bannon，Mitre安全专家
- en: Think of all the daily security inputs, suggestions, and alerts. No human can
    spend enough time to identify, become familiar with root causes, and resolve all
    those issues. However, in working so much faster than the human brain, an AI system
    can help provide a step through funneling items into actions requiring human intervention,
    and those actions are solvable through AI automation. Choosing an AI integration
    requires careful evaluation of categories including security focus, usability,
    and scalability. After carefully training the AI/ML models, one can supply security
    as defensive or offensive approaches and apply these functions.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 想想所有的日常安全输入、建议和警报。没有人有足够的时间来识别、熟悉根本原因，并解决所有这些问题。然而，AI系统可以工作得比人脑快得多，可以帮助通过将项目过滤到需要人工干预的行动中，并通过AI自动化解决这些行动。选择AI集成需要仔细评估包括安全重点、可用性和可扩展性在内的类别。在仔细训练AI/ML模型后，可以提供防御或进攻性的安全方法，并应用这些功能。
- en: AI in defense
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 防御领域的AI
- en: AI in defense means establishing tools that protect the existing virtual infrastructure
    and network connections. Defensive models are the most common use for AI tools
    today. Defensive-focused AI vendors include **Cylance**, **SentinelOne**, and
    **Vectra AI**. The process involves using a trained AI model to examine all the
    current behavior and alert to unusual processes. AI practices in defense focus
    on endpoint security and proactive defense. Designing endpoint solutions applies
    AI to monitoring user behavior, detecting malware, and implementing preventative
    defensive methods.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 防御领域的AI意味着建立工具来保护现有的虚拟基础设施和网络连接。防御模型是目前AI工具最常见的使用方式。专注于防御的AI供应商包括**Cylance**、**SentinelOne**和**Vectra
    AI**。这个过程涉及使用训练好的AI模型来检查所有当前行为，并对异常过程发出警报。防御领域的AI实践侧重于端点安全和主动防御。设计端点解决方案将AI应用于监控用户行为、检测恶意软件和实施预防性防御方法。
- en: A clear distinction exists in defense between detecting bad behavior through
    analysis and automatically implementing solutions. The initial detection is simple
    for most AI devices with standard ML training paths as structured or unstructured
    training models. This implementation allows the AI to alert when items exceed
    or are about to exceed, what appears as a standard usage. The next step allows
    an AI to implement a solution to fix detected problems.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在防御方面，通过分析检测不良行为和自动实施解决方案之间存在明显的区别。对于大多数AI设备来说，初始检测很简单，因为它们有标准的机器学习训练路径，无论是结构化还是非结构化训练模型。这种实施允许AI在项目超过或即将超过看似标准的使用时发出警报。下一步允许AI实施解决方案来修复检测到的问题。
- en: The implementation phase can cause some consternation for many organizations.
    The ability of the AI to automatically stop harmful activity is practical but
    people worry whether essential solutions might impact business performance. For
    example, if an AI detects a **Distributed Denial of Service** (**DDoS**) attack,
    and shuts down a port, will that same port impact the ability of customers to
    reach products? Solving this should allow the AI to take action but set up alert
    systems to notify human administrators. This notification ensures any actions
    taken are immediately subject to review. These internal actions should pair with
    AI offensive solutions.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 实施阶段可能会让许多组织感到困惑。AI自动停止有害活动的功能是实用的，但人们担心这些解决方案是否会影响业务性能。例如，如果AI检测到**分布式拒绝服务**（**DDoS**）攻击并关闭一个端口，那么这个端口是否会影响到客户访问产品的能力？解决这个问题应该允许AI采取行动，但同时也应设置警报系统通知人类管理员。这种通知确保采取的任何行动都应立即接受审查。这些内部行动应与AI的攻击性解决方案相匹配。
- en: AI in offense
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 攻击性AI
- en: When AI models are used to generate offensive security, the intent is to protect
    against future threats and investigate causes. Some companies specialize in these
    approaches; however, some legalities remain in question. The main concerns are
    how far an AI can go to investigate a potential threat and how one uses the information
    detected. Potential uses would include insurance filings, legal stop-orders, or
    criminal actions against malicious actors.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用AI模型生成攻击性安全时，其目的是为了防范未来的威胁并调查原因。一些公司专门从事这些方法；然而，一些法律问题仍然存在疑问。主要关注的是AI在调查潜在威胁方面能走多远以及如何使用检测到的信息。潜在用途可能包括保险申报、法律停止令或针对恶意行为者的刑事行为。
- en: The best company for offensive AI security is probably **DarkTrace**, which
    specializes in real-time threat detection. Offensive AI solutions are likely to
    be more proprietary and require special knowledge. This means implementing offensive
    AI within the platform should not be preferred approach at the current time. Instead,
    organizations should contract with companies conducting offensive AI practices
    to provide information. This converts the AI from an offensive model to a defensive
    suggestion. These defensive notes would feed into the training databases for the
    platform and limit legal liability. AI is an exciting tool; much work will likely
    further these options over the next several years.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在攻击性AI安全方面，最好的公司可能是**DarkTrace**，它专注于实时威胁检测。攻击性AI解决方案可能更具有专有性并需要特殊知识。这意味着在当前时间，在平台上实施攻击性AI不应是首选方法。相反，组织应与进行攻击性AI实践的公司签订合同，以提供信息。这使AI从攻击模型转变为防御建议。这些防御性注释将输入平台的训练数据库，并限制法律责任。AI是一个令人兴奋的工具；在未来几年内，大量工作可能会进一步推动这些选项。
- en: Summary
  id: totrans-110
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Our goal remains to help you better understand how to approach security in the
    DevOps cycle. Securing the platform by design requires understanding the design
    basics. Design basics include discovering security experience essentials by shaping
    platform ideation through parts, identity, presence, and opposites to form a better
    mental picture. The better you can define the issue, the more possibilities exist
    to define the ongoing interaction and envision long-term solutions.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标仍然是帮助您更好地了解如何在DevOps周期中处理安全问题。通过设计来确保平台的安全性需要理解设计基础。设计基础包括通过形状平台构思、身份、存在和相反因素来发现安全经验要素，以形成一个更好的心理图像。您定义问题越好，定义持续互动和展望长期解决方案的可能性就越多。
- en: We also went beyond the initial security design into the network interactions
    required to create an effective and secure platform. You must understand how the
    platform acts in isolation and those elements interact with the broader world.
    The related solutions include best practices for SSO, firewalls, and traffic management.
    Finally, we discussed potential areas to include future AI tools within the platform
    security construct.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不仅超越了初始的安全设计，还深入到创建一个有效且安全的平台所需的网络交互。你必须理解平台在孤立状态下的行为以及这些元素如何与更广泛的世界互动。相关解决方案包括SSO、防火墙和流量管理的最佳实践。最后，我们讨论了在平台安全结构中包含未来AI工具的潜在领域。
- en: In the next chapter, we build from these initial design constraints to explore
    some actual applications and use-case involved with platforms in the market.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将从这些初始设计约束出发，探索一些实际的应用和与市场上平台相关的用例。
- en: Call to action
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 行动呼吁
- en: Recognize the security concept behind your platform design.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认识到您平台设计背后的安全概念。
- en: Identify how your platform will conduct actions to guard and signal against
    malicious or insider events.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定您的平台将如何执行行动以保护和发出针对恶意或内部事件的信号。
- en: Model technology to support the initial ideation, and test those models.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持初始创意的模型技术，并测试这些模型。
