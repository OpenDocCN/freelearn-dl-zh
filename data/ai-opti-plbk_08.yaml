  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3部分
- en: Deploying and Proving ML Value
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 部署和证明ML价值
- en: In *Part 3* of this book, we will provide a comprehensive guide to the complete,
    end-to-end life cycle of a **machine learning** ( **ML** ) system, moving from
    defining its purpose to proving its causal impact on the business. We will start
    with the foundational framework for success, moving beyond simple accuracy to
    define multi-dimensional, business-aligned goals, essential guardrail metrics
    to prevent unintended harm, and surrogate metrics to track long-term objectives.
    Next, we will dive into “productization,” which is the critical process of operationalizing
    models from experimental notebooks into robust, production-grade systems. We will
    discuss MLOps best practices, the importance of reproducible pipelines for code
    and data, and the architectural choices for model serving. Finally, we will explore
    the science of causal inference to answer the critical question, “Did the system
    do what it was intended to do?”, covering the “gold standard” of randomized control
    trials (A/B testing) as well as advanced observational techniques and optimization
    methods such as multi-arm bandits.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的**第3部分**中，我们将提供一个全面的指南，涵盖**机器学习**（**ML**）系统的完整、端到端的生命周期，从定义其目的到证明其对业务的因果影响。我们将从成功的基石框架开始，超越简单的准确性，定义多维、与业务对齐的目标，必要的防护性指标以防止意外伤害，以及代理指标以跟踪长期目标。接下来，我们将深入探讨“产品化”，这是将模型从实验笔记簿转化为稳健、生产级系统的关键过程。我们将讨论MLOps最佳实践，代码和数据的可重复管道的重要性，以及模型服务器的架构选择。最后，我们将探索因果推断的科学，以回答关键问题，“系统是否做到了它打算做的事情？”，涵盖随机对照试验（A/B测试）的“黄金标准”以及高级观察技术和优化方法，如多臂老虎机。
