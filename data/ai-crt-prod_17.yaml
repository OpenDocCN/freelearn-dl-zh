- en: '13'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: Unlock Your Exclusive Benefits
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解锁您的专属权益
- en: 'Your copy of this book includes the following exclusive benefits:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您的这本书包含以下专属权益：
- en: '![](img/cloud-computing1.png) Next-gen Packt Reader'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![](img/cloud-computing1.png) 新一代Packt阅读器'
- en: '![](img/pdf-file.png) DRM-free PDF/ePub downloads'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![](img/pdf-file.png) 无DRM PDF/ePub下载'
- en: Follow the guide below to unlock them. The process takes only a few minutes
    and needs to be completed once.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下指南解锁它们。这个过程只需几分钟，并且只需完成一次。
- en: Unlock this Book’s Free Benefits in 3 Easy Steps
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3步轻松解锁此书的免费权益
- en: Step 1
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤1
- en: Keep your purchase invoice ready for *Step 3*. If you have a physical copy,
    scan it using your phone and save it as a PDF, JPG, or PNG.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好您的购买发票以供*步骤3*使用。如果您有实体副本，请使用手机扫描并将其保存为PDF、JPG或PNG格式。
- en: For more help on finding your invoice, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如需查找发票的帮助，请访问 [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)。
- en: '**Note**: If you bought this book directly from Packt, no invoice is required.
    After *Step 2*, you can access your exclusive content right away.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您直接从Packt购买此书，则无需发票。在*步骤2*之后，您可以直接访问您专属的内容。'
- en: '|'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Step 2
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤2
- en: Scan the QR code or go to [packtpub.com/unlock](http://packtpub.com/unlock).
    | ![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock.png)
    |
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 扫描二维码或访问 [packtpub.com/unlock](http://packtpub.com/unlock)。 | ![白色背景上的二维码 AI生成的内容可能不正确。](img/Unlock.png)
    |
- en: On the page that opens (similar to *Figure 13.1* on desktop), search for this
    book by name and select the correct edition.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在打开的页面（类似于桌面上的*图13.1*），通过书名搜索此书并选择正确的版本。
- en: '![Figure 13.1: Packt unlock landing page on desktop](img/Packt_unlock_landing_page.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图13.1：桌面上的Packt解锁登录页面](img/Packt_unlock_landing_page.png)'
- en: 'Figure 13.1: Packt unlock landing page on desktop'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.1：桌面上的Packt解锁登录页面
- en: Step 3
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤3
- en: After selecting your book, sign in to your Packt account or create one for free.
    Then upload your invoice (PDF, PNG, or JPG, up to 10 MB). Follow the on-screen
    instructions to finish the process.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您的书籍后，请登录您的Packt账户或免费创建一个账户。然后上传您的发票（PDF、PNG或JPG，最大10MB）。按照屏幕上的说明完成此过程。
- en: '|'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Need help?
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要帮助？
- en: If you get stuck and need help, visit https://www.packtpub.com/unlock-benefits/help
    for a detailed FAQ on how to find your invoices and more. This QR code will take
    you to the help page. | ![](img/Need_help.png) |
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到困难需要帮助，请访问 https://www.packtpub.com/unlock-benefits/help 了解如何查找您的发票等详细FAQ。此二维码将带您到帮助页面。
    | ![](img/Need_help.png) |
- en: '**Note**: If you are still facing issues, reach out to [customercare@packt.com](https://mailto:customercare@packt.com).'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您仍然遇到问题，请联系 [customercare@packt.com](https://mailto:customercare@packt.com)。'
- en: '![](img/Packt_Logo_New.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Packt_Logo_New.png)'
- en: '[packtpub.com](http://packtpub.com)'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[packtpub.com](http://packtpub.com)'
- en: Subscribe to our online digital library for full access to over 7,000 books
    and videos, as well as industry leading tools to help you plan your personal development
    and advance your career. For more information, please visit our website.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 订阅我们的在线数字图书馆，全面访问超过7,000本书籍和视频，以及领先的工具帮助您规划个人发展和职业发展。更多信息，请访问我们的网站。
- en: Why subscribe?
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么订阅？
- en: Spend less time learning and more time coding with practical eBooks and Videos
    from over 4,000 industry professionals
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用来自超过4,000位行业专业人士的实用电子书和视频，节省学习时间，多花时间编码
- en: Improve your learning with Skill Plans built especially for you
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用专为您定制的技能计划提高您的学习效果
- en: Get a free eBook or video every month
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每月免费获得一本电子书或视频
- en: Fully searchable for easy access to vital information
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全可搜索，方便快速获取关键信息
- en: Copy and paste, print, and bookmark content
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制粘贴、打印和收藏内容
- en: At [www.packtpub.com](http://www.packtpub.com), you can also read a collection
    of free technical articles, sign up for a range of free newsletters, and receive
    exclusive discounts and offers on Packt books and eBooks.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [www.packtpub.com](http://www.packtpub.com)，您还可以阅读一系列免费技术文章，订阅各种免费通讯，并享受Packt书籍和电子书的独家折扣和优惠。
- en: Other Books You May Enjoy
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您可能还会喜欢的其他书籍
- en: 'If you enjoyed this book, you may be interested in these other books by Packt:'
