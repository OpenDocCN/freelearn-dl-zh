  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图6.23 – 查看整体流程](img/B21234_06_23.jpg)'
- en: Figure 6.23 – Reviewing the overall flow
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.23 – 查看整体流程
- en: On the menu bar, click **Save** to save the flow.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
