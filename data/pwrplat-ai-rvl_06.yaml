  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**消息**文本框中，为要发布到频道的消息添加详细信息。您可以使用富文本格式选项，以及从动态内容令牌中选择。参见*图6.22*：
- en: '![Figure 6.22 – Configuring the Post message in a chat or channel action](img/B21234_06_22.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图6.22 – 配置在聊天或频道中发布消息的操作](img/B21234_06_22.jpg)'
