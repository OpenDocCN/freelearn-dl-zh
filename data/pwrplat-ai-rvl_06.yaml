    and validate that the channel post has been made:'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开Microsoft Teams（或导航到[https://teams.microsoft.com](https://teams.microsoft.com)）并验证渠道帖子是否已发布：
- en: '![Figure 6.27 – Verifying the channel post](img/B21234_06_27.jpg)'
