- en: Summary
  id: totrans-164
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: AI Builder models have a lot of capabilities out of the box. In this chapter,
    you learned how to leverage AI to process emails that are received in a customer
    service mailbox. With the sentiment analysis model, you were able to detect whether
    an email had an overall positive or negative tone and then trigger an additional
    action to post a notification in a Teams channel conversation.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: AI Builder模型具有许多开箱即用的功能。在本章中，你学习了如何利用AI处理客户服务邮箱中接收到的电子邮件。通过情感分析模型，你能够检测电子邮件是否具有整体积极或消极的语气，然后触发额外的操作，在Teams频道对话中发布通知。
- en: In the next chapter, we’ll explore using Power Automate with AI services to
    transform a simple Word document into a PowerPoint presentation.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何使用Power Automate与AI服务将简单的Word文档转换为PowerPoint演示文稿。
