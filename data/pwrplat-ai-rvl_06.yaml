- en: Review the flow to make sure the steps have been configured. Once you’re done,
    it’s time to test it!
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 检查流程以确保步骤已配置。完成后，就是时候测试它了！
- en: Testing the flow
  id: totrans-143
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试流程
- en: 'Now, it’s time to make sure everything works as anticipated:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，是时候确保一切按预期工作：
- en: 'From the menu bar, select the **beaker** icon (**Test**):'
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从菜单栏中选择**烧杯**图标（**测试**）：
- en: '![Figure 6.24 – Testing the flow](img/B21234_06_24.jpg)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图6.24 – 测试流程](img/B21234_06_24.jpg)'
- en: Figure 6.24 – Testing the flow
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.24 – 测试流程
- en: Select the **Manually** radio button and click **Test**.
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**手动**单选按钮并点击**测试**。
