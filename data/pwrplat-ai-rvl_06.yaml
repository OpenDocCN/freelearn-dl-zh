  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图6.20 – 配置条件评估](img/B21234_06_20.jpg)'
- en: Figure 6.20 – Configuring the condition evaluation
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.20 – 配置条件评估
