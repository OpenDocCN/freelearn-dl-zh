    to Teams.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**在聊天或频道中发布消息**的飞出窗口中，点击**登录**以创建连接。为将用于发布到Teams的用户账户提供凭据。
- en: In the **Post As** dropdown, select **Flow bot**.
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**发布为**下拉菜单中，选择**流程机器人**。
- en: In the **Post In** dropdown, select **Channel**.
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**发布到**下拉菜单中，选择**频道**。
- en: In the **Team** dropdown, search for the team you created in the *Licensing*
    *prerequisites* section.
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**团队**下拉菜单中，搜索您在*许可* *先决条件*部分创建的团队。
- en: In the **Channel** drop-down, select **General**.
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**频道**下拉菜单中，选择**通用**。
