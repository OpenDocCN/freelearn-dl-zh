- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Processing Data with Sentiment Analysis
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用情感分析处理数据
- en: So far, we’ve looked at using AI (specifically, Microsoft’s Copilot and ChatGPT)
    to help us create and modify tooling (such as flows and apps). While they can
    be helpful, it often requires a lot of extra effort to get these types of general-purpose
    assistants to do very specific step-oriented tasks.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探讨了使用AI（特别是微软的Copilot和ChatGPT）来帮助我们创建和修改工具（如流程和应用程序）。虽然它们可能很有帮助，但通常需要大量的额外努力才能让这些通用助手完成非常具体的步骤导向任务。
- en: Power Platform allows you to harness AI to make judgments across a wide range
    of content and data types, helping mimic human evaluations at machine speed.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform允许您利用AI在广泛的内容和数据类型上做出判断，以帮助在机器速度下模仿人类评估。
- en: For instance, humans can easily glance at a business card and discern the person’s
    name and job title, regardless of their placement on the card. However, this task
    is considerably more challenging for traditional computer logic to execute. As
    business card designs evolve, data fields shift and become increasingly challenging
    for traditional automation engines to recognize and identify. AI models introduce
    contextual awareness to data, simplifying the automation process to mirror human-like
    performance. Another example might be determining how a customer feels about a
    particular product or service. It’s relatively easy for a human to infer if a
    customer’s email has a happy or angry tone, but it’s much more difficult with
    standard programming logic.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，人类可以轻易地扫一眼名片，就能辨认出人的姓名和职位，无论这些信息在名片上的位置如何。然而，对于传统的计算机逻辑来说，这项任务要困难得多。随着名片设计的演变，数据字段发生变化，这使得传统的自动化引擎识别和识别变得更加具有挑战性。AI模型引入了数据的相关意识，简化了自动化过程，使其类似于人类的表现。另一个例子可能是确定客户对某个产品或服务的感受。对于人类来说，推断客户的电子邮件是否有快乐或愤怒的语气相对容易，但使用标准的编程逻辑则要困难得多。
- en: 'Power Platform provides access to a variety of AI capabilities – whether it’s
    leveraging existing AI models that have been trained for specific types of tasks
    or feeding data to more general-purpose AI tools to reason over content. Power
    Platform’s native AI models are divided into two categories: **pre-built models**
    (models trained on specific types of datasets for a narrow content domain) and
    **custom models** (models that have some core training but require additional
    customization and training with your data).'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform提供了访问各种AI能力的途径——无论是利用为特定类型任务训练的现有AI模型，还是将数据输入更通用的AI工具以对内容进行推理。Power
    Platform的本地AI模型分为两大类：**预构建模型**（针对特定类型的数据集和狭窄的内容领域进行训练的模型）和**自定义模型**（具有一些核心训练但需要额外的定制和与您的数据进行训练的模型）。
- en: What is sentiment analysis, anyway?
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 那么，情感分析究竟是什么呢？
- en: 'Sentiment analysis, simply put, answers the question, “*What type of feelings
    are present in this content?*” Power Platform’s sentiment analysis model can examine
    a piece of content and return one of the following four sentiments:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，情感分析回答的问题是：“*在这段内容中存在哪些类型的情感？*”Power Platform的情感分析模型可以检查一段内容，并返回以下四种情感之一：
- en: Positive
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 积极
- en: Negative
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 消极
- en: Neutral
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中立
- en: Mixed
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 混合
- en: When processing text, the sentiment analysis AI model returns a sentiment value
    for each sentence, as well as the content as a whole. In addition to the sentiment
    value, sentiment analysis provides confidence scoring, indicating how confident
    the model is in its assessment, on a scale of 0 to 1, where 1 represents more
    confidence and 0 represents less confidence. Sentiment analysis does have its
    limitations, however – for example, if the content has incorrect or improper word
    usage – that may influence the ratings.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理文本时，情感分析AI模型为每个句子以及整个内容返回一个情感值。除了情感值之外，情感分析还提供置信度评分，表示模型对其评估的信心程度，评分范围在0到1之间，其中1表示更有信心，0表示信心不足。然而，情感分析确实有其局限性——例如，如果内容中存在错误或不恰当的用词——这可能会影响评分。
- en: The scenario in this chapter is based on a fictional company that uses a customer
    service mailbox as a funnel for comments and complaints. The business objective
    is to process the emails and determine the sentiment. If the sentiment is negative,
    the solution should post the message to a Teams channel so that a service representative
    can follow up with the customer.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的场景基于一家虚构公司，该公司使用客户服务邮箱作为评论和投诉的渠道。业务目标是处理电子邮件并确定情感。如果情感是消极的，解决方案应将消息发布到Teams频道，以便服务代表跟进客户。
- en: Let’s get started!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Licensing prerequisites
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 许可证必备条件
- en: 'Using AI models and connectors in Power Platform has several prerequisites:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Power Platform 中使用 AI 模型和连接器有几个必备条件：
- en: A subscription that includes Microsoft Dataverse
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含 Microsoft Dataverse 的订阅
- en: AI Builder capacity (or trial capacity)
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI Builder 容量（或试用容量）
- en: Power Apps or Power Automate premium licensing
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Power Apps 或 Power Automate 高级许可
- en: The easiest way to get the right amount of licensing is to sign up for a Microsoft
    365 E5 trial that includes Power Apps and Power Automate premium licenses, along
    with a modest amount of AI Builder capacity credits.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 获取适当数量许可的最简单方法是注册包含 Power Apps 和 Power Automate 高级许可以及一定数量的 AI Builder 容量信用额的
    Microsoft 365 E5 试用版。
- en: 'If you have an existing Microsoft 365 subscription, you can sign up for Power
    Apps or Power Automate premium licensing from the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    as shown in *Figure 6**.1*:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已有 Microsoft 365 订阅，您可以从 Microsoft 365 管理中心（[https://admin.microsoft.com](https://admin.microsoft.com)）注册
    Power Apps 或 Power Automate 高级许可，如图 *图 6**.1* 所示：
- en: '![Figure 6.1 – Microsoft 365 admin center](img/B21234_06_01.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.1 – Microsoft 365 管理中心](img/B21234_06_01.jpg)'
- en: Figure 6.1 – Microsoft 365 admin center
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.1 – Microsoft 365 管理中心
- en: 'You can review your current allocation of AI Builder capacity in the Power
    Platform admin center ([https://admin.powerplatform.microsoft.com/resources/capacity#add-ons](https://admin.powerplatform.microsoft.com/resources/capacity#add-ons))
    under **Resources** > **Capacity**, as shown in *Figure 6**.2*:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在 Power Platform 管理中心（[https://admin.powerplatform.microsoft.com/resources/capacity#add-ons](https://admin.powerplatform.microsoft.com/resources/capacity#add-ons)）下的
    **资源** > **容量** 查看您的 AI Builder 容量分配情况，如图 *图 6**.2* 所示：
- en: '![Figure 6.2 – Viewing Power Platform capacity](img/B21234_06_02.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.2 – 查看Power Platform容量](img/B21234_06_02.jpg)'
- en: Figure 6.2 – Viewing Power Platform capacity
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.2 – 查看Power Platform容量
- en: Next, we’ll look at the prerequisites for building the solution.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将查看构建解决方案的必备条件。
- en: Configuring solution prerequisites
  id: totrans-28
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置解决方案必备条件
- en: 'Once you’ve got the licensing squared away, you’ll need to set up a few things
    to make this demonstration work:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您解决了许可证问题，您还需要设置一些事情以确保此演示可以工作：
- en: A mailbox (either a standard mailbox or a shared mailbox in Exchange Online)
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 邮箱（无论是标准邮箱还是 Exchange Online 中的共享邮箱）
- en: A Microsoft team with at least the default General channel
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 至少拥有默认通用频道的 Microsoft 团队
- en: While it’s not necessary, it’s also helpful to have a free email account (such
    as an Outlook.com or Gmail.com account) that you can use to validate that the
    solution is working end to end.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然不是必需的，但拥有一个免费的电子邮件账户（例如 Outlook.com 或 Gmail.com 账户）来验证解决方案是否端到端工作也是有帮助的。
- en: Creating a shared mailbox
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建共享邮箱
- en: 'First, we’ll walk through creating a shared mailbox. A shared mailbox doesn’t
    require any special licensing for itself, though it does require a licensed user
    to access it:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将指导您创建一个共享邮箱。共享邮箱本身不需要任何特殊许可，但需要授权用户访问：
- en: Log into the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)).
    From there, expand **Teams & groups** and select **Shared mailboxes**.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录到 Microsoft 365 管理中心（[https://admin.microsoft.com](https://admin.microsoft.com)）。从那里，展开
    **团队与组** 并选择 **共享邮箱**。
- en: 'Click **Add a shared mailbox**, as shown in *Figure 6**.3*:'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如 *图 6**.3* 所示，点击 **添加共享邮箱**：
- en: '![Figure 6.3 – Viewing shared mailboxes](img/B21234_06_03.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.3 – 查看共享邮箱](img/B21234_06_03.jpg)'
- en: Figure 6.3 – Viewing shared mailboxes
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.3 – 查看共享邮箱
- en: 'On the **Add a shared mailbox** flyout, enter a **Name** value and adjust the
    **Email** address as necessary:'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **添加共享邮箱** 弹出窗口中，输入 **名称** 值并根据需要调整 **电子邮件** 地址：
- en: '![Figure 6.4 – Creating a shared mailbox](img/B21234_06_04.jpg)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.4 – 创建共享邮箱](img/B21234_06_04.jpg)'
- en: Figure 6.4 – Creating a shared mailbox
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.4 – 创建共享邮箱
- en: 'Click **Add members to your** **shared mailbox**:'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **添加成员到您的** **共享邮箱**：
- en: '![Figure 6.5 – Viewing the newly created mailbox](img/B21234_06_05.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.5 – 查看新创建的邮箱](img/B21234_06_05.jpg)'
- en: Figure 6.5 – Viewing the newly created mailbox
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.5 – 查看新创建的邮箱
- en: On the **Shared mailbox members** flyout, click **Add members**, select at least
    one user in the organization that has a mailbox license, and click **Add**.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **共享邮箱成员** 弹出窗口中，点击 **添加成员**，选择组织中的至少一个拥有邮箱许可的用户，然后点击 **添加**。
- en: Close the flyout.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关闭弹出窗口。
- en: When working with Power Automate, you’ll need to use the credentials for the
    account you granted access to in *step 5*.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 Power Automate 时，您需要使用在 *步骤 5* 中授予访问权限的账户的凭证。
- en: Next, you’ll need to create a team.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要创建一个团队。
- en: Creating a Microsoft Teams team
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建Microsoft Teams团队
- en: 'The Microsoft Teams team will be used to receive notifications from Power Automate.
    To create a team from the Microsoft 365 admin center, follow these steps:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft Teams团队将用于接收来自Power Automate的通知。要从Microsoft 365管理中心创建团队，请按照以下步骤操作：
- en: All roads lead to Rome
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 所有道路都通向罗马
- en: There are lots of ways to do the same task in Microsoft 365\. While this set
    of steps details creating a team through the Microsoft 365 admin center (since
    we’re already there), you can also do it directly from Microsoft Teams. To learn
    how to use Teams to accomplish this task, go to [https://support.microsoft.com/en-au/office/create-a-team-from-scratch-in-microsoft-teams-174adf5f-846b-4780-b765-de1a0a737e2b](https://support.microsoft.com/en-au/office/create-a-team-from-scratch-in-microsoft-teams-174adf5f-846b-4780-b765-de1a0a737e2b).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在Microsoft 365中完成同一任务的方法有很多。虽然这些步骤详细说明了通过Microsoft 365管理中心创建团队（因为我们已经在这里），您也可以直接从Microsoft
    Teams中完成。要了解如何使用Teams来完成此任务，请访问[https://support.microsoft.com/en-au/office/create-a-team-from-scratch-in-microsoft-teams-174adf5f-846b-4780-b765-de1a0a737e2b](https://support.microsoft.com/en-au/office/create-a-team-from-scratch-in-microsoft-teams-174adf5f-846b-4780-b765-de1a0a737e2b)。
- en: From the Microsoft 365 admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    expand **Teams & groups** and then select **Active teams** **and groups**.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从Microsoft 365管理中心([https://admin.microsoft.com](https://admin.microsoft.com))，展开**团队和组**，然后选择**活动团队****和组**。
- en: On the **Teams & Microsoft 365 groups** tab, click **Add** **a team**.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**团队和Microsoft 365组**选项卡上，点击**添加****团队**。
- en: 'On the **Basics** page of the **Add a team** wizard, provide a **Name** value
    for the team and click **Next**:'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**添加团队**向导的**基本**页面，为团队提供一个**名称**值并点击**下一步**：
- en: '![Figure 6.6 – Creating a new team](img/B21234_06_06.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图6.6 – 创建新的团队](img/B21234_06_06.jpg)'
- en: Figure 6.6 – Creating a new team
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.6 – 创建新的团队
- en: On the **Owners** page, add at least one owner (such as the account managing
    the shared mailbox). Then, click **Next**.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**所有者**页面，添加至少一个所有者（例如管理共享邮箱的账户）。然后，点击**下一步**。
- en: On the **Members** page, add any additional members and click **Next**.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**成员**页面，添加任何其他成员并点击**下一步**。
- en: 'On the **Settings** page, enter a **Team email address** value. Then, click
    **Next**:'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**设置**页面，输入**团队电子邮件地址**值。然后，点击**下一步**：
- en: '![Figure 6.7 – Configuring an email address for the team](img/B21234_06_07.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图6.7 – 为团队配置电子邮件地址](img/B21234_06_07.jpg)'
- en: Figure 6.7 – Configuring an email address for the team
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.7 – 为团队配置电子邮件地址
- en: On the **Finish** page, review the settings and click **Add team**.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**完成**页面，检查设置并点击**添加团队**。
- en: Now, it’s on to the fun part!
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进入有趣的部分！
- en: Configuring a sentiment analysis flow
  id: totrans-65
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置情感分析流程
- en: As you learned earlier in this chapter, sentiment analysis provides a mechanism
    to evaluate content’s tone and provide an output. To address the business scenario
    of responding to negative customer feedback, you can use a sentiment analysis
    flow to process messages that are received by the shared mailbox.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在本章前面所学，情感分析提供了一种评估内容语气并提供输出的机制。为了应对处理负面客户反馈的业务场景，您可以使用情感分析流程来处理收到的共享邮箱中的消息。
- en: What do I do if I’m stuck?
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我遇到困难怎么办？
- en: 'If you run into a roadblock for some reason (can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您因为某些原因遇到障碍（找不到功能、选项没有显示或某些内容不清楚），帮助只需点击一下！您可以从我们的GitHub网站下载本章的工件：[https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution)。
- en: 'Let’s create the flow:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建流程：
- en: Navigate to the Power Automate Maker Portal ([https://make.powerautomate.com](https://make.powerautomate.com)).
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到Power Automate制作门户([https://make.powerautomate.com](https://make.powerautomate.com))。
- en: From the navigation menu, select **Create**.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
