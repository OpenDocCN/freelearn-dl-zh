  prefs: []
  type: TYPE_IMG
  zh: '![图6.19 – 选择整体文本情感令牌](img/B21234_06_19.jpg)'
- en: Figure 6.19 – Selecting the Overall text sentiment token
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.19 – 选择整体文本情感令牌
- en: 'In the right textbox, enter `negative`:'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右侧文本框中输入`negative`：
