  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.10 – 配置共享邮箱
- en: Select the credential that will be used to authenticate to the mailbox. If the
    credential is not listed, click **Add new** and provide the username and password
    for an account that has access to the shared mailbox.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择将用于验证邮箱的凭据。如果凭据未列出，则点击**添加新**并提供对共享邮箱有访问权限的账户的用户名和密码。
