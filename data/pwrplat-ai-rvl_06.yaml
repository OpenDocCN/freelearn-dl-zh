  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.25 – 编写测试电子邮件
- en: 'After sending the email, the flow run history should begin to update in the
    Power Automate Maker Portal:'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
