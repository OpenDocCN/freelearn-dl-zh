    to word it strongly to ensure you are expressing disapproval:'
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过向配置的共享邮箱发送电子邮件来测试您的流程。确保措辞强烈，以确保您表达的是不满：
- en: '![Figure 6.25 – Composing a test email](img/B21234_06_25.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图6.25 – 编写测试电子邮件](img/B21234_06_25.jpg)'
