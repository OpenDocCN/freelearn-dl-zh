  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.22 – 配置在聊天或频道中发布消息的操作
- en: Collapse the flyout.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收起飞出窗口。
- en: 'Review the flow’s layout and check for any obvious errors. See *Figure 6**.23*:'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看流程布局，并检查任何明显的错误。参见*图6.23*：
