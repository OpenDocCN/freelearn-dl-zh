- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Building an Internal GitHub Copilot Community
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 建立内部GitHub Copilot社区
- en: Over the course of the last years, we have been part of many rollouts and enablement
    programs at all sorts of customers, from less than a hundred developers to thousands.
    One thing that always stood out for us is that engineers are generally working
    on the same thing – adding value for their end users – but the way they achieve
    this tends to be different at every company, sometimes even between departments
    and teams. We also see that there is often a disconnect between teams, in the
    sense that they are not prone to or encouraged to share knowledge between their
    different cohorts. Often, the tools and ways of working stay within their own
    team/department/group, which leads to siloed information and different teams attempting
    to reinvent the wheel.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，我们一直是各种客户众多推广和启用计划的一部分，从不到一百名开发者到数千名。对我们来说，始终突出的一点是，工程师们通常在做同样的事情——为最终用户提供价值——但他们实现这一目标的方式往往在每个公司都不同，有时甚至在部门和团队之间也不同。我们还看到，团队之间往往存在脱节，即他们不太倾向于或鼓励在不同群体之间分享知识。通常，工具和工作方式都局限于他们自己的团队/部门/小组，这导致了信息孤岛和不同团队试图重新发明轮子。
- en: 'In this chapter, we share how we have helped to build communities with our
    customers and our own teams, to keep on learning from each other about novel use
    cases, or just new features that are being added to GitHub Copilot. We will cover
    the following topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们分享了我们如何帮助客户和我们的团队建立社区，从彼此那里不断学习新的用例，或者仅仅是GitHub Copilot新增的功能。我们将涵盖以下主题：
- en: Acknowledging the learning curve
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 承认学习曲线
- en: Using internal wikis
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用内部维基
- en: Setting up weekly Q&A sessions
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排每周问答会
- en: Creating newsletters
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建通讯稿
- en: Organizing hackathons
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组织黑客马拉松
- en: Surveying the users
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调查用户
- en: Looking at metrics
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查看指标
- en: Acknowledge the learning curve
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 承认学习曲线
- en: As seen in the last chapter, all efforts start with accepting the fact that
    there is a learning curve with these new generative AI tools – whether that’s
    Microsoft 365 Copilot, Claude, Gemini, or GitHub Copilot. Getting your team(s)
    to a point where they can really gain value with generative AI in their way of
    working takes both time and training.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如上章所见，所有努力都是从接受这些新的生成式AI工具存在学习曲线这一事实开始的——无论是微软365 Copilot、Claude、Gemini还是GitHub
    Copilot。让您的团队（们）达到能够真正从生成式AI中获益的程度，需要时间和培训。
- en: Just handing out a license and hoping people will figure it out is not good
    enough. We have met people who were very dismissive of generative AI and/or GitHub
    Copilot, because they had wild expectations of what these tools could do for them.
    Their leadership had dismissed the learning curve, and thus, the engineers tossed
    wild prompts at the tools and were not impressed with the results. After we spoke
    to them and delivered training about “getting started with GitHub Copilot,” they
    told us they now had a better understanding of what these tools are and how they
    can help them with their work, particularly within the bounds of what they can
    and cannot do.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 只是分发许可证并希望人们能弄懂是不够的。我们遇到过对生成式AI和/或GitHub Copilot非常轻视的人，因为他们对这些工具能为自己做什么有着天真的期望。他们的领导忽视了学习曲线，因此，工程师们向工具投掷了随意的提示，并对结果不以为然。在我们与他们交谈并提供了“GitHub
    Copilot入门”培训之后，他们告诉我们，现在他们对这些工具以及它们如何帮助他们工作有了更好的理解，尤其是在他们能做什么和不能做什么的范围内。
- en: 'After accepting the fact that you need to learn these new tools, we can take
    a look at how people learn. Everyone has a different way of learning, and most
    of their learning preferences fall into two categories: learning through training
    or learning by taking the tools for a spin. We’ll dive into these categories to
    give you a better understanding and have an idea of how you can cater to the different
    needs of different people as well. Though these are separate categories, most
    people follow the training in both categories, first getting a training that explains
    the core concepts and ideas, and then combining that with hands-on exercises to
    see the impact of the new tools in their own way of working.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在接受需要学习这些新工具的事实之后，我们可以看看人们是如何学习的。每个人都有不同的学习方法，他们的大多数学习偏好可以分为两类：通过培训学习或通过试用工具学习。我们将深入探讨这些类别，以便您更好地理解，并了解如何满足不同人的不同需求。尽管这些是不同的类别，但大多数人都会在这两个类别中接受培训，首先是接受解释核心概念和思想的培训，然后结合实际操作练习，以他们自己的方式看到新工具对他们工作方式的影响。
- en: Learning through training
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过培训学习
- en: A lot of people want to follow training to understand what these tools can do,
    how to apply them, and how to use their strengths and weaknesses to their advantage.
    Setting up a training path guides people through the learning flow and helps them
    align different features with steps in their process to produce their applications
    or solutions.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人想要通过培训来了解这些工具能做什么，如何应用它们，以及如何利用它们的优点和缺点来获得优势。设置一个培训路径可以引导人们通过学习流程，并帮助他们将不同的功能与他们的流程步骤对齐，以产生他们的应用程序或解决方案。
- en: 'We recommend following the flow from this book as well, by learning about generative
    AI and language models in particular, and then going from code completions to
    the chat with first Ask Mode, then Edit Mode, and finally, Agent Mode. On top
    of that, you can add the tools available in the Web UI for GitHub, such as the
    Chat interface to start gathering context for new issues, then pull request reviews,
    and the coding agent. You can see a schema for this flow here:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还建议按照这本书的流程进行，特别是通过了解生成式AI和语言模型，然后从代码补全到与第一阶段的“询问模式”聊天，再到“编辑模式”，最后是“代理模式”。除此之外，你还可以添加GitHub
    Web UI中可用的工具，例如用于开始收集新问题上下文的聊天界面，然后是拉取请求审查和编码代理。你可以在这里看到这个流程的架构：
- en: '![ Figure 9.1: Topic order during training](img/B34107_09_1.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图9.1：培训过程中的主题顺序](img/B34107_09_1.png)'
- en: 'Figure 9.1: Topic order during training'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1：培训过程中的主题顺序
- en: 'We follow this flow so that people gradually learn about the next level of
    co-creation with these tools, which helps to keep the expectations realistic.
    That’s also why we specifically do not start with Agent Mode from the get-go:
    without proper experience, there is too much room for error, sometimes with disastrous
    results. Skipping the basics, even up to including how generative AI works under
    the hood, leads to expecting that these tools are always correct and cannot fail.
    We want to prevent people from falling into that pit and guide them to success
    instead.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们遵循这个流程，以便人们逐渐了解使用这些工具进行下一级共创的知识，这有助于保持期望的合理性。这也是为什么我们一开始就不从代理模式开始的特定原因：没有适当的经验，错误的空间太大，有时会有灾难性的后果。跳过基础知识，甚至包括生成式AI在底层是如何工作的，会导致期望这些工具总是正确且不会失败。我们希望防止人们陷入这个陷阱，并引导他们走向成功。
- en: To transfer knowledge to engineers, you can either have someone delive r a live
    training (either in-person or online) or you can let people watch a prerecorded
    session. Keep in mind that there are people with different preferences and different
    learning needs. We recommend catering for both types of training. Some people
    prefer to watch a video, as they can pause, rewind, and retry, whereas some people
    prefer to have live training, as they can ask questions and directly get an answer.
    We’ve even met people who do both – they want to see the recording (and rewind
    to get a better understanding) and then come to a training session to ask those
    follow-up questions and really internalize the content.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 要将知识传授给工程师，你可以让某人提供现场培训（无论是面对面还是在线），或者你可以让人们观看预先录制的会议。请记住，有些人有不同的偏好和不同的学习需求。我们建议同时满足这两种培训类型。有些人喜欢观看视频，因为他们可以暂停、倒退和重试，而有些人则更喜欢现场培训，因为他们可以提问并直接得到答案。我们甚至遇到过同时做这两件事的人——他们想看录像（并倒退以获得更好的理解），然后参加培训会议来提出后续问题并真正吸收内容。
- en: 'From our experience, we’ve learned that it helps to meet people where they
    are and offer multiple ways for them to engage with the material and the trainers.
    We’ve been with customers who had set up entire learning paths in their e-learning
    environments, where they noticed that people were not looking at those training
    materials at all. Those customers made the mistake of just handing everyone a
    license, pointing them to the internal or external e-learning platform, and that
    was the extent of “enablement” for a new tool. Those customers did not acknowledge
    the learning curve (or even worse: expected all engineers to look at the training
    in their own time) and saw that engineers were not engaged and thus not getting
    the promised value from the new tools.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们的经验来看，我们了解到，在人们所在的地方与他们见面，并为他们提供多种方式来参与材料和培训师互动是有帮助的。我们曾与那些在他们的电子学习环境中设置了整个学习路径的客户一起工作，他们注意到人们根本不会查看那些培训材料。这些客户犯了一个错误，就是只是给每个人发放许可证，指向内部或外部的电子学习平台，这就是新工具“启用”的全部内容。这些客户没有认识到学习曲线（甚至更糟糕的是：期望所有工程师在自己的时间里观看培训）并看到工程师们没有参与，因此没有从新工具中获得承诺的价值。
- en: We recommend combining all options, so people can choose. Planning live training
    helps to clear time in people’s agendas, so that they can dive into the new tools.
    It also gives a clear signal of support from the company’s management, as you
    indicate that it is important to allot time for this training and not spend it
    on their normal work. Next to that, give them access and time for prerecorded
    content, and then arrange follow-up sessions for Q/A, hackathons, and so on. Doing
    all these things is needed not only when first rolling out the access for the
    tools, but also for new joiners, or for people who have been using the tools for
    a while. The generative AI space is moving so fast that just for GitHub Copilot,
    we have “What’s new since the last time” sessions with engineers at least every
    six months!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们建议结合所有选项，让人们可以选择。规划现场培训有助于在人们的日程中腾出时间，以便他们可以深入探索新工具。这也向公司管理层发出了明确的支持信号，因为你表明为这次培训分配时间比将其用于他们的正常工作更重要。此外，给他们提供预录内容的访问权限和时间，然后安排后续的问答、黑客马拉松等活动。做所有这些事情不仅是在首次推出工具访问权限时需要，对于新加入的人，或者已经使用了一段时间的人来说也是如此。生成式AI领域发展迅速，仅就GitHub
    Copilot而言，我们至少每六个月就会与工程师举行“上次以来有什么新变化”的会议！
- en: Learning from using the tools
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过使用工具学习
- en: The second learning category is learning by getting hands-on experience. Some
    people have been following along with the news of generative AI or GitHub Copilot,
    and they want to dive straight in and see how things work in their own development
    flows.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种学习类别是通过实际操作经验学习。有些人一直在关注生成式AI或GitHub Copilot的新闻，他们想直接深入其中，看看这些工具在自己的开发流程中是如何工作的。
- en: As we have seen in [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041) , there is
    a Free plan available for those who want to see how the tools perform in their
    own editors, so that is an easy way to start. Do note that even these folks are
    helped with some formal training, so do offer them the option to get going and
    then still join a training session. The training is meant to give extra context,
    discuss different capabilities, and showcase situations people might not have
    thought of to apply these tools to. As mentioned earlier, some people often combine
    both learning categories discussed, rather than following them separately.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在[*第3章*](Chapter_3.xhtml#_idTextAnchor041)中看到的，对于那些想看看工具在自己编辑器中的表现的人来说，有一个免费计划，这是一个简单的开始方式。请注意，即使是这些人也会得到一些正式培训的帮助，所以也提供给他们开始的机会，然后仍然可以参加培训课程。培训旨在提供额外的背景信息，讨论不同的功能，并展示人们可能没有考虑过将这些工具应用到的情况。如前所述，有些人经常将讨论的两个学习类别结合起来，而不是分别遵循它们。
- en: 'To help people discover the main features of GitHub Copilot, we split the hands-on
    into two separate parts: we start with generic examples to try out in a controlled
    environment, and then let them apply the tools to their own code, with defined
    tasks. There are plenty of online resources that can be used for generic examples.
    The one we recommend is Copilot Adventures, created by Microsoft Learn: [https://microsoft.github.io/CopilotAdventures](https://microsoft.github.io/CopilotAdventures)
    . It has exercises to take you through different coding scenarios and lets you
    choose the adventure based on the level of proficiency you already have with GitHub
    Copilot. Even better, these scenarios are updated over time as well, with recent
    additions being custom chat modes and Model Context Protocol adventures.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助人们发现GitHub Copilot的主要功能，我们将实际操作分为两个独立的部分：我们首先在受控环境中尝试一些通用示例，然后让他们将工具应用到自己的代码中，完成定义的任务。有很多在线资源可以用于通用示例。我们推荐的是由Microsoft
    Learn创建的Copilot Adventures：[https://microsoft.github.io/CopilotAdventures](https://microsoft.github.io/CopilotAdventures)
    。它包含一系列练习，带你通过不同的编码场景，并允许你根据自己的GitHub Copilot熟练程度选择冒险。更好的是，这些场景也会随着时间的推移而更新，最近新增的是定制聊天模式和模型上下文协议冒险。
- en: '![Figure 9.2: Copilot Adventures](img/B34107_09_2.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图9.2：合作冒险](img/B34107_09_2.png)'
- en: 'Figure 9.2: Copilot Adventures'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2：合作冒险
- en: We always propose setting aside time for people to take the time to go through
    these exercises. This shows engineers again that you take the tool and the training
    for it seriously, instead of hoping they follow these exercises in their own time.
    If you do not allocate a timeslot(s) for it, people usually skip it (there is
    always “work” to do), and then they do not progress as much to become really proficient
    with the tools.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们总是建议留出时间让人们有足够的时间去完成这些练习。这再次向工程师表明，你认真对待工具及其培训，而不是希望他们在自己的时间里完成这些练习。如果你不为它分配时间（总有一些工作要做），人们通常会跳过它，然后他们就不会进步很多，无法真正熟练地使用这些工具。
- en: After acknowledging the learning curve and planning training sessions, we recommend
    starting up an internal community so that people can find each other, share learnings
    and updates, and continuously see how other people are using the tools in their
    context. Often, companies do not have these kinds of communities, so this can
    be the beginning of becoming a knowledge-sharing company as well, bringing different
    teams and sectors of the company together. In the following sections, we will
    take a look at some of these methods, such as wikis, Q&A sessions, hackathons,
    and more.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在承认学习曲线并计划培训课程后，我们建议启动一个内部社区，以便人们可以找到彼此，分享学习和更新，并持续了解其他人如何在他们的环境中使用这些工具。通常，公司没有这样的社区，因此这也可以是成为知识共享公司的开始，将公司的不同团队和部门聚集在一起。在接下来的章节中，我们将探讨一些这些方法，例如维基、问答会、黑客马拉松等。
- en: If you want to dive even deeper, there is a great community example available
    at [https://github.com/orgs/community/discussions/86520](https://github.com/orgs/community/discussions/86520)
    , where GitHub shows you how to use GitHub Discussions (a Q/A style forum), straight
    from your normal GitHub repository!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要更深入地了解，可以在[https://github.com/orgs/community/discussions/86520](https://github.com/orgs/community/discussions/86520)找到一个非常棒的社区示例，GitHub在这里展示了如何直接从你的正常GitHub仓库使用GitHub
    Discussions（一种问答风格的论坛）！
- en: Internal wikis
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 内部维基
- en: People always need to be able to find internal documentation, information to
    access training, links to internal support on getting a license and installations,
    and so on. Most companies have an internal way for the community to gather and
    share this kind of information, and there often is a person or a team responsible
    for crafting this documentation and keeping things up to date.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 人们总是需要能够找到内部文档、访问培训的信息、获取许可证和安装的内部支持链接等。大多数公司都有一种内部方式让社区聚集和分享这类信息，通常有一个人或一个团队负责制作这份文档并保持其更新。
- en: 'Here is some content that we often include in the wikis we helped with:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们协助的维基中，我们通常会包含以下内容：
- en: Instructions on how to download and install the editors your company prefers,
    together with the necessary GitHub Copilot extensions.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何下载和安装贵公司偏好的编辑器以及必要的GitHub Copilot扩展的说明。
- en: Information on how to get internal support for the new tools, such as where
    people can ask questions, how to get a license, and so on.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于如何获得对新工具内部支持的信息，例如人们可以提问的地方、如何获取许可证等。
- en: Instructions on how to regularly update both the editor and the GitHub Copilot
    extensions. The extension updates come by so fast that they contain a “minimal
    editor version” that is required. They even build new features into the editor
    all the time to provide new APIs for the extensions to use, so updating the editor
    itself is also paramount. We advise keeping the editor up to date with at least
    the most recent minus to minor version releases – release numbers are usually
    in the form of *major.minor.patch* , so when v1.100.0 is released, the users should
    at least be at v1.98.0, including the most recent version of the extensions.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何定期更新编辑器和GitHub Copilot扩展的说明。扩展更新来得如此之快，以至于它们包含一个“最小编辑器版本”的要求。他们甚至不断地在编辑器中构建新功能，为扩展提供新的API，因此更新编辑器本身也是至关重要的。我们建议至少将编辑器更新到最新的减去次要版本发布——发布号通常以*主要.次要.补丁*的形式出现，所以当v1.100.0发布时，用户至少应该使用到v1.98.0，包括扩展的最新版本。
- en: Information on what the internal guidelines are for using GitHub Copilot, what
    editors are supported in the internal environment, and how to follow along with
    the internal community and receive news updates.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于使用GitHub Copilot的内部指南，支持哪些编辑器在内部环境中，以及如何跟随内部社区并接收新闻更新的信息。
- en: Group information about new features and the editor updates that are needed
    to unlock them.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于新功能和需要解锁它们的编辑器更新的分组信息。
- en: Don’t forget to add an online version of any news bulletins you send out, for
    example, announcements or a newsletter. That way, people can search for and reference
    them later, such as when someone new joins their team.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要忘记添加任何发送的新闻快报的在线版本，例如，公告或通讯。这样，人们可以在以后搜索和引用它们，例如，当有人加入他们的团队时。
- en: Weekly Q&A sessions
  id: totrans-42
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 每周问答会
- en: Even after all the training sessions and hands-on times, people will have questions,
    and there will be new updates to share. Neither GitHub nor the editor teams are
    sitting still, and the field of generative AI and ways to add it to the developer
    workflow are evolving all the time.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在所有培训会议和动手实践之后，人们仍会有问题，也会有新的更新要分享。GitHub 和编辑团队都没有停滞不前，生成式 AI 领域以及将其添加到开发者工作流程的方法都在不断演变。
- en: We therefore recommend that for at least the first six months after starting
    the program, you keep doing these sessions on a weekly basis. There will always
    be people installing GitHub Copilot for the first time, or they discover a feature,
    or run into things they can use some help with. We use the Q&A sessions to drive
    the community feeling, update the wiki with recurring questions, and ask the group
    for topics they want to know more about. Those topics can then be used for a demo
    in the next session, or as a starting point for a new knowledge-sharing session
    (or even training) that can be recorded for future use.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们建议在项目开始后的前六个月内，至少每周进行这些会议。总会有第一次安装 GitHub Copilot 的人，或者他们发现了一个功能，或者遇到了需要帮助的事情。我们使用问答会来推动社区感，更新维基上的常见问题，并询问小组他们想了解更多信息的话题。这些话题可以用于下次会议的演示，或者作为新知识分享会（甚至培训）的起点，这些会议可以录制以供将来使用。
- en: Getting insights from the community during these sessions helps massively to
    connect people as well. When someone asks for more examples to create unit tests
    with GitHub Copilot, and someone else responds that they have a great flow or
    prompt for it, you have just connected them, often across departments as well!
    Follow up on those examples by asking those folks to record a blog post to put
    on the wiki, or a short video explaining their process, and all of a sudden, you
    have another topic to share internally.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些会议期间从社区中获得见解，极大地帮助人们建立联系。当有人请求更多使用 GitHub Copilot 创建单元测试的示例时，另一个人回应说他们有一个很好的流程或提示，你刚刚就连接了他们，有时甚至跨越了部门！通过询问这些人记录一篇博客文章放到维基上，或者一个解释他们过程的简短视频，突然之间，你就有了一个可以内部分享的新主题。
- en: 'These kinds of mini knowledge-sharing sessions work like a charm: instead of
    a trainer giving often canned demos, now you have someone internally sharing their
    story of how the tools help them, with their internal environment, tool stack,
    and coding language. Keep asking for examples from the community, because the
    more examples of different environments you get, the more people can translate
    them into their own processes as well!'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这类迷你知识分享会效果显著：不再是培训师提供通常的演示，现在有人内部分享他们如何使用工具的故事，包括他们的内部环境、工具栈和编程语言。继续从社区中寻求示例，因为得到的不同环境示例越多，人们就越能将它们转化为自己的流程！
- en: Newsletters
  id: totrans-47
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通讯
- en: As we indicated before, it is important to meet people where they are. For a
    lot of people, we have seen that they either think that they know everything already,
    or they think they are too busy to spend time researching the wiki or visiting
    the Q&A sessions, and so on. Providing a simple recap of the news in the form
    of a newsletter can help folks scan the news for things that might seem interesting
    to them and then lead them to the wiki or a mini knowledge-sharing video.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所指出的，在人们所在的地方与他们见面很重要。对于很多人来说，我们注意到他们要么认为他们已经知道了一切，要么认为他们太忙了，没有时间研究维基或参加问答会等。以通讯的形式提供新闻的简单总结可以帮助人们扫描新闻，寻找可能对他们感兴趣的事情，然后引导他们到维基或迷你知识分享视频。
- en: 'Here are some helpful tips for creating newsletters:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些创建通讯的有用提示：
- en: Keep the newsletter informative and spruce it up with some screenshots and humorous
    images. Luckily, GitHub has a great mascot, Mona the Octocat (a combination of
    a cat and an octopus), and they have even created a personalizer for it that can
    be found at [https://myoctocat.com](https://myoctocat.com) .
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持通讯内容丰富，并添加一些截图和幽默的图片来装饰它。幸运的是，GitHub 有一个很棒的品牌吉祥物，Mona the Octocat（猫和章鱼的结合），他们甚至为它创建了一个个性化网站，可以在[https://myoctocat.com](https://myoctocat.com)找到。
- en: '![Figure 9.3: Different ways to do something playful with Mona](img/B34107_09_3.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.3：与 Mona 玩耍的不同方式](img/B34107_09_3.png)'
- en: 'Figure 9.3: Different ways to do something playful with Mona'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.3：与 Mona 玩耍的不同方式
- en: We always combine the news of the last week(s) in the newsletter with some recurring
    questions (with links to the wiki) and include some novel use cases we have seen
    GitHub Copilot used for.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们总是将上周（s）的新闻与一些常见问题（附带对维基的链接）结合起来，并包括一些我们看到 GitHub Copilot 被用于的新用例。
- en: Provide links back to the Q&A sessions to bring in more audience and point out
    how folks can get support if they cannot wait for the Q&A session to happen.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供链接回问答环节，以吸引更多观众，并指出如果他们无法等待问答环节开始，人们如何获得支持。
- en: Keeping up to date with all the news online is quite a challenge. Every editor
    has one or more websites to follow, and there is often both a post from the editor
    team itself and one from GitHub as well. You can follow all those blogs one by
    one or combine them into a single news source like we did for ourselves and our
    company’s training teams. Together, we have built [https://github-copilot.xebia.ms](https://github-copilot.xebia.ms)
    , which we often revisit right before a Q&A session or when writing a new edition
    of the newsletter.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 紧跟所有在线新闻是一项相当大的挑战。每个编辑都有一个或多个网站要关注，通常既有编辑团队自己的帖子，也有来自 GitHub 的帖子。你可以逐个关注这些博客，或者将它们组合成一个像我们为自己和公司培训团队所做的那样单一的新闻来源。我们共同建立了
    [https://github-copilot.xebia.ms](https://github-copilot.xebia.ms)，我们经常在问答环节之前或撰写新版本通讯之前重新访问它。
- en: Hackathons
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 黑客马拉松
- en: Most people learn by doing, and this is where we use hackathons. This allows
    us to get people out of their normal day-to-day context and into a new and clean
    environment. Planning these sessions into their calendars also shows the commitment
    to invest time (and thus money) into their training and understanding of the new
    tools. We normally use at least 2 hours for hackathons, and up to half of a normal
    day.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人通过实践学习，这就是我们使用黑客马拉松的原因。这让我们能够让人们摆脱他们日常的日常环境，进入一个新而干净的环境。将这些会议纳入他们的日程表也显示了他们投入时间（从而金钱）进行培训和了解新工具的承诺。我们通常为黑客马拉松安排至少
    2 小时，最多可达正常工作日的一半。
- en: 'There are several options to set people to work, and often we have multiple
    hackathons planned to give people a chance to gradually grow through the different
    features of GitHub Copilot. Participants can do the following:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以让人工作，我们通常计划多个黑客马拉松，让人们有机会通过 GitHub Copilot 的不同功能逐步成长。参与者可以执行以下操作：
- en: 'Hack away at a completely new project (often a game). This involves the following:'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一个全新的项目（通常是游戏）上大显身手。这包括以下内容：
- en: Starting research from scratch
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从零开始进行研究
- en: Implementing tools/languages/SDKs that they are not familiar with
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施他们不熟悉的工具/语言/SDK
- en: Adding testing and documentation
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加测试和文档
- en: Switching the project to a different team and learning from their approach and
    setup
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将项目切换到不同的团队，并从他们的方法和设置中学习
- en: This hackathon helps to look at your coding process with a fresh view, and gives
    you the opportunity to leave existing steps behind. This leads to some great new
    insights.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这次黑客马拉松有助于以全新的视角审视你的编码过程，并给你一个机会摆脱现有的步骤。这导致了一些新的深刻见解。
- en: 'Hack away at your own project. This involves the following:'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你自己的项目上大显身手。这包括以下内容：
- en: Focusing first on all sorts of technical debt, as adding those to the project
    often improves the results of GitHub Copilot
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先关注各种技术债务，因为将这些添加到项目中通常会提高 GitHub Copilot 的结果
- en: Adding missing integration/unit tests, documentation, improving the README,
    adding custom instructions, and so on
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加缺失的集成/单元测试、文档、改进 README、添加自定义指令等
- en: In this hackathon, part of the instructions are to refrain from writing any
    code and using GitHub Copilot as much as possible. This leads to using the new
    features and especially helps people to start using the Chat interface for most
    of their work.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次黑客马拉松中，部分指示是尽量不编写任何代码，尽可能多地使用 GitHub Copilot。这导致人们使用新功能，特别是帮助人们开始使用聊天界面来完成大部分工作。
- en: These hackathons are always fun and give people the opportunity to step outside
    their comfort zone. To enable that, we have several tips to share that we use
    all the time.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这些黑客马拉松总是很有趣，给人提供了一个机会走出他们的舒适区。为了实现这一点，我们有一些我们经常使用的提示要分享。
- en: Always open with a GitHub Copilot feature
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总是以 GitHub Copilot 的一个功能开始
- en: We always open up the hackathon with a specific topic and link it to a common
    goal we have. For example, some teams may have a quarterly initiative to focus
    on quality improvements. Based on that, the topic could be improving trust in
    changes before deployment, and the task could be “how to improve unit test coverage
    with GitHub Copilot.”
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们总是以一个特定的主题开始黑客马拉松，并将其与我们的共同目标联系起来。例如，一些团队可能有季度性的倡议，专注于质量改进。基于这一点，主题可以是改进部署前的变更信任度，任务可以是“如何使用
    GitHub Copilot 提高单元测试覆盖率。”
- en: People are often searching for the intent of the exercise and may be uncertain
    what is expected of them, so this approach helps them along. Make it a story with
    a presentation/some slides, and demonstrate the functionality. Once they have
    (re)seen the feature, they can be tasked to work with that feature for the challenge
    or topic at hand that you give them.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 人们常常在寻找练习的目的，并可能不确定对他们有什么期望，所以这种方法帮助他们前进。把它变成一个故事，配上展示/一些幻灯片，并演示其功能。一旦他们（重新）看到了这个功能，他们就可以被分配去使用这个功能来完成你给他们指定的挑战或主题。
- en: You might also consider splitting up features, functionality, or refactoring,
    focusing on how to approach it with GitHub Copilot, and then letting teams apply
    that approach to improve their own code.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以考虑将功能、功能或重构拆分，专注于如何使用 GitHub Copilot 来处理它，然后让团队应用这种方法来改进他们自己的代码。
- en: Mix and mingle
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混合交流
- en: Hackathons are excellent for letting people explore other teams and their way
    of working. We bring different teams together and let them work in pairs, with
    the recommendation to work with someone outside of their team. Suddenly, they
    are learning new teams’ processes, editors, or languages. Often, people do not
    look across their team’s borders and scopes, so this is a real improvement. You
    can also help this process along by, for example, mixing them up based on years
    of engineering experience, proficiency with GitHub Copilot, and so on.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 黑客马拉松是让人们探索其他团队及其工作方式的好方法。我们让不同的团队聚集在一起，让他们成对工作，建议他们与团队外的人合作。突然之间，他们开始学习新团队的过程、编辑器或语言。通常，人们不会跨越他们团队的范围和范围，所以这是一个真正的改进。你也可以通过例如根据工程经验年数、GitHub
    Copilot 熟练程度等因素来混合他们，以帮助这个过程。
- en: 'In the first type of hackathon, where participants work on new projects, we
    also switch things around: after working on their project for two-thirds of the
    time, we let them push the repo and get the repo from another team. This reinforces
    that everyone (often) uses a different approach. With GitHub Copilot, teams can
    use the Chat interface to research new routes and solutions, generate changes,
    and send pull requests with improvements. For lots of teams, this is already a
    big eye-opener as they are often super closed in their way of working, and not
    a lot of collaboration is happening in their environments.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种类型黑客马拉松中，参与者从事新项目时，我们也进行了一些调整：在项目上投入三分之二的时间后，我们让他们推送仓库并从另一个团队获取仓库。这强化了每个人（通常）使用不同方法的事实。使用
    GitHub Copilot，团队可以使用聊天界面来研究新的路线和解决方案，生成更改，并提交带有改进的拉取请求。对于许多团队来说，这已经是一个很大的启发，因为他们通常非常封闭在自己的工作方式中，他们的环境中很少发生协作。
- en: Report out/giveaway prizes
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 报告结果/颁发奖品
- en: At the end of the hackathon, we invite participants to present their learnings,
    solutions, or the value they added to their application. Discussing how GitHub
    Copilot helped them brings another level of connection to other people and teams,
    encouraging learning from each other, and being able to ask follow-up questions
    for points that piqued their interest. This is a really good way to close out
    the session, as well as celebrate the lessons learned.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在黑客马拉松结束时，我们邀请参与者展示他们的学习成果、解决方案或他们为应用程序增加的价值。讨论 GitHub Copilot 如何帮助他们带来了与其他人和团队更深层次的联系，鼓励相互学习，并能够就引起他们兴趣的点提出后续问题。这是一个非常好的结束会议的方式，同时也是庆祝所学知识的好方法。
- en: We often bring small prizes to the session for the people with the best story,
    approach, or lesson learned. We specifically do not focus on who built the best
    solution or who was the fastest. Instead, we prioritize what participants learned,
    their openness about the challenges they faced, and how thoughtfully they pursued
    their goals with GitHub Copilot. Seeing people open up and helping other people
    forward – those are the things we cherish. And let’s face it, giving people a
    little memento of their hard work is always a good idea.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常为那些故事、方法或学到的经验最好的参与者带来小奖品。我们特别不关注谁构建了最好的解决方案或谁最快。相反，我们优先考虑参与者学到了什么，他们对自己面临的挑战的开放性，以及他们如何深思熟虑地使用GitHub
    Copilot追求目标。看到人们敞开心扉并帮助他人前进——这些都是我们珍视的事情。而且，坦白说，给人们一点他们辛勤工作的纪念品总是一个好主意。
- en: So, as you can see, hackathons are a great way to set a direction for people
    and have them discover the new tools and capabilities they have now learned. The
    hands-on part of this helps to understand the impact of generative AI on their
    way of working, and doing that with different teams helps to bring people together
    across the internal boundaries. This is a great way to kick-start the community
    as well!
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，正如你所看到的，黑客马拉松是设定方向并让人们发现他们现在学到的新工具和功能的一个极好方式。这个动手的部分有助于理解生成式AI对他们工作方式的影响，并且与不同团队一起这样做有助于打破内部界限，将人们聚集在一起。这是启动社区的一个极好方式！
- en: Surveys
  id: totrans-81
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 调查
- en: Learning about new tools that integrate into your way of working is always a
    journey and is never complete. Especially with GitHub Copilot and the momentum
    that generative AI has these days, there is something new each day. Even if you
    share new features in a newsletter all the time, and have regular hackathons and
    weekly Q/A sessions, you (or your management) probably want to know and learn
    from the engineers how they are using the tools in their development processes,
    find some power users that can share their top tips, or learn where the tool does
    not work so well so that you can have a look at how that could be improved.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 了解如何将新工具整合到你的工作方式中总是一个旅程，而且永远不会结束。特别是随着GitHub Copilot和当前生成式AI的势头，每天都有新的东西出现。即使你总是通过通讯稿分享新功能，定期举办黑客马拉松和每周问答会话，你（或你的管理层）可能还是想了解并从工程师那里学习他们如何在开发过程中使用这些工具，找到可以分享他们顶级技巧的强大用户，或者了解工具在哪些方面表现不佳，以便你可以看看如何改进。
- en: 'One of the ways to learn about all this is to ask the GitHub Copilot users:
    “What feedback do you have for this tool?” There are all sorts of tools on the
    market to help out with this: from entire “developer experience” methodologies
    with tools included, to a standard survey tool. You can use the tools your company/team
    already uses and expand when needed.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 了解所有这些的一种方法就是向GitHub Copilot用户提问：“你对这个工具有什么反馈？”市场上有很多工具可以帮助你做到这一点：从包含工具的整个“开发者体验”方法论，到标准的调查工具。你可以使用公司/团队已经使用的工具，并在需要时进行扩展。
- en: Our tip is to keep the survey low-key and to position it as a way for users
    to provide feedback. We have seen all sorts of motions in these surveys in an
    attempt to get people to respond to them. Some surveys try to ask for way too
    much information that has nothing to do with GitHub Copilot. If your survey has
    more than 10 questions, the response rate will be impacted negatively by it. The
    sweet spot seems to be 4–6 questions, maximum.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的技巧是保持调查低调，将其定位为用户提供反馈的一种方式。我们见过各种在调查中采取的行动，试图让人们做出回应。有些调查试图索取与GitHub Copilot无关的大量信息。如果你的调查问题超过10个，那么它会对响应率产生负面影响。最佳选择似乎是4-6个问题，最多。
- en: Also, keep in mind that people often only get vocal about things when they do
    not like certain aspects of them. Happy people keep rather quiet about the tools
    that they use, until you revoke their access. We have even been with companies
    that make these surveys mandatory in order to keep your license. In our opinion,
    that is not necessarily motivational to get good quality responses.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请记住，人们通常只有在他们不喜欢某个方面时才会大声说出他们的不满。快乐的人通常对使用的工具保持沉默，直到你撤销他们的访问权限。我们甚至见过一些公司将这些调查作为保持许可证的强制条件。在我们看来，这并不一定能激励人们提供高质量的反馈。
- en: When sending out a survey, if you already know about certain data points (such
    as years of experience with a language or SDK), then keep them out of the survey.
    Ask questions such as “Does GitHub Copilot help you in your day-to-day (coding)
    work?” or “Would you like to receive more training on specific topics with GitHub
    Copilot?”. Don’t forget to have options to elaborate on their answer, as a simple
    yes/no might not be sufficient everywhere.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 当发送调查时，如果你已经了解某些数据点（例如使用某种语言或SDK的年数），那么请将它们从调查中排除。提出像“GitHub Copilot是否帮助你在日常（编码）工作中？”或“你希望从GitHub
    Copilot获得更多特定主题的培训吗？”这样的问题。别忘了提供选项来详细说明他们的答案，因为简单的“是/否”可能并不总是足够。
- en: 'In the following table, you can see an overview of dos and don’ts when it comes
    to surveys:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下表格中，你可以看到关于调查的注意事项概览：
- en: '| **Dos** | **Don’ts** |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| **应该做的** | **不应该做的** |'
- en: '| Encourage continuous learning about tools such as GitHub Copilot | Assume
    the learning journey is ever complete |'
  id: totrans-89
  prefs: []
  type: TYPE_TB
  zh: '| 鼓励持续学习关于GitHub Copilot等工具的知识 | 假设学习之旅永远无法完成 |'
- en: '| Share new features regularly (e.g., newsletters, hackathons, and Q&A) | Rely
    solely on top-down communication – engage engineers directly |'
  id: totrans-90
  prefs: []
  type: TYPE_TB
  zh: '| 定期分享新功能（例如，通讯简报、黑客马拉松和问答环节） | 仅仅依赖自上而下的沟通——直接与工程师互动 |'
- en: '| Identify power users and gather their tips | Ignore feedback from actual
    users of the tool |'
  id: totrans-91
  prefs: []
  type: TYPE_TB
  zh: '| 识别高级用户并收集他们的建议 | 忽视工具的实际用户反馈 |'
- en: '| Ask users for feedback through surveys | Make surveys overly formal or complex
    |'
  id: totrans-92
  prefs: []
  type: TYPE_TB
  zh: '| 通过调查向用户收集反馈 | 使调查过于正式或复杂 |'
- en: '| Use existing tools that your team is familiar with for feedback collection
    | Force adoption of unfamiliar or overly elaborate feedback tools |'
  id: totrans-93
  prefs: []
  type: TYPE_TB
  zh: '| 使用团队熟悉的现有工具进行反馈收集 | 强制采用不熟悉或过于复杂的反馈工具 |'
- en: '| Keep surveys low-key and positioned as a feedback opportunity | Make surveys
    mandatory to retain access; this can reduce response quality |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
  zh: '| 保持调查低调，将其定位为反馈机会 | 将调查作为保留访问权限的强制要求；这可能会降低回答质量 |'
- en: '| Keep surveys short and focused | Ask for information you already have (e.g.,
    experience level) |'
  id: totrans-95
  prefs: []
  type: TYPE_TB
  zh: '| 保持调查简短并聚焦 | 询问你已经拥有的信息（例如，经验水平） |'
- en: '| Include open-ended questions for elaboration | Rely only on yes/no questions
    without room for context |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
  zh: '| 包含开放式问题以供详细说明 | 仅依靠没有上下文空间的“是/否”问题 |'
- en: 'Figure 9.4: Dos and don’ts of surveys'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.4：调查的注意事项
- en: After doing all the work to get people to use the new tooling and embrace that
    in their work, it is time to take a look at measuring the usage as well. As you
    are paying licenses for these tools and have taken the time to make sure you can
    use them in compliance with the company’s internal policies around security, legal,
    and responsible usage, there will be a need to look a certain information around
    usage statistics.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成所有工作以使人们使用新工具并在工作中接受这些工具之后，是时候考虑如何衡量这些工具的使用情况了。既然你们为这些工具支付了许可证费用，并花费了时间确保你们可以在符合公司关于安全、法律和负责任使用内部政策的情况下使用它们，那么查看有关使用统计信息的相关信息将变得必要。
- en: Metrics
  id: totrans-99
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 指标
- en: Discussing metrics on tools such as GitHub Copilot can be a book all of its
    own. There is a lot of research on how to measure developer output (also referred
    to as *productivity* ) and what that means. We see customers wanting to take a
    look at this data as well, but most of them have not started to think of what
    developer output is, let alone how to compare it.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 讨论GitHub Copilot等工具的指标可以是一本完整的书。关于如何衡量开发者产出（也称为*生产力*）及其含义的研究有很多。我们看到客户也想要查看这些数据，但他们中的大多数人还没有开始思考开发者产出是什么，更不用说如何比较它了。
- en: It is also hard to determine how to measure (developer) output and what a significant
    improvement in that output would be. Companies often only look at things they
    can measure, which quickly becomes things such as lines of code, number of pull
    requests, story points, and so on. However, engineers add value to applications
    in different ways than just adding extra code – their value is in making the application
    more performant, more secure, or better able to handle the user’s needs. With
    the investments that need to be made to enable engineers with GitHub Copilot,
    companies feel the need to look at developer productivity again, to justify the
    investments that need to be made.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 确定如何衡量（开发者）产出以及产出显著改进的标准也很困难。公司通常只关注他们可以测量的东西，这很快就会变成诸如代码行数、拉取请求数量、故事点等等。然而，工程师通过不同的方式为应用程序增加价值，而不仅仅是添加额外的代码——他们的价值在于使应用程序更高效、更安全或更好地满足用户需求。随着需要为GitHub
    Copilot赋能工程师而进行的投资，公司感到有必要再次关注开发者生产力，以证明所需投资是合理的。
- en: It is often overlooked that the impact of generative AI is also in other aspects
    of our work, from ideation (issues or user stories) to architectural work, to
    a change in the number of review comments, or bugs found in production. All these
    things can be a result of using tools such as GitHub Copilot in your workflows.
    The hard part with these metrics is that looking at them can give a sense of developers
    being more productive than before, while there is a lot more to the story than
    just having more of the things you are measuring as “developer productivity.”
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 人们往往忽视了生成式AI对我们工作其他方面的影响，从构思（问题或用户故事）到架构工作，再到审查评论数量的变化，或者生产中发现的bug。所有这些都可以是使用GitHub
    Copilot等工具在工作流程中的结果。这些指标难以理解的地方在于，观察它们可能会给人一种开发者比以前更高效的感觉，而故事远不止于你所测量的“开发者生产力”的增加。
- en: Take, for example, the number of **pull requests** ( **PRs** ) merged in a given
    period. Is merging a PR really a measure of success? Does that take into account
    the size of the PR? What about the quality of the PR? Can we perhaps measure that
    by looking at the number of bugs that are introduced with these code changes?
    The impact of these changes further down in the system is often overlooked. Even
    the change in the size (amount of files/lines changed) of the PR can be an indicator
    of people changing their way of working. Having a bigger PR might mean the engineer
    was able to complete the changes to a feature in one go, but it might also mean
    they are not validating all the changes locally, as “the AI made them.”
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个特定时间段内合并的**pull requests**（**PRs**）数量为例。合并PR真的是衡量成功的标准吗？这考虑了PR的大小吗？PR的质量又如何？我们是否可以通过观察这些代码更改引入的bug数量来衡量这一点？这些更改在系统中的影响往往被忽视。甚至PR的大小（更改的文件/行数）的变化也可能是一个人们改变工作方式的指标。更大的PR可能意味着工程师能够一次性完成某个功能的更改，但也可能意味着他们没有在本地验证所有更改，因为“AI帮他们做了”。
- en: 'Instead, we need to look at different information on the PR:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，我们需要关注PR（Pull Requests，拉取请求）上的不同信息：
- en: Are the PRs getting bigger/smaller over time? Is this because of GitHub Copilot,
    or does it have other reasons?
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着时间的推移，PR是变得更大/更小吗？这是否是因为GitHub Copilot，还是有其他原因？
- en: How does that impact the number of comments in the PR review? If people use
    AI to generate the code, does the quality and clarity of the code go up or down?
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这对PR审查中的评论数量有何影响？如果人们使用AI生成代码，代码的质量和清晰度是提高还是降低？
- en: Are the CI builds for the PRs failing more often with the use of GitHub Copilot?
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用GitHub Copilot后，PR的CI（持续集成）构建失败是否更频繁？
- en: These aspects say something about what we call the “downstream impact” of GitHub
    Copilot. Just looking at metrics on things we can measure only tells half of the
    story if you do not look at impact later in the software development lifecycle.
    The downstream impact shows whether engineers are using AI to their benefit or
    if they become complacent and just accept whatever the AI suggests.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这些方面说明了我们所说的GitHub Copilot的“下游影响”。仅仅通过观察我们可以测量的指标，如果你不关注软件开发生命周期后期的影响，那么这只能告诉你故事的一半。下游影响显示了工程师是否在使用AI来获得利益，或者他们是否变得自满，只是接受AI提出的任何建议。
- en: The examples we have seen also show how complex it is to look at productivity,
    as there are many aspects that impact our code, and all of them have their own
    nuances to determine whether the impact is positive or negative.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到的例子也显示了观察生产力是多么复杂，因为有许多方面会影响我们的代码，而且它们各自都有其细微差别，以确定影响是积极的还是消极的。
- en: 'Rather than looking at productivity, GitHub focuses as much as possible on
    *usage* metrics: how people are using GitHub Copilot, what features they are using,
    and which features are lacking engagement. To help companies that want to start
    their journey into measuring engineering productivity, GitHub has created the
    **Engineering System Success Playbook** ( **ESSP** ). It is a three-step process
    that can help you drive meaningful, measurable improvements in your organization,
    whether you’re looking to adopt a new AI tool such as GitHub Copilot or identify
    and unlock bottlenecks that have been hindering performance. You can find the
    ESSP here: [https://resources.github.com/engineering-system-success-playbook](https://resources.github.com/engineering-system-success-playbook)
    .'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 与关注生产力相比，GitHub尽可能多地关注**使用**指标：人们如何使用GitHub Copilot，他们使用哪些功能，以及哪些功能缺乏参与度。为了帮助那些想要开始测量工程生产力的公司，GitHub创建了**工程系统成功手册**（**ESSP**）。这是一个三步过程，可以帮助您在组织中推动有意义的、可衡量的改进，无论您是想采用新的AI工具如GitHub
    Copilot，还是识别并解锁阻碍性能的瓶颈。您可以在以下位置找到ESSP：[https://resources.github.com/engineering-system-success-playbook](https://resources.github.com/engineering-system-success-playbook)。
- en: 'The usage metrics provide us with information on *how* people are using these
    tools, and a little bit of information on their perceived value. We recommend
    doing the same: if a user almost never uses the tool, or only at the beginning
    of getting a license, then you can likely infer that there is not that much value
    in it for them, for whatever reason. That should lead to reaching out to these
    users to learn from their environment or other reasons why they cannot use GitHub
    Copilot to their benefit.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 使用指标提供了关于人们如何使用这些工具的信息，以及他们感知价值的一点点信息。我们建议您也这样做：如果一个用户几乎从不使用这个工具，或者只在获得许可证的初期使用，那么您可能推断出它对他们来说价值不大，无论是什么原因。这应该导致联系这些用户，了解他们的环境或其他原因，为什么他们不能从GitHub
    Copilot中受益。
- en: 'Other users might use the tools so much that you can learn from their way of
    working or get them to teach their tricks to the rest of the user group in your
    company. There are two major datasets you can use the metrics from, and both can
    be viewed on GitHub with nice dashboards and charts:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 其他用户可能会大量使用这些工具，您可以从他们的工作方式中学习，或者让他们向公司内的其他用户组传授他们的技巧。您可以从两个主要数据集中使用这些指标，并且这两个数据集都可以在GitHub上通过漂亮的仪表板和图表查看：
- en: 'The first is the **Metrics** dashboards on the **Insights** tab. This is visible
    for the enterprise- or organization-level admins if you have a Business or Enterprise
    plan for GitHub Copilot:'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个是**指标**仪表板，位于**洞察**标签页上。如果您为GitHub Copilot购买了商业或企业计划，则企业或组织级管理员可以看到：
- en: '![Figure 9.5: Copilot Metrics dashboard](img/B34107_09_5.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图9.5：Copilot指标仪表板](img/B34107_09_5.png)'
- en: 'Figure 9.5: Copilot Metrics dashboard'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.5：Copilot指标仪表板
- en: '**To view this image in color**'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**要查看此图像的颜色**'
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 使用您购买时包含的免费彩色PDF版。有关详细信息，请参阅[*前言*](Preface.xhtml#_idTextAnchor004)中的“与您的书一起获得的好处”部分。
- en: In this dashboard, you can see information such as the number of daily active
    users and weekly active users, together with the number of chat interactions,
    requests per chat mode, the models that were used, and so on. The information
    on the dashboard does not let you slice and dice all the information that is available
    – for that, you need to export the data into a tool that helps. We have helped
    customers with dashboards in, for example, Power BI, Splunk, Grafana, and so on.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个仪表板上，您可以查看诸如每日活跃用户数、每周活跃用户数等信息，以及聊天交互次数、每种聊天模式下的请求次数、所使用的模型等等。仪表板上的信息并不能让您对所有可用信息进行切片和切块——为此，您需要将数据导出到帮助您的工具中。例如，我们已经帮助客户在Power
    BI、Splunk、Grafana等工具上使用仪表板。
- en: The second reporting option available is the **Premium request analytics** view,
    which is available on the **Billing** tab of the enterprise and organization,
    so only available for enterprise or organization admins and billing administrators,
    and only for the Business and Enterprise versions of GitHub Copilot.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可用的第二种报告选项是**高级请求分析**视图，它位于企业和组织版的**计费**标签页上，因此仅适用于企业或组织管理员和计费管理员，并且仅适用于GitHub
    Copilot的商业和企业版本。
- en: '![Figure 9.6: Part of the Premium requests analytics view](img/B34107_09_6.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图9.6：高级请求分析视图的一部分](img/B34107_09_6.png)'
- en: 'Figure 9.6: Part of the Premium requests analytics view'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.6：高级请求分析视图的一部分
- en: '**To view this image in color**'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '**要查看此图像的颜色**'
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 使用随购买附赠的免费彩色PDF版。有关详细信息，请参阅[*前言*](Preface.xhtml#_idTextAnchor004)中的“*随书免费福利*”部分。
- en: In this dashboard, you can keep track of how people are using their premium
    requests and for what they use them. It tracks them across the different models
    that you have enabled, as well as per user, product, organization, or cost center
    that has been configured. See [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041)
    for more information on premium requests and what they are.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个仪表板中，您可以跟踪人们如何使用他们的高级请求以及他们使用它们的原因。它跟踪了您已启用的不同模型，以及每个已配置的用户、产品、组织或成本中心。有关高级请求的更多信息以及它们是什么，请参阅[*第3章*](Chapter_3.xhtml#_idTextAnchor041)。
- en: Keep in mind when looking at metrics that it is always interpretable in different
    ways, and using only one indicator means that you could be missing insights from
    other data points. We recommend focusing on *how* people are using the tools and
    going back to the teams with that information to ask them what they need to grow
    to the next stage with GitHub Copilot.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在查看指标时请记住，它总是可以从不同的方式来解释，仅使用一个指标意味着你可能会错过其他数据点的洞察。我们建议关注*人们如何使用工具*，并带着这些信息回到团队中询问他们需要什么才能利用GitHub
    Copilot进入下一个阶段。
- en: Summary
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, we have taken a look at ways and tools to build a community
    of knowledge-sharing in your teams/organization, so that you can learn from each
    other. Since the generative AI motion is so new, we are all still adjusting to
    the new way of working and learning how these tools influence our coding environments,
    as well as our way of working. By addressing these concerns with each other, you
    can help to take away some of their worries, and together build out a community
    that keeps each other up to date on all aspects of using GitHub Copilot: from
    feature updates on the product and the functionalities in the different editors,
    to use cases for different environments or models.'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了在您的团队/组织中建立知识共享社区的方法和工具，以便您可以相互学习。由于生成式AI运动如此之新，我们都在适应新的工作和学习方式，了解这些工具如何影响我们的编码环境以及我们的工作方式。通过相互讨论这些担忧，您可以帮助消除一些担忧，并共同建立一个社区，在GitHub
    Copilot的所有方面保持相互更新：从产品上的功能更新和不同编辑器中的功能，到不同环境或模型的使用案例。
- en: We humans learn the most from seeing others work with the tools, which is why
    sharing your experiences matters so much. Keep on experimenting and sharing your
    learnings!
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们人类从看到他人使用工具中学到最多，这就是为什么分享您的经验如此重要的原因。继续实验并分享您的学习成果！
- en: 'In the next and final chapter, we dive deeper into looking at the impact that
    tools such as GitHub Copilot have on our entire field of work: from discussing
    the expected impact with peers and managers, to searching for our own position
    in the new world that is empowered by generative AI tools.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章和最后一章中，我们将更深入地探讨GitHub Copilot等工具对我们整个工作领域的影响：从与同事和经理讨论预期的冲击，到寻找我们在由生成式AI工具赋能的新世界中的位置。
