- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Using Artificial Intelligence to Improve Your Visuals
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用人工智能改善您的视觉
- en: In this chapter, we’ll be creating visually appealing content with AI tools
    that have been available in the M365 version of PowerPoint for a few years now.
    Microsoft’s development teams have made it possible for their suite of applications
    to comprehend what users are trying to do and suggest solutions to help speed
    up the process of certain tasks. There’s no need for an M365 Copilot license for
    these features!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将使用在M365版本的PowerPoint中已经可用几年的AI工具来创建吸引人的内容。微软的开发团队使得他们的应用程序套件能够理解用户试图做什么，并提出解决方案以帮助加快某些任务的流程。这些功能不需要M365
    Copilot许可证！
- en: Even though there are many features leveraging AI, this chapter will focus on
    **PowerPoint Designer** . Basically, Designer is a feature that will analyze what
    you are doing and automatically suggest professional-looking design ideas. Not
    everything suggested will be aligned with presentation best practices, but it
    will give you a good starting point or be a source of inspiration.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有许多利用AI的功能，但本章将重点介绍**PowerPoint设计师**。基本上，设计师是一个会分析您正在做什么并自动提出专业外观设计理念的功能。并非所有建议的内容都与演示文稿的最佳实践一致，但它会为您提供一个良好的起点或成为灵感的来源。
- en: 'By now, it must be clear that my goal is to empower business users who need
    to create visually appealing and impactful presentations in less time. Introducing
    you to Designer will help you reduce the time required to create various presentation
    elements. In this chapter, we will discuss the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，我的目标必须很清楚，那就是让需要快速创建视觉吸引力和影响力的演示文稿的商业用户获得力量。向您介绍设计师将帮助您减少创建各种演示文稿元素所需的时间。在本章中，我们将讨论以下主题：
- en: Creating great image layouts with Designer
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用设计师创建出色的图像布局
- en: Using Designer to create visual lists and timelines
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用设计师创建视觉列表和时间线
- en: Using Designer ideas to start a presentation theme from scratch
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用设计师想法从头开始创建演示文稿主题
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: This chapter requires having a Microsoft 365 subscription and **optional connected
    experiences** turned on – we will discuss this topic in the next section. Since
    the subscription model means the application is updated on an ongoing basis and
    the frequency of updates might be controlled by your IT department, or whether
    you opted into **Microsoft’s Insider Program** , please read the requirements
    section of the *Microsoft Support* article mentioned in the *Further reading*
    section.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本章需要拥有Microsoft 365订阅并开启**可选的连接体验**——我们将在下一节讨论这个话题。由于订阅模式意味着应用程序会持续更新，更新频率可能由您的IT部门控制，或者您是否选择了**微软的内部者计划**，请阅读“进一步阅读”部分中提到的*微软支持*文章的要求部分。
- en: Creating great image layouts with Designer
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用设计师创建出色的图像布局
- en: For as long as I can remember, I have heard users complaining about not knowing
    where to star t when they were taske d to create presentations. Even if I have
    explained a simple process to plan your content, it does not mean you will find
    it easy to create your visuals. That is when using the latest version of PowerPoint
    with the Designer feature will be an advantage .
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 从我能记事起，我就听到用户在抱怨当他们被要求创建演示文稿时不知道从哪里开始。即使我已经解释了一个简单的规划内容的过程，但这并不意味着你会觉得创建视觉元素很容易。这就是为什么使用最新版本的PowerPoint并启用设计师功能将是一个优势。
- en: Setting up Designer
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置设计师
- en: 'Before we dive into the great design ideas we might get when adding images
    to slides, let’s ma ke sure Designer is active in your application. Being part
    of Microsoft’s connected services that leverage AI while being connected to the
    internet, you might want to check some of PowerPoint’s options. You need to access
    the **File | Options | General** options and have a look at the **Privacy Settings**
    ( **1** ) and **PowerPoint Designer** ( **2** ) sections ( *Figure 6.1* ) :'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨在幻灯片中添加图像时可能获得的优秀设计理念之前，让我们确保设计师在您的应用程序中处于活动状态。作为微软的连接服务的一部分，这些服务利用AI并在连接到互联网时运行，您可能想要检查PowerPoint的一些选项。您需要访问**文件
    | 选项 | 一般**选项，并查看**隐私设置**（**1**）和**PowerPoint设计师**（**2**）部分（*图6.1*）：
- en: '![Figure 6.1 – Accessing PowerPoint options](img/B32063_06_01.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图6.1 – 访问PowerPoint选项](img/B32063_06_01.png)'
- en: Figure 6.1 – Accessing PowerPoint options
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1 – 访问PowerPoint选项
- en: In the **PowerPoint Designer** section, you will find two checkboxes allowing
    you to decide whether you want design ideas to show automatically and whether
    you want suggestions for new presentations. If those options are grayed out, you
    need to click on the **Privacy Settings...** button.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **PowerPoint 设计师**部分，您将找到两个复选框，允许您决定是否希望设计想法自动显示以及是否希望为新演示文稿提供建议。如果这些选项变灰，您需要点击**隐私设置...**按钮。
- en: In the **Privacy Settings** window that opens, you should find a **Turn on optional
    connected experiences** checkbox ( *Figure 6.2* ). If it is not available, you
    will need to check wi th your IT department. You can follow any links provided
    in that window to learn more about those setting s.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在打开的**隐私设置**窗口中，您应该找到一个**启用可选的连接体验**复选框（ *图 6.2* ）。如果不可用，您需要与您的 IT 部门联系。您可以通过该窗口提供的任何链接了解更多有关这些设置的信息。
- en: '![Figure 6.2 – Turning on optional connected experiences](img/B32063_06_02.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.2 – 启用可选的连接体验](img/B32063_06_02.png)'
- en: Figure 6.2 – Turning on optional connected experiences
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.2 – 启用可选的连接体验
- en: Now that we have made sure your settings will allow you to use Designer, let’s
    move on to how to use the featu re.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您的设置允许您使用设计师后，让我们继续了解如何使用此功能。
- en: Using Designer with images
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用图像与设计师一起使用
- en: 'Let’s st art adding some images to a blank slide to see Designer in action
    ( *Figure 6 .3* ):'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始向空白幻灯片添加一些图像，以查看设计师的功能（ *图 6.3* ）：
- en: '![Figure 6.3 – Designer offering design ideas for one image on a title slide](img/B32063_06_03.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.3 – 设计师为标题幻灯片上的一个图像提供设计想法](img/B32063_06_03.png)'
- en: Figure 6.3 – Designer offering design ideas for one image on a title slide
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.3 – 设计师为标题幻灯片上的一个图像提供设计想法
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)
    ** Quick tip ** : Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI 生成的可能内容可能不正确。](img/11.png) **快速提示**：需要查看此图像的高分辨率版本？请在新一代 Packt
    Reader 中打开此书或在其 PDF/ePub 版本中查看。'
- en: '![img](img/21.png) ** The next-gen Packt Reader ** and a ** free PDF/ePub copy
    ** of this book are included with your purchase. Scan the QR code OR visit [ https://packtpub.com/unlock
    ](https://packtpub.com/unlock) , then use the search bar to find this book by
    name. Double-check the edition shown to make sure you get the right one.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '![img](img/21.png) **新一代 Packt Reader** 和此书的**免费 PDF/ePub 版本**包含在您的购买中。扫描二维码或访问
    [https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![img](img/Unlock3.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/Unlock3.png)'
- en: On the blank title slide, add an image from **Microsoft’s Stock Images** library.
    If you are not familiar with Microsoft’s stock images, please refer to [*Chapter
    7*](Chapter_07.xhtml#_idTextAnchor580) , in the *Using and customizing stock images
    and other graphics* section. As shown in *Figure 6.3* , the **Designer** pane
    ( **1** ) should open automatically with design ideas for one image on a title
    slide. Scrolling to the bottom of the list allows access to the **See more Design
    Ideas** button ( **2** ), giving you more layouts to choose from. To apply a design
    to your slide, click on the layout of your choice ( **3** ).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在空白标题幻灯片上，从**Microsoft 的股票图像**库中添加一张图像。如果您不熟悉 Microsoft 的股票图像，请参阅*第 7 章*，在*使用和自定义股票图像和其他图形*部分。如图
    *图 6.3* 所示，**设计师**面板（ **1** ）应自动打开，显示标题幻灯片上一个图像的设计想法。滚动到列表底部可以访问**查看更多设计想法**按钮（
    **2** ），为您提供更多布局选择。要将设计应用到您的幻灯片上，请点击您选择的布局（ **3** ）。
- en: Take note that if you have an M365 Copilot license, your Designer button will
    be labeled **Design Suggestions** .
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果您拥有 M365 Copilot 许可证，您的“设计”按钮将被标记为**设计建议**。
- en: If the **Designer** pane did not open, you can use the **Designer** button that
    can be found on the far right of either the **Home** tab or the **Design** tab.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果**设计师**面板没有打开，您可以使用位于**主页**选项卡或**设计**选项卡最右侧的**设计师**按钮。
- en: 'When you add a second image to a slide, Designer will give you new layout ideas
    you can apply, always taking the applied slide layout into consideration. In *Figure
    6.4* , a second image was added to **Title Slide** . As you can see, the new layouts
    use the two images in various ways, always keeping the **Title** and **Subtitle**
    placeholder s:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当您向幻灯片添加第二张图像时，设计师将为您提供新的布局想法，始终考虑应用的幻灯片布局。在 *图 6.4* 中，向**标题幻灯片**添加了第二张图像。如您所见，新的布局以各种方式使用这两张图像，始终保留**标题**和**副标题**占位符：
- en: '![Figure 6.4 – Adding two images generates new image layouts](img/B32063_06_04.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.4 – 添加两张图像生成新的图像布局](img/B32063_06_04.png)'
- en: Figure 6.4 – Adding two images generates new image layouts
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.4 – 添加两张图像生成新的图像布局
- en: 'If y ou decide to change the layout of a slide when it already has images on
    it, Designer will simply adapt ideas to the new layout. In the following example,
    the **Title Slide** layout was modified to **Title and Content** ( **1** ), and
    the design ideas were automatically adjusted ( **2** ) ( *Figure 6. 5* ):'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你决定在幻灯片上已有图像的情况下更改布局，设计师会简单地调整想法以适应新的布局。在以下示例中，**标题幻灯片**布局被修改为**标题和内容**（**1**），设计想法会自动调整（**2**）（*图
    6.5*）：
- en: '![Figure 6.5 – Changing the slide layout generates new design ideas](img/B32063_06_05.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.5 – 更改幻灯片布局生成新的设计想法](img/B32063_06_05.png)'
- en: Figure 6.5 – Changing the slide layout generates new design ideas
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.5 – 更改幻灯片布局生成新的设计想法
- en: 'Since the first edition of this book, changes have been made to the number
    of images you can add to get design i deas. It is possible to add up to six images
    on a slide and obtain remarkably interesting layouts from Designer ( *Figure 6
    .6* ):'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 自从本书第一版以来，你可以添加以获取设计想法的图像数量已经有所变化。你可以在幻灯片上添加多达六张图像，并从设计师那里获得非常有趣的布局（*图 6.6*）：
- en: '![Figure 6.6 – Number of images Designer can handle on slides](img/B32063_06_06.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.6 – 设计师在幻灯片上可以处理的图像数量](img/B32063_06_06.png)'
- en: Figure 6.6 – Number of images Designer can handle on slides
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.6 – 设计师在幻灯片上可以处理的图像数量
- en: When the **Designer** pane gives you a **Sorry, no design ideas for this slide**
    message, it means you either reached the maximum number of images, icons, or illustrations,
    or that you have a shape present on your slide. Use Designer for creating image
    layouts first, then add any required shapes on the slide. A nice improvement is
    the **Stop suggesting ideas until I restart PowerPoint** link. You will avoid
    having the **Designer** pane open every time you add an image. You can manually
    open it from the **Designer** button in the **Home** or **Design** tab.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当**设计师**面板显示**对不起，此幻灯片没有设计想法**的消息时，这意味着你已经达到了图像、图标或插图的最大数量，或者你的幻灯片上有一个形状。首先使用设计师创建图像布局，然后添加幻灯片上所需的任何形状。一个很好的改进是**停止建议想法直到我重新启动
    PowerPoint**链接。这样你就可以避免每次添加图像时都打开**设计师**面板。你可以从**首页**或**设计**选项卡中的**设计师**按钮手动打开它。
- en: 'Having Designer handle your image layouts means they are cropped automatically.
    If you are not satisfied with some cropping results, there is a way to make adjustments
    yourself. In the following example ( *Figure 6.7* ), a Designer layout was chosen
    for six im ages:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让设计师处理你的图像布局意味着它们会自动裁剪。如果你对某些裁剪结果不满意，有方法可以自己进行调整。在以下示例（*图 6.7*）中，选择了设计师布局用于六张图像：
- en: '![Figure 6.7 – Changing the crop of an image](img/B32063_06_07.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.7 – 调整图像裁剪](img/B32063_06_07.png)'
- en: Figure 6.7 – Changing the crop of an image
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.7 – 调整图像裁剪
- en: If I wanted to adjust how an image is cropped, I’d need to select it, open the
    **Picture Format** tab ( **1** ), and click on the **Crop** button ( **2** ).
    The mouse cursor becomes a four-way arrow when placed over the image, allowing
    you to move the image to show parts that were cropped out ( **3** ). When you
    are happy with the new crop, just click anywhere outside the image or on the **Crop**
    button.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想调整图像的裁剪方式，我需要选择它，打开**图片格式**选项卡（**1**），然后点击**裁剪**按钮（**2**）。当鼠标指针放在图像上时，它变成一个四向箭头，允许你移动图像以显示裁剪掉的部分（**3**）。当你对新的裁剪满意时，只需点击图像外的任何地方或**裁剪**按钮。
- en: The AI behind Designer keeps evolving as Microsoft works on the tool. It is
    also used as a companion tool when using M365 Copilot, helping you add images
    on a slide adapted to the overall color scheme and your content. It is getting
    better at recognizing the focus point on an image, such as a human face, to avoid
    cropping it in an awkward way. When using a corporate template, Designer will
    even supply layouts that are aligned with your template settings.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 设计师背后的 AI 正在随着微软对工具的工作而不断进化。它也被用作使用 M365 Copilot 时的辅助工具，帮助你添加与整体配色方案和你的内容相匹配的幻灯片图像。它越来越擅长识别图像上的焦点，例如人脸，以避免以尴尬的方式裁剪。当使用公司模板时，设计师甚至会提供与你的模板设置相一致的布局。
- en: With Designer, you can now create great-looking image layouts in just a few
    clicks. If you are using Microsoft’s Stock Images, any graphic elements or videos
    supplied in the library can be used.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 使用设计师，您现在只需点击几下就能创建看起来很棒的图像布局。如果您使用的是微软的股票图片，库中的任何图形元素或视频都可以使用。
- en: Improving Copilot-generated slides with Designer
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用设计师改进Copilot生成的幻灯片
- en: As we discussed in the previous chapter, M365 Copilot can be helpful to create
    a first draft of your presentation.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在上一章中讨论的，M365 Copilot可以帮助您创建演示文稿的初稿。
- en: Like any other AI tool, it does not always return great content, but it can
    be a way to inspire you. In [*Chapter 7*](Chapter_07.xhtml#_idTextAnchor580) ,
    we will also see how we can customize elements from the Stock Images library.
    In the next section, we will see how Designer can read words on your slide and
    provide visual de sign ideas.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何其他AI工具一样，它并不总是返回优秀的内容，但它可以成为激发您灵感的途径。在[*第7章*](Chapter_07.xhtml#_idTextAnchor580)中，我们还将看到如何自定义股票图片库中的元素。在下一节中，我们将看到设计师如何读取您的幻灯片上的文字并提供视觉设计理念。
- en: Using Designer to create visual lists and timelines
  id: totrans-50
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用设计师创建视觉列表和时间线
- en: Many times, I have heard clients tell me they just did not have time to search
    visu als, so they simply a dded text or keywords to their slides. But now, every
    Microsoft 365 user can get help from Designer, which will search your words to
    match them with relevant images. There are no more excuses to have only text on
    your slides! Let’s see a few examples of how well Designer can translate your
    words into visu al elements.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 许多时候，我听到客户告诉我他们没有时间搜索视觉元素，所以他们只是在自己的幻灯片上添加了文本或关键词。但现在，每个Microsoft 365用户都可以从设计师那里获得帮助，设计师将搜索您的文字以匹配相关的图片。不再有只有文本在幻灯片上的借口！让我们看看设计师如何将您的文字转换为视觉元素的几个例子。
- en: Design ideas from a lis t
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 列表中的设计理念
- en: Creating a list of bullet points is something we have been doing for an exceedingly
    long time in PowerPoint. For this example and the following ones, I will also
    show you how Designer keeps the design ideas on brand by using slides that have
    a simple colored rectangle at the bottom in its template.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在PowerPoint中创建项目符号列表是我们做了很长时间的事情。对于这个例子以及接下来的例子，我还会向您展示设计师如何通过使用模板底部带有简单彩色矩形的幻灯片来保持品牌设计理念。
- en: 'In *Figure 6.8* , we have a **Title and Content** layout with a list of three
    short sentences ( **1** ): **Update your software** , **Update your system** ,
    and **Restart your computer** . Depending on your settings, the **Designer** pane
    ( **2** ) might open automatically, but if it does not, you can click on the **Designer**
    button on the right of the **Home** tab, or the far right of the ribbon in the
    **Design** tab ( **3** ) to op en the pane:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图6.8*中，我们有一个**标题和内容**布局，包含三个简短的句子列表（**1**）：**更新您的软件**，**更新您的系统**，和**重启您的计算机**。根据您的设置，**设计师**面板（**2**）可能会自动打开，但如果它没有打开，您可以在**主页**标签的右侧点击**设计师**按钮，或者在**设计**标签的右侧边缘点击（**3**）以打开面板：
- en: '![Figure 6.8 – Design ideas for a list of bulleted text](img/B32063_06_08.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图6.8 – 列表文本的设计理念](img/B32063_06_08.png)'
- en: Figure 6.8 – Design ideas for a list of bulleted text
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.8 – 列表文本的设计理念
- en: As you can see, the list of design ideas not only provides visually appealing
    slides but also provides icons or images that go well with the topic. If I choose
    the second one ( *Figure 6.9* ), we can see icons that are relevant to the short
    sentences. I can also confirm that the colors chosen for the icons are from the
    color palette of my template. The only thing I would change in this design idea
    is the first icon ( **1** ) because the computer icon does not represent software
    as well. If you search with the *software* keyword in the icon library, a good
    replacement could be an icon that looks like an applicatio n window ( **2** ).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，设计理念列表不仅提供了视觉上吸引人的幻灯片，还提供了与主题相得益彰的图标或图像。如果选择第二个（*图6.9*），我们可以看到与简短句子相关的图标。我还可以确认所选的图标颜色来自我的模板调色板。我唯一会改变的设计理念是第一个图标（**1**），因为计算机图标并不能很好地代表软件。如果您在图标库中使用*软件*关键词进行搜索，一个好的替代品可能是一个看起来像应用程序窗口的图标（**2**）。
- en: '![Figure 6.9 – Design idea with icons applied to a slide](img/B32063_06_09.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图6.9 – 将图标应用于幻灯片的设计理念](img/B32063_06_09.png)'
- en: Figure 6.9 – Design idea with icons applied to a slide
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9 – 将图标应用于幻灯片的设计理念
- en: 'If an icon does not fit with your view of the topic, it can easily be changed
    ( *Figure 6.10* ):'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果图标与您对主题的看法不符，它可以很容易地被更改（*图6.10*）：
- en: '![Figure 6.10 – Changing an icon provided in a design idea layout](img/B32063_06_10.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图6.10 – 更改设计想法布局中提供的图标](img/B32063_06_10.png)'
- en: Figure 6.10 – Changing an icon provided in a design idea layout
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.10 – 更改设计想法布局中提供的图标
- en: Click on the icon ( **1** ) and use the **Change icon** feature ( **2** ). You
    can then select another icon in the short list the system provides, or you can
    click on the **See all icons…** link ( **3** ) to access the whole library. Many
    times, Designer will use **SmartArt** to suggest a new visual list. If you see
    a small arrow on the left of the selected placeholder ( **4** ), clicking on it
    will open the **Text Pane** ( **5** ).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 点击图标（**1**）并使用**更改图标**功能（**2**）。然后你可以从系统提供的简短列表中选择另一个图标，或者点击**查看所有图标…**链接（**3**）来访问整个库。很多时候，设计师会使用**SmartArt**来建议一个新的视觉列表。如果你在选定的占位符左侧看到一个小箭头（**4**），点击它将打开**文本窗格**（**5**）。
- en: Desi gner can create a new SmartArt type that you will not necessarily see in
    the standard layouts you can choose from. If you are provided with one that you
    like, make sure to keep a resource file with a copy of the slide so you can easily
    reuse it in the future.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 设计师可以创建一个你可能在标准布局中看不到的新SmartArt类型。如果你提供了一个你喜欢的，请确保保留包含幻灯片副本的资源文件，这样你就可以轻松地在将来重复使用它。
- en: 'So, instead of only using text slides, take the time to browse the design ideas
    list and scroll to the bottom of the pane, where you will see a **See more Design
    Ideas** button ( **1** ) ( *Figure 6.11* ):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，不要只使用文本幻灯片，花点时间浏览设计想法列表，并滚动到面板底部，在那里你会看到一个**查看更多设计想法**按钮（**1**）（*图6.11*）：
- en: '![Figure 6.11 – Using the See more Design Ideas button](img/B32063_06_11.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图6.11 – 使用查看更多设计想法按钮](img/B32063_06_11.png)'
- en: Figure 6.11 – Using the See more Design Ideas button
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.11 – 使用查看更多设计想法按钮
- en: This will give you a few more ideas to choose from.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这将为你提供更多选择的想法。
- en: Let’s move on to design ideas that cre ate a timeline.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续讨论创建时间表的设计想法。
- en: Design ideas from dat es
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 来自日期的设计想法
- en: 'The Designer feature can also help you with the creation of project timelines.
    Starting with a list of dates, you will be provided with design ideas ( *Figure
    6.12* ):'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 设计师功能还可以帮助你创建项目时间表。从一系列日期开始，你将获得设计想法（*图6.12*）：
- en: '![Figure 6.12 – Design ideas for timelines with and without a template](img/B32063_06_12.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图6.12 – 带模板和不带模板的时间表设计想法](img/B32063_06_12.png)'
- en: Figure 6.12 – Design ideas for timelines with and without a template
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.12 – 带模板和不带模板的时间表设计想法
- en: You can see examples of layouts I was provided after entering a list of dates.
    I have found that the list of design ideas might look quite different over time
    and depending on whether you are using a template or just blank slides. On the
    left ( **1** ) is the result of using Designer with a template. On the right (
    **2** ), we can see a few examples of ideas provided when I used blank slides.
    Again, if you stumble on a design idea you like, make sure to keep a copy and
    reuse it within your own template.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到我输入一系列日期后提供的布局示例。我发现设计想法列表可能会随着时间的推移和是否使用模板或空白幻灯片而有所不同。在左侧（**1**）是使用模板时设计师的结果。在右侧（**2**），我们可以看到我使用空白幻灯片时提供的几个想法示例。再次提醒，如果你发现了一个你喜欢的布局想法，请确保保留副本并在自己的模板中重复使用。
- en: If you are in a situation where you must comply with a rigid corporate template,
    I would not advise using layouts that have design elements absent from the corporate
    template. Instead, copy and paste the SmartArt onto your own branded slides. In
    other situations, I would consider it, as it creates a visual difference that
    helps keep your audience engaged. But do keep in mind that many of those suggested
    elements will need to be adjusted for font size and contrast or have background
    images removed if they do not add any value to the slide.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你必须遵守严格的公司模板，我不会建议使用缺少公司模板设计元素的布局。相反，将SmartArt复制并粘贴到自己的品牌幻灯片中。在其他情况下，我会考虑它，因为它创造了一个视觉差异，有助于保持观众的兴趣。但请记住，许多建议的元素可能需要调整字体大小和对比度，或者如果它们不增加幻灯片的任何价值，则需要移除背景图像。
- en: If you ever ch oose a different design for one of your slides, be consistent
    and use it every time you want to display similar content. In this example, if
    I had to display more than one timeline in the same presentation, I would use
    the same layout for every timeline.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要在幻灯片中选择不同的设计，请保持一致，并在每次想要显示类似内容时使用它。在这个例子中，如果我必须在一个演示文稿中显示多个时间表，我会为每个时间表使用相同的布局。
- en: Because AI learns daily when users try Designer, and the development teams at
    Microsoft keep improving the engine, we will keep being surprised by how efficient
    the feature is in our presentation creation process.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 因为当用户尝试设计者时，AI 会每天学习，微软的开发团队也在不断改进引擎，所以我们在演示文稿创建过程中会不断对这一功能的效率感到惊讶。
- en: In this section, we have seen how the Designer feature can provide ideas aligned
    with the template in use. But what if you don’t have a template? Or, you are creating
    a special one-time-deal presentation and don’t have a template for it? That is
    the topic of the next section, where we will see how Designer can help you create
    a theme for y our presentation.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们看到了设计者功能如何提供与当前模板相匹配的想法。但如果你没有模板怎么办？或者，你正在创建一个一次性演示文稿，但没有模板怎么办？这就是下一节的主题，我们将看到设计者如何帮助你为你的演示文稿创建主题。
- en: Using Designer ideas to start a presentation theme from scratch
  id: totrans-79
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用设计者想法从头开始创建演示文稿主题
- en: You have been asked to present on a special topic and have no template for it.
    And of course, people come to you when deadlines are short. No worries—you can
    sp eed up the creation process by starting with a blank presentation and letting
    Designer provide you with a template. I can already see people rolling their eyes
    at this one, especially in big corporations where they have teams to create corporate
    templates or budgets to hire a design agency to do it. But for small organizations
    with no team and no budget, Designer theme ideas can be a lifesaver.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你被要求就一个特殊主题进行演示，但你没有模板。当然，当截止日期紧迫时，人们会来找你。不用担心——你可以通过从一个空白演示文稿开始，并让设计者为你提供模板来加快创建过程。我可以看到人们对此皱起了眉头，尤其是在大公司里，他们有团队来创建企业模板，或者有预算来雇佣设计公司来做这件事。但对于没有团队和预算的小组织来说，设计者主题想法可以救命。
- en: 'The way it works is quite simple. Start with a blank presentation and inspire
    yourself with the design ideas in the **Designer** pane ( **1** ) ( *Figure 6.13*
    ):'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 它的工作方式非常简单。从一个空白演示文稿开始，并在**设计者**面板（**1**）中激发你的设计灵感（*图 6.13*）：
- en: '![Figure 6.13 – Design ideas provided for a new, blank presentation](img/B32063_06_13.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.13 – 为新的空白演示文稿提供的设计想法](img/B32063_06_13.png)'
- en: Figure 6.13 – Design ideas provided for a new, blank presentation
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.13 – 为新的空白演示文稿提供的设计想法
- en: When you apply one of the designs ( **2** ) and click on **New Slide** in the
    **Home** tab ( **3** ), you will realize that a template has been applied, and
    the standard layouts are designed differently than with a blank presentation.
    The good news is that Microsoft has started to make new Designer ideas templates
    available, and they come with a greater variety of layouts, making them work better
    with Copilot. If you have read through [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206)
    , you know how the slide master works, and you can adapt the layouts, colors,
    and fonts if you want. The **Designer** pane will keep providing you with des
    ign ideas throughout your presentation if you want, and they will be aligned with
    the theme you have chosen.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当你应用其中一个设计（**2**），并在**主页**选项卡（**3**）中点击**新建幻灯片**时，你会意识到已经应用了一个模板，并且标准布局与空白演示文稿设计不同。好消息是，微软已经开始提供新的设计者想法模板，它们包含更多样化的布局，这使得它们与Copilot配合得更好。如果你已经阅读了[*第
    3 章*](Chapter_03.xhtml#_idTextAnchor206)，你就知道幻灯片母版是如何工作的，并且如果你想要的话，你可以调整布局、颜色和字体。如果你想的话，**设计者**面板会一直为你提供设计想法，并且它们将与你所选择的主题相匹配。
- en: 'If you enter a title on your slide, Designer will try to be relevant to your
    topic. As an example, I entered the title `Financial results` ( *Figure 6.14*
    ) and was provided with a li st of design ideas:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在你的幻灯片上输入一个标题，设计者会尝试与你的主题相关。例如，我输入了标题“财务结果”（*图 6.14*），并得到了一系列设计想法：
- en: "![Figure 6.14 – Designer theme idea\uFEFFs from a title](img/B32063_06_14.png)"
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.14 – 从标题中获取的设计主题想法](img/B32063_06_14.png)'
- en: Figure 6.14 – Designer theme idea s from a title
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.14 – 从标题中获取的设计主题想法
- en: Make sure to scroll down the list and even use the button at the bottom to see
    more design ideas. You will not always get a list of great results, but often
    it can help inspire you and get an image that makes sense for your title slide.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 确保向下滚动列表，甚至使用底部的按钮来查看更多设计想法。你不会总是得到一份出色的结果列表，但通常它可以帮助你获得一个适合你的标题幻灯片的图像。
- en: When you decide to apply a certain theme, make sure to have a look at the slide
    layouts first. If they don’t make sense or you have the feeling it will be a lot
    of work to adapt their slide master, don’t use the Designer theme. When Designer
    does not provide any theme ideas worth using, consider going back to the templates
    and themes provided by Microsoft. They can also be a smart start when you don’t
    have a template on hand, and will probably be much faster to customize.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 当您决定应用某个主题时，请先查看幻灯片布局。如果它们没有意义，或者您觉得调整它们的幻灯片母版将是一项大量工作，请不要使用设计师主题。当设计师没有提供任何值得使用的主题想法时，考虑回到微软提供的模板和主题。当您没有模板可用时，它们也可以是一个明智的开始，并且可能更快地定制。
- en: As you can see, it can be easy to start a new presentation theme with the help
    of Designer ideas. Sometimes it will provide you with useful themes, sometimes
    it won’t. Just make sure you keep a critical eye on co lor contrast and font readability,
    and adapt the provided layou ts to your own needs.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您所看到的，借助设计师的想法，开始一个新的演示文稿主题可以很容易。有时它会为您提供有用的主题，有时则不会。只需确保您对颜色对比和字体可读性保持批判性的眼光，并根据您的需求调整提供的布局。
- en: Summary
  id: totrans-91
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed PowerPoint’s Designer features, which can help
    you create visually impactful slides quickly. You can now leverage the feature
    to create great layouts for slides that include many images, change bulleted lists
    to something more visually appealing, start a new presentation, and leverage Designer
    theme ideas.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了 PowerPoint 的设计师功能，这些功能可以帮助您快速创建视觉冲击力强的幻灯片。您现在可以利用此功能为包含许多图片的幻灯片创建出色的布局，将项目符号列表改为更具视觉吸引力的样式，开始一个新的演示文稿，并利用设计师的主题想法。
- en: 'Unless you don’t already have a Microsoft 365 subscription, there is no reason
    to create boring slides with text only, or blank PowerPoint presentations with
    no design, because you feel like you are not creative, or are design-challenged.
    But I do need to warn you of one thing: if you skip all the planning steps and
    just add content that lacks structure, using any of Designer’s design ideas might
    help make your slides look good, but not necessarily help them convey a clear
    message or make your presentation more impactful.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 除非您已经有了微软 365 订阅，否则没有理由只创建只有文字的乏味幻灯片，或者没有设计的空白 PowerPoint 演示文稿，因为您觉得自己缺乏创意，或者设计上有困难。但我确实需要提醒您一件事：如果您跳过所有规划步骤，只添加缺乏结构的内
    容，使用设计师的设计想法可能有助于使您的幻灯片看起来不错，但并不一定有助于传达清晰的信息或使您的演示更具影响力。
- en: In the next chapter, we will be discussing how you can add and modify various
    visual elements in your presentations, such as maps, SmartArt, and Microsoft’s
    Stock Images library. You will also learn how to create new shapes with some tools
    available wi thin the application.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论如何在您的演示文稿中添加和修改各种视觉元素，例如地图、SmartArt 和微软的股票图片库。您还将学习如何使用应用程序内的一些工具创建新的形状。
- en: Further reading
  id: totrans-95
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: 'Microsoft Designer support article (see the *Requirements* section): [https://support.microsoft.com/en-us/office/create-professional-slide-layouts-with-designer-53c77d7b-dc40-45c2-b684-81415eac0617](https://support.microsoft.com/en-us/office/create-professional-slide-layouts-with-designer-53c77d7b-dc40-45c2-b684-81415eac0617)'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
