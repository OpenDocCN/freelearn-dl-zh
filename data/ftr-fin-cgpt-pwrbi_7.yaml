- en: This script calculates the total R&D and total revenue for the past 12 months,
    then calculates R&D as a percentage of revenue. After, it writes this data to
    a CSV file and prints a buy or sell signal based on the value of R&D as a percentage
    of revenue. This job is scheduled to run every day at 9:00 A.M.
  id: totrans-291
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此脚本计算过去 12 个月的研发总支出和总收入，然后计算研发支出占收入的百分比。之后，它将此数据写入 CSV 文件，并根据研发支出占收入的百分比打印买入或卖出信号。此任务计划每天上午
    9:00 执行。
- en: '**Sentiment analysis (combined with either the earnings signal or R&D spend
    signal to** **implement trade)**:'
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**情感分析（结合收益信号或研发支出信号以** **执行交易**）：'
- en: '**Buy**: The positive sentiment score exceeds 0.2 (on a scale from -1 to 1)
    for a consistent period of a week'
  id: totrans-293
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**买入**：正面情感得分在持续一周的时间内超过 0.2（在 -1 到 1 的范围内）。'
- en: '**Sell**: The negative sentiment score dips below -0.2 for a week consistently'
  id: totrans-294
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卖出**：负面情感得分持续一周低于 -0.2'
- en: '**Source**: News and social media sentiment analyzed using GPT-4 or similar
    sentiment analysis tools, which could be sourced from online news websites, Yahoo!
    Finance, and social media platforms such as X:'
  id: totrans-295
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**来源**：使用 GPT-4 或类似情感分析工具分析新闻和社交媒体情感，这些工具可能来自在线新闻网站、Yahoo! Finance 和 X 等社交媒体平台。'
- en: '[PRE10]'
  id: totrans-296
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This script keeps track of the daily sentiment scores for the last 7 days and
    writes the weekly sentiment to a CSV file every day. It also generates a buy or
    sell signal if the weekly sentiment exceeds 0.2 or falls below -0.2, respectively.
  id: totrans-297
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此脚本跟踪过去 7 天的每日情感得分，并每天将每周情感得分写入 CSV 文件。如果每周情感得分超过 0.2 或低于 -0.2，则分别生成买入或卖出信号。
- en: Remember to replace `'YOUR_NEWSAPI_KEY'` with your actual News API key. As always,
    this is a simplified example and may not be sufficient for actual trading. You
    may need to adjust the sentiment thresholds and the decision-making logic to fit
    your specific use case. Also, note that the News API has certain limitations on
    the number of requests you can make, depending on your level of subscription.
  id: totrans-298
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 请记住将 `'YOUR_NEWSAPI_KEY'` 替换为您的实际 News API 密钥。一如既往，这是一个简化的示例，可能不足以用于实际交易。您可能需要调整情感阈值和决策逻辑以适应您的特定用例。此外，请注意，News
    API 对您可以根据订阅级别提出的请求数量有限制。
