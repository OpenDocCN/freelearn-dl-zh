- en: 'The pervasive impact of AI infrastructure: powering intelligent solutions across
    industries'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI基础设施的普遍影响：为各行业的智能解决方案提供动力
- en: Well-architected AI infrastructure, encompassing the hardware, software, and
    networks that support AI applications, is the driving force behind the transformative
    impact of AI across industries. This infrastructure enables the deployment and
    scaling of AI models, algorithms, and frameworks, unlocking their full potential
    to address complex challenges and deliver innovative solutions.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的AI基础设施，包括支持AI应用程序的硬件、软件和网络，是AI在各个行业产生变革性影响的主要驱动力。该基础设施使AI模型、算法和框架的部署和扩展成为可能，释放它们的全部潜力以解决复杂挑战并交付创新解决方案。
- en: '**Healthcare:**'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗保健**：'
- en: '**Accelerated medical image analysis**: High-performance computing clusters
    and specialized hardware accelerators enable rapid processing of medical images,
    facilitating faster and more accurate diagnosis.'
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加速医学图像分析**：高性能计算集群和专用硬件加速器能够快速处理医学图像，促进更快、更准确的诊断。'
- en: '**Data-driven insights**: Scalable storage and processing infrastructure empowers
    AI-driven analytics on vast patient datasets, leading to personalized treatment
    plans and improved patient outcomes.'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据驱动洞察**：可扩展的存储和处理基础设施使AI驱动的分析能够处理庞大的患者数据集，从而实现个性化的治疗方案和改善的患者结果。'
- en: '**Real-time monitoring**: Cloud-based AI infrastructure enables continuous
    monitoring of patient vitals and other health data, facilitating timely interventions
    and proactive care.'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时监控**：基于云的AI基础设施能够持续监控患者的生命体征和其他健康数据，促进及时干预和主动护理。'
- en: '**Finance:**'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融：**'
- en: '**Robust fraud detection:** Distributed computing and real-time analytics platforms
    empower AI models to detect fraudulent transactions with greater accuracy and
    speed, protecting financial institutions and consumers.'
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鲁棒的反欺诈检测**：分布式计算和实时分析平台赋予AI模型以更高的准确性和速度检测欺诈交易，保护金融机构和消费者。'
- en: '**Optimized trading strategies**: High-frequency trading algorithms leverage
    low-latency networks and powerful computational resources to execute trades with
    precision and efficiency, maximizing returns.'
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化交易策略**：高频交易算法利用低延迟网络和强大的计算资源，以精确和高效的方式执行交易，最大化回报。'
- en: '**Personalized financial services:** Cloud-based AI infrastructure enables
    the deployment of robo-advisors and other AI-powered tools that provide tailored
    financial advice and services to individuals.'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化金融服务**：基于云的AI基础设施使得部署机器人顾问和其他AI工具成为可能，这些工具为个人提供定制化的财务建议和服务。'
- en: '**Autonomous vehicles:**'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动驾驶汽车**：'
- en: '**Real-time sensor fusion:** High-throughput data pipelines and edge computing
    infrastructure enable the rapid processing of sensor data from cameras, lidar,
    radar, and other sources, ensuring timely decision-making for autonomous vehicles.'
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时传感器融合**：高吞吐量数据管道和边缘计算基础设施能够快速处理来自摄像头、激光雷达、雷达和其他来源的传感器数据，确保自动驾驶汽车能够及时做出决策。'
- en: '**Enhanced object recognition:** Deep learning models trained on massive datasets
    and deployed on specialized hardware accelerators enable accurate and reliable
    identification of objects in the environment.'
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强物体识别**：在大型数据集上训练并在专用硬件加速器上部署的深度学习模型，能够准确可靠地识别环境中的物体。'
- en: '**Optimized navigation:** Cloud-based mapping and navigation services, combined
    with onboard AI processing, provide autonomous vehicles with real-time information
    and guidance for safe and efficient navigation.'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化导航**：基于云的地图和导航服务，结合车载AI处理，为自动驾驶汽车提供实时信息和指导，确保安全高效的导航。'
- en: The continued development and optimization of AI infrastructure will play a
    crucial role in realizing the full potential of AI across industries. By providing
    the foundation for performant and scalable AI solutions, this infrastructure is
    poised to transform the way we live and work.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: AI基础设施的持续发展和优化将在实现AI在各个行业的全部潜力中发挥关键作用。通过提供性能和可扩展的AI解决方案的基础，该基础设施有望改变我们的生活方式和工作方式。
- en: Key components of AI system architectures
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI系统架构的关键组件
- en: AI systems, in their essence, are complex structures designed to emulate human
    cognitive abilities such as learning, reasoning, and problem-solving. To achieve
    these capabilities, AI systems rely on a well-defined architecture comprising
    several interconnected components, each playing a crucial role in the overall
    functioning of the system. Understanding these key components is fundamental to
    comprehending the inner workings and potential of AI.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统本质上是由复杂结构设计的，旨在模拟人类认知能力，如学习、推理和问题解决。为了实现这些能力，AI系统依赖于一个定义良好的架构，由多个相互连接的组件组成，每个组件在系统的整体运行中都发挥着关键作用。理解这些关键组件对于理解AI的内部运作和潜力至关重要。
- en: '**Data components**: Data serves as the lifeblood of any AI system, acting
    as the raw material upon which the system learns and improves. Data can exist
    in multiple forms:'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据组件**：数据是任何AI系统的生命线，是系统学习和改进的原始材料。数据可以存在于多种形式：'
- en: '**Structured data**: Organized in predefined formats such as databases and
    spreadsheets'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化数据**：以数据库和电子表格等预定义格式组织'
- en: '**Semi-structured data**: Partially organized information such as JSON or XML
    files'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**半结构化数据**：部分组织的信息，如JSON或XML文件'
- en: '**Unstructured data**: Raw information, including text documents, images, audio
    recordings, and video files'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非结构化数据**：原始信息，包括文本文档、图像、音频记录和视频文件'
- en: The quality, quantity, and relevance of the data significantly impact the AI
    system’s performance and ability to generalize to new situations.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的质量、数量和相关性对人工智能系统的性能及其对新情况泛化的能力有重大影响。
- en: '**Algorithmic frameworks:** Algorithms are engines driving AI systems, providing
    instructions and logic for processing data and generating intelligent outputs.
    Machine learning algorithms, a subset of AI algorithms, empower systems to learn
    patterns and relationships from data, enabling them to make predictions, classifications,
    or decisions. Common algorithmic approaches in production AI systems include the
    following:'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**算法框架**：算法是驱动人工智能系统的引擎，提供处理数据和生成智能输出的指令和逻辑。机器学习算法是人工智能算法的一个子集，使系统能够从数据中学习模式和关系，从而使其能够进行预测、分类或决策。生产级人工智能系统中的常见算法方法包括以下几种：'
- en: '**Traditional machine learning**: Linear regression, random forests, gradient
    boosting, and support vector machines'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**传统机器学习**：线性回归、随机森林、梯度提升和支持向量机'
- en: '**Deep learning**: **Convolutional neural networks** (**CNN**s), **Recurrent
    Neural Networks** (**RNN**s), transformers, and graph neural networks'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深度学习**：**卷积神经网络**（**CNN**s）、**循环神经网络**（**RNN**s）、transformers和图神经网络'
- en: '**Reinforcement learning**: Q-learning, policy gradient methods, and actor-critic
    architectures'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强化学习**：Q学习、策略梯度方法和actor-critic架构'
- en: The selection of appropriate algorithms depends on the specific problem domain,
    available data characteristics, and performance requirements.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 算法的选取取决于具体的问题领域、可用数据特征和性能要求。
- en: '**Model architectures:** Models represent the culmination of the learning process
    in AI systems. They are mathematical representations of the knowledge extracted
    from data, encapsulating the patterns, relationships, and insights discovered
    by the algorithms. These models can be simple or complex, depending on the nature
    of the task and the algorithm used. Model architectures range between the following:'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型架构**：模型代表了人工智能系统中学习过程的最终成果。它们是从数据中提取的知识数学表示，封装了算法发现的模式、关系和洞察。这些模型可以是简单的，也可以是复杂的，这取决于任务的性质和所使用的算法。模型架构介于以下几种之间：'
- en: '**Simple linear models**: Easily interpretable but limited in capability'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简单线性模型**：易于解释但功能有限'
- en: '**Ensemble models**: Combining multiple simpler models for improved performance'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成模型**：结合多个简单模型以提高性能'
- en: '**Deep neural networks**: Complex architectures with millions or billions of
    parameters'
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深度神经网络**：具有数百万或数十亿参数的复杂架构'
- en: Once trained, models are used to make predictions or decisions on new, unseen
    data.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 训练完成后，模型用于对新、未见过的数据进行预测或决策。
- en: '**Infrastructure:** The infrastructure component encompasses the hardware and
    software resources that provide the computational power and environment necessary
    for AI systems to operate. Key infrastructure elements include the following:'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础设施**：基础设施组件包括提供人工智能系统运行所需的计算能力和环境的硬件和软件资源。关键基础设施元素包括以下几种：'
- en: '**Computational resources**: High-performance servers, specialized AI accelerators
    (GPUs, TPUs, FPGAs), and distributed computing clusters'
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算资源**：高性能服务器、专门的AI加速器（GPU、TPU、FPGA）和分布式计算集群'
- en: '**Storage systems**: High-throughput, scalable storage for training data and
    model artifacts'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存储系统**：用于训练数据和模型工件的高吞吐量、可扩展存储'
- en: '**Networking components**: Low-latency interconnects for distributed training
    and inference'
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网络组件**：用于分布式训练和推理的低延迟互连'
- en: '**Development frameworks**: Software libraries such as TensorFlow, PyTorch,
    and Hugging Face that streamline AI development and deployment.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发框架**：如TensorFlow、PyTorch和Hugging Face等软件库，它们简化了人工智能的开发和部署。'
- en: Understanding these key components and their interactions provides a solid foundation
    for comprehending the complex landscape of AI system architectures. By carefully
    designing and optimizing each component, researchers and engineers can build AI
    systems that are capable of tackling a wide range of tasks and applications, from
    image recognition and natural language processing to autonomous driving and drug
    discovery. The integration of AI capabilities into existing software stacks requires
    thoughtful architectural considerations to successfully incorporate intelligence
    while addressing the unique requirements that AI components introduce. These specific
    requirements and architectural approaches form the central focus of this book.
    Due to the complexity of AI systems, the nature of the deployment approach is
    paramount. The next section will discuss the use of microservice architectures
    that provide a balance between performance and modularity.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些关键组件及其相互作用为理解人工智能系统架构的复杂领域提供了坚实的基础。通过精心设计和优化每个组件，研究人员和工程师可以构建能够处理各种任务和应用的人工智能系统，从图像识别和自然语言处理到自动驾驶和药物发现。将人工智能能力集成到现有软件堆栈中需要深思熟虑的架构考虑，以成功引入智能并解决人工智能组件带来的独特需求。这些具体需求和架构方法构成了本书的核心焦点。由于人工智能系统的复杂性，部署方法的本性至关重要。下一节将讨论提供性能和模块化之间平衡的微服务架构的使用。
- en: 'Microservice architectures: a modular approach to building complex AI systems'
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 微服务架构：构建复杂人工智能系统的模块化方法
- en: As **AI** systems grow in complexity, traditional monolithic architectures can
    become unwieldy, hindering development speed and flexibility. Microservice architectures
    offer a compelling alternative by breaking down these complex systems into smaller,
    independent services. Each microservice focuses on a specific function and communicates
    with others through well-defined APIs.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能系统复杂性的增加，传统的单体架构可能会变得难以管理，从而阻碍开发速度和灵活性。微服务架构通过将这些复杂系统分解成更小、独立的微服务，提供了一个有吸引力的替代方案。每个微服务专注于特定的功能，并通过定义良好的API与其他服务进行通信。
- en: Advantages of microservices for AI
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微服务对人工智能的优势
- en: '**Enhanced agility and flexibility**: Teams can independently develop, deploy,
    and update each microservice, using the most suitable technologies and programming
    languages for each task. This accelerates development cycles and allows for easier
    experimentation and innovation.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强灵活性和敏捷性**：团队可以独立开发、部署和更新每个微服务，使用每个任务最合适的技术和编程语言。这加速了开发周期，并允许更容易地进行实验和创新。'
- en: '**Improved scalability**: Microservices can be scaled horizontally to meet
    specific demand, ensuring optimal resource utilization. For example, a service
    handling image processing can be scaled independently of a service responsible
    for natural language understanding.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高可伸缩性**：微服务可以水平扩展以满足特定需求，确保资源利用最优化。例如，处理图像处理的微服务可以独立于负责自然语言理解的微服务进行扩展。'
- en: '**Increased resilience and fault isolation**: If a microservice fails, the
    impact is localized, minimizing disruption to the entire system. This enhances
    overall reliability and simplifies troubleshooting.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高弹性和容错性**：如果一个微服务失败，影响将局限于局部，最小化对整个系统的干扰。这增强了整体可靠性并简化了故障排除。'
- en: '**Technological diversity**: Microservice architectures empower teams to leverage
    the best tools for each task, promoting innovation and allowing for gradual technology
    upgrades.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术多样性**：微服务架构使团队能够利用每个任务的最佳工具，促进创新，并允许逐步进行技术升级。'
- en: Challenges of microservice architectures
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微服务架构的挑战
- en: '**Increased complexity**: Managing a multitude of services and their interactions
    requires robust orchestration and monitoring tools. Service discovery, load balancing,
    and failure handling become critical considerations.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增加复杂性**：管理众多服务和它们之间的交互需要强大的编排和监控工具。服务发现、负载均衡和故障处理成为关键考虑因素。'
- en: '**Communication overhead**: Excessive inter-service communication can introduce
    latency and impact overall performance. The careful design of APIs and communication
    patterns is essential to mitigate this issue.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通信开销**：过度的服务间通信可能会引入延迟并影响整体性能。精心设计API和通信模式对于减轻这一问题至关重要。'
- en: '**Data consistency**: Maintaining data consistency across distributed services
    can be challenging. Strategies such as eventual consistency or distributed transactions
    may be required to ensure data integrity.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据一致性**：在分布式服务中维护数据一致性可能具有挑战性。可能需要采用最终一致性或分布式事务等策略来确保数据完整性。'
- en: 'Real-world example: conversational AI microservices implementation'
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现实世界示例：对话式AI微服务实现
- en: To illustrate how a microservices approach can streamline a conversational AI
    solution, let us examine a practical example that demonstrates how these principles
    come to life. This section explores a conversational AI system – such as a chatbot
    or virtual assistant – built using a four-service microservices architecture with
    an API gateway.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明微服务方法如何简化对话式AI解决方案，让我们考察一个实际例子，以展示这些原则如何付诸实践。本节探讨了一个对话式AI系统——如聊天机器人或虚拟助手——它使用具有API网关的四服务微服务架构构建。
- en: The four core microservices
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 四个核心微服务
- en: '*Figure 1.6* illustrates the high-level design of our conversational AI system:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*图1.6* 展示了我们对话式AI系统的高级设计：'
- en: '![A diagram of a service  AI-generated content may be incorrect.](img/B19300_01_03.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![服务图示 AI生成的内容可能不正确。](img/B19300_01_03.png)'
- en: 'Figure 1.6: Conversational AI microservices'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.6：对话式AI微服务
- en: 'The architecture consists of four core specialized services plus an API gateway:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 架构由四个核心专业服务加上一个API网关组成：
- en: 'Language understanding service:'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言理解服务：
- en: '**Primary functions**: Intent classification, entity identification/extraction,
    and hosting of NLP models.'
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主要功能**：意图分类、实体识别/提取和NLP模型的托管。'
- en: '**Data and models**: References one or more NLP model databases (for example,
    transformer-based classifiers).'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和模型**：引用一个或多个NLP模型数据库（例如，基于transformer的分类器）。'
- en: '**Key interactions**: Receives the user’s text (through the API gateway), determines
    the user’s intent (e.g., “Check account balance”), and extracts relevant entities
    (e.g., “date,” “location,” “product name”).'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键交互**：通过API网关接收用户的文本，确定用户的意图（例如，“检查账户余额”），并提取相关实体（例如，“日期”、“位置”、“产品名称”）。'
- en: 'Dialog management service:'
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对话管理服务：
- en: '**Primary functions**: Oversees conversation flow, handles session state, and
    orchestrates the next step in the dialog.'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主要功能**：负责对话流程的监控，处理会话状态，并协调对话的下一步。'
- en: '**Data and state**: Maintains conversation context in a dedicated state database.'
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和状态**：在专用的状态数据库中维护对话上下文。'
- en: '**Key interactions**: Logs conversation events (asynchronously) and updates
    or retrieves session details to guide the flow (e.g., “Greeting,” “Confirmation,”
    “Next step”).'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键交互**：异步记录对话事件并更新或检索会话细节以引导流程（例如，“问候”、“确认”、“下一步”）。'
- en: Knowledge response service
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 知识回应服务
- en: '**Primary functions**: Retrieves relevant information and formulates responses.
    This might involve querying a knowledge base (e.g., FAQs, product info) or assembling
    template-based replies.'
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主要功能**：检索相关信息并制定回应。这可能涉及查询知识库（例如，常见问题解答、产品信息）或组装基于模板的回复。'
- en: '**Data and templates**: Stores domain-specific data in a knowledge DB and uses
    templates or generative mechanisms for response creation.'
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和模板**：在知识数据库中存储特定领域的知识，并使用模板或生成机制来创建回应。'
- en: '**Key interactions**: Receives queries from the dialog management service,
    finds or composes the best response, and returns it for final delivery to the
    user.'
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键交互**：从对话管理服务接收查询，找到或创作最佳回应，并将其返回以最终交付给用户。'
- en: 'Conversation analytics service:'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对话分析服务：
- en: '**Primary functions**: Processes logs and usage metrics for reporting, visualization,
    and deeper analytics (e.g., intent distribution, user satisfaction trends).'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主要功能**：处理日志和用于报告、可视化和更深入分析（例如，意图分布、用户满意度趋势）的使用度量。'
- en: '**Data and reporting**: Maintains analytics data in a separate database for
    dashboards or offline processing.'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和报告**：在单独的数据库中维护分析数据，用于仪表板或离线处理。'
- en: '**Key interactions**: Collects asynchronous event logs from the dialog management
    service and other components to measure performance, track user behavior, and
    provide insights that could improve the system over time.'
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键交互**：从对话管理服务和其他组件收集异步事件日志，以衡量性能、跟踪用户行为，并提供随着时间的推移可能改进系统的见解。'
- en: Role of the API gateway
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: API网关的作用
- en: 'Although not counted as one of the four microservices, the **API gateway**
    is a vital component at the front of the architecture. It does the following:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然不算作四个微服务之一，但**API网关**是架构前端的必要组件。它执行以下操作：
- en: Receives requests from the user (via text or other channels)
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接收来自用户的请求（通过文本或其他渠道）
- en: Initializes the session and routes incoming data to the language understanding
    service
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始化会话并将传入数据路由到语言理解服务
- en: Forwards recognized intents and updates to the dialog management service
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将识别到的意图和更新传递给对话管理服务
- en: Passes replies from downstream services back to the user
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将来自下游服务的回复传递回用户
- en: By centralizing traffic management, the API gateway enforces consistent security,
    throttling, and monitoring policies while keeping each microservice isolated and
    independently scalable.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 通过集中流量管理，API网关强制执行一致的安全、节流和监控策略，同时保持每个微服务隔离和独立可扩展。
- en: Conversation flow sequence
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对话流程序列
- en: 'To illustrate how these microservices interact during a typical user journey,
    *Figure 1.7* shows the sequence of calls between them in a single conversation
    cycle:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这些微服务在典型用户旅程中的交互方式，*图1.7*显示了它们在单个对话周期中的调用序列：
- en: '![A diagram of a software project  AI-generated content may be incorrect.](img/B19300_01_04.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![一个软件项目的图示，AI生成的内容可能不正确。](img/B19300_01_04.png)'
- en: 'Figure 1.7: Sequence diagram between system components'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.7：系统组件之间的序列图
- en: 'The sequence progresses as follows:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 序列按以下步骤进行：
- en: '**User** **→** **API gateway**: The user sends a request (e.g., a chat message).
    The API gateway initializes the session (if needed) and forwards the message to
    the language understanding service.'
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用户** **→** **API网关**：用户发送请求（例如，一条聊天消息）。API网关（如果需要）初始化会话，并将消息转发到语言理解服务。'
- en: '**Language understanding service**:'
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**语言理解服务**:'
- en: Performs intent classification and entity identification.
  id: totrans-146
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行意图分类和实体识别。
- en: Returns a recognized intent (e.g., “CheckWeather”) and any extracted entities
    (e.g., date, location) to the API gateway.
  id: totrans-147
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将识别到的意图（例如，“CheckWeather”）和任何提取的实体（例如，日期，位置）返回到API网关。
- en: '**Dialog management service**:'
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对话管理服务**:'
- en: Receives recognized intent from the API gateway.
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从API网关接收识别到的意图。
- en: Logs conversation events (asynchronously) into the conversation analytics service.
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将对话事件（异步）记录到对话分析服务。
- en: Updates or retrieves the **session state** (e.g., user’s location or recent
    conversation context).
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新或检索**会话状态**（例如，用户的位置或最近的对话上下文）。
- en: '**Knowledge response service**:'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**知识响应服务**:'
- en: Once the dialog management service determines additional data is needed (e.g.,
    weather info, product detail), it sends a **query** to the knowledge response
    service.
  id: totrans-153
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦对话管理服务确定需要额外的数据（例如，天气信息，产品详情），它就会向知识响应服务发送一个**查询**。
- en: This service fetches the necessary information or constructs a response template
    (e.g., “The weather for your location is sunny with 75°F...”).
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此服务获取必要的信息或构建响应模板（例如，“您所在位置的天气晴朗，温度为75°F...”）。
- en: '**Conversation analytics service (asynchronous logging)**:'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对话分析服务（异步日志）**:'
- en: Continuously receives usage data and conversation logs from the dialog management
    service (and possibly from the knowledge response service).
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从对话管理服务（以及可能的知识响应服务）持续接收使用数据和对话日志。
- en: Processes and stores these logs for future reporting (e.g., monthly usage dashboards,
    model performance metrics).
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理并存储这些日志以供未来报告（例如，月度使用仪表板，模型性能指标）。
- en: '**Reply to the user**:'
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**回复用户**:'
- en: The knowledge response service’s formulated answer is routed back through the
    dialog management service (if necessary, for final session updates) and then returned
    via the API gateway.
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识响应服务制定的答案通过对话管理服务（如果需要，进行最终会话更新）路由回，然后通过API网关返回。
- en: The user receives the **reply** and the interaction concludes.
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户收到**回复**，交互结束。
- en: Key aspects of microservice communication
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微服务通信的关键方面
- en: 'Synchronous versus asynchronous calls:'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同步与异步调用：
- en: Requests that must return immediately (e.g., generating a response for the user)
    use synchronous calls.
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须立即返回请求的服务（例如，为用户生成响应）使用同步调用。
- en: Logging or analytics operations are typically performed asynchronously to avoid
    slowing down the core conversation loop.
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日志或分析操作通常异步执行，以避免减慢核心对话循环。
- en: 'Stateful versus stateless components:'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有状态与无状态组件：
- en: Dialog management requires tracking session state, while other services (e.g.,
    language understanding) often benefit from stateless designs for simpler scaling.
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话管理需要跟踪会话状态，而其他服务（例如，语言理解）通常从无状态设计中受益，以便于更简单的扩展。
- en: The dialog management service may require robust state management solutions,
    such as distributed caches or databases.
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话管理服务可能需要强大的状态管理解决方案，例如分布式缓存或数据库。
- en: 'Service autonomy:'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务自治：
- en: Each microservice can be updated or replaced independently without affecting
    the rest of the system.
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个微服务都可以独立更新或替换，而不会影响系统中的其他部分。
- en: The language understanding service’s NLP models may need frequent retraining.
    Because it is a separate service, such updates can be deployed without disrupting
    the other services.
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言理解服务的NLP模型可能需要频繁重新训练。因为它是一个独立的服务，所以这些更新可以在不影响其他服务的情况下部署。
- en: 'Data isolation:'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据隔离：
- en: Services manage their own domain data. Dialog management stores conversation
    state, knowledge response holds domain facts, and analytics maintains interaction
    logs.
  id: totrans-172
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务管理自己的领域数据。对话管理存储对话状态，知识响应存储领域事实，分析维护交互日志。
- en: Sensitive user data should be restricted to the dialog management service’s
    state store when necessary, minimizing the exposure across the entire system.
  id: totrans-173
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当有必要时，应将敏感用户数据限制在对话管理服务的状态存储中，以最小化整个系统中的暴露。
- en: Implementation considerations for conversational AI microservices
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对话式人工智能微服务的实现考虑因素
- en: 'Scaling independently:'
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 独立扩展：
- en: The language understanding service can be scaled up or down based on incoming
    message load (e.g., horizontal autoscaling for peak chat traffic).
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言理解服务可以根据传入的消息负载进行扩展或缩减（例如，针对高峰聊天流量进行水平自动扩展）。
- en: The dialog management service maintains conversation state and may require different
    scaling strategies.
  id: totrans-177
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话管理服务维护对话状态，可能需要不同的扩展策略。
- en: The knowledge response service often scales according to the complexity of information
    retrieval.
  id: totrans-178
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识响应服务通常根据信息检索的复杂性进行扩展。
- en: The conversation analytics service can be scaled separately, especially if analytics
    workloads (such as report generation) spike at different times than user requests.
  id: totrans-179
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话分析服务可以单独扩展，特别是如果分析工作负载（如报告生成）在用户请求之外的时间激增。
- en: 'Latency management:'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 延迟管理：
- en: Conversational AI systems aim for near real-time interactions. Minimizing network
    hops and communication overhead between services is crucial. Using lightweight
    communication protocols helps ensure the system performs well at scale.
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话式人工智能系统旨在实现近乎实时的交互。最小化服务之间的网络跳转和通信开销至关重要。使用轻量级通信协议有助于确保系统在扩展时表现良好。
- en: 'Fault isolation:'
  id: totrans-182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 故障隔离：
- en: If one service fails (for instance, the knowledge response service goes offline),
    the rest of the system can still handle other tasks or offer fallback behaviors
    (e.g., an apology response or a redirect to a human agent).
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果一个服务失败（例如，知识响应服务离线），系统中的其他部分仍然可以处理其他任务或提供回退行为（例如，道歉响应或重定向到人工代理）。
- en: 'Monitoring and observability:'
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 监控和可观察性：
- en: Robust logging and observability practices are crucial to ensure the system
    remains resilient to service failures or slowdowns. The conversation analytics
    service plays a key role in tracking system health and performance.
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强健的日志记录和可观察性实践对于确保系统在服务故障或减速时保持弹性至关重要。对话分析服务在跟踪系统健康和性能方面发挥着关键作用。
- en: Why microservices for conversational AI?
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么对话式人工智能需要微服务？
- en: Breaking down a conversational AI system into these four specialized services
    confers significant benefits in **maintainability**, **scalability**, and **team
    agility**. Each service can evolve independently, allowing rapid iteration on
    NLP models, conversation flows, and knowledge retrieval strategies without risking
    a “big bang” failure across the entire application.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 将对话式人工智能系统分解为这四个专业服务，在**可维护性**、**可扩展性**和**团队敏捷性**方面带来了显著的好处。每个服务都可以独立演进，允许对NLP模型、对话流程和知识检索策略进行快速迭代，而不会在整个应用程序中引发“大爆炸”故障。
- en: At the same time, careful attention to **inter-service communication** is crucial.
    As the sequence diagram shows, multiple hops occur for every user request. Using
    lightweight communication protocols and distinguishing between synchronous and
    asynchronous operations helps maintain system responsiveness.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，对**服务间通信**的细致关注至关重要。如图所示，每个用户请求都会发生多次跳转。使用轻量级通信协议并区分同步和异步操作有助于保持系统响应性。
- en: The example of conversational AI powerfully illustrates how the microservices
    approach enables balancing flexibility, fault tolerance, and iterative innovation.
    The lessons learned here – such as independently scaling critical services, isolating
    data for security, and ensuring graceful failure modes – apply broadly to a wide
    array of AI-driven solutions.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式AI的例子有力地说明了微服务方法如何实现灵活性、容错性和迭代创新的平衡。在这里学到的经验教训——例如，独立扩展关键服务、隔离数据以保障安全、确保优雅的故障模式——广泛适用于各种由AI驱动的解决方案。
- en: This real-world implementation pattern demonstrates that while microservices
    add complexity, the benefits they bring to AI systems – particularly those requiring
    frequent updates, variable scaling, and component-level innovation – often outweigh
    the challenges when properly architected and implemented.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这种现实世界的实现模式表明，尽管微服务增加了复杂性，但它们给AI系统带来的好处——尤其是那些需要频繁更新、可变扩展和组件级创新——通常在适当架构和实施的情况下，会超过所面临的挑战。
- en: Considerations for an AI system
  id: totrans-191
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI系统的考虑因素
- en: Creating a well-designed AI system architecture necessitates careful consideration
    of several key factors. These factors ensure that the system not only functions
    effectively but also adapts to future demands and challenges.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 设计一个良好的AI系统架构需要仔细考虑几个关键因素。这些因素确保系统不仅能够有效运行，而且能够适应未来的需求和挑战。
- en: 'Scalability: handling growing data and model complexity'
  id: totrans-193
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可扩展性：处理增长的数据和模型复杂性
- en: 'AI systems often encounter growing volumes of data and increasingly complex
    models. Scalability is the ability of a system to handle this growth without compromising
    performance. Effective strategies include the following:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统经常遇到数据量增长和模型日益复杂的问题。可扩展性是指系统在不影响性能的情况下处理这种增长的能力。有效的策略包括以下内容：
- en: '**Horizontal scaling**: This involves adding more compute resources to distribute
    the workload. For instance, in a cloud environment, you might deploy additional
    virtual machines or containers to handle increased traffic. Kubernetes can orchestrate
    these containers, ensuring that the workload is evenly distributed.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**水平扩展**：这涉及到添加更多计算资源以分配工作负载。例如，在云环境中，您可能需要部署额外的虚拟机或容器来处理增加的流量。Kubernetes可以编排这些容器，确保工作负载均匀分布。'
- en: '**Vertical scaling**: Enhancing existing resources with more powerful hardware.
    For example, upgrading a server’s CPU or GPUs, adding more RAM, or using SSDs
    instead of HDDs to improve I/O performance.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**垂直扩展**：通过更强大的硬件增强现有资源。例如，升级服务器的CPU或GPU、增加更多RAM或使用SSD代替HDD以提高I/O性能。'
- en: '**Distributed computing**: Utilizing frameworks such as Apache Spark or Hadoop
    to process data across multiple nodes. This approach breaks down large datasets
    into smaller chunks that can be processed in parallel, significantly reducing
    processing time. For instance, Spark’s **Resilient Distributed Datasets** (**RDD**s)
    allow for in-memory processing, which is much faster than traditional disk-based
    processing.'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分布式计算**：利用Apache Spark或Hadoop等框架在多个节点上处理数据。这种方法将大型数据集分解成更小的块，可以并行处理，显著减少处理时间。例如，Spark的**弹性分布式数据集**（RDDs）允许内存处理，这比传统的基于磁盘的处理要快得多。'
- en: 'Performance: optimization techniques'
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能：优化技术
- en: 'In many AI applications, real-time or near-real-time processing is crucial.
    Techniques to optimize performance include the following:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多AI应用中，实时或近实时处理至关重要。优化性能的技术包括以下内容：
- en: '**Hardware acceleration**: Leveraging GPUs or TPUs for computationally intensive
    tasks – for example, TensorFlow and PyTorch can utilize CUDA cores in NVIDIA GPUs
    to accelerate deep learning model training.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬件加速**：利用GPU或TPU进行计算密集型任务——例如，TensorFlow和PyTorch可以利用NVIDIA GPU中的CUDA核心来加速深度学习模型训练。'
- en: '**Parallel processing**: Dividing tasks into smaller sub-tasks that can be
    executed concurrently. In Python, libraries such as multiprocessing or concurrent.futures
    can be used to parallelize tasks – for instance, training multiple models simultaneously
    or processing different data batches in parallel.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行处理**：将任务划分为可以同时执行的小子任务。在Python中，可以使用如multiprocessing或concurrent.futures等库来并行化任务——例如，同时训练多个模型或并行处理不同的数据批次。'
- en: '**Algorithm optimization**: Choosing or designing algorithms with lower computational
    complexity. For example, using approximate nearest neighbor algorithms for large-scale
    similarity search instead of exact methods, which are computationally expensive.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**算法优化**：选择或设计计算复杂度较低的算法。例如，使用近似最近邻算法进行大规模相似性搜索，而不是计算成本高昂的精确方法。'
- en: 'Reliability: fault tolerance, error handling, and redundancy'
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可靠性：容错、错误处理和冗余
- en: 'Reliability is paramount, especially in critical applications. To ensure system
    uptime and data integrity, strategies such as fault tolerance, error handling,
    and redundancy are employed:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 可靠性至关重要，尤其是在关键应用中。为确保系统正常运行时间和数据完整性，采用诸如容错、错误处理和冗余等策略：
- en: '**Fault tolerance**: The system can continue operating even if some components
    fail. For example, in a microservices architecture, if one service fails, others
    can continue to function. Tools such as Netflix’s Hystrix can be used to implement
    circuit breakers to manage failures.'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容错**：即使某些组件失败，系统仍能继续运行。例如，在微服务架构中，如果一个服务失败，其他服务可以继续运行。可以使用Netflix的Hystrix等工具来实现断路器以管理故障。'
- en: '**Error handling**: Mechanisms are in place to detect and correct errors gracefully
    – for instance, using `try-catch` blocks in code to handle exceptions and logging
    errors for further analysis.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误处理**：设有机制来优雅地检测和纠正错误——例如，在代码中使用`try-catch`块来处理异常，并记录错误以供进一步分析。'
- en: '**Redundancy**: Critical components are duplicated to prevent single points
    of failure – for example, using RAID configurations for disk storage or deploying
    services in multiple availability zones in cloud environments to ensure high availability.'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**冗余**：关键组件被复制以防止单点故障——例如，使用RAID配置进行磁盘存储或在云环境中部署服务以确保高可用性。'
- en: 'Security: data privacy and model robustness'
  id: totrans-208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全：数据隐私和模型鲁棒性
- en: 'AI systems often handle sensitive data, making security a top priority. Key
    considerations include the following:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统通常处理敏感数据，使安全性成为首要任务。以下是一些关键考虑因素：
- en: '**Data encryption**: Protecting data at rest and in transit – for instance,
    using AES encryption for data stored in databases and TLS for data transmitted
    over networks. The use of encryption approaches needs to be considered and tested
    thoroughly to scope the impact on model and system performance.'
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据加密**：保护静态数据和传输中的数据——例如，使用AES加密存储在数据库中的数据和使用TLS传输网络中的数据。加密方法的使用需要彻底考虑和测试，以确定对模型和系统性能的影响。'
- en: '**Access control**: Implementing strict authorization and authentication mechanisms
    – for example, using OAuth 2.0 for secure API access and **role-based access control**
    (**RBAC**) to manage permissions.'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**访问控制**：实施严格的授权和身份验证机制——例如，使用OAuth 2.0进行安全的API访问和**基于角色的访问控制**（RBAC）来管理权限。'
- en: '**Model robustness**: Guarding against adversarial attacks that could manipulate
    the system. Techniques such as adversarial training, where the model is trained
    on both normal and adversarial examples, can help improve robustness. Additionally,
    you can deploy anomaly detection systems to monitor for unusual patterns in data
    input.'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型鲁棒性**：防范可能操纵系统的对抗性攻击。例如，通过在正常和对抗性示例上训练模型来提高鲁棒性的对抗性训练技术，以及部署异常检测系统以监控数据输入中的异常模式。'
- en: 'Data modeling: catalogs and ontologies'
  id: totrans-213
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据建模：目录和本体
- en: In the realm of AI, data is not just a valuable asset but the very foundation
    upon which intelligent systems are built. As AI models rely heavily on vast amounts
    of data to learn and make informed decisions, effective management and organization
    of this data becomes paramount. This is where data catalogs and ontologies step
    in as indispensable tools for navigating the complexities of data landscapes within
    AI architectures.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能领域，数据不仅仅是宝贵的资产，而且是构建智能系统的基石。由于人工智能模型严重依赖大量数据来学习和做出明智的决定，因此有效管理和组织这些数据变得至关重要。这就是数据目录和本体作为在人工智能架构中导航数据景观复杂性的不可或缺工具的用武之地。
- en: Catalogs serve as centralized repositories of metadata, providing comprehensive
    information about the data assets within an AI system. They act as a comprehensive
    index, offering insights into the data’s location, schema, lineage, quality, and
    other relevant attributes. By consolidating this information in a structured and
    accessible manner, data catalogs empower data scientists, engineers, and analysts
    to gain a deeper understanding of their data resources, streamline their workflows,
    and ensure data governance.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 目录作为元数据的集中存储库，提供关于人工智能系统内数据资产的综合信息。它们充当全面的索引，提供关于数据位置、模式、血缘、质量和其他相关属性的见解。通过以结构化和可访问的方式整合这些信息，数据目录使数据科学家、工程师和分析人员能够更深入地了解他们的数据资源，简化他们的工作流程，并确保数据治理。
- en: Ontologies give a semantic representation of the data elements within the domain.
    They can aid the data engineer in understanding how and why data elements are
    associated and improve processing pipelines. Ontologies also give data scientists
    context for model development and updating.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 概念模型为领域内的数据元素提供语义表示。它们可以帮助数据工程师理解数据元素是如何以及为什么相互关联的，并改进处理流程。概念模型还为数据科学家提供模型开发和更新的上下文。
- en: The technical and functional attributes of AI systems have been discussed. The
    next section discusses the different ways to implement systems in a modern cloud
    context. The use of cloud technology ensures that one can readily scale an AI
    system based on actual demand and provides for flexibility in resource allocations.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 已经讨论了人工智能系统的技术和功能属性。下一节将讨论在现代云环境中实现系统的不同方式。使用云技术确保可以根据实际需求轻松扩展人工智能系统，并为资源分配提供灵活性。
- en: Modern AI deployment paradigms
  id: totrans-218
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 现代人工智能部署范式
- en: 'As AI systems continue to evolve, new deployment paradigms have emerged to
    address specific requirements and use cases. This section explores two significant
    approaches: cloud-native AI architectures and edge AI deployments.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能系统的持续发展，新的部署范式已经出现，以解决特定的需求和用例。本节探讨了两种重要方法：云原生人工智能架构和边缘人工智能部署。
- en: Cloud-native AI architectures
  id: totrans-220
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 云原生人工智能架构
- en: The increasing complexity and scale of AI applications have led to the adoption
    of cloud-native architectures. These architectures leverage the scalability, flexibility,
    and cost-efficiency of cloud computing platforms to enable efficient development,
    deployment, and management of AI systems. In a cloud-native architecture, AI components
    are designed to run seamlessly in cloud environments, taking advantage of specialized
    services for storage, compute, and networking.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能应用的复杂性和规模不断增加，导致云原生架构的采用。这些架构利用云计算平台的可扩展性、灵活性和成本效益，以实现人工智能系统的有效开发、部署和管理。在云原生架构中，人工智能组件被设计为在云环境中无缝运行，利用存储、计算和网络的专业化服务。
- en: 'Key characteristics of cloud-native AI architectures include the following:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 云原生人工智能架构的关键特性包括以下内容：
- en: '**Containerization**: AI applications are packaged into lightweight, portable
    containers using technologies such as Docker, ensuring consistency across development,
    testing, and production environments.'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容器化**：使用Docker等技术将人工智能应用打包成轻量级、可移植的容器，确保在开发、测试和生产环境中的一致性。'
- en: '**Orchestration**: Container orchestration platforms such as Kubernetes manage
    the deployment, scaling, and operation of application containers across clusters
    of hosts.'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编排**：Kubernetes等容器编排平台管理跨主机集群的应用容器部署、扩展和操作。'
- en: '**Microservices**: As discussed earlier, breaking down AI systems into smaller,
    independent services enables more efficient resource utilization and easier scaling.'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微服务**：如前所述，将人工智能系统分解成更小、独立的微服务，可以更有效地利用资源并更容易进行扩展。'
- en: '**Serverless computing**: Platforms such as AWS Lambda, Azure Functions, and
    Google Cloud Functions allow developers to focus on writing code without worrying
    about the underlying infrastructure, particularly useful for event-driven AI workloads.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无服务器计算**：AWS Lambda、Azure Functions和Google Cloud Functions等平台允许开发者专注于编写代码，无需担心底层基础设施，这对于事件驱动的AI工作负载特别有用。'
- en: '**Managed services**: Cloud providers offer specialized AI services such as
    fully managed machine learning platforms (e.g., Amazon SageMaker, Microsoft Azure
    ML, Google Vertex AI) that streamline the development and deployment process.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**托管服务**：云服务提供商提供专门的AI服务，例如完全托管的机器学习平台（例如，亚马逊SageMaker、微软Azure ML、谷歌Vertex
    AI），这些服务简化了开发和部署流程。'
- en: '**Cloud-native versus lift-and-shift**: Cloud-native AI components are specifically
    designed to leverage the benefits of cloud environments, such as auto-scaling,
    serverless computing, and managed services. This approach offers greater flexibility,
    scalability, and cost-efficiency compared to simply “lifting and shifting” existing
    on-premises AI systems to the cloud without architectural modifications.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**云原生与迁移：** 云原生AI组件专门设计用于利用云环境的好处，例如自动扩展、无服务器计算和管理服务。与简单地将现有的本地AI系统“迁移”到云中而不进行架构修改相比，这种方法提供了更大的灵活性、可扩展性和成本效益。'
- en: 'Data lakes and data warehouses in AI architectures: foundations for data-driven
    intelligence'
  id: totrans-229
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据湖和数据仓库在AI架构中的应用：数据驱动智能的基础
- en: In the realm of AI, data is the cornerstone of innovation and progress. AI models
    thrive on massive volumes of data, leveraging it to learn patterns, make predictions,
    and generate valuable insights. However, effectively managing and harnessing the
    vast amounts of data involved in AI projects necessitates specialized storage
    and management solutions. Two prominent concepts that have emerged in this context
    are **data lakes** and **data warehouses**.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能领域，数据是创新和进步的基石。AI模型依赖于大量数据，利用它来学习模式、做出预测并生成有价值的见解。然而，有效地管理和利用人工智能项目中涉及的大量数据需要专门的存储和管理解决方案。在此背景下，出现了两个突出的概念：**数据湖**和**数据仓库**。
- en: 'Data lakes: a vast reservoir of raw data'
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据湖：原始数据的巨大水库
- en: Data lakes serve as expansive repositories where raw data is stored in its native
    format. They are designed to accommodate structured, semi-structured, and unstructured
    data from diverse sources. The flexibility of data lakes makes them ideal for
    storing large volumes of data that may not have a predefined purpose or structure.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 数据湖作为广泛的存储库，以原始格式存储原始数据。它们旨在容纳来自不同来源的结构化、半结构化和非结构化数据。数据湖的灵活性使它们成为存储大量可能没有预定义目的或结构的数据的理想选择。
- en: '**Key characteristics:**'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键特征：**'
- en: '**Schema-on-read:** Data lakes do not enforce a strict schema during ingestion,
    allowing for flexibility in data types and structures. The schema is defined during
    analysis or processing, empowering users to adapt to evolving data requirements.'
  id: totrans-234
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**读取时模式：** 数据湖在摄取过程中不强制执行严格的模式，允许数据类型和结构具有灵活性。模式在分析或处理期间定义，使用户能够适应不断变化的数据需求。'
- en: '**Cost-effective scalability:** Data lakes can easily scale to accommodate
    growing data volumes, making them a cost-effective solution for storing massive
    datasets.'
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本效益的可扩展性：** 数据湖可以轻松扩展以适应不断增长的数据量，这使得它们成为存储大量数据集的经济高效解决方案。'
- en: '**Support for diverse data:** Data lakes can handle a wide range of data, including
    sensor readings, social media feeds, log files, and more.'
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持多样化的数据：** 数据湖可以处理各种数据，包括传感器读数、社交媒体流、日志文件等。'
- en: '**Ideal for exploratory analysis:** Data lakes provide a fertile ground for
    data scientists and analysts to explore data, identify patterns, and generate
    hypotheses.'
  id: totrans-237
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适合探索性分析：** 数据湖为数据科学家和分析师提供了一个肥沃的土壤，以探索数据、识别模式和生成假设。'
- en: '**Example use cases:**'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例用例：**'
- en: An e-commerce company might store clickstream data, customer reviews, and social
    media interactions in a data lake for subsequent analysis and personalization
    efforts.
  id: totrans-239
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家电子商务公司可能会将点击流数据、客户评论和社交媒体互动存储在数据湖中，以进行后续分析和个性化工作。
- en: A healthcare organization could use a data lake to store medical images, electronic
    health records, and genomic data for research and development of AI-driven diagnostic
    tools.
  id: totrans-240
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个医疗保健组织可以使用数据湖来存储医学图像、电子健康记录和基因组数据，用于AI驱动诊断工具的研究和开发。
- en: 'Data warehouses: structured repositories for analytics'
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据仓库：分析的结构化存储库
- en: Data warehouses are structured repositories that house processed and curated
    data, transformed into a consistent format for analysis and reporting purposes.
    One can build and develop ontologies to organize and provide semantic structure
    to the data that comes into the system. Ontologies also provide a mechanism to
    better manage and control model performance by making relationships between data
    elements explicit.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 数据仓库是结构化的存储库，用于存放经过处理和整理的数据，将其转换为一致格式以进行分析和报告。可以构建和开发本体来组织和提供系统进入数据的语义结构。本体还提供了一种机制，通过使数据元素之间的关系明确，更好地管理和控制模型性能。
- en: They excel at facilitating efficient querying and analysis, making them indispensable
    for business intelligence and decision support applications.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 它们在促进高效查询和分析方面表现出色，对于商业智能和决策支持应用来说是不可或缺的。
- en: '**Key characteristics:**'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键特征：**'
- en: '**Schema-on-write:** Data warehouses enforce a predefined schema during data
    ingestion, ensuring data consistency and integrity.'
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**写入时模式：** 数据仓库在数据摄入期间强制执行预定义的模式，确保数据的一致性和完整性。'
- en: '**Optimized for querying:** Data warehouses employ optimized data structures
    and indexing techniques to accelerate data retrieval and analysis, enabling faster
    insights.'
  id: totrans-246
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**针对查询优化：** 数据仓库采用优化的数据结构和索引技术来加速数据检索和分析，从而实现更快的洞察。'
- en: '**Support for structured data:** Data warehouses are primarily designed for
    structured data, such as transactional data, customer information, and financial
    records.'
  id: totrans-247
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对结构化数据的支持：** 数据仓库主要设计用于结构化数据，例如交易数据、客户信息和财务记录。'
- en: '**Ideal for business intelligence:** Data warehouses empower organizations
    to generate reports, dashboards, and visualizations for informed decision-making.'
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适合商业智能：** 数据仓库使组织能够生成报告、仪表板和可视化，以实现明智的决策。'
- en: '**Example use cases:**'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例用例：**'
- en: A financial institution might use a data warehouse to store transaction data,
    customer information, and market trends for risk analysis and fraud detection.
  id: totrans-250
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家金融机构可能会使用数据仓库来存储交易数据、客户信息和市场趋势，以进行风险评估和欺诈检测。
- en: A manufacturing company could leverage a data warehouse to analyze production
    data, supply chain metrics, and customer feedback to optimize operations and improve
    product quality.
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家制造公司可以利用数据仓库来分析生产数据、供应链指标和客户反馈，以优化运营和提高产品质量。
- en: The synergy of data lakes and data warehouses
  id: totrans-252
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据湖和数据仓库的协同效应
- en: In many AI architectures, data lakes and data warehouses complement each other.
    Raw data is first ingested into a data lake, where it undergoes cleansing, transformation,
    and enrichment. The refined data is then transferred to a data warehouse for further
    analysis and reporting. This synergistic approach enables organizations to leverage
    the flexibility of data lakes for data exploration and the structure of data warehouses
    for decision support, creating a robust foundation for data-driven AI applications.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多AI架构中，数据湖和数据仓库相互补充。原始数据首先被摄入到数据湖中，在那里它经历清洗、转换和丰富。经过精炼的数据随后被转移到数据仓库中进行进一步分析和报告。这种协同方法使组织能够利用数据湖的灵活性进行数据探索，以及数据仓库的结构为决策支持，为数据驱动的AI应用构建一个坚实的基础。
- en: 'AI on cloud computing: a game-changer for AI'
  id: totrans-254
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 云计算上的AI：AI的变革者
- en: The convergence of AI and cloud computing has opened up a new frontier of possibilities
    for organizations seeking to leverage the power of AI. Cloud computing provides
    a scalable, flexible, and cost-effective infrastructure for developing, deploying,
    and scaling AI applications. By harnessing the capabilities of the cloud, businesses
    can overcome the limitations of traditional on-premises AI solutions and accelerate
    innovation.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: AI和云计算的融合为寻求利用AI力量的组织开辟了新的可能性。云计算为开发、部署和扩展AI应用提供了一个可扩展、灵活且成本效益高的基础设施。通过利用云的能力，企业可以克服传统本地AI解决方案的限制，并加速创新。
- en: Benefits of cloud-based AI
  id: totrans-256
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于云的AI的好处
- en: 'Cloud-based AI offers several key advantages that make it an attractive option
    for organizations of all sizes:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 基于云的AI为所有规模的组织提供了几个关键优势，使其成为有吸引力的选择：
- en: '**Scalability**: Cloud resources can be easily scaled up or down to meet the
    fluctuating demands of AI workloads. This elasticity allows organizations to handle
    large datasets, train complex models, and process vast amounts of data without
    having to invest in and maintain expensive hardware infrastructure.'
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性：** 云资源可以轻松扩展或缩减，以满足AI工作负载的波动需求。这种弹性使组织能够处理大量数据集、训练复杂模型以及处理大量数据，而无需投资和维护昂贵的硬件基础设施。'
- en: '**Flexibility**: Cloud platforms provide a wide range of AI services and tools,
    giving organizations the flexibility to choose the best options for their specific
    needs. This allows businesses to experiment with different AI approaches, quickly
    iterate on models, and adapt to changing requirements.'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性：** 云平台提供了一系列AI服务和工具，使组织能够根据特定需求选择最佳选项。这允许企业尝试不同的AI方法，快速迭代模型，并适应不断变化的需求。'
- en: '**Cost-efficiency**: Cloud-based AI can be more cost-effective than on-premises
    solutions. Organizations only pay for the resources they consume, eliminating
    the need for upfront capital investments in hardware and software. Additionally,
    cloud providers often offer pay-as-you-go pricing models, which can further reduce
    costs.'
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本效益**：基于云的人工智能可能比本地解决方案更具成本效益。组织只需为它们使用的资源付费，消除了在硬件和软件上进行前期资本投资的需求。此外，云提供商通常提供按使用付费的定价模式，这可以进一步降低成本。'
- en: By leveraging the power of cloud-based AI, organizations can unlock new levels
    of innovation, efficiency, and competitiveness.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用基于云的人工智能的力量，组织可以解锁新的创新、效率和竞争力水平。
- en: 'Major cloud AI platforms: accelerating innovation with comprehensive toolsets'
  id: totrans-262
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主要云人工智能平台：通过全面的工具集加速创新
- en: Major cloud providers have emerged as key players in the AI landscape, offering
    comprehensive suites of AI services and tools that cater to a wide range of needs.
    These platforms provide a one-stop shop for businesses and developers looking
    to leverage the power of AI in their applications and workflows.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 主要云服务提供商已成为人工智能领域的关键参与者，提供了一系列全面的人工智能服务和工具，满足广泛的业务需求。这些平台为寻求在应用程序和工作流程中利用人工智能力量的企业和开发者提供了一个一站式商店。
- en: Key cloud AI platforms
  id: totrans-264
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键云人工智能平台
- en: '**Google Cloud AI platform (Vertex AI)**: This unified platform streamlines
    the entire **Machine Learning** (**ML**) lifecycle, from building and training
    models to deploying and managing them in production. Vertex AI’s AutoML feature
    simplifies model development for users with limited ML expertise, while the model
    garden offers a collection of pre-trained models ready for deployment. Vertex
    AI Pipelines orchestrates complex ML workflows, enabling efficient experimentation
    and automation.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**谷歌云人工智能平台（Vertex AI）**：这个统一的平台简化了整个**机器学习**（**ML**）的生命周期，从构建和训练模型到在生产环境中部署和管理它们。Vertex
    AI的AutoML功能简化了对于机器学习专业知识有限的用户的模型开发，而模型园地提供了一系列预训练模型，可供部署。Vertex AI Pipelines编排复杂的机器学习工作流程，实现高效的实验和自动化。'
- en: '**Amazon SageMaker**: A fully managed service, SageMaker empowers users to
    build, train, and deploy ML models at scale. It boasts a wide array of built-in
    algorithms and frameworks, making it accessible to both beginners and experienced
    practitioners. SageMaker’s scalability and integration with other AWS services
    make it a popular choice for enterprise-grade AI solutions.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**亚马逊SageMaker**：这是一个完全托管的服务，SageMaker使用户能够大规模地构建、训练和部署机器学习模型。它拥有丰富的内置算法和框架，使得初学者和经验丰富的从业者都能使用。SageMaker的可扩展性和与其他AWS服务的集成使其成为企业级人工智能解决方案的热门选择。'
- en: '**Amazon Bedrock**: This cutting-edge service democratizes access to **Foundation
    Models** (**FM**s) from leading AI start-ups and Amazon itself through a simple
    API. Bedrock enables developers to harness the power of state-of-the-art generative
    AI capabilities without having to build and train complex models from scratch.'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**亚马逊Bedrock**：这项尖端服务通过简单的API使领先的人工智能初创公司和亚马逊本身提供的**基础模型**（**FM**s）的访问变得民主化。Bedrock使开发者能够利用最先进的生成人工智能能力，而无需从头开始构建和训练复杂的模型。'
- en: '**Microsoft Azure AI**: This platform offers a diverse range of AI services,
    including pre-built AI models for computer vision, speech recognition, natural
    language processing, and decision-making. Azure Machine Learning allows users
    to create and deploy custom AI models, while the platform’s extensive integration
    with other Azure services makes it a versatile choice for a variety of AI applications.'
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微软Azure人工智能**：这个平台提供了一系列人工智能服务，包括预构建的用于计算机视觉、语音识别、自然语言处理和决策的人工智能模型。Azure机器学习允许用户创建和部署自定义人工智能模型，而平台与其他Azure服务的广泛集成使其成为各种人工智能应用的灵活选择。'
- en: These cloud AI platforms provide a powerful and accessible way for organizations
    to incorporate AI into their operations, accelerating innovation and driving business
    value.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 这些云人工智能平台为组织将人工智能融入其运营提供了强大且易于访问的方式，加速了创新并推动了商业价值。
- en: Summary
  id: totrans-270
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we have explored the fundamental principles of AI system architecture,
    establishing a comprehensive framework for understanding the building blocks that
    power intelligent systems. We examined the core components – data as the lifeblood,
    algorithmic frameworks that enable learning, model architectures that encapsulate
    intelligence, and infrastructure that provides computational resources – along
    with architectural patterns such as microservices that offer modularity and flexibility.
    Critical design considerations of scalability, performance, reliability, and security
    were discussed as essential elements for robust AI systems that can grow with
    increasing demands while remaining resilient and protected.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了人工智能系统架构的基本原理，建立了一个全面框架来理解驱动智能系统的构建块。我们考察了核心组件——数据作为生命之源，能够实现学习的算法框架，封装智能的模型架构，以及提供计算资源的基础设施——以及如微服务这样的架构模式，它提供了模块化和灵活性。可扩展性、性能、可靠性和安全性等关键设计考虑因素被讨论为构建强大的人工智能系统的基本要素，这些系统能够随着需求的增加而增长，同时保持弹性和保护。
- en: The landscape of AI deployment continues to evolve rapidly, with cloud-native
    architectures leveraging containerization, orchestration, and serverless computing
    to achieve unprecedented efficiency. The synergy between data lakes, data warehouses,
    and data catalogs creates a solid foundation for data-driven intelligence, while
    major cloud platforms democratize access to sophisticated AI capabilities. As
    we move forward, these foundational principles will guide the development of AI
    systems that are not only powerful but also scalable, reliable, and secure – enabling
    the next generation of innovations across industries.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能部署的格局正在迅速演变，云原生架构利用容器化、编排和无服务器计算来实现前所未有的效率。数据湖、数据仓库和数据目录之间的协同作用为数据驱动的智能奠定了坚实的基础，而主要的云平台则使复杂的AI能力更加民主化。随着我们向前发展，这些基础原则将指导开发既强大又可扩展、可靠和安全的AI系统——促进跨行业的下一代创新。
