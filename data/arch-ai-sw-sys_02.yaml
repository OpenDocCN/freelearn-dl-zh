  zh: '1'
- en: Fundamentals of AI System Architecture
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能系统架构的基本原理
- en: The recent surge of public interest in **Artificial Intelligence** (**AI**),
    particularly with the rise of generative AI, has ignited a wave of excitement
    and demand for comprehensive AI solutions. This heightened interest extends beyond
    tech enthusiasts and researchers to businesses, governments, and individuals seeking
    to harness AI’s power to solve real-world problems and enhance their capabilities.
    In this landscape, the architecture of AI systems, which defines their structure,
    components, and interactions, plays a pivotal role in shaping the development
    and deployment of effective AI solutions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 公众对**人工智能**（**AI**）的兴趣最近激增，尤其是随着生成式人工智能的兴起，引发了一股对全面人工智能解决方案的兴奋和需求。这种高度的兴趣不仅超越了技术爱好者和研究人员，还扩展到企业、政府和寻求利用人工智能的力量来解决现实世界问题并增强其能力的人。在这个环境中，人工智能系统的架构，它定义了其结构、组件和交互，在塑造有效人工智能解决方案的开发和部署中发挥着关键作用。
- en: AI has emerged as a transformative force, revolutionizing industries and reshaping
    the way we interact with technology and the world around us. At its core, AI refers
    to computational models that mimic human cognitive functions, including learning
    from data, recognizing patterns, making decisions, and even interacting with their
    environment. This revolutionary technology spans a wide spectrum, from simple
    rule-based systems to sophisticated deep learning models, each with unique applications
    and capabilities.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已成为一种变革力量，颠覆了行业，重塑了我们与技术以及周围世界互动的方式。在核心上，人工智能指的是模仿人类认知功能的计算模型，包括从数据中学习、识别模式、做出决策，甚至与环境交互。这项革命性技术跨越了广泛的范围，从简单的基于规则的系统到复杂的深度学习模型，每个都有其独特的应用和功能。
- en: A major aspect of any AI system is that the results of the inference being done
    need to be relevant and trusted. To ensure trust is gained and maintained, the
    use of strong architecture is paramount. One not only architects the technology
    but also how the technology is going to be used, managed, and evaluated by the
    span of stakeholders. The stakeholders need to be able to pinpoint issues, rapidly
    correct model parameters, and deploy changes in a deliberate and rapid manner.
    In more common parlance, the architecting and supporting processes can be described
    as “guard rails.” How one employs guard rails is very specific to the domain and
    use case that is to use the AI technology. There are classes of guard rails that
    can be discussed – for example, the use of canaries to judge model correctness
    from a known gold standard, time and data flow metrics to judge model performance,
    and the use of filters and robust data quality checks so that only consistent
    and correct data enters the system. Another class of guardrails is human system
    interfaces, such as alerting frameworks to classify errors and monitors, the use
    of troubleshooting tools, and preset protocols for handling unexpected errors.
    Written procedures or guidance from modeling allow for the maintenance of a system
    without the need to call upon the model developer to do troubleshooting.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人工智能系统的一个主要方面是正在进行推理的结果需要相关且可信。为确保获得并保持信任，使用强大的架构至关重要。不仅需要设计技术，还需要考虑技术将被如何使用、管理和评估，以及涉及的利益相关者。利益相关者需要能够迅速定位问题、快速纠正模型参数，并以深思熟虑和迅速的方式部署更改。用更通俗的话来说，架构和支持过程可以描述为“安全栏”。如何使用安全栏非常具体，取决于将要使用人工智能技术的领域和用例。可以讨论的安全栏类别包括——例如，使用金丝雀来判断模型正确性，从已知的黄金标准出发；使用时间和数据流指标来判断模型性能；以及使用过滤器和稳健的数据质量检查，以确保只有一致且正确的数据进入系统。另一类安全栏是人类系统接口，例如用于分类错误的警报框架和监控器，使用故障排除工具，以及处理意外错误的预设协议。建模的书面程序或指导有助于在不需要调用模型开发者进行故障排除的情况下维护系统。
- en: Trust is a paramount consideration for system success, so one needs to architect
    a system with that in mind. In many ways, the presentation and lessons learned
    described in this book look to ensure trust in an AI system.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 信任是系统成功的关键考虑因素，因此需要设计一个考虑这一点的系统。在许多方面，本书中描述的展示和经验教训旨在确保人工智能系统的信任。
- en: 'This chapter highlights, in a broad sense, the key aspects of AI architecture
    considerations that drive a successful AI implementation. The topics are as follows:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章从广义上强调了推动成功人工智能实施的AI架构考虑的关键方面。以下是主题：
