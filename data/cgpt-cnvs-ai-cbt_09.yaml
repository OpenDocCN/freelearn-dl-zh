- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: The Future of Conversational AI with LLMs
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于大型语言模型（LLMs）的对话式AI的未来
- en: In this chapter, we dive deeper into topics related to taking our ChatGPT app
    to production. We’ve already touched on some of these areas throughout the book,
    but now let’s consider some of these aspects in more detail as well as look at
    lessons already learned in the industry. Building on what we’ve learned from creating
    ChatGPT applications so far, we can make informed decisions and create successful
    strategies related to our conversational AI projects.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入探讨与将我们的ChatGPT应用投入生产相关的话题。我们在本书的其它部分已经涉及了一些这些领域，但现在让我们更详细地考虑这些方面，同时也要看看行业中学到的经验教训。基于到目前为止我们从创建ChatGPT应用中学到的知识，我们可以做出明智的决定，并创建与我们的对话式AI项目相关的成功策略。
- en: We’ll also explore other alternative technologies to ChatGPT at the time of
    writing, with a special focus on the potential of smaller language models. Finally,
    we’ll look ahead to what the future might hold for LLMs and where your organization
    may be heading, preparing you for what’s coming next in the evolving landscape
    of conversational AI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将探讨在撰写本文时ChatGPT的其它替代技术，特别关注小型语言模型（SLM）的潜力。最后，我们将展望LLMs的未来可能，以及你的组织可能的发展方向，为你准备对话式AI演变中的下一个阶段。
- en: 'In this chapter, we’ll cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Going into production
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投入生产
- en: Evaluating production systems
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估生产系统
- en: Learning how to use LangSmith to evaluate your project
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何使用LangSmith评估你的项目
- en: Advanced monitoring features with LangSmith
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangSmith的高级监控功能
- en: Alternatives to ChatGPT and LangChain
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT和LangChain的替代方案
- en: The growth of the **small language** **model** (**SLM**)
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**小型语言** **模型**（**SLM**）的增长'
- en: Where to go from here
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来的方向
- en: Technical requirements
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: In this chapter, we will be using ChatGPT extensively, so you will need to be
    signed up with a free account. If you haven’t created an account, go to [https://openai.com/](https://openai.com/)
    and click **Get Started** at the top right of the page.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将广泛使用ChatGPT，因此你需要注册一个免费账户。如果你还没有创建账户，请访问[https://openai.com/](https://openai.com/)，并在页面右上角点击**开始使用**。
- en: The examples requires python 3.10 and Jupyter notebook to be installed [https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb](https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb).
    The examples require Python 3.10 and Jupyter Notebook to be installed, which you
    can do by going to [https://jupyter.org/try-jupyter/lab/index.html](https://jupyter.org/try-jupyter/lab/index.html).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例需要安装Python 3.10和Jupyter Notebook [https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb](https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb)。这些示例需要安装Python
    3.10和Jupyter Notebook，你可以通过访问[https://jupyter.org/try-jupyter/lab/index.html](https://jupyter.org/try-jupyter/lab/index.html)来完成。
- en: 'You can find the chapter code here: [https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter9](https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter9).'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在以下链接找到本章的代码：[https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter9](https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter9)。
- en: Going into production
  id: totrans-16
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 投入生产
- en: You’ve made some great progress in increasing your knowledge of how to create
    a ChatGPT-powered conversational agent as you’ve progressed through the book.
    Hopefully, you’ve also been educated on some of the limitations, challenges, and
    pitfalls of creating systems powered by LLMs and, most importantly, getting them
    production-ready. These challenges are not to be underestimated, and it’s no surprise
    that despite the huge adoption of LLMs over the past year or so, examples of conversational
    AI agents entirely powered by LLMs are thin on the ground, and the ones that are
    have come under some intense scrutiny and unfortunately have underperformed in
    some cases. Let’s look at one in the next section.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你在本书中的进展，你在如何创建由ChatGPT驱动的对话代理方面的知识得到了很大的提升。希望你也了解了一些由LLMs驱动的系统的局限性、挑战和陷阱，最重要的是，使它们准备好投入生产。这些挑战不容小觑，过去一年多来，尽管LLMs得到了广泛的应用，但完全由LLMs驱动的对话式AI代理的例子却很少，而且其中一些在某些情况下表现不佳。让我们在下一节中看看一个例子。
- en: Understanding the dangers of going into production
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解投入生产的危险
- en: One recent example of how LLMs in production can quickly land you in hot water
    is the issues found with a chatbot deployed by a delivery firm of note. I’m not
    going to finger-point here by naming the company in question; there are other
    examples of misbehaving chatbots. Another example involved buying a Chevy Tahoe
    for a dollar – I suggest you Google that one!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 最近的一个例子是，LLM在生产中如何迅速让你陷入困境，就是一个知名配送公司部署的聊天机器人出现的问题。我不会在这里点名这家公司；还有其他表现不佳的聊天机器人的例子。另一个例子是花一美元买了一辆雪佛兰塔霍——我建议你谷歌一下这个例子！
- en: For the delivery chatbot, one disgruntled customer decided to inject some humor
    into their conversation by asking a series of awkward questions, resulting in
    the chatbot swearing and delivering a poem calling out the delivery company as
    useless. Not the greatest conversation for a customer support chatbot to be having,
    but a great example of what can go wrong with any LLM-powered conversational agent
    without the appropriate guard rails.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于交付聊天机器人，一位不满意的客户决定通过提出一系列尴尬的问题来给他们的对话增添一些幽默感，结果聊天机器人开始咒骂，并背诵了一首诗，指责配送公司无用。这对客户支持聊天机器人来说并不是一次最好的对话，但却是任何没有适当防护措施的LLM驱动的对话代理可能出错的一个很好的例子。
- en: So, what happened here? I can’t comment on the tech stack or LLM technologies
    used by the company in this chatbot project. However, if an agent does start responding
    with swear words, it looks like they were not employing any output validators
    or content moderation checks. This allowed the member of the public to essentially
    prompt the LLM directly themselves. This looks unlikely to have been an issue
    with model training but more an issue caused by missing guard rails to stop malicious
    (OK – a bit of an exaggeration) prompting. This allowed the user to engage the
    LLM in off-brand topics or out-of-scope requests. So, content filtering on LLM
    questions would have stopped this, coupled with response checking to sanitize
    output for appropriate content before sending it to the client.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这里发生了什么？我无法对这家公司在聊天机器人项目中使用的技术栈或LLM技术发表评论。然而，如果一个代理开始用脏话回应，看起来他们没有采用任何输出验证器或内容审查检查。这允许公众成员直接提示LLM。这看起来不太可能是模型训练的问题，而更可能是缺少防护措施来阻止恶意（好吧，有点夸张）的提示。这允许用户参与LLM的非品牌话题或超出范围的请求。因此，对LLM问题的内容过滤将阻止这种情况，同时结合对输出进行审查，以确保在发送给客户之前内容适当。
- en: 'There are really two issues here: input and output, which you would hope would
    be handled by a more solid prompting strategy. For example, if the agent were
    a LangChain agent powered by ChatGPT, then we’d look at creating a strong system
    prompt and using an LLM call to check an initial question before we even entered
    our main pipeline. This would need to be backed up with an extensive evaluation
    process covering not only standard questions but also how the system handles users
    trying to manipulate and/or break the system so that they can post about it on
    social media.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这里实际上有两个问题：输入和输出，你希望这些问题能够通过更稳固的提示策略来处理。例如，如果代理是一个由ChatGPT驱动的LangChain代理，那么我们会考虑创建一个强大的系统提示，并在我们进入主管道之前使用LLM调用检查初始问题。这需要有一个广泛评估过程的支持，不仅包括标准问题，还包括系统如何处理试图操纵和/或破坏系统的用户，以便他们在社交媒体上发布关于它。
- en: Remember – with great power comes great responsibility, and when creating LLM
    projects, it’s a different ballgame from traditional **natural language understanding**
    (**NLU**) systems. We’ve essentially gone from making a system and watching out
    for correct, incorrect, and missing answers to a system where all this can happen
    and practically anything else if you’re not making a robust enough effort to stop
    it.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 记住——权力越大，责任越大，在创建LLM项目时，与传统**自然语言理解**（**NLU**）系统相比，这是一场不同的比赛。我们实际上已经从创建一个系统并关注正确、错误和缺失的答案，转变为一个所有这些都可以发生，而且几乎任何其他事情都可以发生的系统，除非你做出了足够的努力来阻止它。
- en: By now, I’m sure you appreciate that one of the most popular LLM applications
    is the RAG system, and we’ve covered this extensively in previous chapters. However,
    these are also not without their challenges; let’s move on to some of these in
    more detail.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，我相信你已经意识到最受欢迎的LLM应用之一是RAG系统，我们已经在之前的章节中对此进行了广泛的讨论。然而，这些系统也并非没有挑战；让我们更详细地探讨一些这些问题。
- en: Challenges of RAG systems
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RAG系统的挑战
- en: 'As we’ve learned, RAG systems are one of the popular implementations in LLM
    conversational AI and may feature in systems you are currently trying to re-create
    with LLM technology or with the greenfield project you’re developing. You’ve also
    learned you can get some pretty good performance out of these systems without
    huge amounts of effort. However, despite being the poster boy of LLM-powered conversational
    AI, the RAG system does pose challenges that become much more important as you
    move toward production, and we’ll look at these challenges in the next section.
    So, let’s consider we’re looking at bringing a project with a RAG system into
    production – for example, the project in [*Chapter 8*](B21100_08.xhtml#_idTextAnchor199):
    our **proof of concept** (**POC**) for our travel assistant. Key stakeholders
    have been impressed by Ellie Explorer so far and want to release her as a web-based
    chatbot along with broadening her scope to provide more targeted personalized
    hotel suggestions and to answer FAQ questions and more transactional use cases.
    To recap, we used a RAG system so that we could inject contextual reference data
    from our LLM-ready datastore of hotel information to provide succinct, believable
    hotel recommendations.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所学的，RAG系统是LLM对话式AI中流行的实现之一，可能出现在你目前正在尝试使用LLM技术或正在开发的绿色项目中重新创建的系统。你也了解到，你可以从这些系统中获得相当不错的性能，而不需要付出巨大的努力。然而，尽管RAG系统是LLM驱动对话式AI的典范，但它确实提出了挑战，随着你向生产阶段迈进，这些挑战变得更加重要，我们将在下一节中探讨这些挑战。因此，让我们考虑我们正在考虑将一个带有RAG系统的项目投入生产——例如，[第8章](B21100_08.xhtml#_idTextAnchor199)中的项目：我们旅行助手的**概念验证**（**POC**）。到目前为止，关键利益相关者对Ellie
    Explorer印象深刻，并希望将其作为基于网络的聊天机器人发布，同时扩大其范围，提供更多针对性的个性化酒店建议，并回答常见问题以及更多交易性用例。为了回顾，我们使用了RAG系统，以便从我们的LLM准备好的酒店信息数据存储库中注入上下文参考数据，以提供简洁、可信的酒店推荐。
- en: Despite their innovative approach, naive RAG systems have several challenges
    that can impede their effectiveness and reliability.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管它们采用了创新的方法，但简单的RAG系统存在一些挑战，可能会阻碍其有效性和可靠性。
- en: It’s a big step to move from a POC to production, and we’ll need to consider
    RAG system challenges before releasing Ellie into the wild.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 从POC过渡到生产是一个巨大的步骤，在将Ellie投入市场之前，我们需要考虑RAG系统的挑战。
- en: Traditional RAG shortcomings
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传统RAG的不足
- en: 'Let’s look at some of the shortcomings of RAG systems and how these may manifest
    in our systems in more detail:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们详细看看RAG系统的不足之处以及这些不足如何在我们的系统中体现：
- en: '**Missing content**: Failures can occur when trying to handle a question that
    cannot be answered from the existing underlying document data, maybe because the
    information is just not there or there is some issue with the chunking or embedding
    process. This can be hard to debug and needs to be handled correctly. Ideally,
    the RAG system will simply reply with a message such as “Sorry, I don’t have this
    information.” However, in cases where questions are relevant to the content but
    lack specific answers, the system might be misled into providing a response. Or
    an even harder failure to spot can be taken from our previous example: if no results
    are returned from the RAG system search – for example, hotel recommendations for
    a country not in our database of provided hotels. The LLM was responding itself
    from its own knowledge of hotels, not those from the RAG results, so suggesting
    hotels outside of the company hotel listings. This behavior can be rectified with
    prompting, but you can see the issue here: it’s hard to spot. Realistically, we
    need to check our hotel results suggestions intermittently to ensure this does
    not occur.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺失内容**：当尝试处理一个无法从现有底层文档数据中找到答案的问题时，可能会出现失败，可能是因为信息根本不存在，或者存在一些分块或嵌入过程的问题。这可能很难调试，并且需要正确处理。理想情况下，RAG系统将简单地回复一条消息，例如“抱歉，我没有这个信息。”然而，在问题与内容相关但缺乏具体答案的情况下，系统可能会被误导提供回应。或者，一个更难发现的失败可能是从我们之前的例子中得出的：如果RAG系统搜索没有返回结果——例如，对于不在我们提供的酒店数据库中的国家的酒店推荐。LLM正在从它自己对酒店的知识中回应，而不是从RAG结果中，因此建议的公司酒店列表之外的酒店。这种行为可以通过提示来纠正，但你可以看到这里的问题：很难发现。现实情况下，我们需要定期检查我们的酒店结果建议，以确保这种情况不会发生。'
- en: '**Inadequate retrieval and precision issues**: A crucial challenge for RAG
    systems is the retrieval of relevant information. The underlying retrieval model
    may fetch pertinent data, which may result in the generation of text that is misinformed
    or irrelevant. This often occurs due to training on data of insufficient quality
    or data that does not accurately represent the intended domain. Enhancing data
    quality and ensuring its alignment with the target domain are critical steps toward
    addressing this challenge. However, this may also show we need more sophisticated
    retrieval algorithms that can accurately understand the context and nuances of
    queries.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检索和精确度不足的问题**：对于RAG系统来说，检索相关信息是一个关键挑战。底层检索模型可能会获取相关数据，这可能导致生成误导性或不相关的文本。这种情况通常是由于在质量不足的数据上训练或数据未能准确代表目标领域而发生的。提高数据质量和确保其与目标领域的一致性是解决这一挑战的关键步骤。然而，这也可能表明我们需要更复杂的检索算法，这些算法可以准确理解查询的上下文和细微差别。'
- en: There can also be issues with results ranking, where the document contains the
    answer to the question but didn’t rank high enough to be presented to the user.
    There can also be issues with results ranking, where the document contains the
    answer to the question but it didn’t rank high enough to be presented to the user.
    In the case of Ellie, if we are returning *n* hotel results, in theory, all documents
    are ranked, but this may mean some don’t make the cut to be sent over to the context.
  id: totrans-33
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 也可能存在结果排名问题，其中文档包含问题的答案，但排名不够高，无法呈现给用户。也可能会出现结果排名问题，其中文档包含问题的答案，但它排名不够高，无法呈现给用户。在Ellie的情况下，如果我们返回*n*个酒店结果，从理论上讲，所有文档都会被排名，但这可能意味着一些文档可能无法达到标准，无法发送到上下文中。
- en: Basically, if we are injecting prompts with incorrect or poor contextual reference
    then it’s no surprise that the resulting response may not provide good results.
    Basically, if we are injecting prompts with incorrect or poor contextual reference,
    then it’s no surprise that the resulting response may not provide good results.
  id: totrans-34
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 基本上，如果我们输入的提示包含错误或不恰当的上下文参考，那么结果响应可能不会提供良好的结果也就不足为奇了。基本上，如果我们输入的提示包含错误或不恰当的上下文参考，那么结果响应可能不会提供良好的结果。
- en: '**Outdated information**: RAG-generated content may be based on outdated facts
    if the knowledge source isn’t regularly updated or if the model lacks mechanisms
    to discern and incorporate temporal information. Keeping the knowledge base current
    and designing retrieval systems to account for the time-sensitivity of information
    is important.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过时信息**：如果知识源没有定期更新或模型缺乏识别和整合时间信息的机制，RAG生成的内容可能会基于过时的事实。保持知识库的时效性和设计检索系统以考虑信息的时效性是很重要的。'
- en: '**Increased RAG costs**: There are concerns that there is going to be a growing
    unnecessary overhead of token costs with many ChatGPT systems with a RAG component,
    primarily caused by unoptimized retrievals and additional text results being passed
    into context.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增加的RAG成本**：有人担心，随着许多具有RAG组件的ChatGPT系统，将出现越来越多的不必要的令牌成本开销，这主要是由于未优化的检索和额外的文本结果被传递到上下文中造成的。'
- en: '`AgentExecutor` will be tackling *a*, but *b* and *c* are something you’ll
    need to build into your system.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AgentExecutor`将解决*a*，但*b*和*c*是你需要构建到你的系统中的内容。'
- en: '**Common LLM issues**: Hallucination, Toxicity, Irrelevence'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**常见的LLM问题**：幻觉、毒性、不相关性'
- en: Hallucinations and irrelevance can arise from flaws in the system design or
    inaccuracies within the knowledge base as well as toxicity and bias from the underlying
    RAG data or surfacing through response generation from the ChatGPT call. Hallucinations
    and irrelevance can arise from flaws in the system design or inaccuracies within
    the knowledge base, as well as toxicity and bias from the underlying RAG data
    or surfacing through response generation from the ChatGPT call. All are issues
    that need to be watched for in a production system.
  id: totrans-39
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 幻觉和不相关性可能源于系统设计中的缺陷或知识库中的不准确，以及来自底层RAG数据或通过ChatGPT调用生成的响应中的毒性和偏见。所有这些都是需要在生产系统中注意的问题。
- en: So, now we’ve covered the challenges and solutions you’re going to face, in
    the next section, let’s consider how we can evaluate your LLM application.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，现在我们已经讨论了你将要面对的挑战和解决方案，在下一节中，让我们考虑如何评估你的LLM应用程序。
- en: Evaluating production systems
  id: totrans-41
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估生产系统
- en: Developing a prototype ChatGPT application with a RAG component is relatively
    straightforward, but preparing it for production and maintaining it effectively
    calls for consistent evaluation, which is challenging. Using LLMs to assist in
    evaluation is an obvious approach; however, be aware that there are pitfalls caused
    by LLMs displaying positional bias, answer-style preference, and variable results
    from one run to the next, which leads to the need for a more structured approach.
    It’s also worth remembering that the use case and nature of an agent will influence
    your evaluation approach. For example, a simple RAG question and answer compared
    to a more conversational agent will need a different method of evaluation.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 开发一个包含RAG组件的ChatGPT原型应用相对直接，但为生产做准备并有效维护它则需要持续的评估，这具有挑战性。使用LLM辅助评估是一个明显的途径；然而，请注意，由于LLM表现出位置偏差、答案风格偏好以及每次运行结果的不确定性，这导致需要更结构化的方法。还值得记住的是，代理的使用场景和性质将影响你的评估方法。例如，与更会话式的代理相比，简单的RAG问答需要不同的评估方法。
- en: 'It’s important to understand that, as in any **machine learning** (**ML**)
    project, you should evaluate the RAG pipeline’s performance using a validation
    dataset and an evaluation metric. This involves assessing the components individually
    and collectively: knowledge retrieval, response generation, and their integration.
    There are a number of different evaluation metrics you can consider, such as context
    relevance, groundedness, and answer relevance.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要理解，就像任何**机器学习**（**ML**）项目一样，你应该使用验证数据集和评估指标来评估RAG管道的性能。这涉及到对组件进行个别和集体评估：知识检索、响应生成以及它们的集成。你可以考虑多种不同的评估指标，例如上下文相关性、扎根性和答案相关性。
- en: Currently, determining the right evaluation metrics and collecting good validation
    data is a quickly evolving topic. In an attempt to tackle drawbacks with LLM-assisted
    evaluation, there are various methods and metrics for assessing RAG systems, including
    tools such as **Retrieval Augmented Generation Assessment** (**RAGAs**) or the
    RAG Triad of metrics, along with a range of tooling options and libraries. Each
    one of these merits more than we can cover here, and it’s worth reading about
    a few of them to see different approaches and look at how these can be implemented.
    These are primarily methodologies designed to evaluate the effectiveness of RAG
    applications in a structured and comprehensive manner by focusing on the precision
    of knowledge retrieval and the quality of response generation. Let’s consider
    the process of evaluation for a LangChain application using LangSmith in the next
    section
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，确定合适的评估指标和收集良好的验证数据是一个快速发展的主题。为了解决LLM辅助评估的缺点，有各种方法和指标用于评估RAG系统，包括**检索增强生成评估**（**RAGAs**）或RAG三联指标，以及一系列工具选项和库。这些方法中的每一个都值得在这里详细讨论，并且值得阅读其中的一些，以了解不同的方法和它们如何实现。这些主要是通过关注知识检索的精确性和响应生成的质量，以结构化和全面的方式评估RAG应用有效性的方法。让我们在下一节中考虑使用LangSmith对LangChain应用进行评估的过程。
- en: Components of an evaluation system
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估系统的组成部分
- en: 'LangSmith offers a robust evaluation framework designed to monitor and improve
    LLM applications through well-structured components outlined in the following
    diagram:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith提供了一个强大的评估框架，旨在通过以下图中概述的精心设计的组件来监控和改进LLM应用：
- en: '![Figure 9.1 – Process of evaluation](img/B21100_09_1.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图9.1 – 评估过程](img/B21100_09_1.jpg)'
- en: Figure 9.1 – Process of evaluation
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1 – 评估过程
- en: 'LangSmith offers a UI and SDK for building datasets and editing and versioning
    them: an SDK for defining your own evaluators or creating and using custom evaluators
    and a UI for carrying out inspections and trace analysis.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith提供用于构建数据集、编辑和版本控制它们的UI和SDK：一个用于定义自己的评估器或创建和使用自定义评估器的SDK，以及一个用于执行检查和跟踪分析的UI。
- en: 'Let’s go through the components of an effective evaluation system in more detail:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更详细地探讨一个有效评估系统的组成部分：
- en: '**Datasets** **and examples**:'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集** **和示例**：'
- en: 'The fundamental unit of any evaluation system in LangSmith is the dataset,
    which is comprised of multiple examples. Each example within a dataset represents
    a test case that contains both inputs and expected outputs:'
  id: totrans-52
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LangSmith中任何评估系统的基本单元是数据集，它由多个示例组成。数据集中的每个示例代表一个包含输入和预期输出的测试用例：
- en: '**Inputs**: These are the data points that the LLM will process.'
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入**：这些是LLM将处理的数据点。'
- en: '**Outputs**: These are the expected results that the LLM should produce when
    given the inputs.'
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输出**：这些是LLM在给定输入时应产生的预期结果。'
- en: Datasets are typically curated from various sources, including manual creation,
    user feedback, or conversation examples that have gone well or generated outputs
    from LLMs. If you’re looking at migrating to a ChatGPT-powered agent from an existing
    system, then your historical conversation data is going to be vital for evaluation.
  id: totrans-55
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 数据集通常来自各种来源，包括手动创建、用户反馈或良好的对话示例，或从LLMs生成的输出。如果你正在考虑从现有系统迁移到ChatGPT驱动的代理，那么你的历史对话数据对于评估将是至关重要的。
- en: '**Types of datasets**: There are different types of datasets supported by LangSmith:'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集类型**：LangSmith支持不同类型的数据集：'
- en: '**KV**: Key-value pairs that accommodate multiple inputs and outputs.'
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**KV**：键值对，可以容纳多个输入和输出。'
- en: '**LLM**: Direct string inputs and outputs, typically used in simple prompt-response
    models.'
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM**：直接输入和输出字符串，通常用于简单的提示-响应模型。'
- en: '**Chat**: Structured like chat conversations, suitable for models trained on
    dialog.'
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天**：结构类似于聊天对话，适用于在对话上训练的模型。'
- en: It’s easy to create datasets in LangSmith, where you can create and edit datasets
    and example rows as well as import from CSV.
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在LangSmith中创建数据集很容易，你可以创建和编辑数据集以及示例行，还可以从CSV导入。
- en: '**Task**: The task is the actual operation or model being evaluated. It processes
    the inputs from the examples in the dataset and generates outputs, which are then
    assessed by the evaluators.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务**：被评估的实际操作或模型。它处理数据集中的示例输入并生成输出，然后由评估器进行评估。'
- en: '**Evaluators**: Evaluators are functions or mechanisms that assess the outputs
    generated by the task. They compare these outputs against the expected results
    or apply specific criteria to determine the quality of the outputs. Evaluators
    return scores and can provide feedback for each example. There are a number of
    different types of evaluators:'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估器**：评估器是评估任务生成的输出的函数或机制。它们将这些输出与预期结果进行比较或应用特定标准以确定输出的质量。评估器返回分数，并为每个示例提供反馈。存在多种不同类型的评估器：'
- en: '**Heuristic evaluators**: These are simple functions that perform checks such
    as validating output formats (for example, JSON validation) or string matching
    against expected outputs.'
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启发式评估器**：这些是执行检查的简单函数，例如验证输出格式（例如，JSON验证）或与预期输出进行字符串匹配。'
- en: '**LLM-as-judge**: Advanced evaluators that use another LLM to assess the quality
    of outputs based on content criteria such as offensiveness or relevance.'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM-as-judge**：使用另一个LLM来根据内容标准（如冒犯性或相关性）评估输出质量的先进评估器。'
- en: '**Human**: Manual review of outputs, often used for final validation or in
    cases where nuanced judgment is required.'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工**：手动审查输出，通常用于最终验证或在需要细微判断的情况下使用。'
- en: '`EvaluationResult`, which contains the following:'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`EvaluationResult` 包含以下内容：'
- en: '**Key**: The metric name being evaluated (for example, accuracy, completeness).'
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键**：正在评估的度量名称（例如，准确度、完整性）。'
- en: '**Score**: The quantitative measure of how well the output matched the expected
    result or met the evaluation criteria.'
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分数**：衡量输出与预期结果匹配程度或满足评估标准的定量度量。'
- en: '**Comment**: Optional insights or reasoning behind the score.'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注释**：可选的见解或关于分数背后的推理。'
- en: Now you’ve got an understanding of the components of an evaluation system, in
    the next section, we’ll look at bringing this into practice with an example.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了评估系统组件，在下一节中，我们将通过一个示例来探讨如何将其应用于实践。
- en: Learning how to use LangSmith to evaluate your project
  id: totrans-71
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习如何使用LangSmith评估你的项目
- en: Remember that different types of AI agents will require different types of evaluation
    approaches. There is no one-size-fits-all approach, and it’s up to you to decide
    on the methodology and approach to follow based on your use case. A Q&A agent
    would be simpler to evaluate if you are looking to support knowledge of a specific
    domain – for example, company-specific information from a RAG system – while an
    agent that needs to support transactional conversations will need a more complex
    evaluation implementation as you need to be absolutely sure your conversational
    agent is going to consistently meet their task.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，不同类型的 AI 代理将需要不同的评估方法。没有一种适合所有情况的方案，你需要根据你的用例来决定采用的方法和途径。如果你想要支持特定领域的知识，例如来自
    RAG 系统的公司特定信息，那么一个问答代理将更容易评估；而需要支持交易性对话的代理将需要一个更复杂的评估实现，因为你需要确保你的对话代理能够始终如一地完成任务。
- en: With an intent-based system, you are able to accurately control each step of
    the conversation, while with an LLM-powered conversational agent, you’re controlling
    your agents’ actions and capabilities with prompts, which in my opinion is a more
    nuanced and volatile approach.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于意图的系统下，你可以精确控制对话的每一步，而在 LLM 驱动的对话代理下，你通过提示来控制代理的动作和能力，这在我的看法中是一种更微妙且易变的方法。
- en: Langsmith makes this kind of in-depth specific evaluation possible let’s run
    through a simple example in code so you can see the basics working of working
    with LangChain:LangSmith makes this kind of in-depth specific evaluation possible.
    Let’s run through a simple example in code so that you can see the basics of working
    with LangChain.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: Langsmith 使得这种深入的特定评估成为可能，让我们通过一个简单的代码示例来运行，这样你可以看到与 LangChain 一起工作的基本原理：LangSmith
    使得这种深入的特定评估成为可能。让我们通过一个简单的代码示例来运行，这样你可以看到与 LangChain 一起工作的基本原理。
- en: 'Our example is made up of a RAG system that answers questions about ultramarathon
    running from a simple knowledge base:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的示例由一个 RAG 系统组成，该系统从简单的知识库中回答关于超级马拉松跑步的问题：
- en: '`source.text` text document source.text with some information about running.
    Feel free to use your own subject matter – I just like running! We follow a standard
    workflow outlined in earlier chapters to create a simple LangChain RAG based on
    a simple text corpus to evaluate – document chunking, embedding creation, and
    creation of a retriever with OpenAI embeddings and an in-memory Chroma DB for
    the vector store:'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`source.text` 文档源.text 包含一些关于跑步的信息。请随意使用你自己的主题——我只是喜欢跑步！我们遵循前面章节中概述的标准工作流程，创建一个简单的基于简单文本语料库的
    LangChain RAG 以进行评估——文档分块、嵌入创建以及使用 OpenAI 嵌入和内存中的 Chroma DB 作为向量存储的检索器创建：'
- en: '[PRE0]'
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '`ChatOpenAI` class and create a `ChatPromptTemplate` instance from a template
    string with placeholders for questions and context that will be filled out during
    the execution of the RAG pipeline. Next, bring everything together using **LangChain
    Expression Language** (**LCEL**) to create our chain, which you can invoke to
    check everything is working correctly:'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个 `ChatOpenAI` 类，并从模板字符串创建一个 `ChatPromptTemplate` 实例，其中包含问题和上下文的占位符，这些占位符将在
    RAG 管道执行期间被填充。接下来，使用 **LangChain 表达式语言**（**LCEL**）将所有内容整合在一起，创建我们的链，你可以调用它来检查一切是否正常工作：
- en: '[PRE1]'
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`pip install -U langsmith`. Then, set up your environment to use LangSmith,
    then create your LangSmith client:'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`pip install -U langsmith`. 然后，设置你的环境以使用 LangSmith，然后创建你的 LangSmith 客户端：'
- en: '[PRE2]'
  id: totrans-81
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '`client.create_dataset()` to create the dataset, then add our examples with
    `create_examples()`. We can also add these directly using the LangSmith UI:'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `client.create_dataset()` 创建数据集，然后使用 `create_examples()` 添加我们的示例。我们也可以直接使用
    LangSmith UI 添加这些示例：
- en: '[PRE3]'
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Another easy option to add examples to datasets is from existing runs in LangChain.
    Just go to the **Run Details** page and click the **Add to** **Dataset** button.
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 向数据集添加示例的另一个简单选项是从 LangChain 中的现有运行中获取。只需转到 **运行详情** 页面，然后点击 **添加到** **数据集**
    按钮即可。
- en: '**Define an** **evaluation method**:'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义一个** **评估方法**：'
- en: 'Create a function to call the thing we are evaluating, in our case it’s our
    RAG chain, but this could be any runnable element of your pipelineCreate a function
    to call the thing we are evaluating. In our case, it’s our RAG chain, but this
    could be any runnable element of your pipeline:'
  id: totrans-86
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 创建一个函数来调用我们正在评估的东西，在我们的例子中是 RAG 链，但这可以是你的管道中的任何可运行元素：
- en: '[PRE4]'
  id: totrans-87
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Define an input formatter for the evaluator**:'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义一个用于评估器的输入格式化器**：'
- en: 'Define a function to format inputs for the evaluator. This step ensures that
    the evaluator function receives the necessary data in a consistent format:'
  id: totrans-89
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 定义一个函数来格式化评估器的输入。此步骤确保评估器函数以一致格式接收必要的数据：
- en: '[PRE5]'
  id: totrans-90
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '`LangChainStringEvaluator` evaluator. This involves configuring it to assess
    the correctness of the chatbot’s responses based on predefined criteria and normalization
    factors. This evaluator will handle string comparisons, allowing for a precise
    measurement of answer accuracy:'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`LangChainStringEvaluator` 评估器。这涉及到配置它以根据预定义的标准和归一化因素评估聊天机器人的响应的正确性。此评估器将处理字符串比较，从而允许精确测量答案的准确性：'
- en: '[PRE6]'
  id: totrans-92
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Let’s look at the details of creating the evaluator:'
  id: totrans-93
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 让我们看看创建评估器的详细信息：
- en: 'Label: ‘labeled_score_string’ specifies the scoring label for output in the
    evaluation results.`"labeled_score_string"` specifies the scoring label for output
    in the evaluation results.'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标签：`‘labeled_score_string’` 指定评估结果中输出的评分标签。`"labeled_score_string"` 指定评估结果中输出的评分标签。
- en: '`"criteria"`: `"correctness"`, which defines what the evaluation should measure—here,
    the accuracy of the responses.'
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`"criteria"`：`"correctness"`，它定义了评估应测量的内容——在这里，是响应的准确性。'
- en: '`"normalize_by"`: `10`, which adjusts the score to a scale of 0 to 10, making
    it easier to interpret the results.'
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`"normalize_by"`：`10`，将分数调整到 0 到 10 的比例，使其更容易解释结果。'
- en: 'Prepare Data: format_evaluator_inputs is a function that formats the inputs,
    predictions, and references in a way that the evaluator can process effectively.`format_evaluator_inputs`
    is a function that formats inputs, predictions, and references in a way that the
    evaluator can process effectively.'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准备数据：`format_evaluator_inputs` 是一个函数，它以评估器可以有效地处理的方式格式化输入、预测和参考。`format_evaluator_inputs`
    是一个函数，它以评估器可以有效地处理的方式格式化输入、预测和参考。
- en: '`evaluate()` and not `run_on_dataset()`, which is being deprecated but will
    still return evaluation results:'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `evaluate()` 而不是正在被弃用的 `run_on_dataset()`，后者将返回评估结果：
- en: '[PRE7]'
  id: totrans-99
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Let’s look at the different elements of the `evaluate()` call:'
  id: totrans-100
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 让我们看看 `evaluate()` 调用的不同元素：
- en: '`predict`) is what the chatbot uses to generate answers from the inputs.'
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`predict`) 是聊天机器人用来从输入生成答案的。'
- en: '`LangChainStringEvaluator` evaluator, set up in the previous step. You could
    also create your own custom evaluator and include it here; you can use multiple
    evaluators.'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`LangChainStringEvaluator` 评估器，在之前的步骤中设置。您也可以创建自己的自定义评估器并将其包含在这里；您可以使用多个评估器。'
- en: '**Metadata**: Contains details about the model version used, facilitating further
    analysis and traceability.'
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**元数据**：包含有关所使用的模型版本的详细信息，便于进一步分析和追溯。'
- en: 'Keep in mind that LangSmith will also create evaluation code to run when you
    choose to create an experiment from the UI. This also provides examples of different
    pre-built evaluation chains, allowing you to evaluate for the following:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，LangSmith 还会在您从 UI 选择创建实验时创建评估代码。这也提供了不同预构建评估链的示例，允许您评估以下内容：
- en: Correctness
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正确性
- en: Conciseness
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简洁性
- en: Relevance
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关性
- en: Coherence
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致性
- en: Harmfulness
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有害性
- en: Maliciousness
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 恶意
- en: Helpfulness
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有用性
- en: Controversiality
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有争议性
- en: Misogyny
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏见
- en: Criminality
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 犯罪性
- en: Insensitivity
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不敏感
- en: 'At the time of writing, the code examples use `run_on_dataset()`, but it would
    be fairly straightforward to migrate this to `evaluate()`. When you run `evaluate()`,
    this should create an experiment in LangSmith, and you should see something such
    as the following as output:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在编写本文时，代码示例使用 `run_on_dataset()`，但将其迁移到 `evaluate()` 应该相当简单。当您运行 `evaluate()`
    时，这应在 LangSmith 中创建一个实验，您应该看到如下输出：
- en: 'View the evaluation results for experiment: ‘Chat Single Turn-46c45783’ at:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下位置查看实验：‘Chat Single Turn-46c45783’的评估结果：
- en: '[PRE8]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The link should take you through to an experiment link in LangSmith where you
    can see details of each experiment, outlined in the following screenshot:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 此链接应带您进入 LangSmith 中的实验链接，您可以在其中查看每个实验的详细信息，如下面的截图所示：
- en: '![Figure 9.2 – Evaluation output shown in the experiment view in LangSmith](img/B21100_09_2.jpg)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.2 – 在 LangSmith 的实验视图中显示的评估输出](img/B21100_09_2.jpg)'
- en: Figure 9.2 – Evaluation output shown in the experiment view in LangSmith
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.2 – 在 LangSmith 的实验视图中显示的评估输出
- en: Clicking on the **SUCCESS** or **FAILURE** button will display details of the
    test for each input and output in the dataset. From this view, you can also drill
    down into each run to see what happened and via other information, such as the
    token costs for each run. Token costs for evaluation could quickly rise depending
    on how large your dataset is.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**成功**或**失败**按钮将显示数据集中每个输入和输出的测试详情。从这一视角，你还可以深入到每个运行中，查看发生了什么，以及通过其他信息，如每个运行的令牌成本。评估的令牌成本可能会根据你的数据集大小迅速上升。
- en: 'Let’s try to test the prompt we’ve employed to stop the LLM from using other
    data and feeding back to the user if it can’t answer. Try adding another question-answer
    pair to your dataset in LangSmith, but this time, let’s add one that it shouldn’t
    be able to answer. In my example, it’s something specific about trainers that
    I know is not mentioned in my knowledge base:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试测试我们用来阻止LLM使用其他数据并反馈给用户（如果它无法回答）的提示。在LangSmith中尝试向你的数据集添加另一个问答对，但这次，让我们添加一个它不应该能够回答的问题。在我的例子中，这是关于训练师的一些具体信息，我知道我的知识库中没有提到：
- en: '[PRE9]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'output: {“answer”: “The documents provided do not contain information about
    using carbon inserts in trainers for ultra marathon running.”}'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '输出：{"answer": "提供的文档不包含关于在超长跑训练师中使用碳插件的任何信息。"}'
- en: 'When I rerun the evaluation, we can see the test passes, and our agent is responding
    how it should. You can see the output in the following screenshot:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 当我重新运行评估时，我们可以看到测试通过，我们的智能体正在按照预期响应。你可以在下面的屏幕截图中看到输出：
- en: '![Figure 9.3 – Evaluation output displaying test for hallucinating in LangSmith](img/B21100_09_3.jpg)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图9.3 – LangSmith中显示幻觉测试的评估输出](img/B21100_09_3.jpg)'
- en: Figure 9.3 – Evaluation output displaying test for hallucinating in LangSmith
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.3 – LangSmith中显示幻觉测试的评估输出
- en: Try looking at other types of out-of-the-box evaluators to see if you can evaluate
    for other criteria.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试查看其他类型的现成评估器，看看你是否可以针对其他标准进行评估。
- en: There is no one-size-fits-all approach for evaluating different LLM-powered
    systems. Different types of conversational AI agents will require different types
    of evaluation approaches and different datasets. Look on the LangSmith website
    for examples of testing different types of agents.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 对于评估不同基于LLM的系统，没有一种适合所有情况的解决方案。不同类型的对话式AI智能体将需要不同类型的评估方法和不同的数据集。在LangSmith网站上查找不同类型智能体测试的示例。
- en: The aim of any evaluation system is to offer a robust framework for evaluating
    your agent. LangSmith makes it easy to run evaluations and provide detailed insights
    into both individual and integrated component performance. With LangSmith, you
    can better prepare your ChatGPT application for the demands of a production environment,
    ensuring it delivers high-quality, reliable responses.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 任何评估系统的目标都是为了提供一个强大的框架来评估你的智能体。LangSmith使运行评估和提供对单个和集成组件性能的详细洞察变得容易。使用LangSmith，你可以更好地为ChatGPT应用的生产环境需求做好准备，确保它提供高质量、可靠的响应。
- en: Remember – the key to successful AI development is continuous testing and refinement.
    Evaluations are not a one-time task but a regular part of the development cycle.
    In the next section, we’re going to consider application monitoring.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 记住——成功开发AI的关键是持续测试和改进。评估不是一个一次性任务，而是开发周期中的常规部分。在下一节中，我们将考虑应用监控。
- en: Application monitoring in production with LangSmith
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用LangSmith进行生产中的应用监控
- en: Monitoring any LLM-powered application is hard, and until the release of LangSmith,
    it’s been difficult to have full exposure to what is going on under the hood in
    LangChain apps. Detailed monitoring of your application is vital to keep things
    running smoothly, and LangSmith offers numerous features to do this.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 监控任何基于LLM的应用都是一项挑战，直到LangSmith的发布，很难全面了解LangChain应用底层的运作情况。对应用进行详细监控对于保持运行顺畅至关重要，LangSmith提供了众多功能来实现这一点。
- en: Advanced monitoring features with LangSmith
  id: totrans-135
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LangSmith的高级监控功能
- en: LangSmith’s monitoring system enables effective oversight of production applications
    by allowing developers to configure and manage tracing. Key to this system are
    features tailored to optimize the collection and use of data during production.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith的监控系统通过允许开发者配置和管理跟踪，使得对生产应用的有效监督成为可能。这个系统中的关键特性是针对优化生产过程中数据收集和使用的特性。
- en: Tracing and data management
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 跟踪和数据管理
- en: 'LangSmith’s tracing and management capabilities provide selective data point
    logging through sampling, improved data organization with metadata, and critical
    insights via feedback integration:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith的跟踪和管理能力通过采样提供选择性数据点记录，通过元数据改进数据组织，并通过反馈集成提供关键见解：
- en: '**Sampling**: Essential in production, this feature allows for the logging
    of only a subset of data points to manage volume and relevance effectively'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**采样**：在生产中至关重要，此功能允许仅记录数据点的子集，以有效地管理数量和相关性。'
- en: '**Metadata**: Attaching metadata to runs enhances the ability to filter and
    group data, facilitating more targeted analysis'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**元数据**：将元数据附加到运行中增强了过滤和分组数据的能力，便于进行更有针对性的分析'
- en: '**Feedback**: Integrating user feedback helps highlight significant data points,
    drawing attention where it’s most needed'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反馈**：整合用户反馈有助于突出显示重要数据点，将注意力集中在最需要的地方'
- en: Monitoring tools
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控工具
- en: 'LangSmith provides a comprehensive suite of monitoring tools designed to help
    with monitoring your application. Here are some key features:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith提供了一套全面的监控工具，旨在帮助监控您的应用。以下是关键功能：
- en: '**Filtering functionality**: Users can delve into specific runs using advanced
    filtering options, which include filtering by name, metadata, feedback, and full-text
    searches.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过滤功能**：用户可以使用高级过滤选项深入到特定的运行中，这些选项包括按名称、元数据、反馈和全文搜索进行过滤。'
- en: '**Monitoring charts**: The **Monitoring** tab on the **Project** dashboard
    provides visual representations of various metrics such as **Trace Latency**,
    **Tokens per Second**, and **Cost**. These charts support temporal analysis and
    can drill down into specific data points for detailed trace tables, aiding in
    debugging.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控图表**：在**项目**仪表板上的**监控**选项卡提供了各种指标的视觉表示，例如**跟踪延迟**、**每秒令牌数**和**成本**。这些图表支持时间序列分析，并可以深入到具体数据点以进行详细的跟踪表，有助于调试。'
- en: '**Metadata grouping**: This allows for the comparison of different application
    versions side by side within the same charts, which is particularly useful for
    A/B testing changes.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**元数据分组**：这允许在同一图表中并排比较不同的应用程序版本，这对于A/B测试变化特别有用。'
- en: Advanced monitoring features
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级监控功能
- en: LangSmith offers other advanced features to help you understand complex conversations
    and automate some tasks.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith提供其他高级功能，帮助您理解复杂的对话并自动化一些任务。
- en: '**Threads**: For applications where traces are part of the same conversation,
    LangSmith offers threading by metadata keys to group related traces conveniently.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**线程**：对于跟踪是同一对话一部分的应用，LangSmith通过元数据键提供线程化，方便地分组相关跟踪。'
- en: '**Automations**: To reduce manual oversight, LangSmith automations can be configured
    to handle repetitive tasks. After setting up filters, developers can automate
    actions such as sending data to datasets, annotation queues, or conducting online
    evaluations.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化**：为了减少人工监督，LangSmith的自动化可以配置为处理重复性任务。设置过滤器后，开发者可以自动化将数据发送到数据集、注释队列或进行在线评估等操作。'
- en: A fully featured monitoring tool was lacking in the LangChain space, and LangSmith
    fills this gap.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在LangChain空间中，一直缺少一个功能齐全的监控工具，LangSmith填补了这一空白。
- en: It stands out as an essential tool for you to ensure the robust performance
    of your LLM application. By providing detailed metrics and real-time data visualization,
    LangSmith should allow you to maintain high standards of performance, reliability,
    and user satisfaction in your conversational AI solutions.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 它作为确保您LLM应用稳健性能的必备工具而脱颖而出。通过提供详细的指标和实时数据可视化，LangSmith应允许您在对话式AI解决方案中保持高性能、可靠性和用户满意度的高标准。
- en: Alternatives to ChatGPT and LangChain
  id: totrans-153
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT和LangChain的替代方案
- en: Since the early days of ChatGPT, there have not only been huge advancements
    in LLM technology but also the availability and choice of service offerings. In
    this section, we’ll look into the diverse range of service offerings that have
    emerged, exploring some viable alternatives beyond ChatGPT and LangChain.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 自ChatGPT的早期以来，不仅LLM技术在不断进步，而且服务提供的选择和可用性也在增加。在本节中，我们将探讨出现的各种服务提供，探索ChatGPT和LangChain之外的可行替代方案。
- en: Some alternatives to ChatGPT and OpenAI LLMs
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT和OpenAI LLMs的替代方案
- en: 'Early last year, you could have argued that OpenAI’s **Generative Pre-trained
    Transformer** (**GPT**) LLMs were in a one-horse race and would likely be your
    first choice in building an LLM-powered project. Nowadays, there are many companies
    vying to release the best model, resulting in a growing number of LLMs to choose
    from, both open source and closed, to create a conversational AI system. The LLM
    arms race continues; let’s look at some examples, and it’s worth noting this is
    not an exhaustive list:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 去年年初，你可能会争辩说OpenAI的**生成预训练转换器**（**GPT**）LLM处于一场单马竞赛中，并且很可能是你构建LLM驱动项目的首选。如今，许多公司都在竞相发布最佳模型，导致可供选择的LLM数量不断增加，无论是开源的还是封闭的，都可以创建一个对话式AI系统。LLM军备竞赛仍在继续；让我们看看一些例子，值得注意的是，这并不是一个详尽的列表：
- en: '**Meta**: The Llama model family are popular LLMs provided by Meta. The latest
    models, Llama 3 models with 8B and 70B parameters, have shown impressive performance
    when tested against other LLMs and are available in several ways.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Meta**: Meta提供的Llama模型系列是流行的LLM。最新的模型，Llama 3模型，具有8B和70B参数，在与其他LLM的测试中表现出令人印象深刻的表现，并且以多种方式提供。'
- en: '**Anthropic**: Anthropic is known for its focus on building reliable and interpretable
    AI models. Their main model, Claude, is designed to enhance safety and controllability,
    aiming to reduce harmful or misleading outputs. Anthropic emphasizes ethical AI
    development, leveraging techniques such as **reinforcement learning from human
    feedback** (**RLHF**) to fine-tune model responses, ensuring they align closely
    with human values and safety expectations.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Anthropic**: Anthropic以其专注于构建可靠和可解释的AI模型而闻名。他们的主要模型Claude旨在增强安全性和可控性，旨在减少有害或误导性的输出。Anthropic强调道德AI开发，利用**从人类反馈中进行强化学习**（**RLHF**）等技术来微调模型响应，确保它们与人类价值观和安全期望紧密一致。'
- en: '**AI21**: AI21 provides access to the Jurassic-2 and Jamba transformer models.
    Jurassic-1 is AI21 Labs’ flagship family of models. Jurassic-1 comes in various
    sizes, ranging from smaller models suitable for cost-effective applications to
    very large models that can generate more complex and nuanced text. These models
    are designed to perform a wide range of tasks, from answering questions and summarizing
    text to generating content and code.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI21**: AI21提供访问Jurassic-2和Jamba transformer模型。Jurassic-1是AI21 Labs的旗舰模型系列。Jurassic-1有多种尺寸，从小型模型适合成本效益的应用到可以生成更复杂和细微文本的非常大的模型。这些模型旨在执行广泛的任务，从回答问题和总结文本到生成内容和代码。'
- en: '**Google**: Google never misses a chance to remind us they invented the transformer
    architecture and have created strong models such as PaLM 2 and, most recently,
    the Gemini series. The Gemini series, particularly the latest Gemini 1.5, pushes
    boundaries with a huge context window of 1 million tokens and allegedly better
    performance. The 1.5 series is also available in 3 sizes: Ultra, Pro, and Nano.
    Google has also renamed Bard to Gemini. So far, the Gemini performance I’ve seen
    is on par with GPT-4 models.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Google**: Google从不错过提醒我们他们发明了transformer架构，并创建了强大的模型，如PaLM 2和最近推出的Gemini系列。Gemini系列，尤其是最新的Gemini
    1.5，以1百万token的巨大上下文窗口和据说更好的性能推动了边界。1.5系列也提供3种尺寸：Ultra、Pro和Nano。Google还将Bard更名为Gemini。到目前为止，我所看到的Gemini性能与GPT-4模型相当。'
- en: 'Cohere: Cohere focuses on natural language understanding and generation. **Cohere**:
    Cohere focuses on NLU and **natural language generation** (**NLG**). Their models
    are designed for a variety of applications such as content generation, summarization,
    and semantic search. Cohere’s models are noted for their user-friendly API and
    robust security features, suitable for enterprise environments where data privacy
    and application integrity are critical.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Cohere: Cohere专注于自然语言理解和生成。**Cohere**: Cohere专注于NLU和**自然语言生成**（**NLG**）。他们的模型设计用于各种应用，如内容生成、摘要和语义搜索。Cohere的模型以其用户友好的API和强大的安全特性而闻名，适用于数据隐私和应用程序完整性至关重要的企业环境。'
- en: '**MistralAI**: MistralAI positions itself as an enterprise-focused LLM with
    a privacy-preserving infrastructure. They offer open source models: Mistral 7B,
    Mixtral 8x7B, and Mixtral 8x22B, which are customizable. They can be downloaded
    or used on demand on the Mistral platform. The company also offers a large and
    small optimized commercial model.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MistralAI**: MistralAI将自己定位为专注于企业级LLM，并拥有保护隐私的基础设施。他们提供开源模型：Mistral 7B、Mixtral
    8x7B和Mixtral 8x22B，这些模型可定制。它们可以在Mistral平台上下载或按需使用。公司还提供大型和小型优化的商业模型。'
- en: '**Cerebras**: Cerebras released a family of 7 GPT models ranging from 111 million
    to 13 billion parameters. They claim to be some of the fastest and cheapest models
    to train. Cerebras also provides cloud infrastructure for training models and
    Cerebras AI Model Studio, which is a purpose-built platform for training and fine-tuning
    LLMs.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Cerebras**：Cerebras 发布了一系列 7 个 GPT 模型，参数量从 11 亿到 130 亿不等。他们声称这是训练速度最快、成本最低的模型之一。Cerebras
    还提供云基础设施用于模型训练和 Cerebras AI Model Studio，这是一个专门用于训练和微调 LLMs 的平台。'
- en: A great way to test some of these models side by side is by using Hugging Face
    Chat where you can choose from the popular LLMs to answer your question. You’ll
    notice that all LLMs have a subtle nuanced style to their responses unless prompted
    to do otherwise. This observation came out of a conversation I had with the great
    Kane Simms from VUX World.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 测试这些模型的一种很好的方法是使用 Hugging Face Chat，在这里你可以从流行的 LLMs 中选择来回答你的问题。你会发现，除非被提示做其他事情，否则所有
    LLMs 的回答都有一种细微的风格差异。这个观察是从我与 VUX World 的杰出人物凯恩·西蒙斯（Kane Simms）的对话中得出的。
- en: There is evidence that the gap between LLMs is narrowing. Recent performance
    comparisons suggest that the gap between different LLMs is narrowing. Models such
    as Claude 3, GPT-4, and Gemini Ultra are achieving similar scores in tasks such
    as multi-choice questions and reasoning. Interestingly, some smaller models such
    as Mixtral and Llama2 are showing better performance than larger models in certain
    areas – for example, reasoning – highlighting that it’s not always the case that
    the largest models are the best.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 有证据表明，LLMs 之间的差距正在缩小。最近的表现比较表明，不同 LLMs 之间的差距正在缩小。例如，Claude 3、GPT-4 和 Gemini
    Ultra 在多项选择题和推理等任务中取得了相似的成绩。有趣的是，一些较小的模型，如 Mixtral 和 Llama2，在某些领域（例如推理）的表现优于较大的模型，这表明并非总是最大的模型就是最好的。
- en: We’ve been using LangChain a lot in this book. Let’s look at some alternatives
    to LangChain in the next section.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这本书中大量使用了 LangChain。让我们在下一节中看看 LangChain 的替代方案。
- en: Some alternatives to LangChain
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangChain 的替代方案
- en: 'I’m a big fan of LangChain, and now it’s fully supported by LangSmith for monitoring
    and running your application in production, it’s a solid platform. However, LangChain
    is not for everyone, with many defining factors in play before making a decision.
    There are many other options. You could build your own application in code and
    interact with an LLM API directly and still use LangSmith for monitoring. You
    could also use something such as **Generative AI Large Language Model for Enterprise**
    (**GALE**): the new productivity suite by Kore.ai, which is a no-code solution
    to use the latest LLM models.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常喜欢 LangChain，现在 LangSmith 已经完全支持它在生产中监控和运行你的应用程序，这是一个稳固的平台。然而，LangChain 并不是适合每个人，在做出决定之前有许多定义因素在起作用。还有很多其他选择。你可以用代码构建自己的应用程序并直接与
    LLM API 交互，同时仍然使用 LangSmith 进行监控。你也可以使用像 **企业生成式 AI 大型语言模型（GALE**）这样的东西：Kore.ai
    的新生产力套件，这是一个无代码解决方案，用于使用最新的 LLM 模型。
- en: Alternatively, there are options such as LlamaIndex. LlamaIndex is a comprehensive
    data framework tailored to enhance applications built on LLMs.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，还有像 LlamaIndex 这样的选项。LlamaIndex 是一个针对在 LLMs 上构建的应用程序进行优化的全面数据框架。
- en: It supports a large range of data formats, such as APIs, PDFs, documents, and
    SQL databases, allowing you to ingest, organize, and structure your data. The
    platform provides an advanced retrieval interface and the ability to create prompt
    chains to create LLM applications and evaluation capabilities, allowing you to
    create advanced RAG systems.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 它支持大量数据格式，例如 APIs、PDFs、文档和 SQL 数据库，允许你摄取、组织和结构化你的数据。该平台提供高级检索界面和创建提示链的能力，以创建
    LLM 应用程序和评估能力，允许你创建高级 RAG 系统。
- en: LlamaIndex, with its supporting Python and TypeScript SDKs and a vibrant community
    offering a wealth of resources, such as connectors, tools, and datasets, exemplifies
    the innovative solutions emerging in the LLM field. This growth in LLM-specific
    services marks a significant trend in the AI landscape, which we’ll explore further
    in the following section.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: LlamaIndex，凭借其支持的 Python 和 TypeScript SDKs 以及一个充满活力的社区提供的丰富资源，例如连接器、工具和数据集，展示了在
    LLM 领域出现的创新解决方案。这种 LLM 专用服务的增长标志着人工智能领域的一个重大趋势，我们将在下一节中进一步探讨。
- en: Looking at the growing LLM landscape
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 观察不断增长的 LLM 领域
- en: Since ChatGPT was released last year, the LLM landscape has changed dramatically
    in the world of LLMs, and it’s important to have an understanding here to help
    with any technology decision you may be making for your ChatGPT or LLM project.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 自从去年ChatGPT发布以来，LLM领域的世界发生了巨大变化，了解这一点对于您可能为ChatGPT或LLM项目做出的任何技术决策都至关重要。
- en: 'There are more and more ways to access LLMs, which can be primarily broken
    down into the four methods illustrated in the following diagram:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 访问LLM的方式越来越多，这可以主要分为以下图表中展示的四种方法：
- en: '![Figure 9.4 – Different ways to interact with LLMs](img/B21100_09_4.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图9.4 – 与LLM交互的不同方式](img/B21100_09_4.jpg)'
- en: Figure 9.4 – Different ways to interact with LLMs
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.4 – 与LLM交互的不同方式
- en: 'Let’s look at the pros and cons of the four different ways to access and utilize
    LLMs:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看访问和利用LLM的四种不同方式的优缺点：
- en: '`llama.cpp` library. Although free to use, the costs related to hosting and
    operating these models can be significant, requiring specialized knowledge. These
    expenses and the need for ongoing maintenance tend to increase as usage grows.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`llama.cpp`库。尽管免费使用，但托管和运营这些模型的相关成本可能相当高，需要专业知识。随着使用量的增加，这些费用和持续维护的需求往往会增加。'
- en: '**LLM orchestration**: Platforms that provide specialist cloud infrastructure
    for model hosting and training while providing an easy way to orchestrate and
    expose these models for use and the means to fine-tune them for specific domain
    expertise and use cases. Most of the **cloud service providers** (**CSPs**), such
    as Google Cloud, **Amazon Web Services** (**AWS**), and Microsoft Azure, provide
    **infrastructure as a service** (**IaaS**) to host your models. This can be expensive
    but offers the ability to tap into open source LLMs without the infrastructure
    costs. There are also some promising platforms which allow you to create end to
    end conversational assistants powered by LLMs for example Quiq.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM编排**：提供专业云基础设施以托管和训练模型，同时提供一种简单的方式来编排和公开这些模型以供使用，以及针对特定领域专业知识和使用案例进行微调的手段。大多数云服务提供商（CSP），如Google
    Cloud、Amazon Web Services（AWS）和Microsoft Azure，提供基础设施即服务（IaaS）以托管您的模型。这可能很昂贵，但提供了在不承担基础设施成本的情况下利用开源LLM的能力。还有一些有前景的平台，允许您创建由LLM驱动的端到端对话助手，例如Quiq。'
- en: '**LLMs via APIs**: This is the most common method used by organizations to
    integrate LLM capabilities into their applications. APIs provide a straightforward
    path to developing applications with LLMs. However, using these APIs comes with
    several challenges, such as cost implications, concerns over data privacy, issues
    with inference latency, rate limits, risks of catastrophic forgetting, and model
    drift.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过API使用LLM**：这是组织将LLM功能集成到其应用程序中最常用的方法。API为使用LLM开发应用程序提供了一条直接的路径。然而，使用这些API也带来了一些挑战，例如成本影响、对数据隐私的担忧、推理延迟问题、速率限制、灾难性遗忘的风险以及模型漂移。'
- en: '**LLM UI**: Not really needing any introduction, interfaces such as ChatGPT,
    HuggingChat, Cohere Coral, and Gemini provide conversational experiences directly
    to users and have become part of many people’s day-to-day lives. These interfaces
    are designed to provide the most productive and user-friendly ways to interact
    with LLMs. They often also make it easy to include other sources of contextual
    information and chat personalization with ways to manage historical conversations
    and tap into external tools.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM用户界面**：无需过多介绍，ChatGPT、HuggingChat、Cohere Coral和Gemini等界面直接为用户提供对话体验，并已成为许多人日常生活的一部分。这些界面旨在提供与LLM互动的最高效和用户友好的方式。它们通常还使包括其他来源的上下文信息以及通过管理历史对话和利用外部工具进行聊天个性化变得容易。'
- en: 'Each of these methods of interacting with LLMs provides different advantages
    and entails distinct challenges, making the choice dependent on your use case,
    customization requirements, technical expertise, resource availability, and budget
    constraints. Finally, in the next section, we’ll briefly consider a new type of
    model that has been growing in popularity: the SLM.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这些与LLM交互的方法各自提供了不同的优势，并带来了独特的挑战，因此选择取决于您的用例、定制需求、技术专长、资源可用性和预算限制。最后，在下一节中，我们将简要考虑一种越来越受欢迎的新型模型：SLM（小型语言模型）。
- en: The growth of the small language model (SLM)
  id: totrans-183
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 小型语言模型（SLM）的增长
- en: When considering the complexities of making decisions around LLM technology
    and the slowdown in huge gains of the latest and greatest LLMs, it’s worth introducing
    the SLM, which has been growing in popularity. SLMs are challenging the notion
    that bigger is always better and that size is not necessarily everything (pardon
    the pun). Model size might not be the sole determinant of performance, and factors
    such as architecture, training data, and fine-tuning techniques play a significant
    role.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑围绕LLM技术的复杂性以及最新和最伟大LLMs巨大收益放缓时，引入SLM是有意义的，SLM的受欢迎程度一直在增长。SLMs正在挑战“越大越好”和“大小不是一切”（请原谅这个双关语）的观念。模型大小可能不是性能的唯一决定因素，而诸如架构、训练数据和微调技术等因素也起着重要作用。
- en: Are LLMs reaching their limit?
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs是否达到了极限？
- en: 'As performance levels off, it begs the question: are LLMs reaching their limit?
    When ChatGPT was first released, we were all universally wowed by its vast knowledge,
    but subsequent iterations haven’t been as revolutionary. When it comes to training
    data, improvements have been made as fresher training data has been used with
    new GPT versions, but in reality, there will always be limitations in LLM data
    unless a model is trained regularly, which seems unlikely.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 当性能趋于平稳时，这引发了一个问题：LLMs是否达到了极限？当ChatGPT首次发布时，我们都对它的广泛知识感到震惊，但随后的迭代并没有那么革命性。当涉及到训练数据时，随着使用新GPT版本的新鲜训练数据的采用，已经取得了一些改进，但事实上，除非模型定期训练，否则LLM数据将始终存在局限性，这似乎不太可能。
- en: Despite their impressive capabilities, LLMs come with significant drawbacks,
    which I’ve covered throughout this book. Here is a quick recap. They require an
    enormous amount of data and parameters for training, leading to high computational
    power and energy consumption. This results in steep costs, putting core LLM development
    out of reach for smaller organizations and individuals. Additionally, LLMs present
    a steep learning curve for developers due to the complexity of the tools and techniques
    involved, and the long cycle time, from training to deployment, can slow down
    experimentation and innovation efforts.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管LLMs具有令人印象深刻的性能，但它们也伴随着显著的缺点，我在本书中已经进行了概述。这里简要回顾一下。它们需要大量数据和参数进行训练，导致高计算能力和能源消耗。这导致了高昂的成本，使得小型组织和个人的核心LLM开发难以触及。此外，LLMs由于涉及的工具和技术复杂，以及从训练到部署的漫长周期，给开发者带来了陡峭的学习曲线，这可能会减缓实验和创新工作。
- en: 'Other challenges include bias in training data as well as hallucination issues,
    slow inference performance, high token costs, and serious security implications
    if you are looking to consume and infer from sensitive data. The analogy of LLMs
    being like sledgehammers cracking nuts highlights that vast internet knowledge
    may not be essential for many conversational AI use cases. This raises the question:
    What qualities are truly important for effective conversational AI projects, and
    can an SLM meet these requirements and even provide advantages over LLMs?'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 其他挑战包括训练数据中的偏差以及幻觉问题、缓慢的推理性能、高令牌成本，以及如果您打算消费和从敏感数据中推断，严重的安全影响。将LLMs比作砸坚果的锤子，突显了庞大的互联网知识对于许多对话式AI用例可能并非必要。这引发了以下问题：对于有效的对话式AI项目，哪些品质真正重要，SLM能否满足这些要求，甚至比LLMs提供优势？
- en: Enter SLMs
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SLMs的登场
- en: Essentially, an SLM is a compact version of larger AI models, crafted to comprehend,
    interpret, and produce human language. SLMs offer a streamlined alternative to
    LLMs. With fewer parameters and simpler designs, they require less data, training
    time, and computing power – often just minutes or a few hours. This makes SLMs
    more efficient and easier to implement on-site or on smaller devices and with
    much smaller datasets fine-tuned to specific use cases.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，SLM（小型语言模型）是大型AI模型的紧凑版本，旨在理解、解释和生成人类语言。SLMs为LLMs（大型语言模型）提供了一个简化的替代方案。由于参数较少和设计简单，它们需要的数据、训练时间和计算能力更少——通常只需几分钟或几个小时。这使得SLMs更高效，并且更容易在现场或小型设备上实施，以及针对特定用例进行微调的小型数据集。
- en: SLMs versus LLMs – key differences
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SLMs与LLMs——关键区别
- en: 'To gain a clearer insight into SLMs, it’s helpful to compare them directly
    with LLMs:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更清晰地了解SLMs，直接将它们与LLMs进行比较是有帮助的：
- en: '**Scale and scope**: SLMs are designed to be compact and efficient, making
    them suitable for specific domains and tasks. They are trained on smaller datasets,
    allowing for quicker training and inference times and targeted knowledge. LLMs,
    on the other hand, are larger and more comprehensive, trained on vast and diverse
    data sources. LLMs capture a broad range of language patterns and excel at generating
    highly coherent and contextually relevant text about practically any subject.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规模和范围**：SLMs被设计成紧凑和高效，使其适合特定领域和任务。它们在较小的数据集上训练，允许更快的训练和推理时间以及针对性的知识。另一方面，LLMs更大、更全面，在广泛和多样化的数据源上训练。LLMs捕捉广泛的语言模式，在生成关于几乎所有主题的高度连贯和上下文相关的文本方面表现出色。'
- en: '**Training time and computational resources**: LLMs require more computational
    resources and longer training times due to their size. SLMs, with their smaller
    size and less complex architecture, are more practical for limited-resource scenarios
    and budgets or when quick deployment is needed'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练时间和计算资源**：由于规模较大，LLMs需要更多的计算资源和更长的训练时间。SLMs由于其较小的规模和更简单的架构，在资源有限或需要快速部署的场景和预算中更为实用。'
- en: '**Domain expertise**: While both models can be fine-tuned to specific domains,
    SLMs are often more efficient for tasks requiring domain-specific expertise due
    to their smaller size and faster inference times. SLMs can also be trained on
    much smaller datasets. A well-trained domain-specific SLM may perform adequately
    enough when compared to an LLM with domain knowledge provided at the context level.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域专业知识**：虽然这两种模型都可以针对特定领域进行微调，但由于SLMs规模较小且推理时间更快，因此在需要特定领域专业知识的情况下，SLMs通常更有效率。SLMs还可以在更小的数据集上训练。一个训练良好的特定领域SLM在与在上下文级别提供领域知识的LLM相比时，可能表现足够好。'
- en: '**Versatility and costs**: It all depends on the use case, but LLMs shine in
    content generation, translation, and understanding complex queries due to their
    broader knowledge base. However, properly fine-tuned SLMs can achieve comparable
    performance for specific conversational tasks at a fraction of the computational
    cost. An SLM does not necessarily need to understand every subject. SLMs can be
    trained to interact with customers on the basis of specific knowledge of a particular
    domain, providing tailored solutions and improving user experiences. This is achievable
    by fine-tuning SLMs with specialized training data and can be more straightforward.
    Furthermore, fine-tuning SLMs demands few resources. The specific hardware requirements,
    and thus the associated costs, vary depending on the model size, complexity, and
    dataset needs, but these are likely to be less.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多功能性和成本**：这完全取决于使用场景，但LLMs由于其更广泛的知识库，在内容生成、翻译和理解复杂查询方面表现出色。然而，经过适当微调的SLMs可以在计算成本的一小部分内实现与特定对话任务相当的性能。SLM不一定需要理解每个主题。SLMs可以被训练在与特定领域特定知识的基础上与客户互动，提供定制解决方案并改善用户体验。这可以通过使用专业训练数据微调SLMs来实现，并且可能更加直接。此外，微调SLMs需要很少的资源。具体的硬件要求以及相关的成本取决于模型大小、复杂性和数据集需求，但这些可能要少得多。'
- en: Advantages of SLMs
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SLMs的优势
- en: One of the key benefits of SLMs is their suitability for specific applications.
    Their focused scope and reduced data requirements make them ideal for fine-tuning
    particular domains or tasks. This customization enables companies to create SLMs
    tailored to their specific needs, such as sentiment analysis, **named entity recognition**
    (**NER**), or domain-specific question-answering.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: SLMs的一个关键好处是它们适合特定应用。它们专注的范围和减少的数据需求使它们非常适合微调特定领域或任务。这种定制化使公司能够创建满足其特定需求的SLMs，例如情感分析、**命名实体识别**（NER）或特定领域的问答。
- en: SLMs also offer enhanced privacy and security. Their smaller code base and simpler
    architecture make them easier to audit and less likely to contain vulnerabilities.
    This is especially attractive for sensitive data handling in industries such as
    healthcare and finance. The reduced computational requirements of SLMs also enable
    local processing, further improving data security.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: SLMs还提供了增强的隐私和安全。它们较小的代码库和简单的架构使它们更容易审计，不太可能包含漏洞。这对于医疗保健和金融等行业处理敏感数据来说特别有吸引力。SLMs降低的计算需求还使本地处理成为可能，从而进一步提高了数据安全性。
- en: SLMs are less prone to hallucinations within their specific domains. Their training
    on targeted datasets helps them learn relevant patterns, vocabulary, and information,
    reducing the likelihood of irrelevant or inconsistent outputs. With fewer parameters,
    SLMs are also less likely to capture and amplify noise or errors in training data.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: SLMs在其特定领域内不太容易出现幻觉。它们在目标数据集上的训练有助于它们学习相关模式、词汇和信息，减少了产生无关或不一致输出的可能性。由于参数较少，SLMs也不太可能捕捉和放大训练数据中的噪声或错误。
- en: Disadvantages of SLMs
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SLMs的缺点
- en: SLMs, despite their numerous advantages, face several disadvantages and have
    been observed to have performance drops in some circumstances. A key limitation
    is their reduced understanding of context and overall less comprehensive knowledge
    base compared to larger models. This makes SLMs less effective for complex tasks
    that require deep understanding or broad contextual awareness. Additionally, SLMs,
    because of their smaller size and focused training datasets, may struggle with
    generating coherent and fluent text. For example, models with fewer parameters
    often show limitations in maintaining coherence over longer texts or in more complex
    interactions. This may constrain their utility in applications that demand high-quality
    responses while conversing over technical or complex domains.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: SLMs尽管具有许多优点，但在某些情况下观察到其性能下降。一个关键限制是它们对上下文的理解减少，与大型模型相比，整体知识库不够全面。这使得SLMs在需要深入理解或广泛上下文意识复杂任务时效果较差。此外，由于SLMs尺寸较小且训练数据集聚焦，它们在生成连贯流畅的文本方面可能存在困难。例如，参数较少的模型通常在保持较长文本的连贯性或在更复杂的交互中表现出局限性。这可能会限制它们在需要高质量响应且在技术或复杂领域进行对话的应用中的效用。
- en: Some examples of SLMs
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SLMs的一些示例
- en: Phi-3 is is the latest family of lightweight Mini 3B and 14B Medium state-of-the-art
    open models by Microsoft which get some really impressive performance results
    in benchmarks. Google’s Gemma is a series of SLMs designed for efficiency and
    user-friendliness. As with other SLMs, Gemma models can run on everyday devices
    without specialized hardware. Cerule, a powerful image and language model, combines
    Gemma 2B with Google’s **Sigmoid loss for Language-Image Pre-training** (**SigLIP**),
    leveraging efficient data selection techniques. This makes Cerule well suited
    for edge computing use cases. Another example is Llama 2 7B and now Llama 3 8B,
    which do not require vast hardware requirements, as well as Stable Beluga and
    Hugging Face’s Zephyr. Many of these models are available on platforms such as
    Hugging Face and the LLM API providers, as well as cloud services such as Google
    Vertex AI. These models are all trained toward conversational use cases. A great
    way to try out these models is by using Ollama, a lightweight framework for running
    models on a local machine.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: Phi-3是微软最新推出的轻量级Mini 3B和14B中端最先进的开放模型家族，在基准测试中获得了非常令人印象深刻的性能结果。谷歌的Gemma是一系列专为效率和用户友好性设计的SLMs。与其他SLMs一样，Gemma模型可以在日常设备上运行，无需专用硬件。Cerule是一款强大的图像和语言模型，将Gemma
    2B与谷歌的**Sigmoid损失函数用于语言-图像预训练**（**SigLIP**）相结合，利用高效的数据选择技术。这使得Cerule非常适合边缘计算用例。另一个例子是Llama
    2 7B和现在的Llama 3 8B，它们不需要大量的硬件要求，还有Stable Beluga和Hugging Face的Zephyr。许多这些模型都可在Hugging
    Face和LLM API提供商等平台上找到，以及像Google Vertex AI这样的云服务。这些模型都是针对对话用例进行训练的。尝试这些模型的一个好方法是使用Ollama，这是一个轻量级框架，用于在本地机器上运行模型。
- en: The transformative potential of SLMs
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SLMs的变革潜力
- en: SLMs have the potential to democratize AI access and drive innovation. Their
    faster development cycles and improved efficiency enable cost-effective, targeted
    solutions. Deploying SLMs at the edge opens up possibilities for real-time, personalized,
    and secure applications across sectors such as finance, entertainment, automotive,
    education, e-commerce, and healthcare.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: SLMs有潜力使人工智能访问民主化并推动创新。它们更快的开发周期和更高的效率使得成本效益高、目标明确的解决方案成为可能。在边缘部署SLMs为金融、娱乐、汽车、教育、电子商务和医疗保健等领域的实时、个性化、安全应用打开了可能性。
- en: Edge computing with SLMs improves response times, data privacy, and user experiences
    by processing data locally, which is an appealing solution and one that rectifies
    many drawbacks for enterprises looking to employ LLMs in more sensitive areas.
    This decentralized approach to AI has the potential to transform how businesses
    and consumers interact with LLM technology.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SLM的边缘计算通过本地处理数据来提高响应时间、数据隐私和用户体验，这是一个吸引人的解决方案，并且能够纠正企业希望在更敏感领域应用LLM时的许多缺点。这种去中心化的AI方法有潜力改变企业和消费者与LLM技术互动的方式。
- en: By exposing SLMs to specialized training data and tailoring their capabilities
    with fine-tuning, they can produce accurate and relevant outputs for conversational
    use cases at a fraction of the cost of training an LLM. They often provide great
    results with similar conversational capabilities to an LLM. If you’re looking
    to use LLM technology but are concerned about the drawbacks, it’s advisable to
    consider whether a SLM model may be a sensible choice.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将SLM暴露于专门的训练数据并对它们的能力进行微调，它们可以在训练LLM成本的一小部分内产生针对对话用例的准确和相关的输出。它们通常能够提供与LLM相似的对话能力并取得很好的结果。如果你正在寻找使用LLM技术但担心其缺点，考虑一个SLM模型可能是一个明智的选择。
- en: 'However, there are limitations: while SLMs offer significant benefits, especially
    in terms of efficiency and cost, their applications are sometimes restricted depending
    on the planned use case.'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，也存在局限性：虽然SLM提供了显著的好处，尤其是在效率和成本方面，但它们的适用范围有时会根据预期的用例而受到限制。
- en: Despite any drawbacks, they make a compelling case. With the growing availability
    of model-specific **platforms as a service** (**PaaSs**) and model training platforms,
    it’s becoming increasingly convenient to explore and test the capabilities of
    SLMs, making it well worth the time and effort to investigate.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在任何缺点，它们都提出了一个有力的论点。随着特定模型**平台即服务**（**PaaS**）和模型训练平台的日益可用，探索和测试SLM能力的便利性越来越高，因此投入时间和精力去研究是非常值得的。
- en: Where to go from here
  id: totrans-211
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 接下来该往哪里走
- en: Throughout this book, we’ve focused on crafting engaging conversational experiences
    with ChatGPT and LLMs both as a tool and as technology for complex conversational
    experiences. The landscape of LLMs has undergone a dramatic transformation since
    we first set out on this journey, fueled by continuous advancements in LLM technology.
    ChatGPT, while a groundbreaking innovation at its release, now represents just
    one piece of a much larger and more versatile LLM ecosystem.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书的整个过程中，我们专注于利用ChatGPT和LLM作为工具和技术来创造引人入胜的对话体验。自从我们开始这段旅程以来，LLM的领域经历了巨大的变革，这得益于LLM技术的持续进步。尽管ChatGPT在发布时是一项突破性的创新，但现在它只是更大、更灵活的LLM生态系统中的一个组成部分。
- en: I’ve worked in conversational AI for a number of years, many years before ChatGPT,
    and had the pleasure of working on and putting into production many NLU-based
    applications. This has given me a strong understanding of the challenges of conversational
    AI, what LLMs need to do to overcome them, and whether they are capable. There
    are thousands of NLU-powered conversational AI applications working today, many
    of which you could argue could be replaced by ChatGPT applications. Or at least
    elements of them could be, which is often dependent on the underlying technologies
    of the existing platforms and how quickly and effectively vendors have built in
    the ability to leverage LLM technologies alongside traditional intent-based systems.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 我在对话式人工智能领域工作了多年，早在ChatGPT之前，就有幸参与并投入生产了许多基于NLU的应用。这让我对对话式人工智能的挑战有了深刻的理解，包括LLM需要做什么来克服这些挑战，以及它们是否能够做到。目前有数千个由NLU驱动的对话式人工智能应用正在运行，其中许多你可以认为可以被ChatGPT应用所取代。或者至少它们的一些元素可以被取代，这通常取决于现有平台的底层技术和供应商构建利用LLM技术以及传统基于意图的系统能力的速度和效率。
- en: Like everyone, I was initially amazed by the release of ChatGPT and the endless
    possibilities of the technology. However, I’ve always tried to be realistic about
    the adoption of the technology and its limitations and dangers. It’s all dependent
    on the use case, of course. If you want to chat in depth about your own data,
    then a RAG system is a huge advancement in conversational AI, but in a transactional
    role, it’s wise to have some restraint.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 就像所有人一样，我最初对ChatGPT的发布和技术的无限可能性感到震惊。然而，我一直试图对技术的采用、其局限性和风险保持现实态度。当然，这都取决于具体的应用场景。如果你想深入讨论自己的数据，那么RAG系统在对话式人工智能领域是一个巨大的进步，但在交易性角色中，适度的克制是明智的。
- en: I personally feel the biggest shift moving forward lies in the feasibility of
    building transactional LLM-powered applications for more complex use cases. Creating
    these applications with frameworks such as LangChain has become a much more realistic
    proposition but is still not by any means straightforward. With the emergence
    of supporting tools such as LangSmith, designed specifically for testing and monitoring
    LLM behavior, the risks of deploying transactional bots are mitigated. This opens
    doors to consider replacing traditional intent-based systems with the flexibility
    and adaptability of LLMs.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人认为，向前发展的最大转变在于为更复杂的应用场景构建交易性LLM驱动应用的可行性。使用LangChain等框架创建这些应用已经成为一个更加现实的目标，但仍然不是一件简单的事情。随着专门用于测试和监控LLM行为的支持工具（如LangSmith）的出现，部署交易性机器人的风险得到了缓解。这为考虑用LLM的灵活性和适应性来取代传统的基于意图的系统打开了大门。
- en: The future of LLMs lies in a multi-model approach. We can leverage different
    models suited to specific tasks within an LLM pipeline. Imagine a specific LLM
    acting as the agent executor within a LangChain application, drawing upon the
    strengths of other specialized models to complete specific tasks. Additionally,
    advancements in LLM reasoning capabilities offer exciting potential.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: LLM的未来在于多模型方法。我们可以在LLM管道内利用适合特定任务的模型。想象一下，一个特定的LLM在LangChain应用中充当代理执行者，利用其他专业模型的优势来完成特定任务。此外，LLM推理能力的进步也提供了令人兴奋的潜力。
- en: However, model choice remains a complex decision when planning for your LLM
    application. Factors such as use case, underlying data, domain type, cost, security
    considerations, and maintainability all play a crucial role when planning for
    production. These factors highlight the importance of exploring alternatives beyond
    ChatGPT. SLMs offer an intriguing option for specific scenarios, particularly
    with long-standing conversational AI systems, with a wealth of conversation logs
    and historical usage data that can be leveraged for fine-tuning.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在规划LLM应用时，模型选择仍然是一个复杂的决策。使用案例、底层数据、领域类型、成本、安全考虑和可维护性等因素在规划生产时都起着至关重要的作用。这些因素突出了探索ChatGPT之外替代方案的重要性。SLMs为特定场景提供了一个有趣的选项，尤其是在拥有大量对话日志和历史使用数据的长期对话式人工智能系统中，这些数据可以用于微调。
- en: The LangChain ecosystem remains a powerful platform for crafting LLM-powered
    applications. With integrations and tools tailored to practically any requirement,
    we’ve barely scratched the surface of its potential. You can leverage an ever-growing
    array of vector stores and services alongside specialized tools such as Tavily
    Search to enhance the capabilities of our LLM applications. There are many great
    examples of LangChain templates, which I advise are great places to look at more
    complex conversational use cases.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain生态系统仍然是构建LLM驱动应用的强大平台。随着针对几乎所有需求的集成和工具，我们只是触及了其潜力的表面。你可以利用不断增长的向量存储和服务，以及像Tavily
    Search这样的专业工具，来增强我们LLM应用的能力。有许多LangChain模板的例子，我建议这些是查看更复杂对话用例的好地方。
- en: It’s also important to acknowledge the documented risks involved in taking LLMs
    into production. Their stochastic nature, meaning inherent randomness in outputs,
    can lead to unreliable results. This necessitates careful planning and robust
    testing methodologies, especially for critical applications.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 同样重要的是要承认将大型语言模型（LLMs）投入生产所涉及的风险。它们具有随机性，即输出中的固有随机性，可能导致不可靠的结果。这需要仔细规划和稳健的测试方法，尤其是在关键应用中。
- en: OpenAI continues to push boundaries with its GPT models. We’ve witnessed the
    evolution from GPT-3.5 to GPT-4 and its Turbo iteration, optimized for chat-based
    applications. The latest, GPT-4o released in May 2024, integrates multi-modal
    capabilities by incorporating their modality-specific models into one new model.
    The result is that it’s capable of handling text, audio, image, and video inputs
    with human-like response speeds, enabling fully multi-modal conversational interactions.
    Previously, GPTs have been dogged by latencies of 3-6 seconds on average over
    voice interactions.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 不断通过其 GPT 模型突破边界。我们已经见证了从 GPT-3.5 到 GPT-4 及其针对聊天应用优化的 Turbo 版本的演变。最新的
    GPT-4o，于 2024 年 5 月发布，通过将它们特定模态的模型整合到一个新的模型中，集成了多模态能力。结果是，它能够以类似人类的响应速度处理文本、音频、图像和视频输入，实现完全的多模态对话交互。以前，GPT
    在语音交互中平均存在 3-6 秒的延迟问题。
- en: While OpenAI continues to enhance its models with breathtaking capabilities,
    multi-modal, multi-lingual, expanded context windows, improved accuracy and improved
    LLM reasoning, they have also wisely kept API GPT-4o costs down and included it
    in the Free version of ChatGPT to make this technology accessible to a wider audience.
    While OpenAI continues to enhance its models with breathtaking capabilities –
    multi-modal, multi-lingual, expanded context windows, improved accuracy, and improved
    LLM reasoning – they have also wisely kept API GPT-4o costs down and included
    it in the free version of ChatGPT to make this technology accessible to a wider
    audience.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 当 OpenAI 不断通过令人叹为观止的能力增强其模型，包括多模态、多语言、扩展的上下文窗口、提高的准确性和改进的 LLM 推理时，他们还明智地保持了
    API GPT-4o 的成本在较低水平，并将其包含在 ChatGPT 的免费版本中，使这项技术能够惠及更广泛的受众。OpenAI 不断通过令人叹为观止的能力增强其模型——多模态、多语言、扩展的上下文窗口、提高的准确性和改进的
    LLM 推理——同时他们也明智地保持了 API GPT-4o 的成本在较低水平，并将其包含在 ChatGPT 的免费版本中，使这项技术能够惠及更广泛的受众。
- en: The landscape, as we first knew it, has morphed dramatically, mirroring the
    rapid evolution of LLM technology. The LLM ecosystem continues to thrive, presenting
    developers with a growing number of models and simplified tools for building and
    leveraging their capabilities. As the technology continues to evolve, so too will
    the possibilities for crafting transformative conversational experiences. Embrace
    experimentation, explore the ever-expanding LLM ecosystem, and stay at the forefront
    of this exciting revolution.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最初所了解的景象已经发生了巨大的变化，反映了 LLM 技术的快速演变。LLM 生态系统持续繁荣，为开发者提供了越来越多的模型和简化工具，以构建和利用其能力。随着技术的持续发展，构建变革性对话体验的可能性也将随之增加。拥抱实验，探索不断扩大的
    LLM 生态系统，并保持在这次激动人心的革命的前沿。
- en: Summary
  id: totrans-223
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we looked into crucial considerations and challenges associated
    with transitioning a ChatGPT-powered system from a POC to a fully operational
    production environment, highlighting the significant responsibilities and risks
    involved in deploying LLM-powered applications, particularly RAG systems. By now,
    you should have an understanding of the importance of robust safeguards to prevent
    inappropriate responses and ensure reliability. We reviewed an incident where
    a chatbot malfunctioned due to poor content moderation and insufficient system
    controls, highlighting the need for proper safeguards.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了将 ChatGPT 驱动的系统从原型验证过渡到完全运营的生产环境所涉及的关键考虑因素和挑战，突出了部署 LLM 驱动的应用程序，尤其是
    RAG 系统所涉及的显著责任和风险。到目前为止，你应该已经理解了采取稳健的安全措施以防止不适当回应并确保可靠性的重要性。我们回顾了一个由于内容监管不力和系统控制不足而导致聊天机器人故障的事件，强调了适当安全措施的需求。
- en: A substantial portion of the chapter was devoted to discussing specific challenges
    faced by RAG systems as they approach production. We also explored comprehensive
    strategies for evaluating LLM applications, emphasizing the necessity of continuous
    validation against a wide array of criteria to ensure the system’s effectiveness
    and reliability. I’m hoping by covering an evaluation example, you now have a
    solid understanding of the importance of a tool such as LangSmith and a good base
    of knowledge to build robust evaluation. Evaluation and monitoring tools offer
    a structured approach to managing, testing, and refining LLM applications, and
    they need to play an important role in your ChatGPT project.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的大部分内容都致力于讨论RAG系统在生产过程中面临的具体挑战。我们还探讨了评估LLM应用的全面策略，强调了对广泛标准的持续验证的必要性，以确保系统的有效性和可靠性。我希望能通过介绍一个评估示例，让您对LangSmith这样的工具的重要性有一个坚实的理解，并为您构建稳健的评估打下良好的知识基础。评估和监控工具为管理、测试和改进LLM应用提供了一种结构化的方法，它们需要在您的ChatGPT项目中扮演重要的角色。
- en: To give a balanced view, in the chapter, we gained some insights into alternative
    LLM service offerings and models, including alternatives to LangChain and ChatGPT,
    reflecting on the rapidly evolving landscape of conversational AI technologies.
    The landscape has moved on considerably, and you’ll hopefully have a grasp of
    the importance of choosing the right model based on specific use cases and operational
    requirements. We also looked at the potential of SLMs as a more manageable and
    specialized alternative to traditional large-scale LLMs.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提供一个平衡的视角，在本章中，我们了解了一些替代的LLM服务提供者和模型，包括LangChain和ChatGPT的替代品，并反思了对话式AI技术快速发展的格局。这一领域已经取得了相当大的进展，您可能会对根据具体用例和运营需求选择正确模型的重要性有所把握。我们还探讨了SLMs作为传统大型LLM的更易于管理和专业化的替代品的潜力。
- en: Finally, we looked at where to go from here, and that depends on where you and
    your organization are in your LLM journey, whether that be moving forward with
    implementing LLM features, transitioning your conversational AI projects into
    production, or embarking on greenfield LLM applications.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们探讨了下一步该怎么做，这取决于您和您的组织在LLM旅程中的位置，无论是继续实施LLM功能，将您的对话式AI项目过渡到生产，还是开始绿色场LLM应用。
- en: We’ve covered a lot here, but hopefully, it will help you overcome challenges
    and ask key questions so that you can successfully leverage LLM technologies moving
    forward.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里涵盖了大量的内容，但希望这能帮助您克服挑战，提出关键问题，以便您能够成功利用LLM技术向前发展。
