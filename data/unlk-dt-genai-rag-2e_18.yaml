- en: Understanding semantic caches with the long-tail pattern
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过长尾模式理解语义缓存
- en: Consider all of the queries that come into your application. If your query data
    is like the majority of RAG-based application query data out there, you will likely
    see a distinct pattern emerge. A small percentage of your queries will likely
    have significantly higher frequency than all the others. Often, there is a single
    query that comprises more than 20% of *all* traffic! On the other side of this
    spectrum, you will have a very significant number of queries, probably 60–70%
    of them, that are only requested a handful of times. This is called the **long-tail
    pattern**.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑所有进入你应用程序的查询。如果你的查询数据像大多数基于 RAG 的应用程序查询数据一样，你可能会看到一个明显的模式出现。你查询的一小部分可能会比其他所有查询的频率高得多。通常，有一个查询占所有流量的
    20% 以上！在另一端，你将有一个非常显著的查询数量，其中可能 60-70% 的查询只被请求几次。这被称为 **长尾模式**。
- en: '![Figure 15.1: Example of long-tail pattern applied to queries](img/B34736_15_1.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图15.1：应用到查询中的长尾模式示例](img/B34736_15_1.png)'
- en: Figure 15.1 – Example of long-tail pattern applied to queries
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.1 – 应用到查询中的长尾模式示例
- en: The long-tail pattern (or the related Pareto index) is a statistical concept
    that is widely studied and applied across numerous fields. Still, in this case,
    we want to focus on the “head” of the data, the queries that represent the bulk
    of the queries passed to your RAG application. Ideally, you want to handle 100%
    of the queries gracefully, right? But at the very least, aim for the “head” of
    this chart, the top 20%, which gives you 80% coverage in terms of query usage
    in your application. That is already better than the best applications out there,
    where the top-performing agent companies (I won’t name names!) brag in their advertising
    about the successful processing of 68% of queries! Given that, even aiming for
    complete coverage of the top 20% is daunting in all but the smallest applications.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 长尾模式（或相关的帕累托指数）是一个在众多领域广泛研究和应用的概率统计概念。然而，在这种情况下，我们想要关注数据的“头部”，即代表传递给你的RAG应用的大多数查询的查询。理想情况下，你想要优雅地处理100%的查询，对吧？但至少，目标应该是这个图表的“头部”，即前20%，这在你应用中的查询使用率方面提供了80%的覆盖率。这已经比目前最好的应用要好，那些表现最好的代理公司（我不会点名！）在他们的广告中吹嘘成功处理了68%的查询！考虑到这一点，即使在最小的应用中，试图完全覆盖前20%也是一项艰巨的任务。
- en: But wait, if we have a well-designed agent, can’t it just determine the right
    response path for each query dynamically? Isn’t the whole point of an agent to
    be able to instantly handle 100% of the queries? Yes, you could say that, but
    let’s speak plainly. Beyond the extra latency and cost, designing an agent to
    be that effective is very difficult and just not very likely. The reality is that
    the more effective your agent is at processing the most random query, the trade-off
    is always in the form of higher latency and inference costs. The agent literally
    has to “reason” its way through a new query every time. That means multiple LLM
    calls. The typical response time for a single LLM call, especially in complex
    situations such as uncommon queries, is already 2–20+ seconds, which is often
    unacceptable for most consumer-facing applications. But we are likely looking
    at several of these calls to have a well-designed agent that handles all scenarios
    gracefully. There are all kinds of techniques that we talk about in this book
    and that you can read about in more detail elsewhere to reduce the cost and latency
    of these individual calls, reduce the number of them required for a final response,
    or reduce the amount of data retrieved and passed to the generation stage to improve
    inference times. There are numerous techniques that you will want to exhaust in
    addition to implementing a semantic cache. But ultimately, you are going to find
    that in attempting to have an agent handle the large variation in queries you
    will experience, while also keeping the latency and costs to an acceptable level
    on a production scale, you will run out of solutions. Maybe you are lucky and
    you have the budget to put all of this on a billion-dollar array of quantum computers
    that can process all of this in a fraction of a second (this scenario is likely
    only possible for those of you reading 5–10 years after this book’s publication,
    but I digress!), but for the rest of us, there are semantic caches.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等，如果我们有一个设计良好的代理，它难道不能为每个查询动态地确定正确的响应路径吗？代理的整个目的不就是要能够即时处理100%的查询吗？是的，你可以这么说，但让我们坦率地说。除了额外的延迟和成本，设计一个如此有效的代理非常困难，而且几乎不太可能。现实是，你的代理在处理最随机的查询方面越有效，权衡总是以更高的延迟和推理成本的形式出现。代理实际上每次都必须“推理”通过一个新的查询。这意味着需要多次调用LLM。单个LLM调用的典型响应时间，尤其是在复杂情况，如不常见的查询中，已经是2-20+秒，这对于大多数面向消费者的应用来说通常是不可以接受的。但是，我们很可能会看到好几次这样的调用，以使一个设计良好的代理能够优雅地处理所有场景。这本书中提到了各种技术，你可以在其他地方更详细地了解这些技术，以降低这些单个调用的成本和延迟，减少最终响应所需的调用次数，或者减少检索并传递到生成阶段的数据量，以提高推理时间。除了实现语义缓存之外，你还将想要尝试多种技术。但最终，你会发现，在尝试让代理处理你将遇到的大量查询变化的同时，保持生产规模上的延迟和成本在可接受的水平，你会耗尽解决方案。也许你很幸运，你有足够的预算将所有这些放在一个价值十亿美元的量子计算机阵列上，它可以瞬间处理所有这些（这个场景可能只有在你在这本书出版后5-10年内阅读时才可能实现，但我跑题了！），但对于我们其他人来说，还有语义缓存。
- en: Let’s get into the details of what a semantic cache really is, so you can better
    understand why it is so effective in an AI agent environment.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解语义缓存到底是什么，这样你就能更好地理解为什么它在AI代理环境中如此有效。
- en: '**Fun fact**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的事实**'
- en: We mentioned that the long-tail pattern is a statistical concept. If you want
    to dive into the statistical mathematics around this, then you will want to learn
    more about the Pareto index. The Pareto index comes from the Pareto distribution,
    which is a mathematical model used to describe data with a “power-law” relationship,
    where a small number of items account for most of the effect. The Pareto index
    basically measures how “heavy” or “fat” the long tail is. The lower the Pareto
    index, the more pronounced the long-tail pattern. A statistician would use the
    Pareto index to quantify the long-tail pattern. A closely related concept is the
    Pareto principle (80/20 rule), which states that 20% of causes lead to 80% of
    effects, which is considered a special case of Pareto distributions. The Pareto
    index directly informs resource allocation decisions. For instance, with α = 1.0,
    optimizing the top 20% of query types covers ~80% of volume, while α = 2.0 might
    require handling 40% of query types for the same coverage. This mathematical relationship
    helps set realistic targets for chatbot performance metrics and development priorities.
    Additionally, tracking changes in the Pareto index over time reveals whether your
    chatbot’s usage is consolidating around core functions or diversifying into new
    areas, which is critical intelligence for product roadmap decisions and capability
    planning.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提到长尾模式是一个统计概念。如果你想深入了解这个概念周围的统计数学，那么你将需要了解更多关于帕累托指数的知识。帕累托指数来自帕累托分布，这是一种用于描述具有“幂律”关系的数学模型，其中少数项目占大多数效果。帕累托指数基本上衡量长尾的“重量”或“肥胖程度”。帕累托指数越低，长尾模式越明显。统计学家会使用帕累托指数来量化长尾模式。一个与之密切相关的概念是帕累托原则（80/20法则），它表明20%的原因导致80%的效果，这被认为是帕累托分布的特殊情况。帕累托指数直接影响资源分配决策。例如，当α
    = 1.0时，优化前20%的查询类型可以覆盖约80%的量，而α = 2.0可能需要处理40%的查询类型以达到相同的覆盖率。这种数学关系有助于设定聊天机器人性能指标和开发优先级的现实目标。此外，随着时间的推移跟踪帕累托指数的变化可以揭示你的聊天机器人的使用是否正在围绕核心功能巩固，或者是否正在向新领域多元化，这对于产品路线图决策和能力规划是至关重要的情报。
- en: Semantic cache – the interceptor layer
  id: totrans-35
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 语义缓存 – 拦截器层
- en: When I say “interceptor” layer, I am talking about using the same vector search
    we spent multiple chapters on earlier in this book and aiming it at intercepting
    queries to replace the reasoning steps of the agent with super-fast, LLM inference-free
    semantic matches. Consider that the first step for most agents is not to respond
    to the user query but to come up with a plan for responding, typically involving
    a selection of tools that will enable them to answer the query effectively. We
    will call this tool selection a solution path. The most basic implementation involves
    intercepting an incoming query and using vector similarity search to match it
    to queries you have cached with existing solution paths, basically skipping the
    planning step of the agent and saving all the time and inference costs that that
    involves!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说“拦截器层”时，我指的是使用我们在本书前面几章中花费了多个章节讨论的相同向量搜索，并将其用于拦截查询，用超级快速、无需LLM推理的语义匹配来替代代理的推理步骤。考虑一下，对于大多数代理来说，第一步不是响应用户查询，而是制定一个响应计划，通常涉及选择能够有效回答查询的工具。我们将这种工具选择称为解决方案路径。最基本实现涉及拦截传入的查询，并使用向量相似度搜索将其与您已缓存的具有现有解决方案路径的查询相匹配，基本上跳过了代理的规划步骤，节省了所有涉及的时间和推理成本！
- en: For the top 20% of queries at the very least, and as far down the long tail
    as we can go, we want to intercept them and make sure they get the right data.
    The statistics on semantic caches change daily, so I encourage you to look up
    the freshest numbers. Also, as I’ve preached here many times, the most important
    numbers are what you get from your own system, so set up trials to determine the
    best approach and measure the potential impact of this. But, generally, recent
    reports from AWS, OpenAI, and Intercom indicate that the most successful implementations
    maintained 600-millisecond-to-2-second responses with semantic cache-based “full-scale
    reasoning agents,” compared to 5–6 seconds for responses that were not handled
    by the semantic cache.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 至少对于最顶尖的20%的查询，以及尽可能深入的长尾部分，我们想要拦截它们并确保它们获得正确的数据。语义缓存的数据统计每天都在变化，所以我鼓励你查找最新的数字。此外，正如我多次在这里宣扬的，最重要的数字是你从自己的系统中获得的数据，所以设置试验以确定最佳方法并衡量这种方法的潜在影响。但一般来说，最近的AWS、OpenAI和Intercom的报告表明，最成功的实现通过基于语义缓存的“全规模推理代理”保持了600毫秒到2秒的响应时间，而未通过语义缓存处理的响应则需要5到6秒。
- en: It is important to clarify that a semantic cache does not *typically* remove
    inference completely. It just replaces the planning stage of the agent. The proportion
    of the full response that this replaces varies significantly across different
    applications, but in a simple scenario, where you call the LLM once to reason
    (ultimately determining what data needs to get pulled for the RAG process), then
    that would be half of the processing. The other half is sending that data retrieved
    to the LLM in the traditional RAG sense.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要明确，语义缓存**通常**不会完全去除推理。它只是替换了代理的规划阶段。这种替换在整个响应中占的比例在不同应用中差异很大，但在一个简单场景中，如果你只调用一次LLM进行推理（最终确定需要为RAG过程提取哪些数据），那么这将是处理的一半。另一半是将检索到的数据发送给LLM，按照传统的RAG方式进行。
- en: So, in that scenario, you are reducing latency and inference costs for that
    first stage. The second stage still exists, with whatever latency and costs it
    incurs. The reason I said “typically” in a previous statement is that there are
    scenarios where all you need is the semantic cache, or where the semantic cache
    can improve the generation stage. For example, with “static” content, such as
    with a FAQ-type response, if you know exactly what you want the response to be,
    you can store that in the semantic cache, and it can just return that response
    with no inference needed at all. You can also store database-optimized SQL (or
    whatever you use for retrieval) that is specific to a query in the semantic cache,
    which reduces the speed of retrieval and the amount of data passed to the LLM
    in the generation stage, which helps improve that stage as well. But generally,
    it is important to understand that the primary benefit of the semantic cache is
    in improving the reasoning stage of the response process.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在那个场景中，你正在减少第一阶段延迟和推理成本。第二阶段仍然存在，并承担其产生的任何延迟和成本。我之前说“通常”的原因是，存在一些场景，你可能只需要语义缓存，或者语义缓存可以改进生成阶段。例如，对于“静态”内容，例如FAQ类型的响应，如果你确切知道你想要的响应是什么，你可以在语义缓存中存储它，并且它可以无需任何推理就返回该响应。你还可以在语义缓存中存储针对特定查询优化的SQL（或你用于检索的任何东西），这可以减少检索速度和传递给LLM（在生成阶段）的数据量，从而也有助于改进该阶段。但一般来说，重要的是要理解，语义缓存的主要好处在于改进响应过程的推理阶段。
- en: With a semantic cache, we are anticipating the queries the user is going to
    ask, and we are pre-determining the data we want to provide for that query. We
    are intercepting these queries with this “interceptor” layer. Next, we will discuss
    why we want to do this interception.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 使用语义缓存，我们正在预测用户将要提出的查询，并预先确定我们想要为该查询提供的数据。我们通过这个“拦截器”层拦截这些查询。接下来，我们将讨论为什么我们要进行这种拦截。
- en: Core components of semantic caches
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语义缓存的核心组件
- en: At their foundation, semantic caches consist of several essential components
    that work together to provide intelligent query matching. **Query embeddings**
    form the heart of the system, capturing semantic meaning in a high-dimensional
    vector space. These dense vector representations encode not just the words but
    the underlying concepts and relationships within each query.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在其基础上，语义缓存由几个基本组件组成，这些组件协同工作以提供智能查询匹配。**查询嵌入**构成了系统的核心，在多维向量空间中捕捉语义意义。这些密集的向量表示不仅编码了单词，还编码了每个查询中潜在的概念和关系。
- en: '**Similarity thresholds** serve as the decision boundaries for determining
    matches. Unlike binary exact-match systems, semantic caches operate on a continuum
    of similarity, requiring careful calibration to balance catching valid paraphrases
    and avoiding false matches.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**相似度阈值**作为确定匹配的决策边界。与二进制精确匹配系统不同，语义缓存在相似度的连续体上操作，需要仔细校准以平衡捕捉有效释义和避免错误匹配。'
- en: '**Metadata** acts like a detailed label on each cached item, providing crucial
    context that helps the system make smarter decisions. Think of it as attaching
    a comprehensive information card to every cached query-response pair. This metadata
    typically includes three key types of information:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**元数据**像每个缓存项的详细标签，提供帮助系统做出更明智决策的关键上下文。将其视为为每个缓存查询-响应对附加一张全面的信息卡。此类元数据通常包括三种关键类型的信息：'
- en: '**Provenance information** tracks where the cached answer came from, which
    data sources were consulted, which version of the model generated it, and what
    specific retrieval methods were used. This helps determine whether a cached answer
    is still trustworthy or whether it came from outdated sources.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**来源信息**追踪缓存答案的来源，咨询了哪些数据源，哪个模型版本生成它，以及使用了哪些特定的检索方法。这有助于确定缓存答案是否仍然可信，或者它是否来自过时的来源。'
- en: '**Timestamps** record when the cache entry was created and last accessed. For
    example, a cached answer about “current stock prices” from last week would be
    flagged as potentially stale, while an answer about “the capital of France” from
    months ago remains valid. These timestamps enable automatic cache invalidation
    for time-sensitive information.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间戳**记录缓存条目创建和最后访问的时间。例如，上周关于“当前股价”的缓存答案可能会被标记为可能过时，而关于“几个月前的法国首都”的答案仍然有效。这些时间戳使自动失效对时间敏感信息成为可能。'
- en: '**Relevance scoring** assigns quality metrics to each cache entry based on
    factors such as how well it answered the original query, user feedback, or how
    often it’s been successfully reused. A cache entry that consistently satisfies
    users might have a score of 0.95, while a partially relevant answer might score
    0.70.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关性评分**根据诸如如何回答原始查询、用户反馈或它被成功重用的频率等因素，为每个缓存条目分配质量指标。一个始终满足用户的缓存条目可能得分为0.95，而一个部分相关的答案可能得分为0.70。'
- en: This rich metadata enables sophisticated filtering and management strategies.
    For instance, the system could prioritize recent, high-scoring cache entries from
    authoritative sources, or automatically purge entries older than a certain threshold
    for specific topic areas. It transforms the cache from a simple storage system
    into an intelligent knowledge repository that understands the quality, freshness,
    and reliability of its contents.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这丰富的元数据使复杂的过滤和管理策略成为可能。例如，系统可以优先考虑来自权威来源的最近、得分高的缓存条目，或自动清除特定主题领域超过一定阈值的旧条目。它将缓存从简单的存储系统转变为理解其内容质量、新鲜度和可靠性的智能知识库。
- en: Perhaps most importantly, semantic caches store solution paths that map queries
    to appropriate agent actions. Rather than simply caching responses, modern implementations
    cache the route to generate correct answers, ensuring freshness while maintaining
    efficiency.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 可能最重要的是，语义缓存存储将查询映射到适当代理操作的解决方案路径。现代实现不仅缓存响应，还缓存生成正确答案的路径，确保新鲜度的同时保持效率。
- en: The intelligence layer between the query and the response
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 查询与响应之间的智能层
- en: Semantic caches represent more than just a performance optimization. They constitute
    an intelligent decision layer that understands user intent. This intelligence
    manifests in several ways. The cache must distinguish between queries that appear
    similar but have different meanings, such as “What are Roth IRA tax benefits?”
    versus “What are Roth IRA withdrawal rules?” Both queries concern Roth IRAs, but
    they seek fundamentally different information.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 语义缓存不仅仅是性能优化。它们构成一个理解用户意图的智能决策层。这种智能以多种方式体现。缓存必须区分看似相似但实际上含义不同的查询，例如“什么是Roth
    IRA的税收优惠？”与“什么是Roth IRA的提取规则？”这两个查询都涉及Roth IRA，但它们寻求的是根本不同的信息。
- en: The system must also handle the nuanced variations in how users express themselves.
    A financial advisor and a young investor might ask about the same concept using
    entirely different vocabulary, levels of formality, and assumed knowledge. The
    semantic cache must recognize these as equivalent while maintaining boundaries
    between distinct concepts.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 系统还必须处理用户表达方式的细微差异。财务顾问和年轻投资者可能使用完全不同的词汇、正式程度和假设知识来询问相同的概念。语义缓存必须将这些视为等效的，同时保持不同概念之间的界限。
- en: This intelligence extends to understanding context and managing the temporal
    aspects of information. Some cached responses remain valid indefinitely (such
    as explanations of financial concepts), while others require real-time data (such
    as current stock prices). Modern semantic caches incorporate this understanding,
    routing appropriate queries to cached responses while ensuring time-sensitive
    requests receive fresh information.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这种智能扩展到理解上下文和管理信息的时间方面。一些缓存响应在无限期内有效（例如，金融概念的说明），而另一些则需要实时数据（例如，当前的股票价格）。现代语义缓存整合了这种理解，将适当的查询路由到缓存响应，同时确保对时间敏感的请求获得新鲜信息。
- en: Why use a semantic cache?
  id: totrans-54
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么使用语义缓存？
- en: 'Let’s start with an example to illustrate the power of the semantic cache.
    This assumes you have set up automated population, which we will cover in step
    7 of *Code lab 15.1* later in this chapter. Without a semantic cache, every time
    an agent reasons through what to do with a query, that inference is conducted
    and then lost. Think about the value of that inference; let’s say it is $1\. So,
    you spend $1 to get that inference, and then the next time a similar query comes
    in, you spend $1 again. Let’s say this is a popular query on a popular website,
    and you see that query 1,000 times a day. That’s $1,000 spent for all of that
    inference. Now, let’s introduce a semantic cache with that query and its solution
    path already stored. Here are the benefits you are getting:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个例子来说明语义缓存的力量。这假设你已经设置了自动化填充，我们将在本章后面的*代码实验室15.1*的第7步中介绍。没有语义缓存，每次代理通过推理来处理查询时，这种推理就会进行并随后丢失。想想这个推理的价值；比如说它值1美元。所以，你花1美元来获取这个推理，然后下次一个类似的查询进来时，你又要再花1美元。假设这是一个在热门网站上流行的查询，你看到这个查询每天有1000次。这就是为了所有这些推理而花费的1000美元。现在，让我们引入一个已经存储了该查询及其解决方案路径的语义缓存。以下是你可以获得的好处：
- en: '**Inference utilization**: You only have to run the inference once, the first
    time you see the unique query. Compare this to the 1,000 times you have to run
    it without the semantic cache. Your utilization of the LLM inference in your system
    just went through the roof! This “utilization” is important as it reduces the
    strain on your entire AI infrastructure, which has numerous benefits, particularly
    in larger-scale implementations where you have to start balancing server loads.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理利用**：你只需要在第一次看到独特的查询时运行推理一次。将这与你没有语义缓存时必须运行1000次相比。你系统中LLM推理的利用率刚刚飙升！这种“利用率”很重要，因为它减轻了你整个AI基础设施的负担，这带来了许多好处，尤其是在更大规模的实施中，你必须开始平衡服务器负载。'
- en: '**Inference cost reduction**: You still spend that first $1, but after that,
    you are reusing the same solution path. So, that 1,000 times a day still only
    costs $1 in inference with a semantic cache. With each agentic RAG query potentially
    costing significant compute resources for embedding, retrieval, and generation,
    serving repeated conceptual queries becomes prohibitively expensive at scale.
    Semantic caches can reduce these costs dramatically by recognizing when a new
    query is essentially asking something that already has a known solution path from
    an agent perspective. The more popular the query, the more you save!'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理成本降低**：你仍然要花那第一美元，但之后你将重复使用相同的解决方案路径。所以，每天1000次仍然只需要1美元的推理费用，使用语义缓存。由于每个代理RAG查询可能需要大量的计算资源进行嵌入、检索和生成，因此在大规模上服务重复的概念查询变得过于昂贵。语义缓存可以通过识别新查询实际上是在询问一个代理角度已知解决方案路径的内容来显著降低这些成本。查询越受欢迎，你就能节省越多！'
- en: '**Latency reduction**: Now, add in the fact that the planning inference without
    a semantic cache might take 2–20 seconds, whereas the retrieval from the semantic
    cache takes maybe 0.03–0.3 seconds. This speed improvement transforms the user
    experience, making AI assistants feel more responsive and natural in conversation.
    This is a huge reduction in latency!'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟减少**：现在，考虑到没有语义缓存，规划推理可能需要2-20秒，而从语义缓存中检索可能只需要0.03-0.3秒。这种速度提升改变了用户体验，使人工智能助手在对话中感觉更加响应和自然。这是延迟的巨大减少！'
- en: '**Broader semantic coverage**: It isn’t just the one query that you are saving
    money and time on; anything that is semantically above the similarity threshold
    you use with your semantic cache is covered too! This means that one inference
    you did for query “A,” where queries “B,” “C,” “D,” and “E” all match 85% or higher
    to query “A,” only has to be carried out once for all of those queries.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更广泛的语义覆盖**：这不仅仅是你节省金钱和时间的一个查询；任何语义上高于您与语义缓存一起使用的相似性阈值的查询都得到了覆盖！这意味着，对于查询“A”的推理，其中查询“B”、“C”、“D”和“E”都与查询“A”匹配85%或更高，只需为所有这些查询执行一次即可。'
- en: '**More consistent experience**: Consistency is a crucial requirement, particularly
    in domains such as finance or healthcare, where conflicting answers to similar
    questions could have serious consequences. By mapping semantically equivalent
    queries to the same solution path, these systems ensure users receive consistent,
    vetted information regardless of how they phrase their questions. Consistency
    is also a key aspect of quality, supporting the effort to deliver the same high-quality
    response every time. Let’s not forget, these LLMs are not deterministic and there
    is always a chance that a response might be different in a future inference iteration.
    That sort of surprise can wreak havoc in a professional agent-based application
    and can be avoided with a semantic cache!'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更一致的经历**：一致性是一个关键要求，尤其是在金融或医疗保健等领域，在这些领域，对类似问题的冲突答案可能会产生严重后果。通过将语义等效的查询映射到相同的解决方案路径，这些系统确保用户无论如何表述问题，都能接收到一致、经过验证的信息。一致性也是质量的关键方面，支持每次都提供相同高质量响应的努力。让我们不要忘记，这些大型语言模型不是确定性的，并且在未来的推理迭代中，响应可能会有所不同。这种意外可能会在一个基于代理的专业应用程序中造成混乱，而语义缓存可以避免这种情况！'
- en: '**More granular control**: Semantic caches are often curated beyond just what
    the agent originally comes up with in their solution path planning. It is not
    uncommon for a company to look at certain queries in their semantic cache, determine
    some new tools that will answer the query even better, and then add that tool
    to the semantic cache solution path without having to change anything else. This
    gives you increased control that allows you to curate your user experience and
    how you want to enhance query handling.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更细粒度的控制**：语义缓存通常不仅限于代理在解决方案路径规划中最初提出的那些内容。对于一家公司来说，查看其语义缓存中的某些查询，确定一些将更好地回答查询的新工具，然后将该工具添加到语义缓存解决方案路径中，而无需更改其他任何内容，这种情况并不少见。这为您提供了增加的控制，允许您策划您的用户体验以及您想要如何增强查询处理。'
- en: So, semantic caches give you better inference utilization, reduce latency, decrease
    costs, improve consistency, and give you more control over your user experience.
    Is there anything a semantic cache can’t do? Not really, they are pretty amazing!
    But the biggest challenge of a semantic cache is setting it up properly so that
    it intercepts the right queries and doesn’t intercept the wrong ones. We will
    talk about that next as we discuss how to plan out your semantic cache implementation.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，语义缓存可以为您提供更好的推理利用，减少延迟，降低成本，提高一致性，并让您对用户体验有更多的控制。语义缓存真的有什么做不到的吗？实际上并没有，它们非常神奇！但语义缓存最大的挑战是正确设置它，以便它拦截正确的查询，而不是错误的查询。我们将在讨论如何规划您的语义缓存实现时，进一步讨论这个问题。
- en: Proper semantic cache planning
  id: totrans-63
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 正确的语义缓存规划
- en: What happens when you don’t find a match with your semantic cache? It will not
    take long for a query to come into your system that does not match anything in
    the semantic cache (above the threshold you set). At some level, you might consider
    this a failure, as you did not correctly anticipate every possible query that
    could come in. Don’t be too hard on yourself! This is a natural part of the semantic
    cache process. What happens next is just as important as the semantic cache itself,
    and there is a wide variety of approaches that companies take to handle what happens
    next. Here are a few of the options that are implemented.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当你用你的语义缓存找不到匹配项时会发生什么？很快就会有查询进入你的系统，它不会与语义缓存中的任何内容（超过你设置的阈值）匹配。在某种程度上，你可能会认为这是一个失败，因为你没有正确预测到可能出现的每一个可能的查询。不要对自己太苛刻！这是语义缓存过程的一个自然部分。接下来发生的事情与语义缓存本身一样重要，公司采取了许多不同的方法来处理接下来发生的事情。以下是一些已实施的选择方案。
- en: Orchestrator/planner systems
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编排器/规划系统
- en: 'Implement hierarchical decision frameworks that evaluate multiple response
    pathways simultaneously:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 实施同时评估多个响应路径的分层决策框架：
- en: '**Key-value stores (50–60 milliseconds)**: Carry out exact-match lookups in
    key-value stores, which are essentially direct/exact matches, but with some important
    nuances. Consider that in many systems, the most popular queries (the “head” of
    the long tail described earlier) are often the same or very similar. It is common
    for applications to artificially ensure certain queries are exactly the same.
    For example, you might see a company send out an email with a link that triggers
    a query once it enters the application. This query has to go through the same
    process as every other query, but you know exactly what it is, so why use a process
    that will take significantly longer than a key-value match? We won’t cover this
    in the code lab, but it is common to add a key-valuestore layer in front of the
    semantic cache, similar to what we build in the code lab.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**键值存储（50–60 毫秒）**：在键值存储中执行精确匹配查找，这本质上就是直接/精确匹配，但有一些重要的细微差别。考虑在许多系统中，最受欢迎的查询（如前所述的长尾的“头部”）通常相同或非常相似。应用程序通常会人为确保某些查询完全相同。例如，你可能看到一家公司发送一封带有链接的电子邮件，一旦进入应用程序就会触发一个查询。这个查询必须经过与其他每个查询相同的过程，但你确切地知道它是什么，那么为什么使用一个比键值匹配显著更长的过程呢？我们不会在代码实验室中涵盖这一点，但通常会在语义缓存之前添加一个键值存储层，类似于我们在代码实验室中构建的。'
- en: '**Semantic vector searches fallback (100 milliseconds to 2 seconds)**: If there
    are no key-value matches, we fall back to the most popular type of semantic cache
    implementation, where we use vector embeddings to represent cached queries, vectorize
    incoming queries, and use vector similarity search to find matches. This is a
    very common pattern that we have discussed in depth in previous chapters, only
    in this case, it is applied specifically to the queries so that we can match them
    to the solution path that would normally be provided by the planning agent. This
    step will be the primary focus of what we build in the code lab.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义向量搜索回退（100 毫秒到 2 秒）**：如果没有键值匹配，我们将回退到最流行的语义缓存实现类型，其中我们使用向量嵌入来表示缓存的查询，将传入的查询向量化，并使用向量相似度搜索来找到匹配项。这是我们已经在之前的章节中深入讨论过的非常常见的模式，只是在这次，它是专门应用于查询的，以便我们可以将其与规划代理通常提供的解决方案路径相匹配。这一步骤将是我们在代码实验室中构建的主要内容。'
- en: '**Full agent planning fallback (2–10 seconds)**: If all else fails, we are
    probably dealing with a new query that is not captured yet in our semantic cache.
    Our planning agent is the final fallback here. This is essentially where we are
    before we add a semantic cache, with a planning agent simply determining a path,
    and we follow it to gather the data and answer the user query. But now that we
    know how valuable a semantic cache is, we want to capture this plan for the next
    time we get that query, rather than just throwing it out. So, we still want to
    add this memory. We will review this type of mechanism in the code lab as well!'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完整代理规划回退（2–10 秒）**：如果所有其他方法都失败了，我们可能正在处理一个尚未在我们的语义缓存中捕获的新查询。我们的规划代理是最后的回退。这本质上是我们添加语义缓存之前的阶段，规划代理只是确定一个路径，然后我们跟随它来收集数据和回答用户查询。但现在我们知道语义缓存是多么有价值，我们希望为下一次得到该查询时捕获这个计划，而不是简单地将其丢弃。因此，我们仍然希望添加这个记忆。我们将在代码实验室中回顾这种机制！'
- en: Before we get into the code lab, let’s talk about a few other approaches you
    can try on your own, such as the multi-tier fallback architecture.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们进入代码实验室之前，让我们谈谈一些你可以尝试的其他方法，比如多层回退架构。
- en: Rule-based fallback systems
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于规则的回退系统
- en: Provide deterministic fallback paths through natural language understanding
    models that detect intent and route to decision trees. Production implementations
    such as the Rasa framework’s Two-Stage Fallback combine intent classification
    with confidence thresholds to determine escalation paths. Dialogflow CX extends
    this pattern with generative fallback using custom prompt templates, effectively
    bridging rule-based and generative approaches.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自然语言理解模型提供确定性的回退路径，这些模型可以检测意图并将路由到决策树。例如，Rasa框架的二级回退在生产实现中结合了意图分类和置信度阈值来确定升级路径。Dialogflow
    CX通过使用自定义提示模板的生成回退来扩展这一模式，有效地连接了基于规则的生成方法。
- en: Intent classification pathways
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 意图分类路径
- en: Create predefined response protocols by categorizing queries into distinct handling
    paths. FAQ queries route to structured templates, technical support triggers diagnostic
    trees, general conversation maintains personality consistency, and escalation
    protocols determine human handoff triggers based on complexity scores. This systematic
    approach ensures consistent handling across query types.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将查询分类到不同的处理路径来创建预定义的响应协议。常见问题查询路由到结构化模板，技术支持触发诊断树，一般对话保持个性一致性，升级协议根据复杂度分数确定人工接管触发。这种系统化方法确保了查询类型的一致处理。
- en: But handling cache misses is only half the equation. You also need smart policies
    for managing the cache itself.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 但处理缓存缺失只是方程的一半。你还需要智能策略来管理缓存本身。
- en: Retrieval, population, and eviction policies
  id: totrans-76
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 检索、填充和清除策略
- en: The effectiveness of a semantic cache depends not just on its architecture but
    on the intelligent strategies used to retrieve matches efficiently, populate it
    with queries, and maintain cache quality over time. These three interconnected
    policies, namely retrieval, population, and eviction, form the operational heart
    of any semantic caching system, determining both its coverage and precision.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 语义缓存的有效性不仅取决于其架构，还取决于用于高效检索匹配项、填充查询以及维护缓存质量随时间变化的智能策略。这三个相互关联的政策，即检索、填充和清除，构成了任何语义缓存系统的运营核心，决定了其覆盖范围和精确度。
- en: In the code lab, we will primarily address the retrieval step. Then, after the
    code lab, we will talk more about how to populate and evict from your semantic
    cache. Let’s start with the retrieval-oriented code lab.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码实验室中，我们将主要解决检索步骤。然后，在代码实验室之后，我们将更多地讨论如何填充和清除你的语义缓存。让我们从以检索为导向的代码实验室开始。
- en: Code lab 15.1 – using semantic cache for retrieval
  id: totrans-79
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室 15.1 - 使用语义缓存进行检索
- en: In this code lab, we’ll implement a semantic cache with vector search that intelligently
    catches similar queries even when phrased differently. We’ll start with a basic
    ChromaDB-backed cache using sentence transformers, then progressively enhance
    it with entity masking to generalize across specific values (such as dates or
    tickers), cross-encoder verification to reduce false positives, adaptive thresholds
    for different match types, and auto-population that learns from cache misses.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个代码实验室中，我们将实现一个语义缓存，它使用向量搜索智能地捕捉到即使表述不同也相似的查询。我们将从一个基于ChromaDB的缓存开始，使用sentence
    transformers，然后通过实体掩码来泛化特定值（如日期或股票代码），使用交叉编码器验证来减少误报，为不同匹配类型设置自适应阈值，以及从缓存缺失中学习的自动填充。
- en: By the end, you’ll have a production-ready semantic cache that can recognize
    when queries such as “What’s Apple’s stock price?” and “Tell me the current AAPL
    share value” are asking the same thing, allowing you to return the cached result
    instantly instead of making another expensive call to your LLM or agent. This
    means if your agent takes five seconds and costs $0.10 to answer the first query,
    the second query returns in milliseconds at virtually no cost, even though the
    user used completely different words.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你将拥有一个生产就绪的语义缓存，它可以识别当查询如“苹果的股价是多少？”和“告诉我当前的AAPL股票价值”询问的是同一件事时，允许你立即返回缓存结果，而不是再次调用你的LLM或代理。这意味着如果你的代理需要五秒钟并花费0.10美元来回答第一个查询，第二个查询将以毫秒级返回，几乎不花费任何成本，尽管用户使用了完全不同的词语。
- en: Let’s get started!
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Step 1 – installing dependencies
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步 - 安装依赖项
- en: 'Let’s install the two key libraries we’ll need for semantic caching:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们安装我们需要的两个关键库，用于语义缓存：
- en: '[PRE0]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: ChromaDB provides a vector database for storing and searching embeddings efficiently,
    while `sentence-transformers` gives us pre-trained models to convert text into
    meaningful semantic vectors. These two libraries form the foundation of our semantic
    cache. ChromaDB handles the storage and retrieval of vector embeddings, and `sentence-transformers`
    ensures that similar queries (such as “What’s my balance?” and “Show account balance”)
    produce similar vectors even with different wording. As we’ve shown in previous
    chapters, we have a lot of options for how to generate our embeddings. We are
    using `sentence-transformers` to keep it simple.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: ChromaDB提供了一个向量数据库，用于高效地存储和搜索嵌入，而`sentence-transformers`则为我们提供了将文本转换为有意义的语义向量的预训练模型。这两个库构成了我们语义缓存的基础。ChromaDB负责存储和检索向量嵌入，而`sentence-transformers`确保即使措辞不同，相似的查询（如“我的余额是多少？”和“显示账户余额”）也能产生相似的向量。正如我们在前面的章节中所展示的，我们有多种方法可以生成我们的嵌入。我们正在使用`sentence-transformers`来简化这个过程。
- en: With our dependencies installed, let’s set up the basic infrastructure for our
    cache.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装了依赖项之后，让我们设置缓存的基本基础设施。
- en: Step 2 – setting up
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步 - 设置
- en: 'Now we’ll import our libraries and create a single shared ChromaDB collection
    that every step in the notebook will reuse:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将导入我们的库并创建一个单独的共享ChromaDB集合，笔记本中的每个步骤都将重用它：
- en: '[PRE1]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Here’s what’s happening in the preceding code block:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码块中发生的事情如下：
- en: '`uuid` is imported so we can generate unique IDs for cache entries instead
    of manually incrementing counters.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入`uuid`，这样我们就可以为缓存条目生成唯一的ID，而不是手动递增计数器。
- en: We define `COLLECTION_NAME` once (`"semantic_cache"`) and create one global
    client and collection that all later cache classes will reuse.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们只定义一次`COLLECTION_NAME`（`"semantic_cache"`）并创建一个全局客户端和集合，所有后续的缓存类都将重用它。
- en: On rerun, the code first tries to delete the collection so we start fresh, which
    is useful during iterative development. But be careful as this deletes any previous
    caches!
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在重新运行时，代码首先尝试删除集合，这样我们就可以从头开始，这在迭代开发期间很有用。但请注意，这将删除任何以前的缓存！
- en: Then, using `get_or_create_collection`, we ensure the collection exists in a
    safe, idempotent way, no accidental duplicate creation or errors if it already
    exists.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，使用`get_or_create_collection`，我们确保集合以安全、幂等的方式存在，避免意外重复创建或如果它已经存在时出错。
- en: The `_new_id()` helper function gives each cache entry a unique, collision-free
    identifier.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`_new_id()`辅助函数为每个缓存条目提供一个唯一、无冲突的标识符。'
- en: This way, each subsequent step (masked cache, verified cache, adaptive cache,
    etc.) builds on the same underlying collection, rather than trying to create and
    delete new ones.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，每个后续步骤（掩码缓存、验证缓存、自适应缓存等）都是基于相同的底层集合构建的，而不是尝试创建和删除新的集合。
- en: Let’s now build our first semantic cache class that can store and retrieve similar
    queries.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将构建我们的第一个语义缓存类，它可以存储和检索相似的查询。
- en: Step 3 – basic semantic cache
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步 - 基本语义缓存
- en: 'Let’s build our foundation with a simple semantic cache that uses embeddings
    to find similar queries. This cache will convert text into vectors using a lightweight
    model (`all-MiniLM-L6-v2`), store them in ChromaDB with cosine similarity search,
    and retrieve cached responses when similar queries are detected. This cache response
    has a solution path associated with it, which is used when there is a match. The
    magic happens because semantically similar text produces similar vectors, even
    with different wording:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个简单的语义缓存来构建我们的基础，这个缓存使用嵌入来查找相似的查询。这个缓存将使用轻量级模型（`all-MiniLM-L6-v2`）将文本转换为向量，并将它们存储在ChromaDB中，使用余弦相似度搜索，并在检测到相似查询时检索缓存响应。这个缓存响应与其关联的解决方案路径相关联，当有匹配时使用。魔法之所以发生，是因为语义相似的文本会产生相似的向量，即使措辞不同：
- en: '[PRE2]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This code creates a semantic cache that stores query-solution path pairs and
    retrieves them based on semantic similarity using the following steps:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码创建了一个语义缓存，它存储查询-解决方案路径对，并根据语义相似性检索它们，步骤如下：
- en: '**Initialization**: The cache uses `SentenceTransformer` to convert text into
    embeddings and stores them in the ChromaDB collection we created earlier.'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初始化**：缓存使用`SentenceTransformer`将文本转换为嵌入并将它们存储在我们之前创建的ChromaDB集合中。'
- en: '**Adding entries**: The `add` method encodes queries into vectors and stores
    them with their corresponding solution paths (such as `lookup_fact()` or `get_help_article()`)
    rather than direct answers.'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**添加条目**：`add`方法将查询编码为向量，并将它们与其相应的解决方案路径（如`lookup_fact()`或`get_help_article()`）一起存储，而不是直接存储答案。'
- en: '**Searching**: The `search` method finds the most similar cached query and
    returns its solution path only if the similarity score exceeds the threshold (default
    0.75).'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**搜索**：`search` 方法找到最相似的缓存查询，并且只有当相似度分数超过阈值（默认为 0.75）时才返回其解决方案路径。'
- en: 'Here is the code to run tests and see how this works:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是运行测试并查看其工作方式的代码：
- en: '[PRE3]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The output should look like this:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应该看起来像这样：
- en: '[PRE4]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: For each test query, we calculate the similarity score to show why matches succeed
    or fail, helping you understand and tune the threshold. Notice how the cache successfully
    matches queries with different phrasings but the same intent. For example, “What’s
    the capital of France?” (0.99 score) nearly perfectly matches our cached “What
    is the capital of France?” query, while “Password reset instructions” (0.80 score)
    successfully matches “How do I reset my password?” because their embeddings are
    close in vector space. The queries that fail (“When are you open?” at 0.51 and
    “What’s the weather today?” at 0.27) fall below our 0.75 threshold, preventing
    false positives. The threshold of 0.75 provides a good balance between catching
    related queries and avoiding incorrect matches.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个测试查询，我们计算相似度分数以显示匹配成功或失败的原因，帮助你理解和调整阈值。注意缓存如何成功匹配不同措辞但意图相同的查询。例如，“法国的首都是什么？”（0.99
    分）几乎完美匹配我们缓存的“法国的首都是什么？”查询，而“密码重置说明”（0.80 分）成功匹配“我如何重置我的密码？”因为它们的嵌入在向量空间中非常接近。失败的查询（“何时开门？”得分为
    0.51，“今天天气如何？”得分为 0.27）都低于我们的 0.75 阈值，防止了误报。0.75 的阈值在捕捉相关查询和避免错误匹配之间提供了良好的平衡。
- en: This basic implementation already saves us from redundant API calls for semantically
    similar questions. However, it still struggles with queries that contain different
    specific values (such as different years, tickers, or amounts). We don’t want
    to treat each of those as separate cache entries, so in the next step, we’ll introduce
    entity masking to generalize them.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这个基本实现已经使我们免于对语义相似的问题进行冗余的 API 调用。然而，它仍然难以处理包含不同特定值（如不同的年份、股票代码或金额）的查询。我们不希望将它们视为单独的缓存条目，因此在下一步中，我们将引入实体掩码以泛化它们。
- en: Step 4 – entity masking for better generalization
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 4 步 - 实体掩码以实现更好的泛化
- en: Now we’ll tackle a common limitation of the basic semantic cache, which relate
    to queries that are semantically identical except for specific values, such as
    years, stock tickers, dollar amounts, or percentages. For example, “What was AAPL
    stock price in 2023?” and “What was TSLA stock price in 2024?” should route to
    the same tool; the only difference is which ticker and year get passed along.
    Without normalization, these would generate separate embeddings and fragment the
    cache.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将解决基本语义缓存的一个常见限制，这涉及到语义上相同但特定值（如年份、股票代码、美元金额或百分比）不同的查询。例如，“2023 年 AAPL
    的股票价格是多少？”和“2024 年 TSLA 的股票价格是多少？”应该路由到同一个工具；唯一的区别是传递了哪个股票代码和年份。如果没有归一化，这些将生成不同的嵌入并使缓存碎片化。
- en: Entity masking fixes this by replacing variable values with generic placeholders
    before embedding. For instance, AAPL and TSLA both become `[TICKER]`, while 2023
    and 2024 both become `[YEAR]`. This way, all variations collapse into the same
    masked query, “What was `[TICKER]` stock price in `[YEAR]`?”, and map to a single
    cached solution path.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 实体掩码通过在嵌入之前用通用占位符替换变量值来解决这个问题。例如，AAPL 和 TSLA 都变成 `[TICKER]`，而 2023 和 2024 都变成
    `[YEAR]`。这样，所有变体都折叠成相同的掩码查询，“What was `[TICKER]` stock price in `[YEAR]`?”，并映射到单个缓存的解决方案路径。
- en: 'Here’s the updated implementation:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是更新后的实现：
- en: '[PRE5]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Testing it shows how variations now resolve to the same cached entry:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 测试它显示了现在变体如何解析到相同的缓存条目：
- en: '[PRE6]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'The output should look like the following:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应该看起来像以下这样：
- en: '[PRE7]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'When you call `cache.add("What was AAPL stock price in 2023?", ...)`, `mask_entities`
    turns it into “What was `[TICKER]` stock price in `[YEAR]`?”, embeds the masked
    text, and stores it in Chroma with metadata that keeps both the original and masked
    forms. Later, `cache.search("What was TSLA stock price in 2024?")` masks the query
    to the same “What was `[TICKER]` stock price in `[YEAR]`?”, embeds it, and runs
    a vector search. Because the masked forms are identical, the nearest neighbor
    has a high similarity score (≥ 0.75), so the cache returns that entry’s metadata
    and response. The print block then shows `Original: from the stored original_query
    ("What was AAPL stock price in 2023?")`, `Masked: from masked_query ("What was
    [TICKER] stock price in [YEAR]?")`, and the cached `Response: ("Use stock_price_tool")`.
    The `"My budget is $5000"` entry is unrelated and doesn’t affect this match.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '当您调用 `cache.add("What was AAPL stock price in 2023?", ...)`, `mask_entities`
    将其转换为“[TICKER] 股票在 [YEAR] 年的价格是多少？”，嵌入掩码后的文本，并将其存储在 Chroma 中，其中包含保留原始和掩码形式的元数据。稍后，`cache.search("What
    was TSLA stock price in 2024?")` 将查询掩码为相同的“[TICKER] 股票在 [YEAR] 年的价格是多少？”，嵌入它，并运行向量搜索。由于掩码形式相同，最近邻具有很高的相似度得分（≥
    0.75），因此缓存返回该条目的元数据和响应。打印块随后显示 `Original: from the stored original_query ("What
    was AAPL stock price in 2023?")`, `Masked: from masked_query ("What was [TICKER]
    stock price in [YEAR]?")`, 和缓存的 `Response: ("Use stock_price_tool")`。 `"My budget
    is $5000"` 条目与此无关，不会影响此匹配。'
- en: With this approach, one cache entry can cover hundreds of variations, dramatically
    improving hit rates while reducing redundant calls. The regex patterns cover common
    entities out of the box, and you can expand them for your domain.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种方法，一个缓存条目可以覆盖数百种变体，显著提高命中率，同时减少冗余调用。正则表达式模式默认覆盖常见实体，并且您可以扩展它们以适应您的领域。
- en: While entity masking improves generalization, it also increases the risk of
    false positives, queries that look similar once masked but don’t actually share
    the same intent. To mitigate this, the next step adds a cross-encoder verification
    layer to confirm semantic matches before returning cached results.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然实体掩码可以提高泛化能力，但它也增加了假阳性的风险，即经过掩码后看起来相似但实际上并不具有相同意图的查询。为了减轻这一风险，下一步添加了一个交叉编码器验证层，在返回缓存结果之前确认语义匹配。
- en: Step 5 – cross-encoder verification
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 5 步 – 交叉编码器验证
- en: 'Up until now, our semantic cache has been good at recall, that is, catching
    queries that look different but mean the same thing. However, this comes at a
    cost: sometimes two queries may be close in vector space but do not actually have
    the same intent. For example, “What’s my balance?” and “What’s my account number?”
    could be considered “similar” by embeddings, but clearly require different responses.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们的语义缓存在召回率方面做得很好，也就是说，能够捕捉到看起来不同但实际上意思相同的查询。然而，这也有代价：有时两个查询在向量空间中可能很接近，但实际上并不具有相同的意图。例如，“我的余额是多少？”和“我的账户号码是多少？”可能被嵌入视为“相似”，但显然需要不同的响应。
- en: This is where cross-encoder verification comes in. Unlike sentence embeddings
    (which independently encode each query), a cross-encoder takes both the candidate
    query and the cached query together and scores their similarity. It essentially
    re-reads the pair as if answering “Are these two queries asking the same thing?”
    This allows us to dramatically cut down false positives by applying a second,
    stricter filter after the vector search has narrowed down candidates.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '这就是交叉编码器验证发挥作用的地方。与独立编码每个查询的句子嵌入不同，交叉编码器同时考虑候选查询和缓存查询，并评估它们的相似度。它本质上重新阅读这对查询，就像回答“这两个查询是在询问同一件事吗？”一样。这允许我们在向量搜索缩小候选者之后，通过应用第二个更严格的过滤器来显著减少假阳性。 '
- en: 'The two-stage process looks like this:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 双阶段过程如下所示：
- en: '**Fast retrieval (stage 1)**: Use the embedding-based vector search to quickly
    find the top-k similar queries.'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**快速检索（阶段 1）**：使用基于嵌入的向量搜索快速找到最相似的 top-k 查询。'
- en: '**Careful verification (stage 2)**: Pass each candidate through a cross-encoder
    to re-rank them based on intent-level similarity and only keep matches above a
    higher confidence threshold.'
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**仔细验证（阶段 2）**：将每个候选查询通过交叉编码器进行重排序，根据意图级别的相似性进行排序，并仅保留高于更高置信度阈值的匹配项。'
- en: 'By combining these methods, we get the best of both worlds: speed from embeddings
    and precision from cross-encoders. This ensures our cache doesn’t just retrieve
    similar-looking queries but truly equivalent-intent ones. Here is one example
    of how to do this in code:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合这些方法，我们得到了两者的最佳结合：从嵌入中获取速度，从交叉编码器中获取精度。这确保我们的缓存不仅检索到外观相似的查询，而且真正具有相同意图的查询。以下是如何在代码中实现这一点的示例：
- en: '[PRE8]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Here’s what happens in the preceding code block:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码块中发生了什么：
- en: '**Class**: `CrossEncoderSemanticCache` extends the masked cache with a cross-encoder
    verifier.'
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**类**：`CrossEncoderSemanticCache`类扩展了带掩码的缓存，并添加了交叉编码验证器。'
- en: '**Init**: The initialization method loads `CrossEncoder(''ms-marco-MiniLM-L-6-v2'')`
    to score query-candidate pairs.'
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初始化**：初始化方法加载`CrossEncoder(''ms-marco-MiniLM-L-6-v2'')`以评分查询-候选对。'
- en: '**Stage 1**: Vector search quickly finds the top three candidates.'
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**阶段1**：向量搜索快速找到前三个候选。'
- en: '**Stage 2**: The cross-encoder re-scores them for intent-level similarity.'
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**阶段2**：交叉编码器重新评分以实现意图级别的相似度。'
- en: '**Result**: The best match is returned only if both vector and verify thresholds
    are met.'
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结果**：只有当向量验证阈值都满足时，才返回最佳匹配。'
- en: 'Let’s add some code to test this class:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们添加一些代码来测试这个类：
- en: '[PRE9]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'The output should look like this:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应该看起来像这样：
- en: '[PRE10]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Here, the vector scores (0–1) show semantic closeness from embeddings, while
    the verify scores (raw numbers such as 4.01, 5.62, and 6.35) come from the cross-encoder
    judging intent similarity. We set the cutoff to 3.5: anything below that is rejected
    as too weak, while anything above it is considered a strong match. This way, both
    stages work together, vectors for recall and the cross-encoder for precision,
    without mixing scales.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，向量分数（0-1）显示了从嵌入中得到的语义接近度，而验证分数（如4.01、5.62和6.35等原始数字）来自交叉编码器判断意图相似度。我们将截止值设置为3.5：低于这个值被视为太弱而被拒绝，而高于这个值则被视为强匹配。这样，两个阶段就一起工作，向量用于召回，交叉编码器用于精确度，而不混合尺度。
- en: With verification in place, we’ve reduced the chances of pulling the wrong response.
    But depending on the model and the type of query, we may still need to tune how
    strict we are when calling something a “match.” That’s where adaptive thresholds
    come in.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 由于有了验证，我们减少了拉取错误响应的机会。但根据模型和查询类型，我们可能仍然需要调整当我们称某物为“匹配”时的严格程度。这就是自适应阈值的作用所在。
- en: Step 6 – adaptive thresholds
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6步 - 自适应阈值
- en: Here, we’re addressing the fact that not all scenarios demand the same strictness.
    For mission-critical queries (such as financial transactions), we want a high
    threshold as it is better to miss a match than return the wrong one. For exploratory
    or “fuzzy” searches, we can lower the bar and allow more lenient matches.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们正在处理这样一个事实：并非所有场景都需要相同的严格性。对于关键任务查询（例如金融交易），我们希望有一个高阈值，因为错过匹配总比返回错误的好。对于探索性或“模糊”搜索，我们可以降低标准，允许更宽松的匹配。
- en: 'The adaptive threshold system lets us dynamically adjust match criteria depending
    on the model, query type, or user preference. This prevents us from using a one-size-fits-all
    threshold that might be too strict in some cases and too loose in others. One
    way to do this in code is as follows:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应阈值系统使我们能够根据模型、查询类型或用户偏好动态调整匹配标准。这防止我们使用一个适用于所有情况的阈值，在某些情况下可能过于严格，而在其他情况下又过于宽松。在代码中实现这一点的办法如下：
- en: '[PRE11]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Here’s what the preceding code does:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码块展示了前述代码的功能：
- en: '**Class**: The AdaptiveSemanticCache class extends `CrossEncoderSemanticCache`
    with model-specific base thresholds.'
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**类**：`AdaptiveSemanticCache`类扩展了`CrossEncoderSemanticCache`，并添加了针对特定模型的基阈值。'
- en: '**Thresholds**: The `get_threshold()` method adjusts the vector cutoff to be
    stricter for exact match types and looser for fuzzy/exploratory match types. Fuzzy
    and exploratory matches use lower similarity thresholds to allow more lenient
    matching, which is useful for broader searches where finding related content is
    more important than ensuring a precise match.'
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**阈值**：`get_threshold()`方法调整向量截止值，对于精确匹配类型更严格，对于模糊/探索性匹配类型更宽松。模糊和探索性匹配使用较低的相似度阈值以允许更宽松的匹配，这在更广泛的搜索中很有用，在这种情况下，找到相关内容比确保精确匹配更重要。'
- en: '**Adaptive search**: The adaptive_search method uses both the adjusted vector
    threshold and a raised verify cutoff (3.5 on a raw scale).'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自适应搜索**：`adaptive_search`方法使用调整后的向量阈值和提升的验证截止值（在原始尺度上的3.5）。'
- en: '**Result**: The same query can be tested under different strictness levels
    to balance recall versus precision.'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结果**：可以在不同的严格程度下测试相同的查询，以平衡召回与精确度。'
- en: 'We can test this code as follows:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以按以下方式测试此代码：
- en: '[PRE12]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The output should look like this:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应该看起来像这样：
- en: '[PRE13]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Here, we see adaptive thresholds in action. The first query, “yearly revenue,”
    is semantically very close to our cached “What is the annual revenue?”, so it
    passes all three strictness levels. The second query, “customer demographic,”
    is similar enough to “Show me customer demographics” to pass the `NORMAL` and
    `FUZZY` modes, but falls short of the high bar set by the `EXACT` mode (0.90 threshold).
    This demonstrates how you can implement graduated matching: start with strict
    `EXACT` matching for high-confidence scenarios, then fall back to `NORMAL` or
    `FUZZY` mode when you need broader coverage. This approach ensures appropriate
    response strategies match confidence levels while preventing over-reliance on
    expensive LLM generation when a good-enough match exists.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们看到自适应阈值的实际应用。第一个查询“年度收入”在语义上非常接近我们缓存的“年度收入是多少？”，因此通过了所有三个严格性级别。第二个查询“客户人口统计”与“显示客户人口统计”足够相似，可以通過
    `NORMAL` 和 `FUZZY` 模式，但不足以达到 `EXACT` 模式（0.90 阈值）设定的高标准。这展示了您如何实现逐级匹配：从高置信度场景的严格
    `EXACT` 匹配开始，然后在需要更广泛覆盖时回退到 `NORMAL` 或 `FUZZY` 模式。这种方法确保适当的响应策略与置信水平相匹配，同时防止在存在足够好的匹配时过度依赖昂贵的LLM生成。
- en: This is a key step in building resilient response hierarchies with graduated
    similarity thresholds at each level. This approach ensures appropriate response
    strategies match confidence levels while preventing over-reliance on expensive
    LLM generation.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在构建具有逐级相似度阈值的弹性响应层次结构中的关键步骤。这种方法确保适当的响应策略与置信水平相匹配，同时防止过度依赖昂贵的LLM生成。
- en: So far, our cache retrieves smarter and filters better. But what happens when
    a query is completely new and not yet in the cache? We don’t want to stop there;
    we want the cache to learn automatically from its misses. That’s the motivation
    for auto-population with fallback.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们的缓存检索更智能，过滤效果更好。但当查询完全新颖且尚未在缓存中时会发生什么？我们不希望就此止步；我们希望缓存能够自动从其未命中中学习。这就是自动填充和回退的动机。
- en: Step 7 – auto-population with fallback
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7步 - 自动填充和回退
- en: Caching is only powerful if it grows with experience. Instead of relying on
    manual population, we can hook the cache up to a fallback mechanism, such as calling
    an agent, an LLM, or a custom function, whenever there’s a cache miss. The result
    of that fallback call is then immediately added back into the cache, so the next
    time a similar query comes in, it’s served instantly.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 缓存只有在经验增长时才强大。我们不必依赖手动填充，而可以将缓存连接到回退机制，例如在发生缓存未命中时调用代理、LLM 或自定义函数。然后，将回退调用的结果立即添加回缓存，以便下次类似查询进来时可以立即提供服务。
- en: 'This makes the cache self-learning: every miss today becomes a hit tomorrow.
    Over time, the hit rate improves dramatically, saving even more calls to expensive
    backends. The stats tracker we added helps you see this evolution in real time,
    showing hits, misses, and auto-added entries.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得缓存能够自我学习：今天的每个未命中都将成为明天的命中。随着时间的推移，命中率显著提高，甚至可以节省更多对昂贵的后端调用。我们添加的统计跟踪器可以帮助您实时查看这种演变，显示命中、未命中和自动添加的条目。
- en: '[PRE14]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Briefly, here’s what the preceding code does:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，以下代码做了什么：
- en: '**Class**: `SmartSemanticCache` extends `AdaptiveSemanticCache` and tracks
    `hits`, `misses`, and `auto_added`.'
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**类**：`SmartSemanticCache` 扩展了 `AdaptiveSemanticCache` 并跟踪 `hits`、`misses`
    和 `auto_added`。'
- en: '**Query path**: Try cache via `adaptive_search(..., match_type=''normal'')`;
    on `miss`, call `fallback_fn`, then auto-add the new `query→response`.'
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**查询路径**：通过 `adaptive_search(..., match_type=''normal'')` 尝试缓存；在 `miss` 时调用
    `fallback_fn`，然后自动添加新的 `query→response`。'
- en: '**Stats**: `print_stats()` shows the hit rate and counts so you can see improvement
    over time.'
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**统计**：`print_stats()` 显示命中率及计数，以便您可以看到随时间的变化。'
- en: 'Note: Verification still uses the raw cross-encoder cutoff you set earlier
    (e.g., 3.5) through the inherited `adaptive_search`.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：验证仍然使用您之前设置的原始交叉编码截止值（例如，3.5）通过继承的 `adaptive_search`。
- en: 'You can test this code and see how it works with this:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过以下方式测试此代码并查看其工作原理：
- en: '[PRE15]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Here’s the expected output:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE16]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Let’s trace through what happens on this first run:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们追踪第一次运行时发生了什么：
- en: '**“What is my account balance?”**: Cache hit! This matches “What is my checking
    account balance?”, which we added back in step 5, returning `"checking_balance_tool"`.'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“我的账户余额是多少？”**：缓存命中！这与我们在第5步添加的“我的支票账户余额？”相匹配，返回 `"checking_balance_tool"`。'
- en: '**“Show me my account balance”**: This is a cache miss because the phrasing
    is notge close enough to existing entries. The system calls `mock_agent`, receives
    `"balance_tool"`, and auto-adds the entry to the cache.'
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“显示我的账户余额”**：这是一个缓存未命中，因为措辞与现有条目不够接近。系统调用`mock_agent`，接收`"balance_tool"`，并将条目自动添加到缓存中。'
- en: '**“Account balance please”**: Cache hit! This now matches the entry we just
    added in step 2.'
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“请显示我的账户余额”**：缓存命中！这现在与我们在步骤2中添加的条目相匹配。'
- en: '**“Recent transactions”**: This is a cache miss because it introduces a new
    topic. The system calls `mock_agent`, receives `"transaction_tool"`, and auto-adds
    the entry to the cache.'
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“最近的交易”**：这是一个缓存未命中，因为它引入了一个新主题。系统调用`mock_agent`，接收`"transaction_tool"`，并将条目自动添加到缓存中。'
- en: '**“Show my transactions”**: This is a cache miss because the query is not similar
    enough to existing entries yet. The system calls `mock_agent`, receives `"transaction_tool"`,
    and auto-adds the entry to the cache.'
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“显示我的交易”**：这是一个缓存未命中，因为查询与现有条目不够相似。系统调用`mock_agent`，接收`"transaction_tool"`，并将条目自动添加到缓存中。'
- en: Notice how the cache already contains entries from our previous steps (such
    as the checking account balance query), which is why the first query hits. The
    cache is building on what we’ve learned before while continuing to illustrate
    new patterns.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 注意缓存已经包含了我们之前步骤中的条目（例如，检查账户余额查询），这就是为什么第一个查询命中的原因。缓存正在构建我们之前学到的内容，同时继续展示新的模式。
- en: 'But 40.0%? That isn’t a great hit, is it? Run the cell again. You should see
    this:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 但40.0%？这并不是一个很好的命中率，对吧？再次运行单元格。你应该看到这个：
- en: '[PRE17]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'The cache learned! On the first run, the cache had no entries, so most queries
    were missed and had to be computed by the fallback agent. Each of those results
    was then auto-added to the cache. When you run the cell again, the same queries
    now find strong matches immediately, so every request is served from cache instead
    of calling the fallback. The hit rate jumps from 40% to 100%, showing how the
    system continuously improves: every miss enriches the cache, and repeated queries
    are instantly answered in future runs. This is the self-learning loop in action.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 缓存已学习！在第一次运行时，缓存中没有条目，所以大多数查询都未命中，不得不由后备代理进行计算。然后，这些结果会自动添加到缓存中。当你再次运行单元格时，相同的查询现在可以立即找到强匹配，因此每个请求都由缓存提供服务，而不是调用后备。命中率从40%跃升至100%，展示了系统如何持续改进：每次未命中都会丰富缓存，并且在未来的运行中，重复查询可以立即得到回答。这就是自我学习循环在发挥作用。
- en: At this point, we’ve built a cache that doesn’t just store and recall. In fact,
    it verifies, adapts, and learns continuously. In the next section, let’s recap
    the key features of semantic caches and why they matter.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经构建了一个不仅存储和回忆的缓存。实际上，它验证、适应并持续学习。在下一节中，让我们回顾语义缓存的关键特性以及为什么它们很重要。
- en: Putting it all together
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将所有内容综合起来
- en: 'This semantic cache provides the following:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 这个语义缓存提供了以下功能：
- en: '**Vector similarity search**: Finds semantically similar queries even with
    different wording'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量相似度搜索**：即使措辞不同，也能找到语义上相似的查询'
- en: '**Entity masking**: Generalizes queries by replacing specific values with placeholders'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实体掩码**：通过用占位符替换特定值来泛化查询'
- en: '**Cross-encoder verification**: Reduces false positives with a second verification
    step'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交叉编码验证**：通过第二个验证步骤减少误报'
- en: '**Adaptive thresholds**: Adjusts matching strictness based on use case'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自适应阈值**：根据用例调整匹配的严格程度'
- en: '**Auto-population**: Learns from cache misses to improve over time'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动填充**：从缓存未命中中学习，以随着时间的推移改进'
- en: The cache dramatically reduces calls to expensive LLMs or agents by recognizing
    when users ask essentially the same question in different ways. Start with the
    basic semantic cache and add features as needed for your use case.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 缓存通过识别用户以不同方式提出本质上相同的问题，显著减少了调用昂贵的LLM或代理的次数。从基本的语义缓存开始，根据您的用例需求添加功能。
- en: Population – query expansion strategies
  id: totrans-192
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人口 - 查询扩展策略
- en: 'Now that we’ve explored how semantic caches retrieve matches, let’s return
    to the second of our three core policies: population. While retrieval determines
    how well we match incoming queries to cached entries, population strategies determine
    what queries enter the cache in the first place, and more critically, how we expand
    that initial set to achieve comprehensive coverage.'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了语义缓存如何检索匹配项，让我们回到我们三个核心策略中的第二个：人口。虽然检索决定了我们如何将传入的查询与缓存条目相匹配，但人口策略决定了哪些查询首先进入缓存，更重要的是，我们如何扩展这个初始集以实现全面覆盖。
- en: To achieve high cache coverage, semantic caches must anticipate the myriad ways
    users express the same underlying need. Query expansion transforms a limited set
    of cached queries into a comprehensive semantic net that can catch most variations
    users might produce. In the upcoming sections, we discuss some of the more popular
    techniques for expanding your semantic cache. But watch out! Check out the following
    pro tip and make sure you take the proper precautions when expanding your semantic
    cache.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现高缓存覆盖率，语义缓存必须预测用户表达相同基本需求的各种方式。查询扩展将有限的缓存查询集转换成一个全面的语义网，可以捕捉到用户可能产生的多数变化。在接下来的章节中，我们将讨论一些用于扩展您的语义缓存的一些更流行的技术。但要注意！查看以下专业提示，并确保在扩展您的语义缓存时采取适当的预防措施。
- en: '**Pro tip!**'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: '**专业提示！**'
- en: For all of these techniques, be sure to check your new queries against existing
    queries in the semantic cache (by running the same vector search you would run
    for the semantic cache matches). If the query matches above the threshold for
    an existing query, and (importantly) both queries have the same solution path,
    then you do not need to add that particular query to the semantic cache, as it
    is already well semantically represented. It is important to understand that adding
    a query to the semantic cache could cause issues with your queries eventually,
    conflicting with queries that have other solution paths, significantly undermining
    the effectiveness of your semantic cache. If the solution paths are different,
    though, then you definitely do want to include the query, or your users will end
    up matching to the wrong solution through that query.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有这些技术，请确保将您的新查询与语义缓存中现有的查询进行核对（通过运行您为语义缓存匹配运行的同向量搜索）。如果查询匹配到现有查询的阈值以上，并且（重要的是）两个查询具有相同的解决方案路径，那么您不需要将该特定查询添加到语义缓存中，因为它已经很好地在语义上得到了表示。重要的是要理解，将查询添加到语义缓存可能会最终导致您的问题，与具有其他解决方案路径的查询发生冲突，严重削弱您语义缓存的有效性。如果解决方案路径不同，那么您确实希望包括该查询，否则您的用户最终将通过该查询匹配到错误的结果。
- en: LLM-based paraphrasing
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于LLM的释义
- en: Modern semantic caches leverage LLMs to generate natural paraphrases of queries.
    This approach produces diverse rewordings while preserving the original intent.
    For a financial query such as “How do I invest in bonds?”, an LLM might generate
    variations such as “What’s the process for purchasing bonds?”, “How can I buy
    bonds?”, and “What steps are involved in bond investment?” Each paraphrase maintains
    the core intent while varying the linguistic expression.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 现代语义缓存利用LLM生成查询的自然释义。这种方法产生多样化的改写，同时保留原始意图。例如，对于“我如何投资债券？”这样的金融查询，LLM可能会生成诸如“购买债券的过程是什么？”、“我如何购买债券？”和“债券投资涉及哪些步骤？”等变体。每个释义都保持了核心意图，同时变化了语言表达。
- en: Back-translation for natural variation
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自然变化的反向翻译
- en: 'Back-translation remains one of the most effective techniques for generating
    semantically equivalent queries with natural linguistic variation. By translating
    a query through one or more intermediate languages and back to the source language,
    the system produces paraphrases that maintain meaning while varying structure:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 反向翻译仍然是生成具有自然语言变化的语义等效查询的最有效技术之一。通过将查询通过一种或多种中间语言翻译，然后再翻译回源语言，系统产生保持意义同时变化结构的释义：
- en: '**English** **→** **German** **→** **English**: Produces structural variations
    due to German’s different word order'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**英语** **→** **德语** **→** **英语**：由于德语的不同词序产生结构变化'
- en: '**English** **→** **Japanese** **→** **English**: Generates high semantic diversity
    due to fundamental linguistic differences'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**英语** **→** **日语** **→** **英语**：由于根本的语言差异产生高语义多样性'
- en: '**English** **→** **French** **→** **Russian** **→** **English**: Compound
    transformations that yield significant rephrasing'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**英语** **→** **法语** **→** **俄语** **→** **英语**：产生显著的重新措辞的复合变换'
- en: Different language families contribute unique transformation patterns. For example,
    romance languages (Spanish, French, and Italian) excel at stylistic variation,
    while Sino-Tibetan languages introduce high paraphrase diversity. The key is selecting
    language pairs that maximize useful variation while maintaining semantic fidelity.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的语言家族贡献了独特的变换模式。例如，罗曼语族（西班牙语、法语和意大利语）在风格变化方面表现出色，而汉藏语族引入了高释义多样性。关键是选择最大化有用变化同时保持语义一致性的语言对。
- en: Synonym and lexical expansion
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 同义词和词汇扩展
- en: 'At the word level, semantic caches expand coverage through systematic synonym
    replacement and abbreviation handling. This is particularly crucial in specialized
    domains such as finance, where technical terms, acronyms, and colloquialisms abound:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在单词层面，语义缓存通过系统性的同义词替换和缩写处理来扩展覆盖范围。这在像金融这样的专业领域尤为重要，那里有大量的技术术语、缩写和俚语：
- en: “401(k) contribution” ![](img/Icon13.png) “retirement plan contribution”
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “401(k)供款” ![](img/Icon13.png) “退休计划供款”
- en: “EPS” ![](img/Icon13.png) “earnings per share”
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “EPS” ![](img/Icon13.png) “每股收益”
- en: “Treasurys” ![](img/Icon13.png) “US government bonds”
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “国债” ![](img/Icon13.png) “美国国债”
- en: “municipal bonds” ![](img/Icon13.png) “munis”
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “市政债券” ![](img/Icon13.png) “munis”
- en: These lexical expansions prove invaluable when users approach the same concept
    from different angles or expertise levels. For example, a novice investor might
    search for “retirement savings,” while a financial advisor queries “qualified
    plan allocations,” yet both seek similar underlying information. By maintaining
    comprehensive synonym mappings and domain-specific abbreviation dictionaries,
    semantic caches can recognize these equivalent expressions without requiring separate
    processing for each variation. This word-level understanding forms the foundation
    for more sophisticated query matching, but true semantic comprehension requires
    moving beyond simple substitutions to generating entirely new query formulations
    that anticipate user needs.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户从不同的角度或专业知识水平接近相同的概念时，这些词汇扩展证明非常有价值。例如，一个新手投资者可能会搜索“退休储蓄”，而财务顾问可能会查询“合格计划分配”，但两者都寻求类似的基本信息。通过维护全面的同义词映射和特定领域的缩写字典，语义缓存可以识别这些等效的表达，而无需为每个变体进行单独处理。这种单词层面的理解是更复杂查询匹配的基础，但真正的语义理解需要超越简单的替换，生成完全新的查询方案，以预测用户需求。
- en: Synthetic query generation
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工查询生成
- en: Modern semantic caches don’t simply wait for users to provide query variations,
    they proactively generate likely questions before they’re asked. This anticipatory
    approach recognizes that users often struggle to formulate the exact query that
    will retrieve the information they need, especially in technical domains where
    multiple phrasings might express the same intent.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 现代语义缓存不仅仅等待用户提供查询变体，它们在询问之前主动生成可能的问题。这种前瞻性方法认识到用户往往难以准确表达能够检索所需信息的查询，尤其是在技术领域，多个表述可能表达相同的意图。
- en: These systems employ several generation strategies. Document-based generation
    analyzes existing content to derive questions that the material could answer.
    Pattern-based generation identifies query sequences from user behavior; for example,
    when hundreds of users who search for “IRA contribution limits” subsequently ask
    about “catch-up contributions,” the system learns to pre-generate and cache that
    logical follow-up. Some implementations use domain models to generate technically
    relevant variations, understanding that a query about “portfolio rebalancing”
    likely relates to “asset allocation” and “risk adjustment.”
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 这些系统采用几种生成策略。基于文档的生成通过分析现有内容来推导出材料可以回答的问题。基于模式的生成从用户行为中识别查询序列；例如，当数百个搜索“IRA供款限额”的用户随后询问“追赶供款”时，系统学会预先生成和缓存那个逻辑后续问题。一些实现使用领域模型来生成技术相关的变体，理解到关于“投资组合再平衡”的查询很可能与“资产配置”和“风险调整”相关。
- en: 'Morgan Stanley’s evolution from 7,000 fixed queries to handling “effectively
    any question” demonstrates the power of this approach. Their system didn’t just
    memorize more question-answer pairs; it learned to generate thousands of plausible
    financial queries by understanding the relationships between concepts, common
    user needs, and the structure of financial inquiries. However, this systematic
    expansion of query space introduces a critical problem: without domain-specific
    constraints, these systems risk generating plausible-sounding but fundamentally
    incorrect equivalences. The next section examines how specialized domains such
    as finance must carefully restrict which semantic connections their caches are
    allowed to make.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 摩根士丹利从处理7,000个固定查询发展到处理“实际上任何问题”展示了这种方法的威力。他们的系统不仅仅记忆了更多的问答对；它学会了通过理解概念之间的关系、常见用户需求和金融查询的结构来生成数千个可能的金融查询。然而，这种查询空间的系统性扩展引入了一个关键问题：如果没有特定领域的约束，这些系统可能会生成听起来合理但本质上错误的等价物。下一节将探讨像金融这样的专业领域如何必须仔细限制其缓存可以建立的语义连接。
- en: Domain-specific constraints
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 领域特定约束
- en: The flexibility that makes semantic caches powerful also creates risks in specialized
    domains. For example, with financial systems, you must recognize critical distinctions
    that general-purpose models might overlook. While “EBITDA” and “earnings” both
    relate to company profitability, they represent fundamentally different metrics.
    EBITDA excludes interest, taxes, depreciation, and amortization to show operational
    performance, while “earnings” might refer to net income, EPS, or other specific
    measures.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 语义缓存强大的灵活性也在特定领域创造了风险。例如，在金融系统中，你必须认识到通用模型可能忽视的关键区别。虽然“EBITDA”和“收益”都与公司盈利能力相关，但它们代表的是根本不同的指标。EBITDA排除了利息、税收、折旧和摊销，以显示运营绩效，而“收益”可能指的是净收入、每股收益（EPS）或其他特定指标。
- en: 'These constraints require semantic caches to implement domain-aware boundaries.
    The system needs enough intelligence to recognize that “Fed” means “Federal Reserve”
    and “munis” means “municipal bonds,” and it must also maintain strict distinctions
    between terms such as “gross” and “net,” or “realized” and “unrealized” gains.
    Financial semantic caches typically enforce these boundaries through multiple
    mechanisms: automated validation checks that assess whether substitutions preserve
    query intent, hardcoded rules that prevent specific dangerous conflations, and
    expert review processes during training phases.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这些限制要求语义缓存实现领域感知的边界。系统需要足够的智能来识别“Fed”意味着“联邦储备”和“munis”意味着“市政债券”，它还必须保持诸如“毛”和“净”、“实现”和“未实现”收益等术语之间的严格区分。金融语义缓存通常通过多种机制执行这些边界：自动验证检查，评估替换是否保留了查询意图；硬编码的规则，防止特定的危险混淆；以及在训练阶段进行的专家审查流程。
- en: These are examples from the financial industry, which serves as a good example
    because it has many unique “rules” that can be applied. But all domains have similar
    unique aspects that need to be accounted for. Think through your domain and what
    unique rules apply there.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是来自金融行业的例子，它是一个很好的例子，因为它有许多独特的“规则”可以应用。但所有领域都有需要考虑的类似独特方面。思考一下你的领域以及那里适用的独特规则。
- en: 'The challenge lies in finding the right balance. If it is too restrictive,
    the cache misses valid connections; if it is too permissive, it serves incorrect
    or misleading results. As caches accumulate these carefully validated entries
    over time, they face another critical challenge: determining which information
    remains valuable and which has outlived its usefulness. Even the most accurately
    cached financial answer becomes a liability when market conditions change or regulations
    update, making intelligent eviction policies essential for maintaining cache integrity.'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战在于找到正确的平衡点。如果过于严格，缓存会错过有效的连接；如果过于宽松，它将提供不正确或误导性的结果。随着缓存随着时间的推移积累这些经过仔细验证的条目，它们面临另一个关键挑战：确定哪些信息仍然有价值，哪些已经过时。即使是最准确缓存起来的金融答案，当市场条件变化或法规更新时，也可能成为负担，因此，智能淘汰策略对于维护缓存完整性至关重要。
- en: Eviction – keeping a clean cache
  id: totrans-221
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 淘汰 – 保持缓存清洁
- en: 'With our cache now equipped with robust retrieval mechanisms and populated
    through various expansion strategies, we face the third critical policy challenge
    introduced at the beginning of this chapter: eviction. Unlike traditional caches,
    where eviction simply frees up space, semantic cache eviction must balance multiple
    concerns, maintaining coverage of the semantic space, preserving high-value entries,
    removing outdated information, and eliminating redundancies that accumulate through
    aggressive population strategies.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在的缓存已经配备了强大的检索机制，并通过各种扩展策略进行了填充，我们现在面临本章开头提出的第三个关键策略挑战：淘汰。与传统缓存不同，淘汰不仅仅是释放空间，语义缓存淘汰必须平衡多个关注点，包括维护语义空间的覆盖范围、保留高价值条目、移除过时信息以及消除通过积极填充策略积累的冗余。
- en: Maintaining cache quality requires intelligent eviction policies that navigate
    these competing demands. The challenge is particularly acute in semantic caches
    because the relationships between entries are complex and multidimensional. Removing
    one query might leave a gap in semantic coverage that affects dozens of related
    queries. Conversely, keeping everything leads to bloated caches filled with outdated,
    redundant, or poor-performing entries that degrade overall system performance.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 维护缓存质量需要智能的驱逐策略，以应对这些相互竞争的需求。在语义缓存中，这一挑战尤其严峻，因为条目之间的关系复杂且多维。删除一个查询可能会在语义覆盖中留下空白，影响数十个相关查询。相反，保留所有内容会导致缓存膨胀，充满过时、冗余或性能不佳的条目，从而降低整体系统性能。
- en: The eviction strategies that follow represent increasingly sophisticated approaches
    to this challenge, from simple time-based rules to complex semantic analysis that
    identifies and eliminates redundancy while preserving essential coverage. Each
    approach offers different trade-offs between computational complexity, cache quality,
    and coverage maintenance. We will start with time-based eviction.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的驱逐策略代表了应对这一挑战的越来越复杂的方法，从简单的时间规则到复杂的语义分析，后者识别并消除冗余，同时保留基本覆盖范围。每种方法在计算复杂性、缓存质量和覆盖范围维护之间提供了不同的权衡。我们将从基于时间的驱逐开始。
- en: Time-based eviction
  id: totrans-225
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于时间的驱逐
- en: 'The simplest eviction strategy uses **time-to-live** (**TTL**) values, removing
    entries older than a specified duration. However, semantic caches benefit from
    more nuanced temporal handling:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的驱逐策略使用**生存时间**（**TTL**）值，删除超过指定持续时间的条目。然而，语义缓存从更细致的时间处理中受益：
- en: Evergreen content (definitions and procedures) may have no expiration
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 永久内容（如定义和程序）可能没有过期时间
- en: Periodic content (quarterly reports) expires on a known schedule
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期内容（如季度报告）按照已知的日程过期
- en: Dynamic content (market conditions) requires short TTLs or real-time validation
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动态内容（如市场状况）需要短的 TTL 或实时验证
- en: While time-based eviction provides a straightforward baseline, it fails to account
    for actual usage patterns or the semantic value of cached entries. This limitation
    drives the need for more intelligent approaches that consider how entries are
    actually used. The next approach, **least recently used** (**LRU**) with semantic
    decay, addresses this by combining usage statistics with temporal factors and
    semantic drift measurements.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然基于时间的驱逐提供了一个直接的基线，但它未能考虑到实际的用法模式或缓存条目的语义价值。这种限制推动了需要更智能的方法，这些方法考虑了条目的实际使用情况。接下来的方法，**最近最少使用**（**LRU**）结合语义衰减，通过结合使用统计数据与时间因素和语义漂移测量来解决这一问题。
- en: Least recently used with semantic decay
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结合语义衰减的最近最少使用
- en: LRU is a classic cache eviction strategy that removes the entries that haven’t
    been accessed for the longest time, based on the principle that recently used
    items are more likely to be needed again soon. In traditional caching, LRU simply
    tracks when each entry was last accessed and evicts the oldest ones when space
    is needed. However, for semantic caches, we can enhance this approach by adding
    “semantic decay”, which is a measure of how the meaning and relevance of cached
    content degrades over time.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: LRU 是一种经典的缓存驱逐策略，它基于最近使用项很快可能再次被需要的原则，删除最长时间未被访问的条目。在传统缓存中，LRU 简单地跟踪每个条目最后访问的时间，并在需要空间时驱逐最旧的条目。然而，对于语义缓存，我们可以通过添加“语义衰减”来增强这种方法，这是一种衡量缓存内容随时间意义和相关性降低的度量。
- en: 'Traditional LRU eviction can be enhanced with semantic decay factors. Entries
    lose relevance not just through disuse but through semantic drift as language
    and domain knowledge evolve. This is what a function might look like that handles
    these various aspects:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的 LRU 驱逐可以通过添加语义衰减因素来增强。条目的相关性不仅通过不使用而降低，还通过语言和领域知识的发展而发生的语义漂移降低。下面是一个可能处理这些各种方面的函数示例：
- en: '[PRE18]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: This combined scoring recognizes that cache entries exist in a changing semantic
    landscape. Yet even sophisticated scoring may not catch all problems; some entries
    might be frequently accessed but consistently fail to satisfy user needs. Performance-based
    pruning tackles this disconnect by tracking not just how often entries are used
    but how well they actually serve users when retrieved.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 这种综合评分认识到缓存条目存在于不断变化的语义景观中。然而，即使复杂的评分也可能无法捕捉到所有问题；一些条目可能被频繁访问，但始终无法满足用户需求。基于性能的修剪通过跟踪条目被使用的频率以及它们检索时实际如何服务于用户来解决这个问题。
- en: Performance-based pruning
  id: totrans-236
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于性能的修剪
- en: Sophisticated eviction policies track not just usage but effectiveness. Entries
    with high retrieval rates but poor user satisfaction scores may indicate semantic
    drift or inappropriate matches. These problematic entries represent a particular
    challenge; they appear successful by traditional metrics (high hit rate and recent
    usage) but actually degrade the user experience.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的淘汰策略不仅跟踪使用情况，还跟踪有效性。检索率很高但用户满意度评分较差的条目可能表明语义漂移或不当匹配。这些有问题的条目代表了一个特别的挑战；它们在传统指标（高命中率和近期使用）上看似成功，但实际上降低了用户体验。
- en: 'Modern implementations collect various performance signals to identify these
    troubled entries. User feedback mechanisms such as thumbs up/down ratings provide
    direct quality signals. Indirect metrics such as query reformulation rates (when
    users immediately rephrase a query after receiving a cached response) or session
    abandonment patterns also indicate cache quality issues. Some systems even track
    downstream task completion: Did the cached response actually help the user accomplish
    their goal?'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 现代实现收集各种性能信号以识别这些有问题的条目。用户反馈机制，如点赞/踩评分，提供直接的质量信号。间接指标，如查询重构率（当用户在收到缓存响应后立即重新表述查询）或会话放弃模式，也表明缓存存在质量问题。一些系统甚至跟踪下游任务完成情况：缓存响应实际上是否帮助用户实现了目标？
- en: The system can handle underperforming entries through multiple strategies. Immediate
    pruning removes clearly problematic entries that consistently fail quality thresholds.
    Graduated decay accelerates the eviction timeline for borderline performers. Manual
    review queues flag ambiguous cases for human evaluation, which is particularly
    valuable in specialized domains where automated metrics might miss nuance. This
    performance-based approach ensures the cache evolves based on real-world effectiveness
    rather than theoretical metrics.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 系统可以通过多种策略处理表现不佳的条目。立即修剪移除明显有问题的条目，这些条目持续未达到质量阈值。渐进衰减加速了边缘表现者的淘汰时间表。手动审查队列标记模糊案例以供人工评估，这在自动化指标可能错过细微差别的专业领域尤其有价值。这种基于性能的方法确保缓存根据实际效果而不是理论指标进行演变。
- en: 'While performance-based pruning eliminates poor-quality entries, it doesn’t
    address another growing problem in semantic caches: redundancy. The final eviction
    strategy we’ll examine uses semantic clustering to identify and consolidate duplicate
    entries that waste resources and create inconsistency.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然基于性能的修剪消除了低质量条目，但它没有解决语义缓存中日益增长的问题：冗余。我们将要考察的最终淘汰策略使用语义聚类来识别和整合浪费资源并造成不一致的重复条目。
- en: Semantic clustering for redundancy elimination
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用于冗余消除的语义聚类
- en: 'As the cache grows, redundant entries covering the same semantic space waste
    resources and can cause inconsistent responses. Periodic clustering identifies
    groups of highly similar entries:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 随着缓存的增长，覆盖相同语义空间的冗余条目浪费资源并可能导致不一致的响应。周期性聚类识别高度相似的条目组：
- en: '[PRE19]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: This consolidation maintains coverage while reducing the cache size and improving
    consistency. With these eviction strategies working in concert, time-based, usage-aware,
    performance-driven, and redundancy-eliminating, semantic caches can maintain high
    quality even as they scale. Let’s now step back and consider what we’ve learned
    about semantic caching as a whole.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这种整合在减少缓存大小和改进一致性的同时保持了覆盖范围。随着这些淘汰策略协同工作，基于时间、使用感知、性能驱动和冗余消除的语义缓存可以在扩展的同时保持高质量。现在让我们退一步，考虑我们对语义缓存作为一个整体所学到的东西。
- en: Summary
  id: totrans-245
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Semantic caches are no longer just an optimization trick. They are an essential
    control layer for production-grade AI systems. By intercepting common queries
    and reusing solution paths, they offset the cost and latency of agent-based reasoning
    while enforcing consistency in responses. Whether it’s skipping the planning phase
    for repeated queries, generalizing with entity masking, or ensuring correctness
    through verification, the cache becomes a force multiplier that transforms how
    agents operate under real-world scale.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 语义缓存不再是仅仅是一种优化技巧。它们是生产级AI系统的一个基本控制层。通过拦截常见查询和重用解决方案路径，它们抵消了基于代理推理的成本和延迟，同时确保响应的一致性。无论是跳过重复查询的计划阶段，通过实体掩码进行泛化，还是通过验证确保正确性，缓存成为了一个乘数力量，改变了代理在实际规模下的操作方式。
- en: What makes semantic caches particularly powerful is how adaptable they are.
    From long-tail coverage strategies to adaptive thresholds, from auto-population
    to redundancy elimination, they evolve with your application’s needs and your
    users’ behaviors. They aren’t static lookup tables, but dynamic systems that balance
    speed, precision, and freshness. When designed well, they don’t just reduce compute;
    in fact, they shape the user experience, delivering answers that are fast, reliable,
    and consistent, even as query patterns shift.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 语义缓存之所以特别强大，在于它们的适应性。从长尾覆盖策略到自适应阈值，从自动填充到冗余消除，它们随着您的应用需求和使用者行为的变化而进化。它们不是静态的查找表，而是平衡速度、精确度和新鲜度的动态系统。当设计得当，它们不仅减少了计算量；实际上，它们塑造了用户体验，提供快速、可靠和一致的答案，即使查询模式发生变化。
- en: The real takeaway is that semantic caches are living infrastructure. Their value
    grows as they learn, refine, and integrate more deeply into your agent pipelines.
    The most successful implementations are the ones that continuously monitor cache
    health, tune thresholds, and update eviction strategies to keep responses sharp
    and trustworthy. In practice, a well-tuned semantic cache fades into the background.
    It’s invisible to the user but indispensable to the system, ensuring that your
    AI application is not only efficient but also dependable at scale.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的收获是语义缓存是活生生的基础设施。随着它们的学习、精炼和更深入地集成到您的代理管道中，它们的价值也在增长。最成功的实现是那些持续监控缓存健康、调整阈值和更新淘汰策略，以保持响应敏锐和可信的方案。在实践中，一个调校良好的语义缓存会淡入背景。它对用户来说是不可见的，但对系统来说是不可或缺的，确保您的AI应用不仅高效，而且在规模上也是可靠的。
- en: But caching only takes you so far. A semantic cache is about remembering how
    to answer common queries, not what else the agent has already seen and done. To
    handle richer conversations, long-term context, and more dynamic reasoning, we
    need to move beyond caching into memory. That’s where the next chapter takes us,
    as it deals with agentic memory. It is the system of working, episodic, semantic,
    and procedural memories that lets agents learn from past interactions, recall
    the right information at the right time, and ultimately operate more like intelligent
    collaborators than stateless tools.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 但缓存只能带你走这么远。语义缓存关乎记住如何回答常见查询，而不是代理已经看到和做的事情。为了处理更丰富的对话、长期上下文和更动态的推理，我们需要超越缓存进入内存。这就是下一章要带我们去的，因为它涉及代理记忆。这是工作、情景、语义和程序记忆的系统，让代理能够从过去的交互中学习，在正确的时间回忆正确的信息，最终更像智能协作者而不是无状态的工具。
