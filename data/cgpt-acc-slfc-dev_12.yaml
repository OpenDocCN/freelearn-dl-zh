- en: These CSV files include the Epic and User Story names, alongside the structured
    representation of the test scripts. This format allows for clear mapping of each
    test to the corresponding Epic and User Story and ensures that the test details
    are easily accessible for analysis and execution. |
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 这些 CSV 文件包括 Epic 和用户故事名称，以及测试脚本的结构化表示。这种格式允许对每个测试与相应的 Epic 和用户故事进行清晰的映射，并确保测试细节易于分析和执行。|
- en: 'Please note that ChatGPT did not produce the entirety of each CSV file. After
    the first handful of rows, it said: “[repeat for all edge test steps]”. This can
    be addressed with a prompt for each individual CSV file:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，ChatGPT 没有生成每个 CSV 文件的全部内容。在最初的几行之后，它说：“[重复所有边缘测试步骤]”。这可以通过为每个单独的 CSV 文件提供提示来解决：
