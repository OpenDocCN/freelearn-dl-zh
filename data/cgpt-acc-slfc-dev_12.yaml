    with each Contact, and feel free to modify other fields as needed to fit your
    testing requirements.You can replicate the given lines, changing the appropriate
    fields, to create the rest of the contacts up to `Snowflake Email #200`. Make
    sure to align the contact data with the corresponding account data you created
    earlier. |'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '此结构应与 Salesforce 中联系人的标准字段相匹配。请确保将 `Account Name` 字段调整为与每个联系人关联的账户名称相匹配，并根据需要修改其他字段以适应您的测试要求。您可以复制给定的行，更改适当的字段，以创建从
