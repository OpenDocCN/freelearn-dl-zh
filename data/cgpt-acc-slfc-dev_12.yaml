  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**负面** **测试脚本****标题**：验证非销售代表用户中Snowflake部分中“电子邮件”按钮的缺失**目标**：确保Snowflake部分中的“电子邮件”按钮对非销售代表用户不可见或不可访问。**前提条件**：非销售代表用户已登录Salesforce，并位于包含Snowflake部分的账户页面上。**假设**：该功能仅限于销售代表用户。**步骤**：1.
    **验证账户页面**：检查账户页面是否成功加载。'
