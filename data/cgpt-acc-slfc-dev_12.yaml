  type: TYPE_NORMAL
  zh: '**边缘** **测试脚本** **标题**：验证带有不完整Snowflake数据的**电子邮件**按钮**目标**：验证Snowflake部分中的**电子邮件**按钮在Snowflake数据不完整或未完全加载时的行为。**前提条件**：销售代表已登录Salesforce，并位于Snowflake数据未完全加载的账户页面上。**假设**：Snowflake部分和**电子邮件**按钮已正确配置，但Snowflake数据源存在延迟或数据不完整。**步骤**：1.
    **验证带有不完整数据的账户页面**：检查账户页面是否已加载带有不完整的Snowflake数据。'
