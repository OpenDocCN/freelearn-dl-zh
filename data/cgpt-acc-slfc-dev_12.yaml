  zh: 2. **检查Snowflake部分**：滚动到Snowflake部分并寻找“电子邮件”按钮。
- en: 'Expected Result: The **Email** button is visible within the Snowflake section.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预期结果：在Snowflake部分中，**电子邮件**按钮可见。
