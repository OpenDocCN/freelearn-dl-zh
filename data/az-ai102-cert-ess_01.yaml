  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI 搜索
- en: Azure AI Content Safety
  id: totrans-266
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI 内容安全
- en: Azure OpenAI Service
  id: totrans-267
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure OpenAI 服务
- en: Azure AI Studio
  id: totrans-268
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI Studio
- en: '**Correct** **answer**: B'
  id: totrans-269
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B'
