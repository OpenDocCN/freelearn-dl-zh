    and AI-generated content in applications and services in real time?
  id: totrans-264
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪个Azure AI服务允许客户实时检测和调节应用程序和服务中的有害用户生成内容和AI生成内容？
