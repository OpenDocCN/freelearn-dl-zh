- en: '13'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: 'From Metrics to Milestones: Measuring Success in Power Platform Initiatives'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从指标到里程碑：衡量 Power Platform 初始化项目的成功
- en: This chapter will guide you in defining and measuring the success of your Power
    Platform initiatives. Power Platform is a low-code platform that enables you to
    create solutions for your organization’s needs. You will learn how to use the
    **Center of Excellence** (**CoE**) Starter Kit to create a strategic roadmap for
    your Power Platform transformation. You will also learn how to select and align
    **key performance indicators** (**KPIs**) to track the adoption and impact of
    your Power Platform solutions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将指导您定义和衡量您的 Power Platform 初始化项目的成功。Power Platform 是一个低代码平台，使您能够为组织的需求创建解决方案。您将学习如何使用
    **卓越中心**（**CoE**）入门套件来创建 Power Platform 转型的战略路线图。您还将学习如何选择和调整 **关键绩效指标**（**KPIs**）以跟踪您的
    Power Platform 解决方案的采用和影响。
- en: 'In this chapter, you will learn how to define and measure success in Power
    Platform initiatives. You will explore the following topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将学习如何在 Power Platform 初始化项目中定义和衡量成功。您将探索以下主题：
- en: Strategy and vision
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战略和愿景
- en: Identifying and measuring success
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别和衡量成功
- en: SMART goals and KPI benchmarks
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SMART 目标和 KPI 基准
- en: By the end of this chapter, you will be able to demonstrate your progress and
    the value of your Power Platform initiatives to your organization and beyond.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将能够展示您的进展以及您的 Power Platform 初始化项目对组织及其以外的价值。
- en: Defining a strategic roadmap using the CoE Starter Kit
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 CoE 入门套件定义战略路线图
- en: A well-defined strategy is essential for driving the successful adoption and
    implementation of digital transformation using Power Platform within your organization.
    Establishing a clear vision and strategic roadmap ensures that your Power Platform
    implementation initiatives align with broader business objectives and deliver
    measurable value. The CoE Starter Kit provides the necessary tools and frameworks
    to support this process, enabling you to create a robust governance model and
    foster a culture of innovation. Before we dive into tools to enable a successful
    Power Platform implementation, let’s investigate key concepts associated with
    defining strategy and vision for adoption.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 明确的战略对于在您的组织中成功采用和实施 Power Platform 的数字化转型至关重要。建立清晰的愿景和战略路线图确保您的 Power Platform
    实施项目与更广泛的企业目标一致，并产生可衡量的价值。CoE 入门套件提供了必要的工具和框架来支持这一过程，使您能够创建一个强大的治理模型并培养创新文化。在我们深入研究实现成功的
    Power Platform 实施的工具之前，让我们调查与定义采用战略和愿景相关的关键概念。
- en: The role of strategy in Power Platform adoption
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 战略在 Power Platform 采用中的作用
- en: A clear strategy is the foundation for successful Power Platform adoption. Organizations
    must develop a roadmap that outlines both short-term and long-term goals. These
    goals should align with overall business objectives, ensuring that Power Platform
    adoption supports digital transformation across the enterprise.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰的战略是成功采用 Power Platform 的基础。组织必须制定一个路线图，概述短期和长期目标。这些目标应与整体业务目标一致，确保 Power
    Platform 的采用支持企业范围内的数字化转型。
- en: 'The strategic roadmap should cover the following:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 战略路线图应涵盖以下内容：
- en: '**Business alignment**: How Power Platform will solve key business challenges
    and support organizational goals'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**业务一致性**：Power Platform 如何解决关键业务挑战并支持组织目标'
- en: '**Technology readiness**: Evaluating existing systems and how they can be integrated
    with Power Platform'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术准备性**：评估现有系统及其如何与 Power Platform 集成'
- en: '**People and culture**: Identifying the skills and capabilities needed within
    the organization for a smooth transition'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人员和文化**：确定组织内部平稳过渡所需的技能和能力'
- en: '**Investment planning**: Setting realistic budgets for software, training,
    and change management'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资规划**：为软件、培训和变革管理设定现实的预算'
- en: Vision maturity levels
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 视觉成熟度水平
- en: 'The maturity model for Power Platform adoption includes five distinct stages:
    Initial, Repeatable, Defined, Capable, and Efficient. Focusing on the **strategy**
    and **vision** aspects, we’ll assess maturity at different levels.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 采用的成熟度模型包括五个不同的阶段：初级、可重复、定义、能干和高效。关注 **战略** 和 **愿景** 方面，我们将评估不同级别的成熟度。
- en: Initial (level 100)
  id: totrans-19
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初级（级别 100）
- en: 'At the Initial level, organizations are experimenting with Power Platform in
    a decentralized manner. The adoption may be driven by individual departments or
    teams with no centralized vision or strategy. There’s little to no alignment with
    enterprise-wide business goals, and as a result, Power Platform projects may lack
    consistency:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在初始级别，组织以分散的方式在Power Platform上进行实验。采用可能由没有集中愿景或策略的个别部门或团队驱动。与整个企业级业务目标之间几乎没有一致性，因此，Power
    Platform项目可能缺乏一致性：
- en: '**Strategy**: There’s minimal formal strategy. Individual efforts are not coordinated,
    resulting in isolated and often under-optimized solutions.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略**：存在最少的正式策略。个人努力没有协调，导致孤立且通常未充分优化的解决方案。'
- en: '**Vision**: The long-term potential of Power Platform is not fully understood
    or articulated. The vision is limited to solving immediate problems without understanding
    the broader business context.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**愿景**：Power Platform的长期潜力尚未完全理解或阐述。愿景仅限于解决即时问题，而没有理解更广泛的业务背景。'
- en: Repeatable (level 200)
  id: totrans-23
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 可重复（级别200）
- en: 'At the Repeatable level, organizations begin to recognize the importance of
    a cohesive Power Platform strategy. Teams may start to share successful practices,
    and a clearer roadmap begins to emerge:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在可重复级别，组织开始认识到统一Power Platform策略的重要性。团队可能开始分享成功的实践，并开始出现更清晰的路线图：
- en: '**Strategy**: The organization acknowledges the need for alignment between
    business objectives and technology solutions. Some efforts are made to prioritize
    Power Platform projects that support key business outcomes.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略**：组织承认业务目标和科技解决方案之间需要一致。一些努力被用于优先考虑支持关键业务成果的Power Platform项目。'
- en: '**Vision**: A broader vision starts to develop, with a focus on enabling innovation
    across departments. The organization realizes that Power Platform can streamline
    processes and create efficiencies but is still limited in scope.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**愿景**：一个更广泛的愿景开始形成，重点是促进跨部门的创新。组织意识到Power Platform可以简化流程并创造效率，但范围仍然有限。'
- en: Defined (level 300)
  id: totrans-27
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 定义（级别300）
- en: 'The Defined level signifies that the organization has developed a clear, organization-wide
    strategy for Power Platform adoption. Teams are empowered with governance models
    and resources to implement Power Platform solutions aligned with the business
    strategy:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 定义级别表示组织已经为Power Platform的采用制定了一个明确的全组织策略。团队被赋予了治理模型和资源，以实施与业务策略一致的Power Platform解决方案：
- en: '**Strategy**: The strategic roadmap is formally documented, outlining how Power
    Platform initiatives will support both current and future business goals. Cross-functional
    teams collaborate to ensure Power Platform solutions align with larger digital
    transformation efforts.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略**：战略路线图被正式记录，概述了Power Platform项目将如何支持当前和未来的业务目标。跨职能团队协作，以确保Power Platform解决方案与更大的数字化转型努力保持一致。'
- en: '**Vision**: The organization’s vision for Power Platform is holistic. The goal
    is to create scalable, reusable solutions that foster innovation and provide competitive
    advantages. Leaders articulate a long-term plan for expanding the platform’s use,
    including citizen development, automation, and AI integration.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**愿景**：组织对Power Platform的愿景是全面的。目标是创建可扩展、可重复使用的解决方案，以促进创新并提供竞争优势。领导者阐述了一个长期计划，以扩大平台的使用范围，包括公民开发、自动化和人工智能集成。'
- en: Capable (level 400)
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 能够（级别400）
- en: 'At the Capable level, organizations fully integrate Power Platform into their
    digital transformation strategy. Solutions are scalable and integrated across
    business units. The strategy is continuously refined based on performance metrics
    and evolving business needs:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在能够级别，组织将Power Platform完全整合到其数字化转型策略中。解决方案具有可扩展性，并在业务单元之间集成。策略根据绩效指标和不断变化的企业需求持续优化：
- en: '**Strategy**: The roadmap includes continuous optimization, driven by data
    and feedback. Power Platform is seen as a critical component of the business’s
    IT infrastructure, and investments in governance, security, and scalability ensure
    its long-term success.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略**：路线图包括由数据和反馈驱动的持续优化。Power Platform被视为企业IT基础设施的关键组成部分，对治理、安全和可扩展性的投资确保了其长期成功。'
- en: '**Vision**: The vision extends beyond operational improvements. Power Platform
    is viewed as a key enabler of innovation and competitive differentiation. Organizations
    at this level explore advanced capabilities such as AI, machine learning, and
    predictive analytics within the platform.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**愿景**：愿景超越了运营改进。Power Platform被视为创新和竞争优势的关键推动者。处于这一级别的组织在平台内探索高级功能，如人工智能、机器学习和预测分析。'
- en: Efficient (level 500)
  id: totrans-35
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 有效（级别500）
- en: 'At the Efficient level, organizations have fully operationalized Power Platform
    as part of their digital ecosystem. The platform not only drives efficiency and
    innovation but also opens new business opportunities:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在有效级别，组织已将Power Platform完全整合到其数字生态系统中。该平台不仅推动效率和创新能力，还开辟了新的商业机会：
- en: '**Strategy**: Power Platform is fully integrated with other core business systems.
    The strategic roadmap focuses on ongoing innovation, continuous improvement, and
    unlocking new revenue streams.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略**：Power Platform与其他核心业务系统完全集成。战略路线图侧重于持续创新、持续改进和开启新的收入来源。'
- en: '**Vision**: Power Platform is seen as an essential driver of business strategy.
    Leaders consistently refine their vision to include emerging technologies, keeping
    the organization at the forefront of digital innovation.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**愿景**：Power Platform被视为推动企业战略的关键驱动力。领导者持续完善他们的愿景，包括新兴技术，使组织始终处于数字创新的前沿。'
- en: '*Figure 13**.1* illustrates the Power Platform adoption levels, represented
    as a stairwell leading to greater maturity and innovation. Each step marks a distinct
    level, starting from the Initial stage at the bottom and ascending through Repeatable,
    Defined, and Capable, and finally reaching Efficient at the top. Brief descriptions
    accompany each level, providing insights into the characteristics and strategic
    focus of organizations at that stage. The stairwell analogy reflects the journey
    toward a fully operational and innovative digital ecosystem, where Power Platform
    drives not only efficiency but also new business opportunities and competitive
    differentiation.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*图13*.*1*展示了Power Platform采用级别，表示为通往更高成熟度和创新的楼梯。每个步骤代表一个不同的级别，从底部的初始阶段开始，经过可重复的、定义的、有能力的，最终达到顶部的有效级别。每个级别都有简短描述，提供对处于该阶段组织的特征和战略焦点的洞察。楼梯的比喻反映了通往一个完全运营和创新数字生态系统的旅程，其中Power
    Platform不仅推动效率，还开辟了新的商业机会和竞争优势。'
- en: '![Figure 13.1 – Power Platform vision maturity levels](img/B21080_13_1.jpg)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图13.1 – Power Platform愿景成熟度级别](img/B21080_13_1.jpg)'
- en: Figure 13.1 – Power Platform vision maturity levels
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.1 – Power Platform愿景成熟度级别
- en: Leveraging the CoE Starter Kit to assess Power Platform vision maturity
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用CoE启动套件评估Power Platform愿景成熟度
- en: The CoE Starter Kit helps organizations identify their Power Platform vision
    maturity level by providing tools and insights that assess the current state of
    their platform usage, governance, and innovation capabilities.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: CoE启动套件通过提供工具和见解来帮助组织识别其Power Platform愿景成熟度级别，这些工具和见解评估了他们平台使用、治理和创新能力的当前状态。
- en: It begins with an assessment of your current environment, helping you understand
    your organization’s maturity in using Power Platform and identifying key areas
    for improvement. This assessment allows you to define clear objectives that guide
    your Power Platform journey, ensuring that each step is aligned with your organization’s
    long-term goals.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这一切始于对您当前环境的评估，帮助您了解组织在Power Platform使用方面的成熟度，并确定关键改进领域。此评估使您能够定义明确的目标，指导您的Power
    Platform之旅，确保每一步都与组织的长期目标保持一致。
- en: One of the primary benefits of using the CoE Starter Kit is its ability to integrate
    strategic planning with operational execution. It allows you to establish governance
    structures, set up monitoring and reporting mechanisms, and define KPIs that track
    progress and success. By leveraging these capabilities, you can create a strategic
    roadmap that not only outlines the path to achieving your vision but also provides
    the tools to measure and adjust your approach as needed.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 使用CoE启动套件的主要好处之一是其能够将战略规划与运营执行相结合。它允许您建立治理结构，设置监控和报告机制，并定义跟踪进度和成功的KPI。通过利用这些功能，您可以创建一个战略路线图，不仅概述实现愿景的路径，还提供了测量和调整所需方法的工具。
- en: In essence, the CoE Starter Kit enhances your organization’s ability to define
    and execute a strategic roadmap for Power Platform transformation. By following
    best practices and leveraging the tools provided by the CoE Starter Kit, you can
    ensure that your Power Platform strategy is well aligned with your organization’s
    broader vision, effectively managed, and capable of delivering sustained business
    value. As we move to the next section, we will explore how to identify and measure
    success through KPIs to track the impact of your Power Platform initiatives.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 本质上，CoE入门套件增强了您组织定义和执行Power Platform转型战略路线图的能力。通过遵循最佳实践并利用CoE入门套件提供的工具，您可以确保您的Power
    Platform战略与组织更广泛的愿景保持一致，得到有效管理，并能够持续创造业务价值。随着我们进入下一节，我们将探讨如何通过KPI识别和衡量成功，以跟踪您的Power
    Platform项目的影响。
- en: 'Here are practical examples of how the CoE Starter Kit can be used to assess
    an organization’s Power Platform vision maturity:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些CoE入门套件如何用于评估组织Power Platform愿景成熟度的实际例子：
- en: '**Tracking platform usage and adoption**: Using the Power BI adoption dashboard
    within the CoE Starter Kit, you can monitor the number of active makers, apps,
    and flows. If the data shows limited use across only a few departments, it indicates
    that the organization may be at the Initial or Repeatable stage. Conversely, widespread
    usage across multiple departments suggests higher maturity, such as the Defined
    or Capable level.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跟踪平台使用和采用情况**：在CoE入门套件中使用Power BI采用仪表板，您可以监控活跃制作者、应用程序和流程的数量。如果数据显示只有少数部门使用有限，这可能表明组织处于初始或可重复阶段。相反，多个部门广泛使用则表明成熟度更高，如定义或能力级别。'
- en: '**Monitoring solution scalability**: By analyzing the App and Flow Inventory
    feature in the CoE Starter Kit, organizations can assess whether their solutions
    are scalable and reused across departments. If most apps are built to solve isolated,
    department-specific problems without broader scalability, it signals a lower maturity
    level. Higher maturity is indicated by solutions designed for enterprise-wide
    use, reflecting alignment with long-term strategy and innovation.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控解决方案的可扩展性**：通过分析CoE入门套件中的应用程序和流程库存功能，组织可以评估其解决方案是否可扩展并在各部门之间重复使用。如果大多数应用程序都是为了解决孤立、特定部门的难题而构建的，没有更广泛的可扩展性，这表明成熟度较低。更高成熟度表现为为企业级使用设计的解决方案，反映了与长期战略和创新的协调一致。'
- en: '**Evaluating governance structures**: The CoE Starter Kit’s governance dashboard
    helps track the implementation of policies, security, and compliance across the
    organization. For example, organizations at the Defined or Capable stage will
    have more structured governance in place, ensuring that Power Platform aligns
    with company-wide business objectives and follows a unified strategy.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估治理结构**：CoE入门套件的治理仪表板有助于跟踪组织内政策的实施、安全和合规性。例如，处于定义或能力阶段的组织将拥有更结构化的治理，确保Power
    Platform与公司整体业务目标保持一致，并遵循统一战略。'
- en: '**Tracking citizen developer engagement**: The CoE Starter Kit provides insights
    into citizen development activity – showing who is creating apps, their frequency,
    and the complexity of solutions. If there’s limited citizen development, the organization
    might be at the Repeatable or Defined stage. The higher involvement of business
    users in creating apps and automation indicates a more mature level, such as Capable
    or Efficient, where the Power Platform vision includes a robust citizen developer
    program.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跟踪公民开发者参与度**：CoE入门套件提供了对公民开发活动洞察——显示谁在创建应用程序，他们的频率以及解决方案的复杂性。如果公民开发有限，组织可能处于可重复或定义阶段。商业用户在创建应用程序和自动化方面的更高参与度表明成熟度更高，如能力或高效级别，其中Power
    Platform愿景包括一个强大的公民开发者计划。'
- en: '**Measuring innovation through advanced features**: The CoE Starter Kit can
    track the usage of advanced Power Platform features such as AI Builder or Power
    Automate’s **robotic process automation** (**RPA**). Organizations using these
    capabilities extensively are likely at the Capable or Efficient level, where innovation
    and advanced technologies are central to their Power Platform vision and strategy.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过高级功能衡量创新**：CoE入门套件可以跟踪高级Power Platform功能（如AI Builder或Power Automate的**机器人流程自动化**（RPA））的使用情况。广泛使用这些功能的组织可能处于能力或高效级别，其中创新和先进技术是其Power
    Platform愿景和战略的核心。'
- en: '**Reviewing change management and training initiatives**: Through the CoE Starter
    Kit’s insights, organizations can assess the extent of their training and change
    management efforts. If only basic training has been conducted or limited resources
    are available to help users, the organization might be at the Repeatable stage.
    However, if comprehensive, ongoing training programs are in place, they’re likely
    at a more advanced maturity level, such as Capable or Efficient, with a long-term
    vision for fostering a Power Platform culture.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审查变更管理和培训计划**：通过 CoE Starter Kit 的见解，组织可以评估其培训和变更管理努力的广度。如果只进行了基本培训或可用资源有限以帮助用户，则组织可能处于可重复阶段。然而，如果实施了全面且持续的训练计划，它们可能处于更高级的成熟度水平，例如具备能力或效率，并具有培养
    Power Platform 文化的长期愿景。'
- en: These examples demonstrate how the CoE Starter Kit can provide actionable insights
    to help organizations evaluate their current Power Platform vision maturity level
    and identify areas for strategic improvement.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例展示了 CoE Starter Kit 如何提供可操作的见解，帮助组织评估其当前 Power Platform 视觉成熟度水平并确定战略改进领域。
- en: Identifying and measuring success
  id: totrans-55
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 识别和衡量成功
- en: Effectively measuring the success of Power Platform initiatives hinges on identifying
    and aligning KPIs that align with your organization’s goals. By leveraging these
    KPIs, you can track Power Platform adoption and its impact, ensuring that it drives
    the intended business outcomes. In this section, we will explore how to define
    and align KPIs to effectively measure the success of Power Platform adoption while
    maintaining strategic alignment between business objectives and technology solutions.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 有效衡量 Power Platform 初始化的成功取决于识别和与组织目标一致的 KPI。通过利用这些 KPI，您可以跟踪 Power Platform
    的采用及其影响，确保其推动预期的业务成果。在本节中，我们将探讨如何定义和调整 KPI 以有效衡量 Power Platform 采用的成功，同时保持业务目标和技术解决方案之间的战略一致性。
- en: Understanding the role of KPIs in Power Platform adoption
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解 KPI 在 Power Platform 采用中的作用
- en: KPIs serve as the measurable values that demonstrate how effectively an organization
    is achieving its business objectives through Power Platform adoption. Identifying
    the right KPIs ensures that an organization can continuously monitor progress,
    optimize resources, and adapt its strategy as needed. Without defined KPIs, measuring
    the **return on investment** (**ROI**) for Power Platform initiatives becomes
    challenging.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: KPI 作为可衡量的值，展示了组织通过 Power Platform 采用实现其业务目标的效率。确定正确的 KPI 确保组织可以持续监控进度、优化资源并根据需要调整其策略。没有定义的
    KPI，衡量 Power Platform 初始化的**投资回报率**（**ROI**）变得具有挑战性。
- en: 'Effective KPIs should do the following:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的 KPI 应该做到以下几点：
- en: Align with broader business goals
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与更广泛的企业目标保持一致
- en: Be **specific**, **measurable**, **achievable**, **relevant**, and **time-bound**
    (**SMART**)
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体**、**可衡量**、**可实现**、**相关**和**时限性**（**SMART**）'
- en: Provide both quantitative and qualitative insights into adoption progress
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供采用进度的定量和定性见解
- en: Identifying key metrics
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确定关键指标
- en: The first step in measuring success is identifying KPIs that align with your
    organization’s strategic goals and business objectives. These KPIs should be tailored
    to the specific outcomes you seek through Power Platform adoption, such as improved
    efficiency, cost reduction, or enhanced customer engagement. Common metrics include
    the time saved through automation, reduction in operational costs, and user adoption
    rates.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 衡量成功的第一步是确定与您的组织战略目标和业务目标一致的 KPI。这些 KPI 应根据您通过 Power Platform 采用寻求的具体成果进行定制，例如提高效率、降低成本或增强客户参与度。常见的指标包括通过自动化节省的时间、运营成本的降低和用户采用率。
- en: 'Take these examples:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些示例：
- en: '**Operational efficiency**: KPIs might measure time saved by automating manual
    processes or reducing dependency on traditional IT development cycles'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营效率**：KPI 可能会衡量通过自动化手动流程或减少对传统 IT 开发周期的依赖所节省的时间'
- en: '**Cost reduction**: KPIs could track reductions in IT costs or third-party
    app expenditures by using Power Platform to build in-house solutions'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本降低**：KPI 可以通过使用 Power Platform 构建内部解决方案来跟踪 IT 成本或第三方应用程序支出的减少'
- en: '**Customer satisfaction**: KPIs might include customer satisfaction scores
    or the speed of responding to customer inquiries via Power Apps or Power Automate
    workflows'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户满意度**：KPI 可能包括客户满意度评分或通过 Power Apps 或 Power Automate 工作流响应客户咨询的速度'
- en: By linking Power Platform adoption KPIs directly to these business goals, organizations
    ensure that every initiative drives meaningful value and contributes to strategic
    success.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将Power Platform采用的关键绩效指标直接与这些业务目标联系起来，组织确保每个倡议都能产生有意义的价值，并有助于战略成功。
- en: Key categories of KPIs for Power Platform adoption
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power Platform采用的关键绩效指标主要类别
- en: 'To effectively measure Power Platform adoption, organizations should focus
    on KPIs in several key categories, including user engagement, solution impact,
    innovation, and governance. Each of these categories provides unique insights
    into how Power Platform is delivering value across the business:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地衡量Power Platform的采用，组织应关注几个关键类别的关键绩效指标，包括用户参与度、解决方案影响、创新和治理。每个类别都提供了独特的见解，了解Power
    Platform如何在整个业务中创造价值：
- en: '**User engagement KPIs**: These KPIs help organizations assess the extent of
    Power Platform adoption by tracking how users and teams are engaging with the
    platform:'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户参与度关键绩效指标**：这些关键绩效指标帮助组织评估Power Platform的采用程度，通过跟踪用户和团队如何与平台互动：'
- en: '**Number of active makers and users**: Measures how many individuals are actively
    building apps or flows or leveraging Power BI within the platform'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**活跃的制作者和用户数量**：衡量在平台内积极构建应用程序或流程或利用Power BI的个人数量'
- en: '**App usage**: Tracks the frequency and volume of usage for specific apps,
    showing how much value they provide to users'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用使用情况**：追踪特定应用的使用频率和数量，显示它们为用户提供的价值'
- en: '**Citizen developer participation**: Measures the number of non-IT employees
    creating solutions, indicating how effectively Power Platform is fostering a culture
    of innovation'
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公民开发者参与度**：衡量非IT员工创建解决方案的数量，表明Power Platform如何有效地培养创新文化'
- en: '**Solution impact KPIs**: These KPIs evaluate how well Power Platform solutions
    are addressing specific business needs and delivering measurable results:'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案影响的关键绩效指标**：这些关键绩效指标评估Power Platform解决方案在满足特定业务需求和产生可衡量结果方面的成效：'
- en: '**Time saved from automation**: Quantifies the hours saved by automating manual
    processes with Power Automate or custom apps, showcasing operational efficiency
    gains'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化节省的时间**：量化通过Power Automate或定制应用程序自动化手动流程所节省的小时数，展示运营效率的提升'
- en: '**Error reduction**: Measures the reduction in errors or inconsistencies in
    processes that were previously manual, highlighting improvements in accuracy'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误减少**：衡量先前手动流程中错误或不一致性的减少，突出准确性改进'
- en: '**Cost savings from internal app development**: Tracks the cost saved by building
    custom solutions in-house instead of purchasing third-party applications or services'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部应用开发节省的成本**：追踪通过内部构建定制解决方案而非购买第三方应用程序或服务所节省的成本'
- en: '**Innovation and transformation KPIs**: Innovation-focused KPIs measure how
    Power Platform is contributing to broader organizational transformation and the
    development of new capabilities:'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新和转型关键绩效指标**：以创新为重点的关键绩效指标衡量Power Platform如何促进更广泛的组织转型和新能力的发展：'
- en: '**Number of new business processes digitized**: Tracks how many processes have
    been digitized using Power Platform, signaling the organization’s commitment to
    digital transformation'
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数字化新业务流程的数量**：追踪使用Power Platform数字化的流程数量，表明组织对数字化转型承诺的信号'
- en: '**New services or offerings enabled by Power Platform**: Measures how many
    new customer-facing services or products have been launched using the platform,
    indicating its role in driving innovation'
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**由Power Platform启用的新服务或产品**：衡量使用该平台推出的新客户面向服务或产品的数量，表明其在推动创新中的作用'
- en: '**Rate of innovation adoption**: Tracks how quickly new Power Platform features
    or updates are integrated into organizational workflows'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新采用率**：追踪新Power Platform功能或更新如何快速集成到组织工作流程中'
- en: '**Governance and compliance KPIs**: These KPIs assess how well the organization
    is managing the governance and security aspects of Power Platform adoption:'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理和合规关键绩效指标**：这些关键绩效指标评估组织在管理Power Platform采用治理和安全方面的成效：'
- en: '**Adherence to governance policies**: Measures the compliance rate with established
    governance frameworks, indicating how well the platform is controlled and monitored'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**遵守治理政策**：衡量与既定治理框架的合规率，表明平台控制与监控的成效'
- en: '**Data security incidents**: Tracks the number of security breaches or compliance
    issues related to Power Platform solutions, ensuring that risks are minimized'
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据安全事件**：追踪与Power Platform解决方案相关的安全漏洞或合规问题数量，确保风险最小化'
- en: '**Audit trail and monitoring efficiency**: Measures how effectively Power Platform
    activities are monitored and audited to maintain compliance with internal and
    external regulations'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审计跟踪和监控效率**：衡量Power Platform活动监控和审计的有效性，以维护内部和外部法规的合规性'
- en: Building an effective KPI framework for Power Platform adoption
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为Power Platform采用构建有效的KPI框架
- en: 'To ensure that KPIs effectively measure Power Platform adoption success, organizations
    must build a robust KPI framework. This framework should do the following:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保KPI能够有效衡量Power Platform采用的成功，组织必须构建一个强大的KPI框架。这个框架应该做到以下几点：
- en: '**Define success**: Clarify what success looks like for the organization. This
    could be improved customer satisfaction, faster response times, reduced operational
    costs, or more innovative services.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义成功**：明确组织成功的样子。这可能包括提高客户满意度、更快响应时间、降低运营成本或提供更多创新服务。'
- en: '**Map KPIs to objectives**: Ensure that each KPI directly supports one or more
    business objectives. For instance, if the objective is to reduce IT costs, KPIs
    might focus on cost savings from automating tasks or building internal apps.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将KPI与目标对齐**：确保每个KPI直接支持一个或多个业务目标。例如，如果目标是降低IT成本，KPI可能会关注自动化任务或构建内部应用带来的成本节约。'
- en: '**Set benchmarks**: Establish baseline metrics for each KPI so that progress
    can be tracked over time. For example, organizations might measure app usage today
    and compare it with usage six months after a major Power Platform initiative.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设定基准**：为每个KPI建立基线指标，以便随着时间的推移跟踪进度。例如，组织可能会在今天衡量应用使用情况，并与六个月后主要Power Platform项目后的使用情况进行比较。'
- en: '**Use real-time data**: Leverage tools such as Power BI to gather real-time
    data and provide continuous insights into Power Platform adoption. This ensures
    that decision-makers have timely information to adjust strategies and initiatives
    as needed.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用实时数据**：利用Power BI等工具收集实时数据，为Power Platform的采用提供持续的见解。这确保了决策者能够及时调整策略和计划。'
- en: '**Review and refine**: Periodically review KPIs to ensure they remain relevant
    as the organization’s needs and goals evolve. As Power Platform capabilities expand,
    new KPIs may be necessary to measure emerging areas of value, such as artificial
    intelligence or machine learning adoption.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审查和改进**：定期审查KPI以确保它们在组织需求和目标演变时保持相关性。随着Power Platform功能的扩展，可能需要新的KPI来衡量新兴的价值领域，如人工智能或机器学习的采用。'
- en: The role of leadership in driving KPI success
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 领导力在推动关键绩效指标（KPI）成功中的作用
- en: 'Leadership plays a crucial role in the success of any Power Platform initiative,
    especially when it comes to identifying and measuring KPIs. Leaders must do the
    following:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 领导力在任何一个Power Platform项目成功中都起着至关重要的作用，尤其是在识别和衡量KPI方面。领导者必须做到以下几点：
- en: '**Champion the adoption of Power Platform**: Actively encourage the use of
    Power Platform across departments, ensuring that all teams understand the value
    of the platform and its alignment with business objectives'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**倡导Power Platform的采用**：积极鼓励跨部门使用Power Platform，确保所有团队都了解平台的价值及其与业务目标的契合度'
- en: '**Align teams with KPIs**: Ensure that all stakeholders, from IT to business
    units, are aware of the KPIs and understand how their contributions impact the
    overall success of the platform'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将团队与KPI对齐**：确保所有利益相关者，从IT到业务部门，都了解KPI并理解他们的贡献如何影响平台的整体成功'
- en: '**Foster a data-driven culture**: Emphasize the importance of data-driven decision-making,
    ensuring that teams use KPIs to assess progress and make continuous improvements'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培养数据驱动文化**：强调数据驱动决策的重要性，确保团队使用KPI来评估进度并持续改进'
- en: Leveraging financial metrics
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用财务指标
- en: Financial KPIs, such as ROI, **total cost of ownership** (**TCO**), and payback
    period, are vital in measuring the financial success of your Power Platform initiatives.
    These metrics help quantify the economic value generated by the solutions. For
    instance, calculate the ROI by comparing the cost savings or revenue generated
    by a Power Platform solution against the initial investment.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 财务KPI，例如投资回报率（ROI）、**总拥有成本**（**TCO**）和回收期，对于衡量您的Power Platform项目的财务成功至关重要。这些指标有助于量化解决方案产生的经济价值。例如，通过比较Power
    Platform解决方案带来的成本节约或收入与初始投资来计算ROI。
- en: Qualitative benefits
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定性效益
- en: In addition to quantitative KPIs, consider qualitative benefits such as improved
    employee satisfaction, increased agility, and enhanced collaboration. These factors,
    while not easily measurable in numbers, significantly contribute to the overall
    success of Power Platform adoption. Collecting user feedback and testimonials
    can provide insights into these qualitative improvements.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 除了量化的KPIs之外，还应考虑定性收益，如提高员工满意度、增强灵活性和提升协作。这些因素虽然难以用数字衡量，但对Power Platform采用的整体成功贡献显著。收集用户反馈和证词可以提供对这些定性改进的见解。
- en: Communicating success
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传达成功
- en: Effectively communicating the success of Power Platform adoption is crucial
    for maintaining stakeholder support. Regularly present KPI results to leadership,
    highlighting both the quantitative and qualitative benefits. This ongoing communication
    ensures that the value of Power Platform initiatives is recognized and that there
    is continued investment in the platform.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 有效传达Power Platform采用的成功对于维持利益相关者的支持至关重要。定期向领导层展示KPI结果，突出定量和定性收益。这种持续的沟通确保了Power
    Platform项目价值的认可，并确保对平台的持续投资。
- en: By acquiring and applying these skills to identify and align KPIs, your organization
    can effectively measure the success of Power Platform adoption. These KPIs will
    guide you in tracking progress, demonstrating value, and making informed decisions
    about future initiatives. As we move forward, the next section will explore securing
    data transmission and API access in Power Platform deployments, a key component
    in ensuring the security and reliability of your solutions.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 通过获取和应用这些技能来识别和调整KPIs，您的组织可以有效地衡量Power Platform采用的成功。这些KPIs将指导您跟踪进度、展示价值并就未来项目做出明智的决策。随着我们继续前进，下一节将探讨在Power
    Platform部署中确保数据传输和API访问，这是确保解决方案安全和可靠的关键组成部分。
- en: '*Figure 13**.2* presents a detailed diagram illustrating the continuous cycle
    of KPI definition and refinement.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '*图13.2* 展示了一个详细的流程图，说明了KPI定义和优化的持续循环。'
- en: '![Figure 13.2 – Overview of KPI definition](img/B21080_13_2.jpg)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图13.2 – KPI定义概述](img/B21080_13_2.jpg)'
- en: Figure 13.2 – Overview of KPI definition
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.2 – KPI定义概述
- en: This cycle emphasizes the importance of an iterative approach, where each step
    is paired with a specific action aimed at enhancing the overall process of KPI
    identification, measurement, and improvement. Starting with the initial establishment
    of KPIs, the cycle moves through stages of data collection, analysis, and feedback,
    ensuring that KPIs remain relevant and aligned with organizational goals. Regular
    refinement helps organizations adapt to evolving business needs, uncover new insights,
    and optimize performance across various departments.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 此循环强调迭代方法的重要性，其中每个步骤都与一个旨在增强KPI识别、测量和改进整体过程的特定行动相匹配。从KPI的初始建立开始，该循环通过数据收集、分析和反馈的阶段，确保KPIs保持相关性和与组织目标的契合。定期的优化有助于组织适应不断变化的企业需求，发现新的见解，并在各个部门优化性能。
- en: By understanding how to set, monitor, and refine KPIs, organizations can ensure
    their Power Platform initiatives align with broader business goals and deliver
    tangible results. Through practical examples and insights, the next section will
    guide you in defining SMART goals and KPI benchmarks, helping you continuously
    improve and refine your Power Platform adoption journey.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解如何设置、监控和优化关键绩效指标（KPIs），组织可以确保其Power Platform项目与更广泛的企业目标保持一致，并产生可衡量的成果。下一节将通过实际案例和见解，指导您定义SMART目标和KPI基准，帮助您持续改进和优化您的Power
    Platform采用之旅。
- en: SMART goals and KPI benchmarks
  id: totrans-112
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: SMART目标和KPI基准
- en: Setting clear, actionable goals is essential for the success of any business
    initiative, including Power Platform adoption. In this section, we will explore
    how to develop proficiency in setting SMART goals and establishing KPI benchmarks
    that align with your organization’s strategic objectives. We’ll also provide practical
    examples tailored to IT leaders and C-level executives, showing how SMART goals
    and KPIs can drive measurable results and ensure the success of Power Platform
    projects.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 设定明确、可操作的目标对于任何业务项目的成功，包括Power Platform的采用，都是至关重要的。在本节中，我们将探讨如何掌握设定SMART目标和建立与组织战略目标一致的KPI基准的技能。我们还将提供针对IT领导和C级高管量身定制的实际案例，展示SMART目标和KPIs如何推动可衡量的成果并确保Power
    Platform项目的成功。
- en: Understanding SMART goals
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解SMART目标
- en: 'SMART goals provide a structured framework that enables organizations to set
    clear, actionable objectives that can be tracked and measured. Each element of
    a SMART goal plays a critical role in ensuring that the goal is realistic and
    aligned with broader business objectives:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: SMART目标为组织提供了一种结构化的框架，使它们能够设定清晰、可操作的目标，这些目标可以跟踪和衡量。SMART目标的每个要素都在确保目标现实并与更广泛的业务目标一致方面发挥着关键作用：
- en: '**Specific**: Clearly define the goal, leaving no room for ambiguity. It should
    answer “who, what, where, when, and why.”'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体**：明确定义目标，不留任何含糊的余地。它应该回答“谁、什么、哪里、何时和为什么。”'
- en: '**Measurable**: Identify how success will be quantified. KPIs play a critical
    role here, as they provide the metrics used to evaluate progress.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可衡量**：确定成功如何量化。KPI在这里发挥着关键作用，因为它们提供了用于评估进展的指标。'
- en: '**Achievable**: The goal should be realistic and attainable within the given
    resources, skills, and timeframe.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可实现**：目标应在给定的资源、技能和时间框架内是现实和可实现的。'
- en: '**Relevant**: Align the goal with broader business objectives to ensure it
    supports the overall organizational strategy.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关**：将目标与更广泛的业务目标对齐，以确保它支持整体组织战略。'
- en: '**Time-bound**: Set a clear deadline or timeframe to keep the goal on track
    and accountable.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时限**：设定明确的截止日期或时间框架，以确保目标按计划进行并具有可问责性。'
- en: By applying the SMART framework, IT leaders and C-level professionals can ensure
    that their Power Platform initiatives are not only strategically aligned but also
    measurable and actionable.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 通过应用SMART框架，IT领导者和C级专业人士可以确保他们的Power Platform项目不仅在战略上保持一致，而且可衡量和可操作。
- en: Establishing KPI benchmarks
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立KPI基准
- en: 'KPIs provide the metrics necessary to track progress toward achieving SMART
    goals. When setting KPI benchmarks, it’s important to do the following:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: KPI提供了跟踪实现SMART目标进展所需的指标。在设定KPI基准时，以下事项很重要：
- en: Define baseline metrics for current performance
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义当前性能的基线指标
- en: Set realistic target values for each KPI
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个关键绩效指标（KPI）设定现实的目标值
- en: Ensure KPIs are closely tied to business objectives, reflecting both quantitative
    and qualitative outcomes
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保KPI与业务目标紧密相连，反映定量和定性结果
- en: 'For example, if the goal is to reduce the IT backlog by enabling citizen developers
    to create apps, KPIs might include the following:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果目标是通过对公民开发者创建应用程序来减少IT积压，KPI可能包括以下内容：
- en: Number of apps built by citizen developers
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公民开发者构建的应用程序数量
- en: Reduction in the IT backlog as a percentage over a set period
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一定时期内IT积压任务减少的百分比
- en: Time saved by automating manual tasks through Power Platform solutions
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过Power Platform解决方案自动化手动任务节省的时间
- en: The power of SMART goals and KPI benchmarks for Power Platform initiatives
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SMART目标和KPI基准对Power Platform项目的力量
- en: In the context of Power Platform adoption, setting SMART goals and KPI benchmarks
    ensures that digital transformation initiatives stay on course and deliver measurable
    results. The following examples illustrate how IT leaders and C-level executives
    can apply this framework to achieve success.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Platform采用的情况下，设定SMART目标和KPI基准确保数字化转型计划保持正轨并产生可衡量的结果。以下示例说明了IT领导者和C级高管如何应用此框架以实现成功。
- en: Example 1 – reducing IT backlog with citizen developers
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1 - 通过公民开发者减少IT积压
- en: 'The SMART goal is to empower citizen developers to reduce the IT backlog by
    30% within 12 months by building custom apps using Power Apps:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: SMART目标是通过使用Power Apps构建自定义应用程序来赋予公民开发者减少IT积压30%的能力，在12个月内实现：
- en: '**Specific**: Focus on empowering citizen developers to reduce the IT backlog'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体**：专注于赋予公民开发者减少IT积压的能力'
- en: '**Measurable**: Set a 30% reduction in the backlog as the target'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可衡量**：将积压任务减少30%设定为目标'
- en: '**Achievable**: Equip business users with training and support to build apps'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可实现**：为业务用户提供培训和支援以构建应用程序'
- en: '**Relevant**: Aligns with the goal of increasing agility and reducing IT dependency'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关**：与提高敏捷性和减少对IT的依赖的目标一致'
- en: '**Time-bound**: 12-month period for the goal to be achieved'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时限**：目标应在12个月内实现'
- en: 'The following are the KPI benchmarks:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 以下为KPI基准：
- en: '**Baseline**: 10 apps built by the IT team per month'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基线**：IT团队每月构建10个应用程序'
- en: '**Target**: 25% of the total app development is handled by citizen developers'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：总应用程序开发的25%由公民开发者处理'
- en: '**Measure**: Reduction in requests for app development from business units,
    tracked through the IT ticketing system'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**衡量**：通过IT票务系统跟踪的业务单位对应用程序开发的请求减少'
- en: '**Practical example**: A healthcare organization struggling with IT backlogs
    implemented Power Platform to enable business users in non-technical departments
    to create apps that automate administrative tasks such as patient intake or data
    management. By setting a SMART goal to reduce IT backlog by 30% and establishing
    clear KPIs, they were able to track progress and showcase measurable improvements
    in operational efficiency.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '**实际案例**：一家在 IT 等待列表方面遇到困难的健康保健组织实施了 Power Platform，以使非技术部门的业务用户能够创建自动化行政任务（如患者接收或数据管理）的应用程序。通过设定一个
    SMART 目标，即通过 30% 的 IT 等待列表减少和建立明确的 KPI，他们能够跟踪进度并展示在运营效率方面的可衡量改进。'
- en: Example 2 – improving operational efficiency through automation
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2 – 通过自动化提高运营效率
- en: 'The SMART goal is to automate 40% of manual processes in the HR department
    within nine months using Power Automate, reducing processing time by 25%:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: SMART 目标是在九个月内使用 Power Automate 自动化人力资源部门的 40% 的手动流程，减少 25% 的处理时间：
- en: '**Specific**: Automate manual HR processes'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体性**：自动化手动人力资源流程'
- en: '**Measurable**: Target 40% of processes and aim for a 25% reduction in processing
    time'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可衡量性**：目标 40% 的流程，并力争将处理时间减少 25%'
- en: '**Achievable**: Leverage existing Power Automate capabilities and training'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可实现性**：利用现有的 Power Automate 功能和培训'
- en: '**Relevant**: Reduces operational overhead and improves service delivery'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关性**：减少运营成本并提高服务交付'
- en: '**Time-bound**: Nine-month deadline to complete automation'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间限制**：九个月完成自动化的最后期限'
- en: 'The following are the KPI benchmarks:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些关键绩效指标基准：
- en: '**Baseline**: Time spent on manual HR processes, such as onboarding or payroll'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基准**：手动人力资源流程所花费的时间，例如入职或工资发放'
- en: '**Target**: Reduction in processing time by 25%'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：通过 25% 的处理时间减少'
- en: '**Measure**: The number of automated workflows implemented by HR, tracked through
    workflow logs and employee feedback on efficiency'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**衡量指标**：通过工作流程日志和员工对效率的反馈跟踪人力资源部门实施的自动化工作流程数量'
- en: '**Practical example**: A financial services company struggling with manual
    HR processes—such as paper-based onboarding – set a SMART goal to automate 40%
    of these processes. Using Power Automate, the company integrated digital workflows
    that cut processing times by 25%, streamlining HR operations. This not only improved
    efficiency but also allowed the HR team to focus on more strategic tasks.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**实际案例**：一家在手动人力资源流程（如基于纸质的入职）方面遇到困难的金融服务公司，设定了一个 SMART 目标，即自动化 40% 的这些流程。使用
    Power Automate，公司整合了数字工作流程，将处理时间缩短了 25%，简化了人力资源运营。这不仅提高了效率，还使人力资源团队能够专注于更多战略性的任务。'
- en: Example 3 – enhancing customer experience through digital solutions
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3 – 通过数字解决方案提升客户体验
- en: 'The SMART goal is to launch a new customer self-service portal using Power
    Apps within six months, increasing customer satisfaction by 20%:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: SMART 目标是在六个月内使用 Power Apps 推出一个新的客户自助服务门户，提高 20% 的客户满意度：
- en: '**Specific**: Build and launch a customer self-service portal'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体性**：构建并推出客户自助服务门户'
- en: '**Measurable**: Increase customer satisfaction by 20%'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可衡量性**：通过提高 20% 的客户满意度'
- en: '**Achievable**: Leverage existing Power Apps expertise within the IT team'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可实现性**：利用 IT 团队内现有的 Power Apps 专业知识'
- en: '**Relevant**: Aligns with the goal of improving customer experience'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关性**：与提高客户体验的目标一致'
- en: '**Time-bound**: Six-month timeframe to launch the portal'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间限制**：六个月内推出门户'
- en: 'The following are the KPI benchmarks:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些关键绩效指标基准：
- en: '**Baseline**: Current customer satisfaction score from feedback surveys'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基准**：当前客户满意度评分来自反馈调查'
- en: '**Target**: 20% improvement in satisfaction, measured by post-launch customer
    feedback'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：通过推出后的客户反馈，满意度提高 20%'
- en: '**Measure**: Usage statistics for the portal (e.g., number of daily logins)
    and customer satisfaction ratings tracked through surveys'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**衡量指标**：门户的使用统计（例如，每日登录次数）和通过调查跟踪的客户满意度评分'
- en: '**Practical example**: A retail company aimed to reduce the volume of customer
    support inquiries by building a self-service portal using Power Apps. The goal
    was to improve the customer experience and reduce support costs. By setting clear
    KPIs around portal usage and satisfaction rates, the company successfully launched
    the portal, achieving a 20% increase in customer satisfaction within six months.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '**实际案例**：一家零售公司旨在通过使用 Power Apps 构建自助服务门户来减少客户支持查询量。目标是提高客户体验并降低支持成本。通过设定关于门户使用和满意度率的明确
    KPI，公司成功推出了门户，在六个月内客户满意度提高了 20%。'
- en: Example 4 – fostering a culture of innovation by nurturing citizen developers
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 案例4 - 通过培养公民开发者来培养创新文化
- en: 'The SMART goal is to nurture and empower 50 new citizen developers within the
    next 12 months by providing training, resources, and mentorship, resulting in
    at least 15 new apps built that solve specific departmental challenges:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: SMART目标是在接下来的12个月内通过提供培训、资源和导师制来培养和赋权50名新的公民开发者，从而至少构建15个解决特定部门挑战的新应用程序：
- en: '**Specific**: Focus on nurturing 50 new citizen developers and empowering them
    to create 15 new apps that address department-specific problems'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体性**：专注于培养50名新的公民开发者，并赋予他们创建15个解决特定部门问题的应用程序的能力'
- en: '**Measurable**: Track the number of new developers trained and the number of
    apps developed'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可衡量性**：跟踪培训的新开发者和开发的应用程序数量'
- en: '**Achievable**: Provide comprehensive training programs, mentorship, and resources
    to encourage participation'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可达成性**：提供全面的培训计划、导师制和资源，以鼓励参与'
- en: '**Relevant**: Aligns with the broader goal of fostering innovation and reducing
    reliance on IT by encouraging citizen development'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相关性**：与培养创新和减少对IT的依赖的更广泛目标保持一致，通过鼓励公民开发来实现'
- en: '**Time-bound**: Achieve the goal within a 12-month period'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时限性**：在12个月内实现目标'
- en: 'The following are the KPI benchmarks:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些关键绩效指标基准：
- en: '**Baseline**: Number of current active citizen developers in the organization'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基线**：组织当前活跃的公民开发者数量'
- en: '**Target**: 50 new citizen developers by the end of 12 months'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：在12个月结束时达到50名新的公民开发者'
- en: '**Measure**: Number of apps successfully developed and deployed by new developers,
    tracked through Power Platform’s governance dashboard'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**衡量指标**：通过Power Platform的治理仪表板跟踪的新开发者成功开发和部署的应用程序数量'
- en: '**Practical example**: A manufacturing company aiming to foster innovation
    set a SMART goal to nurture 50 new citizen developers within a year. Through targeted
    training sessions, regular workshops, and assigning department mentors, they empowered
    non-technical employees to build apps that addressed operational inefficiencies,
    such as inventory management and employee scheduling. By the end of the year,
    20 new apps were successfully deployed, streamlining internal processes and reducing
    the workload of the IT department, showcasing how nurturing citizen developers
    drive innovation and self-sufficiency across the organization.'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: '**实际案例**：一家旨在培养创新精神的制造公司设定了一个SMART目标，即在一年的时间内培养50名新的公民开发者。通过有针对性的培训课程、定期的工作坊和分配部门导师，他们赋予了非技术员工构建解决运营效率问题（如库存管理和员工排班）的应用程序的能力。到年底，成功部署了20个新应用程序，简化了内部流程，并减少了IT部门的工作量，展示了培养公民开发者如何推动组织内的创新和自给自足。'
- en: Setting and achieving SMART goals for citizen development is not only a strategic
    necessity but also a catalyst for fostering innovation and operational efficiency
    within an organization. By establishing clear benchmarks, providing necessary
    resources, and tracking progress meticulously, companies can transform non-technical
    employees into empowered developers, driving substantial business value. This
    structured approach ensures that the adoption of Power Platform aligns with broader
    organizational objectives and paves the way for sustainable growth and self-sufficiency.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 设定和实现公民开发的SMART目标不仅是一个战略需求，而且是培养组织内部创新和运营效率的催化剂。通过建立明确的基准、提供必要的资源并细致跟踪进度，公司可以将非技术员工转变为赋权的开发者，从而创造巨大的商业价值。这种结构化方法确保了Power
    Platform的采用与更广泛的组织目标保持一致，并为可持续增长和自给自足铺平了道路。
- en: Summary
  id: totrans-182
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we took a deep dive into the critical components necessary
    for defining, tracking, and measuring the success of Power Platform adoption.
    The chapter provided a comprehensive framework for establishing a strategic roadmap,
    setting SMART goals, and aligning KPIs with organizational objectives. These steps
    are essential to ensure that Power Platform initiatives not only drive measurable
    outcomes but also contribute to long-term business transformation.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们深入探讨了定义、跟踪和衡量Power Platform采用成功所必需的关键组件。本章提供了一个建立战略路线图、设定SMART目标和将关键绩效指标与组织目标对齐的全面框架。这些步骤对于确保Power
    Platform项目不仅产生可衡量的成果，而且有助于长期业务转型至关重要。
- en: Throughout this journey, we emphasized the importance of leveraging tools such
    as the CoE Starter Kit. This toolkit plays a key role in helping organizations
    assess their current maturity level, monitor their progress, and provide the necessary
    governance to scale Power Platform adoption across the enterprise.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个旅程中，我们强调了利用诸如CoE启动套件等工具的重要性。这个工具包在帮助组织评估其当前成熟度水平、监控其进度，并为在整个企业中扩展Power Platform采用提供必要的治理方面发挥着关键作用。
- en: In this next chapter, we will explore how to track progress beyond the initial
    milestones and delve deeper into maintaining momentum. You will learn how to sustain
    the value of Power Platform initiatives through careful monitoring, periodic adjustments,
    and ensuring that goals remain relevant as your organization continues its digital
    transformation journey.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何跟踪超越初始里程碑的进度，并深入了解如何保持动力。你将学习如何通过仔细监控、定期调整，并确保目标随着你的组织继续其数字化转型之旅而保持相关性，来维持Power
    Platform项目的价值。
- en: In essence, the next chapter will empower you to go beyond setting metrics by
    showing you how to **track**, **evaluate**, and **sustain** your Power Platform
    success over time, ensuring it drives continuous value to your organization.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，下一章将赋予你超越设定指标的能力，通过展示如何**跟踪**、**评估**和**维持**你的Power Platform成功，确保它为你的组织带来持续的价值。
