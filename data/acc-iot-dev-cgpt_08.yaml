- en: Code example
  id: totrans-426
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码示例
- en: Visit our GitHub repository at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_9/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_9/main.cpp)
    for an illustrative code sample. In this example, we use an `isMoistureOn()` Boolean
    function to read the digital value from the soil moisture sensor. A `HIGH` value
    indicates no moisture detected, while a `LOW` value means moisture is detected.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 访问我们的GitHub仓库[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_9/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_9/main.cpp)，以获取示例代码。在这个例子中，我们使用了一个`isMoistureOn()`布尔函数来读取土壤湿度传感器的数字值。`HIGH`值表示未检测到湿度，而`LOW`值表示检测到湿度。
- en: In this project, we used a soil moisture sensor to measure moisture levels in
    the soil. We read the sensor’s digital pin and interpreted the results, which
    allowed us to monitor soil moisture and respond as needed. This process improved
    our skills in environmental monitoring and condition-based responses using digital
    sensors.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们使用土壤湿度传感器来测量土壤的湿度水平。我们读取传感器的数字引脚并解释结果，这使得我们能够监控土壤湿度并根据需要做出响应。这个过程提高了我们在使用数字传感器进行环境监控和基于条件的响应方面的技能。
- en: In our next project, we will use a magnetic field sensor to detect and report
    the presence of a magnetic field. This will continue to enhance our expertise
    in integrating different types of sensors for real-time monitoring and alert systems.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的下一个项目中，我们将使用磁场传感器来检测和报告磁场的存在。这将继续增强我们在实时监控和警报系统中集成不同类型传感器的专业知识。
- en: Project 10 – magnetic change detection
  id: totrans-430
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目10 – 磁场变化检测
- en: This project leverages the capabilities of the KY-003 sensor, a hall magnetic
    sensor module. This module is a key component in a variety of electronic projects,
    particularly those that involve Arduino platforms. The main functionality of the
    KY-003 sensor is to detect magnetic fields. It has a broad range of applications,
    from identifying the presence or absence of magnetic objects to measuring the
    exact position of a magnet. The sensor can also be used to count rotational objects
    when it is combined with magnets, a feature that is highly beneficial in several
    industrial and scientific contexts.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 该项目利用了KY-003传感器的功能，这是一个霍尔磁传感器模块。该模块是各种电子项目中的关键组件，尤其是那些涉及Arduino平台的项目。KY-003传感器的主要功能是检测磁场。它具有广泛的应用范围，从识别磁体的存在或不存在到测量磁体的精确位置。当与磁铁结合使用时，该传感器还可以用于计数旋转物体，这在许多工业和科学环境中非常有用。
- en: The KY-003 module incorporates a Hall effect sensor, a device that operates
    based on a fascinating principle. It generates a voltage difference across an
    electrical conductor when a magnetic field is applied perpendicular to the flow
    of current through the sensor. This voltage difference can be detected by a microcontroller,
    which is often an integral part of the system in which the sensor is embedded.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: KY-003模块集成了霍尔效应传感器，这是一种基于迷人原理工作的设备。当在垂直于传感器中电流流动方向施加磁场时，它会在电导体上产生电压差。这个电压差可以通过微控制器检测到，这通常是传感器嵌入的系统中的组成部分。
- en: The presence of a magnetic field is typically indicated by a change in the state
    of the sensor’s digital output pin. Depending on the design of the sensor and
    the nature of the magnet used, this pin may go `HIGH` or `LOW`. This change in
    state provides a clear, binary signal that can be used to trigger other components
    or processes within the system.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 磁场存在通常通过传感器数字输出引脚的状态变化来指示。根据传感器的设计和使用的磁铁的性质，此引脚可能变为 `HIGH` 或 `LOW`。这种状态变化提供了一个清晰、二进制的信号，可以用于触发系统中的其他组件或过程。
