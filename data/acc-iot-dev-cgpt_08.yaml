  type: TYPE_NORMAL
  zh: '`打印当前值、蜂鸣器开/关状态和` `LED颜色`'
- en: Code example
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码示例
- en: 'An example of the `main.cpp` code can be found at the following link: [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_3/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_3/main.cpp).'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '`main.cpp`代码的示例可以在以下链接找到：[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_3/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_3/main.cpp)。'
- en: 'In this example code, we continue to use the same three functions from *Projects
    1* and *2*:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例代码中，我们继续使用来自*项目1*和*项目2*的相同三个函数：
- en: '`void updateIndicatorStatus()`'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void updateIndicatorStatus()`'
- en: '`void beepBuzzerAlert()`'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void beepBuzzerAlert()`'
- en: '`void printSystemStatus()`'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void printSystemStatus()`'
- en: Additionally, we introduce a Boolean function, `isPIROn()`, to read the digital
    value (`HIGH` for motion detected or `LOW` for no motion detected) from the PIR
    sensor. This function returns the comparison result as `true` or `false`, simplifying
    the logic for determining the system’s response to motion detection.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们引入了一个布尔函数`isPIROn()`，从PIR传感器读取数字值（检测到运动时为`HIGH`，未检测到运动时为`LOW`）。此函数将比较结果返回为`true`或`false`，简化了确定系统对运动检测响应的逻辑。
- en: In this project, we successfully used the PIR sensor to detect motion by examining
    its digital output. This allowed us to indicate motion detection through an LED
    and a buzzer, reinforcing our ability to handle digital sensor readings and implement
    responsive alerts.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们成功使用PIR传感器通过检查其数字输出来检测运动。这使得我们能够通过LED和蜂鸣器指示运动检测，加强了我们处理数字传感器读数和实现响应式警报的能力。
- en: In the next project, we will extend this approach to a gas sensor. By reading
    the digital value from the gas sensor, we will design a system to alert us if
    any gas is detected, continuing to build your expertise in real-time monitoring
    and alert systems using various sensors and ESP32.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个项目中，我们将扩展这种方法到气体传感器。通过从气体传感器读取数字值，我们将设计一个系统来在检测到任何气体时提醒我们，继续构建您在实时监控和警报系统方面的专业知识，使用各种传感器和ESP32。
- en: Project 4 – gas detection
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目4 – 气体检测
- en: This project adopts an MQ-2 sensor, a sensor that has garnered widespread acceptance
    and use in the field of gas detection equipment due to its robust capabilities.
    The MQ-2 sensor is not only capable but also highly proficient in detecting an
    extensive variety of gases. These include **liquefied petroleum gas** (**LPG**),
    i-butane, propane, methane, alcohol, hydrogen, and even smoke.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 本项目采用 MQ-2 传感器，该传感器因其强大的功能在气体检测设备领域得到了广泛认可和使用。MQ-2 传感器不仅能够检测广泛的气体，而且在这方面非常熟练。这些包括
    **液化石油气**（**LPG**）、异丁烷、丙烷、甲烷、酒精、氢气，甚至烟雾。
- en: This wide range of detection capabilities makes the MQ-2 sensor an incredibly
    versatile tool. It’s not just the variety of gases the sensor can detect that
    separates it from the rest, but also its speed and sensitivity. The sensor is
    highly regarded for its rapid response time, a feature that is particularly valuable
    in critical situations where time is of the essence. Furthermore, its high sensitivity
    allows for the detection of even minute amounts of gas, which can be crucial in
    preventing potential hazards.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这种广泛的检测能力使 MQ-2 传感器成为一个极其多才多艺的工具。它不仅因其能检测的气体种类多样而与其他传感器区分开来，还因其速度和灵敏度。该传感器因其快速响应时间而备受推崇，这一特性在时间至关重要的关键情况下尤其有价值。此外，其高灵敏度允许检测到即使是微量的气体，这在预防潜在危险中可能至关重要。
- en: Given these unique attributes, the MQ-2 sensor is an ideal choice for myriad
    safety applications, especially those where the detection of gas leakage is of
    paramount importance.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些独特的属性，MQ-2 传感器是众多安全应用的理想选择，尤其是在气体泄漏检测至关重要的场合。
- en: Specifications
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规格
- en: '| **Specification** | **Description** |'
  id: totrans-198
  prefs: []
  type: TYPE_TB
  zh: '| **规格** | **描述** |'
- en: '| --- | --- |'
  id: totrans-199
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Interface | 4 pins, VCC, GND, analog output (A0) and digital output (D0)
    |'
  id: totrans-200
  prefs: []
  type: TYPE_TB
  zh: '| 接口 | 4 个引脚，VCC、GND、模拟输出（A0）和数字输出（D0） |'
- en: '| Output type | Analog voltage output proportional to gas concentration and
    digital output by `HIGH` for gas detection and `LOW` for no gas detection |'
  id: totrans-201
  prefs: []
  type: TYPE_TB
  zh: '| 输出类型 | 模拟电压输出与气体浓度成正比，气体检测时以 `HIGH` 输出，无气体检测时以 `LOW` 输出 |'
- en: '| Operating voltage | 5 V |'
  id: totrans-202
  prefs: []
  type: TYPE_TB
  zh: '| 工作电压 | 5 V |'
- en: '| Operating temperature | -20 °C to 50 °C |'
  id: totrans-203
  prefs: []
  type: TYPE_TB
  zh: '| 工作温度 | -20 °C 到 50 °C |'
- en: '| Target gases | LPG, i-butane, propane, methane, alcohol, hydrogen, and smoke
    |'
  id: totrans-204
  prefs: []
  type: TYPE_TB
  zh: '| 目标气体 | 液化石油气（LPG）、异丁烷、丙烷、甲烷、酒精、氢气和烟雾 |'
- en: '| Detection range | Approximately 300 to 10,000 **parts per million** (**ppm**)
    for various gases |'
  id: totrans-205
  prefs: []
  type: TYPE_TB
  zh: '| 检测范围 | 对于各种气体，大约为 300 到 10,000 **百万分之一**（**ppm**） |'
- en: '| Preheat duration | Around 20 seconds to 1 minute for initial heating |'
  id: totrans-206
  prefs: []
  type: TYPE_TB
  zh: '| 预热时间 | 初始加热大约需要 20 秒到 1 分钟 |'
- en: '| Load resistance | Adjustable, typically around 5 KΩ |'
  id: totrans-207
  prefs: []
  type: TYPE_TB
  zh: '| 负载电阻 | 可调，通常约为 5 KΩ |'
- en: '| Heater consumption | Approximately 800 mW |'
  id: totrans-208
  prefs: []
  type: TYPE_TB
  zh: '| 加热器功耗 | 大约 800 mW |'
- en: Analog output values
  id: totrans-209
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模拟输出值
- en: '| Clean air | The output voltage in clean air (baseline) might be around 1
    V to 1.5 V. |'
  id: totrans-210
  prefs: []
  type: TYPE_TB
  zh: '| 清洁空气 | 在清洁空气（基准值）中的输出电压可能约为 1 V 到 1.5 V。 |'
- en: '| --- | --- |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Low gas concentration | A slight increase in gas concentration might increase
    the voltage slightly above the baseline level. For instance, detecting low levels
    of methane might result in output voltages in the range of 1.5 V to 2.5 V. |'
  id: totrans-212
  prefs: []
  type: TYPE_TB
  zh: '| 低浓度气体 | 气体浓度轻微增加可能会使电压略微高于基准水平。例如，检测低浓度的甲烷可能会导致输出电压在 1.5 V 到 2.5 V 的范围内。
    |'
- en: '| High gas concentration | In the presence of high concentrations of combustible
    gas, the output voltage could approach the maximum operating voltage of the sensor
    (close to 5 V for a 5V supply). |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '| 高浓度气体 | 在可燃气体高浓度存在的情况下，输出电压可能接近传感器的最大工作电压（对于 5V 供电，接近 5 V）。 |'
- en: Applications
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用
- en: '**Gas leak detectors**: For residential or commercial environments to detect
    dangerous gas leaks'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**气体泄漏检测器**：用于住宅或商业环境检测危险气体泄漏'
- en: '**Air quality monitoring**: To monitor the presence and concentration of various
