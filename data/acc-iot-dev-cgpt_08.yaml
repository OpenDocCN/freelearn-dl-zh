  zh: '**消费产品**：在玩具和消费电子产品中用作基本输入设备或检测部件连接或组装时'
- en: '**Industrial machinery**: Used as limit switches to detect the presence or
    position of machine components for safety and control'
  id: totrans-371
  prefs:
