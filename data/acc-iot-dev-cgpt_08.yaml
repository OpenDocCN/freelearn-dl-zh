  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DIY 项目**：在涉及气体检测和环境监测的 DIY 电子产品项目中很受欢迎'
- en: '**Safety alarms**: Integrated into safety systems to trigger alarms in the
