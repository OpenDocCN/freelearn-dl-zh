  prefs: []
  type: TYPE_NORMAL
  zh: 角色、任务和输出预期将与第一个项目中的相同。其他方面如下：
- en: '`Objective:`'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：`'
- en: '`Create a clear and instructive code example for ESP32-C3 that accomplishes`
    `the following:`'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '`为ESP32-C3创建一个清晰且具有指导性的代码示例，以实现以下功能：`'
- en: '`Reads the digital value (HIGH or LOW) from HC-SR501 every` `3 seconds`'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`每3秒从HC-SR501读取数字值（HIGH或LOW）`'
- en: '`Beeps the piezo buzzer and changes the LED color to indicate motion` `is detected`'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`蜂鸣器蜂鸣并改变LED颜色以指示检测到运动`'
- en: '`Requirements:`'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '`要求：`'
- en: '`Use PlatformIO as` `your IDE`'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用PlatformIO作为` `您的IDE`'
- en: '`Connect ESP32 GPIO 0 to the signal out output pin` `of HC-SR501`'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将ESP32 GPIO 0连接到HC-SR501的信号输出引脚`'
- en: '`Connect ESP32 GPIO 2, 3, 10 to the R/G/B pins of a` `3-color LED`'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将ESP32 GPIO 2、3、10连接到` `3色LED` `的R/G/B引脚`'
- en: '`Connect ESP32 GPIO 11 to the signal pin of the` `piezo buzzer`'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将ESP32 GPIO 11连接到` `蜂鸣器的信号引脚`'
- en: '`Use PWM to control the piezo buzzer and the` `three-color LED`'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用PWM控制蜂鸣器和三色LED`'
- en: '`If the value is HIGH, which indicates a motion is detected, beep the piezo
    buzzer and change the LED color` `to red`'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果值为HIGH，表示检测到运动，则蜂鸣蜂鸣器并改变LED颜色` `为红色`'
- en: '`If the value is LOW, which indicates no motion is detected, mute the piezo
    buzzer and maintain the LED color` `to green`'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果值为LOW，表示未检测到运动，则静音蜂鸣器并保持LED颜色` `为绿色`'
- en: '`Print the current value, beep on/off status, and` `LED color`'
  id: totrans-183
  prefs:
