- en: Project 1 – temperature and humidity measurement
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目 1 – 温度和湿度测量
- en: 'This project makes use of a DHT11 sensor, a digital sensor that is both compact
    and affordable. The DHT11 sensor is commonly utilized in a diverse range of applications.
    These applications range from hobbyist projects created by individuals in their
    personal time, to larger-scale consumer electronics that are widely available
    on the market. The DHT11 sensor is a versatile device that combines multiple functions
    into one compact unit: it contains a thermistor for the purpose of measuring temperature
    and a capacitive humidity sensor to gauge humidity levels. These two components
    work in conjunction to provide comprehensive environmental data. Moreover, the
    DHT11 sensor is also equipped with a high-performance 8-bit microcontroller. This
    microcontroller enables the DHT11 sensor to offer reliable and accurate readings.
    Furthermore, the DHT11 sensor presents these readings via a simple digital interface,
    making it an accessible option for many users, regardless of their level of technical
    proficiency.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 此项目利用了 DHT11 传感器，这是一种既紧凑又经济的数字传感器。DHT11 传感器广泛应用于各种应用。这些应用范围从个人在业余时间创建的爱好者项目，到市场上广泛可用的更大规模的消费电子产品。DHT11
    传感器是一种多功能的设备，将多个功能集成到一个紧凑的单元中：它包含一个热敏电阻用于测量温度，一个电容式湿度传感器用于测量湿度水平。这两个组件协同工作，提供全面的环境数据。此外，DHT11
    传感器还配备了一个高性能的 8 位微控制器。这个微控制器使得 DHT11 传感器能够提供可靠和准确的读数。此外，DHT11 传感器通过简单的数字接口呈现这些读数，使其成为许多用户可访问的选择，无论他们的技术水平如何。
- en: Specifications
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规格
- en: '| **Specification** | **Description** |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| **规格** | **描述** |'
- en: '| --- | --- |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Interface | 3 pins, VCC, GND, and signal output |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| 接口 | 3 个引脚，VCC、GND 和信号输出 |'
- en: '| Operating voltage | 3.3 V to 5 V |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| 工作电压 | 3.3 V 至 5 V |'
- en: '| Operating current | 2.5 mA on measuring, 60 uA on standby |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 工作电流 | 测量时 2.5 mA，待机时 60 uA |'
- en: '| Operating temperature | 0 °C to 50 °C |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 工作温度 | 0 °C 至 50 °C |'
- en: '| Temperature measuring range | 0 °C to 50 °C (32 °F to 122 °F) with a ±2 °C
    accuracy |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 温度测量范围 | 0 °C 至 50 °C（32 °F 至 122 °F），精度 ±2 °C |'
- en: '| Humidity measuring range | 20 % to 90 % **relative humidity** (**RH**) with
    ±5 % RH accuracy |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 湿度测量范围 | 20 % 至 90 % **相对湿度**（**RH**），精度 ±5 % RH |'
- en: '| Resolution | Temperature: 1 °C; humidity: 1 % RH |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 分辨率 | 温度：1 °C；湿度：1 % RH |'
- en: '| Sampling rate | Once every second |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 采样率 | 每秒一次 |'
- en: '| Arduino library | DHT.h |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| Arduino 库 | DHT.h |'
- en: Applications
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用
- en: '**Home environment monitoring**: For DIY weather stations or indoor climate
    monitoring systems'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**家庭环境监控**：用于 DIY 气象站或室内气候监控系统'
- en: '**Educational projects**: Ideal for teaching the basics of sensor integration
    and environmental monitoring'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育项目**：非常适合教授传感器集成和环境监测的基础知识'
- en: '**Agriculture and gardening**: To monitor greenhouse or soil conditions'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**农业和园艺**：用于监测温室或土壤条件'
- en: '**Home automation**: Can be integrated into systems for controlling **heating,
    ventilation, and air conditioning** (**HVAC**) based on temperature and humidity
    levels'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能家居自动化**：可以根据温度和湿度水平集成到控制**供暖、通风和空调**（**HVAC**）的系统'
- en: Prompt to ChatGPT
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向 ChatGPT 发送提示
- en: '`Role:`'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '`角色：`'
- en: '`Act as a senior software developer specializing in embedded C++ development.
    Your expertise includes IoT projects using the ESP32 chip, Arduino-compatible
    sensors, and the` `PlatformIO IDE.`'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '`担任专注于嵌入式 C++ 开发的资深软件开发人员。您的专业知识包括使用 ESP32 芯片、Arduino 兼容传感器和` `PlatformIO IDE`
    `的物联网项目。`'
- en: '`Task:`'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：`'
- en: '`As a mentor who educates a high school student and has a basic understanding
    of Python but is new to C++, your C++ code snippet should be instructional and
    meet the specified objectives and requirements, catering to a` `beginner''s level.`'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`作为一名教育高中生并具备基本 Python 知识但 C++ 新手的导师，您的 C++ 代码片段应具有指导性，并满足指定的目标和要求，面向` `初学者水平。`'
- en: '`Objective:`'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：`'
- en: '`Create a clear and instructive code example for ESP32 C3 that accomplishes`
    `the following:`'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '`为 ESP32 C3 创建一个清晰且具有指导性的代码示例，以完成以下任务：`'
- en: '`Reads the temperature and humidity values from the DHT11 sensor every 3 seconds,
    and compares the values to a` `predefined range`'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`每 3 秒从 DHT11 传感器读取温度和湿度值，并将这些值与` `预定义的范围` `进行比较`'
- en: '`Beeps the piezo buzzer and changes the LED color to indicate an` `abnormal
    situation`'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`蜂鸣器发出蜂鸣声并改变 LED 颜色以指示` `异常情况`'
- en: '`Requirements:`'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '`要求：`'
- en: '`Use PlatformIO as` `your IDE`'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 PlatformIO 作为` `您的 IDE`'
- en: '`Connect ESP32 GPIO 0 to the signal output pin` `of DHT11`'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 0 连接到 DHT11 的信号输出引脚`'
- en: '`Connect ESP32 GPIO 2, 3, 10 to the R/G/B pins of a` `3-color LED`'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 2、3、10 连接到三色 LED 的 R/G/B 引脚`'
- en: '`Connect ESP32 GPIO 11 to the signal pin of the` `piezo buzzer`'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 的 GPIO 11 连接到` `蜂鸣器的信号引脚`'
- en: '`Use Pulse-Width Modulation (PWM) to control the piezo buzzer and the` `three-color
    LED`'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用脉冲宽度调制 (PWM) 控制蜂鸣器和` `三色 LED`'
- en: '`The LED turns to a steady green color when the temperature falls between 15°C
    to 30°C and humidity between 10 % to` `80 %`'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`当温度在 15°C 到 30°C 之间且湿度在 10 % 到` `80 %` 之间时，LED 会变为稳定的绿色`'
- en: '`The LED turns to a steady red color when the temperature exceeds 30 °C or
    the humidity is over 80 %, and beeps fast-paced, high-pitch` `buzzer alerts`'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`当温度超过 30 °C 或湿度超过 80 % 时，LED 会变为稳定的红色，并且会发出快速、高音调的` `蜂鸣器警报`'
- en: '`The LED turns to a steady blue color when the temperature is below 15 °C or
    humidity is less than 10 %, and beeps fast-paced, high-pitch` `buzzer alerts`'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`当温度低于 15 °C 或湿度低于 10 % 时，LED 会变为稳定的蓝色，并且会发出快速、高音调的` `蜂鸣器警报`'
- en: '`Print the current value temperature, humidity value, LED color, and beep`
    `on/off status`'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`打印当前温度值、湿度值、LED 颜色和蜂鸣器开/关状态`'
- en: '`This is what we expect from` `the output:`'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '`这是我们期望的输出：`'
- en: '`Structure your output code snippets in the following order: import libraries,
    constants and variable declaration, hardware initial settings, functions initial
    declaration, setup function, main loop function, and` `functions definition.`'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`按照以下顺序结构化您的输出代码片段：导入库、常量和变量声明、硬件初始设置、函数初始声明、设置函数、主循环函数和` `函数定义。`'
- en: '`Provide detailed comments to each code line` `for clarity.`'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`为每行代码提供详细的注释以增强可读性。`'
- en: '`Apply C++ programming best practices to this code snippet complying with the`
    `following rules:`'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 C++ 编程最佳实践应用于此代码片段，并遵守以下规则：`'
- en: '`Code simplicity: Apply readability and simplicity over-complicated solutions.
    Refactor large functions into smaller, more` `manageable pieces.`'
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`代码简洁性：优先考虑可读性和简洁性，避免过度复杂的解决方案。将大型函数重构为更小、更` `易于管理的部分。`'
- en: '`Consistency: Adhere to a consistent code style in your project, such as indentation,
    bracket placement, and` `whitespace usage.`'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`一致性：在您的项目中坚持一致的代码风格，例如缩进、括号放置和` `空白符的使用。`'
- en: '`Naming conventions: Use camelCase for variables and functions definition,
    and PascalCase for` `class names.`'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`命名约定：使用 camelCase 为变量和函数定义命名，并使用 PascalCase 为` `类名命名。`'
- en: '`Modularization: Split the code into logical modules or components, such as
    function or class, each handling a specific part of the` `program''s functionality.`'
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`模块化：将代码拆分为逻辑模块或组件，例如函数或类，每个处理程序的功能的特定部分。`'
- en: '`Error handling: Ensure exception safety and check the` `return value.`'
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`错误处理：确保异常安全并检查` `返回值。`'
- en: Code example
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '`代码示例`'
- en: 'The `main.cpp` example code is at the following link: [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_1/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_1/main.cpp).'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '`main.cpp` 示例代码位于以下链接：[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_1/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_1/main.cpp)。'
- en: 'In this example code, as we instructed, ChatGPT created the following four
    functions:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例代码中，正如我们指示的，ChatGPT 创建了以下四个函数：
- en: '`void readDHTSensor()`: This reads the sensor’s output data, such as temperature
    in Celsius and Fahrenheit and humidity'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void readDHTSensor()`: 这读取传感器的输出数据，例如摄氏度和华氏度的温度以及湿度'
- en: '`void updateIndicatorStatus()`: This changes the color of the LED and calls
    the `Buzzer` beep function according to the comparison of actual data to the predefined
    data range'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void updateIndicatorStatus()`: 根据实际数据与预定义数据范围的比较，更改 LED 的颜色并调用 `Buzzer` 蜂鸣函数'
- en: '`void beepBuzzerAlert()`: Beeps the on/off buzzer'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void beepBuzzerAlert()`: 使蜂鸣器发出开/关警报'
- en: '`void printSystemStatus()`: This prints out the current sensor data, the LED’s
    color, and the buzzer on/off status in each loop'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void printSystemStatus()`: 这在每个循环中打印出当前传感器数据、LED 的颜色和蜂鸣器的开/关状态'
- en: In [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302), there is an instruction
    to use PlatformIO to compile and upload code in ESP32; you can follow that instruction
    to validate this example code to observe if these four functions fully meet our
    requirements.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [*第 11 章*](B22002_11.xhtml#_idTextAnchor302) 中，有使用 PlatformIO 编译和上传 ESP32
    代码的说明；您可以遵循该说明来验证此示例代码，以观察这四个函数是否完全满足我们的要求。
- en: In this project, we periodically read data from the DHT11 sensor to monitor
    temperature and humidity data. By comparing these readings to predefined ranges,
    we utilize an RGB LED and a piezo buzzer to visually and audibly indicate the
    status. This process helps in understanding how to handle sensor data and respond
    to different conditions using basic components and C++ programming.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在此项目中，我们定期从 DHT11 传感器读取数据以监控温度和湿度数据。通过将这些读数与预定义的范围进行比较，我们使用 RGB LED 和压电蜂鸣器进行视觉和听觉指示。这个过程有助于了解如何处理传感器数据并使用基本组件和
    C++ 编程响应不同的条件。
- en: Building on this foundation, our next project will focus on flame detection.
    We will design a similar code structure to read digital values from a flame sensor
    pin and apply the same approach to indicate the presence of flame using LEDs and
    a buzzer. This will further enhance your skills in integrating sensors and actuators
    in embedded systems while reinforcing the principles of condition-based responses
    in IoT applications.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个基础上，我们的下一个项目将专注于火焰检测。我们将设计类似的代码结构来读取火焰传感器引脚的数字值，并使用相同的方法通过 LED 和蜂鸣器指示火焰的存在。这将进一步提高您在嵌入式系统中集成传感器和执行器的技能，同时加强物联网应用中基于条件的响应原则。
- en: Project 2 – flame detection
  id: totrans-87
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目 2 – 火焰检测
- en: This project utilizes the KY-026 module, a sophisticated flame detection module
    specifically designed for use with Arduino and a variety of other microcontrollers.
    The primary function of this module is to detect the infrared light that is typically
    emitted by fire.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 此项目使用 KY-026 模块，这是一个专为与 Arduino 和其他各种微控制器一起使用而设计的复杂火焰检测模块。该模块的主要功能是检测火焰通常发出的红外光。
- en: At the heart of the KY-026 module is the YG1006 sensor. This is a **negative-positive-negative**
    (**NPN**) silicon phototransistor that is known for its high-speed performance
    and remarkable sensitivity. These characteristics allow it to rapidly and accurately
    detect the presence of fire or excessive heat.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: KY-026 模块的核心是 YG1006 传感器。这是一个以高速性能和卓越灵敏度著称的 **负-正-负** （**NPN**） 硅光电晶体管。这些特性使其能够快速准确地检测火灾或过热的存在。
- en: One of the key features of this module is its dual output capability, offering
    both digital and analog outputs. This dual function allows users to select the
    most appropriate output for their specific application, providing a high level
    of flexibility in usage.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 该模块的一个关键特性是其双输出功能，提供数字和模拟输出。这种双重功能使用户能够为特定应用选择最合适的输出，提供高度灵活的使用方式。
- en: The KY-026 module finds applications in an impressively wide range of scenarios
    that require fire or heat detection. For instance, it can be integrated into safety
    systems in residential environments, providing an additional level of security
    against fire hazards. In industrial settings, it can be used to monitor and control
    equipment that operates at high temperatures, thus preventing potential accidents.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: KY-026 模块在需要火焰或热检测的广泛场景中都有应用。例如，它可以集成到住宅环境的安全系统中，提供额外的防火安全级别。在工业环境中，它可以用于监控和控制高温运行的设备，从而防止潜在的事故。
- en: Specifications
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规格说明
- en: '| **Specification** | **Description** |'
  id: totrans-93
  prefs: []
  type: TYPE_TB
  zh: '| **规格** | **描述** |'
- en: '| --- | --- |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Interface | 4 pins, VCC, GND, analog output (A0) and digital output (DO)
    |'
  id: totrans-95
  prefs: []
  type: TYPE_TB
  zh: '| 接口 | 4 个引脚，VCC，GND，模拟输出（A0）和数字输出（DO） |'
- en: '| Output type | Analog output provides a continuous voltage that varies with
    the flame’s intensity, and digital output provides `LOW` for no flame detected,
    and `HIGH` for a flame detected |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
  zh: '| 输出类型 | 模拟输出提供随火焰强度变化的连续电压，数字输出在未检测到火焰时提供 `LOW`，检测到火焰时提供 `HIGH` |'
- en: '| Operating voltage | 3.3 V to 5 V |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
  zh: '| 工作电压 | 3.3 V 至 5 V |'
- en: '| Operating current | Very low |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
  zh: '| 工作电流 | 非常低 |'
- en: '| Operating temperature | -25 °C to +85 °C |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| 工作温度 | -25 °C 至 +85 °C |'
- en: '| Detection wavelength | 760 nm to 1100 nm |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
  zh: '| 检测波长 | 760 nm 至 1100 nm |'
- en: '| Detection angle | 60 degrees |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
  zh: '| 检测角度 | 60 度 |'
- en: Analog output values
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模拟输出值
- en: '| No flame detected | The analog value might be close to 1023 |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
  zh: '| 未检测到火焰 | 模拟值可能接近 1023 |'
- en: '| --- | --- |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Weak flame or far distance | Values might range in the upper mid-range, such
    as 600-800 |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| 弱火焰或远距离 | 值可能在较高中等范围内，例如 600-800 |'
- en: '| Moderate flame or medium distance | Mid-range values, such as 300-600 |'
  id: totrans-106
  prefs: []
  type: TYPE_TB
  zh: '| 中等火焰或中等距离 | 中等范围的值，例如 300-600 |'
- en: '| Strong flame or close proximity | Lower values, potentially below 300, indicate
    a strong flame or close proximity to the sensor |'
  id: totrans-107
  prefs: []
  type: TYPE_TB
  zh: '| 强烈火焰或接近传感器 | 较低的值，可能低于 300，表示强烈的火焰或接近传感器 |'
- en: Applications
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '`应用：`'
- en: '**Fire alarm systems**: For DIY fire alarm systems that trigger an alert or
    take action when a flame is detected'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**火灾报警系统**：用于 DIY 火灾报警系统，在检测到火焰时触发警报或采取行动'
- en: '**Safety devices**: Integrated into safety devices to provide warnings or shut
    down systems in the presence of fire'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全设备**：集成到安全设备中，在出现火灾时提供警告或关闭系统'
- en: '**Environmental monitoring**: Used in environmental monitoring setups to detect
    fire outbreaks in monitored areas'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境监测**：用于环境监测设置中检测监控区域内的火灾爆发'
- en: '**Robotics**: In robotics projects for navigating or avoiding flames and high-temperature
    areas'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器人技术**：在机器人项目中用于导航或避开火焰和高温区域'
- en: Prompt to ChatGPT
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向 ChatGPT 发送提示
- en: 'The role, task, and output expectation will be the same as the first project
    here:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '`角色、任务和输出预期将与第一个项目相同：`'
- en: '`Role:`'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '`角色：`'
- en: '`Act as a senior software developer specializing in embedded C++ development.
    Your expertise includes IoT projects using the ESP32 chip, Arduino-compatible
    sensors, and the` `PlatformIO IDE.`'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '`扮演一位专注于嵌入式 C++ 开发的资深软件开发者。您的专业知识包括使用 ESP32 芯片、Arduino 兼容传感器和` `PlatformIO
    IDE` `的物联网项目。`'
- en: '`Task:`'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：`'
- en: '`As a mentor who educates a high school student and has a basic understanding
    of Python but is new to C++, your C++ code snippet should be instructional and
    meet the specified objectives and requirements, catering to a` `beginner''s level.`'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '`作为一名教育高中生并具备 Python 基础知识但 C++ 新手的导师，您的 C++ 代码片段应具有指导性，满足指定的目标和要求，面向` `初学者水平。`'
- en: '`Objective:`'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：`'
- en: '`Create a clear and instructive code example for ESP32-C3 that accomplishes`
    `the following:`'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '`为 ESP32-C3 创建一个清晰且具有指导性的代码示例，以实现以下功能：`'
- en: '`Reads the digital value (HIGH or LOW) from KY-026 every` `3 seconds`'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`每` `3 秒从 KY-026 读取数字值（HIGH 或 LOW）`'
- en: '`Beeps the piezo buzzer and changes the LED color to indicate flame` `is detected`'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`蜂鸣蜂鸣器并更改 LED 颜色以指示检测到火焰`'
- en: '`Requirements:`'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '`要求：`'
- en: '`Use PlatformIO as` `your IDE`'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 PlatformIO 作为` `您的 IDE`'
- en: '`Connect ESP32 GPIO 0 to the KY-026` `D0 pin`'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 0 连接到 KY-026 的` `D0 引脚`'
- en: '`Connect ESP32 GPIO 2, 3, 10 to the R/G/B pins of a` `3-color LED`'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 2、3、10 连接到` `3 色LED` `的 R/G/B 引脚`'
- en: '`Connect ESP32 GPIO 11 to the signal pin of the` `piezo buzzer`'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 11 连接到蜂鸣器的信号引脚`'
- en: '`Use PWM to control the piezo buzzer and the` `three-color LED`'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 PWM 控制蜂鸣器和` `三色 LED`'
- en: '`If the value is HIGH, which indicates the flame is detected, beep the piezo
    buzzer and change the LED color` `to red`'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果值为 HIGH，表示检测到火焰，则蜂鸣蜂鸣器并更改 LED 颜色为红色`'
- en: '`If the value is LOW, which indicates no flame is detected, mute the piezo
    buzzer and maintain the LED color` `to green`'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果值为 LOW，表示未检测到火焰，则静音蜂鸣器并保持 LED 颜色为绿色`'
- en: '`Print the current value, beep on/off status, and` `LED color`'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`打印当前值、蜂鸣器开/关状态和` `LED 颜色`'
- en: '`This is what we expect from` `the output`:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '`这是我们期望的输出：`'
- en: '`Structure your output code snippets in the following order: import libraries,
    constants and variable declaration, hardware initial settings, functions initial
    declaration, setup function, main loop function, and` `functions definition.`'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`按照以下顺序结构化您的输出代码片段：导入库、常量和变量声明、硬件初始设置、函数初始声明、设置函数、主循环函数和` `函数定义。`'
- en: '`Provide detailed comments to each code line` `for clarity.`'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`为每行代码提供详细的注释以增强清晰度。`'
- en: '`Apply C++ programming best practices to this code snippet complying with the`
    `following rules:`'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 C++ 编程最佳实践应用于此代码片段，遵守以下规则：`'
- en: '`Code simplicity: Apply readability and simplicity over-complicated solutions.
    Refactor large functions into smaller, more` `manageable pieces.`'
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`代码简洁性：在可读性和简洁性方面优于过度复杂的解决方案。将大型函数重构为更小、更易于管理的部分。`'
- en: '`Consistency: Adhere to a consistent code style in your project, such as indentation,
    bracket placement, and` `whitespace usage.`'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`一致性：在项目中保持一致的代码风格，例如缩进、括号放置和` `空白符使用。`'
- en: '`Naming conventions: Use camelCase for variables and functions definition,
    and PascalCase for` `class names.`'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`命名约定：使用 camelCase 定义变量和函数，以及 PascalCase 定义` `类名。`'
- en: '`Modularization: Split the code into logical modules or components, such as
    function or class, each handling a specific part of the` `program''s functionality.`'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`模块化：将代码拆分为逻辑模块或组件，例如函数或类，每个处理程序的功能的一部分。`'
- en: '`Error handling: Ensure exception safety and check the` `return value.`'
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`错误处理：确保异常安全并检查` `返回值。`'
- en: Code example
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码示例
- en: 'An example of the `main.cpp` code can be found at the following link: [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_2/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_2/main.cpp).'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 可以在以下链接找到 `main.cpp` 代码的示例：[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_2/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_2/main.cpp).
- en: 'In this example code, the following three functions were reused from the previous
    project:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例代码中，以下三个函数是从上一个项目中复用的：
- en: '`void updateIndicatorStatus()`'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void updateIndicatorStatus()`'
- en: '`void beepBuzzerAlert()`'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void beepBuzzerAlert()`'
- en: '`void printSystemStatus()`'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`void printSystemStatus()`'
- en: Instead of reading the analog value of the flame sensor, we use a new Boolean
    function, `isFlameOn()`, to read the digital value (`LOW` for no flame detected
    or `HIGH` for flame detected), and return the comparison result as `true` or `false`,
    simplifying the logic for determining the system’s response to the flame sensor’s
    output.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是读取火焰传感器的模拟值，而是使用一个新的布尔函数 `isFlameOn()` 来读取数字值（未检测到火焰为 `LOW` 或检测到火焰为 `HIGH`），并将比较结果作为
    `true` 或 `false` 返回，从而简化了确定系统对火焰传感器输出的响应逻辑。
- en: In this project, we effectively determined the presence of a flame by examining
    the digital value of the flame sensor pin in each loop period. This approach allowed
    us to use an LED and a buzzer to indicate whether a flame was detected, reinforcing
    our understanding of condition-based responses using digital sensor readings.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们通过检查每个循环周期中火焰传感器的数字引脚值，有效地确定了火焰的存在。这种方法使我们能够使用 LED 和蜂鸣器来指示是否检测到火焰，从而加强了我们使用数字传感器读数进行基于条件的响应的理解。
- en: Building on this knowledge, our next project will involve using a similar approach
    to read the digital value from a PIR motion sensor. This project aims to detect
    the presence of people or animals in front of the sensor, further enhancing your
    skills in integrating sensors for real-time monitoring and alert systems in IoT
    applications.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些知识，我们的下一个项目将涉及使用类似的方法从 PIR 运动传感器读取数字值。这个项目的目标是检测传感器前方是否存在人或动物，进一步提高你在物联网应用中集成传感器进行实时监控和警报系统的技能。
- en: Project 3 – PIR motion detection
  id: totrans-150
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目 3 – 红外线运动检测
- en: The project employs the HC-SR501, a PIR sensor that is engineered specifically
    for the purpose of detecting the presence of humans or animals. It achieves this
    through the utilization of infrared signals. The sensor offers two distinct operating
    modes, which are *Repeatable (H)* and *Non-Repeatable (L)*. These modes offer
    flexibility in terms of application and use. The sensor finds itself particularly
    well suited for a wide variety of applications, including but not limited to automatic
    lighting, security alarms, and industrial automation control.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 该项目使用 HC-SR501，这是一种专门为检测人类或动物存在而设计的 PIR 传感器。它通过利用红外信号来实现这一点。该传感器提供两种不同的工作模式，即
    *可重复（H）* 和 *不可重复（L）*。这些模式在应用和使用方面提供了灵活性。该传感器特别适合于各种应用，包括但不限于自动照明、安全警报和工业自动化控制。
- en: One of the standout features of this sensor is its wide temperature range capabilities.
    This means it can function effectively in a range of different environmental conditions.
    In addition to this, it also boasts low power consumption. This makes it an economical
    choice, particularly for long-term deployment. As such, it proves to be a versatile
    option for any motion detection requirements, delivering both efficiency and adaptability.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 该传感器的一个显著特点是它具有广泛的温度范围能力。这意味着它可以在各种不同的环境条件下有效地工作。此外，它还具有低功耗的特点。这使得它成为长期部署的经济选择。因此，它成为任何运动检测需求的灵活选择，提供效率和适应性。
