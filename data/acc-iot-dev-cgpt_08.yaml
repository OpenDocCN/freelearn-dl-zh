    you can find example code. The structure is exactly the same as in *Project 5*.
    It uses an `isVibrationOn()` Boolean function to read the digital value from the
    vibration sensor pin and then returns the result as `true` or `false`.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_7/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_7/main.cpp)
    可以找到示例代码。结构与 *项目 5* 完全相同。它使用 `isVibrationOn()` 布尔函数从振动传感器引脚读取数字值，然后返回 `true` 或
    `false` 的结果。
- en: In this project, we used the SW-420 vibration sensor to detect vibration status
    changes by reading its digital pin and interpreting the result. This method enabled
    us to detect vibrations and respond accordingly, further enhancing our understanding
    of condition-based responses using digital sensors.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们使用了 SW-420 振动传感器，通过读取其数字引脚并解释结果来检测振动状态的变化。这种方法使我们能够检测振动并相应地做出反应，进一步增强了我们对使用数字传感器进行基于条件的响应的理解。
- en: In the next project, we will use a switch sensor to detect collisions. This
    project will continue to build your skills in integrating various sensors for
    real-time monitoring and alert systems, using similar methods to sense and respond
    to collision events.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个项目中，我们将使用开关传感器来检测碰撞。这个项目将继续提高您在实时监控和警报系统中集成各种传感器的技能，使用类似的方法来感知和响应碰撞事件。
- en: Project 8 – collision detection
  id: totrans-356
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目 8 – 碰撞检测
- en: This project focuses on the concept of collision detection, an essential component
    in many fields and applications. The main feature of this project is the use of
    a switch sensor, which is also commonly known as a **bump switch**, a **mechanical
    switch**, or a **tactile switch**.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目侧重于碰撞检测的概念，这是许多领域和应用中的基本组成部分。这个项目的主要特点是使用开关传感器，它也通常被称为**碰撞开关**、**机械开关**或**触觉开关**。
- en: These types of switches are simple, yet highly effective, making them a popular
    choice for detecting physical contact or impact. They are widely used in various
    fields and applications, ranging from complex robotic systems to critical safety
    devices. The primary function of these switches is their ability to change states
    – from `ON` to `OFF` or vice versa – upon encountering any sort of physical force
    or obstruction.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 这些类型的开关简单而高效，因此成为检测物理接触或冲击的流行选择。它们在各个领域和应用中得到了广泛使用，从复杂的机器人系统到关键的安全设备。这些开关的主要功能是它们能够在遇到任何类型的物理力量或障碍时改变状态——从
    `ON` 到 `OFF` 或相反。
- en: This unique characteristic makes them exceptionally suitable for tasks requiring
    basic collision or proximity detection. Whether it is to prevent a robot from
    bumping into an obstacle or to trigger an alarm when a certain boundary is breached,
    these switches prove to be highly useful and reliable. The project aims to provide
    a comprehensive understanding of how to best use these switches in various practical
    scenarios.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 这种独特特性使它们非常适合需要基本碰撞或接近检测的任务。无论是防止机器人撞到障碍物还是当某个边界被越过时触发警报，这些开关都证明是非常有用和可靠的。该项目旨在全面了解如何在各种实际场景中最佳地使用这些开关。
