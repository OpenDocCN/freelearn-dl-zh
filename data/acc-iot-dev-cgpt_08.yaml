- en: Prompt to ChatGPT
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向ChatGPT发送提示
- en: 'The role, task, and output expectation will be the same as the first project
    here. The other aspects are as follows:'
