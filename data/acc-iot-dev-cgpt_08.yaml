- en: 'Visit our GitHub repository at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_8/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_8/main.cpp)
    for an illustrative code sample. In this example, we use the `isCollisionOn()`
    Boolean function to read the digital value. This function returns a Boolean: `true`
    for collision detected (when the digital value is `LOW`) and `false` for no collision
    (when the digital value is `HIGH`). This is a slight variation from previous projects.'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 访问我们的 GitHub 仓库以获取示例代码：[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_8/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_8/main.cpp)。在这个例子中，我们使用
    `isCollisionOn()` 布尔函数来读取数字值。此函数返回布尔值：检测到碰撞时返回 `true`（当数字值为 `LOW` 时），未检测到碰撞时返回
    `false`（当数字值为 `HIGH` 时）。这与之前的项目略有不同。
- en: In this project, we adopted a switch sensor to report collision status changes
    by reading its digital pin and interpreting the result. This method allowed us
    to detect collisions and respond accordingly, further enhancing our skills in
    condition-based responses using digital sensors.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们采用开关传感器通过读取其数字引脚并解释结果来报告碰撞状态的变化。这种方法使我们能够检测碰撞并相应地做出反应，进一步提高了我们使用数字传感器进行基于条件的响应的技能。
- en: In the next project, we will concentrate on monitoring soil moisture levels.
    We will integrate a soil moisture sensor to measure and report soil moisture,
    furthering our expertise in real-time environmental monitoring and alert systems
    using various sensors.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个项目中，我们将专注于监测土壤湿度水平。我们将集成土壤湿度传感器来测量和报告土壤湿度，进一步深化我们在使用各种传感器进行实时环境监测和警报系统方面的专业知识。
- en: Project 9 – soil moisture detection
  id: totrans-391
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目 9 – 土壤湿度检测
- en: In this project, we are utilizing a highly specialized soil moisture sensor
    to gather crucial data about the soil’s moisture content. The sensor’s mechanism
    is rooted in the concept of soil resistivity measurement. This technique is implemented
    by measuring the electrical resistance between two specifically designed probes
    that are carefully inserted into the soil.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们正在使用一种高度专业化的土壤湿度传感器来收集有关土壤水分含量的关键数据。该传感器的机制基于土壤电阻率测量的概念。这种技术通过测量两个特别设计的探针之间的电阻力来实现，这些探针被小心地插入土壤中。
- en: The relationship between the soil’s moisture content and its electrical resistance
    is quite fascinating. Essentially, the higher the moisture content in the soil,
    the lower the electrical resistance measured between the two probes. This is because
    water is a good conductor of electricity, and therefore, as the amount of water
    in the soil increases, it becomes easier for electricity to flow between the probes,
    thus reducing the measured resistance.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 土壤水分含量与其电阻力之间的关系非常有趣。本质上，土壤中的水分含量越高，两个探针之间测量的电阻力就越低。这是因为水是良好的导电体，因此，随着土壤中水的增加，电流在探针之间流动变得更容易，从而降低了测量的电阻。
- en: This inverse relationship forms the core working principle of the soil moisture
    sensor. By constantly monitoring the resistance levels, the sensor accurately
    gauges the amount of moisture present in the soil at any given moment. This information
    is critical for a range of applications, from agricultural practices to environmental
    monitoring and research. It allows for precise irrigation control, helps predict
    crop yields, and contributes to our understanding of soil health and its impact
    on plant growth.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 这种反向关系构成了土壤湿度传感器的工作原理核心。通过持续监测电阻水平，传感器可以准确地测量在任何给定时刻土壤中存在的湿度量。这些信息对于各种应用至关重要，从农业实践到环境监测和研究。它允许进行精确的灌溉控制，帮助预测作物产量，并有助于我们了解土壤健康及其对植物生长的影响。
