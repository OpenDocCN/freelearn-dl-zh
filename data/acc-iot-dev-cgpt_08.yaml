  type: TYPE_TB
  zh: '| 引脚 | 3 个引脚，VCC、GND 和数字输出（`HIGH`/`LOW`）|'
- en: '| Output type | `HIGH` when it detects a magnetic field and returns to `LOW`
    when the field is removed |'
  id: totrans-438
  prefs: []
  type: TYPE_TB
  zh: '| 输出类型 | 当检测到磁场时输出为`HIGH`，当磁场移除时返回`LOW` |'
- en: '| Operating voltage | 5 V |'
  id: totrans-439
  prefs: []
  type: TYPE_TB
  zh: '| 工作电压 | 5 V |'
- en: '| Operating temperature | 40 °C to 85 °C |'
  id: totrans-440
  prefs: []
  type: TYPE_TB
  zh: '| 工作温度 | 40 °C 至 85 °C |'
- en: '| Operating current | Very low |'
  id: totrans-441
  prefs: []
  type: TYPE_TB
  zh: '| 工作电流 | 非常低 |'
- en: Applications
  id: totrans-442
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用
- en: '**Magnetic field detection**: To sense the presence or absence of a magnetic
    field'
  id: totrans-443
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**磁场检测**：感知磁场的存在或不存在'
- en: '**Rotational speed measurement**: To count the number of rotations of a magnetic
    wheel or gear, useful in speedometers and rotational counters'
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转速测量**：用于计算磁轮或齿轮的旋转次数，适用于速度表和旋转计数器'
- en: '**Position sensing**: To determine the position of a magnet attached to a moving
    object, ideal for precision control in robotics'
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**位置感应**：用于确定附着在移动物体上的磁铁的位置，适用于机器人中的精确控制'
- en: '**Contactless switches**: To create a switch that activates in the presence
    of a magnetic field, useful in safety and security applications'
  id: totrans-446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非接触式开关**：创建一个在磁场存在时激活的开关，适用于安全和安保应用'
- en: Prompt to ChatGPT
  id: totrans-447
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向 ChatGPT 发送提示
- en: 'The role, task, and output expectation will be the same as the first project
    here. The other aspects are as follows:'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 角色任务和输出期望将与第一个项目相同。其他方面如下：
- en: '`Objective:`'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：`'
- en: '`Create a clear and instructive code example for ESP32-C3 that accomplishes`
    `the following:`'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: '`为 ESP32-C3 创建一个清晰且具有指导性的代码示例，以实现以下功能：`'
- en: '`Reads the digital value (HIGH or LOW) from the hall magnetic sensor every`
    `1 second`'
  id: totrans-451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`每` `1 秒`从霍尔磁传感器读取数字值（`HIGH` 或 `LOW`）|'
- en: '`Beeps the piezo buzzer and changes the LED color to indicate whether a magnetic
    field` `is detected`'
  id: totrans-452
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`蜂鸣器发出声音并将 LED 颜色改为红色以指示是否检测到磁场` |'
- en: '`Requirements:`'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: '`要求：`'
- en: '`Use PlatformIO as` `your IDE`'
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 PlatformIO 作为` `您的 IDE` |'
- en: '`Connect ESP32 GPIO 0 to the D0 pin of the` `KY-003 sensor`'
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 0 连接到 KY-003 传感器的 D0 引脚` |'
- en: '`Connect ESP32 GPIO 2, 3, 10 to the R/G/B pins of a` `3-color LED`'
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 2、3、10 连接到三色 LED 的 R/G/B 引脚` |'
- en: '`Connect ESP32 GPIO 11 to the signal pin of the` `piezo buzzer`'
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`将 ESP32 GPIO 11 连接到蜂鸣器的信号引脚` |'
- en: '`Use PWM to control the piezo buzzer and the` `three-color LED`'
  id: totrans-458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 PWM 控制蜂鸣器和三色 LED` |'
- en: '`If the value is HIGH, which indicates that a magnetic field is detected, beep
    the piezo buzzer and change the LED color` `to red`'
  id: totrans-459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果值为 `HIGH`，表示检测到磁场，则蜂鸣器发出声音并将 LED 颜色改为红色` |'
- en: '`If the value is LOW, which indicates that no magnetic field is detected, mute
    the piezo buzzer and maintain the LED color` `to green`'
  id: totrans-460
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果值为 `LOW`，表示未检测到磁场，则关闭蜂鸣器并保持 LED 颜色为绿色` |'
- en: '`Print the current value, beep on/off status, and` `LED color`'
  id: totrans-461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`打印当前值、蜂鸣器开/关状态和` `LED 颜色` |'
- en: Code example
  id: totrans-462
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码示例
- en: Visit our GitHub repository at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_10/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_10/main.cpp)
    for an illustrative code sample. In this example, we use the `isMagneticOn()`
    Boolean function to read the digital value from the magnetic sensor. A `HIGH`
    value indicates a magnetic field is detected, while a `LOW` value means no magnetic
    field is detected.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 访问我们的 GitHub 仓库 [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_10/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_10/main.cpp)，以获取示例代码。在这个例子中，我们使用
    `isMagneticOn()` 布尔函数从磁传感器读取数字值。`HIGH` 值表示检测到磁场，而 `LOW` 值表示未检测到磁场。
- en: In this project, we utilized a magnetic sensor to detect the presence of a magnetic
    field by reading its digital pin and interpreting the result. This approach is
    similar to previous projects involving PIR motion, tilt, and vibration detection,
    reinforcing your understanding of digital sensor integration and response mechanisms.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们使用磁传感器通过读取其数字引脚并解释结果来检测磁场的存在。这种方法与涉及PIR运动、倾斜和振动检测的先前项目类似，加强了你对数字传感器集成和响应机制的理解。
- en: After an enriching journey through various project cases, we have now successfully
    covered all 10 of them. Each project has been meticulously detailed, providing
    practical examples of code to ensure a comprehensive understanding. These projects
    range from simple sensor integration to more complex real-time monitoring systems,
    each offering unique insights and practical experience.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 经过各种项目案例的丰富旅程后，我们现在已经成功完成了所有10个项目。每个项目都经过精心详细说明，提供了代码的实际示例，以确保全面理解。这些项目从简单的传感器集成到更复杂的实时监控系统不等，每个项目都提供了独特的见解和实际经验。
- en: For the best learning experience, we have made available a wealth of resources.
    You can access detailed code examples on our GitHub repository. This includes
    the primary files such as `main.cpp` and `platformio.ini`, along with prompts
    to ChatGPT. This repository is neatly organized and can be found at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_8](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_8).
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提供最佳的学习体验，我们提供了丰富的资源。你可以在我们的GitHub仓库中访问详细的代码示例。这包括主要文件，如`main.cpp`和`platformio.ini`，以及向ChatGPT的提示。这个仓库组织得很好，可以在[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_8](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_8)找到。
- en: Summary
  id: totrans-467
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The 10 projects in this chapter have been carefully designed to collectively
    enhance your skills in various key areas. They provide the opportunity to get
    hands-on with a variety of sensors, each with its unique characteristics and usage.
    You’ll learn how to implement real-time monitoring systems, a crucial aspect of
    IoT applications. Moreover, these projects will help you understand how to develop
    responsive IoT systems using ESP32-C3 and PlatformIO. In [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302),
    there are instructions on how to use PlatformIO to compile and upload code in
    ESP32, and you can apply that instruction to implement these 10 projects.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中的10个项目经过精心设计，旨在共同提高你在各个关键领域的技能。它们提供了亲身体验各种传感器的机会，每个传感器都有其独特的特性和用法。你将学习如何实现实时监控系统，这是物联网应用的关键方面。此外，这些项目将帮助你了解如何使用ESP32-C3和PlatformIO开发响应式物联网系统。在[*第11章*](B22002_11.xhtml#_idTextAnchor302)中，有如何使用PlatformIO在ESP32中编译和上传代码的说明，你可以应用这些说明来实现这10个项目。
- en: By working through these projects, you’ll not only gain technical skills but
    also develop problem-solving and critical thinking abilities that are essential
    in the field of IoT development. We hope this journey has been as enriching for
    you as it has been for us in curating it.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 通过完成这些项目，你不仅将获得技术技能，还能培养在物联网开发领域中至关重要的解决问题的能力和批判性思维能力。我们希望这段旅程对你来说就像我们整理它一样丰富多彩。
- en: Starting from the next chapter, we will embark on a practical journey in selecting
    the DHT11 temperature and humidity sensor. You also can select another case from
    these 10 projects. That practical journey will begin with learning how to use
    ChatGPT to draw an IoT application diagram before wiring the hardware and typing
    in your first line of code. Well-defined diagrams will not only provide a vivid
    illustration of your application flow but will also serve as a guide to organizing
    the code generation logic.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 从下一章开始，我们将开始一段选择DHT11温度和湿度传感器的实际旅程。你也可以从这10个项目中选择另一个案例。这段实际旅程将从学习如何使用ChatGPT绘制物联网应用图开始，在布线硬件和编写第一行代码之前。定义良好的图示不仅能够生动地展示你的应用流程，还将作为组织代码生成逻辑的指南。
