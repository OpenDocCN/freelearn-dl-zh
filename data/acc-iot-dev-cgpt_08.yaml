- en: Applications
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用
- en: '**Obstacle avoidance systems**: In robotics, the HC-SR04 sensor is used to
    detect obstacles in the path of a robot, allowing it to navigate around them'
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**避障系统**：在机器人技术中，HC-SR04传感器用于检测机器人路径上的障碍物，使其能够绕过它们'
- en: '**Distance measurement**: The sensor is used in applications requiring precise
    distance measurements, such as in manufacturing and quality control processes'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**距离测量**：该传感器用于需要精确距离测量的应用，例如在制造和质量控制过程中'
- en: '**Parking sensors**: In automotive applications, the HC-SR04 can be used to
    develop parking assistance systems to alert drivers about the distance to objects
    behind the vehicle'
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**停车传感器**：在汽车应用中，HC-SR04可用于开发停车辅助系统，以提醒驾驶员车辆后方物体的距离'
- en: '**Security and surveillance**: The sensor can be integrated into security systems
    to detect the presence of persons or objects in restricted areas'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和监控**：该传感器可以集成到安全系统中，以检测受限区域中的人员或物体的存在'
- en: Prompt to ChatGPT
  id: totrans-260
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示ChatGPT
- en: 'The role and task will be the same as the first project here. The other aspects
