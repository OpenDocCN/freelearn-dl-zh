  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用PWM控制蜂鸣器和`三色LED`
- en: '`If the value is HIGH, which indicates gas is detected, beep the piezo buzzer
    and change the LED color` `to red`'
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果值是高，表示检测到气体，则蜂鸣器响并改变LED颜色为红色
- en: '`If the value is LOW, which indicates no gas is detected, mute the piezo buzzer
    and maintain the LED color` `to green`'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果值是低，表示未检测到气体，则关闭蜂鸣器并保持LED颜色为绿色
- en: '`Print the current value, beep on/off status, and` `LED color`'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打印当前值、蜂鸣器开关状态以及`LED颜色`
- en: Code example
  id: totrans-234
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码示例
- en: 'An example of the `main.cpp` code can be found at the following link: [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_4/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_4/main.cpp).'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: '`main.cpp`代码示例可以在以下链接找到：[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_4/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_4/main.cpp).'
- en: In this example code, we follow the same function structure as in *Project 3*.
    The `isGasOn()` Boolean function is used to check for the presence of gas by reading
    the digital value (`HIGH` for gas detected or `LOW` for no gas detected) from
    the MQ-2 sensor. This function returns a Boolean value to simplify the logic for
    determining the system’s response to gas detection.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例代码中，我们遵循与*项目3*相同的函数结构。`isGasOn()`布尔函数通过从MQ-2传感器读取数字值（检测到气体时为高，未检测到气体时为低）来检查气体的存在。此函数返回布尔值，以简化确定系统对气体检测响应的逻辑。
- en: In this project, we used the digital output of the MQ-2 sensor to detect various
    gases. This enabled us to signal gas detection with an LED and a buzzer, honing
    our skills in managing digital sensor readings and setting up responsive alerts.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们使用了MQ-2传感器的数字输出来检测各种气体。这使得我们能够通过LED和蜂鸣器发出气体检测信号，从而提高我们在管理数字传感器读取和设置响应式警报方面的技能。
- en: For our next project, we plan to use the HC-SR04 ultrasonic sensor to gauge
    the distance to objects by leveraging its transmission and receiving antennas.
    This project will deepen our understanding of sensor integration and real-time
    data processing in embedded systems.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的下一个项目中，我们计划使用HC-SR04超声波传感器，通过其发射和接收天线来测量物体距离。这个项目将加深我们对嵌入式系统中传感器集成和实时数据处理的理解。
- en: Project 5 – distance measurement
  id: totrans-239
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 项目5 – 距离测量
- en: This project prominently features the HC-SR04 sensor, a commonly used ultrasonic
    sensor in a multitude of Arduino projects, especially those involving the measurement
    of distance. The HC-SR04 ultrasonic sensor operates on a basic yet effective principle.
    It emits an ultrasonic wave, a type of sound wave, at a frequency of 40 kHz. This
    wave travels seamlessly through the air, functioning as the sensor’s probing mechanism.
    If there happens to be an object or an obstacle in the path of this emitted wave,
    the sound wave is reflected back, effectively bouncing back to the sensor. This
    phenomenon is akin to the echo one might hear in a large, empty room or a mountain
    valley. By measuring the time interval between the emission of the sound wave
    and the reception of the echo, the sensor can accurately calculate the distance
    to the object or obstacle. This precise and reliable functionality has made the
    HC-SR04 ultrasonic sensor a popular choice for a wide variety of applications.
    These include but are not limited to robotics, obstacle avoidance systems, and
    range detection projects.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 本项目突出使用了HC-SR04传感器，这是一种在众多Arduino项目中广泛使用的超声波传感器，尤其是在涉及距离测量的项目中。HC-SR04超声波传感器基于一个基本而有效的原理运作。它以40
    kHz的频率发射超声波，这是一种声波。这种波在空气中无缝传播，作为传感器的探测机制。如果发射的波路径上恰好有物体或障碍物，声波会被反射回来，有效地弹回到传感器。这种现象类似于在大型空旷房间或山谷中听到的回声。通过测量声波发射和回声接收之间的时间间隔，传感器可以精确计算出物体或障碍物的距离。这种精确可靠的功能使得HC-SR04超声波传感器成为各种应用的流行选择。这包括但不限于机器人技术、避障系统和距离检测项目。
