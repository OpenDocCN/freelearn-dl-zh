- en: Applications
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用
- en: '**Alarm systems**: Used in security devices to detect tampering or unauthorized
    movement of objects, such as safes, doors, or windows'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**报警系统**: 用于安全设备中检测篡改或未经授权的物体移动，如保险箱、门或窗户'
- en: '**Smart home devices**: Used in smart lighting systems to turn lights on/off
    or adjust brightness based on the tilt angle, or in smart window treatments to
    adjust blinds or curtains automatically'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能家居设备**: 用于智能照明系统，根据倾斜角度开关灯或调整亮度，或在智能窗帘系统中自动调整百叶窗或窗帘'
- en: '**Leveling instruments**: Used in construction and surveying equipment to ensure
    level measurements and alignments are accurate'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**水准仪**: 用于建筑和测量设备中，以确保水平测量和校准的准确性'
- en: '**Personal safety devices**: Incorporated into elderly care products, such
    as fall detectors that alert caregivers when a fall is detected'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个人安全设备**: 集成到老年护理产品中，如跌倒探测器，当检测到跌倒时会提醒护理人员'
