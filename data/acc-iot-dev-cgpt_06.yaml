  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Applying ChatGPT in the IoT Innovation Journey
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在物联网创新之旅中应用ChatGPT
- en: Hello and welcome to this chapter!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你好，欢迎来到这一章！
- en: Imagine stepping into a world where your creative ideas can turn into real,
    working gadgets and solutions that make life easier and more fun. This chapter
    is your exciting step on an amazing journey where we’ll explore how to apply the
    magical power of ChatGPT, the AI-powered chatbot by OpenAI’s GPT **large language
    model** (**LLM**), to accelerate your IoT innovation and rapidly bring your coolest
    ideas to tangible prototypes.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下走进一个世界，在那里你的创意想法可以变成真实、实用的装置和解决方案，让生活变得更轻松、更有趣。这一章节是你在这段激动人心的旅程中的第一步，我们将探索如何应用OpenAI的GPT
    **大型语言模型**（**LLM**）ChatGPT的神奇力量，以加速你的物联网创新，并迅速将你的最酷想法变成可触摸的原型。
- en: We will begin our journey with a deep dive into how AI is reshaping our lives,
    work, and society far and wide. We will learn not only about the impact of AI
    but also about envisioning its potential to revolutionize every sector around
    us. From the initial spark of an idea to the implementation’s final touches, we’ll
    show how ChatGPT can act as both a companion and a guide, boosting creativity,
    efficiency, and effectiveness throughout the IoT development process.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从深入探讨AI如何重塑我们的生活、工作和广泛社会开始我们的旅程。我们将不仅了解AI的影响，还将展望其潜力，革命性地改变我们周围的每一个行业。从想法的最初火花到实施的最终细节，我们将展示ChatGPT如何作为伴侣和指南，在整个物联网开发过程中提升创造力、效率和效果。
- en: We will then outline the fundamental principles to follow when engaging with
    ChatGPT and developing your effective tactics for interacting with it. Here, you
    will discover the best practices for developing effective ChatGPT prompt frameworks
    and patterns, specifically designed for IoT applications. Finally, we will look
    at some valuable skills that you can use to enhance your experience when utilizing
    ChatGPT for generating C++ code specifically for ESP32 microcontrollers.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将概述在与ChatGPT互动和开发有效互动策略时应遵循的基本原则。在这里，你将发现专为物联网应用设计的有效ChatGPT提示框架和模式的最佳实践。最后，我们将探讨一些有用的技能，你可以使用这些技能来增强你在利用ChatGPT为ESP32微控制器生成C++代码时的体验。
- en: 'In this chapter, we’ll cover the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Reshaping the future with AI
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用AI重塑未来
- en: Utilizing ChatGPT in IoT development process
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在物联网开发过程中利用ChatGPT
- en: Interacting with ChatGPT properly
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正确与ChatGPT互动
- en: Best practices for beginner IoT projects
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初学者物联网项目的最佳实践
- en: Generating code snippets on ESP32
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在ESP32上生成代码片段
- en: Important tips
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 重要提示
- en: We will apply the ChatGPT prompting techniques introduced in this chapter to
    an example project in [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302). By consistently
    practicing these skills in real projects, you will gain a full understanding of
    the interaction principles and enhance your instructional skills for future IoT
    projects.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将应用本章中介绍的ChatGPT提示技巧到一个示例项目中[第11章](B22002_11.xhtml#_idTextAnchor302)。通过在真实项目中持续练习这些技能，你将全面理解交互原则，并提高你在未来物联网项目中的教学技能。
- en: Reshaping the future with AI
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用AI重塑未来
- en: Think about a world where technology not only understands you but also responds
    thoughtfully to your every question or need. This isn’t just a scene from a sci-fi
    movie; it’s becoming our reality thanks to advancements in multiple AI LLMs, such
    as OpenAI’s GPT, Meta Llama, and Google Gemini. AI is not just another technical
    buzzword; it’s a revolutionary force that’s reshaping how we live, work, and interact
    across the globe.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个世界，技术不仅能理解你，还能深思熟虑地回应你的每一个问题或需求。这不仅仅是一部科幻电影中的场景；得益于多个AI LLM（如OpenAI的GPT、Meta
    Llama和Google Gemini）的进步，这正在成为我们的现实。AI不仅仅是一个技术术语；它是一场革命，正在重塑我们全球的生活、工作和互动方式。
- en: AI is revolutionizing businesses, services, and industries worldwide. With its
    advanced technology and capabilities, AI is gaining popularity and making a significant
    impact in sectors such as customer service and content creation. Its exceptional
    ability to understand and respond accurately and naturally to human queries is
    truly impressive. As businesses around the world recognize the potential of AI,
    its influence continues to grow, bringing us closer to a future where AI-powered
    solutions are an integral part of our lives.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在全球范围内颠覆商业、服务和行业。凭借其先进的技术和能力，人工智能越来越受欢迎，并在客户服务和内容创作等领域的重大影响日益显著。它能够准确自然地理解和回应人类查询的非凡能力确实令人印象深刻。随着世界各地企业认识到人工智能的潜力，其影响力持续增长，让我们更接近一个人工智能解决方案成为我们生活不可或缺部分的未来。
- en: 'Here’s how AI is making waves in various sectors, simplifying tasks, enhancing
    experiences, and opening up new possibilities:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是人工智能在各个领域掀起波澜的方式，简化任务，提升体验，并开辟新的可能性：
- en: '**Education**: AI acts as a digital tutor, helping students with homework,
    generating quiz questions, and even customizing learning materials to fit individual
    needs. It’s like having a personal learning assistant who’s always ready to help
    you learn in the best way possible.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育**：人工智能充当数字导师，帮助学生完成作业，生成测验问题，甚至根据个人需求定制学习材料。它就像一个始终准备以最佳方式帮助你学习的个人学习助手。'
- en: '**Healthcare**: In healthcare, AI becomes a friendly assistant, answering health
    questions, guiding people through symptoms, and supporting mental well-being.
    It’s like a 24/7 health companion, always there to offer advice and comfort.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗保健**：在医疗保健领域，人工智能成为了一位友好的助手，回答健康问题，指导人们了解症状，并支持心理健康。它就像一位全天候的健康伴侣，始终在那里提供建议和安慰。'
- en: '**Finance**: AI steps into the financial world to help with customer service,
    offering advice on banking products, and making investment tips feel more accessible.
    It’s like having a financial advisor in your pocket, ready to demystify the complex
    world of finance for you.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融**：人工智能进入金融世界，帮助提供客户服务，提供关于银行产品的建议，并使投资建议更加易于获取。这就像口袋里有一位金融顾问，随时准备为你揭示金融世界的复杂性。'
- en: '**Retail**: Shopping becomes a breeze with AI, which can suggest products,
    answer queries, and even help you find the perfect gift. It’s like shopping with
    a friend who knows exactly what you’re looking for.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零售**：有了人工智能，购物变得轻松愉快，它可以推荐产品，回答疑问，甚至帮助你找到完美的礼物。这就像和一个知道你想要什么的朋友一起购物。'
- en: '**Travel**: Planning your next adventure? AI can offer travel tips, assist
    with bookings, and personalize dining or accommodation recommendations, making
    every trip smoother and more enjoyable.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**旅行**：计划你的下一次冒险吗？人工智能可以提供旅行建议，协助预订，并个性化餐饮或住宿推荐，使每一次旅行都更加顺畅和愉快。'
- en: '**Technical support**: AI can simplify tech support, offering solutions to
    common issues and guiding users through fixes step by step. It’s like having a
    tech expert by your side, anytime you need help.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术支持**：人工智能可以简化技术支持，提供常见问题的解决方案，并指导用户一步步解决问题。这就像身边总有一位技术专家，随时准备提供帮助。'
- en: '**Creative industries**: For the creatives, AI can brainstorm ideas, help write
    scripts, or even compose music, turning creative blocks into bursts of inspiration.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创意产业**：对于创意人士来说，人工智能可以激发想法，帮助撰写剧本，甚至创作音乐，将创作瓶颈转化为灵感迸发。'
- en: '**Legal and HR**: AI demystifies legal jargon and streamlines HR processes,
    making it easier to navigate workplace questions and legal documents.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**法律和人力资源**：人工智能消除了法律术语的神秘感，并简化了人力资源流程，使人们更容易应对职场问题和法律文件。'
- en: '**Accessibility**: AI revolutionizes disability access, facilitating interaction
    with technology through voice commands, text inputs, visual gestures, and other
    customizable methods.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无障碍**：人工智能革命性地改变了残疾人士的接入方式，通过语音命令、文本输入、视觉手势和其他可定制方法，促进与技术的互动。'
- en: '**Public services**: Governments and public agencies can use AI to make information
    more accessible, automate responses to common inquiries, and improve public service
    delivery.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公共服务**：政府和公共机构可以利用人工智能使信息更易于获取，自动化对常见查询的响应，并改善公共服务交付。'
- en: These use cases illustrate the wide range of applications for AI, demonstrating
    its ability to streamline processes and create new opportunities for engagement
    and innovation across various fields.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些用例展示了人工智能的广泛应用范围，证明了其能够简化流程，并在各个领域创造新的参与和创新机会。
- en: After examining the transformative impact of AI across various sectors, we will
    now focus on its specific role in IoT. In the upcoming section, we will explore
    the stages of the IoT development journey where ChatGPT’s coding skills can help.
    As we navigate the complexities of IoT projects, from analyzing customer pain
    points to building prototypes, ChatGPT will prove to be an invaluable assistant.
    This part of our discussion aims to emphasize how ChatGPT can expedite the development
    process, enhance problem-solving abilities, and foster innovation by providing
    actionable insights and programming tasks, as well as facilitating a deeper understanding
    of user needs and system performance.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在审视了人工智能在各个领域的变革性影响之后，我们现在将关注其在物联网中的具体作用。在接下来的部分，我们将探讨物联网开发旅程的各个阶段，其中 ChatGPT
    的编码技能可以帮助。在我们导航物联网项目的复杂性时，从分析客户痛点到构建原型，ChatGPT 将证明是一个无价的助手。本讨论的这一部分旨在强调 ChatGPT
    如何通过提供可操作的见解和编程任务来加速开发过程，增强解决问题的能力，并通过促进对用户需求和系统性能的更深入理解来培养创新。
- en: Utilizing ChatGPT in IoT development process
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在物联网开发过程中使用 ChatGPT
- en: To navigate the complex world of IoT development processes, you need to understand
    both what customers want and what the proper solution looks like. ChatGPT, the
    AI-powered chatbot, is a helpful tool that can support you throughout the entire
    process, from brainstorming to prototype development.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 要导航复杂的物联网开发过程，你需要了解客户想要什么以及合适的解决方案是什么样的。ChatGPT，这个由人工智能驱动的聊天机器人，是一个可以帮助你在整个过程中（从头脑风暴到原型开发）的工具。
- en: 'Here’s how ChatGPT can make your IoT development easier:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是 ChatGPT 如何使你的物联网开发变得更简单的说明：
- en: '**Pain points analysis**: When engaging with customers, it’s crucial to be
    ready for various kinds of feedback and complaints. These complaints can be expressed
    through different tones and may sometimes hide the real problems. But with ChatGPT’s
    assistance, you can analyze and summarize customer concerns effectively. This
    helps you identify the most common challenges or *pain points* they experience.
    By understanding these pain points, you can make informed decisions and take appropriate
    actions to address them, ultimately enhancing the overall customer experience.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**痛点分析**：在与客户互动时，准备好应对各种类型的反馈和投诉至关重要。这些投诉可以通过不同的语气表达，有时可能隐藏真实的问题。但有了 ChatGPT
    的协助，你可以有效地分析和总结客户关注的问题。这有助于你确定他们最常遇到的挑战或 *痛点*。通过理解这些痛点，你可以做出明智的决定并采取适当的行动来解决问题，从而提高整体客户体验。'
- en: '**Solution brainstorming**: Once you have identified your customers’ primary
    concerns through a thorough pain point analysis, ChatGPT becomes an invaluable
    assistant during the brainstorming phase of your IoT project. This phase is all
    about creativity and leveraging ChatGPT’s ability to generate a multitude of fresh
    ideas.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案头脑风暴**：一旦你通过彻底的痛点分析确定了客户的 主要关注点，ChatGPT 就会成为你在物联网项目头脑风暴阶段的无价助手。这一阶段完全是关于创造力和利用
    ChatGPT 生成大量新想法的能力。'
- en: '**Feasibility studies**: With a promising solution from ChatGPT, calibrated
    by your insights and expertise, the next important step is to assess whether it
    can work. This is where ChatGPT also plays a crucial role by conducting thorough
    studies to determine if your IoT project is feasible. Using its extensive knowledge
    base of the latest technological advancements, ChatGPT can provide you with a
    detailed analysis of the technological capabilities required to bring your idea
    to life. It not only evaluates the potential of the current IoT landscape but
    also predicts future trends that could impact the success of your project.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可行性研究**：有了 ChatGPT 提供的具有希望解决方案，并通过你的洞察力和专业知识进行校准，下一步重要的步骤就是评估它是否可行。在这一阶段，ChatGPT
    也发挥着关键作用，通过进行彻底的研究来确定你的物联网项目是否可行。利用其关于最新技术进步的广泛知识库，ChatGPT 可以为你提供将你的想法变为现实所需的技术能力的详细分析。它不仅评估了当前物联网景观的潜力，还预测了可能影响项目成功的未来趋势。'
- en: '**Risk analysis**: Recognizing that no solution is perfect, using ChatGPT for
    a thorough risk analysis of your IoT project is a crucial step. This AI-powered
    audit process carefully identifies potential issues in technical, market, and
    security aspects that could hinder your project’s success. Technical risks may
    involve problems with hardware reliability, software compatibility, or scalability.
    Market risks could arise from changing user demands, competition, or regulations.
    Security risks are especially important, including worries about data privacy,
    possible breaches, and system vulnerabilities.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险评估**：认识到没有完美的解决方案，使用ChatGPT对您的物联网项目进行全面的风险分析是关键的一步。这个由AI驱动的审计过程会仔细识别可能阻碍项目成功的在技术、市场和安全方面的潜在问题。技术风险可能涉及硬件可靠性、软件兼容性或可扩展性问题。市场风险可能源于用户需求的变化、竞争或法规。安全风险尤为重要，包括对数据隐私、可能的违规和系统漏洞的担忧。'
- en: '**Architecture design**: After the initial studies to determine if the solution
    is possible, ChatGPT can help you design the end-to-end architecture. This important
    phase involves making important decisions about which hardware components to use,
    choosing communication protocols for device connectivity, and using effective
    data processing techniques for good performance. ChatGPT can provide information
    about the latest technologies, compatibility considerations, and industry best
    practices to ensure your solution architecture is not only functional but also
    scalable and secure. This step-by-step guidance helps establish a strong foundation
    for your IoT solution, ensuring successful execution and future scalability.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构设计**：在确定解决方案是否可行的研究初步完成后，ChatGPT可以帮助您设计端到端架构。这个重要阶段包括对使用哪些硬件组件、选择设备连接的通信协议以及使用有效的数据处理技术以获得良好性能的重要决策。ChatGPT可以提供关于最新技术、兼容性考虑和行业最佳实践的信息，以确保您的解决方案架构不仅功能性强，而且可扩展且安全。这种逐步指导有助于为您的物联网解决方案建立一个坚实的基础，确保成功执行和未来的可扩展性。'
- en: '**Requirement collection**: After completing the architecture design phase,
    ChatGPT can help define the **minimal viable product** (**MVP**) for your IoT
    project. It does this by summarizing a concise list of necessary technical and
    functional requirements. This process ensures that the core components needed
    for your project’s initial success are identified and prioritized. By using ChatGPT,
    you can extract a clear set of requirements that address both the foundational
    technological needs (such as specific hardware components, connectivity options,
    and data processing capabilities) and the key functionalities that provide value
    to your end users. This MVP approach simplifies the development process, allowing
    you to quickly bring a functional version of your IoT solution to the market.
    It meets critical user needs while also setting the stage for future enhancements
    and iterations. With ChatGPT’s help, you can ensure that your project is built
    on essential features, maximizing efficiency and effectiveness in addressing the
    identified pain points and objectives.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**需求收集**：在完成架构设计阶段后，ChatGPT可以帮助您定义物联网项目的**最小可行产品**（MVP）。它是通过总结一份简洁的技术和功能需求列表来做到这一点的。这个过程确保了识别并优先考虑了项目初始成功所需的核心组件。通过使用ChatGPT，您可以提取出一组清晰的、针对基础技术需求（如特定的硬件组件、连接选项和数据处理能力）以及为最终用户提供价值的键功能的需求。这种MVP方法简化了开发过程，让您能够快速将物联网解决方案的功能版本推向市场。它满足了关键用户需求，同时也为未来的改进和迭代奠定了基础。在ChatGPT的帮助下，您可以确保项目建立在基本功能之上，最大化效率并有效解决已识别的痛点与目标。'
- en: '**Hardware prototype build**: When you start building the hardware prototype
    for your IoT project, ChatGPT can assist you with advice and support. This phase
    is important for turning your idea into a real product, and ChatGPT can help you
    make choices and solve problems during prototype development. It can give insights
    based on industry practices and technology advancements. ChatGPT can assist you
    in choosing the right components, such as MCU, wireless connectivity, sensors,
    and power supply, that fit your project’s needs and budget. It can also provide
    advice on assembling them and fixing common hardware issues. Whether you’re adding
    sensors, reducing power usage, or ensuring reliable connectivity, ChatGPT can
    help simplify the process of building the hardware prototype.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬件原型构建**：当你开始为你的物联网项目构建硬件原型时，ChatGPT可以为你提供建议和支持。这一阶段对于将你的想法转化为真实产品至关重要，ChatGPT可以帮助你在原型开发过程中做出选择和解决问题。它可以根据行业实践和技术进步提供见解。ChatGPT可以帮助你选择适合项目需求和预算的正确组件，例如微控制器（MCU）、无线连接、传感器和电源供应。它还可以提供组装它们的建议和解决常见硬件问题的方法。无论你是添加传感器、降低功耗还是确保可靠的连接，ChatGPT都可以帮助你简化构建硬件原型的过程。'
- en: '**Software programming assistance**: Once you have successfully assembled and
    set up your hardware prototype, using ChatGPT for software programming is a crucial
    next step. This is where your project truly starts to take shape, transforming
    from a physical assembly into an intelligent and functional IoT system. ChatGPT
    can help by generating code tailored to your project’s specific application logic.
    Whether you need to program device interactions, process sensor data, manage connectivity,
    or develop user interface components, ChatGPT can provide code snippets and programming
    insights that align with your project’s requirements.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**软件编程辅助**：一旦你成功组装和设置了你的硬件原型，使用ChatGPT进行软件编程是至关重要的下一步。这是你的项目真正开始成形的地方，从物理组装转变为智能且功能齐全的物联网系统。ChatGPT可以通过生成针对项目特定应用逻辑定制的代码来帮助你。无论你需要编程设备交互、处理传感器数据、管理连接还是开发用户界面组件，ChatGPT都可以提供符合项目要求的代码片段和编程见解。'
- en: '**Cloud platform integration**: Finally, an essential aspect of your IoT project
    involves ensuring that sensor data seamlessly transitions from your hardware devices
    to a backend cloud platform, such as AWS. This integration is pivotal for harnessing
    the full scope of cloud computing benefits, including scalable data management
    and advanced analytics capabilities. To facilitate this crucial step, you can
    leverage ChatGPT to craft a detailed, step-by-step guide tailored specifically
    to navigating the intricacies of cloud platform integration.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**云平台集成**：最后，你的物联网项目的一个关键方面是确保传感器数据无缝地从你的硬件设备过渡到后端云平台，例如AWS。这种集成对于充分利用云计算的全部好处至关重要，包括可扩展的数据管理和高级分析能力。为了促进这一关键步骤，你可以利用ChatGPT制定一个详细、分步的指南，专门针对云平台集成的复杂性。 '
- en: Navigating the complexities of IoT development, from initial idea generation
    to integrating with cloud platforms, shows the valuable role of ChatGPT in turning
    ideas into practical solutions. At every step of the process, such as identifying
    problems, brainstorming solutions, and conducting feasibility studies, ChatGPT
    demonstrates its many capabilities in improving efficiency, creativity, and decision-making.
    However, to fully unlock the potential of this AI tool, it’s important to not
    only have access to ChatGPT but also know how to use it effectively. In the upcoming
    section, we will explore the details of making the most out of ChatGPT. The aim
    is to empower you with the knowledge and skills to fully utilize ChatGPT’s capabilities,
    making it a powerful tool for innovation rather than an underutilized resource.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 从最初的想法生成到与云平台集成，导航物联网开发的复杂性显示了ChatGPT在将想法转化为实际解决方案中的宝贵作用。在过程的每一步，如识别问题、头脑风暴解决方案和进行可行性研究，ChatGPT都展示了其在提高效率、创造力和决策方面的多种能力。然而，要充分发挥这个AI工具的潜力，不仅需要访问ChatGPT，而且还需要知道如何有效地使用它。在接下来的部分，我们将探讨充分利用ChatGPT的细节。目标是赋予你知识和技能，以充分利用ChatGPT的功能，使其成为创新的强大工具，而不是一个未被充分利用的资源。
- en: Interacting with ChatGPT properly
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 正确与ChatGPT交互
- en: 'Now that we understand the ubiquitous presence of ChatGPT within the IoT development
    landscape, it’s crucial to acknowledge a fundamental truth: the effectiveness
    of this advanced AI tool hinges not on its capabilities, but on how we interact
    with it.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经认识到ChatGPT在物联网开发领域的无处不在，那么承认一个基本事实至关重要：这个先进AI工具的有效性不在于其功能，而在于我们如何与之互动。
- en: The purpose of this section is not to diminish the value of ChatGPT but to provide
    you with the necessary skills to effectively utilize this tool. By understanding
    how to create specific prompts, accurately interpret outputs, and integrate insights
    into your IoT projects, you can transform ChatGPT from a basic digital assistant
    into a powerful innovation tool. Together, we will explore strategies to enhance
    your communication with ChatGPT, ensuring that every question serves a purpose
    and every response helps you achieve your IoT goals. This guide will not only
    assist you in using ChatGPT but also empower you to master the art of prompting
    and turn potential into reality.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 本节的目的并非降低ChatGPT的价值，而是为您提供有效利用此工具所需的基本技能。通过了解如何创建特定的提示、准确解读输出以及将洞察力融入您的物联网项目中，您可以将ChatGPT从一款基本的数字助手转变为强大的创新工具。我们将共同探讨增强与ChatGPT沟通的策略，确保每个问题都服务于目的，每个回答都能帮助您实现物联网目标。本指南不仅将帮助您使用ChatGPT，还将赋予您掌握提示艺术、将潜力转化为现实的能力。
- en: 'The following are the fundamental principles when engaging with ChatGPT:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是与ChatGPT互动的基本原则：
- en: '**Interacting with ChatGPT as a conversation**: Instead of just dumping your
    questions and waiting for answers, interacting with ChatGPT is a conversation,
    or a dialog, not a monolog. Unlike using a search engine such as Google, where
    you enter a query and have to browse a long list of results that may or may not
    directly and effectively address your question, interacting with ChatGPT requires
    a more nuanced approach, similar to having a conversation. Imagine that you’re
    meeting someone new, such as a friend, partner, or mentor, and you want to receive
    meaningful help from them. A clear, precise, and thoughtful instruction, such
    as well-rounded and considerable opening remarks, will guide the following conversation
    in a meaningful direction and produce outcomes aligned with your expectations.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将ChatGPT视为一次对话进行互动**：与ChatGPT的互动不应仅仅是提出问题并等待答案，而应是一种对话或对话，而不是独白。与使用谷歌等搜索引擎不同，您输入一个查询并必须浏览可能或可能不会直接有效地回答您问题的长列表结果，与ChatGPT的互动需要更细腻的方法，类似于进行对话。想象一下，您在遇见一个新人，比如朋友、伴侣或导师，并希望从他们那里获得有意义的帮助。一个清晰、精确且深思熟虑的指令，比如全面且周到的开场白，将引导接下来的对话走向有意义的方向，并产生符合您期望的结果。'
- en: '**Don’t expect a perfect answer from first-round dialog**: It is not surprising
    that the first response from ChatGPT may not always perfectly match your expectations
    or needs. It is crucial to understand that ChatGPT is powered by an LLM framework,
    utilizing a predictive mechanism to generate responses. This mechanism, rooted
    in the transformer architecture of LLM, aims to forecast the most likely next
    word or phrase based on the context provided by you. As such, its answers are
    shaped by patterns and data from its extensive training, rather than intuitive
    understanding. This means that some extent of deviation from your expectations
    always exists. To address this, continuous calibration through ongoing conversation
    is necessary. Therefore, it is essential to be prepared to refine your queries
    or ask follow-up questions based on the initial answers. By doing so, you can
    ensure that you receive the most accurate and relevant information from ChatGPT.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不要期望第一次对话就能得到完美的答案**：ChatGPT的第一轮回答可能并不总是完美地符合您的期望或需求，这并不令人惊讶。重要的是要理解ChatGPT是由一个LLM框架驱动的，它利用预测机制来生成回答。这种机制基于LLM的transformer架构，旨在根据您提供的上下文预测最可能出现的下一个单词或短语。因此，其答案是由其广泛训练中的模式和数据进行塑造的，而不是直观的理解。这意味着您的期望与实际答案之间总会有一定的偏差。为了解决这个问题，持续的校准通过持续的对话是必要的。因此，您必须准备好根据初始答案调整您的查询或提出后续问题。通过这样做，您可以确保从ChatGPT那里获得最准确和相关的信息。'
- en: '**Be specific with what you’re asking**: The more specific and detailed your
    requests and contexts are, the more accurate and helpful ChatGPT’s responses will
    be. To ensure you receive the most accurate and helpful response, it is important
    to provide a well-organized prompt framework and pattern that is specific and
    detailed. Doing so not only gives ChatGPT a clearer understanding of your request
    but also guides it to tailor its information to fit your specific needs accurately.
    Therefore, when engaging with ChatGPT, aim to be as descriptive as possible, incorporating
    relevant details and background information into your query. This practice of
    providing comprehensive context ensures that the insights you receive are directly
    applicable and fully informed, maximizing the utility of your interaction with
    the model.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**明确你的提问**：你的请求和背景越具体和详细，ChatGPT的回答就会越准确和有帮助。为了确保你获得最准确和有帮助的回答，提供组织良好的、具体和详细的提示框架和模式是非常重要的。这样做不仅使ChatGPT对你的请求有更清晰的理解，而且引导它准确地调整信息以适应你的特定需求。因此，在与ChatGPT互动时，尽量做到尽可能详细，将相关细节和背景信息纳入你的查询中。这种提供全面背景的做法确保你获得的见解是直接相关和充分信息的，最大化了你与模型互动的效用。'
- en: '**Mitigate the limits of ChatGPT’s knowledge base**: Although ChatGPT is a
    powerful tool, it does have limitations. The training data for ChatGPT 4 only
    includes information up until December 2023\. Therefore, any events, developments,
    or updates that have occurred after December 2023 may not be reflected in its
    responses. To mitigate the knowledge of ChatGPT, you have the option to upload
    the latest documentation to it for reference. For example, you can paste the ESP32-C3
    or ESP32-C6 datasheet, specification, and pin map to ChatGPT during your conversation
    with it.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减轻ChatGPT知识库的限制**：尽管ChatGPT是一个强大的工具，但它确实存在局限性。ChatGPT 4的训练数据仅包括截至2023年12月的信息。因此，任何在2023年12月之后发生的事件、发展或更新可能不会反映在其回答中。为了减轻ChatGPT的知识限制，你可以选择上传最新的文档供其参考。例如，你可以在与ChatGPT的对话中粘贴ESP32-C3或ESP32-C6的数据表、规范和引脚图。'
- en: '**Encourage creative and diverse responses**: Don’t be surprised if ChatGPT
    provides answers that are different from your expectations. To get the best out
    of ChatGPT, you should create an open environment that values and encourages different
    and creative responses. This will help you discover new and innovative solutions.
    During brainstorming sessions, it is important to embrace and support ChatGPT’s
    creativity as it can lead to breakthrough ideas and unique approaches. You should
    foster a mindset of openness and appreciation for diverse perspectives so that
    you can generate imaginative and varied outputs from ChatGPT.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鼓励创造性和多样化的回答**：如果ChatGPT提供的答案与你的预期不同，请不要感到惊讶。为了从ChatGPT中获得最佳效果，你应该创建一个开放的环境，重视并鼓励不同和创造性的回答。这将帮助你发现新的和创新性的解决方案。在头脑风暴会议期间，重要的是要拥抱并支持ChatGPT的创造力，因为它可以带来突破性的想法和独特的方法。你应该培养一种开放和欣赏多样化观点的心态，以便你能从ChatGPT那里生成富有想象力和多样化的输出。'
- en: '**Protect your privacy and security**: When using ChatGPT, it is very important
    to always prioritize your privacy and security. It is strongly advised that you
    avoid sharing any confidential or private data during conversations. To ensure
    the highest level of protection, it is recommended to be cautious and not disclose
    sensitive personal information during your interactions.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保护你的隐私和安全**：在使用ChatGPT时，始终优先考虑你的隐私和安全非常重要。强烈建议你在对话中避免分享任何机密或私人数据。为了确保最高级别的保护，建议你谨慎行事，不要在互动中透露敏感的个人信息。'
- en: '**Continuous validation and cross-checking**: While ChatGPT can provide helpful
    information and assistance, it’s important to remember that it should not be the
    only source relied upon for making important decisions. It’s recommended to verify
    any information or advice received from ChatGPT with other sources before taking
    any significant actions. This is especially critical for important decisions.
    By double-checking and validating the information, you can ensure its accuracy
    and enhance the credibility of your decision-making process. Using a reliable
    validation framework allows for a more informed, secure, and confident approach
    to applying the insights gained, preventing potential mistakes and inaccuracies.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续验证和交叉检查**：虽然 ChatGPT 可以提供有用的信息和帮助，但重要的是要记住，它不应该是做出重要决策的唯一信息来源。建议在采取任何重大行动之前，用其他来源验证从
    ChatGPT 收到的任何信息或建议。这对于重要决策尤其关键。通过双重检查和验证信息，您可以确保其准确性并提高您决策过程的可信度。使用可靠的验证框架允许采取更明智、更安全、更有信心的方法来应用所获得的见解，防止潜在的错误和不准确。'
- en: As we explore the fundamental principles of interacting with ChatGPT, we are
    now at the point where we can dive deeper into the skills of engaging with this
    AI. By following best practices for interacting with ChatGPT, being specific in
    our requests, role-playing strategically, and continuously validating and cross-checking,
    we can have more meaningful discussions about using ChatGPT in our tasks.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们探索与 ChatGPT 互动的基本原则，我们现在已经到了可以更深入地研究如何与这个 AI 互动的技能的时候了。通过遵循与 ChatGPT 互动的最佳实践，具体化我们的请求，策略性地进行角色扮演，以及持续验证和交叉检查，我们可以就使用
    ChatGPT 完成任务进行更有意义的讨论。
- en: In the next section, we will focus on applying these principles practically
    to IoT projects. This section will guide you in creating effective prompts that
    address the unique challenges and opportunities of IoT development. Our goal is
    to ensure that your interactions with ChatGPT go beyond simple conversations and
    become stepping stones toward innovation and problem-solving in the IoT field.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将专注于将这些原则实际应用于物联网项目。本节将指导您创建有效的提示，以应对物联网开发的独特挑战和机遇。我们的目标是确保您与 ChatGPT
    的互动不仅仅局限于简单的对话，而是成为物联网领域创新和解决问题的垫脚石。
- en: Best practices for beginner IoT projects
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 初学者物联网项目的最佳实践
- en: OpenAI has published a comprehensive guide on ChatGPT prompt engineering that’s
    accessible at [https://platform.openai.com/docs/guides/prompt-engineering](https://platform.openai.com/docs/guides/prompt-engineering).
    Those strategies and tactics serve as invaluable guidance for anyone eager to
    master the art of designing effective prompts for LLMs such as ChatGPT 4, aiming
    to improve interaction quality and tailor responses to specific needs.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 已经发布了一份关于 ChatGPT 提示工程的综合指南，可在 [https://platform.openai.com/docs/guides/prompt-engineering](https://platform.openai.com/docs/guides/prompt-engineering)
    查阅。这些策略和战术为任何渴望掌握为 LLMs（如 ChatGPT 4）设计有效提示的艺术的人提供了无价的指导，旨在提高交互质量并针对特定需求定制响应。
- en: Prompt framework options
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示框架选项
- en: 'Many blogs have compiled different effective prompt frameworks that serve as
    excellent starting points for beginners. These frameworks are systematically categorized
    based on their focus: **role-led**, **task-led**, **context-led**, and **goal-led**
    or **purpose-led**. It is crucial to understand and apply the appropriate prompt
    framework based on the specific focus to effectively communicate your objectives,
    particularly when guiding AI or team members in project development, research,
    or problem-solving scenarios. Let’s explore how each of these frameworks can be
    utilized for specific objectives, taking into consideration their strengths and
    applications.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 许多博客已经汇编了不同的有效提示框架，这些框架是初学者的绝佳起点。这些框架根据它们的重点系统地分类：**以角色为导向**、**以任务为导向**、**以情境为导向**、**以目标为导向**或**以目的为导向**。理解并根据具体重点应用适当的提示框架对于有效地传达您的目标至关重要，尤其是在指导
    AI 或团队成员进行项目开发、研究或问题解决场景时。让我们探讨每个框架如何被用于特定目标，同时考虑到它们的优点和应用。
- en: Role-led framework
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 以角色为导向的框架
- en: In the context of ChatGPT prompting, the role-led framework involves defining
    prompts based on specific roles or personas that the AI model is expected to emulate.
    This approach focuses on tailoring the AI’s responses according to the characteristics,
    expertise, and behaviors typical of the role it assumes.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT提示的情境中，角色引导框架涉及根据AI模型预期模仿的具体角色或角色定义提示。这种方法侧重于根据角色通常具有的特征、专业知识和行为来定制AI的响应。
- en: 'Here are the key aspects of the role-led framework:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是角色引导框架的关键方面：
- en: '**AI’s role definition**: This involves clearly defining the role that the
    AI will play in your conversation. For example, in the context of an IoT project,
    you could instruct ChatGPT to act as an experienced software developer proficient
    in embedded C++ on RISC-V architecture MCU, or in Python to develop algorithms
    on AWS Lambda.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI的角色定义**：这涉及明确定义AI在您的对话中将扮演的角色。例如，在物联网项目的情境中，您可以指示ChatGPT扮演一个在RISC-V架构MCU上精通嵌入式C++的资深软件开发者，或者在Python上开发AWS
    Lambda上的算法。'
- en: '**Your persona creation**: This involves describing your persona to the AI
    with a more complex identity. This persona can possess unique traits, backgrounds,
    and expertise that shape how it interprets and responds to prompts. For example,
    you might describe yourself as a high school student with basic Python programming
    skills.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您的角色创建**：这涉及用更复杂的身份向AI描述您的角色。此角色可以拥有独特的特质、背景和专业知识，这些特质塑造了它如何解释和响应提示。例如，您可能描述自己为一个有基本Python编程技能的高中生。'
- en: 'The following examples are popular formations that highlight the role at the
    beginning of a conversation:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些流行的结构，它们在对话开始时突出了角色：
- en: '**Role, Task, and Format (RTF)**: This framework is simple and straightforward.
    It tells AI what role it should play, provides background information, and outlines
    the expected outcome. It’s ideal for projects where the individual’s role significantly
    influences the outcome – for example, a skilled software developer writing educational
    C++ snippets to mentor a high school student who has experience with Python.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**角色、任务和格式（RTF）**：此框架简单直接。它告诉AI应该扮演什么角色，提供背景信息，并概述预期的结果。它非常适合个人角色对结果有重大影响的工程项目——例如，一位熟练的软件开发者编写教育性的C++代码片段来指导一位有Python经验的中学学生。'
- en: '**Role, Action, Context, and Expectation (RACE)**: This framework is action
    and context-oriented, making it ideal for tasks where the sequence of steps and
    the environment are important. It focuses on the actions required, the specific
    context in which they occur, and the expected outcomes. This makes it exceptionally
    effective in complex scenarios requiring nuanced interactions. For instance, an
    AI, acting as a proficient system architect, can design an IoT solution to address
    a customer’s existing pain points and meet their expectations. The framework emphasizes
    the AI’s actions within a given context and aims to clarify the anticipated results
    of these actions.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**角色、行动、情境和期望（RACE）**：此框架以行动和情境为导向，使其非常适合步骤顺序和环境重要的任务。它关注所需的行动、它们发生的具体情境以及预期的结果。这使得它在需要细微互动的复杂场景中特别有效。例如，AI作为熟练的系统架构师，可以设计物联网解决方案来解决客户的现有痛点并满足他们的期望。该框架强调AI在特定情境中的行动，并旨在阐明这些行动预期的结果。'
- en: '**Role, Input, Situation, and Expectation (RISE)**: This framework focuses
    on input and immediate situations, making it ideal for scenarios that require
    adaptability and instant responses. It clarifies the role of the AI, the input
    it will receive, the situation it addresses, and the expected outcomes. This framework
    is particularly beneficial when the AI must handle sensitive or dynamic situations
    accurately. For example, AI, acting as an IoT application designer, designs a
    service flow based on specific event occurrences as input and then generates the
    corresponding reaction.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**角色、输入、情境和期望（RISE）**：此框架侧重于输入和即时情境，使其非常适合需要适应性和即时响应的场景。它明确了AI的角色、它将接收的输入、它所处理的情境以及预期的结果。当AI必须准确处理敏感或动态情境时，此框架特别有益。例如，AI作为物联网应用设计师，根据特定事件发生作为输入设计服务流程，然后生成相应的反应。'
- en: '**Role, Objective, Scenario, Solution, and Steps (ROSSS)**: This framework
    provides a detailed approach to structuring prompts, focusing on comprehensive
    task execution and problem-solving. It is particularly useful in complex environments
    where precise, methodical responses are needed. It helps in creating prompts that
    not only guide the AI on what to do but also how to do it, encompassing a full
    plan from problem understanding to solution implementation. For example, AI, acting
    as an IoT endpoint stack software developer, can be used to develop a communication
    protocol using TLS and MQTT stack that can talk to AWS.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**角色、目标、场景、解决方案和步骤（ROSSS）**：这个框架提供了构建提示的详细方法，侧重于全面的任务执行和问题解决。它在需要精确、系统响应的复杂环境中特别有用。它有助于创建提示，不仅指导AI做什么，还指导AI如何做，涵盖了从问题理解到解决方案实施的全面计划。例如，作为物联网端点堆栈软件开发者的AI可以用来开发使用TLS和MQTT堆栈的通信协议，该协议可以与AWS通信。'
- en: Task-led framework
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务导向框架
- en: The task-led framework focuses on the specific tasks that the AI needs to perform.
    It is more about the actions and processes involved in completing a task. Thus,
    the prompts are designed to be highly directive, specifying exactly what the AI
    is supposed to accomplish.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 以任务为导向的框架侧重于AI需要执行的具体任务。它更多地关注完成任务涉及的动作和过程。因此，提示被设计成高度指导性的，明确指定AI应该完成什么。
- en: 'The following are popular formations:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些流行的结构：
- en: '**Task, Action, and Goal (TAG)**: This is effective for straightforward projects
    with a clear goal, such as creating a marketing campaign or developing a new feature.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务、行动和目标（TAG）**：这种框架适用于目标明确且简单的项目，例如创建营销活动或开发新功能。'
- en: '**Task, Requirement, Expectation, and Format (TREF)**: This is ideal for assignments
    with specific requirements and expected outcomes, such as writing a report or
    creating a presentation.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务、要求、期望和格式（TREF）**：这种框架非常适合具有特定要求和预期成果的作业，如撰写报告或创建演示文稿。'
- en: '**Task, Requirement, Action, Context, and Examples (TRACE)**: This is great
    for educational or training scenarios, where providing context and examples can
    help illustrate complex tasks or concepts.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务、要求、行动、情境和示例（TRACE）**：这种框架非常适合教育或培训场景，提供情境和示例可以帮助说明复杂任务或概念。'
- en: In essence, while the task-led framework is more about *what* the AI does (focusing
    on tasks and results), the role-led framework is about *how* the AI does it (focusing
    on behavior and interaction).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，虽然以任务为导向的框架更多地关注AI做什么（侧重于任务和结果），但以角色为导向的框架更多地关注AI如何做（侧重于行为和交互）。
- en: Context-led framework
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境导向框架
- en: The context-led framework for AI prompting emphasizes the importance of the
    environment or situation in which interactions occur. It’s designed to adapt AI
    responses based on the specific circumstances surrounding each interaction, ensuring
    that the AI’s behavior is appropriate and relevant to the given context.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 以环境为导向的AI提示框架强调环境或情境的重要性，其中交互发生。它旨在根据每次交互周围的具体情况调整AI的响应，确保AI的行为是适当且与给定情境相关的。
- en: 'The following are popular formations:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些流行的结构：
- en: '**Context, Task, and Format (CTF)**: This is perfect for projects that are
    heavily influenced by external factors, such as adapting a product for a new market
    or modifying a service based on user feedback.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境、任务和格式（CTF）**：这种框架非常适合受外部因素严重影响的项目，例如为新市场调整产品或根据用户反馈修改服务。'
- en: '**Context, Action, Result, and Example (CARE)**: This is useful for case studies
    or retrospective analyses, where understanding the action taken and the result
    in a specific context is crucial.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境、行动、结果和示例（CARE）**：这种框架适用于案例研究或回顾性分析，在这种情况下，理解在特定情境中采取的行动和结果至关重要。'
- en: '**Scenario, Problem, Action, and Result (SPAR)**: This is suited for problem-solving
    scenarios, especially in project debriefs or when planning corrective actions
    in project management.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**场景、问题、行动和结果（SPAR）**：这种框架适用于问题解决场景，尤其是在项目总结或规划项目管理中的纠正措施时。'
- en: '**Scenario, Complications, Objective, Plan, and Evaluation (SCOP)**: This is
    excellent for projects that are anticipated to encounter significant challenges.
    It’s suitable for planning under uncertainty, such as new product development
    in a highly competitive market. The evaluation component ensures that there is
    a built-in review process to assess outcomes against objectives.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境、复杂情况、目标、计划和评估（SCOP）**：这对于预期将遇到重大挑战的项目来说非常出色。它适用于在不确定性下规划，例如在高度竞争的市场中开发新产品。评估部分确保有一个内置的审查过程来评估结果与目标的一致性。'
- en: '**Situation, Task, Action, and Result (STAR)**: Commonly used in behavioral
    interview questions, this framework is also effective for project debriefs and
    case studies. It helps in dissecting how specific actions taken in particular
    situations led to outcomes, making it a great learning tool for teams to understand
    decision-making impacts.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境、任务、行动和结果（STAR）**：在行为面试问题中常用，这个框架也适用于项目总结和案例研究。它有助于分析在特定情境中采取的具体行动如何导致结果，对于团队来说，这是一个理解决策影响的学习工具。'
- en: '**Situation, Action, Goal, and Expectation (SAGE)**: This is best suited for
    strategic planning and goal-oriented actions where the situation dictates a specific
    set of actions to achieve a goal. It’s ideal for setting clear expectations for
    the outcomes of these actions.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境、行动、目标和期望（SAGE）**：这最适合战略规划和目标导向的行动，其中情境决定了实现目标的具体行动集合。它非常适合设定这些行动结果的明确期望。'
- en: The main goal of the context-led framework is to enhance the AI’s sensitivity
    to nuances, improving its interactions by making them more aligned with the user’s
    current situation and broader environment. This leads to more intuitive, helpful,
    and empathetic AI systems that seem more aware and capable of dealing with complex
    human environments.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文引导框架的主要目标是增强人工智能对细微差异的敏感性，通过使其与用户的当前情况和更广泛的环境更加一致来改善其交互。这导致更直观、有帮助和富有同理心的AI系统，它们看起来更加警觉并且能够处理复杂的人类环境。
- en: Goal-led framework
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 目标引导框架
- en: The goal-led framework in AI prompting is centered around defining clear objectives
    that the AI system is meant to achieve in its interactions with users. This approach
    focuses on the results or outcomes that are desired from the AI’s performance,
    guiding the AI’s behavior and decision-making process toward these goals.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI提示中，目标引导框架的核心是定义清晰的AI系统在与用户交互中旨在实现的目标。这种方法侧重于从AI的表现中期望的结果或成果，引导AI的行为和决策过程朝着这些目标发展。
- en: 'The following are popular formations:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些流行的结构：
- en: '**Goal, Request, Action, Details, and Examples (GRADE)**: This is effective
    for goal-oriented projects with specific requests, such as launching a product
    or achieving a sales target, where details and examples can guide execution'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标、请求、行动、细节和示例（GRADE）**：这对于具有具体请求的目标导向型项目非常有效，例如推出产品或实现销售目标，其中细节和示例可以指导执行。'
- en: '**Purpose, Expectations, Context, Request, and Action (PECRA)**: This is best
    for projects where understanding the broader purpose and context is essential
    for meeting expectations, such as strategic initiatives or organizational change
    efforts'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目的、期望、情境、请求和行动（PECRA）**：这对于理解更广泛的目的和情境对于满足期望至关重要的项目来说最好，例如战略倡议或组织变革努力。'
- en: Each of these frameworks helps organize and simplify complex information, making
    it easier to understand and communicate. By selecting the appropriate framework
    for the situation, leaders and teams can improve the planning, execution, and
    evaluation of their projects or tasks. Whether you’re dealing with strategic planning,
    operational issues, learning and development, or problem-solving, these frameworks
    offer a structured approach to achieving clarity and alignment.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这些框架中的每一个都有助于组织和简化复杂信息，使其更容易理解和传达。通过为特定情况选择合适的框架，领导者和管理团队可以改善他们项目或任务的规划、执行和评估。无论你是在处理战略规划、运营问题、学习和开发，还是解决问题，这些框架都提供了一种结构化的方法来实现清晰和一致性。
- en: Some of the frameworks may overlap with one another to some extent. However,
    these overlaps are not a flaw but a feature that makes them more useful and applicable
    in different scenarios. By understanding the main components and the specific
    focuses of each framework, you can better adapt your approach to match the requirements
    of your projects or tasks.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 一些框架可能在某种程度上相互重叠。然而，这些重叠不是缺陷，而是使它们在不同场景中更有用和更适用的特性。通过理解每个框架的主要组件和具体重点，你可以更好地调整你的方法以适应你项目或任务的需求。
- en: Best practice prompt examples
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践提示示例
- en: 'Although we talked about many prompt frameworks, it is strongly suggested that
    beginners starting IoT projects start with the role-led and task-led frameworks,
    especially RTF, RACE, TAG, and TREF. Let’s take a closer look:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们讨论了许多提示框架，但强烈建议初学者在开始物联网项目时从以角色为导向和以任务为导向的框架开始，特别是RTF、RACE、TAG和TREF。让我们更深入地了解一下：
- en: '**RACE**: You’re acting as a seasoned product manager driving IoT innovation
    in smart home technology. Your chart identifies customer pain points and translates
    them into actionable insights to drive new product and solution launches (*Role*).
    You are dedicated to crafting a comprehensive product requirement document that
    details not only the MVP features but also conducts an in-depth analysis of the
    target market, competition, and user experience (*Action*). Your current customers
    are complaining about …….. (*Context*). Your document will guide your engineering
    team in developing innovative solutions that resonate deeply with your customers’
    needs. You will collaborate closely with both the software and hardware development
    teams to ensure alignment with technical feasibility and resource availability
    (*Expectation*). Innovation is always your strong desire; you are encouraged to
    take time to think out of the box (*give ChatGPT time* *to think*).'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RACE**: 你扮演的是一个经验丰富的产品经理，负责推动智能家居技术中的物联网创新。你的图表确定了客户的痛点，并将它们转化为可操作见解，以推动新产品和解决方案的发布（*角色*）。你致力于编制一个全面的产品需求文档，不仅详细说明了最小可行产品（MVP）功能，还进行了对目标市场、竞争和用户体验的深入分析（*行动*）。你的现有客户正在抱怨……（*背景*）。你的文档将指导你的工程团队开发出与客户需求深度契合的创新解决方案。你将与软件和硬件开发团队紧密合作，确保与技术可行性和资源可用性保持一致（*期望*）。创新始终是你的强烈愿望；鼓励你花时间跳出思维定式（*给ChatGPT思考的时间*
    *思考*）。'
- en: '**RTF**: Let’s assume you’re an experienced solution architect with a comprehensive
    background in IoT technologies, specializing in smart home technologies (*Role*).
    Leveraging your deep understanding of industry best practices, you are going to
    design a robust, cost-effective, and secure IoT solution guided by the provided
    product requirement document (*using a reference source*). Your design will be
    documented in the system requirements document and will cover end-to-end functionality
    (*Task*). You should also include factors such as system security, data privacy,
    device management, and service scalability. Your document should be organized
    into four sections, including a system high-level diagram, end device, wireless
    connectivity, and cloud platform integration. Each section should provide details
    about the components, key technologies, protocols, recommendations, and the pros
    and cons (*Format*). System robustness should always be your top priority. You’re
    encouraged to refer to widely adopted architectures in the market today and propose
    your design after a comprehensive assessment (*give ChatGPT time* *to think*).'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RTF**: 假设你是一个经验丰富的解决方案架构师，在物联网技术方面拥有全面背景，专注于智能家居技术（*角色*）。利用你对行业最佳实践的深入理解，你将根据提供的产品需求文档设计一个稳健、经济高效且安全的物联网解决方案（*使用参考源*）。你的设计将在系统需求文档中记录，并涵盖端到端功能（*任务*）。你还应包括系统安全性、数据隐私、设备管理和服务可扩展性等因素。你的文档应分为四个部分，包括系统高级图、终端设备、无线连接和云平台集成。每个部分都应提供有关组件、关键技术、协议、建议以及优缺点的详细信息（*格式*）。系统稳健性应始终是你的首要任务。鼓励你参考市场上广泛采用的架构，并在全面评估后提出你的设计（*给ChatGPT思考的时间*
    *思考*）。'
- en: '**TAG**: You’re assuming the role of a seasoned senior hardware development
    engineer with extensive experience in IoT and smart home technologies. Your current
    mission is to design an innovative smart smoke detector for residential use, focusing
    on alerting users through SMS and email when they are out of their homes (*Task*).
    You will develop a hardware prototype reference guide (*Action*) while adhering
    to the specifications outlined in the system requirements document. For detailed
    information on chipset capabilities, consult the ESP32-C6 datasheet at [https://www.espressif.com/sites/default/files/documentation/esp32-c6_datasheet_en.pdf](https://www.espressif.com/sites/default/files/documentation/esp32-c6_datasheet_en.pdf)
    and the MQ-2 smoke sensor specifications at [https://components101.com/sensors/mq2-gas-sensor](https://components101.com/sensors/mq2-gas-sensor)
    (*using a reference source*). Your guide should not only address the technical
    specifications but also explore innovative design and functionality that enhance
    user experience. Your exploration of cutting-edge solutions and attention to detail
    will be pivotal in achieving a balance between reliability, cost, and user-centric
    design (*the goal and to give ChatGPT time* *to think*).'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TAG**: 你扮演一位经验丰富的资深硬件开发工程师，在物联网和智能家居技术方面拥有丰富的经验。你当前的任务是设计一款创新的家用智能烟雾探测器，重点关注当用户不在家时通过短信和电子邮件提醒用户（*任务*）。你将开发一个硬件原型参考指南（*行动*），同时遵守系统需求文档中概述的规范。有关芯片组功能的详细信息，请参阅[https://www.espressif.com/sites/default/files/documentation/esp32-c6_datasheet_en.pdf](https://www.espressif.com/sites/default/files/documentation/esp32-c6_datasheet_en.pdf)中的ESP32-C6数据表和MQ-2烟雾传感器规范[https://components101.com/sensors/mq2-gas-sensor](https://components101.com/sensors/mq2-gas-sensor)（*使用参考来源*）。你的指南不仅应解决技术规范，还应探讨创新设计和功能，以提升用户体验。你对尖端解决方案的探索和对细节的关注将在实现可靠性、成本和以用户为中心的设计之间取得平衡（*目标和给ChatGPT思考时间*）。'
- en: '**TREF**: You’re a proficient senior software developer who has been tasked
    with developing the cloud registration feature of a smart smoke detector (*Task*).
    To implement this feature, the following steps must be taken to meet the service
    logic (*requirements and specifying the steps needed to complete* *a subtask*):'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TREF**: 你是一位熟练的高级软件开发人员，被委以开发智能烟雾探测器云注册功能（*任务*）。为了实现这一功能，必须采取以下步骤以满足服务逻辑（*需求以及完成子任务所需的步骤*）：'
- en: Preconfigure the ESP32 device in AWS IoT Core.
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在AWS IoT Core中预配置ESP32设备。
- en: Initiate the Wi-Fi connection from the ESP32 device to the home Wi-Fi router.
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从ESP32设备启动Wi-Fi连接到家庭Wi-Fi路由器。
- en: Securely connect with AWS IoT Core through TLS.
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过TLS安全连接到AWS IoT Core。
- en: Create a JSON payload that includes the device ID, model, firmware version,
    battery level, and current timestamp in the Pacific Time Zone.
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个JSON有效负载，包括设备ID、型号、固件版本、电池水平和太平洋时区的当前时间戳。
- en: Send the MQTT Publish Topic with a JSON payload to AWS IoT Core.
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将带有JSON有效负载的MQTT发布主题发送到AWS IoT Core。
- en: Change the ESP32 device’s LED to always-on green upon successful registration.
  id: totrans-105
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在成功注册后，将ESP32设备的LED灯改为始终开启的绿色。
- en: Keep the Wi-Fi connection alive for 1 minute.
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持Wi-Fi连接1分钟。
- en: Drop the Wi-Fi connection but still keep the LED always on green.
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 断开Wi-Fi连接，但LED灯始终保持绿色。
- en: Restart from *Step II* after four hours.
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 四小时后从*步骤II*重新启动。
- en: Please structure your C++ source code so that it includes sections for comments,
    library imports, variable declarations, function definition, a `setup()` function,
    a `loop()` function, and a line with `*` inserted to separate each section (*Format*).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 请将你的C++源代码结构化，包括注释部分、库导入、变量声明、函数定义、一个`setup()`函数、一个`loop()`函数，以及一行带有`*`插入以分隔每个部分的代码（*格式*）。
- en: In this section, we explored the best practices and advanced tactics that are
    specifically tailored for beginners starting their journey with ChatGPT in IoT
    projects. The next section will provide valuable tips and examples on effectively
    requesting ChatGPT to generate C++ code for the ESP32 platform. These insights
    aim to enhance your understanding, particularly within your engineering examples
    from [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302), and ensure a more streamlined
    and successful project development process.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了专门针对初学者在物联网项目中开始使用ChatGPT的最佳实践和高级策略。下一节将提供有关有效请求ChatGPT为ESP32平台生成C++代码的宝贵提示和示例。这些见解旨在增强你的理解，特别是对你从[*第11章*](B22002_11.xhtml#_idTextAnchor302)中的工程示例，并确保项目开发过程更加流畅和成功。
- en: Generating code snippets on ESP32
  id: totrans-111
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在ESP32上生成代码片段
- en: To optimize the use of ChatGPT for generating code snippets on ESP32, especially
    for complex projects such as your IoT end-device development for smart home use
    cases, adopting a structured approach to your prompts can significantly improve
    the output’s quality and relevance.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化ChatGPT在ESP32上生成代码片段的使用，特别是对于复杂项目，如用于智能家居用例的物联网终端设备开发，采用结构化的提示方法可以显著提高输出的质量和相关性。
- en: 'Here are some useful tips that can guide you in crafting effective prompts
    for generating code:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些有用的提示，可以帮助您在构建生成代码的有效提示时进行指导：
- en: '`I am using Microsoft Visual Studio Code with the PlatformIO extension, espressif32
    platform, and` `Arduino framework`.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`我使用带有PlatformIO扩展的Microsoft Visual Studio Code，espressif32平台和` `Arduino框架`。'
- en: '`I am using ESP32-C3 as the MCU and MQ2 as the Smoke Sensor in` `my project`.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`在我的项目中，我使用ESP32-C3作为MCU，MQ2作为烟雾传感器`。'
- en: '`I am using GPIO2 of ESP32-C3 to connect to the MQ2 Digital Out Pin, and GPIO
    4 of ESP32-C3 to connect to the MQ2 Analog` `Out Pin`.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`我在ESP32-C3的GPIO2上连接到MQ2的数字输出引脚，GPIO 4连接到MQ2的模拟输出引脚`。'
- en: '`Please refer to the pin layout map of ESP32-C3 and MQ2 and recommend the`
    `pin connection`.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`请参考ESP32-C3和MQ2的引脚布局图，并推荐` `引脚连接`。'
- en: '`I am an entry-level software programmer working with Python and with very
    little knowledge of C++. Please generate code that is easy to understand for someone
    with` `my background.`*   `I''d like the format that each code snippet always
    starts with a brief explanation of its purpose and includes line-by-line comments
    to clarify` `the logic.`*   `Please generate the actual code for my asks, not`
    `pseudo examples.`*   `Please advise me if there is a security concern in my code
    when including my AWS account` `access certificates.`*   `At the bottom of your
    code snippets, please include a section about how to validate these` `code snippets.`*   `I
    like your answers, it is almost what I expected, let us make some improvements
    based on the` `current output`.*   `I like your answers and output format, it
    is exactly what I want, from now on, please maintain this format for future code
    generation cases, ensuring clarity and detailed comments with each section` `clearly
    explained!`*   **Version control**: You may consider maintaining versions of the
    generated code using a version control system such as Git. This can help you track
    changes and facilitate collaboration.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`我是一名初级软件程序员，使用Python，对C++了解很少。请为我生成易于理解的代码，我的背景是` `这样的`。*   `我希望每个代码片段都以对其目的的简要说明开始，并包括逐行注释以阐明`
    `逻辑`。*   `请为我生成实际的代码，而不是` `伪代码`。*   `如果在我的代码中包含AWS账户` `访问证书`存在安全顾虑，请提供建议。*   `在代码片段的底部，请包括如何验证这些`
    `代码片段`的部分。*   `我喜欢你的答案，它几乎是我预期的，让我们根据当前的输出做一些改进`。*   `我喜欢你的答案和输出格式，这正是我想要的，从现在开始，请为未来的代码生成案例保持此格式，确保每个部分都有清晰的解释和详细的注释`！*   **版本控制**：您可以考虑使用Git等版本控制系统维护生成的代码版本。这可以帮助您跟踪更改并促进协作。'
- en: 'Let’s go through a code snippet that generates examples:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个生成示例的代码片段来了解一下：
- en: '`Hi, ChatGPT, please act as a proficient senior software developer to develop
    the cloud registration feature of smart smoke detector. I am a high school student
    with basic knowledge of Python but no C++ experience. Please ensure that your
    code is easy to understand for someone with my background. Please try to add comments
    to each line of your code, do not produce` `pseudo code.`'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '`嗨，ChatGPT，请扮演一名熟练的高级软件开发者，开发智能烟雾探测器的云注册功能。我是一个高中生，对Python有基本了解，但没有C++经验。请确保您的代码对我这样的背景的人来说易于理解。请尝试为代码的每一行添加注释，不要生成`
    `伪代码`。'
- en: '`You shall use Microsoft Visual Studio Code IDE with the PlatformIO extension,
    espressif32 platform, and Arduino framework. Temporarily hardcode Wi-Fi access
    credentials for development purposes, but plan for a secure credential management
    method` `in production.`'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '`您应使用带有PlatformIO扩展的Microsoft Visual Studio Code IDE，espressif32平台和Arduino框架。为开发目的，暂时将Wi-Fi访问凭据硬编码，但计划在生产中采用安全的凭据管理方法`
    `方式`。'
- en: '`The expected feature logic is strictly following` `these steps:`'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '`预期的功能逻辑严格遵循以下步骤`。'
- en: '`Step 1: Pre-configure the ESP32 device in AWS` `IoT Core`'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤1：在AWS IoT Core中预配置ESP32设备`。'
- en: '`Step 2: Initiate the Wi-Fi connection from the ESP32 device to the home` `Wi-Fi
    router`'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤2：从ESP32设备启动到家庭` `Wi-Fi路由器`的连接`'
- en: '`Step 3: Securely connect with AWS IoT Core service` `through TLS`'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤3：通过TLS安全连接到AWS IoT Core服务`。'
- en: '`Step 4: Create a JSON payload including device ID, model, and firmware version,
    battery level and current timestamp at Pacific` `Time Zone`'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤 4：创建包含设备 ID、型号和固件版本、电池级别和太平洋时区当前时间戳的 JSON 有效负载`'
- en: '`Step 5: Send the MQTT Publish Topic with JSON payload to AWS` `IoT Core`'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤 5：将带有 JSON 有效负载的 MQTT 发布主题发送到 AWS` `IoT Core`'
- en: '`Step 6: Change the ESP32 device LED to always-on green upon` `successful registration`'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤 6：在成功注册后，将 ESP32 设备 LED 改为始终开启的绿色`'
- en: '`Step 7: Keep Wi-Fi connection alive for` `1 minute`'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤 7：保持 Wi-Fi 连接` `1 分钟`'
- en: '`Step 8: Drop the Wi-Fi connection but keep the LED` `always-on green`'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤 8：断开 Wi-Fi 连接但保持 LED` `始终开启的绿色`'
- en: '`Step 9: Restart from Step 2 after` `4 hours`'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`步骤 9：在` `4 小时后从步骤 2 重新开始`'
- en: '`Please structure your C++ source code including sections for entire code explanation,
    libraries import, variables declaration, function definition, setup() function,
    loop() function, and insert a line with "*" between` `each section.`'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '`请结构化您的 C++ 源代码，包括整个代码说明、库导入、变量声明、函数定义、setup() 函数、loop() 函数部分，并在每个部分之间插入一行“*”。`'
- en: '`Code explanation Section: Begin with comprehensive comments describing the
    creation date, author, the purpose and structure of the code, security risks,
    testing and` `validation approach.`'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`代码说明部分：从描述创建日期、作者、代码的目的和结构、安全风险、测试和验证方法的全面注释开始。`'
- en: '`Libraries Import Section: Import necessary libraries, commenting on the purpose
    of` `each library`'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`库导入部分：导入必要的库，注释说明每个库的` `用途`'
- en: '`Variables Declare Section: Declare the variables used in this code, commenting
    on the definition` `of each.`'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`变量声明部分：声明在此代码中使用的变量，注释说明每个变量的` `定义。`'
- en: '`Functions Section: Define functions with clear comments explaining their purpose`
    `and usage.`'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`函数部分：定义带有清晰注释的函数，说明其` `目的和用法。`'
- en: '`Setup Section: Detail the setup() function, including` `initial configurations.`'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`设置部分：详细说明 setup() 函数，包括` `初始配置。`'
- en: '`Loop Section: Outline the loop() part, describing its` `continuous operations.`'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`循环部分：概述 loop() 部分，描述其` `连续操作。`'
- en: ChatGPT’s output may look like what’s shown at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_6/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_6/main.cpp).
    You may refer to it when you have your own code.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的输出可能看起来像 [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_6/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_6/main.cpp)
    中所示。当您有自己的代码时，您可以参考它。
- en: As highlighted earlier, when using ChatGPT to generate code for your IoT project,
    you must select a prompting framework that’s suitable for your situation. Since
    ChatGPT may not always provide completely accurate code, you should continue the
    conversation to fine-tune the outcome.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，当使用 ChatGPT 为您的物联网项目生成代码时，您必须选择适合您情况的提示框架。由于 ChatGPT 可能并不总是提供完全准确的代码，您应该继续对话以微调结果。
- en: Summary
  id: totrans-141
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed the benefits of AI and its application in IoT
    projects, explored various effective prompting frameworks, and provided an IoT
    project example of instructing ChatGPT to generate code on ESP32.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了人工智能的优势及其在物联网项目中的应用，探讨了各种有效的提示框架，并提供了指导 ChatGPT 在 ESP32 上生成代码的物联网项目示例。
- en: In the next chapter, we will review the top 10 popular IoT project examples
    currently in the market and provide corresponding coding prompts.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将回顾当前市场上最受欢迎的 10 个物联网项目示例，并提供相应的编码提示。
