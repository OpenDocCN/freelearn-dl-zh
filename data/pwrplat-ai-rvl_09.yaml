  zh: 在 **输入候选人简历** 字段中，在 **将 PDF 文档转换为文本（****txt）** 动作下添加 **body/TextResult** 动态内容令牌：
- en: '![Figure 9.32 – Adding the Cloudmersive Convert PDF Document to Text (txt)
    action](img/B21234_09_32.jpg)'
  id: totrans-318
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.32 – 添加 Cloudmersive 将 PDF 文档转换为文本（txt）动作](img/B21234_09_32.jpg)'
- en: Figure 9.32 – Adding the Cloudmersive Convert PDF Document to Text (txt) action
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.32 – 添加 Cloudmersive 将 PDF 文档转换为文本（txt）动作
- en: In the **Input RoleDescription** field, add the **JobDescription** dynamic content
    token under the **Get items Import job** **descriptions** action.
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **输入角色描述** 字段中，在 **获取项目 导入职位描述** 动作下添加 **JobDescription** 动态内容令牌。
- en: Click **Save**.
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **保存**。
- en: You’ve only got a few sections left! Next, we’ll update some variables that
    we can use for updating the candidate’s record in the SharePoint list and generating
    messages to post to Teams or send via email.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 您只剩下几个部分了！接下来，我们将更新一些变量，我们可以使用这些变量来更新 SharePoint 列表中的候选人记录并生成要发布到 Teams 或通过电子邮件发送的消息。
- en: Updating the candidate record
  id: totrans-323
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更新候选人记录
- en: 'In this section, we’ll take the generated data elements from the GPT action
    and add them back to the candidate record. Follow these steps:'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将从 GPT 动作生成的数据元素中添加它们回到候选人记录中。按照以下步骤操作：
- en: After the `– RoleFitJson` to the action name.
  id: totrans-325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在动作名称后添加 `– RoleFitJson`。
- en: In the **Name** field, select **RoleFitJson**.
  id: totrans-326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **名称** 字段中，选择 **RoleFitJson**。
- en: In the **Value** field, select the **Text** dynamic content token under the
    **Create text with GPT using a prompt Evaluate candidate against job** **description**
    action.
  id: totrans-327
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **值** 字段中，选择在 **使用提示评估与职位描述的候选人** 动作下 **创建文本** 动态内容令牌。
- en: 'This dynamic content token contains the JSON structure we specified in the
    prompt:'
  id: totrans-328
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此动态内容标记包含我们在提示中指定的JSON结构：
- en: '![Figure 9.33 – Adding the text output of the GPT prompt](img/B21234_09_33.jpg)'
  id: totrans-329
  prefs: []
  type: TYPE_IMG
  zh: '![图9.33 – 添加GPT提示文本输出](img/B21234_09_33.jpg)'
- en: Figure 9.33 – Adding the text output of the GPT prompt
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.33 – 添加GPT提示文本输出
- en: Add a `– Extract generated RoleFit data` to the action name.
  id: totrans-331
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在动作名称中添加`– 提取生成的RoleFit数据`。
- en: In the **Content** field, add the **RoleFitJson** variable dynamic content token.
  id: totrans-332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**内容**字段中，添加**RoleFitJson**变量动态内容标记。
- en: 'In the **Schema** area, paste the following definition:'
  id: totrans-333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**架构**区域，粘贴以下定义：
- en: '[PRE1]'
  id: totrans-334
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This schema is used to define the structure of the JSON array. Notice the name/value
    pair definitions along with their content type. The `– RoleFit` to the action
    name.
  id: totrans-335
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此架构用于定义JSON数组的结构。注意名称/值对定义及其内容类型。在动作名称中添加`– RoleFit`。
- en: In the **Name** field, select the **RoleFit** variable.
  id: totrans-336
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**名称**字段中，选择**RoleFit**变量。
- en: 'In the **Value** field, add the **Body RoleFit** dynamic content token under
    the **Parse JSON Extract generated RoleFit** **data** action:'
  id: totrans-337
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**值**字段中，在**解析JSON提取生成的RoleFit数据**动作下添加**Body RoleFit**动态内容标记。
- en: '![Figure 9.34 – Selecting the RoleFit content](img/B21234_09_34.jpg)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
  zh: '![图9.34 – 选择RoleFit内容](img/B21234_09_34.jpg)'
- en: Figure 9.34 – Selecting the RoleFit content
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.34 – 选择RoleFit内容
- en: Add a `– RoleFitSummary` to the action name.
  id: totrans-340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在动作名称中添加`– RoleFitSummary`。
- en: In the **Name** field, select the **RoleFitSummary** variable.
  id: totrans-341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**名称**字段中，选择**RoleFitSummary**变量。
- en: In the **Value** field, add the **Body RoleFitSummary** dynamic content token
    under the **Parse JSON Extract generated RoleFit** **data** action.
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**值**字段中，在**解析JSON提取生成的RoleFit数据**动作下添加**Body RoleFitSummary**动态内容标记。
- en: Add a `– CandidateSummary` to the action name.
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在动作名称中添加`– CandidateSummary`。
- en: In the **Name** field, select the **CandidateSummary** variable.
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**名称**字段中，选择**CandidateSummary**变量。
- en: In the **Value** field, add the **Body CandidateSummary** dynamic content token
    under the **Parse JSON Extract generated RoleFit** **data** action.
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**值**字段中，在**解析JSON提取生成的RoleFit数据**动作下添加**Body CandidateSummary**动态内容标记。
- en: Add an `– Update Candidate Status` to the action name.
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在动作名称中添加`– 更新候选人状态`。
- en: Under **Site Address**, select the SharePoint site containing the candidate
    resumes and list.
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**站点地址**下，选择包含候选人简历和列表的SharePoint站点。
- en: Under **List Name**, select **Candidates**.
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**列表名称**下，选择**候选人**。
- en: 'In the **Id** field, add the **ID** dynamic content token under the **Create
    item Candidate list** **entry** action:'
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**ID**字段中，在**创建项候选人列表条目**动作下添加**ID**动态内容标记。
- en: '![Figure 9.35 – Configuring the Update item action – Update Candidate Status](img/B21234_09_35.jpg)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![图9.35 – 配置更新项动作 – 更新候选人状态](img/B21234_09_35.jpg)'
- en: Figure 9.35 – Configuring the Update item action – Update Candidate Status
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.35 – 配置更新项动作 – 更新候选人状态
- en: Under **Advanced Parameters**, click **Show all**.
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**高级参数**下，点击**显示全部**。
- en: In the **Candidate Summary** field, add the **CandidateSummary** variable.
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**候选人摘要**字段中，添加**CandidateSummary**变量。
- en: In the **Service Desk Technician** field, add the **RoleFit** variable.
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**服务台技术人员**字段中，添加**RoleFit**变量。
- en: 'In the **Reason** field, add the **RoleFitSummary** variable. See *Figure 9**.36*:'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**原因**字段中，添加**RoleFitSummary**变量。见*图9.36*：
- en: '![Figure 9.36 – Adding the output variables](img/B21234_09_36.jpg)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
  zh: '![图9.36 – 添加输出变量](img/B21234_09_36.jpg)'
- en: Figure 9.36 – Adding the output variables
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.36 – 添加输出变量
- en: Click **Save** to save the progress on the flow. In the final section, we’ll
    add some notifications.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**保存**以保存流程上的进度。在最后部分，我们将添加一些通知。
- en: Sending confirmation messages
  id: totrans-359
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发送确认消息
- en: 'After updating the candidate’s **RoleFit** status as either **Yes**, **No**,
    or **Maybe**, it’s time to send some notifications! Follow these steps:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 在将候选人的**RoleFit**状态更新为**是**、**否**或**可能**之后，是时候发送一些通知了！请按照以下步骤操作：
- en: After the **Update item** action (where you updated the candidate’s status),
    click **Add an action** and select the **Condition** control.
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**更新项**动作（更新候选人状态的地方）之后，点击**添加动作**并选择**条件**控件。
- en: Change the expression evaluation from **AND** to **OR**.
  id: totrans-362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将表达式评估从**AND**更改为**OR**。
- en: In the first box, add the dynamic content token for the `Yes`.
  id: totrans-363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在第一个框中，添加`Yes`的动态内容标记。
- en: Click **New item** and then select **Add row**.
  id: totrans-364
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**新建项**然后选择**添加行**。
- en: 'In the first box of the new row, add the dynamic content token for the `Maybe`.
    See *Figure 9**.37*:'
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在新行的第一个框中，添加`Maybe`的动态内容标记。见*图9.37*：
- en: '![Figure 9.37 – Adding a Condition control for RoleFit](img/B21234_09_37.jpg)'
  id: totrans-366
  prefs: []
  type: TYPE_IMG
  zh: '![图9.37 – 为RoleFit添加条件控制](img/B21234_09_37.jpg)'
- en: Figure 9.37 – Adding a Condition control for RoleFit
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.37 – 为RoleFit添加条件控制
- en: 'In the **True** branch of the **Condition** control, add the **Post message
    in a chat or channel** Teams action, as shown in *Figure 9**.38*:'
  id: totrans-368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**条件**控制的**真**分支中，添加如图*图9.38*所示的**在聊天或频道中发布消息**的Teams操作：
- en: '![Figure 9.38 – Adding the Teams post message action](img/B21234_09_38.jpg)'
  id: totrans-369
  prefs: []
  type: TYPE_IMG
  zh: '![图9.38 – 添加Teams发布消息操作](img/B21234_09_38.jpg)'
- en: Figure 9.38 – Adding the Teams post message action
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.38 – 添加Teams发布消息操作
- en: Under **Post As**, select **Flow bot**.
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**以…发布**下，选择**流程机器人**。
- en: Under **Post In**, select **Channel**.
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**发布到**下，选择**频道**。
- en: Under **Team**, select the **Jobs and** **candidates** team.
  id: totrans-373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**团队**下，选择**工作和候选人**团队。
- en: Under **Channel**, select **General**.
  id: totrans-374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**频道**下，选择**通用**。
- en: 'Customize the message area using tokens, such as *Candidate Summary*, *Role
    Fit*, and a link to the resume:'
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用标记，如*候选人摘要*、*角色匹配*和简历链接自定义消息区域：
- en: '![Figure 9.39 – Creating a Teams channel notification](img/B21234_09_39.jpg)'
  id: totrans-376
  prefs: []
  type: TYPE_IMG
  zh: '![图9.39 – 创建Teams频道通知](img/B21234_09_39.jpg)'
- en: Figure 9.39 – Creating a Teams channel notification
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.39 – 创建Teams频道通知
- en: In the **False** condition branch, add the **Send an email from a shared mailbox
    (V2)** Office 365 Outlook action.
  id: totrans-378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**假**条件分支中，添加**从共享邮箱发送电子邮件（V2）** Office 365 Outlook操作。
- en: In the **Original Mailbox Address** field, select **Enter custom value** and
    then add the email address of the shared mailbox configured earlier in this chapter.
  id: totrans-379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**原始邮箱地址**字段中，选择**输入自定义值**，然后添加本章中配置的共享邮箱的电子邮件地址。
- en: In the **To** field, add the **Email value** dynamic content token from the
    **Extract information from documents Extract candidate information from resume**
    AI Builder action. This will select the email address specified in the resume.
  id: totrans-380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**收件人**字段中，添加来自**从简历中提取信息提取候选人信息** AI Builder操作的**电子邮件值**动态内容标记。这将选择简历中指定的电子邮件地址。
- en: In the **Subject** field, enter a message.
  id: totrans-381
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**主题**字段中，输入一条消息。
- en: 'In the **Body** text area, enter a message to send back to a candidate, using
    any of the dynamic content tokens that you find appropriate for the message (such
    as the **First name value** token from the **Extract …** AI Builder action:'
  id: totrans-382
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**正文**区域，输入要发送给候选人的消息，可以使用您认为适合消息的任何动态内容标记（例如，来自**提取…** AI Builder操作的**First
    name value**标记）：
- en: '![Figure 9.40 – Customizing the email message](img/B21234_09_40.jpg)'
  id: totrans-383
  prefs: []
  type: TYPE_IMG
  zh: '![图9.40 – 自定义电子邮件消息](img/B21234_09_40.jpg)'
- en: Figure 9.40 – Customizing the email message
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.40 – 自定义电子邮件消息
- en: Click **Save**.
  id: totrans-385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**保存**。
- en: Now for the moment of truth!
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是关键时刻！
- en: Testing the flow
  id: totrans-387
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试流程
- en: 'To test the flow, you’ll need a few things:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试流程，您需要一些东西：
- en: A few sample resumes (one that should match the job description and one that
    shouldn’t)
  id: totrans-389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几份简历样本（一份应该符合工作描述，另一份则不应符合）
- en: An email account to send the resumes from
  id: totrans-390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于发送简历的电子邮件账户
- en: 'To test the flow, follow these steps:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试流程，请按照以下步骤操作：
- en: From the flow designer, click **Test**.
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从流程设计器中，点击**测试**。
- en: Select the **Manually** radio button and then click **Test**.
  id: totrans-393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**手动**单选按钮，然后点击**测试**。
- en: Launch your email client and send an email with a sample resume to the shared
    mailbox configured.
  id: totrans-394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动您的电子邮件客户端并向配置的共享邮箱发送带有样本简历的电子邮件。
- en: 'Review the flow run history as it is updated in the flow designer:'
  id: totrans-395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看流程运行历史，它在流程设计器中更新：
- en: '![Figure 9.41 – Reviewing the flow run history](img/B21234_09_41.jpg)'
  id: totrans-396
  prefs: []
  type: TYPE_IMG
  zh: '![图9.41 – 查看流程运行历史](img/B21234_09_41.jpg)'
- en: Figure 9.41 – Reviewing the flow run history
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.41 – 查看流程运行历史
- en: 'Launch Microsoft Teams and navigate to the **Jobs and candidates** team. Check
    the channel you specified in the **Post message** action to see how the resume
    was evaluated:'
  id: totrans-398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动Microsoft Teams并导航到**工作和候选人**团队。检查**发布消息**操作中指定的频道，以查看简历是如何被评估的：
- en: '![Figure 9.42 – Reviewing the Teams channel post](img/B21234_09_42.jpg)'
  id: totrans-399
  prefs: []
  type: TYPE_IMG
  zh: '![图9.42 – 查看Teams频道帖子](img/B21234_09_42.jpg)'
- en: Figure 9.42 – Reviewing the Teams channel post
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.42 – 查看Teams频道帖子
- en: 'Next, navigate to the **Jobs and candidates** SharePoint site and select the
    **Candidates** list to see your resume submissions:'
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，导航到**工作和候选人** SharePoint网站并选择**候选人**列表以查看您的简历提交：
- en: '![Figure 9.43 – Reviewing resume submissions](img/B21234_09_43.jpg)'
  id: totrans-402
  prefs: []
  type: TYPE_IMG
  zh: '![图9.43 – 查看简历提交](img/B21234_09_43.jpg)'
- en: Figure 9.43 – Reviewing resume submissions
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.43 – 查看简历提交
- en: Congratulations! You’ve successfully verified the flow!
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！您已成功验证了流程！
- en: If the flow mis-categorizes resumes, you can easily go back and adjust the prompt
    to raise or lower the confidence requirements.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 如果流程错误地将简历分类，你可以轻松地返回并调整提示，以提高或降低置信度要求。
- en: Further exploration
  id: totrans-406
  prefs:
