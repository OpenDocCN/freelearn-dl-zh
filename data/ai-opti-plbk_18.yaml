- en: '13'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: Implementing RAI Frameworks, Metrics, and Best Practices
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施RAI框架、指标和最佳实践
- en: The preceding chapter laid out the essential groundwork for understanding the
    principles and significance of **Responsible AI** ( **RAI** ). However, translating
    these guiding ideals into tangible practice requires a structured and deliberate
    approach. This chapter serves as a practical roadmap for operationalizing RAI,
    moving beyond theoretical discussions to provide actionable strategies and tools
    that organizations can implement throughout the AI life cycle. Effectively embedding
    ethical considerations is not a passive aspiration but an active process that
    demands the establishment of clear frameworks, the application of relevant metrics,
    and the adoption of proven best practices.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 前一章阐述了理解**负责任AI**（**RAI**）原则和重要性的基本基础。然而，将这些指导理念转化为具体实践需要一种结构化和深思熟虑的方法。本章作为实施RAI的实用路线图，将超越理论讨论，提供可操作的战略和工具，供组织在AI生命周期中实施。有效地嵌入伦理考量不是一种被动的愿望，而是一个需要建立明确框架、应用相关指标和采用经过验证的最佳实践的主动过程。
- en: This chapter will guide you through the essential components of an ethical AI
    implementation strategy. We will begin by exploring various frameworks for ethical
    AI governance, such as the establishment of a dedicated RAI governance committee
    and the utilization of ethical risk assessment checklists. These frameworks provide
    the foundational structure for oversight and risk mitigation (Mucci & Stryker,
    2024). Building upon this, we will delve into tangible ethical governance structures
    and processes, including the formation of AI ethics boards and the crucial practice
    of routine bias audits, which promotes ongoing vigilance and accountability.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将指导您了解道德AI实施策略的基本组成部分。我们将从探讨道德AI治理的各种框架开始，例如建立专门的RAI治理委员会和利用道德风险评估清单。这些框架为监督和风险缓解提供了基础结构（Mucci
    & Stryker, 2024）。在此基础上，我们将深入研究具体的道德治理结构和流程，包括成立AI伦理委员会和至关重要的常规偏见审计实践，这促进了持续的警惕和问责制。
- en: Recognizing that AI systems are not infallible, this chapter will also examine
    the strategic integration of **Human-in-the-Loop** ( **HITL** ) approaches. We
    will explore where and how human oversight can be effectively incorporated, particularly
    in high-stakes decision-making scenarios where ethical considerations and nuanced
    judgment are paramount. Furthermore, to move beyond qualitative assessments, we
    will present key metrics for quantifying RAI, encompassing fairness, explainability,
    robustness, privacy, and safety. These metrics provide a tangible way to evaluate
    and track progress toward more RAI systems.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到AI系统并非完美无缺，本章还将探讨**人机交互**（**HITL**）方法的战略整合。我们将探讨在伦理考量至关重要、需要细微判断的高风险决策场景中，如何有效地融入人类监督。此外，为了超越定性评估，我们将介绍量化RAI的关键指标，包括公平性、可解释性、鲁棒性、隐私性和安全性。这些指标为评估和跟踪向更完善的RAI系统迈进提供了具体的方法。
- en: Finally, the chapter will outline essential best practices for implementing
    RAI, including techniques for data anonymization, strategies for inclusive dataset
    curation, and the critical importance of comprehensive model documentation and
    transparency. By adopting these practices, organizations can proactively build
    ethical considerations into their AI development and deployment workflows. To
    illustrate the practical application of these concepts, a real-world case study
    will detail a company’s journey in establishing and executing a comprehensive
    RAI program, highlighting the steps taken and the tangible outcomes achieved.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，本章将概述实施RAI的基本最佳实践，包括数据匿名化技术、包容性数据集编目策略以及全面模型文档和透明度的关键重要性。通过采用这些实践，组织可以积极地将道德考量融入其AI开发和部署的工作流程。为了说明这些概念的实际应用，一个真实世界的案例研究将详细描述一家公司在建立和执行全面RAI计划过程中的旅程，突出所采取的步骤和取得的实际成果。
- en: 'The key topics to be covered include the following:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 将要涵盖的关键主题包括以下内容：
- en: Framework for ethical AI governance
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 道德AI治理框架
- en: Regulatory compliance in a global context
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 全球背景下的合规性
- en: Human-in-the-loop approaches
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人机交互方法
- en: Metrics for RAI
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAI指标
- en: Best practices for implementing RAI
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施RAI的最佳实践
- en: Real-world applications of RAI
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAI在现实世界中的应用
- en: By the end of this chapter, you will be equipped with the knowledge and practical
    guidance necessary to move from understanding the why of RAI to effectively implementing
    the how, fostering trust in AI systems, and paving the way for their sustainable
    and ethical integration into business and society.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将具备从理解RAI的“为什么”到有效实施“如何做”的知识和实践指导，这将有助于建立对AI系统的信任，并为它们在商业和社会中的可持续和道德整合铺平道路。
- en: Framework for ethical AI governance
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 道德AI治理框架
- en: Organizations seeking to operationalize RAI need robust governance frameworks.
    These frameworks provide the essential structure and guiding principles for ensuring
    ethical considerations are integrated throughout the entire AI life cycle, from
    ideation and development to deployment and ongoing monitoring. Establishing clear
    lines of responsibility, documented processes, and mechanisms for oversight are
    critical for building trustworthy and sustainable AI systems. This section introduces
    several key frameworks and components that organizations can adopt to establish
    effective ethical AI governance.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求实施RAI（责任人工智能）的组织需要强大的治理框架。这些框架提供了确保道德考量在整个AI生命周期中得以整合的基本结构和指导原则，从构思和开发到部署和持续监控。建立清晰的职责线、记录的过程和监督机制对于构建可信赖和可持续的人工智能系统至关重要。本节介绍了组织可以采用以建立有效的道德AI治理的几个关键框架和组件。
- en: One fundamental element of ethical AI governance is the establishment of RAI
    governance committees. These committees typically comprise individuals with diverse
    expertise, including AI developers, ethicists, legal counsel, business stakeholders,
    and representatives from relevant user groups. The primary role of an RAI governance
    committee (the organization’s strategic policy-setting and oversight body) is
    to provide guidance on all aspects of AI development and deployment from an ethical
    perspective.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 道德AI治理的一个基本要素是建立RAI治理委员会。这些委员会通常由具有不同专业知识的个人组成，包括AI开发者、伦理学家、法律顾问、商业利益相关者和相关用户组的代表。RAI治理委员会（组织的战略政策制定和监督机构）的主要作用是从道德角度提供关于AI开发和部署所有方面的指导。
- en: 'Their responsibilities may include the following:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的职责可能包括以下内容：
- en: '**Defining ethical guidelines and policies** : Establishing clear principles
    and rules that govern the development and use of AI within the organization'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义道德指南和政策**：建立明确的原则和规则，以规范组织内部人工智能的开发和使用'
- en: '**Reviewing AI project proposals** : Assessing the potential ethical implications
    of new AI initiatives before development begins'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审查AI项目提案**：在开发开始之前评估新AI倡议的潜在道德影响'
- en: '**Evaluating model design and architecture** : Instilling that ethical considerations
    are embedded in the technical design of AI systems'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估模型设计和架构**：确保道德考量嵌入到人工智能系统的技术设计中'
- en: '**Monitoring model performance and impact** : Continuously tracking the real-world
    effects of deployed AI systems for potential ethical concerns, including bias
    and fairness issues'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控模型性能和影响**：持续跟踪部署的人工智能系统的实际效果，以识别潜在的道德问题，包括偏差和公平性问题'
- en: '**Providing recommendations for mitigation and remediation** : Identifying
    and suggesting corrective actions for any ethical risks or harms that arise'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供缓解和补救建议**：识别和提出任何道德风险或危害的纠正措施'
- en: '**Upholding** **compliance with regulations and standards** : Keeping abreast
    of and adhering to relevant legal and ethical guidelines'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**维护** **遵守法规和标准**：了解并遵守相关的法律和道德指南'
- en: The RAI governance committee provides the essential policy oversight and strategic
    direction for all AI activities. Their primary responsibilities include establishing
    the ethical thresholds (e.g., maximum allowable bias), reviewing and approving
    the system cards, and deciding on mitigation strategies for high-risk models identified
    in the ethical risk Assessment.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: RAI治理委员会为所有AI活动提供必要的政策监督和战略方向。他们的主要职责包括建立道德阈值（例如，最大允许偏差）、审查和批准系统卡片，以及决定对在道德风险评估中确定的高风险模型采取的缓解策略。
- en: Crucially, while the committee establishes the monitoring requirements and reviews
    the results, it typically does not participate in day-to-day model performance
    monitoring. That operational responsibility falls to the **ML Operations** ( **MLOps**
    ) teams and data scientists, who use automated tools (covered later in the *Metrics
    for RAI* section) to continuously track model performance, data drift, and fairness
    metrics against the standards set by the committee.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，尽管委员会建立监控要求和审查结果，但它通常不参与日常模型性能监控。这项运营责任落在**机器学习操作** ( **MLOps** ) 团队和数据科学家身上，他们使用自动化工具（在*RAI度量*部分稍后介绍）来持续跟踪模型性能、数据漂移和公平性指标，这些指标由委员会设定。
- en: 'Ethical risk assessment checklist: quantifying risk'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伦理风险评估清单：量化风险
- en: Another crucial framework component is the implementation of ethical risk assessment
    checklists. These checklists operationalize the identification of potential ethical
    risks across the entire AI life cycle. By prompting developers and stakeholders
    to consider a range of ethical dimensions, these checklists help safeguard that
    potential harms are proactively addressed.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键框架组件是实施伦理风险评估清单。这些清单在整个AI生命周期中操作化地识别潜在伦理风险。通过提示开发者和利益相关者考虑一系列伦理维度，这些清单有助于主动解决潜在的危害。
- en: 'In the ethical risk assessment checklist, the risk severity score is a critical
    calculation used to prioritize mitigation efforts. The formula to determine the
    risk score is as follows:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在伦理风险评估清单中，风险严重程度评分是用于优先考虑缓解努力的临界计算。确定风险评分的公式如下：
- en: '**Risk Score** = **Likelihood** ( **L** ) * **Impact** ( **I** )'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**风险评分** = **可能性** ( **L** ) * **影响** ( **I** )'
- en: The **Likelihood** ( **L** ) rates the probability of the harm occurring (e.g.,
    1=Rare, 5=Almost Certain), and the **Impact** ( **I** ) rates the degree of harm
    (e.g., 1=Minor, 5=Catastrophic). This clear quantification allows the RAI governance
    committee to focus resources on the highest-scoring risks.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**可能性** ( **L** ) 评估发生伤害的概率（例如，1=罕见，5=几乎肯定），而**影响** ( **I** ) 评估伤害的程度（例如，1=轻微，5=灾难性）。这种明确的量化允许RAI治理委员会将资源集中在得分最高的风险上。'
- en: We will now go through a concrete risk assessment example.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将通过一个具体的风险评估示例。
- en: 'Consider the healthcare AI medical diagnostic system discussed in [*Chapter
    12*](Chapter_12.xhtml#_idTextAnchor329) . An identified risk might be: “Algorithmic
    bias leading to misdiagnosis in minority patient groups”:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一下在[*第12章*](Chapter_12.xhtml#_idTextAnchor329)中讨论的医疗AI诊断系统。一个已识别的风险可能是：“算法偏差导致少数族裔患者群体误诊”：
- en: '**Likelihood** : 4 (high – if training data is known to be imbalanced)'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可能性**：4（高 - 如果已知训练数据不平衡）'
- en: '**Impact** : 5 (catastrophic – leads to patient harm, legal action)'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**影响**：5（灾难性 - 导致患者伤害，法律行动）'
- en: '**Risk score** : 4*5=20 (high priority)'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险评分**：4*5=20（高优先级）'
- en: The required mitigation plan would then mandate immediate action, such as retraining
    the model with balanced data and enforcing an HITL review for all affected demographic
    results.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 所需的缓解计划将要求立即采取行动，例如使用平衡数据重新训练模型，并强制对所有受影响的群体结果进行HITL审查。
- en: 'Elements commonly included in an ethical risk assessment checklist might involve
    questions related to the following:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 常见于伦理风险评估清单中的元素可能涉及以下相关问题：
- en: '**Data bias** : Does the training data reflect the target user population?
    Are there known limitations or biases in the data that could lead to unfair outcomes?'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据偏差**：训练数据是否反映了目标用户群体？数据中是否存在可能导致不公平结果的已知限制或偏差？'
- en: '**Model architecture bias** : Is the chosen model architecture or design complexity
    appropriate for the task, or does it inherently lead to systematic under- or over-prediction
    in certain scenarios?'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型架构偏差**：所选模型架构或设计复杂性是否适合任务，或者它是否本质上会导致某些场景中的系统性低估或高估？'
- en: '**Performance mitigation** : If the model’s output is consistently flawed (such
    as underpredicting demand), are there clear operational procedures for a human
    reviewer to override the prediction, and is that process documented?'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能缓解**：如果模型的输出持续存在缺陷（例如，需求预测不足），是否存在明确的人类审查员可以覆盖预测的操作程序，并且该过程是否得到记录？'
- en: '**Model explainability and transparency** : How understandable is the AI system’s
    decision-making process to end users (e.g., doctors or business leaders)? Are
    model cards and system cards in place to document design and limitations?'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型可解释性和透明度**：人工智能系统的决策过程对最终用户（例如，医生或企业领导者）来说是否易于理解？是否有模型卡片和系统卡片来记录设计和限制？'
- en: '**System reliability and safety** : What are the potential failure modes? Are
    there clear HITL safeguards to prevent catastrophic or harmful outputs?'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统可靠性和安全性**：潜在的故障模式是什么？是否有明确的HITL安全措施来防止灾难性或有害的输出？'
- en: '**Accountability and responsibility** : Is there a clear process for auditing
    system decisions? Who is explicitly responsible if the AI causes harm or issues
    an incorrect decision?'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问责制和责任**：是否有明确的审计系统决策的程序？如果人工智能造成伤害或发布错误决策，谁将明确负责？'
- en: '**Prompt injection risk** : For Generative AI models (LLMs), has the system
    been tested against prompt injection and other adversarial attacks that could
    force the AI to violate its safety alignment or leak sensitive information?'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示注入风险**：对于生成式人工智能模型（LLMs），系统是否已针对提示注入和其他可能导致人工智能违反其安全对齐或泄露敏感信息的对抗性攻击进行过测试？'
- en: '**Privacy and data security** : Is personal data handled in compliance with
    privacy regulations? Are anonymization and robust security measures in place to
    prevent data breaches?'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐私和数据安全**：个人数据是否按照隐私法规进行处理？是否有匿名化和强大的安全措施来防止数据泄露？'
- en: '**Potential for harm and misuse** : What are the potential negative consequences
    or unintended uses of the AI system? What safeguards are in place to prevent harm?'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在的危害和滥用**：人工智能系统的潜在负面后果或意外用途是什么？有什么安全措施可以防止危害？'
- en: '**Fairness and equity** : Does the AI system treat all individuals and groups
    equitably? Have fairness metrics been considered and evaluated?'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公平性和公正性**：人工智能系统是否公平地对待所有个人和群体？是否考虑并评估了公平性指标？'
- en: '**Inclusiveness and accessibility** : Have the needs of diverse user groups
    been considered in the design and deployment of the AI system? Is it accessible
    to all intended users?'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**包容性和可访问性**：在设计和应用人工智能系统时是否考虑了不同用户群体的需求？它是否对所有预期用户都易于访问？'
- en: By integrating frameworks such as the RAI governance committee and utilizing
    tools such as ethical risk assessment checklists, organizations can establish
    a proactive and systematic approach to ethical AI governance, moving beyond ad
    hoc considerations to embed responsibility at the core of their AI initiatives.
    This structured approach not only mitigates potential risks but also fosters greater
    trust in AI systems among stakeholders and the wider public.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 通过整合如RAI治理委员会等框架，并利用如道德风险评估清单等工具，组织可以建立一种积极主动和系统的道德人工智能治理方法，超越临时考虑，将责任嵌入其人工智能倡议的核心。这种结构化方法不仅降低了潜在风险，而且增强了利益相关者和更广泛公众对人工智能系统的信任。
- en: Beyond these overarching frameworks, establishing robust ethical governance
    also involves specific structures and practices. Ethical governance structures
    are pivotal as they involve establishing AI ethics committees, conducting regular
    reviews of AI projects, and assigning clear responsibility for AI outcomes. Furthermore,
    implementing logging and monitoring mechanisms provides essential visibility into
    AI system behavior, allowing for the detection of potential ethical issues. Maintaining
    comprehensive documentation, including data lineage, model development processes,
    and decision-making logic, is crucial for accountability, auditability, and traceability.
    Similarly, using data version control for model development helps establish reproducibility
    and the ability to track changes, which is vital for understanding and addressing
    any ethical concerns that may arise over time. These practices, alongside the
    broader governance frameworks, are critical steps to follow for achieving accountability,
    auditability, traceability, and transparency in AI systems.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些总体框架之外，建立稳健的道德治理还涉及特定的结构和实践。道德治理结构至关重要，因为它们包括建立人工智能伦理委员会、定期审查人工智能项目以及明确人工智能结果的责任。此外，实施日志记录和监控机制为人工智能系统行为提供了必要的可见性，允许检测潜在的道德问题。维护全面的文档，包括数据来源、模型开发过程和决策逻辑，对于问责制、可审计性和可追溯性至关重要。同样，使用数据版本控制进行模型开发有助于建立可重复性和跟踪变化的能力，这对于理解和解决可能随时间出现的任何道德问题至关重要。这些实践，以及更广泛的治理框架，是实现人工智能系统中问责制、可审计性、可追溯性和透明度的关键步骤。
- en: 'Operationalizing transparency: model and system cards'
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施透明度：模型和系统卡片
- en: Model cards and system cards are essential documentation tools that transform
    abstract ethical principles into practical checks within the AI life cycle, fulfilling
    the principles of transparency and accountability.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 模型卡片和系统卡片是至关重要的文档工具，它们将抽象的伦理原则转化为AI生命周期中的实际检查，实现了透明度和问责制的原则。
- en: 'Model cards: documentation for the model'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型卡片：模型的文档
- en: 'A model card is a structured document that provides key technical context and
    performance details for an ML model. It is the technical “nutrition label” intended
    for data scientists, developers, and auditors:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 模型卡片是一个结构化文档，提供了ML模型的关键技术背景和性能细节。它是为数据科学家、开发人员和审计员设计的“营养成分标签”：
- en: '**Key contents** : Model details, intended use, training data description (including
    known biases), technical performance metrics (especially fairness metrics across
    demographic groups), and ethical considerations (potential risks)'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键内容**：模型细节、预期用途、训练数据描述（包括已知的偏差）、技术性能指标（特别是跨人口群体的公平性指标）以及伦理考量（潜在风险）'
- en: '**Purpose** : To provide technical transparency and detail a model’s limitations
    before deployment, serving as a primary input for the system card'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目的**：在部署前提供技术透明度，详细说明模型的局限性，作为系统卡片的主要输入'
- en: '![img](img/B34239_13_1.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_13_1.png)'
- en: 'Figure 13.1: An overview of a model card template for a high-stakes medical
    diagnostic system'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.1：高风险医疗诊断系统模型卡片模板概述
- en: The Pneumonia Detection Model v2.0 model card presented here is intended purely
    as a sample template and a guide to RAI best practices. The results, metrics,
    and demographics provided are hypothetical and designed to illustrate the necessary
    level of detail for a high-stakes application in the healthcare sector. Specifically,
    the conversion and dual labeling of technical terms (e.g., recall/sensitivity)
    are best practices for aligning standard ML terminology with established clinical
    diagnostics. This document is not a real regulatory filing and should be used
    solely for educational and reference purposes.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示的肺炎检测模型v2.0模型卡片纯粹作为一个示例模板和RAI最佳实践的指南。提供的结果、指标和人口统计数据是假设性的，旨在说明在医疗保健领域高风险应用中必要的详细程度。具体来说，技术术语的转换和双重标签（例如，召回率/灵敏度）是将标准机器学习术语与既定的临床诊断标准对齐的最佳实践。本文件不是真实的监管文件，应仅用于教育和参考目的。
- en: 'System cards: documentation for the deployment'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 系统卡片：部署的文档
- en: 'A system card is a comprehensive document that details the entire AI solution,
    which includes the ML model, the data pipelines, human oversight processes, and
    governance policies. It is the “user manual” and “governance plan” for business
    owners and legal teams:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 系统卡片是一个综合性的文档，详细说明了整个AI解决方案，包括ML模型、数据管道、人工监督流程和治理政策。它是为业务所有者和法律团队准备的“用户手册”和“治理计划”：
- en: '**Key contents** : System overview (how the model is integrated into the business
    process), risk assessment summary, operational procedures (who monitors the system
    and the HITL process), system maintenance schedule, and regulatory compliance
    status'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键内容**：系统概述（模型如何集成到业务流程中）、风险评估摘要、操作程序（谁监控系统和HITL过程）、系统维护计划和合规性状态'
- en: '**Purpose** : For accountability needs, outlining how the complete AI system
    is intended to be used, its operational risks, and the clear lines of responsibility
    for the business owners'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目的**：为了满足问责制需求，概述完整AI系统的预期用途、操作风险以及业务所有者的明确责任线'
- en: Integration in the life cycle
  id: totrans-64
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在生命周期中的集成
- en: The operational function of these cards is to serve as mandatory gate checks.
    Both the model card and the system card are reviewed and signed off by the RAI
    governance committee as a mandatory step before a system moves into production,
    validating that transparency and accountability are non-negotiable gates in the
    development life cycle.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这些卡片的操作功能是作为强制性的关卡检查。模型卡片和系统卡片在系统投入生产之前，必须由RAI治理委员会审查和批准，以验证透明度和问责制是非协商的关卡在开发生命周期中。
- en: While frameworks for ethical AI governance establish the internal foundations
    for responsible innovation, they must operate within the broader ecosystem of
    legal and regulatory requirements. In the next section, we examine regulatory
    compliance in a global context.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然道德人工智能治理框架为负责任的创新建立了内部基础，但它们必须在更广泛的法律法规生态系统内运作。在下一节中，我们将探讨全球范围内的法规合规性。
- en: Regulatory compliance in a global context
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 全球范围内的法规合规性
- en: 'Effective AI governance requires adherence to a multi-layered compliance structure,
    encompassing external government mandates and internal corporate standards. This
    is a critical operational challenge because regulations are highly fragmented
    and continuously evolving across different jurisdictions. Here’s a look at the
    different regulations:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的AI治理需要遵守多层合规结构，包括外部政府命令和内部企业标准。这是一个关键的操作挑战，因为法规在不同司法管辖区高度碎片化且持续演变。以下是不同法规的概述：
- en: '**Global regulatory frameworks** : Organizations must be vigilant in complying
    with emerging, high-impact regulations, such as the EU AI Act (which establishes
    a risk-based approach to AI deployment), the **General Data Protection Regulation**
    ( **GDPR** ) (which heavily influences data handling for all AI systems), and
    various US state and federal guidelines. Compliance often requires maintaining
    strict data provenance records and implementing regional deployment policies.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全球法规框架**：组织必须警惕遵守新兴的、影响巨大的法规，例如欧盟AI法案（该法案为AI部署建立基于风险的方法）、**通用数据保护条例**（**GDPR**）（该条例对所有AI系统的数据处理产生重大影响），以及各种美国州和联邦指南。合规通常需要维护严格的数据来源记录并实施区域部署政策。'
- en: '**Company-specific regulations (internal policies)** : Beyond external laws,
    many organizations create their own stringent internal codes of conduct, RAI policies,
    and data usage standards. These policies often set up a higher ethical bar than
    legal minimums, reflecting the company’s specific values and commitment to brand
    reputation. The legal and compliance teams are responsible for translating these
    internal and external mandates into actionable technical requirements that the
    AI development teams must follow.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公司特定法规（内部政策）**：除了外部法律外，许多组织还制定了严格的内部行为准则、RAI政策和数据使用标准。这些政策通常设定了比法律最低标准更高的道德标准，反映了公司的具体价值观和对品牌声誉的承诺。法律和合规团队负责将这些内部和外部要求转化为AI开发团队必须遵循的可操作技术要求。'
- en: '**The role of documentation** : Tools such as the system card become essential
    compliance assets. They document the model’s design, risk mitigation measures,
    and compliance status against specific regulatory requirements, providing clear
    proof of due diligence to auditors and regulators.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档的作用**：系统卡片等工具成为至关重要的合规资产。它们记录了模型的设计、风险缓解措施以及针对特定法规要求的合规状态，为审计师和监管机构提供了清晰的尽职调查证据。'
- en: As organizations navigate this intricate web of global and internal compliance
    requirements, maintaining transparency, accountability, and traceability becomes
    paramount. Yet, even the most comprehensive governance frameworks rely on human
    judgment to guide responsible implementation and oversight. The next section explores
    how integrating human-in-the-loop approaches strengthens this connection between
    regulatory compliance and ethical AI practice.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 随着组织在全球和内部合规要求的复杂网络中导航，保持透明度、问责制和可追溯性变得至关重要。然而，即使是最全面的治理框架也依赖于人类判断来指导负责任的实施和监督。下一节将探讨如何通过整合人机交互方法来加强法规合规性与道德人工智能实践之间的联系。
- en: Human-in-the-loop approaches
  id: totrans-73
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人机交互方法
- en: HITL approaches integrate human judgment into the AI decision-making process.
    It should always be the case that AI systems are guided by human expertise in
    every phase of the project and during continuous monitoring and integration, rather
    than just being automated. HITL approaches are particularly important in high-stakes
    decisions, where human oversight can help mitigate risks and yield ethical, responsible
    outcomes that users can rely on. A few examples include using HITL in healthcare
    diagnostics, financial services, and autonomous vehicles.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: HITL方法将人类判断整合到AI决策过程中。在项目的每个阶段以及持续监控和集成过程中，AI系统都应由人类专业知识指导，而不是仅仅自动化。HITL方法在高风险决策中尤为重要，其中人类监督可以帮助降低风险并产生用户可以信赖的道德、负责任的结果。一些例子包括在医疗诊断、金融服务和自动驾驶汽车中使用HITL。
- en: While the goal of many AI systems is automation, the integration of human judgment
    through HITL approaches is crucial for achieving ethical, responsible, and reliable
    outcomes, particularly in complex or high-stakes scenarios. HITL strategically
    incorporates human expertise at various stages of the AI life cycle, making sure
    that AI systems are not solely autonomous but are guided and validated by human
    understanding, values, and ethical considerations.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然许多AI系统的目标是自动化，但通过HITL方法整合人类判断对于实现道德、负责任和可靠的成果至关重要，尤其是在复杂或高风险场景中。HITL策略性地在AI生命周期的各个阶段融入人类专业知识，确保AI系统不仅具有自主性，而且受到人类理解、价值观和伦理考量的指导和验证。
- en: 'For instance, a human-as-a-safeguard role is essential for mitigating risks
    identified during the bias audit. This role is critical when facing model architecture
    bias (as mentioned in the ethical risk assessment checklist: quantifying risk),
    such as a model that systematically underpredicts risk. In these cases, the human
    reviewer’s primary duty is to override the biased low-risk prediction to prevent
    systemic harm, thereby correcting the model’s architectural flaw in the operational
    environment. This section explores where and how HITL can be effectively implemented.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在缓解偏差审计中识别出的风险时，人类作为安全措施的角色至关重要。当面临模型架构偏差（如伦理风险评估清单中提到的：量化风险），例如一个系统性地低估风险的模型时，这一角色至关重要。在这些情况下，人类审查员的主要职责是覆盖有偏差的低风险预测，以防止系统性伤害，从而纠正模型在运营环境中的架构缺陷。本节探讨了HITL如何有效实施。
- en: 'Here are the key stages and applications of HITL:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是HITL的关键阶段和应用：
- en: '**Data collection and labeling** : Humans play a vital role in maintaining
    the quality, accuracy, and fairness of the data used to train AI models. This
    includes the following:'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据收集和标注**：人类在维护用于训练AI模型的数据的质量、准确性和公平性方面发挥着至关重要的作用。这包括以下方面：'
- en: '**Data labeling and annotation** : Human experts provide accurate labels and
    annotations for training data, especially in complex tasks such as medical image
    analysis or natural language understanding, where nuanced interpretation is required.'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据标注和注释**：人类专家为训练数据提供准确标签和注释，特别是在需要细微解释的复杂任务中，如医学图像分析或自然语言理解。'
- en: '**Data validation and quality control** : Humans review and validate AI-labeled
    data to identify and correct errors, ensuring the model learns from reliable information
    and mitigating potential biases introduced during the labeling process.'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据验证和质量控制**：人类审查和验证AI标记的数据，以识别和纠正错误，确保模型从可靠的信息中学习，并减轻在标记过程中引入的潜在偏差。'
- en: '**Bias detection and mitigation in data** : Human oversight is essential in
    identifying potential biases embedded within datasets that might not be apparent
    to automated systems. This involves analyzing data distributions and understanding
    the social and historical contexts that could lead to unfair representations.'
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据中的偏差检测和缓解**：人类监督对于识别数据集中嵌入的潜在偏差至关重要，这些偏差可能对自动化系统不明显。这涉及分析数据分布，并理解可能导致不公平表示的社会和历史背景。'
- en: '**Model development and evaluation** : Human expertise is valuable in guiding
    the design and evaluating the performance of AI models, especially from an ethical
    standpoint:'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型开发和评估**：人类专业知识在指导AI模型的设计和评估性能方面非常有价值，尤其是在伦理方面：'
- en: '**Feature engineering and selection** : Domain experts can provide insights
    into which features are most relevant and ethically sound for the model to consider,
    helping to avoid the use of proxies for protected attributes'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征工程和选择**：领域专家可以提供见解，确定哪些特征对模型来说最相关且符合伦理，从而帮助避免使用受保护属性的代理。'
- en: '**Model review and approval** : Ethics boards or domain experts can review
    the model’s architecture, tr aining process, and evaluation metrics to align with
    ethical guidelines and identify potential risks before deployment'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型审查和批准**：伦理委员会或领域专家可以审查模型的架构、训练过程和评估指标，以确保与伦理指南一致，并在部署前识别潜在风险。'
- en: '**Adversarial attack testing and robustness evaluation** : Humans can design
    and oversee tests to evaluate the model’s resilience to adversarial inputs, confirming
    it doesn’t produce harmful or unreliable outputs under unexpected conditions'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对抗攻击测试和鲁棒性评估**：人类可以设计和监督测试来评估模型对对抗性输入的韧性，确认模型在意外条件下不会产生有害或不可靠的结果。'
- en: '**Model deployment and monitoring** : Continuous human oversight is critical
    for verifying AI systems function as intended and do not lead to unintended negative
    consequences in real-world applications:'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型部署和监控**：持续的人类监督对于验证人工智能系统按预期运行并在实际应用中不会导致意外的负面后果至关重要：'
- en: '**Exception handling and intervention** : When AI systems encounter edge cases
    or ambiguous situations or make uncertain predictions, HITL allows for human intervention
    to make the final decision or guide the AI’s response. This is particularly important
    in safety-critical applications such as autonomous vehicles or medical diagnosis.'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常处理和干预**：当人工智能系统遇到边缘案例或模糊情况或做出不确定预测时，HITL允许人类干预以做出最终决定或指导人工智能的反应。这在自动驾驶汽车或医疗诊断等安全关键应用中尤为重要。'
- en: '**Real-time monitoring and anomaly detection** : Human analysts can monitor
    AI system performance and logs for unusual behavior or unexpected outcomes that
    might indicate ethical breaches, bias amplification, or system failures.'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时监控和异常检测**：人类分析师可以监控人工智能系统的性能和日志，以寻找可能表明伦理违规、偏差放大或系统故障的不寻常行为或意外结果。'
- en: '**Auditing and explainability review** : Humans can review the explanations
    provided by **Explainable AI** ( **XAI** ) techniques to verify that they are
    accurate, understandable, and ethically sound. This helps build trust and facilitates
    accountability.'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审计和可解释性审查**：人类可以审查**可解释人工智能**（**XAI**）技术提供的解释，以验证其准确性、可理解性和伦理性。这有助于建立信任并促进问责制。'
- en: '**High-stakes decision-making** : In scenarios where AI decisions have significant
    consequences for individuals or society, HITL is often indispensable:'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**高风险决策**：在人工智能决策对个人或社会产生重大影响的情况下，人机交互（HITL）通常是不可或缺的：'
- en: '**Healthcare diagnostics and treatment recommendations** : While AI can provide
    valuable insights, human doctors retain the final decision-making authority, considering
    the patient’s overall context and ethical considerations'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗诊断和治疗建议**：虽然人工智能可以提供有价值的见解，但人类医生仍保留最终决策权，考虑到患者的整体情况和伦理考量'
- en: '**Financial services (loan approvals and risk assessment)** : Human loan officers
    or risk analysts can review AI-driven recommendations, especially for marginalized
    groups or in complex cases, to promote fairness and prevent algorithmic bias'
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融服务（贷款批准和风险评估）**：人类贷款官员或风险分析师可以审查由人工智能驱动的建议，特别是在边缘群体或复杂案件中，以促进公平并防止算法偏差'
- en: '**Criminal justice (sentencing and parole)** : While AI might assist in risk
    assessment, human judges and parole boards must ultimately make decisions, considering
    legal and ethical principles'
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**刑事司法（判决和假释）**：虽然人工智能可能在风险评估中提供帮助，但最终的决定必须由人类法官和假释委员会根据法律和伦理原则做出'
- en: '**Autonomous weapons systems (if ever deployed)** : The ethical debate around
    autonomous weapons heavily emphasizes the need for human control over lethal force
    decisions'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自主武器系统（如果部署）**：围绕自主武器伦理的辩论强烈强调对致命力量决策进行人类控制的必要性'
- en: '**Implementing HITL effectively** : Successful implementation of HITL requires
    careful consideration of the following:'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**有效实施HITL**：成功实施HITL需要仔细考虑以下因素：'
- en: '**Defining clear roles and responsibilities** : Specifying when and how human
    intervention should occur and who is responsible for oversight'
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**明确角色和责任**：规定何时以及如何进行人类干预，以及谁负责监督'
- en: '**Designing user-friendly interfaces** : Providing intuitive tools and information
    for human reviewers to understand AI outputs and make informed decisions'
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计用户友好的界面**：为人类审阅者提供直观的工具和信息，以便他们理解人工智能输出并做出明智的决定'
- en: '**Establishing escalation procedures** : Defining clear pathways for escalating
    complex or ethically sensitive cases to human experts'
  id: totrans-98
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立升级程序**：明确界定将复杂或伦理敏感案件升级到人类专家处理的明确途径'
- en: '**Providing adequate training** : Verifying that human reviewers have the necessary
    domain expertise and understanding of the AI system'
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供充分的培训**：验证人类审阅者是否具备必要的领域专业知识以及对人工智能系统的理解'
- en: '**Continuously evaluating and refining HITL processes** : Regularly assessing
    the effectiveness of HITL workflows and making adjustments as needed'
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续评估和改进HITL流程**：定期评估HITL工作流程的有效性，并根据需要做出调整'
- en: By strategically integrating human intelligence and ethical judgment into the
    AI life cycle, HITL approaches can significantly enhance the responsibility, reliability,
    and trustworthiness of AI systems, particularly in applications with significant
    societal impact.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 通过战略性地将人类智能和伦理判断整合到 AI 生命周期中，HITL 方法可以显著增强 AI 系统的责任感、可靠性和可信度，尤其是在具有重大社会影响的应用中。
- en: However, let’s also discuss the cost and trade-offs of HITL approaches. While
    highly effective for high-risk domains, implementing an HITL system involves a
    critical trade-off. Organizations must account for the added costs of human labor,
    the potential for increased latency in the decision process, and the risk of human
    fatigue or bias overriding correct AI recommendations. Therefore, HITL must be
    deployed strategically, focusing on high-risk, high-impact decisions where the
    reduction in ethical and financial risk justifies the operational cost.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，让我们也讨论一下 HITL 方法（Human-in-the-Loop）的成本和权衡。虽然对于高风险领域非常有效，但实施 HITL 系统涉及一个关键的权衡。组织必须考虑到人力成本的增加、决策过程中可能出现的延迟增加以及人类疲劳或偏见可能压倒正确
    AI 推荐的风险。因此，HITL 必须战略性地部署，专注于高风险、高影响的决定，在这些决定中，降低伦理和财务风险足以证明运营成本。
- en: Metrics for RAI
  id: totrans-103
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RAI 的指标
- en: The RAI governance committee establishes the policy requiring performance monitoring.
    However, effective monitoring is dependent on tangible data. Therefore, the next
    crucial step in operationalizing RAI is to define and monitor a comprehensive
    set of RAI metrics that allow the AIOps teams to continuously track model performance
    against the standards set by the committee.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: RAI 管理委员会建立了要求性能监控的政策。然而，有效的监控依赖于可衡量的数据。因此，将 RAI 运营化的下一个关键步骤是定义和监控一套全面的 RAI
    指标，这些指标允许 AIOps 团队持续跟踪模型性能与委员会设定的标准之间的差异。
- en: While the RAI governance committee focuses on policy oversight and strategic
    review, the execution of day-to-day model performance monitoring falls to the
    AIOps teams and data scientists. These teams use automated tools to continuo usly
    track data drift, fairness metrics, and overall model performance against the
    standards set by the committee.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 RAI 管理委员会专注于政策监督和战略审查，但日常模型性能监控的执行则落在 AIOps 团队和数据科学家身上。这些团队使用自动化工具持续跟踪数据漂移、公平性指标以及与委员会设定的标准相比的整体模型性能。
- en: 'Optimizing ML models for RAI requires a comprehensive evaluation using various
    metrics that quantify alignment with ethical principles. Key metrics include the
    following:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为 RAI 优化机器学习模型需要使用各种指标进行全面的评估，这些指标量化了与伦理原则的一致性。关键指标包括以下内容：
- en: '**Accuracy and precision (quantify performance)** : These are fundamental for
    evaluating model performance; for example, in healthcare, high accuracy and precision
    are highly important for diagnosing diseases.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**准确性和精确度（量化性能）**：这些是评估模型性能的基本指标；例如，在医疗保健领域，高准确性和精确度对于诊断疾病至关重要。'
- en: '**Fairness metrics (quantify fairness)** : These are essential for preventing
    discrimination and promoting equitable treatment. Metrics such as **Statistical
    Parity Difference** ( **SPD** ), disparate impact, and equal opportunity difference
    help to assure fairness in hiring algorithms and loan approval systems.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公平性指标（量化公平性）**：这些指标对于防止歧视和促进公平待遇至关重要。例如，**统计差异差异**（**SPD**）、差异影响和机会差异等指标有助于确保招聘算法和贷款审批系统的公平性。'
- en: '**Explainability metrics (quantify transparency)** : These metrics help enhance
    understanding of model decisions and build trust. Tools such as LIME and SHAP,
    along with counterfactuals, provide insights into model predictions, helping explain
    credit scoring decisions such as in the financial services domain.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性指标（量化透明度）**：这些指标有助于增强对模型决策的理解并建立信任。例如，LIME 和 SHAP 等工具，以及反事实分析，可以提供对模型预测的见解，帮助解释如金融服务领域的信用评分决策。'
- en: '**Accountability metrics (quantify accountability)** : These include measurable
    aspects of governance and oversight, such as the frequency and thoroughness of
    impact assessments and regular audits, the clarity of responsibility assignments
    for AI outcomes, and the documented responsiveness to identified ethical breaches.
    For example, in autonomous vehicles, the documented processes for safety incident
    review and updates serve as accountability metrics.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问责制指标（量化问责制）**：这些包括治理和监督的可衡量方面，如影响评估的频率和彻底性、定期审计、AI结果的职责分配的清晰度，以及针对识别出的伦理违规行为的记录响应。例如，在自动驾驶汽车中，安全事件审查和更新的记录过程作为问责制指标。'
- en: '**Privacy metrics (quantify privacy)** : Warranting that the output of a model
    does not reveal sensitive PII. Differential privacy, often quantified by a “privacy
    budget,” protects patient data in healthcare while allowing for valuable insights.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐私指标（量化隐私）**：确保模型的输出不会泄露敏感的PII（个人身份信息）。差分隐私，通常通过“隐私预算”来量化，在医疗保健中保护患者数据，同时允许获得有价值的见解。'
- en: '**Safety metrics (quantify safety)** : These metrics help conduct reliability
    and safety assessments to minimize potential harm. Examples include the mean time
    between failures, the severity of potential failure modes identified in safety
    assessments, and the effectiveness of implemented safety mechanisms. In fields
    such as industrial automation, safety is the topmost concern, and metrics evaluation
    keep in check that AI systems do not cause harm.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性指标（量化安全性）**：这些指标有助于进行可靠性和安全性评估，以最大限度地减少潜在损害。例如，故障之间的平均时间、在安全性评估中确定的潜在故障模式的严重性，以及实施的安全机制的有效性。在工业自动化等领域，安全性是最重要的关注点，指标评估确保AI系统不会造成伤害。'
- en: '**Robustness metrics (quantify reliability and safety)** : These metrics evaluate
    the model’s stability and reliability under various conditions, including noisy
    data, adversarial attacks, and distributional shifts. Examples include the model’s
    accuracy on perturbed datasets or its resilience to specific adversarial attacks.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鲁棒性指标（量化可靠性和安全性）**：这些指标评估模型在各种条件下的稳定性和可靠性，包括噪声数据、对抗性攻击和分布变化。例如，模型在扰动数据集上的准确性或对特定对抗性攻击的韧性。'
- en: By integrating these metrics into the evaluation process, data scientists and
    AI practitioners can confidently say that their models are not only optimized
    for performance but also demonstrably aligned with ethical standards and societal
    values.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些指标整合到评估过程中，数据科学家和AI从业者可以自信地说，他们的模型不仅优化了性能，而且明显符合伦理标准和社会主义核心价值观。
- en: Best practices for implementing RAI
  id: totrans-115
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施RAI的最佳实践
- en: Implementing RAI is not a one-time task but an ongoing commitment that requires
    embedding ethical considerations deeply into the fabric of AI development and
    deployment. The following expanded best practices offer a more granular guide
    for organizations striving to build ethical, transparent, and accountable AI systems.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 实施RAI不是一个一次性任务，而是一项持续承诺，需要将伦理考量深深嵌入到AI开发和部署的框架中。以下扩展的最佳实践为努力构建道德、透明和负责任的AI系统的组织提供了更细致的指南。
- en: Strategic governance and policy
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 战略治理和政策
- en: As we know, effectively embedding RAI begins at the strategic level with clear
    mandates from executive leadership. The foundational best practice is the establishment
    of the RAI governance committee. This cross-functional body defines the organization’s
    ethical principles and sets the non-negotiable thresholds for risk and bias. Every
    AI initiative must start with a comprehensive ethical risk assessment checklist,
    where potential harms are quantified using the risk score (likelihood * impact).
    This initial step ensures that resources are immediately prioritized for high-risk
    systems (such as our medical diagnostic model) before any code is written.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，有效地嵌入RAI（责任、透明度和可解释性）始于战略层面，需要来自执行领导的明确授权。基础的最佳实践是建立RAI治理委员会。这个跨职能机构定义了组织的伦理原则，并设定了风险和偏差的不可协商阈值。每个AI项目都必须从全面的伦理风险评估清单开始，其中潜在的损害通过风险评分（可能性
    * 影响）进行量化。这一初步步骤确保在编写任何代码之前，资源立即优先分配给高风险系统（如我们的医疗诊断模型）。
- en: 'Key takeaways: strategy and governance'
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键要点：战略和治理
- en: 'Let’s look at the critical insights gained:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看获得的关键见解：
- en: '**Executive mandate** : Establishes that RAI is driven from the top down and
    is viewed as a business imperative, not just a compliance function'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行命令**：确立RAI是从上到下推动的，被视为一项商业必要性，而不仅仅是合规职能'
- en: '**Establish oversight** : Formalize an RAI governance committee to define policy
    and review high-risk deployments'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立监督**：正式成立RAI治理委员会，以定义政策和审查高风险部署'
- en: '**Quantify risk** : Use an ethical risk assessment checklist to quantify risk
    (likelihood * impact) and prioritize mitigation efforts based on the resulting
    risk score'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**量化风险**：使用道德风险评估清单来量化风险（可能性 * 影响）并根据产生的风险评分优先考虑缓解措施'
- en: '**Multi-jurisdictional compliance** : Proactively translate global laws (e.g.,
    EU AI Act, GDPR, CCPA, and HIPAA) and internal ethical codes into clear, technical
    requirements for developers'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多司法管辖区合规**：积极将全球法律（例如，欧盟AI法案、GDPR、CCPA和HIPAA）和内部道德规范翻译成清晰的技术要求，供开发者使用'
- en: Ethics by des ign
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计即伦理
- en: Best practices in the development life cycle require adopting an ethics-by-design
    approach. This means that ethical considerations are to be built into the system
    design, not retrofitted later. Developers must rigorously audit training data
    for bias and evaluate the model architecture itself, so that the design does not
    create systematic errors (e.g., constant under-prediction). Transparency is operationalized
    through documentation. Model cards are mandatory for technical detail, and system
    cards (or AI agent cards) are mandatory for operational and governance details.
    Approval of both cards by the RAI governance committee serves as a deployment
    gate-check.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 开发生命周期中的最佳实践要求采用设计即伦理的方法。这意味着道德考虑因素应融入系统设计，而不是事后改造。开发者必须严格审计训练数据中的偏差并评估模型架构本身，以确保设计不会产生系统性错误（例如，持续的低预测）。透明度通过文档化来实现。模型卡是技术细节的强制性要求，系统卡（或AI代理卡）是操作和治理细节的强制性要求。RAI治理委员会对这两张卡的批准作为部署关卡检查。
- en: 'Key takeaways: development and documentation'
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键要点：开发和文档
- en: 'Below are the key insights:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是关键见解：
- en: '**Embed design checks** : Audit not just the data but the model architecture
    itself for sources of systemic bias'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入设计检查**：不仅审计数据，还要审计模型架构本身以识别系统性偏差的来源'
- en: '**Mandatory documentation** : Implement model cards (for technical transparency)
    and system cards (for operational accountability) as non-negotiable steps in the
    development pipeline'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强制性文档**：在开发流程中实施模型卡（用于技术透明度）和系统卡（用于运营问责制）作为不可协商的步骤'
- en: '**Gate-check** : Use the approval of the model and system cards by the RAI
    governance committee as the mandatory gate to production deployment'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关卡检查**：将RAI治理委员会对模型和系统卡的批准作为生产部署的强制关卡'
- en: '**Guard against LLM threats** : For GenAI, implement specific defenses against
    prompt injection and other adversarial attacks as part of the system design'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**防范LLM威胁**：对于GenAI，作为系统设计的一部分，实施针对提示注入和其他对抗性攻击的具体防御措施'
- en: Operational monitoring and recourse
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运营监控和追索
- en: Once deployed, best practices focus on continuous, real-world vigilance. This
    falls under the domain of AIOps teams. Monitoring must move beyond simple business
    metrics to track comprehensive RAI metrics such as SPD and other fairness measures.
    High-risk systems require robust HITL protocols, such as using a human as a final
    safeguard to override biased or unsafe AI decisions. A final requirement is a
    clear, functional mechanism for user recourse, allowing affected individuals to
    appeal decisions or report harm.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦部署，最佳实践侧重于持续的、现实世界的警惕。这属于AIOps团队的领域。监控必须超越简单的业务指标，以跟踪全面的RAI指标，如SPD和其他公平性措施。高风险系统需要强大的HITL协议，例如使用人类作为最终保障来覆盖有偏见或不安全的AI决策。一项最终要求是明确的、功能性的用户追索机制，允许受影响的个人上诉决策或报告伤害。
- en: 'Key takeaways: monitoring and recourse'
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键要点：监控和追索
- en: 'Here are the key takeaways:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是关键要点：
- en: '**Continuous monitoring** : Shift day-to-day oversight responsibility to AIOps
    teams for continuous tracking of technical, ethical, and fairness metrics'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续监控**：将日常监督责任转移到AIOps团队，以持续跟踪技术、伦理和公平性指标'
- en: '**Strategic HITL** : Use HITL systems strategically, prioritizing high-risk
    areas (such as medical diagnosis) where the cost of human labor is justified by
    the reduction in harm'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略HITL**：有策略地使用HITL系统，优先考虑高风险领域（如医学诊断），在这些领域，人力成本的降低可以证明减少伤害是合理的'
- en: '**Recourse mechanism** : Establish a clear, accessible, and timely process
    for users to report harm, seek explanations, and request recourse or appeal automated
    decisions'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**追索机制**：为用户建立一个明确、易于访问且及时的过程，以便他们报告伤害、寻求解释并请求追索或上诉自动化决策'
- en: Cultural integration
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文化融合
- en: The most sustainable best practice is integrating RAI into the organizational
    DNA. This requires executive leadership to constantly reinforce the “tone at the
    top,” demonstrating that ethical conduct is valued alongside profit. Cross-functional
    training is mandatory for engineers learning fairness metrics to legal teams understanding
    model limitations. Ultimately, success is defined by a culture that prioritizes
    proactive responsibility over reactive compliance, making every employee an active
    stakeholder in the RAI framework.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 最可持续的最佳实践是将RAI融入组织的DNA中。这需要高层领导不断强化“高层基调”，表明道德行为与利润同样受到重视。对于工程师学习公平性指标和法务团队理解模型限制而言，跨职能培训是强制性的。最终，成功是由一种优先考虑主动责任而非被动合规的文化来定义的，使每位员工都成为RAI框架的积极参与者。
- en: 'Key takeaways: cultural integration'
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键要点：文化融合
- en: '**Leadership buy-in** : Guarantees the executive team actively champions RAI,
    linking ethical performance to career advancement and resource allocation'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领导层支持**：保证执行团队积极倡导RAI，将道德表现与职业发展和资源分配联系起来。'
- en: '**Universal training** : Implement mandatory, role-specific training across
    all departments (legal, development, and product) to foster a shared understanding
    of risk and responsibility'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**普遍培训**：在所有部门（法律、开发和产品）实施强制性的、角色特定的培训，以培养对风险和责任的共同理解。'
- en: '**Accountability** : Define clear, non-overlapping lines of accountability
    so that every stakeholder (from developers to product owners) understands their
    specific ethical duties in the AI life cycle'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问责制**：明确、不重叠的问责界限，以便每个利益相关者（从开发者到产品负责人）都能了解他们在AI生命周期中的具体道德责任。'
- en: By implementing these actionable best practices, organizations can move beyond
    aspirational goals and build truly RAI systems that are ethical, transparent,
    and accountable in practice. We need to remember that this is an ongoing process
    that requires continuous learning, adaptation, and a strong commitment from all
    levels of the organization.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施这些可操作的最佳实践，组织可以超越愿望目标，构建真正符合RAI的系统，这些系统在实践中是道德的、透明的和可问责的。我们需要记住，这是一个持续的过程，需要持续的学习、适应和组织各层面的坚定承诺。
- en: Real-world applications of RAI
  id: totrans-147
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RAI的实际应用
- en: RAI is being applied across various industry verticals, showcasing its potential
    to drive ethical and effective outcomes. In healthcare, AI systems are used for
    disease diagnosis and treatment recommendations, taking into utmost consideration
    protecting patient privacy and fairness through robust ethical governance structures.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: RAI正在应用于各个行业垂直领域，展示了其推动道德和有效结果潜力。在医疗保健领域，AI系统用于疾病诊断和治疗建议，在保护患者隐私和公平性方面给予最高重视，通过强大的道德治理结构。
- en: Financial services leverage AI for fraud detection and anti-money laundering,
    integrating HITL approaches to enhance decision-making and maintain accountability.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 金融服务业利用AI进行欺诈检测和反洗钱，整合HITL方法以增强决策能力和保持问责制。
- en: In retail, AI models predict customer churn and personalize marketing strategies
    while adhering to transparency and fairness principles. Surveillance systems utilize
    AI for security and monitoring, with continuous monitoring and improvement to
    prevent biases and uphold ethical standards.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在零售领域，AI模型预测客户流失并个性化营销策略，同时遵守透明度和公平性原则。监控系统利用AI进行安全和监控，持续监控和改进以防止偏见并维护道德标准。
- en: In the context of conflict minerals, smartphone manufacturing companies have
    implemented stringent ethical sourcing practices to warrant that the minerals
    used in their products do not fund armed conflict, child labor, or human rights
    abuses. This approach can be extended to AI procurement, where ethical sourcing
    safeguards that AI systems are developed and deployed responsibly, considering
    the environmental and social impact of the materials and processes involved.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在冲突矿产的背景下，智能手机制造公司实施了严格的道德采购实践，以确保其产品中使用的矿产不会资助武装冲突、童工或人权侵犯。这种方法可以扩展到AI采购，其中道德采购保障AI系统得到负责任地开发和部署，考虑到涉及的材料和过程的环境和社会影响。
- en: In education, AI is transforming learning experiences by personalizing educational
    content, automating administrative tasks, and providing support for students with
    diverse needs. AI-driven tools such as intelligent tutoring systems and adaptive
    learning platforms enhance the educational process while maintaining fairness,
    inclusivity, and accessibility to all.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在教育领域，AI通过个性化教育内容、自动化行政任务以及为学生提供多样化需求的支持，正在改变学习体验。由AI驱动的工具，如智能辅导系统和自适应学习平台，在保持公平性、包容性和对所有用户的可访问性的同时，增强了教育过程。
- en: In policing, AI is used for crime analysis, facial recognition, and predictive
    policing, helping law enforcement agencies to allocate resources more effectively
    and improve public safety. However, it is crucial to validate that these AI applications
    are transparent and unbiased and respect individuals’ privacy rights.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在执法领域，AI用于犯罪分析、人脸识别和预测性执法，帮助执法机构更有效地分配资源并提高公共安全。然而，验证这些AI应用是否透明、无偏见并尊重个人隐私权至关重要。
- en: In manufacturing, AI is used for predictive maintenance, quality control, and
    supply chain optimization. RAI practices uphold that these applications are transparent,
    fair, and accountable, reducing operational risks and improving efficiency. By
    integrating ethical guidelines, manufacturers can enhance productivity while maintaining
    high ethical standards.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在制造业中，AI用于预测性维护、质量控制以及供应链优化。RAI实践确保这些应用透明、公平且负责任，降低运营风险并提高效率。通过整合伦理指南，制造商可以在保持高伦理标准的同时提高生产力。
- en: Real-world examples of ethical governance structure
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伦理治理结构的现实世界例子
- en: To illustrate the diverse ways organizations are approaching ethical AI governance,
    the following examples are provided for consideration.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明组织在处理AI伦理治理的多样性方式，以下提供了一些供考虑的例子。
- en: 'Example 1: Meta – a specific company’s approach to LLM safety and ethical governance'
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**示例1：Meta - 一家特定公司对LLM安全性和伦理治理的方法**'
- en: 'Meta addresses AI ethics through a multifaceted system, not a single board,
    integrating the following:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: Meta通过一个多层次的系统来处理AI伦理问题，而不是一个单一的委员会，整合以下方面：
- en: '**Internal teams** : Dedicated RAI teams collaborate cross-functionally to
    address fairness, transparency, accountability, and safety throughout the AI life
    cycle, using a risk-based approach'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部团队**：专门的RAI团队跨职能合作，在整个AI生命周期中解决公平性、透明度、责任和安全性问题，采用基于风险的方法'
- en: '**External oversight** : The oversight board reviews content moderation decisions
    involving AI, and Meta engages with external experts and the public for diverse
    perspectives'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部监督**：监督委员会审查涉及AI的内容审查决策，Meta与外部专家和公众合作，以获得多样化的观点'
- en: '**Key principles** : Meta emphasizes transparency (e.g., open sourcing), accountability,
    fairness, privacy safeguards, and a layered approach to safety (e.g., Llama Guard)
    in its AI development and deployment'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键原则**：Meta在其AI开发和部署中强调透明度（例如，开源）、问责制、公平性、隐私保护以及分层安全方法（例如，Llama Guard）'
- en: This structure combines internal responsibility, external input, and core ethical
    principles to guide Meta’s AI practices.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构结合了内部责任、外部输入和核心伦理原则，以指导Meta的AI实践。
- en: 'A key aspect of Meta’s ethical AI governance is its approach to safety in LLM
    development, which is implemented through a layered strategy:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: Meta的AI伦理治理的一个关键方面是其对LLM开发中安全性的处理方法，这通过分层策略实施：
- en: '**Model-level safety** : Safety is addressed during data preparation and model
    training'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型级安全**：在数据准备和模型训练期间解决安全性问题'
- en: '**System-level safety** : Safeguards are implemented at the input and output
    stages, utilizing tools such as Llama Guard 4 for content filtering'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统级安全**：在输入和输出阶段实施保障措施，利用Llama Guard 4等工具进行内容过滤'
- en: '**Transparency and reporting** : Efforts are made to provide transparency and
    establish feedback mechanisms for ongoing safety improvements'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**透明度和报告**：努力提供透明度并建立持续安全改进的反馈机制'
- en: This multi-layered approach is a core component of their broader ethical governance
    framework, designed t o mitigate risks throughout the LLM life cycle. Check out
    Meta AI’s *Responsible Use Guide* ( [https://ai.meta.com/static-resource/responsible-use-guide/](https://ai.meta.com/static-resource/responsible-use-guide/)
    ) and public blog posts on their LLM development (e.g., Llama 3.2 safety evaluations).
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 这种多层次的方法是它们更广泛的伦理治理框架的核心组成部分，旨在在整个LLM生命周期中降低风险。查看Meta AI的*负责任使用指南*（[https://ai.meta.com/static-resource/responsible-use-guide/](https://ai.meta.com/static-resource/responsible-use-guide/)）以及他们关于LLM开发的公开博客文章（例如，Llama
    3.2安全性评估）。
- en: 'Example 2: A major enterprise software provider – building a culture of AI
    ethics for organizations'
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2：一家主要的企业软件提供商——为组织建立人工智能伦理文化
- en: Beyond the critical focus on safety, particularly in LLMs, establishing a strong
    culture of AI ethics encompasses a wider range of ethical principles. To build
    a sustainable culture of AI ethics, a company must go beyond policy to embed ethical
    considerations into daily engineering practices.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 除了对安全性的关键关注，尤其是在LLMs中，建立强大的AI伦理文化还涵盖更广泛的伦理原则。为了建立一个可持续的AI伦理文化，公司必须超越政策，将伦理考量融入日常工程实践中。
- en: This provider exemplifies this by treating RAI as a core product feature, not
    just a compliance obligation. They established the **Aether Committee** (an acronym
    for **AI and Ethics in Engineering and Research** ) to advise leadership and drive
    innovation. Crucially, they developed and enforced the RAI standard, translating
    their six core RAI principles (fairness, reliability and safety, privacy and security,
    inclusiveness, transparency, and accountability) into actionable requirements
    and tooling for every AI project across the company. This clearly shows that responsibility
    is owned by the teams building the technology.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 该提供商通过将RAI视为核心产品功能，而不仅仅是合规义务的例子来体现这一点。他们成立了**Aether委员会**（代表**AI和工程研究中的伦理**），以向领导层提供建议并推动创新。关键的是，他们开发和执行了RAI标准，将他们的六个核心RAI原则（公平性、可靠性及安全性、隐私和安全、包容性、透明度和问责制）转化为公司每个AI项目的可操作要求和工具。这清楚地表明，责任由构建技术的团队承担。
- en: 'Establishing a strong culture of AI ethics involves several key elements, according
    to MIT Sloan:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 根据麻省理工学院的斯隆管理学院，建立强大的AI伦理文化涉及几个关键要素：
- en: '**Leadership commitment** : Strong support and visible commitment from senior
    leadership are essential for prioritizing ethical considerations across all AI
    initiatives'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领导层的承诺**：高级领导层的坚定支持和明显承诺对于在所有AI项目中优先考虑伦理考量至关重要'
- en: '**Clear ethical guidelines** : Developing and communicating clear principles
    and guidelines for AI development and deployment, addressing issues such as fairness,
    privacy, and accountability, in addition to safety'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**明确的伦理指导原则**：开发和传达清晰的原理和指导方针，用于人工智能的开发和部署，解决公平性、隐私和问责制等问题，以及安全性'
- en: '**Education and training** : Providing comprehensive training to employees
    on AI ethics and RAI practices, fostering a shared understanding of ethical responsibilities'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育和培训**：为员工提供全面的AI伦理和RAI实践培训，培养对伦理责任的共同理解'
- en: '**Cross-functional collaboration** : Fostering collaboration between technical
    teams, ethicists, legal experts, and other stakeholders to maximize the consideration
    of diverse perspectives in ethical decision-making'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨职能协作**：促进技术团队、伦理学家、法律专家和其他利益相关者之间的协作，以最大化在伦理决策中考虑不同观点'
- en: '**Transparency and accountability** : Establishing mechanisms for transparency
    and accountability in AI decision-making processes, enabling scrutiny and redress'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**透明度和问责制**：在AI决策过程中建立透明度和问责机制，使审查和纠正成为可能'
- en: '**Continuous monitoring and evaluation** : Regularly monitoring and evaluating
    the ethical implications of AI systems and making adjustments as needed, adapting
    to evolving ethical standards and societal expectations'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续监控和评估**：定期监控和评估AI系统的伦理影响，并根据需要做出调整，适应不断发展的伦理标准和公众期望'
- en: 'Example 3: Unilever – a structured and actionable process for ethical governance'
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例3：联合利华——一个结构化和可操作性的伦理治理流程
- en: 'Unilever’s journey in implementing AI ethics includes a structured approach
    to ethical governance:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 联合利华在实施AI伦理方面的旅程包括一个结构化的伦理治理方法：
- en: '**Establishing an AI ethics board** : A cross-functional team responsible for
    setting ethical guidelines and reviewing AI projects, providing oversight and
    guidance'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立AI伦理委员会**：一个跨职能团队，负责制定伦理准则和审查AI项目，提供监督和指导'
- en: '**Developing an AI ethics framework** : A structured framework for assessing
    the ethical risks and impacts of AI applications, facilitating a systematic evaluation
    of ethical considerations'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制定AI伦理框架**：一个结构化的框架，用于评估AI应用的伦理风险和影响，促进对伦理考量的系统评估'
- en: '**Implementing ethical risk assessments** : Conducting thorough risk assessments
    for each AI project, considering factors such as fairness, transparency, and accountability,
    in addition to safety'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施伦理风险评估**：对每个AI项目进行彻底的风险评估，考虑因素包括公平性、透明度和问责制，以及安全性'
- en: '**Training and awareness programs** : Educating employees on AI ethics and
    RAI practices, building ethical awareness and competence'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训和意识提升计划**：教育员工了解AI伦理和RAI实践，建立伦理意识和能力'
- en: '**Monitoring and reporting** : Continuously monitoring the performance and
    impact of AI systems and reporting on ethical considerations, promoting accountability
    and continuous improvement'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控和报告**：持续监控AI系统的性能和影响，并报告伦理考量，促进问责制和持续改进'
- en: 'You can read more about Unilever’s AI assurance process in the article published
    in the MIT Sloan Management Review, *AI Ethics at Unilever: From Policy to Process*
    ( [https://sloanreview.mit.edu/article/ai-ethics-at-unilever-from-policy-to-process/
    ).](https://sloanreview.mit.edu/article/ai-ethics-at-unilever-from-policy-to-process/)'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在《麻省理工学院斯隆管理评论》上发表的文章中了解更多关于联合利华的AI保证流程信息，*《联合利华的AI伦理：从政策到流程》* ([https://sloanreview.mit.edu/article/ai-ethics-at-unilever-from-policy-to-process/)](https://sloanreview.mit.edu/article/ai-ethics-at-unilever-from-policy-to-process/))
- en: 'Example 4: Deepfake voice impersonation and financial fraud – governance failure
    in proactive risk assessment'
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例4：深度伪造声音模仿和金融欺诈 – 治理结构在主动风险评估中的失败
- en: 'This case study demonstrates the high cost of a governance structure failing
    to mandate and enforce a risk assessment focused on the misuse of AI-generated
    synthetic media (deepfakes):'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 本案例研究展示了治理结构未能强制执行和执行针对AI生成合成媒体（深度伪造）滥用的风险评估的高成本：
- en: '**Context of the** **failure** : A deepfake audio of a senior executive’s voice
    was used to authorize a fraudulent wire transfer from a financial institution,
    bypassing standard verbal security checks. The synthetic media was generated using
    readily available AI tools and publicly sourced audio of the executive.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**失败背景**：一位高级管理人员的深度伪造音频被用于授权从金融机构进行欺诈性电汇，绕过了标准的口头安全检查。合成媒体是使用现成的AI工具和公开来源的该管理人员音频生成的。'
- en: '**The governance failure** : The failure resulted in a violation of financial
    regulations (security/fraud and KYC/AML failure in digital identity) and not having
    robust internal security policies in place. This exposure represented a significant
    liability due to the failure to assess and mitigate risks associated with synthetic
    media (supply chain risks in using third-party AI).'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理失败**：失败导致违反了金融法规（数字身份中的安全/欺诈和KYC/AML失败），并且没有建立稳健的内部安全政策。由于未能评估和减轻与合成媒体相关的风险（使用第三方AI的供应链风险），这种暴露代表了重大的责任。'
- en: 'The following are the lessons learned for RAI governance (with actionable fixes):'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从RAI治理中吸取的教训（附带可操作方案）：
- en: '**Failure to** **assess new threats** : The governance structure did not require
    an audit of identity verification methods against modern synthetic media threats,
    violating the principle of proactive risk assessment. (Actionable fix: Mandatory
    Synthetic Media Risk Assessment (SMRA) for identity verification systems)'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未能评估新的威胁**：治理结构没有要求对身份验证方法进行审计，以应对现代合成媒体威胁，违反了主动风险评估的原则。（可操作方案：强制进行合成媒体风险评估（SMRA）以验证身份验证系统）'
- en: '**Lack of new guardrails** : The governance body failed to implement a policy
    to update security protocols to account for advancements in easily accessible
    deepfake technology. (Actionable fix: Mandate multi-modal authentication and implement
    real-time acoustic analysis for voice deepfake detection)'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺乏新的安全措施**：治理机构未能实施政策以更新安全协议，以应对易于获取的深度伪造技术的进步。（可操作方案：强制执行多模态身份验证并实施实时声学分析以检测声音深度伪造）'
- en: '**Insufficient supply chain oversight** : The failure to control the inputs
    (publicly available audio) and the potential outputs (fabricated instructions)
    demonstrates a lapse in digital supply chain risk management. (Actionable fix:
    Establish a clear crisis communications protocol for deepfake incidents)'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**供应链监管不足**：未能控制输入（公开可用的音频）和潜在输出（伪造指令）表明在数字供应链风险管理方面存在疏漏。（可操作方案：为深度伪造事件建立明确的危机沟通协议）'
- en: The financial institution ultimately bore the loss, highlighting that ethical
    failures and governance gaps related to new AI threats lead to severe financial
    and reputational costs.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，金融机构承担了损失，突显了与新的AI威胁相关的道德失败和治理缺口会导致严重的财务和声誉成本。
- en: These examples demonstrate that building ethical AI systems requires a multifaceted
    approach. While safety is paramount, especially in the context of powerful technologies
    such as LLMs, a comprehensive ethical governance framework also encompasses broader
    principles, organizational culture, and structured processes.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子表明，构建道德的AI系统需要多方面的方法。虽然安全性至关重要，尤其是在像LLM这样的强大技术背景下，一个全面的道德治理框架还涵盖了更广泛的原则、组织文化和结构化流程。
- en: Building upon its foundational commitment to RAI across sectors, InnovAIte LLC
    has made significant strides in implementing an ethical governance structure.
    Initially focused on its healthcare AI system, the company recognized the need
    for scalable governance practices and established an AI ethics committee, conducted
    impact assessments, performed regular bias audits, and maintained comprehensive
    documentation. They used data version control for model development and recorded
    data lineage and transformations to promote accountability and reproducibility
    across all AI projects. Policymakers provided guidelines for the ethical use of
    AI in healthcare, affirming InnovAIte LLC’s system complied with relevant regulations.
    Last-mile vendors packaged and deployed the AI system, implementing safety mechanisms
    and conducting regular audits. End users provided feedback, further refining the
    system’s reliability and ethical soundness.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在其跨领域的RAI基础承诺之上，InnovAIte LLC在实施道德治理结构方面取得了显著进展。最初专注于其医疗AI系统，公司认识到需要可扩展的治理实践，并成立了一个AI伦理委员会，进行了影响评估，定期进行了偏差审计，并保持了全面的文档记录。他们使用数据版本控制进行模型开发，并记录了数据溯源和转换，以促进所有AI项目的问责制和可重复性。政策制定者提供了关于医疗保健中AI道德使用的指南，确认InnovAIte
    LLC的系统符合相关法规。最后一公里供应商打包并部署了AI系统，实施了安全机制并定期进行审计。最终用户提供了反馈，进一步提高了系统的可靠性和道德性。
- en: By integrating HITL approaches and using metrics for RAI, InnovAIte LLC not
    only cemented the trustworthiness of its healthcare AI but also developed a governance
    framework applicable to its expanding AI initiatives. This proactive approach
    fostered trust, mitigated risks, and supported innovation as InnovAIte LLC grew
    into a leading AI-driven enterprise.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 通过整合HITL方法并使用RAI的指标，InnovAIte LLC不仅巩固了其医疗AI的可信度，还开发了一个适用于其扩展AI项目的治理框架。这种积极主动的方法促进了信任，降低了风险，并支持了创新，随着InnovAIte
    LLC成长为领先的AI驱动型企业。
- en: Summary
  id: totrans-198
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, we explored the crucial elements of implementing RAI frameworks.
    We discussed the importance of establishing robust ethical governance structures,
    incorporating HITL approaches for oversight, and utilizing comprehensive metrics
    to evaluate AI models. By prioritizing these elements and integrating RAI best
    practices throughout the AI development life cycle, businesses can be sure that
    their AI systems are not only optimized for performance but also aligned with
    ethical standards and societal values. While the hypothetical example of InnovAIte
    LLC helped illustrate the setup of an ethical governance structure, real-world
    examples offer crucial, practical lessons: these include successful process implementations
    like Meta’s approach to LLM safety and Unilever’s structured ethics process, alongside
    the need for robust organizational change demonstrated by a major enterprise software
    provider’s focus on culture, and the critical warnings gleaned from governance
    failure related to deepfake voice impersonation and financial fraud.'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了实施RAI框架的关键要素。我们讨论了建立稳健的伦理治理结构、采用HITL方法进行监督以及利用综合指标评估AI模型的重要性。通过优先考虑这些要素并在AI开发生命周期中整合RAI最佳实践，企业可以确保他们的AI系统不仅优化了性能，而且与伦理标准和社会主义核心价值观保持一致。虽然InnovAIte
    LLC的假设性例子有助于说明伦理治理结构的设置，但现实世界的例子提供了关键的实际经验教训：这些包括像Meta对LLM安全性的方法这样的成功流程实施，以及联合利华的结构化伦理流程，以及一个主要企业软件提供商对文化关注的稳健组织变革，以及从与深度伪造声音模仿和金融欺诈相关的治理失败中汲取的关键警告。
- en: Building upon the foundational principles and governance structures discussed
    in this chapter, the next chapter delves into the specific ethical considerations
    and practices essential for the development of trustworthy LLMs. With the increasing
    capabilities and potential impact of LLMs, a focused examination of their unique
    ethical challenges and the strategies for building trust is critical.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章讨论的基础原则和治理结构的基础上，下一章深入探讨了开发可信赖的LLM所必需的具体伦理考虑和实践。随着LLM能力的增强和潜在影响，对它们独特的伦理挑战和建立信任的策略进行专注的审查至关重要。
- en: Join us in the next chapter to explore key aspects, such as bias mitigation,
    transparency, explainability, and robust safety mechanisms for AI systems.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 加入我们，在下一章中探索关键方面，例如偏见缓解、透明度、可解释性和AI系统的稳健安全机制。
