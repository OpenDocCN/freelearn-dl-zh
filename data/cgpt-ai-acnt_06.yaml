  zh: '| 中央信托银行 | 银行 | 需要增强信用风险评估 | 人工智能驱动的信用风险评估 | 显著降低违约率，提高贷款组合质量 |'
- en: '| Quantum Capital | Asset management | Improving investment strategies | AI
