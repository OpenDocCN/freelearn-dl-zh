    |'
  id: totrans-151
  prefs: []
  type: TYPE_TB
  zh: '| 趋势最大零售商 | 零售 | 销售预测和库存管理问题不准确 | 人工智能销售预测和库存优化 | 库存成本降低20%，由于更好的库存优化，销售额增加15%
    |'
- en: '| Central Trust Bank | Banking | Need for enhanced credit risk assessment |
