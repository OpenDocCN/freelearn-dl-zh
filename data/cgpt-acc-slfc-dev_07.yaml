- en: '|  | Advantages:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '|  | 优点：'
- en: 'Bulk processing: By using Batch Apex, you can process records in bulk, thereby
    optimizing API calls to external services'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批量处理：通过使用 Batch Apex，你可以批量处理记录，从而优化对外部服务的 API 调用
- en: 'Asynchronous: The asynchronous nature of Queueable Apex allows callouts to
    be made in the background'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 异步：Queueable Apex 的异步特性允许在后台进行调用
- en: 'Error handling: You can implement robust error handling within the Queueable
    class, capturing issues and possibly retrying the callout'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误处理：你可以在 Queueable 类中实现强大的错误处理，捕获问题并可能重试调用
- en: 'Considerations:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑事项：
- en: 'API limits: Be mindful of the limits both in Salesforce and the external service
    you are calling'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API 限制：注意 Salesforce 和你正在调用的外部服务的限制
- en: 'Order of execution: Queueable jobs are executed asynchronously and not necessarily
    in the order they are enqueued'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行顺序：Queueable 作业是异步执行的，不一定按照入队顺序执行
- en: By following a pattern like this, you can optimize the performance and reliability
    of your Salesforce callouts. |
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这种模式，你可以优化 Salesforce 调用的性能和可靠性。|
