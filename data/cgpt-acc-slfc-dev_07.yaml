- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Using ChatGPT for Salesforce Web Services and Callouts
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 进行 Salesforce Web Services 和 Callouts
- en: Salesforce Web Services and Callouts form a vital component of the Salesforce
    ecosystem, enabling seamless integrations and extended functionalities that go
    beyond the standard Salesforce capabilities. In an increasingly connected world,
    where different systems need to talk to each other, these tools are more critical
    than ever. Let’s delve into what they are and how they work.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce Web Services 和 Callouts 构成了 Salesforce 生态系统的重要组成部分，它们使得无缝集成和扩展功能成为可能，这些功能超越了标准
    Salesforce 功能。在一个日益互联的世界中，不同系统需要相互通信，这些工具比以往任何时候都更加关键。让我们深入了解它们是什么以及它们是如何工作的。
- en: In this chapter, you will learn the essentials of enabling and refining the
    communication channels between Salesforce and external systems. Throughout these
    pages, you’ll gain a solid grasp of the foundational elements of Web Services
    and Callouts, their significance in the Salesforce ecosystem, and the step-by-step
    processes to set them up effectively. With a focus on practicality, this chapter
    provides a pathway to optimize these integrations for reliability and performance
    to help you troubleshoot common issues efficiently using ChatGPT. Through real-world
    scenarios and case studies, you’ll learn to translate user stories into secure,
    robust integrations, ensuring your Salesforce environment communicates seamlessly
    with other platforms while adhering to the highest standards of data security
    and integrity.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习启用和优化 Salesforce 与外部系统之间通信渠道的基本知识。贯穿这些页面，你将牢固掌握 Web Services 和 Callouts
    的基础元素、它们在 Salesforce 生态系统中的重要性以及有效设置它们的逐步流程。本章侧重于实用性，提供了一条途径，以优化这些集成，确保可靠性和性能，帮助你使用
    ChatGPT 高效地解决常见问题。通过实际场景和案例研究，你将学习如何将用户故事转化为安全、健壮的集成，确保你的 Salesforce 环境能够与其他平台无缝通信，同时遵守最高标准的数据安全和完整性。
- en: Technical requirements
  id: totrans-4
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: When embarking on the journey of writing Salesforce Apex, the choice of development
    tools and environment is critical to productivity and success. Apex, Salesforce’s
    proprietary programming language, is designed to execute on Lightning Platform
    and requires a robust set of tools to manage its life cycle, from development
    to deployment.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当开始编写 Salesforce Apex 之旅时，选择开发工具和环境对于生产力和成功至关重要。Apex 是 Salesforce 的专有编程语言，旨在在
    Lightning 平台上执行，并需要一套强大的工具来管理其生命周期，从开发到部署。
- en: At the core of the Apex development toolkit is the Salesforce **integrated development
    environment** (**IDE**). The most prominent and widely used IDE is **Visual Studio
    Code** (**VS Code**) with the Salesforce Extension Pack. This pack, officially
    endorsed by Salesforce, equips developers with features such as syntax highlighting,
    auto-completion, integrated testing, and debugging capabilities. It also provides
    direct deployment to Salesforce orgs and version control integration, which are
    indispensable for maintaining code quality and collaboration. Developers can leverage
    VS Code’s powerful source code editor and customization options to tailor their
    environment to specific project needs.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Apex 开发工具包的核心是 Salesforce **集成开发环境**（**IDE**）。最突出且广泛使用的 IDE 是带有 Salesforce 扩展包的
    **Visual Studio Code**（**VS Code**）。这个由 Salesforce 正式认可的工具包为开发者提供了诸如语法高亮、自动完成、集成测试和调试功能等特性。它还提供了直接部署到
    Salesforce org 以及版本控制集成，这对于维护代码质量和协作至关重要。开发者可以利用 VS Code 强大的源代码编辑器和定制选项，将他们的环境调整到特定项目需求。
- en: Another essential aspect of the development environment is the use of Salesforce
    sandboxes. These are isolated copies of the Salesforce environment where developers
    can build and test their Apex code without affecting the live production environment.
    The type of sandbox that’s used can vary from Developer Sandboxes, which are suitable
    for coding and testing in isolation, to Full Copy Sandboxes, which include a complete
    copy of the production environment’s data for performance and user acceptance
    testing. Utilizing sandboxes is a best practice as it allows for the safe development
    and testing of new features, bug fixes, and improvements. The code that’s written
    and tested in these sandboxes can then be pushed to production using change sets
    or Salesforce DX, depending on the complexity and governance requirements of the
    project.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 开发环境中的另一个重要方面是 Salesforce 沙盒的使用。这些是 Salesforce 环境的隔离副本，开发者可以在不影响实时生产环境的情况下构建和测试他们的
    Apex 代码。所使用的沙盒类型可能从适合独立编码和测试的开发者沙盒，到包含生产环境数据完整副本的完整复制沙盒，用于性能和用户验收测试。利用沙盒是一种最佳实践，因为它允许安全地开发和测试新功能、错误修复和改进。在这些沙盒中编写和测试的代码可以通过变更集或
    Salesforce DX 推送到生产环境，具体取决于项目的复杂性和治理要求。
- en: IntelliJ IDEA with the Illuminated Cloud plugin is another alternative IDE for
    Salesforce development. This powerful combination provides a rich set of features
    tailored for Salesforce development, including smart completions, code navigation,
    an integrated SOQL query builder, and more, though it tends to be preferred by
    developers who have an existing affinity for JetBrains’ suite of IDEs. Whether
    opting for VS Code or IntelliJ, the integration of these IDEs with version control
    systems such as Git is paramount for collaborative and scalable development practices.
    The toolset, which is complemented by the metadata-aware capabilities of these
    IDEs, ensures developers can effectively manage their source, track changes, and
    handle complex deployment processes, thereby facilitating a more streamlined and
    efficient development life cycle for Salesforce Apex.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: IntelliJ IDEA 配置了 Illuminated Cloud 插件是 Salesforce 开发的另一种替代 IDE。这个强大的组合为 Salesforce
    开发提供了一整套定制的功能，包括智能补全、代码导航、集成的 SOQL 查询构建器等，尽管它更受那些已经对 JetBrains 的 IDE 套件有偏好倾向的开发者的青睐。无论选择
    VS Code 还是 IntelliJ，这些 IDE 与版本控制系统（如 Git）的集成对于协作和可扩展的开发实践至关重要。这些 IDE 的工具集，得益于其元数据感知能力，确保开发者能够有效地管理源代码、跟踪变更并处理复杂的部署流程，从而为
    Salesforce Apex 提供了一个更加流畅和高效的开发生命周期。
- en: Salesforce Web Services
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Salesforce Web 服务
- en: Salesforce Web Services expose custom logic via standard SOAP or REST protocols.
    They permit external systems to perform operations such as query, search, and
    CRUD operations directly on Salesforce data. These web services are defined in
    Apex code and can be customized to offer targeted functionalities. For instance,
    you might have a web service that triggers specific workflows or updates records
    based on complex business logic. The beauty of Salesforce Web Services lies in
    their ability to make the Salesforce platform extendable and open to various kinds
    of external interactions.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce Web 服务通过标准的 SOAP 或 REST 协议公开自定义逻辑。它们允许外部系统直接在 Salesforce 数据上执行查询、搜索和
    CRUD 操作。这些 Web 服务在 Apex 代码中定义，并可定制以提供针对性的功能。例如，你可能有一个触发特定工作流或根据复杂业务逻辑更新记录的 Web
    服务。Salesforce Web 服务的美妙之处在于它们使 Salesforce 平台可扩展且开放，便于各种外部交互。
- en: 'Web services in Salesforce enable different applications to communicate with
    each other over the web. They play a critical role in the interoperability and
    integration between Salesforce and other systems. Here are some of the core concepts:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce 中的 Web 服务允许不同的应用程序通过互联网相互通信。它们在 Salesforce 与其他系统之间的互操作性和集成中发挥着关键作用。以下是一些核心概念：
- en: '**Simple Object Access Protocol** (**SOAP**): A protocol for exchanging structured
    information in the implementation of web services. SOAP web services use XML messages
    and are strongly typed.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简单对象访问协议**（**SOAP**）：一种用于实现 Web 服务的结构化信息交换协议。SOAP Web 服务使用 XML 消息，并且是强类型的。'
- en: '**Representational State Transfer** (**REST**): A style of software architecture
    that uses standard HTTP methods. REST web services use JSON or XML messages and
    are loosely typed.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**表征状态转移**（**REST**）：一种软件架构风格，使用标准的 HTTP 方法。REST Web 服务使用 JSON 或 XML 消息，并且是松散类型的。'
- en: '`global` access modifier and annotations such as `@WebService` for SOAP or
    `@RestResource(urlMapping=''/yourUrl'')` for REST.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`global` 访问修饰符以及如 `@WebService` 用于 SOAP 或 `@RestResource(urlMapping=''/yourUrl'')`
    用于 REST 的注解。'
- en: '**Web Service Description Language** (**WSDL**): If you’re consuming or exposing
    a SOAP web service, you’ll encounter a WSDL file, which is an XML document that
    describes how the web service can be called, what parameters it expects, and what
    data structures it returns.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Web 服务描述语言**（**WSDL**）：如果您正在使用或公开 SOAP Web 服务，您将遇到 WSDL 文件，这是一个描述如何调用 Web
    服务、它期望的参数以及它返回的数据结构的 XML 文档。'
- en: '`https://yourInstance.salesforce.com/services/apexrest/yourUrl`.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`https://yourInstance.salesforce.com/services/apexrest/yourUrl`。'
- en: '**Authentication and authorization**: Security is often a crucial part of any
    web service. Salesforce provides various ways to authenticate web service calls,
    such as OAuth 2.0, Session ID, and basic authentication. This ensures that only
    authorized users can access or manipulate data.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**身份验证和授权**：安全性通常是任何 Web 服务的关键部分。Salesforce 提供了各种方式来验证 Web 服务调用，例如 OAuth 2.0、会话
    ID 和基本身份验证。这确保只有授权用户才能访问或操作数据。'
- en: '**Governor limits**: Salesforce enforces several governor limits on resources
    such as memory, CPU time, and the number of records retrieved or modified. These
    limits apply to web services as well, so it’s essential to write efficient code.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Governor 限制**：Salesforce 对资源（如内存、CPU 时间、检索或修改的记录数）实施多个 Governor 限制。这些限制也适用于
    Web 服务，因此编写高效的代码至关重要。'
- en: '**Exception handling**: A robust web service should be able to handle exceptions
    gracefully and return meaningful error messages to the client. Salesforce allows
    for custom exception types and fault contracts to handle errors effectively.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常处理**：一个健壮的 Web 服务应该能够优雅地处理异常，并向客户端返回有意义的错误消息。Salesforce 允许自定义异常类型和错误合同来有效地处理错误。'
- en: '`@future` methods, allowing time-consuming operations to be handled in the
    background, thereby making your web services more scalable and user-friendly.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`@future` 方法，允许耗时的操作在后台处理，从而使您的 Web 服务更具可扩展性和用户友好性。'
- en: Understanding these core concepts is crucial for both consuming external web
    services in Salesforce and exposing Salesforce data and operations as web services
    to be consumed by external systems.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些核心概念对于在 Salesforce 中使用外部 Web 服务以及将 Salesforce 数据和操作作为 Web 服务公开给外部系统至关重要。
- en: Salesforce Apex callouts
  id: totrans-22
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Salesforce Apex 调用。
- en: On the flip side, Salesforce Apex Callouts are essentially outbound requests
    to external services. They enable Salesforce to communicate with external APIs,
    be it RESTful or SOAP-based. Callouts are pivotal when Salesforce needs to fetch
    data from an external service or when an operation in Salesforce should trigger
    an action in another system. For example, when a new lead is added to Salesforce,
    a callout could automatically invoke an external email marketing tool to send
    a welcome email.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，Salesforce Apex 调用本质上是对外部服务的出站请求。它们使 Salesforce 能够与外部 API 通信，无论是基于 REST 还是
    SOAP。当 Salesforce 需要从外部服务获取数据或 Salesforce 中的操作应触发另一个系统中的操作时，调用至关重要。例如，当新的潜在客户添加到
    Salesforce 时，调用可以自动调用外部电子邮件营销工具发送欢迎邮件。
- en: Understanding both Salesforce Web Services and Callouts is crucial for anyone
    who aims to create a deeply integrated, automated, and efficient system. Whether
    syncing Salesforce with an ERP system, streaming real-time analytics data, or
    automating cross-system workflows, these tools offer the flexibility and power
    you need.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 理解 Salesforce Web 服务和调用对于任何希望创建深度集成、自动化和高效系统的人来说至关重要。无论是将 Salesforce 与 ERP 系统同步、实时分析数据流还是自动化跨系统工作流，这些工具都提供了您需要的灵活性和功能。
- en: 'Similar concepts from Web Services can be applied to Salesforce Callouts. A
    callout in Salesforce refers to the act of making a web service request to an
    external server from your Salesforce org. This is usually done to retrieve or
    send data from Salesforce to another platform or to integrate Salesforce with
    other systems. Here are some of the core concepts related to callouts in Salesforce:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 Web 服务的类似概念可以应用于 Salesforce 调用。在 Salesforce 中，调用指的是从您的 Salesforce 组织向外部服务器发起
    Web 服务请求的行为。这通常是为了从 Salesforce 向其他平台检索或发送数据，或者将 Salesforce 与其他系统集成。以下是与 Salesforce
    调用相关的核心概念：
- en: '**HTTP methods**: Salesforce supports various HTTP methods, such as GET, POST,
    PUT, PATCH, and DELETE, for making callouts. The choice of method depends on what
    operation you’re looking to perform on the external system.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**HTTP方法**：Salesforce支持各种HTTP方法，如GET、POST、PUT、PATCH和DELETE，用于进行调用。方法的选择取决于你打算在外部系统上执行的操作。'
- en: '**Named credentials**: Named credentials are a safer and more convenient way
    to store the endpoint and authentication details needed for callouts. It abstracts
    the endpoint and simplifies the callout procedure, especially when it comes to
    maintaining the code.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**命名凭据**：命名凭据是存储调用所需端点和身份验证细节的一种更安全、更方便的方式。它抽象化了端点，简化了调用过程，尤其是在维护代码时。'
- en: '`HttpRequest`, `HttpResponse`, and `Http` to create and execute HTTP callouts.
    These classes allow you to set headers, specify the HTTP method, and handle the
    response.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`HttpRequest`、`HttpResponse`和`Http`类创建和执行HTTP调用。这些类允许你设置头信息、指定HTTP方法并处理响应。
- en: '**Authentication**: When integrating with external services, you’ll often need
    to authenticate your requests. Salesforce supports various forms of authentication
    such as Basic Auth, OAuth, or API keys. These can usually be set in the HTTP header
    or the URL.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**身份验证**：当与外部服务集成时，你通常需要验证你的请求。Salesforce支持各种身份验证形式，如基本身份验证、OAuth或API密钥。这些通常可以在HTTP头或URL中设置。'
- en: '`@future` annotation or the `Queueable` interface. Asynchronous callouts are
    useful for operations that might take a long time to complete and you don’t want
    to hold up the user interface.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`@future`注解或`Queueable`接口。异步调用对于可能需要很长时间才能完成且不希望阻塞用户界面的操作非常有用。'
- en: '**SOAP and REST callouts**: You can make both SOAP and REST callouts from Salesforce.
    SOAP callouts use XML-based messaging and typically use a WSDL file for structure.
    REST callouts are more flexible and usually use JSON or XML for the message format.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SOAP和REST调用**：你可以从Salesforce进行SOAP和REST调用。SOAP调用使用基于XML的消息传递，通常使用WSDL文件进行结构化。REST调用更灵活，通常使用JSON或XML作为消息格式。'
- en: '**Governor limits**: Salesforce enforces governor limits on the number and
    duration of callouts. For synchronous transactions, you can make up to 100 callouts,
    and each callout can take a maximum of 120 seconds. Asynchronous callouts have
    different limits.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**限制器限制**：Salesforce对外部调用的数量和持续时间实施限制器限制。对于同步事务，你可以进行最多100次调用，每次调用最多可占用120秒。异步调用有不同的限制。'
- en: '**Error handling**: Effective error handling is crucial for a smooth user experience.
    Salesforce allows you to catch and handle exceptions that occur during a callout,
    enabling you to return user-friendly error messages and implement retry logic
    if necessary.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**错误处理**：有效的错误处理对于流畅的用户体验至关重要。Salesforce允许你在调用过程中捕获和处理异常，使你能够返回用户友好的错误消息，并在必要时实现重试逻辑。'
- en: '**Response parsing**: Once you receive a response from an external server,
    you’ll often need to parse this response to extract useful information. Salesforce
    provides built-in support for parsing both JSON and XML responses.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应解析**：一旦你从外部服务器收到响应，你通常需要解析此响应以提取有用信息。Salesforce提供了内置支持，用于解析JSON和XML响应。'
- en: Understanding these core concepts can significantly improve the efficiency and
    reliability of making callouts in Salesforce.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些核心概念可以显著提高在Salesforce中进行调用的效率和可靠性。
- en: ChatGPT can offer significant assistance to Salesforce developers working with
    Web Services and Callouts in multiple ways. Let’s take a look.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以通过多种方式为在多个方面与Web服务和调用一起工作的Salesforce开发者提供重大帮助。让我们来看看。
- en: Code snippets and prototypes
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码片段和原型
- en: Developing Web Services or Callouts involves writing Apex code, crafting HTTP
    requests, or working with SOAP/REST protocols. ChatGPT can generate code snippets
    and prototype examples for specific scenarios. This helps developers understand
    how to set up a web service or perform a callout, saving time that might be spent
    on research or initial code writing.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 开发Web服务或调用涉及编写Apex代码、制作HTTP请求或与SOAP/REST协议一起工作。ChatGPT可以为特定场景生成代码片段和原型示例。这有助于开发者了解如何设置Web服务或执行调用，节省可能花费在研究或初始代码编写上的时间。
- en: Debugging assistance
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调试辅助
- en: Issues often arise when developing or maintaining Web Services and Callouts
    – be it poorly formed requests/responses, authorization issues, or logic errors.
    ChatGPT can help diagnose common problems and offer debugging advice. While it
    can’t directly access your Salesforce instance to debug for you, it can guide
    you through the thought process and recommend potential solutions based on the
    symptoms you describe.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发或维护 Web 服务和调用时，常常会出现问题——无论是请求/响应格式不良、授权问题还是逻辑错误。ChatGPT 可以帮助诊断常见问题并提供调试建议。虽然它不能直接访问你的
    Salesforce 实例为你进行调试，但它可以引导你进行思考过程，并根据你描述的症状推荐可能的解决方案。
- en: Best practices
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: Salesforce has guidelines and best practices for implementing Web Services and
    Callouts efficiently and securely. ChatGPT can provide insights into these best
    practices, such as handling governor limits, ensuring fault tolerance, or managing
    API versioning, helping you to build more robust and scalable solutions.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce 有关于高效和安全实施 Web 服务和调用的指南和最佳实践。ChatGPT 可以提供关于这些最佳实践的见解，例如处理限制器限制、确保容错性或管理
    API 版本，帮助你构建更健壮和可扩展的解决方案。
- en: Review and refactoring suggestions
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 审查和重构建议
- en: Suppose you’ve already written some code for a web service or a callout. In
    that case, ChatGPT can help review that code logically and suggest refactorings
    to improve performance, maintainability, or readability. This could include things
    such as optimizing SOQL queries, handling exceptions more gracefully, or modularizing
    code for better reusability.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你已经为网络服务或调用编写了一些代码。在这种情况下，ChatGPT 可以帮助你逻辑上审查该代码，并提出重构建议以改进性能、可维护性或可读性。这可能包括优化
    SOQL 查询、更优雅地处理异常或模块化代码以提高可重用性。
- en: Interactive learning
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交互式学习
- en: ChatGPT can simulate real-world scenarios involving web services and callouts.
    This enables less-experienced developers to understand the life cycle of these
    services, including request and response handling, data parsing, and error management,
    through interactive dialogue.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以模拟涉及网络服务和调用的真实世界场景。这使得经验较少的开发者可以通过交互式对话了解这些服务的生命周期，包括请求和响应处理、数据处理和错误管理。
- en: By assisting in these areas, ChatGPT becomes a valuable companion for Salesforce
    developers, enabling them to write better, debug faster, and understand deeper.
    It can be especially useful for solo developers or smaller teams that may not
    have immediate access to specialized expertise in Salesforce Web Services and
    Callouts.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在这些领域提供帮助，ChatGPT 成为了 Salesforce 开发者的宝贵伴侣，使他们能够编写更好的代码、更快地调试和理解得更深入。对于可能没有立即获得
    Salesforce 网络服务和调用专业知识的独立开发者或小型团队来说，它尤其有用。
- en: Setting up web services with ChatGPT’s aid
  id: totrans-48
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 ChatGPT 的帮助下设置网络服务
- en: Consider the following simple example of a user story that allows an external
    inventory system to update stock levels.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下简单的用户故事示例，允许外部库存系统更新库存水平。
- en: 'User Story – *integrate Salesforce with an external* *inventory system*:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 用户故事 – *集成 Salesforce 与外部* *库存系统*：
- en: '**Goal**: As a backend developer, I want to create a web service in Salesforce
    so that the external inventory management system can update Salesforce whenever
    an item’s stock level changes.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为一名后端开发者，我希望在 Salesforce 中创建一个网络服务，以便外部库存管理系统可以在商品库存水平发生变化时更新 Salesforce。'
- en: '**Acceptance criteria**:'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验收标准**：'
- en: '**Given** the external inventory management system has an update to the stock
    level of an item'
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定** 外部库存管理系统对商品库存水平进行了更新'
- en: '**When** the external system sends a POST request with the updated stock level
    and item ID'
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当** 外部系统发送包含更新库存水平和商品 ID 的 POST 请求时'
- en: '**Then** the Salesforce web service should update the corresponding record
    in the Product object with the new stock level'
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后** Salesforce 网络服务应使用新的库存水平更新产品对象中的相应记录'
- en: '**Given** the external system sends an invalid Item ID or stock level'
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定** 外部系统发送无效的商品 ID 或库存水平'
- en: '**When** the Salesforce web service receives the request'
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当** Salesforce 网络服务接收到请求时'
- en: '*Then* the web service should respond with a proper error message and HTTP
    status code indicating the issue'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*然后** 网络服务应响应适当的错误消息和 HTTP 状态码，指示问题'
- en: '*Given* the web service has updated the Salesforce record successfully'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*给定** 网络服务已成功更新 Salesforce 记录'
- en: '*When* the operation is complete'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '*当**操作完成时**'
- en: '*Then* the web service should respond with a success message and HTTP status
    code indicating the successful update'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '*然后** 网络服务应响应成功消息和 HTTP 状态码，指示更新成功'
- en: 'We can combine the user with a request to ChatGPT to write the code and configuration
    directions:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将用户与请求ChatGPT编写代码和配置指南结合起来：
- en: '| **Prompt** | Could you please write the code and configuration for this user
    story?User story – integrate Salesforce with an external inventory system.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '| **提示** | 你能请写这个用户故事的代码和配置吗？用户故事 - 将Salesforce与外部库存系统集成。'
- en: '**Goal**: As a backend developer, I want to create a web service in Salesforce
    so that the external inventory management system can update Salesforce whenever
    an item’s stock level changes.'
