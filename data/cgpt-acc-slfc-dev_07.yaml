  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**外部库存管理系统对某个商品的库存水平进行了更新'
- en: '**When** the external system sends a POST request with the updated stock level
    and item ID'
  id: totrans-67
  prefs:
