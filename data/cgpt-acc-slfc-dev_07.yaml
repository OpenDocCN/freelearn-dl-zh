- en: '**How** **to use**:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何** **使用**：'
- en: The `ICalloutService` interface defines the contract for all callout services
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ICalloutService`接口定义了所有调用服务的合同'
- en: '`AbstractCalloutService` provides a basic `HttpRequest` creation method'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AbstractCalloutService`提供了一个基本的`HttpRequest`创建方法'
- en: Concrete classes such as `InventoryCalloutService` implement the actual callout
    logic
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实际实现调用逻辑的具体类，例如`InventoryCalloutService`
- en: '|'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|  |'
  id: totrans-297
  prefs: []
  type: TYPE_TB
  zh: '|  |'
- en: The `CalloutHandler` class delegates the callout to the appropriate service
    based on some condition (here, this is `serviceName`)
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`CalloutHandler`类根据某些条件（这里是指`serviceName`）将调用委托给适当的服务'
- en: The `MyController` class shows how to use this framework to make a callout
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`MyController`类展示了如何使用此框架进行调用'
- en: With this pattern, you can easily add more types of callouts by creating new
    classes that implement `ICalloutService`. This makes it simple to manage changes
    in JSON payload structure or even completely different types of callouts. |
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种模式，您可以通过创建实现`ICalloutService`的新类来轻松添加更多类型的调用。这使得管理JSON有效负载结构的更改或甚至完全不同类型的调用变得简单。|
- en: Utilizing Apex frameworks in Salesforce can significantly streamline the development
    process by providing a structured, reusable code base, which can lead to consistent
    and maintainable coding practices. Apex frameworks can also enhance efficiency,
    allowing developers to focus on unique business logic rather than boilerplate
    code, and facilitate easier debugging and testing due to their standardized architecture.
    These frameworks often come with built-in best practices, ensuring that solutions
    are not only robust but also scalable and aligned with the evolving ecosystem
    of Salesforce.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 在Salesforce中使用Apex框架可以显著简化开发过程，通过提供结构化、可重用的代码库，这可以导致一致且可维护的编码实践。Apex框架还可以提高效率，让开发者能够专注于独特的业务逻辑，而不是样板代码，并且由于它们的标准化架构，便于更容易地进行调试和测试。这些框架通常包含内置的最佳实践，确保解决方案不仅稳健，而且可扩展，并与Salesforce不断发展的生态系统保持一致。
- en: Troubleshooting web service and callout issues
  id: totrans-302
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 调试网络服务和调用问题
- en: ChatGPT can serve as a valuable resource for developers seeking to troubleshoot
    issues related to web services and callouts in Salesforce. Whether you’re facing
    challenges in request formatting, HTTP method selection, header configuration,
    or response handling, ChatGPT can guide you through common pitfalls and offer
    suggestions for best practices.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以作为开发者解决Salesforce中网络服务和调用问题的一个宝贵资源。无论您是在请求格式、HTTP方法选择、头部配置还是响应处理方面遇到挑战，ChatGPT都可以引导您通过常见的陷阱，并提供最佳实践的建议。
- en: For example, if you encounter an unexpected HTTP status code, ChatGPT can help
    you understand the likely causes of that status code and ways to resolve the issue.
    Similarly, if your SOAP or REST callout isn’t functioning as expected, ChatGPT
    can provide insights into common issues such as malformed XML/JSON, unauthorized
    access, or governor limit exceedances, and suggest ways to debug or refactor your
    code.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您遇到意外的HTTP状态码，ChatGPT可以帮助您了解该状态码的可能原因以及解决问题的方法。同样，如果您的SOAP或REST调用没有按预期工作，ChatGPT可以提供关于常见问题（如格式错误的XML/JSON、未经授权的访问或超出限制）的见解，并提出调试或重构代码的建议。
- en: Moreover, as we saw previously, ChatGPT can assist you in writing test classes
    for your callouts, an often overlooked but crucial part of Salesforce development.
    By offering code samples or pointing out where mock classes and methods could
    be implemented, ChatGPT enhances your ability to produce robust, error-free services.
    The tool is not only reactive, helping you solve issues, but also proactive, equipping
    you with the knowledge and best practices to avoid future problems.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，正如我们之前所看到的，ChatGPT可以帮助您编写调用测试类，这是Salesforce开发中经常被忽视但至关重要的一个部分。通过提供代码示例或指出可以实施模拟类和方法的位置，ChatGPT增强了您产生稳健、无错误的服务的功能。这个工具不仅具有反应性，帮助您解决问题，而且具有主动性，为您提供知识和最佳实践，以避免未来的问题。
- en: With its advanced capabilities and extensive knowledge base, ChatGPT aims to
    be a reliable assistant for troubleshooting your web services and callouts, ultimately
    aiding you in crafting more robust and efficient Salesforce applications.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 凭借其先进的功能和广泛的知识库，ChatGPT旨在成为您解决网络服务和调用问题的可靠助手，最终帮助您构建更稳健、更高效的Salesforce应用程序。
- en: 'Let’s start with the example of some malformed JSON:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一些格式错误的JSON示例开始：
- en: '[PRE151]'
  id: totrans-308
  prefs: []
  type: TYPE_PRE
  zh: '[PRE151]'
- en: 'Here, we are testing our web service by creating our customer, John, but it
    is not working correctly and the response contains the typical error: malformed
    JSON. ChatGPT can easily point us in the right direction:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们通过创建我们的客户John来测试我们的网络服务，但它没有正确工作，并且响应包含典型的错误：格式错误的JSON。ChatGPT可以轻松地指引我们正确的方向：
- en: '| **Prompt** | Could you please help me understand why the following JSON is
    malformed and provide me with well-created JSON?'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: '| **提示** | 你能帮我理解为什么以下 JSON 格式不正确，并给我提供一个格式正确的 JSON 吗？'
- en: '[PRE152]'
  id: totrans-311
  prefs: []
  type: TYPE_PRE
  zh: '[PRE152]'
- en: '[PRE153]'
  id: totrans-312
  prefs: []
  type: TYPE_PRE
  zh: '[PRE153]'
- en: '[PRE154]'
  id: totrans-313
  prefs: []
  type: TYPE_PRE
  zh: '[PRE154]'
- en: '[PRE155]'
  id: totrans-314
  prefs: []
  type: TYPE_PRE
  zh: '[PRE155]'
- en: '[PRE156]'
  id: totrans-315
  prefs: []
  type: TYPE_PRE
  zh: '[PRE156]'
- en: '|'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| **Response** | Certainly! The issue with the provided JSON is that the email
    value, `john.doe@domain.com`, is not enclosed in double quotes, which is required
    for string values in JSON. Because of this, the JSON parser will not be able to
    understand the value and it will be considered malformed.Here is the corrected
    version:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: '| **响应** | 当然可以！提供的 JSON 中的问题是电子邮件值 `john.doe@domain.com` 没有被双引号包围，这是 JSON
    中字符串值所必需的。因为这个原因，JSON 解析器将无法理解这个值，并且它将被视为格式不正确。以下是修正后的版本：'
- en: '[PRE157]'
  id: totrans-318
  prefs: []
  type: TYPE_PRE
  zh: '[PRE157]'
- en: '[PRE158]'
  id: totrans-319
  prefs: []
  type: TYPE_PRE
  zh: '[PRE158]'
- en: '[PRE159]'
  id: totrans-320
  prefs: []
  type: TYPE_PRE
  zh: '[PRE159]'
- en: '[PRE160]'
  id: totrans-321
  prefs: []
  type: TYPE_PRE
  zh: '[PRE160]'
- en: '[PRE161]'
  id: totrans-322
  prefs: []
  type: TYPE_PRE
  zh: '[PRE161]'
- en: In this version, all string values and property names are enclosed in double
    quotes, making it a well-formed JSON object. |
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个版本中，所有字符串值和属性名都被双引号包围，使其成为一个格式正确的 JSON 对象。 |
- en: 'It’s easy for ChatGPT to come up with a good example and explain the root cause
    of the problem. But why don’t we take it a couple of steps further? One common
    issue when dealing with callouts is getting the following error:'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 ChatGPT 来说，提出一个好的例子并解释问题的根本原因很容易。但为什么我们不更进一步呢？处理调用时常见的一个问题是收到以下错误：
- en: '`Error - ''You have uncommitted` `work pending''`'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: '`错误 - ''你有未提交的工作''`'
- en: 'ChatGPT can help identify the issue and suggest a solution:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 可以帮助识别问题并提出解决方案：
- en: '| **Prompt** | Why am I getting this error: `Error - ''You have uncommitted`
    `work pending`? |'
  id: totrans-327
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 为什么我会收到这个错误：`错误 - ''你有未提交的工作''`？ |'
- en: '| **Response** | The error “You have uncommitted work pending” often occurs
    in Salesforce when you are trying to perform a callout after making a **Data Manipulation
    Language** (**DML**) operation in the same transaction. Salesforce does not allow
    you to do any DML operations before a callout in the same transaction to ensure
    data consistency.Here are some typical scenarios where this can happen:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: '| **响应** | 错误“你有未提交的工作”通常在 Salesforce 中发生，当你在同一交易中执行 DML 操作后尝试进行调用时。Salesforce
    不允许你在同一交易中进行任何 DML 操作，以确保数据一致性。以下是一些可能发生这种情况的典型场景：'
- en: You perform a DML operation (insert, update, delete, and so on) and then immediately
    attempt to make an HTTP callout.
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你执行一个 DML 操作（插入、更新、删除等），然后立即尝试进行 HTTP 调用。
- en: You start a database transaction, perform some operation, and then try to make
    a callout before committing the transaction.
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你开始一个数据库事务，执行一些操作，然后尝试在提交事务之前进行调用。
- en: 'To fix this issue, you have several options:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，你有几个选择：
- en: '`@future` method to move the callout to a separate transaction, allowing the
    DML operation to commit before the callout occurs. Just remember that `@future`
    methods have governor limits:'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`@future` 方法将调用移动到单独的交易中，允许在调用发生之前提交 DML 操作。但请记住，`@future` 方法有资源限制：'
- en: '[PRE162]'
  id: totrans-333
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE162]'
- en: '`@future`, Queueable Apex runs in a separate transaction. This allows for more
    flexibility and is the modern replacement for future methods:'
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`@future`，可排队 Apex 在单独的交易中运行。这提供了更多的灵活性，并且是未来方法的现代替代品：'
- en: '[PRE163]'
  id: totrans-335
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE163]'
- en: '**Rearrange your logic**: Sometimes, you can rearrange your code logic to perform
    all DML operations after all the callouts are done.'
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重新排列你的逻辑**：有时，你可以重新排列你的代码逻辑，在所有调用完成后执行所有 DML 操作。'
- en: '**Perform callouts first**: If possible, perform the callout first and then
    do the DML operations.'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**首先执行调用**：如果可能的话，先执行调用，然后进行 DML 操作。'
- en: By ensuring that DML operations and callouts are separated into different transactions,
    you can avoid this error. |
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 通过确保 DML 操作和调用分离到不同的交易中，你可以避免这个错误。 |
- en: With that, we can summarize what we’ve learned.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这些，我们可以总结一下我们学到的内容。
- en: Summary
  id: totrans-340
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you enriched your understanding of web services and callouts
    within the Salesforce ecosystem, learning how to effectively set up, optimize,
    and troubleshoot these essential integrative features. You have acquired knowledge
    of the core concepts, delved into configuring web services with accuracy, and
    explored optimization techniques for improved performance and reliability. The
    guidance provided by ChatGPT has empowered you to swiftly identify and resolve
    common integration issues, ensuring your Salesforce solutions communicate seamlessly
    with other systems while adhering to robust security protocols. You have translated
    user stories into successful Salesforce integrations, thus enhancing your proficiency
    and confidence in managing complex digital interactions.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你丰富了在 Salesforce 生态系统中对 Web 服务和调用的理解，学习了如何有效地设置、优化和排除这些关键集成功能的技术。你掌握了核心概念，精确地配置了
    Web 服务，并探索了提高性能和可靠性的优化技术。ChatGPT 提供的指导使你能够迅速识别和解决常见的集成问题，确保你的 Salesforce 解决方案能够与其他系统无缝通信，同时遵守稳健的安全协议。你将用户故事转化为成功的
    Salesforce 集成，从而提高了你在管理复杂数字交互方面的熟练度和信心。
- en: In the next chapter, you will delve into the realm of Salesforce triggers, understanding
    their pivotal role in automating processes and how ChatGPT can elevate their creation
    and maintenance. This chapter will guide you through the intricacies of trigger
    design, drawing on ChatGPT’s insights to ensure these triggers are not only effective
    but also adhere to best practices. You will learn the critical skills of optimizing
    and refactoring existing triggers for peak performance, and gain valuable troubleshooting
    techniques to swiftly handle any arising errors. This chapter will impart foundational
    knowledge, coupled with the capability to design, optimize, and debug triggers,
    thereby enhancing the Salesforce environment’s responsiveness and reliability.
  id: totrans-342
