- en: A strategic guide to implementing coordination patterns
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施协调模式的战略指南
- en: 'The relationship between coordination patterns and the GenAI Maturity Model
    is not about simply assigning idx_1249213aa pattern to a specific level. Instead,
    it''s an evolution: as an organization progresses from single-agent systems (Levels
    1–3) to multi-agent systems (Level 4), the implementation of these coordination
    patterns becomes more dynamic, complex, and decentralized.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 协调模式与通用人工智能成熟度模型之间的关系，不仅仅是将idx_1249213aa模式分配给特定级别。相反，它是一个演变：随着组织从单智能体系统（第1-3级）发展到多智能体系统（第4级），这些协调模式的实施变得更加动态、复杂和去中心化。
- en: To ground this discussion, let's review the Agentic AI levels of maturity we
    covered in *Chapter* *3*.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这次讨论更加具体，让我们回顾一下我们在第*3*章中讨论的代理人工智能成熟度级别。
- en: '| **Maturity level** | **Description** | **Scalability insight** | **Compliance
    insight** | **Key patterns/methods** |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| **成熟度级别** | **描述** | **可扩展性见解** | **合规性见解** | **关键模式/方法** |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| 1\. Basic agentic systems | Single agents handle specific, well-defined tasks
    semi-autonomously, using simple, predefined workflows and function calls to external
    APIs or tools. | Adaptable but rigid. Workflows are relatively fixed, which limits
    the potential for innovation. | Straightforward to manage as tasks are well-defined,
    minimizing the risk of policy violations. | Single-Agent Baseline, Static Function
    Calling, Watchdog Timeout, Agent Calls Human. |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| 1\. 基本代理系统 | 单个智能体处理特定、定义明确的任务，半自主地使用简单、预定义的工作流程和函数调用外部API或工具。 | 可适应但僵化。工作流程相对固定，这限制了创新潜力。
    | 由于任务定义明确，管理简单，因此易于管理，最小化了政策违规的风险。 | 单智能体基线、静态函数调用、看门狗超时、智能体呼叫人类。 |'
- en: '| 2\. Dynamic single-agent workflows | A single agent can dynamically choose
    from a variety of pre-selected tools or APIs based on the problem at hand, allowing
    for more flexible problem-solving. | More versatile and efficient, as agents can
    tackle more complex problems by selecting the appropriate tools. | Manageable
    due to the pre-selection of approved tools, but requires careful monitoring of
    agent behavior as autonomy increases | Agent Router (Basic), Dynamic Tool Selection,
    Simple RAG, Simple Retry. |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| 2. 动态单代理工作流 | 单个代理可以根据手头的问题动态地从多种预选工具或API中进行选择，从而实现更灵活的问题解决。 | 更通用且高效，因为代理可以通过选择适当的工具来解决更复杂的问题。
    | 由于预选了经过批准的工具，因此易于管理，但随着自主性的增加，需要仔细监控代理的行为。 | 代理路由器（基本），动态工具选择，简单RAG，简单重试。 |'
- en: '| 3\. Introspective patterns with ReAct and Reflexion | Single agents use methods
    such as ReAct and Reflexion patterns that incorporate step-by-step reasoning and
    self-reflection. This enables them to learn from their actions and self-correct
    through feedback loops. | The introduction of feedback and self-correction allows
    agents to handle more complex tasks and improve over time, creating paths for
    scalability. | Real-time monitoring and corrective mechanisms become essential
    to ensure that agents remain aligned with policies while learning. | ReAct, Reflexion,
    Instruction Fidelity Auditing, Adaptive Retry with Prompt Mutation. |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| 3. 带有ReAct和Reflexion的内省模式 | 单个代理使用ReAct和Reflexion模式等包含逐步推理和自我反思的方法。这使得它们能够从自己的行为中学习并通过反馈循环进行自我纠正。
    | 反馈和自我纠正的引入使代理能够处理更复杂的任务并在时间上不断改进，为可扩展性创造了路径。 | 实时监控和纠正机制变得至关重要，以确保代理在学习过程中与政策保持一致。
    | ReAct，Reflexion，指令忠实度审计，带有提示突变的自适应重试。 |'
- en: '| 4\. Multi-agent systems | Multiple specialized agents collaborate to handle
    complex tasks. Each agent focuses on different, non-overlapping functions, and
    their coordination allows for parallel processing. | Ideal for high-scale environments.
    Tasks can be distributed across multiple agents, enabling efficient parallel processing
    of complex workflows. | More complex to manage. Monitoring systems are required
    to ensure that all semi-autonomous agents collaborate in ways that adhere to regulations.
    | Supervisor Architecture, Multi-Agent Planning, Shared Epistemic Memory, Event-Driven
    Reactivity, Tool/Agent Registry. |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| 4. 多代理系统 | 多个专业化的代理协作处理复杂任务。每个代理专注于不同的、不重叠的功能，它们的协调允许并行处理。 | 适用于大规模环境。任务可以分配给多个代理，从而实现复杂工作流的并行高效处理。
    | 管理起来更复杂。需要监控系统以确保所有半自主代理以符合规定的方式协作。 | 管理架构，多代理规划，共享认知记忆，事件驱动反应性，工具/代理注册。 |'
- en: '| 5\. Advanced multi-agent coordination with meta-agents | A "meta-agent" is
    introduced to oversee and coordinate the other agents. This allows for dynamic
    task reassignment and real-time planning adjustments. | Enhanced adaptability.
    The system can scale effectively even in changing environments due to optimized
    task distribution by the meta-agent. | Meta-agents act as overseers, helping to
    maintain policy adherence by adjusting workflows and redistributing tasks as needed.
    | Meta-agents, Blackboard Topology, Resource Allocation, Contract-Net Marketplace,
    Supervision Trees. |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| 5. 带有元代理的高级多代理协调 | 引入了一个“元代理”来监督和协调其他代理。这允许动态任务重新分配和实时计划调整。 | 提高了适应性。由于元代理优化了任务分配，系统即使在不断变化的环境中也能有效地扩展。
    | 元代理作为监管者，通过调整工作流程和按需重新分配任务，帮助保持政策的一致性。 | 元代理，黑板拓扑，资源分配，合同网市场，监督树。 |'
- en: '| 6\. Self-correcting agents: Agentic workflows with feedback mechanisms for
    self-learning | Advanced multi-agent systems use complex, multi-turn feedback
    loops. Agents critique, correct, and refine one another''s outputs iteratively,
    leading to continuous process improvement. | Highly scalable with continuous improvement
    built in. These systems can evolve in real time, making them extremely efficient
    for dynamic tasks. | Most complex. Automated compliance checks and self-corrective
    actions are necessary to ensure that agents stay aligned with policies while adapting.
    | Consensus, Agent Negotiation, Conflict Resolution, Fractal CoT, Coevolved Agent
    Training, Trust Decay |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| 6. 自纠正智能体：具有自我学习反馈机制的智能体工作流程 | 高级多智能体系统使用复杂的多轮反馈循环。智能体通过迭代地批评、纠正和改进彼此的输出，从而实现持续的过程改进。|
    具有内置的持续改进，高度可扩展。这些系统可以实时进化，使其在动态任务中极为高效。| 最复杂的。需要自动合规性检查和自我纠正操作，以确保智能体在适应政策的同时保持一致。|
    协商、智能体谈判、冲突解决、分形 CoT、协同进化的智能体训练、信任衰减 |'
- en: Table 5.1 – Agentic AI Maturity Model
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5.1 – 智能体 AI 成熟度模型
- en: Now that idx_e5f826ccwe have mapped the coordination patterns to our maturity
    levels, let's explore how an organization begins its journey into multi-agent
    systems (Level 4) by establishing foundational, structured workflows. At this
    stage, the focus is on stability and moving away from isolated agents toward structured
    collaboration.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经将协调模式映射到我们的成熟度级别，让我们探索一个组织如何通过建立基础、结构化的工作流程开始其进入多智能体系统（第 4 级）的旅程。在这个阶段，重点是稳定性和从孤立智能体向结构化协作的转变。
- en: 'Note: Going forward in this chapter, the mention of levels pertains to those
    of the Agentic AI Maturity Model outlined in *T**able 5.1*.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在本章后续内容中，提到的级别指的是 *表 5.1* 中概述的 Agentic AI 成熟度模型中的级别。
- en: 'Multi-agent systems: foundational coordination (Level 4)'
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多智能体系统：基础协调（第 4 级）
- en: In this basic, or foundational stage, of a multi-agent system, the primary goal
    is to establish a functional, predictable, and auditable system where idx_5039efa8multiple
    agents can successfully collaborate on a well-defined workflow. The coordination
    is typically explicit and managed from the top down. Architectural idx_bf8a8eb7choices
    favor clear control and centralized orchestration over complex, decentralized
    autonomy.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在多智能体系统的这个基本或基础阶段，主要目标是建立一个功能性的、可预测的、可审计的系统，其中多个智能体可以成功地在定义良好的工作流程中协作。协调通常是明确的，并且从上到下进行管理。架构选择倾向于清晰的控制和集中编排，而不是复杂的去中心化自主性。
- en: 'The key idx_b3beeb61characteristics of this foundational coordination style
    include the following:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这种基础协调风格的关键特征包括以下内容：
- en: '**Task** **d****elegation and** **p****lanning**: The most common approach
    at this level is a ***Supervisor Architecture***. In this idx_a1d0de90architecture,
    we have a central orchestrator agent, which is easy to build, debug, and govern.
    This orchestrator idx_05f9b7dauses ***Multi-Agent Planning*** to decompose tasks
    and assign them to specialized "worker" agents. The plan is often static or semi-static,
    reflecting a structured business process.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务** **委派和** **规划**：在这个级别最常见的方法是**主管架构**。在这个架构中，我们有一个中央协调智能体，它易于构建、调试和管理。这个协调器使用**多智能体规划**来分解任务并将它们分配给专门的“工人”智能体。计划通常是静态的或半静态的，反映了结构化的业务流程。'
- en: '**Information and** **r****esource** **m****anagement**: ***Knowledge*** ***S******haring***
    is implemented through a simple ***Shared Epistemic Memory***, such as a shared
    database. Basic ***Resource Allocation*** and ***Conflict Resolution*** are handled
    centrally by the supervisor, which idx_984b01ecuses a predefined set of policies
    or priority rules.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信息和** **资源** **管理**：通过简单的**共享认知记忆**，如共享数据库，实现**知识** **共享**。基本的**资源分配**和**冲突解决**由主管集中处理，主管使用预定义的政策集或优先级规则。'
- en: '**Interaction** **model**: Agents at this level generally do not negotiate
    among themselves. The supervisor dictates the workflow and relies on its hierarchical
    authority to resolve conflicts.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互** **模型**：在这个级别的智能体通常不会相互协商。主管决定工作流程，并依靠其等级权威来解决冲突。'
- en: Advanced multi-agent coordination and self-correction (Levels 5–6)
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级多智能体协调和自纠正（第 5-6 级）
- en: This more advanced level of a multi-agent system represents a significant leap
    in agent autonomy. The system is designed to handle ambiguity, adapt to unforeseen
    events, and solve problems where the solution path is not known in idx_549d8f8fadvance.
    Coordination idx_ba71554dbecomes more emergent and idx_26ae832cdecentralized.
    The focus shifts from a top-down idx_79589ab5command structure to enabling "social"
    capabilities among agents, allowing them to resolve conflicts, align on goals,
    and adapt their collective strategy in real time.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这个多智能体系统的高级水平代表了智能体自主性的重大飞跃。该系统旨在处理模糊性，适应不可预见的事件，并在解决方案路径未知的情况下解决问题。协调性变得更加涌现和去中心化。重点从自上而下的指挥结构转移到在智能体之间启用“社会”能力，使他们能够解决冲突，对齐目标，并实时调整其集体策略。
- en: 'The key aspects of this advanced coordination style include the following:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这种高级协调风格的关键方面包括以下内容：
- en: '**Evolved** **d****elegation and** **p****lanning**: The system idx_a33b94b6may
    move toward a decentralized ***Swarm Architecture*** for greater idx_395d923fresilience
    or adopt a ***Hybrid Model***. Planning becomes dynamic, allowing the system to
    adapt in real time.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**进化的** **委** **托和** **计** **划**：系统可能朝着更具有弹性的***蜂群架构***或采用***混合模型***的方向发展。计划变得动态，使系统能够实时适应。'
- en: '**Advanced "****s****ocial"** **i****nteractions**: The most significant shift
    at Level 6 is the introduction of patterns that govern autonomous agent-to-agent
    interactions:'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级“社会”** **交** **互**：在六级中最重要的转变是引入了规范自主智能体之间交互的模型：'
- en: '***Consensus***: When agents have conflicting data, they can engage in an iterative
    debate to converge on a shared understanding.'
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***共识***：当智能体有冲突的数据时，他们可以进行迭代辩论，以达成共识。'
- en: '***Negotiation***: Agents with competing goals can directly negotiate a compromise,
    enabling more flexible and optimal outcomes.'
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***谈判***：具有竞争目标的智能体可以直接协商妥协，从而实现更灵活和更优的结果。'
- en: '**Specialized** **c****oordination**: For systems interacting with the physical
    world, ***Formation Control*** becomes essential, allowing a group of agents (such
    as drones or robots) to self-organize and maintain a collective structure.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专门** **的** **协调**：对于与物理世界交互的系统，***编队控制***变得至关重要，允许一组智能体（如无人机或机器人）自我组织并保持集体结构。'
- en: The primary distinction between a Level 4 foundational and a Level 6 multi-agent
    system lies in the shift from a centrally managed, predictable workflow to a decentralized,
    adaptive, and more autonomous collective. The following table contrasts how key
    architectural aspects are implemented at each of these maturity stages.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 四级基础智能体系统和六级多智能体系统之间的主要区别在于，从集中管理、可预测的工作流程转变为去中心化、自适应和更自主的集体。以下表格对比了在每个成熟阶段如何实现关键架构方面。
- en: '| **Architectural aspect** | **Multi-agent systems (Level 4)** | **Advanced
    and self-correcting systems (Levels 5 and 6)** |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| **架构方面** | **多智能体系统（四级）** | **高级和自我修正系统（五级和六级）** |'
- en: '| --- | --- | --- |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Primary goal | Establish a functional, predictable, and auditable workflow.
    | Handle ambiguity, adapt to unforeseen events, and solve dynamic problems. |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| **主要目标** | 建立一个功能性强、可预测和可审计的工作流程。 | 处理模糊性，适应不可预见的事件，并解决动态问题。 |'
- en: '| Coordination model | Top-down and explicit, managed by a central authority.
    | Bottom-up and emergent, arising from agent interactions. |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| 协调模型 | 自上而下和明确，由中央权威管理。 | 自下而上和涌现，源于智能体之间的交互。 |'
- en: '| Primary architecture | Supervisor architecture: A central orchestrator agent
    directs the workflow. | Swarm or hybrid architectures: Agents operate as a peer-to-peer
    network or in self-organizing teams. |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| 主要架构 | 监督架构：一个中心协调智能体指导工作流程。 | 蜂群或混合架构：智能体作为对等网络或自我组织团队运行。 |'
- en: '| Planning method | Static planning: The supervisor decomposes tasks and dictates
    a largely fixed plan. | Dynamic planning: The plan is adaptive and can be modified
    in real time. |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| 计划方法 | 静态计划：监督者分解任务并制定一个主要固定的计划。 | 动态计划：计划是自适应的，可以实时修改。 |'
- en: '| Knowledge sharing | Simple shared memory: Used primarily to pass state between
    agents. | Rich shared epistemic memory: Used to build collective intelligence.
    |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| 知识共享 | 简单共享内存：主要用于在智能体之间传递状态。 | 丰富的共享认知记忆：用于构建集体智慧。 |'
- en: '| Conflict resolution | Centralized and policy-based: The supervisor resolves
    conflicts based on predefined rules. | Autonomous and negotiated: Agents resolve
    conflicts directly through negotiation and consensus. |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| 冲突解决 | 集中式和基于策略的：监督者根据预定义的规则解决冲突。 | 自主和协商的：代理通过协商和共识直接解决冲突。 |'
- en: Table 5.3 – Maturity level to pattern mapping for coordination
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 表5.3 – 协调模式与成熟度级别的映射
- en: 'Now that idx_237d1619we have defined the high-level idx_f978f770architectures
    for multi-agent systems (Level 4) and advanced systems, represented by either
    a centralized supervisor idx_cf6f009b or a decentralized swarm, we face an immediate
    practical challenge: traffic control. It is not enough to simply have a hierarchy;
    the system needs a concrete mechanism to analyze an incoming request and dispatch
    it to the correct specialist. How should the supervisor actually know that a query
    about ''Q3 Audit Logs'' should go to a compliance agent and not a sales agent?
    This brings us to our first foundational coordination pattern: ***Agent Router***.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经定义了多代理系统（Level 4）和高级系统的高级别idx_f978f770架构，无论是集中式监督idx_cf6f009b还是去中心化集群，我们面临一个紧迫的实践挑战：交通控制。仅仅有层次结构是不够的；系统需要一个具体的机制来分析传入的请求并将其调度到正确的专家。监督者实际上如何知道关于'Q3审计日志'的查询应该发送给合规代理而不是销售代理？这把我们带到了我们的第一个基础协调模式：***代理路由器***。
- en: The Agent Router pattern (intent-based routing)
  id: totrans-58
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理路由器模式（基于意图的路由）
- en: '***Agent Router*** is the idx_ab9c3650foundational pattern for decoupling the
    user''s intent from the specific agent that executes it. In early or simple systems,
    developers often relied on hardcoded conditional logic (e.g., if "sales" in query:
    `call_sales_agent`). However, at an enterprise scale with dozens of specialized
    agents, this approach becomes brittle and unmanageable. ***Agent Router*** solves
    this by introducing a dedicated architectural layer that acts as a sophisticated
    switchboard.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '***代理路由器***是idx_ab9c3650的基础模式，用于将用户的意图与其执行的特定代理解耦。在早期或简单的系统中，开发者通常依赖于硬编码的条件逻辑（例如，如果查询中有“销售”：`call_sales_agent`）。然而，在企业规模上，有数十个专业代理，这种方法变得脆弱且难以管理。***代理路由器***通过引入一个专门的架构层来解决这个问题，该层充当一个复杂的交换机。'
- en: 'This pattern combines two distinct mechanisms: semantic intent extraction (understanding
    the "what") and graph-constrained routing (deciding the "who"). By separating
    these concerns, the system can scale to support new agents and capabilities without
    requiring a rewrite of the core orchestration logic. It serves as the "Hello World"
    of agentic coordination, the minimal viable core required for intelligent dispatch.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式结合了两种不同的机制：语义意图提取（理解“是什么”）和图约束路由（决定“谁”）。通过分离这些关注点，系统可以扩展以支持新的代理和功能，而无需重写核心编排逻辑。它作为代理协调的“Hello
    World”，是智能调度所需的最小可行核心。
- en: Context
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: A system possesses idx_279f80f0a suite of specialized agents, each with distinct
    idx_2f6a5b24capabilities. Users interact with the system via natural language,
    which is often ambiguous, varying in phrasing, or containing irrelevant noise.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 一个系统拥有idx_279f80f0a一系列专门代理，每个代理都有独特的idx_2f6a5b24能力。用户通过自然语言与系统交互，这种语言通常含糊不清，措辞多变，或包含无关的噪音。
- en: Problem
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can the idx_f6e927b6system accurately map an unstructured, variable idx_c67bb1d2natural
    language request to the specific agent best suited to handle it, without "hallucinating"
    capabilities or relying on fragile keyword matching? Forces in the problem space
    include the following:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使idx_f6e927b6系统能够准确地将非结构化、可变的idx_c67bb1d2自然语言请求映射到最适合处理它的特定代理，而不会“幻觉”能力或依赖于脆弱的关键词匹配？问题空间中的力量包括以下方面：
- en: '**Ambiguity v****ersu****s** **p****recision**: User idx_0689cd01inputs are
    vague and idx_1d1bea26unstructured, but agent execution requires precise, structured
    commands.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模糊性**与**精确性**：用户idx_0689cd01的输入是模糊的、idx_1d1bea26非结构化的，但代理执行需要精确、结构化的命令。'
- en: '**Scalability v****ersu****s** **m****aintenance**: Adding a new agent should
    not require rewriting the central routing logic. The system must accommodate growing
    capabilities dynamically.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**与**维护性**：添加新的代理不应需要重写中央路由逻辑。系统必须动态地适应增长的能力。'
- en: '**Safety v****ersu****s** **h****allucination**: The system must ensure that
    a request is never routed to an agent that cannot handle it, avoiding the risk
    of an agent attempting to perform a task outside its guardrails.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性** **与** **幻觉**：系统必须确保请求永远不会路由到无法处理的代理，避免代理尝试执行其安全范围之外的任务的风险。'
- en: Solution
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Agent******R******outer*** pattern implements a two-step process. First,
    it uses an LLM with a strict schema to idx_5195af0fperform semantic intent extraction,
    translating the raw query into a structured "intent object" containing standardized
    actions (verbs) and resources (nouns). Second, it uses graph-constrained routing,
    querying a lookup table or knowledge graph to find which agent claims the capability
    to perform that specific action on that specific resource. If a valid path exists
    in the graph, the request is routed; otherwise, it is rejected as unsupported.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理** **路由器** **模式**实现了两步过程。首先，它使用具有严格模式的LLM进行语义意图提取，将原始查询转换为包含标准化动作（动词）和资源（名词）的结构化“意图对象”。其次，它使用图约束路由，查询查找表或知识图以找到哪个代理声称具有在该特定资源上执行该特定动作的能力。如果图中存在有效路径，则请求被路由；否则，它被拒绝为不受支持。'
- en: 'Example: Routing a compliance request'
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：路由合规请求
- en: 'A user asks: "Where is idx_8f3afa3bthe latest security audit for the Q3 finance
    project?" Here is the workflow:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 用户询问：“Q3财务项目的最新安全审计在哪里？”以下是工作流程：
- en: '**Intent** **e****xtraction**: The router analyzes the text and extracts a
    structured intent: `{Action: "Find", Resource: "Document", Params: {"type": "audit",
    "period": "Q3"}}`.'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**意图** **提取**：路由器分析文本并提取结构化意图：`{Action: "Find", Resource: "Document", Params:
    {"type": "audit", "period": "Q3"}}`。'
- en: '**Graph** **l****ookup**: The router queries its capability graph for the tuple
    (`Find`, `Document`).'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**图** **查找**：路由器查询其能力图以查找元组（`Find`，`Document`）。'
- en: '**Evaluation**:'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估**：'
- en: The `SalesAgent` is registered for (`Find`, `SalesReport`) → **Mismatch**.
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`SalesAgent`已注册为（`Find`，`SalesReport`）→ **不匹配**。'
- en: The `ComplianceAgent` is registered for (`Find`, `Document`) → **Match**.
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ComplianceAgent`已注册为（`Find`，`Document`）→ **匹配**。'
- en: '**Dispatch**: The router instantiates the `ComplianceAgent` and passes the
    parameters.'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**调度**：路由器实例化`ComplianceAgent`并传递参数。'
- en: '![Image 1](img/B33147_5_1.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图像1](img/B33147_5_1.png)'
- en: Figure 5.1 – The Agent Router pattern
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1 – 代理路由器模式
- en: Example implementation
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following idx_d0cf686aPython sample implementation demonstrates the ***Agent
    Router*** in action. This example uses Pydantic to define a rigorous 'vocabulary',
    a set of allowed actions and resources that the system understands.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 以下Python示例实现展示了**代理路由器**的实际应用。此示例使用Pydantic定义严格的“词汇”，这是一组系统理解的允许动作和资源。
- en: 'The logic is divided into two parts: first, we establish the `RoutingIntent`
    schema, which acts as the contract between the user''s request and the agent.
    Second, we build the `AgentRouter` class, which maintains a capability graph.
    This graph serves as the source of truth, mapping specific action-resource pairs
    to the specialized agent best suited for the task. In a production environment,
    an LLM would be used to extract these structured intents from the user''s natural
    language idx_a99ef2e0input before passing them to this routing logic.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑分为两部分：首先，我们建立`RoutingIntent`模式，它作为用户请求和代理之间的合同。其次，我们构建`AgentRouter`类，它维护一个能力图。此图作为事实来源，将特定的动作-资源对映射到最适合该任务的特定代理。在生产环境中，将使用LLM从用户的自然语言输入中提取这些结构化意图，然后再将它们传递给此路由逻辑。
- en: '[PRE0]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Consequences
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Decoupling**: The idx_3d7ee89eextraction layer doesn''t need to know agent
    names, and agents don''t need to parse natural language. They communicate via
    a structured "intent object."'
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解耦**：提取层不需要知道代理名称，代理也不需要解析自然语言。它们通过结构化的“意图对象”进行通信。'
- en: '**Scalability**: To add a new agent, you simply register its capabilities in
    the graph. The routing logic remains unchanged.'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：要添加新代理，您只需在图中注册其能力。路由逻辑保持不变。'
- en: '**Safety**: The graph acts as a whitelist. The router physically cannot send
    a "delete database" command to an agent unless that specific link is explicitly
    defined in the graph.'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**：图充当白名单。路由器实际上无法向代理发送“删除数据库”命令，除非该特定链接在图中明确定义。'
- en: '**Cons**:'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Latency:** The intent extraction step requires an LLM call, which adds latency
    before any real work begins.'
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：意图提取步骤需要LLM调用，这会在任何实际工作开始之前增加延迟。'
- en: '**Schema** **r****igidity:** If a user asks for something that doesn''t fit
    the pre-defined `Action`/`Resource` enums, the extraction may fail or degrade.'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式** **刚性**：如果用户请求的内容不符合预定义的 `Action`/`Resource` 枚举，提取可能会失败或降级。'
- en: Implementation guidance
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: The success of ***Agent Router*** relies heavily on the quality of your schema
    definition. When defining idx_1b599c7ayour actions (verbs) and resources (nouns),
    aim for a "Goldilocks" level of abstraction. If they are too granular (e.g., `FindPDF`,
    `FindWordDoc`), the routing graph becomes massive and hard to maintain. If they
    are too broad (e.g., `DoWork`), the router loses its ability to distinguish between
    agents effectively. A set of 10-20 canonical actions and resources is usually
    sufficient for most enterprise systems.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '***Agent Router*** 的成功在很大程度上依赖于您模式定义的质量。在定义 idx_1b599c7a动作（动词）和资源（名词）时，追求一个“金发姑娘”级别的抽象度。如果它们过于细化（例如，`FindPDF`，`FindWordDoc`），路由图会变得庞大且难以维护。如果它们过于宽泛（例如，`DoWork`），路由器将失去有效区分代理的能力。对于大多数企业系统来说，一组10-20个规范的动作和资源通常就足够了。'
- en: For the semantic intent extraction step, utilizing function calling (or tool
    use) modes in LLMs is highly recommended over simple prompt engineering. Function
    calling enforces a strict JSON output structure, which eliminates the parsing
    errors common with free-text responses.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 对于语义意图提取步骤，在LLM中利用函数调用（或工具使用）模式比简单的提示工程更推荐。函数调用强制执行严格的JSON输出结构，消除了与自由文本响应常见的解析错误。
- en: Finally, consider implementing a semantic cache at the routing layer. In enterprise
    environments, users often ask similar questions (e.g., "Show me the sales report").
    By embedding the user's query and checking a vector database for previous similar
    requests, you can bypass the LLM extraction step entirely for repeat queries,
    significantly reducing latency and cost.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，考虑在路由层实现语义缓存。在企业环境中，用户经常提出类似的问题（例如，“给我展示销售报告”）。通过嵌入用户的查询并检查向量数据库中的先前类似请求，您可以完全绕过LLM提取步骤，对于重复查询，这可以显著降低延迟和成本。
- en: The first idx_59aceac3and most consequential decision you will face is determining
    the control structure of your system. Just as a human organization needs a clear
    management style, whether hierarchical or flat, your agentic system requires a
    defined model for distributing work. This brings us to ***Task Delegation Frameworks***,
    the "operating systems" that govern flow and responsibility.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你将面临的第一 idx_59aceac3个也是最重要的决定是确定你系统的控制结构。正如人类组织需要一个明确的管理风格，无论是层级还是扁平，你的代理系统需要一个定义明确的模型来分配工作。这把我们带到了
    ***任务委派框架***，这些是“操作系统”，它们控制流程和责任。
- en: Task Delegation Frameworks
  id: totrans-97
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 任务委派框架
- en: A multi-agent system needs a high-level structure to govern how tasks are initiated,
    how they are assigned to agents, and how they are tracked to completion. Without
    a clear framework, it can be idx_78b868a0difficult to manage complex workflows,
    ensure tasks are routed to the correct specialists, and maintain overall system
    coherence.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 多代理系统需要一个高级结构来管理任务的启动、分配给代理以及如何跟踪到完成。没有明确的框架，可能难以管理复杂的流程，确保任务被路由到正确的专家，并保持整体系统的一致性。
- en: 'The core challenge lies in defining the overarching model for how work flows
    through the system: how tasks are assigned, who is accountable for progress, and
    how the final goal is ensured. Relying on ad hoc delegation often leads to dropped
    tasks, unclear responsibility, and architectures that are difficult to debug or
    scale.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 核心挑战在于定义工作如何在系统中流动的总体模型：任务如何分配，谁对进度负责，以及如何确保最终目标。依赖临时的委派往往会导致任务丢失，责任不明确，以及难以调试或扩展的架构。
- en: The ***Task Delegation*** pattern addresses this challenge by establishing the
    architectural model that dictates how agents are organized and how they receive
    their work. More than just a pattern for individual interactions, it functions
    as the system's "operating system," shaping the flow of control and communication.
    Choosing the right framework is one of the most important early decisions in designing
    a multi-agent system, since it sets the foundation for how work will be managed
    end to end.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '***任务委派*** 模式通过建立决定代理如何组织以及如何接收工作的架构模型来应对这一挑战。它不仅仅是一个个体交互的模式，它还作为系统的“操作系统”，塑造控制流和通信。选择正确的框架是设计多代理系统时最重要的早期决策之一，因为它为端到端的工作管理奠定了基础。'
- en: Different frameworks bring different trade-offs. A hierarchical framework provides
    clear lines of authority and is easier to monitor, making it a common choice for
    enterprise applications where auditability and predictability are key. In contrast,
    a decentralized framework offers greater flexibility and resilience and is better
    suited to creative or highly dynamic domains where the path to a solution cannot
    be predefined. The two most common approaches to task delegation are ***S******upervisor
    (******O******rchestrator)*** ***A******rchitecture*** and ***S******warm*** ***A******rchitecture***.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的框架带来不同的权衡。分层框架提供了清晰的权力线，更容易监控，因此在审计性和可预测性至关重要的企业应用中是一个常见的选择。相比之下，去中心化框架提供了更大的灵活性和弹性，更适合创意或高度动态的领域，在这些领域中，解决方案的路径无法预先定义。任务委派的最常见两种方法分别是**监督架构**（**Supervisor
    Architecture**）和**Swarm Architecture**。
- en: Supervisor Architecture (centralized orchestration)
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监督架构（集中式协调）
- en: '***S******upervisor*** ***A******rchitecture*** is a idx_42c4164fcore pattern
    for idx_f636388bmulti-agent systems where a single, central **o****rchestrator**
    **a****gent** manages and idx_b24d39e8directs the workflow of other specialized
    "worker" agents. This model mirrors a traditional hierarchical management structure,
    where the orchestrator receives a high-level goal, breaks it down into a sequence
    of sub-tasks, and delegates them to the appropriate workers. This pattern provides
    clear, top-down control and is ideal for structured, predictable business processes.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**监督架构**（**Supervisor Architecture**）是一种针对**多智能体系统**（**multi-agent systems**）的核心模式，其中单个中心**协调器**（**orchestrator**）智能体负责管理和**直接**（**directs**）其他专业“工作者”智能体的工作流程。这种模型反映了传统的分层管理结构，其中协调器接收一个高级目标，将其分解为一系列子任务，并将它们委派给适当的工人。这种模式提供了清晰的、自上而下的控制，非常适合结构化、可预测的业务流程。'
- en: This pattern represents a foundational approach for ensuring a systematic, auditable,
    and repeatable idx_650240b5process in enterprise applications. It shifts the burden
    of idx_1c8d1991managing complex workflows from a user to an autonomous AI system,
    while still maintaining a central point of control and oversight.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式代表了一种确保企业应用中系统化、可审计和可重复的**过程**（**process**）的基础方法。它将管理复杂工作流程的负担从用户转移到自主人工智能系统，同时仍然保持一个中央控制点和监督点。
- en: Context
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 背景
- en: A complex idx_5e0ea1fatask requires the execution of multiple, often sequential
    or conditional, steps. The system needs to ensure that the process is followed
    correctly, with a clear chain of command and responsibility.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 一个复杂的**任务**（**task**）需要执行多个步骤，通常是顺序的或条件性的。系统需要确保过程正确执行，具有清晰的指挥链和责任链。
- en: Problem
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can a idx_e2fcf76bmulti-agent system reliably and predictably execute a
    complex task that requires multiple steps and specialized capabilities? The system
    must manage the flow of data and control the order of operations without requiring
    constant human intervention. Forces in the problem space include the following:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使一个**多智能体系统**（**multi-agent system**）可靠且可预测地执行一个需要多个步骤和专门能力的复杂任务？系统必须管理数据流并控制操作顺序，而无需持续的人类干预。问题空间中的力量包括以下方面：
- en: '**Predictability v****ersus****f****lexibility**: A structured workflow is
    predictable and easy to manage, but it idx_4f54fb18may lack the flexibility to
    adapt to unexpected situations.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可预测性与灵活性**：结构化工作流程是可预测且易于管理的，但它可能缺乏适应意外情况的灵活性。'
- en: '**Centralization v****ersus****b****ottleneck**: Centralizing control simplifies
    governance and debugging but can create a single point of failure and a performance
    bottleneck.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集中化与瓶颈**：集中化控制简化了治理和调试，但可能创建一个单一故障点和性能瓶颈。'
- en: '**Specialization v****ersu****s** **c****oordination** **o****verhead**: Using
    specialized agents improves efficiency for individual tasks but increases the
    complexity of managing their handoffs and overall coordination.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业化与协调开销**：使用专业智能体可以提高单个任务的效率，但会增加管理其交接和整体协调的复杂性。'
- en: Solution
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Supervisor Architecture*** pattern solves this by appointing a single
    agent to handle all coordination. The idx_47fee25aorchestrator's primary function
    is to interpret the user's request, formulate a plan (either pre-programmed or
    dynamically generated), and then call upon the worker agents as needed. The orchestrator
    receives the output from each worker and uses it to decide the next step, ensuring
    that the overall goal is achieved in a controlled and deliberate manner.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '***Supervisor Architecture***模式通过指派单个代理处理所有协调来解决此问题。编排器的主要功能是解释用户的请求，制定计划（无论是预编程的还是动态生成的），然后根据需要调用工人代理。编排器接收每个工人代理的输出，并使用它来决定下一步，确保以受控和深思熟虑的方式实现整体目标。'
- en: 'Example: Centralized loan processing'
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：集中贷款处理
- en: 'A user idx_c7f1cfefsubmits a loan application to a `LoanOrchestratorAgent`.
    Here is the workflow:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 用户idx_c7f1cfef向`LoanOrchestratorAgent`提交贷款申请。以下是工作流程：
- en: '**Orchestration (****s****upervisor''s** **r****ole)**: The orchestrator receives
    the high-level task: "process this loan application."'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编排（****监督者的** **r****ole）**：编排器接收高级任务：“处理这个贷款申请。”'
- en: '**Delegation**: The orchestrator sends the application to a `DocumentValidationAgent`.'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**委派**：编排器将应用程序发送到`DocumentValidationAgent`。'
- en: '**Execution**: The `DocumentValidationAgent` performs its task and returns
    the result to the orchestrator.'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**执行**：`DocumentValidationAgent`执行其任务并将结果返回给编排器。'
- en: '**Conditional** **d****elegation**: Based on the result (e.g., documents are
    valid), the orchestrator then delegates the next step to a `CreditCheckAgent`.'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**条件** **d****elegation**：根据结果（例如，文档有效），编排器然后将下一步委托给`CreditCheckAgent`。'
- en: '**Completion**: The orchestrator receives the final risk score from a `RiskAssessmentAgent`,
    assembles a summary, and makes the final decision, completing the top-level task.'
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**完成**：编排器从`RiskAssessmentAgent`接收最终风险评分，组装摘要并做出最终决定，完成顶级任务。'
- en: '![Image 2](img/B33147_5_2.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![Image 2](img/B33147_5_2.png)'
- en: Figure 5.2 – Supervisor Architecture workflow
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.2 – Supervisor Architecture工作流程
- en: Example implementation
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following idx_6abc6cd5code illustrates a ***Supervisor*** Architecture applied
    to an enterprise loan approval process. In this Level 4 implementation, the `LoanOrchestratorAgent`
    serves as the central authority, managing the state and sequencing of the entire
    workflow. Notice that the orchestrator doesn't perform the validation or credit
    checks itself; instead, it maintains a team of specialized worker agents. This
    separation of concerns allows the supervisor to focus on high-level business logic
    and conditional branching, such as deciding to halt the process if a document
    is invalid, while the specialized agents handle the technical execution idx_a1385f23of
    individual tasks. This structure provides the predictability and clear audit trail
    required for highly regulated financial environments.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 以下idx_6abc6cd5代码展示了应用于企业贷款审批流程的***Supervisor***架构。在这个第4级实现中，`LoanOrchestratorAgent`作为中央权威，管理整个工作流程的状态和顺序。请注意，编排器本身不执行验证或信用检查；相反，它维护一支专业的工人代理团队。这种关注点的分离使得监督者可以专注于高级业务逻辑和条件分支，例如，如果文档无效，则决定停止流程，而专业的代理处理个别任务的执行。这种结构为高度监管的金融环境提供了可预测性和清晰的审计轨迹。
- en: '[PRE1]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Consequences
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Predictability**: The Supervisor model provides a clear, predictable flow,
    making idx_874dc0b9it simple to monitor, debug, and audit'
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可预测性**：Supervisor模型提供了一个清晰、可预测的流程，使得idx_874dc0b9it简单易监控、调试和审计'
- en: '**Governance**: Centralized control simplifies the enforcement of business
    rules and compliance requirements'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理**：集中控制简化了业务规则和合规要求的执行'
- en: '**Con****s**:'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Scalability**: The single orchestrator can become a performance bottleneck
    as the system scales'
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：随着系统规模的扩大，单个编排器可能会成为性能瓶颈'
- en: '**Single** **p****oint of** **f****ailure**: If the orchestrator fails, the
    entire workflow halts'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单点故障**：如果编排器失败，整个工作流程将停止'
- en: Implementation guidance
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实施指南
- en: When implementing a ***Supervisor Architecture***, the most critical design
    principle is to maintain a strict idx_28925a12separation of concerns to avoid
    creating a "God agent." The orchestrator should be solely responsible for coordination,
    that is, routing tasks, tracking state, and making decisions based on results,
    rather than executing domain-specific logic itself. All substantial work should
    be encapsulated within the specialized worker agents. This keeps the orchestrator
    lightweight and prevents the logic from becoming a tangled, unmanageable monolith.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现**管理者架构**时，最重要的设计原则是保持严格的关注点分离，以避免创建一个“全能代理”。协调器应仅负责协调，即路由任务、跟踪状态和根据结果做出决策，而不是执行特定领域的逻辑。所有实质性工作都应封装在专门的工人代理中。这使协调器保持轻量级，并防止逻辑变得混乱、难以管理。
- en: Reliability, in this centralized model, hinges on robust state management. Because
    the supervisor is a single point of failure, the system must implement state persistence,
    often referred to as "checkpointing," after every step of the workflow. Frameworks
    such as LangGraph are designed explicitly for this purpose, allowing the system
    to persist the graph state to a database. This ensures that if the orchestrator
    or the underlying infrastructure fails, the workflow can resume exactly where
    it left off without data loss.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个集中式模型中，可靠性依赖于稳健的状态管理。因为管理者是一个单点故障，系统必须在每个工作流程步骤之后实施状态持久化，通常称为“检查点”。LangGraph等框架专门为此目的而设计，允许系统将图状态持久化到数据库中。这确保了如果协调器或底层基础设施失败，工作流程可以精确地从上次停止的地方恢复，而不会丢失数据。
- en: Finally, communication between the supervisor and its workers must be deterministic.
    Relying on free-form natural language for handoffs is a recipe for instability.
    Instead, enforce strict output schemas (using tools such as Pydantic or JSON mode)
    so the orchestrator receives structured data it can programmatically parse. Furthermore,
    the supervisor should act as the central handler for faults; if a worker fails
    or hangs, the supervisor must possess the logic to retry the operation, route
    it to a backup agent, or fail gracefully, protecting the broader system from individual
    agent errors.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，管理者与其工人之间的通信必须是确定的。依赖自由形式的自然语言进行交接是不稳定的。相反，应强制执行严格的输出模式（使用Pydantic或JSON模式等工具），以便协调器接收可以程序化解析的结构化数据。此外，管理者应作为故障的中心处理者；如果工人失败或挂起，管理者必须具备重试操作、将其路由到备用代理或优雅失败的逻辑，以保护更广泛的系统免受单个代理错误的影响。
- en: 'While the centralized ***Supervisor*** ***A******rchitecture*** excels at manageability
    and auditability, it is not a one-size-fits-all solution. In scenarios where the
    environment is unpredictable or where the system must withstand the failure of
    individual components without halting, a rigid hierarchy can become a liability.
    To achieve true robustness and adaptability, we must explore the opposite end
    of the spectrum: a decentralized approach where control is distributed among peers.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然集中式的**管理者****架构**在可管理和可审计性方面表现出色，但它并不是万能的解决方案。在环境不可预测或系统必须承受单个组件的故障而不会停止的情况下，严格的层次结构可能成为一种负担。为了实现真正的鲁棒性和适应性，我们必须探索光谱的另一端：一种控制分布在同伴之间的分布式方法。
- en: Swarm Architecture (emergent decentralized coordination)
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 群体架构（自涌现的分布式协调）
- en: In the ***Swarm Architecture***, there is no central leader. Instead, agents
    operate as a peer-to-peer network, collaborating to solve a problem in an emergent,
    self-organizing fashion. A task is often idx_7db58692broadcast to the entire group
    of specialized agents, who then "bid" on or self-select the tasks based on their
    capabilities. The workflow emerges from the interactions idx_16783975between agents,
    rather than being explicitly dictated by a central supervisor.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在**群体架构**中，没有中央领导者。相反，代理作为对等网络运行，以自涌现、自组织的模式协作解决问题。一项任务通常被广播到整个专门的代理组，然后根据他们的能力“投标”或自我选择任务。工作流程从代理之间的交互中产生，而不是由中央管理者明确指定。
- en: This pattern is particularly well-suited for creative tasks, dynamic problem-solving,
    and environments that require high resilience. It harnesses the collective intelligence
    of the agents, allowing the system to adapt and evolve in real time.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式特别适合创造性任务、动态问题解决和需要高弹性的环境。它利用代理的集体智慧，使系统能够实时适应和进化。
- en: Context
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境
- en: A complex idx_ac6268f2task is dynamic and unstructured, or the system needs
    to be highly resilient and adaptive to change. A single point of failure is unacceptable,
    and the problem-solving process is better served by parallel, autonomous action
    rather than a rigid, sequential flow.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 一个复杂的idx_ac6268f2任务是动态的和非结构化的，或者系统需要高度适应变化，单个故障点是不可接受的，而问题解决过程更适合并行、自主的行动，而不是僵化的、顺序的流程。
- en: Problem
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can a idx_30d3ad99group of autonomous agents collaborate effectively to
    achieve a common goal without a central orchestrator? The system needs a mechanism
    for task discovery, handoff, and completion in a decentralized, resilient manner.
    Forces in the problem space include the following:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如何让一群自主代理在没有中央协调者的情况下有效地协作以实现共同目标？系统需要一个机制来以去中心化和弹性的方式发现任务、移交和完成。问题空间中的力量包括以下内容：
- en: '**Autonomy v****ersu****s** **c****oordination**: Maximizing agent autonomy
    improves resilience and adaptability, but idx_cbdc5ac0a lack of explicit coordination
    can lead to redundant work or misaligned goals'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自主性** **与** **协调**：最大化代理的自主性可以提高弹性和适应性，但idx_cbdc5ac0a缺乏明确的协调可能导致重复工作或目标不一致。'
- en: '**Scalability v****ersu****s** **o****verhead**: A decentralized network can
    scale horizontally without a bottleneck, but this requires an efficient communication
    protocol to manage inter-agent chatter.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性** **与** **开销**：去中心化网络可以水平扩展而不出现瓶颈，但这需要一个高效的通信协议来管理代理间的交流。'
- en: '**Emergent** **b****ehavior v****ersu****s** **p****redictability**: The self-organizing
    nature of a swarm can lead to highly creative and adaptive solutions, but the
    final outcome may be less predictable and harder to debug'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**涌现** **行为** **与** **可预测性**：群集的自组织特性可以导致高度创造性和适应性解决方案，但最终结果可能不太可预测，更难调试。'
- en: Solution
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Swarm Architecture*** pattern typically relies on a shared communication
    or task board. A task is posted, and any idx_c7b437b8agent can "pull" the task
    from the board when they are ready to work on it. Once an agent completes its
    part, it updates the task's state on the board, making it available for the next
    specialized agent in the workflow. This allows for asynchronous, parallel processing
    and removes the dependency on a single point of control.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 群集架构模式通常依赖于共享的通信或任务板。任务被发布，任何idx_c7b437b8代理都可以在他们准备好工作时从板上“拉取”任务。一旦代理完成其部分，它就会在板上更新任务的状态，使其对工作流程中的下一个专业代理可用。这允许异步、并行处理，并消除了对单一控制点的依赖。
- en: 'Example: Decentralized content creation'
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：去中心化内容创作
- en: 'A task to "write idx_fd4fb711a blog post about solar power" is sent to a swarm
    of agents. Here is the workflow:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 一个关于“撰写关于太阳能的idx_fd4fb711a博客文章”的任务被发送到一个代理群。以下是工作流程：
- en: '**Task** **b****roadcast**: The task is posted on a shared task board.'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**任务** **广播**：任务被发布在一个共享的任务板上。'
- en: '**Self-****s****election**: A `ResearchAgent` polls the board, recognizes the
    task''s status (`new`), and self-selects it.'
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自我选择**：一个`ResearchAgent`检查板，识别任务的状态（`new`），并自行选择它。'
- en: '**Execution** **and****u****pdate**: The `ResearchAgent` gathers facts, updates
    the task with its findings, and changes its status to `researched`.'
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**执行** **和** **更新**：`ResearchAgent`收集事实，将发现更新到任务中，并将状态更改为`researched`。'
- en: '**Handoff**: A `DraftingAgent` sees the "researched" status, pulls the task,
    writes the draft, and updates the status to `drafted`.'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**移交**：一个`DraftingAgent`看到“已研究”状态，提取任务，撰写草案，并将状态更新为`drafted`。'
- en: '**Completion**: An `EditorAgent` performs the final proofreading and marks
    the task as `complete``.`'
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**完成**：一个`EditorAgent`进行最终校对，并将任务标记为`complete```。'
- en: '![Image 3](img/B33147_5_3.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![图像 3](img/B33147_5_3.png)'
- en: Figure 5.3 – Swarm Architecture workflow
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.3 – 群集架构工作流程
- en: Example implementation
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sample implementation demonstrates a ***Swarm Architecture***,
    highlighting the shift from idx_91a2ef36top-down command to emergent, decentralized
    coordination at Level 6\. In this model, agents operate as peers within a network,
    utilizing a `shared_task_board` to manage the lifecycle of a project.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例实现演示了一个***群集架构***，突出了从idx_91a2ef36自上而下的命令到第6级涌现的、去中心化协调的转变。在这个模型中，代理作为网络中的对等体操作，利用`shared_task_board`来管理项目的生命周期。
- en: Rather than being directed by a supervisor, each agent, such as the `ResearchAgent`
    or `DraftingAgent`, independently monitors the state of the task board. When an
    agent identifies a task status that matches its specialized capability, it 'claims'
    the work, executes its logic, and updates the shared state. This decoupled, pull-based
    interaction model allows the system to remain highly resilient and flexible, as
    the workflow evolves naturally through local agent decisions rather than a static,
    pre-programmed plan.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 与由主管指导不同，每个代理，例如`ResearchAgent`或`DraftingAgent`，独立监控任务板的状态。当代理识别到与其专业能力相匹配的任务状态时，它会“认领”这项工作，执行其逻辑，并更新共享状态。这种解耦的、基于拉的交互模型使得系统在流程自然通过本地代理决策而不是静态、预编程计划演变时，能够保持高度弹性和灵活。
- en: '[PRE2]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Consequences
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s:**'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Resilience**: The idx_783a3cd9lack of a central controller means there is
    no single point of failure. The system can continue to operate even if some agents
    go offline.'
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弹性**：缺乏中央控制器意味着没有单点故障。即使某些代理离线，系统仍可继续运行。'
- en: '**Scalability**: The peer-to-peer nature allows the system to scale horizontally
    by simply adding more agents to the swarm.'
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：对等性质允许系统通过简单地向蜂群添加更多代理来实现水平扩展。'
- en: '**Con****s:**'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Debuggability**: The emergent, non-linear flow of tasks can make the system''s
    behavior difficult to debug and predict.'
  id: totrans-168
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可调试性**：任务的非线性流动可能导致系统行为难以调试和预测。'
- en: '**Governance**: Enforcing business rules or ensuring compliance can be challenging
    without a central authority.'
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理**：在没有中央权威的情况下，执行业务规则或确保合规可能具有挑战性。'
- en: Implementation guidance
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实施指南
- en: When designing a multi-agent system, a good starting point is to embrace a centralized
    approach. For idx_c04b4b0bmost enterprise applications, a ***Supervisor Architecture***
    is easier to build, debug, and govern, as it provides clear lines of responsibility
    and a central point for monitoring.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 设计多代理系统时，一个好的起点是采用集中式方法。对于大多数企业应用，**主管架构**更容易构建、调试和治理，因为它提供了清晰的职责线和监控的中心点。
- en: However, some applications may benefit from decentralization over time. ***Swarm
    Architecture*** systems are more resilient to failure and adaptive to changing
    conditions, making them a natural fit for dynamic environments where agent autonomy
    is essential. In practice, many complex systems adopt a hybrid model. A top-level
    orchestrator manages the overall business process but delegates large sub-goals
    to self-organizing "swarms" or "crews" of agents, which handle the details of
    execution among themselves. This balance combines the clarity of central control
    with the adaptability of distributed decision-making.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一些应用可能随着时间的推移从去中心化中受益。**蜂群架构**系统对故障具有更强的抵抗力和对变化条件的适应性，使它们非常适合需要代理自主权的动态环境。在实践中，许多复杂系统采用混合模型。顶级协调器管理整体业务流程，但将大型子目标委派给自我组织的“蜂群”或“船员”代理，这些代理之间自行处理执行细节。这种平衡结合了中央控制的清晰性和分布式决策的适应性。
- en: The following table provides a direct comparison of the characteristics of these
    two primary models.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 下表提供了这两种主要模型特性的直接比较。
- en: '| **Feature** | **Supervisor Architecture (Centralized)** | **Swarm Architecture
    (Decentralized)** |'
  id: totrans-174
  prefs: []
  type: TYPE_TB
  zh: '| **特性** | **主管架构（集中式）** | **蜂群架构（去中心化）** |'
- en: '| --- | --- | --- |'
  id: totrans-175
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| **Control** **f****low** | Hierarchical: a single orchestrator delegates
    tasks to worker agents. | Peer-to-peer: agents self-select or pass tasks to each
    other. |'
  id: totrans-176
  prefs: []
  type: TYPE_TB
  zh: '| **控制流程** | 层次化：单个协调器将任务委派给工作代理。 | 对等：代理自行选择或将任务传递给其他代理。 |'
- en: '| **Coordination** | Explicit and top-down: the supervisor manages the workflow.
    | Emergent and bottom-up: coordination arises from local interactions. |'
  id: totrans-177
  prefs: []
  type: TYPE_TB
  zh: '| **协调** | 显式和自上而下：主管管理工作流程。 | 自发和自下而上：协调源于本地交互。 |'
- en: '| **Modularity** | High: specialist agents can be easily added or replaced
    under the supervisor. | High: agents are autonomous and can be added or removed
    from the swarm. |'
  id: totrans-178
  prefs: []
  type: TYPE_TB
  zh: '| **模块化** | 高：在主管下可以轻松添加或替换专业代理。 | 高：代理是自主的，可以从蜂群中添加或删除。 |'
- en: '| **Key** **b****enefit** | Predictability and clear oversight. Easier to debug
    and govern. | Resilience and adaptability. No single point of failure. |'
  id: totrans-179
  prefs: []
  type: TYPE_TB
  zh: '| **主要好处** | 可预测性和清晰的监督。更容易调试和治理。 | 弹性和适应性。没有单点故障。 |'
- en: '| **Key** **d****rawback** | The supervisor can become a performance bottleneck
    or a single point of failure. | Can be difficult to govern and debug. Overall
    behavior can be less predictable. |'
  id: totrans-180
  prefs: []
  type: TYPE_TB
  zh: '| **关键** **d****rawback** | 监督者可能成为性能瓶颈或单一故障点。 | 可能难以治理和调试。整体行为可能不太可预测。 |'
- en: '| **Best** **f****or** | Structured business processes, workflows with clear
    steps (e.g., loan processing). | Creative tasks, dynamic problem-solving, environments
    requiring high resilience. |'
  id: totrans-181
  prefs: []
  type: TYPE_TB
  zh: '| **最佳** **f****or** | 结构化业务流程，具有明确步骤的工作流程（例如，贷款处理）。 | 创造性任务，动态问题解决，需要高弹性的环境。
    |'
- en: Table 5.2 – Comparison of task delegation architectures
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 表5.2 – 任务委派架构比较
- en: Choosing between idx_16076439a centralized ***Supervisor*** and a decentralized
    ***S******warm*** establishes the high-level "operating system" for your agents;
    it defines the flow of authority. However, real-world problems often require more
    specific structural arrangements to manage data and interactions effectively.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在idx_16076439a集中式***监督者***和分布式***S******warm***之间做出选择，为你的代理建立了高级的“操作系统”；它定义了权力的流动。然而，现实世界的问题通常需要更具体的结构安排来有效地管理和交互数据。
- en: For instance, how do you handle a problem where the solution must evolve incrementally?
    Or, how do you find the best agent for a task when capabilities fluctuate? To
    solve these specific challenges, we turn to ***A******gent Composition Topologies***.
    These architectural patterns define the structural relationships between agents.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如何处理解决方案必须逐步演变的问题？或者，当能力波动时，如何找到最适合任务的代理？为了解决这些特定挑战，我们转向***代理组成拓扑***。这些架构模式定义了代理之间的结构关系。
- en: Agent Composition Topologies
  id: totrans-185
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理组成拓扑
- en: While the task idx_1e08cedddelegation frameworks described define the general
    "rules of engagement" (centralized versus decentralized), specific composition
    topologies describe the structural arrangement of agents and data in more detail.
    These patterns address specific challenges related to knowledge convergence, market-based
    task allocation, and fault tolerance.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的idx_1e08cedddelegation框架定义了通用的“参与规则”（集中式与分布式），而具体的组成拓扑则更详细地描述了代理和数据在结构上的排列。这些模式解决了与知识收敛、基于市场的任务分配和容错性相关的特定挑战。
- en: Blackboard Knowledge Hub
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 黑板知识中心
- en: In complex idx_44b76688problem-solving idx_054e8636scenarios, multiple specialized
    agents must contribute partial or uncertain facts to a developing solution. The
    task evolves dynamically as new information arrives, requiring a system that supports
    convergence toward a solution and strict provenance of information.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在复杂的idx_44b76688问题解决idx_054e8636场景中，多个专业代理必须向正在形成的解决方案贡献部分或不确定的事实。随着新信息的到来，任务会动态演变，需要支持向解决方案收敛的系统以及严格的信息来源。
- en: Context
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 背景
- en: The system idx_8333f3feinvolves ill-defined or complex problems where no single
    agent possesses all the necessary knowledge to solve the entire problem. The solution
    requires the incremental accumulation of contributions from various "experts,"
    and the order in which these experts contribute cannot be fully predetermined.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 该系统idx_8333f3fe涉及定义不明确或复杂的问题，其中没有任何单个代理拥有解决整个问题的所有必要知识。解决方案需要从各种“专家”的增量贡献，而这些专家的贡献顺序不能完全预先确定。
- en: Problem
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can idx_ea5eb1c3multiple independent agents collaborate on a developing
    solution without direct, tightly coupled communication channels that would become
    unmanageable at scale? Forces in the problem space include the following:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 如何在idx_ea5eb1c3多个独立的代理之间协作，以形成一个正在发展的解决方案，而不需要直接、紧密耦合的通信渠道，这些渠道在规模扩大时将变得难以管理？问题空间中的力量包括以下方面：
- en: '**Shared** **u****nderstanding v****ersu****s** **r****ace** **c****onditions**:
    Agents need a unified view of the problem idx_f7ba5defstate, but simultaneous
    updates can lead to conflicts'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**共享** **u****nderstanding v****ersu****s** **r****ace** **c****onditions**：代理需要有一个统一的关于问题idx_f7ba5def状态的观点，但同时更新可能导致冲突。'
- en: '**Openness to** **c****ontributions v****ersu****s** **q****uality** **c****ontrol**:
    The system needs to be open to contributions from various experts but must filter
    out low-quality or hallucinatory data'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Openness to** **c****ontributions v****ersu****s** **q****uality** **c****ontrol**：系统需要接受来自各种专家的贡献，但必须过滤掉低质量或幻觉数据。'
- en: '**Global** **c****onsistency v****ersu****s** **a****gent** **a****utonomy**:
    Agents need to act independently, but the final solution must be globally consistent'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全局** **c****onsistency v****ersu****s** **a****gent** **a****utonomy**：代理需要独立行动，但最终解决方案必须全局一致。'
- en: Solution
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Blackboard Knowledge Hub*** pattern implements a central repository,
    the Blackboard, that holds idx_ce9f0cc9typed, versioned facts and hypotheses.
    Knowledge sources (agents) do not communicate directly; instead, they post updates
    to the Blackboard. A controller arbitrates the process phases (post → evaluate
    → integrate), ensuring that contributions are validated and that the solution
    converges logically.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '***黑板知识库***模式实现了一个中央存储库，即黑板，它持有类型化、版本化的“事实”和“假设”。知识源（代理）不直接通信；相反，它们将更新发布到黑板。一个控制器仲裁过程阶段（发布→评估→整合），确保贡献得到验证，并且解决方案逻辑上收敛。'
- en: 'Example: Collaborative medical diagnosis'
  id: totrans-198
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：协同医疗诊断
- en: 'A patient idx_ad9b195fpresents with complex, ambiguous symptoms. Here is the
    workflow:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 一位患者出现复杂、模糊的症状。以下是工作流程：
- en: '**Posting**: A `SymptomAnalysisAgent` posts `Patient has fever and rash` to
    the Blackboard.'
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**发布**：`SymptomAnalysisAgent`将`Patient has fever and rash`发布到黑板。'
- en: '**Triggering**: Seeing "rash," the `DermatologyAgent` triggers, analyzes the
    image, and posts `Rash indicates potential viral infection (Confidence: 0.8)`.'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**触发条件**：看到“皮疹”，`DermatologyAgent`被触发，分析图像，并发布`Rash indicates potential viral
    infection (Confidence: 0.8)`。'
- en: '**Refining**: The `VirologyAgent` reads this hypothesis and posts a request
    for `Blood Test Results`'
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**细化**：`VirologyAgent`读取这个假设，并发布一个请求`Blood Test Results`。'
- en: '**Convergence**: The controller evaluates the collective facts until a `DiagnosisAgent`
    synthesizes the final diagnosis with sufficient confidence.'
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收敛**：控制器评估集体事实，直到`DiagnosisAgent`以足够的置信度综合出最终诊断。'
- en: Example implementation
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following code provides a foundational implementation of the ***Blackboard
    Knowledge Hub*** pattern. This architecture is specifically designed for complex,
    non-linear problems, such as medical idx_721daf9adiagnosis or fraud detection,
    where a solution emerges through the incremental contributions of multiple specialized
    experts.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码提供了***黑板知识库***模式的基石实现。这种架构专门设计用于复杂、非线性问题，如医疗诊断或欺诈检测，解决方案通过多个专业专家的增量贡献而产生。
- en: In this implementation, the `Blackboard` class acts as a centralized, thread-safe
    repository for 'facts' and 'hypotheses.' Notice that agents do not communicate
    with each other directly; instead, they 'post' their findings to the blackboard
    with associated confidence scores and timestamps. This structure allows a separate
    controller to arbitrate the problem-solving process, ensuring that the system
    converges toward a globally consistent solution while maintaining a complete,
    auditable 'chain of thought' in the blackboard's history.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实现中，`Blackboard`类充当一个集中式、线程安全的“事实”和“假设”存储库。请注意，代理之间不直接通信；相反，它们将带有相关置信度和时间戳的发现“发布”到黑板上。这种结构允许一个单独的控制器仲裁问题解决过程，确保系统向全局一致解收敛，同时在黑板的历史中保持完整的、可审计的“思维链”。
- en: '[PRE3]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![Image 4](img/B33147_5_4.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图像4](img/B33147_5_4.png)'
- en: Figure 5.4 – Blackboard topology
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.4 – 黑板拓扑
- en: Consequences
  id: totrans-210
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**:'
- en: '**Flexibility**: Excellent for ill-posed problems where the path forward is
    unclear idx_64f36953and requires iterative contributions'
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：非常适合不明确的问题，前进路径不明确，需要迭代贡献'
- en: '**Auditability**: The append-only log provides a clear history of how the solution
    evolved, which is crucial for explaining the "chain of thought" of the system'
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可审计性**：只读日志提供了解决方案演变的清晰历史，这对于解释系统的“思维链”至关重要'
- en: '**Cons**:'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**:'
- en: '**Latency**: The central writing and evaluation steps introduce latency, making
    it slower than direct message passing'
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：中央写入和评估步骤引入了延迟，使其比直接消息传递慢'
- en: '**Bottleneck**: The controller can become a throughput bottleneck if the blackboard
    is not properly sharded or indexed'
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**瓶颈**：如果黑板没有正确分片或索引，控制器可能会成为吞吐量瓶颈'
- en: Implementation guidance
  id: totrans-217
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现指南
- en: This pattern is best applied when you have a large number of "weak" experts
    (specialized but limited agents) or when there is a critical need for traceable
    convergence. However, avoid using it idx_67c3c7dffor low-latency, simple tool
    tasks, as the overhead of managing the blackboard state outweighs the benefits.
    To maintain hygiene, implement a "cleanup strategy" or a "forgetting mechanism"
    to prune old or invalidated facts; otherwise, the blackboard can become a noisy
    scratchpad that degrades agent performance.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式最适合当你有大量“弱”专家（专业但有限的代理）或当有对可追溯收敛的迫切需求时。然而，避免在低延迟、简单的工具任务中使用它，因为管理黑板状态的开销超过了其好处。为了保持卫生，实施“清理策略”或“遗忘机制”来修剪旧或无效的事实；否则，黑板可能会变成一个嘈杂的草稿本，降低代理性能。
- en: 'The ***Blackboard*** pattern focuses on how a collective of agents can incrementally
    converge on a solution through a shared knowledge state. However, when the primary
    challenge shifts from *how to solve a problem* to *who is best equipped to handle
    a specific task* within a fluctuating pool of specialists, we move from a central
    knowledge hub to a dynamic, market-driven approach: the ***Contract-Net Marketplace***.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '**黑板**模式关注的是一群代理如何通过共享知识状态逐步收敛到解决方案。然而，当主要挑战从“如何解决问题”转变为在波动池中的专家中“谁最适合处理特定任务”时，我们就从中心知识中心转向了动态、市场驱动的做法：**合同网市场**。'
- en: Contract-Net Marketplace (Mediator + Bids)
  id: totrans-220
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合同网市场（调解员 + 投标）
- en: A system idx_4c44bf9afaces tasks that vary widely in complexity and domain.
    The idx_59b0a506available capabilities are heterogeneous and dynamic; agents may
    come online or go offline, or their load may vary. You need to select the best-fit
    agent at runtime rather than hardcoding the assignment.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 一个系统面临各种复杂性和领域广泛的任务。可用的能力是异构和动态的；代理可能会上线或离线，或者它们的负载可能会变化。你需要运行时选择最佳匹配的代理，而不是硬编码分配。
- en: Context
  id: totrans-222
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文
- en: You are idx_dd4d551coperating in a distributed environment with a diverse pool
    idx_a15b732dof agents. The capabilities of these agents overlap, but their availability,
    cost, and performance characteristics vary dynamically. Static routing logic is
    brittle and inefficient because it cannot account for real-time load or specific
    task nuances.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 你在一个分布式环境中操作，拥有多样化的代理池。这些代理的能力重叠，但它们的可用性、成本和性能特征动态变化。静态路由逻辑是脆弱且低效的，因为它无法考虑实时负载或特定任务的细微差别。
- en: Problem
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题
- en: 'How do you idx_fe4b7e72assign a task to the most suitable agent when the optimal
    choice depends on dynamic factors such as availability, cost, and confidence,
    which are only known at runtime? Forces in the problem space include the following:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 当最佳选择取决于动态因素，如可用性、成本和信心，这些只有在运行时才知道时，如何将任务分配给最合适的代理？问题空间中的力量包括以下内容：
- en: '**Specialization v****ersu****s** **r****outing** **o****verhead**: You idx_dcaa6015want
    highly specialized agents, but routing to them manually is complex'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业化与路由开销**：你想要高度专业化的代理，但手动将任务路由到它们是复杂的'
- en: '**Competitive** **b****idding v****ersu****s** **c****oordination** **c****ost**:
    Bidding ensures the best agent gets the job, but the auction process takes time
    and compute'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**竞争性投标与协调成本**：投标确保最佳代理获得任务，但拍卖过程需要时间和计算资源'
- en: '**Exploration v****ersu****s** **service****-****level agreements** **(SLA****s****)**:
    You want to explore the best options without missing execution deadlines.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索与服务水平协议（SLA）**：你想要探索最佳选项，同时不错过执行截止日期。'
- en: Solution
  id: totrans-229
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案
- en: Implement a ***Contract-Net Protocol***, a market-based negotiation mechanism.
    A solicitor (or manager) broadcasts task announcements to potential workers. Bidders
    (agents) evaluate the announcement idx_32c418adand respond with a formal bid containing
    their capability, cost, estimated time of arrival (ETA), and confidence score.
    The solicitor then acts as an awarder, assigning the task to the agent with the
    highest utility score.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 实施一个**合同网协议**，一种基于市场的谈判机制。一个律师（或经理）向潜在工作者广播任务公告。投标人（代理）评估公告并正式投标，包含他们的能力、成本、预计到达时间（ETA）和信心分数。然后律师作为颁奖者，将任务分配给效用分数最高的代理。
- en: 'Example: Selecting a cloud provider agent'
  id: totrans-231
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：选择云提供商代理
- en: A user idx_4536617awants to train a large model but has a strict budget. Here
    is the workflow.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 一个用户想要训练一个大模型，但预算很严格。以下是工作流程。
- en: '**Announcement:** The `TrainingSolicitor` broadcasts: `"Task: Train Model X.
    Constraint: Max cost $100."`'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**公告**：`TrainingSolicitor` 广播：“任务：训练模型 X。约束：最大成本 $100。”`'
- en: '**Bidding**:'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**出价**：'
- en: '`AWS_Agent` bids: `$90, ETA 2 hours`.'
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`AWS_Agent` 报价：`$90，预计时间 2 小时`。'
- en: '`Azure_Agent` bids: `$85, ETA 2.5 hours`.'
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Azure_Agent` 报价：`$85，预计时间 2.5 小时`。'
- en: '`OnPrem_Agent` bids: `$10, ETA 12 hours`.'
  id: totrans-237
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`OnPrem_Agent` 报价：`$10，预计时间 12 小时`。'
- en: '**Award:** The solicitor weighs time versus. money and awards the contract
    to the `AWS_Agent` for the best balance.'
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**奖励**：请求者权衡时间和金钱，将合同授予 `AWS_Agent` 以获得最佳平衡。'
- en: Example implementation
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sample implementation illustrates the ***Contract-Net Marketplace***
    pattern, highlighting idx_627c0871how Level 6 systems can move beyond hardcoded
    logic to a dynamic, market-driven model for task assignment.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例实现说明了 ***合同网市场*** 模式，突出展示了 idx_627c0871 如何使第 6 级系统超越硬编码逻辑，转向动态、市场驱动的任务分配模型。
- en: 'The code defines two primary roles: the `Solicitor`, which manages the auction
    process, and the `BidderAgent`, which represents a specialized resource. By broadcasting
    an announcement and evaluating incoming bids based on a utility function, such
    as balancing model confidence against compute cost, the system ensures that every
    task is handled by the agent best suited for the specific requirements at that
    exact moment. This decentralized negotiation makes the system highly adaptive
    to enterprise environments where agent availability and API costs fluctuate in
    real time.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 代码定义了两个主要角色：`Solicitor`，负责管理拍卖过程，以及 `BidderAgent`，代表一个专业资源。通过广播公告并基于效用函数评估传入的报价，例如平衡模型置信度与计算成本，系统确保每个任务都由最适合当时特定要求的代理处理。这种去中心化的谈判使系统高度适应企业环境，其中代理的可用性和
    API 成本实时波动。
- en: '[PRE4]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![Image 5](img/B33147_5_5.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![图像 5](img/B33147_5_5.png)'
- en: Figure 5.5 – Contract-Net Protocol
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.5 – 合同网协议
- en: Consequences
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Adaptive selection**: The system dynamically adapts to changing agent availability
    idx_660bacd7and capabilities without code changes'
  id: totrans-247
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自适应选择**：系统无需代码更改即可动态适应代理可用性和功能的变化'
- en: '**High utilization**: Decouples the requester from the provider, ensuring work
    flows to the agents best suited for it at that moment'
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高利用率**：将请求者与提供者解耦，确保工作流向最适合该任务的代理'
- en: '**Cons**:'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Auction latency**: The negotiation process introduces overhead before work
    even begins'
  id: totrans-250
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**拍卖延迟**：谈判过程在开始工作之前引入了开销'
- en: '**Risk of gaming**: Without incentives for truthful bidding, agents may overstate
    their confidence to win tasks'
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**游戏风险**：如果没有对真实出价的激励，代理可能会夸大其信心以赢得任务'
- en: Implementation guidance
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实施指南
- en: Use this pattern when you have a large, variable toolset or when optimizing
    for dynamic factors such idx_c6fbe02das cost or speed. However, avoid it for fixed,
    predictable workflows where static routing (such as intent-aware routing) is simpler
    and faster. To prevent infinite waiting, the solicitor must enforce strict deadlines
    for receiving bids. Additionally, consider implementing a "reputation score" for
    bidders to penalize agents that win contracts but fail to deliver quality results.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有一个大型的、可变工具集，或者当优化动态因素，如 idx_c6fbe02das 成本或速度时，请使用此模式。然而，对于固定、可预测的工作流程，静态路由（如意图感知路由）更简单、更快，因此应避免使用此模式。为了防止无限等待，请求者必须对收到报价的截止日期进行严格规定。此外，考虑为出价者实施“声誉评分”，以惩罚那些赢得合同但未能提供优质结果的代理。
- en: Market-based allocation is ideal for optimizing efficiency and cost in dynamic
    environments where multiple specialists are available. However, in enterprise
    systems where agents perform high-stakes or risky actions, efficiency must be
    balanced with absolute stability and fault tolerance. This leads us to a pattern
    borrowed from the world of highly available distributed systems, the ***Supervision
    Tree with Guarded Capabilities***.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 基于市场的分配在优化动态环境中效率和高成本方面是理想的，其中多个专家可用。然而，在企业系统中，代理执行高风险或危险操作时，效率必须与绝对稳定性和容错性相平衡。这使我们想到了从高度可用的分布式系统领域借用的一种模式，即
    ***带有受保护功能的监督树***。
- en: Supervision Tree with Guarded Capabilities
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有受保护功能的监督树
- en: The ***Supervisi******on Tree with Guarded Capabilities*** is an architectural
    pattern designed to contain idx_2d6952d0failures and enforce security boundaries
    idx_bf05f8f6within a multi-agent system. Instead of allowing a single agent's
    error to propagate and crash the entire application, this pattern organizes agents
    into a hierarchical tree where supervisors are responsible for monitoring the
    health and behavior of their subordinates. It combines the 'let it crash' philosophy
    of the "Actor Model" with strict capability guarding, ensuring that agents only
    have access to the specific tools required for their specific role, while providing
    a structured mechanism for automatic recovery and self-healing.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**带有受保护能力的监督树*** 是一种旨在包含 idx_2d6952d0故障并强制执行多代理系统中的安全边界的架构模式。它不是允许单个代理的错误传播并使整个应用程序崩溃，而是将代理组织成一个层次树，其中监督者负责监控其下属的健康和行为。它结合了“让它崩溃”的“演员模型”哲学和严格的权限保护，确保代理只能访问其特定角色所需的特定工具，同时提供了一个结构化的自动恢复和自我修复机制。'
- en: Context
  id: totrans-257
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文
- en: This pattern idx_e74aca6dis derived from the actor model (famous in Erlang and
    Akka systems) and applied to agentic AI. It is essential in systems where many
    agents perform autonomous, potentially risky tool calls, such as executing generated
    code, scraping web pages, or interacting with unstable external APIs.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模式 idx_e74aca6dis 来自于演员模型（在 Erlang 和 Akka 系统中闻名）并将其应用于代理人工智能。在许多代理执行自主、可能存在风险的工具调用（如执行生成的代码、抓取网页或与不稳定的外部
    API 交互）的系统中，这一点至关重要。
- en: Problem
  id: totrans-259
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can idx_78af6052the system contain failures from autonomous agents without
    crashing the entire application, while still allowing them enough freedom to operate?
    Forces in the problem space include the following:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如何在不会使整个应用程序崩溃的同时，允许自主代理有足够的自由操作来控制来自自主代理的故障？问题空间中的力量包括以下方面：
- en: '**Safety v****ersu****s** **v****elocity**: We want agents to act autonomously
    and fast, but an unhandled idx_8e112486exception in a sub-agent can propagate
    up and kill the main orchestrator'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全 vs. 速度**：我们希望代理能够自主且快速地行动，但一个子代理中未处理的 idx_8e112486异常可能会向上传播并杀死主协调器'
- en: '**Isolation v****ersu****s** **c****oordination**: Agents need to share data
    to collaborate, but if they share memory directly, a corrupted state in one agent
    can infect others'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隔离 vs. 协调**：代理需要共享数据以进行协作，但如果它们直接共享内存，一个代理中的损坏状态可能会感染其他代理'
- en: '**Developer** **a****gility v****ersu****s** **p****olicy** **e****nforcement**:
    Developers need to add new capabilities quickly, but granting every agent full
    system access violates the principle of least privilege'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发者敏捷性 vs. 政策执行**：开发者需要快速添加新功能，但授予每个代理完整的系统访问权限违反了最小权限原则'
- en: Solution
  id: totrans-264
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案
- en: Implement idx_453745e3a ***Supervision Tree*** where agents are organized hierarchically.
    Supervisors are specialized agents responsible solely for managing the lifecycle
    of their children (worker agents). If a child crashes or violates a policy, the
    supervisor detects the failure and applies a recovery strategy (e.g., restart
    the child). Capabilities idx_39121ab7are granted per subtree, ensuring that a
    "Research" branch cannot access "Billing" tools.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 实现 idx_453745e3a **监督树**，其中代理按层次组织。监督者是专门负责管理其子代（工作代理）生命周期的代理。如果一个子代崩溃或违反了政策，监督者会检测到故障并应用恢复策略（例如，重新启动子代）。权限
    idx_39121ab7 按子树授予，确保“研究”分支无法访问“账单”工具。
- en: 'Example: Resilient web scraper'
  id: totrans-266
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：弹性网页抓取器
- en: '**Spawn**: The `Root Supervisor` spawns a `ResearchSupervisor`, which spawns
    three `ScraperAgents`.'
  id: totrans-267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Spawn**：`Root Supervisor` 生成一个 `ResearchSupervisor`，该 `ResearchSupervisor`
    生成三个 `ScraperAgents`。'
- en: '**Failure**: One `ScraperAgent` encounters idx_1ca4a2a4a blocking captcha and
    throws a fatal error (or gets stuck in a loop).'
  id: totrans-268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**故障**：一个 `ScraperAgent` 遇到 idx_1ca4a2a4a 阻塞验证码并抛出致命错误（或陷入循环）。'
- en: '**Detection**: The `ResearchSupervisor` detects the crash signal.'
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**检测**：`ResearchSupervisor` 检测到崩溃信号。'
- en: '**Recovery**: Following a "one-for-one" strategy, the supervisor restarts only
    the failed `ScraperAgent` with a fresh state, leaving the others running. The
    failure is contained.'
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**恢复**：遵循“一对一”策略，监督者仅重新启动具有新鲜状态的失败的 `ScraperAgent`，而其他代理继续运行。故障被控制住了。'
- en: Example implementation
  id: totrans-271
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sample code illustrates the ***Supervision Tree with Guarded Capabilities***
    pattern, focusing idx_e44ee8a1on how a system can isolate risks and automate recovery.
    In this implementation, the `SupervisorAgent` serves as a lifecycle manager that
    explicitly defines the boundaries for each worker. By providing a child agent
    with only a limited subset of tools at initialization, the system ensures that
    a compromise or failure in one branch does not expose sensitive capabilities in
    another. This structure, coupled with a defined recovery strategy such as "`ONE_FOR_ONE`,"
    allows the system to remain resilient and self-healing even when dealing with
    unpredictable external tools.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例代码说明了 ***带有守卫能力的监督树*** 模式，重点关注系统如何隔离风险和自动化恢复。在此实现中，`SupervisorAgent` 作为生命周期管理器，明确地为每个工作代理定义边界。通过在初始化时仅向子代理提供有限工具集，系统确保一个分支的妥协或失败不会暴露另一个分支中的敏感能力。这种结构，加上定义的恢复策略，例如
    "`ONE_FOR_ONE`"，即使在处理不可预测的外部工具时，也允许系统保持弹性并自我修复。
- en: '[PRE5]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![Image 6](img/B33147_5_6.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![图像 6](img/B33147_5_6.png)'
- en: Figure 5.6 – Supervision Tree with Guarded Capabilities
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.6 – 带有守卫能力的监督树
- en: Consequences
  id: totrans-276
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**High resilience**: Automatic idx_04cb4236error recovery ensures the system
    can self-heal without human intervention'
  id: totrans-278
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高弹性**：自动 idx_04cb4236错误恢复确保系统可以在没有人为干预的情况下自我修复'
- en: '**Blast-radius control**: A crash in a risky branch (e.g., a web scraper) does
    not affect the safe branches or the root orchestrator'
  id: totrans-279
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**爆炸半径控制**：在风险分支（例如，网络爬虫）中的崩溃不会影响安全分支或根协调器'
- en: '**Cons**:'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Complexity**: Increases architectural choreography; developers must think
    in terms of trees and lifecycle management'
  id: totrans-281
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性**：增加架构编排；开发者必须从树和生命周期管理的角度思考'
- en: '**Communication overhead**: Cross-tree communication requires clear gateways
    (mailboxes), as agents cannot just "grab" data from a sibling'
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通信开销**：跨树通信需要明确的网关（邮箱），因为代理不能只是“抓取”来自兄弟节点的数据'
- en: Implementation guidance
  id: totrans-283
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实施指南
- en: This pattern is critical for production systems using unstable tools (such as
    web browsing or code execution). Avoid deep supervision trees for simple, single-shot
    utilities where the setup overhead idx_ab58f748dominates the execution time. When
    defining recovery strategies, ensure you implement "backoff logic." If a child
    crashes 5 times in 1 second, stop restarting it to prevent a "crash loop" that
    burns resources. Always enforce that children cannot bypass their supervisor to
    communicate directly with the root.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 此模式对于使用不稳定工具（如网络浏览或代码执行）的生产系统至关重要。对于简单、单次使用的工具，避免使用深度监督树，因为设置开销 idx_ab58f748主导了执行时间。在定义恢复策略时，确保您实现了“退避逻辑”。如果一个子代理在
    1 秒内崩溃 5 次，停止重启它以防止“崩溃循环”消耗资源。始终强制子代理不能绕过其监督器直接与根通信。
- en: Establishing the topology gives your system a shape, but a shape alone doesn't
    solve problems. Once your agents are organized, whether in a swarm, a hierarchy,
    or a market, they need a process to tackle complex goals. They need to look at
    a high-level objective, such as "launch a product," and figure out the sequence
    of steps required to achieve it. This is the domain of ***M******ulti-******A******gent***
    ***P******lanning***, the cognitive engine that drives the collective forward.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 建立拓扑结构为您的系统赋予形状，但仅仅形状本身并不能解决问题。一旦您的代理被组织起来，无论是在群体、层次结构还是市场中，他们需要一个过程来应对复杂的目标。他们需要查看高层次目标，例如“推出产品”，并找出实现它的步骤序列。这是多代理规划（Multi-Agent
    Planning）的领域，它是推动集体前进的认知引擎。
- en: Multi-Agent Planning
  id: totrans-286
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多代理规划
- en: Once a high-level delegation framework (e.g., a centralized supervisor or a
    decentralized swarm) is in idx_892e6857place, the system needs a concrete method
    for tackling complex goals. A single high-level objective, such as "launch a new
    product," cannot be directly executable by any single agent. It requires a thoughtful
    process of breaking the goal down into a series of coordinated, smaller actions
    that can be assigned to specialized agents. This is the core purpose of the ***Multi-Agent
    Planning*** pattern. It provides a structured approach for a system to analyze
    a complex goal and create a coherent, actionable plan that intelligently distributes
    the workload across the agent team.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立了高级委派框架（例如，集中式监督者或去中心化群体），系统就需要一个具体的方法来应对复杂目标。单个高级目标，如“推出新产品”，不能由任何单个智能体直接执行。它需要一个深思熟虑的过程，将目标分解为一系列协调的、较小的动作，这些动作可以分配给专门的智能体。这就是**多智能体规划**模式的核心目的。它为系统提供了一个结构化的方法来分析复杂目标，并创建一个连贯、可执行的计划，智能地将工作负载分配给智能体团队。
- en: Context
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: A complex idx_ddd6b936problem has been presented to the system that is too large
    or multifaceted for any single agent to solve alone. The overall goal is clear,
    but the sequence of steps and the division of labor required to achieve it are
    not. The system needs a coherent plan that leverages the specialized skills of
    its various agents.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 系统已经面临了一个过于庞大或复杂，以至于任何单个智能体都无法单独解决的问题。整体目标是明确的，但实现它的步骤和劳动分工并不明确。系统需要一个连贯的计划，利用其各种智能体的专业技能。
- en: Problem
  id: totrans-290
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can a idx_3dcefb6bgroup of autonomous agents collaboratively create and
    execute a unified plan to achieve a common goal? Without a shared plan, agents
    may perform redundant work, execute steps in the wrong order, or fail to combine
    their results effectively, leading to inefficiency or outright failure. Forces
    in the problem space include the following:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 如何让一组自主智能体协作创建和执行一个统一的计划以实现共同目标？没有共享的计划，智能体可能会执行重复的工作，以错误的顺序执行步骤，或者未能有效地结合他们的结果，导致效率低下或彻底失败。问题空间中的力量包括以下方面：
- en: '**Decomposition v****ersu****s** **c****ohesion**: Breaking a large goal into
    smaller tasks is necessary, but the idx_83b462f6system must ensure that the sub-tasks
    remain cohesive and contribute to the overall objective'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分解**与**内聚**：将大型目标分解为较小的任务是必要的，但系统必须确保子任务保持内聚并有助于整体目标。'
- en: '**Specialization v****ersu****s** **c****oordination** **o****verhead**: Using
    specialized agents improves efficiency for individual tasks but increases the
    complexity of managing their handoffs and overall coordination'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业化**与**协调**开销：使用专业化的智能体可以提高单个任务的效率，但增加了管理其交接和整体协调的复杂性。'
- en: '**Static v****ersu****s** **d****ynamic** **p****lanning**: A predefined plan
    is predictable but lacks the flexibility to adapt to new information or unforeseen
    challenges.'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**静态**与**动态**规划：预定义的计划是可预测的，但缺乏适应新信息或意外挑战的灵活性。'
- en: Solution
  id: totrans-295
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Multi-Agent Planning*** pattern addresses this by establishing a mechanism
    for decomposing idx_ef11c687a high-level goal into a graph or sequence of manageable
    sub-tasks and assigning those tasks to the most appropriate agents. This process,
    often called *c**ollaborative* *task de**composition*, is typically handled by
    the orchestrator agent in a centralized framework. The plan itself becomes a shared
    artifact that guides the collective's behavior.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: '**多智能体规划**模式通过建立一个机制来分解高级目标为图或一系列可管理的子任务，并将这些任务分配给最合适的智能体来解决这个问题。这个过程，通常被称为*协作*任务分解，通常由集中式框架中的协调器智能体处理。计划本身成为了一个共享的工件，指导集体的行为。'
- en: 'Example: Market analysis report generation'
  id: totrans-297
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：市场分析报告生成
- en: A high-level idx_97b9ed10goal of `"Generate a comprehensive market analysis
    report for Product X"` is delegated to a system using ***Multi-Agent Plannin******g***.
    The orchestrator decomposes this goal into a series of sub-tasks.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 一个高级目标“为产品X生成全面的市场分析报告”被委派给使用**多智能体规划**的系统。协调器将这个目标分解为一系列子任务。
- en: '`gather_sales_data`: Assigned to a `DataRetrieverAgent`.'
  id: totrans-299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`gather_sales_data`：分配给`DataRetrieverAgent`。'
- en: '`analyze_competitor_chatter`: Assigned to a `SocialMediaMonitoringAgent`.'
  id: totrans-300
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`analyze_competitor_chatter`：分配给`SocialMediaMonitoringAgent`。'
- en: '`summarize_analyst_reports`: Assigned to a `FinancialDocsAgent`.'
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`summarize_analyst_reports`：分配给`FinancialDocsAgent`。'
- en: '`synthesize_findings_and_draft_report`: Assigned to a `ReportWriterAgent`.'
  id: totrans-302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`synthesize_findings_and_draft_report`: 分配给 `ReportWriterAgent`。'
- en: These sub-tasks can then be executed in parallel or sequentially, with dependencies
    managed by the orchestrator or through direct communication between the agents.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 这些子任务可以并行或顺序执行，由协调器或通过代理之间的直接通信来管理依赖。
- en: '![Image 7](img/B33147_5_7.png)'
  id: totrans-304
  prefs: []
  type: TYPE_IMG
  zh: '![Image 7](img/B33147_5_7.png)'
- en: Figure 5.7 – Multi-Agent Planning workflow
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.7 – 多代理规划工作流程
- en: Implementation example
  id: totrans-306
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施示例
- en: The following sample implementation demonstrates the ***Multi-Agent Planning***
    pattern, showcasing idx_a4428e2chow a complex objective is decomposed into actionable
    sub-tasks. In this scenario, the `MarketAnalysisOrchestrator` acts as the lead
    planner, identifying which specialized agents are required to fulfill a market
    research request.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例实现展示了 ***多代理规划*** 模式，展示了如何将复杂的目标分解为可执行的子任务。在此场景中，`MarketAnalysisOrchestrator`
    扮演主要规划者的角色，确定需要哪些专业代理来完成市场研究请求。
- en: By utilizing the `concurrent.futures` library, the orchestrator executes independent
    data gathering tasks in parallel, significantly reducing the overall latency of
    the workflow. Once the foundational data is retrieved from the various specialists,
    the orchestrator manages the final dependency by passing all findings to the report
    writer, ensuring a cohesive and grounded final output.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用 `concurrent.futures` 库，协调器并行执行独立的数据收集任务，显著降低了工作流程的整体延迟。一旦从各个专家那里检索到基础数据，协调器通过将所有发现传递给报告编写者来管理最终依赖，确保最终输出的一致性和可靠性。
- en: '[PRE6]'
  id: totrans-309
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Consequences
  id: totrans-310
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**赞成**:'
- en: '**Efficiency**: This idx_43582a3cpattern enables solving complex problems by
    leveraging agent specialization and parallel execution, leading to greater efficiency
    and capability'
  id: totrans-312
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率**: 此 idx_43582a3c 模式通过利用代理专业化和并行执行来解决复杂问题，从而提高效率和能力'
- en: '**Leverages** **s****pecialization**: By assigning tasks to specialized agents,
    the system can achieve higher-quality results than a single, general-purpose agent
    could'
  id: totrans-313
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用** **专** **业化**: 通过将任务分配给专业代理，系统可以实现比单个通用代理更高的质量结果'
- en: '**Con****s**:'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反对**:'
- en: '**Coordination** **o****verhead**: The idx_4f93b717planning process itself
    consumes resources and can become a bottleneck if not designed efficiently'
  id: totrans-315
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调** **开销**: idx_4f93b717 规划过程本身消耗资源，如果设计不当，可能会成为瓶颈'
- en: '**Risk of** **r****igidity**: A static plan can fail if the environment changes
    or if a sub-task fails'
  id: totrans-316
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险** **of** **僵化**: 一个静态的计划如果环境发生变化或子任务失败，可能会失败'
- en: Implementation guidance
  id: totrans-317
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: To mitigate the risks of rigidity and coordination overhead, the plan should
    remain flexible rather than idx_0a0e1ef7static. The system must be able to adapt
    the plan in response to new information or failed sub-tasks. Clearly defining
    dependencies between sub-tasks is essential to ensure smooth handoffs and prevent
    execution errors.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减轻僵化和协调开销的风险，计划应保持灵活性，而不是 idx_0a0e1ef7 静态。系统必须能够根据新信息或失败的子任务调整计划。明确定义子任务之间的依赖关系对于确保顺利交接和防止执行错误至关重要。
- en: Now that we have explored the blueprints for orchestrating multi-agent systems
    and decomposing complex problems, the next logical step is to understand how these
    agents exchange information. The ***Knowledge Sharing*** pattern provides the
    foundational principles for how agents talk to each other to share data, coordinate
    actions, and manage dependencies.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了编排多代理系统和分解复杂问题的蓝图，下一步合乎逻辑的步骤是了解这些代理如何交换信息。***知识共享*** 模式为代理之间如何交流以共享数据、协调行动和管理依赖提供了基础原则。
- en: Knowledge Sharing
  id: totrans-320
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 知识共享
- en: Once a multi-agent system has a coherent plan, the quality of each agent's execution
    depends heavily on idx_8a7371b5the knowledge it possesses. If agents operate in
    informational silos, the system as a whole cannot benefit from the unique insights
    and learnings that individual agents gain over time. The ***Knowledge Sharing***
    pattern addresses this challenge directly, providing a mechanism for creating
    a collective intelligence and ensuring that valuable information discovered by
    one agent can be accessed by all, making the entire system more effective and
    adaptive.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦多代理系统有一个连贯的计划，每个代理的执行质量在很大程度上取决于它所拥有的知识。如果代理在信息孤岛中运作，整个系统就无法从个别代理随着时间的推移获得的独特见解和学习中受益。**知识共享**
    **模式** 直接解决这一挑战，提供了一种创建集体智慧并确保一个代理发现的有价值信息可以被所有代理访问的机制，使整个系统更加有效和适应。
- en: Context
  id: totrans-322
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: In a multi-agent idx_1933446fsystem, individual agents often acquire valuable
    information or learn new skills through their experiences. For example, one agent
    might learn the most efficient way to query a particular database, while another
    might learn to identify a new type of customer complaint. Without a sharing mechanism,
    this knowledge remains siloed within the individual agents.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 在多代理系统中，个别代理通常通过他们的经验获得有价值的信息或学习新技能。例如，一个代理可能学会了查询特定数据库的最有效方法，而另一个代理可能学会了识别一种新的客户投诉类型。如果没有共享机制，这种知识将保留在个别代理的孤岛中。
- en: Problem
  id: totrans-324
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can the idx_410f6104valuable knowledge or experience gained by one agent
    be shared with other agents in the system to improve the collective intelligence
    of the group? Without a sharing mechanism, each agent must learn everything independently,
    which is inefficient and leads to the system being less capable than the sum of
    its parts. Forces in the problem space include the following:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 如何将一个代理获得的有价值知识或经验与其他系统中的代理共享，以提高群体的集体智慧？如果没有共享机制，每个代理都必须独立学习一切，这既低效又导致系统整体能力低于其各部分之和。问题空间中的力量包括以下方面：
- en: '**Siloed** **k****nowledge v****ersu****s** **c****ollective** **i****ntelligence**:
    While it''s easier to keep knowledge idx_3c1849c7local to a single agent, doing
    so prevents the entire system from learning and improving over time'
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**孤岛化** **知识** **与** **集体** **智慧**：虽然将知识保留在单个代理处更容易，但这样做会阻止整个系统随着时间的推移学习和改进'
- en: '**Ease of** **w****riting v****ersu****s** **r****etrieval** **e****ffort**:
    The system needs a simple way for agents to write new knowledge to a shared repository,
    but the repository must also be structured for efficient and accurate retrieval
    by other agents'
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编写** **与** **检索** **努力** **的** **简便性**：系统需要一种简单的方法让代理将新知识写入共享存储库，但存储库也必须结构化，以便其他代理能够高效且准确地检索'
- en: '**Knowledge** **p****ropagation v****ersu****s** **i****ntegrity**: Sharing
    knowledge widely can accelerate problem-solving, but it also carries the risk
    of propagating incorrect or outdated information'
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识** **传播** **与** **完整性**：广泛分享知识可以加速问题解决，但也伴随着传播错误或过时信息的风险'
- en: Solution
  id: totrans-329
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Knowledge Sharing*** pattern implements a ***Shared Epistemic Memory***,
    which is a global, persistent idx_6e5066e8data store that all agents can read
    from and write to. This shared memory, which can be a simple knowledge graph,
    a vector database, or another form of persistent storage, moves beyond simple
    message passing. It creates a centralized pool of knowledge that allows the entire
    system to learn from the experiences of its individual members, preventing fragmented
    understanding and semantic drift.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: '**知识共享** **模式** 实现了一个 **共享认知记忆**，这是一个全局的、持久的 **数据存储**，所有代理都可以从中读取和写入。这种共享记忆，可以是简单的知识图谱、向量数据库或其他形式的持久存储，超越了简单的消息传递。它创建了一个集中的知识库，使整个系统能够从其个别成员的经验中学习，防止理解碎片化和语义漂移。'
- en: 'Example: Shared customer service solutions'
  id: totrans-331
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：共享的客户服务解决方案
- en: To illustrate the practical impact of a ***Shared Epistemic Memory***, consider
    a scenario in a large scale customer idx_e558bb40support environment. In this
    idx_2cb931c8example, the system moves beyond simple reactive responses to build
    a persistent repository of institutional knowledge. By allowing agents to contribute
    to and query a central vector database, the organization ensures that a solution
    discovered by one agent becomes an immediate asset for the entire collective,
    reducing redundant troubleshooting and improving the speed of resolution for complex
    issues.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明**共享认知记忆**的实际影响，考虑一个在大规模客户支持环境中的场景。在这个例子中，系统超越了简单的反应式响应，建立了一个持续的知识库。通过允许代理向中心向量数据库贡献和查询，组织确保一个代理发现的解决方案立即成为整个集体的资产，减少重复的故障排除并提高解决复杂问题的速度。
- en: '`Agent_A` discovers that `Error 503 on ProWidget X` is consistently resolved
    by having the user clear their device''s cache.'
  id: totrans-333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Agent_A`发现`ProWidget X`上的`错误 503`问题可以通过让用户清除他们的设备缓存来持续解决。'
- en: '`Agent_A` writes this successful solution to a shared vector database.'
  id: totrans-334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Agent_A`将这个成功的解决方案写入共享向量数据库。'
- en: Weeks later, `Agent_B` encounters a user with a similar issue. It performs a
    semantic idx_5ae7b8a5search on the shared knowledge idx_c6fc7730base and immediately
    finds the solution from `Agent_A`, resolving the issue on the first try.
  id: totrans-335
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 几周后，`Agent_B`遇到了一个有类似问题的用户。它对共享知识库进行了语义搜索，并立即找到了`Agent_A`提供的解决方案，第一次尝试就解决了问题。
- en: '![Image 8](img/B33147_5_8.png)'
  id: totrans-336
  prefs: []
  type: TYPE_IMG
  zh: '![图像 8](img/B33147_5_8.png)'
- en: Figure 5.8 – Agent information sharing
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.8 – 代理信息共享
- en: This sequence illustrates how a shared memory allows the entire multi-agent
    system to learn and improve over time from the experiences of its individual members.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 这个序列说明了共享记忆如何使整个多代理系统能够随着时间的推移从其个别成员的经验中学习和改进。
- en: Example implementation
  id: totrans-339
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following idx_94b55e71implementation provides a concrete look at how agents
    interact with a ***Shared Epistemic Memory***. In this Python example, we use
    a conceptual vector database to act as the global store for institutional knowledge.
    The code demonstrates the lifecycle of a knowledge entry, first showing how `AgentA`
    identifies a successful solution and commits it to the shared base, and then showing
    how `AgentB` performs a semantic search to retrieve that exact context when faced
    with a similar query. This pattern is fundamental for building systems that grow
    more intelligent with every interaction, as it prevents the "amnesia" that occurs
    when knowledge is siloed within idx_f109c675individual session histories.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 以下实现提供了一个具体了解代理如何与**共享认知记忆**交互的视角。在这个Python示例中，我们使用一个概念向量数据库作为机构知识的全局存储。代码演示了知识条目的生命周期，首先展示了`AgentA`如何识别一个成功的解决方案并将其提交到共享库，然后展示了`AgentB`如何在面对类似查询时执行语义搜索以检索该确切上下文。这种模式对于构建每次交互都变得更智能的系统至关重要，因为它防止了当知识在个体会话历史中隔离时发生的“健忘”。
- en: '[PRE7]'
  id: totrans-341
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Consequences
  id: totrans-342
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Collective** **i****ntelligence**: The most significant benefit is that the
    system becomes idx_06f72fb0more capable than the sum of its parts, as it can continuously
    learn from the collective experience of all agents'
  id: totrans-344
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集体** **智能**：最显著的好处是，系统比其各部分的总和更强大，因为它可以从所有代理的集体经验中持续学习。'
- en: '**Efficiency**: Agents can solve recurring problems faster by leveraging pre-existing
    knowledge rather than starting from scratch each time'
  id: totrans-345
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率**：代理可以通过利用现有的知识而不是每次都从头开始来解决重复性问题'
- en: '**Con****s**:'
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Data** **i****ntegrity**: There is a risk of propagating incorrect or malicious
    information'
  id: totrans-347
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据** **完整性**：存在传播错误或恶意信息的风险'
- en: '**Governance** **o****verhead**: A system is needed to manage, verify, and
    prune the knowledge base to maintain its accuracy and reliability'
  id: totrans-348
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理** **开销**：需要一个系统来管理、验证和修剪知识库，以保持其准确性和可靠性'
- en: Implementation guidance
  id: totrans-349
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现指南
- en: To implement a successful knowledge-sharing architecture, practitioners must
    focus on several idx_72df7c14foundational principles, starting with knowledge
    representation. For specific, objective facts, the system should utilize a structured
    format such as JSON, while reserving unstructured text within vector databases
    for more nuanced, experience-based knowledge.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现一个成功的知识共享架构，实践者必须关注几个基础原则，首先是知识表示。对于具体、客观的事实，系统应使用结构化格式，如JSON，而在向量数据库中保留非结构化文本，以存储更细微、基于经验的知识。
- en: Beyond simple storage, maintaining provenance is critical, as tracking the source
    of all shared knowledge allows architects to assess its reliability and debug
    the system more effectively if incorrect information is propagated.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 除了简单的存储之外，维护知识来源至关重要，因为跟踪所有共享知识的来源允许架构师评估其可靠性，并在错误信息传播时更有效地调试系统。
- en: Finally, a robust design should incorporate trust and verification mechanisms,
    which might include allowing agents to rate or validate information contributed
    by their peers, or even delegating a specialized "governance agent" to periodically
    review and prune the knowledge base to ensure its continued accuracy and relevance.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，一个稳健的设计应包含信任和验证机制，这可能包括允许代理对其同伴贡献的信息进行评分或验证，甚至委托一个专门的“治理代理”定期审查和修剪知识库，以确保其持续准确和相关性。
- en: 'A well-designed plan and a shared pool of knowledge give agents the intelligence
    they need to make sound decisions. However, an agent''s ability to translate those
    decisions into tangible outcomes often depends on its capacity to interact with
    the outside world. This is where tools, such as APIs, functions, and databases,
    come into play. This introduces a new coordination challenge: in a system with
    many specialized agents and tools, how do we ensure the right agent calls the
    right tool for a specific task? The ***Tool Routing in Multi-Agent Contexts***
    pattern addresses this by providing a framework for efficiently managing and directing
    the use of tools across the system.'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心设计的计划和共享的知识库为代理提供了做出明智决策所需的智能。然而，代理将决策转化为具体成果的能力通常取决于其与外部世界互动的能力。这正是工具，如API、函数和数据库，发挥作用的地方。这引入了一个新的协调挑战：在一个有许多专业代理和工具的系统里，我们如何确保正确的代理为特定任务调用正确的工具？***多代理环境中的工具路由***模式通过提供一个框架来有效地管理和指导系统内工具的使用来解决这一问题。
- en: Tool Routing in Multi-Agent Contexts
  id: totrans-354
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多代理环境中的工具路由
- en: While the ***K******nowledge*** ***S******haring*** pattern ensures that agents
    have access to the best collective information, their idx_0a298c97ability to translate
    that knowledge into effective action often depends on using external tools.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然***知识共享***模式确保了代理能够访问最佳集体信息，但它们将知识转化为有效行动的能力通常取决于使用外部工具。
- en: 'This introduces a new coordination challenge: in a system with many specialized
    agents and tools, how do we ensure the right agent calls the right tool or delegates
    for a specific task? The ***Tool Routing in Multi-Agent Contexts*** pattern addresses
    this by providing a framework for efficiently managing and directing the use of
    tools across the system.'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 这引入了一个新的协调挑战：在一个有许多专业代理和工具的系统里，我们如何确保正确的代理调用正确的工具或为特定任务进行委托？***多代理环境中的工具路由***模式通过提供一个框架来有效地管理和指导系统内工具的使用来解决这一问题。
- en: Context
  id: totrans-357
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 环境
- en: A multi-agent idx_140e9289system has access to a variety of tools (APIs, functions,
    databases) that can be used to perform actions. When a task requires a specific
    capability, the system must decide which agent should invoke which tool.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 多代理系统有权访问各种工具（API、函数、数据库），可用于执行操作。当任务需要特定能力时，系统必须决定哪个代理应该调用哪个工具。
- en: Problem
  id: totrans-359
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'In a system idx_7ba3870ewith numerous agents and tools, how do you ensure the
    right tool is selected for a given sub-task and invoked by the most appropriate
    agent? Misalignment between an agent''s goal and the tool it uses can lead to
    degraded performance, incorrect results, or wasted resources. Forces in the problem
    space include the following:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个有许多代理和工具的系统里，你如何确保为给定的子任务选择正确的工具，并由最合适的代理调用？代理的目标与其使用的工具之间的不匹配可能导致性能下降、结果错误或资源浪费。问题空间中的力量包括以下方面：
- en: '**Accuracy v****ersu****s** **f****lexibility**: A rigid, hardcoded routing
    map ensures high accuracy for known idx_c6966a11tasks but lacks the flexibility
    to handle unexpected requests'
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Accuracy versus flexibility**: 严格的、硬编码的路由图确保已知 idx_c6966a11任务的高准确性，但缺乏处理意外请求的灵活性。'
- en: '**Centralization v****ersu****s** **b****ottleneck**: A central router simplifies
    the routing logic but can become a single point of failure or a performance bottleneck
    in a high-traffic system'
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Centralization versus bottleneck**: 中央路由简化了路由逻辑，但可能成为高流量系统中的单点故障或性能瓶颈。'
- en: '**Tool** **s****pecialization v****ersu****s** **tool discov****ery**: Agents
    benefit from having a small, dedicated set of tools, but they need a mechanism
    to discover new or external tools if required.'
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Tool specialization versus tool discovery**: 代理从拥有一个小型、专用的工具集受益，但它们需要一种机制来发现新工具或外部工具，如果需要的话。'
- en: Solution
  id: totrans-364
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Tool Routing*** pattern improves focus and reduces decision fatigue by
    providing each agent or idx_b47569dda central supervisor with a specific prompt
    that describes only its relevant tools. Instead of every agent having access to
    every tool, capabilities are scoped. The orchestrator or a dedicated router agent
    is responsible for directing a task to the agent whose dedicated toolset is best
    suited for the job. This approach ensures that agents operate efficiently within
    clearly defined capabilities, leading to more accurate and reliable tool invocation.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: '**Tool Routing** 模式通过为每个代理或 idx_b47569dda 中央监督员提供只描述其相关工具的特定提示，提高了专注度并减少了决策疲劳。不是每个代理都能访问到每个工具，能力被限制。协调器或专门的路由代理负责将任务路由到最适合该工作的专用工具集的代理。这种方法确保代理在明确定义的能力范围内高效运行，从而带来更准确和可靠的工具调用。'
- en: 'Example: Intelligent personal assistant'
  id: totrans-366
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：智能个人助理
- en: Consider idx_e649839ca personal assistant bot that needs to handle diverse user
    queries ranging from checking stock prices to booking flights.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑 idx_e649839ca 个人助理机器人，它需要处理从检查股价到预订航班的各种用户查询。
- en: '**User** **r****equest**: The user asks, "What is the current stock price of
    Google?"'
  id: totrans-368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**User request**: 用户询问，“谷歌当前的股价是多少？”'
- en: '**Classification**: The central `Router Agent` analyzes the intent and classifies
    the request as a `financial_query`.'
  id: totrans-369
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Classification**: 中央 `Router Agent` 分析意图并将请求分类为 `financial_query`。'
- en: '**Routing**: Based on this classification, `Router Agent` delegates the task
    to `FinancialAgent`, which holds the specific API keys and tools for market data.'
  id: totrans-370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Routing**: 根据这种分类，`Router Agent` 将任务委托给 `FinancialAgent`，它持有特定的市场数据 API 密钥和工具。'
- en: '**Specialized** **e****xecution**: The `FinancialAgent` uses its `get_stock_price`
    tool to fetch the data.'
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Specialized execution**: `FinancialAgent` 使用其 `get_stock_price` 工具来获取数据。'
- en: '**Completion**: The result is returned to the user, while the `WeatherAgent`
    and `TravelAgent` remain undisturbed, preventing them from hallucinating an answer
    or misusing their tools.'
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Completion**: 结果返回给用户，而 `WeatherAgent` 和 `TravelAgent` 保持未受干扰，防止它们产生错误的答案或误用工具。'
- en: '![Image 9](img/B33147_5_9.png)'
  id: totrans-373
  prefs: []
  type: TYPE_IMG
  zh: '![Image 9](img/B33147_5_9.png)'
- en: Figure 5.9 – Centralized tool routing example implementation
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.9 – 集中式工具路由示例实现
- en: Example implementation
  id: totrans-375
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: A `CentralOrchestrator` agent idx_ca1650daroutes a user's request to the correct
    specialized agent based on the request's classification.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 `CentralOrchestrator` 代理 idx_ca1650daroutes 将用户的请求根据请求的分类路由到正确的专业代理。
- en: '[PRE8]'
  id: totrans-377
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Consequences
  id: totrans-378
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Consequences
- en: '**Pro****s**:'
  id: totrans-379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Pros**:'
- en: '**Higher** **a****ccuracy**: By limiting the tool options for each agent, the
    system reduces idx_319392dathe chance of incorrect tool invocation, leading to
    more reliable outcomes'
  id: totrans-380
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Higher accuracy**: 通过限制每个代理的工具选项，系统减少了 idx_319392dathe 错误工具调用的机会，从而带来更可靠的成果。'
- en: '**Focus**: Agents become highly specialized in their domains, improving their
    efficiency and performance'
  id: totrans-381
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Focus**: 代理在其领域内变得高度专业化，提高了效率和性能。'
- en: '**Con****s**'
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Cons**:'
- en: '**Rigidity**: This pattern can be less flexible if a task unexpectedly requires
    a tool outside an agent''s predefined set'
  id: totrans-383
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Rigidity**: 如果一个任务意外需要代理预定义集之外的工具，这种模式可能不够灵活。'
- en: '**Upfront** **d****esign**: It requires careful upfront design and maintenance
    of the routing map or agent capabilities'
  id: totrans-384
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Upfront design**: 需要仔细的前期设计和维护路由图或代理能力。'
- en: Implementation guidance
  id: totrans-385
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指导
- en: For systems with a large number of tools, consider creating a tool registry
    that agents can query. This allows for more dynamic routing than hardcoded tool-agent
    assignments. The routing logic idx_5c3b4243can also be delegated to a dedicated
    LLM-powered router agent that uses function-calling to select the right agent
    and its associated tool, providing greater flexibility.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 对于拥有大量工具的系统，考虑创建一个代理可以查询的工具注册表。这比硬编码的工具-代理分配提供了更动态的路由。路由逻辑也可以委托给一个专门的由LLM（大型语言模型）驱动的路由代理，该代理使用函数调用选择正确的代理及其相关工具，提供更大的灵活性。
- en: Ensuring the right agent uses the right tool is a crucial step in coordinating
    action. However, for that action to be effective, it must be based on a clear
    and consistent understanding of the environment. But what happens when different
    agents perceive the same environment differently, leading to conflicting data?
    The system needs a way to reconcile these differences and agree on a single version
    of the truth before it can act. This is the challenge addressed by the ***Consensus***
    pattern.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 确保正确的代理使用正确的工具是协调行动的关键步骤。然而，为了使该行动有效，它必须基于对环境的清晰和一致的理解。但当不同的代理对同一环境有不同的感知，导致数据冲突时会发生什么？系统需要一种方式来调和这些差异，并在采取行动之前就单一的真实版本达成一致。这就是**共识**模式解决的问题。
- en: Consensus
  id: totrans-388
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 共识
- en: In any idx_dbf9c479distributed system, achieving a shared perspective is a fundamental
    challenge. For a multi-agent system, where autonomous agents make decisions based
    on their perception of the world, this challenge is even more acute.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何分布式系统中，实现共享视角是一个基本挑战。对于多代理系统，其中自主代理根据对世界的感知做出决策，这个挑战更为严峻。
- en: The ***Consensus*** pattern provides a family of protocols that enable a group
    of agents to agree on a specific piece of data or the state of the system. This
    is not simply about voting; it is about a structured process of communication
    and convergence that ensures the system can operate from a single, reliable point
    of view, preventing errors that arise from acting on contradictory information.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: '**共识**模式提供了一系列协议，使一群代理能够就特定数据或系统的状态达成一致。这不仅仅是投票；它是一个结构化的沟通和收敛过程，确保系统能够从一个单一、可靠的观点运行，防止由于采取矛盾信息而产生的错误。'
- en: Context
  id: totrans-391
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: In a distributed system, multiple agents may have access to different, incomplete,
    or even conflicting idx_10f7870dinformation about the state of the environment.
    To proceed with a coordinated action, the agents must first agree on a single,
    shared understanding.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 在分布式系统中，多个代理可能有权访问关于环境状态的不同的、不完整的或甚至相互冲突的**信息**。为了进行协调行动，代理必须首先就单一、共享的理解达成一致。
- en: Problem
  id: totrans-393
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can a idx_2b13bd20group of autonomous agents reach a guaranteed agreement
    on a specific value or state, even in the presence of noisy data or minor disagreements?
    Without a consensus mechanism, agents might act on contradictory information,
    leading to system-wide failures or inefficiencies. Forces in the problem space
    include the following:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 如何让一群自主代理在存在噪声数据或轻微分歧的情况下，就特定值或状态达成保证的一致意见？如果没有共识机制，代理可能会根据矛盾的信息采取行动，导致系统级故障或低效。问题空间中的力量包括以下方面：
- en: '**Agreement v****ersu****s** **i****ndividual** **a****ccuracy**: Agents may
    have highly accurate, yet conflicting, individual data points. The consensus process
    forces them to compromise idx_d06e5b8con a single value, potentially at the cost
    of losing some individual precision.'
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致性与个体准确性**：代理可能有高度准确但相互冲突的个体数据点。共识过程迫使他们就单一值达成妥协，这可能以牺牲一些个体精度为代价。'
- en: '**Convergence v****ersu****s** **t****ime**: The process of reaching consensus
    can be time-consuming, especially in a large network of agents. The system must
    balance the need for a reliable outcome with the need for a timely decision.'
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**收敛与时间**：达成共识的过程可能耗时，尤其是在一个大型代理网络中。系统必须在可靠的结果和及时决策的需求之间取得平衡。'
- en: '**Honest** **a****ctors v****ersu****s** **m****alicious** **a****ctors**:
    The consensus algorithm must be robust enough to handle noise and minor disagreements,
    but also a mechanism to identify and isolate agents that deliberately provide
    false information to sabotage the process.'
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**诚实代理与恶意代理**：共识算法必须足够健壮，能够处理噪声和轻微分歧，同时还需要一种机制来识别和隔离那些故意提供虚假信息以破坏过程的代理。'
- en: Solution
  id: totrans-398
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Consensus*** pattern idx_ade51d43provides a protocol through which agents
    can converge on a common state, often through an iterative debate. In this model,
    agents broadcast their current beliefs, receive the beliefs of others, and adjust
    their own beliefs based on a predefined rule. This process repeats until the states
    of all agents converge within an acceptable tolerance. This method ensures a robust
    and validated understanding of the shared state before any action is taken.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: '**共识**模式 idx_ade51d43提供了一种协议，通过该协议代理可以收敛到一个共同的状态，通常是通过迭代辩论。在这个模型中，代理广播他们当前的信念，接收他人的信念，并根据预定义的规则调整自己的信念。这个过程重复进行，直到所有代理的状态在可接受的容差范围内收敛。这种方法确保在采取任何行动之前，对共享状态有一个稳健且经过验证的理解。'
- en: 'Example: Financial forecasting debate'
  id: totrans-400
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：财务预测辩论
- en: A financial idx_2f08a41aservices firm uses a team of agents to generate a consensus
    forecast for a company's next-quarter revenue. Each agent has a different perspective
    or model.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 一家金融 idx_2f08a41aservices公司使用一组代理为公司的下季度收入生成共识预测。每个代理有不同的观点或模型。
- en: '**Initial** **f****orecasts (Round 1)**: An orchestrator agent requests a forecast
    from the team.'
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初始预测（第 1 轮）**：协调代理从团队请求预测。'
- en: An `OptimistAgent`, analyzing positive market trends, forecasts $110M.
  id: totrans-403
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个分析积极市场趋势的`OptimistAgent`预测$110M。
- en: A `PessimistAgent`, focusing on potential supply chain risks, forecasts $95M.
  id: totrans-404
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个专注于潜在供应链风险的`PessimistAgent`预测$95M。
- en: A `RealistAgent`, using historical performance data, forecasts $102M.
  id: totrans-405
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个使用历史绩效数据的`RealistAgent`预测$102M。
- en: '**Iterative** **d****ebate (Round 2)**: The agents share their forecasts with
    each other. They each calculate the average forecast ($102.3M) and adjust their
    own value partway towards this mean.'
  id: totrans-406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**迭代辩论（第 2 轮）**：代理们相互分享他们的预测。他们各自计算平均预测（$102.3M）并将自己的值部分调整到这个均值。'
- en: '**Convergence**: The process of sharing and adjusting continues. The range
    between the highest and lowest forecasts narrows with each round until all forecasts
    are within a predefined tolerance.'
  id: totrans-407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收敛**：共享和调整的过程持续进行。每一轮中，最高和最低预测之间的范围都会缩小，直到所有预测都在预定义的容差范围内。'
- en: '**Action**: The system declares a final consensus forecast of $103M, which
    is then used to inform the firm''s investment strategy.'
  id: totrans-408
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**行动**：系统宣布最终共识预测为$103M，然后用于告知公司的投资策略。'
- en: '![Image 10](img/B33147_5_10.png)'
  id: totrans-409
  prefs: []
  type: TYPE_IMG
  zh: '![图像 10](img/B33147_5_10.png)'
- en: Figure 5.10 – Agent consensus workflow
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.10 – 代理共识工作流程
- en: Example implementation
  id: totrans-411
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sample implementation demonstrates the ***Consensus*** pattern,
    focusing on how a group of idx_5118a0acagents can arrive at a shared perspective
    through iterative convergence. In this Level 6 architecture, the `ConsensusManager`
    acts as the facilitator for a structured debate among specialized financial agents.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例实现展示了**共识**模式，重点关注一组代理如何通过迭代收敛达成共识。在这个第 6 级架构中，`ConsensusManager`充当一组专业金融代理之间结构化辩论的促进者。
- en: Rather than simply averaging divergent data points, the manager executes a multi-round
    protocol where each agent observes the collective mean and adjusts its own hypothesis
    based on its internal logic. This process continues until the individual forecasts
    fall within a specified tolerance, ensuring that the final decision is not just
    a statistical middle ground but a validated agreement reached through the active
    participation of all autonomous members.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是简单地平均不同的数据点，经理执行一个多轮协议，其中每个代理观察集体均值并根据其内部逻辑调整自己的假设。这个过程一直持续到个别预测落在指定的容差范围内，确保最终的决定不仅是一个统计上的中间点，而且是通过所有自主成员的积极参与而达成的验证协议。
- en: '[PRE9]'
  id: totrans-414
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Consequences
  id: totrans-415
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-416
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Reliability**: By facilitating a structured debate, the ***C******onsensus***
    pattern increases idx_05664eb6the reliability and robustness of the system''s
    decisions. It ensures that actions are based on a shared, validated understanding
    rather than a single, potentially flawed data point.'
  id: totrans-417
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可靠性**：通过促进结构化的辩论，**共识**模式增加了 idx_05664eb6系统决策的可靠性和鲁棒性。它确保行动基于共享的、经过验证的理解，而不是基于单一、可能存在缺陷的数据点。'
- en: '**Fault** **t****olerance**: The process is inherently robust, as a single
    agent''s failure to participate or provide a valid response will not necessarily
    halt the entire process.'
  id: totrans-418
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容错**：该过程本身具有鲁棒性，因为单个代理未能参与或提供有效响应并不一定会使整个过程停止。'
- en: '**Con****s**:'
  id: totrans-419
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Latency**: Consensus protocols introduce a natural delay, as they require
    multiple rounds of communication and computation. This makes them unsuitable for
    real-time systems that require instantaneous decisions.'
  id: totrans-420
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：共识协议引入了自然的延迟，因为它们需要多轮通信和计算。这使得它们不适合需要即时决策的实时系统。'
- en: '**Complexity**: Implementing a robust consensus protocol is complex, requiring
    careful consideration of edge cases such as agent failure, network partitions,
    and malicious actors.'
  id: totrans-421
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性**：实现一个健壮的共识协议是复杂的，需要仔细考虑边缘情况，例如代理失败、网络分区和恶意行为者。'
- en: Implementation guidance
  id: totrans-422
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**实施指南**'
- en: To ensure the success of a ***C******onsensus*** protocol, several core principles
    must be integrated into its design. First, it is crucial to establish a clear
    termination condition, such as a maximum number of idx_f45a598frounds or a specific
    convergence threshold, to prevent the system from entering infinite loops. Second,
    the convergence algorithm should serve as the primary logic for how agents adjust
    their state, which can range from a simple numerical average to a more complex
    method that weighs individual opinions based on an agent's historical reliability.
    Finally, practitioners must prioritize explainability by recording the reasoning
    and intermediate states of the debate, as this creates a vital audit trail that
    allows stakeholders to understand exactly how the final consensus was reached.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保共识协议的成功，必须将其设计整合到几个核心原则中。首先，建立明确的终止条件至关重要，例如最大轮数或特定的收敛阈值，以防止系统进入无限循环。其次，收敛算法应作为代理调整其状态的主要逻辑，这可以从简单的数值平均到更复杂的基于代理历史可靠性的个人意见加权方法。最后，从业者必须优先考虑可解释性，通过记录辩论的推理和中间状态，因为这创建了一个关键的审计轨迹，使利益相关者能够确切了解最终共识是如何达成的。
- en: While consensus helps agents agree on facts, it doesn't resolve situations where
    their goals are in direct opposition. The next pattern, ***Negotiation***, provides
    a framework for agents to resolve these competing interests and find mutually
    beneficial outcomes.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然共识有助于代理就事实达成一致，但它并不能解决他们的目标直接对立的情况。下一个模式，**协商**，为代理提供了一个框架，以解决这些竞争利益并找到互利的结果。
- en: Agent Negotiation
  id: totrans-425
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**代理协商**'
- en: When agents operate autonomously, they often have their own objectives, which
    may not always align idx_1b7d280eperfectly with those of other agents. This can
    lead to situations where agents have competing claims over resources or conflicting
    preferences for a course of action.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 当代理自主行动时，他们通常有自己的目标，这些目标可能并不总是与其他代理的目标完美一致。这可能导致代理在资源或行动方案偏好上存在竞争性主张或冲突。
- en: Rather than resorting to a simple, top-down decision that might be suboptimal
    for all involved, a more sophisticated approach is to allow the agents to resolve
    the conflict themselves. The ***Negotiation*** pattern provides a structured protocol
    for this kind of interaction.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是简单地采用自上而下的决策，这种决策可能对所有相关方来说都不是最优的，更复杂的方法是允许代理自己解决冲突。**协商**模式为此类交互提供了一种结构化的协议。
- en: Context
  id: totrans-428
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**上下文**'
- en: Multiple idx_47e945d0autonomous agents, often with their own self-interests
    or conflicting goals, need to reach a mutually acceptable agreement to achieve
    a task or resolve a dispute.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 多个**自主**代理，通常有自己的自我利益或冲突的目标，需要达成一个相互可接受的协议来实现任务或解决争端。
- en: Problem
  id: totrans-430
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**问题**'
- en: 'How can idx_ddd57dfaself-interested agents reach a mutually beneficial agreement
    without requiring a central authority to dictate the outcome? A fixed, non-negotiable
    approach can lead to deadlocks or suboptimal outcomes where a potential "win-win"
    solution is missed. Forces in the problem space include the following:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 如何让自私的代理在没有中央权威指定结果的情况下达成互利协议？一个固定且不可协商的方法可能导致僵局或次优结果，从而错过潜在的“双赢”解决方案。问题空间中的力量包括以下方面：
- en: '**Autonomy versus alignment**: Agents need the freedom to pursue their specific
    objectives, but the idx_03597109system must ensure their individual successes
    do not come at the expense of the collective goal.'
  id: totrans-432
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自主性与一致性**：代理需要追求他们特定的目标，但系统必须确保他们的个人成功不会以牺牲集体目标为代价。'
- en: '**Fairness versus efficiency**: A negotiation should ideally result in a "win-win"
    outcome where all parties are satisfied, but the time and computational power
    required to reach such an agreement must be balanced against the need for a timely
    decision.'
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公平与效率**：协商的理想结果应该是“双赢”的局面，其中所有各方都满意，但达成此类协议所需的时间和计算能力必须与及时决策的需求相平衡。'
- en: '**Strategic behavior versus transparency**: While complex negotiation strategies
    can lead to optimal outcomes, they often make the reasoning behind a decision
    harder to audit and explain to human stakeholders.'
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略行为与透明度**：虽然复杂的协商策略可能导致最佳结果，但它们往往使决策背后的推理更难审计并向人类利益相关者解释。'
- en: Solution
  id: totrans-435
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Negotiation*** pattern provides a structured protocol for agents to engage
    in a back-and-forth dialogue idx_99879f28of offers and counter-offers to find
    a compromise. This pattern is heavily influenced by game theory, where agents
    are seen as rational actors trying to maximize their own utility.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: '**协商**模式为代理提供了一种结构化的协议，用于进行来回对话，以找到折衷方案。这种模式深受博弈论的影响，其中代理被视为理性的行为者，试图最大化自己的效用。'
- en: A typical negotiation protocol involves an initiation (initial offer), evaluation,
    and response (accept, reject, or counter-offer). The process iterates until an
    agreement is reached or a termination condition is met.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的协商协议包括启动（初始出价）、评估和回应（接受、拒绝或反要约）。该过程重复进行，直到达成协议或满足终止条件。
- en: 'Example: Negotiating for a shared resource'
  id: totrans-438
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：协商共享资源
- en: Two agents idx_2ea1b269in a data processing environment need to use a single,
    high-performance GPU server for their tasks. A `ResourceManagerAgent` oversees
    the server and initiates negotiation when a conflict arises.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据处理环境中，两个代理idx_2ea1b269需要使用单个高性能GPU服务器来执行他们的任务。`ResourceManagerAgent`监督服务器，并在出现冲突时启动协商。
- en: '`AnalyticsAgent` **goal**: Run a time-sensitive, high-priority financial model
    that requires a 2-hour processing window, ideally starting at 2:00 AM.'
  id: totrans-440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AnalyticsAgent` **目标**：运行一个需要2小时处理窗口的时效性高优先级财务模型，理想情况下从凌晨2:00开始。'
- en: '`TrainingAgent` **goal**: Run a routine, lower-priority model retraining job
    that requires a 4-hour window, also scheduled for 2:00 AM.'
  id: totrans-441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`TrainingAgent` **目标**：运行一个常规、低优先级的模型重新训练作业，需要4小时窗口，也计划在凌晨2:00进行。'
- en: 'The negotiation, mediated by the `ResourceManagerAgent`, unfolds:'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 由`ResourceManagerAgent`调解的协商展开：
- en: '**Conflict detection**: Both the `AnalyticsAgent` and the `TrainingAgent` request
    a lock on the GPU server for 2:00 AM. The `ResourceManagerAgent` detects the conflict.'
  id: totrans-443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**冲突检测**：`AnalyticsAgent`和`TrainingAgent`都请求在凌晨2:00锁定GPU服务器。`ResourceManagerAgent`检测到冲突。'
- en: '**Initiation**: The `ResourceManagerAgent` informs both agents of the conflict
    and requests that they state their priority and flexibility.'
  id: totrans-444
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**启动**：`ResourceManagerAgent`通知两个代理冲突情况，并要求他们说明优先级和灵活性。'
- en: '`AnalyticsAgent` **responds**: `{"priority": "high", "duration": "2 hours",
    "flexibility": "low"}`.'
  id: totrans-445
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`AnalyticsAgent` **回应**：`{"priority": "high", "duration": "2 hours", "flexibility":
    "low"}`。'
- en: '`TrainingAgent` **responds**: `{"priority": "low", "duration": "4 hours", "flexibility":
    "medium"}`.'
  id: totrans-446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`TrainingAgent` **回应**：`{"priority": "low", "duration": "4 hours", "flexibility":
    "medium"}`。'
- en: '**Evaluation** **and** **proposal**: The `ResourceManagerAgent''s` policy is
    to prioritize "`high`" priority idx_31bc5d54tasks. It asks the `TrainingAgent`
    to propose a new time.'
  id: totrans-447
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估与提案**：`ResourceManagerAgent`的政策是优先处理`high`优先级idx_31bc5d54任务。它要求`TrainingAgent`提出一个新的时间。'
- en: '**Counter****-****offer**: The `TrainingAgent` checks the schedule and offers
    a compromise.'
  id: totrans-448
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**反要约**：`TrainingAgent`检查日程安排并提出折衷方案。'
- en: 'Offer: `I can defer my task. I propose to start my 4-hour job at 4:00 AM, immediately
    after the AnalyticsAgent''s 2-hour window is complete.`'
  id: totrans-449
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供方案：`我可以推迟我的任务。我建议在AnalyticsAgent的2小时窗口完成后，立即在凌晨4:00开始我的4小时工作。`
- en: '**Agreement**: The `ResourceManagerAgent` confirms that this new schedule resolves
    the conflict and meets all constraints. It sends a confirmation to both agents.'
  id: totrans-450
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**协议**：`ResourceManagerAgent`确认新日程安排解决了冲突并满足所有约束。它向两个代理发送确认。'
- en: '**Confirmation**: `Agreement reached. AnalyticsAgent is scheduled for 2:00
    AM - 4:00 AM. TrainingAgent is scheduled for 4:00 AM - 8:00 AM.`'
  id: totrans-451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确认**：`达成协议。AnalyticsAgent计划于凌晨2:00至4:00执行。TrainingAgent计划于凌晨4:00至8:00执行。`'
- en: '![Image 11](img/B33147_5_11.png)'
  id: totrans-452
  prefs: []
  type: TYPE_IMG
  zh: '![图像11](img/B33147_5_11.png)'
- en: Figure 5.11 – Agent Negotiation workflow
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.11 – 代理协商工作流程
- en: In this idx_687c7a9dscenario, the agents successfully negotiated a new schedule
    that respected task priorities, ensuring the most critical job was completed on
    time without requiring human intervention.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 在此idx_687c7a9d场景中，代理成功协商了一个新的日程安排，该安排尊重任务优先级，确保最关键的工作按时完成，而不需要人工干预。
- en: Example implementation
  id: totrans-455
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sample implementation demonstrates the ***Agent Negotiation***
    pattern in the context of idx_1b9dbca9resource management. In this scenario, the
    `ResourceManagerAgent` serves as a mediator that identifies scheduling conflicts
    between autonomous peers. Rather than imposing a fixed decision, the code illustrates
    the first phase of a negotiation protocol, where the mediator assesses task priorities
    and initiates a dialogue by requesting a counter-proposal from the lower-priority
    agent. This approach enables the system to find mutually acceptable solutions
    that respect business constraints while maintaining idx_996c5f6bthe autonomy of
    individual agents.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例实现展示了在idx_1b9dbca9资源管理背景下***代理协商***模式。在此场景中，`ResourceManagerAgent`充当调解者，识别自主对等体之间的调度冲突。代码不是强加一个固定的决策，而是说明了协商协议的第一阶段，其中调解者评估任务优先级，并通过要求低优先级代理提出反提案来启动对话。这种方法使系统能够找到相互可接受的解决方案，同时尊重业务约束，并保持idx_996c5f6b个体代理的自主性。
- en: '[PRE10]'
  id: totrans-457
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Consequences
  id: totrans-458
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Flexibility**: This idx_80184907pattern allows for flexible, dynamic agreements
    that can achieve better outcomes for all parties compared to rigid, fixed policies'
  id: totrans-460
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：此模式允许灵活的、动态的协议，与僵化的、固定的政策相比，可以为所有各方带来更好的结果。'
- en: '**Optimality:** It enables the discovery of "win-win" solutions that might
    not be obvious to a central authority or pre-programmed rules'
  id: totrans-461
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最优性**：它能够发现“双赢”解决方案，这些解决方案可能对中央权威或预编程规则不明显。'
- en: '**Con****s**:'
  id: totrans-462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Time** **and****c****omplexity**: Negotiation can be time-consuming and computationally
    intensive, and there is no guarantee that an agreement will be reached.'
  id: totrans-463
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间和复杂性**：协商可能耗时且计算密集，且无法保证达成协议。'
- en: '**No** **g****uarantee**: The process can fail to produce a solution, leading
    to a deadlock if no fallback mechanism is in place.'
  id: totrans-464
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无保证**：如果没有回退机制，过程可能无法产生解决方案，导致死锁。'
- en: Implementation guidance
  id: totrans-465
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: Define clear termination conditions and fallback positions. What happens if
    no deal is reached? The agent should have a plan B. Log the entire sequence of
    offers and counter-offers for auditability and to enable human oversight.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 明确定义清晰的终止条件和回退位置。如果没有达成协议会发生什么？代理应该有一个B计划。记录整个出价和反出价序列，以便于审计和便于人工监督。
- en: While idx_228276adnegotiation is an effective pattern for resolving a specific
    conflict between two or more agents, systems often face the broader challenge
    of distributing a finite pool of assets among many competing agents.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然idx_228276ad协商是一种有效模式，用于解决两个或多个代理之间的特定冲突，但系统通常面临更广泛的挑战，即在许多竞争性代理之间分配有限的资产池。
- en: This requires a more systematic approach to managing supply and demand. The
    ***Resource Allocation*** pattern provides the framework for this system-wide
    challenge.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要一种更系统的方法来管理供需。**资源分配**模式为这一系统级挑战提供了框架。
- en: Resource Allocation
  id: totrans-469
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 资源分配
- en: In any complex system, resources are finite. Whether it is computational power,
    network bandwidth, access idx_18dc3f72to a specific API, or physical assets such
    as robotic arms, there is often more demand than supply. When multiple agents
    need the same limited resource simultaneously, the system requires a fair and
    efficient method to decide who gets what.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何复杂的系统中，资源都是有限的。无论是计算能力、网络带宽、访问特定API，还是物理资产，如机器人臂，通常需求大于供应。当多个代理同时需要相同的有限资源时，系统需要一种公平且高效的方法来决定谁得到什么。
- en: The ***Resource Allocation*** pattern provides a structured approach to manage
    this distribution, moving beyond simple "first-come, first-served" logic to a
    more intelligent and goal-oriented model.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: '**资源分配**模式提供了一种结构化的方法来管理这种分配，超越了简单的“先到先得”逻辑，转向一个更智能和目标导向的模型。'
- en: Context
  id: totrans-472
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: A multi-agent idx_b95bf785system has a finite pool of resources, such as network
    bandwidth, compute power, or API call quotas, that must be distributed among multiple
    agents with competing needs.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 一个多代理idx_b95bf785系统拥有有限的资源池，例如网络带宽、计算能力或API调用配额，这些资源必须分配给具有竞争需求的多个代理。
- en: Problem
  id: totrans-474
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can the idx_18d2d4aasystem distribute limited resources among competing
    agents in a way that is efficient, fair, and aligned with overall system goals?
    Without a clear allocation strategy, a multi-agent system can experience contention,
    bottlenecks, and suboptimal performance. Forces in the problem space include the
    following:'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 系统如何以高效、公平且与整体系统目标一致的方式在竞争的代理之间分配有限的资源？如果没有明确的分配策略，多代理系统可能会遇到竞争、瓶颈和次优性能。问题空间中的力量包括以下内容：
- en: '**Throughput versus fairness**: The system aims to maximize overall productivity
    by prioritizing idx_b4a633bdhigh-value tasks, but it must also prevent starvation
    where lower-priority agents never receive the resources they need to function.'
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**吞吐量与公平性**：该系统旨在通过优先处理高价值任务来最大化整体生产力，但同时也必须防止饥饿，即低优先级代理永远无法获得其正常运作所需的资源。'
- en: '**Centralized control versus overhead**: A central allocator provides a global
    view of priorities and ensures consistency, but it can become a performance bottleneck
    or a single point of failure as the number of agents and requests grows.'
  id: totrans-477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集中控制与开销**：中央分配器提供了一个全局的优先级视图并确保一致性，但随着代理和请求数量的增加，它可能成为性能瓶颈或单一故障点。'
- en: '**Predictability versus adaptability**: Fixed allocation rules are simple and
    predictable, but they often fail to account for dynamic shifts in task importance
    or sudden environmental changes that require immediate resource reallocation.'
  id: totrans-478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可预测性与适应性**：固定的分配规则简单且可预测，但它们往往无法考虑到任务重要性的动态变化或需要立即重新分配资源的突发环境变化。'
- en: Solution
  id: totrans-479
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: 'The ***Resource Allocation*** pattern idx_5f645893implements a mechanism to
    manage the distribution of resources. Key approaches include the following:'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: '**资源分配** 模式 idx_5f645893 实现了一种管理资源分配的机制。关键方法包括以下内容：'
- en: '**Centralized** **a****llocator**: A dedicated agent, such as a manager, that
    makes allocation decisions based on a global view of system priorities and resource
    availability.'
  id: totrans-481
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集中** **分配器**：一个专门的代理，如经理，根据对系统优先级和资源可用性的全局视图做出分配决策。'
- en: '**Auction** **m****echanisms**: Agents "bid" for resources using an internal
    currency or priority score, with the highest bidder winning the resource for a
    specified period. This approach is useful when the true value of a task can be
    quantified by the agents themselves.'
  id: totrans-482
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**拍卖** **机制**：代理使用内部货币或优先级分数“出价”获取资源，最高出价者赢得指定期限内的资源。当代理本身可以量化任务的真实价值时，这种方法很有用。'
- en: '**Fair** **d****ivision** **a****lgorithms**: In cases where fairness is paramount,
    algorithms can be used to idx_b229dfcdcalculate a probably fair distribution of
    resources, such as dividing the resource in a way that no agent envies the share
    of another.'
  id: totrans-483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公平** **分配** **算法**：在公平至关重要的场合，可以使用算法来 idx_b229dfcd 计算可能公平的资源分配，例如以某种方式分配资源，使得没有任何代理会羡慕另一个代理的份额。'
- en: 'Example: Autonomous robot allocation in a smart factory'
  id: totrans-484
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：智能工厂中的自主机器人分配
- en: A smart idx_a9927bfbfactory uses a limited fleet of **autonomous mobile** **r****obots**
    (**AMRs**) to transport materials. A central `AMR_DispatcherAgent` allocates these
    robots based on task priority to maximize factory output.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 一个智能工厂使用有限的**自主移动** **机器人**（AMRs）车队来运输材料。一个中央 `AMR_DispatcherAgent` 根据任务优先级分配这些机器人，以最大化工厂产出。
- en: The `ProductionLine_A_Agent` sends a `high-priority` request for an AMR to deliver
    a critical component, warning that a line stoppage is imminent.
  id: totrans-486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ProductionLine_A_Agent` 向 AMR 发送一个 `高优先级` 请求，以交付一个关键组件，并警告生产线即将停机。'
- en: The `WarehouseAgent` sends a `low-priority` request for an AMR to perform routine
    inventory cycle counting.
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`WarehouseAgent` 向 AMR 发送一个 `低优先级` 请求，以执行常规库存周期盘点。'
- en: The `ShippingAgent` sends a `medium-priority` request for an AMR to move finished
    goods to the loading dock for a shipment due in two hours.
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ShippingAgent` 向 AMR 发送一个 `中等优先级` 请求，以将成品移动到装货码头，以便两小时后发货。'
- en: The `AMR_DispatcherAgent` evaluates these competing requests. Based on its priority
    rules, it immediately assigns the next available AMR to the `ProductionLine_A_Agent`
    to prevent the costly line stoppage. It then allocates an AMR to the `ShippingAgent`
    to meet the shipment deadline. The `WarehouseAgent's` low-priority request is
    placed in a queue and will be fulfilled only when a robot becomes available, and
    no higher-priority tasks are pending.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: '`AMR_DispatcherAgent`评估这些竞争性请求。根据其优先级规则，它立即将下一个可用的AMR分配给`ProductionLine_A_Agent`以防止昂贵的生产线停工。然后，它将一个AMR分配给`ShippingAgent`以满足装运截止日期。`WarehouseAgent`的低优先级请求被放入队列，并且只有在机器人可用且没有更高优先级任务等待时才会得到满足。'
- en: 'This priority-based allocation workflow can be visualized as follows:'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 这个基于优先级的分配工作流程可以可视化如下：
- en: '![Image 12](img/B33147_5_12.png)'
  id: totrans-491
  prefs: []
  type: TYPE_IMG
  zh: '![图像 12](img/B33147_5_12.png)'
- en: Figure 5.12 – Resource Allocation
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.12 – 资源分配
- en: Example implementation
  id: totrans-493
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following idx_e2f9d9f1implementation demonstrates the ***Resource Allocation***
    pattern through an AMR dispatcher. In this advanced coordination (Level 5) scenario,
    the system manages a finite fleet of physical robots by processing incoming requests
    through a tiered priority queue.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 以下idx_e2f9d9f1实现通过AMR调度器展示了***资源分配***模式。在这个高级协调（第5级）场景中，系统通过处理通过分层优先级队列传入的请求来管理有限的物理机器人车队。
- en: The code illustrates how the `AMR_DispatcherAgent` acts as a centralized controller,
    evaluating the urgency of tasks from different departments, such as critical components
    for production versus routine inventory counts, and ensuring that the most impactful
    work is assigned to the next available robot. This approach effectively balances
    the competing needs of the factory idx_fc800df8floor while preventing resource
    contention and ensuring that system-wide goals, like avoiding a line stoppage,
    are always prioritized.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 代码展示了`AMR_DispatcherAgent`如何作为一个集中控制器，评估来自不同部门任务的紧迫性，例如生产中的关键组件与日常库存盘点相比，并确保最具影响力的工作分配给下一个可用的机器人。这种方法有效地平衡了工厂idx_fc800df8floor的竞争需求，同时防止资源争用并确保系统级目标，如避免生产线停工，始终得到优先考虑。
- en: '[PRE11]'
  id: totrans-496
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Consequences
  id: totrans-497
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Optimization**: Ensures idx_07821669scarce resources are directed toward
    the most critical tasks, maximizing the overall utility of the system rather than
    just satisfying the fastest agent'
  id: totrans-499
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化**：确保idx_07821669稀缺资源被引导到最关键的任务上，最大化系统的整体效用，而不仅仅是满足最快的代理'
- en: '**Stability**: Prevents resource contention, deadlocks, and race conditions
    that could lead to system crashes or unpredictable behavior'
  id: totrans-500
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**稳定性**：防止资源争用、死锁和可能导致系统崩溃或不可预测行为的竞争条件'
- en: '**Cons**:'
  id: totrans-501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Overhead**: The idx_ed7d5edaallocation process (whether a centralized calculation
    or a decentralized auction) introduces latency before a task can actually execute'
  id: totrans-502
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开销**：分配过程（无论是集中计算还是去中心化拍卖）在任务实际执行之前引入了延迟'
- en: '**Risk of** **s****tarvation**: Poorly designed allocation rules can result
    in low-priority agents never receiving the resources they need to function, requiring
    a safeguard'
  id: totrans-503
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**饥饿风险**：设计不当的分配规则可能导致低优先级代理永远无法获得其正常运作所需的资源，需要采取保护措施'
- en: Implementation guidance
  id: totrans-504
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: The logic for allocation must be transparent and explicit. Whether it's based
    on priority, bidding, or fairness, this clarity is key for debugging and explainability.
    In auction-based systems, the rules should be designed to encourage agents to
    bid their true value, a principle known as incentive compatibility.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 分配的逻辑必须透明且明确。无论基于优先级、竞标还是公平性，这种清晰度对于调试和可解释性至关重要。在基于拍卖的系统里，规则应设计成鼓励代理提出其真实价值，这一原则被称为激励兼容性。
- en: This prevents idx_20bb7dc4agents from misrepresenting their needs to gain an
    advantage. The allocation mechanism should also be able to adapt to changing conditions
    and preempt lower-priority tasks if a more critical task arises.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 这防止了idx_20bb7dc4代理为了获得优势而错误地表示其需求。分配机制还应能够适应变化的情况，并在出现更关键的任务时优先处理较低优先级任务。
- en: By implementing a clear resource allocation strategy, a multi-agent system can
    move beyond simple, often inefficient, contention. This ensures that critical
    system resources are used efficiently and are directed towards the most important
    tasks, improving overall system performance and aligning actions with global priorities.
    It provides a stable foundation for managing the operational costs and constraints
    of a complex agentic ecosystem.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施明确的资源分配策略，多智能体系统可以超越简单且通常低效的竞争。这确保了关键系统资源被高效地使用，并指向最重要的任务，从而提高整体系统性能并将行动与全球优先事项保持一致。它为管理复杂代理生态系统的运营成本和约束提供了一个稳定的基石。
- en: A robust resource allocation plan is essential for preventing one type of common
    conflict. However, disagreements in a multi-agent system can arise from more than
    just resource scarcity. Agents can develop plans or hold goals that are incompatible
    with one another, leading to potential deadlocks or unsafe conditions.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 一个稳健的资源分配计划对于防止一种常见的冲突是必不可少的。然而，多智能体系统中的分歧可能不仅仅源于资源稀缺。代理可以制定或持有相互不兼容的计划或目标，导致潜在的死锁或不安全条件。
- en: The next pattern, ***Conflict Resolution***, provides the necessary mechanisms
    to detect and mediate these direct clashes.
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个模式，**冲突解决**，提供了检测和调解这些直接冲突所需的机制。
- en: Conflict Resolution
  id: totrans-510
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 冲突解决
- en: As autonomous idx_e999b590agents pursue their objectives, it is inevitable that
    their paths will sometimes cross in a way that creates direct conflict. One agent's
    plan to move a robot arm into a specific position might clash with another's plan
    to use the same space.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 当自主代理idx_e999b590追求其目标时，它们不可避免地会在某些时候以创建直接冲突的方式交叉路径。一个代理将机器人臂移动到特定位置的计划可能与另一个代理使用相同空间的计划发生冲突。
- en: Two financial agents might generate opposing trade recommendations for the same
    stock. The ***Conflict Resolution*** pattern is critical for system stability,
    providing a structured framework to identify these points of contention and resolve
    them in a way that avoids system failure and aligns with the overarching goals
    of the system.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 两个金融代理可能会为同一股票生成相反的交易建议。**冲突解决**模式对于系统稳定性至关重要，它提供了一个结构化的框架来识别这些争议点并解决它们，以避免系统故障并符合系统的总体目标。
- en: Context
  id: totrans-513
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: In a multi-agent idx_3852f759system, two or more agents could have conflicting
    planned actions or goals. For example, two logistics agents might try to route
    their trucks through the same narrow street at the same time.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个多代理idx_3852f759系统中，两个或更多代理可能会有冲突的计划行为或目标。例如，两个物流代理可能会同时尝试将他们的卡车通过同一条狭窄的街道。
- en: Problem
  id: totrans-515
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can the idx_4f0c8462system resolve disagreements or conflicting plans between
    agents to avoid deadlocks, unsafe conditions, or suboptimal outcomes? Allowing
    agents to proceed with conflicting actions could lead to system failure, inefficient
    oscillations, or incoherent strategies. Forces in the problem space include the
    following:'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 系统如何解决代理之间的分歧或冲突计划，以避免死锁、不安全条件或次优结果？允许代理进行冲突行为可能导致系统故障、低效的振荡或不连贯的策略。问题空间中的力量包括以下内容：
- en: '**Safety versus operational speed**: Ensuring that no conflicting actions are
    taken prevents idx_7c42c31dsystem failures or physical damage, but the detection
    and resolution process adds latency that can slow down high-frequency operations.'
  id: totrans-517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性与操作速度**：确保不采取任何冲突行为可以防止系统故障或物理损坏，但检测和解决过程会增加延迟，可能会减慢高频操作。'
- en: '**Centralized authority versus distributed agility**: A supervisor can provide
    a decisive and consistent resolution, but relying on a central point of control
    can create a bottleneck that limits the responsiveness of the individual agents.'
  id: totrans-518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集中式权威与分布式敏捷性**：一位主管可以提供决定性和一致的解决方案，但依赖于一个控制中心可能会造成瓶颈，限制个别代理的响应能力。'
- en: '**Logical consistency versus goal attainment**: Resolving a conflict often
    requires at least one agent to abandon or modify its current plan, which may lead
    to suboptimal results for specific tasks in exchange for maintaining the integrity
    of the broader system.'
  id: totrans-519
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**逻辑一致性与目标达成**：解决冲突通常需要至少一个代理放弃或修改其当前计划，这可能会以牺牲特定任务的最优结果为代价，以保持更广泛系统的完整性。'
- en: Solution
  id: totrans-520
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Conflict Resolution*** pattern provides a structured mechanism for detecting
    and resolving conflicts. Rather idx_76d68ec4than letting agents get stuck, this
    pattern introduces a process for mediation. The choice of approach depends on
    the system's architecture, the nature of the conflict, and the need for either
    decisive, top-down control or more dynamic, emergent agreement.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: '**冲突解决**模式提供了一种结构化的机制来检测和解决冲突。而不是让代理陷入困境，这个模式引入了一个调解过程。选择哪种方法取决于系统的架构、冲突的性质以及需要决定性的、自上而下的控制或更动态、自发的协议的需求。'
- en: 'Let''s explore some common approaches:'
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨一些常见的方法：
- en: Hierarchical resolution
  id: totrans-523
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 层次化解决
- en: A designated **supervisor** or **orchestrator agent** has the authority to overrule
    conflicting agents and impose idx_ba35a08ba decision. This is the most direct
    approach, offering clear and predictable outcomes. It's particularly effective
    in systems where a global perspective is necessary and where clear lines of authority
    are established, mirroring a traditional management structure.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 指定的**监督者**或**协调代理**有权推翻冲突代理并强制idx_ba35a08ba做出决定。这是最直接的方法，提供明确和可预测的结果。它特别适用于需要全局视角和明确权力界限的系统，类似于传统的管理结构。
- en: This is often the default choice in enterprise applications where compliance,
    safety, and auditable decisions are paramount. The supervisor acts as a single
    point of truth, preventing the system from entering a state of indecision or deadlock.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 这通常是企业应用中的默认选择，在这些应用中，合规性、安全性和可审计的决定至关重要。监督者作为单一的真实点，防止系统陷入犹豫不决或僵局。
- en: Policy-based resolution
  id: totrans-526
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于策略的解决
- en: The system has a set of predefined policies or rules that automatically govern
    how certain types of idx_47406698conflicts are resolved. This is a highly reliable
    and auditable method. For instance, a policy might state that "safety-critical
    agents always have priority over efficiency-optimizing agents" or "agents handling
    customer-facing tasks take precedence over internal reporting agents."
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 该系统有一套预定义的政策或规则，自动规范如何解决某些类型的idx_47406698冲突。这是一个高度可靠且可审计的方法。例如，一项政策可能规定“安全关键型代理始终优先于效率优化型代理”或“处理面向客户任务的代理优先于内部报告代理。”
- en: The resolution is deterministic and consistent. This approach is powerful because
    it externalizes the decision-making logic, making it easier for humans to understand,
    modify, and audit the system's behavior without needing to understand the internal
    state of each individual agent.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案是确定性和一致的。这种方法之所以强大，是因为它将决策逻辑外部化，使得人类更容易理解、修改和审计系统的行为，而无需了解每个个别代理的内部状态。
- en: Negotiation
  id: totrans-529
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谈判
- en: The conflicting agents can enter into a **negotiation process** (using the **Negotiation**
    pattern) to find a idx_bc187c6amutually acceptable compromise. This bottom-up
    approach is suitable when there is room for a "win-win" or "less-lose" outcome
    and when agents have the sophistication to make concessions and evaluate counter
    offers.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突代理可以进入**谈判过程**（使用**谈判**模式）以找到双方都能接受的妥协。这种自下而上的方法适用于存在“双赢”或“少输”结果的空间，并且代理人有足够的复杂性做出让步和评估反要约。
- en: Instead of a top-down command, this method allows the agents directly involved
    in the conflict to find a solution that best aligns with their individual goals,
    within the constraints of the system. It fosters adaptability and can lead to
    more nuanced and creative solutions than a rigid, predefined policy.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 与自上而下的命令式方法不同，这种方法允许直接参与冲突的代理人在系统约束范围内找到与其个人目标最一致的解决方案。它促进了适应性，并能比僵化、预定义的政策带来更细致和创造性的解决方案。
- en: Game-theoretic resolution
  id: totrans-532
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 博弈论解决
- en: For highly idx_8fe99a88complex scenarios, the conflict can be modeled as a formal
    game. Each agent's potential actions are assigned payoffs or idx_579c8fe7costs,
    and the system can identify a stable outcome, such as a **Nash** **e****quilibrium**,
    where no agent can benefit by unilaterally changing its strategy.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 对于高度idx_8fe99a88复杂的场景，冲突可以被建模为一个正式的游戏。每个代理的可能行动都被分配了收益或idx_579c8fe7成本，系统可以确定一个稳定的结局，例如**纳什****e****quilibrium**，在这种状态下，没有任何代理能通过单方面改变其策略而受益。
- en: This approach is computationally intensive but can be used to design systems
    that are probably stable and align the self-interest of individual agents with
    global objectives. By formalizing the conflict, this method allows for a deeper
    level of analysis and can be used to engineer idx_695ff934systems where desirable
    cooperative behavior emerges naturally from the agents' rational pursuit of their
    own goals.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法计算密集，但可以用来设计可能稳定且将个体代理的自我利益与全球目标对齐的系统。通过正式化冲突，这种方法允许进行更深入的分析，并可用于设计 idx_695ff934系统，其中期望的合作行为自然地从代理对其自身目标的理性追求中产生。
- en: 'Example: Resolving an enterprise workflow conflict'
  id: totrans-535
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：解决企业工作流冲突
- en: 'In a loan idx_bc98a463processing system, two agents have conflicting goals:'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 在贷款 idx_bc98a463处理系统中，两个代理有冲突的目标：
- en: A `ThroughputAgent` is optimized to process as many loan applications as possible
    per hour to meet a business KPI for speed
  id: totrans-537
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ThroughputAgent` 优化以每小时处理尽可能多的贷款申请，以满足业务 KPI 的速度要求'
- en: A `FairnessAgent` is tasked with performing a computationally intensive analysis
    on application batches to check for demographic bias, which can slow down the
    process
  id: totrans-538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`FairnessAgent` 被委以对应用程序批次进行计算密集型分析的任务，以检查人口统计偏差，这可能会减慢处理过程。'
- en: A conflict arises when the `ThroughputAgent` attempts to push a batch of applications
    directly to the final approval stage to maintain its speed, while the `FairnessAgent`
    flags the same batch for a detailed review that will take 20 minutes.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 当 `ThroughputAgent` 尝试直接将一批应用程序推送到最终审批阶段以保持其速度时，`FairnessAgent` 会将该批次标记为需要详细审查，这将花费
    20 分钟。
- en: '**Conflict detection**: The `ThroughputAgent''s` plan to "advance batch to
    approval" and the `FairnessAgent''s` plan to "hold batch for fairness review"
    are logged as mutually exclusive actions in a central `SupervisorAgent`.'
  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**冲突检测**：`ThroughputAgent` 的“将批次推进审批”计划和 `FairnessAgent` 的“为公平审查保持批次”计划被记录为在中央
    `SupervisorAgent` 中的互斥操作。'
- en: '**Policy-****b****ased** **r****esolution:** The `SupervisorAgent` consults
    its internal policy framework. It finds a non-negotiable policy: `All loan batches
    must receive a FAIRNESS_PASSED status before proceeding to the approval stage.
    Compliance and ethical guidelines override speed-related KPIs.`'
  id: totrans-541
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于策略** **的** **解决方法**：`SupervisorAgent` 咨询其内部策略框架。它找到一个不可协商的政策：`所有贷款批次在进入审批阶段之前必须获得
    FAIRNESS_PASSED 状态。合规性和道德指南优先于与速度相关的 KPI。`'
- en: '**Resolution**: The `SupervisorAgent` invalidates the `ThroughputAgent''s`
    plan. It sends a directive to the `ThroughputAgent` to `Halt and await fairness
    check completion`. It then confirms to the `FairnessAgent` that it has priority
    to proceed with its analysis.'
  id: totrans-542
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解决方法**：`SupervisorAgent` 使 `ThroughputAgent` 的计划无效。它向 `ThroughputAgent` 发送指令，要求其
    `暂停并等待公平检查完成`。然后它向 `FairnessAgent` 确认它有优先权继续其分析。'
- en: '**Continuation:** Once the `FairnessAgent` completes its check and updates
    the batch status to `FAIRNESS_PASSED`, the `SupervisorAgent` then allows the `ThroughputAgent`
    to resume its task.'
  id: totrans-543
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**继续**：一旦 `FairnessAgent` 完成检查并将批次状态更新为 `FAIRNESS_PASSED`，`SupervisorAgent`
    然后允许 `ThroughputAgent` 恢复其任务。'
- en: '![Image 13](img/B33147_5_13.png)'
  id: totrans-544
  prefs: []
  type: TYPE_IMG
  zh: '![图像 13](img/B33147_5_13.png)'
- en: Figure 5.13 – Conflict Resolution workflow
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.13 – 冲突解决工作流程
- en: Example implementation
  id: totrans-546
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: 'The following implementation demonstrates the ***Conflict Resolution*** pattern
    within an enterprise idx_21167c44loan processing system. In this example, the
    SupervisorAgent acts as a mediator between two agents with opposing objectives:
    one focused on maximizing throughput and another focused on ensuring demographic
    fairness.'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 以下实现演示了在企业 idx_21167c44贷款处理系统中的 ***冲突解决** *模式。在这个例子中，`SupervisorAgent` 作为两个具有对立目标的代理之间的调解人：一个专注于最大化吞吐量，另一个专注于确保人口统计公平性。
- en: The code illustrates a policy-based resolution approach where the supervisor
    evaluates the proposed plans against a non-negotiable compliance framework. By
    invalidating the high-speed plan in favor of the fairness review, the system ensures
    that ethical guidelines are upheld without the agents needing to understand the
    broader corporate policy themselves. This centralized mediation prevents the system
    from entering a state of logical inconsistency or proceeding with an unvetted
    decision.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 代码说明了基于策略的解决方法，其中主管评估提出的计划与不可协商的合规框架。通过优先考虑公平审查而不是高速计划，系统确保了道德指南得到遵守，而无需代理自己理解更广泛的公司政策。这种集中调解防止系统进入逻辑不一致的状态或继续进行未经审查的决定。
- en: '[PRE12]'
  id: totrans-549
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Consequences
  id: totrans-550
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-551
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Coherence**: Ensures idx_f8983612that the system does not end up in a contradictory
    or deadlock state, maintaining the integrity of the overall operation'
  id: totrans-552
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致性**：确保系统不会陷入矛盾或死锁状态，保持整体操作的完整性'
- en: '**Safety**: Prevents dangerous situations where agents might inadvertently
    interfere with each other (e.g., physical robot collisions or logical data corruption)'
  id: totrans-553
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**：防止智能体意外相互干扰的危险情况（例如，物理机器人碰撞或逻辑数据损坏）'
- en: '**Cons**:'
  id: totrans-554
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Latency**: Conflict detection and resolution introduce a computational overhead
    that can slow down the system''s response time'
  id: totrans-555
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：冲突检测和解决引入了计算开销，可能会减慢系统的响应时间'
- en: '**Complexity**: Designing robust policies or negotiation protocols for every
    possible conflict scenario significantly increases the engineering effort'
  id: totrans-556
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性**：为每个可能的冲突场景设计稳健的政策或协商协议会显著增加工程工作量'
- en: Implementation guidance
  id: totrans-557
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: The success idx_7304b86aof any conflict resolution strategy hinges on a few
    core principles that ensure a system's stability and trustworthiness. These principles
    aren't just technical details; they are foundational to designing a resilient
    multi-agent system.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 任何冲突解决策略的成功都取决于几个核心原则，这些原则确保了系统的稳定性和可靠性。这些原则不仅仅是技术细节；它们是设计一个具有弹性的多智能体系统的基石。
- en: 'Conflict detection: the first step'
  id: totrans-559
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 冲突检测：第一步
- en: Before a idx_343af36fconflict can be resolved, it must first be detected. This
    is a critical and often underappreciated part of the process. It's like having
    an early warning system. The most straightforward approach is to have a centralized
    supervisor agent that monitors all agent actions and plans.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 在冲突得到解决之前，必须首先检测到它。这是过程中的一个关键部分，但往往被低估。这就像有一个早期预警系统。最直接的方法是有一个集中式管理者智能体，它监控所有智能体的行动和计划。
- en: For example, if two agents register a plan to use the same finite resource,
    the supervisor can immediately idx_164a2787flag the conflict. Other methods include
    using resource locking mechanisms, where an agent "locks" a resource it intends
    to use, or requiring agents to register their intended actions in a shared space
    before execution.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果两个智能体注册了使用同一有限资源的计划，管理者可以立即 idx_164a2787标记冲突。其他方法包括使用资源锁定机制，其中智能体“锁定”它打算使用的资源，或者要求智能体在执行前在一个共享空间中注册它们的预期行为。
- en: 'Explainable resolutions: the audit trail'
  id: totrans-562
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可解释的解决方案：审计跟踪
- en: When a conflict is resolved, it's not enough for the system to simply proceed.
    The reasoning behind the idx_bca83ce3decision must be logged. An audit trail is
    essential for debugging, compliance, and building trust in the system. The log
    should clearly state why a particular resolution was chosen.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 当冲突得到解决时，系统仅仅继续进行是不够的。决策背后的 idx_bca83ce3理由必须被记录。审计跟踪对于调试、合规性和建立对系统的信任至关重要。日志应清楚地说明为什么选择了特定的解决方案。
- en: 'For example: "Agent B''s plan was approved over Agent A''s because policy [number]
    states that safety-critical tasks have priority over all others." This transparency
    allows a human operator to understand the system''s behavior and verify that it''s
    operating as intended.'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：“智能体B的计划被批准，因为政策[编号]规定，安全关键任务优先于所有其他任务。”这种透明度允许人类操作员理解系统的行为，并验证它是否按预期运行。
- en: 'Defined escalation paths: human-in-the-loop'
  id: totrans-565
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义升级路径：人工介入
- en: In an ideal world, all conflicts would be resolved automatically. In reality,
    there will always be critical, unforeseen idx_b6584db3scenarios where the system's
    automated mechanisms fail or cannot reach a conclusion. For these situations,
    there must be a clear and reliable escalation path.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 在理想的世界里，所有冲突都会自动解决。在现实中，总会有一些关键、不可预见 idx_b6584db3的情况，系统的自动化机制会失败或无法得出结论。对于这些情况，必须有明确且可靠的升级路径。
- en: The ultimate fallback in enterprise systems is almost always a human-in-the-loop,
    a human operator who can review the context of the conflict and provide a final
    judgment. The system should be designed to hand off all necessary information
    to the human for a quick, informed decision.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 企业系统中的最终后备方案几乎总是需要人工介入，即一个可以审查冲突背景并做出最终判断的人类操作员。系统应该设计成将所有必要信息传递给人类，以便做出快速、明智的决定。
- en: 'Simulate to understand: testing for resilience'
  id: totrans-568
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过模拟来理解：测试弹性
- en: Before deploying a multi-agent system, especially one using complex negotiation
    or game-theoretic idx_f22961a3models, it is crucial to simulate agent interactions
    under a wide variety of conditions.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 在部署多智能体系统之前，特别是使用复杂的协商或博弈论模型的多智能体系统，在广泛的各种条件下模拟智能体之间的交互至关重要。
- en: This practice helps to stress-test the conflict resolution strategies and identify
    potential deadlocks or undesirable emergent behaviors. By simulating conflicts
    and their resolutions in a safe environment, developers can fine-tune the system's
    policies and protocols, ensuring it will maintain coherence and stability when
    faced with real-world challenges.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 这种实践有助于测试冲突解决策略，并识别潜在的僵局或不良的涌现行为。通过在一个安全的环境中模拟冲突及其解决，开发者可以微调系统的政策和协议，确保在面对现实世界挑战时，系统能够维持一致性和稳定性。
- en: The foundation for coherence and stability
  id: totrans-571
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一致性和稳定性的基础
- en: Clear protocols are needed for resolving conflicts in a multi-agent system so
    the overall system can idx_621118acmaintain its coherence and stability even when
    its constituent agents have divergent goals, opinions, or draw opposite conclusions.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 在多智能体系统中，需要明确的协议来解决冲突，以确保整体系统能够在构成其的智能体具有不同的目标、观点或得出相反结论的情况下，维持其一致性和稳定性。
- en: This prevents costly deadlocks and ensures that the system can continue to operate
    effectively, making decisions that align with global priorities rather than getting
    stuck in internal disputes. It is a fundamental pattern for building resilient
    systems that can gracefully handle the natural friction that arises in any complex,
    decentralized environment.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以防止代价高昂的僵局，并确保系统可以继续有效地运行，做出符合全局优先级的决策，而不是陷入内部争端。这是构建能够优雅地处理任何复杂、去中心化环境中自然产生的摩擦的弹性系统的基本模式。
- en: It is crucial to resolve logical conflicts and manage resources to ensure agents
    can work together on abstract tasks. However, coordination challenges are not
    always about goals or data; sometimes they are about the physical (or logical)
    arrangement of the agents themselves. In domains such as robotics or complex simulations,
    the ability of a group of agents to act as a cohesive unit with a specific structure,
    such as a swarm, is important to the success of the project.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 解决逻辑冲突和管理资源以确保智能体能够一起在抽象任务上工作至关重要。然而，协调挑战并不总是关于目标或数据；有时它们是关于智能体本身的物理（或逻辑）排列。在机器人技术或复杂模拟等领域，一组智能体能够作为一个具有特定结构（如蜂群）的统一整体行动的能力，对于项目的成功至关重要。
- en: This is where the ***Formation Control*** pattern becomes essential.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**形成控制**模式变得至关重要的地方。
- en: Formation Control
  id: totrans-576
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 形成控制
- en: The ***Formation Control*** pattern is a design principle for collective movement
    and spatial organization idx_89536e6cin a group of agents. Unlike patterns that
    manage abstract tasks or resources, this pattern is specifically for scenarios
    where a group of agents must maintain a defined physical or logical structure
    relative to one another while moving through an environment.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: '**形成控制**模式是一种集体移动和空间组织的设计原则，用于一组智能体。与处理抽象任务或资源的模式不同，这个模式专门用于一组智能体必须在一个环境中移动时保持相对于彼此的特定物理或逻辑结构的情况。'
- en: It enables a "swarm" or "squad" of agents to act as a single, coordinated entity,
    fluidly reacting to changes without a centralized controller.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 它使一群智能体能够作为一个单一、协调的实体行动，流畅地应对变化，而不需要一个集中的控制器。
- en: Context
  id: totrans-579
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: The system idx_ac27e904involves a group of agents that need to maintain a specific
    physical or logical structure relative to each other while moving or acting in
    an environment. This is common in robotics, complex simulations, and scenarios
    where a unified, collective action is required.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 该系统涉及一组智能体，这些智能体在移动或在一个环境中行动时需要保持相对于彼此的特定物理或逻辑结构。这在机器人技术、复杂模拟和需要统一、集体行动的场景中很常见。
- en: Problem
  id: totrans-581
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'How can a idx_dcbdbcc1group of agents dynamically maintain a collective formation
    without a rigid, centralized controller dictating the exact position of each agent?
    Relying on a single leader creates a single point of failure and struggles to
    adapt to obstacles or environmental changes. This can lead to collisions, a broken
    formation, or inefficient navigation. Forces in the problem space include the
    following:'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使一群代理动态地维持集体编队，而不需要一个刚性的、集中的控制器来指定每个代理的确切位置？依赖单个领导者会创建一个单点故障，并且难以适应障碍物或环境变化。这可能导致碰撞、编队损坏或导航效率低下。问题空间中的力量包括以下内容：
- en: '**Global coherence versus local sensing**: The swarm needs to maintain a specific
    global shape, but individual agents often only have access to information about
    their idx_196af0b0immediate neighbors, which makes maintaining a perfect formation
    over a large group difficult.'
  id: totrans-583
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全局一致性 versus 局部感知**：编队需要保持特定的全局形状，但个体代理通常只能访问其直接邻居的信息，这使得在大型群体中保持完美的编队变得困难。'
- en: '**Structural rigidity versus obstacle avoidance**: The group must remain in
    a predefined formation to fulfill its objective, but individual agents must also
    be free to deviate from that structure to navigate around environmental hazards
    or avoid collisions.'
  id: totrans-584
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构刚性 versus 避障**：编队必须保持在预定义的编队中以满足其目标，但个体代理也必须能够从该结构中偏离，以绕过环境危害或避免碰撞。'
- en: '**Communication latency versus synchronization speed**: Precise formation control
    requires rapid updates between agents to maintain alignment, but high-frequency
    communication can saturate a network or increase the power consumption of battery-operated
    agents, such as drones or mobile robots.'
  id: totrans-585
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通信延迟 versus 同步速度**：精确的编队控制需要代理之间快速更新以保持对齐，但高频通信可能会饱和网络或增加电池供电代理（如无人机或移动机器人）的功耗。'
- en: Solution
  id: totrans-586
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Formation Control*** pattern enables a group of agents to self-organize
    by decentralizing the control logic. The core idea is that each agent makes decisions
    based on the positions and states of its idx_58eff22eimmediate neighbors, rather
    than following commands from a central leader. Each agent is programmed with a
    simple set of control laws that dictate its desired distance and bearing from
    its designated neighbors. This approach allows the formation to adapt fluidly
    to obstacles and environmental changes, as each agent's localized reaction cascades
    through the formation, causing a collective, emergent response.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: '**编队控制**模式通过分散控制逻辑使一群代理能够自我组织。核心思想是每个代理基于其直接邻居的位置和状态做出决策，而不是遵循来自中央领导者的命令。每个代理都被编程了一个简单的控制规则集，该规则集规定了其与指定邻居之间的期望距离和方位。这种方法允许编队灵活地适应障碍物和环境变化，因为每个代理的局部反应通过编队级联，导致集体、涌现的反应。'
- en: 'Example: Agricultural drone swarm'
  id: totrans-588
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：农业无人机编队
- en: Imagine a idx_64dc4c51fleet of agricultural drones tasked with spraying a large
    field in a precise grid formation to ensure even coverage.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一支农业无人机编队，其任务是精确地以网格编队在大片田野上喷洒农药，以确保均匀覆盖。
- en: '**Formation** **r****ule**: Each drone is programmed with a simple rule: `Maintain
    a position 10 meters to the right of your left neighbor and directly aligned with
    your forward neighbor.`'
  id: totrans-590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编队** **规则**：每架无人机都被编程了一个简单的规则：`保持在你左邻10米的位置，并与你的前方邻居直接对齐。`'
- en: '**Coordinated** **m****ovement**: As the lead drone moves forward, each drone
    in the swarm follows, constantly adjusting its own speed and position based on
    its neighbors'' locations to maintain the grid.'
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**协调** **移动**：随着领航无人机向前移动，编队中的每架无人机都跟随，不断调整自己的速度和位置，基于其邻居的位置以保持网格。'
- en: '**Dynamic** **a****daptation**: `Drone_C`, in the middle of the formation,
    detects a tree directly in idx_f96c53c5its path. It autonomously executes an avoidance
    maneuver, slowing down and flying around the obstacle.'
  id: totrans-592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**动态** **适应**：位于编队中间的无人机`Drone_C`在其路径上直接检测到一棵树。它自主执行规避机动，减速并绕过障碍物飞行。'
- en: '**Self-****o****rganization**: The drones immediately neighboring `Drone_C`
    sense its change in position. `Drone_B` (to its left) and `Drone_D` (to its right)
    reduce their speed to avoid a collision. The drone behind `Drone_C` also slows
    down to maintain spacing.'
  id: totrans-593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自我** **组织**：紧邻`Drone_C`的无人机感知到其位置的变化。`Drone_B`（在其左侧）和`Drone_D`（在其右侧）减速以避免碰撞。在`Drone_C`后面的无人机也减速以保持间距。'
- en: '**Re-formation**: Once `Drone_C` has cleared the obstacle, it accelerates back
    to its designated position. Its neighbors sense this correction and adjust their
    own speeds to seamlessly re-establish the perfect formation, all without any central
    command.'
  id: totrans-594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新编队**：一旦`Drone_C`清除了障碍，它就会加速回到其指定的位置。其邻居感知到这种纠正并调整自己的速度，无缝地重新建立完美的编队，这一切都不需要任何中央命令。'
- en: 'The core logic loop for any single agent within this formation can be visualized
    in the following diagram:'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 该编队中任何单个代理的核心逻辑循环可以在以下图中可视化：
- en: '![Image 14](img/B33147_5_14.png)'
  id: totrans-596
  prefs: []
  type: TYPE_IMG
  zh: '![图像14](img/B33147_5_14.png)'
- en: Figure 5.14 – A single agent's control loop for Formation Control
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.14 – 编队控制的单个代理控制循环
- en: Example implementation
  id: totrans-598
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following implementation demonstrates the ***Formation Control*** pattern
    through a simplified idx_d4da2231drone swarm simulation. In this example, each
    `DroneAgent` operates using a decentralized control loop, where its movement is
    determined by a fixed offset from a designated neighbor.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 以下实现通过简化的idx_d4da2231无人机集群模拟演示了***编队控制***模式。在这个例子中，每个`DroneAgent`使用去中心化的控制循环运行，其移动由相对于指定邻居的固定偏移量决定。
- en: The code illustrates how a collective structure emerges from local rules rather
    than a central command. Each agent continuously senses its neighbor's position,
    calculates its own desired coordinates based on a predefined offset, and applies
    velocity adjustments to correct any errors. This localized approach allows the
    entire formation to remain fluid and resilient, as the swarm can adapt to individual
    deviations or environmental shifts without the need for a global path planner.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 代码说明了集体结构是如何从局部规则而不是中央命令中产生的。每个代理持续感知其邻居的位置，根据预定义的偏移量计算自己的期望坐标，并应用速度调整来纠正任何错误。这种局部化的方法使得整个编队保持流动性和弹性，因为集群可以适应个体的偏差或环境变化，而无需全局路径规划者。
- en: '[PRE13]'
  id: totrans-601
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Consequences
  id: totrans-602
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-603
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Scalability**: The formation can grow to include hundreds or thousands of
    agents idx_bcaf9515without increasing the computational load on any single controller,
    as decisions are local'
  id: totrans-604
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：编队可以扩展到包括数百或数千个代理idx_bcaf9515，而不会增加任何单个控制器的计算负载，因为决策是局部的'
- en: '**Resilience**: The system is robust to the failure of individual agents; if
    one drops out, the neighbors naturally close the gap'
  id: totrans-605
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弹性**：系统对单个代理的故障具有鲁棒性；如果其中一个代理掉队，邻居会自然地关闭差距'
- en: '**Cons**:'
  id: totrans-606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Local** **o****ptima**: Agents acting on local information may get stuck
    in complex obstacles (such as a cul-de-sac) that a global planner would easily
    avoid'
  id: totrans-607
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**局部** **最优**：仅基于局部信息的代理可能会陷入复杂障碍（如死胡同），而全局规划者可以轻易避开这些障碍'
- en: '**Stability** **r****isks**: Poorly tuned control laws can lead to oscillation,
    where agents continuously over-correct their positions, causing the formation
    to jitter'
  id: totrans-608
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**稳定性** **风险**：控制法则调校不当可能导致振荡，其中代理持续过度纠正其位置，导致编队抖动'
- en: Implementation guidance
  id: totrans-609
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: To successfully implement the ***Formation Control*** pattern, several technical
    considerations must be addressed, starting with the requirement for neighbor discovery.
    Agents need a reliable idx_3df8d9e1mechanism to identify and track the state of
    their relevant peers, which can be achieved through direct, low-latency communication,
    such as a local mesh network, or by observing a shared state representation. The
    core of the pattern lies in the control laws, the specific rules that govern how
    an agent adjusts its position relative to others. These laws must be carefully
    designed using principles from control theory to ensure the formation remains
    stable and does not oscillate or break apart under stress. Finally, the use of
    simulations is essential for testing and refining these control laws prior to
    deployment in a physical environment, providing a safe and cost-effective way
    to iterate on the collective behavior.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功实施***编队控制***模式，必须解决几个技术问题，首先是邻居发现的需求。代理需要一个可靠的idx_3df8d9e1机制来识别和跟踪其相关同伴的状态，这可以通过直接、低延迟的通信实现，例如本地网状网络，或者通过观察共享状态表示。该模式的核心在于控制法则，即特定规则，它规定了代理如何相对于其他代理调整其位置。这些法则必须使用控制理论的原则仔细设计，以确保编队保持稳定，并在压力下不会振荡或解体。最后，在物理环境中部署之前，使用模拟来测试和改进这些控制法则是必不可少的，这提供了一种安全且成本效益高的方法来迭代集体行为。
- en: With the ***Formation Control*** pattern, we conclude our exploration of the
    fundamental patterns of multi-agent coordination. We have journeyed from high-level
    task delegation and planning to the intricate dynamics of negotiation, resource
    management, and now, spatial organization.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 通过***形成控制***模式，我们结束了对多智能体协调基本模式的探索。我们从高级任务委派和规划出发，经历了协商、资源管理和现在，空间组织的复杂动态。
- en: Now, let's step back and summarize the key lessons from this chapter.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们回顾本章的关键教训。
- en: Summary
  id: totrans-613
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter explored the essential patterns that enable multiple autonomous
    agents to work together as a cohesive and intelligent system. We established that
    moving from a single agent to a multi-agent system introduces a new layer of complexity
    that requires structured solutions for collaboration, competition, and communication.
    These patterns provide the architectural blueprints for building robust, scalable,
    and coherent multi-agent systems. We not only detailed these individual patterns
    but also contextualized them within the GenAI Maturity Model, showing how their
    application evolves as systems advance from foundational to autonomous.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了使多个自主智能体能够作为一个统一且智能的系统一起工作的基本模式。我们确定，从单一智能体到多智能体系统的转变引入了一个新的复杂性层次，需要结构化的解决方案来处理协作、竞争和通信。这些模式为构建健壮、可扩展和一致的多智能体系统提供了建筑蓝图。我们不仅详细介绍了这些个别模式，还把它们置于GenAI成熟度模型中，展示了它们的应用如何随着系统从基础层向自主层的发展而演变。
- en: We began by establishing the high-level ***Task Delegation Frameworks*** (***Supervisor***
    versus ***Swarm***) and explored specific ***Agent Composition Topologies***,
    such as the ***Blackboard*** for shared knowledge evolution, ***Contract-Net***
    for market-based task allocation, and ***Supervision Trees*** for fault tolerance.
    From there, we delved into the specific mechanisms of collaboration, including
    ***Multi-Agent Planning*** for task decomposition, ***Knowledge Sharing*** to
    create collective intelligence, and ***Tool Routing***for managing capabilities.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先建立了高级***任务委派框架***（***监督者***与***蜂群***）并探讨了具体的***智能体组成拓扑结构***，例如用于共享知识演化的***黑板***、基于市场的任务分配的***合同网***和用于容错性的***监督树***。从那里，我们深入探讨了协作的具体机制，包括用于任务分解的***多智能体规划***、用于创建集体智慧的***知识共享***以及用于管理能力的***工具路由***。
- en: The discussion then shifted to managing the natural friction that arises in
    any distributed system. We explored a suite of patterns designed to handle disagreement
    and competition gracefully, including ***Consensus***, ***Negotiation***, ***Resource
    Allocation***, and ***Conflict Resolution***. Finally, we examined the ***Formation
    Control*** pattern for systems requiring spatial coordination.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的讨论转向了管理任何分布式系统中出现的自然摩擦。我们探索了一系列旨在优雅地处理分歧和竞争的图案，包括***共识***、***协商***、***资源分配***和***冲突解决***。最后，我们考察了需要空间协调的系统所采用的***形成控制***图案。
- en: 'The key takeaways are as follows:'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点如下：
- en: '**Coordination is architected, not assumed**: Effective multi-agent systems
    are built on a foundation of explicit coordination patterns that define how they
    delegate tasks, plan, and interact.'
  id: totrans-618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调是架构化的，而非假设的**：有效的多智能体系统建立在一组明确的协调模式之上，这些模式定义了它们如何委派任务、规划和交互。'
- en: '**Frameworks and** **t****opologies dictate control flow**: The choice of architecture—whether
    a centralized ***Supervisor***, a decentralized ***Swarm***, or a specialized
    topology such as a ***Blackboard***—shapes the system''s balance between predictability
    and adaptability.'
  id: totrans-619
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**框架和拓扑结构决定了控制流**：架构的选择——无论是集中式的***监督者***、去中心化的***蜂群***还是如***黑板***这样的专用拓扑结构——塑造了系统在可预测性和适应性之间的平衡。'
- en: '**Collaboration requires shared context**: Agents need both a shared plan (***Multi-Agent
    Planning***) and a shared pool of knowledge (***Knowledge Sharing***) to work
    together effectively and improve as a collective over time.'
  id: totrans-620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协作需要共享的上下文**：智能体需要共享的计划（***多智能体规划***）和共享的知识库（***知识共享***）才能有效地一起工作，并在时间上作为一个集体不断改进。'
- en: '**Protocols for disagreement are essential**: To prevent chaos and deadlock,
    systems need structured patterns for managing competition, including ***Consensus***
    for agreeing on facts, ***Negotiation*** for resolving goal conflicts, and ***Conflict
    Resolution*** for handling direct clashes.'
  id: totrans-621
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不一致性协议至关重要**：为了防止混乱和死锁，系统需要结构化的模式来管理竞争，包括就事实达成一致的***共识***，解决目标冲突的***谈判***，以及处理直接冲突的***冲突解决***。'
- en: '**Coordination extends to execution and environment**: Effective coordination
    goes beyond abstract planning to include concrete actions, such as managing which
    agent uses which tool (***Tool Routing***) and how they are physically or logically
    arranged (***Formation Control***).'
  id: totrans-622
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调扩展到执行和环境**：有效的协调不仅限于抽象规划，还包括具体行动，例如管理哪个智能体使用哪种工具（***工具路由***）以及它们如何物理或逻辑地排列（***编队控制***）。'
- en: '**An evolutionary approach to coordination:** The choice and complexity of
    coordination patterns directly map to a system''s maturity. Foundational multi-agent
    systems (Level 4) rely on centralized, predictable patterns like the ***Supervisor***,
    while advanced and self-correcting systems (Levels 5–6) require dynamic and decentralized
    patterns such as ***Negotiation***, ***Consensus***, and meta-agents to manage
    emergent behavior.'
  id: totrans-623
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调的进化方法**：协调模式的选择和复杂性直接映射到系统的成熟度。基础多智能体系统（第4级）依赖于集中式、可预测的模式，如***监督者***，而高级和自我纠正的系统（第5-6级）则需要动态和去中心化的模式，如***谈判***、***共识***和元智能体来管理涌现行为。'
- en: By thoughtfully applying these coordination patterns, developers can build sophisticated
    multi-agent systems that are far more capable than the sum of their individual
    parts, enabling them to tackle complex, real-world challenges in a robust, scalable,
    and intelligent manner.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 通过深思熟虑地应用这些协调模式，开发者可以构建比各个部分总和更强大的复杂多智能体系统，使他们能够以稳健、可扩展和智能的方式应对复杂、现实世界的挑战。
- en: Having explored the essential patterns for coordinating the actions of multiple
    agents, we have a solid foundation for building systems that can collectively
    tackle complex problems. We now know how to make them plan, share knowledge, and
    resolve conflicts.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索了协调多个智能体行动的基本模式之后，我们为构建能够集体解决复杂问题的系统打下了坚实的基础。我们现在知道如何让它们制定计划、共享知识和解决冲突。
- en: However, creating a system that is merely effective is not enough for production-grade,
    enterprise environments. We must also ensure that these autonomous systems are
    transparent, auditable, and operate within strict ethical and regulatory boundaries.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，仅仅创建一个有效的系统对于生产级和企业环境来说是不够的。我们还必须确保这些自主系统是透明的、可审计的，并且在其严格的伦理和监管边界内运行。
- en: In the next chapter, we will shift our focus from coordination to accountability,
    exploring the critical patterns that make agentic systems trustworthy.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将重点从协调转移到问责制，探讨使智能体系统值得信赖的关键模式。
