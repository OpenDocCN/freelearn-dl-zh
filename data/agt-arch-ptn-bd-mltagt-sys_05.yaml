- en: Part 2
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分
- en: 'Agentic AI: Architecture and Design Patterns'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理人工智能：架构和设计模式
- en: In this part, you will transition from foundational concepts to the hands-on
    engineering of robust agentic architectures. You will master a comprehensive pattern
    language required to build production-grade systems, moving beyond simple prompts
    to designing complex, autonomous ecosystems. We will begin by exploring the core
    anatomy of an agent and then delve into essential design patterns for multi-agent
    coordination, explainability, fault tolerance, and seamless human-agent interaction.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本部分，你将过渡到从基础概念到稳健的代理架构的动手工程实践。你将掌握构建生产级系统所需的综合模式语言，从简单的提示过渡到设计复杂、自主的生态系统。我们将从探索代理的核心结构开始，然后深入探讨多代理协调、可解释性、容错性和无缝人机交互的基本设计模式。
- en: Through this progressive series of chapters, you will learn how to architect
    systems that are not only intelligent but also reliable, compliant, and scalable.
    We will cover specific patterns for individual agent capabilities, holistic system-level
    infrastructure, and advanced adaptation techniques for building agents that can
    self-improve. By the end of this part, you will possess a library of proven blueprints—the
    "physics" of agentic systems—ready to be applied to any domain or use case.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这一系列章节的逐步学习，你将了解如何构建既智能又可靠、合规和可扩展的系统。我们将涵盖针对单个代理能力的特定模式、整体系统级基础设施，以及构建能够自我改进的代理的高级适应技术。到本部分结束时，你将拥有一系列经过验证的蓝图——代理系统的“物理学”——可以应用于任何领域或用例。
