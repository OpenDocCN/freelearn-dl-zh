- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: 'From Metrics to Measurement: Experimentation and Causal Inference'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从指标到测量：实验和因果推断
- en: 'In the previous two chapters, we established the foundational framework for
    *what to measure* and also explored *how* to build and operationalize the ML systems
    that deliver our products. Now, we should bridge the gap between deployment and
    value. This chapter addresses the most critical question in any business: “Did
    the ML system do what it was intended to do?”'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在前两章中，我们建立了衡量“什么”的基础框架，并探讨了如何构建和运营交付我们产品的机器学习系统。现在，我们应该弥合部署和价值之间的差距。本章解决了任何业务中最关键的问题：“机器学习系统是否做到了它打算做的事情？”
- en: Answering this question is the science of causal inference. It’s the set of
    tools that allows us to move beyond simple correlation (“Our ecommerce sales went
    up after we launched the credit card feature”) to causation (“Our ecommerce sales
    went up *because* we launched the credit card feature”).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 回答这个问题是因果推断的科学。它是一套工具，使我们能够超越简单的相关性（“我们在推出信用卡功能后，电子商务销售额上升了”）到因果关系（“我们的电子商务销售额上升是因为我们推出了信用卡功能”）。
- en: 'Without rigorous measurement, it is impossible to determine whether changes
    lead to meaningful improvements or are simply due to random chance or other external
    factors. This chapter explores the three families of measurement methods: the
    gold-standard randomized control trials, the clever observational methods used
    when experiments aren’t possible, and the new, powerful advanced ML models that
    handle complex, high-dimensional data.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 没有严格的测量，无法确定变化是否导致了有意义的改进，或者仅仅是随机机会或其他外部因素的结果。本章探讨了三种测量方法的家庭：黄金标准的随机对照试验、当实验不可行时使用的巧妙观察方法，以及处理复杂、高维数据的新的、强大的高级机器学习模型。
- en: 'The following key topics will be covered:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 以下关键主题将涵盖：
- en: Randomized control trials – the gold standard with limitations
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机对照试验 - 具有局限性的黄金标准
- en: Why can’t we just use machine learning?
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么我们不能仅仅使用机器学习？
- en: Observational methods – statistical approaches
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观察方法 - 统计方法
- en: Observational methods – advanced ML models for causal inference
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观察方法 - 用于因果推断的高级机器学习模型
- en: Randomized control trials – the gold standard with limitations
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 随机对照试验 - 具有局限性的黄金标准
- en: '**Randomized control trials** ( **RCTs** ), also known as A/B tests, are considered
    the gold standard for measuring the impact of interventions by randomly assigning
    users to control and treatment groups.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**随机对照试验**（**RCTs**），也称为A/B测试，被认为是通过随机分配用户到控制组和处理组来衡量干预措施影响的黄金标准。'
- en: What is A/B testing?
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是A/B测试？
- en: 'An A/B test, or RCT, is an experiment where a population of customers is randomly
    split into two or more groups: a control group (group A) that receives the existing
    experience, and one or more treatment groups (group B, C, etc.) that receive a
    new version of that experience (e.g., a new feature, a different ML model, or
    a new UI).'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试，或RCT，是一种实验，其中客户群体被随机分成两个或多个组：一个控制组（A组）接受现有的体验，一个或多个处理组（B组、C组等）接受该体验的新版本（例如，新功能、不同的机器学习模型或新的用户界面）。
- en: Why is A/B testing important? It is the gold standard for measuring impact.
    By randomizing, we ensure that the *only* systematic difference between the groups
    is the change we introduced. This eliminates selection bias and other confounding
    factors, allowing us to confidently state that any observed difference in metrics
    is *caused* by our change.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么A/B测试很重要？它是衡量影响的黄金标准。通过随机化，我们确保组间唯一的系统性差异是我们引入的变化。这消除了选择偏差和其他混杂因素，使我们能够自信地声明，任何观察到的指标差异都是我们变化的结果。
- en: Its key benefit includes a direct, unbiased measure of causal impact.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 其关键好处包括因果影响的直接、无偏测量。
- en: 'Here are some fundamentals to note:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些基本要点需要注意：
- en: '**Control versus treatment groups** : The control is the baseline; the treatment
    is the change. The comparison between these two groups is the core idea we want
    to measure.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**控制组与处理组**：控制是基线；处理是变化。这两个组之间的比较是我们想要衡量的核心思想。'
- en: '**Hypothesis-driven testing** : Every test must begin with a clear hypothesis.
    For example: “We believe that *bringing a Personalized ML Model in the journey
    of user cohort in Item Page (the change) will increase the add-to-cart rate* (the
    metric) for *new users on mobile* (the population) because *it improves purchase
    relevance with personalized targeting* (the rationale).”'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于假设的测试**：每个测试都必须从明确的假设开始。例如：“我们相信，*在商品页面用户群体旅程中引入个性化ML模型（变化）将增加移动新用户的*添加到购物车率*（指标），因为*它通过个性化定位提高了购买相关性*（理由）。”'
- en: '**Metrics and KPIs selection** : You must define your metrics *before* the
    test.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**指标和KPI选择**：你必须定义你的指标**在测试之前**。'
- en: '**Primary/goal metric** : The single metric that will determine whether the
    test is a success (e.g., *conversion rate* ).'
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主要/目标指标**：将决定测试是否成功的单一指标（例如，*转化率*）。'
- en: '**Secondary/objective metrics** : Other metrics you expect to improve (e.g.,
    *average order value* ).'
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**次要/目标指标**：你期望提高的其他指标（例如，*平均订单价值*）。'
- en: '**Guardrail metrics** : Metrics you must not harm (e.g., *page load time* ,
    *app uninstalls* ).'
  id: totrans-22
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**警戒指标**：你不得损害的指标（例如，*页面加载时间*，*应用卸载*）。'
- en: '**Sample size and statistical significance** : We should decide the required
    sample size. This depends on your baseline metric, the **Minimum Detectable Effect**
    ( **MDE** ) you care about (e.g., “I only want to launch this if it improves conversion
    by at least 1%”), and your desired levels of statistical significance (p-value)
    and statistical power.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**样本大小和统计显著性**：我们应该决定所需的样本大小。这取决于你的基线指标，你关心的**最小可检测效应**（**MDE**）（例如，“我只希望如果它能至少提高转化率1%，我才启动这个项目”），以及你想要的统计显著性（p值）和统计功效水平。'
- en: '**Randomization and bias reduction** : The random assignment (the “randomizer”)
    is the most critical piece. It must ensure that every user has an equal chance
    of being in any group and that the assignment is independent and unbiased.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**随机化和偏差减少**：随机分配（“随机化器”）是最关键的组成部分。它必须确保每个用户都有平等的机会被分配到任何一组，并且分配是独立和无偏的。'
- en: 'Here’s how you should design an A/B test:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你应该设计A/B测试的方式：
- en: '**Defining the objective** : What business problem are you solving?'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义目标**：你正在解决什么业务问题？'
- en: '**Choosing the right variant(s)** : Will this be an A/B test (one control,
    one treatment) or an A/B/n test (e.g., testing red, green, and blue buttons against
    the original)?'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择正确的变体**：这将是一个A/B测试（一个控制组，一个处理组）还是一个A/B/n测试（例如，测试红色、绿色和蓝色按钮与原始按钮）？'
- en: '**Determining the sample size and power analysis** : A test without enough
    power (sample size) may be inconclusive even if the feature *is* better. This
    is a common and wasteful mistake.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定样本大小和功效分析**：一个功效不足（样本大小）的测试，即使功能**确实**更好，也可能得出结论不明确。这是一个常见且浪费的错误。'
- en: '**Determining the qualified/triggered population** : Who should be in this
    experiment? *Everyone* ? Or, only users who *see* the feature (e.g., only users
    who scroll to the bottom of the page see the new footer)? Defining this “trigger”
    is critical for analysis.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定合格/触发人群**：谁应该在这个实验中？*所有人*？还是，只有看到该功能的用户（例如，只有滚动到页面底部的用户才能看到新的页脚）？定义这个“触发器”对于分析至关重要。'
- en: '**Experiment duration** : How long must you run the test to get the required
    sample size? This is often a trade-off between speed and confidence. You must
    also run it long enough to capture natural weekly variance (e.g., user behavior
    is different on weekends).'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实验持续时间**：你必须运行多长时间才能获得所需的样本大小？这通常是速度和信心之间的权衡。你还必须运行足够长的时间来捕捉自然每周变化（例如，用户在周末的行为不同）。'
- en: 'Running an A/B test includes the following:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 运行A/B测试包括以下内容：
- en: '**Implementation best practices** : Ensure the test runs cleanly. A bug in
    the code that only affects the treatment or control group will invalidate your
    results.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施最佳实践**：确保测试运行干净。代码中的错误如果只影响处理组或对照组，将使你的结果无效。'
- en: '**Ensuring data integrity** : Monitor data pipelines to ensure you are logging
    events correctly for all groups.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确保数据完整性**：监控数据管道以确保你正确地为所有组记录事件。'
- en: '**Contamination** : Be wary of users “contaminating” other groups. Examples
    include network effects (a feature in one group makes the product better for *all*
    users) or users on multiple devices (seeing the control on their phone and the
    treatment on their laptop).'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**污染**：警惕用户“污染”其他组。例如包括网络效应（一个组中的功能使产品对所有用户都更好）或使用多个设备的用户（在手机上看到控制组，在笔记本电脑上看到处理组）。'
- en: '**Sample ratio mismatch (SRM)** : A critical health check. If you set your
    test to be 50/50, but your data shows a 52/48 split, it signals a bug in your
    randomization or logging, and your results cannot be trusted.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**样本比例不匹配（SRM）**：一个关键的健康检查。如果你将测试设置为50/50，但你的数据显示为52/48的分割，这表明你的随机化或记录中存在错误，你的结果不可信。'
- en: '**Common pitfalls** : Peeking at results early (invalidates frequentist tests),
    running too many variants at once, or ending a test the moment it becomes significant
    (p-hacking). Abide by the time you have dedicated to running the test to avoid
    common failures.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**常见陷阱**：过早查看结果（使频率派测试无效），一次性运行太多变体，或者当测试变得具有显著性时立即结束测试（p-hacking）。遵守你为运行测试分配的时间，以避免常见的失败。'
- en: To choose the right statistical test, the specific mathematical test you use
    to calculate the p-value and confidence interval depends entirely on the type
    of metric you are measuring.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要选择正确的统计测试，你使用的特定数学测试来计算p值和置信区间完全取决于你正在测量的指标类型。
- en: 'The following flowchart provides a decision-making framework:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 以下流程图提供了一个决策框架：
- en: '![img](img/B34239_08_01.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_08_01.png)'
- en: 'Figure 8.1: A flowchart to help in choosing the statistical test'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1：一个流程图，帮助选择统计测试
- en: 'Here is how to interpret this for A/B testing:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这是如何解释A/B测试的：
- en: '**Identify your data type:**'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定你的数据类型：**'
- en: '**Categorical** : Is your metric a proportion or a rate (e.g., click-through
    rate, conversion rate, “did the user convert: yes/no”)? If yes, you compare proportions.
    The common test for this is the Z-test for proportions or a chi-square test.'
  id: totrans-43
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分类**：你的指标是一个比例或比率吗（例如，点击率，转化率，“用户是否转化：是/否”）？如果是，你比较比例。对此常见的测试是比例的Z检验或卡方检验。'
- en: '**Numerical** : Is your metric a continuous or discrete number (e.g., average
    revenue per user, session duration, number of items purchased)? If yes, proceed
    to the next step.'
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数值**：你的指标是一个连续的或离散的数字吗（例如，平均每位用户的收入，会话持续时间，购买的商品数量）？如果是，请进行下一步。'
- en: '**Determine your organizational structure (groups):**'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定你的组织结构（分组）：**'
- en: '**Two groups** : This is the standard A/B test (control versus treatment).'
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**两组**：这是标准的A/B测试（控制组与处理组）。'
- en: '**More than two groups** : This is an A/B/n test (e.g., control versus treatment
    A versus treatment B).'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超过两组**：这是A/B/n测试（例如，控制组与处理组A与处理组B）。'
- en: '**Assume data distributions:**'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假设数据分布：**'
- en: '**Parametric (assumes normal distribution)** : If your numerical data is normally
    distributed (like a bell curve), you can use parametric tests. For two groups,
    this is the t-test. For more than two groups, this is **ANOVA** ( **Analysis of
    Variance** ).'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参数（假设正态分布）**：如果你的数值数据是正态分布的（如钟形曲线），你可以使用参数测试。对于两组，这是t检验。对于超过两组，这是**方差分析**（**分析方差**）。'
- en: '**Non-parametric (makes no assumption)** : Web and business data are often
    not normally distributed; they are usually skewed (e.g., a few “whale” users spend
    a lot, while most spend little). For this skewed data, non-parametric tests are
    safer and more robust. For two groups, use the Mann-Whitney U test. For more than
    two groups, use the Kruskal-Wallis test.'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非参数（不做假设）**：网页和商业数据通常不是正态分布的；它们通常是偏斜的（例如，一些“鲸鱼”用户花费很多，而大多数人花费很少）。对于这种偏斜数据，非参数测试更安全且更稳健。对于两组，使用曼-惠特尼U检验。对于超过两组，使用克鲁斯卡尔-沃利斯检验。'
- en: '**Uplift measurement:**'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提升测量：**'
- en: '**Absolute lift** : (Treatment Metric - Control Metric). Example: 2.2% - 2.0%
    = 0.2%.'
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**绝对提升**：（处理指标 - 控制指标）。例如：2.2% - 2.0% = 0.2%。'
- en: '**Relative lift** : (Absolute Lift / Control Metric). Example: 0.2% / 2.0%
    = 10%.'
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相对提升**：（绝对提升 / 控制指标）。例如：0.2% / 2.0% = 10%。'
- en: '**When to call a test:** You should call a test when your pre-determined duration
    or sample size is met, not when it first becomes significant (unless you are running
    sequential testing or a multi-arm bandit).'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**何时进行测试**：你应该在预定的持续时间或样本量满足时进行测试，而不是当它首次变得具有显著性时（除非你在进行顺序测试或多臂老虎机测试）。'
- en: 'Here’s how you should interpret and act on results:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你应该如何解释和采取行动的结果：
- en: '**How to make data-driven decisions** : Firstly, all results are useful, especially
    the negative ones. Knowing what doesn’t work is as useful as knowing what does.
    If the result is positive and significant, launch it. If negative, remember it.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何做出数据驱动的决策**：首先，所有结果都是有用的，尤其是负面的结果。了解什么不起作用和了解什么起作用一样有用。如果结果是正面的且具有显著性，就推出它。如果结果是负面的，记住它。'
- en: '**What to do when results are inconclusive** : A “flat” or non-significant
    result is a learning opportunity. This is where segmentation or cohort analysis
    is crucial. Does the overall flat result hide that the feature *hurts* iOS users
    but *helps* Android users? Does it work for new users but not returning ones?
    Digging into cohorts can uncover these hidden insights and lead to a partial launch
    or a new iteration.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**What to do when results are inconclusive**：一个“平坦”或非显著的结果是一个学习机会。这正是分割或队列分析至关重要的地方。整体平坦的结果是否隐藏了该功能对iOS用户有害但对Android用户有益？它是否适用于新用户但不适用于回头客？深入挖掘队列可以发现这些隐藏的见解，并导致部分发布或新迭代。'
- en: '**Documenting learnings** : Again, every test, win or lose, teaches you something.
    Document them in a central repository to build institutional knowledge.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Documenting learnings**：同样，每次测试，无论输赢，都会让你学到一些东西。将它们记录在中央存储库中，以构建机构知识。'
- en: 'Next are some advanced topics to note:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是一些需要注意的先进主题：
- en: '**Bayesian versus frequentist approaches** :'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Bayesian versus frequentist approaches**：'
- en: '**Frequentist (traditional)** : This method was described previously. It is
    rigid, requires a fixed sample size, and answers: “What is the probability of
    this data, given no effect?”'
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Frequentist (traditional)**：这种方法之前已经描述过。它是严格的，需要固定的样本量，并回答：“在没有效果的情况下，这些数据的概率是多少？”'
- en: '**Bayesian** : This is a more intuitive approach that answers the direct business
    question: “What is the probability that B is better than A?” It provides a “probability
    of betterment,” is flexible (you can “peek” and stop the test at any time), and
    is often easier to communicate.'
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Bayesian**：这是一个更直观的方法，它回答了直接的商业问题：“B比A更好的概率是多少？”它提供“改善概率”，是灵活的（你可以“窥视”并在任何时间停止测试），并且通常更容易沟通。'
- en: '**Personalization and segmentation** : In cohort analysis, there is an idea
    of moving beyond a “one-size-fits-all” launch to launch features for specific
    user segments who benefit most. This is often the case; not all models work well
    for all customer cohorts. Knowing where a model works and where it cannot provides
    insights to the Data Science team to augment features or models.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Personalization and segmentation**：在队列分析中，有一个想法是超越“一刀切”的发布，为从最大受益的用户细分市场发布功能。这通常是这种情况；不是所有模型都适用于所有客户队列。了解模型在哪里有效以及在哪里无效，可以为数据科学团队提供见解，以增强功能或模型。'
- en: Multi-arm bandit approaches for optimization
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多臂老虎机优化方法
- en: A/B tests are great for finding a single “winner,” but they come with a “regret”
    cost as half of your users are stuck in the (potentially worse) control group
    for the entire test. **Multi-arm bandit** ( **MAB** ) approaches solve this by
    balancing exploration (trying out all variants) with exploitation (sending more
    traffic to the current winner).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: A/B测试非常适合找到单个“胜者”，但它们伴随着“遗憾”成本，因为一半的用户在整个测试期间都困在（可能更差的）对照组中。**多臂老虎机**（**MAB**）方法通过平衡探索（尝试所有变体）与利用（将更多流量发送到当前胜者）来解决这个问题。
- en: '**How it works** :'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**How it works**：'
- en: MABs dynamically allocate more traffic to the “arm” (variant) that is performing
    best, reducing the cost of experimentation and maximizing the metric during the
    test.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: MABs动态地将更多流量分配给表现最佳的“臂”（变体），从而降低实验成本并最大化测试期间的指标。
- en: '**Example** :'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**Example**：'
- en: '**Optimizing LLM-generated creatives** : Imagine you use an LLM to generate
    20 different ad headlines for a new campaign. Running a traditional A/B test with
    20 variants would be incredibly slow and would expose users to many bad headlines.
    This is a perfect use case for an MAB. The MAB system would do the following:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**Optimizing LLM-generated creatives**：想象一下，你使用LLM为新的活动生成20个不同的广告标题。运行包含20个变体的传统A/B测试会非常缓慢，并且会让用户接触到许多糟糕的标题。这是一个MAB的完美用例。MAB系统会执行以下操作：'
- en: '**Explore** : Initially, it shows all 20 headlines to a small, equal number
    of users.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Explore**：最初，它向一小部分用户展示所有20个标题，数量相等。'
- en: '**Exploit** : As it gathers click-through data, it quickly identifies the top
    3-4 performing headlines.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Exploit**：在收集点击数据的过程中，它迅速识别出表现最佳的3-4个标题。'
- en: '**Optimize** : It automatically starts sending the majority of traffic to these
    “winners” while still allocating a tiny amount of traffic to the other variants,
    just in case one of them starts to perform better. This approach finds the best
    creative faster and with less lost revenue.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Optimize**：它自动开始将大部分流量发送到这些“胜者”，同时仍然分配一小部分流量到其他变体，以防万一其中一个开始表现更好。这种方法可以更快地找到最佳创意，并减少损失的收入。'
- en: The question arises as to how the bandit is decided in MAB. The MAB system needs
    a way to decide how to balance exploration with exploiting known winners. This
    is where specific algorithms come in. Two of the most popular and effective strategies
    are **Upper Confidence Bound** ( **UCB** ) and Thompson sampling.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，在MAB中老虎机是如何决定的。MAB系统需要一种方法来决定如何平衡探索与利用已知的赢家。这就是特定算法发挥作用的地方。两种最受欢迎且最有效的策略是**上置信界**（**UCB**）和汤普森抽样。
- en: '**Upper Confidence Bound (UCB)** : This algorithm is “optimistic” and comes
    from the frequentist school of thought. For each variant (or “arm”), it calculates
    the current average performance plus an “uncertainty bonus.”'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上置信界（UCB）**：这个算法是“乐观的”，来源于频率学派的思想。对于每个变体（或“臂”），它计算当前的平均性能加上一个“不确定性奖金”。'
- en: This bonus is large for variants with very little data (high uncertainty).
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据非常少的变体，这个奖金很大（不确定性高）。
- en: This bonus is small for variants that have been tested heavily (low uncertainty).
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于已经大量测试的变体，这个奖金很小（不确定性低）。
- en: The bandit then always picks the arm with the highest combined score (performance
    + bonus). This strategy effectively forces the system to try out less-tested headlines,
    just in case they are hidden gems, while still favoring proven winners.
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，老虎机总是选择得分最高的臂（性能 + 奖金）。这种策略有效地迫使系统尝试那些测试较少的标题，以防它们是隐藏的宝石，同时仍然青睐已证明的赢家。
- en: '**Thompson sampling** : This comes from the Bayesian school of thought or “probabilistic”
    approach, which is often a top performer in practice. Instead of tracking just
    one number (such as average click-through rate), it maintains a full probability
    distribution (a range of likely values) for each arm’s performance.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**汤普森抽样**：这来自贝叶斯学派的思想或“概率”方法，在实践中通常表现优异。它不仅仅跟踪一个数字（如平均点击率），而是为每个臂的性能维护一个完整的概率分布（一系列可能的值）。'
- en: A new, untested headline has a very wide distribution (e.g., “Its true click-through
    rate could be anywhere from 1% to 10%”).
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个新的、未经测试的标题有非常广泛的分布（例如，“其真正的点击率可能在1%到10%之间”）。
- en: A well-tested winner has a very narrow distribution (e.g., “I’m 99% sure its
    rate is between 4.9% and 5.1%”).
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个经过充分测试的赢家有非常狭窄的分布（例如，“我99%确信其比率在4.9%到5.1%之间”）。
- en: To make a choice, the algorithm takes one random sample from each arm’s distribution
    and simply picks the arm that produced the highest sample for that round. This
    naturally gives the proven winners more traffic while ensuring that uncertain
    (but potentially great) options still get a chance to be chosen and prove their
    worth.
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了做出选择，算法从每个臂的分布中随机抽取一个样本，并简单地选择在这一轮中产生最高样本的臂。这自然给已证明的赢家更多的流量，同时确保不确定（但可能很出色）的选项仍有机会被选中并证明其价值。
- en: 'So far, we’ve explored methods such as randomized control trials, a.k.a. A/B
    tests and MABs, which fall under the umbrella of active experimentation. Their
    power comes from one crucial capability: our ability to *control* assignments
    and randomize which users see which variant. This randomization is the “gold standard”
    because it ensures that, on average, the groups being compared are similar in
    every way except for the change we are testing.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探索了随机对照试验、即A/B测试和MABs等方法，这些都属于主动实验的范畴。它们的强大之处在于一个关键能力：我们能够*控制*分配并随机化用户看到哪个变体。这种随机化是“金标准”，因为它确保了，在平均意义上，被比较的组在各个方面都相似，除了我们正在测试的变化。
- en: But what happens when you can’t run an experiment?
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 但当你无法运行实验时会发生什么呢？
- en: What if the data is already collected?
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果数据已经收集了呢？
- en: What if it’s technically impossible or prohibitively expensive to randomize
    users into a control group?
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果在技术上不可能或成本过高，无法将用户随机分配到对照组，会发生什么？
- en: What if it’s unethical or expensive to withhold a new feature (such as a critical
    security patch) from one group?
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果拒绝一个群体使用新功能（如关键的安全补丁）是不道德的或代价高昂的，会发生什么？
- en: We are often left with a wealth of observational data. We can see what happened;
    for example, which users naturally decided to use a new feature, and which didn’t,
    but we cannot say with certainty why their outcomes were different or whether
    the outcome is a true representation of users opting for the feature.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常拥有大量的观察数据。我们可以看到发生了什么；例如，哪些用户自然决定使用新功能，哪些没有，但我们不能确定地说他们的结果为什么不同，或者结果是否是用户选择该功能的真实反映。
- en: 'This is the fundamental challenge of observational causal inference: separating
    correlation from causation. In observational data, the groups we want to compare
    are almost never alike. Users who chose to adopt a new feature might be more engaged,
    iPhone users, more tech-savvy, or newer to the platform than those who didn’t.
    Did the feature make them more engaged, or were they just more engaged to begin
    with?'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是观察性因果推断的基本挑战：将相关性从因果关系中分离出来。在观察数据中，我们想要比较的群体几乎从不相同。选择采用新功能的用户可能更投入，iPhone用户可能更懂技术，或者比那些没有采用的人更熟悉这个平台。是功能使他们更投入，还是他们一开始就更有投入？
- en: This is where a new toolkit of quasi-experimental methods becomes essential.
    The following sections will introduce powerful techniques designed to mimic an
    experiment by intelligently accounting for these underlying differences and isolating
    the true causal impact of a feature. We will move from “what happened?” to “what
    *would have* happened?”
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么一套新的准实验方法工具包变得至关重要。以下几节将介绍旨在通过智能地考虑这些潜在差异并隔离特征的真实因果影响的强大技术。我们将从“发生了什么？”转移到“*本可能发生什么*？”
- en: Why can’t we just use machine learning?
  id: totrans-90
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们为什么不能直接使用机器学习？
- en: Now we know we can’t just use experiments to model historical interventions.
    We can’t randomly assign some users to “get a loan” and others not. In such cases,
    we rely on quasi-experimental methods for measurement, which use statistical techniques
    to approximate an experiment using historical data.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道我们不能仅仅通过实验来模拟历史干预。我们不能随机分配一些用户去“获得贷款”，而其他人则不。在这种情况下，我们依赖于准实验方法进行测量，这些方法使用统计技术使用历史数据来近似实验。
- en: 'But can we use function approximation machine learning here? Unfortunately,
    the answer is no, and the explanation is a bit involved. Let’s understand, through
    the following figure, what a predictive model, at the most fundamental level,
    does:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们能否在这里使用函数逼近机器学习？不幸的是，答案是不了，解释有点复杂。让我们通过以下图示来了解预测模型在最基本层面上做什么：
- en: '![img](img/B34239_08_02.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_08_02.png)'
- en: 'Figure 8.2: A predictive model performs function approximation, mapping X to
    y'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2：预测模型执行函数逼近，将X映射到y
- en: The preceding figure explains that a typical machine learning model is primarily
    responsible for function approximation for a given input set of features, X tries
    to predict the outcome, y.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的图示解释了典型的机器学习模型主要负责对给定特征集X进行函数逼近，X试图预测结果y。
- en: It’s a critical distinction. A standard predictive model is built to answer,
    “What will happen?”
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个关键的区别。标准的预测模型是为了回答，“会发生什么？”
- en: '**Example** : “Who is most likely to sign up as a paid customer after a trial
    membership?”'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**： “谁最有可能在试用会员后注册为付费客户？”'
- en: In this model, all inputs, user features (x1, x2...) and any treatment (T),
    are treated as a bag of features. The model is great at finding correlations and
    making accurate predictions, but it fundamentally confuses correlation with causation.
    It can’t tell you whether a trial discount caused a conversion, or whether the
    users who got the discount were simply more engaged to begin with, by virtue of
    being more engaged online.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个模型中，所有输入，用户特征（x1, x2...）和任何治疗（T），都被视为特征包。该模型擅长发现相关性并做出准确的预测，但它从根本上混淆了相关性和因果关系。它无法告诉你试验折扣是否导致了转化，或者获得折扣的用户是否仅仅因为在线更投入而一开始就更有投入。
- en: 'On the other hand, a causal model is built to answer a completely different
    question: “What if we do something? What would be counterfactual if this had happened?”
    The following figure illustrates this concept:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，因果模型是为了回答一个完全不同的问题而构建的：“如果我们做些什么？如果这件事发生了，会发生什么反事实情况？”以下图示说明了这一概念：
- en: '![img](img/B34239_08_03.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_08_03.png)'
- en: 'Figure 8.3: A causal model explores “what if” scenarios, examining counterfactual
    outcomes of interventions'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3：因果模型探索“如果”场景，检查干预措施的反事实结果
- en: '**Example** : “What is the effect of giving a 10% discount on the membership
    signup rate?”'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**： “给予10%折扣对会员注册率的影响是什么？”'
- en: To answer this, the treatment (T), i.e., the “discounts” in the diagram described
    as “T”, can no longer be just another feature. It must be treated as a “first-class
    citizen.” The entire goal of the model shifts from predicting an outcome to isolating
    the precise, independent impact of T on that outcome.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这个问题，治疗（T），即图中描述为“T”的“折扣”，不能再仅仅是一个特征。它必须被视为“一等公民”。整个模型的目标从预测结果转变为隔离T对那个结果的精确、独立的影响。
- en: If we apply machine learning here for function approximation, it won’t treat
    the “discount” as a first-class citizen and consider all features the same, which
    undermines the entire goal of isolating the effect of treatment on outcome.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在这里应用机器学习进行函数逼近，它不会将“折扣”视为一等公民，并认为所有特征都是相同的，这会削弱整个隔离治疗对结果影响的整个目标。
- en: 'So, what do causal models need (besides just data)? The following figure shows
    the answer:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，因果模型需要什么（除了数据之外）？以下图示显示了答案：
- en: '![img](img/B34239_08_04.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_08_04.png)'
- en: 'Figure 8.4: Causal modeling extends beyond function fitting, requiring data
    plus causal assumptions (Z)'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4：因果建模超越了函数拟合，需要数据加上因果假设（Z）
- en: This shift means a causal model needs more than just function approximation,
    which we can get from fitting the model model.fit(X, y). As the preceding diagram
    shows, the model needs data and an explicit “Z” factor. This “Z” represents our
    causal assumptions, that is, our understanding of how the system works.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变意味着因果模型需要的不仅仅是函数逼近，我们可以从模型.model.fit(X, y)拟合中获得。正如前面的图示所示，模型需要数据和明确的“Z”因素。这个“Z”代表我们的因果假设，即我们对系统如何工作的理解。
- en: 'Now, let’s recap all that we need before we can even run this causal model.
    We must define the following:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们回顾一下在运行此因果模型之前我们需要的所有内容。我们必须定义以下内容：
- en: '**The causal question** : What is the treatment (T) and what is the outcome
    (y)?'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**因果问题**：治疗（T）是什么，结果（y）是什么？'
- en: '**Confounders** : What other variables (x) affect both the treatment and the
    outcome? For example, a user’s “engagement level” might affect whether they receive
    a discount (T) and whether they sign up for paid membership (y). We must explicitly
    identify and control these.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**混杂因素**：哪些其他变量（x）同时影响治疗和结果？例如，用户的“参与度”可能影响他们是否获得折扣（T）以及他们是否注册付费会员（y）。我们必须明确识别并控制这些。'
- en: '**The causal structure** : What do we believe causes what? This is often mapped
    out in a diagram before any analysis begins.'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**因果结构**：我们相信什么导致什么？这通常在分析开始之前在图中绘制出来。'
- en: These assumptions are the “quasi-experimental” part of the design. We are using
    our knowledge to build a structure that attempts to statistically “design” an
    experiment from data that was never experimental.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这些假设是设计的“准实验”部分。我们正在使用我们的知识来构建一个结构，试图从从未进行过实验的数据中统计“设计”一个实验。
- en: 'What’s “Z” here? Our understanding of the system is beyond data. This understanding
    determines the approach we want to experiment with:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: “Z”在这里是什么？我们对系统的理解超越了数据。这种理解决定了我们想要实验的方法：
- en: If the understanding is the network, what causes what, then the method we can
    try is the Bayesian network
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果理解是网络，什么导致什么，那么我们可以尝试的方法是贝叶斯网络
- en: If the understanding is common with confounders (confounders are defined as
    variables that impact treatment (assignment) and outcome at the same time), then
    the methods we can try are DoWhy + EconML
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果理解与混杂因素（混杂因素被定义为同时影响治疗（分配）和结果的因素）是通用的，那么我们可以尝试的方法是DoWhy + EconML
- en: If understanding is the prior belief, then the method we can try is the Bayesian
    filter
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果理解是先验信念，那么我们可以尝试的方法是贝叶斯过滤器
- en: This need for an explicit structure has led to two major families of causal
    methods. We’ll begin by exploring the foundational observational methods, many
    of which originated in econometrics. These techniques use clever “designs” to
    isolate causal effects. After that, we will cover the new wave of advanced ML
    models that leverage machine learning’s power to handle complex, high-dimensional
    data and find personalized causal effects.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对显式结构的需求导致了两大类因果方法的产生。我们将从探索基础观察性方法开始，其中许多方法起源于计量经济学。这些技术使用巧妙的“设计”来隔离因果效应。之后，我们将介绍利用机器学习处理复杂、高维数据并找到个性化因果效应的新一代高级ML模型。
- en: Observational methods – statistical approaches
  id: totrans-119
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 观察性方法 - 统计方法
- en: 'The aim is to isolate the effect of a treatment (e.g., a discount) on an outcome
    (e.g., a paid signup). These statistical approaches generally fall into two categories:
    matching methods that create comparable groups (such as PSM, synthetic control,
    and DiD) and modeling approaches that exploit specific data structures to estimate
    the effect (such as RDD and IV).'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是隔离处理（例如，折扣）对结果（例如，付费注册）的影响。这些统计方法通常分为两类：创建可比组的匹配方法（如PSM、合成控制和DiD）和利用特定数据结构来估计效应的建模方法（如RDD和IV）。
- en: '**Propensity score matching (PSM)** : Attempts to create a “control group”
    from observational data. It calculates the probability (propensity) that any given
    individual would have received the “treatment” (e.g., based on their income, age,
    location) and then matches treated and untreated individuals who had a similar
    propensity score.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**倾向得分匹配（PSM）**：试图从观察数据中创建一个“控制组”。它计算任何给定个体接受“处理”的概率（倾向得分），然后匹配具有相似倾向得分的处理和未处理个体。'
- en: '**Synthetic control matching** : Creates a “synthetic” control group by finding
    a weighted combination of non-treated units (e.g., other cities) that best matches
    the pre-treatment trend of the treated unit (e.g., the city where you launched
    a new ad campaign).'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合成控制匹配**：通过找到一个非处理单位的加权组合（例如，其他城市）来创建一个“合成”控制组，该组合最好地匹配处理单位（例如，你启动新广告活动的城市）的预处理趋势。'
- en: '**Difference-in-differences (DiD)** : A powerful technique used when you have
    data from before and after an intervention for both a treated group and an untreated
    group. It subtracts the pre-to-post change in the control group from the pre-to-post
    change in the treatment group, isolating the treatment’s effect from the underlying
    trend.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双重差分（DiD）**：当您有来自干预前后的处理组和未处理组的数据时使用的一种强大技术。它从控制组的干预前到干预后的变化中减去处理组的干预前到干预后的变化，从而隔离处理效应从潜在趋势中。'
- en: '**Regression discontinuity design (RDD)** : Used when a treatment is assigned
    based on a sharp cutoff (e.g., students with a score >80 get a scholarship). By
    comparing the outcomes of individuals just above and just below that cutoff, we
    can estimate the causal impact of the scholarship.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**回归断点设计（RDD）**：当根据锐利截止点分配处理时使用（例如，分数超过80的学生获得奖学金）。通过比较刚好高于和刚好低于该截止点的个人的结果，我们可以估计奖学金的因果影响。'
- en: '**Instrumental variables (IV)** : A complex but powerful method that finds
    a third variable (the “instrument”) that is correlated with the treatment but
    not the outcome (except through the treatment). This helps isolate the true causal
    effect from confounding variables.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具变量（IV）**：一种复杂但强大的方法，它找到一个与处理变量相关但与结果变量不相关（除了通过处理）的第三变量（即“工具变量”）。这有助于从混杂变量中隔离真正的因果效应。'
- en: These classical methods are powerful but often rely on specific data structures
    (such as a sharp cutoff for RDD) and can struggle with very high-dimensional or
    non-linear data. Next, we’ll see how the principles of machine learning can be
    combined with these causal goals to create even more flexible and powerful models.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这些经典方法非常强大，但通常依赖于特定的数据结构（例如RDD的锐利截止点）并且可能难以处理高维或非线性数据。接下来，我们将看到机器学习的原理如何与这些因果目标相结合，以创建更加灵活和强大的模型。
- en: Observational methods – advanced ML approaches
  id: totrans-127
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 观察性方法 - 高级机器学习方法
- en: A new class of methods uses modern machine learning to handle the high-dimensional
    and non-linear nature of causal problems, especially for personalization.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 一类新的方法使用现代机器学习来处理因果问题的多维和非线性特性，特别是对于个性化。
- en: '**Causal tree and forest** : These are (random) forests adapted for causal
    inference. They partition the data to find subgroups with the most significant
    differences in treatment effects, helping to uncover heterogeneous (uneven) effects.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**因果树和森林**：这些是针对因果推断而改编的（随机）森林。它们将数据分区以找到处理效应差异最显著的子组，有助于揭示异质（不均匀）效应。'
- en: '**Double machine learning (DML)** : Uses two ML models, one to predict the
    outcome and one to predict the treatment, and then uses the residuals (errors)
    from both models in a final estimation step. This is a robust way to control many
    confounding variables.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双重机器学习（DML）**：使用两个机器学习模型，一个用于预测结果，一个用于预测处理，然后在最终估计步骤中使用两个模型的残差（误差）。这是一种控制许多混杂变量的稳健方法。'
- en: '**Uplift modeling** : This is the key to true personalization. Instead of modeling
    the outcome (e.g., “Will this user convert?”), uplift models directly model the
    treatment effect itself (e.g., “What is the additional probability this user will
    convert if I show them this ad?”). This allows you to target only the “persuadables”
    and avoid wasting resources on those who would convert anyway (“sure things”)
    or will never convert (“lost causes”).'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提升建模**：这是实现真正个性化的关键。而不是对结果进行建模（例如，“这个用户会转化吗？”），提升模型直接对治疗效果本身进行建模（例如，“如果我向他们展示这个广告，这个用户转化的额外概率是多少？”）。这允许你只针对“可说服的”用户，避免在那些无论如何都会转化（“确定的事情”）或永远不会转化（“无望的事情”）的用户上浪费资源。'
- en: '**Bayesian Structural Time Series (BSTS)** : A method popularized by Google
    for time-series data. It builds a model of what would have happened to a metric
    (e.g., sales in California) in the absence of an intervention, and then compares
    that “synthetic” prediction to what actually happened.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贝叶斯结构时间序列（BSTS）**：谷歌推广的一种用于时间序列数据的方法。它构建了一个模型，在没有干预的情况下，一个指标（例如，加利福尼亚的销售）会发生什么，然后将这个“合成”预测与实际发生的情况进行比较。'
- en: '**Causal deep learning (neural networks for causal inference)** : An emerging
    field using the power of neural networks to model complex causal relationships,
    especially in data with unstructured features such as images or text.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**因果深度学习（用于因果推断的神经网络）**：一个新兴领域，利用神经网络的力量来模拟复杂的因果关系，特别是在具有非结构化特征的数据（如图像或文本）中。'
- en: The causal methods we’ve just covered are incredibly powerful for learning from
    historical data and understanding complex, “what if” questions. They excel at
    post-hoc analysis, thereby looking back to understand what worked and why. Now,
    let’s shift our focus from offline analysis back to online optimization. When
    we’re running live experiments, our goal is not just to learn, but to learn as
    fast as possible and adapt our decisions in real time.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚讨论的因果方法对于从历史数据中学习和理解复杂、假设性的问题非常强大。它们擅长事后分析，从而回顾过去理解什么有效以及为什么有效。现在，让我们将我们的关注点从离线分析转移到在线优化。当我们进行实时实验时，我们的目标不仅仅是学习，而是尽可能快地学习和实时调整我们的决策。
- en: The next sections will explore advanced methods for this exact challenge. We’ll
    first look at sequential A/B testing to make our experiments more efficient and
    then delve into reinforcement learning as a powerful framework for continuous,
    automated decision-making, which is a sophisticated evolution of the bandit problem.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 下几节将探讨针对这一特定挑战的先进方法。我们首先将研究顺序A/B测试，以提高实验效率，然后深入探讨强化学习作为连续、自动化决策的强大框架，这是投币问题的复杂演变。
- en: Sequential A/B testing and its advantages over RCTs
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 顺序A/B测试及其相对于RCTs的优势
- en: Traditional A/B tests require a fixed sample size before analysis, leading to
    wasted time and resources if one variation is significantly better early on. Sequential
    A/B testing improves efficiency by allowing continuous evaluation.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的A/B测试在分析之前需要固定的样本量，如果某个变体一开始就明显优于其他，这会导致时间和资源的浪费。顺序A/B测试通过允许持续评估来提高效率。
- en: Why choose sequential A/B testing?
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么选择顺序A/B测试？
- en: '**Early stopping** : If a new feature is clearly outperforming, testing can
    be halted early, saving resources.'
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**早期停止**：如果一个新功能明显优于其他，测试可以提前终止，节省资源。'
- en: '**Lower sample requirements** : By stopping tests early when results are conclusive,
    the required sample size is reduced.'
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**降低样本需求**：通过在结果明确时提前停止测试，所需的样本量减少。'
- en: '**More efficient experimentation** : Instead of waiting for an entire test
    period, decisions can be made dynamically.'
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**更高效的实验**：不必等待整个测试周期结束，决策可以动态进行。'
- en: '**Example** : Sequential A/B versus A-B-C testing'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：顺序A/B测试与A-B-C测试'
- en: Consider a company testing three variations (A, B, and C) of a landing page.
    A-B-C testing requires collecting enough data for all three variations before
    drawing conclusions. A sequential approach (e.g., A-B testing first, then testing
    the best against C) ensures significant sample sizes and faster iteration.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一家公司正在测试着陆页的三个变体（A、B和C）。A-B-C测试需要在得出结论之前收集所有三个变体的足够数据。顺序方法（例如，先进行A-B测试，然后测试最佳变体与C）确保了显著的样本量和更快的迭代。
- en: 'Interesting take: reinforcement learning versus model predictive control'
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有趣的观点：强化学习与模型预测控制
- en: Both **reinforcement learning** ( **RL** ) and **model predictive control**
    ( **MPC** ) focus on adaptive learning, but differ in approach.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**强化学习**（**RL**）和**模型预测控制**（**MPC**）都侧重于自适应学习，但在方法上有所不同。'
- en: RL is an approach where an agent learns by interacting with an environment,
    receiving rewards, and updating its policy over time.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习（RL）是一种通过与环境交互、接收奖励并在时间上更新其策略来学习的代理方法。
- en: 'Key properties include the following:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 关键特性包括以下内容：
- en: Learn optimal policies through trial and error
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过尝试错误学习最佳策略。
- en: Updates policy based on observed rewards
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据观察到的奖励更新策略。
- en: Adaptively refined strategies over time
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时间自适应地优化策略。
- en: '**Example** : A recommendation system improving its personalization based on
    continuous user feedback.'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：一个推荐系统根据持续的用户反馈改进其个性化。'
- en: MPC is a control method that predicts future system states and optimizes decisions
    accordingly.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 模型预测控制（MPC）是一种控制方法，它预测未来的系统状态并相应地优化决策。
- en: 'Key properties include the following:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 关键特性包括以下内容：
- en: Uses a model of the system to forecast outcomes
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用系统模型来预测结果。
- en: Optimizes actions over a rolling horizon
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在滚动时域内优化行动。
- en: More stable than pure RL but requires domain knowledge
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比纯强化学习更稳定，但需要领域知识。
- en: '**Example** : A self-driving car adjusting acceleration and braking based on
    predicted traffic flow rather than learning purely from experience.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：一辆自动驾驶汽车根据预测的交通流量调整加速和制动，而不是仅仅从经验中学习。'
- en: 'Here are the key differences between the two:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个之间的关键区别如下：
- en: '| **Feature** | **Reinforcement learning (RL)** | **Model predictive control
    (MPC)** |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '| **特征** | **强化学习（RL）** | **模型预测控制（MPC）** |'
- en: '| **Adaptation method** | Trial and error | Predictive optimization |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
  zh: '| **适应方法** | 尝试错误 | 预测优化 |'
- en: '| **Use of prior data** | Limited | Strong reliance on models |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
  zh: '| **使用先前数据** | 有限 | 强烈依赖模型 |'
- en: '| **Stability** | May experience instability | More stable control |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
  zh: '| **稳定性** | 可能会经历不稳定性 | 更稳定的控制 |'
- en: Why choose one over the other?
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么选择其中一个而不是另一个？
- en: Use RL when the environment is uncertain, and long-term learning is beneficial
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当环境不确定且长期学习有益时，使用强化学习（RL）。
- en: Use MPC when a good system model exists, and stability is critical
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当存在良好的系统模型且稳定性至关重要时，使用模型预测控制（MPC）。
- en: '**Note**'
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**'
- en: Measurement techniques are essential for evaluating machine learning models,
    guiding optimization strategies, and ensuring business impact. Randomized control
    trials remain a foundational approach but have limitations in certain contexts,
    requiring causal inference methods. Multi-arm bandits offer real-time optimization,
    especially for dynamic environments such as search engines. Sequential A/B testing
    improves efficiency by dynamically adjusting sample sizes and stopping tests early.
    Finally, reinforcement learning and model predictive control provide distinct
    approaches to adaptive learning, each with specific advantages. By selecting the
    appropriate measurement and adaptation techniques, organizations can achieve robust,
    data-driven decision-making processes that drive continuous improvement.
  id: totrans-167
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 测量技术对于评估机器学习模型、指导优化策略和确保业务影响至关重要。随机对照试验仍然是一种基础方法，但在某些情况下存在局限性，需要因果推断方法。多臂老虎机提供实时优化，尤其是在搜索引擎等动态环境中。顺序A/B测试通过动态调整样本大小和提前停止测试来提高效率。最后，强化学习和模型预测控制提供了适应学习的不同方法，每种方法都有其特定的优势。通过选择适当的测量和适应技术，组织可以实现稳健、数据驱动的决策过程，从而推动持续改进。
- en: Summary
  id: totrans-168
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 概述
- en: This chapter provided a comprehensive guide to causal inference, which is the
    essential science of proving that an ML system *caused* a specific business outcome,
    moving us beyond simple correlation. This is the critical third step, building
    directly on our previous work of defining metrics ( [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor197)
    ) and operationalizing models ( [*Chapter 7*](Chapter_7.xhtml#_idTextAnchor212)
    ).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了因果推断的全面指南，这是证明ML系统*导致*特定业务结果的必要科学，使我们超越了简单的相关性。这是关键的第三步，直接建立在我们的先前工作之上，即定义指标（[第6章](Chapter_6.xhtml#_idTextAnchor197)）和实施模型（[第7章](Chapter_7.xhtml#_idTextAnchor212)）。
- en: We began our journey with the “gold standard” of experimental methods, focusing
    heavily on A/B testing (RCTs). We explored its entire lifecycle, from the fundamentals
    of defining a solid hypothesis and selecting metrics, to the practicalities of
    execution, such as calculating the sample size and closely watching pitfalls such
    as **sample ratio mismatch** ( **SRM** ). We saw how to choose the right statistical
    test, how cohort analysis can uncover hidden insights, and contrasted the frequentist
    and Bayesian testing philosophies. We also explored more efficient methods, such
    as sequential A/B testing for early stopping and **multi-armed bandits** ( **MABs**
    ), which are perfect for dynamically testing many variants.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从“黄金标准”的实验方法开始，重点放在A/B测试（RCTs）上。我们探索了其整个生命周期，从定义一个坚实的假设和选择指标的基础，到执行的实际问题，如计算样本量和密切监控如**样本比例不匹配**（**SRM**）等陷阱。我们看到了如何选择正确的统计测试，如何通过队列分析揭示隐藏的见解，并对比了频率主义和贝叶斯测试哲学。我们还探索了更有效的方法，如用于早期停止的顺序A/B测试和**多臂老虎机**（**MABs**），这对于动态测试许多变体是完美的。
- en: From there, we moved on to observational methods, the toolkit for when a randomized
    experiment is impossible, seeing how techniques such as **Difference-in-Differences**
    ( **DiD** ) and **propensity score matching** ( **PSM** ) statistically *approximate*
    a control group. We then explored the new frontier of advanced ML models, such
    as uplift modeling, which moves us from measuring an average effect to personalizing
    an intervention. Finally, we contrasted the adaptive learning approaches of **reinforcement
    learning** ( **RL** ) and **model predictive control** ( **MPC** ).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，我们转向了观察方法，这是在随机实验不可能进行时的工具箱，我们看到技术如**差异-差异法**（**DiD**）和**倾向得分匹配**（**PSM**）如何从统计上*近似*一个对照组。然后，我们探索了高级机器学习模型的新前沿，例如提升模型，它使我们从衡量平均效果转向个性化干预。最后，我们对比了**强化学习**（**RL**）和**模型预测控制**（**MPC**）的适应性学习方法。
- en: Having established these rigorous frameworks for *measuring impact* and *making
    data-driven decisions* , we are now equipped to evaluate the next major wave of
    technological change. The tools we’ve just learned about, A/B testing, MABs, and
    causal inference, are precisely what enterprises will need to validate the value
    of the most transformative technology of our time, generative AI. In the next
    chapter, we will explore this new landscape, examining how GenAI is reshaping
    business, acting as a decision-making copilot, and creating entirely new opportunities
    for innovation.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立了这些用于*衡量影响*和*做出数据驱动决策*的严格框架后，我们现在可以评估下一波主要的技术变革。我们刚刚学到的工具，A/B测试、MABs和因果推断，正是企业需要来验证我们这个时代最具变革性技术——生成式人工智能的价值。在下一章中，我们将探索这个新领域，研究生成式人工智能如何重塑商业，作为决策的副驾驶，并创造全新的创新机会。
