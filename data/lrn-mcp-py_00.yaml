    address or website name. Please contact us at `copyright@packt.com` with a link
    to the material.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**盗版**：如果您在互联网上发现我们作品的任何非法副本，我们将非常感激您能提供位置地址或网站名称。请通过电子邮件发送至 `copyright@packt.com`
    并附上材料的链接。'
- en: '**If you are interested in becoming an author**: If there is a topic that you
    have expertise in and you are interested in either writing or contributing to
    a book, please visit [http://authors.packt.com/](http://authors.packt.com/).'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您有兴趣成为作者**：如果您在某个领域有专业知识，并且您有兴趣撰写或为本书做出贡献，请访问 [http://authors.packt.com/](http://authors.packt.com/)。'
- en: Share your thoughts
  id: totrans-62
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
