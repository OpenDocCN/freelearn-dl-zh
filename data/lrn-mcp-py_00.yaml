  type: TYPE_NORMAL
  zh: 一旦您阅读了《使用Python学习模型上下文协议》，我们非常乐意听到您的想法！请[点击此处直接进入此书的亚马逊评论页面](https://packt.link/r/1806103230)并分享您的反馈。
- en: Your review is important to us and the tech community and will help us make
