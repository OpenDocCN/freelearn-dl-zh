- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: The **Model Context Protocol** (**MCP**) represents a revolutionary approach
    to building **artificial intelligence** (**AI**) applications that can efficiently
    distribute resources, standardize capabilities, and facilitate seamless communication
    between different components in complex systems. As AI continues to evolve and
    integrate into every aspect of our digital lives, the need for standardized, scalable,
    and secure protocols becomes increasingly critical.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**模型上下文协议**（**MCP**）代表了一种革命性的方法，用于构建能够高效分配资源、标准化能力和促进复杂系统中不同组件之间无缝通信的人工智能（**AI**）应用。随着人工智能继续发展和融入我们数字生活的各个方面，标准化、可扩展和安全的协议需求变得越来越关键。'
- en: 'MCP addresses fundamental challenges that developers face when building AI
    applications: resource distribution bottlenecks, lack of standardization across
    different components, complexity in building and testing distributed systems,
    and the intricate process of developing clients that can effectively interact
    with servers and **large language models** (**LLMs**). By providing a structured
    framework, MCP enables developers to create more efficient, maintainable, and
    scalable AI applications.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: MCP解决了开发者在构建人工智能应用时面临的根本挑战：资源分配瓶颈、不同组件之间缺乏标准化、构建和测试分布式系统的复杂性，以及开发能够有效与服务器和**大型语言模型**（**LLMs**）交互的客户端的复杂过程。通过提供一个结构化框架，MCP使开发者能够创建更高效、可维护和可扩展的人工智能应用。
- en: 'Among all the protocols and frameworks available for AI application development,
    MCP stands out because it offers several key advantages:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有可用于人工智能应用开发的协议和框架中，MCP脱颖而出，因为它提供了几个关键优势：
- en: It provides a standardized way to describe and communicate capabilities between
    different system components
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它提供了一种标准化的方式来描述和在不同系统组件之间进行能力沟通
- en: It enables efficient resource distribution across multiple servers, improving
    performance and scalability
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它使得在多个服务器之间高效地分配资源成为可能，从而提高性能和可扩展性
- en: It offers comprehensive guidelines for building, testing, and deploying both
    servers and clients
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它为构建、测试和部署服务器和客户端提供了全面的指南
- en: It supports multiple communication methods, including **standard input/output**
    (**STDIO**) and **server-sent events** (**SSE**)
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它支持多种通信方法，包括**标准输入/输出**（**STDIO**）和**服务器发送事件**（**SSE**）
- en: It facilitates integration with modern development tools and platforms
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它促进了与现代开发工具和平台的集成
- en: In this comprehensive book, we will first explore the foundational concepts
    of the MCP, understanding its architecture, components, and the problems it solves
    in modern AI application development.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本综合性的书中，我们将首先探索MCP的基础概念，了解其架构、组件以及它在现代人工智能应用开发中解决的问题。
- en: Once you understand the core protocol concepts, we will dive deep into practical
    implementation, covering how to build and test MCP servers using various approaches,
    including STDIO and SSE-based servers. We will also explore advanced server development
    techniques and patterns that will help you create robust, production-ready applications.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您理解了核心协议概念，我们将深入到实际实施中，涵盖如何使用各种方法构建和测试MCP服务器，包括基于STDIO和SSE的服务器。我们还将探索高级服务器开发技术和模式，这些将帮助您创建健壮、生产就绪的应用。
- en: The book then progresses to client development, showing you how to build effective
    clients both with and without LLM integration, and how to consume MCP servers
    using popular tools such as Claude Desktop and **Virtual Studio Code** (**VS Code**)
    agent mode. We will also cover advanced topics such as sampling and elicitation
    techniques that can enhance your AI applications.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，本书将进入客户端开发，向您展示如何构建有效的客户端，无论是带有还是不带大型语言模型（LLM）集成，以及如何使用Claude桌面和**虚拟工作室代码**（**VS
    Code**）代理模式等流行工具来消费MCP服务器。我们还将涵盖采样和诱导技术等高级主题，这些技术可以增强您的AI应用。
- en: Finally, we will address critical production concerns, including security best
    practices, deployment strategies, and scaling considerations that are essential
    for running MCP applications in real-world environments.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将解决关键的生产问题，包括安全最佳实践、部署策略和扩展考虑因素，这些都是运行MCP应用在现实世界环境中必不可少的。
- en: This book will guide you through numerous practical examples and exercises,
    demonstrating best practices for building MCP applications and providing hands-on
    experience with real-world scenarios. The examples and code samples are designed
    to be immediately applicable to your own projects, whether you’re building simple
    proofs of concept or complex enterprise applications.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将引导你通过众多实际示例和练习，展示构建MCP应用程序的最佳实践，并提供在真实场景中的实际操作经验。示例和代码示例旨在立即应用于你的项目，无论你是构建简单的概念验证还是复杂的企业应用程序。
- en: Throughout the book, we include comprehensive solutions and code examples in
    Python. The appendix also provides a comprehensive Python primer for those who
    need to brush up on their Python skills.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 本书贯穿始终，包括全面的解决方案和 Python 代码示例。附录还提供了针对需要提高 Python 技能的读者的全面 Python 入门指南。
- en: The author acknowledges the use of cutting-edge AI, in this case **GitHub Copilot**,
    with the sole aim of enhancing the language and clarity within the book, thereby
    ensuring a smooth reading experience for readers. It’s important to note that
    the content itself has been crafted by the author and edited by a professional
    publishing team.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 作者承认使用了尖端的人工智能技术，在本例中为 **GitHub Copilot**，其唯一目的是提高本书的语言和清晰度，从而确保读者有顺畅的阅读体验。重要的是要注意，内容本身是由作者创作的，并由专业出版团队编辑。
- en: Who this book is for
  id: totrans-16
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书面向的对象
- en: This book is for developers, AI engineers, and software architects looking to
    build sophisticated AI applications using the MCP. Whether you’re a backend developer
    wanting to create efficient AI servers, a frontend developer looking to integrate
    AI capabilities into your applications, or an AI researcher exploring new ways
    to structure AI systems, this book provides the knowledge and practical skills
    you need.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 本书面向开发者、人工智能工程师和软件架构师，他们希望使用 MCP 构建复杂的人工智能应用程序。无论你是希望创建高效人工智能服务器的后端开发者，还是希望将人工智能功能集成到应用程序中的前端开发者，或者是一位探索人工智能系统新结构的
    AI 研究者，本书都提供了你需要的知识和实际技能。
- en: Basic programming experience in Python is recommended, along with familiarity
    with web development concepts, API design, and fundamental AI/ML concepts. Experience
    with modern development tools and practices will help you get the most out of
    this book.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐具备 Python 基础编程经验，并熟悉网络开发概念、API 设计以及基本人工智能/机器学习概念。熟悉现代开发工具和实践将有助于你充分利用本书。
- en: What this book covers
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor015), *Introduction to the Model
    Context Protocol*, introduces the Model Context Protocol, its historical background,
    and the fundamental problems it solves in AI application development. You’ll understand
    why MCP is essential for modern AI systems.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](Chapter_1.xhtml#_idTextAnchor015)，*模型上下文协议简介*，介绍了模型上下文协议、其历史背景以及它在人工智能应用开发中解决的
    fundamental problems。你将了解为什么MCP对现代人工智能系统至关重要。'
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor035), *Explaining the Model Context
    Protocol*, provides a comprehensive deep dive into the MCP protocol itself, covering
    its architecture, key components (hosts, clients, servers), communication methods
    (STDIO and SSE), and the standard capabilities framework.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第二章*](Chapter_2.xhtml#_idTextAnchor035)，*解释模型上下文协议*，对MCP协议本身进行了全面的深入探讨，涵盖了其架构、关键组件（主机、客户端、服务器）、通信方法（STDIO和SSE）以及标准能力框架。'
- en: '[*Chapter 3*](Preface.xhtml), *Building and Testing Servers*, focuses on practical
    server development using STDIO communication, covering server architecture, resource
    and tool implementation, and comprehensive testing strategies using inspector
    tools.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第三章*](Preface.xhtml)，*构建和测试服务器*，专注于使用 STDIO 通信的实际服务器开发，涵盖了服务器架构、资源和工具实现，以及使用检查工具的综合测试策略。'
- en: '[*Chapter 4*](Chapter_4.xhtml#_idTextAnchor094), *Building SSE Servers*, explores
    SSE-based server development, showing you how to build real-time, streaming MCP
    servers for more dynamic applications.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第四章*](Chapter_4.xhtml#_idTextAnchor094)，*构建 SSE 服务器*，探讨了基于 SSE 的服务器开发，展示了如何构建用于更动态应用程序的实时、流式
    MCP 服务器。'
- en: '[*Chapter 5*](Chapter_5.xhtml#_idTextAnchor134), *Streamable HTTP*, covers
    advanced HTTP streaming techniques for MCP servers, enabling you to build highly
    scalable and efficient server implementations.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第五章*](Chapter_5.xhtml#_idTextAnchor134)，*可流式 HTTP*，涵盖了针对 MCP 服务器的先进 HTTP
    流式传输技术，使你能够构建高度可扩展和高效的服务器实现。'
- en: '[*Chapter 6*](Chapter_6.xhtml#_idTextAnchor180), *Advanced Servers*, delves
    into sophisticated server patterns, advanced resource management, complex tool
    implementations, and production-ready server architectures.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](Chapter_6.xhtml#_idTextAnchor180)，*高级服务器*，深入探讨了复杂的服务器模式、高级资源管理、复杂工具实现和现成服务器架构。'
- en: '[*Chapter 7*](Chapter_7.xhtml#_idTextAnchor209), *Building Clients*, teaches
    you how to develop MCP clients, both standalone applications and those integrated
    with LLMs, covering client architecture and best practices.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](Chapter_7.xhtml#_idTextAnchor209)，*构建客户端*，教您如何开发MCP客户端，包括独立应用程序和与LLMs集成的应用程序，涵盖客户端架构和最佳实践。'
- en: '[*Chapter 8*](Chapter_8.xhtml#_idTextAnchor253), *Consuming Servers*, demonstrates
    how to effectively use MCP servers through various clients and tools, including
    Claude Desktop, VS Code agent mode, and custom client implementations.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](Chapter_8.xhtml#_idTextAnchor253)，*使用服务器*，演示了如何通过各种客户端和工具，包括Claude桌面版、VS
    Code代理模式以及自定义客户端实现，有效地使用MCP服务器。'
- en: '[*Chapter 9*](Chapter_9.xhtml#_idTextAnchor302), *Sampling*, explores advanced
    sampling techniques for AI applications, showing how to leverage MCP’s capabilities
    for sophisticated AI interactions and content generation.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](Chapter_9.xhtml#_idTextAnchor302)，*采样*，探讨了AI应用的先进采样技术，展示了如何利用MCP的能力进行复杂的AI交互和内容生成。'
- en: '[*Chapter 10*](Chapter_10.xhtml#_idTextAnchor330), *Elicitation*, covers techniques
    for effective information elicitation in AI applications, demonstrating how to
    design systems that can intelligently gather and process information.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](Chapter_10.xhtml#_idTextAnchor330)，*信息提取*，涵盖了在AI应用中进行有效信息提取的技术，展示了如何设计能够智能收集和处理信息的系统。'
- en: '[*Chapter 11*](Chapter_11.xhtml#_idTextAnchor361), *Securing Your Application*,
    addresses comprehensive security considerations for MCP applications, including
    authentication, authorization, data protection, and secure communication patterns.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](Chapter_11.xhtml#_idTextAnchor361)，*确保您的应用程序安全*，讨论了MCP应用程序的综合安全考虑，包括身份验证、授权、数据保护和安全通信模式。'
- en: '[*Chapter 12*](Chapter_12.xhtml#_idTextAnchor410), *Bringing MCP Apps to Production*,
    provides practical guidance on deploying MCP applications to production environments,
    covering scaling strategies, monitoring, and maintenance best practices.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第12章*](Chapter_12.xhtml#_idTextAnchor410)，*将MCP应用投入生产*，提供了将MCP应用程序部署到生产环境的实用指南，包括扩展策略、监控和维护最佳实践。'
- en: '*Appendix, Building for the Web with Modern Python*, offers a comprehensive
    primer on advanced Python features specifically relevant to MCP development, including
    async programming, context managers, type hints, and modern Python patterns.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '*附录，使用现代Python构建Web应用*，提供了关于适用于MCP开发的Python高级特性的全面入门指南，包括异步编程、上下文管理器、类型提示和现代Python模式。'
- en: To get the most out of this book
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 要充分利用本书
- en: 'To follow along with the examples and exercises in this book, you’ll need the
    following:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 要跟随本书中的示例和练习，您需要以下内容：
- en: Python 3.8 or later installed on your system
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的系统上安装Python 3.8或更高版本
- en: A code editor or IDE (VS Code is recommended)
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码编辑器或IDE（推荐使用VS Code）
- en: Basic familiarity with command-line interfaces
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 熟悉命令行界面
- en: An understanding of HTTP, JSON, and basic networking concepts
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解HTTP、JSON和基本网络概念
- en: Access to modern AI tools such as Claude or ChatGPT for testing examples
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问现代AI工具，如Claude或ChatGPT，以测试示例
- en: All the code examples are designed to run on Windows, macOS, and Linux. The
    book includes specific installation instructions and setup guidance for each major
    platform.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所有代码示例都设计在Windows、macOS和Linux上运行。本书包括针对每个主要平台的特定安装说明和设置指南。
- en: Download the example code files
  id: totrans-41
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 下载示例代码文件
- en: You can download the example code files for this book from GitHub at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python).
    If there’s an update to the code, it will be updated in the GitHub repository.
    We also provide comprehensive examples, solutions to exercises, and additional
    resources to help you master MCP development.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从GitHub下载本书的示例代码文件，网址为[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python)。如果代码有更新，它将在GitHub仓库中更新。我们还提供了全面的示例、练习题的解决方案和额外的资源，以帮助您掌握MCP开发。
- en: We also have other code bundles from our rich catalog of books and videos available
    at [https://github.com/PacktPublishing/](https://github.com/PacktPublishing/).
    Check them out!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提供其他代码包，这些代码包来自我们丰富的图书和视频目录，可在 [https://github.com/PacktPublishing/](https://github.com/PacktPublishing/)
    获取。查看它们吧！
- en: Download the color images
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 下载彩色图像
- en: 'We also provide a PDF file that has color images of the screenshots/diagrams
    used in this book. You can download it here: [https://packt.link/gbp/9781806103232](https://packt.link/gbp/9781806103232).'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还提供包含本书中使用的截图/图表彩色图像的PDF文件。您可以从这里下载：[https://packt.link/gbp/9781806103232](https://packt.link/gbp/9781806103232)。
- en: Conventions used
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中使用了多种文本约定。
- en: '`Code In Text`: Indicates code words in text, database table names, folder
    names, filenames, file extensions, pathnames, dummy URLs, user input, and protocol
    names. For example: “The syntax is `uvicorn <filename>:<name of app instance>`.
    In this case, the filename is `main.py` and the app instance is `app`.”'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '`Code In Text`：表示文本中的代码单词、数据库表名、文件夹名、文件名、文件扩展名、路径名、虚拟URL、用户输入和协议名称。例如：“语法是
    `uvicorn <filename>:<name of app instance>`。在这种情况下，文件名是 `main.py`，应用程序实例是 `app`。”'
- en: 'A block of code is set as follows:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 代码块应如下设置：
- en: '[PRE0]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Any command-line input or output is written as follows:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 任何命令行输入或输出都应如下编写：
- en: '[PRE1]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Bold**: Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this. For example: “Note how **Transport Type** is set to `SSE` and **URL** is
    set to `http://localhost:8000/sse`.”'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要单词或您在屏幕上看到的单词。例如，菜单或对话框中的单词在文本中显示如下。例如：“注意**传输类型**设置为 `SSE`，**URL**
    设置为 `http://localhost:8000/sse`。”'
- en: Warnings or important notes appear like this.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 警告或重要注意事项看起来像这样。
- en: Tips and tricks appear like this.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士和技巧看起来像这样。
- en: Get in touch
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 联系我们
- en: Feedback from our readers is always welcome.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们始终欢迎读者的反馈。
- en: '**General feedback**: If you have questions about any aspect of this book or
    have any general feedback, please email us at `customercare@packt.com` and mention
    the book’s title in the subject of your message.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般反馈**：如果您对本书的任何方面有疑问或有任何一般性反馈，请通过电子邮件发送至 `customercare@packt.com`，并在邮件主题中提及本书的标题。'
- en: '**Errata**: Although we have taken every care to ensure the accuracy of our
