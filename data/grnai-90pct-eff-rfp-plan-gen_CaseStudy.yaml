- en: The Cumbersome Government Contracting Process
  id: totrans-0
  prefs: []
  type: TYPE_NORMAL
  zh: 繁琐的政府合同流程
- en: 'Government contracting is the process by which government entities — federal,
    state, or local — procure goods, services, or projects from private companies.
    It presents businesses with significant opportunities to secure large, stable
    contracts that can drive growth and establish credibility. However, the process
    is complex, requiring contractors to navigate:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 政府合同是政府实体（联邦、州或地方）从私营公司采购商品、服务或项目的流程。它为企业提供了获得大型、稳定的合同的机会，这些合同可以推动增长并建立信誉。然而，这个过程很复杂，需要承包商导航：
- en: Intricate requirements
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精细的要求
- en: Lengthy timelines
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 长时间的时间表
- en: Rigorous compliance standards
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 严格的合规标准
- en: A clear breakdown of the intricacies of the process means businesses can better
    assess the resources they need, and the value of innovative technologies that
    aim to reduce these inefficiencies.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 对流程复杂性的清晰分解意味着企业可以更好地评估他们所需的资源，以及旨在减少这些低效率的创新技术的价值。
- en: 'Step 1: Identifying opportunities'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：识别机会
- en: The process begins with identifying opportunities in government solicitations.
    Contractors must sift through databases to filter Requests for Information (RFIs)
    and Requests for Proposal (RFPs).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程从识别政府招标中的机会开始。承包商必须筛选数据库以过滤RFI和RFP。
- en: '![](img/B34115_Figure_01.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34115_Figure_01.png)'
- en: 'FIGURE 1: The three types of procurement request issued by government agencies.
    Sometimes, Requests for Quotes (RFQs) are used to supplement or replace RFIs.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：政府机构发布的三种采购请求类型。有时，RFQ（报价请求）被用来补充或替代RFI。
- en: RFIs, as exploratory documents, seek industry feedback on potential projects.
    Businesses evaluate these to determine alignment with their capabilities, requiring
    research into agency needs, market conditions, and competitors.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 作为探索性文件，RFI（请求信息）寻求行业对潜在项目的反馈。企业评估这些信息以确定其能力与需求的匹配度，需要研究机构需求、市场状况和竞争对手。
- en: '![](img/2.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: RFIs are often stuck behind very cumbersome interfaces. You’ve got to apply
    all the filters to a table, click through multiple pages of a web application,
    and hope you find the data you need. This process alone can consume significant
    time and resources.”
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: RFI通常被非常繁琐的界面所困。你必须将所有过滤器应用到表格中，点击网络应用程序的多个页面，并希望找到你需要的数据。这个过程本身就可能消耗大量的时间和资源。”
- en: – Anthony Brown
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: 'According to [Order.co](https://www.order.co/blog/procurement/rfi-meaning/),
    another organization dedicated to procurement automation, an RFI generally includes:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 根据[Order.co](https://www.order.co/blog/procurement/rfi-meaning/)，一个致力于采购自动化的组织，RFI通常包括：
- en: A project overview
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 项目概述
- en: The time frame for performance
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行时间框架
- en: Specific project details
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具体的项目细节
- en: Guidance for interested suppliers
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为感兴趣的供应商提供指导
- en: Room for more information
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更多信息的空间
- en: 'Step 2: Responding to RFIs'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：回应RFI
- en: 'Responding to an RFI requires demonstrating industry expertise by drafting
    thoughtful responses that outline potential approaches, technologies, and pricing
    models — often without a guaranteed contract. This involves:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 回应RFI需要通过起草深思熟虑的回应来展示行业专业知识，概述潜在的方法、技术和定价模型——通常在没有保证合同的情况下。这包括：
- en: Gathering input from experts
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从专家那里收集意见
- en: Analyzing market trends
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析市场趋势
- en: Crafting a narrative to position the company as a credible partner
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建一个故事，将公司定位为可靠的合作伙伴
- en: 'Step 3: Reviewing and analyzing RFPs'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：审查和分析RFP（请求提案）
- en: Once the RFP is issued, the stakes increase significantly. The RFP details the
    exact requirements for the project, including deliverables, timelines, and compliance
    expectations.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦发布RFP，风险显著增加。RFP详细说明了项目的确切要求，包括交付成果、时间表和合规期望。
- en: Contractors must carefully review these documents, often hundreds of pages long,
    to ensure they understand every nuance. This step may involve creating compliance
    matrices, where every requirement in the RFP is mapped to how the company intends
    to address it. Missing a single detail can result in disqualification.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 承包商必须仔细审查这些文件，通常长达数百页，以确保他们理解每一个细节。这一步骤可能涉及创建合规矩阵，将RFP中的每个要求映射到公司打算如何解决它。遗漏任何细节都可能导致资格丧失。
- en: The compliance matrix
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 合规矩阵
- en: 'In the [Association of Proposal Manager Professionals](https://www.apmp.org/)
    (APMP) compliance matrix [template](https://www.responsive.io/blog/proposal-compliance-matrix/),
    the columns that are described as “Generally used” are:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在[提案经理专业人员协会](https://www.apmp.org/)（APMP）合规矩阵[模板](https://www.responsive.io/blog/proposal-compliance-matrix/)中，描述为“通常使用”的列是：
- en: Section
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 章节页
- en: Section/subsection title
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 章节或子章节标题
- en: Page
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面
- en: Requirement (stated with an active verb)
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求（用主动语态陈述）
- en: F (fully comply)
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: F（完全符合）
- en: P (partially comply)
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P（部分符合）
- en: N (does not comply)
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: N（不符合）
- en: Response Reference (references name and page number of documentation that you
    supply as part of the response)
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应参考（参考您作为响应提供的文档的名称和页码）
- en: Comments
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评论
- en: The APMP is an “internationally accepted authority” whose mission is “to be
    the trusted leader that serves an international community of bid and proposal
    development professionals”. It has over 14,100 members across 79 countries.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: APMP是一个“国际认可的权威机构”，其使命是“成为受国际社区信任的领导者，为投标和提案开发专业人士提供服务”。它在全球79个国家拥有超过14,100名会员。
- en: 'Step 4: Assembling the proposal'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：组装提案
- en: 'Crafting the proposal is one of the most labor-intensive stages of the process.
    Businesses bring together teams of writers, subject matter experts, graphic designers,
    and legal advisors to create a compelling and compliant response. This involves:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 制定提案是整个过程中最劳动密集的阶段之一。企业汇集作家、主题专家、图形设计师和法律顾问团队，以创建一个引人入胜且符合规定的回应。这包括：
- en: 'Content creation: Writing detailed explanations of how the company will meet
    the agency’s needs, including technical plans, timelines, and cost structures.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容创作：撰写详细说明公司如何满足机构需求，包括技术计划、时间表和成本结构。
- en: 'Compliance documentation: Ensuring all necessary certifications, financial
    records, and regulatory requirements are included.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 合规文件：确保包括所有必要的认证、财务记录和监管要求。
- en: 'Visual artifacts: Creating supporting materials like Gantt charts, diagrams,
    and architectural designs to enhance the proposal.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉艺术品：创建支持材料，如甘特图、图表和建筑设计，以增强提案。
- en: '![](img/2.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: It’s a very long process. There are a lot of companies trying to prove that
    they’re the right one to actually perform the work. In some cases, these solicitations
    can take a year or more to actually win.”
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常漫长的过程。有很多公司在试图证明他们是真正执行工作的合适人选。在某些情况下，这些征求可能需要一年或更长时间才能真正赢得。”
- en: – Anthony Brown
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: 'Step 5: Internal reviews and revisions'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：内部审查和修订
- en: Before submission, proposals undergo multiple rounds of internal review to ensure
    accuracy and compliance. Teams scrutinize every word, number, and citation to
    ensure alignment with the RFP’s requirements. This iterative process often involves
    significant back-and-forth between departments, adding weeks to the timeline.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在提交之前，提案要经过多轮内部审查，以确保准确性和合规性。团队仔细审查每个单词、数字和引用，以确保与RFP的要求一致。这个迭代过程通常涉及部门之间的重大来回，增加了时间表数周。
- en: 'Step 6: Submission and waiting'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：提交和等待
- en: After submission, contractors face a long waiting period as government agencies
    evaluate the proposals. During this time, businesses must be prepared to respond
    to follow-up questions or requests for additional documentation. This stage can
    take months, creating uncertainty for the company’s pipeline and resource planning.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 提交后，承包商将面临漫长的等待期，因为政府机构正在评估提案。在这段时间里，企业必须准备回答后续问题或请求额外文件。这一阶段可能需要数月时间，给公司的管道和资源规划带来不确定性。
- en: 'Step 7: Post-award requirements'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 第7步：获奖后的要求
- en: Winning the contract is only the beginning. Contractors must prepare for rigorous
    oversight and reporting requirements throughout the project’s lifecycle. From
    ensuring compliance with cybersecurity standards like CMMC and FedRAMP to managing
    ongoing audits, the administrative burden continues even after the award is secured.
    Each step represents a significant investment of time, effort, and resources for
    private businesses.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 赢得合同只是开始。承包商必须为整个项目生命周期中的严格监督和报告要求做好准备。从确保符合CMMC和FedRAMP等网络安全标准到管理持续审计，行政负担在获得奖项后仍然持续。每一步都对私营企业代表着一个重大的时间、精力和资源投资。
- en: Without efficient tools or streamlined processes, contractors often find themselves
    overwhelmed by the sheer volume of work. This prolonged timeline often delays
    revenue generation and stretches resources thin, making government contracting
    a high-stakes, high-effort endeavor.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 没有高效的工具或简化的流程，承包商常常发现自己被大量工作压得喘不过气来。这个延长的时间表往往延迟了收入生成并使资源紧张，使得政府承包成为一项高风险、高投入的事业。
- en: '![](img/B34115_Figure_02.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34115_Figure_02.png)'
- en: 'FIGURE 2: Diagram showing the time-consuming steps in the process of securing
    government contracts.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图表2：显示获得政府合同过程中耗时步骤的图表。
- en: '![](img/2.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: Many companies today rely on a patchwork of tools to manage the complexities
    of government solicitations and contracts. They might use Salesforce to track
    processes, separate platforms to store and draft documents, and bring in multiple
    subject matter experts to piece everything together. This fragmented approach
    creates inefficiencies and silos, making it difficult to assemble, analyze, and
    act on critical information. By integrating AI into a single workflow, the process
    can be streamlined – allowing teams to generate artifacts like Gantt charts, architectural
    designs, and detailed analyses with ease. It’s about replacing scattered workflows
    with an intelligent, seamless system.”
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 许多公司今天依赖一系列工具来管理政府征求和合同的复杂性。他们可能会使用Salesforce来跟踪流程，使用不同的平台来存储和起草文件，并引入多个主题专家来整合所有内容。这种碎片化的方法造成了低效和孤岛效应，使得组装、分析和采取关键信息变得困难。通过将AI集成到单一的工作流程中，流程可以简化——允许团队轻松生成甘特图、架构设计和详细分析。这是用智能、无缝的系统替换分散的工作流程。
- en: – Anthony Brown
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: Procurement Sciences by Numbers
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学之数字
- en: 112 hours
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 112小时
- en: or $6,400 saved per proposal, for clients using the platform.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 或者为使用该平台的客户节省每份提案6400美元。
- en: Top 100
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 前100名
- en: Procurement Sciences works generally with the top 100 government contractors.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学通常与排名前100的政府承包商合作。
- en: 1960s
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 1960年代
- en: Their oldest clients have been around since the 1960s, meaning the platform
    needs to be able to handle legacy formats.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 他们最老的客户自1960年代以来一直存在，这意味着平台需要能够处理旧格式。
- en: 90%
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 90%
- en: Clients have seen 90% efficiency gains across proposal planning and generation
    stages.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 客户在提案规划和生成阶段看到了90%的效率提升。
- en: Why Good Procurement is Imperative and Where the Funding Goes
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么良好的采购是必不可少的以及资金去向何方
- en: In the fiscal year 2023, the US federal government “obligated [$759 billion](https://files.gao.gov/multimedia/Federal_Government_Contracting/index.html)
    through contracts”. 60% of this total went to defense agencies and the other 40%
    to civilian agencies.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在2023财年，美国联邦政府“通过合同义务支出[7590亿美元](https://files.gao.gov/multimedia/Federal_Government_Contracting/index.html)”。其中60%的总额分配给了国防机构，其余40%分配给了民用机构。
- en: '![](img/B34115_Figure_03.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34115_Figure_03.png)'
- en: 'FIGURE 3: Pie chart showing proportion of government funding pledged to civilian
    versus defense agencies.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图表3：显示分配给民用机构与国防机构的政府资金比例的饼图。
- en: Besides the standard procurement contract, there are legal instruments called
    [Other Transactions](https://aaf.dau.edu/aaf/contracting-cone/ot/) (OTs). They
    represent more flexible business arrangements deployed for R&D or prototyping
    activities, accounting for a further $15.7 billion in spending in the same year.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 除了标准采购合同外，还有称为[其他交易](https://aaf.dau.edu/aaf/contracting-cone/ot/)（OTs）的法律工具。它们代表了更灵活的商业安排，用于研发或原型活动，在同年进一步花费了157亿美元。
- en: The US Government Accountability Office (GAO) website highlights a government-wide
    goal to award roughly a quarter of contract dollars to small businesses — 23%
    by the [Small Business Act of 1953](https://www.law.cornell.edu/uscode/text/15/chapter-14A)
    — with the intention of promoting participation. This quota suggests a good opportunity
    for SMBs willing to take steps to optimize their processes, though there is some
    uncertainty about how the 2025 administration will look upon small businesses
    going ahead.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 美国政府问责办公室（GAO）网站强调了一个政府范围内的目标，即将大约四分之一的合同美元授予小企业——1953年[小企业法](https://www.law.cornell.edu/uscode/text/15/chapter-14A)规定为23%——目的是促进参与。这个配额为愿意采取措施优化其流程的小型企业提供了良好的机会，尽管对于2025年政府将如何看待小企业的发展存在一些不确定性。
- en: Product differentiation by org size
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 按组织规模进行产品差异化
- en: 'Procurement Sciences maintains two versions of its Awarded AI platform:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学维护其获奖AI平台的两个版本：
- en: 'An Azure Government Cloud version: Aimed at larger government contractors.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Azure政府云版本：针对大型政府承包商。
- en: 'A commercial version: Aimed at smaller firms, typically those with fewer than
    100 employees and handling up to 50 solicitations a year.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商业版本：面向小型企业，通常是那些员工人数少于100人且每年处理50次招标的企业。
- en: The current pricing model, however, is focused on users and not token usage,
    making partnerships with smaller companies less cost-effective. Procurement Sciences
    therefore works largely with clients from the list of top 100 federal contractors.
    A reminder that business models have direct implications for organizational impact,
    whether by accident or by design.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当前的定价模式是针对用户而非代币使用，这使得与小型公司的合作成本效益较低。因此，采购科学主要与联邦前100名承包商名单上的客户合作。提醒一下，商业模式对组织影响有直接影响，无论是偶然还是有意为之。
- en: This report delves into the technicalities of the platform in later sections.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 本报告将在后续章节深入探讨平台的细节。
- en: Fraud and bias in procurement
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 采购中的欺诈和偏见
- en: Procurement fraud typically accounts for [less than 10% of total civil fraud
    recoveries](https://www.hklaw.com/en/insights/publications/2024/03/government-contracts-enforcement-doj-publishes-fy-2023-false-claims)
    under the [1863 False Claims Act](https://www.justice.gov/civil/false-claims-act)
    (FCA). On the defense side, roughly [20% of the DoD’s ongoing Inspector General
    investigations](https://www.gao.gov/products/gao-21-309) are related to procurement
    fraud. While the scale of fraud is an order of magnitude smaller than that seen
    in healthcare — measured by number of FY23 cases brought by [qui tam](https://kkc.com/frequently-asked-questions/what-is-qui-tam/)
    whistleblowers — it nonetheless constitutes misuse of taxpayer money and undermines
    both military readiness and public safety.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 采购欺诈通常占[总民事欺诈追回金额不到10%](https://www.hklaw.com/en/insights/publications/2024/03/government-contracts-enforcement-doj-publishes-fy-2023-false-claims)，根据[1863年虚假索赔法](https://www.justice.gov/civil/false-claims-act)（FCA）。在国防方面，大约[20%的国防部正在进行的监察长调查](https://www.gao.gov/products/gao-21-309)与采购欺诈有关。虽然欺诈的规模比医疗保健领域——按2023财年[告密者](https://kkc.com/frequently-asked-questions/what-is-qui-tam/)告密者提起的案件数量衡量——小一个数量级，但它仍然构成了对纳税人资金的滥用，并损害了军事准备和公共安全。
- en: Historical cases of defense fraud in the Navy include the [2015 Fat Leonard
    bribery scandal](https://www.theguardian.com/us-news/2024/nov/05/fat-leonard-sentenced-military-fraud),
    and the FBI’s [Operation III Wind](https://www.fraud-magazine.com/article.aspx?id=4294990359)
    in the 1980s that saw the conviction of over 50 people — including 9 government
    officials and multiple defense company executives — for exchanging inside information
    and illicit favors. Operation III Wind led Congress to enact a broad series of
    reforms, including the [Competition in Contracting Act of 1984](https://www.congress.gov/bill/98th-congress/house-bill/5184)
    and the [Procurement Integrity Act of 1988](https://www.justice.gov/jmd/procurement-integrity),
    in an attempt to level the playing field. The [Federal Acquisition Regulation
    of 1984](https://www.acec.org/news/last-word-blog/post/long-ago-and-far-away-the-federal-acquisition-regulation-turns-40/)
    formalized many procurement processes, including the use of RFIs.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 海军国防欺诈的历史案例包括2015年的[肥伦德贿赂丑闻](https://www.theguardian.com/us-news/2024/nov/05/fat-leonard-sentenced-military-fraud)，以及20世纪80年代的FBI的[第三次风行动](https://www.fraud-magazine.com/article.aspx?id=4294990359)，当时有50多人被判有罪——包括9名政府官员和多家国防公司的高管——因为他们交换内部信息和非法恩惠。第三次风行动导致国会通过了一系列广泛的改革，包括1984年的[合同竞争法](https://www.congress.gov/bill/98th-congress/house-bill/5184)和1988年的[采购完整性法](https://www.justice.gov/jmd/procurement-integrity)，试图使竞争更加公平。1984年的[联邦采购条例](https://www.acec.org/news/last-word-blog/post/long-ago-and-far-away-the-federal-acquisition-regulation-turns-40/)正式化了许多采购流程，包括使用RFI。
- en: 'AI solutions have a natural place in these contexts. For example:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些环境中，人工智能解决方案有天然的位置。例如：
- en: 'Detecting fraud: Using historical procurement data to identify patterns associated
    with legitimate transactions, and flagging anomalies in bidding behavior, pricing,
    and contract alterations.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检测欺诈：使用历史采购数据来识别与合法交易相关的模式，并在投标行为、定价和合同变更中标记异常。
- en: 'Reducing bias: Anonymizing applications and scoring vendors based on objective
    criteria, minimizing subjective judgment.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少偏见：匿名化申请并根据客观标准对供应商进行评分，最小化主观判断。
- en: 'Improving transparency: Simplifying or summarizing complex legal or technical
    documents, making procurement more accessible to all stakeholders.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高透明度：简化或总结复杂法律或技术文件，使采购对所有利益相关者更加易于访问。
- en: How to think about compliance
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如何考虑合规性
- en: Procurement deals are struck for a wide range of products and services. Fixed
    wing aircraft, guided missiles, and professional engineering support comprised
    some of the [top FY23 defense spends](https://files.gao.gov/multimedia/Federal_Government_Contracting/index.html),
    while drugs, surgical equipment, precious metals, and general healthcare services
    were among the top civilian spends. It is clear that businesses must maintain
    a strong regulatory focus if they wish to fulfil these contracts competently.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 采购交易涉及广泛的商品和服务。固定翼飞机、导弹和专业的工程支持构成了[2023财年最高国防支出](https://files.gao.gov/multimedia/Federal_Government_Contracting/index.html)的一部分，而药品、手术设备、贵金属和一般医疗服务则是民用支出中的主要部分。显然，企业必须保持强大的监管关注，才能胜任这些合同的履行。
- en: 'Anthony Brown, Former Head of Data and AI at Procurement Sciences, looks at
    compliance as the coming together of two different areas:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼·布朗，采购科学公司前数据与AI负责人，将合规性视为两个不同领域的结合：
- en: 'Data sensitivity: Personal information and sensitive classified information.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据敏感性：个人信息和敏感分类信息。
- en: 'Proprietary information: Customer data, and how to store and process it without
    violating federal requirements.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专有信息：客户数据，以及如何存储和处理这些数据而不违反联邦要求。
- en: '![](img/2.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: Most of our customer base in the federal market are working with the Department
    of Defense, so it’s even higher sensitivity to those requirements than just the
    general government. For government agencies like the Veterans Association, as
    an example, there’s an even higher sensitivity.”
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在联邦市场的客户基础大多与国防部合作，因此对这些要求的高度敏感性甚至超过了普通政府。以退伍军人协会这样的政府机构为例，其敏感性更高。”
- en: – Anthony Brown
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: Security frameworks
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 安全框架
- en: Anthony is conversant in the many security requirements Procurement Sciences
    must guard. The TechLeader team wonders if this is a necessary reassurance he
    must practise giving to clients.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼熟悉采购科学公司必须遵守的众多安全要求。TechLeader团队想知道这是否是他必须向客户提供必要保证的必要做法。
- en: 'He touches on a number in our interview:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 他在我们的采访中提到了几个方面：
- en: SOC 2 (System and Organization Controls 2)
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SOC 2（系统和组织控制2）
- en: CMMC (Cybersecurity Maturity Model Certification)
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CMMC（网络安全成熟度模型认证）
- en: FedRAMP (Federal Risk and Authorization Management Program)
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FedRAMP（联邦风险和授权管理计划）
- en: FIPS 140 (Federal Information Processing Standards)
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FIPS 140（联邦信息处理标准）
- en: CUI (Controlled Unclassified Information) requirements
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CUI（受控未分类信息）要求
- en: HIPAA (Health Insurance Portability and Accountability Act)
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HIPAA（健康保险可携带性和问责法案）
- en: '![](img/2.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: The general sense is that we have to be SOC 2-compliant, CMMC-compliant, and
    FedRAMP-compliant.”
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 人们的普遍看法是我们必须遵守SOC 2、CMMC和FedRAMP的规定。”
- en: – Anthony Brown
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: SOC 2 is a [broad standard](https://soc2.co.uk/) applicable to any service organization
    handling customer data. CMMC targets [DoD contractors specifically](https://dodcio.defense.gov/cmmc/About/),
    while FedRAMP focuses on [cloud services](https://www.gsa.gov/technology/government-it-initiatives/fedramp)
    used by federal agencies.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: SOC 2是一个[广泛的标准](https://soc2.co.uk/)，适用于任何处理客户数据的服务机构。CMMC针对[国防部承包商](https://dodcio.defense.gov/cmmc/About/)，而FedRAMP则关注[联邦机构使用的云服务](https://www.gsa.gov/technology/government-it-initiatives/fedramp)。
- en: Procurement in the EU
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 欧盟的采购
- en: In the EU, public authorities spend around €2 trillion per year on procurement.
    The [European Commission (EC) website](https://single-market-economy.ec.europa.eu/single-market/public-procurement_en)
    states that the public sector comprises the majority of buyers in transport and
    education, among other areas. The front page also spotlights the EC’s ability
    to [completely exclude](https://ec.europa.eu/commission/presscorner/detail/en/ip_22_2332)
    countries like Russia from participation in procurement contracts in the EU, as
    a method of sanction.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在欧盟，公共机构每年在采购上花费约2000亿欧元。欧洲委员会（EC）网站[欧洲单一市场与经济](https://single-market-economy.ec.europa.eu/single-market/public-procurement_en)指出，在运输和教育等众多领域，公共部门是大多数买家的组成部分。首页还突出了欧洲委员会排除[俄罗斯等国家](https://ec.europa.eu/commission/presscorner/detail/en/ip_22_2332)参与欧盟采购合同的能力，作为制裁的一种方式。
- en: The Most Advantageous Tender (MAT) is the framework used for reward evaluation
    in the EU, considering factors like innovation, pricing, quality, and environmental
    impact. EU businesses have the right to compete for contracts [in any EU country](https://europa.eu/youreurope/business/selling-in-eu/public-contracts/public-tendering-rules/index_en.htm).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 最有利的投标（MAT）是欧盟用于奖励评估的框架，考虑因素包括创新、定价、质量和环境影响。欧盟企业有权在任何欧盟国家[竞争合同](https://europa.eu/youreurope/business/selling-in-eu/public-contracts/public-tendering-rules/index_en.htm)。
- en: '[![A black and green logo'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '[![一个黑色和绿色的标志'
- en: AI-generated content may be incorrect.](img/TL_Logo.png)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成的内容可能是不正确的。](img/TL_Logo.png)
- en: 'FEEDBACK TOUCHPOINT 1:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈触点 1：
- en: We value sharp feedback.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们重视尖锐的反馈。
- en: Quick thoughts on this section?](https://forms.office.com/e/dntxUZgT1b)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 对这一部分有什么快速的想法吗？](https://forms.office.com/e/dntxUZgT1b)
- en: How AI Can Help Expedite the Process
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能如何帮助加速流程
- en: Procurement Sciences leverages AI techniques, notably assistants, to streamline
    the various stages of the government contracting process.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学利用人工智能技术，特别是助手，来简化政府合同流程的各个阶段。
- en: '![](img/2.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: We’ve got assistants that are built in for these specific tasks, for each part
    of the process. So, whether it’s a planning effort that they need to do, or [whether]
    they need to generate artefacts like diagrams, charts, Gantt charts, they can
    [do it] directly inside [the platform].”
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为这些特定任务构建了助手，每个流程部分都有。所以，无论是他们需要做的规划工作，还是[他们]需要生成如图表、图表、甘特图等工件，他们可以直接在[平台]内完成。”
- en: – Anthony Brown
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: High-level workflow overview
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 高级工作流程概述
- en: Before exploring the platform’s technologies, we’ll break down the core workflow
    steps it supports.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索平台的技术之前，我们将分解它支持的核心理工作流步骤。
- en: 'Priming the AI: During onboarding, users input details like their industry
    and expertise, which are tied to taxonomies and a knowledge base. This primes
    the AI to deliver tailored recommendations and actions.'
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调整人工智能：在入职期间，用户输入有关其行业和专业知识的详细信息，这些信息与分类法和知识库相关联。这使人工智能能够提供定制化的建议和行动。
- en: 'Opportunity identification: The platform’s AI-powered Bid Search taps into
    a centralized, daily-updated data warehouse that aggregates information from sources
    such as [SAM.gov](https://sam.gov/). Opportunities are displayed in a structured
    format, and semantic search enables users to query naturally, avoiding complex
    navigation and saving significant time.'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机会识别：平台的人工智能驱动的投标搜索利用一个集中式、每日更新的数据仓库，汇集来自[SAM.gov](https://sam.gov/)等来源的信息。机会以结构化格式显示，语义搜索使用户能够自然查询，避免复杂的导航并节省大量时间。
- en: 'Qualification: Users qualify identified opportunities by assessing their alignment
    with company capabilities and strategic goals. Uploaded documents, such as competitive
    intelligence and capability statements, are analyzed by AI to provide deeper insights
    and actionable suggestions.'
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 资格认定：用户通过评估其与公司能力和战略目标的一致性来认定识别出的机会。人工智能分析上传的文件，如竞争情报和能力声明，以提供更深入的见解和可操作的建议。
- en: 'Pipeline integration: Once users identify a relevant solicitation, they can
    add it to their pipeline. This centralized space helps organize tasks, store related
    documents, and maintain a logical sequence of actions for each solicitation.'
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 管道集成：一旦用户识别出相关的征求，他们就可以将其添加到他们的管道中。这个集中空间有助于组织任务、存储相关文档并为每个征求维护逻辑行动顺序。
- en: 'Planning: Procurement Sciences facilitates planning by assisting users in organizing
    timelines, allocating resources, and defining proposal steps. AI generates artifacts
    like Gantt charts and diagrams while analyzing uploaded documents to optimize
    strategy and assess risks.'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 规划：采购科学通过协助用户组织时间表、分配资源以及定义提案步骤来促进规划。在分析上传的文档以优化策略和评估风险的同时，人工智能生成如甘特图和图表等工具。
- en: 'Proposal generation and fine-tuning: Using AI within Procurement Sciences’
    content builder, users create proposals with streamlined processes for compliance
    analysis, content drafting, diagram creation, research integration, and rapid
    RFI generation. The platform also supports iterative fine-tuning, enabling users
    to refine and align proposals with their strategy and goals through collaborative
    AI tools.'
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提案生成和微调：在采购科学的内容构建器中使用人工智能，用户可以创建具有合规分析、内容起草、图表创建、研究整合和快速RFI生成的简化流程的提案。该平台还支持迭代微调，通过协作人工智能工具使用户能够根据其策略和目标对提案进行精炼和调整。
- en: 'Submission and post-submission: Finalized proposals can be exported in multiple
    formats for submission. Post-submission tools include AI-driven debrief analysis,
    protest evaluation, and pattern tracking to inform future improvements.'
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提交和提交后：最终提案可以以多种格式导出以供提交。提交后工具包括AI驱动的简报分析、抗议评估和模式跟踪，以提供未来改进的信息。
- en: Readers should note how these workflow steps map to the general procurement
    process introduced earlier in this report.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 读者应注意这些工作流程步骤如何映射到本报告早期介绍的通用采购流程。
- en: '![](img/2.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: Procurement Sciences was founded just about two years ago, built by government
    contractors, for government contractors. Much of our team comes from former government
    contracting companies, including some of the customers we now serve.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学公司大约两年前成立，由政府承包商建立，为政府承包商服务。我们团队的大部分成员来自前政府承包公司，包括我们现在服务的部分客户。
- en: Our mission is to streamline and simplify the government solicitation process
    – reducing the red tape involved in creating procurement requests, responding
    to requests for information, and navigating the entire solicitation cycle.”
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的使命是简化政府招标流程——减少创建采购请求、响应信息请求和整个招标周期中涉及的繁琐程序。”
- en: – Anthony Brown
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: A closer look at Bid Search for opportunity identification
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 深入了解投标搜索以识别机会
- en: 'The platform’s Bid Search interface connects to a centralized data warehouse,
    pulling solicitations from various sources. The structured table format displays
    key details, enabling users to quickly evaluate opportunities. Features include:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 平台的投标搜索界面连接到一个集中的数据仓库，从各种来源拉取招标信息。结构化的表格格式显示关键细节，使用户能够快速评估机会。功能包括：
- en: 'Semantic search: Users can perform advanced queries to find specific information
    or ask questions about solicitations, bypassing cumbersome traditional systems.
    “Instead of navigating multiple pages, users can directly interact with the platform,”
    Anthony notes.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语义搜索：用户可以执行高级查询以查找特定信息或就招标提出问题，绕过繁琐的传统系统。“用户可以直接与平台互动，而不是浏览多个页面，”安东尼指出。
- en: 'Persona integration: Knowledge graph taxonomies link solicitation data with
    industry and role-specific insights, helping users identify opportunities that
    align with their expertise.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个性整合：知识图谱分类法将招标数据与行业和角色特定的洞察联系起来，帮助用户识别与其专业知识相符的机会。
- en: Once users identify a relevant solicitation, they can add it to their pipeline.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦用户识别出相关的招标，他们就可以将其添加到他们的管道中。
- en: A closer look at pipeline management
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 深入了解管道管理
- en: The pipeline organizes identified opportunities and primes them for downstream
    tasks like compliance and proposal drafting.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 管道组织识别出的机会，并为下游任务如合规性和提案起草做好准备。
- en: '![A screenshot of a computer'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '![计算机屏幕截图'
- en: AI-generated content may be incorrect.](img/B34115_Figure_04.png)
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生成的内容可能是不正确的。](img/B34115_Figure_04.png)
- en: 'FIGURE 4: The interface of the Awarded AI platform, displaying the “Pipeline”
    tab. Stages include Opportunity Assessment, Capture/Proposal Planning, Proposal
    Development, Proposal Submitted, and Closed.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图表4：授予人工智能平台的界面，显示“管道”标签。阶段包括机会评估、捕获/提案规划、提案开发、提案提交和关闭。
- en: 'Data flow: When opportunities are added to the pipeline, relevant documents
    are parsed, embedded, and vectorized. These processes use tools like Python and
    LanceDB to enable efficient retrieval.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据流：当机会被添加到管道中时，相关文档会被解析、嵌入和矢量化。这些过程使用Python和LanceDB等工具来实现高效的检索。
- en: 'Pipeline in context: The pipeline integrates with the knowledge graph, linking
    data about opportunities to associated industries, roles, and previous insights.
    This contextualization ensures that all related information is available during
    subsequent phases.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文中的管道：该管道与知识图谱集成，将机会数据与相关行业、角色和先前的洞察联系起来。这种上下文化确保在后续阶段所有相关信息都可用。
- en: This [kanban-board](https://www.atlassian.com/agile/kanban/boards)-like interface
    means that users progress from research to planning and development in a structured
    way.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类似[看板](https://www.atlassian.com/agile/kanban/boards)的界面意味着用户可以以结构化的方式从研究过渡到规划和开发。
- en: Multi-agent orchestration
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 多代理编排
- en: Procurement Sciences uses multi-agent orchestration, in which different functions
    correspond to various AI-powered assistants, operating through built-in prompts,
    to enable smooth transitions between different processes.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: Procurement Sciences使用多代理编排，其中不同的功能对应于各种AI辅助助手，通过内置提示进行操作，以实现不同过程之间的平稳过渡。
- en: '![](img/B34115_Figure_05.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34115_Figure_05.png)'
- en: 'FIGURE 5: How the Awarded AI platform uses assistants.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图表5：获奖AI平台如何使用助手。
- en: When a user types in a query about key aspects of a proposal, the AI can immediately
    analyze and generate insights based on the provided data. The output from these
    assistants is displayed directly in chat, and the system allows users to move
    chat outputs into other areas of the application, such as searching for solicitations
    or managing other critical tasks within the platform.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户输入有关提案关键方面的查询时，AI可以立即根据提供的数据进行分析并生成见解。这些助手的输出直接显示在聊天中，系统允许用户将聊天输出移动到应用程序的其他区域，例如搜索征求或管理平台内的其他关键任务。
- en: The Tech Stack
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 技术堆栈
- en: Procurement Sciences incorporates cloud infrastructure, data management systems,
    and AI technologies into its tech stack — selected to balance security, scalability,
    and performance.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: Procurement Sciences将其技术堆栈整合到云基础设施、数据管理系统和AI技术中——这些技术被选中以平衡安全性、可扩展性和性能。
- en: 'Key decision: Smart outsourcing to secure cloud infrastructure'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 关键决策：智能外包以保障云基础设施
- en: The platform is hosted on Azure Government Cloud (GCC High) to meet the stringent
    security requirements of government contractors. This secure and isolated environment
    ensures baseline compliance with frameworks like FedRAMP, [ITAR](https://www.pmddtc.state.gov/ddtc_public/ddtc_public?id=ddtc_kb_article_page&sys_id=24d528fddbfc930044f9ff621f961987),
    and [DFARS](https://www.acquisition.gov/dfars), offering assurance to government
    contractors and other organizations with tricky compliance demands.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 该平台托管在Azure Government Cloud（GCC High）上，以满足政府承包商的严格安全要求。这个安全和隔离的环境确保了与FedRAMP、[ITAR](https://www.pmddtc.state.gov/ddtc_public/ddtc_public?id=ddtc_kb_article_page&sys_id=24d528fddbfc930044f9ff621f961987)和[DFARS](https://www.acquisition.gov/dfars)等框架的基线合规性，为政府承包商和其他有复杂合规性要求的组织提供保证。
- en: '![](img/2.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: We don’t have to come up with our own infrastructure or figure out how to make
    everything compliant on its own. By hosting in Azure Gov Cloud, we’re able to
    achieve a lot of those requirements.”
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不必自己提出基础设施或弄清楚如何使一切符合规范。通过在Azure Government Cloud中托管，我们能够实现许多这些要求。”
- en: – Anthony Brown
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: – Anthony Brown
- en: Harnessing existing customer infrastructure
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 利用现有客户基础设施
- en: The added benefit of Azure Government Cloud is that it is already used by many
    customers to host their internal networks and tools like Microsoft Office. This
    means Procurement Sciences can make sure their data is secure and in the “same
    region, same enclave, same network” as the client’s existing Government Cloud.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: Azure Government Cloud的额外好处是它已经被许多客户用来托管他们的内部网络和工具，如Microsoft Office。这意味着Procurement
    Sciences可以确保他们的数据是安全的，并且与客户的现有Government Cloud处于“同一地区、同一区域、同一网络”。
- en: Limitations of Azure Government Cloud
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: Azure Government Cloud的限制
- en: Due to the additional need for cloud vendors to vet new models against safety
    and security benchmarks, the latest versions of models are not available in Azure
    Government Cloud. According to Anthony, “They become generally available maybe
    7-8 months, possibly a year, later than they do in the commercial clouds.” Azure
    OpenAI service became available in Azure Government in [February 2024](https://devblogs.microsoft.com/azuregov/azure-openai-service-now-available-in-azure-gov-cloud/),
    after its general commercial availability in [January 2023](https://siliconangle.com/2023/01/17/microsoft-makes-azure-openai-service-generally-available/).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 由于云供应商需要对新模型进行安全性和安全性基准的审查，Azure Government Cloud中不可用最新版本的模型。据Anthony说，“它们可能在商业云中普遍可用7-8个月，可能是一年后。”Azure
    OpenAI服务在[2024年2月](https://devblogs.microsoft.com/azuregov/azure-openai-service-now-available-in-azure-gov-cloud/)在Azure
    Government中可用，在[2023年1月](https://siliconangle.com/2023/01/17/microsoft-makes-azure-openai-service-generally-available/)商业普遍可用之后。
- en: Vendors will test for things like how well the model handles prompt injections,
    and whether it can be goaded into outputs that are unethical.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 供应商将测试模型如何处理提示注入，以及它是否可以被诱导产生不道德的输出。
- en: Azure BLOB Storage is utilized for securely storing documents and attachments
    associated with government solicitations. This ensures quick access to data while
    maintaining [compliance with government standards](https://learn.microsoft.com/en-us/azure/storage/common/storage-compliance-offerings).
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: Azure BLOB存储用于安全存储与政府招标相关的文档和附件。这确保了数据的快速访问，同时保持[符合政府标准](https://learn.microsoft.com/en-us/azure/storage/common/storage-compliance-offerings)。
- en: Kubernetes underpins the platform’s scalability and tenant management. Each
    customer operates in a single-tenant instance for enhanced security. “In this
    way, we can actually section off logically and physically the data that’s going
    into each one of those tenants for our customers. Their data does not have the
    possibility of being mixed with another company’s data at all.”
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: Kubernetes支撑平台的可扩展性和租户管理。每个客户都在一个单租户实例中运行，以增强安全性。“这样，我们实际上可以逻辑上和物理上分隔每个租户进入的数据，我们的客户的数据不可能与其他公司的数据混合。”
- en: '![](img/B34115_Figure_06.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34115_Figure_06.png)'
- en: 'FIGURE 6: The core technical architecture, as described by Anthony. All services
    hosted on Azure Gov Cloud in Kubernetes clusters. [Icon](https://www.flaticon.com/free-icon/doc_13148548?term=microsoft+word&page=1&position=11&origin=search&related_id=13148548)
    created by Chanut-is-Industries on flaticon.com.'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：如Anthony所描述的核心技术架构，所有服务均托管在Azure Gov Cloud的Kubernetes集群中。[图标](https://www.flaticon.com/free-icon/doc_13148548?term=microsoft+word&page=1&position=11&origin=search&related_id=13148548)由Chanut-is-Industries在flaticon.com创建。
- en: '[![A black and green logo'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '![![一个黑白和绿色的标志'
- en: AI-generated content may be incorrect.](img/TL_Logo.png)
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的内容可能是不正确的。](img/TL_Logo.png)
- en: 'FEEDBACK TOUCHPOINT 2:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈触点2：
- en: Quick feedback on this section?](https://forms.office.com/e/dntxUZgT1b)
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 对本节有何快速反馈？](https://forms.office.com/e/dntxUZgT1b)
- en: Programming languages and frameworks
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 编程语言和框架
- en: 'Python is used extensively for tasks such as:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: Python被广泛用于如下任务：
- en: Batch loading solicitations from sources like SAM.gov
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从SAM.gov等来源批量加载招标
- en: Parsing documents and attachments using libraries like Tika
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Tika等库解析文档和附件
- en: Building data pipelines and AI agents to support market intelligence functions
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建数据管道和AI代理以支持市场情报功能
- en: The platform’s front end is built with TypeScript and JavaScript, in conjunction
    with Next.js, the leading React framework, and served by Vercel.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 平台前端使用TypeScript和JavaScript构建，结合Next.js，领先的React框架，并由Vercel提供服务。
- en: Data management and processing
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 数据管理和处理
- en: ClickHouse serves as the platform’s high-performance columnar database, acting
    as a data warehouse for storing solicitation data. It enables fast, efficient
    queries for features like Bid Search.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: ClickHouse作为平台的高性能列式数据库，充当存储招标数据的数据仓库。它支持快速、高效的查询，如投标搜索。
- en: Redis functions as a memory cache for embedding pipelines, supports workflow
    event management, and ensures efficient state handling.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: Redis作为嵌入管道的内存缓存，支持工作流事件管理，并确保高效的状态处理。
- en: LanceDB is used as a vector database to handle embeddings, simplifying the tech
    stack by integrating multiple functions within a single tool.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: LanceDB用作向量数据库来处理嵌入，通过将多个功能集成到单个工具中简化技术堆栈。
- en: Apache Airflow orchestrates and monitors data pipelines, ensuring smooth and
    reliable data processing.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: Apache Airflow协调和监控数据管道，确保数据处理的平稳和可靠。
- en: Data vault modeling
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 数据仓库建模
- en: The Awarded AI platform uses data vault modeling to structure its data, supporting
    scalability and traceability.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 获奖的AI平台使用数据仓库建模来结构化其数据，支持可扩展性和可追溯性。
- en: This enterprise design pattern, or schema, consists of [three types of entities](https://www.databricks.com/glossary/data-vault),
    hubs, links, and satellites.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这种企业设计模式或模式由[三种类型的实体](https://www.databricks.com/glossary/data-vault)、枢纽、链接和卫星组成。
- en: '![](img/B34115_Figure_07.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34115_Figure_07.png)'
- en: 'FIGURE 7: Data vault modeling.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：数据仓库建模。
- en: Hubs represent business entities and contain only their unique identifiers.
    For example, agencies, vendors, and contracts.
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 枢纽代表业务实体，只包含它们的唯一标识符。例如，机构、供应商和合同。
- en: Links define relationships between hubs. For example, links between vendors
    and solicitations, or between agencies and contracts.
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 链接定义了枢纽之间的关系。例如，供应商和招标之间的链接，或机构与合同之间的链接。
- en: Satellites store descriptive attributes and historical changes related to hubs
    or links, enabling a complete audit trail. For example, vendor or agency attributes,
    or vendor bid modifications over time.
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卫星存储与枢纽或链接相关的描述性属性和历史变化，使审计轨迹完整。例如，供应商或机构属性，或供应商随时间进行的投标修改。
- en: Data vaults are scalable, flexible to refactoring, and reduce data redundancy
    compared to star or snowflake schemas.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 数据仓库可扩展、灵活重构，与星型或雪花模式相比，减少了数据冗余。
- en: Neo4j is used to build knowledge graphs. These graphs represent relationships
    between entities such as companies, agencies, and solicitations, providing valuable
    insights into industry dynamics.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: Neo4j用于构建知识图谱。这些图表示实体（如公司、机构和招标）之间的关系，为行业动态提供有价值的见解。
- en: AI models and libraries
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型和库
- en: 'Procurement Sciences leverages several OpenAI models for diverse tasks, as
    well as Anthropic’s Claude:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学利用多个OpenAI模型以及Anthropic的Claude进行多样化任务：
- en: GPT-4 is used with tools like Mermaid.js for generating diagrams (such as Gantt
    charts and flow diagrams), drafting proposal content, and providing semantic search
    capabilities.
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT-4与Mermaid.js等工具结合使用，用于生成图表（如甘特图和流程图）、起草提案内容，并提供语义搜索功能。
- en: GPT-4o and GPT-4o Mini handle short-context prompts, ensuring efficient processing
    for specific queries.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT-4o和GPT-4o Mini处理短上下文提示，确保特定查询的高效处理。
- en: OpenAI’s ada-2 embedding model is used in embedding processes for precise and
    efficient data vectorization.
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenAI的ada-2嵌入模型用于嵌入过程中的精确和高效数据向量化。
- en: Anthropic’s Claude is preferred for drafting long-form text due to its high-quality
    output and ability to produce natural-sounding language. It also handles longer
    contexts, making it suitable for complex RFPs and detailed responses.
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于其高质量的输出和产生自然语言的能力，Anthropic的Claude被优先用于撰写长文本。它还能处理更长的上下文，使其适合复杂的RFP和详细的回复。
- en: The precise makeup of these models will surely change in time. The key idea
    is that different models have different strengths that adopters must take into
    consideration.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型的精确构成肯定会随时间而变化。关键思想是不同的模型具有不同的优势，采用者必须考虑。
- en: Other tools and integrations
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 其他工具和集成
- en: Langfuse is used to monitor and evaluate the performance of Procurement Sciences’
    AI agents, providing insights to refine and optimize AI-driven workflows.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: Langfuse用于监控和评估采购科学AI代理的性能，提供见解以优化和优化AI驱动的流程。
- en: 'Salesforce and SharePoint (customer integrations): While not part of Procurement
    Sciences’ internal tech stack, Salesforce and SharePoint are acknowledged as being
    commonly used by their customers. The platform is designed to integrate effectively
    with these platforms, using REST APIs and open-source tooling, allowing users
    to manage proprietary information and streamline solicitation workflows.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce和SharePoint（客户集成）：虽然不是采购科学内部技术堆栈的一部分，但Salesforce和SharePoint被认可为客户常用的平台。该平台设计为与这些平台有效集成，使用REST
    API和开源工具，允许用户管理专有信息并简化招标流程。
- en: LLMs in the Context of the Solution
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决方案背景下的LLM
- en: Inference as strength
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 推断作为优势
- en: The strength of the LLM in the Procurement Sciences use case comes from its
    ability to infer the unsaid. Anthony compares the RFI to a legal document, in
    which things are written in a very specific way, using statements like shall,
    must, and we. “These are a legal language that is also a part of a solicitation,
    because it is a contract that [businesses] are signing up to fulfill.”
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在采购科学用例中，LLM的优势来自于其推断未言明内容的能力。安东尼将RFI比作法律文件，其中内容以非常具体的方式书写，使用诸如应当、必须和我们的陈述。“这是一种法律语言，也是招标的一部分，因为它是一份[企业]承诺履行的合同。”
- en: '![](img/B34115_Figure_08.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34115_Figure_08.png)'
- en: 'FIGURE 8: Contract language that might be absent in a solicitation.'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图8：在招标中可能缺失的合同语言。
- en: The difference is that an RFI “might not say must, shall, or we…but it actually
    does”. The RFI will imply that something is expected to be a requirement, and
    the onus is on businesses to infer it correctly.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 差异在于RFI“可能不会说必须、应当或我们……但实际上确实如此”。RFI会暗示某些内容是预期要求，而责任在于企业正确推断。
- en: Prompt engineering in Awarded AI
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 在获奖AI中的提示工程
- en: There is already much discussion about how to approach prompt engineering, including
    in [vendor documentation](https://platform.openai.com/docs/guides/prompt-engineering)
    and some of TechLeader’s other reports. Below are the broad strokes of the Procurement
    Sciences approach, which Anthony calls “basic but effective”.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 已经有很多关于如何进行提示工程（包括在[供应商文档](https://platform.openai.com/docs/guides/prompt-engineering)和TechLeader的其他报告中）的讨论。以下是采购科学方法的大致轮廓，安东尼称之为“基本但有效”。
- en: 'Few-shot prompts: “If I’m saying I want an RFP or an RFI or a particular section
    of one, I would provide in the prompt an example.”'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示：“如果我表示我想要一个RFP或RFI或某个特定部分，我会在提示中提供一个示例。”
- en: 'Not giving the model too many instructions: The memory limitations of the model
    are relevant here. Anthony gives an example:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 不要给模型太多指令：模型的内存限制在这里是相关的。安东尼给出了一个例子：
- en: 'Bad prompt type: “Create me an RFI and here’s the solicitation you need to
    reference.”'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不良的提示类型：“创建一个RFI，并参考你需要引用的征求书。”
- en: This prompt could reasonably create a decent outline of an RFI, but each individual
    section wouldn’t have the desired quality.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示可以合理地创建一个RFI的 decent 概要，但每个单独的部分都不会达到预期的质量。
- en: 'Good prompt type: “You’re going to create this RFI. This is the type of persona
    that you’re taking on. Here’s some of the initial information that you’re looking
    for. Here’s an example of what that information will look like. Now ask the user
    these particular questions. Start with this one first.”'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优秀的提示类型：“你将创建这个RFI。这是你要扮演的角色类型。以下是你正在寻找的一些初始信息。以下是一些信息的示例。现在向用户提出这些问题。首先从这个问题开始。”
- en: Now, the model begins a conversation with the user and only outputs sections
    as it is given the relevant context. The output is specific to one particular
    task, instead of the model trying to complete three or four tasks at the same
    time.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，模型开始与用户进行对话，并且只输出它被提供的相关上下文的部分。输出是针对特定任务的，而不是模型试图同时完成三个或四个任务。
- en: '![](img/2.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: We often contradict ourselves. We’ll ask somebody to do a task, and we’ll give
    [them] so much information that the first part of the task might contradict the
    last part. We try to scope it down to what is achievable, so we don’t have those
    contradictions and we’re not trying to do too much inside one part of the document
    — especially because the output context is limited on these language models. As
    you start to reach those token limits on the output, that’s where you get hallucinations.”
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们经常自相矛盾。我们会要求某人完成一项任务，并给出[他们]如此多的信息，以至于任务的第一个部分可能与最后一个部分矛盾。我们试图将其缩小到可实现的范围内，以避免这些矛盾，并且我们不想在一个文档的部分中做太多事情——尤其是在这些语言模型的输出上下文有限的情况下。当你开始接近输出令牌限制时，这就是你得到幻觉的地方。”
- en: – Anthony Brown
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: Evolution of model reasoning
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 模型推理的演变
- en: The Procurement Sciences team continues to update how their application interacts
    with the latest LLMs. “Something that we did notice is, as these innovations happen
    with the models and their reasoning capabilities improve, the prompting cannot
    necessarily stay the same.”
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学团队继续更新他们的应用程序如何与最新的LLMs交互。“我们注意到的是，随着模型及其推理能力的创新发生，提示可能不一定保持不变。”
- en: Defining reasoning
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 定义推理
- en: 'Anthony expresses skepticism in our interview about whether or not a model
    is actually “reasoning”, by our current understanding of the word. Here are some
    relevant directions to explore for answers:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼在我们的采访中对我们是否真正理解“推理”一词表示怀疑，他是否真的在“推理”。以下是一些探索答案的相关方向：
- en: '[Chain of thought](https://openai.com/index/learning-to-reason-with-llms/):
    This is similar to how human reasoning happens. Chains of thought can be monitored
    for compliance or alignment purposes.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[思维链](https://openai.com/index/learning-to-reason-with-llms/)：这与人类的推理方式相似。思维链可以用于合规性或一致性目的的监控。'
- en: 'The intentionality argument: LLMs don’t “reason” about problems, they [predict
    answers based on probabilities](https://arxiv.org/abs/2210.13966).'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有意为之的论点：大型语言模型（LLMs）并不是“推理”问题，它们[基于概率预测答案](https://arxiv.org/abs/2210.13966)。
- en: 'Other “reasoning” strategies: Self-consistency (running multiple solutions
    and selecting the most frequent answer), [Tree of Thoughts](https://www.ibm.com/think/topics/tree-of-thoughts)
    (ToTs), [program-aided language models](https://arxiv.org/abs/2211.10435) (PALs),
    fine-tuning on reasoning tasks.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他“推理”策略：自我一致性（运行多个解决方案并选择最频繁的答案）、[思维树](https://www.ibm.com/think/topics/tree-of-thoughts)（ToTs）、[程序辅助语言模型](https://arxiv.org/abs/2211.10435)（PALs）、推理任务的微调。
- en: 'Known LLM weaknesses: Hallucinations, abstract and counterfactual reasoning
    (cannot imagine alternate realities reliably), long-horizon reasoning (break down
    on multi-step or complex logic chains), lack of internal consistency (can contradict
    themselves within the same conversation).'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 已知的LLM弱点：幻觉、抽象和反事实推理（无法可靠地想象其他现实）、长期推理（在多步或复杂的逻辑链中崩溃）、缺乏内部一致性（可以在同一对话中自相矛盾）。
- en: 'The million-dollar question: If it looks like reasoning and acts like reasoning,
    is it reasoning?'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 百万美元的问题：如果它看起来像推理，表现得像推理，那么它是推理吗？
- en: '![](img/2.png)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: The same types of prompts that you used with a 3.5 and a 4, or even a 4o in
    some cases, might generate different outputs when using o1 or o1 preview.”
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用o1或o1预览时，与3.5和4，甚至在某些情况下4o相同的提示可能产生不同的输出。”
- en: – Anthony Brown
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: The more advanced “reasoning” capabilities of some of the newer models means
    that prompts can become lost in translation, according to Anthony. “It might actually
    play the game of telephone; take what you first said, somehow convert that in
    the [reasoning] process, then end up with an output that you totally didn’t want
    or expect.”
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 根据安东尼的说法，一些较新模型更先进的“推理”能力意味着提示可能会在翻译中丢失。“它实际上可能玩起了电话游戏；首先你说的话，在[推理]过程中以某种方式转换，然后最终得到一个你完全不想或预期的输出。”
- en: Indeed, tools like Claude 3.7 Sonnet and DeepSeek can expose model reasoning
    explicitly, laying out their [plan](https://www.lesswrong.com/posts/ywzLszRuGRDpabjCk/do-reasoning-models-use-their-scratchpad-like-we-do-evidence)
    for responding to a given user query. Future improvements could allow the user
    to stop model generation so they can correct parts of the plan, if they feel like
    the wrong course of action is being pursued.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，像 Claude 3.7 Sonnet 和 DeepSeek 这样的工具可以明确地展示模型推理，展示它们对特定用户查询的[计划](https://www.lesswrong.com/posts/ywzLszRuGRDpabjCk/do-reasoning-models-use-their-scratchpad-like-we-do-evidence)。
- en: '![](img/2.png)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: These reasoning models are coming up with their own plan, and no longer is the
    human in each one of those steps. So, if those initial prompts somehow directed
    the model to think, “I’m going to make a plan this way”, when your original prompt
    actually didn’t focus on a plan being generated that way, you could end up with
    different outputs.”
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这些推理模型正在制定自己的计划，不再需要人类在每个步骤中。因此，如果最初的提示以某种方式指导模型思考，“我将这样制定计划”，而你的原始提示实际上并没有关注以这种方式生成计划，你可能会得到不同的输出。”
- en: – Anthony Brown
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: Business Challenges
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 商业挑战
- en: 'Challenge #1: Security-conscious clients'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: '挑战 #1：注重安全的客户'
- en: 'Procurement Sciences found that risk-aversion and restriction are embedded
    in government contractor culture. Employees may explore LLMs in their own time,
    but on work time tools like ChatGPT are often blocked wholesale, in Anthony’s
    experience, including at his previous organization. He cites the data spillage
    concerns raised by clients:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学发现，风险规避和限制已经嵌入到政府承包商文化中。员工可以在自己的时间里探索LLM，但在工作时间，像ChatGPT这样的工具通常会被全面封锁，根据安东尼的经验，包括在他之前的公司中。他引用了客户提出的关于数据泄露的担忧：
- en: “Where does the data go when I sync my documents with your application?”
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “当我将文档与您的应用程序同步时，数据去哪里了？”
- en: “How do I know that the output is factual?”
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我如何知道输出是事实性的？”
- en: “How do I know that the information is accurate enough that it can be used in
    an RFP, since government contracts require clarity and accuracy?”
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我如何知道信息足够准确，可以用于RFP，因为政府合同需要清晰和准确？”
- en: The fear is not directed towards adoption of AI in general, Anthony claims,
    but emerges as a result of the stringent requirements that organizations must
    comply with.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼声称，这种恐惧并不是针对AI的普遍采用，而是由于组织必须遵守的严格要求而产生的。
- en: '![](img/2.png)'
  id: totrans-246
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: If your whole company is based on working with the government on contracts,
    and you haven’t complied with some regulation, and that’s found to be real, you
    could face penalties, fines, things like that. You could be barred from applying
    to those contracts. So, there’s real monetary loss, right? There’s real fear about
    the business actually not being able to operate.”
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的整个公司都是基于与政府签订合同来运作的，而你又没有遵守某些规定，并且这被证实是真实的，你可能会面临罚款、罚款等处罚。你可能会被禁止申请这些合同。所以，确实会有经济损失，对吧？确实会有关于业务实际上无法运营的恐惧。”
- en: – Anthony Brown
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: 'Solution #1: A large customer success team'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: '解决方案 #1：一个大型客户成功团队'
- en: Beyond being able to reassure clients with their choice of secure hosting provider,
    which this report has already covered, Procurement Sciences emphasises a heavy
    support presence as one of its key differentiators. “We’re going to help you along
    with how to actually interact with the technology with guides, videos, training,
    events.”
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 除了能够通过选择安全的托管服务提供商来向客户保证，这一点本报告已经涵盖，Procurement Sciences 还强调强大的支持存在是其关键差异化因素之一。“我们将通过指南、视频、培训、活动等方式帮助你了解如何与这项技术互动。”
- en: '![A close-up of a logo'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '![一个标志的特写'
- en: AI-generated content may be incorrect.](img/Figure_9_-_screenshot.png)
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: AI 生成的内容可能是错误的。](img/Figure_9_-_screenshot.png)
- en: 'FIGURE 9: A screenshot of one of the USPs listed on the Procurement Sciences
    website, under HOW WE ARE DIFFERENT.'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 图表 9：Procurement Sciences 网站上列出的一个独特卖点截图，位于“我们如何不同”部分。
- en: This support includes daily webinars that are recorded and distributed to clients.
    There are also guides built into the application itself, in the form of direct
    walkthroughs for particular tasks, and pre-generated prompts presented as assistants.
    “They can just select the actual assistant for the task that they want to do and
    not have to learn how to become a prompt engineer.”
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 这种支持包括每日网络研讨会，这些研讨会被录制并分发给客户。此外，应用程序本身还内置了指南，以特定任务的直接演练和预生成的提示的形式呈现，作为助手。“他们可以只需选择他们想要执行的任务的实际助手，而无需学习如何成为提示工程师。”
- en: 'Solution #1: Baking in traceability'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: '解决方案 #1：内置可追溯性'
- en: 'Procurement Sciences took two steps to allow clients to manually verify the
    accuracy of their application’s outputs:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: Procurement Sciences 采取了两个步骤，允许客户手动验证其应用程序输出的准确性：
- en: 'The RFI/RFP is addressed by the compliance matrix output on a section-by-section
    basis: This makes it convenient for users to check their eventual proposal against
    the relevant part of the RFI or RFP manually, to see if anything was missed by
    the AI.'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RFI/RFP 通过合规矩阵输出逐节处理：这使得用户方便地手动检查他们的最终提案是否与 RFI 或 RFP 的相关部分相符，以查看 AI 是否遗漏了任何内容。
- en: 'Citations are displayed on outputs: When an output is generated, the application
    cites the specific documents and contexts that were used to achieve it. This is
    a basic expectation that is already built into research tools like Google’s [NotebookLM](https://notebooklm.google/).'
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引用会在输出中显示：当生成输出时，应用程序会引用用于实现它的特定文档和上下文。这是已经内置到像谷歌的[NotebookLM](https://notebooklm.google/)这样的研究工具中的基本期望。
- en: Internally, the Procurement Sciences team also uses the open-source LLM engineering
    platform, [Langfuse](https://langfuse.com/), to conduct evaluations on accuracy,
    completeness, and hallucinations using a given set of criteria. The platform uses
    conversation [traces](https://langfuse.com/docs/tracing) to assess, for example,
    the quality of diagrams produced by the application (“did they get a diagram,
    or did they get an image?”). This helps the team to understand where the gaps
    are and where to do better, “whether it be through prompting that we can provide
    to improve the outputs, or the tool calling that we’re doing based on the intent
    of what a user types in the chat and within interactions with the models.”
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 在内部，Procurement Sciences 团队也使用开源的 LLM 工程平台 [Langfuse](https://langfuse.com/)，根据给定的一组标准对准确性、完整性和幻觉进行评估。该平台使用对话
    [跟踪](https://langfuse.com/docs/tracing) 来评估，例如，应用程序生成的图表的质量（“他们得到了图表还是图像？”）。这有助于团队了解差距在哪里以及如何做得更好，“无论是通过我们可以提供的提示来改进输出，还是根据用户在聊天中输入的意图以及与模型的交互中使用的工具。”
- en: 'Challenge #2: Talent acquisition'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '挑战 #2：人才招聘'
- en: Anthony also talks about the difficulties associated with trying to hire at
    the cutting edge of technology, and how to approach talent assessment when “years
    of experience” is no longer a straightforward metric.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼还谈到了尝试在技术前沿招聘的困难，以及当“经验年数”不再是简单指标时，如何进行人才评估。
- en: '![](img/14.png)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![](img/14.png)'
- en: Some people might have dabbled in some things or know an adjacent technology,
    but the actual years of hands-on development are limited. It’s a very challenging
    and competitive talent pool.”
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能涉猎了一些事情或者了解相邻的技术，但实际的手动开发年数有限。这是一个极具挑战性和竞争性的人才库。”
- en: – Anthony Brown
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: Some more traditional hiring methodologies include the 12-step [topgrading](https://topgrading.com/)
    and the 4-step [WHO](https://whothebook.com/).
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 一些更传统的招聘方法包括12步[顶级评估](https://topgrading.com/)和4步[WHO](https://whothebook.com/)。
- en: 'Inspiration: Esoteric hiring tasks'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感：神秘的招聘任务
- en: Take a domain the candidate knows nothing about (beekeeping, warfare, stand-up
    comedy) and ask them how AI could revolutionize it.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个候选人一无所知的领域（养蜂、战争、现场喜剧）并询问他们如何用AI进行革命。
- en: Ask the candidate to break an AI system creatively.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 要求候选人创造性地破解一个AI系统。
- en: Give the candidate an absurdly short time limit to ship a working AI prototype.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 给候选人一个极其短暂的时间限制，让他们交付一个可工作的AI原型。
- en: 'Solution #2: Identifying foundational skills and offering competitive salaries'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案#2：识别基础技能并提供具有竞争力的薪资
- en: 'Anthony introduces the idea of pathways: trying to assess applicants in terms
    of their potential to acquire future knowledge. He filtered for those with solid
    foundational skills in Python and JavaScript, “the underlying technologies that
    are really serving up all these capabilities”, because he knew they’d be able
    to build on this foundation through training and on-the-job learning.'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼介绍了路径的概念：尝试从申请者获取未来知识潜力的角度来评估他们。他筛选了那些在Python和JavaScript方面拥有扎实基础技能的人，“这些底层技术真正提供了所有这些能力”，因为他知道他们能够通过培训和在职学习在这个基础上继续发展。
- en: At the same time, he was prepared to make competitive salary offers in order
    to set the team up with the talent they needed. His proof of success? “We’ve been
    able to acquire a few chief data scientists and AI scientists that have experience
    in building multiple applications. Smaller versions of these things that we are
    able to component and then bring together as a full application.”
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，他准备提供具有竞争力的薪资，以便组建他们需要的团队。他成功的证明是：“我们已经能够招募到一些有经验的资深数据科学家和AI科学家，他们有构建多个应用的经验。这些事物的较小版本，我们能够将其组件化，然后作为一个完整的应用程序组合在一起。”
- en: '![](img/B34115_Figure_10.png)'
  id: totrans-273
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34115_Figure_10.png)'
- en: 'FIGURE 10: A pathway towards AI engineering.'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 图10：通往AI工程的路径。
- en: Results and Impact
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 结果和影响
- en: The following outcomes for Procurement Sciences clients demonstrate the broader
    potential of leveraging AI in complex, high-stakes workflows.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 以下采购科学客户的结果展示了在复杂、高风险工作流程中利用AI的更广泛潜力。
- en: Time savings and efficiency gains
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 时间节省和效率提升
- en: 'Government contracting is traditionally a labor- and time-intensive process.
    AI-powered tools now achieve these tasks far more quickly:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 政府合同传统上是一个劳动密集型和时间密集型的过程。现在，AI驱动的工具能够更快地完成这些任务：
- en: 'RFI generation in minutes: Processes that once took up to six months are now
    completed in as little as 15 minutes, thanks to AI-driven automation.'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RFI生成仅需几分钟：过去需要长达六个月的过程，现在在AI驱动的自动化下仅需15分钟即可完成。
- en: 'Streamlined compliance analysis: Solicitation documents are automatically analyzed,
    with compliance requirements identified and structured into matrices, reducing
    reliance on manual review.'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简化合规性分析：征求文件会自动分析，合规性要求被识别并结构化为矩阵，减少了对人工审查的依赖。
- en: 'Accelerated opportunity discovery: Semantic search capabilities simplify the
    identification of relevant contracts, eliminating the inefficiencies of traditional
    database navigation.'
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加速机会发现：语义搜索功能简化了相关合同的识别，消除了传统数据库导航的低效率。
- en: Anthony claims that, across the planning and proposal generation stages, clients
    have seen an average 90% efficiency increase.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼声称，在整个规划和提案生成阶段，客户平均效率提高了90%。
- en: Cross-industry perspective
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 跨行业视角
- en: Anthony identifies the general applicability of the Procurement Sciences solution
    to any business development process, citing the common stages of identification,
    qualification, planning, proposal, winning, acceptance, and delivery.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼认为采购科学解决方案的通用适用性适用于任何商业发展过程，并引用了识别、资格认定、规划、提案、赢得、接受和交付的常见阶段。
- en: 'The [Gartner Glossary](https://www.gartner.com/en/sales/glossary/business-development)
    defines business development as “various activities and processes to build and
    implement growth opportunities to create a sustainable and profitable business.”
    The [Salesforce blog](https://www.salesforce.com/blog/business-development/) cites
    the following avenues for growth opportunities:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: '[Gartner 术语表](https://www.gartner.com/en/sales/glossary/business-development)将商业发展定义为“构建和实施增长机会的各种活动和流程，以创建可持续和盈利的业务。”
    [Salesforce 博客](https://www.salesforce.com/blog/business-development/)列举了以下增长机会的途径：'
- en: Market analysis
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场分析
- en: Strategic partnerships
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战略伙伴关系
- en: Product development
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品开发
- en: Mergers and acquisitions (M&A)
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并购（M&A）
- en: New funding
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新的资金
- en: Emerging technologies
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新兴技术
- en: Automation is only a partial solution to the market penetration problem, particularly
    in certain sectors.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化只是市场渗透问题的部分解决方案，尤其是在某些行业。
- en: '| Character of industry | Industries |'
  id: totrans-293
  prefs: []
  type: TYPE_TB
  zh: '| 行业特征 | 行业 |'
- en: '| High regulatory burden | HealthcareFinanceUtilities |'
  id: totrans-294
  prefs: []
  type: TYPE_TB
  zh: '| 高监管负担 | 医疗保健、金融、公用事业 |'
- en: '| Capital-intensive requirements | ManufacturingReal estate |'
  id: totrans-295
  prefs: []
  type: TYPE_TB
  zh: '| 资本密集型需求 | 制造业、房地产 |'
- en: '| Entrenched competitors | DefenseTelecom |'
  id: totrans-296
  prefs: []
  type: TYPE_TB
  zh: '| 深根的竞争对手 | 国防、电信 |'
- en: 'TABLE 1: Industries that may prove difficult for new players to enter.'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 表格 1：新进入者可能难以进入的行业。
- en: Metrics like [HHI](https://www.investopedia.com/terms/h/hhi.asp) or [CR4](https://www.investopedia.com/terms/c/concentrationratio.asp)
    look at the market share of the biggest players in a particular industry as a
    proxy for competitiveness. A [2017 Statista report](https://www.statista.com/statistics/1340820/highest-concentration-ratio-us-2017/)
    found that industries with the highest CR4 (four firm concentration ratio) included
    secondary market financing, deep sea passenger transportation, and tobacco manufacturing.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 如 [HHI](https://www.investopedia.com/terms/h/hhi.asp) 或 [CR4](https://www.investopedia.com/terms/c/concentrationratio.asp)
    这样的指标，通过观察特定行业中最大玩家的市场份额来作为竞争力的代理。一份 [2017 Statista 报告](https://www.statista.com/statistics/1340820/highest-concentration-ratio-us-2017/)
    发现，具有最高 CR4（四公司集中度）的行业包括二级市场融资、深海客运和烟草制造。
- en: Key insights for tech leaders
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 对技术领导者的关键见解
- en: 'Take time to understand steps in complex workflows: Centralized platforms can
    reduce reliance on disparate tools that aim to only address parts of processes.'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 花时间理解复杂工作流程中的步骤：集中式平台可以减少对旨在仅解决流程部分的不同工具的依赖。
- en: 'Scope tasks sensibly: Pre-built, domain-specific AI prompts can be mapped to
    each step of a workflow, with agents handing off between steps. By keeping the
    scope focused, token limits do not become an issue, and accuracy and reliability
    are maintained.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 合理地规划任务：预构建的、特定领域的 AI 提示可以映射到工作流程的每个步骤，代理在步骤之间交接。通过保持范围集中，令牌限制不会成为问题，并保持准确性和可靠性。
- en: 'Prioritize compliance and traceability for risk-conscious clients: Automated
    compliance matrices trace document requirements back to source sections, ensuring
    traceability and trust. Advanced language models detect nuanced requirements,
    reducing risks of disqualification.'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 为风险意识强的客户提供合规性和可追溯性的优先级：自动合规矩阵将文档要求追溯到源头部分，确保可追溯性和信任。高级语言模型检测细微的要求，降低被淘汰的风险。
- en: 'Plan to integrate with existing client platforms: Using secure cloud environments
    like Azure Government Cloud ensures adherence to compliance mandates like FedRAMP
    and CMMC. In Procurement Sciences’ case, Azure Gov Cloud was also already being
    used by many of its clients.'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 制定与现有客户平台集成的计划：使用像 Azure Government Cloud 这样的安全云环境确保遵守 FedRAMP 和 CMMC 等合规性要求。在采购科学的情况下，Azure
    Government Cloud 也已被其许多客户使用。
- en: 'Play to the strengths of LLMs: The inference abilities of LLMs — their ability
    to detect nuanced requirements — are crucial to the success of the Procurement
    Sciences solution, as well as the adoption of different LLM models for different
    use cases.'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 发挥 LLM 的优势：LLM 的推理能力——它们检测细微要求的能力——对于采购科学解决方案的成功以及针对不同用例采用不同的 LLM 模型至关重要。
- en: 'Think about how to unlock useful insight from data: AI solutions can uncover
    unique contract opportunities through semantic analysis and dynamic knowledge
    graphs. Emerging capabilities, such as text-to-SQL tools, have the potential to
    further enhance market intelligence and visualization.'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑如何从数据中解锁有用的见解：AI解决方案可以通过语义分析和动态知识图谱揭示独特的合同机会。新兴功能，如文本到SQL工具，有可能进一步增强市场情报和可视化。
- en: '[![A black and green logo'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: '![一个黑色和绿色的标志'
- en: AI-generated content may be incorrect.](img/TL_Logo.png)
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的内容可能是不正确的。](img/TL_Logo.png)
- en: 'FEEDBACK TOUCHPOINT 3:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈触点 3：
- en: How did this section land with you?](https://forms.office.com/e/dntxUZgT1b)
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 你觉得这一部分怎么样？](https://forms.office.com/e/dntxUZgT1b)
- en: Procuring the Future
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 采购未来
- en: Right now, Procurement Sciences is focused on getting the RFP generation part
    of the workflow right, the initial vertical they have specialized in.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，采购科学专注于确保工作流程中RFP生成部分的正确性，这是他们最初专业化的垂直领域。
- en: 'Anthony highlights the company’s intention to expand and evolve their product
    offerings in the following ways:'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼强调了公司打算以下列方式扩展和演变其产品提供：
- en: AI-driven data visualisation with text-to-SQL capabilities. This would enable
    users to use natural language to query databases and dynamically generate reports
    and charts. Technologies under consideration include [Pandas AI](https://pandasai-docs.readthedocs.io/en/latest/)
    and [Waii AI](https://www.waii.ai/). This would also involve building a semantic
    layer — a metastore of industry terminology — so that the system can understand
    and translate user questions into structured queries.
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于AI的数据可视化，具有文本到SQL的功能。这将使用户能够使用自然语言查询数据库并动态生成报告和图表。考虑的技术包括[Pandas AI](https://pandasai-docs.readthedocs.io/en/latest/)和[Waii
    AI](https://www.waii.ai/)。这还涉及构建一个语义层——一个行业术语的元数据存储，以便系统可以理解和将用户问题转换为结构化查询。
- en: Questions users of Awarded AI might ask
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励人工智能的用户可能会提出的问题
- en: How often has this particular competitor won this type of contract with these
    codes and categories?
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 这个特定竞争对手以这些代码和类别赢得了这种类型合同有多频繁？
- en: What was the value of these contracts with this particular agency?
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 这些特定机构与这些合同的价值是多少？
- en: AI-driven contract execution support represents another potential expansion
    of Procurement Science’s offerings, moving them firmly into the later parts of
    the procurement workflow.
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于AI的合同执行支持代表了采购科学产品提供的另一个潜在扩展，将它们稳固地推进到采购工作流程的后期部分。
- en: Landing and expanding
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 落地与扩展
- en: International expansion into Canada and Europe is also in Procurement Sciences’
    plans. The initial approach would be to collaborate with current large customers
    that already have divisions in those regions — a Land and Expand strategy.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 加拿大和欧洲的国际扩张也列入了采购科学的计划。初步方法将是与那些已经在这些地区设有分部的现有大型客户合作——一种落地和扩展策略。
- en: To serve these markets properly, Procurement Sciences would need to deploy its
    application in cloud regions specific to these countries, to ensure compliance
    with local laws.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 为了正确服务这些市场，采购科学需要在这些国家的特定云区域部署其应用程序，以确保符合当地法律。
- en: '![](img/15.png)'
  id: totrans-321
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/15.png)'
- en: 'There could be slight differences in how those procurement processes are [in
    Canada and Europe]. Really the majority of the work would be on data management:
    how are you doing the data? Where is the application? Who accesses the application?
    Making sure that we’ve got European-based resources, things like that. So, there’s
    also a staffing component to it.”'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 这些采购流程在加拿大和欧洲可能会有细微差别。实际上，大部分工作将集中在数据管理上：你是如何处理数据的？应用在哪里？谁可以访问应用？确保我们有基于欧洲的资源，诸如此类。因此，这也有一个人员配备的组成部分。”
- en: – Anthony Brown
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: – 安东尼·布朗
- en: Knowledge graphs in procurement
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 采购中的知识图谱
- en: A knowledge graph, or semantic network, is a diagram illustrating the relationship
    between entities, defined by IBM as “[objects, events, situations or concepts](https://www.ibm.com/think/topics/knowledge-graph)”.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱，或语义网络，是一种说明实体之间关系的图表，由IBM定义为“[对象、事件、情况或概念](https://www.ibm.com/think/topics/knowledge-graph)”。
- en: '![](img/B34115_Figure_11.png)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34115_Figure_11.png)'
- en: 'FIGURE 11: A very simple knowledge graph, consisting of nodes as entities and
    edges as relationships between entities.'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11：一个非常简单的知识图谱，由实体节点和实体之间的关系边组成。
- en: Procurement Sciences already uses Neo4j to create graph representations of government
    procurement entities, which provide valuable context for their models. These entities
    include agencies, companies, solicitations, and contract locations.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学已经使用Neo4j创建政府采购实体的图表示，为他们的模型提供了有价值的背景。这些实体包括机构、公司、招标和合同地点。
- en: To develop these capabilities, they are looking into other Graph RAG technologies
    like [LangChain](https://www.langchain.com/) and Microsoft’s recent open source
    [GraphRAG](https://github.com/microsoft/graphrag).
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 为了发展这些能力，他们正在研究其他图RAG技术，如[LangChain](https://www.langchain.com/)和微软最近开源的[GraphRAG](https://github.com/microsoft/graphrag)。
- en: 'Use case: If a company is pursuing a contract, Procurement Sciences could recommend
    potential partners based on:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 用例：如果一家公司正在寻求合同，采购科学可以基于以下内容推荐潜在合作伙伴：
- en: Past performance
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过去的表现
- en: Proximity
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 临近性
- en: Shared employee history, such as identifying former employees who now work at
    a relevant organization
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 共享员工历史，例如识别现在在相关组织工作的前员工
- en: Anthony notes that these types of hidden relationships aren’t always obvious
    in traditional relational databases but can be surfaced through graph-based network
    analysis.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 安东尼指出，这些类型的隐藏关系在传统的数据库中并不总是显而易见，但可以通过基于图的网络分析揭示出来。
- en: More generally, graph-based models may prove crucial in mitigating procurement
    bias. Mapping relationships between vendors, officials, and contract outcomes
    could bring to light suspicious collusion, hidden connections, or repeated irregularities.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 更普遍地，基于图模型可能在减轻采购偏见方面发挥关键作用。映射供应商、官员和合同结果之间的关系可能会揭示可疑的勾结、隐藏的联系或重复的不规则行为。
- en: Conclusion
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Procurement Sciences chose to focus on a small part of the complex workflow
    of procurement, delivering it securely and with due emphasis on customer support.
    AI is a core part of their offering; they have taken seriously the benefits and
    drawbacks of using LLMs in an industry where compliance is non-negotiable, and
    baked them into their approach. Their proof of success is not only in the efficiency
    gains they have been able to demonstrate, but also in the profile of their clients.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 采购科学选择专注于采购复杂工作流程的一部分，安全地交付，并给予客户支持足够的重视。人工智能是他们提供服务的核心部分；他们认真对待了在合规性不可协商的行业中使用LLM的利弊，并将其纳入他们的方法。他们成功的证明不仅在于他们能够证明的效率提升，还在于他们客户的概况。
- en: 'For other leaders in technology, consider:'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 对于其他技术领域的领导者，请考虑：
- en: 'Deep vertical expertise as a competitive differentiator: Use insider knowledge
    to build solutions that directly address industry-specific pain points. There
    is strategic advantage to combining technical expertise with profound industry
    understanding.'
  id: totrans-339
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度垂直专业知识作为竞争优势：利用内部知识构建直接解决行业特定痛点的解决方案。将技术专长与深刻的行业理解相结合具有战略优势。
- en: 'Well-targeted AI as a core enabler for significant efficiency gains: Leaders
    should consider how well-targeted AI applications can yield similar step-change
    improvements within their own organizations.'
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能作为显著效率提升的核心推动者：领导者应考虑如何将精准的人工智能应用在自身组织中带来类似的重大改进。
- en: 'Compliance and security in regulated industries: For companies operating in
    or serving highly regulated sectors like government, a strong focus on compliance
    and data security is paramount. Leaders must be aware of potential trade-offs,
    such as limited access to the latest technology.'
  id: totrans-341
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在受监管行业中的合规性和安全性：对于在或为高度监管的行业（如政府）运营的公司，对合规性和数据安全的关注至关重要。领导者必须意识到潜在的权衡，例如有限地访问最新技术。
- en: 'The importance of user-centric AI implementation: Recognize that end-users
    may be unfamiliar or risk-averse towards AI, so you can make sure technology delivers
    tangible value without requiring users to become AI experts.'
  id: totrans-342
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以用户为中心的人工智能实施的必要性：认识到最终用户可能对人工智能不熟悉或存在风险规避，因此你可以确保技术提供有形的价值，而无需用户成为人工智能专家。
- en: Breakthroughs in government procurement processes have global impact, influencing
    millions directly and shaping policies that may affect billions worldwide. Targeted
    efforts in such vital parts of our ecosystem (healthcare, supply chain, finance,
    energy) will be similarly wide-ranging.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 政府采购流程的突破具有全球影响，直接影响数百万人口，并塑造可能影响数十亿人的政策。在我们生态系统的关键部分（如医疗保健、供应链、金融、能源）的针对性努力将具有类似的广泛影响。
