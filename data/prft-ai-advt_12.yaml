- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Scaling AI-Powered Systems and Workflows
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 扩展AI驱动系统和工作流程
- en: In the previous chapters, we’ve explored the journey from identifying high-impact
    AI use cases to effectively prototyping solutions and validating their potential.
    However, moving beyond the prototype stage to fully operational, scalable systems
    presents a unique set of challenges - and opportunities.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们已经探讨了从识别高影响力的AI用例到有效地原型设计和验证其潜力的旅程。然而，从原型阶段过渡到完全运营、可扩展的系统带来了一系列独特的挑战——以及机遇。
- en: '**Scaling AI** isn’t simply about making your prototype bigger. Rather, it
    involves carefully transitioning from exploratory validation to robust operational
    delivery, ensuring your AI solutions are not only effective but also sustainable
    over the long term.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**扩展AI**不仅仅是使你的原型更大。相反，它涉及从探索性验证到稳健的运营交付的谨慎过渡，确保你的AI解决方案不仅有效，而且在长期内也是可持续的。'
- en: This chapter will guide you through the critical process of scaling your AI
    prototypes into production-ready systems, offering you a high-level roadmap of
    what to expect as you continue on your AI journey. Keep in mind, however, that
    while the process of discovering and prototyping AI solutions tends to be fairly
    standardized, scaling them effectively is heavily dependent on your specific organization.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将引导你通过将AI原型扩展到生产就绪系统的关键过程，为你提供一个高级路线图，说明你在AI之旅中可以期待什么。然而，请注意，尽管发现和原型设计AI解决方案的过程往往相当标准化，但有效地扩展它们在很大程度上取决于你特定的组织。
- en: Therefore, treat this chapter as an orientation rather than a detailed blueprint.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，将本章视为一个入门指南，而不是一个详细的蓝图。
- en: In this chapter, we’ll cover the following main topics
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主要主题
- en: Understanding the AI product lifecycle
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解人工智能产品生命周期
- en: Core goals of scaling AI solutions
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展AI解决方案的核心目标
- en: 'From prototype to production: Core components and strategies'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从原型到生产：核心组件和策略
- en: The five levers of scaling
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展的五个杠杆
- en: 'Aligning people and purpose: The organizational side of scaling AI'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整人员和目标：扩展AI的组织方面
- en: Managing cost at scale
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在规模上管理成本
- en: Monitoring and metrics
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控和指标
- en: Practical steps for scaling AI solutions
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展AI解决方案的实用步骤
- en: Understanding the AI product lifecycle
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解人工智能产品生命周期
- en: 'What does **scaling AI solutions** mean anyway? In practical terms, it means
    actively shifting between two distinct phases of the AI product lifecycle: **discovery**
    and **delivery**. While these phases may seem linear, in reality, they represent
    distinct modes of operation, each with unique goals, methodologies, and challenges.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，“扩展AI解决方案”究竟意味着什么呢？在实践中，这意味着在AI产品生命周期的两个不同阶段之间积极转换：**发现**和**交付**。虽然这些阶段可能看起来是线性的，但事实上，它们代表了不同的操作模式，每个模式都有其独特的目标、方法和挑战。
- en: Let’s first talk about the distinction between the discovery and delivery phases
    of the AI product lifecycle. What’s the difference?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先谈谈人工智能产品生命周期中“发现”和“交付”阶段之间的区别。有什么区别？
- en: '**Discovery** is the exploratory phase where your primary goal is validation.
    In this stage, you’re actively testing your assumptions - whether your AI use
    case is technically feasible, generates measurable value, and effectively addresses
    real business needs. This is what you did in *Chapters* *7* and *8*. Your focus
    during discovery is not on perfection or complete robustness; rather, you’re aiming
    to rapidly prototype, experiment, learn, and adapt. Discovery embraces uncertainty
    and encourages quick iterations to minimize investment risks and quickly uncover
    critical insights.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**发现**阶段是探索性阶段，你的主要目标是验证。在这个阶段，你正在积极测试你的假设——你的AI用例在技术上是否可行，是否产生可衡量的价值，以及是否有效地解决实际业务需求。这正是你在*第7章*和*第8章*中所做的。在发现阶段，你的重点不是完美或完全的稳健性；相反，你是在快速原型设计、实验、学习和适应。发现阶段拥抱不确定性，并鼓励快速迭代以最小化投资风险并迅速发现关键见解。'
- en: '**Delivery**, on the other hand, is about scaling validated use cases into
    robust, reliable, and operationally viable systems. In this phase, the key objective
    shifts from exploration and validation to stability, maintainability, and operational
    integration. Delivery requires a different toolkit than discovery. Instead of
    moving fast (and perhaps even a little chaotic at times), delivery involves careful
    planning, disciplined execution, and adherence to processes that ensure your AI
    solution meets business standards for the key delivery criteria of scalability,
    reliability, performance, maintainability, and security.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**交付**，另一方面，是将经过验证的使用案例扩展到稳健、可靠和可操作的系统中。在这个阶段，关键目标从探索和验证转移到稳定性、可维护性和运营集成。交付需要与发现不同的工具集。交付不仅仅是快速行动（有时甚至可能有些混乱），它涉及周密的规划、纪律性的执行以及遵守确保你的AI解决方案满足业务标准的流程，这些标准包括可扩展性、可靠性、性能、可维护性和安全性。'
- en: Transitioning from discovery to delivery is not merely a technical milestone
    - it represents a fundamental change in mindset and approach. Here is a quick
    comparison between the discovery and delivery phases.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 从发现阶段过渡到交付阶段不仅仅是技术里程碑，它代表着心态和方法的根本性变化。以下是发现阶段和交付阶段之间的快速比较。
- en: '| **Discovery Phase** | **Delivery Phase** |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
  zh: '| **发现阶段** | **交付阶段** |'
- en: '| --- | --- |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Quick iterations | Structured planning |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| 快速迭代 | 结构化规划 |'
- en: '| Experimental mindset | Rigorous governance |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| 实验心态 | 严格治理 |'
- en: '| Minimal constraints | Defined standards |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| 最小限制 | 明确标准 |'
- en: '| Informal processes | Formal processes |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| 非正式流程 | 正式流程 |'
- en: '| Innovation focus | Scalability focus |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| 创新重点 | 可扩展性重点 |'
- en: 'Table 9.1: Comparison between the discovery and delivery phases of AI solutions'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.1：AI解决方案发现阶段和交付阶段的比较
- en: Clearly recognizing this distinction from the outset will help you avoid the
    common pitfall of prematurely scaling exploratory prototypes into full production
    systems, or vice versa, accidentally applying rigid delivery frameworks to drive
    innovation. In other words, scaling too soon leads to brittle prototypes in production.
    Scaling too late leaves you stuck in *prototype purgatory*.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 从一开始就清楚地认识到这种区别将帮助你避免常见的陷阱，即过早地将探索性原型扩展到完整的生产系统，或者相反，意外地将僵化的交付框架应用于推动创新。换句话说，过早扩展会导致生产中的脆弱原型。过晚扩展会让你陷入**原型炼狱**。
- en: 'Checklist: Are you ready to scale?'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 清单：你准备好扩展了吗？
- en: 'Before we dive into the delivery phase, let’s tackle one question first. How
    do you even know it’s the right time to switch from discovery to delivery? While
    there’s no one-size-fits-all answer, over the last years of applied AI consulting,
    I’ve developed an internal checklist that helps me identify AI solutions that
    are *ready* for production versus the ones that are very likely to fail real-world
    requirements and will likely lead to a huge resource drain. Please note that this
    checklist isn’t a guarantee for success. It’s more designed to prevent you from
    rushing into production too early and showing you the blind spots that are (potentially)
    still missing. Here’s what I look for to decide whether it’s time to shift gears
    from discovery into delivery:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入交付阶段之前，先解决一个问题。你怎么知道是时候从发现阶段切换到交付阶段了呢？虽然没有一种适合所有情况的答案，但在过去几年的应用人工智能咨询中，我开发了一个内部清单，帮助我识别那些**准备好**投入生产的AI解决方案，以及那些很可能无法满足现实世界要求并可能导致大量资源浪费的解决方案。请注意，这个清单并不能保证成功。它更多的是为了防止你过早地进入生产阶段，并展示那些（可能）仍然缺失的盲点。以下是我用来决定是否从发现阶段转向交付阶段的标准：
- en: '| **Criteria** | **Description** | **How to Measure (Examples)** | **Red Flags**
    |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| **标准** | **描述** | **如何衡量（示例）** | **红旗** |'
- en: '| Value clearly validated | The prototype has demonstrated clear and measurable
    business value or impact (e.g., reduced costs, time savings, user satisfaction).
    | ROI model, A/B test results, KPI lift (e.g., ≥ 20%). | No metrics tracked; unclear
    benefit. |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| 明确验证的价值 | 原型已展示出明确且可衡量的商业价值或影响（例如，降低成本、节省时间、用户满意度）。 | 返利模型、A/B测试结果、KPI提升（例如，≥
    20%）。 | 没有跟踪指标；收益不明确。 |'
- en: '| Positive user feedback | Initial users have consistently provided positive
    feedback or have shown strong engagement and enthusiasm for the prototype. | NPS
    ≥ 40, SUS ≥ 70, positive survey/interviews. | No user feedback at all. Users are
    confused, disengaged, or critical. |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| 正面用户反馈 | 初始用户持续提供正面反馈或对原型表现出强烈的参与和热情。 | NPS ≥ 40，SUS ≥ 70，正面调查/访谈。 | 完全没有用户反馈。用户感到困惑、不参与或批评。
    |'
- en: '| Technical feasibility proven | Core technical questions or risks have been
    answered or mitigated - there’s high confidence that the AI solution is technically
    viable. | IT approval complete; passes tech review, working prototype. | Frequent
    errors, reliance on future enhancements, fragile setup. |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| 技术可行性已证明 | 核心技术问题或风险已得到解答或缓解 - 对AI解决方案在技术上是可行的有很高的信心。 | IT批准完成；通过技术审查，工作原型。
    | 经常出现错误，依赖未来的增强，设置脆弱。 |'
- en: '| Demand is growing | Increasing user demand indicates broader organizational
    interest or clear potential for wider adoption. | Usage trends, waitlist, internal
    requests. | Use remains flat or drops. High churn. Unclear who needs it. |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| 需求增长 | 增加的用户需求表明组织对更广泛的应用感兴趣或存在明确的潜在应用范围。 | 使用趋势、等待名单、内部请求。 | 使用保持平稳或下降。高流失率。不清楚谁需要它。
    |'
- en: '| Leadership support secured | Senior stakeholders or decision-makers (often
    in the respective business unit) have explicitly signaled willingness to fund
    the AI solution moving forward. | Budget approved; sponsor assigned. | No sponsor.
    No ownership. |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 领导层支持已获得 | 高级利益相关者或决策者（通常在相应的业务单元）已明确表示愿意资助AI解决方案的未来发展。 | 预算已批准；赞助商已指定。 |
    没有赞助商。没有所有权。 |'
- en: '| Ethical and compliance checks passed | While you perhaps haven’t considered
    all ethical and compliance-relevant intricacies up to the last detail, it’s clear
    that in general, your AI solution will meet both ethical and compliance standards
    of your organization. | Data protection impact assessment done, compliance check
    passed. | Open compliance issues; unknown risks. |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 道德和合规性检查通过 | 虽然你可能还没有考虑到所有道德和合规性相关的细节，但很明显，总的来说，你的AI解决方案将符合你组织的道德和合规性标准。
    | 数据保护影响评估已完成，合规性检查通过。 | 存在开放合规性问题；未知风险。 |'
- en: '| Integration path understood | There’s clarity around how the AI prototype
    will integrate within existing workflows, systems, and processes. | Interface
    defined; architecture and owners aligned. | Unclear how it fits into existing
    workflows or who owns the implementation. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 集成路径已理解 | 对于AI原型如何在现有工作流程、系统和流程中集成已有明确的认识。 | 界面已定义；架构和所有者已对齐。 | 不清楚它如何融入现有工作流程或谁负责实施。
    |'
- en: 'Table 9.2: Checklist for assessing readiness to move from discovery to delivery'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.2：从发现到交付准备情况评估清单
- en: In short, there’s plenty of value and fewer red flags.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，价值很大，红旗较少。
- en: As a practical example, let’s say you managed to create a functional prototype
    of your RFP Chatbot Analyzer that is also able to handle new (unknown) proposals
    and meets the minimum value threshold of saving busy salespeople at least 1 hour
    per week. Besides the early test users, more people in your organization are now
    actively requesting access. Your checklist reveals clear validation of value,
    user enthusiasm, solid technical feasibility, and robust stakeholder support.
    At this stage, shifting into delivery mode is both logical and timely.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个实际例子，假设你成功创建了一个功能原型，你的RFP聊天机器人分析器不仅能处理新的（未知）提案，而且每周至少能节省忙碌的销售人员1小时的时间，达到最低价值阈值。除了早期测试用户外，你组织中的更多人现在正在积极要求访问。你的清单显示了价值验证、用户热情、坚实的技术可行性和稳健的利益相关者支持。在这个阶段，转向交付模式既是逻辑上的，也是及时的。
- en: 'When you’re ready to make this shift, remember: transitioning from a prototype
    to a production-ready AI solution isn’t just about scaling up your prototype as
    we explored in the previous chapter. Usually, it involves careful assessment of
    what can be directly transferred, what needs enhancement, and what must be rebuilt
    entirely.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当你准备好进行这种转变时，请记住：从原型过渡到生产就绪的AI解决方案并不仅仅是像我们在上一章中探讨的那样扩大你的原型。通常，它涉及对可以直接转移的内容、需要增强的内容以及必须完全重建的内容进行仔细评估。
- en: Now that we know whether we’re ready to scale (or not), let’s take a look at
    what **scaling** success actually looks like.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了我们是否准备好扩展（或不是），让我们来看看扩展成功实际上是什么样子。
- en: Core goals of scaling AI solutions
  id: totrans-45
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 扩展AI解决方案的核心目标
- en: As we found out in the beginning of the chapter, scaling isn’t just about shipping
    bigger software. It’s about meeting five core goals that make your AI systems
    viable at scale. These goals include capacity, reliability, performance, maintainability,
    and security. Each plays a critical role in ensuring your AI system not only works
    technically but also remains an asset, not a liability to your business.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在本章开头发现的那样，扩展不仅仅是交付更大的软件。它是关于满足五个核心目标，使您的AI系统在扩展规模上具有可行性。这些目标包括容量、可靠性、性能、可维护性和安全性。每个目标都在确保您的AI系统不仅在技术上工作，而且仍然是对您业务的资产而不是负债方面发挥着关键作用。
- en: '![Figure 9.1: Five AI scaling goals](img/B31200_09_01.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图9.1：五个AI扩展目标](img/B31200_09_01.png)'
- en: 'Figure 9.1: Five AI scaling goals'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1：五个AI扩展目标
- en: First, let’s get a high-level overview of what these goals mean, their typical
    key metrics, and their milestones before we dive deeper into how to achieve these
    goals.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在我们深入探讨如何实现这些目标之前，让我们对这些目标的意义、它们的典型关键指标和里程碑有一个高层次的了解。
- en: Capacity
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 容量
- en: '**Capacity scaling** is the ability of your AI system to handle increasing
    volumes of data, users, and transactions without breaking down or driving costs
    out of control. This typically involves two dimensions: scaling up (adding more
    resources, such as CPU, memory, or storage to a single system) and scaling out
    (adding more instances or nodes that share the workload). True capacity planning
    balances both, ensuring growth can be supported quickly and cost-effectively.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**容量扩展** 是您的AI系统处理不断增加的数据量、用户和交易而不会崩溃或使成本失控的能力。这通常涉及两个维度：向上扩展（向单个系统添加更多资源，如CPU、内存或存储）和向外扩展（添加更多实例或节点以分担工作负载）。真正的容量规划平衡这两者，确保增长可以快速且经济高效地得到支持。'
- en: 'Some examples of the key metrics and milestones for capacity scaling are as
    follows:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 容量扩展的关键指标和里程碑的一些示例如下：
- en: '**Load handling:** Tracking how many requests or transactions the system can
    support before performance degrades.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负载处理：** 跟踪系统在性能下降之前可以支持多少请求或交易。'
- en: '**Latency under load:** Monitoring whether response times stay within agreed
    expectations as usage grows.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负载下的延迟：** 监控随着使用量的增长，响应时间是否保持在约定的预期范围内。'
- en: '**Data freshness:** Checking how reliably data pipelines deliver up-to-date
    inputs on time.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据新鲜度：** 检查数据管道是否可靠地在规定时间内提供最新的输入。'
- en: '**Elastic cost profile:** Watching whether costs per request or per user remain
    stable (or decrease) as the system scales.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弹性成本概况：** 观察随着系统扩展，每请求或每用户的成本是否保持稳定（或下降）。'
- en: 'Some typical challenges include:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 一些典型的挑战包括：
- en: Over-relying on fragile prototype fixes (manual exports, scripts).
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度依赖脆弱的原型修复（手动导出、脚本）。
- en: Hitting bottlenecks in single systems (databases, queues, APIs).
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在单一系统中遇到瓶颈（如数据库、队列、API）。
- en: Vendor rate limits or licensing constraints not visible in early testing.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 供应商速率限制或许可限制在早期测试中不可见。
- en: Over-provisioning infrastructure *just in case*, leading to wasted spend.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “以防万一”过度配置基础设施，导致浪费支出。
- en: 'High capacity ensures your AI solution grows alongside your business. It prevents
    slowdowns and outages that erode trust, avoids costly rebuilds, and protects margins
    by keeping scaling efficient. Put simply: strong capacity makes adoption sustainable
    under real-world pressure.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 高容量确保您的AI解决方案与您的业务同步增长。它防止了导致信任下降的减速和中断，避免了昂贵的重建，并通过保持扩展效率来保护利润率。简单来说：强大的容量在现实世界的压力下使采用可持续。
- en: Reliability
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可靠性
- en: '**Reliability** is the ability of your AI system to deliver consistent and
    correct results under real-world conditions. A reliable system doesn’t just stay
    online - it also produces outputs that users can trust, even as data, usage, or
    conditions change.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**可靠性** 是您的AI系统在现实世界条件下提供一致和正确结果的能力。一个可靠的系统不仅保持在线，而且即使在数据、使用或条件发生变化时，也能产生用户可以信赖的输出。'
- en: 'Some key metrics and milestone examples to help track reliability include:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 一些关键指标和里程碑示例，有助于跟踪可靠性包括：
- en: '**System availability:** Tracking uptime against service-level agreements.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统可用性：** 跟踪系统正常运行时间与服务级别协议的符合情况。'
- en: '**Pipeline success rate:** Monitoring how consistently data processing completes
    without errors.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管道成功率：** 监控数据处理是否一致地完成且无错误。'
- en: '**Model accuracy** and **stability:** Measuring model accuracy, precision,
    recall, or other relevant KPIs over time.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型准确性和稳定性：** 在一段时间内衡量模型准确性、精确度、召回率或其他相关KPI。'
- en: '**Recovery speed:** Assessing how quickly the system recovers after failures
    or interruptions.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**恢复速度：** 评估系统在失败或中断后恢复的速度。'
- en: '**Consistency of outputs:** Checking that predictions remain stable across
    runs and environments.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输出一致性**：检查预测在运行和环境之间是否保持稳定。'
- en: 'The typical challenges you might encounter while building reliable systems
    include (but are not limited to):'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建可靠系统时可能会遇到的一些典型挑战包括（但不限于）：
- en: Degradation of model accuracy due to data drift.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于数据漂移导致模型准确度下降。
- en: Silent data corruption or missing monitoring of quality.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 静默数据损坏或对质量监控的缺失。
- en: Overfitting to test conditions that don’t reflect real-world variability.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度拟合到不反映现实世界变异性测试条件。
- en: Infrastructure single points of failure or brittle retry mechanisms.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础设施的单点故障或脆弱的重试机制。
- en: Alert fatigue - too many signals without actionable prioritization.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 警报疲劳 - 过多的信号而没有可操作性的优先级排序。
- en: Reliable AI systems build trust with users and stakeholders. They reduce costly
    downtime, prevent incorrect outputs from spreading into business decisions, and
    encourage widespread adoption. Unreliable systems, whether from outages or inaccurate
    predictions, quickly erode confidence and can become more damaging than not using
    AI at all.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 可靠的AI系统通过与用户和利益相关者建立信任。它们减少了昂贵的停机时间，防止错误输出传播到业务决策中，并鼓励广泛采用。不可靠的系统，无论是由于故障还是不准确的预测，都会迅速侵蚀信心，可能比完全不使用AI更具有破坏性。
- en: Performance
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能
- en: '**Performance** is the ability of your AI system to respond quickly and efficiently
    to user interactions or processing demands. A performant system delivers insights
    at the speed users expect, without excessive resource consumption. To measure
    performance, you can utilize the following key metrics and milestones:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**性能**是您的AI系统快速有效地响应用户交互或处理需求的能力。一个性能良好的系统以用户期望的速度提供见解，而不进行过多的资源消耗。为了衡量性能，您可以利用以下关键指标和里程碑：'
- en: '**Response time****:** Tracking how long it takes from user request to system
    response.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应时间**：跟踪从用户请求到系统响应所需的时间。'
- en: '**Throughput****:** Measuring how many requests or transactions the system
    can handle'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**吞吐量**：衡量系统可以处理多少请求或事务'
- en: simultaneously.
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 同时进行。
- en: '**Resource efficiency****:** Monitoring CPU, GPU, and memory utilization relative
    to workload.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源效率**：监控CPU、GPU和内存利用率相对于工作负载。'
- en: '**Optimization impact****:** Comparing model architectures or serving techniques
    (e.g., smaller models, quantization) to balance accuracy and efficiency.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化影响**：比较模型架构或服务技术（例如，更小的模型、量化）以平衡准确性和效率。'
- en: Remember to include more metrics and milestones that are relevant to your organizational
    use case(s).
  id: totrans-85
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 记得包括更多与您的组织用例相关的指标和里程碑。
- en: 'You might encounter some of these challenges as you build performant systems:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建性能良好的系统时，您可能会遇到以下一些挑战：
- en: Oversized models that are accurate but too slow or costly to serve.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准确但速度过慢或成本过高的模型。
- en: Latency spikes caused by inefficient pipelines or network bottlenecks.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由低效管道或网络瓶颈引起的延迟峰值。
- en: Cold-start delays when models are spun up on demand.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型按需启动时的冷启动延迟。
- en: Lack of optimization, leading to wasted compute and higher costs.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏优化，导致计算浪费和更高的成本。
- en: High performance drives user adoption by ensuring interactions feel seamless.
    It also improves productivity and reduces infrastructure costs. Poor performance,
    on the other hand, leads to user frustration, slower workflows, and declining
    ROI.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 高性能通过确保交互感觉无缝来推动用户采用。它还提高了生产率并降低了基础设施成本。另一方面，性能不佳会导致用户沮丧、工作流程缓慢和投资回报率下降。
- en: Maintainability
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可维护性
- en: '**Maintainability** is the ease with which your AI system can be managed, updated,
    and troubleshot over time. A maintainable system is modular, well documented,
    and designed to evolve safely as requirements and data change.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**可维护性**是指您的AI系统在一段时间内可以轻松管理、更新和故障排除的难易程度。一个可维护的系统是模块化的、文档齐全的，并且设计为在需求和数据变化时安全地演变。'
- en: 'Some of the metrics and milestone examples you could track are:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以跟踪的一些指标和里程碑示例包括：
- en: '**Deployment cadence****:** Tracking how often new features, models, or fixes
    can be rolled out.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部署节奏**：跟踪新功能、模型或修复可以推出的频率。'
- en: '**Change safety****:** Monitoring failure rates of new releases and how quickly
    they can be rolled back if issues arise.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变更安全性**：监控新版本失败率以及出现问题时它们可以多快地回滚。'
- en: '**Documentation quality****:** Assessing whether system design, data flows,
    and processes are clearly captured and accessible.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档质量**：评估系统设计、数据流和流程是否被清晰地记录和可访问。'
- en: '**Onboarding speed****:** Measuring how quickly new team members can become
    productive with the system.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**入职速度**：衡量新团队成员如何快速成为系统生产力。'
- en: 'Here are some challenges you should be aware of:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你应该注意的挑战：
- en: Entangled code, pipelines, or infrastructure that makes updates risky.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 混乱的代码、管道或基础设施，使更新变得有风险。
- en: Lack of standardized testing, leading to undetected regressions.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏标准化测试，导致未检测到的回归。
- en: Poor documentation that slows down new team members.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 糟糕的文档，减慢了新团队成员的进度。
- en: Manual deployments that increase error risk and delay improvements.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动部署会增加错误风险并延迟改进。
- en: Maintainable AI systems reduce operational risk and cost. They allow teams to
    iterate faster, fix issues safely, and adapt to new requirements. Without maintainability,
    AI solutions quickly accumulate technical debt, making them fragile, expensive,
    and hard to evolve, undermining their long-term business value.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 可维护的人工智能系统降低运营风险和成本。它们允许团队更快地迭代，安全地修复问题，并适应新的要求。没有可维护性，人工智能解决方案会迅速积累技术债务，使它们变得脆弱、昂贵且难以进化，从而削弱其长期商业价值。
- en: Security
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全
- en: '**Security** is the protection of your AI system’s data, models, and infrastructure
    from unauthorized access, misuse, or breaches. As prototypes scale into production,
    security becomes critical for compliance, trust, and resilience.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**安全**是保护您的AI系统的数据、模型和基础设施免受未经授权的访问、滥用或泄露。随着原型扩展到生产阶段，安全对于合规性、信任和弹性变得至关重要。'
- en: 'Some of the key metrics and milestone examples include:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 一些关键指标和里程碑示例包括：
- en: '**Data protection****:** Verifying that sensitive data is encrypted in transit
    and at rest.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据保护**：验证敏感数据在传输和静止状态下是否加密。'
- en: '**Access control****:** Monitoring role-based permissions and identity management
    practices.**Compliance readiness****:** Tracking adherence to frameworks such
    as GDPR, HIPAA, SOC2, or ISO/IEC 27001.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**访问控制**：监控基于角色的权限和身份管理实践。**合规准备**：跟踪遵守GDPR、HIPAA、SOC2或ISO/IEC 27001等框架的情况。'
- en: '**Model robustness****:** Assessing exposure to risks such as adversarial inputs,
    model theft, or data leakage.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型鲁棒性**：评估对对抗性输入、模型盗窃或数据泄露等风险的暴露。'
- en: '**Auditability****:** Ensuring system activity and data flows can be traced
    when needed.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可审计性**：确保在需要时可以追踪系统活动和数据流。'
- en: 'Typical challenges you may come across are:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会遇到的典型挑战包括：
- en: Over-broad or unclear access rights that expose sensitive data.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过于宽泛或模糊的访问权限，暴露了敏感数据。
- en: Shadow data copies outside of governed systems.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在受控系统之外存在影子数据副本。
- en: Vulnerabilities unique to AI (e.g., prompt injection in LLMs, inference attacks).
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能特有的漏洞（例如，LLM中的提示注入，推理攻击）。
- en: Inconsistent application of compliance standards across teams or regions.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在团队或地区之间不统一地应用合规标准。
- en: Secure AI systems protect your organization from regulatory penalties, reputational
    damage, and operational disruption. Strong security practices also build user
    trust, enabling wider adoption of AI solutions. Weak security, by contrast, can
    stall scaling efforts, invite legal risk, and undermine stakeholder confidence.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 安全的人工智能系统保护您的组织免受监管处罚、声誉损害和运营中断。强大的安全实践也建立用户信任，促进人工智能解决方案的更广泛采用。相比之下，弱安全可能会阻碍扩展努力，招致法律风险，并损害利益相关者的信心。
- en: Together, these five goals - capacity, reliability, performance, maintainability,
    and security - describe **what success looks like** when AI systems are scaled.
    But knowing the goals isn’t enough. To actually achieve them, you need to understand
    how the pieces of your prototype evolve into production. Some elements carry over
    directly, while others must be rebuilt or hardened for real-world use. In the
    next section, we’ll revisit the core components of an AI solution and explore
    the strategies - retain, enhance, rebuild, or establish - that guide their transition
    from prototype to production.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这五个目标——容量、可靠性、性能、可维护性和安全性——共同描述了当人工智能系统扩展时**成功的样子**。但了解目标还不够。为了真正实现它们，你需要了解你的原型组件如何演变到生产阶段。一些元素可以直接迁移，而其他元素必须重建或加固以适应现实世界。在下一节中，我们将重新审视人工智能解决方案的核心组件，并探讨指导它们从原型到生产的策略——保留、增强、重建或建立。
- en: 'From prototype to production: Core components and strategies'
  id: totrans-119
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从原型到生产：核心组件和策略
- en: When moving from discovery to delivery, prototypes act as the seed of your production
    system. The core components you assembled during prototyping don’t disappear -
    they evolve. Some can be carried forward with little change, others need to be
    rebuilt for scale, and a few entirely new components must be added for the first
    time.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 当从发现转向交付时，原型充当了您生产系统的种子。在原型设计期间组装的核心组件不会消失——它们会进化。一些可以几乎不变地向前推进，其他则需要为了规模而重建，还有一些全新的组件必须首次添加。
- en: 'To make this evolution practical, it helps to view each component through a
    clear strategy: **retain**, **enhance**, **rebuild**, or **establish**. These
    strategies prevent waste, avoid **throwaway AI** (prototypes that can’t be used
    in production), and ensure you focus effort where it matters most.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 要使这种进化变得实用，通过清晰的策略来审视每个组件很有帮助：**保留**、**增强**、**重建**或**建立**。这些策略可以防止浪费，避免**废弃AI**（在生产中无法使用的原型），并确保您将精力集中在最重要的地方。
- en: 'The following diagram revisits the core components introduced in [*Chapter
    8*](Chapter_08.xhtml#_idTextAnchor278), now overlaid with their delivery strategies:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表回顾了在[*第八章*](Chapter_08.xhtml#_idTextAnchor278)中引入的核心组件，现在叠加了它们的交付策略：
- en: '![Figure 9.2: Strategies for moving AI components from prototype to production](img/B31200_09_02.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![图9.2：将AI组件从原型转移到生产的策略](img/B31200_09_02.png)'
- en: 'Figure 9.2: Strategies for moving AI components from prototype to production'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2：将AI组件从原型转移到生产的策略
- en: 'To make this more concrete, *Table 9.3* provides a detailed view of each component
    - the recommended delivery strategy, an explanation of why that strategy matters,
    and common tactics you can use to put it into practice:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这一点更加具体，*表9.3*提供了每个组件的详细视图——推荐的交付策略、为什么该策略很重要以及您可以用来实施该策略的常见策略：
- en: '| **Component** | **Delivery Strategy** | **Explanation** | **Common Tactics**
    |'
  id: totrans-126
  prefs: []
  type: TYPE_TB
  zh: '| **组件** | **交付策略** | **解释** | **常见策略** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-127
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| AI model core | Retain and enhance | If the trained model and its architecture
    worked during prototyping, you can usually build on that foundation in production.
    What matters most is whether performance holds up under real production data and
    conditions, which typically needs consistent work or tweaks, but not an overhaul
    of the entire model. |'
  id: totrans-128
  prefs: []
  type: TYPE_TB
  zh: '| AI模型核心 | 保留和增强 | 如果在原型设计期间训练的模型及其架构有效，您通常可以在生产中在此基础上构建。最重要的是，性能是否在真实的生产数据和条件下保持，这通常需要持续的工作或调整，但不需要对整个模型进行彻底的改造。
    |'
- en: Validate on larger, diverse datasets using appropriate metrics (e.g., RMSE/MAE
    for forecasting, precision/recall/F1 for classification, lift/AUC for ranking,
    pass/fail or human review for LLMs)
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用适当的指标在更大、更多样化的数据集上进行验证（例如，对于预测，使用RMSE/MAE；对于分类，使用精确率/召回率/F1；对于排名，使用提升/AUC；对于LLM，使用通过/失败或人工审查）
- en: Establish feedback loops to capture user corrections and log edge cases
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立反馈循环以捕获用户更正和记录边缘情况
- en: Benchmark against faster or cheaper alternatives to ensure ROI
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与更快或更便宜的替代方案进行基准测试，以确保投资回报率
- en: Compare across vendors or model providers for resilience and performance
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较不同供应商或模型提供者的弹性和性能
- en: Improve prompts
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进提示
- en: Fine-tune model on additional data
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在更多数据上微调模型
- en: '|'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Basic workflow integration | Enhance | Core workflows (user interaction patterns,
    how insights are consumed, etc.) remain, but integration must go deeper to allow
    building an enhanced user experience. |'
  id: totrans-136
  prefs: []
  type: TYPE_TB
  zh: '| 基本工作流程集成 | 增强 | 核心工作流程（用户交互模式、如何消费见解等）保持不变，但集成必须更深入，以允许构建增强的用户体验。 |'
- en: Embed features directly into enterprise systems (CRM, ERP, CMS) via APIs or
    connectors
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过API或连接器将功能直接嵌入到企业系统中（CRM、ERP、CMS）
- en: 'Design for convenience: Users should not need to leave their normal workflow
    (recall TRICUS principles in [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor140))'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计方便性：用户不应需要离开他们的正常工作流程（回想一下[*第五章*](Chapter_05.xhtml#_idTextAnchor140)中的TRICUS原则）
- en: Involve *late adopters* early to encourage adoption beyond enthusiastic testers
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期涉及*后期采用者*以鼓励除热情的测试者之外的采用
- en: '|'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Conceptual data pipelines | Retain | The design logic of your data pipeline
    (what data is used, how it flows, how it’s transformed, etc.) should remain consistent
    from prototype to production. If it changes dramatically, the prototype likely
    didn’t reflect realistic production needs. What evolves is the physical implementation.
    |'
  id: totrans-141
  prefs: []
  type: TYPE_TB
  zh: '| 概念数据管道 | 保留 | 您数据管道的设计逻辑（使用哪些数据、如何流动、如何转换等）应从原型到生产保持一致。如果它发生重大变化，原型可能没有反映真实的生产需求。演变的是物理实现。
    |'
- en: Preserve the overall data flow design from prototype to production
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从原型到生产保留整体数据流设计
- en: Validate that chosen sources and transformations hold true at scale
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证所选来源和转换在规模上是否真实
- en: Align pipeline logic with governance rules (ownership, privacy, retention)
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将管道逻辑与治理规则（所有权、隐私、保留）保持一致
- en: '|'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Technical data pipelines | Rebuild | While the conceptual flow stays the
    same, the technical build must be upgraded. Prototyping often uses quick fixes
    such as CSV exports or scripts. But these won’t scale. Production pipelines must
    be automated, monitored, and made resilient enough for real-world data volumes.
    |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| 技术数据管道 | 重建 | 虽然概念流程保持不变，但技术构建必须升级。原型通常使用快速修复，如CSV导出或脚本。但这些无法扩展。生产管道必须自动化、监控，并足够弹性以适应现实世界的数据量。|'
- en: Automate data movement (e.g., replace manual exports with scheduled jobs)
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化数据移动（例如，用计划作业替换手动导出）
- en: Use orchestration tools (e.g., Airflow, Prefect, or cloud schedulers) where
    necessary
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在必要时使用编排工具（例如，Airflow、Prefect或云调度器）
- en: Add quality checks (flag missing values, duplicates, or errors before processing)
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加质量检查（在处理前标记缺失值、重复项或错误）
- en: Enable logging and alerts (so failures are visible immediately)
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启用日志和警报（以便失败立即可见）
- en: Build resilience (retries, fallbacks, or backups to prevent small errors from
    breaking the pipeline)
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建弹性（重试、回退或备份以防止小错误破坏管道）
- en: '|'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Governance and compliance | Establish | Governance and compliance are often
    (deliberately) overlooked during prototyping, but they are essential when moving
    to production. A working AI system that ignores privacy, security, or regulatory
    rules can create more risk than value. In production, governance ensures your
    system is trusted, auditable, and aligned with legal and organizational standards.
    |'
  id: totrans-153
  prefs: []
  type: TYPE_TB
  zh: '| 治理和合规 | 建立 | 治理和合规在原型设计阶段往往（故意）被忽视，但在迁移到生产阶段时是必不可少的。一个忽视隐私、安全或监管规则的运行中的AI系统可能带来的风险大于价值。在生产中，治理确保您的系统值得信赖、可审计，并与法律和组织标准保持一致。|'
- en: Restrict access with role-based permissions
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用基于角色的权限限制访问
- en: Define clear policies for how data is collected, stored, and deleted
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义明确的数据收集、存储和删除政策
- en: Document key decisions, such as which datasets and models were used and why
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录关键决策，例如使用了哪些数据集和模型以及为什么
- en: Involve legal, compliance, and security teams early to prevent late-stage issues
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期涉及法律、合规和安全团队以防止后期问题
- en: Align with relevant regulations (e.g., GDPR, HIPAA, SOC 2, industry-specific
    rules)
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与相关法规保持一致（例如，GDPR、HIPAA、SOC 2、行业特定规则）
- en: '|'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| User experience and training | Enhance | Prototypes validate usability with
    early adopters. Production requires refinement for broader audiences, including
    *late adopters* who may resist change. Successful delivery depends on training,
    support, and a UX that fits seamlessly into broad, daily workflows. |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
  zh: '| 用户体验和培训 | 增强 | 原型通过早期采用者验证了可用性。对于可能抵制变化的更晚采用者，生产需要进一步细化以适应更广泛的受众。成功的交付取决于培训、支持和无缝融入广泛日常工作流程的用户体验。|'
- en: Test interfaces with a diverse user base to refine usability and accessibility
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用多样化的用户群体测试接口以改进可用性和可访问性
- en: Develop onboarding and training programs to ease adoption
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发入职和培训计划以简化采用
- en: Provide ongoing support channels (helpdesk, in-app support, documentation)
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供持续的支持渠道（帮助台、应用内支持、文档）
- en: Gather structured feedback after rollout to drive continuous improvements
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在推出后收集结构化反馈以推动持续改进
- en: '|'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Monitoring and maintenance | Establish | Monitoring rarely exists in prototypes
    but is critical in production. AI models degrade as data, environments, and user
    behavior change. Without systematic monitoring and maintenance, performance will
    erode over time. |'
  id: totrans-166
  prefs: []
  type: TYPE_TB
  zh: '| 监控和维护 | 建立 | 监控在原型中很少存在，但在生产中至关重要。AI模型随着数据、环境和用户行为的变化而退化。没有系统的监控和维护，性能会随着时间的推移而下降。|'
- en: Log inputs and outputs to create an audit trail for troubleshooting
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录输入和输出以创建故障排除的审计跟踪
- en: Track technical, operational, and strategic metrics (see *Monitoring and metrics*
    section in this chapter) continuously at different intervals
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在不同间隔持续跟踪技术、运营和战略指标（参见本章中的*监控和指标*部分）
- en: Detect model drift by comparing new data with training data
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过比较新数据与训练数据来检测模型漂移
- en: Define retraining triggers (e.g., when accuracy drops below threshold)
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义重新训练触发器（例如，当准确度低于阈值时）
- en: Establish incident response playbooks for errors or downtime
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为错误或停机时间建立事件响应操作手册
- en: '|'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Other infrastructure | Rebuild or enhance | Expect substantial upgrades to
    support scaling requirements that span all of the preceding components. |'
  id: totrans-173
  prefs: []
  type: TYPE_TB
  zh: '| 其他基础设施 | 重建或增强 | 预期对支持所有先前组件的规模化需求进行重大升级。 |'
- en: Replace trial setups (laptops, SaaS accounts) with enterprise-ready environments
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用企业级环境替换试验设置（笔记本电脑、SaaS账户）
- en: Migrate workloads to cloud, on-prem, or hybrid infrastructure depending on security
    and scale requirements
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据安全和规模需求，将工作负载迁移到云、本地或混合基础设施
- en: Implement CI/CD pipelines for reliable deployment of updates (see the later
    AIOps section)
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施CI/CD管道以可靠地部署更新（参见后续的AIOps部分）
- en: Plan for resilience with backups, failover, and disaster recovery based on the
    criticality of your application.
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据应用程序的关键性，规划备份、故障转移和灾难恢复以增强弹性。
- en: '|'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: 'Table 9.3: Overview of transitioning components from discovery to delivery'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.3：从发现到交付的组件过渡概述
- en: This nuanced approach - clearly identifying what to retain, enhance, rebuild,
    or establish - is critical. The key to successful scaling lies in balancing validated
    elements from your prototype with the new operational demands that arise only
    in production.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这种细微的方法——明确识别保留、增强、重建或建立的内容——至关重要。成功规模化的关键是平衡原型中验证过的元素与仅在生产中出现的新的运营需求。
- en: In short, transitioning from prototype to production is less about **scaling
    up** and more about scaling thoughtfully. By deliberately distinguishing between
    the discovery and delivery phases, and by methodically managing this transition,
    your organization lays the groundwork for reliable, sustainable, and impactful
    AI deployments.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，从原型到生产的过渡更多是关于深思熟虑的规模化，而不是简单的**扩大规模**。通过明确区分发现和交付阶段，并系统地管理这一过渡，您的组织为可靠、可持续和有影响力的AI部署打下基础。
- en: 'With this foundation in place, the next question is: **what enables these strategies
    in practice?**'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个基础之上，接下来的问题是：**实践中是什么因素使得这些策略得以实现**？
- en: To scale thoughtfully, you need the right enablers across people, processes,
    data, technology, and operations. These are the five levers of scaling, which
    we’ll explore next.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 要进行深思熟虑的规模化，您需要在人员、流程、数据、技术和运营方面拥有正确的推动力。这些是规模化的五个杠杆，我们将在下一节中探讨。
- en: The five levers of scaling
  id: totrans-184
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 规模化的五个杠杆
- en: 'Scaling AI is hardly achieved by technology alone. Even with clear goals and
    well-defined component strategies, success depends on the organizational muscle
    that brings them to life. These muscles take the form of **five key levers**:
    **people**, **processes**, **data**, **technology**, and **AI operations (AIOps)**.'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 仅靠技术很难实现AI的规模化。即使有明确的目标和定义良好的组件策略，成功也取决于将它们付诸实践的组织力量。这些力量以**五个关键杠杆**的形式出现：**人员**、**流程**、**数据**、**技术**和**AI运营（AIOps）**。
- en: 'Each lever plays a distinct role:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 每个杠杆都扮演着独特的角色：
- en: '**People** provide the skills, leadership, and adoption needed for delivery.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人员**提供交付所需的技能、领导和采用。'
- en: '**Processes** give structure without suffocating agility.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流程**提供了结构，但不会扼杀敏捷性。'
- en: '**Data** fuels every AI system.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据**为每个AI系统提供动力。'
- en: '**Technology** provides the infrastructure to serve models securely and efficiently.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术**提供安全高效地服务模型的基础设施。'
- en: '**AIOps** ensures that once deployed, AI systems remain accurate, trusted,
    and valuable over time.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AIOps**确保一旦部署，AI系统在长时间内保持准确性、可信度和价值。'
- en: Individually, these levers strengthen specific aspects of scaling. Together,
    they compound to give you even greater leverage in successfully moving AI prototypes
    into solutions that are sustainable, governed, and aligned with business needs
    - as best described by the following figure.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 单独来看，这些杠杆增强了规模化特定方面的能力。共同作用，它们可以为您提供更大的杠杆，以成功地将AI原型转化为可持续、受控且符合业务需求的解决方案——正如以下图示所描述的最佳方式。
- en: '![](img/B31200_09_03.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B31200_09_03.png)'
- en: 'Figure 9.3: Key levers to realize AI scaling goals'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.3：实现AI规模化目标的关键杠杆
- en: Let’s explore these critical enablers in more detail.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更详细地探讨这些关键推动力。
- en: People
  id: totrans-196
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人员
- en: During the discovery phase, you likely relied on a small, agile team following
    the Two-Pizza rule ([https://aws.amazon.com/executive-insights/content/amazon-two-pizza-team/](https://aws.amazon.com/executive-insights/content/amazon-two-pizza-team/)).
    Team members probably wore multiple hats, taking on varied responsibilities ranging
    from data science to infrastructure management, and from business analysis to
    informal stakeholder communication.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在发现阶段，你很可能依赖一个遵循两比萨法则（[https://aws.amazon.com/executive-insights/content/amazon-two-pizza-team/](https://aws.amazon.com/executive-insights/content/amazon-two-pizza-team/)）的小型敏捷团队。团队成员可能身兼数职，承担从数据科学到基础设施管理，再到商业分析和非正式利益相关者沟通的多样化责任。
- en: However, when transitioning from discovery into the delivery phase, it’s time
    to reconsider your team’s structure and scale. Instead of two pizzas, you should
    prepare to order the *full buffet*. Scaling your AI solution into production involves
    expanding both the size and diversity of your team, assigning clearly defined
    roles and responsibilities, and ensuring you have the right depth of expertise
    across critical domains.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当从发现阶段过渡到交付阶段时，是时候重新考虑团队的结构和规模了。不再是两比萨，你应该准备订购*完整的自助餐*。将你的AI解决方案扩展到生产涉及扩大团队的大小和多样性，分配明确定义的角色和责任，并确保你在关键领域拥有正确的专业知识深度。
- en: As you scale, your team naturally evolves from a tight-knit innovation unit
    into a broader cross-functional group that collectively possesses the diverse
    capabilities required to achieve scalability, reliability, performance, maintainability,
    and security. In many cases, that might involve handing the project off to a completely
    different delivery team entirely.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你团队的规模扩大，你的团队自然会从紧密的创新单元演变为一个更广泛的跨职能团队，这个团队共同拥有实现可扩展性、可靠性、性能、可维护性和安全性的多样化能力。在许多情况下，这可能意味着将项目完全转交给一个完全不同的交付团队。
- en: This delivery team will typically include dedicated data scientists or AI specialists
    who ensure the accuracy and reliability of your models, ML and data engineers
    who manage scalable data infrastructure, and IT infrastructure specialists who
    maintain system performance and security at scale. You’ll also involve dedicated
    business domain experts or product owners, ensuring that the AI solutions stay
    closely aligned with real-world business needs and continue to generate value.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这个交付团队通常包括专门的数据科学家或AI专家，确保模型的准确性和可靠性，ML和数据工程师负责管理可扩展的数据基础设施，以及IT基础设施专家在规模上维护系统性能和安全。你还将涉及专门的业务领域专家或产品所有者，确保AI解决方案与实际业务需求保持紧密一致，并继续创造价值。
- en: While prototyping often operated with minimal formal oversight, scaling to delivery
    means explicitly aligning with your organization’s internal frameworks, governance
    policies, and regulatory compliance requirements. Collaboration with internal
    teams such as data governance, IT security, enterprise architecture, compliance,
    legal experts, or works councils (employee representative bodies) becomes daily
    business.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然原型设计通常在最小程度的正式监督下进行，但扩展到交付阶段意味着明确与组织的内部框架、治理政策和法规合规要求保持一致。与数据治理、IT安全、企业架构、合规、法律专家或工作委员会（员工代表机构）等内部团队的协作成为日常业务。
- en: Engaging end users will also become more structured and formalized. Regular
    user training sessions, comprehensive documentation, and ongoing support systems
    are crucial for driving widespread adoption. This also involves getting consistent
    buy-in for your solution. Not every user might be happy to work with AI - some
    might fear getting replaced or training an AI model that will replace their job
    in the future. Anticipating these fears and actively engaging users will become
    more important.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 与最终用户的互动也将变得更加结构化和正式化。定期的用户培训课程、全面的文档和持续的支持系统对于推动广泛采用至关重要。这也涉及到为你的解决方案获得一致的支持。并非每个用户都愿意与AI合作
    - 一些用户可能担心被取代，或者训练一个未来可能取代他们工作的AI模型。预见这些担忧并积极与用户互动将变得更加重要。
- en: As you involve more people and stakeholders, communication and management become
    increasingly vital, which we’ll explore in more depth later in this chapter.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你涉及更多的人和利益相关者，沟通和管理变得越来越重要，我们将在本章后面更深入地探讨这一点。
- en: But how exactly do you keep all these people connected, aligned, and moving
    in the right direction? That’s where the next critical lever - processes - comes
    into play.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 但你究竟如何让所有这些人保持联系、保持一致并朝着正确的方向前进呢？这就是下一个关键杠杆 - 流程 - 发挥作用的地方。
- en: Processes
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 流程
- en: Just as your team structure must evolve from prototyping to production, your
    approach to processes also needs to mature.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你的团队结构必须从原型设计发展到生产阶段一样，你对流程的方法也需要成熟。
- en: In the discovery phase, agility was essential but likely informal. Rapid iteration,
    minimal constraints, and loosely structured sprints allowed your prototype team
    to innovate quickly and pivot easily when facing new insights or challenges.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在发现阶段，敏捷性至关重要，但可能是不正式的。快速迭代、最小限制和松散结构化的冲刺允许你的原型团队快速创新并在面对新的见解或挑战时轻松调整方向。
- en: However, as you transition into the delivery phase, maintaining agility becomes
    more complex. You’re now coordinating larger teams, managing multiple stakeholders,
    and aligning to established internal policies, all while delivering predictable
    outcomes. In delivery mode, agility doesn’t mean working without structure. Instead,
    it means embedding agile principles within frameworks that provide the clarity,
    consistency, and governance necessary to manage complexity effectively.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当你进入交付阶段时，保持敏捷性变得更加复杂。你现在需要协调更大的团队，管理多个利益相关者，并符合既定的内部政策，同时还要交付可预测的结果。在交付模式下，敏捷并不意味着没有结构地工作。相反，它意味着在提供清晰性、一致性和治理的框架内嵌入敏捷原则，这些是有效管理复杂性的必要条件。
- en: In practice, this typically involves adopting frameworks such as Scrum ([https://www.scrum.org](https://www.scrum.org)/),
    Kanban ([https://www.atlassian.com/agile/kanban](https://www.atlassian.com/agile/kanban)),
    or scaled agile methodologies such as the Scaled Agile Framework (SAFe) ([https://scaledagile.com/](https://scaledagile.com/)).
    Such frameworks formalize agility by defining clear roles, structured planning
    cycles, and systematic processes for collaboration, enabling multiple teams to
    work in an agile manner while maintaining coherence across the broader organization.
    Regular sprint cycles now become more systematically planned, reviewed, and adapted.
    Additional roles such as Product Owners, Scrum Masters, and Agile Coaches guide
    teams, facilitate cross-team collaboration, and continuously realign priorities
    and expectations.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，这通常涉及采用诸如Scrum([https://www.scrum.org](https://www.scrum.org/))、Kanban([https://www.atlassian.com/agile/kanban](https://www.atlassian.com/agile/kanban))或扩展敏捷方法，如Scaled
    Agile Framework (SAFe) ([https://scaledagile.com/](https://scaledagile.com/))等框架。这些框架通过定义明确的角色、结构化的计划周期和系统化的协作流程来正式化敏捷性，使多个团队能够以敏捷的方式工作，同时在更广泛的组织中保持一致性。定期的冲刺周期现在变得更加系统性地计划、审查和调整。产品负责人、Scrum大师和敏捷教练等额外角色指导团队，促进跨团队协作，并持续重新调整优先级和期望。
- en: What kind of process framework you adopt heavily depends on your organization,
    and in particular which IT delivery processes have already been established there.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 你采用哪种流程框架在很大程度上取决于你的组织，特别是已经在那里建立的IT交付流程。
- en: For example, if your organization still operates with a predominantly classical
    (waterfall) IT delivery model, introducing a fully agile AI project from the start
    may create confusion or resistance. Teams accustomed to fixed scopes, rigid timelines,
    and sequential workflows can find agile delivery methods unfamiliar or disruptive.
    In this case, a more effective approach may be to start with a smaller, self-contained
    AI initiative that doesn’t require broad organizational change. Alternatively,
    you can frame the AI delivery to align with existing stage-gate or milestone-driven
    processes while embedding agile cycles - such as iterative model development or
    experimentation - within those phases. This hybrid approach respects the organization’s
    delivery culture while introducing agility where it adds the most value.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你的组织仍然主要采用传统的（瀑布）IT交付模型，那么从一开始就引入完全敏捷的AI项目可能会造成困惑或阻力。习惯于固定范围、严格时间表和顺序工作流程的团队可能会发现敏捷交付方法不熟悉或具有破坏性。在这种情况下，更有效的方法可能是从较小的、自包含的AI倡议开始，这不需要广泛的组织变革。或者，你可以将AI交付框架与现有的阶段门或里程碑驱动流程对齐，同时在这些阶段内嵌入敏捷周期——如迭代模型开发或实验。这种混合方法尊重组织的交付文化，同时在最有价值的领域引入敏捷性。
- en: Data
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据
- en: While agile processes help you manage team collaboration and task coordination,
    your AI system’s effectiveness still hinges on another critical dimension – **data**.
    Without clear, robust, and scalable data pipelines, even the most structured agile
    process won’t enable effective AI delivery.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然敏捷流程有助于你管理团队协作和任务协调，但你的AI系统的有效性仍然取决于另一个关键维度——**数据**。没有清晰、稳健和可扩展的数据管道，即使是最结构化的敏捷流程也无法实现有效的AI交付。
- en: During the prototyping phase, data handling is often a hands-on, ad hoc activity.
    Teams work with small, curated datasets - sometimes extracted manually, cleaned
    offline, or gathered just once to test an idea. This is acceptable in the discovery
    phase because the goal is to prove feasibility, not optimize for scale or reliability.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在原型设计阶段，数据处理通常是一项动手操作、临时性的活动。团队使用小型、精心挑选的数据集进行工作——有时是手动提取、离线清理，或者仅为了测试一个想法而一次性收集。在探索阶段，这是可以接受的，因为目标是证明可行性，而不是为了规模或可靠性进行优化。
- en: However, once you enter delivery, these makeshift pipelines quickly become a
    liability. Production systems need automated, resilient, and secure data flows
    that can operate continuously and handle real-world messiness such as irregular
    inputs, missing fields, version mismatches, and scale fluctuations.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一旦进入交付阶段，这些临时管道很快就会变成一种负担。生产系统需要自动化、弹性、安全的数据流，能够持续运行并处理现实世界的混乱，如不规则输入、缺失字段、版本不匹配和规模波动。
- en: In other words, while the conceptual logic of your data pipeline may transfer
    from prototype to production, the technical implementation almost always needs
    to be rebuilt. The prototype might have worked with a manually uploaded CSV file
    and a few hundred records. Your production system must now pull data automatically
    from cloud warehouses, CRM systems, or real-time APIs - and be ready to process
    perhaps millions of rows per day.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，虽然你的数据管道的概念逻辑可能从原型转移到生产，但技术实现几乎总是需要重建。原型可能能够处理手动上传的CSV文件和几百条记录。你的生产系统现在必须从云仓库、CRM系统或实时API自动提取数据，并且每天能够处理数百万行数据。
- en: 'This transition raises a few key questions that you need to resolve early in
    the delivery phase:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 这种过渡引发了一些关键问题，你需要在交付阶段早期解决这些问题：
- en: Is your data refresh cycle well defined and automated?
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的数据刷新周期是否定义良好且自动化？
- en: Do you have a consistent schema and version control for inputs?
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是否有对输入的一致架构和版本控制？
- en: How do you handle anomalies or incomplete data in real time?
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何处理实时中的异常或不完整数据？
- en: Where is the data stored, and who has access?
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据存储在哪里，谁可以访问？
- en: Are your data sources future-proof for scaling across use cases or regions?
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的数据源是否为跨用例或地区扩展做好了未来准备？
- en: The answers to these questions don’t just impact performance, but also affect
    security, compliance, and maintainability. As your system scales, so does your
    exposure to regulatory risks, especially if your data includes personal or sensitive
    information. In delivery, you’ll need to work closely with data governance and
    compliance teams to ensure your pipelines meet internal and external requirements,
    such as GDPR, HIPAA, or industry-specific standards.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题的答案不仅影响性能，还影响安全、合规性和可维护性。随着你的系统规模扩大，你对监管风险的暴露也会增加，尤其是如果你的数据包括个人信息或敏感信息。在交付过程中，你需要与数据治理和合规团队紧密合作，以确保你的管道满足内部和外部要求，例如GDPR、HIPAA或行业特定标准。
- en: Another key consideration is **data lineage**. In prototyping, no one usually
    asks where the data came from or how it was transformed - so long as it works.
    But in production, you need to trace and audit data flows from end to end. If
    a model starts behaving unpredictably, you’ll need to determine whether the issue
    lies in the model logic or in a subtle change to an upstream data source. Many
    organizations implement data lineage using tools such as OpenLineage ([https://openlineage.io/](https://openlineage.io/))
    or vendors such as DataHub ([https://datahub.com/](https://datahub.com/)), which
    can be integrated with modern data platforms such as Airflow, Spark, or dbt.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键考虑因素是**数据血缘**。在原型设计中，通常没有人会问数据从哪里来或如何转换——只要它能工作。但在生产中，你需要从端到端跟踪和审计数据流。如果一个模型开始表现出不可预测的行为，你需要确定问题是否出在模型逻辑上，还是在上游数据源的一个微妙变化上。许多组织使用OpenLineage
    ([https://openlineage.io/](https://openlineage.io/))或DataHub ([https://datahub.com/](https://datahub.com/))等工具实现数据血缘，这些工具可以与Airflow、Spark或dbt等现代数据平台集成。
- en: Lastly, don’t underestimate the value of **standardization**. Prototyping is
    often fast and dirty - tailored scripts, custom file formats, and one-off data
    fixes. At scale, this creates **technical debt**.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，不要低估**标准化**的价值。原型设计通常快速且粗糙——定制脚本、自定义文件格式和一次性数据修复。在规模扩大时，这会创造**技术债务**。
- en: 'Delivery should aim for standardized preprocessing logic in the form of reusable
    ETL components and shared data contracts across teams and applications:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 交付应旨在实现标准化的预处理逻辑，以可重用的ETL组件和跨团队、应用程序共享的数据合约的形式：
- en: '**Reusable ETL components** are modular **Extract-Transform-Load (ETL)** building
    blocks that can be applied across projects instead of writing custom data ingestion
    scripts each time. **Reusability** improves consistency, reduces errors, and speeds
    up onboarding. For example, a reusable ETL component might be a standardized function
    for cleaning time-series data or loading customer records into a data warehouse.
    You can learn more about ETL concepts in this Azure guide ([https://learn.microsoft.com/en-us/azure/architecture/data-guide/relational-data/etl](https://learn.microsoft.com/en-us/azure/architecture/data-guide/relational-data/etl)).'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可重用ETL组件**是模块化的**提取-转换-加载（ETL）**构建块，可以在多个项目中应用，而不是每次都编写自定义数据摄取脚本。**可重用性**提高了一致性，减少了错误，并加快了入职速度。例如，一个可重用的ETL组件可能是一个用于清理时间序列数据或加载客户记录到数据仓库的标准化的函数。您可以在Azure指南中了解更多关于ETL概念的信息（[https://learn.microsoft.com/en-us/azure/architecture/data-guide/relational-data/etl](https://learn.microsoft.com/en-us/azure/architecture/data-guide/relational-data/etl)）。'
- en: '**Shared data contracts** define the structure, format, and expectations of
    data exchanged between teams or services. They act as formal agreements (like
    APIs for data) and help ensure that producers and consumers of data stay in sync.
    For example, a contract might specify that a customer ID field must be a non-null
    string of a certain format. Tools such as Protocol Buffers and Apache Avro, or
    tools supporting the data contract paradigm (e.g., DataHub, OpenMetadata), help
    enforce these. Learn more about data contracts with this DataHub blog post: [https://datahub.com/blog/the-what-why-and-how-of-data-contracts/](https://datahub.com/blog/the-what-why-and-how-of-data-contracts/).'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**共享数据合约**定义了团队或服务之间交换数据的结构、格式和期望。它们作为正式协议（如数据API）并帮助确保数据的生产者和消费者保持同步。例如，一个合约可能指定客户ID字段必须是非空字符串，并具有特定的格式。像Protocol
    Buffers和Apache Avro这样的工具，或支持数据合约范式的工具（例如DataHub、OpenMetadata），有助于强制执行这些规定。有关数据合约的更多信息，请参阅此DataHub博客文章：[https://datahub.com/blog/the-what-why-and-how-of-data-contracts/](https://datahub.com/blog/the-what-why-and-how-of-data-contracts/)。'
- en: These practices not only reduce rework, but they also enable more teams to build
    on top of each other’s work without introducing brittle dependencies. Making data
    a first-class citizen in your delivery approach ensures your models have the foundation
    they need to thrive in production.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 这些实践不仅减少了返工，而且使更多团队能够在彼此的工作基础上构建，而不会引入脆弱的依赖。在您的交付方法中将数据视为一等公民，确保您的模型拥有在生产中茁壮成长的基础。
- en: '**Technical debt**'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: '**技术债务**'
- en: Technical debt refers to the hidden cost of taking shortcuts in software, data,
    or system design in order to deliver something quickly. Just like financial debt,
    it can accumulate interest over time - in the form of increased maintenance burden,
    reduced agility, and greater risk of failures.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 技术债务是指为了快速交付而采取捷径在软件、数据或系统设计中的隐藏成本。就像财务债务一样，它可能会随着时间的推移积累利息——以增加维护负担、降低灵活性和增加失败风险的形式。
- en: In AI projects, technical debt often shows up as undocumented scripts, manual
    data pipelines, or even vendor lock-in.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI项目中，技术债务通常表现为未记录的脚本、手动数据管道，甚至供应商锁定。
- en: While these might be acceptable in a prototype, if not addressed, they become
    obstacles to scaling, reliability, and collaboration.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些可能在原型中是可以接受的，但如果未得到解决，它们将成为扩展、可靠性和协作的障碍。
- en: With the right people in place, agile processes formalized, and production-grade
    data pipelines taking shape, the next enabler for successful AI delivery is your
    technology stack. Let’s talk about it now.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 当合适的人选到位，敏捷流程正式化，生产级数据管道成形时，成功AI交付的下一个推动者是您的技术堆栈。现在让我们来谈谈它。
- en: Technology
  id: totrans-235
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术
- en: While technology played a supporting role during prototyping, it becomes a central
    pillar in the delivery phase to meet the aforementioned scaling goals.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 在原型阶段，技术起到了辅助作用，但在交付阶段，它成为实现上述扩展目标的核心支柱。
- en: In the discovery phase, your team probably worked with lightweight environments.
    Maybe someone spun up a virtual machine manually, trained models in a Jupyter
    notebook, and shared results through ad hoc dashboards. These setups were perfect
    for learning and fast experimentation - but in many cases, they don’t scale. That
    means moving from temporary setups to well-structured, monitored, and governed
    environments that are integrated into your broader enterprise infrastructure.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在发现阶段，你的团队可能使用的是轻量级环境。可能有人手动启动了虚拟机，在Jupyter笔记本中训练模型，并通过临时仪表板共享结果。这些设置非常适合学习和快速实验
    - 但在许多情况下，它们无法扩展。这意味着要从临时设置转移到结构良好、受监控和管理的环境，这些环境集成到你的更广泛的企业基础设施中。
- en: 'This transition typically raises three key questions:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 这种过渡通常会引发三个关键问题：
- en: '**Can your infrastructure scale with your AI workloads?**'
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你的基础设施能否与你的AI工作负载一起扩展？**'
- en: AI systems often require a very different resource profile than traditional
    software applications. From GPUs for model inference to autoscaling containers
    for serving APIs, your delivery infrastructure must be able to adapt dynamically
    to workload spikes. It’s not just about throwing more compute at the problem -
    it’s about managing compute efficiently, ensuring resource elasticity, and avoiding
    cost blowouts. The key principle here is **adaptability**. You want a system that
    can scale quickly enough to meet demand without over-provisioning resources that
    sit idle and inflate costs. What *scaling quickly* means - whether a few milliseconds
    or a few days - depends entirely on your use case. For many internal applications,
    it’s often more practical to add a bit more server capacity manually if needed
    than to invest significant effort upfront in building a fully automated Kubernetes
    setup from day one. The key is that you’re actually able to scale as workloads
    grow.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统通常需要与传统软件应用非常不同的资源配置。从用于模型推理的GPU到用于服务API的自适应容器，你的交付基础设施必须能够动态适应工作负载峰值。这不仅仅是向问题投入更多的计算能力
    - 这是要高效地管理计算，确保资源弹性，并避免成本激增。这里的关键原则是**适应性**。你希望一个系统能够快速扩展以满足需求，而不会过度配置闲置的资源并增加成本。*快速扩展*意味着什么
    - 是几毫秒还是几天 - 完全取决于你的用例。对于许多内部应用，如果需要，手动增加一点服务器容量通常比从一开始就投入大量努力构建一个完全自动化的Kubernetes设置更实际。关键是，你实际上能够随着工作负载的增长而扩展。
- en: '**Do your tools and platforms support operational handover?**'
  id: totrans-241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你的工具和平台是否支持运营移交？**'
- en: Tools used during prototyping (e.g., local dev environments, SaaS APIs) often
    lack the access controls, monitoring, or integration hooks required in production.
    In delivery, your stack should support at least version control (e.g., Git), likely
    CI/CD automation, and definitely robust monitoring and logging. The right choices
    depend entirely on your use case. Real-time systems, for example, typically demand
    more automation and observability than batch workloads. What matters most is that
    your tooling enables a smooth handoff from development to operations, without
    adding unnecessary manual patchwork.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 在原型设计阶段使用的工具（例如，本地开发环境、SaaS API）通常缺乏在生产环境中所需的访问控制、监控或集成钩子。在交付过程中，你的堆栈至少应该支持版本控制（例如，Git），可能还需要CI/CD自动化，以及肯定需要强大的监控和日志记录。正确的选择完全取决于你的用例。例如，实时系统通常比批量工作负载需要更多的自动化和可观察性。最重要的是，你的工具能够使开发到运营的过渡更加顺畅，而不会增加不必要的手动修补工作。
- en: '**Can you minimize rebuilds?**'
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**你是否可以最小化重建次数？**'
- en: While some components of your prototype may need to be re-engineered, try to
    minimize unnecessary rebuilds. If your prototyping tools are compatible with your
    production platform (e.g., using Azure ML Studio or Vertex AI), you may be able
    to reuse model endpoints or pipeline configurations. That’s why choosing the right
    tools from the beginning - ones that support both experimentation and delivery
    - can significantly smooth your scaling journey.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你的原型的一些组件可能需要重新设计，但尽量减少不必要的重建。如果你的原型设计工具与你的生产平台兼容（例如，使用Azure ML Studio或Vertex
    AI），你可能能够重用模型端点或管道配置。这就是为什么从一开始就选择正确的工具 - 支持实验和交付的工具 - 可以显著简化你的扩展之旅。
- en: Another important consideration in this aspect is **modularity**. Delivering
    AI at scale doesn’t mean building one monolithic system. Instead, modular architectures
    allow you to isolate components - models, APIs, pipelines, and dashboards - and
    evolve them independently. This makes it easier to swap out technologies, upgrade
    individual components, and reduce risk when something breaks.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个方面，另一个重要的考虑因素是**模块化**。在规模上交付AI并不意味着构建一个单体系统。相反，模块化架构允许你隔离组件——模型、API、管道和仪表板——并独立地发展它们。这使得更换技术、升级单个组件以及降低故障风险变得更容易。
- en: '**Security** also becomes tightly linked with your tech stack. The infrastructure
    decisions you make, such as your cloud provider, access architecture, or data
    storage format, will directly influence how easy (or difficult) it is to meet
    internal security and compliance requirements. Work closely with your IT and InfoSec
    teams to choose technology that aligns with both operational needs and regulatory
    expectations.'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: '**安全性**也与你的技术栈紧密相连。你做出的基础设施决策，例如云服务提供商、访问架构或数据存储格式，将直接影响满足内部安全和合规要求的多容易（或困难）。与你的IT和信息安全团队紧密合作，选择符合操作需求和监管预期的技术。'
- en: So while technology may have taken a backseat during prototyping, in delivery,
    it becomes a key enabler. The choices you make here will either accelerate your
    AI adoption or become roadblocks that limit scale, increase cost, or introduce
    unnecessary risk.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，虽然在原型设计阶段技术可能退居次要位置，但在交付时，它成为了一个关键启用程序。你在这里做出的选择将要么加速你的AI采用，要么成为限制规模、增加成本或引入不必要风险的障碍。
- en: AIOps
  id: totrans-248
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AIOps
- en: 'Once your AI system is live, running in production, and delivering value, your
    job isn’t done; it’s just the beginning of a continuous cycle of monitoring, maintenance,
    and optimization. AI models naturally degrade over time due to data drift, evolving
    user expectations, or changing business conditions. That’s where our next enabler
    comes in: AIOps.'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的AI系统上线，在生产中运行并交付价值，你的工作还没有完成；这只是监控、维护和优化的持续循环的开始。由于数据漂移、用户期望的演变或商业条件的变化，AI模型自然会随时间退化。这就是我们下一个启用程序的作用：AIOps。
- en: AIOps refers to the set of operational practices, tools, and processes that
    ensure your AI models remain accurate, useful, and trustworthy over time. It’s
    like **DevOps**, which focuses on deploying and operating traditional software
    reliably, but extends these practices to the unique challenges of AI - such as
    monitoring model accuracy, detecting data drift, and managing retraining cycles.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: AIOps指的是一系列操作实践、工具和流程，确保你的AI模型在长时间内保持准确、有用和可信。它类似于**DevOps**，专注于可靠地部署和运营传统软件，但将这些实践扩展到AI的独特挑战——例如监控模型准确性、检测数据漂移和管理重新训练周期。
- en: 'During prototyping, model performance was probably measured in quick evaluations:
    a test dataset, a few metrics, and some informal stakeholder validation. But in
    production, you need rigorous, *ongoing monitoring* - because everything from
    user behavior to upstream data sources to market dynamics can shift unexpectedly.
    The most critical role of AIOps, therefore, is to continuously monitor your AI
    systems and alert your team when things go off track. This includes:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 在原型设计阶段，模型性能可能通过快速评估来衡量：一个测试数据集、几个指标和一些非正式的利益相关者验证。但在生产中，你需要严格的、**持续的监控**——因为从用户行为到上游数据源再到市场动态，任何东西都可能意外地发生变化。因此，AIOps最关键的作用是持续监控你的AI系统，并在事情偏离轨道时向你的团队发出警报。这包括：
- en: '**Model performance monitoring**: Are metrics such as accuracy, precision,
    recall, or other KPIs drifting below acceptable thresholds?'
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型性能监控**：准确率、精确度、召回率或其他关键绩效指标是否低于可接受的阈值？'
- en: '**Data drift detection**: Are the characteristics of incoming data changing
    over time that might require you to update or adjust your models or prompts?'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据漂移检测**：输入数据的特征是否随时间变化，这可能需要你更新或调整你的模型或提示？'
- en: '**Pipeline health**: Are all systems - from ingestion to inference - running
    smoothly, or are there bottlenecks or failures?'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管道健康**：从摄取到推理的所有系统是否运行顺畅，或者是否存在瓶颈或故障？'
- en: '**Latency and availability**: Are your AI services responding fast enough to
    support users and workflows?'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟和可用性**：你的AI服务是否足够快地响应用户和工作流程？'
- en: Well-structured AIOps will automatically flag issues when they arise, enabling
    quick investigation and resolution. This is less about avoiding every issue, but
    rather catching them before they snowball into bigger problems.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 结构良好的AIOps将在问题出现时自动标记问题，从而实现快速调查和解决。这不仅仅是避免每个问题，而是在问题变成更大的问题之前捕捉它们。
- en: A healthy AIOps setup, therefore, also includes mechanisms for feedback and
    iteration. This means that beyond flagging issues, you’re able to apply corrections
    and retrain models with updated data over time. Many organizations make the mistake
    of treating model deployment as a one-time event. In reality, AI models are like
    living systems that require updates, retraining, version control, and, occasionally,
    full replacement. AIOps gives you the structure to manage this lifecycle sustainably.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一个健康的AIOps设置也包括反馈和迭代的机制。这意味着除了标记问题之外，你还能随着时间的推移应用更正，并使用更新数据重新训练模型。许多组织犯了一个错误，将模型部署视为一次性事件。实际上，AI模型就像活系统一样，需要更新、重新训练、版本控制和偶尔的完全替换。AIOps为你提供了管理这一生命周期的结构。
- en: In order to achieve this and make the right decisions, you need clear ownership.
    **Who is responsible for checking model performance next month? Who’s notified
    if the model suddenly produces errors?**
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点并做出正确的决定，你需要清晰的归属。**下个月谁负责检查模型性能？如果模型突然产生错误，谁会被告知？**
- en: 'In a good AIOps setup, it’s clear who’s going to do what and overall who’s
    accountable for the AI system’s health. If you don’t yet have a dedicated MLOps
    or AIOps function, start small: implement performance dashboards, automate drift
    detection, and define what *acceptable performance* means for each use case. Then,
    evolve those practices as your AI footprint grows.'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个良好的AIOps设置中，很清楚谁将做什么，以及总体上谁对AI系统的健康负责。如果你还没有专门的MLOps或AIOps职能，从小处着手：实施性能仪表板，自动化漂移检测，并定义每个用例的*可接受性能*意味着什么。然后，随着你的AI足迹增长，逐步发展这些实践。
- en: Together, these five enablers - people, processes, data, technology, and AIOps
    - give you the organizational muscle and structural resilience needed to scale
    AI thoughtfully and successfully.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 这些五个促进因素——人员、流程、数据、技术和AIOps——为你提供了扩展AI并成功所需的组织肌肉和结构弹性。
- en: 'Practical example: Scaling the RFP Chatbot Analyzer'
  id: totrans-261
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际案例：扩展RFP聊天机器人分析器
- en: 'To make these concepts more tangible, let’s revisit our RFP Chatbot Analyzer
    prototype from earlier chapters and see what happens when it’s scaled thoughtfully
    into production:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这些概念更具体，让我们回顾一下我们之前章节中的RFP聊天机器人分析器原型，并看看当它经过深思熟虑地扩展到生产时会发生什么：
- en: '**Applying the checklist**: Let’s say the chatbot prototype demonstrated measurable
    value. Feedback was enthusiastic, demand was spreading beyond the initial test
    group, and leadership secured the budget for the next steps. The readiness checklist
    was effectively completed: value validated, technical feasibility proven, and
    an integration path understood. *Table 9.4* shows an example of the applied checklist:'
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**应用清单**：假设聊天机器人原型已经展现出可衡量的价值。反馈热情，需求已超出初始测试组，领导层已为下一步工作确保了预算。准备清单已有效完成：价值得到验证，技术可行性得到证明，以及理解了整合路径。*表9.4*展示了应用清单的一个示例：'
- en: '| **Criteria** | **Evaluation** | **Red Flags/Concerns** |'
  id: totrans-264
  prefs: []
  type: TYPE_TB
  zh: '| **标准** | **评估** | **红旗/关注点** |'
- en: '| --- | --- | --- |'
  id: totrans-265
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Value |'
  id: totrans-266
  prefs: []
  type: TYPE_TB
  zh: '| 价值 |'
- en: Salespeople with access processed RFPs ~10+ hours faster per month each; ~10K
    hours/year saved.
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有访问权限的销售人员每月处理RFP的速度提高了约10小时；每年节省约10K小时。
- en: Higher throughput without higher costs, faster response time.
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高吞吐量而不增加成本，更快的响应时间。
- en: '| None. |'
  id: totrans-269
  prefs: []
  type: TYPE_TB
  zh: '| 无。 |'
- en: '| User feedback | Early tester feedback was very positive | Broader survey
    still pending. UI still needs enhancements. |'
  id: totrans-270
  prefs: []
  type: TYPE_TB
  zh: '| 用户反馈 | 早期测试者的反馈非常积极 | 更广泛的调查仍待定。UI仍需改进。 |'
- en: '| Technical feasibility |'
  id: totrans-271
  prefs: []
  type: TYPE_TB
  zh: '| 技术可行性 |'
- en: IT review completed.
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IT审查完成。
- en: Performance is already good enough to be useful.
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能已经足够好，足以有用。
- en: '|'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: GenAI stack still new. Platform decisions still pending.
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GenAI堆栈仍处于新阶段。平台决策仍悬而未决。
- en: '|'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Growing demand | Early testers enthusiastic but not encouraged to promote
    the project internally yet. | Wider demand signal pending. |'
  id: totrans-277
  prefs: []
  type: TYPE_TB
  zh: '| 增长需求 | 早期测试者热情但尚未鼓励内部推广项目。 | 更广泛的需求信号待定。 |'
- en: '| Leadership support |'
  id: totrans-278
  prefs: []
  type: TYPE_TB
  zh: '| 领导支持 |'
- en: Head of sales agreed to sponsor the first year of implementation and assign
    a budget.
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售部门负责人同意赞助实施的第一年，并分配预算。
- en: IT assigns a PM.
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IT分配一个项目经理。
- en: '| None. |'
  id: totrans-281
  prefs: []
  type: TYPE_TB
  zh: '| 无。 |'
- en: '| Ethics | Legal/compliance review still pending, but no initial blockers identified.
    | Final sign-off WIP. |'
  id: totrans-282
  prefs: []
  type: TYPE_TB
  zh: '| 道德 | 法律/合规性审查仍在进行中，但尚未发现任何初始障碍。 | 最终批准正在进行中。 |'
- en: '| Integration path | Embed in CRM/SharePoint workflows. | Integration testing
    not yet completed. |'
  id: totrans-283
  prefs: []
  type: TYPE_TB
  zh: '| 集成路径 | 嵌入CRM/SharePoint工作流程。 | 集成测试尚未完成。 |'
- en: 'Table 9.4: The readiness checklist for RFP Chatbot Analyzer'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.4：RFP聊天机器人分析器的就绪清单
- en: '**Defining scaling goals**: With delivery on the horizon, the team clarified
    the five scaling goals:'
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义扩展目标**：随着交付的临近，团队明确了五个扩展目标：'
- en: '**Capacity**: Ensure the chatbot can handle at least 10 active RFPs in parallel
    without slowing down.'
  id: totrans-286
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容量**：确保聊天机器人能够同时处理至少10个活跃的RFP，而不会减慢速度。'
- en: '**Reliability**: Maintain at least 90% accuracy (9 out of 10 chat requests
    handled with complete, truthful information) and ensure the system is available
    during critical bidding cycles.'
  id: totrans-287
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可靠性**：保持至少90%的准确性（10个聊天请求中有9个处理完毕，提供完整、真实的信息）并确保系统在关键投标周期中可用。'
- en: '**Performance**: Keep response times under 10 seconds, even for large, complex
    proposals.'
  id: totrans-288
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能**：保持响应时间在10秒以下，即使是大型、复杂的提案。'
- en: '**Maintainability**: Allow effective monitoring and testing of new models,
    with update cycles expected every 6 months.'
  id: totrans-289
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可维护性**：允许有效地监控和测试新模型，预计每6个月更新一次。'
- en: '**Security**: Protect sensitive RFP data with encryption, access controls,
    and auditability.'
  id: totrans-290
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全**：使用加密、访问控制和可审计性保护敏感的RFP数据。'
- en: '**Applying component strategies**: Using the framework from *Table 9.3*, the
    team mapped prototype elements to their delivery strategies:'
  id: totrans-291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**应用组件策略**：使用*表9.3*中的框架，团队将原型元素映射到其交付策略：'
- en: '**AI model core (Retain)**: The existing model approach was kept, but tested
    even more rigorously with additional, compliance-heavy documents.'
  id: totrans-292
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI模型核心（保留）**：保留了现有的模型方法，但用额外的、合规性强的文件进行了更加严格的测试。'
- en: '**Workflow integration (Enhance)**: Instead of a separate interface, the chatbot
    was embedded directly into the CRM so salespeople could use it in their daily
    workflow.'
  id: totrans-293
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作流程集成（增强）**：不是使用单独的界面，聊天机器人被直接嵌入到CRM中，销售人员可以在他们的日常工作中使用它。'
- en: '**Technical data pipelines (Rebuild)**: Manual PDF uploads were replaced with
    automated connectors pulling RFPs directly from shared drives.'
  id: totrans-294
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术数据管道（重建）**：用自动连接器从共享驱动器直接提取RFP，取代了手动PDF上传。'
- en: '**Governance and compliance (Establish)**: Logging was added to track document
    access, and compliance officers reviewed policies for handling sensitive data.'
  id: totrans-295
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理和合规性（建立）**：增加了日志记录以跟踪文档访问，合规性官员审查了处理敏感数据的政策。'
- en: '**Monitoring and maintenance (Establish)**: Dashboards were set up to track
    accuracy, latency, and usage, with alerts for failures or anomalies.'
  id: totrans-296
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控和维护（建立）**：建立了仪表板以跟踪准确性、延迟和利用率，并设置了故障或异常的警报。'
- en: '**Leveraging the five enablers**: Scaling required more than technology. The
    organization pulled the five levers to support the transition:'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**利用五个推动因素**：扩展需要不仅仅是技术。组织拉动了五个杠杆来支持过渡：'
- en: '**People**: A new cross-functional team was assembled, led by a dedicated product
    owner and supported by IT and sales specialists.'
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人员**：组建了一个新的跨职能团队，由专门的产品负责人领导，并得到IT和销售专家的支持。'
- en: '**Processes**: Agile sprints continued, but with more formal testing, documentation,
    and release gates.'
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流程**：敏捷冲刺继续进行，但增加了更正式的测试、文档和发布门。'
- en: '**Data**: Pipelines were automated, and governance teams defined retention
    and privacy policies.'
  id: totrans-300
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据**：管道自动化，治理团队定义了保留和隐私政策。'
- en: '**Technology**: The prototype moved from a trial setup to a cloud-hosted solution.
    The team picked a customizable vendor solution that was compatible with their
    CRM out of the box (hybrid approach).'
  id: totrans-301
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术**：原型从试验设置转移到云托管解决方案。团队选择了一个与他们的CRM兼容的定制供应商解决方案（混合方法）。'
- en: '**AIOps**: Within IT, continuous monitoring was implemented to detect data
    drift, track adoption, and trigger retraining. The product owner was in charge
    of controlling these KPIs.'
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AIOps**：在IT领域，实施了持续监控以检测数据漂移、跟踪采用情况并触发重新训练。产品负责人负责控制这些关键绩效指标。'
- en: '**The outcome**: By following this structured approach, the RFP Chatbot Analyzer
    scaled into a production-ready system that:'
  id: totrans-303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结果**：通过遵循这种结构化方法，RFP聊天机器人分析器扩展成了一个生产就绪的系统，它：'
- en: Saved thousands of hours annually across the sales organization and allowed
    faster RFP responses.
  id: totrans-304
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在销售组织内每年节省数千小时，并允许更快地响应RFP。
- en: Maintained stable accuracy even as new document formats were introduced.
  id: totrans-305
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使引入了新的文档格式，也保持了稳定的准确性。
- en: Operated securely within the company’s compliance framework.
  id: totrans-306
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在公司的合规框架内安全运行。
- en: Achieved widespread adoption thanks to seamless CRM integration.
  id: totrans-307
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于无缝的 CRM 集成而实现了广泛采用。
- en: Laid a critical foundation for other AI use cases to be developed.
  id: totrans-308
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为其他 AI 用例的发展奠定了关键基础。
- en: As a result, the organization ended up with a solution that extended the value
    proven in the prototype, fit naturally into existing workflows, and gained traction
    with a broader set of users.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，组织最终得到了一个解决方案，它扩展了原型中证明的价值，自然地融入了现有的工作流程，并且获得了更广泛用户群体的支持。
- en: Of course, scaling an AI solution is rarely as straightforward as this example
    makes it seem. Every organization encounters its own friction points, trade-offs,
    and surprises along the way.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，扩展 AI 解决方案的过程很少像这个例子所展示的那样简单。每个组织在过程中都会遇到自己的摩擦点、权衡和意外。
- en: From a process perspective, embedding agile delivery practices into a sales-driven
    environment might create friction, especially if business stakeholders expect
    rigid timelines or immediate results. Data pipelines may also turn out to be fragile
    - especially for new RFPs that might come in unexpectedly.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 从流程角度来看，将敏捷交付实践嵌入以销售为导向的环境中可能会产生摩擦，特别是如果业务利益相关者期望严格的截止日期或立即的结果。数据管道也可能变得脆弱——特别是对于可能意外到来的新
    RFP。
- en: On the technology side, integrating the chatbot deeply into systems such as
    a CRM or SharePoint could raise implementation issues or cost debates as this
    might affect other teams as well. Measuring adoption, accuracy, and cost trends
    can turn out to be complicated too - a spike in usage could quickly inflate inference
    costs beyond initial projections. And on the people side, adoption could slow
    once the chatbot reaches less tech-savvy or skeptical sales teams, requiring stronger
    training and change management.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术方面，将聊天机器人深度集成到 CRM 或 SharePoint 等系统中可能会引发实施问题或成本争议，因为这可能会影响其他团队。衡量采用率、准确性和成本趋势也可能变得复杂——使用量的激增可能会迅速将推理成本推高到最初的预测之上。在人员方面，一旦聊天机器人达到不太懂技术或持怀疑态度的销售团队，采用率可能会放缓，需要更强的培训和变革管理。
- en: 'To unpack these challenges further, we’ll now zoom in on three particularly
    sensitive areas of scaling: the people who fund, use, and approve what you’re
    building; the costs of running AI solutions at scale; and your ability to monitor
    what’s happening as your AI footprint grows across the organization.'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步探讨这些挑战，我们现在将聚焦于扩展过程中的三个特别敏感的领域：资助、使用和批准你所构建内容的人员；大规模运行 AI 解决方案的成本；以及随着你的
    AI 足迹在组织内增长，你监控所发生情况的能力。
- en: 'Aligning people and purpose: The organizational side of scaling AI'
  id: totrans-314
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 对齐人员和目标：AI 扩展的组织方面
- en: So far, we’ve talked a lot about technical enablers that allow you to scale
    AI systems across your organization. But all of this will amount to little if
    your people aren’t on board.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们谈论了很多关于技术使能器，这些使能器允许你在整个组织中扩展 AI 系统。但如果你的员工不支持，这一切都将微不足道。
- en: 'Implementing AI requires buy-in from the very employees whose work AI is meant
    to enhance. This organizational readiness needs to be in close sync with the technical
    readiness, as shown in the following diagram:'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 实施 AI 需要得到那些 AI 意图增强的员工的认可。这种组织准备需要与技术准备紧密同步，如下面的图所示：
- en: '![Figure 9.4: Synchronizing technical and organizational readiness](img/B31200_09_04.png)'
  id: totrans-317
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.4：同步技术和组织准备就绪](img/B31200_09_04.png)'
- en: 'Figure 9.4: Synchronizing technical and organizational readiness'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.4：同步技术和组织准备就绪
- en: '*Figure 9.4* illustrates the crucial balance between technical and organizational
    readiness when scaling AI solutions. Successful AI implementation requires both
    robust technical systems and engaged, prepared employees. Technical advancements
    (such as developing AI models or infrastructure) alone are insufficient. Simultaneously,
    the organization needs to adapt and change, ensuring employees understand and
    embrace the new AI tools. This involves addressing employee concerns, providing
    training, and integrating AI into existing workflows.'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 9.4* 展示了在扩展 AI 解决方案时技术和组织准备之间的关键平衡。成功的 AI 实施不仅需要强大的技术系统，还需要积极参与、准备充分的员工。仅仅发展技术（如开发
    AI 模型或基础设施）是不够的。同时，组织需要适应和改变，确保员工理解和接受新的 AI 工具。这包括解决员工担忧、提供培训和将 AI 集成到现有工作流程中。'
- en: 'In simple words: no matter how advanced your solution is, it simply won’t deliver
    results if the people expected to use it don’t believe in it. Integrating AI into
    day-to-day operations is not a purely technical exercise - it’s a cultural shift.
    A transformation. One that touches how people work, how they make decisions, and
    how they see their role in the organization.'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之：无论你的解决方案多么先进，如果预期使用它的人不相信它，那么它就无法产生结果。将人工智能融入日常运营不仅仅是一项纯粹的技术练习——它是一种文化转变。一种转型。它触及人们的工作方式、他们的决策方式以及他们在组织中的角色。
- en: Employees rarely resist AI because they fail to understand its benefits. They
    resist it because they’re not convinced those benefits apply to them. Why should
    they support a system that might disrupt their job or rewrite familiar processes?
    Why should they even embrace a future where an AI system might perform part of
    their work better than they themselves?
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 员工很少因为不理解其好处而抵制人工智能。他们抵制它是因为他们不相信这些好处适用于他们。为什么他们要支持可能颠覆他们的工作或重写熟悉流程的系统？为什么他们甚至要接受一个人工智能系统可能比他们自己更好地完成部分工作的未来？
- en: '**AI anxiety** is real - and so is the instinct to resist change when the *why*
    is unclear or unconvincing.'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能焦虑**是真实的——当“为什么”不清楚或没有说服力时，抵制变化的本能也是真实的。'
- en: That’s why organizational readiness must evolve hand in hand with technical
    readiness. The preceding diagram shows how these two forces must grow together
    over time. One without the other creates friction, resistance, and, ultimately,
    failure.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么组织准备就绪必须与技术准备就绪同步发展。前面的图表显示了这两个力量如何随着时间的推移共同增长。一个没有另一个就会产生摩擦、阻力，最终导致失败。
- en: 'The further you move along your AI journey, from understanding core concepts
    to rolling out real use cases, the more your organization must evolve in parallel.
    You’re not just implementing software but instead guiding people through a mindset
    shift: helping them understand how AI fits into their work, what it changes, and
    why it matters.'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你沿着人工智能之旅不断前进，从理解核心概念到推出实际用例，你的组织必须与之并行进化。你不仅仅是实施软件，而是在引导人们进行思维方式的转变：帮助他们理解人工智能如何融入他们的工作，它改变了什么，以及为什么它很重要。
- en: 'Unfortunately, this is where many initiatives stumble. The most common pitfalls
    are surprisingly consistent: vague strategic narratives, overhyped promises, lack
    of training, missing change support, and no mechanisms for feedback. They focus
    on delivering the model, not on supporting the people around it.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，许多倡议在这里遇到了困难。最常见的陷阱出奇地一致：模糊的战略叙述、过度炒作的承诺、缺乏培训、缺乏变革支持，以及缺乏反馈机制。他们专注于交付模型，而不是支持模型周围的人。
- en: A people-first AI transformation flips this logic. It doesn’t start with the
    algorithm. It starts with the employee.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 以人为本的人工智能转型颠覆了这种逻辑。它不是从算法开始的。它从员工开始。
- en: The focus shifts from “*What can this model do?*” to “**How will this help someone
    do their job better?**” and “**How do we explain this solution to our workforce?**”
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是“这个模型能做什么？”转向“**这将如何帮助某人更好地完成工作？**”以及“**我们如何向我们的员工解释这个解决方案？**”
- en: It means aligning the pace of technical progress with the pace of change your
    organization can actually absorb.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着将技术进步的速度与组织实际能够吸收的变化速度相一致。
- en: 'This doesn’t mean putting everything on pause until the whole organization
    is *ready*. But it does mean recognizing that AI success is built on two foundations:
    the maturity of your systems and the *readiness* of your people. And just like
    your technology stack, organizational readiness can (and should) be developed
    incrementally, step by step.'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着暂停一切，直到整个组织都“准备好”。但这确实意味着认识到人工智能的成功建立在两个基础之上：你系统的成熟度以及你人员的**准备就绪**。就像你的技术堆栈一样，组织准备就绪可以（并且应该）逐步发展，一步一个脚印。
- en: That journey starts with a compelling change story that explains not just what
    is changing, but why. It continues with dedicated teams guiding the transformation,
    a structured learning journey that equips employees to engage with AI meaningfully,
    and constant feedback loops to make sure the organization is evolving with the
    solution.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 这段旅程始于一个引人入胜的改变故事，它不仅解释了正在发生什么变化，还解释了为什么。它继续以专门的团队引导转型，一个结构化的学习之旅，使员工能够有意义地与人工智能互动，以及持续的反馈循环，以确保组织随着解决方案的进化而进化。
- en: 'Put simply: no company has been transformed by AI just because they had the
    fastest models or the cleanest data. Transformation happens when people feel empowered,
    not displaced, by the tools they’re asked to use. That’s what turns capability
    into impact. And that’s why scaling AI is, in the end, just as much about psychology
    and trust as it is about infrastructure and algorithms.'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说：没有一家公司仅仅因为拥有最快的模型或最干净的数据而被AI改变。改变发生在人们感到被赋予力量，而不是被工具所取代时。这就是将能力转化为影响的原因。这就是为什么最终扩展AI与心理学和信任一样，与基础设施和算法一样重要。
- en: Next up, we will talk about how to manage costs when you scale your AI solutions.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将讨论在您扩展AI解决方案时如何管理成本。
- en: Managing cost at scale
  id: totrans-333
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 规模化成本管理
- en: 'Adding all the elements we have discussed so far will obviously increase the
    cost of your AI solution. So once your AI solution scales in production and starts
    to rack up costs, one question will come up again and again, from finance, from
    leadership, from your own team: **Is this still worth it?**'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 添加到目前为止我们讨论的所有元素显然会增加您AI解决方案的成本。因此，一旦您的AI解决方案在生产中扩展并开始累积成本，一个问题会反复出现，来自财务、来自领导层、来自您自己的团队：**这还值得吗**？
- en: The answer depends on whether you’re prepared for how *AI projects behave differently
    from traditional IT projects*, especially when it comes to cost.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 答案取决于您是否准备好如何应对*AI项目与传统IT项目在行为上的不同，尤其是在成本方面*。
- en: 'Take a look at the following simplified illustration:'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 看一下以下简化的插图：
- en: '![Figure 9.5: IT project cost versus AI project cost](img/B31200_09_05.png)'
  id: totrans-337
  prefs: []
  type: TYPE_IMG
  zh: '![图9.5：IT项目成本与AI项目成本对比](img/B31200_09_05.png)'
- en: 'Figure 9.5: IT project cost versus AI project cost'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.5：IT项目成本与AI项目成本对比
- en: What you see here is a common pattern.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 您在这里看到的是一个常见的模式。
- en: In classical IT projects, most costs are typically front-loaded. You invest
    heavily during implementation - building systems, integrating software, and training
    users - and then costs typically flatten out over time. Whether you have 100 users
    or 10,000, the cost per user stays largely stable (aside from software licensing,
    which might be usage-based).
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的IT项目中，大多数成本通常是前置的。在实施过程中，您会大量投资——构建系统、集成软件和培训用户——然后成本通常会随着时间的推移而趋于平稳。无论您有100个用户还是10,000个用户，每个用户的成本都保持相对稳定（除了软件许可可能基于使用量之外）。
- en: AI projects follow a very different rhythm.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: AI项目遵循一个非常不同的节奏。
- en: While early development costs may be lower - especially if you start with off-the-shelf
    components - AI introduces oscillating and scaling costs that emerge as the solution
    grows. Model retraining, fine-tuning, and general model maintenance introduce
    a cyclical cost block that will reappear over time, causing maintenance costs
    for your AI solution (more or less predictable) to go up and down periodically.
    This makes budgeting the solution hard since you always need to keep some reserves
    in case things go wrong unexpectedly, for example, due to underlying data changes.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管早期开发成本可能较低——特别是如果您从现成的组件开始——但AI引入了随着解决方案增长而出现的振荡和扩展成本。模型再训练、微调和一般模型维护引入了一个周期性的成本块，随着时间的推移会再次出现，导致您的AI解决方案的维护成本（或多或少可预测）会周期性地上升和下降。这使得预算解决方案变得困难，因为您总是需要保留一些储备金以应对意外情况，例如，由于底层数据变化。
- en: On top of that, AI costs typically scale more noticeably with usage. A model
    that handles 50 queries a day might be inexpensive to run. But when you scale
    that same model to handle 50,000 daily requests across multiple business units,
    inference costs, compute load, and latency-handling infrastructure can drive up
    costs rapidly. What looked efficient in the pilot can become surprisingly expensive
    at scale - especially when response time and model accuracy need to be preserved
    under load. This is because AI models often rely on specialized infrastructure
    such as GPUs or high-performance CPUs, which are much more expensive than your
    average IT stack.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，AI成本通常随着使用量的增加而更明显地扩展。一个每天处理50个查询的模型可能运行成本低廉。但当您将相同的模型扩展到处理多个业务单元的50,000个每日请求时，推理成本、计算负载和延迟处理基础设施可能会迅速增加成本。在试点阶段看起来效率很高的解决方案在扩展后可能会变得出乎意料地昂贵——尤其是在需要保持响应时间和模型准确性的负载下。这是因为AI模型通常依赖于专门的硬件，如GPU或高性能CPU，这些硬件比您平均的IT堆栈要昂贵得多。
- en: So, how do you tackle that?
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，您如何应对这个问题？
- en: 'Don’t try to model every edge-case cost from the beginning. Instead, I recommend
    a more practical and scalable approach: the value threshold and cost cap model
    that we introduced earlier in [*Chapter 7*](Chapter_07.xhtml#_idTextAnchor220).'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 不要试图从一开始就模拟每个边缘成本案例。相反，我建议一个更实用和可扩展的方法：我们之前在[*第7章*](Chapter_07.xhtml#_idTextAnchor220)中介绍的价值阈值和成本上限模型。
- en: 'Here is a quick recap of these approaches:'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是这些方法的快速回顾：
- en: A **value threshold** is the minimum business value an AI use case needs to
    generate - typically defined as time savings, increased conversion, cost avoidance,
    or another business-relevant metric
  id: totrans-347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值阈值**是指AI用例需要产生的最低商业价值——通常定义为时间节省、增加转化率、成本避免或其他与业务相关的指标'
- en: A **cost cap** defines the maximum annual budget allocated to developing, deploying,
    and maintaining that solution - including infrastructure, licensing, and internal
    resources
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本上限**定义了分配给开发、部署和维护该解决方案的最大年度预算——包括基础设施、许可和内部资源'
- en: 'If your AI use case stays below the cost cap and above the value threshold,
    it’s considered a net positive - justified, and delivering business value. If
    either side of that equation changes, your governance process should force a reevaluation:
    either raise the threshold or optimize the system to bring costs back under control.'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的AI用例的成本低于成本上限且高于价值阈值，则被视为净正面——合理且具有商业价值。如果等式两边的任何一方发生变化，您的治理流程应强制重新评估：要么提高阈值，要么优化系统以将成本控制在可控范围内。
- en: Let’s look at a simple example.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个简单的例子。
- en: 'Suppose your AI system is used by customer support agents to automatically
    summarize complaint emails:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您的AI系统被客户支持代理用于自动总结投诉电子邮件：
- en: 'The **value threshold** might be defined as: saving at least 3 hours per agent
    per week.'
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值阈值**可能被定义为：每个代理每周至少节省3小时。'
- en: With 50 agents using it, that’s 150 hours per week × 52 weeks = 7,800 hours
    per year.
  id: totrans-353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果有50个代理在使用，那么每周就是150小时 × 52周 = 每年7,800小时。
- en: At an average internal rate of $50/hour, that’s $390,000 in annual value.
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以平均每小时50美元的内部成本率计算，那将是每年39万美元的价值。
- en: 'If the total cost (infrastructure, vendor fees, and maintenance) is capped
    at $100,000 per year, the solution is well within bounds. But if compute costs
    spike due to an increased volume, that would likely push the annual cost above
    $300K. You now need to reassess: Can you raise the value threshold by showing
    that more departments are benefiting?'
  id: totrans-355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果总成本（基础设施、供应商费用和维护）每年限制在100,000美元，则解决方案在合理范围内。但如果计算成本因工作量增加而激增，这可能会使年度成本超过300K美元。现在您需要重新评估：您能否通过显示更多部门受益来提高价值阈值？
- en: Or do you need to reduce cost (e.g., by using cheaper models, more caching,
    or asynchronous processing)?
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者您需要降低成本（例如，通过使用更便宜的模型、更多缓存或异步处理）？
- en: AI economics requires active management. Your AI solution isn’t a *deploy once
    and walk away* system. It’s a living product that needs regular cost-performance
    evaluations. Without them, you risk creeping infrastructure costs, unmonitored
    vendor bills, or inefficient workflows eroding your ROI over time.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能经济学需要积极的管理。您的AI解决方案不是一个“部署一次，走人”的系统。它是一个活的产品，需要定期的成本-性能评估。没有它们，您可能会面临基础设施成本逐渐增加、供应商账单未监控或低效的工作流程随着时间的推移侵蚀您的投资回报率。
- en: That’s why this simple cost/value framing is so powerful. You don’t need perfect
    accounting models. You just need clarity about what success looks like, how much
    you’re willing to invest to achieve it, and when the balance tips too far.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么这种简单的成本/价值框架如此强大。您不需要完美的会计模型。您只需要清楚了解成功是什么样的，您愿意投入多少来实现它，以及何时平衡点偏移得太远。
- en: 'In other words: don’t obsess over the exact value. Make sure your AI solution
    consistently exceeds a real, tangible threshold (which you have defined in [*Chapter
    4*](Chapter_04.xhtml#_idTextAnchor095)). When costs begin to rise, as they almost
    inevitably will, treat that as a checkpoint for smart, strategic recalibration.'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说：不要过分关注确切的价值。确保您的AI解决方案持续超过一个真实、可触达的阈值（您在[*第4章*](Chapter_04.xhtml#_idTextAnchor095)中定义的）。当成本开始上升，几乎不可避免地会上升时，将其视为智能、战略重新校准的检查点。
- en: In the next section, we will talk about practical approaches for defining and
    measuring business impact, employing clear and actionable metrics to maintain
    alignment with organizational objectives.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将讨论定义和衡量商业影响的具体方法，采用清晰和可操作性的指标以保持与组织目标的协调一致。
- en: Monitoring and metrics
  id: totrans-361
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 监控和指标
- en: 'We’ve touched on monitoring at several points already - as a dedicated component
    in your AI solution, as a critical part of AIOps, and even during prototype evaluation
    when you measured model accuracy. Each mention reflects the same reality: monitoring
    isn’t a single step or tool, but a thread that runs through the entire AI lifecycle.'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在几个地方提到了监控——作为AI解决方案的一个专用组件，作为AIOps的一个关键部分，甚至在原型评估期间，您测量模型准确度时也是如此。每一次提及都反映了同样的现实：监控不是一个单独的步骤或工具，而是一根贯穿整个AI生命周期的线。
- en: What changes at scale is the scope. Monitoring moves from being an occasional
    check or a technical safeguard to becoming a structured discipline in its own
    right - one that ties together system health, user behavior, cost signals, and
    business outcomes.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 随着规模的扩大，变化是什么。监控从偶尔的检查或技术保障转变为成为一门独立的学科——它将系统健康、用户行为、成本信号和业务成果联系起来。
- en: This includes not just traditional metrics such as latency or accuracy but also
    **guardrails against unsafe outputs**, tracking for potential **Personally Identifiable
    Information (PII) leakage**, and detection of jailbreak attempts in generative
    models. These privacy and security dimensions are as critical as performance or
    reliability because they directly influence trust, compliance, and user safety.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅包括传统的指标，如延迟或准确率，还包括**防止不安全输出的防护措施**、跟踪潜在的**个人身份信息（PII）泄露**以及在生成模型中检测越狱尝试。这些隐私和安全维度与性能或可靠性一样重要，因为它们直接影响信任、合规性和用户安全。
- en: So far, we’ve mostly looked at data as the fuel that powers our AI - data we
    ingest, clean, and feed into models. But once our AI solution is live and in use,
    it starts producing its own data, such as usage data, performance metrics, and
    operational logs. This new layer is just as important as the data we used to train
    the system in the first place. In other words, AI systems don’t just consume data;
    they generate it. Scaling AI successfully means knowing how to use that data to
    track what’s working, what isn’t, and where your next optimization should happen.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们主要关注数据作为推动我们AI的动力——我们摄取、清洗并输入模型的数据。但一旦我们的AI解决方案上线并投入使用，它就开始产生自己的数据，例如使用数据、性能指标和操作日志。这一新层与最初用于训练系统的数据一样重要。换句话说，AI系统不仅消耗数据，还生成数据。成功扩展AI意味着知道如何使用这些数据来跟踪什么有效，什么无效，以及下一次优化应该发生在哪里。
- en: 'In that sense, monitoring isn’t just something you do to catch failures, but
    a sophisticated form of analysis that - if done well - lets you answer questions
    such as:'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个意义上说，监控不仅仅是用来捕捉失败的事情，而是一种复杂的形式分析，如果做得好，可以让你回答诸如以下问题：
- en: Are users actually engaging with the AI solution?
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户是否真正与AI解决方案互动？
- en: Are we able to keep performance high at all times?
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们能否始终保持高性能？
- en: Are we seeing less helpful outputs over time?
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是否看到随着时间的推移，输出变得越来越不有帮助？
- en: As you can see, there aren’t just engineering concerns - they’re business concerns.
    If a model silently loses relevance or accuracy, users will stop trusting it.
    If compute cost per inference is rising without a corresponding increase in value,
    you may be on the path to negative ROI.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，这不仅仅是工程问题，也是业务问题。如果一个模型默默失去相关性或准确性，用户将停止信任它。如果每推理一次的计算成本在价值没有相应增加的情况下上升，您可能正在走向负回报率。
- en: 'A minimum monitoring setup for AI in production is shown in *Table 9.5*:'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: AI在生产中的最小监控设置在*表9.5*中展示：
- en: '| **Monitoring Criteria** | **Description** |'
  id: totrans-372
  prefs: []
  type: TYPE_TB
  zh: '| **监控标准** | **描述** |'
- en: '| **Usage metrics** | Number of predictions made, queries processed, active
    users, peak usage hours, and API response times. |'
  id: totrans-373
  prefs: []
  type: TYPE_TB
  zh: '| **使用指标** | 预测次数、查询处理次数、活跃用户数、峰值使用时间和API响应时间。|'
- en: '| **Performance metrics** | Model-level statistics, such as, accuracy, precision,
    recall, or business-specific equivalents (e.g., number of complaints resolved,
    proposals accelerated, conversions influenced). |'
  id: totrans-374
  prefs: []
  type: TYPE_TB
  zh: '| **性能指标** | 模型级别的统计数据，例如，准确率、精确率、召回率或业务特定的等效指标（例如，解决的投诉数量、加速的提案、受影响的转化）。|'
- en: '| **Cost metrics** | Inference cost per user, per API call, or per department.
    Compute spikes. Scaling patterns. |'
  id: totrans-375
  prefs: []
  type: TYPE_TB
  zh: '| **成本指标** | 每用户、每API调用或每部门的推理成本。计算峰值。扩展模式。|'
- en: '| **Feedback data** | User corrections, thumbs-up/thumbs-down scores, and flagging
    behavior. Anything that gives insight into real-world model quality. |'
  id: totrans-376
  prefs: []
  type: TYPE_TB
  zh: '| **反馈数据** | 用户更正、点赞/踩评分和标记行为。任何能提供对现实世界模型质量洞察的信息。|'
- en: '| **System health** | Pipeline reliability, latency, error rates, retraining
    intervals, and success/failure rates of data ingestion. |'
  id: totrans-377
  prefs: []
  type: TYPE_TB
  zh: '| **系统健康** | 管道可靠性、延迟、错误率、再培训间隔以及数据摄入的成功/失败率。 |'
- en: 'Table 9.5: Minimal set of metrics to monitor in production'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.5：生产中需要监控的最小指标集
- en: Of course, it’s not enough to just collect this data - you need to put it to
    work. That’s why dashboards shouldn’t be built just for data scientists, but for
    business users and product managers alike. Align your metrics to the **value threshold/cost
    cap** framework. If performance dips below a defined KPI, that should trigger
    investigation or retraining. And likewise, if usage spikes without a value increase,
    it deserves your attention.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，仅仅收集这些数据是不够的——你需要将其投入使用。这就是为什么仪表板不应该只为数据科学家构建，而应该为商业用户和产品经理共同使用。将你的指标与**价值阈值/成本上限**框架对齐。如果性能低于定义的关键绩效指标（KPI），则应触发调查或再培训。同样，如果没有价值增加而使用量激增，这也值得你的关注。
- en: 'And don’t forget: AI can help here, too. For example:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 并且不要忘记：AI在这里也能有所帮助。例如：
- en: Use AI anomaly detection to flag sudden drops in model accuracy
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用AI异常检测来标记模型准确性的突然下降
- en: Predict when the cost per user is likely to exceed the budget cap
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测用户成本可能超过预算上限的时间
- en: Suggest strategies for enhancing user engagement based on user feedback
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据用户反馈提出增强用户参与度的策略
- en: 'To keep track of the growing complexity, here’s a straightforward way to organize
    your monitoring criteria by breaking it down into three connected layers:'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 为了跟踪不断增长的复杂性，以下是一个简单的方法来组织你的监控标准，通过将其分解为三个相互关联的层级：
- en: '| **Layer** | **Focus** | **Example Metrics and Signals** |'
  id: totrans-385
  prefs: []
  type: TYPE_TB
  zh: '| **层级** | **焦点** | **示例指标和信号** |'
- en: '| Technical | Infrastructure and system health |'
  id: totrans-386
  prefs: []
  type: TYPE_TB
  zh: '| 技术 | 基础设施和系统健康 |'
- en: Pipeline uptime and failure rates
  id: totrans-387
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管道正常运行时间和故障率
- en: Inference latency
  id: totrans-388
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理延迟
- en: Data ingestion success/failure
  id: totrans-389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据摄入成功/失败
- en: Infrastructure usage (CPU/GPU/memory)
  id: totrans-390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础设施使用（CPU/GPU/内存）
- en: '|'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Operational | Solution performance and user interaction |'
  id: totrans-392
  prefs: []
  type: TYPE_TB
  zh: '| 运营 | 解决方案性能和用户交互 |'
- en: Number of predictions per day
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天的预测数量
- en: Active users/departments
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 活跃用户/部门
- en: Model accuracy, precision, recall
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型准确性、精确度、召回率
- en: Cost per prediction or per user
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每次预测或每用户的成本
- en: Retraining frequency
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 再培训频率
- en: Feedback loop activity (e.g., flagged results, thumbs up/down)
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反馈循环活动（例如，标记的结果，点赞/踩）
- en: '|'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| Strategic | Business impact and alignment |'
  id: totrans-400
  prefs: []
  type: TYPE_TB
  zh: '| 战略 | 业务影响和对齐 |'
- en: Value threshold achieved (e.g., time saved, conversions influenced)
  id: totrans-401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现的价值阈值（例如，节省的时间，影响的转化）
- en: Cost cap status (e.g., projected spend versus budget)
  id: totrans-402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成本上限状态（例如，预计支出与预算）
- en: Usage trends over time
  id: totrans-403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时间推移的使用趋势
- en: ROI signals per department or process area
  id: totrans-404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个部门或流程区域的回报率信号
- en: '|'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: 'Table 9.6: Framework for organizing monitoring metrics'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.6：组织监控指标框架
- en: This layered approach ensures you’re not only keeping the system online (technical),
    but also ensuring it remains useful (operational) and valuable (strategic). As
    you scale your AI solutions, this kind of structured, multi-layered monitoring
    becomes essential - not just to prove that your systems are working, but to continuously
    optimize, adapt, and steer them toward what matters most.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 这种分层方法确保你不仅保持系统在线（技术），而且还确保它保持有用（运营）和有价值（战略）。随着你扩展AI解决方案，这种结构化、多层次的监控变得至关重要——不仅是为了证明你的系统正在工作，而且是为了持续优化、适应并将它们引导到最重要的方面。
- en: We will now shift our focus to applying our learnings in practice. The next
    section focuses on how you can take incremental steps to scale AI.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将重点转向将我们的学习应用于实践。下一节将重点介绍你可以如何采取渐进步骤来扩展AI。
- en: Practical steps for scaling AI solutions
  id: totrans-409
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 扩展AI解决方案的实用步骤
- en: Scaling AI can be quite overwhelming. Yes, it’s complex. Yes, it’s cross-functional.
    So, how do you move forward without overextending your resources or losing focus?
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展AI可能会相当令人不知所措。是的，它是复杂的。是的，它是跨职能的。那么，你如何在不过度消耗资源或失去焦点的情况下前进？
- en: 'One proven approach is to work in **complete, contained increments** - very
    similar to delivering atomic AI use cases during the prototyping phase. Think
    of each increment as a mini-project with a clear boundary: it can be delivered
    from end to end, shows tangible value, and generates lessons for the next round.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 一种经过验证的方法是在**完整、封闭的增量**中工作——这与在原型阶段交付原子AI用例非常相似。将每个增量视为一个具有明确边界的迷你项目：它可以从头到尾交付，显示出可衡量的价值，并为下一轮提供经验教训。
- en: 'A strong increment typically includes:'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 一个强大的增量通常包括：
- en: '**A specific use case or feature**: Narrow enough to complete, but meaningful
    enough to matter'
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一个具体的用例或功能**：足够窄以完成，但足够有意义以产生影响。'
- en: '**A defined value threshold and cost cap**: Keeps the business case visible
    at all times'
  id: totrans-414
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义的价值阈值和成本上限**：始终保持业务案例可见。'
- en: '**A monitoring plan**: Tracks both technical performance and business impact'
  id: totrans-415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一个监控计划**：跟踪技术性能和商业影响。'
- en: '**A clear change narrative**: Explains the *why* to affected users'
  id: totrans-416
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**清晰的变革叙事**：向受影响的用户解释*为什么*。'
- en: '**A learning plan**: Equips people with the knowledge and support to adopt
    the solution'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一个学习计划**：为人们提供采用解决方案的知识和支持。'
- en: These increments can then be developed sequentially or in parallel (*Figure
    9.6*) depending on the resource constraints and priorities of your organization.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 这些增量可以根据您组织的资源限制和优先级顺序或并行开发（*图9.6*）。
- en: '![Figure 9.6: Development of complete contained increments over time (schematic)](img/B31200_09_06.png)'
  id: totrans-419
  prefs: []
  type: TYPE_IMG
  zh: '![图9.6：随时间推移的完整封装增量开发（示意图）](img/B31200_09_06.png)'
- en: 'Figure 9.6: Development of complete contained increments over time (schematic)'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.6：随时间推移的完整封装增量开发（示意图）
- en: This approach works because each increment is small enough to manage risk, but
    complete enough to build trust and momentum.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法之所以有效，是因为每个增量都足够小，可以管理风险，但又足够完整，可以建立信任和动力。
- en: Let’s revisit our RFP Chatbot Analyzer example and how you can build complete,
    contained increments.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下RFP聊天机器人分析器的例子，以及您如何构建完整、封装的增量。
- en: 'Example: Scaling the RFP Chatbot Analyzer in increments'
  id: totrans-423
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：分阶段扩展RFP聊天机器人分析器
- en: 'Here’s how the RFP Chatbot Analyzer could grow step by step:'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何逐步增长RFP聊天机器人分析器：
- en: '**Increment 1**: Extend to one more sales team:'
  id: totrans-425
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**增量1**：扩展到另一个销售团队：'
- en: '**Use case**: Deploy the chatbot beyond the original pilot team.'
  id: totrans-426
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：将聊天机器人部署到原始试点团队之外。'
- en: '**Value threshold**: Save at least one hour per week per salesperson.'
  id: totrans-427
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值阈值**：每个销售人员每周至少节省一小时。'
- en: '**Monitoring**: Track accuracy on new RFP formats, usage per rep, and time
    saved.'
  id: totrans-428
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：跟踪新RFP格式的准确性、每个代表的用法和节省的时间。'
- en: '**Narrative**: *We’re rolling out to another team to see whether the benefits
    hold at a larger scale*.'
  id: totrans-429
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**叙事**：*我们将扩展到另一个团队，看看这些好处是否在更大规模上仍然有效*。'
- en: '**Learning**: Collect adoption feedback and refine onboarding materials.'
  id: totrans-430
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习**：收集采用反馈并完善入职材料。'
- en: '**Increment 2**: Embed in the CRM:'
  id: totrans-431
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**增量2**：嵌入CRM：'
- en: '**Use case**: Move from a standalone interface into the CRM.'
  id: totrans-432
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：从独立界面迁移到CRM。'
- en: '**Value threshold**: Increase adoption rate by 20% through better workflow
    integration.'
  id: totrans-433
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值阈值**：通过更好的工作流程集成，将采用率提高20%。'
- en: '**Monitoring**: Compare usage between standalone and CRM-integrated versions.'
  id: totrans-434
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：比较独立版本和CRM集成版本的使用情况。'
- en: '**Narrative**: *Now you don’t need a separate login - the chatbot meets you
    where you already work*.'
  id: totrans-435
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**叙事**：*现在您不需要单独的登录——聊天机器人会在您已经工作的地方迎接您*。'
- en: '**Learning**: Document integration challenges and create reusable patterns
    for future AI apps.'
  id: totrans-436
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习**：记录集成挑战并创建可重用的模式，用于未来的AI应用。'
- en: '**Increment 3:** Add compliance document handling:'
  id: totrans-437
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**增量3**：添加合规性文档处理：'
- en: '**Use case**: Train or fine-tune the chatbot on compliance-heavy RFPs.'
  id: totrans-438
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：在合规性重的RFP上训练或微调聊天机器人。'
- en: '**Value threshold**: Reduce manual compliance review time by 30%.'
  id: totrans-439
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值阈值**：将手动合规性审查时间减少30%。'
- en: '**Monitoring**: Track accuracy specifically on compliance-related sections.'
  id: totrans-440
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：特别跟踪与合规性相关的部分的准确性。'
- en: '**Narrative**: *We’re extending the chatbot’s reach into one of the toughest
    areas: compliance*.'
  id: totrans-441
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**叙事**：*我们将扩展聊天机器人的范围，进入最困难的领域之一：合规性*。'
- en: '**Learning**: Strengthen processes for handling sensitive data and working
    with compliance officers.'
  id: totrans-442
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习**：加强处理敏感数据和与合规官员合作的过程。'
- en: 'Each increment is complete on its own: it defines success upfront, includes
    adoption planning, and delivers lessons that inform the next cycle.'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 每个增量都是独立的：它提前定义了成功，包括采用计划，并提供了下一周期的教训。
- en: Each increment builds confidence, sharpens alignment, and gives you a tangible
    outcome to learn from - whether it’s a new department using a chatbot, an upgraded
    model powering a workflow, or an improved retraining pipeline that reduces downtime.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 每个增量都增强了信心，提高了对齐度，并为你提供了一个可以从中学习的具体成果——无论是使用聊天机器人的新部门，还是推动工作流程的升级模型，或者是减少停机时间的改进再培训流程。
- en: Increments as agile epics
  id: totrans-445
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增量作为敏捷史诗
- en: 'If you’re familiar with agile methods, you can think of these increments as
    epics: larger units of work that can be broken down into smaller stories or tasks
    but still deliver meaningful value on their own. Each epic has a clear objective,
    success criteria, and learning outcomes - just like the increments described here.
    Check out this website if you’d like to learn more about agile development and
    epics in particular: [https://resources.scrumalliance.org/Article/epic-agile](https://resources.scrumalliance.org/Article/epic-agile).'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您熟悉敏捷方法，可以将这些增量视为史诗级任务：可以分解为更小的故事或任务但仍然能够独立提供有意义价值的工作单元。每个史诗级任务都有一个明确的目标、成功标准和学习成果——就像这里描述的增量一样。如果您想了解更多关于敏捷开发和特别是史诗级任务的信息，请访问这个网站：[https://resources.scrumalliance.org/Article/epic-agile](https://resources.scrumalliance.org/Article/epic-agile)。
- en: 'This also ties back to the **processes lever**. While prototyping often relied
    on loosely structured sprints, scaling requires more disciplined planning and
    coordination. If you already know how to handle agile projects from other initiatives,
    you’re at an advantage. By treating each scaling increment as an **epic**, you
    give teams a shared container that balances agility with structure: flexible enough
    to adapt, but formal enough to align stakeholders and track progress.'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 这也与**流程杠杆**有关。虽然原型设计通常依赖于松散结构化的冲刺，但扩展需要更严格的规划和协调。如果您已经知道如何处理其他项目的敏捷项目，那么您就处于优势地位。通过将每个扩展增量视为**史诗级任务**，您为团队提供了一个共享的容器，它平衡了敏捷性和结构：足够灵活以适应，但足够正式以协调利益相关者并跟踪进度。
- en: 'In practice, this means:'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这意味着：
- en: '**Define increments as epics****:** Each epic focuses on scaling one outcome
    (e.g., CRM integration for the chatbot).'
  id: totrans-449
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将增量定义为史诗级任务**：每个史诗级任务专注于扩展一个结果（例如，聊天机器人的CRM集成）。'
- en: '**Break into stories and tasks****:** Technical teams handle integration work,
    governance teams define policies, and training teams prepare onboarding - all
    within the same epic.'
  id: totrans-450
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分解为故事和任务**：技术团队处理集成工作，治理团队定义政策，培训团队准备入职——所有这些都在同一个史诗级任务中进行。'
- en: '**Close the loop****:** At the end of each epic, revisit your alignment points
    (value threshold, cost cap, adoption, learning) before starting the next.'
  id: totrans-451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**关闭循环**：在开始下一个史诗级任务之前，回顾您的对齐点（价值阈值、成本上限、采用、学习）。'
- en: Step by step, this incremental approach allows you to scale AI sustainably and
    responsibly. Each cycle delivers real value while also strengthening your organization’s
    readiness - technically and culturally - for what comes next.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 逐步进行，这种增量方法允许您可持续和负责任地扩展AI。每个周期都带来实际的价值，同时也在技术和文化上增强了您组织为未来做好准备的能力。
- en: 'To give you a real-world example: one B2B company I worked with had a support
    team that prototyped a simple customer support chatbot. In discovery, they built
    three chatbots across different products and proved the concept: the bots could
    answer around 80% of customer questions, reduce ticket volume, and free up project
    managers (who had been handling support on the side) to focus on their actual
    jobs.'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个真实的例子来说明：我合作的一家B2B公司有一个支持团队，他们为简单的客户支持聊天机器人进行了原型设计。在探索阶段，他们在不同的产品上构建了三个聊天机器人，证明了这一概念：这些机器人可以回答大约80%的客户问题，减少工单数量，并让项目经理（他们一直在处理支持工作）能够专注于他们的实际工作。
- en: 'Instead of rushing to roll out chatbots everywhere, they treated scaling as
    a sequence of **self-contained increments**:'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 他们没有急于在各个地方推出聊天机器人，而是将扩展视为一系列**自包含的增量**：
- en: '**Increment 1: Establish a platform**'
  id: totrans-455
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**增量1：建立平台**'
- en: 'With more than 30 products to cover, the team realized they needed a shared
    hub to manage chatbot knowledge centrally while allowing per-product adaptations.
    They chose a chatbot platform vendor rather than building one from scratch, and
    defined their first increment as setting up the platform with basic monitoring,
    feedback loops, and governance features such as team-based access. This gave every
    future chatbot the same foundation: visibility into performance, a way for users
    to flag issues, and a process for continuous improvement.'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 由于需要覆盖30多个产品，团队意识到他们需要一个共享的中心来集中管理聊天机器人知识，同时允许每个产品进行适应性调整。他们选择了一个聊天机器人平台供应商，而不是从头开始构建，并将他们的第一个增量定义为设置具有基本监控、反馈循环和基于团队的访问等治理功能的平台。这为每个未来的聊天机器人提供了相同的基础：对性能的可见性、用户标记问题的方法以及持续改进的流程。
- en: '**Increment 2 and beyond**: **Add bots one at a time**'
  id: totrans-457
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**增量2及以后**: **逐个添加机器人**'
- en: Once the platform was in place, they added one chatbot per product line (website).
    Each bot was its own increment - small enough to monitor adoption and impact,
    but complete enough to deliver value to a specific customer segment. Only after
    validating usage and accuracy did they move on to the next.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦平台建立，他们为每条产品线（网站）添加了一个聊天机器人。每个机器人都是其自身的增量 - 足够小以监控采用率和影响，但足够完整以向特定客户群体提供价值。只有在验证了使用率和准确性之后，他们才会继续进行下一步。
- en: 'The result was a layered scaling approach: platform first, then incremental
    bot updates. This kept risks low, allowed fast learning cycles, and ensured each
    expansion built on proven foundations. After 8 months, the company had 20 different
    chatbots live, handling more than 10,000 messages per month and saving thousands
    of support hours in first-level customer service.'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是分层扩展方法：首先平台，然后逐步更新聊天机器人。这保持了低风险，允许快速的学习周期，并确保每次扩展都建立在经过验证的基础上。8个月后，公司有20个不同的聊天机器人上线，每月处理超过10,000条消息，并在一级客户服务中节省了数千小时的支援时间。
- en: Summary
  id: totrans-460
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored what it really takes to move from prototype to
    production, beyond just technology.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了从原型到生产的真正需要，而不仅仅是技术。
- en: We looked at several aspects. The first was the shift from discovery to delivery,
    and what needs to be rebuilt versus reused. We also talked about the five key
    enablers of scaling AI (people, processes, data, technology, and AIOps). An important
    aspect of scaling AI that practitioners must really focus on is how to engage
    the people who approve, use, and operate your AI solutions. We looked into how
    value thresholds and cost caps can help you manage AI-specific costs. The chapter
    also stressed the importance of generating, tracking, and acting on monitoring
    data to drive continuous improvement. Scaling AI is never just about performance
    benchmarks or technical uptime. It’s about creating a system - of technology,
    people, and processes - that learns, adapts, and delivers value as it grows. Because
    at scale, AI isn’t just something you deliver; it’s something you live with.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 我们考虑了几个方面。首先是发现到交付的转变，以及需要重建与重用的内容。我们还讨论了扩展人工智能的五个关键推动因素（人员、流程、数据、技术和AIOps）。人工智能扩展的一个重要方面，实践者必须真正关注的是如何吸引那些批准、使用和操作您的人工智能解决方案的人员。我们探讨了价值阈值和成本上限如何帮助您管理特定的人工智能成本。本章还强调了生成、跟踪和采取监控数据以推动持续改进的重要性。扩展人工智能永远不仅仅是关于性能基准或技术正常运行时间。它关于创建一个系统
    - 包括技术、人员和流程 - 随着其增长而学习、适应和创造价值。因为在大规模下，人工智能不仅仅是您交付的东西；它是您与之共存的东西。
- en: In the next chapter, we’ll look at how you can successfully scale AI to deliver
    meaningful business impact.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何成功地将人工智能扩展到产生有意义的商业影响。
