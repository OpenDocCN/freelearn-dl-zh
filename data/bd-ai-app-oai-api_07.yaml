    c="3043">.</st>
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="2785">为了完成本章，我们假设您已在您的设备上安装了Microsoft Office和Outlook。</st> <st c="2891">您可以在以下链接中学习如何安装Microsoft
