  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="16286">现在，您可以执行您当前版本的 Outlook 邮件回复生成器。</st> <st c="16367">一旦代码开始运行，将出现一个标题为</st>
    **<st c="16409">Outlook 邮件</st>** <st c="16423">的窗口。</st> <st c="16437">此窗口包含一个下拉菜单，列出了来自</st>
