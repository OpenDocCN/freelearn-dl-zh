  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17020">你现在可以从下拉菜单中选择一个电子邮件主题。</st> <st c="17082">选择后，所选电子邮件主题的文本将被存储在</st>
