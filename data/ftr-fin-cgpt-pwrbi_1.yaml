  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: 'Financial Mastery with ChatGPT: From Basics to AI Insights'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT掌握金融：从基础到AI洞察
- en: Everyone is looking for a competitive edge in finance, which demands a deep
    understanding of financial concepts and the ability to harness cutting-edge tools.
    This book’s journey begins by establishing a strong foundation in investing, trading,
    and financial analysis while introducing the groundbreaking potential of **artificial
    intelligence** (**AI**), particularly ChatGPT, to revolutionize the way we approach
    financial decision-making.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都在寻找在金融领域的竞争优势，这需要深入理解财务概念并能够利用尖端工具。本书的旅程从建立投资、交易和财务分析的基础开始，同时介绍**人工智能**（**AI**），特别是ChatGPT，如何颠覆我们处理金融决策的方式的突破性潜力。
- en: The traditional methods of financial analysis have long been the cornerstone
    of investment and trading strategies. However, with the advent of AI and **large
    language models** (**LLMs**) such as ChatGPT, we now have the opportunity to harness
    the power of technology to enhance these traditional techniques, providing deeper
    insights and greater precision in our assessments.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的财务分析方法长期以来一直是投资和交易策略的基石。然而，随着AI和**大型语言模型**（**LLMs**）如ChatGPT的出现，我们现在有机会利用技术的力量来增强这些传统技术，提供更深入的见解和更高的评估精度。
- en: In this first chapter, we will lay the groundwork for our exploration of finance
    by covering key financial concepts, investment principles, and types of financial
    assets. We will also dive into the basics of financial statements, ratios, and
    metrics, and explore the complementary roles of fundamental and technical analysis.
    This will set the stage for our exciting journey into the world of ChatGPT and
    its potential to transform the financial landscape. Readers will be introduced
    to the foundations of financial analysis and the role of AI, specifically ChatGPT,
    in modern financial analysis techniques. The chapter will begin by discussing
    the basics of financial analysis, including its purpose, importance, and the key
    financial statements used for analysis. You will gain an understanding of how
    to read and interpret balance sheets, income statements, and cash flow statements.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一章中，我们将通过介绍关键财务概念、投资原则和金融资产类型来为我们的金融探索奠定基础。我们还将深入研究财务报表、比率和指标的基础知识，并探讨基本面分析和技术分析之间的互补作用。这将为我们进入ChatGPT的世界及其在改变金融格局方面的潜力奠定基础。读者将了解财务分析的基础以及AI在现代财务分析技术中的作用。本章将从讨论财务分析的基本概念开始，包括其目的、重要性以及用于分析的常用财务报表。您将了解如何阅读和解读资产负债表、利润表和现金流量表。
- en: As the chapter progresses, the focus will shift to the potential of AI and ChatGPT
    in financial analysis, exploring their capabilities and benefits. You will learn
    how AI-driven tools such as ChatGPT can streamline and enhance financial analysis
    by automating tasks, providing valuable insights, and reducing human error. The
    chapter will also cover how to integrate ChatGPT into your financial analysis
    workflow and effectively use it to analyze financial data and reports.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 随着本章的深入，重点将转向AI和ChatGPT在财务分析中的潜力，探讨其功能和优势。您将了解由AI驱动的工具如ChatGPT如何通过自动化任务、提供有价值的见解和减少人为错误来简化并增强财务分析。本章还将涵盖如何将ChatGPT集成到您的财务分析工作流程中，并有效地使用它来分析财务数据和报告。
- en: As we embark on this journey together, you will discover how ChatGPT can quickly
    analyze and summarize financial information, highlight key trends and insights,
    and provide valuable context to help you make more informed decisions. This chapter
    will not only equip you with the essential knowledge to navigate the world of
    finance but also open the door to the limitless possibilities that AI and ChatGPT
    offer, in revolutionizing financial analysis and decision-making.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们共同踏上这段旅程时，您将发现ChatGPT如何快速分析和总结财务信息，突出关键趋势和洞察，并提供有价值的背景信息，帮助您做出更明智的决策。本章不仅将为您提供在金融世界中导航的必要知识，还将开启AI和ChatGPT在革命性财务分析和决策中所提供的无限可能性。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: An introduction to key financial concepts and investment principles
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键财务概念和投资原则的介绍
- en: Introducing financial statements
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍财务报表
- en: Understanding financial ratios and metrics
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解财务比率与指标
- en: The fundamentals of technical analysis
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术分析的基本原理
- en: Understanding the power of ChatGPT in financial analysis
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解ChatGPT在金融分析中的力量
- en: Getting started with ChatGPT for finance
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始使用ChatGPT进行金融分析
- en: ChatGPT for financial analysis – analyzing earnings reports for Palo Alto Networks
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT用于金融分析——分析Palo Alto Networks的收益报告
- en: Combining ChatGPT with fundamental analysis
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将ChatGPT与基本面分析相结合
- en: 'After completing this chapter, you will be able to do the following:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 完成本章后，您将能够做到以下事项：
- en: Grasp the basics of financial analysis, including its purpose, importance, and
    key financial statements, equipping you with the essential knowledge to effectively
    evaluate companies for investment and trading opportunities
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掌握金融分析的基本知识，包括其目的、重要性以及关键财务报表，为您评估投资和交易机会提供必要知识
- en: Understand how to read and interpret balance sheets, income statements, and
    cash flow statements, providing a solid foundation to analyze a company’s financial
    health and make well-informed investment decisions
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解如何阅读和解读资产负债表、利润表和现金流量表，为分析公司的财务状况和做出明智的投资决策提供坚实基础
- en: Discover the transformative potential of AI and ChatGPT in financial analysis,
    enabling you to streamline processes, enhance accuracy, and uncover valuable insights
    not easily accessible through traditional analysis methods
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发现人工智能和ChatGPT在金融分析中的变革潜力，使您能够简化流程、提高准确性，并揭示通过传统分析方法难以获得的宝贵见解
- en: Learn how to integrate ChatGPT into your financial analysis workflow, empowering
    you to harness AI-driven insights for improved decision-making and a competitive
    edge in the world of investing and trading
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何将ChatGPT集成到您的金融分析工作流程中，让您能够利用AI驱动的洞察力来改善决策并保持投资和交易领域的竞争优势
- en: Delve into the capabilities and benefits of ChatGPT, exploring how AI-driven
    tools can automate tasks, reduce human error, and provide a deeper understanding
    of financial data, ultimately leading to better investment choices and increased
    profits
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深入了解ChatGPT的功能和优势，探索AI驱动的工具如何自动化任务、减少人为错误，并更深入地理解财务数据，最终导致更好的投资选择和利润增长
- en: Learn how ChatGPT can reveal hidden trends and insights in financial data, helping
    investors and traders make informed decisions and maximize profits while staying
    ahead of the competition
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何利用ChatGPT揭示金融数据中的隐藏趋势和洞察力，帮助投资者和交易者做出明智的决策，并在竞争中保持领先，同时最大化利润
- en: Get excited about combining advanced financial analysis techniques with AI-driven
    tools such as ChatGPT for a competitive advantage in investing and trading, optimizing
    investment strategies, and anticipating market movements
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对将高级金融分析技术与AI驱动的工具如ChatGPT相结合以获得投资和交易竞争优势感到兴奋，优化投资策略，并预测市场走势
- en: By the end of this chapter, you will have a solid foundation in financial analysis
    and an understanding of how AI and ChatGPT can transform traditional analysis
    methods. Armed with this knowledge, you will be well prepared to delve deeper
    into more advanced financial analysis techniques and further explore the integration
    of AI and ChatGPT in subsequent chapters.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将具备扎实的金融分析基础，并了解人工智能和ChatGPT如何改变传统分析方法。凭借这些知识，您将准备好深入探索更高级的金融分析技术，并在后续章节中进一步探索人工智能和ChatGPT的集成。
- en: Technical requirements
  id: totrans-25
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'Here are the hardware requirements for this chapter:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是本章的硬件要求：
- en: A computer with at least 4 GB of RAM (8 GB or more is recommended)
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 至少配备4 GB RAM的计算机（建议8 GB或更多）
- en: A stable internet connection to access financial data, news sources, and APIs
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 稳定的互联网连接，用于访问金融数据、新闻来源和API
- en: A processor with a minimum of two cores (four cores or more is recommended for
    efficient computations)
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 至少配备两个核心的处理器（建议四个核心或更多，以实现高效的计算）
- en: 'Here are the software requirements for this chapter:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是本章的软件要求：
- en: Python (version 3.11.3 or newer) installed on your computer
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的计算机上安装Python（版本3.11.3或更高版本）
- en: Python libraries such as Requests, Beautiful Soup, and pandas for data analysis,
    manipulation, and visualization
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于数据分析、操作和可视化的Python库，如Requests、Beautiful Soup和pandas
- en: 'Here are the APIs and data sources for this chapter:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是本章的API和数据源：
- en: An OpenAI API key to access GPT-based models for natural language processing
    and AI-driven insights
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取OpenAI API密钥，以访问基于GPT的自然语言处理模型和AI驱动的洞察力
- en: Financial data APIs, such as Quandl, Alpha Vantage, Intrinio, and Yahoo Finance,
    to fetch historical stock prices, financial statements, and other relevant data
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用金融数据API，如Quandl、Alpha Vantage、Intrinio和Yahoo Finance，以获取历史股价、财务报表和其他相关数据
- en: These technical requirements should provide a solid foundation to perform the
    tasks outlined in this chapter, including financial analysis and working with
    Python and the OpenAI API.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技术要求将为执行本章概述的任务提供坚实的基础，包括财务分析和使用Python以及OpenAI API。
- en: An introduction to key financial concepts and investment principles
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍关键金融概念和投资原则
- en: Welcome to the beginning of your journey into the future of finance, where the
    power of AI and ChatGPT is at your fingertips. Let’s get started!
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎您踏上探索金融未来的旅程的开始，在这里，AI和ChatGPT的力量尽在您的指尖。让我们开始吧！
- en: 'The learning objectives for this section are as follows:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 本节的学习目标如下：
- en: Mastering the essential building blocks of finance, such as risk and return,
    asset allocation, diversification, and the time value of money to confidently
    evaluate investments and make informed decisions
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掌握金融的基本构建块，如风险与回报、资产配置、分散化和货币的时间价值，以自信地评估投资并做出明智的决策
- en: Discovering the various investment types, including stocks, bonds, cash, real
    estate, and commodities, to diversify your portfolio and optimize returns
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发现各种投资类型，包括股票、债券、现金、房地产和商品，以分散您的投资组合并优化回报
- en: Exploring a range of investment strategies, from passive and active investing
    to value and growth investing, to align with your financial goals, risk tolerance,
    and investment horizon
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索各种投资策略，从被动和主动投资到价值投资和增长投资，以符合你的财务目标、风险承受能力和投资期限
- en: Leveraging your newfound understanding of key financial concepts and principles
    to build a strong foundation for a successful investment journey and financial
    future
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用你对关键金融概念和原则的新理解，为成功投资之旅和财务未来打下坚实基础
- en: 'In the world of finance, several key concepts and principles form the foundation
    for understanding how to evaluate investments and make informed decisions. In
    this section, we will introduce you to these essential building blocks, which
    include concepts such as risk and return, asset allocation, diversification, and
    the time value of money:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融世界中，几个关键的概念和原则构成了理解如何评估投资和做出明智决策的基础。在本节中，我们将向您介绍这些基本构建块，包括风险与回报、资产配置、分散化和货币的时间价值等概念：
- en: '**Risk and return**: Risk refers to the potential for an investment to lose
    value, while return represents the potential gain an investor can realize from
    an investment. Typically, investments with greater risk potential have the opportunity
    for increased returns, and those with lower risk profiles usually yield comparatively
    modest returns. Understanding the risk-return trade-off is crucial for investors
    when making decisions about their investment portfolios.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险与回报**：风险指的是投资可能贬值的风险，而回报则代表投资者可以从投资中实现的潜在收益。通常，风险潜力更大的投资有更高的回报机会，而风险特征较低的投资通常产生相对适度的回报。理解风险与回报的权衡对于投资者在做出投资组合决策时至关重要。'
- en: '**Asset allocation**: This refers to the method of distributing investments
    among different asset categories (such as equities, fixed income, and cash) to
    balance risk and reward in line with an investor’s objectives, risk appetite,
    and investment time horizon. A well-structured asset allocation strategy can help
    investors achieve their financial objectives while managing their exposure to
    risk.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资产配置**：这指的是将投资分配到不同的资产类别（如股票、固定收益和现金）的方法，以平衡风险和回报，符合投资者的目标、风险偏好和投资时间期限。一个结构良好的资产配置策略可以帮助投资者实现其财务目标，同时管理其风险敞口。'
- en: '**Diversification and the time value** **of money**:'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分散化和货币的时间价值**：'
- en: '**Diversification**: This investment principle involves spreading investments
    across multiple assets, industries, or geographical regions to reduce risk. Through
    diversification, investors can lessen the effects of underperforming assets on
    their total portfolio, as potential losses from a single investment may be counterbalanced
    by gains from other investments. Diversification is a vital strategy for long-term
    investment success.'
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多元化**：这一投资原则涉及将投资分散到多个资产、行业或地理区域，以降低风险。通过多元化，投资者可以减轻表现不佳的资产对其整个投资组合的影响，因为单一投资的潜在损失可能被其他投资的收益所抵消。多元化是长期投资成功的关键策略。'
- en: '**The time value of money**: The time value of money represents a core principle
    in finance, recognizing that a dollar obtained today holds greater value than
    the same dollar received in the future. This is due to factors such as inflation,
    opportunity cost, and the potential for investments to grow over time. Understanding
    the time value of money is essential to make informed investment decisions, as
    it helps investors evaluate the present and future value of investments and compare
    different investment opportunities.'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**货币的时间价值**：货币的时间价值是金融的核心原则之一，它认识到今天获得的美元比未来收到的相同美元具有更高的价值。这是由于通货膨胀、机会成本以及投资随时间增长的可能性等因素造成的。理解货币的时间价值对于做出明智的投资决策至关重要，因为它帮助投资者评估投资的现在和未来价值，并比较不同的投资机会。'
- en: As we move forward in our exploration of finance, we will dive deeper into the
    various investment types and strategies, each offering unique opportunities and
    challenges for investors. In the upcoming section, we will examine the distinct
    characteristics of common financial assets, such as stocks, bonds, cash and cash
    equivalents, real estate, and commodities. Furthermore, we will discuss the diverse
    investment strategies that cater to investors with different financial goals,
    risk tolerance, and investment horizons, including passive investing, active investing,
    value investing, and growth investing. By gaining a deeper understanding of these
    investment types and strategies, you will be better equipped to make informed
    financial decisions and optimize your investment portfolio.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们继续探索金融，我们将更深入地研究各种投资类型和策略，每种都为投资者提供独特的机遇和挑战。在接下来的部分，我们将探讨常见金融资产（如股票、债券、现金及现金等价物、房地产和商品）的独特特征。此外，我们将讨论针对具有不同财务目标、风险承受能力和投资期限的投资者的多样化投资策略，包括被动投资、主动投资、价值投资和增长投资。通过更深入地了解这些投资类型和策略，您将更好地准备做出明智的财务决策并优化您的投资组合。
- en: Basic investment types and investment strategies
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本投资类型和投资策略
- en: 'Financial assets come in various forms, each with its own risk and return characteristics.
    Some common investment types include the following:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 金融资产有多种形式，每种都有其自身的风险和回报特征。以下是一些常见的投资类型：
- en: '**Stocks**: Ownership shares in a company that provide the potential for capital
    gains and dividend income.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**股票**：公司所有权股份，提供资本增值和股息收入的潜力。'
- en: '**Bonds**: These are debt instruments issued by governments or companies that
    provide periodic interest payments and repay the principal upon reaching the maturity
    date.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**债券**：这些是由政府或公司发行的债务工具，提供定期利息支付并在到期日偿还本金。'
- en: '**Cash and cash equivalents**: These represent safe, liquid, short-term assets,
    which are cash or similar to cash. These could include savings accounts, certificates
    of deposit, and money market funds.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现金和现金等价物**：这些代表安全、流动的短期资产，是现金或类似现金的资产。这可能包括储蓄账户、定期存款和货币市场基金。'
- en: '**Real estate**: Investments in physical property, either directly or through
    vehicles such as **Real Estate Investment** **Trusts** (**REITs**).'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**房地产**：通过直接投资或通过如**房地产投资信托**（REITs）等工具进行实物财产的投资。'
- en: '**Commodities**: Investments in raw materials or primary agricultural products,
    such as gold, oil, or wheat.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商品**：对原材料或初级农产品（如黄金、石油或小麦）的投资。'
- en: 'Investors can choose from various strategies depending on their financial goals,
    risk tolerance, and investment horizon. Some common strategies include the following:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 投资者可以根据他们的财务目标、风险承受能力和投资期限选择各种策略。以下是一些常见的策略：
- en: '**Passive investing**: An approach that seeks to replicate the performance
    of a market index or benchmark through low-cost index funds or **Exchange-Traded**
    **Funds** (**ETFs**)'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**被动投资**：一种通过低成本指数基金或**交易所交易基金**（**ETFs**）来复制市场指数或基准表现的策略。'
- en: '**Active investing**: A strategy that involves actively selecting and managing
    individual investments, aiming to outperform the market or a specific benchmark'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动投资**：一种涉及积极选择和管理个别投资的策略，旨在超越市场或特定基准。'
- en: '**Value investing**: Focuses on identifying undervalued assets that have the
    potential for long-term growth'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价值投资**：专注于识别具有长期增长潜力的被低估资产。'
- en: '**Growth investing**: Concentrates on investments with high growth potential,
    even if they are currently overvalued'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增长投资**：专注于具有高增长潜力的投资，即使它们目前被高估。'
- en: Understanding these key financial concepts, investment principles, and investment
    types will help you build a solid foundation to make well-informed financial decisions.
    In the next section, we will discuss different types of financial assets and their
    characteristics.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些关键金融概念、投资原则和投资类型将帮助您建立一个坚实的基础，以便做出明智的金融决策。在下一节中，我们将讨论不同类型的金融资产及其特征。
- en: Introducing financial statements
  id: totrans-64
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍财务报表
- en: 'The learning objectives for this section are as follows:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 本节的学习目标如下：
- en: '**Mastering the essentials of financial statements**: Acquire a strong grasp
    of the three main financial statements – balance sheet, income statement, and
    cash flow statement – and their vital function in assessing a company’s financial
    well-being and performance'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**掌握财务报表的基本要素**：掌握三个主要财务报表——资产负债表、利润表和现金流量表——及其在评估公司财务状况和业绩中的关键作用。'
- en: '**Unleashing the potential of balance sheets**: Discover how to examine a company’s
    assets, liabilities, and shareholders’ equity to evaluate its financial standing
    at a particular moment in time'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**释放资产负债表潜力**：了解如何检查公司的资产、负债和股东权益，以评估其在特定时间点的财务状况。'
- en: '**Diving deep into income statements**: Discover how to evaluate a company’s
    revenues, expenses, and net income to understand its profitability over a specific
    period'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深入分析利润表**：了解如何评估公司在特定时期内的收入、支出和净收入，以了解其盈利能力。'
- en: '**Unraveling the mysteries of cash flow statements**: Develop the skills to
    analyze cash inflows and outflows from operating, investing, and financing activities
    to gain insights into a company’s liquidity and financial flexibility'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**揭开现金流量表的神秘面纱**：培养分析经营活动、投资活动和融资活动中的现金流入和流出的技能，以深入了解公司的流动性和财务灵活性。'
- en: 'Financial statements are essential tools to evaluate the financial health and
    performance of a company. These documents provide a snapshot of a company’s financial
    position, profitability, and cash flow. There are three primary financial statements:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 财务报表是评估公司财务健康和业绩的必要工具。这些文件提供了公司财务状况、盈利能力和现金流的快照。有三个主要的财务报表：
- en: '**Balance sheet**: This financial document offers a detailed view of a company’s
    assets, liabilities, and shareholders’ equity at a particular point in time, illustrating
    its financial standing. Assets are items of value owned by the company, such as
    cash, inventory, and property. Liabilities represent the company’s obligations,
    such as loans and accounts payable. Shareholders’ equity reflects the residual
    interest in the company’s assets after liabilities have been deducted.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资产负债表**：这份财务文件提供了公司在特定时间点的资产、负债和股东权益的详细视图，展示了其财务状况。资产是公司拥有的有价值的项目，如现金、库存和财产。负债代表公司的义务，如贷款和应付账款。股东权益反映了在扣除负债后，公司资产中的剩余权益。'
- en: '**Income statement**: Often referred to as the **Profit and Loss** (**P&L**)
    statement, this financial document displays a company’s revenue, costs, and net
    income during a specified time frame. Revenue is the income generated through
    the company’s core business operations, while expenses represent the costs associated
    with generating that income. The net income is calculated as the difference between
    the revenue and expenses.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利润表**：通常被称为**损益表**（**P&L**），这份财务文件显示了公司在特定时间框架内的收入、成本和净收入。收入是通过公司的核心业务运营产生的收入，而支出代表产生该收入的相关成本。净收入是收入和支出的差额。'
- en: '**Cash flow statement**: This financial document monitors the movement of cash
    into and out of a company over a defined period. It is divided into three sections
    – operating activities (cash generated or used by the company’s core business),
    investing activities (cash spent or received from investments), and financing
    activities (cash transactions related to debt and equity).'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现金流量表**：这份财务文件监控公司在一定时期内现金流入和流出的情况。它分为三个部分——经营活动（公司核心业务产生的或使用的现金）、投资活动（投资产生的或收到的现金）和融资活动（与债务和股权相关的现金交易）。'
- en: As we move on to the next section, we will delve into understanding financial
    ratios and metrics, crucial tools to analyze and interpret a company’s financial
    statements. By examining liquidity, profitability, solvency, and efficiency ratios,
    we can gain insights into a company’s financial performance and stability. Furthermore,
    we will explore the importance of comparing these ratios against industry benchmarks,
    historical performance, and competitors, allowing us to make well-informed investment
    decisions. Stay tuned as we explore the world of financial analysis and unveil
    the secrets behind successful investing.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进入下一部分，我们将深入理解金融比率和指标，这些是分析和解释公司财务报表的关键工具。通过检查流动性、盈利能力、偿债能力和效率比率，我们可以深入了解公司的财务表现和稳定性。此外，我们将探讨将这些比率与行业基准、历史表现和竞争对手进行比较的重要性，从而让我们做出明智的投资决策。敬请关注，我们将探索财务分析的世界，揭示成功投资的秘密。
- en: Understanding financial ratios and metrics
  id: totrans-75
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解金融比率和指标
- en: 'Financial ratios and metrics are used to analyze and interpret financial statements,
    providing insights into a company’s performance, liquidity, solvency, and efficiency.
    Some key financial ratios and metrics include the following:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 金融比率和指标用于分析和解释财务报表，为公司业绩、流动性、偿债能力和效率提供洞察。一些关键的金融比率和指标包括以下内容：
- en: '**Liquidity ratios**: These calculations evaluate a company’s capacity to fulfill
    its short-term financial commitments. Widely used liquidity ratios consist of
    the current ratio (current assets/current liabilities) and the quick ratio (current
    assets – inventory/current liabilities).'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流动性比率**：这些计算评估公司履行短期财务承诺的能力。广泛使用的流动性比率包括流动比率（流动资产/流动负债）和速动比率（流动资产 - 存货/流动负债）。'
- en: '**Profitability ratios**: These metrics evaluate a business’s capacity to earn
    profits. Some examples are the gross profit margin (gross profit/revenue), operating
    margin (operating income/revenue), and net profit margin (net income/revenue).'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**盈利能力比率**：这些指标评估企业赚取利润的能力。一些例子包括毛利率（毛利润/收入）、营业利润率（营业收入/收入）和净利润率（净利润/收入）。'
- en: '**Solvency ratios**: These metrics analyze a firm’s capacity to handle long-term
    commitments and maintain financial stability. Key solvency metrics include the
    debt-to-equity ratio (total debt/shareholder equity) and the equity ratio (shareholder
    equity/total assets).'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偿债能力比率**：这些指标分析企业处理长期承诺和维持财务稳定的能力。关键的偿债能力指标包括资产负债率（总债务/股东权益）和权益比率（股东权益/总资产）。'
- en: '**Efficiency ratios**: These metrics evaluate the effectiveness of a company’s
    asset utilization and operational management. Some examples are the turnover of
    the inventory ratio (cost of goods sold/average inventory) and the accounts receivable
    turnover ratio (net credit sales/average accounts receivable). In the upcoming
    section, we will interpret financial ratios and metrics, which play a critical
    role in evaluating a company’s financial health and making well-informed investment
    decisions. We will explore various techniques, such as trend analysis and industry
    benchmarking, to assess a company’s performance within its market and against
    its competitors. Furthermore, we will examine the limitations of ratio analysis
    and how they can be addressed.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率比率**：这些指标评估公司资产利用和运营管理的有效性。一些例子包括存货周转率（销售成本/平均存货）和应收账款周转率（净信用销售/平均应收账款）。在接下来的部分中，我们将解释财务比率和指标，它们在评估公司财务健康状况和做出明智投资决策中起着至关重要的作用。我们将探讨各种技术，如趋势分析和行业基准，以评估公司在市场中的表现及其竞争对手。此外，我们将检查比率分析的局限性以及如何解决这些问题。'
- en: Following that, we will introduce the principles of fundamental analysis, a
    method aimed at determining a company’s intrinsic value by evaluating its financial
    statements, management team, competitive landscape, and industry trends. Through
    financial statement analysis, earnings analysis, management analysis, and industry
    and competitive analysis, we will learn how to identify stocks that are overvalued
    or undervalued, ultimately guiding your investment decisions.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之后，我们将介绍基本分析的原则，这是一种通过评估公司的财务报表、管理团队、竞争格局和行业趋势来确定公司内在价值的方法。通过财务报表分析、收益分析、管理分析和行业与竞争分析，我们将学习如何识别被高估或低估的股票，最终指导您的投资决策。
- en: Interpreting financial ratios and metrics
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解读财务比率和指标
- en: When analyzing financial ratios and metrics, it’s essential to compare them
    against historical performance, industry benchmarks, and competitors. This context
    helps investors identify trends and assess a company’s relative performance. It’s
    also important to consider the limitations of financial ratios, as they are based
    on historical data and may not always accurately predict future performance.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在分析财务比率和指标时，将其与历史业绩、行业基准和竞争对手进行比较是至关重要的。这种背景有助于投资者识别趋势并评估公司的相对表现。同时，考虑财务比率的局限性也很重要，因为它们基于历史数据，可能并不总是能准确预测未来的表现。
- en: 'Here are some tips to interpret financial ratios and metrics:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些解读财务比率和指标的建议：
- en: '**Trend analysis**: Compare a company’s ratios over several periods to identify
    trends and changes in performance. This can help investors spot potential areas
    of strength or weakness.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**趋势分析**：比较公司在几个时期的比率，以识别趋势和业绩的变化。这有助于投资者发现潜在的强项或弱点。'
- en: '**Industry benchmarking**: Compare a company’s ratios to industry averages
    or specific competitors to evaluate its relative performance within the market.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行业基准**：将公司的比率与行业平均水平或特定竞争对手进行比较，以评估其在市场中的相对表现。'
- en: '**Ratio analysis limitations**: Keep in mind that financial ratios are based
    on historical data and may not always accurately predict future performance. Additionally,
    ratio analysis may be less informative for companies with unique business models
    or operating in niche industries.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**比率分析局限性**：请记住，财务比率基于历史数据，可能并不总是能准确预测未来的表现。此外，对于具有独特商业模式或运营在利基行业的公司，比率分析可能提供的信息较少。'
- en: '**Fundamental analysis** is a method of evaluating a company’s intrinsic value
    by examining its financial statements, management team, competitive landscape,
    and overall industry trends. The goal of fundamental analysis is to determine
    whether a stock is overvalued or undervalued, based on the company’s underlying
    financial health and future growth prospects. Key components of fundamental analysis
    include the following:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**基本分析**是一种通过审查公司的财务报表、管理团队、竞争格局和整体行业趋势来评估公司内在价值的方法。基本分析的目标是根据公司的基本财务状况和未来增长前景确定股票是被高估还是低估。基本分析的关键组成部分包括以下内容：'
- en: '**Financial statement analysis**: Reviewing a company’s balance sheet, income
    statement, and cash flow statement to assess its financial health, profitability,
    and solvency'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**财务报表分析**：审查公司的资产负债表、损益表和现金流量表，以评估其财务状况、盈利能力和偿债能力'
- en: '**Earnings analysis**: Evaluating a company’s earnings growth, **earnings per
    share** (**EPS**), and **price-to-earnings** (**P/E**) ratio to assess its profitability
    and valuation'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**收益分析**：评估公司的收益增长、每股收益（**EPS**）和市盈率（**P/E**）以评估其盈利能力和估值'
- en: '**Management analysis**: Assessing the quality and effectiveness of a company’s
    management team, including their experience, track record, and decision-making
    abilities'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理分析**：评估公司管理团队的质量和有效性，包括他们的经验、业绩记录和决策能力'
- en: '**Industry and competitive analysis**: Examining the overall industry trends
    and a company’s position within its market, including its competitive advantages
    and barriers to entry'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行业与竞争分析**：考察整个行业趋势以及公司在市场中的位置，包括其竞争优势和进入壁垒'
- en: Understanding and interpreting financial statements, ratios, and metrics are
    crucial for evaluating a company’s financial health and making informed investment
    decisions. We will look at this in detail in the following section, *The fundamentals
    of* *technical analysis*.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和解读财务报表、比率和指标对于评估公司的财务状况和做出明智的投资决策至关重要。我们将在下一节详细探讨这一点，即*技术分析*的基本原理。
- en: The fundamentals of technical analysis
  id: totrans-94
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术分析的基础
- en: 'Technical analysis is an investment analysis method that focuses on historical
    price and volume data to predict future price movements. Technical analysts, or
    chartists, believe that price patterns and trends can provide valuable insights
    into a stock’s future performance. Key components of technical analysis include
    the following:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 技术分析是一种投资分析方法，它专注于历史价格和成交量数据来预测未来的价格走势。技术分析师，或图表分析师，认为价格模式和趋势可以提供对股票未来表现的宝贵见解。技术分析的关键组成部分包括以下内容：
- en: '**Price charts**: Visual representations of historical price data, such as
    line charts, bar charts, and candlestick charts, which help identify trends and
    patterns.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**价格图表**：历史价格数据的视觉表示，如线形图、柱状图和蜡烛图，有助于识别趋势和模式。'
- en: '**Trend analysis**: Evaluating the direction and strength of price movements,
    including uptrends, downtrends, and sideways trends.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**趋势分析**：评估价格走势的方向和强度，包括上升趋势、下降趋势和横向趋势。'
- en: '**Technical indicators**: Mathematical calculations based on price and volume
    data that provide insights into market sentiment, momentum, and volatility. Examples
    include moving averages, the **relative strength index** (**RSI**), and **moving
    average convergence** **divergence** (**MACD**).'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术指标**：基于价格和成交量数据的数学计算，提供对市场情绪、动量和波动的见解。例如，移动平均线、**相对强弱指数**（**RSI**）和**移动平均线收敛**
    **发散**（**MACD**）。'
- en: '**Support and resistance levels**: Key price levels at which buying or selling
    pressure tends to prevent further price movement, acting as a floor (support)
    or ceiling (resistance) for the stock price.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支撑和阻力水平**：关键的价格水平，在这些水平上，买卖压力往往阻止进一步的价格变动，作为股价的底部（支撑）或顶部（阻力）。'
- en: As we move forward, the next section will explore the advantages of combining
    both fundamental and technical analysis in the investment process. By merging
    the strengths of each approach, investors can gain a more comprehensive understanding
    of a stock’s potential, allowing for more informed decisions and better optimization
    of investment strategies. We will discuss how fundamental analysis can be used
    to pinpoint promising investment opportunities, while technical analysis can be
    employed to identify the best entry and exit points for those investments. This
    harmonious blend of techniques paves the way for a more holistic approach to investing.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们继续前进，下一节将探讨在投资过程中结合基本面和技术分析的优势。通过合并每种方法的优势，投资者可以更全面地了解股票的潜力，从而做出更明智的决策，并更好地优化投资策略。我们将讨论如何使用基本面分析来定位有潜力的投资机会，同时技术分析可以用来确定这些投资的最佳入场和退出点。这种技术的和谐融合为投资的整体方法铺平了道路。
- en: Combining fundamental and technical analysis
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结合基本面和技术分析
- en: Both fundamental and technical analysis provide valuable insights into the investment
    process. While fundamental analysis helps determine the intrinsic value of a stock
    and its growth potential, technical analysis focuses on identifying trends and
    price patterns that may signal future price movements.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 基本面和技术分析都为投资过程提供了宝贵的见解。虽然基本面分析有助于确定股票的内在价值和其增长潜力，但技术分析则专注于识别可能预示未来价格走势的趋势和价格模式。
- en: Investors can benefit from combining these two approaches, using fundamental
    analysis to identify attractive investment opportunities and technical analysis
    to determine optimal entry and exit points. This integrated approach can help
    investors make more informed decisions and optimize their investment strategies.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 投资者可以通过结合这两种方法受益，使用基本面分析来识别有吸引力的投资机会，并使用技术分析来确定最佳入场和退出点。这种综合方法可以帮助投资者做出更明智的决策并优化他们的投资策略。
- en: In the next section, we will explore how the transformative power of ChatGPT
    and AI can enhance traditional financial analysis methods and provide a competitive
    edge in the world of finance.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨ChatGPT和AI的变革力量如何增强传统的金融分析方法，并在金融世界中提供竞争优势。
- en: Understanding the power of ChatGPT in financial analysis
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解ChatGPT在金融分析中的力量
- en: As the world of finance grows increasingly complex, the need for cutting-edge
    tools that can help investors make informed decisions has never been more apparent.
    Enter ChatGPT, a powerful AI language model that can revolutionize the way we
    approach financial analysis.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 随着金融世界的日益复杂，对能够帮助投资者做出明智决策的尖端工具的需求从未如此明显。ChatGPT的出现，这是一个强大的AI语言模型，可以改变我们处理金融分析的方式。
- en: ChatGPT has the ability to quickly and accurately process vast amounts of data,
    making it an invaluable resource for investors looking to gain insights into financial
    trends, risks, and opportunities. With its natural language processing capabilities,
    ChatGPT can analyze and summarize complex financial documents, identify key metrics
    and trends, and even generate forecasts and predictions.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 具有快速准确地处理大量数据的能力，这使得它成为投资者洞察金融趋势、风险和机会的宝贵资源。凭借其自然语言处理能力，ChatGPT 可以分析并总结复杂的金融文件，识别关键指标和趋势，甚至生成预测和预测。
- en: 'Imagine having a personal AI-powered financial analyst at your fingertips,
    ready to help you dissect financial statements, identify investment opportunities,
    and uncover hidden risks. With ChatGPT, this becomes a reality. By integrating
    ChatGPT into your financial analysis process, you can do the following:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你手边有一个个人化的、由人工智能驱动的金融分析师，随时准备帮助你剖析财务报表，识别投资机会，并揭示潜在的风险。通过 ChatGPT，这一切都成为现实。通过将
    ChatGPT 集成到你的金融分析流程中，你可以做到以下几方面：
- en: Save time and effort by automating repetitive tasks, such as data collection,
    processing, and analysis
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过自动化重复性任务，如数据收集、处理和分析，节省时间和精力
- en: Access deeper insights and uncover hidden patterns within financial data
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深入洞察并揭示金融数据中的隐藏模式
- en: Enhance your decision-making process with AI-generated recommendations and predictions
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过人工智能生成的建议和预测增强你的决策过程
- en: As we delve into the next section, we’ll discuss the various ways to effectively
    integrate ChatGPT into your financial analysis workflow. By combining the capabilities
    of AI with traditional financial analysis techniques, you can create a more robust
    and efficient decision-making process for your investments.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们深入下一节时，我们将讨论将 ChatGPT 有效集成到你的金融分析工作流程中的各种方法。通过结合人工智能的能力与传统金融分析技术，你可以为你的投资创建一个更稳健、更高效的决策过程。
- en: 'We will explore how ChatGPT can be utilized to do the following:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨如何利用 ChatGPT 做以下事情：
- en: Summarize financial statements efficiently
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高效总结财务报表
- en: Compare the performance of companies and industries
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较公司和行业的表现
- en: Analyze market sentiment by processing various sources of information
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过处理各种信息来源来分析市场情绪
- en: Generate investment ideas tailored to your specific criteria
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成符合你特定标准的投资想法
- en: Embracing the power of AI and ChatGPT offers a competitive advantage in the
    ever-evolving world of finance, enhancing your financial analysis skills and leading
    to more informed investment decisions. Stay tuned as we explore these exciting
    possibilities in the upcoming section.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 拥抱人工智能和 ChatGPT 的力量在日新月异的金融世界中提供了竞争优势，增强了你的金融分析技能，并导致更明智的投资决策。敬请期待我们将在下一节中探讨这些激动人心的可能性。
- en: Integrating ChatGPT into Your Financial Analysis Workflow
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 ChatGPT 集成到您的金融分析工作流程中
- en: Incorporating ChatGPT into your financial analysis workflow is easier than you
    might think. The key is to seamlessly blend the power of AI with traditional financial
    analysis methods, creating a comprehensive and efficient approach to investment
    decision-making.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ChatGPT 集成到你的金融分析工作流程中比你想象的要简单。关键在于无缝地将人工智能的力量与传统金融分析方法相结合，从而创建一个全面高效的投资决策方法。
- en: 'Here are some ways you can integrate ChatGPT into your financial analysis process:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些你可以将 ChatGPT 集成到你的金融分析流程中的方法：
- en: '**Summarizing financial statements**: Use ChatGPT to quickly analyze and summarize
    a company’s financial statements, highlighting key metrics and trends that can
    inform your investment decisions'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**总结财务报表**：使用 ChatGPT 快速分析和总结公司的财务报表，突出关键指标和趋势，这些可以为你提供投资决策的参考'
- en: '**Comparing companies and industries**: Leverage ChatGPT to compare the financial
    performance of multiple companies within the same industry, identifying potential
    outperformers or underperformers'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**比较公司和行业**：利用 ChatGPT 比较同一行业内多家公司的财务表现，识别潜在的超越者或表现不佳者'
- en: '**Analyzing market sentiment**: Utilize ChatGPT to gauge market sentiment by
    processing news articles, analyst reports, and social media data, providing you
    with valuable insights into investor sentiment and potential market movements'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析市场情绪**：利用 ChatGPT 通过处理新闻文章、分析师报告和社交媒体数据来衡量市场情绪，为你提供有关投资者情绪和潜在市场走势的宝贵见解'
- en: '**Generating investment ideas**: Ask ChatGPT for investment ideas based on
    specific criteria, such as industry, market capitalization, or growth potential,
    and receive a list of potential investment opportunities tailored to your preferences'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成投资想法**：根据特定标准（如行业、市值或增长潜力）向ChatGPT请求投资想法，并接收一份符合您偏好的潜在投资机会列表'
- en: The power of ChatGPT in financial analysis lies in its ability to complement
    and enhance traditional financial analysis methods, providing you with a competitive
    edge in today’s fast-paced and ever-changing financial landscape. By harnessing
    the power of AI and ChatGPT, you can elevate your financial analysis capabilities
    and make more informed investment decisions.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在财务分析中的力量在于其能够补充和增强传统的财务分析方法，为您在当今快速变化和竞争激烈的金融环境中提供竞争优势。通过利用人工智能和ChatGPT的力量，您可以提升您的财务分析能力并做出更明智的投资决策。
- en: In the previous section, we discussed the various ways to integrate ChatGPT
    into your financial analysis workflow, emphasizing the importance of combining
    AI with traditional methods to create a comprehensive and efficient approach to
    investment decision-making. We explored how ChatGPT could be used to summarize
    financial statements, compare companies and industries, analyze market sentiment,
    and generate investment ideas tailored to your preferences. By harnessing the
    power of AI and ChatGPT, you can elevate your financial analysis capabilities
    and make more informed investment decisions.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们讨论了将ChatGPT集成到您的财务分析工作流程中的各种方法，强调了将人工智能与传统方法相结合以创建全面且高效的投资决策方法的重要性。我们探讨了如何使用ChatGPT来总结财务报表、比较公司和行业、分析市场情绪以及根据您的偏好生成投资想法。通过利用人工智能和ChatGPT的力量，您可以提升您的财务分析能力并做出更明智的投资决策。
- en: In the next section, *Getting started with ChatGPT for finance*, we’ll guide
    you through the process of incorporating ChatGPT into your financial analysis
    routine. We’ll cover essential steps such as accessing ChatGPT through an API
    or web-based interface, understanding its capabilities, and learning how to make
    the most of this versatile tool to revolutionize your approach to financial analysis.
    Stay tuned for valuable insights and tips on how to get started with ChatGPT for
    finance.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节“**ChatGPT金融入门**”，我们将引导您将ChatGPT融入您的财务分析日常流程中。我们将涵盖关键步骤，例如通过API或基于Web的界面访问ChatGPT，了解其功能，以及学习如何充分利用这一多功能工具来革新您的财务分析方法。敬请期待关于如何开始使用ChatGPT进行财务分析的有价值见解和技巧。
- en: Getting started with ChatGPT for finance
  id: totrans-129
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始使用ChatGPT进行财务分析
- en: 'Embarking on your journey with ChatGPT for finance is an exciting step towards
    revolutionizing your approach to financial analysis. As you begin to explore the
    potential of AI-driven insights, it’s essential to understand how to effectively
    leverage ChatGPT to maximize its benefits. In this section, we’ll guide you through
    the initial steps of getting started with ChatGPT for finance:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用ChatGPT进行财务分析之旅是革新您财务分析方法的一个令人兴奋的步骤。随着您开始探索AI驱动的洞察力的潜力，了解如何有效地利用ChatGPT以最大化其好处变得至关重要。在本节中，我们将引导您通过使用ChatGPT进行财务分析的初始步骤：
- en: '**Step 1 –** **access ChatGPT**:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤1 –** **访问ChatGPT**：'
- en: To begin using ChatGPT, you’ll need to access the platform through an API or
    a web-based interface. There are several options available, with some requiring
    a subscription or usage fees. Choose the one that best suits your needs and budget,
    and familiarize yourself with the user interface and available features.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用ChatGPT，您需要通过API或基于Web的界面访问该平台。有多种选择可供选择，其中一些可能需要订阅或使用费。选择最适合您需求和预算的选项，并熟悉用户界面和可用功能。
- en: '**Step 2 – understand** **ChatGPT’s capabilities**:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤2 – 了解** **ChatGPT的功能**：'
- en: ChatGPT is an incredibly versatile tool that can perform a wide range of tasks
    related to financial analysis. Take some time to explore its capabilities, such
    as summarizing financial reports, generating investment ideas, or analyzing market
    sentiment. Knowing what ChatGPT can do will help you make the most of its potential
    in your financial analysis process.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个极其通用的工具，可以执行与财务分析相关的广泛任务。花些时间探索其功能，例如总结财务报告、生成投资想法或分析市场情绪。了解ChatGPT能做什么将帮助您在财务分析过程中充分利用其潜力。
- en: As we transition to the next section, we will continue exploring ways to further
    enhance your experience with ChatGPT in finance. We’ll discuss the best practices,
    potential challenges, and strategies to overcome these obstacles, ensuring that
    you’re making the most of this powerful AI tool in your financial analysis process.
    By consistently refining your interactions with ChatGPT and staying up to date
    on new features and capabilities, you’ll be well equipped to harness AI-driven
    insights for more informed investing and financial decision-making.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们过渡到下一节时，我们将继续探讨进一步改善你在金融领域使用ChatGPT体验的方法。我们将讨论最佳实践、潜在挑战以及克服这些障碍的策略，确保你在金融分析过程中充分利用这个强大的AI工具。通过持续优化与ChatGPT的互动并关注新功能和能力，你将能够充分利用AI驱动的见解，为更明智的投资和金融决策做好准备。
- en: Refining your interactions with ChatGPT
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化与ChatGPT的互动
- en: 'As you become more comfortable with ChatGPT’s capabilities, you’ll want to
    fine-tune your interactions to generate more targeted and accurate insights. Here
    are a few tips to refine your communication with ChatGPT:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你对ChatGPT功能的熟悉程度提高，你将希望优化你的互动以生成更精确和有针对性的见解。以下是一些优化与ChatGPT沟通的建议：
- en: '**Be specific**: When posing questions or requests to ChatGPT, be as specific
    as possible. Providing clear instructions and detailed criteria will help the
    AI generate more accurate and relevant results.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体明确**：在向ChatGPT提出问题或请求时，尽可能具体。提供清晰的指示和详细的准则将帮助AI生成更准确和相关的结果。'
- en: '**Break down complex queries**: If you have a multi-layered question or request,
    consider breaking it down into smaller, more manageable components. This can help
    ChatGPT process your query more effectively and provide you with more accurate
    results.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分解复杂查询**：如果你有一个多层次的疑问或请求，考虑将其分解成更小、更易于管理的部分。这可以帮助ChatGPT更有效地处理你的查询，并提供更准确的结果。'
- en: '**Iterate and refine**: ChatGPT is an iterative tool, meaning you may need
    to refine your queries or requests to get the desired output. Don’t be afraid
    to experiment with different phrasings or approaches to find the optimal way of
    communicating with ChatGPT.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代和优化**：ChatGPT是一个迭代工具，这意味着你可能需要优化你的查询或请求以获得期望的输出。不要害怕尝试不同的措辞或方法来找到与ChatGPT沟通的最佳方式。'
- en: '**Leverage examples**: Sometimes, providing examples can help ChatGPT better
    understand your request and deliver more accurate results. If you’re looking for
    a specific type of information or analysis, consider providing an example to guide
    ChatGPT’s response.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用示例**：有时，提供示例可以帮助ChatGPT更好地理解你的请求并提供更准确的结果。如果你正在寻找特定类型的信息或分析，请考虑提供一个示例来指导ChatGPT的响应。'
- en: Key takeaway
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: Keep in mind that the GPT-4 only includes data up to September 2021\. The recently
    released GPT-4 Turbo has a cut-off date of April 2023\. GPT-4 Turbo is also integrated
    with Bing AI which allows real-time updates.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，GPT-4只包含截至2021年9月的数据。最近发布的GPT-4 Turbo的截止日期为2023年4月。GPT-4 Turbo还集成了Bing AI，这允许实时更新。
- en: 'To incorporate current information, you can follow these steps:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 要纳入当前信息，你可以遵循以下步骤：
- en: '**Gather information**: Manually, collect the latest information on the topic
    or data you want to analyze from reliable sources. This may involve visiting news
    websites, financial portals, or official company reports.'
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收集信息**：手动从可靠来源收集你想要分析的主题或数据的最新信息。这可能涉及访问新闻网站、金融门户或官方公司报告。'
- en: '**Summarize and structure the data**: Organize the information you’ve collected
    into a structured and concise format. This will make it easier for you to provide
    the data to ChatGPT for analysis.'
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**总结和结构化数据**：将你收集的信息组织成结构化和简洁的格式。这将使你更容易将数据提供给ChatGPT进行分析。'
- en: '**Input the data into ChatGPT**: Feed the summarized and structured information
    to ChatGPT as context or prompts, specifying the kind of analysis or output you
    expect.'
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将数据输入到ChatGPT中**：将总结和结构化的信息作为上下文或提示提供给ChatGPT，并指定你期望的分析或输出类型。'
- en: '**Analyze the output**: Review the output generated by ChatGPT, and combine
    it with your knowledge and understanding of the subject matter to make informed
    decisions or derive insights.'
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析输出**：审查ChatGPT生成的输出，并将其与你对主题的理解和知识相结合，以做出明智的决定或得出见解。'
- en: Ensure that you verify the accuracy and reliability of the information you gather
    before using it in your analysis.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用你收集的信息进行分析之前，请确保验证信息的准确性和可靠性。
- en: With these tips in mind, you’re well on your way to unlocking the full potential
    of ChatGPT in your financial analysis process. As you continue to explore its
    capabilities and refine your interactions, you’ll discover how AI-driven insights
    can complement and enhance your approach to investing and financial decision-making.
    Remember, practice makes perfect – the more you work with ChatGPT, the more adept
    you’ll become at harnessing its power for finance.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些建议，你已经在解锁 ChatGPT 在财务分析过程中的全部潜力方面取得了良好的进展。随着你继续探索其功能并优化互动，你会发现人工智能驱动的洞察力如何补充和增强你的投资和财务决策方法。记住，熟能生巧
    – 你与 ChatGPT 互动得越多，你将越擅长利用其力量进行金融分析。
- en: In this section, we discussed refining your interactions with ChatGPT, offering
    tips such as being specific, breaking down complex queries, iterating and refining,
    and leveraging examples to improve the AI’s accuracy and relevance. We also covered
    the importance of incorporating real-time data into ChatGPT and suggested a workaround,
    to manually include current information.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们讨论了如何优化与 ChatGPT 的互动，提供了诸如具体化、分解复杂查询、迭代和优化、利用示例来提高人工智能的准确性和相关性等建议。我们还讨论了将实时数据纳入
    ChatGPT 的重要性，并建议了一种解决方案，即手动包含当前信息。
- en: In the next section, we will focus on a practical application of ChatGPT for
    financial analysis – analyzing earnings reports, specifically for Palo Alto Networks.
    We’ll demonstrate how to extract key data points from earnings reports and leverage
    ChatGPT’s capabilities, identifying trends and potential issues that could impact
    a company’s stock price or investment potential. By following these steps and
    incorporating the tips from the previous section, you’ll be better equipped to
    harness the power of ChatGPT for insightful financial analysis.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将关注 ChatGPT 在财务分析中的实际应用 – 分析收益报告，特别是针对帕洛阿尔托网络公司。我们将演示如何从收益报告中提取关键数据点，并利用
    ChatGPT 的能力，识别可能影响公司股价或投资潜力的趋势和潜在问题。通过遵循这些步骤并吸收上一节中的建议，你将更好地利用 ChatGPT 的力量进行深入财务分析。
- en: ChatGPT for financial analysis – analyzing earnings reports for Palo Alto Networks
  id: totrans-153
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT 用于财务分析 – 分析帕洛阿尔托网络公司的收益报告
- en: In this section, we will explore an interesting example of how ChatGPT can be
    used to analyze and summarize earnings reports, enabling you to identify key insights
    and trends quickly. With the vast amount of information available in earnings
    reports, it can be challenging to sift through data and identify the most critical
    elements. Let’s see how ChatGPT can help.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨一个有趣的例子，说明如何使用 ChatGPT 来分析和总结收益报告，使你能够快速识别关键见解和趋势。由于收益报告中包含大量信息，筛选数据并识别最关键要素可能具有挑战性。让我们看看
    ChatGPT 如何帮助。
- en: 'Here’s the scenario – Palo Alto Networks has just released its quarterly earnings
    report. You want to understand the company’s financial performance and identify
    any trends or potential issues that may impact the stock price or investment potential:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是场景 – 帕洛阿尔托网络公司刚刚发布了其季度收益报告。你想要了解公司的财务表现，并识别可能影响股价或投资潜力的任何趋势或潜在问题：
- en: '**Step 1 – extract key** **data points**:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1 – 提取关键数据点**：'
- en: To get started, provide ChatGPT with the relevant earnings report data, such
    as revenue, net income, EPS, and any other important metrics. Be sure to include
    both current and historical data for comparison purposes. You can either input
    this data manually or automate the process using an API or web scraper. Let’s
    explore the automated process to add Palo Alto Networks’ financial information
    from September 2021 to March 2023 to ChatGPT.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，向 ChatGPT 提供相关的收益报告数据，例如收入、净收入、每股收益（EPS）和其他任何重要指标。务必包括当前和历史数据以供比较。你可以手动输入这些数据，或者使用
    API 或网络爬虫自动化此过程。让我们探索将帕洛阿尔托网络公司从 2021 年 9 月到 2023 年 3 月的财务信息添加到 ChatGPT 的自动化过程。
- en: '**Step 1.1 – automating data collection with Python and** **API/web scraping**:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1.1 – 使用 Python 和 API/网络爬取自动化数据收集**：'
- en: 'Choose a financial API or web scraping library in Python:'
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Python 中选择一个财务 API 或网络爬取库：
- en: 'If using an API, explore options such as Alpha Vantage ([alphavantage.co](http://alphavantage.co)):'
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果使用 API，请探索如 Alpha Vantage ([alphavantage.co](http://alphavantage.co)) 等选项：
- en: Obtain an API key from the Alpha Vantage website (free and paid versions).
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从 Alpha Vantage 网站获取 API 密钥（免费和付费版本）。
- en: Choose a method – Python requests.
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一种方法 – Python 请求。
- en: Make a request.
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送请求。
- en: If web scraping, use libraries such as Requests and Beautiful Soup
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果进行网络爬取，请使用如 Requests 和 Beautiful Soup 等库。
- en: For web scraping, identify the URLs of the company’s financial statements or
    earnings reports from websites such as Yahoo Finance ([finance.yahoo.com](http://finance.yahoo.com)),
    Nasdaq ([nasdaq.com](http://nasdaq.com)), or the company’s investor relations
    page.
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于网络爬取，确定公司财务报表或收益报告的URL，这些报告来自雅虎财经([finance.yahoo.com](http://finance.yahoo.com))、纳斯达克([nasdaq.com](http://nasdaq.com))或公司的投资者关系页面。
- en: 'Set up your Python script for data collection:'
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置你的Python脚本以进行数据收集：
- en: 'For APIs: a. Import the necessary libraries (e.g., requests or pandas) – for
    example, `import requests import pandas as pd`. b. Define the API key, endpoint
    URL, and required parameters. c. Make a request to the API to fetch data using
    the requests library. d. Parse the response data and convert it into a pandas
    `DataFrame`.'
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于API：a. 导入必要的库（例如requests或pandas）——例如，`import requests import pandas as pd`。b.
    定义API密钥、端点URL和所需参数。c. 使用requests库通过API请求获取数据。d. 解析响应数据并将其转换为pandas `DataFrame`。
- en: 'For web scraping: a. Import the necessary libraries (e.g., requests, BeautifulSoup,
    or pandas) – for example, `import requests from bs4 import BeautifulSoup import
    pandas as pd`. b. Define the URL(s) containing the financial data. c. Use the
    requests library to fetch the HTML content of the web page. d. Parse the HTML
    content using `BeautifulSoup` to extract the required financial data. e. Convert
    the extracted data into a pandas `DataFrame`.'
  id: totrans-168
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于网络爬取：a. 导入必要的库（例如requests、BeautifulSoup或pandas）——例如，`import requests from
    bs4 import BeautifulSoup import pandas as pd`。b. 定义包含财务数据的URL（s）。c. 使用requests库获取网页的HTML内容。d.
    使用`BeautifulSoup`解析HTML内容以提取所需的财务数据。e. 将提取的数据转换为pandas `DataFrame`。
- en: 'Collect historical data from September 2021 to March 2023 for the relevant
    financial metrics:'
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收集从2021年9月到2023年3月的相关财务指标的历史数据：
- en: Adjust the parameters in your API request or web scraping script to target the
    specified date range.
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整你的API请求或网络爬取脚本的参数以针对指定的日期范围。
- en: 'Save the collected data in a structured format, such as a CSV file or a pandas
    `DataFrame`, for further processing and analysis:'
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将收集到的数据保存为结构化格式，例如CSV文件或pandas `DataFrame`，以便进行进一步的处理和分析：
- en: Use pandas’ `DataFrame.to_csv()` method to save the collected data as a CSV
    file
  id: totrans-172
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用pandas的`DataFrame.to_csv()`方法将收集到的数据保存为CSV文件
- en: Alternatively, keep the data in a pandas `DataFrame` for further analysis within
    the Python script.
  id: totrans-173
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者，将数据保持在pandas `DataFrame`中，以便在Python脚本中进行进一步分析。
- en: With these additions, you should have a better understanding of where to obtain
    financial data and the necessary Python libraries to import for their data collection
    scripts.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些补充，你应该对在哪里获取财务数据以及导入数据收集脚本的必要Python库有更好的理解。
- en: We will now provide a step-by-step guide using Python code for Palo Alto Networks’
    financial data.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将提供使用Python代码逐步指导Palo Alto Networks的财务数据。
- en: 'Extract Palo Alto Networks’ quarterly financial data (revenue, net income,
    and EPS) for the time period September 2021–March 2023, and save it in a CSV file
    as text input, using the Alpha Vantage API key (finance website):'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 提取Palo Alto Networks从2021年9月到2023年3月的季度财务数据（收入、净收入和EPS），并将其保存为CSV文件作为文本输入，使用Alpha
    Vantage API密钥（财务网站）：
- en: 'Install the necessary Python package and pandas library in Command Prompt:'
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在命令提示符中安装必要的Python包和pandas库：
- en: '[PRE0]'
  id: totrans-178
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Create a new Python script file in Notepad, Notepad++, PyCharm, or Visual Studio
    code. It is important that you add your Alpha Vantage API key in the following
    `api_key` line. Copy and paste the following code into your Python script file,
    and name it `PANW.py`:'
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在记事本、Notepad++、PyCharm或Visual Studio code中创建一个新的Python脚本文件。在以下`api_key`行中添加你的Alpha
    Vantage API密钥非常重要。将以下代码复制并粘贴到你的Python脚本文件中，并将其命名为`PANW.py`：
- en: '[PRE1]'
  id: totrans-180
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Run the Python script file:'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行Python脚本文件：
- en: '`Python PANW.py`'
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Python PANW.py`'
- en: 'A separate text file, `palo_alto_financial_summary.txt`, and a CSV file, `palo_alto_financial_data.csv`,
    will be created once the Python script has been executed:'
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦Python脚本执行完毕，将创建一个单独的文本文件`palo_alto_financial_summary.txt`和一个CSV文件`palo_alto_financial_data.csv`：
- en: When the Python script, `PANW.py`, is executed, it performs several tasks to
    fetch and analyze the earnings data of Palo Alto Networks (the symbol `PANW`).
    First, it imports two essential libraries – `requests` to make API calls and `pandas`
    for data manipulation.
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当执行Python脚本`PANW.py`时，它执行多个任务以获取和分析Palo Alto Networks（符号`PANW`）的收益数据。首先，它导入两个基本库——`requests`用于进行API调用和`pandas`用于数据处理。
- en: The script starts by defining a few key variables – the API key to access financial
    data, the stock symbol of the company, and the URL to the Alpha Vantage API where
    the data can be retrieved. Then, a `try` block is initiated to safely execute
    the following operations.
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 脚本首先定义了一些关键变量——访问财务数据的API密钥、公司的股票代码以及可以检索数据的Alpha Vantage API的URL。然后，启动一个`try`块来安全地执行以下操作。
- en: The script uses the `requests.get()` method to query the Alpha Vantage API.
    If the request is successful, the response is parsed as JSON and stored in a variable
    named `data`. It then checks whether `data` contains a key called `quarterlyEarnings`.
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 脚本使用`requests.get()`方法查询Alpha Vantage API。如果请求成功，响应将被解析为JSON并存储在名为`data`的变量中。然后，它检查`data`是否包含名为`quarterlyEarnings`的键。
- en: 'If this key exists, the script proceeds to convert the quarterly earnings data
    into a pandas DataFrame. It filters this DataFrame to include only the entries
    between September 2021 and March 2023\. The filtered data is then saved as a CSV
    file named `palo_alto_financial_data.csv`:'
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果此密钥存在，脚本将继续将季度收益数据转换为pandas DataFrame。它过滤此DataFrame，只包括2021年9月至2023年3月之间的条目。然后，过滤后的数据保存为名为`palo_alto_financial_data.csv`的CSV文件：
- en: The CSV file contains raw financial data in tabular form
  id: totrans-188
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: CSV文件包含表格形式的原始财务数据
- en: The CSV file can be imported into Excel, Google Sheets, or other specialized
    data analysis tools
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: CSV文件可以导入到Excel、Google Sheets或其他专业数据分析工具中
- en: 'The script also constructs a text-based summary of the filtered earnings data,
    including revenue, net income, and EPS for each quarter within the specified date
    range. This summary is saved as a text file named `palo_alto_financial_summary.txt`:'
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该脚本还会构建一个基于文本的收益数据摘要，包括指定日期范围内的每个季度的收入、净收入和EPS。此摘要保存为名为`palo_alto_financial_summary.txt`的文本文件：
- en: The TXT file provides a human-readable summary of the financial data for Palo
    Alto Networks for the specified data range
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: TXT文件提供了指定数据范围内Palo Alto Networks财务数据的人类可读摘要
- en: TXT files can be used for quick overviews and presentations
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: TXT文件可用于快速概述和演示
- en: If any errors occur during this process, such as a failed API request, the script
    will catch these exceptions and print an error message, thanks to the `except`
    block. This ensures that the script fails gracefully, providing useful feedback
    instead of crashing.
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果在此过程中发生任何错误，例如失败的API请求，脚本将捕获这些异常并打印错误消息，归功于`except`块。这确保了脚本优雅地失败，而不是崩溃，并提供有用的反馈。
- en: 'You can upload the CSV file (`palo_alto_financial_data.csv`) to ChatGPT directly
    if you are a ChatGPT Plus user by following these steps:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您是ChatGPT Plus用户，可以直接按照以下步骤将CSV文件（`palo_alto_financial_data.csv`）上传到ChatGPT：
- en: 'Uploading a CSV file directly into ChatGPT is supported through the Advanced
    Data Analysis option for ChatGPT Plus users. You can access the OpenAI website
    at [https://openai.com/](https://openai.com/), and then log in using your login
    credentials. Once logged in, access your Settings and Beta options by clicking
    on the three dots near your email address in the bottom-left corner of the screen.
    Go to Beta features and activate the Advanced data analysis function by moving
    the slider to the right to activate (the option will turn green). You can click
    on the plus sign in the dialog box to upload the CSV file to ChatGPT:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 通过ChatGPT的高级数据分析选项，支持直接上传CSV文件。您可以通过访问[https://openai.com/](https://openai.com/)的OpenAI网站，然后使用您的登录凭证登录。登录后，点击屏幕左下角电子邮件地址附近的三个点来访问设置和Beta选项。转到Beta功能，通过将滑块向右移动来激活高级数据分析功能（选项将变为绿色）。您可以在对话框中点击加号来上传CSV文件到ChatGPT：
- en: '**GPT-4 CSV file size limitations**: 500 MB'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GPT-4 CSV文件大小限制**：500 MB'
- en: '**GPT-4 CSV file retention**: Files are retained while a conversation is active
    and for three hours after the conversation is paused'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GPT-4 CSV文件保留**：在对话活跃期间以及对话暂停后的三小时内，文件将被保留'
- en: 'If you are not a ChatGPT Plus user, follow the following instructions using
    the OpenAI API to upload the CSV file (`palo_alto_financial_data.csv`) into ChatGPT,
    and analyze the data using the GPT 3.5 turbo model:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不是ChatGPT Plus用户，请按照以下说明使用OpenAI API将CSV文件（`palo_alto_financial_data.csv`）上传到ChatGPT，并使用GPT
    3.5 turbo模型分析数据：
- en: 'Create a new Python script file in Notepad, Notepad++, PyCharm, or Visual Studio
    Code. It is important that you add your OpenAI API key to the following `api_key`
    line. Copy and paste the following code into your Python script file and name
    it `OPENAIAPI.py`:'
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在记事本、Notepad++、PyCharm 或 Visual Studio Code 中创建一个新的 Python 脚本文件。重要的是您需要将您的 OpenAI
    API 密钥添加到下面的 `api_key` 行。将以下代码复制并粘贴到您的 Python 脚本文件中，并将其命名为 `OPENAIAPI.py`：
- en: '[PRE2]'
  id: totrans-200
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Run the Python script file:'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行 Python 脚本文件：
- en: '[PRE3]'
  id: totrans-202
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This Python code snippet is responsible for interacting with the OpenAI API
    to send the formatted text input (the financial data prompt) to ChatGPT and receive
    the generated response. Here’s a breakdown of each part:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 Python 代码片段负责与 OpenAI API 交互，将格式化的文本输入（财务数据提示）发送到 ChatGPT 并接收生成的响应。以下是每个部分的分解：
- en: The Python code snippet starts by importing two essential Python libraries –
    `openai` for interacting with the OpenAI API, and `pandas` for data manipulation.
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python 代码片段首先导入两个必要的 Python 库——`openai` 用于与 OpenAI API 交互，以及 `pandas` 用于数据处理。
- en: The script reads financial data from a CSV file named `palo_alto_financial_data.csv`
    using `pandas`, converting this data into a formatted string. It then sets up
    the OpenAI API by initializing it with a user-provided API key.
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该脚本使用 `pandas` 从名为 `palo_alto_financial_data.csv` 的 CSV 文件中读取财务数据，将这些数据转换为格式化的字符串。然后，它通过使用用户提供的
    API 密钥初始化来设置 OpenAI API。
- en: Following this, the script prepares a prompt for GPT-3.5-turbo, consisting of
    the loaded financial data and a request for analysis. This prompt is sent to the
    GPT-3.5-turbo engine via the OpenAI API, which returns a text-based analysis,
    limited to 200 tokens.
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，脚本为 GPT-3.5-turbo 准备一个提示，包括加载的财务数据和请求分析的内容。这个提示通过 OpenAI API 发送到 GPT-3.5-turbo
    引擎，该引擎返回基于文本的分析，限制在 200 个标记内。
- en: The generated analysis is then extracted from the API’s response and printed
    to the console with the label “GPT-3.5-turbo PANW Analysis.” The script essentially
    automates the process of sending financial data to the GPT-3.5-turbo engine for
    insightful analysis, making it easy to obtain quick, AI-generated insights on
    Palo Alto Networks’ financial performance.
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成的分析随后从 API 的响应中提取出来，并带有标签“GPT-3.5-turbo PANW 分析”打印到控制台。该脚本本质上自动化了将财务数据发送到
    GPT-3.5-turbo 引擎进行深入分析的过程，使得快速获得基于 AI 的见解变得容易，关于 Palo Alto Networks 的财务表现。
- en: In the next section, we will provide an alternative, more detailed method to
    extract SEC 10-Q filings for Palo Alto Networks between September 2021 and March
    2023, directly from the SEC website. If you have already successfully obtained
    the 10-Q information for the specified period, feel free to skip this section.
    However, if you’re interested in learning another approach, please continue reading.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将提供一个替代的、更详细的方法，直接从 SEC 网站提取 Palo Alto Networks 在 2021 年 9 月至 2023 年
    3 月之间的 SEC 10-Q 文件。如果您已经成功获取了指定期间的 10-Q 信息，请跳过本节。但是，如果您对学习另一种方法感兴趣，请继续阅读。
- en: Instructions to access and store Palo Alto Networks’ 10-Q reports using sec-api
    (September 2021–March 2023)
  id: totrans-209
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 sec-api 访问和存储 Palo Alto Networks 的 10-Q 报告的说明（2021 年 9 月至 2023 年 3 月）
- en: In this section, we’ll present an alternative, more detailed method to load
    Palo Alto Networks’ 10-Q filings into ChatGPT, should you prefer not to use the
    high-level instructions provided on page 16\. This approach is designed to help
    you extract 10-Q information for the period between September 2021 and March 2023\.
    We’ve included this method as we’ll refer to it in later chapters when updating
    ChatGPT with more recent financial information, which is necessary for our examples
    and case studies. This alternative ensures you have a choice in how you prefer
    to access and load the SEC data.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将展示一个替代的、更详细的方法，将 Palo Alto Networks 的 10-Q 文件加载到 ChatGPT 中，如果您不希望使用第
    16 页上提供的高级说明。这种方法旨在帮助您提取 2021 年 9 月至 2023 年 3 月期间的 10-Q 信息。我们包括这个方法，因为我们在后续章节中会引用它，当需要更新
    ChatGPT 以包含更近期的财务信息时，这对于我们的示例和案例研究是必要的。这个替代方案确保您有选择权，以您喜欢的方式访问和加载 SEC 数据。
- en: 'The SEC reports for instructions on how to access and store the 10-Q reports
    using `sec-api` and Python for Palo Alto Networks (non-technical user step-by-step
    instructions) are required, since the ChatGPT model only includes information
    up to September 2021\. Follow these steps:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: SEC 报告中提供了如何使用 `sec-api` 和 Python 访问和存储 Palo Alto Networks 的 10-Q 报告的说明（非技术用户分步指南），因为这些说明是必需的，因为
    ChatGPT 模型只包含到 2021 年 9 月的信息。请按照以下步骤操作：
- en: Open a command prompt or terminal window on your computer for GPT-4\. GPT-4
    Turbo includes information through April 2023 but you can still follow the steps
    below and change your date range to be more current.
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的计算机上打开命令提示符或终端窗口以使用 GPT-4。GPT-4 Turbo 包含截至 2023 年 4 月的信息，但您仍然可以按照以下步骤操作，并将日期范围更改为更近的时间。
- en: 'Install the `sec-api` package by running the following command:'
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过运行以下命令安装 `sec-api` 包：
- en: '[PRE4]'
  id: totrans-214
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Copy and paste the following code into the new Python file that we just created:'
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将以下代码复制并粘贴到我们刚刚创建的新 Python 文件中：
- en: '[PRE5]'
  id: totrans-216
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Run the Python script file:'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行 Python 脚本文件：
- en: '[PRE6]'
  id: totrans-218
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'The Python code provided here is used to fetch Palo Alto Networks’ 10-Q filings
    between September 1, 2021 and March 31, 2023 from the SEC API, with the results
    saved as a JSON file. Here’s a step-by-step explanation of the code:'
  id: totrans-219
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里提供的 Python 代码用于从 SEC API 获取 Palo Alto Networks 的 10-Q 文件，时间范围从 2021 年 9 月
    1 日至 2023 年 3 月 31 日，并将结果保存为 JSON 文件。以下是代码的逐步解释：
- en: '**Fetch** **10-Q filings**:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '**获取** **10-Q 文件**：'
- en: Import the `requests` library to make HTTP requests and the `json` library to
    handle JSON data.
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入 `requests` 库以进行 HTTP 请求和 `json` 库以处理 JSON 数据。
- en: Define the API endpoint URL and the query parameters. The `query` dictionary
    specifies the search criteria.
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义 API 端点 URL 和查询参数。`query` 字典指定了搜索标准。
- en: Define your SEC API key by replacing `"YOUR_API_KEY"` with your actual API key.
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义您的 SEC API 密钥，通过将 `"YOUR_API_KEY"` 替换为您的实际 API 密钥。
- en: Make a `POST` request to the SEC API using `requests.post()`, with the specified
    URL, query parameters, and API key as headers.
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `requests.post()` 向 SEC API 发送 `POST` 请求，指定 URL、查询参数和 API 密钥作为头部。
- en: Parse the response content using `json.loads()`, and store it in the `filings`
    variable.
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `json.loads()` 解析响应内容，并将其存储在 `filings` 变量中。
- en: Save the filings data to a JSON file named `"panw_10q_filings.json"` using `json.dump()`.
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将文件数据保存到名为 `"panw_10q_filings.json"` 的 JSON 文件中，使用 `json.dump()`。
- en: Print a confirmation message.
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打印确认消息。
- en: '**Extract the metrics from** **XBRL files**:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '**从** **XBRL 文件** **中提取指标**：'
- en: Import the `XBRLParser` class from the `xbrl` library.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 `xbrl` 库中导入 `XBRLParser` 类。
- en: Initialize empty lists to store revenue, net income, and EPS metrics.
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始化空列表以存储收入、净收入和 EPS 指标。
- en: Loop through each XBRL file (assumed to be in a list named `xbrl_files`).
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 遍历每个 XBRL 文件（假设这些文件位于名为 `xbrl_files` 的列表中）。
- en: Use the `XBRLParser` to parse the XBRL file and extract the required financial
    metrics.
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `XBRLParser` 解析 XBRL 文件并提取所需的财务指标。
- en: Append the extracted metrics to the lists initialized earlier.
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将提取的指标追加到之前初始化的列表中。
- en: '**Extract the metrics from the** **text files**:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: '**从** **文本文件** **中提取指标**：'
- en: Import the `re` (regular expressions) library.
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入 `re`（正则表达式）库。
- en: Initialize empty lists to store revenue, net income, and EPS metrics.
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始化空列表以存储收入、净收入和 EPS 指标。
- en: Loop through each text file (assumed to be in a list named `text_files`).
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 遍历每个文本文件（假设这些文件位于名为 `text_files` 的列表中）。
- en: Use regular expressions to extract the required financial metrics from the text
    content.
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用正则表达式从文本内容中提取所需的财务指标。
- en: Append the extracted metrics to the lists initialized earlier.
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将提取的指标追加到之前初始化的列表中。
- en: '**Save the extracted metrics to a** **JSON file**:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: '**将提取的指标保存到** **JSON 文件** **中**：'
- en: Create a dictionary to store all the extracted metrics.
  id: totrans-241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个字典以存储所有提取的指标。
- en: Save this dictionary as a JSON file named `'financial_metrics.json'`, using
    `json.dump()`.
  id: totrans-242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `json.dump()` 将此字典保存为名为 `'financial_metrics.json'` 的 JSON 文件。
- en: Print a confirmation message.
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打印确认消息。
- en: In the next section, we’ll provide additional instructions for the alternative
    method to import Palo Alto Networks’ 10-Q filings into ChatGPT, via the sec-api.
    As this method will be referenced in future chapters when updating ChatGPT with
    recent financial information, it allows you to choose your preferred way of accessing
    and loading SEC data. This is the final step required to load the extracted data
    from the SEC website via the sec-api into ChatGPT, ensuring a seamless integration
    of financial information.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将提供将 Palo Alto Networks 的 10-Q 文件导入 ChatGPT 的替代方法的额外说明，通过 sec-api。由于此方法将在未来章节中更新
    ChatGPT 时被引用，以便使用最新的财务信息，它允许您选择您首选的访问和加载 SEC 数据的方式。这是将通过 sec-api 从 SEC 网站提取的数据加载到
    ChatGPT 中的最后一步，确保财务信息的无缝集成。
- en: Instructions for analyzing 10-Q reports with ChatGPT
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 分析 10-Q 报告的说明
- en: In these final steps of the alternative method, you will use Python code to
    access the SEC data for Palo Alto Networks via the sec-api. You’ll make API requests
    to retrieve the relevant 10-Q filings for the specified date range, parse the
    response data, and then save it as a JSON file. Ultimately, this process allows
    you to efficiently load the extracted financial information from the SEC website
    into ChatGPT, setting the stage for further analysis and application in the examples
    and case studies throughout the book.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 在替代方法的最后几个步骤中，您将使用Python代码通过sec-api访问Palo Alto Networks的SEC数据。您将发出API请求以检索指定日期范围内的相关10-Q文件，解析响应数据，并将其保存为JSON文件。最终，这个过程允许您高效地将从SEC网站提取的财务信息加载到ChatGPT中，为书中各章节的示例和案例研究中的进一步分析和应用奠定基础。
- en: 'Follow the following steps to insert the Palo Alto Networks financial data
    into ChatGPT for further analysis:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤将Palo Alto Networks的财务数据插入ChatGPT以进行进一步分析：
- en: Open the `financial_metrics.json` file that we generated in the previous section.
  id: totrans-248
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开我们在上一节中生成的`financial_metrics.json`文件。
- en: Review the contents of the JSON file to locate the specific information you
    want to analyze.
  id: totrans-249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查JSON文件的内容，以定位您想要分析的具体信息。
- en: Copy the relevant information from the JSON file.
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从JSON文件中复制相关信息。
- en: Open ChatGPT in your web browser, and paste the copied information into the
    ChatGPT interface if you are not a ChatGPT Plus user. If you are a ChatGPT Plus
    user, you can upload the file through the Advanced Data Analysis feature in, GPT-4
    using the instructions provided.
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您不是ChatGPT Plus用户，请在您的网络浏览器中打开ChatGPT，并将复制的信息粘贴到ChatGPT界面中。如果您是ChatGPT Plus用户，您可以使用提供的说明通过GPT-4的高级数据分析功能上传文件。
- en: Ask ChatGPT specific questions, or request insights based on the information
    you provided.
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向ChatGPT提出具体问题，或根据您提供的信息请求见解。
- en: Once you have loaded more current SEC information into ChatGPT, you can ask
    various interesting questions to gain insights into a company’s financial performance,
    trends, and potential opportunities.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您将更多当前美国证券交易委员会（SEC）的信息加载到ChatGPT中，您就可以提出各种有趣的问题，以深入了解一家公司的财务表现、趋势和潜在机会。
- en: 'Here are a few examples of such questions:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些此类问题的例子：
- en: How has the revenue growth of Company *X* changed in the last three quarters
    compared to the previous year?
  id: totrans-255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与上一年相比，公司*X*在过去三个季度的收入增长有何变化？
- en: What were the major expense categories for Company *Y* in their latest 10-Q
    filing, and how do they compare to the same period last year?
  id: totrans-256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 公司*Y*在其最新的10-Q文件中，主要的费用类别是什么，它们与去年同期的费用类别有何比较？
- en: Has Company *Z* reported any significant changes in its cash flow from operations
    in the most recent filing, compared to the previous quarter?
  id: totrans-257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与上一季度相比，公司*Z*在其最近提交的文件中报告了任何重大的经营活动现金流变化吗？
- en: What were the key risks and uncertainties mentioned by Company *X* in their
    latest 10-K filing, and how do they compare to those mentioned in the previous
    year’s filing?
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 公司*X*在其最新的10-K文件中提到了哪些关键风险和不确定性，它们与上一年度的文件中提到的风险和不确定性有何比较？
- en: How has the debt-to-equity ratio of Company *Y* evolved over the past year,
    and what factors have contributed to this change?
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 公司*Y*在过去一年中，其资产负债率是如何演变的，以及哪些因素导致了这种变化？
- en: Note that these instructions are intended to provide a general overview of how
    to access and analyze 10-Q reports using the `sec-api` package and ChatGPT. The
    process may vary depending on the specific version of Python, the `sec-api` package,
    and the ChatGPT interface you use. Additionally, the instructions assume that
    you have Python and pip (the package installer for Python) already installed on
    your computer.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这些说明旨在提供一个关于如何使用`sec-api`包和ChatGPT访问和分析10-Q报告的一般概述。具体过程可能因Python的特定版本、`sec-api`包和您使用的ChatGPT界面而异。此外，这些说明假定您已经在计算机上安装了Python和pip（Python的包安装程序）。
- en: Important note
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Note that the `sec-api` package requires an API key, which you can obtain by
    signing up on the `sec-api` website. Make sure to replace “`YOUR_API_KEY`” in
    the code with your actual API key.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，`sec-api`包需要API密钥，您可以通过在`sec-api`网站上注册来获取API密钥。确保在代码中将“`YOUR_API_KEY`”替换为您实际的API密钥。
- en: In the following section, we will explore ChatGPT’s ability to generate insightful
    analyses and uncover trends in financial data. We will demonstrate how to frame
    specific questions for ChatGPT to obtain targeted insights, such as drivers of
    revenue increase, reasons for net income decline, EPS performance, and trends
    in research and development investment. Additionally, we will discuss further
    exploration with ChatGPT, including comparisons to industry benchmarks, analysis
    of the impact on stock prices, and evaluation of a company’s financial health
    based on key financial ratios. By the end of this section, you will know how to
    effectively utilize ChatGPT for comprehensive financial analysis and make informed
    decisions, based on the generated insights.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨ChatGPT生成有洞察力的分析和揭示金融数据中趋势的能力。我们将展示如何为ChatGPT构建特定问题以获得针对性的见解，例如收入增长驱动因素、净收入下降原因、每股收益表现和研发投资趋势。此外，我们还将讨论使用ChatGPT进行进一步探索，包括与行业基准的比较、对股价影响的分析以及基于关键财务比率的公司财务健康状况评估。到本节结束时，你将了解如何有效地利用ChatGPT进行全面的财务分析，并基于生成的见解做出明智的决策。
- en: ChatGPT’s analysis and insights
  id: totrans-264
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT的分析和见解
- en: 'Once you’ve provided ChatGPT with the necessary data, it will quickly analyze
    the earnings report and generate a summary, highlighting the key findings, trends,
    and comparisons to previous quarters. For instance, ChatGPT might provide insights
    like:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你向ChatGPT提供了必要的数据，它将快速分析收益报告并生成摘要，突出关键发现、趋势和与上一季度的比较。例如，ChatGPT可能会提供以下见解：
- en: 'To get specific insights from ChatGPT, you can frame your questions by providing
    a clear and concise context, along with the data you have loaded. Here’s an example
    of how to frame your questions for ChatGPT:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 要从ChatGPT中获得具体见解，你可以通过提供清晰简洁的背景信息和已加载的数据来构建你的问题。以下是如何为ChatGPT构建问题的示例：
- en: 'Revenue increase and its drivers:'
  id: totrans-267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收入增长及其驱动因素：
- en: '[PRE7]'
  id: totrans-268
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Net income decline and its reasons:'
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 净收入下降及其原因：
- en: '[PRE8]'
  id: totrans-270
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'EPS performance compared to analysts’ expectations:'
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与分析师预期相比的每股收益表现：
- en: '[PRE9]'
  id: totrans-272
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Trends in research and development investment:'
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研发投资趋势：
- en: '[PRE10]'
  id: totrans-274
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'This Python code demonstrates how to append specific questions to the `input_text`
    variable, which will be sent to ChatGPT for analysis. The questions focus on four
    key aspects of the company’s financial performance:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 这段Python代码演示了如何将特定问题附加到`input_text`变量中，该变量将被发送到ChatGPT进行分析。这些问题集中在公司财务表现的四个关键方面：
- en: '`input_text`, asking ChatGPT to calculate the percentage increase in revenue
    compared to the previous quarter and identify the main drivers of this increase.'
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`input_text`要求ChatGPT计算与上一季度相比的收入百分比增长，并确定这一增长的主要驱动因素。'
- en: '**Net income decline and its reasons**: Similarly, this line appends a question
    asking ChatGPT to calculate the percentage decline in net income compared to the
    previous quarter, determining the main reasons for this decline.'
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**净收入下降及其原因**：同样，这一行附加了一个问题，要求ChatGPT计算与上一季度相比的净收入百分比下降，并确定这一下降的主要原因。'
- en: '`input_text` asks ChatGPT to compare the EPS performance to analysts’ expectations,
    assessing whether the company has consistently outperformed these expectations
    in recent quarters.'
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`input_text`要求ChatGPT比较每股收益（EPS）的表现与分析师的预期，评估公司在最近几个季度是否持续超出这些预期。'
- en: '**Trends in research and development investment**: This line adds a question
    asking ChatGPT to identify any notable trends in the company’s research and development
    investment, explaining what these trends might signal about the company’s focus
    on innovation and long-term growth.'
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**研发投资趋势**：这一行添加了一个问题，要求ChatGPT识别公司在研发投资方面的任何显著趋势，并解释这些趋势可能预示着公司对创新和长期增长的重视。'
- en: By appending these questions to `input_text`, the user is able to direct ChatGPT’s
    focus to specific areas of interest within the financial data, allowing for a
    more targeted and detailed analysis.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些问题附加到`input_text`上，用户能够引导ChatGPT关注金融数据中的特定感兴趣区域，从而进行更有针对性和详细的分析。
- en: After framing your questions, you can send `input_text` to ChatGPT using the
    OpenAI API, as shown in the previous response. ChatGPT will then analyze the data
    and provide the requested insights.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建好问题后，你可以使用OpenAI API将`input_text`发送到ChatGPT，如前一个响应所示。然后ChatGPT将分析数据并提供所需的见解。
- en: Remember to keep your questions clear, specific, and focused on the data you’ve
    provided to ChatGPT. This will help the model understand your context and provide
    relevant and accurate insights.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，保持你的问题清晰、具体，并专注于你提供给ChatGPT的数据。这将有助于模型理解你的上下文，并提供相关且准确的见解。
- en: Further exploration with ChatGPT
  id: totrans-283
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步使用ChatGPT进行探索
- en: 'With the initial analysis provided by ChatGPT, you can now dive deeper into
    specific aspects of the earnings report or request further information. For example,
    you might ask ChatGPT to answer the following:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT提供的初步分析基础上，你现在可以深入到利润报告的具体方面，或者请求更多信息。例如，你可能要求ChatGPT回答以下问题：
- en: '**Comparing financial performance to industry benchmarks** **or competitors**:'
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将财务表现与行业基准或竞争对手进行比较**：'
- en: '[PRE11]'
  id: totrans-286
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Analyzing the impact of the earnings report on the stock price and potential**
    **trading opportunities**:'
  id: totrans-287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析利润报告对股价的影响和潜在的** **交易机会**：'
- en: '[PRE12]'
  id: totrans-288
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '**Evaluating the company’s financial health based on key** **financial ratios**:'
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**根据关键财务比率评估公司的财务健康状况**：'
- en: '[PRE13]'
  id: totrans-290
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: After framing your questions, you can send `input_text` to ChatGPT using the
    OpenAI API. ChatGPT will then analyze the data provided and generate the requested
    insights.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建好你的问题后，你可以使用OpenAI API将`input_text`发送到ChatGPT。然后，ChatGPT将分析提供的数据并生成所需的见解。
- en: In this section, we discussed how to use ChatGPT to quickly analyze a company’s
    earnings report by appending specific questions related to revenue, net income,
    EPS, and research and development investment to the `input_text` variable. This
    allows for a more targeted and detailed analysis of the company’s financial performance.
    Furthermore, we explored how to dive deeper into specific aspects of the earnings
    report and request additional insights from ChatGPT, on topics such as financial
    performance comparisons, stock price impact, and financial health evaluation.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们讨论了如何通过将有关收入、净利润、每股收益和研发投资的具体问题附加到`input_text`变量上来使用ChatGPT快速分析公司的利润报告。这允许对公司的财务表现进行更精准和详细的分析。此外，我们还探讨了如何深入到利润报告的具体方面，并从ChatGPT那里请求关于财务表现比较、股价影响和财务健康状况评估等方面的额外见解。
- en: In the next section, *Combining ChatGPT with fundamental analysis*, we will
    explore how to integrate ChatGPT’s AI-driven insights with traditional analysis
    methods to make more informed investment decisions. We will discuss additional
    questions you can ask ChatGPT to gain insights on dividend analysis, revenue and
    earnings growth trends, stock price momentum, analysts’ recommendations, and potential
    risks and opportunities in the industry. By leveraging both AI-driven analysis
    and conventional methods, you can save time while obtaining a deeper understanding
    of a company’s financial performance and potential investment opportunities.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节，*结合ChatGPT与基本面分析*，我们将探讨如何将ChatGPT的AI驱动的洞察与传统分析方法相结合，以做出更明智的投资决策。我们将讨论你可以向ChatGPT提出的问题，以获得关于股息分析、收入和盈利增长趋势、股价动量、分析师推荐以及行业中的潜在风险和机会的见解。通过利用AI驱动的分析和传统方法，你可以在节省时间的同时，更深入地理解公司的财务表现和潜在的投资机会。
- en: Combining ChatGPT with fundamental analysis
  id: totrans-294
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结合ChatGPT与基本面分析
- en: While ChatGPT provides valuable insights and helps streamline the financial
    analysis process, it’s essential to combine these AI-driven findings with your
    own research and fundamental analysis methods. By integrating ChatGPT’s insights
    with a comprehensive understanding of the company, industry, and market context,
    you can make more informed decisions about your investments. If you are a ChatGPT
    Plus user, you can **Browse with Bing**, and copy the following questions into
    ChatGPT to get answers based on the latest information available. If you are not
    a ChatGPT Plus user, your answers will reflect information up to January 2022,
    which is the cut-off date for training GPT-GPT-3.5 Turbo.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT提供了有价值的见解并有助于简化财务分析流程，但将AI驱动的发现与你的研究和基本面分析方法相结合是至关重要的。通过将ChatGPT的见解与对公司、行业和市场背景的全面理解相结合，你可以做出更明智的投资决策。如果你是ChatGPT
    Plus用户，你可以**使用Bing浏览**，并将以下问题复制到ChatGPT中，以获取基于最新可用信息的答案。如果你不是ChatGPT Plus用户，你的答案将反映截至2022年1月的信息，这是GPT-GPT-3.5
    Turbo训练的截止日期。
- en: 'Here are some additional questions to consider:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些需要考虑的额外问题：
- en: '**Dividend analysis**:'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**股息分析**：'
- en: '[PRE14]'
  id: totrans-298
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**Revenue and earnings** **growth trends**:'
  id: totrans-299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收入和盈利增长趋势**：'
- en: '[PRE15]'
  id: totrans-300
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Stock price momentum and** **technical indicators**:'
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**股价动量和技术指标**：'
- en: '[PRE16]'
  id: totrans-302
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '**Analysts’ recommendations and** **price targets**:'
  id: totrans-303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析师的建议和** **价格目标**：'
- en: '[PRE17]'
  id: totrans-304
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**Potential risks and opportunities in the industry** **or sector**:'
  id: totrans-305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**行业或部门中的潜在风险和机遇**：'
- en: '[PRE18]'
  id: totrans-306
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Remember to send the `input_text` containing your questions to ChatGPT, using
    the OpenAI API. ChatGPT will then process the data and generate the requested
    insights.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，使用OpenAI API将包含您问题的`input_text`发送给ChatGPT。然后，ChatGPT将处理数据并生成所需的见解。
- en: In summary, ChatGPT can be a powerful tool for analyzing earnings reports and
    extracting key insights quickly and efficiently. By leveraging AI-driven analysis
    alongside traditional methods, you can save time and gain a deeper understanding
    of a company’s financial performance and potential investment opportunities.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，ChatGPT可以是一个强大的工具，用于分析收益报告并快速有效地提取关键见解。通过结合AI驱动的分析和传统方法，您可以节省时间并更深入地了解公司的财务表现和潜在的投资机会。
- en: To maintain a competitive edge in the dynamic world of finance, it’s essential
    to effectively merge traditional financial analysis techniques with the power
    of AI-driven insights. ChatGPT has emerged as a game-changing tool that can be
    seamlessly integrated with conventional methods to provide more comprehensive
    and actionable intelligence.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 在金融动态世界中保持竞争优势，将传统财务分析技术与AI驱动的洞察力有效结合是至关重要的。ChatGPT已成为一个颠覆性的工具，它可以无缝集成到传统方法中，以提供更全面和可操作的信息。
- en: 'Here, we will discuss some best practices to combine traditional analysis and
    AI insights using ChatGPT, along with interesting examples:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将讨论一些最佳实践，以使用ChatGPT结合传统分析和AI见解，以及一些有趣的例子：
- en: '**Start with a strong foundation**: Before diving into AI-enhanced analysis,
    make sure you have a solid understanding of traditional financial analysis methods,
    such as fundamental and technical analysis. ChatGPT can augment your existing
    knowledge, but it should not be considered a replacement for foundational skills.'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从坚实的基础开始**：在深入AI增强分析之前，确保您对传统财务分析方法（如基本面和技术分析）有扎实的理解。ChatGPT可以增强您的现有知识，但它不应被视为基础技能的替代品。'
- en: '**Use ChatGPT to enhance, not replace, your analysis**: ChatGPT can provide
    valuable insights into a company’s financial health, such as highlighting key
    metrics or trends in a company’s balance sheet. However, it’s essential to use
    it as a complementary tool alongside conventional techniques, such as assessing
    the company’s competitive position within its industry.'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将ChatGPT用作增强而非替代分析的工具**：ChatGPT可以为公司的财务状况提供有价值的见解，例如突出公司资产负债表中的关键指标或趋势。然而，将其作为传统技术（如评估公司在行业中的竞争地位）的补充工具使用是至关重要的。'
- en: '**Verify the accuracy of AI-generated insights**: ChatGPT Plus users have the
    ability to get answers based on the latest information available, while those
    who are not ChatGPT Plus users rely on historical data up until September 2021\.
    We recommend that you cross-check all information provided by ChatGPT with Palo
    Alto Network’s SEC reports, stock analyst reports, and financial news. For example,
    if ChatGPT suggests that a company has strong revenue growth, verify this with
    the most recent financial statements.'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证AI生成洞察的准确性**：ChatGPT Plus用户能够基于最新的可用信息获得答案，而那些不是ChatGPT Plus用户的人则依赖于截至2021年9月的历史数据。我们建议您将ChatGPT提供的信息与帕洛阿尔托网络公司的SEC报告、股票分析师报告和财经新闻进行交叉核对。例如，如果ChatGPT建议某家公司有强劲的收入增长，请通过最新的财务报表来验证这一点。'
- en: '**Ask targeted questions**: To get the most out of ChatGPT, frame your queries
    or prompts in a clear and specific manner. For instance, instead of asking, “*What
    do you think of Company X’s financials?*”, ask, “*What is the trend in Company
    X’s net income over the past* *five years?*”'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提出有针对性的问题**：为了最大限度地利用ChatGPT，请以清晰和具体的方式构建您的查询或提示。例如，与其问“*你对公司X的财务状况有何看法？*”，不如问“*过去五年中公司X的净收入趋势是什么？*”'
- en: '**Refine inputs based on AI feedback**: As you interact with ChatGPT, use its
    feedback to refine your inputs or ask follow-up questions. For example, if ChatGPT
    identifies a significant increase in a company’s operating expenses, you can inquire
    about the possible reasons behind this increase.'
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**根据AI反馈优化输入**：在与ChatGPT互动时，利用其反馈来优化您的输入或提出后续问题。例如，如果ChatGPT识别到某家公司运营费用的大幅增加，您可以询问导致这种增加的可能原因。'
- en: '**Use AI to identify trends and patterns**: ChatGPT’s ability to process large
    amounts of data quickly makes it an excellent tool for spotting trends and patterns.
    For instance, ChatGPT can help you uncover hidden correlations between financial
    ratios and stock prices, which might be difficult to identify through traditional
    analysis alone.'
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用AI识别趋势和模式**：ChatGPT快速处理大量数据的能力使其成为发现趋势和模式的优秀工具。例如，ChatGPT可以帮助您发现财务比率和股价之间的隐藏相关性，这可能仅通过传统分析难以识别。'
- en: '**Leverage ChatGPT for natural language explanations**: ChatGPT can generate
    human-like, easy-to-understand explanations for complex financial concepts or
    data. For example, use ChatGPT to break down the implications of a high debt-to-equity
    ratio and how it might affect a company’s overall financial health.'
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用ChatGPT进行自然语言解释**：ChatGPT可以生成类似人类的、易于理解的解释，用于复杂财务概念或数据。例如，使用ChatGPT来分析高资产负债率的影响及其可能对公司的整体财务健康产生的影响。'
- en: '**Continuously learn and adapt**: Both traditional financial analysis and AI
    technologies are continuously evolving. Stay up-to-date with the latest developments,
    tools, and techniques to ensure you are always equipped with the most advanced
    knowledge and skills in the field.'
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续学习和适应**：传统财务分析和AI技术都在不断进化。保持对最新发展、工具和技术的前沿了解，以确保您始终具备该领域最先进的知识和技能。'
- en: By incorporating these best practices, you can successfully combine traditional
    financial analysis with the power of ChatGPT to gain a competitive edge in the
    world of finance, making more informed investment and trading decisions.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合这些最佳实践，您可以将传统财务分析与ChatGPT的力量相结合，在金融世界中取得竞争优势，做出更明智的投资和交易决策。
- en: In this practice use case, we will walk you through an example of evaluating
    the investment potential of a company, using a combination of traditional financial
    analysis techniques and the insights provided by ChatGPT. This process will help
    you gain a more comprehensive understanding of the company’s financial health,
    making more informed investment decisions.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实践案例中，我们将向您展示如何结合传统财务分析技术和ChatGPT提供的见解来评估公司的投资潜力。这个过程将帮助您更全面地了解公司的财务状况，从而做出更明智的投资决策。
- en: 'Imagine that you are considering investing in Company *XYZ*, a technology firm
    that has recently caught your attention due to its innovative products and strong
    market presence. To evaluate its investment potential, you would typically begin
    by conducting a fundamental analysis, examining the company’s financial statements,
    and calculating key financial ratios. With the help of ChatGPT, you can enhance
    your analysis and gain a more in-depth understanding of the company’s performance
    and prospects:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，您正在考虑投资XYZ公司，这是一家科技企业，因其创新产品和强大的市场地位而引起了您的注意。为了评估其投资潜力，您通常会从进行基本面分析开始，检查公司的财务报表，并计算关键财务比率。借助ChatGPT，您可以增强您的分析，并更深入地了解公司的表现和前景：
- en: '**Step 1**: **Gather financial data to start**: Gather the company’s financial
    statements, such as the balance sheet, income statement, and cash flow statement,
    for the past five years. This information will serve as the basis for your fundamental
    analysis and provide the necessary context for ChatGPT to deliver meaningful insights.'
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一步**：**收集财务数据开始**：收集公司过去五年的财务报表，如资产负债表、损益表和现金流量表。这些信息将成为您基本面分析的基础，并为ChatGPT提供有意义的见解的必要背景。'
- en: '**Step 2**: **Calculate the key financial ratios using the financial data**:
    Calculate the essential financial ratios such as the **price-to-earnings** (**P/E**)
    ratio, the debt-to-equity ratio, the **return on equity** (**ROE**), and operating
    margin. These ratios will help you assess the company’s profitability, financial
    stability, and overall performance.'
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二步**：**使用财务数据计算关键财务比率**：计算如**市盈率（P/E）**、资产负债率、**净资产收益率（ROE）**和运营利润率等基本财务比率。这些比率将帮助您评估公司的盈利能力、财务稳定性和整体表现。'
- en: '**Step 3**: **Engage with ChatGPT now that you have the key financial ratios**:
    Engage with ChatGPT to obtain insights and explanations for each ratio. For instance,
    you could ask ChatGPT, “*What does a P/E ratio of 25 mean for Company XYZ, and
    how does it compare to the industry average?*” ChatGPT may respond with an explanation
    of the P/E ratio, its implications for the company, and its relative standing
    within the industry.'
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 3**：**在获得关键财务比率后，现在与 ChatGPT 进行互动**：利用 ChatGPT 获取每个比率的见解和解释。例如，您可以询问 ChatGPT，“*公司
    XYZ 的市盈率（P/E）为 25 表示什么，它与行业平均水平相比如何？*”ChatGPT 可能会提供市盈率的解释、对公司的影响以及其在行业中的相对地位。'
- en: '**Step 4**: **Perform technical analysis in addition to fundamental analysis**:
    You may also want to perform technical analysis to identify trends, patterns,
    and potential entry or exit points for the stock. Examine the stock’s historical
    price and volume data, and use technical indicators such as moving averages, the
    **relative strength index** (**RSI**), and Bollinger Bands. ChatGPT can assist
    in identifying potential price patterns and interpreting technical indicators.
    For example, you could ask, “*What does an RSI of 30 for Company* *XYZ indicate?*”'
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 4**：**在基本面分析的基础上进行技术分析**：除了基本面分析，您还可能想进行技术分析以识别股票的趋势、模式和潜在的入场或出场点。检查股票的历史价格和成交量数据，并使用移动平均线、相对强弱指数（**RSI**）和Bollinger
    Bands等技术指标。ChatGPT可以帮助您识别潜在的价格模式并解释技术指标。例如，您可以询问，“*公司 XYZ 的 RSI 为 30 表示什么？*”'
- en: '**Step 5**: **Combine insights from fundamental and technical analysis**:After
    conducting both fundamental and technical analysis, combine your findings with
    the insights provided by ChatGPT to gain a more comprehensive understanding of
    Company XYZ’s investment potential. Take note of any strengths, weaknesses, opportunities,
    or risks that have emerged during your analysis, and consider how they may impact
    the company’s future performance and stock price.'
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 5**：**结合基本面和技术分析的见解**：在完成基本面和技术分析后，将您的发现与 ChatGPT 提供的见解相结合，以更全面地了解公司 XYZ
    的投资潜力。注意在分析过程中出现的任何优势、劣势、机会或风险，并考虑它们可能如何影响公司的未来表现和股价。'
- en: '**Step 6**: **Make an informed investment decision with the information and
    insights gathered**: You can now make a more informed investment decision about
    *Company XYZ*. If your analysis suggests that the company has strong financials,
    a promising outlook, and a stock price that presents a good entry point, you may
    decide to invest in the company. Conversely, if you identify significant risks
    or concerns, you may choose to hold off on investing or explore alternative investment
    opportunities.'
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 6**：**利用收集到的信息和见解做出明智的投资决策**：现在您可以对 *公司 XYZ* 做出更明智的投资决策。如果您的分析表明公司拥有强劲的财务状况、有前景的展望以及股票价格提供了良好的入场点，您可能决定投资该公司。相反，如果您发现存在重大风险或担忧，您可能选择暂缓投资或探索其他投资机会。'
- en: This practice use case demonstrates how combining traditional financial analysis
    techniques with the power of ChatGPT can help you gain a deeper understanding
    of a company’s investment potential. By leveraging the capabilities of AI-driven
    tools such as ChatGPT, you can enhance your analysis, uncover hidden trends and
    patterns, and make more informed investment decisions in today’s dynamic financial
    landscape.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 这个实际用例展示了如何将传统的财务分析技术与 ChatGPT 的力量相结合，以帮助您更深入地了解公司的投资潜力。通过利用 ChatGPT 等AI驱动工具的能力，您可以增强您的分析，揭示隐藏的趋势和模式，并在当今动态的金融环境中做出更明智的投资决策。
- en: Summary
  id: totrans-329
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: As we conclude [*Chapter 1*](B21008_01.xhtml#_idTextAnchor017), let’s recap
    the key skills and concepts you have learned, which will serve as a foundation
    for the rest of the book. This chapter has provided you with an overview of essential
    financial concepts, investment principles, and various types of financial assets,
    along with an introduction to fundamental and technical analysis methods in finance.
    Additionally, you have been introduced to the transformative power of ChatGPT
    in financial analysis, learning how to harness its capabilities for a more comprehensive
    understanding of financial trends, risks, and opportunities.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束[第一章](B21008_01.xhtml#_idTextAnchor017)时，让我们回顾一下你学到的关键技能和概念，这些将作为本书其余部分的基础。本章为你提供了基本财务概念、投资原则和各类金融资产概述，以及介绍了财务中的基本面和技术分析方法。此外，你还了解了ChatGPT在财务分析中的变革力量，学习了如何利用其能力以更全面地理解财务趋势、风险和机遇。
- en: '**Skills development**: When we refer to “skills development,” we are emphasizing
    the various techniques and competencies that you will acquire throughout the book.
    By working through the chapter, you will learn the following:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: '**技能提升**：当我们提到“技能提升”时，我们强调的是你在整本书中将会获得的各种技术和能力。通过阅读本章，你将学习以下内容：'
- en: '**Understanding basic financial concepts**: Familiarize yourself with the fundamental
    principles of finance, including concepts such as the time value of money, risk
    and return, and diversification'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理解基本财务概念**：熟悉财务的基本原则，包括诸如货币的时间价值、风险与回报以及多元化等概念'
- en: '**Investment principles**: Learn the different types of financial assets, such
    as stocks, bonds, and derivatives, and understand the underlying principles of
    investing, including risk management and portfolio construction'
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资原则**：了解不同类型的金融资产，如股票、债券和衍生品，并理解投资的基本原则，包括风险管理以及投资组合构建'
- en: '**Reading and interpreting financial statements**: Develop the ability to analyze
    a company’s balance sheet, income statement, and cash flow statement to gain insight
    into its financial health and performance'
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**阅读和解读财务报表**：培养分析公司资产负债表、损益表和现金流量表的能力，以洞察其财务状况和业绩'
- en: '**Calculating and analyzing financial ratios and metrics**: Enhance your skills
    in calculating key financial ratios, such as the P/E ratio, debt-to-equity ratio,
    and ROE, and learn to interpret these metrics in the context of evaluating investment
    opportunities'
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算和分析财务比率和指标**：提高计算关键财务比率（如市盈率、资产负债率和ROE）的技能，并学习在评估投资机会的背景下解读这些指标'
- en: '**Differentiating between fundamental and technical analysis**: Understand
    the distinctions between these two approaches to financial analysis, and learn
    how they can complement each other in the investment decision-making process'
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**区分基本面和技术分析**：理解这两种财务分析方法的区别，并学习它们如何在投资决策过程中相互补充'
- en: '**Integrating ChatGPT into financial analysis**: Learn how to effectively engage
    with ChatGPT to obtain AI-driven insights that enhance your financial analysis,
    including interpreting financial ratios, identifying trends, and evaluating investment
    potential'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将ChatGPT整合到财务分析中**：学习如何有效地与ChatGPT互动，以获得增强财务分析的AI驱动的见解，包括解读财务比率、识别趋势和评估投资潜力'
- en: '**Practicing use cases**: Apply the skills you have learned in practical examples,
    such as evaluating the investment potential of a company, using a combination
    of fundamental and technical analysis and ChatGPT insights'
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实践用例**：将你学到的技能应用于实际案例，例如评估公司的投资潜力，结合基本面和技术分析以及ChatGPT的见解'
- en: As you progress through the book, you will continue to develop and refine these
    skills, gaining a deeper understanding of financial analysis techniques and learning
    how to effectively incorporate ChatGPT and Power BI into your financial decision-making
    process. By building on this foundation, you will become a more proficient and
    confident investor, able to navigate the complex world of finance and make more
    informed investment decisions.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你阅读本书的深入，你将继续发展和完善这些技能，对财务分析技术有更深入的理解，并学习如何有效地将ChatGPT和Power BI整合到你的财务决策过程中。在此基础上，你将成为一个更加熟练和自信的投资者，能够驾驭复杂的金融世界，并做出更明智的投资决策。
- en: As we conclude the first chapter on the remarkable capabilities of ChatGPT in
    financial analysis, we’re excited to introduce [*Chapter 2*](B21008_02.xhtml#_idTextAnchor044),
    which will dive into an indispensable tool for the financial world – *Creating
    Financial Narratives with Power BI and ChatGPT*. In the upcoming chapter, you
    will discover how Power BI can help you visualize and analyze financial data with
    unparalleled ease and efficiency, as well as how to effectively integrate ChatGPT’s
    AI-driven insights into your Power BI workflows.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束关于 ChatGPT 在财务分析中非凡能力的第一章后，我们兴奋地介绍 [*第二章*](B21008_02.xhtml#_idTextAnchor044)，它将深入探讨金融世界不可或缺的工具——*使用
    Power BI 和 ChatGPT 创建财务叙事*。在即将到来的章节中，您将发现 Power BI 如何帮助您以无与伦比的轻松和高效方式可视化和分析财务数据，以及如何有效地将
    ChatGPT 的 AI 驱动洞察力整合到您的 Power BI 工作流程中。
- en: '[*Chapter 2*](B21008_02.xhtml#_idTextAnchor044) will guide you through the
    process of leveraging Power BI to create visually stunning dashboards, explore
    key financial metrics, and identify trends and patterns in financial data. We’ll
    also explore captivating real-life examples and scenarios to demonstrate how Power
    BI can transform the way you approach financial analysis, making it more dynamic
    and insightful when combined with the intelligence of ChatGPT.'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第二章*](B21008_02.xhtml#_idTextAnchor044) 将引导您通过利用 Power BI 创建视觉上令人惊叹的仪表板、探索关键财务指标以及识别财务数据中的趋势和模式的过程。我们还将探讨引人入胜的真实案例和场景，以展示
    Power BI 如何改变您进行财务分析的方式，使其与 ChatGPT 的智能相结合时更加动态和有洞察力。'
- en: Whether you’re a seasoned financial professional or a curious newcomer, [*Chapter
    2*](B21008_02.xhtml#_idTextAnchor044) will equip you with the knowledge and skills
    to harness the power of Power BI in your financial analysis, as well as integrate
    ChatGPT’s advanced capabilities for a comprehensive understanding of financial
    data. Prepare to embark on an engaging journey through the world of financial
    data visualization and AI-powered insights, as we unlock the true potential of
    Power BI and ChatGPT in revolutionizing the way we analyze and understand financial
    information. Don’t miss out on this opportunity to elevate your financial analysis
    skills with Power BI and ChatGPT!
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是经验丰富的金融专业人士还是好奇的新手，[*第二章*](B21008_02.xhtml#_idTextAnchor044) 都将为您提供利用 Power
    BI 在财务分析中发挥其力量的知识和技能，以及如何有效地将 ChatGPT 的高级功能整合到对财务数据的全面理解中。准备好开始一段引人入胜的旅程，探索财务数据可视化和人工智能驱动的洞察力世界，我们将解锁
    Power BI 和 ChatGPT 在革命性地分析和理解财务信息方面的真正潜力。不要错过这个机会，利用 Power BI 和 ChatGPT 提升您的财务分析技能！
