- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: The System of Action
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 行动系统
- en: Data is the foundation for turning GenAI into measurable business outcomes.
    AI-enabled capabilities such as vector-encoding of unstructured data, real-time
    synthesis across silos, and agents-in-the-loop are changing *how* we transact
    business. Enterprises that master these capabilities can move from reactive, siloed
    decisions to proactive, intelligence-driven operations, responding to market changes
    in real time, lowering operational expenses, and driving stronger customer outcomes.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是将通用人工智能（GenAI）转化为可衡量的商业成果的基础。AI赋能的能力，如非结构化数据的向量编码、跨部门实时合成以及闭环中的代理，正在改变我们进行商业交易的方式。掌握这些能力的企业可以从被动、孤立的决策转变为主动、智能驱动的运营，实时应对市场变化，降低运营成本，并推动更强大的客户成果。
- en: Augmenting and automating business workflows with agents-in-the-loop places
    increased demands on the underlying data layer. Agents may access and analyze
    a myriad of siloed sources, build rich context, and inform business decisions.
    But where does that context persist? How can business users view, interact with,
    or even edit that information?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 通过闭环中的代理增强和自动化业务工作流程对底层数据层提出了更高的要求。代理可以访问和分析众多孤立的来源，构建丰富的上下文，并告知业务决策。但那个上下文在哪里持续存在？业务用户如何查看、交互或甚至编辑该信息？
- en: 'To support this evolution, enterprises must move beyond static *systems of
    record*, which passively store and serve data, toward dynamic *systems of action*:
    systems designed for real-time decisions, automation, and collaboration between
    humans, AI-assisted users, and fully autonomous agents to *act* on data. While
    traditional systems of record excel at maintaining data integrity and compliance,
    systems of action can autonomously trigger decisions, execute workflows, and learn
    from outcomes. For example, in retail, an AI agent could reorder inventory in
    real time as customer demand shifts.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了支持这一演变，企业必须超越静态的*记录系统*，这些系统被动地存储和提供数据，转向动态的*行动系统*：为实时决策、自动化以及人类、AI辅助用户和完全自主代理之间的协作而设计的系统，以对数据进行*行动*。虽然传统的记录系统在维护数据完整性和合规性方面表现出色，但行动系统可以自主触发决策、执行工作流程并从结果中学习。例如，在零售领域，一个AI代理可以在客户需求变化时实时重新订购库存。
- en: 'This chapter explores how systems of action transform data into decisions:
    a shift that is becoming unavoidable. They must handle data in many forms (from
    original sources and text search indices to vector embeddings) and even LLM inputs
    requiring context-sensitive reranking, a process for prioritizing the most relevant
    results. Meeting those demands requires a unified, contextualized view of enterprise
    data that exceeds what their system of record and *system of insight* predecessors
    can provide. This shift also introduces new challenges in scalability, performance,
    security, and governance.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了行动系统如何将数据转化为决策：这种转变正在变得不可避免。它们必须处理多种形式的数据（从原始来源和文本搜索索引到向量嵌入），甚至需要上下文敏感重排序的LLM输入，这是一个优先排序最相关结果的过程。满足这些需求需要一个统一、上下文化的企业数据视图，这超出了它们的记录系统和*洞察系统*前辈所能提供的。这种转变也带来了可扩展性、性能、安全和治理方面的新挑战。
- en: 'By the end of this chapter, you’ll understand how:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将了解以下内容：
- en: System of action databases support real-time AI and RAG applications by breaking
    traditional data modeling constraints and enabling signal processing with responsive,
    document-based data layers
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行动系统数据库通过打破传统的数据建模约束，并允许使用响应式、基于文档的数据层进行信号处理，支持实时AI和RAG应用
- en: Unified data access enables GenAI to process diverse formats such as source
    data, embeddings, and real-time signals within a coherent framework
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 统一的数据访问使GenAI能够在一致框架内处理多种格式，如源数据、嵌入和实时信号
- en: Data quality and consistency reduce hallucinations and improve reliability through
    full lineage tracking and provenance awareness
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据质量和一致性通过全源追踪和来源意识减少幻觉并提高可靠性
- en: AI-ready data architectures break from traditional warehouses and systems of
    insight, supporting dynamic, multimodel workloads
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准备好的AI数据架构与传统仓库和洞察系统不同，支持动态、多模型工作负载
- en: Governance and security strategies align with AI-specific needs such as privacy,
    access controls, and encryption
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理和安全策略与AI特定的需求相一致，例如隐私、访问控制和加密
- en: Model training and fine-tuning pipelines prepare and optimize data for GenAI
    applications
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型训练和微调管道为GenAI应用准备和优化数据
- en: Implementation patterns follow the flow from signal ingestion through enrichment
    to intelligent response, providing deployment blueprints
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施模式遵循从信号摄取到丰富再到智能响应的流程，提供部署蓝图。
- en: Building an AI-ready data foundation
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 建立AI就绪的数据基础。
- en: Delivering on the promise of systems of action requires a new kind of data foundation—one
    built for speed, context, and adaptability.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 履行行动系统的承诺需要一个全新的数据基础——一个为速度、上下文和适应性而构建的数据基础。
- en: Agentic AI systems fundamentally differ from traditional systems of record in
    their operational demands. Where legacy systems focus on capturing and storing
    historical transactions, systems of action powered by agentic AI require real-time
    decision-making, dynamic data synthesis, and immediate response capabilities.
    This shift demands that our data architecture choices move beyond the rigid, siloed
    structures of traditional enterprise systems.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 代理AI系统在运营需求上与传统记录系统有根本的不同。传统系统侧重于捕获和存储历史交易，而由代理AI驱动的行动系统需要实时决策、动态数据综合和即时响应能力。这种转变要求我们的数据架构选择超越传统企业系统的僵化、孤岛式结构。
- en: A unified view of core enterprise is essential. It must bring together the diverse
    data types that autonomous agents rely on (real-time operational signals, contextual
    documents, vector embeddings) into a single, coherent platform. That platform
    must be built on flexible data structures that can adapt as agent behaviors evolve.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 对核心企业的统一视图至关重要。它必须将自主代理依赖的多种数据类型（实时运营信号、上下文文档、向量嵌入）整合到一个单一、连贯的平台中。该平台必须建立在灵活的数据结构之上，能够随着代理行为的演变而适应。
- en: 'The transition from supporting passive systems of record to enabling active
    systems of action introduces six critical architectural requirements that distinguish
    agentic AI infrastructure from legacy approaches:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 从支持被动记录系统到启用主动行动系统的转变，引入了六个关键架构要求，这些要求将代理AI基础设施与旧方法区分开来：
- en: '**Unified data access** to eliminate the complexity of managing multiple disparate
    datastores'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统一数据访问**以消除管理多个不同数据存储的复杂性。'
- en: '**Data quality and consistency** mechanisms that reduce hallucinations and
    errors from systems out of sync'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据质量和一致性**机制，减少不同步系统中的幻觉和错误。'
- en: '**Real-time context** capabilities that enable immediate signal processing
    for RAG applications'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时上下文**能力，使RAG应用能够立即处理信号。'
- en: '**Scalability and performance** characteristics that support operational AI
    rather than only backward-looking analytics'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性和性能**特征支持操作AI，而不仅仅是面向后视镜的分析。'
- en: '**Governance and security** frameworks that protect sensitive information while
    enabling innovation'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理和安全**框架在保护敏感信息的同时促进创新。'
- en: '**Efficient model training workflows** that optimize data preparation for GenAI
    applications'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效的模型训练工作流程**，优化数据准备以适应GenAI应用。'
- en: Together, these elements form the data foundation for autonomous, intelligent
    systems. As we examine each in the sections ahead, we’ll see how a system of action
    database departs from traditional data management and enables more intelligent,
    responsive, and scalable AI applications.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这些元素共同构成了自主、智能系统的数据基础。在接下来的章节中，我们将逐一审视这些元素，了解行动系统数据库如何与传统数据管理不同，并使更智能、响应更快、可扩展性更强的AI应用成为可能。
- en: What is a system of action?
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是行动系统？
- en: Systems of action are a new class of enterprise application, designed to execute
    decisions and drive workflows in real time. They enable collaboration between
    people, AI-assisted users, and AI agents, supporting everything from assisted
    decision-making to fully autonomous execution.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 行动系统是一类新的企业应用，旨在实时执行决策和驱动工作流程。它们使人们、AI辅助用户和AI代理之间的协作成为可能，支持从辅助决策到完全自主执行的一切。
- en: Unlike systems of record, which passively store historical transactions, or
    systems of insight, which analyze data retrospectively, systems of action operate
    in the moment. They process dynamic context, trigger decisions, and execute tasks
    through AI agents. For instance, they might reroute a delayed flight in real time
    or automatically adjust hospital staffing during a sudden surge.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 与被动存储历史交易的记录系统或回顾性分析数据的洞察系统不同，行动系统在当下运作。它们处理动态环境，触发决策，并通过AI代理执行任务。例如，它们可能会实时重新安排延误的航班或自动调整医院的人事配置以应对突发高峰。
- en: Building systems of action requires more than analytical capabilities. They
    must ingest streaming signals, reason across unstructured and structured sources,
    and respond in real time. They require specialized database architectures capable
    of managing high-velocity, multimodal data streams and supporting complex state
    transitions over time. Most legacy systems, designed for static, batch-oriented
    workflows, simply cannot support this kind of continuous intelligence.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 构建行动系统需要不仅仅是分析能力。它们必须摄取流信号，跨非结构化和结构化来源进行推理，并实时响应。它们需要能够管理高速、多模态数据流并支持随时间复杂状态转换的专用数据库架构。大多数传统系统，设计用于静态、批量导向的工作流程，根本无法支持这种持续智能。
- en: '![](img/B34136_03_01.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_03_01.png)'
- en: 'Figure 3.1: Enterprise system landscape: from system of record to system of
    action'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1：企业系统景观：从记录系统到行动系统
- en: '*Figure 3.1* illustrates this evolution across the enterprise landscape. Unlike
    traditional systems that passively store or retrospectively analyze data, systems
    of action enable real-time interaction between users, applications, and agents;
    all powered by a live, adaptable data layer.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '*图3.1*展示了企业景观中的这种演变。与被动存储或回顾性分析数据的传统系统不同，行动系统使用户、应用程序和代理之间能够进行实时交互；这一切都由一个实时、可适应的数据层提供支持。'
- en: Unified data access architecture
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统一数据访问架构
- en: The foundation of any GenAI system begins with access to diverse, multimodal
    data, at speed, in formats AI can reason with. Unfortunately, this is also where
    most enterprises struggle. Traditional enterprise data architectures are fragmented
    across dozens of incompatible systems, each optimized for narrow use cases. The
    result is integration pain, access friction, and massive overhead.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 任何GenAI系统的基石始于对多样化、多模态数据的快速访问，这些数据是AI可以推理的格式。不幸的是，这也是大多数企业挣扎的地方。传统的企业数据架构在数十个不兼容的系统之间是碎片化的，每个系统都针对狭窄的用例进行了优化。结果是集成痛苦、访问摩擦和巨大的开销。
- en: 'Modern AI applications demand a fundamental departure: unified access must
    be treated not as a convenience but as a prerequisite.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现代AI应用需要根本性的转变：统一访问必须被视为一个前提条件，而不仅仅是便利性。
- en: 'Today’s models must navigate a wide variety of inputs: text documents, application
    logs, product catalogs, support transcripts, and streaming sensor data. Relational
    and legacy systems often store semi-structured data (like JSON or XML) as **binary
    large objects** (**BLOBs**) or **character large objects** (**CLOBs**), limiting
    their usability for AI systems. In these cases, the actual data is hidden inside
    a single entry and must be extracted and interpreted before it can be reasoned
    over or acted upon. This was tolerable when the goal was to store and retrieve
    files. But for GenAI systems, where models need immediate access to both structured
    and semi-structured data, often in the same query, this format becomes a bottleneck.
    Even a video can have its own addressable metadata structure, rather than existing
    solely as an opaque BLOB, illustrates the shift needed to support AI-native reasoning.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的模型必须导航各种输入：文本文档、应用程序日志、产品目录、支持记录和流传感器数据。关系型和传统系统通常将半结构化数据（如JSON或XML）存储为**二进制大对象**（**BLOBs**）或**字符大对象**（**CLOBs**），这限制了它们在AI系统中的可用性。在这些情况下，实际数据隐藏在单个条目中，必须在推理或操作之前提取和解释。当目标是存储和检索文件时，这是可以容忍的。但对于GenAI系统，其中模型需要立即访问结构化和半结构化数据，通常在同一个查询中，这种格式成为了一个瓶颈。甚至视频也可以有自己的可寻址元数据结构，而不是仅仅作为一个不透明的BLOB存在，这说明了为了支持AI原生推理所需的转变。
- en: 'Beyond the format problem lies a more urgent challenge: **fragmentation**.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 格式问题之外，还有一个更加紧迫的挑战：**碎片化**。
- en: 'An AI application might need to stitch together context from a CRM (customer
    profiles and account hierarchies), a product catalog (SKU-level details, pricing,
    availability), a data warehouse (historical transactions), a streaming platform
    (real-time behavioral signals), and a document store (contracts, support transcripts,
    policy documents). Each source has its own schema, access pattern, and often its
    own API. This complexity creates two persistent challenges:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 一个AI应用可能需要将来自CRM（客户资料和账户层级）、产品目录（SKU级细节、定价、可用性）、数据仓库（历史交易）、流平台（实时行为信号）和文档存储（合同、支持记录、政策文件）的上下文拼接起来。每个来源都有自己的模式、访问模式和通常自己的API。这种复杂性产生了两个持续的挑战：
- en: '**Developer integration friction**: Each layer introduces its own headaches,
    from authentication and authorization to schema mismatches, brittle connectors,
    and inconsistent formats'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发者集成摩擦**：每一层都引入了自己的问题，从身份验证和授权到模式不匹配、脆弱的连接器和不一致的格式。'
- en: '**System fragility/maintenance drag**: Over time, these integrations accumulate,
    introducing silent failures, versioning issues, and downstream reliability risks
    that make innovation slower and more expensive'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统脆弱性/维护拖累**：随着时间的推移，这些集成会积累，引入无声的故障、版本问题以及下游可靠性风险，使创新变得缓慢且成本高昂。'
- en: MongoDB’s document model takes a fundamentally different approach. Instead of
    forcing diverse data into rigid schemas or hiding it in unreadable blobs, it enables
    rich, hierarchical data structures that mirror how businesses actually operate
    [1]. Developers can model a full customer, order, or event in a single document,
    including nested context, version history, and behavioral attributes. This eliminates
    the need for complex joins while preserving the relationships critical for effective
    agentic reasoning.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB的文档模型采用了根本不同的方法。它不是将多样化的数据强制纳入僵化的模式或隐藏在难以阅读的块中，而是启用丰富、层次化的数据结构，这些结构反映了企业实际运作的方式
    [1]。开发者可以在单个文档中建模完整的客户、订单或事件，包括嵌套上下文、版本历史和行为属性。这消除了复杂连接的需求，同时保留了有效代理推理所需的关键关系。
- en: Even more critically, *flexible schema design*, meaning the ability to store
    and query data without locking into a rigid blueprint, allows fields and document
    shapes to adapt as requirements change. This lets data evolve—new attributes can
    be added without downtime, and new types of signals can be integrated without
    costly migrations. For AI systems (especially those that learn, adapt, and extend
    themselves), this agility is essential.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，**灵活的架构设计**，即存储和查询数据而不锁定在僵化的蓝图中的能力，允许字段和文档形状随着需求的变化而适应。这使得数据可以进化——可以添加新的属性而无需停机，并且可以集成新的信号类型而无需昂贵的迁移。对于AI系统（尤其是那些学习、适应和扩展自己的系统），这种敏捷性是必不可少的。
- en: This architectural convergence enables structured transactions, real-time signals,
    and unstructured content together in a single query or operation. Model updates,
    enrichment jobs, or downstream agent actions can all be triggered directly from
    the same data platform [2]. That unified model lays the groundwork for sophisticated,
    AI-native workflows.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构的趋同使得结构化事务、实时信号和非结构化内容可以在单个查询或操作中一起实现。模型更新、丰富作业或下游代理操作都可以直接从相同的数据平台 [2]
    触发。这种统一模型为复杂的、AI原生的工作流程奠定了基础。
- en: Perhaps more importantly, unified data access transforms developer productivity.
    Instead of spending cycles reconciling formats or debugging brittle connectors,
    teams can focus on building intelligent systems. And, as we’ll see in the sections
    ahead, everything from data quality and governance to real-time orchestration
    builds on this foundation.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 可能更重要的是，统一的数据访问改变了开发者的生产力。而不是花费周期来协调格式或调试脆弱的连接器，团队可以专注于构建智能系统。而且，正如我们将在接下来的章节中看到的，从数据质量和治理到实时编排的一切都建立在这个基础上。
- en: Ensuring data quality and consistency
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 确保数据质量和一致性
- en: Data quality and consistency are non-negotiable for GenAI solutions. Unlike
    traditional analytics, where data quality issues might simply yield incorrect
    reports or delayed insights, poor data quality in AI systems can cause hallucinations,
    introduce biased outputs, and fundamentally unreliable behavior that undermines
    user trust and business value.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 对于生成式AI解决方案，数据质量和一致性是不可或缺的。与传统的分析不同，数据质量问题可能会产生错误的报告或延迟的洞察，而在AI系统中，数据质量差可能导致幻觉、引入有偏的输出，以及从根本上不可靠的行为，这损害了用户信任和商业价值。
- en: 'Legacy quality approaches tried to solve this through normalization, deduplication,
    and validation against external sources. Consider a familiar failure mode: a system
    validates `Joe Miller, 12 High` Street, through postal APIs and credit checks,
    yet fails to distinguish between three different Joe Millers (grandfather, father,
    and son) at the same address. For entity analytics, where precise relationship
    mapping matters, this is a critical flaw.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的质量方法试图通过规范化、去重和与外部来源的验证来解决这一问题。考虑一个熟悉的失败模式：一个系统通过邮政API和信用检查验证了“Joe Miller，12
    High Street”，却无法区分同一地址上的三位不同的Joe Miller（祖父、父亲和儿子）。对于需要精确关系映射的实体分析，这是一个关键的缺陷。
- en: In this scenario, an online store might unknowingly treat all three individuals
    as the same customer, losing the ability to tailor interactions or offers. Relational
    star schemas exacerbate this problem by fragmenting contextual information across
    multiple tables. When customer data is split between fact tables, dimension tables,
    and lookup tables, the rich context that enables accurate entity resolution becomes
    scattered and difficult to reconstruct.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，在线商店可能无意中将三位个体视为同一客户，从而失去了定制互动或提供优惠的能力。关系星型模式通过在多个表中分割上下文信息而加剧了这个问题。当客户数据在事实表、维度表和查找表之间分割时，能够实现准确实体解析的丰富上下文变得分散且难以重建。
- en: In our Joe Miller example, a document-based approach would maintain separate
    documents for each individual, complete with detailed demographic information,
    purchase history, behavioral patterns, and relationship data that enables clear
    differentiation.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的Joe Miller示例中，基于文档的方法将为每个个体维护单独的文档，包括详细的人口统计信息、购买历史、行为模式和关系数据，这些数据能够实现清晰的区分。
- en: Within a document, you can store original values alongside enrichments and enhancements
    within the same dataset. This approach improves output reliability and reduces
    hallucinations or contradictory results. When an AI system generates an output,
    the complete chain of data sources, transformations, and reasoning steps can be
    traced back through the document structure, enabling both debugging and compliance
    reporting.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在文档中，您可以在同一数据集中存储原始值以及增强和改进的内容。这种方法提高了输出可靠性并减少了幻觉或矛盾的结果。当人工智能系统生成输出时，可以通过文档结构追溯整个数据源、转换和推理步骤的完整链，从而实现调试和合规性报告。
- en: This lineage capability proves essential for improving output reliability and
    reducing hallucinations or contradictory results. When AI models can access not
    just the current state of data but also its provenance and transformation history,
    they can make more informed decisions about data reliability and confidence levels.
    For example, customer service AI might weigh recent direct customer interactions
    more heavily than older inferred preferences, or flag potential inconsistencies
    when multiple data sources provide conflicting information.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这种血缘能力对于提高输出可靠性并减少幻觉或矛盾的结果至关重要。当人工智能模型不仅可以访问数据的当前状态，还可以访问其来源和转换历史时，它们可以做出更明智的数据可靠性和置信水平决策。例如，客户服务人工智能可能会更重视最近的直接客户互动，而不是较老的推断偏好，或者当多个数据源提供冲突信息时，标记潜在的不一致性。
- en: For organizations implementing document-based data quality strategies, MongoDB
    offers comprehensive best practices, as well as compatibility with industry-leading
    tooling for data modeling and cataloging that make advanced quality management
    achievable at scale [3]. When high-quality, lineage-aware data becomes the default,
    AI systems can deliver results that are accurate, explainable, and trustworthy.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 对于实施基于文档的数据质量策略的组织，MongoDB提供了全面的最佳实践，以及与行业领先的数据建模和编目工具的兼容性，这使得大规模的高级质量管理成为可能[3]。当高质量、具有血缘感知的数据成为默认设置时，人工智能系统可以提供准确、可解释和值得信赖的结果。
- en: Real-time context and RAG
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实时上下文和RAG
- en: The definition of *real-time* varies significantly by use case and industry,
    but the real-time requirements of data in use with GenAI cannot be overstated.
    Hedge fund trading systems, for example, require millisecond responses, while
    life insurance underwriting processes measure time in days. While application
    response times continue to decrease, many architectures use caching layers that
    create an illusion of real-time performance at the expense of freshness of data.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: “实时”的定义因用例和行业而异，但与生成人工智能（GenAI）一起使用的数据的实时需求不容忽视。例如，对冲基金交易系统需要毫秒级响应，而人寿保险承保流程的时间以天为单位衡量。虽然应用响应时间持续下降，但许多架构使用缓存层，以牺牲数据新鲜度为代价，创造出实时性能的假象。
- en: A typical real-time environment follows a simple pattern where an interaction
    generates a signal that enables immediate interpretation. These signals may originate
    from diverse sources, such as a retail website recording shopping cart additions,
    a smart meter transmitting electricity usage, or a pathology lab completing cancer
    analysis data. All signals, when combined with existing datasets, enable text
    search, vector search, and LLM processing for reasoning and causal analysis. This
    applies equally to interactive systems, such as retail shopping carts, and autonomous
    agentic systems, such as automated insurance claim processing.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的实时环境遵循一个简单的模式，即交互产生一个信号，该信号能够实现即时解释。这些信号可能来自不同的来源，例如记录购物车添加的零售网站、传输电力使用情况的智能电表，或完成癌症分析数据的病理实验室。所有信号，当与现有数据集结合时，能够实现文本搜索、向量搜索和LLM推理及因果分析。这同样适用于交互式系统，如零售购物车，以及自主代理系统，如自动保险索赔处理系统。
- en: Real-time integration of signals with metadata, reference data, and historical
    information generates new knowledge instantaneously. Consider how this has evolved.
    Traditional rule-based systems might suggest `"You ordered a burger`, `would you
    like fries?"` In contrast, an AI-powered system recognizes patterns such as `"You
    order cat food bi-weekly`,`always the same brand"`, and reasons contextually with
    suggestions such as `"Based on your purchase history`, `you might be interested
    in our new`, `healthier formula`. `Would you like us to send you a free sample?``"`
    The system identifies repeat customers and enhances their experience through reasoning
    that connects purchase patterns with product recommendations, requiring deeper
    knowledge about customer preferences and pet characteristics.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 实时将信号与元数据、参考数据和历史信息集成，可以瞬间生成新的知识。考虑一下这种演变。传统的基于规则的系统可能会建议“你订购了一个汉堡，想要薯条吗？”相比之下，一个由AI驱动的系统可以识别出诸如“你每两周订购一次猫粮，总是同一品牌”这样的模式，并通过与产品推荐相关的推理进行情境化思考，例如“根据你的购买历史，你可能对我们的新、更健康的配方感兴趣。你想我们给你发送免费样品吗？”系统通过将购买模式与产品推荐联系起来，识别重复客户并增强他们的体验，这需要更深入地了解客户偏好和宠物特征。
- en: '![](img/B34136_03_02.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_03_02.png)'
- en: 'Figure 3.2: Real-time AI data flow'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2：实时AI数据流
- en: 'The architectural flow in *Figure 3.2* demonstrates how modern AI applications
    process real-time signals through a system of action database using an airline
    passenger assistance scenario. The flow begins with diverse signal sources on
    the left: **Passenger Check-In**, **Booking Systems**, **Weather Services**, and
    **Flight Status Updates**, which feed into **Signal Processing** and **Format
    Conversion**/**Real-Time Capture** components. These signals are then ingested
    into the central **MongoDB Document Store**, which contains **Flight Documents**,
    **Passenger Vectors**, **Booking Metadata**, and **Historical Patterns** with
    **Direct Vector Access** capabilities.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*图3.2*中的架构流程展示了现代AI应用如何通过使用行动数据库系统处理实时信号，以航空旅客辅助场景为例。流程从左侧的多种信号源开始：**旅客登机**、**预订系统**、**天气服务**和**航班状态更新**，这些信号输入到**信号处理**和**格式转换/实时捕获**组件。然后，这些信号被摄入到中央的**MongoDB文档存储库**中，该存储库包含**航班文档**、**旅客向量**、**预订元数据**和**历史模式**，并具有**直接向量访问**功能。'
- en: 'The system processes this data through **Atlas Vector Search** (finding similar
    flight disruptions) and **LLM Augmentation** (generating personalized responses
    with flight context) to produce three types of intelligent outputs: **Re-Booking
    Confirmations**, **Personalized Options**, and **Automated Responses**. At the
    foundation sits the **Operational Data Layer** (**ODL**), an architectural pattern
    that centrally integrates and organizes siloed enterprise data, serving as an
    intermediary between existing data sources and consuming applications. In this
    case, the ODL enriches signals with contextual information from passenger records,
    alternative flights, weather data, and rebooking history.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 系统通过**Atlas向量搜索**（寻找类似的航班中断）和**LLM增强**（生成具有航班上下文的个性化响应）来处理这些数据，以产生三种类型的智能输出：**重新预订确认**、**个性化选项**和**自动响应**。基础是**操作数据层**（**ODL**），这是一种将孤岛化企业数据集中整合和组织的架构模式，作为现有数据源和消费应用之间的中介。在这种情况下，ODL通过乘客记录、替代航班、天气数据和重新预订历史中的上下文信息丰富信号。
- en: A continuous learning and enrichment feedback loop ensures that every interaction
    outcome, whether accepted re-bookings or user preferences, flows back to improve
    future recommendations. The document model enables continuous enhancement without
    requiring system restructuring, creating a system that grows smarter with each
    passenger interaction while delivering real-time, context-aware responses vital
    for modern AI applications.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 持续学习和丰富反馈循环确保每一次交互结果，无论是接受重新预订还是用户偏好，都能回流以改善未来的推荐。文档模型允许持续增强而不需要系统重构，创建一个随着每位乘客交互而变得更聪明的系统，同时提供对现代人工智能应用至关重要的实时、上下文感知的响应。
- en: 'Critically, the feedback loop ensures continuous improvement, ensuring every
    interaction outcome enriches the system of action database, making future responses
    more accurate and contextual. This circular flow embodies the key advantage of
    document-based architectures: *the ability to evolve and improve without the schema
    rigidity that constrains traditional relational systems*. The result is a system
    that grows smarter with each interaction, delivering real-time, context-aware
    responses that modern AI applications require.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，反馈循环确保持续改进，确保每一次交互结果丰富动作数据库系统，使未来的响应更加准确和具有上下文。这种循环流动体现了基于文档架构的关键优势：*能够在没有约束传统关系系统的模式刚性下演变和改进的能力*。结果是，系统随着每一次交互变得更聪明，提供现代人工智能应用所需的实时、上下文感知的响应。
- en: Scalability, availability, and performance
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可扩展性、可用性和性能
- en: Historically, enterprise data warehouses represented the largest database implementations,
    with denormalized, column-oriented star schemas designed for analytical queries.
    These systems perform well with queries such as `"Display yogurt sales by region"`,
    where large datasets are filtered by specific criteria (region, store, price)
    to generate insights. The integration of multiple sources led to the development
    of **extract**, **transform**, **load** (**ETL**) processes and master data management
    systems. While these platforms have added machine learning features and now claim
    to support GenAI capabilities, they remain primarily designed for backward-looking
    analytical tools, unsuited to real-time, agentic, and causal AI applications.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 从历史上看，企业数据仓库代表了最大的数据库实现，具有为分析查询设计的去规范化、列导向的星型模式。这些系统在执行如“按地区显示酸奶销售”之类的查询时表现良好，其中大型数据集通过特定标准（地区、商店、价格）进行筛选以生成见解。多个来源的集成导致了**提取**、**转换**、**加载**（**ETL**）过程和主数据管理系统的开发。虽然这些平台增加了机器学习功能，并声称支持生成人工智能能力，但它们仍然主要设计为面向后视的分析工具，不适合实时、代理和因果人工智能应用。
- en: Consider the contrast. A chatbot assisting an airline passenger who missed a
    connection requires fundamentally different capabilities than answering `"How
    many passengers experienced day-long delays in Frankfurt last year?"` The chatbot
    and its underlying agentic system must address immediate needs, finding available
    seats, offering mitigation services, and responding empathetically to frustrated
    passengers. The required data is real-time, context-sensitive, and simply not
    available from a historic warehouse.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑对比。一个帮助错过航班的航空乘客的聊天机器人需要与回答“去年有多少乘客在法兰克福经历了全天延误？”的问题有根本不同的能力。聊天机器人和其背后的代理系统必须解决即时需求，找到可用座位，提供缓解服务，并对沮丧的乘客表示同情。所需的数据是实时、上下文敏感的，并且简单地无法从历史仓库中获得。
- en: To be successful in the request for the passenger, the system needs both real-time
    seat information access (easy to achieve with an API to the usual booking systems),
    as well as more important detailed context and information about the passenger
    and their situation. Is it a family stranded, or a single adult? What other ticket
    dependencies exist? Can the passenger be rerouted via a different track, or is
    the best option to stay overnight?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 要在乘客请求中取得成功，系统需要实时座位信息访问（通过通常的预订系统API容易实现），以及更重要的关于乘客及其情况的详细上下文和信息。是家庭滞留，还是单身成人？存在哪些其他票务依赖？乘客能否通过不同的轨道重新路由，或者最好的选择是过夜？
- en: This scenario demands that all passenger data reside in an up-to-date system
    of action database, as real-time interactions fail without current information.
    As these systems achieve global coverage, non-functional requirements mandate
    not only 24/7/365 availability but also the ability to handle transaction volume
    fluctuations from quiet periods to peak travel seasons such as Thanksgiving. Even
    minimal outages become unacceptable, and caching solutions that simply solve a
    data availability challenge compromise on data *accuracy* by introducing data
    staleness issues.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这种场景要求所有乘客数据都驻留在最新的动作数据库系统中，因为没有当前信息，实时交互将失败。随着这些系统实现全球覆盖，非功能性需求不仅要求24/7/365的可用性，还要能够处理从平静时期到高峰旅游季节（如感恩节）的交易量波动。即使是微小的中断也变得不可接受，而仅仅解决数据可用性挑战的缓存解决方案，通过引入数据陈旧问题，在数据*准确性*上做出了妥协。
- en: Document-based architectures, such as those provided by MongoDB, offer advantages
    in specific scenarios for this type of data availability and scalability. Rather
    than requiring complex joins across multiple tables to reconstruct user context,
    document models can store complete contextual information in a single, efficiently
    retrievable record. This approach reduces the computational overhead of context
    reconstruction while enabling more sophisticated caching and optimization strategies.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 基于文档的架构，如MongoDB所提供的，在特定场景下为这种数据可用性和可扩展性提供了优势。与需要跨多个表进行复杂连接以重建用户上下文不同，文档模型可以在单个、高效可检索的记录中存储完整的上下文信息。这种方法减少了上下文重建的计算开销，同时使更复杂的缓存和优化策略成为可能。
- en: The performance characteristics of AI workloads also differ significantly from
    traditional analytical patterns. While analytical queries typically process large
    volumes of data to generate aggregate results, AI applications often require rapid
    access to specific, contextually relevant information. This pattern favors architectures
    optimized for high-concurrency, low-latency access to individual records, rather
    than bulk processing of large datasets.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能工作负载的性能特征与传统分析模式也显著不同。虽然分析查询通常处理大量数据以生成汇总结果，但人工智能应用程序通常需要快速访问特定、上下文相关的信息。这种模式有利于优化为高并发、低延迟访问单个记录的架构，而不是大量数据集的批量处理。
- en: Governance, security, and compliance
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 治理、安全和合规
- en: Governance and compliance requirements stem from a fundamental need to protect
    individuals from flawed decision-making in systems that lack adequate self-regulation.
    These safeguards exist to prevent real harms, from biased loan approvals to unsafe
    product recommendations.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 治理和合规要求源于保护个人免受缺乏足够自我调节的系统中的错误决策的基本需求。这些保障措施旨在防止真正的危害，从有偏见的贷款审批到不安全的产品推荐。
- en: GenAI faces intense scrutiny regarding accuracy, with media coverage of hallucinations
    bringing this concern to the forefront. Therefore, transparency in data lineage,
    reasoning processes, and result interpretation becomes critical for any GenAI
    solution. The document model in a system of action database enables tracking of
    all changes, transformations, and actions related to specific datasets. Unlike
    legacy relational databases, documents offer the flexibility for enhancement and
    enrichment throughout the process without requiring upfront planning.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 通用人工智能（GenAI）在准确性方面面临严格的审查，媒体对幻觉的报道将这一担忧推到了前台。因此，对于任何通用人工智能解决方案来说，数据来源、推理过程和结果解释的透明度变得至关重要。动作数据库系统中的文档模型能够跟踪与特定数据集相关的所有更改、转换和操作。与传统的关联数据库不同，文档在整个过程中提供了增强和丰富性的灵活性，而无需预先规划。
- en: From a governance perspective, this enables precise and comprehensive tracking
    of communication and decision-making processes. It facilitates decision auditing
    and corrective actions when compliance challenges arise, often due to gradual
    shifts in decision criteria requiring adjustment.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 从治理的角度来看，这使精确和全面跟踪沟通和决策过程成为可能。当出现合规挑战时，它促进了决策审计和纠正措施，通常是由于决策标准逐渐变化需要调整。
- en: Security represents an additional critical dimension. MongoDB’s Queryable Encryption
    keeps data absolutely protected from unauthorized access. While passenger data
    may have moderate sensitivity, healthcare provider consultations about potential
    illnesses require the highest security levels. The system of action database enables
    transparent security implementation, significantly more challenging when coordinating
    multiple data sources with potentially incompatible security and policy systems
    [4].
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性代表了一个额外的关键维度。MongoDB的可查询加密确保数据绝对安全，不受未经授权的访问。虽然乘客数据可能具有适度的敏感性，但关于潜在疾病的医疗提供者咨询需要最高的安全级别。动作数据库系统使得透明安全实施成为可能，这在协调具有可能不兼容的安全和政策系统的多个数据源时更具挑战性[4]。
- en: Model training and fine-tuning
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型训练和微调
- en: Training or fine-tuning models requires large volumes of clean, labeled, and
    diverse data. The system of action database ensures efficient data curation, sampling,
    and preprocessing for training pipelines. Data enrichment becomes key, as features
    such as MongoDB’s aggregation pipeline enable data annotation and continuous analysis
    of criteria such as minimum or maximum values and moving averages to validate
    reasoning processes.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 训练或微调模型需要大量干净、标记和多样化的数据。动作数据库系统确保了训练管道的高效数据整理、采样和预处理。数据丰富变得至关重要，因为像MongoDB的聚合管道这样的功能使得数据标注和持续分析诸如最小值、最大值和移动平均数等标准成为可能，以验证推理过程。
- en: The subject of data preparation for GenAI is often misunderstood, stemming from
    the evolution of early AI solutions supporting ML systems (systems that were derived
    from **business intelligence** (**BI**) architectures). This sometimes leads to
    the mistaken assumption that all data for AI usage and interaction must first
    be prepared, or readied, in lakes, warehouses, or marts, requiring extensive transformation
    and data pipeline processing. The resulting data objects are often stored as star
    schemas with fact tables, each containing hundreds of columns and accompanying
    dimension tables. Star schemas, a data modeling format originally designed to
    solve the problem of performant analytics queries executed against relational
    database objects, introduce the need for complex queries and join operations to
    extract insight, an architecture still employed by platforms such as Snowflake.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 对于生成式AI的数据准备这一主题常常被误解，这源于早期支持机器学习系统（源自**商业智能**（**BI**）架构的系统）的AI解决方案的演变。这有时会导致错误的假设，即所有用于AI使用和交互的数据都必须首先在湖、仓库或集市中准备或准备好，需要大量的转换和数据管道处理。结果数据对象通常以包含数百列和伴随的维度表的形式存储为星型模式，每个维度表都包含事实表。星型模式，这是一种最初设计用来解决针对关系数据库对象执行高效分析查询的数据建模格式，引入了需要复杂查询和连接操作来提取洞察的需求，这种架构仍然被Snowflake等平台采用。
- en: Apache Spark object-storage implementations, such as Databricks, offer more
    complex query capabilities through distributed computing frameworks and in-memory
    processing, representing a significant advancement over traditional batch processing
    systems. Both approaches, star schemas and Spark-manipulated object storage files,
    share a foundation in backward-looking data warehousing, regardless of contemporary
    terminology such as *data lake* or *lakehouse*.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Apache Spark对象存储实现，例如Databricks，通过分布式计算框架和内存处理提供更复杂的查询能力，这比传统的批量处理系统有显著进步。这两种方法，星型模式和Spark操作的对象存储文件，无论当代术语如*数据湖*或*湖屋*如何，都基于向后看的数据仓库。
- en: These systems are optimized for processing large volumes of homogeneous data
    aligned along dimensional axes. Real-time access to individual datasets for operational
    processing falls outside their design parameters. Historically, this was the realm
    of **online transaction processing** (**OLTP**) systems. While transactional logging
    isn’t central to GenAI data structures, the access patterns remain similar.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这些系统针对处理沿维度轴对齐的大量同质数据进行优化。对于操作处理，对单个数据集的实时访问超出了它们的设计参数。历史上，这曾是**在线事务处理**（**OLTP**）系统的领域。虽然事务日志不是生成式AI数据结构的核心，但访问模式仍然相似。
- en: Often, the example of building models for embeddings is referenced as justification
    for why the data warehouse must be the source of data for GenAI, but this is misleading.
    Firstly, many business solutions successfully deploy standard embedding models
    for PDFs, images, and audio, without the need for custom development. Secondly,
    and more importantly, the comparison doesn’t hold, as warehouses analyzing quarterly
    sales have no relevance to point-of-sale operations and transaction booking.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，构建嵌入模型示例被引用为数据仓库必须成为GenAI数据来源的理由，但这是一种误导。首先，许多商业解决方案成功部署了标准嵌入模型用于PDF、图像和音频，而不需要定制开发。其次，更重要的是，这种比较并不成立，因为分析季度销售的仓库与销售点和交易登记无关。
- en: Practical considerations for AI data design
  id: totrans-81
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI数据设计的实际考虑
- en: 'While the theoretical foundations of system of action databases provide the
    conceptual framework for AI-ready system of action architectures, successful implementation
    requires attention to practical design principles and operational realities. This
    section examines three critical aspects that determine the success of real-world
    GenAI implementations: the fundamental importance of well-structured and organized
    data, patterns of data movement through AI systems, and the operational considerations
    necessary for deploying and maintaining these architectures at scale.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然动作数据库系统的理论基础为AI就绪的动作架构提供了概念框架，但成功的实施需要关注实际的设计原则和运营现实。本节探讨了决定现实世界GenAI实施成功与否的三个关键方面：结构良好和组织有序的数据的基本重要性、数据通过AI系统的流动模式，以及部署和维护这些架构所需的运营考虑。
- en: A good data structure is critical
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个好的数据结构至关重要
- en: Well-organized data, such as documents, indexes, and embeddings, enable fast
    and relevant information access, essential for RAG.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 组织良好的数据，如文档、索引和嵌入，能够实现快速和相关的信息访问，这对于RAG至关重要。
- en: In contrast, traditional relational database storage patterns create fundamental
    impedance mismatches with GenAI applications, which require unified, contextually
    rich data objects that preserve semantic relationships and business meaning. When
    business entities span reference data, metadata, and operational information across
    multiple normalized tables, extensive join operations and additional application-layer
    code are often required to reconstruct fragmented data into coherent business
    objects, ready for AI processing. This relational fragmentation not only degrades
    query performance and increases system complexity but also obscures the natural
    data relationships essential for effective AI consumption, creating artificial
    boundaries that require ongoing maintenance of interdependent schema relationships.
    Consequently, GenAI applications demand data architectures that can natively represent
    complex, hierarchical business entities without extensive reconstruction logic,
    favoring document-based architectures that align more naturally with how AI models
    consume data and that is, rich, contextual objects, rather than decomposed, normalized
    fragments.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，传统的关系型数据库存储模式与GenAI应用之间存在根本性的阻抗不匹配，这些应用需要统一、上下文丰富的数据对象，以保留语义关系和业务意义。当业务实体跨越多个规范化表中的参考数据、元数据和运营信息时，通常需要大量的连接操作和额外的应用层代码来将碎片化的数据重构为连贯的业务对象，以便AI处理。这种关系型碎片化不仅降低了查询性能和增加了系统复杂性，还掩盖了有效AI消费所必需的自然数据关系，创建了需要持续维护的相互依赖的架构关系的人工边界。因此，GenAI应用需要能够原生地表示复杂、分层业务实体而不需要大量重构逻辑的数据架构，青睐与AI模型消费数据方式更自然对齐的文档型架构，即丰富、上下文化的对象，而不是分解、规范化的片段。
- en: A well-designed system of action database based on the document model is a solution
    that addresses all the above challenges while also delivering a wealth of non-tangible
    benefits, including reducing developer cognitive load and infrastructure tech
    sprawl.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 基于文档模型精心设计的动作数据库系统是解决上述所有挑战的同时，还能带来丰富的无形效益的解决方案，包括减轻开发者的认知负担和基础设施技术蔓延。
- en: The combination of various sources enhances metadata understanding and improves
    the accuracy and relevance of the models. From a developer perspective, document
    structures enable superior prompt construction, as denormalized documents are
    much easier for both developers and LLMs to work with, thereby improving the quality
    of the prompts. Additionally, the simpler structure with reduced normalization
    reduces the number of data objects required to generate appropriate context. The
    fewer the number of data objects, the easier it is to ensure data quality for
    the purposes of reducing hallucinations and improving factuality.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 各种来源的结合增强了元数据理解，并提高了模型的准确性和相关性。从开发者的角度来看，文档结构使得提示构建更优越，因为去规范化文档对开发者和LLM来说都更容易处理，从而提高了提示的质量。此外，结构更简单、规范化减少的简化结构减少了生成适当上下文所需的数据对象数量。数据对象越少，就越容易确保数据质量，以减少幻觉并提高事实性。
- en: 'In the previous airline example, multiple models might contribute different
    reasoning aspects: a general LLM to handle chatbot communication, and a domain-specific
    fine-tuned model for determining routing options. Secondary LLMs might specialize
    in summarization versus data validation, demonstrating why relying on a single
    LLM likely may not achieve reasonable quality in agentic systems.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的航空公司例子中，多个模型可能贡献不同的推理方面：一个通用的LLM来处理聊天机器人通信，以及一个特定领域的微调模型来确定路由选项。次要的LLM可能专门从事总结与数据验证，这表明依赖于单个LLM可能无法在智能系统中实现合理质量。
- en: The document model enhances output quality through iterative enrichment, evolving
    with use cases rather than requiring re-architecting or refactoring to accommodate
    new or changed requirements (an unavoidable pain point in relational systems).
    Ultimately, enriched documents improve the fluency, coherence, and creativity
    of reasoning-based agentic systems.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 文档模型通过迭代丰富来提升输出质量，它随着用例的发展而进化，而不是需要重新架构或重构以适应新的或变化的需求（这是关系系统中不可避免的痛点）。最终，丰富的文档提高了基于推理的智能系统的流畅性、连贯性和创造力。
- en: Poor data retrieval design, stemming from loosely organized sources, results
    in slow performance, irrelevant results, or inaccurate information. Conversely,
    well-aligned architectures ensure fast, contextually relevant retrieval that supports
    meaningful model output.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据检索设计不佳，源于组织松散的来源，导致性能缓慢、结果不相关或不准确的信息。相反，对齐良好的架构确保了快速、上下文相关的检索，支持有意义的模型输出。
- en: In short, when data structure and model design are thoughtfully aligned, the
    result is a more accurate, responsive, and scalable GenAI solution.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，当数据结构和模型设计被深思熟虑地对齐时，结果是更准确、响应更快、可扩展性更强的GenAI解决方案。
- en: Data flow
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据流
- en: GenAI solution data flow typically begins with transactional data captured during
    machine, process, or human interactions. It may then be enriched with related
    unstructured artifact vector-encoding, or even existing reference data, so that
    it can be made actionable within agentic system workflows. This real-time business
    object enrichment in MongoDB results in a single document consisting of all relevant
    information enriched to the maximum extent. In a legacy architecture design, by
    contrast, the data would be referenced only from its sources, requiring, at best,
    calls to APIs, and at worst, possible direct access to databases.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI解决方案的数据流通常从机器、过程或人类交互中捕获的交易数据开始。然后，它可以与相关的非结构化工件向量编码或现有参考数据进行丰富，以便在智能系统工作流中使其可操作。在MongoDB中，这种实时业务对象丰富导致一个包含所有相关信息、丰富到最大程度的单一文档。相比之下，在传统的架构设计中，数据只会从其来源进行引用，最好需要调用API，最坏的情况可能是直接访问数据库。
- en: Data flow with a document-based approach allows the passing of all contextual
    information in one object and format, facilitating collaborative work between
    multiple agentic systems for a single process or workflow. In our example, the
    flight interruption is compiled into a single document, managing all different
    aspects of the case, including passenger interactions, flight information, contractual
    data, and even situation factors such as weather conditions.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 基于文档的方法进行数据流，允许在一个对象和格式中传递所有上下文信息，从而促进多个智能系统之间在单一流程或工作流中的协作工作。在我们的例子中，航班中断被编译成一个单独的文档，管理案件的所有不同方面，包括乘客互动、航班信息、合同数据，甚至包括天气条件等情境因素。
- en: This enables multiple agentic systems to collaborate on different aspects of
    the same business object or transactional interaction. For example, while a chatbot
    communicates with the passenger and provides real-time status updates, another
    system component proactively works on the underlying issue, having been triggered
    by the transactional system detecting a flight delay and calculating the probability
    that the passenger will miss their connecting flight. This means the *case* begins
    processing before the passenger even initiates contact.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得多个代理系统能够在相同业务对象或事务交互的不同方面进行协作。例如，当聊天机器人与乘客沟通并提供实时状态更新时，另一个系统组件会主动处理根本问题，这是由事务系统检测到航班延误并计算乘客错过转机航班的概率触发的。这意味着在乘客甚至开始联系之前，*案例*就已经开始处理。
- en: During this case creation process, the system generates multiple vectors through
    specific embeddings and performs semantic searches against similar historical
    cases. This allows the LLM to prepare natural language responses, such as `"We
    identified multiple flight options…"`, at the earliest possible moment. In an
    optimal scenario, the agentic system can proactively generate multiple solutions
    and communicate them to the passenger with a message such as `"We are sorry you
    missed your flight. We have three available options to continue your journey…"`.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在此案例创建过程中，系统通过特定的嵌入生成多个向量，并对类似的历史案例进行语义搜索。这允许LLM在尽可能早的时刻准备自然语言响应，例如“我们识别出多个航班选择……”。在最佳情况下，代理系统可以主动生成多个解决方案，并通过类似“我们很抱歉您错过了航班。我们有三个可选方案继续您的旅程……”的消息与乘客沟通。
- en: Once the case is successfully resolved, the document is enriched with comprehensive
    outcome data, such as `"Passenger accepted rebooking on Flight 345 departing in
    one hour, expressed satisfaction with proactive communication, and declined meal
    voucher offer"`. The interactions with the passenger can then be interpreted,
    and the overall outcome classified. This allows critical quality assurance, helps
    identify emerging trends, and validates and tests newer models and their suggested
    outcomes.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦案例成功解决，文档将丰富全面的成果数据，例如“乘客接受了345航班一小时后的重新预订，对主动沟通表示满意，并拒绝了餐券优惠”。然后可以解释与乘客的互动，并对整体结果进行分类。这允许进行关键的质量保证，帮助识别新兴趋势，并验证和测试新的模型及其建议的结果。
- en: Operationalizing a system of action database
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施行动数据库系统
- en: Moving from architectural principles to production deployment requires addressing
    the operational complexities that distinguish AI data systems from traditional
    databases. The unique characteristics of GenAI workloads, including real-time
    vector search, continuous model evolution, and dynamic schema requirements, demand
    specialized approaches to deployment, monitoring, and maintenance that extend
    far beyond conventional database administration practices.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 从架构原则到生产部署的转变需要解决区分AI数据系统与传统数据库的操作复杂性。GenAI工作负载的独特特性，包括实时向量搜索、持续模型演变和动态模式要求，需要专门的部署、监控和维护方法，这些方法远远超出了传统的数据库管理实践。
- en: Deployment patterns
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 部署模式
- en: 'Implementing a system of action database requires careful planning around deployment
    architecture. Organizations typically follow one of three primary patterns: greenfield
    implementations for new AI initiatives, gradual migration strategies that slowly
    transition away from legacy systems, or hybrid approaches that maintain existing
    systems while building new AI capabilities alongside them.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 实施行动数据库系统需要围绕部署架构进行仔细规划。组织通常遵循三种主要模式之一：为新的AI项目进行绿色field实施、逐步迁移策略，逐渐从旧系统过渡，或者混合方法，在保持现有系统的同时，构建新的AI能力。
- en: Cloud-native deployments offer the greatest flexibility and scalability, with
    managed services such as MongoDB Atlas, providing automatic scaling, backup, and
    security features. On-premises deployments may be necessary for organizations
    with strict data sovereignty requirements, while hybrid cloud approaches can balance
    security needs with operational efficiency.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 云原生部署提供了最大的灵活性和可扩展性，例如MongoDB Atlas等托管服务提供了自动扩展、备份和安全功能。对于有严格数据主权要求的组织，本地部署可能是必要的，而混合云方法可以平衡安全需求与运营效率。
- en: Performance monitoring and optimization
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能监控和优化
- en: Real-time AI applications demand continuous performance monitoring across multiple
    dimensions. Query performance metrics must track not just response times but also
    relevance scores for vector searches and accuracy metrics for AI-generated outputs.
    Document-based systems require monitoring of collection sizes, index effectiveness,
    and aggregation pipeline performance.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 实时人工智能应用需要在多个维度上持续监控性能。查询性能指标不仅要跟踪响应时间，还要跟踪向量搜索的相关性分数以及人工智能生成输出的准确性指标。基于文档的系统需要监控集合大小、索引有效性和聚合管道的性能。
- en: Key performance indicators should include throughput metrics for data ingestion,
    latency measurements for retrieval operations, and resource utilization patterns
    during peak AI processing loads. Automated alerting systems should trigger when
    performance degrades below acceptable thresholds, particularly for real-time applications
    where delays directly impact user experience.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 关键性能指标应包括数据摄入的吞吐量指标、检索操作的延迟测量以及高峰人工智能处理负载期间的资源利用率模式。当性能低于可接受阈值时，自动警报系统应触发，尤其是在实时应用中，延迟会直接影响用户体验。
- en: Cost management and resource allocation
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成本管理和资源分配
- en: The economics of AI data infrastructure differ significantly from traditional
    database systems. Vector storage and similarity searches consume different resource
    patterns than relational queries, requiring new approaches to capacity planning
    and cost optimization.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能数据基础设施的经济效益与传统数据库系统大不相同。向量存储和相似性搜索消耗的资源模式与关系查询不同，需要新的容量规划和成本优化方法。
- en: Storage costs scale with both document size and embedding dimensions, while
    compute costs vary based on model complexity and query frequency. Organizations
    should implement tiered storage strategies, moving older or less frequently accessed
    data to less frequently accessed, lower-cost storage tiers while maintaining frequently
    accessed, or hot data in high-performance systems for real-time access.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 存储成本随着文档大小和嵌入维度成比例增长，而计算成本则根据模型复杂性和查询频率变化。组织应实施分层存储策略，将较旧或访问频率较低的数据移动到访问频率较低、成本较低的存储层，同时将频繁访问或热数据保留在高性能系统中以实现实时访问。
- en: Maintenance workflows and data lifecycle management
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 维护工作流程和数据生命周期管理
- en: Document-based AI systems require specialized maintenance procedures that account
    for schema evolution, embedding model updates, and data quality drift over time.
    Unlike traditional databases, where schema changes require careful migration planning,
    document stores allow for more flexible evolution, but this flexibility doesn’t
    negate the need for governance frameworks that ensure data consistency.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 基于文档的人工智能系统需要专门的维护程序，这些程序考虑到模式演变、嵌入模型更新以及随时间推移的数据质量漂移。与传统数据库不同，其中模式更改需要仔细的迁移规划，文档存储允许更灵活的演变，但这种灵活性并不否定需要治理框架来确保数据一致性的需求。
- en: Regular re-processing of embeddings becomes desirable as newer, more effective
    models become available. Automated pipelines should be utilized to manage embedding
    updates while maintaining high system availability, potentially utilizing blue-green
    deployment strategies to minimize system disruptions during major model transitions.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 随着更新、更有效的模型的出现，定期重新处理嵌入变得可取。应利用自动化管道来管理嵌入更新，同时保持高系统可用性，可能利用蓝绿部署策略在主要模型转换期间最小化系统中断。
- en: Migration strategies from legacy systems
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从旧系统迁移的策略
- en: Organizations rarely start with a clean slate when implementing systems of action
    data stores. The necessary migration of data from existing relational systems,
    data warehouses, and disparate operational systems requires phased approaches
    that minimize business disruption while maximizing the benefits of unified data
    access.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 组织在实施行动数据存储系统时很少从一张白纸开始。从现有的关系系统、数据仓库和不同的运营系统迁移数据需要分阶段的方法，以最小化业务中断并最大化统一数据访问的好处。
- en: Experience from a wide range of customers across many industries has shown that
    the most successful migrations begin with pilot projects that demonstrate value
    quickly, then expand scope incrementally. Data synchronization strategies should
    maintain business data parity between old and new systems during transition periods,
    with automated validation ensuring data integrity throughout the migration process.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 来自众多行业广泛客户的经验表明，最成功的迁移始于能够快速展示价值的试点项目，然后逐步扩大范围。数据同步策略应在过渡期间保持新旧系统之间的业务数据一致性，通过自动化验证确保整个迁移过程中的数据完整性。
- en: Team training and adoption considerations
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 团队培训和采用考虑因素
- en: Successfully operationalizing a system of action databases requires investment
    in team capabilities. Traditional database administrators may need training in
    document modeling principles, while application developers may need to learn new
    query patterns and optimization techniques specific to AI workloads.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 成功实施行动数据库系统需要投资于团队能力。传统的数据库管理员可能需要接受文档建模原则的培训，而应用程序开发者可能需要学习针对人工智能工作负载的新查询模式和优化技术。
- en: Data scientists and ML engineers require an understanding of how document structures
    impact model training and inference performance, while DevOps teams need familiarity
    with AI-specific monitoring and scaling requirements. Cross-functional collaboration
    becomes essential as the boundaries between data engineering, AI development,
    and operations blur in system of action architectures.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家和机器学习工程师需要了解文档结构如何影响模型训练和推理性能，而DevOps团队需要熟悉人工智能特定的监控和扩展要求。在行动系统架构中，数据工程、人工智能开发和运营之间的界限变得模糊时，跨职能协作变得至关重要。
- en: Summary
  id: totrans-118
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter explored the crucial role of system of action databases in order
    to build effective GenAI solutions. We examined the limitations of traditional
    data management approaches and presented an alternative paradigm centered on the
    document model. Key aspects discussed include unified access to diverse data sources,
    improved data quality and consistency, real-time context for RAG, scalability,
    security and governance, and the importance of aligning data structures with model
    design for optimal performance and accuracy.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了行动数据库系统在构建有效通用人工智能（GenAI）解决方案中的关键作用。我们分析了传统数据管理方法的局限性，并提出了以文档模型为中心的替代范式。讨论的关键方面包括对多样化数据源的统一访问、改进数据质量和一致性、为RAG提供实时上下文、可扩展性、安全性和治理，以及将数据结构与模型设计对齐以实现最佳性能和准确性的重要性。
- en: The primary benefit of a well-designed system of action database, based on the
    document model, is its ability to provide real-time, context-sensitive, and holistic
    access to diverse data, essential for reasoning, causal analysis, and generating
    accurate, relevant outputs. This approach differs from traditional data warehousing
    by providing a unified view of enriched data optimized for RAG, model training,
    and fine-tuning. This results in GenAI solutions that are safer, more accurate,
    responsive, scalable, and secure.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 基于文档模型精心设计的行动数据库的主要优势是能够提供实时、上下文相关和全面访问多样化的数据，这对于推理、因果分析和生成准确、相关的输出至关重要。这种方法与传统数据仓库不同，它提供了一个统一视图，优化了RAG、模型训练和微调的数据。这导致通用人工智能解决方案更安全、更准确、响应更快、可扩展且更安全。
- en: In the next chapter, we will explore the critical foundations of trustworthy
    AI, examining how organizations can navigate the complex landscape of ethical
    frameworks, regulatory compliance, and data governance requirements. As AI systems
    become increasingly embedded in critical decision-making processes, ensuring they
    operate within the boundaries of ethics, law, and society becomes paramount. We
    will discuss how proper data governance, the foundation we’ve established with
    system of action databases, enables organizations to build AI systems that are
    transparent, fair, accountable, and compliant with evolving regulations across
    different industries and jurisdictions.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨可信赖人工智能的关键基础，探讨组织如何导航复杂的伦理框架、法规遵从性和数据治理要求。随着人工智能系统在关键决策过程中的日益嵌入，确保它们在伦理、法律和社会界限内运行变得至关重要。我们将讨论适当的数据治理，即我们通过行动数据库系统建立的基础，如何使组织能够构建透明、公平、负责任且符合不同行业和司法管辖区不断变化的法规的人工智能系统。
