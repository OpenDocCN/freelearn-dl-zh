  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要开始训练，点击 **训练** 按钮。这将使用所有上传的图像根据它们的标签构建一个模型。训练需要几分钟，进度如图所示：
