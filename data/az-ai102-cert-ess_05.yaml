- en: Figure 5.18 – Handwritten output
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.18 – 手写输出
- en: By following these steps, you’ve successfully implemented OCR to read text,
    including handwritten content, from images using the Azure AI Vision service in
    Python.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些步骤，你已经成功实现了 OCR，使用 Python 中的 Azure AI 视觉服务从图像中读取文本，包括手写内容。
- en: With this exercise, you have successfully implemented and tested OCR using the
    Azure AI Vision SDK in Python. You can now explore further by using other images
    and adjusting the code to fit different scenarios.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个练习，你已经成功实现了并测试了使用 Python 的 Azure AI 视觉 SDK 实现的 OCR。你现在可以通过使用其他图像并调整代码以适应不同场景来进一步探索。
- en: Next, let’s explore Azure AI Video Indexer, a service that extracts insights
    from video, including face identification, text recognition, object labels, and
    scene segmentation.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们探索 Azure AI 视频索引器，这是一个从视频中提取见解的服务，包括人脸识别、文本识别、对象标签和场景分割。
- en: Analyzing videos with Azure AI Video Indexer
  id: totrans-260
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Azure AI 视频索引器分析视频
- en: Video analysis in Azure AI Vision is a set of AI-powered tools that help extract
    meaningful insights from video content by analyzing both visual and audio components.
    It enables organizations to automatically process videos and derive information
    such as spoken words, detected objects, faces, and even emotions, transforming
    unstructured video data into structured, searchable, and actionable insights.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 视觉中的视频分析是一套 AI 驱动的工具，通过分析视觉和音频组件，帮助从视频内容中提取有意义的见解。它使组织能够自动处理视频并提取信息，如说话内容、检测到的对象、人脸甚至情绪，将非结构化视频数据转化为结构化、可搜索和可操作的见解。
- en: Key features of video analysis in Azure AI Vision
  id: totrans-262
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Azure AI 视觉中视频分析的关键功能
- en: The following features highlight how Azure AI Video Indexer can extract meaningful
    insights from video content through visual and audio analysis:.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 以下功能突出了 Azure AI 视频索引器如何通过视觉和音频分析从视频内容中提取有意义的见解：
- en: '**Person detection**: Detects individuals in real time from video streams and
    provides bounding boxes with tracking IDs. This enables consistent tracking of
    individuals as they move through the camera’s field of view.'
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人员检测**：从视频流中实时检测个体，并提供带有跟踪 ID 的边界框。这使个体在摄像机视野中移动时能够进行一致的跟踪。'
- en: '**Line-crossing detection**: Triggers events when a person crosses a virtual
    line defined in the camera’s field. Useful for entrance/exit monitoring, directional
    flow tracking, or enforcing restricted zones.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**线穿越检测**：当一个人穿越摄像机视野中定义的虚拟线时触发事件。适用于进出监测、方向流量跟踪或强制执行受限区域。'
- en: '**Region entrance and exit**: Detects when people enter or leave a defined
    polygonal region (e.g., a store aisle, waiting area, or safety zone). Ideal for
    occupancy monitoring and safety compliance.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**区域进出检测**：检测人们何时进入或离开一个定义的多边形区域（例如，商店通道、等候区或安全区）。非常适合占用监测和安全合规。'
- en: '**People counting**: Counts the number of individuals present within a specific
    zone, helping monitor capacity and optimize space utilization.'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人数统计**：统计特定区域内的人数，有助于监测容量并优化空间利用率。'
- en: '**Dwell time analysis**: Measures how long a person remains in a designated
    region, enabling insights into customer engagement or detecting potential loitering
    in sensitive areas.'
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**停留时间分析**：测量一个人在指定区域停留的时间，从而深入了解客户参与度或检测敏感区域中的潜在徘徊。'
- en: '**Proximity detection**: Measures the distance between individuals in a frame
    and can trigger events if a certain threshold is violated—particularly useful
    for enforcing physical distancing in workplaces or public areas.'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接近检测**：测量帧中个体之间的距离，如果违反了某个阈值，则可以触发事件——特别适用于在工作场所或公共场所强制执行物理距离。'
- en: '**Real-time alerts**: Integrates with external systems via webhooks to trigger
    alerts or automated actions based on live events, such as someone entering a restricted
    area.'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时警报**：通过webhooks与外部系统集成，根据实时事件（例如有人进入限制区域）触发警报或自动操作。'
- en: '**Privacy-first design**: The Spatial Analysis feature processes video frames
    without storing personally identifiable data. Only metadata (e.g., bounding boxes
    and event triggers) is processed and shared, supporting GDPR compliance and privacy-sensitive
    scenarios.'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以隐私为首要设计**：空间分析功能处理视频帧而不存储个人可识别数据。仅处理和共享元数据（例如边界框和事件触发器），支持GDPR合规性和隐私敏感场景。'
- en: Common use cases for video analysis
  id: totrans-272
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视频分析常见用例
- en: 'Let’s look at some use cases:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些用例：
- en: '**Media and entertainment**: Automatically tag and organize video content,
    making it easier to search and manage large media libraries'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**媒体和娱乐**：自动标记和组织视频内容，使其更容易搜索和管理大型媒体库'
- en: '**Security and surveillance**: Monitor and analyze video feeds for security
    purposes, including detecting individuals or objects of interest'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和监控**：为了安全目的监控和分析视频流，包括检测感兴趣的个人或物体'
- en: '**Education and training**: Create searchable video content for educational
    purposes, enabling students to find specific segments or topics'
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育和培训**：创建用于教育目的的可搜索视频内容，使学生能够找到特定的片段或主题'
- en: '**Marketing and customer insights**: Understand customer reactions and sentiments
    in marketing videos to refine future content strategies'
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场营销和客户洞察**：了解营销视频中的客户反应和情感，以优化未来的内容策略'
- en: These features enable organizations to extract actionable insights from live
    video feeds using prebuilt AI models, without the need for custom vision training.
    The system is designed for edge-to-cloud scenarios and supports deployment on
    Azure Stack Edge or compatible hardware via a container.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 这些功能使组织能够使用预构建的AI模型从实时视频流中提取可操作的见解，而无需进行自定义视觉训练。系统旨在边缘到云的场景，并支持通过容器在Azure Stack
    Edge或兼容硬件上部署。
- en: Getting started with video analysis in Azure AI Vision
  id: totrans-279
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Azure AI Vision中开始视频分析
- en: To use video analysis, start by uploading your video content to Azure AI Video
    Indexer. The service processes the video and generates insights, which can be
    accessed through the Azure portal or programmatically via an API. With video analysis,
    raw video data can be transformed into structured, searchable information, making
    it highly valuable for various industries.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用视频分析，首先将你的视频内容上传到Azure AI Video Indexer。该服务处理视频并生成见解，这些见解可以通过Azure门户或通过API编程访问。使用视频分析，原始视频数据可以转换为结构化、可搜索的信息，对各个行业都具有高度价值。
- en: Now that you have a foundational understanding of how video analysis works in
    Azure AI Vision, let’s put these concepts into practice with the following exercise.
    You will learn how to upload a video, process it, and extract insights such as
    transcription, object detection, and sentiment analysis.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经对Azure AI Vision中的视频分析工作原理有了基础的了解，让我们通过以下练习将这些概念付诸实践。你将学习如何上传视频，处理它，并提取诸如转录、对象检测和情感分析等见解。
- en: 'Exercise 5: Analyzing video content using Azure AI Video Indexer (Python)'
  id: totrans-282
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习5：使用Azure AI Video Indexer（Python）分析视频内容
- en: In this exercise, you will use Azure AI Video Indexer to upload and analyze
    a video to extract meaningful insights such as transcription, object detection,
    and key scenes. Follow these steps to set up the environment, analyze the video,
    and explore the results.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，你将使用Azure AI Video Indexer上传并分析视频，以提取诸如转录、对象检测和关键场景等有意义的见解。按照以下步骤设置环境，分析视频，并探索结果。
- en: 'Step 1: Cloning the repository'
  id: totrans-284
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：克隆仓库
- en: 'If you have already cloned the Azure AI Vision repository, you can skip *step
    1*. Otherwise, refer to *step 1* in *Exercise 1: Analyzing images using Azure
    AI Vision* of this chapter.'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经克隆了Azure AI Vision仓库，你可以跳过*步骤1*。否则，请参考本章*练习1：使用Azure AI Vision分析图像*中的*步骤1*。
- en: 'Step 2: Uploading a video to Video Indexer'
  id: totrans-286
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：将视频上传到视频索引器
- en: 'Follow these steps to upload your video file to Azure Video Indexer and initiate
    the indexing process:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤将你的视频文件上传到Azure Video Indexer并启动索引过程：
- en: Go to the Video Indexer portal at [https://www.videoindexer.ai/](https://www.videoindexer.ai/)
    and sign in using your Microsoft account. If you don’t have an account, sign up
    for a free one.
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问[https://www.videoindexer.ai/](https://www.videoindexer.ai/)上的视频索引器门户并使用你的Microsoft账户登录。如果你没有账户，请注册一个免费账户。
- en: Locate `responsible_ai.mp4` under the `06-video-indexer` folder.
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`06-video-indexer`文件夹下找到`responsible_ai.mp4`。
- en: In the Video Indexer portal, first click the `.``mp4` video.
  id: totrans-290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在视频索引器门户中，首先点击`.mp4`视频。
- en: Once the upload is complete, click the **Review upload** button to confirm the
    video metadata and indexing settings before processing.
  id: totrans-291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传完成后，点击**审查上传**按钮以确认视频元数据和索引设置，然后进行处理。
- en: Select the checkbox to confirm compliance with Microsoft policies and click
    **Upload +** **index**.
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择复选框以确认符合微软政策，然后点击**上传 + 索引**。
- en: Wait a few minutes while Video Indexer processes and indexes the video.
  id: totrans-293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 等待几分钟，视频索引器处理和索引视频。
- en: '![Figure 5.19 – Uploaded responsible_ai file](img/B31034_05_19.jpg)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![图5.19 – 上传的responsible_ai文件](img/B31034_05_19.jpg)'
- en: Figure 5.19 – Uploaded responsible_ai file
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.19 – 上传的responsible_ai文件
- en: After the video is successfully uploaded and indexed, you can explore the rich
    set of insights generated by Azure AI Video Indexer.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 视频成功上传和索引后，您可以探索由Azure AI视频索引器生成的丰富洞察集。
- en: 'Step 3: Reviewing video insights'
  id: totrans-297
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：审查视频洞察
- en: 'Once the video is processed, follow these steps to explore the insights extracted
    by Azure Video Indexer:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 视频处理完成后，按照以下步骤探索Azure视频索引器提取的洞察：
- en: Once the video is processed, select it in the Video Indexer portal to view its
    insights.
  id: totrans-299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视频处理完成后，在视频索引器门户中选择它以查看其洞察。
- en: Navigate to the **Timeline** tab to see the transcribed text of the audio narration.
  id: totrans-300
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 切换到**时间轴**选项卡以查看音频叙述的转录文本。
- en: 'In the **View** menu at the top right of the portal, enable **Transcript**,
    **OCR**, and **Speakers** to see all the extracted information:'
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在门户右上角的**视图**菜单中，启用**字幕**、**OCR**和**发言人**以查看所有提取的信息：
- en: '**Transcript**: Displays the audio narration converted into text'
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字幕**：显示音频叙述转换为文本'
- en: '**OCR**: Extracts text shown within the video frames'
  id: totrans-303
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OCR**：提取视频帧中显示的文本'
- en: '**Speakers**: Identifies the speakers appearing in the video (recognized by
    name or assigned a number, such as *Speaker #1*)'
  id: totrans-304
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发言人**：识别视频中的发言人（通过姓名识别或分配编号，如*发言人 #1*）'
- en: Explore additional insights such as detected objects, named entities (such as
    people and brands), and key scenes.
  id: totrans-305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索其他洞察，如检测到的对象、命名实体（如人物和品牌）和关键场景。
- en: '![Figure 5.20 – Video analysis](img/B31034_05_20.jpg)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![图5.20 – 视频分析](img/B31034_05_20.jpg)'
- en: Figure 5.20 – Video analysis
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.20 – 视频分析
- en: By reviewing the video insights, you can analyze transcriptions, detected objects,
    and identified speakers, gaining valuable context and searchable metadata from
    the video content.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 通过审查视频洞察，您可以分析转录内容、检测到的对象和识别出的发言人，从而从视频内容中获得有价值的上下文和可搜索的元数据。
- en: 'Step 4: Searching for specific insights'
  id: totrans-309
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：搜索特定洞察
- en: 'Use the following steps to search for specific keywords or entities within
    the analyzed video content:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下步骤在分析的视频内容中搜索特定的关键词或实体：
- en: On the `Bee`).
  id: totrans-311
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“蜜蜂”上）。
- en: Observe the matching labels and the point in the video where the bee appears.
  id: totrans-312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 观察视频中蜜蜂出现的匹配标签和位置。
- en: Click on the timeline to jump to the exact moment in the video where the bee
    is detected.
  id: totrans-313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击时间轴跳转到视频中被检测到蜜蜂的确切时刻。
- en: 'Step 5: Embedding video insights into a web page'
  id: totrans-314
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：将视频洞察嵌入到网页中
- en: 'To share the insights and video with others, you can embed the Video Indexer
    widgets into a web page:'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 要与他人分享洞察和视频，可以将视频索引器小部件嵌入到网页中：
- en: In Visual Studio Code, navigate to the `06-video-indexer` folder and open `analyze-video.html`.
  id: totrans-316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Visual Studio Code中，导航到`06-video-indexer`文件夹并打开`analyze-video.html`。
- en: In the Video Indexer portal, go to the `responsible_ai` video and select the
    **Embed** option, select the **Player** widget, set the video size to **560x315**,
    and then copy the embed code to the clipboard.
  id: totrans-317
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在视频索引器门户中，转到`responsible_ai`视频并选择**嵌入**选项，选择**播放器**小部件，设置视频大小为**560x315**，然后将嵌入代码复制到剪贴板。
- en: Go back to the `analyze-video.html` under the `<!-- Player widget goes here
    -->` comment.
  id: totrans-318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 返回到`analyze-video.html`下的`<!-- Player widget goes here -->`注释。
- en: '![Figure 5.21 – Share & Embed](img/B31034_05_21.jpg)'
  id: totrans-319
  prefs: []
  type: TYPE_IMG
  zh: '![图5.21 – 分享 & 嵌入](img/B31034_05_21.jpg)'
- en: Figure 5.21 – Share & Embed
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.21 – 分享 & 嵌入
- en: Save the HTML file and open it in your browser to see the embedded video and
    insights.
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存HTML文件并在浏览器中打开以查看嵌入的视频和洞察。
- en: '![Figure 5.22 – Video Analysis](img/B31034_05_22.jpg)'
  id: totrans-322
  prefs: []
  type: TYPE_IMG
  zh: '![图5.22 – 视频分析](img/B31034_05_22.jpg)'
- en: Figure 5.22 – Video Analysis
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.22 – 视频分析
- en: Experiment with the widgets, as shown in the preceding figure. Use the **Insights**
    tab to search for insights and jump to them in the video.
  id: totrans-324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按照前面的图示尝试使用小部件。使用 **洞察** 选项卡搜索洞察并在视频中跳转到它们。
- en: 'Step 6: Using the Video Indexer REST API'
  id: totrans-325
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤 6：使用 Video Indexer REST API
- en: To automate video management tasks or integrate insights into custom applications,
    you can interact with Azure Video Indexer programmatically using its REST API.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 要自动化视频管理任务或将洞察集成到自定义应用程序中，您可以通过其 REST API 以编程方式与 Azure 视频索引器交互。
- en: 'Follow these steps to authenticate and retrieve video metadata using the REST
    API and a sample PowerShell script:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤使用 REST API 和示例 PowerShell 脚本来验证和检索视频元数据：
- en: In Visual Studio Code, navigate to the `06-video-indexer` folder and open `get-videos.ps1`.
  id: totrans-328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Visual Studio Code 中，导航到 `06-video-indexer` 文件夹并打开 `get-videos.ps1`。
- en: In the PowerShell script, replace the `YOUR_ACCOUNT_ID` and `YOUR_API_KEY` placeholders
    with the account ID and API key values you obtained earlier in *step 2* of *Exercise
    1* in [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033).
  id: totrans-329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 PowerShell 脚本中，将 `YOUR_ACCOUNT_ID` 和 `YOUR_API_KEY` 占位符替换为您在 *第二章* 的 *练习 1*
    的 *步骤 2* 中获得的账户 ID 和 API 密钥值。
- en: Note that for a free account, the location is set to **trial**. If you’re using
    an unrestricted Video Indexer account linked to an Azure resource, update this
    to the location where your Azure resource is provisioned (e.g., **eastus**).
  id: totrans-330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注意，对于免费账户，位置设置为 **trial**。如果您使用的是与 Azure 资源关联的无限制 Video Indexer 账户，请将其更新为您的
    Azure 资源部署的位置（例如，**eastus**）。
- en: 'Review the script code, which makes two REST calls: one to obtain an access
    token and another to list the videos in your account.'
  id: totrans-331
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查脚本代码，它执行两个 REST 调用：一个用于获取访问令牌，另一个用于列出您账户中的视频。
- en: Save your changes, then click the ▷ button on the top right of the script pane
    to run it.
  id: totrans-332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存您的更改，然后单击脚本窗格右上角的 ▷ 按钮来运行它。
- en: 'Check the JSON response from the REST service, which should display details
    of the *Responsible AI* video you previously indexed in *step 2* of *Exercise
    5: Analyzing video content using Azure AI Video* *Indexer (Python)*.'
  id: totrans-333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查来自 REST 服务的 JSON 响应，它应显示您在 *练习 5：使用 Azure AI 视频索引器分析视频内容* 的 *步骤 2* 中先前索引的
    *Responsible AI* 视频的详细信息。
- en: '![Figure 5.23 – Details of the responsible_ai video](img/B31034_05_23.jpg)'
  id: totrans-334
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.23 – responsible_ai 视频的详细信息](img/B31034_05_23.jpg)'
- en: Figure 5.23 – Details of the responsible_ai video
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.23 – responsible_ai 视频的详细信息
- en: This exercise provided you with hands-on experience in using Azure AI Video
    Indexer to analyze video content, explore insights, and share results with others.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习为您提供了使用 Azure AI 视频索引器分析视频内容、探索见解并与他人分享结果的动手经验。
- en: Summary
  id: totrans-337
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored the diverse capabilities of **Azure AI Vision**
    for analyzing images and videos to extract meaningful insights. We started with
    image analysis, where you learned how to detect objects, identify faces, and perform
    content moderation using Azure AI Vision’s image analysis features. These skills
    are crucial for scenarios such as automating visual data processing, enhancing
    security, or implementing quality control in manufacturing. By understanding the
    underlying concepts of object detection and facial recognition, you gained the
    ability to build AI models that can identify patterns, recognize objects, and
    make sense of complex visual data.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了 Azure AI 视觉在分析图像和视频以提取有意义的见解方面的多种功能。我们从图像分析开始，学习了如何使用 Azure AI 视觉的图像分析功能来检测对象、识别面部和执行内容审核。这些技能对于自动化视觉数据处理、增强安全或实施制造中的质量控制等场景至关重要。通过理解对象检测和面部识别的底层概念，您获得了构建能够识别模式、识别对象并理解复杂视觉数据的
    AI 模型的能力。
- en: Next, we moved on to custom Vision models, covering how to create and train
    models to classify images or detect specific objects based on custom labels. This
    involved using datasets stored in Azure Blob Storage and creating COCO files to
    define labels and categories for training data. Through hands-on exercises, you
    learned how to label, train, and evaluate these models for accuracy. These skills
    are valuable when developing AI solutions tailored to unique business needs, such
    as identifying custom products in retail or detecting defects in industrial settings.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们转向自定义视觉模型，涵盖了如何创建和训练模型以根据自定义标签对图像进行分类或检测特定对象。这涉及到使用存储在 Azure Blob 存储中的数据集并创建
    COCO 文件来定义训练数据的标签和类别。通过动手练习，您学习了如何标记、训练和评估这些模型以实现准确性。当开发针对独特业务需求的 AI 解决方案时，这些技能非常有价值，例如在零售中识别定制产品或在工业环境中检测缺陷。
- en: Following this, we explored the Azure AI Face service, focusing on face detection,
    verification, and identification. These capabilities are widely used in security
    systems for access control and in customer engagement scenarios where recognizing
    returning customers can enhance user experiences. You learned how to leverage
    Azure’s Face service to detect facial attributes such as age and emotions, enabling
    AI models to interpret human expressions and interact naturally.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之后，我们探讨了 Azure AI 人脸服务，重点关注人脸检测、验证和识别。这些功能在安全系统中的访问控制和客户参与场景中得到了广泛应用，其中识别回头客可以增强用户体验。您学习了如何利用
    Azure 的 Face 服务检测面部特征，如年龄和情绪，使 AI 模型能够解释人类表情并自然地交互。
- en: We then introduced OCR, a feature that extracts text from various sources, such
    as scanned documents, images of signs, and handwritten notes. You saw how OCR
    can transform static images into searchable and editable text, making it useful
    for document digitization, automating data entry, and improving accessibility.
    Understanding how to implement OCR opens up possibilities for automating text-heavy
    processes, such as digitizing legal documents or converting printed materials
    into digital archives.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 我们随后介绍了 OCR，这是一个从各种来源提取文本的功能，例如扫描的文档、标志图像和手写笔记。您看到了 OCR 如何将静态图像转换为可搜索和可编辑的文本，这使得它在文档数字化、自动化数据录入和提升可访问性方面非常有用。了解如何实现
    OCR 为自动化文本密集型流程打开了可能性，例如数字化法律文件或将印刷材料转换为数字档案。
- en: The final section covered video analysis using Azure AI Video Indexer. This
    service allows you to analyze both the audio and visual components of a video,
    providing insights such as transcription, object detection, and sentiment analysis.
    You saw how video analysis can automatically tag, search, and organize video content,
    making it easier to manage large media libraries or extract insights for marketing
    and educational purposes. These skills are essential for applications in media
    management, security, and content generation.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的部分涵盖了使用 Azure AI 视频索引器的视频分析。这项服务允许您分析视频的音频和视觉组件，提供诸如转录、对象检测和情感分析等见解。您看到了视频分析如何自动标记、搜索和组织视频内容，使其更容易管理大型媒体库或为营销和教育目的提取见解。这些技能对于媒体管理、安全和内容生成中的应用至关重要。
- en: In the next chapter, we will transition from visual data to **natural language
    processing**, where we’ll explore how Azure AI enables applications to understand
    and generate human language. You’ll learn about text analysis, language understanding,
    and building conversational AI solutions using Azure’s language services.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将从视觉数据过渡到**自然语言处理**，我们将探讨 Azure AI 如何使应用程序能够理解和生成人类语言。您将了解文本分析、语言理解和构建使用
    Azure 语言服务的对话式 AI 解决方案。
- en: Review questions
  id: totrans-344
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 复习问题
- en: 'Answer the following questions to test your knowledge of this chapter:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 回答以下问题以测试您对本章知识的了解：
- en: Which of the following features does the Azure AI Vision image analysis service
    provide?
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪个功能是 Azure AI 视觉图像分析服务提供的？
- en: Text translation and sentiment analysis
  id: totrans-347
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本翻译和情感分析
- en: Object detection, face recognition, and content moderation
  id: totrans-348
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对象检测、人脸识别和内容审核
- en: Speech-to-text and text-to-speech conversion
  id: totrans-349
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语音转文本和文本转语音转换
- en: Chatbot and conversation management
  id: totrans-350
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聊天机器人和会话管理
- en: '**Correct** **answer**: B'
  id: totrans-351
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确** **答案**：B'
- en: What is the primary difference between image classification and object detection
    in custom vision models?
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在自定义视觉模型中，图像分类与对象检测的主要区别是什么？
- en: Image classification categorizes the entire image, while object detection identifies
    and locates multiple objects within an image.
  id: totrans-353
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分类将整个图像分类，而对象检测则识别并定位图像中的多个对象。
- en: Image classification only detects text in images, while object detection finds
    faces in an image.
  id: totrans-354
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分类仅检测图像中的文本，而对象检测则找到图像中的人脸。
- en: Image classification uses Azure Blob Storage, and object detection uses SQL
    databases.
  id: totrans-355
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分类使用 Azure Blob 存储，对象检测使用 SQL 数据库。
- en: Image classification only works with video data, while object detection only
    works with still images.
  id: totrans-356
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分类仅适用于视频数据，而对象检测仅适用于静态图像。
