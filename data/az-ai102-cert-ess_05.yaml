  zh: 通过遵循这些步骤，您将检测并分析人脸，展示Azure AI的关键人脸识别功能。
- en: '![Figure 5.16 – Output after running the app](img/B31034_05_16.jpg)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![图5.16 – 运行应用后的输出](img/B31034_05_16.jpg)'
- en: Figure 5.16 – Output after running the app
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.16 – 运行应用后的输出
- en: With this exercise, you have successfully detected and analyzed faces using
    the Azure AI Face service, gaining insight into its core capabilities and how
    it can be applied to various scenarios.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个练习，你已经成功使用Azure AI人脸服务检测并分析了人脸，了解了其核心功能及其在各种场景中的应用。
- en: Now, let’s dive into a module that teaches you how to use the Image Analysis
    API for OCR.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们深入了解一个模块，它教你如何使用图像分析API进行OCR。
- en: Overview of OCR in Azure AI Vision
  id: totrans-209
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Azure AI Vision中OCR概述
- en: '**OCR** is a key technology in Azure AI Vision that enables computers to read
    and extract text from images. This powerful feature can process various types
    of images, including photographs of signs, scanned documents, and screenshots,
    converting the embedded text into digital, editable, and searchable data. With
    OCR, Azure AI Vision transforms static images into structured information that
    can be easily accessed and utilized in various applications.'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: '**OCR** 是Azure AI Vision中的关键技术，它使计算机能够从图像中读取和提取文本。这个强大的功能可以处理各种类型的图像，包括标志照片、扫描文档和屏幕截图，将嵌入的文本转换为数字、可编辑和可搜索的数据。有了OCR，Azure
    AI Vision将静态图像转换为易于访问和利用的结构化信息。'
- en: How OCR works in Azure AI Vision
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Azure AI Vision中OCR的工作原理
- en: The OCR functionality in Azure AI Vision scans through an image to identify
    text, whether printed (e.g., signs or books) or handwritten. It then extracts
    this text and provides a detailed breakdown of its structure, identifying elements
    such as words, lines, and their exact positions within the image. This helps preserve
    the context and layout of the content, making it easier to understand and manipulate.
    Additionally, Azure’s OCR supports a wide range of languages, enabling global
    applications and ensuring accurate text recognition across different scripts.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Vision中的OCR功能扫描图像以识别文本，无论是印刷的（例如标志或书籍）还是手写的。然后提取这些文本，并提供其结构的详细分解，识别元素如单词、行及其在图像中的确切位置。这有助于保留内容的上下文和布局，使其更容易理解和操作。此外，Azure的OCR支持多种语言，使全球应用成为可能，并确保在不同脚本中准确识别文本。
- en: Common use cases for OCR
  id: totrans-213
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OCR的常见用例
- en: 'OCR is used for a variety of tasks, but the common ones include the following:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: OCR用于各种任务，但常见的包括以下：
- en: '**Digitizing documents**: OCR can convert scanned paper documents, such as
    contracts or letters, into digital text that can be edited or archived'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数字化文档**：OCR 可以将扫描的纸质文档（如合同或信件）转换为可编辑或存档的数字文本'
- en: '**Data entry automation**: It automatically extracts text from structured forms,
    invoices, or receipts, reducing manual data entry efforts'
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据录入自动化**：它自动从结构化表格、发票或收据中提取文本，减少手动数据录入的工作量'
- en: '**Accessibility**: It converts text within images into speech or digital text
    for visually impaired users, enhancing accessibility'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可访问性**：它将图像中的文本转换为语音或数字文本，为视障用户提高可访问性'
- en: '**Searchable content**: It transforms text in images into searchable data,
    making digital libraries or image-based archives easy to explore'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可搜索内容**：它将图像中的文本转换为可搜索的数据，使数字图书馆或基于图像的档案易于探索'
- en: For instance, imagine taking a photo of a business card. With Azure AI Vision’s
    OCR, the text on the card—such as the person’s name, phone number, and email address—can
    be read and transformed into digital text, which can then be automatically saved
    to your contacts. This saves time and eliminates the need for manual transcription.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，想象一下拍摄一张名片。使用 Azure AI 视觉的 OCR，卡片上的文本（如人的姓名、电话号码和电子邮件地址）可以被读取并转换为数字文本，然后可以自动保存到您的联系人中。这节省了时间并消除了手动转录的需要。
- en: Now that you have a clear understanding of how OCR works in Azure AI Vision
    and its potential applications, let’s apply what you’ve learned in the following
    exercise.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经清楚地了解了 Azure AI 视觉中 OCR 的工作原理及其潜在应用，让我们在以下练习中应用您所学的知识。
- en: 'Exercise 4: Reading text in images using Azure AI Vision OCR (Python)'
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 4：使用 Azure AI 视觉 OCR 读取图像中的文本（Python）
- en: In this exercise, you’ll learn how to use Azure AI Vision’s OCR feature to extract
    text from images and analyze it. Follow these steps to set up your environment
    and implement the code for text extraction using the Azure AI Vision SDK.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，您将学习如何使用 Azure AI 视觉的 OCR 功能从图像中提取文本并分析它。按照以下步骤设置您的环境并实现使用 Azure AI 视觉
    SDK 进行文本提取的代码。
