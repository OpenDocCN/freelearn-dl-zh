  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装必要的包：
- en: '[PRE0]'
  id: totrans-24
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: AI_ENDPOINT=<your_endpoint>
  id: totrans-25
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: AI_ENDPOINT=<your_endpoint>
- en: AI_KEY=<your_key>
  id: totrans-26
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: AI_KEY=<your_key>
- en: '[PRE1]'
  id: totrans-27
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Save your changes.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存您的更改。
- en: 'Step 2: Viewing images for analysis'
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 2 步：查看用于分析的图像
- en: Expand the `/chapter-5/01-analyze-images/Python/image-analysis/images` folder
    within the project to view the sample images (`street.jpg`, `building.jpg`, and
    `person.jpg`).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目中展开 `/chapter-5/01-analyze-images/Python/image-analysis/images` 文件夹以查看示例图像（`street.jpg`、`building.jpg`
    和 `person.jpg`）。
- en: 'Step 3: Analyzing an image to generate captions and tags'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 3 步：分析图像以生成标题和标签
- en: 'Using the Azure AI Vision SDK, you can generate captions and tags for images
