- en: Figure 5.14 – Quick test to detect classification
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.14 – 快速测试以检测分类
- en: As you can see, it identifies the image as an apple with a 99.6% confidence
    score. This exercise walks you through the complete process of creating, training,
    and testing a custom image classification model using Azure AI Vision, with an
    example of classifying various fruit images.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您所看到的，它以 99.6% 的置信度将图像识别为苹果。本练习将引导您通过使用 Azure AI Vision 创建、训练和测试自定义图像分类模型的完整过程，并举例说明如何对各种水果图像进行分类。
- en: 'Next, let’s explore a key capability in AI: the ability of applications to
    detect human faces, analyze facial features and emotions, and identify individuals.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们探索人工智能的一个关键特性：应用程序检测人脸、分析面部特征和情绪以及识别个人的能力。
- en: Implementing the Azure AI Face service
  id: totrans-156
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施Azure AI Face 服务
- en: The **Azure AI Face** service is an AI-powered solution provided by Microsoft
    that enables developers to incorporate facial recognition features into their
    applications. This service can detect and analyze human faces in images, offering
    capabilities such as face detection, verification, and identification. These features
    make Azure AI Face ideal for a variety of use cases, ranging from security systems
    to personalized user experiences.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '**Azure AI Face** 服务是由微软提供的一项基于人工智能的解决方案，它使开发者能够将人脸识别功能集成到他们的应用程序中。此服务可以在图像中检测和分析人脸，提供诸如人脸检测、验证和识别等功能。这些特性使
    Azure AI Face 成为各种用例的理想选择，从安全系统到个性化用户体验。'
- en: Key features of Azure AI Face
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Azure AI Face 的关键特性
- en: 'Azure AI Face provides powerful facial recognition capabilities, enabling applications
    to detect, verify, and identify human faces with detailed attribute analysis:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Face 提供强大的面部识别功能，使应用程序能够通过详细的属性分析检测、验证和识别人脸：
- en: '**Face detection**: The face detection feature can locate and identify human
    faces in images. It provides additional attributes such as estimated age, emotions
    (such as happiness, sadness, or anger), and detailed facial landmarks (e.g., positions
    of eyes, nose, and mouth). This makes it suitable for applications that require
    accurate facial feature detection, such as photo enhancement and biometric systems.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人脸检测**：人脸检测功能可以在图像中定位和识别人类面部。它还提供额外的属性，如估计的年龄、情绪（例如快乐、悲伤或愤怒）以及详细的 facial
    landmarks（例如眼睛、鼻子和嘴巴的位置）。这使得它非常适合需要精确人脸特征检测的应用程序，例如照片增强和生物识别系统。'
- en: '**Face verification**: Face verification compares two faces to determine whether
    they belong to the same person. This functionality is useful for scenarios such
    as secure logins, identity verification, or user authentication processes where
    confirming a person’s identity is critical.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人脸验证**：人脸验证通过比较两个面部来确定它们是否属于同一个人。这种功能在需要确认人员身份的场景中非常有用，例如安全登录、身份验证或用户认证过程。'
- en: '**Face identification**: Face identification compares a detected face against
    a database of enrolled faces to identify a person. It is commonly used in attendance
    systems, automated security checks, or any application where tracking or recognizing
    individuals is necessary.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人脸识别**：人脸识别将检测到的面部与已注册的面部数据库进行比较，以识别一个人。它通常用于考勤系统、自动安全检查或任何需要跟踪或识别个人的应用程序。'
- en: Common use cases for Azure AI Face
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Azure AI Face 的常见用例
- en: 'Azure AI Face is widely used across industries for security, authentication,
    personalization, and media management, enhancing both user experiences and operational
    efficiency:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Face 在各个行业中广泛用于安全、认证、个性化以及媒体管理，提高了用户体验和运营效率：
- en: '**Security and authentication**: Enhance security systems by enabling facial
    recognition for access control or secure logins'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和认证**：通过启用访问控制或安全登录的人脸识别来增强安全系统。'
- en: '**Personalization**: Offer personalized experiences by recognizing customers
    in retail or hospitality settings and tailoring services accordingly'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化**：通过识别零售或酒店环境中的客户，并相应地定制服务，提供个性化体验。'
- en: '**Media and entertainment**: Automatically tag and organize photos and videos
    based on the people appearing in them, making content management easier and more
    efficient'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**媒体和娱乐**：根据图像中出现的人物自动标记和组织照片和视频，使内容管理更加容易和高效。'
- en: Getting started with the Azure AI Face service
  id: totrans-168
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始使用 Azure AI Face 服务
- en: To begin using the Azure AI Face service, first create a Face service resource
    in the Azure portal. After setting up the resource, you can integrate facial recognition
    into your applications using various tools and SDKs provided by Azure. Understanding
    how to leverage these features will help developers build intelligent applications
    that can effectively interact with human faces in a natural, intuitive manner.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用 Azure AI Face 服务，首先在 Azure 门户中创建一个 Face 服务资源。设置资源后，您可以使用 Azure 提供的各种工具和
    SDK 将人脸识别集成到您的应用程序中。了解如何利用这些功能将帮助开发者构建能够以自然、直观的方式与人类面部有效互动的智能应用程序。
- en: With this foundational knowledge, you are now ready to apply these concepts
    in the following hands-on exercise, where you’ll explore and implement facial
    detection and verification using the Azure AI Face service.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在掌握了这些基础知识后，你现在可以准备在以下动手练习中应用这些概念，您将探索并使用 Azure AI Face 服务实现人脸检测和验证。
- en: 'Exercise 3: Detecting and analyzing faces using the Azure AI Face service (Python)'
  id: totrans-171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 3：使用 Azure AI Face 服务检测和分析人脸（Python）
- en: In this exercise, you will use the Azure AI Face service to detect faces in
    an image, analyze their attributes, and display results. Follow these steps to
    set up and run a Python-based application to perform face analysis.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，您将使用 Azure AI Face 服务来检测图像中的人脸，分析其属性，并显示结果。按照以下步骤设置和运行一个基于 Python 的应用程序以执行人脸分析。
