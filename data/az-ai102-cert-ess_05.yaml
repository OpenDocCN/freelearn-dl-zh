  - PREF_OL
  type: TYPE_NORMAL
  zh: 定位到 `# Get image captions` 注释并检查相应的代码以确保它按预期提取标题：
- en: '[PRE4]'
  id: totrans-39
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Run the script and specify the image path:'
