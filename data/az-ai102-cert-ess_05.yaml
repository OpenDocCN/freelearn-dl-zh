  zh: 保存更改，并运行 `images` 文件夹中的每个图像的程序，注意检测到的对象。每次运行后，检查代码文件夹中生成的 `objects.jpg` 文件以查看注释对象：
- en: '![Figure 5.3 – Result of object detected](img/B31034_05_003_new.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.3 – 检测到的对象结果](img/B31034_05_003_new.jpg)'
- en: Figure 5.3 – Result of object detected
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.3 – 检测到的对象结果
- en: After running the people, detecting program, detected objects are marked with
    bounding boxes, improving object recognition in your images.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 运行人员检测程序后，检测到的对象会用边界框标记，从而提高图像中的对象识别。
