  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 建议的标签提供了关于图像的额外上下文，使得对视觉数据进行分类和组织更加容易。
- en: 'Step 5: Detecting and locating objects in an image'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤 5：检测和定位图像中的对象
- en: To detect and highlight objects in an image, follow these steps to configure
