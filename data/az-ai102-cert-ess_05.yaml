  type: TYPE_NORMAL
  zh: 以下哪项最能描述Azure AI视觉中多模态嵌入的目的？
- en: They convert handwritten text into machine-readable characters for search and
    editing.
  id: totrans-365
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们将手写文本转换为可搜索和编辑的机器可读字符。
- en: They allow combining image and audio data into a single media stream for efficient
    processing.
  id: totrans-366
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们允许将图像和音频数据合并成一个单一的媒体流，以实现高效的处理。
- en: They enable both images and text queries to be mapped into a shared vector space
    for semantic search and similarity matching.
  id: totrans-367
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们使图像和文本查询能够映射到共享的向量空间，以实现语义搜索和相似度匹配。
- en: They detect objects and classify them based on predefined categories such as
    animals or furniture.
  id: totrans-368
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们检测对象并根据预定义的类别（如动物或家具）进行分类。
- en: '**Correct** **answer**: C'
  id: totrans-369
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确** **答案**：C'
