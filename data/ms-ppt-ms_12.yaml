- en: '10'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: Building Flexibility and Interactivity into Your Presentations
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将灵活性和互动性融入您的演示
- en: Creating well-planned visuals is a wonderful thing, but being able to build
    flexible content that helps you interact with your audience is even better for
    both you and them! Yes—it does take some more planning, but the rewards can be
    huge. It can help you feel more confident, knowing that you always have the right
    visual to pull up to answer questions, and it helps keep your audience engaged
    because they realize they can ask you to go back to a topic.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 创建精心规划的视觉元素是件好事，但能够构建灵活的内容，帮助您与观众互动，对您和观众来说都更好！是的——这确实需要更多的规划，但回报可能非常巨大。它可以帮助您更有信心，知道您总是有正确的视觉元素来回答问题，并且它有助于保持观众的参与度，因为他们意识到他们可以要求您回到某个主题。
- en: 'Building bigger presentations that contain flexible elements might even allow
    you to reuse more content instead of recreating new presentations all the time.
    You will be the judge after reading the topics of this chapter, where we will
    discuss the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 创建包含灵活元素的更大演示，甚至可能允许您重用更多内容，而不是不断创建新的演示。在阅读本章的主题后，您将做出判断，我们将讨论以下内容：
- en: Using navigation elements in a presentation
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在演示中使用导航元素
- en: Creating custom shows
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建自定义演示
- en: Using the Zoom feature to navigate your content
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用缩放功能导航内容
- en: Creating triggered menus
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建触发菜单
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: Most topics discussed in this chapter don’t require an **M365 subscription**
    , the tools and features having been introduced in previous versions of PowerPoint.
    The **Zoom** feature is now compatible with all Office desktop versions still
    supported by Microsoft.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论的大多数主题不需要**M365订阅**，因为工具和功能已在PowerPoint的先前版本中引入。**缩放**功能现在与所有由Microsoft支持的Office桌面版本兼容。
- en: Be aware that since the subscription version of PowerPoint is updated on an
    ongoing basis, it is possible that some features don’t appear exactly the same
    in your version of the application.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，由于PowerPoint的订阅版本持续更新，某些功能可能在您的应用程序版本中看起来并不完全相同。
- en: Using navigation elements in a presentation
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在演示中使用导航元素
- en: Navigation in a presentation means that we click on an object or move the mouse
    cursor over it to access other content. It requires being comfortable with having
    to click on those slide objects during your presentation, whether using your mouse
    or a remote with mouse cursor control. You also need to plan your navigation ahead
    of time to make sure that if you access other content, you have the possibility
    to come back to the slide you were showing.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 演示中的导航意味着我们点击一个对象或移动鼠标光标到其上以访问其他内容。这要求您在演示过程中能够舒适地点击这些幻灯片对象，无论是使用鼠标还是带有鼠标光标控制的遥控器。您还需要提前规划您的导航，以确保如果您访问其他内容，您有返回到您所展示幻灯片的可能性。
- en: This section will help you create your navigation. Later in this chapter, we
    will discuss the **Zoom** feature, which allows creating navigation in an easier
    way. Let’s start with our first section, on the use of action buttons.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将帮助您创建导航。在本章的后面部分，我们将讨论**缩放**功能，它允许以更简单的方式创建导航。让我们从我们的第一个部分开始，关于动作按钮的使用。
- en: Navigating with action buttons
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用动作按钮导航
- en: 'If you don’t know wher e to find **action buttons** in PowerPoint, you can
    access them from the **Home** tab ( **1** ) and click on the **Shapes** button
    ( **2** ) – if you cannot see it, it could be because of your screen size or resolution,
    so look for a **Drawing** button instead. You can also use the **Insert** tab
    ( **3** ) and click on the **Shapes** button ( **4** ). Both will open the shapes
    gallery where **Action Buttons** ( **5** ) will appear as the last section. You
    may need to scroll down to see **Action Buttons** ( *Figure 10.1* ):'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不知道在PowerPoint中哪里可以找到**动作按钮**，您可以从**主页**选项卡（**1**）点击**形状**按钮（**2**） – 如果您看不到它，可能是由于您的屏幕尺寸或分辨率，因此请寻找**绘图**按钮。您也可以使用**插入**选项卡（**3**）并点击**形状**按钮（**4**）。两者都会打开形状库，其中**动作按钮**（**5**）将出现在最后一个部分。您可能需要向下滚动才能看到**动作按钮**（*图10.1*）：
- en: '![Figure 10.1 – Accessing Action Buttons from the Home or Insert tab](img/B32063_10_01.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图10.1 – 从“主页”或“插入”选项卡访问动作按钮](img/B32063_10_01.png)'
- en: Figure 10.1 – Accessing Action Buttons from the Home or Insert tab
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1 – 从“主页”或“插入”选项卡访问动作按钮
- en: When you choose any of th e buttons, you can draw the object on your slide just
    like any other shape in the gallery. But it gives you access to special settings—the
    topic of our next section .
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当您选择任何按钮时，您可以在幻灯片上绘制对象，就像在库中的任何其他形状一样。但它为您提供了访问特殊设置的权限——这是我们下一节的主题。
- en: Creating your navigation buttons
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建您的导航按钮
- en: 'There are 12 prese t action buttons available in the shapes gallery ( *Figure
    10.2* ) :'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在形状库中（*图10.2*）有12个预设动作按钮可用：
- en: '![Figure 10.2 – 12 preset action buttons are available](img/B32063_10_02.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图10.2 – 可用12个预设动作按钮](img/B32063_10_02.png)'
- en: Figure 10.2 – 12 preset action buttons are available
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.2 – 可用12个预设动作按钮
- en: 'Let’s start by describing what th ey are before we discuss the settings they
    have:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论它们的设置之前，我们先描述一下它们是什么：
- en: '**Go Back or Previous** ( **1** ): A button that has a hyperlink to the previous
    slide. Unless you are creating a presentation for a kiosk, I don’t recommend using
    it, as it adds visual clutter without adding much value.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**返回或上一页**（**1**）：一个按钮，具有指向上一张幻灯片的超链接。除非您正在为自动展示机创建演示文稿，否则我不建议使用它，因为它会增加视觉杂乱，但不会增加太多价值。'
- en: '**Go Forward or Next** ( **2** ): A button that has a hyperlink to the next
    slide. The same comment as for the previous button applies.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**前进或下一页**（**2**）：一个按钮，具有指向下一张幻灯片的超链接。对于上一个按钮的评论同样适用。'
- en: '**Go to Beginning** ( **3** ): A button that has a hyperlink to the first slide
    of your presentation. It can be valuable if you have created a special interactive
    menu on your first slide.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转到开头**（**3**）：一个按钮，具有指向您演示文稿第一张幻灯片的超链接。如果您在第一张幻灯片上创建了特殊的交互式菜单，这个按钮可能非常有用。'
- en: '**Go to End** ( **4** ): A button that has a hyperlink to the last slide of
    your presentation. It can be valuable if you want quick access to your closing
    remarks because you are running out of time.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**转到末尾**（**4**）：一个按钮，具有指向您演示文稿最后一张幻灯片的超链接。如果您时间紧迫，想要快速访问结束语，这个按钮可能非常有用。'
- en: '**Go Home** ( **5** ): A button that has a hyperlink to the first slide of
    your presentation. It is the same type of hyperlink as *#3* , so you can choose
    the one with the visual you prefer. Since the destination slide number can be
    changed, you can use this action button to link to any slide number that you use
    as a dashboard to select other content.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主页**（**5**）：一个按钮，具有指向您演示文稿第一张幻灯片的超链接。它与*#3*中的超链接类型相同，因此您可以选择您喜欢的视觉样式。由于目标幻灯片编号可以更改，您可以使用此动作按钮链接到任何用作仪表板以选择其他内容的幻灯片编号。'
- en: '**Get Information** ( **6** ): A button allowing you to configure access to
    extra information. You choose the type of action in the settings window.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取信息**（**6**）：一个按钮，允许您配置访问额外信息的设置。您在设置窗口中选择动作类型。'
- en: '**Return** ( **7** ): A button that has a hyperlink to the last slide viewed.
    This button can be unbelievably valuable if you have built extensive navigation
    within your presentation and need to return to a slide that is not the previous
    or next one. PowerPoint remembers the slide number you were on before and brings
    you back to it when you click on the button.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**返回**（**7**）：一个按钮，具有指向最后查看的幻灯片的超链接。如果您在演示文稿中构建了广泛的导航，并且需要返回到不是上一页或下一页的幻灯片，这个按钮可能非常宝贵。PowerPoint会记住您之前所在的幻灯片编号，并在您点击按钮时带您回到那里。'
- en: '**Video** ( **8** ), **Document** ( **9** ), **Sound** ( **10** ), and **Help**
    ( **11** ): Buttons that trigger the opening of the settings window but don’t
    have anything configured yet. They are useful if their icons suit your needs and
    you want easy access to the settings.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视频**（**8**）、**文档**（**9**）、**声音**（**10**）和**帮助**（**11**）：这些按钮会触发打开设置窗口，但尚未配置任何内容。如果它们的图标符合您的需求，并且您想要轻松访问设置，它们将非常有用。'
- en: '**Blank** ( **12** ): This button can be described the same way as the previous
    ones, except that you can format it with the various shape formatting tools to
    customize it to your needs.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**空白**（**12**）：这个按钮可以像之前的按钮一样描述，但您可以使用各种形状格式化工具对其进行格式化，以满足您的需求。'
- en: 'After drawing any of the butt ons described previously, you will get the **Action
    Settings** window ( **1** ), where you will find two tabs: **Mouse Click** and
    **Mouse Over** ( **2** ). The settings are the same for both tabs. **Mouse Click**
    is used when you want to click on an object to produce an action, while **Mouse
    Over** configures the action when your mouse cursor goes over the linked object,
    without needing to click ( *Figure 10.3* ) :'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制之前描述的任何按钮后，您将获得**动作设置**窗口（**1**），在那里您将找到两个选项卡：**鼠标点击**和**鼠标悬停**（**2**）。两个选项卡的设置相同。**鼠标点击**用于您想要点击对象以产生动作时，而**鼠标悬停**配置当鼠标光标悬停在链接对象上时的动作，无需点击（**图10.3**）：
- en: '![Figure 10.3 – Options in the Action Settings window](img/B32063_10_03.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图10.3 – 动作设置窗口中的选项](img/B32063_10_03.png)'
- en: Figure 10.3 – Options in the Action Settings window
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.3 – 动作设置窗口中的选项
- en: 'Even though there are five setting options in the **Action on click** ( **3**
    ) section in the **Action Settings** window, we will focus on the **Hyperlink
    to:** ( **4** ) option since the topic being discussed is creating navigation
    and interactivity in our presentations. The first five options ( **5** ) have
    some preset action buttons for them. As for the other six options, they can be
    used for action buttons th at don’t have presets or to customize the ones that
    do. Let’s see what each of them does:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在**动作设置**窗口的**点击动作**（**3**）部分有五个设置选项，但我们将重点关注**链接到：**（**4**）选项，因为讨论的主题是在我们的演示文稿中创建导航和交互。前五个选项（**5**）为它们提供了一些预设的动作按钮。至于其他六个选项，它们可以用于没有预设的动作按钮，或者用于自定义那些有预设的动作按钮。让我们看看它们各自的作用：
- en: '**End Show** ( **6** ): This allows you to configure an object that ends your
    presentation.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结束放映**（**6**）：这允许您配置一个结束演示的对象。'
- en: '**Custom Show…** ( **7** ): This allows you to link to a specific set of predetermined
    slides. Custom shows will be the second main topic of this chapter.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自定义放映…**（**7**）：这允许您链接到一组预定的特定幻灯片。自定义放映将是本章的第二个主要内容。'
- en: '**Slide...** ( **8** ): This allows you to link to a specific slide in your
    presentation. As an example, you could have a hidden slide that you can access
    with this setting. To go back to where you were, you then need to plan to use
    an object with the **Last Slide Viewed** setting.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻灯片...**（**8**）：这允许您链接到演示文稿中的特定幻灯片。例如，您可以使用此设置访问一个隐藏幻灯片。要返回您之前的位置，您需要计划使用具有**最后查看的幻灯片**设置的某个对象。'
- en: '**URL…** ( **9** ): This allows you to open a web browser page on a specific
    page. When you don’t need the page anymore, you can simply close it to get back
    to your slideshow.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**URL…**（**9**）：这允许您在特定页面上打开一个网页。当您不再需要该页面时，您可以简单地关闭它以返回到您的幻灯片放映。'
- en: '**Other PowerPoint Presentation…** ( **10** ): This allows you to open another
    presentation in slideshow mode, over the one you are presenting. Ending that second
    presentation brings you back to your first slideshow.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**其他PowerPoint演示文稿…**（**10**）：这允许您在您正在演示的演示文稿上方打开另一个演示文稿。结束第二个演示文稿将带您回到第一个幻灯片放映。'
- en: '**Other File…** ( **11** ): This allows you to open another type of file, such
    as a Word document, an Excel spreadsheet, or a PDF. If you have the software to
    open a file, it will open on top of your presentation.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**其他文件…**（**11**）：这允许您打开另一种类型的文件，例如Word文档、Excel电子表格或PDF。如果您有打开文件的软件，它将在演示文稿上方打开。'
- en: To test your action buttons, you need to be in slideshow mode.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试您的动作按钮，您需要处于幻灯片放映模式。
- en: '**Try it yourself**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**试试看**'
- en: 'The best way to understand action buttons is to try using them right away.
    Here is a quick exercise you can try:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 理解动作按钮的最好方法是立即尝试使用它们。这里有一个您可以尝试的快速练习：
- en: Create a few slides that either have a distinctive title or a different shape
    on each.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建几个幻灯片，每个幻灯片要么有一个独特的标题，要么有不同的形状。
- en: 'Insert these action buttons: **Go Home** and **Return** . You can copy and
    paste them on every slide, or you can add them to your slide master so that they
    are present on all the layouts you add to your presentation.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 插入以下动作按钮：**返回主页**和**返回**。您可以在每个幻灯片上复制和粘贴它们，或者您可以将它们添加到幻灯片母版中，这样它们就会出现在您添加到演示文稿的所有布局中。
- en: Add a hidden slide and a dd an action button that links to it from the first
    slide in your presentation.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加一个隐藏幻灯片，并从演示文稿的第一个幻灯片添加一个动作按钮，链接到该隐藏幻灯片。
- en: Start the slideshow and try navigating between the slides.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开始放映幻灯片，并尝试在幻灯片之间导航。
- en: Action buttons are a nice starting point to quickly implement a simple navigation
    system in your presentation. But you can also create hyperlinks on any other types
    of objects—we will show a few examples of this in the following sect ion.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 动作按钮是快速在你的演示文稿中实现简单导航系统的良好起点。但你也可以在其他类型的对象上创建超链接——我们将在接下来的部分中展示几个例子。
- en: Using other slide objects for navigation
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用其他幻灯片对象进行导航
- en: Creating a navigation system in your presentation does not require that you
    use action buttons; any clickable object on your slide can be used. You can even
    use shapes added on the slide master, which then become a clickable navigation
    system on all the slides.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的演示文稿中创建导航系统不需要使用动作按钮；你可以在幻灯片上的任何可点击对象上使用。你甚至可以使用添加到幻灯片母版的形状，这样它们就变成了所有幻灯片上的可点击导航系统。
- en: 'Let’s start with an e xample of a slide on which you have four pictures of
    people on your team. They are speaking during a corporate event, and you would
    like easy access to their slides. Four slides have been added to represent the
    speakers’ content. There is also the need to plan a **Return** button to the speakers’
    selection slide, but you were asked not to use visible action buttons ( *Figure
    1 0.4* ):'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从这样一个例子开始，你团队中有四张团队成员的照片幻灯片。他们在公司活动中发言，你希望能够轻松访问他们的幻灯片。已经添加了四个幻灯片来表示演讲者的内容。还需要计划一个返回演讲者选择幻灯片的**返回**按钮，但你被要求不要使用可见的动作按钮（*图1
    0.4*）：
- en: '![Figure 10.4 – Adding a hyperlink to a picture from the Insert tab or contextual
    menu](img/B32063_10_04.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图10.4 – 从插入选项卡或上下文菜单添加超链接到图片](img/B32063_10_04.png)'
- en: Figure 10.4 – Adding a hyperlink to a picture from the Insert tab or contextual
    menu
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.4 – 从插入选项卡或上下文菜单添加超链接到图片
- en: 'To insert a hyperlink on a selected object (in our example, it is the picture
    of the first speaker), you can do the following:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 要在选定的对象上插入超链接（在我们的例子中，是第一个演讲者的图片），你可以这样做：
- en: Go to the **Insert** tab ( **1** )
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转到**插入**选项卡（**1**）
- en: Click on the **Action** button ( **2** )
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**动作**按钮（**2**）
- en: In the **Action Settings** window ( **3** ) choose **Slide…** ( **4** ) in the
    **Hyperlink to:** drop-down list. You can also *right-click* the picture ( **5**
    ) and select **Link** ( **6** ) in the contextual menu.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**动作设置**窗口（**3**）中，在**链接到**下拉列表中选择**幻灯片…**（**4**）。你也可以*右键点击*图片（**5**）并在上下文菜单中选择**链接**（**6**）。
- en: 'A new window opens in both cases, allowing you to choose the slide number (
    *Figure 10.5* ):'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，都会打开一个新窗口，允许你选择幻灯片编号（*图10.5*）：
- en: '![Figure 10.5 – Choosing a specific slide to create a hyperlink](img/B32063_10_05.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图10.5 – 选择特定的幻灯片来创建超链接](img/B32063_10_05.png)'
- en: Figure 10.5 – Choosing a specific slide to create a hyperlink
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.5 – 选择特定的幻灯片来创建超链接
- en: 'Let’s say you used the **Action Settings** method:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你使用了**动作设置**方法：
- en: 'The **Hyperlink to Slide** window ( **1** ) is straightforward: you choose
    the slide number corresponding to the first speaker’s content ( **2** )—the list
    shows you the content of the title placeholder on each slide, confirming the importance
    of using different titles for each slide.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链接到幻灯片**窗口（**1**）很简单：你选择与第一个演讲者内容对应的幻灯片编号（**2**）——列表显示了每个幻灯片标题占位符的内容，确认了为每个幻灯片使用不同标题的重要性。'
- en: In the list of slides, any numbers between brackets mean the slides are hidden.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在幻灯片列表中，任何括号内的数字都表示这些幻灯片是隐藏的。
- en: Confirm it is the right one in **Preview** ( **3** ) and click the **OK** button
    to confirm ( **4** ).
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**预览**（**3**）中确认它是正确的，然后点击**确定**按钮来确认（**4**）。
- en: The link method window is labeled **Insert Hyperlink** ( **5** ).
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超链接方法窗口标记为**插入超链接**（**5**）。
- en: 'The **Link to:** pane on the left ( **6** ) allows you to create a hyperlink
    with the following:'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左侧的**链接到**面板（**6**）允许你使用以下方式创建超链接：
- en: '**Existing File or Web Page** ( **7** )'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现有文件或网页**（**7**）'
- en: The **Place in This Document** ( **8** ) option—which is the option needed for
    our example
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在此文档中的位置**（**8**）选项——这是我们例子中需要的选项'
- en: Or, set up a link that uses an email address ( **9** ) to start a new message
    in your default email application when the object is clicked
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者，设置一个使用电子邮件地址（**9**）的超链接，当点击对象时在默认电子邮件应用程序中启动新消息
- en: Continuing with our example, we need to choose a slide ( **10** ), check **Slide
    preview** ( **11** ), and click **OK** ( **12** ) to confirm the hyperlink.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 继续我们的例子，我们需要选择一个幻灯片（**10**），检查**幻灯片预览**（**11**），然后点击**确定**（**12**）来确认超链接。
- en: If you have followed these steps, you now have the first picture from your menu
    slide linking to the second slide. Make sure you repeat the previous steps to
    link the remaining pictures to their respective slides. Now, let’s create our
    invisible **Return** button so that we have an easy way to always go back to the
    first slide.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已遵循这些步骤，你现在已将菜单幻灯片的第一张图片链接到第二张幻灯片。请确保重复之前的步骤，将剩余的图片链接到它们各自的幻灯片。现在，让我们创建我们的隐形**返回**按钮，以便我们有一个简单的方法始终返回到第一张幻灯片。
- en: 'In my example, small circles are used as a design element in the bottom-left
    corner of the slides ( *Figure 10.6* ):'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的例子中，小圆圈被用作幻灯片左下角的设计元素（*图 10.6*）：
- en: '![Figure 10.6 – Using design elements as clickable buttons](img/B32063_10_06.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.6 – 使用设计元素作为可点击按钮](img/B32063_10_06.png)'
- en: Figure 10.6 – Using design elements as clickable buttons
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.6 – 使用设计元素作为可点击按钮
- en: These circles can become subtle navigation elements. If you decide to use this
    technique for yourself, it’s a great way to plan for extra content without making
    it obvious for your audience, as long as you practice enough beforehand. If you
    want to deploy this technique for another person using the file, you need to let
    them know how it works well ahead of time so that they can practice too.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些圆圈可以成为微妙的导航元素。如果你决定为自己使用这种技术，只要事先练习足够，这是一个很好的规划额外内容而不让听众明显察觉的方法。如果你想为使用该文件的其他人部署此技术，你需要提前让他们了解其工作原理，以便他们也能练习。
- en: The best w ay to make sure the navigation buttons are available on all the slides,
    without having to do a lot of copy and paste steps, is to add them on the slide
    master or a specific layout in the **Slide Master** view.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 确保导航按钮在所有幻灯片中都可用，而无需进行大量复制粘贴步骤的最好方法是，在幻灯片母版或幻灯片母版视图中特定布局中添加它们。
- en: 'In my example, I opened **Slide Master** and did the following ( *Figur e 10.7*
    ):'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的例子中，我打开了**幻灯片母版**并执行以下操作（*图 10.7*）：
- en: '![Figure 10.7 – Adding hyperlinks to slide elements in the Slide Master view](img/B32063_10_07.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.7 – 在幻灯片母版视图中向幻灯片元素添加超链接](img/B32063_10_07.png)'
- en: Figure 10.7 – Adding hyperlinks to slide elements in the Slide Master view
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.7 – 在幻灯片母版视图中向幻灯片元素添加超链接
- en: First, *right-click* one of the shapes ( **1** ) and go to the **Insert** tab
    ( **2** )
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，*右键单击*一个形状（**1**）并转到**插入**选项卡（**2**）
- en: Click on **Action** ( **3** ) and open the **Hyperlink to:** list ( **4** )
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**动作**（**3**）并打开**链接到**列表（**4**）。
- en: Choose **First Slide** ( **5** ) and confirm your choice by clicking **OK**
    ( **6** ).
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择**第一张幻灯片**（**5**）并通过点击**确定**（**6**）确认你的选择。
- en: Through the years, I’ve also made it a habit to use a second shape and use the
    **Last Slide Viewed** hyperlink ( **7** ) to make sure that if I had to show something
    else, such as a hidden slide, I could easily come back and resume my presentation.
    Adding this type of link to the second circle from the left on the slide master
    allows you to have easy access to it.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经过多年，我也养成了使用第二个形状并使用**最后查看的幻灯片**超链接（**7**）的习惯，以确保如果需要展示其他内容，例如隐藏的幻灯片，我可以轻松返回并继续我的演示。在幻灯片母版上从左侧第二个圆圈添加此类链接，可以让你轻松访问它。
- en: Adding hidden links to the slide master usually cascades through all your layouts,
    but not always, as we discussed in [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206)
    . If you have used one of the newer themes suggested by Copilot, make sure to
    check all the layouts present in the **Slide Master** view. Many of them include
    extra shapes that help create new designs, and they will hide any navigation element
    added to the master.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 向幻灯片母版添加隐藏链接通常会影响所有布局，但并不总是如此，正如我们在[*第 3 章*](Chapter_03.xhtml#_idTextAnchor206)中讨论的那样。如果你使用了
    Copilot 建议的较新主题，请确保检查幻灯片母版视图中出现的所有布局。其中许多包含额外的形状，有助于创建新设计，并且它们会隐藏添加到母版中的任何导航元素。
- en: If you choose to add hidden navigation to one or more specific layouts, make
    sure you label them, so they are easy to choose in a long list of layouts. With
    the introduction of Copilot, we have learned that the number of suggested layouts
    has increased a lot. Making sure any navigation-related layout can quickly be
    found is essential to keeping your presentation design time efficient.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你选择向一个或多个特定布局添加隐藏导航，请确保为它们标记，这样在长长的布局列表中就很容易选择了。随着 Copilot 的引入，我们了解到建议的布局数量大幅增加。确保任何与导航相关的布局可以快速找到，对于保持演示设计效率至关重要。
- en: You can plan as many hidden links as you want, but remember that the more complex
    your linking scheme, the more practice it requires to use it seamlessly. Just
    as with the action buttons, the best way to understand hyperlinks in your presentations
    is to try them yourself. If you have created the previous linking scheme, put
    your presentation in slideshow mode and try the links. Start by clicking on one
    of the presenter pictures and practice going back to the menu slide with the hidden
    link.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以计划尽可能多的隐藏链接，但请记住，您的链接方案越复杂，使用它所需的练习就越多。就像操作按钮一样，了解您演示文稿中的超链接的最佳方式是亲自尝试。如果您已创建了之前的链接方案，请将您的演示文稿置于幻灯片放映模式并尝试链接。首先点击一位演讲者的图片，并练习使用隐藏链接返回到菜单幻灯片。
- en: The previous example made sense as an example in a learning environment such
    as this book but would not be realistic in the real world. If the four presenters
    have many sli des, it would be much more efficient to leverage the custom shows
    that we will discuss in the follow ing section.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的例子作为一个学习环境，如本书中的例子是有意义的，但在现实世界中则不太现实。如果四位演讲者有很多幻灯片，那么利用我们将在下一节讨论的自定义放映将更加高效。
- en: Creating custom shows
  id: totrans-90
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建自定义放映
- en: '**Custom shows** are a way to create and present a subset of a larger presentation
    file. In the past, I have used them to create a complex marketing dashboard for
    salespeople or even a training dashb oard allowing me to choose content according
    to a specific topic or duration.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '**自定义放映**是创建和展示较大演示文稿文件子集的一种方式。在过去，我曾使用它们为销售人员创建复杂的营销仪表板，甚至创建了一个允许我根据特定主题或持续时间选择内容的培训仪表板。'
- en: Let’s continue with the same example used previously, but with the presentation
    file containing more slides. We will want to create one custom show per presenter
    and then change the hyperlink on our menu slide.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续使用之前使用的相同示例，但这次使用包含更多幻灯片的演示文稿。我们将想要为每位演讲者创建一个自定义放映，然后更改菜单幻灯片上的超链接。
- en: 'Sections were created to make it easier to see the number of slides per speaker
    in the screenshot ( *Figure 10.8* ):'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 创建了部分是为了在截图（*图10.8*）中更容易看到每位演讲者的幻灯片数量：
- en: '![Figure 10.8 – Presentation in the slide sorter view with four sections of
    speaker slides](img/B32063_10_08.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图10.8 – 在幻灯片排序视图中以四个部分展示演讲者幻灯片](img/B32063_10_08.png)'
- en: Figure 10.8 – Presentation in the slide sorter view with four sections of speaker
    slides
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.8 – 在幻灯片排序视图中以四个部分展示演讲者幻灯片
- en: 'To create custom shows, you need to go to the **Slide Show** tab ( **1** )
    and click on the **Custom Slide Show** button ( **2** ) to access the **Custom
    Shows…** feature ( **3** ) ( *Figure 10.9* ):'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建自定义放映，您需要转到**幻灯片放映**选项卡（**1**），然后单击**自定义放映**按钮（**2**）以访问**自定义放映…**功能（**3**）（*图10.9*）：
- en: '![Figure 10.9 – Accessing Custom Shows… from the Slide Show tab](img/B32063_10_09.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图10.9 – 从幻灯片放映选项卡访问自定义放映…](img/B32063_10_09.png)'
- en: Figure 10.9 – Accessing Custom Shows… from the Slide Show tab
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.9 – 从幻灯片放映选项卡访问自定义放映…
- en: 'From the **Custom Shows** window ( **4** ), create a custom show by clicking
    on the **New…** button ( **5** ) to get to the **Define Custom Show** window (
    **6** ). Here are the elements you need to s et to create a custom show:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 从**自定义放映**窗口（**4**），通过单击**新建…**按钮（**5**）进入**定义自定义放映**窗口（**6**）。以下是您需要设置的元素以创建自定义放映：
- en: Give the custom show a name in the **Slide show name:** field ( **7** ).
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**幻灯片放映名称：**字段（**7**）中为自定义放映命名。
- en: Click on the *checkboxes* of the slides you want in it ( **8** )—this step will
    be difficult if you have simple section names in the title placeholders and have
    not noted the slide numbers to include in each custom show.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击您想要包含其中的幻灯片的**复选框**（**8**）——如果您在标题占位符中有简单的部分名称且没有记录要包含在每个自定义放映中的幻灯片编号，这一步将很困难。
- en: Click on the **Add** button ( **9** ) to include the slides in the **Slides
    in custom show:** field ( **10** ).
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**添加**按钮（**9**）将幻灯片包含到**自定义放映中的幻灯片：**字段（**10**）中。
- en: You can select any slide included in this field to activate the **Up** , **Down**
    , and **Remove** buttons ( **11** ) to adapt the slide set and sequence.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以选择此字段中包含的任何幻灯片来激活**上**、**下**和**删除**按钮（**11**），以适应幻灯片集和顺序。
- en: Click on **OK** ( **12** ) to confirm your custom show.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**确定**（**12**）以确认您的自定义放映。
- en: 'Repeat the steps to create the four custom shows needed for this example. After
    you are done, your **Custom Shows** window ( **1** ) should look like this one
    ( *Figure 10.10* ):'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 重复步骤以创建本例所需的四个自定义放映。完成后，您的**自定义放映**窗口（**1**）应看起来像这样（*图10.10*）：
- en: '![Figure 10.10 – Custom Shows window options](img/B32063_10_10.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图10.10 – 自定义节目窗口选项](img/B32063_10_10.png)'
- en: Figure 10.10 – Custom Shows window options
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.10 – 自定义节目窗口选项
- en: 'You will see your list of custom shows ( **2** ) can use any of the following
    buttons to make some changes:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 您将看到您的自定义节目列表（**2**）可以使用以下任何按钮进行一些更改：
- en: The **Edit…** button ( **3** ) is used to make changes to the slides included
    in a custo m show or their order.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编辑…**按钮（**3**）用于更改自定义节目中包含的幻灯片或它们的顺序。'
- en: The **Remove** button ( **4** ) is used to delete a custom show you don’t need
    anymore.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**删除**按钮（**4**）用于删除您不再需要的自定义节目。'
- en: The **Copy** button ( **5** ) allows you to make a copy of an existing custom
    show and then use **Edit…** ( **3** ) to rename and change the content or its
    sequence. It can be very useful when you need to create long custom shows that
    have only a few changes between them.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复制**按钮（**5**）允许您复制现有的自定义节目，然后使用**编辑…**（**3**）来重命名和更改内容或其顺序。当您需要创建只有少数更改的长自定义节目时，这非常有用。'
- en: The **Show** button ( **6** ) starts the selected custom show in slideshow mode
    so that you can view it.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**显示**按钮（**6**）以幻灯片放映模式启动所选的自定义节目，以便您可以查看它。'
- en: When you are done making changes and don’t want to view any of the custom shows,
    just click on the **Close** button ( **7** ).
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成更改后，如果您不想查看任何自定义节目，只需单击**关闭**按钮（**7**）。
- en: 'It’s now time to go back to our first slide of the presentation file and make
    some changes to the links we previously added. The first step is to *right-click*
    a speaker picture ( **1** ), then click on **Edit Link** ( **2** ) ( *Figure 10.11*
    ):'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候回到演示文件的第一页幻灯片，并对我们之前添加的链接进行一些更改了。第一步是*右键单击*一个演讲者图片（**1**），然后点击**编辑链接**（**2**）（*图10.11*）：
- en: '![Figure 10.11 – Editing an existing hyperlink to point to a custom show](img/B32063_10_11.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图10.11 – 编辑现有的超链接以指向自定义节目](img/B32063_10_11.png)'
- en: Figure 10.11 – Editing an existing hyperlink to point to a custom show
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.11 – 编辑现有的超链接以指向自定义节目
- en: 'From the **Edit Hyperlink** window ( **3** ), you need to do the following:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 从**编辑超链接**窗口（**3**），您需要执行以下操作：
- en: Scroll down the list of slides to view your newly created **Custom Shows** (
    **4** ) list. Select the one corresponding to your picture.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 滚动幻灯片列表以查看您新创建的**自定义节目**（**4**）列表。选择与您的图片相对应的一个。
- en: Click on the **Show and return** checkbox ( **5** ). This is a very important
    step to make your linking process efficient. Doing so means that when you reach
    the last slide of the custom show, the slideshow comes back to your first slide.
    No other **Back** button or linked slide object is required.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**显示并返回**复选框（**5**）。这是使您的链接过程高效的一个非常重要的步骤。这样做意味着当您到达自定义节目的最后一页幻灯片时，幻灯片放映会返回到您的第一页幻灯片。不需要其他**返回**按钮或链接幻灯片对象。
- en: Click on **OK** ( **6** ) to confirm the hyperlink change.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单击**确定**（**6**）以确认超链接更改。
- en: Repeat the same process for the remaining pictures, giving you an efficient
    selection board while reducing the number of navigation elements you have to create.
    We used a multi-speaker event example, but this concept can be applied to many
    types of presentations, such as training content.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 对剩余的图片重复相同的过程，这将为您提供一个高效的选板，同时减少您需要创建的导航元素数量。我们使用了多演讲者事件示例，但这个概念可以应用于许多类型的演示，例如培训内容。
- en: 'If you have a very large file containing all the slides available for your
    topic, you can create custom shows simply to avoid having to create separate files
    every time you present. You can simply start a custom show from the **Slide Show**
    tab ( **1** ), click on the **Custom Slide Show** button ( **2** ), and select
    any existing custom show from the list to start your presentation ( **3** ) (
    *Figure 10.12* ):'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有一个包含您主题中所有幻灯片的非常大的文件，您可以通过简单地从**幻灯片放映**选项卡（**1**）开始自定义节目来避免每次演示时都创建单独的文件。您可以直接从**自定义幻灯片放映**按钮（**2**）开始自定义节目，并从列表中选择任何现有自定义节目以开始您的演示（**3**）（*图10.12*）：
- en: '![Figure 10.12 – Starting a custom show in slideshow mode](img/B32063_10_12.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![图10.12 – 在幻灯片放映模式下开始自定义节目](img/B32063_10_12.png)'
- en: Figure 10.12 – Starting a custom show in slideshow mode
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.12 – 在幻灯片放映模式下开始自定义节目
- en: As you can see, building interactivity into your presentations can be done with
    features that have been available within PowerPoint for ages! If you are an Office
    2021, Office 2024, or M365 user, you should consider using Zoom—a newer feature—discussed
    in ou r next section.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，将交互性融入你的演示文稿可以通过 PowerPoint 中已经可用多年的功能来实现！如果你是 Office 2021、Office 2024
    或 M365 用户，你应该考虑使用下一节中讨论的较新的功能——Zoom。
- en: Using the Zoom feature to navigate your content
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Zoom 功能导航你的内容
- en: Microsoft de scribes its **Zoom** feature as a way to make your presentations
    more dynamic and exciting. I call it hyperlinking on steroids because you might
    not have to use the features described in the previous sections ever again.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 微软将其 **Zoom** 功能描述为使你的演示文稿更加动态和有趣的方式。我称之为类固醇般的超链接，因为你可能再也不需要使用之前章节中描述的功能了。
- en: The word *zoom* has been used a lot in the PowerPoint interface. The **Zoom**
    *feature* refers to hyperlinks created to other slides or sections, not to be
    confused with the **Zoom** *animation* (applied to slide objects), the **Zoom**
    *transition* (applied on a slide), and the tool used to magnify your slide view,
    also called *Zoom* .
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 单词 *zoom* 在 PowerPoint 界面中被大量使用。**Zoom** 功能指的是创建到其他幻灯片或部分的超链接，不要与应用于幻灯片对象的 **Zoom**
    动画（**Zoom** 动画）、应用于幻灯片的 **Zoom** 过渡（**Zoom** 过渡）以及用于放大你的幻灯片视图的工具（也称为 *Zoom*）混淆。
- en: 'Since the **Zoom** feature was introduced, I must say I have saved a lot of
    design time while still creating interactive content. There are three types of
    zooms in PowerPoint:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 自从 **Zoom** 功能被引入以来，我必须说我节省了很多设计时间，同时仍然创建了交互式内容。PowerPoint 中有三种类型的缩放：
- en: '**Summary Zoom** allows you to quickly create your navigation page in just
    a few clicks. It adds a new slide with the Zoom objects on it, linking to the
    selected sections.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**总结缩放**允许你通过几点击快速创建导航页面。它添加一个带有 Zoom 对象的新幻灯片，链接到所选部分。'
- en: '**Section Zoom** a llows you to create a navigation page from the existing
    sections in your presentation file. It adds a Zoom object to an existing slide.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部分缩放**允许你从演示文稿文件中的现有部分创建导航页面。它向现有幻灯片添加一个 Zoom 对象。'
- en: '**Slide Zoom** allows you to quickly create a link to a specific slide in your
    presentation. It adds a Zoom object to an existing slide.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻灯片缩放**允许你快速创建到演示文稿中特定幻灯片的链接。它向现有幻灯片添加一个 Zoom 对象。'
- en: Let’s start with an example of how to create a summary zoom in the following
    section.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从以下部分的一个如何创建总结性缩放的例子开始。
- en: Creating a summary zoom
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建总结性缩放
- en: I suggest th at you open a file that already has a few slides t o follow along
    with the explanation of this feature, or you can simply choose one of the templates
    or theme files provided by Microsoft.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议你打开一个已经包含几个幻灯片的文件来跟随本功能的解释，或者你可以简单地选择 Microsoft 提供的模板或主题文件之一。
- en: 'To insert a summary zoom, simply go to the **Insert** tab ( **1** ), then click
    on the **Zoom** button ( **2** ) and select **Summary Zoom** ( **3** ) ( *Figure
    10.13* ):'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 要插入总结性缩放，只需转到 **插入** 选项卡（**1**），然后单击 **Zoom** 按钮（**2**），并选择 **总结缩放**（**3**）（*图
    10.13*）：
- en: '![Figure 10.13 – Inserting a summary zoom](img/B32063_10_13.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.13 – 插入总结缩放](img/B32063_10_13.png)'
- en: Figure 10.13 – Inserting a summary zoom
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.13 – 插入总结性缩放
- en: In the **Insert Summary Zoom** window ( **4** ), select the checkbox for all
    the slides you want to use to start a section you want to navigate to ( **5**
    ). You can check the number of slides selected ( **6** ) and then click on the
    **Insert** button ( **7** ).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **插入总结缩放** 窗口（**4**）中，选择你想要开始导航到部分的幻灯片的所有复选框（**5**）。你可以检查所选幻灯片的数量（**6**），然后单击
    **插入** 按钮（**7**）。
- en: 'PowerPoint automatically inserts a *new summary slide* ( **1** ) ( *Figure
    10.14* ):'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint 自动插入一个 *新的总结幻灯片*（**1**）（*图 10.14*）：
- en: '![Figure 10.14 – Summary zoom slide inserted and sections created](img/B32063_10_14.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.14 – 插入总结缩放幻灯片并创建部分](img/B32063_10_14.png)'
- en: Figure 10.14 – Summary zoom slide inserted and sections created
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.14 – 插入总结缩放幻灯片并创建部分
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)
    ** Quick tip ** : Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的可能内容可能不正确。](img/1.png) **快速提示**：需要查看此图像的高分辨率版本？在下一代 Packt
    Reader 中打开此书或在其 PDF/ePub 版本中查看。'
- en: '![img](img/2.png) ** The next-gen Packt Reader ** is included for free with
    the purchase of this book. Scan the QR code OR go to [ https://packtpub.com/unlock
    ](https://packtpub.com/unlock) , then use the search bar to find this book by
    name. Double-check the edition shown to make sure you get the right one.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '![img](img/2.png) **新一代Packt Reader**随本书免费赠送。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock2.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码  AI生成的内容可能不正确。](img/Unlock2.png)'
- en: Depending on the template or theme you used, it might be wise to change the
    layout of your summary slide if it includes unwanted placeholders. In our example,
    the *Zoom slide object* ( **2** ) contains the four thumbnails of the slides previously
    selected – it can be resized according to your needs. As you can see, *sections*
    are also automatically created ( **3** ).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您使用的模板或主题，如果您总结幻灯片包含不想要的占位符，更改总结幻灯片的布局可能是个明智的选择。在我们的示例中，*缩放幻灯片对象*（**2**）包含之前选择的四个幻灯片缩略图——它可以根据您的需求进行调整大小。正如您所看到的，*部分*也会自动创建（**3**）。
- en: 'With the *Zoom slide object* selected ( **2** ), open the **Zoom** tab ( **4**
    ) to access options and formatting tools. A small tooltip identifies the slide
    numbers included in each section ( **5** ). Sinc e the formatting options in this
    tab are similar to many others discussed in previous chapters (for example, shapes,
    images, and so on), we will only discuss the **Zoom Options** types ( **6** ):'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 选择**缩放幻灯片对象**（**2**）后，打开**缩放**选项卡（**4**）以访问选项和格式化工具。一个小工具提示标识了每个部分中包含的幻灯片编号（**5**）。由于此选项卡中的格式化选项与之前章节中讨论的许多其他选项类似（例如，形状、图片等），我们只讨论**缩放选项**类型（**6**）：
- en: '**Edit Summary** ( **7** ): You can edit your summary slide by removing sections,
    or adding a new one you just created, without having to start the process over.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编辑总结**（**7**）：您可以通过删除部分或添加您刚刚创建的新部分来编辑您的总结幻灯片，而无需从头开始整个过程。'
- en: '**Reset Layout** ( **8** ): You can move, resize, and edit each section thumbnail
    individually. If you want to go back to the original layout provided by PowerPoint,
    this is the button to click.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重置布局**（**8**）：您可以单独移动、调整大小和编辑每个部分的缩略图。如果您想回到PowerPoint提供的原始布局，请点击此按钮。'
- en: '**Change Image** ( **9** ): This button will be available if you have selected
    one of the thumbnails in the summary. It allows you to change its image if you
    don’t want to use the image of the first slide of the section.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更改图片**（**9**）：如果您在总结中选择了其中一个缩略图，此按钮将可用。它允许您更改其图片，如果您不想使用该部分的第一个幻灯片的图片。'
- en: '**Return to Zoom** ( **10** ): This checkbox is selected by default and acts
    exactly like the **Show and return** feature when linking to custom shows, as
    discussed in the previous section. If you uncheck it, it means that you will not
    go back to your summary slide when you finish a section.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**返回缩放**（**10**）：此复选框默认选中，当链接到自定义演示时，其行为与上一节中讨论的**显示并返回**功能完全相同。如果您取消勾选它，这意味着在完成一个部分后，您将不会返回到您的总结幻灯片。'
- en: '**Zoom Transition** and **Duration** ( **11** ): These options give the zooming-in
    effect after clicking on a thumbnail to reach a section and its duration; unchecking
    the **Zoom Transition** box removes the effect. I suggest that the only change
    you consider for the duration is increasing it, never reducing it. A very short
    duration increases the possibility of creating a motion-sickness effect for some
    people.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缩放过渡**和**持续时间**（**11**）：这些选项在点击缩略图后提供缩放效果以到达某个部分及其持续时间；取消勾选**缩放过渡**复选框将移除该效果。我建议您考虑的唯一更改是增加持续时间，而不是减少它。非常短的持续时间会增加某些人产生运动病症状的可能性。'
- en: Without making any changes to the options, you would be ready to use your zoom.
    If you followed along, simply go into slideshow mode and try it. **Summary Zoom**
    is an excellent choice when you have a presentation file that contains many slides,
    even if you have not created any sections in it yet. When you do have sections
    already, PowerPoint recognizes them and automatically selects the first slide
    of each section when you insert a summary zoom.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在不更改任何选项的情况下，您就可以使用您的缩放功能了。如果您已经跟随操作，只需进入幻灯片放映模式并尝试即可。**总结缩放**是当您有一个包含许多幻灯片的演示文稿时的一个优秀选择，即使您还没有在其中创建任何部分。当您已经创建了部分时，PowerPoint会识别它们，并在您插入总结缩放时自动选择每个部分的第一个幻灯片。
- en: The zooming effect seen in the **Slide Show** view when clicking a slide thumbnail
    is compatible with the desktop versions of PowerPoint (Office 2021, Office 2024,
    M365). If you plan on presenting using the web version of PowerPoint, you will
    be able to navigate through the sections, but there will not be any zooming in
    effect. If you plan on using PowerPoint Live in Teams, **Summary Zoom** will be
    completely inactive, although any other linked object will allow you to navigate
    as planned.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在**幻灯片预览**视图中点击幻灯片缩略图时看到的缩放效果与PowerPoint（Office 2021、Office 2024、M365）的桌面版本兼容。如果你计划使用PowerPoint的网页版进行演示，你将能够浏览各个部分，但不会有缩放效果。如果你计划在Teams中使用PowerPoint
    Live，**总结缩放**将完全不可用，尽管任何其他链接对象都将允许你按计划导航。
- en: If you don’t need a summary slide but would like to have easy access to a section
    already created in your presentation, that is when you need to use a section zoom,
    the topic of the next section.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不需要总结幻灯片，但希望方便地访问你已经在演示文稿中创建的部分，那么这就是你需要使用部分缩放，下一节的主题的时候。
- en: Inserting a section zoom
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 插入部分缩放
- en: Let’s say you have a hidden resource section at the end of your presentation,
    just in ca se you need extra content to answer a question or suppo rt your idea.
    The easy way to access that content is to use **Section Zoom** . It requires that
    you plan where it would make sense to include it. If you have studied the topics
    described in [*Chapter 1*](Chapter_01.xhtml#_idTextAnchor022) , you should have
    a good idea already.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你在演示文稿的末尾有一个隐藏的资源部分，以防你需要额外的内容来回答问题或支持你的观点。访问这些内容的简单方法是使用**部分缩放**。这要求你计划在哪里包含它是有意义的。如果你已经学习了[*第1章*](Chapter_01.xhtml#_idTextAnchor022)中描述的主题，你应该已经有了很好的想法。
- en: 'Let’s use the following example to insert a section zoom on slide **9** ( **1**
    ), where we might need o ur resources ( *Figure 10.15* ):'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用以下示例在幻灯片**9**（**1**）上插入部分缩放，我们可能需要我们的资源（*图10.15*）：
- en: '![Figure 10.15 – Inserting a section zoom on a specific slide](img/B32063_10_15.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图10.15 – 在特定幻灯片上插入部分缩放](img/B32063_10_15.png)'
- en: Figure 10.15 – Inserting a section zoom on a specific slide
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.15 – 在特定幻灯片上插入部分缩放
- en: You need to click on the **Zoom** button in the **Insert** tab and select **Section
    Zoom** ( **2** ) to get access to the **Insert Section Zoom** window ( **3** ).
    Select the **Resources** section ( **4** ) and click on the **Insert** button
    ( **5** ).
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要在**插入**选项卡中点击**缩放**按钮，并选择**部分缩放**（**2**），以访问**插入部分缩放**窗口（**3**）。选择**资源**部分（**4**），然后点击**插入**按钮（**5**）。
- en: 'The other method to add a section zoom is by clicking the *section name* in
    the slide pane ( **1** ) while keeping your finger on the left mouse button to
    drag the section o nto the slide ( *Figure 10.16* ):'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 添加部分缩放的另一种方法是，在幻灯片窗格中点击**部分名称**（**1**）的同时按住鼠标左键，将部分拖动到幻灯片上（*图10.16*）：
- en: '![Figure 10.16 – Section Zoom slide object and the options and formatting tools](img/B32063_10_16.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![图10.16 – 部分缩放幻灯片对象及其选项和格式化工具](img/B32063_10_16.png)'
- en: Figure 10.16 – Section Zoom slide object and the options and formatting tools
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.16 – 部分缩放幻灯片对象及其选项和格式化工具
- en: When you start dragging the section, you will first see all the sections collapse
    ( **2** ) while your mouse cursor becomes a label of the section name with its
    number of slides in brackets ( **3** ).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始拖动部分时，你首先会看到所有部分都折叠（**2**），同时你的鼠标光标变成带有括号中幻灯片数量的部分名称标签（**3**）。
- en: After releasing your left mouse button over your slide, you get a **Section
    Zoom** slide object ( **4** ) that can be moved and resized. It shows which slide
    numbers are included in the section ( **5** ) when the **Zoom** tab is active.
    The **Zoom** tab contains the same options and formatting tools as **Summary Zoom**
    . By default, you will return to your slide after showing the section.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的幻灯片上释放鼠标左键后，你会得到一个**部分缩放**幻灯片对象（**4**），它可以被移动和调整大小。当**缩放**选项卡处于活动状态时，它显示包含在该部分中的幻灯片编号（**5**）。**缩放**选项卡包含与**总结缩放**相同的选项和格式化工具。默认情况下，在显示部分后，你会返回到你的幻灯片。
- en: A section zoom is easy to insert and use, so now that you know how to do it,
    do not hesitate to plan more content that can be used to answer questions or show
    extra information because you have more time than you expected.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 部分缩放易于插入和使用，因此现在你知道如何操作后，不要犹豫，计划更多可以用来回答问题或展示额外信息的内容，因为你比预期的有更多时间。
- en: When you only need to access one slide, you don’t need to create a separate
    section for it. You can simply use a slide zoom, which is the topic of our next
    section.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 当您只需要访问一个幻灯片时，您不需要为它创建一个单独的部分。您可以直接使用幻灯片缩放，这是我们下一节的主题。
- en: Inserting a slide zoom
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 插入幻灯片缩放
- en: If you ha ve several unrelated slides to be used as extra content or resources,
    you can use **Slide Zoom** . It works exactly the same as **Section Zoom** , which
    we just talked about, except that the link points to only one slide.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有多个不相关的幻灯片用作额外内容或资源，您可以使用**幻灯片缩放**。它的工作方式与刚刚提到的**章节缩放**完全相同，只是链接仅指向一个幻灯片。
- en: You can again go to **Insert** | **Zoom** , but this time select **Slide Zoom**
    to access a window allowing you to choose the slide number you want to insert.
    The method I prefer is clicking and dragging the slide thumbnail from the slide
    pane onto the slide. The result is a **Slide Zoom** slide object ( **1** ) with
    a tooltip showing the *slide number* ( **2** ) where we will navigate.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以再次转到**插入** | **缩放**，但这次选择**幻灯片缩放**以访问一个窗口，允许您选择要插入的幻灯片编号。我更喜欢的方法是点击并拖动幻灯片缩略图从幻灯片面板拖到幻灯片上。结果是带有提示信息的**幻灯片缩放**幻灯片对象（**1**），提示信息显示我们将要导航的**幻灯片编号**（**2**）。
- en: 'There is one important difference in **Zoom Options** ( **3** ), though: the
    **Return to Zoom** option is not selected! If your intention is to easily come
    back to your previous slide, make sure to check that box ( *Figure 10.17* ):'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在**缩放选项**（**3**）中有一个重要的区别：未选中**返回缩放**选项！如果您的目的是轻松返回到之前的幻灯片，请确保勾选该框（*图 10.17*）：
- en: "![Figure 10.17 – Inserting a sli\uFEFFde zoom](img/B32063_10_17.png)"
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.17 – 插入幻灯片缩放](img/B32063_10_17.png)'
- en: Figure 10.17 – Inserting a sli de zoom
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.17 – 插入幻灯片缩放
- en: You now know the basics to quickly create a navigation system in your presentation
    with the help of the three Zoom features. Deliverin g this type of presentation
    can be as simple as clicking your remote or using your keyboard to click through
    your presentation. You will advance through all the sections present in your summary
    zoom in order. But if you have included section or slide zooms on your slides,
    keep in mind that you will need to click on them to access their content. If that
    is how you want to evolve in terms of presentation interactions, I would suggest
    you start practicing with a remote that has mouse control.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在已经了解了如何使用三个缩放功能快速在演示文稿中创建导航系统的基本知识。交付此类演示文稿可以简单到只需点击您的遥控器或使用键盘点击通过您的演示文稿。您将按顺序浏览总结缩放中存在的所有部分。但如果您在幻灯片中包含了章节或幻灯片缩放，请记住您需要点击它们才能访问其内容。如果您希望以这种方式发展演示文稿的交互性，我建议您从具有鼠标控制的遥控器开始练习。
- en: Your Zoom slide objects can be resized as much as you want, but maybe your goal
    is to have a completely hidden menu you can access only when you need it. That
    is what we will se e in the last section of this chapter.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以随意调整 Zoom 幻灯片对象的尺寸，但也许您的目标是拥有一个完全隐藏的菜单，只有在需要时才能访问。这正是本章最后一节我们将要探讨的内容。
- en: Creating triggered menus
  id: totrans-177
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建触发菜单
- en: 'Now that you have seen many features that can help you create more interactive
    presentations, let’s create an advanced interactive menu with the help of slide
    zooms and a trigger animation. The result of this technique will be that, when
    clicking on an invisible shape on my slide ( **1** ), a *menu with two slide zooms*
    ( **2** ) will move in from the left of the slide ( **3** ) to allow accessin
    g either of the slides ( *Figure 10.18* ):'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经看到了许多可以帮助您创建更具交互性演示文稿的功能，让我们在幻灯片缩放和触发动画的帮助下创建一个高级交互式菜单。这种技术的结果是，当点击我幻灯片上的一个不可见的形状（**1**）时，一个**带有两个幻灯片缩放的菜单**（**2**）将从幻灯片的左侧（**3**）移动过来，以便访问任一幻灯片（*图
    10.18*）：
- en: '![Figure 10.18 – Using a hidden Slide Zoom menu](img/B32063_10_18.png)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.18 – 使用隐藏的幻灯片缩放菜单](img/B32063_10_18.png)'
- en: Figure 10.18 – Using a hidden Slide Zoom menu
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.18 – 使用隐藏的幻灯片缩放菜单
- en: 'As you can see in the **Selection** pane ( **4** ), the invisible shape has
    been renamed **Menu trigger** ( **5** ), and the *slide zooms* are part of **Group
    7** ( **6** ). The animation pane will have a list of two triggered animations
    ( **7** ): one for the motion path and one for the exit fade.'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在**选择**面板（**4**）中看到的，不可见的形状已被重命名为**菜单触发器**（**5**），而**幻灯片缩放**是**组 7**（**6**）的一部分。动画面板将有一个包含两个触发动画的列表（**7**）：一个用于运动路径，一个用于退出淡出。
- en: 'Since we have discussed all the components included in the creation of this
    example in previous sections and chapters, I want to challenge you a little more
    to recreate it. What follows are all the steps to create a hidden menu that can
    be made visible with a trigger. Try it, then have a look at the *Further reading*
    section for a link to a tutorial video. Here are the steps:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在前面的章节中已经讨论了创建此示例所包含的所有组件，我想稍微挑战你一下，尝试重新创建它。以下都是创建一个可以通过触发器显示的隐藏菜单的步骤。试一试，然后查看*进一步阅读*部分，以获取教程视频的链接。以下是步骤：
- en: Select a slide where you want to access your hidden menu.
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个你想访问隐藏菜单的幻灯片。
- en: Insert two slide zooms, resize them, and move them outside of the canvas in
    the gray area, on the left of the slide. Make sure the **Return to Zoom** option
    is selected.
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 插入两个幻灯片缩放，调整它们的大小，并将它们移动到幻灯片左侧的灰色区域之外。确保选择了**返回缩放**选项。
- en: Group the two slide-zoom objects together.
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将两个幻灯片缩放对象组合在一起。
- en: Insert a shape to be used as a clicking element. If you want t o make it invisible,
    remove its outline and use the same color as the background, or make the fill
    99% transparent. Do not use 100% transparency, as it has been known to make hyperlinks
    stop working, and it is not always predictable whether it will happen or not.
    You can also decide to leave it visible but include it in your design.
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 插入一个用作点击元素的形状。如果你想使其不可见，请移除其轮廓并使用与背景相同的颜色，或者使填充色达到99%的透明度。不要使用100%的透明度，因为它已知会导致超链接停止工作，而且它是否会发生并不总是可预测的。你也可以选择让它保持可见，但将其包含在你的设计中。
- en: Open the **Selection** pane and rename the shape to find it easily when animating
    the objects.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开**选择**面板，将形状重命名，以便在动画对象时容易找到它。
- en: Add a motion path to the slide zoom group, making it move to the right so that
    it ends on the slide area. Click on **Trigger** to select the shape that will
    be clicked on to start the animation.
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将运动路径添加到幻灯片缩放组，使其向右移动，以便它结束在幻灯片区域。点击**触发器**以选择将用于启动动画的形状。
- en: Add an exit Fade animation to the slide zoom group. Click on **Trigger** again
    and select the same shape as the previous step.
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将淡出动画添加到幻灯片缩放组中。再次点击**触发器**并选择上一步相同的形状。
- en: Test your animation.
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 测试你的动画。
- en: This advanced animation tip using triggers and zooms can be a very creative
    way to access extra content you have planned but want to access on demand only.
    If you start using a few topics discussed in this chapter for your presentations,
    you will in crease audience engagement tremendously.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 使用触发器和缩放的高级动画技巧可以是一种非常创造性的方式来访问你计划但只想按需访问的额外内容。如果你开始使用本章中讨论的几个主题来制作你的演示，你将极大地提高观众的参与度。
- en: Summary
  id: totrans-192
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we saw how to create and use various navigation elements in
    our presentations and create custom shows so that we can easily access a subset
    of our slides without creating a new file. We also discussed the use of the various
    **Zoom** features to quickly create more interactive content and how to create
    a hidden **Zoom** menu with the triggers.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们看到了如何在演示中创建和使用各种导航元素，创建自定义演示，以便我们可以轻松访问幻灯片子集而无需创建新文件。我们还讨论了使用各种**缩放**功能快速创建更多互动内容，以及如何使用触发器创建隐藏的**缩放**菜单。
- en: Becoming a more flexible and interactive presenter is something you should consider.
    Having the possibility to move away from a strictly linear delivery style is much
    more engaging for audiences. I have been including flexibility and interactivity
    in my presentations for many years now, even when I had to plan and create everything
    with hyperlinks, triggers, and custom shows. Even though it was very time-consuming,
    I was always rewarded by audiences asking me whether I could go back to a previous
    section or slide because they realized I was not stuck in a linear slideshow.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 成为更灵活和互动的演示者是你应该考虑的事情。有机会摆脱严格线性的交付风格对观众来说会更有吸引力。多年来，我一直在我的演示中包含灵活性和互动性，即使我不得不使用超链接、触发器和自定义演示来计划和创建一切。尽管这非常耗时，但我总是得到观众的回报，他们问我是否可以回到前面的部分或幻灯片，因为他们意识到我没有陷入线性的幻灯片放映中。
- en: Now that PowerPoint offers us more features to speed up the process, not having
    enough time to consider flexible and interactive content is not a good excuse
    anymore, especially if you want to stand out in your industry and be perceived
    as an expert. It does require that you plan and practice more, but you will be
    rewarded with increased audience satisfaction, which might have a big impact on
    your presentation.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 现在PowerPoint为我们提供了更多功能来加快处理过程，没有足够的时间考虑灵活和互动的内容不再是借口，尤其是如果你想在你所在的行业中脱颖而出，并被视为专家。这确实需要你进行更多规划和练习，但你将获得观众满意度的提升，这可能会对你的演示产生重大影响。
- en: In the next chapter—the last one in the content creation part of this book—we
    will be discussing PowerPoint third-party add-ins that can help you improve your
    workflow or add features n ot natively included in the application.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章——本书内容创作部分的最后一章中——我们将讨论PowerPoint第三方插件，这些插件可以帮助你改进工作流程或添加应用中未包含的功能。
- en: Further reading
  id: totrans-197
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: '*Microsoft Support* article on action settings: [https://support.microsoft.com/en-us/office/add-commands-to-your-presentation-with-action-buttons-7db2c0f8-5424-4780-93cb-8ac2b6b5f6ce](https://support.microsoft.com/en-us/office/add-commands-to-your-presentation-with-action-buttons-7db2c0f8-5424-4780-93cb-8ac2b6b5f6ce)'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*微软支持*关于动作设置的文章：[https://support.microsoft.com/en-us/office/add-commands-to-your-presentation-with-action-buttons-7db2c0f8-5424-4780-93cb-8ac2b6b5f6ce](https://support.microsoft.com/en-us/office/add-commands-to-your-presentation-with-action-buttons-7db2c0f8-5424-4780-93cb-8ac2b6b5f6ce)'
- en: 'Link to a video tutorial on triggered menus: [https://youtu.be/f48e-dmYkSY](https://youtu.be/f48e-dmYkSY)'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 触发菜单的视频教程链接：[https://youtu.be/f48e-dmYkSY](https://youtu.be/f48e-dmYkSY)
