    apter07/solutions/README.md)."
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: "你可以通过[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter07/solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Ch\uFEFF\
    apter07/solutions/README.md)访问解决方案。"
- en: Quiz
  id: totrans-128
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 习题
- en: What can a client access on an MCP server?
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端可以在MCP服务器上访问什么？
- en: 'A: Prompts, tools, and resources'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 提示、工具和资源'
- en: 'B: Tools, prompts, and services'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 工具、提示和服务'
- en: 'C: Tools and prompts'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 工具和提示'
- en: What’s the benefit of adding an LLM to your client?
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 将LLM添加到客户端有什么好处？
- en: 'A: It’s better to place the LLM on the server'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 将LLM放在服务器上更好'
- en: 'B: It makes the client faster'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 它使客户端更快'
- en: 'C: An LLM on the client allows the end user to use prompts to interact with
    the server, which makes for a much better user experience'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 客户端的LLM允许最终用户使用提示与服务器交互，这为用户提供了更好的体验'
- en: "You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter07/solutions/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter07\uFEFF\
    /solutions/\uFEFFsolution-quiz.md)."
