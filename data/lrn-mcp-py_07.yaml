  zh: "你可以通过[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter07/solutions/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter07\uFEFF\
