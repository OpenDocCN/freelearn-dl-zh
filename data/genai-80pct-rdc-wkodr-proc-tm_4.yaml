- en: The Data Chaos Problem
  id: totrans-0
  prefs: []
  type: TYPE_NORMAL
  zh: 数据混乱问题
- en: The pervasive nature of unstructured data
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 非结构化数据的普遍性
- en: Unstructured data is a persistent issue across industries and a significant
    barrier to digital transformation initiatives. Unlike structured data, which resides
    neatly in databases or spreadsheets, unstructured data arrives in various formats
    — PDFs, DOCX, PowerPoint presentations, and images – making it difficult to process,
    analyze, and leverage efficiently.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 非结构化数据是跨行业的一个持续问题，是数字化转型倡议的重大障碍。与结构化数据不同，后者整齐地存储在数据库或电子表格中，非结构化数据以各种格式出现——PDF、DOCX、PowerPoint演示文稿和图像——这使得其难以处理、分析和有效利用。
- en: Even traditionally structured formats like XLS and CSV often contain freeform
    text, images, and inconsistent formatting that challenge large-scale data processing.
    An estimated 80% of an organization’s data is unstructured ([Automated Intelligence,
    2023](https://automated-intelligence.com/news-and-insights/articles/navigating-unstructured-data-challenges-in-a-growing-data-landscape-5-insights-to-consider/)),
    making the issue widespread and increasingly complex.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是传统的结构化格式，如XLS和CSV，也常常包含自由形式的文本、图像和不一致的格式，这些对大规模数据处理构成了挑战。据估计，一个组织的数据中有80%是非结构化的([自动化智能，2023](https://automated-intelligence.com/news-and-insights/articles/navigating-unstructured-data-challenges-in-a-growing-data-landscape-5-insights-to-consider/))，这使得问题普遍存在且日益复杂。
- en: Why this is a problem in the age of AI
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么在人工智能时代这是一个问题
- en: A key challenge unstructured data poses is its incompatibility with automated
    systems and AI processing. Formats like PDFs often include embedded images, charts,
    and tables that cannot be easily converted into usable, structured data. This
    forces teams to resort to manual processes, such as copying and pasting data from
    documents, resulting in inefficiencies and introducing a high risk of human error.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 非结构化数据提出的一个关键挑战是其与自动化系统和AI处理的兼容性问题。PDF等格式通常包含嵌入的图像、图表和表格，这些无法轻易转换为可用的结构化数据。这迫使团队求助于手动过程，例如从文档中复制和粘贴数据，导致效率低下并引入了高人为错误的风险。
- en: When businesses rely on AI systems to automate processes and generate insights,
    the quality and structure of input data is critical. AI systems require structured,
    well-organized data to function effectively. Complex or poorly formatted unstructured
    data can lead to inaccurate outputs when fed into AI systems.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 当企业依赖AI系统来自动化流程和生成见解时，输入数据的质量和结构至关重要。AI系统需要结构化、组织良好的数据才能有效运行。复杂或格式不佳的非结构化数据在输入AI系统时可能导致不准确的结果。
- en: For example, AI models may misinterpret or fail to process key information,
    resulting in flawed insights or erroneous recommendations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，AI模型可能会误解或无法处理关键信息，导致错误的见解或错误的建议。
- en: The long-term impact
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 长期影响
- en: The consequences of failing to manage unstructured data extend beyond immediate
    operational inefficiencies. Poorly processed data can lead to flawed AI outputs,
    creating systemic issues across an organization. Over time, this results in the
    accumulation of technical debt—a growing burden that, like financial debt, compounds
    and becomes increasingly difficult to address.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 无法管理非结构化数据的后果不仅限于立即的运营效率低下。处理不当的数据可能导致错误的AI输出，在整个组织中造成系统性问题。随着时间的推移，这会导致技术债务的积累——一个不断增长的负担，就像财务债务一样，会累积并变得越来越难以解决。
- en: Technical debt caused by unstructured data slows innovation, increases costs,
    and hinders an organization’s ability to scale. Flawed or incomplete data inputs
    can lead to suboptimal AI-driven decisions, reducing the overall effectiveness
    of AI initiatives. As organizations increasingly rely on AI for automation and
    strategic decision-making, addressing unstructured data early in the process is
    crucial to avoid long-term inefficiencies.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由非结构化数据引起的技术债务会减缓创新，增加成本，并阻碍组织扩展的能力。不完整或错误的数据输入可能导致次优的AI驱动决策，降低AI项目的整体有效性。随着组织越来越依赖AI进行自动化和战略决策，在流程早期解决非结构化数据问题至关重要，以避免长期低效。
- en: By implementing structured data solutions, AI- powered workflows, and consistent
    preprocessing strategies, businesses can reduce technical debt and create a foundation
    for scalable, efficient AI systems.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实施结构化数据解决方案、AI驱动的流程和一致的预处理策略，企业可以减少技术债务，为可扩展、高效的AI系统打下基础。
- en: '![](img/2.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/2.png)'
- en: When the source data is already digital — like spreadsheets or databases — transformation
    and augmenting processes, reporting, and analytics are relatively manageable.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当源数据已经是数字化的——比如电子表格或数据库——转换和增强过程、报告和分析相对容易管理。
- en: However, the real challenge comes with unstructured data, which often arrives
    in various formats and through different delivery methods.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，真正的挑战来自于非结构化数据，这些数据通常以各种格式和不同的交付方式到来。
- en: We call this problem data chaos. All these different formats of unstructured
    data are hindering companies from fully realizing their digital transformation
    efforts.”
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们称这个问题为数据混乱。所有这些非结构化数据的不同格式都在阻碍公司实现其数字化转型努力。”
- en: --Binni Skariah
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: --Binni Skariah
- en: The Black Dome Case Study
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: Black Dome案例研究
- en: Who is Black Dome?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 谁是Black Dome？
- en: '[Black Dome Property Services](https://www.blackdomeservices.com/) specializes
    in property preservation for mortgage companies and financial institutions. These
    institutions often acquire properties through foreclosure, bankruptcy, or default,
    and are responsible for maintaining them until they can be sold to new owners.
    Black Dome handles tasks ranging from lawn care and snow removal to more extensive
    repairs, ensuring that properties remain in good condition throughout the foreclosure
    process.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[Black Dome Property Services](https://www.blackdomeservices.com/)专注于为抵押贷款公司和金融机构提供财产保护。这些机构通常通过抵押权、破产或违约来获取财产，并负责在可以将其出售给新业主之前维护这些财产。Black
    Dome负责从草坪护理和除雪到更广泛的维修等一系列任务，确保在整个抵押权过程中财产保持良好状态。'
- en: What problems were Black Dome facing?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Black Dome面临了哪些问题？
- en: 'Inconsistent formatting: Black Dome’s primary challenge stemmed from the varied
    formats in which they received work order data. As Binni explained, “The data
    they received from various vendors came in different formats, because each vendor
    and client has their own system for generating housing data.” This inconsistency
    created a significant hurdle, as Black Dome had to manage multiple formats from
    different sources, complicating their ability to process the data efficiently.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 格式不一致：Black Dome面临的主要挑战来自他们收到的各种格式的工作订单数据。正如Binni解释的那样，“他们从各个供应商那里收到的数据格式不同，因为每个供应商和客户都有自己的系统来生成住房数据。”这种不一致性造成了一个重大的障碍，因为Black
    Dome不得不管理来自不同来源的多种格式，这复杂了他们高效处理数据的能力。
- en: 'Manual data entry and its consequences: Due to the lack of uniformity in data
    formats, Black Dome employees were forced to manually enter information from each
    document into their property and work order management system. This tedious process
    had several detrimental effects on the company:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 手动数据录入及其后果：由于数据格式的不统一，Black Dome的员工被迫将每份文档中的信息手动输入到他们的财产和工作订单管理系统。这个过程既繁琐又浪费时间，对公司的几个方面产生了不利影响：
- en: 'Reduced efficiency and throughput: As Binni noted, “Employees were opening
    documents, cutting and pasting line by line into their application, which manages
    work orders and communicates with field reps.” This manual approach severely limited
    the number of work orders Black Dome could process in a given time. The bottleneck
    made it challenging to keep up with the volume of work, sometimes leading to processing
    delays.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 效率和吞吐量降低：正如Binni所指出的，“员工需要打开文档，逐行剪切和粘贴到他们的应用程序中，该应用程序管理工作订单并与现场代表沟通。”这种手动方法严重限制了Black
    Dome在特定时间内可以处理的工作订单数量。瓶颈使得跟上工作量变得具有挑战性，有时会导致处理延迟。
- en: 'Increased risk of human error: Manually re-entering data always carries a risk
    of mistakes. Employees could misread data, type incorrectly, or enter information
    into the wrong fields. This often led to inaccurate work orders, which could cause
    further delays or even result in errors that damaged properties.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类错误的风险增加：手动重新输入数据总是存在出错的风险。员工可能会误读数据、输入错误或把信息输入到错误的字段中。这通常会导致不准确的工作订单，这可能会进一步延迟甚至导致损坏财产的错误。
- en: 'Outsourcing costs: To manage the high volume of work orders, Black Dome had
    to outsource some of the data entry work, incurring additional expenses.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 外包成本：为了管理大量工作订单，Black Dome不得不外包一些数据录入工作，从而产生了额外的费用。
- en: Specific pain points
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 具体的痛点
- en: 'Multiple work orders per property: Black Dome frequently managed properties
    that required multiple work orders for different tasks, such as lawn care, repairs,
    or cleaning. As Binni explained, “A single property might have multiple work orders,
    and each order could have 40 line items.” This dramatically increased the amount
    of data that needed to be manually processed, further slowing down operations.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 每个物业多个工作订单：Black Dome 经常管理需要多个工作订单的物业，这些工作订单涉及不同的任务，如草坪护理、维修或清洁。正如 Binni 解释的那样，“一个物业可能有多个工作订单，每个订单可能有
    40 项。”这大大增加了需要手动处理的数据量，进一步减缓了运营速度。
- en: 'Time-consuming data entry for each work order: Each work order took considerable
    time to process, with employees spending as much as 40 minutes per order manually
    inputting the data. “It was a time- consuming process,” said Binni, “Workers had
    to open the attachment, then open their application on another monitor, often
    using multiple screens. For each house, they manually copy and paste details like
    repairs, service categories, and locations from the document into the application
    across various screens. It’s a tedious, manual process.” This inefficient system
    placed a burden on Black Dome’s staff, reducing their ability to handle the growing
    workload.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 每个工作订单耗时数据录入：每个工作订单的处理都需要相当多的时间，员工每个订单可能需要花费多达 40 分钟手动输入数据。“这是一个耗时过程，”Binni
    说，“工人们必须打开附件，然后在另一台显示器上打开他们的应用程序，通常使用多个屏幕。对于每栋房子，他们必须手动将维修、服务类别和位置等详细信息从文档复制粘贴到各个屏幕上的应用程序中。这是一个繁琐的手动过程。”这个低效的系统给
    Black Dome 的员工带来了负担，降低了他们处理不断增长的工作量的能力。
- en: 'Before: Black Dome’s work order processing workflow, prior to AI and automation
    solutions'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前：Black Dome 的工作订单处理工作流程，在 AI 和自动化解决方案之前
- en: Figure 1 shows how Black Dome were handling their work order management process
    before implementing AI and automation solutions into their workflow. It often
    required outsourcing to keep up with demand, and can be broadly broken down into
    eight steps.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1 展示了在将 AI 和自动化解决方案引入其工作流程之前，Black Dome 如何处理工作订单管理流程。这通常需要外包以跟上需求，并且可以大致分为八个步骤。
- en: 'Step One: Employees receive emails from clients with work order attachments
    for different properties.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步：员工收到来自客户的电子邮件，其中包含不同物业的工作订单附件。
- en: 'Step Two: Workers open the attachments, which are often unstructured documents
    such as PDFs.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步：工人们打开附件，这些附件通常是未结构化的文档，如 PDF 文件。
- en: 'Step Three: Workers open Black Dome’s application for managing work orders
    on another monitor.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步：工人在另一台显示器上打开 Black Dome 管理工作订单的应用程序。
- en: 'Step Four: For each property, workers copy details like repairs, service categories,
    and locations from the document.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 第四步：对于每个物业，工人们从文档中复制维修、服务类别和位置等详细信息。
- en: 'Step Five: Workers paste the copied details into various screens within Black
    Dome’s order management application, the [Property Preservation Wizard](https://home.propertypreswizard.com/).'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 第五步：工人们将复制的详细信息粘贴到 Black Dome 订单管理应用程序的各种屏幕中，即 [Property Preservation Wizard](https://home.propertypreswizard.com/)。
- en: 'Step Six: This process is repeated for each line item on the work order, which
    may contain 30 to 40 items.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 第六步：这个过程会针对工作订单上的每一项重复，这些项目可能包含 30 到 40 项。
- en: 'Step Seven: Once the work order is entered into the application, it can be
    assigned.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 第七步：一旦工作订单被输入到应用程序中，就可以分配了。
- en: 'Step Eight: The assigned field representative goes to the property and completes
    the work.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 第八步：指定的现场代表前往物业并完成工作。
- en: '![](img/B34120_Figure_1.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34120_Figure_1.png)'
- en: 'FIGURE 1: Diagram showing how Black Dome handled work orders before adding
    AI techniques to their operation.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1：展示在将 AI 技术添加到其运营之前，Black Dome 如何处理工作订单的图表。
- en: 'After: How AI and automation changed the way Black Dome handles work order
    management'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 之后：AI 和自动化如何改变 Black Dome 处理工作订单管理的方式
- en: Figure 2 shows how Black Dome’s work order management process has changed since
    implementing the techniques that will be discussed in this report.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2 展示了自实施本报告将讨论的技术以来，Black Dome 的工作订单管理流程如何发生变化。
- en: 'Data chaos: Black Dome still receives work order data from vendors in various,
    unstructured formats.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 数据混乱：Black Dome 仍然从供应商那里以各种未结构化的格式接收工作订单数据。
- en: 'Google Drive upload: Employees drop work order documents into a designated
    Google Drive folder.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: Google Drive 上传：员工将工作订单文档放入指定的 Google Drive 文件夹。
- en: 'Data ingestion: Lucidis automatically ingests, converts, extracts, cleans,
    and structures the data using advanced techniques such as OCR, machine vision,
    and AI, which will be discussed in detail in the following sections. This step
    replaces the manual copying and pasting process completely.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 数据摄取：Lucidis自动使用先进的OCR、机器视觉和AI等技术摄取、转换、提取、清洗和结构化数据，这些技术将在以下章节中详细讨论。这一步骤完全取代了手动复制粘贴的过程。
- en: 'Data sent to work order management application: The cleaned data is automatically
    converted into a machine- readable format (in this case, JSON) and sent through
    the Property Preservation Wizard’s exposed API, which then automatically populates
    fields in the application.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 发送到工作订单管理应用的数据：清洗后的数据自动转换为机器可读格式（在这种情况下为JSON），并通过Property Preservation Wizard公开的API发送，然后自动填充应用中的字段。
- en: 'Work fulfillment: The assigned field representative goes to the property and
    completes the work.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 工作完成：指定的现场代表前往物业并完成工作。
- en: 'Rich data insights: Cleaned data is vectorized and sent to vector database
    for future AI processes (for example, workers can interact with data in natural
    language).'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 丰富的数据洞察：清洗后的数据被矢量化并发送到矢量数据库，以供未来的AI处理（例如，工人可以用自然语言与数据交互）。
- en: As you will see on the next page, this change has had dramatic impact on Black
    Dome’s operations.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如您将在下一页看到的那样，这一变化对Black Dome的运营产生了重大影响。
- en: '![](img/B34120_Figure_2.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图2](img/B34120_Figure_2.png)'
- en: 'FIGURE 2: Diagram showing how Black Dome handles work order processing now.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：展示Black Dome现在如何处理工作订单处理的流程图。
- en: 'The results: How taking control of their data has impacted Black Dome'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：掌握数据对Black Dome的影响
- en: The implementation of automated data cleaning and processing transformed Black
    Dome’s operations, addressing key inefficiencies and significantly boosting productivity.
    By eliminating manual data entry and integrating automation into their existing
    workflow, Black Dome was able to streamline work order processing, increase accuracy,
    and reduce costs. Below are the key results of this transformation.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化数据清洗和处理的实施改变了Black Dome的运营，解决了关键的低效问题，并显著提高了生产力。通过消除手动数据录入并将自动化集成到现有的工作流程中，Black
    Dome能够简化工作订单处理，提高准确性，并降低成本。以下是这一变革的关键成果。
- en: 'Elimination of manual data entry: Before, Black Dome employees spent significant
    time manually extracting data from unstructured formats—a process prone to errors
    and inefficiencies. Now, this is largely automated, reducing manual steps from
    eight to just two. Employees now only need to download an email attachment and
    upload documents to a cloud drive.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 消除手动数据录入：以前，Black Dome的员工花费大量时间从非结构化格式中手动提取数据——这是一个容易出错且效率低下的过程。现在，这一过程大部分已经自动化，将手动步骤从八个减少到仅仅两个。员工现在只需下载电子邮件附件并将文件上传到云端驱动器。
- en: 'Eliminated human error: Automation has eliminated human errors, resulting in
    work order accuracy improving dramatically.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 消除了人为错误：自动化消除了人为错误，导致工作订单的准确性显著提高。
- en: 'Dramatic increase in efficiency and speed: By adding automation to their work
    order management, processing times for work orders were reduced by 80%—from 30–40
    minutes per order to simply uploading a document. This automation:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 效率和速度显著提高：通过将自动化添加到他们的工作订单管理中，工作订单的处理时间减少了80%——从每个订单30-40分钟减少到只需上传文档。这种自动化：
- en: Reduced processing time per work order, allowing employees to focus on higher-level
    tasks.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个工作订单的处理时间减少，使员工能够专注于更高层次的任务。
- en: Increased throughput, enabling Black Dome to handle a significantly higher volume
    of work orders without increasing staff or resources.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高吞吐量，使Black Dome能够在不增加人员或资源的情况下处理显著更高的工作订单量。
- en: Enhanced scalability, positioning the company for future growth.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高可扩展性，为公司未来的增长定位。
- en: 'In-house work order management: Previously, Black Dome had to outsource portions
    of its data entry due to high volumes. Now, the company has regained control of
    100% of its work order processing, eliminating the need for outsourcing.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 内部工作订单管理：以前，由于数据录入量高，Black Dome不得不外包部分数据录入工作。现在，公司已经重新获得了100%的工作订单处理控制权，消除了外包的需求。
- en: 'Dramatic cost savings: Operational costs were reduced by 80%, driven by the
    elimination of outsourcing costs, increased productivity, and zero data entry
    errors.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 显著降低成本：运营成本降低了80%，这得益于外包成本的消除、生产力的提高以及零数据录入错误。
- en: '![](img/2.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图2](img/2.png)'
- en: The biggest improvement was in efficiency. I can’t stress enough how much time
    they saved by eliminating manual cutting and pasting.”
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的改进在于效率。我无法强调他们通过消除手动剪切和粘贴节省了多少时间。”
- en: -- Tobalo Torres
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: -- Tobalo Torres
- en: Key benefits at a glance
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 一目了然的要点
- en: 80% reduction in work order processing time
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工作订单处理时间减少80%
- en: 100% accuracy in data processing, eliminating manual errors
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据处理100%准确，消除手动错误
- en: 80% net cost savings due to the elimination of outsourcing and improved efficiency
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于外包消除和效率提高，净成本节省80%
- en: 'Higher productivity: Black Dome can handle a greater workload with existing
    resources, allowing staff to focus on more value-rich tasks'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更高的生产力：Black Dome可以利用现有资源处理更大的工作量，使员工能够专注于更有价值的任务
- en: '[![TL Logo](img/TL_Logo.png)'
  id: totrans-70
  prefs: []
