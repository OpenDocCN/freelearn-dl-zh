- en: Quick thoughts on this section?](https://forms.office.com/e/4a01JLkbhd)
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 对本节的快速想法？](https://forms.office.com/e/4a01JLkbhd)
- en: Data Processing Automation for Your Business
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 为您的业务提供数据处理自动化
- en: In previous sections, we discussed the problem of unstructured data and its
    impact on organizational efficiency and AI-driven processes. We demonstrated how
    solving this problem has led to transformative gains for Black Dome. In this section,
    we introduce the concepts involved in implementing a similar solution in your
    own company, and outline some of the common tools used.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们讨论了非结构化数据及其对组织效率和AI驱动流程的影响。我们展示了如何解决这个问题为Black Dome带来了变革性的收益。在本节中，我们介绍了在您自己的公司中实施类似解决方案所涉及的概念，并概述了一些常用的工具。
- en: Any organization dealing with unstructured data can adopt a structured approach
    to automate data processing at scale, and ensure that their data pipelines are
    clean, accurate, and integrated with their existing systems. By utilizing a combination
    of AI techniques, optical character recognition (OCR), machine vision, and automation,
    companies can drastically increase efficiency and reduce costs.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 任何处理非结构化数据的组织都可以采用结构化方法来自动化大规模数据处理，并确保他们的数据管道清洁、准确，并与现有系统集成。通过利用人工智能技术、光学字符识别（OCR）、机器视觉和自动化，公司可以大幅提高效率并降低成本。
- en: The core steps
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 核心步骤
- en: 'Document ingestion: The first step is to set up a system that can ingest data
    in unstructured formats automatically. This can be achieved using a variety of
    tools or platforms that leverage [optical character recognition](https://aws.amazon.com/what-is/ocr/)
    (OCR), [machine vision](https://www.cognex.com/what-is/machine-vision), and [natural
    language processing](https://www.ibm.com/topics/natural-language-processing) (NLP)
    to capture and interpret content within these diverse file types. [Intelligent
    document processing](https://www.microsoft.com/en-us/power-platform/products/power-automate/topics/business-process/intelligent-document-processing)
    (IDP) and [robotic process automation](https://www.ibm.com/topics/rpa) (RPA) solutions
    are often used to automate document ingestion and streamline workflows across
    departments.'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文档摄取：第一步是建立一个能够自动摄取非结构化格式数据的系统。这可以通过使用各种工具或平台来实现，这些工具或平台利用[光学字符识别](https://aws.amazon.com/what-is/ocr/)（OCR）、[机器视觉](https://www.cognex.com/what-is/machine-vision)和[自然语言处理](https://www.ibm.com/topics/natural-language-processing)（NLP）来捕捉和解释这些不同文件类型中的内容。[智能文档处理](https://www.microsoft.com/en-us/power-platform/products/power-automate/topics/business-process/intelligent-document-processing)（IDP）和[机器人流程自动化](https://www.ibm.com/topics/rpa)（RPA）解决方案通常用于自动化文档摄取并简化跨部门的流程。
- en: 'Document cleaning and standardization: Once the data is ingested, the next
    challenge is to clean it. This involves converting various unstructured formats
    into images and standardized, machine-readable formats. Machine vision can analyze
    document or image layouts and detect complex elements, such as tables, embedded
    images, and charts, ensuring they are accurately captured. OCR can then extract
    the text, images, and tables, converting them into manageable text-based formats.
    This step reduces noise and ensures that data is usable by downstream systems.
    [Data deduplication](https://learn.microsoft.com/en-us/windows-server/storage/data-deduplication/overview)
    may also occur during this stage to remove redundant data, reducing storage and
    processing costs. In cases where documents are in multiple languages or contain
    complex formatting, [multilingual processing](https://fastdatascience.com/natural-language-processing/multilingual-natural-language-processing/)
    and [normalization](https://developers.google.com/machine-learning/crash-course/numerical-data/normalization)
    are used to ensure consistency.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文档清理和标准化：一旦数据被摄取，下一个挑战就是清理它。这涉及到将各种非结构化格式转换为图像和标准化的、机器可读的格式。机器视觉可以分析文档或图像布局，并检测复杂元素，如表格、嵌入的图像和图表，确保它们被准确捕获。随后，光学字符识别（OCR）可以提取文本、图像和表格，并将它们转换为可管理的基于文本的格式。这一步骤减少了噪声，并确保数据可以被下游系统使用。[数据去重](https://learn.microsoft.com/en-us/windows-server/storage/data-deduplication/overview)也可能在这一阶段发生，以删除冗余数据，降低存储和处理成本。在文档使用多种语言或包含复杂格式的情况下，使用[多语言处理](https://fastdatascience.com/natural-language-processing/multilingual-natural-language-processing/)和[规范化](https://developers.google.com/machine-learning/crash-course/numerical-data/normalization)来确保一致性。
- en: 'Data extraction and conversion: After standardization, companies should focus
    on extracting the most relevant data points from the documents. This involves
    identifying key fields, such as invoice numbers, dates, or specific metrics, and
    converting them into structured data formats. This ensures that only the essential
    data is retained for further processing, depending on business needs.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据提取和转换：在标准化之后，公司应专注于从文档中提取最相关的数据点。这包括识别关键字段，如发票号码、日期或特定指标，并将它们转换为结构化数据格式。这确保了仅保留对进一步处理至关重要的数据。根据业务需求，这一步骤确保了数据可以被后续系统使用。
- en: AI-powered extraction tools, often based on NLP and entity recognition models,
    can be employed to automatically detect and extract key fields. These models can
    learn and adapt over time, becoming more efficient with use. Custom-built AI models
    may be required to handle highly specific or complex document types, such as legal
    contracts or financial statements.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 基于人工智能的提取工具，通常基于自然语言处理（NLP）和实体识别模型，可以用来自动检测和提取关键字段。这些模型可以随着时间的推移学习和适应，使用得越多越高效。对于处理高度特定或复杂的文档类型，如法律合同或财务报表，可能需要定制构建的AI模型。
- en: Optical character recognition (OCR) converts text from unstructured documents
    like PDFs or scanned images into machine-readable formats, making the data searchable
    and editable.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 光学字符识别（OCR）将非结构化文档（如PDF或扫描图像）中的文本转换为机器可读格式，使数据可搜索和可编辑。
- en: Machine vision complements OCR by analyzing image or document layouts, recognizing
    patterns, and identifying components like text, tables, and images.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 机器视觉通过分析图像或文档布局、识别模式和识别文本、表格和图像等组件来补充OCR。
- en: Together, they enable accurate extraction of data from complex formats, turning
    unstructured documents into usable, structured information for further processing.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 它们共同实现了从复杂格式中准确提取数据，将非结构化文档转换为可用于进一步处理的可用结构化信息。
- en: 'Data structuring and serialization: Once the relevant data has been extracted,
    it must be structured in a way that allows it to be easily integrated into other
    systems. This often means [serializing](https://www.confluent.io/learn/data-serialization/)
    the data into formats such as JSON, XML, or YAML, which are widely used in modern
    [APIs](https://aws.amazon.com/what-is/api) and system integrations. These formats
    ensure the data can seamlessly flow into enterprise systems like [ERP](https://www.sap.com/products/erp/what-is-erp.html)
    or [CRM](https://www.techtarget.com/searchcustomerexperience/definition/CRM-customer-relationship-management)
    tools. For relational data storage, [SQL](https://www.mongodb.com/resources/basics/databases/nosql-explained/nosql-vs-sql)
    databases might be used, while [NoSQL](https://www.ibm.com/topics/nosql-databases)
    systems are preferred for flexible, unstructured data. [Schema validation](https://www.packetcoders.io/what-is-schema-validation/)
    during serialization ensures the structured data aligns with the formats required
    by downstream systems, reducing integration errors.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据结构和序列化：一旦提取了相关数据，必须以允许其轻松集成到其他系统的方式进行结构化。这通常意味着将数据序列化为JSON、XML或YAML等格式，这些格式在现代[API](https://aws.amazon.com/what-is/api)和系统集成中广泛使用。这些格式确保数据可以无缝流入企业系统，如[ERP](https://www.sap.com/products/erp/what-is-erp.html)或[CRM](https://www.techtarget.com/searchcustomerexperience/definition/CRM-customer-relationship-management)工具。对于关系型数据存储，可能会使用[SQL](https://www.mongodb.com/resources/basics/databases/nosql-explained/nosql-vs-sql)数据库，而对于灵活的非结构化数据，则更倾向于使用[NoSQL](https://www.ibm.com/topics/nosql-databases)系统。[序列化期间的架构验证](https://www.packetcoders.io/what-is-schema-validation/)确保结构化数据与下游系统所需的格式相匹配，从而减少集成错误。
- en: 'Data integration and workflow automation: Integrating cleaned and structured
    data into existing workflows is where real efficiency gains occur. Workflow automation
    tools, such as RPA platforms or [integration Platform-as-a-Service](https://www.ibm.com/topics/ipaas)
    (iPaaS) solutions, can automatically populate structured data into operational
    systems. This eliminates manual data entry, drastically reduces errors, increases
    throughput, and leads to significant time and cost savings. Advanced AI-driven
    automation can further enhance these workflows by adjusting data routing and processing
    based on real-time analytics and predefined business rules. For organizations
    with large-scale data needs, event-driven architectures (for example, [Kafka](https://kafka.apache.org/)
    or [Amazon Kinesis](https://aws.amazon.com/kinesis/)) are used to handle real-time
    data flows across the enterprise.'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据集成和工作流程自动化：将清洗和结构化的数据集成到现有工作流程中是真正提高效率的地方。工作流程自动化工具，如RPA平台或[集成平台即服务](https://www.ibm.com/topics/ipaas)（iPaaS）解决方案，可以自动将结构化数据填充到运营系统中。这消除了手动数据输入，大幅减少了错误，提高了吞吐量，并导致显著的时间和成本节约。先进的基于AI的自动化可以通过根据实时分析和预定义的业务规则调整数据路由和处理来进一步增强这些工作流程。对于需要大规模数据需求的组织，使用事件驱动架构（例如，[Kafka](https://kafka.apache.org/)或[Amazon
    Kinesis](https://aws.amazon.com/kinesis/））来处理企业内部实时数据流。
- en: 'AI-powered insights and interactions: Once data is integrated and structured,
    companies can leverage AI-powered insights to enhance decision-making. AI models
    can analyze trends, forecast future outcomes, and provide actionable insights
    based on the extracted data. For example, businesses could deploy AI-powered chatbot
    interfaces that allow employees to interact with the structured data via natural
    language queries, making the data more accessible and enabling faster decision-making.
    Beyond chatbots, [predictive analytics](https://online.hbs.edu/blog/post/predictive-analytics),
    [intelligent agents](https://www.gartner.com/en/articles/intelligent-agent-in-ai),
    and automated decision-making tools can further enhance data usability. These
    tools can trigger actions such as ordering inventory, alerting users to anomalies,
    or making recommendations based on past data patterns.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI驱动的洞察和交互：一旦数据被集成和结构化，公司可以利用AI驱动的洞察来增强决策。AI模型可以分析趋势，预测未来结果，并根据提取的数据提供可操作的见解。例如，企业可以部署AI驱动的聊天机器人界面，允许员工通过自然语言查询与结构化数据交互，使数据更易于访问，并实现更快的决策。除了聊天机器人之外，[预测分析](https://online.hbs.edu/blog/post/predictive-analytics)、[智能代理](https://www.gartner.com/en/articles/intelligent-agent-in-ai)和基于数据的自动化决策工具可以进一步增强数据可用性。这些工具可以触发诸如订购库存、向用户发出异常警报或基于过去数据模式提供建议等操作。
- en: Key considerations when solving the data chaos problem
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 解决数据混乱问题的关键考虑因素
- en: 'Scalability: Solutions must scale as data volumes grow. [Cloud-native architectures](https://aws.amazon.com/what-is/cloud-native)
    are essential for scalability, allowing companies to scale elastically as data
    demands increase. [Microservices](https://aws.amazon.com/microservices/), [containerization](https://www.ibm.com/topics/containerization)
    ([Docker](https://www.docker.com/), [Kubernetes](https://kubernetes.io/)), and
    [serverless architectures](https://www.datadoghq.com/knowledge-center/serverless-architecture/)
    enable flexible, on-demand scaling. Companies should consider serverless platforms
    ([AWS Lambda](https://aws.amazon.com/lambda/), [Microsoft Azure Functions](https://learn.microsoft.com/en-us/azure/azure-functions/functions-overview?pivots=programming-language-csharp),
    [Google Cloud Functions](https://www.pluralsight.com/resources/blog/cloud/google-cloud-functions-explained))
    for event-driven workloads, allowing seamless processing without the overhead
    of managing infrastructure.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 可扩展性：解决方案必须随着数据量的增长而扩展。[云原生架构](https://aws.amazon.com/what-is/cloud-native)对于可扩展性至关重要，它允许公司在数据需求增加时弹性扩展。[微服务](https://aws.amazon.com/microservices/)、[容器化](https://www.ibm.com/topics/containerization/)
    ([Docker](https://www.docker.com/)、[Kubernetes](https://kubernetes.io/)) 和 [无服务器架构](https://www.datadoghq.com/knowledge-center/serverless-architecture/)
    使灵活的按需扩展成为可能。公司应考虑使用无服务器平台 ([AWS Lambda](https://aws.amazon.com/lambda/), [Microsoft
    Azure Functions](https://learn.microsoft.com/en-us/azure/azure-functions/functions-overview?pivots=programming-language-csharp),
    [Google Cloud Functions](https://www.pluralsight.com/resources/blog/cloud/google-cloud-functions-explained))
    来处理事件驱动的工作负载，从而实现无缝处理，无需管理基础设施的开销。
- en: 'Security and compliance: As companies move toward AI-driven automation, ensuring
    compliance with regulations like [GDPR](https://gdpr-info.eu/), [HIPAA](https://www.hhs.gov/hipaa/index.html),
    and [CCPA](https://oag.ca.gov/privacy/ccpa) is crucial. Implementing robust encryption,
    [access control mechanisms](https://www.techtarget.com/searchsecurity/definition/access-control),
    and ensuring data sovereignty (keeping data within specific geographical regions)
    helps maintain data security. Additionally, [data lineage](https://www.ibm.com/topics/data-lineage)
    and [audit trails](https://www.auditboard.com/blog/what-is-an-audit-trail/) allow
    organizations to track how data is used and processed, ensuring transparency and
    accountability.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性和合规性：随着公司向人工智能驱动的自动化转变，确保遵守[GDPR](https://gdpr-info.eu/)、[HIPAA](https://www.hhs.gov/hipaa/index.html)
    和 [CCPA](https://oag.ca.gov/privacy/ccpa) 等法规至关重要。实施强大的加密、[访问控制机制](https://www.techtarget.com/searchsecurity/definition/access-control)
    并确保数据主权（将数据保留在特定的地理区域内）有助于维护数据安全。此外，[数据血缘](https://www.ibm.com/topics/data-lineage)
    和 [审计跟踪](https://www.auditboard.com/blog/what-is-an-audit-trail/) 允许组织跟踪数据的使用和处理方式，确保透明度和问责制。
- en: 'Data governance and quality: A strong [data governance](https://www.ibm.com/topics/data-governance)
    framework ensures data consistency, ownership, and quality control across the
    organization. This includes implementing master data management (MDM) to manage
    core data entities and using [data catalogs](https://www.alation.com/blog/what-is-a-data-catalog/)
    for transparency. Without proper governance, data can degrade over time, leading
    to inefficiencies and creating [technical debt](https://agiledata.org/essays/datatechnicaldebt.html),
    which can hinder future automation and AI efforts.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 数据治理和质量：强大的[数据治理](https://www.ibm.com/topics/data-governance)框架确保组织内部数据的一致性、所有权和质量控制。这包括实施主数据管理
    (MDM) 来管理核心数据实体，并使用 [数据目录](https://www.alation.com/blog/what-is-a-data-catalog/)
    来提高透明度。如果没有适当的治理，数据会随着时间的推移而退化，导致效率低下并产生[技术债务](https://agiledata.org/essays/datatechnicaldebt.html)，这可能会阻碍未来的自动化和人工智能努力。
- en: Vectorization for AI systems
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统的向量化
- en: A key aspect of making unstructured data usable for AI-driven workflows is vectorization.
    Once the data is cleaned and structured, it must be converted into vectors — numerical
    representations of the data that AI models can process. This transformation enables
    the AI to understand and work with text or image data by converting it into a
    form that algorithms can analyze. Vectorization supports tasks such as document
    classification, semantic search, and natural language understanding. In addition,
    vectorized data can be stored in vector databases for efficient querying and retrieval,
    enabling AI models to provide contextually relevant results in real-time interactions.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 使非结构化数据可用于AI驱动工作流程的关键方面是向量化。一旦数据被清理和结构化，就必须将其转换为向量——AI模型可以处理的数值数据表示。这种转换使AI能够通过将其转换为算法可以分析的形式来理解和处理文本或图像数据。向量化支持诸如文档分类、语义搜索和自然语言理解等任务。此外，向量化数据可以存储在向量数据库中，以实现高效的查询和检索，使AI模型能够在实时交互中提供上下文相关的结果。
- en: Vectorization workflow
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 向量化工作流程
- en: 'Input document/text data: Start with a text document, which could be extracted
    from a PDF, webpage, or raw text file. This text can include paragraphs, sentences,
    or individual words in their raw, unprocessed form.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入文档/文本数据：从一个文本文档开始，这可能是从PDF、网页或原始文本文件中提取的。此文本可以包括段落、句子或以原始、未处理的形式出现的单个单词。
- en: 'Preprocessing: The raw text undergoes preprocessing. This includes:'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预处理：原始文本经过预处理。这包括：
- en: 'Tokenization: Splitting text into tokens, typically words or subwords.'
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分词：将文本分割成标记，通常是单词或子词。
- en: 'Lowercasing and stopword removal: Converting text to lowercase and removing
    irrelevant words like “the”, “is”, and “and”.'
  id: totrans-98
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小写化和停用词去除：将文本转换为小写并移除不相关的词，如“the”、“is”和“and”。
- en: 'Lemmatization/Stemming: Reducing words to their base/root form (for example,
    “running” to “run”).'
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 词形还原/词干提取：将单词还原为其基本/根形式（例如，“running”到“run”）。
- en: 'Encoding with vectorization model: The preprocessed tokens are passed through
    a vectorization model to create numerical representations (vectors):'
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用向量化模型进行编码：预处理后的标记通过向量化模型传递以创建数值表示（向量）：
- en: 'Word embeddings: Models like Word2Vec or GloVe generate dense vectors, capturing
    word meanings based on context.'
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 词嵌入：Word2Vec或GloVe等模型生成密集向量，根据上下文捕获词义。
- en: 'Sentence embeddings: Models like BERT or Sentence-BERT are used to generate
    embeddings for entire sentences or phrases, capturing nuanced relationships between
    words sentences.'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 句子嵌入：BERT或Sentence-BERT等模型用于生成整个句子或短语的嵌入，捕捉单词和句子之间的细微关系。
- en: 'Vector dimensions: The result is a high- dimensional vector (for example, 300
    or 768 dimensions) representing each token or sentence.'
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向量维度：结果是高维向量（例如，300或768维），代表每个标记或句子。
- en: 'Output vectors: The text is now represented as a vector (or series of vectors).
    Each vector has numerical values that encapsulate the meaning, context, and relationships
    within the text, allowing similarity comparisons and ML applications.'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输出向量：文本现在表示为一个向量（或一系列向量）。每个向量都有数值，这些数值封装了文本中的意义、上下文和关系，允许进行相似度比较和机器学习应用。
- en: 'Application: These vectors can now be used in various applications, like similarity
    search (comparing vectors to find semantically similar documents or sentences),
    clustering and classification (using vectors as input for machine learning models
    to classify or cluster data), or storage in a vector database (vectors can be
    stored in specialized databases like Pinecone for efficient retrieval and querying).'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用：这些向量现在可用于各种应用，例如相似度搜索（比较向量以找到语义相似的文档或句子）、聚类和分类（使用向量作为机器学习模型的输入以分类或聚类数据），或存储在向量数据库中（向量可以存储在Pinecone等专用数据库中，以实现高效的检索和查询）。
- en: '![](img/B34120_Figure_3.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图3](img/B34120_Figure_3.png)'
- en: 'FIGURE 3: Diagram showing the vectorization process.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：展示向量化过程的图示。
- en: How this works in the context of Lucidis
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在Lucidis的上下文中的工作原理
- en: 'Figure 4 illustrates the data processing pipeline for Lucidis’ solution. Here’s
    what’s happening:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图4说明了Lucidis解决方案的数据处理流程。以下是正在发生的事情：
- en: 'Input phase: Unstructured data is produced and sent to pre-cleaning storage
    before being ingested by Lucidis.'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入阶段：非结构化数据产生并送入预清理存储，然后再由Lucidis摄取。
- en: 'Process phase: The document is ingested and converted into an image. Then,
    OCR, machine vision and NLP are used to clean the data and make it more accessible
    and valuable for downstream applications and AI systems.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 处理阶段：文档被摄取并转换为图像。然后，OCR、机器视觉和NLP被用于清洗数据，使其对下游应用程序和AI系统更易于访问和更有价值。
- en: 'Preprocessing: Machine vision standardizes documents and enhances image readability.
    It adjusts brightness, contrast, and alignment and segments text, images, and
    tables.'
  id: totrans-112
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预处理：机器视觉标准化文档并增强图像可读性。它调整亮度、对比度和对齐，并分割文本、图像和表格。
- en: 'Text extraction (OCR): OCR converts text regions into digital, adapting to
    mixed content like faded text or handwriting and ignoring non-text elements identified
    by machine vision.'
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本提取（OCR）：OCR将文本区域转换为数字格式，适应混合内容如褪色文本或手写，并忽略由机器视觉识别的非文本元素。
- en: 'Post-OCR layout structuring: Machine vision refines text structure to identify
    paragraph breaks, alignment, and layout cues, helping keep the document’s original
    organization.'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: OCR后布局结构化：机器视觉细化文本结构以识别段落分隔、对齐和布局提示，有助于保持文档的原始组织。
- en: 'Semantic analysis: NLP organizes text by identifying headers, extracting entities,
    and categorizing content. It detects patterns and analyzes context, which aids
    in sentiment detection, topic identification, and summarization, helping shape
    data for different AI models.'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语义分析：NLP通过识别标题、提取实体和分类内容来组织文本。它检测模式并分析上下文，有助于情感检测、主题识别和摘要，有助于为不同的AI模型塑造数据。
- en: 'Feedback loop: NLP flags any nonsensical text for reprocessing by OCR, while
    machine vision checks and suppresses erroneous text detections, enhancing accuracy.'
  id: totrans-116
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反馈循环：NLP标记任何无意义的文本以供OCR重新处理，同时机器视觉检查并抑制错误文本检测，提高准确性。
- en: 'Output phase: After the data is cleaned, it is directed to different destinations
    depending on the use case and business need. Cleaned data can be fed into different
    kinds of databases or post-cleaning storage, or sent to AI applications like [RAG](https://blogs.nvidia.com/blog/what-is-retrieval-augmented-generation/)
    models, traditional apps, or knowledge graphs. It can then be used for fine- tuning
    AI models or enhancing app intelligence.'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输出阶段：数据清洗后，根据用例和业务需求被导向不同的目的地。清洗后的数据可以被输入到不同类型的数据库或后清洗存储中，或发送到AI应用程序如[RAG](https://blogs.nvidia.com/blog/what-is-retrieval-augmented-generation/)模型、传统应用程序或知识图谱。然后，它可以用于微调AI模型或增强应用程序的智能。
- en: 'Linking with APIs: If the cleaned data needs to be integrated with downstream
    systems, it is converted into standardized formats like JSON, XML, or YAML for
    use with APIs. This allows the data to be used by enterprise applications like
    ERP or CRM systems, ensuring smooth interoperability across different software
    platforms.'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: API链接：如果清洗后的数据需要与下游系统集成，它将被转换为标准格式如JSON、XML或YAML，以便与API一起使用。这允许数据被企业应用程序如ERP或CRM系统使用，确保在不同软件平台间实现顺畅的互操作性。
- en: 'FIGURE 4: Diagram showing the data processing pipeline in Lucidis’ solution.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：展示Lucidis解决方案中数据处理流程的图示。
- en: '![](img/B34120_Figure_4.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图4](img/B34120_Figure_4.png)'
- en: The Tech Stack
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 技术栈
- en: The backbone of Lucidis AI’s solution lies in a well-architected tech stack.
    This section dives into the specifics of the technologies used to power Lucidis
    AI.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis AI解决方案的骨干在于一个架构良好的技术栈。本节深入探讨了用于驱动Lucidis AI的技术细节。
- en: Backend technologies
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 后端技术
- en: '[Node.js](https://nodejs.org/en) and [Python](https://www.python.org/) are
    the primary programming languages powering Lucidis’ backend. These tools offer
    robust functionality for handling backend logic, API requests, and large-scale
    data processing tasks. Python, with its mature AI and data science libraries,
    enables efficient AI model integrations, while Node.js powers fast and scalable
    backend services.'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '[Node.js](https://nodejs.org/en)和[Python](https://www.python.org/)是驱动Lucidis后端的主要编程语言。这些工具提供了强大的功能，用于处理后端逻辑、API请求和大规模数据处理任务。Python凭借其成熟的AI和数据科学库，实现了高效的AI模型集成，而Node.js则支持快速且可扩展的后端服务。'
- en: '[Docker](https://www.docker.com/) is used for containerizing the solution,
    enabling easy deployment across different environments. Docker ensures that Lucidis
    can run, regardless of the infrastructure.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '[Docker](https://www.docker.com/)用于容器化解决方案，使得在不同环境中轻松部署成为可能。Docker确保无论基础设施如何，Lucidis都能运行。'
- en: Lucidis relies heavily on Amazon Web Services ([AWS](https://aws.amazon.com/))
    for cloud infrastructure. [S3](https://aws.amazon.com/s3/) is used for secure
    and scalable data storage, while [EC2](https://aws.amazon.com/ec2/) provides the
    compute power needed to handle resource-intensive AI workloads.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis高度依赖亚马逊网络服务([AWS](https://aws.amazon.com/))进行云基础设施。使用[S3](https://aws.amazon.com/s3/)进行安全且可扩展的数据存储，而[EC2](https://aws.amazon.com/ec2/)提供处理资源密集型人工智能工作负载所需的计算能力。
- en: Frontend technologies
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 前端技术
- en: '[Vue.js](https://vuejs.org/) forms the basis of Lucidis’ user interface, offering
    a modern, lightweight framework for creating a responsive and intuitive web-based
    platform. It allows users to interact with Lucidis’ system seamlessly, while the
    backend handles data processing behind the scenes.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '[Vue.js](https://vuejs.org/)构成了Lucidis用户界面的基础，提供了一个现代、轻量级的框架，用于创建响应式和直观的基于Web的平台。它允许用户无缝地与Lucidis系统交互，同时后端在幕后处理数据处理。'
- en: Data processing, NLP, and machine vision
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 数据处理、自然语言处理(NLP)和机器视觉
- en: Lucidis’ strength lies in its ability to ingest, clean, and process unstructured
    data, such as PDFs, DOCX files, spreadsheets, and images. This is achieved through
    a series of advanced AI tools and technologies.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis的优势在于其摄取、清洗和加工非结构化数据的能力，例如PDF文件、DOCX文件、电子表格和图像。这是通过一系列先进的AI工具和技术实现的。
- en: 'OCR (optical character recognition): The platform leverages OCR technologies,
    such as [Tesseract](https://github.com/tesseract-ocr/tesseract) and [PaddleOCR](https://paddlepaddle.github.io/PaddleOCR/main/en/index.html),
    to accurately extract text from complex documents. These tools are especially
    effective when dealing with highly formatted PDFs, ensuring that data is captured
    accurately and efficiently.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: OCR（光学字符识别）：该平台利用OCR技术，如[Tesseract](https://github.com/tesseract-ocr/tesseract)和[PaddleOCR](https://paddlepaddle.github.io/PaddleOCR/main/en/index.html)，从复杂的文档中准确提取文本。这些工具在处理高度格式化的PDF时特别有效，确保数据被准确且高效地捕获。
- en: 'Machine vision: Once documents are converted to images, Lucidis employs a variety
    of models including [OpenAI’s](https://platform.openai.com/docs/guides/vision)
    vision model for analyzing and extracting information from images, and for tasks
    like image understanding and data extraction from visual content. This step is
    critical when handling PDFs or other formats that contain embedded charts, tables,
    and images, which can be challenging to interpret using traditional text-based
    extraction methods. Machine vision sanitizes these documents, extracting clean,
    usable data that is then structured for further processing.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 机器视觉：一旦文档被转换为图像，Lucidis会采用包括[OpenAI的](https://platform.openai.com/docs/guides/vision)视觉模型在内的多种模型，用于分析和提取图像中的信息，以及执行图像理解和从视觉内容中提取数据等任务。当处理包含嵌入式图表、表格和图像的PDF或其他格式时，这一步骤至关重要，因为这些内容使用传统的基于文本的提取方法可能难以解释。机器视觉对这些文档进行净化，提取干净、可用的数据，然后对其进行结构化以便进一步处理。
- en: 'Vectorization and embedding: After data is cleaned, [Pinecone](https://www.pinecone.io/)
    is used for vector storage, allowing large volumes of document data to be indexed
    and queried efficiently. [LLaMA Index](https://www.llamaindex.ai/) and [LLaMA
    Parse](https://docs.llamaindex.ai/en/stable/llama_cloud/llama_parse/) support
    the platform’s embedding and indexing capabilities, enabling data interactions
    in natural language.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 向量化和嵌入：数据清洗后，使用[Pinecone](https://www.pinecone.io/)进行向量存储，允许大量文档数据被高效地索引和查询。[LLaMA
    Index](https://www.llamaindex.ai/)和[LLaMA Parse](https://docs.llamaindex.ai/en/stable/llama_cloud/llama_parse/)支持平台的嵌入和索引功能，使数据能够以自然语言进行交互。
- en: AI gateway for model integration
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 模型集成的人工智能网关
- en: Lucidis uses an AI gateway that allows them to integrate the latest AI models
    and stay current with new developments in the field. This allows Lucidis to adapt
    as market demands and industry standards evolve, supporting various models that
    enhance Lucidis’s knowledge base and document processing capabilities, and allowing
    them to maximize the strengths of various models for different tasks. Here are
    some of the models Lucidis currently use.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis使用一个AI网关，使他们能够集成最新的AI模型，并跟上该领域的新发展。这使得Lucidis能够适应市场需求和行业标准的变化，支持各种增强Lucidis知识库和文档处理能力的模型，并允许他们针对不同任务最大化各种模型的优势。以下是Lucidis目前使用的一些模型。
- en: 'Claude Sonnet: A vision model known for strong instruction-following, document
    understanding, and visual data extraction. [Claude Sonnet](https://www.anthropic.com/news/claude-3-5-sonnet)
    excels in automating repetitive tasks, interacting with computer interfaces, and
    analyzing data from documents and visuals. It is ideal for automating workflows
    requiring data extraction from complex documents or PDF content.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: Claude Sonnet：一种以强大的指令遵循、文档理解和视觉数据提取而闻名的视觉模型。[Claude Sonnet](https://www.anthropic.com/news/claude-3-5-sonnet)在自动化重复性任务、与计算机界面交互以及从文档和视觉中分析数据方面表现出色。它非常适合自动化需要从复杂文档或PDF内容中提取数据的工作流程。
- en: 'GPT Vision models: Adept at handling multimodal tasks, such as generating descriptions
    from images, answering questions about visuals, and enhancing the contextual depth
    of responses. This makes them ideal for document-heavy workflows that require
    both visual and textual insights.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: GPT Vision模型：擅长处理多模态任务，如从图像生成描述、回答关于视觉的问题以及增强响应的上下文深度。这使得它们非常适合需要视觉和文本洞察的文档密集型工作流程。
- en: 'LLaMA 3.1: An open-source NLP model suitable for general text processing tasks
    like embedding, classification, and summarization. Its flexibility allows for
    custom fine-tuning, making it useful for a wide range of NLP applications, especially
    those requiring specific adaptations.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: LLaMA 3.1：一个适合通用文本处理任务（如嵌入、分类和摘要）的开源NLP模型。其灵活性允许进行定制微调，使其适用于广泛的NLP应用，特别是那些需要特定适应的应用。
- en: 'Salesforce Gen series: Focused on enterprise applications, the [Gen series](https://www.salesforce.com/artificial-intelligence/)
    leverages CRM-specific insights and integrates easily within Salesforce’s ecosystem,
    optimizing it for customer support, lead generation, and marketing content, as
    well as enterprise- compliant data handling.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce Gen系列：专注于企业应用，[Gen系列](https://www.salesforce.com/artificial-intelligence/)利用CRM特定的洞察力，并易于集成到Salesforce的生态系统中，优化客户支持、线索生成和营销内容，以及符合企业数据处理的规范。
- en: Scalability and cloud-agnosticism
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 可扩展性和云无关性
- en: Lucidis is designed to scale across different environments, a feature that is
    crucial for enterprise clients who often handle millions of documents.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis旨在跨不同环境进行扩展，这对于经常处理数百万份文档的企业客户来说是一个关键特性。
- en: 'Cloud-native architecture: While Lucidis leverages cloud technologies like
    AWS, it is [cloud-agnostic](https://www.vmware.com/topics/cloud-agnostic), meaning
    it can be deployed in various environments, including private clouds or behind
    corporate firewalls. The containerized nature of the solution, enabled by Docker,
    ensures that it can run securely and efficiently in any infrastructure setup.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 云原生架构：虽然Lucidis利用了AWS等云技术，但它[云无关](https://www.vmware.com/topics/cloud-agnostic)，这意味着它可以在各种环境中部署，包括私有云或企业防火墙后面。由Docker支持的容器化特性确保它可以在任何基础设施设置中安全高效地运行。
- en: 'Horizontal scaling: The infrastructure is optimized for [horizontal scaling](https://www.digitalocean.com/resources/articles/horizontal-scaling-vs-vertical-scaling),
    allowing Lucidis to handle increasing data volumes by distributing workloads across
    multiple cloud regions. This ensures high availability and performance even as
    demand grows.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 水平扩展：基础设施针对[水平扩展](https://www.digitalocean.com/resources/articles/horizontal-scaling-vs-vertical-scaling)进行了优化，允许Lucidis通过在多个云区域分配工作负载来处理不断增长的数据量。这确保了即使在需求增长的情况下，也能保持高可用性和性能。
- en: Security and compliance
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 安全和合规性
- en: When handling so many internal documents, data privacy and security are paramount,
    Lucidis adopts a stringent security-first approach.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理如此多的内部文档时，数据隐私和安全至关重要，Lucidis采用严格的以安全为首要的方法。
- en: 'Zero-trust model: Security is embedded deeply into the platform through a zero-trust
    security model. This ensures that every interaction, whether internal or external,
    is authenticated and authorized at the most granular level. Data is encrypted
    both in transit and at rest using AWS’s robust encryption protocols.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 零信任模型：通过零信任安全模型将安全性深度嵌入平台，确保每个交互，无论是内部还是外部，都在最细粒度级别上进行身份验证和授权。数据在传输和静止状态下都使用AWS强大的加密协议进行加密。
- en: 'Data governance and compliance: Lucidis adheres to key industry standards such
    as HIPAA, GDPR, and [SOC 2](https://soc2.co.uk/), ensuring it meets the compliance
    requirements of its enterprise clients.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 数据治理和合规性：Lucidis遵守关键行业标准，如HIPAA、GDPR和[SOC 2](https://soc2.co.uk/)，确保其满足企业客户的合规性要求。
- en: 'Certifications: Lucidis pursues certifications to ensure a secure environment
    and provide clients with peace of mind.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 认证：Lucidis 致力于追求认证，以确保安全的环境并向客户提供安心。
- en: 'Software composition analysis: This involves keeping track of used libraries
    and packages, comparing them against vulnerability databases like [OWASP](https://owasp.org/)
    and [CVE](https://cve.mitre.org/) to ensure software is up-to-date with security
    practices.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 软件组成分析：这包括跟踪使用的库和包，将它们与漏洞数据库如 [OWASP](https://owasp.org/) 和 [CVE](https://cve.mitre.org/)
    进行比较，以确保软件符合安全实践并保持最新。
- en: 'ISACA-certified team members: Whiteglove, Lucidis’ parent company, employs
    [ISACA](https://www.isaca.org/) certified personnel, which ensures adherence to
    high security standards.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: ISACA 认证团队成员：Whiteglove，Lucidis 的母公司，雇佣了 [ISACA](https://www.isaca.org/) 认证人员，这确保了遵守高标准的安全规范。
- en: Data storage
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 数据存储
- en: Lucidis supports a range of storage solutions tailored to diverse client needs,
    ensuring efficient data handling and retrieval.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis 支持一系列定制的存储解决方案，以满足不同客户的需求，确保高效的数据处理和检索。
- en: As mentioned, Pinecone is employed to manage large volumes of vectorized data,
    enabling quick and efficient retrieval during AI- powered document interactions.
    Its powerful indexing capabilities are optimized for real- time queries, ensuring
    seamless performance even with extensive datasets.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 正如所述，Pinecone 用于管理大量矢量化数据，在人工智能驱动的文档交互中实现快速和高效的检索。其强大的索引能力针对实时查询进行了优化，即使在大量数据集的情况下也能确保无缝的性能。
- en: '[MongoDB](https://www.mongodb.com/) offers a versatile solution for handling
    structured and semi-structured data, such as JSON files, which is ideal for applications
    that require scalability and flexibility. MongoDB’s ACID compliance and powerful
    indexing allow Lucidis to maintain reliable data consistency, crucial for managing
    complex data relationships in high-demand environments.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '[MongoDB](https://www.mongodb.com/) 提供了一种灵活的解决方案，用于处理结构化和半结构化数据，如 JSON 文件，这对于需要可扩展性和灵活性的应用程序来说非常理想。MongoDB
    的 ACID 兼容性和强大的索引功能使 Lucidis 能够维护可靠的数据一致性，这对于在需求量大的环境中管理复杂的数据关系至关重要。'
- en: For clients with specific privacy requirements, [ChromaDB](https://www.trychroma.com/)
    provides a secure, on-premises storage option that ensures sensitive data remains
    within private networks. This solution supports clients needing enhanced control
    over their data while still enabling Lucidis’ full suite of AI-powered document
    processing capabilities.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 对于有特定隐私需求的客户，[ChromaDB](https://www.trychroma.com/) 提供了一个安全、本地化的存储选项，确保敏感数据始终保持在私有网络中。此解决方案支持需要增强数据控制能力的客户，同时仍能启用
    Lucidis 全套人工智能驱动的文档处理功能。
- en: Adaptability and integration
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 适应性和集成
- en: Lucidis is designed to be adaptable, integrating with a variety of external
    systems through APIs and workflow automation.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis 设计为可适应的，通过 API 和工作流程自动化与各种外部系统集成。
- en: 'APIs and workflow integration: Lucidis is API- driven, enabling seamless integration
    with clients’ downstream systems such as Property Preservation Wizard (PPW) and
    custom in-house document management systems. This flexibility ensures that Lucidis
    can be customized to fit each client’s specific business requirements without
    significant re-engineering.'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: API 和工作流程集成：Lucidis 是 API 驱动的，能够无缝集成到客户的下游系统，如 Property Preservation Wizard
    (PPW) 和定制的内部文档管理系统。这种灵活性确保 Lucidis 可以根据每个客户的特定业务需求进行定制，而无需进行重大的重新设计。
- en: '![](img/2.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/2.png)'
- en: My main thought process when evaluating technology revolves around enterprise
    scale and corporate security. While in the short term it’s easy to use SaaS solutions
    or API integrations that are lightweight and simple, the longer-term vision focuses
    on how we can operate in highly secure, vacuum-sealed corporate settings.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 评估技术时，我的主要思考过程围绕企业规模和公司安全。虽然短期内使用轻量级和简单的 SaaS 解决方案或 API 集成很容易，但长期愿景则关注我们如何在高度安全、真空密封的企业环境中运作。
- en: That’s the key factor that drives my decisions of technology — thinking beyond
    the immediate use case and ensuring that our solutions are scalable, secure, and
    fit for enterprise-level needs.”
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我决定技术时的关键因素——超越即时用例的思考，并确保我们的解决方案具有可扩展性、安全性，并适合企业级需求。”
- en: -- Tobalo Torres
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: -- Tobalo Torres
- en: Popular tools for every part of the process
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 流程的每个部分都有流行的工具
- en: By now, you should have a good understanding of the technologies involved in
    automating data cleaning initiatives. Now, we will discuss some tools used at
    each stage of the process, giving you a repository of resources should you decide
    to implement an in-house solution.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你应该已经很好地理解了自动化数据清理计划中涉及的技术。现在，我们将讨论在处理过程的每个阶段使用的工具，为您提供资源库，以便您决定实施内部解决方案。
- en: Document ingestion and cloud storage
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 文档摄取和云存储
- en: 'Cloud storage setup: Use cloud storage solutions like AWS S3, Google Cloud
    Storage, or Azure Blob Storage to store incoming documents. Each document can
    be uploaded to a specific folder or bucket, triggering the processing pipeline.
    Folder- based triggers can also help sort by document type or priority level for
    better organization in larger workflows.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 云存储设置：使用AWS S3、Google Cloud Storage或Azure Blob Storage等云存储解决方案来存储传入的文档。每个文档都可以上传到特定的文件夹或存储桶，触发处理管道。基于文件夹的触发器还可以帮助按文档类型或优先级进行排序，以在更大的工作流程中实现更好的组织。
- en: 'Event-driven triggers: Configure triggers (for example, AWS Lambda, Google
    Cloud Functions) to initiate processing automatically when new files are uploaded.
    These triggers start the automation workflow as soon as a document is placed in
    the designated storage.'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 事件驱动触发：配置触发器（例如，AWS Lambda，Google Cloud Functions），当新文件上传时自动启动处理。这些触发器在文档放置在指定的存储中时立即启动自动化工作流程。
- en: Conversion to image and preprocessing
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 转换为图像和预处理
- en: 'PDF to image conversion: Use libraries like [pdf2image](https://github.com/Belval/pdf2image)
    or tools like [ImageMagick](https://imagemagick.org/index.php) to convert PDFs
    to image files. These tools are also effective for handling large PDFs or documents
    with high resolution, allowing OCR and vision models to process complex, highly
    formatted documents.'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: PDF到图像转换：使用[pdf2image](https://github.com/Belval/pdf2image)或[ImageMagick](https://imagemagick.org/index.php)等工具将PDF转换为图像文件。这些工具对于处理大型PDF或高分辨率的文档也非常有效，允许OCR和视觉模型处理复杂、高度格式化的文档。
- en: 'Machine vision for document structure and quality enhancement: Machine vision
    algorithms detect document structure, such as headers, footers, and tables, helping
    segment the document for more precise OCR. Tools like [OpenCV](https://opencv.org/)
    can detect basic document structures (edges, lines) to identify text blocks.'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 用于文档结构和质量提升的机器视觉：机器视觉算法检测文档结构，例如页眉、页脚和表格，帮助分割文档以实现更精确的OCR。像[OpenCV](https://opencv.org/)这样的工具可以检测基本的文档结构（边缘、线条）以识别文本块。
- en: For advanced segmentation and image enhancement, models like [UNet](https://github.com/milesial/Pytorch-UNet)
    or [Faster R- CNN](https://mathworks.com/help/vision/ug/getting-started-with-r-cnn-fast-r-cnn-and-faster-r-cnn.html)
    can detect specific document zones or extract tables.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 对于高级分割和图像增强，可以使用[UNet](https://github.com/milesial/Pytorch-UNet)或[Faster R-
    CNN](https://mathworks.com/help/vision/ug/getting-started-with-r-cnn-fast-r-cnn-and-faster-r-cnn.html)等模型检测特定的文档区域或提取表格。
- en: 'Preprocessing images: Clean up images using OpenCV and [PIL](https://github.com/python-pillow/Pillow)
    (Python Imaging Library) to further optimize OCR accuracy. Machine vision models
    like [EAST](https://github.com/foamliu/EAST) (Efficient and Accurate Scene Text
    Detector) can also improve the segmentation of text blocks, enhancing OCR outcomes.'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图像预处理：使用OpenCV和[PIL](https://github.com/python-pillow/Pillow)（Python图像库）清理图像，以进一步优化OCR的准确性。像[EAST](https://github.com/foamliu/EAST)（高效且准确的场景文本检测器）这样的机器视觉模型也可以改善文本块的分割，增强OCR结果。
- en: Optical character recognition
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 光学字符识别
- en: 'OCR engine: Leverage OCR tools like Tesseract, PaddleOCR, or commercial options
    ([Google Vision OCR](https://cloud.google.com/use-cases/ocr?hl=en), [AWS Textract](https://aws.amazon.com/textract/))
    to extract text from images.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: OCR引擎：利用Tesseract、PaddleOCR或商业选项（[Google Vision OCR](https://cloud.google.com/use-cases/ocr?hl=en)，[AWS
    Textract](https://aws.amazon.com/textract/））从图像中提取文本。
- en: 'Machine vision for region and layout detection: [Detectron2](https://github.com/facebookresearch/detectron2)
    or [LayoutLM](https://huggingface.co/docs/transformers/en/model_doc/layoutlm)
    can be used for layout analysis, identifying document regions (text, tables, images)
    and allowing OCR to focus on text areas. [YOLO](https://pjreddie.com/darknet/yolo/)
    (You Only Look Once) can detect specific document elements, such as logos, stamps,
    or seals, that need separate processing.'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 区域和布局检测的机器视觉：[Detectron2](https://github.com/facebookresearch/detectron2) 或
    [LayoutLM](https://huggingface.co/docs/transformers/en/model_doc/layoutlm) 可用于布局分析，识别文档区域（文本、表格、图像），并允许
    OCR 聚焦于文本区域。[YOLO](https://pjreddie.com/darknet/yolo/)（You Only Look Once）可以检测需要单独处理的特定文档元素，如徽标、邮票或印章。
- en: 'Custom OCR models: For complex document layouts, consider training custom OCR
    models with [TensorFlow](https://www.tensorflow.org/) or [PyTorch](https://pytorch.org/).
    Machine vision models like [CascadeTabNet](https://github.com/DevashishPrasad/CascadeTabNet)
    can help accurately recognize structured data such as forms, tables, and invoices.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 定制 OCR 模型：对于复杂的文档布局，考虑使用 [TensorFlow](https://www.tensorflow.org/) 或 [PyTorch](https://pytorch.org/)
    训练定制的 OCR 模型。像 [CascadeTabNet](https://github.com/DevashishPrasad/CascadeTabNet)
    这样的机器视觉模型可以帮助准确识别结构化数据，如表格、发票和表格。
- en: Data cleaning and standardization
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 数据清理和标准化
- en: 'Text parsing and cleaning: Use regular expressions ([regex](https://www.regular-expressions.info/))
    and NLP tools, like [spaCy](https://spacy.io/) or [NLTK](https://www.nltk.org/),
    to parse and clean extracted text.'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 文本解析和清理：使用正则表达式 ([regex](https://www.regular-expressions.info/)) 和 NLP 工具，如
    [spaCy](https://spacy.io/) 或 [NLTK](https://www.nltk.org/)，来解析和清理提取的文本。
- en: 'Template-based data structuring: LayoutLM and Detectron2 can recognize specific
    layouts in frequently encountered document formats. Use [layout analysis](https://paperswithcode.com/task/document-layout-analysis)
    to match predefined extraction templates that map data to structured formats like
    JSON.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 基于模板的数据结构化：LayoutLM 和 Detectron2 可以识别常见文档格式中的特定布局。使用 [布局分析](https://paperswithcode.com/task/document-layout-analysis)
    来匹配预定义的提取模板，将数据映射到结构化格式，如 JSON。
- en: 'Template matching: [OpenCV’s template-matching functions](https://docs.opencv.org/4.x/d4/dc6/tutorial_py_template_matching.html)
    can automate structuring tasks by identifying visual cues and aligning data fields.
    Template matching can also detect changes in standard forms, flagging deviations
    from expected formats for quality checks.'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 模板匹配：[OpenCV 的模板匹配函数](https://docs.opencv.org/4.x/d4/dc6/tutorial_py_template_matching.html)可以通过识别视觉线索和对齐数据字段来自动化结构化任务。模板匹配还可以检测标准形式的更改，标记出与预期格式不符的偏差，以便进行质量检查。
- en: Data validation and quality checks
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 数据验证和质量检查
- en: 'Automated quality checks: Run quality assurance processes to validate the accuracy
    of extracted data. OpenCV can verify the presence and clarity of expected visual
    elements, such as logos or verification markers, by confirming alignment with
    document structure. Models like EAST or CascadeTabNet can flag structural discrepancies
    within tables and text blocks that don’t align with expected formats.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化质量检查：运行质量保证流程以验证提取数据的准确性。OpenCV 可以通过确认与文档结构的对齐来验证预期视觉元素（如徽标或验证标记）的存在和清晰度。像
    EAST 或 CascadeTabNet 这样的模型可以标记表格和文本块中的结构差异，这些差异与预期格式不匹配。
- en: 'Human-in-the-loop verification: Use a web-based interface to route flagged
    data for manual validation. The interface can display confidence scores from OCR
    or machine vision models, guiding human reviewers on areas needing closer inspection.
    Machine vision assists by flagging elements that don’t meet structural expectations,
    improving the quality control process.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 人工验证：使用基于网络的界面将标记的数据路由到手动验证。该界面可以显示 OCR 或机器视觉模型的置信度分数，指导人工审查员关注需要更仔细检查的区域。机器视觉通过标记不符合结构预期的元素来协助，从而提高质量控制流程。
- en: Data storage and API integration
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 数据存储和 API 集成
- en: 'Database selection: Store structured data in cloud databases (for example,
    MongoDB, [Google BigQuery](https://cloud.google.com/bigquery?hl=en), or [Azure
    Cosmos DB](https://azure.microsoft.com/en-us/products/cosmos-db)). BigQuery and
    Cosmos DB can scale with high availability, making them ideal for handling large
    datasets reliably.'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库选择：将结构化数据存储在云数据库中（例如，MongoDB、[Google BigQuery](https://cloud.google.com/bigquery?hl=en)
    或 [Azure Cosmos DB](https://azure.microsoft.com/en-us/products/cosmos-db)）。BigQuery
    和 Cosmos DB 可以实现高可用性扩展，使它们非常适合可靠地处理大量数据集。
- en: 'API development: Build [RESTFul APIs](https://aws.amazon.com/what-is/restful-api)
    using cloud-managed services like [AWS API Gateway](https://aws.amazon.com/api-gateway/)
    or [Google Cloud Endpoints](https://cloud.google.com/endpoints/docs) to facilitate
    data transfer into downstream systems.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: API 开发：使用如 [AWS API Gateway](https://aws.amazon.com/api-gateway/) 或 [Google
    Cloud Endpoints](https://cloud.google.com/endpoints/docs) 这样的云托管服务构建 [RESTful
    APIs](https://aws.amazon.com/what-is/restful-api)，以促进数据向下游系统的传输。
- en: Workflow orchestration
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程编排
- en: 'Containerization and microservices: Containerize workflow components (for example,
    ingestion, OCR, parsing) with Docker for modularity, enabling isolated updates
    and streamlined deployment.'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 容器化和微服务：使用 Docker 对工作流程组件（例如，摄取、OCR、解析）进行容器化，以实现模块化，允许独立更新和简化部署。
- en: 'Orchestration with Kubernetes: Use managed Kubernetes services like [AWS EKS](https://aws.amazon.com/eks/),
    [GCP GKE](https://cloud.google.com/kubernetes-engine?hl=en), or [Azure AKS](https://azure.microsoft.com/en-us/products/kubernetes-service)
    to manage containerized services and enable horizontal scaling.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Kubernetes 的编排：使用如 [AWS EKS](https://aws.amazon.com/eks/)、[GCP GKE](https://cloud.google.com/kubernetes-engine?hl=en)
    或 [Azure AKS](https://azure.microsoft.com/en-us/products/kubernetes-service) 这样的托管
    Kubernetes 服务来管理容器化服务，并实现水平扩展。
- en: 'Parallel processing: Implement parallel processing using task queues like [Celery](https://docs.celeryq.dev/en/stable/)
    with [RabbitMQ](https://www.rabbitmq.com/) or [Redis](https://redis.io/) to process
    multiple documents simultaneously, which is crucial for handling large volumes
    efficiently. Redis can also serve as a message broker for Celery, helping to manage
    task queues.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 并行处理：使用如 [Celery](https://docs.celeryq.dev/en/stable/) 这样的任务队列，配合 [RabbitMQ](https://www.rabbitmq.com/)
    或 [Redis](https://redis.io/) 实现并行处理，以同时处理多个文档，这对于高效处理大量数据至关重要。Redis 还可以作为 Celery
    的消息代理，帮助管理任务队列。
- en: Scheduled processing and monitoring
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 定期处理和监控
- en: 'Scheduling tasks: Use schedulers like [AWS EventBridge](https://aws.amazon.com/eventbridge/)
    or [Google Cloud](https://cloud.google.com/scheduler/docs) [Scheduler](https://cloud.google.com/scheduler/docs)
    to automate document ingestion and processing at regular intervals.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 任务调度：使用如 [AWS EventBridge](https://aws.amazon.com/eventbridge/) 或 [Google Cloud
    Scheduler](https://cloud.google.com/scheduler/docs) 这样的调度器，定期自动化文档的摄取和处理。
- en: 'Monitoring and logging: Set up monitoring with tools like [Prometheus](https://prometheus.io/)
    and [Grafana](https://grafana.com/) to keep track of system health and processing
    times. Use logging services like [AWS CloudWatch](https://aws.amazon.com/cloudwatch/)
    or [GC Operations](https://cloud.google.com/products/operations?hl=en) for real-time
    troubleshooting and analysis.'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 监控和日志记录：使用 [Prometheus](https://prometheus.io/) 和 [Grafana](https://grafana.com/)
    等工具设置监控，以跟踪系统健康和处理时间。使用如 [AWS CloudWatch](https://aws.amazon.com/cloudwatch/)
    或 [GC Operations](https://cloud.google.com/products/operations?hl=en) 这样的日志服务进行实时故障排除和分析。
- en: Security and compliance
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性和合规性
- en: 'Data encryption: Encrypt data at rest using cloud-native key management services
    like [AWS KMS](https://docs.aws.amazon.com/kms/latest/developerguide/overview.html)
    or [Google Cloud](https://cloud.google.com/security/products/security-key-management?hl=en)
    [KMS](https://cloud.google.com/security/products/security-key-management?hl=en).
    Implement [SSL/TLS](https://www.digicert.com/what-is-ssl-tls-and-https) for data
    in transit to protect sensitive information.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 数据加密：使用如 [AWS KMS](https://docs.aws.amazon.com/kms/latest/developerguide/overview.html)
    或 [Google Cloud KMS](https://cloud.google.com/security/products/security-key-management?hl=en)
    这样的云原生密钥管理服务对静态数据进行加密。对传输中的数据进行 [SSL/TLS](https://www.digicert.com/what-is-ssl-tls-and-https)
    加密，以保护敏感信息。
- en: 'Access control and audit logs: Implement [role-based access control](https://auth0.com/docs/manage-users/access-control/rbac)
    (RBAC) using IAM policies (for example, [AWS IAM](https://aws.amazon.com/iam/)
    or [Google IAM](https://cloud.google.com/iam/docs/overview)) and enable audit
    logging to ensure compliance with standards such as HIPAA or GDPR.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 访问控制和审计日志：使用 IAM 策略（例如，[AWS IAM](https://aws.amazon.com/iam/) 或 [Google IAM](https://cloud.google.com/iam/docs/overview)）实现基于角色的访问控制（RBAC），并启用审计日志，以确保符合
    HIPAA 或 GDPR 等标准。
- en: Feedback loop for improved models
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 改进模型的反馈循环
- en: 'Continuous model updates: Store feedback and error data in a cloud database
    to retrain models automatically using scheduled machine learning workflows (for
    example, [AWS SageMaker](https://aws.amazon.com/sagemaker/) or [Google AI Platform](https://cloud.google.com/ai-platform/docs)).'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 持续模型更新：将反馈和错误数据存储在云数据库中，使用计划好的机器学习工作流程自动重新训练模型（例如，[AWS SageMaker](https://aws.amazon.com/sagemaker/)
    或 [Google AI Platform](https://cloud.google.com/ai-platform/docs/)）。
- en: 'EAST and Detectron2 for layout updates: Machine vision models can be retrained
    on feedback if new document layouts or structures emerge, allowing the system
    to adapt to layout changes over time.'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: EAST和Detectron2用于布局更新：如果出现新的文档布局或结构，机器视觉模型可以在反馈的基础上重新训练，使系统能够随着时间的推移适应布局变化。
- en: '[![TL Logo](img/TL_Logo.png)'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '![TL Logo](img/TL_Logo.png)'
- en: 'FEEDBACK TOUCHPOINT 2:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈触点 2：
- en: Quick thoughts on this section?](https://forms.office.com/e/4a01JLkbhd)
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 您对这个部分有什么快速的想法？](https://forms.office.com/e/4a01JLkbhd)
- en: '![](img/B34120_Figure_5.png)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34120_Figure_5.png)'
- en: 'FIGURE 5: Useful tools at every stage of the process.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5：在流程的每个阶段都有有用的工具。
- en: Challenges and Solutions
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战与解决方案
- en: 'Challenge #1: Resource-intensive document processing'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '挑战 #1：资源密集型文档处理'
- en: 'Challenge: Processing large and complex PDF documents can be very resource-intensive,
    even if the file size is relatively small. The challenge arises from the power-hungry
    processes of converting PDFs to images, using APIs for cleaning and data extraction,
    and handling the sub-processes involved, as Tobalo explains:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战：处理大型和复杂的PDF文档可能非常资源密集，即使文件大小相对较小。挑战源于将PDF转换为图像、使用API进行清理和数据提取以及处理涉及的所有子过程的高能耗过程。正如Tobalo解释的那样：
- en: '![](img/2.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/2.png)'
- en: In the data world, you usually measure by big data – terabytes of data – but
    with PDFs, you’re dealing with something different. A 10 MB or 30 MB PDF may seem
    small, but processing it can be much more time-consuming than you’d expect. The
    challenge comes from the need to convert PDFs to images, make API calls for cleaning
    and data extraction, and handle all the sub-processes involved. So, it’s not just
    about processing megabytes – there are a lot of network traversals and the need
    for infrastructure to handle the vision models that extract the data. It’s far
    more complex than just measuring the data size in megabytes.”
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据世界中，你通常通过大数据来衡量——数以千兆字节的数据——但与PDF打交道时，你处理的是不同的事物。一个10 MB或30 MB的PDF可能看起来很小，但处理它可能比你预期的要花费更多时间。挑战源于需要将PDF转换为图像、进行API调用以进行清理和数据提取以及处理涉及的所有子过程。因此，这不仅仅是处理兆字节的问题——有很多网络穿越和需要基础设施来处理提取数据的视觉模型。这比仅仅衡量数据大小要复杂得多。”
- en: -- Tobalo Torres
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: -- Tobalo Torres
- en: 'Solution: Lucidis relies on cloud solutions for GPU-intensive tasks, particularly
    AWS. This allows them to access powerful GPUs over the internet without needing
    physical hardware on- site. Companies like [AWS](https://docs.aws.amazon.com/dlami/latest/devguide/gpu.html),
    [Google Cloud](https://cloud.google.com/gpu/) [Platform (GCP)](https://cloud.google.com/gpu/),
    and [Microsoft Azure](https://learn.microsoft.com/en-us/azure/virtual-machines/sizes/gpu-accelerated/nc-family)
    offer specialized GPU instances tailored for machine learning, deep learning,
    data processing, and high-performance computing (HPC).'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：Lucidis依靠云解决方案进行GPU密集型任务，尤其是AWS。这使得他们可以通过互联网访问强大的GPU，而无需在本地部署物理硬件。像[AWS](https://docs.aws.amazon.com/dlami/latest/devguide/gpu.html)、[Google
    Cloud](https://cloud.google.com/gpu/) [平台 (GCP)](https://cloud.google.com/gpu/)
    和 [Microsoft Azure](https://learn.microsoft.com/en-us/azure/virtual-machines/sizes/gpu-accelerated/nc-family)
    这样的公司提供专门针对机器学习、深度学习、数据处理和高性能计算 (HPC) 的GPU实例。
- en: 'Challenge #2: Integrating Lucidis with Property Preservation Wizard'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '挑战 #2：将Lucidis与Property Preservation Wizard集成'
- en: During the integration of Lucidis with Property Preservation Wizard (PPW), Lucidis
    encountered several challenges that required strategic adjustments and collaboration
    to resolve. These challenges highlight the complexities of aligning advanced automation
    solutions with pre-existing systems and workflows.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在Lucidis与Property Preservation Wizard (PPW) 集成过程中，Lucidis遇到了需要战略调整和协作才能解决的几个挑战。这些挑战突显了将先进的自动化解决方案与现有系统和流程对齐的复杂性。
- en: 'Challenge: One of the primary challenges was that the initial version of PPW’s
    API did not fully support all the data fields and functionalities required by
    Lucidis. This limitation meant that certain necessary data points were inaccessible
    or missing, creating potential gaps in data processing and limiting the automation
    capabilities Lucidis could offer.'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战：主要挑战之一是PPW API的初始版本并未完全支持Lucidis所需的所有数据字段和功能。这种限制意味着某些必要的数据点无法访问或缺失，这可能在数据处理中造成潜在差距，并限制了Lucidis能够提供的自动化能力。
- en: 'Solution: Lucidis addressed these integration challenges through effective
    collaboration and clear communication. Fortunately, PPW was receptive to feedback
    from Lucidis, and they collaborated to enhance the API, adding the needed fields
    and functionalities. This improvement enabled seamless data exchange and allowed
    Lucidis to achieve the desired level of automation and data accuracy. Lucidis
    emphasizes continuous communication with clients, a practice that facilitated
    a smooth integration process with PPW. By establishing clear lines of communication,
    both Lucidis and Black Dome could work together to identify challenges early,
    align their goals, and ensure that the integration was efficient and met the client’s
    needs.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：Lucidis通过有效的协作和清晰的沟通解决了这些集成挑战。幸运的是，PPW对Lucidis的反馈持开放态度，双方合作增强了API，增加了所需字段和功能。这一改进实现了无缝的数据交换，并使Lucidis能够实现所需的自动化水平和数据准确性。Lucidis强调与客户持续沟通，这种做法促进了与PPW的顺利集成过程。通过建立清晰的沟通渠道，Lucidis和Black
    Dome能够共同识别早期挑战，对齐目标，并确保集成高效且满足客户需求。
- en: Lucidis’ Next Steps
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis的下一步计划
- en: Lucidis is actively exploring and integrating new technologies to enhance its
    platform.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis正在积极探索和整合新技术以增强其平台。
- en: Graph RAG
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 图RAG
- en: '![](img/2.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图片2](img/2.png)'
- en: One rising area we’re focusing on is knowledge graphs for enterprise knowledge
    bases. It’s not just about enabling chat with enterprise data but improving how
    we handle investigation, analysis, or assessment of specific documents.”
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在关注的崛起领域之一是企业知识库的知识图谱。这不仅关乎使企业数据能够进行聊天，还关乎改善我们处理特定文档的调查、分析或评估的方式。”
- en: --Tobalo Torres
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: --Tobalo Torres
- en: Graph RAG represents an evolution of retrieval-augmented generation (RAG), where
    a generative model like GPT retrieves relevant external information to support
    its responses. Unlike traditional RAG, which relies solely on text-based document
    retrieval, Graph RAG incorporates knowledge graphs into the retrieval process.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 图RAG代表了检索增强生成（RAG）的演变，其中生成模型如GPT检索相关外部信息以支持其响应。与传统RAG仅依赖于基于文本的文档检索不同，图RAG将知识图谱纳入检索过程。
- en: Knowledge graphs structure information as nodes and edges, representing entities
    and their relationships. This structured approach enables models to grasp not
    only isolated pieces of data but also the contextual relationships between them.
    For example, in legal or compliance settings, a knowledge graph can map connections
    between various laws, precedents, regulations, and involved entities (companies,
    individuals), creating a richly interconnected data landscape.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱以节点和边的形式结构化信息，代表实体及其关系。这种结构化方法使模型不仅能理解孤立的数据片段，还能理解它们之间的上下文关系。例如，在法律或合规环境中，知识图谱可以映射各种法律、先例、法规和涉及实体（公司、个人）之间的联系，创建一个丰富互联的数据景观。
- en: Figure 6 illustrates this in the context of the fictional law firm, ACME Corp.
    When a lawyer initiates a query — such as “Environmental case involving ACME Corp”
    — the system leverages a generative model to interpret keywords and identify relevant
    contexts, such as environmental regulations and entities like the EPA. This initial
    processing directs the search toward pertinent documents and relationships within
    the knowledge graph, aligning the retrieval process with the context of the query.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图6在虚构的律师事务所ACME Corp的背景下说明了这一点。当律师发起查询——例如“涉及ACME Corp的环境案件”——系统利用生成模型来解释关键词并识别相关上下文，如环境法规和像EPA这样的实体。这种初步处理将搜索引导到知识图谱中的相关文档和关系，使检索过程与查询的上下文相一致。
- en: 'The dual-retrieval approach of Graph RAG combines text-based document retrieval
    with knowledge graph retrieval. While document retrieval captures contextual details,
    the knowledge graph pulls structured data to map relationships, such as connections
    between:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图RAG的双重检索方法结合了基于文本的文档检索和知识图谱检索。虽然文档检索捕捉上下文细节，但知识图谱则抽取结构化数据以映射关系，例如以下连接：
- en: ACME Corp
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ACME公司
- en: Relevant compliance frameworks
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关合规框架
- en: Prior case law
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 先前案例法
- en: The system extracts and merges entities and relationships from both sources,
    creating a well-rounded view of the case.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 系统从两个来源中提取和合并实体和关系，对案例形成全面的认识。
- en: This synthesized information enables Graph RAG to generate a contextually enriched
    and precise response, providing nuanced insights that would otherwise require
    extensive manual research.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这种综合信息使Graph RAG能够生成上下文丰富且精确的响应，提供通常需要大量手动研究的细微见解。
- en: '![](img/B34120_Figure_6.png)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34120_Figure_6.png)'
- en: 'FIGURE 6: Diagram showing the process of Graph RAG.'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：展示Graph RAG过程的示意图。
- en: Agentic tooling
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 代理工具
- en: Lucidis plans to move beyond data cleaning, embedding, and vectorization by
    incorporating agentic tooling.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis计划通过整合代理工具超越数据清理、嵌入和向量化的范畴。
- en: '![](img/2.png)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/2.png)'
- en: We’re currently exploring agentic tooling, applying AI beyond just cleaning,
    embedding, and vectorizing data. We’ve seen success with Property Preservation
    Wizard as a tool and are now aiming to extend these agentic methodologies in our
    solutions.”
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 我们目前正在探索代理工具，将AI的应用扩展到仅仅清理、嵌入和向量化数据之外。我们已经看到Property Preservation Wizard作为工具的成功，现在正致力于在我们解决方案中扩展这些代理方法。”
- en: -- Tobalo Torres
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: -- 托巴洛·托雷斯
- en: Agentic tooling refers to systems capable of acting independently, taking proactive
    actions based on their understanding of data and context. This approach goes beyond
    basic automation, where AI performs tasks like cleaning, embedding, and vectorizing
    data, and moves towards AI agents autonomously performing more complex tasks with
    pre- defined goals and learning from interactions.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 代理工具指的是能够独立行动的系统，它们根据对数据和上下文的理解采取主动行动。这种方法超越了基本的自动化，其中AI执行诸如清理、嵌入和向量化数据等任务，并朝着AI代理自主执行具有预定义目标和从交互中学习的更复杂任务的方向发展。
- en: 'Using the Black Dome case as an example, agentic tooling could enable the following:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 以Black Dome案例为例，代理工具可以实现以下功能：
- en: 'Proactive data handling: Currently, Lucidis processes unstructured data and
    cleans it for downstream use. With agentic AI, the system could take the next
    step, autonomously deciding where and how to route cleaned data based on task
    requirements. For example, if a work order involves a common maintenance request,
    the agent could automatically assign it to the appropriate contractor based on
    past performance.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 主动数据处理：目前，Lucidis处理非结构化数据并将其清理以供下游使用。借助代理AI，系统可以采取下一步，根据任务要求自主决定将清理后的数据路由到何处以及如何路由。例如，如果一份工作订单涉及常见的维护请求，代理可以根据以往的表现自动将其分配给适当的承包商。
- en: 'Autonomous task management: In the Property Preservation Wizard, the AI could
    go beyond generating work orders and invoices by scheduling repairs, updating
    timelines, and sending status updates to clients autonomously. This would transform
    the system into a dynamic task manager, reducing the workload for employees and
    increasing overall efficiency.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 自主任务管理：在Property Preservation Wizard中，AI可以超越生成工作订单和发票，通过自主安排维修、更新时间表并向客户发送状态更新。这将使系统成为一个动态的任务管理器，减少员工的工作量并提高整体效率。
- en: 'Enhanced decision-making: Lucidis could leverage agentic AI to analyze historical
    data and optimize workflows. For instance, by learning from past work orders,
    the AI could recommend or even initiate cost-saving measures, such as adjusting
    vendor assignments based on efficiency or historical performance data.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 增强决策：Lucidis可以利用代理AI分析历史数据并优化工作流程。例如，通过学习以往的工作订单，AI可以推荐或甚至启动节省成本的措施，如根据效率或历史表现数据调整供应商分配。
- en: 'Integration with external tools: Extending agentic methodologies may also involve
    connecting Lucidis to third-party tools via APIs, where the AI autonomously initiates
    interactions with external systems. For instance, Lucidis could trigger automatic
    supply orders or notify contractors when a property task requires urgent attention
    based on live data from its workflows.'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 与外部工具的集成：扩展代理方法也可能涉及通过API将Lucidis连接到第三方工具，其中AI可以自主地与外部系统进行交互。例如，基于其工作流程中的实时数据，Lucidis可以触发自动供应订单或通知承包商当一项物业任务需要紧急关注时。
- en: '![](img/B34120_Figure_7.png)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![图7](img/B34120_Figure_7.png)'
- en: 'FIGURE 7: Diagram showing the process of agentic AI.'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：展示代理AI处理过程的图表。
- en: Cross-Industry Use Cases and the Future of Data Governance
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 跨行业用例和数据治理的未来
- en: While Lucidis’ primary focus has been on mortgage field services, its technology
    holds significant promise for any industry grappling with “data chaos”. Their
    long-term vision includes expanding into sectors with complex documentation and
    regulatory requirements, leveraging AI-powered solutions to streamline workflows
    and enhance data accuracy.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Lucidis的主要关注点在于抵押贷款领域的服务，但其技术对于任何与“数据混乱”作斗争的行业都拥有巨大的潜力。他们的长期愿景包括扩展到具有复杂文档和监管要求的领域，利用AI驱动的解决方案来简化工作流程并提高数据准确性。
- en: Data chaos is everywhere
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 数据混乱无处不在
- en: Despite advances in digital transformation, many sectors continue to operate
    on legacy systems or handle data in inconsistent formats, making efficient data
    management challenging. Binni and Tobalo note that any organization managing large
    volumes of documents can benefit from AI-driven document cleaning and structuring.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管数字化转型取得了进展，但许多行业仍在使用遗留系统或以不一致的格式处理数据，这使得高效的数据管理变得具有挑战性。Binni和Tobalo指出，任何管理大量文档的组织都可以从AI驱动的文档清理和结构化中受益。
- en: 'Legal industry: Legal professionals face the daunting task of reviewing large
    quantities of contracts, case files, and compliance documents, often in unstructured
    formats like PDFs and scanned images. Machine vision and advanced OCR technologies
    can automate ingestion and extraction of essential data, such as clauses, dates,
    and terms, reducing manual review time and minimizing errors'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 法律行业：法律专业人士面临着审查大量合同、案件文件和合规文件的艰巨任务，这些文件通常以PDF和扫描图像等非结构化格式存在。机器视觉和高级OCR技术可以自动化关键数据的摄入和提取，例如条款、日期和条款，减少手动审查时间并最小化错误。
- en: 'Use case: Document review. Law firms can use these technologies to automatically
    flag relevant clauses or extract key dates and terms from contracts. Natural language
    querying allows professionals to quickly search across thousands of documents,
    boosting review efficiency and ensuring no critical details are overlooked.'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：文档审查。律师事务所可以使用这些技术自动标记相关条款或从合同中提取关键日期和条款。自然语言查询允许专业人士快速搜索数千份文档，提高审查效率并确保没有关键细节被忽略。
- en: 'As Tobalo explains, these solutions have broader applications that go beyond
    single firms:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 如Tobalo所解释，这些解决方案的应用范围更广，不仅限于单一企业：
- en: '![](img/2.png)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![图片2](img/2.png)'
- en: There are groups like the Legal Defense Fund and other tertiary organizations
    that need to navigate a wide variety of legal codes, not to mention potential
    new legal codes integrated during legislative sessions. Having an enterprise knowledge
    base solution, like what we’re building, would allow them to access and manage
    all that information more efficiently.”
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 存在着像法律辩护基金和其他三级组织这样的团体，它们需要导航各种法律代码，更不用说在立法会议期间可能整合的新法律代码了。拥有像我们正在构建的企业知识库解决方案，将使他们能够更有效地访问和管理所有这些信息。”
- en: --Tobalo Torres
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: --Tobalo Torres
- en: 'Finance: Financial institutions handle documents such as loan applications,
    financial statements, and regulatory filings, often arriving in various formats.
    Traditional processing requires manual data extraction and validation, which is
    time-consuming and prone to error. Using OCR and NLP, financial institutions can
    automate document processing, accelerating loan approvals, audits, and compliance
    checks while reducing human error.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 金融：金融机构处理诸如贷款申请、财务报表和监管文件等文档，通常以各种格式到达。传统的处理需要手动数据提取和验证，这既耗时又容易出错。使用OCR和NLP，金融机构可以自动化文档处理，加速贷款审批、审计和合规检查，同时减少人为错误。
- en: 'Use case: Loan processing and auditing. An AI system could scan loan applications,
    extract pertinent information (credit scores, income data, debt obligations),
    and feed it into internal systems. API integrations with existing workflows allow
    financial institutions to increase operational efficiency without extensive system
    modifications.'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：贷款处理和审计。一个AI系统可以扫描贷款申请，提取相关信息（信用评分、收入数据、债务义务），并将其输入到内部系统中。与现有工作流程的API集成允许金融机构在不进行大量系统修改的情况下提高运营效率。
- en: 'Healthcare: Healthcare organizations manage vast amounts of unstructured data,
    including patient records, insurance claims, and lab reports. Manual entry into
    electronic health record (EHR) systems slows operations and introduces errors,
    impacting patient care. By using machine vision, OCR and NLP, healthcare providers
    can automate data extraction, making critical information readily accessible.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗保健：医疗保健机构管理大量非结构化数据，包括患者记录、保险索赔和实验室报告。手动输入电子健康记录（EHR）系统会减慢操作并引入错误，影响患者护理。通过使用机器视觉、OCR和NLP，医疗保健提供者可以自动化数据提取，使关键信息易于获取。
- en: 'Use case: Patient record management and insurance claims. OCR-enabled systems
    can pull data from patient records, lab results, and insurance claims, structuring
    it for seamless integration into EHR systems. This accelerates record handling
    and improves patient outcomes by providing quicker access to medical information.
    In insurance, claims are processed faster, reducing turnaround times for patients
    and providers.'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：患者记录管理和保险索赔。OCR功能使系统能够从患者记录、实验室结果和保险索赔中提取数据，将其结构化以无缝集成到EHR系统中。这加快了记录处理速度，通过提供更快的医疗信息访问，改善了患者结果。在保险领域，索赔处理速度更快，减少了患者和提供者的周转时间。
- en: 'Public sector: Government agencies manage large quantities of public records,
    legal documents, and regulatory filings, often in unstructured or paper formats.
    Manual processing is labor- intensive, delays service delivery, and raises error
    risks. AI-powered document digitization and natural language search capabilities
    make public records more accessible and manageable.'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 公共部门：政府机构管理大量公共记录、法律文件和监管文件，通常以非结构化或纸质格式存在。手动处理劳动密集，延误服务交付，并增加了错误风险。AI驱动的文档数字化和自然语言搜索能力使公共记录更易于访问和管理。
- en: 'Use case: Public records and compliance. AI tools would enable government agencies
    to automatically ingest and organize public records, allowing for quick, reliable
    access through natural language searches. This expedites decision- making, improves
    transparency, and enhances public service efficiency by allowing officials to
    locate relevant information across legislative documents, compliance reports,
    and public records.'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：公共记录和合规。AI工具将使政府机构能够自动摄取和组织公共记录，通过自然语言搜索实现快速、可靠的访问。这加快了决策过程，提高了透明度，并通过使官员能够在立法文件、合规报告和公共记录中定位相关信息，从而提高了公共服务效率。
- en: 'Energy and utilities: Energy and utility companies are responsible for extensive
    documentation, including inspection reports, safety audits, and compliance filings.
    These documents, often unstructured and in various formats, require significant
    time and effort to process. Using OCR and machine vision, energy companies can
    automate data extraction, improving compliance and asset tracking.'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 能源和公用事业：能源和公用事业公司负责广泛的文档，包括检查报告、安全审计和合规文件。这些文件通常是非结构化的，以各种格式存在，需要大量时间和精力进行处理。使用OCR和机器视觉，能源公司可以自动化数据提取，提高合规性和资产跟踪。
- en: 'Use case: Inspection and compliance. AI tools can scan inspection reports,
    extract compliance data, and feed it into asset management systems, enabling quick
    response to maintenance needs and adherence to safety standards. For example,
    an automated system can flag safety violations and prioritize urgent maintenance
    actions.'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：检查和合规。AI工具可以扫描检查报告，提取合规数据，并将其输入到资产管理系统中，从而能够快速响应维护需求并遵守安全标准。例如，自动系统可以标记安全违规并优先处理紧急维护行动。
- en: 'Manufacturing: Manufacturers, particularly in regulated fields like automotive
    and aerospace, face complex documentation for quality control and regulatory compliance.
    AI-powered document processing enables them to streamline audits and ensure each
    document contains the necessary compliance details.'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 制造业：制造商，特别是在汽车和航空航天等受监管领域，面临着质量控制和管理合规的复杂文档。AI驱动的文档处理使他们能够简化审计并确保每份文件都包含必要的合规细节。
- en: 'Use case: Quality control documentation. Machine vision and OCR can check inspection
    records for critical information, flagging any inconsistencies. This enables quality
    managers to proactively address compliance issues before they impact production,
    ensuring smooth operations and minimizing regulatory risks.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：质量控制文档。机器视觉和OCR可以检查检查记录中的关键信息，标记任何不一致之处。这使质量经理能够主动解决合规性问题，在它们影响生产之前，确保平稳运营并降低监管风险。
- en: 'Transportation and logistics: Transportation and logistics require substantial
    document management, such as bills of lading, freight invoices, and customs declarations.
    Manual processing can slow down shipments and increase regulatory risks.'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 交通运输和物流：交通运输和物流需要大量的文档管理，如提单、货运发票和海关申报。人工处理会减慢运输速度并增加监管风险。
- en: 'Use case: Freight and customs processing. AI tools can scan and extract essential
    shipment details, like cargo content, origin, and destination, from bills of lading
    and customs forms. The extracted data can be integrated with logistics systems,
    allowing for real-time shipment tracking and streamlined customs processing, reducing
    transit times.'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：货运和海关处理。人工智能工具可以扫描并从提单和海关表格中提取关键货运细节，如货物内容、原产地和目的地。提取的数据可以与物流系统集成，实现实时货运跟踪和简化的海关处理，减少运输时间。
- en: 'Retail and e-commerce: Retailers handle a vast array of supplier contracts,
    inventory lists, and customer returns, often in various formats. Processing these
    documents manually is labor- intensive and slows inventory management.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 零售和电子商务：零售商处理大量的供应商合同、库存清单和客户退货，通常以各种格式。手动处理这些文件既费时又减慢库存管理。
- en: 'Use case: Supplier contract and inventory management. OCR and NLP can automate
    data extraction from supplier contracts, capturing product specs, terms, and renewal
    dates. The structured data can be used to optimize inventory levels and streamline
    supplier coordination, reducing stockouts and building customer satisfaction.'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例：供应商合同和库存管理。光学字符识别（OCR）和自然语言处理（NLP）可以自动化从供应商合同中提取数据，捕获产品规格、条款和续订日期。这些结构化数据可用于优化库存水平并简化供应商协调，减少缺货并提高客户满意度。
- en: Scalability across industries
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 行业间的可扩展性
- en: The adaptability of these AI technologies enables scalable applications across
    different sectors, from legal and finance to healthcare and logistics. Through
    API integrations, organizations can implement these solutions with minimal disruption
    to existing workflows, allowing each industry to address its specific data challenges
    effectively.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这些人工智能技术的适应性使得它们可以在不同的行业中进行可扩展的应用，从法律和金融到医疗保健和物流。通过API集成，组织可以在对现有工作流程造成最小干扰的情况下实施这些解决方案，使每个行业都能有效地解决其特定的数据挑战。
- en: Upcoming shifts in data governance for enterprises
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 企业数据治理即将发生的转变
- en: 'Emerging security standards for AI and data governance: New security standards
    are likely on the horizon, particularly aimed at AI and data governance practices.'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和数据治理的新安全标准：新的安全标准可能即将出现，特别是针对人工智能和数据治理实践。
- en: '![](img/2.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: I expect there will be new security standards coming into play, specifically
    for AI and data governance. These will likely require organizations to adhere
    to stricter regulations and obtain certifications to demonstrate compliance. We’ll
    need to be ready for those changes.”
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 我预计将出现新的安全标准，特别是针对人工智能和数据治理。这些标准可能要求组织遵守更严格的法规并获得认证以证明其合规性。我们需要为这些变化做好准备。”
- en: --Binni Skariah
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: --Binni Skariah
- en: This shift reflects the growing concerns over data security and privacy in AI,
    pushing companies to adopt practices that align with emerging standards such as
    [ISO 47001](https://www.iso.org/standard/81230.html) — a recently introduced standard
    focused on responsible AI compliance and security. Beyond ISO standards, shifting
    industry-specific regulations will also play a role, such as HIPAA for healthcare
    data, ITAR for defense data, and PII regulations for general consumer data privacy.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变反映了人们对人工智能中数据安全和隐私日益增长的担忧，推动公司采用与新兴标准（如[ISO 47001](https://www.iso.org/standard/81230.html)）相一致的做法——这是一个专注于负责任人工智能合规性和安全性的新标准。除了ISO标准之外，行业特定的法规变化也将发挥作用，例如医疗保健数据的HIPAA、国防数据的ITAR以及一般消费者数据隐私的PII法规。
- en: 'The shift toward strategic data ontologies: An emerging trend in data governance
    is the adoption of a data ontology approach—a structured understanding of how
    data flows across an organization. The shift moves data governance from a purely
    operational or financial focus to a more strategic framework, enabling organizations
    to map, categorize, and understand their data assets in real time.'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 向战略数据本体论的转变：数据治理领域的一个新兴趋势是采用数据本体论方法——一种对数据如何在组织内部流动的结构化理解。这种转变将数据治理从纯粹的操作或财务焦点转向更战略性的框架，使组织能够实时映射、分类和理解其数据资产。
- en: '![](img/2.png)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![img/2.png](img/2.png)'
- en: On one hand, it’s about knowing the practical benefits — cleaning data makes
    processes smoother, improves productivity, and makes employees’ jobs easier. But
    there’s a broader strategic shift happening as well. We’re helping C-suite leaders
    conceptualize a data ontology for their organizations, which means understanding
    how their data flows across the enterprise and ensuring they have the right structures
    in place to manage it effectively. This ontological approach represents a shift
    from purely financial-based thinking to a more holistic, strategic view. In the
    long run, governing data effectively leads to greater efficiencies, enhanced real-time
    intelligence, and better decision-making across the board. I believe this kind
    of thinking will become more widespread among senior executives in the coming
    years.”
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，这关乎了解实际效益——清理数据使流程更顺畅，提高生产力，并使员工的工作更轻松。但同时也发生着更广泛的战略转变。我们正在帮助C级高管为他们的组织构想数据本体论，这意味着理解他们的数据如何在企业内部流动，并确保他们有适当的结构来有效管理它。这种本体论方法代表了从纯粹基于财务的思考到更全面、战略视角的转变。从长远来看，有效地治理数据将导致更高的效率、增强的实时智能和全面的决策能力。我相信这种思维方式将在未来几年内更广泛地被高级管理人员所接受。”
- en: -- Tobalo Torres
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: -- Tobalo Torres
- en: This ontological approach enhances decision-making capabilities, real-time intelligence,
    and efficiency. For senior leaders, a well-defined data ontology clarifies the
    enterprise’s data ecosystem, supporting better outcomes across the board.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: '这种本体论方法增强了决策能力、实时智能和效率。对于高级管理人员来说，一个明确的数据本体论可以阐明企业的数据生态系统，支持全面的结果。 '
- en: '[![TL Logo](img/TL_Logo.png)'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: '![TL Logo](img/TL_Logo.png)'
- en: 'FEEDBACK TOUCHPOINT 3:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈触点3：
- en: How did this section land with you?](https://forms.office.com/e/4a01JLkbhd)
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 你觉得这一部分怎么样？](https://forms.office.com/e/4a01JLkbhd)
- en: DIY versus All-in-One Solutions
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: DIY与一站式解决方案
- en: From previous sections, you should now have a solid understanding of the core
    concepts and technologies involved in automating data processing pipelines to
    clean data for downstream applications and AI initiatives.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的部分，你现在应该对自动化数据处理管道的核心概念和技术有一个扎实的理解，这些技术用于为下游应用和人工智能项目清理数据。
- en: A key decision for companies is whether to build and maintain their solution
    in-house or to use an all-in-one solution, as Black Dome did with Lucidis. This
    choice involves a cost-benefit analysis and will depend on the resources and expertise
    within your business. Here are some key considerations.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 对于公司来说，一个关键的决定是是否在内部构建和维护解决方案，或者像Black Dome使用Lucidis那样采用一站式解决方案。这个选择涉及成本效益分析，并将取决于贵公司的资源和专业知识。以下是一些关键考虑因素。
- en: Drawbacks of a DIY approach
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: DIY方法的缺点
- en: 'Technical complexity: Developing a robust AI system for data governance requires
    significant expertise in areas like machine vision, NLP, and cloud infrastructure.
    Building and maintaining such a system in-house would require a skilled engineering
    team and ongoing investment in infrastructure.'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 技术复杂性：开发一个强大的数据治理人工智能系统需要机器视觉、NLP和云基础设施等领域的显著专业知识。在内部构建和维护这样一个系统需要一支熟练的工程团队和持续的基础设施投资。
- en: 'Staying up-to-date: AI is a fast-evolving field, with new models and techniques
    emerging constantly. A DIY approach requires continuous research, development,
    and integration of advancements to remain competitive and effective.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 保持最新：人工智能是一个快速发展的领域，新的模型和技术不断涌现。DIY方法需要持续的研究、开发和集成进步，以保持竞争力和有效性。
- en: 'Security and compliance: Ensuring data privacy and security, especially when
    handling sensitive information, is paramount. Building a secure and compliant
    system involves adhering to industry standards, conducting penetration testing,
    vulnerability assessments, and ongoing monitoring—all of which can be resource-
    intensive for organizations without specialized expertise.'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 安全与合规：确保数据隐私和安全，尤其是在处理敏感信息时，至关重要。构建一个安全且合规的系统需要遵守行业标准，进行渗透测试、漏洞评估以及持续监控——所有这些对于缺乏专业知识的组织来说都可能需要大量资源。
- en: Advantages of all-in-one solutions
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 一站式解决方案的优势
- en: 'Expertise and experience: All-in-one solutions come with a team of experts
    in AI and data management. These providers understand the nuances of handling
    unstructured data for specific business needs, cleaning and extracting information,
    and integrating with various systems and APIs, effectively addressing challenges
    that can overwhelm in-house teams.'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 专业知识与经验：一站式解决方案附带一支由AI和数据管理专家组成的团队。这些提供商了解处理特定业务需求的不结构化数据的细微差别，清理和提取信息，以及与各种系统和API集成，有效地解决可能压倒内部团队的挑战。
- en: 'Focus on core business: Outsourcing data governance allows organizations to
    focus on their core business operations rather than diverting resources to build
    and manage a complex AI system. This frees up internal teams to concentrate on
    their primary responsibilities, potentially leading to net increased efficiency
    and productivity.'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于核心业务：外包数据治理使组织能够专注于核心业务运营，而不是将资源用于构建和管理复杂的AI系统。这使内部团队能够专注于其主要职责，可能带来净效率和生产力的提升。
- en: 'Potential cost savings: Building an in-house solution can involve significant
    upfront investment in infrastructure, talent acquisition, and ongoing maintenance.
    All-in-one solutions offer a potentially more cost-effective alternative, particularly
    for organizations with limited resources or those seeking to avoid long-term capital
    expenditures.'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 成本节约潜力：构建内部解决方案可能涉及在基础设施、人才获取和持续维护方面的重大前期投资。一站式解决方案提供了一种可能更具成本效益的替代方案，尤其是对于资源有限或寻求避免长期资本支出的组织。
- en: 'Faster time-to-value: All-in-one solutions provide a pre-built, customizable
    solution that can be deployed relatively quickly. This allows organizations to
    realize the benefits of AI- driven data governance much sooner than if they were
    to embark on a lengthy in-house development process.'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 更快的价值实现时间：一站式解决方案提供了一种预构建的可定制解决方案，可以相对快速地部署。这使得组织能够比进行漫长的内部开发过程更早地实现AI驱动数据治理的好处。
- en: Advantages of a DIY approach
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: DIY方法的优势
- en: 'Full customization: With a DIY solution, organizations have complete control
    over the system, from data processing workflows to specific features. This enables
    a highly customized solution that aligns perfectly with unique business needs,
    particularly for companies with specialized processes requiring tailored configurations.'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 完全定制化：使用DIY解决方案，组织可以完全控制系统，从数据处理工作流到特定功能。这可以实现高度定制化的解决方案，与独特的业务需求完美契合，尤其是对于需要定制配置的具有特定流程的公司。
- en: 'In-house expertise development: Building in-house cultivates deep technical
    expertise within the organization. Over time, this internal knowledge can lead
    to innovations and efficiencies that may not be achievable through external solutions.'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 内部专业知识发展：内部培养可以在组织内部培养深厚的专业技术。随着时间的推移，这种内部知识可以导致创新和效率的提升，这些可能通过外部解决方案无法实现。
- en: 'Greater control over data and security: For handling highly sensitive data,
    a DIY approach allows data to stay entirely in- house. This can facilitate specific
    security protocols, data privacy requirements, and direct oversight of compliance
    with industry standards.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 对数据和安全的更大控制：对于处理高度敏感数据，DIY方法允许数据完全保留在内部。这可以促进特定的安全协议、数据隐私要求以及对行业标准的直接监督。
- en: 'Potential for long-term cost efficiency: While requiring significant upfront
    investment, a DIY approach can be more cost-effective in the long run for organizations
    with stable data processing needs. This approach can eliminate recurring fees
    associated with subscription- based platforms and give the organization control
    over budget allocation for updates and expansions.'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 长期成本效益潜力：虽然需要大量的前期投资，但对于具有稳定数据处理需求的组织来说，DIY方法在长期可能更具成本效益。这种方法可以消除与基于订阅的平台相关的重复费用，并使组织能够控制更新和扩展的预算分配。
- en: 'Flexibility in vendor and tool selection: A DIY approach allows organizations
    to choose the best individual tools, vendors, and technology components for their
    needs, rather than being limited to the tech stack of an all-in- one solution.'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 供应商和工具选择的灵活性：DIY方法允许组织根据其需求选择最佳的单个工具、供应商和技术组件，而不是局限于一站式解决方案的技术堆栈。
- en: Who should consider each approach?
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 谁应该考虑每种方法？
- en: 'All-in-one solution: Ideal for organizations that are:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 一站式解决方案：适用于以下组织：
- en: Prioritizing speed to market.
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优先考虑快速上市。
- en: Lacking extensive AI and data processing expertise.
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏广泛的AI和数据处理专业知识。
- en: Preferring to focus resources on core business functions rather than in-house
    development.
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 倾向于将资源集中在核心业务功能上，而不是内部开发。
- en: An all-in- one solution is particularly beneficial for companies that need scalable,
    secure automation quickly without committing significant capital or time to development.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 一站式解决方案对于需要快速实现可扩展、安全自动化的公司特别有益，而无需投入大量资本或时间进行开发。
- en: 'DIY solution: Suitable for organizations with:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: DIY解决方案：适用于以下组织：
- en: Specialized requirements that pre-built solutions may not meet.
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预建解决方案可能无法满足的特定需求。
- en: Robust internal AI and data engineering teams capable of managing continuous
    system updates.
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够管理持续系统更新的强大内部AI和数据工程团队。
- en: Companies seeking full customization and control over their data governance
    infrastructure may find a DIY solution preferable, despite the associated resource
    demands.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求对其数据治理基础设施进行完全定制和控制的公司可能会发现DIY解决方案更可取，尽管这需要相关的资源需求。
- en: '![](img/2.png)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/2.png)'
- en: A point for tech leaders to think carefully about is whether to manage their
    own infrastructure or rely on SaaS solutions. Many realize that SaaS is just fine
    as long as it meets compliance and security standards. It’s also about thinking
    strategically. How do you invest your resources in resolving technical debt? It
    ties back to data governance — how is data shared across departments like finance,
    sales, or HR?
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 技术领导者需要仔细思考的一个问题是，是管理自己的基础设施还是依赖SaaS解决方案。许多人意识到，只要满足合规性和安全标准，SaaS就足够好了。这也关乎战略思考。你是如何投资资源来解决技术债务的？这与数据治理相关——数据是如何在财务、销售或人力资源等部门之间共享的？
- en: Often, this is handled manually, but thinking more programmatically and having
    APIs in place, supported by a strong data pipeline and ontology, is crucial.”
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这需要手动处理，但更程序化地思考并拥有API，由强大的数据管道和本体论支持，这是至关重要的。”
- en: -- Tobalo Torres
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: -- Tobalo Torres
- en: Key takeaway
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: While building an AI data governance solution in-house can be appealing to some
    organizations, the technical complexities, resource requirements, and need for
    constant adaptation to evolving technology can present significant challenges.
    Each organization should conduct a cost-benefit analysis to determine which path
    better suits its needs, keeping in mind that all-in-one solutions offer a streamlined,
    expert-led alternative for rapid implementation and growth.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然对于一些组织来说，在内部构建AI数据治理解决方案可能很有吸引力，但技术复杂性、资源需求以及对不断发展的技术的持续适应需求可能带来重大挑战。每个组织都应该进行成本效益分析，以确定哪条路径更适合其需求，同时考虑到一站式解决方案提供了一个快速实施和增长的专家引领的替代方案。
- en: Conclusions
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The challenges of unstructured data — often termed “data chaos” — are increasingly
    significant as organizations aim to fully leverage AI-driven transformation. In
    fields as varied as property preservation, finance, healthcare, and government,
    managing unstructured documents like PDFs, emails, and images has historically
    involved intensive manual processing, resulting in inefficiencies, high costs,
    and, ultimately, a roadblock to true digital transformation.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 非结构化数据（通常称为“数据混乱”）的挑战随着组织旨在充分利用AI驱动的转型而日益显著。在房地产保护、金融、医疗保健和政府等各个领域，管理PDF、电子邮件和图像等非结构化文档的传统做法涉及密集的手动处理，导致效率低下、成本高昂，并最终成为真正的数字化转型道路上的障碍。
- en: Lucidis’s work with Black Dome Property Services showcases the transformative
    power of AI-driven automation. By applying optical character recognition, machine
    vision, and NLP within a scalable, cloud-agnostic architecture, Lucidis achieved
    measurable improvements in operational efficiency and cost savings. Black Dome
    realized an 80% reduction in work order processing time, an 80% net cost saving,
    and a leap to 100% data accuracy—outcomes that allowed the company to eliminate
    outsourcing and better utilize its internal resources, ensuring their downstream
    data management applications and AI systems can operate at peak efficiency.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: Lucidis与Black Dome Property Services的合作展示了由人工智能驱动的自动化的变革力量。通过在可扩展、云无关的架构中应用光学字符识别、机器视觉和自然语言处理，Lucidis实现了运营效率的提升和成本的节约。Black
    Dome实现了工作订单处理时间减少80%，净成本节约80%，以及数据准确率达到100%——这些成果使公司能够消除外包，更好地利用其内部资源，确保其下游数据管理应用和人工智能系统能够以最高效的方式运行。
- en: Key takeaways for tech leaders
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 技术领导者的关键要点
- en: 'Data is a strategic asset: The value of data lies not only in its quantity
    but in its quality and usability. Clean, structured data is essential for any
    successful AI application.'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是战略资产：数据的价值不仅在于其数量，还在于其质量和可用性。干净、结构化的数据对于任何成功的AI应用都是必不可少的。
- en: Leaders should prioritize investments in data quality and structure as fundamental
    to AI initiatives, recognizing that this foundation impacts every downstream application,
    from analytics to decision-making.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 领导者应优先考虑对数据质量和结构进行投资，将其视为AI项目的根本，认识到这一基础影响从分析到决策的每个下游应用。
- en: 'Scalable, cloud-agnostic solutions empower future growth: As Lucidis demonstrates,
    a cloud-agnostic, modular approach enables companies to scale seamlessly, handling
    increasing data volumes without sacrificing performance or security.'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 可扩展、云无关的解决方案推动未来增长：正如Lucidis所展示的，云无关、模块化的方法使公司能够无缝扩展，处理不断增长的数据量，而不会牺牲性能或安全性。
- en: For tech leaders, this translates to future- proofing their infrastructure and
    ensuring flexibility across different cloud environments or on-premises deployments.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 对于技术领导者来说，这意味着确保其基础设施具有前瞻性，并在不同的云环境或本地部署中保持灵活性。
- en: 'Automating the basics allows focus on strategic initiatives: By automating
    routine data processing tasks, companies can shift their workforce focus from
    repetitive tasks to value-added activities, such as decision- making and strategy.
    This creates a more fulfilling employee experience and builds a foundation for
    faster, data-driven growth.'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化基础工作，以便专注于战略举措：通过自动化常规数据处理任务，公司可以将工作重点从重复性任务转移到增值活动，如决策和战略。这创造了一个更令人满意的员工体验，并为更快、数据驱动的增长奠定了基础。
- en: 'Cross-industry potential for AI in document processing: Although Lucidis’s
    initial application was in property preservation, its approach has broad applicability
    across industries. For organizations facing the inefficiencies of unstructured
    data, Lucidis’s model illustrates how AI can drive measurable improvements in
    accuracy, compliance, and speed.'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在文档处理中的跨行业潜力：尽管Lucidis最初的用途在于财产保护，但其方法在各个行业中具有广泛的应用性。对于面临非结构化数据低效性的组织，Lucidis的模型展示了人工智能如何推动准确度、合规性和速度方面的可衡量改进。
- en: Closing thoughts
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 结束语
- en: For organizations navigating today’s digital landscape, data chaos is not just
    an operational hurdle—it’s a competitive disadvantage. Lucidis’s approach and
    results underscore the message that companies who invest in cleaning, structuring,
    and automating data processing can realize the full potential of AI. In a world
    where clean data powers clean AI, tech leaders must look beyond short-term fixes
    to lay a robust foundation for intelligent, scalable, and resilient data management.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 对于在当今数字景观中航行的组织，数据混乱不仅是一个运营障碍，还是一个竞争劣势。Lucidis的方法和成果强调了这样一个信息：投资于数据清理、结构化和自动化数据处理的公司可以实现AI的完整潜力。在一个干净数据驱动干净AI的世界里，技术领导者必须超越短期解决方案，为智能、可扩展和弹性的数据管理奠定坚实的基础。
- en: '![](img/2.png)'
  id: totrans-332
  prefs: []
  type: TYPE_IMG
  zh: '![](img/2.png)'
- en: Tech leaders today can’t afford to be disconnected from these issues. It’s 2025,
    and we’re deep in the information age. There’s no excuse for not having a data-oriented
    mindset across the organization.”
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的科技领导者不能脱离这些问题。现在是2025年，我们正处于信息时代。在整个组织中没有理由没有数据导向的思维。”
- en: --Tobalo Torres
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: --Tobalo Torres
