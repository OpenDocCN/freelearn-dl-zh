- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Recommendations to Start Your First IoT Project
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始您的第一个物联网项目的建议
- en: Hello and welcome to [*Chapter 7*](B22002_07.xhtml#_idTextAnchor210)!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你好，欢迎来到[*第7章*](B22002_07.xhtml#_idTextAnchor210)!
- en: In the last chapter, we covered the introduction of AI and ChatGPT prompt frameworks,
    along with pragmatic skills and tips to apply ChatGPT during the IoT innovation
    journey. With these tools, you have what it takes to bring your innovative ideas
    to life. Congratulations! You are now ready and eager to embark on your first
    IoT project. This chapter aims to provide practical recommendations to navigate
    the initial steps of your project smoothly and to help you sidestep potential
    frustrations.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们介绍了人工智能和ChatGPT提示框架的介绍，以及在实际的物联网创新旅程中应用ChatGPT的实用技巧和提示。有了这些工具，您就有能力将您的创新想法变为现实。恭喜！您现在已准备好并渴望开始您的第一个物联网项目。本章旨在提供实用的建议，以帮助您顺利地完成项目的初步步骤，并帮助您避免潜在的挫败感。
- en: 'In this chapter, we’ll cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: '**Thinking big and starting small**: Embrace your grand ideas for IoT innovation
    with excitement, but break down your project into small, manageable, and granular
    phases. This way, you can keep your passion going and positively learn as you
    progress, without getting overwhelmed by your big plan right from the beginning.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大胆设想，从小处着手**：以兴奋的心情拥抱您的物联网创新大想法，但将您的项目分解为小、可管理、细致的阶段。这样，您可以在前进的过程中保持热情，并积极学习，而不会从一开始就被您的宏伟计划所压倒。'
- en: '**Reaching out for the low-hanging fruits first**: Some projects may have less
    complexity, while others can be more demanding. As a beginner, it is smart to
    begin with simpler tasks for your first attempt. This will allow you to gradually
    build your knowledge and skills before taking on more challenging projects.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**先摘取低垂的果实**：有些项目可能较为简单，而有些则可能更具挑战性。作为一名初学者，从简单的任务开始您的第一次尝试是明智的。这将使您能够逐步建立知识和技能，然后再承担更具挑战性的项目。'
- en: Technical requirements
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The following are the most well-recognized, user-friendly, and affordable starter
    kits for beginners entering the world of IoT with minimal investment:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是最受认可、用户友好且价格合理的入门级套件，适合那些以最低投资进入物联网世界的初学者：
- en: Microsoft Visual Studio Code with the PlatformIO extension
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有PlatformIO扩展的Microsoft Visual Studio Code
- en: ChatGPT
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT
- en: ESP32 MCU
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ESP32微控制器
- en: Arduino-compatible sensors
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 兼容Arduino的传感器
- en: AWS Free Tier cloud services
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AWS免费层云服务
- en: Thinking big and starting small
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 大胆设想，从小处着手
- en: Imagine you are very excited about creating a smart irrigation solution with
    a soil moisture measurement sensor, a wildfire sentry solution with a flame/smoke
    detection sensor, a river/lake pollution monitoring system with a water quality
    measurement sensor, a CO2 emission warning system on top of a chimney with an
    air quality measurement sensor, a roof safety monitoring system with a vibration
    and tilt sensor, an alert system with ultrasound and body **PIR** (**Passive Infrared**)
    sensors when people are approaching a hazardous zone, a water leakage report solution
    in a restroom through a water drop sensor, or even a mouse trap connected to the
    cloud to trigger an alarm on your mobile phone. Those grand ideas are motivating
    you to roll up your sleeves and develop an IoT innovation from scratch, moving
    to a fully functional solution as swiftly as possible.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，您非常兴奋地想要创建一个智能灌溉解决方案，使用土壤湿度测量传感器；一个野火哨兵解决方案，使用火焰/烟雾检测传感器；一个河流/湖泊污染监控系统，使用水质测量传感器；一个在烟囱上安装的CO2排放预警系统，使用空气质量测量传感器；一个屋顶安全监控系统，使用振动和倾斜传感器；一个超声波和身体**PIR**（**被动红外**）传感器接近危险区域时的警报系统；一个通过水滴传感器在洗手间报告水泄漏的解决方案；甚至是一个连接到云端的鼠标夹，以在您的手机上触发警报。这些宏伟的想法激励您卷起袖子，从头开始开发物联网创新，尽可能快地过渡到一个完全功能化的解决方案。
- en: Thinking bigger is always encouraged by any means. By thinking bigger, we unleash
    our potential to dream beyond what seems possible and envision a future that is
    bold and inspiring. It pushes us to explore new ideas, embrace innovation, and
    strive for excellence. However, when it comes to practical aspects, it’s ideal
    to switch to a different approach to ensure the holistic development of your project.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 以任何方式鼓励大胆思考。通过大胆思考，我们释放了超越看似可能的梦想的潜力，并展望一个大胆而鼓舞人心的未来。它推动我们探索新想法，拥抱创新，并追求卓越。然而，在实践方面，理想的做法是切换到不同的方法，以确保项目的全面发展。
- en: As we discussed in previous chapters, a fully functional IoT solution usually
    includes end devices for indoor or outdoor use, wireless connectivity within a
    residential room or across a wide area in a city or rural setting, and data processing
    on a cloud platform that is customized to meet different customer needs. Building
    such a solution from day one is undoubtedly a challenging task.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在前面的章节中讨论的那样，一个完整的物联网解决方案通常包括室内或室外使用的终端设备，住宅房间内的无线连接或在城市或农村地区的广泛区域内的无线连接，以及针对不同客户需求定制的云平台上的数据处理。从第一天开始构建这样的解决方案无疑是一项具有挑战性的任务。
- en: Starting small is an advocated practical strategy in this context. It involves
    breaking down the final deliverable into smaller and gradual phases. By taking
    practical steps and gradually building knowledge, we can accumulate valuable experience
    along the way. This approach allows us to make progress, learn from our mistakes,
    and adjust our course of action as necessary.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，**从小开始**是一种提倡的实用策略。它涉及将最终交付成果分解成更小、更渐进的阶段。通过采取实际步骤并逐步积累知识，我们可以在旅途中积累宝贵的经验。这种方法使我们能够取得进步，从错误中学习，并在必要时调整我们的行动方案。
- en: For instance, if you are planning to invent a wildfire sentry solution, the
    fully functional solution includes an outdoor device equipped with flame/smoke
    sensors and a long-range wireless backhaul. This solution is targeted for deployment
    in rural areas such as forests or farm fields. The top requirement for such a
    device is low power consumption. For example, it should be able to operate for
    at least one year using four AA batteries. Additionally, you must consider the
    availability of wireless coverage in those areas. Usually, NB-IOT, LTE-M, or LoRaWAN
    are suitable options.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你计划发明一种野火哨兵解决方案，完整的解决方案包括一个配备火焰/烟雾传感器的户外设备以及长距离无线回程。这种解决方案旨在部署在森林或农田等农村地区。此类设备的首要要求是低功耗。例如，它应该能够使用四节AA电池至少运行一年。此外，你必须考虑这些地区的无线覆盖情况。通常，NB-IOT、LTE-M或LoRaWAN是合适的选择。
- en: By adhering to the *start small* philosophy, during the initial concept validation
    phase, you can begin with an ESP32 with some Arduino-compatible sensors. You can
    use its built-in Wi-Fi function to access your home Wi-Fi, allowing you to test
    your idea through rapid prototyping. If the idea works, you can progress to the
    next step and switch to an ESP32 module with an NB-IOT/LTE-M radio or LoRaWAN
    radio. This will allow you to evaluate their power consumption and set the stage
    for further development based on real-world performance.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 通过坚持**从小开始**的哲学，在初始的概念验证阶段，你可以从带有一些Arduino兼容传感器的ESP32开始。你可以使用其内置的Wi-Fi功能来访问你的家庭Wi-Fi，这样你就可以通过快速原型设计来测试你的想法。如果这个想法可行，你可以进入下一步，并切换到带有NB-IOT/LTE-M或LoRaWAN无线电的ESP32模块。这将使你能够评估它们的功耗，并为基于实际性能的进一步开发奠定基础。
- en: Applying a *think big and start small* philosophy means setting grand visions
    while also focusing on achievable beginnings. This sets a solid foundation for
    larger goals, leading to a *reach out for the low-hanging fruits first* strategy.
    By capitalizing on easy opportunities, we gain quick wins and momentum, enabling
    us to tackle more complex challenges and turn our big thinking into actionable
    paths.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 应用**大处着眼，小处着手**的哲学意味着在设定宏伟愿景的同时，也关注可实现的开端。这为更大的目标奠定了坚实的基础，并导致**首先争取低垂的果实**的策略。通过利用简单的机会，我们获得快速胜利和动力，使我们能够应对更复杂的挑战，并将我们的宏大思考转化为可行的路径。
- en: Reaching out for the low-hanging fruits first
  id: totrans-22
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 首先争取低垂的果实
- en: The complexity of IoT projects varies widely, from those that demand minimal
    effort to those demanding domain expertise. For beginners, it is advisable to
    initially focus on simpler tasks. This strategy enables a gradual enhancement
    of your knowledge and skills, laying a solid foundation that prepares you to tackle
    more complex projects in the future.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 物联网项目的复杂度差异很大，从那些需要最少努力的项目到那些需要领域专业知识的项目。对于初学者来说，最初专注于简单的任务是明智的。这种策略能够逐步提高你的知识和技能，为你未来处理更复杂的项目打下坚实的基础。
- en: The following table presents the focus of projects at different complexity levels.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 下表展示了不同复杂度级别项目的重点。
- en: '| **Project** **complexity****level** | **Entry (****beginner-friendly)** |
    **Medium (****experienced player)** | **Advanced (****domain expertise)** |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| **项目** **复杂度** | **入门（**适合初学者**） | **中等（**经验玩家**） | **高级（**领域专业知识**） |'
- en: '| --- | --- | --- | --- |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| **Service** **availibility** | Tolerate occasional errors and temporary service
    interruptions without significant consequences | Utilize re-transmission mechanisms
    at the application layer if there are errors, and ensure data integrity with checksums
    or hashes | Employ advanced error correction technologies, ensure high availability
    and fault tolerance, and establish stringent SLAs to handle critical data with
    minimal downtime |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| **服务可用性** | 能够容忍偶尔的错误和短暂的服务中断，不会造成重大后果 | 如果有错误，则在应用层使用重传机制，并使用校验和或散列确保数据完整性
    | 采用高级错误纠正技术，确保高可用性和容错性，并建立严格的SLA（服务等级协议）以处理关键数据，最小化停机时间 |'
- en: '| **Deployment** **environment** | Residential (indoor) | Campus or commercial
    buildings (indoor and outdoor) and controlled environments | Varied environments,
    including cities, rural areas, farms, forests, and frontiers with exposure to
    harsh weather and conditions, requiring ruggedized equipment |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| **部署环境** | 居住区（室内） | 校园或商业建筑（室内和室外）及受控环境 | 多样化的环境，包括城市、农村地区、农场、森林和恶劣天气及条件下的边境地区，需要坚固耐用的设备
    |'
- en: '| **End-device** **physics** | Consumer grade | Commercial grade, designed
    for sustained use and moderate environmental variation | Industrial grade, built
    to withstand extreme temperatures, moisture, UV rays from the sun, and strong
    gusts |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| **终端设备物理特性** | 消费级 | 商业级，设计用于持续使用和适度的环境变化 | 工业级，设计用于承受极端温度、湿度、太阳紫外线和强烈的风
    |'
- en: '| **Wireless connectivity** **options** | Home Wi-Fi or BLE hub | Enterprise
    Wi-Fi and LoRaWAN, offering greater coverage and penetration through obstacles
    | NB-IoT, LTE-M, or LoRaWAN, optimized for long-range communication, penetration,
    and power efficiency |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| **无线连接选项** | 家庭Wi-Fi或BLE集线器 | 企业Wi-Fi和LoRaWAN，提供更大的覆盖范围和穿透力 | NB-IoT、LTE-M或LoRaWAN，优化用于长距离通信、穿透力和电力效率
    |'
- en: '| **End-device** **roaming** | Fixed on a wall or ceiling | Fixed or local
    area roaming (allows a service continuity at local area) | Fixed or wide area
    roaming (demands seamless connectivity) |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| **终端设备漫游** | 固定在墙壁或天花板上 | 固定或本地区域漫游（允许本地区域的服务连续性） | 固定或广域漫游（需要无缝连接） |'
- en: '| **End-device** **power supply** | External source | Batteries or an external
    source, with a focus on energy efficiency | Batteries or renewable energy sources
    such as solar panels, prioritizing self-sufficiency and sustainability, potentially
    coupled with energy-harvesting technologies |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| **终端设备电源** | 外部电源 | 电池或外部电源，注重能源效率 | 电池或可再生能源，如太阳能板，优先考虑自给自足和可持续性，可能结合能量收集技术
    |'
- en: '| **Data communication with** **the cloud** | Primarily upstream, rarely receiving
    data from the cloud | Bidirectional communication, downstream for unicast, and
    supporting command and control | Robust bidirectional communication, downstream
    for broadcast or multicast, supporting complex interactions such as **OTA** (**Over
    The Air**) updates, remote diagnostics, and control |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| **与云的数据通信** | 主要为上行，很少从云接收数据 | 双向通信，下行用于单播，支持命令和控制 | 强健的双向通信，下行用于广播或多播，支持如**OTA**（空中传输）更新、远程诊断和控制等复杂交互
    |'
- en: '| **Mobile device** **involvement** | SMS or email notification | SMS or email
    notification | Comprehensive mobile app integration for real-time monitoring and
    control, with support for notifications, automation rules, and user customization
    |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| **移动设备参与** | 短信或电子邮件通知 | 短信或电子邮件通知 | 完整的移动应用程序集成，用于实时监控和控制，支持通知、自动化规则和用户自定义
    |'
- en: '| **Application** **examples** | Indoor temperature and humidity monitor, air
    quality monitor, connected mouse traps, smart lighting, smart doorbells, smart
    cameras, smoke detectors, and so on | Smart parking, smart lighting, smart cameras,
    asset tracking, facility security monitoring, HVAC automation, water leakage,
    smart irrigation, smoke detectors, and so on | Water and gas metering, street
    lighting, noise detection, waste collection, fleet, agriculture, natural disaster
    forecast, wildfire alerting, water and air quality monitoring, soil moisture measurement,
    asset tracking, wild animal tracking, and so on |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| **应用示例** | 室内温度和湿度监测器、空气质量监测器、连接式捕鼠器、智能照明、智能门铃、智能摄像头、烟雾探测器等 | 智能停车、智能照明、智能摄像头、资产追踪、设施安全监控、HVAC自动化、水泄漏、智能灌溉、烟雾探测器等
    | 水和燃气计量、街道照明、噪声检测、垃圾收集、车队、农业、自然灾害预报、野火警报、水和空气质量监测、土壤湿度测量、资产追踪、野生动物追踪等 |'
- en: In this section, we provided a structured overview of the different complexities
    of IoT projects. This will help you assess and choose projects that match your
    current expertise level. Starting with beginner-friendly projects can help solidify
    your foundational knowledge and build confidence. It also prepares you for gradual
    advancement into more sophisticated applications. Use this guide to strategically
    plan your IoT learning journey, making sure that each step is meaningful and contributes
    to your overall mastery of the field.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们提供了一个关于物联网（IoT）项目不同复杂性的结构化概述。这将帮助您评估和选择与您当前专业知识水平相匹配的项目。从适合初学者的项目开始可以帮助巩固您的基础知识并建立信心。它还为您逐渐过渡到更复杂的应用做好准备。使用本指南战略性地规划您的物联网（IoT）学习之旅，确保每一步都富有意义，并为您对这一领域的整体掌握做出贡献。
- en: Summary
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we covered the *think big and start small* philosophy, highlighting
    the importance of making progress step by step in the large and complex world
    of IoT. You’ve learned the value of being patient and the strategic method of
    starting with easy tasks – beginning with projects that align with your growing
    skills to establish a strong base of knowledge and experience.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了“大处着眼，小处着手”的哲学，强调了在庞大而复杂的物联网（IoT）世界中逐步取得进步的重要性。您已经学到了耐心的重要性以及从简单任务开始的战略方法——从与您不断增长技能相匹配的项目开始，建立坚实的知识和经验基础。
- en: In the next chapter, you will find a collection of project samples that are
    designed for beginners and carefully selected to enhance your learning and inspire
    your creativity. These projects serve as stepping stones, putting into practice
    the principles we have discussed and giving you the opportunity to bring your
    ideas to life. With a solid foundation, it’s time to get hands-on and dive into
    the practical experience that will transform your understanding of IoT.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，您将找到一系列为初学者设计的项目样本，这些样本经过精心挑选，旨在增强您的学习并激发您的创造力。这些项目作为垫脚石，将我们讨论的原则付诸实践，并为您提供将想法变为现实的机会。有了坚实的基础，现在是时候动手实践，深入体验将改变您对物联网（IoT）理解的实际经验。
