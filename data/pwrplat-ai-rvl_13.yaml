- en: '13'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: Publishing a Generative AI-based Bot
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 发布基于生成式 AI 的机器人
- en: In the previous chapter, you were able to build a chatbot (or **copilot**, in
    the new vernacular) that leveraged two different generative AI features—sending
    data to ChatGPT to evaluate and loading documents in Dataverse for Generative
    Answers to reason over.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，您能够构建一个聊天机器人（或在新术语中称为 **copilot**），该机器人利用了两个不同的生成式 AI 功能——将数据发送到 ChatGPT
    进行评估，以及在 Dataverse 中加载文档以进行生成式答案推理。
- en: In this final chapter, we’ll walk through the necessary steps to publish the
    chatbot and make it available so people can start asking questions.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的最后，我们将介绍发布聊天机器人的必要步骤，使其可供人们提问。
- en: With any further ado, let’s get going!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 不再拖延，让我们开始吧！
- en: Publishing a bot to Teams
  id: totrans-5
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 Teams 上发布机器人
- en: Publishing a bot is going through the steps to make it available to users. Microsoft
    uses the term **channels** to describe the services, apps, or destinations where
    your bot will be published.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 发布机器人是经历一系列步骤使其可供用户使用的过程。微软使用“频道”一词来描述机器人将发布的服务的、应用或目的地。
- en: Depending on the type of bot you’ve created, you may want to publish it to Microsoft
    Teams, a public website, Facebook, or other services. The ability to publish bots
    to different locations will depend on its authentication settings.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您创建的机器人类型，您可能希望将其发布到 Microsoft Teams、公共网站、Facebook 或其他服务。将机器人发布到不同位置的能力将取决于其身份验证设置。
- en: In this example, we’re going to make the bot available to Microsoft Teams users.
    By default, your bot is configured for Teams and Power Apps authentication, so
    it makes sense to start here.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在本例中，我们将使机器人可供 Microsoft Teams 用户使用。默认情况下，您的机器人已配置为 Teams 和 Power Apps 身份验证，因此从这里开始是有意义的。
- en: '![Figure 13.1 – Viewing the bot’s authentication configuration](img/B21234_13_01.jpg)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.1 – 查看机器人的身份验证配置](img/B21234_13_01.jpg)'
- en: Figure 13.1 – Viewing the bot’s authentication configuration
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.1 – 查看机器人的身份验证配置
- en: Publishing the bot
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发布机器人
- en: 'To publish the bot to Teams, you can simply follow these steps:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 要将机器人发布到 Teams，您可以简单地遵循以下步骤：
- en: Navigate to Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com))
    and select your bot.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com))
    并选择您的机器人。
- en: In the navigation menu, expand **Settings** and select **Channels**.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在导航菜单中，展开 **设置** 并选择 **频道**。
- en: '![Figure 13.2 – Viewing the Channels page](img/B21234_13_02.jpg)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.2 – 查看频道页面](img/B21234_13_02.jpg)'
- en: Figure 13.2 – Viewing the Channels page
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.2 – 查看频道页面
- en: Select **Microsoft Teams**.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **Microsoft Teams**。
- en: On the **Microsoft Teams** flyout, at the bottom of the page, click **Turn**
    **on Teams**.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **Microsoft Teams** 快捷菜单中，在页面底部点击 **打开** **Teams**。
- en: '![Figure 13.3 – Enabling the copilot for Teams](img/B21234_13_03.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.3 – 启用 Teams 的 Copilot](img/B21234_13_03.jpg)'
- en: Figure 13.3 – Enabling the copilot for Teams
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.3 – 启用 Teams 的 Copilot
- en: Confirm that it has been enabled.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确认它已被启用。
- en: '![Figure 13.4 – Confirming that Teams integration has been enabled](img/B21234_13_04.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.4 – 确认已启用 Teams 集成](img/B21234_13_04.jpg)'
- en: Figure 13.4 – Confirming that Teams integration has been enabled
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.4 – 确认已启用 Teams 集成
- en: If desired, you can click **Edit details** to change the display characteristics
    of your bot, including the icon, icon color, descriptions, and whether this bot
    can be added to a team (or whether it’s just a bot along the left rail). When
    you’re done updating the settings, click **Save**.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要，您可以点击 **编辑详情** 来更改机器人的显示特性，包括图标、图标颜色、描述以及此机器人是否可以添加到团队（或者它是否只是沿着左侧轨道的机器人）。完成设置更新后，点击
    **保存**。
- en: '![Figure 13.5 – Configuring additional bot settings](img/B21234_13_05.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.5 – 配置额外的机器人设置](img/B21234_13_05.jpg)'
- en: Figure 13.5 – Configuring additional bot settings
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.5 – 配置额外的机器人设置
- en: Select **Availability options**.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **可用性选项**。
- en: Under **Show in Teams app store**, you can select **Show to my teammates and
    shared users** to make it available to your peers, or you can click **Show to
    everyone in my org**. The **Show to everyone in my org** option will generate
    a custom app request in the Teams admin center (which will need to be approved
    by an administrator).
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **在 Teams 应用商店中显示** 下，您可以选择 **显示给我的队友和共享用户** 以使其对您的同事可用，或者您可以点击 **显示给我的组织中的所有人**。选择
    **显示给我的组织中的所有人** 选项将在 Teams 管理中心生成一个自定义应用请求（需要管理员批准）。
- en: '![Figure 13.6 – Sharing the bot](img/B21234_13_06.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.6 – 分享机器人](img/B21234_13_06.jpg)'
- en: Figure 13.6 – Sharing the bot
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.6 – 分享机器人
- en: Click **Show to everyone in my org**. Then, on the next page, click the **Submit
    for admin** **approval** button.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**向我组织中的所有人展示**。然后，在下一页上，点击**提交给管理员** **审批**按钮。
- en: Select **Publish** in the navigation menu.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在导航菜单中选择**发布**。
- en: If your bot wasn’t automatically published, click **Publish**.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您的机器人没有自动发布，请点击**发布**。
- en: '![Figure 13.7 – Starting the publishing process](img/B21234_13_07.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图13.7 – 开始发布过程](img/B21234_13_07.jpg)'
- en: Figure 13.7 – Starting the publishing process
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.7 – 开始发布过程
- en: When prompted to confirm, click **Publish**.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当提示确认时，点击**发布**。
- en: '![Figure 13.8 – Confirming the publishing action](img/B21234_13_08.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图13.8 – 确认发布操作](img/B21234_13_08.jpg)'
- en: Figure 13.8 – Confirming the publishing action
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.8 – 确认发布操作
- en: Next, we’ll take a look to see how our bot looks in Teams.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将查看我们的机器人在团队中的外观。
- en: Testing the bot
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试机器人
- en: 'In this section, you’ll get to see how your bot works inside Teams. Follow
    these steps:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将了解您的机器人在团队中的工作方式。按照以下步骤操作：
- en: From the **Channels** > **Microsoft Teams** flyout, select **Open bot**.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从**通道** > **Microsoft Teams** 快捷菜单中选择**打开机器人**。
- en: '![Figure 13.9 – Opening the bot in Teams](img/B21234_13_09.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图13.9 – 在团队中打开机器人](img/B21234_13_09.jpg)'
- en: Figure 13.9 – Opening the bot in Teams
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.9 – 在团队中打开机器人
- en: You can launch either the desktop or web version of Microsoft Teams.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您可以启动Microsoft Teams的桌面版或网页版。
- en: Once Teams has launched, you should be presented with your chatbot. Click **Add**.
    This will install your app into the left rail in Teams.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦团队启动，您应该会看到您的聊天机器人。点击**添加**。这将把您的应用安装到团队的左侧轨道中。
- en: '![Figure 13.10 – Adding your chatbot](img/B21234_13_10.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图13.10 – 添加您的聊天机器人](img/B21234_13_10.jpg)'
- en: Figure 13.10 – Adding your chatbot
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.10 – 添加您的聊天机器人
- en: You can then ask it questions, just like when you were testing it previously.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您可以像之前测试时一样向它提问。
- en: '![Figure 13.11 – Asking the Teams bot questions](img/B21234_13_11.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图13.11 – 向团队机器人提问](img/B21234_13_11.jpg)'
- en: Figure 13.11 – Asking the Teams bot questions
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.11 – 向团队机器人提问
- en: Now that you’ve tested it out, it’s time to approve it and make it available
    organization-wide!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经测试过了，是时候批准它并使其在整个组织中可用！
- en: Approving the bot
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 批准机器人
- en: 'Approving the bot is a relatively simple exercise, though you will need administrative
    rights for Microsoft Teams. You can approve the bot following this quick process:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 批准机器人是一个相对简单的练习，尽管您需要Microsoft Teams的管理权限。您可以通过以下快速流程批准机器人：
- en: Navigate to the Microsoft Teams admin center ([https://admin.teams.microsoft.com](https://admin.teams.microsoft.com)).
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到Microsoft Teams管理中心([https://admin.teams.microsoft.com](https://admin.teams.microsoft.com))。
- en: In the navigation menu, expand **Teams apps** and select **Manage apps**.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在导航菜单中，展开**团队应用**并选择**管理应用**。
- en: '![Figure 13.12 – Managing the Teams App store](img/B21234_13_12.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图13.12 – 管理团队应用商店](img/B21234_13_12.jpg)'
- en: Figure 13.12 – Managing the Teams App store
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.12 – 管理团队应用商店
- en: Notice there is one custom app pending approval.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，有一个自定义应用正在等待审批。
- en: In the **Search by name** box, start typing the name of your bot. Notice that
    your bot app has a status of **Blocked**, as shown in *Figure 13**.13*.
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**按名称搜索**框中，开始输入您机器人的名称。注意，您的机器人应用的状态为**阻止**，如图*图13*.13所示。
- en: '![Figure 13.13 – Viewing the bot app’s status](img/B21234_13_13.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图13.13 – 查看机器人应用的状况](img/B21234_13_13.jpg)'
- en: Figure 13.13 – Viewing the bot app’s status
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.13 – 查看机器人应用的状况
- en: Click the **Name** of the app.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击应用的**名称**。
- en: Click **Publish** to make the app available in the Teams app store.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**发布**以使应用在团队应用商店中可用。
- en: '![Figure 13.14 – Publishing the bot app](img/B21234_13_14.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图13.14 – 发布机器人应用](img/B21234_13_14.jpg)'
- en: Figure 13.14 – Publishing the bot app
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.14 – 发布机器人应用
- en: When prompted to confirm, click **Publish**.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当提示确认时，点击**发布**。
- en: Other users in your Microsoft 365 organization can now go and look for the bot
    in the Teams app store!
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 您的Microsoft 365组织中的其他用户现在可以前往团队应用商店查找机器人！
- en: '![Figure 13.15 – Locating the bot in the Teams app store](img/B21234_13_15.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图13.15 – 在团队应用商店中定位机器人](img/B21234_13_15.jpg)'
- en: Figure 13.15 – Locating the bot in the Teams app store
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.15 – 在团队应用商店中定位机器人
- en: Next, we’ll look at publishing the bot to some other channels, such as a public
    website.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探讨将机器人发布到其他渠道，例如公共网站。
- en: Publishing a bot to a website
  id: totrans-72
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将机器人发布到网站
- en: Most of the time, you’ll create bots that target either internal or external
    users—since those categories of users have different needs.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数情况下，您会创建针对内部或外部用户的机器人——因为这两类用户有不同的需求。
- en: In this section, we’re going to switch the authentication method for the bot
    we just built so that it can be used on a public channel (such as a website or
    Facebook). In the real world, you’ll likely be building different bots for different
    scenarios.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将切换我们刚刚构建的机器人的身份验证方法，以便它可以在公共频道（如网站或Facebook）上使用。在现实世界中，您可能会为不同的场景构建不同的机器人。
- en: No website? No problem
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 没有网站？没问题
- en: If you don’t have a developmental website to work with—that’s okay! You can
    go to [https://www.wordpress.com](https://www.wordpress.com) and sign up for a
    free hosted website. We’ll be using a WordPress site in this example.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您没有开发网站可以工作——这没问题！您可以去 [https://www.wordpress.com](https://www.wordpress.com)
    并注册一个免费托管网站。在这个例子中，我们将使用WordPress网站。
- en: 'To publish the bot to a website, follow these steps:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 要将机器人发布到网站，请按照以下步骤操作：
- en: Navigate to Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com))
    and select your bot.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com))
    并选择您的机器人。
- en: Expand **Settings** and choose **Security**.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开设置并选择 **安全**。
- en: On the **Security** page, select **Authentication**.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **安全** 页面上，选择 **身份验证**。
- en: '![Figure 13.16 – Updating the security settings for the bot](img/B21234_13_16.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.16 – 更新机器人的安全设置](img/B21234_13_16.jpg)'
- en: Figure 13.16 – Updating the security settings for the bot
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.16 – 更新机器人的安全设置
- en: On the **Authentication** flyout, select **No authentication** and click **Save**.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **身份验证** 快捷菜单中，选择 **无身份验证** 并点击 **保存**。
- en: '![Figure 13.17 – Selecting No authentication](img/B21234_13_17.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.17 – 选择无身份验证](img/B21234_13_17.jpg)'
- en: Figure 13.17 – Selecting No authentication
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.17 – 选择无身份验证
- en: Review the **Save this configuration?** dialog box and click **Save**.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看保存此配置？对话框并点击 **保存**。
- en: '![Figure 13.18 – Reviewing the Save dialog box](img/B21234_13_18.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.18 – 查看保存对话框](img/B21234_13_18.jpg)'
- en: Figure 13.18 – Reviewing the Save dialog box
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.18 – 查看保存对话框
- en: Under **Settings**, click **Channels**. Note that the other channels are now
    unlocked.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **设置** 下，点击 **频道**。注意，其他频道现在已解锁。
- en: '![Figure 13.19 – Viewing available channels](img/B21234_13_19.jpg)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.19 – 查看可用频道](img/B21234_13_19.jpg)'
- en: Figure 13.19 – Viewing available channels
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.19 – 查看可用频道
- en: Select the **Custom** **website** channel.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **自定义** **网站** 频道。
- en: On the **Custom website** flyout, you should see a section labeled **Default
    embed code**. We’ll use this code on our site.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **自定义网站** 快捷菜单中，您应该看到一个标记为 **默认嵌入代码** 的部分。我们将在我们的网站上使用此代码。
- en: '![Figure 13.20 – Viewing the custom website code](img/B21234_13_20.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.20 – 查看自定义网站代码](img/B21234_13_20.jpg)'
- en: Figure 13.20 – Viewing the custom website code
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.20 – 查看自定义网站代码
- en: In a new browser window, navigate to your website’s administration interface.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在新浏览器窗口中，导航到您的网站管理界面。
- en: Create or edit a page.
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建或编辑一个页面。
- en: Next, you’ll need to get to the HTML or Text view of your site. If you’re using
    WordPress, you can do that by clicking the **Text** tab of the composition window,
    as shown in *Figure 13**.21*.
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，您需要进入您网站的HTML或文本视图。如果您使用的是WordPress，可以通过点击编辑窗口的 **文本** 标签来实现，如图 *图 13**.21*
    所示。
- en: '![Figure 13.21 – Switching to the text/HTML view](img/B21234_13_21.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.21 – 切换到文本/HTML视图](img/B21234_13_21.jpg)'
- en: Figure 13.21 – Switching to the text/HTML view
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.21 – 切换到文本/HTML视图
- en: 'Switch back to the browser tab that had the Copilot Studio custom website code.
    Copy the code and paste it into the HTML editor. Depending on your theme, you
    may need to edit the size parameters. For example, it may be useful to remove
    the `"style=width:100%; height: 100%"` tag so that you can see what the native
    display size is. See *Figure*.'
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '切换回包含Copilot Studio自定义网站代码的浏览器标签。复制代码并将其粘贴到HTML编辑器中。根据您的主题，您可能需要编辑大小参数。例如，删除
    `"style=width:100%; height: 100%"` 标签可能有助于您看到原始显示大小。见图。'
- en: '![Figure 13.22 – Updating the website code](img/B21234_13_22.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.22 – 更新网站代码](img/B21234_13_22.jpg)'
- en: Figure 13.22 – Updating the website code
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.22 – 更新网站代码
- en: Click **Publish** to publish the post or page on your site.
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **发布** 将帖子或页面发布到您的网站上。
- en: That’s it!
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 就这些了！
- en: Publishing a bot to Facebook
  id: totrans-106
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将机器人发布到Facebook
- en: Bots can also be an extension of your business on social media sites such as
    Facebook. In this example, we’ll publish a bot to respond to questions through
    Facebook Messenger.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人也可以是您在社交媒体网站（如Facebook）上业务的扩展。在这个例子中，我们将发布一个机器人通过Facebook Messenger回答问题。
- en: Get Facebooking!
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 开始Facebook之旅！
- en: In order to integrate with Facebook, you’ll need an existing Facebook business
    app. You’ll also need to register with Facebook Developer ([https://developers.facebook.com](https://developers.facebook.com)).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 为了与 Facebook 集成，您需要一个现有的 Facebook 商业应用。您还需要在 Facebook 开发者 ([https://developers.facebook.com](https://developers.facebook.com))
    上注册。
- en: 'To get started, follow these steps:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，请按照以下步骤操作：
- en: Navigate to Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com))
    and select your bot.
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com))
    并选择您的机器人。
- en: From the navigation pane, expand **Settings** and select **Channels**.
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从导航面板中展开 **设置** 并选择 **通道**。
- en: Select **Facebook**.
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **Facebook**。
- en: Notice the fields that appear on the **Facebook** flyout, including **Facebook
    app ID**, **Facebook app secret**, **Page ID**, and **Page** **access token**.
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注意在 **Facebook** 飞出窗口中出现的字段，包括 **Facebook 应用 ID**、**Facebook 应用密钥**、**页面 ID**
    和 **页面访问令牌**。
- en: '![Figure 13.23 – Viewing the Facebook settings flyout](img/B21234_13_23.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.23 – 查看Facebook 设置飞出窗口](img/B21234_13_23.jpg)'
- en: Figure 13.23 – Viewing the Facebook settings flyout
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.23 – 查看Facebook 设置飞出窗口
- en: Open a new browser tab. Navigate to [https://developers.facebook.com](https://developers.facebook.com)
    and sign in with the ID that manages your organization’s Facebook page or app.
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个新的浏览器标签页。导航到 [https://developers.facebook.com](https://developers.facebook.com)
    并使用管理您组织 Facebook 页面或应用的 ID 登录。
- en: From the navigation menu, select **My Apps**.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从导航菜单中选择 **我的应用**。
- en: '![Figure 13.24 – Logging in to the Facebook Developers site](img/B21234_13_24.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.24 – 登录 Facebook 开发者网站](img/B21234_13_24.jpg)'
- en: Figure 13.24 – Logging in to the Facebook Developers site
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.24 – 登录 Facebook 开发者网站
- en: Select your existing app or page.
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择您现有的应用或页面。
- en: '![Figure 13.25 – Selecting your Facebook page or app](img/B21234_13_25.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.25 – 选择您的 Facebook 页面或应用](img/B21234_13_25.jpg)'
- en: Figure 13.25 – Selecting your Facebook page or app
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.25 – 选择您的 Facebook 页面或应用
- en: Expand **App settings** and select **Basic**.
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开应用设置，并选择 **基本**。
- en: '![Figure 13.26 – Getting the Facebook security data](img/B21234_13_26.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.26 – 获取 Facebook 安全数据](img/B21234_13_26.jpg)'
- en: Figure 13.26 – Getting the Facebook security data
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.26 – 获取 Facebook 安全数据
- en: Copy the **App ID** and **App secret** values to the corresponding locations
    in the Copilot Studio Facebook channel setup.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 **App ID** 和 **App secret** 值复制到 Copilot Studio Facebook 通道设置中的相应位置。
- en: On the Facebook Developer settings page, select **Advanced**.
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Facebook 开发者设置页面，选择 **高级**。
- en: Enable the **Allow API access to app settings** toggle and click **Save changes**.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启用 **允许 API 访问应用设置** 切换，并点击 **保存更改**。
- en: '![Figure 13.27 – Enabling API access](img/B21234_13_27.jpg)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.27 – 启用 API 访问](img/B21234_13_27.jpg)'
- en: Figure 13.27 – Enabling API access
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.27 – 启用 API 访问
- en: Click **Dashboard**, and then select **Set up** for the **Messenger** app.
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **仪表板**，然后选择 **设置** 的 **Messenger** 应用。
- en: '![Figure 13.28 – Setting up the Messenger app](img/B21234_13_28.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.28 – 设置 Messenger 应用](img/B21234_13_28.jpg)'
- en: Figure 13.28 – Setting up the Messenger app
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.28 – 设置 Messenger 应用
- en: Depending on the current state of your Facebook property, you may need to set
    up a new page or connect an existing page. You’ll need this to generate an access
    token. In this case, we have an app and a page but need to connect them for Messenger,
    so we’ll click **Connect**.
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据您 Facebook 属性的当前状态，您可能需要设置一个新的页面或连接一个现有的页面。您将需要此信息来生成访问令牌。在这种情况下，我们有一个应用和一个页面，但需要将它们连接到
    Messenger，因此我们将点击 **连接**。
- en: '![Figure 13.29 – Connecting the bot app to a Facebook page](img/B21234_13_29.jpg)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.29 – 将机器人应用连接到 Facebook 页面](img/B21234_13_29.jpg)'
- en: Figure 13.29 – Connecting the bot app to a Facebook page
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.29 – 将机器人应用连接到 Facebook 页面
- en: Upon connecting, acknowledge the data access. Click **Continue**.
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 连接后，确认数据访问。点击 **继续**。
- en: '![Figure 13.30 – Acknowledging the data access confirmation](img/B21234_13_30.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.30 – 确认数据访问确认](img/B21234_13_30.jpg)'
- en: Figure 13.30 – Acknowledging the data access confirmation
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.30 – 确认数据访问确认
- en: Confirm which assets your bot will access. In this case, we’re just going to
    allow it to access the HR bot Facebook app.
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确认您的机器人将访问哪些资产。在这种情况下，我们只是允许它访问 HR 机器人 Facebook 应用。
- en: '![Figure 13.31 – Granting access](img/B21234_13_31.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.31 – 授予访问权限](img/B21234_13_31.jpg)'
- en: Figure 13.31 – Granting access
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.31 – 授予访问权限
- en: 'After the page is connected, you can generate an access token, as shown in
    *Figure 13**.32*:'
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 页面连接后，您可以生成一个访问令牌，如图 *图 13*.32* 所示：
- en: '![Figure 13.32 – Generating an access token](img/B21234_13_32.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.32 – 生成访问令牌](img/B21234_13_32.jpg)'
- en: Figure 13.32 – Generating an access token
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.32 – 生成访问令牌
- en: Click **I Understand** and then copy the token to the clipboard.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**我理解**，然后将令牌复制到剪贴板。
- en: '![Figure 13.33 – Acquiring the page access token](img/B21234_13_33.jpg)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.33 – 获取页面访问令牌](img/B21234_13_33.jpg)'
- en: Figure 13.33 – Acquiring the page access token
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.33 – 获取页面访问令牌
- en: Paste the access token into the **Page access token** field in Copilot Studio.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将访问令牌粘贴到Copilot Studio中的**页面访问令牌**字段。
- en: On the Facebook Developer page, click the **Page ID** value and paste it into
    the **Page ID** field in Copilot Studio.
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Facebook开发者页面上，点击**页面ID**值并将其粘贴到Copilot Studio中的**页面ID**字段。
- en: Click **Add** on the **Facebook** flyout in Copilot Studio to save the configuration
    and generate **Callback URL** and **Verify** **token** values.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Copilot Studio的**Facebook**飞出中点击**添加**以保存配置并生成**回调URL**和**验证**令牌值。
- en: '![Figure 13.34 – Configuring the Facebook flyout](img/B21234_13_34.jpg)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.34 – 配置Facebook飞出](img/B21234_13_34.jpg)'
- en: Figure 13.34 – Configuring the Facebook flyout
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.34 – 配置Facebook飞出
- en: Under **Configure webhooks**, click **Configure**.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**配置webhooks**下，点击**配置**。
- en: '![Figure 13.35 – Configuring a webhook](img/B21234_13_35.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.35 – 配置webhook](img/B21234_13_35.jpg)'
- en: Figure 13.35 – Configuring a webhook
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.35 – 配置webhook
- en: Copy the **Callback URL** and **Verify Token** parameters from the Copilot Studio
    **Facebook** flyout page to the appropriate fields, and click **Verify** **and
    save**.
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将Copilot Studio中**Facebook**飞出页面的**回调URL**和**验证令牌**参数复制到相应的字段，然后点击**验证**和**保存**。
- en: '![Figure 13.36 – Updating the webhook settings](img/B21234_13_36.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.36 – 更新webhook设置](img/B21234_13_36.jpg)'
- en: Figure 13.36 – Updating the webhook settings
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.36 – 更新webhook设置
- en: Click **Manage** next to the **Webhook** **Fields** field.
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Webhook Fields**字段旁边点击**管理**。
- en: '![Figure 13.37 – Managing webhooks](img/B21234_13_37.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.37 – 管理webhooks](img/B21234_13_37.jpg)'
- en: Figure 13.37 – Managing webhooks
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.37 – 管理webhooks
- en: In the `messages`
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`messages`
- en: '`messaging_postbacks`'
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`messaging_postbacks`'
- en: '`messaging_optins`'
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`messaging_optins`'
- en: '`message_deliveries`'
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`message_deliveries`'
- en: '![Figure 13.38 – Subscribing to webhooks](img/B21234_13_38.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.38 – 订阅webhooks](img/B21234_13_38.jpg)'
- en: Figure 13.38 – Subscribing to webhooks
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.38 – 订阅webhooks
- en: Click **X** to close the dialog box.
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**X**关闭对话框。
- en: Ensure the **Webhooks Fields** field has been updated.
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保已更新**Webhooks Fields**字段。
- en: '![Figure 13.39 – Confirming the webhook fields have been updated](img/B21234_13_39.jpg)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.39 – 确认webhook字段已更新](img/B21234_13_39.jpg)'
- en: Figure 13.39 – Confirming the webhook fields have been updated
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.39 – 确认webhook字段已更新
- en: After configuring these items, you’ll need to submit your bot app for review
    with Facebook by expanding **App Review** and clicking **Submit for Review**.
    If your business is not currently verified with Facebook, you’ll need to complete
    that by supplying supporting documentation. Facebook does this to ensure that
    APIs are not abused and adhere to responsible data protection practices.
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 配置这些项目后，您需要通过展开**App Review**并点击**提交审查**来将您的机器人应用程序提交给Facebook进行审查。如果您的业务尚未通过Facebook验证，您需要通过提供支持性文件来完成此操作。Facebook这样做是为了确保API不被滥用并遵守负责任的数据保护实践。
- en: '![Figure 13.40 – Submitting the bot for review with Facebook](img/B21234_13_40.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图 13.40 – 使用 Facebook 提交机器人进行审查](img/B21234_13_40.jpg)'
- en: Figure 13.40 – Submitting the bot for review with Facebook
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.40 – 使用 Facebook 提交机器人进行审查
- en: Once that is complete, your bot can begin answering questions through Facebook
    Messenger!
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 完成这些操作后，您的机器人可以通过Facebook Messenger开始回答问题！
- en: Publishing a bot to other endpoints
  id: totrans-178
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将机器人发布到其他端点
- en: In addition to integrating with popular social media and communications apps,
    you can also extend your conversation bot to other applications.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 除了与流行的社交媒体和通讯应用集成外，您还可以扩展您的对话机器人到其他应用。
- en: For more information on developing bot integrations and other pro-code solutions,
    see [https://learn.microsoft.com/en-us/microsoft-copilot-studio/publication-connect-bot-to-custom-application](https://learn.microsoft.com/en-us/microsoft-copilot-studio/publication-connect-bot-to-custom-application).
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 有关开发机器人集成和其他专业代码解决方案的更多信息，请参阅[https://learn.microsoft.com/en-us/microsoft-copilot-studio/publication-connect-bot-to-custom-application](https://learn.microsoft.com/en-us/microsoft-copilot-studio/publication-connect-bot-to-custom-application)。
- en: Summary
  id: totrans-181
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter guided you through extending your bot to places such as Teams,
    a public website, and Facebook. In each of these scenarios, you learned how to
    integrate the conversation bot you developed, extending its reach and usefulness.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 本章指导您将您的机器人扩展到诸如 Teams、公共网站和 Facebook 等地方。在这些场景中，您学习了如何集成您开发的对话机器人，扩展其覆盖范围和实用性。
- en: That’s it for this book. I hope you had as much fun exploring the powerful capabilities
    of generative AI, OpenAI, and AI Builder solutions in Azure and Microsoft Power
    Platform as I did writing about them!
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书就到这里了。我希望您探索生成式 AI、OpenAI 和 Azure 以及 Microsoft Power Platform 中的 AI Builder
    解决方案强大功能的过程和我撰写关于它们一样有趣！
