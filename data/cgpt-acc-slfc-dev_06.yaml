- en: 'With this code, the WITH SECURITY_ENFORCED clause will automatically enforce
    object-level and field-level security. If the current user doesn’t have access
    to either the Account object or any field in the query, Salesforce will throw
    a System.QueryException error, which can be caught and handled appropriately.To
    use this class, simply call the getAccountsEnforcingSecurity() method:'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此代码，WITH SECURITY_ENFORCED 子句将自动强制执行对象级和字段级安全。如果当前用户无法访问 Account 对象或查询中的任何字段，Salesforce
    将抛出 System.QueryException 错误，这可以被捕获并适当处理。要使用此类，只需调用 getAccountsEnforcingSecurity()
    方法：
- en: '[PRE282]'
