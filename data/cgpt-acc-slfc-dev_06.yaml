- en: Two useful features of ChatGPT are its ability to effortlessly generate test
    classes and its skill in identifying risks associated with the code. These capabilities
    not only aid in documentation but also in ongoing monitoring, thereby contributing
    to the overall health of our organization.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的两个有用功能是它能够轻松生成测试类，以及识别与代码相关的风险的能力。这些功能不仅有助于文档编制，还有助于持续监控，从而有助于我们组织的整体健康。
- en: Optimizing and refactoring Apex code
  id: totrans-147
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 优化和重构Apex代码
- en: 'During many Salesforce projects, there is a metric that is usually the most
    difficult to refactor: cyclomatic complexity. Cyclomatic complexity is a software
    metric that’s used to indicate the complexity of a program. It’s calculated by
    developing a control flow graph of the code and then determining the number of
    paths through the graph. Higher values indicate more complex and potentially more
    error-prone code.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多Salesforce项目中，通常最难重构的指标是循环复杂度。循环复杂度是一个软件指标，用于指示程序的复杂度。它是通过开发代码的控制流图来计算的，然后确定通过图中的路径数量。较高的值表示代码更复杂，并且可能更容易出错。
- en: 'Let’s have a look at a class with high cyclomatic complexity:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个具有高循环复杂度的类：
- en: '[PRE95]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE95]'
- en: 'This code has numerous branches, which would increase its cyclomatic complexity.
    However, please remember that high cyclomatic complexity is generally considered
    a bad practice because it makes the code harder to read, test, and maintain. ChatGPT
    can help refactor the class to reduce this metric:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码有多个分支，这将增加其循环复杂度。然而，请记住，高循环复杂度通常被认为是一种不良实践，因为它使得代码更难阅读、测试和维护。ChatGPT可以帮助重构类以降低此指标：
- en: '| **Prompt** | Could you please refactor this class to reduce the cyclomatic
