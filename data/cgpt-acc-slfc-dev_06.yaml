  type: TYPE_NORMAL
  zh: '**调度批量类**：您还需要调度这个批量类以每晚运行。您可以通过编程方式或通过Salesforce的UI来完成此操作。**编程调度**：System.schedule(‘Nightly
    Account Review Notification’, ‘0 0 0 * * ?’, new ScheduledClass());错误处理框架：前面的批量类包括一个简单的错误处理机制，它会在发送电子邮件的过程中捕获任何异常并将它们写入调试日志。对于更复杂的情况，您可以实现一个自定义的日志系统，将这些错误写入自定义对象或向管理员发送通知。'
