    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '![一个黑色背景下的放大镜 AI生成的内容可能不正确](img/1.png)**快速提示**：需要查看此图像的高分辨率版本？请使用下一代Packt Reader打开此书或在其PDF/ePub副本中查看。'
- en: '![](img/21.png)**The next-gen Packt Reader** and a **free PDF/ePub copy** of
    this book are included with your purchase. Scan the QR code OR visit [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/21.png)**下一代Packt Reader**以及此书的**免费PDF/ePub副本**包含在您的购买中。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![](img/Unlock1.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Unlock1.png)'
- en: As you can see, generally, there are a few permutations to keep track of where
    the user can cancel at different stages, but the key is to ensure that the client
    is able to handle these different scenarios gracefully.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，通常，有几个排列组合需要跟踪用户可以在不同阶段取消的情况，但关键是确保客户端能够优雅地处理这些不同场景。
- en: Summary
  id: totrans-123
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we’ve covered the elicitation process in detail, including
    how it is initiated and the different scenarios in which it can occur. We’ve also
    explored the various responses that can be sent back to the server during this
    process. Elicitation is when the system actively seeks to gather more information
    from the user in order to fulfill a request or clarify intent.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们详细介绍了诱导过程，包括它是如何启动的以及它可能发生的不同场景。我们还探讨了在此过程中可以向服务器发送的各种响应。诱导是指系统积极寻求从用户那里获取更多信息以完成请求或澄清意图。
- en: We’ve also seen how the user can accept as well as abort at different stages
    of the process.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还看到了用户如何在处理的不同阶段接受以及取消。
- en: Finally, elicitation can be a powerful tool for improving user interactions
    and ensuring that the system is able to meet user needs effectively.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，启发式方法可以是一个强大的工具，用于改善用户交互并确保系统能够有效地满足用户需求。
- en: In the next chapter, we’ll explore how to secure your MCP server and client
    using various authentication methods such as Basic Auth, JWT, and OAuth2.1.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何使用各种身份验证方法（如基本认证、JWT和OAuth2.1）来保护您的MCP服务器和客户端。
- en: Assignment
  id: totrans-128
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 作业
- en: "So far, you’ve seen code that handles a booking scenario. Now your task is\
    \ to implement a scenario where the user finishes a booking process but is asked\
    \ whether they want to be a member or not to receive a discount for future bookings.\
    \ Use the code at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/code/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/c\uFEFF\
    ode/README.md)."
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: "到目前为止，您已经看到了处理预订场景的代码。现在，您的任务是实现一个场景，其中用户完成预订流程，但被问及他们是否想要成为会员以获得未来预订的折扣。使用以下代码[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/code/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/c\uFEFF\
    ode/README.md)。"
- en: Solution
  id: totrans-130
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解决方案
- en: "You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solution/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solu\uFEFF\
    tion/README.md)."
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solution/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solution/README.md)找到解决方案。
- en: Quiz
  id: totrans-132
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测验
- en: 'An elicitation process is technically initiated when:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 当以下情况发生时，启发式过程在技术上启动：
- en: 'A: The server determines that it needs more information from the user to complete
    a request.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 服务器确定需要从用户那里获取更多信息以完成请求。'
- en: 'B: The user provides input that requires further clarification or details.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 用户提供了需要进一步澄清或详细说明的输入。'
- en: 'C: The system needs to confirm user intent before proceeding.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 系统在继续之前需要确认用户的意图。'
- en: You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solution/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solution/solution-quiz.md).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solution/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter10/solution/solution-quiz.md)找到解决方案。
