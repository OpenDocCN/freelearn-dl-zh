- en: '10'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: Elicitation
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 启发式方法
- en: '**Elicitation** means the process of getting or producing something, especially
    information or a reaction.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**启发式**意味着获取或产生某物的过程，尤其是信息或反应。'
- en: 'Why does that matter for MCP then? The official docs have the following to
    say:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这对 MCP 来说很重要？官方文档中有以下说明：
- en: The **Model Context Protocol** (**MCP**) provides a standardized way for servers
    to request additional information from users through the client during interactions.
    This flow allows clients to maintain control over user interactions and data sharing
    while enabling servers to gather necessary information dynamically.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**模型上下文协议**（**MCP**）为服务器提供了一种标准化的方式，在交互过程中通过客户端请求用户额外的信息。这种流程允许客户端在保持对用户交互和数据共享控制的同时，使服务器能够动态地收集必要的信息。'
- en: So, what does that mean? It means, for some reason, the server finds it needs
    to involve the client additionally to ask the user for more information. Now the
    purpose is clearer, right?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这意味着什么？这意味着，由于某种原因，服务器发现它需要额外涉及客户端，以便向用户请求更多信息。现在目的更明确了，对吧？
- en: 'Okay, imagine the following: as a user, you’re trying to book a holiday trip,
    and the date you searched for isn’t available. There’s a way to improve that situation
    through using elicitation – namely, instead of just saying as a server that said
    trip isn’t available, you make an effort to ask additional questions and perhaps
    suggest dates around this date that are available. Now you’ll see, hopefully,
    how this could be a very useful technique in lots of contexts, to increase the
    chance of something being sold or booked, and so on.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，想象一下以下情况：作为一个用户，你正在尝试预订假日旅行，而你搜索的日期不可用。通过使用启发式方法，你可以改善这种情况——也就是说，作为服务器，你不仅说这次旅行不可用，还努力提出额外的问题，并可能建议这个日期附近的可用日期。现在，你可能会看到，这可能会在许多情况下非常有用，比如增加销售或预订的机会等等。
- en: 'In this chapter, we’ll learn how to do the following:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将学习以下内容：
- en: Explain what elicitation is
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释什么是启发式方法
- en: Learn when to use it
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习何时使用它
- en: Build an elicitation integration
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建启发式集成
- en: 'The chapter covers the following topics:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: Why elicitation?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么需要启发式方法？
- en: Implementing elicitation
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现启发式方法
- en: Elicitation flow
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启发式流程
- en: JSON-RPC messages
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: JSON-RPC 消息
- en: Implementing the server-side functionality
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现服务器端功能
- en: Testing elicitation with VS Code
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 VS Code 测试启发式方法
- en: Why elicitation?
  id: totrans-18
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么需要启发式方法？
- en: 'Okay, we’ve already tried describing, at the beginning of this chapter, what
    situations might motivate the use of elicitation in MCP, but let’s try to summarize
    some main motivating factors:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，我们在本章的开头已经尝试描述了可能促使在 MCP 中使用启发式方法的情况，但让我们尝试总结一些主要动机因素：
- en: '**Task complexity**: For some tasks, it’s simply not possible to provide all
    the information needed up front. This might be scenarios where the user needs
    to make selections through a workflow. For example, the user might need to make
    multiple choices as they purchase a ticket to the movies. They start with wanting
    to book a certain film on a given day, but then need to be asked whether they
    need a premium seat or other customizations available. Or, take a scenario such
    as booking a train ticket, where you need to make choices such as a ticket with
    a numbered seat, whether the ticket is physical or an e-ticket, and so on. You
    could ask for all this information up front, but it might make for a tedious user
    experience, and it might be better to start off asking for less input.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务复杂性**：对于某些任务，在开始时提供所有必要的信息可能根本不可能。这可能是一些用户需要通过工作流程进行选择的情况。例如，用户在购买电影票时可能需要做出多个选择。他们可能一开始只想预订某一天的电影，但随后可能需要被询问是否需要高级座位或其他可定制的选项。或者，考虑预订火车票的情况，你可能需要做出选择，比如是否需要带编号的座位，票是实体票还是电子票，等等。你可以一开始就要求所有这些信息，但这可能会让用户体验变得繁琐，可能更好的做法是先要求较少的输入。'
- en: '**Increase the conversion rate on a website**: Another angle is for companies
    to ensure they have a better *conversion rate*, meaning that more users on the
    website become actual customers. For example, if a user wants a red sweater and
    you don’t have it in stock at the moment, then you might want to ask the user
    if they’re okay with a different color or want to sign up on a waitlist to order
    it automatically when it comes in. This type of behavior is more likely to improve
    your sales as a company.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高网站上的转化率**：另一个角度是公司确保他们有一个更好的*转化率*，这意味着网站上更多的用户成为实际客户。例如，如果用户想要一件红色的毛衣，而您目前没有库存，那么您可能想询问用户是否可以接受其他颜色，或者想要注册等待名单，以便在库存到来时自动订购。这种行为更有可能提高公司的销售额。'
- en: '**Improved user experience**: As a logical conclusion of the preceding angle,
    the overall user experience is likely to improve if the user can be met with something
    else than just a *no*, and instead be faced with reasonable choices.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提升用户体验**：作为前面角度的合乎逻辑的结论，如果用户遇到的不只是“不”，而是合理的选项，那么整体的用户体验很可能会得到提升。'
- en: All in all, elicitation can be a great way to improve your app. Let’s try to
    look at the implementation side of things next.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，引出可以是一个改善您应用程序的绝佳方式。让我们接下来尝试看看实现方面的内容。
- en: Implementing elicitation
  id: totrans-24
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施引出
- en: 'So, we want to use elicitation – great. But first, there’s a set of guidelines
    we should know about. Here’s what the official docs have to say:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们想使用引出——很好。但首先，有一系列我们应该知道的指南。以下是官方文档的说明：
- en: 'For trust, safety, and security:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为了信任、安全和安全：
- en: Servers *must not* use elicitation to request sensitive information
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务器*不得*使用引出请求敏感信息
- en: 'Applications *should*:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序*应该*：
- en: Provide a UI that makes it clear which server is requesting information
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供一个界面，使服务器请求信息的来源清晰可见
- en: Allow users to review and modify their responses before sending
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 允许用户在发送前审查和修改他们的回复
- en: Respect user privacy and provide clear decline and cancel options
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尊重用户隐私并提供清晰的拒绝和取消选项
- en: Elicitation flow
  id: totrans-32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引出流程
- en: In general, what happens during elicitation is that the server decides it doesn’t
    have enough information to complete a call to a tool, resource, or prompt.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，在引出过程中发生的情况是，服务器决定它没有足够的信息来完成对工具、资源或提示的调用。
- en: 'What’s important to understand is that this happens as a two-step process:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 需要理解的重要一点是，这个过程是一个两步的过程：
- en: The server asks the client if it’s okay to initiate an elicitation request towards
    the user.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 服务器会询问客户端是否可以发起一个针对用户的引出请求。
- en: The client asks the user to submit information.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户端要求用户提交信息。
- en: 'The user can both accept or decline in both 1) and 2); see the following sequence
    diagram explaining this process. To hopefully make it easier to understand, we’ve
    chosen a trip-booking process:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可以在1)和2)中接受或拒绝；请参见以下序列图解释此过程。为了使理解更简单，我们选择了一个预订旅行的过程：
- en: '![Figure 10.1 – JSON-RPC messages](img/B34121_10_1.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图10.1 – JSON-RPC消息](img/B34121_10_1.png)'
- en: Figure 10.1 – JSON-RPC messages
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1 – JSON-RPC消息
- en: JSON-RPC messages
  id: totrans-40
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: JSON-RPC消息
- en: Now that we’ve explained the overall flow, let’s see what the JSON-RPC messages
    look like.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经解释了整体流程，让我们看看JSON-RPC消息看起来像什么。
- en: 'Like with most MCP features, there are specific messages in JSON-RPC that need
    to be sent and received:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 就像大多数MCP功能一样，在JSON-RPC中需要发送和接收特定的消息：
- en: '**Request message**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**请求消息**'
- en: '[PRE0]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'In the preceding message, we can see how `message` contains the payload for
    what we’re asking for – a user choice to be made or some explanation of what we’re
    asking for. `requestedSchema` is a schema that defines what information you need
    as a server, so here it’s important you specify both the name of what you need,
    its type, and any other rules you want to impose. See this example schema, where
    the server asks for `name`, `email`, and `age`. For each parameter, we specify
    both type and description, and in some places, we specify format and even validation
    rules, such as you should be at least 18 years of age:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的消息中，我们可以看到`message`包含了我们请求的负载——用户需要做出的选择或对我们请求的解释。`requestedSchema`是一个定义您作为服务器需要什么信息的模式，因此在这里，您需要指定所需项目的名称、类型以及您想要施加的任何其他规则。请参见以下示例模式，其中服务器请求`name`、`email`和`age`。对于每个参数，我们指定了类型和描述，在某些地方，我们还指定了格式甚至验证规则，例如您至少需要18岁：
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Let’s have a look at a response. Specifically, this is an *accept*-type response
    where the user has agreed to submit the information requested of them.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个响应。具体来说，这是一个*接受*类型的响应，其中用户同意提交他们被请求的信息。
- en: '**Response message**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**响应消息**'
- en: '[PRE2]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'It’s actually possible for the user to say, *“I don’t want to provide this
    information”*. If that happens, then a reject type message is sent as a response
    instead, and looks like so:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，用户可以说，“我不想提供这个信息”。如果发生这种情况，那么就会发送一个拒绝类型消息作为响应，看起来是这样的：
- en: '**Reject message**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**拒绝消息**'
- en: '[PRE3]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here, it’s clear that the user declines to submit the requested information.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，很明显用户拒绝提交请求的信息。
- en: A third type of response is cancellation. It’s very similar to decline, but
    it’s more like the user dismisses the elicitation dialog by typing *Escape*, clicking
    to close a dialog, so it’s more like the user ignores interacting, rather than
    saying an explicit *No*.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 第三种响应类型是取消。它与拒绝非常相似，但更像用户通过输入*Escape*、点击关闭对话框来忽略引发对话框，所以这更像用户忽略了交互，而不是明确地说*不*。
- en: Request schema types
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 请求架构类型
- en: We’ve mentioned the general request schema and an example. However, there are
    quite a few supported types, and it’s important to know they exist so you use
    them correctly. These types are presented to the user as part of the elicitation
    process, and it means the user either uses a drop list, a text input field, or
    some other UI element to provide the information.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提到了一般请求架构和示例。然而，支持的类型相当多，了解它们的存在非常重要，这样你才能正确使用它们。这些类型作为引发过程的一部分呈现给用户，这意味着用户可以使用下拉列表、文本输入字段或某些其他UI元素来提供信息。
- en: '`string`: This one is about asking for a string. You can add quite a few checks.
    Here’s what the schema looks like:'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`string`：这一类型是关于请求一个字符串。你可以添加相当多的检查。下面是这个架构的样子：'
- en: '[PRE4]'
  id: totrans-58
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Here, you can see that you can limit both `minLength` and `maxLength` and even
    set patterns, which can be highly useful in case you’re asking for a specific
    allowed structure, such as an address, telephone number, social security number,
    and so on.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以看到你可以限制`minLength`和`maxLength`，甚至设置模式，这在你需要请求一个特定的允许结构时非常有用，例如地址、电话号码、社会保险号码等等。
- en: '`number`: This one is slightly less complex, but by setting a minimum and maximum
    value, it helps the user understand what’s allowed and not. See this schema:'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`number`：这一类型稍微简单一些，但通过设置最小值和最大值，它有助于用户了解允许和不允许的内容。看看这个架构：'
- en: '[PRE5]'
  id: totrans-61
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: See the `minimum` and `maximum` values, which you can specify.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 看看`minimum`和`maximum`值，你可以指定这些值。
- en: '`boolean`: For this type, the idea is to get the user to answer *yes* or *no*.
    You can also specify whether there should be a default value:'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`boolean`：对于这种类型，想法是让用户回答*是*或*否*。你也可以指定是否应该有一个默认值：'
- en: '[PRE6]'
  id: totrans-64
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '`enum`: This one should be thought of as a list of options, which can be useful
    if you want the user to choose between trips on different dates, for example:'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`enum`：这一类型应该被视为一个选项列表，如果你想让用户在不同的日期之间选择旅行，例如，这可能会很有用：'
- en: '[PRE7]'
  id: totrans-66
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: With that in mind, let’s see if we can use several of these types, as we will
    show the implementation parts in the next section.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，让我们看看我们是否可以使用这些类型中的几个，因为我们将展示下一节中的实现部分。
- en: Implementing the server-side functionality
  id: totrans-68
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实现服务器端功能
- en: Let’s start with the server. What we need to know is that a server feature,
    tool, resource, or prompt should run its course, and if it detects that more information
    is needed, it should produce an elicitation message.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从服务器开始。我们需要知道的是，服务器功能、工具、资源或提示应该运行其过程，如果它检测到需要更多信息，它应该生成一个引发消息。
- en: 'First, let’s see how we produce such a message. First, we have an `if` that
    checks whether a message should be produced. If so, we call `elicit` on the context
    object while providing a `message` and a schema to abide by:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看我们如何生成这样的消息。首先，我们有一个`if`语句来检查是否应该生成消息。如果是这样，我们在上下文对象上调用`elicit`，同时提供一个`message`和一个要遵守的`schema`：
- en: '[PRE8]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Then there should be a check to see what the user and the client responded
    with:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 然后应该检查用户和客户端的响应：
- en: '[PRE9]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Here, you can see how we investigate the `action` property to see if the user
    accepted the primary action and submitted additional data. If so, we start parsing
    out what was selected. If it wasn’t accepted, then we respond with a cancellation
    message.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以看到我们如何调查`action`属性，以查看用户是否接受了主要操作并提交了额外的数据。如果是这样，我们就开始解析所选择的内容。如果没有接受，那么我们就发送一个取消消息。
- en: 'Now, let’s see it all together:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们一起看看：
- en: '[PRE10]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Now, let’s move on to testing elicitation features with VS Code.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们继续使用 VS Code 测试激发功能。
- en: Testing elicitation with VS Code
  id: totrans-78
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 VS Code 测试激发
- en: 'To test elicitation features with VS Code, you will need to add the MCP server
    as an entry to the `mcp.json` file like so:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用 VS Code 测试激发功能，您需要将 MCP 服务器添加到 `mcp.json` 文件的条目中，如下所示：
- en: '[PRE11]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Then, ensure you’re in *Agent* mode before you type the following prompt:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在输入以下提示之前，请确保您处于 *Agent* 模式：
- en: '[PRE12]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'You should see the following play out in the user interface:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该在用户界面中看到以下情况：
- en: '**Typing a prompt and tool invocation**: Here, you type your request to book
    a trip, and the system recognizes it as a tool invocation. You need to approve
    the tool invocation for it to proceed:'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**输入提示并工具调用**：在这里，您输入您的请求以预订旅行，系统将其识别为工具调用。您需要批准工具调用才能继续：'
- en: "![Figure 10.2 – Typing a prompt and seeing a t\uFEFFool invocation](img/B34121_10_2.png)"
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.2 – 输入提示并查看工具调用](img/B34121_10_2.png)'
- en: Figure 10.2 – Typing a prompt and seeing a tool invocation
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.2 – 输入提示并查看工具调用
- en: '**Approving the tool invocation**: Once you approve the tool invocation, you
    should see the interface telling you the selected data is busy, and you’ll be
    asked to respond, meaning now it will take you into crafting an elicitation response:'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**批准工具调用**：一旦您批准了工具调用，您应该看到界面告诉您所选数据正在忙碌，您将被要求做出响应，这意味着现在它将带您进入构建激发响应的阶段：'
- en: "![Figure 10.3 – Approving the \uFEFFtool invocation](img/B34121_10_3.png)"
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.3 – 批准工具调用](img/B34121_10_3.png)'
- en: Figure 10.3 – Approving the tool invocation
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.3 – 批准工具调用
- en: '**Crafting an elicitation response**: Now you will need to craft a response
    based on the user’s input and the system’s requirements. This involves using the
    elicitation schema you defined earlier to gather any additional information needed.
    Here’s how that looks in the user interface. In the following screenshot, you’re
    asked whether you want to respond or not. If you choose **true**, it will continue
    to ask you for another date; if not, it will stop the elicitation process:'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**构建激发响应**：现在您需要根据用户的输入和系统的要求构建一个响应。这涉及到使用您之前定义的激发模式来收集所需的所有额外信息。以下是在用户界面中的样子。在下面的屏幕截图中，您会被问及是否想要做出响应。如果您选择
    **true**，它将继续询问您另一个日期；如果不选择，它将停止激发过程：'
- en: "![Figure 10.4 – Crafting an eli\uFEFFcitation response](img/B34121_10_4.png)"
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.4 – 构建激发响应](img/B34121_10_4.png)'
- en: Figure 10.4 – Crafting an elicitation response
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.4 – 构建激发响应
- en: '**Responding to the elicitation**: Once you’ve selected to continue, you need
    to fill in the alternate date like so:'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对激发做出响应**：一旦您选择继续，您需要填写替代日期，如下所示：'
- en: "![Figure 10.5 – Responding to\uFEFF the elicitation](img/B34121_10_5.png)"
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.5 – 对激发做出响应](img/B34121_10_5.png)'
- en: Figure 10.5 – Responding to the elicitation
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.5 – 对激发做出响应
- en: '**The final result**: Because you’ve now submitted an alternative date, the
    server will check to see if this response is okay. In the following screenshot,
    you can see that that’s the case and you receive a confirmation for your booking:'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**最终结果**：因为您已经提交了另一个日期，服务器将检查此响应是否可行。在下面的屏幕截图中，您可以看到这是正确的，并且您收到了预订确认：'
- en: "![Figure 10.6 – \uFEFFThe final result](img/B34121_10_6.png)"
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.6 – 最终结果](img/B34121_10_6.png)'
- en: Figure 10.6 – The final result
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.6 – 最终结果
- en: That completes elicitation on the server side.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这就完成了服务器端的激发。
- en: Implementing elicitation in the client
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在客户端实现激发
- en: Great – now we have a good understanding of the server side of things, and even
    how to test it with VS Code. Let’s proceed to implement the client side.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了——现在我们对服务器端有了很好的理解，甚至知道如何使用 VS Code 进行测试。让我们继续实现客户端。
- en: 'Normally, when writing a client, you deal with a `ClientSession` object. This
    allows you to manage the connection to the server. In addition to `read_stream`
    and `write_stream`, you can also pass `elicitation_callback` to handle any elicitation
    events:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，当编写客户端时，您会处理一个 `ClientSession` 对象。这允许您管理到服务器的连接。除了 `read_stream` 和 `write_stream`，您还可以传递
    `elicitation_callback` 来处理任何激发事件：
- en: '[PRE13]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Let’s have a look at `elicitation_callback_handler`:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 `elicitation_callback_handler`：
- en: '[PRE14]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'As you can see, this handler takes two parameters: the request context and
    the elicitation request parameters. What we need to do at this point is to create
    a client response that gets sent back to the server. There are three possible
    responses you can send back to the server:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，此处理程序接受两个参数：请求上下文和诱导请求参数。我们现在需要做的是创建一个客户端响应，并将其发送回服务器。您可以向服务器发送三种可能的响应：
- en: '`accept`: This means we want the elicitation process to continue. If we give
    such a response, we should also conform to the input schema set out by the server.
    For example, the following answer would conform:'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`accept`：这意味着我们希望诱导过程继续。如果我们给出这样的响应，我们还应该遵守服务器设定的输入模式。例如，以下答案将符合：'
- en: '[PRE15]'
  id: totrans-108
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Here, you see how we first set the `action` property to `accept` and set `content`
    to a payload, with the schema taking `checkAlternative` and `alternativeDate`.
    Note also how we hardcode the response. In a more production-like app, the value
    assigned to `alternativeDate` should come as the result of asking the user for
    input.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，您可以看到我们首先将`action`属性设置为`accept`，并将`content`设置为有效载荷，其中模式采用`checkAlternative`和`alternativeDate`。注意我们如何硬编码响应。在一个更类似生产的应用程序中，分配给`alternativeDate`的值应该是询问用户输入的结果。
- en: '`decline`: This means we want to stop the elicitation process. We can send
    a response like this:'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`decline`：这意味着我们想要停止诱导过程。我们可以发送这样的响应：'
- en: '[PRE16]'
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Here, we don’t set `content` at all, which makes it clear that we are not providing
    any additional information or context for the decline. This `decline` response
    happens very early on in the process. This could be likened to a user simply saying
    *no* without providing further details.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们根本未设置`content`，这使得我们明确表示我们不会提供任何关于下降的额外信息或背景。这种`下降`响应在处理过程的早期就发生了。这可以比作用户简单地说不，而不提供更多细节。
- en: '`accept`: The user accepts to respond but then declines to provide an alternative
    date:'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`accept`：用户接受响应，但随后拒绝提供替代日期：'
- en: '[PRE17]'
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: This decline happens a bit later in the process, after the user has been presented
    with the option to select an alternative date.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这种下降发生在处理过程的一段时间后，在用户被提供选择替代日期的选项之后。
- en: 'Let’s try to show it all in this sequence diagram:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试通过这个序列图来展示所有内容：
- en: '`![Figure 10.7 – Flow for implementing elicitation in the client in Python](img/B34121_10_7.png)`'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '`![图10.7 – 在Python客户端中实现诱导的流程](img/B34121_10_7.png)`'
- en: Figure 10.7 – Flow for implementing elicitation in the client in Python
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.7 – 在Python客户端中实现诱导的流程
