- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: Executing and Scaling Transformation Initiatives
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 执行和扩展转型计划
- en: Power Platform, with its low-code/no-code tools, helps organizations bring their
    ideas to life by executing and scaling transformation initiatives. Its user-friendly
    interface and intuitive design allow business users and citizen developers to
    quickly prototype, iterate, and deploy applications without relying heavily on
    traditional software development methods. This approach unlocks the potential
    for organizations to drive digital transformation at an accelerated pace.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform，凭借其低代码/无代码工具，通过执行和扩展转型计划，帮助组织将想法变为现实。其用户友好的界面和直观的设计允许业务用户和公民开发者快速原型设计、迭代和部署应用程序，而无需过度依赖传统的软件开发方法。这种方法释放了组织加速推动数字化转型潜力的可能性。
- en: One of the key advantages of Power Platform is its ability to scale solutions
    seamlessly. Organizations can start with small-scale initiatives and gradually
    expand to enterprise-wide deployments. Power Platform integrates with enterprise
    products from the Microsoft Azure suite, allowing organizations to leverage additional
    capabilities as their needs evolve. By leveraging Power Platform’s advantages,
    organizations can confidently execute and scale their transformation initiatives,
    rapidly develop applications, automate processes, and integrate with enterprise
    products to drive meaningful change across the entire organization.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform的一个关键优势是其无缝扩展解决方案的能力。组织可以从小规模计划开始，逐步扩展到企业级部署。Power Platform与Microsoft
    Azure套件的企业产品集成，允许组织随着需求的发展利用额外的功能。通过利用Power Platform的优势，组织可以自信地执行和扩展他们的转型计划，快速开发应用程序，自动化流程，并与企业产品集成，在整个组织中推动有意义的变革。
- en: 'We will cover the following topics in this chapter:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Getting started with your vision
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始你的愿景之旅
- en: Rapid prototyping and deployment with Power Platform
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用Power Platform进行快速原型设计和部署
- en: Unlocking solutions with Power Platform
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用Power Platform解锁解决方案
- en: Driving tangible results and proving value
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过Power Platform实现有形成果并证明价值
- en: Getting started with your vision
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始你的愿景之旅
- en: '**Power Platform** is an extremely powerful set of tools that can easily scale
    from smaller personal solutions to widely adopted organization initiatives that
    help manage and execute company-wide processes. This scale is only possible in
    a manageable state if the correct ecosystem is set up to support it. A number
    of approaches and processes can be undertaken to ensure that your organization’s
    vision is turned into a reality. In this section, we will explore the process
    you might take to get started with turning your vision into a reality.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**Power Platform** 是一套功能极其强大的工具，可以轻松地从较小的个人解决方案扩展到广泛采用的组织计划，帮助管理和执行公司范围内的流程。这种规模只有在正确设置以支持它的生态系统下才能在可控状态下实现。可以采取多种方法和流程来确保您的组织愿景变为现实。在本节中，我们将探讨您可能采取的过程，以开始将您的愿景变为现实。'
- en: Setting your purpose
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设定你的目标
- en: Many organizations do not have the opportunity to set their purpose for wanting
    to adopt Power Platform as it often just happens to them. Power Platform assets
    are often discovered within a digital ecosystem long after they are created. This
    is because Microsoft leaves the platform available as a standard and it is so
    deeply integrated with many other Office 365, Azure, and Dynamics 365 tools. Often,
    makers discover the platform by mistake and end up building amazing things with
    it.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 许多组织没有机会为自己想要采用Power Platform的目的设定目标，因为这通常是在他们不知情的情况下发生的。Power Platform资产通常在创建后很久才在数字生态系统中被发现。这是因为微软将其平台作为标准提供，并且它与许多其他Office
    365、Azure和Dynamics 365工具深度集成。通常，制作者会意外地发现这个平台，并最终用它来构建令人惊叹的事物。
- en: 'There are scenarios in which IT admins have installed the **Center of Excellence**
    (**CoE**) **Starter Kit** and discovered thousands of cross-organizational solutions
    that have been adopted by many people. This means that people are already solving
    business problems with Power Platform in an ungoverned manner. In many scenarios,
    the platform has far surpassed the point of management and governance and if the
    platform is somehow turned off or blocked, people’s assets break. This is called
    **the Scream Test**; if you shut it off, people will make a huge noise. So, *if*
    you try to do this and somehow succeed, please be prepared for a lot of support
    tickets. The point is that shutting it down is not an option in most cases, and
    this actually sends an unhealthy message to people who have been using these tools
    to solve problems. Regardless of where you may be in your Power Platform journey,
    it is important to at least decide what the next steps should be. Visibility and
    education are both important here. A clever idea is to get as many people into
    the room as possible and collectively define a purpose for Power Platform and
    your center for enablement. You may want to start by thinking about the following:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些情况下，IT管理员安装了**卓越中心**（**CoE**）**入门套件**，并发现了成千上万被许多人采用的跨组织解决方案。这意味着人们已经在未受管理的状态下使用Power
    Platform解决业务问题。在许多情况下，平台已经远远超过了管理和治理的范畴，如果平台以某种方式关闭或阻止，人们的资产就会受损。这被称为**尖叫测试**；如果你尝试这样做并成功，请做好处理大量支持票的准备。重点是，在大多数情况下，关闭平台不是一种选择，这实际上向使用这些工具解决问题的人们传递了一个不健康的信号。无论你在Power
    Platform的旅程中处于哪个阶段，至少决定下一步应该做什么是很重要的。可见性和教育在这里都很重要。一个巧妙的主意是尽可能多地把人们召集到一起，共同为Power
    Platform和你的赋能中心定义一个目的。你可能想从考虑以下内容开始：
- en: '*Who* is using the platform?'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*谁*在使用这个平台？'
- en: '*What* has been built on the platform?'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在平台上*构建了什么内容？'
- en: '*Where* have things been built?'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在哪里*构建了这些内容？'
- en: 'Progressing from there will be a great start as you can then decide what to
    do next. Often, organizations will take the approach of keeping the strategy simple
    to start with. Examples of this are as follows:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里开始，这将是一个很好的起点，因为你可以决定下一步要做什么。通常，组织会采取先从简单的策略开始的办法。以下是一些例子：
- en: Lock the platform down from a security perspective
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从安全角度锁定平台
- en: Let internal IT and pro developers build with it
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让内部IT和职业开发者使用它来构建
- en: Roll out to a wider audience at a later point
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在稍后阶段向更广泛的受众推出
- en: These three simple strategy examples work well and are straightforward enough
    to stick to and map back to as you progress through the process of setting up
    and securing your ecosystem.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个简单的策略示例效果很好，而且足够简单，足以坚持并映射到你在设置和保障生态系统过程中的进展。
- en: The idea here is to get everyone to agree on what the purpose is so that a plan
    can be put in place to ensure that the purpose is delivered on. The hardest part
    in all of this is to get the right people into one room or onto one call. This
    has historically been difficult.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的想法是让每个人都同意目的，以便可以制定一个计划来确保目的得以实现。所有这些中最困难的部分是让合适的人聚集在一个房间里或进行一次通话。这在历史上一直很困难。
- en: The next tough part is getting people to agree on one thing! There are techniques
    to help facilitate this, such as changing management and designing thinking workshops
    facilitated over interactive tools, such as Mural, Miro, or Figma. This way, if
    people interact and share collaboratively, there is a stronger likelihood that
    they will reach a better-defined outcome faster.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个棘手的部分是让人们就一件事达成一致！有一些技术可以帮助促进这一点，例如通过互动工具（如Mural、Miro或Figma）进行的管理变革和设计思维研讨会。这样，如果人们互动并协作共享，他们更有可能更快地达到一个定义更明确的成果。
- en: 'As an example, your purpose statement could be as follows:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你的目的陈述可以是以下这样：
- en: '*We would like to deploy Power Platform to an initial set of power users within
    the IT team and the business, which will enable rapid solution development. We
    would like to do this with a solid* *governance layer*.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '*我们希望将Power Platform部署到IT团队和业务中的首批power用户中，这将能够实现快速解决方案的开发。我们希望用一个稳固的* *治理层*
    *来实现这一点*。'
- en: The purpose statement needs to be clear and defined! You should never do anything
    that does not support this statement. To drive this purpose, you need a plan!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 目的陈述必须清晰且明确！你不应该做任何不支持这一陈述的事情。为了推动这一目的，你需要一个计划！
- en: What is your plan?
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的计划是什么？
- en: Your plan needs to map to your purpose as clearly as possible. This is where
    having a great program lead or project manager will help. Planning your project
    accurately will be important. Your plan should focus on specific areas that will
    help you reach your purpose. Typically, you can break your plan up into different
    pillars and each pillar would have specific workstreams (or categories) underneath
    it.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 您的计划需要尽可能清晰地映射到您的目的。这就是为什么拥有一位优秀的项目领导或项目经理会大有帮助。准确规划您的项目将非常重要。您的计划应专注于帮助您实现目的的具体领域。通常，您可以将计划分解为不同的支柱，每个支柱下都会有具体的工作流（或类别）。
- en: This plan, with an example illustrated in *Figure 5**.1*, is referred to as
    an **ecosystem enablement program**, where you may want to consider the following
    pillars followed by specific allocated workstreams or categories as the core components
    of your plan. Each of these workstreams focuses on different aspects of your Power
    Platform ecosystem and each is important when ensuring that a safe space is being
    created for makers to build useful solutions.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 此计划，如*图 5**.1*所示，被称为**生态系统启用计划**，您可能需要考虑以下支柱，随后是具体分配的工作流或类别作为您计划的核心组件。每个工作流都关注您Power
    Platform生态系统的不同方面，并且每个工作流在确保为创作者创建一个安全空间以构建有用解决方案时都至关重要。
- en: '![Figure 5.1: Basic example of an ecosystem enablement deployment timeline](img/B21080_05_001.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.1：生态系统启用部署时间线的基本示例](img/B21080_05_001.jpg)'
- en: 'Figure 5.1: Basic example of an ecosystem enablement deployment timeline'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.1：生态系统启用部署时间线的基本示例
- en: Digital guardrails
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数字护栏
- en: '**Guardrails** are the technical tools or platforms that are put in place to
    manage and maintain your ecosystem. Typically, in Power Platform, you may want
    to focus on the following digital guardrail workstreams as a starting point:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**护栏**是放置在生态系统中的技术工具或平台，用于管理和维护您的生态系统。在Power Platform中，您可能希望将以下数字护栏工作流作为起点：'
- en: '**Environment strategy**: Environments form the core of your ecosystem and
    define *where* people will be building things. The environment strategy will form
    the basis of the digital guardrails and inform other workstreams within the strategy,
    such as data policies and security.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境策略**：环境是您生态系统的核心，并定义了人们将在哪里构建事物。环境策略将成为数字护栏的基础，并告知策略中的其他工作流，如数据政策和安全。'
- en: '**Data policies**: These policies form the core mechanism to manage the connectors
    that are available to each set of environments. These connectors are the core
    of Power Platform and require control across the environment estate.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据政策**：这些政策构成了管理每个环境集可用连接器的核心机制。这些连接器是Power Platform的核心，需要在环境领域进行控制。'
- en: '**Security**: The security within Power Platform and the wider Microsoft stack
    enables organizations to manage *who* has access to the relevant tools, environments,
    and connectors. A robust security strategy will enable the right people to access
    the correct tools and environments without worrying about data leakage. As an
    example, you may want to consider adding Dataverse to all environments as it has
    a much deeper set of security functionalities than what is available within environments
    without Dataverse.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全**：Power Platform和更广泛的Microsoft堆栈中的安全功能使组织能够管理谁有权访问相关工具、环境和连接器。一个稳健的安全策略将使正确的人能够访问正确的工具和环境，而无需担心数据泄露。例如，您可能希望考虑将Dataverse添加到所有环境中，因为它具有比在无Dataverse的环境中可用的更深入的安全功能。'
- en: '**Monitoring**: This is the ability to understand what is being leveraged in
    Power Platform. Typically, this process starts with the CoE Starter Kit installation
    to get visibility, and then wider monitoring functionality can be employed, such
    as Azure Application Insights and Compliance Center audit reporting.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：这是理解在Power Platform中正在利用什么的能力。通常，此过程从安装CoE入门套件以获得可见性开始，然后可以采用更广泛的监控功能，例如Azure应用程序洞察和合规中心审计报告。'
- en: Processes
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 流程
- en: 'The processes will define how people and technology within the ecosystem interact
    with one another. Processes within your ecosystem are extremely important as they
    will define and refine ways of working. Some of the key areas you would need to
    consider under the processes pillar are, but not limited to, the following:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 流程将定义生态系统内的人员和技术如何相互交互。您生态系统中的流程非常重要，因为它们将定义和细化工作方式。在流程支柱下，您需要考虑的一些关键领域包括但不限于以下内容：
- en: '**Support and operations**: How are your support and operations structured
    and has a support wrapper been defined for the platform as well as the assets
    built on the platform? There are multiple processes that can be defined within
    the support wrapper, such as tracking of support tickets, feedback requests, event
    management, and more. It is important to ensure that these processes are well
    defined as they will directly impact your support desk and people’s time.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持和运营**: 你的支持和运营结构是怎样的？平台以及平台上构建的资产是否已经定义了支持包装？可以在支持包装中定义多个流程，例如支持工单跟踪、反馈请求、事件管理等。确保这些流程定义良好非常重要，因为它们将直接影响你的支持台和人们的时间。'
- en: '**Governance and compliance**: Governance is a very widely used word, but what
    is important in Power Platform is that governance and compliance standards are
    created and made available to everyone. Typically, governance and compliance align
    to ensure the platform and the tools created on the platform are done in a manner
    that correctly aligns with the rules set up by your organization. The rules of
    engagement that you create to ensure your ecosystem is protected are paramount
    to the success of the platform’s adoption. As an example, you could create a governance
    rule in specific environments that dictates that apps can only be shared with
    less than 500 people.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理和合规性**: 治理是一个广泛使用的词汇，但在Power Platform中，重要的是要创建和提供治理和合规性标准。通常，治理和合规性是一致的，以确保平台和平台上创建的工具以正确的方式与组织设定的规则相一致。你创建的参与规则，以确保你的生态系统得到保护，对于平台采用的成功至关重要。例如，你可以在特定环境中创建一个治理规则，规定应用只能与少于500人共享。'
- en: '**Application life cycle management** (**ALM**): This is not just about automatically
    moving solutions between environments but the initial idea of a solution to sunsetting
    it after it is no longer needed. It’s important to understand how solutions will
    move through this process and how they will be managed. An important part of ALM
    is the tools used to move solutions between environments. Many organizations use
    Azure DevOps. However, Power Platform has its own capability with the pipelines
    functionality available within managed environments.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用程序生命周期管理**（**ALM**）: 这不仅仅是关于在环境之间自动移动解决方案，而是从解决方案的初始想法到不再需要后将其停用。了解解决方案如何通过这个过程以及如何进行管理非常重要。ALM的一个重要部分是用于在环境之间移动解决方案的工具。许多组织使用Azure
    DevOps。然而，Power Platform在管理环境中提供了自己的管道功能。'
- en: '**Ideation**: How are ideas managed and tracked into a proper backlog that
    can be fed to the relevant people for creation? This process defines your mechanism
    for workload management. Many organizations build a basic ideation solution based
    on SharePoint or may leverage the innovation backlog solution available in the
    CoE Starter Kit. Centralizing and managing ideas is important. The more assets
    that are built with the tools available in the platform, the more valuable the
    platform is.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创意管理**: 怎样管理和追踪创意，使其进入一个合适的待办事项列表，以便提供给相关人员进行创作？这个过程定义了你的工作负载管理机制。许多组织基于SharePoint构建基本的创意管理解决方案，或者可能利用CoE启动套件中可用的创新待办事项解决方案。集中管理和创意很重要。使用平台中可用的工具构建的资产越多，平台的价值就越大。'
- en: '**Feedback**: It is important to ensure people can share their experiences
    when using the platform as it drives toward the constant growth and improvement
    of the platform and ecosystem. Feedback informs platform growth and adoption.
    When people’s voices are heard, then the processes created to manage and govern
    the platform can be refined. A simple Microsoft form can be created and shared
    within your community collaboration platform for people to share feedback at any
    time.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反馈**: 确保人们在使用平台时能够分享他们的经验非常重要，因为这推动了平台和生态系统的持续增长和改进。反馈信息有助于平台增长和采用。当人们的意见被听到时，那么管理和治理平台的过程就可以得到改进。可以创建一个简单的Microsoft表单，并在你的社区协作平台上共享，以便人们随时分享反馈。'
- en: Organization enablement
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**组织赋能**'
- en: '**Organization enablement** refers to methods of getting people in your organization
    to understand and use the platform to create useful things. Ways to start this
    process will typically be more change- and enablement-focused and will require
    knowledge of some frameworks, such as the **Professional and Science** (**PROSCI**)
    framework. The workstreams you may want to explore to start are, but not limited
    to, the following:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**组织赋能**指的是让人们了解并使用平台来创建有用事物的各种方法。启动此过程的方式通常更侧重于变革和赋能，并需要了解一些框架，例如**专业和科学**（**PROSCI**）框架。您可能想要探索的工作流程包括但不限于以下内容：'
- en: '**Community of practice**: How will makers and users interact with one another?
    A centralized hub where people can collaborate and communicate is especially important.
    Think about a Viva Engage site with your shared resources and the Power Platform
    guidance. This provides a central location for members of the Power Platform community
    to share knowledge and content that will help and support the growth of the wider
    community.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实践社区**：创作者和用户将如何相互交流？一个人们可以协作和沟通的中心枢纽特别重要。考虑一个拥有共享资源和Power Platform指导的Viva
    Engage网站。这为Power Platform社区成员提供了一个中心位置，以分享知识和内容，这将有助于和支持更广泛社区的增长。'
- en: '**Champions**: The champions in your organization are typically the consistent
    makers who are actively building things and sharing them across the ecosystem.
    These people are enthusiastic and helpful. Champion programs are extremely beneficial
    to any organization as they become the core of the Power Platform community. Often,
    champions are viewed as heroes in the community and they help to motivate people
    around them.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**倡导者**：您组织中的倡导者通常是那些持续创建事物并在整个生态系统中分享它们的积极创作者。这些人热情且乐于助人。倡导者计划对任何组织都极为有益，因为它们成为Power
    Platform社区的核心。通常，倡导者在社区中被视为英雄，并帮助他们激励周围的人。'
- en: '**Impacted group management**: How will groups of people be brought into the
    various maker and user communities? Which groups of people will be assigned Power
    Platform licenses? Think about the impacted groups of people and how this should
    be rolled out so the scale of platform adoption can be achieved.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**受影响群体管理**：人们将如何被引入各种创作者和用户社区？哪些人群将被分配Power Platform许可证？考虑受影响的群体，并思考如何推广以实现平台采用规模的扩大。'
- en: '**Stakeholder management**: Stakeholders are particularly important in the
    realm of platform adoption. Your stakeholder management program should drive stakeholders
    to take responsibility and be bought in but also offer advice and leadership.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利益相关者管理**：在平台采用领域，利益相关者尤为重要。您的利益相关者管理计划应推动利益相关者承担责任并积极参与，同时提供建议和领导力。'
- en: '**Training and enablement**: How will the best practice be disseminated across
    your organization? This is key because people want to learn. Where will training
    come from? A training and enablement plan is critical to the adoption of Power
    Platform across your business.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训和赋能**：最佳实践将如何在整个组织中传播？这是关键，因为人们想要学习。培训将从哪里来？一个培训和赋能计划对于在您的业务中采用Power Platform至关重要。'
- en: Portfolio
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 资料库
- en: 'Your portfolio consists of the useful things you create and how you create
    an environment for makers to be creative and successful. There are several ways
    to start this program of work. Some of the key areas you would need to consider
    under the processes pillar are, but are not limited to, the following:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 您的资料库包括您创建的有用事物以及您如何为创作者创造一个充满创意和成功的环境。开始这项工作计划有几种方式。在流程支柱下，您需要考虑的一些关键领域包括但不限于以下内容：
- en: '**Maker archetypes**: As mentioned in previous chapters, makers are not all
    the same and not all makers have the same set of skills. It is important to set
    up your maker archetypes so that you can define where and what people can get
    access to. This will make the maker’s life a lot easier.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创作者原型**：如前几章所述，创作者并非都相同，也不是所有创作者都拥有相同的技能集。设置您的创作者原型非常重要，这样您就可以定义人们可以访问的地方和内容。这将使创作者的生活变得更加容易。'
- en: '**Maker journey management**: Makers will participate in the platform differently
    and at various times. Some will really need to study and learn, while others will
    not. Defining what the maker archetype journeys could look like will help streamline
    the ways makers engage. A maker archetype journey is the journey a maker will
    take to create something useful. Typically, it is a set of steps that starts with
    the maker discovering the platform and results in a solution being created and
    productionized for consumption across the business.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制造者旅程管理**：制造者将以不同的方式并在不同的时间参与平台。有些人确实需要学习和研究，而有些人则不需要。定义制造者原型旅程可能的样子将有助于简化制造者参与的方式。制造者原型旅程是制造者为了创建有用的东西而采取的旅程。通常，它是一系列步骤，从制造者发现平台开始，最终导致解决方案被创建并投入生产，以便在整个业务中消费。'
- en: '**Maker best practice**: There are always rules that need to be followed when
    making solutions. This type of practice should be shared across your entire maker
    base and makers need to understand that “this is how we do things here.”'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制造者最佳实践**：在制作解决方案时，始终需要遵循一些规则。这种实践应该在整个制造者基础中共享，并且制造者需要理解“这是我们在这里做事的方式。”'
- en: '**Data, connectors, and licensing**: This is a very important part of enablement
    and portfolio building. This is so different for many organizations as some see
    the platform as completely strategic and have invested in premium licensing and
    others see it as tactical and only use seeded licenses. It is important to understand
    the core fundamentals of data and connectors in order to make informed decisions
    on where data should be stored and managed so that compliance and risk policies
    in your organization are respected.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据、连接器和许可**：这是赋能和组合构建的重要组成部分。对于许多组织来说，这非常不同，因为一些组织将平台视为完全战略性的，并投资了高级许可，而另一些组织则将其视为战术性的，仅使用种子许可。为了在数据应存储和管理的地方做出明智的决定，以便尊重你组织的合规性和风险政策，了解数据连接器的核心基础非常重要。'
- en: '**Architectural best practice**: This is a little different from maker best
    practice as it is far more technical. It involves an understanding of Power Platform
    at the platform level and not at the app or flow level. This is about setting
    the scene for all the makers.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构最佳实践**：这与制造最佳实践略有不同，因为它更加技术化。它涉及对平台层面的 Power Platform 的理解，而不是在应用或流程层面。这是为所有制造者设定场景。'
- en: The ecosystem enablement plan, as illustrated in *Figure 5**.2*, should consolidate
    as many of these workstreams as possible as its core and can be executed as a
    *gather-and-implement* Agile approach where you focus on each workstream and ask
    as many questions as possible, and then define a mini-implementation plan for
    each workstream.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如 *图 5.2* 所示的生态系统赋能计划应尽可能多地整合这些工作流作为其核心，并可以作为一个 *聚集和实施* 的敏捷方法来执行，其中你专注于每个工作流，尽可能多地提问，然后为每个工作流定义一个迷你实施计划。
- en: '![Figure 5.2: The breakdown of a classic ecosystem enablement program](img/B21080_05_002.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.2：经典生态系统赋能计划的分解](img/B21080_05_002.jpg)'
- en: 'Figure 5.2: The breakdown of a classic ecosystem enablement program'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.2：经典生态系统赋能计划的分解
- en: As an example, for the communities of practice workstream, you would ensure
    that questions are asked about where people will collaborate, how they will get
    access, who will manage these areas, and how to onboard people.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对于实践社区工作流，你需要确保提出关于人们将在哪里协作、他们将如何获取访问权限、谁将管理这些区域以及如何入职人员的问题。
- en: 'The output would then be to do the following:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，需要执行以下操作：
- en: Implement a viva engage or teams community site
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施viva engage或teams社区网站
- en: Appoint community leaders
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指定社区领导者
- en: Define the community onboarding process
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义社区入职流程
- en: There are many other areas that can be focused on in each workstream and these
    will be discovered with your organization.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 每个工作流中都有许多其他可以关注的领域，这些领域将与你的组织一起发现。
- en: Setting up the foundations
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立基础
- en: Setting up the foundation is the most difficult phase. This is because there
    may already be things created on the platform that need to be reviewed. In more
    cases than not, these solutions need to not be impacted by any changes being made
    to the platform during an ecosystem enablement program. The foundational phase
    is important because it focuses on the technology (platform) as the initial mechanism
    to set up the governance needed. This is referred to in the market as *setting
    up* *the guardrails*.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 建立基础是最困难的阶段。这是因为平台上可能已经存在需要审查的事物。在大多数情况下，这些解决方案需要不受在生态系统启用计划期间对平台所做的任何更改的影响。基础阶段之所以重要，是因为它侧重于技术（平台）作为建立所需治理的初始机制。这在市场上被称为*建立*
    *护栏*。
- en: Setting up the guardrails
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立护栏
- en: Always start with guardrails! The workstreams in the guardrails pillar are vital
    and will provide the most value immediately. Whether your organization has thousands
    of assets or none, the guardrails pillar is the best place to begin. Figure out
    that environment strategy and get those data policies in place. Make sure you
    are protecting whatever is new. You can always go back and slowly clean up environments
    as you go. Getting in a core set of guardrails will bring peace of mind to Power
    Platform administrators.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 总是以护栏开始！护栏支柱中的工作流程至关重要，将立即提供最大价值。无论您的组织拥有数千个资产还是没有，护栏支柱都是开始的最佳地方。制定环境战略并确保数据政策到位。确保您正在保护任何新事物。您总是可以逐步清理环境。建立核心护栏将为Power
    Platform管理员带来安心。
- en: The next steps are going to depend on what has already been set up in your ecosystem.
    If you already have high adoption, you should start with the processes as soon
    as you can. Getting the support and ops processes in place is the primary concern
    here.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步将取决于您生态系统中已经建立的内容。如果您已经拥有高采用率，您应该尽快开始处理流程。确保支持和运营流程到位是这里的主要关注点。
- en: If you have low adoption, move on to organization enablement workstreams, where
    you can start setting up communities of practice and champions networks. Ensure
    that the right people are in the right place and the infrastructure is in place
    to cater to a community of makers. This will be small to start and that is perfectly
    normal! Make sure you get your infrastructure ready for people.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的采用率较低，转向组织赋能工作流程，在那里您可以开始建立实践社区和冠军网络。确保合适的人处于合适的位置，并且基础设施到位，以适应制作者社区。这将从一个小规模开始，这是完全正常的！确保您为人们准备好基础设施。
- en: Then, move on to process-focused workstreams, and ensure your support wrapper,
    ALM, operations, governance, ideation, and feedback processes are ready for implementation.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，转向以流程为重点的工作流程，并确保您的支持包装、ALM、运营、治理、创新和反馈流程准备就绪。
- en: Finally, think about how to ensure makers understand the rules of engagement
    and “how we do things here.” This will come through in the rules you set up under
    your portfolio creation workstreams.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，考虑如何确保制作者了解参与规则和“我们在这里是如何做事的”。这将在您在组合创建工作流程中设置的规则中体现出来。
- en: Power Platform offers a flexible set of tools that can be scaled from individual
    solutions to enterprise initiatives. To ensure successful implementation, it is
    crucial to establish a clear purpose for using the platform and involve relevant
    stakeholders in the planning process. This involves defining the platform’s purpose,
    creating a comprehensive plan, and focusing on key pillars, such as digital guardrails,
    processes, organization enablement, and portfolio. By following a structured approach
    and setting strong foundations, organizations can effectively execute and scale
    their transformation initiatives using Power Platform. In the next section, we
    will explore how to get started with your ability to prototype and deploy rapidly
    with Power Platform.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform提供了一套灵活的工具，可以从个人解决方案扩展到企业级项目。为确保成功实施，明确使用平台的目的并让相关利益相关者参与规划过程至关重要。这包括定义平台的目的、制定全面计划，并关注关键支柱，如数字护栏、流程、组织赋能和组合。通过遵循结构化方法并建立坚实的基础，组织可以有效地执行和扩展其使用Power
    Platform的转型计划。在下一节中，我们将探讨如何利用Power Platform的快速原型设计和部署能力开始。
- en: Rapid prototyping and deployment with Power Platform
  id: totrans-77
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Power Platform进行快速原型设计和部署
- en: One of the greatest and most widely adopted concepts with the Power Platform
    ecosystem is the ability to fail fast! Yes, this is not a bad thing at all. The
    ability to rapidly prototype and create meaningful solutions quickly is an enormously
    powerful tool. It does, however, involve a shift in mindset and culture. We cannot
    look at this the same way we did before when we used custom code for everything
    and applied these intensely complex release cycles and testing patterns. Sure,
    there is a time and a place for all of this but not all problems are at the same
    level of complexity and therefore not all solutions are made equally.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform生态系统中最伟大且最广泛采用的概念之一是快速失败的能力！是的，这根本不是一件坏事。快速原型设计和快速创建有意义的解决方案的能力是一个极其强大的工具。然而，这确实涉及思维方式和文化的转变。我们不能用以前使用自定义代码做所有事情和采用这些高度复杂的发布周期和测试模式的方式来看待这个问题。当然，所有这些都有其时间和地点，但并非所有问题都具有相同的复杂程度，因此并非所有解决方案都是同等重要的。
- en: In real life, we do not apply the same level of attention and detail to every
    problem or requirement because the fact of the matter is that not all of them
    are as important or critical as the next. If a problem is weighted with higher
    risk or danger, that problem will get far more attention than one that carries
    less risk. This concept is applied to the creation and management of solutions
    as well.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中，我们不会对每个问题或需求都投入相同程度的时间和细节，因为事实是，并非所有问题都像下一个问题那样重要或关键。如果一个问题的风险或危险更高，那么这个问题的关注度将远高于风险较低的问题。这个概念也应用于解决方案的创建和管理。
- en: 'Let us take two use cases:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看两个用例：
- en: A kudos solution that allows people to send their colleagues free coffee vouchers
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种赞美的解决方案，允许人们向同事发送免费的咖啡券
- en: The health and safety logging solution, where issues from all around the building
    are reported to prevent accidents
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 健康和安全日志解决方案，通过报告整个建筑中的问题来预防事故
- en: If the kudos solution breaks, the worst thing that will happen is people will
    not be able to send each other free coffee vouchers. However, if the health and
    safety solution goes down, a critical issue is ignored, and someone is hurt, there
    are legal ramifications, and someone is at risk.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果赞美解决方案出现问题，最糟糕的情况是人们将无法互相发送免费的咖啡券。然而，如果健康和安全解决方案出现故障，一个关键问题被忽视，有人受伤，将产生法律后果，有人面临风险。
- en: These two solutions may be built in a comparable manner and the kudos solution
    may even have more technical complexity but the health and safety solution is
    more important. Therefore, the kudos solution will not require as much support
    and architectural rigor as the health and safety solution.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个解决方案可能以相似的方式构建，赞美解决方案甚至可能具有更多的技术复杂性，但健康和安全解决方案更为重要。因此，赞美解决方案不需要像健康和安全解决方案那样多的支持和架构严谨性。
- en: Solution sizing
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案规模
- en: A fantastic method of managing or cataloging what people create is the concept
    of solution sizing. This concept can be used at any phase of the application conception
    and creation of your solution. Because you can create millions of assets with
    Power Platform, there must be some commonalities in structure and therefore, there
    could be a way solutions are placed into buckets to be categorized. As an example,
    we could break down our solutions into small, medium, or large, or you may have
    bronze, silver, or gold. You may even have more than three categories, such as
    extra small, small, medium, large, or extra-large. There are so many methods to
    achieve this, and it will depend on what people want to build.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 管理或编目人们所创造内容的一个绝妙方法是解决方案规模的概念。这个概念可以在应用构思和解决方案创建的任何阶段使用。因为你可以使用Power Platform创建数百万个资产，所以在结构和组织上必然存在一些共性，因此，解决方案可能被放入不同的类别中以便分类。例如，我们可以将我们的解决方案分为小型、中型或大型，或者你可能拥有青铜、银色或金色等级别。你可能甚至有超过三个类别，如超小型、小型、中型、大型或超大型。有如此多的方法可以实现这一点，这取决于人们想要构建的内容。
- en: 'There are also characteristics for each size, which will then dictate what
    bracket a solution may fall into. This will also depend on how your organization
    works and the current IT governance. Let us look at a method of sizing your solutions.
    There are many criteria, some of which are as follows:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 每个规模都有其特性，这将决定解决方案可能落入哪个类别。这还将取决于你的组织运作方式和当前的IT治理。让我们看看一种衡量解决方案规模的方法。有许多标准，其中一些如下：
- en: '| **Category** | **Small** | **Medium** | **Large** |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| **类别** | **小型** | **中型** | **大型** |'
- en: '| **Data** | Public | Internal | Private |'
  id: totrans-89
  prefs: []
  type: TYPE_TB
  zh: '| **数据** | 公共 | 内部 | 私密 |'
- en: '| **Support** | By Maker | By Team | By IT |'
  id: totrans-90
  prefs: []
  type: TYPE_TB
  zh: '| **支持** | 由制作者提供 | 由团队提供 | 由IT部门提供 |'
- en: '| **No** **of Users** | <50 | 51 – 500 | 501 + |'
  id: totrans-91
  prefs: []
  type: TYPE_TB
  zh: '| **用户数量** | <50 | 51 – 500 | 501 + |'
- en: '| **Criticality** | Low | Medium | High |'
  id: totrans-92
  prefs: []
  type: TYPE_TB
  zh: '| **重要性** | 低 | 中等 | 高 |'
- en: '| **ROI** | Low | Medium | High |'
  id: totrans-93
  prefs: []
  type: TYPE_TB
  zh: '| **投资回报率** | 低 | 中等 | 高 |'
- en: '| **Tech Complexity** | Low | Medium | high |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
  zh: '| **技术复杂性** | 低 | 中等 | 高 |'
- en: 'Table 5.1: Solution sizing criteria used when determining the impact of a solution'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 表5.1：确定解决方案影响时使用的解决方案规模标准
- en: You may find that when reviewing your solution, it may be a mixture of small
    and medium, in which case it is best to select the larger of the two options as
    this will drive best practice once again and is more likely to respect the scale
    framework you put in place in the future.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能会发现，在审查您的解决方案时，它可能是小型和中型的混合体，在这种情况下，最好选择两者中较大的一个，因为这将再次推动最佳实践，并且更有可能尊重您未来设置的规模框架。
- en: A great way to build out all solutions is to rapidly prototype the smaller solutions
    based on the architectural best practice and then grow them into larger solutions
    should they require it.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 构建所有解决方案的一个好方法是快速原型设计较小的解决方案，基于架构最佳实践，然后根据需要将其扩展为更大的解决方案。
- en: Applying architectural best practices
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用架构最佳实践
- en: 'It is especially important to define what architectural best practice looks
    like to you and your team of makers. This is not just about how to build a Canvas
    app; it is much larger and focuses on how to best prepare the platform for solutions
    that will be built using the tools provided. One of the most important questions
    to ask is this: “Where will we be storing data?”'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 对于您和您的制作者团队来说，定义什么是架构最佳实践尤为重要。这不仅仅关乎如何构建Canvas应用程序；它涉及更广泛的内容，侧重于如何为使用提供的工具构建的解决方案最佳地准备平台。需要提出的最重要的问题之一是：“我们将把数据存储在哪里？”
- en: As you will discover later in this chapter, data is always the most important
    part of the architectural process. It is key to start thinking about where your
    data is and how best to provide it to the makers. We often refer to this as data
    micro-servicing, and when this is done well, it creates a robust mechanism for
    many solutions to be built on top of it. Starting any solution design and development
    process with a well-thought-out data architecture is a great way to mitigate problems
    later on.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您在本章后面会发现的那样，数据始终是架构过程最重要的部分。关键是要开始考虑您的数据在哪里以及如何最好地提供给制作者。我们通常将此称为数据微服务，当做得好的时候，它为在之上构建许多解决方案提供了一个稳健的机制。以精心设计的架构数据开始任何解决方案设计和开发过程是避免以后出现问题的好方法。
- en: One of the most well defined enterprise architecture approaches is a focus on
    the concept of “Ecosystem Architecture”, which focuses on splitting the various
    solution and tool types into groups known as digital neighborhoods.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 最明确的企业架构方法之一是关注“生态系统架构”的概念，它侧重于将各种解决方案和工具类型划分为被称为数字社区的组别。
- en: You can see in *Figure 5**.3* that there is a clear distinction between core
    business systems and the Application Portfolio neighborhood. The solutions built
    then leverage data from the core business systems or generate data and store this
    in Dataverse. This is an extremely scalable reference ecosystem architecture and
    creates a platform for rapid prototyping and scalable solutions.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在*图5.3*中看到，核心业务系统和应用程序组合社区之间存在明显的区别。当时构建的解决方案利用了核心业务系统的数据或生成数据，并将其存储在Dataverse中。这是一个极具可扩展性的参考生态系统架构，为快速原型设计和可扩展解决方案提供了一个平台。
- en: '![Figure 5.3: A reference ecosystem developed by the Cloud Lighthouse team](img/B21080_05_003.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图5.3：Cloud Lighthouse团队开发的参考生态系统](img/B21080_05_003.jpg)'
- en: 'Figure 5.3: A reference ecosystem developed by the Cloud Lighthouse team'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.3：Cloud Lighthouse团队开发的参考生态系统
- en: The definition and management of a strong ecosystem architecture are essential
    to the wider utilization and adoption of Power Platform. Many areas of the ecosystem
    can draw from both data and functionality within the platform, making it more
    useful and overall, a critical part of any digital ecosystem.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 强大生态系统架构的定义和管理对于Power Platform的更广泛利用和采用至关重要。生态系统的许多领域都可以从平台内的数据和功能中汲取，使其更加有用，并且总体上成为任何数字生态系统的关键部分。
- en: Prototyping in an Agile manner
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 以敏捷方式原型设计
- en: Often, the culture and approach of prototyping can be a little daunting because
    we are so used to being bound into this extremely long and complicated development
    process. The idea with this approach is not everything needs to be kept, and sometimes
    the solution is less complex than it seems. Prototyping allows us to create more
    freely and again, fail fast. If something does not work well on the platform,
    that is fine, move on.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，原型设计的文化和方法可能会有些令人畏惧，因为我们已经习惯了被束缚在这个极其漫长且复杂的发展过程中。这种方法的想法并不是所有东西都需要保留，有时解决方案比看起来要简单。原型设计允许我们更自由地创造，再次，快速失败。如果某个东西在平台上表现不佳，那没关系，继续前进。
- en: We have seen a huge shift since the inception of low-code tools such as Power
    Platform, where developers/makers are far more inclined to just try something
    out and then either build on it or move on, depending on the outcome. Before we
    even think about technology, we need to understand that this is a cultural shift
    and are you and your organization ready to think like this?
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 自从低代码工具（如Power Platform）的诞生以来，我们已经看到了巨大的转变，开发者/制作者更有可能只是尝试一下，然后根据结果决定是继续构建还是继续前进。在我们甚至考虑技术之前，我们需要理解这是一个文化转变，你和你所在的组织是否准备好以这种方式思考？
- en: There are several delivery methodologies that can be leveraged to deliver projects
    in an organization. The two main delivery methodologies, as indicated in *Figure
    5**.4*, are Waterfall and Agile.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种交付方法可以在组织中用来交付项目。如图*图5.4*所示，两种主要的交付方法是瀑布和敏捷。
- en: 'The Waterfall delivery methodology is a linear project management approach
    consisting of sequential phases: requirements analysis, system design, implementation,
    testing, deployment, and maintenance. Each phase must be completed before moving
    to the next, making it ideal for projects with clear, stable requirements. However,
    this method is less adaptable to changes during development.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 瀑布交付方法论是一种线性项目管理方法，由一系列连续的阶段组成：需求分析、系统设计、实施、测试、部署和维护。每个阶段必须完成才能进入下一个阶段，这使得它非常适合具有明确、稳定需求的项目。然而，这种方法在开发过程中对变化的适应性较差。
- en: The Agile delivery methodology is an iterative approach to project management
    that emphasizes flexibility, collaboration, and customer feedback. It allows for
    continuous improvement and adaptation throughout the development process. Agile
    is well suited for projects where requirements are likely to change or where a
    quick time to market is essential.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 敏捷交付方法论是一种迭代的项目管理方法，它强调灵活性、协作和客户反馈。它允许在整个开发过程中持续改进和适应。敏捷非常适合那些需求可能发生变化或对快速上市时间至关重要的项目。
- en: '![Figure 5.4: The difference between Waterfall and Agile project delivery methodologies](img/B21080_05_004.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图5.4：瀑布和敏捷项目交付方法之间的区别](img/B21080_05_004.jpg)'
- en: 'Figure 5.4: The difference between Waterfall and Agile project delivery methodologies'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.4：瀑布和敏捷项目交付方法之间的区别
- en: It is best to engage in a change management function or advisory function before
    this is released to the world because the approach is incredibly Agile. Organizations
    locked into a waterfall methodology often struggle with the speed and change of
    the solution build process. It is important to ensure people are ready to think
    differently.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在将此方法公之于众之前，最好参与变更管理功能或咨询功能，因为这种方法极其敏捷。陷入瀑布方法的组织往往在解决方案构建过程的速度和变化上挣扎。确保人们准备好以不同的方式思考是很重要的。
- en: The hyper-agility strategy advocates for rapid prototyping and deployment using
    low-code/no-code tools within the Power Platform ecosystem. It emphasizes the
    importance of embracing failure as a natural part of the development process and
    encourages a shift in mindset and culture. The strategy emphasizes that not all
    solutions require the same level of complexity and attention and introduces the
    concept of solution sizing to categorize solutions based on factors such as data,
    support, number of users, criticality, **return on investment** (**ROI**), and
    tech complexity. Additionally, it highlights the significance of applying architectural
    best practices, particularly focusing on data micro-servicing, and defining a
    scalable architecture for rapid prototyping. The strategy also promotes a cultural
    shift toward a more Agile approach to solution building and suggests engaging
    change management or advisory functions before implementing these practices to
    ensure the organization is ready for the transition. In the next section, we will
    explore methods of unlocking the potential to grow solutions with Power Platform.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 超级敏捷策略提倡在Power Platform生态系统中使用低代码/无代码工具进行快速原型设计和部署。它强调接受失败作为开发过程中的自然部分的重要性，并鼓励心态和文化的转变。该策略强调，并非所有解决方案都需要相同程度的复杂性和关注，并引入了解决方案规模的概念，根据数据、支持、用户数量、关键性、投资回报率（ROI）和技术复杂性等因素对解决方案进行分类。此外，它强调了应用架构最佳实践的重要性，特别是关注数据微服务，并为快速原型设计定义可扩展的架构。该策略还促进了一种向更敏捷的解决方案构建方法的文化转变，并建议在实施这些实践之前，参与变革管理或咨询功能，以确保组织为转型做好准备。在下一节中，我们将探讨利用Power
    Platform增长解决方案的方法。
- en: In this section, we emphasize the importance of embracing failure as a natural
    part of the development process within the Power Platform ecosystem. It introduces
    the concept of solution sizing to categorize solutions based on factors such as
    data, support, number of users, criticality, ROI, and tech complexity. Additionally,
    it highlights the significance of applying architectural best practices, particularly
    focusing on data micro-servicing and defining a scalable architecture for rapid
    prototyping. We also promote a cultural shift toward a more agile approach to
    solution building and suggest engaging change management or advisory functions
    before implementing these practices to ensure the organization is ready for the
    transition. In the next section, we will explore mechanisms for unlocking the
    potential to grow solutions in the Power Platform ecosystem.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们强调在Power Platform生态系统中接受失败作为开发过程中的自然部分的重要性。它引入了解决方案规模的概念，根据数据、支持、用户数量、关键性、ROI和技术复杂性等因素对解决方案进行分类。此外，它强调了应用架构最佳实践的重要性，特别是关注数据微服务，并为快速原型设计定义可扩展的架构。我们还促进了一种向更敏捷的解决方案构建方法的文化转变，并建议在实施这些实践之前，参与变革管理或咨询功能，以确保组织为转型做好准备。在下一节中，我们将探讨在Power
    Platform生态系统中解锁解决方案增长潜力的机制。
- en: Unlocking solutions with Power Platform
  id: totrans-117
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用Power Platform解锁解决方案
- en: Power Platform is designed to hyperscale! What this means is that it is designed
    and built in such a way that allows for multiple solutions of multiple types to
    be created with and on the tools provided by the platform. In fact, this is the
    primary and core design of many Microsoft (Microsoft Office or Microsoft Azure)
    tools. They are fantastic platforms that have grown hugely and have stood the
    test of time. Office alone has 1.2 billion users and is growing. Power Platform
    is built on top of the Microsoft productivity stack and therefore actually leverages
    tools within this stack.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform被设计成超规模扩展！这意味着它被设计和构建成允许使用平台提供的工具创建多种类型的多重解决方案。事实上，这是许多微软（Microsoft
    Office或Microsoft Azure）工具的主要和核心设计。它们是出色的平台，已经取得了巨大的增长，并经受了时间的考验。仅Office就有12亿用户，并且还在增长。Power
    Platform建立在微软生产力堆栈之上，因此实际上利用了该堆栈中的工具。
- en: There are organizations out there with quite literally hundreds and thousands
    of assets built with Power Platform. They have rich ecosystems of these assets
    that help their business run and help people and teams be more productive. It
    is incredible to look at some of these organizations’ centers for enablement and
    to witness the growth of the platform.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 现实中确实存在一些组织，它们使用Power Platform构建了成百上千的资产。这些资产构成了丰富的生态系统，有助于企业运营，并帮助人们和团队提高生产力。观察一些组织的能力中心，并见证平台的发展，真是令人难以置信。
- en: In comparison, when you look at tools such as Purview and see the number of
    Excel documents that exist in your Office ecosystem, it is not surprising that
    Power Platform has had such wide adoption. People are interested in solving problems.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，当你查看Purview等工具并看到你的Office生态系统中存在的Excel文档数量时，Power Platform的广泛应用也就不足为奇了。人们感兴趣的是解决问题。
- en: Starting with an idea
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从一个想法开始
- en: Ideation is one of the most underestimated and most powerful tools an organization
    can promote when leveraging platforms such as Power Platform. The concept of ideation
    involves thinking outside of the box and giving people the ability to do so. The
    more ideas that are generated, the more opportunity there will be to fulfill these
    ideas using Power Platform.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 创意是组织在利用Power Platform等平台时可以推广的最被低估且最有力的工具之一。创意的概念涉及跳出思维定式，并赋予人们这样做的能力。产生的想法越多，使用Power
    Platform实现这些想法的机会就越多。
- en: There are many methods that drive ideation, and we will explore two simple methods
    that really can get any organization going rapidly. These two methods are lightly
    summarized in *Figure 5**.5*, indicating the differences between active and passive
    ideation.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多推动创意的方法，我们将探讨两种真正能够快速推动任何组织发展的简单方法。这两种方法在*图5.5*中简要总结，显示了主动创意和被动创意之间的差异。
- en: '![Figure 5.5: Highlighting the difference between passive and active ideation](img/B21080_05_005.jpg)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图5.5：突出显示被动创意和主动创意之间的差异](img/B21080_05_005.jpg)'
- en: 'Figure 5.5: Highlighting the difference between passive and active ideation'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.5：突出显示被动创意和主动创意之间的差异
- en: Passive ideation
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 被动创意
- en: This is the simplest yet rewarding mechanism to drive ideation. It fosters a
    culture of idea generation without being held to account. Passive ideation gives
    people the opportunity to capture and store any ideas they may have in a central
    location. These ideas are explored once every *X* time and then either retired
    or approved. You can download solutions made from Power Platform tools, or you
    could even simply use a Microsoft form that is made available to the organization.
    There are tools that even allow other people to upvote your idea instead of capturing
    a new one themselves.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这是推动创意最简单但最有回报的机制。它培养了一种无需承担责任的想法生成文化。被动创意给人们提供了一个机会，将他们可能有的任何想法存储在中央位置。这些想法每隔*X*次就会被探索一次，然后要么被淘汰要么被批准。你可以下载由Power
    Platform工具制作的解决方案，或者你也可以简单地使用组织提供的Microsoft表单。甚至有工具允许其他人对你的想法进行点赞，而不是自己捕捉新的想法。
- en: Active ideation
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 主动创意
- en: This is a less generic form of ideation and is far more intentional and targeted.
    It is usually conducted with a number of people over a set period of around four
    to eight hours. There are tools that help facilitate these types of engagement,
    such as the Microsoft Catalyst program. The process works in an interactive collaborative
    style where people come together to share their ideas, which are then formalized
    in an interactive manner and tracked into a central location as a predefined backlog.
    These are great ways to drive a group-wide adoption of Power Platform.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种不那么通用的创意形式，它更加有目的性和针对性。它通常在四到八小时的时间段内由多个人进行。有一些工具可以帮助促进这些类型的互动，例如Microsoft催化剂计划。这个过程以互动协作的方式运行，人们聚集在一起分享他们的想法，然后以互动的方式正式化，并跟踪到一个预定义的中央位置作为待办事项列表。这些都是推动Power
    Platform在团队范围内广泛采用的好方法。
- en: How to scale your idea
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何扩展你的想法
- en: Once your ideas have been captured, it is important to make them real! Often,
    it is expected that all ideas will be taken through a review process, and after
    this has been completed, the idea selected for build is then placed into an effectively
    managed backlog and created. This is a perfectly reasonable process to run, though,
    and if it works well, it creates a mechanism for other people across the organization
    to put their ideas forward for review and creation.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的想法被捕捉到，重要的是要使它们成为现实！通常，人们期望所有想法都会经过一个审查过程，完成之后，被选中的想法将被放入一个有效管理的待办事项列表中并创建出来。尽管这是一个完全合理的流程，但如果它运行良好，它将创建一个机制，让组织中的其他人可以提出他们的想法供审查和创建。
- en: A less formal method is the **minimum viable product** (**MVP**) and the **proof
    of concept** (**PoC**) approach. Both focus on the requirement of minimum effort
    for maximum output and are, in fact, great ways to scale ideas into working solutions.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 一种不太正式的方法是**最小可行产品**（**MVP**）和**概念验证**（**PoC**）方法。两者都关注以最小的努力获得最大的产出，实际上是将想法扩展到可行解决方案的绝佳方式。
- en: The MVP
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MVP
- en: This process focuses on examining the requirement and identifying key parts
    that are deemed more important than other areas. These key parts of the solution
    are then built as an MVP, which means the solution can run and fulfill some core
    requirements but is not complete. These MVPs are then used as a baseline or foundation
    to scale out at whatever pace works for your organization or team. It is important
    to architect these MVPs for scale and growth, and this is where solid and well-thought-out
    architectural best practices are important.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程侧重于审查需求并确定被认为比其他区域更重要的重要部分。然后，这些解决方案的关键部分被构建为一个最小可行产品（MVP），这意味着解决方案可以运行并满足一些核心需求，但并不完整。然后，这些MVP被用作基准或基础，以适应你组织或团队的工作节奏进行扩展。为规模和增长而设计这些MVP非常重要，这也是为什么需要坚实的、经过深思熟虑的架构最佳实践。
- en: The PoC
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PoC
- en: The PoC approach is an amazing fail-fast approach that allows the freedom of
    creativity in solution development. As an idea is selected, elements of the idea
    can be built based on best practices and pattern recognition. Certain known requirements
    fit well into several tools within Power Platform. A maker can easily try something
    out quickly in a number of ways, find the best result, and move on fast. This
    proves the concept and can then be moved into an MVP-type scenario if necessary.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: PoC方法是一种惊人的快速失败方法，它允许在解决方案开发中发挥创造力的自由。一旦选择了一个想法，就可以根据最佳实践和模式识别来构建该想法的元素。某些已知需求非常适合Power
    Platform中的几个工具。制作者可以轻松快速地尝试多种方法，找到最佳结果，并迅速前进。这证明了概念，如果需要，可以将其移动到MVP类型的场景。
- en: The data up approach – preparing your solution for scale
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据驱动方法——为你的解决方案准备扩展
- en: One of the most important design principles that we recommend looking at is
    the **data up approach**. This is a great way to drive a best practice to solution
    design and the way you develop the assets on top of data.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们推荐你关注的最重要设计原则之一是**数据驱动方法**。这是一种推动解决方案设计最佳实践和你在数据之上开发资产的方式的绝佳方法。
- en: This approach comes from a number of scenarios where solutions have not been
    approved to be productionized, and this is mostly down to data and security. Most
    makers have no idea that Excel is not a suitable place to store personally identifiable
    information, and in most cases, this is true for SharePoint lists. Both tools
    are incredibly powerful; however, both serve a specific purpose.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法来自许多解决方案尚未获得批准进行生产化的场景，这主要归因于数据和安全性。大多数制作者都不知道Excel不是存储个人身份信息的合适地方，在大多数情况下，SharePoint列表也是如此。这两个工具都非常强大；然而，它们都服务于特定的目的。
- en: In *Figure 5**.6*, you can see the data-driven design approach where we always
    start with data. Starting with data allows you to lay a solid foundation for your
    solution and then build upward into your technical asset. If your data is reviewed
    and approved, then whatever you build on top of that will respect the data. This
    avoids many productionization scenarios and keeps the information security team
    happy.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图5.6*中，你可以看到数据驱动的设计方法，我们总是从数据开始。从数据开始可以让你为你的解决方案打下坚实的基础，然后向上构建你的技术资产。如果你的数据经过审查并获得批准，那么你在此基础上构建的任何东西都将尊重数据。这避免了许多生产化场景，并使信息安全团队感到满意。
- en: This approach also allows you to treat data as a microservice and build many
    assets on top of that data. It is a scalable approach to designing and building
    solutions with Power Platform.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法还允许你将数据视为一个微服务，并在其上构建许多资产。这是使用Power Platform设计和构建解决方案的可扩展方法。
- en: '![Figure 5.6: The data up approach to building solutions](img/B21080_05_006.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![图5.6：构建解决方案的数据驱动方法](img/B21080_05_006.jpg)'
- en: 'Figure 5.6: The data up approach to building solutions'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.6：构建解决方案的数据驱动方法
- en: Power Platform is designed for seamless scalability, allowing for the creation
    of multiple solutions of several types. By leveraging tools within the Microsoft
    productivity stack, it enables organizations to build rich ecosystems of assets
    that help streamline business processes and enhance productivity. Ideation plays
    a crucial role in driving solution development, with passive and active ideation
    methods fostering a culture of idea generation. Once ideas are captured, they
    can be scaled into working solutions through processes such as MVP and PoC approaches.
    Furthermore, the data up approach is emphasized to ensure that solutions are designed
    and developed on a solid foundation of data, promoting security and scalability.
    In the next section, we will be exploring the gradual expansion and integration
    with Power Platform.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform旨在实现无缝的可扩展性，允许创建多种类型的多个解决方案。通过利用Microsoft生产力堆栈中的工具，它使组织能够构建丰富的资产生态系统，帮助简化业务流程并提高生产力。创意在推动解决方案开发中扮演着关键角色，被动和主动的创意方法促进了创意生成文化。一旦捕捉到想法，它们可以通过MVP和PoC方法等流程扩展为可行的解决方案。此外，强调数据驱动方法以确保解决方案是在数据坚实的基础之上设计和开发的，从而促进安全性和可扩展性。在下一节中，我们将探讨逐步扩展与Power
    Platform的集成。
- en: Gradual expansion and integration with Power Platform
  id: totrans-145
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 逐步扩展与Power Platform的集成
- en: Sometimes, solutions get adopted more widely than planned. This is both a wonderful
    thing and a tough endeavor. Sometimes, your solution size is not at all what was
    anticipated, and sometimes, the thing you make is so impressive that more and
    more people want to use it. Congratulations, but now, we need to learn to grow
    our solutions so they can scale.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，解决方案的采用范围会比计划中更广泛。这既是件好事，也是一项艰巨的任务。有时，你的解决方案大小根本不是你所预期的，有时，你所创造的东西如此令人印象深刻，以至于越来越多的人想要使用它。恭喜你，但现在，我们需要学会让我们的解决方案成长，以便它们可以扩展。
- en: Luckily, Power Platform does cater to solutions that may need to be scaled out.
    Sadly, this is not always as easy as it seems, and it will come down to your architectural
    best practices implemented in your business. It is better to plan upfront than
    try to retrofit scalability later.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，Power Platform确实为可能需要扩展的解决方案提供了支持。遗憾的是，这并不像看起来那么简单，它将取决于你在业务中实施的架构最佳实践。提前规划总比事后尝试改造可扩展性要好。
- en: 'Often, people build things with Power Platform and complain about speed or
    scalability, but this is not always the platform’s fault; this is down to the
    way the solution is designed. As an example, using SharePoint lists as a highly
    relational data structure and storing thousands of records will not scale, as
    this is not what it is built for. Or, adding thousands of controls to a canvas
    app and then wondering why it is not running at an optimum pace, is simple: the
    more controls, the more memory is used and the slower the app will run. It is
    logical. So, how do we ensure that what we create is scalable?'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，人们使用Power Platform构建东西，并抱怨速度或可扩展性，但这并不总是平台的问题；这取决于解决方案的设计方式。例如，使用SharePoint列表作为高度相关的数据结构并存储数千条记录将无法扩展，因为这不是它所构建的。或者，向画布应用程序添加数千个控件，然后
    wonder why它没有以最佳速度运行，很简单：控件越多，使用的内存越多，应用程序运行得越慢。这是合乎逻辑的。那么，我们如何确保我们创建的东西是可扩展的呢？
- en: Understanding your solution and its impact
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解你的解决方案及其影响
- en: Impact is always a difficult metric to define, and what does “impact” even mean?
    Impact can be different in many organizations, and it is important for you to
    define what this means. What defines an impactful solution? It is not always about
    ROI from a monetary perspective; it could have to do with how the solution impacts
    the lives of the people using it. If a solution goes down, how are people and
    your organization affected? The more negative the impact of a solution, the more
    critical and impactful the solution is. This may sound slightly tough to absorb,
    but think about it for a second. If a solution that is on Power Platform is mistakenly
    taken offline and people and your business are negatively impacted, that means
    the solution is of high importance.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 影响力总是难以定义的指标，那么“影响力”究竟是什么意思呢？在不同的组织中，影响力可能有所不同，因此定义它对您来说很重要。什么定义了一个有影响力的解决方案？这并不总是关于货币回报率；它可能与解决方案如何影响使用者的生活有关。如果一个解决方案崩溃了，人们和你的组织会受到怎样的影响？解决方案的影响越负面，解决方案就越关键、越有影响力。这听起来可能有点难以理解，但请稍作思考。如果一个在Power
    Platform上的解决方案被错误地关闭，人们和你的业务受到负面影响，这意味着该解决方案非常重要。
- en: You may have other metrics and rules that define this, and this may differ per
    organization. In *Figure 5**.7*, you can observe a basic summary of three methods
    to define the impact of a solution. It will be important to compare this metric
    to your solution sizing rules and ensure that there is alignment. Understanding
    the criticality of the solution will require consistent user feedback.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能有其他指标和规则来定义这一点，并且这可能会因组织而异。在**图5.7**中，你可以观察到定义解决方案影响的三种基本方法的概述。将此指标与你的解决方案规模规则进行比较，并确保一致，这将非常重要。理解解决方案的关键性需要持续的用户反馈。
- en: '![Figure 5.7: Methods to define and measure the impact of a solution](img/B21080_05_007.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图5.7：定义和衡量解决方案影响的方法](img/B21080_05_007.jpg)'
- en: 'Figure 5.7: Methods to define and measure the impact of a solution'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.7：定义和衡量解决方案影响的方法
- en: By listening and responding to the voices of the users and customers, you can
    understand the solution’s impact from their perspective and discover their needs,
    expectations, and preferences. You can also build trust and loyalty with the users
    and customers and increase their adoption and advocacy of the solution. This all
    links up to your ecosystem’s user feedback processes that you define in your ecosystem
    enablement program.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 通过倾听和回应用户和客户的声音，你可以从他们的角度理解解决方案的影响，发现他们的需求、期望和偏好。你还可以与用户和客户建立信任和忠诚度，并增加他们对解决方案的采用和倡导。这一切都与你在生态系统赋能计划中定义的生态系统用户反馈流程相联系。
- en: Architectural best practices
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建筑最佳实践
- en: If the architectural best practice framework is adhered to, it is much easier
    to scale a solution more widely, especially if the data is in a reliable, robust
    data storage facility. It can be difficult to scale a solution built on Excel
    and SharePoint to tools such as Dataverse and SQL Server. This is because, typically,
    the data is stored and managed in a unique way. The data model may need to be
    completely redesigned to get the data into a tool that can scale more widely,
    and this will require work.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 如果遵循建筑最佳实践框架，则更易于将解决方案扩展得更广泛，尤其是如果数据存储在可靠、健壮的数据存储设施中。将基于Excel和SharePoint构建的解决方案扩展到Dataverse和SQL
    Server等工具可能会很困难。这是因为，通常情况下，数据是以独特的方式进行存储和管理的。可能需要完全重新设计数据模型，以便将数据导入可以更广泛扩展的工具，这将需要工作。
- en: The data up approach pushes makers to think about the scalability of their solution
    and the potential adoption from the wider business. Building on free data structures
    may be fine as a PoC but later this will not scale, hence the need to understand
    the potential impact of the solution being created. It is highly recommended that
    guidance is created around this concept and is shared widely with the making community
    as it will prove invaluable in future Power Platform solution endeavors.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 数据驱动方法促使开发者思考其解决方案的可扩展性和更广泛业务潜在采用的可能性。基于免费数据结构作为原型验证可能没问题，但后来这不会扩展，因此需要了解正在创建的解决方案的潜在影响。强烈建议围绕这一概念制定指导方针，并将其广泛与制作社区分享，因为它将在未来的Power
    Platform解决方案努力中证明其价值。
- en: If your architectural best practices are respected and followed, it becomes
    much easier to “upgrade” solutions as they are more widely adopted.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的建筑最佳实践得到尊重并遵循，那么随着它们被更广泛地采用，升级解决方案会变得更容易。
- en: Your scale framework – putting in the controls
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的扩展框架——实施控制
- en: Your scale framework will be defined by the controls and processes you implement
    when running your ecosystem enablement program. A scale framework is a set of
    rules that are defined “on purpose” and promote solutions through the framework
    into a well-defined micro-ecosystem.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你的扩展框架将由你在运行生态系统赋能计划时实施的控件和流程来定义。扩展框架是一套“有目的地”定义的规则，通过框架将解决方案推进到定义明确的微观生态系统。
- en: As an example, if a solution is built in the default environment and is on SharePoint,
    should *everyone* be accessing that solution? Well, the answer is, do you, as
    IT, support *everything* built in the default environment? (You should not; that
    is like supporting every Excel workbook that gets created.)
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果一个解决方案是在默认环境中构建的，并且位于SharePoint上，那么**每个人**都应该访问该解决方案吗？答案是，作为IT人员，你是否支持在默认环境中构建的**所有**内容？（你不应该；这就像支持创建的每个Excel工作簿一样。）
- en: The framework should focus on progressing well-adopted solutions to a well-defined,
    well-managed production environment with the correct ALM, governance, and compliance.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 该框架应专注于将广泛采用的良好解决方案推进到定义明确、管理良好的生产环境，并具备正确的ALM、治理和合规性。
- en: The way to think about a scaling framework is the more you can do upfront to
    mitigate massive changes in the solution as it scales, the better. Doing it the
    most appropriate way the first time is often easier said than done as not all
    makers will understand how to scale.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑扩展框架的方式是，你能在前期做更多的事情来减轻解决方案在扩展过程中的巨大变化，这会更好。第一次就做最合适的事情往往说起来容易做起来难，因为并非所有创造者都明白如何进行扩展。
- en: 'A suggestion in this scenario is to start thinking about how to help makers
    understand how to build for scale. As *Figure 5**.8* suggests, many organizations
    implement controls around these scenarios, such as the following:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，一个建议是开始思考如何帮助创造者理解如何为扩展而构建。正如*图5**.8*所示，许多组织在这些场景周围实施控制措施，如下所示：
- en: '**Solution registration**: When a maker has created something, they then need
    to register their solution in a central catalog. This helps admins understand
    what has been created and its intent.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案注册**：当创造者创建了一些东西后，他们需要将他们的解决方案在中央目录中注册。这有助于管理员了解已经创建的内容及其意图。'
- en: '**Ideation process**: The ideation process allows people within the organization
    to leave an idea. This allows admins and backlog managers/workforce planners to
    pick off ideas, get them correctly architected, and build for scale.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构思流程**：构思流程允许组织内的人员留下一个想法。这允许管理员和待办事项经理/人力资源规划者挑选想法，正确地进行架构设计，并为扩展而构建。'
- en: '**Design review process**: Makers of all types can register a design for review
    and advice. This can be easily managed within the CoE Starter Kit using the innovation
    backlog solution, or a custom Power App can be built to facilitate this.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计审查流程**：所有类型的创造者都可以注册一个设计以供审查和建议。这可以通过使用创新待办事项解决方案在CoE启动套件中轻松管理，或者可以构建一个定制的Power
    App来促进这一过程。'
- en: '![Figure 5.8: Three key aspects of managing scalable solutions](img/B21080_05_008.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图5.8：管理可扩展解决方案的三个关键方面](img/B21080_05_008.jpg)'
- en: 'Figure 5.8: Three key aspects of managing scalable solutions'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.8：管理可扩展解决方案的三个关键方面
- en: There are many ways to manage your scale framework, but it is important to align
    this to your architectural best practices.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 管理你的扩展框架有许多方法，但重要的是要将其与你的架构最佳实践相一致。
- en: The excerpt discusses the challenges and considerations involved in scaling
    solutions on Power Platform. It emphasizes the importance of understanding the
    impact of the solution, following architectural best practices, and implementing
    a scale framework with controls and processes. The key points include the need
    to plan for scalability upfront, understand the impact of the solution on users
    and the organization, adhere to architectural best practices, and implement a
    scale framework to promote well-managed production environments. The excerpt also
    highlights the importance of user feedback and suggests implementing controls
    for solution registration, ideation, and design review to manage the scale framework
    effectively. In the next section, we will explore the ability to execute and scale
    your transformative initiatives.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 该摘录讨论了在Power Platform上扩展解决方案所涉及到的挑战和考虑因素。它强调了理解解决方案影响、遵循架构最佳实践以及实施带有控制和流程的扩展框架的重要性。关键点包括提前规划可扩展性、理解解决方案对用户和组织的影响、遵守架构最佳实践以及实施扩展框架以促进良好的生产环境管理。摘录还强调了用户反馈的重要性，并建议实施解决方案注册、构思和设计审查的控制措施，以有效管理扩展框架。在下一节中，我们将探讨执行和扩展你的转型计划的能力。
- en: Driving tangible results and proving value
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 驱动可衡量的成果和证明价值
- en: In every organization, when deploying Power Platform, there are questions about
    results and value. There is always discussion of ROI, tangible benefits, and value
    when delivering a Power Platform solution. Why have we done this? How does this
    benefit us? These are good questions! There is no point in implementing a strategic
    platform if we do not play to the strengths of the platform and get some seriously
    strong benefits.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个组织中，当部署Power Platform时，都会对结果和价值有所疑问。在交付Power Platform解决方案时，总会讨论投资回报率（ROI）、可衡量的利益和价值。我们为什么要这样做？这对我们有什么好处？这些问题都是很好的问题！如果我们不发挥平台的优势，得不到一些真正强大的好处，那么实施战略平台就没有意义。
- en: There is a discussion to be had in parallel to this and that is the fact that
    Power Platform should not be seen or perceived as a tactical platform. Once viewed
    as a strategic platform, it is way easier to have benefit discussions, and vice
    versa. It is a bit of a chicken and egg scenario… which one came first?
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 与此同时，有一个需要讨论的问题，那就是 Power Platform 不应被视为或被感知为战术平台。一旦被视为战略平台，进行收益讨论就更容易了，反之亦然。这是一个有点鸡生蛋的问题……哪个先来？
- en: Tactical versus strategic
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 战术与战略
- en: When you talk about a tactical platform, we refer to it as something temporary
    that will solve a specific set of problems or point scenarios in one go. It is
    not the whole show; it is only a part of it and will be replaced. A lot of the
    time, this is something prebuilt that you buy off the shelf or something that
    is specifically created for a targeted outcome. These tactical solutions often
    create technical debt in organizations but are great for the immediate need.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 当你谈论战术平台时，我们指的是一种临时性的东西，它可以一次性解决一组特定的问题或场景。它不是全部；它只是其中的一部分，将被取代。很多时候，这可能是现成的、你从货架上购买的东西，或者是为了特定结果而专门创建的东西。这些战术解决方案在组织中往往会产生技术债务，但对于即时需求来说非常有效。
- en: As *Figure 5**.9* indicates, strategic platforms are typically platforms that
    are put in place with the wider business strategy in mind. They are normally implemented
    to solve more than one problem and often need to go through a much longer approval
    cycle as they are much larger and pricier.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如**图 5**.9 所示，战略平台通常是考虑到更广泛的商业战略而建立的平台。它们通常被实施来解决多个问题，并且由于规模更大、价格更高，往往需要经过一个更长的审批周期。
- en: '![Figure 5.9: Tactical versus strategic platforms](img/B21080_05_009.jpg)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.9：战术平台与战略平台](img/B21080_05_009.jpg)'
- en: 'Figure 5.9: Tactical versus strategic platforms'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.9：战术平台与战略平台
- en: Each of the preceding has its own value, however, when looking at the way Power
    Platform is leveraged and adopted, for it to work well and to be scalable, it
    needs to be seen and established as a strategic platform. Most of the time, it
    starts as a tactical solution and then grows into something much more in demand
    and strategic.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 前述每一项都有自己的价值，然而，当查看 Power Platform 的利用和采用方式时，为了使其有效并具有可扩展性，它需要被视为一个战略平台。大多数时候，它开始作为一个战术解决方案，然后发展成为需求更大、更具战略性的东西。
- en: The value
  id: totrans-181
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 价值
- en: When reviewing the value, often, it is done on a per use case basis (e.g., if
    we make this app and save *X* hours, we save *X* money). This is fine, but that
    is still a very tactical approach; it may not work for the wider platform.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在审查价值时，通常是基于每个用例进行的（例如，如果我们开发这个应用程序并节省 *X* 小时，我们就能节省 *X* 美元）。这很好，但这仍然是一个非常战术性的方法；它可能不适用于更广泛的平台。
- en: Let us backtrack a bit! Let us compare Microsoft Office! Do you ask every person
    in your business to log the ROI of the spreadsheet they made in Excel? Or the
    email they send? Probably not, because the entire platform may have already gone
    through a value-based overview and it was quickly determined that it is a useful
    tool, and it is needed for business productivity. So, the platform is strategic.
    Its value is widely understood and it is core to the function of most organizations.
    There may be other parts of the office that require a discussion so organizations
    may dial up or dial down the license depending on what is needed.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下！让我们比较一下微软办公软件！你是否要求你的业务中的每个人记录他们在 Excel 中制作的电子表格的回报率？或者他们发送的电子邮件？可能不会，因为整个平台可能已经通过基于价值的概述，并且很快确定它是一个有用的工具，并且对于业务生产力是必需的。因此，该平台是战略性的。其价值被广泛理解，并且对于大多数组织的功能至关重要。可能会有其他办公室部分需要讨论，因此组织可能会根据需要调整许可证。
- en: Because Power Platform at its non-premium level is included within a lot of
    the Office / Microsoft 365 **Stock Keeping Units (SKU)**, it’s seen as a business
    productivity tool. This tool is then connected to many of the tools in the Office
    stack, such as OneDrive and SharePoint. So, the value is absorbed by the Office
    license.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Power Platform 在其非高级水平上包含在许多 Office / Microsoft 365 **库存单位 (SKU)** 中，它被视为一种业务生产力工具。这个工具随后连接到
    Office 堆栈中的许多工具，例如 OneDrive 和 SharePoint。因此，价值被 Office 许可证吸收。
- en: This has spoiled us as a user base. No other low-code tool does this! They all
    charge for this. So, the moment we must have the value discussion and talk about
    connecting to more robust data sources and APIs, we get upset because what we
    have had is “free.”
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经宠坏了我们这个用户群体。没有其他低代码工具能这样做！它们都为此收费。所以，当我们必须进行价值讨论并谈论连接到更健壮的数据源和API时，我们会感到不满，因为我们所拥有的一直是“免费”的。
- en: So, this is about proving the value of using the premium tools in Power Platform
    and driving it into a more scalable, premium-focused strategic and supported platform
    within an organization. Often, simply moving data to a preferred data source and
    derisking that data is enough.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这是关于证明在Power Platform中使用优质工具的价值，并将其推动到组织内一个更可扩展、更注重优质战略和支持的平台。通常，仅仅将数据移动到首选数据源并降低数据风险就足够了。
- en: We often place ROI and value based on quantitative metrics, such as time and
    money, because that is what hits the bottom line. How many hours did this flow
    save me? How much money did I save? However, we often forget that there are hundreds
    of these invisible metrics that we do not count and are important and can also
    be quantified, such as risk!
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们常常根据定量指标，如时间和金钱来衡量ROI和价值，因为这是影响底线的东西。这个流程为我节省了多少小时？我节省了多少金钱？然而，我们常常忘记还有数百个这样的无形指标我们没有计算，但它们很重要，也可以量化，比如风险！
- en: Your data is valuable! Respect it!
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您的数据很有价值！请尊重它！
- en: Your data is a digital representation of you, your business, and your customers!
    It is extremely valuable and should be cared for and looked after. If this is
    the case, why do so many organizations disrespect their data? There is always
    legacy data in places that shall not be mentioned. Data exfiltration is rife in
    so many businesses. Often, we focus on doing what is cheap and not what is right.
    As an example, storing our personal and confidential data in public SharePoint
    lists because it is easy! Or, leaving critical data in an Excel document on someone’s
    desktop. This just does not cut it, and, in fact, many organizations have been
    in trouble because of the lack of respect for data.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 您的数据是您、您的业务和您的客户的数字表示！它极其宝贵，应该得到妥善照顾和保护。如果这样，为什么那么多组织不尊重他们的数据？总有一些不应提及的地方有遗留数据。许多企业中数据泄露现象普遍。我们常常只关注做便宜的事情，而不是正确的事情。例如，因为方便而将我们的个人和机密数据存储在公共SharePoint列表中。或者，将关键数据留在某人的桌面上的Excel文档中。这根本不够，事实上，许多组织因为对数据的忽视而陷入困境。
- en: There are many aspects that need to be considered when respecting data. Not
    respecting your customer’s data is not respecting your customer. There have been
    instances in the past, and names cannot be mentioned for legal reasons, where
    organizations have been caught out when not managing and storing their customers’
    data correctly. In particular, fines have been issued under the **General Data
    Protection Regulation** (**GDPR**). When building solutions with Power Platform,
    it is important to place value on the data. Placing data in proper scalable premium
    data storage facilities, such as SQL Server or Dataverse, removes risk from that
    data. This is a fact!
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 尊重数据时需要考虑许多方面。不尊重客户的资料就是没有尊重客户。过去已经有过一些案例，由于法律原因不能提及具体名称，一些组织因未能正确管理和存储客户数据而被发现。特别是，根据**通用数据保护条例**（**GDPR**）发出了罚款。在用Power
    Platform构建解决方案时，重视数据非常重要。将数据存放在适当的可扩展的优质数据存储设施中，如SQL Server或Dataverse，可以降低数据风险。这是一个事实！
- en: Your ROI value framework
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 您的回报价值框架
- en: It’s good to take your solutions through a value framework to see if they are
    worth building and if they require the same level of rigor as the other solutions
    in your ecosystem., In fact, it’s an even better idea to have these solutions
    registered somewhere where you can actually track and manage value. However, it’s
    important not to confuse the value of a solution and the outright value of the
    platform.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 通过价值框架审视您的解决方案，看看它们是否值得构建，以及它们是否需要与您生态系统中的其他解决方案相同的严谨性，这是一个好主意。事实上，将这些解决方案注册在可以实际跟踪和管理价值的地方，甚至是一个更好的主意。然而，重要的是不要混淆解决方案的价值和平台本身的绝对价值。
- en: In many organizations, part of the platform being considered strategic is to
    implement an ROI and value framework. This will allow you to benchmark solutions
    based on their value and ROI. It is not all about money and time saving; there
    can be many metrics, such as staff retention, effort, well-being, risk management,
    and business impact. Your framework should consider both qualitative and quantitative
    metrics that drive your organization forward. Put weightings on them; in your
    business, derisking something is worth way more than time spent. This is up to
    you to decide! There is no fixed rule and depending on who you speak to in your
    organization, you will get different answers.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多组织中，被考虑为战略的一部分的平台实施是建立一个投资回报率和价值框架。这将允许您根据其价值来基准测试解决方案。这不仅仅关乎金钱和时间节省；可能有许多指标，例如员工留存率、努力程度、福祉、风险管理以及商业影响。您的框架应考虑推动您组织前进的定量和定性指标。对它们进行加权；在您的业务中，降低风险比花费的时间更有价值。这取决于您自己决定！没有固定的规则，并且根据您在组织中的谈话对象，您将得到不同的答案。
- en: The excerpt discusses the importance of viewing Power Platform as a strategic
    tool rather than just a tactical one. It emphasizes the need to recognize the
    value of the platform beyond just immediate ROI, highlighting the significance
    of strategic implementation and long-term benefits. Additionally, it underscores
    the importance of respecting and effectively managing data within the platform
    to mitigate risks and maximize its value. The need for implementing a value framework
    and considering both quantitative and qualitative metrics to measure the overall
    impact of solutions within the organization is also highlighted.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 该摘录讨论了将 Power Platform 视为一个战略工具而非仅仅是战术工具的重要性。它强调了认识到平台价值不仅仅在于即时投资回报率（ROI）的必要性，突出了战略实施和长期效益的重要性。此外，它还强调了尊重和有效管理平台内数据以降低风险和最大化其价值的重要性。还强调了在组织内实施价值框架和考虑定量和定性指标来衡量解决方案整体影响的需求。
- en: Summary
  id: totrans-195
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In conclusion, to fully leverage the potential of Power Platform, you need to
    implement it with an unobstructed vision, respect and manage your data, and measure
    the value and impact of your solutions using a comprehensive framework. By doing
    so, you will be able to create innovative, scalable, and secure solutions that
    empower your organization and drive it forward. We hope this chapter has given
    you some insights and guidance on how to view and use Power Platform as a strategic
    tool. Power Platform is an extremely powerful set of tools that can be used to
    solve business problems of varying types and sizes; it’s not only used to build
    simple, small apps. If organizations are to drive Power Platform adoption across
    their business, it is important to understand the state of the digital ecosystem
    and undertake a proper ecosystem enablement program, consisting of several workstreams
    that focus on the platform, people, process, and portfolio of solutions. Following
    the guidance in this chapter will help you get started in creating a thriving
    Power Platform ecosystem filled with enabled makers and useful solutions. In the
    next chapter, we will focus on orchestrating success and some of the key considerations
    that organizations will need to understand to drive wider adoption of Power Platform.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，为了充分利用 Power Platform 的潜力，您需要以无障碍的视野实施它，尊重和管理您的数据，并使用一个全面的框架来衡量您解决方案的价值和影响。通过这样做，您将能够创建创新、可扩展和安全的解决方案，从而赋予您的组织力量并推动其发展。我们希望这一章节为您提供了如何将
    Power Platform 视为一个战略工具进行观察和使用的见解和指导。Power Platform 是一套极其强大的工具，可用于解决各种类型和规模的企业问题；它不仅用于构建简单的小型应用。如果组织要推动其业务中对
    Power Platform 的采用，了解数字生态系统的状态并开展一个适当的生态系统启用计划至关重要，该计划包括几个关注平台、人员、流程和解决方案组合的工作流。遵循本章的指导将帮助您开始创建一个充满启用创造者和有用解决方案的繁荣的
    Power Platform 生态系统。在下一章中，我们将关注成功协调和组织实施更广泛采用 Power Platform 的关键考虑因素。
