- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Power Platform Solutions for Digital Transformation
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数字化转型解决方案的Power Platform
- en: 'In the dynamic landscape of digital transformation, organizations increasingly
    acknowledge the pivotal role of the Power Platform in fostering innovation and
    facilitating growth. Comprising Microsoft technologies such as Power BI, Power
    Apps, and Power Automate, the Power Platform presents unparalleled potential for
    crafting solutions that tackle intricate business challenges. However, the effective
    integration and utilization of the Power Platform demands a strategic approach,
    considering the organization’s maturity level and the alignment of diverse stakeholders.
    In this chapter, we will explore the following:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字化转型动态环境中，组织越来越认识到Power Platform在促进创新和推动增长中的关键作用。Power Platform由Power BI、Power
    Apps和Power Automate等Microsoft技术组成，为解决复杂商业挑战提供了无与伦比的可能性。然而，有效集成和利用Power Platform需要战略方法，考虑到组织的成熟度水平和不同利益相关者的协调一致。在本章中，我们将探讨以下内容：
- en: Key elements of stakeholder analysis and alignment
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利益相关者分析和协调的关键要素
- en: Using the Capability Maturity Model Integration (CMMI) to guide successful digital
    transformation
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用能力成熟度模型集成（CMMI）指导成功的数字化转型
- en: Strategies for stakeholder buy-in
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获得利益相关者支持的策略
- en: Establishing fusion team collaboration
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立融合团队协作
- en: Stakeholder analysis and alignment – driving successful Power Platform adoption
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利益相关者分析和协调 – 推动Power Platform的成功采用
- en: Exploring the Capability Maturity Model Integration (CMMI)
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索能力成熟度模型集成（CMMI）
- en: The **Capability Maturity Model Integration (CMMI)** serves as a framework for
    evaluating an organization’s maturity in managing processes and practices. This
    model provides a roadmap to understand an organization’s readiness and capacity
    to effectively utilize the Power Platform. The CMMI outlines five levels of maturity,
    each indicating the organization’s progress in adopting best practices and achieving
    success. The following figure shows the levels of maturity according to the CMMI
    and the respective abilities associated with each level. Leaders should be aware
    of where their organizations sit within this spectrum.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**能力成熟度模型集成（CMMI）**作为评估组织在管理和实践方面成熟度的框架。此模型提供了一条路线图，以了解组织有效利用Power Platform的准备情况和能力。CMMI概述了五个成熟度级别，每个级别都表明组织在采用最佳实践和取得成功方面的进展。以下图显示了根据CMMI的成熟度级别及其各自的能力。领导者应意识到他们的组织在这个谱系中的位置。'
- en: '![Figure 8.1 – CMMI maturity levels](img/B21080_08_001.jpg)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图8.1 – CMMI成熟度级别](img/B21080_08_001.jpg)'
- en: Figure 8.1 – CMMI maturity levels
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1 – CMMI成熟度级别
- en: '**Initial Level**: At this stage, organizations have encountered sporadic successes
    with the Power Platform, albeit without a cohesive strategy or governance. The
    focus is on exploring capabilities rather than systematically utilizing them.
    Stakeholders might be unaware of the platform’s potential, hindering its broader
    adoption.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始级别**：在这一阶段，组织在Power Platform上取得了零星的成功，尽管没有统一的策略或治理。重点是探索能力，而不是系统地利用它们。利益相关者可能不知道平台潜力，阻碍了其更广泛的采用。'
- en: '**Repeatable Level**: Progressing to this stage involves implementing initial
    controls and recognizing widely used applications. However, a sense of unregulated
    usage may persist. Stakeholders are beginning to realize the platform’s value,
    but there’s a need for more structured approaches.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可重复级别**：进入这一阶段涉及实施初始控制和识别广泛使用的应用程序。然而，可能仍然存在无序使用的感觉。利益相关者开始意识到平台的价值，但需要更多结构化的方法。'
- en: '**Defined Level**: Organizations at this level standardize repeatable practices
    and achieve measurable success in digital transformation. Establishing a Power
    Platform **Center of Excellence** (**CoE**) team becomes crucial, indicating a
    growing understanding of the platform’s impact. However, organic growth might
    still overshadow formal strategies.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义级别**：处于这一级别的组织标准化可重复的实践，并在数字化转型中取得可衡量的成功。建立一个Power Platform **卓越中心（CoE**）团队变得至关重要，这表明对平台影响的了解日益增长。然而，有机增长可能仍然掩盖了正式策略。'
- en: '**Capable Level**: Moving further along the maturity curve, organizations standardize
    practices and leverage Power Platform capabilities for broader business transformation.
    Enterprise-critical applications and integrations depend on the platform, and
    Platform Champions emerge, creating vital communication channels.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能力级别**：沿着成熟度曲线进一步前进，组织标准化实践并利用Power Platform的能力进行更广泛的企业转型。企业关键应用程序和集成依赖于该平台，并涌现出平台冠军，创建重要的沟通渠道。'
- en: '**Efficient Level**: At the pinnacle of the maturity model, organizations have
    harnessed the Power Platform’s potential to transform mission-critical functions.
    An expert community thrives, and fusion teams emerge to integrate legacy capabilities
    with modern cloud architecture, ensuring optimal efficiency.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效级别**：在成熟度模型的顶峰，组织已经利用了Power Platform的潜力来转型关键任务功能。一个专家社区蓬勃发展，融合团队出现以整合遗留能力与现代云架构，确保最佳效率。'
- en: Strategic stakeholder analysis
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**战略利益相关者分析**'
- en: Stakeholder analysis is a crucial element in the Power Platform adoption journey,
    as it helps organizations identify and engage key individuals and groups affected
    by the initiative. Effective stakeholder engagement ensures buy-in, support, and
    alignment throughout the process. Identifying the stakeholders begins with understanding
    their roles, responsibilities, and expectations.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**利益相关者分析是Power Platform采用旅程中的关键要素，因为它帮助组织识别和参与受该倡议影响的个人和群体。有效的利益相关者参与确保在整个过程中获得认可、支持和一致。识别利益相关者始于了解他们的角色、责任和期望**。'
- en: '**Executive Leadership**: These decision-makers hold the power to allocate
    resources and approve strategic initiatives. Demonstrating the Power Platform’s
    potential to drive transformation aligns their interests with the adoption goals.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高管领导**：这些决策者拥有分配资源和批准战略倡议的权力。展示Power Platform推动转型的潜力使他们的利益与采用目标一致。'
- en: '**Business Units and Departments**: Different departments have unique needs
    and challenges. Engaging with leaders and teams across these units helps tailor
    solutions that directly address their pain points, fostering enthusiasm for the
    platform.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**业务单元和部门**：不同的部门有着独特的需求和挑战。与这些单元的领导和团队进行互动有助于量身定制解决方案，直接解决他们的痛点，从而激发对平台的热情。'
- en: '**IT Department**: The IT team plays a critical role in implementation, integration,
    and support. Collaborating with IT early on ensures a smooth adoption process
    and addresses any concerns related to security, compliance, and governance.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IT部门**：IT团队在实施、集成和支持中扮演着关键角色。尽早与IT合作确保顺利的采用过程，并解决与安全、合规和治理相关的任何问题。'
- en: '**End Users**: These are the individuals who will directly interact with the
    solutions built on the Power Platform. Involving end users in the design and testing
    phases enhances usability and drives engagement.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最终用户**：这些人将直接与基于Power Platform构建的解决方案互动。在设计和测试阶段涉及最终用户可以增强可用性并推动参与度。'
- en: '**Power Platform CoE Team**: This team, at the Defined and Capable levels,
    becomes the driving force behind best practices and knowledge sharing. Their input
    is invaluable in guiding stakeholders and ensuring alignment with platform objectives.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Platform CoE团队**：这个团队在定义和能力级别上成为最佳实践和知识共享背后的驱动力。他们的意见在指导利益相关者和确保与平台目标一致方面极为宝贵。'
- en: Alignment strategies for each maturity level
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**每个成熟级别的对齐策略**'
- en: The journey to achieving Power Platform maturity involves a series of strategic
    alignment stages, each building progressively upon the last. In the Initial Level
    alignment, the aim is to generate early enthusiasm and support by highlighting
    quick wins and internal success stories, underscoring the platform’s potential.
    Moving to the Repeatable Level alignment, the emphasis shifts to developing governance
    and engaging IT to ensure sustainable, secure use of the platform.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**实现Power Platform成熟度的旅程涉及一系列战略对齐阶段，每个阶段都是在前一个基础上逐步构建的。在初始级别对齐中，目标是通过对突出快速胜利和内部成功故事来激发早期热情和支持，强调平台潜力。转向可重复级别对齐时，重点转向发展治理并吸引IT以确保平台的可持续、安全使用**。'
- en: As organizations reach the Defined Level alignment, collaborating with the CoE
    and gaining executive backing becomes essential, focusing on standardization and
    strategic resource allocation. In the Capable Level alignment, the Power Platform’s
    significance in critical operations and integration is highlighted, with Platform
    Champions playing a more central role in decision-making. Finally, at the Efficient
    Level alignment, the focus is on fully leveraging the platform to revolutionize
    core functions, utilizing an expert community to showcase advanced applications
    and achieving seamless integration with legacy systems. Each level represents
    a stepping stone toward fully aligning stakeholders with the Power Platform’s
    transformative potential.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当组织达到定义层级对齐时，与CoE合作并获得高管支持变得至关重要，专注于标准化和战略资源分配。在能力层级对齐中，强调了Power Platform在关键操作和集成中的重要性，平台冠军在决策中扮演更中心的角色。最后，在高效层级对齐中，重点是充分利用平台来革命性改变核心功能，利用专家社区展示高级应用，并实现与遗留系统的无缝集成。每个层级都是朝着与Power
    Platform的转型潜力完全对齐的垫脚石。
- en: '**Initial Level Alignment**: At this stage, the focus is on raising awareness
    among stakeholders. Demonstrating quick wins and illustrating the potential of
    the Power Platform can help secure initial support. Highlighting success stories
    within the organization showcases the platform’s capabilities.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始层级对齐**：在此阶段，重点是提高利益相关者的意识。展示快速胜利和展示Power Platform的潜力有助于获得初步支持。在组织内突出成功案例可以展示平台的能力。'
- en: '**Repeatable Level Alignment**: As organizations progress, aligning stakeholders
    involves showcasing the platform’s impact on efficiency and productivity. Developing
    a governance framework and involving IT in discussions addresses concerns related
    to unregulated usage.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可重复层级对齐**：随着组织的进步，利益相关者对齐涉及展示平台对效率和生产力的影响。制定治理框架并让IT参与讨论解决与无监管使用相关的担忧。'
- en: '**Defined Level Alignment**: Here, the focus shifts to collaboration with the
    CoE team. Engaging executive leadership becomes crucial to secure resources for
    CoE initiatives. Demonstrating the CoE’s role in standardizing practices can further
    align stakeholders.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义层级对齐**：在此，重点转向与CoE团队的协作。参与高管领导层变得至关重要，以确保为CoE项目提供资源。展示CoE在标准化实践中的作用可以进一步对齐利益相关者。'
- en: '**Capable Level Alignment**: At this stage, emphasizing the platform’s strategic
    impact is key. Engaging with Platform Champions and involving them in decision-making
    reinforces alignment. Demonstrating how critical applications and integrations
    rely on the platform reinforces its significance.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能力层级对齐**：在此阶段，强调平台的战略影响至关重要。与平台冠军合作并让他们参与决策强化了对齐。展示关键应用和集成如何依赖于平台，进一步强化了其重要性。'
- en: '**Efficient Level Alignment**: The emphasis is on showcasing the Power Platform’s
    ability to transform core functions. Leveraging the expert community to showcase
    innovative use cases and integrating legacy systems reinforces the alignment of
    stakeholders at this stage.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效层级对齐**：重点在于展示Power Platform在转型核心功能方面的能力。利用专家社区展示创新用例以及整合遗留系统，强化了在此阶段利益相关者的对齐。'
- en: In the journey toward digital transformation through Power Platform adoption,
    stakeholder analysis and alignment are fundamental pillars for success. By assessing
    an organization’s maturity level using the CMMI and strategically engaging stakeholders
    at each stage, organizations can ensure that their Power Platform initiatives
    are well-structured, supported, and positioned for optimal impact. Recognizing
    the significance of stakeholders’ roles and perspectives while aligning them with
    the platform’s potential is a key driver of successful Power Platform adoption
    and, ultimately, digital transformation.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在通过采用Power Platform实现数字化转型之旅中，利益相关者分析和对齐是成功的基本支柱。通过使用CMMI评估组织的成熟度水平，并在每个阶段战略性地参与利益相关者，组织可以确保其Power
    Platform项目结构合理、得到支持，并定位以实现最佳影响。在利益相关者的角色和视角与平台潜力对齐的同时认识到其重要性，是成功采用Power Platform和最终实现数字化转型的关键驱动力。
- en: The Power Platform dream team
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Power Platform梦幻团队
- en: In the CMMI context, roles are defined within the framework of process improvement
    and organizational maturity. These roles are not specific to a particular technology
    adoption but rather focus on improving an organization’s processes and practices
    across various domains. Successful Power Platform adoption requires specific roles
    and responsibilities.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在CMMI的背景下，角色是在过程改进和组织成熟度的框架内定义的。这些角色并不特定于特定的技术采用，而是专注于改善组织在各个领域的流程和实践。成功的Power
    Platform采用需要特定的角色和职责。
- en: Executive sponsor – visionary leadership
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 执行赞助人 – 具有远见卓识的领导
- en: At the core of the dream team stands the Executive Sponsor—a beacon of high-level
    vision and values. This influential leader communicates the strategic significance
    of the Microsoft Power Platform to the entire organization. By painting a compelling
    picture of the transformation journey, they inspire buy-in and secure necessary
    resources. The Executive Sponsor serves as the driving force behind organizational
    alignment and continuous support for the adoption process.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在梦想团队的中心是执行赞助人——高级愿景和价值观的灯塔。这位有影响力的领导者向整个组织传达Microsoft Power Platform的战略意义。通过描绘令人信服的转型旅程图景，他们激发承诺并确保必要的资源。执行赞助人作为组织对采用过程的持续支持和对齐的驱动力。
- en: Success owner – nurturing business goals
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功负责人 – 培育业务目标
- en: The Success Owner shoulders the responsibility of ensuring that the organization’s
    business goals are not only acknowledged but also realized through the adoption
    process. This individual translates strategic objectives into actionable steps,
    guiding the team toward measurable outcomes. By maintaining a laser focus on business
    results, the Success Owner guarantees that the Power Platform adoption is more
    than just a technological initiative—it is a vehicle for tangible success.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 成功负责人承担确保组织业务目标不仅在过程中得到认可，而且通过采用过程得以实现的职责。这个人将战略目标转化为可执行的步骤，引导团队朝着可衡量的成果前进。通过保持对业务成果的激光般专注，成功负责人保证Power
    Platform的采用不仅仅是一个技术倡议——它是实现具体成功的工具。
- en: Champions – catalysts of evangelism
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 拥护者 – 宣传的催化剂
- en: Champions emerge as vital catalysts of Power Platform evangelism. These passionate
    advocates help create a circle of influence within the organization, actively
    promoting the platform’s potential. Their role extends beyond enthusiastic endorsement;
    they serve as a bridge between end users and the adoption team. Champions provide
    critical feedback, sharing insights on what works and what doesn’t, ultimately
    shaping the adoption strategy.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 拥护者成为Power Platform宣传的重要催化剂。这些充满热情的倡导者帮助在组织内部创造一个影响力圈，积极推广平台潜力。他们的角色不仅限于热情的推荐；他们作为最终用户和采用团队之间的桥梁。拥护者提供关键反馈，分享有效和无效的见解，最终塑造采用策略。
- en: Training lead – knowledge dissemination maestro
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 培训负责人 – 知识传播大师
- en: The Training Lead takes center stage in managing and communicating training
    content about the Power Platform. Whether through internal resources or external
    vendors, this role ensures that knowledge dissemination is organized, effective,
    and accessible. By equipping users with the necessary skills, the Training Lead
    empowers them to harness the Power Platform’s capabilities confidently, thereby
    enhancing engagement and adoption.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 培训负责人在管理和传达关于Power Platform的培训内容方面扮演着核心角色。无论是通过内部资源还是外部供应商，这个角色确保知识传播是有组织的、有效的和可访问的。通过为用户提供必要的技能，培训负责人使他们能够自信地利用Power
    Platform的能力，从而增强参与度和采用率。
- en: Department leads (stakeholders) – advocates of engagement
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 部门负责人（利益相关者） – 参与倡导者
- en: Department Leads are pivotal stakeholders who bridge the gap between the Power
    Platform and specific operational needs. Their role involves identifying how their
    respective departments can effectively leverage the platform’s features. These
    advocates of engagement align business processes with the platform’s capabilities,
    ensuring that the adoption journey addresses department-specific challenges, and
    fostering enthusiasm from the ground up.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 部门负责人是关键的利益相关者，他们架起了Power Platform和特定运营需求之间的桥梁。他们的角色包括确定各自的部门如何有效地利用平台的功能。这些参与倡导者将业务流程与平台的能力相一致，确保采用之旅解决特定部门的挑战，并从基层培养热情。
- en: Communication lead – amplifier of awareness
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 沟通负责人 – 意识的放大器
- en: Communication is the lifeblood of successful adoption, and the communication
    lead takes on the crucial responsibility of overseeing company-wide communications
    about the Power Platform. This role ensures that messages are clear, consistent,
    and aligned with the transformation narrative. By disseminating information effectively,
    the communication lead fosters a culture of open communication, dispelling myths
    and promoting understanding.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通是成功采用的生命线，沟通负责人承担着监督公司范围内关于Power Platform的沟通的至关重要的责任。此角色确保信息清晰、一致，并与转型叙事保持一致。通过有效传播信息，沟通负责人培养了一种开放沟通的文化，消除了误解并促进了理解。
- en: Power Platform admin team – guardians of technical enablement
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power Platform管理员团队 – 技术赋能的守护者
- en: The Power Platform admin team stands as the guardians of technical enablement.
    Their realm encompasses establishing an environment strategy, implementing **data
    loss prevention** (**DLP**) policies, managing users and licensing, and facilitating
    data availability through connectors, integrations, or migration. Their expertise
    provides makers with the tools they need to turn ideas into impactful solutions.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform管理员团队是技术赋能的守护者。他们的领域包括建立环境策略、实施**数据丢失预防**（**DLP**）策略、管理用户和许可，并通过连接器、集成或迁移促进数据可用性。他们的专业知识为创作者提供了将想法转化为有影响力的解决方案所需的工具。
- en: Power Platform nurture team – sowers of innovation
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power Platform培育团队 – 创新的播种者
- en: The Power Platform nurture team embodies innovation evangelists who sow the
    seeds of creativity within the organization. They organize app-in-a-day events
    and hackathons, and provide mentorship to makers. By nurturing newcomers and guiding
    them through the initial stages, the nurture team cultivates a culture where experimentation
    and learning thrive, ultimately driving the adoption of the Power Platform.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform培育团队代表了创新传教士，他们在组织中播撒创造力的种子。他们组织一天一应用活动、黑客马拉松，并为创作者提供指导。通过培育新人和引导他们通过初期阶段，培育团队营造了一个实验和学习盛行的文化，最终推动Power
    Platform的采用。
- en: The Power Platform dream team represents a harmonious ensemble of roles, each
    contributing distinct expertise to create a symphony of successful adoption. Assembling
    this team is not just a matter of organizational structure; it’s about fostering
    collaboration, alignment, and a shared commitment to driving digital transformation.
    By recognizing the value that each stakeholder brings to the table and embracing
    their unique contributions, organizations can navigate the complexities of Power
    Platform adoption with clarity, purpose, and confidence.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform梦幻团队代表了一个和谐的阵容，每个角色都贡献了独特的专业知识，创造了一个成功采用的交响乐。组建这个团队不仅仅是组织结构的问题；它关乎培养协作、对齐和共同致力于推动数字化转型。通过认识到每个利益相关者带来的价值并拥抱他们的独特贡献，组织可以清晰地、有目的地、有信心地应对Power
    Platform采用的复杂性。
- en: 'In this chapter, we explored two key aspects crucial to the successful adoption
    of the Power Platform: understanding the CMMI and assembling the Power Platform
    dream team. Through our examination of the CMMI, we gained valuable insights into
    the various maturity levels that organizations may progress through on their path
    to effectively utilizing the Power Platform. From the Initial Level, marked by
    sporadic successes without a cohesive strategy, to the Efficient Level, characterized
    by the platform’s full utilization to transform core functions, each stage presents
    distinct challenges and opportunities.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了两个对Power Platform成功采用至关重要的关键方面：理解CMMI和组建Power Platform梦幻团队。通过我们对CMMI的考察，我们获得了宝贵的见解，了解了组织在有效利用Power
    Platform的道路上可能经历的各个成熟度级别。从以缺乏连贯策略的零星成功为标志的初始级别，到以充分利用平台来转型核心功能为特征的效率级别，每个阶段都提出了独特的挑战和机遇。
- en: Additionally, we delved into the essential roles within the Power Platform dream
    team, each contributing unique expertise to facilitate successful adoption. From
    the visionary leadership of the executive sponsor to the innovation-fostering
    efforts of the Power Platform nurture team, every role plays a crucial role in
    advancing digital transformation.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还深入探讨了Power Platform梦幻团队中的关键角色，每个成员都贡献了独特的专业知识，以促进成功的采用。从执行赞助者的远见卓识领导到Power
    Platform培育团队的创新促进努力，每个角色都在推进数字化转型中发挥着至关重要的作用。
- en: It’s important to recognize that understanding the CMMI and assembling the Power
    Platform dream team are interconnected components of a comprehensive adoption
    approach. By grasping an organization’s maturity level and aligning stakeholders
    effectively, we lay the groundwork for a structured, supported, and impactful
    journey toward digital transformation.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要认识到，理解 CMMI 和组建 Power Platform 梦之队是全面采用方法中相互关联的组成部分。通过掌握组织的成熟度水平并有效地协调利益相关者，我们为结构化、受支持且具有影响力的数字化转型之旅奠定了基础。
- en: Moving ahead, the subsequent section will explore *Strategies for stakeholder
    buy-in – showcasing Power Platform’s impact*. This section is pivotal for the
    success of the Power Platform adoption journey. By effectively demonstrating the
    platform’s potential to key individuals and groups, organizations can ensure that
    their initiatives are not only well-structured but also positioned to drive substantial
    change. We’ll delve into strategies for engaging stakeholders and aligning their
    perspectives at each maturity level, thereby enhancing our understanding of navigating
    the complexities of Power Platform adoption successfully.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的部分，将探讨 *利益相关者支持策略——展示 Power Platform 的影响*。这一部分对于 Power Platform 采用之旅的成功至关重要。通过有效地向关键个人和群体展示平台潜力，组织可以确保其倡议不仅结构良好，而且能够推动实质性变革。我们将深入研究在各个成熟度级别吸引利益相关者和协调他们观点的策略，从而增强我们对成功导航
    Power Platform 采用复杂性的理解。
- en: Strategies for stakeholder buy-in – showcasing Power Platform’s impact
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利益相关者支持策略——展示 Power Platform 的影响
- en: In the journey towards digital transformation, organizations often encounter
    the need for stakeholder buy-in to effectively implement Power Platform solutions.
    These solutions, driven by citizen developers, have the potential to revolutionize
    business processes, enhance productivity, and streamline operations. However,
    for these benefits to be realized, it is crucial to secure buy-in from various
    stakeholders, ranging from executive leadership to individual contributors. This
    section delves into the strategies and approaches for gaining stakeholder buy-in
    by showcasing the impact of Power Platform across different levels of the organization.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字化转型之旅中，组织常常需要获得利益相关者的支持，以有效地实施 Power Platform 解决方案。这些由公民开发者推动的解决方案，有潜力彻底改变业务流程，提高生产力和简化运营。然而，为了实现这些好处，从高管领导到个人贡献者，获得各利益相关者的支持至关重要。本节深入探讨了通过展示
    Power Platform 在组织不同层面的影响，获得利益相关者支持的策略和途径。
- en: The Dynamics of stakeholder buy-in
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利益相关者支持的动态
- en: 'Citizen developers, individuals who possess domain expertise but may not be
    traditionally associated with IT roles, form the cornerstone of Power Platform’s
    transformative potential. However, since these individuals report to managers
    who are vested in their primary responsibilities, the process of securing buy-in
    becomes multifaceted. The challenge lies in convincing executives, managers, and
    individual contributors to recognize the value of Power Platform and allocate
    time and resources to its implementation:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 公民开发者，他们拥有领域专业知识，但可能与传统 IT 角色不直接相关，是 Power Platform 变革潜力的基石。然而，由于这些个人向对其主要职责有投入的管理者汇报，获得支持的过程变得复杂多样。挑战在于说服高管、经理和个人贡献者认识到
    Power Platform 的价值，并为其实施分配时间和资源：
- en: '**Executive buy-in**: To engage executive leadership, it is essential to translate
    the potential of Power Platform into tangible business value. Executives are often
    motivated by factors such as cost reduction, increased efficiency, and competitive
    advantage. By presenting data-driven projections that demonstrate how Power Platform
    can lead to substantial cost savings, streamlined processes, and enhanced customer
    experiences, you can create a compelling case for executive buy-in. Additionally,
    highlighting success stories and real-world examples can illustrate the platform’s
    transformative impact on a strategic level. Executive buy-in is instrumental in
    driving transformative initiatives. To secure this crucial support for Power Platform
    adoption, one of the most compelling arguments centers around the substantial
    financial gains it can yield. The evolution of low-code development, exemplified
    by Power Platform, has dramatically reshaped the application development market.
    This section delves into how showcasing Power Platform’s impact on financial gains,
    backed by statistics on the remarkable growth of low-code development, can resonate
    with executive leaders.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高层支持**：为了吸引高层领导的关注，将Power Platform的潜力转化为可衡量的商业价值至关重要。高层领导通常受成本降低、提高效率和竞争优势等因素的驱动。通过展示基于数据的预测，说明Power
    Platform如何导致重大成本节约、流程简化以及客户体验提升，你可以为高层领导创造一个有说服力的案例。此外，突出成功故事和现实世界的例子可以展示平台在战略层面的变革性影响。高层支持对于推动变革性举措至关重要。为了确保对Power
    Platform采用的这一关键支持，最有力的论点之一是它能够带来的巨大财务收益。以Power Platform为例的低代码开发的演变，已经极大地重塑了应用开发市场。本节深入探讨了如何通过展示Power
    Platform对财务收益的影响，以及基于低代码开发显著增长的数据，来引起高层领导的共鸣。'
- en: '**Manager buy-in**: Managers are responsible for the productivity and performance
    of their teams. They are concerned with optimizing processes and ensuring that
    resources are utilized efficiently. When seeking manager buy-in, emphasize how
    Power Platform solutions can save valuable time and empower teams to focus on
    strategic tasks. Showcasing how automation, data integration, and self-service
    capabilities can alleviate repetitive tasks and enable managers to make data-driven
    decisions can resonate strongly. Additionally, stressing the potential for managers
    to become champions of innovation within their departments can encourage their
    support.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理层支持**：管理者负责其团队的生产力和绩效。他们关注优化流程并确保资源得到有效利用。在寻求管理层支持时，强调Power Platform解决方案如何节省宝贵时间并赋予团队专注于战略任务的能力。展示自动化、数据集成和自助服务功能如何减轻重复性任务并使管理者能够做出基于数据的决策，可以产生强烈共鸣。此外，强调管理者在其部门内成为创新倡导者的潜力，可以鼓励他们的支持。'
- en: '**Individual buy-in**: For individual contributors, the prospect of contributing
    to the creation of apps, flows, and chatbots presents exciting opportunities for
    learning and personal growth. By highlighting the platform’s user-friendly interface
    and the potential for acquiring valuable technical skills, you can pique the interest
    of those who are eager to expand their horizons. Showcasing success stories of
    individuals who have transitioned from being end users to citizen developers can
    inspire others to embrace the platform with enthusiasm. While showcasing the positive
    impact of Power Platform is essential, it’s equally important to address potential
    concerns and uncertainties. People often fear change, and the introduction of
    new technologies can trigger apprehensions about job security, changes in responsibilities,
    and disruptions to established routines. By proactively addressing these concerns
    and illustrating how Power Platform’s implementation aligns with the organization’s
    goals, you can foster a sense of security and encourage a smoother transition.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个人支持**：对于个人贡献者来说，参与创建应用程序、流程和聊天机器人的前景为学习和个人成长提供了令人兴奋的机会。通过强调平台的用户友好界面和获得有价值的技能的潜力，你可以激发那些渴望拓展视野的人的兴趣。展示个人从终端用户转变为公民开发者的成功故事可以激励他人以热情拥抱平台。虽然展示Power
    Platform的积极影响是至关重要的，但同样重要的是解决潜在的担忧和不确定性。人们常常害怕变革，新技术的引入可能会引发对工作安全、责任变化和既定常规中断的担忧。通过积极解决这些担忧并说明Power
    Platform的实施如何与组织目标一致，你可以培养一种安全感并鼓励更平稳的过渡。'
- en: Short-term and long-term impacts
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 短期和长期影响
- en: When gaining stakeholder buy-in, it’s crucial to discuss both short-term and
    long-term impacts. Highlight how Power Platform can quickly address immediate
    pain points and provide rapid returns on investment. Simultaneously, discuss the
    platform’s long-term potential to catalyze ongoing innovation, adaptability, and
    agility within the organization. Demonstrating how the platform can grow with
    the organization and serve as a foundation for future advancements can resonate
    with stakeholders who are concerned about sustainability.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在获得利益相关者支持时，讨论短期和长期影响至关重要。强调Power Platform如何快速解决即时痛点并提供快速的投资回报。同时，讨论平台长期潜力激发组织持续创新、适应性和敏捷性。展示平台如何与组织共同成长并作为未来进步的基础，可以引起对可持续性担忧的利益相关者的共鸣。
- en: Securing stakeholder buy-in for Power Platform initiatives is a pivotal aspect
    of the digital transformation journey. By tailoring your approach to the unique
    motivations and concerns of executives, managers, and individual contributors,
    you can build a coalition of support that propels the platform’s adoption and
    success. By showcasing Power Platform’s transformative impact, addressing concerns,
    and emphasizing the learning and growth opportunities it offers, you can navigate
    the intricacies of stakeholder engagement and set the stage for a successful digital
    transformation journey.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 获得利益相关者对Power Platform项目的支持是数字化转型旅程中的一个关键方面。通过调整你的方法以适应高管、经理和个别贡献者的独特动机和担忧，你可以建立一个支持联盟，推动平台的采用和成功。通过展示Power
    Platform的变革性影响，解决担忧，并强调它提供的学习和成长机会，你可以应对利益相关者参与的复杂性，并为成功的数字化转型旅程奠定基础。
- en: The paradigm shift – the rise of low-code development and its financial impact
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 范式转变——低代码开发的兴起及其财务影响
- en: Traditional application development has been synonymous with complex coding,
    extensive development cycles, and high costs. The emergence of low-code development
    platforms, epitomized by Power Platform, has revolutionized this landscape. Low-code
    platforms empower citizen developers to create functional applications with minimal
    coding knowledge, significantly reducing the time and resources required for development.
    This paradigm shift aligns perfectly with executive goals of efficiency and cost
    reduction.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的应用程序开发一直与复杂的编码、漫长的开发周期和高成本同义。以Power Platform为代表的低代码开发平台的兴起，彻底改变了这一格局。低代码平台赋予公民开发者使用最少编码知识创建功能应用的能力，显著减少了开发所需的时间和资源。这种范式转变与高管追求的效率和成本降低目标完美契合。
- en: To underscore the potential financial gains from Power Platform, consider the
    explosive growth of the low-code development market. By 2030, over 85% of new
    enterprise apps will be built with low-code or no-code, up from under 25% in 2020\.
    AI-driven tools will further speed up development, automating nearly 50% of repetitive
    coding tasks. This growth is indicative of the increasing recognition and adoption
    of low-code platforms as organizations seek streamlined and cost-effective ways
    to develop applications.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为了强调Power Platform带来的潜在财务收益，考虑低代码开发市场的爆炸性增长。到2030年，超过85%的新企业应用将使用低代码或无代码构建，而2020年这一比例不到25%。AI驱动的工具将进一步加快开发速度，自动化近50%的重复性编码任务。这种增长表明，随着组织寻求简化和成本效益高的应用开发方式，低代码平台越来越受到认可和采用。
- en: Furthermore, studies have shown that low-code development can lead to substantial
    savings. Organizations adopting low-code platforms are reported to achieve up
    to a 90% reduction in application development time compared to traditional methods.
    This accelerated development process directly translates into cost savings by
    minimizing labor and resource expenditures. Moreover, the agility provided by
    low-code platforms allows organizations to respond rapidly to market changes and
    emerging opportunities, further enhancing their financial resilience.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，研究表明，低代码开发可以带来显著的节省。采用低代码平台的组织据报道，与传统方法相比，应用程序开发时间可减少高达90%。这种加速的开发过程通过最小化劳动力和资源支出直接转化为成本节约。此外，低代码平台提供的敏捷性允许组织迅速应对市场变化和新兴机会，进一步增强了它们的财务弹性。
- en: Power Platform’s contribution – translating potential to reality
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power Platform的贡献——将潜力转化为现实
- en: Power Platform, as a prominent player in the low-code arena, offers a compelling
    case for executive buy-in by presenting demonstrable results. Share case studies
    and success stories from organizations that have harnessed Power Platform to develop
    applications in record time, significantly cutting down development costs. Highlight
    instances where citizen developers, with minimal technical backgrounds, have created
    impactful solutions that directly contributed to revenue growth or operational
    efficiency.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 作为低代码领域的领军人物，Power Platform 通过展示可证明的结果，为高管支持提供了一个令人信服的案例。分享那些利用 Power Platform
    在创纪录的时间内开发应用程序、显著降低开发成本的组织案例研究和成功故事。突出那些技术背景有限的公民开发者如何创建有影响力的解决方案，这些解决方案直接促进了收入增长或运营效率。
- en: When engaging with executives, frame the discussion around how Power Platform’s
    low-code capabilities directly align with their financial objectives. Emphasize
    the reduction in development time, associated cost savings, and the ability to
    rapidly respond to market demands. Present the statistics on low-code growth as
    evidence of a widespread shift towards platforms such as Power Platform, underscoring
    its relevance in the current business landscape.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当与高管交流时，将讨论的重点放在 Power Platform 的低代码能力如何直接与他们的财务目标相一致。强调开发时间的减少、相关的成本节约以及快速响应市场需求的灵活性。以低代码增长统计数据作为证据，表明广泛转向如
    Power Platform 这样的平台，强调其在当前商业环境中的相关性。
- en: Securing executive buy-in for Power Platform can be significantly bolstered
    by showcasing its impact on financial gains. The rise of low-code development
    platforms has reshaped the application development market, offering organizations
    the potential for remarkable cost savings and agility. By presenting statistics
    on the growth of low-code development, backed by real-world success stories of
    Power Platform implementations, you can paint a compelling picture of its financial
    impact. Aligning the platform’s capabilities with executive goals and highlighting
    its potential to drive substantial returns on investment positions, Power Platform
    is an invaluable tool for the organization’s financial success.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 通过展示 Power Platform 对财务收益的影响，可以显著增强赢得高管对 Power Platform 的支持。低代码开发平台的兴起已经重塑了应用程序开发市场，为组织提供了显著的成本节约和敏捷性的潜力。通过展示低代码开发的增长统计数据，并辅以
    Power Platform 实施的真实世界成功案例，您可以描绘出一个令人信服的财务影响画面。将平台的功能与高管目标对齐，并突出其推动投资回报的潜力，Power
    Platform 是组织财务成功的重要工具。
- en: Securing citizen developers’ buy-in – showcasing Power Platform’s impact on
    career projection and growth
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 赢得公民开发者的支持 - 展示 Power Platform 对职业前景和增长的影响
- en: In today’s fast-paced business landscape, career projection and growth are paramount
    for professionals seeking to advance their skills and opportunities. For citizen
    developers – individuals who possess domain expertise but may not have traditional
    IT backgrounds – embracing the Power Platform offers a unique avenue to not only
    contribute meaningfully to their organizations but also elevate their own careers.
    This section delves into how showcasing Power Platform’s impact on career projection
    and growth, bolstered by salary statistics reflecting the robust growth of low-code
    development, can be a compelling catalyst for citizen developer buy-in.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今快节奏的商业环境中，职业前景和增长对于寻求提升技能和机会的专业人士至关重要。对于公民开发者——他们拥有领域专业知识但可能没有传统的 IT 背景——拥抱
    Power Platform 提供了一条独特的途径，不仅能够为他们的组织做出有意义的贡献，还能提升他们自己的职业生涯。本节深入探讨了如何通过展示 Power
    Platform 对职业前景和增长的影响，并辅以反映低代码开发稳健增长的薪资统计数据，成为公民开发者支持的强大催化剂。
- en: Empowering career aspirations – the Power Platform advantage
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 激发职业抱负 - Power Platform 的优势
- en: Power Platform opens doors for citizen developers by democratizing application
    development. This empowerment resonates strongly with professionals who aspire
    to expand their skill sets, embrace innovative roles, and explore new horizons
    within their organizations. By enabling them to create apps, flows, and chatbots
    with minimal coding expertise, Power Platform nurtures a culture of continuous
    learning and skill development, which is crucial for career growth in the rapidly
    evolving tech-driven landscape.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 通过民主化应用程序开发，为公民开发者打开了大门。这种赋权与渴望扩展技能集、拥抱创新角色和在组织内探索新领域的专业人士产生了强烈的共鸣。通过使他们能够以最少的编码专业知识创建应用程序、流程和聊天机器人，Power
    Platform 培养了持续学习和技能发展的文化，这对于在快速发展的技术驱动环境中职业成长至关重要。
- en: Career projection – seizing the opportunity
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 职业规划——把握机遇
- en: For citizen developers, embracing Power Platform is not only about addressing
    immediate business needs but also about capitalizing on the opportunity for career
    projection. By showcasing the platform’s potential to create valuable, user-centric
    solutions, organizations can encourage citizen developers to step into roles that
    involve innovation and leadership. Highlighting examples of individuals who started
    as end users and transitioned into impactful roles as citizen developers can inspire
    others to envision their own career progression.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对于公民开发者来说，拥抱Power Platform不仅是为了解决眼前的业务需求，也是为了利用职业规划的机会。通过展示平台创造有价值的、以用户为中心的解决方案的潜力，组织可以鼓励公民开发者进入涉及创新和领导的职位。突出那些从最终用户开始，转型为有影响力的公民开发者的个人案例，可以激励他人展望自己的职业发展。
- en: Growth in application development – statistics tell the story
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用开发增长——统计数据讲述故事
- en: The application development landscape has been significantly impacted by the
    rise of low-code platforms such as Power Platform. According to industry data,
    the low-code development market is expected to experience substantial growth,
    with a projected compound annual growth rate (CAGR) exceeding 20% over the next
    few years. This growth reflects the increasing recognition of low-code’s potential
    to accelerate development and drive digital transformation.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 应用开发领域受到了像Power Platform这样的低代码平台崛起的显著影响。根据行业数据，低代码开发市场预计将经历显著增长，预计未来几年的复合年增长率（CAGR）将超过20%。这种增长反映了低代码加速开发和推动数字化转型潜力的日益认可。
- en: Salary statistics further underscore the impact of this growth on career projection.
    Salaries for professionals with low-code development skills are on the rise, reflecting
    the demand for individuals who can leverage these platforms to create efficient
    and innovative solutions. As organizations increasingly prioritize digital transformation,
    citizen developers armed with Power Platform proficiency are well-positioned to
    become invaluable assets, driving both technical and business success.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 薪资统计数据进一步强调了这种增长对职业规划的影响。具有低代码开发技能的专业人士的薪资正在上升，反映了能够利用这些平台创建高效和创新的解决方案的个人需求。随着组织越来越重视数字化转型，掌握Power
    Platform技能的公民开发者将处于有利位置，成为推动技术和商业成功的重要资产。
- en: Cultivating a growth mindset – framing the discussion
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 培养成长心态——构建讨论框架
- en: When engaging with citizen developers, frame the discussion around how Power
    Platform can serve as a launchpad for career advancement. Illustrate how the platform’s
    user-friendly interface, coupled with its ability to rapidly create functional
    solutions, aligns perfectly with their aspirations for growth. Present the salary
    statistics on low-code professionals as tangible evidence of the industry’s recognition
    of these skills, emphasizing the potential for elevated earnings and career trajectories.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当与公民开发者互动时，围绕Power Platform如何作为职业发展的跳板来构建讨论。展示平台的用户友好界面以及其快速创建功能性解决方案的能力，如何完美地与他们的成长愿望相契合。展示低代码专业人士的薪资统计数据，作为行业对这些技能认可的有形证据，强调提高收入和职业轨迹的潜力。
- en: Elevating skill sets – empowering career growth
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提升技能组合——赋能职业成长
- en: Power Platform not only empowers citizen developers to create functional solutions
    but also equips them with a valuable skill set that can enhance their overall
    career trajectory. As organizations recognize the role citizen developers play
    in fostering innovation, these individuals can become sought-after contributors
    in cross-functional teams. The ability to conceptualize, design, and implement
    solutions using Power Platform sets them apart and positions them as key players
    in driving digital transformation initiatives.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform不仅赋予公民开发者创建功能性解决方案的能力，还为他们提供了一组宝贵的技能，这些技能可以增强他们的整体职业轨迹。随着组织认识到公民开发者对促进创新所起的作用，这些人可以成为跨职能团队中备受追捧的贡献者。使用Power
    Platform进行概念化、设计和实施解决方案的能力使他们脱颖而出，并将他们定位为推动数字化转型项目的关键玩家。
- en: Framing the discussion – navigating career growth
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建讨论框架——导航职业成长
- en: When engaging citizen developers, it’s crucial to frame the discussion around
    how Power Platform can contribute to their career growth. Emphasize the potential
    for these individuals to transition from being end users to becoming catalysts
    for change. Present the salary statistics and growth trends in the low-code development
    market as indicators of the value attached to their skill set.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当与公民开发者互动时，围绕Power Platform如何促进他们的职业成长来构建讨论至关重要。强调这些个人从终端用户转变为变革催化剂的潜力。将低代码开发市场的薪资统计数据和增长趋势作为他们技能集价值的指标。
- en: Securing buy-in from citizen developers for Power Platform is a strategic move
    that can have profound implications for an organization’s digital transformation
    journey. By showcasing the platform’s impact on career projection and growth,
    backed by compelling salary statistics and growth trends in the low-code development
    market, organizations can tap into the aspirations of these individuals. Empowering
    citizen developers not only benefits the organization but also propels these individuals
    towards fulfilling and rewarding career paths, where they play a pivotal role
    in shaping the future of the business.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 赢得公民开发者对Power Platform的支持是一项战略举措，这对组织的数字化转型之旅可能产生深远的影响。通过展示平台对职业预测和成长的影响，并辅以令人信服的薪资统计数据和低代码开发市场的增长趋势，组织可以挖掘这些个人的抱负。赋权公民开发者不仅有利于组织，而且推动这些个人走向充实和有回报的职业道路，他们在塑造企业未来方面发挥着关键作用。
- en: Securing IT professionals’ buy-in – Power Platform’s impact on career projection
    and growth for system administrators
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 赢得IT专业人士的支持——Power Platform对系统管理员职业预测和成长的影响
- en: In the rapidly evolving landscape of technology, IT professionals, especially
    system administrators, play a crucial role in maintaining and optimizing an organization’s
    digital infrastructure. Securing their buy-in for Power Platform, despite their
    traditional roles, can be achieved by showcasing how this low-code platform can
    propel their career projection and growth. By presenting the platform’s potential
    to expand skill sets and responsibilities and supporting it with salary statistics
    reflecting the robust growth in the low-code application development market, organizations
    can effectively engage and enlist the support of their IT experts.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术快速发展的领域中，IT专业人士，尤其是系统管理员，在维护和优化组织数字基础设施方面发挥着至关重要的作用。通过展示这个低代码平台如何推动他们的职业预测和成长，即使在他们传统的角色中，也可以赢得他们对Power
    Platform的支持。通过展示平台扩展技能集和责任的能力，并辅以反映低代码应用开发市场强劲增长的薪资统计数据，组织可以有效地吸引并征得他们的IT专家的支持。
- en: Expanding horizons – from system administration to innovation
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 扩展视野——从系统管理到创新
- en: System administrators are the backbone of an organization’s IT infrastructure,
    ensuring smooth operations and troubleshooting technical issues. However, in today’s
    technology-driven environment, their role can extend beyond conventional system
    maintenance. Power Platform offers an opportunity for system administrators to
    embrace innovation and broaden their skill sets. By enabling them to design and
    implement solutions using a low-code approach, the platform empowers them to contribute
    to digital transformation initiatives and become catalysts for positive change.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 系统管理员是组织IT基础设施的支柱，确保平稳运行和解决技术问题。然而，在当今技术驱动的环境中，他们的角色可以超越传统的系统维护。Power Platform为系统管理员提供了一个拥抱创新和拓宽技能集的机会。通过使他们能够使用低代码方法设计和实施解决方案，该平台使他们能够为数字化转型项目做出贡献，并成为积极变革的催化剂。
- en: Career growth through versatility – unleashing Power Platform’s potential
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过多功能性实现职业成长——释放Power Platform的潜力
- en: Power Platform’s low-code environment equips system administrators with a unique
    advantage – the ability to develop applications and automate processes without
    extensive coding expertise. This versatility not only streamlines operational
    efficiency but also expands career possibilities. As organizations increasingly
    adopt Power Platform, system administrators who master its functionalities become
    invaluable assets capable of bridging the gap between traditional IT roles and
    emerging technological demands.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform的低代码环境为系统管理员提供了独特的优势——无需广泛的编码专业知识即可开发应用程序和自动化流程。这种多功能性不仅简化了运营效率，还扩大了职业可能性。随着组织越来越多地采用Power
    Platform，掌握其功能的系统管理员成为宝贵的资产，能够弥合传统IT角色和新兴技术需求之间的差距。
- en: A statistical reality – low-code’s remarkable growth and impact on compensation
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 统计现实——低代码的显著增长及其对薪酬的影响
- en: To reinforce the potential for career projection and growth, consider the remarkable
    growth trajectory of the low-code development market. As mentioned before, industry
    reports project a CAGR of over 20% from 2021 to 2027 for the low-code market.
    This exponential growth reflects the increasing recognition of low-code platforms
    as a pivotal driver of digital transformation. Moreover, salary statistics substantiate
    this trend, with professionals skilled in low-code development witnessing an uptick
    in demand and compensation.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 为了强化职业前景和增长的潜力，考虑低代码开发市场的显著增长轨迹。如前所述，行业报告预测，从2021年到2027年，低代码市场的复合年增长率（CAGR）将超过20%。这种指数级增长反映了低代码平台作为数字化转型关键驱动力的日益认可。此外，薪资统计数据证实了这一趋势，擅长低代码开发的专业人士见证了需求量和薪酬的增长。
- en: The burgeoning low-code application development market directly impacts salary
    trends, favoring IT professionals who embrace this transformative approach. As
    organizations rely more on low-code platforms such as Power Platform, the demand
    for skilled professionals to leverage these tools intensifies. Consequently, system
    administrators who master Power Platform’s capabilities can position themselves
    for salary growth and new career opportunities. These salary statistics serve
    as a tangible representation of how Power Platform proficiency can positively
    influence career advancement.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 激增的低代码应用开发市场直接影响了薪酬趋势，有利于接受这种变革性方法的IT专业人士。随着组织越来越多地依赖像Power Platform这样的低代码平台，对能够利用这些工具的专业人才的需求日益加剧。因此，掌握Power
    Platform能力的系统管理员可以为自己定位薪酬增长和新职业机会。这些薪资统计数据是Power Platform熟练度如何积极影响职业发展的有形证明。
- en: Embracing the evolution – fostering career resilience and promoting career growth
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 接受变革——培养职业弹性和促进职业发展
- en: By encouraging system administrators to embrace Power Platform, organizations
    empower them to evolve with the ever-changing technological landscape. The platform
    not only offers new skill acquisition opportunities but also demonstrates an organization’s
    commitment to nurturing talent. This creates an environment where system administrators
    feel valued, supported, and equipped to contribute to the organization’s growth.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 通过鼓励系统管理员接受Power Platform，组织赋予他们与不断变化的科技环境同步发展的能力。该平台不仅提供了新的技能获取机会，而且展示了组织培养人才的承诺。这创造了一个让系统管理员感到受重视、受支持并能够为组织增长做出贡献的环境。
- en: When engaging IT professionals, especially system administrators, emphasize
    how Power Platform aligns with their aspirations for career projection and growth.
    Highlight the expanding role that these professionals can play in digital transformation
    initiatives. Present statistical evidence of low-code’s market growth and its
    direct correlation to enhanced compensation and new opportunities.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在与IT专业人士，尤其是系统管理员互动时，强调Power Platform如何与他们的职业前景和增长愿望相一致。突出这些专业人士在数字化转型项目中可以发挥的日益扩大的作用。展示低代码市场增长的相关统计数据，以及它与薪酬提升和新机会的直接相关性。
- en: Securing buy-in from IT professionals, particularly system administrators, is
    a strategic imperative for successful Power Platform adoption. By showcasing the
    platform’s potential to drive career projection and growth, supported by compelling
    salary statistics and growth trends in the low-code development market, organizations
    can ignite the enthusiasm and commitment of their technology experts. Empowering
    these professionals to leverage Power Platform not only amplifies their individual
    career journeys but also contributes to the organization’s overall digital transformation
    success.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 从IT专业人士，尤其是系统管理员那里获得认可，对于成功采用Power Platform是一项战略性的必要条件。通过展示该平台在推动职业前景和增长方面的潜力，并辅以令人信服的薪资统计数据和低代码开发市场的发展趋势，组织可以激发其技术专家的热情和承诺。赋予这些专业人士利用Power
    Platform的能力，不仅能够放大他们个人的职业旅程，而且也有助于组织整体数字化转型成功的实现。
- en: Microsoft Power Platform admin team – enabling transformational capabilities
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微软Power Platform管理员团队——赋能变革性能力
- en: In the ever-evolving landscape of digital transformation, organizations are
    increasingly turning to the Microsoft Power Platform to drive innovation, streamline
    processes, and enhance collaboration. As organizations embrace this platform,
    the role of the Microsoft Power Platform admin team becomes pivotal. Let’s take
    a look into the crucial responsibilities of the admin team, focusing on secure
    user enablement and how their actions align with different maturity levels of
    the organization, as defined by the CMMI.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字化转型不断演变的领域中，组织越来越多地转向微软Power平台以推动创新、简化流程和增强协作。随着组织采用这个平台，微软Power平台管理员团队的作用变得至关重要。让我们来看看管理员团队的关键职责，重点关注安全用户启用以及他们的行动如何与组织根据CMMI定义的不同成熟度级别相一致。
- en: Initial maturity level – setting the foundation
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初始成熟度级别 – 建立基础
- en: At the initial maturity level, organizations might have pockets of success with
    the Power Platform but lack a comprehensive approach to governance and strategy.
    The Microsoft Power Platform admin team takes the lead in establishing the foundation
    for secure user enablement. This includes defining an environment strategy that
    outlines the structure and scope of environments for development, testing, and
    production.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在初始成熟度级别，组织可能在Power平台上有一些成功的领域，但缺乏治理和战略的全面方法。微软Power平台管理员团队负责建立安全用户启用的基础。这包括制定环境策略，概述开发、测试和生产环境的结构和范围。
- en: Additionally, the admin team sets the groundwork for DLP policies. These policies
    are designed to safeguard sensitive information and maintain compliance with data
    protection regulations. The team’s actions ensure that users are enabled to explore
    Power Platform capabilities while adhering to security best practices.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，管理员团队为数据丢失预防（DLP）政策奠定基础。这些政策旨在保护敏感信息并符合数据保护法规。团队的行动确保用户能够在遵守安全最佳实践的同时探索Power平台的功能。
- en: Repeatable maturity level – implementing control and guidance
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可重复成熟度级别 – 实施控制和指导
- en: As organizations progress to the repeatable maturity level, they begin to implement
    controls and identify widely used applications. The Microsoft Power Platform admin
    team steps in to provide the necessary guidance for secure user enablement. They
    establish guidelines for makers to follow, ensuring that solutions are developed
    within the boundaries of compliance and security.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 当组织进步到可重复成熟度级别时，它们开始实施控制并识别广泛使用的应用程序。微软Power平台管理员团队介入，为安全用户启用提供必要的指导。他们为制作者制定指导方针，确保解决方案在合规性和安全性的范围内开发。
- en: At this stage, the admin team takes a proactive role in managing users, capacity,
    and licensing. By effectively managing these aspects, they ensure that the organization
    optimizes its resources while adhering to licensing agreements. The admin team’s
    actions lay the groundwork for a structured approach to Power Platform usage that
    is both controlled and productive.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，管理员团队在管理用户、容量和许可方面采取积极主动的角色。通过有效管理这些方面，他们确保组织优化其资源的同时遵守许可协议。管理员团队的行动为Power平台使用的结构化方法奠定了基础，这种方法既受控又富有成效。
- en: Defined maturity level – standardizing for success
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义成熟度级别 – 标准化以实现成功
- en: Organizations at the defined maturity level have achieved measurable success
    in their digital transformation journey. The Microsoft Power Platform admin team’s
    role now shifts towards standardizing practices for secure user enablement. They
    collaborate closely with makers to establish guidelines and best practices that
    align with the organization’s goals and compliance requirements.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义成熟度级别的组织中，已经在数字化转型之旅中取得了可衡量的成功。现在，微软Power平台管理员团队的角色转向标准化安全用户启用实践。他们与制作者紧密合作，制定符合组织目标和合规要求的指导方针和最佳实践。
- en: To ensure data availability, the admin team leverages connectors, integrations,
    or migration strategies to make relevant data accessible to makers. By effectively
    managing data integration, they empower makers to create solutions that are well-informed
    and data-driven. This collaborative approach fosters a culture of responsible
    and effective solution development.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保数据可用性，管理员团队利用连接器、集成或迁移策略使相关数据对制作者可访问。通过有效管理数据集成，他们赋予制作者创建信息丰富且数据驱动的解决方案的能力。这种协作方法促进了负责任和有效解决方案开发的氛围。
- en: Capable maturity level – enabling enterprise transformation
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 能够成熟度级别 – 推动企业转型
- en: Reaching the capable level signifies that the Power Platform is driving a broader-scale
    transformation. The admin team’s role evolves to support enterprise-critical applications
    and integrations. This includes deploying advanced governance mechanisms, such
    as advanced DLP policies, conditional access, and multi-factor authentication.
    Additionally, the admin team establishes communication channels with Platform
    Champions to address concerns and share best practices, ensuring that secure user
    enablement is aligned with organizational goals.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 达到能力级别意味着 Power Platform 正在推动更广泛的转型。管理员团队的角色演变为支持企业级应用和集成。这包括部署高级治理机制，如高级数据丢失预防策略、条件访问和多因素认证。此外，管理员团队与平台冠军建立沟通渠道，以解决担忧并分享最佳实践，确保安全用户赋能与组织目标保持一致。
- en: Efficient maturity level – orchestrating mission-critical functions
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高效成熟度级别 - 协调关键任务功能
- en: At the efficient level, the Power Platform has proven its capabilities in transforming
    mission-critical functions. The admin team now focuses on fostering an established
    community of experts. They facilitate the utilization of legacy capabilities and
    modern cloud architecture to achieve seamless data access and integration. The
    admin team works in harmony with fusion teams, comprising business and IT experts,
    to enable secure, high-impact solutions that drive innovation and efficiency across
    the organization.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在高效级别，Power Platform 已经证明了其在转型关键任务功能方面的能力。管理员团队现在专注于培养一个成熟的专家社区。他们促进了对遗留功能的利用和现代云架构的整合，以实现无缝的数据访问和集成。管理员团队与融合团队（包括商业和IT专家）协同工作，以实现安全、高影响力的解决方案，推动整个组织的创新和效率。
- en: In the journey of digital transformation, the role of the Microsoft Power Platform
    admin team cannot be understated. As organizations progress through the different
    levels of maturity, from initial to efficient, the admin team evolves from laying
    the foundation to orchestrating mission-critical functions. By enabling secure
    user enablement, aligning with the organization’s goals, and establishing robust
    governance mechanisms, the admin team empowers the Power Platform to drive transformational
    capabilities. In essence, the admin team serves as the backbone that supports
    innovation, efficiency, and the realization of the organization’s digital transformation
    aspirations.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字化转型之旅中，微软 Power Platform 管理员团队的作用不容小觑。随着组织从初始到高效的不同成熟度级别的发展，管理员团队从奠定基础发展到协调关键任务功能。通过启用安全用户赋能、与组织目标保持一致以及建立强大的治理机制，管理员团队赋予
    Power Platform 推动转型能力。本质上，管理员团队是支撑创新、效率和实现组织数字化转型愿景的骨干。
- en: Action plan for forming, nurturing, and empowering Power Platform admin teams
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建培养和赋能 Power Platform 管理员团队的行动计划
- en: 'Forming, nurturing, and empowering an effective Power Platform Admin team is
    crucial to ensure the successful implementation, governance, and security of Microsoft
    Power Platform environments. Follow this action plan to guide your team through
    the process:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 构建培养和赋能有效的 Power Platform 管理员团队对于确保 Microsoft Power Platform 环境的成功实施、治理和安全至关重要。遵循此行动计划，指导您的团队完成这个过程：
- en: 'Step 1: Build a solid foundation'
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：建立坚实基础
- en: 'Start by establishing a strong foundational knowledge base within your Power
    Platform Admin team. These initial steps will provide team members with essential
    insights into the platform’s core principles and best practices for secure, effective
    governance:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在您的 Power Platform 管理员团队中建立强大的基础知识库。这些初步步骤将为团队成员提供对平台核心原则和最佳实践的基本洞察，以实现安全、有效的治理：
- en: '**PL-900 exam**: Encourage team members to complete the PL-900 Power Platform
    Fundamentals exam. This will provide them with a comprehensive understanding of
    Power Platform’s core concepts, capabilities, and components.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PL-900 考试**：鼓励团队成员完成 PL-900 Power Platform 基础知识考试。这将使他们全面了解 Power Platform
    的核心概念、功能和组件。'
- en: '**Learning path**: Have team members take the Microsoft learning path focused
    on identifying best practices for securing and governing Power Platform environments.
    This path will equip them with the knowledge required to establish robust governance
    measures.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习路径**：让团队成员参加专注于识别保护和管理 Power Platform 环境最佳实践的微软学习路径。这条路径将使他们具备建立强大治理措施所需的知识。'
- en: 'Step 2: Implement best practices'
  id: totrans-125
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：实施最佳实践
- en: 'With foundational knowledge in place, the next step is to implement proven
    best practices to enhance the security, governance, and efficiency of your Power
    Platform environment. These resources will equip your team with practical tools
    and in-depth strategies tailored to your organization’s needs:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立基础知识之后，下一步是实施经过验证的最佳实践，以增强您的Power Platform环境的安保、治理和效率。这些资源将为您的团队提供针对组织需求量身定制的实用工具和深入策略：
- en: '**Admin and governance best practices checklist**: Guide your team to use the
    admin and governance best practices checklist provided by Microsoft. This checklist
    will help them apply their learning to your organization’s specific Power Platform
    environment. Encourage them to follow guidelines for data loss prevention, role-based
    access control, and secure sharing.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理和治理最佳实践清单**：指导您的团队使用Microsoft提供的管理和治理最佳实践清单。此清单将帮助他们将所学知识应用于您组织的特定Power
    Platform环境中。鼓励他们遵循数据丢失预防、基于角色的访问控制和安全共享的指南。'
- en: '**Deep dive whitepaper**: Encourage your team to read the Power Platform admin
    whitepaper. This resource will provide them with a deeper understanding of advanced
    admin strategies, governance frameworks, and security considerations.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深入白皮书**：鼓励您的团队阅读Power Platform管理员白皮书。此资源将为他们提供对高级管理员策略、治理框架和安全考虑的更深入理解。'
- en: 'Step 3: Formation and nurturing'
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：组建和培养
- en: 'To establish a cohesive and effective Power Platform admin team, focus on gathering
    individuals with complementary skills and clear role assignments. This structure,
    combined with regular meetings, will foster collaboration, enhance knowledge-sharing,
    and drive continuous improvement:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 为了建立一个统一和有效的Power Platform管理员团队，关注收集具有互补技能和明确角色分配的个人。这种结构，结合定期会议，将促进协作、增强知识共享，并推动持续改进：
- en: '**Form the admin team**: Assemble a dedicated Power Platform admin team comprising
    individuals with diverse skill sets, including technical knowledge, data management,
    and communication skills.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**组建管理团队**：组建一个由具有不同技能的人员组成的Power Platform管理团队，包括技术知识、数据管理和沟通技能。'
- en: '**Assign roles**: Designate specific roles within the admin team, such as governance
    lead, security lead, integration lead, and so on. Each role should align with
    the team members’ strengths and expertise.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分配角色**：在管理团队中指定特定的角色，如治理负责人、安全负责人、集成负责人等。每个角色都应与团队成员的优势和专业知识相一致。'
- en: '**Regular meetings**: Schedule regular meetings for the admin team to discuss
    ongoing projects, challenges, and updates. This will foster collaboration, knowledge
    sharing, and continuous improvement.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期会议**：为管理团队安排定期会议，讨论正在进行的项目、挑战和更新。这将促进协作、知识共享和持续改进。'
- en: 'Step 4: Empowerment and growth'
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：赋权和增长
- en: 'Fostering a culture of growth and empowerment within the admin team is key
    to sustaining long-term success. By encouraging continuous learning, skill development,
    and leadership opportunities, you enable team members to stay current, tackle
    challenges effectively, and contribute to the team’s overall impact:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在管理团队中培养增长和赋权的文化对于维持长期成功至关重要。通过鼓励持续学习、技能发展和领导机会，您使团队成员能够保持最新状态，有效地应对挑战，并为团队的整体影响做出贡献：
- en: '**Encourage continuous learning**: Promote a culture of continuous learning
    within the admin team. Encourage team members to stay updated with the latest
    Power Platform features, security enhancements, and industry trends.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**鼓励持续学习**：在管理团队中推广持续学习的文化。鼓励团队成员保持对最新的Power Platform功能、安全增强和行业趋势的了解。'
- en: '**Skill enhancement**: Support team members in enhancing their technical skills
    through workshops, online courses, and hands-on labs. This will enable them to
    tackle complex challenges with confidence.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技能提升**：通过研讨会、在线课程和动手实验室支持团队成员提升他们的技术技能。这将使他们能够自信地应对复杂挑战。'
- en: '**Leadership opportunities**: Provide opportunities for team members to take
    leadership roles in managing specific aspects of the Power Platform environment.
    This not only empowers them but also enhances the team’s effectiveness.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领导机会**：为团队成员提供在管理Power Platform环境特定方面的领导角色的机会。这不仅赋予他们权力，也提高了团队的有效性。'
- en: 'Step 5: Monitor and adapt'
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：监控和适应
- en: 'Maintaining alignment and adaptability within the Power Platform environment
    requires ongoing evaluation. Regular audits and a strong feedback loop empower
    the admin team to ensure compliance, refine strategies, and foster continuous
    improvement in governance practices:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power平台环境中保持一致性和适应性需要持续评估。定期的审计和强大的反馈循环使管理员团队能够确保合规性，完善策略，并在治理实践中促进持续改进：
- en: '**Regular audits**: Conduct regular audits of the Power Platform environment
    to ensure compliance with governance policies. Use this as an opportunity for
    the admin team to assess their strategies and make necessary adjustments.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期审计**：定期对Power平台环境进行审计，以确保符合治理政策。利用这个机会让管理员团队评估其策略并进行必要的调整。'
- en: '**Feedback loop**: Establish a feedback loop where team members can openly
    share their insights, concerns, and suggestions. This collaborative approach will
    lead to continuous improvement in admin practices.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反馈循环**：建立一个反馈循环，让团队成员可以公开分享他们的见解、担忧和建议。这种协作方法将导致管理员实践的不断改进。'
- en: Forming, nurturing, and empowering a Power Platform admin team is a strategic
    investment that pays off in terms of enhanced security, effective governance,
    and successful digital transformation initiatives. By following this action plan,
    your team will be well-equipped to manage Power Platform environments, address
    challenges proactively, and drive continuous innovation within your organization.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 组建、培养和赋能Power平台管理员团队是一项具有战略意义的投资，它能在增强安全性、有效治理和成功的数字化转型项目中带来回报。通过遵循此行动计划，您的团队将能够有效地管理Power平台环境，积极应对挑战，并在组织中推动持续创新。
- en: Empowering citizen developers – fusion team collaboration and beyond
  id: totrans-144
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 赋能公民开发者——融合团队协作及其他
- en: Organizations are increasingly recognizing the transformative potential of the
    Microsoft Power Platform. This suite of tools empowers individuals across organizations
    to become citizen developers—non-technical personnel who can create, deploy, and
    manage applications and workflows. This section explores the rise of citizen developers,
    the growing demand in the job market, the required skills in Power Platform, and
    the imperative need for upskilling.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 组织越来越认识到微软Power平台变革潜力。这套工具集使组织中的个人能够成为公民开发者——非技术性人员，他们可以创建、部署和管理应用程序和工作流程。本节探讨了公民开发者的兴起、职场需求的增长、Power平台所需的技能以及提升技能的迫切需求。
- en: The emergence of citizen developers
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 公民开发者的出现
- en: Traditionally, software development was confined to IT departments, often leading
    to bottlenecks, delays, and missed opportunities for innovation. The Power Platform,
    however, democratizes application development, enabling employees with domain
    expertise to take charge. Citizen developers leverage low-code and no-code tools
    to create solutions that address specific business challenges, fostering agility
    and enhancing efficiency.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，软件开发局限于IT部门，往往导致瓶颈、延误和错失创新机会。然而，Power平台却使应用开发民主化，使具有领域专业知识的人员能够掌握主导权。公民开发者利用低代码和无代码工具创建解决特定业务挑战的解决方案，从而提高敏捷性和效率。
- en: Job market demand for citizen developers
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对公民开发者的职场需求
- en: The demand for citizen developers is on the rise as organizations realize the
    value of distributing application development capabilities. Companies are actively
    seeking individuals who can bridge the gap between business needs and technical
    solutions. The job market is evolving to embrace these new roles, offering positions
    such as business analyst developer or low-code application specialist.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 随着组织意识到分配应用开发能力的重要性，对公民开发者的需求正在上升。公司正在积极寻找能够弥合业务需求和技术解决方案之间差距的人员。职场市场正在演变，以接纳这些新角色，提供如业务分析师开发者或低代码应用专家等职位。
- en: Required skills in Power Platform
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power平台所需的技能
- en: 'While being a citizen developer doesn’t necessitate extensive coding knowledge,
    a certain skill set is still crucial:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然成为公民开发者不需要广泛的编码知识，但仍然需要一定的技能集：
- en: '**Domain expertise**: Citizen developers need to intimately understand their
    department’s processes and requirements to create tailored solutions'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域专业知识**：公民开发者需要深入了解他们部门的流程和需求，以创建定制解决方案'
- en: '**Problem-solving**: The ability to dissect challenges and envision innovative
    solutions is essential'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题解决能力**：分解挑战并构想创新解决方案的能力是必不可少的'
- en: '**Data literacy**: Proficiency in understanding and manipulating data is crucial,
    especially with Power BI'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据素养**：理解和操作数据的能力至关重要，尤其是在使用Power BI时'
- en: '**Visual thinking**: Creating intuitive interfaces requires a knack for designing
    user-friendly experiences'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视觉思维**：创建直观的界面需要设计用户友好体验的技巧'
- en: '**Basic logical thinking**: Even though it’s not complex coding, understanding
    basic logic helps streamline processes'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基本逻辑思维**：尽管这不是复杂的编码，但理解基本逻辑有助于简化流程'
- en: Upskilling for citizen developers
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 公民开发者的提升技能
- en: 'For employees willing to step into the role of citizen developer, upskilling
    is a must:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 对于愿意担任公民开发者角色的员工，提升技能是必须的：
- en: '**Power Platform training**: Comprehensive training in Power Apps, Power BI,
    and Power Automate provides a solid foundation'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power平台培训**：在Power Apps、Power BI和Power Automate方面的全面培训提供了一个坚实的基础'
- en: '**Best practices**: Learning how to design effective solutions and following
    best practices ensures efficiency'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最佳实践**：学习如何设计有效的解决方案并遵循最佳实践确保效率'
- en: '**Data manipulation**: Mastering data transformations, cleansing, and modeling
    is crucial for accurate insights'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据处理**：掌握数据转换、清洗和建模对于准确洞察至关重要'
- en: '**Security and compliance**: Understanding how to build secure applications
    while adhering to data protection regulations is paramount'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和合规性**：了解如何在遵守数据保护法规的同时构建安全的应用程序至关重要'
- en: '**Problem-solving workshops**: Participating in hackathons or problem-solving
    workshops hones practical skills'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题解决研讨会**：参与黑客松或问题解决研讨会可以磨练实际技能'
- en: Benefits of citizen development
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 公民开发的益处
- en: 'The rise of citizen developers offers numerous benefits to organizations:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 公民开发者的兴起为组织带来了许多好处：
- en: '**Faster innovation**: Empowering non-technical employees to create solutions
    accelerates innovation cycles'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更快地创新**：赋权非技术员工创建解决方案可以加速创新周期'
- en: '**Reduced IT bottlenecks**: Offloading development tasks from IT departments
    frees them to focus on more complex projects'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少IT瓶颈**：将开发任务从IT部门卸载，使他们能够专注于更复杂的项目'
- en: '**Tailored solutions**: Domain experts craft solutions precisely aligned with
    business needs'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定制解决方案**：领域专家精心打造与业务需求精确匹配的解决方案'
- en: '**Cost efficiency**: Developing applications in-house reduces dependency on
    external development teams'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本效益**：内部开发应用程序减少对外部开发团队的依赖'
- en: The emergence of citizen developers is reshaping how organizations approach
    application development and digital transformation. Leveraging the Power Platform,
    individuals with domain expertise are driving innovation, streamlining processes,
    and enhancing efficiency. As the demand for these roles continues to grow, individuals
    who embrace upskilling and hone the necessary skills will be well-positioned to
    shape the future of business application development.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 公民开发者的出现正在重塑组织如何处理应用程序开发和数字化转型。利用Power平台，具有领域专业知识的人士正在推动创新、简化流程并提高效率。随着对这些角色的需求持续增长，那些接受提升技能并磨练必要技能的个人将能够塑造商业应用程序开发的未来。
- en: Fusion development teams – unleashing synergy in Power Platform adoption
  id: totrans-171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 融合开发团队——在Power平台采用中释放协同效应
- en: In the landscape of Power Platform adoption and digital transformation, the
    concept of fusion development teams emerges as a dynamic force that catalyzes
    innovation, optimizes legacy capabilities, and fuses modern cloud architecture.
    These teams play a pivotal role in organizations that have reached the advanced
    “efficient” level of the CMMI, where the capabilities of the Power Platform are
    harnessed to transform mission-critical functions. This section explores the essence
    of fusion development teams and the potential job titles, roles, and responsibilities
    within the context of Power Platform adoption.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power平台采用和数字化转型的大背景下，融合开发团队的概念作为一个动态力量出现，它催化创新、优化传统能力，并融合现代云架构。这些团队在达到CMMI高级“高效”水平的组织中扮演着关键角色，其中Power平台的能力被利用来转型关键任务功能。本节探讨了融合开发团队的精髓以及Power平台采用背景下的潜在职位名称、角色和职责。
- en: Understanding fusion development teams
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解融合开发团队
- en: Fusion development teams are multidisciplinary groups that unite individuals
    from various domains, combining diverse expertise to maximize the potential of
    the Power Platform. These teams serve as innovation catalysts, orchestrating the
    integration of legacy systems and modern cloud architecture. They bridge the gap
    between traditional applications and cutting-edge solutions, facilitating seamless
    interactions and driving the transformation of core business functions.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 融合开发团队是多学科团队，将来自各个领域的个人联合起来，结合多样化的专业知识，以最大化Power Platform的潜力。这些团队作为创新催化剂，协调遗留系统和现代云架构的集成。他们弥合传统应用程序和尖端解决方案之间的差距，促进无缝交互，推动核心业务功能的转型。
- en: Potential job titles and roles
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 潜在的职位名称和角色
- en: 'Building a robust fusion development team for Power Platform success involves
    selecting roles that cover a range of specialized skills. The following roles
    contribute unique expertise, from solution design and integration to user experience
    and change management, ensuring that Power Platform implementations are well-aligned,
    scalable, and user-centric:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个强大的融合开发团队以实现Power Platform的成功，涉及选择涵盖一系列专业技能的职位。以下角色贡献了独特的专业知识，从解决方案设计和集成到用户体验和变革管理，确保Power
    Platform的实施与战略目标保持一致：
- en: '**Solution architects**: Solution architects within a fusion development team
    possess a panoramic view of the organization’s technology landscape. They design
    the blueprint for integrating Power Platform solutions with legacy systems, ensuring
    scalability, security, and alignment with strategic objectives.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案架构师**：融合开发团队中的解决方案架构师对组织的科技格局拥有全景视图。他们设计蓝图，将Power Platform解决方案与遗留系统集成，确保可扩展性、安全性和与战略目标的契合度。'
- en: '**Power Platform experts**: These individuals are proficient in Power BI, Power
    Apps, and Power Automate. They are responsible for creating, customizing, and
    optimizing applications that enhance efficiency, automation, and decision-making
    across various departments.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Platform专家**：这些个人精通Power BI、Power Apps和Power Automate。他们负责创建、定制和优化应用程序，以提高各部门的效率、自动化和决策能力。'
- en: '**Legacy system integration specialists**: These specialists focus on integrating
    existing legacy systems with modern Power Platform solutions. They ensure data
    consistency, seamless communication, and optimal performance between legacy and
    contemporary components.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**遗留系统集成专家**：这些专家专注于将现有的遗留系统集成到现代Power Platform解决方案中。他们确保遗留系统和现代组件之间的数据一致性、无缝通信和最佳性能。'
- en: '**Cloud architects**: Cloud architects play a crucial role in designing the
    cloud infrastructure that supports Power Platform applications. They optimize
    cloud resources, security measures, and scalability to meet the evolving needs
    of the organization.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**云架构师**：云架构师在设计和支持Power Platform应用程序的云基础设施中扮演着关键角色。他们优化云资源、安全措施和可扩展性，以满足组织不断变化的需求。'
- en: '**Data engineers**: Data engineers are tasked with data management, integration,
    and transformation. They ensure that data flows smoothly between systems, enabling
    accurate analytics and informed decision-making.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据工程师**：数据工程师负责数据管理、集成和转换。他们确保数据在系统之间流畅流动，从而实现准确的分析和明智的决策。'
- en: '**User Experience (UX) designers**: UX designers enhance the user experience
    of Power Platform applications, ensuring they are intuitive, user-friendly, and
    aligned with user expectations.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户体验（UX）设计师**：UX设计师提升Power Platform应用程序的用户体验，确保它们直观、用户友好，并与用户期望保持一致。'
- en: '**Change management specialists**: Change management specialists guide stakeholders
    through the adoption of new solutions, facilitating smooth transitions and minimizing
    disruptions.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变革管理专家**：变革管理专家引导利益相关者接受新解决方案，促进平稳过渡并最小化中断。'
- en: Roles and responsibilities
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 角色和职责
- en: 'A fusion development team within the Power Platform ecosystem brings a broad
    scope of responsibilities that drive organizational modernization, collaboration,
    and innovation. From seamless integration and cross-departmental collaboration
    to security, training, and continuous improvement, these roles and responsibilities
    ensure the Power Platform solutions are effective, secure, and adaptable to changing
    business needs:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform生态系统内的融合开发团队承担着广泛的职责，这些职责推动着组织的现代化、协作和创新。从无缝集成和跨部门协作到安全、培训和持续改进，这些角色和职责确保Power
    Platform解决方案有效、安全，并能适应不断变化的企业需求：
- en: '**Integration and modernization**: Fusion development teams take the lead in
    integrating legacy systems with modern Power Platform solutions. They design connectors,
    APIs, and workflows that enable seamless data flow and functionality between diverse
    applications.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成和现代化**：融合开发团队在将传统系统与现代Power Platform解决方案集成方面发挥主导作用。他们设计连接器、API和工作流程，使不同应用程序之间的数据流和功能无缝连接。'
- en: '**Collaboration**: These teams facilitate collaboration between departments,
    breaking down silos and enabling cross-functional synergies through integrated
    solutions.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协作**：这些团队促进部门间的协作，通过集成解决方案打破壁垒，实现跨职能协同效应。'
- en: '**Innovation**: Fusion development teams drive innovation by leveraging the
    Power Platform’s capabilities to create new ways of doing business, optimizing
    processes, and delivering value to end users.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新**：融合开发团队通过利用Power Platform的能力创造新的商业模式、优化流程并向最终用户提供价值来推动创新。'
- en: '**Security and compliance**: Ensuring data security and compliance with industry
    regulations is a paramount responsibility of these teams. They implement necessary
    controls and measures to protect sensitive information.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和合规**：确保数据安全和符合行业法规是这些团队的首要责任。他们实施必要的控制和措施来保护敏感信息。'
- en: '**Training and support**: Fusion development teams provide training and support
    to end users, ensuring they are equipped to utilize Power Platform solutions effectively.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训和支援**：融合开发团队为最终用户提供培训和支援，确保他们能够有效地利用Power Platform解决方案。'
- en: '**Continuous improvement**: These teams engage in continuous improvement efforts,
    refining solutions based on user feedback, performance metrics, and evolving business
    needs.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续改进**：这些团队参与持续改进工作，根据用户反馈、性能指标和不断变化的企业需求来完善解决方案。'
- en: Fusion development teams represent the vanguard of innovation, adeptly merging
    legacy systems and modern technology to drive digital transformation. In the “Efficient”
    stage of Power Platform adoption, these teams exemplify the organization’s ability
    to harness the platform’s capabilities for mission-critical functions. Through
    collaboration, integration, and expertise, fusion development teams empower organizations
    to achieve optimal synergy between traditional and cutting-edge technologies,
    propelling them into the forefront of digital advancement.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 融合开发团队代表着创新的先锋，熟练地将传统系统和现代技术相结合，以推动数字化转型。在“高效”阶段采用Power Platform时，这些团队展示了组织利用平台能力执行关键任务的能力。通过协作、集成和专业知识，融合开发团队使组织能够实现传统技术与尖端技术之间的最佳协同效应，推动他们进入数字进步的前沿。
- en: Building a digital culture – collaboration, learning, and exploration for transformation
    (capability building – crawl, walk, run)
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 构建数字文化——协作、学习和探索以实现转型（能力建设——爬行、行走、奔跑）
- en: The true catalyst for transformation lies within the development of a vibrant
    digital culture—a culture that fosters collaboration, continuous learning, and
    fearless exploration. Let’s explore the vital components of building a digital
    culture, emphasizing the creation of a Champions Community and the incremental
    journey of capability building, aligning with the CMMI framework.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的转型催化剂在于培养一个充满活力的数字文化——一种促进协作、持续学习和无畏探索的文化。让我们探讨构建数字文化的关键要素，强调创建冠军社区和能力建设的逐步旅程，与CMMI框架相一致。
- en: The essence of the champions community
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 冠军社区的本质
- en: At the heart of organizational growth and transformation is the champions community—a
    dynamic ecosystem that nurtures collaboration, knowledge sharing, and innovative
    thinking. This community serves as a platform where individuals can congregate,
    irrespective of their geographic or departmental boundaries, to collaborate, seek
    answers, and exchange ideas. It is a safe haven for inquisitive minds, a place
    where knowledge knows no bounds.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 组织增长和转型的核心是冠军社区——一个培养协作、知识共享和创新思维的动态生态系统。这个社区是一个平台，个人可以不受地理或部门界限的限制而聚集在一起，进行协作、寻求答案和交流想法。它是一个安全的天堂，一个知识无界限的地方。
- en: Within the champions community, the essence of digital culture flourishes. It’s
    a culture that embraces diversity of thought, encourages open dialogue, and recognizes
    that every individual can contribute to the journey of transformation. This community
    is not just a platform; it’s a mindset—a mindset that believes in the collective
    power of exploration, learning, and innovation.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在倡导者社区内，数字文化的精髓蓬勃发展。这是一种包容思想多样性的文化，鼓励开放对话，并认识到每个人都可以为变革之旅做出贡献。这个社区不仅仅是一个平台；它是一种心态——一种相信探索、学习和创新集体力量的心态。
- en: Crawl – laying the foundation
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: “爬行” - 奠定基础
- en: In the realm of capability building, the “Crawl” phase represents the initial
    step toward establishing a robust digital culture. Organizations embark on this
    journey by recognizing the value of collaboration and learning. Early adopters
    and enthusiasts become the pioneers of the champions community, creating a space
    for dialogue, knowledge exchange, and camaraderie.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在能力建设的领域， “爬行”阶段代表着建立强大数字文化的第一步。组织通过认识到协作和学习的价值开始这段旅程。早期采用者和爱好者成为倡导者社区的先驱，创造了一个对话、知识交流和友谊的空间。
- en: During this phase, organizations set up forums, virtual spaces, and communication
    channels that facilitate interaction. Regular events, such as webinars, workshops,
    and meetups, become the pulse of the community. The objective is to foster a sense
    of belonging and to encourage individuals to step forward and share their experiences
    and insights.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一阶段，组织建立论坛、虚拟空间和沟通渠道，以促进互动。定期的活动，如网络研讨会、研讨会和聚会，成为社区的脉搏。目标是培养归属感，并鼓励个人站出来分享他们的经验和见解。
- en: Walk – nurturing growth
  id: totrans-201
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: “行走” - 培育增长
- en: As the digital culture evolves, the organization moves from the “Crawl” phase
    to the “Walk” phase of capability building. During this stage, the champions community
    gains momentum and expands its reach. The focus shifts from sporadic interactions
    to intentional engagement. Regular events become a staple, and the community’s
    impact starts to permeate across departments and regions.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数字文化的演变，组织从“爬行”阶段过渡到“行走”阶段的能力建设。在这一阶段，倡导者社区获得动力并扩大其影响力。重点从偶然的互动转向有意的参与。定期活动成为常态，社区的影响开始渗透到各个部门和地区。
- en: In the “Walk” phase, leaders play a pivotal role in amplifying the culture’s
    influence. They promote and encourage participation, recognize contributions,
    and provide platforms for emerging voices. Collaboration becomes ingrained in
    the organization’s DNA, and the champions community evolves into a go-to hub for
    seeking expertise, sharing success stories, and igniting innovative discussions.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在“行走”阶段，领导者扮演着放大文化影响力的关键角色。他们推广并鼓励参与，认可贡献，并为新兴的声音提供平台。协作成为组织DNA的一部分，倡导者社区发展成为寻求专业知识、分享成功故事和激发创新讨论的首选中心。
- en: Run – empowering transformation
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行 - 推动变革
- en: The pinnacle of capability building is the “Run” phase, where the champions
    community becomes a driving force for transformation. The digital culture has
    matured into a way of life, transcending hierarchies and organizational divisions.
    Individuals from all corners of the organization actively engage, contributing
    to the collective intelligence and fueling innovation.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 能力建设的巅峰是“运行”阶段，此时倡导者社区成为推动变革的驱动力。数字文化已经成熟为一种生活方式，超越了等级和组织界限。组织的各个角落的个人都积极参与，为集体智慧贡献力量，并推动创新。
- en: In the “Run” phase, the champions community is not limited to virtual spaces—it
    thrives in physical events, hackathons, and innovation showcases. Leaders recognize
    that transformation is not limited to technology; it’s a mindset shift that requires
    continuous learning and an insatiable curiosity. The community empowers individuals
    to step into leadership roles, advocate for change, and champion new initiatives.
    A champions community shouldn’t be limited to the enterprise employees work for.
    It can transcend company boundaries fostering collaboration between parties across
    different organizations, including vendors, customers, and known specialists including
    Microsoft Most Valuable Professionals.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在“奔跑”阶段，冠军社区不仅限于虚拟空间——它在实体活动、黑客马拉松和创新展示中蓬勃发展。领导者认识到，变革不仅限于技术；它是一种需要持续学习和无止境好奇心的心态转变。社区赋权个人担任领导角色，倡导变革，并支持新倡议。冠军社区不应仅限于企业员工所在的企业。它可以超越公司界限，促进不同组织之间，包括供应商、客户和知名专家（包括微软最有价值专业人士）之间的协作。
- en: Building a digital culture that thrives on collaboration, learning, and exploration
    is not a luxury; it’s a necessity for organizations striving for meaningful digital
    transformation. The champions community stands as a testament to the power of
    collective intelligence, transcending boundaries and fostering a culture that
    celebrates innovation. As organizations progress through the phases of capability
    building—Crawl, Walk, Run—they solidify a foundation that nurtures a spirit of
    transformation, empowers individuals, and propels the organization toward a future
    of limitless possibilities.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一种繁荣于协作、学习和探索的数字文化，并非奢侈品；对于追求有意义的数字化转型组织来说，这是必需品。冠军社区作为集体智慧力量的见证，超越了界限，培育了一种庆祝创新的氛围。随着组织在能力建设阶段——爬行、行走、奔跑——的进展，它们巩固了一个培育变革精神、赋权个人并推动组织向无限可能未来迈进的基础。
- en: Identifying potential champions
  id: totrans-208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 识别潜在冠军
- en: Embracing the Power Platform is a crucial step for organizations embarking on
    the journey of digital transformation. A key factor in driving the successful
    adoption of the platform is identifying and nurturing Power Platform champions
    within the organization. These individuals are not only passionate about the technology
    but also have the innate ability to inspire, guide, and encourage their peers
    to explore and harness the potential of the Power Platform. This section delves
    into the process of discovering these champions, providing them with the right
    training, and empowering them to become evangelists for driving transformative
    change.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 拥抱Power平台是组织踏上数字化转型之旅的关键一步。推动平台成功采用的关键因素之一是识别和培养组织内部的Power平台冠军。这些人不仅对技术充满热情，而且天生具有激励、引导和鼓励同事探索和利用Power平台潜力的能力。本节深入探讨了发现这些冠军的过程，为他们提供适当的培训，并赋权他们成为推动变革性变革的传教士。
- en: Champions are often individuals who have already exhibited an interest in and
    aptitude for exploring technology. If your organization utilizes Microsoft 365,
    it’s likely that some employees have already encountered Power Apps through its
    integration with Microsoft Teams, SharePoint, and OneDrive. These early adopters
    are the ones who gravitate towards tools that facilitate innovation and improved
    efficiency.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 冠军通常是那些已经表现出对探索技术兴趣和天赋的个人。如果你的组织使用Microsoft 365，那么一些员工可能已经通过其与Microsoft Teams、SharePoint和OneDrive的集成接触到了Power
    Apps。这些早期采用者正是那些倾向于使用促进创新和提升效率的工具的人。
- en: While organic adoption might already be occurring, it’s essential to proactively
    identify these potential champions and provide them with a structured role in
    your adoption strategy. They might be individuals who are proficient in Excel,
    Access, or SharePoint, or those who are known for pushing boundaries and exploring
    new tools. Identifying these individuals allows you to build a foundation for
    cultivating a culture of innovation.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有机采用可能已经发生，但主动识别这些潜在冠军并在你的采用策略中为他们提供一个结构化的角色是至关重要的。他们可能是精通Excel、Access或SharePoint的个人，或者那些以推动边界和探索新工具而闻名的人。识别这些个人可以帮助你为培养创新文化奠定基础。
- en: Training and mentoring
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 培训和指导
- en: Once potential champions are identified, the next step is to provide them with
    comprehensive training that empowers them to fully understand and effectively
    use the Power Platform. The Microsoft Learn portal serves as an invaluable resource
    in this regard. The portal offers a wealth of tutorials, courses, and resources
    that cover various aspects of the Power Platform. From building apps to automating
    workflows and creating insightful reports, the portal caters to different learning
    styles and skill levels.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦确定了潜在的冠军，下一步就是提供全面的培训，使他们能够全面理解和有效使用Power Platform。在这一点上，Microsoft Learn门户是一个无价的资源。该门户提供了大量教程、课程和资源，涵盖了Power
    Platform的各个方面。从构建应用程序到自动化工作流程和创建有洞察力的报告，该门户满足不同的学习风格和技能水平。
- en: As part of the training process, encourage champions to explore the Microsoft
    Learn portal to gain a solid understanding of the platform’s capabilities. This
    self-paced learning allows champions to dive deep into the areas that resonate
    with their interests and expertise. Furthermore, it’s important to provide specialized
    training sessions that cater to the specific needs of your organization. These
    sessions can be led by in-house experts or external trainers with proficiency
    in the Power Platform.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 作为培训过程的一部分，鼓励冠军探索Microsoft Learn门户，以深入了解平台的功能。这种自我定速学习允许冠军深入研究与他们兴趣和专业知识产生共鸣的领域。此外，提供针对组织特定需求的专门培训课程也很重要。这些课程可以由内部专家或精通Power
    Platform的外部培训师主持。
- en: Empowering champions as evangelists
  id: totrans-215
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 赋予冠军传教士的权力
- en: Training is just the first step; true champions are those who not only excel
    in using the platform but also willingly share their knowledge and experiences
    with their peers. Empower these champions to become evangelists for the Power
    Platform. Encourage them to conduct knowledge-sharing sessions, workshops, and
    presentations to showcase the platform’s potential and demonstrate how it can
    drive innovation in various business processes.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 训练只是第一步；真正的冠军不仅要在平台上表现出色，而且愿意与同行分享他们的知识和经验。赋予这些冠军成为Power Platform的传教士的权力。鼓励他们开展知识分享会、研讨会和演示，以展示平台潜力并展示它如何推动各种业务流程的创新。
- en: Utilize platforms such as internal collaboration tools, company newsletters,
    and town hall meetings to provide champions with opportunities to share their
    insights. By highlighting their successes and contributions, you not only recognize
    their efforts but also motivate others to explore the Power Platform.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 利用内部协作工具、公司通讯和市政厅会议等平台，为冠军提供分享见解的机会。通过突出他们的成功和贡献，你不仅认可了他们的努力，还激励他人探索Power Platform。
- en: Leveraging Microsoft MVPs and communities
  id: totrans-218
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用微软MVP和社区
- en: In addition to internal champions, consider leveraging external resources. The
    Microsoft **Most Valuable Professional** (**MVP**) program recognizes individuals
    who have demonstrated exceptional expertise in Microsoft technologies. The MVP
    website can help you identify specialists who excel in Power Platform-related
    areas. Connecting with these MVPs can provide your champions with insights from
    industry experts and access to a broader community that shares experiences and
    best practices.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 除了内部冠军外，还应考虑利用外部资源。微软**最有价值专家**（**MVP**）计划认可那些在微软技术领域表现出卓越专业知识的人。MVP网站可以帮助你识别在Power
    Platform相关领域表现出色的专家。与这些MVP建立联系可以为你的冠军提供行业专家的见解，并使他们能够接触到分享经验和最佳实践的更广泛的社区。
- en: Power Platform champions are the driving force behind successful adoption and
    transformation within an organization. By identifying individuals with a natural
    inclination towards technology, training them comprehensively, and empowering
    them to become evangelists, organizations can foster a culture of innovation and
    efficient use of the Power Platform. As these champions share their knowledge
    and experiences, they inspire their peers, build momentum, and contribute significantly
    to the organization’s digital transformation journey.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform的冠军是组织成功采用和转型的驱动力。通过识别那些对技术有自然倾向的个人，全面培训他们，并赋予他们成为传教士的权力，组织可以培养创新和高效使用Power
    Platform的文化。随着这些冠军分享他们的知识和经验，他们激励着他们的同行，积累动力，并为组织的数字化转型之旅做出重大贡献。
- en: Summary
  id: totrans-221
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you have gained insights into the importance of stakeholder
    analysis and alignment for driving the successful adoption of the Power Platform.
    You’ve learned about the significance of understanding stakeholders’ roles, interests,
    and organizational maturity levels, as assessed through the **Capability Maturity
    Model** **Integration** (**CMMI**).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您已经了解了利益相关者分析和对齐对于推动Power Platform成功采用的重要性。您已经了解了通过**能力成熟度模型** **集成**（**CMMI**）评估的利益相关者角色、利益和组织的成熟度水平的重要性。
- en: The information presented in this chapter is valuable to you as it equips you
    with strategic approaches to identify stakeholders, analyze their alignment with
    organizational goals, and tailor adoption strategies accordingly. Understanding
    the maturity levels of the organization enables you to implement effective alignment
    strategies, facilitating smoother navigation through different stages of adoption.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供的信息对您来说非常有价值，因为它为您提供了识别利益相关者、分析他们与组织目标的契合度以及相应调整采用策略的战略方法。了解组织的成熟度水平使您能够实施有效的对齐策略，从而在采用的不同阶段中实现更顺畅的导航。
- en: 'In the next chapter, you will delve into the topic of *Streamlining Operations:
    Automating Processes with Solutions Built with Power Platform*. There, you will
    learn about leveraging the Power Platform to automate processes and streamline
    operations, further enhancing organizational efficiency and effectiveness.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，您将深入了解“通过使用Power Platform构建的解决方案简化操作：自动化流程”这一主题。在那里，您将学习如何利用Power Platform自动化流程和简化操作，进一步提高组织的效率和效果。
- en: Q&A
  id: totrans-225
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 问答
- en: How does stakeholder analysis contribute to successful Power Platform adoption?
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利益相关者分析如何有助于成功采用Power Platform？
- en: Stakeholder analysis helps identify key individuals and their roles, enabling
    targeted engagement and alignment with organizational goals.
  id: totrans-227
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 利益相关者分析有助于识别关键个人及其角色，从而实现有针对性的参与和对组织目标的对齐。
- en: What is the Capability Maturity Model Integration (CMMI), and how does it apply
    to Power Platform adoption?
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能力成熟度模型集成（CMMI）是什么，它如何应用于Power Platform的采用？
- en: CMMI is a framework for assessing organizational maturity levels. In the context
    of Power Platform adoption, it helps organizations understand their readiness
    and tailor adoption strategies accordingly.
  id: totrans-229
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: CMMI是一个评估组织成熟度水平的框架。在Power Platform采用的情况下，它帮助组织了解其准备情况，并相应地调整采用策略。
- en: What are some alignment strategies for different maturity levels?
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不同成熟度水平有哪些对齐策略？
- en: Alignment strategies vary based on maturity levels but may include executive
    sponsorship, training initiatives, and fostering a culture of innovation and collaboration.
  id: totrans-231
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对齐策略根据成熟度水平而有所不同，但可能包括高管支持、培训倡议以及培养创新和协作的文化。
- en: What roles are included in the Power Platform dream team?
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Power Platform梦幻团队包括哪些角色？
- en: The Power Platform dream team comprises roles such as executive sponsor, success
    owner, champions, training lead, department leads, communication lead, Power Platform
    admin team, and Power Platform nurture team.
  id: totrans-233
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Power Platform梦幻团队包括如高管支持者、成功负责人、倡导者、培训负责人、部门负责人、沟通负责人、Power Platform管理员团队和Power
    Platform培育团队等角色。
