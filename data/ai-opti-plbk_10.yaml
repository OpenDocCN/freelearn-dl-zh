  id: totrans-269
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Elasticsearch**：用于日志和基于搜索的分析的分布式搜索和分析引擎'
- en: '**Prometheus** : Used for monitoring applications and infrastructure with real-time
