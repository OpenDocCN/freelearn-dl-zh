  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容器化和编排** : 在生产环境中部署机器学习模型通常需要可扩展、便携和高效的基础设施解决方案。'
- en: '**Popular tools** :'
  id: totrans-292
