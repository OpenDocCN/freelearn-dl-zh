- en: '**Best practices** :'
  id: totrans-280
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最佳实践**：'
- en: Set up **role-based access control** ( **RBAC** ) for visualization tools
  id: totrans-281
