  type: TYPE_NORMAL
  zh: '**最佳实践**：'
- en: Store logs centrally and index logs for efficient retrieval
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
