- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: 'From Model to Market: Operationalizing ML Systems'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从模型到市场：实现机器学习系统的运营
- en: 'In the previous chapter, we established the foundational framework for success
    in **machine learning** ( **ML** ). We learned that to deliver real-world value,
    we must define what success looks like, moving beyond simple model scores to a
    multi-dimensional view that includes SMART metrics aligned with business goals,
    guardrail metrics to prevent unintended harm, and surrogate metrics to track long-term
    objectives. With this critical understanding of what to measure, we now confront
    the second half of the battle: operationalization.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们为机器学习（**ML**）的成功奠定了基础框架。我们了解到，为了实现现实世界的价值，我们必须定义成功的样子，超越简单的模型评分，转向一个多维度的视角，包括与业务目标一致的SMART指标、预防意外伤害的护栏指标和跟踪长期目标的代理指标。有了对要衡量什么的这一关键理解，我们现在面临战斗的第二阶段：运营化。
- en: A model with perfect metrics that remains in a research project is a missed
    opportunity. For companies to truly benefit from ML, we must bridge the gap from
    an experimental model to a production-grade system. This means not just deploying
    the model, but getting people to adopt it, weaving it into the daily workings
    of the business, and ensuring that it aligns with the company’s strategy. For
    companies to benefit, we need to make sure it’s operationalized. What do we mean
    by that? It’s not just about deploying the model. It’s about getting people to
    adopt it, showing its impact, and weaving it into the daily workings of the business.
    Plus, it needs to line up with the company’s short-term and long-term strategy.
    You can have the most sophisticated ML model in the world, but if no one’s using
    it or it’s expensive to run or, worse, it’s misaligned with the company’s goals,
    you’re missing out.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 一个拥有完美指标但仍然停留在研究项目中的模型是一个错失的机会。为了使公司真正从机器学习中受益，我们必须弥合从实验模型到生产级系统的差距。这意味着不仅仅是部署模型，还要让人们接受它，将其融入业务的日常运作中，并确保它与公司的战略保持一致。为了使公司受益，我们需要确保其运营化。我们这是什么意思？这不仅仅是部署模型。这是让人们接受它，展示其影响，并将其融入业务的日常运作中。此外，它还需要与公司的短期和长期战略保持一致。你可以拥有世界上最具复杂性的ML模型，但如果没有人使用它，或者运行成本高昂，或者更糟糕的是，它与公司的目标不一致，你就是在错失良机。
- en: 'In this chapter, we shift focus to what it truly takes to operationalize these
    models, ensuring that they can move beyond notebooks and proof-of-concept environments
    into production systems that are scalable and maintainable. This includes a deep
    dive into the technical and organizational considerations for model productization:
    the infrastructure needed to support continuous deployment, the role of monitoring
    and observability, and how feedback loops help models evolve in real-time contexts.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将重点转向真正实现这些模型运营化所需的因素，确保它们能够从笔记本和概念验证环境转移到可扩展且可维护的生产系统。这包括对模型产品化所需的技术和组织考虑因素的深入研究：支持持续部署的基础设施、监控和可观察性的作用，以及反馈循环如何帮助模型在实时环境中进化。
- en: A core enabler of this transformation is code modularization, whether through
    procedural scripts, object-oriented design, or high-level frameworks. We will
    examine how these different approaches impact the maintainability and flexibility
    of ML pipelines. Frameworks offer powerful abstractions that simplify the design
    of distributed systems, handle hardware acceleration, and enable reproducibility
    at scale.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这一转型的核心推动力是代码模块化，无论是通过过程脚本、面向对象设计还是高级框架。我们将探讨这些不同的方法如何影响机器学习管道的维护性和灵活性。框架提供了强大的抽象，简化了分布式系统的设计，处理硬件加速，并实现大规模的可重复性。
- en: Finally, we’ll look at how recent advancements, such as those in **large language
    models** ( **LLMs** ) and agent-based orchestration, are reshaping the way ML
    systems are built and deployed. With application frameworks such as LangChain
    and Langraph, deep learning-based frameworks such as PyTorch and TensorFlow, and
    emerging protocols such as **Model Context Protocol** ( **MCP** ), developers
    now have an unprecedented toolkit to build intelligent, context-aware, and continuously
    learning systems.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将探讨最近在**大型语言模型**（**LLMs**）和基于代理的编排方面的进步，如何重塑机器学习系统的构建和部署方式。有了如LangChain和Langraph这样的应用框架，基于深度学习的框架如PyTorch和TensorFlow，以及新兴的协议如**模型上下文协议**（**MCP**），开发者现在拥有前所未有的工具集来构建智能、情境感知且持续学习的系统。
- en: This chapter aims to equip you with both the practical tooling and the architectural
    mindset needed to move from experimental models to robust, enterprise-ready ML
    systems. Whether you’re building your first pipeline or scaling a fleet of production
    models, the concepts discussed here are essential to doing it right and doing
    it sustainably.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本章旨在为您提供从实验模型到稳健、企业级机器学习系统所需的实用工具和架构思维。无论您是在构建第一个流水线还是扩展生产模型集群，这里讨论的概念对于正确且可持续地完成工作至关重要。
- en: 'The following key topics are covered in this chapter:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下关键主题：
- en: Understanding the foundations for sustainable operationalization
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解可持续运营的基础
- en: Bridging SDLC and ML development cycles
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接软件开发生命周期（SDLC）和机器学习开发周期
- en: Infrastructure and architecture choices for AI/ML deployments
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI/ML部署的基础设施和架构选择
- en: What’s next in ML systems?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习系统下一步是什么？
- en: By the end of the chapter, you will understand how to productize models for
    real-world impact, modularize ML code effectively, and leverage modern frameworks
    to build scalable, maintainable AI systems.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将了解如何将模型产品化以产生现实世界的影响，有效地模块化机器学习代码，并利用现代框架构建可扩展、可维护的人工智能系统。
- en: Understanding the foundations for sustainable operationalization
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解可持续运营的基础
- en: Once the right metrics are defined and aligned with business goals, the next
    essential step in operationalizing ML solutions is productization. While building
    high-performing models is a critical milestone, it represents only the beginning
    of the journey. The true value of ML emerges when experimental prototypes are
    transformed into robust, maintainable, and scalable products that integrate seamlessly
    into business workflows. Productization provides the foundation for this transformation,
    emphasizing reproducible code, iterative feedback loops, and disciplined engineering
    practices. These practices ensure that ML systems remain adaptable, transparent,
    and cost-effective over time, minimizing technical debt while balancing rapid
    experimentation with long-term maintainability. In this section, we will explore
    the principles of ML productization, showing how they accelerate deployment and
    enable continuous learning and business impact. By tying these practices back
    to the earlier discussion on metrics, we position productization as the bridge
    between model development and real-world adoption.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了正确的指标并与业务目标保持一致，将机器学习解决方案投入运营的下一个关键步骤就是产品化。虽然构建高性能模型是一个关键里程碑，但它只是旅程的开始。机器学习的真正价值在于当实验原型被转化为稳健、可维护且可扩展的产品，这些产品能够无缝集成到业务流程中时。产品化为此转化提供了基础，强调可复制的代码、迭代反馈循环和纪律化的工程实践。这些实践确保机器学习系统在长时间内保持适应性、透明性和成本效益，同时最小化技术债务，在快速实验与长期可维护性之间取得平衡。在本节中，我们将探讨机器学习产品化的原则，展示它们如何加速部署并实现持续学习和业务影响。通过将这些实践与之前关于指标的讨论联系起来，我们将产品化定位为模型开发与现实世界应用之间的桥梁。
- en: 'From sandbox to real-world success: the need for productization'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从沙盒到现实世界成功：产品化的必要性
- en: Moving ML models from experimentation to production requires far more than high
    accuracy scores on a test dataset. Success in the real world hinges on whether
    models can reliably deliver business value, adapt to changing conditions, and
    scale effectively. ML models are inherently expensive—not just in terms of initial
    development but also in ongoing maintenance, infrastructure, and monitoring costs.
    This complexity grows dramatically with deep learning and LLMs. Therefore, it
    becomes critical to evaluate the trade-off between model complexity and incremental
    business value.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 将机器学习模型从实验转移到生产需要远不止在测试数据集上获得高准确率分数。在现实世界中的成功取决于模型是否能够可靠地提供商业价值，适应变化条件，并有效地扩展。机器学习模型本质上成本高昂——不仅包括初始开发成本，还包括持续维护、基础设施和监控成本。随着深度学习和大型语言模型的出现，这种复杂性急剧增加。因此，评估模型复杂性与增量商业价值之间的权衡变得至关重要。
- en: 'The following table highlights the critical trade-offs between model performance,
    training time, and memory usage:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格突出了模型性能、训练时间和内存使用之间的关键权衡：
- en: '| **Algorithm** | **Training time complexity** | **Prediction time complexity**
    | **Auxiliary space complexity** | **Remarks** |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| **算法** | **训练时间复杂度** | **预测时间复杂度** | **辅助空间复杂度** | **备注** |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| **Linear regression** | **O(n*m² + m³)** | **O(m)** | **O(m)** | Low runtime
    and space complexity. |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
  zh: '| **线性回归** | **O(n*m² + m³)** | **O(m)** | **O(m)** | 运行时间和空间复杂度低。 |'
- en: '| **Logistic regression** | **O(nm)** | **O(m)** | **O(m)** | Low runtime and
    space complexity. |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| **逻辑回归** | **O(nm**) | **O(m**) | **O(m**) | 运行时间和空间复杂度低。|'
- en: '| **Naive Bayesian** | **O(n*m)** | **O(c*m)** | **O(c*m)** | Works well with
    high-dimensional data. |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| **朴素贝叶斯** | **O(n*m)** | **O(c*m)** | **O(c*m)** | 适用于高维数据。|'
- en: '| **Decision trees** | **O(nlog(n)d)** | **O(d)** | **O(p)** | Efficient for
    handling both numerical and categorical data, but can be prone to overfitting.
    |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| **决策树** | **O(nlog(n)d**) | **O(d**) | **O(p**) | 适用于处理数值和分类数据，但可能容易过拟合。|'
- en: '| **Gradient boosting** | **O(nlog(n)dr)** | **O(dr)** | **O(pr + br)** | *br
    << dr* ; *br* is the number of boosting rounds, and *dr* is the depth of each
    tree in the boosting process. |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| **梯度提升** | **O(nlog(n)dr**) | **O(dr**) | **O(pr + br**) | *br << dr*；*br*
    是提升轮数，*dr* 是提升过程中每棵树的深度。|'
- en: '| **Random forest** | **O(nlog(n)*dntree)** | **O(dntree)** | **O(pntree)**
    | *dntree* is the depth of an individual tree in the random forest, and *pntree*
    is the number of parameters or features used in each tree. Provides better generalization
    than a single decision tree. |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| **随机森林** | **O(nlog(n)*dntree**) | **O(dntree**) | **O(pntree**) | *dntree*
    是随机森林中单个树的深度，而 *pntree* 是每个树中使用的参数或特征的数量。比单个决策树提供更好的泛化能力。|'
- en: '| **Support vector machine (SVM)** | **O(n²m + n³)** | **O(mnsv)** | **O(nsv)**
    | High training time but low space complexity. Suitable for low-latency problems
    and small datasets. |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| **支持向量机 (SVM**) | **O(n²m + n³**) | **O(mnsv**) | **O(nsv**) | 训练时间高但空间复杂度低。适用于低延迟问题和小型数据集。|'
- en: '| **K-means** | **O(nmki)** | **O(mk)** | **O(nm + km)** | Fast and scalable
    for large datasets, but sensitive to initialization and requires choosing *k*
    . |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| **K-means** | **O(nmki**) | **O(mk**) | **O(nm + km**) | 对于大型数据集快速且可扩展，但对初始化敏感，需要选择
    *k*。|'
- en: '| **K-nearest neighbors (KNN)** | **O(1)** | **O(nm)** | **O(nm)** | No training
    time, but high prediction time. Requires storing the entire dataset. |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| **K最近邻 (KNN**) | **O(1**) | **O(nm**) | **O(nm**) | 无训练时间，但预测时间高。需要存储整个数据集。|'
- en: '| **Hierarchical clustering** | **O(n³) = O(n²log(n))** | **O(mn)** | **O(n²)**
    | High training time, high runtime, and high space complexity. Not suitable for
    low-latency applications. |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| **层次聚类** | **O(n³) = O(n²log(n))** | **O(mn)** | **O(n²)** | 训练时间、运行时间和空间复杂度都高。不适合低延迟应用。|'
- en: '| **DBSCAN** | **O(n²) / O(nlog(n))** | **O(mn)** | **O(n)** | Better than
    hierarchical clustering in terms of time and space complexity. Handles noise and
    clusters of arbitrary shapes. |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| **DBSCAN** | **O(n²) / O(nlog(n))** | **O(mn)** | **O(n)** | 在时间和空间复杂度方面优于层次聚类。处理噪声和任意形状的簇。|'
- en: '| **Principal component analysis (PCA)** | **O(nm*min(n, m) + m³)** | **O(Im)**
    | **O(Im)** | The complexity of covariance matrix computation is *O(nm × min(n,
    m))* . Eigenvalue decomposition is *O(m³)* . *O(Im)* is for the transformation
    matrix. Reduces dimensionality effectively but can be computationally expensive.
    |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| **主成分分析 (PCA**) | **O(nm*min(n, m) + m³**) | **O(Im)** | **O(Im)** | 协方差矩阵计算的复杂度为
    *O(nm × min(n, m))* 。特征值分解的复杂度为 *O(m³)* 。*O(Im)* 是变换矩阵的复杂度。有效地降低维度，但可能计算成本高。|'
- en: '| **t-distributed stochastic neighbor embedding (t-SNE)** | **O(n²)** | **O(nq)**
    | **O(n²)** | t-SNE requires significant computation and memory. Has a quadratic
    time and space complexity in the number of data points. It requires *O(3n²)* of
    memory, making it impractical for large datasets. |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| **t分布随机邻域嵌入 (t-SNE**) | **O(n²**) | **O(nq**) | **O(n²**) | t-SNE需要大量的计算和内存。在数据点的数量上具有二次的时间和空间复杂度。它需要
    *O(3n²)* 的内存，这使得它对于大型数据集来说不切实际。|'
- en: 'Table 7.1: Time and space complexities of popular ML models'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 表7.1：流行机器学习模型的时间和空间复杂度
- en: Supervised learning algorithms
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监督学习算法
- en: 'Generally speaking, supervised learning algorithms vary greatly in their speed
    and resource needs. At one end, you have the efficient workhorses: linear and
    logistic regression and naive Bayes. These models are incredibly fast to train,
    typically scaling linearly with your data size ( *O(n)* ). This makes them perfect
    for creating quick baselines or for situations where you have massive datasets
    and need a simple, interpretable model.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，监督学习算法在速度和资源需求上差异很大。一端有高效的工具：线性回归、逻辑回归和朴素贝叶斯。这些模型训练速度极快，通常与数据大小成线性比例（ *O(n)*
    ），这使得它们非常适合创建快速基线或在你拥有大量数据集且需要简单、可解释的模型的情况下使用。
- en: In the middle are tree-based models. A single decision tree is quite fast to
    train and extremely fast for making predictions. However, its tendency to overfit
    is often addressed by using ensembles. Random forest and gradient boosting are
    far more powerful and accurate because they combine hundreds of trees, but this
    comes at a cost as their training time is significantly longer, and they require
    more memory.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在中间是树形模型。单个决策树训练非常快，预测也非常快。然而，其过拟合的倾向通常通过使用集成来解决。随机森林和梯度提升比单个树更强大、更准确，因为它们结合了数百棵树，但这也带来了代价，因为它们的训练时间显著更长，并且需要更多的内存。
- en: 'Then there are the specialists. SVMs are a tale of two models: with a linear
    kernel, they are as fast as logistic regression. But for complex, non-linear problems,
    they use kernels that make training time explode ( *O(n²)* ), rendering them impractical
    for large datasets. Finally, KNN is the “lazy learner.” It does zero work during
    training; it just memorizes the entire dataset. This makes prediction extremely
    slow ( *O(n*m)* ) and memory-intensive, as it has to compare every new point to
    all the old ones.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然后是专家。SVMs是两个模型的故事：使用线性核时，它们与逻辑回归一样快。但对于复杂、非线性问题，它们使用使训练时间爆炸（*O(n²)*）的核，这使得它们对于大型数据集来说不切实际。最后，KNN是“懒惰的学习者”。在训练期间它不做任何工作；它只是记住整个数据集。这使得预测非常慢（*O(n*m)*）且内存密集型，因为它必须将每个新点与所有旧点进行比较。
- en: Unsupervised learning algorithms
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 无监督学习算法
- en: For unsupervised tasks such as clustering, K-means is the sprinter. It’s very
    fast and scales well, making it a go-to for partitioning large datasets into a
    predefined number ( *k* ) of clusters. In contrast, DBSCAN is a bit slower but
    much more flexible; it can find oddly shaped clusters and automatically identify
    noise without you needing to specify the number of clusters. At the far end is
    hierarchical clustering, which is extremely slow ( *O(n²)* to *O(n³)* ) and memory-hungry,
    making it suitable only for small datasets where you need to explore nested cluster
    structures.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 对于无监督任务，如聚类，K-means是短跑运动员。它非常快，并且扩展性好，使其成为将大型数据集划分为预定义数量（*k*）的簇的首选。相比之下，DBSCAN要慢一些，但更加灵活；它可以找到形状奇特的簇，并自动识别噪声，而无需你指定簇的数量。在另一端是层次聚类，它非常慢（*O(n²)*到*O(n³)*）且内存密集型，使其仅适用于需要探索嵌套簇结构的小数据集。
- en: For dimensionality reduction, PCA is the standard, efficient choice. It’s generally
    fast at transforming your data into a lower-dimensional space, though its speed
    can suffer if you have a massive number of features ( *m* ). On the other hand,
    t-SNE is a powerful tool designed specifically for visualization. It excels at
    creating meaningful 2D or 3D maps of high-dimensional data but is notoriously
    slow ( *O(n²)* ) and memory-intensive, limiting its use to smaller datasets where
    visual exploration is the primary goal.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于降维，PCA是标准且高效的选项。它通常在将数据转换到低维空间时非常快，尽管如果特征数量庞大（*m*）时，其速度可能会受到影响。另一方面，t-SNE是一个专为可视化设计的强大工具。它在创建高维数据的2D或3D有意义的地图方面表现出色，但因其著名的慢速（*O(n²)*）和内存密集型，限制了其在以视觉探索为主要目标的较小数据集上的使用。
- en: So, you’ve built a great ML model that shows a lot of promise. What’s next?
    The hardest part isn’t just creating a smart algorithm; it’s turning that algorithm
    into a reliable product that people can use. This crucial step is called **productization**
    .
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你已经构建了一个表现出很多潜力的优秀机器学习模型。接下来是什么？最困难的部分不仅仅是创建一个智能算法；而是将这个算法转化为一个可靠的产品，让人们可以使用。这个关键步骤被称为**产品化**。
- en: 'Think of it like this: a brilliant chef can create a stunning new dish in their
    kitchen. Productization is the process of designing a restaurant and a system
    that can perfectly recreate that dish for hundreds of customers every single night.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：一位杰出的厨师可以在他们的厨房里创造出一道令人惊叹的新菜肴。产品化是将设计餐厅和系统化的过程，以便每晚都能为数百名顾客完美地复制这道菜肴。
- en: 'To do this successfully, the process needs to be engineered for the real world.
    This means the following:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功做到这一点，过程需要针对现实世界进行工程化。这意味着以下内容：
- en: '**Modular design** : Building the model in interchangeable pieces, so it’s
    easy to update or fix one part without breaking the whole system'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模块化设计**：将模型构建成可互换的部件，这样就可以轻松更新或修复某个部分，而不会破坏整个系统'
- en: '**Robust versioning** : Keeping a strict record of all changes, like a detailed
    cookbook that tracks every tweak to a recipe'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**稳健的版本控制**：对所有更改进行严格的记录，就像一个详细的食谱，跟踪对食谱的每一次调整'
- en: '**Automated pipelines** : Creating an “assembly line” that automatically tests
    and deploys new versions of the model, ensuring quality and speed'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化管道**：创建一个“装配线”，自动测试和部署模型的最新版本，确保质量和速度'
- en: '**Thoughtful infrastructure** : Choosing the right hardware and cloud services
    to ensure that the model can handle heavy demand without crashing'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深思熟虑的基础设施**：选择合适的硬件和云服务，以确保模型能够处理重负载而不会崩溃'
- en: In short, productization is the bridge between a cool experiment and a valuable
    business tool. It’s the engineering foundation that ensures an ML model delivers
    consistent, reliable results, and it’s what we’ll be diving into next.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，产品化是酷炫实验和有价值的商业工具之间的桥梁。它是确保机器学习模型提供一致、可靠结果的工程基础，也是我们将要深入探讨的内容。
- en: Before that, let’s discuss why feedback loops matter.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之前，让我们讨论一下为什么反馈循环很重要。
- en: 'It’s common to celebrate a model that achieves high accuracy in an offline
    test. However, this often fails to translate into production success. Real-world
    environments are dynamic and unpredictable, and models trained solely on historical
    data may underperform once deployed. Feedback loops are essential to close this
    gap. They enable continuous learning and model refinement after deployment. Several
    challenges may surface in production:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在离线测试中，庆祝模型达到高准确率是很常见的。然而，这往往无法转化为生产成功。现实世界环境是动态和不可预测的，仅基于历史数据训练的模型一旦部署可能会表现不佳。反馈循环对于缩小这一差距至关重要。它们使模型在部署后能够持续学习和模型优化。在生产中可能会出现一些挑战：
- en: Missing behavioral patterns in training data
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练数据中缺失的行为模式
- en: Key influencing factors excluded from feature sets
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从特征集中排除的关键影响因素
- en: Sampling biases that cause a model to overfit certain subgroups
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导致模型过度拟合某些子组的采样偏差
- en: 'The feedback loop allows organizations to address these challenges systematically:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈循环允许组织系统地解决这些挑战：
- en: '**User feedback** : End users can reveal gaps in model predictions that internal
    testing missed. For example, an e-commerce recommendation system might ignore
    seasonality, leading to poor product suggestions.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户反馈**：最终用户可以揭示模型预测中的差距，这些差距在内部测试中被忽略。例如，一个电子商务推荐系统可能会忽略季节性，导致产品建议不佳。'
- en: '**Data drift monitoring** : Over time, shifts in user behavior or market conditions
    can degrade model performance. Monitoring drift enables timely model retraining.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据漂移监控**：随着时间的推移，用户行为或市场条件的变化可能会降低模型性能。监控漂移可以及时进行模型重新训练。'
- en: '**Data augmentation** : New edge cases encountered in production can enrich
    the training dataset, improving model robustness.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据增强**：在生产中遇到的新边缘情况可以丰富训练数据集，提高模型的鲁棒性。'
- en: Ultimately, the journey from prototype to production is iterative. Deployed
    models must be continuously monitored, refined, and retrained to remain useful.
    Productization, supported by active feedback loops, transforms static models into
    adaptive, high-performing systems.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，从原型到生产的旅程是迭代的。部署的模型必须持续监控、优化和重新训练，以保持其有用性。在积极的反馈循环支持下，产品化将静态模型转化为自适应、高性能的系统。
- en: 'Beyond feedback: why productization accelerates ML value creation'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越反馈：为什么产品化加速了机器学习价值创造
- en: 'Feedback loops are only part of the equation. Productization unlocks additional
    benefits critical to long-term ML success:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈循环只是方程的一部分。产品化解锁了对于长期机器学习成功至关重要的额外好处：
- en: '**Scalability** : Experimental models often falter under real-world data volumes
    or user loads. Productization ensures that systems can scale effectively.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：实验模型往往在现实世界的数据量或用户负载下失败。产品化确保系统可以有效地扩展。'
- en: '**Maintainability** : Production systems require rigorous monitoring and maintenance.
    Productization encourages practices such as version control, automated testing,
    and modular design to simplify upkeep.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可维护性**：生产系统需要严格的监控和维护。产品化鼓励诸如版本控制、自动化测试和模块化设计等实践，以简化维护工作。'
- en: '**Innovation** : Productized systems enable faster innovation. By modularizing
    components, teams can easily experiment with new models or data sources without
    disrupting the entire pipeline.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新**：产品化的系统可以加快创新速度。通过模块化组件，团队可以轻松地尝试新的模型或数据源，而不会影响整个流程。'
- en: '**Technical debt management** : Rapid experimentation often leads to shortcuts
    that accumulate technical debt. Productization provides a chance to reduce this
    debt, clean up code bases, and build more stable systems.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术债务管理**：快速实验往往会导致捷径，积累技术债务。产品化提供了减少这种债务、清理代码库和构建更稳定系统的机会。'
- en: Consider an e-commerce recommendation engine. Without productization, adding
    new categories or scaling to a larger user base would be cumbersome. A productized
    system, however, is designed to handle evolving business needs through modular
    architecture and clear handoffs between data science and engineering teams.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 考慮一個電商推薦引擎。沒有產品化，添加新類別或擴展到更大的用戶群將會很麻煩。然而，產品化系統是設計來通過模塊化架構和數據科學與工程團隊之間清晰的移交來應對變化的商業需求。
- en: 'Code reproducibility: the bedrock of reliable systems'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代碼可重現性：可靠系統的基礎
- en: 'Reproducibility is fundamental for scaling and maintaining ML solutions. Without
    it, collaboration, debugging, and deployment become fraught with risk. Key reproducibility
    practices include the following:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 可重現性對擴展和維護機器學習解決方案是基礎。沒有它，協作、錯誤调试和部署將充滿風險。關鍵的可重現性實踐包括以下幾點：
- en: '**Version control** : Tools such as Git and **data version control** ( **DVC**
    ) help track changes to code, datasets, and models'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**版本控制**：如Git和**數據版本控制**（**DVC**）等工具幫助跟蹤代碼、數據集和模型的變更'
- en: '**Containerization** : Docker and Kubernetes create consistent runtime environments
    across development and production'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容器化**：Docker和Kubernetes在開發和生產中創建一貫的運行環境'
- en: '**Automated pipelines** : CI/CD tools automate testing and deployment, reducing
    human error'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自動化管道**：CI/CD工具自動化測試和部署，減少人為錯誤'
- en: 'These practices ensure that models can be reliably reproduced, audited, and
    transferred across teams and systems. Reproducibility is a non-negotiable prerequisite
    for robust AI productization. Applying first principles of thinking to ML code
    encourages clarity, efficiency, and maintainability. Effective code design focuses
    on simplicity, modularity, and separation of concerns:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 這些做法確保模型可以可靠地重現、審計和跨團隊、系統轉移。可重現性是堅固AI產品化的不可商量的先決條件。將思考的第一原理應用於機器學習代碼，鼓勵清晰、高效和可維護。有效的代碼設計重點在於簡單性、模塊化和關注點分離：
- en: '**Readable and modular code** : Clean, well-structured code improves collaboration
    and speeds up debugging'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可讀性和模塊化代碼**：乾淨、結構良好的代碼提高協作並加快錯誤调试'
- en: '**Comprehensive documentation** : Clear explanations help teams understand
    model behavior and maintain code over time'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全面的文檔**：清晰的解釋幫助團隊理解模型行為並隨時間維護代碼'
- en: '**Separation of data, models, and logic** : Decoupling data pipelines, model
    training, and inference layers increases flexibility and reduces system fragility'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**數據、模型和邏輯的分離**：解耦數據管道、模型訓練和推斷層次增加靈活性並減少系統脆弱性'
- en: In modern ML architectures, this often involves integrating feature stores or
    data APIs to decouple feature engineering from modeling. Such designs improve
    both scalability and speed of deployment.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在現代機器學習架構中，這通常涉及整合特徵存儲或數據API，以解耦特徵工程與建模。這種設計提高了可擴展性和部署速度。
- en: Minimizing technical debt
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最小化技術負債
- en: 'Unchecked technical debt can cripple M initiatives. It often arises from rushed
    experiments, undocumented workflows, and ad-hoc pipeline extensions. To reduce
    technical debt, consider the following:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 未受控制的技術負債可能會損害M項目。它通常來自匆忙的實驗、未記錄的工作流程和臨時的管道擴展。為了減少技術負債，考慮以下幾點：
- en: '**Standardize practices** : Establish shared coding, data, and model governance
    standards'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**標準化實踐**：建立共享的編程、數據和模型治理標準'
- en: '**Refactor regularly** : Schedule time for code base cleanup and optimization'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期重构**：安排時間進行代碼庫清理和優化'
- en: '**Modularize pipelines** : Design pipelines so that individual components can
    evolve independently'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模塊化管道**：設計管道，使單個组件可以獨立發展'
- en: Proactive technical debt management ensures that ML systems remain adaptable
    and sustainable over time.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 主動管理技術負債確保機器學習系統隨時間保持適應性和可持續性。
- en: Balancing experimentation with refactoring
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平衡實驗與重构
- en: ML development requires a delicate balance between fast experimentation and
    disciplined engineering. Both are necessary for sustainable success.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 機器學習開發需要在快速實驗和嚴謹工程之間取得精巧的平衡。兩者都是持續成功的必要條件。
- en: 'Effective strategies include the following:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 有效策略包括以下幾點：
- en: '**Isolated experimentation** : Rapid prototyping in sandboxed environments
    minimizes production risks'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隔離實驗**：在沙盒環境中快速原型設計最小化生產風險'
- en: '**Scheduled refactoring** : Allocate time for cleaning and optimizing code
    bases regularly'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期重构**：定期分配時間進行清理和優化代碼庫'
- en: '**Controlled releases** : Only integrate thoroughly validated changes into
    production systems'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**控制釋放**：僅將徹底驗證的變更整合到生產系統中'
- en: This balance enables innovation without sacrificing long-term maintainability,
    leading to stable and adaptable AI solutions.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这种平衡在不牺牲长期可维护性的情况下促进创新，从而产生稳定且适应性强的人工智能解决方案。
- en: AI/ML productization is not merely a technical exercise; it is a strategic enabler
    of long-term business value. By embedding recurrent feedback loops, ensuring code
    reproducibility, applying sound engineering principles, and managing technical
    debt, organizations can turn promising AI experiments into durable, scalable solutions.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: AI/ML产品化不仅仅是一项技术练习；它是长期商业价值的战略推动者。通过嵌入循环反馈、确保代码可重复性、应用良好的工程原则和管理技术债务，组织可以将有希望的AI实验转化为耐用、可扩展的解决方案。
- en: Productization ensures that models are not just accurate in the lab but impactful
    in the real world. It transforms ML from a research effort into a reliable, repeatable,
    and continuously improving business capability. By adopting these foundational
    practices, organizations can unlock the full potential of AI and build systems
    that deliver measurable impact for years to come.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 产品化确保模型不仅在实验室中准确，而且在现实世界中具有影响力。它将机器学习从一项研究努力转变为可靠、可重复且持续改进的商业能力。通过采用这些基础实践，组织可以释放人工智能的潜力，并构建能够多年带来可衡量影响的系统。
- en: As organizations move from experimentation to production, the next critical
    step is aligning AI/ML workflows with established software engineering practices.
    This requires bridging the gap between traditional **software development life
    cycles** ( **SDLCs** ) and the unique demands of ML systems.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 随着组织从实验转向生产，下一个关键步骤是将AI/ML工作流程与既定的软件工程实践对齐。这需要弥合传统**软件开发生命周期**（**SDLCs**）与机器学习系统独特需求之间的差距。
- en: '**Note**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: We emphasize that successful AI deployment goes beyond building accurate models—it
    requires productization to transform prototypes into scalable, maintainable solutions
    integrated within business workflows. Key practices include establishing feedback
    loops, ensuring reproducible and modular code, managing technical debt, and balancing
    rapid experimentation with systematic refactoring. These foundations enable AI
    systems to adapt and evolve with changing data and business needs, ensuring sustained
    value. Ultimately, productization bridges the gap between development and real-world
    impact.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们强调，成功的AI部署不仅限于构建准确的模型——它需要产品化，将原型转化为可扩展、可维护的解决方案，并集成到业务流程中。关键实践包括建立反馈循环、确保可重复和模块化代码、管理技术债务，以及平衡快速实验与系统重构。这些基础使AI系统能够适应和随着数据及业务需求的变化而进化，确保持续的价值。最终，产品化弥合了开发与现实世界影响之间的差距。
- en: Bridging SDLC and ML development cycles
  id: totrans-95
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 桥接软件开发生命周期（SDLC）和机器学习开发周期
- en: The development of ML systems shares similarities with traditional software
    development but introduces unique complexities due to its dynamic nature. Unlike
    conventional software, where code is the primary artifact, ML systems depend equally
    on data, model configurations, and infrastructure, all of which continuously evolve.
    This necessitates robust life cycle management practices that encompass versioning
    of code, data, and infrastructure to ensure reproducibility and maintainability.
    Furthermore, ML is not just about delivering a static model file but about managing
    an entire pipeline that automates data processing, model training, evaluation,
    and deployment. Modular design, through procedural programming, object-oriented
    principles, and modern frameworks, is essential to handle this complexity by making
    ML systems scalable, maintainable, and adaptable to change. This section explores
    these foundational concepts, drawing parallels to **software development life
    cycle** ( **SDLC** ) while emphasizing the dynamic, evolving nature of ML systems
    and best practices for modularizing code bases to support sustainable AI/ML operations.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习系统的发展与传统软件开发有相似之处，但由于其动态特性，也引入了独特的复杂性。与以代码为主要成果的传统软件不同，机器学习系统同样依赖于数据、模型配置和基础设施，所有这些都在不断进化。这需要强大的生命周期管理实践，包括代码、数据和基础设施的版本控制，以确保可重复性和可维护性。此外，机器学习不仅仅是交付一个静态的模型文件，而是管理一个整个管道，该管道自动化数据处理、模型训练、评估和部署。通过过程编程、面向对象原则和现代框架的模块化设计是处理这种复杂性的关键，它使机器学习系统可扩展、可维护，并能适应变化。本节探讨了这些基础概念，将它们与**软件开发生命周期**（**SDLC**）进行比较，同时强调机器学习系统的动态、进化特性以及模块化代码库的最佳实践，以支持可持续的AI/ML操作。
- en: Code and data versioning in ML
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习中的代码和数据版本控制
- en: In SDLC, code versioning is a standard practice that allows developers to track
    changes, revert to previous versions, and collaborate on code. In the ML development
    cycle, however, data versioning is equally important. In traditional software
    development, the behavior of the software remains relatively stable as long as
    the code remains unchanged. However, in ML systems, even if the code remains the
    same, changes in the underlying data can drastically affect the model’s behavior.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在软件开发生命周期（SDLC）中，代码版本控制是一种标准做法，它允许开发者跟踪变更、回滚到先前版本以及协同代码开发。然而，在机器学习（ML）的开发周期中，数据版本控制同样重要。在传统的软件开发中，只要代码保持不变，软件的行为相对稳定。但在机器学习系统中，即使代码保持不变，底层数据的变更也可能极大地影响模型的行为。
- en: Without proper versioning of both data and code, AI/ML teams might find it difficult
    to reproduce results or explain model behavior after deployment. A model might
    have been trained on a particular dataset, and when new data becomes available,
    its performance might change significantly. Thus, to ensure reproducibility and
    maintain consistency in deployments, both code and data should be versioned.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有对数据和代码进行适当的版本控制，AI/ML团队可能会发现难以在部署后重现结果或解释模型行为。一个模型可能是在特定的数据集上训练的，当新数据可用时，其性能可能会显著变化。因此，为了确保可重现性和在部署中保持一致性，代码和数据都应该进行版本控制。
- en: Additionally, versioning is not limited to data and code but also extends to
    the infrastructure. Infrastructure versioning ensures that the environment in
    which the model was trained (such as specific hardware configurations, dependencies,
    and libraries) is reproducible. This becomes crucial when deploying the model
    across different environments, whether on-premises, in the cloud, or on edge devices.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，版本控制不仅限于数据和代码，还扩展到基础设施。基础设施版本控制确保了模型训练的环境（例如特定的硬件配置、依赖项和库）是可重现的。当在本地、云端或边缘设备上部署模型时，这一点变得至关重要。
- en: Just as code versioning allows for rollback in a traditional SDLC, model versioning
    ensures that teams can roll back to previous models when new deployments cause
    unexpected results.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 正如代码版本控制允许在传统的SDLC中进行回滚一样，模型版本控制确保团队可以在新部署导致意外结果时回滚到先前模型。
- en: Is ML a model file package or a pipeline?
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习是模型文件包还是流水线？
- en: 'One of the most critical and often misunderstood aspects of ML is whether it
    is merely a model file package or a complete pipeline. The short answer is that
    ML is a dynamic and evolving component that requires three levels of versioning:
    data, code, and infrastructure. Without proper versioning and tracking across
    these dimensions, reproducing results and maintaining ML systems becomes extremely
    challenging.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习最关键且常常被误解的一个方面是，它仅仅是一个模型文件包，还是一个完整的流水线。简短的回答是，机器学习是一个动态且不断发展的组件，需要三个层次的版本控制：数据、代码和基础设施。如果没有在这些维度上进行适当的版本控制和跟踪，重现结果和维护机器学习系统将变得极其困难。
- en: A common misconception is that sharing a pickle file ( `.pkl` or `.h5` ) or
    any other serialized model file (e.g., TensorFlow Saved Model, ONNX, or PMML)
    is enough to reproduce an ML model’s output. However, this is far from sufficient.
    A model file is essentially a frozen state of learned parameters without context
    about the data used to train it, the preprocessing pipeline, hyperparameters,
    or even the specific hardware or software stack used during training. Without
    this metadata and supporting infrastructure, simply sharing a model file is like
    handing someone a locked safe without providing the key or the combination to
    open it.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的误解是，共享一个pickle文件（`.pkl`或`.h5`）或任何其他序列化的模型文件（例如，TensorFlow保存模型、ONNX或PMML）就足以重现机器学习模型的输出。然而，这远远不够。模型文件本质上是无上下文的已学习参数的冻结状态，没有关于用于训练它的数据、预处理流水线、超参数，甚至是在训练期间使用的特定硬件或软件堆栈的信息。没有这些元数据和支持性基础设施，仅仅共享模型文件就像给别人一个上锁的保险箱，但没有提供钥匙或开启它的组合。
- en: Why persisting the entire ML pipeline matters
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么持续整个机器学习流水线很重要
- en: 'To ensure that ML systems are reproducible and maintainable, we need to store
    and version not only the trained model but the entire pipeline, which includes
    the following:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保机器学习系统是可重现和可维护的，我们需要存储和版本化不仅训练好的模型，还包括整个流水线，这包括以下内容：
- en: '**Data processing steps** : The exact transformations applied to raw data before
    feeding it into the model. This includes handling missing values, feature engineering,
    scaling, and encoding categorical variables.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据处理步骤**：在将原始数据输入模型之前应用的精确转换。这包括处理缺失值、特征工程、缩放和对分类变量进行编码。'
- en: '**Feature selection and engineering** : Specific steps used to generate the
    features that the model relies on. If these are not versioned, even the best-trained
    model will not work correctly when new data arrives.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征选择和工程**：用于生成模型所依赖特征的特定步骤。如果这些步骤没有进行版本控制，即使是最优秀的训练模型，在新的数据到来时也可能无法正确工作。'
- en: '**Model training configuration** : Hyperparameters, training epochs, optimizer
    settings, and validation criteria used in training the model.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型训练配置**：在训练模型时使用的超参数、训练轮数、优化器设置和验证标准。'
- en: '**Code base versioning** : The specific version of the code, libraries, and
    dependencies used to train and deploy the model.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码库版本控制**：用于训练和部署模型的特定代码、库和依赖项的版本。'
- en: '**Infrastructure dependencies** : The runtime environment, GPU availability,
    cloud-based services, or containerized deployment strategies used in the ML pipeline.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础设施依赖**：在机器学习管道中使用的运行时环境、GPU可用性、基于云的服务或容器化部署策略。'
- en: For example, consider a recommendation system for an e-commerce platform. If
    a data scientist merely shares the trained model file but does not document the
    feature extraction logic (e.g., how user behavior data was transformed into input
    vectors), a different engineer trying to replicate the model later may generate
    different results due to slight variations in preprocessing.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑一个电子商务平台的推荐系统。如果数据科学家仅仅共享训练好的模型文件，而没有记录特征提取逻辑（例如，用户行为数据是如何转换为输入向量的），那么试图后来复现该模型的另一位工程师可能会因为预处理中的细微差异而产生不同的结果。
- en: A more robust approach is to use tools such as MLflow, DVC, or Kubeflow Pipelines
    to track and manage the full life cycle of ML models. These tools help with versioning,
    experiment tracking, and deployment consistency, ensuring that the ML pipeline
    remains reproducible and scalable across different environments.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一种更稳健的方法是使用MLflow、DVC或Kubeflow Pipelines等工具来跟踪和管理机器学习模型的整个生命周期。这些工具有助于版本控制、实验跟踪和部署一致性，确保机器学习管道在不同环境中保持可重复和可扩展。
- en: 'The following diagram illustrates the various components that make up a complete
    and reproducible ML pipeline, extending beyond model training to include data
    handling, deployment, and monitoring. It emphasizes why persisting through every
    stage is essential for long-term reliability and scalability:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图示说明了构成完整且可重复的机器学习管道的各种组件，它不仅包括模型训练，还包括数据处理、部署和监控。它强调了在长期可靠性和可扩展性方面，坚持每个阶段的重要性：
- en: '![img](img/B34239_07_1.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_07_1.png)'
- en: 'Figure 7.1: ML pipeline components beyond model training, including data, deployment,
    and monitoring'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1：超出模型训练的机器学习管道组件，包括数据、部署和监控
- en: As we have components established for production workflows, the next critical
    step is discussing best practices for building pipelines. Since ML is different
    from a typical SDLC pipeline, frameworks are discussed extensively with their
    associated benefits in the following sections.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经为生产工作流程建立了组件，下一步关键步骤是讨论构建管道的最佳实践。由于机器学习与典型的软件开发生命周期（SDLC）管道不同，因此以下章节将广泛讨论框架及其相关的优势。
- en: 'Pipelines: ensuring scalability and stability'
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管道：确保可扩展性和稳定性
- en: One of the most critical components of deploying ML models at scale is the concept
    of pipelines. A pipeline automates the end-to-end process of data ingestion, preprocessing,
    model training, evaluation, and deployment, ensuring that the system is stable,
    scalable, and repeatable.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在大规模部署机器学习模型时，管道的概念是其中最关键的组成部分之一。管道自动化了数据摄入、预处理、模型训练、评估和部署的端到端流程，确保系统稳定、可扩展且可重复。
- en: In traditional ML workflows, models are often treated as static files. Once
    trained, they are saved and deployed. However, this approach leads to several
    challenges, such as ensuring that the model is retrained on updated data, handling
    model versioning, and integrating new features.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的机器学习工作流程中，模型通常被视为静态文件。一旦训练完成，它们就会被保存并部署。然而，这种方法会导致一些挑战，例如确保模型在更新的数据上重新训练、处理模型版本控制以及集成新功能。
- en: Google’s influential paper, *Hidden Technical Debt in Machine Learning Systems*
    , highlights how building pipelines rather than relying on static model files
    helps manage technical debt. The paper argues that the complexity in ML systems
    arises not just from the models themselves but from the surrounding systems that
    handle data, feature engineering, monitoring, and more.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌有影响力的论文《机器学习系统中的隐藏技术债务》强调了构建管道而不是依赖静态模型文件如何帮助管理技术债务。该论文认为，机器学习系统中的复杂性不仅来自模型本身，还来自处理数据、特征工程、监控等周围的系统。
- en: 'A well-designed pipeline ensures the following:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 一个设计良好的管道确保以下内容：
- en: '**Data is continuously refreshed** : New data is automatically ingested, processed,
    and passed through the model'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据持续刷新**：新数据被自动摄取、处理并通过模型。'
- en: '**Model retraining is automated** : Whenever new data or features are introduced,
    the model can be retrained, evaluated, and redeployed without manual intervention'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型重新训练是自动化的**：每当引入新的数据或特征时，模型可以重新训练、评估和重新部署，无需人工干预。'
- en: '**End-to-end traceability is maintained** : Pipelines track every stage of
    the process, ensuring that every model version is reproducible'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**端到端可追溯性得到保持**：管道跟踪过程的每个阶段，确保每个模型版本都是可重现的。'
- en: By building pipelines, ML teams can automate the deployment process and reduce
    the risk of manual errors. They also make it easier to scale models across multiple
    environments, integrate new data sources, and experiment with new models.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 通过构建管道，机器学习团队可以自动化部署过程，降低人为错误的风险。它们还使得在多个环境中扩展模型、集成新的数据源和尝试新的模型变得更加容易。
- en: 'Modularization in ML code: procedural programming, OOP, and frameworks'
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习代码中的模块化：过程化编程、OOP和框架
- en: Code modularization plays a critical role in ensuring maintainability, scalability,
    and adaptability of AI/ML solutions. Various approaches to modularization, including
    procedural programming, **object-oriented programming** ( **OOP** ), and frameworks,
    offer different benefits and trade-offs. Choosing the right approach is crucial
    for building robust and extensible ML systems.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 代码模块化在确保人工智能/机器学习解决方案的可维护性、可扩展性和适应性方面发挥着关键作用。包括过程化编程、**面向对象编程**（**OOP**）和框架在内的各种模块化方法提供了不同的利益和权衡。选择正确的方法对于构建健壮和可扩展的机器学习系统至关重要。
- en: Procedural programming focuses on writing sequences of instructions that the
    computer follows step by step. While procedural code is easy to write and understand
    in small projects, it quickly becomes unwieldy in larger systems. As the size
    of the codebase grows, the lack of modularity leads to code duplication, difficulties
    in debugging, and increased technical debt.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 过程化编程侧重于编写计算机按步骤执行的指令序列。虽然在小项目中，过程化代码易于编写和理解，但在大型系统中，它很快就会变得难以控制。随着代码库规模的扩大，缺乏模块化会导致代码重复、调试困难和技术债务的增加。
- en: 'For AI/ML systems, procedural programming can be effective when the code base
    is small, but as more data sources, models, and features are added, it becomes
    more challenging to manage. This is where OOP or frameworks become important.
    Here is a representational example of OOP:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能/机器学习系统，当代码库较小时，过程化编程可能有效，但随着更多数据源、模型和特征的添加，管理起来变得更加具有挑战性。这就是面向对象编程或框架变得重要的地方。以下是一个面向对象编程的示例：
- en: '[PRE0]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: While this approach works for small projects, as the number of steps grows (e.g.,
    handling missing values, feature selection, and model training), procedural code
    becomes harder to manage and debug.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 当项目规模较小时，这种方法是有效的，但随着步骤数量的增加（例如，处理缺失值、特征选择和模型训练），过程化代码的管理和调试变得更加困难。
- en: OOP offers a way to modularize code by organizing it into reusable objects that
    encapsulate both data and methods. While OOP is more difficult to set up initially
    compared to procedural programming, it offers significant long-term benefits,
    especially for ML systems. In OOP, models, datasets, and preprocessing steps can
    be represented as objects, each with its own methods and attributes. This structure
    makes it easier to maintain, extend, and debug the code base, as changes to one
    part of the system are less likely to affect others.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 面向对象编程（OOP）提供了一种通过组织成可重用对象来模块化代码的方法，这些对象封装了数据和方法。与过程化编程相比，OOP在初始设置上可能更困难，但它提供了显著的长远利益，尤其是在机器学习系统中。在OOP中，模型、数据集和预处理步骤可以表示为对象，每个对象都有自己的方法和属性。这种结构使得维护、扩展和调试代码库变得更加容易，因为系统某一部分的更改不太可能影响其他部分。
- en: 'The major challenge with OOP is that it requires a more disciplined design
    approach up front. However, once set up, it can significantly improve code maintainability
    and scalability, particularly for large, complex systems. The following code shows
    OOP style. Code is structured as reusable classes rather than independent function
    calls:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 面向对象编程（OOP）的主要挑战在于它需要在前端采用更加严谨的设计方法。然而，一旦设置完成，它能够显著提高代码的可维护性和可扩展性，尤其是在大型、复杂的系统中。以下代码展示了面向对象的风格。代码结构是可重用的类，而不是独立的函数调用：
- en: '[PRE1]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Using OOP, different components such as data preprocessing, model training,
    and evaluation can be modularized, making it easier to maintain and scale ML projects.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 使用面向对象编程，可以将不同的组件（如数据预处理、模型训练和评估）模块化，这使得维护和扩展机器学习项目变得更加容易。
- en: 'Frameworks: scalable solution for complex workflows'
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 框架：复杂工作流程的可扩展解决方案
- en: While structured code, whether procedural or object-oriented, brings a great
    deal of clarity and maintainability, there are deeper challenges in ML that require
    more than just good code organization. As projects grow, they face complexities
    that cannot be solved by design patterns alone. Issues such as scalability, distributed
    computation, hardware acceleration, and reproducibility become central concerns,
    especially in production-grade systems where large datasets and intensive models
    are the norm. Frameworks step in here as indispensable tools.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然结构化代码（无论是过程式还是面向对象）带来了极大的清晰性和可维护性，但在机器学习中存在更深层次的挑战，这些挑战需要不仅仅是良好的代码组织。随着项目的增长，它们面临的设计模式无法解决的复杂性。可扩展性、分布式计算、硬件加速和可重复性等问题成为核心关注点，尤其是在生产级系统中，大型数据集和密集型模型是常态。框架在这里作为不可或缺的工具介入。
- en: 'To appreciate why frameworks are essential, it’s helpful to think through a
    simple but fundamental scenario: training a model on data distributed across multiple
    machines. Suppose you have a dataset that spans 10 machines. In such a setting,
    model training isn’t about fitting 10 separate models independently. Instead,
    you still want to produce a single unified model that benefits from all the available
    data.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解框架的重要性，思考一个简单但基本的场景是有帮助的：在多台机器上分布式训练模型。假设你有一个跨越10台机器的数据集。在这种情况下，模型训练不是独立地拟合10个不同的模型。相反，你仍然希望产生一个单一的统一模型，该模型能够从所有可用数据中受益。
- en: But how does this happen? It’s not simply a matter of sending all the data to
    one machine, that would defeat the entire purpose of distributed processing. Instead,
    distributed training methods are employed, where each machine works on its slice
    of the data, computes partial updates to the model, and then synchronizes those
    updates with others. These machines communicate, either through a centralized
    parameter server that coordinates updates or by sharing gradients directly in
    a peer-to-peer fashion using collective communication protocols, such as those
    provided by libraries, such as Horovod or **NVIDIA Collective Communication Library**
    ( **NCCL** ).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 但这是如何实现的呢？这不仅仅是将所有数据发送到一台机器的问题，那样会违背分布式处理的目的。相反，采用了分布式训练方法，其中每台机器处理其数据的一部分，计算模型的部分更新，然后与其他机器同步这些更新。这些机器通过以下方式通信：通过协调更新的集中式参数服务器，或者通过使用集体通信协议直接在点对点方式下共享梯度，例如由库（如Horovod或**NVIDIA集体通信库**（**NCCL**））提供的协议。
- en: 'The following figure shows how a data-parallel approach to distributed training
    involves splitting up the data and training on multiple nodes in parallel:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图展示了数据并行方法在分布式训练中的应用，涉及将数据分割并在多个节点上并行训练：
- en: '![img](img/B34239_07_2.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_07_2.png)'
- en: 'Figure 7.2: A data-parallel approach to distributed training'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2：分布式训练的数据并行方法
- en: In synchronous cases, the gradients for different batches of data are calculated
    separately on each node but averaged across nodes to apply consistent updates
    to the model copy in each node.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在同步情况下，不同批次数据的梯度在每个节点上分别计算，但跨节点平均以对每个节点中的模型副本应用一致的更新。
- en: Designing and building these kinds of distributed systems manually would be
    an enormous engineering effort, requiring expertise in networking, parallel computing,
    optimization, and more. However, modern ML frameworks abstract most of these details.
    Frameworks such as TensorFlow, PyTorch, and Horovod enable developers to train
    models at scale without having to worry about the low-level mechanics of distributed
    computing.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 手动设计和构建这类分布式系统将是一项巨大的工程任务，需要网络、并行计算、优化等方面的专业知识。然而，现代机器学习框架抽象了这些细节的大部分。例如，TensorFlow、PyTorch
    和 Horovod 等框架使开发者能够在规模上训练模型，而无需担心分布式计算的底层机制。
- en: But the value of frameworks doesn’t stop distributed training. They also offer
    capabilities that are crucial for every stage of the ML pipeline. They handle
    hardware acceleration, automatically taking advantage of GPUs or TPUs where available.
    They provide tools for model checkpointing, enabling training jobs to recover
    interruptions without starting over. They support automatic logging and experiment
    tracking, which are essential for reproducibility in research and production.
    They also integrate easily with cloud platforms and orchestration tools, allowing
    models to move seamlessly from experimentation to deployment.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 但框架的价值不仅限于分布式训练。它们还提供了对机器学习流程每个阶段都至关重要的能力。它们处理硬件加速，自动利用可用的 GPU 或 TPU。它们提供模型检查点工具，使训练作业能够在中断后恢复，而无需从头开始。它们支持自动日志记录和实验跟踪，这对于研究和生产中的可重复性至关重要。它们还易于与云平台和编排工具集成，使得模型能够无缝地从实验过渡到部署。
- en: Similarly, a TensorFlow Extended pipeline is a sequence of components that implement
    an ML pipeline, which is specifically designed for scalable, high-performance
    ML tasks. That includes modeling, training, serving inference, and managing deployments
    to online, native mobile, and JavaScript targets.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，TensorFlow Extended 流程是一系列组件，它们实现了机器学习流程，专门设计用于可扩展、高性能的机器学习任务。这包括建模、训练、推理服务以及将部署管理到在线、原生移动和
    JavaScript 目标。
- en: Each framework tends to have its own area of strength. Scikit-learn, for instance,
    remains a go-to solution for classical ML tasks involving structured or tabular
    data. It’s particularly well-suited for smaller-scale problems and rapid prototyping.
    TensorFlow and PyTorch, by contrast, dominate in deep learning applications, especially
    for unstructured data such as images, audio, and text. When it comes to graph
    neural networks, PyTorch Geometric provides specialized tools that make it easier
    to build models designed to learn from graph-structured data. In the domain of
    probabilistic modeling and Bayesian inference, frameworks such as PyMC3 and TensorFlow
    Probability offer powerful abstractions for building complex probabilistic models.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 每个框架通常都有其擅长的领域。例如，Scikit-learn 仍然是涉及结构化或表格数据的经典机器学习任务的首选解决方案。它特别适合小规模问题和快速原型设计。相比之下，TensorFlow
    和 PyTorch 在深度学习应用中占据主导地位，尤其是在图像、音频和文本等非结构化数据方面。在图神经网络领域，PyTorch Geometric 提供了专门工具，使得构建旨在从图结构数据中学习的模型变得更加容易。在概率建模和贝叶斯推理领域，PyMC3
    和 TensorFlow Probability 等框架为构建复杂的概率模型提供了强大的抽象。
- en: 'The following diagram illustrates a modular developer platform for building
    and managing ML applications:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图展示了用于构建和管理机器学习应用的模块化开发者平台：
- en: '![img](img/B34239_07_3.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_07_3.png)'
- en: 'Figure 7.3: A modular developer platform'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3：一个模块化开发者平台
- en: The platform solution layer offers tools for debugging, testing, and monitoring
    model workflows. The integration component connects external systems, data sources,
    and model providers. The architecture layer defines the system’s core runtime
    and execution framework. An API runs alongside all layers, enabling programmatic
    access and seamless integration.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 平台解决方案层提供用于调试、测试和监控模型工作流程的工具。集成组件连接外部系统、数据源和模型提供者。架构层定义了系统的核心运行时和执行框架。API 与所有层并行运行，使程序性访问和无缝集成成为可能。
- en: The ecosystem of frameworks has expanded significantly with the rise of LLMs.
    In this space, new frameworks have emerged to manage the specific challenges that
    LLMs present challenges such as chaining together multiple prompts, integrating
    external data sources, and orchestrating reasoning across several agents. LangChain
    and LangGraph are two prominent examples that simplify the development of applications
    powered by LLMs. These frameworks make it easier to build complex workflows where
    models interact with tools, databases, and APIs, while retaining memory across
    interactions. This concept of memory retention, where a system can carry forward
    context from one step to another, is foundational for enabling systems that exhibit
    generalized intelligence.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 随着LLM的兴起，框架生态系统显著扩大。在这个领域，出现了新的框架来管理LLM带来的特定挑战，例如将多个提示链接起来、集成外部数据源以及跨多个代理编排推理。LangChain和LangGraph是两个突出的例子，它们简化了由LLM驱动的应用程序的开发。这些框架使得构建复杂的工作流程变得更容易，其中模型与工具、数据库和API交互，同时保留交互过程中的记忆。这种记忆保留的概念，即系统可以从一步带到另一步携带上下文，是使系统表现出通用智能的基础。
- en: More recently, advances such as the MCP have taken this a step further, providing
    infrastructure for sharing context and memory between different LLM agents, enhancing
    their collaborative capabilities. These mechanisms allow LLM-powered systems to
    remember previous interactions, making them far more capable of solving multi-step
    problems, reasoning over long conversations, or coordinating actions among multiple
    agents.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，如MCP等进步更进一步，为不同LLM代理之间共享上下文和内存提供了基础设施，增强了它们的协作能力。这些机制允许LLM驱动的系统记住之前的交互，使它们能够解决多步问题、进行长对话推理或在多个代理之间协调行动。
- en: Frameworks are, in many ways, the unsung heroes of modern ML. Without them,
    much of what is now considered routine, from training models on massive datasets
    to deploying them at scale, would be out of reach for all but the most specialized
    teams. They don’t just structure code; they also offer ready-made solutions to
    problems that arise at the intersection of ML, software engineering, and distributed
    systems.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多方面，框架是现代机器学习中的无名英雄。没有它们，现在被认为是常规的许多事情，从在大型数据集上训练模型到大规模部署，对于所有但最专业化的团队来说都将遥不可及。它们不仅结构化代码，还提供了现成的解决方案，解决机器学习、软件工程和分布式系统交叉处出现的问题。
- en: In essence, frameworks allow ML practitioners to focus on modeling and experimentation,
    rather than the plumbing of distributed computing, hardware optimization, or workflow
    orchestration. They provide an invisible scaffolding that holds up the entire
    ML life cycle, from research to production, while promoting reproducibility, efficiency,
    and scalability.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，框架允许机器学习从业者专注于建模和实验，而不是分布式计算、硬件优化或工作流程编排的底层工作。它们提供了一个无形的支架，支撑着整个机器学习生命周期，从研究到生产，同时促进可重复性、效率和可扩展性。
- en: By offering these high levels of abstractions or APIs from these frameworks,
    it has enabled key innovation in AI. Whether it’s training a model on a petabyte-scale
    dataset or building a conversational AI agent capable of long-term memory, frameworks
    make it possible to realize these ideas with far less effort than would otherwise
    be required. As the field continues to evolve, frameworks will likely remain at
    the core of this progress, enabling the next wave of scalable, intelligent systems.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供这些高级抽象或API，这些框架已经促进了人工智能领域的关键创新。无论是训练一个在PB级数据集上运行的模型，还是构建一个具有长期记忆能力的对话式人工智能代理，框架使得这些想法的实现变得比以往所需的努力少得多。随着该领域的持续发展，框架很可能会继续处于这一进步的核心，推动下一波可扩展、智能系统的浪潮。
- en: 'Here’s an overview of the scikit learn framework as a **minimal** example optimized
    for simplicity, readability, and reusability:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个关于scikit learn框架的概述，作为一个**最小化**的示例，它优化了简洁性、可读性和可重用性：
- en: '[PRE2]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This approach ensures that data preprocessing and model training are part of
    the same workflow, improving maintainability and reducing the risk of mismatched
    transformations.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法确保数据预处理和模型训练是同一工作流程的一部分，提高了可维护性并降低了不匹配转换的风险。
- en: 'Here are the advantages of frameworks:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是框架的优势：
- en: Built-in best practices for reproducibility and efficiency
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内置的最佳实践，用于确保可重复性和效率
- en: Pre-optimized functions that reduce development time
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预优化的函数，可减少开发时间
- en: Integration with cloud platforms and distributed computing
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与云平台和分布式计算的集成
- en: However, frameworks can also be limiting when dealing with edge-case scenarios
    not supported out of the box. In such cases, a hybrid approach that combines OOP
    principles with framework utilities is often the best solution.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当处理框架不支持的情况时，框架也可能成为限制因素。在这种情况下，结合面向对象原则和框架实用工具的混合方法通常是最佳解决方案。
- en: ML systems are fundamentally different from traditional software in that they
    must manage dynamic components such as data, models, and infrastructure in addition
    to code, and also memory in the case of LLMs. As such, reproducibility, versioning,
    and pipeline persistence are essential. Modular design, whether through procedural
    programming, OOP, or frameworks, is foundational for building scalable, maintainable,
    and robust ML solutions. These practices not only streamline development but also
    enable systems to evolve smoothly in production environments.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统软件不同，ML系统必须管理动态组件，如数据、模型和基础设施，以及代码，在LLMs的情况下还要管理内存。因此，可重复性、版本控制和管道持久性是必不可少的。无论是通过过程编程、面向对象编程还是框架，模块化设计对于构建可扩展、可维护和健壮的ML解决方案是基础。这些实践不仅简化了开发，还使系统能够在生产环境中平稳地演进。
- en: '**Note**'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: ML development requires managing dynamic components beyond just code, including
    data and infrastructure, to ensure reproducibility. Unlike traditional software,
    ML demands comprehensive versioning and pipeline persistence rather than static
    model files. Modular design via procedural, object-oriented, or framework-based
    approaches enhances scalability and maintainability. These principles enable robust,
    scalable ML systems that evolve efficiently in production environments.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: ML开发需要管理动态组件，而不仅仅是代码，包括数据和基础设施，以确保可重复性。与传统软件不同，ML需要全面的版本控制和管道持久性，而不是静态模型文件。通过过程、面向对象或基于框架的方法进行模块化设计，增强了可扩展性和可维护性。这些原则使ML系统在生产环境中能够高效地演进。
- en: With an understanding of how both structured coding paradigms and third-party
    frameworks support the development and scaling of ML systems, the next step is
    to explore the underlying infrastructure and architectural choices that enable
    these solutions to operate reliably in production environments.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在理解了结构化编程范式和第三方框架如何支持ML系统的开发和扩展之后，下一步是探索支持这些解决方案在生产环境中可靠运行的底层基础设施和架构选择。
- en: Infrastructure and architecture choices for AI/ML deployments
  id: totrans-170
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI/ML部署的基础设施和架构选择
- en: When deploying AI/ML models in real-world scenarios, selecting the appropriate
    infrastructure is paramount. Different cloud service models offer varying levels
    of abstraction, from complete control over the underlying infrastructure to fully
    managed services. The primary models considered are **Infrastructure as a Service**
    ( **IaaS** ), **Platform as a Service** ( **PaaS** ), **Software as a Service**
    ( **SaaS** ), and **Container as a Service** ( **CaaS** ). Each of these models
    presents a unique set of trade-offs in terms of operational effort, flexibility,
    and cost.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际场景中部署AI/ML模型时，选择适当的基础设施至关重要。不同的云服务模型提供不同层次的服务抽象，从对底层基础设施的完全控制到完全托管服务。主要考虑的模型是**基础设施即服务**（**IaaS**）、**平台即服务**（**PaaS**）、**软件即服务**（**SaaS**）和**容器即服务**（**CaaS**）。每个模型在运营努力、灵活性和成本方面都呈现独特的权衡。
- en: Understanding IaaS, PaaS, SaaS, and CaaS in AI/ML deployments
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在AI/ML部署中理解IaaS、PaaS、SaaS和CaaS
- en: 'When deploying AI/ML models in real-world environments, choosing the right
    infrastructure is crucial for balancing control, flexibility, and ease of use.
    Different cloud service models offer varying levels of abstraction, from complete
    control over infrastructure to fully managed services. The four primary models
    to consider are IaaS, PaaS, SaaS, and CaaS. Each of these offers trade-offs between
    operational effort, flexibility, and cost:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在将AI/ML模型部署到实际环境中时，选择合适的基础设施对于平衡控制、灵活性和易用性至关重要。不同的云服务模型提供不同层次的服务抽象，从对基础设施的完全控制到完全托管服务。需要考虑的四种主要模型是IaaS、PaaS、SaaS和CaaS。每个模型都在运营努力、灵活性和成本之间提供了权衡：
- en: '**IaaS** provides the most control and flexibility by offering virtualized
    computing resources over the cloud, such as virtual machines, storage, and networking.
    With IaaS, organizations have complete control over their environment, which allows
    for customized configuration and setup, but this also means they are responsible
    for managing and maintaining the underlying infrastructure.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IaaS**通过在云上提供虚拟化计算资源（如虚拟机、存储和网络）来提供最大的控制和灵活性。使用IaaS，组织对其环境拥有完全控制权，这允许进行定制配置和设置，但也意味着他们需要负责管理和维护底层基础设施。'
- en: '**Key features of IaaS** :'
  id: totrans-175
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IaaS的关键特性**：'
- en: '**Complete control** : Users control the operating system, storage, and networking
    configurations, which provides significant flexibility.'
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全控制**：用户控制操作系统、存储和网络配置，这提供了显著的灵活性。'
- en: '**Customization** : IaaS is highly customizable, allowing for specific hardware
    and software configurations.'
  id: totrans-177
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定制**：IaaS高度可定制，允许进行特定的硬件和软件配置。'
- en: '**Scalability** : Users can scale resources up or down based on demand.'
  id: totrans-178
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：用户可以根据需求增加或减少资源。'
- en: '**Pros** :'
  id: totrans-179
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Flexibility** : IaaS provides the highest level of flexibility for AI/ML
    workloads. Data scientists and engineers can choose the exact hardware specifications,
    including GPUs or TPUs, for large-scale training or inference tasks.'
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：IaaS为AI/ML工作负载提供了最高级别的灵活性。数据科学家和工程师可以选择精确的硬件规格，包括GPU或TPU，用于大规模训练或推理任务。'
- en: '**Cost efficiency for large operations** : IaaS can be more cost-effective
    for large, continuous AI/ML operations that require intensive compute resources,
    as users pay only for what they use.'
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大型运营的成本效益**：对于需要大量计算资源的大型、连续AI/ML操作，IaaS可能更具成本效益，因为用户只需支付他们使用的部分。'
- en: '**Cons** :'
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Operational overhead** : Managing the underlying infrastructure requires
    significant technical expertise and resources, increasing operational complexity.'
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营开销**：管理底层基础设施需要显著的技术专长和资源，增加了运营复杂性。'
- en: '**Maintenance** : Users are responsible for maintaining the infrastructure,
    such as updating the operating system, managing security, and handling failures.'
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**维护**：用户负责维护基础设施，例如更新操作系统、管理安全和处理故障。'
- en: '**Use case** : IaaS is ideal for businesses with significant technical expertise,
    large-scale AI/ML workloads, and specific requirements for compute resources.
    For example, companies performing deep learning with complex models that require
    extensive GPU processing often opt for IaaS.'
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：IaaS非常适合具有显著技术专长、大规模AI/ML工作负载和特定计算资源需求的企业。例如，进行深度学习且需要大量GPU处理的复杂模型的公司通常会选择IaaS。'
- en: '**PaaS** abstracts much of the infrastructure complexity by providing a platform
    that includes the operating system, middleware, and runtime environment. Users
    focus on developing, deploying, and managing applications without worrying about
    infrastructure management.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PaaS**通过提供一个包含操作系统、中间件和运行时环境的平台来简化大部分基础设施复杂性。用户专注于开发、部署和管理应用程序，无需担心基础设施管理。'
- en: '**Key features of PaaS** :'
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PaaS的关键特性**：'
- en: '**Preconfigured environment** : The platform comes with pre-configured development
    tools, databases, and servers.'
  id: totrans-188
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预配置环境**：该平台附带预配置的开发工具、数据库和服务器。'
- en: '**Simplified deployment** : PaaS allows developers to deploy applications quickly
    without worrying about the underlying hardware or operating system.'
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简化部署**：PaaS允许开发者快速部署应用程序，无需担心底层硬件或操作系统。'
- en: '**Built-in scalability** : PaaS solutions offer easy scaling options as demand
    grows.'
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内置可扩展性**：随着需求的增长，PaaS解决方案提供易于扩展的选项。'
- en: '**Pros** :'
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Faster time to market** : Developers can focus on building and deploying
    AI/ML models without the complexity of managing infrastructure. This leads to
    faster development cycles.'
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缩短上市时间**：开发者可以专注于构建和部署AI/ML模型，无需管理基础设施的复杂性。这导致开发周期更快。'
- en: '**Reduced operational work** : PaaS reduces the need for system administration,
    security management, and hardware maintenance.'
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少运营工作量**：PaaS减少了系统管理、安全管理硬件维护的需求。'
- en: '**Integrated tooling** : Many PaaS solutions come with built-in tools for ML,
    such as model deployment, monitoring, and versioning systems, making it easier
    to integrate AI/ML workflows.'
  id: totrans-194
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成工具**：许多PaaS解决方案都内置了机器学习工具，如模型部署、监控和版本控制系统，这使得集成AI/ML工作流程更加容易。'
- en: '**Cons** :'
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Less flexibility** : PaaS environments are more constrained than IaaS. If
    the platform does not support specific configurations or tools required for advanced
    AI/ML models, users may face limitations.'
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**较少的灵活性**：PaaS 环境比 IaaS 更受限制。如果平台不支持特定配置或工具，这些工具对于高级人工智能/机器学习模型是必需的，用户可能会遇到限制。'
- en: '**Cost** : While PaaS reduces operational overhead, it can be more expensive
    for continuous, high-volume AI/ML workloads due to premium charges for built-in
    services and scalability.'
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本**：虽然 PaaS 减少了运营开销，但由于内置服务和可扩展性的溢价费用，对于持续、高容量的人工智能/机器学习工作负载来说可能更昂贵。'
- en: '**Use case** : PaaS is suitable for organizations that want to speed up the
    development and deployment process without the complexity of managing infrastructure.
    For example, AI start-ups looking to prototype and deploy machine learning models
    quickly may prefer PaaS.'
  id: totrans-198
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：PaaS 对于希望加快开发和部署过程，而不想管理基础设施复杂性的组织来说很合适。例如，希望快速原型化和部署机器学习模型的 AI 创业公司可能会更倾向于使用
    PaaS。'
- en: '**SaaS** provides fully managed software solutions over the cloud, with minimal
    involvement required from the user. The service provider handles everything from
    infrastructure to application management. In the AI/ML context, SaaS platforms
    offer pre-built AI tools, APIs, and services that businesses can directly integrate
    into their workflows.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SaaS** 在云上提供全面管理的软件解决方案，用户所需参与的最小化。服务提供商处理从基础设施到应用程序管理的所有事情。在人工智能/机器学习背景下，SaaS
    平台提供预构建的 AI 工具、API 和服务，企业可以直接将其集成到其工作流程中。'
- en: '**Key features of SaaS** :'
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SaaS 的关键特性** :'
- en: '**Pre-built solutions** : SaaS platforms offer ready-to-use AI/ML services
    such as natural language processing, image recognition, and recommendation engines.'
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预构建解决方案**：SaaS 平台提供现成的 AI/ML 服务，如自然语言处理、图像识别和推荐引擎。'
- en: '**Zero infrastructure management** : All infrastructure, software updates,
    and security are managed by the provider.'
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零基础设施管理**：所有基础设施、软件更新和安全都由提供商管理。'
- en: '**Easy integration** : SaaS solutions are designed to be easily integrated
    into existing workflows with minimal customization required.'
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**易于集成**：SaaS 解决方案旨在易于集成到现有工作流程中，所需定制的最小化。'
- en: '**Pros** :'
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点** :'
- en: '**Minimal technical overhead** : SaaS eliminates the need for infrastructure
    or platform management, allowing teams to focus entirely on business use cases.'
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最小技术开销**：SaaS 消除了对基础设施或平台管理的需求，使团队能够完全专注于业务用例。'
- en: '**Quick deployment** : SaaS solutions can be deployed quickly without the need
    for development or deep technical expertise in AI/ML.'
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速部署**：SaaS 解决方案可以快速部署，无需开发或对人工智能/机器学习有深入的技术专业知识。'
- en: '**Predictable costs** : SaaS models are typically subscription-based, making
    budgeting predictable.'
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可预测的成本**：SaaS 模型通常是基于订阅的，这使得预算可预测。'
- en: '**Cons** :'
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点** :'
- en: '**Limited customization** : SaaS solutions offer limited flexibility. Users
    must rely on the features and capabilities provided by the platform.'
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有限的定制性**：SaaS 解决方案提供的灵活性有限。用户必须依赖平台提供的功能和能力。'
- en: '**Dependency on vendor** : Businesses become reliant on the SaaS vendor for
    updates, scalability, and performance improvements.'
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对供应商的依赖**：企业变得依赖于 SaaS 供应商进行更新、可扩展性和性能改进。'
- en: '**Data privacy** : With SaaS, sensitive data may need to be transferred and
    stored with third-party vendors, raising potential privacy concerns.'
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据隐私**：使用 SaaS，敏感数据可能需要通过第三方供应商进行传输和存储，从而引发潜在的隐私问题。'
- en: '**Use case** : SaaS is ideal for businesses looking for fast and easy-to-use
    AI solutions without investing heavily in infrastructure or AI expertise. For
    example, a marketing firm might use a SaaS-based AI tool for customer segmentation
    and targeting without needing to build custom models.'
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：SaaS 对于寻求快速且易于使用的人工智能解决方案，而不愿在基础设施或人工智能专业知识上大量投资的企业来说非常理想。例如，一家营销公司可能会使用基于
    SaaS 的 AI 工具进行客户细分和定位，而无需构建定制模型。'
- en: '**CaaS** offers a middle ground between IaaS and PaaS by providing container-based
    virtualization. Containers allow for packaging an application and its dependencies
    together, ensuring that it runs consistently across different environments. In
    AI/ML deployments, containers can be used to encapsulate models, making them portable
    and easy to deploy across various infrastructure setups.'
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CaaS** 通过提供基于容器的虚拟化，在 IaaS 和 PaaS 之间提供了一个中间地带。容器允许将应用程序及其依赖项打包在一起，确保它在不同的环境中保持一致性。在人工智能/机器学习部署中，容器可以用来封装模型，使它们易于携带并在各种基础设施设置中部署。'
- en: '**Key features of CaaS** :'
  id: totrans-214
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CaaS 的关键特性** :'
- en: '**Container orchestration** : CaaS solutions often include tools such as Kubernetes
    for orchestrating, scaling, and managing containerized applications.'
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容器编排**：CaaS解决方案通常包括Kubernetes等工具，用于编排、扩展和管理容器化应用程序。'
- en: '**Portability** : Containers can be easily moved across environments, from
    on-premises to cloud to hybrid, without requiring changes to the application or
    its dependencies.'
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可移植性**：容器可以轻松地在不同环境中移动，从本地到云再到混合环境，而无需更改应用程序或其依赖项。'
- en: '**Automated management** : Many CaaS platforms provide automated management
    of container clusters, reducing the operational burden on users.'
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化管理**：许多CaaS平台提供容器集群的自动化管理，从而减轻了用户的管理负担。'
- en: '**Pros** :'
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Flexibility and portability** : Containers provide flexibility by allowing
    models to be deployed on any infrastructure that supports containers, ensuring
    consistency across environments.'
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性和可移植性**：容器通过允许模型部署在任何支持容器的基础设施上，提供了灵活性，确保了环境之间的一致性。'
- en: '**Scalability** : With CaaS, scaling containerized AI/ML models becomes more
    straightforward. Orchestration platforms such as Kubernetes make it easier to
    manage large-scale deployments.'
  id: totrans-220
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：使用CaaS，容器化AI/ML模型的可扩展性变得更加简单。编排平台如Kubernetes使得管理大规模部署变得更加容易。'
- en: '**Reduced infrastructure management** : While not as hands-off as PaaS or SaaS,
    CaaS reduces the infrastructure management workload by abstracting container orchestration.'
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少基础设施管理**：虽然不如PaaS或SaaS那样无需过多干预，但CaaS通过抽象容器编排来减少基础设施管理的工作量。'
- en: '**Cons** :'
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Complexity in setup** : Setting up and managing containers, especially in
    large-scale production systems, can require specialized knowledge in containerization
    technologies.'
  id: totrans-223
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设置复杂性**：设置和管理容器，尤其是在大规模生产系统中，可能需要容器化技术的专业知识。'
- en: '**Operational overhead** : While less than IaaS, CaaS still requires some degree
    of infrastructure management, especially when scaling up containerized AI/ML applications.'
  id: totrans-224
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**操作开销**：虽然低于IaaS，但CaaS仍然需要一定程度的基础设施管理，尤其是在扩展容器化的AI/ML应用时。'
- en: '**Use case** : CaaS is ideal for organizations that want flexibility and portability
    while reducing the complexity of managing infrastructure. For instance, a company
    deploying AI models across multiple environments, whether on-premises or cloud,
    can benefit from the portability and consistency offered by CaaS.'
  id: totrans-225
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用例**：CaaS非常适合那些希望在减少基础设施管理复杂性的同时，寻求灵活性和可移植性的组织。例如，一家在多个环境中部署AI模型的公司，无论是在本地还是云中，都可以从CaaS提供的可移植性和一致性中受益。'
- en: Comparing the economies of IaaS, PaaS, SaaS, and CaaS
  id: totrans-226
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 比较IaaS、PaaS、SaaS和CaaS的经济效益
- en: 'When choosing between these cloud service models, it is important to consider
    the trade-offs between control, complexity, and cost:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择这些云服务模型之间，重要的是要考虑控制、复杂性和成本之间的权衡：
- en: IaaS offers the most control but requires significant operational effort. It
    is cost-effective for large-scale, resource-intensive operations but may lead
    to higher costs in terms of maintenance and management.
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IaaS提供了最大的控制权，但需要大量的操作努力。对于大规模、资源密集型操作来说，它具有成本效益，但可能因维护和管理成本而增加。
- en: PaaS abstracts much of the infrastructure complexity, making it faster and easier
    to develop and deploy applications. While PaaS reduces operational overhead, it
    can be more expensive for continuous, large-scale operations due to the premium
    on managed services.
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PaaS抽象了大部分基础设施复杂性，使得开发和部署应用程序更快、更容易。虽然PaaS减少了操作开销，但由于对托管服务的溢价，对于持续的大规模操作来说可能更昂贵。
- en: SaaS provides the least amount of operational work, as everything is managed
    by the vendor. However, it offers the least flexibility and is often suitable
    for businesses that need quick solutions without needing extensive customization.
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SaaS提供了最少的操作工作量，因为所有内容都由供应商管理。然而，它提供的灵活性最少，通常适合那些需要快速解决方案而不需要大量定制的业务。
- en: CaaS strikes a balance between flexibility and ease of use, offering a more
    portable and scalable option for deploying AI/ML models. CaaS is more complex
    than PaaS but provides better control over the infrastructure while reducing some
    operational overhead compared to IaaS.
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CaaS在灵活性和易用性之间取得平衡，为部署AI/ML模型提供了一个更可移植和可扩展的选项。CaaS比PaaS更复杂，但提供了对基础设施的更好控制，同时与IaaS相比，减少了部分操作开销。
- en: '**Note**'
  id: totrans-232
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**'
- en: Organizations must carefully evaluate their specific needs, technical capabilities,
    and budget to choose the appropriate model. For businesses with highly specialized
    AI/ML workloads requiring control over infrastructure, IaaS or CaaS may be more
    suitable. For businesses prioritizing speed, flexibility, and low operational
    burden, PaaS or SaaS would be ideal choices. In deploying AI/ML use cases to the
    real world, organizations face a range of challenges from productization to modularization,
    data and code versioning, pipeline automation, and infrastructure choices. By
    selecting the right service model (IaaS, PaaS, SaaS, or CaaS) based on their specific
    needs, businesses can optimize operational efficiency, reduce costs, and ensure
    scalable and maintainable AI solutions.
  id: totrans-233
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 组织必须仔细评估其具体需求、技术能力和预算，以选择合适的模型。对于需要控制基础设施的、高度专业化的AI/ML工作负载的企业，IaaS或CaaS可能更为合适。对于优先考虑速度、灵活性和低运营负担的企业，PaaS或SaaS将是理想的选择。在将AI/ML用例部署到现实世界时，组织面临从产品化到模块化、数据与代码版本控制、管道自动化和基础设施选择等一系列挑战。通过根据其具体需求选择合适的服务模型（IaaS、PaaS、SaaS或CaaS），企业可以优化运营效率，降低成本，并确保可扩展和可维护的AI解决方案。
- en: As we move from architectural foundations to the realities of deploying ML models
    in production, it’s essential to consider the surrounding tooling, such as logging,
    versioning, monitoring, and artifact management, that support operational excellence
    and long-term sustainability.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们从架构基础转向在生产中部署ML模型的现实，考虑支持运营卓越和长期可持续性的周围工具，如日志记录、版本控制、监控和工件管理，是至关重要的。
- en: Other MLOPs design considerations required to support model deployment
  id: totrans-235
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持模型部署的其他MLOps设计考虑因素
- en: The process of operationalizing AI/ML models extends far beyond building and
    deploying the model. It encompasses defining the right success metrics, ensuring
    continuous monitoring and improvement, handling long-term and multi-objective
    optimization, and integrating the models into applications where they can provide
    real business value. The integration of models into diverse environments, from
    cloud-based systems to edge devices in remote locations, requires a thoughtful
    approach to model size, data privacy, and resource constraints.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI/ML模型投入运营的过程远远超出了构建和部署模型。它包括定义正确的成功指标、确保持续监控和改进、处理长期和多目标优化，以及将模型集成到可以提供真实商业价值的应用程序中。将模型集成到多样化的环境中，从基于云的系统到偏远地区的边缘设备，需要对模型大小、数据隐私和资源约束进行深思熟虑的方法。
- en: As businesses continue to adopt AI/ML models, focusing on operational efficiency
    and model scalability will be key to unlocking their full potential. Emerging
    technologies such as federated learning and model diffusion techniques offer promising
    avenues for ensuring that AI solutions are not only high-performing but also adaptable
    to real-world constraints. By addressing these challenges, organizations can drive
    the adoption of AI/ML technologies, improve their business processes, and achieve
    long-term success.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 随着企业继续采用AI/ML模型，关注运营效率和模型可扩展性将是释放其全部潜力的关键。联邦学习和模型扩散等新兴技术为确保AI解决方案不仅性能高，而且适应现实世界约束提供了有希望的途径。通过解决这些挑战，组织可以推动AI/ML技术的采用，改进其业务流程，并实现长期成功。
- en: Planning and tools for deploying an ML model in production
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部署ML模型到生产的规划和工具
- en: 'Deploying an ML model into production involves several critical steps and planning
    aspects to ensure smooth operation, maintainability, and scalability. Various
    tools and best practices are required to handle different stages of the ML life
    cycle. Here, we outline key areas to focus on before deploying an ML model and
    discuss the tools available for each:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 将ML模型部署到生产涉及几个关键步骤和规划方面，以确保平稳运行、可维护性和可扩展性。需要各种工具和最佳实践来处理ML生命周期的不同阶段。在此，我们概述在部署ML模型之前需要关注的重点领域，并讨论每个领域可用的工具：
- en: '**Code versioning** : This ensures that different versions of the ML pipeline,
    including preprocessing scripts, training code, and inference logic, are well
    managed. It helps track changes, collaborate with teams, and roll back to previous
    states if necessary.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码版本控制**：这确保了不同版本的ML管道，包括预处理脚本、训练代码和推理逻辑，得到良好的管理。它有助于跟踪变更、与团队协作，并在必要时回滚到先前状态。'
- en: '**Popular tools** :'
  id: totrans-241
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**常用工具**：'
- en: '**GitHub** : A widely used platform for source code management and version
    control'
  id: totrans-242
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub**：一个广泛使用的源代码管理和版本控制平台'
- en: '**GitLab** : Similar to GitHub but with built-in CI/CD capabilities'
  id: totrans-243
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitLab**：类似于GitHub，但具有内置的CI/CD功能'
- en: '**AWS Code Commit** : A managed source control service integrated with AWS
    services'
  id: totrans-244
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AWS Code Commit**：与AWS服务集成的托管源代码控制服务'
- en: '**Bitbucket** : Supports both Git and Mercurial, often used for enterprise
    applications'
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Bitbucket**：支持Git和Mercurial，常用于企业应用'
- en: '**Best practices** :'
  id: totrans-246
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最佳实践**：'
- en: Use branching strategies (e.g., GitFlow) to manage development, testing, and
    production releases
  id: totrans-247
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用分支策略（例如，GitFlow）来管理开发、测试和生产版本
- en: Implement code reviews and pull requests to ensure quality control
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施代码审查和拉取请求以确保质量控制
- en: Automate code deployment using CI/CD pipelines
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用CI/CD管道自动化代码部署
- en: '**Artifact management** : Once an ML model is trained, it should be stored
    securely for versioning, retrieval, and deployment. This ensures that the same
    model version is used consistently across different environments.'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工件管理**：一旦训练好机器学习模型，应将其安全存储以进行版本控制、检索和部署。这确保了在不同环境中始终使用相同的模型版本。'
- en: '**Popular tools** :'
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**常用工具**：'
- en: '**JFrog Artifactory** : A universal artifact repository manager supporting
    multiple package formats'
  id: totrans-252
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**JFrog Artifactory**：支持多种包格式的通用工件仓库管理器'
- en: '**Azure Artifacts** : Integrated into Azure DevOps for storing dependencies
