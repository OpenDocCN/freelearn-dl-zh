- en: '17'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '17'
- en: RAG-Based Agentic Memory in Code
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于RAG的代码代理记忆
- en: Having explored the theoretical foundations of agentic memory in [*Chapter 16*](B34736_16_ePub.xhtml#_idTextAnchor381),
    we’ll now turn to its practical implementation. This chapter presents three focused
    code labs that demonstrate how to build memory-enabled agents using the **Cognitive
    Architectures for Language Agents** (**CoALA**) framework. We’ll implement working,
    episodic, semantic, and procedural memory systems that allow agents to maintain
    context, recall past experiences, and accumulate knowledge over time.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索了代理记忆的理论基础[*第 16 章*](B34736_16_ePub.xhtml#_idTextAnchor381)之后，我们现在将转向其实际应用。本章介绍了三个专注于代码实验室，展示了如何使用
    **语言代理的认知架构**（**CoALA**）框架构建具有记忆功能的代理。我们将实现工作记忆、情景记忆、语义记忆和程序记忆系统，使代理能够维持上下文、回忆过去经历，并在时间上积累知识。
- en: 'Here’s what we’ll cover in this chapter:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将涵盖以下内容：
- en: '**Code lab 17.1** – setting up the initial agent'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码实验室 17.1** – 设置初始代理'
- en: '**Code lab 17.2** – coding episodic memory components'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码实验室 17.2** – 编写情景记忆组件'
- en: '**Code lab 17.3** – coding semantic memory components'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代码实验室 17.3** – 编写语义记忆组件'
- en: Each code lab builds upon the previous one, gradually constructing a sophisticated
    memory system. We’ll start with a minimal RAG agent foundation, then systematically
    add episodic memory for conversation recall and semantic memory for knowledge
    extraction. By the end of this chapter, you’ll have a working agent that can remember
    past interactions and build a persistent knowledge base, which are essential capabilities
    for creating truly intelligent AI systems. Let’s begin by setting up our base
    agent architecture, which will serve as the foundation for all memory enhancements.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 每个代码实验室都是基于前一个实验室构建的，逐步构建一个复杂的记忆系统。我们将从一个最小的 RAG 代理基础开始，然后系统地添加情景记忆以回忆对话和语义记忆以提取知识。到本章结束时，你将拥有一个能够记住过去交互并构建持久知识库的代理，这对于创建真正智能的
    AI 系统是基本能力。让我们首先设置我们的基础代理架构，这将成为所有记忆增强的基础。
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'To complete the hands-on exercises in this chapter, you’ll need the following
    software and resources:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成本章的动手练习，你需要以下软件和资源：
- en: '**Software requirements**:'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**软件要求**：'
- en: '**Python 3.8 or higher**: This is required for running the code labs'
  id: totrans-11
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python 3.8 或更高版本**：这是运行代码实验室所必需的'
- en: '**pip package manager**: This is required for installing the Python dependencies'
  id: totrans-12
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pip 软件包管理器**：这是安装 Python 依赖项所必需的'
- en: '**OpenAI API access**: You’ll need an OpenAI API key for GPT-4 and embeddings'
  id: totrans-13
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI API 访问**：您需要一个 OpenAI API 密钥用于 GPT-4 和嵌入'
- en: '**Text editor or IDE**: VS Code, PyCharm, Jupyter Notebook, or similar is required
    for writing and running Python code'
  id: totrans-14
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本编辑器或 IDE**：VS Code、PyCharm、Jupyter Notebook 或类似软件是编写和运行 Python 代码所必需的'
- en: '**Git (optional)**: This is required for cloning this book’s GitHub repository'
  id: totrans-15
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Git（可选）**：这是克隆本书 GitHub 仓库所必需的'
- en: '**Hardware requirements**:'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**硬件要求**：'
- en: '**Minimum 8 GB RAM** (16 GB is recommended for smooth performance with vector
    databases)'
  id: totrans-17
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最小 8 GB RAM**（推荐 16 GB 以获得与向量数据库的流畅性能）'
- en: '**2 GB free disk space** for dependencies, vector stores, and persistent memory
    storage'
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2 GB 空闲磁盘空间** 用于依赖项、向量存储和持久性内存存储'
- en: '**An internet connection** for downloading packages and accessing the OpenAI
    API'
  id: totrans-19
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互联网连接** 用于下载软件包和访问 OpenAI API'
- en: '**OpenAI API key**: Required for GPT model access and embeddings generation:'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI API 密钥**：用于 GPT 模型访问和嵌入生成：'
- en: Store this securely in an `env.txt` file as `OPENAI_API_KEY=your_key_here`
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将此安全地存储在 `env.txt` 文件中，作为 `OPENAI_API_KEY=your_key_here`
- en: '**Note**: Never commit API keys to version control'
  id: totrans-22
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注意**：切勿将 API 密钥提交到版本控制'
- en: '**Chapter resources**:'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**章节资源**:'
- en: '**GitHub repository**: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_17](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_17)'
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub 仓库**：[https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_17](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_17)'
- en: '**Complete code files**: All three code labs (*17.1*, *17.2*, and *17.3*) are
    available in this book’s GitHub repository for reference'
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完整代码文件**：所有三个代码实验室（*17.1*、*17.2* 和 *17.3*）均可在本书的 GitHub 仓库中找到以供参考'
- en: The complete code, which can be found in this book’s GitHub repository, can
    serve as a reference if you need to verify your implementation at any stage.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的代码，可在本书的 GitHub 仓库中找到，如果需要在任何阶段验证您的实现，可以作为参考。
- en: Code lab 17.1 – setting up the initial agent
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室17.1 – 设置初始智能体
- en: We’ll start by establishing a minimal version of our RAG agent that will serve
    as the foundation for adding memory capabilities in subsequent labs. You may recognize
    this code; it is a slimmed-down version of the agent we built in [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284)!
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先建立一个RAG智能体的最小版本，它将作为后续实验室中添加记忆能力的基石。你可能已经认识这段代码；这是我们在[*第12章*](B34736_12_ePub.xhtml#_idTextAnchor284)中构建的智能体的简化版本！
- en: Step 1 – installing the required packages
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步 – 安装所需的包
- en: 'We’ll start by installing the necessary libraries so that we can build our
    memory-augmented agent:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先安装必要的库，以便我们构建我们的记忆增强智能体：
- en: '[PRE0]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We covered these installations in [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284),
    but here’s a quick reminder:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在第12章中介绍了这些安装，但这里有一个快速提醒：
- en: LangChain provides the LLM orchestration
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangChain提供LLM编排
- en: LangGraph handles stateful workflows
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangGraph处理有状态的工作流程
- en: ChromaDB will store our vector embeddings for memory retrieval
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChromaDB将存储我们的向量嵌入以进行记忆检索
- en: The `dotenv` package manages our API keys securely
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dotenv`包安全地管理我们的API密钥'
- en: Now, let’s import these libraries and set up our environment variables.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们导入这些库并设置我们的环境变量。
- en: Step 2 – importing libraries and configuring the environment
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步 – 导入库和配置环境
- en: 'Next, we need to import the required modules and set up our API keys for OpenAI
    and other services:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要导入所需的模块并设置OpenAI和其他服务的API密钥：
- en: '[PRE1]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Here’s what this setup accomplishes:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这个设置所完成的：
- en: The imports establish our core dependencies for LLM interactions, state management,
    and vector storage
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入建立了我们与LLM交互、状态管理和向量存储的核心依赖
- en: We initialize `gpt-4.1-mini` for efficient inference and OpenAI embeddings for
    semantic similarity
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们初始化`gpt-4.1-mini`以实现高效的推理，并使用OpenAI嵌入进行语义相似度比较
- en: '`temperature=0` ensures consistent, deterministic responses'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`temperature=0`确保了一致、确定的响应'
- en: API keys are loaded securely from environment variables
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API密钥从环境变量中安全加载
- en: With our dependencies ready, let’s construct the basic agent structure that
    we’ll enhance with memory capabilities.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的依赖项已经准备好了，现在让我们构建一个基本的智能体结构，我们将通过添加记忆能力来增强它。
- en: Step 3 – building a basic agent
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步 – 构建基本智能体
- en: 'Since we covered agent construction in [*Chapter 12*](B34736_12_ePub.xhtml#_idTextAnchor284),
    we’ll combine the setup into a single streamlined implementation ready for memory
    enhancements:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在[*第12章*](B34736_12_ePub.xhtml#_idTextAnchor284)中介绍了智能体构建，我们将把设置合并为一个单一流线化的实现，以便进行记忆增强：
- en: '[PRE2]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This code establishes the foundation:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码建立了基础：
- en: The `AgentState` class includes placeholders for working, episodic, and semantic
    memory
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AgentState`类包括工作、事件和语义记忆的占位符'
- en: ChromaDB provides persistent vector storage with `persist_directory`, ensuring
    memories survive between sessions
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChromaDB通过`persist_directory`提供持久的向量存储，确保记忆在会话之间持续存在
- en: The agent maintains a five-message working memory window
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能体维持一个五条消息的工作记忆窗口
- en: The graph structure is minimal now, but ready for memory node additions
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图结构目前是最小化的，但已准备好添加记忆节点
- en: Now, let’s verify that our basic agent works before adding memory capabilities.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在我们添加记忆功能之前，让我们验证我们的基本智能体是否正常工作。
- en: Step 4 – testing the basic agent
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步 – 测试基本智能体
- en: 'Let’s confirm that our agent can process queries and maintain conversation
    state:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们确认我们的智能体可以处理查询并维持对话状态：
- en: '[PRE3]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Here’s the expected output:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE4]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'This test demonstrates what we’ve accomplished:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这个测试演示了我们所取得的成果：
- en: The agent successfully processes user queries and generates appropriate responses
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能体成功处理用户查询并生成适当的响应
- en: Message state is properly managed through the LangGraph workflow
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 消息状态通过LangGraph工作流程得到妥善管理
- en: Our foundation is solid, but it currently lacks memory as the agent can’t recall
    previous conversations or store learned facts
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的基础很稳固，但目前缺乏记忆功能，因为智能体无法回忆之前的对话或存储学习到的知识
- en: With this minimal foundation in place, we have a clean base for adding sophisticated
    memory components. The agent currently operates without long-term memory, but
    our state structure and vector store are ready to support the episodic and semantic
    memory systems we’ll implement in the following labs.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个最小基础上，我们有了一个干净的基础，可以添加复杂的记忆组件。智能体目前没有长期记忆，但我们的状态结构和向量存储已准备好支持我们在以下实验室中实现的事件和语义记忆系统。
- en: In *Code lab 17.2* *– coding episodic memory components*, we’ll add episodic
    memory capabilities, allowing the agent to store and retrieve past conversations.
    This will transform our stateless assistant into one that can maintain context
    across sessions and recall specific past interactions when relevant.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *代码实验室 17.2* *– 编写情景记忆组件* 中，我们将添加情景记忆功能，使代理能够存储和检索过去的对话。这将把我们的无状态助手转变为能够在会话之间保持上下文并回忆相关过去交互的助手。
- en: '**Technical note**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**技术提示**'
- en: We will put the agent code from *Code lab 17.1* *– setting up the initial agent*,
    in each of the following code labs, but we won’t repeat them here. You will see
    this when you look at the code in this book’s GitHub repository. Instead, we will
    show any changes we make to the install and import sections, after which we will
    continue with the next steps, assuming the agent code is in place.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在每个以下代码实验室中放置来自 *代码实验室 17.1* *– 设置初始代理* 的代理代码，但在此处不会重复它们。您将在查看本书 GitHub 仓库中的代码时看到这一点。相反，我们将展示我们对安装和导入部分所做的任何更改，之后我们将继续进行下一步，假设代理代码已经就绪。
- en: Code lab 17.2 – coding episodic memory components
  id: totrans-69
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室 17.2 – 编写情景记忆组件
- en: In this lab, we’ll enhance our agent with episodic memory, enabling it to store
    and retrieve past conversation experiences.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验室中，我们将通过情景记忆增强我们的代理，使其能够存储和检索过去的对话经验。
- en: Step 1 – importing additional dependencies for episodic memory
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一步 – 导入用于情景记忆的额外依赖项
- en: 'We need to import additional modules for handling timestamps and managing episodic
    memory storage:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要导入额外的模块来处理时间戳和管理情景记忆存储：
- en: '[PRE5]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: These imports add temporal tracking and document handling capabilities, which
    episodic memory requires. The `datetime` module will timestamp our memories, while
    the `Document` schema will structure our stored episodes for efficient retrieval.
    Now, let’s create the episodic memory storage functions.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这些导入增加了时间跟踪和文档处理能力，这是情景记忆所必需的。`datetime` 模块将为我们的记忆添加时间戳，而 `Document` 架构将结构化我们存储的情景以实现高效的检索。现在，让我们创建情景记忆存储函数。
- en: Step 2 – creating episodic memory storage functions
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二步 – 创建情景记忆存储函数
- en: 'Let’s build some functions that will store conversation episodes with metadata
    for future retrieval:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一些函数，用于存储带有元数据的对话片段，以便将来检索：
- en: '[PRE6]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Here’s what these functions accomplish:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数的作用如下：
- en: '`store_episodic_memory` captures entire conversation episodes with timestamps
    and metadata'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`store_episodic_memory` 捕获整个对话片段及其时间戳和元数据'
- en: Each episode gets a unique `conversation_id` for tracking; `retrieve_episodic_memories`
    uses semantic similarity to find relevant past conversations
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个情景都获得一个唯一的 `conversation_id` 以进行跟踪；`retrieve_episodic_memories` 使用语义相似性来查找相关的过去对话
