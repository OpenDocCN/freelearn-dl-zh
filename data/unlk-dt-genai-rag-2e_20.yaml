  zh: 情景记忆能够实现基于过去交互的上下文响应
- en: That completes this episodic memory code lab. But could this be applied to the
    real world?
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了这个情景记忆代码实验室。但这能应用于现实世界吗？
- en: Real-world application – customer service bot
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 真实世界应用 – 客户服务机器人
- en: The episodic memory we just implemented enables powerful customer service capabilities.
    Imagine a support bot that remembers when a customer called last week about a
    shipping issue. When they return asking, “What happened with my order?” the bot
    can retrieve the entire previous conversation, understanding the context without
    making the customer repeat their story. This dramatically improves customer satisfaction
    and reduces resolution time.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚实现的情景记忆能够提供强大的客户服务能力。想象一下，一个支持机器人能够记住上周有客户关于运输问题进行了咨询。当客户回来询问，“我的订单发生了什么？”时，机器人可以检索整个之前的对话，理解上下文而不让客户重复他们的故事。这显著提高了客户满意度并减少了解决时间。
- en: With episodic memory functioning, our agent can now maintain conversation history
    across sessions. In *Code lab 17.3 – coding semantic memory components*, we’ll
    add semantic memory to enable the agent to extract and store factual knowledge
    from conversations, building a persistent knowledge base.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在情景记忆功能正常工作后，我们的代理现在可以在会话之间维护对话历史。在*代码实验室17.3 – 编写语义记忆组件*中，我们将添加语义记忆以使代理能够从对话中提取和存储事实知识，构建一个持久的知识库。
- en: Code lab 17.3 – coding semantic memory components
  id: totrans-114
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室17.3 – 编写语义记忆组件
- en: In this lab, we’ll add semantic memory to extract and store factual knowledge
    from conversations, thereby building a persistent knowledge base.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验室中，我们将添加语义记忆来从对话中提取和存储事实知识，从而构建一个持久的知识库。
- en: Step 1 – importing dependencies for semantic memory
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步 – 导入语义记忆的依赖项
- en: 'We need additional imports for knowledge extraction and structured data management:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要额外的导入来进行知识提取和结构化数据处理：
- en: '[PRE11]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: These imports enable structured knowledge extraction from conversations. The
    `Document` class is essential for creating storable memory entries. Now, let’s
    define the structure for storing semantic facts.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这些导入使得从对话中提取结构化知识成为可能。`Document`类对于创建可存储的记忆条目至关重要。现在，让我们定义存储语义事实的结构。
- en: Step 2 – defining a semantic fact structure
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步 – 定义语义事实结构
- en: 'Let’s create schemas for extracting and storing different types of factual
    knowledge:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建用于提取和存储不同类型事实知识的模式：
- en: '[PRE12]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The following functions handle semantic knowledge:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 以下函数处理语义知识：
- en: '`semanticFact` defines a triple structure (*subject-predicate-object*) for
    knowledge representation.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`semanticFact`定义了一个三联结构（*主语-谓语-宾语*）用于知识表示。'
- en: '`extract_semantic_facts` analyzes conversations to identify factual statements.
    Facts are scored by confidence and attributed to their source.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`extract_semantic_facts`通过分析对话来识别事实陈述。事实通过置信度评分并归因于其来源。'
- en: '`store_semantic_facts` persists extracted knowledge with searchable metadata.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`store_semantic_facts`通过可搜索的元数据持久化提取的知识。'
- en: '**Note**:'
  id: totrans-127
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**：'
- en: 'ChromaDB metadata supports filtering during retrieval using MongoDB-style operators.
    We’ll use this later with filters such as `{"type": {"$eq": "semantic"}}` to retrieve
    only semantic memory.'
  id: totrans-128
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'ChromaDB元数据支持使用MongoDB风格的运算符在检索期间进行过滤。我们稍后将使用此功能与过滤器例如`{"type": {"$eq": "semantic"}}`来检索仅包含语义记忆。'
- en: Now, let’s create retrieval functions for semantic memory.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们为语义记忆创建检索函数。
- en: Step 3 – building semantic memory retrieval
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步 – 构建语义记忆检索
- en: 'Let’s implement functions that will query our knowledge base for relevant facts:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们实现将查询我们的知识库以获取相关事实的函数：
- en: '[PRE13]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'The retrieval system provides targeted fact access:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 检索系统提供有针对性的事实访问：
- en: The ChromaDB filter uses proper `$and` and `$eq` operators for filtering
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChromaDB过滤器使用正确的`$and`和`$eq`运算符进行过滤
- en: User-specific filtering ensures personalized knowledge retrieval
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户特定的过滤确保个性化知识检索
- en: '`format_semantic_context` creates readable fact summaries for the LLM'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`format_semantic_context`为LLM创建可读的事实摘要'
- en: Confidence thresholds prevent low-quality facts from affecting responses
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 置信度阈值防止低质量的事实影响响应
- en: Now, let’s integrate semantic memory into our agent workflow.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将语义记忆集成到我们的代理工作流程中。
- en: Step 4 – creating a semantic memory-aware agent
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步 – 创建语义记忆感知代理
- en: 'Next, we’ll enhance the agent so that it can extract, store, and utilize semantic
    knowledge:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将增强代理，使其能够提取、存储和利用语义知识：
- en: '[PRE14]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'This semantic-aware agent implements knowledge management:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这个语义感知代理实现了知识管理：
- en: It retrieves relevant facts before generating responses
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它在生成响应之前检索相关事实
- en: New facts are automatically extracted from conversations
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新的事实会自动从对话中提取
- en: The system maintains a growing knowledge base per user
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统为每个用户维护一个不断增长的知识库
- en: Responses are grounded in stored semantic knowledge
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应基于存储的语义知识
- en: Now, let’s test the semantic memory capabilities.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们测试语义记忆能力。
- en: Step 5 – testing semantic memory functionality
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步 – 测试语义记忆功能
- en: 'Let’s verify that the agent can extract, store, and utilize factual knowledge
    across conversations:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们验证代理是否可以在对话中提取、存储和利用事实知识：
- en: '[PRE15]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Here’s the expected output:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这是预期的输出：
- en: '[PRE16]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'This test demonstrates our semantic memory implementation:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这个测试展示了我们的语义记忆实现：
- en: The agent successfully extracts facts from the first conversation (name, job,
    preferences, allergies)
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理成功地从第一次对话中提取了事实（姓名、工作、偏好、过敏）
- en: In the second conversation, the agent retrieves and uses the Python preference
    to make relevant recommendations
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第二次对话中，代理检索并使用Python偏好来做出相关推荐
- en: The third conversation shows the agent remembering the shellfish allergy for
    safety-conscious advice
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三次对话显示了代理记住海鲜过敏，以提供安全意识建议
- en: As we can see, semantic memory enables personalized, contextually appropriate
    responses based on accumulated knowledge.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所看到的，语义记忆使基于积累的知识进行个性化、情境适当的响应成为可能。
- en: That concludes this semantic memory code lab. However, before we finish, just
    like we did for the episodic memory code lab, let’s talk about how this would
    be applied in the real world.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这就结束了这个语义记忆代码实验室。然而，在我们结束之前，就像我们为事件记忆代码实验室所做的那样，让我们谈谈这在现实世界中的应用。
- en: Real-world application – educational tutor
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 真实世界的应用 – 教育辅导
- en: The semantic memory system we just built is perfect for educational applications.
    A tutoring agent can extract and store facts about a student’s knowledge gaps
    (struggles with quadratic equations), learning preferences (prefers visual explanations),
    and progress milestones (mastered derivatives on March 15). Over time, the tutor
    builds a comprehensive knowledge graph of each student, enabling truly personalized
    instruction that adapts to their unique learning journey.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚构建的语义记忆系统非常适合教育应用。辅导代理可以提取和存储有关学生知识差距（对二次方程的困扰）、学习偏好（偏好视觉解释）和进展里程碑（3月15日掌握了导数）的事实。随着时间的推移，导师为每个学生构建了一个全面的知识图谱，从而实现真正个性化的教学，适应他们独特的学习之旅。
- en: This example focuses on semantic memories, but what about a combination of both
    episodic and semantic memory?
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子专注于语义记忆，但关于事件记忆和语义记忆的结合又是怎样的呢？
- en: Real-world application – personal assistant
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 真实世界的应用 – 个人助理
- en: 'The combination of episodic and semantic memory creates a powerful personal
    assistant. Consider how it learns over time: When you mention *“I’m meeting with
    Sarah from marketing about the Q3 budget,”* it stores both the episodic memory
    (the conversation about this meeting) and semantic facts (Sarah works in marketing;
    there’s a Q3 budget discussion planned). Later, when you ask, *“What do I need
    to prepare for Sarah?”* the assistant combines episodic recall of previous Sarah-related
    discussions with semantic knowledge about her role and your upcoming meeting.
    This creates an assistant that truly understands your work context and relationships,
    becoming more valuable with every interaction.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 情景记忆和语义记忆的结合创造了一个强大的个人助理。考虑它是如何随时间学习的：当你提到“我要和营销部的莎拉讨论第三季度的预算”时，它存储了情景记忆（关于这次会议的对话）和语义事实（莎拉在营销部工作；有一个关于第三季度预算的讨论计划）。稍后，当你问“我需要为莎拉准备什么？”时，助理将之前与莎拉相关的讨论的情景回忆与关于她角色和即将到来的会议的语义知识结合起来。这创造了一个真正理解你的工作上下文和关系的助理，随着每次互动变得更加有价值。
- en: With both episodic and semantic memory functioning, our agent can now maintain
    conversation history and build a knowledge base.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在情景记忆和语义记忆都正常工作的情况下，我们的代理现在可以维护对话历史并构建知识库。
- en: Summary
  id: totrans-165
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Through these three code labs, we’ve transformed a simple stateless agent into
    a sophisticated memory-enabled system capable of maintaining context across conversations
    and accumulating knowledge over time. Our implementation of episodic memory allows
    the agent to store and retrieve entire conversation episodes, providing temporal
    context and continuity that make interactions feel more natural and personalized.
    The semantic memory system extracts factual knowledge from conversations, building
    a persistent knowledge base that grows with each interaction. Together, these
    memory components create an agent that not only responds to queries but genuinely
    learns from experience.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这三个代码实验室，我们将一个简单的无状态代理转换成了一个复杂的具有内存功能的系统，能够在对话中保持上下文并随着时间的推移积累知识。我们的情景记忆实现允许代理存储和检索整个对话场景，提供时间上下文和连续性，使互动感觉更加自然和个性化。语义记忆系统从对话中提取事实知识，构建一个随着每次互动而增长的持久知识库。这些内存组件共同创建了一个不仅能够响应查询，而且真正从经验中学习的代理。
- en: The modular approach we’ve taken in building each memory type as a separate
    component demonstrates the flexibility of the CoALA framework. By using ChromaDB
    for vector storage and LangGraph for workflow orchestration, we’ve created a scalable
    architecture that can handle increasing amounts of memory data while maintaining
    fast retrieval times. The separation of episodic and semantic memory mirrors cognitive
    science principles, where different types of information are processed and stored
    through distinct mechanisms, each optimized for its specific purpose.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在构建每个内存类型时采取的模块化方法展示了CoALA框架的灵活性。通过使用ChromaDB进行向量存储和LangGraph进行工作流程编排，我们创建了一个可扩展的架构，能够在保持快速检索时间的同时处理越来越多的内存数据。情景记忆和语义记忆的分离反映了认知科学原理，即不同类型的信息通过不同的机制进行处理和存储，每个机制都针对其特定目的进行了优化。
- en: What makes this implementation particularly powerful is how the different memory
    types work together. When a user asks a question, the agent can simultaneously
    retrieve relevant past conversations through episodic memory and access stored
    facts through semantic memory, combining both sources to generate informed, contextual
    responses. This multi-modal memory approach enables the agent to handle complex
    scenarios such as remembering user preferences across sessions, tracking the evolution
    of topics over time, and building comprehensive user profiles that improve with
    each interaction.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 使这种实现特别强大的是不同内存类型如何协同工作。当用户提出问题时，代理可以同时通过情景记忆检索相关的过去对话，并通过语义记忆访问存储的事实，将这两个来源结合起来生成信息丰富、上下文相关的响应。这种多模态内存方法使代理能够处理复杂场景，例如记住用户在会话之间的偏好、跟踪主题随时间的变化，以及构建随着每次互动而改进的全面用户档案。
- en: While we’ve successfully implemented episodic and semantic memory, there’s one
    crucial memory type we haven’t yet addressed–procedural memory. It is the ability
    to remember and execute learned sequences of actions. In [*Chapter 18*](B34736_18_ePub.xhtml#_idTextAnchor447),
    we’ll explore how LangMem, a specialized memory management framework, can help
    us implement procedural memory that allows agents to learn and refine complex
    multi-step processes. This final memory component will complete our CoALA-based
    agent, creating a fully functional system that can not only remember facts and
    conversations but also master and optimize workflows through experience.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们已经成功实现了情景记忆和语义记忆，但我们尚未解决的一种关键记忆类型——程序性记忆。这是记住和执行学习到的动作序列的能力。在[*第18章*](B34736_18_ePub.xhtml#_idTextAnchor447)中，我们将探讨LangMem，一个专门的内存管理框架，如何帮助我们实现程序性记忆，使智能体能够学习和优化复杂的多步骤过程。这个最后的记忆组件将完善我们的CoALA智能体，创建一个功能齐全的系统，不仅能记住事实和对话，还能通过经验掌握和优化工作流程。
