  zh: '![图3.10 – 语言检测](img/B31034_03_10.jpg)'
- en: Figure 3.10 – Language detection
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.10 – 语言检测
- en: Now that we’ve covered the fundamentals of authentication, let’s shift our focus
    to network security strategies. These strategies help safeguard your Azure AI
    services from unauthorized access and ensure secure communication between resources.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经涵盖了身份验证的基础知识，让我们将重点转向网络安全策略。这些策略有助于保护您的Azure AI服务免受未经授权的访问，并确保资源之间的安全通信。
- en: Configuring network security
  id: totrans-228
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置网络安全
- en: Securing your Azure AI services from a network perspective is crucial to ensure
    that only authorized clients can access your resources.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 从网络角度确保您的Azure AI服务安全至关重要，以确保只有授权客户端可以访问您的资源。
- en: Effective security management for Azure AI services involves implementing firewall
    rules, access controls, and request filtering. Firewall rules are a critical first
    line of defense, designed to block all incoming requests by default. Administrators
    can specify which IP addresses, IP ranges, or subnets are permitted to access
    the resources, thereby preventing unauthorized access from external sources. Additionally,
    to ensure that only legitimate applications can interact with Azure AI services,
    it is essential to use robust authorization mechanisms such as Microsoft Entra
    ID credentials or valid API keys.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 对Azure AI服务进行有效的安全管理涉及实施防火墙规则、访问控制和请求筛选。防火墙规则是第一道防线，默认情况下设计为阻止所有传入请求。管理员可以指定哪些IP地址、IP范围或子网被允许访问资源，从而防止外部来源的未经授权访问。此外，为了确保只有合法的应用程序可以与Azure
    AI服务交互，使用强大的授权机制（如Microsoft Entra ID凭据或有效的API密钥）是至关重要的。
- en: Here are some methods and best practices to enhance network security for Azure
    AI services.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些方法和最佳实践，以增强Azure AI服务的网络安全。
- en: Managing default network access rules
  id: totrans-232
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管理默认网络访问规则
- en: By default, Azure AI services resources accept connections from clients on any
    network. To limit access, you need to change the default action to deny all traffic
    except for specific networks or IP addresses.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，Azure AI服务资源接受来自任何网络的客户端连接。要限制访问，您需要将默认操作更改为拒绝所有流量，仅允许特定网络或IP地址。
- en: 'Exercise 7: Managing network access rules'
  id: totrans-234
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 练习7：管理网络访问规则
- en: 'Go to the Azure AI multi-service account portal you created in *Exercise 1*
    of [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033). Then, follow these steps:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 前往您在[*第二章*](B31034_02.xhtml#_idTextAnchor033)的*练习1*中创建的Azure AI多服务帐户门户。然后，按照以下步骤操作：
- en: Expand **Resource Management** and select **Networking**.
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开资源管理并选择网络。
- en: 'Under `99.112.7.134` is allowed access:'
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`99.112.7.134`允许访问：
- en: '![Figure 3.11 – Blocking all traffic and only allowing the IP address 99.112.7.134](img/B31034_03_011.jpg)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![图3.11 – 阻止所有流量，仅允许IP地址99.112.7.134](img/B31034_03_011.jpg)'
- en: Figure 3.11 – Blocking all traffic and only allowing the IP address 99.112.7.134
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.11 – 阻止所有流量，仅允许IP地址99.112.7.134
- en: Click **Save** to apply your changes.
  id: totrans-240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**保存**以应用您的更改。
- en: Granting access from a virtual network
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从虚拟网络授予访问权限
- en: You can configure Azure AI services to allow access only from specific subnets.
    These subnets can belong to a virtual network in the same or a different subscription—even
    if the other subscription is part of a different Microsoft Entra tenant. If using
    a different subscription, ensure that the `Microsoft.CognitiveServices` resource
    provider is registered there as well.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以配置Azure AI服务，使其仅允许来自特定子网的访问。这些子网可以属于同一订阅或不同订阅中的虚拟网络——即使其他订阅是不同Microsoft Entra租户的一部分。如果使用不同的订阅，请确保`Microsoft.CognitiveServices`资源提供程序也已在该处注册。
- en: To route traffic optimally, enable a service endpoint for Azure AI services
    within the virtual network. This directs traffic through a dedicated path to the
    Azure AI service. For details, see [https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview](https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview).
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化流量路由，在虚拟网络内启用Azure AI服务的服务端点。这会将流量通过专用路径引导到Azure AI服务。有关详细信息，请参阅[https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview](https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview)。
- en: Each request to the Azure AI service includes the subnet and virtual network
    identities, allowing administrators to set network rules that permit access only
    from specific subnets. Clients must still meet authorization requirements to access
    data, even when allowed by network rules.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 每个对Azure AI服务的请求都包含子网和虚拟网络标识符，允许管理员设置网络规则，仅允许来自特定子网的访问。即使网络规则允许，客户端仍需满足授权要求才能访问数据。
- en: Each Azure AI service resource supports up to 100 virtual network rules, which
    can be combined with IP network rules. For more information, refer to [https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal#grant-access-from-an-internet-ip-range](https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal#grant-access-from-an-internet-ip-range).
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 每个Azure AI服务资源支持最多100条虚拟网络规则，这些规则可以与IP网络规则结合使用。有关更多信息，请参阅[https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal#grant-access-from-an-internet-ip-range](https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal#grant-access-from-an-internet-ip-range)。
- en: 'Organizations have other options to enforce access restrictions based on IP
    addresses, virtual network configurations, or private endpoints. The core idea
    is to control access using IP-based configurations with technologies. In this
    section, we’ll introduce two key concepts. For more details, you can follow the
    provided links:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 组织还有其他选项，可以根据IP地址、虚拟网络配置或私有端点来强制执行访问限制。核心思想是使用技术通过基于IP的配置来控制访问。在本节中，我们将介绍两个关键概念。有关更多详细信息，您可以点击提供的链接：
- en: '`CognitiveServicesManagement`, to streamline network security rule management.
    Service tags represent groups of IP addresses for Azure services, enabling you
    to easily allow traffic from these services. For more details, refer to the documentation
    at [https://learn.microsoft.com/en-us/azure/ai-services/qnamaker/how-to/network-isolation](https://learn.microsoft.com/en-us/azure/ai-services/qnamaker/how-to/network-isolation).
    You can also find a full list of IP address prefixes at [https://azservicetags.azurewebsites.net/servicetag/cognitiveservicesmanagement](https://azservicetags.azurewebsites.net/servicetag/cognitiveservicesmanagement).'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`CognitiveServicesManagement`，以简化网络安全规则管理。服务标签代表Azure服务的IP地址组，使您能够轻松允许来自这些服务的流量。有关更多详细信息，请参阅[https://learn.microsoft.com/en-us/azure/ai-services/qnamaker/how-to/network-isolation](https://learn.microsoft.com/en-us/azure/ai-services/qnamaker/how-to/network-isolation)中的文档。您还可以在[https://azservicetags.azurewebsites.net/servicetag/cognitiveservicesmanagement](https://azservicetags.azurewebsites.net/servicetag/cognitiveservicesmanagement)找到完整的IP地址前缀列表。'
- en: '**Private endpoints**: Set up private endpoints to connect your AI services
    to your **virtual network** (**VNet**) using private IP addresses. This keeps
    traffic between your VNet and Azure AI services within the Azure backbone network,
    adding an extra layer of security. For more details, refer to the documentation
    at [https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview](https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview).'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**私有端点**：设置私有端点，使用私有IP地址将您的AI服务连接到您的**虚拟网络**（**VNet**）。这将在您的VNet和Azure AI服务之间保持流量在Azure骨干网络内，增加了一个额外的安全层。有关更多详细信息，请参阅[https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview](https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-service-endpoints-overview)中的文档。'
- en: In this section, you learned that securing Azure AI services from a network
    perspective requires configuring firewall rules, access controls, and request
    filtering to ensure that only authorized clients can access resources. Essential
    security practices include specifying allowed IP ranges or subnets, utilizing
    service tags and private endpoints, and enforcing strong authorization mechanisms
    such as Microsoft Entra ID credentials.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你了解到从网络角度来看，确保Azure AI服务的安全性需要配置防火墙规则、访问控制和请求过滤，以确保只有授权客户端可以访问资源。基本的安全实践包括指定允许的IP范围或子网、利用服务标签和私有端点，以及强制执行强大的授权机制，如Microsoft
    Entra ID凭证。
- en: Summary
  id: totrans-250
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 概述
- en: In [*Chapter 3*](B31034_03.xhtml#_idTextAnchor047), we explored essential management
    and monitoring practices for Azure AI resources, covering topics such as diagnostic
    logging, metrics monitoring, authentication, and network security. Diagnostic
    logging was emphasized as a critical feature for tracking resource usage, troubleshooting
    issues, and maintaining compliance through detailed logs and metrics. You learned
    how to configure various destinations for log data, such as Azure Log Analytics,
    Azure Storage, and Event Hubs, to gain comprehensive visibility into service operations
    and performance. Additionally, Azure Monitor’s advanced tools for metrics tracking
    enable administrators to monitor key performance indicators, set up alerts, and
    visualize trends, ensuring optimal performance and early detection of issues.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第3章*](B31034_03.xhtml#_idTextAnchor047)中，我们探讨了Azure AI资源的基本管理和监控实践，涵盖了诊断日志记录、指标监控、身份验证和网络安全性等主题。诊断日志记录被强调为跟踪资源使用、解决问题和通过详细的日志和指标维护合规性的关键功能。你学习了如何配置日志数据的各种目的地，例如Azure
    Log Analytics、Azure存储和事件中心，以全面了解服务操作和性能。此外，Azure Monitor的高级指标跟踪工具使管理员能够监控关键性能指标、设置警报并可视化趋势，确保最佳性能和问题的早期检测。
- en: Cost management strategies were also highlighted, focusing on estimating expenses
    using the Azure pricing calculator, monitoring spending with Azure Cost Management,
    and configuring budget alerts to avoid unexpected costs. These strategies are
    crucial for maintaining financial control over AI resources, allowing organizations
    to optimize their budgets effectively. By integrating these monitoring, logging,
    and cost management practices, organizations can manage Azure AI services in a
    secure, efficient, and cost-effective manner.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 还强调了成本管理策略，重点关注使用Azure定价计算器估算费用、使用Azure成本管理监控支出以及配置预算警报以避免意外费用。这些策略对于维持对AI资源的财务控制至关重要，使组织能够有效地优化其预算。通过整合这些监控、日志记录和成本管理实践，组织可以以安全、高效和成本效益的方式管理Azure
    AI服务。
- en: We also delved into authentication and network security, highlighting the importance
    of securely managing access to Azure AI resources. The chapter covered best practices
    for key management, such as using Azure Key Vault for secure key storage and rotating
    keys regularly to prevent unauthorized access. Different authentication methods
    were introduced, including single-service and multi-service resource keys, token-based
    access, and Microsoft Entra ID authentication. Network security strategies, such
    as configuring firewall rules, leveraging VNets, and setting up private endpoints,
    were also discussed to safeguard Azure AI resources from external threats.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还深入探讨了身份验证和网络安全性，强调了安全地管理对Azure AI资源访问的重要性。本章涵盖了密钥管理的最佳实践，例如使用Azure密钥保管库进行安全密钥存储和定期轮换密钥以防止未经授权的访问。介绍了不同的身份验证方法，包括单服务和多服务资源密钥、基于令牌的访问和Microsoft
    Entra ID身份验证。还讨论了网络安全策略，如配置防火墙规则、利用虚拟网络（VNets）和设置私有端点，以保护Azure AI资源免受外部威胁。
- en: With these management and security practices in place, organizations can confidently
    deploy and scale their AI solutions.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些管理和安全实践到位的情况下，组织可以自信地部署和扩展其AI解决方案。
- en: In the next chapter, we’ll focus on content moderation solutions, exploring
    how to ensure the safety, compliance, and ethical use of AI-generated content
    using Azure’s Content Safety features. This will include setting up content filtering
    rules and leveraging AI models to detect and manage potentially harmful content.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将重点关注内容审查解决方案，探讨如何使用Azure的内容安全功能确保AI生成内容的安全性、合规性和道德使用。这包括设置内容过滤规则和利用AI模型检测和管理潜在有害内容。
