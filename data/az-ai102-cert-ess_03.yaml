- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: Managing, Monitoring, and Securing Azure AI Services
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 管理、监控和保障 Azure AI 服务
- en: In [*Chapter 3*](B31034_03.xhtml#_idTextAnchor047), we’ll explore key strategies
    for effectively managing and monitoring Azure AI services to ensure smooth and
    secure operations. We’ll begin by configuring diagnostic logging and setting up
    metrics to track performance, troubleshoot issues, and maintain compliance. Additionally,
    the chapter will cover cost management techniques, secure key handling using Azure
    Key Vault, and network security practices to safeguard sensitive data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [*第 3 章*](B31034_03.xhtml#_idTextAnchor047) 中，我们将探讨有效管理和监控 Azure AI 服务的关键策略，以确保平稳和安全的运行。我们将从配置诊断日志和设置指标来跟踪性能、解决问题和维护合规性开始。此外，本章还将涵盖成本管理技术、使用
    Azure Key Vault 安全处理密钥以及网络安全实践来保护敏感数据。
- en: You’ll also learn how to implement robust authentication mechanisms using resource
    keys, Microsoft Entra ID, and access tokens, along with establishing secure private
    communications using virtual networks and private endpoints. By mastering these
    topics, you’ll be equipped with the tools to efficiently manage and protect your
    Azure AI deployments.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你还将学习如何使用资源密钥、Microsoft Entra ID 和访问令牌实现强大的身份验证机制，以及使用虚拟网络和私有端点建立安全的私有通信。通过掌握这些主题，你将具备高效管理和保护你的
    Azure AI 部署的工具。
- en: 'By the end of this chapter, you will be able to do the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章结束时，你将能够做到以下事项：
- en: Configure diagnostic logging and monitor AI resources
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置诊断日志并监控 AI 资源
- en: Manage costs, account keys, and security through Azure Key Vault
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过 Azure Key Vault 管理成本、账户密钥和安全
- en: Set up authentication and secure private communications for Azure AI services
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为 Azure AI 服务设置身份验证和安全的私有通信
- en: Let’s dive into these critical management topics!
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨这些关键的管理主题！
- en: Technical requirements
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'To follow along with the exercises in this chapter, you will need access to
    the code files available in the `chapter-2 folder` of the official GitHub repository:
    [https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials](https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials).'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 要跟随本章的练习，你需要访问官方 GitHub 仓库中 `chapter-2` 文件夹中可用的代码文件：[https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials](https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials)。
- en: Before diving into hands-on tasks, it’s important to understand the core Azure
    features that support monitoring and diagnostics for AI services. Three essential
    tools—**Diagnostic Settings**, **Log Analytics**, and **Metrics**—form the foundation
    for effective operational visibility. These features can be configured per service,
    including Azure OpenAI and other Azure AI offerings.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行实际任务之前，了解支持 AI 服务监控和诊断的核心 Azure 功能非常重要。三个基本工具——**诊断设置**、**日志分析**和**指标**——构成了有效操作可视化的基础。这些功能可以按服务进行配置，包括
    Azure OpenAI 和其他 Azure AI 产品。
- en: Managing diagnostic logging
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 管理诊断日志
- en: Diagnostic logging is an essential capability for managing and ensuring the
    health and security of Azure AI resources. It allows for the configuration of
    streaming exports for platform logs and metrics to multiple destinations, offering
    up to five different configurations simultaneously. This flexibility provides
    in-depth visibility into the operations and activities of these services, enabling
    administrators and developers to track resource usage, detect performance bottlenecks,
    troubleshoot issues, and meet compliance requirements. By utilizing diagnostic
    logs, users can monitor service behavior, analyze access patterns, and maintain
    a comprehensive audit trail, which is especially vital for AI solutions that handle
    sensitive data and require stringent governance and oversight.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 诊断日志是管理和确保 Azure AI 资源健康和安全的基本功能。它允许配置平台日志和指标到多个目的地的流式导出，同时提供多达五种不同的配置。这种灵活性提供了对这些服务操作和活动的深入了解，使管理员和开发者能够跟踪资源使用情况、检测性能瓶颈、解决问题并满足合规性要求。通过利用诊断日志，用户可以监控服务行为、分析访问模式并维护全面的审计跟踪，这对于处理敏感数据并需要严格治理和监督的
    AI 解决方案尤为重要。
- en: Let’s move on to *Exercise 1* to set up diagnostic logging, and then, in *Exercise
    2*, we’ll review the logs generated from the setup in *Exercise 1*.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续进行 *练习 1* 来设置诊断日志，然后，在 *练习 2* 中，我们将回顾 *练习 1* 中设置的日志。
- en: 'Exercise 1: Creating resources for diagnostic log storage'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 1：为诊断日志存储创建资源
- en: To set up diagnostic logging for each service, as shown in the example of the
    Language service in *Figure 3**.1*, navigate to **Diagnostic settings** under
    the **Monitoring** section in the blade menu of the respective service. By clicking
    **Add diagnostic setting**, the **Diagnostic setting** window opens, as shown
    in *Figure 3**.2*. If diagnostic settings have already been created, you can simply
    click **Logs** under **Monitoring** to view the log data. You can refer to *Exercise
    2* for detailed steps.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 要为每个服务设置诊断日志，如*图3.1*中语言服务的示例所示，导航到相应服务的刀片菜单中的**监控**部分下的**诊断设置**。通过点击**添加诊断设置**，将打开**诊断设置**窗口，如*图3.2*所示。如果已经创建了诊断设置，您可以直接点击**监控**下的**日志**来查看日志数据。您可以参考*练习2*获取详细步骤。
- en: '![Figure 3.1 – Setting up a diagnostic setting](img/B31034_03_01.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图3.1 – 设置诊断设置](img/B31034_03_01.jpg)'
- en: Figure 3.1 – Setting up a diagnostic setting
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1 – 设置诊断设置
- en: 'To capture diagnostic logs for an AI services resource, you first need to designate
    a destination for the log data. There are several options to choose from, depending
    on your monitoring and analysis needs:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 要捕获AI服务资源的诊断日志，您首先需要指定日志数据的目标位置。根据您的监控和分析需求，有多种选择：
- en: '**Azure Log Analytics**: A service that allows you to query and visualize log
    data within the Azure portal, making it easy to analyze trends and patterns'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure日志分析**：一种服务，允许您在Azure门户中查询和可视化日志数据，使其易于分析趋势和模式。'
- en: '**Azure Storage**: A cloud-based storage service where log archives can be
    stored and exported for further analysis using other tools as required'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure存储**：一种基于云的存储服务，其中可以存储和导出日志存档，以便使用其他工具进行进一步分析。'
- en: '**Stream to an event hub**: This option sends the log data to an Azure event
    hub, which can then forward the data to custom telemetry solutions or third-party
    monitoring tools for real-time processing'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流式传输到事件中心**：此选项将日志数据发送到Azure事件中心，然后可以转发数据到自定义遥测解决方案或第三方监控工具进行实时处理。'
- en: '**Send to partner solution**: You can also integrate directly with partner
    solutions (such as Splunk or Elastic) to send the logs for advanced monitoring
    and analytics without the need to manually configure data forwarding'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发送到合作伙伴解决方案**：您还可以直接与合作伙伴解决方案（如Splunk或Elastic）集成，以发送日志进行高级监控和分析，无需手动配置数据转发。'
- en: Before configuring diagnostic logging for your AI services resource, it’s recommended
    to create these resources in advance. If you plan to store logs in Azure Storage,
    ensure that the storage account is created in the same region as your AI services
    resources for optimal performance and cost efficiency.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在配置您的AI服务资源诊断日志之前，建议您提前创建这些资源。如果您计划将日志存储在Azure存储中，请确保存储账户与您的AI服务资源位于同一区域，以实现最佳性能和成本效益。
- en: Configuring diagnostic settings
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置诊断设置
- en: 'Once your log destinations are set up, you can configure the diagnostic settings
    for your AI service directly within the Azure portal on the **Diagnostic setting**
    page. When creating a new diagnostic setting, you will need to define the following
    key components:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦设置了日志目标，您就可以在Azure门户的**诊断设置**页面上直接为您的AI服务配置诊断设置。在创建新的诊断设置时，您需要定义以下关键组件：
- en: '**Diagnostic setting name**: Choose a unique identifier for the diagnostic
    setting'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**诊断设置名称**：为诊断设置选择一个唯一的标识符。'
- en: '**Logs Categories**: Select which types of log events you want to capture,
    such as operational logs, performance metrics, or request logs'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日志类别**：选择您想要捕获的日志事件类型，例如操作日志、性能指标或请求日志。'
- en: '**Logs Destination details**: Specify where the captured log data should be
    sent, whether to Azure Log Analytics, Azure Storage, an Azure event hub for further
    processing, a partner solution, or Azure Monitor partner integration'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日志目标详情**：指定捕获的日志数据应发送到何处，是Azure日志分析、Azure存储、用于进一步处理的Azure事件中心、合作伙伴解决方案，还是Azure监控合作伙伴集成。'
- en: For example, a typical configuration may be set up to route all logs and metrics
    to Azure Log Analytics for monitoring and visualizations, as shown in the following
    figure, while simultaneously storing them in Azure Storage for long-term archival
    and compliance purposes.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，典型的配置可能将所有日志和指标路由到Azure日志分析进行监控和可视化，同时存储在Azure存储中，用于长期存档和合规性目的，如以下图所示。
- en: Click **Save** at the top of the screen in *Figure 3**.2* to start capturing
    data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图3.2*中，点击屏幕顶部的**保存**按钮以开始捕获数据。
- en: '![Figure 3.2 – Diagnostic setting](img/B31034_03_02.jpg)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图3.2 – 诊断设置](img/B31034_03_02.jpg)'
- en: Figure 3.2 – Diagnostic setting
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2 – 诊断设置
- en: With the completion of the **Diagnostic setting** configuration, let’s now explore
    how you can analyze diagnostic logs and metrics in the next exercise.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成**诊断设置**配置后，现在让我们在下一项练习中探索如何分析诊断日志和指标。
- en: 'Exercise 2: Viewing log data in Azure Log Analytics'
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习2：在Azure日志分析中查看日志数据
- en: Azure Log Analytics, a core component of the Azure Monitor suite, enables users
    to query and analyze diagnostic logs and metrics using **Kusto Query Language**
    (**KQL**)—a powerful tool designed for exploring and visualizing large-scale telemetry
    data. It provides a centralized workspace for running detailed queries across
    various Azure services, simplifying the process of monitoring performance, troubleshooting
    issues, and gaining valuable insights into resource usage. Accessible through
    the Azure portal, Log Analytics allows users to leverage both predefined and custom
    queries to address specific analysis needs, while also offering the ability to
    set up alerts based on query results for proactive monitoring.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Azure日志分析是Azure Monitor套件的核心组件，它允许用户使用**Kusto查询语言**（**KQL**）查询和分析诊断日志和指标——这是一种专为探索和可视化大规模遥测数据而设计的强大工具。它提供了一个集中式的工作空间，用于在多个Azure服务上运行详细查询，简化了监控性能、解决问题以及获取资源使用宝贵见解的过程。通过Azure门户访问，日志分析允许用户利用预定义和自定义查询来满足特定的分析需求，同时提供根据查询结果设置警报以进行主动监控的能力。
- en: Additionally, Azure Monitor integrates seamlessly with tools such as Metrics
    Explorer, Grafana, and Power BI, expanding its visualization and reporting capabilities.
    The new alerting feature, which triggers notifications based on custom KQL queries,
    adds another layer of automated responses to detected anomalies. This holistic
    monitoring framework allows users to export data through REST APIs or workspace
    data exports, ensuring comprehensive visibility, better control, and enhanced
    decision-making across their Azure environments.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Azure Monitor与Metrics Explorer、Grafana和Power BI等工具无缝集成，扩展了其可视化和报告功能。新的警报功能，基于自定义KQL查询触发通知，为检测到的异常添加了另一层自动响应。这个全面的监控框架允许用户通过REST
    API或工作空间数据导出导出数据，确保在他们的Azure环境中实现全面的可见性、更好的控制和增强的决策能力。
- en: After saving the diagnostic settings in the previous step, click **Logs** under
    the **Monitoring** section in the blade menu of the service, where you can write
    KQL queries to retrieve the specific data you need.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一步保存诊断设置后，点击服务刀片菜单中的**监控**部分下的**日志**，在那里您可以编写KQL查询以检索所需的具体数据。
- en: '![Figure 3.3 – Viewing logs in Azure Log Analytics](img/B31034_03_003.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图3.3 – 在Azure日志分析中查看日志](img/B31034_03_003.jpg)'
- en: Figure 3.3 – Viewing logs in Azure Log Analytics
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3 – 在Azure日志分析中查看日志
- en: Now that we’ve covered managing diagnostic logging, let’s shift our focus to
    exploring how metrics can provide deeper insights into your Azure AI service’s
    performance and usage.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经涵盖了管理诊断日志的内容，让我们将注意力转向探索指标如何提供更深入的见解，以了解您的Azure AI服务的性能和用法。
- en: Monitoring metrics
  id: totrans-42
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 监控指标
- en: Metrics are essential for monitoring the performance and operational health
    of Azure AI services, offering insights into service usage, API calls, and resource
    utilization. Collected automatically in the Azure Monitor metrics database, they
    help track key aspects such as request latency, error rates, and the efficiency
    of different model deployments. For example, for Azure OpenAI Service, metrics
    such as **Azure OpenAI Requests** highlight the number of API calls, revealing
    usage trends over time.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 指标对于监控Azure AI服务的性能和运营健康至关重要，它们提供了对服务使用、API调用和资源利用率的洞察。这些指标在Azure Monitor指标数据库中自动收集，有助于跟踪关键方面，如请求延迟、错误率和不同模型部署的效率。例如，对于Azure
    OpenAI服务，**Azure OpenAI 请求**等指标突出了API调用的数量，揭示了随时间变化的趋势。
- en: Azure Monitor provides tools such as **Metrics Explorer** to visualize these
    metrics, as shown in *Figure 3**.4*, apply aggregations, and set up alerts for
    any anomalies. This enables users to perform real-time monitoring, troubleshoot
    issues, and optimize the scalability of their AI models. By routing these metrics
    to Azure Monitor logs, users gain deeper insights for fine-tuning performance,
    ensuring reliable and efficient operations of their AI services.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: Azure Monitor 提供了如 **指标资源管理器** 等工具来可视化这些指标，如图 *图 3.4* 所示，应用聚合并设置任何异常的警报。这使得用户能够进行实时监控、解决问题并优化其
    AI 模型的可伸缩性。通过将这些指标路由到 Azure Monitor 日志，用户可以获得更深入的洞察，以微调性能，确保其 AI 服务的可靠和高效运行。
- en: '![Figure 3.4 – Azure OpenAI Requests metrics](img/B31034_03_04.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.4 – Azure OpenAI 请求指标](img/B31034_03_04.jpg)'
- en: Figure 3.4 – Azure OpenAI Requests metrics
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.4 – Azure OpenAI 请求指标
- en: Expanding on the foundational metric capabilities discussed earlier, Azure provides
    a more granular approach to tracking and analyzing performance indicators through
    the **Add metric** feature. This functionality enhances monitoring by allowing
    users to customize their metric views, apply filters, and gain deeper insights
    into resource utilization. In the following section, we will explore how to leverage
    this feature to optimize the performance and operational efficiency of your Azure
    AI services.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面讨论的基础指标能力的基础上，Azure 通过“添加指标”功能提供了一种更细粒度的方法来跟踪和分析性能指标。此功能通过允许用户自定义他们的指标视图、应用过滤器以及更深入地了解资源利用率来增强监控。在下一节中，我们将探讨如何利用此功能来优化您的
    Azure AI 服务的性能和运营效率。
- en: Add metric
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 添加指标
- en: You can access this feature through the **Metrics** section under the **Monitoring**
    pane of the Azure portal, as shown in *Figure 3**.4*. By selecting the **+ Add
    metric** option, you can choose from a variety of available metrics, such as **Azure
    OpenAI Requests** for Azure OpenAI requests.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过 Azure 门户“监控”面板下的“指标”部分访问此功能，如图 *图 3.4* 所示。通过选择“+ 添加指标”选项，您可以从各种可用的指标中选择，例如
    **Azure OpenAI 请求** 用于 Azure OpenAI 请求。
- en: Users can configure the time range for these metrics, ranging from the last
    30 minutes to 30 days, and apply filters and split options to view data by dimensions
    such as **ApiName** or **ModelName**. This enables detailed performance insights.
    The metrics can be visualized using different chart types (line, bar, or area
    charts), allowing users to identify trends, detect anomalies, and monitor resource
    health effectively.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可以为这些指标配置时间范围，从最后 30 分钟到 30 天不等，并应用过滤器和拆分选项，通过如 **ApiName** 或 **ModelName**
    等维度来查看数据。这使您可以获得详细性能洞察。这些指标可以使用不同的图表类型（折线图、柱状图或面积图）进行可视化，使用户能够识别趋势、检测异常并有效地监控资源健康。
- en: Adding a metric to a dashboard
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将指标添加到仪表板
- en: Azure Monitor dashboards provide a dynamic and customizable way to visualize
    and manage the health and performance of Azure resources by unifying metrics,
    logs, and monitoring data into a single, cohesive view. With Azure Monitor, users
    can centralize essential metrics to track trends, detect anomalies, and gain real-time
    insights across resources and services. Integrated seamlessly with tools such
    as **Grafana** and **Azure Workbooks**, Azure Monitor enhances reporting capabilities
    by supporting operational dashboards and interactive analytics, delivering a powerful
    environment for monitoring and analysis.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: Azure Monitor 仪表板通过将指标、日志和监控数据统一到一个单一的、连贯的视图中，提供了一种动态和可定制的可视化和管理 Azure 资源健康和性能的方法。使用
    Azure Monitor，用户可以将关键指标集中起来以跟踪趋势、检测异常并在资源和服务中获得实时洞察。与 **Grafana** 和 **Azure Workbooks**
    等工具无缝集成，Azure Monitor 通过支持操作仪表板和交互式分析来增强报告功能，提供了一个强大的监控和分析环境。
- en: After customizing your metric views, as shown in *Figure 3**.4*, you can click
    **Save to dashboard** to make these views easily accessible. This action prompts
    you to add metrics to an existing dashboard or create a new one, enabling you
    to centralize and consolidate customized metric views from individual services—such
    as Language, Azure OpenAI, and other Azure AI services. Additionally, dashboards
    support role-based access, allowing team members to access tailored insights.
    By combining integrations with Grafana and Workbooks, users can create rich, interactive
    visualizations, making Azure Monitor a versatile solution for comprehensive monitoring
    and data-driven decision-making.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在自定义您的指标视图，如图 *图 3.4* 所示后，您可以点击 **保存到仪表板** 使这些视图易于访问。此操作会提示您将指标添加到现有仪表板或创建一个新的仪表板，使您能够集中和整合来自单个服务（如语言、Azure
    OpenAI 和其他 Azure AI 服务）的自定义指标视图。此外，仪表板支持基于角色的访问，允许团队成员访问定制洞察。通过结合 Grafana 和 Workbooks
    的集成，用户可以创建丰富、交互式的可视化，使 Azure Monitor 成为全面监控和数据驱动决策的灵活解决方案。
- en: Now that we’ve covered logging and metrics under **Monitoring**, let’s shift
    our focus to managing costs, an essential aspect to ensure your Azure AI services
    are optimized for both performance and budget.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经涵盖了在 **监控** 下的日志和指标，让我们将重点转向管理成本，这是确保您的 Azure AI 服务在性能和预算方面都得到优化的重要方面。
- en: Managing costs for Azure AI services
  id: totrans-55
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 管理 Azure AI 服务的成本
- en: One of the key advantages of cloud services is cost efficiency, as you only
    pay for what you use. Azure AI services offer different pricing tiers, including
    free tiers for development and testing, and paid tiers based on usage metrics
    such as transactions. Managing costs effectively involves planning, monitoring,
    and setting up alerts to ensure that spending remains within budget. Each Azure
    AI service resource has specific billing rates depending on its type, making it
    crucial to carefully select and monitor resource tiers to avoid unexpected expenses.
    By leveraging these features, users can optimize their Azure budgets and ensure
    that they are utilizing resources in a cost-effective manner.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 云服务的一个关键优势是成本效益，因为您只需为使用的部分付费。Azure AI 服务提供不同的定价层，包括用于开发和测试的免费层以及基于使用度量（如交易）的付费层。有效管理成本涉及规划、监控和设置警报以确保支出保持在预算内。每个
    Azure AI 服务资源都有根据其类型的特定计费率，因此仔细选择和监控资源层以避免意外费用至关重要。通过利用这些功能，用户可以优化他们的 Azure 预算并确保他们以成本效益的方式利用资源。
- en: Planning costs
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规划成本
- en: Effectively managing costs starts with careful planning before deploying Azure
    AI services. The **Azure Pricing Calculator**—available at [aka.ms/AzurePricingCalculator](http://aka.ms/AzurePricingCalculator)—is
    an essential tool that helps you estimate monthly expenses based on your projected
    usage. By selecting specific Azure AI services and adjusting configuration parameters
    such as region, usage volume, and pricing tier, you can model different scenarios
    and forecast your potential spending. This proactive step ensures that you’re
    not caught off guard by unexpected charges. For example, services like Azure OpenAI
    are billed based on the number of tokens processed, so understanding the pricing
    structure up front is key to budgeting accurately. Once services are provisioned,
    they can be managed through the Azure portal, SDKs, CLI, or ARM templates, offering
    flexible deployment options while maintaining cost control.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 有效管理成本始于在部署 Azure AI 服务之前的仔细规划。**Azure 定价计算器**（可在 [aka.ms/AzurePricingCalculator](http://aka.ms/AzurePricingCalculator)
    获取）是一个必不可少的工具，它可以帮助您根据预期的使用量估算月度费用。通过选择特定的 Azure AI 服务并调整配置参数，如地区、使用量和定价层，您可以模拟不同的场景并预测您的潜在支出。这一主动步骤确保您不会因意外费用而措手不及。例如，像
    Azure OpenAI 这样的服务是根据处理令牌的数量计费的，因此提前了解定价结构对于准确预算至关重要。一旦服务被配置，它们可以通过 Azure 门户、SDK、CLI
    或 ARM 模板进行管理，提供灵活的部署选项同时保持成本控制。
- en: Viewing costs
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 查看成本
- en: 'To analyze Azure AI service expenses, navigate to the **Resource Management**
    | **Cost analysis** section in the Azure portal, as shown in the following figure:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 要分析 Azure AI 服务费用，请转到 Azure 门户中的 **资源管理** | **成本分析** 部分，如图下所示：
- en: '![Figure 3.5 – Cost analysis dashboard](img/B31034_03_005.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.5 – 成本分析仪表板](img/B31034_03_005.jpg)'
- en: Figure 3.5 – Cost analysis dashboard
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.5 – 成本分析仪表板
- en: The **Cost analysis** feature offers detailed insights into accumulated and
    forecasted costs, enabling users to filter and view data by resource type, such
    as specific AI services. With grouping and filtering options, users can break
    down costs by dimensions such as resource groups or individual services, helping
    identify major cost contributors and ensuring efficient budget management.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**成本分析** 功能提供了对累积和预测成本的详细见解，使用户能够按资源类型（如特定的 AI 服务）过滤和查看数据。通过分组和过滤选项，用户可以根据资源组或单个服务等维度分解成本，帮助识别主要成本贡献者并确保有效的预算管理。'
- en: Setting up cost alerts
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置成本警报
- en: Azure Monitor’s *cost alerts* feature helps prevent unexpected expenses by notifying
    users when spending reaches predefined thresholds. In the **Resource Management**
    section, users can also set up budgets to monitor their expenditure on a monthly,
    quarterly, or annual basis. Alerts can be configured to trigger when spending
    approaches or exceeds these limits, allowing for proactive cost management. Additionally,
    regular forecasting reviews provide insights into projected costs, helping to
    anticipate future spending trends and make data-driven decisions on resource scaling.
    By implementing these strategies, organizations can maintain better financial
    control over their Azure AI services.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: Azure Monitor 的 *成本警报* 功能通过在支出达到预定义阈值时通知用户，帮助防止意外费用。在 **资源管理** 部分中，用户还可以设置预算以按月、季度或年度监控他们的支出。警报可以配置为在支出接近或超过这些限制时触发，从而实现主动的成本管理。此外，定期的预测审查提供了对预测成本的了解，有助于预测未来的支出趋势，并在资源扩展上做出基于数据的决策。通过实施这些策略，组织可以更好地控制其
    Azure AI 服务财务。
- en: Now that we’ve discussed how to effectively manage costs for Azure AI services,
    let’s put these concepts into practice through a hands-on exercise to ensure you
    can implement these strategies confidently.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了如何有效地管理 Azure AI 服务的成本，让我们通过实际操作练习将这些概念付诸实践，以确保您能够自信地实施这些策略。
- en: 'Exercise 3: Setting up an alert rule'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 3：设置警报规则
- en: 'This exercise will guide you through setting up an alert rule to monitor activity
    on your Azure AI services resource:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 本练习将指导您设置一个警报规则以监控您的 Azure AI 服务资源上的活动：
- en: 'Go to your Azure AI services multi-service account. If you haven’t yet provisioned
    the Azure AI services, please refer to *Exercise 1: Getting started with Azure
    AI Service* in [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033), specifically the
    *Provisioning Azure AI services* section, for detailed guidance.'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往您的 Azure AI 服务多服务帐户。如果您尚未配置 Azure AI 服务，请参阅 [*第 2 章*](B31034_02.xhtml#_idTextAnchor033)
    中的 *练习 1：Azure AI 服务入门*，特别是 *配置 Azure AI 服务* 部分，以获取详细指导。
- en: Important note
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: As mentioned earlier, make sure you have your endpoint and key ready, as they
    are required for this step.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，请确保您已准备好端点和密钥，因为它们是此步骤所需的。
- en: 'Navigate to the Azure AI services resource:'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 Azure AI 服务资源：
- en: In the Azure portal, open your Azure AI services resource and go to **Alerts**
    under the **Monitoring** section.
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 Azure 门户中，打开您的 Azure AI 服务资源，并转到 **监控** 下的 **警报**。
- en: 'Create a new alert rule:'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个新的警报规则：
- en: Click **+ Create** and select **Alert rule**. Verify your resource is listed
    under **Scope**.
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击 **+ 创建** 并选择 **警报规则**。验证您的资源是否列在 **范围** 下。
- en: 'Select a signal to monitor:'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择要监控的信号：
- en: Under the **Condition** tab, choose **See all signals** to open the **Select
    a** **signal** pane.
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **条件** 选项卡下，选择 **查看所有信号** 以打开 **选择一个** **信号** 面板。
- en: Scroll to the **Activity Log** section and select **List Keys (Cognitive Services
    API Account)**, then click **Apply**.
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 滚动到 **活动日志** 部分，选择 **列出密钥（认知服务 API 帐户）**，然后点击 **应用**。
- en: 'Set the alert details:'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置警报详情：
- en: In the `Key` `List Alert`.
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 `Key` `List Alert`。
- en: 'Review and create the alert rule:'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查并创建警报规则：
- en: Click **Review + create**, then select **Create** to finalize.
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击 **审查 + 创建**，然后选择 **创建** 以完成。
- en: 'Trigger the alert using the Azure CLI:'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 Azure CLI 触发警报：
- en: 'Run the following command, replacing `<resourceName>` and `<resourceGroup>`
    with the actual name of your resource name and its corresponding resource group:'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行以下命令，将 `<resourceName>` 和 `<resourceGroup>` 替换为您的实际资源名称及其对应的资源组名称：
- en: '[PRE0]'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Check the alert in the Azure portal:'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Azure 门户中检查警报：
- en: Go back to the **Alerts** page and refresh. Verify that a **Verbose** alert
    is listed in the table. Wait a few minutes and refresh if it’s not immediately
    visible.
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回到 **警报** 页面并刷新。验证表中是否列出了 **详细** 警报。等待几分钟，如果它没有立即可见，请刷新。
- en: '![Figure 3.6 – Alerts result after running the CLI scripts in step 7](img/B31034_03_06.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.6 – 在第 7 步运行 CLI 脚本后的警报结果](img/B31034_03_06.jpg)'
- en: Figure 3.6 – Alerts result after running the CLI scripts in step 7
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.6 – 在第 7 步运行 CLI 脚本后的警报结果
- en: Now that we understand how to set up an alert, let’s move on to the next exercise
    and explore how to view metrics.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了如何设置警报，让我们继续下一个练习，探索如何查看指标。
- en: 'Exercise 4: Visualizing a metric'
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 4：可视化指标
- en: Monitoring key performance metrics is essential for understanding the usage
    patterns and efficiency of your Azure AI services. In this exercise, we will explore
    how to visualize and analyze these metrics within the Azure portal, enabling proactive
    monitoring and optimization of your AI workloads;
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 监控关键性能指标对于理解您的 Azure AI 服务的使用模式和效率至关重要。在这个练习中，我们将探索如何在 Azure 门户中可视化和分析这些指标，从而实现
    AI 工作负载的主动监控和优化；
- en: 'Access the metrics for your Azure AI resource:'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问您的 Azure AI 资源的指标：
- en: In the Azure portal, navigate to your Azure AI services resource.
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Azure 门户中，导航到您的 Azure AI 服务资源。
- en: Go to **Metrics** under the **Monitoring** section.
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **监控** 下的 **指标** 中。
- en: If no chart exists, click **+ New chart** and select **Total Calls** from the
    **Metric** dropdown.
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果没有图表，点击 **+ 新图表** 并从 **指标** 下拉菜单中选择 **总调用次数**。
- en: In the **Aggregation** list, choose **Count** to track the total number of calls
    over time.
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **聚合** 列表中，选择 **计数** 以跟踪随时间变化的调用总数。
- en: 'Generate call activity using a cURL command:'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 cURL 命令生成调用活动：
- en: Copy the `rest-test-sample.cmd` file and rename it to `rest-test.cmd`. Open
    the newly created `rest-test.cmd` file in your text editor and update it with
    your Azure AI endpoint and key values. For your reference, you can review the
    sample file I provided, named `rest-test-petersample.cmd`.
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复制 `rest-test-sample.cmd` 文件并将其重命名为 `rest-test.cmd`。在您的文本编辑器中打开新创建的 `rest-test.cmd`
    文件，并使用您的 Azure AI 端点和密钥值更新它。供您参考，您可以查看我提供的示例文件，命名为 `rest-test-petersample.cmd`。
- en: 'Update the cURL command with your Azure AI endpoint and key values:'
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用您的 Azure AI 端点和密钥值更新 cURL 命令：
- en: '[PRE1]'
  id: totrans-101
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Save your changes and run the command by executing the following:'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存您的更改并执行以下命令：
- en: '[PRE2]'
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Generate additional call activity:'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成额外的调用活动：
- en: Repeat the command multiple times to generate sufficient call activity for monitoring.
  id: totrans-105
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复执行命令多次，以生成足够的调用活动进行监控。
- en: 'Review the metrics in the Azure portal, as shown in the following figure:'
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看 Azure 门户中的指标，如图下所示：
- en: Return to the **Metrics** page in the Azure portal.
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 返回 Azure 门户中的 **指标** 页面。
- en: Refresh the **Total Calls** chart periodically until the new call activity is
    visible. It may take a few minutes for the data to reflect.
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定期刷新 **总调用次数** 图表，直到新的调用活动可见。数据反映可能需要几分钟。
- en: This streamlined process will help you monitor and visualize the API usage effectively.
  id: totrans-109
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个简化的流程将帮助您有效地监控和可视化 API 使用情况。
- en: '![Figure 3.7 – Result of metric view after running cURL commands multiple times](img/B31034_03_07.jpg)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.7 – 多次运行 cURL 命令后的指标视图结果](img/B31034_03_07.jpg)'
- en: Figure 3.7 – Result of metric view after running cURL commands multiple times
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.7 – 多次运行 cURL 命令后的指标视图结果
- en: Now that we’ve completed the hands-on exercise, let’s shift our focus to the
    security perspective. We’ll begin by covering the essentials of authentication
    and ensuring secure access to your Azure AI services, and later, we’ll dive into
    network security strategies to protect your resources and communications.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经完成了动手练习，让我们将重点转向安全方面。我们将首先介绍身份验证的基本知识，并确保您对 Azure AI 服务的安全访问，然后我们将深入了解网络安全策略以保护您的资源和通信。
- en: Understanding authentication
  id: totrans-113
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解身份验证
- en: Azure AI services require robust authentication and key management strategies
    to ensure secure access and operation. Here’s an overview of how to regenerate,
    manage, and protect keys, along with various authentication methods such as token-based
    authentication, Microsoft Entra ID, service principals, and managed identities.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 服务需要强大的身份验证和密钥管理策略，以确保安全访问和操作。以下是重新生成、管理和保护密钥以及各种身份验证方法（如基于令牌的身份验证、Microsoft
    Entra ID、服务主体和托管标识）的概述。
- en: 'Exercise 5: Regenerating keys'
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 5：重新生成密钥
- en: Regularly regenerating keys is a critical security measure to protect against
    unauthorized access. Azure AI services provide two keys for each resource, allowing
    you to rotate keys without service interruption.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 定期重新生成密钥是防止未授权访问的关键安全措施。Azure AI 服务为每个资源提供两个密钥，允许您在不中断服务的情况下轮换密钥。
- en: Go to the Azure AI multi-service account portal you created in *Exercise 1*
    of [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 前往您在[*第 2 章*](B31034_02.xhtml#_idTextAnchor033)的*练习 1*中创建的 Azure AI 多服务帐户门户。
- en: 'Here are the steps to regenerate keys:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是重新生成密钥的步骤：
- en: 'Prepare for the key rotation in applications:'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为应用程序中的密钥轮换做准备：
- en: '**Single key usage**: If both keys are in use, update your code to rely on
    only one key temporarily. For example, configure all production applications to
    use key 1 exclusively.'
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单密钥使用**：如果两个密钥都在使用中，请更新您的代码以临时仅依赖于一个密钥。例如，配置所有生产应用程序仅使用密钥 1。'
- en: 'Regenerate key 2:'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新生成密钥 2：
- en: Navigate to your resource’s page in the Azure portal.
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 Azure 门户中您的资源页面。
- en: Go to the **Keys and** **Endpoint** section.
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 转到**密钥和** **端点**部分。
- en: Select **Regenerate Key2**, as shown in *Figure 3**.8*.
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**重新生成密钥 2**，如图 3.8 所示。
- en: 'Update the code:'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更新代码：
- en: Update your production applications to use the newly regenerated key 2.
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更新您的生产应用程序以使用新重新生成的密钥 2。
- en: Ensure that all applications have successfully switched to key 2 before proceeding.
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在继续之前，请确保所有应用程序都已成功切换到密钥 2。
- en: 'Regenerate key 1:'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新生成密钥 1：
- en: Return to the **Keys and** **Endpoint** section.
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 返回到**密钥和** **端点**部分。
- en: Select **Regenerate Key1**, as shown in *Figure 3**.8*.
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**重新生成密钥 1**，如图 3.8 所示。
- en: 'Final update:'
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最终更新：
- en: Update your production code to use the new key 1.
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更新您的生产代码以使用新密钥 1。
- en: Confirm that all applications are functioning correctly with the new key 1.
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确认所有应用程序在使用新密钥 1 后均能正常工作。
- en: '![Figure 3.8 – Generating keys in the portal](img/B31034_03_08.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.8 – 在门户中生成密钥](img/B31034_03_08.jpg)'
- en: Figure 3.8 – Generating keys in the portal
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.8 – 在门户中生成密钥
- en: 'You can also regenerate keys using the Azure CLI:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以使用 Azure CLI 重新生成密钥：
- en: '[PRE3]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Replace `<your-resource-name>` and `<your-resource-group>` with your actual
    resource name and resource group. This command regenerates key 1\. Similarly,
    you can regenerate key 2 by changing `--key-name key1` to `--``key-name key2`.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 将 `<your-resource-name>` 和 `<your-resource-group>` 替换为您的实际资源名称和资源组。此命令重新生成密钥
    1。同样，您可以通过将 `--key-name key1` 更改为 `--key-name key2` 来重新生成密钥 2。
- en: Important considerations
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重要注意事项
- en: 'It’s essential to understand the potential impact on your applications and
    follow best practices to ensure a secure and seamless transition:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 理解对您应用程序的潜在影响并遵循最佳实践对于确保安全且无缝的过渡至关重要：
- en: '**Security**: Always store keys securely and avoid hardcoding them directly
    in your applications. Instead, use Azure Key Vault to manage and safeguard keys,
    ensuring they remain protected from unauthorized access or accidental exposure.
    Secure key storage is a crucial practice to maintain the integrity and confidentiality
    of your Azure AI services.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**：始终安全地存储密钥，并避免直接在应用程序中硬编码它们。相反，使用 Azure Key Vault 来管理和保护密钥，确保它们免受未经授权的访问或意外泄露。安全密钥存储是维护
    Azure AI 服务完整性和机密性的关键实践。'
- en: '**Regular rotation**: To minimize security risks, such as key compromise or
    accidental sharing, it’s recommended to regularly regenerate your keys. Key rotation
    is essential for maintaining the security posture of your applications, ensuring
    that any previously shared or exposed keys are no longer valid.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期轮换**：为了最小化安全风险，如密钥泄露或意外共享，建议定期重新生成密钥。密钥轮换对于维护应用程序的安全态势至关重要，确保任何先前共享或泄露的密钥不再有效。'
- en: '**Logging and monitoring**: It’s important to keep logs and actively monitor
    access to ensure that key changes do not disrupt service operations. Proper monitoring
    helps to verify that all applications have successfully switched to the new keys,
    reducing the likelihood of downtime or access issues.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日志记录和监控**：保持日志并积极监控访问权限对于确保密钥更改不会干扰服务操作非常重要。适当的监控有助于验证所有应用程序都已成功切换到新密钥，从而降低停机或访问问题发生的可能性。'
- en: By adhering to these practices, you can implement a secure and seamless key
    rotation process for your Azure AI services, minimizing potential vulnerabilities
    and ensuring a robust security framework.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些实践，您可以为您 Azure AI 服务实现一个安全且无缝的密钥轮换过程，最大限度地减少潜在漏洞并确保强大的安全框架。
- en: Protecting keys with Azure Key Vault
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Azure Key Vault 保护密钥
- en: Azure Key Vault is a cloud service designed to securely store and manage sensitive
    information such as passwords, API keys, certificates, and encryption keys. It
    helps protect these secrets, ensuring that only authenticated users or applications
    can access them, thereby minimizing security risks.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: Azure Key Vault是一种云服务，旨在安全地存储和管理敏感信息，如密码、API密钥、证书和加密密钥。它有助于保护这些机密，确保只有经过身份验证的用户或应用程序才能访问它们，从而最小化安全风险。
- en: The following figure illustrates a secure method of accessing Azure services
    using Azure Key Vault. The process begins by creating a key and granting access
    to it in Key Vault (**1**). Next, the application (**APP**) retrieves this key
    from Key Vault, using either a user or service principal, depending on the context
    and use case (**2**). This approach ensures that keys are not hardcoded or stored
    insecurely in the application itself. Once the key is retrieved, the application
    can then access the Azure service securely (**3**), using the key to authenticate
    the Azure AI service. This method minimizes the risk of key exposure and enhances
    security by centralizing secret management.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 下图说明了使用Azure Key Vault安全访问Azure服务的方法。过程从在密钥保管库中创建密钥并授予对其的访问权限开始（**1**）。接下来，应用程序（**APP**）根据上下文和用例，使用用户或服务主体从密钥保管库检索此密钥（**2**）。这种方法确保密钥不会被硬编码或在不安全的地方存储在应用程序本身中。一旦检索到密钥，应用程序就可以安全地访问Azure服务（**3**），使用密钥对Azure
    AI服务进行身份验证。这种方法最小化了密钥暴露的风险，并通过集中管理机密来增强安全性。
- en: '![Figure 3.9 – Protecting keys with Azure Key Vault](img/B31034_03_09.jpg)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图3.9 – 使用Azure Key Vault保护密钥](img/B31034_03_09.jpg)'
- en: Figure 3.9 – Protecting keys with Azure Key Vault
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.9 – 使用Azure Key Vault保护密钥
- en: Ensuring secure access to Azure AI services requires robust authentication and
    authorization mechanisms. By leveraging Microsoft Entra ID authentication, granting
    access with security principals, and using user principals, organizations can
    enforce role-based access control, minimize key exposure, and enhance overall
    security. Let’s explore how these methods work together to safeguard Azure AI
    resources.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 确保对Azure AI服务的安全访问需要强大的身份验证和授权机制。通过利用Microsoft Entra ID身份验证、使用安全主体授予访问权限以及使用用户主体，组织可以实施基于角色的访问控制、最小化密钥暴露并增强整体安全性。让我们探讨这些方法如何协同工作以保护Azure
    AI资源。
- en: Microsoft Entra ID authentication
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Microsoft Entra ID身份验证
- en: 'Azure AI services support Microsoft Entra ID authentication, allowing you to
    grant access to specific service principals or managed identities for applications
    and services running in Azure. You can authenticate to Azure AI services using
    Microsoft Entra ID in several ways, including the following:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI服务支持Microsoft Entra ID身份验证，允许您为在Azure中运行的应用程序和服务授予特定服务主体或托管身份的访问权限。您可以使用多种方式通过Microsoft
    Entra ID对Azure AI服务进行身份验证，包括以下方式：
- en: '**Grant access with security principals**: To control access to Azure Key Vault,
    use security principals, which represent identities authenticated through Microsoft
    Entra ID. These can be categorized into the following:'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用安全主体授予访问权限**：为了控制对Azure Key Vault的访问，请使用代表通过Microsoft Entra ID进行身份验证的标识的安全主体。这些可以分为以下几类：'
- en: '**User principal**: This represents an individual user. This type of principal
    is best suited for scenarios where specific users need direct access to review,
    update, or manage secrets manually—for example, an administrator configuring Azure
    resources or a developer troubleshooting secret.'
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户主体**：这代表一个个人用户。此类主体最适合需要特定用户直接访问以手动审查、更新或管理机密的场景——例如，管理员配置Azure资源或开发人员调试机密。'
- en: '**Service principal**: This represents an application or service and is ideal
    for scenarios where the application needs to access resources programmatically.
    Service principals have the added benefit of aligning with the lifecycle of the
    application they are assigned to, meaning that when the application is deleted,
    the associated service principal also becomes obsolete. This prevents lingering,
    unused identities that could be exploited by attackers.'
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务主体**：这代表一个应用程序或服务，适用于需要以编程方式访问资源的场景。服务主体具有与分配给其的应用程序的生命周期保持一致的优势，这意味着当应用程序被删除时，相关的服务主体也变得过时。这防止了可能被攻击者利用的持久、未使用的身份。'
- en: Use a user principal for manual configurations and a service principal for automated,
    programmatic access. This approach secures resources based on roles and minimizes
    potential security gaps.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用用户主体进行手动配置，使用服务主体进行自动化的程序访问。这种方法基于角色保护资源，并最小化潜在的安全漏洞。
- en: By utilizing Azure Key Vault and choosing the right type of security principal
    based on usage patterns, you establish a secure and efficient system for managing
    secrets. Service principals align with the lifecycle of the application, preventing
    orphaned identities, while managed identities provide a streamlined, credential-free
    method for secure access to resources.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用 Azure Key Vault 并根据使用模式选择正确的安全主体类型，您可以建立一个安全高效的系统来管理密钥。服务主体与应用程序的生命周期保持一致，防止孤儿身份，而托管身份提供了一种无凭证的、简化的方法，用于安全访问资源。
- en: Authenticating requests to Azure AI services
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对 Azure AI 服务进行请求身份验证
- en: 'Authenticating requests to Azure AI services is essential for ensuring secure
    and authorized access. Azure offers multiple authentication methods to cater to
    various security needs and application scenarios. Understanding these methods
    will help you choose the most appropriate one for your application:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 对 Azure AI 服务进行请求身份验证对于确保安全和授权访问至关重要。Azure 提供多种身份验证方法，以满足各种安全需求和应用程序场景。了解这些方法将帮助您为您的应用程序选择最合适的方法：
- en: '`Ocp-Apim-Subscription-Key` header. For example, to translate text using Azure
    Translator, use the following:'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Ocp-Apim-Subscription-Key` 头部。例如，要使用 Azure Translator 进行文本翻译，请使用以下命令：'
- en: '[PRE4]'
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: curl -X POST 'https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&from=en&to=de'
    \
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: curl -X POST 'https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&from=en&to=de'
    \
- en: '-H ''Ocp-Apim-Subscription-Key: YOUR_SUBSCRIPTION_KEY''\'
  id: totrans-163
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '-H ''Ocp-Apim-Subscription-Key: YOUR_SUBSCRIPTION_KEY''\'
- en: '-H ''Ocp-Apim-Subscription-Region: YOUR_SUBSCRIPTION_REGION'' \'
  id: totrans-164
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '-H ''Ocp-Apim-Subscription-Region: YOUR_SUBSCRIPTION_REGION'' \'
- en: '-H ''Content-Type: application/json'' \'
  id: totrans-165
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '-H ''Content-Type: application/json'' \'
- en: 'Authorization header in the format Bearer <TOKEN>. To obtain a token, use the
    following:'
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 格式为 Bearer <TOKEN> 的授权头。要获取令牌，请使用以下命令：
- en: '[PRE5]'
  id: totrans-167
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'After obtaining the token, use it in your requests:'
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 获取令牌后，将其用于您的请求：
- en: '[PRE6]'
  id: totrans-169
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-170
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Microsoft Entra** **ID authentication**:'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft Entra ID 身份验证**：'
- en: 'For enhanced security and granular access control, Azure supports authentication
    via Microsoft Entra ID (formerly Azure Active Directory). This method is particularly
    beneficial for complex scenarios requiring Azure **role-based access control**
    (**RBAC**). To use Microsoft Entra ID authentication, follow these steps:'
  id: totrans-172
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为了增强安全性和细粒度的访问控制，Azure 支持通过 Microsoft Entra ID（以前称为 Azure Active Directory）进行身份验证。这种方法特别适用于需要
    Azure **基于角色的访问控制**（**RBAC**）的复杂场景。要使用 Microsoft Entra ID 身份验证，请按照以下步骤操作：
- en: '**Create a resource with a custom subdomain**: Ensure your Azure AI service
    resource has a custom subdomain, as Microsoft Entra ID authentication requires
    it.'
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建具有自定义子域的资源**：确保您的 Azure AI 服务资源具有自定义子域，因为 Microsoft Entra ID 身份验证需要它。'
- en: '**Assign roles**: Assign the appropriate roles (e.g., *Cognitive Services OpenAI
    User*) to your Microsoft Entra ID users or service principals to grant access
    to the Azure AI service.'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分配角色**：将适当的角色（例如，*认知服务 OpenAI 用户*）分配给您的 Microsoft Entra ID 用户或服务主体，以授予对 Azure
    AI 服务的访问权限。'
- en: By understanding these authentication methods, you can ensure secure and efficient
    access to Azure AI services, tailored to your application’s specific requirements.
    Let’s put your knowledge into practice to deepen your understanding.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 通过了解这些身份验证方法，您可以确保对 Azure AI 服务的安全高效访问，以满足您应用程序的具体要求。让我们将您的知识付诸实践，以加深您的理解。
- en: 'Exercise 6: Managing Azure AI services security'
  id: totrans-176
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 6：管理 Azure AI 服务安全
- en: Security is a critical consideration for any application, and as a developer,
    it’s essential to restrict access to resources such as Azure AI services to only
    those who need it.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何应用程序，安全都是一个关键考虑因素，作为开发者，限制对 Azure AI 服务等资源的访问仅限于需要访问的人员至关重要。
- en: Securing key access with Azure Key Vault
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Azure Key Vault 保护密钥访问
- en: To securely manage the Azure AI services key, it’s recommended to store it in
    Azure Key Vault rather than directly in application files or environment variables.
    This approach keeps the key secure while allowing managed identities to access
    it when necessary.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 为了安全地管理 Azure AI 服务的密钥，建议将其存储在 Azure Key Vault 中，而不是直接存储在应用程序文件或环境变量中。这种方法可以保持密钥的安全，同时允许托管身份在必要时访问它。
- en: 'Step 1: Create a key vault and add a secret'
  id: totrans-180
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第一步：创建密钥保管库并添加密钥
- en: 'This step ensures that sensitive keys are not exposed in code or environment
    variables while allowing authorized applications to retrieve them securely. In
    this step, we will retrieve our Azure AI services key and configure Azure Key
    Vault to store it safely:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 此步骤确保敏感密钥不会在代码或环境变量中暴露，同时允许授权应用程序安全地检索它们。在此步骤中，我们将检索我们的Azure AI服务密钥并配置Azure
    Key Vault以安全地存储它：
