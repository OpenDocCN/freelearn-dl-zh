  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: 'Tracking Success Measures: Monitoring Progress and Achieving Objectives'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 跟踪成功指标：监控进展和实现目标
- en: In this chapter, we’ll focus on the importance of defining and tracking **key
    performance indicators** (**KPIs**) to measure progress and ensure your Power
    Platform initiatives reach their objectives. Implementing new technologies such
    as Power Platform isn’t just about deployment; it’s about continuously monitoring
    adoption, gathering user feedback, and making informed decisions to optimize usage
    and results.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将重点关注定义和跟踪**关键绩效指标**（**KPIs**）的重要性，以衡量进展并确保您的Power Platform项目达到其目标。实施新的技术，如Power
    Platform，不仅仅是关于部署；它还涉及持续监控采用情况、收集用户反馈，并做出明智的决策以优化使用和结果。
- en: Tracking progress is an ongoing process that goes beyond hitting initial milestones.
    To truly understand the impact Power Platform has on your organization, it’s important
    to set the right success measures and maintain regular monitoring. This begins
    by gathering baseline data on user knowledge and engagement with Power Platform
    when it is first introduced. From there, regular follow-up surveys and feedback
    will provide insights into how users are adapting, how the platform is being used,
    and where improvements might be necessary.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪进展是一个持续的过程，而不仅仅是达到初始里程碑。为了真正了解Power Platform对您组织的影响，设置正确的成功指标并保持定期监控非常重要。这始于收集用户在Power
    Platform首次引入时的知识水平和参与度的基础数据。从那里，定期的后续调查和反馈将提供用户如何适应、平台如何被使用以及可能需要改进的地方的见解。
- en: User adoption plays a critical role in the success of any technology rollout.
    In this chapter, you’ll learn how to monitor user engagement with Power Platform
    through surveys and feedback channels to understand how the platform is contributing
    to both satisfaction and productivity. Conducting surveys – at the time of launch
    and periodically thereafter – will help you identify how well Power Platform is
    meeting user needs and whether additional training or resources are required.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 用户采用在任何技术推广的成功中扮演着关键角色。在本章中，您将学习如何通过调查和反馈渠道监控用户与Power Platform的互动，以了解该平台如何促进满意度和生产力。在发布时及之后定期进行调查将帮助您了解Power
    Platform满足用户需求的情况，以及是否需要额外的培训或资源。
- en: In this chapter, you’ll further your knowledge about KPIs in terms of how they’re
    defined and tracked to establish success measures, monitor user adoption, and
    gather data on fusion team knowledge and satisfaction.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将进一步了解KPIs的定义和跟踪方法，以建立成功指标、监控用户采用情况，并收集融合团队的知识和满意度数据。
- en: 'We will explore the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨以下主题：
- en: Defining KPIs and tracking them
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义KPIs并跟踪它们
- en: Implementing Power Platform – success measures and adoption
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施Power Platform - 成功指标和采用
- en: Tools to automate success measures
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化成功指标的工具
- en: Gathering maker feedback to assess rollout success
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收集制造商反馈以评估推广成功
- en: Using CoE analytics to assess makers’ knowledge and satisfaction
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用CoE分析来评估制造商的知识和满意度
- en: Community engagement and collaboration
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社区参与和协作
- en: Direct maker feedback loops
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接制造商反馈循环
- en: Defining KPIs and tracking them
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 定义KPIs并跟踪它们
- en: In any Power Platform adoption journey, defining and tracking KPIs is vital
    to measuring progress and ensuring that objectives are achieved effectively. KPIs
    allow organizations to quantify their success, monitor performance against specific
    goals, and make data-driven adjustments to their strategy as needed. Establishing
    clear KPIs and tracking them systematically not only keeps projects aligned with
    business objectives but also fosters accountability, encourages continuous improvement,
    and ensures that resources are allocated effectively.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何Power Platform采用旅程中，定义和跟踪KPIs对于衡量进展和确保有效实现目标至关重要。KPIs使组织能够量化其成功，监控与特定目标的绩效，并在需要时根据数据进行策略调整。建立清晰的KPIs并系统地跟踪它们不仅使项目与业务目标保持一致，而且促进问责制，鼓励持续改进，并确保资源得到有效分配。
- en: The importance of defining KPIs early in the journey
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在旅程早期定义KPIs的重要性
- en: KPIs should be established from the outset – that is, when the organization
    first begins its Power Platform adoption. At this stage, KPIs help define the
    desired outcomes, providing a roadmap for success. Without defined KPIs, organizations
    risk losing focus on their broader strategic objectives and may struggle to measure
    the value of Power Platform initiatives.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: KPIs 应从一开始就建立——也就是说，当组织首次开始其 Power Platform 采用时。在这个阶段，KPIs 有助于定义期望的结果，提供成功的路线图。如果没有定义
    KPIs，组织可能会失去对更广泛战略目标的关注，并且可能难以衡量 Power Platform 初始化项目的价值。
- en: According to Microsoft’s adoption methodology, the first phase of Power Platform
    adoption should involve building a clear strategy and vision that aligns with
    business goals. This step requires identifying the challenges Power Platform aims
    to address, such as streamlining workflows, reducing manual processes, or empowering
    citizen developers. KPIs are instrumental in measuring the success of these strategic
    goals. They ensure that organizations remain focused on key outcomes throughout
    the adoption process.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 根据微软的采用方法，Power Platform 采用的第一阶段应涉及构建与业务目标一致的战略和愿景。这一步骤需要确定 Power Platform 旨在解决的问题，例如简化工作流程、减少手动流程或赋权公民开发者。KPIs
    在衡量这些战略目标的成功方面起着关键作用。它们确保组织在整个采用过程中始终关注关键成果。
- en: 'KPIs should do the following:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: KPIs 应做到以下几点：
- en: '**Align with broader business objectives**: Each KPI must support a specific
    business outcome, such as increased productivity, cost savings, or enhanced customer
    satisfaction'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与更广泛的企业目标保持一致**：每个关键绩效指标（KPI）都必须支持特定的业务成果，例如提高生产力、节省成本或提升客户满意度。'
- en: '**Be measurable and actionable**: KPIs should be based on quantifiable data
    that can be tracked consistently'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可衡量和可操作**：KPIs 应基于可量化数据，这些数据可以持续跟踪。'
- en: '**Drive continuous improvement**: By regularly reviewing KPIs, organizations
    can adapt their strategy to meet evolving needs'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推动持续改进**：通过定期审查 KPIs，组织可以调整其策略以满足不断变化的需求。'
- en: For example, KPIs may measure the number of applications that have been built
    by citizen developers, the percentage of manual processes that have been automated,
    or the increase in overall process efficiency.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，KPIs 可以衡量公民开发者构建的应用程序数量、已自动化的手动流程的百分比或整体流程效率的提高。
- en: Tracking KPIs to ensure progress
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 跟踪 KPIs 以确保进展
- en: Once KPIs have been established, tracking them over time is essential. The Power
    Platform *Adoption Strategy Best Practices guide* ([https://learn.microsoft.com/en-us/power-platform/guidance/adoption/methodology](https://learn.microsoft.com/en-us/power-platform/guidance/adoption/methodology))
    emphasizes the importance of regularly reviewing performance data and progress
    against established goals. KPIs should be monitored using real-time dashboards
    and reports, such as those available in the **Center of Excellence** (**CoE**)
    Starter Kit. This allows organizations to measure ongoing adoption, identify gaps,
    and course-correct if necessary.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立了 KPIs，随着时间的推移跟踪它们是至关重要的。《Power Platform 采用策略最佳实践指南》([https://learn.microsoft.com/en-us/power-platform/guidance/adoption/methodology](https://learn.microsoft.com/en-us/power-platform/guidance/adoption/methodology))
    强调了定期审查绩效数据和与既定目标相比的进展的重要性。应使用实时仪表板和报告来监控 KPIs，例如在**卓越中心**（**CoE**）入门套件中可用的那些。这允许组织衡量持续的采用情况，识别差距，并在必要时进行纠正。
- en: 'The following are some of the key benefits of tracking KPIs:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些跟踪 KPIs 的关键好处：
- en: '**Gain visibility into adoption and usage trends**: Tracking the number of
    active users, application creation rates, and the usage of automation tools provides
    a clear picture of how Power Platform is being adopted across the organization'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**了解采用和使用趋势**：跟踪活跃用户数量、应用程序创建率和自动化工具的使用情况，可以清楚地了解 Power Platform 在整个组织中的采用情况。'
- en: '**The ability to identify success and challenges**: Monitoring KPIs helps teams
    understand where Power Platform initiatives are excelling and where additional
    support or training may be required'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**识别成功和挑战的能力**：监控 KPIs 有助于团队了解 Power Platform 初始化项目在哪些方面表现优异，以及可能需要额外支持或培训的地方。'
- en: '**Data-driven decision-making**: By continuously reviewing performance metrics,
    organizations can make informed decisions about where to invest resources, how
    to improve user experience, and what areas to prioritize for further development'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据驱动决策**：通过持续审查绩效指标，组织可以就资源投资、如何改进用户体验以及优先考虑哪些领域进行进一步发展做出明智的决策。'
- en: The admin best practices for Power Platform highlight how key metrics, such
    as application usage or flow execution, can be tracked and analyzed through the
    CoE Starter Kit, which provides centralized visibility into all Power Platform
    activities. This level of oversight is crucial to understanding how well the platform
    is integrated into day-to-day operations and identifying areas for improvement.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform的行政最佳实践强调了如何通过CoE启动套件跟踪和分析关键指标，例如应用程序使用或流程执行情况，该套件提供了对所有Power
    Platform活动的集中可见性。这种监督水平对于了解平台在日常运营中的集成情况以及确定改进领域至关重要。
- en: Practical steps for defining and tracking KPIs
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义和跟踪关键绩效指标（KPI）的实用步骤
- en: 'To define and track KPIs effectively, organizations can follow these practical
    steps:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地定义和跟踪KPI，组织可以遵循以下实用步骤：
- en: '**Identify key business objectives**: Begin by understanding the broader business
    goals that Power Platform will support. This could include improving operational
    efficiency, reducing costs, or enhancing customer service. For example, a KPI
    might be the time saved by automating manual workflows.'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确定关键业务目标**：首先了解Power Platform将支持更广泛的业务目标。这可能包括提高运营效率、降低成本或提升客户服务。例如，一个KPI可能是通过自动化手动工作流程节省的时间。'
- en: '**Set measurable targets**: For each objective, establish measurable targets.
    KPIs should have a clear baseline (for example, the current state of operations)
    and a target value (for example, reducing the IT backlog by 30% within 6 months).
    These targets should be realistic and achievable but also ambitious enough to
    drive progress.'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**设定可衡量的目标**：为每个目标建立可衡量的目标。KPI应有一个明确的基线（例如，当前运营状态）和一个目标值（例如，在6个月内将IT积压减少30%）。这些目标应该是现实可行且具有挑战性的，足以推动进步。'
- en: '**Use the CoE Starter Kit for tracking**: Implement the CoE Starter Kit, which
    provides pre-built dashboards for tracking KPIs related to application usage,
    maker activity, and adoption rates. The Starter Kit allows organizations to view
    progress in real time and adjust strategies based on performance data.'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用CoE启动套件进行跟踪**：实施CoE启动套件，它提供了用于跟踪与应用程序使用、制作者活动和采用率相关的KPI的预构建仪表板。启动套件允许组织实时查看进度并根据性能数据调整策略。'
- en: '**Monitor KPIs regularly**: Establish a cadence for reviewing KPIs – this could
    be weekly, monthly, or quarterly, depending on the project phase. Regular monitoring
    ensures that organizations can spot trends, address issues promptly, and celebrate
    successes along the way.'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定期监控KPI**：建立审查KPI的节奏——这可能是每周、每月或每季度，具体取决于项目阶段。定期监控确保组织可以发现趋势，及时解决问题，并在过程中庆祝成功。'
- en: '**Adapt KPIs as needed**: As the organization matures in its Power Platform
    adoption, it may be necessary to adjust KPIs to reflect new priorities. For example,
    in the early stages, KPIs might focus on adoption and training, while later KPIs
    could measure innovation or the financial impact of Power Platform solutions.
    The maturity model for Power Platform provides a helpful framework for adjusting
    KPIs as organizations move through different stages of adoption.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**根据需要调整KPI**：随着组织在Power Platform采用方面的成熟，可能需要调整KPI以反映新的优先事项。例如，在早期阶段，KPI可能侧重于采用和培训，而后续的KPI可能衡量创新或Power
    Platform解决方案的财务影响。Power Platform的成熟度模型为组织在采用的不同阶段调整KPI提供了一个有用的框架。'
- en: Key areas to measure with KPIs
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用KPI衡量的关键领域
- en: 'When defining KPIs, it’s important to measure across different areas to get
    a comprehensive view of progress. The *Nurture Best Practices guide* ([https://learn.microsoft.com/en-us/power-platform/guidance/adoption/nurture-best-practices](https://learn.microsoft.com/en-us/power-platform/guidance/adoption/nurture-best-practices))
    emphasizes nurturing users and makers to ensure continued engagement with the
    platform. Here are some examples of key areas that should be tracked with KPIs:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义KPI时，重要的是要跨不同领域进行衡量，以获得全面的进展视图。"培养最佳实践指南"([https://learn.microsoft.com/en-us/power-platform/guidance/adoption/nurture-best-practices](https://learn.microsoft.com/en-us/power-platform/guidance/adoption/nurture-best-practices))强调了培养用户和制作者以确保与平台的持续互动。以下是应使用KPI跟踪的关键领域的一些示例：
- en: '**User adoption**: Track the number of active users and the frequency of application
    creation to measure how engaged employees are with Power Platform'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户采用率**：跟踪活跃用户数量和应用创建频率，以衡量员工与Power Platform的互动程度'
- en: '**Solution impact**: Measure the business outcomes of solutions built using
    Power Platform, such as the time saved from automation or the reduction in manual
    errors'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案影响**：衡量使用 Power Platform 构建解决方案的业务成果，例如自动化节省的时间和减少的手动错误'
- en: '**Innovation**: Monitor the rate at which new apps and automations are being
    created by different teams, as well as how effectively Power Platform is enabling
    innovation within the organization.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新**：监控不同团队创建的新应用程序和自动化的速度，以及 Power Platform 在组织内部促进创新的有效性。'
- en: '**Governance and compliance**: Ensure that governance policies are being followed
    by tracking the number of compliant applications, security incidents, and adherence
    to data protection rules'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理和合规性**：通过跟踪合规应用程序的数量、安全事件和遵守数据保护规则的情况，确保治理政策得到遵守'
- en: Defining and tracking KPIs is crucial for measuring progress and ensuring that
    Power Platform initiatives are aligned with business objectives. By establishing
    clear metrics, organizations can continuously monitor adoption and usage, assess
    their success, and make data-driven decisions that lead to sustained growth and
    improvement. Tools such as the CoE Starter Kit provide valuable insights into
    performance and help organizations stay on course to achieve their Power Platform
    goals. Through effective KPI tracking, organizations can ensure they aren’t just
    adopting Power Platform but using it to drive real business value.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 定义和跟踪关键绩效指标（KPI）对于衡量进度和确保 Power Platform 初始化与业务目标一致至关重要。通过建立清晰的指标，组织可以持续监控采用和利用率，评估其成功，并做出基于数据的决策，以实现持续增长和改进。例如，CoE
    Starter Kit 工具提供了关于性能的宝贵见解，帮助组织保持实现 Power Platform 目标的正确方向。通过有效的 KPI 跟踪，组织可以确保他们不仅采用了
    Power Platform，而且正在利用它来驱动真正的业务价值。
- en: In summary, implementing and leveraging Power Platform effectively necessitates
    setting clear KPIs and success measures, such as tracking user adoption, solution
    impact, and governance compliance. Tools such as the CoE Starter Kit help visualize
    these metrics in real time, allowing organizations to make informed, data-driven
    decisions that align with their business goals and foster continued engagement
    and innovation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，有效地实施和利用 Power Platform 需要设定明确的 KPI 和成功指标，例如跟踪用户采用、解决方案影响和治理合规性。例如，CoE
    Starter Kit 工具可以帮助实时可视化这些指标，使组织能够做出与业务目标一致、基于数据的决策，并促进持续参与和创新。
- en: Implementing Power Platform – success measures and adoption
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施 Power Platform – 成功指标和采用情况
- en: Implementing Power Platform successfully requires more than just deploying the
    tools – it involves establishing clear success measures and continuously monitoring
    user adoption to ensure that the platform is delivering the intended outcomes.
    Success measures provide a roadmap for evaluating how well Power Platform is supporting
    business objectives, whereas monitoring user adoption ensures that the platform
    is being used effectively across the organization.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 成功实施 Power Platform 不仅需要部署工具，还涉及建立明确的成功指标和持续监控用户采用情况，以确保该平台能够实现预期的成果。成功指标为评估
    Power Platform 支持业务目标的有效性提供了路线图，而监控用户采用情况确保该平台在整个组织中被有效使用。
- en: Defining success measures
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义成功指标
- en: Defining success measures is the first step in ensuring that your Power Platform
    implementation aligns with organizational goals. These measures should be closely
    tied to business objectives, such as improving productivity, reducing operational
    costs, enhancing customer satisfaction, or enabling innovation through citizen
    development.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 定义成功指标是确保您的 Power Platform 实施与组织目标一致的第一步。这些指标应与业务目标紧密相关，例如提高生产力、降低运营成本、提高客户满意度或通过公民开发实现创新。
- en: 'When defining success measures, consider these key aspects:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义成功指标时，考虑以下关键方面：
- en: '**Business alignment**: Identify the core business challenges Power Platform
    is expected to address. For example, if the goal is to reduce manual processes,
    a success measure might be the percentage of workflows automated using Power Automate.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**业务一致性**：确定 Power Platform 预期要解决的核心业务挑战。例如，如果目标是减少手动流程，一个成功指标可能是使用 Power Automate
    自动化的工作流百分比。'
- en: '**User engagement**: Consider how success will be measured in terms of user
    adoption. For example, you can track the number of active users, applications
    created, and flows deployed to understand how employees are engaging with Power
    Platform.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户参与度**：考虑用户采用情况如何衡量成功。例如，您可以跟踪活跃用户数量、创建的应用程序和部署的流程，以了解员工如何与Power Platform互动。'
- en: '**Operational efficiency**: Establish clear goals for efficiency gains. A success
    measure could be the reduction in processing time for critical business tasks
    by using Power Apps or Power Automate to automate previously manual workflows.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营效率**：为效率提升设定明确的目标。一个成功指标可能是通过使用Power Apps或Power Automate自动化以前的手动工作流程来减少关键业务任务的处理时间。'
- en: '**Innovation and scalability**: If the goal is to foster innovation, you can
    measure the number of solutions that have been developed by citizen developers
    or the rate at which new features (such as AI Builder or Custom Copilots) are
    adopted.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新和可扩展性**：如果目标是培养创新，您可以衡量公民开发者开发的解决方案数量，以及新功能（如AI Builder或自定义Copilots）的采用率。'
- en: Quantifying success measures
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 量化成功指标
- en: 'Once success measures have been defined, it’s crucial to establish ways to
    quantify them. This involves setting measurable, data-driven goals that can be
    tracked over time to assess progress. Here’s how you can quantify common success
    measures:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了成功指标，建立量化它们的方法至关重要。这涉及到设定可衡量、数据驱动的目标，这些目标可以随着时间的推移进行跟踪，以评估进度。以下是您可以量化常见成功指标的方法：
- en: '**User adoption**: Track metrics such as the number of active users per week
    or month, the number of applications that have been created by non-IT staff (citizen
    developers), and the frequency of application usage. Adoption rates can also be
    measured by user engagement levels in training sessions and the number of makers
    contributing to new solutions.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户采用**：跟踪每周或每月的活跃用户数量、由非IT人员（公民开发者）创建的应用程序数量以及应用程序使用的频率。采用率也可以通过培训课程中的用户参与程度和新解决方案贡献者的数量来衡量。'
- en: '**Process efficiency**: Calculate the time saved by automating processes. For
    example, measure the reduction in manual data entry hours or the improvement in
    processing times for specific tasks after workflows are automated using Power
    Automate.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流程效率**：计算自动化流程节省的时间。例如，通过使用Power Automate自动化工作流程后，可以衡量手动数据输入时间的减少或特定任务的处理时间的改进。'
- en: '**Cost reduction**: If one of the goals is to reduce costs, quantify the savings
    by comparing the cost of developing solutions in-house using Power Platform versus
    purchasing third-party software or custom development services.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本降低**：如果其中一个目标是降低成本，通过比较使用Power Platform内部开发解决方案与购买第三方软件或定制开发服务的成本来量化节省。'
- en: '**Innovation**: Measure innovation by tracking the number of new solutions
    that have been deployed using Power Platform, the departments involved in application
    development, and the introduction of new services or capabilities powered by the
    platform.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新**：通过跟踪使用Power Platform部署的新解决方案数量、参与应用程序开发的部门以及由平台提供的新服务或功能，来衡量创新。'
- en: These measures should be aligned with the **SMART** framework – **Specific**,
    **Measurable**, **Achievable**, **Relevant**, and **Time-bound** – to ensure that
    they provide meaningful insights into the success of your Power Platform initiatives.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标应与**SMART**框架（具体、可衡量、可实现、相关和时限）保持一致，以确保它们能为您提供关于Power Platform项目成功的有意义的见解。
- en: Monitoring user adoption
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控用户采用
- en: Monitoring user adoption is crucial for understanding how well Power Platform
    is being embraced across your organization. Adoption monitoring allows you to
    identify which departments or teams are utilizing the platform effectively and
    where there may be barriers to usage.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 监控用户采用情况对于了解Power Platform在您组织中的普及程度至关重要。采用监控可以帮助您识别哪些部门或团队正在有效利用该平台，以及可能存在的使用障碍。
- en: 'Several metrics can be used to monitor user adoption:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用多个指标来监控用户采用：
- en: '**Number of active users**: Track how many employees are actively using Power
    Apps, Power Automate, and Power BI regularly'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**活跃用户数量**：跟踪有多少员工定期使用Power Apps、Power Automate和Power BI。'
- en: '**App creation and usage**: Measure how many applications are being created
    and how often they’re being used by different teams'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用创建和使用**：衡量不同团队创建的应用程序数量以及它们的使用频率。'
- en: '**Citizen developer participation**: Monitor the number of non-IT users (citizen
    developers) who are creating solutions; this indicates the democratization of
    application development within the organization'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公民开发者参与度**：监控创建解决方案的非 IT 用户（公民开发者）的数量；这表明了组织内部应用开发的民主化。'
- en: '**Training and support engagement**: Track attendance at training sessions,
    the completion of online learning modules, and the number of support tickets related
    to Power Platform'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训和支援参与度**：跟踪培训课程的出勤情况、在线学习模块的完成情况以及与 Power Platform 相关的支持工单数量。'
- en: Tools to automate success measures
  id: totrans-69
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自动化成功措施的工具
- en: Power Platform offers several built-in tools and components that can be used
    to automate the process of tracking success measures and monitoring user adoption.
    Let’s take a look at the key tools available within the platform.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 提供了几个内置工具和组件，可用于自动化跟踪成功措施和监控用户采用的过程。让我们来看看平台内可用的关键工具。
- en: The CoE Starter Kit
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CoE Starter Kit
- en: The **CoE Starter Kit** is an essential tool for organizations looking to monitor
    and govern their Power Platform usage. It provides pre-built solutions that help
    administrators track user adoption, maker activity, application usage, and overall
    platform performance.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**CoE Starter Kit** 是寻求监控和管理其 Power Platform 使用情况的组织的重要工具。它提供预构建的解决方案，帮助管理员跟踪用户采用、制作者活动、应用程序使用和整体平台性能。'
- en: The CoE Starter Kit includes **Power BI Dashboards**, which offer insights into
    the number of applications being created, the frequency of application usage,
    and the departments contributing to new solutions. These dashboards are fully
    customizable and allow for real-time monitoring of user adoption metrics.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: CoE Starter Kit 包含 **Power BI 仪表板**，这些仪表板可以提供有关正在创建的应用程序数量、应用程序使用的频率以及为新的解决方案做出贡献的部门的洞察。这些仪表板完全可自定义，并允许实时监控用户采用指标。
- en: Additionally, the Starter Kit provides governance and compliance tracking, ensuring
    that applications are following the organization’s policies and that data security
    measures are in place.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Starter Kit 还提供治理和合规性跟踪，确保应用程序遵循组织的政策，并且有数据安全措施。
- en: Power BI for custom dashboards
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power BI 用于自定义仪表板
- en: '**Power BI** is a powerful tool within Power Platform that can be used to create
    custom dashboards and reports to track success measures. By integrating data from
    Power Apps, Power Automate, and Power BI itself, organizations can monitor user
    adoption, application performance, and other key metrics.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**Power BI** 是 Power Platform 中的一个强大工具，可用于创建自定义仪表板和报告来跟踪成功措施。通过集成来自 Power Apps、Power
    Automate 和 Power BI 自身的数据，组织可以监控用户采用、应用程序性能和其他关键指标。'
- en: Power BI allows you to visualize adoption trends, such as how quickly different
    departments are adopting Power Platform or how much time has been saved through
    automation.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI 允许您可视化采用趋势，例如不同部门采用 Power Platform 的速度有多快，或者通过自动化节省了多少时间。
- en: You can also set up automated alerts in Power BI to notify stakeholders when
    specific adoption milestones are reached or when KPIs fall below target levels.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以在 Power BI 中设置自动警报，当达到特定的采用里程碑或关键绩效指标低于目标水平时通知利益相关者。
- en: Power Automate for process automation
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power Automate 用于流程自动化
- en: '**Power Automate** can be used to automate the process of tracking certain
    success measures. For example, workflows can be set up to notify administrators
    when a certain number of applications have been created or when a specific user
    adoption threshold has been met.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**Power Automate** 可用于自动化跟踪某些成功措施的过程。例如，可以设置工作流，当创建了一定数量的应用程序或达到特定的用户采用阈值时，通知管理员。'
- en: It can also be used to automate the process of gathering user feedback via surveys.
    For example, a workflow could automatically send out satisfaction surveys to users
    after a new application is deployed, helping to measure user satisfaction and
    application success.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 它还可以用于自动化通过调查收集用户反馈的过程。例如，工作流可以自动在新应用程序部署后向用户发送满意度调查，帮助衡量用户满意度和应用程序的成功。
- en: Microsoft Dataverse for data centralization
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Microsoft Dataverse 用于数据集中化
- en: '**Microsoft Dataverse** serves as the underlying data platform for Power Platform,
    allowing organizations to store and manage their data in one centralized location.
    By using Dataverse, organizations can collect and store data on application usage,
    user engagement, and maker activity, which can then be analyzed and reported on
    through Power BI or other tools.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**Microsoft Dataverse** 作为 Power Platform 的底层数据平台，允许组织在一个集中的位置存储和管理他们的数据。通过使用
    Dataverse，组织可以收集和存储关于应用程序使用、用户参与和制作者活动的数据，然后可以通过 Power BI 或其他工具进行分析和报告。'
- en: This centralized approach to data management ensures that all success measures
    are tracked consistently across the organization, providing a single source of
    truth for decision-makers.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这种数据管理的集中方法确保了组织内所有成功指标的一致跟踪，为决策者提供了一个单一的真实信息来源。
- en: Power Apps Usage Analytics
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power Apps 使用分析
- en: '**Power Apps Usage Analytics** allows administrators to monitor detailed application
    usage patterns, including which users are accessing which applications, how often
    applications are being used, and which applications are driving the most value.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**Power Apps 使用分析** 允许管理员监控详细的应用程序使用模式，包括哪些用户访问了哪些应用程序，应用程序被使用的频率，以及哪些应用程序创造了最大的价值。'
- en: This tool provides valuable insights into application performance, helping organizations
    identify high-value applications and prioritize resources accordingly.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 此工具提供了关于应用程序性能的宝贵见解，帮助组织识别高价值应用程序并相应地优先分配资源。
- en: Defining success measures and monitoring user adoption are critical components
    of any successful Power Platform implementation. By setting clear, quantifiable
    goals that are aligned with business objectives, organizations can measure the
    effectiveness of their Power Platform initiatives and make informed decisions
    to drive continuous improvement. With tools such as the CoE Starter Kit, Power
    BI, Power Automate, and Dataverse, organizations can automate much of the tracking
    and reporting process, ensuring that they stay on track to achieve their objectives
    and maximize the value of their Power Platform investments.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 定义成功指标和监控用户采用是任何成功 Power Platform 实施的关键组成部分。通过设定与业务目标一致的具体、可衡量的目标，组织可以衡量其 Power
    Platform 初始化措施的有效性，并做出明智的决定以推动持续改进。借助 CoE Starter Kit、Power BI、Power Automate
    和 Dataverse 等工具，组织可以自动化大部分跟踪和报告过程，确保他们能够保持实现目标的轨道，并最大化其 Power Platform 投资的价值。
- en: Gathering maker feedback to assess rollout success
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 收集制作者反馈以评估实施成功
- en: A successful Power Platform implementation hinges not only on the deployment
    of tools but also on how well the platform is adopted and utilized by its makers
    – those who build applications, workflows, and other solutions. To assess the
    effectiveness of the rollout, organizations must gather data on their makers’
    knowledge, engagement, and satisfaction. Using multiple channels to collect this
    information provides a more comprehensive understanding of how the platform is
    being adopted, helping organizations identify areas of success and those requiring
    further support or improvement.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 成功实施 Power Platform 不仅取决于工具的部署，还取决于平台被制作者（即构建应用程序、工作流和其他解决方案的人）采用和利用的程度。为了评估实施的有效性，组织必须收集关于制作者的知识、参与度和满意度的数据。通过使用多个渠道收集这些信息，可以更全面地了解平台是如何被采用的，帮助组织识别成功的领域以及需要进一步支持或改进的领域。
- en: This section will explore several channels that organizations can use to gather
    critical data on their makers’ experiences and satisfaction levels with Power
    Platform. These channels range from surveys and usage analytics to community engagement
    and feedback loops, offering diverse insights into both technical and user-focused
    aspects of the platform’s rollout.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将探讨组织可以用来收集关于制作者在 Power Platform 上的体验和满意度关键数据的几个渠道。这些渠道从调查和使用分析到社区参与和反馈循环不等，为平台推广的技术和用户关注方面提供了多样化的见解。
- en: Surveys and feedback forms
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调查和反馈表
- en: 'One of the most direct and effective ways to gather data on makers’ knowledge
    and satisfaction is through **surveys and feedback forms**. These tools allow
    organizations to collect qualitative and quantitative data on how makers are engaging
    with Power Platform, where they face challenges, and how satisfied they are with
    the tools provided:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 收集关于制作者知识和满意度的数据的最直接和有效的方法之一是通过 **调查和反馈表**。这些工具使组织能够收集关于制作者如何与 Power Platform
    互动、他们面临哪些挑战以及他们对提供的工具满意程度的定性和定量数据：
- en: '**Initial knowledge surveys**: At the beginning of the Power Platform rollout,
    organizations can conduct surveys to assess baseline knowledge among makers. This
    helps identify how familiar makers are with the platform’s tools (Power Apps,
    Power Automate, and Power BI) and what specific training or resources might be
    needed to improve their proficiency. For example, a survey might ask makers about
    their experience with low-code/no-code tools and their understanding of automation
    or data integration.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始知识调查**：在Power Platform推广初期，组织可以进行调查以评估制造商的基线知识。这有助于确定制造商对平台工具（Power Apps、Power
    Automate和Power BI）的熟悉程度以及可能需要的特定培训或资源以改善他们的熟练度。例如，调查可能会询问制造商对低代码/无代码工具的经验以及他们对自动化或数据集成的理解。'
- en: '**Post-training feedback**: After delivering training programs, organizations
    can distribute feedback forms to gauge how effective the training was in boosting
    makers’ confidence and competence with Power Platform. Questions might include
    ratings on the quality of the training, whether the content was relevant, and
    how likely makers are to apply what they’ve learned in real-world scenarios.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训后反馈**：在交付培训计划后，组织可以分发反馈表来评估培训在增强制造商对Power Platform的信心和技能方面的有效性。问题可能包括对培训质量的评分、内容的相关性以及制造商将所学内容应用于实际场景的可能性。'
- en: '**Satisfaction surveys**: Periodically, organizations should send out satisfaction
    surveys to gauge makers’ ongoing experience with the platform. These surveys can
    measure satisfaction with application-building tools, the ease of automation,
    and the overall experience of using Power Platform to meet business needs. Satisfaction
    surveys help identify areas for improvement in terms of the platform’s features,
    usability, and support services.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**满意度调查**：定期，组织应发送满意度调查以衡量制造商对平台的持续体验。这些调查可以衡量对应用程序构建工具、自动化易用性和使用Power Platform满足业务需求的整体体验的满意度。满意度调查有助于确定平台功能、可用性和支持服务的改进领域。'
- en: Sample survey for gathering data on maker knowledge and satisfaction
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 收集制造商知识和满意度数据的样本调查
- en: 'To assess Power Platform rollout success effectively, organizations should
    implement surveys and feedback forms that target key aspects of maker knowledge
    and satisfaction. These forms provide insights into how users engage with Power
    Platform, the challenges they face, and their overall satisfaction with the platform’s
    tools and support. Here’s a summary of the key sections and questions that should
    be included in a comprehensive survey:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地评估Power Platform的推广成功，组织应实施针对制造商知识和满意度的关键方面的调查和反馈表。这些表格提供了用户如何与Power Platform互动、他们面临的挑战以及他们对平台工具和支持的整体满意度的见解。以下是应包含在全面调查中的关键部分和问题的摘要：
- en: '**Basic information**: Collect maker details such as name, department, role,
    and experience with Power Platform. This helps categorize feedback based on different
    user groups.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基本信息**：收集制造商的详细信息，如姓名、部门、角色和他们在Power Platform方面的经验。这有助于根据不同的用户群体对反馈进行分类。'
- en: '**Knowledge and training**: Assess makers’ current understanding of Power Platform
    tools (Power Apps, Power Automate, Power BI, and so on) and their confidence in
    using the platform to create solutions. Questions can gauge the effectiveness
    of any formal training that’s been received and identify additional training needs.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识和培训**：评估制造商对Power Platform工具（Power Apps、Power Automate、Power BI等）的当前理解以及他们使用平台创建解决方案的信心。问题可以衡量任何已接受的正式培训的有效性，并确定额外的培训需求。'
- en: '**Usage and adoption**: Gather data on how frequently makers use the platform,
    what types of applications or workflows they have built, and their satisfaction
    with the platform’s features and capabilities. This section helps measure user
    engagement and the practical application of Power Platform within the organization.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用和采用情况**：收集有关制造商使用平台频率的数据，了解他们构建的应用程序或工作流程类型，以及他们对平台功能和能力的满意度。本节有助于衡量用户参与度和Power
    Platform在组织内的实际应用。'
- en: '**Support and satisfaction**: Evaluate the quality of support provided to makers
    and their awareness of internal resources, such as user communities or forums.
    Questions in this section can also capture recommendations for improving support
    services.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持和满意度**：评估提供给制造商的支持质量以及他们对内部资源（如用户社区或论坛）的了解。本节中的问题还可以捕捉改善支持服务的建议。'
- en: '**Overall experience and feedback**: Open-ended questions allow makers to share
    what they like most about Power Platform, suggest improvements, and rate how likely
    they are to recommend the platform to others.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**整体体验和反馈**：开放式问题允许制作者分享他们最喜欢Power Platform的哪些方面，提出改进建议，并评估他们向他人推荐该平台的可能性。'
- en: By gathering data through these surveys, organizations can measure progress
    over time, identify gaps in knowledge or satisfaction, and adapt their training
    and support strategies accordingly. Surveys are especially useful because they
    offer a direct line of communication between makers and administrators, ensuring
    that user feedback is heard and acted upon.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些调查收集数据，组织可以衡量随时间的变化，识别知识或满意度方面的差距，并相应地调整其培训和支援策略。调查特别有用，因为它们为制作者和管理员之间提供了一条直接的沟通渠道，确保用户反馈得到听取并采取行动。
- en: Usage analytics
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用分析
- en: 'Another crucial channel for gathering data on makers’ knowledge and engagement
    is usage analytics. Power Platform provides built-in tools to track and monitor
    how makers are using the platform, offering insight into usage patterns, application-building
    frequency, and adoption trends across the organization:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个收集制作者知识和参与度数据的关键渠道是使用分析。Power Platform提供了内置工具来跟踪和监控制作者如何使用该平台，提供了对使用模式、应用程序构建频率和组织内的采用趋势的洞察：
- en: '**Active makers and application creation rates**: By analyzing data on the
    number of active makers – those who are consistently building applications or
    automating processes – organizations can assess how well Power Platform is being
    adopted. High maker activity suggests that employees are confident in their abilities
    and are integrating the platform into their workflows.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**活跃制作者和应用程序创建率**：通过分析活跃制作者（那些持续构建应用程序或自动化流程的人）的数据，组织可以评估Power Platform的采用情况。高制作者活动表明员工对自己的能力有信心，并将该平台整合到他们的工作流程中。'
- en: '**Application usage and deployment metrics**: Tracking how many applications
    are created and how frequently they’re deployed helps determine the value and
    impact of Power Platform within the organization. For example, a low number of
    deployed applications might indicate that makers are struggling to turn their
    ideas into functional solutions, while high deployment rates suggest successful
    adoption and practical application.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用程序使用和部署指标**：跟踪创建了多少应用程序以及它们被部署的频率，有助于确定Power Platform在组织中的价值和影响。例如，部署的应用程序数量较少可能表明制作者在将想法转化为功能性解决方案方面遇到困难，而高部署率则表明成功采用和实际应用。'
- en: '**Process automation analytics**: Monitoring the usage of automation workflows
    in Power Automate provides insight into how effectively makers are using the platform
    to streamline processes. Metrics such as the number of workflows that have been
    created, executed, and maintained help evaluate whether makers are embracing automation
    as part of their day-to-day operations.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流程自动化分析**：监控Power Automate中自动化工作流的用法，可以了解制作者如何有效地使用平台来简化流程。诸如已创建、执行和维护的工作流数量等指标有助于评估制作者是否将自动化作为其日常运营的一部分。'
- en: The CoE Starter Kit is a powerful tool for collecting and analyzing usage data
    across Power Platform. It provides pre-built dashboards that track active makers,
    application usage, and overall platform adoption. By leveraging these insights,
    organizations can make informed decisions about where to focus further training,
    support, or governance.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: CoE入门套件是一个强大的工具，用于收集和分析Power Platform上的使用数据。它提供了预构建的仪表板，跟踪活跃制作者、应用程序使用和整体平台采用情况。通过利用这些洞察，组织可以就进一步培训、支持或治理的焦点做出明智的决策。
- en: By leveraging these comprehensive usage and adoption metrics, organizations
    can gain a deeper understanding of how effectively their teams are utilizing Power
    Platform. This data-driven approach not only highlights areas of success but also
    uncovers opportunities for targeted interventions.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用这些全面的用途和采用指标，组织可以更深入地了解其团队如何有效地利用Power Platform。这种数据驱动的方法不仅突出了成功领域，还揭示了有针对性的干预措施的机会。
- en: Using CoE analytics to assess makers’ knowledge and satisfaction
  id: totrans-112
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用CoE分析来评估制作者的知识和满意度
- en: The CoE Starter Kit offers a variety of analytics tools and dashboards to help
    organizations gather data on maker activity and satisfaction, providing valuable
    insights to assess the success of Power Platform rollouts. Let’s consider some
    real-life examples of how organizations can leverage these tools to gather and
    analyze data, ensuring that they’re not only measuring adoption but also identifying
    areas for improvement.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: CoE入门套件提供各种分析工具和仪表板，帮助组织收集有关制作者活动和满意度的数据，为评估Power Platform推广的成功提供宝贵见解。让我们考虑一些组织如何利用这些工具收集和分析数据的真实生活示例，确保他们不仅测量采用率，还能确定改进领域。
- en: Monitoring active makers and application usage
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控活跃制作者和应用程序使用情况
- en: '*Scenario*: A large retail organization rolled out Power Platform to improve
    operational efficiency by empowering employees to create applications that automate
    manual processes. The CoE Starter Kit allowed them to track how many employees
    were actively using the platform to create applications and workflows:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家大型零售组织推出了Power Platform，通过赋予员工创建自动化手动流程的应用程序的能力来提高运营效率。CoE入门套件使他们能够跟踪有多少员工正在积极使用该平台创建应用程序和工作流程：'
- en: '**Action**: Using the **Makers Dashboard** within the CoE, the IT department
    monitored metrics such as the **number of active makers** and **total applications
    created**. The dashboard provided insights into which departments were adopting
    the platform and how engaged users were in building solutions.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：在CoE中使用**制作者仪表板**，IT部门监控了诸如**活跃制作者数量**和**创建的总应用程序数量**等指标。仪表板提供了关于哪些部门正在采用该平台以及用户在构建解决方案中的参与度的见解。'
- en: '**Result**: The data showed that while some departments had high maker activity,
    others were lagging. The organization used this insight to target additional training
    sessions in underperforming departments and increase overall adoption. After 3
    months, the number of active makers grew by 25%, indicating a successful increase
    in platform engagement.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：数据显示，尽管一些部门有较高的制作者活动，但其他部门却落后。该组织利用这一洞察力在表现不佳的部门开展额外的培训课程，并提高整体采用率。3个月后，活跃制作者的数量增长了25%，这表明平台参与度的成功提升。'
- en: Tracking application performance and user satisfaction
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 跟踪应用程序性能和用户满意度
- en: '*Scenario*: A financial services company wanted to evaluate how Power Apps
    was being used to improve internal processes, such as customer data management
    and reporting. They needed a way to track application performance and gather user
    feedback to ensure that the applications were delivering the expected value:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家金融服务公司希望评估Power Apps如何被用于改进内部流程，例如客户数据管理和报告。他们需要一种方法来跟踪应用程序性能并收集用户反馈，以确保应用程序能够提供预期的价值：'
- en: '**Action**: The CoE Starter Kit provided **App Analytics**, which tracked application
    usage, execution times, and user feedback. The organization set up custom forms
    that prompted users to provide feedback after interacting with the applications.
    This feedback was automatically logged in the CoE’s database.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：CoE入门套件提供了**应用程序分析**，它跟踪应用程序使用情况、执行时间和用户反馈。该组织设置了自定义表单，提示用户在与应用程序互动后提供反馈。这些反馈自动记录在CoE的数据库中。'
- en: '**Result**: By combining application performance metrics with user satisfaction
    data, the company identified two underperforming applications with poor satisfaction
    ratings. They were able to troubleshoot the issues, make updates to improve user
    experience, and track the impact of these changes. After these improvements, satisfaction
    scores rose by 30%, and application usage increased by 15%.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：通过结合应用程序性能指标与用户满意度数据，公司确定了两个表现不佳且满意度评分较低的应用程序。他们能够解决这些问题，更新以改善用户体验，并跟踪这些变化的影响。在这些改进之后，满意度评分提高了30%，应用程序的使用率增加了15%。'
- en: Measuring the adoption of citizen development
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 衡量公民开发的采用情况
- en: '*Scenario*: A healthcare provider implemented Power Platform to reduce its
    reliance on the IT department for small, day-to-day application development needs.
    The goal was to foster a culture of **citizen development** by encouraging non-technical
    staff to build simple applications:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家医疗保健提供商实施了Power Platform，以减少其对IT部门在小型、日常应用程序开发需求上的依赖。目标是培养一种**公民开发**文化，通过鼓励非技术员工构建简单应用程序：'
- en: '**Action**: The IT team used the **CoE’s Adoption Metrics Dashboard** to track
    the number of citizen developers and their contribution to application development.
    The dashboard provided insights into how many non-technical staff were using Power
    Apps and Power Automate to create solutions for their teams.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：IT团队使用**CoE的采用率仪表板**跟踪公民开发者的数量及其对应用程序开发的贡献。仪表板提供了关于多少非技术员工正在使用Power
    Apps和Power Automate为团队创建解决方案的洞察。'
- en: '**Result**: Initially, the data showed that only 10% of citizen developers
    were actively building applications. To address this, the organization launched
    a dedicated training program and provided additional support. Over the next 6
    months, the number of active citizen developers doubled, and more than 40% of
    applications in production were built by non-IT employees.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：最初，数据显示只有10%的公民开发者正在积极构建应用程序。为了解决这个问题，该组织启动了一个专门的培训计划，并提供了额外的支持。在接下来的6个月里，活跃的公民开发者的数量翻了一番，生产中的超过40%的应用程序都是由非IT员工构建的。'
- en: Gathering insights into user training and support needs
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 收集用户培训和支援需求洞察
- en: '*Scenario*: A manufacturing company introduced Power Automate to streamline
    production workflows and wanted to ensure that employees were well-supported during
    the transition. They needed data on how many employees were using Power Automate
    and where additional training was required:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家制造公司引入Power Automate以简化生产工作流程，并希望在过渡期间确保员工得到良好的支持。他们需要有关多少员工正在使用Power
    Automate以及需要额外培训的地方的数据：'
- en: '**Action**: The CoE Starter Kit’s **Training Dashboard** allowed the company
    to track training participation and feedback. It also tracked which users were
    struggling with specific workflows by monitoring failed automation runs and the
    number of support tickets related to Power Automate.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：CoE入门套件的**培训仪表板**使公司能够跟踪培训参与度和反馈。它还通过监控失败的自动化运行和支持票数来跟踪哪些用户在特定工作流程中遇到困难。'
- en: '**Result**: The data revealed that a particular department was facing high
    failure rates with their automation workflows, which also correlated with low
    training attendance. The organization scheduled targeted follow-up training and
    created support materials for that department. As a result, workflow failures
    dropped by 40%, and employee satisfaction with Power Automate improved.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：数据显示，一个特定部门在自动化工作流程中面临高失败率，这也与低培训出勤率相关。该组织为该部门安排了有针对性的后续培训，并为其创建了支持材料。结果，工作流程失败率下降了40%，员工对Power
    Automate的满意度也有所提高。'
- en: Identifying usage patterns and customizing support
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 识别使用模式和定制支援
- en: '*Scenario*: A global consulting firm deployed Power BI, Power Apps, and Power
    Automate across various locations and wanted to understand usage patterns to ensure
    that each tool was being adopted effectively.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家全球咨询公司已在多个地点部署了Power BI、Power Apps和Power Automate，并希望了解使用模式以确保每个工具都被有效采用。'
- en: 'They also wanted to know whether employees were satisfied with the platform
    or encountering difficulties:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 他们还想知道员工是否对平台满意或遇到困难：
- en: '**Action**: Using the CoE’s **Usage Analytics**, the firm monitored the frequency
    of tool usage, identifying which teams were adopting Power Platform tools and
    which teams weren’t as engaged. They also distributed periodic satisfaction surveys,
    integrated with Power BI, to gather insights on user experience and the effectiveness
    of the tools.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：使用CoE的**使用分析**，该公司监控了工具的使用频率，确定了哪些团队正在采用Power Platform工具，哪些团队参与度不高。他们还定期分发与Power
    BI集成的满意度调查，以收集关于用户体验和工具有效性的洞察。'
- en: '**Result**: The analytics results showed that while Power BI adoption was strong,
    Power Automate was underutilized in certain regions. Feedback from the satisfaction
    surveys revealed that employees in those regions found Power Automate confusing
    and needed more localized training. By customizing the support that was provided
    and providing region-specific workshops, Power Automate adoption increased by
    35% in those locations.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：分析结果显示，尽管Power BI的采用率很高，但在某些地区Power Automate的使用率较低。满意度调查的反馈显示，这些地区的员工觉得Power
    Automate难以理解，并需要更多本地化的培训。通过定制提供的支持并提供特定地区的研讨会，这些地区的Power Automate采用率提高了35%。'
- en: Leveraging the analytics and data visualization tools within the CoE Starter
    Kit provides organizations with a clear view of how Power Platform is being adopted,
    where makers are succeeding, and where challenges exist. By using components such
    as the Makers Dashboard, App Analytics, Adoption Metrics, and Training Dashboards,
    organizations can gather critical data on user engagement and satisfaction. This
    real-time feedback helps tailor support strategies, foster citizen development,
    and ensure that Power Platform rollouts deliver sustained value across the organization.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 利用CoE Starter Kit中的分析和数据可视化工具，为组织提供了Power Platform如何被采用、制作者在哪里成功以及存在哪些挑战的清晰视图。通过使用如制作者仪表板、应用分析、采用指标和培训仪表板等组件，组织可以收集关于用户参与和满意度的关键数据。这种实时反馈有助于调整支持策略、促进公民开发并确保Power
    Platform在整个组织中的部署持续产生价值。
- en: The insights and data that are gathered from these tools not only help in customizing
    training and support but also play a crucial role in enhancing community engagement
    within the organization.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些工具中收集到的见解和数据不仅有助于定制培训和支援，而且在提高组织内部社区参与度方面也发挥着关键作用。
- en: Community engagement and collaboration
  id: totrans-137
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 社区参与和协作
- en: 'Creating a **community of practice** for Power Platform users within the organization
    is another effective channel for gathering feedback and assessing maker satisfaction.
    By fostering collaboration and knowledge-sharing, organizations can provide makers
    with a space to ask questions, share best practices, and offer feedback on their
    experiences with Power Platform:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在组织内部为Power Platform用户建立一个**实践社区**是收集反馈和评估制作者满意度的另一种有效渠道。通过促进协作和知识共享，组织可以为制作者提供一个提问、分享最佳实践和提供他们对Power
    Platform体验反馈的空间：
- en: '**Internal forums or discussion boards**: Setting up internal forums where
    makers can discuss their Power Platform projects, ask for advice, and troubleshoot
    challenges encourages collaboration. Administrators can monitor these discussions
    to identify common pain points or knowledge gaps, as well as areas where makers
    excel. Active engagement in these forums indicates a thriving user community,
    while frequent questions or complaints can signal the need for additional resources
    or training.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部论坛或讨论板**：建立内部论坛，让制作者可以讨论他们的Power Platform项目、寻求建议和解决挑战，这鼓励了协作。管理员可以监控这些讨论，以识别常见的痛点或知识差距，以及制作者表现优异的领域。在这些论坛中的积极参与表明了用户社区的繁荣，而频繁的问题或投诉可能表明需要额外的资源或培训。'
- en: '**Workshops and office hours**: Hosting regular Power Platform workshops or
    office hours provides makers with direct access to platform experts who can answer
    their questions, offer tips, and guide them through complex challenges. Feedback
    gathered during these sessions offers valuable insights into makers’ learning
    needs and satisfaction levels.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研讨会和办公时间**：定期举办Power Platform研讨会或办公时间，为制作者提供直接访问平台专家的机会，他们可以回答他们的问题、提供技巧并指导他们解决复杂挑战。在这些会议期间收集到的反馈为制作者的学习需求和满意度水平提供了宝贵的见解。'
- en: '**User groups and hackathons**: Organizing user groups or hackathons where
    makers can collaborate on Power Platform projects not only fosters innovation
    but also serves as a channel to gather real-time feedback on the platform’s tools
    and features. Observing how makers work together to solve problems using Power
    Platform can reveal both strengths and areas for improvement in the platform’s
    user experience.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户组和黑客马拉松**：组织用户组或黑客马拉松，让制作者能够在Power Platform项目上进行协作，这不仅促进了创新，也成为了收集平台工具和功能实时反馈的渠道。观察制作者如何一起使用Power
    Platform解决问题，可以揭示平台用户体验的优缺点。'
- en: Community engagement provides qualitative data that goes beyond numbers and
    statistics, offering deeper insights into how makers feel about their experiences,
    what motivates them, and how they interact with Power Platform in their daily
    tasks.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 社区参与提供了超越数字和统计数据的定性数据，更深入地了解制作者对其体验的感受、什么激励了他们，以及他们在日常任务中如何与Power Platform互动。
- en: Real-life examples of Power Platform community engagement and collaboration
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power Platform社区参与和协作的实际情况
- en: In this section, we will consider some real-life examples of Power Platform
    community engagement.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨一些Power Platform社区参与的实际情况。
- en: Power Platform user groups and knowledge sharing
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power Platform用户组和知识共享
- en: '*Scenario*: A global insurance company wanted to promote collaboration and
    encourage employees to share best practices for building Power Apps and automating
    workflows. To achieve this, they established an **internal Power Platform user
    group** where employees from different departments could come together to discuss
    their projects, ask questions, and offer advice to their peers:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家全球保险公司希望促进协作并鼓励员工分享构建Power Apps和自动化工作流的最佳实践。为了实现这一目标，他们建立了一个**内部Power
    Platform用户组**，来自不同部门的员工可以聚集在一起讨论他们的项目、提问并获得同事的建议：'
- en: '**Action**: The company set up regular **monthly virtual meetups** where makers
    could present their application-building experiences and share solutions they
    had developed using Power Apps and Power Automate. They also created a dedicated
    **internal forum** on Microsoft Teams where employees could post questions, share
    documentation, and collaborate on application development challenges.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：公司设立了定期的**月度虚拟聚会**，制造者可以在这些聚会上展示他们的应用程序构建经验，并分享他们使用Power Apps和Power
    Automate开发的解决方案。他们还在Microsoft Teams上创建了一个专门的**内部论坛**，员工可以在那里发布问题、分享文档，并就应用程序开发挑战进行协作。'
- en: '**Result**: By fostering this community of practice, the company saw a significant
    increase in application creation across departments since makers began learning
    from one another and sharing solutions that could be replicated or adapted by
    other teams. User satisfaction also improved as employees felt supported by their
    peers and had a space to learn from others’ experiences. This collaborative approach
    helped democratize development, leading to a 40% increase in applications created
    by non-IT staff.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：通过培养这个实践社区，公司看到应用创建量在各部门之间显著增加，因为制造者开始相互学习并分享可以被其他团队复制或适应的解决方案。随着员工感到他们的同事支持他们，并有一个从他人经验中学习的地方，用户满意度也得到了提高。这种协作方法有助于民主化开发，导致非IT员工创建的应用程序数量增加了40%。'
- en: Hackathons to drive innovation and collaboration
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过黑客马拉松推动创新和协作
- en: '*Scenario*: A healthcare organization looking to improve operational efficiency
    through innovation decided to host an annual **Power Platform hackathon**. The
    goal was to bring together makers from various departments so that they could
    collaborate on developing new solutions using Power Apps, Power Automate, and
    Power BI:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家希望通过创新提高运营效率的医疗保健组织决定举办年度**Power Platform黑客马拉松**。目标是汇集来自不同部门的制造者，以便他们能够协作开发使用Power
    Apps、Power Automate和Power BI的新解决方案：'
- en: '**Action**: The organization invited employees with varying levels of experience,
    including beginners, to form cross-functional teams. Each team was tasked with
    identifying a business challenge and building a prototype application or workflow
    to address it. **Mentors** from the IT department and Power Platform champions
    provided guidance throughout the event.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：该组织邀请了不同经验水平的员工，包括初学者，组成跨职能团队。每个团队的任务是确定一个业务挑战，并构建一个原型应用程序或工作流程来解决这个问题。来自IT部门和Power
    Platform倡导者的**导师**在整个活动中提供指导。'
- en: '**Result**: The hackathon not only produced several viable solutions that were
    later adopted within the organization but also boosted maker engagement by encouraging
    collaboration across different departments. The event fostered a strong sense
    of community and excitement around using Power Platform to solve real-world problems.
    After the hackathon, participants reported higher confidence in using Power Platform
    tools and felt more motivated to continue building solutions for their teams.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：黑客马拉松不仅产生了几个可行的解决方案，这些方案后来在组织内部得到采用，而且还通过鼓励不同部门之间的协作，提升了制造者的参与度。该活动促进了社区强烈的归属感和围绕使用Power
    Platform解决现实问题的兴奋感。黑客马拉松之后，参与者报告称在使用Power Platform工具方面信心更高，并且更有动力为他们的团队继续构建解决方案。'
- en: Power Platform CoE office hours and expert support
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power Platform CoE办公时间和专家支持
- en: '*Scenario*: A large retail company implemented Power Platform to streamline
    business processes but noticed that some employees were hesitant to use the platform
    due to limited technical knowledge. To address this, the company’s CoE introduced
    a series of *office hours* where employees could drop in virtually and receive
    expert guidance on Power Platform-related questions or challenges:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '*场景*：一家大型零售公司实施了Power Platform以简化业务流程，但注意到由于技术知识有限，一些员工对使用该平台持谨慎态度。为了解决这个问题，公司的CoE推出了一系列**办公时间**，员工可以虚拟地进入并就Power
    Platform相关的问题或挑战获得专家指导：'
- en: '**Action**: During these weekly office hours, Power Platform experts and experienced
    makers from the CoE made themselves available to answer technical questions, review
    application designs, and provide troubleshooting support. These office hours were
    also an opportunity for makers to share their project ideas and receive feedback
    from peers in a collaborative setting.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动**：在这些每周的办公时间中，Power Platform的专家和来自CoE的经验丰富的制作者们愿意提供技术问题的解答，审查应用程序设计，并提供故障排除支持。这些办公时间也为制作者们提供了一个分享他们的项目想法并从同行那里获得反馈的协作环境。'
- en: '**Result**: These sessions helped to build a sense of community and foster
    collaboration among employees who were using Power Platform. As a result, employees
    were more willing to experiment with the platform and create applications, knowing
    they had access to expert help and peer support when needed. This initiative led
    to increased maker confidence and greater adoption of Power Platform, particularly
    in departments that had previously been slow to adopt the tools.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：这些会议帮助在使用Power Platform的员工之间建立了一种社区感和协作精神。因此，员工们更愿意尝试使用该平台并创建应用程序，因为他们知道在需要时可以获取专家帮助和同行支持。这一举措提高了制作者的信心，并促进了Power
    Platform的更广泛采用，尤其是在之前缓慢采用这些工具的部门。'
- en: Building a strong community of practice for Power Platform users within an organization
    through user groups, hackathons, and office hours fosters collaboration and engagement.
    These initiatives not only provide makers with a space to learn and share best
    practices but also help identify and resolve challenges, leading to a more successful
    and widespread adoption of Power Platform across the organization. By investing
    in community-building activities, organizations can drive innovation and ensure
    makers feel supported and empowered to create impactful solutions.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 通过用户组、黑客马拉松和办公时间在组织内部为Power Platform用户建立一个强大的实践社区，这促进了协作和参与。这些举措不仅为制作者提供了一个学习和分享最佳实践的空间，还有助于识别和解决挑战，从而在组织内更成功、更广泛地采用Power
    Platform。通过投资于社区建设活动，组织可以推动创新，并确保制作者感到受到支持和赋权，以创造有影响力的解决方案。
- en: These sessions not only build community but also lay the groundwork for more
    structured feedback mechanisms. Next, we’ll explore how direct maker feedback
    loops can further enhance innovation and align solutions with user needs.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这些会议不仅构建了社区，还为更结构化的反馈机制奠定了基础。接下来，我们将探讨如何通过直接的制作者反馈循环进一步促进创新并使解决方案与用户需求保持一致。
- en: Direct maker feedback loops
  id: totrans-159
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 直接制作者反馈循环
- en: 'Finally, organizations should implement **feedback loops** that allow makers
    to provide continuous input on their experience with Power Platform. These can
    be automated mechanisms within the platform itself, as well as informal check-ins
    conducted by platform administrators:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，组织应实施允许制作者对其使用Power Platform的体验提供持续反馈的**反馈循环**。这些可以是平台内部的自动化机制，也可以是平台管理员进行的非正式检查：
- en: '**In-tool feedback forms**: Integrating feedback forms directly into Power
    Platform’s interface allows makers to submit feedback while using the platform.
    This can be done through prompts that ask makers to rate their experience with
    a specific feature or suggest improvements. These forms provide real-time feedback
    and can help identify issues as they arise, ensuring a proactive approach to problem-solving.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具内反馈表单**：将反馈表单直接集成到Power Platform的界面中，允许制作者在使用平台时提交反馈。这可以通过提示制作者对特定功能的使用体验进行评分或提出改进建议来完成。这些表单提供实时反馈，并有助于在问题出现时识别问题，确保问题解决的前瞻性方法。'
- en: '**One-on-one check-ins**: Administrators and platform champions can schedule
    regular one-on-one or group check-ins with makers to discuss their ongoing experiences
    with Power Platform. These check-ins offer makers a chance to voice concerns,
    share success stories, and provide insights into how they’re leveraging the platform.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一对一检查**：管理员和平台倡导者可以定期安排与制作者的一对一或小组检查，讨论他们使用Power Platform的持续体验。这些检查为制作者提供了一个表达担忧、分享成功故事以及提供关于他们如何利用平台的见解的机会。'
- en: '**Feedback on feature updates**: When new features are rolled out within Power
    Platform, it’s important to gather feedback on how makers are responding to these
    updates. Are the new features intuitive? Do they improve the maker’s workflow?
    This feedback can guide future development and ensure that the platform continues
    to meet user needs.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关于功能更新的反馈**：当在Power Platform中推出新功能时，收集制作者对这些更新的反馈非常重要。新功能是否直观？它们是否改善了制作者的流程？这些反馈可以指导未来的开发，并确保平台持续满足用户需求。'
- en: Summary
  id: totrans-164
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter emphasized the importance of defining and tracking KPIs to measure
    the success of Power Platform initiatives. Effective KPI tracking ensures that
    Power Platform adoption aligns with business objectives, enabling organizations
    to optimize their strategies and monitor progress. This includes gathering baseline
    data on user engagement, using regular surveys to gauge satisfaction, and applying
    tools such as the CoE Starter Kit for real-time monitoring.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 本章强调了定义和跟踪KPI的重要性，以衡量Power Platform项目的成功。有效的KPI跟踪确保Power Platform的采用与业务目标保持一致，使组织能够优化其战略并监控进度。这包括收集用户参与的基础数据，使用定期调查来衡量满意度，以及应用如CoE启动套件等工具进行实时监控。
- en: Practical steps were provided for setting and tracking KPIs, along with examples
    of how organizations can leverage tools such as Power BI, Power Automate, and
    Dataverse to automate and streamline the process. Additionally, this chapter highlighted
    the value of community engagement and diverse data channels, including maker feedback
    loops, to continuously refine the implementation and drive sustained success across
    the organization.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 提供了设置和跟踪KPI的实用步骤，以及组织如何利用Power BI、Power Automate和Dataverse等工具自动化和简化流程的示例。此外，本章强调了社区参与和多样化的数据渠道的价值，包括制作者反馈循环，以持续改进实施并推动组织内的持续成功。
- en: In the next chapter, we’ll explore how AI-driven copilots are transforming the
    way organizations approach digital transformation. These AI copilots, integrated
    into platforms such as Power Platform, are designed to assist users in building,
    optimizing, and scaling solutions with greater efficiency. By examining the role
    of AI and how it enhances user capabilities, the next chapter will provide insights
    into the future landscape of digital transformation, where intelligent automation
    and machine learning drive innovation and operational excellence.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨AI驱动的副驾驶如何改变组织对待数字化转型的方式。这些AI副驾驶，集成到Power Platform等平台中，旨在以更高的效率协助用户构建、优化和扩展解决方案。通过分析AI的作用以及它如何增强用户能力，下一章将提供对数字化转型未来格局的见解，其中智能自动化和机器学习推动创新和运营卓越。
