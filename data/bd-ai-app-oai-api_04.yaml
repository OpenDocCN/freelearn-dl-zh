- en: <st c="35534">This is how</st> <st c="35546">you can build a payments page that
    includes a form to collect payment information from users.</st> <st c="35641">We
    styled the payments page using the Bulma CSS framework, and the payment processing
    is handled using jQuery and the Stripe API.</st> <st c="35771">The page is divided
    into three columns, each displaying a different payment plan option, and the payment
    form is in the footer of each card.</st> <st c="35912">The Stripe API is used
    to generate a payment button that collects payment information and initiates</st>
    <st c="36012">payment processing.</st>
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="35534">这就是您如何构建一个包含收集用户支付信息的表单的支付页面。</st> <st c="35546">我们使用Bulma CSS框架设计了支付页面，并使用jQuery和Stripe
    API处理支付处理。</st> <st c="35641">页面分为三个列，每列显示不同的支付计划选项，支付表单位于每张卡的页脚中。</st> <st c="35771">Stripe
    API用于生成一个收集支付信息并启动</st> <st c="35801">支付处理</st> <st c="35811">的支付按钮。</st>
- en: <st c="36031">In the next section, you will learn how to create a charge function
    in your application that handles user payments, using the Stripe API, and returns
    a payment</st> <st c="36192">confirmation page.</st>
