  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="36031">在下一节中，您将学习如何使用Stripe API在您的应用程序中创建处理用户支付的收费函数，并返回一个支付</st> <st
    c="36192">确认页面。</st>
