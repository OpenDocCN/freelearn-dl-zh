    <st c="35149">您可以从</st> **<st c="35220">打开方式</st>** <st c="35229">选项中选择 HTML 文件并选择您喜欢的浏览器（见</st>
    *<st c="35243">图 4</st>**<st c="35251">.6</st>*<st c="35253">）。</st> <st c="35257">然后您应该看到一个支付页面，类似于在</st>
