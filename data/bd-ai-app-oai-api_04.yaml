- en: <st c="26725">This was the</st> <st c="26738">final step to add the main backend
    functionality to our Code Bug Fixer application.</st> <st c="26823">In the next
    section, you will learn how to build the</st> `<st c="26876">/charge</st>` <st
    c="26883">page, where users will be redirected when their free</st> <st c="26937">trial
    ends.</st>
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="26725">这是将主要后端功能添加到我们的 Code Bug Fixer 应用程序的</st> <st c="26738">最后一步。</st>
    <st c="26823">在下一节中，您将学习如何构建</st> `<st c="26876">/charge</st>` <st c="26883">页面，当用户的免费</st>
    <st c="26937">试用期结束时，用户将被重定向到该页面。</st>
- en: <st c="26948">Adding payments to a ChatGPT application</st>
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="26948">向 ChatGPT 应用程序添加付款</st>
- en: <st c="26989">In this</st> <st c="26998">section, I will guide you through the
    process of creating the payment page and functions in the Code Bug Fixer.</st>
    <st c="27110">We will create a payments page connected with Stripe to offer users
    three different</st> <st c="27194">subscription plans:</st>
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="26989">在本节中，我将指导您完成创建 Code Bug Fixer 中的付款页面和功能的流程。</st> <st c="27110">我们将创建一个与
    Stripe 连接的付款页面，为用户提供三种不同的</st> <st c="27194">订阅计划：</st>
- en: '**<st c="27213">Monthly plan</st>**<st c="27226">: Users will be billed $5</st>
    <st c="27253">every month</st>'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="27213">月度计划</st>**<st c="27226">：用户每月将被收取 5 美元</st> <st c="27253">费用</st>'
- en: '**<st c="27264">Quarterly plan</st>**<st c="27279">: Users will be billed $12</st>
    <st c="27307">every quarter</st>'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="27264">季度计划</st>**<st c="27279">：用户每季度将被收取 12 美元</st> <st c="27307">费用</st>'
- en: '**<st c="27320">Annual plan</st>**<st c="27332">: Users will be billed $50</st>
    <st c="27360">every year</st>'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**<st c="27320">年度计划</st>**<st c="27332">：用户每年将被收取 50 美元</st> <st c="27360">费用</st>'
- en: <st c="27370">We will also create a confirmation page that will confirm the
    plan that a user has purchased by using a simple statement such as</st> *<st c="27500">You
    have successfully paid $12 for the quarterly plan for unlimited access to the
    Code</st>* *<st c="27587">Bug Fixer.</st>*
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="27370">我们还将创建一个确认页面，该页面将使用如下的简单声明来确认用户已购买的方案：</st> *<st c="27500">您已成功支付
    12 美元用于无限访问 Code</st> * *<st c="27587">Bug Fixer 的季度计划。</st>*
- en: <st c="27597">Next, you will learn how to create the</st> `<st c="27637">payment.html</st>`
    <st c="27649">file.</st>
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="27597">接下来，您将学习如何创建</st> `<st c="27637">payment.html</st>` <st c="27649">文件。</st>
- en: <st c="27655">Building the payments page</st>
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="27655">构建付款页面</st>
- en: <st c="27682">Here, we</st> <st c="27692">will create a complete HTML document
    that includes a form to collect payment information from users.</st> <st c="27793">We
    will use the</st> **<st c="27809">Bulma CSS</st>** <st c="27818">framework to</st>
    <st c="27832">style the page and include</st> **<st c="27859">jQuery</st>** <st
    c="27865">and the</st> <st c="27874">Stripe API to handle the</st> <st c="27899">payment
    processing.</st>
  id: totrans-143
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="27682">在这里，我们将创建一个完整的 HTML 文档，其中包含一个用于从用户收集付款信息的表单。</st> <st c="27692">我们将使用</st>
    **<st c="27809">Bulma CSS</st>** <st c="27818">框架来</st> <st c="27832">美化页面并包含</st>
    **<st c="27859">jQuery</st>** <st c="27865">以及</st> <st c="27874">Stripe API 来处理</st>
    <st c="27899">付款处理。</st>
- en: <st c="27918">The page will be divided into three columns, each displaying a
    different payment plan option.</st> <st c="28013">Each option includes a card
    with a title, subtitle, and description of the plan.</st> <st c="28094">The payment
    form is located in the footer of each card, and it includes hidden input fields
    for the plan type and payment amount.</st> <st c="28224">The Stripe API is used
    to generate a payment button that collects payment information and initiates payment
