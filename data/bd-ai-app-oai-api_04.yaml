- en: <st c="32562">The first</st> `<st c="32573"><div></st>` <st c="32578">element
    with a</st> `<st c="32594">column</st>` <st c="32600">class is responsible for
    creating a card-like element that</st> <st c="32660">presents information about
    the monthly plan offered to the user.</st> <st c="32725">The card contains information
    about the name of the plan, the subscription fee, and what the user can expect
    from</st> <st c="32839">this plan.</st>
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`<st c="32562">第一个</st>` `<st c="32573"><div></st>` `<st c="32578">具有</st>`
    `<st c="32594">列</st>` `<st c="32600">类别的元素</st>` `<st c="32660">负责创建一个类似卡片元素，用于展示提供给用户的月度计划信息。</st>`
    `<st c="32725">该卡片包含计划名称、订阅费用以及用户可以从该计划中期待的内容。</st>`'
- en: <st c="32849">The</st> `<st c="32854"><div></st>` <st c="32859">element with
    a</st> `<st c="32875">card</st>` <st c="32879">class is used to create the card
    that presents information about the monthly subscription plan.</st> <st c="32976">Inside
    the card, the card content is defined with the</st> `<st c="33030">card-content</st>`
    <st c="33042">class.</st> <st c="33050">The card content consists of three paragraphs,
    the first containing the title of the plan,</st> `<st c="33141">Monthly Plan</st>`<st
    c="33153">, the second containing the subscription fee,</st> `<st c="33199">$5
    per month</st>`<st c="33211">, and the third providing a description of the plan,
    which highlights the benefits of subscribing to</st> <st c="33312">the plan.</st>
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`<st c="32849">使用</st>` `<st c="32854"><div></st>` `<st c="32859">具有</st>`
    `<st c="32875">卡片</st>` `<st c="32879">类别的元素</st>` `<st c="32976">用于创建展示月度订阅计划信息的卡片。</st>`
    `<st c="32976">在卡片内部，卡片内容使用</st>` `<st c="33030">card-content</st>` `<st c="33042">类</st>`
    `<st c="33050">定义。</st>` `<st c="33050">卡片内容由三个段落组成，第一个包含计划的标题，</st>` `<st c="33141">月度计划</st>`
    `<st c="33153">，第二个包含订阅费用，</st>` `<st c="33199">$5每月</st>` `<st c="33211">，第三个提供计划的描述，突出订阅该计划的好处。</st>`'
- en: <st c="33321">Inside the footer, a</st> `<st c="33343">form</st>` <st c="33347">element
    is defined, which is used to submit the subscription request to the server.</st>
    <st c="33432">The form’s action attribute is set to</st> `<st c="33470">/charge</st>`<st
    c="33477">, which indicates that the subscription request will be sent to the</st>
    `<st c="33545">/charge</st>` <st c="33552">route on the server.</st> <st c="33574">We
    will build the</st> `<st c="33592">/charge</st>` <st c="33599">page backend function
    later.</st> <st c="33629">This function will ensure that a confirmation is shown
    to the users once a payment plan has</st> <st c="33721">been purchased.</st>
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="33321">在页脚内部，定义了一个</st> `<st c="33343">表单</st>` <st c="33347">元素，该元素用于将订阅请求提交到服务器。</st>
    <st c="33432">表单的 action 属性设置为</st> `<st c="33470">/charge</st>`<st c="33477">，这表示订阅请求将被发送到服务器的</st>
    `<st c="33545">/charge</st>` <st c="33552">路由。</st> <st c="33574">我们将在稍后构建</st>
    `<st c="33592">/charge</st>` <st c="33599">页面的后端功能。</st> <st c="33629">此功能将确保在购买支付计划后向用户显示确认信息。</st>
- en: <st c="33736">The form contains two hidden input fields used to send the plan’s
    name and value.</st> <st c="33819">In this case, the plan’s name is set to</st>
    `<st c="33859">monthly</st>`<st c="33866">, while the amount attribute has a value
    set to</st> `<st c="33914">500</st>`<st c="33917">, which represents the subscription
    amount in cents.</st> <st c="33970">This information will be used to render the</st>
    <st c="34014">confirmation page.</st>
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="33736">表单包含两个隐藏的输入字段，用于发送计划的名称和值。</st> <st c="33819">在这种情况下，计划的名称设置为</st>
    `<st c="33859">monthly</st>`<st c="33866">，而金额属性设置为</st> `<st c="33914">500</st>`<st
    c="33917">，这代表订阅金额（以分计）。</st> <st c="33970">这些信息将被用于渲染</st> <st c="34014">确认页面。</st>
- en: <st c="34032">Finally, a script tag is included inside the form element, which
    loads a Stripe checkout script.</st> <st c="34130">This script is</st> <st c="34145">responsible
    for creating a</st> `<st c="34494">data-locale</st>` <st c="34505">attribute to</st>
    `<st c="34519">auto</st>`<st c="34523">, which ensures that the payment form’s
    language will be automatically set based on the user’s location.</st> <st c="34628">The</st>
    `<st c="34632">data-zip-code</st>` <st c="34645">attribute is set to</st> `<st
    c="34666">false</st>`<st c="34671">, which means that the payment form will not
    require the user to enter their</st> <st c="34748">zip code.</st>
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="34032">最后，在表单元素内部包含了一个脚本标签，该标签加载 Stripe 结账脚本。</st> <st c="34130">此脚本负责创建一个</st>
    `<st c="34494">data-locale</st>` <st c="34505">属性并将其设置为</st> `<st c="34519">auto</st>`<st
    c="34523">，这确保了支付表单的语言将根据用户的地理位置自动设置。</st> <st c="34628">`<st c="34632">data-zip-code</st>`
    <st c="34645">`属性设置为</st> `<st c="34666">false</st>`<st c="34671">，这意味着支付表单将不需要用户输入他们的</st>
    <st c="34748">邮编。</st>
- en: <st c="34757">As you can see in the code snippet, the columns for the quarterly
    and yearly plans are built in the same way as the monthly plan.</st> <st c="34888">The
    only differences are the values for the plan’s name, subtitle, and cost, as well
    as the values for the hidden input fields for the plan and the amount to</st>
    <st c="35046">be charged.</st>
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="34757">如代码片段所示，季度计划和年度计划的列是以与月度计划相同的方式构建的。</st> <st c="34888">唯一的区别是计划的名称、副标题和成本值，以及计划隐藏输入字段和要收费的金额值。</st>
