- en: '[PRE8]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Introduction to the LangChain ecosystem
  id: totrans-57
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LangChain生态系统简介
- en: LangChain was introduced in October 2022 as an open source framework aimed at
    simplifying the development of applications powered by **large language models**
    (**LLMs**). Initially, it provided developers with tools to connect LLMs to external
    data sources and utilities, facilitating the creation of more dynamic and context-aware
    applications.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain于2022年10月推出，是一个开源框架，旨在简化由**大型语言模型**（**LLMs**）驱动的应用程序的开发。最初，它为开发者提供了将LLMs连接到外部数据源和实用工具的工具，从而促进了更动态和上下文感知的应用程序的创建。
- en: Over time, LangChain evolved beyond its original framework into a comprehensive
    ecosystem. This transformation was driven by the growing complexity of AI applications
    and the need for more robust tools to manage the entire lifecycle of LLM-powered
    solutions. Today, LangChain encompasses a suite of components and integrations
    designed to support developers from the initial prototyping phase through to deployment
    and ongoing management.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，LangChain已经从其原始框架演变成为一个全面的生态系统。这种转变是由AI应用的日益复杂性和对更强大的工具的需求所驱动的，这些工具可以管理LLM驱动的解决方案的整个生命周期。今天，LangChain包含一系列组件和集成，旨在支持开发者从初始原型设计阶段到部署和持续管理。
- en: '*![Figure 6.1: LangChain ecosystem](img/B32584_06_1.png)*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '*![图6.1：LangChain生态系统](img/B32584_06_1.png)*'
- en: 'Figure 6.1: LangChain ecosystem'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1：LangChain生态系统
- en: According to the official documentation, the entire LangChain ecosystem allows
    you to build, run, and deploy your AI-powered solutions. Let’s detail these three
    steps a bit more in the light of the preceding figure.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 根据官方文档，整个LangChain生态系统允许您构建、运行和部署您的AI解决方案。让我们根据前面的图示详细说明这三个步骤。
- en: Build – the architectural foundation
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建 – 架构基础
- en: 'At the base of the ecosystem are the foundational open source libraries: LangChain
    and LangGraph.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在生态系统的基础是基础开源库：LangChain和LangGraph。
- en: 'These two components represent the essential building blocks for AI application
    logic:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个组件代表了AI应用逻辑的基本构建块：
- en: LangChain offers modular components such as chains, agents, tools, and memory
    to help developers orchestrate LLM behavior. It focuses on composability and integration,
    making it easy to prototype and scale workflows.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangChain提供了模块化组件，如链、智能体、工具和内存，以帮助开发者编排LLM行为。它侧重于可组合性和集成，使得原型设计和工作流程扩展变得容易。
- en: LangGraph, while newer, introduces a powerful paradigm based on a state machine
    – a computational model that defines a sequence of states and transitions between
    them, governed by events or conditions. It allows developers to construct *multi-agent
    systems* and complex control flows (e.g., looping, branching, conditional reasoning)
    using a graph-based abstraction. This is especially valuable for applications
    that require persistent state and complex planning.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然LangGraph较新，但它引入了一种基于状态机的强大范式——一种定义一系列状态及其之间转换的计算模型，由事件或条件控制。它允许开发者使用基于图的抽象来构建*多智能体系统*和复杂控制流（例如，循环、分支、条件推理）。这对于需要持久状态和复杂规划的应用程序特别有价值。
- en: Note
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: In this chapter, we are going to leverage LangChain as the library, while we
    will use LangGraph in the next chapter while dealing with multi-agent systems.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将利用LangChain作为库，而在下一章处理多智能体系统时，我们将使用LangGraph。
- en: Together, these tools represent the build-time logic and control plane of the
    LangChain ecosystem. They’re open source, ensuring flexibility, transparency,
    and community-driven innovation.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具共同代表了LangChain生态系统的构建时逻辑和控制平面。它们是开源的，确保了灵活性、透明度和社区驱动的创新。
- en: Run – the operational layer
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行 – 运营层
- en: 'Once an agent is built, the next step is deployment. This is where LangGraph
    Platform comes into play. LangGraph Platform provides a managed environment to
    do the following:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦构建了智能体，下一步就是部署。这就是LangGraph平台发挥作用的地方。LangGraph平台提供了一个托管环境来执行以下操作：
- en: Host and deploy LangGraph agents or workflows
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主机和部署LangGraph智能体或工作流程
- en: Enable streaming interactions
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启用流式交互
- en: Integrate human-in-the-loop flows
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 集成人工反馈流程
- en: Handle real-time concurrency and state management
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理实时并发和状态管理
- en: This platform bridges the gap between experimentation and production, abstracting
    away the infrastructure overhead typically associated with running LLM agents
    in cloud environments.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这个平台弥合了实验和生产之间的差距，抽象出了在云环境中运行LLM智能体通常相关的基础设施开销。
- en: 'Complementing the platform is the Integrations layer (also open source), which
    allows developers to connect their agents to the following:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 补充平台的是集成层（也是开源的），它允许开发者将他们的智能体连接到以下内容：
- en: APIs and webhooks (the latter are a way to allow external systems to **receive
    real-time notifications or data** when specific events occur during the execution
    of a LangChain process)
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API和webhooks（后者是一种允许外部系统在LangChain过程的执行期间发生特定事件时**接收实时通知或数据**的方式）
- en: Vector databases and data stores
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 矢量数据库和数据存储
- en: External tools such as calculators, retrieval systems, or third-party services
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 外部工具，如计算器、检索系统或第三方服务
- en: These integrations provide the agent with practical capabilities, allowing it
    to perform meaningful actions based on external data and systems, and we are going
    to cover some of them in the next paragraph.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这些集成为智能体提供了实用功能，使其能够根据外部数据和系统执行有意义的操作，我们将在下一段中介绍其中的一些。
- en: Manage – observability and iteration
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管理 – 可观察性和迭代
- en: Management is often where the success of real-world AI applications is determined.
    In the LangChain ecosystem, this is handled by LangSmith.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 管理往往是现实世界AI应用成功的关键。在LangChain生态系统中，这由LangSmith处理。
- en: 'LangSmith is a commercial platform that addresses these essential needs:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith是一个商业平台，它解决了这些基本需求：
- en: Debugging agent behaviors
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调试智能体行为
- en: Monitoring usage and performance
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控使用情况和性能
- en: Evaluating output quality
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估输出质量
- en: Managing prompts and datasets
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理提示和数据集
- en: Annotation and feedback loops for supervised improvement
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标注和反馈循环以实现监督改进
- en: Unlike traditional logging or APM tools, LangSmith is purpose-built for LLM-native
    applications, providing insight not just into the “what happened” but also the
    “why it happened”—from prompt structure to tool calls and intermediate reasoning
    steps.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统的日志记录或 APM 工具不同，LangSmith 是专门为 LLM 原生应用构建的，不仅提供“发生了什么”的洞察，还提供“为什么发生”的洞察——从提示结构到工具调用和中间推理步骤。
- en: 'By integrating LangSmith into your agent development lifecycle, you ensure
    you can do the following:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将 LangSmith 集成到您的代理开发生命周期中，您确保可以执行以下操作：
- en: Trace failures or unexpected outputs
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪故障或意外输出
- en: Evaluate the effectiveness of prompt versions or tool logic
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估提示版本或工具逻辑的有效性
- en: Continuously refine and optimize the application in production
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续优化生产中的应用
- en: In light of the preceding components, the LangChain ecosystem is no longer just
    a developer-friendly framework – it’s a structured platform for the entire lifecycle
    of AI agents and, more broadly, AI-powered solutions.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 基于前面的组件，LangChain 生态系统不再只是一个面向开发者的框架——它是一个针对 AI 代理整个生命周期以及更广泛的 AI 解决方案的结构化平台。
- en: In the next section, we are going to zoom into some of the pre-build components
    that we can leverage at the “Build” level, and that we are going to use to initialize
    our AI agent.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将深入了解一些在“构建”级别可以利用的预构建组件，以及我们将用于初始化我们的 AI 代理的组件。
- en: Overview of out-of-the-box components
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 现成组件概述
- en: 'LangChain offers a comprehensive suite of pre-built components that facilitate
    the development of sophisticated language model applications. These components
    are organized into four primary categories: **retrieval-augmented generation**
    (**RAG**), storage and indexing, extraction, and agents:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain 提供了一套全面的预构建组件，这些组件有助于开发复杂的语言模型应用。这些组件被组织成四个主要类别：**检索增强生成**（**RAG**）、存储和索引、提取和代理：
- en: '**RAG:** As we explored in previous chapters, RAGenables language models to
    go beyond their static knowledge by dynamically retrieving relevant information
    from external sources—typically document stores or vector databases—before generating
    a response. LangChain provides native support for the full RAG lifecycle:'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RAG**：正如我们在前面的章节中所探讨的，RAG 允许语言模型通过从外部来源（通常是文档存储或向量数据库）动态检索相关信息来超越其静态知识，在生成响应之前。LangChain
    为完整的 RAG 生命周期提供原生支持：'
- en: '**Document ingestion and chunking**: Source materials (such as PDFs, Notion
    pages, HTML, or markdown) are loaded and broken into semantically meaningful chunks
    using flexible TextSplitters. These chunks are more manageable for embedding and
    retrieval.'
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档摄入和分块**：源材料（如 PDF、Notion 页面、HTML 或 markdown）通过灵活的 TextSplitters 加载并分解成语义上有意义的片段。这些片段对于嵌入和检索更易于管理。'
- en: '**Embedding generation**: Each chunk is embedded into a high-dimensional vector
    using embedding models (e.g., OpenAI, Cohere, Hugging Face).'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入生成**：每个片段都使用嵌入模型（例如 OpenAI、Cohere、Hugging Face）嵌入到高维向量中。'
- en: '**Storage in vector databases**: These vectors are stored in pluggable vector
    stores such as **FAISS**, **Chroma**, **Weaviate**, or **Pinecone**, allowing
    for efficient similarity-based retrieval.'
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量数据库中的存储**：这些向量存储在可插拔的向量存储中，如 **FAISS**、**Chroma**、**Weaviate** 或 **Pinecone**，允许基于相似性的高效检索。'
- en: '**Retriever interfaces**: LangChain supports both basic retrievers and advanced
    retrieval strategies such as MultiQueryRetriever, ParentDocumentRetriever, and
    ContextualCompressionRetriever, each designed for use cases with different trade-offs
    in precision, recall, and relevance.'
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检索器接口**：LangChain 支持基本的检索器和高级检索策略，如 MultiQueryRetriever、ParentDocumentRetriever
    和 ContextualCompressionRetriever，每个都针对具有不同精度、召回率和相关性的用例进行设计。'
- en: RAG is crucial for applications such as document Q&A, legal assistants, customer
    support bots, and research copilots—any context where real-time grounding in external
    data is necessary.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: RAG 对于文档问答、法律助手、客户支持机器人以及研究副驾驶等应用至关重要——任何需要实时外部数据定位的场景。
- en: '**Storage and indexing:** Supporting the RAG pipeline is a suite of tools dedicated
    to storage and indexing. These components handle the backend preparation of data,
    ensuring it can be efficiently accessed during retrieval:'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存储和索引**：支持 RAG 管道的工具套件专门用于存储和索引。这些组件处理数据的后端准备，确保在检索时可以高效访问：'
- en: '**Document loaders**: LangChain includes over 50 document loaders for various
    data sources, such as local files, APIs, web pages, Notion databases, Google Docs,
    and more. These loaders standardize content into LangChain’s document format.'
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档加载器**：LangChain 包含超过 50 种针对各种数据源的文档加载器，如本地文件、API、网页、Notion 数据库、Google Docs
    等。这些加载器将内容标准化为 LangChain 的文档格式。'
- en: '**Text splitters**: These split documents based on character count, sentences,
    or recursive heuristics while preserving the logical integrity of the content
    (e.g., keeping paragraphs together or titles connected to content).'
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本分割器**：这些工具根据字符数、句子或递归启发式方法分割文档，同时保持内容的逻辑完整性（例如，保持段落或标题与内容相连）。'
- en: '**Vector stores**: LangChain supports integration with numerous vector databases
    through a common interface. Developers can switch between FAISS, Chroma, Qdrant,
    or Azure Cognitive Search without changing their retrieval logic.'
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量存储**：LangChain 通过通用接口支持与众多向量数据库的集成。开发者可以在 FAISS、Chroma、Qdrant 或 Azure Cognitive
    Search 之间切换，而无需更改他们的检索逻辑。'
- en: '**Metadata and filtering**: Embedded metadata (such as source, date, or topic)
    is stored alongside document chunks, allowing for filtered or hybrid retrieval,
    where both keyword and vector search are combined.'
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**元数据和过滤**：嵌入的元数据（如来源、日期或主题）与文档块一起存储，允许进行过滤或混合检索，其中结合了关键词和向量搜索。'
- en: This layer is foundational to any system that relies on structured or semi-structured
    knowledge access at scale.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这一层是任何依赖大规模结构化或半结构化知识访问的系统的基础。
- en: '**Extraction:** LangChain also provides capabilities for **information extraction**,
    which involves identifying and structuring specific pieces of information from
    unstructured text. This is useful in domains where data needs to be mined from
    documents, chats, or responses and made available in a structured form (e.g.,
    JSON or database records):'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提取**：LangChain 还提供了**信息提取**的能力，这涉及到从非结构化文本中识别和结构化特定的信息片段。这在需要从文档、聊天或响应中挖掘数据并将其以结构化形式（例如
    JSON 或数据库记录）提供的领域中非常有用：'
- en: '**Entity extraction**: Developers can define schemas for named entities or
    key-value pairs, and the language model will extract matching information (e.g.,
    from resumes, invoices, or clinical notes).'
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实体提取**：开发者可以定义命名实体或键值对的模式，语言模型将提取匹配的信息（例如，从简历、发票或临床笔记中提取）。'
- en: '**Custom schema parsers**: Using Pydantic or TypedDict, developers can guide
    the LLM to output data in structured formats, which can then be validated, stored,
    or used downstream.'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自定义模式解析器**：开发者可以使用 Pydantic 或 TypedDict 指导 LLM 输出结构化格式的数据，这些数据随后可以被验证、存储或用于下游应用。'
- en: '**Structured output parsers**: LangChain provides tools to enforce structured
    outputs, reducing the likelihood of hallucinations or formatting errors in sensitive
    use cases.'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化输出解析器**：LangChain 提供了工具来强制执行结构化输出，减少了在敏感用例中出现幻觉或格式错误的可能性。'
- en: Use cases include automated form filling, summarizing meeting notes into CRM
    fields, converting legal text into clause mappings, or extracting timelines from
    event descriptions.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 应用案例包括自动填写表格、将会议记录总结到 CRM 字段中、将法律文本转换为条款映射或从事件描述中提取时间线。
- en: '**Agents:** The agent framework in LangChain introduces a higher level of autonomy
    and flexibility. Unlike static chains, agents can reason over a task, choose which
    tool to use, and adapt based on the outcome of intermediate steps:'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理**：LangChain 中的代理框架引入了更高层次的自主性和灵活性。与静态链不同，代理可以推理任务，选择使用哪个工具，并根据中间步骤的结果进行适应：'
- en: '**Tool abstractions**: Tools are Python functions wrapped with metadata (name,
    description, input schema) that agents can invoke when relevant. LangChain integrates
    with OpenAI’s function/tool-calling capabilities seamlessly.'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具抽象**：工具是带有元数据（名称、描述、输入模式）的 Python 函数，代理在相关时可以调用这些工具。LangChain 与 OpenAI
    的函数/工具调用能力无缝集成。'
- en: '**Toolkits**: Pre-packaged sets of tools are available for common platforms
    such as SQL databases, file systems, Python REPLs, or browser automation. Toolkits
    drastically reduce time to production.'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具集**：为常见平台（如 SQL 数据库、文件系统、Python REPL 或浏览器自动化）提供了预包装的工具集。工具集大大缩短了生产时间。'
- en: '**Agent executors**: These components orchestrate the agent’s reasoning loop,
    track memory, invoke tools, and manage intermediate outputs. Options include ReactAgent,
    OpenAIToolsAgent, and ChatConversationalAgent, depending on the level of structure
    and flexibility required.'
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理执行器**：这些组件编排代理的推理循环，跟踪记忆，调用工具并管理中间输出。选项包括ReactAgent、OpenAIToolsAgent和ChatConversationalAgent，具体取决于所需的层次结构和灵活性。'
- en: '**Multi-tool reasoning**: Agents can perform multi-step tasks by chaining tool
    invocations, interpreting results, and planning the next move—ideal for complex
    workflows such as “find a supplier, check stock, generate a quote.”'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多工具推理**：代理可以通过链式调用工具、解释结果和规划下一步行动来执行多步骤任务——非常适合复杂的工作流程，如“寻找供应商、检查库存、生成报价”。'
- en: LangChain agents can behave like dynamic assistants, orchestrating logic across
    various systems, whether it’s customer support, sales automation, or research
    tasks.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain代理可以像动态助手一样行事，跨各种系统编排逻辑，无论是客户支持、销售自动化还是研究任务。
- en: Even if not exhaustive – and continuously updating over time – the preceding
    list gives you an idea of the “model” behind LangChain pre-built components. In
    fact, these four categories of components reflect LangChain’s commitment to building
    not just LLM wrappers but composable AI systems – and as we have mentioned multiple
    times, modularity and composability are key, especially when building agentic
    systems!
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 即使不是详尽的——并且随着时间的推移不断更新——上述列表也让你对LangChain预构建组件背后的“模型”有一个概念。事实上，这四个组件类别反映了LangChain致力于构建不仅仅是LLM包装器，而是可组合的AI系统——正如我们多次提到的，模块化和可组合性是关键，尤其是在构建代理系统时！
- en: By abstracting away common challenges—such as how to ingest documents, store
    and retrieve knowledge, extract structured data, or reason across tools—LangChain
    enables developers to focus on building intelligent, scalable, and production-ready
    AI solutions with confidence.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 通过抽象化常见的挑战——例如如何摄取文档、存储和检索知识、提取结构化数据或跨工具进行推理——LangChain使开发者能够自信地专注于构建智能、可扩展和现成的AI解决方案。
- en: Now we have all the tools we need to build our first AI agent, let’s code!
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经拥有了构建第一个AI代理所需的所有工具，让我们开始编码吧！
- en: Use case – e-commerce AI agent
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用例 - 电子商务人工智能代理
- en: AI agents are reshaping the way businesses engage with customers—offering personalized,
    real-time assistance that feels conversational yet deeply functional. In the food
    and retail industry, this shift opens up new possibilities for enhancing the customer
    experience, streamlining operations, and building brand loyalty through intelligent
    automation. In this section, we are going to explore a concrete example in this
    industry.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代理正在重塑企业与客户互动的方式——提供个性化、实时且感觉像对话般的功能性帮助。在食品和零售行业，这种转变开辟了增强客户体验、简化运营和通过智能自动化建立品牌忠诚度的新可能性。在本节中，我们将探讨该行业的一个具体例子。
- en: Scenario description
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景描述
- en: 'We’re going to build an AI agent for a real-world scenario: a modern, family-run
    Italian eatery called `Mammachepiada`. This piadineria—named after the expression
    `"Mamma che piada!"`, which loosely translates to `"Wow, what a piadina!"`—has
    recently expanded its business by launching an online shop.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将构建一个针对现实场景的AI代理：一家现代的家庭经营意大利餐馆，名为`Mammachepiada`。这家披萨饼店以表达“Mamma che piada!”命名，该表达大致翻译为“哇，多好的披萨饼啊！”——最近通过推出在线商店扩大了其业务。
- en: 'At its core, `Mammachepiada` is known for freshly made piadine, filled with
    high-quality Italian ingredients: prosciutto crudo, stracchino cheese, grilled
    vegetables, sun-dried tomatoes, and more. But beyond these ready-to-eat meals,
    the shop also sells individual ingredients—such as artisanal cheeses, pickled
    vegetables, and olive oil—for customers who want to recreate the experience at
    home.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，`Mammachepiada` 以新鲜制作的披萨饼而闻名，饼内填充着高质量的意大利食材：生火腿、斯特拉奇诺奶酪、烤蔬菜、晒干的番茄等。但除了这些即食餐点之外，这家店还向想要在家重现体验的顾客出售单个食材——如手工奶酪、腌制蔬菜和橄榄油。
- en: 'The business operates as an e-commerce store where customers can do the following:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 该业务作为一个电子商务商店运营，顾客可以执行以下操作：
- en: Order freshly made piadine and meals for local delivery (within a certain distance)
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 订购新鲜制作的披萨饼和餐点进行本地配送（在一定距离内）
- en: Shop for ingredients and products that are shipped nationwide
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 购买全国范围内配送的食材和产品
- en: 'The goal of this chapter is to create a digital assistant—an AI agent—that
    can help customers interact with the store naturally. Users may want to do any
    of the following:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的目标是创建一个数字助手——人工智能代理，它能帮助客户以自然的方式与商店互动。用户可能想执行以下任何一项：
- en: Check what’s available on the menu
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查菜单上有什么
- en: Ask about product ingredients
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 询问产品成分
- en: Ask about available items in stock
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 询问库存中可用的商品
- en: Get suggestions for piadina pairings
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取piadina搭配建议
- en: Create a customized cart and place orders
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建定制的购物车并下单
- en: The agent will be ready to help with these tasks.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 代理将准备好帮助完成这些任务。
- en: The result will be a friendly, efficient interface that brings *Mammachepiada’s*
    charm into the digital world—bridging tradition with technology, and language
    with action.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 结果将是一个友好、高效的界面，将*Mammachepiada*的魅力带入数字世界——将传统与科技、语言与行动相结合。
- en: We will call our AI agent **AskMamma**.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把我们的AI代理称为**AskMamma**。
- en: In the sections that follow, we’ll walk through how to create this AI agent
    interface step by step, integrating retrieval capabilities, external tools, and
    logic to handle real-world interactions in a way that feels natural to the customer.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将逐步讲解如何创建这个人工智能代理界面，集成检索能力、外部工具和逻辑，以自然的方式处理现实世界的交互。
- en: AskMamma’s building blocks
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AskMamma的构建模块
- en: 'In [*Chapter 1*](Chapter_01.xhtml#_idTextAnchor020), we had an overview of
    the main ingredients of an AI agent:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第一章*](Chapter_01.xhtml#_idTextAnchor020)中，我们概述了人工智能代理的主要成分：
- en: '![Figure 6.2: Anatomy of an AI agent](img/B32584_06_2.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图6.2：人工智能代理的解剖结构](img/B32584_06_2.png)'
- en: 'Figure 6.2: Anatomy of an AI agent'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2：人工智能代理的解剖结构
- en: 'Let’s now further detail them to design AskMamma:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在进一步详细说明它们来设计AskMamma：
- en: '![Figure 6.3: Anatomy of the AskMamma agent](img/B32584_06_3.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![图6.3：AskMamma代理的解剖结构](img/B32584_06_3.png)'
- en: 'Figure 6.3: Anatomy of the AskMamma agent'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.3：AskMamma代理的解剖结构
- en: 'Let’s explore each component shown in *Figure 6.3*:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索*图6.3*中显示的每个组件：
- en: '**UI**: The AI agent will live in the context of the restaurant’s mobile application.
    In this section, we are going to focus on the core components one by one, while
    in the next section, we will see the final result with the Streamlit UI.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**UI**: 人工智能代理将存在于餐厅移动应用程序的上下文中。在本节中，我们将逐一关注核心组件，而在下一节中，我们将通过Streamlit UI看到最终结果。'
- en: '**LLM**: We will use Azure OpenAI GPT-4o, as it offers state-of-the-art reasoning
    capabilities while being optimized for latency—making it ideal for real-time restaurant
    interactions.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM**: 我们将使用Azure OpenAI GPT-4o，因为它提供了最先进的推理能力，同时优化了延迟——使其非常适合实时餐厅交互。'
- en: '**Note**'
  id: totrans-154
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**'
- en: 'Picking an LLM means balancing the following:'
  id: totrans-155
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 选择LLM意味着平衡以下因素：
- en: '**Quality versus cost**: Bigger models such as GPT-4o are smarter but pricier.'
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质量与成本**: 如GPT-4o这样的大模型更智能，但价格也更贵。'
- en: '**Speed versus power**: Faster models respond quickly, but may miss nuance.'
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速度与力量**: 更快的模型响应迅速，但可能错过细微之处。'
- en: '**Context needs**: Longer chats or big documents? Use models with larger context
    windows.'
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文需求**: 长对话或大文档？使用具有更大上下文窗口的模型。'
- en: '**Multimodal**: Go with GPT-4o if your agent needs to see images.'
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态**: 如果您的代理需要查看图像，请选择GPT-4o。'
- en: Choose the model that best fits your app’s needs—not just the biggest one.
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 选择最适合您应用程序需求的模型——不仅仅是最大的一个。
- en: '**System message**: We are instructing the agent to be a helpful AI assistant
    for the Italian restaurant.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统消息**: 我们正在指导代理成为一个有用的AI助手，为意大利餐厅服务。'
- en: '**Orchestration**: We will leverage LangChain for orchestration and LangSmith
    for observability and traceability.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编排**: 我们将利用LangChain进行编排，利用LangSmith进行可观察性和可追溯性。'
- en: '**Memory**: Our agent will be endowed with a short-term memory to keep track
    of the ongoing conversation.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆**: 我们的代理将被赋予短期记忆，以跟踪正在进行的对话。'
- en: '**Knowledge base**: Our agent will know all the relevant certificates and awards
    obtained through the years by the restaurant’s owners.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识库**: 我们的代理将了解餐厅业主多年来获得的所有相关证书和奖项。'
- en: '**Tools**: Beyond the RAG tool mentioned, we will have two further tools:'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具**: 除了提到的RAG工具之外，我们还将有两个额外的工具：'
- en: '**Database tool**: This tool is going to retrieve in-stock items, their prices,
    suppliers, allergens, and other relevant information.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据库工具**: 此工具将检索库存商品、价格、供应商、过敏原和其他相关信息。'
- en: '**Add to cart tool**: This will be an API tool that is going to communicate
    with the backend of the restaurant’s application. In fact, the user’s cart is
    powered by a database, and this tool is going to add items to the DB according
    to the user’s query.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**添加到购物车工具**：这将是一个API工具，将与餐厅应用的后端进行通信。实际上，用户的购物车由数据库驱动，该工具将根据用户的查询向数据库添加项目。'
- en: 'Note that, in this scenario, we are using three different types of tools: an
    unstructured knowledge base and a structured database as retrievers, and API integration.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在这个场景中，我们使用三种不同类型的工具：一个非结构化知识库和一个结构化数据库作为检索器，以及API集成。
- en: '**Note**'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: We are going to treat the knowledge base as a tool in the implementation, leveraging
    the agentic RAG concept explored in [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor086).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把知识库视为实现中的一个工具，利用在[*第五章*](Chapter_05.xhtml#_idTextAnchor086)中探讨的agentic RAG概念。
- en: Let’s now see how to do that in practice.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看如何在实践中实现这一点。
- en: Developing the agent
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开发代理
- en: 'Let’s see how to build the AskMamma agent step by step:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步步地看看如何构建AskMamma代理：
- en: '**Importing libraries and initializing models**: Here, we are going to initialize
    the two models we will need: the LLM, which will act as the brain of the agent
    (Azure OpenAI GPT-4o), and the embedding model that we will use to vectorize and
    index our unstructured PDFs (Azure OpenAI text-embedding-3-large).'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**导入库和初始化模型**：在这里，我们将初始化我们需要的两个模型：LLM，它将作为代理的大脑（Azure OpenAI GPT-4o），以及我们将用于向量化并索引我们的非结构化PDF的嵌入模型（Azure
    OpenAI text-embedding-3-large）。'
- en: '[PRE9]'
  id: totrans-175
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**Initializing the SQL tool**: Here, we are going to leverage one of LangChain’s
    pre-built components, `SQLDatabaseToolkit`. This is a set of tools that can work
    with SQL databases and perform many tasks – including but not limited to inferring
    the schema, running queries, and checking query correctness.'
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初始化SQL工具**：在这里，我们将利用LangChain的一个预构建组件，`SQLDatabaseToolkit`。这是一个可以与SQL数据库协同工作并执行许多任务的工具集——包括但不限于推断模式、运行查询和检查查询正确性。'
- en: 'To initialize the toolkit, you will need an LLM and a DB instance. For the
    latter, we will use a SQLite instance with the following schema:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 要初始化工具包，你需要一个LLM和一个DB实例。对于后者，我们将使用一个具有以下模式的SQLite实例：
- en: '![Figure 6.4: Structure of the restaurant’s database](img/B32584_06_4.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![图6.4：餐厅数据库结构](img/B32584_06_4.png)'
- en: 'Figure 6.4: Structure of the restaurant’s database'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.4：餐厅数据库结构
- en: You can find the DB in the GitHub repository of the book.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在本书的GitHub仓库中找到数据库。
- en: 'Let’s now initialize the toolkit and the first tool of the list:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来初始化工具包和列表中的第一个工具：
- en: '[PRE10]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Here’s the output:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是输出结果：
- en: '[PRE11]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: As you can see, the tool comes with a name (`QuerySQLDatabaseTool`) and a description
    of its capabilities, so that the agent will know when to invoke it.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，该工具附带一个名称（`QuerySQLDatabaseTool`）及其功能描述，这样代理就能知道何时调用它。
- en: '3. **Initializing the add_to_cart tool**: Here, we need to write a proper HTTP
    operation to add items to the backend database of our restaurant’s application.
    To do so, we need to first prepare a DB instance that will host our user’s items
    in the context of a session. In this case, I initialized an empty `db.json` object
    as follows:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **初始化添加到购物车工具**：在这里，我们需要编写一个适当的HTTP操作来将项目添加到我们餐厅应用的后端数据库中。为此，我们首先需要准备一个DB实例，该实例将在会话的上下文中托管用户的物品。在这种情况下，我初始化了一个空的`db.json`对象，如下所示：
- en: '[PRE12]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Before running the agent, we will need to make sure that this DB is online (we
    will run it locally for the purpose of this demonstration).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行代理之前，我们需要确保这个数据库是在线的（我们将在本演示中本地运行它）。
- en: '**Note**'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: 'This DB is different from the SQL DB mentioned in the SQL tool section! Let’s
    clearly distinguish between the two:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据库与SQL工具部分提到的SQL数据库不同！让我们明确地区分两者：
- en: '**SQL DB**: This is the restaurant’s store system of records, where owners
    can keep track of in-stock items, prices, suppliers, and so on.'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '**SQL数据库**：这是餐厅的记录存储系统，业主可以跟踪库存物品、价格、供应商等。'
- en: '**db.json**: This is the DB powering the user’s cart in the context of a session.
    It’s the application database.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '**db.json**：这是在会话上下文中为用户购物车提供动力的数据库。它是应用程序数据库。'
- en: 'Now that we have the cart DB, we can define our tool:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了购物车数据库，我们可以定义我们的工具：
- en: '[PRE13]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'As you can see, we defined our tool with the `@tool` decorator, typical of
    LangChain. Then, we added a name (`add_to_cart`) and a description (in the format
    of `"""docstring"""`). We also specified the two parameters needed for this tool
    to be properly invoked: the name of the item and the relative price; this means
    that the agent will do its best to retrieve these two elements before invoking
    the tool. Finally, the proper “action” is a POST method against the endpoint of
    the live cart DB.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们使用 LangChain 的典型装饰器 `@tool` 定义了我们的工具。然后，我们添加了一个名称（`add_to_cart`）和描述（格式为
    `"""docstring"""`）。我们还指定了此工具正确调用所需的两个参数：物品的名称和相对价格；这意味着代理将尽力在调用工具之前检索这两个元素。最后，“正确的行为”是对实时购物车数据库端点的
    POST 方法。
- en: '4. **Initializing the RAG tool**: Here, we want to ground our agent to some
    context around the restaurant’s food compliance certificates and awards gained
    over the years. These are a couple of examples of paragraphs extracted from the
    provided PDFs:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 4. **初始化 RAG 工具**：在这里，我们希望将我们的代理与餐厅食品合规证书和多年来获得的奖项相关的某些上下文联系起来。以下是从提供的 PDF 中提取的几个段落的示例：
- en: '![Figure 6.5: Snapshots of the food certificates we are going to use as a knowledge
    base](img/B32584_06_5.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.5：我们将用作知识库的食品证书快照](img/B32584_06_5.png)'
- en: 'Figure 6.5: Snapshots of the food certificates we are going to use as a knowledge
    base'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.5：我们将用作知识库的食品证书快照
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI 生成的内容可能不正确。](img/11.png)**快速提示**：需要查看此图像的高分辨率版本吗？在下一代 Packt
    Reader 中打开此书或查看 PDF/ePub 版本。'
- en: '![](img/21.png)**The next-gen Packt Reader** is included for free with the
    purchase of this book. Scan the QR code OR go to packtpub.com/unlock, then use
    the search bar to find this book by name. Double-check the edition shown to make
    sure you get the right one.'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '![下一代 Packt Reader** 包含在此书的购买中。扫描二维码或访问 packtpub.com/unlock，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保您获得正确的版本。](img/21.png)'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/The_next-gen_Packt_Reader_QR_Code.png)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码  AI 生成的内容可能不正确。](img/The_next-gen_Packt_Reader_QR_Code.png)'
- en: To create our tool, we first need to properly vectorize and index our PDFs into
    a vector DB. To do that, we will use some pre-built components in LangChain for
    document processing, and, as a store, we will use a FAISS vector DB.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建我们的工具，我们首先需要将我们的 PDF 文件正确地向量化并索引到向量数据库中。为此，我们将使用 LangChain 中的某些预构建组件进行文档处理，并且作为存储，我们将使用
    FAISS 向量数据库。
- en: '**Definition**'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: '**定义**'
- en: '**Facebook AI Similarity Search** (**FAISS**) is an open source vector database
    and library developed by Meta AI for efficient similarity search and clustering
    of dense vectors. It enables fast retrieval of high-dimensional vectors, making
    it ideal for applications such as semantic search, recommendation systems, and
    LLM-based retrieval.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '**Facebook AI 相似度搜索**（**FAISS**）是由 Meta AI 开发的一个开源向量数据库和库，用于高效地进行密集向量的相似度搜索和聚类。它能够快速检索高维向量，非常适合用于语义搜索、推荐系统和基于
    LLM 的检索等应用。'
- en: Let’s start by initializing our `vectore_store` object.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从初始化我们的 `vectore_store` 对象开始。
- en: '[PRE14]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Then we can leverage LangChain’s libraries to chunk and process our documents:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以利用 LangChain 的库来分块和处理我们的文档：
- en: '[PRE15]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Note that, in this case, we leveraged a text splitter library – CharacterTextSplitter
    – which splits text based on character count. However, LangChain offers several
    types of text splitters to break large documents into smaller, manageable chunks
    before feeding them into a vector store. Some of the most popular include the
    following:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在这种情况下，我们利用了一个文本分割库——CharacterTextSplitter，它根据字符数来分割文本。然而，LangChain 提供了多种类型的文本分割器，可以将大型文档分割成更小的、可管理的块，然后再将它们输入到向量存储中。其中一些最受欢迎的类型包括以下几种：
- en: '`RecursiveCharacterTextSplitter` (recommended): Tries to split on more meaningful
    boundaries (e.g., paragraphs → sentences → words → characters). It recursively
    falls back to smaller units if the chunk is too large.'
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`RecursiveCharacterTextSplitter`（推荐）：尝试在更有意义的边界上进行分割（例如，段落 → 句子 → 单词 → 字符）。如果块太大，它会递归地回退到更小的单元。'
- en: '`TokenTextSplitter`: Splits based on token count (useful for LLMs with strict
    token limits such as OpenAI’s GPT models). Works well for aligning input with
    model context windows.'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`TokenTextSplitter`: 基于标记计数进行分割（适用于具有严格标记限制的LLM，例如OpenAI的GPT模型）。对于将输入与模型上下文窗口对齐非常有效。'
- en: '`NLTKTextSplitter` / `SpacyTextSplitter`: Language-aware splitters that use
    sentence segmentation from NLP libraries. Good for use cases that require more
    syntactic preservation.'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`NLTKTextSplitter` / `SpacyTextSplitter`：使用NLP库中的句子分割进行语言感知的分割器。适用于需要更多句法保留的用例。'
- en: Once we split our documents into manageable chunks and pass them to `vector_store.add_documents()`,
    each chunk is transformed into a high-dimensional vector representation using
    an embedding model.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们将文档分割成可管理的块并将它们传递给`vector_store.add_documents()`，每个块都会使用嵌入模型转换成高维向量表示。
- en: '[PRE16]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'These vectors are then indexed in the vector store, allowing for similarity
    search later on. Here’s an example:'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 这些向量随后在向量存储中索引，以便稍后进行相似度搜索。以下是一个示例：
- en: '[PRE17]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: These embeddings are stored in the vector database along with metadata (e.g.,
    source document ID, position in the original file). When a user asks a question,
    their query is also embedded and compared with the stored vectors to retrieve
    the most relevant chunks.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 这些嵌入存储在向量数据库中，并附带元数据（例如，源文档ID，原始文件中的位置）。当用户提问时，他们的查询也会被嵌入并与存储的向量进行比较，以检索最相关的块。
- en: This process allows the system to “retrieve” knowledge based on **semantic meaning**,
    not just keywords.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程允许系统根据**语义意义**“检索”知识，而不仅仅是关键词。
- en: 'Now we have all the ingredients to create our RAG tool:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经拥有了创建我们的RAG工具的所有成分：
- en: '[PRE18]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: As you can see, the `vector_store` object in LangChain comes with a method (`.as_retriever`)
    that automatically converts it into a retriever object. By doing so, we can create
    our tool with the `create_retriever_tool` function, which, as we have learned
    in many examples, will need a name and a description of the tool’s capabilities.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，LangChain中的`vector_store`对象自带一个方法（`.as_retriever`），它可以将它自动转换为检索对象。通过这样做，我们可以使用`create_retriever_tool`函数创建我们的工具，正如我们在许多示例中学到的，这将需要一个工具名称和工具功能的描述。
- en: 5\. **Initializing the system message**:The last ingredient that we need before
    creating the agent is the system message. In LangChain, we can leverage the `ChatPromptTemplate`
    class, designed to structure prompts for chat-based language models.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 5. **初始化系统消息**：在创建代理之前，我们需要最后一个成分，即系统消息。在LangChain中，我们可以利用专为结构化基于聊天的语言模型提示而设计的`ChatPromptTemplate`类。
- en: 'It has the following key features:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 它具有以下关键特性：
- en: '**Role-based messaging**: Define messages with specific roles to set the context
    and flow of the conversation'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于角色的消息**：定义具有特定角色的消息，以设置对话的上下文和流程。'
- en: '**Dynamic variables**: Incorporate placeholders within messages that can be
    filled with user input or other dynamic data at runtime'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态变量**：在消息中包含占位符，可以在运行时用用户输入或其他动态数据填充。'
- en: '**Context management**: Maintain conversation history and intermediate steps
    using placeholders such as `MessagesPlaceholder`, enabling the AI to generate
    coherent and contextually relevant responses'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文管理**：使用如`MessagesPlaceholder`之类的占位符维护对话历史和中间步骤，使AI能够生成连贯且与上下文相关的响应。'
- en: By using ChatPromptTemplate, you can create dynamic and context-aware prompts
    that incorporate variables and placeholders.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用ChatPromptTemplate，你可以创建动态和上下文感知的提示，这些提示包含变量和占位符。
- en: 'For our AskMamma agent, we will have the following structure:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的AskMamma代理，我们将有以下结构：
- en: '[PRE19]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Let’s break it down into its three main components:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将它分解为其三个主要组件：
- en: '**System message**: This is the instructional message that sets the overall
    behavior and boundaries of the AI.'
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统消息**：这是设置AI整体行为和边界的指导性消息。'
- en: '[PRE20]'
  id: totrans-232
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**MessagesPlaceholder(“chat_history”):** This is a dynamic placeholder that
    inserts the full conversation history (if available) into the prompt, so the AI
    has context about what’s been said already. Note that it is marked `optional=True`,
    so the chat can begin fresh or continue an ongoing session.'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MessagesPlaceholder(“chat_history”)**：这是一个动态占位符，将完整的对话历史（如果可用）插入到提示中，以便AI了解已经说过什么。请注意，它被标记为`optional=True`，因此聊天可以从头开始或继续进行中的会话。'
- en: '**Human message with input placeholder**: This is where the current user message
    gets inserted. The `{input}` placeholder will be replaced at runtime with whatever
    the user just typed (e.g., “Do you have any gluten-free options?”).'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**带有输入占位符的人类消息**：这是当前用户消息被插入的地方。`{input}` 占位符将在运行时被替换为用户刚刚输入的内容（例如，“你们有不含麸质的选项吗？”）。'
- en: '[PRE21]'
  id: totrans-235
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**MessagesPlaceholder(“agent_scratchpad”)**: This is where intermediate agent
    reasoning or tool usage traces are injected during tool-augmented workflows.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MessagesPlaceholder(“agent_scratchpad”)**：这是在工具增强工作流程中注入中间代理推理或工具使用痕迹的地方。'
- en: '**Note**'
  id: totrans-237
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**'
- en: 'This structured format is ideal for agent-based systems where the following
    applies:'
  id: totrans-238
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种结构化格式非常适合基于代理的系统，其中以下条件适用：
- en: You need persistent memory (chat_history)
  id: totrans-239
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要持久化内存（chat_history）
- en: The agent can call tools (such as adding to cart, querying products)
  id: totrans-240
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理可以调用工具（例如添加到购物车、查询产品）
- en: You want to give clear behavioral instructions up front (via the system message)
  id: totrans-241
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你希望一开始就给出清晰的行为指令（通过系统消息）。
- en: It ensures the AI behaves consistently, adapts to context, and performs actions
    like a real assistant—without hallucinating or responding outside the scope of
    what it’s allowed to do.
  id: totrans-242
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这确保了 AI 的行为一致，适应上下文，并像真实助手一样执行动作——不会产生幻觉或超出其允许的范围进行响应。
- en: '6\. **Initializing the agent**: We now have all the ingredients to initialize
    our agent. To do so, we will leverage the `create_openai_tools_agent` pre-built
    function available in LangChain, designed to construct an AI agent that leverages
    OpenAI’s tool-calling capabilities.'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 6. **初始化代理**：我们现在有了初始化代理的所有成分。为此，我们将利用 LangChain 中可用的预构建函数 `create_openai_tools_agent`，该函数旨在构建利用
    OpenAI 工具调用能力的 AI 代理。
- en: '**Definition**'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: '**定义**'
- en: OpenAI’s tool-calling capabilities, formerly known as function calling, empower
    language models to interact with external tools or functions in a structured and
    dynamic manner. In the new landscape of AI agents, tool calling becomes one piece
    of a larger orchestration puzzle, where, as we have mentioned multiple times,
    we are adding an extra layer of intelligence on top of the LLM, so that we empower
    the agent to decide whether to use a tool, select which tool to call, chain tools
    together, plan and execute next actions, and so on. So, while the *mechanics*
    of tool-calling are still present, developers are moving away from writing raw
    tool-calling logic and toward agentic interfaces that handle that reasoning for
    you.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 的工具调用能力，以前称为函数调用，使语言模型能够以结构化和动态的方式与外部工具或函数交互。在人工智能代理的新领域，工具调用成为更大编排谜题的一部分，正如我们多次提到的，我们在
    LLM 上添加了一个额外的智能层，这样我们就可以赋予代理决定是否使用工具、选择调用哪个工具、将工具链在一起、计划并执行后续动作等的能力。因此，尽管工具调用的
    *机制* 仍然存在，开发者们正从编写原始工具调用逻辑转向处理这种推理的代理接口。
- en: 'Let’s initialize it:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们初始化它：
- en: '[PRE22]'
  id: totrans-247
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Now it’s time to test it. Before running our agent, we need to deploy `db.json`
    so that the agent can properly execute the POST request from the `add_to_cart`
    tool if needed. To run your DB, you can execute the following commands in your
    terminal:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候测试它了。在运行我们的代理之前，我们需要部署 `db.json`，这样代理就可以在需要时从 `add_to_cart` 工具正确执行 POST
    请求。要运行你的数据库，你可以在你的终端中执行以下命令：
- en: '[PRE23]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Now your `db.json` is running on your localhost at port `3000` (default port):'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您的 `db.json` 正在您的本地主机上以端口 `3000`（默认端口）运行：
- en: '![Figure 6.6: Application database running as a localhost](img/B32584_06_6.png)'
  id: totrans-251
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.6：作为本地主机运行的应用数据库](img/B32584_06_6.png)'
- en: 'Figure 6.6: Application database running as a localhost'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.6：作为本地主机运行的应用数据库
- en: 'Great, now we can run our agent. To simulate a conversation, I will use a `while`
    loop:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，现在我们可以运行我们的代理了。为了模拟对话，我将使用一个 `while` 循环：
- en: '[PRE24]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'After running the code, I sent the following input (note that I’m sending some
    questions that assume the previous context is preserved to test the short-term
    memory):'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行代码后，我发送了以下输入（请注意，我发送了一些假设保留先前上下文的问题来测试短期记忆）：
- en: “hello”
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “你好”
- en: “which food certificates do you have?”
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “你们有什么食品证书？”
- en: “do you have ricotta cheese in stock?”
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “你们有意大利干酪吗？”
- en: “yes add it to cart”
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “是的，加到购物车”
- en: “and what is the supplier for the item?”
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这个商品是由哪个供应商提供的？”
- en: Let’s see the results. Note that I kept my agent verbose, meaning that we can
    see the intermediate steps and tool output. Following, the output is truncated
    in some intermediate steps, but you can see the whole version in the GitHub repository.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看结果。注意，我保持了代理的详细输出，这意味着我们可以看到中间步骤和工具输出。以下输出在中间步骤中被截断，但您可以在 GitHub 仓库中看到完整版本。
- en: 'To make the following content more readable, I will highlight **User input**,
    **AI output**, and **Reasoning steps**. In between, I’ll add **my comments** to
    highlight some specific agentic patterns that are interesting to keep in mind:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使以下内容更易于阅读，我将突出显示**用户输入**、**AI 输出**和**推理步骤**。在它们之间，我将添加**我的评论**来突出一些值得注意的特定代理模式：
- en: '[PRE25]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '[PRE26]'
  id: totrans-264
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '[PRE27]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '[PRE28]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '[PRE29]'
  id: totrans-267
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: '[PRE30]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Once this tool is executed, if you rerun your db.json server, you will see
    that it has been updated accordingly:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦这个工具被执行，如果你重新运行你的 db.json 服务器，你会看到它已经相应地更新了：
- en: '![Figure 6.7: Application database once it is populated with items](img/B32584_06_7.png)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![图6.7：填充了项目后的应用程序数据库](img/B32584_06_7.png)'
- en: 'Figure 6.7: Application database once it is populated with items'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.7：填充了项目后的应用程序数据库
- en: '[PRE31]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: '[PRE32]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: '[PRE33]'
  id: totrans-274
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'As you can see, the agent was able to do the following:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，代理能够做到以下几点：
- en: Invoke the right tool depending on the user’s request, thanks to the natural
    language description each tool is equipped with
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据用户的请求调用合适的工具，多亏了每个工具配备的自然语言描述
- en: Keep memory in the context of the user session
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在用户会话的上下文中保持记忆
- en: Interact with the user in a conversational way
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以对话方式与用户互动
- en: With three tools only, we were able to enhance the user experience with a powerful
    agent.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 只需三个工具，我们就能够通过一个强大的代理来提升用户体验。
- en: 'However, we are missing one important piece of the puzzle: how do we monitor
    the behavior of our agent? In fact, in real-world scenarios, observability and
    traceability, along with evaluation and continuous improvement, are key elements
    to keep in mind while designing your end-to-end architecture.'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们还缺少一个重要的拼图碎片：我们如何监控代理的行为？实际上，在现实世界的场景中，可观察性、可追溯性，以及评估和持续改进，在设计你的端到端架构时是关键要素。
- en: In the next section, we are going to explore how to do that with a few lines
    of code.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨如何用几行代码来实现这一点。
- en: Observability, traceability, and evaluation
  id: totrans-282
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可观察性、可追溯性和评估
- en: Observability, traceability, and evaluation are critical components in achieving
    these goals. They provide insights into the internal workings of AI agents, facilitate
    debugging, and enable continuous improvement.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 可观察性、可追溯性和评估是实现这些目标的关键组成部分。它们提供了对人工智能代理内部运作的见解，促进了调试，并使持续改进成为可能。
- en: Observability refers to the ability to understand the internal state of a system
    based on its external outputs. In AI agents, this involves monitoring inputs,
    outputs, intermediate processes, and interactions with external tools or APIs.
    Traceability complements observability by providing a detailed record of the agent’s
    decision-making process, including the sequence of actions taken and the rationale
    behind them. Together, they allow developers to pinpoint issues, understand agent
    behavior, and ensure that the system operates as intended.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 可观察性指的是根据系统的外部输出理解系统内部状态的能力。在人工智能代理中，这涉及到监控输入、输出、中间过程以及与外部工具或 API 的交互。可追溯性通过提供代理决策过程的详细记录来补充可观察性，包括采取的动作序列和背后的理由。共同作用，它们使开发者能够定位问题、理解代理行为并确保系统按预期运行。
- en: Evaluation involves assessing the performance of AI agents against predefined
    metrics or benchmarks. This can include accuracy, relevance, coherence, or other
    domain-specific criteria. Regular evaluation helps in identifying areas for improvement,
    validating updates, and ensuring that the agent meets the desired standards. It
    also plays a crucial role in maintaining user trust and satisfaction.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 评估涉及根据预定义的指标或基准来评估人工智能代理的性能。这可能包括准确性、相关性、连贯性或其他特定领域的标准。定期的评估有助于确定改进领域、验证更新并确保代理达到期望的标准。它还在维护用户信任和满意度方面发挥着至关重要的作用。
- en: '**Note**'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: 'Several methodologies can be used to evaluate AI agents, depending on the task
    and context. These include the following:'
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据任务和上下文，可以使用几种方法来评估人工智能代理。以下包括以下内容：
- en: Human-in-the-loop evaluation, where human judges assess the quality or helpfulness
    of an agent’s response.
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工评估，其中人类评判者评估代理响应的质量或有用性。
- en: LLM-as-a-judge, where a trusted model (e.g., GPT-4) scores responses for relevance
    or accuracy.
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM 作为裁判，其中可信模型（例如 GPT-4）对响应进行评分以评估相关性或准确性。
- en: '**Knowledge base** (**KB**) validation, useful for retrieval-augmented systems
    where the correctness of retrieved documents matters.'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识库**（**KB**）验证，对于检索增强系统中的检索文档的正确性很重要。'
- en: Automatic metrics, such as BLEU, ROUGE, or exact match for tasks such as summarization
    or question answering.
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动指标，如 BLEU、ROUGE 或对摘要或问答等任务的精确匹配。
- en: Choosing the right method depends on whether you are evaluating reasoning, factual
    accuracy, or user satisfaction.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 选择正确的方法取决于您是在评估推理、事实准确性还是用户满意度。
- en: However, as AI agents become more complex—capable of reasoning, using tools,
    and maintaining multi-turn memory—the need for robust observability and evaluation
    becomes critical. Unlike traditional software systems, where errors can often
    be traced to a specific line of code or logic branch, AI agents operate within
    probabilistic, dynamic environments. Their decisions depend not only on input
    data, but also on prompt structure, retrieved context, tool interactions, and
    previous dialogue turns. This makes debugging and performance assessment inherently
    more difficult. To address this, tools such as **LangSmith** have emerged, offering
    a structured way to monitor, trace, and evaluate agent behavior in real time.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着 AI 代理变得更加复杂——能够推理、使用工具并保持多轮记忆——对强大可观察性和评估的需求变得至关重要。与传统的软件系统不同，其中错误通常可以追溯到特定的代码行或逻辑分支，AI
    代理在概率性和动态环境中运行。他们的决策不仅取决于输入数据，还取决于提示结构、检索的上下文、工具交互和之前的对话轮次。这使得调试和性能评估本质上更加困难。为了解决这个问题，像
    **LangSmith** 这样的工具应运而生，提供了一种结构化的方式来实时监控、跟踪和评估代理行为。
- en: LangSmith – part of the LangChain ecosystem – is a platform designed to enhance
    observability, traceability, and evaluation in AI applications. It offers tools
    for logging and visualizing agent interactions, analyzing performance metrics,
    and conducting systematic evaluations.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith – LangChain 生态系统的一部分 – 是一个旨在增强 AI 应用程序的可观察性、可追溯性和评估的平台。它提供用于记录和可视化代理交互、分析性能指标和进行系统评估的工具。
- en: 'Key features of LangSmith include the following:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith 的关键特性包括以下内容：
- en: '**Execution tracing**: Visualize the agent’s step-by-step decisions, including
    inputs, outputs, and tool usage'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行跟踪**：可视化代理的逐步决策，包括输入、输出和工具使用'
- en: '**Performance insights**: Monitor key stats such as latency, token count, and
    error patterns to optimize your system'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能洞察**：监控关键统计数据，如延迟、令牌计数和错误模式，以优化您的系统'
- en: '**Flexible evaluation**: Run structured evaluations with built-in or custom
    logic to assess response quality'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活的评估**：运行具有内置或自定义逻辑的结构化评估，以评估响应质量'
- en: '**Prompt versioning**: Track, compare, and iterate on prompts to refine agent
    behavior over time'
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示版本控制**：跟踪、比较和迭代提示，以随着时间的推移改进代理行为'
- en: '**Collaboration-friendly**: Share runs, feedback, and evaluations with your
    team to support joint development'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协作友好**：与您的团队共享运行、反馈和评估以支持联合开发'
- en: LangSmith integrates seamlessly with various AI frameworks (not limited to LangChain!),
    providing a unified interface for monitoring and improving AI agents.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith 与各种 AI 框架无缝集成（不仅限于 LangChain！），提供了一个统一的接口来监控和改进 AI 代理。
- en: Let’s see it in practice.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看实际应用。
- en: 'The first step is that of creating an API key on the LangSmith settings page
    at the following link: [https://smith.langchain.com/settings](https://smith.langchain.com/settings).'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是在以下链接的 LangSmith 设置页面上创建 API 密钥：[https://smith.langchain.com/settings](https://smith.langchain.com/settings)。
- en: '![Figure 6.8: LangSmith admin portal](img/B32584_06_8.png)'
  id: totrans-304
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.8：LangSmith 管理门户](img/B32584_06_8.png)'
- en: 'Figure 6.8: LangSmith admin portal'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.8：LangSmith 管理门户
- en: Note that, if you don’t have an account already, you will be asked to register
    (it’s free).
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果您还没有账户，您将被要求注册（这是免费的）。
- en: 'Then, you can install the LangSmith dependencies:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您可以安装 LangSmith 依赖项：
- en: '[PRE34]'
  id: totrans-308
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Set up your environment with your variables. In our case, as we are demonstrating
    the agent in a Jupyter notebook, I’ll use the os module to initialize my variables
    directly while creating my LangSmith client:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 使用您的变量设置您的环境。在我们的案例中，因为我们在一个 Jupyter 笔记本中演示代理，我将使用 os 模块直接初始化我的变量，同时创建我的 LangSmith
    客户端：
- en: '[PRE35]'
  id: totrans-310
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Now we have all the ingredients to initialize a `LangChainTracer` object, a
    specialized callback handler in LangChain designed to capture detailed execution
    traces of your application’s components—such as chains, tools, and language model
    interactions—and send this information to LangSmith.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经拥有了初始化 `LangChainTracer` 对象的所有要素，这是一个 LangChain 中的专用回调处理程序，旨在捕获应用程序组件（如链、工具和语言模型交互）的详细执行跟踪，并将此信息发送到
    LangSmith。
- en: '[PRE36]'
  id: totrans-312
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: As you can see, `LangChainTracer` is initialized with the client and an optional
    `project_name` parameter – this will mark the folder where our logs will be saved
    and analyzed. This tracer hooks into LangChain’s execution flow, capturing events
    such as the start and end of chains, tool invocations, and language model calls.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，`LangChainTracer` 使用客户端和一个可选的 `project_name` 参数初始化 – 这将标记我们的日志将被保存和分析的文件夹。此跟踪器挂钩到
    LangChain 的执行流程中，捕获事件，如链的开始和结束、工具调用和语言模型调用。
- en: 'The tracer is the only additional element we will need to add to our existing
    agent. We can pass it as a config parameter when invoking our agent as follows:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪器是我们需要添加到现有代理的唯一附加元素。我们可以在调用代理时将其作为配置参数传递，如下所示：
- en: '[PRE37]'
  id: totrans-315
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: This configuration ensures that each step of the agent’s execution is logged
    to LangSmith, allowing you to visualize the sequence of operations, inspect inputs
    and outputs, and identify any errors or performance bottlenecks.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 此配置确保代理执行的每一步都会记录到 LangSmith，让您能够可视化操作序列，检查输入和输出，并识别任何错误或性能瓶颈。
- en: 'For example, once we run our agent, we will see a new project initialized on
    our LangSmith dashboard:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一旦我们运行我们的代理，我们将在 LangSmith 仪表板上看到一个新的项目被初始化：
- en: '![Figure 6.9: LangSmith’s tracing projects](img/B32584_06_9.png)'
  id: totrans-318
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.9：LangSmith 的跟踪项目](img/B32584_06_9.png)'
- en: 'Figure 6.9: LangSmith’s tracing projects'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.9：LangSmith 的跟踪项目
- en: 'We can already see interesting statistics such as error rate, total cost, number
    of runs, and others. Let’s now get more details from the `AskMamma` project overview:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经可以看到一些有趣的统计数据，如错误率、总成本、运行次数等。现在让我们从 `AskMamma` 项目概述中获取更多详细信息：
- en: '![Figure 6.10: LangSmith’s project overview](img/B32584_06_10.png)'
  id: totrans-321
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.10：LangSmith 的项目概述](img/B32584_06_10.png)'
- en: 'Figure 6.10: LangSmith’s project overview'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.10：LangSmith 的项目概述
- en: 'Here, you can see three main sources of information:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，您可以查看三个主要的信息来源：
- en: '**Runs**: A run is a single interaction with the agent. For example, if the
    user types “Hi,” that’s a run.'
  id: totrans-324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**运行**：运行是与代理的单次交互。例如，如果用户输入“Hi”，那就是一个运行。'
- en: 'Under each run, we can explore many details about the agent’s activity to answer
    questions. For example, in the run when we asked “which food certificates do you
    have?”, the agent took several steps, and we can have visibility of all of them
    in LangSmith:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个运行下，我们可以探索关于代理活动的许多细节来回答问题。例如，在我们询问“你有哪些食品证书？”的运行中，代理执行了几个步骤，我们可以在 LangSmith
    中查看所有这些步骤：
- en: '![Figure 6.11: LangSmith’s run overview](img/B32584_06_11.png)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.11：LangSmith 的运行概述](img/B32584_06_11.png)'
- en: 'Figure 6.11: LangSmith’s run overview'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.11：LangSmith 的运行概述
- en: 'We can also inspect those runs that failed:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以检查那些失败的运行：
- en: '![Figure 6.12: LangSmith run steps overview](img/B32584_06_12.png)'
  id: totrans-329
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.12：LangSmith 运行步骤概述](img/B32584_06_12.png)'
- en: 'Figure 6.12: LangSmith run steps overview'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.12：LangSmith 运行步骤概述
- en: In this case, the reason is that, when invoking the `add_to_cart` tool, the
    agent could not proceed further as the database was offline.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，原因是，在调用 `add_to_cart` 工具时，由于数据库离线，代理无法进一步执行。
- en: '2\. **Threads**: A thread can be defined as a session. Threads are marked by
    unique identifiers that you can initialize as names. For example, in our scenario,
    we initialized a nthread called `<foo>`:'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **线程**：线程可以定义为会话。线程由唯一的标识符标记，您可以将其初始化为名称。例如，在我们的场景中，我们初始化了一个名为 `<foo>` 的线程：
- en: 'In fact, you can see this thread logged in LangSmith:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，您可以在 LangSmith 中看到这个线程的记录：
- en: '![Figure 6.13: LangSmith’s thread overview](img/B32584_06_13.png)'
  id: totrans-334
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.13：LangSmith 的线程概述](img/B32584_06_13.png)'
- en: 'Figure 6.13: LangSmith’s thread overview'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.13：LangSmith 的线程概述
- en: 'Threads help you organize your runs and have a higher-level view of what’s
    happening behind the scenes of your agent:'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 线程可以帮助您组织运行，并从更高层次查看您的代理背后的情况：
- en: '![Figure 6.14: LangSmith thread tracing overview](img/B32584_06_14.png)'
  id: totrans-337
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.14：LangSmith 线程跟踪概述](img/B32584_06_14.png)'
- en: 'Figure 6.14: LangSmith thread tracing overview'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.14：LangSmith 线程跟踪概述
- en: '3\. **Monitor**: Here, you can some useful graphs for a 360-degree view of
    your agent, including trace count, LLM call count, success rates, and so on:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **监控**：在这里，你可以看到一些有用的图表，以获得对代理的360度视图，包括跟踪计数、LLM调用计数、成功率等：
- en: '![Figure 6.15: LangSmith’s monitoring dashboards](img/B32584_06_15.png)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![图6.15：LangSmith的监控仪表板](img/B32584_06_15.png)'
- en: 'Figure 6.15: LangSmith’s monitoring dashboards'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.15：LangSmith的监控仪表板
- en: When it comes to evaluation, AI agents and, more broadly, LLM-powered applications
    cannot rely on traditional machine learning evaluators, such as accuracy, false-positive
    rate, ROC curve, and more. In fact, AI outputs are, by design, conversational,
    meaning that we need new tools and techniques to assess the performance of our
    AI-powered solution.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到评估时，AI代理和更广泛的LLM驱动的应用不能依赖于传统的机器学习评估器，如准确率、假阳性率、ROC曲线等。事实上，AI输出是设计为对话式的，这意味着我们需要新的工具和技术来评估我们AI驱动的解决方案的性能。
- en: 'Typically, to assess the quality of an LLM or an agent pipeline, there are
    **three main components** you work with:'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，为了评估LLM或代理管道的质量，你有**三个主要组件**需要处理：
- en: '**Dataset**:This is the collection of test cases—the inputs and, optionally,
    expected outputs—that your model or agent will be evaluated on. Think of it as
    your ground truth or benchmark set.'
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据集**：这是测试用例的集合——包括输入和可选的预期输出，你的模型或代理将在这个集合上被评估。将其视为你的基准或参考集。'
- en: '**Target function**: This is the actual thing you want to test – in our case,
    the AI agent’s output. When you run an evaluation, LangSmith will pass each dataset
    input to this target function and capture the output—just like automated test
    execution. The output will then be compared to the expected output or assessed
    independently, depending on the evaluator you choose.'
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**目标函数**：这是你想要测试的实际事物——在我们的案例中，是AI代理的输出。当你运行一个评估时，LangSmith将把每个数据集输入传递给这个目标函数并捕获输出——就像自动测试执行一样。然后，输出将与预期输出进行比较或根据你选择的评估器独立评估。'
- en: '**Evaluator**: Evaluators are used to judge the quality of the target function’s
    output. They can be LLM-based evaluators, string metrics such as BLEU or ROUGE,
    or traditional metrics such as accuracy (in case we are using LLMs for tasks such
    as classification or prediction).'
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**评估器**：评估器用于判断目标函数输出的质量。它们可以是基于LLM的评估器，字符串指标如BLEU或ROUGE，或传统的指标如准确率（如果我们使用LLM进行分类或预测等任务）。'
- en: '**Definition**'
  id: totrans-347
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**定义**'
- en: '**BLEU** (or **Bilingual Evaluation Understudy**) and **ROUGE** (**Recall-Oriented
    Understudy for Gisting Evaluation**) are two of the most widely used automatic
    evaluation metrics in **Natural Language Processing** (**NLP**), especially for
    tasks such as text generation, translation, and summarization.'
  id: totrans-348
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**BLEU**（或**双语评估助手**）和**ROUGE**（**面向召回的摘要评估助手**）是自然语言处理（NLP）中最广泛使用的自动评估指标之一，特别是在文本生成、翻译和摘要等任务中。'
- en: BLEU is a precision-based metric that evaluates the quality of generated text
    by measuring how many n-gram overlaps it has with one or more reference texts—commonly
    used in machine translation.
  id: totrans-349
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: BLEU是一个基于精确率的指标，通过测量生成的文本与一个或多个参考文本之间的n-gram重叠来评估文本质量——常用于机器翻译。
- en: ROUGE is a recall-based metric that assesses text generation by comparing how
    much of the reference text’s content appears in the output, often used in summarization
    tasks.
  id: totrans-350
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ROUGE是一个基于召回率的指标，通过比较参考文本内容在输出中出现的多少来评估文本生成，常用于摘要任务。
- en: 'Let’s see an example with our `AskMamma` agent. In this scenario, we are going
    to leverage the LangSmith SDK; however, you can run sample evaluations from the
    UI Playground as well:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个`AskMamma`代理的例子来看看。在这个场景中，我们将利用LangSmith SDK；然而，你也可以从UI游乐场运行样本评估：
- en: '**Initializing the dataset**: Here, we will initialize a LangSmith test dataset
    with some input-output pairs. Note that, here, we will think about general answers
    that do not require invoking tools – we first want to test our agent’s general
    answering capabilities.'
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化数据集**：在这里，我们将使用一些输入-输出对初始化一个LangSmith测试数据集。请注意，在这里，我们将考虑不需要调用工具的一般答案——我们首先想测试我们的代理的一般回答能力。'
- en: '[PRE38]'
  id: totrans-353
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'You will then be able to visualize your dataset in your LangSmith control pane,
    under **Datasets & Experiments**:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 你将能够在LangSmith控制面板下的**数据集与实验**部分可视化你的数据集：
- en: '![Figure 6.16: LangSmith’s datasets and experiments](img/B32584_06_16.png)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![图6.16：LangSmith的数据集和实验](img/B32584_06_16.png)'
- en: 'Figure 6.16: LangSmith’s datasets and experiments'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.16：LangSmith的数据集和实验
- en: '**Defining the evaluator**: The evaluator will compare the expected output
    with the actual output and evaluate it according to a specific metric. In our
    case, we will leverage an AI-powered evaluation.'
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义评估器**：评估器将比较预期输出与实际输出，并根据特定指标对其进行评估。在我们的情况下，我们将利用AI驱动的评估。'
- en: '**Note**'
  id: totrans-358
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**'
- en: With AI-powered evaluation, we point to LLMs with a very specific prompt that
    turns them into “judges” of other LLMs’ output.
  id: totrans-359
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过AI驱动的评估，我们指向具有非常特定提示的LLM，使其成为其他LLM输出的“裁判”。
- en: 'Let’s initialize our LLM as a judge. In this case, we will use a correctness
    metric that is going to evaluate the match between the expected output and the
    actual output:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们初始化我们的LLM作为裁判。在这种情况下，我们将使用一个正确性指标来评估预期输出与实际输出之间的匹配：
- en: '[PRE39]'
  id: totrans-361
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: '**Note**'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: If you want to leverage pre-built evaluators, you can go for OpenEvals, an open
    source evaluation framework that provides a standardized way to build and register
    evaluation functions—such as accuracy checks, helpfulness ratings, or LLM-based
    critiques—and apply them consistently across datasets and models.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想利用预构建的评估器，可以选择OpenEvals，这是一个开源的评估框架，它提供了一种标准化的方式来构建和注册评估函数——例如准确性检查、有用性评分或基于LLM的评论——并将它们一致地应用于数据集和模型。
- en: '**Initializing the target function**: The last ingredient is the logic of the
    evaluation – we want to match our agent’s output structure with the evaluator
    we defined.'
  id: totrans-364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化目标函数**：最后一个成分是评估的逻辑——我们希望将我们的智能体输出结构与定义的评估器相匹配。'
- en: '[PRE40]'
  id: totrans-365
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE40]'
- en: 'And that’s it! Let’s now run our evaluator:'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！现在让我们运行我们的评估器：
- en: '[PRE41]'
  id: totrans-367
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'You can now inspect the results from the UI:'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以检查UI的结果：
- en: '![Figure 6.17: LangSmith’s evaluation results](img/B32584_06_17.png)'
  id: totrans-369
  prefs: []
  type: TYPE_IMG
  zh: '![图6.17：LangSmith的评估结果](img/B32584_06_17.png)'
- en: 'Figure 6.17: LangSmith’s evaluation results'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.17：LangSmith的评估结果
- en: As you can see, both our actual outputs returned a correctness score of 5\.
    For each example, you can inspect relevant metrics such as the actual output,
    latency, tokens, and so forth.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们的实际输出都返回了5的正确性分数。对于每个示例，您可以检查相关的指标，如实际输出、延迟、令牌等。
- en: 'In addition to that, in the context of AI agents, we also need to take into
    account tool management:'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在AI智能体的背景下，我们还需要考虑工具管理：
- en: Is tool calling working?
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具调用是否正常工作？
- en: Is the agent able to invoke multiple tools to accomplish complex questions?
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能体能否调用多个工具来完成复杂的问题？
- en: Is the agent smart enough not to invoke tools if not needed?
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能体是否足够智能，在不必要的情况下不会调用工具？
- en: 'In other words, you need to evaluate the *trajectory* of your agent. Let’s
    see an example of how to do so (note: the following code is an adaptation from
    the official LangSmith documentation you can find here: [https://docs.smith.langchain.com/evaluation/how_to_guides](https://docs.smith.langchain.com/evaluation/how_to_guides)).'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，你需要评估你的智能体的**轨迹**。让我们看看如何进行评估的例子（注意：以下代码是从官方LangSmith文档中改编的，您可以在以下链接找到：[https://docs.smith.langchain.com/evaluation/how_to_guides](https://docs.smith.langchain.com/evaluation/how_to_guides)）。
- en: '**Initializing a new dataset**: In this case, we will need to add the expected
    intermediate steps as follows:'
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化新的数据集**：在这种情况下，我们需要添加以下预期的中间步骤：'
- en: '[PRE42]'
  id: totrans-378
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE42]'
- en: '**Initializing our evaluator**: Here, we will assess the correctness of the
    intermediate steps, making sure that the right tool is invoked:'
  id: totrans-379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化我们的评估器**：在这里，我们将评估中间步骤的正确性，确保调用正确的工具：'
- en: '[PRE43]'
  id: totrans-380
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE43]'
- en: '**Note**'
  id: totrans-381
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**注意**'
- en: In order to get access to our agent’s intermediate steps, we need to make sure
    that the `return_intermediate_steps` parameter is set equal to `True`.
  id: totrans-382
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为了获取访问我们智能体中间步骤的权限，我们需要确保`return_intermediate_steps`参数设置为`True`。
- en: '[PRE44]'
  id: totrans-383
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE44]'
- en: We also need to make sure we initialize our evaluator with the proper schema
    so that it will parse the multiple outputs we have in our test dataset.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要确保用适当的模式初始化我们的评估器，以便它能够解析测试数据集中我们拥有的多个输出。
- en: '[PRE45]'
  id: totrans-385
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: '**Defining the target function**: Here, we are simply creating a function that
    will invoke our agent with the proper config parameters.'
  id: totrans-386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义目标函数**：在这里，我们只是创建一个将使用适当的配置参数调用我们的智能体的函数。'
- en: '[PRE46]'
  id: totrans-387
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE46]'
- en: 'Now we have all the ingredients to run our evaluation:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经拥有了运行评估的所有成分：
- en: '[PRE47]'
  id: totrans-389
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: 'Let’s inspect results from the LangSmith UI:'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查LangSmith UI的结果：
- en: '![Figure 6.18: Evaluation results dashboard](img/B32584_06_18.png)'
  id: totrans-391
  prefs: []
  type: TYPE_IMG
  zh: '![图6.18：评估结果仪表板](img/B32584_06_18.png)'
- en: 'Figure 6.18: Evaluation results dashboard'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.18：评估结果仪表板
- en: 'Great! As you can see, our agent performed fairly well, but we can see that
    one of the intermediate steps was evaluated as incorrect. Let’s understand why:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！正如你所看到的，我们的代理表现相当不错，但我们可以看到其中一个中间步骤被评估为不正确。让我们了解原因：
- en: '![Figure 6.19: Agent steps evaluation results](img/B32584_06_19.png)'
  id: totrans-394
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.19：代理步骤评估结果](img/B32584_06_19.png)'
- en: 'Figure 6.19: Agent steps evaluation results'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.19：代理步骤评估结果
- en: It seems that the agent didn’t run `sql_db_query_checker`. Nevertheless, the
    end result was correct. This is an important insight as we might want to either
    remove that one tool if not needed or be more prescriptive at the system message
    level for the agent to use that tool.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来代理没有运行 `sql_db_query_checker`。尽管如此，最终结果还是正确的。这是一个重要的见解，因为我们可能希望要么在不必要时删除该工具，要么在系统消息级别对代理使用该工具提出更具体的建议。
- en: Evaluating agents is essential not only to judge the quality of their final
    responses but also to analyze the full trajectory of reasoning and tool use that
    led to those outcomes. By assessing both what the agent says and how it arrives
    at its conclusions—step by step—we gain a deeper understanding of its reliability,
    transparency, and alignment with intended behaviors. This holistic evaluation
    is especially important in complex workflows where trust, traceability, and correctness
    are critical.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 评估代理不仅是为了判断其最终响应的质量，而且是为了分析导致这些结果的全过程推理和工具使用。通过评估代理所说的内容以及它是如何一步步得出结论的，我们可以更深入地了解其可靠性、透明度和与预期行为的对齐。这种全面的评估在复杂的工作流程中尤为重要，因为信任、可追溯性和正确性至关重要。
- en: Infusing the AI agent in the mobile app
  id: totrans-398
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在移动应用中嵌入 AI 代理
- en: 'AI agents can be consumed in multiple ways: as a standalone application with
    an interactive UI, triggered by business processes, or embedded in existing applications.
    In our scenario, we will explore this last option.'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: AI 代理可以通过多种方式使用：作为一个具有交互式用户界面的独立应用程序，由业务流程触发，或者嵌入到现有应用程序中。在我们的场景中，我们将探索最后一种选项。
- en: 'Let’s say that we have a mobile application for our restaurant and we want
    to infuse it with a conversational UI powered by our `askmamma` AI agent. The
    look and feel of the new UI will be the following:'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个餐厅的移动应用程序，我们希望将其与由我们的 `askmamma` AI 代理驱动的会话式用户界面相结合。新界面的外观和感觉如下：
- en: '![Figure 6.20: UI of the mobile app of our Piadineria](img/B32584_06_20.png)'
  id: totrans-401
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.20：我们 Piadineria 移动应用的界面](img/B32584_06_20.png)'
- en: 'Figure 6.20: UI of the mobile app of our Piadineria'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.20：我们 Piadineria 移动应用的界面
- en: To develop the UI, we will leverage Streamlit, an open source Python library
    that makes it easy to build and share interactive web apps, especially for data
    science and machine learning workflows. Instead of spending time on frontend development,
    you can focus on Python code and Streamlit automatically handles the UI.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开发用户界面，我们将利用 Streamlit，这是一个开源的 Python 库，它使得构建和共享交互式网络应用变得容易，特别是对于数据科学和机器学习工作流程。你不必花费时间在前端开发上，你可以专注于
    Python 代码，Streamlit 会自动处理用户界面。
- en: Among its features, Streamlit has community-supported components and templates
    to easily integrate with LangChain pipelines (for example, to create chat interfaces
    or text generation demos). This synergy lets you spin up proof-of-concept LLM
    applications quickly, using Streamlit’s interactivity and user-friendly interface
    alongside LangChain’s robust language processing capabilities.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 在其功能中，Streamlit 有社区支持的组件和模板，可以轻松集成到 LangChain 管道中（例如，创建聊天界面或文本生成演示）。这种协同作用让你能够快速启动
    LLM 应用程序的验证版本，利用 Streamlit 的交互性和用户友好的界面以及 LangChain 强大的语言处理能力。
- en: 'In our scenario, we are going to leverage this integration to handle the agent
    component at the UI level. Let’s see some of the main code blocks that you have
    to consider while re-purposing your agent in Streamlit (you can find the whole
    code in the GitHub repository):'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的场景中，我们将利用这种集成在 UI 层面上处理代理组件。让我们看看在重新利用代理到 Streamlit 时需要考虑的一些主要代码块（你可以在 GitHub
    仓库中找到完整的代码）：
- en: '**Memory management**:We first initialize a Streamlit-compatible message history
    object as a backend memory store for the conversation happening in our app. In
    this case, we will leverage the `ConversationBufferMemory` built-in LangChain
    memory class, which keeps all messages in a buffer (i.e., a running list).'
  id: totrans-406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存管理**：我们首先初始化一个与 Streamlit 兼容的消息历史记录对象，作为我们应用中发生的对话的后端内存存储。在这种情况下，我们将利用内置的
    LangChain 内存类 `ConversationBufferMemory`，它将所有消息保存在缓冲区（即运行列表）中。'
- en: '[PRE48]'
  id: totrans-407
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE48]'
- en: With this approach, we will pass `agent_executor` a memory object that is Streamlit-compatible.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种方法，我们将向 `agent_executor` 传递一个与 Streamlit 兼容的内存对象。
- en: '[PRE49]'
  id: totrans-409
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: '**Initializing Streamlit session states**: In Streamlit, state refers to the
    ability to preserve variables across user interactions—such as remembering what
    was typed or clicked even after a rerun.'
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化 Streamlit 会话状态**：在 Streamlit 中，状态指的是在用户交互之间保留变量的能力——例如，即使在重新运行后也能记住输入或点击的内容。'
- en: '[PRE50]'
  id: totrans-411
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE50]'
- en: The preceding code makes sure that when a user opens your app, there’s a place
    in memory to store both the conversation history (`chat_history`) and the messages
    shown onscreen (`messages`). It’s like setting up two notebooks—one for tracking
    what was said behind the scenes, and another for what’s displayed to the user.
    Without this step, the app wouldn’t know where to save or retrieve past messages.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的代码确保当用户打开您的应用时，内存中有一个位置来存储对话历史（`chat_history`）和屏幕上显示的消息（`messages`）。这就像设置两个笔记本——一个用于跟踪幕后所说的话，另一个用于显示给用户的内容。如果没有这一步，应用将不知道在哪里保存或检索过去的消息。
- en: '**Rendering persistent memory-based messages:** In this block, we want to show
    the full chat history between the user and the AI, pulling it from memory so everything
    that happened earlier is shown again.'
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**渲染基于持久内存的消息**：在这个块中，我们希望显示用户和 AI 之间的完整聊天历史，从内存中拉取，以便显示之前发生的一切。'
- en: '[PRE51]'
  id: totrans-414
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE51]'
- en: '**Rendering current state messages**: This displays messages stored only in
    the current session state—typically from the current run.'
  id: totrans-415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**渲染当前状态消息**：这显示仅存储在当前会话状态中的消息——通常是当前运行中的消息。'
- en: '[PRE52]'
  id: totrans-416
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE52]'
- en: '**Rendering the AI agent’s chat interface**: This code sets up the chat input
    at the bottom of your Streamlit app, inviting the user to ask something—such as
    *“Want to know what’s in the menu?”*. When the user sends a message, it’s immediately
    shown in the chat as a user bubble. Then, the AI (`agent_executor`) takes over:
    it processes the prompt, possibly using tools along the way, and replies with
    an answer inside an assistant bubble.'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**渲染 AI 代理的聊天界面**：此代码在 Streamlit 应用的底部设置聊天输入，邀请用户提问——例如 *“想知道菜单里有什么吗？”*。当用户发送消息时，它立即在聊天中以用户气泡的形式显示。然后，AI
    (`agent_executor`) 接管：它处理提示，可能沿途使用工具，并在助手气泡中回复答案。'
- en: '[PRE53]'
  id: totrans-418
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE53]'
- en: What’s nice here is that the AI’s reasoning steps—such as tools it used behind
    the scenes—are captured by `StreamlitCallbackHandler` and stored in `st.session_state.steps`.
    This lets you later visualize the steps in detail, giving the user a peek into
    how the AI came up with its answer.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 这里很棒的是，AI 的推理步骤——例如它背后使用的工具——被 `StreamlitCallbackHandler` 捕获并存储在 `st.session_state.steps`
    中。这使得您可以稍后详细可视化这些步骤，使用户能够窥视 AI 如何得出其答案。
- en: 'Once your code is ready and saved in an `app.py` file, you can run it via `streamlit
    run app.py` to see the result in your localhost. This is what the final result
    will look like:'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的代码准备就绪并保存在 `app.py` 文件中，您可以通过 `streamlit run app.py` 运行它，在本地主机上查看结果。最终结果将如下所示：
- en: '![Figure 6.21: UI of the conversational interface of the AskMamma agent](img/B32584_06_21.png)'
  id: totrans-421
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.21：AskMamma 代理的对话界面 UI](img/B32584_06_21.png)'
- en: 'Figure 6.21: UI of the conversational interface of the AskMamma agent'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.21：AskMamma 代理的对话界面 UI
- en: As you can see, we were able to interact with AskMamma and have some actions
    executed on our behalf, such as adding one item to the cart.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们能够与 AskMamma 互动，并代表我们执行一些操作，例如向购物车添加一项商品。
- en: Summary
  id: totrans-424
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Throughout this chapter, we have explored the fundamental concepts and practical
    steps necessary to create a functional AI agent. From understanding the basics
    of LangChain to implementing advanced features, you have gained valuable insights
    into the world of AI development.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了创建一个功能性的 AI 代理所必需的基本概念和实践步骤。从理解 LangChain 的基础知识到实现高级功能，你已经在 AI 开发领域获得了宝贵的见解。
- en: By leveraging LangChain’s powerful tools and frameworks, you can create intelligent
    agents capable of performing complex tasks and making informed decisions. The
    knowledge and skills acquired in this chapter will serve as a solid foundation
    for further exploration and innovation in the field of AI.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用 LangChain 的强大工具和框架，您可以创建能够执行复杂任务并做出明智决策的智能代理。在本章中获得的知识和技能将为 AI 领域的进一步探索和创新奠定坚实的基础。
- en: In the next chapter, we will start seeing multiple agents working together in
