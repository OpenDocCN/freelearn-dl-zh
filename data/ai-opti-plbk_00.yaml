- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: '**The AI Optimization Playbook** aims to train business leaders, data scientists,
    and AI engineers to achieve transformative business value throughout the entire
    AI project lifecycle. It covers not only the technical aspect of model optimization
    but also the crucial elements of strategy, leadership, project selection, AI/MLOps,
    and responsible AI governance required for putting AI into production successfully.
    The book introduces several key frameworks, such as the AI project lifecycle (from
    strategy to prototype to production to iteration), to provide proven approaches
    for consistently producing high-quality, high-impact output.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**《人工智能优化手册》**旨在培训商业领袖、数据科学家和人工智能工程师，在整个人工智能项目生命周期中实现变革性的商业价值。它不仅涵盖了模型优化的技术方面，还包括将人工智能成功投入生产的战略、领导力、项目选择、AI/MLOps以及负责任的AI治理等关键要素。本书介绍了几个关键框架，例如人工智能项目生命周期（从战略到原型到生产再到迭代），以提供持续产生高质量、高影响力输出的验证方法。'
- en: This book guides you on how to formulate an AI strategy, select high-impact
    projects, and navigate the entire lifecycle from pilot to production. It also
    details how to operationalize these systems using MLOps and, more recently, LLMOps
    for generative AI, to ensure solutions are scalable and reliable. Taking a practical,
    hands-on approach using real-world case studies, the book also dives deeper into
    the concepts behind why AI projects fail. This ensures that you will not only
    learn how to build something but also understand why strategic alignment and responsible
    governance are critical for producing scalable business outcomes. Learning to
    effectively manage this entire lifecycle is an empowering skill set in the quickly
    evolving field of artificial intelligence.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本书指导您如何制定人工智能战略，选择高影响力项目，并从试点到生产的整个生命周期进行导航。它还详细说明了如何使用MLOps以及最近出现的LLMOps（用于生成式人工智能）来实施这些系统，以确保解决方案可扩展且可靠。通过使用真实世界案例研究进行实用、动手的方法，本书还深入探讨了人工智能项目失败背后的概念。这确保了您不仅学会如何构建某些东西，而且理解为什么战略一致性和负责任的治理对于产生可扩展的商业成果至关重要。学会有效管理这个整个生命周期是人工智能快速发展的领域中一种赋权的技能集。
- en: 'The book is structured into five parts:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为五个部分：
- en: '*Part 1* , *Laying the Groundwork for AI Success* , establishes the strategic
    foundation necessary for any successful AI initiative. We will begin by examining
    why most AI projects fail, showing that these are overwhelmingly strategy, execution,
    and integration failures, not technology failures. We will analyze common pitfalls,
    such as misaligned goals (chasing technical “surrogate metrics” instead of business
    value), siloed development, weak data foundations, and a misunderstanding of AI’s
    iterative and non-deterministic nature. Having established what goes wrong, this
    part translates these lessons into a practical framework for building a mature
    AI strategy. This includes using evaluation processes such as the ICE framework
    to prioritize a project roadmap, building robust governance and compliance using
    established models such as the NIST AI RMF, and designing a modern data strategy
    that treats data as a product. Finally, we cover the need for a scalable AI platform,
    a principled algorithm selection strategy, and a hybrid “hub-and-spoke” organizational
    structure to manage change.'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第一部分*，*为人工智能成功奠定基础*，建立了任何成功人工智能项目所需的战略基础。我们将从分析为什么大多数人工智能项目失败开始，表明这些失败主要是策略、执行和整合失败，而不是技术失败。我们将分析常见的陷阱，例如目标不一致（追求技术“替代指标”而不是商业价值）、部门化开发、薄弱的数据基础以及对人工智能迭代和非确定性本质的误解。在确定了出错的地方后，本部分将这些经验教训转化为构建成熟人工智能战略的实用框架。这包括使用ICE框架等评估流程来优先考虑项目路线图，利用NIST
    AI RMF等既定模型构建稳健的治理和合规性，以及设计一个将数据视为产品的现代数据战略。最后，我们讨论了需要可扩展的人工智能平台、基于原则的算法选择策略以及混合“中心辐射”组织结构来管理变革。'
- en: '*Part 2* , *Aligning Projects with Business Impact* , provides a practical
    blueprint for bridging the gap between strategy and execution, beginning with
    the selection of high-impact AI projects. We will first detail how to analyze
    and prioritize initiatives, moving beyond just technical novelty to focus on factors
    such as business impact, end-user definition, and comprehensive feasibility analysis
    covering data, the tech stack, and talent. This includes quantitative methods
    for opportunity sizing, such as T-shirt sizing and bottom-up comparables, as well
    as rigorous cost-benefit analysis to justify the potential ROI. Once a project
    is identified, we will cover the critical next step of gaining leadership support,
    offering a guide to crafting a compelling narrative by engaging stakeholders early,
    focusing on the “so-what” of business value, presenting a phased roadmap, and
    setting realistic expectations. With sponsorship secured, we will present a playbook
    for building an effective **Proof of Concept** ( **PoC** ) as a small-scale, low-risk
    experiment to test feasibility, detailing the critical post-PoC decisions: whether
    to refine, pivot, or proceed to an MVP. Finally, we will introduce a comprehensive
    framework for measuring the PoC’s performance beyond just technical model metrics,
    covering the essential system, business, and safety metrics needed to prove its
    value and secure a clear path to production.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第二部分*，*将项目与业务影响对齐*，提供了一个连接策略与执行的实用蓝图，从选择高影响AI项目开始。我们将首先详细说明如何分析和优先考虑倡议，超越仅仅关注技术新颖性，转向关注诸如业务影响、最终用户定义以及涵盖数据、技术堆栈和人才的全面可行性分析等因素。这包括用于机会规模化的定量方法，如T恤尺度和自下而上的可比性，以及严格的成本效益分析来证明潜在的ROI。一旦确定项目，我们将涵盖获取领导支持的关键下一步，通过早期吸引利益相关者，构建一个引人入胜的故事，关注业务价值的“如此何”，呈现分阶段路线图，并设定现实期望。在获得赞助后，我们将展示一个构建有效的**概念验证**（**PoC**）的剧本，作为一个小规模、低风险的实验来测试可行性，详细说明关键的PoC后决策：是进行细化、转型还是推进到MVP。最后，我们将介绍一个全面的框架，用于衡量PoC的性能，而不仅仅是技术模型指标，包括证明其价值并确保清晰生产路径所需的必要系统、业务和安全指标。'
- en: '*Part 3* , *Deploying and Proving ML Value* , provides a comprehensive guide
    to the complete, end-to-end lifecycle of an ML system, moving from defining its
    purpose to proving its causal impact on the business. We will start with the foundational
    framework for success, moving beyond simple accuracy to define multi-dimensional,
    business-aligned goals, essential guardrail metrics to prevent unintended harm,
    and surrogate metrics to track long-term objectives. Next, we will dive into “productization,”
    which is the critical process of operationalizing models from experimental notebooks
    into robust, production-grade systems, exploring MLOps best practices, the importance
    of reproducible pipelines for code and data, and the architectural choices for
    model serving. Finally, we will explore the science of causal inference to answer
    the critical question, “Did the system do what it was intended to do?”, covering
    the “gold standard” of A/B testing (RCTs), as well as advanced observational techniques
    and optimization methods such as multi-arm bandits.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第三部分*，*部署和证明机器学习价值*，提供了一个关于机器学习系统完整、端到端生命周期的全面指南，从定义其目的到证明其对业务的因果影响。我们将从成功的基石框架开始，超越简单的准确性，定义多维、与业务对齐的目标，防止意外伤害的基本护栏指标，以及跟踪长期目标的代理指标。接下来，我们将深入“产品化”，这是将模型从实验笔记本操作化为稳健、生产级系统的关键过程，探讨MLOps最佳实践，代码和数据的可重复管道的重要性，以及模型服务架构的选择。最后，我们将探索因果推断的科学，以回答关键问题，“系统是否做到了它打算做的事情？”，涵盖“黄金标准”的A/B测试（RCTs），以及多臂老虎机等高级观察技术和优化方法。'
- en: '*Part 4* , *Emerging Topics: Generative AI and AI Agents* , explores the new
    frontier of AI technologies that are transforming enterprises. We will begin by
    explaining generative AI and LLMs in business-friendly terms, covering key use
    cases across various functions, from marketing and customer service to code generation,
    as well as practical adoption considerations. Following this, we will define LLMOps
    and detail how it extends traditional MLOps to handle the unique operational lifecycle
    of large language models, including prompt orchestration, fine-tuning, and specialized
    monitoring. Finally, we will explore the emerging world of AI agents, discussing
    what they are, their potential to automate complex multi-step tasks, and the frameworks
    for building and governing these autonomous systems safely.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第4部分*，*新兴主题：生成式AI和AI代理*，探讨了正在改变企业的AI技术的新前沿。我们将从用商业友好的术语解释生成式AI和LLMs开始，涵盖从市场营销和客户服务到代码生成等各个职能的关键用例，以及实际采用考虑。在此之后，我们将定义LLMOps并详细说明它是如何将传统的MLOps扩展到处理大型语言模型的独特运营生命周期，包括提示编排、微调和专门的监控。最后，我们将探索AI代理的新兴世界，讨论它们是什么，它们自动化复杂多步任务的可能性，以及构建和治理这些自主系统的框架。'
- en: '*Part 5* , *Responsible AI and Governance* , provides a crucial framework for
    ensuring AI solutions are ethical, fair, compliant, and sustainable, starting
    by defining **Responsible AI** ( **RAI** ) and its core pillars (FEAT). It then
    provides a practical guide to operationalizing these principles through governance
    committees, risk assessment checklists (Risk Score = Likelihood * Impact), and
    strategic **Human-in-the-Loop** ( **HITL** ) approaches. The part also addresses
    the unique challenges of trustworthy LLMs, such as “hallucinations,” and surveys
    the evolving global regulatory landscape, including the EU AI Act, before concluding
    with a look at future trends such as quantum computing and a vision of the fully
    optimized, AI-driven enterprise of 2030.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第5部分*，*负责任的AI和治理*，提供了一个确保AI解决方案是道德的、公平的、合规的和可持续的关键框架，首先定义**负责任的AI**（**RAI**）及其核心支柱（FEAT）。然后，它提供了一个通过治理委员会、风险评估清单（风险评分
    = 可能性 * 影响）和战略**人机协作**（**HITL**）方法来实施这些原则的实用指南。本部分还解决了值得信赖的LLMs的独特挑战，例如“幻觉”，并概述了不断发展的全球监管格局，包括欧盟AI法案，最后展望了未来趋势，如量子计算，并展望了2030年完全优化、由AI驱动的企业的愿景。'
- en: Who this book is for
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这本书面向的对象
- en: 'This book is designed for the key individuals and teams responsible for driving
    business value from artificial intelligence. It is written for the following:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是为那些负责从人工智能中驱动业务价值的关键个人和团队设计的。它面向以下人群：
- en: '**Senior leaders and C-suite executives (CXOs, CDOs, CDAOs)** : If you are
    responsible for setting the enterprise AI strategy, fostering an AI-first culture,
    or making critical sponsorship and resource decisions, this book provides the
    frameworks to align technology initiatives with tangible business outcomes.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级领导者和C级高管（CXOs、CDOs、CDAOs）**：如果您负责制定企业AI战略、培养以AI为先的文化，或做出关键的支持和资源决策，这本书提供了将技术倡议与可衡量的业务成果对齐的框架。'
- en: '**AI scientists and technical practitioners** : If you are a data scientist
    or applied AI scientist, this book will guide you not only in building models
    but also in learning the crucial and often-overlooked skill of “selling” your
    proposed AI solutions to senior leadership and end users. It provides practical
    tips on how to frame problems, conduct cost-benefit analyses, and demonstrate
    value to gain buy-in.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI科学家和技术实践者**：如果您是数据科学家或应用AI科学家，这本书不仅将指导您构建模型，还将指导您学习“销售”您提出的AI解决方案给高级领导和最终用户的至关重要的、通常被忽视的技能。它提供了如何构建问题框架、进行成本效益分析和展示价值以获得支持的实用技巧。'
- en: '**AI product managers and strategists** : If you are tasked with developing
    the go-to-market strategy for an AI product, managing the project roadmap, or
    keeping teams on track, this book offers a complete lifecycle view, from project
    selection and opportunity sizing to measuring success.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI产品经理和策略师**：如果您负责制定AI产品的上市策略、管理项目路线图或确保团队按计划进行，这本书提供了一个完整的生命周期视图，从项目选择和机会规模到衡量成功。'
- en: '**Machine Learning Engineers (MLEs)** : For those who specialize in deploying
    viable PoCs to production, this book provides the crucial context around strategy,
    governance, and business alignment needed to build systems that are not just technically
    sound but also scalable, reliable, and impactful.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习工程师（MLEs）**：对于那些专注于将可行的原型部署到生产中的专业人士，本书提供了构建系统所需的关键背景，这些系统不仅技术上可靠，而且可扩展、可靠且具有影响力，包括策略、治理和业务对齐。'
- en: '**Business leaders and stakeholders** : If you are a business-side leader who
    collaborates with technical teams, this book will demystify the AI lifecycle.
    It will equip you to ask the right questions, participate in the selection of
    high-impact projects, and understand your vital role in the development and adoption
    process.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商业领导者和利益相关者**：如果你是与技术团队合作的业务方面领导者，这本书将揭开人工智能生命周期的神秘面纱。它将使你能够提出正确的问题，参与选择具有高影响力的项目，并理解你在开发和采用过程中的关键角色。'
- en: What this book covers
  id: totrans-16
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖的内容
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor022) , *Understanding* *the Perils
    of AI Products* , describes the common patterns of how AI projects fail. It makes
    a case that most breakdowns are not technology failures but are a result of poor
    strategy, execution, and integration. It explores specific pitfalls such as misaligned
    goals, siloed development, weak data foundations, and a lack of production-readiness.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](Chapter_1.xhtml#_idTextAnchor022) ，*理解人工智能产品的风险*，描述了人工智能项目失败的共同模式。它提出，大多数故障不是技术失败，而是策略、执行和整合不佳的结果。它探讨了具体的陷阱，如目标不一致、部门化开发、薄弱的数据基础和缺乏生产就绪性。'
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor071) , *Building the Enterprise
    AI Strategy* , outlines the structural elements of a mature AI strategy. It provides
    a step-by-step guide to align business initiatives with technical development,
    using frameworks such as ICE for roadmap prioritization. The chapter covers the
    essential pillars of a comprehensive AI strategy, including governance, a modern
    data strategy, a scalable AI platform, and organizational change management.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第二章*](Chapter_2.xhtml#_idTextAnchor071) ，*构建企业人工智能策略*，概述了成熟人工智能策略的结构要素。它提供了一个逐步指南，将业务倡议与技术开发对齐，使用如ICE框架进行路线图优先级排序。本章涵盖了全面人工智能策略的基本支柱，包括治理、现代数据策略、可扩展的人工智能平台和组织变革管理。'
- en: '[*Chapter 3*](Chapter_3.xhtml#_idTextAnchor092) , *Selecting High-Impact AI
    Projects* , provides a practical guide for choosing AI initiatives that deliver
    optimal returns. It details how to perform a feasibility analysis by evaluating
    data, the tech stack, and talent. The chapter also introduces quantitative methods
    for opportunity sizing and a framework for conducting a cost-benefit analysis.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第三章*](Chapter_3.xhtml#_idTextAnchor092) ，*选择具有高影响力的人工智能项目*，提供了一项实用指南，用于选择能够带来最佳回报的人工智能倡议。它详细说明了如何通过评估数据、技术堆栈和人才来执行可行性分析。本章还介绍了机会规模化的定量方法和进行成本效益分析的框架。'
- en: '[*Chapter 4*](Chapter_4.xhtml#_idTextAnchor141) , *Beyond the Build: Gaining
    Leadership Support for AI Initiatives* , describes the critical step of securing
    sponsorship from senior leadership. It makes a case that technical teams must
    “sell” their solutions by crafting a compelling narrative. The chapter provides
    tips such as engaging stakeholders early, justifying the investment with the “so-what,”
    and setting realistic expectations.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第四章*](Chapter_4.xhtml#_idTextAnchor141) ，*超越构建：获得对人工智能项目的领导支持*，描述了获得高级领导赞助的关键步骤。它提出，技术团队必须通过构建引人入胜的故事来“销售”他们的解决方案。本章提供了以下建议：尽早吸引利益相关者、用“如此何”来证明投资合理，并设定现实期望。'
- en: '[*Chapter 5*](Chapter_5.xhtml#_idTextAnchor148) , *Building an AI Proof of
    Concept and Measuring Your Solution* , details how to execute a successful PoC
    as a low-risk experiment to test feasibility. It provides a five-step “PoC playbook”
    and covers the critical post-PoC decisions: whether to refine, pivot, or build
    a minimum viable product. Finally, it introduces a framework for measuring performance
    using a 360-degree view of model, system, business, and safety metrics.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第五章*](Chapter_5.xhtml#_idTextAnchor148) ，*构建人工智能原型并衡量您的解决方案*，详细说明了如何执行一个成功的原型，作为一个低风险实验来测试可行性。它提供了一个五步“原型剧本”，并涵盖了关键的后原型决策：是否完善、转型或构建最小可行产品。最后，它介绍了一个框架，用于通过360度视角衡量模型、系统、业务和安全指标的性能。'
- en: '[*Chapter 6*](Chapter_6.xhtml#_idTextAnchor197) , *Beyond Accuracy: A Guide
    to Defining Metrics for Adoption* , explains why simple accuracy is a sufficient
    measure of success for an ML model. It is a framework for defining holistic, multi-dimensional
    metrics that align with business goals, including the use of guardrail metrics
    to prevent unintended harm. The chapter also covers how to link technical model
    performance to business value, use surrogate metrics for long-term goals, and
    balance trade-offs using multi-objective optimization.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](Chapter_6.xhtml#_idTextAnchor197) ，*超越准确性：定义采用指标的指南*，解释了为什么简单的准确性是机器学习模型成功的一个足够衡量标准。它是一个定义全面、多维度的指标框架，与业务目标相一致，包括使用护栏指标来防止意外伤害。本章还涵盖了如何将技术模型性能与业务价值联系起来，使用代理指标实现长期目标，以及使用多目标优化来平衡权衡。'
- en: '[*Chapter 7*](Chapter_7.xhtml#_idTextAnchor212) , *From Model to Market: Operationalizing
    ML Systems* , details the process of “productization,” from turning an experimental
    model into a scalable and maintainable production-grade system. It emphasizes
    that modern ML requires managing an entire reproducible pipeline (for data, code,
    and infrastructure), not just a static model file. The text explores the MLOps
    practices, infrastructure choices (such as IaaS versus PaaS), and model-serving
    strategies (such as REST APIs or streaming) required to successfully deploy and
    monitor ML systems.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](Chapter_7.xhtml#_idTextAnchor212) ，*从模型到市场：实现机器学习系统的运营*，详细介绍了“产品化”的过程，即从将实验模型转变为可扩展且可维护的生产级系统。它强调，现代机器学习需要管理整个可重复的管道（包括数据、代码和基础设施），而不仅仅是静态的模型文件。文本探讨了MLOps实践、基础设施选择（如IaaS与PaaS的比较）以及模型服务策略（如REST
    API或流式传输）等，这些都是成功部署和监控机器学习系统所必需的。'
- en: '[*Chapter 8*](Chapter_8.xhtml#_idTextAnchor246) , *From Metrics to Measurement:
    Experimentation and Causal Inference* , focuses on causal inference, the science
    of proving that an ML system *caused* a specific business outcome, moving beyond
    simple correlation. It provides a comprehensive guide to randomized control trials
    (A/B testing) as the “gold standard” for measuring impact, covering hypothesis-driven
    design and statistical analysis. The chapter also explores advanced methods, such
    as multi-arm bandits for optimization, and observational techniques, such as uplift
    modeling, for when A/B tests aren’t possible.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](Chapter_8.xhtml#_idTextAnchor246) ，*从指标到测量：实验和因果推断*，专注于因果推断，即证明机器学习系统*导致*了特定的商业结果的科学，超越了简单的相关性。它提供了关于随机对照试验（A/B测试）作为“黄金标准”来衡量影响的全面指南，涵盖了假设驱动的设计和统计分析。本章还探讨了高级方法，如用于优化的多臂老虎机，以及当A/B测试不可行时的观察技术，如提升建模。'
- en: '[*Chapter 9*](Chapter_9.xhtml#_idTextAnchor260) , *Generative AI in the Enterprise:
    Unlocking New Opportunities* , explores the transformational impact of GenAI,
    detailing key enterprise use cases such as enhancing customer engagement with
    chatbots and democratizing enterprise intelligence with copilots. The chapter
    provides best practices for implementation and measuring ROI through metrics such
    as cost savings and employee experience. Critically, it also outlines when not
    to consider GenAI, such as for purely mathematical analysis or high-stakes, reliable
    decision-making where traditional tools are more appropriate.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](Chapter_9.xhtml#_idTextAnchor260) ，*企业中的生成式AI：开启新机遇*，探讨了生成式AI的变革性影响，详细介绍了关键企业用例，如通过聊天机器人增强客户参与度，以及通过共飞行员民主化企业智能。本章提供了实施的最佳实践和通过成本节约和员工体验等指标衡量投资回报率的最佳实践。重要的是，它还概述了何时不应考虑生成式AI，例如，对于纯粹数学分析或高风险、可靠的决策，传统工具更为合适。'
- en: '[*Chapter 10*](Chapter_10.xhtml#_idTextAnchor273) , *Understanding GenAI Operations*
    , defines GenAI Ops as the essential process to accelerate and optimize the LLM
    system lifecycle, highlighting how it differs from traditional MLOps in areas
    such as metrics, talent, and training. The chapter details the “building” phase
    by explaining the three core optimization techniques: RAG for grounding models
    with external data, fine-tuning for specializing models on specific tasks, and
    prompting for instructing the model. It concludes with the “operationalization”
    phase, which covers critical production practices such as offline and online evaluations,
    continuous logging and monitoring, and cost management.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](Chapter_10.xhtml#_idTextAnchor273) ，*理解通用人工智能操作*，将通用人工智能操作定义为加速和优化LLM系统生命周期的基本过程，强调它在指标、人才和培训等方面与传统MLOps的不同之处。本章通过解释三个核心优化技术来详细说明“构建”阶段：RAG用于将外部数据与模型固定，微调用于在特定任务上使模型专业化，提示用于指导模型。它以“运营化”阶段结束，涵盖了关键的生产实践，如离线和在线评估、持续日志记录和监控以及成本管理。'
- en: '[*Chapter 11*](Title_Page.xhtml#_idTextAnchor000) , *AI Agents Explained* ,
    introduces AI agents as autonomous programs that use planning, tool interaction,
    and memory to automate complex, repetitive tasks. It provides critical guidance
    on when to apply them, such as for dynamic workflows, and when to avoid them in
    low-error-tolerance or low-latency situations. The chapter also reviews single
    versus multi-agent systems, popular agentic frameworks such as LangChain and AutoGen,
    and the necessity of agent observability for evaluation and monitoring.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](Title_Page.xhtml#_idTextAnchor000) ，*AI代理解析*，介绍了AI代理作为使用规划、工具交互和记忆来自动化复杂、重复性任务的自主程序。它提供了何时应用它们的指导，例如在动态工作流程中，以及在低错误容忍度或低延迟情况下避免它们的情景。本章还回顾了单代理系统与多代理系统之间的区别，流行的代理框架如LangChain和AutoGen，以及代理可观察性对于评估和监控的必要性。'
- en: '[*Chapter 12*](Chapter_12.xhtml#_idTextAnchor329) , *Introduction to Responsible
    AI* , defines RAI as the practical framework for aligning AI with ethical goals,
    distinguishing it from ethical AI (moral principles) and trustworthy AI (reliability).
    It introduces the core pillars of **Fairness, Ethics, Accountability, and Transparency**
    ( **FEAT** ) and establishes that RAI is essential for true optimization, as it
    builds user trust and ensures models are optimized for equitable outcomes, not
    just technical metrics.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第12章*](Chapter_12.xhtml#_idTextAnchor329) ，*负责任人工智能简介*，将负责任人工智能定义为与伦理目标对齐的实用框架，将其与道德人工智能（道德原则）和可信赖人工智能（可靠性）区分开来。它介绍了**公平性、伦理、问责制和透明度**（**FEAT**）的核心支柱，并确立负责任人工智能对于真正的优化是必要的，因为它建立用户信任并确保模型优化以实现公平的结果，而不仅仅是技术指标。'
- en: '[*Chapter 13*](Chapter_13.xhtml#_idTextAnchor354) , *Implementing RAI Frameworks,
    Metrics, and Best Practices* , provides a practical roadmap for operationalizing
    RAI. It details establishing governance structures such as RAI committees, using
    ethical risk assessment checklists (Risk Score = Likelihood * Impact), and strategically
    integrating **Human-in-the-Loop** ( **HITL** ) for high-stakes decisions. The
    chapter also covers mandatory documentation, such as model and system cards, and
    specific metrics to quantify fairness, explainability, and safety.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第13章*](Chapter_13.xhtml#_idTextAnchor354) ，*实施RAI框架、指标和最佳实践*，提供了实施RAI的实际路线图。它详细介绍了建立治理结构，如RAI委员会，使用道德风险评估清单（风险评分
    = 可能性 * 影响），以及战略性地整合**人机交互**（**HITL**）以进行高风险决策。本章还涵盖了强制性的文档，如模型和系统卡片，以及用于量化公平性、可解释性和安全性的特定指标。'
- en: '[*Chapter 14*](Chapter_14.xhtml#_idTextAnchor386) , *Building Trustworthy LLMs
    and Generative AI* , explores the unique ethical challenges of LLMs, amplifying
    potential societal biases, and privacy risks such as data leakage. It details
    strategies for transparency using explainability methods, outlines fairness metrics
    to mitigate bias, and provides application-level guidelines such as content filters
    and user disclosures to build trust.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第14章*](Chapter_14.xhtml#_idTextAnchor386) ，*构建可信赖的LLM和生成式AI*，探讨了LLM的独特伦理挑战，放大潜在的社会偏见和隐私风险，如数据泄露。它详细介绍了使用可解释性方法实现透明度的策略，概述了公平性指标以减轻偏见，并提供了应用级指南，如内容过滤和用户披露，以建立信任。'
- en: '[*Chapter 15*](Chapter_15.xhtml#_idTextAnchor412) , *Regulatory and Legal Frameworks
    for Responsible AI* , compares the evolving global approaches to AI regulation,
    contrasting the EU’s comprehensive, risk-based AI Act with the US’s flexible,
    sectoral approach. It introduces the **Know Your AI** ( **KYAI** ) process for
    identifying and assessing AI risk and details new GenAI-specific risks such as
    “shadow AI” data leakage. The chapter provides actionable compliance strategies,
    including conducting **AI Impact Assessments** ( **AIIAs** ) and establishing
    AI governance boards.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第15章*](Chapter_15.xhtml#_idTextAnchor412) ，*负责任人工智能的监管和法律框架*，比较了全球对AI监管的演变方法，对比了欧盟全面、基于风险的AI法案与美国灵活、分部门的做法。它介绍了**了解你的AI**（**KYAI**）流程，用于识别和评估AI风险，并详细介绍了新的GenAI特定风险，如“影子AI”数据泄露。本章提供了可操作的合规策略，包括进行**AI影响评估**（**AIIAs**）和建立AI治理委员会。'
- en: '[*Chapter 16*](Chapter_16.xhtml#_idTextAnchor431) , *The Future of AI Optimization:
    Trends, Vision, and Responsible Implementation* , concludes the book by exploring
    emerging trends, emphasizing that true optimization requires pairing innovation
    with responsibility. It discusses the impact of scaling laws, quantum computing,
    the rise of autonomous agentic AI, and the necessity of **Explainable AI** ( **XAI**
    ) for building trust. The chapter examines the profound societal impact on the
    future of work and sustainability, culminating in a vision of the “AI-driven Enterprise
    of 2030.”'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第16章*](Chapter_16.xhtml#_idTextAnchor431) ，*人工智能优化的未来：趋势、愿景和负责任实施*，通过探讨新兴趋势，强调真正的优化需要将创新与责任相结合，从而结束了本书。它讨论了规模定律、量子计算、自主智能体AI的兴起以及**可解释人工智能**（**XAI**）对于建立信任的必要性。本章考察了人工智能对未来工作和社会可持续性的深远影响，最终形成一个“2030年AI驱动型企业”的愿景。'
- en: To get the most out of this book
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为了充分利用这本书
- en: 'Following along will be easier if you bear the following in mind:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果记住以下事项，跟随起来会更容易：
- en: '**Use the frameworks as hands-on tools** : When prioritizing your own initiatives,
    actively score them using the **Impact, Confidence, Ease** ( **ICE** ) framework.
    When planning a project, use the cost-benefit analysis framework and the five-step
    PoC playbook to guide your process.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将框架作为实际工具使用**：在优先考虑自己的倡议时，积极使用**影响、信心、易用性**（**ICE**）框架进行评分。在规划项目时，使用成本效益分析框架和五步PoC剧本来指导你的流程。'
- en: '**Align business and tech** : Before you build, use the factors in [*Chapter
    3*](Chapter_3.xhtml#_idTextAnchor092) as a checklist to conduct a feasibility
    analysis of your data, tech stack, and talent. Use the alignment questions in
    [*Chapter 1*](Chapter_1.xhtml#_idTextAnchor022) to “force” the critical conversation
    between your business and data teams.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使业务与技术对齐**：在构建之前，使用[*第3章*](Chapter_3.xhtml#_idTextAnchor092)中的因素作为清单，对你的数据、技术堆栈和人才进行可行性分析。使用[*第1章*](Chapter_1.xhtml#_idTextAnchor022)中的对齐问题“强迫”业务团队和数据团队之间的关键对话。'
- en: '**Embed responsibility from day one** : Do not treat ethics and governance
    as an afterthought. Use the pillars of RAI and the implementation frameworks,
    such as Model Cards and System Cards, as mandatory steps in your development process.
    Proactively consider the unique risks of LLMs and the evolving regulatory landscape
    to build trust.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从第一天开始嵌入责任**：不要将伦理和治理视为事后之想。将RAI的支柱和实施框架，如模型卡和系统卡，作为开发过程中的强制性步骤。积极考虑LLM的独特风险和不断变化的监管环境，以建立信任。'
- en: '**Learn from the case studies** : Study both the successful and the failed
    case studies. Use the lessons from the failed predictive maintenance of PoC (such
    as unclear problem definition and poor data quality) as a diagnostic checklist
    to avoid the same pitfalls in your own organization.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从案例研究中学习**：研究成功和失败的案例研究。将来自PoC（如问题定义不明确和数据处理质量差）失败的预测性维护的教训作为诊断清单，以避免在自己的组织中重蹈覆辙。'
- en: '**Think end-to-end lifecycle** : A successful PoC is only the beginning. Reflect
    on how a project will move from prototype to a scalable, production system using
    the MLOps, LLMOps, and AI agent principles. Consider how these optimized, repeatable
    processes connect to your long-term enterprise strategy and enhance your organization’s
    entire AI maturity and governance model.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**思考端到端生命周期**：成功的PoC只是开始。反思项目如何从原型过渡到可扩展、生产系统，使用MLOps、LLMOps和AI代理原则。考虑这些优化、可重复的过程如何与你的长期企业战略相连接，并增强你组织的整个AI成熟度和治理模型。'
