  type: TYPE_NORMAL
  zh: 使用的约定
- en: There are a number of text conventions used throughout this book.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用了多种文本约定。
- en: '**Bold** : Indicates a new term, an important word, or words that you see on
    the screen, for example, in menus or dialog boxes. For example: “The primary models
    considered are **Infrastructure as a Service** ( **IaaS** ), **Platform as a Service**
    ( **PaaS** ), **Software as a Service** ( **SaaS** ), and **Container as a Service**
    ( **CaaS** ). Each of these models presents a unique set of trade-offs in terms
    of operational effort, flexibility, and cost.”'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**粗体**：表示新术语、重要词汇或您在屏幕上看到的词汇，例如在菜单或对话框中。例如：“考虑的主要模型是 **基础设施即服务** ( **IaaS**
    )、**平台即服务** ( **PaaS** )、**软件即服务** ( **SaaS** ) 和 **容器即服务** ( **CaaS** )。这些模型在运营努力、灵活性和成本方面都提供了一套独特的权衡。”'
- en: Warnings or important notes appear like this.
  id: totrans-47
