- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: Creating Your Center for Enablement
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建您的赋能中心
- en: The **Center for Enablement (C4E)** plays a pivotal role in empowering individuals
    and teams to embark on their digital transformation journey within the Power Platform.
    It serves as a safe space where people can explore, experiment, and create innovative
    solutions without fear of failure. By providing training, resources, and support,
    the C4E enables users to unlock the full potential of the Power Platform and drive
    meaningful change in their organizations.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**赋能中心（C4E**）在使个人和团队在Power Platform中开始他们的数字化转型之旅中发挥着关键作用。它是一个安全的空间，人们可以探索、实验并创造创新解决方案，无需担心失败。通过提供培训、资源和支持，C4E使用户能够充分发挥Power
    Platform的潜力，并在他们的组织中推动有意义的变革。'
- en: At the C4E, individuals have the opportunity to enhance their skills and proficiency
    in utilizing the Power Platform’s suite of tools. Through comprehensive training
    programs and workshops, users can learn how to design, develop, and deploy applications,
    automate processes, and gain insights from data. The C4E fosters a learning environment
    that encourages continuous growth and knowledge sharing, ensuring that individuals
    are equipped with the necessary expertise to navigate the digital landscape with
    confidence.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在C4E，个人有机会提升他们在使用Power Platform工具套件方面的技能和熟练度。通过全面的培训计划和研讨会，用户可以学习如何设计、开发和部署应用程序，自动化流程，并从数据中获得洞察。C4E营造了一个鼓励持续增长和知识分享的学习环境，确保个人具备必要的专业知识，以自信地驾驭数字景观。
- en: Moreover, the C4E serves as a hub for collaboration and innovation, bringing
    together individuals from diverse backgrounds and skill sets. It provides a platform
    for cross-functional teams to collaborate, share ideas, and co-create solutions
    that address complex business challenges. By upholding a culture of inclusivity
    and collaboration, the C4E enables organizations to harness the collective intelligence
    and creativity of their workforce, driving digital transformation and facilitating
    a culture of continuous improvement.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，C4E还作为一个协作和创新中心，汇集了来自不同背景和技能的个人。它为跨职能团队提供了一个协作、分享想法和共创解决方案的平台，以解决复杂的企业挑战。通过维护包容性和协作的文化，C4E使组织能够利用其员工的集体智慧和创造力，推动数字化转型并促进持续改进的文化。
- en: 'We will cover the following topics in the chapter:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Creating avenues for innovation and exploration within C4E
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在C4E中创造创新和探索的途径
- en: Enabling individuals to unleash creativity with IT governance.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过IT治理使个人能够释放创造力。
- en: Encouraging innovation and co-creation for digital transformation
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼓励创新和共创以实现数字化转型
- en: 'Nurturing Creativity: Creating Avenues for Innovation and Exploration within
    C4E'
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 培养创造力：在C4E中创造创新和探索的途径
- en: In the past, we would often refer to the Power Platform central governance team
    as the “Center of Excellence”. At the time, this was a fair point to make because
    that’s exactly what it was. The Center of Excellence or CoE were the team of people
    who defined best practices and governed the power Platform Assets and technology
    stack. This was supported by a custom tool Microsoft released called the Power
    Platform **Center of Excellence** (**CoE**) Starter Kit, which provided many monitoring,
    governance and nurture tools, which assisted administrators with their management
    of the platform.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，我们经常将Power Platform中央治理团队称为“卓越中心”。在当时，这是一个合理的说法，因为这正是它的角色。卓越中心或CoE是由定义最佳实践并管理Power
    Platform资产和技术堆栈的人员组成的团队。这得到了微软发布的一个自定义工具——Power Platform **卓越中心**（**CoE**）入门套件的支持，该套件提供了许多监控、治理和培养工具，帮助管理员管理平台。
- en: Although an extremely useful piece of technology, it was assumed that on installing
    the starter kit, all the organization’s governance problems would be solved. Sadly,
    this is NOT the case. To drive *excellence*, software isn’t the only ingredient
    in the recipe. One needs to consider people and processes as well. As this concept
    has become more relevant and more accepted the CoE has morphed into a center for
    Enablement or now known as the C4E. This focuses more on driving behavioral change
    within a maker community by implementing best practice processes and using technology
    as the facilitator for these changes. Ultimately, if people are enabled and shown
    the correct way to do things, there will be less need for hard governance. Ultimately,
    more well-thought-out guidance and enablement like community and training leads
    to less need for administrators to be hands-on and they can focus on enabling
    the wider user base.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这是一项极其有用的技术，但人们认为，一旦安装了入门套件，所有组织的治理问题都会得到解决。遗憾的是，事实并非如此。为了推动**卓越**，软件并不是唯一的配方成分。人们还需要考虑人和流程。随着这一概念变得越来越相关和被接受，CoE已经转变为赋能中心，现在被称为C4E。这更侧重于通过实施最佳实践流程和使用技术作为这些变化的促进者，在制作者社区中推动行为改变。最终，如果人们得到了赋能并展示了正确做事的方式，那么对严格治理的需求就会减少。最终，更多经过深思熟虑的指导和赋能，如社区和培训，会导致管理员不需要亲力亲为，他们可以专注于赋能更广泛的用户基础。
- en: How do you start creating your center for enablement?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何开始创建你的赋能中心？
- en: Creating a safe space for makers
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为制作者创造一个安全的空间
- en: One of the core values of a C4E is to nurture creativity among the makers who
    use the Power Platform to solve business problems and innovate new solutions.
    To encourage this culture of creativity, a C4E needs to create a safe space for
    makers where they can experiment, learn, and collaborate without fear of failure
    or judgment.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: C4E的核心价值之一是培养使用Power Platform解决商业问题和创新新解决方案的制作者们的创造力。为了鼓励这种创造力的文化，C4E需要为制作者们创造一个安全的空间，让他们可以在没有失败或评判的恐惧中实验、学习和合作。
- en: Providing clear and consistent guidance on the governance and compliance policies
    that apply to the Power Platform, such as data security, privacy, accessibility,
    and quality standards is hugely important. The clearer these rules are, the easier
    it will be for people to follow them. A C4E should communicate these policies
    in a transparent and accessible way, using tools like the CoE Starter Kit, Power
    Platform Admin Center, and Microsoft Learn. A C4E should also provide training
    and support for makers to understand and follow these policies and monitor and
    audit their adherence using dashboards and reports. The best form of governance
    is applied when people do not know the platform is being governed and don’t feel
    the need for governance.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 提供关于适用于Power Platform的治理和合规政策的明确和一致指导，例如数据安全、隐私、可访问性和质量标准，这一点非常重要。这些规则越清晰，人们就越容易遵循它们。C4E应通过使用CoE入门套件、Power
    Platform管理员中心和Microsoft Learn等工具，以透明和可访问的方式传达这些政策。C4E还应为制作者提供培训和支持，帮助他们理解和遵循这些政策，并使用仪表板和报告监控和审计他们的遵守情况。当人们不知道平台正在被治理，也不觉得需要治理时，才是最佳治理形式。
- en: We should be encouraging makers to explore the full potential of the Power Platform,
    leveraging its Pro code, low-code and no-code capabilities, integrations with
    other Microsoft products and third-party services, and extensibility with custom
    code and connectors. A C4E should provide makers with access to the latest features
    and updates of the Power Platform, as well as resources and best practices to
    help them learn and improve their skills. A C4E should also showcase successful
    examples and use cases of the Power Platform across the organization and celebrate
    the achievements and innovations of the makers.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该鼓励制作者探索Power Platform的全部潜力，利用其Pro代码、低代码和无代码功能，与其他Microsoft产品和第三方服务的集成，以及通过自定义代码和连接器的可扩展性。C4E应向制作者提供访问Power
    Platform最新功能和更新的权限，以及帮助他们学习和提高技能的资源和方法。C4E还应展示组织内Power Platform的成功案例和使用案例，并庆祝制作者们的成就和创新。
- en: Creating opportunities for makers to collaborate and share their ideas, feedback,
    and experiences with the Power Platform, both within and across teams and departments
    has proven hugely successful in the past. The more collaboration takes place the
    more people are likely to join in and share. A C4E should facilitate communication
    and knowledge sharing among makers, using platforms like Teams, Viva Engage, SharePoint,
    and GitHub. A C4E should also organize events and activities to drive community
    and engagement among makers, such as hackathons, workshops, webinars, and user
    groups.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，为创作者提供机会在 Power Platform 内部以及跨团队和部门协作和分享他们的想法、反馈和经验，已被证明是非常成功的。协作越多，越有可能吸引更多人参与和分享。C4E
    应该利用 Teams、Viva Engage、SharePoint 和 GitHub 等平台，促进创作者之间的沟通和知识共享。C4E 还应组织活动，如黑客马拉松、研讨会、网络研讨会和用户组，以推动创作者之间的社区和参与度。
- en: By creating a safe space for makers, a C4E can encourage the creativity and
    potential of the Power Platform users and empower them to deliver value and impact
    for the organization. The more people use the tools in the platform, the more
    valuable the platform is.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为创作者提供一个安全的空间，C4E 可以鼓励 Power Platform 用户的创造力和潜力，并赋予他们为组织创造价值和影响力的能力。使用平台中的工具的人越多，平台的价值就越大。
- en: A useful analogy is to compare Power Platform to Microsoft Office. People use
    the Office tools every day and these tools allow for people to be more productive,
    for the most part. Power Platform is essentially another business productivity
    tool that will allow people to do their jobs.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有用的类比是将 Power Platform 与 Microsoft Office 进行比较。人们每天都在使用 Office 工具，这些工具使人们能够更有效率地工作。Power
    Platform 实质上是一种另一种商业生产力工具，将允许人们完成他们的工作。
- en: Creating Champions and Advocates
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建冠军和倡导者
- en: A C4E should not only create opportunities for makers, but also identify and
    nurture champions and advocates of the Power Platform within the organization.
    Champions are makers who have demonstrated advanced skills and knowledge of the
    Power Platform, and who are willing to share their expertise and best practices
    with other makers. Advocates are business leaders or influencers who can promote
    the value and benefits of the Power Platform to their peers and stakeholders,
    and who can sponsor and support Power Platform initiatives and projects.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: C4E 不仅应该为创作者创造机会，还应该识别和培养组织内部 Power Platform 的冠军和倡导者。冠军是那些展示了高级技能和对 Power Platform
    的深入了解的创作者，他们愿意与其他创作者分享他们的专业知识和最佳实践。倡导者是商业领袖或影响者，他们可以向同行和利益相关者推广 Power Platform
    的价值和好处，并赞助和支持 Power Platform 的倡议和项目。
- en: 'Creating champions and advocates is crucial for scaling the adoption and impact
    of the Power Platform across the organization. A C4E should establish a clear
    and consistent process for identifying, recognizing, and rewarding champions and
    advocates, based on criteria such as:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 创建冠军和倡导者对于在整个组织中扩大 Power Platform 的采用和影响力至关重要。C4E 应该根据如以下标准建立明确和一致的过程来识别、认可和奖励冠军和倡导者：
- en: The number and quality of Power Platform solutions they have built or contributed
    to. This may be as a singular person or part of a fusion team. Most preferably
    the fusion team option.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们构建或贡献的 Power Platform 解决方案的数量和质量。这可能是一个单独的个人或融合团队的一部分。最理想的是融合团队选项。
- en: The level of engagement and activity they have shown in the maker community,
    such as answering questions, providing feedback, sharing tips and tricks, and
    mentoring new makers. These types of contributions can be tracked through feedback
    and monitoring. It’s important to understand this impact as this will have a direct
    impact on adoption.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们对创作者社区所表现出的参与度和活动水平，例如回答问题、提供反馈、分享技巧和窍门以及指导新创作者。这些类型的贡献可以通过反馈和监控来跟踪。了解这种影响很重要，因为这将对采用产生直接影响。
- en: The impact and outcomes they have achieved or enabled with the Power Platform,
    such as improving efficiency, productivity, customer satisfaction, revenue, or
    innovation. These types of metrics are both qualitative and quantitative.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们使用 Power Platform 实现或促进的影响和成果，例如提高效率、生产力、客户满意度、收入或创新。这些类型的指标既包括定性也包括定量。
- en: The feedback and testimonials they have received from other makers, users, customers,
    or stakeholders. Testimonials and feedback are great, and these makers / champions
    can build up a portfolio.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们从其他创作者、用户、客户或利益相关者那里收到的反馈和证词。证词和反馈是很好的，这些创作者/冠军可以建立自己的作品集。
- en: A C4E should also provide champions and advocates with various opportunities
    and incentives to grow and showcase their skills and influence. Again, a mechanism
    for them to build up a portfolio. There are several methods and strategies for
    rewarding these people and for keeping them engaged. It is key to ensure that
    their buy in remains constant. Losing the buy-in from a champion and having them
    leave the program is way worse than losing other people in the program as the
    champions are most visible.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: C4E还应为冠军和倡导者提供各种机会和激励措施，以增长和展示他们的技能和影响力。再次强调，为他们建立一个作品集的机制。有几种方法和策略来奖励这些人并保持他们的参与度。确保他们的承诺保持一致至关重要。失去冠军的承诺并让他们离开项目，比失去项目中的其他人员要糟糕得多，因为冠军是最显眼的。
- en: 'Giving champions access to advanced training and certification programs, such
    as Microsoft Learn, Power Platform Academy, or Microsoft Certified: Power Platform
    Developer Associate ensures that they are up to date with the most relevant content
    and technology updates.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为冠军提供高级培训和认证项目，例如微软学习、Power平台学院或微软认证：Power平台开发人员助理，确保他们能够跟上最相关的内容和技术更新。
- en: Including champions in Invitations to exclusive events and webinars, such as
    Microsoft Ignite, Power Platform Community Conference, or Power Platform User
    Groups has turned out to be a great way to keeping engagement. In fact, many champions
    have gotten on stage at these events and shared stories. This is a great way to
    highlight the innovative nature of your organization.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将冠军纳入邀请参加独家活动和网络研讨会，例如微软Ignite、Power平台社区会议或Power平台用户组，已成为保持参与度的一种极好方式。事实上，许多冠军在这些活动中登台分享故事。这是突出你组织创新性质的一种极好方式。
- en: Generating recognition and visibility on internal and external platforms, such
    as newsletters, blogs, podcasts, social media, or Microsoft Power Platform Community
    is a great way to share people’s achievements. Obviously, ensure that there is
    consent from the person and the business/ Many of the Power Platform champions
    have been featured by Microsoft in articles, video content and some have even
    been on stage with Microsoft leadership teams. Support and sponsorship for speaking
    or presenting at internal or external events, such as town halls, showcases, demos,
    or conferences really is a great reward for hard work.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在内部和外部平台上生成认可和可见性，例如通讯、博客、播客、社交媒体或微软Power平台社区，是分享人们成就的一种极好方式。显然，确保有个人和业务/的同意。许多Power平台冠军已被微软在文章、视频内容中介绍，甚至有些人曾与微软领导团队合作登台。支持和对在内部或外部活动（如市政厅、展示、演示或会议）发表演讲或展示的支持，真的是对辛勤工作的极大奖励。
- en: Microsoft often release functionality and content early to certain smaller groups
    for testing. Getting this feedback from the community is crucial to the way products
    are built and released. Participation in feedback and beta testing programs, such
    as Microsoft Power Platform Adoption program, or Microsoft Product Feedback Loop
    is extremely valuable to champions as they get hands on with the products early
    and have much better knowledge of the roadmap. This is highly beneficial to them,
    the C4E and the organization.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微软经常提前向某些较小的群体发布功能内容进行测试。从社区获得这些反馈对于产品的构建和发布方式至关重要。参与反馈和测试计划，如微软Power平台采用计划或微软产品反馈循环，对冠军来说非常有价值，因为他们可以早期接触产品，并对路线图有更深入的了解。这对他们、C4E和组织都非常有好处。
- en: By creating champions and advocates, a C4E can leverage the power of peer-to-peer
    learning and influence and create a culture of empowerment and innovation with
    the Power Platform. Champions and advocates can help drive the adoption and usage
    of the Power Platform, inspire and mentor other makers, and demonstrate the value
    and impact of the Power Platform to the organization.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创建冠军和倡导者，C4E可以利用同伴学习和影响力的力量，利用Power平台创造一种赋权和创新的氛围。冠军和倡导者可以帮助推动Power平台的采用和使用，激励和指导其他创作者，并向组织展示Power平台的价值和影响。
- en: Ultimately, your champions and advocates network become the core to the “People”
    part of your C4E.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，你的冠军和倡导者网络成为C4E“人员”部分的核心。
- en: Driving enthusiasm and encouraging creativity
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 激发热情和鼓励创造力
- en: One of the key challenges of a C4E is to drive and create enthusiasm for the
    Power Platform in an organization. This is extremely important as the more widely
    the platform is used, the more valuable it becomes. As people feel inspired to
    use the platform to solve problems, they will become a driving force in its wider
    adoption. Driving this enthusiasm takes place in many forms and there are several
    things that can be done to promote this creativity.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: C4E的一个关键挑战是在组织中推动和创造对Power Platform的热情。这一点非常重要，因为平台的使用越广泛，它就越有价值。当人们感到受到启发，使用平台来解决问题时，他们将成为其更广泛采用的动力。这种热情可以通过多种形式来推动，并且有几种方法可以用来促进这种创造力。
- en: Ultimately, people need to be excited to do something that will help them. Power
    Platform needs to be seen as a tool that is AWESOME not something that is a chore.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，人们需要对他们将要做的有助于自己的事情感到兴奋。Power Platform需要被视为一个令人惊叹的工具，而不是一项繁琐的任务。
- en: Communicating the vision and benefits of the Power Platform to different stakeholders,
    such as business leaders, IT professionals, and end users is one of the most important
    first steps. A C4E can showcase how the Power Platform can help solve business
    problems, improve efficiency, and foster innovation across the organization. A
    great way of articulating this is by leveraging the standard monitoring in the
    CoE starter kit to show the actual live use of the various assets.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 向不同的利益相关者传达Power Platform的愿景和好处，例如商业领导者、IT专业人士和最终用户，这是最重要的第一步之一。C4E可以展示Power
    Platform如何帮助解决业务问题、提高效率和在整个组织内促进创新。通过利用CoE入门套件中的标准监控功能来展示各种资产的实际实时使用，这是一种阐述这一点的绝佳方式。
- en: By providing learning opportunities and resources for potential and existing
    makers, such as training sessions, workshops, Hackathons, webinars, documentation,
    videos, blogs, and forums, you will show your community that this is something
    the organization has invested in. A C4E can also leverage the Microsoft Learn
    platform, which offers free online courses and certifications for the Power Platform.
    We have found that when internal C4E team members and the maker and champions
    community generate their own specialized content for the team, it is more widely
    adopted and leveraged.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为潜在和现有创作者提供学习机会和资源，例如培训课程、研讨会、黑客马拉松、网络研讨会、文档、视频、博客和论坛，你将向你的社区展示，这是组织已经投入的。C4E还可以利用Microsoft
    Learn平台，该平台为Power Platform提供免费在线课程和认证。我们发现，当内部C4E团队成员和创作者及倡导者社区为团队生成自己的专用内容时，这些内容被更广泛地采用和利用。
- en: Similarly to the champions, recognizing and rewarding the achievements and contributions
    of makers, such as creating badges, certificates, awards, or incentives is a great
    way to drive enthusiasm and it also gets other people into the spotlight. A C4E
    can also celebrate and promote the success stories and best practices of makers,
    such as featuring their apps and solutions on newsletters, intranets, or social
    media. Celebrating the success of the maker community will likely attract others
    to the community and to participate.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 与倡导者类似，认可和奖励创作者的成就和贡献，例如创建徽章、证书、奖项或激励措施，是激发热情的绝佳方式，它也能让其他人成为焦点。C4E还可以庆祝和推广创作者的成功故事和最佳实践，例如在通讯、内部网或社交媒体上突出他们的应用程序和解决方案。庆祝创作者社区的成功可能会吸引其他人加入社区并参与其中。
- en: Creating a community of practice and collaboration among makers, such as forming
    user groups, clubs, or networks is one of the most useful and important aspects
    of a C4E. A C4E can also facilitate the exchange of ideas, feedback, and support
    among makers, such as hosting hackathons, events, or competitions. The more feedback
    and collaboration that can be gathered, the more likely it is that the community
    will grow. In fact, based on experience, it has proven that hackathons have been
    one of the MOST effective ways to drive enablement, engagement and enthusiasm.
    Getting people together in a creative setting and getting them to work together
    to build something useful has shown that fusion teams are one of the most effective
    ways to get something built at a rapid pace, that best solves the problem.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在制作者之间建立实践社区和协作，例如成立用户组、俱乐部或网络，是 C4E 最有用和最重要的方面之一。C4E 还可以促进制作者之间想法、反馈和支持的交流，例如举办黑客马拉松、活动或竞赛。能够收集到的反馈和协作越多，社区增长的可能性就越大。实际上，根据经验，已经证明黑客马拉松是推动能力、参与度和热情的最有效方式之一。在创意环境中聚集人们并让他们一起合作构建有用的东西，已经证明融合团队是快速构建解决问题的最有效方式之一。
- en: Empowering and trusting makers to experiment and explore the Power Platform,
    while providing guidance and governance will SHOW your community that this is
    a strategic area for your business. A C4E should enable makers to access the tools
    and data they need, while ensuring compliance and security standards. Ultimately,
    makers are going to find a way to be creative and to build things, therefore it
    is a better idea to give them the safe space to be creative.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 通过赋予和信任制作者在 Power Platform 上进行实验和探索的能力，同时提供指导和治理，将向您的社区展示这是您业务的一个战略领域。C4E 应该使制作者能够访问他们所需的工具和数据，同时确保合规性和安全标准。最终，制作者将找到一种方法来发挥创造力并构建事物，因此给他们一个安全的空间来发挥创造力是更好的选择。
- en: By driving and creating enthusiasm for the Power Platform, a C4E can inspire
    creativity and innovation in the organization. Creativity involves coming up with
    new, useful and practical ideas that can POTENTIALLY be implemented. Innovation
    is about taking these ideas and making them real! Actually productionizing them
    for others to benefit. What we have seen in Power Platform maker communities is
    people of ALL backgrounds and skill sets, starting to use the tools available
    to create amazing solutions that solve often extremely difficult problems.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 通过推动和创造对 Power Platform 的热情，C4E 可以激发组织中的创造力和创新。创造力涉及提出新颖、有用且实用的想法，这些想法有可能被实施。创新则是将这些想法变为现实！实际上，为他人生产化这些想法，让他们受益。我们在
    Power Platform 制作者社区中看到的是来自所有背景和技能水平的人们开始使用可用的工具来创建解决通常非常困难问题的出色解决方案。
- en: A key aspect of Power Platform is it lets makers work and innovate where they
    are most comfortable. Whether they chose to use the tools as they are without
    writing any code, to full on high code development. Now with the fusion of AI
    and copilot into the platform, makers can be even more creative. There has been
    an influx of solutions that are not JUST apps. Now makers are starting to use
    copilot studio to create conversational user experiences on their data. And not
    just data from the Microsoft stack, but data from other line of business solutions.
    This means that data from pretty much any solution that has an API can be connected
    too. This is how Microsoft has brought us the ability to microservice our data
    wherever it is, not just within the Microsoft ecosystem.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 的一个关键特性是它允许制作者在他们最舒适的地方工作和创新。无论是选择直接使用工具而不编写任何代码，还是进行全栈式的高代码开发。现在随着
    AI 和协同驾驶程序融入平台，制作者可以更加富有创造力。出现了大量不仅仅是应用程序的解决方案。现在制作者开始使用协同驾驶程序工作室来创建基于他们数据的对话式用户体验。而且不仅仅是来自微软堆栈的数据，还有来自其他业务线解决方案的数据。这意味着几乎任何具有
    API 的解决方案的数据都可以连接。这就是微软如何让我们能够将数据微服务化，无论数据在哪里，而不仅仅是微软生态系统内部。
- en: We are seeing makers think more outside the box now. In the past we have been
    wedded to this concept of “An App” which has an interface that we interact with
    but one of the most innovative approaches that many makers have adopted is leveraging
    automation to make those manual tasks a whole lot less manual. In most of the
    ecosystems that we work within, there is almost always more automations than applications.
    This is because sometimes the best user interface is NO user interface.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在看到制作者们更加跳出思维定式。在过去，我们一直执着于“一个应用”的概念，这个应用有一个我们与之交互的界面，但许多制作者采用的最具创新性的方法之一是利用自动化来使那些手动任务变得更加自动化。在我们工作的大多数生态系统中，几乎总是自动化工具多于应用程序。这是因为有时最好的用户界面就是没有用户界面。
- en: Organizations should promote a culture that will encourage makers to identify
    and prioritize the business problems or opportunities that they want to address
    with the Power Platform, and to define the goals and metrics of their apps and
    solutions. This type of ideation process is normally done best in a workshop type
    environment, where people closest to the problem can share struggles and requirements
    and even build out prototypes if needed.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 组织应推广一种文化，鼓励制作者识别和优先考虑他们希望使用 Power Platform 解决的业务问题或机会，并定义他们应用程序和解决方案的目标和指标。这种类型的构思过程通常在研讨会环境中进行得最好，在那里最接近问题的人可以分享他们的挑战和需求，并在必要时构建原型。
- en: It’s important to challenge makers to think outside the box and explore different
    possibilities and alternatives with the Power Platform, and to seek feedback and
    validation from users and stakeholders. The platform is ever changing and with
    the introduction of AI tools, rethinking ways of working is even more important.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励制作者跳出思维定式，使用 Power Platform 探索不同的可能性和替代方案，并从用户和利益相关者那里寻求反馈和验证非常重要。平台在不断变化，随着
    AI 工具的引入，重新思考工作方式变得更加重要。
- en: As a C4E team it’s critical to support makers to iterate and improve their apps,
    automations and solutions based on data and feedback, and to share their learnings
    and findings with others. The introduction of clear feedback mechanisms and monitoring
    will help makers understand what to do next based on what works and doesn’t work.
    Generating your C4E team should be top of Mind and a high priority. You can see
    the example of a C4E team represented in *Figure 4**.1* as an example of what
    your team may look like.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 作为 C4E 团队，支持制作者根据数据和反馈迭代和改进他们的应用程序、自动化和解决方案，并与他人分享他们的学习和发现至关重要。引入清晰的反馈机制和监控将帮助制作者根据什么有效和什么无效来理解下一步该做什么。组建您的
    C4E 团队应该是首要任务和高优先级。您可以在 *图 4.1* 中看到 C4E 团队的示例，作为您团队可能的样子。
- en: '![Figure 4.1: Example of a center for Enablement team and skills](img/B21080_04_001.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.1：启用团队和技能中心的示例](img/B21080_04_001.jpg)'
- en: 'Figure 4.1: Example of a center for Enablement team and skills'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.1：启用团队和技能中心的示例
- en: The evolution from the traditional CoE to the modern C4E focuses on nurturing
    creativity and innovation within the Power Platform community. The C4E’s core
    values include creating a safe space for makers to experiment, learn, and collaborate
    without fear of judgment, providing resources for makers to explore the full potential
    of the Power Platform, and cultivating a community of practice and collaboration.
    Additionally, the C4E identifies and nurtures champions and advocates of the Power
    Platform, establishing a process for recognizing and rewarding their contributions.
    Furthermore, creating enthusiasm and promoting creativity is essential in driving
    the wider adoption and usage of the Power Platform, encouraging makers to think
    outside the box and seek feedback and validation from users and stakeholders.
    Ultimately, the C4E plays a vital role in empowering and supporting makers to
    deliver value and impact within the organization. In the next section we will
    explore how to enable guided empowerment and how to help your power platform community
    get involved.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 从传统的 CoE 向现代 C4E 的演变，重点是培养 Power Platform 社区内的创造力和创新。C4E 的核心价值观包括为制作者提供一个安全的空间进行实验、学习和合作，无需担心评判，为制作者提供资源以探索
    Power Platform 的全部潜力，以及培养实践和协作的社区。此外，C4E 识别并培养 Power Platform 的倡导者和冠军，建立认可和奖励他们贡献的程序。此外，激发热情和促进创造力对于推动
    Power Platform 的更广泛采用和使用至关重要，鼓励制作者跳出思维定式，并从用户和利益相关者那里寻求反馈和验证。最终，C4E 在赋予制作者权力和支持他们在组织中创造价值和影响方面发挥着至关重要的作用。在下一节中，我们将探讨如何实现指导性赋权以及如何帮助您的
    Power Platform 社区参与进来。
- en: Enabling individuals to unleash creativity with IT governance
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过IT治理赋能个人释放创造力
- en: How can you enable your Power Platform makers to let loose their creativity
    and innovation, while ensuring compliance and security with IT governance? This
    is the question that this section will address, by introducing the concept of
    guided empowerment and its benefits for both makers and the organization.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何让你的Power Platform制作者释放他们的创造力和创新，同时确保与IT治理的合规性和安全性？这个问题本节将通过介绍引导赋权及其对制作者和组织的益处来解答。
- en: In this section, we will explore how to balance the need for IT governance and
    the desire for maker empowerment with the Power Platform. We will introduce the
    idea of guided empowerment, which is a way of providing makers with the freedom
    and support to create impactful solutions, while also aligning them with IT best
    practices and policies.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨如何使用Power Platform平衡对IT治理的需求和对制作者赋权的渴望。我们将介绍引导赋权的概念，这是一种为制作者提供自由和支持以创建有影响力的解决方案的方法，同时使它们与IT最佳实践和政策保持一致。
- en: It can be a balancing act and it’s important to ensure that the governance and
    risk rules of the business are respected, AND that makers are given the room and
    freedom to build things that are useful but SAFE.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是一种平衡行为，并且确保业务的管理和风险规则得到尊重，并且给予制作者足够的空间和自由去构建有用且安全的东西是非常重要的。
- en: Creating an environment of enablement
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建一个赋能的环境
- en: An environment of enablement is one that empowers individuals to express their
    creativity and potential with the Power Platform, while ensuring alignment with
    IT governance and best practices. It is important that ALL parties are comfortable
    with the governance and guidance framework and processes that have been set up.
    Typically, there can be rifts between what is technically possible in the platform
    and the expectations, therefore communication and setting expectations up front
    is important.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一个赋能的环境是赋予个人使用Power Platform表达他们的创造力和潜能的能力，同时确保与IT治理和最佳实践保持一致。重要的是所有相关方都应舒适于已经建立的管理和指导框架及流程。通常，平台在技术上可能可行与期望之间存在分歧，因此沟通和提前设定期望非常重要。
- en: The first step is to Identify and engage the makers in your organization who
    are interested in using the Power Platform to solve business problems or improve
    processes. Provide them with resources, guidance, and support to help them get
    started and learn the basics of the platform. This can be done by leveraging the
    CoE Starter Kit, which lists top makers. By interacting with all these people,
    your C4E will quickly develop a community of engaged people and potential champions
    for your champions’ network.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是识别并吸引那些对使用Power Platform解决业务问题或改进流程感兴趣的组织的制作者。为他们提供资源、指导和支持，帮助他们开始并学习平台的基础知识。这可以通过利用CoE启动套件来实现，该套件列出了顶级制作者。通过与所有这些人互动，你的C4E将迅速发展成为一个积极参与的社区，并成为你冠军网络的潜在冠军。
- en: 'What are the rules people need to follow? Establish and communicate clear policies
    and guidelines for using the Power Platform, such as naming conventions, security
    roles, data sources, app sharing, and approval processes. Use the Power Platform
    admin center and the Center of Excellence (CoE) toolkit to manage and monitor
    the platform usage and performance across your organization. The earlier you establish
    these rules, the better. It’s important to understand:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 人们需要遵循哪些规则？建立并传达使用Power Platform的明确政策和指南，例如命名约定、安全角色、数据源、应用共享和审批流程。使用Power Platform管理中心和卓越中心（CoE）工具包来管理并监控你组织中的平台使用和性能。越早建立这些规则越好。重要的是要理解：
- en: What people are making?
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们正在制作什么？
- en: Where are people making things?
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们在哪里制作东西？
- en: Who is making things?
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谁在制作东西？
- en: Understanding these three things will allow you to set up your ecosystem in
    a manner that best supports your makers. In *Figure 4**.2* is an example of the
    monitoring of the CoE starter kit we can see the number of apps and flows built
    in certain environments.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这三件事将使你能够以最佳方式设置你的生态系统，以最好地支持你的制作者。在*图4*.*2*中，我们可以看到一个关于CoE启动套件监控的例子，我们可以看到在特定环境中构建的应用和流程的数量。
- en: '![Figure 4.2: Center of Excellence Starter kit opening dashboard.](img/B21080_04_002.jpg)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图4.2：卓越中心启动套件打开仪表板。](img/B21080_04_002.jpg)'
- en: 'Figure 4.2: Center of Excellence Starter kit opening dashboard.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2：卓越中心启动套件打开仪表板。
- en: What are people making?
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人们正在制作什么？
- en: If you know what people are making then these as a C4E team, you can apply the
    right levels of support and governance to these solutions. Offering support to
    solutions that are more complex or critical and less support to solutions that
    may not be as critical is a great use of resources. Not every solution is made
    equal.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您知道人们正在创建什么，那么作为一个 C4E 团队，您可以对这些解决方案应用适当的支持和管理级别。为更复杂或关键的解决方案提供支持，而对可能不那么关键的解决方案提供较少支持，这是一种很好的资源利用方式。并非每个解决方案都是平等的。
- en: Where are people making?
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人们在哪里创造？
- en: Not all environments are made equal. Things created in the default environment
    should not be given all the support from IT. It’s important to ensure that solutions
    are ring fenced within environments and this will be reflective of your environment
    strategy.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有环境都是平等的。在默认环境中创建的事物不应得到 IT 的全部支持。确保解决方案在环境中得到隔离，这将反映您的环境策略。
- en: Who is making?
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谁在创造？
- en: Understanding and defining your maker archetypes is essential to providing a
    safe space to makers. Less experienced makers require more stringent governance
    as they may not know that they are potentially doing something wrong. More experienced
    makers may have access to premium environments where they can build more freely.
    It’s important to help people discover the right pathway for themselves and to
    guide them as much as possible.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和定义您的创造者原型对于为创造者提供一个安全的空间至关重要。经验较少的创造者需要更严格的治理，因为他们可能不知道他们可能正在做错事。经验较丰富的创造者可能有权访问高级环境，在那里他们可以更自由地构建。帮助人们发现适合自己的正确路径，并在尽可能多的方面引导他们，这是非常重要的。
- en: If a culture of collaboration and knowledge sharing among the makers and other
    stakeholders, such as IT professionals, business analysts, and end users, is created,
    then makers are more likely to join the community. Leverage the existing Microsoft
    communities and forums, such as the Power Platform Community, the Tech Community,
    and the User Groups, to connect with other makers and experts around the world,
    then build on this. This will drive people to self-learn and become enabled to
    create useful things and troubleshoot problems without having to contact a support
    desk.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在创造者和其他利益相关者，如 IT 专业人员、业务分析师和最终用户之间建立了一种协作和知识共享的文化，那么创造者更有可能加入社区。利用现有的 Microsoft
    社区，如 Power Platform 社区、技术社区和用户组，与其他全球创造者和专家建立联系，然后在此基础上构建。这将推动人们自学，并使他们能够在没有联系支持台的情况下创建有用的事物和解决问题。
- en: By shifting to a “learn it all” culture and by providing collaboration platforms
    and guidance, you can create an environment focused on Power Platform enablement,
    where people are motivated and capable of building useful and valuable solutions
    and learning along the way.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 通过转向“学习一切”的文化，并通过提供协作平台和指导，您可以创造一个专注于 Power Platform 使能的环境，在这里人们有动力和能力构建有用且有价值的应用，并在过程中学习。
- en: Ensuring data and people are safe
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 确保数据和人员安全
- en: Data and people are ALWAYS top of mind when building solutions with the Power
    Platform. It’s important to understand that data is a digital representation of
    YOU, your business and your customers so we MUST look after it and respect it.
    Data leaks do happen and sadly not everyone has the best intentions. We must always
    ensure that we have the correct people, processes and platforms in place that
    will ensure people and data are respected. One of the simplest ways to begin is
    to look at the CoE starter kit Power BI report and understand wat connectors are
    being used. This is visible in *Figure 4**.3.*
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 Power Platform 构建解决方案时，数据和人员始终是首要考虑的因素。重要的是要理解数据是您、您的业务和您的客户的数字表示，因此我们必须保护好它并尊重它。数据泄露确实会发生，遗憾的是并非每个人都怀有最好的意图。我们必须始终确保我们有正确的人员、流程和平台，以确保人们和数据得到尊重。开始的一个简单方法就是查看
    CoE 入门套件 Power BI 报告，了解正在使用哪些连接器。这在 *图 4.3* 中可见。
- en: '![Figure 4.3: Power Automate Connector Review in the Power BI CoE Starter kit
    report](img/B21080_04_003.jpg)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.3：Power BI CoE 入门套件报告中的 Power Automate 连接器审查](img/B21080_04_003.jpg)'
- en: 'Figure 4.3: Power Automate Connector Review in the Power BI CoE Starter kit
    report'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.3：Power BI CoE 入门套件报告中的 Power Automate 连接器审查
- en: Once you understand the connectors, create an organization wide data policy
    and block the connectors NOT being used! This is managed through the Power Platform
    Admin center and is a fantastic way to stop connector sprawl within the ecosystem.
    In *Figure 4**.4* you can see that MANY unused connectors are left in the blocked
    list and makers will not be allowed to build solutions with these.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您了解了连接器，创建一个组织范围内的数据策略并阻止未使用的连接器！这是通过 Power Platform 管理中心管理的，这是在生态系统中停止连接器蔓延的绝佳方式。在*图
    4.4*中，您可以看到许多未使用的连接器被列入了阻止列表，制作者将不允许使用这些连接器来构建解决方案。
- en: '![Figure 4.4: Blocking connectors with a tenant wide Data policy in the Power
    Platform Admin Center](img/B21080_04_004.jpg)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![Figure 4.4: 在 Power Platform 管理中心使用租户范围的数据策略阻止连接器](img/B21080_04_004.jpg)'
- en: 'Figure 4.4: Blocking connectors with a tenant wide Data policy in the Power
    Platform Admin Center'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '图 4.4: 在 Power Platform 管理中心使用租户范围的数据策略阻止连接器'
- en: Essentially, if people feel as if they can easily make a mistake and put the
    organization at risk, it will become more difficult for them to build on the platform
    as they will be nervous about making that mistake. Hard governance is important
    but doesn’t always need to be overly visible.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 实质上，如果人们感觉他们可以轻易犯错并使组织处于风险之中，那么他们将在平台上构建时变得更加困难，因为他们会担心犯那个错误。硬治理很重要，但并不总是需要过于明显。
- en: There will always be a need for hard governance and soft governance in any ecosystem.
    The point is, it’s important to know when to apply each one. Hard governance will
    be a physically enforced guardrail, like using Data Policies to block a connector
    and soft governance will be guidance and learning based. There should be a mix
    of the 2.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何生态系统中，始终需要硬治理和软治理。关键是知道何时应用每一种。硬治理将是一个物理执行的护栏，例如使用数据策略来阻止连接器，而软治理将是基于指导和学习的。应该混合使用这两种方法。
- en: Establish clear policies and governance for the use of the Power Platform in
    your organization. Define the roles and responsibilities of the makers, admins,
    and end-users, and enforce the appropriate permissions and security settings.
    Educate the makers on the best practices and standards for developing and deploying
    solutions and monitor their compliance and performance. The right team in place
    will ensure that governance and guidance is adhered to.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的组织中建立明确的政策和治理，以使用 Power Platform。定义制作者、管理员和最终用户的角色和责任，并执行适当的权限和安全设置。教育制作者了解开发和部署解决方案的最佳实践和标准，并监控他们的合规性和性能。组建正确的团队将确保治理和指导得到遵守。
- en: Protect the data sources and connectors that the Power Platform accesses and
    integrates. Ensure that the data is securely stored, encrypted, and backed up,
    and that the access rights and data policies are consistent across the different
    platforms and applications. Use **data loss prevention** (**DLP**) policies to
    prevent the leakage or misuse of sensitive or confidential data and audit the
    data flows and usage regularly. An important point to make here is educating makes
    in the type of data they are building with. Often the maker community may not
    even understand that putting private data (**personally identifiable information**
    or **PII**) into tools such as excel, and SharePoint may be considered as risky.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 保护 Power Platform 访问和集成的数据源和连接器。确保数据安全存储、加密和备份，以及在不同平台和应用程序中访问权限和数据策略的一致性。使用**数据丢失预防**（**DLP**）策略来防止敏感或机密数据的泄露或滥用，并定期审计数据流和用法。这里的一个重要观点是教育制作者了解他们正在使用的数据类型。通常，制作者社区甚至可能不理解将私人数据（**个人可识别信息**或**PII**）放入
    Excel 和 SharePoint 等工具中可能被视为风险。
- en: Empower the makers to build solutions that are secure, reliable, and scalable.
    Provide them with the tools and resources to test, debug, and troubleshoot their
    solutions, and to address any issues or errors that may arise. Encourage them
    to use pre-built templates, components, and connectors that have been verified
    and approved by the admins or the Microsoft community. Support them to update
    and maintain their solutions as the requirements and technologies evolve.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 授权制作者构建安全、可靠和可扩展的解决方案。为他们提供测试、调试和故障排除解决方案的工具和资源，并解决可能出现的任何问题或错误。鼓励他们使用由管理员或微软社区验证和批准的预构建模板、组件和连接器。支持他们根据需求和技术的演变更新和维护他们的解决方案。
- en: Driving people to learn and grow
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 驱动人学习和成长
- en: One of the key benefits of the Power Platform is that it enables people to learn
    and grow by building their own solutions without depending on specialized developers
    or IT professionals. Sure, fusion teams have grown out of this exact need, but
    there is nothing stopping people getting started on their own. However, this also
    means that the organization needs to create an environment where people are motivated
    and supported to focus on their own learning and development, and to leverage
    the full potential of the Power Platform.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 的一个关键优势是它使人们能够通过构建自己的解决方案来学习和成长，而无需依赖专业的开发人员或 IT 专业人员。当然，融合团队正是出于这种需求而发展起来的，但没有任何东西阻止人们自己开始。然而，这也意味着组织需要创造一个环境，让人们能够被激励和支持，专注于自己的学习和成长，并充分发挥
    Power Platform 的潜力。
- en: Culture is always something that will be considered top of mind when encouraging
    learning and growth. Create a culture of curiosity and experimentation. Encourage
    people to explore the Power Platform and its features, and to try out different
    scenarios and possibilities. Celebrate the successes and learn from the failures.
    Reward the learners who share their knowledge and insights with others, and who
    seek feedback and improvement. The idea of failing fast can be tough to get used
    to but that’s essentially what innovation is all about! Trying things out and
    finding what works best to solve a problem. Power Platform has just added more
    tools to our kitbag.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 文化始终是鼓励学习和成长时需要考虑的首要因素。营造一种好奇心和实验的文化。鼓励人们探索 Power Platform 及其功能，并尝试不同的场景和可能性。庆祝成功，从失败中学习。奖励那些与他人分享知识和见解、寻求反馈和改进的学习者。快速失败的想法可能难以适应，但这正是创新的核心！尝试新事物，找到最佳解决方案。Power
    Platform 已经为我们增添了更多工具。
- en: It’s important to provide clear guidance and expectations. Define the roles
    and responsibilities of the makers, admins, and end-users, and communicate the
    best practices and standards for creating and using solutions. These best practices
    may not necessarily be physical rules that need to be adhered to, they may be
    concepts such as “Personal Development Days” where makers get time to learn and
    grow themselves. OR group training days where people can potentially attend hackathons
    or explore concepts outside of their specific remit. This has worked extremely
    well in the past and many organizations promote a culture of self-learning.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 提供明确的指导和期望非常重要。定义制作者、管理员和最终用户的角色和责任，并传达创建和使用解决方案的最佳实践和标准。这些最佳实践可能不一定需要遵守的物理规则，它们可能是像“个人发展日”这样的概念，制作者可以利用这些时间学习和成长。或者团体培训日，人们可以参加黑客马拉松或探索他们特定职责之外的概念。这在过去非常有效，许多组织都推广自我学习的文化。
- en: Create a space where people can connect, collaborate, and co-create solutions
    using the Power Platform. Provide opportunities for peer-to-peer learning, mentoring,
    and coaching. Leverage the existing Microsoft communities and resources, such
    as forums, blogs, webinars, and events, and encourage people to participate and
    contribute. Recognize and showcase the achievements and innovations of the makers
    and inspire others to follow their example.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个人们可以使用 Power Platform 连接、协作和共同创造解决方案的空间。提供同伴学习、导师制和辅导的机会。利用现有的 Microsoft
    社区和资源，例如论坛、博客、网络研讨会和活动，并鼓励人们参与和贡献。认可和展示制作者的成就和创新，并激励他人效仿。
- en: By creating an environment where people focus on their own learning and growth,
    the organization can empower them to leverage the Power Platform and to transform
    the way they work and solve problems. This can lead to more innovation, efficiency,
    and customer satisfaction, and ultimately, to digital transformation.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创造一个让人们专注于自己学习和成长的环境，组织可以赋权他们利用 Power Platform 并改变他们工作和解决问题的方式。这可以导致更多的创新、效率和客户满意度，最终实现数字化转型。
- en: This section aims to address the question of how to empower Power Platform makers
    to innovate while maintaining compliance and security with IT governance. The
    concept of guided empowerment is introduced, emphasizing the need to balance IT
    governance with maker empowerment. Key points include identifying and engaging
    makers, establishing clear policies and guidelines, and fostering a culture of
    collaboration and knowledge sharing. Additionally, the section highlights the
    importance of ensuring data and people’s safety, driving learning and growth,
    and creating a supportive environment for individuals to leverage the Power Platform
    effectively. In the next section we will explore mechanisms to build the foundation
    for innovation and co-creation.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 本节旨在探讨如何赋权Power Platform制作者进行创新，同时保持与IT治理的合规性和安全性。引入了指导赋权的概念，强调需要在IT治理与制作者赋权之间取得平衡。关键点包括识别和参与制作者、建立明确的政策和指南，以及培养协作和知识共享的文化。此外，本节还强调了确保数据和人员安全、推动学习和成长，以及为个人有效利用Power
    Platform创造支持性环境的重要性。在下一节中，我们将探讨构建创新和共创基础机制。
- en: Encouraging innovation and co-creation for digital transformation
  id: totrans-92
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 鼓励数字化转型中的创新和共创
- en: The introduction of Power Platform into the technical and transformation community
    has changed the way in which solutions are thought up and created. In the past,
    often solutions were built by a siloed group of developers who were working off
    a spec of sorts. As an example, an area of the business would share a requirement
    with a specification and the developers would create the solution, hoping that
    they understood the spec correctly. If the spec was not well defined or written
    the output or solution would not be fit for purpose.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform被引入技术和转型社区，改变了解决方案的构思和创建方式。在过去，解决方案通常是由一个孤立的开发者团队根据某种规格来构建的。例如，业务的一个领域会分享一个需求与规格，开发者会创建解决方案，希望他们正确理解了规格。如果规格没有很好地定义或书写，输出或解决方案可能不适合用途。
- en: As low-code development tools, specifically power Platforms, hit the market,
    organizations have been encouraged to allow people closest to the problem to be
    involved in creating these solutions. As mentioned in previous chapters, the person
    closest to the problem is often best able to define the solution and even participate
    in building it.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 随着低代码开发工具，特别是Power Platform，进入市场，组织被鼓励让最接近问题的人参与到这些解决方案的创建中来。如前几章所述，最接近问题的人通常最能定义解决方案，甚至可以参与构建它。
- en: And thus, the concept of the Fusion team was born. A fusion team is a combination
    of people with varying skills, not all technical, who come together to create
    a solution to a problem.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，融合团队的概念应运而生。融合团队是由具有不同技能（不全是技术技能）的人组成的组合，他们聚集在一起为一个问题创造解决方案。
- en: Giving people a platform and a space to engage
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为人们提供一个平台和空间进行互动
- en: One key aspect of establishing a culture of innovation and co-creation is giving
    people a platform and a space to engage with each other and with the Power Platform.
    This can be done by creating communities of practice, where people can share their
    ideas, challenges, solutions, and feedback on using the Power Platform. Communities
    of practice can also provide opportunities for learning, mentoring, recognition,
    and collaboration among peers and experts.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 建立创新和共创文化的关键方面之一是为人提供一个平台和空间，让他们能够相互交流并与Power Platform互动。这可以通过创建实践社区来实现，人们可以在其中分享他们的想法、挑战、解决方案和使用Power
    Platform的反馈。实践社区还可以为学习、指导、认可以及同行和专家之间的协作提供机会。
- en: As ideas, problems and solutions are shared, people with specific skill sets
    or knowledge can engage one another and share information. This is often how these
    fusion teams are born. Someone with domain expertise will share a concept and
    others will identify with eh concept and share knowledge.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 随着想法、问题和解决方案的共享，具有特定技能或知识的人可以相互交流并分享信息。通常，融合团队就是这样诞生的。某个领域专家会分享一个概念，其他人会认同这个概念并分享知识。
- en: This leads to many other opportunities, such as the ability to build out **Minimum
    Viable Products** (**MVPs**) and **Proof** **of Concepts** (**PoCs**). These are
    not considered a full product but rather a part of a solution, containing specific
    aspects of what the full solution could do. Many of these MVPs and PoCs are built
    in innovation-type scenarios such as hackathons and now with Copilot, Promptathons
    (Using natural language prompting techniques and Microsoft Copilot, rather than
    physically writing code or building something).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了许多其他机会，例如构建**最小可行产品**（MVPs）和**概念验证**（PoCs）。这些不被视为完整的产品，而是解决方案的一部分，包含完整解决方案可能实现的具体方面。许多这些MVPs和PoCs都是在创新场景中构建的，如黑客马拉松，现在还有Copilot，Promptathons（使用自然语言提示技术和微软Copilot，而不是实际编写代码或构建某些东西）。
- en: By giving people, a platform and a space to engage, the organization can enable
    them to learn from each other, collaborate on solutions, and express their creativity
    and potential with the Power Platform. This can help to further a culture of innovation
    and co-creation that supports digital transformation.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 通过为人们提供一个参与的平台和空间，组织可以让他们相互学习，共同解决解决方案，并使用Power平台表达他们的创造力和潜力。这有助于进一步推动创新和共创文化，支持数字化转型。
- en: Finding ways to inspire creativity and Innovation
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 寻找激发创造力和创新的方法
- en: To inspire creativity and innovation with the Power Platform, the organization
    can organize and participate in various events and activities that showcase the
    possibilities and benefits of the tools. There are so many opportunities to drive
    and inspire Innovation; we just must think out of the box and about the people
    we are engaging.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为了用Power平台激发创造力和创新，组织可以组织和参与各种展示工具可能性和益处的事件和活动。有如此多的机会来推动和激发创新；我们只需跳出思维定式，并考虑我们正在接触的人。
- en: '**Hackathons**: A hackathon is a time-bound event where teams of developers,
    business analysts, domain experts, and end-users work together to create solutions
    using the Power Platform. Hackathons can be a great way to generate ideas, solve
    problems, learn new skills, and foster collaboration and innovation. The organization
    can host its own internal hackathons or join external ones, such as the Microsoft
    Power Platform Hack for Good, which aims to address social and environmental challenges
    with technology.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**黑客马拉松**：黑客马拉松是一个有时间限制的活动，开发者、商业分析师、领域专家和最终用户团队一起使用Power平台来创造解决方案。黑客马拉松可以是一个产生想法、解决问题、学习新技能以及促进协作和创新的绝佳方式。组织可以举办自己的内部黑客马拉松或加入外部活动，例如微软Power平台“为善而黑客”活动，该活动旨在利用技术解决社会和环境挑战。'
- en: '**Workshops**: A workshop is a structured and interactive learning session
    where participants can gain hands-on experience with the Power Platform. Workshops
    can be tailored to different levels of expertise, from beginners to advanced users,
    and cover various topics, such as data modeling, app design, automation, AI, and
    security. The organization can offer workshops to its employees, customers, partners,
    or community members, either online or in person, to help them discover and explore
    the features and capabilities of the Power Platform.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研讨会**：研讨会是一个结构化和互动式的学习会议，参与者可以在其中通过Power平台获得实际操作经验。研讨会可以根据不同水平的专业知识定制，从初学者到高级用户，涵盖各种主题，如数据建模、应用设计、自动化、人工智能和安全性。组织可以向其员工、客户、合作伙伴或社区成员提供研讨会，无论是线上还是线下，以帮助他们发现和探索Power平台的功能和特性。'
- en: '**In a Day** **l****abs**: There are several In a Day labs that Microsoft has
    created that enable users to build solutions by following a set of instructions.
    These are great mechanisms to get started with and for organizations wanting to
    understand the basics, these are highly recommended. The scenarios are generic,
    on purpose. Many partners and community members have built their own in a day
    lab that are far more custom.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一日实验室**：微软创建了多个“一日实验室”，使用户可以通过遵循一系列说明来构建解决方案。这些是开始的好机制，对于想要了解基础知识的企业，这些非常推荐。场景是通用的，这是故意的。许多合作伙伴和社区成员已经建立了自己的“一日实验室”，这些实验室更加定制化。'
- en: '**Adoption of the tools**: To inspire creativity and innovation, the organization
    should also encourage and support the adoption of the Power Platform tools by
    its users. This can be done by providing training, documentation, guidance, and
    best practices, as well as creating a feedback loop and a recognition system.
    By empowering users to use the Power Platform tools effectively and confidently,
    the organization can enable them to create and share solutions that meet their
    needs and add value to the organization.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具的采用**：为了激发创造力和创新，组织还应鼓励和支持用户采用Power Platform工具。这可以通过提供培训、文档、指导、最佳实践，以及创建反馈循环和认可系统来实现。通过赋予用户有效和自信地使用Power
    Platform工具的能力，组织可以让他们创建和分享满足其需求并增加组织价值的解决方案。'
- en: By engaging in these activities, the organization can inspire creativity and
    innovation with the Power Platform and build a vibrant and thriving community
    around it. The community and spirit of innovation will only be as good as the
    support that it gets from the wider team, so it is important to ensure that all
    stakeholders are aware and prepared for this movement to take place.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 通过参与这些活动，组织可以用Power Platform激发创造力和创新，并围绕它建立一个充满活力和繁荣的社区。社区和创新精神的好坏取决于更广泛团队的支持，因此确保所有利益相关者都意识到并准备好参与这一运动是很重要的。
- en: Ensuring progression
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 确保进步
- en: 'Another key aspect of inspiring creativity and innovation with the Power Platform
    is ensuring progression. This means that the organization should provide opportunities
    and resources for the makers to learn more about using the Power Platform tools
    to solve everyday problems and enhance their skills and knowledge. Some of the
    ways to ensure progression are:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 用Power Platform激发创造力和创新的另一个关键方面是确保进步。这意味着组织应提供机会和资源，让制作者了解更多关于使用Power Platform工具解决日常问题以及提高他们的技能和知识。确保进步的一些方法包括：
- en: '**Providing learning paths**: The organization can create or use existing learning
    paths that guide the makers through different levels of proficiency and complexity
    with the Power Platform tools. Learning paths can include online courses, videos,
    tutorials, quizzes, certifications, and hands-on projects that help the makers
    acquire and demonstrate their skills. For example, the organization can use the
    Microsoft Learn platform, which offers free and interactive learning content for
    various Power Platform tools and scenarios.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供学习路径**：组织可以创建或使用现有的学习路径，引导制作者通过Power Platform工具的不同熟练度和复杂度级别。学习路径可以包括在线课程、视频、教程、测验、认证和动手项目，帮助制作者获取并展示他们的技能。例如，组织可以使用Microsoft
    Learn平台，该平台为各种Power Platform工具和场景提供免费和互动的学习内容。'
- en: '**Creating challenges**: The organization can also create challenges that encourage
    the makers to apply their skills and creativity to solve real-world problems using
    the Power Platform tools. Challenges can be based on specific themes, domains,
    or business needs, and can have different levels of difficulty and reward. For
    example, the organization can use the Power Platform Community, which hosts monthly
    app challenges and hackathons for makers to showcase their solutions and win prizes.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创造挑战**：组织还可以创建挑战，鼓励制作者运用他们的技能和创造力，使用Power Platform工具解决现实世界的问题。挑战可以基于特定的主题、领域或业务需求，并且可以有不同的难度和奖励级别。例如，组织可以使用Power
    Platform社区，该社区每月举办应用程序挑战和黑客马拉松，让制作者展示他们的解决方案并赢得奖品。'
- en: '**Fostering collaboration**: The organization can foster collaboration among
    the makers by creating spaces and platforms where they can share their ideas,
    feedback, tips, and best practices with each other. Collaboration can help the
    makers learn from each other, discover new possibilities, and improve their solutions.
    For example, the organization can use the Power Platform User Groups, which are
    communities of users who meet regularly to network, learn, and exchange experiences
    with the Power Platform tools.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培养协作**：组织可以通过创建空间和平台来培养制作者之间的协作，让他们可以相互分享想法、反馈、技巧和最佳实践。协作可以帮助制作者相互学习，发现新的可能性，并改进他们的解决方案。例如，组织可以使用Power
    Platform用户组，这些用户组是定期会面以建立联系、学习和交流Power Platform工具经验的用户社区。'
- en: By ensuring progression, the organization can help the makers advance their
    learning journey with the Power Platform and unlock their full potential and creativity.
    The more people learn and the more curious they are, the more likely they are
    to engage in the platform and start problem solving.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 通过确保进步，组织可以帮助制作者利用Power Platform推进他们的学习之旅，释放他们的全部潜能和创造力。人们学得越多，好奇心越强，就越有可能参与平台并开始解决问题。
- en: The introduction of Power Platform into the technical and transformation community
    has revolutionized the approach to solution creation by driving collaborative
    and innovative practices. Previously, solutions were developed in silos based
    on specified requirements, often leading to misunderstandings and unfit solutions.
    With the advent of low code development tools like Power Platform, organizations
    are now embracing collaborative approaches, allowing individuals closest to the
    problem to participate in solution creation. The concept of Fusion teams, comprising
    individuals with diverse skills, has emerged to address this shift in approach.
    Creating communities of practice has been instrumental in providing a platform
    for sharing ideas, solutions, and feedback, resulting in the formation of fusion
    teams. Additionally, various events and activities such as hackathons, workshops,
    and “In a Day” labs have been organized to inspire creativity and drive innovation.
    Ensuring progression involves providing learning paths, creating challenges, and
    championing collaboration among makers, ultimately unlocking their full potential
    and creativity with the Power Platform.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform被引入技术转型社区后，通过推动协作和创新实践，彻底改变了解决方案创建的方法。以前，解决方案是基于特定要求在孤岛中开发的，往往导致误解和不合适的解决方案。随着低代码开发工具如Power
    Platform的出现，组织现在正在拥抱协作方法，让最接近问题的人参与解决方案的创建。融合团队的概念应运而生，它由具有不同技能的个人组成，以应对这种方法的变化。创建实践社区对于提供分享想法、解决方案和反馈的平台至关重要，从而形成了融合团队。此外，还组织了各种活动，如黑客马拉松、研讨会和“一日”实验室，以激发创造力和推动创新。确保进步包括提供学习路径、创建挑战，并在制作者之间倡导协作，最终利用Power
    Platform解锁他们的全部潜能和创造力。
- en: Summary
  id: totrans-115
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The chapter discusses the evolution from the traditional Center of Excellence
    (CoE) to the modern Center for Enablement (C4E) and focuses on nurturing creativity
    and innovation within the Power Platform community. The C4E emphasizes creating
    a safe space for makers to experiment, learn, and collaborate without fear of
    judgment, providing resources for makers to explore the full potential of the
    Power Platform, and cultivating a community of practice and collaboration. Additionally,
    the C4E identifies and nurtures champions and advocates of the Power Platform
    and establishes a process for recognizing and rewarding their contributions. Moreover,
    creating enthusiasm and nurturing creativity is essential in driving the wider
    adoption and usage of the Power Platform, encouraging makers to think creatively
    and seek feedback and validation from users and stakeholders. The C4E plays a
    vital role in empowering and supporting makers to deliver value and impact within
    the organization.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了从传统的卓越中心（CoE）到现代的赋能中心（C4E）的演变，并侧重于在Power Platform社区中培养创造力和创新。C4E强调为制作者创造一个安全的空间进行实验、学习和协作，无需担心评判，为制作者提供探索Power
    Platform全部潜能的资源，并培养实践社区和协作。此外，C4E识别并培养Power Platform的倡导者和冠军，并建立了一个认可和奖励他们贡献的程序。此外，激发热情和培养创造力对于推动Power
    Platform的更广泛采用和使用至关重要，鼓励制作者进行创造性思考，并从用户和利益相关者那里寻求反馈和验证。C4E在赋权和支持制作者在组织中创造价值和影响方面发挥着至关重要的作用。
- en: The next section, “*Enabling individuals to unleash creativity with IT governance*
    ,” explores mechanisms for empowering Power Platform makers to innovate while
    maintaining compliance and security with IT governance. The concept of guided
    empowerment is introduced, emphasizing the need to balance IT governance with
    maker empowerment. It also highlights the importance of ensuring data and people’s
    safety, driving learning and growth, and creating a supportive environment for
    individuals to leverage the Power Platform effectively.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分，"通过*IT治理*释放个人创造力," 探讨了在保持与IT治理的合规性和安全性的同时，赋予Power Platform制造者创新机制。引入了指导赋权的概念，强调需要在IT治理与制造者赋权之间取得平衡。它还突出了确保数据和人们的安全、推动学习和成长，以及为个人创造一个有效利用Power
    Platform的支持性环境的重要性。
- en: Lastly, “*Encouraging* *innovation and co-creation for* *digital transformation*,”
    discusses fostering a culture of innovation and co-creation by providing a platform
    for engagement, inspiring creativity, and innovation, and ensuring progression.
    It emphasizes the importance of creating communities of practice, organizing events
    such as hackathons and workshops, and providing opportunities for makers to learn
    and grow, unlocking their full potential and creativity with the Power Platform.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，"鼓励*创新和共同创造*以推动*数字化转型*," 讨论了通过提供一个参与平台、激发创造力和创新，并确保进步来培养创新和共同创造的文化。它强调了创建实践社区、组织如黑客马拉松和工作坊等活动，以及为制造者提供学习和成长机会的重要性，利用Power
    Platform的力量解锁他们的全部潜力和创造力。
- en: In the next chapter, we will be taking a look at how to build out multiple different
    types of solutions leveraging the tools in the power platform and how to connect
    these solutions to multiple data structures and services in order to scale across
    the wider organization.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何利用Power Platform中的工具构建多种不同类型的解决方案，以及如何将这些解决方案连接到多个数据结构和服务，以便在整个组织中实现扩展。
