- en: '12'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: Combining RAG with the Power of AI Agents and LangGraph
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结合RAG与AI代理和LangGraph的力量
- en: One call to a **large language model** (**LLM**) can be powerful, but put your
    logic in a loop with a goal toward achieving a more sophisticated task, and you
    can take your **retrieval-augmented generation** (**RAG**) development to a whole
    new level. That is the concept behind **agents**. LangChain has focused significant
    energy on improving support for *agentic* workflows, adding functionality that
    enables more precise control over agent behavior and capabilities. Part of this
    progress has been in the emergence of **LangGraph**, another relatively new part
    of LangChain. Together, agents and LangGraph pair well as a powerful approach
    to improving RAG applications.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 对**大型语言模型**（**LLM**）的一次调用可能很有力量，但将你的逻辑放入一个循环中，目标是实现更复杂的任务，你就可以将你的**检索增强生成**（**RAG**）开发提升到一个全新的水平。这就是**代理**背后的概念。LangChain已经投入了大量精力来改进对*代理*工作流程的支持，增加了能够更精确控制代理行为和功能的功能。这一进步的一部分是**LangGraph**的出现，LangChain的另一个相对较新的部分。共同而言，代理和LangGraph作为提高RAG应用的有效方法搭配得很好。
- en: 'In this chapter, we will focus on gaining a deeper understanding of the elements
    of agents that can be utilized in RAG and then tie them back to your RAG efforts,
    covering topics such as the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将专注于深入了解可用于RAG的代理元素，然后将它们与你自己的RAG工作联系起来，涵盖以下主题：
- en: Fundamentals of AI agents and RAG integration
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI代理和RAG集成的原理
- en: Graphs, AI agents, and LangGraph
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图表、AI代理和LangGraph
- en: Code lab 12.1 – adding a LangGraph retrieval agent to RAG
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室12.1 – 向RAG添加LangGraph检索代理
- en: By the end of this chapter, you will have a solid grasp of how AI agents and
    LangGraph can enhance your RAG applications. In the next section, we will dive
    into the fundamentals of AI agents and RAG integration, setting the stage for
    the concepts and code lab that follow.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将牢固地掌握AI代理和LangGraph如何增强你的RAG应用。在下一节中，我们将深入探讨AI代理和RAG集成的原理，为后续的概念和代码实验室奠定基础。
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The code for this chapter is placed in the following GitHub repository: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_12](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_12).'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码放置在以下GitHub仓库中：[https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_12](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_12)。
- en: Fundamentals of AI agents and RAG integration
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI代理和RAG集成的原理
- en: When talking with new developers in generative AI, we have been told that the
    concept of an AI agent often tends to be one of the more challenging concepts
    to grasp. When experts talk about agents, they often talk about them in very abstract
    terms, focusing on all the things AI agents can be responsible for in a RAG application,
    but failing to really explain thoroughly what an AI agent is and how it works.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当与生成式AI的新开发者交谈时，我们被告知，AI代理的概念往往是更难以掌握的概念之一。当专家们谈论代理时，他们经常用非常抽象的术语来谈论，关注AI代理在RAG应用中可以负责的所有事情，但未能真正彻底地解释AI代理是什么以及它是如何工作的。
- en: I find that it is easiest to dispel the mystery of the AI agent by explaining
    what it really is, which is actually a very simple concept. To build an AI agent
    in its most basic form, you are simply taking the same LLM concept you have already
    been working with throughout these chapters and adding a loop that terminates
    when the intended task is done. That’s it! It’s just a loop, folks!
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为通过解释AI代理的真正含义来消除其神秘性是最容易的，这实际上是一个非常简单的概念。要构建最基本形式的AI代理，你只需将你已经在这些章节中一直在使用的相同的LLM概念添加一个循环，当预期任务完成时循环终止。就是这样！它只是一个循环，朋友们！
- en: '*Figure 12.1* represents the **RAG agent loop** you will be working with in
    the code lab that you are about to dive into:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*图12.1* 表示你将在即将开始的代码实验室中与之合作的 **RAG代理循环**：'
- en: '![Figure 12.1 – Graph of the agent’s control flow](img/B34736_12_1.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图12.1 – 代理控制流程图](img/B34736_12_1.png)'
- en: Figure 12.1 – Graph of the agent’s control flow
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1 – 代理控制流程图
- en: This represents a relatively simple set of logic steps that loop through until
    the agent decides it has successfully completed the task you have given it. The
    oval boxes, such as *agent* and *retrieve*, are called **nodes**, and the lines
    are called **edges**. The dotted lines are also edges, but they are a specific
    type called **conditional edges**, which are edges that are also decision points.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这代表了一系列相对简单的逻辑步骤，这些步骤会循环执行，直到代理决定它已经成功完成了你给它分配的任务。例如，*代理*和*检索*这样的椭圆形框被称为**节点**，而线条被称为**边**。虚线也是边，但它们是特定类型的**条件边**，这种边同时也是决策点。
- en: Despite the simplicity, the concept of adding a loop to your LLM calls does
    make it much more powerful than just using LLMs directly, because it takes more
    advantage of the LLM’s ability to reason and break tasks down into simpler tasks.
    This improves the chances of success in whatever task you are pursuing and will
    come in especially handy with more complex multi-step RAG tasks.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管很简单，但在你的LLM调用中添加循环的概念确实使其比直接使用LLMs更强大，因为它更多地利用了LLM的推理能力，将任务分解成更简单的任务。这提高了你在追求任何任务时的成功机会，并且对于更复杂的多步RAG任务来说尤其有用。
- en: While your LLM is looping through agent tasks, you also provide functions called
    **tools** to the agent, and the LLM will use its reasoning capabilities to determine
    which tool to use, how to use that tool, and what data to feed it. This is where
    it can get really complex very quickly. You can have multiple agents, numerous
    tools, integrated knowledge graphs that help guide your agents down a specific
    path, numerous frameworks that offer different *flavors* of agents, numerous approaches
    to agent architecture, and much more. But in this chapter, we are going to focus
    specifically on how an AI agent can help improve RAG applications. Once you see
    the power of using an AI agent, though, I have no doubt that you will want to
    use it in other generative AI applications, and you should!
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的LLM在循环执行代理任务时，你也会向代理提供称为**工具**的功能，LLM将利用其推理能力来确定使用哪个工具，如何使用该工具，以及向其提供什么数据。这就是它可能迅速变得非常复杂的地方。你可以有多个代理，众多工具，集成的知识图谱帮助引导你的代理沿着特定路径前进，众多提供不同*风味*的代理框架，众多代理架构的方法，等等。但在本章中，我们将特别关注AI代理如何帮助改进RAG应用。然而，一旦你看到了使用AI代理的力量，我毫不怀疑你将想要在其他生成式AI应用中使用它，你应该这么做！
- en: Living in an AI agent world
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生活在一个AI代理的世界中
- en: With all the excitement around agents, you might think LLMs are already going
    obsolete. But that couldn’t be further from the truth. With AI agents, you are
    really tapping into an even more powerful version of an LLM, a version where the
    LLM serves as the “brain” of the agent, letting it reason and come up with multi-step
    solutions well beyond the one-off chat questions most people are using them for.
    The agent just provides a layer between the user and the LLM and pushes the LLM
    to accomplish a task that may take multiple queries of the LLM, but will eventually,
    in theory, end up with a much better result.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在代理带来的所有兴奋情绪中，你可能会认为LLMs已经过时了。但事实远非如此。通过AI代理，你实际上是在挖掘一个更强大的LLM版本，在这个版本中，LLM充当代理的“大脑”，让它能够进行推理并想出多步解决方案，这远远超出了大多数人使用它们进行的一次性聊天问题。代理只是在用户和LLM之间提供了一个层次，推动LLM完成可能需要多次查询的任务，但最终，从理论上讲，会得到一个更好的结果。
- en: If you think about it, this matches up more with how problems are solved in
    the real world, where even simple decisions can be complex. Most tasks we do are
    based on a long chain of observations, reasoning, and adjustments to new experiences.
    Very rarely do we interact with people, tasks, and things in the real world in
    the same way we interact with LLMs online. There is often this building of understanding,
    knowledge, and context that takes place and helps us find the best solutions.
    AI agents are better able to handle this type of approach to problem-solving.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细想想，这更符合现实世界中解决问题的方式，即使简单的决策也可能很复杂。我们做的许多任务都是基于一系列的观察、推理和对新经验的调整。在现实世界中，我们与人们、任务和事物的互动方式很少像我们在网上与LLM互动那样。经常会有这种建立理解、知识和背景的过程发生，帮助我们找到最佳解决方案。AI代理更能处理这种类型的解决问题的方法。
- en: Agents can make a big difference to your RAG efforts, but what about this concept
    of the LLMs being their brains? Let’s dive into the concept further.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 代理可以对你的RAG（检索即生成）工作产生重大影响，但关于LLMs（大型语言模型）作为其大脑的概念又如何呢？让我们进一步探讨这个概念。
- en: LLMs as the agents’ brains
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM作为代理的大脑
- en: If you consider the LLM as the brain of your AI agent, the next logical step
    is that you likely want the *smartest* LLM you can find to be that brain. The
    capabilities of the LLM are going to affect your AI agent’s ability to reason
    and make decisions, which will certainly impact the results of the queries to
    your RAG application.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将 LLM 视为你的 AI 代理的大脑，那么下一个合乎逻辑的步骤是你可能希望找到最聪明的 LLM 来作为那个大脑。LLM 的能力将影响你的 AI
    代理推理和做决策的能力，这无疑将影响你对 RAG 应用程序的查询结果。
- en: There is one major way this metaphor of an LLM brain breaks down, though, but
    in a very good way. Unlike agents in the real world, the AI agent can always swap
    out their LLM brain for another LLM brain. We could even give it multiple LLM
    brains that can serve to check each other and make sure things are proceeding
    as planned. This gives us greater flexibility that will help us continually improve
    the capabilities of our agents.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种 LLM 大脑的隐喻有一个主要的问题，但以一种非常好的方式。与现实世界中的代理不同，AI 代理可以随时更换他们的 LLM 大脑。我们甚至可以给它多个
    LLM 大脑，这些大脑可以相互检查并确保一切按计划进行。这为我们提供了更大的灵活性，有助于我们不断改进代理的能力。
- en: So, how does LangGraph, or graphs in general, relate to AI agents? We will discuss
    that next.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，LangGraph 或一般意义上的图如何与 AI 代理相关联呢？我们将在下一节讨论这个问题。
- en: Graphs, AI agents, and LangGraph
  id: totrans-27
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 图、AI 代理和 LangGraph
- en: LangChain introduced LangGraph in 2024, so it is still relatively new. It is
    an extension built on top of **LangChain Expression Language** (**LCEL**) to create
    composable and customizable agentic workloads. LangGraph leans heavily on graph
    theory concepts, such as nodes and edges (described earlier), but with a focus
    on using them to manage your AI agents. While an older way to manage agents, the
    `AgentExecutor` class, still exists, LangGraph is now the *recommended* way to
    build agents in LangChain.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain 在 2024 年引入了 LangGraph，因此它仍然相对较新。它是建立在 **LangChain 表达语言**（**LCEL**）之上的扩展，用于创建可组合和可定制的代理工作负载。LangGraph
    严重依赖于图论概念，如节点和边（前面已描述），但重点是使用它们来管理你的 AI 代理。虽然较老的代理管理方法 `AgentExecutor` 类仍然存在，但
    LangGraph 现在是 LangChain 中**推荐**的构建代理的方式。
- en: 'LangGraph adds two important components for supporting agents:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph 为支持代理添加了两个重要组件：
- en: The ability to easily define cycles (cyclical graphs)
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 容易定义循环（循环图）的能力
- en: Built-in memory
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内置内存
- en: It provides a prebuilt object equivalent to `AgentExecutor`, allowing developers
    to orchestrate agents using a graph-based approach.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 它提供了一个与 `AgentExecutor` 相等的预构建对象，允许开发者使用基于图的方法编排代理。
- en: Over the past couple of years, numerous papers, concepts, and approaches have
    emerged for building agents into RAG applications, such as orchestration agents,
    ReAct agents, self-refining agents, and multi-agent frameworks. A common theme
    among these approaches is the concept of a cyclical graph that represents the
    agent’s control flow. While many of these approaches, from an implementation standpoint,
    are going obsolete, their concepts are still highly useful and are captured in
    the graph-based environment of LangGraph.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去几年中，出现了许多将代理构建到 RAG 应用程序中的论文、概念和方法，例如编排代理、ReAct 代理、自我优化的代理和多代理框架。这些方法中的一个共同主题是循环图的概念，它代表了代理的控制流。虽然许多这些方法从实现的角度来看正在变得过时，但它们的概念仍然非常有用，并且被捕获在
    LangGraph 的基于图的环境中。
- en: '**LangGraph** has become a powerful tool for supporting agents and managing
    their flow and process in RAG applications. It enables developers to describe
    and represent single and multi-agent flows as graphs, providing extremely controlled
    *flows*. This controllability is crucial for avoiding the pitfalls encountered
    by developers when creating agents early on.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**LangGraph** 已成为支持代理并在 RAG 应用程序中管理它们的流程和过程的有力工具。它使开发者能够将单代理和多代理流程描述为图，提供极受控制的**流程**。这种可控性对于避免开发者在早期创建代理时遇到的陷阱至关重要。'
- en: 'As an example, the popular ReAct approach was an early paradigm for building
    agents. **ReAct** stands for **reason + act**. In this pattern, an LLM first thinks
    about what to do and then decides on an action to take. That action is then executed
    in an environment, and an observation is returned. With that observation, the
    LLM then repeats this process. It uses reasoning to think about what to do next,
    decides on another action to take, and continues until it has been determined
    that the goal has been met. If you map this process out, it may look something
    like what you see here in *Figure 12.2*:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，流行的 ReAct 方法是构建智能体的早期范例。**ReAct**代表**reason + act**。在这个模式中，LLM 首先思考要做什么，然后决定采取的行动。该行动在环境中执行，并返回一个观察结果。有了这个观察结果，LLM
    然后重复这个过程。它使用推理来思考接下来要做什么，决定采取另一个行动，并继续进行，直到确定目标已经实现。如果您将这个过程绘制出来，可能看起来就像您在*图 12.2*中看到的那样：
- en: '![Figure 12.2 – ReAct cyclical graph representation](img/B34736_12_2.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图 12.2 – ReAct 循环图表示](img/B34736_12_2.png)'
- en: Figure 12.2 – ReAct cyclical graph representation
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12.2 – ReAct 循环图表示
- en: The set of loops in *Figure 12.2* can be represented by cyclical graphs in LangGraph,
    with each step represented by nodes and edges. Using this graphing paradigm, you
    can see how a tool such as LangGraph, a tool for building graphs in LangChain,
    can form the backbone of your agent framework. As we build our agent framework,
    we can represent these agent loops using LangGraph, which helps us describe and
    orchestrate the control flow. This focus on the control flow is critical to addressing
    some of the early challenges with agents, where a lack of control leads to rogue
    agents that can’t complete their loops or focus on the wrong task.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 12.2*中的循环集合可以用 LangGraph 中的循环图来表示，每个步骤由节点和边表示。使用这种图形范式，您可以看到 LangGraph 这样的工具，LangChain
    中构建图的工具，如何成为您智能体框架的骨干。当我们构建智能体框架时，我们可以使用 LangGraph 来表示这些智能体循环，这有助于我们描述和编排控制流。这种对控制流的关注对于解决智能体的一些早期挑战至关重要，缺乏控制会导致无法完成循环或专注于错误任务的流氓智能体。'
- en: Another key element that LangGraph has built into it is **persistence**. Persistence
    can be used to maintain the memory of the agent, giving it the information it
    needs to reflect on all of its actions so far, and representing the *OBSERVE*
    component presented in *Figure 12.2*. This is really helpful for having multiple
    conversations at the same time or remembering previous iterations and actions.
    This persistence also enables human-in-the-loop features that give you better
    control over what the agent is doing at key intervals during its actions. We’ll
    explore memory and persistence in much greater detail in [*Chapter 16*](B34736_16_ePub.xhtml#_idTextAnchor381),
    where we’ll dive into how to implement and leverage these features effectively
    in your RAG applications.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph 中构建的另一个关键元素是**持久性**。持久性可以用来保持智能体的记忆，为其提供所需的信息，以便反思迄今为止的所有行动，并代表*图
    12.2*中展示的*观察*组件。这对于同时进行多个对话或记住之前的迭代和行动非常有帮助。这种持久性还使人类在循环中具有更好的控制权，在智能体行动的关键间隔期间更好地控制智能体的行为。我们将在[*第
    16 章*](B34736_16_ePub.xhtml#_idTextAnchor381)中更详细地探讨记忆和持久性，我们将深入探讨如何在您的 RAG 应用程序中有效地实现和利用这些功能。
- en: 'The paper that introduced the ReAct approach to agent building can be found
    here: [https://arxiv.org/abs/2210.03629](https://arxiv.org/abs/2210.03629).'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 介绍了 ReAct 方法构建智能体的论文可以在这里找到：[https://arxiv.org/abs/2210.03629](https://arxiv.org/abs/2210.03629)。
- en: Let’s dive right into the code lab for building our agent and walk through more
    key individual concepts as we encounter them in the code.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们直接进入代码实验室，构建我们的智能体，并在代码中遇到时逐步了解更多关键个体概念。
- en: Code lab 12.1 – adding a LangGraph retrieval agent to RAG
  id: totrans-42
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室 12.1 – 向 RAG 添加 LangGraph 检索智能体
- en: 'In this code lab, we will add an agent to our existing RAG pipeline that can
    make decisions about whether to retrieve from an index or use a web search. We
    will show the inner thoughts of the agent as it processes data that it retrieves
    toward the goal of providing you with a more thorough response to your question.
    As we add the code for our agent, we will see new components, such as tools, toolkits,
    graphs, nodes, edges, and, of course, the agent itself. For each component, we
    will go more in-depth into how that component interacts and supports your RAG
    application. We will also add code so that this functions more like a chat session,
    rather than a Q&A session:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个代码实验室中，我们将向现有的 RAG 管道添加一个代理，该代理可以决定是否从索引中检索或使用网络搜索。我们将展示代理在处理检索到的数据时的内部想法，目的是为你提供更全面的回答。随着我们添加代理的代码，我们将看到新的组件，例如工具、工具包、图、节点、边，当然还有代理本身。对于每个组件，我们将更深入地探讨该组件如何交互和支持你的
    RAG 应用程序。我们还将添加代码，使其更像是一个聊天会话，而不是问答会话：
- en: 'First, we will install some new packages to support our agent development:'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，我们将安装一些新的包来支持我们的代理开发：
- en: '[PRE0]'
  id: totrans-45
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In the first line, we install the `tiktoken` package, which is an OpenAI package
    used for tokenizing text data before feeding it into language models. Last, we
    pull in the `langgraph` package we have been discussing.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一行，我们安装了 `tiktoken` 包，这是一个 OpenAI 包，用于在将文本数据输入语言模型之前对文本数据进行标记化。最后，我们引入了我们一直在讨论的
    `langgraph` 包。
- en: 'Next, we add a new LLM definition and update our existing one:'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们将添加一个新的 LLM 定义并更新现有的一个：
- en: '[PRE1]'
  id: totrans-48
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The new `agent_llm` LLM instance will serve as our agent’s brain, handling reasoning
    and execution of the agent tasks, whereas the original `llm` instance will still
    be present in our general LLM to do the same LLM tasks we have used it for in
    the past. While the two LLMs are defined with the same model and parameters in
    our example, you could and should experiment with using different LLMs for these
    different tasks, to see whether there is a combination that works better for your
    RAG applications. You could even add additional LLMs to handle specific tasks,
    such as the improve or `score_documents` functions in this code, if you find an
    LLM better at those tasks or have trained or fine-tuned your own for these particular
    actions. For example, it is common for simple tasks to be handled by faster, lower-cost
    LLMs as long as they can perform the task successfully. There is a lot of flexibility
    built into this code that you can take advantage of! Also, note that we add `streaming=True`
    to the LLM definition. This turns on streaming data from the LLM, which is more
    conducive to an agent that may make several calls, sometimes in parallel, constantly
    interacting with the LLM.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 新的 `agent_llm` LLM 实例将作为我们代理的大脑，处理推理和执行代理任务，而原始的 `llm` 实例仍然存在于我们的通用 LLM 中，执行我们过去使用它完成的相同
    LLM 任务。虽然在我们的示例中这两个 LLM 使用了相同的模型和参数定义，但你应该尝试使用不同的 LLM 来完成这些不同的任务，看看是否有更适合你的 RAG
    应用程序的组合。你甚至可以添加额外的 LLM 来处理特定任务，例如，如果发现某个 LLM 在这些任务上表现更好，或者你已经为这些特定操作训练或微调了自己的
    LLM，那么可以添加 `improve` 或 `score_documents` 函数。例如，对于简单任务，只要它们能成功完成任务，通常可以使用更快、成本更低的
    LLM。这段代码中内置了很多灵活性，你可以充分利用！此外，请注意，我们在 LLM 定义中添加了 `streaming=True`。这开启了从 LLM 的流式数据，这对可能进行多次调用（有时是并行调用）并不断与
    LLM 交互的代理更有利。
- en: Now, we are going to skip down to after the retriever definitions (`dense_retriever`,
    `sparse_retriever`, and `ensemble_retriever`) and add our first tool. A tool has
    a very specific and important meaning when it comes to agents; so, let’s talk
    about that now.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将跳过检索器定义（`dense_retriever`、`sparse_retriever` 和 `ensemble_retriever`）之后的部分，并添加我们的第一个工具。在代理中，工具具有非常具体和重要的含义；所以，让我们现在就来谈谈这一点。
- en: Tools and toolkits
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具和工具包
- en: 'In the following code, we are going to add a **web** **search** tool:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码中，我们将添加一个 **网络** **搜索** 工具：
- en: '[PRE2]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'You will need to get another API key and add it to the `env.txt` file we have
    used in the past for the OpenAI and Together APIs. Just like with those APIs,
    you will need to go to that website, set up your API key, and then copy that into
    your `env.txt` file. The Tavily website can be found at this URL: [https://tavily.com/](https://tavily.com/).'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要获取另一个 API 密钥并将其添加到我们过去用于 OpenAI 和 Together API 的 `env.txt` 文件中。就像使用那些 API
    一样，你需要访问那个网站，设置你的 API 密钥，然后将它复制到你的 `env.txt` 文件中。Tavily 网站可以在以下 URL 找到：[https://tavily.com/](https://tavily.com/)。
- en: 'We run the code again that loads the data from the `env.txt` file, and then
    we set up the `TavilySearchResults` object with `max_results` of `4`, meaning
    when we run it for search, we only want 4 search results maximum. We then assign
    the `web_search.name` variable to a variable called `web_search_name` so that
    we have that available later when we want to tell the agent about it. You can
    run this tool directly using this code:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们再次运行代码，从 `env.txt` 文件加载数据，然后使用 `max_results` 的 `4` 设置 `TavilySearchResults`
    对象，这意味着当我们运行搜索时，我们只想获取最多4个搜索结果。然后我们将 `web_search.name` 变量分配给一个名为 `web_search_name`
    的变量，以便我们稍后当需要告诉代理时可以使用。你可以直接使用此代码运行此工具：
- en: '[PRE3]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Running this tool code with `user_query` will give you a result like this (truncated
    for brevity):'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `user_query` 运行此工具代码将给出如下结果（为了简洁而截断）：
- en: '[PRE4]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We truncated this so we take up less space in the book, but try this in the
    code, and you will see four results, as we asked for, and they all seem to be
    highly related to the topic that `user_query` is asking about. Note that you will
    not need to run this tool directly in your code like we just did.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们截断这部分内容以减少书籍的空间占用，但在代码中尝试这样做，你将看到我们请求的四个结果，并且它们似乎都与 `user_query` 提出的问题主题高度相关。请注意，你不需要像我们刚才那样直接在代码中运行此工具。
- en: At this point, you have just established your first agent tool! This is a search
    engine tool that your agent can use to retrieve more information from the internet
    to help it achieve its goal of answering the question your user poses to it.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你刚刚建立了你的第一个代理工具！这是一个搜索引擎工具，你的代理可以使用它从互联网检索更多信息，以帮助它实现回答用户提出的问题的目标。
- en: 'The *tool* concept in LangChain, and when building agents, comes from the idea
    that you want to make actions available to your agent so that it can carry out
    its tasks. Tools are the mechanism that allows this to happen. You define a tool
    like we just did for the web search, and then you later add it to a list of tools
    that the agent can use to accomplish its tasks. Before we set up that list, though,
    we want to create another tool that is central for a RAG application, a retriever
    tool:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain中的 *工具* 概念，以及构建代理时，来源于你希望为代理提供可执行动作的想法，以便它能够执行其任务。工具是实现这一目标的机制。你定义一个工具，就像我们刚才为网络搜索所做的那样，然后稍后将其添加到代理可以用来完成任务的工具列表中。在我们设置这个列表之前，我们还想创建另一个对于RAG应用至关重要的工具，一个检索工具：
- en: '[PRE5]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note that with the web search tool, we imported it from `langchain_community.tools.tavily_search`,
    whereas with this tool, we use `langchain.tools.retriever`. This reflects the
    fact that Tavily is a third-party tool, whereas the retriever tool we create here
    is part of the core LangChain functionality. After importing the `create_retriever_tool`
    function, we use it to create the `retriever_tool` tool for our agent. Again,
    as with `web_search_name`, we pull out the `retriever_tool.name` variable we can
    reference later when we want to refer to it for the agent. You may notice the
    name of the actual retriever this tool will use, `ensemble_retriever`, which we
    created in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176)’s *8.3* code lab!
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，使用网络搜索工具时，我们从 `langchain_community.tools.tavily_search` 导入了它，而使用这个工具时，我们使用
    `langchain.tools.retriever`。这反映了Tavily是一个第三方工具，而我们在这里创建的检索工具是LangChain核心功能的一部分。导入
    `create_retriever_tool` 函数后，我们使用它为我们的代理创建 `retriever_tool` 工具。同样，就像 `web_search_name`
    一样，我们提取出 `retriever_tool.name` 变量，以便稍后当我们想要引用它来为代理提供信息时使用。你可能已经注意到，这个工具实际使用的检索器名称是
    `ensemble_retriever`，这是我们在第 [*8章*](B34736_08_ePub.xhtml#_idTextAnchor176) 的 *8.3*
    代码实验室中创建的！
- en: You should also note that the name that we are giving this tool, as far as the
    agent is concerned, is found in the second field, and we are calling it `retrieve_google_environmental_question_answers`.
    When we name variables in code, we normally try to keep them smaller, but for
    tools that agents will use, it is helpful to provide more verbose names that will
    help the agent understand what can be used fully.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该注意，这个工具的名称，从代理的角度来看，位于第二个字段中，我们将其命名为 `retrieve_google_environmental_question_answers`。当我们编写代码中的变量时，我们通常尝试保持它们较小，但对于代理将使用的工具，提供更详细的名称有助于代理完全理解可以使用的内容。
- en: 'We now have two tools for our agent! However, we still need to tell the agent
    about them eventually, so we package them up into a list that we can later share
    with the agent:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们为代理有了两个工具！然而，我们最终还需要告诉代理它们，因此我们将它们打包成一个列表，我们稍后可以与代理共享：
- en: '[PRE6]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'You see here the two tools we created previously, `web_search` and `retriever_tool`,
    getting added to the `tools` list. If we had other tools we wanted to make available
    to the agent, we could add those to the list as well. In the LangChain ecosystem,
    there are hundreds of tools available: [https://python.langchain.com/v0.2/docs/integrations/tools/](https://python.langchain.com/v0.2/docs/integrations/tools/).'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你在这里看到的是我们之前创建的两个工具，`web_search` 和 `retriever_tool`，被添加到 `tools` 列表中。如果我们有其他想要提供给代理的工具，我们也可以将它们添加到列表中。在
    LangChain 生态系统中，有数百种工具可供使用：[https://python.langchain.com/v0.2/docs/integrations/tools/](https://python.langchain.com/v0.2/docs/integrations/tools/)。
- en: You will want to make sure the LLM you are using is “good” at reasoning and
    using tools. In general, chat models tend to have been fine-tuned for tool calling
    and will be better at using tools. Non-chat fine-tuned models may not be able
    to use tools, especially if the tools are complex or require multiple calls. Using
    well-written names and descriptions can play an important role in setting your
    agent LLM up for success as well.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要确保你使用的 LLM 在推理和使用工具方面“很好”。一般来说，聊天模型通常已经针对工具调用进行了微调，因此在使用工具方面会更好。非聊天微调模型可能无法使用工具，尤其是当工具复杂或需要多次调用时。使用良好的名称和描述也可以在为你的代理
    LLM 设置成功方面发挥重要作用。
- en: 'In the agent we are building, we have all the tools we need, but you will also
    want to look at the toolkits, which are convenient groups of tools. LangChain
    provides a list of the current toolkits available on its website: [https://python.langchain.com/v0.2/docs/integrations/toolkits/](https://python.langchain.com/v0.2/docs/integrations/toolkits/).'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们构建的代理中，我们拥有所有需要的工具，但你也会想看看工具包，这些是方便的工具组合。LangChain 在其网站上提供当前可用的工具包列表：[https://python.langchain.com/v0.2/docs/integrations/toolkits/](https://python.langchain.com/v0.2/docs/integrations/toolkits/)。
- en: For example, if you have a data infrastructure that uses pandas DataFrames,
    you could use the pandas `DataFrame` toolkit to offer your agent various tools
    to access those DataFrames in different ways. Drawing straight from the LangChain
    website, toolkits are described as follows ([https://python.langchain.com/v0.1/docs/modules/agents/concepts/#toolkits](https://python.langchain.com/v0.1/docs/modules/agents/concepts/#toolkits)).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你有一个使用 pandas DataFrame 的数据基础设施，你可以使用 pandas `DataFrame` 工具包为你代理提供各种工具，以便以不同的方式访问这些
    DataFrame。直接从 LangChain 网站摘录，工具包被描述如下 ([https://python.langchain.com/v0.1/docs/modules/agents/concepts/#toolkits](https://python.langchain.com/v0.1/docs/modules/agents/concepts/#toolkits))。
- en: For many common tasks, an agent will need a set of related tools. For this LangChain
    provides the concept of toolkits, which are groups of 3–5 tools needed to accomplish
    specific objectives. For example, the GitHub toolkit has a tool for searching
    through GitHub issues, a tool for reading a file, a tool for commenting, and so
    on.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多常见任务，代理将需要一套相关的工具。为此，LangChain 提供了工具包的概念，这些工具包是完成特定目标所需的 3-5 个工具的组合。例如，GitHub
    工具包包含用于搜索 GitHub 问题的工具、用于读取文件的工具、用于评论的工具等等。
- en: So, basically, if you are focusing on a set of common tasks for your agent or
    a popular integration partner with LangChain (such as a Salesforce integration),
    there is likely a toolkit that will give you access to all the tools you need
    all at once.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，基本上，如果你专注于为你的代理或与 LangChain 集成的流行合作伙伴（如 Salesforce 集成）执行的一组常见任务，很可能有一个工具包可以让你一次性访问所有需要的工具。
- en: Now that we have the tools established, let’s start building the components
    of our agent, starting with the agent state.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经建立了工具，让我们开始构建我们代理的组件，从代理状态开始。
- en: Agent state
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理状态
- en: 'The **agent state** is a key component of any agent you build with LangGraph.
    Using LangGraph, you create an `AgentState` class that establishes the working
    context for your agent and tracks it as the agent moves through its execution
    cycle. Think of state as the agent’s “scratchpad” during a single task; it holds
    the running record of what’s happened so far: the user’s question, tool outputs,
    LLM responses, and any intermediate results.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理状态**是使用 LangGraph 构建的任何代理的关键组件。使用 LangGraph，你创建一个 `AgentState` 类来为你的代理建立工作上下文，并在代理执行周期中跟踪它。将状态视为代理在单个任务中的“草稿本”；它保存到目前为止发生的运行记录：用户的问题、工具输出、LLM
    响应以及任何中间结果。'
- en: This state is passed by reference to all nodes in the graph, meaning every node
    shares access to the same state object. When a node completes its work, it appends
    new information to the state rather than replacing it. This accumulation of context
    allows later nodes to see everything that happened in earlier steps.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 此状态通过引用传递给图中的所有节点，这意味着每个节点都共享对同一状态对象的访问权限。当一个节点完成其工作后，它将新信息附加到状态中而不是替换它。这种上下文的积累允许后续节点看到早期步骤中发生的一切。
- en: 'Here, we set up this state for our RAG agent:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们为我们的RAG代理设置此状态：
- en: '[PRE7]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This imports the relevant packages for setting up `AgentState`. The `Sequence[BaseMessage]`
    type indicates an ordered history of messages, and the `add_messages` annotation
    tells LangGraph that each node should append to this list rather than overwrite
    it. For our RAG agent, we configure the state to track a list of messages representing
    the conversation flow between the user, tools, and the LLM.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这导入设置`AgentState`的相关包。`Sequence[BaseMessage]`类型表示消息的有序历史，`add_messages`注解告诉LangGraph每个节点应该将内容附加到该列表而不是覆盖它。对于我们的RAG代理，我们配置状态以跟踪表示用户、工具和LLM之间对话流程的消息列表。
- en: Note that this state persists only for the duration of the current agent execution.
    In [*Chapter 16*](B34736_16_ePub.xhtml#_idTextAnchor381), we’ll explore how to
    add true long-term memory that persists across sessions and conversations.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这种状态仅持续当前代理执行的时间。在[*第16章*](B34736_16_ePub.xhtml#_idTextAnchor381)中，我们将探讨如何添加真正的长期记忆，使其在会话和对话之间持续存在。
- en: 'With the state structure defined, we need to import additional packages to
    set up the remaining components of our agent:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义了状态结构之后，我们需要导入额外的包来设置代理的其余组件：
- en: '[PRE8]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In this code, we start by importing `HumanMessage`. `HumanMessage` is a specific
    type of message that represents a message sent by a human user. It will be used
    when constructing the prompt for the agent to generate a response. We also import
    `BaseModel` and `Field`. `BaseModel` is a class from the Pydantic library that
    is used to define data models and validate data. `Field` is a class from Pydantic
    that is used to define the properties and validation rules for fields in a data
    model. Lastly, we import `tools_condition`. The `tools_condition` function is
    a prebuilt function provided by the LangGraph library. It is used to assess the
    agent’s decision on whether to use specific tools based on the current state of
    the conversation.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代码中，我们首先导入`HumanMessage`。`HumanMessage`是一种特定类型的消息，表示由人类用户发送的消息。当构建代理生成响应的提示时将使用它。我们还导入`BaseModel`和`Field`。`BaseModel`是Pydantic库中的一个类，用于定义数据模型和验证数据。`Field`是Pydantic中的一个类，用于定义数据模型中字段的属性和验证规则。最后，我们导入`tools_condition`。`tools_condition`函数是LangGraph库提供的预构建函数。它用于根据对话的当前状态评估代理是否使用特定工具。
- en: These imported classes and functions are used throughout the code to define
    the structure of messages, validate data, and control the flow of the conversation
    based on the agent’s decisions. They provide the necessary building blocks and
    utilities for constructing the language model application using the LangGraph
    library.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这些导入的类和函数在代码中用于定义消息的结构、验证数据和根据代理的决定控制对话的流程。它们为使用LangGraph库构建语言模型应用程序提供了必要的构建块和实用工具。
- en: 'We then define our primary prompt (representing what the user would input)
    like this:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们定义我们的主要提示（表示用户会输入的内容）如下：
- en: '[PRE9]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'This is a replacement for the code that we were using in the past code labs:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对我们过去在代码实验室中使用的代码的替代：
- en: '[PRE10]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We alter the name to `generation_prompt` to make this prompt’s use clearer.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将名称更改为`generation_prompt`以使此提示的使用更清晰。
- en: Our graph usage is about to pick up in our code, but first, we need to cover
    some basic graph theory concepts.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在代码中即将开始使用图，但首先，我们需要介绍一些基本的图论概念。
- en: Core concepts of graph theory
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 图论的核心概念
- en: To better understand how we are going to use LangGraph in the next few blocks
    of code, it is helpful to review some key concepts in **graph theory**. **Graphs**
    are mathematical structures that can be used to represent relationships between
    different objects. The objects are called nodes, and the relationships between
    them, typically drawn with a line, are called edges. You have already seen these
    concepts in *Figure 12.1*, but it is important to understand how they relate to
    any graph and how that is used in LangGraph.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解我们如何在接下来的代码块中使用LangGraph，回顾一些**图论**中的关键概念是有帮助的。**图**是数学结构，可以用来表示不同对象之间的关系。这些对象被称为节点，它们之间的关系，通常用线表示，被称为边。您已经在*图12.1*中看到了这些概念，但了解它们如何与任何图相关联，以及如何在LangGraph中使用它们是很重要的。
- en: 'With LangGraph, there are also specific types of edges representing different
    types of these relationships. The “conditional edge” that we mentioned, along
    with *Figure 12.1*, for example, represents when you need to make a decision about
    which node you should go to next, so they represent the decisions. When talking
    about the ReAct paradigm, this has also been called the **action edge**, as it
    is where the action takes place, relating to the *reason + action* approach of
    ReAct. *Figure 12.3* shows a basic graph consisting of nodes and edges:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 使用LangGraph，也有表示不同类型这些关系的特定类型的边。我们提到的“条件边”，例如，与*图12.1*一起，表示当你需要决定下一步应该访问哪个节点时，因此它们代表了决策。当讨论ReAct范式时，这也被称为**动作边**，因为动作在这里发生，与ReAct的*原因+动作*方法相关。*图12.3*显示了一个由节点和边组成的基本图：
- en: '![Figure 12.3 – Basic graph representing our RAG application](img/B34736_12_3.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图12.3 – 表示我们的RAG应用的基图](img/B34736_12_3.png)'
- en: Figure 12.3 – Basic graph representing our RAG application
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3 – 表示我们的RAG应用的基图
- en: In this cyclical graph shown in *Figure 12.3*, you see nodes representing the
    start, agent, retrieve tool, generation, observation, and end. The key edges are
    where the LLM makes the decision of what tool to use (retrieve is the only one
    available here), observes whether what is retrieved is sufficient, and then pushes
    to generation. If it is decided that the retrieved data is not sufficient, there
    is an edge that sends the observation back to the agent to decide whether it wants
    to try again. These decision points are the *conditional edges* we discussed.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图12.3*中显示的这个循环图中，您可以看到代表开始、代理、检索工具、生成、观察和结束的节点。关键边是LLM决定使用哪个工具（这里只有检索可用），观察检索到的信息是否足够，然后推动到生成。如果决定检索的数据不足，有一条边将观察结果发送回代理，以决定是否想要再次尝试。这些决策点是我们在讨论的*条件边*。
- en: Nodes and edges in our agent
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们代理中的节点和边
- en: 'OK, so let’s review. We’ve mentioned that an agentic RAG graph has three key
    components: the *state* that we already talked about, the *nodes* that append
    to or update the state, and the *conditional edges* that decide which node to
    visit next. We are now to the point where we can step through each of these in
    code blocks, seeing how the three components interact with each other.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，让我们回顾一下。我们提到，一个有代理的RAG图有三个关键组件：我们已经讨论过的*状态*，添加到或更新状态的*节点*，以及决定下一个要访问哪个节点的*条件边*。我们现在已经到了可以逐个在代码块中查看这些组件，并了解这三个组件如何相互作用的阶段。
- en: Given this background, the first thing we will add to the code is the conditional
    edge, where the decisions are made. In this case, we are going to define an edge
    that determines whether the retrieved documents are relevant to the question.
    This is the function that will decide whether to move on to the generation stage
    or to go back and try again.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，我们首先将在代码中添加的是条件边，这是做出决策的地方。在这种情况下，我们将定义一个边，用于确定检索到的文档是否与问题相关。这个函数将决定是否进入生成阶段，或者返回重试。
- en: 'We will navigate this code in multiple steps, but keep in mind that this is
    one large function, starting with the definition:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将分多步导航这段代码，但请记住，这是一个大函数，从定义开始：
- en: '[PRE11]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: As seen here, this code starts by defining a function called `score_documents`
    that determines whether the retrieved documents are relevant to the given question.
    The function takes the state we’ve been discussing as a parameter, which is a
    set of messages that have been collected. This is how we make the state available
    to this conditional edge function.
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如此看来，这段代码首先定义了一个名为`score_documents`的函数，该函数确定检索到的文档是否与给定问题相关。该函数以我们一直在讨论的状态作为参数，即收集到的消息集合。这就是我们如何使状态可用于此条件边函数。
- en: 'Now, we build the data model:'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，我们构建数据模型：
- en: '[PRE12]'
  id: totrans-104
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This defines a data model class called scoring using Pydantic’s `BaseModel class`.
    The scoring class has a single field called `binary_score`, which is a string
    representing the relevance score as either `yes` or `no`.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这定义了一个名为`scoring`的数据模型类，使用Pydantic的`BaseModel`类。`scoring`类有一个名为`binary_score`的字段，它是一个表示相关性得分的字符串，可以是`yes`或`no`。
- en: 'Next, we add the LLM that will make this decision:'
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们添加将做出此决定的LLM：
- en: '[PRE13]'
  id: totrans-107
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: This creates an instance of `llm_with_tool` by calling `llm.with_structured_output(scoring)`,
    combining the LLM with the scoring data model for structured output validation.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调用`llm.with_structured_output(scoring)`创建`llm_with_tool`的实例，将LLM与用于结构化输出验证的评分数据模型相结合。
- en: 'As we have seen in the past, we need to set up a `PromptTemplate` class to
    pass to the LLM. Here is that prompt:'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如我们过去所见，我们需要设置一个`PromptTemplate`类以传递给LLM。以下是该提示：
- en: '[PRE14]'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This defines a prompt using the `PromptTemplate` class, providing instructions
    to the LLM for applying a binary score for the relevance of the retrieved document
    based on the given question.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这使用`PromptTemplate`类定义了一个提示，为LLM提供根据给定问题对检索到的文档的相关性应用二进制评分的说明。
- en: 'We can then use LCEL to build the chain that combines the prompt with the `llm_with_tool`
    tool we just set up:'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们可以使用LCEL构建一个链，将提示与刚刚设置的`llm_with_tool`工具结合起来：
- en: '[PRE15]'
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This chain represents the pipeline for scoring the documents. This defines the
    chain, but we haven’t invoked it yet.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这个链表示文档评分的流程。这定义了链，但我们还没有调用它。
- en: 'First, we want to pull in the state. Next, we pull the state (`"messages"`)
    into the function so that we can use it, and we take the last message:'
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，我们想要拉入状态。接下来，我们将状态（`"messages"`）拉入函数中，以便我们可以使用它，并取最后一条消息：
- en: '[PRE16]'
  id: totrans-116
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'This extracts the necessary information from the `state` parameter and then
    prepares the state/message as the context we are going to pass to our agent brain
    (LLM). The specific components extracted here include the following:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这从`state`参数中提取必要的信息，然后准备状态/消息作为我们将传递给我们的代理大脑（LLM）的上下文。这里提取的具体组件包括以下内容：
- en: '`messages`: The list of messages in the conversation'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`messages`: 对话中的消息列表'
- en: '`last_message`: The last message in the conversation'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`last_message`: 对话中的最后一条消息'
- en: '`question`: The content of the first message, which is assumed to be the user’s
    question'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`question`: 第一条消息的内容，假设是用户的问题'
- en: '`docs`: The content of the last message, which is assumed to be the retrieved
    documents'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`docs`: 最后一条消息的内容，假设为检索到的文档'
- en: 'Then, finally, we invoke the chain with the prompt filled (if you remember,
    we call this **hydrating** the prompt) with question and context docs to get the
    scored result:'
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，最后，我们使用填充提示（如果你记得，我们称之为**激活**提示）调用链，带有问题和上下文文档以获取评分结果：
- en: '[PRE17]'
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: This extracts the `binary_score` variable from the `scored_result` object and
    assigns it to the `score` variable.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这从`scored_result`对象中提取`binary_score`变量并将其分配给`score`变量。
- en: 'The `llm_with_tool` step, which is the last step in the LangChain chain, aptly
    called **chain**, is going to return a string-based binary result based on the
    response from the scoring function:'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`llm_with_tool`步骤，LangChain链中的最后一个步骤，恰当地称为**chain**，将根据评分函数的响应返回基于字符串的二进制结果：'
- en: '[PRE18]'
  id: totrans-126
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: This checks the value of the score. If the `score` value is `yes`, it prints
    a message indicating that the documents are relevant and returns generate as the
    final output from the `score_documents` function, suggesting that the next step
    is to generate a response. If the `score` value is `no`, or, technically, anything
    other than `yes`, it prints messages indicating that the documents are not relevant
    and returns improved, suggesting that the next step is to improve the query from
    the user.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这检查评分的值。如果`score`值为`yes`，它打印一条消息，表明文档是相关的，并从`score_documents`函数返回`generate`作为最终输出，建议下一步是生成响应。如果`score`值是`no`，或者技术上讲，任何不是`yes`的值，它打印消息表明文档是不相关的，并返回`improved`，建议下一步是改进用户的问题。
- en: Overall, this function acts as a decision point in the workflow, determining
    whether the retrieved documents are relevant to the question and directing the
    flow to either generate a response or rewrite the question based on the relevance
    score.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，此函数在工作流程中充当决策点，确定检索到的文档是否与问题相关，并根据相关性分数将流程导向生成响应或重写问题。
- en: 'Now that we have our conditional edge defined, we are going to move on to defining
    our nodes, starting with the agent:'
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在我们已经定义了条件边缘，我们将继续定义我们的节点，首先是代理：
- en: '[PRE19]'
  id: totrans-130
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'This function represents the agent node on our graph and invokes the agent
    model to generate a response based on the current state. The agent function takes
    the current state (`state`) as input, which contains the messages in the conversation,
    prints a message indicating that it is calling the agent, extracts the messages
    from the state dictionary, uses the `agent_llm` instance of the `ChatOpenAI` class
    we defined earlier, representing the agent *brain*, and then binds the tools to
    the model using the `bind_tools` method. We then invoke the agent’s `llm` instance
    with the messages and assign the result to the `response` variable. When you bind
    tools to an LLM with `llm.bind_tools(tools)`, you’re giving the agent the information
    it needs to decide which tool to use and how to use it. This is why we stressed
    the importance of clear, descriptive tool names such as `retrieve_google_environmental_question_answers`,
    rather than something generic, such as `retriever`. The LLM uses these descriptions
    to reason about which tool best fits the current task. A well-written description
    acts as instructions for the agent, helping it understand when and how to use
    each tool effectively. Specifically, the agent receives:'
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 此函数代表我们图上的代理节点，并调用代理模型根据当前状态生成响应。代理函数以当前状态（`state`）作为输入，其中包含对话中的消息，打印一条消息表明它正在调用代理，从状态字典中提取消息，使用我们之前定义的`ChatOpenAI`类的`agent_llm`实例，代表代理的“大脑”，然后使用`bind_tools`方法将工具绑定到模型。然后我们使用消息调用代理的`llm`实例，并将结果分配给`response`变量。当你使用`llm.bind_tools(tools)`将工具绑定到LLM时，你正在为代理提供它所需的信息来决定使用哪个工具以及如何使用它。这就是为什么我们强调了清晰、描述性的工具名称，如`retrieve_google_environmental_question_answers`的重要性，而不是像`retriever`这样的通用名称。LLM使用这些描述来推理哪个工具最适合当前任务。良好的描述充当代理的指令，帮助它理解何时以及如何有效地使用每个工具。具体来说，代理接收：
- en: '**Tool schemas**: The function signatures with parameter types, telling the
    agent what inputs each tool expects'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具模式**：函数签名及其参数类型，告诉代理每个工具期望什么输入'
- en: '**Tool descriptions**: The natural language explanations you provided when
    defining each tool'
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具描述**：你在定义每个工具时提供的自然语言解释'
- en: '**Tool names**: The identifiers the agent uses to select and call specific
    tools'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具名称**：代理用来选择和调用特定工具的标识符'
- en: 'Our next node, `improve`, is responsible for transforming `user_query` to produce
    a better question if the agent determines this is needed:'
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们下一个节点`improve`负责将`user_query`转换为更好的问题，如果代理确定这是必要的：
- en: '[PRE20]'
  id: totrans-136
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: This function, like all of our node and edge-related functions, takes the current
    state (`state`) as input. The function returns a dictionary with the response
    appended to the `messages` list. The function prints a message indicating that
    it is transforming the query, extracts the messages from the state dictionary,
    retrieves the content of the first message (`messages[0].content`), which is assumed
    to be the initial question, and assigns it to the `question` variable. We then
    set up a message using the `HumanMessage` class, indicating that we want the `llm`
    instance to reason about the underlying semantic intent of the question and formulate
    an improved question. The result from the `llm` instance is assigned to the `response`
    variable. Finally, it returns a dictionary with the response appended to the `messages`
    list.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数，就像我们所有的节点和边缘相关函数一样，以当前状态（`state`）作为输入。函数返回一个字典，其中包含附加到`messages`列表中的响应。函数打印一条消息，表明它正在转换查询，从状态字典中提取消息，检索第一条消息的内容（`messages[0].content`），假设它是初始问题，并将其分配给`question`变量。然后我们使用`HumanMessage`类设置一条消息，表明我们希望`llm`实例推理问题的潜在语义意图并制定一个改进的问题。`llm`实例的结果分配给`response`变量。最后，它返回一个包含响应附加到`messages`列表的字典。
- en: 'Our next node function is the `generate` function:'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们下一个节点函数是`generate`函数：
- en: '[PRE21]'
  id: totrans-139
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: This function is similar to our generation step in the previous chapter’s code
    labs, but simplified to provide just the response. It generates an answer based
    on the retrieved documents and the question. The function takes the current state
    (`state`) as input, which contains the messages in the conversation, prints a
    message indicating that it is generating an answer, extracts the messages from
    the state dictionary, retrieves the content of the first message (`messages[0].content`),
    which is assumed to be the question, and assigns it to the `question` variable.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数类似于前一章代码实验室中的生成步骤，但简化了以仅提供响应。它根据检索到的文档和问题生成一个答案。该函数以当前状态（`state`）作为输入，其中包含对话中的消息，打印一条消息表示正在生成答案，从状态字典中提取消息，检索第一条消息的内容（`messages[0].content`），假设它是问题，并将其分配给`question`变量。
- en: The function then retrieves the last message (`messages[-1]`) and assigns it
    to the `last_message` variable. The `docs` variable is assigned the content of
    `last_message`, which is assumed to be the retrieved documents. At this point,
    we create a chain called `rag_chain` by combining the `generation_prompt`, `llm`,
    and `str_output_parser` variables using the `|` operator. As with other LLM prompting,
    we hydrate the predefined `generation_prompt` as the prompt for generating the
    answer, which returns a dictionary with the `response` variable appended to the
    `messages` list.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 函数随后检索最后一条消息（`messages[-1]`），并将其分配给`last_message`变量。`docs`变量被分配给`last_message`的内容，假设它是检索到的文档。在此阶段，我们通过使用`|`运算符组合`generation_prompt`、`llm`和`str_output_parser`变量来创建一个名为`rag_chain`的链。与其他LLM提示一样，我们将预定义的`generation_prompt`作为生成答案的提示，它返回一个包含`response`变量附加到`messages`列表的字典。
- en: Next, we want to set up our cyclical graphs using LangGraph and assign our nodes
    and edges to them.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们希望使用LangGraph设置我们的循环图，并将我们的节点和边分配给它们。
- en: Cyclical graph setup
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 循环图设置
- en: 'The next big step in our code is setting up our graphs using LangGraph:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们代码中的下一个重要步骤是使用LangGraph设置我们的图：
- en: 'First, we import some important packages to get us started:'
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，我们导入一些重要的包以开始我们的工作：
- en: '[PRE22]'
  id: totrans-146
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'This code imports the following necessary classes and functions from the `langgraph`
    library:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码从`langgraph`库中导入以下必要的类和函数：
- en: '`END`: A special node representing the end of the workflow'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`END`：表示工作流程结束的特殊节点'
- en: '`StateGraph`: A class for defining the state graph of the workflow'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`StateGraph`：用于定义工作流程状态图的类'
- en: '`ToolNode`: A class for defining a node that represents a tool or action'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ToolNode`：用于定义表示工具或动作的节点的类'
- en: 'We then pass `AgentState` as an argument to the `StateGraph` class we just
    imported for defining the state graph of the workflow:'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，我们将`AgentState`作为参数传递给刚刚导入的`StateGraph`类，用于定义工作流程的状态图：
- en: '[PRE23]'
  id: totrans-152
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This creates a new instance of `StateGraph` called `workflow` and defines a
    new graph for that `workflow` instance.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这创建了一个名为`workflow`的新`StateGraph`实例，并为该`workflow`实例定义了一个新图。
- en: 'Next, we define the nodes we will cycle between and assign our node functions
    to them:'
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们定义我们将循环的节点，并将我们的节点函数分配给它们：
- en: '[PRE24]'
  id: totrans-155
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'This code adds multiple nodes to the `workflow` instance using the `add_node`
    method:'
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 此代码使用`add_node`方法将多个节点添加到`workflow`实例中：
- en: '`"agent"`: This node represents the agent node, which invokes the `agent` function.'
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`"agent"`：此节点代表代理节点，它调用`agent`函数。'
- en: '`"retrieve"`: This node represents the retrieval node, which is a special `ToolNode`
    containing the `tools` list we defined earlier with the `web_search` and `retriever_tool`
    tools. In this code, to aid in readability, we explicitly break out the `ToolNode`
    class instance and define the `retrieve` variable with it, which indicates the
    “retrieve” focus of this node more explicitly. We then pass that `retrieve` variable
    into the `add_node` function.'
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`"retrieve"`：此节点代表检索节点，它是一个包含我们之前定义的`web_search`和`retriever_tool`工具的`tools`列表的特殊`ToolNode`。在此代码中，为了提高可读性，我们明确地提取了`ToolNode`类实例，并使用它定义了`retrieve`变量，这更明确地表示了此节点的“检索”焦点。然后，我们将该`retrieve`变量传递给`add_node`函数。'
- en: '`"improve"`: This node represents the node for improving the question, which
    invokes the `improve` function.'
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`"improve"`：此节点代表改进问题的节点，它调用`improve`函数。'
- en: '`"generate"`: This node represents the node for generating a response, which
    invokes the `generate` function.'
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`"generate"`：此节点代表生成响应的节点，它调用`generate`函数。'
- en: 'Next, we need to define the starting point for our workflow:'
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们需要定义我们的工作流程的起点：
- en: '[PRE25]'
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This sets the entry point of the `workflow` instance to the `"agent"` node using
    `workflow.set_entry_point("agent")`.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这将`workflow`实例的入口点设置为`"agent"`节点，使用`workflow.set_entry_point("agent")`实现。
- en: 'Next, we call the `"agent"` node to decide whether to retrieve or not:'
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们调用`"agent"`节点来决定是否检索：
- en: '[PRE26]'
  id: totrans-165
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'In this code, `tools_condition` is used as a conditional edge in the workflow
    graph. It determines whether the agent should proceed to the retrieval step (`"tools":
    "retrieve"`) or end the conversation (`END: END`) based on the agent’s decision.
    The retrieval step represents both of the tools that we made available for the
    agent to use where needed, and the other option, to end the conversation, simply
    ends the workflow.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '在此代码中，`tools_condition`用作工作流程图中的条件边。它根据代理的决定确定代理是否应该继续到检索步骤（`"tools": "retrieve"”）或结束对话（`END:
    END`）。检索步骤代表我们为代理提供的两个工具，供代理在需要时使用，而另一个选项，结束对话，只是简单地结束工作流程。'
- en: 'Here, we add more edges, which are used after the `"``action"` node is called:'
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这里，我们添加了更多边，这些边在调用`"action"`节点之后使用：
- en: '[PRE27]'
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE27]'
- en: After the `"retrieve"` node is called, it adds conditional edges using `workflow.add_conditional_edges("retrieve",
    score_documents)`. This assesses the retrieved documents using the `score_documents`
    function and determines the next node based on the score. This also adds an edge
    from the `"generate"` node to the `END` node using `workflow.add_edge("generate",
    END)`. This indicates that, after generating a response, the workflow ends. Lastly,
    this adds an edge from the `"improve"` node back to the `"agent"` node using `workflow.add_edge("improve",
    "agent")`. This creates a loop where the improved question is sent back to the
    agent for further processing.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在调用`"retrieve"`节点之后，它使用`workflow.add_conditional_edges("retrieve", score_documents)`添加条件边。这使用`score_documents`函数评估检索到的文档，并根据分数确定下一个节点。这还使用`workflow.add_edge("generate",
    END)`从`"generate"`节点到`END`节点添加一个边。这表示在生成响应后，工作流程结束。最后，它使用`workflow.add_edge("improve",
    "agent")`从`"improve"`节点回到`"agent"`节点添加一个边。这创建了一个循环，其中改进的问题被发送回代理进行进一步处理。
- en: 'We are now ready to compile the graph:'
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们现在准备好编译图：
- en: '[PRE28]'
  id: totrans-171
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE28]'
- en: This line compiles the workflow graph using `workflow.compile` and assigns the
    compiled graph to the `graph` variable, which now represents a compiled version
    of the `StateGraph` graph instance we started with.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这行代码使用`workflow.compile`编译工作流程图，并将编译后的图赋值给`graph`变量，现在它代表了我们最初启动的`StateGraph`图实例的编译版本。
- en: 'We have already shown you the visualization of what this graph looks like earlier
    in this chapter in *Figure 12.1*, but if you want to run the visualization yourself,
    you can use this code:'
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们已经在本章前面展示了这个图的可视化，如图12.1所示，但如果你想要自己运行可视化，可以使用以下代码：
- en: '[PRE29]'
  id: totrans-174
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE29]'
- en: We can use `IPython` to generate this visualization.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用`IPython`生成这个可视化。
- en: 'Lastly, we are going to finally put our agent to work:'
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们将最终让我们的代理开始工作：
- en: '[PRE30]'
  id: totrans-177
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE30]'
- en: This imports the `pprint` module, which provides a pretty-print function for
    formatting and printing data structures, allowing us to see a more human-readable
    version of our agent output. We then define a dictionary called `inputs` that
    represents the initial input to the workflow graph. The `inputs` dictionary contains
    a `"messages"` key with a list of tuples. In this case, it has a single tuple,
    `("user", user_query)`, where the `"user"` string represents the role of the message
    sender (`user`), and `user_query` is the user’s query or question.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 这导入了`pprint`模块，它提供了一个格式化和打印数据结构的pretty-print函数，使我们能够看到我们代理输出的更易读版本。然后我们定义了一个名为`inputs`的字典，它表示工作流程图的初始输入。`inputs`字典包含一个`"messages"`键，其中有一个元组列表。在这种情况下，它有一个单一的元组`("user",
    user_query)`，其中`"user"`字符串表示消息发送者的角色（`user`），而`user_query`是用户的查询或问题。
- en: 'We then initialize an empty string variable called `final_answer` to store
    the final answer generated by the workflow:'
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后我们初始化一个名为`final_answer`的空字符串变量来存储工作流程生成的最终答案：
- en: '[PRE31]'
  id: totrans-180
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'We then start our agent loop using the graph instance as the basis:'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后我们以图实例为基础启动我们的代理循环：
- en: '[PRE32]'
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE32]'
- en: This starts a double loop using the output in `graph.stream(inputs)`. This iterates
    over the outputs generated by the graph instance as it processes the inputs. The
    `graph.stream(inputs)` method streams the outputs from the graph instance execution.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这启动了一个双重循环，使用`graph.stream(inputs)`中的输出。这遍历由图实例在处理输入时生成的输出。`graph.stream(inputs)`方法从图实例执行中流式传输输出。
- en: Inside the outer loop, it starts another loop for two variables, `key` and `value`,
    representing the key-value pairs in the `output.items` variable. This iterates
    over each of those key-value pairs, where the `key` variable represents the node
    name and the `value` variable represents the output generated by that node. This
    will print the node name using `pprint.pprint(f"Output from node '{key}':")` to
    indicate which node generated the output.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在外循环内部，它为两个变量`key`和`value`启动另一个循环，这两个变量代表`output.items`变量中的键值对。这遍历每个键值对，其中`key`变量代表节点名称，`value`变量代表该节点生成的输出。这将使用`pprint.pprint(f"Output
    from node '{key}':")`打印节点名称，以指示哪个节点生成了输出。
- en: The code pretty-prints the value (`output`) using `pprint.pprint(value, indent=2,
    width=80, depth=None)`. The `indent` parameter specifies the indentation level,
    `width` specifies the maximum width of the output, and `depth` specifies the maximum
    depth of nested data structures to print (`None` means no limit).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 代码使用`pprint.pprint(value, indent=2, width=80, depth=None)`来漂亮地打印值（`output`）。`indent`参数指定缩进级别，`width`指定输出的最大宽度，`depth`指定要打印的嵌套数据结构的最大深度（`None`表示无限制）。
- en: It assigns the value (`output`) to the `final_answer` variable, overwriting
    it in each iteration. After the loop ends, `final_answer` will contain the output
    generated by the last node in the workflow.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 它将值（`output`）赋给`final_answer`变量，并在每次迭代中覆盖它。循环结束后，`final_answer`将包含工作流中最后一个节点生成的输出。
- en: A nice feature of this code is that it allows you to see the intermediate outputs
    generated by each node in the graph and track the progress of the query processing.
    These print outputs represent the agent’s “thoughts” as it makes decisions within
    the loop. The pretty-printing helps in formatting the outputs for better readability.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码的一个不错的特点是，它允许你看到图中每个节点生成的中间输出，并跟踪查询处理的进度。这些打印输出代表了代理在循环中做出决策时的“思考”。漂亮的打印格式有助于格式化输出，使其更易于阅读。
- en: When we start the agent and start seeing the output, we can see that a lot is
    going on!
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们启动代理并开始看到输出时，我们可以看到有很多事情在进行中！
- en: 'I will truncate a lot of the printout, but this will give you an idea of what
    is provided:'
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我将截断大量的打印输出，但这将给你一个大致的了解：
- en: '[PRE33]'
  id: totrans-190
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE33]'
- en: This is the first part of our printout. Here, we see the agent is deciding to
    use the `retrieve_google_environmental_question_answers` tool. If you will recall,
    that is the text-based name we gave to the retriever tool when defining it. Good
    choice!
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的打印输出的第一部分。在这里，我们看到代理决定使用`retrieve_google_environmental_question_answers`工具。如果你还记得，这是我们定义检索器工具时为其赋予的基于文本的名称。选择得很好！
- en: 'Next, the agent is going to determine whether it thinks the documents retrieved
    are relevant:'
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，代理将确定它认为检索到的文档是否相关：
- en: '[PRE34]'
  id: totrans-193
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The decision is that they are. Again, smart thinking, Agent.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 决定是它们是。再次，代理，你的思考很聪明。
- en: 'Lastly, we see the output of what the agent is looking at, retrieved from the
    PDF document and the ensemble retriever we have been using (there was a lot of
    retrieved data here, so I truncated most of the actual content):'
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们看到代理正在查看的内容的输出，这些内容是从PDF文档和我们一直在使用的集成检索器中检索到的（这里检索到了很多数据，所以我截断了大部分实际内容）：
- en: '[PRE35]'
  id: totrans-196
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE35]'
- en: When you look at the actual printout for this portion, you see that the retrieved
    data is concatenated together and provides substantial and in-depth data for our
    agent to work with.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 当你查看这部分的实际打印输出时，你会看到检索到的数据被连接在一起，为我们的代理提供了大量和深入的数据来处理。
- en: 'At this point, just like our original RAG application was doing, the agent
    takes the question, retrieves data, and formulates a response based on the generation
    prompt we gave it:'
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这一点上，就像我们的原始RAG应用所做的那样，代理接收问题，检索数据，并根据我们给出的生成提示制定响应：
- en: '[PRE36]'
  id: totrans-199
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'We included a mechanism here to print out the final message separately for
    readability:'
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们在这里加入了一个机制，以便为了可读性而单独打印出最终消息：
- en: '[PRE37]'
  id: totrans-201
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'This will print this out:'
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这将打印出以下内容：
- en: '[PRE38]'
  id: totrans-203
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE38]'
- en: That is the full output of our agent!
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们的代理的全部输出！
- en: Summary
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored how AI agents and LangGraph can be combined to
    create more powerful and sophisticated RAG applications. We learned that an AI
    agent is essentially an LLM with a loop that allows it to reason and break tasks
    down into simpler steps, improving the chances of success in complex RAG tasks.
    LangGraph, an extension built on top of LCEL, provides support for building composable
    and customizable agentic workloads, enabling developers to orchestrate agents
    using a graph-based approach.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何将AI代理和LangGraph结合起来创建更强大和复杂的RAG应用。我们了解到，AI代理本质上是一个具有循环的LLM，允许它进行推理并将任务分解成更简单的步骤，从而提高在复杂RAG任务中成功的可能性。LangGraph，作为LCEL之上的扩展，提供了构建可组合和可定制代理工作负载的支持，使开发者能够使用基于图的方法编排代理。
- en: We dove into the fundamentals of AI agents and RAG integration, discussing the
    concept of tools that agents can use to carry out tasks, and how LangGraph’s `AgentState`
    class tracks the state of the agent over time. We also covered the core concepts
    of graph theory, including nodes, edges, and conditional edges, which are crucial
    for understanding how LangGraph works.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 我们深入探讨了AI代理和RAG集成的原理，讨论了代理可以使用以执行任务的工具概念，以及LangGraph的`AgentState`类如何跟踪代理随时间变化的状态。我们还涵盖了图论的核心概念，包括节点、边和条件边，这些对于理解LangGraph的工作原理至关重要。
- en: 'The key difference between standard RAG and agent-enhanced RAG is control flow.
    In standard RAG, the pipeline is linear: retrieve documents, pass them to the
    LLM, and generate a response. If the retrieved documents aren’t relevant, you
    get a poor answer anyway. With an agent, the LLM can reason about what to do:
    choose between multiple retrieval sources (such as our web search and document
    retriever), evaluate whether the retrieved documents are actually relevant, improve
    the query if needed, and loop back to try again. This self-correcting capability
    makes agent RAG far more robust for complex questions.'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 标准RAG与增强型代理RAG之间的关键区别在于控制流。在标准RAG中，流程是线性的：检索文档，将它们传递给LLM，并生成响应。如果检索到的文档不相关，你无论如何都会得到一个糟糕的答案。有了代理，LLM可以推理出该做什么：在多个检索源（如我们的网络搜索和文档检索器）之间进行选择，评估检索到的文档是否真正相关，如果需要，改进查询，并循环尝试再次检索。这种自我纠正的能力使得代理RAG在处理复杂问题时更加稳健。
- en: In the code lab, we built a LangGraph retrieval agent for our RAG application,
    demonstrating how to create tools, define the agent state, set up prompts, and
    establish the cyclical graphs using LangGraph. We saw how the agent uses its reasoning
    capabilities to determine which tools to use, how to use them, and what data to
    feed them, ultimately providing a more thorough response to the user’s question.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码实验室中，我们为我们的RAG应用构建了一个LangGraph检索代理，展示了如何创建工具、定义代理状态、设置提示以及使用LangGraph建立循环图。我们看到了代理如何使用其推理能力来确定使用哪些工具，如何使用它们，以及向它们提供什么数据，最终为用户的问题提供更全面的回答。
- en: Looking ahead, the next chapter will take our agent capabilities to a deeper
    level by introducing ontology-based knowledge engineering. While our current agents
    can reason about tasks and tool usage, they lack an explicit understanding of
    domain concepts and their relationships. [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299)
    will show you how to build formal knowledge structures using ontologies, providing
    your agents with the semantic foundation they need for more sophisticated reasoning
    and domain-specific expertise.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，下一章将通过引入基于本体论的知识工程，将我们的代理能力提升到更深的层次。虽然我们当前的代理可以推理任务和工具的使用，但它们缺乏对领域概念及其关系的明确理解。[第13章](B34736_13_ePub.xhtml#_idTextAnchor299)将向您展示如何使用本体构建形式化的知识结构，为您的代理提供进行更复杂推理和特定领域专业知识所需的语义基础。
