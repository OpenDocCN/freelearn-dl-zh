- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Explainability and Compliance Agentic Patterns
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 可解释性和合规性代理模式
- en: In the previous chapter, we detailed the coordination patterns that enable multiple
    agents to work in concert, tackling complex problems through structured collaboration.
    We have the blueprints for making agents plan, share knowledge, and resolve conflicts.
    However, for an agentic system to move beyond a prototype and into a production
    enterprise environment, its effectiveness must be matched by its **trustworthiness**.
    Autonomy without accountability is a liability.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们详细介绍了使多个代理能够协同工作、通过结构化协作解决复杂问题的协调模式。我们有使代理规划、共享知识和解决冲突的蓝图。然而，为了使代理系统从原型发展到生产型企业环境，其有效性必须与它的**可靠性**相匹配。没有问责的自主性是一种负担。
- en: 'This brings us to the critical domains of explainability and compliance:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这将我们引向关键的可解释性和合规性领域：
- en: '**Explainability** focuses on making an agent''s decision-making process transparent
    and understandable, answeringidx_21c4d56d the crucial question: *Why did the agent
    do that?*'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**专注于使代理的决策过程透明易懂，回答关键的疑问：*代理为什么这样做？*'
- en: '**Compliance** ensures that idx_9558e6d8an agent''s actions adhere to a complex
    web of external regulations and internal policies, answering the equally important
    question: *Can I verify* *whether* *the agent followed the rules?*'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规性**确保代理的行为遵守复杂的外部法规和内部政策，回答同样重要的问题：*我能否验证代理是否遵循了规则？*'
- en: 'To incorporate these aspects within an agentic system, this chapter introduces
    four specific architectural patterns: ***Instruction Fidelity Auditing***, ***Fractal
    Chain-of-Thought*** ***(******FCoT******)*** ***Embedding***, ***Persistent Instruction
    Anchoring***, and ***Shared Epistemic Memory***.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将这些方面纳入代理系统，本章介绍了四种特定的架构模式：***指令忠实度审计***，***分形思维链（FCoT）***，***嵌入***，***持久指令锚定***，和***共享认知记忆***。
- en: To make these patterns as practical as possible, we will take a "map before
    the journey" approach. Before diving into the technical details of each pattern,
    we will first present a strategic guide to implementation.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这些模式尽可能实用，我们将采取“在旅程之前先画地图”的方法。在深入到每个模式的详细技术细节之前，我们首先将提供一个实施的战略指南。
- en: This guide, aligned with our GenAI Maturity Model, provides a roadmap for how
    the need for these accountability patterns deepens as a system evolves from a
    single agent to a multi-agent collective. By understanding the bigger picture
    first, you will have the context to appreciate where each specific pattern fits
    and why it is essential for building accountable, production-grade agentic systems.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 本指南与我们的 GenAI 成熟度模型相一致，提供了如何随着系统从单个代理发展到多代理集体，这些问责模式的需求加深的发展路线图。通过首先理解大局，你将拥有欣赏每个特定模式如何适应以及为什么它对于构建可问责的生产级代理系统至关重要的背景。
- en: A strategic guide to implementing explainability and compliance patterns
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施可解释性和合规性模式的战略指南
- en: 'The patterns in this chapter are not just a toolkit; their idx_4091b05fapplication
    deepens as an organization''s agentic systems mature. While useful for a single,
    complex agent, they become absolutely essential for governing the intricate interactions
    within a multi-agent collective. The following table illustrates how the application
    of these patterns evolves as a system matures from a single-agent to a multi-agent
    architecture:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中的模式不仅是一个工具集；随着一个组织的代理系统成熟，它们的应用深度也在加深。虽然对于单个复杂代理有用，但它们对于管理多代理集体内部的复杂交互变得绝对必要。以下表格说明了这些模式的应用如何随着系统从单个代理架构成熟到多代理架构而演变：
- en: '| **Architectural** **a****spect** | **Application at** **L****evel 5 (****s****ingle-****a****gent**
    **s****ystem)** | **Application at** **L****evel 6 (****m****ulti-****a****gent**
    **s****ystem)** |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| **架构** **方面** | **在** **级别 5（单个代理系统）** **的应用** | **在** **级别 6（多代理系统）** **的应用**
    |'
- en: '| --- | --- | --- |'
  id: totrans-12
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Primary goal | Ensure a single, autonomous agent is accountable and its complex
    reasoning is auditable. | Ensure an entire system of collaborating agents remains
    aligned with the top-level goal and is collectively reliable. |'
  id: totrans-13
  prefs: []
  type: TYPE_TB
  zh: '| 主要目标 | 确保单个自主代理是可问责的，并且其复杂的推理是可审计的。 | 确保整个协作代理系统与顶级目标保持一致，并且集体上可靠。 |'
- en: '| Instruction Fidelity Auditing | Used to audit the final output of a single
    agent before it takes a critical action. | Used to audit the handoffs between
    agents, ensuring instruction fidelity is maintained at each step in the hierarchy.
    |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
  zh: '| 指令忠实度审计 | 用于在单个代理采取关键行动之前审计其最终输出。 | 用于审计代理之间的交接，确保在层次结构的每个步骤中保持指令忠实度。|'
- en: '| Fractal CoT Embedding | Enables internal self-correction for a single agent,
    allowing it to refine its own multi-step reasoning process. | Enables both internal
    self-correction and inter-agent reflectivity, where agents can revise their plans
    based on the reasoning of their peers. |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| 分形CoT嵌入 | 使单个代理能够进行内部自我纠正，允许它完善自己的多步骤推理过程。 | 使内部自我纠正和代理间反思性成为可能，代理可以根据其同侪的推理来修订其计划。|'
- en: '| Persistent Instruction Anchoring | Keeps a single agent focused on its primary
    goal and constraints throughout a long, multi-step task. | Crucial for ensuring
    the original instruction and constraints survive the journey down a deep hierarchy
    of multiple agents. |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| 持久指令锚定 | 在一个长期的多步骤任务中，使单个代理始终专注于其主要目标和约束。 | 对于确保原始指令和约束在多个代理的深层层次结构中幸存至关重要。|'
- en: '| Shared Epistemic Memory | Less critical for a single agent, but can be used
    for logging its state or sharing context with a human supervisor. | Essential
    for inter-agent collaboration. It becomes the central nervous system, providing
    the "ground truth" that the entire system relies on. |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| 共享认知记忆 | 对于单个代理来说不太关键，但可以用于记录其状态或与人类监督员共享上下文。 | 对于代理间协作至关重要。它成为中枢神经系统，提供整个系统所依赖的“真实情况”。|'
- en: Table 6.1 – Mapping explainability and compliance patterns to the GenAI Maturity
    Model
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 表6.1 – 将可解释性和合规性模式映射到GenAI成熟度模型
- en: With this strategic context in mind, we can now explore the individual patterns
    that provide these guarantees. We will begin with a pattern that acts as an essential
    external verification layer, a critical checkpoint to ensure an agent's actions
    are fully aligned with its given instructions.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这个战略背景，我们现在可以探索提供这些保证的个别模式。我们将从一个充当基本外部验证层、确保代理的行为完全与其给定指令一致的关键检查点开始的模式。
- en: Instruction Fidelity Auditing
  id: totrans-20
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**指令忠实度审计**'
- en: In hierarchical multi-agent systems, a high-level agent often delegates sub-tasks
    to specialized subordinates. While these agents are designed to optimize their
    local tasks, they can unintentionally misinterpret or ignore higher-level constraints.
    This leads to "silent failures," where sub-tasks appear to complete idx_4192f992successfully,
    but the overall outcome is misaligned idx_5a28f757with the original business intent.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在分层多代理系统中，高级代理通常将子任务委托给专门的下属。虽然这些代理被设计来优化其局部任务，但它们可能会无意中误解或忽略高级约束。这导致“无声失败”，子任务看似成功完成，但整体结果与原始业务意图不符。
- en: To prevent this, the ***Instruction Fidelity Auditing*** pattern introduces
    a verification layer to ensure that an agent's actions strictly adhere to the
    original instructions it was given.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止这种情况，**指令忠实度审计**模式引入了一个验证层，以确保代理的行为严格遵循它所接受的原始指令。
- en: Context
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**上下文**'
- en: A multi-agent system where a supervising agent delegates tasks to one or more
    worker agents. The overall success of the operation idx_374310d4depends on the
    worker agents' strict compliance with all constraints specified in the original
    instruction.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个监督代理将任务委托给一个或多个工作代理的多代理系统。整个操作的成功取决于工作代理严格遵循原始指令中指定的所有约束。
- en: Problem
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**问题**'
- en: How can a system ensure that idx_4b20b1f6an autonomous agent, while optimizing
    for its local sub-task, remains strictly aligned with the original high-level
    instructions and global constraints, preventing silent failures where the overall
    goal is missed?
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如何确保一个自主代理，在优化其局部子任务的同时，仍然严格遵循原始的高级指令和全局约束，防止出现整体目标未达成的“无声失败”？
- en: Solution
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**解决方案**'
- en: The ***Instruction Fidelity Auditing*** pattern introduces a specialized auditor
    agent that acts as an automated checkpoint. The auditor's role is not to perform
    the task but to compare the output of a worker agent against theidx_15afdcd7 original
    instruction it received.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**指令忠实度审计**模式引入了一个专门的审计代理，该代理充当自动检查点。审计员的角色不是执行任务，而是将工作代理的输出与它收到的原始指令进行比较。'
- en: It verifies that all constraints and goals from the initial instruction have
    been met before the action is finalized. This creates an explicit verification
    layer that enforces accountability and prevents instruction drift.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 它在动作最终确定之前验证所有初始指令中的约束和目标是否已满足。这创建了一个显式的验证层，强制执行问责制并防止指令漂移。
- en: 'Example: Auditing an e-commerce discount application'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：审计电子商务折扣应用
- en: 'An e-commerce platform uses a `SupervisorAgent` to handle a customer''s request
    for a discount. The idx_4c8572f4supervisor must ensure that the `DiscountAgent`
    correctly applies the company''s discount policies:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一个电子商务平台使用`SupervisorAgent`来处理客户折扣请求。主管必须确保`DiscountAgent`正确应用公司的折扣政策：
- en: '`SupervisorAgent` **goal**: Ensure customer requests are handled correctly
    and according to business rules'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`SupervisorAgent` **目标**：确保客户请求得到正确处理，并符合业务规则'
- en: '`DiscountAgent` **goal**: Apply specified discounts to customer orders efficiently'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`DiscountAgent` **目标**：高效地将指定的折扣应用于客户订单'
- en: '`ComplianceAuditAgent` **goal**: Verify that actions taken by other agents
    comply with all constraints in the original instructions'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ComplianceAuditAgent` **目标**：验证其他代理采取的行动是否符合原始指令中的所有约束'
- en: 'The auditing workflow unfolds as follows:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 审计工作流程如下展开：
- en: '**Instruction**: The `SupervisorAgent` generates a precise instruction: `Apply
    a 15% ''WELCOME'' discount for user ''user123'' on order #5678, but **only if**
    this is their first order.`'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**指令**：`SupervisorAgent`生成精确的指令：`Apply a 15% ''WELCOME'' discount for user
    ''user123'' on order #5678, but **only if** this is their first order.`'
- en: '**Delegation** **and****e****xecution**: The instruction is sent to the `DiscountAgent`.
    It focuses on the primary action and applies the 15% discount, returning a success
    message: `{``"status": "SUCCESS", "action": "15% discount applied to order #5678"}`.
    The agent neglects to check the "first order" constraint.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**委托** **和** **执行**：指令被发送到`DiscountAgent`。它专注于主要动作，并应用15%的折扣，返回成功消息：`{``"status":
    "SUCCESS", "action": "15% discount applied to order #5678"}`。代理忽略了检查“首次订单”约束。'
- en: '**Audit**: Before finalizing the transaction, the `SupervisorAgent` sends the
    original instruction and the `DiscountAgent`''s output to the `ComplianceAuditAgent`
    for verification.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**审计**：在最终确定交易之前，`SupervisorAgent`将原始指令和`DiscountAgent`的输出发送到`ComplianceAuditAgent`进行验证。'
- en: '**Verification**: The `ComplianceAuditAgent` uses its tools to query the customer
    database. It finds that `''user123''` has several past orders.'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**验证**：`ComplianceAuditAgent`使用其工具查询客户数据库。它发现`''user123''`有多个历史订单。'
- en: '**Verdict**: The auditoridx_b15c1a8e returns a failure verdict with a clear
    reason: `{"``audit_status``": "FAIL", "reason": "Worker agent failed to check
    the ''first order'' constraint. User ''user123'' is not a new customer."}`.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结论**：审计员`idx_b15c1a8e`返回失败结论，并给出明确的原因：`{"``audit_status``": "FAIL", "reason":
    "Worker agent failed to check the ''first order'' constraint. User ''user123''
    is not a new customer."}`。'
- en: '**Resolution**: The `SupervisorAgent` receives the failure, reverts the discount
    applied by the `DiscountAgent`, and sends an appropriate message to the user,
    preventing a policy violation.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解决方案**：`SupervisorAgent`收到失败，撤销`DiscountAgent`应用的折扣，并向用户发送适当的消息，防止政策违规。'
- en: '![Image 1](img/B33147_6_1.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![Image 1](img/B33147_6_1.png)'
- en: Figure 6.1 – Instruction Fidelity Auditing workflow
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1 – 指令忠实度审计工作流程
- en: This process ensures that even if a specialized agent takes a shortcut, the
    system's integrity is maintained by the independent audit layer.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程确保即使专门的代理采取了捷径，系统的完整性也通过独立的审计层得到维护。
- en: Example implementation
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sample codeidx_7c78ff7a demonstrates a conceptual implementation
    of the ***Instruction Fidelity Auditing*** pattern. In this scenario, we see how
    the `SupervisorAgent` orchestrates the workflow, ensuring that the output from
    the `DiscountAgent` is passed to the `ComplianceAuditAgent` for a idx_b29bdafbmandatory
    verification check before the transaction is finalized.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例代码`idx_7c78ff7a`展示了***指令忠实度审计***模式的概念性实现。在这个场景中，我们看到`SupervisorAgent`如何协调工作流程，确保在交易最终确定之前，将`DiscountAgent`的输出传递给`ComplianceAuditAgent`进行强制性的验证检查。
- en: '[PRE0]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Consequences
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：'
- en: '**Accountability** **and****e****xplainability**: This pattern creates an explicit
    checkpoint for idx_17ed5ce1compliance. The justifications from the auditor generate
    a clear, auditable trail of how and why decisions were validated, improving system
    transparency.'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**责任** **和** **可解释性**：此模式为idx_17ed5ce1合规性创建了一个明确的检查点。审计员的论据生成了一条清晰的、可审计的记录，说明了决策是如何和为什么被验证的，从而提高了系统的透明度。'
- en: '**Reliability**: It actively reduces silent failures where sub-tasks succeed
    locally but the overall goal is missed, thus making the entire system more robust
    and predictable.'
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可靠性**：它积极减少了无声失败的情况，即子任务在局部成功但整体目标未达成，从而使整个系统更加稳健和可预测。'
- en: '**Con**:'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Con**:'
- en: '**Performance** **o****verhead**: Adding an auditing layer introduces latency
    and computational cost, as each check may require additional tool use or LLM calls.
    This creates a direct trade-off between speed and reliability.'
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能** **开销**：添加审计层引入了延迟和计算成本，因为每次检查可能需要额外的工具使用或LLM调用。这直接导致了速度和可靠性之间的权衡。'
- en: Implementation guidance
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: When implementing this pattern, carefully select the critical junctures where
    auditing is most necessary. Applying audits at everyidx_60749883 step can severely
    impact performance. Focus on handoffs where the risk of misinterpretation or policy
    violation is highest. The goal is to strike a balance between the need for strict
    compliance and acceptable system latency.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施此模式时，仔细选择最需要审计的关键节点。在每一步应用审计可能会严重影响性能。关注那些误解或政策违规风险最高的交接点。目标是平衡严格合规和可接受的系统延迟。
- en: While the ***Instruction Fidelity Auditing*** pattern provides an essential
    external check on an agent's output, it is a reactive measure. To build a truly
    robust system, we also need agents to be proactive about maintaining alignment.
    The ***FCoT*** ***Embedding*** pattern addresses this by embedding a self-correcting
    capability directly into an agent's own reasoning process.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然***指令保真度审计***模式为代理的输出提供了一个基本的外部检查，但它是一种被动措施。为了构建一个真正稳健的系统，我们还需要代理积极维护一致性。***FCoT***
    ***嵌入***模式通过将自我校正能力直接嵌入到代理自身的推理过程中来解决这个问题。
- en: Fractal Chain-of-Thought Embedding
  id: totrans-57
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分形思维链嵌入
- en: While standard **chain-of-th****ought** (**CoT**) enables an idx_5f5812e3agent
    to perform sequential reasoning, it is often too rigid for dynamic, multi-agent
    environments. In these systems, agents must coordinate plans, adapt to new information,
    and correct their reasoning based on feedback from others. Traditional CoT and
    itsidx_f0640b91 variants lack theidx_19c03420 mechanisms for this kind of recursive
    revision and reflective coordination.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然标准的**思维链** (**CoT**)使代理能够执行顺序推理，但它对于动态的多代理环境来说通常过于僵化。在这些系统中，代理必须协调计划，适应新信息，并根据他人的反馈纠正推理。传统的CoT及其idx_f0640b91变体缺乏idx_19c03420这种递归修订和反思协调的机制。
- en: The ***FCoT*** pattern addresses this by structuring an agent's reasoning as
    a recursive, multi-level framework, enabling dynamic self-correction and better
    alignment in collaborative tasks.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '***FCoT***模式通过将代理的推理结构化为递归的多级框架来解决此问题，从而实现动态自我校正和协作任务中的更好对齐。'
- en: Context
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: A multi-agent system is assigned idx_058be9f3a complex problem that requires
    collaborative reasoning and adaptation. An agent's initial conclusions may become
    invalid as other agents in the system provide new or conflicting data, requiring
    a dynamic way to revise previous reasoning steps.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 一个多代理系统被分配了一个idx_058be9f3a复杂问题，该问题需要协作推理和适应。一个代理的初始结论可能因系统中其他代理提供的新数据或冲突数据而变得无效，需要动态地修改之前的推理步骤。
- en: Problem
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: How can an agent's reasoningidx_b4e669fa process be structured to allow for
    dynamic self-correction, synchronization with the reasoning of other agents, and
    analysis at multiple levels of detail, overcoming the static and isolated nature
    of traditional CoT methods?
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如何构建代理的推理idx_b4e669fa过程，以允许动态自我校正，与其他代理的推理同步，并在多个细节级别进行分析，克服传统CoT方法的静态和孤立特性？
- en: Solution
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***FCoT*** pattern structures an agent's reasoning process as a recursive
    and multi-scale framework. Instead of a static, linear chain, ***FCoT*** organizes
    reasoning into self-contained units that can be recursively refined. This allows
    an agent to correct its past conclusions based on new evidence and adapt its analysis
    to idx_6b61bf17different levels of detail.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '***FCoT*** 模式将代理的推理过程结构化为递归和多层次框架。与静态的线性链不同，***FCoT*** 将推理组织成可以递归细化的自包含单元。这使得代理可以根据新的证据纠正其过去的结论，并适应不同细节级别的分析。'
- en: 'This pattern operates on several core principles:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 此模式基于几个核心原则：
- en: '**Recursive self-correction**: Reasoning is guided by an objective function
    that simultaneously maximizes insight while minimizing error, creating a continuous
    self-correction loop'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**递归自我校正**：推理由一个目标函数引导，该函数同时最大化洞察力并最小化错误，创建一个连续的自我校正循环。'
- en: '**Dynamic context aperture**: The agent can widen or narrow its focus, zooming
    in for detailed analysis or zooming out to incorporate broader context from other
    agents'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态上下文窗口**：代理可以扩大或缩小其焦点，放大以进行详细分析或缩小以纳入来自其他代理的更广泛上下文。'
- en: '**Inter-agent reflectivity**: Agents are designed to evaluate and reflect upon
    the reasoning of other agents, enabling better alignment and more intelligent
    delegation'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理间反射性**：代理被设计用来评估和反思其他代理的推理，从而实现更好的对齐和更智能的委托'
- en: '**Temporal re-grounding**: Earlier reasoning steps can be formally revised
    in light of newer evidence, creating a dynamic and auditable thought process rather
    than a static, append-only log'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间重定位**：早期的推理步骤可以根据新的证据正式修订，从而创建一个动态和可审计的思维过程，而不是静态的、只能追加的日志。'
- en: 'To illustrate this concept, please review the following diagram:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这个概念，请查看以下图表：
- en: '![Image 2](img/B33147_6_2.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![Image 2](img/B33147_6_2.png)'
- en: Figure 6.2 – FCoT internal reasoning loop
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2 – FCoT内部推理循环
- en: 'Example: Collaborative research synthesis'
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：协作研究综合
- en: 'An AI system is tasked with producing idx_710207aaa literature review on "climate-resilient
    urban design" using a team of specialized agents:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一个AI系统被分配使用一组专业代理来生成关于“气候适应性城市设计”的文献综述：
- en: '`SynthesizerAgent` **goal**: To lead the project and synthesize the findings
    from specialist agents into a coherent final report'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`SynthesizerAgent` **目标**：领导项目并将来自专业代理的发现综合成一个连贯的最终报告'
- en: '`ClimateScienceAgent` **and**`MaterialSustainabilityAgent` **goals**: To research
    their specific domain and provide an expert summary'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ClimateScienceAgent` **和**`MaterialSustainabilityAgent` **目标**：研究他们各自的领域并提供专家总结'
- en: 'The collaborative reasoning process unfolds using ***FCoT***:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 协作推理过程使用 ***FCoT*** 展开：
- en: '**Initial** **r****esearch**: Each specialist agent generates an independent
    summary. The `MaterialSustainabilityAgent` produces a report highlighting the
    benefits of hempcrete based on its initial data.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初步** **研究**：每个专业代理生成一个独立的摘要。`MaterialSustainabilityAgent`根据其初始数据生成一份突出 hempcrete
    优势的报告。'
- en: '**Inter-****a****gent** **r****eflection**: The `SynthesizerAgent` shares these
    summaries. The `ClimateScienceAgent` analyzes the hempcrete recommendation and
    reports that high humidity in coastal cities could compromise the material''s
    structural integrity.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理间** **反射**：`SynthesizerAgent`分享这些摘要。`ClimateScienceAgent`分析了hempcrete的建议，并报告说沿海城市的高湿度可能会损害材料的结构完整性。'
- en: '**Temporal** **r****e-grounding**: The ***FCoT*** framework prompts the `MaterialSustainabilityAgent`
    to revise its original assessment based on this new constraint. Its initial reasoning
    is formally corrected to `"``Hempcrete is a viable sustainable material, but may
    degrade under high humidity without specialized treatment.``"`. This is a direct
    revision of a past conclusion, not just an addition.'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**时间** **重定位**：***FCoT*** 框架促使`MaterialSustainabilityAgent`根据这个新的约束修订其原始评估。其初始推理被正式更正为`"``Hempcrete是一种可行的可持续材料，但在未经特殊处理的情况下，高湿度可能会使其退化。``"`。这是对过去结论的直接修订，而不仅仅是添加。'
- en: '**Granularity** **c****ontrol**: The `SynthesizerAgent` initially works at
    a paragraph level to combine insights. It then adjusts its focus to a document-level
    perspective, ensuring the final report has aidx_98c47f8d coherent narrative structure
    rather than being a collection of separate facts.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**粒度** **控制**：`SynthesizerAgent`最初在段落级别工作以结合见解。然后它调整其焦点到文档级别视角，确保最终报告有一个连贯的叙事结构，而不是一系列单独的事实。'
- en: The following flowchart illustrates the FCoT process, where an agent's thought
    is generated, checked against objectives and external feedback, and then either
    finalized or recursively refined.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的流程图说明了 FCoT 流程，其中代理的思考被生成，与目标和对外部反馈进行核对，然后要么最终确定，要么递归地细化。
- en: '![Image 3](img/B33147_6_3.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图像 3](img/B33147_6_3.png)'
- en: Figure 6.3 – FCoT use case example
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.3 – FCoT 用例示例
- en: Example implementation
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: 'FCoT is often implemented via a sophisticated prompt template that guides an
    LLM through the recursive and reflective steps. It idx_edf38b6eforces the model
    to externalize its thought, check it against constraints, and explicitly decide
    to either proceed or revise:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: FCoT 通常通过一个复杂的提示模板来实现，该模板引导 LLM 通过递归和反思步骤。它迫使模型外部化其思考，对照约束进行检查，并明确决定是继续还是修改：
- en: '[PRE1]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Consequences
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Reliability** **and****s****elf-****c****orrection**: The framework''s greatest
    strength is its ability to enableidx_2f22cfdc real-time, self-corrective reasoning.
    Agents can catch and fix their own misalignments, leading to far more robust and
    reliable outcomes.'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可靠性和自我纠正**：该框架最大的优势是能够实现实时、自我纠正的推理。代理可以捕捉并修复自己的偏差，从而产生更加稳健和可靠的成果。'
- en: '**Explainability**: The explicit self-correction checks and temporal re-grounding
    create aidx_7c58c7f2 transparent and auditable trace. It is possible to see not
    only *what* an agent decided but *how* and *why* it changed its mind.'
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：显式的自我纠正检查和时态重定位创建了一个透明且可审计的跟踪。可以看到的不仅是代理决定的内容，还有其改变主意的**方式和原因**。'
- en: '**Con**:'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Complexity** **and****o****verhead**: FCoT is more complex to implement than
    standard CoT. It requires a sophisticated orchestration layer to manage shared
    context and trigger reflective loops, which can increase latency and token costs.'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性和开销**：FCoT 的实现比标准 CoT 更复杂。它需要一个复杂的协调层来管理共享上下文和触发反思循环，这可能会增加延迟和令牌成本。'
- en: Implementation guidance
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: Implementing FCoT requires a robust orchestration layer capable of managing
    shared memory, triggering reflective loops, and handling recursive updates.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 实现 FCoT 需要一个强大的协调层，能够管理共享内存、触发反思循环和处理递归更新。
- en: Start by defining a clear objective function for self-correction. Be mindful
    of the increased latency and token costs associatedidx_24e02246 with recursive
    checks, and apply this pattern to complex, high-value tasks where correctness
    and adaptability are more critical than raw speed.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 首先定义一个清晰的自我纠正目标函数。注意递归检查相关的增加延迟和令牌成本，并将此模式应用于复杂、高价值任务，在这些任务中，正确性和适应性比原始速度更重要。
- en: FCoT provides a powerful framework for agents to reason and self-correct internally.
    However, even the most sophisticated reasoning is vulnerable to system-level failures
    where context is lost or instructions are forgotten.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: FCoT 为代理提供了一种强大的框架，以内部推理和自我纠正。然而，即使是最复杂的推理也容易受到系统级故障的影响，在这些故障中，上下文丢失或指令被遗忘。
- en: To address this, we move from the agent's internal thought process to the way
    instructions are managed across the workflow. In the next section, we will explore
    the foundational pattern of ***Persistent Instruction Anchoring***, which ensures
    that core objectives remain "front and center" regardless of how long or complex
    a conversation becomes.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们将从代理的内部思维过程转向在整个工作流程中管理指令的方式。在下一节中，我们将探讨 **持续指令锚定** 的基础模式，确保核心目标无论对话多长或多复杂都保持“突出中心”。
- en: Persistent Instruction Anchoring
  id: totrans-100
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 持续指令锚定
- en: In long, hierarchical agent chains, initial instructions from a top-level orchestrator
    are often placed at the beginning of the context. As idx_6b1287aesubordinate agents
    add their own reasoning and data, this critical instruction gets pushed into the
    middle of the context window.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在长而层次分明的代理链中，来自顶层协调者的初始指令通常放置在上下文的开始处。随着从属代理添加自己的推理和数据，这个关键指令被推到上下文窗口的中间。
- en: LLMs often struggle with this "lost in the middle" problem, where they give
    less weight to information that isn't at the very beginning or end of their prompt.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs 往往难以处理这种“迷失在中间”的问题，即它们对不在其提示的开始或结束部分的信息给予较少的权重。
- en: The ***Persistent Instruction Anchoring*** pattern solves this by using special
    tags to make critical instructions stand out, ensuring theyidx_61f83691 are not
    forgotten by downstream agents.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**持久指令锚定**模式通过使用特殊标签使关键指令突出，确保下游代理不会忘记它们。'
- en: Context
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: In a deep, hierarchical idx_a96c11b2multi-agent system, an initial instruction
    is passed down a chain of agents. As each agent adds its own reasoning and data,
    the context window grows, pushing the original instruction further from the high-priority
    start and end positions.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个深层、分层的多代理系统中，初始指令沿着代理链传递。随着每个代理添加自己的推理和数据，上下文窗口增长，将原始指令推离高优先级的起始和结束位置。
- en: Problem
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: How can a system ensureidx_d11d6271 that critical, high-level instructions and
    constraints are not forgotten or ignored by downstream agents as the context window
    becomes longer and more cluttered? Without a mechanism to counteract the model's
    natural recency bias, a gradual "instruction drift" can occur, misaligning the
    final output from the original intent.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如何确保系统在上下文窗口变长且更杂乱的情况下，不会忘记或忽略关键的高级别指令和约束？如果没有机制来对抗模型固有的近期偏差，就可能发生逐渐的“指令漂移”，导致最终输出与原始意图不一致。
- en: Solution
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Persistent Instruction Anchoring*** pattern ensures that critical instructions
    remain salient regardless of their positionidx_adf11d0e in the context. This is
    achieved by embedding high-priority goals or constraints within semantically significant
    tags (e.g., `<``CRITICAL_INSTRUCTION``>`, `[GOAL]`, `#``DO_NOT_FORGET``:`). These
    "anchors" are passed down the chain and are designed to be easily recognized by
    the LLM, effectively reminding it of the idx_b8008410core objectives at every
    step of the workflow.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**持久指令锚定**模式确保了关键指令无论在上下文中的位置如何都保持显著。这是通过在语义上重要的标签（例如，`<CRITICAL_INSTRUCTION>`，`[GOAL]`，`#DO_NOT_FORGET:`）内嵌入高优先级目标或约束来实现的。这些“锚点”沿着链传递，并被设计成容易被LLM识别，有效地在工作流程的每一步提醒它核心目标。'
- en: 'Example: Maintaining constraints in financial reporting'
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：在财务报告中维持约束
- en: 'A financial reporting system uses a team of agents to generate a quarterly
    summary. The system must ensure that a strict legal idx_47fd1b75constraint is
    followed throughout the process:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 一个财务报告系统使用一组代理来生成季度摘要。系统必须确保在整个过程中遵循严格的法定约束：
- en: '`ReportingSupervisor` **goal**: Generate a Q3 financial summary without including
    any illegal forward-looking statements'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ReportingSupervisor` **目标**：生成一个不包含任何非法前瞻性声明的Q3财务摘要'
- en: '`DataExtractionAgent` **goal**: Extract specific financial data for Q3 from
    internal databases'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`DataExtractionAgent` **目标**：从内部数据库中提取Q3的具体财务数据'
- en: '`SummarizationAgent` **goal**: Create a narrative summary based on the provided
    financial data'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`SummarizationAgent` **目标**：根据提供的财务数据创建叙事摘要'
- en: 'The workflow prevents instruction drift using an anchor:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程使用锚点来防止指令漂移：
- en: '**Instruction** **and****a****nchoring**: The `ReportingSupervisor` agent defines
    the task with a strict negative constraint, which it frames as an anchor: `"Generate
    a summary of Q3 financial performance. PERSISTENT_GOAL: [NO_FORWARD_LOOKING_STATEMENTS]"`.'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**指令** **和** **锚定**：`ReportingSupervisor`代理定义了一个具有严格负面约束的任务，并将其作为锚点：“生成Q3财务表现的摘要。持久目标：[无前瞻性陈述]”。'
- en: '**Delegation**: The supervisor delegates the first part of the task to the
    `DataExtractionAgent`, passing along the anchored constraint with the new instruction.'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**委托**：主管将任务的第一部分委托给`DataExtractionAgent`，并随新指令传递锚定约束。'
- en: '**Processing** **and****h****andoff**: The `DataExtractionAgent` performs its
    task and passes its findings to the `SummarizationAgent`. The context it passes
    includes both the extracted data and the persistent goal anchor: `"Data: {revenue:
    10M, profit: 2M}. PERSISTENT_GOAL: [NO_FORWARD_LOOKING_STATEMENTS]. Please summarize
    this."`'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**处理** **和** **移交**：`DataExtractionAgent`执行其任务并将发现传递给`SummarizationAgent`。它传递的上下文包括提取的数据和持久目标锚点：“数据：{收入：1000万，利润：200万}。持久目标：[无前瞻性陈述]。请总结。”'
- en: '**Final** **o****utput**: The `SummarizationAgent`''s prompt now contains the
    critical instruction right alongside the data it needs to process. Its LLM core
    is far more likely to see and adhere to the negative constraint, preventing it
    from adding speculative language about Q4 performance.'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**最终** **输出**：`SummarizationAgent`的提示现在包含了关键指令，以及它需要处理的数据。其LLM核心更有可能看到并遵守负面约束，防止它添加关于Q4表现的推测性语言。'
- en: The following diagram idx_40a913eacontrasts a workflow without anchoring, where
    instructions are lost, against a workflow with anchoring, where the instructions
    remain prominent and ensure an aligned output.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 下图idx_40a913ea对比了没有锚定的流程，其中指令丢失，与有锚定的流程，其中指令保持突出，并确保输出一致。
- en: '![Image 4](img/B33147_6_4.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图像 4](img/B33147_6_4.png)'
- en: Figure 6.4 – Persistent Instruction Anchoring workflow
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.4 – 持续指令锚定工作流程
- en: Example implementation
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: 'The implementation involves passing the idx_01df4fc2anchored instruction string
    through the agent chain:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 实现涉及通过代理链传递idx_01df4fc2锚定指令字符串：
- en: '[PRE2]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Consequences
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pro****s**:'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Reliability**: This pattern significantly improves the recall of upstream
    instructions, reducingidx_1f0b02cd instruction drift and ensuring downstream agents
    remain aligned with the primary mission'
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可靠性**：此模式显著提高了上游指令的召回率，减少了idx_1f0b02cd指令漂移，并确保下游代理与主要任务保持一致'
- en: '**Explainability**: The presence of anchored instructions in agent-to-agent
    messages provides a clear and auditable trace of how critical constraints were
    maintained throughout the workflow'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：在代理到代理的消息中存在锚定指令，为在整个工作流程中如何维持关键约束提供了一个清晰且可审计的跟踪'
- en: '**Con**:'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Prompt** **ov****erhead**: It adds a minor overhead to the prompt and requires
    a consistent templating structure across all agents in the system to be effective'
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示** **开销**：它为提示添加了轻微的开销，并要求系统中的所有代理使用一致的模板结构才能有效'
- en: Implementation guidance
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: 'Establish a standardized format for your anchors (e.g., `PERSISTENT_GOAL: [...]`
    or `<``CONSTRAINT``>``...``<``/``CONSTRAINT``>`) and ensure this format is used
    consistently across all agents in your system. This allows theidx_90024740 instruction
    to be reliably parsed and re-inserted at each step of the chain, maximizing its
    visibility to the LLM.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '为您的锚点建立标准化的格式（例如，`PERSISTENT_GOAL: [...]` 或 `<``CONSTRAINT``>``...``<``/``CONSTRAINT``>`），并确保在整个系统中的所有代理中一致使用此格式。这允许idx_90024740指令在每个链的步骤中可靠地解析和重新插入，最大化其对于LLM的可见性。'
- en: The ***Persistent Instruction Anchoring*** pattern provides a foundational technique
    for preventing instruction drift by ensuring a single agent remembers its goals.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**持久指令锚定**模式提供了一种基础技术，通过确保单个代理记住其目标来防止指令漂移。'
- en: However, remembering the instruction is only half the battle. In a collaborative
    environment, agents also need to share a dynamic understanding of the current
    reality. If one agent discovers a critical piece of information, for example,
    a server outage or a change in inventory, how do we ensure the rest of the team
    knows about it immediately without passing endless messages?
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，记住指令只是战斗的一半。在协作环境中，代理还需要共享对当前现实的动态理解。例如，如果一个代理发现了一个关键信息，比如服务器故障或库存变化，我们如何确保团队的其他成员立即知道，而无需传递无数的消息？
- en: This brings us to the ***Shared Epistemic Memory*** pattern, which moves us
    from individual focus to collective synchronization.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这将我们引向**共享认知记忆**模式，它将我们从个人关注转向集体同步。
- en: Shared Epistemic Memory
  id: totrans-137
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 共享认知记忆
- en: In single-agent systems, "memory" is often just the conversation history, sometimes
    referred to as session memory or short-term memory as well. However, in a multi-agent
    collective, relying on individual context windows creates a "Tower of Babel" effect.
    If one agent learns that a server is down but another still believesidx_0db409ba
    it is running, their coordinated actions will fail.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在单代理系统中，“记忆”通常是会话历史，有时也称为会话记忆或短期记忆。然而，在多代理集体中，依赖单个上下文窗口会产生“巴别塔”效应。如果一个代理了解到服务器已关闭，但另一个仍然认为它正在运行，他们的协调行动将失败。
- en: The ***Shared Epistemic Memory*** pattern addresses this by establishing a single,
    mutable source of truth that exists outside theidx_25569196 individual agents'
    context windows, ensuring that the entire collective shares the same understanding
    of the world state.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '**共享认知记忆**模式通过建立一个单一、可变的真相来源，该来源存在于idx_25569196各个代理的上下文窗口之外，确保整个集体对世界状态有相同理解，来解决这个问题。'
- en: Context
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: A multi-agent system where idx_e14b597fagents operate with their own local memory
    and receive distinct tasks. An observation made by one agent (e.g., a specific
    tool output or state change) might not be naturally available to another, leading
    to decisions based on fragmented, incomplete, oridx_aef48fd7 inconsistent information.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 一个多代理系统，其中idx_e14b597f代理使用自己的本地内存并接收不同的任务。一个代理的观察（例如，特定的工具输出或状态变化）可能不会自然地提供给另一个代理，导致基于碎片化、不完整或idx_aef48fd7不一致的信息做出决策。
- en: Problem
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: Without a unified and evolving source of truth, agents in a hierarchy can easily
    become misaligned. One agent might idx_cbdb85b1update its understanding based
    on a new piece of data, but if this "fact" is not propagated, other agents may
    operate on outdated assumptions.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一个统一且不断演变的真相来源，等级结构中的代理很容易变得不协调。一个代理可能会idx_cbdb85b1根据新的数据更新其理解，但如果这个“事实”没有传播，其他代理可能会基于过时的假设进行操作。
- en: 'This misalignment stems from three core forces:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这种不匹配源于三个核心力量：
- en: '**Fragmented** **k****nowledge**: Each agent''s "worldview" is limited to its
    local context'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**碎片化** **知识**：每个代理的“世界观”仅限于其局部上下文'
- en: '**Lossy** **c****ommunication**: Passing state through long chains of conversation
    often results in nuance being dropped'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有损** **通信**：通过长链对话传递状态往往会导致细微差别丢失'
- en: '**Lack of** **"****g****round** **t****ruth****"**: There is no authoritative
    reference point to check the canonical state of the task'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺乏** **“****基准**”**：没有权威的参考点来检查任务的规范状态'
- en: Solution
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Shared Epistemic Memory*** pattern establishes a global "scratchpad"
    or centralized memory module that all agents within a specific workflow can read
    from and write to.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**共享认知记忆**模式建立了一个全局的“草稿本”或集中式内存模块，所有特定工作流程中的代理都可以从中读取和写入。'
- en: This shared memory servesidx_4f28e38e as the collective, authoritative source
    of truth. It ensures that all agents, regardless of their position in the hierarchy,
    operate from the same set of facts and assumptions. This is a key feature of architectures
    such as the "chain-of-agents" framework, allowing the system to maintain coherence
    even as individual agents perform isolated reasoning tasks.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这个共享内存作为集体、权威的真相来源。它确保所有代理，无论其在等级结构中的位置如何，都从同一套事实和假设出发。这是“代理链”框架等架构的关键特性，允许系统在个别代理执行隔离推理任务的同时保持一致性。
- en: 'Example: Supply chain disruption'
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：供应链中断
- en: 'A multi-agent system managesidx_156411f6 a company''s global supply chain.
    The system relies on three agents: a `MonitoringAgent` (news feeds), a `LogisticsAgent`
    (shipment tracking), and a `CustomerNo``c``tificationAgent` (client communication).'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 一个多代理系统管理idx_156411f6一个公司的全球供应链。该系统依赖于三个代理：一个`MonitoringAgent`（新闻源），一个`LogisticsAgent`（货物运输跟踪），以及一个`CustomerNo``c``tificationAgent`（客户沟通）。
- en: 'The shared memory contains the following baseline status:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 共享内存包含以下基线状态：
- en: '`{"shipment_A1": {"status": "On Time"}, "shipment_B2": {"status": "On Time"}}`'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '`{"shipment_A1": {"status": "On Time"}, "shipment_B2": {"status": "On Time"}}`'
- en: 'The workflow proceeds as follows:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程如下：
- en: '**Event detection**: The `MonitoringAgent` detects a report of a major storm
    at a key shipping hub. It writes an update to the shared memory: `SharedMemory.update``({"``event_log``":
    ["Storm reported at Port X"]})`.'
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**事件检测**：`MonitoringAgent`检测到关于关键航运枢纽发生重大风暴的报告。它将更新写入共享内存：`SharedMemory.update`(`{"event_log":
    ["Storm reported at Port X"]}").'
- en: '**Impact analysis**: The `LogisticsAgent` periodically reads the shared memory.
    Seeing the new event log, it queries its internal tools and confirms that `shipment_B2`
    is routed through `Port X`. It writes a specific update: `SharedMemory.update``({"``shipment_B2``":
    {"status": "Delayed", "reason": "Storm at Port X"}}`.'
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**影响分析**：`LogisticsAgent`定期读取共享内存。看到新的事件日志，它查询其内部工具并确认`shipment_B2`是通过`Port
    X`路由的。它写入一个特定的更新：`SharedMemory.update`(`{"shipment_B2": {"status": "Delayed",
    "reason": "Storm at Port X"}}`).'
- en: '**Proactive action**: The `CustomerNotificationAgent` reads the shared memory.
    It sees the status for `shipment_B2` change to `"Delayed"`. It immediately triggers
    a tool to notify the affected customer, preventing a service complaint.'
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**主动行动**：`CustomerNotificationAgent`读取共享内存。它看到`shipment_B2`的状态变为“延迟”。它立即触发一个工具来通知受影响的客户，防止服务投诉。'
- en: Without this pattern, the `CustomerNotificationAgent` would remain unaware of
    the delay until a human manually intervened idx_2f1d362for the deadline was missed.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 没有这个模式，`CustomerNotificationAgent`将不会意识到延迟，直到有人手动干预idx_2f1d362以错过截止日期。
- en: '![Image 5](img/B33147_6_5.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![图像 5](img/B33147_6_5.png)'
- en: Figure 6.5 – Shared Epistemic Memory Workflow
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.5 – 共享认知记忆工作流程
- en: Example implementation
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sample code illustrates idx_2de64517how to implement the ***Shared
    Epistemic Memory*** pattern using a centralized state manager. In this supply
    chain scenario, the `SharedMemory` class acts as a global "scratchpad" or single
    source of truth. Unlike individual agent context windows, which are private and
    ephemeral, this shared module allows specialized agents to asynchronously read
    from and write to a common state, ensuring that a critical update, such as a storm
    delay, propagates instantly across the entire collective.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例代码说明了idx_2de64517如何使用集中式状态管理器实现***共享认知记忆***模式。在这个供应链场景中，`SharedMemory`类充当全局“便签”或单一事实来源。与私有和短暂的个体代理上下文窗口不同，这个共享模块允许专门的代理异步地从公共状态中读取和写入，确保关键更新，如风暴延迟，能够瞬间在整个集体中传播。
- en: '[PRE3]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Consequences
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Consistency**: This pattern drastically reduces semantic drift. It ensures
    all agents have aidx_4414785b synchronized understanding of the task and environment,
    leading to coherent collective behavior.'
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致性**：这种模式极大地减少了语义漂移。它确保所有代理对任务和环境有一个同步的理解，从而导致协调的集体行为。'
- en: '**Efficiency**: It is often more efficient than passing large amounts of state
    information through direct conversational messages, as agents can simply pull
    the specific context they need when they need it.'
  id: totrans-168
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率**：与通过直接对话消息传递大量状态信息相比，它通常更有效率，因为代理可以在需要时简单地提取他们需要的特定上下文。'
- en: '**Cons**:'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Centralization** **r****isk**: The shared memory can become a single point
    of failure or a performance bottleneck if not designed for high availability and
    concurrent access'
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集中化** **风险**：如果未设计为高可用性和并发访问，共享内存可能成为单个故障点或性能瓶颈。'
- en: '**Complexity**: It introduces the complexity of managing a shared state, requiring
    mechanisms to handle potential race conditions if multiple agents try to write
    to the same data simultaneously'
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性**：它引入了管理共享状态复杂性，需要处理多个代理尝试同时写入同一数据的潜在竞争条件。'
- en: Implementation guidance
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: When implementing ***Shared Epistemic Memory***, the choice of backing store
    is critical. For production systems, avoid simpleidx_05bb5399 in-memory dictionaries
    that vanish when the process restarts. Instead, use low-latency, persistent key-value
    stores such as Redis or Memcached. These tools support atomic operations, which
    are essential for preventing race conditions when multiple agents try to update
    the state simultaneously.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 当实现***共享认知记忆***时，选择后端存储至关重要。对于生产系统，避免简单的idx_05bb5399内存字典，这些字典在进程重启时消失。相反，使用低延迟、持久的关键值存储，如Redis或Memcached。这些工具支持原子操作，这对于防止多个代理同时尝试更新状态时的竞争条件至关重要。
- en: Additionally, you mustidx_111bb09e implement a **Time-to-Live** (**TTL**) or
    timestamp validation strategy. Information in an agentic system "rots" quickly;
    a fact about server status that was true five minutes ago may be false now. Enforce
    idx_72db46f0a schema where every memory entry requires a timestamp and a `source_agent_id`
    value. This allows downstream agents to weigh the reliability of the data (`"This
    fact is 20 minutes old; I should verify it again"`) rather than blindly trusting
    it.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你必须idx_111bb09e实现一个**生存时间**（**TTL**）或时间戳验证策略。代理系统中的信息“腐烂”得很快；五分钟前关于服务器状态的事实现在可能已经不正确。强制idx_72db46f0a执行方案，其中每个记忆条目都需要一个时间戳和一个`source_agent_id`值。这允许下游代理权衡数据的可靠性（“这个事实是20分钟前的；我应该再次验证它”）而不是盲目地信任它。
- en: Finally, expose this memory to your agents via strict, typed tools (e.g., `update_order_status``(id,
    status)`), rather than a generic `write_memory``(text)` tool. This prevents the
    shared memory from becoming a dumping ground for unstructured, unparseable text.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，通过严格的、类型化的工具（例如，`update_order_status``(id, status)`）将此记忆暴露给智能体，而不是通用的`write_memory``(text)`工具。这防止共享内存成为无结构、不可解析文本的垃圾场。
- en: With the ***Shared Epistemic Memory*** pattern, we ensure that our agents share
    a consistent view of the world. However, this pattern isidx_7a374e5d just one
    piece of the puzzle. True systemic reliability emerges not from a single technique
    but from combining multiple patterns into a layered defense.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 使用***共享认知记忆***模式，我们确保我们的智能体共享对世界的统一看法。然而，这个模式只是拼图中的一块。真正的系统可靠性并非来自单一技术，而是将多个模式结合成多层防御的结果。
- en: The next section explores how these individual strategies work together.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将探讨这些个别策略如何协同工作。
- en: Pattern composition for systemic reliability
  id: totrans-178
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 系统可靠性模式组合
- en: While each of these patterns addresses a specific point of failure, their true
    value is realized when they are composed into a multi-layered defense against
    instruction drift and misalignment. They are not mutually idx_410f991cexclusive
    choices but complementary components of a robust, production-grade architecture.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然每个模式都针对一个特定的故障点，但它们的真正价值在于将它们组合成多层防御，以对抗指令漂移和偏差。它们不是相互排斥的选择，而是强大、生产级架构的互补组件。
- en: 'A resilient hierarchical system can be designed by combining the following
    patterns:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合以下模式，可以设计一个具有弹性的分层系统：
- en: '**Shared Epistemic Memory**: This acts as the foundational layer of truth.
    It ensures all agents work from a common, synchronized idx_7ab73571set of facts
    and a shared understanding of the task''s state.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**共享认知记忆**：这充当真理的基础层。它确保所有智能体从一组共同、同步的事实和任务状态的共同理解开始工作。'
- en: '**Persistent Instruction Anchoring**: This serves as a constant reminder of
    the mission. It ensures that no matter how complex idx_b9559fc4the task becomes
    or how many agents are involved, the core objectives and constraints are never
    "lost in the middle" of the context.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持久指令锚定**：这充当使命的持续提醒。它确保无论任务多么复杂或涉及多少智能体，核心目标和约束都不会在上下文中“丢失”。'
- en: '**Fractal** **CoT** **Embedding**: This serves as the internal, proactive self-governance
    mechanism. It is theidx_8982579d continuous process improvement that happens during
    an agent''s work, ensuring its internal reasoning remains aligned with its goals.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分形** **CoT** **嵌入**：这充当内部、主动的自我治理机制。这是在智能体工作期间发生的持续过程改进，确保其内部推理与其目标保持一致。'
- en: '**Instruction Fidelity Auditing**: This acts as the external, reactive checkpoint.
    It is the final quality assurance gate that inspects the output of an agent''s
    work, verifying that the outcome is fullyidx_626daade compliant with the original
    instructions before it is finalized or passed to the next stage.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**指令忠实度审计**：这充当外部、反应性的检查点。它是最终的质量保证关卡，检查智能体工作的输出，确保在最终确定或传递到下一阶段之前，结果完全符合原始指令。'
- en: For instance, a system can be designed where a `SupervisorAgent` first writes
    the primary goal to a ***Shared Epistemic Memory***. It then delegates a sub-task
    to a `WorkerAgent`, passing along a ***Persistent Instruction Anchor***. The `WorkerAgent`
    uses ***F******CoT*** ***Embedding*** to continuously align its own thought process
    with its assigned sub-goal. After it produces its final output, that output is
    passed to a separate auditing agent, which verifies that the result complies with
    the original, top-level instructions stored in the shared memory.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以设计一个系统，其中`SupervisorAgent`首先将主要目标写入***共享认知记忆***。然后，它将子任务委托给`WorkerAgent`，并传递一个***持久指令锚点***。`WorkerAgent`使用***F******CoT***
    ***嵌入***来持续地将自己的思维过程与其分配的子目标对齐。在它产生最终输出后，该输出被传递给一个单独的审计代理，该代理验证结果是否符合存储在共享内存中的原始、顶级指令。
- en: By composing these patterns, you create a system with multiple, redundant safeguards.
    For production-grade reliability, designing systems with at least two or three
    of these patterns instantiated concurrently is aidx_ae77d844 recommended best
    practice.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 通过组合这些模式，您创建了一个具有多个冗余保障的系统。为了生产级可靠性，推荐的最佳实践是设计至少包含两个或三个这些模式同时实例化的系统。
- en: Let's now summarize everything we have discussed in this chapter.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在总结本章所讨论的所有内容。
- en: Summary
  id: totrans-188
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter tackled the critical enterprise requirements of explainability
    and compliance in agentic AI systems. We established that as autonomy increases,
    so does the need for transparency and accountability to build trust and ensure
    reliability. We also showed how the application of these patterns deepens as a
    system matures from a single-agent to a multi-agent architecture.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了智能体AI系统的关键企业需求：可解释性和合规性。我们确定，随着自主性的提高，对透明度和责任的需求也增加，以建立信任并确保可靠性。我们还展示了这些模式的应用如何随着系统从单个智能体架构发展到多智能体架构而深化。
- en: 'The primary challenge we addressed was instruction drift, where the original
    intent of a task becomes diluted or lost in complex, hierarchical agent systems.
    To counter this, we introduced a suite of four complementary patterns: ***Instruction***
    ***Fidelity Au******diting***, ***F******CoT******E******mbedding***,***Persistent***
    ***I******nstruction*** ***A******nchoring***, and ***Shared*** ***E******pistemic***
    ***M******emory***.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 我们解决的主要挑战是指导偏差，即任务的原始意图在复杂、分层的智能体系统中被稀释或丢失。为了应对这一问题，我们引入了一套四项互补的模式：***指令***
    ***忠实度审计***、***F******CoT******E******mbedding***、***持久*** ***I******nstruction***
    ***A******nchoring***，和 ***共享*** ***E******pistemic*** ***M******emory***。
- en: 'The key takeaways are as follows:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点如下：
- en: '**Trust requires transparency**: For agents to be deployed in production, their
    decision-making processes must be auditable and explainable.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信任需要透明度**：为了将智能体部署到生产环境中，它们的决策过程必须是可审计和可解释的。'
- en: '**Preventing instruction drift is key**: In hierarchical systems, you must
    actively architect safeguards to ensure the original goal is not lost or misinterpreted
    by subordinate agents.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**防止指导偏差至关重要**：在分层系统中，你必须积极构建安全措施以确保原始目标不会被从属智能体丢失或误解。'
- en: '**Combine internal and external** **c****hecks**: The most robust systems use
    a combination of patterns for internal self-correction (FCoT) and external verification
    (auditing).'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合内部和外部** **检查**：最稳健的系统使用结合了用于内部自我纠正（FCoT）和外部验证（审计）的模式。'
- en: '**Shared knowledge prevents misalignment**: A shared source of truth (Shared
    Epistemic Memory) is foundational for ensuring a team of agents can work together
    coherently.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**共享知识防止偏差**：一个共享的真实来源（共享认知记忆）是确保一组智能体能够协同一致工作的基础。'
- en: '**Maturity dictates governance needs**: While these patterns are useful for
    a single complex agent (Level 4), they become absolutely essential for managing
    instruction drift and ensuring collective alignment in multi-agent systems (Level
    5), shifting from individual accountability to systemic reliability.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成熟度决定治理需求**：虽然这些模式对单个复杂智能体（第4级）很有用，但它们对于管理指导偏差和确保多智能体系统（第5级）的集体一致性至关重要，这从个人责任转向系统可靠性。'
- en: By strategically combining these patterns, developers can design agentic systems
    that are not only more effective but also more transparent, auditable, and aligned
    with their intended goals.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 通过战略性地结合这些模式，开发者可以设计出不仅更有效而且更透明、可审计且与其预期目标一致的智能体系统。
- en: 'Now that we have established patterns for making agentic systems more accountable
    and compliant, we must turn our attention to another crucial aspect of production-readiness:
    their ability to withstand the unexpected. An agent that follows instructions
    perfectly but collapses at the first sign of an error or external failure is not
    truly robust.'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经建立了使智能体系统更具责任感和合规性的模式，我们必须将注意力转向生产准备性的另一个关键方面：它们应对意外情况的能力。一个完美遵循指令但在出现错误或外部故障时崩溃的智能体并不真正稳健。
- en: In the next chapter, we will explore ***Robustness and Fault Tolerance*** patterns.
    These patterns provide the architectural solutions needed to build resilient systems
    that can handle errors gracefully, manage unexpected events, and maintain operational
    integrity even when individual components fail.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨***鲁棒性和容错性***模式。这些模式提供了构建能够优雅处理错误、管理意外事件并在个别组件失败时保持操作完整性的弹性系统的架构解决方案。
