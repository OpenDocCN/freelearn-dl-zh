- en: Part 3
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分
- en: Implementing Agentic RAG
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实现代理RAG
- en: 'In *Parts 1* and *2*, you built a strong foundation in RAG: retrieval fundamentals,
    chunking strategies, embedding models, pipeline design, vector stores, similarity
    searching, evaluation techniques, and core LangChain components. This foundation
    is essential because RAG remains the core architecture underlying the most advanced
    AI applications being built today, serving as the backbone that agents, graphs,
    caches, and memory systems all extend and enhance.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在*第一部分*和*第二部分*中，您在RAG方面建立了坚实的基础：检索基础、分块策略、嵌入模型、管道设计、向量存储、相似性搜索、评估技术以及核心LangChain组件。这个基础是必不可少的，因为RAG仍然是今天构建的最先进人工智能应用的核心架构，作为代理、图、缓存和记忆系统扩展和增强的骨干。
- en: With the foundation now securely in place, *Part 3* prepares you for the cutting
    edge of agentic AI development. You’ll begin by integrating AI agents with LangGraph
    for more powerful control flows, then explore knowledge engineering through ontologies
    and graph-based RAG architectures that enable complex reasoning over structured
    data. The chapters progress into semantic caches for dramatically reducing latency
    and inference costs, followed by a deep dive into agentic memory systems. These
    represent the most advanced expression of RAG you can implement, transforming
    stateless agents into intelligent systems capable of learning and adapting over
    time. Through hands-on code labs, you’ll implement the CoALA memory framework,
    build procedural memory with LangMem, and integrate complete memory architectures
    into your RAG pipelines.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在坚实的基础已经建立之后，*第三部分*为您准备了代理人工智能发展的前沿。您将从将AI代理与LangGraph集成以实现更强大的控制流开始，然后通过本体和基于图的结构化数据复杂推理的RAG架构探索知识工程。章节逐步深入到用于显著降低延迟和推理成本的语义缓存，接着深入探讨代理记忆系统。这些代表了您可以实现的RAG的最高级表达，将无状态代理转变为能够随时间学习和适应的智能系统。通过动手代码实验室，您将实现CoALA记忆框架，构建程序记忆使用LangMem，并将完整的记忆架构集成到您的RAG管道中。
