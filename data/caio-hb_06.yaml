  zh: '全栈深度学习。*概述*: [https://fall2019.fullstackdeeplearning.com/course-content/setting-up-machine-learning-projects/overview.](https://fall2019.fullstackdeeplearning.com/course-content/setting-up-machine-learning-projects/overview%0D)'
