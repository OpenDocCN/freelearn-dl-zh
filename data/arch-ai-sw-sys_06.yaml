- en: '![](img/Unlock1.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![解锁1.png](img/Unlock1.png)'
- en: As illustrated in *Figure 4.1*, conceptual design forms the foundation of the
    systems engineering “V” model. This model shows how conceptual design serves as
    the starting point that influences all subsequent stages of development and how
    the system is ultimately validated against these initial concepts. For AI systems
    in particular, proper conceptual design is critical to mitigate the exponentially
    increasing costs of misalignment, especially considering the complex data dependencies
    these systems entail.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如*图4.1*所示，概念设计构成了系统工程“V”模型的基础。该模型显示了概念设计如何作为影响所有后续开发阶段的起点，以及系统最终如何根据这些初始概念进行验证。特别是对于人工智能系统，适当的概念设计对于降低由于数据依赖性而导致的错位成本呈指数级增加的风险至关重要。
- en: The key learning outcome for this chapter is understanding that conceptual design
    provides the first pillar in formulating the system vision. Proper conceptual
    design mitigates the risk of building the wrong system – a risk that becomes exponentially
    more costly with AI-driven systems due to their data dependencies and complex
    interactions.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的关键学习成果是理解概念设计是制定系统愿景的第一支柱。适当的概念设计可以降低构建错误系统的风险——由于人工智能系统的数据依赖性和复杂交互，这种风险随着人工智能系统的应用而呈指数级增加。
- en: 'The conceptual design artifact comprises the concepts of the operations document,
    scenarios, and use cases. This artifact serves multiple purposes: it gives end
    users and funding customers a mechanism to discuss key activities, objectives,
    constraints, and performance expectations. It also becomes the starting point
    for more detailed technical activities that guide system development throughout
    the engineering “V.”'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 概念设计工件包括操作文档、场景和用例的概念。这个工件具有多重用途：它为最终用户和资助客户提供了一个讨论关键活动、目标、约束和性能预期的机制。它还成为指导整个工程“V”模型中系统开发的更详细技术活动的起点。
- en: 'In this chapter, we are going to discuss the following:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下内容：
- en: Concept of operations
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运作概念
- en: The business case for AI systems
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能系统的业务案例
- en: Roles, scenarios, and use cases in AI-enabled systems
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI赋能系统中的角色、场景和用例
- en: Concept of Operations (CONOPS)
  id: totrans-16
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 运作概念（CONOPS）
- en: What would happen if, when building a house, no plans existed to guide the carpenters
    in framing the structure? The result would be mass confusion and an almost guaranteed
    project failure. Building complex software systems, especially those incorporating
    AI and ML components, is no different. The architect must not only develop a vision
    for the system but also document it thoroughly so that subsequent efforts can
    be executed, coordinated, and planned effectively.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在建造房屋时，没有计划来指导木匠构建结构，会发生什么？结果将是混乱不堪，几乎可以保证项目失败。构建复杂的软件系统，尤其是那些包含AI和ML组件的系统，并无不同。建筑师不仅必须为系统制定愿景，还必须对其进行彻底的文档记录，以便后续工作能够有效执行、协调和规划。
- en: The **Concept of Operations** (**CONOPS**) is precisely such a document. Within
    conceptual design, the CONOPS acts as the initial definition of the system-to-be.
    It provides key stakeholders with insights into what the final system will do,
    how well it should perform, key constraints, and what it should not do.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**运作概念**（**CONOPS**）正是这样的文档。在概念设计中，CONOPS充当即将构建的系统的初始定义。它为关键利益相关者提供了关于最终系统将做什么、应该表现得多好、关键约束以及不应该做什么的见解。'
- en: '![](img/B19300_04_02.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B19300_04_02.png)'
- en: 'Figure 4.2: CONOPS stakeholder relationship diagram'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2：CONOPS利益相关者关系图
- en: As shown in *Figure 4.2*, the CONOPS document serves as a vital communication
    bridge connecting diverse stakeholders with development teams. On the left side,
    stakeholders, including end users, domain experts, compliance officers, business
    owners, and system operators, provide requirements and context. On the right side,
    development teams consisting of system architects, data scientists, ML engineers,
    and software developers receive specific guidance relevant to their roles. The
    central CONOPS document captures the system vision, scenarios, use cases, and
    operational modes, facilitating bidirectional information flow that ensures alignment
    and shared understanding.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如*图4.2*所示，CONOPS文档作为连接不同利益相关者与开发团队的重要沟通桥梁。在左侧，包括最终用户、领域专家、合规官员、业务所有者和系统操作员在内的利益相关者提供需求和背景信息。在右侧，由系统架构师、数据科学家、ML工程师和软件开发人员组成的开发团队接收与其角色相关的具体指导。中央CONOPS文档捕捉系统愿景、场景、用例和操作模式，促进双向信息流，确保一致性和共同理解。
- en: CONOPS for AI-centric systems
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 以AI为中心的系统的CONOPS
- en: For AI-centric systems, the CONOPS is where you first delineate how AI/ML technologies
    will create value. How will AI components increase revenue, lower costs, or transform
    operations? The functional components and processes that the AI system will impact
    must be clearly identified. AI aspects don’t exist in isolation – their interfaces
    and coupled functionality need clear identification and understanding.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 对于以AI为中心的系统，CONOPS是您首先界定AI/ML技术如何创造价值的地方。AI组件将如何增加收入、降低成本或改变运营？AI系统将影响的职能组件和流程必须明确识别。AI方面并非孤立存在——它们的接口和耦合功能需要清晰的识别和理解。
- en: 'For modern AI systems, this means defining and understanding key data flows,
    including the following:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于现代AI系统，这意味着定义和理解关键数据流，包括以下内容：
- en: Data ingestion pipelines and sources
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据摄取管道和来源
- en: Data preprocessing and feature engineering requirements
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据预处理和特征工程需求
- en: Model training, validation, and deployment workflows
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型训练、验证和部署工作流程
- en: Inference processes and integration points
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理过程和集成点
- en: Feedback loops for continuous learning
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续学习的反馈循环
- en: Control flow and execution processes must be captured to understand where and
    how AI components impact various system operation modes. IEEE 1362-2022 offers
    a good template for developing CONOPS documents for software-centric systems [1].
    A thorough review of CONOPS is essential since many follow-on efforts flow from
    this set of artifacts.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 控制流程和执行过程必须被捕捉，以了解AI组件如何以及在哪里影响各种系统操作模式。IEEE 1362-2022为开发以软件为中心的系统的CONOPS文档提供了一个良好的模板[1]。对CONOPS的彻底审查是必要的，因为许多后续工作都源于这一套工件。
- en: Understanding the current system
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解当前系统
- en: To build a new system, start by understanding the current or prior system’s
    limitations. A new system must add value beyond what currently exists – whether
    by increasing revenue, lowering costs, or improving other facets important to
    the end customer. Defining what will be built requires a description of the current
    system.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建一个新系统，首先了解当前或先前系统的局限性。新系统必须超越现有价值——无论是通过增加收入、降低成本还是改善对最终客户重要的其他方面。定义将要构建的内容需要描述当前系统。
- en: 'Items to highlight include the existing processes that bring value to current
    system stakeholders. You need to identify all stakeholders: users, customers,
    support personnel, business analysts, data scientists, compliance officers, and
    management levels. AI components invariably impact all stakeholders of the new
    system, so understanding how the current system affects these stakeholders is
    key to driving the new design. Identify metrics that show how the current system
    functions.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 需要突出的项目包括为当前系统利益相关者带来价值的现有流程。您需要识别所有利益相关者：用户、客户、支持人员、业务分析师、数据科学家、合规官员和管理层。AI
    组件不可避免地影响新系统的所有利益相关者，因此理解当前系统如何影响这些利益相关者是推动新设计的关键。确定显示当前系统功能的指标。
- en: Data-centric view for AI systems
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 以数据为中心的 AI 系统视图
- en: For AI-centric systems, data forms the heart of the system. At this phase, identify
    key data sources used in the current system. Focus on data filtering, transformations,
    or processing that supports the current system. Identify compliance or regulatory
    requirements to ensure the new AI-centric system meets them. The AI-centric system
    will likely need to replace, adapt, or create new functionality in this area.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对于以 AI 为中心的系统，数据是系统的核心。在这个阶段，确定当前系统中使用的核心数据源。关注支持当前系统的数据过滤、转换或处理。确定合规或监管要求，以确保新的以
    AI 为中心的系统满足这些要求。以 AI 为中心的系统可能需要在这个领域替换、适应或创建新的功能。
- en: 'Describe the current system’s computational design and how it transforms data
    and arrives at inferences or control actions. Computational design encompasses
    processing, storage, and networking technologies along with associated performance
    specifications. In modern AI systems, this includes understanding the following:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 描述当前系统的计算设计以及它是如何转换数据并得出推理或控制动作的。计算设计包括处理、存储和网络技术以及相关的性能规范。在现代 AI 系统中，这包括理解以下内容：
- en: Current model architectures and their limitations
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前模型架构及其局限性
- en: Training and inference infrastructure
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练和推理基础设施
- en: Data storage and access patterns
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据存储和访问模式
- en: Latency requirements and bottlenecks
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 延迟需求瓶颈
- en: Scaling capabilities and constraints
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展能力和限制
- en: DevOps and MLOps practices
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DevOps 和 MLOps 实践
- en: Non-functional requirements for AI systems
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 系统的非功能性需求
- en: AI-centric systems significantly drive the system’s non-functional requirements.
    Non-functional requirements are typically satisfied using architectural tactics
    and patterns. The current system’s architectural tactics and patterns must be
    understood to ensure the new AI-centric system replaces, adapts, or introduces
    new tactics and patterns consistently or better.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 以 AI 为中心的系统显著推动了系统的非功能性需求。通常使用架构策略和模式来满足非功能性需求。为了确保新的以 AI 为中心的系统能够一致或更好地替换、适应或引入新的策略和模式，必须理解当前系统的架构策略和模式。
- en: Understand the current system’s limitations as much as possible. This aids in
    both gaining support for the new system and guiding other technical activities.
    Provide analysis and, if possible, empirical evidence supporting why the new system
    improves upon the system being replaced. The justification for change should describe
    opportunities not being realized or how the current system risks obsolescence
    from market competitors. For example, the extension of the Atlassian tool suites
    of Jira and Confluence added functionality for collaboration and integration.
    Though this was not a tremendous leap in added functionality. These systems are
    now industry-accepted and common usage tools. An older example of an AI technology
    was when Google changed their advertising pricing model where only if a link was
    executed was the client charged for advertising on Google. This simple CONOPS
    change significantly impacted Yahoo Inc.’s business model.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 尽可能地了解当前系统的局限性。这有助于获得对新系统的支持并指导其他技术活动。提供分析，并在可能的情况下，提供支持新系统优于被替换系统的经验证据。变革的理由应描述未实现的机会或当前系统如何因市场竞争而面临过时风险。例如，Atlassian
    工具套件 Jira 和 Confluence 的扩展增加了协作和集成的功能。尽管这并不是功能增加的巨大飞跃。这些系统现在是行业公认和常用工具。一个更早的 AI
    技术例子是当谷歌改变他们的广告定价模式，只有在链接被执行时，客户才会为在谷歌上的广告付费。这种简单的 CONOPS 变化对雅虎公司的商业模式产生了重大影响。
- en: The business case for AI systems
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI 系统的商业案例
- en: 'A pointed question often asked about complex AI software is: “What is AI worth?”'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 关于复杂 AI 软件经常被问到的尖锐问题是：“AI 有多少价值？”
- en: Despite enthusiasm for applying AI technologies to increase profitability, ensuring
    the developed software system meets expectations requires clarifying where and
    how advantages will materialize. The complexity of software for AI-enabled systems
    needs to be managed so as to understand and mitigate the technical debt that accrues
    when needing to meet cost and time factors [2].
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管应用 AI 技术以增加盈利的热情很高，但确保开发的软件系统符合预期需要明确优势和优势将如何体现。需要管理 AI 启用系统的软件复杂性，以便理解和减轻在满足成本和时间因素时产生的技术债务
    [2]。
- en: For a new system, first discuss and state what AI/ML technology will do for
    the organization [3]. How will AI/ML increase revenue, lower expenses, make the
    organization more efficient or safer, or improve other value metrics?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个新系统，首先讨论并说明 AI/ML 技术将如何为组织带来益处 [3]。AI/ML 将如何增加收入、降低成本、使组织更高效或更安全，或改善其他价值指标？
- en: '![](img/B19300_04_03.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片 B19300_04_03](img/B19300_04_03.png)'
- en: 'Figure 4.3: AI business value matrix'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.3：AI 商业价值矩阵
- en: '*Figure 4.3* presents an AI business value matrix that helps organizations
    prioritize AI initiatives based on their implementation complexity and business
    impact. The matrix divides potential AI applications into four quadrants:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 4.3* 展示了一个 AI 商业价值矩阵，该矩阵有助于组织根据其实施复杂性和商业影响优先考虑 AI 创新项目。矩阵将潜在的 AI 应用分为四个象限：'
- en: '**Quick wins (high impact, low complexity)**: Applications such as email categorization,
    customer segmentation, basic recommendation systems, chatbots for FAQs, and sentiment
    analysis offer significant business value with relatively straightforward implementation.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速胜利（高影响，低复杂度）**：如电子邮件分类、客户细分、基本推荐系统、FAQ 聊天机器人和情感分析等应用，提供了显著的商业价值，且实施相对简单。'
- en: '**Strategic investments (high impact, high complexity)**: Projects such as
    fraud detection systems, predictive maintenance, personalized healthcare, autonomous
    vehicles, and advanced supply chain optimization require substantial resources
    but deliver high business value.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略投资（高影响，高复杂度）**：如欺诈检测系统、预测性维护、个性化医疗保健、自动驾驶汽车和先进的供应链优化等项目需要大量资源，但能带来高商业价值。'
- en: '**Low priority (low impact, low complexity)**: Basic functions such as document
    tagging, simple data visualization, automated reporting, entry-level analytics
    dashboards, and basic internal chatbots offer limited business impact despite
    being easy to implement.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低优先级（低影响，低复杂度）**：基本功能，如文档标记、简单的数据可视化、自动化报告、入门级分析仪表板和基本内部聊天机器人，尽管易于实施，但提供的商业影响有限。'
- en: '**Avoid/reconsider (low impact, high complexity)**: Projects such as overly
    complex automation for simple tasks, AI for non-critical decision-making, complex
    solutions for low-volume problems, technology-first projects without clear ROI,
    and experimental AI with limited application should be avoided or reconsidered.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**避免/重新考虑（低影响，高复杂度）**：例如，过于复杂的自动化简单任务、非关键决策的人工智能、低量问题的复杂解决方案、没有明确投资回报率的技术优先项目以及应用有限的实验性人工智能等项目应避免或重新考虑。'
- en: This matrix provides a strategic framework for organizations to evaluate and
    prioritize their AI initiatives, ensuring resources are allocated to projects
    that balance technical feasibility with business value.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 此矩阵为组织提供了一个战略框架，以评估和优先考虑其人工智能计划，确保资源分配到平衡技术可行性和商业价值的项目。
- en: Impact of AI technologies on business operations
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能技术对商业运营的影响
- en: AI technologies impact the entire system from end to end. This systems perspective
    enables the evaluation of the technology’s limits and what nominal operations
    or errors might impact the end system.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术从端到端影响整个系统。这种系统视角使得评估技术的局限性以及哪些标准操作或错误可能影响最终系统成为可能。
- en: 'Understanding the performance metrics or requirements that the technology will
    affect – especially those impacting customer revenue or expenses – is crucial.
    Modern AI systems typically impact the following:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 理解技术将影响到的性能指标或要求至关重要——特别是那些影响客户收入或支出的指标——这一点至关重要。现代人工智能系统通常影响以下方面：
- en: Operational efficiency through automation
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过自动化提高运营效率
- en: Decision quality through advanced analytics
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过高级分析提高决策质量
- en: Customer experience through personalization
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过个性化提升客户体验
- en: Risk management through predictive capabilities
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过预测能力进行风险管理
- en: Resource allocation through optimization algorithms
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过优化算法进行资源配置
- en: Speed to market through accelerated processes
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过加速流程提高市场速度
- en: '![](img/B19300_04_04.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B19300_04_04.png)'
- en: 'Figure 4.4: AI-human interaction spectrum'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.4：人工智能-人类交互谱系
- en: '*Figure 4.4* illustrates the AI-human interaction spectrum, showing the continuum
    from human-driven to AI-driven systems. This spectrum helps organizations conceptualize
    the intended level of autonomy and human involvement in their AI systems:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '*图4.4*展示了人工智能-人类交互谱系，显示了从人类驱动到人工智能驱动的系统的连续性。这个谱系帮助组织构想其人工智能系统中预期的自主程度和人类参与度：'
- en: '**Manual operation**: Human chooses, AI observes (e.g., traditional craftsmanship)'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**手动操作**：人类选择，人工智能观察（例如，传统工艺）'
- en: '**Decision support**: AI recommends, human decides (e.g., smart writing assistants)'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**决策支持**：人工智能推荐，人类决策（例如，智能写作助手）'
- en: '**Shared control**: AI acts, human confirms (e.g., AI-human design teams)'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**共享控制**：人工智能行动，人类确认（例如，人工智能-人类设计团队）'
- en: '**Supervised autonomy**: AI operates, human oversees (e.g., advanced driver
    assistance)'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监督自主**：人工智能运行，人类监督（例如，高级驾驶辅助）'
- en: '**Full autonomy**: AI operates independently (e.g., self-driving vehicles)'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全自主**：人工智能独立运行（例如，自动驾驶汽车）'
- en: Understanding where your AI system falls on this spectrum is crucial for defining
    appropriate interaction models, establishing control protocols, and setting user
    expectations. It also helps in identifying potential risks and determining appropriate
    oversight mechanisms based on the level of AI autonomy.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 了解您的AI系统在这个谱系中的位置对于定义适当的交互模型、建立控制协议和设定用户期望至关重要。它还有助于识别潜在风险，并根据人工智能自主程度确定适当的监督机制。
- en: Organizational integration and human impacts
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 组织整合和人力资源影响
- en: 'The AI technology must fit within the organization’s maintenance and development
    framework. Finally, delineate specific impacts on users and humans. AI technology
    invariably changes or adapts processes that humans conduct, including the following:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术必须适应组织维护和开发框架。最后，明确说明对用户和人类的具体影响。人工智能技术不可避免地改变或调整人类执行的过程，包括以下方面：
- en: Shifts in job roles from manual tasks to oversight functions
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从手动任务到监督职能的岗位角色转变
- en: Changes in decision-making authority and accountability
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决策权限和责任的变化
- en: New skill requirements for operation and maintenance
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营和维护的新技能要求
- en: Modified workflows and business processes
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改后的工作流程和业务流程
- en: Ethical considerations and transparency requirements
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伦理考虑和透明度要求
- en: Explainability needs for regulatory compliance [4]
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要可解释性以符合监管要求 [4]
- en: Scenarios for AI-enabled systems
  id: totrans-84
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能赋能系统的场景
- en: The right tool in the right context yields spectacular results – think of Michelangelo’s
    chisel. Conversely, incorrectly used tools can bring disaster. Consider Zillow
    Corporation’s massive losses exceeding $600 million due to the incorrect usage
    of AI models guiding their home-flipping business [6].
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在正确的环境中使用正确的工具会产生惊人的结果——想想米开朗基罗的凿子。相反，错误使用工具可能会带来灾难。考虑 Zillow 公司因错误使用指导其房屋翻新业务的
    AI 模型而造成的超过 6 亿美元的巨额损失 [6]。
- en: As part of conceptual design, sketch out the various roles and responsibilities
    of users. These roles span from external customers to system analysts, end users,
    system developers, and system operations and maintenance personnel. The AI technology’s
    role and impact require architects to capture these viewpoints and accommodate
    them in the target baseline.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 作为概念设计的一部分，概述用户的各种角色和责任。这些角色从外部客户到系统分析师、最终用户、系统开发人员和系统运维人员。人工智能技术的角色和影响要求架构师捕捉这些观点并在目标基线中进行调整。
- en: Creating effective scenarios
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建有效的场景
- en: The roles document should explain how the system will accomplish its missions
    and tasks across relevant scenarios. Define an initial set of high-level metrics
    for both functional and non-functional requirements. Address key actors and how
    stakeholder concerns will be satisfied. Identify major architectural elements
    of the proposed system in the concept of operations.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 角色文档应说明系统如何在相关场景中完成其使命和任务。为功能和非功能性需求定义一组初始的高层次指标。解决关键参与者和如何满足利益相关者的关注点。在操作概念中识别所提议系统的主要架构元素。
- en: Examples include determining whether the system will be centralized or distributed,
    identifying canonical actors, major external users or systems requiring integration,
    and any hard constraints such as regulatory or compliance requirements. Scenarios
    and use cases help with specifically understanding what the system must do and
    grounding follow-on engineering activities. Another important aspect is to conduct
    threat modeling scenarios to ensure the system is both secure and resilient in
    the face of adversarial and the full spectrum of cyber attacks.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，确定系统将是集中式还是分布式，识别规范参与者、主要外部用户或需要集成的系统，以及任何硬约束，如监管或合规要求。场景和用例有助于具体理解系统必须做什么，并确定后续工程活动的依据。另一个重要方面是进行威胁建模场景，以确保系统在面对敌对行为和整个网络攻击范围时既安全又具有弹性。
- en: '![](img/B19300_04_05.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B19300_04_05.png)'
- en: 'Figure 4.5: AI system success metrics framework'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.5：人工智能系统成功指标框架
- en: '*Figure 4.5* presents a comprehensive AI system success metrics framework that
    spans three essential domains:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 4.5* 展示了一个涵盖三个基本领域的全面人工智能系统成功指标框架：'
- en: 'Technical performance:'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术性能：
- en: 'Accuracy metrics: Precision, recall, F1 score, AUC-ROC'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准确性指标：精确度、召回率、F1 分数、AUC-ROC
- en: 'Performance metrics: Inference time, throughput, latency, resource utilization'
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能指标：推理时间、吞吐量、延迟、资源利用率
- en: 'Robustness metrics: Data drift resilience, error rate stability, adversarial
    robustness, edge case handling'
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 坚韧性指标：数据漂移韧性、错误率稳定性、对抗性鲁棒性、边缘情况处理
- en: 'Reliability metrics: Uptime'
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可靠性指标：正常运行时间
- en: 'Business impact:'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商业影响：
- en: 'Financial metrics: ROI, revenue impact, cost reduction, TCO'
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 财务指标：投资回报率（ROI）、收入影响、成本降低、总拥有成本（TCO）
- en: 'Operational metrics: Process efficiency, resource optimization, time savings,
    error reduction'
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营指标：流程效率、资源优化、时间节省、错误减少
- en: 'Strategic metrics: Competitive advantage, market share impact, innovation enablement,
    scalability'
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战略指标：竞争优势、市场份额影响、创新赋能、可扩展性
- en: 'Adoption metrics: Usage rate'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 采用指标：使用率
- en: 'User experience and ethics:'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户体验和伦理：
- en: 'Usability metrics: User satisfaction (CSAT), system usability scale, time to
    value, user retention rate'
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户体验指标：用户满意度（CSAT）、系统可用性量表、价值实现时间、用户留存率
- en: 'Fairness metrics: Demographic parity, equal opportunity, disparate impact,
    intersectional fairness'
  id: totrans-105
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公平性指标：人口统计学平等、平等机会、差异影响、交叉公平性
- en: 'Transparency metrics: Explainability score, documentation quality, feature
    importance clarity, decision traceability'
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 透明度指标：可解释性得分、文档质量、特征重要性清晰度、决策可追溯性
- en: 'Privacy and security: Data protection score'
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐私和安全：数据保护得分
- en: This framework ensures that AI systems are evaluated holistically, beyond just
    technical accuracy, to include their business value and ethical implications.
    Scenarios should reference these metrics to define success criteria for the AI
    system.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 此框架确保人工智能系统在技术准确性之外得到全面评估，包括其商业价值和伦理影响。场景应参考这些指标来定义人工智能系统的成功标准。
- en: AI technology usage in scenarios
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景中的人工智能技术使用
- en: 'In order to better understand the impacts of technology, there needs to be
    context. Scenarios are an excellent tool for defining context. Scenarios describe
    the challenges and major operation modes from a broader perspective. Take the
    following examples:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解技术的影响，需要有一定的背景。场景是定义背景的绝佳工具。场景从更广泛的角度描述了挑战和主要操作模式。以下是一些例子：
- en: How an AI-powered recommendation engine will personalize customer experiences
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能驱动的推荐引擎将如何个性化客户体验
- en: How a predictive maintenance system will analyze sensor data to prevent equipment
    failures
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测性维护系统将如何分析传感器数据以防止设备故障
- en: How a natural language processing system will handle customer service inquiries
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然语言处理系统将如何处理客户服务咨询
- en: How a computer vision system will identify quality issues in manufacturing
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算机视觉系统将如何识别制造中的质量问题
- en: A scenario might describe how a customer uses the system to make a purchase
    on an e-commerce website enhanced by AI-driven personalization. Or it may outline
    how medical professionals use the system for AI-assisted medical diagnosis. These
    scenarios should capture the major actors engaging with the system, identify key
    functions, and outline relevant metrics for evaluating system performance.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 一个场景可能描述客户如何使用系统在人工智能驱动的个性化电子商务网站上购买商品。或者，它可能概述医疗专业人员如何使用系统进行人工智能辅助医疗诊断。这些场景应捕捉与系统互动的主要参与者，确定关键功能，并概述评估系统性能的相关指标。
- en: Defining success and constraints
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义成功和约束
- en: Scenarios need to define what success means for the system, what constitutes
    nominal operation, and what would be failure conditions. Additionally, scenarios
    should describe technical constraints in more detail.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 场景需要定义系统成功意味着什么，什么构成正常操作，以及什么会是故障条件。此外，场景应更详细地描述技术约束。
- en: 'Examples of constraints might include accuracy requirements, acceptable false
    alarm probabilities, or maximum inference time limits. For modern AI systems,
    constraints might also include the following:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 约束条件的例子可能包括精度要求、可接受的误报概率或最大推理时间限制。对于现代人工智能系统，约束条件可能还包括以下内容：
- en: Fairness and bias metrics for different demographic groups
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同人口群体的公平性和偏见指标
- en: Explainability requirements for high-stakes decisions
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于高风险决策的可解释性要求
- en: Data privacy and security standards
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据隐私和安全标准
- en: Model drift thresholds triggering retraining
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型漂移阈值触发重新训练
- en: Resource utilization limits during peak loads
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高峰负载期间的资源利用率限制
- en: Fail-safe mechanisms when confidence thresholds aren’t met
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当信心阈值未达到时，应采取安全机制
- en: These scenarios don’t need to be exhaustive but should be detailed enough that
    major stakeholders agree that the correct execution of these scenarios indicates
    successful system operation.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这些场景不需要详尽无遗，但应该足够详细，以便主要利益相关者同意这些场景的正确执行表明系统操作成功。
- en: Use cases for AI-enabled systems
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能系统用例
- en: Use cases are very similar to scenarios in principle, but they are more detail-oriented
    so that they can guide actual software development. These diagrams capture interactions
    and more detailed functions to execute. Develop use cases hierarchically, where
    level 1 use cases collectively cover system execution per CONOPS. Derive lower-level
    use cases from level 1 use cases. Capture detailed human interactions for correct
    system operation and maintenance in the use cases.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 用例在原则上与场景非常相似，但它们更注重细节，以便能够指导实际的软件开发。这些图捕获了交互和更详细的功能以执行。以层次结构开发用例，其中第1级用例共同覆盖CONOPS的系统执行。从第1级用例中推导出低级用例。在用例中捕获详细的人机交互，以确保系统的正确操作和维护。
- en: Structure of effective use cases
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有效用例的结构
- en: 'Use cases should minimally include the following:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 用例至少应包括以下内容：
- en: Title
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题
- en: Author
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作者
- en: System level and traceability
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统级和可追溯性
- en: Major actors
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要参与者
- en: Assumptions
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假设
- en: Pre-conditions
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前置条件
- en: Summary of execution
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行摘要
- en: Successful post-conditions
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成功的后置条件
- en: Information output, warnings, alerts, alarms, and errors
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息输出、警告、警报、警报和错误
- en: Post-conditions if the use case fails
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例失败后的后置条件
- en: Data sources
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据来源
- en: Data outputs
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据输出
- en: Use cases can clarify expected data sources, frequency, formats, and quality.
    At this stage in system architecture, very detailed use case decomposition isn’t
    required – rather, focus on use cases highlighting the system’s major nominal
    operational phases. As the design develops further, it should trace back to higher-level
    use cases. Use cases also help identify metrics and requirements for key system
    functionality, non-functional requirements, and system technical performance.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 用例可以明确预期的数据来源、频率、格式和质量。在系统架构的这个阶段，不需要非常详细地分解用例——而是关注突出系统主要正常操作阶段的用例。随着设计的进一步发展，它应该追溯到更高层次的用例。用例还有助于确定关键系统功能、非功能性需求和系统技术性能的指标和需求。
- en: User classes and AI interaction
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用户类别和人工智能交互
- en: Formally define user classes at this stage. Identify how the AI component and
    all of the different human roles interact. Determine what data each role needs
    and how the AI supports that role. Define how interaction between the system and
    different roles will occur. Using an automation scale can help better explain
    how the AI component and human roles would be defined and built.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在此阶段正式定义用户类别。确定人工智能组件和所有不同的人类角色如何互动。确定每个角色需要的数据以及人工智能如何支持该角色。定义系统与不同角色之间的交互方式。使用自动化规模可以帮助更好地解释人工智能组件和人类角色的定义和构建。
- en: Operational modes for AI-enabled systems
  id: totrans-145
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能化系统的操作模式
- en: The concepts of operations, scenarios, and use cases help define the system’s
    major modes. For each mode, understand and document how AI-enabled components
    will work and what support they require across the rest of the system.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 操作概念、场景和用例有助于定义系统的主要模式。对于每种模式，理解并记录人工智能组件将如何工作以及它们在整个系统中的支持需求。
- en: '![](img/B19300_04_06.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B19300_04_06.png)'
- en: 'Figure 4.6: Six operational modes of AI systems and their transitions'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.6：人工智能系统的六个操作模式及其转换
- en: '*Figure 4.6* illustrates the operational modes flowchart for AI systems, showing
    the six critical operational states and their transitions:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '*图4.6*展示了人工智能系统的操作模式流程图，显示了六个关键操作状态及其转换：'
- en: '**Configuration mode**: Setting up model parameters and interfaces'
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**配置模式**：设置模型参数和接口'
- en: '**Startup mode**: Verification and validation of the system'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**启动模式**：系统的验证和验证'
- en: '**Execution mode**: Normal operation and monitoring'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**执行模式**：正常操作和监控'
- en: '**Maintenance mode**: Retraining and updates'
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**维护模式**：再培训和更新'
- en: '**Recovery mode**: Handling failures and degradation'
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**恢复模式**：处理故障和退化'
- en: '**Shutdown mode**: Graceful termination'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**关闭模式**：优雅终止'
- en: The diagram shows the normal flow path (solid lines) from configuration through
    startup to execution, with scheduled maintenance or error-triggered recovery paths.
    The dashed lines indicate optional restart paths. This operational modes framework
    is essential for comprehensive AI system planning, as it ensures all critical
    states are addressed in the system design.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 该图显示了从配置到启动再到执行的正常流程路径（实线），以及计划维护或错误触发的恢复路径。虚线表示可选的重启路径。这个操作模式框架对于全面的AI系统规划至关重要，因为它确保在系统设计中解决了所有关键状态。
- en: Configuration mode
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置模式
- en: 'Identify needed model parameters and clarify mechanisms for the AI component
    to obtain them. Configure and ensure the readiness of external data interfaces,
    data sources, and human interface parameters. Provide logs or output confirming
    the AI component’s readiness for startup. For modern AI systems, configuration
    includes the following:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 确定所需的模型参数并阐明人工智能组件获取它们的机制。配置并确保外部数据接口、数据来源和人类界面参数的可用性。提供日志或输出以确认人工智能组件启动就绪。对于现代人工智能系统，配置包括以下内容：
- en: Model versioning and artifact management
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型版本控制和工件管理
- en: Feature stores and preprocessing pipelines
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征存储和预处理管道
- en: A/B testing infrastructure
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: A/B测试基础设施
- en: Monitoring and observability setup
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控和可观察性设置
- en: Privacy-preserving mechanisms
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐私保护机制
- en: Hyper-parameter settings and optimization strategies
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超参数设置和优化策略
- en: Startup mode
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 启动模式
- en: 'During startup, the AI-enabled component provides the integration status with
    the rest of the system. Run tests with known data and expected outputs to ensure
    proper AI component functioning. Log and positively communicate that the AI component
    and system are ready to execute. Modern practices include the following:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在启动期间，人工智能组件提供与系统其余部分的集成状态。使用已知数据和预期输出运行测试，以确保人工智能组件正常工作。记录并积极沟通人工智能组件和系统已准备好执行。现代实践包括以下内容：
- en: Canary deployments to limit initial exposure
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 金丝雀部署以限制初始曝光
- en: Shadow mode operation alongside existing systems
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与现有系统并行的影子模式操作
- en: Progressive feature rollouts
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逐步功能推出
- en: Automated validation against benchmark datasets
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动验证基准数据集
- en: Performance baseline measurements
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能基线测量
- en: Infrastructure scaling verification
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础设施扩展验证
- en: Execution mode
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 执行模式
- en: 'Collect statistics on system performance (typically machine learning metrics),
    operation counts, and pipeline health status, and capture warnings, alerts, alarms,
    or failures for reporting to users or system operators. Modern execution monitoring
    includes the following:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 收集系统性能（通常是机器学习指标）、操作计数和管道健康状况的统计数据，并捕获警告、警报、警报或故障以向用户或系统操作员报告。现代执行监控包括以下内容：
- en: Real-time model performance dashboards
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时模型性能仪表板
- en: Drift detection and anomaly monitoring
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 漂移检测和异常监控
- en: Feature importance tracking
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征重要性跟踪
- en: Resource utilization monitoring
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源利用率监控
- en: Serving latency and throughput metrics
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务延迟和吞吐量指标
- en: Data quality monitoring
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据质量监控
- en: Maintenance mode
  id: totrans-181
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 维护模式
- en: 'Models typically require periodic maintenance based on classification or regression
    outputs due to expected model drift or obsolescence. Define how the AI component
    can be taken offline and how the rest of the pipeline(s) should perform without
    this component. Modern maintenance strategies include the following:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 由于预期模型漂移或过时，模型通常需要基于分类或回归输出进行定期维护。定义如何将人工智能组件离线，以及其余管道（s）在没有此组件的情况下应如何执行。现代维护策略包括以下内容：
- en: Automated retraining pipelines triggered by performance degradation
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由性能下降触发的自动重新训练管道
- en: Champion-challenger model evaluation
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 冠军挑战者模型评估
- en: Continuous integration/continuous deployment for models
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的持续集成/持续部署
- en: Model governance and approval workflows
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型治理和审批工作流程
- en: Versioned datasets for reproducibility
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于可重复性的版本化数据集
- en: A/B testing frameworks for controlled rollouts
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于受控推出的A/B测试框架
- en: Recovery mode
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 恢复模式
- en: 'After significant failure or off-nominal conditions, the AI component needs
    reconfiguration, testing, and preparation for redeployment to the production system.
    Depending on the recovery nature, model retraining may be necessary, requiring
    a cold standby strategy. Modern recovery approaches include the following:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在重大故障或非标准条件下，人工智能组件需要重新配置、测试，并准备重新部署到生产系统。根据恢复性质，可能需要重新训练模型，这需要冷备用策略。现代恢复方法包括以下内容：
- en: Model rollback capabilities
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型回滚功能
- en: Versioned model registry with quick-switch functionality
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有快速切换功能的版本化模型注册表
- en: Circuit breakers to fail gracefully to simpler models
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电路断路器优雅地失败到更简单的模型
- en: Ensembling techniques to reduce single-model dependence
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 集成技术以减少对单个模型的依赖
- en: Cached inference results for critical paths
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键路径的缓存推理结果
- en: Degraded mode operation plans
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降级模式操作计划
- en: Shutdown mode
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关闭模式
- en: 'During shutdown, save the model and log operations to aid system restart. Implement
    fail-safe triggers so pipeline components aren’t unduly impacted by AI component
    shutdown. Modern shutdown considerations include the following:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在关闭期间，保存模型和日志操作以帮助系统重启。实施安全触发器，以确保管道组件不会因人工智能组件关闭而受到不适当的干扰。现代关闭考虑因素包括以下内容：
- en: Graceful handling of in-flight requests
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对进行中的请求进行优雅处理
- en: State preservation for stateful components
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 状态化组件的状态保留
- en: Clean termination of resource-intensive processes
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清理终止资源密集型进程
- en: Final telemetry capture for post-mortem analysis
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于事后分析的最后遥测捕获
- en: Coordinated shutdown sequencing with dependencies
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有依赖关系的协调关闭顺序
- en: Proper release of cloud resources to control costs
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正确释放云资源以控制成本
- en: Risk mitigation through conceptual design
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过概念设计进行风险缓解
- en: The role of conceptual design also impacts the risk management for the overall
    system development. The conceptual design identifies the major scenario, associated
    use cases, requirements, and modeling to be accomplished. There is also the full
    gamut of AI technology evaluation and selection. This exercise then gives the
    system developers a holistic perspective of the system. This holistic view can
    then itself be decomposed and analyzed for various dimensions of risk that exist.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 概念设计的作用也影响着整个系统开发的风险管理。概念设计确定了主要场景、相关用例、需求和要完成建模。还有全面的人工智能技术评估和选择。这项练习为系统开发者提供了一个全面的系统视角。这种全面的视角本身可以分解和分析各种风险维度。
- en: '![](img/B19300_04_07.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B19300_04_07.png)'
- en: 'Figure 4.7: How conceptual design activities mitigate key risks in AI system
    development'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.7：概念设计活动如何减轻人工智能系统开发中的关键风险
- en: '*Figure 4.7* illustrates how conceptual design activities directly address
    and mitigate key risks in AI system development. The diagram maps risk categories
    (orange) to specific conceptual design activities (blue) that address them, resulting
    in reduced project risk (green):'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '*图4.7* 展示了概念设计活动如何直接应对和缓解人工智能系统开发中的关键风险。图表将风险类别（橙色）映射到解决这些问题的特定概念设计活动（蓝色），从而降低项目风险（绿色）：'
- en: Business alignment risk is mitigated through business case development (65–80%
    reduction)
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过业务案例开发（减少65-80%）缓解业务一致性风险
- en: Technical feasibility risk is addressed through CONOPS documentation (50–70%
    reduction)
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过CONOPS文档（减少50-70%）解决技术可行性风险
- en: User acceptance risk is reduced through scenarios and use cases (60–75% reduction)
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过场景和用例（减少60-75%）降低用户接受风险
- en: Integration and regulatory risk is mitigated through data pipeline analysis
    and operational mode planning (55–65% reduction)
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过数据管道分析和运营模式规划（减少55-65%）缓解集成和监管风险
- en: The diagram shows how these activities collectively contribute to reduced project
    risk, resulting in fewer mid-development changes and better-aligned stakeholder
    expectations. This powerful visualization demonstrates the quantifiable value
    of thorough conceptual design in de-risking AI projects.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图表展示了这些活动如何共同降低项目风险，从而减少开发过程中的变更，并使利益相关者的期望更加一致。这种强大的可视化展示了彻底的概念设计在降低人工智能项目风险中的可量化价值。
- en: Data quality risk mitigation
  id: totrans-215
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据质量风险缓解
- en: 'AI systems are fundamentally dependent on data quality in ways traditional
    software is not. The CONOPS should include explicit data quality requirements
    and remediation strategies. Common data quality risks include the following:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统在本质上依赖于数据质量，这是传统软件所不具备的。CONOPS应包括明确的数据质量要求和补救策略。常见的数据质量风险包括以下：
- en: Incomplete or biased training data
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不完整或存在偏差的训练数据
- en: Inconsistent identifier tracking across systems
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统间不一致的标识符跟踪
- en: Data drift over time
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随时间推移的数据漂移
- en: Input data corruption or manipulation
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入数据损坏或篡改
- en: Privacy and security vulnerabilities
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐私和安全漏洞
- en: Addressing these risks during conceptual design prevents costly remediation
    efforts later in development.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 在概念设计阶段解决这些风险可以防止开发后期昂贵的补救工作。
- en: Stakeholder expectation management
  id: totrans-223
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利益相关者期望管理
- en: 'AI system stakeholders often have unrealistic expectations about model performance
    and capabilities. The conceptual design phase should include stakeholder education
    about the following:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统的利益相关者通常对模型性能和能力有不切实际的期望。概念设计阶段应包括以下方面的利益相关者教育：
- en: Realistic performance trajectories for AI systems
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能系统的实际性能轨迹
- en: The probabilistic nature of AI outputs
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能输出的概率性质
- en: The need for continuous monitoring and improvement
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续监控和改进的需求
- en: Trade-offs between performance dimensions (accuracy versus explainability, etc.)
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性能维度之间的权衡（准确性对可解释性等）
- en: The use of change management to ensure system stability and a record of changes
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用变更管理确保系统稳定性和变更记录
- en: Setting appropriate expectations early prevents disappointment and project reassessment
    later.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 早期设定适当的期望可以防止后续的失望和项目重新评估。
- en: Integration risk mitigation
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成风险缓解
- en: 'AI systems rarely exist in isolation. They must integrate with legacy systems,
    data sources, and operational processes. Conceptual design should thoroughly address
    the following:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统很少孤立存在。它们必须与遗留系统、数据源和运营流程集成。概念设计应彻底解决以下问题：
- en: Data compatibility across systems
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统间的数据兼容性
- en: Latency requirements and constraints
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 延迟要求与限制
- en: API specifications and contract definitions
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API规范和合同定义
- en: Fallback mechanisms when AI components underperform
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当AI组件表现不佳时的回退机制
- en: Early consideration of integration challenges prevents costly architecture revisions
    during implementation. The NIST **AI Risk Management Framework** (**AI RMF**)
    is an excellent reference to aid in risk mitigation for the development of AI
    systems [5]. A tragic example of AI failure was the 2003 incident when a U.S.
    Patriot battery’s autonomous software misidentified a U.K. fighter jet as a threat
    and shot the plane down, killing all pilots onboard.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施前早期考虑集成挑战可以防止在实施期间进行昂贵的架构修订。NIST的**AI风险管理框架**（**AI RMF**）是帮助在AI系统开发中降低风险的优秀参考[5]。AI失败的悲剧性例子是2003年的一次事件，当时美国爱国者电池的自主软件错误地将一架英国战斗机识别为威胁并将其击落，导致机上所有飞行员丧生。
- en: 'Case study: Retail recommendation system'
  id: totrans-238
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 案例研究：零售推荐系统
- en: To illustrate the concepts discussed in this chapter, let’s examine a real-world
    example of a retail recommendation system. A large e-commerce retailer wanted
    to improve their product recommendation system to increase customer engagement
    and sales.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明本章讨论的概念，让我们考察一个零售推荐系统的真实世界例子。一家大型电子商务零售商希望改进他们的产品推荐系统，以提高客户参与度和销售额。
- en: CONOPS development
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CONOPS开发
- en: 'The CONOPS document defined how the AI recommendation system would integrate
    with existing e-commerce infrastructure, including the following:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: CONOPS文档定义了AI推荐系统如何与现有的电子商务基础设施集成，包括以下内容：
- en: '**Data sources**: Customer browsing history, purchase history, product catalog,
    and inventory systems'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据来源**：客户浏览历史、购买历史、产品目录和库存系统'
- en: '**Performance expectations**: 50 ms recommendation generation latency, 15%
    increase in conversion rate'
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能预期**：50毫秒推荐生成延迟，转化率提高15%'
- en: '**Constraints**: GDPR compliance, explainability for marketing teams'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**限制**：符合GDPR，对营销团队的解释性'
- en: Business case
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业案例
- en: 'The business case quantified the expected benefits:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 商业案例量化了预期的收益：
- en: 12% projected increase in average order value
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预计平均订单价值增加12%
- en: 8% reduction in cart abandonment
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 购物车放弃率降低8%
- en: Enhanced customer loyalty through personalization
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过个性化增强客户忠诚度
- en: Scenarios and use cases
  id: totrans-250
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景和用例
- en: 'Key scenarios included the following:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 关键场景包括以下内容：
- en: Real-time recommendations during browsing
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 浏览时的实时推荐
- en: Email campaign personalization
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电子邮件营销个性化
- en: Inventory-aware recommendations to prevent promoting out-of-stock items
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 库存感知推荐以防止推广缺货物品
- en: Real-time recommendations during browsing was a chosen scenario since it forces
    design decisions on speed and model complexity. The email campaign personalization
    deals with the correct generation of names using natural language processing and
    other identifiers that demonstrate to customers that they are getting a specialized
    experience.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 浏览时的实时推荐是一个选择的场景，因为它迫使设计决策关注速度和模型复杂性。电子邮件营销个性化处理涉及使用自然语言处理和其他标识符正确生成名称，向客户展示他们正在获得定制化的体验。
- en: Inventory-aware recommendations force technical requirements to deal with up-to-date
    data stores, query complexity, analytic execution timing, and the system being
    able to respond to the situation of out-of-stock items.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 库存感知推荐迫使技术要求处理最新的数据存储、查询复杂性、分析执行时间以及系统能够应对缺货物品的情况。
- en: Operational modes
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 操作模式
- en: 'The recommendation system required extensive configuration capabilities, including
    the following:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐系统需要广泛的配置能力，包括以下内容：
- en: Setting thresholds for similarity scores between products
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置产品之间相似度分数的阈值
- en: Configuring feature weights to balance recency, frequency, and monetary value
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置特征权重以平衡近期、频率和货币价值
- en: Establishing integration parameters with inventory management systems
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与库存管理系统建立集成参数
- en: Defining cold start strategies for new users and products
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为新用户和产品定义冷启动策略
- en: 'During normal operation, the system implemented the following:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 在正常操作期间，系统实施了以下功能：
- en: Real-time performance dashboards tracking recommendation relevance
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时性能仪表板跟踪推荐的相关性
- en: A/B testing infrastructure to continuously evaluate algorithm variants and hyper-parameters
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: A/B测试基础设施以持续评估算法变体和超参数
- en: Automated alerts when conversion rates dropped below defined thresholds
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当转化率低于定义的阈值时自动发出警报
- en: Session-based recommendation tracking to capture short-term intent
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于会话的推荐跟踪以捕捉短期意图
- en: 'The system incorporated robust recovery mechanisms:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 系统集成了强大的恢复机制：
- en: Fallback to popularity-based recommendations if personalization failed
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果个性化失败，则回退到基于流行度的推荐
- en: Automatic switchover to pre-computed recommendations during traffic spikes
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在流量高峰期间自动切换到预计算的推荐
- en: Circuit breakers to isolate failing components without system-wide disruption
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电路断路器用于隔离故障组件，而不会对整个系统造成破坏
- en: Degraded operation modes that prioritized speed over personalization accuracy
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优先考虑速度而牺牲个性化准确性的降级操作模式
- en: Implementation challenges and lessons learned
  id: totrans-273
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施挑战和经验教训
- en: In developing the recommendation system, the team discovered significant data
    quality issues in historical purchase records. Customer IDs were inconsistently
    tracked across platforms, creating challenges for building accurate user profiles.
    The conceptual design had to be revised to include more robust data cleaning pipelines
    and identity resolution mechanisms.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发推荐系统时，团队发现历史购买记录中存在重大的数据质量问题。客户ID在不同平台上的跟踪不一致，为构建准确的用户画像带来了挑战。概念设计不得不进行修订，以包括更健壮的数据清洗管道和身份解析机制。
- en: Marketing teams initially expected the recommendation engine to immediately
    achieve human-level personalization accuracy. The system architects had to educate
    stakeholders about realistic performance trajectories for AI systems, explaining
    how model accuracy improves over time with more data and feedback.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 市场团队最初期望推荐引擎能够立即达到人类水平的个性化准确度。系统架构师必须教育利益相关者关于人工智能系统现实性能轨迹的知识，解释模型精度如何随着更多数据和反馈随时间提高。
- en: Integration with existing e-commerce infrastructure proved more complex than
    initially anticipated. Legacy inventory systems had significantly different data
    models and update latencies than required for real-time recommendations. The team
    revised their architectural approach to include an intermediate data synchronization
    layer that decoupled the recommendation service from legacy systems.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 与现有电子商务基础设施的集成比最初预期的要复杂。遗留库存系统与实时推荐所需的数据模型和更新延迟有显著差异。团队修订了他们的架构方法，包括一个中间数据同步层，将推荐服务从遗留系统中解耦。
- en: Summary
  id: totrans-277
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, we’ve explored the critical importance of conceptual design
    for AI-enabled systems. The conceptual design phase establishes the foundation
    upon which all subsequent engineering activities build. For AI-enabled systems,
    this foundation is particularly crucial due to their unique characteristics: data
    dependencies, learning behavior, probabilistic outcomes, and human-AI interaction
    complexities.'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了概念设计对于人工智能系统至关重要的意义。概念设计阶段为所有后续的工程活动奠定了基础。对于人工智能系统来说，这个基础尤其关键，因为它们具有独特的特性：数据依赖性、学习行为、概率性结果以及人机交互的复杂性。
- en: 'Key takeaways include the following:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点包括以下内容：
- en: Understanding how the proposed system will bring value to end customers
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解所提出的系统将如何为最终客户带来价值
- en: Understanding what AI/ML will provide to the new system
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解AI/ML将为新系统提供什么
- en: Identifying what the new system must do, what would be helpful to do, and what
    the new system cannot do
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定新系统必须做什么，什么是有帮助的，以及新系统不能做什么
- en: Identifying performance and non-functional requirements from the customer’s
    perspective
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从客户的角度识别性能和非功能性需求
- en: Documenting insights in a concept of operations tailored to customers and stakeholders,
    and accessible to a general audience
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在面向客户和利益相关者的操作概念中记录见解，并使一般公众能够访问
- en: Identifying key roles, actors, and use cases for the end-to-end system, highlighting
    where AI/ML components are prominent
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定端到端系统的关键角色、参与者和用例，突出显示AI/ML组件的突出位置
- en: 'When properly executed, conceptual design mitigates the most significant risk
    in AI system development: building the wrong system. By investing adequate resources
    in this phase, organizations dramatically increase the likelihood of delivering
    AI systems that satisfy user needs, fulfill business objectives, and operate safely
    and effectively within their intended context.'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 当正确执行时，概念设计可以减轻人工智能系统开发中最重大的风险：构建错误的系统。通过在这一阶段投入足够的资源，组织大大增加了交付满足用户需求、实现业务目标，并在预期环境中安全有效运行的人工智能系统的可能性。
- en: This chapter’s content was necessarily broad because each software system, context,
    and customer is unique. A common thread in architecting is that conceptual design
    mitigates many risks. The resulting artifacts form the foundation for follow-on
    engineering activities, which is especially critical for AI-enabled systems where
    the cost of misalignment can be substantial.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的内容必然是广泛的，因为每个软件系统、环境和客户都是独特的。在架构设计中的一个共同点是概念设计可以减轻许多风险。产生的工件构成了后续工程活动的基石，这对于具备人工智能的系统尤为重要，因为不匹配的成本可能非常高。
- en: The next chapters will build upon this foundation, exploring how the conceptual
    design artifacts guide the development of detailed requirements, architectural
    design decisions, and implementation strategies for AI-enabled systems.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将在此基础上构建，探讨概念设计工件如何指导详细需求、架构设计决策和人工智能系统实施策略的制定。
- en: Exercises
  id: totrans-289
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 练习
- en: '**AI business value matrix application**'
  id: totrans-290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人工智能商业价值矩阵应用**'
- en: Consider an industry you’re familiar with (healthcare, retail, manufacturing,
    etc.). Identify four potential AI applications for this industry, placing one
    in each quadrant of the AI business value matrix (quick win, strategic investment,
    low priority, avoid/reconsider). Justify your placement decisions based on implementation
    complexity and business impact factors.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑你熟悉的行业（医疗保健、零售、制造业等）。为该行业识别四个潜在的AI应用，将每个应用放在人工智能商业价值矩阵的每个象限中（快速胜利、战略投资、低优先级、避免/重新考虑）。根据实施复杂性和业务影响因素来论证你的放置决策。
- en: '**Scenario development for AI-human interaction**'
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人工智能与人类交互场景开发**'
- en: Create a detailed scenario for an AI system that falls in the “Shared Control”
    portion of the AI-human interaction spectrum. Your scenario should describe the
    context, primary actors, AI component responsibilities, human operator responsibilities,
    and key interaction points. Include potential failure modes and how they would
    be handled.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 为一个位于人工智能与人类交互谱“共享控制”部分的AI系统创建一个详细的场景。你的场景应描述背景、主要角色、AI组件责任、人类操作员责任和关键交互点。包括潜在的故障模式及其处理方式。
- en: '**Use case specification**'
  id: totrans-294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用例规范**'
- en: Write a complete use case for a maintenance mode operation in an AI-enabled
    predictive maintenance system. Follow the structure outlined in the *Structure
    of effective use cases* section, ensuring you include all 12 required elements.
    Pay particular attention to pre-conditions, post-conditions, and error-handling
    mechanisms.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 为一个具备人工智能预测维护功能的系统中的维护模式操作编写一个完整的用例。遵循“有效用例结构”部分中概述的结构，确保包含所有12个必需元素。特别注意前置条件、后置条件和错误处理机制。
- en: '**Risk mitigation planning**'
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**风险缓解规划**'
- en: 'For an AI-enabled medical diagnosis assistant system, identify three specific
    risks in each of the following categories: data quality risks, stakeholder expectation
    risks, and integration risks. For each risk, describe how you would address it
    during the conceptual design phase to prevent issues during implementation.'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个具备人工智能的医疗诊断辅助系统，在以下每个类别中识别三个具体风险：数据质量风险、利益相关者期望风险和集成风险。对于每个风险，描述你在概念设计阶段如何应对它，以防止实施过程中出现问题。
