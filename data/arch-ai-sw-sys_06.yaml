- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: Conceptual Design for AI Systems
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能系统概念设计
- en: Imagine walking into a restaurant where the waiter immediately tells you what
    you’ll eat without offering a menu, asking about your preferences, or discussing
    your budge – yet you’re still expected to pay. Such a restaurant would quickly
    fail. What’s missing? Customer engagement to understand actual needs and a mechanism
    for feedback. This scenario parallels what happens too often in complex software
    development, particularly with AI-driven systems [1].
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下走进一家餐厅，服务员立即告诉你将吃什么，而不提供菜单、询问你的偏好或讨论你的预算——然而你仍然需要付钱。这样的餐厅很快就会失败。缺少了什么？客户参与以了解实际需求以及反馈机制。这种情况与复杂软件开发中经常发生的情况相似，尤其是在人工智能驱动的系统中[1]。
- en: By conducting thorough conceptual design activities, we mitigate the risks of
    misunderstanding user and stakeholder needs. The artifacts developed during this
    phase provide architects with a perspective on the system’s end goals and constraints
    and how customers perceive value. Conversely, these artifacts allow customers
    to concretize their objectives, surface major implicit assumptions, communicate
    with other stakeholders, and gain confidence that system builders understand their
    desires.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 通过进行彻底的概念设计活动，我们降低了误解用户和利益相关者需求的风险。在此阶段开发出的工件为架构师提供了对系统最终目标和约束以及客户如何看待价值的视角。相反，这些工件允许客户具体化他们的目标，揭示主要隐含假设，与其他利益相关者沟通，并确信系统构建者理解他们的愿望。
