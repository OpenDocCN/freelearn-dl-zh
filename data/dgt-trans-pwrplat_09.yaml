- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: 'Streamlining Operations: Automating Processes with Solutions Built with Power
    Platform'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过使用Power Platform构建的解决方案自动化流程，简化运营
- en: In today’s rapidly evolving business landscape, optimizing operations through
    automation is paramount for achieving heightened efficiency and productivity.
    Power Platform stands as a robust arsenal, offering a spectrum of tools to construct
    solutions capable of automating an array of tasks and workflows. However, embarking
    on this journey necessitates the strategic selection of **proof of concept** (**POC**)
    candidates tailored to address specific organizational needs and pain points.
    This introductory segment underscores the importance of identifying processes
    characterized by repetition, time inefficiency, or error susceptibility as ideal
    contenders for automation leveraging Power Platform. Furthermore, to ensure seamless
    implementation and scalability, a foundational understanding of **application
    lifecycle management** (**ALM**) principles is indispensable.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天快速发展的商业环境中，通过自动化优化运营对于实现更高的效率和生产力至关重要。Power Platform作为一个强大的武器库，提供了一系列工具，可以构建能够自动化各种任务和工作流程的解决方案。然而，开始这段旅程需要战略性地选择**概念验证**（**POC**）候选者，以解决特定的组织需求和痛点。本介绍部分强调了识别那些具有重复性、时间效率低下或易出错特性的流程作为利用Power
    Platform进行自动化的理想候选者的必要性。此外，为了确保无缝实施和可扩展性，对**应用程序生命周期管理**（**ALM**）原则的基础理解是必不可少的。
- en: 'Here is what you will learn about in this chapter:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将了解以下内容：
- en: Identifying suitable POC candidates for Power Platform automation
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定适合Power Platform自动化的POC候选者
- en: Analyzing processes to find automation opportunities
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析流程以寻找自动化机会
- en: Accelerating solution development with ALM and the Creator Kit
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ALM和Creator Kit加速解决方案开发
- en: Using the Creator Kit for hands-on experience
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Creator Kit进行动手体验
- en: Identifying suitable POC candidates
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 确定合适的POC候选者
- en: In the realm of digital transformation, identifying suitable POC candidates
    is a crucial initial step toward leveraging Power Platform for organizational
    enhancement. Power Platform offers a versatile suite of tools designed to empower
    users to automate processes, analyze data, and build applications without extensive
    coding knowledge. However, before diving into full-scale implementation, organizations
    must strategically select POC candidates that align with their specific needs,
    objectives, and digital transformation initiatives. There are two main areas to
    understand before POC candidates are identified and selected, as we will discuss
    next.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字转型的领域，确定合适的POC候选者是利用Power Platform进行组织提升的关键第一步。Power Platform提供了一套灵活的工具套件，旨在赋予用户自动化流程、分析数据和构建应用程序的能力，而无需广泛的编码知识。然而，在全面实施之前，组织必须战略性地选择与他们的特定需求、目标和数字化转型计划相一致的POC候选者。在确定和选择POC候选者之前，有两个主要领域需要理解，我们将在下一部分讨论。
- en: Understanding organizational pain points
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解组织痛点
- en: Before proceeding with the selection of POC candidates, organizations need to
    conduct a thorough analysis of their current operational landscape and identify
    the areas that require improvement. This means carefully reviewing their processes,
    workflows, and pain points, and evaluating them for potential opportunities to
    enhance efficiency, productivity, and quality. To achieve this, they need to engage
    with key stakeholders from various departments and encourage them to share their
    perspectives and experiences. Through these collaborative dialogues, they can
    gain a deeper understanding of the challenges that different segments of the organization
    face, such as inefficiencies, manual work, data silos, and duplicate tasks. With
    this comprehensive and nuanced understanding, they can effectively determine which
    processes are most suitable for transformation, optimization, or enhancement through
    the innovative capabilities of Power Platform. This proactive approach enables
    organizations to identify promising POC candidates and fosters a culture of continuous
    improvement and digital innovation.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行POC候选者的选择之前，组织需要对当前的运营环境进行彻底分析，并确定需要改进的领域。这意味着仔细审查他们的流程、工作流程和痛点，并评估它们在提高效率、生产力和质量方面的潜在机会。为了实现这一目标，他们需要与来自各个部门的重点利益相关者进行接触，并鼓励他们分享他们的观点和经验。通过这些协作对话，他们可以更深入地了解组织不同部门面临的挑战，例如低效率、手动工作、数据孤岛和重复任务。有了这种全面和细致的理解，他们可以有效地确定哪些流程最适合通过Power
    Platform的创新功能进行转型、优化或增强。这种积极主动的方法使组织能够确定有希望的POC候选者，并培养持续改进和数字创新的文化。
- en: Criteria for POC selection
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: POC选择标准
- en: 'Several criteria guide the selection of POC candidates for Power Platform implementation,
    including their potential impact on organizational efficiency, productivity, cost
    savings, or customer satisfaction, alongside technical feasibility within existing
    infrastructure. Opting for manageable complexity ensures quick wins without risking
    intricate or mission-critical projects; ensuring access to necessary data sources
    is crucial for analysis and automation within the Power Platform environment.
    Additionally, involving end users and stakeholders from the outset ensures alignment,
    relevance, and buy-in, fostering smoother adoption and integration of Power Platform
    solutions. Let us dive into the specific criteria in the following figure and
    the list that follows:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 几个标准指导着选择Power Platform实施候选者的POC（Proof of Concept，概念验证），包括它们对组织效率、生产力、成本节约或客户满意度的影响，以及现有基础设施中的技术可行性。选择可管理的复杂性确保了快速的成功，同时避免了复杂或任务关键型项目；确保能够访问必要的数据源对于在Power
    Platform环境中进行分析和自动化至关重要。此外，从一开始就涉及最终用户和利益相关者确保了一致性、相关性和承诺，从而促进了Power Platform解决方案的更平滑采用和集成。让我们深入了解以下图和列表中的具体标准：
- en: '![Figure 9.1 – POC selection criteria](img/B21080_09_1.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图9.1 – POC选择标准](img/B21080_09_1.jpg)'
- en: Figure 9.1 – POC selection criteria
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1 – POC选择标准
- en: '**Impact on organizational efficiency**: This criterion assesses the potential
    of a POC candidate to streamline processes, reduce manual effort, and optimize
    resource utilization within the organization. It involves analyzing **key performance
    indicators** (**KPIs**) related to efficiency, such as cycle time, throughput,
    and resource utilization rates. By implementing Power Platform solutions, organizations
    aim to automate repetitive tasks, eliminate bottlenecks, and enhance workflow
    efficiency, ultimately driving productivity and reducing operational costs.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对组织效率的影响**：这一标准评估POC候选者简化流程、减少人工努力和优化组织资源利用的潜力。它涉及分析与效率相关的**关键绩效指标（KPIs**），如周期时间、吞吐量和资源利用率率。通过实施Power
    Platform解决方案，组织旨在自动化重复性任务，消除瓶颈，提高工作流程效率，最终推动生产力并降低运营成本。'
- en: '**Productivity**: Productivity measures the output generated from input resources,
    including time, labor, and materials. POC candidates with high productivity potential
    demonstrate the ability to automate manual tasks, streamline workflows, and empower
    employees to focus on value-added activities. Through Power Platform implementation,
    organizations can equip employees with tools to automate routine processes, collaborate
    more efficiently, and make data-driven decisions, leading to increased productivity
    across departments.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产力**：生产力衡量的是从输入资源（包括时间、劳动力和材料）产生的产出。具有高生产力潜力的POC候选人展示了自动化手动任务、简化工作流程并使员工能够专注于增值活动的能力。通过Power
    Platform的实施，组织可以为员工提供自动化常规流程、更高效协作和基于数据做出决策的工具，从而提高各部门的生产力。'
- en: '**Cost savings**: Cost savings are a critical consideration for organizations
    seeking to optimize their operations. POC candidates with potential cost-saving
    benefits demonstrate the ability to reduce operational expenses, eliminate waste,
    and optimize resource allocation. This criterion involves conducting a cost-benefit
    analysis to evaluate the potential **return on investment** (**ROI**) associated
    with implementing Power Platform solutions. By automating manual tasks, reducing
    errors, and improving operational efficiency, organizations can achieve significant
    cost savings in areas such as labor, materials, and time.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本节约**：对于寻求优化其运营的组织来说，成本节约是一个关键的考虑因素。具有潜在成本节约效益的POC候选人展示了降低运营成本、消除浪费和优化资源配置的能力。这一标准涉及到进行成本效益分析，以评估实施Power
    Platform解决方案相关的潜在**投资回报率**（ROI）。通过自动化手动任务、减少错误和提高运营效率，组织可以在劳动力、材料和时间等领域实现显著的成本节约。'
- en: '**Enhanced customer satisfaction**: Customer satisfaction is a key driver of
    organizational success and growth. POC candidates that can enhance customer satisfaction
    demonstrate the ability to improve service quality, responsiveness, and overall
    customer experience. This criterion involves assessing how Power Platform solutions
    can enable organizations to better understand customer needs, deliver personalized
    experiences, and address inquiries and issues more effectively. By implementing
    solutions that streamline customer-facing processes, organizations can enhance
    customer satisfaction, loyalty, and retention.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提升客户满意度**：客户满意度是组织成功和增长的关键驱动力。能够提升客户满意度的POC候选人展示了提高服务质量、响应速度和整体客户体验的能力。这一标准涉及到评估Power
    Platform解决方案如何使组织更好地理解客户需求、提供个性化的体验，并更有效地处理询问和问题。通过实施简化客户接触流程的解决方案，组织可以提升客户满意度、忠诚度和保留率。'
- en: '**Feasibility within existing infrastructure**: Feasibility within existing
    infrastructure assesses the compatibility of POC candidates with the organization’s
    current technology stack, systems, and architecture. This criterion involves evaluating
    factors such as integration capabilities, scalability, security, and compliance
    requirements. Organizations must ensure that Power Platform solutions can seamlessly
    integrate with existing systems and workflows while meeting security and compliance
    standards. By selecting POC candidates that align with the organization’s technology
    roadmap and infrastructure capabilities, organizations can minimize implementation
    risks and ensure the successful adoption and integration of Power Platform solutions.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现有基础设施内的可行性**：现有基础设施内的可行性评估了POC候选人与组织当前技术堆栈、系统和架构的兼容性。这一标准涉及到评估诸如集成能力、可扩展性、安全性和合规性要求等因素。组织必须确保Power
    Platform解决方案可以无缝集成到现有系统和流程中，同时满足安全和合规标准。通过选择与组织的技术路线图和基础设施能力相一致的POC候选人，组织可以最小化实施风险并确保Power
    Platform解决方案的成功采用和集成。'
- en: Selecting the right POC candidates is the first step toward leveraging Power
    Platform for digital transformation. This involves analyzing organizational processes
    to identify areas for improvement. Identifying pain points helps highlight areas
    where automation can have the greatest impact. Engaging with stakeholders across
    departments provides a comprehensive view of these challenges. Let’s revisit key
    aspects associated with POC selection.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的POC候选人是在利用Power Platform进行数字化转型过程中的第一步。这涉及到分析组织流程以确定改进的区域。识别痛点有助于突出自动化可以产生最大影响的领域。与跨部门的利益相关者进行交流可以全面了解这些挑战。让我们回顾与POC选择相关的关键方面。
- en: 'Key criteria for selecting POC candidates include the following:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 选择POC候选人的关键标准包括以下内容：
- en: '**Organizational efficiency**: Streamlining processes and optimizing resource
    utilization'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**组织效率**：简化流程和优化资源利用'
- en: '**Productivity**: Automating tasks and improving workflow efficiency'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产力**：自动化任务和提高工作流程效率'
- en: '**Cost savings**: Reducing operational expenses and improving ROI'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本节约**：降低运营成本并提高投资回报率'
- en: '**Customer satisfaction**: Enhancing service quality and responsiveness'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户满意度**：提升服务质量和服务响应速度'
- en: '**Feasibility**: Ensuring compatibility with existing infrastructure and systems'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可行性**：确保与现有基础设施和系统的兼容性'
- en: By strategically selecting suitable POC candidates, organizations can effectively
    use Power Platform to automate processes and achieve their digital transformation
    goals. This proactive approach not only identifies the right candidates but also
    lays a strong foundation for continuous improvement and innovation.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 通过战略性地选择合适的POC候选人，组织可以有效地利用Power Platform自动化流程并实现其数字化转型目标。这种积极主动的方法不仅确定了正确的候选人，还为持续改进和创新奠定了坚实的基础。
- en: In the next section, we will dive deeper into the methods for examining your
    current workflows and processes. This will help you identify additional opportunities
    for automation, further optimizing your operations with Power Platform. Understanding
    the intricacies of your operational landscape is crucial for uncovering hidden
    inefficiencies and maximizing the potential of your automation efforts.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将深入探讨检查您当前工作流程和流程的方法。这将帮助您识别额外的自动化机会，进一步利用Power Platform优化您的运营。理解您的运营环境复杂性对于揭示隐藏的低效并最大化自动化努力潜力至关重要。
- en: Analyzing processes to find automation opportunities
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分析流程以寻找自动化机会
- en: In the quest for efficiency and optimization, organizations often turn to automation
    as a means to streamline operational processes. However, before diving into automation
    initiatives, a thorough analysis of existing processes is essential to identify
    areas ripe for improvement. This analysis involves delving into the intricacies
    of organizational workflows and scrutinizing each step for inefficiencies, bottlenecks,
    and opportunities for enhancement. By leveraging both general principles of business
    analysis and specific tools within the Power Platform ecosystem, such as process
    mining and task mining in Power Automate, organizations can gain valuable insights
    and pinpoint areas for automation that yield maximum impact.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在追求效率和优化的过程中，组织通常会转向自动化作为简化运营流程的手段。然而，在投身于自动化项目之前，对现有流程进行彻底的分析是必不可少的，以确定哪些领域适合改进。这种分析包括深入了解组织工作流程的复杂性，并仔细审查每个步骤以发现低效、瓶颈和改进机会。通过利用商业分析的一般原则和Power
    Platform生态系统中的特定工具，如Power Automate中的流程挖掘和任务挖掘，组织可以获得宝贵的见解并确定自动化能够带来最大影响的领域。
- en: General business analysis techniques
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通用商业分析技术
- en: 'Business analysis, drawing from both **Capability Maturity Model Integration**
    (**CMMI**) and the **Business Analysis Body of Knowledge** (**BABOK**), lays the
    groundwork for identifying areas ripe for automation within operational processes.
    Integrating principles from CMMI and BABOK enhances the effectiveness and comprehensiveness
    of the analysis, providing organizations with a robust framework to identify and
    address process inefficiencies:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 商业分析，借鉴**能力成熟度模型集成**（**CMMI**）和**商业分析知识体系**（**BABOK**），为在运营流程中确定适合自动化的领域奠定基础。将CMMI和BABOK的原则相结合，增强了分析的有效性和全面性，为组织提供了一个强大的框架来识别和解决流程低效问题：
- en: CMMI emphasizes the importance of process improvement and maturity in achieving
    organizational goals. By aligning with CMMI principles, business analysis endeavors
    to assess the maturity of operational processes and identify opportunities for
    enhancement. Techniques such as process mapping and value stream mapping, central
    to CMMI’s process improvement approach, enable organizations to visualize and
    analyze workflows comprehensively. Process mapping entails the meticulous documentation
    of each step in a process, capturing inputs, outputs, and dependencies to uncover
    redundancies and inefficiencies. Similarly, value stream mapping focuses on the
    end-to-end flow of activities, shedding light on areas of waste and non-value-added
    activities that impede process efficiency.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CMMI强调在实现组织目标过程中过程改进和成熟度的重要性。通过遵循CMMI原则，业务分析致力于评估运营过程的成熟度并识别改进的机会。CMMI过程改进方法的核心技术，如流程图和价值流图，使组织能够全面可视化和分析工作流程。流程图涉及对流程中每一步的细致文档记录，捕捉输入、输出和依赖关系，以揭示冗余和低效。同样，价值流图专注于活动的端到端流程，揭示了浪费和非增值活动，这些活动阻碍了流程效率。
- en: BABOK, on the other hand, provides a comprehensive guide to business analysis
    practices, offering techniques and methodologies to analyze and improve business
    processes. Root cause analysis, a fundamental technique within BABOK, plays a
    pivotal role in identifying the underlying factors contributing to process inefficiencies.
    By delving deep into the root causes of issues, organizations can address the
    underlying problems rather than merely treating the symptoms. This approach aligns
    closely with CMMI’s emphasis on continuous improvement, enabling organizations
    to enhance process maturity and drive operational excellence.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，BABOK为业务分析实践提供了一个全面的指南，提供了分析和改进业务流程的技术和方法。根本原因分析是BABOK中的一个基本技术，在识别导致流程低效的根本因素方面发挥着关键作用。通过深入研究问题的根本原因，组织可以解决根本问题，而不仅仅是治疗症状。这种方法与CMMI对持续改进的强调紧密一致，使组织能够提高过程成熟度并推动运营卓越。
- en: By integrating principles from both CMMI and BABOK, organizations can conduct
    a holistic analysis of operational processes to identify areas for automation
    effectively. This combined approach enables organizations to leverage the strengths
    of each framework, ensuring a thorough understanding of process inefficiencies
    and paving the way for targeted automation initiatives. Ultimately, by aligning
    business analysis practices with principles from CMMI and BABOK, organizations
    can drive significant improvements in operational efficiency, productivity, and
    overall business performance. For example, through process mapping, leaders can
    visually document each step of a process, identifying inefficiencies, redundancies,
    and bottlenecks that could be addressed through automation. Similarly, value stream
    mapping helps to highlight end-to-end process flows, enabling leaders to identify
    areas of waste and non-value-added activities ripe for automation.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 通过整合CMMI和BABOK的原则，组织可以对运营过程进行全面的综合分析，以有效地识别自动化领域。这种结合的方法使组织能够利用每个框架的优势，确保对过程低效有彻底的理解，并为有针对性的自动化项目铺平道路。最终，通过将业务分析实践与CMMI和BABOK的原则相一致，组织可以在运营效率、生产力和整体业务绩效方面实现显著的改进。例如，通过流程图，领导者可以直观地记录流程的每一步，识别可以通过自动化解决的问题，如低效、冗余和瓶颈。同样，价值流图有助于突出端到端流程流，使领导者能够识别适合自动化的浪费和非增值活动领域。
- en: Specific Power Platform tools
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 特定的Power Platform工具
- en: Within the Power Platform ecosystem, tools such as process mining and task mining
    in Power Automate offer specialized capabilities for analyzing operational processes
    and identifying automation opportunities. Process mining involves analyzing event
    logs and data from IT systems to visualize and understand the actual flow of processes
    within an organization. By examining timestamps, user interactions, and system
    activities, process mining tools can uncover deviations, bottlenecks, and variations
    in process execution, providing insights into areas for improvement and automation.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Platform生态系统中，Power Automate中的流程挖掘和任务挖掘等工具提供了分析运营过程和识别自动化机会的专门功能。流程挖掘涉及分析IT系统的事件日志和数据，以可视化和理解组织内部流程的实际流程。通过检查时间戳、用户交互和系统活动，流程挖掘工具可以揭示流程执行中的偏差、瓶颈和变化，为改进和自动化提供见解。
- en: Task mining, a feature within Power Automate, focuses on analyzing user interactions
    and behaviors within digital systems to identify repetitive tasks and inefficiencies.
    By recording and analyzing user interactions with applications and systems, task-mining
    tools can identify patterns, bottlenecks, and opportunities for automation. This
    granular understanding of user behavior enables organizations to prioritize automation
    initiatives that directly impact productivity and efficiency.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 任务挖掘，Power Automate中的一个功能，专注于分析数字系统内的用户交互和行为，以识别重复性任务和低效之处。通过记录和分析用户与应用程序和系统的交互，任务挖掘工具可以识别模式、瓶颈和自动化机会。这种对用户行为的细致理解使组织能够优先考虑直接影响生产力和效率的自动化倡议。
- en: Exploring how process mining and low-code development team up
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索流程挖掘和低代码开发如何携手合作
- en: Businesses seeking faster results are adopting low-code development, avoiding
    complex coding and large developer teams. Process mining identifies which business
    processes are best suited for low-code methods.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 寻求更快结果的业务正在采用低代码开发，避免复杂的编码和大型开发者团队。流程挖掘确定了哪些业务流程最适合低代码方法。
- en: Low-code development simplified
  id: totrans-42
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 低代码开发简化版
- en: Low-code development allows software creation without extensive coding knowledge,
    enabling both developers and non-developers to quickly build apps and products
    using pre-made parts, templates, drag-and-drop tools, and automation. This accelerates
    the production of websites, apps, and other digital solutions.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 低代码开发允许在不具备广泛编码知识的情况下创建软件，使开发者和非开发者都能快速使用预制组件、模板、拖放工具和自动化来构建应用程序和产品。这加速了网站、应用程序和其他数字解决方案的生产。
- en: Role of process mining
  id: totrans-44
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 流程挖掘的作用
- en: Process mining helps companies determine which processes can be quickly adapted
    to low-code, guiding them on where to focus their efforts, whether on low-code
    or more code-heavy projects. It ensures a smooth transition to low-code, avoiding
    bottlenecks and optimizing workflows with clear, data-driven plans.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 流程挖掘帮助公司确定哪些流程可以快速适应低代码，指导他们在低代码或更注重代码的项目上集中精力。它确保了低代码的平稳过渡，避免了瓶颈，并通过清晰、数据驱动的计划优化工作流程。
- en: Practical application
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实际应用
- en: Organizations can combine general business analysis techniques with Power Platform
    tools to comprehensively analyze operational processes, starting with process
    and value stream mapping to visualize workflows. Process mining tools analyze
    event logs to uncover inefficiencies, while task mining in Power Automate provides
    insights into user behaviors and automation opportunities. This integrated approach
    offers a holistic view of operations, identifying areas for automation that streamline
    tasks, optimize workflows, and drive digital transformation.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 组织可以将通用商业分析技术与Power Platform工具结合使用，全面分析运营流程，从流程和价值流映射开始，以可视化工作流程。流程挖掘工具分析事件日志以揭示低效之处，而Power
    Automate中的任务挖掘则提供了对用户行为和自动化机会的洞察。这种集成方法提供了对运营的整体视角，确定了自动化领域，从而简化任务、优化工作流程并推动数字化转型。
- en: '![Figure 9.2 – Power Automate process mining accelerating solution development
    with Power Platform: leveraging the ALM Accelerator and Creator Kit](img/B21080_09_2.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图9.2 – 利用Power Platform的ALM加速器和Creator Kit加速Power Automate流程挖掘的解决方案开发](img/B21080_09_2.jpg)'
- en: 'Figure 9.2 – Power Automate process mining accelerating solution development
    with Power Platform: leveraging the ALM Accelerator and Creator Kit'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2 – 利用Power Platform的ALM加速器和Creator Kit加速Power Automate流程挖掘的解决方案开发
- en: In the fast-paced world of modern business, agility and innovation are the keys
    to staying ahead of the curve. Organizations are constantly seeking ways to accelerate
    the development of solutions that address their evolving needs, while also maintaining
    high standards of quality and reliability. Enter Microsoft Power Platform – a
    suite of low-code tools that empower users to build custom applications, automate
    workflows, analyze data, and create chatbots with ease.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代商业的快节奏世界中，敏捷性和创新是保持领先的关键。组织不断寻求加速解决其不断变化需求的方法，同时保持高质量和可靠性标准。微软Power Platform应运而生——一套低代码工具，使用户能够轻松构建自定义应用程序、自动化工作流程、分析数据和创建聊天机器人。
- en: Note
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Before you download and install the Creator Kit, ensure that you enable code
    components in your environment first to enable an environment to use code components
    inside its apps.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在您下载并安装Creator Kit之前，请确保首先在您的环境中启用代码组件，以便环境能够在其应用程序中使用代码组件。
- en: '![Figure 9.3 – Enabling controls at the environment level](img/B21080_09_3.jpg)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图9.3 – 环境级别的启用控制](img/B21080_09_3.jpg)'
- en: Figure 9.3 – Enabling controls at the environment level
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.3 – 环境级别的启用控制
- en: These tools and features are designed to simplify and streamline the ALM process
    for Power Platform users, regardless of their skill level or role. By leveraging
    these tools and features, organizations can accelerate their solution development
    and achieve better outcomes with Power Platform. The following sections will help
    us understand the concept of ALM and how we can apply it to our own organizations.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具和功能旨在简化并优化Power Platform用户的ALM流程，无论其技能水平或角色如何。通过利用这些工具和功能，组织可以加速其解决方案的开发，并使用Power
    Platform实现更好的成果。以下章节将帮助我们理解ALM的概念以及如何将其应用于我们自己的组织。
- en: What is ALM?
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是ALM？
- en: ALM is a strategic approach encompassing the governance, development, and maintenance
    of applications, critical for ensuring operational excellence and alignment with
    organizational objectives. ALM integrates a spectrum of disciplines including
    requirements management, software architecture, development, testing, maintenance,
    change management, support, continuous integration, project management, deployment,
    release management, and governance.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: ALM是一种战略方法，涵盖了应用程序的治理、开发和维护，这对于确保运营卓越和组织目标的一致性至关重要。ALM整合了一系列学科，包括需求管理、软件架构、开发、测试、维护、变更管理、支持、持续集成、项目管理、部署、发布管理和治理。
- en: ALM tools, available in the ALM Accelerator and Creator Kit, serve as pivotal
    assets, fostering a standardized framework for seamless communication and collaboration
    among cross-functional teams, including software development, quality assurance,
    and operational departments. These tools are designed to streamline processes,
    enhance productivity, and mitigate risks by automating key aspects of software
    development and delivery. Governance, a cornerstone of ALM, involves managing
    requirements, resources, and system administration tasks such as data security,
    user access, change tracking, review, audit, deployment control, and rollback.
    This ensures regulatory compliance, risk mitigation, and optimized resource allocation.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: ALM工具，可在ALM加速器和Creator Kit中找到，作为关键资产，促进跨职能团队（包括软件开发、质量保证和运营部门）之间标准化的框架，实现无缝沟通和协作。这些工具旨在通过自动化软件开发和交付的关键方面来简化流程、提高生产力和降低风险。治理是ALM的基石，涉及管理需求、资源和系统管理任务，如数据安全、用户访问、变更跟踪、审查、审计、部署控制和回滚。这确保了合规性、风险缓解和资源分配优化。
- en: Application development within the ALM framework entails a strategic approach
    to identify current challenges, meticulously plan, architect, design, develop,
    and rigorously test applications. This encompasses both traditional developer
    and app maker roles, fostering innovation and agility in solution delivery. Maintenance,
    another crucial facet of ALM, involves the seamless deployment of applications
    and the ongoing management of optional and dependent technologies. This ensures
    the longevity, performance optimization, and scalability of applications throughout
    their lifecycle.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在ALM框架内进行应用程序开发涉及一种战略方法，以识别当前挑战，精心规划、设计、开发、并严格测试应用程序。这包括传统开发者和应用制作者的角色，促进解决方案交付中的创新和敏捷性。维护是ALM的另一个关键方面，涉及应用程序的无缝部署和持续管理可选和依赖技术。这确保了应用程序在其生命周期中的长期性、性能优化和可扩展性。
- en: '![Figure 9.4 – ALM overview](img/B21080_09_4.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图9.4 – ALM概述](img/B21080_09_4.jpg)'
- en: Figure 9.4 – ALM overview
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.4 – ALM概述
- en: The application lifecycle, as governed by ALM principles, follows a cyclical
    software development process encompassing phases such as planning and tracking,
    development, building and testing, deployment, operation, monitoring, and continuous
    improvement. By adhering to ALM best practices, organizations can drive efficiency,
    enhance agility, and achieve sustainable success in their digital transformation
    journey.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 由ALM原则管理的应用程序生命周期遵循一个循环的软件开发过程，包括规划与跟踪、开发、构建与测试、部署、运营、监控和持续改进等阶段。通过遵循ALM最佳实践，组织可以在其数字化转型之旅中推动效率、提高敏捷性并实现可持续的成功。
- en: ALM within Power Platform
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power Platform中的ALM
- en: In Microsoft Power Platform, Dataverse serves as a robust repository for securely
    managing data and processes utilized by business applications. Integration with
    Dataverse is essential for leveraging the full suite of Power Platform features
    and tools for ALM.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在Microsoft Power Platform中，Dataverse作为安全管理和存储业务应用程序所使用的数据和流程的强大仓库。与Dataverse的集成对于充分利用Power
    Platform的ALM功能和工具至关重要。
- en: 'Key concepts crucial for comprehending ALM within Microsoft Power Platform
    include the following:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在Microsoft Power Platform中理解ALM的关键概念包括以下内容：
- en: '**Environments**: These are dedicated areas designed for storing, managing,
    and sharing your organization’s business data, applications, and workflows. These
    environments function as containers that segregate apps based on varying roles,
    security requirements, or intended user groups. Each environment is capable of
    hosting a single Microsoft Dataverse database, ensuring organized and secure data
    management within distinct operational contexts.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境**：这些是专门设计用于存储、管理和共享组织业务数据、应用程序和工作流程的区域。这些环境作为容器，根据不同的角色、安全要求或目标用户群体来隔离应用程序。每个环境都能托管单个Microsoft
    Dataverse数据库，确保在特定操作环境中进行有序和安全的数据库管理。'
- en: '**Solutions**: These serve as the cornerstone for implementing ALM, enabling
    the distribution of components across environments via export and import functionalities.
    Components represent various artifacts utilized within applications, ranging from
    tables, columns, canvas and model-driven apps, Power Automate flows, chatbots,
    and charts to plugins.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案**：这些是实施ALM的基础，通过导出和导入功能，使组件能够在不同环境中分发。组件代表在应用程序中使用的各种工件，从表、列、画布和模型驱动应用程序、Power
    Automate流程、聊天机器人和图表到插件。'
- en: '**Automation**: This plays a pivotal role in the application lifecycle, enhancing
    productivity, reliability, quality, and efficiency within ALM processes. Employing
    automation tools and tasks facilitates the validation, exporting, packaging, unpacking,
    and deployment of solutions, while also enabling the creation and resetting of
    sandbox environments. Microsoft has made available a set of tools to enable automation
    of various functions. Microsoft Power Platform Build Tools can be used to synchronize
    solution metadata, generate build artifacts, deploy solutions to downstream environments,
    provision or deprovision environments, and perform analysis checks against solutions.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化**：在应用程序生命周期中发挥着关键作用，增强了ALM过程中的生产力、可靠性、质量和效率。使用自动化工具和任务可以促进解决方案的验证、导出、打包、解包和部署，同时还能创建和重置沙盒环境。Microsoft提供了一套工具，以实现各种功能的自动化。Microsoft
    Power Platform Build Tools可用于同步解决方案元数据、生成构建工件、将解决方案部署到下游环境、配置或取消配置环境，并对解决方案执行分析检查。'
- en: '**Source control**: It’s crucial to consider collaboration within your development
    team when undertaking a project. By breaking down silos and encouraging open communication,
    your team can enhance software delivery. Tools and workflows such as Git, GitHub,
    and Azure DevOps are specifically designed to facilitate communication and improve
    software quality. However, managing configurations in a solution system can pose
    challenges for team development. Organizations must carefully coordinate changes
    from multiple developers to minimize merge conflicts, as source control systems
    have limitations on how merges are handled. It’s advisable to avoid situations
    where multiple individuals make simultaneous changes to complex components, such
    as forms, flows, and canvas apps.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**源代码控制**：在进行项目开发时，考虑开发团队内的协作至关重要。通过打破隔阂并鼓励开放沟通，团队可以提升软件交付效率。Git、GitHub和Azure
    DevOps等工具和流程专门设计用于促进沟通和提升软件质量。然而，在解决方案系统中管理配置可能会给团队开发带来挑战。组织必须仔细协调多个开发者的变更，以最小化合并冲突，因为源代码控制系统在处理合并方面存在限制。建议避免多人同时修改复杂组件的情况，例如表单、流程和画布应用。'
- en: '**Continuous integration and continuous delivery** (**CI/CD**): This is a software
    development practice aimed at improving the efficiency, reliability, and speed
    of delivering applications. It involves automating various stages of the development
    lifecycle, from code integration and testing to deployment and delivery. CI involves
    frequently integrating code changes into a shared repository, typically multiple
    times a day. Each integration triggers automated builds and tests to validate
    the changes. By continuously integrating code, developers can quickly identify
    and address integration errors, ensuring that the software remains functional
    and stable throughout the development process. CD extends the principles of CI
    by automating the deployment process, enabling teams to reliably and efficiently
    deliver software updates to production environments. With CD, every successful
    build is potentially deployable to production, reducing the time and effort required
    to release new features or fixes.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续集成和持续交付**（**CI/CD**）：这是一种旨在提高应用程序交付效率、可靠性和速度的软件开发实践。它涉及自动化开发生命周期的各个阶段，从代码集成和测试到部署和交付。CI
    包括频繁地将代码更改集成到共享存储库中，通常每天多次。每次集成都会触发自动构建和测试以验证更改。通过持续集成代码，开发者可以快速识别和解决集成错误，确保软件在整个开发过程中保持功能性和稳定性。CD
    通过自动化部署过程扩展了 CI 的原则，使团队能够可靠且高效地将软件更新部署到生产环境中。使用 CD，每个成功的构建都有可能部署到生产环境，从而减少了发布新功能或修复所需的时间和精力。'
- en: 'Within the realm of Power Platform development, two primary types of DevOps
    pipelines are available: Azure DevOps pipelines and in-product pipelines. Additionally,
    GitHub Actions serves as a flexible option, enabling teams to automate build,
    test, and deployment tasks directly from their repositories:'
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在 Power Platform 开发领域，有两种主要的 DevOps 管道类型可用：Azure DevOps 管道和产品内管道。此外，GitHub Actions
    作为一种灵活的选项，使团队能够直接从他们的存储库自动化构建、测试和部署任务：
- en: '**Azure DevOps pipelines**: These provide a robust platform for orchestrating
    CI/CD pipelines tailored to Power Platform solutions. With Azure DevOps pipelines,
    developers can automate the build, test, and deployment processes, ensuring efficient
    and consistent delivery of applications. These pipelines seamlessly integrate
    with Power Platform environments, enabling teams to streamline development workflows
    and accelerate time-to-market. Azure DevOps offers extensive customization options,
    allowing teams to configure pipelines to suit their specific requirements and
    preferences.'
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure DevOps 管道**: 这些提供了一种强大的平台，用于编排针对 Power Platform 解决方案的 CI/CD 管道。使用 Azure
    DevOps 管道，开发者可以自动化构建、测试和部署过程，确保应用程序的高效和一致交付。这些管道与 Power Platform 环境无缝集成，使团队能够简化开发工作流程并加快上市时间。Azure
    DevOps 提供广泛的定制选项，允许团队配置管道以满足其特定的需求和偏好。'
- en: '**In-product pipelines**: In addition to Azure DevOps pipelines, Power Platform
    also offers built-in, or in-product, pipelines that are tightly integrated within
    the Power Platform environment. These in-product pipelines enable users to automate
    deployment tasks directly from within Power Apps, Power Automate, and Power BI.
    Leveraging in-product pipelines, developers can automate the deployment of solutions,
    flows, and reports without the need for external tools or platforms. This native
    integration simplifies the deployment process and enhances the agility of development
    teams by eliminating the need to switch between different environments.'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品内管道**: 除了 Azure DevOps 管道外，Power Platform 还提供内置的或产品内管道，这些管道紧密集成在 Power
    Platform 环境中。这些产品内管道使用户能够直接从 Power Apps、Power Automate 和 Power BI 内部自动化部署任务。利用产品内管道，开发者可以在无需外部工具或平台的情况下自动化解决方案、流程和报告的部署。这种原生集成简化了部署过程，并通过消除在不同环境之间切换的需要，增强了开发团队的敏捷性。'
- en: '**GitHub Actions**: GitHub Actions provides a flexible, workflow automation
    tool that supports CI/CD pipelines for Power Platform. By integrating with Power
    Platform environments, GitHub Actions allows developers to automate build, test,
    and deployment tasks directly from their repositories. This tool’s open source
    nature and extensive community support make it adaptable and ideal for teams looking
    to streamline development and collaborate efficiently across projects.'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub Actions**：GitHub Actions 提供了一个灵活的工作流程自动化工具，支持 Power Platform 的 CI/CD
    管道。通过集成 Power Platform 环境，GitHub Actions 允许开发者直接从他们的仓库自动化构建、测试和部署任务。该工具的开源性质和广泛的社区支持使其适应性强，非常适合希望简化开发并在项目间高效协作的团队。'
- en: ALM strategy
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ALM 策略
- en: In adhering to ALM principles, it’s essential to establish distinct environments
    for both application development and production. While basic ALM practices can
    be achieved with only separate development and production environments, it’s advisable
    to also maintain at least one separate test environment. This additional test
    environment facilitates comprehensive end-to-end validation, encompassing solution
    deployment and application testing. Depending on the organization’s requirements,
    additional environments such as **user acceptance testing** (**UAT**), **systems
    integration testing** (**SIT**), and training environments may also be necessary.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在遵循 ALM 原则时，为应用开发和生产建立不同的环境是至关重要的。虽然仅通过分离的开发和生产环境就可以实现基本的 ALM 实践，但建议至少维护一个单独的测试环境。这个额外的测试环境有助于全面端到端验证，包括解决方案部署和应用测试。根据组织的具体需求，可能还需要额外的环境，例如**用户验收测试**（**UAT**）、**系统集成测试**（**SIT**）和培训环境。
- en: '![Figure 9.5 – ALM strategy (Microsoft Learn)](img/B21080_09_5.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.5 – ALM 策略（Microsoft Learn）](img/B21080_09_5.jpg)'
- en: Figure 9.5 – ALM strategy (Microsoft Learn)
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.5 – ALM 策略（Microsoft Learn）
- en: Separate development environments serve to isolate changes from ongoing work
    efforts, preventing unfinished changes from impacting the development process.
    Moreover, distinct development environments help mitigate instances where one
    individual’s modifications negatively affect others’ work.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 分离的开发环境旨在隔离变更，防止未完成的变化影响开发过程。此外，不同的开发环境有助于减轻单个个体的修改对他人工作产生负面影响的情况。
- en: Given the unique requirements of each organization, it’s crucial to carefully
    assess and determine the specific environment needs to effectively support ALM
    practices.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到每个组织的独特需求，仔细评估和确定具体的环境需求对于有效支持 ALM 实践至关重要。
- en: 'Common questions to ask when setting up an ALM strategy for Power Platform
    include the following:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在为 Power Platform 设置 ALM 策略时，常见的问题包括以下内容：
- en: '**What types of environments should I use? And** **how many?**'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**我应该使用哪些类型的环境？需要多少个？**'
- en: '**Production environment**: These are intended for permanent organizational
    use. They can be created and managed by an administrator or any user with a Power
    Apps license, requiring at least 1 GB of available database capacity. These environments
    are also automatically generated for upgraded Dataverse databases. They serve
    as the primary platform for essential organizational operations.'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产环境**：这些是为永久性组织使用而设计的。它们可以由管理员或任何拥有 Power Apps 许可证的普通用户创建和管理，需要至少 1 GB 的可用数据库容量。这些环境也会为升级的
    Dataverse 数据库自动生成。它们作为组织基本运营的主要平台。'
- en: '**Sandbox environment**: These are non-production environments, which offer
    features such as copy and reset. Sandbox environments are used for development
    and testing, separate from production.'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沙盒环境**：这些是非生产环境，提供复制和重置等功能。沙盒环境用于开发和测试，与生产环境分离。'
- en: '**Developer environment**: Developer environments are created by users who
    have the Developer Plan license. They’re special environments intended only for
    use by the owner, for development purposes.'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发者环境**：开发者环境是由拥有开发者计划许可证的用户创建的。这些环境是专门为所有者使用，仅用于开发目的的特殊环境。'
- en: '**Default environment**: This is a special type of production environment.
    Each tenant has a default environment that’s created automatically. They are not
    recommended for production features.'
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**默认环境**：这是一种特殊的生产环境。每个租户都有一个自动创建的默认环境。它们不建议用于生产功能。'
- en: '**Trial environment**: These are designed to accommodate short-term testing
    requirements and are automatically cleared after a brief duration. They have a
    30-day expiration period and are restricted to one per user.'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**试验环境**：这些环境旨在满足短期测试需求，并在一段时间后自动清除。它们的有效期为30天，并且每个用户仅限一个。'
- en: '**Microsoft Dataverse for Teams environment**: When you initiate the creation
    of an app within Teams or install an app from the app catalog for the first time,
    a Dataverse for Teams environment is automatically generated for the corresponding
    team.'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft Dataverse for Teams环境**：当你在Teams中创建应用程序或首次从应用目录安装应用程序时，会自动为相应的团队生成一个Dataverse
    for Teams环境。'
- en: '**How can I automatically provision environments from the** **source code?**'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如何从源代码自动配置环境**？'
- en: Does the ALM strategy necessitate automating the provisioning of different types
    of environments to fulfill the organization’s needs? If so, the strategy must
    outline the necessary automation tasks and how the **Microsoft Power Platform
    Build Tools** (**PPBT**) can facilitate this process. Should PPBT offer the required
    automation capabilities, Azure DevOps can aid in orchestrating the environment
    setup.
  id: totrans-90
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ALM策略是否需要自动化不同类型环境的配置以满足组织的需要？如果是这样，策略必须概述必要的自动化任务以及**Microsoft Power Platform
    Build Tools（PPBT**）如何促进这一过程。如果PPBT提供所需的自动化功能，Azure DevOps可以帮助编排环境设置。
- en: '**What are the dependencies on** **my environments?**'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**我的环境中有哪些依赖项**？'
- en: When importing various solutions into your target environment, you’re essentially
    building layers, with the existing solution serving as the foundation for the
    imported one. It’s crucial to avoid cross-solution dependencies to ensure smooth
    solution layering. Having multiple solutions in the same environment that utilize
    the same component, particularly tables, should be circumvented. To mitigate cross-dependency
    risks, it’s advisable to segment your solutions based on component type.
  id: totrans-92
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当将各种解决方案导入目标环境时，你实际上是在构建层，现有的解决方案作为导入解决方案的基础。避免跨解决方案依赖对于确保解决方案层顺利至关重要。应避免在同一环境中使用相同组件（尤其是表）的多个解决方案。为了减轻跨依赖风险，建议根据组件类型对解决方案进行分段。
- en: Solution concepts
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案概念
- en: Solutions in Power Platform are packaged sets of components that are used to
    build, customize, and deploy business applications. They serve as containers for
    organizing and managing various elements such as tables, columns, views, forms,
    workflows, and other resources within the Power Platform ecosystem. Solutions
    allow users to package and distribute their customizations, configurations, and
    applications across different environments, facilitating collaboration, version
    control, and deployment management. They play a pivotal role in ALM by providing
    a structured approach to building and managing applications within the Power Platform
    environment.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Platform中，解决方案是一组用于构建、自定义和部署业务应用的组件集合。它们作为容器，用于组织和管理工作平台生态系统中各种元素，如表、列、视图、表单、工作流和其他资源。解决方案允许用户将他们的自定义、配置和应用程序打包并分发到不同的环境中，从而促进协作、版本控制和部署管理。它们在ALM中发挥着关键作用，通过提供一种结构化的方法来构建和管理Power
    Platform环境中的应用程序。
- en: Unmanaged and managed solutions
  id: totrans-95
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 未管理解决方案和管理解决方案
- en: 'Solutions are essential for organizing, transporting, and managing app components
    across different environments. There are two types of solutions: managed and unmanaged.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案对于在不同环境中组织、运输和管理应用程序组件至关重要。有两种类型的解决方案：管理型和非管理型。
- en: '![Figure 9.6 – Solution types](img/B21080_09_6.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图9.6 – 解决方案类型](img/B21080_09_6.jpg)'
- en: Figure 9.6 – Solution types
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.6 – 解决方案类型
- en: '**Unmanaged solutions**: These are crafted during the development phase. These
    solutions are utilized exclusively within development environments while modifications
    to applications are made. Unmanaged solutions can be exported in either an unmanaged
    or managed state. It’s advisable to export unmanaged versions of solutions and
    then store them in your source control system. Unmanaged solutions should be regarded
    as the primary source for Microsoft Power Platform assets. When an unmanaged solution
    is deleted, only the solution container containing any customizations included
    within it is removed; all unmanaged customizations persist and remain associated
    with the default solution.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未托管解决方案**：这些解决方案在开发阶段创建。这些解决方案仅用于开发环境，在修改应用程序时使用。未托管解决方案可以以未托管或托管状态导出。建议导出解决方案的未托管版本，然后将其存储在源代码控制系统中。未托管解决方案应被视为Microsoft
    Power Platform资产的主要来源。当删除未托管解决方案时，仅删除包含其中的任何自定义项的解决方案容器；所有未托管自定义项都持续存在并保留与默认解决方案的关联。'
- en: '**Managed solutions**: These, on the other hand, are deployed to environments
    other than development environments specific to that solution. This encompasses
    test, UAT, SIT, and production environments. Managed solutions can be independently
    serviced from other managed solutions within an environment. As a best practice
    in ALM, managed solutions should be generated by exporting an unmanaged solution
    as managed and treated as a build artifact.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**托管解决方案**：这些解决方案部署到除特定解决方案的开发环境之外的其他环境。这包括测试、UAT、SIT和生产环境。托管解决方案可以在环境中独立于其他托管解决方案进行维护。在ALM的最佳实践中，托管解决方案应通过将未托管解决方案导出为托管解决方案并作为构建工件来生成。'
- en: Note
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: When you customize within the development environment, you operate within the
    unmanaged layer. Subsequently, when exporting the customized solution from the
    unmanaged layer to distribute it to another environment, the solution is imported
    into the managed layer of that environment.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在开发环境中进行自定义时，你是在未托管层中操作。随后，当从未托管层导出自定义解决方案以将其分发到另一个环境时，该解决方案被导入该环境的托管层。
- en: Solution lifecycle
  id: totrans-103
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案生命周期
- en: 'Solutions provide essential functionalities that support various actions crucial
    for application lifecycle processes:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案提供支持各种应用程序生命周期过程中关键操作的基本功能：
- en: '**Create**: This allows users to author and export unmanaged solutions, providing
    the initial framework for customization and development.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建**：这允许用户创建和导出未托管解决方案，为定制和开发提供初始框架。'
- en: '**Update**: This facilitates the creation of updates to a managed solution
    that are then deployed to the parent managed solution. It’s important to note
    that components cannot be deleted with an update.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更新**：这有助于创建对托管解决方案的更新，然后部署到父托管解决方案。需要注意的是，组件不能通过更新进行删除。'
- en: '**Upgrade**: This enables the importation of a solution as an upgrade to an
    existing managed solution. This process involves removing unused components, implementing
    upgrade logic, and rolling up all patches into a new version of the solution.
    During upgrades, components that are no longer included in the upgraded version
    may be deleted. Users have the option to perform the upgrade immediately or stage
    it for additional actions before completion.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**升级**：这使可以将解决方案作为升级导入现有托管解决方案。此过程涉及删除未使用的组件、实现升级逻辑并将所有补丁汇总到解决方案的新版本中。在升级过程中，可能不再包含在升级版本中的组件可能会被删除。用户可以选择立即执行升级或在完成前将其安排为其他操作。'
- en: '**Patch**: This allows users to create patches containing only the changes
    for a parent managed solution, such as adding or editing components and assets.
    Patches are typically utilized for making small updates, similar to hotfixes.
    When imported, patches are layered on top of the parent solution, and components
    cannot be deleted with a patch.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**补丁**：这允许用户创建仅包含父托管解决方案更改的补丁，例如添加或编辑组件和资产。补丁通常用于进行类似热修复的小更新。当导入补丁时，补丁会叠加在父解决方案之上，并且不能通过补丁删除组件。'
- en: Solution publisher
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案发布者
- en: Every app and other components within a solution, such as tables and customizations,
    are associated with a solution publisher. It’s recommended to create your own
    publisher instead of using the default one. You specify the publisher when initially
    creating a solution.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案中的每个应用程序和其他组件，如表和自定义项，都与解决方案发布者相关联。建议创建自己的发布者而不是使用默认的发布者。在最初创建解决方案时指定发布者。
- en: The solution publisher, acting as the component owner, governs changes allowed
    by other solution publishers. While ownership transfers within the same publisher
    are feasible, they aren’t possible across publishers. Once assigned to a managed
    solution, altering the publisher becomes impractical, emphasizing the need for
    a single publisher for potential layering adjustments. Choose a meaningful solution
    publisher name for clarity.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案发布者，作为组件所有者，管理其他解决方案发布者允许的更改。虽然同一发布者内部的拥有权转让是可行的，但跨发布者则不可行。一旦分配给管理解决方案，更改发布者就变得不切实际，强调了需要一个单一发布者以进行潜在的分层调整。选择一个有意义的解决方案发布者名称以提高清晰度。
- en: Publishers also include a prefix to prevent naming conflicts, allowing solutions
    from different publishers to coexist smoothly in an environment. For instance,
    Contoso’s solution uses the prefix `contoso`.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 发布者还包括一个前缀以防止命名冲突，允许不同发布者的解决方案在环境中顺利共存。例如，Contoso 的解决方案使用前缀 `contoso`。
- en: '![Figure 9.7 – Solution publisher prefix](img/B21080_09_7.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.7 – 解决方案发布者前缀](img/B21080_09_7.jpg)'
- en: Figure 9.7 – Solution publisher prefix
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.7 – 解决方案发布者前缀
- en: Note
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 注意事项
- en: When changing a solution publisher prefix, ensure you do it before creating
    any new apps or metadata items, as the names of metadata items cannot be altered
    once they are created. Refer to [https://learn.microsoft.com/en-us/power-platform/alm/solution-concepts-alm](https://learn.microsoft.com/en-us/power-platform/alm/solution-concepts-alm).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 当更改解决方案发布者前缀时，请确保在创建任何新的应用或元数据项之前进行更改，因为一旦元数据项被创建，其名称就不能更改。请参阅[https://learn.microsoft.com/en-us/power-platform/alm/solution-concepts-alm](https://learn.microsoft.com/en-us/power-platform/alm/solution-concepts-alm)。
- en: Solution dependencies
  id: totrans-117
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 解决方案依赖项
- en: Due to the hierarchical nature of managed solutions, certain managed solutions
    may rely on components from other managed solutions. Some solution publishers
    leverage this to create modular solutions. In such cases, you may need to install
    a foundational “base” managed solution before installing a secondary solution
    that further customizes its components. The secondary solution is reliant on components
    from the first solution.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 由于管理解决方案的层次结构，某些管理解决方案可能依赖于其他管理解决方案的组件。一些解决方案发布者利用这一点来创建模块化解决方案。在这种情况下，您可能需要在安装进一步自定义其组件的二级解决方案之前安装一个基础“基础”管理解决方案。二级解决方案依赖于第一个解决方案的组件。
- en: The system actively tracks these inter-solution dependencies. Attempting to
    install a solution requiring an absent base solution will result in installation
    failure, accompanied by a message prompting the installation of the prerequisite
    solution first. Similarly, due to these dependencies, the uninstallation of the
    base solution is prohibited while a dependent solution remains installed. To uninstall
    the base solution, you must first remove any dependent solutions.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 系统积极跟踪这些解决方案间的依赖关系。尝试安装需要缺失的基础解决方案的解决方案将导致安装失败，并伴随一条提示先安装所需解决方案的消息。同样，由于这些依赖关系，当依赖的解决方案安装时，禁止卸载基础解决方案。要卸载基础解决方案，您必须首先删除任何依赖的解决方案。
- en: ALM Accelerator for Power Platform
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power Platform 的 ALM 加速器
- en: The ALM Accelerator for Power Platform serves as a canvas app that offers a
    streamlined interface to Azure Pipelines and Git source control, facilitating
    ALM. It represents a reference implementation of ALM methodologies, leveraging
    Power Platform’s inherent capabilities to initiate ALM processes efficiently.
    Utilizing a combination of low-code canvas apps tailored for makers and administrators,
    alongside Azure Pipelines YAML and PowerShell templates, the ALM Accelerator simplifies
    the ALM adoption process.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 的 ALM 加速器作为一个画布应用，提供了一个简化的界面，用于访问 Azure Pipelines 和 Git 源代码控制，从而促进应用生命周期管理（ALM）。它代表了
    ALM 方法的参考实现，利用 Power Platform 的固有功能来有效地启动 ALM 流程。通过结合为制作者和管理员量身定制的低代码画布应用、Azure
    Pipelines YAML 和 PowerShell 模板，ALM 加速器简化了 ALM 的采用过程。
- en: Through the ALM Accelerator for Power Platform, makers gain the ability to conduct
    source control, maintain version history, and deploy solutions within the Power
    Platform environment. Utilizing the ALM Accelerator mandates that all Power Platform
    components – such as apps, flows, and customizations – be encapsulated within
    a solution.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 Power Platform 的 ALM 加速器，制作者能够进行源代码控制、维护版本历史记录以及在 Power Platform 环境中部署解决方案。使用
    ALM 加速器要求所有 Power Platform 组件（如应用、流程和自定义）都封装在解决方案中。
- en: While the ALM Accelerator doesn’t demand advanced ALM proficiency, users should
    possess a basic understanding of utilizing solutions within the Power Platform
    ecosystem, as explained in this book.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ALM加速器不需要高级ALM专业知识，但用户应具备在Power Platform生态系统内使用解决方案的基本理解，如本书中所述。
- en: Who should utilize the ALM Accelerator?
  id: totrans-124
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 谁应该使用 ALM 加速器？
- en: 'The ALM Accelerator caters to Power Platform makers and maker teams:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: ALM 加速器面向 Power Platform 制作人和制作人团队：
- en: Makers who are new to ALM concepts but desire the ability to preserve their
    work, track changes, and collaborate with other users.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于新接触 ALM 概念但希望保留他们的工作、跟踪更改并与其他用户协作的制作人来说。
- en: Makers proficient in advanced Git concepts, such as pull requests, branching,
    and merging, seeking to leverage familiar Git workflows for source control and
    deployment automation
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精通高级 Git 概念，如拉取请求、分支和合并，并希望利用熟悉的 Git 工作流程进行源代码控制和部署自动化的制作人
- en: Note
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Configuring and implementing the ALM Accelerator requires administrator-level
    expertise in Power Platform environments, solutions, and Azure Pipelines. Additionally,
    familiarity with Microsoft Power Platform and Dataverse administration is essential.
    Refer to [https://learn.microsoft.com/en-us/power-platform/guidance/alm-accelerator/overview](https://learn.microsoft.com/en-us/power-platform/guidance/alm-accelerator/overview).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 配置和实施 ALM 加速器需要管理员级别的 Power Platform 环境、解决方案和 Azure Pipelines 的专业知识。此外，熟悉 Microsoft
    Power Platform 和 Dataverse 管理也是必不可少的。请参阅[https://learn.microsoft.com/en-us/power-platform/guidance/alm-accelerator/overview](https://learn.microsoft.com/en-us/power-platform/guidance/alm-accelerator/overview)。
- en: The following diagram illustrates how the ALM Accelerator facilitates collaboration
    between maker teams and various environments, including development, validation,
    testing, and production.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了 ALM 加速器如何促进制作团队与各种环境之间的协作，包括开发、验证、测试和生产。
- en: '![Figure 9.8 – ALM Accelerator for Power Platform](img/B21080_09_8.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.8 – Power Platform 的 ALM 加速器](img/B21080_09_8.jpg)'
- en: Figure 9.8 – ALM Accelerator for Power Platform
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.8 – Power Platform 的 ALM 加速器
- en: The ALM Accelerator for Power Platform streamlines ALM by automating and enhancing
    processes such as version control, CI, and deployment. When used in conjunction
    with the Creator Kit, which offers pre-built components and templates, the ALM
    Accelerator enables developers to build high-quality apps more quickly and reliably.
    In the following section, we will explore the components available within the
    Creator Kit.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 的 ALM 加速器通过自动化和增强版本控制、CI 和部署等流程来简化 ALM。当与提供预构建组件和模板的创建工具包结合使用时，ALM
    加速器使开发者能够更快、更可靠地构建高质量的应用程序。在下一节中，我们将探讨创建工具包中可用的组件。
- en: Creator Kit
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建工具包
- en: The Creator Kit represents an invaluable resource in crafting Power Apps experiences
    tailored for both web and mobile platforms, leveraging an array of convenient
    components essential in contemporary software design. Within this kit lies a rich
    repository encompassing a diverse component library, comprising numerous widely-used
    Power Apps component framework controls meticulously curated to streamline development
    processes. Additionally, developers benefit from a selection of pre-designed templates
    and supplementary utilities meticulously crafted to enhance productivity and efficiency.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 创建工具包是制作 Power Apps 体验的宝贵资源，这些体验针对 Web 和移动平台，利用了一系列在当代软件设计中必不可少的便捷组件。在这个工具包中，有一个丰富的组件库，包括众多广泛使用的
    Power Apps 组件框架控件，这些控件经过精心挑选，旨在简化开发流程。此外，开发者还可以从精心设计的模板和辅助工具中选择，这些工具旨在提高生产力和效率。
- en: Integral to the Creator Kit’s offerings is the adoption of the Fluent UI framework,
    ensuring a seamless integration of controls and components. This framework plays
    a pivotal role in facilitating the creation of user experiences characterized
    by consistency, aesthetic appeal, and functionality across various devices and
    platforms. By harnessing the capabilities of the Fluent UI framework, developers
    can effortlessly craft captivating, intuitive, and effective interfaces for custom
    business applications, aligning seamlessly with modern design principles and user
    expectations.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 创建工具包提供的服务中，重要的是采用了 Fluent UI 框架，确保了控件和组件的无缝集成。这个框架在促进创建具有一致性、美观和功能性的用户体验方面发挥着关键作用，这些体验在各种设备和平台上保持一致。通过利用
    Fluent UI 框架的能力，开发者可以轻松地制作出吸引人、直观和有效的界面，这些界面与现代设计原则和用户期望无缝对接。
- en: Implementing the Creator Kit
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实施创建工具包
- en: Before integrating the components provided by the Creator Kit into your applications,
    it is advisable to utilize the reference app to familiarize yourself with the
    behavior and implementation patterns of these components. Through the reference
    app, you will gain insights into the nuances of component usage and learn effective
    methods for incorporating them into your applications.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在将 Creator Kit 提供的组件集成到您的应用之前，建议您使用参考应用熟悉这些组件的行为和实现模式。通过参考应用，您将深入了解组件使用的细微差别，并学习有效的方法将它们集成到您的应用中。
- en: 'The Creator Kit comprises a comprehensive set of assets, meticulously organized
    and distributed across three distinct solutions. These solutions encapsulate a
    diverse range of components, controls, templates, and utilities aimed at enhancing
    developer productivity and facilitating the creation of compelling user experiences.
    The kit includes the following solutions:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: Creator Kit 包含一套全面的资产，精心组织并分布在三个不同的解决方案中。这些解决方案包含各种组件、控件、模板和实用工具，旨在提高开发者的生产力和促进引人入胜的用户体验的创建。套件包括以下解决方案：
- en: '| **Solution Name** | **Contents** |'
  id: totrans-140
  prefs: []
  type: TYPE_TB
  zh: '| **解决方案名称** | **内容** |'
- en: '| `CreatorKitCore` | 24 Power Apps component framework and canvas components
    |'
  id: totrans-141
  prefs: []
  type: TYPE_TB
  zh: '| `CreatorKitCore` | 24 个 Power Apps 组件框架和画布组件 |'
- en: '| `CreatorKitReference` (Model Driven apps) | A reference app (Model Driven
    with custom pages) to interactively learn withA canvas page template |'
  id: totrans-142
  prefs: []
  type: TYPE_TB
  zh: '| `CreatorKitReference` (模型驱动应用) | 一个允许用户交互式学习的参考应用（模型驱动，带有自定义页面）**画布页面模板**
    |'
- en: '| `CreatorKitReference` (Canvas) | **Interactive learning app**: A reference
    app (Canvas) that allows users to learn interactively without needing a standalone
    Power Apps license**Canvas template app**: A pre-built template app to streamline
    the creation of new applications**Theme editor**: A tool that generates Theme
    JSON, enabling easy and consistent styling of components |'
  id: totrans-143
  prefs: []
  type: TYPE_TB
  zh: '| `CreatorKitReference` (画布) | **交互式学习应用**：一个允许用户无需独立 Power Apps 许可证即可交互式学习的参考应用（画布）**画布模板应用**：一个预构建的模板应用，用于简化新应用的创建**主题编辑器**：一个生成
    Theme JSON 的工具，使组件的样式化既简单又一致 |'
- en: Table 9.1 – Creator Kit component details
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9.1 – Creator Kit 组件详细信息
- en: Reference App
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 参考应用
- en: Once the Creator Kit is installed, you will have access to a sample app called
    **Reference App**. Utilize this application to gain insights into each component’s
    functionality, receive recommended best practices for achieving an optimal user
    experience, interact with the components firsthand, and delve into the implementation
    code that drives their behavior. We highly advise exploring the components within
    the reference application before integrating them into your live applications.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装了 Creator Kit，您将能够访问一个名为 **参考应用** 的示例应用。利用此应用深入了解每个组件的功能，获取实现最佳用户体验的推荐最佳实践，亲自与组件交互，并深入研究驱动它们行为的实现代码。我们强烈建议在将这些组件集成到您的实际应用之前，先在参考应用中探索这些组件。
- en: Observe how each component behaves and renders data, and access the **Code**
    tab to examine the underlying Power Fx formulas responsible for their functionality.
    Additionally, you can benefit from the inline guidance provided within the application,
    offering valuable insights into best practices associated with each control.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 观察每个组件的行为和渲染数据，并访问 **代码** 选项卡来检查负责其功能的底层 Power Fx 公式。此外，您还可以从应用内提供的内联指导中受益，这些指导提供了与每个控件相关的最佳实践的有价值见解。
- en: "![Figure 9.9 – Reference App\uFEFF\uFEFF\uFEFF\uFEFF\uFEFF\uFEFF\uFEFF\uFEFF\
    \uFEFF](img/B21080_09_9.jpg)"
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.9 – 参考应用](img/B21080_09_9.jpg)'
- en: Figure 9.9 – Reference App
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.9 – 参考应用
- en: Templates
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模板
- en: The templates are crafted to assist you in swiftly initiating the creation of
    responsive apps using Fluent UI. They come preloaded with custom components and
    are linked to a Theme JSON variable, simplifying the development startup process.
    These templates are essential for streamlining the development of Canvas apps
    and custom pages.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模板旨在帮助您快速启动使用 Fluent UI 创建响应式应用。它们预装了自定义组件，并链接到 Theme JSON 变量，简化了开发启动过程。这些模板对于简化
    Canvas 应用和自定义页面的开发至关重要。
- en: Fluent Theme Designer app
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Fluent 主题设计器应用
- en: 'Theming is a mechanism by which a consistent look and feel can be applied to
    all the components on a page. For now, this means sharing a color scheme across
    the entire page. The Fluent Theme Designer app brings significant enhancements
    that cater to Power Platform makers, users, and administrators:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 主题化是一种机制，可以通过它将一致的外观和感觉应用于页面上的所有组件。目前，这意味着在整个页面上共享一套颜色方案。Fluent 主题设计器应用程序为 Power
    Platform 制作者、用户和管理员带来了重大改进：
- en: '**Makers** can now channel their efforts toward building the core features
    of an application, thanks to the cohesive Fluent UI design. This design coherence
    simplifies the process of creating custom pages, making them appear more consistent
    and akin to Model-Driven apps. With the assistance of the kit, even those without
    advanced frontend skills or access to design resources can craft stunning apps
    with contemporary designs effortlessly.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制作者**现在可以凭借一致性的 Fluent UI 设计将精力集中在构建应用程序的核心功能上。这种设计一致性简化了创建自定义页面的过程，使它们看起来更加一致，类似于模型驱动应用程序。借助套件的帮助，即使没有高级前端技能或无法访问设计资源的用户也可以轻松制作出具有现代设计的精美应用程序。'
- en: '**Users** will benefit from interacting with a unified set of components that
    are intuitive and familiar, as they are consistent with those found in all modern
    Microsoft applications. Notably, these components deliver a performance boost,
    contributing to a smoother user experience that enhances productivity during app
    usage.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户**将受益于与一组直观且熟悉的组件进行交互，因为这些组件与所有现代 Microsoft 应用程序中找到的组件一致。值得注意的是，这些组件提供了性能提升，有助于在应用程序使用过程中提供更流畅的用户体验，从而提高生产力。'
- en: '**Administrators** responsible for ensuring UI consistency across their organization
    will find value in the modern theming architecture inherent in Fluent UI’s components.
    These components, developed and supported by dedicated engineering teams at Microsoft,
    offer a reliable solution for maintaining UI consistency. As a result, companies
    can confidently deploy apps featuring Creator Kit components into production environments.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 负责确保其组织 UI 一致性的**管理员**会发现 Fluent UI 组件中固有的现代主题架构很有价值。这些组件由 Microsoft 专门的工程团队开发和支持，为维护
    UI 一致性提供了一种可靠的解决方案。因此，公司可以放心地将具有 Creator Kit 组件的应用程序部署到生产环境中。
- en: '![Figure 9.10 – Fluent Theme Designer app](img/B21080_09_10.jpg)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.10 – Fluent 主题设计器应用](img/B21080_09_10.jpg)'
- en: Figure 9.10 – Fluent Theme Designer app
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.10 – Fluent 主题设计器应用
- en: The Fluent Theme Designer app in the Creator Kit enables developers to easily
    customize and apply consistent themes to Power Platform applications. It streamlines
    the process of adjusting colors, fonts, and other visual elements, ensuring a
    cohesive and professional look that aligns with organizational branding.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: Creator Kit 中的 Fluent 主题设计器应用程序使开发者能够轻松自定义并应用一致的主题到 Power Platform 应用程序中。它简化了调整颜色、字体和其他视觉元素的过程，确保了统一且专业的外观，与组织品牌保持一致。
- en: A practical example of POC selection and development using Power Platform
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Power Platform 进行 POC 选择和开发的实际示例
- en: 'An online retailer wants to use Power Platform to improve its customer service
    operations, which face several challenges, such as lack of unified customer view,
    high manual effort, long wait times, inconsistent service quality, and low customer
    satisfaction. The retailer identifies four potential POC candidates:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 一家在线零售商希望使用 Power Platform 来改善其客户服务运营，该运营面临一些挑战，例如缺乏统一的客户视图、高人工成本、漫长的等待时间、服务质量不一致以及客户满意度低。零售商确定了四个潜在的
    POC 候选人：
- en: A Power Apps solution for a single interface to access and update customer data
    and order details
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于访问和更新客户数据以及订单详情的单个界面的 Power Apps 解决方案
- en: A Power Automate solution for automating customer service workflows and tasks
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于自动化客户服务工作流和任务的 Power Automate 解决方案
- en: A Power BI solution for analyzing and visualizing customer service data and
    metrics
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于分析和可视化客户服务数据和指标的 Power BI 解决方案
- en: A custom Copilots (formerly known as Power Virtual Agents) solution for creating
    a chatbot for common customer questions and self-service
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为创建用于常见客户问题和自助服务的聊天机器人而设计的定制 Copilots（之前称为 Power Virtual Agents）解决方案
- en: 'The retailer evaluates each POC candidate based on impact and feasibility criteria.
    The following table shows the evaluation results:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 零售商根据影响和可行性标准评估每个 POC 候选人。以下表格显示了评估结果：
- en: '| **POC** **Candidate** | **Impact** **on Efficiency** | **Impact** **on Productivity**
    | **Impact on** **Cost Savings** | **Impact on Customer** **Satisfaction** | **Feasibility
    within** **Infrastructure** |'
  id: totrans-167
  prefs: []
  type: TYPE_TB
  zh: '| **POC** **候选人** | **对效率的影响** | **对生产率的影响** | **对成本节约的影响** | **对客户满意度的影响**
    | **在基础设施中的可行性** |'
- en: '| Power Apps | High: Streamlines processes and reduces manual effort | High:
    Increases output and quality of service | Medium: Reduces operational expenses
    and errors | High: Improves responsiveness and accuracy of service | High: Integrates
    easily with existing systems and data sources |'
  id: totrans-168
  prefs: []
  type: TYPE_TB
  zh: '| Power Apps | 高：简化流程并减少人工努力 | 高：提高输出和服务质量 | 中：降低运营成本和错误 | 高：提高服务的响应性和准确性 |
    高：易于与现有系统和数据源集成 |'
- en: '| Power Automate | High: Eliminates bottlenecks and optimizes resource utilization
    | High: Empowers agents to focus on value-added activities | High: Achieves significant
    cost savings in labor, time, and materials | Medium: Enhances service speed and
    consistency | High: Integrates easily with existing systems and workflows |'
  id: totrans-169
  prefs: []
  type: TYPE_TB
  zh: '| Power Automate | 高：消除瓶颈并优化资源利用 | 高：使代理能够专注于增值活动 | 高：在劳动力、时间和材料方面实现显著的成本节约
    | 中：提高服务速度和一致性 | 高：易于与现有系统和工作流程集成 |'
- en: '| Power BI | Medium: Provides insights and recommendations for efficiency improvement
    | Medium: Enables data-driven decision-making and performance management | Low:
    Requires minimal investment and maintenance costs | Low: Indirectly affects customer
    satisfaction through improved service quality | Medium: Integrates with existing
    data sources but requires data preparation and transformation |'
  id: totrans-170
  prefs: []
  type: TYPE_TB
  zh: '| Power BI | 中：提供效率改进的见解和建议 | 中：实现数据驱动的决策和绩效管理 | 低：投资和维护成本最低 | 低：通过提高服务质量间接影响客户满意度
    | 中：与现有数据源集成，但需要数据准备和转换 |'
- en: '| Custom Copilot | Low: Requires human intervention for complex issues | Low:
    Reduces workload for simple inquiries but increases complexity for escalated issues
    | Medium: Reduces labor costs for basic inquiries but increases development and
    maintenance costs for chatbot | Medium: Improves self-service options and availability
    but may reduce personalization and empathy | Low: Requires integration with existing
    systems and data sources as well as security and compliance considerations |'
  id: totrans-171
  prefs: []
  type: TYPE_TB
  zh: '| Custom Copilot | 低：需要人工干预解决复杂问题 | 低：减少简单查询的工作量但增加升级问题的复杂性 | 中：减少基本查询的劳动力成本，但增加聊天机器人的开发和维护成本
    | 中：提高自助选项和可用性，但可能减少个性化和同理心 | 低：需要与现有系统和数据源集成，以及考虑安全和合规性 |'
- en: Table 9.2 – POC candidate evaluation cheat sheet
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9.2 – POC 候选人评估速查表
- en: Based on the evaluation results, the organization decides to prioritize the
    Power Apps and Power Automate solutions as the most promising POC candidates,
    as they have the highest potential impact on organizational efficiency, productivity,
    cost savings, and customer satisfaction, as well as high feasibility within existing
    infrastructure. The organization then proceeds to plan and execute the POCs for
    these two solutions, involving end users and stakeholders throughout the process
    to ensure alignment, relevance, and buy-in.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 根据评估结果，组织决定将 Power Apps 和 Power Automate 解决方案作为最有希望的 POC 候选人进行优先考虑，因为它们对组织效率、生产率、成本节约和客户满意度具有最高潜力的影响，同时在现有基础设施中具有高度的可行性。然后，组织继续规划和执行这两个解决方案的
    POC，在整个过程中涉及最终用户和利益相关者，以确保一致性、相关性和承诺。
- en: Summary
  id: totrans-174
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In conclusion, this chapter has explored essential strategies for streamlining
    operations and accelerating solution development using Power Platform. We began
    by discussing the importance of identifying suitable POC candidates, emphasizing
    the need to select initiatives that align with organizational goals and demonstrate
    potential for tangible benefits. Next, we delved into the process of analyzing
    operational processes to identify areas ripe for automation, highlighting the
    significance of optimizing efficiency and productivity through targeted automation
    efforts.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，本章探讨了使用 Power Platform 简化操作和加速解决方案开发的必要策略。我们首先讨论了确定合适的 POC 候选人的重要性，强调选择与组织目标一致并展示潜在实际效益的项目的必要性。接下来，我们深入分析了分析运营流程以确定自动化成熟区域的过程，强调了通过有针对性的自动化努力优化效率和生产力的重要性。
- en: You can leverage the insights gained from POC selection and operational process
    analysis to effectively utilize the Creator Kit, including the reference app and
    Fluent Theme Designer app, for creating POCs and MVPs.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以利用从POC选择和运营流程分析中获得的认识，有效地利用创作者工具包，包括参考应用和Fluent主题设计师应用，来创建POCs和MVPs。
- en: '**POC selection**: Utilize the criteria established during POC selection to
    identify specific areas within operational processes that can benefit from automation
    or enhancement. Focus on processes with high potential for improvement or those
    aligned with strategic objectives.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**POC选择**：利用POC选择期间建立的准则来识别运营流程中可以受益于自动化或增强的特定区域。关注具有高改进潜力或与战略目标一致的流程。'
- en: '**Operational process analysis**: Conduct a thorough analysis of identified
    processes to understand their intricacies, pain points, and potential areas for
    optimization. Use this analysis to prioritize which processes are most suitable
    for POC development and MVP creation.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营流程分析**：对已识别的流程进行全面分析，以了解其复杂性、痛点以及潜在的优化区域。利用这次分析来优先考虑哪些流程最适合POC开发和MVP创建。'
- en: '**Utilizing Creator Kit features**: Leverage the reference app within the Creator
    Kit to explore and experiment with various components and design patterns. This
    hands-on experience will enable users to visualize how these components can be
    integrated into their applications to address specific process challenges.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用创作者工具包功能**：利用创作者工具包内的参考应用来探索和实验各种组件和设计模式。这种动手经验将使用户能够可视化这些组件如何集成到他们的应用程序中，以解决特定的流程挑战。'
- en: '**Fluent Theme Designer app**: Utilize the Fluent Theme Designer app to create
    cohesive and visually appealing themes for POCs and MVPs. By customizing the color
    schemes and visual elements, users can enhance the user experience and ensure
    consistency across their applications.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Fluent主题设计师应用**：利用Fluent主题设计师应用为POCs和MVPs创建统一且视觉上吸引人的主题。通过自定义颜色方案和视觉元素，用户可以增强用户体验并确保其应用程序的一致性。'
- en: '**Creating POCs and MVPs**: With insights from POC selection and operational
    process analysis, use the Creator Kit’s resources to develop POCs and MVPs that
    address identified process challenges or automation opportunities. Iterate on
    these prototypes based on feedback and testing results to refine and validate
    their effectiveness.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建POCs和MVPs**：通过POC选择和运营流程分析的见解，利用创作者工具包的资源来开发解决已识别流程挑战或自动化机会的POCs和MVPs。根据反馈和测试结果对这些原型进行迭代，以完善和验证其有效性。'
- en: By integrating POC selection, operational process analysis, and utilization
    of Creator Kit features, you can effectively leverage Power Platform to create
    impactful POCs and MVPs that drive innovation and operational excellence within
    your organization.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 通过整合POC选择、运营流程分析和创作者工具包功能的利用，您可以有效地利用Power Platform来创建有影响力的POCs和MVPs，从而推动组织内的创新和运营卓越。
- en: In the next chapter, you will learn how to establish a solid security framework
    to protect your data and applications. You will discover strategies to promote
    a security-first mindset throughout your organization. Additionally, you will
    understand the importance of ongoing monitoring and risk management to safeguard
    your operations and explore methods to continually improve and innovate while
    maintaining security and compliance.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，您将学习如何建立一个稳固的安全框架来保护您的数据和应用程序。您将发现如何在整个组织中推广以安全为首要考虑的心态。此外，您将了解持续监控和风险管理对于保护您的运营的重要性，并探索在保持安全和合规的同时不断改进和创新的方法。
