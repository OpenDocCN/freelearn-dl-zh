  - PREF_UL
  type: TYPE_NORMAL
  zh: '**tavily_tool**：LangChain中可用的预构建工具，专门设计用于从Tavily API检索搜索结果'
- en: '**Definition**'
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**定义**'
- en: Tavily is an AI-powered search API designed to enhance **retrieval-augmented
    generation** (**RAG**) and agent-based applications by providing real-time, high-quality
    web search results. It enables developers to integrate external knowledge into
    LLM workflows through simple, fast, and cost-effective API calls. Tavily is often
    used to improve the accuracy and relevance of AI-generated responses by grounding
    them in up-to-date web content.
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: Tavily是一个由人工智能驱动的搜索API，旨在通过提供实时、高质量的网页搜索结果来增强**检索增强生成**（**RAG**）和基于代理的应用程序。它允许开发者通过简单、快速且成本效益高的API调用将外部知识集成到LLM工作流程中。Tavily通常用于通过将它们基于最新的网络内容来提高AI生成响应的准确性和相关性。
