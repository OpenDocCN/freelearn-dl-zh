- en: Summary
  id: totrans-209
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we moved beyond the world of single, tool-augmented agents
    and explored the exciting landscape of multi-agent systems. We saw how agents
    can collaborate much like human teams, each specializing in their own tasks yet
    working together to solve problems that would be too complex for any one agent
    alone.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们超越了单个、工具增强代理的世界，探索了多代理系统的激动人心的领域。我们看到了代理如何像人类团队一样协作，每个代理都专注于自己的任务，但共同工作以解决单个代理单独难以解决的问题。
- en: We also established that designing multi-agent systems is as much an architectural
    challenge as it is an AI challenge, requiring careful thought around modularity,
    communication, coordination, and reliability. Drawing parallels with microservices
    architecture, we recognized that agents can (and should) be modular, independent,
    and orchestrated intelligently to form scalable, resilient systems.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还确定，设计多代理系统既是架构挑战，也是人工智能挑战，需要仔细考虑模块化、通信、协调和可靠性。与微服务架构进行类比，我们认识到代理可以（并且应该）是模块化的、独立的，并且可以智能地编排以形成可扩展、健壮的系统。
- en: We introduced multi-agent orchestrators such as AutoGen, TaskWeaver, and LangGraph,
    and, with the latter, experimented with a hands-on demonstration building our
    first multi-agent application.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了多代理编排器，如AutoGen、TaskWeaver和LangGraph，并使用后者进行了实际演示，构建了我们的第一个多代理应用程序。
- en: This chapter also concludes *Part 2* of the book. In the next chapter, we will
    shift gears and explore a critical topic—building responsible AI systems. As we
    create increasingly autonomous agents and multi-agent ecosystems, it becomes essential
    to design for safety, transparency, security, and ethical alignment.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还总结了本书的**第二部分**。在下一章中，我们将转换方向，探讨一个关键主题——构建负责任的AI系统。随着我们创建越来越自主的代理和多智能体生态系统，设计安全性、透明度、安全性和道德一致性变得至关重要。
