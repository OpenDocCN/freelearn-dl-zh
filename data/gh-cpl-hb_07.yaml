- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: 'Going Beyond Code: Debugging, Terminal, and Collaboration with GitHub Copilot'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超越代码：使用GitHub Copilot进行调试、终端和协作
- en: GitHub Copilot has grown far beyond a simple code completion tool. Modern development
    workflows need more than snippets and suggestions; they need context-aware assistance
    built into every part of the IDE. Whether you are scripting infrastructure, reviewing
    code changes, or tracking down a bug, these integrations help you move from idea
    to implementation with less friction.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot已经远远超出了简单的代码补全工具。现代开发工作流程需要比代码片段和建议更多的东西；它们需要集成到IDE每个部分的上下文感知辅助。无论你是编写基础设施脚本、审查代码更改，还是追踪错误，这些集成都能帮助你以更少的摩擦从想法到实现。
- en: This chapter looks at the IDE features that make that possible. You will see
    how Copilot works in the terminal and Command Palette, extends its reach through
    the command line, and provides help during debugging. We will also explore how
    it can summarize local changes, draft manual pull request notes, and assist with
    other small but important tasks that keep projects moving.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '本章将探讨使这一切成为可能的IDE功能。你将看到Copilot如何在终端和命令面板中工作，如何通过命令行扩展其范围，并在调试期间提供帮助。我们还将探索它如何总结本地更改、起草手动拉取请求注释，并协助其他保持项目进展的小但重要的任务。 '
- en: If you have ever wanted to get help with a tricky shell command, receive suggestions
    while reviewing a diff, generate a summary of staged changes without leaving the
    IDE, or analyze and fix errors as you debug, then the sections ahead will be useful.
    The examples go beyond completions and show how Copilot integrates into the everyday
    flow of coding, scripting, and testing across different languages and stacks.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经想要得到关于复杂shell命令的帮助，在审查差异时接收建议，在不离开IDE的情况下生成已提交更改的摘要，或者在调试时分析和修复错误，那么接下来的部分将很有用。这些示例不仅限于补全，还展示了Copilot如何整合到跨不同语言和堆栈的日常编码、脚本编写和测试流程中。
- en: Finally, while this chapter focuses on IDE workflows, some features only exist
    on GitHub.com, such as automated pull request summaries and web-based review tools.
    You will see more about those in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor191)
    .
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，虽然本章重点介绍IDE工作流程，但一些功能仅存在于GitHub.com上，例如自动拉取请求摘要和基于Web的审查工具。你将在[*第6章*](Chapter_6.xhtml#_idTextAnchor191)中了解更多关于这些内容。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Terminal and Command Palette integration
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 终端和命令面板集成
- en: GitHub Copilot CLI features
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub Copilot CLI功能
- en: Debugging support
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调试支持
- en: Other IDE-integrated tools
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他IDE集成工具
- en: Real-world workflow scenarios
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现实世界的工作流程场景
- en: Terminal and Command Palette integration
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 终端和命令面板集成
- en: As modern development moves beyond just editing files, the terminal becomes
    a central part of the workflow. Whether you’re running build scripts, launching
    tests, or managing cloud resources, the terminal is often where real work happens.
    GitHub Copilot brings AI-powered assistance into this space, making it available
    in both the terminal window and your IDE’s Command Palette.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 随着现代开发超越仅编辑文件，终端成为工作流程的核心部分。无论你是在运行构建脚本、启动测试，还是管理云资源，终端往往是真正工作的发生地。GitHub Copilot将AI辅助引入这个空间，使其在终端窗口和IDE的命令面板中均可用。
- en: Using the terminal
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用终端
- en: 'In supported IDEs such as Visual Studio Code, GitHub Copilot offers direct
    integration within the built-in terminal. This means you can do the following:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在支持IDEs如Visual Studio Code中，GitHub Copilot在内置终端中提供直接集成。这意味着你可以做以下事情：
- en: Ask for help crafting shell commands or PowerShell scripts
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 求助编写shell命令或PowerShell脚本
- en: Get explanations for cryptic commands or errors
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取难以理解的命令或错误的解释
- en: Generate one-off scripts to automate routine tasks
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成一次性脚本来自动化常规任务
- en: Quickly fix typos or suggest alternatives on the fly
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速修复拼写错误或即时建议替代方案
- en: You don’t have to leave your flow to look up flags, syntax, or best practices;
    just use GitHub Copilot to boost your productivity right in the terminal.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必离开你的流程去查找标志、语法或最佳实践；只需使用GitHub Copilot在终端中提高你的生产力。
- en: 'For example, suppose you need to find all `.log` files larger than 50 MB and
    archive them. You can open GitHub Copilot Chat (or use the Command Palette) and
    type the following:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你需要找到所有大于50 MB的`.log`文件并将它们存档。你可以打开GitHub Copilot Chat（或使用命令面板）并输入以下内容：
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Copilot would then suggest something like the following:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，Copilot会建议以下内容：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'You can then copy, adjust, or run the command directly. The button shown in
    *Figure 5.1* lets you insert the generated command straight into your terminal
    with a single click:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以复制、调整或直接运行该命令。如图 5.1 所示的按钮让你只需单击一下即可将生成的命令直接插入到你的终端中：
- en: '![Figure 5.1: The VS Code terminal, showing a prompt and a generated command
    showing Insert into Terminal](img/B34107_05_01.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.1：VS Code 终端，显示了一个提示和一个显示“插入到终端”的生成命令](img/B34107_05_01.png)'
- en: 'Figure 5.1: The VS Code terminal, showing a prompt and a generated command
    showing Insert into Terminal'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.1：VS Code 终端，显示了一个提示和一个显示“插入到终端”的生成命令
- en: Using the Command Palette
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用命令面板
- en: The Command Palette is another way GitHub Copilot surfaces its capabilities
    inside the IDE. This integration is specific to **Visual Studio Code** ( **VS
    Code** ). Other IDEs, such as Visual Studio or JetBrains products, don’t expose
    Copilot through a Command Palette in the same way.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 命令面板是 GitHub Copilot 在 IDE 内部展示其功能的另一种方式。这种集成仅限于 **Visual Studio Code** ( **VS
    Code** )。其他 IDE，如 Visual Studio 或 JetBrains 产品，不会以相同的方式通过命令面板暴露 Copilot。
- en: 'Using the Command Palette, you can do the following:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 使用命令面板，你可以执行以下操作：
- en: Trigger GitHub Copilot to generate, explain, or refactor commands and scripts
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 触发 GitHub Copilot 生成、解释或重构命令和脚本
- en: Use keyboard shortcuts to launch Copilot Chat or code actions while in the terminal
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在终端中时，使用键盘快捷键启动 Copilot Chat 或代码操作
- en: 'Search for Copilot-specific commands (such as **Copilot: Explain Last Terminal
    Command** or **Copilot: Generate Script** ) directly from the palette'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接从面板中搜索 Copilot 特定的命令（例如 **Copilot：解释最后一个终端命令** 或 **Copilot：生成脚本**）
- en: Using the Command Palette in this way is great for jumping between editing code
    and running commands, all without breaking your workflow.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式使用命令面板对于在编辑代码和运行命令之间切换非常有用，而且不会打断你的工作流程。
- en: 'Taking an example, imagine you’ve just run a complex PowerShell command in
    the terminal and aren’t sure what it does. Instead of searching online, highlight
    the command, open the Command Palette, and select **GitHub Copilot: Explain Terminal
    Selection** . The explanation appears in plain language, describing what the command
    is doing—in this case, finding all `.log` files larger than 50 MB and compressing
    them into a `.tar.gz` archive.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个例子为例，假设你刚刚在终端中运行了一个复杂的 PowerShell 命令，不确定它做什么。与其在网上搜索，不如突出显示该命令，打开命令面板，并选择
    **GitHub Copilot：解释终端选择**。解释将以普通语言出现，描述该命令正在做什么——在这种情况下，查找所有大于 50 MB 的 `.log`
    文件并将它们压缩到 `.tar.gz` 归档中。
- en: '![Figure 5.2: Command Palette open in VS Code, explaining PowerShell](img/B34107_05_02.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.2：在 VS Code 中打开的命令面板，解释 PowerShell](img/B34107_05_02.png)'
- en: 'Figure 5.2: Command Palette open in VS Code, explaining PowerShell'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.2：在 VS Code 中打开的命令面板，解释 PowerShell
- en: Best practices
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To get the most reliable results when working with commands or scripts, keep
    these best practices in mind:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当与命令或脚本一起工作时，为了获得最可靠的结果，请记住以下最佳实践：
- en: '**Keep prompts specific** : The clearer your terminal or Command Palette prompt,
    the better Copilot’s suggestions. If you want a one-liner, mention it; if you
    want a script, say so.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保持提示具体**：你的终端或命令面板提示越清晰，Copilot 的建议就越好。如果你想一行命令，就提出来；如果你想一个脚本，就说明。'
- en: '**Use inline explanations** : When using a command you don’t fully understand,
    let GitHub Copilot explain it before you run it, especially when dealing with
    file deletions or administrative actions.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用内联解释**：当你使用一个你不完全理解的命令时，在运行它之前让 GitHub Copilot 解释它，尤其是在处理文件删除或管理操作时。'
- en: '**Chain commands safely** : GitHub Copilot can help chain multiple commands
    (e.g., in Bash or PowerShell), but always review suggestions before executing
    anything with broad impact.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全地链式命令**：GitHub Copilot 可以帮助链式多个命令（例如，在 Bash 或 PowerShell 中），但在执行任何具有广泛影响的操作之前，始终要审查建议。'
- en: Common pitfalls to avoid
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'While these integrations can save time, there are also a few traps that developers
    should watch for. Keep these common pitfalls in mind to avoid problems down the
    line:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些集成可以节省时间，但开发者也应该注意一些陷阱。记住这些常见的陷阱，以避免未来出现问题：
- en: '**Trusting suggestions without review** : Always check proposed commands, especially
    those that delete files or change system state.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未经审查就信任建议**：始终检查提出的命令，特别是那些删除文件或更改系统状态的命令。'
- en: '**Ambiguous prompts leading to weak suggestions** : Vague requests (such as
    `clean up logs` ) might miss important details. Be clear about directories, file
    types, or date ranges.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模糊的提示导致弱建议**：模糊的请求（如 `清理日志`）可能会错过重要细节。请明确目录、文件类型或日期范围。'
- en: '**Overreliance for sensitive scripts** : Don’t rely solely on GitHub Copilot
    for production scripts or commands involving sensitive data. Always add an extra
    review step.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对敏感脚本的过度依赖**：不要仅依赖 GitHub Copilot 来生成生产脚本或涉及敏感数据的命令。始终添加额外的审查步骤。'
- en: The terminal and Command Palette bring AI assistance directly into your day-to-day
    shell and script work inside the IDE. They are best for quick commands, explanations,
    and edits that stay within the editor environment. Sometimes, however, you need
    the same support outside the IDE in standalone scripts, pipelines, or broader
    automation. This is where GitHub Copilot CLI comes in, extending these capabilities
    to any terminal session and making them available for integration into your CI/CD
    workflows.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 终端和命令面板将 AI 辅助直接带入你的日常 shell 和 IDE 内部的脚本工作。它们最适合快速命令、解释和编辑，这些操作都保持在编辑器环境中。然而，有时你需要在
    IDE 外部使用相同的支持，例如在独立脚本、管道或更广泛的自动化中。这就是 GitHub Copilot CLI 发挥作用的地方，它将这些功能扩展到任何终端会话，并使它们可用于集成到你的
    CI/CD 工作流程中。
- en: GitHub Copilot CLI features
  id: totrans-49
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GitHub Copilot CLI 功能
- en: Most developers start with GitHub Copilot in an IDE, but you can also work with
    it directly from the terminal. GitHub Copilot CLI brings the coding agent into
    your shell so you can generate scripts, explain commands, refactor files, and
    reason about your repo without leaving the command line. This fits naturally into
    day-to-day automation and operations work.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数开发者都是从 IDE 中的 GitHub Copilot 开始的，但你也可以直接从终端使用它。GitHub Copilot CLI 将编码代理带入你的
    shell，这样你就可以生成脚本、解释命令、重构文件，并在不离开命令行的情况下对你的仓库进行推理。这自然地融入了日常的自动化和操作工作。
- en: What is GitHub Copilot CLI?
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 GitHub Copilot CLI？
- en: 'GitHub Copilot CLI opens an interactive session with the coding agent inside
    your terminal. From that session, you can do the following:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot CLI 在你的终端中与编码代理打开一个交互式会话。从这个会话开始，你可以做以下操作：
- en: Generate shell commands and complete scripts from natural language
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从自然语言生成 shell 命令和完整的脚本
- en: Explain or summarize commands, diffs, and snippets
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释或总结命令、差异和代码片段
- en: Propose edits or refactors to files in your working directory (you approve before
    anything runs)
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对你工作目录中的文件提出编辑或重构建议（在运行之前你需要批准）
- en: Ask about your GitHub work, such as open pull requests or assigned issues, when
    authenticated
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当认证后，询问你的 GitHub 工作，例如打开的拉取请求或分配的问题
- en: Setting up the GitHub Copilot CLI extension
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置 GitHub Copilot CLI 扩展
- en: 'To get started, make sure you have the following:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用，请确保你有以下内容：
- en: An active GitHub Copilot subscription
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激活的 GitHub Copilot 订阅
- en: A supported environment (macOS, Windows, or Linux) with Git installed
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持的环境（macOS、Windows 或 Linux）已安装 Git
- en: Node.js 22+, npm 10+
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Node.js 22+，npm 10+
- en: 'Then, follow these steps:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，按照以下步骤操作：
- en: 'First, enter this command to install the CLI globally :'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，输入以下命令以全局安装 CLI：
- en: '[PRE2]'
  id: totrans-64
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Next, launch the CLI:'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，启动 CLI：
- en: '[PRE3]'
  id: totrans-66
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Authenticate using your GitHub account. If you are not logged in, you will
    be prompted to use the in-session slash command:'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用你的 GitHub 账户进行认证。如果你未登录，你将被提示使用会话中的斜杠命令：
- en: '[PRE4]'
  id: totrans-68
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: After that, the CLI prints a short code and opens your browser to [github.com](https://github.com/)
    . In the browser, you’ll see a page asking you to enter the code shown in your
    terminal. Enter it.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 之后，命令行界面会打印一个简短代码并打开你的浏览器到 [github.com](https://github.com/) 。在浏览器中，你会看到一个要求你输入终端显示的代码的页面。输入它。
- en: After that, GitHub shows an **Authorize** screen for GitHub Copilot. Click **Authorize**
    .
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 之后，GitHub 会显示 GitHub Copilot 的 **授权** 页面。点击 **授权**。
- en: Now, return to the terminal. The CLI confirms that you are signed in and the
    session is ready.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，回到终端。命令行界面确认你已经登录并且会话已准备就绪。
- en: '![Figure 5.3: Terminal window open, showing a Copilot CLI prompt](img/B34107_05_03.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.3：终端窗口打开，显示 Copilot CLI 提示](img/B34107_05_03.png)'
- en: 'Figure 5.3: Terminal window open, showing a Copilot CLI prompt'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.3：终端窗口打开，显示 Copilot CLI 提示
- en: 'Alternatively, if you cannot use the browser flow, you can provide a fine-grained
    **personal access token** ( **PAT** ). This is a token you generate on GitHub
    to let tools authenticate as you, without using your password. To create a fine-grained
    PAT with the correct permission, follow these steps:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，如果你无法使用浏览器流程，你可以提供一个精细粒度的**个人访问令牌**（**PAT**）。这是一个你在 GitHub 上生成的令牌，允许工具以你的身份进行认证，而不使用你的密码。要创建具有正确权限的精细粒度
    PAT，请按照以下步骤操作：
- en: Go to [https://github.com/settings/personal-access-tokens/new](https://github.com/settings/personal-access-tokens/new)
    .
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往 [https://github.com/settings/personal-access-tokens/new](https://github.com/settings/personal-access-tokens/new)。
- en: Give the token a name and (optionally) an expiration.
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 给令牌起一个名字，并（可选地）设置一个过期时间。
- en: Under **Permissions** , click **Add permissions** , then select **Copilot Requests**
    .
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **权限** 下，点击 **添加权限**，然后选择 **Copilot Requests**。
- en: The **Copilot Requests** permission lets the CLI send prompts to GitHub Copilot
    and receive responses on your behalf. It does not grant repository, organization,
    or code write access unless you add other permissions. Only this permission is
    required for Copilot CLI in this context.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**Copilot Requests** 权限允许 CLI 向 GitHub Copilot 发送提示并代表你接收响应。除非你添加其他权限，否则它不会授予仓库、组织或代码写入权限。在此上下文中，Copilot
    CLI 仅需要此权限。'
- en: Generate the token and copy it.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成令牌并将其复制。
- en: Provide the token to the CLI and set an environment variable – either `GH_TOKEN`
    or `GITHUB_TOKEN` . We recommend that you set `GH_TOKEN` , as this is what the
    CLI looks for first. If that is not set, the CLI will look for `GITHUB_TOKEN`
    instead.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将令牌提供给 CLI 并设置一个环境变量——可以是 `GH_TOKEN` 或 `GITHUB_TOKEN`。我们建议你设置 `GH_TOKEN`，因为这是
    CLI 首先寻找的。如果没有设置，CLI 将寻找 `GITHUB_TOKEN`。
- en: 'Here are some examples of setting the `GH_TOKEN` environment variable:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些设置 `GH_TOKEN` 环境变量的示例：
- en: '[PRE5]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note that if you set both `GH_TOKEN` and `GITHUB_TOKEN` , `GH_TOKEN` takes precedence.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果你同时设置了 `GH_TOKEN` 和 `GITHUB_TOKEN`，则 `GH_TOKEN` 优先。
- en: Also, note that `GH_TOKEN` and `GITHUB_TOKEN` are environment variables, not
    buttons.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 还要注意，`GH_TOKEN` 和 `GITHUB_TOKEN` 是环境变量，而不是按钮。
- en: Now, launch Copilot.
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，启动 Copilot。
- en: As an optional step, choose a model. By default, the CLI uses Claude Sonnet
    4.5, but to switch models, type `/model` . Then, select from the available options,
    such as Claude Sonnet 4 or GPT-5.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 作为可选步骤，选择一个模型。默认情况下，CLI 使用 Claude Sonnet 4.5，但若要切换模型，请输入 `/model`。然后，从可用选项中选择，例如
    Claude Sonnet 4 或 GPT-5。
- en: 'Finally, verify that everything is working. You can do this by either of the
    following:'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，验证一切是否正常工作。你可以通过以下两种方式之一来完成此操作：
- en: Typing `help`
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入 `help`
- en: 'Asking for something simple, such as `Explain this command: ls -la`'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求一些简单的内容，例如 `解释这个命令：ls -la`
- en: You should see a response that describes the command and flags. If you do not,
    check that you are signed in and that `GH_TOKEN` or `GITHUB_TOKEN` is set correctly.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到一个描述命令和标志的响应。如果没有，请检查你是否已登录，以及 `GH_TOKEN` 或 `GITHUB_TOKEN` 是否设置正确。
- en: For the latest list of what GitHub Copilot CLI can do, including its available
    commands, features, and optional command-line flags (such as `--explain` , `--json`
    , or `--file` , which change how a command runs), visit the official documentation
    at [https://docs.github.com/en/copilot/concepts/agents/about-copilot-cli](https://docs.github.com/en/copilot/concepts/agents/about-copilot-cli)
    .
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看 GitHub Copilot CLI 可以做什么的最新列表，包括其可用命令、功能和可选的命令行标志（例如 `--explain`、`--json`
    或 `--file`，这些标志会改变命令的运行方式），请访问官方文档 [https://docs.github.com/en/copilot/concepts/agents/about-copilot-cli](https://docs.github.com/en/copilot/concepts/agents/about-copilot-cli)。
- en: Real-world examples of Copilot CLI in action
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Copilot CLI 在实际应用中的真实示例
- en: 'GitHub Copilot CLI shines in two everyday situations: it generates the scripts
    you need and explains commands you want to verify. It can also query your GitHub
    work when authenticated.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot CLI 在两种日常场景中表现出色：它生成你需要的脚本，并解释你想要验证的命令。它还可以在认证后查询你的 GitHub 工作内容。
- en: 'Example 1: Automating CSV backup and cleanup'
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：自动化 CSV 备份和清理
- en: 'GitHub Copilot CLI is especially helpful for automating small but repetitive
    tasks. Imagine you want to back up all CSV files in your `~/downloads` folder
    to the `~/archive` folder to clean up old files that are no longer needed. Instead
    of writing the script by hand, you can ask Copilot CLI to generate it:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot CLI 特别适合自动化小型但重复的任务。想象一下，你想要将 `~/downloads` 文件夹中的所有 CSV 文件备份到
    `~/archive` 文件夹，以清理不再需要的旧文件。而不是手动编写脚本，你可以要求 Copilot CLI 生成它：
- en: '[PRE6]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Copilot responds with a ready-to-use Bash script:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 会响应一个现成的 Bash 脚本：
- en: '![Figure 5.4: Using GitHub Copilot CLI to generate a Bash script for archiving
    and cleaning up CSV files](img/B34107_05_04.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.4：使用 GitHub Copilot CLI 生成用于归档和清理 CSV 文件的 Bash 脚本](img/B34107_05_04.png)'
- en: 'Figure 5.4: Using GitHub Copilot CLI to generate a Bash script for archiving
    and cleaning up CSV files'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.4：使用 GitHub Copilot CLI 生成用于归档和清理 CSV 文件的 Bash 脚本
- en: 'At this point, choose how you want to use the script. In the session UI, you
    can copy it to the clipboard or ask GitHub Copilot to write the file for you.
    When you choose to write, the CLI shows a confirmation prompt (see *Figure 5.5*
    ) asking whether to edit the file now, approve all file operations for the rest
    of the session, or decline and give new instructions. Confirm the write, then
    review the saved file, make it executable, and run or schedule it as needed. You
    can also ask GitHub Copilot to explain the script before you execute it:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在此阶段，选择你想要如何使用脚本。在会话 UI 中，你可以将其复制到剪贴板或要求 GitHub Copilot 为你编写文件。当你选择编写时，CLI 会显示一个确认提示（见
    *图 5.5* ），询问是否现在编辑文件、批准整个会话的所有文件操作，或拒绝并给出新的指令。确认写入后，检查保存的文件，使其可执行，并根据需要运行或安排它。你还可以要求
    GitHub Copilot 在执行之前解释脚本：
- en: '![Figure 5.5: GitHub Copilot CLI asks for confirmation before writing or editing
    files](img/B34107_05_05.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.5：GitHub Copilot CLI 在写入或编辑文件之前请求确认](img/B34107_05_05.png)'
- en: 'Figure 5.5: GitHub Copilot CLI asks for confirmation before writing or editing
    files'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.5：GitHub Copilot CLI 在写入或编辑文件之前请求确认
- en: 'Example 2: Explaining a Git command'
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：解释 Git 命令
- en: 'Another common use case for GitHub Copilot CLI is understanding commands you
    come across in scripts or documentation. Instead of searching online or guessing,
    you can ask GitHub Copilot CLI to break them down into plain language. For instance,
    you see a compact history command in a script or review note and want to be sure
    what it shows before you run it:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot CLI 的另一个常见用途是理解你在脚本或文档中遇到的命令。无需在网上搜索或猜测，你可以要求 GitHub Copilot
    CLI 将其分解成通俗易懂的语言。例如，你在脚本或审阅笔记中看到一个紧凑的历史命令，想在运行之前确保它显示的内容：
- en: '[PRE7]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'As you can see in *Figure 5.6* , Copilot explains each part of the command
    clearly. GitHub Copilot explains that `git log` prints commit history, `--graph`
    draws a simple branch graph in the left margin, `--oneline` shows each commit
    on a single line with a short commit hash and subject, and `--decorate` displays
    references such as branch names and tags. The `origin/main..HEAD` range limits
    the output to commits that are on your current branch but not on `origin/main`
    , which is handy when you want to review what your branch adds before opening
    a pull request or writing a summary:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如 *图 5.6* 所示，Copilot 清晰地解释了命令的每个部分。GitHub Copilot 解释说 `git log` 打印提交历史，`--graph`
    在左侧边栏绘制简单的分支图，`--oneline` 在单行上显示每个提交，包括简短的提交哈希和主题，`--decorate` 显示分支名称和标签等引用。`origin/main..HEAD`
    范围限制输出为当前分支上的提交，但不包括 `origin/main`，这在你想在打开拉取请求或编写摘要之前审查分支添加的内容时很有用：
- en: '![Figure 5.6: GitHub Copilot CLI explaining Git commands and clarifying how
    each flag and the commit range work](img/B34107_05_06.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.6：GitHub Copilot CLI 解释 Git 命令并阐明每个标志和提交范围的工作方式](img/B34107_05_06.png)'
- en: 'Figure 5.6: GitHub Copilot CLI explaining Git commands and clarifying how each
    flag and the commit range work'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '![图 5.6：GitHub Copilot CLI 解释 Git 命令并阐明每个标志和提交范围的工作方式](img/B34107_05_06.png)'
- en: This is especially helpful when working with infrastructure scripts or automation
    you didn’t write yourself. Rather than searching online or taking risks with unfamiliar
    commands, GitHub Copilot breaks them down in plain language, helping you understand
    exactly what each part does before executing it.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这在处理基础设施脚本或自动化脚本（非自己编写）时特别有帮助。与其在网上搜索或冒险使用不熟悉的命令，GitHub Copilot 会用通俗易懂的语言将这些命令分解，帮助你执行之前确切了解每个部分的作用。
- en: 'Example 3: Interacting with GitHub.com'
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3：与 GitHub.com 交互
- en: You can also use the CLI to query GitHub directly. Once signed in, ask about
    your open pull requests, assigned issues, and other work without leaving the terminal.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以使用 CLI 直接查询 GitHub。一旦登录，你可以在终端之外询问你的开放拉取请求、分配的问题和其他工作。
- en: 'To get a quick snapshot of your active work across repositories, ask the following:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 要快速了解你跨存储库的活跃工作，请提出以下问题：
- en: '[PRE8]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'GitHub Copilot returns your open pull requests. To narrow the scope, include
    a repository:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 返回你的开放拉取请求。为了缩小范围，包括存储库：
- en: '[PRE9]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: You can then use the results to jump to reviews or triage tasks without leaving
    the terminal.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用这些结果跳转到审阅或分类任务，而无需离开终端。
- en: Integrating Copilot CLI with automation
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 Copilot CLI 与自动化集成
- en: 'Imagine that you have a small housekeeping task that keeps returning: archiving
    CSVs and pruning older files. Rather than hand-write and maintain a script, you
    can ask GitHub Copilot CLI to draft it, review the result, check it into your
    repo, and let GitHub Actions run it on a schedule. This shows the full loop from
    a quick local prompt to reliable, repeatable automation. Here’s how:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您有一个反复出现的小型维护任务：存档 CSV 文件和修剪旧文件。与其手动编写和维护脚本，您可以让 GitHub Copilot CLI 起草它，审查结果，将其检入您的仓库，并让
    GitHub Actions 按计划运行它。这展示了从快速本地提示到可靠、可重复的自动化的完整流程。以下是操作步骤：
- en: 'Generate the script with GitHub Copilot CLI. After starting a session, request
    and review it:'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 GitHub Copilot CLI 生成脚本。启动会话后，请求并审查它：
- en: '[PRE10]'
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Save the file as `./.github/scripts/archive_csvs.sh` :'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将文件保存为 `./.github/scripts/archive_csvs.sh`：
- en: '[PRE11]'
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Next, make the script executable and commit it to your repository so that it
    becomes part of your version-controlled workflow. Run the following commands in
    your terminal:'
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，使脚本可执行并将它提交到您的仓库，使其成为您版本控制工作流程的一部分。在您的终端中运行以下命令：
- en: '[PRE12]'
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Add it into a GitHub Actions workflow that runs nightly, called `.github/workflows/archive-csvs.yml`
    :'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将其添加到名为 `.github/workflows/archive-csvs.yml` 的 GitHub Actions 工作流程中，该工作流程每晚运行：
- en: '[PRE13]'
  id: totrans-126
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: You use GitHub Copilot CLI once to draft the task, keep the result under version
    control, and let GitHub Actions run it on a schedule. The work remains visible
    in reviews, and the behavior is consistent run after run.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 您使用 GitHub Copilot CLI 一次来起草任务，将结果置于版本控制之下，并让 GitHub Actions 按计划运行它。工作在审查中保持可见，并且每次运行的行为都是一致的。
- en: Best practices
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To make the most of Copilot CLI in everyday work and automation, keep these
    best practices in mind:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在日常工作和自动化中充分利用 Copilot CLI，请记住以下最佳实践：
- en: '**Be specific** : `Bash script to deploy a Docker container with error handling`
    is clearer than `Write a deployment script`'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体明确**：`Bash 脚本用于部署带有错误处理的 Docker 容器`比`编写部署脚本`更清晰'
- en: '**Review before running** : Be careful with changes to files, services, or
    credentials'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行前审查**：对文件、服务或凭据的更改要小心'
- en: '**Ask for explanations** : If unsure, request a breakdown before execution'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**请求解释**：如果不确定，在执行前请求分解'
- en: '**Adopt gradually** : Use the CLI for small local tasks first, then standardize
    what works'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**逐步采用**：首先使用 CLI 进行小型本地任务，然后标准化有效的工作'
- en: Common pitfalls to avoid
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Even with automation, the CLI is not foolproof. Be aware of these common pitfalls
    so you can avoid mistakes and keep your workflows safe:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有自动化，CLI 也不是万无一失的。了解这些常见陷阱，以便您可以避免错误并确保工作流程的安全：
- en: '**Vague prompts** : Ambiguity leads to incomplete results'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模糊的提示**：不明确会导致结果不完整'
- en: '**Skipping review** : Do not paste output straight into `sh` or `pwsh` without
    reading it'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跳过审查**：不要在阅读之前直接将输出粘贴到 `sh` 或 `pwsh`'
- en: '**Over-automation** : Keep a human in the loop for critical infrastructure
    steps'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过度自动化**：对于关键基础设施步骤，保持人工参与'
- en: GitHub Copilot CLI brings the coding agent to your terminal so you can generate
    scripts, explain commands, and get a quick view of your GitHub work. Used with
    review and a few careful habits, it fits naturally alongside your IDE and helps
    keep work moving without extra context switching.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot CLI 将编码代理带到您的终端，让您可以生成脚本、解释命令，并快速查看您的 GitHub 工作。结合审查和一些谨慎的习惯，它自然地与您的
    IDE 一起使用，帮助工作顺利进行，无需额外的上下文切换。
- en: Next, we shift focus back into the IDE itself. Beyond writing and automation,
    Copilot can also assist when things go wrong. In the following section, you will
    see how Copilot supports debugging sessions by explaining stack traces, suggesting
    fixes, and even generating diagnostic code to help identify root causes.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将焦点转回到集成开发环境（IDE）本身。除了编写和自动化之外，Copilot 还能在出现问题时提供帮助。在下一节中，您将看到 Copilot
    如何通过解释堆栈跟踪、建议修复方案以及生成诊断代码来帮助识别根本原因。
- en: Debugging support
  id: totrans-141
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 调试支持
- en: '**Debugging** is a critical phase in the development cycle and often one of
    the most time-consuming. GitHub Copilot’s IDE integrations are designed to help
    you not just write code but also understand and fix it. GitHub Copilot assists
    throughout the debugging process: analyzing stack traces, suggesting fixes, explaining
    errors, and even generating diagnostic scripts. This section shows how Copilot’s
    presence in your IDE can make troubleshooting less painful and more productive.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '**调试**是开发周期中的关键阶段，通常也是耗时最长的阶段之一。GitHub Copilot的IDE集成旨在帮助您不仅编写代码，还能理解和修复代码。GitHub
    Copilot在整个调试过程中提供帮助：分析堆栈跟踪、建议修复、解释错误，甚至生成诊断脚本。本节展示了Copilot在您的IDE中的存在如何使故障排除不那么痛苦，更加高效。'
- en: What can GitHub Copilot do in the debugger?
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GitHub Copilot在调试器中能做什么？
- en: 'In supported IDEs (such as Visual Studio Code), GitHub Copilot can be invoked
    during active debugging sessions or while inspecting error logs and stack traces.
    Some common workflows include the following:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在支持的IDE（如Visual Studio Code）中，GitHub Copilot可以在活动调试会话期间或检查错误日志和堆栈跟踪时调用。一些常见的工作流程包括以下内容：
- en: '**Explaining error messages and stack traces** : Highlight an error or stack
    trace and ask GitHub Copilot for a plain-language explanation'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解释错误信息和堆栈跟踪**：突出显示一个错误或堆栈跟踪，并请求GitHub Copilot提供简单的语言解释'
- en: '**Suggesting fixes for bugs** : Prompt GitHub Copilot to recommend code changes
    based on a failing test, exception, or runtime error'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建议修复错误**：提示GitHub Copilot根据失败的测试、异常或运行时错误推荐代码更改'
- en: '**Generating diagnostic code** : Request scripts or functions to help isolate
    and reproduce bugs (e.g., extra logging or input validation)'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成诊断代码**：请求脚本或函数以帮助隔离和重现错误（例如，额外的日志记录或输入验证）'
- en: '**Assisting with test debugging** : Get suggestions for test assertions, edge
    cases, or how to reproduce a failure'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协助测试调试**：获取测试断言、边缘情况或如何重现失败的建议'
- en: 'Example 1: JavaScript stack trace analysis'
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1：JavaScript堆栈跟踪分析
- en: 'Consider a scenario where your Node.js app crashes during execution. In VS
    Code’s terminal, you see an error like this:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这样一个场景，您的Node.js应用程序在执行过程中崩溃。在VS Code的终端中，您会看到一个像这样的错误：
- en: '![Figure 5.7: Error shown in the VS Code terminal during a Node.js run. The
    stack trace is selected for explanation, then pasted into Copilot Chat to get
    a diagnosis and fix](img/B34107_05_07.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![图5.7：在Node.js运行期间VS Code终端显示的错误。选择堆栈跟踪进行解释，然后粘贴到Copilot Chat以获取诊断和修复](img/B34107_05_07.png)'
- en: 'Figure 5.7: Error shown in the VS Code terminal during a Node.js run. The stack
    trace is selected for explanation, then pasted into Copilot Chat to get a diagnosis
    and fix'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.7：在Node.js运行期间VS Code终端显示的错误。选择堆栈跟踪进行解释，然后粘贴到Copilot Chat以获取诊断和修复
- en: 'At first glance, the message is not very helpful. You know `toLowerCase` is
    being called on `undefined` , but it is not obvious why. To investigate with Copilot,
    do the following:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 初看，这条消息并不很有帮助。您知道`toLowerCase`正在对`undefined`进行调用，但原因并不明显。为了使用Copilot进行调查，请执行以下操作：
- en: 'If available in your setup, select the stack trace text in the terminal, open
    the Command Palette, and run **GitHub Copilot: Explain Terminal Selection** .'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您的设置中可用，请在终端中选择堆栈跟踪文本，打开命令面板，并运行**GitHub Copilot：解释终端选择**。
- en: 'If the command is not available, copy the stack trace from the terminal and
    paste it into Copilot Chat, then use the following prompt:'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果命令不可用，请从终端复制堆栈跟踪并将其粘贴到Copilot Chat中，然后使用以下提示：
- en: '[PRE14]'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Copilot explains that the filter argument is sometimes undefined, so calling
    `toLowerCase()` throws an error. It then proposes a safer version of the function:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot解释说，过滤器参数有时是未定义的，因此调用`toLowerCase()`会抛出错误。然后它提出一个更安全的函数版本：
- en: '[PRE15]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: After applying the change, run the program again. The error is gone, and the
    behavior is correct, with or without a filter value.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 应用更改后，再次运行程序。错误已消失，行为正确，无论是否有过滤器值。
- en: This example demonstrates how GitHub Copilot can act as a real-time debugging
    companion. By analyzing stack traces and explaining the root cause in plain language,
    it bridges the gap between a confusing error message and a clear path to resolution.
    Instead of guessing why a crash occurred, you can quickly understand the failure,
    apply a targeted fix, and verify the outcome, all without leaving your IDE.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例演示了GitHub Copilot如何作为实时调试伴侣。通过分析堆栈跟踪并以简单语言解释根本原因，它弥合了令人困惑的错误信息和清晰的解决方案路径之间的差距。您不必猜测崩溃的原因，可以快速了解失败，应用有针对性的修复，并验证结果，所有这些都不需要离开您的IDE。
- en: 'Example 2: SQL error assistance'
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2：SQL错误辅助
- en: 'Consider a situation where you are writing a query against an `employees` table
    and the execution fails with the following message:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这样一个情况，你正在编写一个针对 `employees` 表的查询，执行失败并显示以下消息：
- en: '[PRE16]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'At this point, you know the query failed, but the error message alone does
    not tell you the exact cause. To investigate, you highlight the error message
    and prompt Copilot with the following:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你知道查询失败了，但错误信息本身并不能告诉你确切的原因。为了调查，你突出显示错误信息，并使用以下内容提示Copilot：
- en: '[PRE17]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Copilot explains that the error occurs because the `employeeid` column does
    not exist in the `employees` table. It identifies two possible reasons:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot解释说错误发生是因为 `employeeid` 列不存在于 `employees` 表中。它确定了两个可能的原因：
- en: The column name is misspelled (e.g., should be `employee_id` or `id` )
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列名拼写错误（例如，应该是 `employee_id` 或 `id`）
- en: The column does not exist in the table schema
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该列不存在于表架构中
- en: 'Plus, it provides the steps to fix it:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它提供了修复步骤：
- en: Check the actual column names in the `employees` table.
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查 `employees` 表中的实际列名。
- en: Update your query to use the correct column name.
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更新你的查询以使用正确的列名。
- en: '*Figure 5.8* shows the full Copilot response and further details to resolve
    the SQL error:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '*图5.8* 显示了完整的Copilot响应以及解决SQL错误的进一步细节：'
- en: '![ Figure 5.8: Terminal window explaining and resolving a SQL error](img/B34107_05_08.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图5.8：终端窗口解释和解决SQL错误](img/B34107_05_08.png)'
- en: 'Figure 5.8: Terminal window explaining and resolving a SQL error'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.8：终端窗口解释和解决SQL错误
- en: This example demonstrates how GitHub Copilot provides more than a simple correction.
    It not only identifies the likely issue but also guides you through verifying
    the schema before applying a fix. This structured workflow, which explains the
    error, checks the environment, and then updates the code, shows why GitHub Copilot
    is an effective debugging partner, reducing guesswork and helping you resolve
    issues more confidently.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例演示了GitHub Copilot如何提供不仅仅是简单纠正的帮助。它不仅确定了可能的问题，还指导你验证架构，然后再应用修复。这种结构化的工作流程，解释错误，检查环境，然后更新代码，说明了为什么GitHub
    Copilot是一个有效的调试伙伴，减少了猜测，并帮助你更有信心地解决问题。
- en: Supported languages and scenarios
  id: totrans-176
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持的语言和场景
- en: 'Copilot’s debugging help is not limited to a single language or environment.
    It works across a wide range of programming languages, scripting tools, and configuration
    formats, including the following:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot的调试帮助不仅限于单一语言或环境。它适用于广泛的编程语言、脚本工具和配置格式，包括以下内容：
- en: JavaScript/TypeScript (Node.js, web apps)
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: JavaScript/TypeScript（Node.js、Web应用）
- en: Python
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python
- en: C#/F#
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: C#/F#
- en: SQL (T-SQL, PostgreSQL, etc.)
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SQL（T-SQL、PostgreSQL等）
- en: PowerShell, Bash, and other scripting languages
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PowerShell、Bash和其他脚本语言
- en: Infrastructure as Code (Bicep, YAML, Terraform, etc.)
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础设施即代码（Bicep、YAML、Terraform等）
- en: CI/CD pipeline definitions
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CI/CD 管道定义
- en: You can mix and match these technologies in a single project. Copilot will offer
    debugging suggestions for whatever you highlight or request, as long as the relevant
    context is available in your editor.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在单个项目中混合使用这些技术。只要你的编辑器中有相关的上下文，Copilot就会为你提供的任何内容或请求提供调试建议。
- en: Best practices
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To make Copilot’s debugging assistance both reliable and safe, keep these best
    practices in mind when asking for help with errors or stack traces:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使GitHub Copilot的调试帮助既可靠又安全，在请求错误或堆栈跟踪的帮助时，请记住以下最佳实践：
- en: '**Be specific with error context** : The more details you provide (full stack
    trace, failing input, or test scenario), the more precise GitHub Copilot’s assistance'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具体说明错误上下文**：你提供的信息越详细（完整的堆栈跟踪、失败的输入或测试场景），GitHub Copilot的帮助就越精确'
- en: '**Prompt for both explanation and fix** : Sometimes, the best approach is to
    ask Copilot to first explain, then recommend a fix—this helps you understand,
    not just patch'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**请求解释和修复**：有时，最好的方法是先让Copilot解释，然后推荐修复方案——这有助于你理解，而不仅仅是修补'
- en: '**Validate all suggestions** : Always test GitHub Copilot’s code in your debug
    environment before moving to production'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证所有建议**：在将GitHub Copilot的代码移至生产环境之前，始终在你的调试环境中测试GitHub Copilot的代码'
- en: Common pitfalls to avoid
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'While Copilot can be a valuable debugging partner, there are also risks to
    be aware of. Watch out for these common pitfalls to avoid creating new problems
    as you troubleshoot:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Copilot 可以成为一个有价值的调试伙伴，但也要注意风险。在排查问题时，要小心这些常见的陷阱，以避免创建新的问题：
- en: '**Blindly applying suggested fixes** : Always understand why GitHub Copilot
    is recommending a change—some suggestions may only mask underlying issues.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**盲目应用建议的修复方案**：始终理解为什么GitHub Copilot建议更改——一些建议可能只是掩盖了潜在问题。'
- en: '**Omitting full context** : GitHub Copilot works best when it “sees” the relevant
    code, configuration, and error output. Include as much as you can in your prompt.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**省略完整上下文**：GitHub Copilot在“看到”相关的代码、配置和错误输出时工作得最好。尽可能多地在你的提示中包含信息。'
- en: '**Relying on Copilot for all debugging** : AI is great at pattern-matching
    and suggesting common fixes, but don’t skip root cause analysis for complex issues.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全依赖Copilot进行调试**：人工智能擅长模式匹配和提出常见修复方案，但不要跳过复杂问题的根本原因分析。'
- en: Debugging is one of the most time-consuming parts of development, and Copilot’s
    ability to explain errors, propose fixes, and generate diagnostic code shows how
    AI can speed up that process without replacing human judgment. Once errors are
    resolved, however, development often continues into reviews, tests, and quality
    checks. In the next section, we will look at other IDE-integrated tools where
    GitHub Copilot helps with code reviews, manual pull request summaries, test runners,
    and analysis workflows that keep projects healthy and maintainable.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 调试是开发中最耗时的部分之一，Copilot解释错误、提出修复方案和生成诊断代码的能力展示了人工智能如何在不取代人类判断的情况下加快这一过程。然而，一旦错误得到解决，开发通常继续到审查、测试和质量检查。在下一节中，我们将探讨其他IDE集成工具，其中GitHub
    Copilot帮助进行代码审查、手动拉取请求摘要、测试运行和分析工作流程，以保持项目健康和可维护。
- en: Other IDE-integrated tools
  id: totrans-197
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 其他IDE集成工具
- en: Beyond editing and debugging, modern IDEs serve as the nerve center for code
    review, testing, and quality checks. GitHub Copilot extends its reach into these
    areas, helping you review code, draft summaries, and work more efficiently, even
    if your team doesn’t use GitHub.com for pull requests.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅仅是编辑和调试，现代集成开发环境（IDE）还充当代码审查、测试和质量检查的中枢。GitHub Copilot将这些领域扩展到其功能中，帮助你审查代码、起草摘要，并更高效地工作，即使你的团队不使用GitHub.com进行拉取请求。
- en: Manual pull request summaries and local code review
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 手动拉取请求摘要和本地代码审查
- en: Teams review code in different ways. Some use hosted pull request workflows
    on GitHub.com, while others prefer to keep reviews entirely within the IDE. GitHub
    Copilot supports both approaches by helping you summarize, analyze, and comment
    on code changes, whether you are working locally or through the **GitHub Pull
    Requests** extension.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 团队以不同的方式审查代码。一些使用GitHub.com上的托管拉取请求工作流程，而另一些则更喜欢将审查完全保留在IDE中。GitHub Copilot通过帮助你总结、分析和评论代码更改来支持这两种方法，无论你是本地工作还是通过**GitHub
    Pull Requests**扩展。
- en: 'There are two main ways to take advantage of this:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种主要方式可以利用这一点：
- en: '**Manual local review** : In this workflow, you highlight diffs, stage changes,
    or paste snippets into the Chat interface. Copilot then generates summaries or
    review comments tied directly to the code under review.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**手动本地审查**：在这个工作流程中，你突出显示差异、暂存更改或将片段粘贴到聊天界面。然后Copilot将生成与正在审查的代码直接相关的摘要或审查注释。'
- en: '**Integrated review with the GitHub Pull Requests extension** : In this workflow,
    you use the GitHub Pull Requests extension in VS Code to generate commit messages
    or review notes automatically from staged changes. This keeps everything inside
    the IDE without requiring manual copy-paste.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与GitHub Pull Requests扩展的集成审查**：在这个工作流程中，你使用VS Code中的GitHub Pull Requests扩展来自动从暂存更改生成提交消息或审查笔记。这样，所有操作都在IDE内部完成，无需手动复制粘贴。'
- en: The subsections that follow show each method in detail, highlighting how Copilot
    ties its assistance to the current change set and how the integrated extension
    workflow can streamline reviews even further.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的子部分将详细说明每种方法，突出Copilot如何将其辅助功能与当前更改集相关联，以及集成扩展工作流程如何进一步简化审查。
- en: Use Copilot Chat for broad explanations (e.g., pasting in a multi-file diff
    for context) and local code review for focused analysis of the current change
    set. Together, they give you both the big picture and the precise detail.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Copilot Chat进行广泛的解释（例如，粘贴多文件差异以提供上下文）和本地代码审查进行当前更改集的集中分析。它们共同为你提供整体视图和精确细节。
- en: Manual local review
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 手动本地审查
- en: When working locally, stage your changes, then click **Generate Commit Message**
    in the **SOURCE CONTROL** panel (see the button highlighted by the red arrow in
    *Figure 5.9* ). GitHub Copilot creates a summary from the staged diff that you
    can edit before committing or reuse in a review note.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 当本地工作时，暂存你的更改，然后在 **SOURCE CONTROL** 面板中点击 **生成提交消息**（参见 *图 5.9* 中用红色箭头突出显示的按钮）。GitHub
    Copilot 从暂存差异中创建一个摘要，你可以在提交之前编辑它，或者将其作为审查笔记重用。
- en: '![Figure 5.9: The SOURCE CONTROL panel in VS Code showing the Generate Commit
    Message button](img/B34107_05_09.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.9：VS Code 中的 SOURCE CONTROL 面板显示生成提交消息按钮](img/B34107_05_09.png)'
- en: 'Figure 5.9: The SOURCE CONTROL panel in VS Code showing the Generate Commit
    Message button'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.9：VS Code 中的 SOURCE CONTROL 面板显示生成提交消息按钮
- en: GitHub Copilot analyzes the staged diff and produces a natural-language commit
    message suggestion. You can review the text, cycle through alternatives if offered,
    or refine it before committing. This ensures that your commit message explains
    the purpose of the change, not just what files were modified. You can then finalize
    the commit directly, or reuse the summary as a review note to share with others,
    regardless of which source control system your team uses.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 分析暂存差异并生成自然语言提交消息建议。你可以审查文本，如果提供的话，循环查看替代方案，或在其提交之前对其进行细化。这确保了你的提交消息解释了更改的目的，而不仅仅是修改了哪些文件。然后你可以直接最终确定提交，或者将摘要作为审查笔记与他人共享，无论你的团队使用的是哪种源代码控制系统。
- en: In addition to generating commit messages, you can also request targeted review
    assistance on specific lines of code. Highlight the new or modified lines in your
    editor and prompt GitHub Copilot to review them for potential issues or edge cases.
    GitHub Copilot may point out missing null checks, opportunities for input validation,
    or style inconsistencies. This gives you lightweight feedback without needing
    to open a full pull request, making it useful for quick iterations or solo projects.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 除了生成提交消息外，你还可以针对特定代码行请求有针对性的审查帮助。在你的编辑器中突出显示新或修改的行，并提示 GitHub Copilot 对其进行潜在问题或边缘情况的审查。GitHub
    Copilot 可能会指出缺少空值检查、输入验证的机会或样式不一致。这为你提供了轻量级的反馈，无需打开完整的拉取请求，因此对于快速迭代或个人项目非常有用。
- en: Integrated review with the GitHub Pull Requests extension
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 GitHub Pull Requests 扩展进行集成审查
- en: 'For a streamlined workflow in VS Code, use the **GitHub Pull Requests** and
    **Issues** extensions. As shown back in *Figure 5.9* (the red arrow again), the
    **SOURCE CONTROL** panel includes **Generate Commit Message** , which drafts a
    summary from your staged diff. When you are ready to open a pull request, switch
    to the **Create Pull Request** view shown in *Figure 5.10* . There, you can review
    the generated text, adjust the title and description, and click **Create** . The
    screen also includes **Copilot Code Review** so you can run an AI review before
    submitting:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在 VS Code 中实现流畅的工作流程，请使用 **GitHub Pull Requests** 和 **Issues** 扩展。如图 *图 5.9*
    所示（再次显示红色箭头），**SOURCE CONTROL** 面板包括 **生成提交消息**，它从暂存差异中草拟一个摘要。当你准备好打开拉取请求时，切换到
    *图 5.10* 中显示的 **创建拉取请求** 视图。在那里，你可以审查生成的文本，调整标题和描述，然后点击 **创建**。屏幕还包括 **Copilot
    代码审查**，这样你可以在提交之前运行 AI 审查：
- en: '![Figure 5.10: VS Code PR extension generating a commit summary](img/B34107_05_10.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.10：VS Code PR 扩展生成提交摘要](img/B34107_05_10.png)'
- en: 'Figure 5.10: VS Code PR extension generating a commit summary'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.10：VS Code PR 扩展生成提交摘要
- en: 'When creating or updating a pull request in VS Code with the same extension,
    you’ll also notice the **Copilot Code Review** button. Clicking it runs an AI-powered
    review on the staged or pending changes. The tool provides inline comments, points
    out test weaknesses, and suggests improvements, just like a teammate leaving review
    notes. You can see an example in *Figure 5.11* :'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 当在 VS Code 中使用相同扩展创建或更新拉取请求时，你还会注意到 **Copilot 代码审查** 按钮。点击它会在暂存或挂起的更改上运行 AI
    审查。该工具提供内联注释，指出测试弱点，并提出改进建议，就像队友留下审查笔记一样。你可以在 *图 5.11* 中看到一个示例：
- en: '![Figure 5.11: Code Review in the PR extension, showing suggested changes with
    inline comments](img/B34107_05_11.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.11：PR 扩展中的代码审查，显示带有内联注释的建议更改](img/B34107_05_11.png)'
- en: 'Figure 5.11: Code Review in the PR extension, showing suggested changes with
    inline comments'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.11：PR 扩展中的代码审查，显示带有内联注释的建议更改
- en: Use GitHub Copilot’s feedback as a starting point, then refine or adjust based
    on your team’s standards. This balances automation with human oversight.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 以 GitHub Copilot 的反馈作为起点，然后根据团队的标准进行细化或调整。这样既实现了自动化，又有人工监督。
- en: Best practices
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To get the most value from Copilot’s IDE-integrated tools and to ensure that
    the results are both useful and safe, consider the following best practices:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 为了从 Copilot 的 IDE 集成工具中获得最大价值，并确保结果既有用又安全，请考虑以下最佳实践：
- en: '**Paste only relevant diffs** : For best results, keep the diff or code changes
    focused and targeted'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仅粘贴相关差异**：为了获得最佳结果，请保持差异或代码变更的专注和针对性。'
- en: '**Request both a summary and review** : Try prompts such as `Summarize these
    changes and list possible risks`'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**请求摘要和审查**：尝试使用如“总结这些更改并列出可能的风险”之类的提示。'
- en: '**Integrate into local workflow** : Use GitHub Copilot alongside your preferred
    Git GUI, terminal, or IDE diff tools'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成到本地工作流程中**：使用 GitHub Copilot 与您首选的 Git GUI、终端或 IDE 差异工具一起使用。'
- en: Common pitfalls to avoid
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'While Copilot can streamline reviews and summaries, there are a few common
    pitfalls that can reduce its effectiveness. Keep these in mind to avoid frustration
    and get more accurate results:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Copilot 可以简化审查和总结，但有一些常见的陷阱可能会降低其有效性。请记住这些，以避免挫败感并获得更准确的结果：
- en: '**Overly broad diffs** : Large, multi-file diffs can overwhelm GitHub Copilot.
    Break changes into smaller chunks for better summaries.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过于宽泛的差异**：大型的多文件差异可能会让 GitHub Copilot 应接不暇。将变更拆分成更小的部分，以便更好地总结。'
- en: '**Missing context** : If GitHub Copilot can’t “see” related files or dependencies,
    ask more targeted questions or review those areas manually.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺少上下文**：如果 GitHub Copilot 无法“看到”相关文件或依赖项，请提出更有针对性的问题或手动审查这些区域。'
- en: Test runners and code analysis
  id: totrans-229
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试运行器和代码分析
- en: Testing and analysis are critical parts of ensuring that software remains reliable,
    maintainable, and secure. GitHub Copilot can support these tasks inside the IDE
    by helping you generate test cases, strengthen existing coverage, and make sense
    of the often overwhelming output from test runs or static analysis tools. Rather
    than replacing these processes, GitHub Copilot speeds them up and provides context
    so that you can focus on the decisions that matter.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 测试和分析是确保软件保持可靠、可维护和安全的至关重要部分。GitHub Copilot 可以通过帮助您生成测试用例、加强现有覆盖率以及理解测试运行或静态分析工具通常令人难以承受的输出，在
    IDE 内部支持这些任务。GitHub Copilot 并不是取代这些流程，而是加快它们，并提供上下文，以便您可以专注于重要的决策。
- en: One of the most common uses is generating tests from code. If you highlight
    a function and prompt Copilot with a request such as `"Write unit tests for this
    function using Jest"` or `"Generate tests for this function using pytest"` , it
    produces a scaffolded test file tailored to your chosen framework. This is especially
    helpful when you are starting fresh or when you want to quickly cover basic cases
    before refining with more specific scenarios.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的用途之一是从代码生成测试。如果你突出显示一个函数，并用如“使用 Jest 为此函数编写单元测试”或“使用 pytest 为此函数生成测试”之类的请求提示
    Copilot，它将生成一个针对你选择的框架量身定制的测试文件。当你刚开始或想要快速覆盖基本案例然后再用更具体的场景进行细化时，这特别有帮助。
- en: 'Example 1: Generating a test case'
  id: totrans-232
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1：生成测试用例
- en: Suppose you have added a new function to a Python module. By selecting the function
    in your editor and prompting `Write unit tests for this function using pytest`
    , Copilot produces a draft test file. The generated tests may include assertions
    for common inputs, boundary conditions, and expected failures. You can then refine
    these tests to fit your project’s requirements. This saves time by avoiding the
    blank-page problem and gives you a quick starting point to expand upon.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你已经在 Python 模块中添加了一个新函数。通过在编辑器中选择该函数并提示“使用 pytest 为此函数编写单元测试”，Copilot 会生成一个测试文件草稿。生成的测试可能包括对常见输入、边界条件和预期失败的断言。然后你可以根据项目需求对这些测试进行细化。这样可以节省时间，避免出现空白页问题，并为你提供一个快速的开始点来扩展。
- en: GitHub Copilot also helps when dealing with analysis output. Static analysis
    tools such as ESLint or Pylint are excellent at finding issues, but they often
    generate long lists of warnings that are difficult to prioritize. Instead of reading
    through every line, you can paste the output into Copilot Chat and request a focused
    summary.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 在处理分析输出时也有帮助。静态分析工具，如 ESLint 或 Pylint，擅长发现问题，但它们通常会产生长长的警告列表，难以优先排序。你不必逐行阅读，可以将输出粘贴到
    Copilot Chat 中，并请求一个专注的摘要。
- en: 'Example 2: Summarizing analysis results'
  id: totrans-235
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2：总结分析结果
- en: After running ESLint on a JavaScript project, you might paste the results into
    Copilot Chat and prompt `Summarize these findings and recommend the top three
    fixes` . Copilot identifies the most significant issues, such as unused variables,
    a function with poor performance, or inconsistent style, and returns a concise
    set of actionable recommendations. Instead of being buried in warnings, you have
    a prioritized list of changes to address first.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 在对JavaScript项目运行ESLint后，你可能会将结果粘贴到Copilot Chat中，并提示`总结这些发现并推荐前三个修复方案`。Copilot会识别最显著的问题，例如未使用的变量、性能不佳的函数或不一致的风格，并返回一组简洁的可操作建议。这样，你就不必被警告信息淹没，而是有一个优先级列表，你可以先处理这些更改。
- en: Together, these scenarios illustrate how Copilot can enhance both testing and
    analysis. It accelerates the process of writing tests, suggests improvements you
    might not have considered, and helps you extract meaningful insight from dense
    output. By integrating directly into your IDE, Copilot supports the quality-focused
    side of development, ensuring that new features are not only delivered quickly
    but also tested and validated effectively.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这些场景共同说明了Copilot如何增强测试和分析。它加速了编写测试的过程，提出了你可能未曾考虑的改进建议，并帮助你从密集的输出中提取有意义的见解。通过直接集成到你的IDE中，Copilot支持开发过程中的质量关注方面，确保新功能不仅快速交付，而且得到有效的测试和验证。
- en: Best practices
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To get the most out of Copilot when working with tests and analysis tools,
    consider these best practices:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 当与测试和分析工具一起使用Copilot时，为了最大限度地发挥其作用，请考虑以下最佳实践：
- en: '**Pair Copilot with your existing tools** : Use Copilot to fill in gaps that
    your linter, test runner, or analyzer doesn’t cover. For example, if your linter
    flags a recurring pattern, Copilot can propose a refactoring to address it consistently.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将Copilot与现有工具配对**：使用Copilot来填补你的代码检查器、测试运行器或分析器未覆盖的空白。例如，如果你的代码检查器标记了一个反复出现的模式，Copilot可以提出一个重构建议来一致地解决这个问题。'
- en: '**Ask for specifics** : Direct prompts such as `Suggest additional test assertions
    for this function in pytest` produce better results than broad requests such as
    `Improve these tests` .'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**请求具体内容**：如“为这个函数在pytest中建议额外的测试断言”这样的直接提示比“改进这些测试”这样的宽泛请求能产生更好的结果。'
- en: '**Use Copilot to prioritize** : When static analysis produces dozens of warnings,
    ask Copilot to identify the top three issues to focus on first. This keeps your
    workflow manageable and action-oriented.'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用Copilot来优先排序**：当静态分析产生数十个警告时，让Copilot识别首先需要关注的三个问题。这保持了你的工作流程的可管理性和行动导向。'
- en: Common pitfalls to avoid
  id: totrans-243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'While Copilot can be a helpful partner in testing and analysis, overreliance
    or vague prompting can undermine its usefulness. Be mindful of these common pitfalls:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Copilot可以在测试和分析中作为一个有用的伙伴，但过度依赖或模糊的提示可能会削弱其有用性。请注意这些常见的陷阱：
- en: '**Relying solely on generated tests** : GitHub Copilot’s test scaffolds are
    only a starting point and rarely provide full coverage. Always expand and adapt
    them to meet your project’s needs.'
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仅依赖生成的测试**：GitHub Copilot的测试框架只是一个起点，很少提供完整的覆盖范围。始终要扩展和调整它们以满足你项目的需求。'
- en: '**Using generic prompts** : Broad requests such as `Make these tests better`
    often lead to unhelpful results. Be clear about the language, framework, and the
    kind of improvements you want.'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用通用提示**：像“使这些测试更好”这样的宽泛请求往往会导致无用的结果。请明确指出你想要的编程语言、框架以及你希望改进的类型。'
- en: '**Treating Copilot as a replacement for analysis** : GitHub Copilot can summarize
    linter results, but you should still review the full report for minor issues that
    could accumulate over time.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将Copilot视为分析替代品**：GitHub Copilot可以总结代码检查器的结果，但你仍然应该审查完整的报告，以检查可能随着时间的推移而积累的微小问题。'
- en: Extension points
  id: totrans-248
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展点
- en: An extension point is a feature in an IDE that lets you customize or extend
    the way a tool behaves. In the context of GitHub Copilot, extension points allow
    you to connect Copilot’s capabilities to other tools or to streamline how you
    interact with it inside the editor. This flexibility makes Copilot feel less like
    a separate add-on and more like a native part of your daily workflow.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展点是IDE中的一个功能，允许你自定义或扩展工具的行为方式。在GitHub Copilot的上下文中，扩展点允许你将Copilot的功能连接到其他工具，或者简化你在编辑器中与之交互的方式。这种灵活性使得Copilot感觉更像是一个原生的工作流程的一部分，而不是一个单独的附加组件。
- en: 'Extension points are useful because they let you do the following:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展点很有用，因为它们允许你做以下事情：
- en: Adapt Copilot to your habits. For example, you can create a keyboard shortcut
    for `Explain Diff` so that instead of opening the Command Palette each time, you
    can trigger Copilot with a single keystroke while reviewing changes.
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将Copilot适应你的习惯。例如，你可以为`解释差异`创建一个键盘快捷键，这样在审查更改时，你只需按一个键就可以触发Copilot，而不是每次都打开命令面板。
- en: Integrate with other extensions. Many developers already rely on tools such
    as GitLens for Git history or Docker for container workflows. By combining these
    with Copilot, you can use prompts such as `Summarize this file's history` while
    viewing GitLens annotations, keeping review and analysis in one place.
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与其他扩展集成。许多开发者已经依赖于GitLens用于Git历史记录或Docker用于容器工作流程等工具。通过将这些工具与Copilot结合使用，你可以在查看GitLens注释时使用如`总结此文件的history`之类的提示，将审查和分析保持在同一位置。
- en: Reduce context switching. Instead of copying logs or diffs into Copilot Chat
    manually, you can use shortcuts or connected tools that send the content directly
    into Copilot for explanation or summarization.
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少上下文切换。你不必手动将日志或差异复制到Copilot Chat中，可以使用快捷键或连接的工具将内容直接发送到Copilot进行解释或总结。
- en: 'As an example, suppose you frequently use GitHub Copilot to summarize failing
    test output. In VS Code, you can add a key binding that maps *Ctrl* + *Alt* +
    *T* (or any shortcut you prefer) to the **GitHub Copilot: Explain Selection**
    command. Now, whenever a test fails, you simply highlight the error in the terminal
    and press the shortcut. Copilot immediately provides a plain-language explanation
    without breaking your flow.'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你经常使用GitHub Copilot来总结失败的测试输出。在VS Code中，你可以添加一个键绑定，将*Ctrl* + *Alt* + *T*（或你喜欢的任何快捷键）映射到**GitHub
    Copilot：解释选择**命令。现在，每当测试失败时，你只需在终端中突出显示错误并按快捷键。Copilot立即提供清晰的语言解释，而不会打断你的流程。
- en: Some capabilities, such as automatic pull request summaries and web-based review
    tools, are exclusive to GitHub.com. We’ll explore these in detail in [*Chapter
    6*](Chapter_6.xhtml#_idTextAnchor191) .
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 一些功能，如自动拉取请求摘要和基于Web的审查工具，仅限于GitHub.com。我们将在[*第6章*](Chapter_6.xhtml#_idTextAnchor191)中详细探讨这些功能。
- en: The IDE is more than just a code editor. It is also where reviews, tests, and
    analyses happen. GitHub Copilot’s ability to generate commit summaries, review
    code locally or through the Pull Requests extension, and assist with test and
    analysis workflows shows how it integrates into many parts of the development
    environment. These features help developers stay focused, reduce context switching,
    and provide useful feedback directly where the work happens.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: IDE不仅仅是代码编辑器。它也是审查、测试和分析发生的地方。GitHub Copilot生成提交摘要、本地或通过拉取请求扩展审查代码，以及协助测试和分析工作流程的能力展示了它如何集成到开发环境的许多部分。这些功能帮助开发者保持专注，减少上下文切换，并在工作发生的地方提供有用的反馈。
- en: The next section looks at how these features work together in practice. We will
    step through concrete examples that combine terminal commands, CLI automation,
    debugging support, and integrated tools to show how GitHub Copilot supports the
    full flow of everyday development from start to finish.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将探讨这些功能在实际应用中的协同工作方式。我们将通过具体的示例来展示如何结合终端命令、CLI自动化、调试支持和集成工具，以展示GitHub Copilot如何支持从开始到结束的日常开发全流程。
- en: Real-world workflow scenarios
  id: totrans-258
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 现实世界的工作流程场景
- en: The real strength of GitHub Copilot’s IDE integrations shines when you use them
    together in daily tasks. This section brings together terminal assistance, GitHub
    Copilot CLI, debugging, local code review, and testing support into hands-on,
    practical flows, so you can see how these features combine to save time and reduce
    context-switching.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot的IDE集成功能的真正优势在于你在日常任务中使用它们时的协同作用。本节将终端辅助、GitHub Copilot CLI、调试、本地代码审查和测试支持结合到实际操作流程中，以便你可以看到这些功能如何结合以节省时间和减少上下文切换。
- en: 'Scenario 1: From bug discovery to fix and review'
  id: totrans-260
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景1：从发现错误到修复和审查
- en: Imagine that you’re running integration tests in your IDE’s terminal and see
    a failing test. What do you do?
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下你正在IDE的终端中运行集成测试并看到失败的测试。你该怎么办？
- en: 'Begin by investigating the bug. You can do either of the following:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，调查错误。你可以做以下任何一项：
- en: Highlight the error message or failing line and use the inline prompt `Explain
    this error and suggest a fix` . This option provides an explanation and suggests
    updated code directly in context.
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 突出显示错误消息或失败的行，并使用内联提示`解释这个错误并建议一个修复方案`。此选项直接在上下文中提供解释并建议更新后的代码。
- en: Click the **Fix Test Failure** icon next to the failing test. This option analyzes
    the failure automatically and proposes a direct fix without requiring a typed
    prompt.
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击失败测试旁边的**修复测试失败**图标。此选项会自动分析失败并提出直接修复，无需输入提示。
- en: '![Figure 5.12: When debugging a failing test, choose between inline help to
    explain and fix the error, or the one-click Fix Test Failure option](img/B34107_05_12.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![图5.12：在调试失败的测试时，选择内联帮助解释和修复错误，或一键修复测试失败选项](img/B34107_05_12.png)'
- en: 'Figure 5.12: When debugging a failing test, choose between inline help to explain
    and fix the error, or the one-click Fix Test Failure option'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.12：在调试失败的测试时，选择内联帮助解释和修复错误，或一键修复测试失败选项
- en: Next, use GitHub Copilot’s inline suggestion to update the function under test.
    Once the code is modified, rerun your test suite in the terminal. This time, the
    tests pass successfully.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用GitHub Copilot的内联建议更新测试下的函数。代码修改后，在终端中重新运行测试套件。这次，测试成功通过。
- en: To finish, copy your local Git diff into GitHub Copilot Chat and prompt `Summarize
    this change for my commit message` . Copilot generates a natural-language summary
    that you can adapt and include in your commit. This keeps the history clear and
    improves transparency for your team.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，将你的本地Git diff复制到GitHub Copilot Chat中，并提示“为我的提交消息总结此更改”。Copilot生成一个自然语言摘要，你可以对其进行修改并包含在提交中。这使历史记录清晰，并提高了团队的可视性。
- en: This workflow shows how Copilot can streamline the debugging process end-to-end.
    It explains vague error messages, suggests targeted fixes, and even drafts commit
    summaries that clearly describe the change. By reducing the manual steps between
    failure and resolution, it keeps development moving forward with less context-switching.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工作流程展示了Copilot如何从头到尾简化调试过程。它解释了模糊的错误信息，提出了针对性的修复方案，甚至草拟了提交摘要，清晰地描述了变更。通过减少故障和解决之间的手动步骤，它使开发工作在更少的上下文切换中向前推进。
- en: 'Scenario 2: Infrastructure automation and CI/CD improvements'
  id: totrans-270
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景2：基础设施自动化和CI/CD改进
- en: Imagine you are maintaining a service that generates large log files, and you
    want to automate both cleanup and security checks in your pipeline. How do you
    proceed?
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你正在维护一个生成大量日志文件的服务，你希望在管道中自动化清理和安全检查。你将如何进行？
- en: 'To start, generate a reusable script for log management from the terminal using
    GitHub Copilot CLI. In the session, enter the following prompt:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，使用GitHub Copilot CLI从终端生成用于日志管理的可重用脚本。在会话中，输入以下提示：
- en: '[PRE18]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'GitHub Copilot returns a draft script that compresses older logs and removes
    files beyond your retention window. Review the output, make any edits you need,
    and save the script for use in your environment:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot返回一个草稿脚本，该脚本压缩旧日志并删除超出保留窗口的文件。审查输出，进行任何必要的编辑，并将脚本保存到你的环境中使用：
- en: '![Figure 5.13: Script generation using GitHub Copilot CLI for automated log
    cleanup](img/B34107_05_13.png)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![图5.13：使用GitHub Copilot CLI生成自动化日志清理脚本](img/B34107_05_13.png)'
- en: 'Figure 5.13: Script generation using GitHub Copilot CLI for automated log cleanup'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.13：使用GitHub Copilot CLI生成自动化日志清理脚本
- en: 'Next, you want to strengthen your GitHub Actions pipeline with a security scan.
    In VS Code, open your workflow YAML file, highlight the relevant section, and
    prompt Copilot as follows:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你想要通过安全扫描加强你的GitHub Actions管道。在VS Code中打开你的工作流程YAML文件，突出显示相关部分，并像以下这样提示Copilot：
- en: '[PRE19]'
  id: totrans-278
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Copilot proposes a properly structured YAML block that runs the Trivy scanner.
    You insert the new step, adjust parameters for your environment, and commit the
    change.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot提出一个结构良好的YAML块，用于运行Trivy扫描器。你插入新步骤，调整适合你环境的参数，并提交更改。
- en: Before pushing upstream, you run the updated workflow locally (using a runner
    that supports local execution). The new security scan step surfaces a dependency
    warning. You paste the output into Copilot Chat and ask for a summary. Copilot
    explains the issue in plain language and suggests actions, such as updating the
    affected library.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 在推送到上游之前，你会在本地运行更新的工作流程（使用支持本地执行的运行器）。新的安全扫描步骤显示了一个依赖警告。你将输出粘贴到Copilot Chat中，并请求摘要。Copilot用普通语言解释问题，并提出行动建议，例如更新受影响的库。
- en: This workflow shows how Copilot supports infrastructure automation end-to-end.
    It generates the scripts you need, assists in updating your CI/CD definitions,
    and helps you interpret the results, all within the same development loop.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工作流程展示了Copilot如何从头到尾支持基础设施自动化。它生成你需要的脚本，帮助你更新CI/CD定义，并帮助你解释结果，所有这些都在同一个开发循环中完成。
- en: 'Scenario 3: Reviewing and documenting a feature branch'
  id: totrans-282
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景 3：审查和记录功能分支
- en: Imagine you are working on a feature branch and want to prepare it for team
    review and documentation.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在处理一个功能分支，并希望为其准备团队审查和文档。
- en: 'Begin by checking out the branch and staging your changes. With those changes
    ready, highlight the diff or key files in your IDE and prompt GitHub Copilot with
    the following:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，检出分支并预存你的更改。更改准备就绪后，在你的 IDE 中突出显示差异或关键文件，并按以下方式提示 GitHub Copilot：
- en: '[PRE20]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Copilot generates a natural-language summary that captures the intent of the
    changes, along with potential risks, such as performance impacts or areas where
    additional testing may be needed.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 生成一个自然语言摘要，捕捉变更的意图，以及潜在风险，例如性能影响或可能需要额外测试的区域。
- en: Next, adapt GitHub Copilot’s draft into a review-ready summary. You can use
    it as the basis for a manual pull request description, add it to your commit history,
    or include it in project documentation. This ensures your work is clearly communicated,
    even if your team is not using GitHub.com for pull requests.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将 GitHub Copilot 的草案改编成审查就绪的摘要。你可以将其用作手动拉取请求描述的基础，添加到你的提交历史中，或包含在项目文档中。这确保了你的工作得到清晰传达，即使你的团队不使用
    GitHub.com 进行拉取请求。
- en: Finally, share Copilot’s summary and risk notes with your team. This gives reviewers
    a clear starting point, highlights important concerns, and improves the quality
    of feedback. Even teams working outside hosted pull request workflows benefit
    from having concise, consistent documentation of what a feature branch introduces.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，与你的团队分享 Copilot 的摘要和风险笔记。这为审查者提供了一个清晰的起点，突出了重要关注点，并提高了反馈质量。即使在托管拉取请求工作流程之外工作的团队，也能从对功能分支引入的内容进行简洁、一致的文档记录中受益。
- en: This workflow shows how Copilot helps with the often time-consuming process
    of documenting and reviewing changes. It summarizes the purpose of a feature,
    identifies potential risks, and generates review-ready notes that can be shared
    with teammates. Even outside of hosted pull request workflows, this makes feature
    reviews faster, clearer, and easier to communicate.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 此工作流程展示了 Copilot 如何帮助处理通常耗时较长的文档和审查变更的过程。它总结了功能的目的，识别潜在风险，并生成可供与团队成员分享的审查就绪笔记。即使在托管拉取请求工作流程之外，这也使得功能审查更快、更清晰、更容易沟通。
- en: 'Scenario 4: End-to-end testing workflow'
  id: totrans-290
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景 4：端到端测试工作流程
- en: Imagine you are building and validating an API endpoint and want to make sure
    it is thoroughly tested.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你正在构建和验证一个 API 端点，并确保它经过彻底测试。
- en: 'Begin by writing the function for the `add()` endpoint. From there, highlight
    the code in your IDE and prompt GitHub Copilot as follows:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，编写 `add()` 端点的函数。然后，在你的 IDE 中突出显示代码，并按如下方式提示 GitHub Copilot：
- en: '[PRE21]'
  id: totrans-293
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Copilot produces a draft test file with a fixture for the client and assertions
    to check that new tasks are added correctly. This gives you a starting point that
    can be refined as your feature evolves:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 生成一个包含客户端固定值和检查新任务是否正确添加的断言的测试文件草案。这为你提供了一个起点，随着功能的演变可以进行细化：
- en: '![Figure 5.14: Generate unit tests](img/B34107_05_14.png)'
  id: totrans-295
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.14：生成单元测试](img/B34107_05_14.png)'
- en: 'Figure 5.14: Generate unit tests'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.14：生成单元测试
- en: 'Next, run the generated tests. When a failure occurs, copy the error output
    into GitHub Copilot Chat and prompt as follows:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，运行生成的测试。当发生失败时，将错误输出复制到 GitHub Copilot Chat，并按如下方式提示：
- en: '[PRE22]'
  id: totrans-298
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Copilot analyzes the failure, explains the cause in plain language, and suggests
    specific adjustments to the code or test. You apply the advice, rerun the tests,
    and repeat the process until they all pass.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 分析失败原因，用通俗易懂的语言解释原因，并提出对代码或测试的具体调整建议。你应用这些建议，重新运行测试，并重复此过程，直到所有测试通过。
- en: This workflow shows how Copilot supports the full test cycle. It helps generate
    initial test cases, clarifies failures, and suggests fixes, reducing the time
    it takes to move from implementation to reliable end-to-end validation.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 此工作流程展示了 Copilot 如何支持完整的测试周期。它有助于生成初始测试用例，阐明失败原因，并提出修复建议，从而减少从实现到可靠端到端验证所需的时间。
- en: Best practices for workflow integration
  id: totrans-301
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作流程集成最佳实践
- en: 'The preceding scenarios show how GitHub Copilot can support every phase of
    development, from debugging and testing to automation and reviews. To keep that
    flow consistent, apply these best practices when integrating GitHub Copilot into
    your daily workflow:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 上述场景展示了 GitHub Copilot 如何支持开发的每个阶段，从调试和测试到自动化和审查。为了保持这种流程的一致性，在将 GitHub Copilot
    集成到日常工作中时，请应用以下最佳实践：
- en: '**Move seamlessly** : Use GitHub Copilot in your editor, terminal, and code
    review steps, keeping everything in one place'
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无缝迁移**：在编辑器、终端和代码审查步骤中使用 GitHub Copilot，将所有内容保持在同一位置'
- en: '**Prompt for each phase** : Start with explanation, move to fix, then summarize
    and review'
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每个阶段的提示**：从解释开始，然后转到修复，接着总结和回顾'
- en: '**Mix and match languages** : Copilot handles JavaScript, Python, Bash, PowerShell,
    YAML, SQL, Bicep, and more—use the right tool for each task'
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合匹配语言**：Copilot 处理 JavaScript、Python、Bash、PowerShell、YAML、SQL、Bicep 等语言——为每个任务使用正确的工具'
- en: Common pitfalls to avoid
  id: totrans-306
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'By combining Copilot’s IDE integrations for editing, scripting, debugging,
    reviewing, and automation, you can move faster and keep your focus on solving
    problems, not juggling tools. But no tool is perfect. These are the most common
    pitfalls to watch out for and how to avoid them:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合 Copilot 的编辑、脚本、调试、审查和自动化 IDE 集成，你可以更快地工作，并将注意力集中在解决问题上，而不是在工具之间切换。但没有任何工具是完美的。以下是你要注意的常见陷阱以及如何避免它们：
- en: '**Skipping reviews** : Moving fast is great, but always check Copilot’s output
    for errors or risky changes before committing.'
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跳过审查**：快速移动很好，但在提交之前，始终检查 Copilot 的输出是否存在错误或风险更改。'
- en: '**No testing** : Run generated code in a safe environment first, so you catch
    problems before they hit production.'
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有测试**：首先在安全环境中运行生成的代码，以便在它们进入生产环境之前发现问题。'
- en: '**Vague prompts** : `Fix this code` is too broad. Be specific so Copilot can
    give precise, useful results.'
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模糊的提示**：“修复这段代码”太宽泛了。要具体，以便 Copilot 可以提供精确、有用的结果。'
- en: '**Missing context** : Include relevant code, diffs, or error output so Copilot
    can see the full picture.'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺少上下文**：包括相关的代码、差异或错误输出，以便 Copilot 可以看到全貌。'
- en: '**Ignoring standards** : Even if the code works, make sure it matches your
    team’s naming, formatting, and security rules.'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽略标准**：即使代码可以工作，也要确保它符合你团队的命名、格式和安全规则。'
- en: Quick reference checklist
  id: totrans-313
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速参考清单
- en: 'Before accepting GitHub Copilot’s suggestions, ask yourself the following:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 在接受 GitHub Copilot 的建议之前，请问自己以下问题：
- en: Does this output do what I actually want?
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个输出是否是我真正想要的？
- en: Is it safe to run, commit, or share?
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行、提交或分享是否安全？
- en: Can I test and validate the changes locally?
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我能否在本地测试和验证更改？
- en: Have I reviewed the logic, commands, or scripts for edge cases?
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否审查了边缘情况的逻辑、命令或脚本？
- en: Is the style and approach consistent with my team/project?
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 风格和方法是否与我的团队/项目一致？
- en: Have I provided enough context to get a high-quality suggestion?
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否提供了足够的信息以获得高质量的建议？
- en: When in doubt, treat GitHub Copilot as your copilot, not the pilot. Review,
    revise, and test. If something feels off, ask for clarification or break the problem
    down further.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 当有疑问时，将 GitHub Copilot 视为你的副驾驶，而不是驾驶员。进行审查、修改和测试。如果感觉有问题，请要求澄清或进一步分解问题。
- en: Summary
  id: totrans-322
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'You learned how GitHub Copilot works inside the IDE and terminal to support
    real work, not just completions: prompting from the terminal and Command Palette,
    using GitHub Copilot CLI to generate and explain scripts, asking for help while
    debugging to interpret stack traces and suggest fixes, and running local reviews
    to produce clear commit messages and manual pull request summaries. You also saw
    test runners and code analysis in action, along with practical scenarios that
    tie these pieces together. This matters because it keeps you in one flow. You
    can script, review, test, and debug with less context switching, clearer documentation,
    and safer execution when you review suggestions before running them.'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 你学习了如何在 IDE 和终端中操作 GitHub Copilot 以支持实际工作，而不仅仅是完成：从终端和命令面板进行提示，使用 GitHub Copilot
    CLI 生成和解释脚本，在调试时请求帮助以解释堆栈跟踪并提出修复方案，以及进行本地审查以生成清晰的提交信息和手动拉取请求摘要。你还看到了测试运行器和代码分析的实际操作，以及将这些元素联系起来的实际场景。这很重要，因为它让你保持在一个流程中。在运行之前审查建议，你可以以更少的上下文切换、更清晰的文档和更安全的执行来编写脚本、审查、测试和调试。
- en: In the next chapter, you’ll see how GitHub Copilot extends beyond local development
    to enhance collaboration on GitHub.com itself, where it summarizes pull requests,
    assists with code reviews, and streamlines web-based automation to help teams
    work more efficiently together.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，你将看到 GitHub Copilot 如何超越本地开发，增强在 GitHub.com 上的协作，其中它总结拉取请求、协助代码审查，并简化基于网络的自动化，以帮助团队更有效地一起工作。
