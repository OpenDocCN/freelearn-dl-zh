    Julie Terberg’s following post will be helpful: [https://designtopresent.com/2018/06/14/an-update-on-safe-fonts-for-powerpoint/](https://designtopresent.com/2018/06/14/an-update-on-safe-fonts-for-powerpoint/)'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你使用的是比Microsoft 365或Office 2019更早的PowerPoint版本，朱莉·特伯格的以下帖子将有所帮助：[https://designtopresent.com/2018/06/14/an-update-on-safe-fonts-for-powerpoint/](https://designtopresent.com/2018/06/14/an-update-on-safe-fonts-for-powerpoint/)
- en: 'Julie Terberg’s article on cloud fonts, and access to her PDF guide: [https://designtopresent.com/2019/03/31/a-guide-to-cloud-fonts-in-microsoft-office-365/](https://designtopresent.com/2019/03/31/a-guide-to-cloud-fonts-in-microsoft-office-365/)'
  id: totrans-130
  prefs:
