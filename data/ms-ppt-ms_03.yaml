- en: 'Dave Paradi’s tables on choosing font sizes according to venue and screen sizes:
    [https://www.thinkoutsidetheslide.com/selecting-the-correct-font-size/](https://www.thinkoutsidetheslide.com/selecting-the-correct-font-size/)'
  id: totrans-132
