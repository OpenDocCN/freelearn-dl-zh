- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: Using Industry Best Practices to Design Better Visuals
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用行业最佳实践来设计更好的视觉元素
- en: Even though presentations have been created millions of times since PowerPoint’s
    initial release in 1990, the presentation industry is much younger. It took many
    years before some people developed expertise in terms of what works for the audience
    and the presenter. Since research on the specific topic of presentations with
    the help of PowerPoint also had a slow start, we mostly had to use trial and error
    for a while.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管自1990年PowerPoint首次发布以来，已经创建了数百万个演示文稿，但演示文稿行业却相对较年轻。在许多人发展出关于对观众和演讲者有效的方法的专长之前，已经过去了很多年。由于借助PowerPoint对演示文稿的具体主题的研究也起步较慢，我们不得不在一段时间内主要依靠试错。
- en: 'Luckily, the presentation industry has matured, and we now have reliable experts
    helping us define best practices. Also, the **Presentation Guild** , an organization
    created by industry experts in 2015, has established professional presentation
    standards that are generally accepted by the industry. They guide presentation
    craftspeople in nine categories: audio-visual, branding, color, data visualization,
    functionality, images, layout, motion, and typography (see the *Further reading*
    section at the end of the chapter).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，演示文稿行业已经成熟，我们现在有可靠的专家帮助我们定义最佳实践。此外，**演示文稿协会**，一个由行业专家于2015年创建的组织，已经建立了行业普遍接受的专业演示文稿标准。他们指导九个类别的演示文稿工匠：视听、品牌、色彩、数据可视化、功能、图像、布局、动画和排版（请参阅本章末尾的*进一步阅读*部分）。
- en: Of course, today’s best practices are also influenced by the requirements of
    making presentations more accessible to people with disabilities. When you are
    the person in charge of planning and creating all your presentations without any
    formal design training or knowledge of what makes content accessible, it can become
    challenging and stressful.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，今天的最佳实践也受到使演示文稿对残疾人士更易于访问的要求的影响。当您是负责计划和创建所有演示文稿的人，而且没有任何正式的设计培训或了解什么使内容易于访问时，这可能会变得具有挑战性和压力。
- en: This is why I have included this chapter before diving into all the content
    creation and delivery features in the following chapters and sections. I want
    to help any business professional that wants to create better presentations. The
    goal of this chapter is not to help you become an expert presentation designer.
    It’s designed to help regular businesspeople apply basic best practices so that
    they can create better visuals and more professional-looking presentations.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么我在深入到以下章节和部分的所有内容创作和交付功能之前，先包括了这个章节。我想帮助任何想要创建更好演示文稿的商业专业人士。本章的目标不是帮助你成为演示文稿设计师的专家。它旨在帮助普通商业人士应用基本最佳实践，以便他们可以创建更好的视觉元素和看起来更专业的演示文稿。
- en: 'Even if you don’t have a lot of time, you will be able to review your slides
    according to the topics shared in the five sections of this chapter:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 即使您没有很多时间，您也能根据本章五个部分的共享主题来审查您的幻灯片：
- en: Choosing fonts
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择字体
- en: Using the right font size
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用合适的字体大小
- en: Learning about contrast
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解对比度
- en: Decluttering your slide contents
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清理您的幻灯片内容
- en: Standardizing the look and feel of your slides
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准化您的幻灯片的外观和感觉
- en: Technical requirements
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: The topics discussed in this chapter can be applied to whatever version of PowerPoint
    you are using. When some features are available only in newer versions, I will
    let you know.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论的主题可以应用于您使用的任何版本的PowerPoint。当某些功能仅在新版本中可用时，我会通知您。
- en: Choosing fonts
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择字体
- en: Font choices have evolved very much throughout the years. For those who have
    been working in **Microsoft Office** for a long time, I’m sure you remember **Arial**
    and **Times New Roman** ! Those fonts have bee n around for such a long time that
    users started using anything else that felt new, pretty, or funky just because
    they were bored. This was not always in the best interest of their audience, I
    must say. When creating your content, you need to make sure your fonts are readable
    by audience members whatever venue they are sitting in, and regardless of the
    device they are using to watch your presentation.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 字体选择在多年间发生了很大的变化。对于那些长期在**Microsoft Office**中工作的人来说，我敢肯定你们还记得**Arial**和**Times
    New Roman**！这些字体已经存在了很长时间，以至于用户开始使用任何感觉新颖、漂亮或有趣的东西，仅仅是因为他们感到无聊。我必须说，这并不总是符合他们观众的最佳利益。在创建内容时，您需要确保您的字体无论观众坐在什么场合都能阅读，并且无论他们使用什么设备观看演示文稿。
- en: 'Before diving into the basics, let’s clarify a few terms used by professionals
    in the industry:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入基础知识之前，让我们澄清一下行业专业人士使用的几个术语：
- en: '**Typography** : This refers to the way lett ers are arranged to make text
    visually appealing.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**排版**：这指的是字母的排列方式，使其文本看起来更具视觉吸引力。'
- en: '**Font** : This usually r efers to the various weights, widths, and styles
    found in a typeface. An exa mple would be **Bold** or **Italics** .'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字体**：这通常指的是在字体中发现的多种重量、宽度和样式。一个例子就是**粗体**或**斜体**。'
- en: '**Typeface** : This is a design style for a family of related fonts. As an
    example, **Arial** is a typeface constituted of many fonts such as **Arial Black**
    and **Arial Narrow** .'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字体族**：这是为一系列相关字体设计的风格。例如，**Arial**是一种由许多字体组成的字体族，如**Arial Black**和**Arial
    Narrow**。'
- en: Since this book’s goal is to help regular business users without a formal design
    background, I will mostly be using the word *font* from now on. After all, most
    presentation creators will refer to fonts, not typef aces.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这本书的目标是帮助没有正式设计背景的普通商业用户，从现在起我将主要使用“字体”这个词。毕竟，大多数演示创建者都会提到字体，而不是字体族。
- en: Which font category should you use?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你应该使用哪种字体类别？
- en: 'If you have scrolled down the list of fonts available in PowerPoint, you have
    probably noticed there are many to choose from, especially if you are using PowerPoint
    in **Microsoft 365** **(M365)** . Here are four common categories you will find
    in that list, all of which are represented in *Figure 2.1* :'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经滚动过PowerPoint中可用的字体列表，你可能已经注意到有很多可供选择，尤其是如果你在**Microsoft 365** **(M365)**中使用PowerPoint。以下是你将在该列表中找到的四个常见类别，所有这些类别都在*图2.1*中有所展示：
- en: '**Serif** : This font category was first used for print; it is characterized
    by small lines that extend the letters ( *serifs* ). The letter stroke, or thickness
    of the line, will vary within a letter and between the various letters.'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**衬线字体**：这个字体类别最初用于印刷；它以延伸字母的小线条（*衬线*）为特征。字母的笔画，或线条的粗细，会在字母内部以及不同字母之间有所变化。'
- en: '**Sans Serif** : As the name implies, there are no extended lines, and usually
    the thickness of the line is the same for all letters.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无衬线字体**：正如其名所示，没有延伸的线条，通常线条的粗细对所有字母都是相同的。'
- en: '**Decorative** : These fonts use embellished and stylized letters.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**装饰性字体**：这些字体使用装饰性和风格化的字母。'
- en: '**Script** : This is designed to look like cursive han dwriting.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**手写体**：这种字体设计得看起来像手写书法。'
- en: '![Figure 2.1 – Common font categories in PowerPoint](img/B32063_02_01.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图2.1 – PowerPoint中的常见字体类别](img/B32063_02_01.png)'
- en: Figure 2.1 – Common font categories in PowerPoint
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1 – PowerPoint中的常见字体类别
- en: Font experts might say that there are other categories. Again, for the sake
    of keeping this book relevant to businesspeople, I have kept the previous list
    very simple so that it is easier to decide which fonts you should use for your
    next presentation.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 字体专家可能会说还有其他类别。再次强调，为了使这本书对商人来说相关，我已将之前的列表保持得很简单，这样更容易决定你下次演示应该使用哪种字体。
- en: Now that you have learned about four font categories, let’s discuss which ones
    should be used. When Serif fonts were introduced for print, they were considered
    easier to read because of their serifs. More research has been done on readability,
    and it seems people suffering from different visual disabilities, such as dyslexia,
    might have difficulty reading Serif fonts. This is one reason why Sans Serif fonts
    have become more popular, another being that this category of font also seems
    to be easier to read for content that is presented on screens.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了四种字体类别，让我们讨论一下应该使用哪些。当衬线字体首次用于印刷时，由于衬线，它们被认为更容易阅读。关于可读性的研究已经进行了更多，似乎患有不同视觉障碍的人，如阅读障碍，可能难以阅读衬线字体。这就是无衬线字体变得更为流行的原因之一，另一个原因是这种字体类别似乎也更容易阅读屏幕上呈现的内容。
- en: When creating your presentations, try to use Sans Serif fonts most of the time.
    If you must use a corporate template that includes only Serif fonts, try to limit
    the text you are using and, as will be discussed in the next section, use a larger
    font size so your text is easily readable. If your corporate template uses a Serif
    and a Sans Serif font, try to use the Sans Serif font for body text.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建你的演示文稿时，尽量大部分时间使用无衬线字体。如果你必须使用只包含衬线字体的公司模板，尽量限制你使用的文本，并在下一节中讨论的，使用更大的字体大小，以便你的文本易于阅读。如果你的公司模板使用衬线字体和无衬线字体，尽量使用无衬线字体作为正文文本。
- en: If y ou feel you must use a Decorative or Script font to convey a particular
    mood or emotion, try to use them *only* for a few keywords, not full sentences.
    This is the only way you will be able to ensure your text is easily readable.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您觉得必须使用装饰性或手写体字体来传达特定的情绪或情感，请尽量只用于几个关键词，而不是完整的句子。这是您确保文本易于阅读的唯一方法。
- en: Font compatibility issues
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 字体兼容性问题
- en: Over the years, many users have encountered presentation formatting problems
    when delivering their presentations from other computers. Most of the time, those
    issues were caused by using fonts that were not present in all versions of PowerPoint.
    The best solution would be to use M365 licenses, but since it might not be a possibility
    for everyone, the issues led my friend and colleague Julie Terberg, from *Terberg
    Design* , to publish extensively about **safe fonts** (see the *Further reading*
    section for links). This term essentially means that if you want to make sure
    your presentations will look good on other computers using other PowerPoint versions
    or operating systems, you need to stick to a short list of fonts that can be embedded
    or are present in older versions.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，许多用户在从其他电脑上展示他们的演示文稿时遇到了演示文稿格式问题。大多数情况下，这些问题是由使用在PowerPoint的所有版本中都不存在的字体引起的。最好的解决方案是使用M365许可证，但由于这可能不是每个人的可能性，这些问题导致我的朋友和同事Julie
    Terberg，来自*Terberg Design*，广泛地发表了关于**安全字体**的文章（在*进一步阅读*部分中提供链接）。这个术语基本上意味着，如果您想确保您的演示文稿在其他使用其他PowerPoint版本或操作系统的电脑上看起来很好，您需要坚持使用可以嵌入或存在于旧版本中的字体列表。
- en: '**Font embeddability** refers to the ability to include fonts within a presentation,
    so text appears correctly on devices where the font is not installed.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**字体可嵌入性**指的是在演示文稿中包含字体的能力，这样文本就可以在字体未安装的设备上正确显示。'
- en: However, embedded fonts are not recognized in Office for Mac unless you are
    using M365 or are using PowerPoint for Mac version 16.17 or newer.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，除非您使用M365或使用PowerPoint for Mac版本16.17或更高版本，否则在Office for Mac中无法识别嵌入的字体。
- en: 'Luckily for users, the introduction of **cloud fonts** in M365 made everyone’s
    life easier. Yes, this does mean that only users with an M365 subscription will
    be able to choose and insert cloud fonts, which are represented by a small cloud
    icon with an arrow in the font drop-down list in *Figure 2.2* :'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，对于用户来说，M365中**云字体**的引入使每个人的生活都变得更简单。是的，这意味着只有拥有M365订阅的用户才能选择和插入云字体，这些字体在*图2.2*中的字体下拉列表中由一个带有箭头的小云图标表示：
- en: '![Figure 2.2 – Cloud fonts are identified with a cloud icon](img/B32063_02_02.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图2.2 – 云字体通过云图标识别](img/B32063_02_02.png)'
- en: Figure 2.2 – Cloud fonts are identified with a cloud icon
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.2 – 云字体通过云图标识别
- en: But since cloud fonts can be embedded, your presentation can be viewed in the
    newer standalone Office 2021 and 2024 versions of PowerPoint without any problem.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 但由于云字体可以嵌入，您的演示文稿可以在没有问题的前提下在较新的独立Office 2021和2024版本的PowerPoint中查看。
- en: Office 2019 support stops in October 2025.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Office 2019的支持将在2025年10月停止。
- en: There are many more details you should be aware of if you often create presentations
    that use various styles of fonts. Since this book’s goal is not to discuss fonts
    extensively, I encourag e you to visit Julie Terberg’s site mentioned in the *Further
    reading* section. She has a great article on cloud fonts and a new whitepaper,
    *Choosing fonts for PowerPoint templates* , that will help guide you with your
    font choices so that you reduce the risk of rendering issues because of compatibi
    lity problems.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您经常创建使用各种字体样式的演示文稿，那么您应该注意的细节还有很多。由于本书的目标不是深入讨论字体，我鼓励您访问*进一步阅读*部分中提到的Julie
    Terberg的网站。她有一篇关于云字体的优秀文章，以及一份新的白皮书，*为PowerPoint模板选择字体*，这将帮助您在字体选择上得到指导，从而降低因兼容性问题导致的渲染问题风险。
- en: Checklist to help you review font choices
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 帮助您审查字体选择的清单
- en: 'I know t hat discussing font styles and compatibility might not be helpful
    enough for you to feel comfortable choosing fonts for your next presentation.
    Therefore, I’ll share with you a short checklist you can use to review your font
    choices:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道讨论字体样式和兼容性可能不足以让您在为下一次演示文稿选择字体时感到舒适。因此，我将与您分享一个简短的清单，您可以使用它来审查您的字体选择：
- en: Avoid stylized and hard-to-read fonts for your titles and content text.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免在标题和内容文本中使用风格化和难以阅读的字体。
- en: Use a maximum of two font styles in your presentation. It will make your content
    more consistent. For example, use one style for titles and another for content.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的演示中最多使用两种字体样式。这将使你的内容更加一致。例如，使用一种样式用于标题，另一种用于内容。
- en: Check for potential font compatibility issues, especially if you are creating
    a presentation for someone else, or if the presentation will be shown from various
    computers.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查潜在的字体兼容性问题，特别是如果你是为他人创建演示，或者演示将在不同的计算机上展示时。
- en: Avoid using title case. You should use sentence case instead to increase readability.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免使用标题格式。你应该使用句子格式来提高可读性。
- en: '**Title Case** Means Capitalizing Each Word.'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标题格式**意味着每个单词的首字母都大写。'
- en: '**Sentence case** uses a capital letter only for the first letter.'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**句子格式**只对第一个字母使用大写字母。'
- en: Using uppercase everywhere will make it more difficult to read. Keep uppercase
    lettering for when you have fewer words to read.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在所有地方都使用大写字母会使阅读更困难。只有在你需要阅读的单词较少时才使用大写字母。
- en: Use bold for emphasis on ly.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仅使用粗体来强调。
- en: Use italics moderately; my personal choice is to avoid it altogether. Italicized
    letters don’t show as well in presentations and make your content harder to read.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适度使用斜体；我个人的选择是完全避免使用斜体。斜体字母在演示中显示不佳，会使你的内容更难阅读。
- en: Now that you know more about font styles and how to choose more appropriately,
    we can proceed with how font size needs to be considered to make your presentations
    easier to read and make them more impactful.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你对字体样式和如何更合适地选择有了更多的了解，我们可以继续讨论如何考虑字体大小，以便使你的演示更容易阅读并更具影响力。
- en: Using the right font size
  id: totrans-55
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用合适的字体大小
- en: 'When PowerPoint presentations became more common in boardrooms and events,
    we often heard people complaining about having trouble reading text because it
    was too small. That also highlighted another problem: having too much text on
    slides! That problem arises because many presenters fear forgetting what they
    have to say. That is why we have [*Chapter 13*](Chapter_13.xhtml#_idTextAnchor1296)
    , *Using Presenter View* , and [*Chapter 14*](Chapter_14.xhtml#_idTextAnchor1366)
    , *Using PowerPoint Live in Microsoft Teams* . You won’t have an excuse for putting
    all your text on your slides ever again.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当PowerPoint演示在会议室和活动中变得更为常见时，我们经常听到人们抱怨因为文本太小而难以阅读。这也突出了另一个问题：幻灯片上文本过多！这个问题产生的原因是许多演讲者害怕忘记他们要说的内容。这就是为什么我们有[*第13章*](Chapter_13.xhtml#_idTextAnchor1296)，“使用演示者视图”，和[*第14章*](Chapter_14.xhtml#_idTextAnchor1366)，“在Microsoft
    Teams中使用PowerPoint Live”。你将不再有理由将所有文本都放在你的幻灯片上了。
- en: But back to our font size topic. When you present, your main goal should be
    that your audience can quickly grasp what is on the screen so that they can focus
    their attention back on you quickly. Human beings relate to other human beings,
    not words written on slides. Further, asking an audience to read your slides in
    a large venue does not require the same font size as when you are presenting in
    a boardroom or online. That is why font size matters.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 但回到我们的字体大小话题。当你进行演示时，你的主要目标应该是让你的观众能够快速抓住屏幕上的内容，以便他们可以快速将注意力转回到你身上。人类与人类相关，而不是与幻灯片上的文字相关。此外，要求观众在大场合阅读你的幻灯片并不需要与你在会议室或在线演示时相同的字体大小。这就是为什么字体大小很重要。
- en: 'Selecting the right font size has created many debates over the years. But
    in the end, the goal should always be to make it as easy as possible for everyone
    attending your pres entation to read whatever text you have on your slides. My
    personal rule of thumb, whether I’m creating slides for someone else or myself,
    is as follows:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的字体大小多年来一直引发了许多争论。但最终，目标始终应该是让所有参加你演示的人尽可能容易地阅读你幻灯片上的任何文本。我个人的经验法则，无论是为他人还是为自己制作幻灯片，如下：
- en: '**Titles** : Between 32 and 44 points'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标题字体大小**：介于32到44点之间'
- en: '**Content** : Between 28 and 32 points'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内容字体大小**：介于28到32点之间'
- en: I find these ranges adapt well to most presentation needs, even if I usually
    adapt sizes during my delivery practice in a venue or a virtual test run. If you
    present mostly in large venues and meeting rooms, I suggest you have a look at
    my friend Dave Paradi’s post on font size listed in the *Further reading* section.
    He put together tables that reduce the guesswork, making it easy to select your
    font size according to the size of the room and the screen.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现这些范围很好地适应了大多数演示需求，尽管我通常在场地或虚拟测试运行中调整大小。如果你主要在大场地和会议室进行演示，我建议你查看我的朋友Dave Paradi在*进一步阅读*部分中关于字体大小的帖子。他整理了表格，减少了猜测，使得根据房间大小和屏幕大小选择字体大小变得容易。
- en: If you are doubting my size rule of thumb, have a look at what various sizes
    look like when compared to one another in *Figure 2.3* . Of course, the image
    has been downsized for the book. But it does a pretty good job of showing how
    difficult it can be to read **Arial 18** points when looking at a presentation
    on a small screen.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对我的大小规则有疑问，可以看看在*图 2.3*中不同大小相互比较时的样子。当然，图片已经缩小以适应书籍。但它很好地展示了在小屏幕上查看演示时阅读**Arial
    18**号字体有多困难。
- en: It also shows you that using a different font style can also change how its
    siz e is perceived.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这也表明，使用不同的字体样式也可以改变其大小感知方式。
- en: '![Figure 2.3 – Font size comparison](img/B32063_02_03.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.3 – 字体大小比较](img/B32063_02_03.png)'
- en: Figure 2.3 – Font size comparison
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.3 – 字体大小比较
- en: Take some time to test font sizes before your presentation. Take even more time
    if you are presenting in a hybrid mode, such as having some participants in the
    venue and oth ers watching from various screen sizes remotely. Now that we have
    discussed font styles and sizes, the next section on contrast will help us conclude
    important best practices that relate to fonts.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的演示之前，花一些时间测试字体大小。如果你是在混合模式下进行演示，比如有些参与者在场，而其他人从不同屏幕大小的远程观看，那么你需要花费更多的时间。现在我们已经讨论了字体样式和大小，下一节关于对比度的内容将帮助我们得出与字体相关的重要最佳实践。
- en: Learning about contrast
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 了解对比度
- en: '**Contrast** is what allows us to see different elements easily, such as text
    on a colored background, or various shapes close to one another. We all have some
    favorite colors that we would like to use or corporate colors we must respect
    but, in the end, it always comes down to making sure our audience will be able
    to see and understand our content.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**对比度**使我们能够轻松地看到不同的元素，例如在彩色背景上的文本，或者彼此靠近的各种形状。我们都有一些我们想要使用或必须尊重的标志性颜色，但最终，这总是归结于确保我们的观众能够看到并理解我们的内容。'
- en: Some online tools can help you calculate the contrast ratio between the background
    color and text color, especially now that many countries have put together rules
    that organizations should follow to make their content more accessible. You can
    simply do an online search with `contrast checker` as keywords, and you will get
    a list of v arious sites that offer the tool. In [*Chapter 4*](Chapter_04.xhtml#_idTextAnchor387)
    , there is a section discussing PowerPoint’s accessibility checker, which includes
    verification of contrast. In [*Chapter 11*](Chapter_11.xhtml#_idTextAnchor1099)
    , the section on **BrightCarbon** has information about one of their add-ins that
    also includes contrast verification.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 一些在线工具可以帮助你计算背景颜色和文本颜色之间的对比度比率，尤其是在许多国家已经制定出组织应遵循的规则，以使他们的内容更具可访问性之后。你只需用“对比度检查器”作为关键词进行在线搜索，你将得到一个提供该工具的网站列表。在[*第
    4 章*](Chapter_04.xhtml#_idTextAnchor387)中，有一个讨论PowerPoint可访问性检查器的部分，其中包括对比度验证。在[*第
    11 章*](Chapter_11.xhtml#_idTextAnchor1099)中，关于**BrightCarbon**的部分提供了他们的一款插件的信息，该插件也包括对比度验证。
- en: 'You can also just apply these basic rules:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以直接应用以下基本规则：
- en: If you’re using a light background, use text as dark as possible
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你使用的是浅色背景，请尽可能使用深色的文本
- en: If you’re using a dark background, use text as light as possible
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你使用的是深色背景，请尽可能使用浅色的文本
- en: 'To test contrast in prese ntations, I usually start my slideshow and move away
    from my computer screen to assess the readability of the text. I also try different
    lighting conditions to see whether it changes how the text appears. Even though
    the contrast example in *Figure 2.4* is in grayscale, we can easily see that the
    best contrast is with the first line of text, whether the background is light
    or dark:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试演示文稿中的对比度，我通常会打开我的幻灯片并离开电脑屏幕，以评估文本的可读性。我还尝试不同的光照条件，看看它是否会影响文本的显示效果。尽管*图2.4*中的对比度示例是灰度的，但我们很容易看出，最佳的对比度是在文本的第一行，无论背景是浅色还是深色：
- en: '![Figure 2.4 – Contrast examples with light and dark backgrounds](img/B32063_02_04.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图2.4 – 带浅色和深色背景的对比度示例](img/B32063_02_04.png)'
- en: Figure 2.4 – Contrast examples with light and dark backgrounds
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.4 – 带浅色和深色背景的对比度示例
- en: When choosing background and text colors, always make sure to use the darkest
    and lightest shades possible between the background and the text. If you use this
    rule of thumb, you will be able to quickly choose contrasting colors by simply
    testing their readability at different reading distances. If you want to use less
    contrasting colors, I suggest you take some time to use a contrast checker tool.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择背景和文本颜色时，始终确保在背景和文本之间使用最暗和最亮的色调。如果你使用这个经验法则，你将能够通过简单地测试它们在不同阅读距离下的可读性来快速选择对比色。如果你想使用对比度较小的颜色，我建议你花些时间使用对比度检查工具。
- en: 'A nother element you need to consider when assessing contrast is the use of
    background graphics or textures. As shown in *Figure 2.5* , using texture behind
    the text decreases readability even though the color is the same for both backgrounds:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在评估对比度时，你还需要考虑的一个因素是背景图形或纹理的使用。如图*图2.5*所示，即使在两种背景颜色相同的情况下，在文本后面使用纹理也会降低可读性：
- en: '![Figure 2.5 – A textured background reduces the readability of text](img/B32063_02_05.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图2.5 – 带纹理的背景降低了文本的可读性](img/B32063_02_05.png)'
- en: Figure 2.5 – A textured background reduces the readability of text
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.5 – 带纹理的背景降低了文本的可读性
- en: If the background of your slides must have a graphic of some sort because of
    a corporate template, make sure it is very subtle. The important element on your
    slide is your content, not a background t exture or graphic.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的幻灯片背景必须包含某种图形，因为公司模板的要求，请确保它非常微妙。你幻灯片上的重要元素是你的内容，而不是背景纹理或图形。
- en: Choosing colors wisely
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 聪明地选择颜色
- en: Human beings react to colors. It can even influence how your audience will react
    to your content. Over the years, I have referred many times to the [Colormatters.com](http://Colormatters.com)
    and [Colorcom.com](http://Colorcom.com) websites for guidance (see the *Further
    reading* section) and valuable information. In fact, that is where I found research-based
    information mentioning that color is so important in our lives that our subconscious
    mind judges many things based on color alone. This is the main reason you should
    choose colors wisely for your presentations.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 人类对颜色有反应。它甚至可以影响你的观众对你的内容的反应。多年来，我多次参考[Colormatters.com](http://Colormatters.com)和[Colorcom.com](http://Colorcom.com)网站以获取指导（见*进一步阅读*部分）和有价值的信息。事实上，正是在那里我找到了基于研究的信息，提到颜色在我们的生活中如此重要，以至于我们的潜意识根据颜色来判断许多事情。这就是你应该为你的演示文稿明智地选择颜色的主要原因。
- en: To help you, here is a sample of what meanings or emotions colors can convey
    (see *Figure 2.6* ). It should guide you when choosing what colors should be used
    for your presentations. As an example, businesses that want to be perceived as
    trustworthy often use blue, and nature-oriented businesses might want to us e
    green and brown.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你，这里有一个颜色可以传达的含义或情感的样本（见*图2.6*）。它应该指导你选择在演示文稿中应该使用哪些颜色。例如，希望被视为值得信赖的企业通常使用蓝色，而面向自然的企业可能希望使用绿色和棕色。
- en: '![Figure 2.6 – A sample list of some color meanings](img/B32063_02_06.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图2.6 – 一些颜色含义的样本列表](img/B32063_02_06.png)'
- en: Figure 2.6 – A sample list of some color meanings
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.6 – 一些颜色含义的样本列表
- en: Digging a little deeper into color meaning would be worth it if you need to
    present in various countries. Indeed, the symbolism of color might have a totally
    different meaning from one culture to another. If we take red as an example, its
    meaning in the North American stock market is a drop in stock prices while it
    denotes a rise in the East Asian stock market.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果需要在多个国家进行演示，深入研究颜色含义将非常有价值。确实，颜色的象征意义可能在不同文化间有着完全不同的含义。如果我们以红色为例，它在北美股市中意味着股价下跌，而在东亚股市中则表示股价上涨。
- en: 'Whatever the meaning conferred on colors, you also need to keep in mind that
    certain color co mbinations need to be avoided at all costs. Here is a short list
    of pairs to avoid and the reason why:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 无论颜色赋予的意义如何，你还需要记住，某些颜色组合必须不惜一切代价避免。以下是一个简短的避免颜色组合列表及其原因：
- en: '**Red and green** : They are hard to read and are problematic for people suffering
    from color blindness.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**红色和绿色**：它们难以阅读，对于色盲患者来说是个问题。'
- en: '**Red and blue** : They lack contrast and don’t project well together.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**红色和蓝色**：它们缺乏对比，放在一起效果不佳。'
- en: Red, blue, and green are not the only problematic colors. It would take many
    more pages of color research information to discuss them all, which is not the
    main goal of this book. But with the information you have now, you can create
    presentations that avoid using the most problematic colors together and use the
    ones that are the most meaningful for your content.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 红色、蓝色和绿色并不是唯一有问题的颜色。要讨论所有这些颜色，可能需要更多页面的颜色研究信息，但这不是本书的主要目标。但根据你目前所拥有的信息，你可以创建避免使用最有问题颜色的演示文稿，并使用对你内容最有意义的颜色。
- en: Let’s now move on to the next topic, covering how to remove unnecessary content
    from your slides so your audience understands your message quickly and remembers
    more.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们继续下一个主题，讨论如何从你的幻灯片中移除不必要的多余内容，以便你的观众能够快速理解你的信息并记住更多。
- en: Decluttering your slide contents
  id: totrans-92
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 清理你的幻灯片内容
- en: Unfortu nately, most people have seen their share of content-heavy and cluttered
    slides. Even though we all hate this situation, we encounter it repeatedly. I
    sometimes have the feeling that presenters are afraid the PowerPoint application
    will *explode* if they use too many slides. I have also had some clients tell
    me they were restricted to a certain number of slides! This is just a shame because
    we then end up having to read slides full of content and text.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，大多数人都有过看到内容过多且杂乱的幻灯片的经历。尽管我们都讨厌这种情况，但我们却反复遇到。我有时有一种感觉，演讲者害怕如果使用过多的幻灯片，PowerPoint
    应用程序会 *爆炸*。我也曾有一些客户告诉我，他们被限制在一定的幻灯片数量内！这真是太遗憾了，因为我们最终不得不阅读满是内容和文字的幻灯片。
- en: 'Let me share a secret with you: *the more content on your slides, the less
    readable they get, making the message very difficult to remember* . Usually, slides
    full of content also lead to the use of very small font sizes. You’ve probably
    heard, at least once in your life: “I don’t know if you can read the figures in
    this table, but....”. If you have a hard time reading the content yourself, why
    even bother showing it to your audience?'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 让我与你分享一个秘密：*幻灯片上的内容越多，可读性越差，使得信息非常难以记住*。通常，内容丰富的幻灯片也会导致使用非常小的字体。你可能至少听说过一次：“我不知道你是否能看懂这个表格中的数字，但....”。如果你自己都难以阅读内容，为什么还要费心展示给观众呢？
- en: So, what do I mean by cluttered slides? The easiest way to show you is by simply
    doing a quick Google search with the keywords `awful PowerPoint presentations`
    . The results will be very similar to what you can see in *Figure 2.7* .
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我所说的“杂乱无章的幻灯片”是什么意思呢？最简单的方法就是通过使用关键词“糟糕的 PowerPoint 演示”进行快速谷歌搜索。结果将非常类似于你在
    *图 2.7* 中看到的内容。
- en: This is an example I use in my training sessions of a slide that contains too
    much content and some hard-to-read text. It goes against almost all the best practice
    s discussed so far.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个我在培训课程中使用的例子，展示了一个内容过多且文字难以阅读的幻灯片。这几乎违反了迄今为止讨论的所有最佳实践。
- en: '![Figure 2.7 – An example of an awful PowerPoint slide](img/B32063_02_07.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.7 – 一个糟糕的 PowerPoint 幻灯片示例](img/B32063_02_07.png)'
- en: Figure 2.7 – An example of an awful PowerPoint slide
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.7 – 一个糟糕的 PowerPoint 幻灯片示例
- en: Any time your slides cannot pass the glance test, meaning that if people can’t
    grasp the main id ea you are discussing within three seconds, your visuals will
    have failed. Your main goal should be to limit your slide content to one idea
    at a time. Dividing what you need to discuss over multiple slides will be much
    more efficient for your audience.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 任何时候，如果你的幻灯片无法通过“一瞥测试”，也就是说，如果人们不能在3秒内抓住你讨论的主要观点，你的视觉元素就失败了。你的主要目标应该是每次只限制幻灯片内容为一个观点。将需要讨论的内容分散到多个幻灯片中，对观众来说将更加高效。
- en: 'When clients call me for help with their presentation design, most of the time
    their initial 25-slide file can end up with 60 or 70 slides. Yes, many of them
    almost fainted when I told them how many slides their presentation might have!
    Let’s do a bit of math to show you why it does not impact the length of your presentation
    in a negative wa y ( *Figure 2.8* ):'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当客户向我寻求帮助进行演示设计时，他们最初的25张幻灯片文件最终可能变成60或70张。是的，当我告诉他们他们的演示可能有多少张幻灯片时，他们中的许多人几乎晕倒了！让我们做一些数学计算来展示为什么这不会以负面方式影响你的演示长度（*图2.8*）：
- en: '![Figure 2.8 – Comparison using 10 slides versus 50 slides in a presentation](img/B32063_02_08.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图2.8 – 演示中使用10张幻灯片与50张幻灯片的比较](img/B32063_02_08.png)'
- en: Figure 2.8 – Comparison using 10 slides versus 50 slides in a presentation
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.8 – 演示中使用10张幻灯片与50张幻灯片的比较
- en: If your presentation has 10 slides and you spend 5 minutes per slide, you have
    content for a 50-minute talk. The problem is that when you spend more than 1 or
    2 minutes per slide, the audience can quickly lose interest. When you divide each
    point of your content so it is shown on its own slide and add a relevant visual
    element to it, you will spe nd much less time per slide, creating a more interesting
    pace. Going back to my example in *Figure 2.8* , if we were to divide the content
    into 50 slides that we spend about 1 minute on, we would still have 50 minutes
    of content but the rhythm at which we create a visual change would be much more
    interesting. Start thinking about your slides as if you were creating a movie.
    Less time spent on each slide creates a more visually appealing and memorable
    presentation.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个10张幻灯片的演示，并且每张幻灯片花费5分钟，你将有50分钟的演讲内容。问题是，当你每张幻灯片花费超过1或2分钟时，观众会很快失去兴趣。当你将每个内容要点单独展示在幻灯片上，并添加相关的视觉元素，你将每张幻灯片花费的时间会更少，从而创造一个更有趣的节奏。回到我的*图2.8*例子，如果我们把内容分成50张幻灯片，每张大约花费1分钟，我们仍然有50分钟的内容，但我们创造视觉变化的节奏将更加有趣。开始像制作电影一样思考你的幻灯片。每张幻灯片花费的时间越少，你的演示就越具有视觉吸引力且令人难忘。
- en: 'Here is a list of quick steps you can use to help you remove content from your
    slides:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一份你可以使用的快速步骤列表，帮助你从幻灯片中移除内容：
- en: Start by dividing your content into more slides and make sure you keep one main
    point or idea per slide.
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，将你的内容分成更多的幻灯片，并确保每张幻灯片只有一个主要观点或想法。
- en: Remove any information present in more than one place on a slide. For example,
    if the title of your slide is the same as the title of your chart, remove the
    one for the chart. When you have repetitive words, try to change how you present
    the content, so you have only one instance of the same word.
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从幻灯片上移除任何在多个地方出现的信息。例如，如果你的幻灯片标题与图表标题相同，请移除图表的标题。当你有重复的词语时，尝试改变内容呈现方式，以确保只有一个相同的词语实例。
- en: If possible, remove slide numbers, the date, and the name of the presenter from
    your content slides. Put that information on the title slide and on the last slide.
    This will free up some space to let your content stand out.
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果可能的话，从你的内容幻灯片中移除幻灯片编号、日期和演讲者姓名。将这些信息放在标题幻灯片和最后一张幻灯片上。这将腾出一些空间，让你的内容更加突出。
- en: If the company logo and legal information are required on each slide, it can
    be distracting to the audience, as it’s extra clutter. If this is because slides
    will be printed, there is a potential solution in [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206)
    and [*Chapter 4*](Chapter_04.xhtml#_idTextAnchor387) , where I will show you how
    to be aligned with your marketing and legal departments and still be able to reduce
    the amount of clutter on slides.
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果公司标志和法律信息需要在每张幻灯片上显示，这可能会分散观众的注意力，因为它是额外的杂乱。如果这是由于幻灯片将被打印，那么在[*第3章*](Chapter_03.xhtml#_idTextAnchor206)和[*第4章*](Chapter_04.xhtml#_idTextAnchor387)中有一个潜在的解决方案，我将向你展示如何与你的市场和法律部门保持一致，同时还能减少幻灯片上的杂乱。
- en: 'If I had to summarize this section on decluttering in one simple sentence it
    would be: *less is more* . If you take the time to reduce content on your slides
    but make sure it adds value, you will get better results. You will have less chance
    of losing your audience to boredom and their favorite app on their smartphone,
    and you will increase your chances of success.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我必须用一句话来总结这一节关于整理的内容，那将是：*少即是多*。如果你花时间减少幻灯片上的内容，但确保它增加了价值，你会得到更好的结果。你失去观众兴趣和他们在智能手机上喜欢的应用程序的机会会减少，你成功的可能性也会增加。
- en: Removing unnecessary elements from your slides should now be easier to do. It’s
    now time to discuss how the look and feel of your presentation can be made more
    consist ent and professional.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 从你的幻灯片中移除不必要的元素现在应该更容易做到了。现在是时候讨论如何使你的演示文稿的外观和感觉更加一致和专业了。
- en: Making the look and feel of your slides co nsistent
  id: totrans-111
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使你的幻灯片外观和感觉保持一致
- en: The human eye has the superpower of seeing even the smallest of details and
    that can derail our concentration. If your titles seem to be jumping around from
    one slide to the next, your audience will notice it. The same problem exists if
    you have been using different font sizes for titles or content across your presentation,
    or if you have used various alignment styles throughout your p resentation.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 人类眼睛有看到甚至最微小细节的超能力，这可能会分散我们的注意力。如果你的标题似乎在幻灯片之间跳跃，你的观众会注意到。如果你在演示文稿中为标题或内容使用了不同的字体大小，或者如果你在整个演示文稿中使用了各种对齐样式，也存在同样的问题。
- en: 'What does consistency look like? Here is a list of elements that will help
    you achieve it:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性看起来是什么样子？以下是一个帮助你实现一致性的元素列表：
- en: Using a maximum of two font styles for titles and content
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于标题和内容，最多使用两种字体样式
- en: Placing titles and content placeholders in the same position for identical layouts
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于相同的布局，将标题和内容占位符放置在相同的位置
- en: Using a specific color scheme that is applied consistently throughout your presentation
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在整个演示文稿中应用一致的颜色方案
- en: Formatting titles and content elements with the same font size, font type, and
    the same alignment
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用相同的字体大小、字体类型和相同的对齐方式格式化标题和内容元素
- en: Keeping enough whitespace or blank areas on your slides helps t he audience
    understand your content
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的幻灯片上保留足够的空白或空白区域有助于观众理解你的内容
- en: I am also sharing a screenshot of a short presentation I did a few years ago
    to show you an example of how slides can be made consistent (see *Figure 2.9*
    ). As you can see, t itles are placed in the same position on all similar slide
    layouts, using the same font style and size. A thin rectangle is used at the bottom
    of each slide to recall my corporate colors without using my l ogo on all the
    slides.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我还分享了一张我几年前做的简短演示的截图，以展示幻灯片如何保持一致性的一个示例（见*图2.9*）。正如你所看到的，标题在所有类似的幻灯片布局中放置在相同的位置，使用相同的字体样式和大小。在每个幻灯片的底部使用一个细长的矩形，以回忆我的公司颜色，而不需要在所有幻灯片上使用我的标志。
- en: '![Figure 2.9 – Example of how slides can have a consistent look](img/B32063_02_09.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图2.9 – 幻灯片如何保持一致外观的示例](img/B32063_02_09.png)'
- en: Figure 2.9 – Example of how slides can have a consistent look
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.9 – 幻灯片如何保持一致外观的示例
- en: Making your slides consistent also means creating layouts that can be reused
    for similar types of content. You can plan to have slides with a short list of
    bullet points, some with one image and text, others with full-slide images with
    a banner over them, and so on. The possibilities are endless if you give your
    creativity a chance. Of course, you might be starting to think you will never
    have enough time to create consistent slides if you must create each slide one
    by one. No worries, that is why [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206)
    is next. You will get familiar with what I call the best design automation feature
    in PowerPoint.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 使你的幻灯片保持一致还意味着创建可以用于类似类型内容的布局。你可以计划拥有包含简短项目符号列表的幻灯片，一些包含一张图片和文字，其他包含带有横幅的全屏图片，等等。如果你给创意一个机会，可能性是无限的。当然，你可能开始认为如果你必须一个接一个地创建幻灯片，你永远不会有足够的时间来创建一致的幻灯片。不用担心，这就是为什么[第3章](Chapter_03.xhtml#_idTextAnchor206)是下一个。你将熟悉我所说的PowerPoint中最好的设计自动化功能。
- en: Summary
  id: totrans-123
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we covered how to choose font styles and sizes to help you
    make your content readable, and how to make sure your background versus text contrast
    is good. We also discussed how to remove unnecessary content on slides and how
    to make them look more consistent.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了如何选择字体样式和大小以帮助您使内容易于阅读，以及如何确保背景与文本对比度良好。我们还讨论了如何在幻灯片中删除不必要的内容以及如何使它们看起来更一致。
- en: I have not discussed every design best practice in this chapter. But you have
    learned about the most important elements that can be quickly used to greatly
    improve your content. As I mentioned in the previous chapter on planning and structuring
    your content, the most important thing is not to let fear get in the way. Making
    better presentations is an ongoing process. For existing presentations, start
    by changing one or two design elements every time you are reviewing your content
    before an event or meeting. For new presentations, plan more time so you can use
    what you have learned when you are creating the content; you might as well do
    it better the first time!
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我在本章中没有讨论每个设计最佳实践。但您已经了解了可以快速使用以极大地改善您内容的最重要元素。正如我在关于规划和结构化您的内容的前一章中提到的，最重要的是不要让恐惧阻碍您。制作更好的演示文稿是一个持续的过程。对于现有的演示文稿，每次在活动或会议之前审查内容时，都从更改一个或两个设计元素开始。对于新的演示文稿，计划更多时间，这样您在创建内容时就可以使用您所学到的知识；您不妨第一次就做得更好！
- en: In the next chapter, we will get hands-on with PowerPoint. You will learn about
    layouts, placeholders, theme fonts and colors, and configuring your layouts. By
    getting to know the **slide master** , you will be able to automate most of the
    design parts of your slides.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将亲自动手使用PowerPoint。您将了解布局、占位符、主题字体和颜色，以及配置您的布局。通过了解**幻灯片母版**，您将能够自动化幻灯片的大部分设计部分。
- en: Further reading
  id: totrans-127
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步阅读
