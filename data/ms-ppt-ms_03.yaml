  - PREF_UL
  type: TYPE_NORMAL
  zh: 大卫·帕拉迪关于根据场地和屏幕大小选择字体大小的表格：[https://www.thinkoutsidetheslide.com/selecting-the-correct-font-size/](https://www.thinkoutsidetheslide.com/selecting-the-correct-font-size/)
- en: 'To learn more about color symbolism, or even its importance in design or marketing,
    have a look at the Color Matters website here: [https://colormatters.com/](https://colormatters.com/)'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要了解更多关于色彩象征意义的信息，或者它在设计或营销中的重要性，请查看Color Matters网站：[https://colormatters.com/](https://colormatters.com/)
- en: 'If you are interested in why color matters in your presentations, visit the
    Colorcom website for interesting statistics on marketing: [https://www.colorcom.com/research/why-color-matters](https://www.colorcom.com/research/why-color-matters)'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你对为什么颜色在你的演示文稿中很重要感兴趣，请访问Colorcom网站了解有关营销的有趣统计数据：[https://www.colorcom.com/research/why-color-matters](https://www.colorcom.com/research/why-color-matters)
