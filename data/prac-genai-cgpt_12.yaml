- en: Part 3
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分
- en: OpenAI for Enterprises
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: OpenAI企业应用
- en: This part introduces you to the world of enterprise applications of OpenAI models.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分将向您介绍OpenAI模型在企业应用领域的世界。
- en: It starts with an introduction to the partnership of OpenAI and Microsoft and
    the consequent launch of Azure OpenAI Service to the market, a cloud-managed service
    that offers OpenAI models with all the scalability, flexibility, and security
    typical of cloud-scale architectures.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 它从介绍OpenAI与微软的合作开始，以及随后推向市场的Azure OpenAI服务，这是一种提供OpenAI模型的所有云规模架构典型可伸缩性、灵活性和安全性的云托管服务。
- en: It then provides a recap of everything covered in this book, including the latest
    announcements and releases that have occurred in recent weeks. It also provides
    a section with some reflections and final thoughts about the exponential growth
    of generative AI technologies in just a few months and what to expect in the near
    future.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然后对本书中涵盖的所有内容进行回顾，包括最近几周发布的最新公告和发布信息。还提供了一个部分，其中包含一些反思和关于仅在几个月内生成式人工智能技术指数级增长的最终思考，以及未来可以期待的内容。
- en: 'This part contains the following chapters:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分包含以下章节：
- en: '*Chapter 10*, *Leveraging OpenAI Models for Enterprise-Scale Applications*'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第10章*，*利用OpenAI模型进行企业级应用*'
- en: '*Chapter 11*, *Epilogue and Final Thoughts*'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*第11章*，*结语与最后思考*'
