- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Creating Your Own LangChain Chatbot Example
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建您自己的LangChain聊天机器人示例
- en: In this chapter, we’ll combine key concepts from earlier chapters into a practical
    project. So far, we’ve covered a lot, from conversational AI fundamentals and
    prompt engineering to utilizing LangChain to create a RAG system. Now, we’re ready
    to apply this knowledge by building a ChatGPT-powered chatbot.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将结合前几章的关键概念，将其应用于一个实际项目。到目前为止，我们已经涵盖了大量的内容，从对话人工智能基础和提示工程到利用LangChain创建RAG系统。现在，我们准备通过构建一个由ChatGPT驱动的聊天机器人来应用这些知识。
- en: This project will demonstrate how to apply ChatGPT technology in a practical,
    real-world conversational AI scenario. We’ll aim to create an automated assistant
    that can not only answer questions about our own data but also handle more complex
    tasks and provide personalization.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目将展示如何在实际、真实世界的对话人工智能场景中应用ChatGPT技术。我们的目标是创建一个自动助手，它不仅能回答关于我们自己的数据的问题，还能处理更复杂的任务并提供个性化服务。
- en: By the end of this chapter, you’ll not only have a functional ChatGPT chatbot
    but also a solid understanding of how to craft more sophisticated conversational
    agents. You’ll also gain insights to better assess the feasibility of integrating
    LLM-powered agents into your business operations and determine whether it’s the
    right moment to transition from existing NLU systems.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你不仅将拥有一个功能齐全的ChatGPT聊天机器人，而且还将对如何构建更复杂的对话代理有一个扎实的理解。你还将获得洞察力，以更好地评估将LLM驱动的代理集成到你的业务运营中的可行性，并确定是否是过渡到现有NLU系统的正确时机。
- en: 'In this chapter, we’ll cover the following key areas:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下关键领域：
- en: Scoping our ChatGPT project
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定我们的ChatGPT项目范围
- en: Getting our data ready for the Chatbot
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准备我们的聊天机器人数据
- en: Creating our agent for complex interactions
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建我们的复杂交互代理
- en: Bringing it all together – building your own LangChain chatbot with Streamlit
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将所有内容整合在一起——使用Streamlit构建您自己的LangChain聊天机器人
- en: Let’s start building our chatbot, but first, we need to consider our conversational
    agent’s use case and scope.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始构建我们的聊天机器人，但首先，我们需要考虑我们的对话代理的使用案例和范围。
- en: Technical requirements
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: In this chapter, we will use ChatGPT extensively, so you will need to be signed
    up with a free account. If you haven’t created an account, go to [https://openai.com/](https://openai.com/)
    and click **Get Started** at the top right of the page, or go to https://chat.openai.com.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将广泛使用ChatGPT，因此你需要注册一个免费账户。如果你还没有创建账户，请访问[https://openai.com/](https://openai.com/)，然后在页面右上角点击**开始使用**，或者访问https://chat.openai.com。
- en: 'The examples require Python 3.9 and a Jupyter notebook to be installed: [https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb](https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb).'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例需要Python 3.9和一个安装了Jupyter笔记本的环境：[https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb](https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb)。
- en: We will use Chroma DB as our open source vector database, so it’s advisable
    to take a look and familiarize yourself with Chroma ([https://www.trychroma.com](https://www.trychroma.com))
    although there are a lot of other different options for Vector stores providers.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用Chroma DB作为我们的开源向量数据库，因此建议查看并熟悉Chroma ([https://www.trychroma.com](https://www.trychroma.com))，尽管还有许多其他不同的向量存储提供商选项。
- en: Scoping our ChatGPT project
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 确定我们的ChatGPT项目范围
- en: Everyone likes a holiday, and helping travelers with smart conversational automations
    is an area I’m very passionate about, so for our use case, we are going to create
    our own ChatGPT-powered travel assistant.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都喜欢假期，帮助旅行者通过智能对话自动化是我非常热衷的领域，因此对于我们的用例，我们将创建我们自己的ChatGPT驱动的旅行助手。
- en: At this point, we must be realistic with scope; an online travel agent could
    potentially do thousands of different tasks with varying levels of complexity,
    but let’s choose a handful of specific use cases that are not only interesting
    to implement but also bring together the techniques we’ve covered so far in the
    book.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们必须对范围保持现实；一个在线旅行代理可能能够执行数千种不同任务，复杂程度各异，但让我们选择一些既有趣又能够结合我们在本书中迄今为止所涵盖的技术的方法。
- en: A holiday assistant use case
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 假日助手用例
- en: You work for an online travel agent, and you’ve been tasked with creating an
    LLM-powered holiday assistant designed to revolutionize the way travelers choose
    their accommodations. Online travel agents tend to be limited in their accommodation
    searches, so your challenge is to provide a more personalized granular search.
    Drawing on a dataset of hotels, complete with descriptions, reviews, and other
    possible sources of information such as weather and location, your goal is to
    construct a ChatGPT-powered chatbot capable of guiding users to their ideal hotel
    choice. Let’s call our agent Ellie the explorer and dig deeper into her persona.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 你为在线旅行社工作，并被指派创建一个由大型语言模型（LLM）驱动的假日助手，旨在彻底改变旅行者选择住宿的方式。在线旅行社在住宿搜索方面往往受限，因此你的挑战是提供更个性化的细致搜索。利用包含描述、评论和其他可能的信息来源（如天气和位置）的酒店数据集，你的目标是构建一个由ChatGPT驱动的聊天机器人，能够引导用户找到理想的酒店选择。让我们称我们的代理为艾莉探险者，并深入挖掘她的角色。
- en: A persona outline for Ellie the explorer
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 艾莉探险者的角色轮廓
- en: First, let’s consider Ellie’s personality and the capabilities she’s going to
    offer to her users.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们考虑艾莉的个性和她将向用户提供的能力。
- en: Ellie’s personality
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 艾莉的个性
- en: Ellie is enthusiastic, friendly, and incredibly knowledgeable. She approaches
    every interaction with a positive attitude and a genuine desire to help. Her responses
    are thoughtful and personalized, reflecting her understanding of each user’s unique
    preferences and needs. Ellie is not just a chatbot; she’s a travel companion who’s
    excited to help users plan their trips, offering advice as a friend would.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 艾莉热情、友好，知识渊博。她以积极的态度和真诚的帮助意愿对待每一次互动。她的回答深思熟虑且个性化，反映了她对每个用户独特偏好和需求的了解。艾莉不仅仅是一个聊天机器人；她是一个兴奋地帮助用户规划旅行的旅行伴侣，会像朋友一样提供建议。
- en: Ellie’s interactions are characterized by her warmth and enthusiasm. She communicates
    in a conversational tone, making complex travel planning feel like a chat with
    a knowledgeable friend. Her responses are prompt, informative, and always considerate
    of the user’s needs and preferences.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 艾莉的互动以其温暖和热情为特点。她以对话的语气进行沟通，让复杂的旅行规划感觉像与知识渊博的朋友聊天。她的回答迅速、信息丰富，始终考虑用户的需求和偏好。
- en: Ellie’s capabilities
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 艾莉的能力
- en: 'Let’s outline what Ellie’s capabilities are going to be when handling her users’
    queries:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们概述一下艾莉在处理用户查询时将具备的能力：
- en: '**Learning user preferences**: Ellie is attentive and observant, quickly picking
    up on subtle hints about a user’s travel preferences, family dynamics, and favorite
    holiday activities. She remembers these details across interactions, continually
    refining her understanding of what each user enjoys.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习用户偏好**：艾莉警觉且观察力敏锐，能够迅速捕捉到关于用户旅行偏好、家庭动态和最喜欢的假日活动的微妙暗示。她会在互动中记住这些细节，不断改进对每个用户喜好的理解。'
- en: '**Personalized recommendations**: Using her comprehensive knowledge of a hotel’s
    dataset, Ellie goes beyond simple keyword searches. She understands free text
    questions and digs deep into her database to offer recommendations that perfectly
    match each user’s wishes, whether they’re looking for family-friendly resorts,
    romantic getaways, or adventure-packed hostels.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化推荐**：利用她对酒店数据集的全面知识，艾莉超越了简单的关键词搜索。她理解自由文本问题，并深入数据库提供与每个用户愿望完美匹配的推荐，无论他们是在寻找家庭友好的度假村、浪漫的度假胜地，还是充满冒险的旅舍。'
- en: '**Destination information**: Ellie is a treasure trove of information on countless
    destinations. She can tell you the best times to visit a place, share insights
    on local attractions, offer safety advice, and even teach you a few cultural tips
    to help you blend in. Her advice is always up to date, ensuring travelers have
    the best experience.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目的地信息**：艾莉拥有无数目的地的宝贵信息。她可以告诉你何时是访问某个地方的最佳时间，分享当地景点的见解，提供安全建议，甚至教你一些文化小贴士，帮助你更好地融入当地。她的建议总是最新的，确保旅行者拥有最佳的旅行体验。'
- en: '**Weather conditions**: Ellie keeps a close eye on the weather across the globe.
    She can provide current and forecasted conditions for any destination, advising
    on how the weather might affect travel plans. Whether it’s suggesting the best
    day for a beach outing or warning about potential travel disruptions due to severe
    weather, Ellie’s guidance is invaluable.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**天气状况**：艾莉密切关注全球的天气状况。她可以提供任何目的地的当前和预报条件，并就天气可能如何影响旅行计划提供建议。无论是建议最适合海滩游玩的最佳日子，还是警告因恶劣天气可能导致的旅行中断，艾莉的指导是无价的。'
- en: Now we’ve got an idea about Ellies capabilities, let’s look at her conversational
    capabilities and the types of interactions we want to support.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了Ellie的能力，让我们看看她的对话能力和我们想要支持的交互类型。
- en: Ellie’s conversational scope
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Ellie的对话范围
- en: 'Let’s outline the conversations Ellie will be able to carry out. She will hopefully
    be able to carry out the following types of interactions:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们概述Ellie将能够进行的对话。她希望能够执行以下类型的交互：
- en: '**Personalized recommendations**: Using the hotel’s dataset, based on user
    preferences and past interactions, the chatbot can offer personalized hotel recommendations,
    tailored to meet each user’s specific needs. We want to offer more than just keyword
    searches for parameters such as facilities. We want to support free text questions
    about our hotels based on hotel descriptions and holiday maker reviews, allowing
    us to offer more granular suggestions to our users.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化推荐**：根据酒店的数据库，基于用户偏好和以往互动，聊天机器人可以提供个性化的酒店推荐，以满足每个用户的特定需求。我们希望提供比仅针对设施等参数的关键词搜索更多的服务。我们希望支持基于酒店描述和假日制造者评论的免费文本问题，使我们能够向用户提供更细致的建议。'
- en: '**Destination information**: Inquiries about the destination, including best
    times to visit, local attractions, safety advice, and cultural tips.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目的地信息**：关于目的地的查询，包括最佳访问时间、当地景点、安全建议和文化提示。'
- en: '**Weather conditions**: Questions about current and forecasted weather conditions
    for specific destinations or how the weather might affect travel plans.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**天气状况**：关于特定目的地的当前和预报天气状况，或天气可能如何影响旅行计划的问题。'
- en: Hopefully, once our **p****roof of concept**(**POC**) is working, we’ll be able
    to make an informed decision on whether we want to make a more fully featured
    agent with a larger hotel dataset.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我们的**概念验证**（**POC**）一旦运行正常，我们就能做出明智的决定，是否要制作一个具有更全面功能、包含更大酒店数据集的代理。
- en: Technical features
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 技术特性
- en: 'To create Ellie the explorer and meet the conversational scope we’ve outlined,
    we’re going to implement the following features:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建Ellie这个探险家和达到我们概述的对话范围，我们将实现以下功能：
- en: A RAG system to store information about our hotel descriptions that we can use
    to provide our suggestions
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个RAG系统来存储关于我们酒店描述的信息，我们可以用它来提供我们的建议
- en: LangChain agents to provide the tools to interact with external data sources
    and get up-to-date information
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangChain代理提供与外部数据源交互的工具，以获取最新信息
- en: Performance monitoring using LangSmith so that we can see how our assistant
    performs
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用LangSmith进行性能监控，以便我们可以看到我们的助手的表现
- en: A working web-based Chatbot interface where we can see our conversations and
    interact with the agent, while keeping track of the ongoing conversation
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个工作的基于Web的聊天机器人界面，我们可以看到我们的对话并与代理交互，同时跟踪正在进行的对话
- en: Getting our data ready for the chatbot
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为聊天机器人准备我们的数据
- en: To get our data ready, we first need to source and then process it so that it’s
    in the cleanest state, ready to be used.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使我们的数据准备就绪，我们首先需要获取并处理它，使其处于最干净的状态，以便使用。
- en: Selecting our data sources
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择我们的数据源
- en: 'For this project, we’re going to need to provide a number of different types
    of context-specific knowledge to our LLM agent so that we can service the expected
    question types:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个项目，我们需要向我们的LLM代理提供多种不同类型的特定上下文知识，以便我们可以服务预期的问答类型：
- en: '**Hotel information**: This would come from our online travel agent hotel dataset,
    so we’ll need some hotel data to represent the hotels we want to recommend to
    our users. The data we’re going to use to provide hotel recommendations is a small
    subset of the dataset at [https://www.kaggle.com/datasets/raj713335/tbo-hotels-dataset](https://www.kaggle.com/datasets/raj713335/tbo-hotels-dataset).
    This dataset contains information on 1,000,000+ hotels from different countries
    and regions, such as their rates, reviews, amenities, location, and star ratings.
    The data was collected from various sources, such as hotel websites, online travel
    agencies, and review platforms. We’re going to use a much smaller version of this
    data to keep our model interaction costs down.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**酒店信息**：这将从我们的在线旅行社酒店数据集中获得，因此我们需要一些酒店数据来代表我们想要向用户推荐的酒店。我们将使用的数据集是[https://www.kaggle.com/datasets/raj713335/tbo-hotels-dataset](https://www.kaggle.com/datasets/raj713335/tbo-hotels-dataset)数据集的一个小子集，以提供酒店推荐。这个数据集包含来自不同国家和地区的超过1,000,000家酒店的信息，例如它们的费用、评论、设施、位置和星级评定。数据是从各种来源收集的，例如酒店网站、在线旅行社和评论平台。我们将使用这个数据集的一个更小的版本，以降低我们的模型交互成本。'
- en: '**Location weather**: Users may ask about the weather in a specific location,
    so we’ll use Open-Meteo, the free weather API.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**位置天气**：用户可能会询问特定位置的天气，因此我们将使用免费的天气API Open-Meteo。'
- en: '**Detailed location information**: To provide up-to-date location information,
    we’ll use Wikipedia so that we can search by location.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**详细位置信息**：为了提供最新的位置信息，我们将使用维基百科，这样我们就可以通过位置进行搜索。'
- en: Preparing the hotel data
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备酒店数据
- en: 'The hotel dataset we’re going to use, `hotel-info-chapter8-001.csv`, is a **CSV**
    file made up of around 900 hotel records from countries around the world for a
    bit of variety. This data is populated with the following columns:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要使用的酒店数据集`hotel-info-chapter8-001.csv`是一个包含约900条来自世界各地酒店的**CSV**文件，以提供一些多样性。这些数据包含以下列：
- en: '`countryCode`, `countryName`, `cityCode`, `cityName`, `HotelCode`, `HotelName`,
    `HotelRating`, `Address`, `Attractions`, `Description`, `HotelFacilities`, `Map`,
    `PhoneNumber`, `PinCode`, `HotelWebsiteUrl`, and `Reviews`'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`countryCode`、`countryName`、`cityCode`、`cityName`、`HotelCode`、`HotelName`、`HotelRating`、`Address`、`Attractions`、`Description`、`HotelFacilities`、`Map`、`PhoneNumber`、`PinCode`、`HotelWebsiteUrl`和`Reviews`'
- en: These are all fairly self-explanatory; the columns we’re most interested in
    are the `Description` and `Reviews` columns, as we’re going to use this data to
    form the basis for our RAG system to help Ellie provide hotel recommendations.
    So, to recap, what we need to do to make this data available for RAG is to *clean
    it up, chunk and create embeddings, and store the data as embeddings so that we
    can retrieve it later on?.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这些内容都比较容易理解；我们最感兴趣的列是`Description`和`Reviews`列，因为我们打算使用这些数据作为我们RAG系统的基石，以帮助艾莉提供酒店推荐。所以，为了总结，我们需要做什么来使这些数据对RAG可用？我们需要*清洗数据、分块创建嵌入，并将数据作为嵌入存储，以便我们以后可以检索它？。
- en: Cleaning and normalizing data
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 清洗和标准化数据
- en: 'Before creating embeddings, we need to ensure that our data in the `Description`
    and `Reviews` columns is clean and normalized. This involves removing any HTML.
    If you look at the `descriptions` field, you’ll notice that it has text with HTML
    tags, so the first thing we should do is clean this up. To do this, we can use
    the `BeautifulSoup` library from Python’s `bs4` package. In the following code,
    we’ll any HTML in `Descriptions` and `Attractions` with the `remove_html_tags`
    function:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建嵌入之前，我们需要确保我们的`Description`和`Reviews`列中的数据是干净和标准化的。这涉及到移除任何HTML。如果你查看`descriptions`字段，你会注意到其中包含带有HTML标签的文本，所以我们应该做的第一件事就是清理这些内容。为此，我们可以使用Python的`bs4`包中的`BeautifulSoup`库。在下面的代码中，我们将使用`remove_html_tags`函数移除`Descriptions`和`Attractions`中的任何HTML：
- en: '[PRE0]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Other improvements to our cleaning process could involve standardizing abbreviations
    (e.g., changing `Rest.` to `Restaurant`) and correcting spelling errors. Normalizing
    data helps to reduce the variance in your embeddings, leading to more accurate
    recommendations.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们清洗过程的其它改进可能包括标准化缩写（例如，将`Rest.`改为`Restaurant`）和纠正拼写错误。标准化数据有助于减少嵌入的方差，从而提高推荐的准确性。
- en: Creating our chunks
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建我们的数据块
- en: 'Let’s look at creating our chunks from the `Description` and `Reviews` columns.
    There are a number of different ways you could do this; we’re using a LangChain
    document loader, but in a production environment where you could have a much larger
    dataset, you may find using the `pandas` library we used to clean up our data
    in the previous section is more efficient. In our approach, we read the data out
    of our CSV file, create a dictionary from each row so that we can access the column
    values, look at each document, and then create chunks from the `Description` and
    `Reviews` columns:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如何从`Description`和`Reviews`列创建我们的块。你可以用多种不同的方式来做这件事；我们使用LangChain文档加载器，但在一个可能拥有大量数据集的生产环境中，你可能会发现使用我们在上一节中用来清理数据的`pandas`库更高效。在我们的方法中，我们从CSV文件中读取数据，从每一行创建一个字典，以便我们可以访问列值，查看每个文档，然后从`Description`和`Reviews`列创建块：
- en: '`CSVLoader` class for this purpose. Specify the file path, the column containing
    hotel names, and any additional metadata columns. We’re using the `HotelName`
    as the source column:'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`CSVLoader`类用于此目的。指定文件路径、包含酒店名称的列以及任何其他元数据列。我们使用`HotelName`作为源列：'
- en: '[PRE1]'
  id: totrans-62
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`RecursiveCharacterTextSplitter` for this, setting a chunk size and overlap
    to ensure continuity in the text analysis. The descriptions are not actually that
    large, but for our example, the aim is to break them down into small enough chunks
    to provide some granular information about each hotel:'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用`RecursiveCharacterTextSplitter`进行此操作，设置块大小和重叠以确保文本分析的连续性。描述实际上并不大，但为了我们的示例，目标是将它们分解成足够小的块，以提供有关每个酒店的某些粒度信息：
- en: '[PRE2]'
  id: totrans-64
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: chunked_docs = []
  id: totrans-65
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: chunked_docs = []
- en: 'for doc in docs:'
  id: totrans-66
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: for doc in docs
- en: content_dict = {}
  id: totrans-67
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: content_dict = {}
- en: pairs = doc.page_content.split('\n')
  id: totrans-68
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: pairs = doc.page_content.split('\n')
- en: 'for pair in pairs:'
  id: totrans-69
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: for pair in pairs
- en: 'if '': '' in pair:'
  id: totrans-70
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'if '': '' in pair:'
- en: 'key, value = pair.split('': '', 1)'
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'key, value = pair.split('': '', 1)'
- en: content_dict[key.strip()] = value.strip()
  id: totrans-72
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: content_dict[key.strip()] = value.strip()
- en: 'for column in content_columns:'
  id: totrans-73
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'for column in content_columns:'
- en: 'if column in content_dict and content_dict[column]:'
  id: totrans-74
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'if column in content_dict and content_dict[column]:'
- en: chunks = splitter.split_text(content_dict[column])
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: chunks = splitter.split_text(content_dict[column])
- en: chunked_docs.extend(
  id: totrans-76
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: chunked_docs.extend(
- en: '['
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '['
- en: Document(page_content=doc_part,
  id: totrans-78
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Document(page_content=doc_part,
- en: metadata=doc.metadata)
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: metadata=doc.metadata)
- en: for doc_part in chunked_doc_parts
  id: totrans-80
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: for doc_part in chunked_doc_parts
- en: ']'
  id: totrans-81
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ']'
- en: )
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: )
- en: '[PRE3]'
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We want to loop over each CSV record and select `Description` and `Review`,
    which are then chunked individually, so each chunk with the original CSV metadata
    is then added to our `chunked_docs` list ,ready to create embeddings from.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望遍历每个CSV记录，并选择`Description`和`Review`，然后分别分块处理，这样每个包含原始CSV元数据的块就添加到我们的`chunked_docs`列表中，以便创建嵌入。
- en: Creating our embeddings
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建我们的嵌入
- en: 'Once we’ve got our chunked text, we want to create our embeddings. For our
    vector database, we’re going to use Chroma DB and the OpenAI model to create our
    embeddings. We’ll store the database locally and use the latest OpenAI embeddings
    model, `text-embedding-3-small`, to create our embeddings. To keep my OpenAI embedding
    costs down, I’m only going to create embeddings from the first 100 chunks; it’s
    up to you how many you want to create for your project:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们得到了分块文本，我们希望创建我们的嵌入。对于我们的向量数据库，我们将使用Chroma DB和OpenAI模型来创建嵌入。我们将数据库存储在本地，并使用最新的OpenAI嵌入模型`text-embedding-3-small`来创建嵌入。为了降低我的OpenAI嵌入成本，我只会从前100个块中创建嵌入；至于你想要为你的项目创建多少，那就取决于你了：
- en: '[PRE4]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'We can test whether we’ve got records in the store by looking at the number
    of records with `count()` or doing a similarity search:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过查看具有`count()`的记录数或进行相似度搜索来测试我们是否在存储中有了记录：
- en: '[PRE5]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Now we’ve got our hotel embeddings stored with their metadata, we can start
    to look at creating the tools that our agent will utilize to interact with this
    data and other sources.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经将酒店嵌入及其元数据存储好了，我们可以开始创建我们的代理将用来与这些数据和其他来源交互的工具。
- en: Creating our agent for complex interactions
  id: totrans-91
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建我们的代理以进行复杂交互
- en: 'Our agent is going to be powered by tools that provide the functionality to
    meet our requirements. The main concept is that the agent will be able to take
    our question and use an LLM call to reason and split this task down into smaller
    tasks, while deciding which tools are appropriate to use to satisfy our request
    and deliver an answer to our question. The reasoning processes the agent uses
    areillustrated in the following diagram:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们代理将要由提供满足我们需求功能性的工具驱动。主要概念是代理将能够接收我们的问题，并使用一个LLM调用进行推理，将这个任务分解成更小的任务，同时决定使用哪些工具来满足我们的请求并给出问题的答案。代理使用的推理过程在以下图中展示：
- en: '![Figure 8.1 –  The agent’s reasoning process](img/B21100_08_1.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.1 – 代理的推理过程](img/B21100_08_1.jpg)'
- en: Figure 8.1 – The agent’s reasoning process
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 – 代理的推理过程
- en: Begin by creating a dedicated folder that will contain all the code for our
    agent. This will help organize our project files and make the code base easier
    to navigate. I’m going to name this folder `streamlit`, as it’s where we’ll create
    our Streamlit app later on.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建一个专门的文件夹，将包含我们代理的所有代码。这将帮助我们组织项目文件，并使代码库更容易导航。我将把这个文件夹命名为 `streamlit`，因为我们将在那里创建我们的Streamlit应用。
- en: 'Copy over the Chroma database we’ve created to store the vectors in this folder:
    `path to` `your project\streamlit\chapter8db\`.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 将我们创建的用于存储向量的Chroma数据库复制到这个文件夹中：`path to` `your project\streamlit\chapter8db\`。
- en: Next, create a folder named `tools` so that we can start creating the tools
    for our agent.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，创建一个名为 `tools` 的文件夹，这样我们就可以开始创建代理的工具。
- en: Creating the agent tools
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建代理工具
- en: 'Before we create our LangChain agent, we’ll need to create the LangChain tools
    to meet our requirements. We’re going to try and implement all our functionality
    using agent tools, including the RAG functionality:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们创建LangChain代理之前，我们需要创建LangChain工具以满足我们的需求。我们将尝试使用代理工具实现所有我们的功能，包括RAG功能：
- en: Hotel information
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 酒店信息
- en: Weather information
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 天气信息
- en: Location information
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 位置信息
- en: Each tool will have the capabilities to carry out its own task. Let’s work through
    each one; for now, create a folder named `tools`, where we’ll save the tools to
    use in our final project.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 每个工具都将具备执行其自身任务的能力。让我们逐一处理；目前，创建一个名为 `tools` 的文件夹，我们将在这里保存用于最终项目的工具。
- en: Personalized hotel recommendations
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定制酒店推荐
- en: The first tool is arguably the most important for our application, as this is
    the tool that will interact with our vector store that makes up the retrieval
    part of our RAG system. We’re going to create a custom tool to accomplish this.
    There are a few challenges to overcome when we start to think about how our agent
    will perform these searches.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个工具可以说是对我们应用最重要的，因为这个工具将与我们向量存储交互，构成我们RAG系统的检索部分。我们将创建一个自定义工具来完成这项任务。当我们开始思考代理如何执行这些搜索时，有几个挑战需要克服。
- en: We currently have our embeddings stored in our vector store, so we’ll need to
    create a retriever that will accept queries to search through these embeddings,
    such as “*Can you suggest hotels with* *good food?*”
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们目前将嵌入存储在我们的向量存储中，因此我们需要创建一个检索器，它将接受查询以在这些嵌入中搜索，例如“*你能推荐一些有* *美食* *的酒店吗？*”
- en: Remember that we’ve stored our text embeddings with their own metadata. What
    would be even more useful is if we could also filter our embeddings by their metadata
    as you would with a relational database. For example, `hotel countryName` and
    `HotelRating` are both represented in our metadata. So, if we want to look for
    similar documents for hotels in a specific country with a specific rating, our
    question could be something like “*Can you suggest a four-star hotel in the UK
    with* *good food?*”
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 记住我们已经将我们的文本嵌入与其元数据一起存储。更有用的事情是，如果我们能够像使用关系数据库一样过滤我们的嵌入元数据。例如，`hotel countryName`
    和 `HotelRating` 都在我们的元数据中有所表示。所以，如果我们想寻找特定国家特定评分的酒店相似文档，我们的问题可能类似于“*你能推荐一家在英国有*
    *美食* *的四星级酒店吗？*”
- en: Luckily, Chroma DB provides the ability to filter queries on metadata, so we
    know we can achieve this with our vector store.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，Chroma DB提供了在元数据上过滤查询的能力，因此我们知道我们可以通过我们的向量存储实现这一点。
- en: The next thing to consider is how we’ll achieve this in our LangChain tool.
    The first challenge is that we want to extract parameters from our question so
    that we can use these downstream, specifically in our chroma query.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来要考虑的是如何在我们的LangChain工具中实现这一点。第一个挑战是我们希望从问题中提取参数，以便我们可以将这些参数用于下游，特别是在我们的chroma查询中。
- en: One approach could be to interact with an LLM to extract relevant search parameters
    from user interactions, which are then fed into your retriever to carry out a
    search against the Chroma DB. However, before diving in, it’s always best practice
    to see what is already available in the LangChain ecosystem. As it happens, there
    is already something we can use, `SelfQueryRetriever`, a retriever built specifically
    to carry out this task. Let’s break this down into detailed steps, explaining
    each component’s role and how they integrate.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 一种方法是与LLM交互，从用户交互中提取相关的搜索参数，然后将这些参数输入到您的检索器中，以对Chroma DB执行搜索。然而，在深入之前，查看LangChain生态系统已经提供的功能总是最好的实践。事实上，我们已经有一些可以利用的东西，那就是`SelfQueryRetriever`，这是一个专门构建来执行此任务的检索器。让我们将其分解为详细的步骤，解释每个组件的作用以及它们是如何集成的。
- en: '`hotel_search.py`.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`hotel_search.py`。'
- en: '`OpenAI Embeddings`. This model is responsible for converting text into vector
    representations, which are used for semantic searches, and it’s the same model
    we used to create our embeddings:'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`OpenAI Embeddings`。这个模型负责将文本转换为向量表示，这些表示用于语义搜索，并且这是我们创建嵌入时使用的相同模型：'
- en: '[PRE6]'
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '`embeddings_model` to perform semantic searches. Documents stored in Chroma
    can be retrieved based on their semantic relevance to query strings:'
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用`embeddings_model`来执行语义搜索。存储在Chroma中的文档可以根据其与查询字符串的语义相关性检索：
- en: '[PRE7]'
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '`HotelRating`, `cityName`, and `CountryName`. Feel free to add any other parameters
    you want to search by:'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`HotelRating`、`cityName`和`CountryName`。您可以随意添加任何其他您想要搜索的参数：'
- en: '[PRE8]'
  id: totrans-117
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '`SelfQueryRetriever` is initialized with the language model, document store,
    and metadata information that we defined in the previous step. It’s configured
    to perform similarity-based searches within its own indexed content, finding documents
    that are semantically relevant to user queries:'
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`SelfQueryRetriever`使用语言模型、文档存储和我们在上一步中定义的元数据信息初始化。它被配置为在其索引内容内执行基于相似度的搜索，找到与用户查询在语义上相关的文档：'
- en: '[PRE9]'
  id: totrans-119
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We’re also limiting the number of documents to return to 10 and setting `verbose=True`
    so that we can view the output. Let’s move on to creating our prompt.
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们还限制了返回的文档数量为10，并设置`verbose=True`，以便我们可以查看输出。让我们继续创建我们的提示。
- en: '`PromptTemplate` is defined to ensure that the retrieved information from the
    documents is presented clearly to the LLM when answering user queries:'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`PromptTemplate`被定义出来，以确保从文档中检索到的信息在回答用户查询时对LLM呈现得清晰：'
- en: '[PRE10]'
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Now that we’ve created our prompt, we can bring everything together to create
    our tool:'
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在我们已经创建了我们的提示，我们可以将所有这些整合在一起来创建我们的工具：
- en: '`create_retriever_tool`, passing in the title of the tool, the description
    to the retriever itself, and the document prompt we created:'
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用`create_retriever_tool`，传入工具的标题、传递给检索器的描述以及我们创建的文档提示：
- en: '[PRE11]'
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '`create_retriever_tool` returns our tool of type `Tool`. The final step involves
    integrating `hotel_search` into our LangChain conversational agent, which we’ll
    do by passing it on to our `AgentExecutor` when we create our agent. To recap,
    this agent will process user queries about hotel recommendations, leveraging the
    semantic search capabilities of `SelfQueryRetriever`, which now understands which
    metadata to look for and work with in our hotel questions, providing users with
    helpful hotel recommendations.'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '`create_retriever_tool`返回我们的工具类型为`Tool`。最后一步是将`hotel_search`集成到我们的LangChain对话代理中，我们将在创建代理时通过将其传递给`AgentExecutor`来实现。为了回顾，这个代理将处理关于酒店推荐的用户查询，利用`SelfQueryRetriever`的语义搜索能力，该检索器现在理解在酒店问题中查找和处理的元数据，为用户提供有用的酒店推荐。'
- en: Weather information
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 天气信息
- en: We can create a custom tool to provide our weather information. The simplest
    way to create a custom tool is to annotate a function with `@tool`.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以创建一个自定义工具来提供我们的天气信息。创建自定义工具最简单的方法是使用`@tool`注解一个函数。
- en: 'So, for our weather tool, it’s straightforward to construct. We create our
    function named `search_weather`, which the decorator uses as the tool name, and
    the description is pulled from the docstring. For the weather data, we’re going
    to use `OpenWeatherMap`, and to make the process of calling this API nice and
    simple, we’ll use a Langchain utility, `OpenWeatherMapAPIWrapper`. Once again,
    it’s worth pointing out that if you’ve found a service you want to consume for
    your ChatGPT app, always have a look around the LangChain ecosystem before building
    anything bespoke. Create a file named `search_weather.py` and add the following:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于我们的天气工具，构建起来很简单。我们创建了一个名为 `search_weather` 的函数，装饰器使用该函数作为工具名称，描述是从文档字符串中提取的。对于天气数据，我们将使用
    `OpenWeatherMap`，为了使调用此API的过程既简单又方便，我们将使用Langchain实用工具，`OpenWeatherMapAPIWrapper`。再次强调，如果您想为您的ChatGPT应用消费某个服务，在构建任何定制工具之前，总是先在LangChain生态系统中四处看看。创建一个名为
    `search_weather.py` 的文件，并添加以下内容：
- en: '[PRE12]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Go to [https://openweathermap.org/api/](https://openweathermap.org/api/) and
    sign up for an account to get your API key. This will need to be available as
    an environment variable. We’ll look at setting environment variables when we create
    the chatbot application.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 前往 [https://openweathermap.org/api/](https://openweathermap.org/api/) 并注册一个账户以获取您的API密钥。这需要作为一个环境变量可用。我们将在创建聊天应用时查看如何设置环境变量。
- en: Location information
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 位置信息
- en: We want to create a tool to answer questions about hotel locations with up-to-date
    data so that we can add these results to our context. There are a number of options.
    We could use the Tavily search engine, the purpose-built search engine for LLMs,
    and there is also an out-of-the-box tool in LangChain, `TavilySearchResults`.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望创建一个工具，用最新的数据回答有关酒店位置的问题，这样我们就可以将这些结果添加到我们的上下文中。有几种选择。我们可以使用Tavily搜索引擎，这是为LLMs定制的搜索引擎，LangChain中也有一个现成的工具，`TavilySearchResults`。
- en: However, a great place to find information is Wikipedia, so let’s use this as
    the information source for our tool.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一个寻找信息的好地方是维基百科，所以让我们将其作为我们工具的信息来源。
- en: We’re going to use an out-of-the-box LangChain tool to interact with Wikipedia,
    `WikipediaQueryRun`. You’ll need to install the Wikipedia Python package by running
    `pip install --upgrade --quiet` `Wikipedia`.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用一个现成的LangChain工具与维基百科进行交互，`WikipediaQueryRun`。您需要通过运行 `pip install --upgrade
    --quiet Wikipedia` 来安装Wikipedia Python包。
- en: 'It’s easy to create this tool – create a file named `wikipedia.py` and add
    the following to create the Wikipedia API wrapper:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 创建这个工具很简单——创建一个名为 `wikipedia.py` 的文件，并添加以下内容以创建Wikipedia API包装器：
- en: '[PRE13]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The wrapper provides some useful ways to fine-tune Wikipedia search results,
    so we’ve limited the number of results returned to 5 and limited the content for
    each returned document to 500 characters.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 包装器提供了一些微调维基百科搜索结果的有用方法，因此我们已将返回的结果数量限制为5，并将每个返回文档的内容限制为500个字符。
- en: 'Next, create the tool by passing in our wrapper and giving the tool a description:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，通过传递我们的包装器并给出工具描述来创建工具：
- en: '[PRE14]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We’ll now be able to use this tool in our agent. In the next section, we’ll
    look at creating our LangChain agent using the tools we’ve created. In the next
    section, we’re going to bring all these elements together by creating an agent
    that can utilize the tools we’ve created.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将在我们的代理中使用这个工具。在下一节中，我们将探讨如何使用我们创建的工具来创建我们的LangChain代理。在下一节中，我们将通过创建一个能够利用我们创建的工具的代理来将这些所有元素结合起来。
- en: Bringing it all together – building Your own LangChain Chatbot with Streamlit
  id: totrans-142
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 整合所有元素——使用Streamlit构建您自己的LangChain聊天机器人
- en: Let’s begin constructing our web-based chatbot so that we can interact with
    ChatGPT using LangChain. To accomplish this, we’ll use the Streamlit Python library
    to build the interface. Streamlit’s wealth of ready-to-use components and utilities,
    as well as great documentation, allows us to swiftly develop a functional web-based
    chatbot. Its straightforward yet powerful features support quick prototyping and
    iterative refinement, making it perfectly suited for our chatbot project. Streamlit
    simplifies the integration of interactive elements and provides a lot of out-of-the-box
    functionality, which will cut our development time and allow us to concentrate
    on the LangChain project.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始构建我们的基于 Web 的聊天机器人，以便我们可以使用 LangChain 与 ChatGPT 交互。为了实现这一点，我们将使用 Streamlit
    Python 库来构建界面。Streamlit 丰富的现成组件和实用工具，以及出色的文档，使我们能够迅速开发一个功能性的基于 Web 的聊天机器人。它简单而强大的功能支持快速原型设计和迭代改进，非常适合我们的聊天机器人项目。Streamlit
    简化了交互元素的集成，并提供了许多现成的功能，这将缩短我们的开发时间，并使我们能够专注于 LangChain 项目。
- en: Make sure you’ve installed Streamlit with `pip install streamlit`, or by using
    one of the many other ways to install. I’m using Anaconda, so I’m using this distribution.
    You can test that you’ve installed Streamlit correctly by running `streamlit hello`.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您已使用 `pip install streamlit` 或其他许多其他方式安装了 Streamlit。我使用 Anaconda，所以我使用这个发行版。您可以通过运行
    `streamlit hello` 来测试您是否已正确安装 Streamlit。
- en: In our project folder, create a folder named `app`, where we’ll store our application
    code. Copy over the tools you created earlier into a tools folder under `app`/`tools`.
    Next, let’s look at managing our API keys.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的项目文件夹中，创建一个名为 `app` 的文件夹，我们将在此文件夹中存储我们的应用程序代码。将您之前创建的工具复制到 `app`/`tools`
    下的工具文件夹中。接下来，让我们看看如何管理我们的 API 密钥。
- en: Creating secrets and config management
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建密钥和配置管理
- en: 'The first bit of Streamlit magic will be to use the out-of-the-box secrets
    manager. Streamlit provides native file-based secrets management so that we can
    easily store and securely access our API keys and manage projects. Create a folder
    named `.streamlit` and a file named `secrets.toml`, and then add the API keys
    we need for this project:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit 的第一个魔法技巧将是使用现成的密钥管理器。Streamlit 提供了基于文件的密钥管理功能，使我们能够轻松存储和安全管理我们的 API
    密钥并管理项目。创建一个名为 `.streamlit` 的文件夹和一个名为 `secrets.toml` 的文件，然后添加本项目所需的 API 密钥：
- en: '`OPENAI_API_KEY="YOUR KEY"`'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`OPENAI_API_KEY="YOUR KEY"`'
- en: '`LANGCHAIN_API_KEY="YOUR KEY"`'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`LANGCHAIN_API_KEY="YOUR KEY"`'
- en: '`OPENWEATHERMAP_API_KEY="YOUR KEY"`'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`OPENWEATHERMAP_API_KEY="YOUR KEY"`'
- en: Streamlit automatically loads secrets from `secrets.toml` into your project
    directory during development, and it provides options if you want to deploy via
    the Streamlit Cloud interface or make your application publicly available. Let’s
    move on to creating our agent code.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发过程中，Streamlit 会自动将 `secrets.toml` 中的密钥加载到您的项目目录中，并提供选项，如果您想通过 Streamlit Cloud
    界面部署或使您的应用程序公开可用。接下来，让我们继续创建我们的代理代码。
- en: Creating our agent service
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建我们的代理服务
- en: Let’s organize the code for our LangChain service in a dedicated LangChain service
    file.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在一个专门的 LangChain 服务文件中组织我们的 LangChain 服务代码。
- en: '**Create the LangChain service**: Begin by creating a Python file dedicated
    to your LangChain service and storing it in the app folder. This could be named
    something like like langchain_service.py. This file will contain all the necessary
    code to set up and run your agent.'
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建 LangChain 服务**：首先创建一个用于 LangChain 服务的 Python 文件，并将其存储在应用文件夹中。这个文件可以命名为
    langchain_service.py。这个文件将包含设置和运行您的代理所需的所有必要代码。'
- en: '`ChatOpenAI` model, `AgentExecutor` to manage prompts and conversation memory,
    and the tools we created in the earlier steps (`weather_search`, `wikipedia_search`,
    and `hotel_search`), designed for specific chatbot functionalities.'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ChatOpenAI` 模型，`AgentExecutor` 用于管理提示和对话记忆，以及我们在早期步骤中创建的工具（`weather_search`、`wikipedia_search`
    和 `hotel_search`），这些工具旨在为特定的聊天机器人功能设计。'
- en: '`setup_agent``AgentExecutor` instance, equipped with specific tools and settings
    for the chatbot:'
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`setup_agent` 创建一个 `AgentExecutor` 实例，配备特定的工具和设置以用于聊天机器人：'
- en: '[PRE15]'
  id: totrans-157
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The preceding parameters include a list of messages for conversation history
    from the Streamlit app and the API keys for the OpenAI, LangChain, and `OpenWeatherMap`
    services. We then set our environment variables so that LangChain can access them.
    I’m also setting the environment variables so that we can track everything in
    LangSmith, along with a project name so that we can easily track all our interactions
    with Ellie.
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 前面的参数包括来自 Streamlit 应用和 OpenAI、LangChain 以及 `OpenWeatherMap` 服务的 API 密钥的消息列表，用于会话历史。然后我们设置环境变量，以便
    LangChain 可以访问它们。我还设置了环境变量，以便我们可以在 LangSmith 中跟踪一切，以及一个项目名称，这样我们就可以轻松跟踪我们与 Ellie
    的所有交互。
- en: '`ChatOpenAI` is created with specific temperature and model parameters. We
    also create our list of tools:'
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建 `ChatOpenAI` 时指定了特定的温度和模型参数。我们还创建了我们的工具列表：
- en: '[PRE16]'
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The predefined tools (`hotel_search`, `weather_search`, and `wikipedia`) will
    add our specialized functionalities, which the agent will decide to use depending
    on the question asked. `hub_prompt` is retrieved using `hub.pull`, which fetches
    a pre-defined prompt template from the LangChain hub. You can create this manually
    if you want more control, but for our example, this works perfectly.
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 预定义的工具（`hotel_search`、`weather_search` 和 `wikipedia`）将添加我们的专用功能，代理将根据提出的问题决定使用哪些功能。`hub_prompt`
    是通过 `hub.pull` 获取的，它从 LangChain hub 中获取一个预定义的提示模板。如果您想有更多的控制权，可以手动创建，但对我们这个例子来说，这已经足够完美。
- en: '`ConversationBufferWindowMemory`, which will give our Chatbot memory of the
    conversations and allow it to provide context-aware responses. Note that we’re
    keeping the last 20 interactions in memory by setting `k=20`, and we are also
    passing in a list of messages (`msgs`) into `chat_memory` from our Streamlit agent,
    which allows us to tie up our agent memory with Streamlit Session State.'
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ConversationBufferWindowMemory`，它将为我们的聊天机器人提供对话记忆，并允许它提供上下文感知的回复。注意，我们通过设置
    `k=20` 来保留最后 20 个交互的记忆，并且我们还从我们的 Streamlit 代理中传递一个消息列表 (`msgs`) 到 `chat_memory`，这使得我们可以将代理记忆与
    Streamlit 会话状态联系起来。'
- en: '`create_openai_tools_agent` function. This LangChain function creates an agent
    capable of using OpenAI’s `tools` functionality:'
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`create_openai_tools_agent` 函数。这个 LangChain 函数创建了一个能够使用 OpenAI 的 `tools` 功能的代理：'
- en: '[PRE17]'
  id: totrans-164
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '`create_openai_tools_agent` is called with the language model (`llm`), the
    list of tools, and `hub_prompt` to create a configured agent.'
  id: totrans-165
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用语言模型 (`llm`)、工具列表和 `hub_prompt` 调用 `create_openai_tools_agent` 来创建一个配置好的代理。
- en: '`AgentExecutor`, which is instantiated with the created agent, tools, memory
    configuration, and verbosity settings. This executor manages the execution flow
    of the chatbot, processes inputs, and generatesresponses based on the integrated
    tools and conversation memory. The `setup_agent()`function returns the `AgentExecutor`
    instance, which is now ready to be used in the Streamlit chatbot application.
    We’ll look at how we create this application and use our LangChain service in
    the next section:'
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`AgentExecutor`，它使用创建的代理、工具、内存配置和详细设置进行实例化。这个执行器管理聊天机器人的执行流程，处理输入，并根据集成的工具和对话记忆生成响应。`setup_agent()`
    函数返回 `AgentExecutor` 实例，现在它已准备好在 Streamlit 聊天机器人应用程序中使用。我们将在下一节中查看如何创建这个应用程序以及如何使用我们的
    LangChain 服务：'
- en: Building our Streamlit chat app
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建我们的 Streamlit 聊天应用
- en: 'With all our components now ready, it’s time to build our chatbot. Start by
    creating a file named `main.py`; this file will serve as the primary Streamlit
    script. Within this script, we will develop Ellie’s chatbot interface. Let’s go
    through the steps to create this code:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们所有的组件都已准备就绪，是时候构建我们的聊天机器人了。首先创建一个名为 `main.py` 的文件；这个文件将作为主要的 Streamlit 脚本。在这个脚本中，我们将开发
    Ellie 的聊天机器人界面。让我们一步步来创建这段代码：
- en: '`streamlit (as st)` for our chatbot elements. We also import `setup_agent()`.
    This function from the `langchain_service`.py we created initializes the chatbot’s
    agent with the necessary configurations and API keys.'
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `streamlit (as st)` 为我们的聊天机器人元素。我们还导入 `setup_agent()`。这个函数来自我们创建的 `langchain_service.py`，它使用必要的配置和
    API 密钥初始化聊天机器人的代理。
- en: '`init_streamlit()` function; this sets up the Streamlit page configuration
    with `st.set_page_config`, specifying the page title and icon. We also give our
    page a title with `st.title("` `✈️` `Ellie the` `explorer ")`.'
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`init_streamlit()` 函数；这个函数使用 `st.set_page_config` 设置 Streamlit 页面配置，指定页面标题和图标。我们还使用
    `st.title("✈️ Ellie the explorer ")` 给我们的页面一个标题。'
- en: '`StreamlitChatMessageHistory` is a class that allows you to store and use chat
    message history in a Streamlit app,'
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`StreamlitChatMessageHistory` 是一个类，允许您在 Streamlit 应用中存储和使用聊天消息历史，'
- en: '`msgs =` `StreamlitChatMessageHistory()`.'
  id: totrans-172
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`msgs = StreamlitChatMessageHistory()`。'
- en: It works seamlessly with LangChain by allowing you to incorporate the chat message
    history into your LangChain chains. It works by storing messages in Streamlit
    Session State at a specified key (the default is `langchain_messages`). We then
    pass over a reference of this memory to our agent.
  id: totrans-173
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 它与LangChain无缝工作，允许您将聊天消息历史集成到您的LangChain链中。它通过在指定的键（默认为`langchain_messages`）中存储消息来实现。然后，我们将此内存的引用传递给我们的代理。
- en: '`prepare_agent``setup_agent` with the chat message history and API keys stored
    in `st.secrets`, returning a configured `AgentExecutor`.'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`prepare_agent`和`setup_agent`使用存储在`st.secrets`中的聊天消息历史和API密钥，返回一个配置好的`AgentExecutor`。'
- en: '`AgentExecutor``prepare_agent().` to create our `agent_executor`'
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`AgentExecutor`和`prepare_agent()`用于创建我们的`agent_executor`'
- en: '`agent_executor: AgentExecutor = prepare_agent(msgs)`, passing the chat message
    history and API keys from `st.secrets` to the `setup_agent()` function imported
    from our LangChain service code, `langchain_service.py`, which returns the `AgentExecutor`
    instance configured for the chatbot.'
  id: totrans-176
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`agent_executor: AgentExecutor = prepare_agent(msgs)`，将聊天消息历史和从`st.secrets`获取的API密钥传递给从我们的LangChain服务代码`langchain_service.py`导入的`setup_agent()`函数，该函数返回为聊天机器人配置的`AgentExecutor`实例。'
- en: '**Display a welcome message**: Add a welcome for the user at the start of the
    conversation, guiding them on how to interact with the chatbot:'
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**显示欢迎消息**：在对话开始时向用户添加欢迎词，指导他们如何与聊天机器人交互：'
- en: '[PRE18]'
  id: totrans-178
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The message is defined and added to the chat history if it’s the initial load
    (i.e., there are no messages in the history).
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果是初始加载（即，历史中没有消息），则定义并添加消息到聊天历史。
- en: '**User interaction and response handling**: Next, we want to handle user input.
    If the user inputs a new prompt, we generate and draw a new response:'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用户交互和响应处理**：接下来，我们想要处理用户输入。如果用户输入一个新的提示，我们将生成并绘制一个新的响应：'
- en: '[PRE19]'
  id: totrans-181
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: An optional component can be added so that you can easily look at what’s being
    stored in `st.session_state.langchain_messages`. This is an expander widget (`st.expander`)
    to display the message history in the JSON format.
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 可以添加一个可选组件，以便您可以轻松查看存储在`st.session_state.langchain_messages`中的内容。这是一个展开小部件（`st.expander`），用于以JSON格式显示消息历史。
- en: The application listens for user input through `st.chat_input()`. When input
    is received, it’s displayed as a `human` message using `st.chat_message()`.
  id: totrans-183
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 应用程序通过`st.chat_input()`监听用户输入。当接收到输入时，它使用`st.chat_message()`将其显示为`human`消息。
- en: The input is then passed to `agent_executor.invoke()` to process the response,
    which, upon success, is displayed back to the user as an `ai` message.
  id: totrans-184
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然后将输入传递给`agent_executor.invoke()`以处理响应，如果成功，则将响应作为`ai`消息显示给用户。
- en: We’re also handling errors in the response format and errors coming back from
    our agent call; if there is an error, then this message is displayed using `st.error()`.
  id: totrans-185
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们还处理响应格式错误以及从我们的代理调用返回的错误；如果有错误，则使用`st.error()`显示此消息。
- en: 'If the script is the main program (i.e., not imported as a module), `init_streamlit()`
    is called to start the app:'
  id: totrans-186
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果脚本是主程序（即，不是作为模块导入），则调用`init_streamlit()`以启动应用程序：
- en: '[PRE20]'
  id: totrans-187
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: That’s it! Everything should now be in place to create a functioning chatbot.
    In the next section, let’s take it for a spin.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 就这些了！现在，一切应该都已经就绪，可以创建一个功能性的聊天机器人。在下一节中，让我们来试一试。
- en: Running and testing Ellie, our chatbot application
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行和测试我们的聊天机器人应用程序Ellie
- en: 'To run this Streamlit application, ensure that you have Streamlit and all the
    necessary packages installed in your Python environment. Then, navigate to the
    directory containing the `main.py` file and run the following command in your
    terminal:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行这个Streamlit应用程序，请确保您已经在Python环境中安装了Streamlit以及所有必要的包。然后，导航到包含`main.py`文件的目录，并在您的终端中运行以下命令：
- en: '[PRE21]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: This command launches the Streamlit web server and opens the app in your default
    web browser, allowing you to interact with the chatbot. If there are any issues,
    double-check that your API keys and any other required configurations are correctly
    set in `st.secrets` and passed appropriately to the `setup_agent()` function for
    the application to function as expected. You should also be able to see your logs
    appearing in LangChain once you start interacting with the chatbot, enabling you
    to drill down into each run.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令启动Streamlit网络服务器，并在您的默认网络浏览器中打开应用程序，允许您与聊天机器人交互。如果存在问题，请检查您的API密钥和任何其他必需的配置是否已正确设置在`st.secrets`中，并且已适当地传递给`setup_agent()`函数，以便应用程序按预期运行。您还应该能够在开始与聊天机器人交互后看到您的日志出现在LangChain中，这使您能够深入了解每次运行。
- en: 'Let’s try our first search for hotel recommendations. We get a useful result,
    as you can see in the following screenshot of the output:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试我们的第一个酒店推荐搜索。我们得到了一个有用的结果，如以下输出截图所示：
- en: '![Figure 8.2 – Asking our agent for hotel recommendations](img/B21100_08_2.jpg)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![图8.2 – 向我们的代理请求酒店推荐](img/B21100_08_2.jpg)'
- en: Figure 8.2 – Asking our agent for hotel recommendations
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 – 向我们的代理请求酒店推荐
- en: 'The agent looks at the question and chooses which tool to use to fulfill the
    request. This question is hotel-specific, so the agent calls our `hotel_search`
    tool to answer our question. Remember to look at the debug output in LangSmith
    to view the individual runs for the project. This will allow you to see the individual
    calls to get a solid understanding of how your agent interacts with the different
    LLMs to decide on the tool to use and return our response, as well as other tasks
    specific to the individual tool – for example, extracting the parameters to use
    in filtering our vector search. The following LangSmith screenshot shows this:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 代理查看问题并选择使用哪个工具来满足请求。这个问题是针对酒店的，因此代理调用我们的`hotel_search`工具来回答我们的问题。记得查看LangSmith中的调试输出以查看项目的单个运行。这将允许你看到对LLMs的单独调用，从而深入了解你的代理如何与不同的LLMs交互以决定使用哪个工具，并返回我们的响应，以及针对单个工具的其他特定任务
    – 例如，提取用于过滤我们的向量搜索的参数。以下LangSmith截图显示了这一点：
- en: '![Figure 8.3 – View the calls from our agent to the LLMs in LangSmith](img/B21100_08_3.jpg)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![图8.3 – 查看LangSmith中我们的代理对LLMs的调用](img/B21100_08_3.jpg)'
- en: Figure 8.3 – View the calls from our agent to the LLMs in LangSmith
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3 – 查看LangSmith中我们的代理对LLMs的调用
- en: Feel free to try your own questions with anything specific to your own data.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 随意尝试你自己的问题，任何与你的数据相关的问题。
- en: We should also be able to ask follow-up questions so that the agent exercises
    the other tools. In the following screenshot, we also ask about the weather, and
    you can see Ellie responds with data from our weather search tool.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还应该能够提出后续问题，以便代理练习其他工具。在以下截图中，我们还询问了天气，你可以看到Ellie使用我们的天气搜索工具提供数据。
- en: '![Figure 8.4 – We ask a weather-specific question to test our weather tool](img/B21100_08_4.jpg)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![图8.4 – 我们提出一个特定于天气的问题来测试我们的天气工具](img/B21100_08_4.jpg)'
- en: Figure 8.4 – We ask a weather-specific question to test our weather tool
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4 – 我们提出一个特定于天气的问题来测试我们的天气工具
- en: Try out the `wikipedia_search` tool by asking for something specific about the
    area.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 通过询问关于该地区的具体信息来尝试使用`wikipedia_search`工具。
- en: So, we now have a working ChatGPT-powered agent that can form a good basis for
    an even more advanced agent. Let’s look at what other improvements you can carry
    out.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在有一个基于ChatGPT的运行良好的代理，这可以作为一个更高级代理的良好基础。让我们看看你可以实施的其他改进。
- en: Ways to improve Ellie
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改进Ellie的方法
- en: 'There are lots of different enhancements you could implement to improve Ellie’s
    travel assistant capabilities:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以实施许多不同的增强来改进Ellie的旅行助手功能：
- en: Improve the chat UI – for example, implement streaming answers
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进聊天界面 – 例如，实现流式回答
- en: Provide more complex interactions by enhancing our LangChain agent so that we
    can carry out more complex transactional tasks
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过增强我们的LangChain代理，提供更复杂的交互，以便我们可以执行更复杂的交易任务
- en: Learn user preferences – their interests, family situation, and what they like
    to do on holiday
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习用户偏好 – 他们的兴趣、家庭状况以及他们喜欢在假期做什么
- en: Enhance the chatbot memory with a vector store to persist conversations so that
    they can be used between sessions
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过向量存储增强聊天机器人内存，以便在会话之间持久化对话，以便可以使用
- en: Look at the chunking strategy to improve vector embeddings for better searches
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查看分块策略以改进向量嵌入，以实现更好的搜索
- en: So far, what you’ve created is just a start and a good basis for creating a
    more complex ChatGPT-powered agent. Any of these enhancements would be worth implementing
    to improve Ellie’s capabilities.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你所创建的只是一个起点，是创建更复杂的ChatGPT代理的良好基础。这些增强中的任何一个都值得实施以改进Ellie的能力。
- en: Summary
  id: totrans-213
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we looked at a real-world example of creating a ChatGPT-powered
    conversational agent, using some of the techniques and technologies that we covered
    in earlier chapters. Our example was thoughtfully designed to cover the use cases,
    functionality, and features of our chatbot, allowing us to apply our knowledge
    of LangChain, RAG systems, and related tools effectively. You were also introduced
    to the Streamlit library to create rich chat interfaces and saw how to use this
    with LangChain. Hopefully, we’ve implemented our code base to make our agent extensible
    and something that we could use for a more complex project. We’ve achieved our
    aim of creating a ChatGPT conversational agent with knowledge of our own data
    and the capability to use external information and sources.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了创建一个由ChatGPT驱动的对话代理的真实世界示例，使用了我们在前几章中介绍的一些技术和方法。我们的示例经过精心设计，涵盖了聊天机器人的用例、功能和特性，使我们能够有效地应用我们对LangChain、RAG系统和相关工具的知识。您还介绍了Streamlit库来创建丰富的聊天界面，并看到了如何将其与LangChain结合使用。希望我们已经实现了我们的代码库，使我们的代理可扩展，并且可以用于更复杂的项目。我们已经实现了我们的目标，即创建一个具有我们自己的数据知识并能够使用外部信息和来源的ChatGPT对话代理。
- en: We’ve created our POC and validated our concept. It’s a start, but there is
    a lot to consider before creating a more extensive application and going live.
    In our final chapter, we’ll consider going into production with what we’ve learned
    so far and what other core functionality we would need to create to make this
    a reality. We’ll also consider other alternatives to ChatGPT and the emergence
    and importance of smaller language models. Finally, we’ll come to some conclusions
    and see where we go from here with the current state of the technology.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经创建了我们的原型并验证了我们的概念。这是一个开始，但在创建更广泛的应用程序并上线之前，还有很多事情需要考虑。在我们的最后一章中，我们将考虑使用到目前为止所学的内容进入生产，以及我们需要创建哪些其他核心功能来实现这一目标。我们还将考虑ChatGPT的其他替代方案以及小型语言模型的兴起和重要性。最后，我们将得出一些结论，并探讨在当前技术状态下我们将如何继续前进。
