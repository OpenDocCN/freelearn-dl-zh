- en: 'Please note that the ESP32-C3 features two built-in LEDs:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，ESP32-C3具有两个内置LED：
- en: LED D4, which is controlled by GPIO12
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由GPIO12控制的LED D4
- en: LED D5, which is controlled by GPIO13
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由GPIO13控制的LED D5
- en: In this chapter, we will use LED D5 as the system LED. In [*Chapter 12*](B22002_12.xhtml#_idTextAnchor311),
    we will configure LED D4 as the indicator for internet access status indicator.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将使用LED D5作为系统LED。在[*第12章*](B22002_12.xhtml#_idTextAnchor311)中，我们将配置LED
    D4作为互联网访问状态指示器。
- en: '**DHT11**: The DHT11 temperature and humidity sensor was introduced in [*Chapter
    8*](B22002_08.xhtml#_idTextAnchor216), equipped with GND, VCC, and an output data
    port.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DHT11**: DHT11温度和湿度传感器在第[*第8章*](B22002_08.xhtml#_idTextAnchor216)中介绍，配备GND、VCC和一个输出数据端口。'
- en: '**Piezo buzzer**: The piezo buzzer we use here is of the active type, requiring
    both GND and VCC inputs.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蜂鸣器**: 我们这里使用的蜂鸣器是主动型，需要GND和VCC输入。'
- en: '**RGB LED**: The RGB LED we use here is a color-changing LED. It is equipped
    with GND, VCC, red, blue, and green pins.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RGB LED**: 我们这里使用的RGB LED是一种变色LED。它配备了GND、VCC、红色、蓝色和绿色引脚。'
- en: '**Wires connection**: The following schematic diagram will guide you in wiring
    the ESP32-C3 module with a DHT11 sensor, a piezo buzzer, and an RGB LED.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**电线连接**: 下面的原理图将指导您如何使用DHT11传感器、蜂鸣器和RGB LED连接ESP32-C3模块。'
- en: '**Power supply**: The power supply to this board is through the USB-C port
    when you connect it through a USB-C cable from your MacBook.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**电源供应**: 当您通过USB-C线缆从MacBook连接时，该板的电源通过USB-C端口供电。'
- en: '![Figure 11.2 – Wires connection schematic diagram](img/B22002_11_02.jpg)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图11.2 – 连接原理图](img/B22002_11_02.jpg)'
- en: Figure 11.2 – Wires connection schematic diagram
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.2 – 连接原理图
- en: By now, you should be able to correctly wire the DHT11 sensor, the data range
    indicator LED, and the buzzer to the ESP32 according to the schematic diagram
    in *Figure 11**.2*. With the hardware prototype built, you are now ready to start
    coding on the ESP32.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，您应该能够根据*图11.2*中的原理图正确地将DHT11传感器、数据范围指示LED和蜂鸣器连接到ESP32。硬件原型搭建完成后，您现在可以开始对ESP32进行编码。
- en: Instructing ChatGPT to generate C++ code
  id: totrans-86
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 指导ChatGPT生成C++代码
- en: In this section, we will direct ChatGPT to produce C++ code on ESP32, using
    the well-designed application logic diagram and the hardware pin wire connections
    as effective prompts.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将直接指导ChatGPT在ESP32上生成C++代码，使用精心设计的应用程序逻辑图和硬件引脚连线作为有效提示。
- en: After you have carefully reviewed the diagram, understood the application logic,
    and familiarized yourself with the ChatGPT prompts outlined in *Chapters 6* and
    *8*, you can create custom prompts. These prompts will instruct ChatGPT to generate
    code in accordance with your application logic.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在您仔细审查了图示、理解了应用逻辑并熟悉了在第*第6章*和*第8章*中概述的ChatGPT提示后，您可以创建自定义提示。这些提示将指导ChatGPT根据您的应用逻辑生成代码。
- en: 'The following is a prompt example to instruct ChatGPT to generate code according
    to your application logic:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个提示示例，用于指导ChatGPT根据您的应用逻辑生成代码：
- en: '`Hi, ChatGPT,`'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '`你好，ChatGPT，`'
- en: '`Role:`'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '`角色：`'
- en: '`You act as a senior software developer with expertise in embedded development,
    specifically with IoT projects using the ESP32, Arduino-compatible sensors, and`
    `AWS Cloud.`'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '`你扮演一个具有嵌入式开发专业知识的高级软件开发者，特别是使用ESP32、Arduino兼容传感器和` `AWS云` `的物联网项目。`'
- en: '`Task:`'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：`'
- en: '`Your task is to mentor a high school student (like me) who has a basic understanding
    of Python and is new to C++. I need you to develop a comprehensive code snippet
    that fulfills the following objective, detailed requirements, implementation guidance,
    and` `output format.`'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '`你的任务是指导一个像我这样的对 Python 有基本了解但对 C++ 新手的高中生。你需要开发一个满足以下目标、详细要求、实施指导和输出格式的综合代码片段。`'
- en: '`Objective:`'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：`'
- en: '`Create an educational C++ code snippet on ESP32-C3 using the PlatformIO IDE
    with Arduino framework and Espressif32 platform, following the` `requirements
    below.`'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '`根据以下要求，在 ESP32-C3 上使用 PlatformIO IDE 和 Arduino 框架以及 Espressif32 平台创建一个教育性的
    C++ 代码片段。`'
- en: '`Requirements:`'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '`要求：`'
- en: '`Pin` `Wire Connections:`'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`引脚连接：`'
- en: '`Connect the DHT11 data pin to IO2 on` `the ESP32-C3.`'
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`将 DHT11 的数据引脚连接到 ESP32-C3 的 IO2。`'
- en: '`Connect the Piezo Buzzer signal pin to IO11 on` `the ESP32-C3.`'
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`将压电蜂鸣器的信号引脚连接到 ESP32-C3 的 IO11。`'
- en: '`Connect the RGB LED to IO1 to control Red color, IO12 for Blue color, and
    IO0 for Green coloron` `the ESP32-C3.`'
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`将 RGB LED 连接到 ESP32-C3 的 IO1 以控制红色，IO12 用于蓝色，IO0 用于绿色。`'
- en: '`Use IO13 to control the ESP32-C3''s built-in LED D5, designated as the` `System
    LED.`'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`使用 IO13 控制 ESP32-C3 内置 LED D5，指定为系统 LED。`'
- en: '`Data Retrieve Operation: Periodically read the DHT11 sensor''s temperature
    and humidity data and print it out locally in both Celsius` `and Fahrenheit.`'
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`数据检索操作：定期读取 DHT11 传感器的温度和湿度数据，并以摄氏度和华氏度在本地打印出来。`'
- en: '`Normal Condition: The retrieved data falls within the pre-defined` `normal
    range.`'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`正常条件：检索到的数据在预定义的正常范围内。`'
- en: '`Abnormal Condition: The retrieved data falls out of the pre-defined` `normal
    range.`'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`异常条件：检索到的数据超出预定义的正常范围。`'
- en: '`Error Condition: Data retrieval fails, and the system will then attempt to
    read the data three times. If all three attempts fail, the system will initiate`
    `a reboot.`'
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`错误条件：数据检索失败，系统将尝试读取数据三次。如果三次尝试都失败，系统将启动重启。`'
- en: '`Visual and` `Sound Indication:`'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`视觉和声音指示：`'
- en: '`Normal Condition: RGB LED turns solid on and mute` `the buzzer.`'
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`正常条件：RGB LED 亮起并关闭蜂鸣器。`'
- en: '`Abnormal Condition: If the data exceeds the normal range, the RGB LED will
    blink red, and the buzzer will beep in sync; If the data falls below the normal
    range, the RGB LED will blink blue, and the buzzer will beep` `in sync.`'
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`异常条件：如果数据超出正常范围，RGB LED 将闪烁红色，蜂鸣器将同步鸣叫；如果数据低于正常范围，RGB LED 将闪烁蓝色，蜂鸣器将同步鸣叫。`'
- en: '`Error Condition: Turns the system LED on solidly and triggers the buzzer to`
    `beep continuously.`'
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`错误条件：系统 LED 亮起并触发蜂鸣器连续鸣叫。`'
- en: '`Must Apply:`'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '`必须应用：`'
- en: '`Adopt C++ programming` `best practices.`'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`采用 C++ 编程最佳实践。`'
- en: '`Use "constexpr" to declare hardware` `related variables.`'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 "constexpr" 声明与硬件相关的变量。`'
- en: '`Uses the millis() function to manage timing without blocking other` `code
    execution`'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 millis() 函数管理时间，而不阻塞其他代码执行。`'
- en: '`Favor functions` `over classes.`'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`优先使用函数而不是类。`'
- en: '`Implement PWM control for both the System LED and buzzer using ledcSetup`
    `and ledcAttachPin.`'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用 ledcSetup 和 ledcAttachPin 实现系统 LED 和蜂鸣器的 PWM 控制。`'
- en: '`Avoid using magic numbers when defining` `constant variables.`'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`在定义常量变量时避免使用魔法数字。`'
- en: '`Use a non-blocking approach to blink the` `LED independently.`'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`使用非阻塞方法独立闪烁 LED。`'
- en: '`Include necessary` `dependency libraries.`'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`包含必要的依赖库。`'
- en: '`Provide line-by-line comments` `for clarity.`'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`提供逐行注释以提高清晰度。`'
- en: '`Output Format: Your code snippets output must comply with the following` `example
    format.`'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '`输出格式：您的代码片段输出必须符合以下示例格式。`'
- en: '[PRE0]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '`Create a platformio.ini file that incorporates the required library dependencies
    and` `environment settings.`'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`创建一个平台io.ini文件，其中包含所需的库依赖和环境设置。`'
- en: '`Ensure the following information` `is included.`'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`确保包含以下信息。`'
- en: '[PRE1]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: By now, you have learned how to use these prompts to request ChatGPT to generate
    code on your ESP32\. Next, let’s look at some code examples.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经学会了如何使用这些提示请求 ChatGPT 在你的 ESP32 上生成代码。接下来，让我们看看一些代码示例。
- en: Code examples
  id: totrans-127
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '`代码示例`'
- en: You can find the examples of `ChatGPT_Prompt`, `main.cpp` code and the `platformio.ini`
    file in [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_11](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_11).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在 [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_11](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_11)
    找到 `ChatGPT_Prompt`、`main.cpp` 代码和 `platformio.ini` 文件的示例。
- en: In the example of `main.cpp`, you can find the user-defined `setup()` and `loop()`
    functions, which essentially run within a FreeRTOS task. We mentioned FreeRTOS
    in the *MCUs* section of [*Chapter 3*](B22002_03.xhtml#_idTextAnchor068). ESP32
    supports FreeRTOS by default when using the Arduino framework on PlatformIO. The
    Arduino ESP32 platform automatically includes a FreeRTOS stack and calls the APIs
    of FreeRTOS in the `setup()` and `loop()` functions.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在`main.cpp`的示例中，你可以找到用户定义的`setup()`和`loop()`函数，它们实际上是在FreeRTOS任务中运行的。我们在[*第3章*](B22002_03.xhtml#_idTextAnchor068)的*MCUs*部分提到了FreeRTOS。当在PlatformIO上使用Arduino框架时，ESP32默认支持FreeRTOS。Arduino
    ESP32平台自动包含FreeRTOS堆栈，并在`setup()`和`loop()`函数中调用FreeRTOS的API。
- en: 'In the `main.cpp` example code, the following seven functions are generated
    by ChatGPT. Please note that the function names might be different from the output
    of ChatGPT:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在`main.cpp`示例代码中，以下七个函数是由ChatGPT生成的。请注意，函数名可能与ChatGPT的输出不同：
- en: '`checkSensorReadings()`: To read the sensor data value'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`checkSensorReadings()`: 读取传感器数据值'
- en: '`updateLEDs(bool red, bool green, bool blue)`: To update the RGB LED’s color
    according to the data value'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`updateLEDs(bool red, bool green, bool blue)`: 根据数据值更新RGB LED的颜色'
- en: '`indicateNormalCondition()`: Indicate normal conditions when the data value
    falls in the range of a predefined threshold'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`indicateNormalCondition()`: 当数据值落在预定义阈值范围内时，指示正常条件'
- en: '`indicateConditionBelowRange()`: Indicate condition below the range if the
    data value is beneath the predefined threshold'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`indicateConditionBelowRange()`: 如果数据值低于预定义阈值，指示低于范围的状况'
- en: '`indicateConditionAboveRange()`: Indicate condition above the range if the
    data value exceeds the predefined threshold'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`indicateConditionAboveRange()`: 如果数据值超过预定义阈值，指示超出范围的状况'
- en: '`indicateSensorError()`: Indicate sensor error if the data value is null'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`indicateSensorError()`: 如果数据值为空，指示传感器错误'
- en: '`ledBlinking()`: Handle LED blinking and buzzer beeping'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ledBlinking()`: 处理LED闪烁和蜂鸣器蜂鸣'
- en: In addition, to control the LED and buzzer, as requested, ChatGPT creates the
    correct approach through `digitalWrite()` method, PWM can effectively control
    an LED’s brightness. This is preferable to using resistors to dim LEDs, as it
    is more energy-efficient and can achieve smoother transitions between brightness
    levels. Also, PWM can be used not just for the buzzer’s volume control but also
    to generate different tones. By varying the frequency of the PWM signal, you can
    change the pitch of the sound emitted by the buzzer, which is useful in applications
    requiring different alert tones or musical notes.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，为了按照要求控制LED和蜂鸣器，ChatGPT通过`digitalWrite()`方法创建了正确的方法，PWM可以有效地控制LED的亮度。这比使用电阻来降低LED亮度更节能，并且可以实现亮度级别之间的更平滑过渡。此外，PWM不仅可以用于蜂鸣器的音量控制，还可以生成不同的音调。通过改变PWM信号的频率，可以改变蜂鸣器发出的声音的音调，这在需要不同警报音或音符的应用中非常有用。
- en: By the end of the following section, you should be able to prompt ChatGPT to
    produce code by following your instructions and the application logic. In the
    next section, we will go through the process of compiling and uploading the code
    on ESP32 through PlatformIO.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节结束时，你应该能够通过遵循你的指示和应用逻辑来提示ChatGPT生成代码。在下一节中，我们将通过PlatformIO对ESP32进行编译和上传代码。
- en: Using PlatformIO to program code on the ESP32
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用PlatformIO在ESP32上编程
- en: In this section, we will build and upload code onto the ESP32 via the PlatformIO
    IDE. Then, we will observe the messages printed locally on our Macbooks, and verify
    whether the outcome aligns with our logic.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过PlatformIO IDE在ESP32上构建和上传代码。然后，我们将观察在Macbook上本地打印的消息，并验证结果是否与我们的逻辑一致。
- en: 'Here are the steps that are to be followed:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是要遵循的步骤：
- en: 'Launch the PlatformIO IDE in VS Code, go to the project you made in [*Chapter
    10*](B22002_10.xhtml#_idTextAnchor294), look for `main.cpp` under `src` in the
    `project` folder, copy the code you got from the ChatGPT conversation window,
    and put the code in `main.cpp`, as shown here:'
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在VS Code中启动PlatformIO IDE，转到你在[*第10章*](B22002_10.xhtml#_idTextAnchor294)中创建的项目，在`project`文件夹下的`src`中查找`main.cpp`，从ChatGPT对话窗口中复制你得到的代码，并将其放入`main.cpp`中，如图所示：
- en: '![Figure 11.3 – Copying the main.cpp code from ChatGPT to PlatformIO](img/B22002_11_03.jpg)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![图11.3 – 将ChatGPT中的main.cpp代码复制到PlatformIO](img/B22002_11_03.jpg)'
- en: Figure 11.3 – Copying the main.cpp code from ChatGPT to PlatformIO
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.3 – 将ChatGPT中的main.cpp代码复制到PlatformIO
- en: Locate the `platformio.ini` file in your project folder, then copy the `platformio.ini`
    contents from the ChatGPT conversation window and paste them in the platformio.ini
    file here.
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的项目文件夹中找到 `platformio.ini` 文件，然后从 ChatGPT 对话窗口复制 `platformio.ini` 内容，并将其粘贴到此处。
- en: '![Figure 11.4 – Copying platformio.ini code from ChatGPT to PlatformIO](img/B22002_11_04.jpg)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.4 – 从 ChatGPT 复制 platformio.ini 代码到 PlatformIO](img/B22002_11_04.jpg)'
- en: Figure 11.4 – Copying platformio.ini code from ChatGPT to PlatformIO
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.4 – 从 ChatGPT 复制 platformio.ini 代码到 PlatformIO
- en: 'In the `platformio.ini` file example, there are two libraries under `lib_deps`:
    `adafruit/DHT sensor library@^1.4.6` and `adafruit/Adafruit Unified Sensor@^1.1.14`.
    You need to manually install them from the **Libraries** section of PlatformIO,
    as shown in the following screenshot.'
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `platformio.ini` 文件示例中，`lib_deps` 下有两个库：`adafruit/DHT sensor library@^1.4.6`
    和 `adafruit/Adafruit Unified Sensor@^1.1.14`。您需要从 PlatformIO 的 **库** 部分手动安装它们，如图中所示截图。
- en: '![Figure 11.5 – Installing Adafruit Unified Sensor and DHT sensor library in
    PlatformIO](img/B22002_11_05.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.5 – 在 PlatformIO 中安装 Adafruit Unified Sensor 和 DHT 传感器库](img/B22002_11_05.jpg)'
- en: Figure 11.5 – Installing Adafruit Unified Sensor and DHT sensor library in PlatformIO
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.5 – 在 PlatformIO 中安装 Adafruit Unified Sensor 和 DHT 传感器库
- en: Look for the *build* button, as shown in *Figure 11**.6*, to compile the code
    produced from ChatGPT.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻找如图 *图 11*.6* 所示的 *构建* 按钮，以编译从 ChatGPT 生成的代码。
- en: '![Figure 11.6 – The start of code building](img/B22002_11_06.jpg)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.6 – 代码构建的开始](img/B22002_11_06.jpg)'
- en: Figure 11.6 – The start of code building
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.6 – 代码构建的开始
- en: In the `SUCCESS`, as shown in *Figure 11**.7*, it means your code is well compiled
    and ready to upload to the ESP32\. If there are any errors reported, you can ask
    ChatGPT to help you correct them until the build succeeds.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 *图 11*.7* 中显示的 `SUCCESS` 表示您的代码已成功编译并准备好上传到 ESP32。如果有任何错误报告，您可以请求 ChatGPT
    帮助您纠正，直到构建成功。
- en: '![Figure 11.7 – Code building completion](img/B22002_11_07.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.7 – 代码构建完成](img/B22002_11_07.jpg)'
- en: Figure 11.7 – Code building completion
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.7 – 代码构建完成
- en: After building the code successfully, make sure the console cable connection
    between your MacBook and the ESP32 is correct, following the instructions shown
    in *Figure 11**.8* to check it, before uploading the code to the ESP32\. Please
    note that the console cable is typically a Type-C to Type-C USB cable. If the
    console cable connection between your MacBook and the ESP32 board is correct,
    you can click *Auto* to check if the USB port is shown as follows.
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代码构建成功后，请确保您的 MacBook 和 ESP32 之间的控制台电缆连接正确，按照 *图 11*.8* 中显示的说明进行检查，然后再将代码上传到
    ESP32。请注意，控制台电缆通常是 Type-C 到 Type-C USB 电缆。如果您的 MacBook 和 ESP32 板之间的控制台电缆连接正确，您可以点击
    *自动* 检查 USB 端口是否显示如下。
- en: '![Figure 11.8 – Checking the MacBook’s USB port conntected to the ESP32](img/B22002_11_08.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.8 – 检查 MacBook 的 USB 端口是否连接到 ESP32](img/B22002_11_08.jpg)'
- en: Figure 11.8 – Checking the MacBook’s USB port conntected to the ESP32
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.8 – 检查 MacBook 的 USB 端口是否连接到 ESP32
- en: Click **Upload** button to upload the compiled code to ESP32.
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **上传** 按钮将编译后的代码上传到 ESP32。
- en: '![Figure 11.9 – Clicking “Upload” to upload the code to ESP32](img/B22002_11_09.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.9 – 点击“上传”将代码上传到 ESP32](img/B22002_11_09.jpg)'
- en: Figure 11.9 – Clicking “Upload” to upload the code to ESP32
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.9 – 点击“上传”将代码上传到 ESP32
- en: Watch the write process until it shows `SUCCESS`.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 观察写入过程，直到显示 `SUCCESS`。
- en: '![Figure 11.10 – Code uploading completion](img/B22002_11_10.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.10 – 代码上传完成](img/B22002_11_10.jpg)'
- en: Figure 11.10 – Code uploading completion
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.10 – 代码上传完成
- en: After the write process, the ESP32 will reboot and you can locate the **Serial
    Monitor** button to see the messages print out on the console port of your MacBook.
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写入过程完成后，ESP32 将重新启动，您可以在 **串行监视器** 中找到 **Serial Monitor** 按钮，以查看打印在 MacBook
    控制台端口上的消息。
- en: '![Figure 11.11 – Opening the local console window on Serial Monitor](img/B22002_11_11.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.11 – 在串行监视器中打开本地控制台窗口](img/B22002_11_11.jpg)'
- en: Figure 11.11 – Opening the local console window on Serial Monitor
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.11 – 在串行监视器中打开本地控制台窗口
- en: When your code is right and matches what you expect, and you have successfully
    uploaded it to ESP32, you can see the messages printed out in the **TERMINAL**
    window.
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当您的代码正确且符合您的预期，并且您已成功将其上传到 ESP32 后，您可以在 **TERMINAL** 窗口中看到打印出来的消息。
- en: '![Figure 11.12 – Observing the output messages on the TERMINAL window](img/B22002_11_12.jpg)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.12 – 在 TERMINAL 窗口中观察输出消息](img/B22002_11_12.jpg)'
- en: Figure 11.12 – Observing the output messages on the TERMINAL window
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.12 – 在 TERMINAL 窗口中观察输出消息
- en: Now, you should be ready to compile and upload the code on the ESP32 to validate
    the outcome. As discussed in [*Chapter 6*](B22002_06.xhtml#_idTextAnchor194),
    ChatGPT may not provide 100% accurate code in the first round of conversation.
    You may need to continuously prompt ChatGPT to correct and improve its output
    through further conversation. Repeat the validation process several times until
    it fully aligns with your expectations.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你应该准备好在ESP32上编译和上传代码以验证结果。如[*第6章*](B22002_06.xhtml#_idTextAnchor194)中所述，ChatGPT在第一轮对话中可能无法提供100%准确的代码。你可能需要通过进一步的对话不断提示ChatGPT来纠正和改进其输出。重复验证过程几次，直到完全符合你的期望。
- en: Summary
  id: totrans-174
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you connected the ESP32-C3 to a DHT11 sensor and a piezo buzzer
    to successfully complete your first IoT project code. You should be able to validate
    the output on your local console port, observing the temperature and humidity
    data. The LED’s color will change, and the buzzer will beep for abnormal or error
    situations following your application flow.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将ESP32-C3连接到了一个DHT11传感器和一个压电蜂鸣器，成功完成了你的第一个物联网项目代码。你应该能够在你的本地控制台端口上验证输出，观察温度和湿度数据。LED的颜色将改变，根据你的应用程序流程，蜂鸣器将在异常或错误情况下发出蜂鸣声。
- en: In the next chapter, we’ll progress by connecting your ESP32-C3 to your home
    Wi-Fi network. This is a crucial step before transmitting DHT11 data to the AWS
    cloud.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将通过将你的ESP32-C3连接到你的家庭Wi-Fi网络来继续前进。这是在将DHT11数据传输到AWS云之前的一个关键步骤。
