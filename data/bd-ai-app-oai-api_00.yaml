    frontend.</st>'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[*<st c="6852">第8章</st>*](B22414_08.xhtml#_idTextAnchor103)<st c="6862">,</st>
    *<st c="6864">使用PyQt和ChatGPT API的论文生成工具</st>*<st c="6911">，为您提供了一步一步的指南，说明如何将ChatGPT
    API与PyQT集成以进行桌面应用程序开发，以及如何从</st> <st c="7062">应用程序前端控制API令牌。</st>'
- en: '[*<st c="7075">Chapter 9</st>*](B22414_09.xhtml#_idTextAnchor112)<st c="7085">,</st>
    *<st c="7087">Integrating ChatGPT and DALL-E API: Building End-to-End PowerPoint
    Presentation Generator</st>*<st c="7176">, provides a hands-on approach to integrating
    two AI APIs, ChatGPT and DALL-E, and creating an AI-generated</st> <st c="7284">PowerPoint
    presentation.</st>'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '[*<st c="7075">第9章</st>*](B22414_09.xhtml#_idTextAnchor112)<st c="7085">,</st>
