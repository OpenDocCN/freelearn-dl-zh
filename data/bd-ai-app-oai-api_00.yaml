    API，ChatGPT和DALL-E，并创建一个AI生成的</st> <st c="7284">PowerPoint演示文稿。</st>'
- en: '[*<st c="7308">Chapter 10</st>*](B22414_10.xhtml#_idTextAnchor120)<st c="7319">,</st>
    *<st c="7321">Speech Recognition and Text-to-Speech with the Whisper API</st>*<st
    c="7379">, provides you with an overview of the Whisper API and guides you through
    a practical project to build subtitles and translations using</st> <st c="7515">audio
    files.</st>'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[*<st c="7308">第10章</st>*](B22414_10.xhtml#_idTextAnchor120)<st c="7319">,</st>
    *<st c="7321">使用Whisper API进行语音识别和文本转语音</st>*<st c="7379">，为您提供了Whisper API的概述，并指导您通过一个实际项目使用音频文件构建字幕和翻译。</st>'
- en: '[*<st c="7527">Chapter 11</st>*](B22414_11.xhtml#_idTextAnchor132)<st c="7538">,</st>
    *<st c="7540">Choosing the Right ChatGPT API Model</st>*<st c="7576">, provides
    an overview of ChatGPT API models and parameters, helping you choose the best
