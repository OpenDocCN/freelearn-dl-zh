- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Using AI Tools to Draw Application Flow Diagrams
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI工具绘制应用程序流程图
- en: In the last chapter, we explored 10 beginner-friendly IoT projects, complete
    with ChatGPT prompt examples. Hopefully, you’re eager to choose one and embark
    on your innovative development journey.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们探讨了10个适合初学者的物联网项目，并附有ChatGPT提示示例。希望你现在迫不及待地想要选择一个项目，开始你的创新开发之旅。
- en: This chapter suggests beginning your first practice project by designing a flow
    diagram for your application before you start coding. This initial step is crucial.
    We’ll guide you on how to use AI tools to create detailed diagrams that illustrate
    how the application works locally, connects to the internet, and accesses the
    cloud. These diagrams will help you understand data interaction, error handling,
    and the integration of different components of your IoT project. By the end of
    this chapter, you’ll be able to translate the narrative of your project’s application
    into a comprehensive diagram with the help of AI tools.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章建议在你开始编码之前，先为你的应用程序设计一个流程图作为你的第一个实践项目。这一步至关重要。我们将指导你如何使用AI工具创建详细图表，说明应用程序如何在本地工作、连接到互联网以及访问云端。这些图表将帮助你理解数据交互、错误处理以及物联网项目中不同组件的集成。到本章结束时，你将能够借助AI工具将你项目应用程序的叙述转化为一个全面的图表。
- en: 'We will be covering the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下主题：
- en: Using diagrams for a better application journey
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用图表改善应用程序之旅
- en: Processing data locally
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本地数据处理
- en: Establishing an internet connection
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立互联网连接
- en: Sending sensor data to Cloud
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将传感器数据发送到云
- en: Data processing on the cloud
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 云端数据处理
- en: Using diagrams for a better application journey
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用图表改善应用程序之旅
- en: A comprehensive application flow diagram is beneficial before starting to code.
    A detailed diagram can clarify the process of local data handling, the interaction
    between sensor data and local electronics, error handling, the power consumption
    mechanism, and the conditions for activating the wireless connectivity setup.
    Once the data reaches the cloud, a diagram should be created to outline the flow
    for data storage, forwarding, processing, analysis, visualization, and customer
    notifications.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始编码之前，一个全面的应用程序流程图是有益的。详细的图表可以阐明本地数据处理过程、传感器数据与本地电子设备的交互、错误处理、功耗机制以及激活无线连接设置的条件。一旦数据到达云端，应创建一个图表来概述数据存储、转发、处理、分析、可视化和客户通知的流程。
- en: Compose a thorough narrative that precisely describes your *story* about data
    flow. This story will serve as a guide, providing clear instructions to ensure
    your code aligns with your specific needs and objectives.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个详尽的叙述，精确地描述你的关于数据流的*故事*。这个故事将作为指南，提供明确的指示，以确保你的代码符合你的特定需求和目标。
- en: The raw data generated from sensors typically forms small packets ranging from
    a few bits to bytes. It seems like a simple, easy, and straightforward journey
    where the MCU captures this data and sends it to its wireless interface to access
    the internet, which ultimately reaches the cloud. However, in actual deployment,
    this journey is rarely peaceful and joyful, always encountering many abnormal
    situations and uncontrollable challenges.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 来自传感器的原始数据通常形成从小几比特到字节的微小数据包。这似乎是一个简单、直接且直接的旅程，其中MCU捕获这些数据并将其发送到其无线接口以访问互联网，最终到达云端。然而，在实际部署中，这段旅程很少是平静和愉快的，总是遇到许多异常情况和不可控的挑战。
- en: Therefore, before writing your first line of code, it’s crucial to create a
    diagram that illustrates how data will be processed at each stage. This not only
    gives you a clear understanding of how the application works but also serves as
    a guiding baseline for the subsequent coding process with ChatGPT.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在编写第一行代码之前，创建一个说明每个阶段数据处理方式的图表至关重要。这不仅让你清楚地了解应用程序的工作方式，还作为后续使用ChatGPT进行编码过程的指导基准。
- en: 'There are numerous AI tools available that can assist you in creating such
    diagrams. For a simple text block format diagram, you can interact with ChatGPT-4o
    (free). Alternatively, you can use GPTs such as *Diagram: Show Me* within ChatGPT
    4 (this requires a subscription). For a more professional diagram, consider using
    dedicated AI-driven websites such as [https://www.mermaidchart.com/](https://www.mermaidchart.com/).
    In the following sections, we’ll practice generating diagrams for typical scenarios
    encountered in the IoT development journey, using the AI chat feature on [www.mermaidchart.com](http://www.mermaidchart.com).'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '有许多AI工具可供使用，可以帮助您创建此类图表。对于简单的文本块格式图表，您可以使用ChatGPT-4o（免费）。或者，您可以在ChatGPT 4中使用GPTs，如*Diagram:
    Show Me*（这需要订阅）。对于更专业的图表，请考虑使用专门的AI驱动网站，例如[https://www.mermaidchart.com/](https://www.mermaidchart.com/)。在以下章节中，我们将练习使用[www.mermaidchart.com](http://www.mermaidchart.com/)上的AI聊天功能生成典型场景的图表。'
- en: Processing data locally
  id: totrans-16
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本地数据处理
- en: 'Sensor data is first collected locally by the MCU. In most cases, an MCU processes
    sensor data locally under the following situations:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 传感器数据首先由MCU在本地收集。在大多数情况下，MCU在以下情况下在本地处理传感器数据：
- en: '**Normal situation**: The MCU successfully fetches data from the sensor, or
    the sensor triggers an event as expected.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正常情况**：MCU成功从传感器获取数据，或者传感器按预期触发事件。'
- en: '**Abnormal situation**: The MCU fails to fetch data from the sensor, or the
    sensor fails to trigger an event. In this case, the most likely causes are sensor
    initialization failure or hardware malfunction.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常情况**：MCU无法从传感器获取数据，或者传感器未能触发事件。在这种情况下，最可能的原因是传感器初始化失败或硬件故障。'
- en: To enhance the user experience and quickly indicate the service status, consider
    using a color-changing LED and a buzzer beep on your IoT device to convey meaningful
    messages to the user.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提升用户体验并快速指示服务状态，考虑在您的物联网设备上使用可变色LED和蜂鸣声，向用户传达有意义的消息。
- en: With this in mind, let us use the AI chat at [https://www.mermaidchart.com/](https://www.mermaidchart.com/)
    to generate a flow.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，让我们使用[https://www.mermaidchart.com/](https://www.mermaidchart.com/)上的AI聊天功能生成一个流程图。
- en: The following screenshot shows the process to prompt the AI chat at mermaidchart.com
    to create a diagram following your instructions.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 以下截图显示了在mermaidchart.com上提示AI聊天创建图表的过程。
- en: '![Figure 9.1 – An overview of how diagrams are generated by mermaidchart.com](img/B22002_09_01.jpg)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图9.1 – mermaidchart.com生成图表的概述](img/B22002_09_01.jpg)'
- en: Figure 9.1 – An overview of how diagrams are generated by mermaidchart.com
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1 – mermaidchart.com生成图表的概述
- en: 'You can use the following prompts as examples of instructions to insert in
    the **AI** **Chat** window:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用以下提示作为在**AI** **Chat**窗口中插入指令的示例：
- en: '`Task: Imagine you''re planning to develop a temperature sensor end-device
    for monitoring conditions in customer warehouses. This device includes a temperature
    sensor, an MCU, four distinct LEDs for various status indicators (temperature
    range, Wi-Fi access, AWS Cloud access, and system information), a buzzer, and
    an embedded` `Wi-Fi module.`'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：假设您正在计划开发一个用于监控客户仓库条件的温度传感器端设备。此设备包括温度传感器、MCU、四个不同的LED用于各种状态指示（温度范围、Wi-Fi接入、AWS云接入和系统信息）、蜂鸣器和嵌入式`
    `Wi-Fi模块。`'
- en: '`Action: Create a diagram illustrating the sequence of local` `data interactions:`'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '`操作：创建一个展示本地数据交互序列的图表：`'
- en: '`When MCU successfully reads the sensor''s data, it will perform the` `following
    operation`'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`当MCU成功读取传感器的数据时，它将执行以下操作`'
- en: '`If the data is within Normal Range: LED1(Temperature Indicator)displays a
    steady green; mute` `the buzzer`'
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果数据在正常范围内：LED1（温度指示器）显示稳定的绿色；关闭蜂鸣声`'
- en: '`If the data is below Normal Range: LED1 changes to a steady blue; sounds the
    buzzer a` `low-pitch beep;`'
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果数据低于正常范围：LED1变为稳定的蓝色；发出低音调的蜂鸣声；`'
- en: '`If the data is above Normal Range: LED1 blinks red; sounds the buzzer a` `high-pitch
    beep;`'
  id: totrans-31
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果数据高于正常范围：LED1闪烁红色；发出高音调的蜂鸣声；`'
- en: '`When MCU fails to read the sensor''s data, it will perform the` `following
    operation`'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`当MCU无法读取传感器的数据时，它将执行以下操作`'
- en: '`If data retrieval fails, the MCU will attempt 3 times before` `entering a
    failure state, LED#1 changes to off, LED4 (System Error Indicator) switches to
    a steady red, and sound the` `buzzer continuously`'
  id: totrans-33
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`如果数据检索失败，MCU将在进入故障状态前尝试3次，LED#1变为关闭状态，LED4（系统错误指示器）变为稳定的红色，并持续发出蜂鸣声`'
- en: '`Goal: Ensure the diagram is clear, accurately reflecting the device''s` `data
    interaction flow. It should visually represent sensor data processing, LED responses,
    Wi-Fi and AWS Cloud connectivity, and buzzer alerts based on different` `temperature
    readings.`'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：确保图表清晰，准确反映设备的数据交互流程。它应直观地表示传感器数据处理、LED响应、Wi-Fi和AWS云连接以及基于不同温度读数的蜂鸣器警报。`'
- en: The generated diagram is shown as follows.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的图表如下所示。
- en: '![Figure 9.2 – Data local processing flow](img/B22002_09_02.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图9.2 – 数据本地处理流程](img/B22002_09_02.jpg)'
- en: Figure 9.2 – Data local processing flow
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2 – 数据本地处理流程
- en: In this section, we designed a data local processing flow with the collected
    value, the color changes of the LED, and the buzzer beeping on/off. As shown in
    *Figure 9**.1*, we assumed to use the local Wi-Fi network to report the data to
    the AWS cloud. However, in an actual deployment, the internet access by a local
    Wi-Fi network still has an abnormal situation, such as a firewall behind the Wi-Fi
    network may block the device to access internet.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们设计了一个包含收集到的值、LED颜色变化以及蜂鸣器蜂鸣开/关的数据本地处理流程。如图*图9.1*所示，我们假设使用本地Wi-Fi网络将数据报告给AWS云。然而，在实际部署中，通过本地Wi-Fi网络的互联网访问仍然存在异常情况，例如Wi-Fi网络背后的防火墙可能会阻止设备访问互联网。
- en: Establishing an internet connection
  id: totrans-39
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 建立互联网连接
- en: After processing local data, establishing internet connectivity is necessary
    to report the data to the cloud. To conserve power, the IoT device typically doesn’t
    always need to maintain online connectivity. Instead, it should establish an internet
    connection only when it has data to transmit.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理本地数据后，建立互联网连接是必要的，以便将数据报告到云。为了节省电力，物联网设备通常不需要始终保持在线连接。相反，它应该只在有数据要传输时建立互联网连接。
- en: 'Assuming the use of a home Wi-Fi network to access the internet, you may encounter
    two basic situations:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 假设使用家庭Wi-Fi网络访问互联网，您可能会遇到两种基本情况：
- en: '**Normal situation**: The MCU successfully connects to your home Wi-Fi router
    and obtains a valid IP address'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正常情况**：MCU成功连接到您的家庭Wi-Fi路由器并获得有效IP地址'
- en: '**Abnormal situation**: The MCU fails to connect to your home Wi-Fi router
    (not assigned a valid IP address) due to reasons such as weak signal strength
    or incorrect SSID and password'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常情况**：由于信号强度弱或SSID和密码不正确等原因，MCU无法连接到您的家庭Wi-Fi路由器（未分配有效IP地址）'
- en: 'Continuing with [https://mermaidchart.com](https://mermaidchart.com), a flow
    diagram can be generated, as shown in the following chart. The following prompt
    was used to generate the diagram:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 继续使用[https://mermaidchart.com](https://mermaidchart.com)，可以生成流程图，如下所示。以下提示用于生成图表：
- en: '`Task: Imagine you''re planning to develop a temperature sensor end-device
    for monitoring conditions in customer warehouses. This device includes a temperature
    sensor, an MCU, four distinct LEDs for various status indicators (temperature
    range, Wi-Fi access, AWS Cloud access, and system information), a buzzer, and
    an embedded Wi-Fi module. You are now focusing on the data connectivity sequence
    by the` `following aspects:`'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：假设你正在计划开发一个用于监控客户仓库条件的温度传感器端设备。该设备包括温度传感器、MCU、四个用于不同状态指示的独立LED（温度范围、Wi-Fi访问、AWS云访问和系统信息）、蜂鸣器和嵌入式Wi-Fi模块。你现在正专注于以下方面的数据连接序列：`'
- en: '`Action: Create a diagram illustrating the sequence of Wi-Fi connectivity.
    The MCU initiates connection to the home Wi-Fi router after collecting data` `from
    sensor.`'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '`行动：创建一个说明Wi-Fi连接序列的图表。MCU在从传感器收集数据后，将启动与家庭Wi-Fi路由器的连接。`'
- en: '`Normal Situation: If IP address is assigned by home Wi-Fi` `router, LED2 shows`
    `steady green.`'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`正常情况：如果IP地址由家庭Wi-Fi路由器分配，LED2将显示稳定的绿色。`'
- en: '`Error Handling : If the MCU fails to connect to the Wi-Fi router, it will
    make three additional attempts. Upon failure, LED2 will illuminate steady red
    to indicate` `connectivity issues.`'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`错误处理：如果MCU无法连接到Wi-Fi路由器，它将进行三次额外的尝试。如果失败，LED2将发出稳定的红色光以指示连接问题。`'
- en: '`Goal: Construct a diagram that clearly delineates the device''s operational
    flow, including LED signal interpretation and Wi-Fi connection. The diagram should
    effectively convey how the device responds to various data conditions, manages
    Wi-Fi connectivity, and indicates system status through LED` `color settings.`'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：构建一个清晰界定设备操作流程的图表，包括LED信号解释和Wi-Fi连接。该图表应有效地传达设备如何响应各种数据条件，管理Wi-Fi连接，并通过LED颜色设置指示系统状态。`'
- en: 'The generated diagram is shown as follows:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的图示如下所示：
- en: '![Figure 9.3 – Wi-Fi access flow](img/B22002_09_03.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.3 – Wi-Fi 访问流程](img/B22002_09_03.jpg)'
- en: Figure 9.3 – Wi-Fi access flow
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.3 – Wi-Fi 访问流程
- en: In this section, we designed a flow to access a home Wi-Fi network considering
    both normal and abnormal situations. Now, given successful access to the internet,
    we expect the sensor data to arrive at the cloud. However, there may be exceptions
    to this process. For instance, the device can be rejected by the cloud due to
    improper authentication credentials, we need to be aware of such scenarios.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们设计了一个流程来访问家庭 Wi-Fi 网络，考虑了正常和异常情况。现在，在成功接入互联网后，我们期望传感器数据到达云端。然而，此过程可能有例外。例如，设备可能由于认证凭证不正确而被云拒绝，我们需要意识到这种场景。
- en: Sending sensor data to Cloud
  id: totrans-54
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将传感器数据发送到云端
- en: 'Once wireless connectivity is established and an IP address is granted, your
    device will be ready to transmit data to the cloud. However, there may still be
    two situations to consider at this step:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦建立无线连接并获得 IP 地址，您的设备将准备好向云端传输数据。然而，在此步骤中仍需考虑两种情况：
- en: '**Normal situation**: The MCU successfully connects to the cloud'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正常情况**：MCU 成功连接到云'
- en: '**Abnormal situation**: The MCU fails to connect to the cloud due to some reasons,
    such as incorrect registration credentials'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常情况**：MCU 由于某些原因（例如错误的注册凭证）无法连接到云。'
- en: 'Using [https://mermaidchart.com](https://mermaidchart.com), you can have a
    data flow diagram as shown in the following chart. The following prompt was used
    to generate the diagram:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 [https://mermaidchart.com](https://mermaidchart.com)，你可以得到如下所示的流程图。以下提示用于生成该图：
- en: '`Task: Imagine you''re planning to develop a temperature sensor end-device
    for monitoring conditions in customer warehouses. This device includes a temperature
    sensor, an MCU, four distinct LEDs for various status indicators (temperature
    range, Wi-Fi access, AWS Cloud access, and system information), a buzzer, and
    an embedded Wi-Fi module. You are now focusing on the data arrivals at the Cloud,
    considering the` `following aspects:`'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：假设您正在计划开发一个用于监控客户仓库条件的温度传感器端设备。此设备包括温度传感器、MCU、四个用于不同状态指示的独立 LED（温度范围、Wi-Fi
    访问、AWS 云访问和系统信息）、蜂鸣器和嵌入式 Wi-Fi 模块。您现在正专注于数据到达云端，考虑以下方面：`'
- en: '`Action: Create a diagram illustrating the sequence of data arrivals at the
    Cloud, i.e., AWS` `IoT Core.`'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '`操作：创建一个图示，说明数据到达云端的顺序，即 AWS `IoT Core`。'
- en: '`Cloud Connectivity:`'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`云连接：`'
- en: '`The MCU Initiate and establish a secure MQTT communication between the MCU
    and AWS IoT Core for` `data transmission.`'
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`MCU 初始化并与 AWS IoT Core 建立安全的 MQTT 通信以进行数据传输。`'
- en: '`Data Handling:`'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`数据处理：`'
- en: '`Normal Situation: The MCU receives acknowledge from AWS IoT Core and set LED3
    to` `steady green.`'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`正常情况：MCU 从 AWS IoT Core 收到确认并设置 LED3 为` `稳定绿色。`'
- en: '`Error Handling : In scenarios where the MCU does not receive acknowledgment
    from AWS IoT Core, it attempts to resend the data three more times. If all attempts
    fail, LED3 is activated to a steady red, signaling an issue with` `cloud connectivity.`'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`错误处理：在 MCU 未从 AWS IoT Core 收到确认的情况下，它将尝试重新发送数据三次。如果所有尝试都失败，LED3 将激活为稳定红色，表示`
    `云连接` `存在问题。`'
- en: '`Goal: This diagram should serve as a visual guide, clearly conveying the steps
    involved in data transmission to AWS IoT Core, including the mechanisms for handling
    communication success` `or failure.`'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：此图示应作为视觉指南，清晰地传达数据传输到 AWS IoT Core 所涉及的步骤，包括处理通信成功或失败机制。`'
- en: The generated diagram is shown as follows.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的图示如下所示。
- en: '![Figure 9.4 – Cloud access flow](img/B22002_09_04.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.4 – 云访问流程](img/B22002_09_04.jpg)'
- en: Figure 9.4 – Cloud access flow
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.4 – 云访问流程
- en: Data processing on the cloud
  id: totrans-70
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 云端数据处理
- en: 'Once the device establishes communication with the cloud and sends the data,
    the data starts its journey within the cloud. You can still use [https://mermaidchart.com](https://mermaidchart.com)
    to create a data process flow diagram outlining how the data is processed:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦设备与云建立通信并发送数据，数据开始在云中传输。您仍然可以使用 [https://mermaidchart.com](https://mermaidchart.com)
    创建一个数据处理流程图，概述数据是如何被处理的：
- en: '`Task: Imagine you''re planning to develop a temperature sensor end-device
    for monitoring conditions in customer warehouses. This device includes a temperature
    sensor, an MCU, four distinct LEDs for various status indicators (temperature
    range, Wi-Fi access, AWS Cloud access, and system information), a buzzer, and
    an embedded Wi-Fi module. The current phase of development focuses on the data
    handling and processing within the AWS` `Cloud environment.`'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '`任务：假设您正在计划开发一个用于监控客户仓库条件的温度传感器端设备。该设备包括温度传感器、MCU、四个不同状态的LED指示灯（温度范围、Wi-Fi访问、AWS
    云访问和系统信息）、蜂鸣器和嵌入式Wi-Fi模块。当前的开发阶段集中在 AWS 云环境中的数据处理和上。`'
- en: '`Action: Design a comprehensive diagram that illustrates the sequence of data
    handling and processing among various AWS` `Cloud services.`'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '`行动：设计一个综合图表，说明各种 AWS 云服务之间数据处理和处理的顺序。`'
- en: '`Data Ingestion:`'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`数据摄取：`'
- en: '`The sensor data is published to the AWS IoT Core through` `MQTT protocol`'
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`传感器数据通过 MQTT 协议发布到 AWS IoT Core`'
- en: '`Data Processing` `and Analysis:`'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`数据处理和分析：`'
- en: '`The AWS IoT Core forwards the abnormal sensor data to AWS Lambda for processing`
    `and analysis.`'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWS IoT Core 将异常传感器数据转发到 AWS Lambda 进行处理和分析。`'
- en: '`When determines abnormal situation, AWS Lambda triggers an alert notification
    to` `AWS SNS.`'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`当检测到异常情况时，AWS Lambda 触发警报通知到 AWS SNS。`'
- en: '`AWS SNS sends email or message to` `notify customer`'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWS SNS 向客户发送电子邮件或消息以` `通知`'
- en: '`Data Storage, enrich,` `and Query:`'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`数据存储、丰富和查询：`'
- en: '`AWS IoT Core routes all the sensor data to AWS` `IoT Analytics`'
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWS IoT Core 将所有传感器数据路由到 AWS` `IoT Analytics`'
- en: '`Data Visualization:`'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`数据可视化：`'
- en: '`AWS QuickSight query sensor data from AWS IoT Analytics to generate customer`
    `application dashboard.`'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`AWS QuickSight` 从 `AWS IoT Analytics` 查询传感器数据以生成客户 `应用程序仪表板。`'
- en: '`Goal: Construct a diagram that meticulously details the data processing flow
    across different AWS services. This diagram should not only depict the operational
    workflow but also clarify how data moves from the sensor to the cloud, undergoes
    processing and analysis, is stored, visualized, and triggers alert notifications.
    Emphasize the integration and interaction between AWS IoT Core, AWS Lambda, AWS
    IoT Analytics, AWS SNS and AWS QuickSight to provide a clear and comprehensive
    view of the system''s architecture and` `data lifecycle.`'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '`目标：构建一个详细展示不同 AWS 服务间数据处理流程的图表。此图表不仅应描绘操作工作流程，还应阐明数据如何从传感器移动到云端，经过处理和分析，存储、可视化，并触发警报通知。强调
    AWS IoT Core、AWS Lambda、AWS IoT Analytics、AWS SNS 和 AWS QuickSight 之间的集成和交互，以提供系统架构和数据生命周期的清晰全面视图。`'
- en: The generated diagram is shown as follows.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的图表如下所示。
- en: '![Figure 9.5 – Data processing on the cloud](img/B22002_09_05.jpg)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图9.5 – 云端数据处理](img/B22002_09_05.jpg)'
- en: Figure 9.5 – Data processing on the cloud
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.5 – 云端数据处理
- en: After generating a diagram that accurately represents your application’s flow,
    you’ll have a comprehensive understanding of its functionality, from the sensor
    to the cloud. This overview not only provides a visual representation of your
    application but also helps identify potential areas for improvement or issues.
    Equipped with this visual aid and a clear understanding of your application’s
    workflow, you’re ready to begin your innovation journey. The next crucial step
    is setting up your development environment before creating your first project.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成准确表示您应用程序流程的图表后，您将对其功能有全面的理解，从传感器到云端。这个概述不仅提供了您应用程序的视觉表示，还有助于识别潜在的改进区域或问题。在有了这个视觉辅助工具和对您应用程序工作流程的清晰理解之后，您就可以开始您的创新之旅了。下一步关键步骤是在创建第一个项目之前设置您的开发环境。
- en: Summary
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we started your journey toward IoT innovation. With the help
    of AI-driven tools such as [https://mermaidchart.com](https://mermaidchart.com),
    you can visualize clear application flows. This aids in grasping the logic of
    service interactions, including how to manage abnormal situations. Not only does
    this diagram enhance your understanding from a system design perspective, but
    it also serves as a streamlined guide for ChatGPT to comprehend your flow and
    generate code accordingly.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们开始了您向物联网创新之旅。借助如 [https://mermaidchart.com](https://mermaidchart.com)
    这样的 AI 驱动工具，您可以可视化清晰的应用程序流程。这有助于掌握服务交互的逻辑，包括如何管理异常情况。不仅此图表从系统设计角度增强了您的理解，而且它还作为
    ChatGPT 理解您的流程并相应生成代码的简化指南。
- en: As we move on to the next chapter, we will be focusing on setting up a development
    environment. This will be accomplished by utilizing the PlatformIO IDE within
    Visual Studio Code. This setup is crucial as it facilitates the process of compiling
    and uploading the software code generated by ChatGPT. More specifically, in the
    subsequent example project, you will gain hands-on experience with this environment,
    learning how to effectively use it to compile and upload the software code. This
    practical exercise will not only consolidate your understanding of the development
    process but also equip you with the necessary skills to handle future IoT projects.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进入下一章，我们将专注于设置开发环境。这将通过在Visual Studio Code中使用PlatformIO IDE来完成。这种设置至关重要，因为它简化了由ChatGPT生成的软件代码的编译和上传过程。更具体地说，在随后的示例项目中，您将获得实际操作经验，学习如何有效地使用该环境来编译和上传软件代码。这项实际练习不仅将巩固您对开发过程的理解，还将为您提供处理未来物联网项目所需的基本技能。
- en: 'Part 3: Practicing an End-to-End Project'
  id: totrans-92
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分：实践端到端项目
- en: This part provides a thorough guide on establishing a development environment
    using Visual Studio Code and the PlatformIO IDE, focusing on software installation
    and setup for IoT projects. It introduces ChatGPT-assisted C++ programming for
    an ESP32 microcontroller, covering code writing, compilation, and debugging. Additionally,
    the guide details using ChatGPT for connecting the ESP32 to Wi-Fi and integrating
    it with AWS IoT Core via MQTT/TLS. You will learn how to transmit sensor data
    to AWS IoT Core, utilize ChatGPT-assisted Python coding for data processing with
    AWS Lambda, and manage data storage and queries using AWS IoT Analytics. Finally,
    it teaches creating interactive data visualization dashboards on ThingsBoard Cloud,
    equipping you with the ability to confidently manage your own comprehensive IoT
    projects from start to finish.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分提供了使用Visual Studio Code和PlatformIO IDE建立开发环境的详细指南，重点关注物联网项目的软件安装和设置。它介绍了ChatGPT辅助的ESP32微控制器C++编程，包括代码编写、编译和调试。此外，指南详细说明了使用ChatGPT将ESP32连接到Wi-Fi以及通过MQTT/TLS与AWS
    IoT Core集成的过程。您将学习如何将传感器数据传输到AWS IoT Core，利用ChatGPT辅助的Python编码进行AWS Lambda的数据处理，以及使用AWS
    IoT Analytics进行数据存储和查询管理。最后，它教授如何在ThingsBoard Cloud上创建交互式数据可视化仪表板，使您能够自信地从头到尾管理自己的综合物联网项目。
