- en: Each of the generative AI models generated results within seconds. On the other
    hand, it took us several days to research, analyze, and collate the required information
    for this section. We then focused on the accuracy of these AI models and assessed
    their capacity to interact and adapt to developer-specific needs.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 每个生成式AI模型都在几秒钟内生成了结果。另一方面，我们花了几天时间来研究、分析和整理本节所需的必要信息。然后，我们专注于这些AI模型的准确性，并评估它们与开发者特定需求互动和适应的能力。
