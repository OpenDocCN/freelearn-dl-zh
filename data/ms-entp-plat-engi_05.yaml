- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: Incorporating Artificial Intelligence into Platform Engineering
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将人工智能融入平台工程
- en: Incorporating **artificial intelligence (AI)** into Platform Engineering represents
    a seismic shift in how we approach technological ecosystems and operational efficiency.
    This chapter is dedicated to unraveling the multifaceted roles that generative
    AI plays in refining, optimizing, and revolutionizing Platform Engineering strategies.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 将**人工智能（AI**）融入平台工程代表了我们处理技术生态系统和运营效率方式的地震式转变。本章致力于揭示生成式人工智能在精炼、优化和革命化平台工程策略中所扮演的多方面角色。
- en: By integrating AI, organizations can transcend traditional boundaries, enabling
    more dynamic, responsive, and intelligent systems that move businesses toward
    higher levels of innovation and operational dexterity.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 通过整合人工智能，组织可以超越传统边界，实现更动态、响应更快、更智能的系统，推动企业向更高水平的创新和运营灵活性发展。
- en: We will delve into how AI is not merely a tool but a pivotal element in the
    evolution of Platform Engineering, offering actionable insights and strategic
    advantages that reshape the landscape of technology and business.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将深入研究人工智能不仅仅是工具，而是平台工程演变中的关键要素，提供可操作的见解和战略优势，重塑技术和商业格局。
- en: In this chapter, we’ll explore how Platform Engineering is evolving in response
    to the AI revolution, with a focus on embracing the transformative potential of
    generative AI. We’ll examine practical, real-world use cases where AI is being
    integrated into Platform Engineering workflows, highlighting the tangible benefits
    and efficiencies it can deliver. Finally, we’ll address the common challenges
    organizations face when incorporating AI into platform ecosystems and offer strategies
    for overcoming these obstacles to unlock AI’s full value.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨平台工程如何响应人工智能革命，重点关注拥抱生成式人工智能的变革潜力。我们将研究将人工智能集成到平台工程工作流程中的实际、真实世界的案例，突出其可以带来的具体利益和效率。最后，我们将讨论组织在将人工智能融入平台生态系统时面临的常见挑战，并提出克服这些障碍的策略，以释放人工智能的全部价值。
- en: 'We’re going to cover the following main topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下主要主题：
- en: Embracing the AI revolution in Platform Engineering
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥抱平台工程中的AI革命
- en: Strategic implementation of generative AI systems
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式人工智能系统的战略实施
- en: Practical applications and use cases of generative AI
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式人工智能的实际应用和案例
- en: Navigating the complexities of AI integration
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导航人工智能集成复杂性
- en: Technical requirements
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: While specific technical skills are not required for this chapter, a basic understanding
    of AI, including generative AI, is beneficial. The ability to distinguish between
    AI, machine learning, artificial neural networks, deep learning, generative AI,
    and **large language models (LLMs)** from a business application perspective will
    enhance comprehension of the content. Additionally, familiarity with the topics
    covered in *Chapters 1–4* is vital to fully appreciate the discussions in this
    chapter.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本章不需要特定的技术技能，但了解人工智能的基础知识，包括生成式人工智能，是有益的。从业务应用的角度区分人工智能、机器学习、人工神经网络、深度学习、生成式人工智能和**大型语言模型（LLMs**）的能力将增强对内容的理解。此外，熟悉第1至4章涵盖的主题对于充分欣赏本章的讨论至关重要。
- en: Embracing the AI revolution in Platform Engineering
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 拥抱平台工程中的AI革命
- en: Platform Engineering is radically transforming with the advent of generative
    AI technologies. This change is not just a progression but a complete shift that
    redefines how platforms are developed, maintained, and scaled. Generative AI brings
    speed, precision, and adaptability to engineering processes, pushing the boundaries
    of digital infrastructure. It is a revolution that promises to drive innovation
    and unlock new possibilities. This paradigm shift can be best understood by comparing
    traditional Platform Engineering practices with those empowered by AI, highlighting
    the revolutionary impact AI brings to the table.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程随着生成式人工智能技术的出现而发生了根本性的变革。这种变化不仅是一种进步，而是一种完全的转变，它重新定义了平台的发展、维护和扩展方式。生成式人工智能为工程过程带来了速度、精度和适应性，推动了数字基础设施的边界。这是一场革命，承诺将推动创新并开启新的可能性。这种范式转变可以通过比较传统的平台工程实践与受AI赋能的实践来最好地理解，突出AI带来的革命性影响。
- en: '| **Feature** | **Traditional** **Platform Engineering** | **AI-Driven** **Platform
    Engineering** |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| **特性** | **传统** **平台工程** | **AI驱动** **平台工程** |'
- en: '| Development speed | Relies on manual coding and processes, often leading
    to longer development cycles. | Accelerates development through automation and
    AI-assisted code generation, significantly reducing time to market. |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| 开发速度 | 依赖于人工编码和流程，往往导致更长的开发周期。 | 通过自动化和人工智能辅助的代码生成加速开发，显著缩短上市时间。 |'
- en: '| Operational efficiency | Dependent on manual monitoring and maintenance,
    which can be resource-intensive and prone to human error. | Utilizes AI for predictive
    maintenance and automated monitoring, enhancing efficiency and reducing downtime.
    |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| 运营效率 | 依赖于人工监控和维护，可能资源密集且容易出错。 | 利用人工智能进行预测性维护和自动化监控，提高效率并减少停机时间。 |'
- en: '| Scalability | Scaling requires manual intervention and planning, potentially
    leading to bottlenecks. | AI enables dynamic scaling by predicting demand and
    automatically adjusting resources, ensuring seamless scalability. |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
  zh: '| 可扩展性 | 扩展需要人工干预和规划，可能导致瓶颈。 | 人工智能通过预测需求和自动调整资源实现动态扩展，确保无缝的可扩展性。 |'
- en: '| Error detection and quality | Relies on manual testing and reviews, which
    may miss subtle bugs or inefficiencies. | Employs AI-driven tools for real-time
    error detection and code quality analysis, improving reliability. |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| 错误检测和质量 | 依赖于人工测试和审查，可能错过微小的错误或不效率。 | 采用人工智能驱动的工具进行实时错误检测和代码质量分析，提高可靠性。 |'
- en: '| Innovation capability | Innovation is limited by manual processes and the
    speed at which human teams can operate. | AI facilitates rapid prototyping and
    experimentation, fostering a culture of innovation and continuous improvement.
    |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
  zh: '| 创新能力 | 创新受限于人工流程和人类团队的操作速度。 | 人工智能促进了快速原型设计和实验，培养了一种创新和持续改进的文化。 |'
- en: 'Table 5.1: Feature comparison of traditional and AI-driven Platform Engineering'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5.1：传统平台工程与人工智能驱动平台工程的特性比较
- en: Businesses can anticipate and overcome challenges in real time by integrating
    deep learning and machine learning capabilities into platform operations. This
    improves efficiency, as well as ensuring resilience and future-oriented solutions.
    Organizations that leverage generative AI gain a competitive edge, accelerating
    strategic objectives in a constantly evolving digital landscape.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将深度学习和机器学习功能集成到平台运营中，企业可以实时预测和克服挑战。这提高了效率，同时也确保了弹性和面向未来的解决方案。利用生成式人工智能的组织将获得竞争优势，加速在不断演变的数字景观中的战略目标。
- en: AI as the vanguard of Platform Engineering
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能作为平台工程的前沿
- en: AI is transforming and redefining Platform Engineering by enabling platforms
    to operate more efficiently and proactively. It has a multifaceted impact on Platform
    Engineering and is pivotal in leading the industry to a future where adaptability
    and foresight are essential for platform success.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能通过使平台能够更高效和主动地运行，正在改变和重新定义平台工程。它对平台工程产生了多方面的影响，并在引领行业走向一个适应性、前瞻性对平台成功至关重要的未来中发挥着关键作用。
- en: 'Here are some ways by which AI enhances Platform Engineering:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是人工智能增强平台工程的一些方式：
- en: '**Automation of development processes**: AI, including generative AI, assists
    in automating specific aspects of development processes, such as code suggestions,
    test case generation, and deployment configurations, significantly enhancing productivity.
    While AI tools such as GitHub Copilot, Amazon Q Developer, and Tabnine expedite
    tasks by providing contextual code suggestions and automating repetitive coding
    steps, human oversight remains essential to refine outputs, address errors, and
    optimize performance. These tools act as accelerators rather than replacements,
    enabling engineers to focus on higher-value tasks such as strategy and innovation.
    Additionally, frameworks such as TensorFlow and PyTorch facilitate machine learning
    model integration, while CI/CD platforms such as Jenkins and GitLab integrate
    AI-driven testing and deployment, making development cycles more efficient and
    reliable. This collaborative method promotes quicker development and superior
    quality while emphasizing the essential contribution of human expertise.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发流程自动化**：人工智能，包括生成式人工智能，帮助自动化开发流程的特定方面，如代码建议、测试用例生成和部署配置，显著提高生产力。虽然GitHub
    Copilot、Amazon Q Developer和Tabnine等AI工具通过提供上下文代码建议和自动化重复编码步骤来加速任务，但人类监督仍然是必要的，以优化输出、处理错误和优化性能。这些工具作为加速器而不是替代品，使工程师能够专注于更高价值的任务，如战略和创新。此外，TensorFlow和PyTorch等框架促进了机器学习模型的集成，而Jenkins和GitLab等CI/CD平台则集成了由AI驱动的测试和部署，使开发周期更加高效和可靠。这种协作方法促进了更快的发展和高品质，同时强调了人类专业知识的重要贡献。'
- en: '**Predictive maintenance and real-time optimization**: AI technologies, particularly
    machine learning models, excel in predictive maintenance by analyzing vast volumes
    of operational data to detect anomalies and anticipate potential issues before
    they escalate into system failures. This proactive approach enhances platform
    reliability and minimizes downtime, which is critical for businesses reliant on
    continuous operations. Tools such as Azure Machine Learning, AWS SageMaker, and
    Splunk facilitate anomaly detection and predictive analytics, ensuring system
    resilience. Additionally, AI-driven optimization systems dynamically adapt to
    workload changes and operational conditions in real time, improving efficiency
    and resource utilization. Frameworks such as TensorFlow and PyTorch enable real-time
    decision-making by powering advanced algorithms, while tools such as GitLab Duo
    and Red Hat Ansible streamline AI integration into operational workflows. These
    capabilities ensure platforms remain robust, responsive, and aligned with business
    demands.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测性维护和实时优化**：人工智能技术，尤其是机器学习模型，在预测性维护方面表现出色，通过分析大量运营数据来检测异常并预测潜在问题，在这些问题升级为系统故障之前。这种主动方法提高了平台可靠性并最小化了停机时间，这对于依赖持续运营的企业至关重要。Azure
    Machine Learning、AWS SageMaker和Splunk等工具促进了异常检测和预测分析，确保系统弹性。此外，由AI驱动的优化系统实时适应工作负载变化和运营条件，提高效率和资源利用率。TensorFlow和PyTorch等框架通过提供高级算法来支持实时决策，而GitLab
    Duo和Red Hat Ansible等工具简化了AI集成到运营流程中。这些能力确保平台保持稳健、响应迅速并与业务需求保持一致。'
- en: '**Enhanced security protocols**: AI is a critical asset in cybersecurity, leveraging
    machine learning and advanced algorithms to identify and respond to threats faster
    than traditional methods. Tools such as SentinelOne analyze vast datasets in real
    time to detect anomalies and mitigate risks. Deep learning models such as **Long
    Short-Term Memory** (**LSTM**) networks and Transformers predict malicious activity
    patterns, enabling proactive defense mechanisms. Platforms such as Splunk and
    Datadog integrate these models to monitor behavior, flag unusual activity, and
    strengthen networks against attacks. In cloud environments, tools such as OpenTofu
    analyze access patterns to prevent breaches. By continually learning and adapting,
    AI-driven security systems ensure platform resilience and efficiency, protecting
    organizations from evolving cyber risks.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强的安全协议**：人工智能是网络安全的关键资产，利用机器学习和高级算法比传统方法更快地识别和响应威胁。SentinelOne等工具实时分析大量数据集以检测异常和减轻风险。**长短期记忆**（**LSTM**）网络和Transformer等深度学习模型预测恶意活动模式，使主动防御机制成为可能。Splunk和Datadog等平台将这些模型集成以监控行为、标记异常活动并加强网络以抵御攻击。在云环境中，OpenTofu等工具分析访问模式以防止违规。通过持续学习和适应，由AI驱动的安全系统确保平台弹性和效率，保护组织免受不断发展的网络风险。'
- en: '**User experience customization**: AI enhances user experiences by analyzing
    interactions, preferences, and feedback to create personalized digital journeys.
    For example, Netflix uses AI algorithms to recommend content based on viewing
    history, increasing user engagement and retention. Similarly, Amazon employs machine
    learning to tailor product recommendations, driving customer satisfaction and
    sales. AI also powers dynamic user interface adjustments, such as YouTube’s AI-driven
    recommendations that adapt to individual viewing habits. Tools such as Adobe Sensei
    enable real-time customization in e-commerce platforms by optimizing product displays
    based on user behavior. These applications improve platform usability and foster
    deeper customer relationships and loyalty by delivering experiences uniquely tailored
    to each individual.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户体验定制**：人工智能通过分析交互、偏好和反馈来创建个性化的数字旅程，从而增强用户体验。例如，Netflix 使用人工智能算法根据观看历史推荐内容，提高用户参与度和留存率。同样，亚马逊利用机器学习定制产品推荐，推动客户满意度和销售额。人工智能还支持动态用户界面调整，例如
    YouTube 的基于人工智能的推荐系统会根据个人观看习惯进行调整。Adobe Sensei 等工具通过根据用户行为优化产品展示，在电子商务平台上实现实时定制。这些应用通过为每个用户提供独特定制的体验来提高平台可用性，并促进更深层次的客户关系和忠诚度。'
- en: '**Strategic decision-making**: AI empowers strategic decision-making by analyzing
    vast datasets to uncover actionable insights, ranging from market trends to customer
    preferences. Machine learning models such as those used in Tableau and Power BI
    enable real-time data visualization and trend analysis, helping organizations
    adapt quickly to market changes. For instance, Walmart employs AI to optimize
    inventory levels by predicting demand patterns, reducing waste, and ensuring stock
    availability. AI-driven forecasting tools, such as those integrated into Salesforce
    Einstein, assist leaders in identifying emerging opportunities and mitigating
    risks. Companies such as JPMorgan Chase use AI to analyze market movements and
    guide investment strategies in the financial sector. This data-driven approach
    ensures decisions are aligned with strategic goals, improving agility and fostering
    long-term business growth.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**战略决策**：人工智能通过分析大量数据集来揭示可操作的见解，从而赋予战略决策能力，这些见解从市场趋势到客户偏好不等。例如，Tableau 和 Power
    BI 中使用的机器学习模型能够实现实时数据可视化和趋势分析，帮助组织快速适应市场变化。例如，沃尔玛利用人工智能优化库存水平，通过预测需求模式来减少浪费并确保库存可用。Salesforce
    Einstein 集成的预测工具等人工智能驱动的工具帮助领导者识别新兴机会并减轻风险。像摩根大通这样的公司使用人工智能分析市场动态，并指导金融领域的投资策略。这种数据驱动的方法确保决策与战略目标一致，提高敏捷性并促进长期业务增长。'
- en: '**Driving sustainability**: AI, particularly machine learning algorithms, drives
    environmental sustainability by optimizing resource utilization and minimizing
    waste. Tools such as AWS Auto Scaling and Google Cloud’s Active Assist use AI
    to dynamically allocate cloud resources based on demand, reducing energy consumption
    and operational costs. Additionally, AI-powered systems analyze energy usage patterns
    in data centers, enabling more innovative cooling and power management to lower
    carbon footprints. Companies such as Microsoft employ AI-driven insights to achieve
    carbon-negative goals by optimizing supply chain logistics and resource allocation.
    By embracing these AI solutions, organizations can align their operations with
    global sustainability initiatives while enhancing efficiency and reducing costs.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推动可持续性**：人工智能，尤其是机器学习算法，通过优化资源利用和减少浪费来推动环境可持续性。例如，AWS 自动扩展和 Google Cloud
    的 Active Assist 等工具利用人工智能根据需求动态分配云资源，从而降低能耗和运营成本。此外，人工智能系统分析数据中心中的能源使用模式，使数据中心能够采用更创新的冷却和电力管理方法，以降低碳足迹。像微软这样的公司通过利用人工智能驱动的洞察力，通过优化供应链物流和资源配置来实现碳负增长目标。通过采用这些人工智能解决方案，组织可以将自己的运营与全球可持续性倡议相一致，同时提高效率并降低成本。'
- en: As AI technologies advance, they integrate with Platform Engineering to create
    autonomous and adaptive ecosystems. The future of platforms is set to drive innovation,
    create new business opportunities, and automate tasks. This will redefine industry
    standards, making it essential for organizations to embrace these technological
    advancements. AI promises a new era where platforms are engineered to lead and
    transform industries. Organizations that embrace this change can stay at the forefront
    of technological evolution and leverage the vast opportunities of AI, especially
    generative AI, for enhanced Platform Engineering.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能技术的进步，它们与平台工程相结合，创造出自主和自适应的生态系统。平台未来的发展方向将推动创新，创造新的商业机会，并自动化任务。这将重新定义行业标准，使组织必须拥抱这些技术进步。人工智能预示着一个新时代，在这个时代，平台被设计来引领和改变行业。拥抱这一变革的组织可以保持在技术演变的尖端，并利用人工智能的巨大机会，特别是生成式人工智能，以增强平台工程。
- en: To fully appreciate the practical applications and real-world use cases that
    demonstrate the transformative impact of generative AI across various industries,
    it’s essential to understand the core components of generative AI systems and
    their strategic implementations.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分欣赏生成式人工智能在各个行业中的实际应用和真实世界用例，展示其在各个行业中的变革性影响，了解生成式人工智能系统的核心组件及其战略实施至关重要。
- en: Strategic implementation of generative AI systems
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式人工智能系统的战略实施
- en: Organizations need a robust understanding of the key elements of generative
    AI systems and a strategic approach to their implementation in Platform Engineering.
    These components are the building blocks of AI-driven systems, enabling intelligent
    functionalities and transformative capabilities within digital platforms. By implementing
    these elements strategically, organizations can harness the full potential of
    generative AI to revolutionize their operational frameworks, ensuring efficiency
    and adaptability to the evolving technological landscape.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 组织需要对生成式人工智能系统的关键要素有深入的理解，并采取战略性的方法在平台工程中实施。这些组件是人工智能驱动系统的基石，使数字平台内实现智能功能和变革能力。通过战略性地实施这些要素，组织可以充分发挥生成式人工智能的潜力，革命性地改变其运营框架，确保效率和适应不断变化的技术环境。
- en: Key elements of generative AI systems
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成式人工智能系统的关键要素
- en: 'To fully leverage AI’s transformative potential, organizations must integrate
    generative AI into their Platform Engineering. Here are the key elements of generative
    AI systems that are essential for this integration:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分利用人工智能的变革潜力，组织必须将生成式人工智能整合到其平台工程中。以下是生成式人工智能系统在整合过程中不可或缺的关键要素：
- en: '**Data management and quality**: Data is the foundation of generative AI. The
    quality, granularity, and timeliness of data directly impact outcomes. Robust
    data management frameworks ensure accuracy and integrity. Advanced techniques
    for data collection maintain high-quality standards. Data anonymization processes
    are crucial for privacy and regulatory compliance. Organizations employing structured
    data pipelines see up to a 30% improvement in model performance, while regular
    audits of data quality reduce errors by 90%.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据管理和质量**：数据是生成式人工智能的基础。数据的质量、粒度和时效性直接影响结果。强大的数据管理框架确保准确性和完整性。先进的数据收集技术保持高标准。数据匿名化过程对于隐私和合规至关重要。采用结构化数据管道的组织在模型性能上可看到高达30%的提升，而定期审计数据质量可以将错误减少90%。'
- en: '**Machine learning models**: Generative AI systems rely on machine learning
    models to make sense of massive amounts of data. These models require appropriate
    algorithm selection, continuous training, and re-training to adapt to changing
    conditions. Advanced techniques, such as deep learning and reinforcement learning,
    enhance the models’ ability to make complex decisions and improve autonomously.
    It’s crucial to rigorously test these models for accuracy and effectiveness under
    various operational scenarios. For instance, reinforcement learning models reduce
    error rates by 25–35% in decision-making processes, while organizations employing
    regular re-training cycles achieve up to 40% improved accuracy over static models.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习模型**：生成式人工智能系统依赖于机器学习模型来理解大量数据。这些模型需要适当的算法选择、持续训练和再训练以适应不断变化的情况。如深度学习和强化学习等高级技术增强了模型做出复杂决策和自主改进的能力。在多种操作场景下严格测试这些模型的准确性和有效性至关重要。例如，强化学习模型在决策过程中将错误率降低了25-35%，而采用定期再训练周期的组织在静态模型上实现了高达40%的准确性提升。'
- en: '**Integration architecture**: A robust architecture is necessary to integrate
    AI effectively. It should be flexible and scalable to facilitate easy updates
    and real-time adjustments. Seamless integration with legacy systems is also essential,
    requiring custom adapters or middleware solutions that can translate between different
    technologies and protocols. It’s crucial to get this right for successful AI implementation.
    Flexible integration reduces deployment times by 50–70%, while middleware solutions
    that bridge legacy and modern systems minimize downtime by 40%.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成架构**：为了有效集成人工智能，需要一个强大的架构。它应该是灵活和可扩展的，以促进轻松更新和实时调整。与遗留系统的无缝集成也是必不可少的，需要定制的适配器或中间件解决方案，这些解决方案可以在不同的技术和协议之间进行转换。正确实施这一点对于人工智能的成功实施至关重要。灵活的集成可以将部署时间缩短50-70%，而连接传统和现代系统的中间件解决方案可以将停机时间减少40%。'
- en: '**Automation frameworks**: AI-powered automation significantly enhances operational
    workflows by reducing the need for manual intervention. AI is leveraged to handle
    routine tasks across various domains, such as network management, user support,
    and application deployment. The frameworks perform tasks and learn from each iteration
    to continuously refine processes and increase efficiency. This adaptive automation
    speeds up operations, identifies and resolves inefficiencies within the system,
    and enables organizations to transform their operations for the better. Automation
    frameworks reduce manual intervention by up to 70%, resulting in 30–50% faster
    task execution times and improved workflow efficiency.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化框架**：人工智能驱动的自动化通过减少对人工干预的需求显著提高了操作流程。人工智能被用于处理各个领域的常规任务，例如网络管理、用户支持和应用程序部署。这些框架执行任务并从每次迭代中学习，以持续优化流程和提高效率。这种自适应自动化加快了操作速度，识别并解决系统内的低效问题，并使组织能够改善其运营。自动化框架最多可减少70%的人工干预，从而实现30-50%更快的任务执行时间和提高的工作流程效率。'
- en: '**Scalability and maintenance**: AI systems must scale efficiently to handle
    changing demands and market fluctuations. This means scaling up for larger workloads
    and down during off-peak times to save resources. Regular updates to software
    and hardware components are necessary to keep these systems secure and efficient.
    Continuous monitoring and predictive maintenance techniques detect and resolve
    potential issues before they impact system performance. Organizations employing
    predictive maintenance report a 50% reduction in downtime, while scalable systems
    reduce resource waste by 20–30% through dynamic workload adjustments.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性和维护性**：人工智能系统必须高效扩展以应对不断变化的需求和市场波动。这意味着在高峰时段扩大规模以处理更大的工作量，在非高峰时段缩减规模以节省资源。定期更新软件和硬件组件对于保持这些系统的安全性和效率是必要的。持续的监控和预测性维护技术可以在问题影响系统性能之前检测并解决潜在问题。采用预测性维护的组织报告了50%的停机时间减少，而可扩展的系统通过动态工作量调整减少了20-30%的资源浪费。'
- en: '**Security considerations**: AI integration presents unique security challenges,
    particularly for generative AI, which is vulnerable to attacks such as adversarial
    manipulation. Attackers can subtly alter input data to deceive models, resulting
    in harmful outputs. Unlike traditional IT systems, generative AI’s reliance on
    complex data models creates specific vulnerabilities. To mitigate these risks,
    adversarial training helps improve model resilience, while homomorphic encryption
    allows computations on encrypted data to protect sensitive information. Anomaly
    detection algorithms, such as those in Splunk, can identify unusual behaviors
    almost in real time, enhancing response times. Generative AI also faces model
    inversion attacks, where sensitive data can be inferred. Strategies such as differential
    privacy obscure individual contributions to maintain model utility. Regular audits,
    role-based access controls, and strong encryption further safeguard systems against
    threats. By implementing these measures, organizations can effectively tackle
    the security risks of generative AI, building resilient and trustworthy platforms
    while protecting sensitive operations.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全考虑因素**：人工智能集成带来了独特的安全挑战，尤其是对于生成式人工智能，它容易受到对抗性操纵等攻击。攻击者可以微妙地改变输入数据来欺骗模型，导致有害的输出。与传统的IT系统不同，生成式人工智能对复杂数据模型的依赖创造了特定的漏洞。为了减轻这些风险，对抗性训练有助于提高模型的弹性，而同态加密允许在加密数据上执行计算以保护敏感信息。异常检测算法，如Splunk中的算法，几乎可以实时地识别异常行为，从而提高响应时间。生成式人工智能还面临模型反演攻击，其中敏感数据可以被推断出来。例如，差分隐私策略可以模糊个体贡献以维持模型效用。定期的审计、基于角色的访问控制和强大的加密进一步保护系统免受威胁。通过实施这些措施，组织可以有效地应对生成式人工智能的安全风险，构建弹性且值得信赖的平台，同时保护敏感操作。'
- en: These core components are strategic assets that, when implemented and managed
    effectively, can improve the operational efficiency and innovation capacity of
    platforms. Next, we will explore the strategic implementation of AI in Platform
    Engineering to optimize performance further.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这些核心组件是战略资产，当有效实施和管理时，可以提高平台的运营效率和创新能力。接下来，我们将探讨在平台工程中战略性地实施人工智能，以进一步优化性能。
- en: Strategically implementing AI in Platform Engineering
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在平台工程中战略性地实施人工智能
- en: Implementing generative AI within Platform Engineering is a strategic endeavor
    that requires meticulous planning and phased execution. Here are the detailed
    steps organizations should undertake to successfully incorporate generative AI
    technologies into their platform operations.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在平台工程中实施生成式人工智能是一项战略性的努力，需要细致的规划和分阶段的执行。以下是组织应采取的详细步骤，以成功地将生成式人工智能技术融入其平台运营。
- en: Assessment and planning
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估与规划
- en: Organizations must begin by comprehensively assessing their technological infrastructure,
    data systems, and staff capabilities. This evaluation identifies areas for AI
    improvement and potential integration challenges. During the planning phase, organizations
    must establish measurable goals, such as reducing operational costs or enhancing
    customer satisfaction, and develop a strategic roadmap outlining key milestones,
    resource allocation, and timelines. Integrating observability tools such as Grafana,
    Prometheus, and the Elastic stack can enhance this assessment by providing real-time
    insights into system performance, resource utilization, and potential bottlenecks.
    These tools ensure the continuous monitoring of AI-powered Platform Engineering
    systems, helping organizations maintain alignment with strategic objectives.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 组织必须首先全面评估其技术基础设施、数据系统和员工能力。这次评估确定了人工智能改进的区域和潜在的集成挑战。在规划阶段，组织必须设定可衡量的目标，例如降低运营成本或提高客户满意度，并制定一个战略路线图，概述关键里程碑、资源分配和时间表。集成如Grafana、Prometheus和Elastic堆栈等可观察性工具可以通过提供对系统性能、资源利用和潜在瓶颈的实时洞察来增强这一评估。这些工具确保对人工智能驱动的平台工程系统进行持续监控，帮助组织保持与战略目标的对齐。
- en: Incremental integration
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 渐进式集成
- en: Teams should integrate generative AI gradually to reduce risks and manage complexity.
    Start with pilot projects for specific processes or business areas, operating
    as a controlled test environment for refining AI functionalities. Gradually expand
    successful pilots, applying lessons learned to broader implementations to demonstrate
    the technology’s effectiveness and build confidence among users and stakeholders.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 团队应逐步集成生成式AI以降低风险和管理复杂性。从特定流程或业务领域的试点项目开始，作为一个控制测试环境来完善AI功能。逐步扩展成功的试点项目，将所学知识应用于更广泛的实施，以证明技术的有效性，并在用户和利益相关者中建立信心。
- en: Training and support
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 培训和支持
- en: Effective AI training programs are crucial to maximizing productivity. They
    should cover both the technical aspects and operational changes brought by AI
    tools. Comprehensive support, including technical teams and detailed documentation,
    should be provided to foster a positive attitude toward the new technology. Empower
    users through education and support to ensure smoother adoption.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的AI培训计划对于最大化生产力至关重要。它们应涵盖AI工具带来的技术方面和运营变化。应提供全面的支持，包括技术团队和详细的文档，以培养对新技术的积极态度。通过教育和支持赋权用户，以确保更平滑的采用。
- en: Evaluation and scaling
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估和扩展
- en: Continuous evaluation of AI systems is crucial to measure their impact against
    initial goals. Establish key performance indicators to track effectiveness, user
    engagement, and **Return on Investment** (**ROI**). Use assessments to identify
    successes and areas for improvement. Insights gained from evaluations guide the
    scaling of AI functionalities for broader impact. Optimize AI operations to ensure
    cost-effectiveness and alignment with business objectives during scaling.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对AI系统进行持续评估对于衡量其与初始目标的影响至关重要。建立关键绩效指标以跟踪有效性、用户参与度和**投资回报率**（**ROI**）。使用评估来识别成功和改进领域。从评估中获得的认识指导AI功能的扩展，以实现更广泛的影响。在扩展过程中优化AI运营，以确保成本效益和与业务目标的契合度。
- en: Adaptation and evolution
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 适应性和进化
- en: AI is constantly evolving, so it’s essential to keep AI solutions up to date
    to stay competitive. Organizations must proactively learn and innovate by updating
    AI models and algorithms, adopting new AI technologies, and revising integration
    strategies to respond quickly to market changes. By staying adaptable, businesses
    can ensure that their AI systems remain effective and provide ongoing value to
    the organization.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: AI不断进化，因此保持AI解决方案的更新以保持竞争力至关重要。组织必须通过更新AI模型和算法、采用新的AI技术以及修订集成策略来主动学习和创新，以快速应对市场变化。通过保持适应性，企业可以确保其AI系统保持有效性，并为组织提供持续的价值。
- en: Sustainability and ethical governance
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可持续性和道德治理
- en: As AI becomes integral to platform operations, organizations must prioritize
    ethical governance and sustainability. Implementing ethical AI frameworks is crucial
    to ensure fairness, transparency, and accountability in AI operations. Additionally,
    organizational leaders must consider sustainability practices to minimize the
    environmental impact of AI systems, such as optimizing energy usage and selecting
    eco-friendly infrastructure options.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI成为平台运营的组成部分，组织必须优先考虑道德治理和可持续性。实施道德AI框架对于确保AI运营中的公平性、透明度和问责制至关重要。此外，组织领导者必须考虑可持续性实践，以最大限度地减少AI系统对环境的影响，例如优化能源使用和选择环保的基础设施选项。
- en: Integrating generative AI into Platform Engineering requires clear implementation
    steps that optimize maximum impact. Embracing these practices unlocks a new era
    of operational excellence and innovation. This foundation lays the groundwork
    for a more thorough examination of practical applications and use cases of generative
    AI in various industries. We will explore how generative AI can transform platform
    operations by improving efficiency, security, and strategic agility.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 将生成式AI集成到平台工程中需要明确的实施步骤，以优化最大影响。采用这些实践将开启一个运营卓越和创新的新时代。这个基础为更深入地考察生成式AI在各个行业的实际应用和用例奠定了基础。我们将探讨生成式AI如何通过提高效率、安全性和战略敏捷性来转变平台运营。
- en: Practical applications and use cases of generative AI
  id: totrans-60
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式AI的实际应用和用例
- en: Generative AI is not just a technological advancement; it’s the key to unlocking
    unparalleled innovation and efficiency in Platform Engineering. In this section,
    we will explore how generative AI is transforming Platform Engineering by driving
    technological advancements and creating unprecedented opportunities.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能不仅仅是一项技术进步；它是解锁平台工程中无与伦比的创新和效率的关键。在本节中，我们将探讨生成式人工智能如何通过推动技术进步和创造前所未有的机会来改变平台工程。
- en: We will discover how to integrate generative AI to streamline operations, enhance
    capabilities, and foster innovation within organizations. By understanding these
    applications, we will gain the skills to automate tasks, optimize deployments,
    and push the boundaries of what’s possible in DevOps and Platform Engineering.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将了解如何将生成式人工智能集成到运营中，增强能力，并在组织中促进创新。通过理解这些应用，我们将获得自动化任务、优化部署并推动DevOps和平台工程可能性的边界的能力。
- en: Automating development workflows
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动化开发工作流程
- en: The adoption of generative AI marks a new era where human intellect and AI merge
    to significantly boost productivity and creativity in development workflows. This
    convergence enhances efficiency and transforms how developers create and maintain
    software. Here are some ways to speed up development and improve code quality
    and collaboration.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能的采用标志着一个新的时代，在这个时代中，人类智慧和人工智能的融合显著提升了开发工作流程中的生产力和创造力。这种融合提高了效率，并改变了开发者创建和维护软件的方式。以下是一些加快开发速度、提高代码质量和协作的方法。
- en: Augmenting developers
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增强开发者能力
- en: Generative AI extends developers’ skills, enabling rapid ideation. These tools
    offer on-demand expertise as coding assistants, making complex coding accessible
    to all skill levels. Collaborative AI assistants such as **GitHub Copilot** and
    **Amazon Q Developer** (previously called CodeWhisperer) help teams with everyday
    development tasks using natural language interactions. These tools utilize **Natural
    Language Processing** (**NLP**) models, which analyze developer input by breaking
    it into tokens, understanding syntax and semantics, and matching it with extensive
    training datasets of code examples. Based on the context and input, the AI generates
    relevant code snippets or suggestions that align with the developer’s intent.
    For example, when prompted with “create a REST API endpoint in Python,” the NLP
    model recognizes the task, retrieves relevant patterns, and generates a functional
    code block. This capability allows developers to prototype new features quickly,
    avoid roadblocks in manual coding processes, translate code between programming
    languages, and guide cloud resource configurations. These tools significantly
    boost productivity by leveraging AI and free up time for innovation and high-value
    work.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能扩展了开发者的技能，使他们能够快速构思。这些工具作为按需专家提供编码助手，使复杂编码对所有技能水平都变得可访问。协作式人工智能助手，如**GitHub
    Copilot**和**Amazon Q Developer**（之前称为CodeWhisperer），通过自然语言交互帮助团队完成日常开发任务。这些工具利用**自然语言处理**（**NLP**）模型，通过将开发者输入分解为标记、理解语法和语义以及与广泛的代码示例训练数据集匹配来分析开发者输入。基于上下文和输入，AI生成与开发者意图相符的相关代码片段或建议。例如，当提示“用Python创建一个REST
    API端点”时，NLP模型识别任务，检索相关模式，并生成一个功能性的代码块。这种能力允许开发者快速原型化新功能，避免手动编码过程中的障碍，在不同编程语言之间转换代码，并指导云资源配置。这些工具通过利用AI显著提高了生产力，并为创新和高价值工作腾出时间。
- en: Improving code quality
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高代码质量
- en: AI integration in platforms such as **Google’s Gemini** and Amazon’s Q Developer
    has redefined code quality, automating clean, efficient code generation, refactoring,
    and robustness testing pre-deployment. Such tools analyze code bases to optimize
    them by identifying performance bottlenecks, security vulnerabilities, and outdated
    dependencies. For example, these platforms can detect vulnerabilities such as
    SQL injection risks by analyzing database queries embedded in code and recommending
    parameterized queries or input sanitization techniques. They also measure code
    quality through metrics such as cyclomatic complexity, ensuring code is more straightforward
    to test and debug, and the maintainability index, quantifying how easily a code
    base can be understood, modified, or extended. By providing actionable insights,
    such as suggesting ways to reduce redundant loops or flagging deprecated libraries,
    these tools help developers save time, enhance security, and ensure code maintainability.
    This approach transforms software development, enabling organizations to remain
    secure, current, and efficient while producing lean, robust systems.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在**谷歌的Gemini**和亚马逊的Q Developer等平台上集成AI，重新定义了代码质量，自动化生成清洁、高效的代码，重构和部署前的健壮性测试。这些工具通过识别性能瓶颈、安全漏洞和过时的依赖项来优化代码库。例如，这些平台可以通过分析代码中嵌入的数据库查询来检测漏洞，如SQL注入风险，并建议使用参数化查询或输入清理技术。它们还通过诸如环路复杂度等指标来衡量代码质量，确保代码更易于测试和调试，以及可维护性指数，量化代码库的可理解性、可修改性或可扩展性。通过提供可操作的见解，例如建议减少冗余循环或标记已弃用的库，这些工具帮助开发者节省时间，增强安全性，并确保代码的可维护性。这种方法改变了软件开发，使组织能够保持安全、最新和高效，同时生产出精简、健壮的系统。
- en: Brainstorming and problem-solving
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 头脑风暴和问题解决
- en: AI-driven tools contribute significantly to problem-solving by proposing a plethora
    of solutions and approaches. This capability is invaluable during brainstorming
    sessions, where the breadth of AI-generated ideas can inspire innovative solutions.
    Google Gemini and **AskCodi** are excellent tools for brainstorming and problem-solving.
    They provide insights and suggestions that developers might not have thought of,
    helping them come up with innovative solutions.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: AI驱动的工具通过提出大量解决方案和方法，对问题解决做出了重大贡献。这种能力在头脑风暴会议中非常有价值，因为AI生成的想法的广度可以激发创新解决方案。Google
    Gemini和**AskCodi**是头脑风暴和问题解决的优秀工具。它们提供开发者可能未曾想到的见解和建议，帮助他们提出创新解决方案。
- en: Code suggestions and autocompletion
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码建议和自动补全
- en: The likes of Tabnine and AskCodi redefine the realm of code suggestions and
    autocompletion. These tools learn from vast code repositories, providing insightful
    recommendations that streamline the coding process and elevate the developer experience
    to new heights.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: Tabnine和AskCodi等工具重新定义了代码建议和自动补全的领域。这些工具从庞大的代码库中学习，提供有洞察力的建议，简化编码过程，并将开发者体验提升到新的高度。
- en: Transforming the developer workflow
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 转变开发者工作流程
- en: Generative AI can revolutionize the developer workflow from ideation to production.
    AI-powered assistants such as GitHub Copilot, Amazon Q Developer, Google Gemini,
    and GitLab Duo integrate into the development process, providing an interactive
    environment for generating code, explanations, documentation, and unit tests.
    This streamlines the process, reduces context switching, and centralizes development.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI可以从构思到生产彻底改变开发者工作流程。GitHub Copilot、Amazon Q Developer、Google Gemini和GitLab
    Duo等AI辅助工具集成到开发过程中，提供了一个生成代码、解释、文档和单元测试的交互式环境。这简化了过程，减少了上下文切换，并集中了开发。
- en: AI at the speed of thought
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 思维速度的AI
- en: To evaluate the profound impact of generative AI on developer workflows, we
    prompted ChatGPT, Microsoft Copilot, Google Gemini, and Perplexity AI to create
    a comparison table of the most popular tools enhancing code quality and productivity.
    Our motivation was to quantify the efficiency and precision of AI tools in automating
    and significantly reducing time to value for tasks such as technology research,
    comparative analysis, suggestions, and brainstorming.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估生成式AI对开发者工作流程的深远影响，我们提示ChatGPT、Microsoft Copilot、Google Gemini和Perplexity
    AI创建了一个比较表，列出了最流行的提高代码质量和生产力的工具。我们的动机是量化AI工具在自动化和显著减少技术研究、比较分析、建议和头脑风暴等任务的价值实现时间上的效率和精确度。
- en: 'To this end, we conducted an experiment using the following prompt:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 为了达到这个目的，我们使用以下提示进行了实验：
- en: '[PRE0]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
