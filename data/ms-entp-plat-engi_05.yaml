  prefs: []
  type: TYPE_NORMAL
  zh: Perplexity AI的输出不仅展示了工具的精确度，还展示了其定制的潜力，以满足特定用户的需求并增强其辅助的相关性。
- en: Analysis
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析
- en: Our experiment revealed that while generative AI models such as ChatGPT, Microsoft
    Copilot, Google Gemini, and Perplexity AI all deliver rapid responses, their outputs
    vary significantly in detail and focus. For instance, none of these models recognized
    that Amazon CodeWhisperer is now called Amazon Q Developer, and none of the models
    could agree on the most popular tools. Additionally, Perplexity AI had some empty
    cells, which indicates gaps in its comparative analysis, and Microsoft Copilot’s
    responses were limited to Yes/No cells, lacking the nuanced details provided by
    the others. This variance underscores the necessity of selecting the right tool
    for specific tasks, as each AI model has its strengths and limitations. It also
    highlights the importance of thorough evaluation and cross-referencing to ensure
    comprehensive and accurate insights.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实验表明，虽然ChatGPT、Microsoft Copilot、Google Gemini和Perplexity AI等生成式AI模型都能提供快速响应，但它们的输出在细节和重点方面存在显著差异。例如，这些模型中没有哪一个认识到Amazon
    CodeWhisperer现在被称为Amazon Q Developer，而且这些模型对最受欢迎的工具也没有达成一致。此外，Perplexity AI有一些空单元格，这表明其比较分析存在差距，而Microsoft
    Copilot的响应仅限于是/否单元格，缺乏其他模型提供的细微细节。这种差异强调了选择适合特定任务的正确工具的必要性，因为每个AI模型都有其优势和局限性。这也突出了全面评估和交叉引用的重要性，以确保全面和准确的见解。
- en: 'To evaluate the capabilities of generative AI models such as ChatGPT, Microsoft
    Copilot, Google Gemini, and Perplexity AI, we used a set of controlled tests based
    on three primary criteria: accuracy (precision and correctness of generated outputs),
    processing time (speed in generating responses), and ease of integration (how
    seamlessly the tool fits into Platform Engineering workflows). These benchmarks
    enabled a comparative analysis to assess the strengths and weaknesses of each
    model in practical scenarios.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估ChatGPT、Microsoft Copilot、Google Gemini和Perplexity AI等生成式AI模型的能力，我们使用了一套基于三个主要标准的受控测试：准确性（生成输出的精确性和正确性）、处理时间（生成响应的速度）和集成难度（工具如何无缝地融入平台工程工作流程）。这些基准测试使我们可以对每个模型在实际场景中的优势和劣势进行对比分析。
- en: '| **Criteria** | **ChatGPT** | **Microsoft Copilot** | **Google Gemini** |
    **Perplexity AI** |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| **标准** | **ChatGPT** | **Microsoft Copilot** | **Google Gemini** | **Perplexity
    AI** |'
- en: '| Accuracy | 85% – High detail in responses | 70% – Limited to Yes/No answers
    | 80% – Balanced but generic | 65% – Inconsistent with gaps |'
  id: totrans-147
  prefs: []
  type: TYPE_TB
  zh: '| 精确度 | 85% – 响应中的高细节 | 70% – 限制于是/否答案 | 80% – 平衡但通用 | 65% – 不一致且有差距 |'
- en: '| Processing time | ~3 seconds per query | ~2 seconds per query | ~4 seconds
    per query | ~2.5 seconds per query |'
  id: totrans-148
  prefs: []
  type: TYPE_TB
  zh: '| 处理时间 | 每个查询约3秒 | 每个查询约2秒 | 每个查询约4秒 | 每个查询约2.5秒 |'
- en: '| Ease of integration | Moderate – Requires customization | High – Seamless
    in Microsoft ecosystem | Moderate – Early-stage tools | Low – Limited integration
    tools |'
  id: totrans-149
  prefs: []
  type: TYPE_TB
  zh: '| 集成难度 | 中等 – 需要定制 | 高 – 在Microsoft生态系统中无缝 | 中等 – 初期工具 | 低 – 集成工具有限 |'
- en: '| Strengths | Detailed explanations | Fast response speed | Broad feature support
    | Multi-source aggregation |'
  id: totrans-150
  prefs: []
  type: TYPE_TB
  zh: '| 优点 | 详细的解释 | 快速的响应速度 | 广泛的功能支持 | 多源聚合 |'
- en: '| Weaknesses | Occasional inaccuracies | Lacks nuanced detail | Longer response
    times | Missing data in certain tasks |'
  id: totrans-151
  prefs: []
  type: TYPE_TB
  zh: '| 弱点 | 偶尔不准确 | 缺乏细微的细节 | 响应时间较长 | 某些任务中缺少数据 |'
- en: 'Table 5.6: Comparison of leading AI assistants across key performance criteria'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 表5.6：根据关键性能标准比较领先AI助手的比较
- en: This analysis emphasizes the importance of selecting the right tool for the
    task, as no single model excels in all areas. However, it’s crucial to note that
    these tools continuously improve and evolve. Refinements and enhancements are
    regularly being made, meaning their capabilities today may already surpass what
    we observed during our experiments.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这项分析强调了选择正确工具的重要性，因为没有任何一个模型在所有领域都表现出色。然而，需要注意的是，这些工具持续改进和演变。定期进行的改进和增强意味着它们今天的功能可能已经超过了我们在实验期间观察到的。
- en: We may require multiple AI assistants for comprehensive research in selecting
    tools or augmenting workflows for Platform Engineering. Yet, a singular, well-integrated
    tool is optimal for aiding developers directly. Leveraging more than one AI tool
    in the development process could paradoxically increase friction and reduce efficiency,
    as developers might end up having to navigate excessive information rather than
    engaging in productive coding. Hence, strategic selection is crucial to harness
    AI effectively without adding overhead.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在对平台工程进行工具选择或增强工作流程的综合研究时，我们可能需要多个AI助手。然而，一个单一、高度集成的工具对于直接帮助开发者来说是最优的。在开发过程中利用多个AI工具可能会产生矛盾，增加摩擦并降低效率，因为开发者可能最终不得不在过多的信息中导航，而不是进行富有成效的编码。因此，战略性地选择工具对于有效地利用AI而不增加额外负担至关重要。
- en: AI in infrastructure management
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基础设施管理中的AI
- en: 'Integrating AI with infrastructure management significantly shifts IT operations,
    enabling more intelligent, efficient, and adaptive systems. While not all existing
    tools natively include AI capabilities, there are emerging technologies and integrations
    that bring AI-driven features to the infrastructure management landscape. The
    following are examples of accurate tools and frameworks facilitating this transformation:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI与基础设施管理相结合，显著改变了IT运营，使系统更加智能、高效和自适应。虽然并非所有现有工具都内置AI功能，但有一些新兴技术和集成将AI驱动的功能引入了基础设施管理领域。以下是一些促进这一变革的准确工具和框架的示例：
- en: '**GitLab Duo**: GitLab Duo, particularly Duo Workflows, exemplifies proactive
    AI use in infrastructure management. Duo combines AI-assisted code generation
    and integration across the **Software Development Life Cycle** (**SDLC**). It
    enhances automation by recommending infrastructure-as-code snippets and enabling
    seamless collaboration between development and operations teams. Duo Workflows
    further incorporate AI-driven orchestration, empowering organizations to address
    system demands and streamline CI/CD pipelines proactively.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitLab Duo**：GitLab Duo，特别是Duo Workflows，是基础设施管理中主动使用AI的典范。Duo结合了AI辅助的代码生成和跨**软件开发生命周期（SDLC）**的集成。它通过推荐基础设施代码片段和促进开发和运维团队之间的无缝协作来增强自动化。Duo
    Workflows还进一步集成了AI驱动的编排，使组织能够主动应对系统需求并简化CI/CD管道。'
- en: '**Red Hat Ansible Lightspeed with IBM watsonx Code Assistant**: While Ansible
    doesn’t inherently include AI capabilities, Lightspeed with IBM watsonx adds generative
    AI features for creating playbooks. This integration simplifies playbook creation
    by leveraging AI to generate and refine automation scripts. Organizations can
    use this to reduce the time required to develop robust automation workflows, making
    infrastructure management more efficient and less error-prone.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Red Hat Ansible Lightspeed与IBM watsonx Code Assistant**：虽然Ansible本身不包含AI功能，但与IBM
    watsonx集成的Lightspeed增加了生成AI功能，用于创建playbook。这种集成通过利用AI生成和优化自动化脚本来简化playbook的创建。组织可以利用这一点来减少开发稳健自动化工作流程所需的时间，使基础设施管理更加高效且错误率更低。'
- en: '**Terraform (via AI integration)**: While Terraform lacks native AI capabilities,
    AI tools such as GitHub Copilot or GitLab Duo can assist in writing and optimizing
    Terraform configurations. By using AI-generated infrastructure as code, organizations
    can automate resource provisioning with greater accuracy and efficiency. Third-party
    integrations with monitoring and predictive analytics tools can also enable proactive
    infrastructure scaling and optimization.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Terraform（通过AI集成）**：虽然Terraform缺乏原生AI功能，但GitHub Copilot或GitLab Duo等AI工具可以帮助编写和优化Terraform配置。通过使用AI生成的基础设施代码，组织可以以更高的准确性和效率自动化资源分配。与监控和预测分析工具的第三方集成还可以实现主动的基础设施扩展和优化。'
- en: '**GitHub Advanced Security and Actions (with external AI)**: GitHub Advanced
    Security provides code scanning powered by CodeQL, which enhances security in
    infrastructure management workflows. While not AI-driven, GitHub Actions workflows
    can integrate with external AI-powered monitoring, alerting, and automation tools.
    These integrations bring intelligence to processes such as deployment orchestration
    and incident response.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub高级安全和动作（带外部AI）**: GitHub高级安全提供由CodeQL驱动的代码扫描，增强了基础设施管理工作流程中的安全性。虽然不是由AI驱动的，但GitHub
    Actions工作流程可以与外部AI驱动的监控、警报和自动化工具集成。这些集成将智能引入部署编排和事件响应等流程。'
- en: '**Frameworks and APIs enabling AI in infrastructure**: Frameworks such as **Kubeflow**
    for Kubernetes and **MLflow** for managing machine learning workflows help bridge
    AI with infrastructure management. APIs such as AWS SageMaker and Google AI Platform
    can be integrated into DevOps pipelines to introduce predictive analytics, anomaly
    detection, and optimization, enhancing operational efficiency.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使基础设施中的AI成为可能的框架和API**: 例如，用于Kubernetes的**Kubeflow**和用于管理机器学习工作流程的**MLflow**等框架有助于将AI与基础设施管理联系起来。AWS
    SageMaker和Google AI Platform等API可以集成到DevOps管道中，引入预测分析、异常检测和优化，提高运营效率。'
- en: While still evolving, AI’s role in infrastructure management demonstrates its
    potential to streamline workflows, improve security, and optimize resource utilization.
    By leveraging tools with accurate AI capabilities and integrating frameworks into
    existing workflows, organizations can prepare for the next generation of intelligent
    IT operations.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管仍在发展中，AI在基础设施管理中的作用展示了其简化工作流程、提高安全性和优化资源利用的潜力。通过利用具有准确AI能力的工具并整合框架到现有工作流程中，组织可以为下一代智能IT运营做好准备。
- en: Security enhancement through AI
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过AI增强安全性
- en: AI has transformed digital security, creating a robust and resilient ecosystem.
    It helps secure software supply chains, proactively combat cyber threats, and
    implement comprehensive security solutions. AI anticipates vulnerabilities, mitigates
    risks, and safeguards digital assets, fostering a trustworthy ecosystem. This
    shift is redefining security paradigms and catalyzing organizational transformation.
    Every step in this journey adds value and significantly impacts our digital world.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: AI已经改变了数字安全，创造了一个强大且弹性的生态系统。它有助于保护软件供应链，积极对抗网络威胁，并实施全面的安全解决方案。AI预测漏洞，减轻风险，保护数字资产，培养一个值得信赖的生态系统。这一转变正在重新定义安全范式，并催化组织变革。这一旅程的每一步都增加了价值，并对我们的数字世界产生了重大影响。
- en: Secure software supply chains
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全的软件供应链
- en: 'Secure software supply chains are essential for businesses to protect their
    digital assets and maintain the integrity of their software products. While not
    all tools natively incorporate AI capabilities, advancements in AI-powered integrations
    have enhanced software development and deployment processes. Next, we discuss
    accurate examples of AI’s contributions to secure supply chains and highlight
    actionable practices:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 安全的软件供应链对于企业保护其数字资产和维护其软件产品的完整性至关重要。虽然并非所有工具都原生集成AI功能，但AI集成方面的进步已经增强了软件开发和部署过程。接下来，我们将讨论AI对安全供应链的贡献的准确示例，并突出可操作的实践：
- en: '**AI in static code analysis**: AI-powered static code analysis tools, such
    as GitLab Duo, enable a “shift-left” approach by identifying vulnerabilities and
    suggesting code improvements during the early stages of development. Duo integrates
    generative AI into IDEs and CI/CD pipelines, empowering developers to address
    security issues, code quality concerns, and compliance violations before they
    escalate. This reduces the risk of introducing vulnerabilities into production
    environments and accelerates delivery timelines.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**静态代码分析中的AI**: 由AI驱动的静态代码分析工具，如GitLab Duo，通过在开发早期阶段识别漏洞和建议代码改进，实现了“左移”方法。Duo将生成式AI集成到IDE和CI/CD管道中，使开发者能够在问题升级之前解决安全问题、代码质量问题和合规性问题。这降低了将漏洞引入生产环境的风险，并加速了交付时间表。'
- en: '**AI-driven compliance management**: GitLab includes compliance features that
    scan software licenses and evaluate the number of **Common Vulnerabilities and
    Exposures** (**CVEs**) against compliance baselines. Although these capabilities
    don’t inherently use AI, AI integrations such as GitLab Duo enhance compliance
    management by providing intelligent recommendations to ensure regulatory alignment
    and reduce manual oversight.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI 驱动的合规性管理**: GitLab 包含合规性功能，扫描软件许可证并评估与合规性基线相比的 **通用漏洞和暴露**（CVEs）数量。尽管这些功能本身不使用
    AI，但 GitLab Duo 等AI 集成增强了合规性管理，通过提供智能推荐以确保法规一致性并减少人工监督。'
- en: '**Container security with third-party tools**: Platforms such as **Red Hat
    OpenShift** and **VMware Tanzu** can integrate with tools such as Clair, an open
    source container security scanner. While Clair itself doesn’t use AI, organizations
    can combine these platforms with AI-driven monitoring solutions such as **Sysdig
    Secure** or **Deep Instinct** to automate the detection and mitigation of vulnerabilities
    in containerized applications.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用第三方工具的容器安全**: 平台如 **Red Hat OpenShift** 和 **VMware Tanzu** 可以与工具如开源容器安全扫描器
    Clair 集成。虽然 Clair 本身不使用 AI，但组织可以将这些平台与 AI 驱动的监控解决方案如 **Sysdig Secure** 或 **Deep
    Instinct** 结合，以自动化检测和缓解容器化应用程序中的漏洞。'
- en: '**GitHub Advanced Security integrations**: GitHub’s Advanced Security uses
    CodeQL to scan for vulnerabilities and allows third-party integrations with AI-enabled
    tools for enhanced scanning. While GitHub Copilot is a generative AI solution
    for coding assistance, it complements Advanced Security by guiding developers
    with AI-based recommendations to resolve detected issues efficiently.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub 高级安全集成**: GitHub 的高级安全功能使用 CodeQL 扫描漏洞，并允许第三方与 AI 功能的工具集成以增强扫描。虽然
    GitHub Copilot 是一种用于编码辅助的生成式 AI 解决方案，但它通过基于 AI 的推荐引导开发者高效地解决检测到的问题，从而补充高级安全功能。'
- en: '**AI in CI/CD pipelines**: AI is critical in optimizing CI/CD workflows by
    integrating predictive analytics and anomaly detection into the pipeline. Tools
    such as **Harness** leverage AI to monitor deployments, analyze patterns, and
    prevent risky updates, ensuring secure and stable rollouts.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CI/CD 管道中的 AI**: AI 在优化 CI/CD 工作流程中至关重要，它通过将预测分析和异常检测集成到管道中。例如，**Harness**
    工具利用 AI 监控部署、分析模式并防止风险更新，确保安全稳定的发布。'
- en: '**Shift-left practices enhanced by AI**: The shift-left approach in secure
    SDLCs is driven by embedding AI tools directly into developer environments. Examples
    include real-time code analysis, AI-assisted test case generation, and vulnerability
    management integrated into CI/CD workflows. These practices empower developers
    to proactively resolve issues, enhancing software quality and security.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**由 AI 增强的左移实践**: 在安全的软件开发生命周期（SDLC）中，左移方法是通过将 AI 工具直接嵌入到开发者环境中来推动的。这些例子包括实时代码分析、AI
    辅助的测试用例生成以及集成到 CI/CD 工作流程中的漏洞管理。这些实践使开发者能够主动解决问题，提高软件质量和安全性。'
- en: AI’s role in secure software supply chains extends beyond detection to include
    proactive prevention and real-time monitoring. By integrating AI into the SDLC,
    businesses can create resilient, compliant, and secure systems, safeguarding their
    digital assets while accelerating time to market.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: AI 在安全软件供应链中的作用不仅限于检测，还包括积极的预防和实时监控。通过将 AI 集成到 SDLC 中，企业可以创建弹性、合规和安全系统，保护其数字资产并加快上市时间。
- en: Proactive cybersecurity
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 积极的网络安全
- en: 'The complexity of today’s cybersecurity threat landscape demands advanced,
    proactive solutions. While some platforms such as Splunk, Elastic, and Datadog
    integrate AI features, their roles in cybersecurity are limited to generating
    insights and assisting with log analysis, rather than direct network security
    capabilities. To effectively address sophisticated threats, AI-powered tools take
    a proactive stance, focusing on analyzing network traffic patterns and correlating
    data to identify and mitigate risks. The following examples highlight how AI-powered
    tools and techniques are being applied across various layers of cybersecurity
    to enhance threat detection, prevention, and response in today’s complex digital
    environments:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 今天网络安全威胁格局的复杂性要求先进的、积极的解决方案。虽然一些平台如 Splunk、Elastic 和 Datadog 集成了 AI 功能，但它们在网络安全中的作用仅限于生成见解和协助日志分析，而不是直接的网络安全功能。为了有效地应对复杂的威胁，AI
    驱动的工具采取积极的立场，专注于分析网络流量模式并关联数据以识别和缓解风险。以下示例突出了 AI 驱动的工具和技术如何应用于网络安全的不同层面，以增强今天复杂数字环境中的威胁检测、预防和响应：
- en: '**AI-driven network traffic analysis**: Advanced algorithms analyze traffic
    patterns by establishing baselines of normal behavior using historical data. AI
    models detect deviations such as unusual access patterns, high data transfer rates,
    or anomalous device interactions that could indicate potential attacks. For example,
    **Intrusion Detection Systems** (**IDSs**) such as **Darktrace** and **Vectra
    AI** employ machine learning models to analyze data from log files, device telemetry,
    and packet captures. These tools can flag deviations that signify **Advanced Persistent
    Threats** (**APTs**) or insider risks.'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI驱动的网络流量分析**：高级算法通过使用历史数据建立正常行为的基线来分析流量模式。AI模型检测到异常，如不寻常的访问模式、高数据传输速率或异常的设备交互，这些都可能表明潜在的攻击。例如，**入侵检测系统（IDS）**如**Darktrace**和**Vectra
    AI**使用机器学习模型分析来自日志文件、设备遥测和数据包捕获的数据。这些工具可以标记出表明**高级持续性威胁（APTs）**或内部风险的偏差。'
- en: '**Endpoint protection tools**: Tools such as **SentinelOne** and **CrowdStrike**
    leverage AI to protect endpoints by monitoring device telemetry and user behavior.
    These solutions apply anomaly detection algorithms to identify unusual activity,
    such as unauthorized file access or lateral movement within a network. By correlating
    data sources, such as endpoint logs and system activity, AI-driven endpoint protection
    proactively detects malware, ransomware, and phishing attempts before significant
    damage occurs.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**端点保护工具**：例如**SentinelOne**和**CrowdStrike**这样的工具利用AI通过监控设备遥测和用户行为来保护端点。这些解决方案应用异常检测算法来识别不寻常的活动，如未经授权的文件访问或网络内的横向移动。通过关联数据源，如端点日志和系统活动，AI驱动的端点保护可以主动检测恶意软件、勒索软件和钓鱼攻击，在造成重大损害之前进行防范。'
- en: '**AI techniques in cybersecurity**: AI techniques such as supervised learning
    identify known attack patterns, while unsupervised learning detects novel threats
    without prior signatures. Reinforcement learning models, known for their adaptability,
    refine their real-time detection capabilities to handle evolving threats. These
    techniques enhance threat detection accuracy and minimize false positives, improving
    incident response efficiency.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网络安全中的AI技术**：AI技术如监督学习可以识别已知的攻击模式，而无监督学习则可以在没有先验签名的情况下检测新型威胁。以适应性著称的强化学习模型，通过优化其实时检测能力来应对不断发展的威胁。这些技术提高了威胁检测的准确性，并最小化了误报，从而提升了事件响应的效率。'
- en: '**Predictive analytics for cybersecurity resilience**: AI also powers predictive
    analytics, allowing businesses to anticipate potential threats by analyzing trends
    across vast datasets. For instance, tools such as **Cortex XSOAR**, **PhishEr
    Plus**, and **FortiSOAR** integrate predictive insights into security orchestration
    workflows, enabling faster mitigation of risks. Businesses can allocate resources
    effectively and bolster their defenses by identifying vulnerable points and potential
    attack vectors.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网络安全弹性的预测分析**：AI还推动了预测分析，使企业能够通过分析大量数据集中的趋势来预测潜在的威胁。例如，**Cortex XSOAR**、**PhishEr
    Plus**和**FortiSOAR**等工具将预测洞察集成到安全编排工作流程中，从而加快风险缓解。企业可以通过识别脆弱点和潜在的攻击向量，有效地分配资源并加强其防御。'
- en: '**Visualizing detection workflows**: AI-enhanced workflows typically begin
    with data ingestion from diverse sources (e.g., logs, telemetry, and network packets).
    Tools such as Darktrace establish behavioral baselines from network telemetry
    to detect anomalies, Vectra AI identifies unusual communication patterns indicating
    lateral movement, and Cortex XSOAR integrates diverse data sources to prioritize
    alerts and automate response workflows. Data is preprocessed, filtered, and fed
    into machine learning models to establish behavioral baselines. Anomalies trigger
    alerts, prompting human analysts or automated systems to investigate and respond.
    These steps create a feedback loop, continuously refining the AI’s accuracy and
    adaptability.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化检测工作流程**：AI增强的工作流程通常从从不同来源（例如，日志、遥测和网络数据包）的数据摄取开始。例如，Darktrace通过建立网络遥测的行为基线来检测异常，Vectra
    AI识别出表明横向移动的不寻常通信模式，而Cortex XSOAR则整合不同的数据源以优先处理警报并自动化响应工作流程。数据经过预处理、过滤后输入到机器学习模型中，以建立行为基线。异常触发警报，促使人工分析师或自动化系统进行调查和响应。这些步骤创建了一个反馈循环，持续优化AI的准确性和适应性。'
- en: Integrating AI into cybersecurity strategies empowers organizations to stay
    ahead of evolving threats, shifting from reactive to proactive security measures.
    By leveraging AI-driven tools and workflows, businesses can enhance their cybersecurity
    resilience and protect their digital assets in an ever-changing threat environment.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能融入网络安全策略使组织能够领先于不断发展的威胁，从被动安全措施转变为主动安全措施。通过利用人工智能驱动的工具和工作流程，企业可以增强其网络安全弹性，并在不断变化的威胁环境中保护其数字资产。
- en: Comprehensive security solutions
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 综合安全解决方案
- en: AI is transforming critical security areas beyond network monitoring, intrusion
    detection, and cybersecurity. It is being integrated into various technologies
    to protect platforms and assets.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在改变网络监控、入侵检测和网络安全以外的关键安全领域。它被集成到各种技术中以保护平台和资产。
- en: AI-enabled **Video Management Systems (VMSs)** are revolutionizing physical
    security. Solutions such as **Avigilon** and **Milestone Systems** use computer
    vision and deep learning algorithms to identify and flag suspicious activities
    in real time. This provides valuable insights and early warnings, allowing security
    teams to proactively address potential security breaches before they escalate.
    These AI-powered VMSs continuously learn and adapt to the environment, making
    them an essential tool for organizations to monitor and respond to potential threats.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能驱动的**视频管理系统（VMSs）**正在革新物理安全。例如，**Avigilon**和**Milestone Systems**等解决方案使用计算机视觉和深度学习算法实时识别和标记可疑活动。这提供了宝贵的见解和早期预警，使安全团队能够在问题升级之前主动应对潜在的安全漏洞。这些人工智能驱动的VMSs不断学习和适应环境，成为组织监控和应对潜在威胁的必备工具。
- en: AI is also revolutionizing access control and identity management. Biometric
    authentication systems, such as facial recognition and fingerprint scanners, now
    incorporate AI-driven capabilities for enhanced security and convenience. These
    solutions accurately and quickly verify individual identity, reducing the risk
    of unauthorized access while streamlining entry for authorized personnel.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能还在革新访问控制和身份管理。生物识别认证系统，如面部识别和指纹扫描仪，现在集成了人工智能驱动的功能，以增强安全性和便利性。这些解决方案准确且快速地验证个人身份，降低未经授权访问的风险，同时简化授权人员的进入流程。
- en: Moreover, AI is playing a crucial role in securing **Internet of Things (IoT)**
    devices. As the number of connected devices continues to grow, the attack surface
    for cybercriminals has expanded exponentially. AI-powered IoT security platforms
    analyze network traffic, device behavior, and contextual data to detect and mitigate
    threats in real time, identifying anomalies and vulnerabilities. This helps organizations
    maintain IoT ecosystem integrity and protect against emerging threats.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，人工智能在确保**物联网（IoT）**设备安全方面发挥着至关重要的作用。随着连接设备数量的持续增长，网络犯罪分子的攻击面呈指数级扩大。人工智能驱动的物联网安全平台分析网络流量、设备行为和上下文数据，以实时检测和缓解威胁，识别异常和漏洞。这有助于组织维护物联网生态系统的完整性，并抵御新兴的威胁。
- en: Organizations should adopt solutions that enable real-time device authentication
    using machine learning models trained on device behavior patterns and contextual
    data to implement AI in IoT security effectively. For example, anomaly detection
    algorithms can instantly monitor deviations in device activity, such as unexpected
    communication patterns or unauthorized access attempts, flagging potential breaches.
    Leveraging AI-enabled identity and access management tools ensures that only verified
    devices and users can access IoT networks, enhancing security while minimizing
    false positives. Combining these approaches with continuous learning models ensures
    adaptive protection against evolving threats in IoT ecosystems.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 组织应采用能够使用基于设备行为模式和上下文数据的机器学习模型进行实时设备认证的解决方案，以有效地在物联网安全中实施人工智能。例如，异常检测算法可以即时监控设备活动的偏差，如意外的通信模式或未经授权的访问尝试，标记潜在的安全漏洞。利用人工智能驱动的身份和访问管理工具确保只有经过验证的设备和用户才能访问物联网网络，增强安全性同时最大限度地减少误报。将这些方法与持续学习模型相结合，确保对物联网生态系统中不断发展的威胁具有适应性保护。
- en: Integrating AI into physical and IoT security is more comprehensive than detection
    and response capabilities. AI-driven predictive analytics transform risk assessment
    and management by analyzing historical data, environmental factors, and other
    relevant information. AI systems provide valuable insights into potential vulnerabilities
    and their impact, enabling proactive risk management.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI集成到物理和物联网安全中比检测和响应能力更全面。AI驱动的预测分析通过分析历史数据、环境因素和其他相关信息，转变了风险评估和管理。AI系统提供了对潜在漏洞及其影响的宝贵见解，使主动风险管理成为可能。
- en: The threat landscape is constantly evolving, making it crucial for organizations
    to adopt comprehensive and adaptable security solutions. AI-powered technologies
    can help organizations stay ahead of physical and cyber threats by proactively
    identifying and mitigating risks before they can cause significant harm.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 威胁领域不断演变，这使得组织采用全面且适应性强的安全解决方案至关重要。AI驱动的技术可以帮助组织在物理和网络安全威胁发生之前，通过主动识别和减轻风险来保持领先。
- en: Integrating AI-driven solutions should be a top priority for businesses looking
    to modernize their security strategies. It gives a significant advantage in safeguarding
    their platforms, assets, and digital infrastructure. However, implementing AI
    in Platform Engineering can be challenging and comes with its own set of risks,
    requiring careful planning and robust execution to manage and mitigate them accordingly.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 对于希望现代化其安全策略的企业来说，集成AI驱动的解决方案应成为首要任务。这为保护其平台、资产和数字基础设施提供了显著优势。然而，在平台工程中实施AI可能具有挑战性，并带来其自身的风险，需要仔细规划和稳健的执行来管理和减轻这些风险。
- en: 'Explore further: Generative AI in action'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 探索更多：生成式AI的实际应用
- en: We invite you to extend our experiment outlined in the *AI at the speed of thought*
    section and apply the same methodology to other critical areas listed in the *AI
    in infrastructure management* and *Security enhancement through AI* sections.
    Adjust the original prompt to fit these contexts and discover how generative AI
    can transform these domains. This exploration will deepen your understanding of
    AI’s capabilities and empower you to leverage cutting-edge technology to streamline
    and secure your operations, enhancing your strategic initiatives with AI-driven
    insights.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我们邀请您扩展我们在“**思维速度的AI**”部分概述的实验，并将相同的方法论应用于“**AI在基础设施管理**”和“**通过AI增强安全**”部分列出的其他关键领域。调整原始提示以适应这些环境，并发现生成式AI如何改变这些领域。这次探索将加深您对AI能力的理解，并使您能够利用尖端技术简化并确保您的运营，通过AI驱动的洞察力增强您的战略举措。
- en: Navigating the complexities of AI integration
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索AI集成的复杂性
- en: Integrating generative AI into Platform Engineering offers substantial benefits
    but brings significant challenges. The primary concerns are data privacy and security,
    as AI systems handle sensitive and proprietary information. Organizations must
    also navigate a complex and evolving regulatory landscape, ensuring compliance
    across jurisdictions. Ethical considerations are critical to avoid unintended
    consequences such as bias and lack of transparency. This section addresses these
    challenges and presents strategies to mitigate risks, empowering leaders to harness
    AI responsibly and effectively.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 将生成式AI集成到平台工程中提供了显著的好处，但也带来了重大的挑战。主要关注点是数据隐私和安全，因为AI系统处理敏感和专有信息。组织还必须应对复杂且不断变化的监管环境，确保跨司法管辖区合规。道德考量至关重要，以避免意外后果，如偏见和缺乏透明度。本节将解决这些挑战，并提出减轻风险的策略，使领导者能够负责任和有效地利用AI。
- en: Data privacy and security concerns
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据隐私和安全担忧
- en: 'As generative AI technologies become increasingly integrated into Platform
    Engineering, the data privacy and security implications are significant, especially
    the vulnerabilities that may arise. Strategies must be implemented to safeguard
    sensitive information effectively. To address these concerns, organizations should
    focus on several critical aspects of data privacy and security when implementing
    generative AI, as outlined in the following key areas:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 随着生成式AI技术越来越集成到平台工程中，数据隐私和安全的含义重大，特别是可能出现的漏洞。必须实施策略来有效保护敏感信息。为了解决这些担忧，组织在实施生成式AI时应关注以下关键领域的几个关键数据隐私和安全方面：
- en: '**Vulnerability to data breaches**: Generative AI systems process and store
    vast amounts of data, some highly sensitive or proprietary. Their complexity can
    introduce vulnerabilities, making them potential targets for cyberattacks. Organizations
    must implement robust cybersecurity measures, such as encryption, secure access
    protocols, and IDSs, to protect against unauthorized access and data breaches.'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据泄露的脆弱性**：生成式AI系统处理和存储大量数据，其中一些数据非常敏感或属于专有信息。它们的复杂性可能引入漏洞，使其成为网络攻击的潜在目标。组织必须实施强大的网络安全措施，例如加密、安全访问协议和入侵检测系统（IDS），以防止未经授权的访问和数据泄露。'
- en: '**Privacy compliance**: With the global landscape of data privacy regulations
    continually evolving, compliance becomes a critical challenge. Generative AI systems
    must be designed and operated to comply with laws such as the General Data Protection
    Regulation (GDPR) in Europe, CCPA in California, and other regional regulations.
    This involves implementing data protection by design, conducting regular privacy
    impact assessments, and ensuring that data-handling practices are transparent
    and accountable.'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐私合规性**：随着全球数据隐私法规的不断演变，合规性成为一个关键挑战。生成式AI系统必须设计和运营以符合欧洲的通用数据保护条例（GDPR）、加州的消费者隐私法案（CCPA）和其他地区法规。这包括实施设计时的数据保护、定期进行隐私影响评估，并确保数据处理实践透明且负责任。'
- en: '**Data anonymization techniques**: Generative AI applications should employ
    advanced data anonymization techniques to remove individual identifiers from datasets
    and mitigate privacy risks. However, maintaining the utility of data while ensuring
    anonymity can be challenging, as overly anonymized data may lose its effectiveness
    for training AI models.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据匿名化技术**：生成式AI应用应采用高级数据匿名化技术，从数据集中移除个人标识符并减轻隐私风险。然而，在确保匿名性的同时保持数据的效用可能具有挑战性，因为过度匿名化的数据可能会失去对训练AI模型的有效性。'
- en: '**AI and consent**: Using personal data in AI systems raises questions about
    consent. Organizations must obtain explicit consent from individuals when their
    data is used for training or operating AI systems, particularly in applications
    that may impact personal rights or freedoms. Clear communication about how data
    is used, stored, and shared is essential to maintaining trust and compliance.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI与同意**：在AI系统中使用个人数据引发了关于同意的问题。当个人数据用于训练或操作AI系统时，组织必须从个人那里获得明确的同意，尤其是在可能影响个人权利或自由的应用中。关于数据的使用、存储和共享的明确沟通对于维护信任和合规至关重要。'
- en: '**Security of AI models**: Beyond data security, the AI models themselves can
    be targets for attacks. Techniques such as model inversion or adversarial attacks
    can exploit weaknesses in AI algorithms to extract sensitive information or manipulate
    model behaviors. Protecting AI models involves securing both the data they use
    and the models themselves, including implementing measures to detect and respond
    to attacks on AI systems.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI模型的安全性**：除了数据安全之外，AI模型本身也可能成为攻击目标。例如，模型反演或对抗性攻击可以利用AI算法中的弱点来提取敏感信息或操纵模型行为。保护AI模型需要确保它们所使用的数据和模型本身的安全，包括实施检测和应对AI系统攻击的措施。'
- en: '**Ongoing monitoring and audits**: Given the dynamic nature of generative AI
    systems, continuous monitoring and regular security audits are essential to ensure
    that privacy and security measures remain effective. This includes reviewing access
    controls, evaluating data protection strategies, and updating security protocols
    in response to new threats. AI-powered tools are critical in monitoring data flow
    and access control across multi-cloud environments by analyzing user behavior,
    detecting unauthorized access attempts, and providing real-time insights to ensure
    comprehensive data security.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续监控和审计**：鉴于生成式AI系统的动态特性，持续的监控和定期的安全审计对于确保隐私和安全措施的有效性至关重要。这包括审查访问控制、评估数据保护策略，并根据新的威胁更新安全协议。AI驱动的工具通过分析用户行为、检测未经授权的访问尝试，并提供实时洞察，确保跨多云环境的数据流和访问控制得到全面的安全保障。'
- en: Addressing these data privacy and security concerns requires a multifaceted
    approach that includes technological solutions, organizational policies, and compliance
    with legal standards. By prioritizing data protection and ethical considerations,
    organizations can build trust and ensure that their use of generative AI in Platform
    Engineering enhances capabilities without compromising security or privacy.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这些数据隐私和安全问题需要多方面的方法，包括技术解决方案、组织政策和遵守法律标准。通过优先考虑数据保护和道德考量，组织可以建立信任，并确保其在平台工程中使用生成式AI增强能力的同时，不损害安全或隐私。
- en: Regulatory and compliance issues
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监管和合规问题
- en: 'The rapid advancement and integration of generative AI into Platform Engineering
    introduce a complex web of regulatory and compliance challenges. As governments
    and international bodies strive to keep pace with technological innovations, organizations
    must navigate an ever-evolving regulatory landscape. To navigate these challenges
    effectively, organizations must consider several key areas of compliance and regulatory
    responsibility:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI在平台工程中的快速发展和集成引入了一个复杂的监管和合规挑战网络。随着政府和国际机构努力跟上技术创新的步伐，组织必须在一个不断变化的监管环境中导航。为了有效地应对这些挑战，组织必须考虑几个关键的合规和监管责任领域：
- en: '**Understanding diverse regulatory environments**: Generative AI applications
    often span multiple jurisdictions, each with its own set of rules and standards
    regarding data privacy, AI usage, and cybersecurity. Companies need to be well
    versed in the regulations specific to the regions they operate in, such as the
    GDPR in the European Union, which imposes strict guidelines on data usage and
    individual privacy. Staying compliant requires a thorough understanding of these
    regulations and adapting quickly to regulatory changes.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理解多样化的监管环境**：生成式AI应用通常跨越多个司法管辖区，每个地区都有自己关于数据隐私、AI使用和网络安全的一套规则和标准。公司需要熟悉它们运营地区的特定法规，例如欧盟的GDPR，它对数据使用和个人隐私施加了严格的指导方针。保持合规需要对这些法规有深入的理解，并迅速适应监管变化。'
- en: '**Industry-specific regulations**: Depending on the sector, additional layers
    of regulation may govern the deployment of AI technologies. For instance, the
    healthcare industry faces stringent regulations concerning patient data and medical
    devices, while the financial sector must comply with laws designed to prevent
    fraud and ensure transparency. Understanding and adhering to these industry-specific
    regulations is crucial for the successful and lawful use of generative AI in specialized
    fields.'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行业特定法规**：根据行业不同，可能需要额外的监管层来管理AI技术的部署。例如，医疗行业面临严格的关于患者数据和医疗设备的法规，而金融行业必须遵守旨在防止欺诈并确保透明度的法律。理解和遵守这些行业特定法规对于在专业领域成功和合法使用生成式AI至关重要。'
- en: '**Certification and standards compliance**: AI systems often need to meet specific
    standards and obtain certifications to build trust and ensure quality. These might
    include standards for AI safety, ethics, and interoperability. Compliance with
    international standards such as ISO and IEEE can demonstrate a commitment to best
    practices and quality assurance in AI development and deployment.'
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**认证和标准合规性**：AI系统通常需要满足特定标准并获得认证，以建立信任并确保质量。这些可能包括AI安全、伦理和互操作性的标准。遵守ISO和IEEE等国际标准可以表明对最佳实践和质量保证在AI开发和部署中的承诺。'
- en: '**Intellectual property concerns**: As AI systems become capable of creating
    content or inventing new products, Intellectual Property (IP) issues become increasingly
    complex. Organizations must navigate the legal implications of AI-generated output,
    determining ownership and ensuring that their use of AI does not infringe on existing
    IP rights.'
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识产权问题**：随着AI系统能够创造内容或发明新产品，知识产权（IP）问题变得越来越复杂。组织必须应对AI生成输出的法律影响，确定所有权并确保其使用AI不会侵犯现有的知识产权。'
- en: '**Liability and accountability**: Determining liability in cases where AI systems
    cause harm or financial loss is a significant legal challenge. Organizations must
    establish clear accountability frameworks to address potential damages or legal
    actions resulting from the actions of their AI systems. This includes developing
    robust risk management strategies and liability insurance policies to cover AI-related
    risks.'
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**责任和问责制**：在人工智能系统造成伤害或经济损失的情况下确定责任是一个重大的法律挑战。组织必须建立明确的问责制框架，以解决其人工智能系统行为可能导致的潜在损害或法律诉讼。这包括制定稳健的风险管理策略和责任保险政策，以覆盖与人工智能相关的风险。'
- en: '**Engagement with regulatory bodies**: Proactive engagement with regulators
    can help organizations influence the development of AI regulations and ensure
    that their interests and concerns are addressed. Participating in industry groups,
    policy discussions, and public consultations can also provide insights into upcoming
    regulatory changes, allowing companies to prepare and adapt.'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与监管机构的互动**：与监管机构的积极互动可以帮助组织影响人工智能法规的发展，并确保其利益和关切得到解决。参与行业团体、政策讨论和公众咨询还可以提供对即将到来的监管变化的见解，使公司能够做好准备并适应。'
- en: Organizations must navigate regulatory and compliance issues in Platform Engineering
    to ensure the legal and ethical integrity of generative AI applications. Compliance
    frameworks, legal education, and active engagement with regulatory developments
    are necessary investments that align innovative AI use with legal requirements
    and ethical standards. Organizations can streamline compliance efforts by leveraging
    tools such as **OneTrust** for privacy compliance or **BigID** for data governance.
    These tools, along with AI-driven solutions, can automate compliance monitoring
    by analyzing data flows, identifying potential violations, and generating actionable
    reports to meet regulatory requirements efficiently.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 组织必须应对平台工程中的监管和合规问题，以确保生成式人工智能应用的合法性和伦理完整性。合规框架、法律教育和积极参与监管发展是必要的投资，这些投资将创新的人工智能使用与法律要求相一致，并与伦理标准相符合。组织可以通过利用诸如**OneTrust**（用于隐私合规）或**BigID**（用于数据治理）等工具来简化合规工作。这些工具以及人工智能驱动的解决方案可以通过分析数据流、识别潜在违规行为并生成可操作的报告来自动化合规监控，从而高效地满足监管要求。
- en: By integrating these tools and practices, organizations mitigate legal risks
    and foster responsible AI adoption. This is not just about meeting legal requirements,
    but about ensuring societal trust and accountability. This proactive approach
    underscores the need for organizations to consider the broader ethical and societal
    implications of their AI-driven initiatives, balancing innovation with fairness
    and equity. It’s a significant responsibility that should not be taken lightly.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 通过整合这些工具和实践，组织可以降低法律风险并促进负责任的人工智能采用。这不仅仅是满足法律要求，更是确保社会信任和问责制。这种积极主动的方法强调了组织需要考虑其人工智能驱动举措的更广泛的伦理和社会影响，在创新与公平和公正之间取得平衡。这是一个重大的责任，不应被轻视。
- en: Ethical and societal implications
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伦理和社会影响
- en: 'Deploying generative AI in Platform Engineering brings with it not just technical
    and regulatory challenges but also profound ethical and societal implications.
    As these technologies can influence major decisions and operations within enterprises,
    the responsibility to deploy them conscientiously grows. Let us delve into generative
    AI’s ethical considerations and societal impacts, highlighting the need for responsible
    innovation and deployment strategies:'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在平台工程中部署生成式人工智能不仅带来了技术和监管挑战，还带来了深刻的伦理和社会影响。由于这些技术可以影响企业内部的重要决策和运营，因此有意识地部署它们的责任也在增加。让我们深入探讨生成式人工智能的伦理考量和社会影响，强调负责任创新和部署策略的必要性：
- en: '**Bias and fairness**: AI systems can perpetuate bias and lead to unfair outcomes,
    often caused by the data used to train AI models, which can reflect historical
    inequalities or prejudices. To ensure fairness, rigorous testing and continuous
    monitoring of AI systems are essential to identify and mitigate biases. Organizations
    must commit to developing inclusive and equitable AI to prevent discrimination
    against any group.'
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏见和公平性**：人工智能系统可能会延续偏见并导致不公平的结果，这通常是由于训练人工智能模型所使用的数据造成的，这些数据可能反映了历史不平等或偏见。为确保公平性，对人工智能系统进行严格的测试和持续监控是必要的，以识别和减轻偏见。组织必须致力于开发包容性和公平的人工智能，以防止对任何群体的歧视。'
- en: '**Transparency and explainability**: As AI systems become more involved in
    decision-making processes, stakeholders need transparency in making decisions.
    To maintain trust and accountability in AI, its developers must develop explainable
    AI that provides understandable reasons for its decisions. This is necessary for
    employees and customers to have confidence in and understand the basis for AI-generated
    decisions.'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**透明度和可解释性**：随着AI系统越来越多地参与决策过程，利益相关者需要决策的透明度。为了在AI中保持信任和问责制，其开发者必须开发可解释的AI，提供其决策的可理解原因。这对于员工和客户对AI生成的决策有信心并理解其基础是必要的。'
- en: '**Privacy and surveillance**: Generative AI’s ability to process vast amounts
    of data raises significant privacy concerns. AI systems with access to sensitive
    personal and corporate data pose a high risk of privacy breaches and surveillance.
    Organizations must adhere to strict data protection standards and prioritize privacy
    rights when using AI to prevent unauthorized access and misuse.'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐私和监控**：生成式AI处理大量数据的能力引发了重大的隐私担忧。能够访问敏感个人和公司数据的AI系统存在隐私泄露和监控的高风险。组织必须遵守严格的数据保护标准，并在使用AI时优先考虑隐私权，以防止未经授权的访问和滥用。'
- en: '**Impact on employment**: Generative AI’s automation capabilities can significantly
    change the job market by making certain roles redundant while creating new ones.
    Ethical organizations must proactively address these changes by providing retraining
    and reskilling opportunities for affected employees. This approach mitigates the
    negative impact on employment while building a future-ready workforce.'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对就业的影响**：生成式AI的自动化能力可以通过使某些角色变得冗余同时创造新的角色，显著改变就业市场。道德组织必须积极应对这些变化，为受影响的员工提供再培训和技能提升的机会。这种方法可以减轻对就业的负面影响，同时构建一个未来准备好的劳动力队伍。'
- en: '**Societal impact and responsibility**: Generative AI has the potential to
    impact broader societal structures and norms beyond individual organizations.
    The ethical deployment of AI should consider long-term societal outcomes, including
    the potential for increased inequality or shifts in social dynamics. Companies
    are responsible for evaluating these broader impacts and working toward solutions
    that benefit society overall.'
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**社会影响和责任**：生成式AI有可能影响超出单个组织的社会结构和规范。AI的道德部署应考虑长期社会结果，包括加剧不平等或社会动态变化的潜力。公司有责任评估这些更广泛的影响，并努力寻求有利于整个社会的解决方案。'
- en: '**Governance and ethical frameworks**: To address these ethical challenges,
    robust governance frameworks that include ethical guidelines, oversight mechanisms,
    and regular audits are necessary. These frameworks should be developed in collaboration
    with diverse stakeholders, including ethicists, sociologists, and representatives
    from affected communities, to ensure a well-rounded and just approach to AI governance.'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理和伦理框架**：为了解决这些伦理挑战，需要包括伦理指南、监督机制和定期审计在内的强大治理框架。这些框架应与包括伦理学家、社会学家和受影响社区代表在内的多元化利益相关者合作制定，以确保对AI治理的全面和公正方法。'
- en: By carefully considering these complexities—data privacy and security, evolving
    regulatory landscapes, and ethical implications—organizations can navigate the
    integration of generative AI in Platform Engineering with innovation, efficiency,
    and social responsibility. Implementing comprehensive strategies to address these
    challenges ensures that AI’s deployment not only enhances operational capabilities
    but also aligns with ethical standards and societal expectations. Understanding
    these factors will significantly help in developing better AI policies for your
    organizations and promoting responsible AI. This proactive approach positions
    organizations at the forefront of technological advancement, ready to leverage
    AI’s full potential while safeguarding against its risks.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仔细考虑这些复杂性——数据隐私和安全、不断变化的监管环境以及伦理影响——组织可以在平台工程中创新、高效和负责任地整合生成式AI。实施全面战略以应对这些挑战，确保AI的部署不仅增强运营能力，而且符合伦理标准和公众期望。理解这些因素将极大地帮助您为组织制定更好的AI政策，并促进负责任的AI。这种积极主动的方法使组织处于技术进步的前沿，准备好利用AI的全部潜力，同时防范其风险。
- en: Summary
  id: totrans-223
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter has showcased the transformative potential of incorporating generative
    AI into Platform Engineering, demonstrating how AI can elevate platform strategies
    and streamline operations across multiple dimensions. From enhancing decision-making
    to fortifying security protocols, AI applications in Platform Engineering optimize
    current processes and open doors to innovative approaches to software development
    and infrastructure management. Integrating AI can help organizations achieve efficiency,
    agility, and responsiveness, setting a new standard in the technological landscape.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 本章展示了将生成式人工智能融入平台工程的变革潜力，展示了人工智能如何提升平台战略并简化多个维度的运营。从增强决策到加强安全协议，平台工程中的AI应用优化了现有流程，并为软件开发和基础设施管理的创新方法打开了大门。整合AI可以帮助组织实现效率、敏捷性和响应性，在技术景观中树立新的标准。
- en: Call to action
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 行动呼吁
- en: '**Pilot AI-driven initiatives**: Identify opportunities within your current
    platform operations where your teams can integrate AI. Begin with pilot projects
    focusing on automating tasks, enhancing security measures, improving resilience,
    and continuously assessing their performance. These pilots will serve as a foundation
    to scale AI integration across the organization, fostering a culture of innovation
    and continuous improvement with your leadership at the forefront.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**试点AI驱动项目**：在您的当前平台运营中识别机会，让您的团队能够整合AI。从专注于自动化任务、增强安全措施、提高弹性和持续评估其性能的试点项目开始。这些试点将为在整个组织中扩展AI整合奠定基础，与您的领导层一起培养创新和持续改进的文化。'
- en: '**Invest in AI skills development**: As AI becomes a critical component of
    Platform Engineering, investing in upskilling your team becomes imperative. Provide
    training and resources to help your staff understand and implement AI technologies
    effectively, ensuring that your organization remains at the forefront of innovation.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资于AI技能发展**：随着AI成为平台工程的关键组成部分，投资于团队技能提升变得至关重要。提供培训和资源，帮助您的员工有效理解和实施AI技术，确保您的组织始终处于创新的前沿。'
- en: '**Establish AI ethics and governance**: Develop and implement policies and
    guidelines to ensure the responsible use of AI within your organization. Focus
    on creating ethical AI frameworks that promote transparency, fairness, and accountability,
    as well as safeguarding against bias, and ensure that AI-driven solutions align
    with organizational values and legal standards.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立AI伦理和治理**：制定和实施政策指南，以确保在您的组织中负责任地使用AI。重点在于创建促进透明度、公平性和问责制的伦理AI框架，同时防范偏见，并确保AI驱动的解决方案与组织价值观和法律标准相一致。'
- en: In the next chapter, we will delve into advanced generative AI techniques that
    further expand on the capabilities discussed here. This exploration will deepen
    our understanding of AI’s potential and equip us with sophisticated tools and
    methodologies to revolutionize Platform Engineering.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将深入探讨高级生成式人工智能技术，这些技术将进一步扩展本章讨论的能力。这次探索将加深我们对AI潜力的理解，并为我们提供复杂的工具和方法，以革命性地改变平台工程。
