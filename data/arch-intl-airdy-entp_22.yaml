- en: Afterword
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 后记
- en: 'As we write this, we’re struck by how far this project has come since it was
    first suggested that we turn our scattered industry insights into a cohesive guide.
    What began as an effort to organize our existing knowledge has evolved into something
    we never expected: a comprehensive framework that bridges the gap between AI theory
    and production reality.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们撰写这篇文档时，我们深感这个项目自从最初提出将我们分散的行业洞察力整合成一本连贯指南以来已经取得了多么大的进展。起初，这是一项组织现有知识的努力，但最终演变成我们从未预料到的东西：一个连接AI理论与生产现实的全面框架。
- en: The process of writing also changed how we saw our own experiences. What began
    as documenting case studies soon turned into recognizing the deeper forces at
    play. We realized that decisions about data, governance, and system design consistently
    shaped outcomes. Rather than a set of disconnected stories, the chapters revealed
    a bigger picture. The real breakthroughs came from aligning technology choices
    with business realities.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 写作的过程也改变了我们看待自身经验的方式。起初是记录案例研究，很快转变为认识到更深层次的力量在发挥作用。我们意识到，关于数据、治理和系统设计的决策始终影响着结果。与其说是一系列脱节的叙述，不如说章节揭示了一个更大的图景。真正的突破来自于将技术选择与商业现实相一致。
- en: What we learned
  id: totrans-3
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们学到的
- en: Writing this book reinforced three critical insights that weren’t obvious when
    we began. First, successful AI implementation centers on data architecture. Every
    transformative application we studied, from real-time fraud detection to clinical
    report generation, succeeded because organizations invested in unified and flexible
    data foundations before they worried about model selection.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写这本书强化了三个在我们开始时并不明显的关键洞察。首先，成功的AI实施集中在数据架构上。我们研究的每一个具有变革性的应用程序，从实时欺诈检测到临床报告生成，都取得了成功，因为这些组织在担心模型选择之前，投资于统一和灵活的数据基础。
- en: Second, GenAI, RAG systems, and agentic architectures represent fundamentally
    different approaches to system design. Each has distinct requirements for data
    management, governance, and operational oversight. The companies that thrive understand
    these differences and choose their architectural patterns deliberately.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，通用人工智能（GenAI）、阅读-回答（RAG）系统和代理架构代表了系统设计的基本不同方法。每种方法都对数据管理、治理和运营监督有独特的要求。那些蓬勃发展的公司理解这些差异，并故意选择他们的架构模式。
- en: Finally, AI agents require comprehensive context to be both effective and safe.
    The most dangerous implementations we encountered weren’t those that failed to
    produce intelligent outputs, they were systems that operated with incomplete information.
    Whether in healthcare, financial services, or manufacturing, fragmented data creates
    fragmented intelligence, and fragmented intelligence creates operational risk.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，AI代理需要全面的环境才能既有效又安全。我们遇到的最危险的实施并不是那些未能产生智能输出的，而是那些在信息不完整的情况下运行的系统。无论是在医疗保健、金融服务还是制造业，数据碎片化创造了碎片化的智能，而碎片化的智能又创造了运营风险。
- en: Architectural insights
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 建筑洞察
- en: It became clear very early in this journey that infrastructure choices had a
    major impact on the ability of customers to get a GenAI-powered application into
    production. In every implementation we studied, applications built on old but
    familiar technology such as RDBMS created so much headwind in tech sprawl and
    operational complexity that projects quickly withered and died.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个旅程的早期，我们就清楚地意识到基础设施选择对客户将通用人工智能（GenAI）驱动的应用程序投入生产的能力有着重大影响。在我们研究的每一个实施案例中，建立在旧但熟悉的技术（如关系数据库管理系统RDBMS）之上的应用程序在技术蔓延和运营复杂性上产生了巨大的阻力，导致项目迅速枯萎并失败。
- en: It was also apparent that document-oriented databases had emerged as the unifying
    platform for the modern age. The clues had been there all along, surfacing as
    we traced the technical requirements across industries. Vector embeddings, operational
    data, analytical workloads, and agentic memory all converged on the same architectural
    pattern. Flexible schemas could evolve with intelligent applications while maintaining
    the performance characteristics required for real-time decisions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，文档导向型数据库已成为现代时代的统一平台。线索一直都在那里，随着我们追踪技术要求跨越各个行业而浮现。向量嵌入、运营数据、分析工作负载和代理记忆都汇聚于相同的架构模式。灵活的架构可以随着智能应用程序的发展而演变，同时保持实时决策所需的性能特征。
- en: 'This convergence suggests something profound about the future of enterprise
    software. We are witnessing the emergence of what we have called *systems of action*:
    platforms designed not just to store data, but to enable intelligent collaboration
    between humans and AI agents. The implications extend far beyond any single technology
    stack.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这种趋同表明了关于企业软件未来的深刻见解。我们正在见证我们所称的“行动系统”的出现：这些平台不仅设计用来存储数据，而且能够促进人类与人工智能代理之间的智能协作。其影响远远超出了任何单一技术栈。
- en: Beyond case studies
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不仅仅是案例研究
- en: The industries covered in this book (manufacturing, media, retail, financial
    services, insurance, and healthcare) represent just the beginning. As we’ve traveled
    and spoken with technology leaders across sectors, similar patterns have emerged
    everywhere. Transportation companies are optimizing logistics networks, energy
    firms are coordinating distributed generation, and educational institutions are
    personalizing learning experiences at scale.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 本书涵盖的行业（制造业、媒体、零售、金融服务、保险和医疗保健）只是开始。正如我们在各个领域与科技领导者交流并旅行时所见，类似的模式无处不在。运输公司正在优化物流网络，能源公司正在协调分布式发电，教育机构正在大规模个性化学习体验。
- en: The architectural principles remain consistent. The implementation details vary,
    but the core requirements for trustworthy, scalable, intelligent systems remain
    remarkably stable across domains. This gives us confidence that the frameworks
    presented here will stay relevant as AI capabilities continue to evolve.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 架构原则保持一致。实施细节会有所不同，但对于值得信赖、可扩展、智能系统的核心要求在各个领域保持惊人稳定。这让我们有信心，这里提出的框架将随着人工智能能力的持续发展而保持相关性。
- en: 'Our partner ecosystem validated this belief. Companies such as Cognigy, RegData,
    Iguazio, Fireworks AI, Encore, and Dataworkz did more than provide specialized
    capabilities. They showed how unified data architectures enable rapid innovation
    across diverse use cases. Their success stories reinforce a key thesis: transformative
    AI applications arise when flexible platforms meet domain expertise.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的合作伙伴生态系统验证了这一信念。像Cognigy、RegData、Iguazio、Fireworks AI、Encore和Dataworkz这样的公司不仅提供了专业化的能力。他们展示了统一数据架构如何在不同用例中实现快速创新。他们的成功故事强化了一个关键论点：当灵活的平台与领域专业知识相遇时，就会出现变革性的人工智能应用。
- en: What’s next
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 接下来是什么
- en: 'If you have made it this far, you are likely facing your own AI implementation
    decisions. Our advice is straightforward: understand your use case and use it
    to inform your architecture. If your use case needs GenAI, then you’ll need a
    solution that integrates capabilities such as vector search, embedding, and re-ranking,
    along with the basics such as flexible schemas, security, and performance, in
    one unified platform. The most compelling AI demonstration becomes irrelevant
    if it cannot access the information it needs to operate safely and effectively
    in production.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经走到这一步，你很可能会面临自己的人工智能实施决策。我们的建议很简单：了解你的用例，并利用它来指导你的架构。如果你的用例需要生成式人工智能（GenAI），那么你需要一个集成了向量搜索、嵌入和重新排序等能力，以及如灵活的架构、安全性和性能等基本功能的统一平台。如果最令人信服的人工智能演示无法访问其在生产中安全有效运行所需的信息，那么它就变得无关紧要了。
- en: Focus on creating unified, comprehensive data contexts before worrying about
    model selection or interface design. Invest in governance structures that can
    evolve with your AI capabilities. Design for agent coordination, even if you are
    starting with simple automation. Most importantly, remember that trustworthy AI
    is not just about algorithmic fairness; it is about systems that humans can understand,
    monitor, and control.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在担心模型选择或界面设计之前，先专注于创建统一、全面的数据上下文。投资于能够随着你的AI能力发展的治理结构。即使你从简单的自动化开始，也要为代理协调进行设计。最重要的是，记住值得信赖的人工智能不仅仅是关于算法公平性；它关乎的是人类可以理解、监控和控制系统。
- en: The technology landscape will continue to evolve rapidly. What will not change
    is the need for AI systems that are grounded in complete information, governed
    by clear policies, and designed to augment rather than replace human judgment.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 技术格局将继续快速发展。不会改变的是，我们需要基于完整信息、受明确政策治理、旨在增强而非取代人类判断的人工智能系统。
- en: The future belongs to organizations that can move quickly while maintaining
    safety, scale efficiently while preserving quality, and innovate continuously
    while building trust. The architectural principles and implementation patterns
    in this book provide a roadmap for that future.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 未来属于那些能够快速行动同时保持安全、高效扩展同时保持质量、持续创新同时建立信任的组织。本书中的架构原则和实现模式为那个未来提供了路线图。
- en: We are excited to see what you will build next!
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很期待看到您接下来会构建什么！
- en: Connect with us at `industry.solutions@mongodb.com` to share your AI implementation
    experiences, or visit [https://www.mongodb.com/resources/use-cases/artificial-intelligence](https://www.mongodb.com/resources/use-cases/artificial-intelligence)
    for additional resources, case study updates, and community discussions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 请通过`industry.solutions@mongodb.com`与我们联系，分享您的AI实施经验，或访问[https://www.mongodb.com/resources/use-cases/artificial-intelligence](https://www.mongodb.com/resources/use-cases/artificial-intelligence)获取更多资源、案例研究更新和社区讨论。
