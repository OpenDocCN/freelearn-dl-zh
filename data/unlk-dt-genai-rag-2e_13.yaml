- en: '11'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: Using LangChain to Get More from RAG
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 LangChain 从 RAG 中获取更多
- en: 'We have mentioned **LangChain** several times already, and we have shown you
    a lot of LangChain code, including code that implements the LangChain-specific
    language: **LangChain Expression Language** (**LCEL**). Now that you are familiar
    with different ways to implement **retrieval-augmented generation** (**RAG**)
    with LangChain, we thought now would be a good time to dive more into the various
    capabilities of LangChain that you can use to make your RAG pipeline better.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经多次提到 **LangChain**，并且已经向您展示了大量的 LangChain 代码，包括实现 LangChain 特定语言的代码：**LangChain
    表达语言**（**LCEL**）。现在您已经熟悉了使用 LangChain 实现检索增强生成（**RAG**）的不同方法，我们认为现在是深入了解 LangChain
    的各种功能的好时机，这些功能可以帮助您使您的 RAG 管道更加完善。
- en: 'In this chapter, we explore lesser-known but highly important components of
    LangChain that can enhance a RAG application. We will cover the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨 LangChain 中不太为人所知但非常重要的组件，这些组件可以增强 RAG 应用程序。我们将涵盖以下内容：
- en: Code lab 11.1 – document loaders for loading and processing documents from different
    sources
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 11.1 – 从不同来源加载和处理文档的文档加载器
- en: Code lab 11.2 – text splitters for dividing documents into chunks suitable for
    retrieval
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 11.2 – 用于将文档分割成适合检索的块文本分割器
- en: Code lab 11.3 – output parsers for structuring the responses from the language
    model
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室 11.3 – 结构化语言模型响应的输出解析器
- en: We will use different code labs to step through examples of each type of component,
    starting with document loaders.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用不同的代码实验室逐步展示每种类型组件的示例，从文档加载器开始。
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The code for this chapter has been placed in the following GitHub repository:
    [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_11](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_11).'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码已放置在以下 GitHub 仓库中：[https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_11](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_11)。
- en: Individual filenames for each code lab are mentioned in the respective sections.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 每个代码实验室的个别文件名在相应的章节中提到。
- en: Code lab 11.1 – document loaders
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室 11.1 – 文档加载器
- en: The file you need to access from the GitHub repository is titled `CHAPTER11-1_DOCUMENT_LOADERS.ipynb`.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要从 GitHub 仓库访问的文件标题为 `CHAPTER11-1_DOCUMENT_LOADERS.ipynb`。
- en: Document loaders play a key role in accessing, extracting, and pulling in the
    data that makes our RAG application function. Document loaders are used to load
    and process documents from various sources, such as text files, PDFs, web pages,
    or databases. They convert the documents into a format suitable for indexing and
    retrieval.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 文档加载器在访问、提取和拉取使我们的 RAG 应用程序运行所需的数据方面发挥着关键作用。文档加载器用于从各种来源加载和处理文档，例如文本文件、PDF、网页或数据库。它们将文档转换为适合索引和检索的格式。
- en: 'Let’s install some new packages to support our document loading, which, as
    you might have guessed, involves some different file format-related packages:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们安装一些新的包来支持我们的文档加载，正如您可能已经猜到的，这涉及到一些与不同文件格式相关的包：
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The first one may look familiar, `bs4` (for Beautiful Soup 4), as we used it
    in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043) for parsing HTML. We also
    have a couple of Microsoft Word-related packages, such as `python_docx`, which
    helps create and update Microsoft Word (`.docx`) files, and `docx2txt`, which
    extracts text and images from `.docx` files. The `jq` package is a lightweight
    JSON processor.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个可能看起来很熟悉，`bs4`（代表 Beautiful Soup 4），因为我们曾在 [*第 2 章*](B34736_02_ePub.xhtml#_idTextAnchor043)
    中使用它来解析 HTML。我们还有一些与 Microsoft Word 相关的包，例如 `python_docx`，它有助于创建和更新 Microsoft
    Word（`.docx`）文件，以及 `docx2txt`，它从 `.docx` 文件中提取文本和图像。`jq` 包是一个轻量级的 JSON 处理器。
- en: Next, we are going to take an extra step you likely will not have to take in
    a *real* situation, which is turning our PDF document into a bunch of other formats,
    so we can test out the extraction of those formats. We are going to add a whole
    new document loaders section to our code right after the OpenAI setup.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将采取一个您可能不会在 *真实* 情况下需要采取的额外步骤，即将我们的 PDF 文档转换为其他多种格式，以便我们可以测试这些格式的提取。我们将在
    OpenAI 设置之后立即在我们的代码中添加一个全新的文档加载器部分。
- en: In this section, we will provide code to generate the files, and then the different
    document loaders and their related packages to extract data from those types of
    files. Right now, we have a PDF version of our document. We will need an HTML/web
    version, a Microsoft Word version, and a JSON version of our document.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将提供生成文件的代码，然后是不同的文档加载器和它们相关的包，用于从这些类型的文件中提取数据。目前，我们有一个文档的PDF版本。我们需要文档的HTML/网络版本、Microsoft
    Word版本和JSON版本。
- en: 'We are going to start with a new cell under the OpenAI setup cell, where we
    will import the new packages we need for these conversions:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在OpenAI设置单元格下开始一个新的单元格，我们将导入我们进行这些转换所需的新包：
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As we mentioned, the `BeautifulSoup` package helps us parse HTML-based web pages.
    We also import `docx`, which represents the Microsoft Word processing format.
    Lastly, we import `json` to interpret and manage JSON-formatted code.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们提到的，`BeautifulSoup`包帮助我们解析基于HTML的网页。我们还导入了`docx`，它代表Microsoft Word处理格式。最后，我们导入了`json`来解释和管理JSON格式的代码。
- en: 'Next, we want to establish the filenames we will use for each of our formats:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们想要确定我们将用于每种格式的文件名：
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Here, we are defining the paths for each of the files that we use in this code,
    and later, when we use the loaders to load each document. These are going to be
    the final files that we generate from the original PDF document we have been using.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们定义了我们使用此代码中每个文件的路径，稍后当我们使用加载器加载每个文档时。这些将是我们将从原始PDF文档中生成的最终文件。
- en: 'Then, this key part of our new code will extract the text from the PDF and
    use it to generate all of these new types of documents:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们新代码的这个关键部分将提取PDF中的文本，并使用它来生成所有这些新类型的文档：
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We generate an HTML, Word, and JSON version of our document in a very basic
    sense. If you were generating these documents to actually use in a pipeline, we
    recommend applying more formatting and extraction, but for the purposes of this
    demonstration, this will provide us with the necessary data.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以非常基本的方式生成文档的HTML、Word和JSON版本。如果您生成这些文档是为了在实际的管道中使用，我们建议应用更多的格式化和提取，但为了演示的目的，这将为我们提供必要的数据。
- en: Next, we are going to add our document loaders under the indexing stage of our
    code. We have worked with the first two document loaders already, which we will
    show in this code lab, but updated so that they can be used interchangeably. For
    each document loader, we show what package imports are specific to that loader
    alongside the loader code. In earlier chapters, we used a web loader that loaded
    directly from a website, so if that is a use case you have, refer to that document
    loader. In the meantime, we are sharing a slightly different type of document
    loader here that is focused on using local HTML files, such as the one we just
    generated.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将在代码的索引阶段添加我们的文档加载器。我们已经与前两个文档加载器合作过，我们将在本代码实验室中展示，但进行了更新，以便它们可以互换使用。对于每个文档加载器，我们展示了与加载器代码相关的特定于该加载器的包导入。在早期章节中，我们使用了一个直接从网站加载的Web加载器，所以如果您有这种情况，请参考该文档加载器。同时，我们在这里分享了一种稍微不同类型的文档加载器，它专注于使用本地HTML文件，例如我们刚刚生成的文件。
- en: 'Here is the code for this HTML loader:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这个HTML加载器的代码：
- en: '[PRE4]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Here, we use the HTML file we defined earlier to load the code from an HTML
    document. The final variable, `docs`, can be used interchangeably with any other
    *docs* we define in the following document loaders. The way this code works, you
    can only use one loader at a time, and it will replace `docs` with its version
    of the docs (including a metadata source tag of what document it came from). If
    you run this cell and then skip down to run the splitter cell, you can run the
    remaining code in the lab and see similar results from what is the same data coming
    from different source file types. We did have to make a slight update later in
    the code, which we will note in a moment.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们使用我们之前定义的HTML文件来从HTML文档中加载代码。最终的变量`docs`可以与在以下文档加载器中定义的任何其他`docs`互换使用。这段代码的工作方式是，您一次只能使用一个加载器，并且它会用其版本的文档（包括来源文档的元数据标签）替换`docs`。如果您运行这个单元格，然后跳到运行拆分单元格，您可以在实验室中运行剩余的代码，并看到来自不同源文件类型相同数据的类似结果。我们后来在代码中做了一些小的更新，我们将在稍后说明。
- en: 'There are some alternative HTML loaders listed on the LangChain website that
    you can see here:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在LangChain网站上列出了一些替代的HTML加载器，您可以通过以下链接查看：
- en: '[https://python.langchain.com/v0.2/docs/how_to/document_loader_html/](https://python.langchain.com/v0.2/docs/how_to/document_loader_html/
    )'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://python.langchain.com/v0.2/docs/how_to/document_loader_html/](https://python.langchain.com/v0.2/docs/how_to/document_loader_html/
    )'
- en: 'The next file type we will talk about is the other type we have been working
    with already, PDF:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来要讨论的下一个文件类型是我们已经一直在使用的另一种类型，即PDF：
- en: '[PRE5]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Here, we have a slightly more streamlined version of the code we have used previously
    to extract the data from the PDF. Using this new approach shows you an alternative
    way to access this data, but either will work for you in your code, ultimately
    loading up the docs with the data pulled from the PDF using `PdfReader` from `PyPDF2`.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们有一个比之前使用的从PDF中提取数据的代码略为精简的版本。使用这种新的方法向您展示了一种访问这些数据的替代方式，但无论哪种方式，在您的代码中都可以工作，最终使用`PyPDF2`的`PdfReader`从PDF中提取数据来加载文档。
- en: 'It should be noted that there are numerous and very capable ways of loading
    PDF documents into LangChain, which is supported by many integrations with popular
    tools for PDF extraction. Here are a few: `PyPDF2` (what we use here), `PyPDF`,
    `PyMuPDF`, `MathPix`, `Unstructured`, `AzureAIDocumentIntelligenceLoader`, and
    `UpstageLayoutAnalysisLoader`.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 应该指出的是，将PDF文档加载到LangChain中有许多众多且功能强大的方法，这得益于与许多流行PDF提取工具的集成。以下是一些方法：`PyPDF2`（我们在这里使用），`PyPDF`，`PyMuPDF`，`MathPix`，`Unstructured`，`AzureAIDocumentIntelligenceLoader`，和`UpstageLayoutAnalysisLoader`。
- en: 'We recommend you look at the latest list of PDF document loaders. LangChain
    provides a helpful set of tutorials for many of them here:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们建议您查看最新的PDF文档加载器列表。LangChain为其中许多提供了有用的教程，您可以在这里找到：
- en: '[https://python.langchain.com/v0.2/docs/how_to/document_loader_pdf/](https://python.langchain.com/v0.2/docs/how_to/document_loader_pdf/
    )'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://python.langchain.com/v0.2/docs/how_to/document_loader_pdf/](https://python.langchain.com/v0.2/docs/how_to/document_loader_pdf/
    )'
- en: 'Next, we will load the data from a Microsoft Word document:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将从Microsoft Word文档中加载数据：
- en: '[PRE6]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'This code uses the `Docx2txtLoader` document loader from LangChain to turn
    the Word document we previously generated into text and load it up into our `docs`
    variable that can be later used by the splitter. Again, stepping through the rest
    of the code will work with this data, just as it did with the HTML or PDF documents.
    There are many options for loading Word documents as well, which you can find
    listed here: [https://python.langchain.com/v0.2/docs/integrations/document_loaders/microsoft_word/](https://python.langchain.com/v0.2/docs/integrations/document_loaders/microsoft_word/
    )'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码使用了LangChain的`Docx2txtLoader`文档加载器，将我们之前生成的Word文档转换为文本，并将其加载到我们的`docs`变量中，这个变量可以供分词器稍后使用。再次强调，遍历其余的代码将使用这些数据，就像它处理HTML或PDF文档一样。加载Word文档也有许多选项，您可以在以下列表中找到：[https://python.langchain.com/v0.2/docs/integrations/document_loaders/microsoft_word/](https://python.langchain.com/v0.2/docs/integrations/document_loaders/microsoft_word/
    )
- en: 'Lastly, we see a similar approach with the JSON loader:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们看到与JSON加载器类似的方法：
- en: '[PRE7]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Here, we use a JSON loader to load data that was stored in a JSON object format,
    but the results are the same: a `docs` variable that can be passed to the splitter
    and converted into the format we use throughout the remaining code. Other options
    for JSON loaders can be found here:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们使用JSON加载器来加载存储在JSON对象格式中的数据，但结果是一样的：一个`docs`变量，可以传递给分词器并转换为我们在剩余代码中使用的格式。其他JSON加载器的选项可以在以下位置找到：
- en: '[https://python.langchain.com/v0.2/docs/how_to/document_loader_json/](https://python.langchain.com/v0.2/docs/how_to/document_loader_json/
    )'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://python.langchain.com/v0.2/docs/how_to/document_loader_json/](https://python.langchain.com/v0.2/docs/how_to/document_loader_json/
    )'
- en: 'Note that some document loaders add additional metadata to the metadata dictionary
    within the `Document` objects that are generated during this process. This causes
    some issues with our code when we add our own metadata. To fix this, we update
    these lines when we index and create the vector store:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，一些文档加载器会在生成`Document`对象的过程中向元数据字典中添加额外的元数据。当我们添加自己的元数据时，这会导致我们的代码出现一些问题。为了解决这个问题，我们在索引和创建向量存储时更新这些行：
- en: '[PRE8]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'We also update the code in the final output to test the response, changing
    the second line in this code to handle the changed metadata tag:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还更新了最终输出中的代码以测试响应，将此代码的第二行更改为处理更改后的元数据标签：
- en: '[PRE9]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Run each loader and then run the remaining code to see each document in action!
    There are numerous more integrations with third parties, allowing you to access
    just about any data source you can imagine and format that data in a way that
    you can better utilize LangChain’s other components. Take a look at more examples
    here on the LangChain website: [https://python.langchain.com/docs/modules/data_connection/document_loaders/](https://python.langchain.com/docs/modules/data_connection/document_loaders/
    )'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 运行每个加载器，然后运行剩余的代码，以查看每个文档的实际效果！有大量的第三方集成，允许您访问几乎任何可以想象的数据源，并以一种您可以更好地利用LangChain其他组件的方式格式化数据。请在此处查看LangChain网站上的更多示例：[https://python.langchain.com/docs/modules/data_connection/document_loaders/](https://python.langchain.com/docs/modules/data_connection/document_loaders/
    )
- en: Document loaders play a supporting and very important role in your RAG application.
    But for RAG-specific applications that typically utilize *chunks* of your data,
    document loaders are not nearly as useful until you pass them through a text splitter.
    Next, we will review text splitters and how each one can be used to improve your
    RAG application.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 文档加载器在您的RAG应用中扮演着支持和非常重要的角色。但对于通常利用数据**块**的RAG特定应用来说，直到您将它们通过文本分割器处理，文档加载器几乎没有什么用处。接下来，我们将回顾文本分割器以及如何使用每个分割器来改进您的RAG应用。
- en: Code lab 11.2 – text splitters
  id: totrans-53
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室11.2 – 文本分割器
- en: The file you need to access from the GitHub repository is titled `CHAPTER11-2_TEXT_SPLITTERS.ipynb`.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要从GitHub仓库访问的文件标题为`CHAPTER11-2_TEXT_SPLITTERS.ipynb`。
- en: Text splitters split a document into chunks that can be used for retrieval.
    Larger documents pose a threat to many parts of our RAG application, and the splitter
    is our first line of defense. If you were able to vectorize a very large document,
    the larger the document, the more context representation you will lose in the
    vector embedding. But this assumes you can even vectorize a very large document,
    which you often can’t! Most embedding models have relatively small limits on the
    size of documents we can pass to them compared to the large documents many of
    us work with. For example, the context length for the OpenAI model we are using
    to generate our embeddings is 8,191 tokens. If we try to pass a document larger
    than that to the model, it will generate an error. These are the main reasons
    splitters exist, but these are not the only complexities introduced with this
    step in the process.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 文本分割器将文档分割成可用于检索的**块**。较大的文档对我们的RAG应用中的许多部分构成了威胁，分割器是我们的第一道防线。如果您能够将一个非常大的文档矢量化，那么文档越大，在向量嵌入中丢失的上下文表示就越多。但这假设您甚至能够将一个非常大的文档矢量化，而这通常是不可能的！与许多人都处理的大文档相比，大多数嵌入模型对我们可以向其传递的文档大小有相对较小的限制。例如，我们用于生成嵌入的OpenAI模型的上下文长度为8,191个标记。如果我们尝试向模型传递比这更大的文档，它将生成一个错误。这些是分割器存在的主要原因，但这些都是在此过程步骤中引入的复杂性的主要原因之一。
- en: 'The key element of text splitters for us to consider is how they split the
    text. Let’s say you have 100 paragraphs that you want to split up. In some cases,
    there may be two or three that are semantically meant to be together, such as
    the paragraphs in this section. In some cases, you may have a section title, a
    URL, or some other type of text. Ideally, you want to keep the semantically related
    pieces of text together, but this can be much more complex than it first seems!
    For a real-world example of this, go to this website and copy a large set of text:
    [https://chunkviz.up.railway.app/](https://chunkviz.up.railway.app/).'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要考虑文本分割器的关键元素是它们如何分割文本。假设您有100个段落想要分割。在某些情况下，可能有两三个段落在语义上应该放在一起，例如本节中的段落。在某些情况下，您可能有一个章节标题、一个URL或某种其他类型的文本。理想情况下，您希望将语义相关的文本片段放在一起，但这可能比最初看起来要复杂得多！为了一个现实世界的例子，请访问此网站并复制一大段文本：[https://chunkviz.up.railway.app/](https://chunkviz.up.railway.app/)。
- en: 'ChunkViz is a utility created by Greg Kamradt that helps you visualize how
    your text splitter is working. Change the parameters for the splitters to use
    what we are using: a chunk size of 1,000 and a chunk overlap of 200\. Try the
    character splitter compared to the recursive character text splitter. Note that
    with the example they provide, shown in *Figure 11.1*, the recursive character
    splitter captures all of the paragraphs separately at around a 434 chunk size:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: ChunkViz是由Greg Kamradt创建的一个实用工具，它可以帮助您可视化您的文本分割器是如何工作的。更改分割器的参数以使用我们正在使用的设置：块大小为1,000，块重叠为200。尝试与递归字符文本分割器相比的字符分割器。请注意，根据他们提供的示例，如*图11.1*所示，递归字符分割器在约434块大小的情况下分别捕获了所有段落：
- en: '![Figure 11.1 – Recursive character text splitter captures whole paragraphs
    at 434 characters](img/B34736_11_1.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图11.1 – 递归字符文本拆分器在434个字符处捕获整个段落](img/B34736_11_1.png)'
- en: Figure 11.1 – Recursive character text splitter captures whole paragraphs at
    434 characters
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.1 – 递归字符文本拆分器在434个字符处捕获整个段落
- en: As you increase the chunk size, it stays on the paragraph splits well, but eventually
    gets more and more paragraphs per chunk. Note, though, that this is going to be
    different for different texts. If you have text with very long paragraphs, you
    will need a larger chunk setting to capture whole paragraphs.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 随着块大小的增加，它很好地保持在段落拆分上，但最终每个块中会有越来越多的段落。请注意，但这将因文本而异。如果您有非常长的段落的文本，您将需要一个更大的块设置来捕获整个段落。
- en: 'Meanwhile, if you try the character splitter, it will cut off in the middle
    of a sentence on any setting:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，如果您尝试字符拆分器，它将在任何设置下在句子中间截断：
- en: '![Figure 11.2 – Character splitter captures partial paragraphs at 434 characters](img/B34736_11_2.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图11.2 – 字符拆分器在434个字符处捕获部分段落](img/B34736_11_2.png)'
- en: Figure 11.2 – Character splitter captures partial paragraphs at 434 characters
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.2 – 字符拆分器在434个字符处捕获部分段落
- en: This split of a sentence could have a significant impact on the ability of your
    chunks to capture all of the important semantic meanings of the text within them.
    You can offset this by changing the chunk overlap, but you still have partial
    paragraphs, which will equate to noise to your LLM, distracting it from providing
    the optimal response.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 句子的这种拆分可能会对您块捕捉其中所有重要语义意义的能力产生重大影响。您可以通过改变块重叠来抵消这一点，但您仍然会有部分段落，这将对您的LLM产生噪音，分散其提供最佳响应的注意力。
- en: Let’s step through actual coding examples of each to -understand some of the
    options available.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过实际的编码示例逐步了解每个选项，以了解一些可用的选项。
- en: Character text splitter
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 字符文本拆分器
- en: This is the simplest approach to splitting your document. A text splitter enables
    you to divide your text into arbitrary N-character-sized chunks. You can improve
    this slightly by adding a separator parameter, such as `\n`. But this is a great
    place to start to understand how chunking works, and then we can move on to more
    approaches that work better but have added complexity to them.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这是拆分文档的最简单方法。文本拆分器允许您将文本分成任意N字符大小的块。您可以通过添加一个分隔符参数（如`\n`）来略微改进这一点。但这是一个了解块分割如何工作的绝佳起点，然后我们可以继续探讨更有效但复杂性增加的方法。
- en: 'Here is code that uses the `CharacterTextSplitter` object with our documents
    that can be used interchangeably with the other splitter outputs:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是使用`CharacterTextSplitter`对象与我们的文档的代码示例，这些代码可以与其他拆分器输出互换使用：
- en: '[PRE10]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The output from the first split (`split[0]`) looks like this:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次拆分的输出（`split[0]`）看起来像这样：
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: There are a lot of `\n` (also called newline) markup characters, and some `\u`
    as well. We see that it counts out around 1,000 characters, finds the `\n` character
    nearest to that, and that becomes the first chunk. It is right in the middle of
    a sentence, which could be problematic!
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多`\n`（也称为换行符）标记字符，还有一些`\u`。我们看到它计数大约1,000个字符，找到最近的`\n`字符，这就在句子的中间，可能会出现问题！
- en: 'The next chunk looks like this:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个块看起来像这样：
- en: '[PRE12]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: As you can see here, it backtracked a little, which is due to the chunk overlap
    we set of 200 characters. It then goes forward another 1,000 characters from there
    and breaks on another `\n` character.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，它稍微回溯了一点，这是由于我们设置的200个字符的块重叠。然后它从那里再向前1,000个字符，并在另一个`\n`字符处断开。
- en: 'Let’s step through the parameters for this:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐步了解这些参数：
- en: '**Separators**: Depending on the separator you use, you may get a wide variety
    of results. For this, we used `\n`, and it works for this document. But if you
    use `\n\n` (the double-newline character) for your separator on this particular
    document, where there are no double-newline characters, it never splits! `\n\n`
    is actually the default, so make sure you keep an eye on this and use a separator
    that will work with your content!'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分隔符**：根据您使用的分隔符，您可能会得到各种各样的结果。对于这个，我们使用了`\n`，并且它适用于这份文档。但如果您在这个特定文档中使用`\n\n`（双换行符）作为分隔符，而该文档中没有双换行符，它永远不会拆分！`\n\n`实际上是默认设置，所以请确保您注意这一点，并使用与您内容兼容的分隔符！'
- en: '**Chunk size**: This defines the arbitrary number of characters you are aiming
    for with your chunk size. This may still vary, such as at the end of the text,
    but for the most part, the chunks will be consistently this size.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**块大小**：这定义了你希望通过块大小达到的任意字符数。这仍然可能有所变化，例如在文本的末尾，但大部分情况下，块的大小将保持一致。'
- en: '**Chunk overlap**: This is the number of characters you would like overlapping
    in your sequential chunks. This is a simple way to make sure you are capturing
    all of the context within your chunks. For example, if you had no chunk overlap
    and cut a sentence in half, the majority of that context would likely not be captured
    in either chunk very well. But with overlap, you can get better coverage of this
    context on the edges.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**块重叠**：这是你希望在顺序块中重叠的字符数。这是一种简单的方法来确保你捕捉到了块内的所有上下文。例如，如果你没有块重叠并且将句子切半，那么大部分上下文可能都不会很好地被两个块捕捉到。但是有了重叠，你可以更好地覆盖这个上下文的边缘。'
- en: '**Is separator regex**: This is yet another parameter that indicates whether
    the separator used is in regex format.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分隔符正则表达式**：这是另一个参数，表示所使用的分隔符是否为正则表达式格式。'
- en: In this case, we are setting the chunk size to 1,000 and the chunk overlap to
    200\. What we are saying here with this code is that we want it to use chunks
    that are smaller than 1,000 characters, but with a 200-character overlap. This
    overlapping technique is similar to the sliding window technique you see in **convolutional
    neural networks** (**CNNs**) when you are *sliding* the window over smaller parts
    of the image with overlap, so that you capture the context between the different
    windows. In this case, it is the context within the chunks that we are trying
    to capture.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们将块大小设置为 1,000，块重叠设置为 200。通过这段代码，我们想要的是使用小于 1,000 个字符的块，但具有 200 个字符的重叠。这种重叠技术类似于你在**卷积神经网络**（**CNNs**）中看到的滑动窗口技术，当你将窗口滑动到图像的较小部分上并重叠时，以便捕捉不同窗口之间的上下文。在这种情况下，我们试图捕捉的是块内的上下文。
- en: 'Here are some other things to note:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有一些其他需要注意的事项：
- en: '**Document objects**: We are using the LangChain `Document` object to store
    our text, so we use the `create_documents` function that allows it to work in
    the next step when these documents are vectorized. If you want to obtain the string
    content directly, you can use the `split_text` function.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档对象**：我们使用 LangChain 的 `Document` 对象来存储我们的文本，因此我们使用允许它在下一步中工作的 `create_documents`
    函数。如果你想要直接获取字符串内容，可以使用 `split_text` 函数。'
- en: '**create_documents expects a list**: `create_documents` expects a list of texts,
    so if you just have a string, you’ll need to wrap it in `[]`. In our case, we
    have already set `docs` as a list, so this requirement is satisfied.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`create_documents` 期望一个列表**：`create_documents` 期望一个文本列表，所以如果你只有一个字符串，你需要将其包裹在`[]`中。在我们的例子中，我们已经将`docs`设置为一个列表，因此满足了这个要求。'
- en: '**Splitting versus chunking**: These terms can be used interchangeably.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分割与块化**：这两个术语可以互换使用。'
- en: 'You can find more information about this specific text splitter on the LangChain
    website: [https://python.langchain.com/v0.2/docs/how_to/character_text_splitter/](https://python.langchain.com/v0.2/docs/how_to/character_text_splitter/).'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在 LangChain 网站上找到有关此特定文本分割器的更多信息：[https://python.langchain.com/v0.2/docs/how_to/character_text_splitter/](https://python.langchain.com/v0.2/docs/how_to/character_text_splitter/).
- en: 'The API documentation can be found here: [https://api.python.langchain.com/en/latest/character/langchain_text_splitters.character.CharacterTextSplitter.html](https://api.python.langchain.com/en/latest/character/langchain_text_splitters.character.CharacterTextSplitter.html).'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: API 文档可以在以下位置找到：[https://api.python.langchain.com/en/latest/character/langchain_text_splitters.character.CharacterTextSplitter.html](https://api.python.langchain.com/en/latest/character/langchain_text_splitters.character.CharacterTextSplitter.html).
- en: We can do better than this, though; let’s take a look at a more sophisticated
    approach, called **recursive character** **text splitting**.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，我们还能做得更好；让我们看看一种更复杂的方法，称为**递归字符文本分割**。
- en: Recursive character text splitter
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 递归字符文本分割器
- en: We have seen this one before! We have used this splitter the most in our code
    labs so far because it is what LangChain recommends using when splitting generic
    text. That is what we are doing!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前见过这个！到目前为止，我们在代码实验室中使用的这个分割器最多，因为它正是 LangChain 推荐在分割通用文本时使用的。这正是我们所做的！
- en: As the name states, this splitter recursively splits text, with the intention
    of keeping related pieces of text next to each other. You can pass a list of characters
    as a parameter and it will try to split those characters in order until the chunks
    are small enough. The default list is `["\n\n", "\n", " ", ""]`, which works well,
    but we are going to add `". "` to this list as well. This has the effect of trying
    to keep all paragraphs together, sentences defined by both `"\n"` and `". "`,
    and words as long as possible.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 正如其名所示，这个分割器递归地分割文本，目的是将相关的文本片段放在一起。你可以传递一个字符列表作为参数，并且它将按顺序尝试分割这些字符，直到块足够小。默认列表是`["\n\n",
    "\n", " ", ""]`，这效果很好，但我们还将`". "`添加到这个列表中。这会尝试将所有段落保持在一起，句子由`"\n"`和`". "`定义，并且尽可能长地保持单词。
- en: 'Here is our code:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们的代码：
- en: '[PRE13]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Under the hood with this splitter, the chunks are split based on the `"\n\n"`
    separator, representing paragraph splits. But it doesn’t stop there; it will look
    at the chunk size, and if it is larger than the 1,000 we set, then it will split
    by the next separator (`"\n"`), and so on.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个分割器的底层，块是根据`"\n\n"`分隔符分割的，表示段落分割。但它不会止于此；它将查看块大小，如果它大于我们设置的1,000，那么它将根据下一个分隔符（`"\n"`）进行分割，依此类推。
- en: 'Let’s talk about the recursive aspect of this that splits the text into chunks
    using a recursive algorithm. The algorithm will only be applied if the text provided
    is longer than the chunk size, but it follows these steps:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们谈谈这个递归方面，它使用递归算法将文本分割成块。只有当提供的文本长度超过块大小时，才会应用此算法，但它遵循以下步骤：
- en: It finds a suitable split boundary at or before `chunk_size` (i.e., within [`0`,
    `chunk_size`]) based on the available separators. After emitting a chunk, it begins
    the next chunk `chunk_overlap` characters earlier (target overlap), so adjacent
    chunks share context.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它根据可用的分隔符在或之前`chunk_size`（即，在`[0, chunk_size]`范围内）找到一个合适的分割边界。在发出一个块之后，它从`chunk_overlap`个字符之前开始下一个块（目标重叠），因此相邻的块共享上下文。
- en: 'If a suitable split point is found, it splits the text into two parts: the
    chunk before the split point and the remaining text after the split point.'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果找到一个合适的分割点，它将文本分割成两部分：分割点之前的块和分割点之后剩余的文本。
- en: It recursively applies the same splitting process to the remaining text until
    all chunks are within the `chunk_size` limit.
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它递归地应用相同的分割过程到剩余的文本上，直到所有块都在`chunk_size`限制内。
- en: Similar to the character splitter approach, the recursive splitter is driven
    largely by the chunk size you set, but then it combines this with the recursive
    approach outlined previously to provide a straightforward and logical way to properly
    capture context within your chunks.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 与字符分割器方法类似，递归分割器主要受你设置的块大小驱动，但它将此与之前概述的递归方法结合起来，以提供一种简单且逻辑的方法来正确地捕获块内的上下文。
- en: '`RecursiveCharacterTextSplitter` is particularly useful when dealing with large
    text documents that need to be processed by language models with input size limitations.
    By splitting the text into smaller chunks, you can feed the chunks to the language
    model individually and then combine the results if needed.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '`RecursiveCharacterTextSplitter`在处理需要由具有输入大小限制的语言模型处理的较大文本文档时特别有用。通过将文本分割成较小的块，你可以单独将块喂给语言模型，如果需要，然后合并结果。'
- en: Clearly, recursive splitters are a step up from the character splitter, but
    they are still not splitting our content based on the semantics as much as just
    general separators such as paragraph and sentence breaks. But this will not handle
    cases where two paragraphs are semantically part of one ongoing thought that should
    really be captured together in their vector representations.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，递归分割器比字符分割器更进了一步，但它们仍然没有像基于语义的段落和句子分隔符那样根据语义来分割我们的内容。然而，这并不能处理两个段落在语义上属于一个持续思考的情况，这些段落实际上应该一起在它们的向量表示中被捕获。
- en: This code lab is set up so that you can use each type of splitter. Run through
    each splitter and then the rest of the code to see how each one impacts your results.
    Also, try changing parameter settings such as `chunk_size` and `chunk_overlap`
    to better understand how they affect your chunks.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这个代码实验室设置得可以让你使用每种类型的分割器。运行每个分割器，然后运行其余的代码，看看每种分割器如何影响你的结果。此外，尝试更改参数设置，如`chunk_size`和`chunk_overlap`，以更好地理解它们如何影响你的块。
- en: Code lab 11.3 – output parsers
  id: totrans-103
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室 11.3 – 输出解析器
- en: The file you need to access from the GitHub repository is titled `CHAPTER11-3_OUTPUT_PARSERS.ipynb`.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要从GitHub仓库访问的文件标题为`CHAPTER11-3_OUTPUT_PARSERS.ipynb`。
- en: The end result of any RAG application is going to be text, along with potentially
    some formatting, metadata, and some other related data. This output typically
    comes from the LLM itself. But there are times when you want to get a more structured
    format than just text. Output parsers are classes that help to structure the responses
    of the LLM wherever you use it in your RAG application. The output that this provides
    will then be provided to the next step in the chain, or, in the case of all of
    our code labs, as the final output from the model.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 任何 RAG 应用程序的结果都将是文本，可能还有一些格式、元数据和一些其他相关数据。这种输出通常来自 LLM 本身。但有时你希望得到比文本更结构化的格式。输出解析器是帮助在
    RAG 应用程序中结构化 LLM 响应的类。它提供的输出将被传递到链中的下一步，或者在我们的所有代码实验室中，作为模型的最终输出。
- en: We will cover two different output parsers at the same time, and use them at
    different times in our RAG pipeline. We will start with the parser we know, the
    string output parser.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将同时介绍两种不同的输出解析器，并在我们的 RAG 管道中的不同时间使用它们。我们将从我们已知的解析器开始，即字符串输出解析器。
- en: 'Under the `relevance_prompt` function, add this code to a new cell:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `relevance_prompt` 函数下，将以下代码添加到一个新的单元中：
- en: '[PRE14]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Note that we were already using this in the LangChain chain code that appears
    later, but we are going to assign this parser to a variable called `str_output_parser`.
    Let’s talk about this type of parser in more depth.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们之前已经在 LangChain 的链代码中使用过这个解析器，但我们将把这个解析器分配给一个名为 `str_output_parser` 的变量。让我们更深入地讨论一下这种解析器。
- en: String output parser
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 字符串输出解析器
- en: 'This is a basic output parser. In very simple approaches, as in our previous
    code labs, you can use the `StrOutputParser` class outright as the instance for
    your output parser. Or you can do what we just did and assign it to a variable,
    particularly if you expect to see it in multiple areas of the code, which we will.
    But we have seen this many times already. It takes the output from the LLM in
    both places it is used and outputs the string response from the LLM to the next
    link in the chain. The documentation for this parser can be found here: [https://api.python.langchain.com/en/latest/output_parsers/langchain_core.output_parsers.string.StrOutputParser.html#langchain_core.output_parsers.string.StrOutputParser](https://api.python.langchain.com/en/latest/output_parsers/langchain_core.output_parsers.string.StrOutputParser.html#langchain_core.output_parsers.string.StrOutputParser).'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个基本的输出解析器。在非常简单的方法中，就像我们之前的代码实验室一样，你可以直接使用 `StrOutputParser` 类作为输出解析器的实例。或者，你可以像我们刚才做的那样，将其分配给一个变量，特别是如果你预计会在代码的多个区域看到它，我们将会这样做。但我们已经看到这种情况很多次了。它从
    LLM 的两个使用位置获取输出，并将 LLM 的字符串响应输出到链中的下一个链接。有关此解析器的文档可以在这里找到：[https://api.python.langchain.com/en/latest/output_parsers/langchain_core.output_parsers.string.StrOutputParser.html#langchain_core.output_parsers.string.StrOutputParser](https://api.python.langchain.com/en/latest/output_parsers/langchain_core.output_parsers.string.StrOutputParser.html#langchain_core.output_parsers.string.StrOutputParser)。
- en: Let’s look at a new type of parser, the JSON output parser.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一种新的解析器类型，即 JSON 输出解析器。
- en: JSON output parser
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: JSON 输出解析器
- en: As you can imagine, this output parser takes input from an LLM and outputs it
    as JSON. It is important to note that you may not need this parser, as many newer
    model providers support built-in ways to return structured output such as JSON
    and XML. This approach is for those that do not.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所想，这个输出解析器从 LLM 获取输入并将其输出为 JSON。需要注意的是，你可能不需要这个解析器，因为许多新的模型提供商支持内置的返回结构化输出（如
    JSON 和 XML）的方式。这种方法是为那些不需要这些功能的人准备的。
- en: 'We start with some new imports, coming from a library we have already installed
    from LangChain (`langchain_core`):'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开始引入一些新的导入，这些导入来自我们已安装的 LangChain 库（`langchain_core`）：
- en: '[PRE15]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: These lines import the necessary classes and modules from the `langchain_core`
    library and the `json` module. `JsonOutputParser` is used to parse the JSON output.
    `BaseModel` and `Field` are used to define the structure of the JSON output model.
    `Generation` is used to represent the generated output. And not surprisingly,
    we import a package for `json`, so that we can better manage our JSON inputs/outputs.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这些行从 `langchain_core` 库和 `json` 模块导入了必要的类和模块。`JsonOutputParser` 用于解析 JSON 输出。`BaseModel`
    和 `Field` 用于定义 JSON 输出模型的结构。`Generation` 用于表示生成的输出。不出所料，我们导入了 `json` 包，以便更好地管理我们的
    JSON 输入/输出。
- en: 'Next, we will create a `Pydantic` model called `FinalOutputModel` that represents
    the structure of the JSON output:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将创建一个名为 `FinalOutputModel` 的 `Pydantic` 模型，它表示 JSON 输出的结构：
- en: '[PRE16]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'It has two fields: `relevance_score` (float) and `answer` (string), along with
    their descriptions. In a *real-world* application, this model is likely to get
    substantially more complex, but this gives you a general idea of how it can be
    defined.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 它有两个字段：`relevance_score`（浮点数）和 `answer`（字符串），以及它们的描述。在 *实际应用* 中，这个模型可能会变得更加复杂，但这也为你提供了一个如何定义它的基本概念。
- en: 'Next, we will create an instance of the `JsonOutputParser` parser:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将创建 `JsonOutputParser` 解析器的实例：
- en: '[PRE17]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: This line assigns `JsonOutputParser` with the `FinalOutputModel` class as a
    parameter to `json_parser` for use later in our code when we want to use this
    parser.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这行代码将 `FinalOutputModel` 类作为参数分配给 `json_parser`，以便在代码中稍后使用此解析器时使用。
- en: 'Next, we are going to add a new function right in between our two other helper
    functions, and then we will update `conditional_answer` to use that new function.
    This code goes under the existing `extract_score` function, which remains the
    same:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将在两个其他辅助函数之间添加一个新函数，然后我们将更新 `conditional_answer` 以使用该新函数。此代码位于现有的 `extract_score`
    函数之下，该函数保持不变：
- en: '[PRE18]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'This `format_json_output` function takes a dictionary, `x`, as input and formats
    it into a JSON output. It creates a `json_output` dictionary with two keys: `"``relevance_score"`
    (obtained by calling `extract_score` on the `''relevance_score''` value from `x`)
    and `"answer"` (directly taken from `x`). It then uses `json.dumps` to convert
    the `json_output` dictionary to a JSON string and creates a `Generation` object
    with the JSON string as its text. Finally, it uses `json_parser` to parse the
    `Generation` object and returns the parsed result.'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 `format_json_output` 函数接收一个字典 `x` 作为输入，并将其格式化为 JSON 输出。它创建一个 `json_output`
    字典，包含两个键：`"relevance_score"`（通过在 `x` 的 `'relevance_score'` 值上调用 `extract_score`
    获取）和 `"answer"`（直接从 `x` 中获取）。然后它使用 `json.dumps` 将 `json_output` 字典转换为 JSON 字符串，并创建一个包含该
    JSON 字符串的 `Generation` 对象。最后，它使用 `json_parser` 解析 `Generation` 对象并返回解析结果。
- en: 'We will need to reference this function in the function we were previously
    using, `conditional_answer`. Update `conditional_answer` like this:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要在之前使用的函数 `conditional_answer` 中引用此函数。按照以下方式更新 `conditional_answer`：
- en: '[PRE19]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Here, we update the `conditional_answer` function to apply that `format_json_output`
    function if it determines that the answer is relevant, and before it provides
    the returned output.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们更新 `conditional_answer` 函数，如果它确定答案相关，则应用 `format_json_output` 函数，并在提供返回的输出之前。
- en: 'Next, we are going to take the two chains we had before in our code and combine
    them into one larger chain handling the entire pipeline. In the past, it was helpful
    to show this separately to give more focus to certain areas, but now we have a
    chance to clean up and show how these chains can be grouped together to handle
    our entire logic flow:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将把代码中之前的两个链合并成一个更大的链，处理整个流程。在过去，将这部分单独展示有助于更专注于某些区域，但现在我们有了一个机会来清理并展示这些链如何组合在一起来处理我们的整个逻辑流程：
- en: '[PRE20]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: If you look back at previous code labs, this was represented by two chains.
    Note that this is using `str_output_parser` in the same way it was before. You
    do not see the JSON parser here because it is applied in the `format_json_output`
    function, which is called from the `conditional_answer` function, which you see
    in the last line. This simplification of these chains works for this example,
    focused on parsing our output into JSON, but we should note that we do lose the
    context that we have used in previous code labs. This is really just an example
    of an alternative approach to setting up our chain(s).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你回顾之前的代码实验室，这部分是通过两个链来表示的。请注意，这里使用 `str_output_parser` 的方式与之前相同。你在这里看不到 JSON
    解析器，因为它在 `format_json_output` 函数中应用，该函数是从 `conditional_answer` 函数中调用的，你可以在最后一行看到它。这种简化这些链的方法适用于这个示例，专注于将输出解析为
    JSON，但我们应注意的是，我们确实失去了之前代码实验室中使用的上下文。这实际上只是一个设置我们的链（s）的替代方法的示例。
- en: 'Lastly, because our final output is in JSON format, which we needed to add
    the context to, we need to update our *test run* code:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，因为我们的最终输出是 JSON 格式，我们需要添加上下文，所以我们需要更新我们的 *测试运行* 代码：
- en: '[PRE21]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'When we print this out, we see a similar result as in the past, but we show
    how the JSON-formatted final output looks:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们打印出来时，我们看到的结果与过去相似，但我们展示了 JSON 格式的最终输出看起来如何：
- en: '[PRE22]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: This is a simple example of a JSON output, but you can build off this and shape
    the JSON to anything you need using the `FinalOutputModel` class we defined and
    passed into our output parser.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单的 JSON 输出示例，但你可以在此基础上构建并使用我们定义并传递给输出解析器的 `FinalOutputModel` 类来调整 JSON
    格式以满足你的需求。
- en: 'You can find more information about the JSON parser here: [https://python.langchain.com/v0.2/docs/how_to/output_parser_json/](https://python.langchain.com/v0.2/docs/how_to/output_parser_json/).'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在此处找到有关JSON解析器的更多信息：[https://python.langchain.com/v0.2/docs/how_to/output_parser_json/](https://python.langchain.com/v0.2/docs/how_to/output_parser_json/)。
- en: It is important to note that it is difficult to rely on LLMs to output in a
    certain format. A more robust system would incorporate the parser deeper into
    the system, where it will likely be able to better utilize the JSON output, but
    it will also entail more checks to make sure the formatting is as required for
    the next step to work off properly formatted JSON. In our code here, we implemented
    a very lightweight layer for JSON formatting to show how the output parser could
    fit into our RAG application in a very simple way.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，很难依赖LLM以特定格式输出。一个更健壮的系统会将解析器更深入地集成到系统中，它可能会更好地利用JSON输出，但这也意味着需要进行更多检查，以确保格式符合下一步操作对正确格式JSON的要求。在我们的代码中，我们实现了一个非常轻量级的JSON格式化层，以展示输出解析器如何以非常简单的方式集成到我们的RAG应用中。
- en: Summary
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we learned about various components of LangChain that can enhance
    a RAG application. *Code lab 11.1* focused on document loaders, which are used
    to load and process documents from various sources such as text files, PDFs, web
    pages, or databases. The chapter covered examples of loading documents from HTML,
    PDF, Microsoft Word, and JSON formats using different LangChain document loaders,
    noting that some document loaders add metadata, which may require adjustments
    in the code.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们学习了LangChain的各种组件，这些组件可以增强RAG应用。*代码实验室11.1*专注于文档加载器，用于从各种来源（如文本文件、PDF、网页或数据库）加载和处理文档。本章涵盖了使用不同的LangChain文档加载器从HTML、PDF、Microsoft
    Word和JSON格式加载文档的示例，并指出某些文档加载器会添加元数据，这可能在代码中需要进行调整。
- en: '*Code lab 11.2* discussed text splitters, which divide documents into chunks
    suitable for retrieval, addressing issues with large documents and context representation
    in vector embeddings. The chapter covered `CharacterTextSplitter`, which splits
    text into arbitrary N-character-sized chunks, and `RecursiveCharacterTextSplitter`,
    which recursively splits text while trying to keep related pieces together. Lastly,
    *Code lab 11.3* focused on output parsers, which structure the responses from
    the language model in a RAG application. The chapter covered the string output
    parser, which outputs the LLM’s response as a string, and the JSON output parser,
    which formats the output as JSON using a defined structure. An example was provided
    to show how the JSON output parser can be integrated into the RAG application.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '*代码实验室11.2*讨论了文本分割器，它将文档分割成适合检索的块，解决了大型文档和向量嵌入中的上下文表示问题。本章涵盖了`CharacterTextSplitter`，它将文本分割成任意N字符大小的块，以及`RecursiveCharacterTextSplitter`，它递归地分割文本，同时尝试将相关部分保持在一起。最后，*代码实验室11.3*专注于输出解析器，它以结构化的方式组织RAG应用中的语言模型响应。本章涵盖了字符串输出解析器，它将LLM的响应作为字符串输出，以及JSON输出解析器，它使用定义的结构将输出格式化为JSON。提供了一个示例，展示了如何将JSON输出解析器集成到RAG应用中。'
- en: In the next chapter, we will cover a relatively advanced but very powerful topic,
    LangGraph and AI agents.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将介绍一个相对高级但非常强大的主题，即LangGraph和AI代理。
