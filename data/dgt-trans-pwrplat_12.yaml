    Know Your Third Party (KY3P), MARS-E (US), MAS + ABS (Singapore), MPA, NBB + FSMA
    (Belgium), NEN-7510 (Netherlands), NERC, OSFI (Canada), PCI-3DS, PCI-DSS, RBI
    + IRDAI (India), SEC 17a-4, SEC 18a-6, FINRA 4511, & CFTC 1.31, SEC Regulation
    SCI (US), Shared Assessments, SOX, TISAX |'
  id: totrans-82
  prefs: []
  type: TYPE_TB
  zh: '| 行业 | 23 NYCRR Part 500，AFM + DNB (荷兰), APRA (澳大利亚), AMF 和 ACPR (法国), CDSA，DPP
    (英国), EBA (欧盟), FACT (英国), FCA + PRA (英国), FDA CFR 第 21 卷第 11 部分，FERPA，FFIEC (美国),
    FINMA (瑞士), FISC (日本), FSA (丹麦), GLBA (美国), GSMA，GxP，HDS (法国), HIPAA / HITECH，HITRUST，KNF
    (波兰), 了解第三方 (KY3P)，MARS-E (美国)，MAS + ABS (新加坡)，MPA，NBB + FSMA (比利时)，NEN-7510 (荷兰)，NERC，OSFI
    (加拿大)，PCI-3DS，PCI-DSS，RBI + IRDAI (印度)，SEC 17a-4，SEC 18a-6，FINRA 4511，& CFTC 1.31，SEC
    规则 SCI (美国)，共享评估，SOX，TISAX |'
- en: '| Regional | ABS OSPAR (Singapore), BIR 2012 (Netherlands), C5 (Germany), Canadian
