  id: totrans-81
  prefs: []
  type: TYPE_TB
  zh: '| 美国政府 | CJIS，CNSSI 1253，DFARS，DoD IL2，DoD IL5，DoE 10 CFR Part 810，EAR，FedRAMP，FIPS
    140-2，IRS 1075，ITAR，NIST 800-171，NIST CSF，第 508 条 VPATS |'
- en: '| Industry | 23 NYCRR Part 500, AFM + DNB (Netherlands), APRA (Australia),
    AMF and ACPR (France), CDSA, DPP (UK), EBA (EU), FACT (UK), FCA + PRA (UK), FDA
