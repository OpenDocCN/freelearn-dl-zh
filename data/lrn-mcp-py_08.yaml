- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Consuming Servers
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 消费服务器
- en: So far, we have looked at how to create servers, but also at consuming them
    via bespoke clients that you have to write yourself. In this section, we will
    look at how to consume servers using existing software, such as **Visual Studio
    Code** (**VS Code**) or **Claude Desktop**. When we say *consume*, what we mean
    is installing servers, configuring them, and then using them to run tools or interact
    with the server in some way.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探讨了如何创建服务器，但也通过您必须自己编写的定制客户端来消费它们。在本节中，我们将探讨如何使用现有软件，如**Visual Studio
    Code**（**VS Code**）或**Claude Desktop**来消费服务器。当我们说“消费”时，我们的意思是指安装服务器、配置它们，然后使用它们来运行工具或以某种方式与服务器交互。
- en: 'In this chapter, you will learn how to do the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将学习以下内容：
- en: Understand how to consume servers using existing tools
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解如何使用现有工具消费服务器
- en: Install and configure servers in VS Code
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在VS Code中安装和配置服务器
- en: Work with the `mcp.json` file for server management
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`mcp.json`文件进行服务器管理
- en: Manage secrets and configuration for servers
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理服务器机密和配置
- en: Use VS Code to test and interact with servers
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用VS Code测试和与服务器交互
- en: Apply security best practices when consuming servers
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在消费服务器时应用安全最佳实践
- en: 'The chapter covers the following topics:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: Consuming with hosts such as Claude Desktop and VS Code
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Claude Desktop和VS Code等主机消费
- en: Installation process
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装过程
- en: Adding a server
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加服务器
- en: Local and global install
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本地与全局安装
- en: Tips and tricks
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小贴士和技巧
- en: Security aspects
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安全方面
- en: Suggestion for servers
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务器建议
- en: Consuming with hosts such as Claude Desktop and VS Code
  id: totrans-18
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Claude Desktop和VS Code等主机消费
- en: Consuming servers, okay, what does that mean? So to use an MCP server and its
    features, you need a way to interact with it. You’ve seen in [*Chapter 7*](Chapter_7.xhtml#_idTextAnchor209)
    how to create a server and how to write a client that can interact with it. That’s
    a perfectly valid way to consume a server, but it requires you to write code.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 消费服务器，好吧，这意味着什么？所以为了使用MCP服务器及其功能，您需要一种与之交互的方式。您在[*第7章*](Chapter_7.xhtml#_idTextAnchor209)中看到了如何创建服务器以及如何编写可以与之交互的客户端。这是一个完全有效的方式来消费服务器，但您需要编写代码。
- en: Another approach is to use existing software such as Claude Desktop or VS Code.
    These tools are designed to work with MCP servers, and they also provide a large
    language model that ensures that you can interact with the server in a more user-friendly
    way via prompts.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是使用现有的软件，如Claude Desktop或VS Code。这些工具旨在与MCP服务器协同工作，并且它们还提供了一个大型语言模型，确保您可以通过提示以更用户友好的方式与服务器交互。
- en: We think of these two pieces of software as hosts, as they have a built-in MCP
    client, but they also use configuration files to keep track of the servers that
    are installed, the tools that are available, and so on.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将这些两款软件视为主机，因为它们内置了MCP客户端，但它们也使用配置文件来跟踪已安装的服务器、可用的工具等等。
- en: 'How do they work? Well, they work in the following way:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是如何工作的？好吧，它们是这样工作的：
- en: Initiate a connection to the MCP server through a selected transport type, such
    as STDIO, SSE, or Streamable HTTP
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过选定的传输类型，如STDIO、SSE或Streamable HTTP，启动与MCP服务器的连接
- en: Provide a user interface to interact with the server and let you type prompts,
    interact with tools, configuration, and more
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供一个用户界面与服务器交互，并允许您输入提示、与工具、配置等进行交互
- en: Use configuration files to keep track of installed servers, available tools,
    and other settings
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用配置文件跟踪已安装的服务器、可用的工具和其他设置
- en: 'Here’s an example of the user interface in VS Code, which is representative
    of how these hosts work:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的例子是VS Code的用户界面，它代表了这些主机的工作方式：
- en: '![Figure 8.1 – VS Code interface](img/B34121_08_1.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图8.1 – VS Code界面](img/B34121_08_1.png)'
- en: Figure 8.1 – VS Code interface
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1 – VS Code界面
- en: 'In the preceding figure, you can see the following:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的图中，您可以看到以下内容：
- en: A list of tools currently available via servers that are installed
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出通过已安装的服务器当前可用的工具
- en: A chat interface where you can type prompts
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个可以输入提示的聊天界面
- en: Let’s talk about specific hosts next and their features.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们讨论特定的主机及其功能。
- en: MCP support in VS Code
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: VS Code中的MCP支持
- en: VS Code, together with GitHub Copilot, has extensive support for MCP servers.
    There are a variety of features that help you to install, configure, and secure
    servers. It supports use cases such as trying out servers you are building, as
    well as turning VS Code into an agentic app that can run tools through your prompts.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: VS Code与GitHub Copilot一起，为MCP服务器提供了广泛的支持。有许多功能可以帮助您安装、配置和确保服务器的安全性。它支持使用案例，例如尝试您正在构建的服务器，以及将VS
    Code变成一个可以通过您的提示运行工具的代理应用程序。
- en: 'Here’s a list of features that VS Code provides for MCP servers:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是VS Code为MCP服务器提供的一些功能列表：
- en: '**Installing servers**: VS Code lets you install servers both on a global level
    and on a workspace level. It supports the three transport types: STDIO, SSE, and
    Streamable HTTP.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安装服务器**：VS Code允许您在全局级别和工作区级别安装服务器。它支持三种传输类型：STDIO、SSE和可流式HTTP。'
- en: '**Managing tools**: You can enable and disable tools for a server, which is
    useful to ensure that the client has the context it needs.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理工具**：您可以为服务器启用和禁用工具，这对于确保客户端拥有所需的上下文非常有用。'
- en: '**Interacting with features**: In addition to tools, it also supports features
    such as user prompts and resources.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与功能交互**：除了工具之外，它还支持用户提示和资源等功能。'
- en: '**Managing servers**: You can add and remove servers and configure them.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理服务器**：您可以添加和删除服务器并对其进行配置。'
- en: '**Sampling**: It supports sampling, which means that when a server sends a
    sample request, you can interact with it and tweak the request before sending
    back a response.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**采样**：它支持采样，这意味着当服务器发送样本请求时，您可以在发送响应之前与之交互并调整请求。'
- en: '**Elicitations**: It also supports elicitation requests, which are scenarios
    when the server needs more information from the user to proceed with a request.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**引申请求**：它还支持引申请求，这是服务器需要从用户那里获取更多信息以继续请求的场景。'
- en: '**Logging and debugging**: There’s also support for logging and debugging,
    which is useful when you are developing servers or clients.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日志记录和调试**：它还支持日志记录和调试，这在开发服务器或客户端时非常有用。'
- en: Additional features are being made available all the time, and you’re recommended
    to use **VS Code Insiders** if you want to try these features as early as possible,
    as they’re shipped there first.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 正在不断地提供额外的功能，如果您想尽早尝试这些功能，建议您使用**VS Code Insiders**，因为这些功能首先在那里发布。
- en: Claude Desktop
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 克劳德桌面版
- en: You can also use Claude Desktop to consume MCP servers. Head over to the download
    page ([https://claude.ai/download](https://claude.ai/download)) to install a client
    for your operating system. Just like VS Code, it provides a user interface and
    a whole set of features to interact with MCP servers.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以使用克劳德桌面版来使用MCP服务器。前往下载页面（[https://claude.ai/download](https://claude.ai/download)）以安装适用于您操作系统的客户端。就像VS
    Code一样，它提供了一个用户界面和一系列功能，用于与MCP服务器交互。
- en: "Claude does a lot more than just work with MCP servers; it’s a fully-fledged\
    \ AI assistant and is perhaps best compared with similar products such as ChatGPT\
    \ or Copilot. For a full set of features, head over to this page: [https://claude.ai/login?returnTo=%2F%3F#features](https://claude.ai/login?returnTo=%2F%3F#fe\uFEFF\
    atures)."
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 克劳德（Claude）的功能远不止与MCP服务器（MCP servers）协作；它是一个功能齐全的AI助手，或许可以与类似的产品如ChatGPT或Copilot相媲美。要查看完整的功能列表，请访问此页面：[https://claude.ai/login?returnTo=%2F%3F#features](https://claude.ai/login?returnTo=%2F%3F#features)。
- en: Installation process
  id: totrans-47
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 安装过程
- en: 'To install servers, there’s a central concept for both Claude and VS Code,
    namely, the `mcp.json` file. This file is your main configuration file where you
    add information on where the servers are and additional configuration needed.
    In fact, this JSON file acts like a manifest file for what servers are installed.
    The act of installing a file means adding an entry to this file. Here’s an example
    of an `mcp.json` file:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对于克劳德和VS Code来说，安装服务器有一个中心概念，即`mcp.json`文件。这是您的主要配置文件，您在其中添加有关服务器位置和所需额外配置的信息。实际上，这个JSON文件就像一个清单文件，列出了已安装的服务器。安装文件的行为是将条目添加到该文件中。以下是一个`mcp.json`文件的示例：
- en: '[PRE0]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](img/3.png) **Quick tip**: Enhance your coding experience with the **AI
    Code Explainer** and **Quick Copy** features. Open this book in the next-gen Packt
    Reader. Click the **Copy** button'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/3.png) **快速提示**：使用**AI代码解释器**和**快速复制**功能来增强您的编码体验。在下一代Packt Reader中打开此书。点击**复制**按钮'
- en: (**1**) to quickly copy code into your coding environment, or click the **Explain**
    button
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: （**1**）快速将代码复制到您的编码环境，或点击**解释**按钮
- en: (**2**) to get the AI assistant to explain a block of code to you.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: （**2**）让AI助手为您解释代码块。
- en: '![A white background with a black text  AI-generated content may be incorrect.](img/image_%282%29.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景，黑色文字的 AI 生成内容可能不正确。](img/image_%282%29.png)'
- en: '![](img/2.png) **The next-gen Packt Reader** is included for free with the
    purchase of this book. Scan the QR code OR go to [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/2.png) **下一代 Packt Reader** 随本书免费赠送。扫描二维码 OR 访问 [https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock1.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码 AI 生成内容可能不正确。](img/Unlock1.png)'
- en: In this file, we have a `servers` attribute with one server entry to [https://learn.microsoft.com/api/mcp](https://learn.microsoft.com/api/mcp);
    this MCP server is now considered installed.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在此文件中，我们有一个 `servers` 属性，包含一个指向 [https://learn.microsoft.com/api/mcp](https://learn.microsoft.com/api/mcp)
    的服务器条目；现在这个 MCP 服务器被认为是已安装的。
- en: 'The full installation process for installing and running a feature on a server
    looks like so:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在服务器上安装和运行功能的完整安装过程看起来是这样的：
- en: Install a server by adding an entry `mcp.json` file in the `servers` attribute.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在 `servers` 属性中添加 `mcp.json` 文件条目来安装服务器。
- en: Start the server.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动服务器。
- en: Use the server by typing a prompt matching a tool in the server.
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过输入与服务器中工具匹配的提示来使用服务器。
- en: We’ll explore such a scenario later in this chapter, but now you have a mile-high
    understanding of it. Let’s go into more depth on the `mcp.json` file.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本章后面探讨这样一个场景，但现在你对它已经有了高屋建瓴的理解。让我们更深入地探讨 `mcp.json` 文件。
- en: The mcp.json file
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '`mcp.json` 文件'
- en: 'The `mcp.json` file has two primary attributes:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '`mcp.json` 文件有两个主要属性：'
- en: '`inputs`: This is used for defining placeholders for sensitive information,
    such as API keys or tokens. The idea is that you define that you want an input
    prompt to appear, and the answer should be stored in a variable that you can later
    refer to. Here’s an example of this:'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`inputs`：这用于定义敏感信息的占位符，例如 API 密钥或令牌。想法是定义你想要一个输入提示出现，并且答案应该被存储在一个你可以稍后引用的变量中。以下是一个例子：'
- en: '[PRE1]'
  id: totrans-65
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'By the preceding definition, the user interface in VS Code will start an input
    prompt asking you to fill in this information. This then needs to be paired with
    a server entry, like so:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 根据前面的定义，VS Code 中的用户界面将启动一个输入提示，要求您填写此信息。然后需要与服务器条目配对，如下所示：
- en: '[PRE2]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Note how `my_api_key` is now passed in as a header property so that every time
    we call `"http://localhost:8000/mcp"`, it will also pass the API key, ensuring
    that we can access our MCP server securely. Setting things up this way ensures
    that secrets stay out of `mcp.json`.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 注意 `my_api_key` 现在作为头属性传递，这样每次我们调用 `"http://localhost:8000/mcp"` 时，它也会传递 API
    密钥，确保我们可以安全地访问我们的 MCP 服务器。以这种方式设置确保秘密不会出现在 `mcp.json` 中。
- en: '`servers`: This property takes a JSON object with server entries. What you
    need to know is that these entries look different depending on which transport
    is being used by the server. Let’s show examples for each transport type:'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`servers`：此属性接受一个包含服务器条目的 JSON 对象。你需要知道的是，这些条目根据服务器使用的传输方式而有所不同。让我们为每种传输类型展示一些例子：'
- en: '**Using Streamable HTTP**:'
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用可流式 HTTP**：'
- en: '[PRE3]'
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In this case, it’s using Streamable HTTP; we can see that as the `type` value
    is `http` and a `url` value is specified. Let’s look at SSE next.
  id: totrans-72
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这种情况下，它使用可流式 HTTP；我们可以看到，因为 `type` 值是 `http`，并且指定了 `url` 值。让我们看看 SSE。
- en: '**SSE**:'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SSE**：'
- en: '[PRE4]'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: SSE, just like Streamable HTTP, is a transport meant for servers that are accessed
    remotely. Therefore, a `url` value is used in both cases to point out where these
    servers live.
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: SSE，就像可流式 HTTP 一样，是一种用于远程访问服务器的传输方式。因此，在这两种情况下都使用 `url` 值来指出这些服务器所在的位置。
- en: '**STDIO**:'
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**STDIO**：'
- en: '[PRE5]'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**STDIO**, or **standard I/O**, needs to specify a `command` and `args` property
    as it needs to point out how to start the server in question. It’s not needed
    for SSE or Streamable HTTP, as these servers live remotely.'
  id: totrans-78
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**STDIO**，或**标准 I/O**，需要指定一个 `command` 和 `args` 属性，因为它需要指出如何启动所讨论的服务器。对于 SSE
    或可流式 HTTP，则不需要，因为这些服务器位于远程。'
- en: Adding a server
  id: totrans-79
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 添加服务器
- en: 'You’ve already seen in the previous section how various servers can be added,
    but let’s go through the motions of adding and using a server. Let’s use **Playwright**,
    an **end-to-end** (**E2E**) testing framework, as an example. To install it as
    an MCP server, what you usually do for any server is to locate its GitHub repo
    and see what its installation instructions are. For Playwright, its repository
    is here: [https://github.com/microsoft/playwright-mcp](https://github.com/microsoft/playwright-mcp).'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你在上一节中已经看到如何添加各种服务器，但让我们来实际操作一下添加和使用服务器。让我们以**Playwright**，一个**端到端**（**E2E**）测试框架为例。要将它作为MCP服务器安装，你通常需要找到它的GitHub仓库并查看其安装说明。对于Playwright，其仓库在这里：[https://github.com/microsoft/playwright-mcp](https://github.com/microsoft/playwright-mcp)。
- en: 'There are quite a lot of instructions as this server offers a lot of features,
    but let’s grab the installation instructions from its *Getting started* section,
    which looks like so:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 由于该服务器提供了许多功能，所以有很多说明，但让我们从其*入门*部分获取安装说明，它看起来如下：
- en: '[PRE6]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Here, we see how it’s clearly a STDIO type server as its `command` and `args`
    properties are populated.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们看到它显然是一个STDIO类型的服务器，因为其`command`和`args`属性已被填充。
- en: 'Step 1: Installing the server'
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤1：安装服务器
- en: 'Let’s install this via VS Code. By doing so, we have a couple of different
    options on how to install it:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过VS Code来安装它。这样做，我们就有几种不同的安装方式：
- en: Add the entry directly to an `mcp.json` file.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接将条目添加到`mcp.json`文件中。
- en: 'Use a user interface, either with the **Add Server** button that’s present
    when you view the `mcp.json` file or by running the `MCP: Add Server` command
    from the command palette. In both cases, it will trigger a user interface asking
    you to decide on what transport to use, and either `url` or `command` and `args`
    information, depending on the chosen transport.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '使用用户界面，无论是通过查看`mcp.json`文件时出现的**添加服务器**按钮，还是通过从命令面板运行`MCP: 添加服务器`命令，都可以触发用户界面，让你决定使用哪种传输方式，以及根据选择的传输方式提供`url`或`command`和`args`信息。'
- en: 'As an example, let’s click **Add Server**; you should be presented with the
    following interface:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们点击**添加服务器**；你应该会看到一个以下界面：
- en: '![Figure 8.2 – Installing the server](img/B34121_08_2.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图8.2 – 安装服务器](img/B34121_08_2.png)'
- en: Figure 8.2 – Installing the server
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 – 安装服务器
- en: 'As you can see, there are numerous options for installing a server: different
    transports, some also from different package managers, and even Docker.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，安装服务器有无数种选项：不同的传输方式，一些也来自不同的包管理器，甚至Docker。
- en: In fact, if you choose the **Browse MCP Servers…** option, it will take you
    to a list of vetted MCP servers ([https://code.visualstudio.com/insider/mcp](https://code.visualstudio.com/insider/mcp))
    and let you choose a server from there.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，如果你选择**浏览MCP服务器…**选项，它将带你去一个经过审查的MCP服务器列表([https://code.visualstudio.com/insider/mcp](https://code.visualstudio.com/insider/mcp))，并允许你从中选择一个服务器。
- en: 'We have the complete instructions for working with Playwright from its GitHub
    repo, but let’s install from this list of servers by selecting to install it like
    so, clicking **Install Playwright**:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从其GitHub仓库获取与Playwright相关的完整说明，但让我们通过选择安装它来从服务器列表中安装，如下所示，点击**安装Playwright**：
- en: '![Figure 8.3 – Install Playwright](img/B34121_08_3.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图8.3 – 安装Playwright](img/B34121_08_3.png)'
- en: Figure 8.3 – Install Playwright
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3 – 安装Playwright
- en: Now, you should see a dialog opening in your VS Code giving you more information
    on the server, along with installation instructions. We had previously located
    the installation information by going to its GitHub repo, but this is also a great
    way to do it.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你应该在VS Code中看到一个对话框打开，它提供了有关服务器的更多信息，以及安装说明。我们之前通过访问其GitHub仓库找到了安装信息，但这也是一种很好的方法。
- en: Okay, so it seems the answer is to either manually copy-paste what you need
    in `mcp.json` or use one of the many options in VS Code.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，所以答案似乎是手动复制粘贴`mcp.json`中你需要的内容，或者使用VS Code中的许多选项之一。
- en: 'Step 2: Managing the server'
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤2：管理服务器
- en: 'Now, you’ve added the server, so your `mcp.json` looks similar to the following
    JSON (note how Playwright is added):'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经添加了服务器，所以你的`mcp.json`看起来类似于以下JSON（注意Playwright是如何被添加的）：
- en: '[PRE7]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'It’s now time to see how the user interface supports us. One thing we can do
    is select **Extensions**; we should see our list of installed servers like so:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候看看用户界面如何支持我们了。我们可以做的一件事是选择**扩展**；我们应该看到我们的已安装服务器列表如下：
- en: '![Figure 8.4 – Installed servers](img/B34121_08_4.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图8.4 – 已安装的服务器](img/B34121_08_4.png)'
- en: Figure 8.4 – Installed servers
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4 – 已安装的服务器
- en: 'From this view, we can click the cog wheel on a server to interact with it:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个视图，我们可以点击服务器上的齿轮图标来与之交互：
- en: '![Figure 8.5 – Interacting with the server](img/B34121_08_5.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.5 – 与服务器交互](img/B34121_08_5.png)'
- en: Figure 8.5 – Interacting with the server
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.5 – 与服务器交互
- en: As you can see, there are multiple options, from starting the server to seeing
    its logs, and even JSON configuration. You can take these actions from within
    the `mcp.json` file as well.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，有多个选项，从启动服务器到查看其日志，甚至 JSON 配置。您也可以从 `mcp.json` 文件中执行这些操作。
- en: 'Step 3: Interacting with the server'
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 3 步：与服务器交互
- en: 'Let’s start the server, and now let’s turn to the chat interface we have from
    installing GitHub Copilot. Make sure the agent is selected in the droplist and
    then type the following prompt:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们启动服务器，现在让我们转向从安装 GitHub Copilot 获得的聊天界面。确保代理已在下拉列表中选中，然后输入以下提示：
- en: '[PRE8]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Sometimes, VS Code is a bit unwilling to use a tool, so it’s worth spending
    some time on the prompt to ensure it does use it. I’ve added `important use playwright
    tool` to ensure the tool is triggered.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，VS Code 可能不太愿意使用工具，因此花些时间在提示上确保它确实使用了它。我已经添加了 `important use playwright tool`
    来确保工具被触发。
- en: 'You should see the following in the chat interface:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该在聊天界面中看到以下内容：
- en: '![Figure 8.6 – Using the tool](img/B34121_08_6.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.6 – 使用工具](img/B34121_08_6.png)'
- en: Figure 8.6 – Using the tool
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.6 – 使用工具
- en: This shows a tool being triggered, and you being asked to allow the tool to
    run as part of this. You can see how the URL is parsed out from your prompt and
    matched as the input to the Playwright tool. This should trigger a whole series
    of tool calls as Playwright will go through the website, locate the input field,
    and try to complete the mission set out by the prompt.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这显示了工具被触发，并要求您允许该工具作为此部分运行。您可以看到如何从您的提示中解析出 URL 并将其匹配为 Playwright 工具的输入。这将触发一系列工具调用，因为
    Playwright 将遍历网站，定位输入字段，并尝试完成提示中设定的任务。
- en: 'You might need to restart the chat sometimes, but once it works as it should,
    you should see something like the following figure, indicating that Playwright
    has started to navigate the site properly and is trying to get you from Paddington
    to Heathrow:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能需要有时重新启动聊天，但一旦它按预期工作，您应该会看到以下类似图示，表明 Playwright 已正确开始导航网站，并试图将您从 Paddington
    带到 Heathrow：
- en: '![Figure 8.7 – Playwright query](img/B34121_08_7.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.7 – Playwright 查询](img/B34121_08_7.png)'
- en: Figure 8.7 – Playwright query
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.7 – Playwright 查询
- en: Once it’s done, you can interact with it in various ways to get what you need
    and even ask it to generate the Playwright tests from this interaction, which
    is where the real value lies.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦完成，您可以通过各种方式与之交互以获取所需内容，甚至可以要求它从这个交互中生成 Playwright 测试，这正是其真正价值所在。
- en: Local and global install
  id: totrans-120
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本地与全局安装
- en: 'So far, we’ve installed servers in `.vscode/mcp.json`, which means they are
    installed into this workspace only. You can install servers globally on your machine
    as well. To choose that instead, let’s use `MCP: Add Server` from the command
    palette. At the last step, choose **Global**, and it will create an `mcp.json`
    file in `(Settings)/User/mcp/json`, which means it has added the server entry
    to the user setting rather than this specific workspace instance. That means that
    if you open up another instance of VS Code, you will not need to install this
    server again.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '到目前为止，我们已在 `.vscode/mcp.json` 中安装了服务器，这意味着它们只安装在这个工作区中。您也可以在您的机器上全局安装服务器。要选择全局安装，请从命令面板中选择
    `MCP: Add Server`。在最后一步，选择 **Global**，它将在 `(Settings)/User/mcp/json` 中创建一个 `mcp.json`
    文件，这意味着它已将服务器条目添加到用户设置而不是这个特定的工作区实例。这意味着如果您打开 VS Code 的另一个实例，您将不需要再次安装此服务器。'
- en: 'Here’s what the user-level `mcp.json` file looks like after a server has been
    globally installed:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这是服务器全局安装后用户级 `mcp.json` 文件的外观：
- en: '[PRE9]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: As you can see, there’s no difference in how it’s installed in the actual `mcp.json`
    file, but the difference is in where the `mcp.json` file is located. The general
    rule of thumb is, if it’s a server you use often, install it globally; if not,
    install it in the workspace at `.vscode/mcp.json`.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，它在实际的 `mcp.json` 文件中的安装方式没有区别，但区别在于 `mcp.json` 文件的位置。一般规则是，如果您经常使用服务器，则全局安装它；如果不经常使用，则在工作区中的
    `.vscode/mcp.json` 中安装。
- en: Tips and tricks
  id: totrans-125
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 小贴士和技巧
- en: "So far, we’ve gone through the basics, but what else is there to know? Well,\
    \ there are quite a few different settings. A complete listing of features can\
    \ be found at this docs page: [https://code.visualstudio.com/docs/copilot/chat/mcp-servers](https://code.visualstudio.com/docs/copilot/ch\uFEFF\
    at/mcp-servers)."
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: "到目前为止，我们已经了解了基础知识，但还有其他什么需要了解的吗？嗯，还有很多不同的设置。完整的特性列表可以在以下文档页面找到：[https://code.visualstudio.com/docs/copilot/chat/mcp-servers](https://code.visualstudio.com/docs/copilot/ch\uFEFF\
    at/mcp-servers)。"
- en: Debugging
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调试
- en: 'As a developer, knowing how to debug is a critical skill, so let’s show how
    to do that. Currently, Node.js debugging is supported, according to the documentation
    ([https://code.visualstudio.com/docs/copilot/customization/mcp-servers#_debug-an-mcp-server](https://code.visualstudio.com/docs/copilot/customization/mcp-servers#_debug-an-mcp-server)):'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名开发者，了解如何调试是一项关键技能，所以让我们来看看如何做到这一点。根据文档，目前支持 Node.js 调试（[https://code.visualstudio.com/docs/copilot/customization/mcp-servers#_debug-an-mcp-server](https://code.visualstudio.com/docs/copilot/customization/mcp-servers#_debug-an-mcp-server)）：
- en: '[PRE10]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'According to the preceding configuration, what you need to do is this:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 根据前面的配置，您需要做的是以下这些：
- en: Set up your `command` and `args` properties to instruct how to run the server.
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置您的 `command` 和 `args` 属性以指导如何运行服务器。
- en: 'Add `dev` with two different attributes: `watch`, which is a **global pattern**
    (**GLOB**) that looks at your JavaScript files for changes, and `debug`, which
    is where you specify which process is debugging it. In this case, it’s Node. Once
    it’s set up and the server is running, there should be a gray **debug** text just
    above. Make sure you’ve added a breakpoint in suitable places, such as starting
    the server, running a tool, and so on. Here’s how you can test different scenarios:'
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加具有两个不同属性的 `dev`：`watch`，这是一个 **全局模式**（**GLOB**），用于检查您的 JavaScript 文件是否有更改，以及
    `debug`，您在这里指定哪个进程正在调试它。在这种情况下，是 Node。一旦设置好并且服务器正在运行，应该会在上方有一个灰色的 **debug** 文本。请确保您已在合适的位置添加了断点，例如启动服务器、运行工具等。以下是您如何测试不同场景的方法：
- en: '**Testing startup**: Here, we’ve just added a breakpoint to our startup code,
    and all we need to do is start the server from `mcp.json`. You should see how
    the breakpoint is hit, like so:![Figure 8.8 – Breakpoint startup](img/B34121_08_8.png)'
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测试启动**：在这里，我们已经在启动代码中添加了一个断点，我们只需要从 `mcp.json` 启动服务器。您应该看到断点是如何被触发的，如下所示：![图
    8.8 – 断点启动](img/B34121_08_8.png)'
- en: Figure 8.8 – Breakpoint startup
  id: totrans-134
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 8.8 – 断点启动
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)
    **Quick tip**: Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI 生成的内容可能不正确。](img/1.png) **快速提示**：需要查看此图像的高分辨率版本吗？在下一代 Packt
    Reader 中打开此书或在其 PDF/ePub 复印本中查看。'
- en: '![](img/21.png) **The next-gen Packt Reader** and a **free PDF/ePub copy**
    of this book are included with your purchase. Scan the QR code OR visit [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/21.png) **新一代 Packt Reader** 以及本书的 **免费 PDF/ePub 复印本** 包含在您的购买中。扫描二维码或访问
    [https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![](img/Unlock1.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Unlock1.png)'
- en: '**Testing tools**: A good way to test the tools is to run the inspector in
    CLI mode. Here’s a command for testing a tool, `add`, with input parameters, `a`
    and `b`. Adopt this command to match the operations and parameters on your server:'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测试工具**：测试工具的一个好方法是运行 CLI 模式下的检查器。以下是一个测试具有输入参数 `a` 和 `b` 的工具 `add` 的命令。将此命令应用于匹配您服务器上的操作和参数：'
- en: '[PRE11]'
  id: totrans-139
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'You should see a response directly in the terminal that looks similar to the
    following:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该在终端中直接看到类似以下内容的响应：
- en: '[PRE12]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Troubleshooting
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故障排除
- en: Sometimes, you will see an error indication on the *tools* icon in the chat
    area. If that happens, open the **Output** section in your terminal area, and
    you will see what the problem is. This area is a good place to inspect generally,
    as you will see every interaction between VS Code and your server, such as when
    it starts up and stops servers, but also when it initializes, lists tools, and
    more.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，您会在聊天区域的 **工具** 图标上看到错误指示。如果发生这种情况，打开终端区域的 **输出** 部分，您将看到问题所在。这个区域是一个很好的检查地方，因为您将看到
    VS Code 和您的服务器之间的每一次交互，例如当它启动和停止服务器时，以及当它初始化、列出工具等。
- en: 'When we ran the debugger and it connected to the server, we got all this information
    written to **Output**:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们运行调试器并将其连接到服务器时，我们得到了以下信息写入**输出**：
- en: '[PRE13]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Let’s highlight some interesting parts from the preceding response:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从前面的响应中突出一些有趣的点：
- en: '**Editor handshakes with server**: Here, the editor sends information to the
    server on what features/capabilities it supports. It says to the server that it
    supports `roots`, `sampling`, and `elicitation`:'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编辑器与服务器握手**：在这里，编辑器向服务器发送关于它支持哪些功能/能力的信息。它告诉服务器它支持`roots`、`sampling`和`elicitation`：'
- en: '[PRE14]'
  id: totrans-148
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**Server responds to editor handshake**: Here, the response comes back to say
    that tools are supported:'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器响应编辑器握手**：在这里，响应返回表示工具是受支持的：'
- en: '[PRE15]'
  id: totrans-150
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Server sends initialized notification**: The last step in the handshake is
    sending the `initialized` notification. This is something the client sends to
    the server to say it’s ready to exchange data. In this case, our client is VS
    Code:'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器发送初始化通知**：握手过程中的最后一步是发送`initialized`通知。这是客户端发送给服务器以表明它已准备好交换数据的事情。在这种情况下，我们的客户端是
    VS Code：'
- en: '[PRE16]'
  id: totrans-152
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '**Tell me about your tools**: Now the client asks the server for its tools:'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**告诉我你的工具**：现在客户端请求服务器提供其工具：'
- en: '[PRE17]'
  id: totrans-154
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**Server responds to tools request**: Lastly, the server responds to a request
    to list its tools with the following:'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器响应工具请求**：最后，服务器响应请求列出其工具，如下所示：'
- en: '[PRE18]'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Tool management
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具管理
- en: 'Tool management is an important aspect of using VS Code. There are some interesting
    scenarios around tools where your editor helps:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 工具管理是使用 VS Code 的重要方面。在工具方面有一些有趣的场景，你的编辑器会提供帮助：
- en: '**Selecting and deselecting tools**: When you add servers, it might add a lot
    of tools at once. For both scenarios, where you use your editor as an agentic
    tool and also where you want to ensure the correct tool is called, you can choose
    which tools are active. You can make this selection by clicking the *tools* icon
    in the chat, which will bring up a user interface of all tools. Select/deselect
    the tools you want to have active or inactivate.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择和取消选择工具**：当你添加服务器时，可能会一次性添加很多工具。在两种情况下，无论是使用你的编辑器作为代理工具，还是确保调用正确的工具，你都可以选择哪些工具是激活的。你可以通过点击聊天中的*工具*图标来做出选择，这将显示所有工具的用户界面。选择/取消选择你想要激活或停用的工具。'
- en: '**Run a specific tool**: Generally, when you want to run tools, you try to
    type a prompt that matches a specific tool’s description as much as possible.
    If you want to make sure that the correct tool is chosen, you can prefix it with
    `#`, which will identify that specific tool. For example, to run a tool called
    `add`, you can craft a prompt like so:'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行特定工具**：通常，当你想要运行工具时，你会尝试输入一个尽可能匹配特定工具描述的提示。如果你想确保选择了正确的工具，你可以在前面加上`#`，这将标识该特定工具。例如，要运行名为`add`的工具，你可以构建一个这样的提示：'
- en: '[PRE19]'
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '**Managing the number of tools**: Some models have limitations on how many
    tools they can accept. To address this, there’s a setting called `github.copilot.chat.virtualTools.enabled`,
    which will analyze the prompt and only submit the tools that match the prompt.
    This is a great way to avoid any errors as a result of using too many prompts.
    Make sure you’re on the latest version of VS Code Insider. This feature is in
    active development and may change over time.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理工具数量**：一些模型对它们可以接受多少工具有限制。为了解决这个问题，有一个名为`github.copilot.chat.virtualTools.enabled`的设置，它将分析提示并仅提交与提示匹配的工具。这是一个避免使用过多提示导致任何错误的好方法。确保你使用的是最新版本的
    VS Code Insider。此功能正在积极开发中，可能会随时间而变化。'
- en: '**Handle tool approval**: When VS Code decides it wants to run a tool, it displays
    it as a query asking you to click **Continue**. At this point, you can choose
    to allow it only for this prompt session, for this workspace, or to always allow.
    Here’s how it works:'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理工具批准**：当 VS Code 决定要运行一个工具时，它会显示为一个询问你点击**继续**的查询。在这个时候，你可以选择仅为此提示会话、为此工作区或始终允许。以下是工作原理：'
- en: 'Type the following prompt:'
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入以下提示：
- en: '[PRE20]'
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: This makes VS Code ask you to click **Continue**. Now, select from the dropdown
    to allow for this workspace. Let’s run it again.
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这会使 VS Code 要求你点击**继续**。现在，从下拉菜单中选择以允许此工作区。让我们再次运行它。
- en: 'Type the following prompt:'
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入以下提示：
- en: '[PRE21]'
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'This ran the tool without asking for my consent, as I had previously given
    it permission to run in this workspace. To undo this consent, I can run `Chat:
    Reset Tool Confirmations` from the command palette.'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '这在没有征求我同意的情况下运行了工具，因为我之前已经授予它在工作区中运行的权限。要撤销此同意，我可以从命令面板运行`Chat: Reset Tool
    Confirmations`。'
- en: Other settings
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他设置
- en: 'There are a lot of settings being added all the time to both Copilot and VS
    Code. Make sure you’re in VS Code Insiders, type `MCP` in the command palette,
    and you will see many dedicated MCP settings:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 不断有设置被添加到Copilot和VS Code中。确保你处于VS Code Insiders状态，在命令面板中输入`MCP`，你会看到许多专门针对MCP的设置：
- en: '![Figure 8.9 – MCP commands](img/B34121_08_9.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![图8.9 – MCP命令](img/B34121_08_9.png)'
- en: Figure 8.9 – MCP commands
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.9 – MCP命令
- en: As you can see, there are quite a lot of commands available. Try typing `Copilot`
    as well, as it’s used in conjunction with MCP. This is a changing area, though,
    but if you are developing MCP servers, it’s part of your job to leverage your
    editor to the best of your ability.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，有很多可用的命令。也可以尝试输入`Copilot`，因为它与MCP一起使用。这是一个不断变化的部分，但如果你正在开发MCP服务器，那么充分利用你的编辑器就是你的工作之一。
- en: Security aspects
  id: totrans-175
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 安全方面
- en: 'Security is a huge topic, but let’s discuss it in the context of using an editor.
    There are things you can do generally to stay safer, so let’s try to summarize
    a good list of practices:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性是一个巨大的话题，但让我们在编辑器的使用背景下来讨论它。你可以做些一般性的事情来保持更安全，所以让我们尝试总结一份良好的实践清单：
- en: '**Keep secrets out of configuration**: Here’s how you can do that by specifying
    the configuration in the `mcp.json` file:'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将秘密排除在配置之外**：这是如何在`mcp.json`文件中指定配置以做到这一点的示例：'
- en: '[PRE22]'
  id: totrans-178
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: By using the `inputs` element, you can ensure that secrets are kept out of the
    configuration file. How it works is that when the server is started, the user
    interface will prompt you to fill in the value for `my-key`, and it will be stored
    securely. The value can then be referenced in the server entry by using `${input:my-key}`.
    For every request to `https://my-secure-api/mcp`, the `Authorization` header will
    be added with the value you provided.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用`inputs`元素，你可以确保秘密不会出现在配置文件中。其工作原理是，当服务器启动时，用户界面会提示你填写`my-key`的值，并且它会被安全地存储。然后你可以通过`${input:my-key}`在服务器条目中引用这个值。对于对`https://my-secure-api/mcp`的每个请求，都会添加一个包含你提供的值的`Authorization`头。
- en: '**Tool running access**: It’s recommended to disallow continuous access for
    a tool running in a workspace. Prefer giving it access each time it’s asked for.
    It also gives you the chance to check the parsed input.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具运行访问**：建议不允许在工作区中运行的工具持续访问。最好每次请求时都给它访问权限。这也给你检查解析输入的机会。'
- en: '**Restrict what a server can do**: There are ways to restrict what a server
    can access. For example, there’s an MCP server for file access. You should restrict
    it to one folder at most or folders where you’re sure it can’t do any harm.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**限制服务器可以做什么**：有方法可以限制服务器可以访问的内容。例如，有一个用于文件访问的MCP服务器。你应该将其限制在最多一个文件夹或你确信它不会造成任何损害的文件夹中。'
- en: '**Use trusted servers**: GitHub recently released a registry of vetted MCP
    servers. Using the latest version of VS Code Insiders, you can type `@mcp`, and
    it will show a list of MCP servers that you can install. You can access that same
    list by choosing the `MCP: Add Server` command and then selecting **Browse MCP
    Servers**. Your list of servers should look similar to this figure:'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用受信任的服务器**：GitHub最近发布了一个经过审查的MCP服务器注册表。使用VS Code Insiders的最新版本，你可以输入`@mcp`，它会显示一个你可以安装的MCP服务器列表。你也可以通过选择`MCP:
    Add Server`命令然后选择**浏览MCP服务器**来访问相同的列表。你的服务器列表应该看起来与这个图相似：'
- en: '![Figure 8.10 – MCP registry](img/B34121_08_10.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![图8.10 – MCP注册表](img/B34121_08_10.png)'
- en: Figure 8.10 – MCP registry
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.10 – MCP注册表
- en: "In general, make sure the author behind a server is a reputable source (e.g.,\
    \ Stripe is behind the Stripe MCP server, and so on). Even then, resort to code\
    \ scanning tools and keep track of the latest security news; breaches happen all\
    \ the time. The same registry can also be found via this link ([https://code.visualstudio.com/insider/mcp](https://code.visualstudio.com/insider/mcp)),\
    \ but I prefer using the built-in experience in VS Code. Also, check out the GitHub\
    \ repo for servers, as that allows you to read more on each server via their `README`\
    \ files ([https://github.com/modelcontextprotocol/servers](https://github.com/modelcont\uFEFF\
    extprotocol/servers))."
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: "通常，确保服务器背后的作者是可信赖的来源（例如，Stripe是Stripe MCP服务器背后的公司，等等）。即便如此，也要求助于代码扫描工具并关注最新的安全新闻；漏洞总是时有发生。同样的注册表也可以通过这个链接找到（[https://code.visualstudio.com/insider/mcp](https://code.visualstudio.com/insider/mcp)），但我更喜欢使用VS\
    \ Code中的内置体验。还可以查看GitHub上的服务器仓库，因为它允许你通过它们的`README`文件了解更多关于每个服务器的信息（[https://github.com/modelcontextprotocol/servers](https://github.com/modelcont\uFEFF\
    extprotocol/servers)）。"
- en: Suggestion for servers
  id: totrans-186
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 服务器建议
- en: 'So what servers are recommended? Well, it depends on your needs, but I would
    personally use the following:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，推荐哪些服务器？嗯，这取决于您的需求，但我会个人使用以下这些：
- en: '**GitHub** ([https://github.com/github/github-mcp-server](https://github.com/github/github-mcp-server)):
    This server makes my life a lot easier as I can interact with issues, **pull requests**
    (**PRs**), delegate work to agents, and more'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub** ([https://github.com/github/github-mcp-server](https://github.com/github/github-mcp-server)):
    这个服务器使我的生活变得更加轻松，因为我可以与问题、**拉取请求**（**PRs**）、委托工作给代理等交互'
- en: '**Playwright** ([https://github.com/microsoft/playwright-mcp](https://github.com/microsoft/playwright-mcp)):
    This is great for navigating sites, but also generates tests from that navigation,
    thereby saving a lot of time'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Playwright** ([https://github.com/microsoft/playwright-mcp](https://github.com/microsoft/playwright-mcp)):
    这对于导航网站非常棒，还可以从导航中生成测试，从而节省大量时间'
- en: '**Microsoft Learn MCP server** ([https://github.com/microsoftdocs/mcp](https://github.com/microsoftdocs/mcp)):
    This is the official Microsoft Docs and Learn server, which provides documentation
    directly in your editor'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft Learn MCP 服务器** ([https://github.com/microsoftdocs/mcp](https://github.com/microsoftdocs/mcp)):
    这是官方的 Microsoft Docs 和 Learn 服务器，它直接在您的编辑器中提供文档'
- en: There are many more, but start with these and see what fits your scenario.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 还有更多，但先从这些开始，看看哪些适合您的场景。
- en: Summary
  id: totrans-192
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we went through how to consume an MCP server, both the ones
    you create and external ones. Additionally, we discussed how to manage servers
    once installed, their configuration, tool usage, and more.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了如何消费 MCP 服务器，包括您创建的和外部的服务器。此外，我们还讨论了安装后的服务器管理、配置、工具使用等。
- en: Finally, we provided some tips on security practices. This should be seen as
    a bare minimum set of practices, and you should do more.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们提供了一些关于安全实践的建议。这应该被视为一组最基本的做法，您应该做更多。
- en: In the next chapter, we’ll cover sampling, an advanced topic but very useful
    when the server needs to delegate work to you as the user.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将介绍采样，这是一个高级主题，但在服务器需要将工作委托给您作为用户时非常有用。
- en: Assignment
  id: totrans-196
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 作业
- en: "Install a server of your choice, and try it out via a prompt. Try installing\
    \ a server from here: [https://code.visualstudio.com/insider/mcp](https://code.visu\uFEFF\
    alstudio.com/insider/mcp)."
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 安装您选择的任何服务器，并通过提示尝试它。尝试从这里安装服务器：[https://code.visualstudio.com/insider/mcp](https://code.visualstudio.com/insider/mcp)。
- en: Quiz
  id: totrans-198
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 问答
- en: How do you install an MCP server?
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如何安装 MCP 服务器？
- en: 'A: You can install it in the same way you install extensions in VS Code.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 您可以像在 VS Code 中安装扩展一样安装它。'
- en: 'B: You run `mcp install <server name>` in the terminal.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 您在终端中运行 `mcp install <服务器名称>`。'
- en: 'C: Servers are installed by adding text entries to `mcp.json`. You also need
    to specify how to start it or where the server resides.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 服务器通过在 `mcp.json` 中添加文本条目来安装。您还需要指定如何启动它或服务器所在的位置。'
- en: You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter08/solutions/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter08/solutions/solution-quiz.md).
  id: totrans-203
  prefs: []
