  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个定期更新的关于 A 国大额出境转移和B 国入境转移的规则监管智能数据库
- en: The bank's internal, version-controlled policy document repository
  id: totrans-199
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 银行内部、版本控制的政策文档存储库
- en: A real-time sanctions screening API with the recipient's details
  id: totrans-200
