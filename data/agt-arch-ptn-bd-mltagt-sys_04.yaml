  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '**RAG** **s****tep 3 (****g****enerate)**: The LLM processes these retrieved
    facts and generates idx_1460ee3ba detailed, grounded recommendation with a clear
    action plan:'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**RAG** **步骤 3（** **生成** **）**：LLM 处理这些检索到的事实，并生成 idx_1460ee3ba 详细、基于事实的推荐，并包含明确的行动计划：'
- en: '[PRE17]'
  id: totrans-209
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**Outcome**: The agent makes an accurate, highly compliant, and risk-aware
    recommendation. It identifies specific, layered requirements from different sources,
    leading to correct processing and creating an auditable decision trail.'
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结果**：代理生成准确、高度合规且风险意识强的推荐。它从不同来源识别具体的、分层的需求，从而实现正确的处理并创建可审计的决策路径。'
- en: 'The following diagram illustrates the workflow of the RAG-equipped compliance
    agent:'
  id: totrans-211
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下图说明了配备 RAG 的合规代理的工作流程：
- en: '![Image 6](img/B33147_3_6.png)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![Image 6](img/B33147_3_6.png)'
- en: Figure 3.6 – Example workflow leveraging a RAG-enabled agent
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.6 – 利用 RAG 功能的代理示例工作流程
- en: The idx_a2f74e72following table summarizes these differences, highlighting how
    access to live data transforms the agent's role from a simple alert generator
    to a sophisticated compliance partner.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 下表总结了这些差异，突出了访问实时数据如何将代理的角色从简单的警报生成器转变为复杂的合规伙伴。
- en: '| **Key** **a****spect** | **Agent** **w****ithout RAG** | **Agent** **w****ith
    RAG** |'
  id: totrans-215
  prefs: []
  type: TYPE_TB
  zh: '| **关键** **方面** | **无 RAG 的代理** | **有 RAG 的代理** |'
- en: '| --- | --- | --- |'
  id: totrans-216
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Knowledge source | General, outdated knowledge of AML principles | Real-time
    regulatory databases, internal version-controlled policies, and sanction-screening
    APIs |'
  id: totrans-217
  prefs: []
  type: TYPE_TB
  zh: '| 知识来源 | AML 原则的通用、过时知识 | 实时法规数据库、内部版本控制的政策和制裁筛查 API |'
- en: '| Agent''s insight | Cannot apply specific, current rules for the transaction''s
    context | Identifies and cross-references multiple, layered compliance obligations
    from different sources |'
  id: totrans-218
  prefs: []
  type: TYPE_TB
  zh: '| 代理的洞察 | 无法应用针对交易上下文的特定、当前规则 | 识别并交叉引用来自不同来源的多个、分层的合规义务 |'
- en: '| Generated response | Simplistic action (`flag for review`) | A detailed,
    multi-step, and auditable recommendation |'
  id: totrans-219
  prefs: []
  type: TYPE_TB
  zh: '| 生成响应 | 简单行动（`标记为审查`） | 详细、多步骤且可审计的推荐 |'
- en: '| Business outcome | High risk of non-compliance and financial penalties |
    Minimized compliance risk, auditable process, and operational efficiency |'
  id: totrans-220
  prefs: []
  type: TYPE_TB
  zh: '| 业务成果 | 高合规风险和财务罚款 | 最小化合规风险、可审计的过程和操作效率 |'
- en: Table 3.4 – Impact of RAG on a compliance agent
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3.4 – RAG 对合规代理的影响
- en: In the high-stakes domain of financial compliance, the difference made by RAG
    is stark. An agent without idx_9bfdb3cdRAG operates as a blunt instrument, relying
    on generalized knowledge that cannot navigate the intricate and dynamic landscape
    of international regulations and internal policies. This deficit leads to either
    inefficient operations or, far more dangerously, missed compliance obligations
    that attract severe penalties.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 在高风险的金融合规领域，RAG 带来的差异是明显的。没有 idx_9bfdb3cdRAG 的代理像一把钝器一样运作，依赖于通用的知识，无法在国际法规和内部政策的复杂和动态环境中导航。这种缺陷导致操作效率低下，或者更危险的是，遗漏合规义务，从而招致严重的罚款。
- en: The RAG-equipped compliance agent, in contrast, functions as a precise and informed
    gatekeeper. It dynamically consults the latest versions of relevant AML directives,
    specific internal bank policies, and real-time sanctions lists.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，配备 RAG 的合规代理作为一个精确且信息丰富的守门人。它动态地咨询相关的 AML 指令的最新版本、具体的内部银行政策和实时制裁名单。
- en: This ability to retrieve and synthesize specific, multi-faceted information
    allows the agent to make nuanced, risk-aware decisions, thereby safeguarding the
    institution, ensuring auditable compliance, and streamlining the review process.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 这种检索和综合特定、多方面信息的能力使代理能够做出细微、风险意识强的决策，从而保护机构，确保可审计的合规性，并简化审查流程。
- en: Analyzing the scenarios
  id: totrans-225
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析场景
- en: These detailed flows clearly demonstrate that RAG isn't just about accessing
    more data; it's about providing idx_6fa86cb3agents with the right data at the
    right time to make them significantly more effective, reliable, and aligned with
    real-world operational needs. The ability to dynamically retrieve and incorporate
    context is fundamental to building truly intelligent and useful AI agents.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 这些详细的流程清楚地表明，RAG 不仅仅是获取更多数据；它关于在正确的时间为代理提供正确的数据，使他们显著更有效、更可靠，并与现实世界的操作需求保持一致。动态检索和整合上下文的能力对于构建真正智能和有用的
    AI 代理至关重要。
- en: The sophistication of RAG implementations can be understood as a spectrum, with
    each level introducing more complexity and capability. Importantly, this spectrum
    directly corresponds to the GenAI Maturity Model discussed in *[Chapter 1](Chapter_1.xhtml#h1_14)*.
    As an organization's needs evolve from simple contextual enhancement to building
    complex, collaborative agentic systems, the type of RAG it employs will likewise
    advance.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: RAG实现的复杂性可以理解为一种光谱，每个级别都引入了更多的复杂性和能力。重要的是，这个光谱直接对应于在*[第一章](Chapter_1.xhtml#h1_14)*中讨论的GenAI成熟度模型。随着组织的需求从简单的上下文增强发展到构建复杂、协作的代理系统，它所采用的RAG类型也将相应地进步。
- en: 'The following table maps each level of RAG sophistication to its corresponding
    stage in the maturity journey:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 下表将每个RAG复杂度级别映射到成熟度旅程中的相应阶段：
- en: '| **RAG** **l****evel** | **Description** | **Corresponding** **m****aturity**
    **l****evel(s)** |'
  id: totrans-229
  prefs: []
  type: TYPE_TB
  zh: '| **RAG** **l****evel** | **Description** | **Corresponding** **m****aturity**
    **l****evel(s)** |'
- en: '| --- | --- | --- |'
  id: totrans-230
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| "Vanilla" RAG | A straightforward approach for basic contextual augmentation
    from a single knowledge source | **Level 2** **–** **Contextual** **e****nhancement**:
    This is the foundational application of RAG, focused on overcoming basic model
    limitations by providing external context from a single knowledge base |'
  id: totrans-231
  prefs: []
  type: TYPE_TB
  zh: '| "Vanilla" RAG | 一种从单一知识源进行基本上下文增强的直接方法 | **Level 2** **–** **Contextual**
    **e****nhancement**：这是RAG的基础应用，专注于通过提供来自单一知识库的外部上下文来克服基本模型限制 |'
- en: '| Advanced RAG | More sophisticated methods to improve the quality, relevance,
    and trustworthiness of retrieved context, often from multiple sources | **Level
    4** **–** **Grounding** **and****e****valuation**: The focus on re-ranking, fusion,
    and citing sources aligns perfectly with the need for reliable, verifiable, and
    well-grounded agent outputs |'
  id: totrans-232
  prefs: []
  type: TYPE_TB
  zh: '| Advanced RAG | 更复杂的方法来提高检索上下文的质量、相关性和可信度，通常来自多个来源 | **Level 4** **–** **Grounding**
    **and****e****valuation**：对重新排序、融合和引用来源的关注与对可靠、可验证和有良好依据的代理输出的需求完美契合 |'
- en: '| Agentic RAG | An emerging pattern that uses autonomous agents to manage and
    orchestrate the entire retrieval process itself, often involving collaboration
    | **Level****s** **5** **and** **6** **–** **Single and** **multi-agen****t**
    **s****ystems**: This advanced pattern is a hallmark of mature agentic architectures,
    where specialized agents collaborate to perform complex tasks, in this case, sophisticated
    information retrieval |'
  id: totrans-233
  prefs: []
  type: TYPE_TB
  zh: '| Agentic RAG | 一种新兴模式，使用自主代理来管理和编排整个检索过程本身，通常涉及协作 | **Level****s** **5** **and**
    **6** **–** **Single and** **multi-agen****t** **s****ystems**：这种高级模式是成熟代理架构的标志，其中专门的代理协作执行复杂任务，在这种情况下，是复杂的信息检索
    |'
- en: Table 3.5 – Mapping the RAG spectrum to the GenAI Maturity Model
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 表3.5 – 将RAG光谱映射到GenAI成熟度模型
- en: 'Regardless idx_49b8e55eof the complexity, the fundamental objective of any
    RAG implementation remains consistent: to provide the agent''s LLM core with the
    specific, accurate, and timely information it needs to execute its sense-reason-plan-act
    cycle with maximum effectiveness and reliability.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 无论复杂程度如何，任何RAG实现的根本目标始终保持一致：为代理的LLM核心提供特定、准确和及时的信息，以便以最大效率和可靠性执行其感知-推理-计划-行动周期。
- en: While RAG offers a powerful solution for dynamic, inference-time contextualization
    by bringing external knowledge to the LLM, certain agent requirements may call
    for more enduring modifications within the LLM's intrinsic knowledge or its ingrained
    behavioral patterns. Such deep-seated adaptations are typically achieved through
    the process of fine-tuning, which we will explore next.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然RAG通过将外部知识引入LLM，为动态、推理时上下文化提供了一个强大的解决方案，但某些代理需求可能需要在LLM的内在知识或其固有的行为模式中进行更持久的修改。这种根深蒂固的适应通常通过微调过程实现，我们将在下一部分探讨。
- en: Fine-tuning for agentic capabilities
  id: totrans-237
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为代理能力进行微调
- en: Fine-tuning represents a more profound and persistent method of LLM adaptation,
    as it involves directly idx_4eaee28fmodifying the model's internal parameters,
    or weights, through additional training on specialized datasets.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 微调是一种更深入、更持久的方法，用于LLM的适应，因为它涉及通过在专用数据集上进行额外训练，直接修改模型的内部参数或权重。
- en: This process allows us to deeply embed specific knowledge, instill particular
    skills, or shape the behavioral nuances of the LLM to align it more precisely
    with an AI agent's designated role and operational requirements. Unlike RAG, which
    augments the model with external information at the moment of use, fine-tuning
    fundamentally alters the model's inherent knowledge base and its default response
    tendencies. This makes the model intrinsically more adept at certain tasks or
    within particular domains.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程使我们能够深入嵌入特定知识，培养特定技能，或塑造LLM的行为细微差别，使其更精确地与AI代理指定的角色和操作需求相一致。与RAG不同，RAG在使用的时刻通过外部信息增强模型，微调从根本上改变了模型的本征知识库及其默认响应倾向。这使得模型在特定任务或特定领域内本质上更擅长。
- en: Domain specialization
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 领域专业化
- en: When developing sophisticated agentic systems, fine-tuning can be strategically
    employed to achieve several idx_7dcd53dacritical outcomes. A primary application
    is domain specialization. By training an LLM on a comprehensive corpus of domain-specific
    texts, such as legal case files for a legal research agent, medical journals for
    a diagnostic support agent, or financial regulatory documents for a compliance
    agent, the model becomes much more fluent in the specific terminology.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发复杂的代理系统时，微调可以战略性地用于实现几个关键成果。一个主要应用是领域专业化。通过在一个综合的领域特定文本语料库上训练LLM，例如法律研究代理的法律案例文件、诊断支持代理的医学期刊或合规代理的金融监管文件，模型在特定术语上变得更加流利。
- en: It also gains a better understanding of the key entities and their relationships
    within that domain and can generate outputs that are far more contextually appropriate
    and accurate for that field. This ensures that the agent truly *speaks the language*
    of its operational environment.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 它还更好地理解了该领域中的关键实体及其关系，并能生成在该领域内更加语境适当和准确的输出。这确保了代理真正“说出了其操作环境的语言”。
- en: Another key objective is the development of task-specific skills. Agents are
    often designed to excel at particular functions. These might include generating
    code in a specific programming language, summarizing lengthy reports into a predefined
    structured format, extracting precise named entities from unstructured text, or
    engaging in a particular type of dialogue.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键目标是开发特定任务技能。代理通常被设计为在特定功能上表现出色。这些可能包括在特定编程语言中生成代码、将冗长的报告总结为预定义的结构化格式、从非结构化文本中提取精确的命名实体，或参与特定类型的对话。
- en: 'Fine-tuning the agent''s LLM on datasets composed of numerous examples of these
    specific tasks can significantly enhance its proficiency and reliability in performing
    them. For instance, an LLM could be fine-tuned on a dataset consisting of the
    following format: `"user request" -``>` `"correct API` `tool_call_json``"` pairs.
    Such training would drastically improve an agent''s ability to reliably invoke
    external tools with the correct parameters.'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在由这些特定任务的多个示例组成的集合数据集上微调代理的LLM，可以显著提高其在执行这些任务时的熟练度和可靠性。例如，一个LLM可以在以下格式的数据集上进行微调：“用户请求”
    - ``>` `"正确的API` `工具调用_json``"` 对。这种训练将极大地提高代理可靠地使用正确参数调用外部工具的能力。
- en: Additionally, fine-tuning is instrumental for behavioral alignment. This involves
    shaping the agent's LLM to follow desired conversational styles, for example,
    a customer service agent may need to be consistently empathetic, while a technical
    support agent might need to be exceptionally concise and direct.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，微调对于行为对齐至关重要。这涉及到塑造代理的LLM以遵循期望的对话风格，例如，客户服务代理可能需要始终如一地表现出同情心，而技术支持代理可能需要非常简洁和直接。
- en: It can also be used to ensure the model follows complex, multi-step instructions
    with greater fidelity.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 它还可以用来确保模型能够以更高的保真度遵循复杂的多步骤指令。
- en: This alignment can extend to reinforcing adherence to specific ethical guidelines
    or safety protocols that might not have been fully ingrained in the base model.
    An agent could, for example, be fine-tuned to always ask for explicit confirmation
    before executing a potentially irreversible action.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对齐可以扩展到强化对特定伦理指南或安全协议的遵守，这些指南或协议可能尚未在基础模型中完全根植。例如，一个代理可以被微调，在执行可能不可逆的操作之前始终要求明确的确认。
- en: 'The spectrum of tuning: parameter-efficient fine-tuning to full fine-tuning'
  id: totrans-248
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调优范围：从参数高效的微调到完全微调
- en: Model adaptation or fine-tuning involves a spectrum of options. These start
    from simpler, less expensive, less idx_73c0a56atime-consuming techniques, such
    as **parameter-efficient fine-tuning** (**PEFT**), all the way to **full fine-tuning**
    (**FFT**), where the entire idx_b27bf804weights of the models are changed. Thus,
    when considering fine-tuning, a significant choice lies between FFT and various
    PEFT methods. FFT involves idx_b0209172updating all, or a very substantial portion,
    of the LLM's parameters.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 模型自适应或微调涉及一系列选项。这些选项从更简单、成本更低、耗时更少的技巧开始，例如**参数高效微调**（**PEFT**），一直到**完全微调**（**FFT**），其中模型的全部权重都会发生变化。因此，在考虑微调时，一个重要的选择在于FFT和多种PEFT方法之间。FFT涉及更新LLM的所有参数或大部分参数。
- en: PEFT idx_7dda58b6techniques, such as **Low-Rank Adaptation** (**LoRA**), adapter
    tuning, or prompt tuning, offer a more resource-friendly approach. These methods
    work by modifying only a very small subset of the model's existing parameters
    or by adding a small number of new, trainable parameters, all while keeping the
    vast majority of the original model frozen.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: PEFT技术，如**低秩适应**（**LoRA**）、适配器调整或提示调整，提供了一种更资源友好的方法。这些方法通过仅修改模型现有参数的非常小部分或添加少量新的可训练参数来实现，同时保持大多数原始模型保持冻结状态。
- en: For agent development, PEFT methods are often highly advantageous. They are
    much more computationally efficient and can often achieve good results with smaller
    datasets. They also significantly reduce the risk of catastrophic forgetting and
    make it far more practical to create and manage many distinct specialized agent
    "personalities" or skill sets derived from a single base LLM.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 对于代理开发，PEFT方法通常具有高度优势。它们在计算效率上要高得多，并且通常可以用较小的数据集实现良好的结果。它们还显著降低了灾难性遗忘的风险，使得从单个基础LLM创建和管理许多不同的专用代理“个性”或技能集变得更加可行。
- en: This approach allows for a diverse ecosystem of specialized agents without the
    immense overhead associated with maintaining numerous large, independently fine-tuned
    models. The trade-off is that for extremely complex tasks requiring the deepest
    possible specialization, PEFT might not achieve the same absolute performance
    ceiling as FFT, and the degree of behavioral change might be more constrained
    in some cases.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法允许有一个多样化的专用代理生态系统，而不需要维护大量独立微调的大型模型的巨大开销。权衡的是，对于需要最深层次专业化的极其复杂任务，PEFT可能无法达到FFT相同的绝对性能上限，在某些情况下，行为变化程度可能更加受限。
- en: For agents, the main advantage of FFT is the potential for very deep specialization
    and significant performance improvements on the target task or within the specific
    domain. This allows for extensive modifications to the model's inherent behavior.
    However, FFT is computationally very expensive and typically requires large, high-quality
    training datasets. It also carries a risk of "catastrophic forgetting," where
    the model may lose some of its valuable general capabilities learned during its
    initial pretraining. Creating, managing, and deploying multiple fully fine-tuned
    large models for different specialized agents can also be prohibitively resource-intensive.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 对于代理来说，FFT的主要优势是能够在目标任务或特定领域实现非常深入的专业化和显著的性能提升。这允许对模型的本能行为进行广泛的修改。然而，FFT在计算上非常昂贵，通常需要大型、高质量的训练数据集。它还可能带来“灾难性遗忘”的风险，即模型可能会失去其在初始预训练期间学习的一些有价值的一般能力。为不同的专用代理创建、管理和部署多个完全微调的大型模型也可能非常资源密集。
- en: The training data used for fine-tuning can also be categorized based on its
    nature and how it's used. **Unsupervised** **f****ine-tuning**, sometimes idx_19a40fc5referred
    to as domain-adaptive pretraining, involves continuing the model's pretraining
    phase using a large corpus of unlabeled text specific to the target domain.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 用于微调的训练数据也可以根据其性质和用途进行分类。**无监督微调**（有时称为领域自适应预训练），涉及使用针对目标领域的大规模未标记文本继续模型的预训练阶段。
- en: This process helps the LLM thoroughly learn the vocabulary, stylistic nuances,
    and general background knowledge of that particular domain. For agents, this means
    they can better understand and process information within their specialized operational
    environment.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程有助于LLM彻底学习特定领域的词汇、风格细微差别和一般背景知识。对于代理来说，这意味着他们可以更好地理解和处理其专用操作环境中的信息。
- en: '**Supervised fine-tuning** (**SFT**), on the idx_8e1f37ccother hand, trains
    the model on a dataset of curated, labeled examples. These examples typically
    take the form of input-output pairs, such as an instruction paired with the desired
    response, or a question paired with the correct answer. SFT is crucial for teaching
    the model-specific tasks, how to accurately follow diverse instructions, or how
    to generate outputs in a precise, desired format. For agents, SFT is key for teaching
    them how to perform specific actions correctly or to communicate in a way that
    aligns with their designed persona and function.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**监督式微调**（**SFT**）另一方面，在精心挑选、标记的示例数据集上训练模型。这些示例通常以输入-输出对的形式出现，例如指令配对所需的响应，或问题配对正确答案。SFT对于教授模型特定任务、如何准确遵循各种指令或如何以精确、期望的格式生成输出至关重要。对于代理来说，SFT是教授他们如何正确执行特定动作或以与其设计个性和功能相符的方式进行沟通的关键。'
- en: Understanding idx_f8c640c1the distinctions between FFT and PEFT is essential
    when devising a fine-tuning strategy for an agent's LLM core. The choice significantly
    impacts resource requirements, the depth of specialization achievable, and the
    overall ease of managing multiple specialized agents within an enterprise.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在为代理的LLM核心设计微调策略时，理解FFT和PEFT之间的区别至关重要。这一选择会显著影响资源需求、可达到的专业化深度以及在企业内部管理多个专业化代理的整体便捷性。
- en: 'The following table provides a comparative overview of FFT and PEFT from an
    agentic perspective:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 下表从代理的角度提供了一个FFT和PEFT的比较概述：
- en: '| **Feature/****c****onsideration** | **FFT** | **PEFT** |'
  id: totrans-259
  prefs: []
  type: TYPE_TB
  zh: '| **特征/****c****onsideration** | **FFT** | **PEFT** |'
- en: '| --- | --- | --- |'
  id: totrans-260
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Depth of specialization | High. Can lead to deep adaptation to specific domains,
    tasks, or agent behaviors. | Moderate to high. Effective for many specialization
    needs, though potentially less deep than FFT for extremely complex or novel tasks.
    |'
  id: totrans-261
  prefs: []
  type: TYPE_TB
  zh: '| 专业化深度 | 高。可能导致对特定领域、任务或代理行为的深度适应。 | 中等到高。对于许多专业化需求有效，尽管对于极其复杂或新颖的任务可能不如FFT深入。
    |'
- en: '| Computational cost (training) | Very high. Requires significant GPU/TPU resources
    and time. | Low to moderate. Significantly less resource-intensive than FFT. |'
  id: totrans-262
  prefs: []
  type: TYPE_TB
  zh: '| 计算成本（训练） | 非常高。需要大量的GPU/TPU资源和时间。 | 低至中等。比FFT的资源密集度显著低。 |'
- en: '| Dataset size requirement | Large. Typically needs substantial high-quality,
    task-specific labeled data. | Small to moderate. Can often achieve good results
    with smaller datasets. |'
  id: totrans-263
  prefs: []
  type: TYPE_TB
  zh: '| 数据集大小要求 | 大型。通常需要大量高质量、特定任务的标记数据。 | 小型至中等。通常可以使用较小的数据集获得良好结果。 |'
- en: '| Risk of catastrophic forgetting | Higher. Updating all weights can lead to
    the model losing some general capabilities. | Lower. Freezing most base model
    parameters helps retain general knowledge. |'
  id: totrans-264
  prefs: []
  type: TYPE_TB
  zh: '| 灾难性遗忘的风险 | 较高。更新所有权重可能导致模型失去一些通用能力。 | 较低。冻结大多数基础模型参数有助于保留通用知识。 |'
- en: '| Resource impact (multiple agents) | High. Storing and serving many fully
    fine-tuned large models is costly and complex. | Low. Multiple PEFT adaptations
    (e.g., LoRA layers) for different agents can often share the same base model,
    drastically reducing overhead. |'
  id: totrans-265
  prefs: []
  type: TYPE_TB
  zh: '| 资源影响（多个代理） | 高。存储和提供许多完全微调的大型模型成本高昂且复杂。 | 低。多个PEFT适应（例如，LoRA层）对于不同的代理可以共享相同的基模型，大大减少开销。
    |'
- en: '| Impact on base model weights | All or most weights are modified. | Only a
    small fraction of weights are modified, or a few new, small parameter sets (e.g.,
    adapters and LoRA matrices) are trained. |'
  id: totrans-266
  prefs: []
  type: TYPE_TB
  zh: '| 对基础模型权重的影响 | 所有或几乎所有权重都被修改。 | 只有很少一部分权重被修改，或者训练了几个新的、小的参数集（例如，适配器和LoRA矩阵）。
    |'
- en: '| Ease of implementation/iteration | More complex and time-consuming to iterate
    and experiment with. | Generally faster and easier to experiment with different
    adaptations due to lower resource needs. |'
  id: totrans-267
  prefs: []
  type: TYPE_TB
  zh: '| 实施和迭代的便捷性 | 更复杂且耗时，进行迭代和实验。 | 通常更快、更容易进行不同的适应实验，因为资源需求较低。 |'
- en: '| Typical use cases for agents | Agents idx_8413765dthat require deep domain
    expertise or highly specialized behavioral traits, beyond what PEFT can effectively
    capture. | Creating diverse specialized agents (e.g., different skills, roles,
    and communication styles) from a common base LLM; agents in resource-constrained
    environments. |'
  id: totrans-268
  prefs: []
  type: TYPE_TB
  zh: '| 代理的典型用例 | 需要深度领域专业知识或高度专业化行为特征的代理，这些特征超出了PEFT的有效捕捉范围。 | 从共同的基LLM创建多样化的专业化代理（例如，不同的技能、角色和沟通风格）；资源受限环境中的代理。
    |'
- en: '| Primary benefit for agents | Potential for maximum performance and deepest
    specialization for a given task/domain. | Efficiency, scalability for multiple
    specializations, and retention of general capabilities. |'
  id: totrans-269
  prefs: []
  type: TYPE_TB
  zh: '| 代理的主要优势 | 对于特定任务/领域的最大性能和最深度的专业化。 | 效率、多专业化的可扩展性和保留一般能力。 |'
- en: '| Primary drawback for agents | High cost, resource-intensive, and risk of
    losing general knowledge. | May not achieve the absolute peak performance of FFT
    for some highly demanding or nuanced specializations. |'
  id: totrans-270
  prefs: []
  type: TYPE_TB
  zh: '| 代理的主要缺点 | 成本高、资源密集，以及失去一般知识的风险。 | 可能无法实现FFT在某些高度要求或细微的专业化中的绝对峰值性能。 |'
- en: '| Example techniques | N/A (involves retraining most/all layers) | LoRA, adapter
    tuning, prefix-tuning, and prompt-tuning. |'
  id: totrans-271
  prefs: []
  type: TYPE_TB
  zh: '| 示例技术 | N/A（涉及重新训练大多数/所有层） | LoRA、适配器调优、前缀调优和提示调优。 |'
- en: Table 3.6 – Comparison of FFT vs. PEFT for agent-ready LLMs
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 表3.6 – FFT与PEFT在针对代理的LLMs中的比较
- en: For many agentic applications, especially when developing a suite of specialized
    agents or when needing to adapt agents to evolving tasks without incurring massive
    retraining costs, PEFT methods offer a compelling balance of specialization and
    efficiency. They allow organizations to tailor idx_8ca97464agent behaviors and
    knowledge effectively while managing resources more sustainably. However, FFT
    remains a viable option when the absolute highest level of specialization is required,
    and the associated costs are justifiable for the agent's critical role.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多代理应用，尤其是在开发一系列专用代理或需要在不产生巨大再训练成本的情况下调整代理以适应不断发展的任务时，PEFT方法提供了专业化和效率之间的诱人平衡。它们允许组织有效地定制idx_8ca97464代理行为和知识，同时更可持续地管理资源。然而，当需要绝对最高水平的专业化且相关成本对代理的关键角色来说是合理的时候，FFT仍然是一个可行的选择。
- en: Fine-tuning, and particularly the agile PEFT methods, provides a robust toolkit
    for forging LLMs that are truly agent-ready. These techniques provide the models
    with the specialized knowledge and finely-honed behavioral characteristics necessary
    for them to be capable, reliable, and efficient in their designated roles.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 微调和特别是敏捷的PEFT方法提供了一套强大的工具，用于打造真正适合代理的LLMs。这些技术为模型提供了必要的专业知识和精细调校的行为特征，使它们能够在指定的角色中具备能力、可靠性和效率。
- en: This deep specialization achieved through fine-tuning is invaluable for creating
    highly proficient agents. However, agents also benefit significantly from the
    ability to adapt their behavior quickly in response to immediate, unforeseen circumstances
    or novel instructions, without undergoing a full retraining cycle. We will now
    examine how ICL offers a powerful mechanism for achieving this dynamic adaptive
    capability.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 通过微调实现的这种深度专业化对于创建高度熟练的代理至关重要。然而，代理也显著受益于能够快速适应即时、不可预见的情况或新指令的能力，而无需进行完整的再训练周期。我们现在将探讨ICL如何提供一种强大的机制来实现这种动态适应性能力。
- en: In-context learning for agent adaptation
  id: totrans-276
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 上下文学习以适应代理
- en: While fine-tuning offers deep, persistent specialization, agents often benefit
    from the ability to adapt their idx_f52d33dcbehavior more immediately, responding
    to novel situations or specific instructions within an ongoing interaction. ICL
    provides this remarkable adaptive capability.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然微调提供了深入且持久的专门化，但代理通常能从立即调整其idx_f52d33dc行为的能力中受益，以应对新情况或持续交互中的特定指令。ICL提供了这种非凡的适应性能力。
- en: It allows LLMs to effectively learn new tasks or modify their responses based
    solely on the information and examples provided within the immediate context of
    the current prompt or conversation.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 这允许LLMs能够有效地学习新任务或仅基于当前提示或对话的即时上下文中的信息和示例来修改其响应。
- en: Crucially, this occurs without requiring any changes to the model's underlying
    weights or parameters. This capacity for learning on the fly is exceptionally
    valuable for AI agents, particularly those that need to adapt dynamically to new
    scenarios, shifting user preferences, or evolving instructions in real time.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，这不需要对模型的基本权重或参数进行任何更改。这种即时学习的容量对于AI代理来说极为宝贵，尤其是那些需要动态适应新场景、变化的用户偏好或实时演变的指令的代理。
- en: The fundamental mechanism behind ICL involves presenting the LLM with illustrative
    examples directly within the prompt. This might be a **few-shot** prompt, containing
    just a handful of demonstrations, or, especially with models boasting large context
    windows, even many examples (**many-shot** prompting).
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: ICL 背后的基本机制涉及在提示中直接向 LLM 展示说明性示例。这可能是一个 **少量示例** 提示，包含少量演示，或者，特别是对于拥有大上下文窗口的模型，甚至许多示例（**多量示例**
    提示）。
- en: The following examples showcase the desired input-output behavior, task structure,
    or response style. The LLM endeavors to infer the underlying pattern from these
    contextual cues and applies this inferred understanding to new, similar inputs
    it encounters.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例展示了所需的输入-输出行为、任务结构或响应风格。LLM 努力从这些上下文线索中推断出潜在的模式，并将这种推断出的理解应用于它遇到的新、类似的输入。
- en: 'For an agent, its control logic would dynamically construct such prompts, injecting
    relevant examples as needed to guide its LLM core. A simple conceptual structure
    for such a prompt would be as follows:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个代理，它的控制逻辑会动态构建这样的提示，根据需要注入相关示例以引导其 LLM 核心。这样一个提示的简单概念结构如下：
- en: '**System**: You are a specialized assistant for [Task Domain]:'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统**: 您是 [任务领域] 的专业助手'
- en: '**Example 1** **i****nput**: A specific type of user query or environmental
    data'
  id: totrans-284
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例 1** **输入**: 一种特定的用户查询或环境数据'
- en: '**Example 1** **o****utput**: The agent''s desired response or action for Example
    1'
  id: totrans-285
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例 1** **输出**: 示例 1 中代理期望的响应或行动'
- en: '**Example 2** **i****nput**: Another specific type of user query or data'
  id: totrans-286
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例 2** **输入**: 另一种特定的用户查询或数据'
- en: '**Example 2** **o****utput**: The agent''s desired response or action for Example
    2'
  id: totrans-287
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例 2** **输出**: 示例 2 中代理期望的响应或行动'
- en: '**Current** **s****ituation** **i****nput**: The new user query or the current
    environmental data that the agent needs to process'
  id: totrans-288
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当前** **情况** **输入**: 新用户查询或代理需要处理的当前环境数据'
- en: '**Agent''s LLM** **o****utput**: The LLM attempts to generate a response or
    action consistent with the provided examples'
  id: totrans-289
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理的 LLM** **输出**: LLM 尝试生成与提供的示例一致的响应或行动'
- en: This ability idx_f2fd97b5to guide an agent's behavior by directly showing its
    LLM core what is expected translates into several practical advantages. The following
    table outlines key scenarios where an agent can leverage ICL for dynamic, on-the-fly
    adaptation, along with the agent's internal rationale for doing so.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 这种通过直接向代理的 LLM 核心展示期望内容来引导代理行为的能力 idx_f2fd97b5 转化为几个实际优势。以下表格概述了代理可以利用 ICL 进行动态、即时适应的关键场景，以及代理进行此类操作的内在线索。
- en: '| **Use case/advantage** | **Scenario description** | **Agent''s approach with**
    **ICL** | **Agent''s internal "thought" (rationale)** |'
  id: totrans-291
  prefs: []
  type: TYPE_TB
  zh: '| **用例/优势** | **场景描述** | **使用 ICL 的代理方法** | **代理的内部“思考”（理由）** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-292
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Task demonstration for ad hoc needs | The agent must produce output in a
    new, ad hoc format for which it has not been fine-tuned (e.g., a three-section
    report from unstructured text). | Constructs a prompt that includes a few examples
    demonstrating the desired input-to-output transformation (`Raw Feedback -``>`
    `Formatted Summary`). | "This specific request requires a new output format. I
    will construct a prompt with examples to guide the LLM''s generation for this
    instance." |'
  id: totrans-293
  prefs: []
  type: TYPE_TB
  zh: '| 针对特定需求的任务演示 | 代理必须以它未经过微调的新、临时格式生成输出（例如，从非结构化文本生成的三部分报告）。 | 构建一个包含几个演示所需输入到输出转换的提示（`原始反馈
    -`>` 格式化摘要`）。 | "这个特定的请求需要新的输出格式。我将构建一个包含示例的提示来引导 LLM 为此实例生成内容。" |'
- en: '| Dynamic style adaptation | The agent detects user frustration based on conversational
    cues and determines its standard factual tone may escalate the situation. | Dynamically
    augments the LLM''s context with examples of empathetic or reassuring responses
    to guide the tone of the conversation. | "The user''s sentiment is negative. I
    need to adjust my communication style. I will add examples of empathetic responses
    to my context before generating the next reply." |'
  id: totrans-294
  prefs: []
  type: TYPE_TB
  zh: '| 动态风格适应 | 代理根据对话线索检测到用户的不满，并确定其标准事实语气可能会升级情况。 | 动态增强 LLM 的上下文，加入同理心或安慰性响应的示例，以引导对话的语气。
    | "用户的情绪是消极的。我需要调整我的沟通风格。在生成下一个回复之前，我将添加同理心响应的示例到我的上下文中。" |'
- en: '| Clarifying tool usage in unforeseen cases | An agent needs to call a tool
    or API with a rare or complex combination of parameters, creating a high risk
    of incorrect formatting. | Includes a complete, successful example of a similar
    complex tool invocation in the prompt before asking the LLM to format the new
    call. | "This tool invocation is complex and has several optional parameters.
    I will retrieve a similar successful example and add it to the prompt to ensure
    the LLM formats this new request accurately." |'
  id: totrans-295
  prefs: []
  type: TYPE_TB
  zh: '| 在不可预见的情况下阐明工具使用 | 代理需要调用一个工具或 API，使用罕见或复杂的参数组合，这可能导致格式错误的高风险。 | 在请求 LLM 格式化新调用之前，在提示中包括一个类似的复杂工具调用的完整、成功的示例。
    | “这个工具调用很复杂，有几个可选参数。我将检索一个类似的成功示例并将其添加到提示中，以确保 LLM 准确地格式化这个新请求。” |'
- en: Table 3.7 – Practical applications of ICL for dynamic agent adaptation
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3.7 – ICL 在动态代理适应中的实际应用
- en: 'These idx_a5af15d9applications are particularly powerful in dynamic and unpredictable
    environments:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 这些 idx_a5af15d9 应用在动态和不可预测的环境中尤其强大：
- en: '**Handling novel and evolving tasks**: When agents are faced with tasks that
    are entirely new or rapidly changing, ICL offers a quick and resource-efficient
    method to guide their performance. This avoids the delay and expense of retraining
    or fine-tuning for situations that might be temporary or unique. For instance,
    if an agent supports a software application and a new feature is released with
    minimal documentation, the initial support queries can be handled by providing
    the LLM with the available feature notes and a couple of example question-answer
    pairs directly in the prompt.'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理新颖和不断发展的任务**：当代理面临完全新颖或快速变化的任务时，ICL 提供了一种快速且资源高效的指导其表现的方法。这避免了重新训练或微调可能暂时或独特情况的延迟和费用。例如，如果一个代理支持一个软件应用，并且一个新功能发布时文档最少，初始支持查询可以通过在提示中直接提供可用的功能说明和几个示例问答对来处理。'
- en: '**Adapting to** **in-session user pref****erences**: As user preferences or
    requirements change during an interaction, an agent can leverage ICL for immediate
    adaptation. A personal assistant agent planning a trip might initially suggest
    detailed, multi-stop itineraries. If the user then states, `Actually, for this
    trip, I just want a simple list of potential destinations and one key attraction
    for` `each, like this: [user provides a brief example]`, the agent can use that
    in-context example to immediately adapt its output style for subsequent suggestions
    within that same conversation.'
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适应会话中的用户偏好**：在交互过程中，如果用户的偏好或需求发生变化，代理可以利用 ICL 进行即时适应。一个计划旅行的个人助理代理可能会最初建议详细的、多站点的行程。如果用户随后表示，“实际上，对于这次旅行，我只想看到一个潜在目的地的简单列表和每个地点的一个主要景点，就像这样：[用户提供简短示例]”，代理可以使用这个上下文示例立即调整其输出风格，以适应同一对话中的后续建议。'
- en: '**Managing** **h****ighly** **contingent b****ehavior**: In situations where
    the optimal agent behavior depends on a multitude of rapidly changing variables,
    providing a few highly relevant, current examples within the prompt can be more
    agile than attempting to fine-tune the model for every conceivable circumstance.
    For example, an agent advising on event planning, where permitted activities and
    capacity limits change based on the venue and number of guests, could be fed the
    currently applicable rules and a sample plan conforming to those rules as part
    of its context for each new planning request.'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理高度依赖性的行为**：在最佳代理行为取决于大量快速变化的变量的情况下，在提示中提供几个高度相关、当前的示例可能比尝试为每个可能的情况微调模型更灵活。例如，一个在活动策划方面提供建议的代理，其中允许的活动和容量限制根据场地和宾客数量而变化，可以为每个新的策划请求提供当前适用的规则和符合这些规则的样本计划，作为其上下文的一部分。'
- en: The efficacy idx_e382121aof ICL is significantly influenced by the inherent
    capabilities of the LLM being used, particularly its ability to generalize from
    limited examples and, very importantly, by the size of its context window. As
    discussed in *[Chapter 2](Chapter_2.xhtml#h1_35)*, LLMs with larger context windows
    can accommodate more comprehensive and numerous examples, which generally leads
    to more robust and accurate few-shot or many-shot learning.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: ICL 的有效性显著受到所使用的 LLM 内在能力的制约，尤其是其从有限示例中泛化的能力，以及，非常重要的一点，其上下文窗口的大小。正如在*[第 2 章](Chapter_2.xhtml#h1_35)*中讨论的那样，具有更大上下文窗口的
    LLM 可以容纳更全面、更多的示例，这通常会导致更稳健和准确的少样本或多样本学习。
- en: To make the concept of ICL more concrete, let's walk through an end-to-end example
    of an agent adapting its behavior on the fly.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使ICL的概念更加具体，让我们通过一个端到端的示例来了解智能体如何即时调整其行为。
- en: 'End-to-end example: Product feedback analyzer agent with ICL'
  id: totrans-303
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 端到端示例：带有ICL的产品反馈分析智能体
- en: Imagine an AI agent designed to analyze customer reviews for e-commerce products.
    Its core task is to idx_2846cec7extract mentions of specific product features
    and determine the sentiment expressed toward each individual feature, and not
    just an overall review sentiment. This granular feedback is highly valuable for
    product development teams.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个设计用于分析电子商务产品客户评论的AI智能体。其核心任务是idx_2846cec7提取特定产品特征的提及，并确定针对每个单独特征的所表达的情感，而不仅仅是整体评论的情感。这种细粒度的反馈对于产品开发团队来说非常有价值。
- en: 'A new review comes in for the AstroZoom telescope: *The magnification on the*
    *AstroZoom* *is incredible, I can see Saturn''s rings clearly! However, the tripod
    is a bit wobbly and feels cheap*. Let''s see what the agent does:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 对于AstroZoom望远镜的新评论：*AstroZoom的放大效果令人难以置信，我可以看到土星的环！然而，三脚架有点晃动，感觉有点廉价*。让我们看看智能体会做什么：
- en: '**Agent''s initial behavior** (without specific ICL for this granular task):
    If the agent''s LLM core relies only on its general pretraining or has only been
    broadly fine-tuned for sentiment analysis, its response to this review might be
    as follows:'
  id: totrans-306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**智能体的初始行为**（对于这个粒度任务没有特定的ICL）：如果智能体的LLM核心仅依赖于其一般预训练或仅针对情感分析进行了广泛的微调，那么它对这次评论的回应可能如下：'
- en: '[PRE18]'
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: While not entirely wrong, this output isn't structured enough for easy data
    aggregation and doesn't clearly separate features from the sentiment directed
    at them in a machine-readable way. Product teams need to know which feature had
    which sentiment.
  id: totrans-308
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 虽然并不完全错误，但这个输出结构不够清晰，不利于数据的轻松聚合，并且没有以机器可读的方式明确区分特征及其所针对的情感。产品团队需要知道哪个特征对应哪种情感。
- en: '**Agent dynamically constructs an ICL prompt**: To guide the LLM to perform
    the more nuanced task of feature-specific sentiment extraction and provide a structured
    output (e.g., JSON), the agent''s control logic dynamically assembles a prompt
    that includes few-shot examples. This prompt is constructed *for this specific
    analysis task instance*:'
  id: totrans-309
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**智能体动态构建ICL提示**：为了引导LLM执行更细微的任务，即特征特定情感提取并提供结构化输出（例如，JSON），智能体的控制逻辑动态组装一个包含少量示例的提示。这个提示是为这个特定的分析任务实例构建的：'
- en: '[PRE19]'
  id: totrans-310
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Here idx_8ef154b2are some examples:'
  id: totrans-311
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里idx_8ef154b2有一些示例：
- en: '[PRE20]'
  id: totrans-312
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Actual review to analyze: "The magnification on the AstroZoom is incredible,
    I can see Saturn''s rings clearly! However, the tripod is a bit wobbly and feels
    cheap."'
  id: totrans-313
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 实际需要分析的评论：“AstroZoom的放大效果令人难以置信，我可以看到土星的环！然而，三脚架有点晃动，感觉有点廉价。”
- en: '**Agent''s LLM processes the ICL prompt and generates an adapted output**:'
  id: totrans-314
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**智能体的LLM处理ICL提示并生成一个适应性的输出**：'
- en: The agent idx_86b994fasends this complete prompt (system message, examples,
    and the actual review) to its LLM core. The LLM, by processing the examples, infers
    the desired task (extracting feature-specific sentiments) and the required JSON
    output format.
  id: totrans-315
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 智能体idx_86b994fas将这个完整的提示（系统消息、示例和实际评论）发送到其LLM核心。LLM通过处理示例，推断出所需的任务（提取特征特定的情感）和所需的JSON输出格式。
- en: 'Here is the LLM output (after ICL):'
  id: totrans-316
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这里是LLM输出（经过ICL处理）：
- en: '[PRE21]'
  id: totrans-317
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**Outcome and** **s****ignificance**: By using ICL, the agent has successfully
    performed a nuanced analysis and produced a structured, highly useful output,
    all without any persistent changes to its LLM''s weights. For this specific interaction,
    it "learned" the task from the provided examples.'
  id: totrans-318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**结果和** **意义**：通过使用ICL，智能体成功地进行了细微的分析，并生成了一个结构化、非常有用的输出，而无需对其LLM的权重进行任何持久性更改。对于这次特定的交互，它“学习”了从提供的示例中。'
- en: The product team can now easily ingest this JSON output into their databases
    to track feedback per feature. If the next review requires a different type of
    analysis, the agent can construct a new prompt with different examples, showcasing
    the dynamic adaptability ICL offers.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 产品团队现在可以轻松地将这个JSON输出导入他们的数据库中，以跟踪每个特征的反馈。如果下一个评论需要不同类型的分析，智能体可以构建一个新的提示，包含不同的示例，展示ICL提供的动态适应性。
- en: This end-to-end example demonstrates how ICL allows agents to tackle specific,
    sometimes unanticipated, tasks with greater precision by providing "just-in-time"
    guidance to their LLM core. It's a powerful technique for enhancing agent versatility
    and responsiveness in complex, real-world scenarios.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 这个端到端的示例演示了 ICL 如何通过为其 LLM 核心提供“即时”指导，使代理能够以更高的精度处理特定任务，有时甚至是未预见的任务。这是一种增强代理在复杂、现实世界场景中灵活性和响应性的强大技术。
- en: While ICL does not result in the deep, persistent specialization achieved through
    fine-tuning, it endows agents with a crucial layer of flexibility and immediate
    responsiveness. This makes them more versatile and better able to navigate the
    complexities of dynamic, real-world interactions, often serving as a valuable
    complement to both RAG and fine-tuning strategies.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 ICL 无法像微调那样实现深度持久的专门化，但它赋予了代理一个关键层级的灵活性和即时响应能力。这使得它们更加灵活，能够更好地应对动态、现实世界互动的复杂性，通常作为
    RAG 和微调策略的有价值补充。
- en: 'Whether idx_26822e58an agent''s LLM is adapted through the dynamic provision
    of external knowledge via RAG, through the deep, persistent changes of fine-tuning,
    or via the on-the-fly guidance of ICL, one final consideration is paramount for
    ensuring the agent''s dependability: the grounding of its outputs. This brings
    us to a critical practice for building trustworthy AI.'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 无论代理的 LLM 是通过 RAG 动态提供外部知识、通过深度持久的微调变化，还是通过 ICL 的即时指导进行适应，确保代理的可靠性的一个最终考虑因素至关重要：其输出的
    grounding。这引出了构建可信赖 AI 的一个关键实践。
- en: Grounding the model output
  id: totrans-323
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 建立模型输出的基础
- en: 'Whether an agent''s LLM is adapted through RAG, fine-tuning, or ICL, one final
    practice is essential for idx_39d62f22ensuring its dependability: **grounding**.
    Grounding is the process of systematically connecting the model''s output back
    to verifiable information sources.'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 无论代理的 LLM 是通过 RAG、微调还是 ICL 进行适应，确保其可靠性的一个最终实践是**grounding**。Grounding 是一个将模型输出系统地连接回可验证信息来源的过程。
- en: For AI agents, this is not just a best practice but a critical requirement.
    Because agentic outputs often trigger real-world actions or inform high-stakes
    decisions, a failure in factual accuracy can lead to significant negative consequences,
    from user frustration to operational or financial repercussions.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 AI 代理来说，这不仅仅是一个最佳实践，而是一个关键要求。因为代理的输出往往会触发现实世界的行动或影响高风险决策，事实准确性上的失败可能导致重大负面后果，从用户挫败感到运营或财务影响。
- en: As mentioned, grounding is the critical process of systematically connecting
    the content generated by an LLM to verifiable information sources or established
    facts. This practice significantly bolsters the reliability of the agent's pronouncements
    and actions, and is a key strategy in mitigating the risk of the LLM producing
    hallucinations—outputs that may sound plausible but are incorrect or entirely
    fabricated—or making other unsubstantiated claims.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 正如之前提到的，grounding 是一个关键过程，系统地连接 LLM 生成的内容到可验证的信息来源或既定事实。这种实践显著增强了代理声明和行动的可靠性，并且是减轻
    LLM 产生幻觉（听起来可能合理但实际错误或完全虚构的输出）或做出其他未经证实的声明的关键策略。
- en: For AI agents, the concept of grounding is especially crucial because their
    outputs, whether informational responses or decisions to act, often have direct
    consequences in the real world. An agent that disseminates incorrect information,
    makes decisions based on flawed reasoning, or triggers inappropriate actions can
    lead to significant negative outcomes, ranging from user frustration and loss
    of trust to more severe operational or financial repercussions.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 AI 代理来说，grounding 的概念尤其关键，因为它们的输出，无论是信息性响应还是行动决策，在现实世界中往往会产生直接后果。一个传播错误信息、基于错误推理做出决策或触发不适当行动的代理可能导致严重的负面后果，从用户挫败感和信任丧失到更严重的运营或财务影响。
- en: Achieving effective grounding within agentic systems involves several key techniques
    and design considerations, all aimed at ensuring that the agent operates with
    accurate and reliable information. One fundamental practice is the diligent citing
    of sources and attributions.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 在代理系统中实现有效的 grounding 需要几个关键技术和设计考虑因素，所有这些目标都是为了确保代理能够以准确和可靠的信息进行操作。一项基本实践是勤奋地引用来源和归属。
- en: When an agent provides information, especially if it was retrieved via RAG or
    is based on specific documents, datasets, or internal knowledge bases, it should,
    wherever feasible, offer clear citations or references back to the original source
    material. This transparency is not merely a technical feature; it is fundamental
    for building trust and accountability, as it allows users, auditors, or other
    interconnected systems to readily verify the information and understand its provenance.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 当代理提供信息时，特别是如果它是通过RAG检索或基于特定文档、数据集或内部知识库，它应该尽可能提供清晰的引用或参考回原始资料。这种透明度不仅仅是一个技术特性；它是建立信任和问责制的基础，因为它使用户、审计员或其他互联系统能够轻松验证信息并了解其来源。
- en: Beyond simply referencing retrieved data, robust grounding often requires active
    fact verification and cross-referencing, particularly for critical pieces of information
    that an agent generates or intends to act upon. This is especially important if
    the information is derived from the LLM's own generative capabilities rather than
    being a direct pass-through from a retrieved source. An agent's design can incorporate
    a specific step for such verification, perhaps by programmatically cross-referencing
    a key assertion against one or more trusted external knowledge bases, curated
    databases, or predefined authoritative sources before presenting the information
    or taking a dependent action. Indeed, some sophisticated agent architectures might
    even include a dedicated fact-checking tool or a specialized sub-agent whose sole
    responsibility is this validation task.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 除了简单地引用检索到的数据之外，稳健的扎根通常还需要积极的实际事实验证和交叉引用，特别是对于代理生成或打算采取行动的关键信息。如果信息是从LLM的自身生成能力中提取的，而不是直接从检索来源传递的，这一点尤为重要。代理的设计可以包括一个专门的验证步骤，可能通过程序性地将关键断言与一个或多个受信任的外部知识库、精选数据库或预定义的权威来源进行交叉引用，在提供信息或采取依赖行动之前进行。确实，一些复杂的代理架构甚至可能包括一个专门的核查工具或一个专门子代理，其唯一责任就是这项验证任务。
- en: Another valuable idx_31313d67technique involves leveraging confidence scores
    that more advanced LLMs, or the platforms serving them, may provide in association
    with their generated assertions or predictions. Agents can be programmed to interpret
    these scores and modulate their behavior at runtime/inference-time, accordingly.
    For instance, if an agent's LLM expresses low confidence in an answer it has formulated
    or a piece of information it intends to use, the agent might be designed to respond
    more cautiously.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种有价值的技巧是利用更先进的LLM或为其服务的平台可能与其生成的断言或预测一起提供的置信度分数。代理可以被编程来解释这些分数，并在运行时/推理时相应地调整其行为。例如，如果一个代理的LLM对其制定的答案或打算使用的某条信息表示信心不足，该代理可能被设计成更加谨慎地回应。
- en: This could manifest as an explicit statement of uncertainty (e.g., "I'm not
    entirely certain about this, but one possibility is...") or it could trigger an
    automated process to seek further validation from an alternative source as a tool
    call, or even escalate the query to a human expert for review before proceeding.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能表现为对不确定性的明确陈述（例如，“我对这一点并不完全确定，但一种可能性是...”）或者可能触发一个自动化的过程，通过工具调用从另一个来源寻求进一步的验证，或者甚至在继续之前将查询升级到人类专家进行审查。
- en: Effective grounding also extends to the agent's own interpretive processes through
    proactive ambiguity reduction. This means ensuring that the agent's own understanding
    of a given query, instruction, or perceived environmental state is accurate and
    unambiguous before it proceeds to generate a response or formulate a plan. If
    an agent receives an input that is vague or open to multiple interpretations,
    a well-grounded agent will be designed to ask clarifying questions.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的扎根也扩展到代理自身的解释过程，通过主动减少歧义。这意味着在代理生成响应或制定计划之前，确保代理对给定查询、指令或感知的环境状态的自身理解是准确且无歧义的。如果一个代理接收到模糊或可作多种解释的输入，一个有良好基础的代理将被设计成提出澄清问题。
- en: This preemptive grounding of its own interpretation is crucial as it helps prevent
    a cascade of downstream errors that could easily arise from acting on misunderstood
    premises.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对其自身解释的先发扎根至关重要，因为它有助于防止由于基于误解的前提而可能轻易出现的下游错误连锁反应。
- en: Grounding is not just a technical process; it's the cornerstone of building
    responsible and reliable AI agents. It helps to ensure that as agents become more
    autonomous, their actions and communications remain rooted in verifiable reality.
    Techniques like RAG inherently support grounding by linking outputs to retrieved
    documents. Fine-tuning can also contribute by training models to be more fact-aware
    within specific domains.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 扎根不仅仅是一个技术过程；它是构建负责任和可靠的AI代理的基石。它有助于确保随着代理变得更加自主，他们的行动和沟通始终根植于可验证的现实。像RAG这样的技术通过将输出链接到检索到的文档来内在地支持扎根。微调也可以通过训练模型在特定领域内更注重事实来做出贡献。
- en: By employing a combination of dynamic contextual enhancement through RAG, deep
    specialization via fine-tuning, flexible adaptation with ICL, and robust grounding
    practices, we can develop LLMs that are truly agent-ready, that is, they are capable
    of powering intelligent, reliable, and adaptable AI agents.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合RAG实现的动态上下文增强、通过微调实现的深度专业化、通过ICL实现的灵活适应以及稳健的扎根实践，我们可以开发出真正适合代理的LLM，也就是说，它们能够驱动智能、可靠和适应性的AI代理。
- en: 'To further clarify how these grounding practices are applied, the following
    table summarizes each key aspect and its direct relevance to building more dependable
    AI agents:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步阐明这些扎根实践的应用，以下表格总结了每个关键方面及其与构建更可靠的AI代理的直接相关性：
- en: '| **Grounding** **a****spect** | **Description** **and****purpose in agentic
    syste****ms** | **Agent** **i****mplication** **e****xample** |'
  id: totrans-338
  prefs: []
  type: TYPE_TB
  zh: '| **扎根** **a****pect** | **Description** **and****purpose in agentic syste****ms**
    | **Agent** **i****mplication** **e****xample** |'
- en: '| --- | --- | --- |'
  id: totrans-339
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Citing sources and attributions | Agents provide clear references to original
    source material for information they present, especially when retrieved via RAG.
    This idx_2c224e40enhances transparency, allows users or auditors to verify information,
    and builds trust and accountability. | An HR agent, after answering a query about
    the parental leave policy, provides a direct link to the specific section of the
    internal company policy document it referenced. |'
  id: totrans-340
  prefs: []
  type: TYPE_TB
  zh: '| 引用来源和归属 | 代理为其呈现的信息提供清晰的原始资料来源引用，尤其是当通过RAG检索时。这增强了透明度，使用户或审计员能够验证信息，并建立信任和问责制。
    | 一位人力资源代理，在回答有关产假政策的查询后，提供了指向其引用的内部公司政策文件特定部分的直接链接。 |'
- en: '| Fact verification and cross-referencing | For critical information, particularly
    if internally generated by the LLM rather than directly quoted, the agent programmatically
    cross-references assertions against trusted knowledge bases, databases, or predefined
    authoritative sources before acting or presenting. Some architectures may use
    dedicated fact-checking tools or sub-agents. | Before finalizing a complex order
    configuration suggested by its LLM, a sales assistant agent cross-verifies component
    compatibility against an internal product database. |'
  id: totrans-341
  prefs: []
  type: TYPE_TB
  zh: '| 事实核查与交叉引用 | 对于关键信息，尤其是如果是由LLM内部生成而非直接引用，代理程序在采取行动或展示之前，会程序化地将断言与受信任的知识库、数据库或预定义的权威来源进行交叉引用。某些架构可能使用专门的核查工具或子代理。
    | 在最终确定由其LLM建议的复杂订单配置之前，销售助理代理会与内部产品数据库交叉验证组件兼容性。 |'
- en: '| Leveraging confidence scores | Agents interpret and act upon confidence scores
    that LLMs may provide for their assertions or predictions. Based on the score,
    an agent might proceed, express uncertainty, seek further validation from other
    sources, or escalate the matter to a human expert for review. | A diagnostic support
    agent in a technical field, if its LLM core expresses low confidence (e.g., <70%)
    in a potential fault diagnosis, will flag the diagnosis for mandatory review by
    a senior technician. |'
  id: totrans-342
  prefs: []
  type: TYPE_TB
  zh: '| 利用置信度分数 | 代理解释并对其LLM提供的断言或预测的置信度分数采取行动。根据分数，代理可能会继续进行、表达不确定性、从其他来源寻求进一步验证，或将问题升级给人类专家进行审查。
    | 在技术领域的诊断支持代理，如果其LLM核心对潜在故障诊断的置信度低（例如，<70%），则会标记诊断以强制由高级技术人员进行审查。 |'
- en: '| Proactive ambiguity reduction | The agent ensures that its own understanding
    of a user''s query, instructions, or perceived environmental state is accurate
    and idx_70fecd2eunambiguous before generating a response or formulating a plan.
    This involves the agent asking clarifying questions if the input is vague or open
    to multiple interpretations. | A travel planning agent, when a user says, *Book
    a flight to Springfield soon*, responds with, `Certainly! Which Springfield are
    you referring to, and what dates would you consider ''soon?` before proceeding.
    |'
  id: totrans-343
  prefs: []
  type: TYPE_TB
  zh: '| 积极的模糊性减少 | 代理确保在生成响应或制定计划之前，其对用户查询、指令或感知到的环境状态的自身理解是准确且无歧义的。这涉及到代理在输入模糊或存在多种解释时提出澄清问题。
    | 当用户说，“尽快预订前往斯普林菲尔德的航班”，旅行规划代理会回答，“当然！您指的是哪个斯普林菲尔德，您认为‘尽快’是什么日期？”然后再继续。 |'
- en: Table 3.8 – Key grounding techniques for agentic systems
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3.8 – 代理系统关键基础技术
- en: Employing these grounding techniques systematically is not just a best practice;
    it's essential for developing AI agents that are not only intelligent but also
    responsible, reliable, and aligned with factual reality. This is the basis of
    the *Grounding* *and* *evaluation* phase in the GenAI Maturity Model.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 系统性地采用这些基础技术不仅是一种最佳实践，对于开发既智能又负责任、可靠且与事实现实保持一致的 AI 代理至关重要。这是 GenAI 成熟模型中“基础”和“评估”阶段的基础。
- en: The journey of idx_d5f929d0adapting LLMs is multifaceted, offering a toolkit
    of techniques to transform general-purpose AI into specialized, effective cores
    for intelligent agents. From dynamically infusing real-time context to deeply
    ingraining domain-specific knowledge and behaviors, each method plays a crucial
    role in preparing LLMs for the complexities of agentic tasks.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 适应 LLM 的旅程是多方面的，提供了一系列技术，可以将通用 AI 转变为专门、有效的智能代理核心。从动态注入实时上下文到深入植入特定领域的知识和行为，每种方法都在为
    LLM 准备代理任务的复杂性方面发挥着关键作用。
- en: We've seen how these adaptations are not just enhancements but often necessities
    for building reliable and high-performing AI agents in enterprise settings. To
    consolidate these concepts, let's summarize the key insights from this chapter.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到，这些适应不仅是一种增强，而且在企业环境中构建可靠且高性能的 AI 代理通常是必需的。为了巩固这些概念，让我们总结本章的关键见解。
- en: Summary
  id: totrans-348
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter explored the critical spectrum of techniques for adapting LLMs
    to make them truly agent-ready, moving beyond their generic pretrained capabilities
    to become specialized engines for AI agents. We established that such adaptation
    is vital for enhancing agent performance in specific enterprise domains, improving
    accuracy, reliability, efficiency, and goal alignment.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了将 LLM 适应以使其真正适合代理的关键技术范围，超越了它们的通用预训练能力，成为 AI 代理的专用引擎。我们确定，这种适应对于在特定企业领域提高代理性能、准确性、可靠性和目标一致性至关重要。
- en: 'The key takeaways are as follows:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点如下：
- en: '**The imperative of LLM adaptation**: Generic LLMs, while powerful, require
    tailoring to meet the nuanced demands of specific agentic roles and enterprise
    environments. This adaptation is crucial for unlocking their full potential in
    terms of performance, reliability, and contextual relevance.'
  id: totrans-351
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM 适应的必要性**：虽然通用 LLM 很强大，但需要根据特定代理角色和企业环境的需求进行定制。这种适应对于发挥其在性能、可靠性和上下文相关性方面的全部潜力至关重要。'
- en: '**RAG for dynamic contextualization**: RAG is a powerful method for providing
    agents with timely and relevant external knowledge at the point of inference.
    This improves factual grounding, reduces hallucinations, and enables agents to
    operate with up-to-date or proprietary information, with varying levels of sophistication
    up to and including agentic RAG.'
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RAG 用于动态上下文化**：RAG 是一种强大的方法，可以为代理在推理点提供及时和相关的外部知识。这提高了事实基础，减少了幻觉，并使代理能够使用最新或专有信息进行操作，从简单的代理
    RAG 到更复杂的代理 RAG，具有不同的复杂程度。'
- en: '**Fine-tuning for deep specialization**: Fine-tuning modifies an LLM''s internal
    parameters to instill specific domain knowledge, task-oriented skills, or desired
    behavioral traits. PEFT methods, in particular, offer an efficient way to create
    and manage multiple specialized agent capabilities from a common base model, balancing
    customization with resource management.'
  id: totrans-353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深度专业化的微调**：微调通过修改 LLM 的内部参数来灌输特定领域的知识、面向任务的能力或期望的行为特征。特别是 PEFT 方法提供了一种高效的方式，可以从一个共同的基础模型中创建和管理多个专门的代理能力，平衡定制与资源管理。'
- en: '**ICL for on-demand flexibility**: ICL allows agents to adapt their behavior
    based on examples provided directly within the prompt, without needing model weight
    modifications. This *learning on the* *fly* is invaluable for agents operating
    in dynamic environments or needing to respond to novel instructions or user preferences
    quickly.'
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ICL实现按需灵活性**：ICL允许代理根据提示中直接提供的示例调整其行为，而无需修改模型权重。这种*即时*学习对于在动态环境中运行的代理或需要快速响应新指令或用户偏好的代理来说非常有价值。'
- en: '**Grounding as a pillar of trust**: Grounding model outputs by connecting them
    to verifiable information sources through techniques such as citing sources, fact
    verification, leveraging confidence scores, and proactive ambiguity reduction
    is paramount for ensuring the accuracy, reliability, and trustworthiness of AI
    agents, especially when their actions have real-world consequences.'
  id: totrans-355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接地作为信任的支柱**：通过引用来源、事实核查、利用置信度分数和主动减少歧义等技术，将模型输出与可验证的信息源连接起来，这对于确保人工智能代理的准确性、可靠性和可信度至关重要，尤其是在他们的行为具有现实世界后果的情况下。'
- en: '**A combined approach for agent readiness**: Ultimately, developing truly agent-ready
    LLMs often involves a thoughtful combination of these adaptation strategies: using
    RAG for current context, fine-tuning for core specializations, ICL for immediate
    flexibility, and grounding to ensure dependable outputs.'
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为代理准备的综合方法**：最终，开发真正适合代理的LLM通常涉及这些适应策略的深思熟虑的组合：使用RAG处理当前上下文，微调核心专业化，ICL实现即时灵活性，以及接地以确保可靠的输出。'
- en: These adaptation techniques allow developers to transform powerful LLMs into
    highly effective and reliable intelligence cores, capable of driving sophisticated
    and specialized AI agents.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 这些适应技术允许开发者将强大的LLM转换为高度有效和可靠的智能核心，能够驱动复杂的和专业的AI代理。
- en: Having laid the groundwork in *Part* *1* by understanding the GenAI landscape,
    the essentials of preparing LLMs for agentic roles, and the spectrum of LLM adaptation,
    we are now ready to move into the practical design and construction of these intelligent
    systems. *Part* *2* will build directly upon these foundations.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 在* *第1部分* *中，我们通过了解GenAI的格局、为代理角色准备LLM的基本要素以及LLM适应的范围奠定了基础，现在我们准备进入这些智能系统的实际设计和构建。*
    *第2部分* *将直接基于这些基础。
- en: In *[Chapter 4](Chapter_4.xhtml#h1_83)*, we will explore the detailed anatomy
    of an AI agent and introduce a comprehensive set of design patterns crucial for
    building robust single and multi-agent systems, including those for coordination,
    explainability, robustness, and human-agent interaction. We'll then shift toward
    practical implementation, examining agent frameworks and walking through illustrative
    use cases.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 在*[第4章](Chapter_4.xhtml#h1_83)*中，我们将探讨AI代理的详细结构，并介绍一套全面的设计模式，这些模式对于构建健壮的单代理和多代理系统至关重要，包括协调、可解释性、鲁棒性和人机交互。然后我们将转向实际实施，检查代理框架并介绍一些示例用例。
