  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含收款人详细信息的实时制裁筛查 API
- en: '**RAG** **s****tep 2 (****a****ugment)**: The system retrieves critical, specific
    contextual information:'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**RAG** **s****tep 2 (****a****ugment)**: 系统检索关键、具体上下文信息：'
- en: '**Regulatory** **s****nippet (effective June 1, 2025)**:'
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监管** **s****nippet (effective June 1, 2025)**:'
- en: '[PRE14]'
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**Internal** **policy snipp****et (Bank Policy Manual v3.1.2)**:'
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内部** **policy snipp****et (Bank Policy Manual v3.1.2)**:'
- en: '[PRE15]'
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
