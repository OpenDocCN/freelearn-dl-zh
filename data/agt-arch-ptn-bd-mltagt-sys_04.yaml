- en: '**Sanctions** **check res****ult (as of June 27, 2025)**:'
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制裁** **check res****ult (as of June 27, 2025)**:'
