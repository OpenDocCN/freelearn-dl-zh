  zh: 'DeepMind的AlphaGo: [https://en.wikipedia.org/wiki/AlphaGo#:~:text=AlphaGo%20is%20a%20computer%20program%20that%20plays%20the,version%20that%20competed%20under%20the%20name%20Master.%20%5B3%5D](https://en.wikipedia.org/wiki/AlphaGo#:~:text=AlphaGo%20is%20a%20computer%20program%20that%20plays%20the,version%20that%20competed%20under%20the%20name%20Master.%20%5B3%5D)'
