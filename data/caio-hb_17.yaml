  zh: '17'
- en: Appendix
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录
- en: 'This appendix is designed to be a practical companion, offering essential tools
    and resources to support your journey in leading AI initiatives. Within, you’ll
    find the following:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本附录旨在成为实用的伴侣，提供必要的工具和资源，以支持您在领导人工智能项目中的旅程。其中包含以下内容：
- en: '**Glossary of AI terms**: Clear definitions of key concepts and terminology
    in AI'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能术语表**: 对人工智能中的关键概念和术语的清晰定义。'
- en: '**Recommended readings and resources**: A curated list of books, articles,
    and courses for expanding your AI knowledge'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推荐阅读和资源**: 一份精选的书籍、文章和课程列表，用于扩展您的人工智能知识。'
- en: '**Templates and frameworks**: Ready-to-use tools for developing AI strategies,
    managing projects, and measuring impact effectively'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模板和框架**: 开发人工智能策略、管理项目和有效衡量影响的现成工具。'
- en: These resources aim to equip you with the foundational knowledge and practical
    tools to drive meaningful and impactful AI transformation in your organization.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这些资源旨在为您提供基础知识和实用工具，以推动您组织中有意义且影响深远的人工智能转型。
- en: Glossary of AI terms
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能术语表
- en: 'This glossary defines key terms and concepts in **artificial intelligence**
    (**AI**) relevant to **Chief AI Intelligence Officers** (**CAIOs**) and professionals
    involved in AI strategy and implementation. Use it as a reference to enhance your
    understanding of the AI landscape:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 本词汇表定义了与**首席人工智能情报官（CAIOs**）和参与人工智能战略和实施的专业人员相关的**人工智能（AI**）中的关键术语和概念。将其用作参考，以增强您对人工智能领域的理解：
- en: '**Artificial Intelligence (AI)**: The field focused on creating machines or
    systems that can perform tasks requiring human-like intelligence, such as understanding
    language, recognizing patterns, solving problems, and learning from experience.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能（AI）**: 专注于创建能够执行需要类似人类智能的任务的机器或系统的领域，例如理解语言、识别模式、解决问题和从经验中学习。'
- en: '**Algorithm**: A specific set of step-by-step instructions a computer follows
    to solve a problem or accomplish a task, often used to process data or perform
    calculations.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**算法**: 计算机遵循的特定步骤指令集，用于解决问题或完成任务，通常用于处理数据或执行计算。'
- en: '**Artificial General Intelligence (AGI)**: A theoretical form of AI where a
    machine can understand, learn, and apply knowledge across a wide range of tasks
    at a level comparable to a human being.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通用人工智能（AGI）**: 一种理论形式的人工智能，其中机器可以理解、学习和应用知识，涵盖广泛的任务，其水平与人类相当。'
- en: '**Artificial Neural Network (ANN)**: A computing model inspired by the human
    brain’s neural networks, consisting of interconnected nodes (neurons) that work
    together to process information and recognize patterns within data.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工神经网络（ANN）**: 一种受人类大脑神经网络启发的计算模型，由相互连接的节点（神经元）组成，它们协同工作以处理信息并识别数据中的模式。'
- en: '**Augmented Reality (AR)**: A technology that overlays digital information
    – such as images, sounds, or data – onto the real-world environment, enhancing
    one’s perception of reality through computer-generated inputs.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强现实（AR）**: 一种技术，将数字信息（如图像、声音或数据）叠加到现实世界环境中，通过计算机生成的输入增强对现实的感知。'
- en: '**Big data**: Extremely large and complex datasets that traditional data processing
    applications cannot handle efficiently, characterized by high volume, velocity,
    and variety of information.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大数据**: 极其庞大且复杂的数据集，传统数据处理应用程序无法高效处理，其特征是信息的高容量、速度和多样性。'
- en: '**Bias (algorithmic bias)**: A systematic error in an AI system that leads
    to unfair outcomes, often favoring one group over others due to prejudiced assumptions
    or flawed data.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏差（算法偏差）**: 人工智能系统中的一种系统性错误，导致不公平的结果，通常由于偏见假设或数据有缺陷，导致偏爱某一群体而损害其他群体。'
- en: '**Bot**: A software application that runs automated tasks over the internet,
    often performing repetitive actions much faster than a human could, such as crawling
    websites or simulating conversations.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器人**: 一种在互联网上运行自动化任务的软件应用程序，通常比人类执行重复性动作的速度快得多，例如爬取网站或模拟对话。'
- en: '**Computer vision**: A branch of AI that enables computers to interpret and
    understand visual information from the world, such as images and videos, to make
    decisions or take actions.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算机视觉**: 人工智能的一个分支，使计算机能够从世界解释和理解视觉信息，如图像和视频，以做出决策或采取行动。'
- en: '**Chatbot**: A computer program designed to simulate human conversation, allowing
    users to interact with technology using natural language through text or voice.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天机器人**: 一种旨在模拟人类对话的计算机程序，允许用户通过文本或语音使用自然语言与技术进行交互。'
- en: '**Cloud computing**: The delivery of computing services – such as servers,
    storage, databases, networking, and software – over the internet (“the cloud”),
    providing flexible resources and economies of scale.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**云计算**：通过互联网（“云”）提供计算服务，如服务器、存储、数据库、网络和软件，提供灵活的资源和经济规模。'
- en: '**Data mining**: The process of exploring and analyzing large datasets to discover
    meaningful patterns, correlations, and insights that can inform decision-making.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据挖掘**：探索和分析大型数据集的过程，以发现对决策有指导意义的模式、相关性和见解。'
- en: '**Deep learning**: A subset of machine learning that uses neural networks with
    many layers to model complex patterns in data, enabling tasks such as image and
    speech recognition.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深度学习**：机器学习的一个子集，使用具有许多层的神经网络来模拟数据中的复杂模式，使图像和语音识别等任务成为可能。'
- en: '**Data science**: An interdisciplinary field combining statistics, computer
    science, and domain expertise to extract knowledge and insights from structured
    and unstructured data.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据科学**：一个跨学科领域，结合统计学、计算机科学和领域专业知识，从结构化和非结构化数据中提取知识和见解。'
- en: '**Expert system**: An AI program that emulates the decision-making ability
    of a human expert, using a knowledge base and inference rules to analyze information
    and solve specific problems.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专家系统**：一种人工智能程序，模仿人类专家的决策能力，使用知识库和推理规则来分析信息并解决特定问题。'
- en: '**Edge computing**: A computing paradigm that processes data near the source
    of generation (the “edge” of the network) to reduce latency and bandwidth use,
    improving response times.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**边缘计算**：一种计算范式，在数据生成的源头（网络的“边缘”）处理数据，以减少延迟和带宽使用，提高响应时间。'
- en: '**Feature extraction**: The process of transforming raw data into measurable
    characteristics (features) that can be used for analysis while preserving essential
    information.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征提取**：将原始数据转换为可测量的特征（特征）的过程，这些特征可用于分析，同时保留必要的信息。'
- en: '**Federated learning**: A machine learning approach that trains algorithms
    across multiple decentralized devices holding local data samples without exchanging
    the data itself.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**联邦学习**：一种机器学习方法，在多个持有本地数据样本的分散设备上训练算法，而不交换数据本身。'
- en: '**Generative Adversarial Network (GAN)**: A machine learning framework involving
    two neural networks – a generator and a discriminator – that compete against each
    other to produce increasingly realistic outputs.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成对抗网络（GAN）**：一个机器学习框架，涉及两个相互竞争的神经网络——生成器和判别器——以产生越来越逼真的输出。'
- en: '**Hyperparameter**: A configuration setting used to control the learning process
    of a machine learning model, set before training and not learned from the data.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超参数**：用于控制机器学习模型学习过程的配置设置，在训练之前设置，而不是从数据中学习。'
- en: '**Heuristic**: A problem-solving technique that employs a practical method
    or various shortcuts to produce solutions that may not be perfect but are sufficient
    for reaching an immediate goal.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启发式**：一种问题解决技术，采用实用方法或各种捷径来产生解决方案，这些解决方案可能不是完美的，但对于达到即时目标来说是足够的。'
- en: '**Internet of Things (IoT)**: A network of interconnected physical devices
    embedded with sensors and software, enabling them to collect and exchange data
    over the internet.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**物联网（IoT）**：一个由嵌入传感器和软件的物理设备组成的网络，使它们能够通过互联网收集和交换数据。'
- en: '**Intelligent agent**: An autonomous entity that observes its environment,
    makes decisions, and takes actions to achieve specific goals, often using AI techniques.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能代理**：一个自主实体，它观察其环境，做出决策，并采取行动以实现特定目标，通常使用人工智能技术。'
- en: '**Knowledge representation**: The area of AI focused on representing information
    about the world in a form that a computer system can use to solve complex tasks
    such as reasoning or understanding language.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识表示**：人工智能领域的一个分支，专注于以计算机系统可以用来解决复杂任务（如推理或理解语言）的形式表示关于世界的信息。'
- en: '**K-means clustering**: A method in data analysis that partitions data into
    *k* distinct groups based on feature similarity, aiming to minimize the variance
    within each cluster.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**K-means聚类**：数据分析中的一种方法，根据特征相似性将数据划分为*k*个不同的组，旨在最小化每个簇内的方差。'
- en: '**Machine Learning (ML)**: A subset of AI where algorithms learn from data
    to improve their performance on a specific task over time, without being explicitly
    programmed for each outcome.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习（ML）**：人工智能的一个子集，其中算法从数据中学习以提高其在特定任务上的性能，而不需要对每个结果进行显式编程。'
- en: '**Logistic regression**: A statistical model for predicting a binary outcome’s
    probability (such as yes/no) based on one or more predictor variables.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**逻辑回归**：一种基于一个或多个预测变量的统计模型，用于预测二元结果的概率（如是/否）。'
- en: '**Model overfitting**: A modeling error in machine learning where a model learns
    the training data too well, capturing noise as if it were a true pattern, which
    harms its performance on new data.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型过拟合**：机器学习中的建模错误，其中模型过度学习训练数据，将噪声捕获为真实模式，这损害了其在新数据上的性能。'
- en: '**Machine vision**: The technology and methods used to provide imaging-based
    automatic inspection and analysis, often used in industrial applications for quality
    control.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器视觉**：用于提供基于图像的自动检查和分析的技术和方法，常用于工业应用中的质量控制。'
- en: '**Natural Language Processing (NLP)**: A field of AI that focuses on enabling
    computers to understand, interpret, and generate human language in a valuable
    way.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言处理（NLP）**：人工智能的一个领域，专注于使计算机以有价值的方式理解、解释和生成人类语言。'
- en: '**Neural network**: A computational model composed of interconnected nodes
    (neurons) that process data by responding to inputs and transmitting information
    between layers, inspired by the human brain.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**神经网络**：一种由相互连接的节点（神经元）组成的计算模型，通过响应输入并在层之间传输信息来处理数据，灵感来源于人脑。'
- en: '**Optimization algorithm**: A method used to adjust the parameters of a machine
    learning model to minimize errors and improve performance during training.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化算法**：一种用于调整机器学习模型参数的方法，旨在最小化错误并提高训练过程中的性能。'
- en: '**Ontology**: In AI, a structured framework that represents knowledge as a
    set of concepts within a domain and the relationships between those concepts.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本体**：在人工智能中，一个结构化框架，表示一个领域内的一组概念及其之间的关系。'
- en: '**Predictive analytics**: Techniques that use historical data, statistical
    algorithms, and machine learning to predict future events or outcomes.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测分析**：使用历史数据、统计算法和机器学习来预测未来事件或结果的技术。'
- en: '**Python**: A high-level, versatile programming language known for its readability
    and extensive libraries, widely used in AI and machine learning applications.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python**：一种高级、多用途的编程语言，以其可读性和广泛的库而闻名，在人工智能和机器学习应用中广泛使用。'
- en: '**Quantum computing**: A type of computing that leverages the principles of
    quantum mechanics to process information, potentially solving complex problems
    faster than classical computers.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**量子计算**：一种利用量子力学原理处理信息的方法，有可能比传统计算机更快地解决复杂问题。'
- en: '**Q-learning**: A reinforcement learning algorithm that seeks to learn the
    value of actions in particular states, aiming to find the optimal policy for decision-making.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Q学习**：一种强化学习算法，旨在学习特定状态下的动作价值，旨在找到决策的最优策略。'
- en: '**Reinforcement Learning (RL)**: An area of machine learning where an agent
    learns to make decisions by performing actions and receiving feedback as rewards
    or penalties.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强化学习（RL）**：机器学习的一个领域，其中代理通过执行动作并接收作为奖励或惩罚的反馈来学习做出决策。'
- en: '**Robotics**: The field concerned with the design, construction, operation,
    and use of robots, often integrating computer systems for control and information
    processing.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器人学**：涉及设计、构建、操作和使用机器人的领域，通常将计算机系统集成用于控制和信息处理。'
- en: '**Supervised learning**: A machine learning approach where models are trained
    on labeled data, learning to predict outcomes based on input-output pairs.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监督学习**：一种机器学习方法，模型在标记数据上训练，通过输入-输出对来预测结果。'
- en: '**Swarm intelligence**: The collective behavior of decentralized, self-organized
    systems, often observed in nature, used in AI to solve optimization problems through
    the interaction of simple agents.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**群体智能**：去中心化、自我组织的系统的集体行为，通常在自然界中观察到，在人工智能中用于通过简单代理的交互解决优化问题。'
- en: '**Semantic analysis**: The process of understanding and interpreting the meanings
    of words, phrases, and sentences in context, crucial for language comprehension.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义分析**：理解和解释词语、短语和句子在上下文中的意义的过程，对于语言理解至关重要。'
- en: '**TensorFlow**: An open source software library developed by Google for numerical
    computation and machine learning, particularly suited for building and training
    neural networks.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TensorFlow**：由谷歌开发的开源软件库，用于数值计算和机器学习，特别适合构建和训练神经网络。'
- en: '**Transfer learning**: A machine learning technique where a model developed
    for one task is reused as the starting point for a model on a related task, reducing
    training time.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迁移学习**: 一种机器学习技术，其中为一个任务开发的模型被用作相关任务上模型的起点，从而减少训练时间。'
- en: '**Unsupervised learning**: A type of machine learning that analyzes unlabeled
    data to discover hidden patterns or intrinsic structures without predefined categories
    or labels.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无监督学习**: 一种机器学习方法，分析未标记的数据以发现隐藏的模式或内在结构，没有预定义的类别或标签。'
- en: '**User interface (UI)**: The point of interaction between a user and a computer
    system, encompassing the visual elements and controls designed for effective and
    intuitive use.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户界面 (UI)**: 用户与计算机系统之间交互的点，包括为有效和直观使用而设计的视觉元素和控制。'
- en: '**Virtual reality (VR)**: A simulated experience created by computer technology
    that immerses the user in a virtual environment, often using special equipment
    such as headsets.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**虚拟现实 (VR)**: 由计算机技术创建的模拟体验，将用户沉浸在虚拟环境中，通常使用特殊设备，如头戴式耳机。'
- en: '**Voice recognition**: The capability of a machine or program to identify and
    process spoken language, allowing for voice commands and dictation.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语音识别**: 机器或程序识别和处理语音的能力，允许语音命令和听写。'
- en: '**Weak AI (narrow AI)**: AI systems designed to perform a specific task or
    a limited range of tasks, operating under predefined constraints without consciousness
    or self-awareness.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弱人工智能 (窄人工智能)**: 设计用于执行特定任务或有限范围任务的AI系统，在预定义的约束下运行，没有意识或自我意识。'
- en: '**Word embedding**: A technique in natural language processing where words
    are represented as numerical vectors in a continuous vector space, capturing semantic
    relationships.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**词嵌入**: 自然语言处理中的一种技术，其中单词表示为连续向量空间中的数值向量，捕获语义关系。'
- en: '**Explainable AI (XAI)**: AI systems that provide clear and understandable
    explanations of their decision-making processes to human users.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释人工智能 (XAI)**: 向人类用户提供其决策过程清晰易懂解释的AI系统。'
- en: '**Yield optimization**: The use of AI and analytical methods to maximize outputs
    or efficiency in various industries, such as increasing crop production in agriculture.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产量优化**: 使用AI和分析方法在各种行业中最大化产出或效率，例如在农业中增加作物产量。'
- en: '**Zero-shot learning**: A machine learning scenario where a model is expected
    to recognize and classify data from classes it hasn’t seen during training, using
    knowledge from related information.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零样本学习**: 一种机器学习场景，其中模型预期能够识别和分类在训练期间未见过的类别的数据，使用相关信息的知识。'
- en: 'Here are a few additional terms:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些额外的术语：
- en: '**Application Programming Interface (API)**: A collection of protocols and
    tools that allows different software applications to communicate with each other,
    enabling developers to build programs that can access features or data from other
    operating systems, applications, or services.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用程序编程接口 (API)**: 一组协议和工具，允许不同的软件应用程序相互通信，使开发者能够构建能够访问其他操作系统、应用程序或服务功能或数据的程序。'
- en: '**Backpropagation**: A learning algorithm used in neural networks where errors
    are propagated backward through the system to adjust the weights of connections,
    helping the model learn by minimizing the difference between predicted and actual
    outputs.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反向传播**: 一种在神经网络中使用的学习算法，其中错误通过系统反向传播以调整连接的权重，通过最小化预测输出和实际输出之间的差异来帮助模型学习。'
- en: '**Cognitive computing**: Technology designed to replicate human thought processes
    in a computerized model, enabling systems to simulate reasoning, learning, and
    decision-making similar to the human mind.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**认知计算**: 设计用于在计算机化模型中复制人类思维过程的技术，使系统能够模拟推理、学习和决策，类似于人脑。'
- en: '**Data lake**: A large storage repository that holds vast amounts of raw data
    in its original format, keeping it available for future processing and analysis
    as needed.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据湖**: 一个大型存储库，以原始格式存储大量原始数据，根据需要保留以供未来的处理和分析。'
- en: '**Ethical AI**: The practice of developing and implementing artificial intelligence
    systems in ways that prioritize fairness, accountability, transparency, and adherence
    to human values and ethical principles.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**伦理人工智能**: 开发和实施人工智能系统的方式，优先考虑公平性、问责制、透明度和遵守人类价值观和伦理原则。'
- en: '**Hyperparameter tuning**: The process of optimizing the settings that control
    how a machine learning model learns, known as hyperparameters, to improve its
    performance on a given task.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超参数调整**: 优化控制机器学习模型学习过程设置的流程，称为超参数，以提高其在特定任务上的性能。'
- en: '**Intelligent automation**: Combining artificial intelligence with automation
    technologies to perform tasks that previously required human intelligence, enhancing
    efficiency and decision-making processes.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能自动化**: 将人工智能与自动化技术相结合，以执行以前需要人类智能的任务，提高效率和决策过程。'
- en: '**K-Nearest Neighbors (KNN)**: A straightforward, supervised machine learning
    algorithm used for classification and regression, which predicts outcomes based
    on the closest data points in the feature space.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**K-最近邻 (KNN)**: 一种简单直观的监督机器学习算法，用于分类和回归，它根据特征空间中最近的数据点预测结果。'
- en: '**Latent Dirichlet Allocation (LDA)**: A statistical method that uncovers hidden
    thematic structures in large sets of data, such as grouping similar topics within
    a collection of documents by analyzing word patterns.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**潜在狄利克雷分配 (LDA)**: 一种统计方法，通过分析词模式来揭示大量数据集中的隐藏主题结构，例如通过分析文档集中的词模式将相似主题分组。'
- en: '**Monte Carlo simulation**: A computational technique that uses random sampling
    and statistical modeling to estimate mathematical functions and predict the behavior
    of complex systems under uncertainty.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蒙特卡洛模拟**: 一种计算技术，使用随机抽样和统计建模来估计数学函数，并预测在不确定性下复杂系统的行为。'
- en: '**Natural Language Generation (NLG**): The use of artificial intelligence to
    automatically produce human-like written or spoken narratives from structured
    data.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言生成 (NLG)**: 利用人工智能自动从结构化数据生成类似人类的书面或口头叙述。'
- en: '**Ontology engineering**: The field dedicated to designing and managing ontologies,
    which are formal representations of a set of concepts within a domain and the
    relationships between those concepts, to facilitate better data integration and
    understanding.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本体工程**: 专注于设计和管理本体的领域，本体是领域内一组概念的正式表示以及这些概念之间的关系，以促进更好的数据集成和理解。'
- en: '**Predictive modeling**: Developing and testing mathematical models that use
    historical data to forecast future events or trends.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测建模**: 开发和测试使用历史数据来预测未来事件或趋势的数学模型。'
- en: '**Quantum machine learning**: An emerging field that integrates quantum computing
    algorithms with machine learning techniques to potentially solve complex problems
    more efficiently than classical computers.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**量子机器学习**: 一个新兴领域，将量子计算算法与机器学习技术相结合，有可能比传统计算机更有效地解决复杂问题。'
- en: '**Recurrent Neural Network (RNN)**: A type of neural network where connections
    between nodes form directed cycles, allowing the network to maintain a memory
    of previous inputs and making it effective for sequential data processing.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**循环神经网络 (RNN)**: 一种神经网络，其中节点之间的连接形成有向循环，使网络能够保持对先前输入的记忆，使其在序列数据处理中非常有效。'
- en: '**Support Vector Machine (SVM)**: A supervised learning model that analyzes
    data for classification and regression tasks by finding the optimal boundary that
    separates different classes in the dataset.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持向量机 (SVM)**: 一种监督学习模型，通过寻找数据集中不同类别的最佳边界来分析数据，用于分类和回归任务。'
- en: '**Tokenization**: The process of breaking down text into smaller units called
    tokens – such as words, phrases, or symbols – for easier analysis in natural language
    processing tasks.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分词**: 将文本分解成更小的单元，称为标记（token）——例如单词、短语或符号——以便在自然语言处理任务中更容易分析。'
- en: '**Underfitting**: A situation where a machine learning model is too simple
    to capture the underlying structure of the data, leading to poor performance on
    both training and new, unseen data.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欠拟合**: 一种情况，其中机器学习模型过于简单，无法捕捉数据的潜在结构，导致在训练和新的、未见过的数据上表现不佳。'
- en: '**Validation set**: A subset of data used during model training to evaluate
    and fine-tune the model’s parameters, helping to prevent overfitting and improve
    its ability to generalize to new data.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证集**: 在模型训练期间使用的数据子集，用于评估和微调模型的参数，有助于防止过拟合并提高其对新数据的泛化能力。'
- en: Recommended readings and resources
  id: totrans-82
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 推荐阅读和资源
- en: This section provides a curated list of books, articles, courses, websites,
    and other resources to enhance your understanding of artificial intelligence and
    its strategic implementation. These materials are valuable for CAIOs and professionals
    involved in AI leadership roles.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 本节提供了一系列精选的书籍、文章、课程、网站和其他资源，以增强您对人工智能及其战略实施的理解。这些材料对CAIOs和参与人工智能领导角色的专业人士非常有价值。
- en: Books
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 书籍
- en: '*Artificial Intelligence: A Modern Approach* by Stuart Russell and Peter Norvig:
    A comprehensive textbook covering the theory and practice of AI, suitable for
    both beginners and experienced practitioners.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能：现代方法* by Stuart Russell 和 Peter Norvig：一本全面的人工智能理论与实践教科书，适合初学者和经验丰富的从业者。'
- en: '*Prediction Machines: The Simple Economics of Artificial Intelligence* by Ajay
    Agrawal, Joshua Gans, and Avi Goldfarb: Explores the economic implications of
    AI and how it affects business decisions and strategy.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*预测机器：人工智能的简单经济学* by Ajay Agrawal, Joshua Gans, 和 Avi Goldfarb：探讨了人工智能的经济影响以及它如何影响商业决策和战略。'
- en: '*Human + Machine: Reimagining Work in the Age of AI* by Paul R. Daugherty and
    H. James Wilson: Discusses how AI technologies are transforming business processes
    and the future of work.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人机协作：人工智能时代的工作重塑* by Paul R. Daugherty 和 H. James Wilson：讨论了人工智能技术如何改变业务流程和工作的未来。'
- en: '*Applied Artificial Intelligence: A Handbook for Business Leaders* by Mariya
    Yao, Adelyn Zhou, and Marlene Jia: Provides practical guidance on implementing
    AI solutions in business settings.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*应用于商业领导者的人工智能：商业环境中人工智能解决方案的手册* by Mariya Yao, Adelyn Zhou 和 Marlene Jia：提供了在商业环境中实施人工智能解决方案的实用指导。'
- en: '*The Master Algorithm* by Pedro Domingos: An accessible introduction to machine
    learning and its impact on various industries.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*主算法* by Pedro Domingos：对机器学习和其对各行业影响的易于理解的介绍。'
- en: '*AI Superpowers: China, Silicon Valley, and the New World Order* by Kai-Fu
    Lee: Analyzes the competitive landscape of AI development between China and the
    United States.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能超级力量：中国、硅谷和新的世界秩序* by Kai-Fu Lee：分析了中国和美国之间人工智能发展的竞争格局。'
- en: Academic papers and articles
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学术论文和文章
- en: '*Building the AI-Powered Organization* by Tim Fountaine, Brian McCarthy, and
    Tamim Saleh (Harvard Business Review): Discusses strategies for integrating AI
    into organizational structures effectively.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*构建人工智能驱动组织* by Tim Fountaine, Brian McCarthy 和 Tamim Saleh (哈佛商业评论)：讨论了有效整合人工智能到组织结构中的策略。'
- en: '*The Future of Employment: How* *susceptible are jobs to computerisation**?*
    by Carl Benedikt Frey and Michael A. Osborne: Investigates the potential impact
    of AI on the labor market and job automation.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*就业的未来：工作对计算机化的* *敏感性如何**？* by Carl Benedikt Frey 和 Michael A. Osborne：调查了人工智能对劳动力市场和自动化就业的潜在影响。'
- en: '*Artificial Intelligence and Life in 2030* (One Hundred Year Study on Artificial
    Intelligence): Examines the potential societal impacts of AI over the next decade.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*2030年人工智能与生活* (人工智能百年研究)：考察了未来十年人工智能对社会可能产生的影响。'
- en: Online courses and tutorials
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在线课程和教程
- en: '*Machine Learning* by Andrew Ng (Coursera): A foundational course covering
    key concepts in machine learning, including supervised and unsupervised learning.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*机器学习* by Andrew Ng (Coursera)：一门基础课程，涵盖了机器学习的关键概念，包括监督学习和无监督学习。'
- en: '*Deep Learning Specialization* by Andrew Ng (Coursera): An in-depth series
    on deep learning techniques and applications, including neural networks and sequence
    models.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*深度学习专业课程* by Andrew Ng (Coursera)：深入探讨了深度学习技术和应用，包括神经网络和序列模型。'
- en: '*AI for Everyone* by Andrew Ng (Coursera): Designed for non-technical professionals
    to understand AI technologies and their business implications.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能：人人皆可* by Andrew Ng (Coursera)：专为非技术专业人士设计，以理解人工智能技术及其商业影响。'
- en: '*Introduction to Artificial Intelligence (AI)* by IBM (edX): Provides an overview
    of AI concepts, including machine learning and neural networks.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能（AI）简介* by IBM (edX)：概述了人工智能的概念，包括机器学习和神经网络。'
- en: '*Elements of AI* (University of Helsinki): A free online course aimed at demystifying
    AI for the general public and professionals.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*人工智能元素* (赫尔辛基大学)：一门面向公众和专业人士的免费在线课程，旨在揭开人工智能的神秘面纱。'
- en: Websites and blogs
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网站和博客
- en: '*OpenAI Blog*: Features research updates, insights, and discussions on AI advancements.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*OpenAI 博客*：展示研究更新、见解和关于人工智能进步的讨论。'
- en: '*MIT Technology Review – AI Section*: Covers the latest news and analysis on
    AI technologies and their societal impact.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*麻省理工学院技术评论 – 人工智能部分*：涵盖了人工智能技术及其社会影响的最新新闻和分析。'
- en: '*AI Trends*: Provides industry news, case studies, and insights into AI applications
    across various sectors.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*AI趋势*：提供行业新闻、案例研究和关于人工智能在各行各业应用的见解。'
- en: '*Towards Data Science*: A platform for sharing ideas and learning about data
    science, machine learning, and AI.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*数据科学之路*：一个分享想法和学习数据科学、机器学习和人工智能的平台。'
- en: '*KDnuggets*: Offers tutorials, opinions, and resources in AI, data science,
    and machine learning.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*KDnuggets*：提供人工智能、数据科学和机器学习的教程、观点和资源。'
- en: Professional organizations and communities
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 专业组织和社区
- en: '**Association for the Advancement of Artificial Intelligence (AAAI)**: A scientific
    society dedicated to advancing the understanding of AI.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能推进协会（AAAI）**：一个致力于推进人工智能理解的科学协会。'
- en: '**IEEE Computational Intelligence Society**: Focuses on the theory, design,
    application, and development of biologically and linguistically motivated computational
    paradigms.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IEEE计算智能学会**：专注于生物和语言启发计算范式的理论、设计、应用和发展。'
- en: '**Artificial Intelligence Group on LinkedIn**: An online community for professionals
    to discuss AI trends, challenges, and networking opportunities.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LinkedIn的人工智能小组**：一个在线社区，供专业人士讨论人工智能趋势、挑战和网络机会。'
- en: '**International Joint Conferences on Artificial Intelligence (IJCAI)**: Promotes
    global AI research and collaboration through conferences and publications.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**国际人工智能联合会议（IJCAI）**：通过会议和出版物促进全球人工智能研究和合作。'
- en: Conferences and events
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 会议和活动
- en: '**NeurIPS (Neural Information Processing Systems)**: A premier conference on
    machine learning and computational neuroscience.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NeurIPS（神经信息处理系统）**：机器学习和计算神经科学的顶级会议。'
- en: '**International Conference on Machine Learning (ICML)**: Focuses on all aspects
    of machine learning, from theoretical advances to practical applications.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**国际机器学习会议（ICML）**：关注机器学习的各个方面，从理论进步到实际应用。'
- en: '**AI Summit Series**: A global series of events bringing together AI innovators
    and practitioners across industries.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI峰会系列**：一个全球性活动系列，汇集来自各行各业的AI创新者和从业者。'
- en: '**AAAI Conference on Artificial Intelligence**: Showcases the latest research
    and developments in AI from academia and industry.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AAAI人工智能会议**：展示了学术界和工业界在人工智能领域的最新研究成果和发展。'
- en: Podcasts and videos
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 播客和视频
- en: '**The AI Podcast** by NVIDIA: Features interviews with AI researchers and practitioners
    discussing the latest trends and breakthroughs.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NVIDIA的AI播客**：特色是采访人工智能研究人员和从业者，讨论最新的趋势和突破。'
- en: '**Artificial Intelligence** playlist by TED Talks: A collection of talks exploring
    various facets of AI, ethics, and its impact on society.'
  id: totrans-119
  prefs:
  - PREF_UL
