- en: '1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: Understanding the AI Revolution
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解AI革命
- en: 'Did you ever check your favorite social media app only to find your feed flooded
    with headlines like:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否曾检查过你最喜欢的社交媒体应用，却发现你的动态被像以下这样的标题充斥：
- en: '*RIP product designers.*'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*产品设计师，再见。*'
- en: '*This AI side hustle makes $1,579/day.*'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*这个AI副业每天能赚1,579美元。*'
- en: '*This new AI will replace software engineers.*'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*这个新的AI将取代软件工程师。*'
- en: At least in my AI bubble, that’s what my feed looks like every day. A new model
    here. Another revolution there. Given the buzz on the web, you would bet your
    house that the AI revolution is in full swing.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 至少在我的AI泡沫中，我的动态每天看起来都是这样。这里有一个新模型，那里又有一个革命。鉴于网上的热议，你可能会打赌AI革命正在进行中。
- en: However, my last few years of AI consulting have taught me that the reality
    is quite different. AI adoption remains a challenge and the vast majority of business
    leaders struggle to bring their (expensive) AI prototypes to (even more expensive)
    production scenarios.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我过去几年在AI咨询中的经历告诉我，现实情况完全不同。AI的采用仍然是一个挑战，绝大多数的商业领袖都难以将他们的（昂贵的）AI原型带入（更加昂贵的）生产场景。
- en: Here’s how a typical AI project runs for a typical, mid-sized, established B2B
    company.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是典型中等规模、成熟B2B公司的典型AI项目是如何运行的。
- en: The company hears about the potential of AI in optimizing a given process and
    decides to invest in an AI solution. They engage an IT consulting firm, which
    charges them $15,000 for an *AI strategy* deck. The deck outlines a vision of
    how AI could transform their business over the next 10 years in fluffy words.
    Excited by this vision, the CEO greenlights a prototype project. The consulting
    firm charges another $20,000 to develop a basic proof of concept using some historical
    (or perhaps even made-up) data. The prototype shows promising results and now
    everyone gets really excited.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 公司了解到AI在优化特定流程方面的潜力，并决定投资AI解决方案。他们聘请了一家IT咨询公司，该公司向他们收取了15,000美元的*AI战略*提案费用。提案用模糊的语言概述了AI如何在未来10年内改变他们的业务。CEO被这个愿景所鼓舞，批准了一个原型项目。咨询公司又收取了20,000美元，使用一些历史数据（或甚至可能是虚构的数据）开发一个基本的验证概念。原型显示出有希望的结果，现在每个人都非常兴奋。
- en: But then comes the reality check. To put this prototype into production, the
    company needs to integrate the AI solution with its existing system landscape,
    which requires significant customization and new data pipelines. They would also
    need to train their staff on how to use and interpret the AI predictions. And
    finally, they would need to establish governance processes to monitor and maintain
    the AI system over time. With all these requirements in mind, the consulting firm
    presents a quote for this production implementation that is around 10 times the
    cost of the prototype.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但接下来是现实检查。要将这个原型投入生产，公司需要将其AI解决方案与其现有的系统景观集成，这需要重大的定制和新数据管道。他们还需要培训员工如何使用和解读AI预测。最后，他们还需要建立治理流程来监控和维护AI系统。考虑到所有这些要求，咨询公司为这次生产实施提供的报价大约是原型的10倍。
- en: The CEO no longer greenlights the project. Instead, they want to see a detailed
    ROI breakdown and proof that the solution will actually work as expected. Neither
    ever happens; the project stalls and becomes another casualty of what I call the
    *prototyping trap*.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: CEO不再批准项目。相反，他们想要看到一个详细的回报率分解，并证明解决方案实际上会按预期工作。这两者都没有发生；项目停滞不前，成为我所说的*原型陷阱*的另一个受害者。
- en: This scenario is all too common. A survey by Gartner found that only 53% of
    AI prototypes make it to production. The rest get stuck in this *innovation theater*,
    where companies can point to their AI experiments as evidence of their digital
    transformation efforts but fail to translate these experiments into tangible business
    value.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情况太常见了。Gartner的一项调查显示，只有53%的AI原型能够进入生产阶段。其余的都陷入了这种*创新剧场*，公司可以将他们的AI实验作为其数字化转型努力的证据，但无法将这些实验转化为实际的商业价值。
- en: So while companies are trying to figure it out, the hype around AI has filled
    the pockets of large IT consulting firms. Accenture predicted $900 million in
    additional revenue in a single quarter due to AI. BCG expected **Generative AI
    (GenAI)** to contribute 20% of its revenue in 2024\. For McKinsey, AI was the
    top driver for business growth in 2024\. These firms have capitalized on the AI
    gold rush, offering their (often expensive) services to help companies navigate
    the complex landscape of AI adoption.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当公司在试图弄清楚这一切时，围绕人工智能的炒作让大型IT咨询公司的口袋鼓了起来。埃森哲预测，仅一个季度内，人工智能将带来9亿美元的收入。BCG预计**生成式人工智能（GenAI）**将在2024年贡献其20%的收入。对于麦肯锡来说，人工智能是2024年业务增长的主要驱动力。这些公司利用了人工智能淘金热，向公司提供（通常价格昂贵）的服务，帮助他们导航人工智能应用的复杂领域。
- en: But for many companies, the reality of AI adoption has been a sobering experience.
    When ChatGPT launched in late 2022, it felt as if AI development suddenly accelerated
    at an unimaginable pace. GPT-4’s release in March 2023 set expectations sky-high
    for what was to come. Many anticipated that even more powerful models would quickly
    emerge, AI development would become unstoppable, and AI would rapidly transform
    every industry. The hype created an atmosphere of both excitement and fear, with
    many feeling that they were on the cusp of a transformation they couldn’t control.
    (Does anyone still remember the big call to pause AI development?)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于许多公司来说，人工智能应用的现实情况是一次令人清醒的经历。当ChatGPT在2022年底推出时，感觉人工智能的发展突然以难以想象的速度加速。2023年3月GPT-4的发布，对即将到来的事物设定了极高的期望。许多人预计，更强大的模型将迅速出现，人工智能的发展将变得不可阻挡，人工智能将迅速改变每个行业。这种炒作创造了一种既兴奋又恐惧的氛围，许多人感觉他们正处于一个他们无法控制的变化的边缘。（还有谁记得暂停人工智能发展的那次重大呼吁？）
- en: But the reality of AI’s impact has been quite different from these big expectations.
    The gap between the AI revolution we were promised and the one that’s actually
    unfolding is significant, and understanding this gap is crucial for navigating
    the true AI landscape.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 但人工智能影响的现实情况与这些巨大的期望相去甚远。我们所承诺的人工智能革命与实际正在展开的革命之间存在显著的差距，理解这个差距对于导航真实的人工智能领域至关重要。
- en: When we dig deeper into the state of AI adoption, we find a paradox.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们深入挖掘人工智能应用的状态时，我们发现了一个悖论。
- en: According to McKinsey, AI adoption in enterprises has surged from 33% in 2023
    to 65% in 2024\. On the surface, this looks like an impressive leap. But when
    we look at the depth of adoption, we see a different picture. Only 8% of companies
    have adopted AI in more than five business functions. The vast majority are only
    scratching the surface of AI’s potential.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 根据麦肯锡的数据，2023年企业中的人工智能应用从33%激增到2024年的65%。从表面上看，这似乎是一个令人印象深刻的飞跃。但当我们观察应用的深度时，我们看到的是另一幅景象。只有8%的公司在超过五个业务功能中应用了人工智能。绝大多数公司只是触及了人工智能潜力的表面。
- en: This shallow adoption is, to a large part, because of the *prototyping trap*
    I outlined above. It keeps companies stuck in the experimentation phase with AI.
    They’ve invested in pilots and proofs of concept, but struggle to scale these
    use cases to production. Even companies that have successfully navigated (or bought
    their way out of) the prototyping trap are not immune to setbacks.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这种浅层应用在很大程度上是由于我上面概述的**原型陷阱**。它使公司陷入人工智能的实验阶段。他们投资了试点项目和概念验证，但难以将这些用例扩展到生产阶段。即使成功导航（或通过购买方式摆脱）原型陷阱的公司也不是没有遭遇挫折。
- en: McDonald’s launched an automated chatbot that it had to pull back in 2024 following
    a viral TikTok video that highlighted errors, such as adding bacon to ice cream,
    mistakenly ordering hundreds of dollars worth of chicken nuggets, and confusing
    caramel ice cream with multiple stacks of butter.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 麦当劳推出了一款自动聊天机器人，2024年因一个在TikTok上引发病毒的视频而不得不撤回，该视频突出了错误，例如将培根加到冰淇淋中，错误地订购了价值数百美元的鸡块，以及将焦糖冰淇淋与多层黄油混淆。
- en: A similar case happened to Air Canada, which decided to pull back its AI customer
    support chatbot after needing to take legal responsibility for the wrong answers
    this chatbot gave to a customer.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 加拿大航空也遭遇了类似的情况，该公司在需要为聊天机器人向客户提供的错误答案承担法律责任后，决定撤回其AI客户支持聊天机器人。
- en: And it’s not only chatbots. Back in 2021, the real estate platform Zillow shut
    down its AI-powered service **Zillow Offers** after its bad predictions contributed
    to a $500m loss and 2,000 laid-off employees.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 而这不仅仅是聊天机器人。回溯到2021年，房地产平台Zillow在其AI驱动的服务**Zillow Offers**因预测失误导致5亿美元损失和2000名员工被裁后，关闭了这项服务。
- en: Case studies like this have led to growing skepticism and, in some cases, budget
    cuts for AI initiatives. Gartner calls this the *trough of disillusionment* -
    the phase where initial hype gives way to disappointment as the technology fails
    to meet inflated expectations.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的案例研究导致了人们对人工智能项目的日益怀疑，在某些情况下，甚至削减了人工智能项目的预算。Gartner将其称为*幻灭的低谷*——这个阶段，最初的炒作让位于失望，因为技术未能满足膨胀的期望。
- en: These challenges stem from several factors. We will further explore these throughout
    this book. But one of the most important reasons for gap between expectations
    and reality is that organizations lack the maturity to effectively adopt AI. They
    face hurdles on both the technical front, such as data quality and infrastructure
    readiness, and the non-technical front, particularly in terms of culture and skills.
    A survey by IBM found that the skills gap is the top barrier to AI adoption, cited
    by 33% of respondents. Besides that, the regulatory landscape around AI is starting
    to take shape, and it’s already impacting implementation, especially in regions
    like the EU. The EU’s AI Act, for example, classifies certain AI systems as *high-risk*
    and subject them to strict requirements around transparency, human oversight,
    and risk management. This adds another layer of complexity and cost to AI adoption.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这些挑战源于几个因素。我们将在本书中进一步探讨这些因素。但造成期望与现实之间差距的最重要原因之一是，组织缺乏有效采用人工智能的成熟度。他们在技术层面，如数据质量和基础设施准备，以及非技术层面，特别是在文化和技能方面，都面临着障碍。IBM的一项调查显示，技能差距是人工智能采用的主要障碍，有33%的受访者提到了这一点。除此之外，围绕人工智能的监管环境正在开始形成，并且已经开始影响实施，尤其是在欧盟等地区。例如，欧盟的人工智能法案将某些人工智能系统归类为*高风险*，并对其透明度、人工监督和风险管理提出了严格的要求。这给人工智能的采用增加了另一层复杂性和成本。
- en: Finally, measuring the progress and impact of AI initiatives remains a challenge.
    Unlike traditional software projects, the ROI of AI can be hard to quantify, especially
    in the short term. This makes it difficult for companies to justify large-scale
    investments in AI.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，衡量人工智能项目进展和影响仍然是一个挑战。与传统的软件项目不同，人工智能的回报率很难量化，尤其是在短期内。这使得公司难以证明在人工智能上的大规模投资是合理的。
- en: So, are AI projects doomed to failure?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，AI项目注定要失败吗？
- en: Absolutely not! But real AI progress often comes in a shape that does not make
    the headlines. For example, biotech company Moderna publicly disclosed that over
    750 AI-powered assistants are used by over 80% of the 5,000 employees in their
    organization to achieve an impact that would otherwise require a team of 100,000
    if they operated in the old biopharmaceutical ways - a huge achievement that was
    left relatively unnoticed compared to other AI *breakthroughs* covered by media.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对不是！但真正的AI进步往往以不会成为头条新闻的形式出现。例如，生物技术公司Moderna公开披露，其组织中有超过80%的5000名员工使用了超过750个AI助手，以实现如果没有采用旧式生物制药方式将需要10万个团队才能达到的影响——这是一个巨大的成就，与媒体报道的其他AI*突破*相比，相对被忽视。
- en: We will explore many more case studies like this throughout this book.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本书中探讨更多这样的案例研究。
- en: But let’s first talk about **Why AI matters for non-tech business leaders?**
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先让我们来谈谈**为什么人工智能对非技术型商业领袖很重要？**
- en: As you’ve seen and will continue to discover - AI adoption isn’t as simple as
    buying a new IT tool. Adopting AI successfully is a journey, and this journey
    must be owned and driven by business leaders, not IT. In the next chapters, we’ll
    explore how IT can be the enabler of AI-powered business transformation but not
    the key driver.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所看到的，你将继续发现——人工智能的采用并不像购买一个新的IT工具那样简单。成功采用人工智能是一次旅程，这次旅程必须由商业领袖拥有和推动，而不是IT部门。在接下来的章节中，我们将探讨IT如何成为AI驱动的业务转型的推动者，而不是关键驱动因素。
- en: Instead, business leaders must take ownership of their AI roadmaps themselves.
    *How will AI impact work in their departments? What processes will be affected?
    How can they ensure every employee is onboard?* *Where’s the profit?* This applies
    to every leader in an organization. AI roadmaps will be needed for marketing,
    legal, manufacturing, operations, and beyond. No one is building these roadmaps
    for these teams unless the business leaders themselves do. Business leaders understand
    the core needs of their area of responsibility - be it a large business unit,
    a small team, or a certain product of the company. While IT and engineering departments
    typically focus on implementation rather than vision, business leaders must bridge
    that gap to ensure AI initiatives align with strategic goals and the practical
    needs of the business.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，企业领导者必须亲自掌握他们的AI路线图。*AI将如何影响他们部门的日常工作？哪些流程会受到冲击？他们如何确保每位员工都参与其中？* *利润在哪里？*
    这适用于组织中的每位领导者。AI路线图将需要应用于市场营销、法律、制造、运营等领域。除非企业领导者亲自制定，否则没有人会为这些团队构建这些路线图。企业领导者了解他们责任领域的核心需求——无论是大型业务单元、小型团队还是公司的特定产品。虽然IT和工程部门通常关注实施而不是愿景，但企业领导者必须弥合这一差距，以确保AI项目与战略目标和业务的实际需求保持一致。
- en: This requires a critical assessment and ongoing iteration along the roadmap.
    This book will guide you in creating and executing such a roadmap. Without ownership
    of your AI roadmap, your company risks being stuck in the *shiny toy* phase-buying
    AI tools and launching small projects that have, at best, a minor impact on the
    business.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要对路线图进行关键评估和持续迭代。这本书将指导你创建和执行这样的路线图。如果没有掌握你的AI路线图，你的公司可能会陷入*花哨玩具*阶段——购买AI工具和启动小型项目，这些项目至多对业务产生轻微影响。
- en: Owning your AI roadmap or failing to do so - will significantly impact your
    business’s competitive position in the market. The world around you is in fast
    motion, so simply maintaining the status quo is no longer enough. If you don’t
    act, you’re effectively falling behind, even if your performance hasn’t changed.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握你的AI路线图或未能做到这一点——将显著影响你在市场上的竞争地位。你周围的世界正在快速发展，所以仅仅维持现状是不够的。如果你不采取行动，即使你的表现没有改变，你实际上也在落后。
- en: This is the insidious nature of AI’s impact on competitiveness. It’s not always
    about dramatic, disruptive innovation. Often, it’s about the accumulation of lots
    of smaller gains across the whole organization in a way that they are compounding
    to a larger benefit, creating a widening gap between the AI haves and have-nots.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是AI对竞争力影响的隐蔽性质。它并不总是关于戏剧性的颠覆性创新。通常，它是在整个组织中积累大量较小的收益，以这种方式它们会累积成更大的利益，从而在拥有AI和没有AI的企业之间形成越来越大的差距。
- en: 'We’ll explore all that in this chapter through the following sections:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本章的以下部分中探讨所有这些内容：
- en: AI’s impact on competitiveness
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI对竞争力的影响
- en: 'The AI advantage: A new force'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI优势：一种新的力量
- en: AI’s impact on competitiveness
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI对竞争力的影响
- en: To understand the impact of AI on competitive dynamics, let’s talk about the
    classic **Five Forces framework** (*Figure 1.1*), which is an excellent lens through
    which to examine these changes.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解AI对竞争动态的影响，让我们来谈谈经典的**五力框架**（*图1.1*），这是一个很好的视角，可以用来审视这些变化。
- en: 'Developed by Harvard Business School professor Michael Porter back in 1979,
    the Five Forces framework is a tool for analyzing the competitive intensity of
    an industry by considering five key forces: the threat of new entrants, the bargaining
    power of suppliers, the bargaining power of buyers, the threat of substitute products
    or services, and the overall rivalry among existing competitors. The more forces
    there are, the harder it is to survive in a given market.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 由哈佛商学院教授迈克尔·波特于1979年开发，五力框架是一个通过考虑五个关键力量来分析行业竞争强度的工具：新进入者的威胁、供应商的议价能力、买家的议价能力、替代产品或服务的威胁以及现有竞争者之间的总体竞争。力量越多，在特定市场中生存就越困难。
- en: '![Figure 1.1: Illustration of Porter’s Five Forces, Wikipedia (https://en.wikipedia.org/wiki/Porter%27s_five_forces_analysis)](img/B31200_01_01.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图1.1：波特五力分析示意图，维基百科（https://en.wikipedia.org/wiki/Porter%27s_five_forces_analysis）](img/B31200_01_01.png)'
- en: 'Figure 1.1: Illustration of Porter’s Five Forces, Wikipedia ([https://en.wikipedia.org/wiki/Porter%27s_five_forces_analysis](https://en.wikipedia.org/wiki/Porter%27s_five_forces_analysis))'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.1：波特五力分析示意图，维基百科 ([https://en.wikipedia.org/wiki/Porter%27s_five_forces_analysis](https://en.wikipedia.org/wiki/Porter%27s_five_forces_analysis))
- en: By understanding how AI is changing each of these forces, we can gain a clearer
    picture of how AI is reshaping competitive landscapes across industries, and the
    potential to drive you (or even better, your competitors) out of business.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解人工智能如何改变这些力量中的每一个，我们可以更清楚地了解人工智能如何重塑各行业的竞争格局，以及推动你（甚至更好的，你的竞争对手）退出市场的潜力。
- en: 'Force 1: Threat of new entrants'
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 力量1：新进入者的威胁
- en: When it comes to the threat of new entrants, AI is a double-edged sword. On
    the one hand, the widespread availability of powerful AI services like GPT-4 and
    open source alternatives has lowered the barrier to entry for new players. Startups
    can now develop sophisticated AI solutions in a matter of weeks that would have
    been beyond imagination just a few years ago, allowing them to compete with more
    established companies on a more level playing field.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到新进入者的威胁时，人工智能是一把双刃剑。一方面，像GPT-4这样的强大人工智能服务和开源替代品的广泛可用性降低了新进入者的进入壁垒。初创公司现在可以在几周内开发出复杂的AI解决方案，这在几年前是无法想象的，这使得它们能够在更加公平的竞争环境中与更成熟的公司竞争。
- en: However, the successful application of AI often requires more than just access
    to the right tools. In many industries, the real value of AI comes from the combination
    of high-quality, proprietary data and skilled personnel who can turn that data
    into valuable insights and products. This is particularly true in many B2B sectors
    like healthcare, finance, and advanced manufacturing, where the data is often
    sensitive, regulated, or technically complex.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，人工智能的成功应用往往需要不仅仅是获得正确的工具。在许多行业中，人工智能的真实价值来自于高质量、专有数据与能够将数据转化为有价值的见解和产品的熟练人员的结合。这在许多B2B领域，如医疗保健、金融和先进制造领域尤为如此，这些领域的数据通常是敏感的、受监管的或技术复杂的。
- en: For new entrants in these industries, acquiring the necessary data and talent
    can be a significant challenge. Established players often have a head start in
    data collection and may have exclusive access to certain data streams. They also
    tend to have deeper pockets for hiring scarce AI talent. As a result, while AI
    has lowered some barriers to entry, it has heightened others.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些行业的新进入者来说，获取必要的数据和人才可能是一个重大的挑战。现有玩家在数据收集方面通常有先发优势，并且可能拥有对某些数据流的独家访问权。他们还倾向于有更深的口袋来聘请稀缺的人工智能人才。因此，尽管人工智能降低了某些进入壁垒，但它也提高了其他壁垒。
- en: 'Force 2: Threat of substitutes'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 力量2：替代品的威胁
- en: In some industries, AI is not just enabling new competitors but also entirely
    new categories of substitutes. This is particularly evident in the creative industries,
    where AI-generated content is starting to compete with human-created work. From
    AI-written articles and scripts to AI-generated images and videos, the range of
    creative tasks that AI can handle is expanding rapidly.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些行业中，人工智能不仅使新的竞争对手出现，而且还产生了全新的替代品类别。这在创意产业中尤为明显，其中人工智能生成的内容开始与人类创作的作品竞争。从AI撰写的文章和剧本到AI生成的图像和视频，人工智能可以处理的创造性任务范围正在迅速扩大。
- en: We’re seeing a similar trend in the service sector, where AI-powered chatbots
    and virtual assistants are augmenting workflows previously done exclusively by
    human workers. These AI agents can handle customer inquiries, provide recommendations,
    and even complete transactions, often at a fraction of the cost of their human
    counterparts.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在服务行业也看到了类似的趋势，其中人工智能驱动的聊天机器人和虚拟助手正在增强以前完全由人类工人完成的工作流程。这些AI代理可以处理客户咨询，提供推荐，甚至完成交易，通常成本仅为人类同行的一小部分。
- en: This trend is likely to have a particularly significant impact on intermediaries
    across a range of industries. Whether it’s travel agents, insurance brokers, real
    estate agents, or even agency business models that don’t connect buyers and sellers
    but talent and clients, all are at risk of being disrupted by entirely new AI
    solutions. If your company currently occupies one of these middleman positions,
    you’re in a market at a high risk of AI disruption.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这种趋势可能会对众多行业的中介产生特别重大的影响。无论是旅行社、保险经纪人、房地产经纪人，还是甚至不连接买家和卖家的代理商业模式，但连接人才和客户，所有这些都可能被全新的AI解决方案所颠覆。如果你的公司目前占据这些中间人位置之一，你将处于一个高度风险的人工智能颠覆的市场中。
- en: 'Force 3: Bargaining power of suppliers'
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 力量3：供应商的议价能力
- en: The impact of AI on supplier power can be significant when a company gains a
    monopoly-like position in a critical AI service. Consider a startup, for example,
    that develops an AI-powered system for optimizing supply chain logistics. By leveraging
    proprietary data from multiple industries, top AI talent, and custom algorithms,
    this company could offer a service that dramatically outperforms traditional logistics
    optimization. As more businesses realize the efficiency gains from this AI service,
    the startup quickly becomes the dominant player in the market, increasing their
    advantage through the continuous feedback loop. They have exclusive access to
    the data, talent, and technology that makes their offering so compelling, creating
    a high barrier to entry for potential competitors. With this level of market power,
    the AI logistics company has significant control over pricing. They can charge
    premium rates, knowing that customers have few alternatives that can match their
    level of performance. If customers can’t absorb these high costs without eroding
    their own competitiveness, their profit margins will suffer. This dynamic gives
    the AI provider a great deal of bargaining power, potentially allowing them to
    capture a large portion of the value they create.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当一家公司在关键人工智能服务中获得类似垄断的地位时，人工智能对供应商权力的影响可能是巨大的。以一个开发人工智能驱动的供应链物流优化系统的初创公司为例，通过利用多个行业的专有数据、顶级人工智能人才和定制算法，这家公司可以提供一种显著优于传统物流优化的服务。随着越来越多的企业意识到这种人工智能服务的效率提升，该初创公司迅速成为市场的主导者，通过持续的反馈循环增加其优势。他们拥有独家访问数据、人才和技术，这使得他们的产品极具吸引力，为潜在竞争者设置了很高的进入壁垒。在这个级别的市场力量下，人工智能物流公司对定价有重大控制权。他们可以收取高额费用，因为他们知道客户很少有其他可以匹配其性能水平的替代方案。如果客户无法吸收这些高成本而不损害其竞争力，他们的利润率将受到影响。这种动态使人工智能提供商获得了巨大的议价能力，可能使他们能够捕获他们创造的大部分价值。
- en: And if you now think that this sounds like a fantasy, then consider the story
    of Celonis, one of Germany’s most valuable AI startups. Celonis has achieved rapid
    growth and a high valuation by providing AI-powered process mining services that
    help companies optimize their operations.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你现在认为这听起来像是一个幻想，那么考虑一下德国最有价值的AI初创公司之一Celonis的故事。Celonis通过提供人工智能驱动的流程挖掘服务，帮助公司优化其运营，实现了快速增长和高估值。
- en: As AI becomes central to competition across industries, managing the bargaining
    power of AI service providers will be a critical strategic challenge.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能在各个行业竞争中的核心地位日益凸显，管理人工智能服务提供商的议价能力将成为一个关键的战略挑战。
- en: 'Force 4: Bargaining power of buyers'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 力量4：买家的议价能力
- en: Let’s shift our focus from suppliers to buyers. In the B2C space, we’ve already
    seen how tools like comparison websites can empower consumers by helping them
    easily find the best deals on everything from insurance to hotels.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将焦点从供应商转移到买家。在B2C领域，我们已经看到了像比较网站这样的工具如何通过帮助消费者轻松找到从保险到酒店的一切最佳交易来赋予消费者权力。
- en: AI has the potential to bring a similar level of transparency to the more complex
    world of B2B transactions. By analyzing vast amounts of data on different vendors
    and their offerings, AI tools could help businesses quickly identify the best
    suppliers for their needs, at the optimal price point.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能有可能将类似的透明度带到更加复杂的B2B交易世界。通过分析不同供应商及其产品的大量数据，人工智能工具可以帮助企业快速识别满足其需求的最佳供应商，并在最佳的价格点上。
- en: This could significantly disrupt traditional procurement processes, which often
    involve lengthy RFP cycles and manual comparisons of different vendors. With AI,
    these processes could be largely automated, with the AI system analyzing hundreds
    of potential suppliers and their nuanced offerings to recommend the optimal choice
    - giving buyers the ability to compare even more vendors and thus effectively
    secure better deals and streamline their purchasing processes. It also means that
    suppliers will need to work harder to differentiate their offerings beyond just
    price and basic feature sets.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能会对传统的采购流程产生重大颠覆，这些流程通常涉及漫长的RFP周期和不同供应商之间的手动比较。有了人工智能，这些流程可以很大程度上实现自动化，人工智能系统分析数百个潜在供应商及其细微的产品提供，以推荐最佳选择——使买家能够比较更多的供应商，从而有效地确保更好的交易并简化他们的采购流程。这也意味着供应商需要更加努力地工作，以在价格和基本功能集之外区分他们的产品。
- en: 'Force 5: Rivalry among existing competitors'
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 力量5：现有竞争者之间的竞争
- en: The impact of AI on rivalry among existing competitors is perhaps the most profound
    and multifaceted of all the five forces. AI is fundamentally reshaping the nature
    of competition in many industries, leading to a new era of AI-driven business
    strategy.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能对现有竞争对手之间竞争的影响可能是所有五种力量中最深刻和最复杂的。人工智能从根本上重塑了许多行业中的竞争性质，引领着一个由人工智能驱动的商业战略新时代。
- en: On one level, AI is enabling companies to achieve unprecedented levels of operational
    efficiency and customer understanding. This is putting pressure on all players
    in a market to adopt AI or risk being left behind.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个层面上，人工智能正在使公司能够实现前所未有的运营效率和客户理解水平。这正在给市场中的所有参与者施加压力，必须采用人工智能，否则可能会被落下。
- en: However, the competitive advantages of AI often accrue disproportionately to
    the companies that understand best how to leverage AI to its fullest and how to
    avoid the biggest pitfalls - which often includes access to the best data and
    talent. This is leading to a widening gap between AI leaders and laggards in many
    industries. The AI frontrunners are able to continually improve their offerings
    and customer relationships, making it harder for rivals to catch up.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，人工智能的竞争优势往往不均衡地积累在那些最能充分利用人工智能并避免最大陷阱的公司——这通常包括获得最佳数据和人才。这导致了许多行业中人工智能领先者和落后者之间的差距不断扩大。人工智能的领跑者能够不断改进他们的产品和服务，使竞争对手更难赶上。
- en: At the same time, the high costs and complexities of AI are driving many companies
    to seek out partnerships and collaborations, even with traditional competitors.
    We’re seeing this in industries like automotive (with companies collaborating
    on autonomous driving technology) and healthcare (with rival firms sharing data
    to improve patient outcomes). These collaborations allow companies to share the
    risks and rewards of AI development.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，人工智能的高成本和复杂性正在驱使许多公司寻求合作伙伴关系和合作，甚至与传统的竞争对手。我们在汽车行业（公司合作开发自动驾驶技术）和医疗保健行业（竞争对手共享数据以改善患者结果）中看到了这一点。这些合作使公司能够分享人工智能发展的风险和回报。
- en: The result is a complex and dynamic competitive landscape where companies must
    balance the imperatives of AI-driven competition (rapid innovation, proprietary
    data and algorithms, and top AI talent) with the potential benefits of AI-driven
    collaboration (shared costs and risks, larger datasets, and combined expertise).
    Navigating this landscape requires a nuanced understanding of the specific competitive
    dynamics in each industry and market - as well as a thorough understanding of
    where AI can give them the greatest competitive edge, where they may need to partner
    with others, and how they can build the internal capabilities and external relationships
    to succeed in an AI-driven world.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个复杂且动态的竞争格局，公司必须平衡人工智能驱动的竞争的必要性（快速创新、专有数据和算法、顶级人工智能人才）与人工智能驱动的合作可能带来的潜在好处（共享成本和风险、更大的数据集和综合专业知识）。在这个格局中导航需要深入了解每个行业和市场的具体竞争动态——以及彻底了解人工智能如何为他们提供最大的竞争优势，他们可能需要与谁合作，以及他们如何构建内部能力和外部关系以在人工智能驱动的世界中取得成功。
- en: Hence, building a sound AI strategy is very important. It’s not just about adopting
    AI tools or hiring AI talent; it’s also about developing a comprehensive roadmap
    that leverages AI to reshape your company’s value proposition, operational model,
    and competitive positioning.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，构建一个健全的人工智能战略非常重要。这不仅仅是采用人工智能工具或雇佣人工智能人才；这还涉及到制定一个全面的路线图，利用人工智能来重塑公司的价值主张、运营模式和竞争定位。
- en: 'The AI advantage: A new force'
  id: totrans-66
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能优势：一种新的力量
- en: Given its impact on the existing forces we’ve seen in the preceding section,
    it’s reasonable to call out AI as a new force in itself. The ability to effectively
    leverage AI is becoming a critical determinant of competitive advantage, cutting
    across all other forces - the AI advantage. This is the essence of the AI revolution.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到其对前一部分中我们看到现有力量的影响，将人工智能称为一种新的力量是合理的。有效地利用人工智能的能力正成为竞争优势的关键决定因素，跨越所有其他力量——人工智能优势。这是人工智能革命的精髓。
- en: '![Figure 1.2: AI as a new force enabling the AI revolution](img/B31200_01_02.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图1.2：人工智能作为推动人工智能革命的新力量](img/B31200_01_02.png)'
- en: 'Figure 1.2: AI as a new force enabling the AI revolution'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.2：人工智能作为推动人工智能革命的新力量
- en: Companies must now consider their AI advantage as a core part of their strategic
    positioning, making sure to remain or regain competitiveness in their respective
    markets. Instead of waiting for a big bang and big tech to figure it out, this
    means building the technical and non-technical readiness over time to effectively
    leverage the opportunities that new AI technology will bring. PwC estimates that
    AI will add $15 trillion to the world’s economy by 2030\. To put that into perspective,
    that’s another EU entering the world map of economic output.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 公司现在必须将他们的AI优势视为其战略定位的核心部分，确保在各自的市场中保持或恢复竞争力。这意味着不是等待大爆炸和科技巨头来解决问题，而是随着时间的推移构建技术和非技术准备，以有效地利用新AI技术带来的机会。普华永道估计，到2030年，AI将为世界经济增加15万亿美元。为了更直观地理解这一点，这意味着另一个欧盟将进入世界经济产出地图。
- en: AI can improve your bottom line through cost savings, higher quality, faster
    processes, and new opportunities to scale. It reduces expenses and waste, increases
    margins and customer loyalty, accelerates decision-making and transactions, and
    enables growth that was previously out of reach. The real power lies in combining
    these effects to generate exponential results. We’ll explore each in depth and
    show how to translate them into measurable business impact.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以通过成本节约、提高质量、加快流程和新的扩展机会来提高你的底线。它减少了开支和浪费，增加了利润和客户忠诚度，加速了决策和交易，并实现了以前难以触及的增长。真正的力量在于将这些效果结合起来，产生指数级的结果。我们将深入探讨每个方面，并展示如何将它们转化为可衡量的商业影响。
- en: 'To be crystal clear: this is a transformation. AI is not just another technological
    advancement; it’s a fundamental shift that’s reshaping our world.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 要非常明确：这是一个变革。AI不仅仅是另一个技术进步；它是一个重塑我们世界的根本性转变。
- en: We’ve seen transformations before. You might have heard *transformation* so
    often before that it now sounds like just another buzzword. But it’s not.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以前见过变革。你可能已经听过“变革”这个词太多次，以至于现在它听起来就像另一个时髦词汇。但事实并非如此。
- en: 'So far, the world has seen three major industrial transformations, each driven
    by disruptive technology:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，世界见证了三次主要的工业变革，每次都是由颠覆性技术驱动的：
- en: Steam power in the 1760s.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1760年代的蒸汽动力。
- en: Electricity and mass production in the early 1900s.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 20世纪初的电力和大规模生产。
- en: Computerization in the late 20th century.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 20世纪末的计算机化。
- en: Today, we’re in the fourth industrial revolution, driven by AI.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们正处于由AI驱动的第四次工业革命中。
- en: The AI transformation is not just about optimizing processes and cutting costs;
    it’s rewriting the rules of work. And if you’re not preparing for it, you’re already
    falling behind. But preparing for AI doesn’t mean firing your workforce and replacing
    them with robots. It doesn’t mean investing millions in infrastructure and praying
    for ROI.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能变革不仅仅是优化流程和削减成本；它正在重新书写工作的规则。如果你没有为它做准备，那么你已经在落后了。但为AI做准备并不意味着解雇你的员工并用机器人取代他们。这也不意味着投资数百万美元的基础设施并祈祷回报率。
- en: In fact, the key to thriving in the age of AI is to double down on your people,
    empower them, and put them in the lead.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，在人工智能时代繁荣的关键是加大对人才的投入，赋权他们，并将他们置于领导地位。
- en: 'Use AI to:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 利用AI：
- en: Give your sales team the insights they need to close more deals, faster.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给你的销售团队提供他们需要的洞察力，以便更快地达成更多交易。
- en: Equip your marketers with the predictive skills to craft campaigns that convert
    like crazy.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的市场营销人员配备预测技能，以制作出转化率极高的营销活动。
- en: Supercharge your customer service with the ability to anticipate needs and exceed
    expectations.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用预测需求并超越期望的能力来超级提升你的客户服务。
- en: You can achieve all this without hiring an armada of data scientists and locking
    them in a room for two years. As we will find out throughout this book, augmenting
    existing workflows with AI is an ideal strategy to enter this space and build
    your very own AI advantage, unique to your business.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以不雇佣一支数据科学家大军并将他们锁在房间里两年时间就实现所有这些。正如我们将在整本书中了解到的那样，通过AI增强现有工作流程是进入这个领域并建立你自己的、独特的AI优势的理想策略，这种优势属于你的业务。
- en: Summary
  id: totrans-86
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'The AI revolution is not the sudden, seismic shift that was promised. It’s
    a more gradual, uneven process of technological diffusion and organizational adaptation.
    And it’s less about robotic overlords and flashy demonstrations of tech giants
    but in the everyday operational trenches of businesses across all industries.
    As Moderna’s CIO Brad Miller says:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能革命并非如人们所承诺的那样突然、剧烈的变革。它是一个更加渐进、不均衡的技术扩散和组织适应过程。它更多地关乎各行各业企业日常运营的战壕，而不是机器人霸主或科技巨头的炫目演示。正如Moderna公司的首席信息官布拉德·米勒所说：
- en: 90% of companies want to do GenAI, but only 10% of them are successful, and
    the reason they fail is because they haven’t built the mechanisms of actually
    transforming the workforce to adopt new technology and new capabilities.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 90% 的公司都希望进行通用人工智能（GenAI）的开发，但其中只有 10% 的公司取得了成功，它们失败的原因在于它们没有建立起将劳动力转变为适应新技术和新能力的机制。
- en: The potential of AI is immense, and we’ve only just begun to scratch the surface.
    But to realize this potential, we need to move beyond the hype and set realistic
    expectations. Most importantly, it means recognizing that the AI revolution is
    not just about technology. It’s about people - the people who develop and deploy
    AI systems, and the people whose lives and work are impacted by them. That’s where
    the real AI revolution is happening-not in the labs of Silicon Valley, but in
    the everyday decisions and actions of businesses like yours.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的潜力是巨大的，而我们仅仅只是触及了表面。但要实现这一潜力，我们需要超越炒作，设定现实的期望。最重要的是，这意味着认识到人工智能革命不仅仅是关于技术。它是关于人——那些开发和部署人工智能系统的人，以及那些他们的生活和工作受到人工智能影响的人。这就是真正的人工智能革命正在发生的地方——不是在硅谷的实验室里，而是在像您这样的企业的日常决策和行动中。
- en: Future business success will depend on your ability to understand the AI-driven
    changes in your industry, develop robust AI strategies, and effectively implement
    AI solutions, starting with augmenting the right workflows. While the pace of
    change may vary, the long-term impact of AI on competitive dynamics is profound
    and far-reaching.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 未来商业的成功将取决于你理解你所在行业由人工智能驱动的变化的能力、制定稳健的人工智能战略以及有效地实施人工智能解决方案的能力，这从增强合适的流程开始。虽然变化的步伐可能有所不同，但人工智能对竞争动态的长期影响是深刻且广泛的。
- en: In the next chapter, we’ll explore how you can approach this revolution from
    the right angle.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨您如何从正确的角度接近这场革命。
