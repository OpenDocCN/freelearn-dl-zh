- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: Understanding Modern AI
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解现代人工智能
- en: Before we explore modern AI, let’s briefly look back in history to a time way
    before AI was even a topic. It’s 1891 and the electrical revolution is in full
    swing. The Edison General Electric Company was mandated to install the very first
    electrical power lines in the White House. The wires are buried in plaster, with
    convenient round switches in each room for turning lights on and off. However,
    they remain largely unused. As it turned out, then President Benjamin Harrison
    and his family were too scared to even touch them, fearing a shock from the invisible
    power in the wires. As a result, they left it to their staff to operate the switches.
    Irwin “Ike” Hoover, an electrician who later was promoted to White House chief
    usher, recalls in his book, ([https://www.amazon.com/Forty-Two-42-Years-White-House/dp/B001RHWC7Y](https://www.amazon.com/Forty-Two-42-Years-White-House/dp/B001RHWC7Y)),
    “*I would turn on the lights in the halls and parlors in the evening and they
    would burn until I returned the next morning to extinguish them*.”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们探索现代人工智能之前，让我们简要回顾一下人工智能成为话题之前的历史。那是1891年，电气革命正在进行中。爱迪生通用电气公司被要求在白宫安装第一条电力线路。电线被埋在石膏中，每个房间都有方便的圆形开关来开关灯。然而，它们大部分未被使用。结果，当时的总统本杰明·哈里森和他的家人甚至不敢触摸它们，害怕电线中看不见的电力会电击他们。因此，他们让他们的工作人员来操作开关。后来被提升为白宫首席招待员的电工Irwin
    “Ike” Hoover在他的书中回忆道，([https://www.amazon.com/Forty-Two-42-Years-White-House/dp/B001RHWC7Y](https://www.amazon.com/Forty-Two-42-Years-White-House/dp/B001RHWC7Y))，“*我会在晚上打开走廊和客厅的灯，直到第二天早上我回来熄灭它们*。”
- en: Today, we can see something very similar happening with AI. While large IT consulting
    companies report record-breaking profits selling *AI expertise* to hesitant businesses,
    executives keep AI at arm’s length, afraid to truly dive in and understand it.
    As a result, enterprise AI adoption is left shallow, and its potential is widely
    untapped.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以看到与人工智能非常相似的情况。当大型IT咨询公司报告创纪录的利润，向犹豫不决的企业出售*人工智能专业知识*时，高管们却将人工智能保持距离，害怕真正深入其中并理解它。因此，企业对人工智能的采用仅停留在表面，其潜力被广泛未挖掘。
- en: You don’t need to become an AI engineer, similar to how not everyone needs to
    become an electrician to keep the lights on at night. But if you solely rely on
    external knowledge without ever diving deeper into some of the fundamentals, you’ll
    never be able to operate the switches alone and thus will have to sit in the dark
    with kerosene lamps or pay fortunes for white-glove services.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要成为AI工程师，就像不是每个人都需要成为电工来在夜间保持灯光一样。但如果你仅仅依赖外部知识，从未深入到一些基本原理中，你就永远无法独立操作开关，因此你将不得不在黑暗中坐着，用煤油灯，或者支付巨额费用来获得白手套服务。
- en: A core goal of this book is to empower you to identify and leverage profitable
    AI opportunities by yourself without heavy reliance on external consultants. That’s
    why this chapter is so critical because it lays the basis for understanding what
    AI actually is and what fundamental mechanisms power it, so you can understand
    its capabilities and limitations.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的核心目标是通过你自己识别和利用有利可图的AI机会，而不需要过度依赖外部顾问。这就是为什么这一章如此关键，因为它为理解人工智能实际上是什么以及支撑它的基本机制奠定了基础，这样你就可以理解其能力和局限性。
- en: 'We’ll explore the following topics in this chapter:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将探讨以下主题：
- en: 'Understanding the building blocks of AI: Terminology'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解人工智能的基石：术语
- en: Working with the AI Skills framework and the five AI modes for business
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与AI技能框架和五种AI商业模式合作
- en: Understanding LLMs
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解大型语言模型（LLMs）
- en: Feel free to skim this chapter if you’re already familiar with AI concepts.
    However, I still recommend reading the section on the five AI modes for business,
    as it lays the foundation for the rest of the content. It will set the basis for
    the rest of the book to come. Otherwise, let’s start with some terminology.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经熟悉AI概念，可以随意浏览本章。然而，我仍然建议阅读关于五种AI商业模式的章节，因为它为后续内容奠定了基础。它将为即将到来的整本书奠定基础。否则，让我们从一些术语开始。
- en: 'Understanding the building blocks of AI: Terminology'
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解人工智能的基石：术语
- en: Like the electrical revolution of the 1890s, the AI revolution comes with its
    own set of terms and concepts that might seem daunting at first. But don’t panic
    - understanding these terms is your first step toward confidently *operating the
    switches* of AI in your business.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 就像19世纪90年代的电气革命一样，人工智能革命也带来了一套自己的术语和概念，一开始可能会让人感到 daunting。但别慌张——理解这些术语是你在业务中自信地*操作人工智能开关*的第一步。
- en: 'To start off, let’s swallow a hard pill of truth: AI terminology is confusing,
    even for seasoned experts in the field. To be honest, no one has really figured
    it out and everyone has their own set of vocabulary. This confusion in terminology
    stems from three main factors:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们吞下这个真理的苦药：人工智能术语令人困惑，即使是该领域的资深专家也是如此。说实话，没有人真正弄清楚，每个人都有自己的词汇表。这种术语的困惑源于三个主要因素：
- en: The complex and evolving nature of AI technology.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能技术的复杂性和不断发展的性质。
- en: The multiple perspectives of AI practitioners.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能实践者的多种观点。
- en: The use of different terms and jargon across specific industries, fields, and
    organizations.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在特定行业、领域和组织中使用的不同术语和行话。
- en: The latter one is especially important. You might hear different interpretations
    of the same term depending on whether you’re talking to a researcher, a data scientist,
    or a business executive. This variability is something we need to accept. Remember,
    the goal isn’t to become a stickler for terminology but to grasp the concepts
    and ideas these terms represent. Think of it as learning a new language - the
    nuances may vary, but the core meaning remains.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 后者尤其重要。你可能根据你是在与研究人员、数据科学家还是商业高管交谈而听到对同一术语的不同解释。这种可变性是我们需要接受的。记住，目标不是成为术语的吹毛求疵者，而是掌握这些术语所代表的概念和思想。把它看作是学习一门新语言——细微差别可能不同，但核心意义保持不变。
- en: Now, let’s build a framework for understanding AI, starting from the broadest
    concept and narrowing it down to specific applications.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们构建一个理解人工智能的框架，从最广泛的概念开始，逐步缩小到具体的应用。
- en: 'We’ll use the following, widely accepted representation of critical AI terms
    and their hierarchy (*Figure 2.1*):'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下广泛接受的临界人工智能术语及其层次结构的表示方法（*图2.1*）：
- en: '![Figure 2.1: AI terminology in a nutshell](img/B31200_02_01.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图2.1：人工智能术语概述](img/B31200_02_01.png)'
- en: 'Figure 2.1: AI terminology in a nutshell'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1：人工智能术语概述
- en: At the highest level, we have **Artificial Intelligence** (**AI**). This term
    has become a catch-all for systems or machines that exhibit **intelligent** behavior.
    When we say *intelligent* in this context, we’re referring to the ability to perform
    cognitively complex tasks such as learning, problem-solving, and decision-making,
    which is quite a broad field.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在最高层次上，我们有**人工智能**（**AI**）。这个术语已经成为表示表现出**智能**行为系统或机器的通用术语。当我们在这个语境中说*智能*时，我们指的是执行认知复杂任务的能力，如学习、解决问题和决策，这是一个相当广泛的领域。
- en: The concept of AI isn’t new. It dates back to the 1950s, with roots in military
    research. You might have heard of Alan Turing - his work laid the foundation for
    what we now call AI. Since then, AI has evolved and expanded, finding applications
    across numerous industries.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的概念并不新鲜。它可以追溯到20世纪50年代，其根源在于军事研究。你可能听说过艾伦·图灵——他的工作为我们现在称之为人工智能奠定了基础。从那时起，人工智能已经发展并扩展，在众多行业中找到应用。
- en: 'Within the broad field of AI, two main research areas have emerged: Strong
    AI and Narrow AI.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能的广泛领域中，已经出现了两个主要的研究领域：强人工智能和窄人工智能。
- en: '**Strong AI**, also known as **Artificial General Intelligence** (**AGI**),
    is the more ambitious of the two. It aims to create systems that can match or
    even surpass human intelligence in all aspects. Imagine a machine that could solve
    any problem a human can - and then some. This is the realm of science fiction
    staples such as sentient robots or omniscient computer systems. However, despite
    decades of research, Strong AI remains a distant goal. Many researchers debate
    whether it’s even achievable.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**强人工智能**，也称为**通用人工智能**（**AGI**），是两者中更雄心勃勃的一个。它旨在创建能够在所有方面与人类智能相匹配甚至超越的系统。想象一下一台可以解决人类可以解决的任何问题——甚至更多——的机器。这是科幻小说的常见主题，如有感知的机器人或无所不知的计算机系统。然而，尽管几十年的研究，强人工智能仍然是一个遥远的目标。许多研究人员争论它是否甚至可以实现。'
- en: On the other hand, **Narrow AI** is what we encounter in our day-to-day lives,
    and that powers every practical business AI application today. These are task-specific
    systems designed for particular jobs. When you use a language translation app
    or your phone recognizes your face to unlock, you’re interacting with Narrow AI.
    Unlike Strong AI, Narrow AI doesn’t aim to replicate human intelligence entirely.
    Instead, it focuses on performing specific tasks efficiently.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，**窄人工智能**是我们日常生活中遇到的东西，它为今天所有的实用商业人工智能应用提供动力。这些是为特定工作设计的特定任务系统。当你使用语言翻译应用或你的手机通过面部识别解锁时，你正在与窄人工智能互动。与强人工智能不同，窄人工智能并不旨在完全复制人类智能。相反，它专注于高效地执行特定任务。
- en: In the business world, when we talk about AI applications, we’re almost always
    referring to Narrow AI. These are the systems that are transforming industries
    today, from finance to healthcare to manufacturing. That’s why we will now shift
    our focus toward Narrow AI approaches - AI technologies that can be applied in
    the real world, today.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业世界中，当我们谈论人工智能应用时，我们几乎总是指窄人工智能。这些系统正在改变今天的行业，从金融到医疗保健到制造业。这就是为什么我们现在将重点转向窄人工智能方法——可以在现实世界中应用的人工智能技术。
- en: How do these Narrow AI systems actually work? There are two main approaches
    to creating *intelligent* systems. The first is based on pre-programmed rules
    for decision-making, often called **rule-based systems**. These systems don’t
    learn from data; they simply follow the rules they’ve been given. Often, they
    are also called **expert systems** because experts define the rules.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些窄人工智能系统实际上是如何工作的呢？创建*智能*系统有两种主要方法。第一种是基于预先编程的决策规则，通常称为**基于规则的系统**。这些系统不从数据中学习；它们只是遵循它们被赋予的规则。通常，它们也被称为**专家系统**，因为专家定义了规则。
- en: The second approach, **machine learning** (**ML**), is what’s driving most of
    the AI advancements we see today.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种方法，**机器学习**（**ML**），是推动我们今天看到的绝大多数人工智能进步的动力。
- en: Let’s explore ML a bit more.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地探讨一下机器学习。
- en: Machine learning
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习
- en: ML systems learn from data, identifying patterns and making decisions with minimal
    human intervention. Think of it as teaching a computer to recognize cats not by
    telling it, *Cats have pointy ears and whiskers*, but by showing it thousands
    of cat pictures and letting it figure out the patterns on its own.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习系统从数据中学习，通过最小化人工干预来识别模式和做出决策。想象一下，教一台计算机识别猫，不是通过告诉它，“猫有尖耳朵和胡须”，而是通过展示成千上万张猫的图片，并让它自己找出模式。
- en: '![Figure 2.2: Traditional programming vs. ML](img/B31200_02_02.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.2：传统编程与机器学习](img/B31200_02_02.png)'
- en: 'Figure 2.2: Traditional programming versus ML'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.2：传统编程与机器学习
- en: It’s important to note that despite its capabilities, ML doesn’t imply self-awareness
    or emotion. When you hear about ML, don’t picture a sentient computer with feelings.
    Instead, think of it as a highly sophisticated pattern recognition system. It’s
    essentially a statistical approach to automated data analysis.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，尽管机器学习具有能力，但它并不意味着自我意识或情感。当你听到机器学习时，不要想象一个有感情的感知计算机。相反，把它想象成一个高度复杂的模式识别系统。它本质上是一种自动数据分析的统计方法。
- en: The core concepts behind ML power most modern AI applications today. For decades,
    companies have applied ML - especially on structured tabular data - to run predictive
    algorithms such as linear regression or decision trees at scale. Common use cases
    include demand forecasting, fraud detection, and customer churn prediction.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习背后的核心概念是推动当今大多数人工智能应用的核心。几十年来，公司一直在应用机器学习，尤其是在结构化表格数据上，以大规模运行预测算法，如线性回归或决策树。常见的用例包括需求预测、欺诈检测和客户流失预测。
- en: However, not all data is tabular - in fact, the majority of data generated today
    is unstructured or semi-structured, such as text, images, or documents. Traditional
    ML algorithms often struggle with such data types, as they typically require manual
    feature extraction and domain-specific engineering.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，并非所有数据都是表格化的——事实上，今天产生的绝大多数数据都是非结构化或半结构化的，如文本、图像或文档。传统的机器学习算法通常难以处理这类数据，因为它们通常需要手动特征提取和领域特定的工程。
- en: This is where **deep learning** (**DL**), a subfield of ML, comes into play.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**深度学习**（**DL**），作为机器学习的一个子领域，发挥作用的地方。
- en: Deep learning
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习
- en: You can imagine DL as a fancy subset of ML. While *non-deep*, sometimes also
    called *shallow* *ML,* it can be applied on relatively small datasets that would
    even fit into a tabular Excel spreadsheet. True *deep learning* typically requires
    more complex and larger data structures such as text, images, or audio data.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将深度学习想象成机器学习的一个高级子集。虽然*非深度*，有时也称为*浅层*机器学习，它可以应用于相对较小的数据集，甚至可以放入表格式的Excel电子表格中。真正的*深度学习*通常需要更复杂和更大的数据结构，如文本、图像或音频数据。
- en: To give you a rough idea, consider a 5-megapixel colored image, something that
    you take with your smartphone every day, would be represented as a table. That
    table would have 5,000,000 rows and 3 columns - a total of 15,000,000 data points
    for a single image. If you have a dataset of 1,000 images, which is considered
    quite small in the DL space, you can do the math.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你一个大致的概念，考虑一张5兆像素的彩色图像，这是你每天用智能手机拍摄的东西，它会被表示为一个表格。这个表格将有500万行和3列——一个图像就有1500万个数据点。如果你有一个包含1000张图片的数据集，这在深度学习领域被认为相当小，你可以做一下数学计算。
- en: It’s a lot of data.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一大批数据。
- en: '![Figure 2.3: Example architecture of an artificial neural network (AI in a
    Nutshell: A Practical Guide to Key Terminology (https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology))](img/B31200_02_03.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图2.3：人工神经网络的示例架构（AI in a Nutshell：关键术语实用指南（https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology))](img/B31200_02_03.png)'
- en: 'Figure 2.3: Example architecture of an artificial neural network (AI in a Nutshell:
    A Practical Guide to Key Terminology ([https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology](https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology)))'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.3：人工神经网络（AI in a Nutshell：关键术语实用指南）的示例架构（[https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology](https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology)）
- en: For these large and complex data structures, an ML architecture called **artificial
    neural networks** (**ANNs**) with many layers proved to be quite effective (see
    *Figure 2.3* for a visual representation). And because these ANNs tend to have
    many layers (the black dots between the input layer on the left and the output
    layer on the right), we consider them *deep* - hence the term *deep learning*.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些庞大而复杂的数据结构，一种称为**人工神经网络**（**ANNs**）的机器学习架构，具有许多层，证明非常有效（参见*图2.3*中的视觉表示）。由于这些ANN通常具有许多层（左边的输入层和右边的输出层之间的黑色点），我们称它们为*深度*——因此有了*深度学习*这个术语。
- en: While these neural networks were inspired by the human brain, their actual operation
    is quite different from biological processes. They’re essentially very complex
    mathematical models designed for pattern recognition.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些神经网络受到了人类大脑的启发，但它们的实际操作与生物过程相当不同。它们本质上是非常复杂的数学模型，旨在进行模式识别。
- en: DL has been behind many of the most impressive AI achievements in recent years,
    from beating world champions at complex games to generating human-like text and
    creating realistic images from descriptions.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习在近年来许多最令人印象深刻的AI成就中发挥了作用，从在复杂游戏中击败世界冠军到根据描述生成类似人类的文本和创建逼真的图像。
- en: Next up, we will talk about **generative AI** (**GenAI**), which has changed
    the way an end user uses AI in their day-to-day activities.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将讨论**生成式AI**（**GenAI**），它改变了终端用户在日常活动中使用AI的方式。
- en: Generative AI
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成式AI
- en: GenAI is a subfield of DL - and one you’ve probably already encountered, whether
    you realized it or not. If you’ve ever asked ChatGPT to write an email, played
    with a tool that turns doodles into photos, or seen an AI-generated image pop
    up in your feed, you’ve seen GenAI in action.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI是深度学习的一个子领域——你可能已经接触过了，无论你是否意识到。如果你曾经让ChatGPT帮你写邮件，玩过将涂鸦变成照片的工具，或者在你的动态中看到过AI生成的图片，那么你就已经看到了生成式AI的应用。
- en: 'The core idea behind GenAI is simple but powerful: instead of just *analyzing*
    data, these systems **generate** new data. Their narrow task is to generate or
    modify original content - be it text, images, video, or audio-based on the patterns
    they’ve learned from vast datasets. Importantly, they do this *without* truly
    understanding the content in the way humans do. There is no conscious mind, no
    common sense, and no real-world grounding. What these systems excel at is spotting
    statistical patterns and leveraging them to produce output that *looks* smart,
    creative, or even insightful. But don’t let that lack of *understanding* fool
    you - GenAI is incredibly capable. In fact, the lack of understanding is often
    what makes these systems so flexible and scalable.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI背后的核心思想简单但强大：这些系统不仅仅是*分析*数据，它们还能*生成*新的数据。它们的具体任务是生成或修改原始内容——无论是文本、图像、视频还是基于它们从大量数据集中学习到的模式。重要的是，它们这样做*并不真正理解*内容，就像人类那样。没有意识，没有常识，也没有现实世界的根基。这些系统擅长的是发现统计模式，并利用这些模式来生成看起来聪明、有创意，甚至有洞察力的输出。但不要被这种缺乏*理解*所欺骗——生成式AI的能力非常强大。事实上，缺乏理解往往是这些系统如此灵活和可扩展的原因。
- en: At the center of today’s GenAI boom are **Large Language Models** (**LLMs**).
    These are models trained to generate human-like text from prompts. They operate
    on a staggering number of parameters-GPT-4, for instance, uses hundreds of billions
    of them - to predict what words (or even entire paragraphs) are likely to come
    next in a sequence. The result is often coherent, fluent, and contextually appropriate
    text that feels as though it were written by a human. For curious readers, we
    have a special technical deep-dive section on how LLMs work toward the end of
    this chapter.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 今天GenAI繁荣的中心是**大型语言模型**（**LLMs**）。这些模型经过训练，可以从提示中生成类似人类的文本。它们在令人震惊的参数数量上运行——例如，GPT-4使用了数百亿个参数——来预测序列中接下来可能出现的单词（甚至整个段落）。结果是通常连贯、流畅且上下文适当的文本，感觉就像是由人类所写。对于好奇的读者，我们在本章末尾有一个专门的技术深入探讨部分，介绍LLMs是如何工作的。
- en: You’ve probably heard of ChatGPT - arguably the poster child of modern GenAI.
    It’s brought the power of LLMs to the public in a user-friendly way, allowing
    anyone to generate emails, brainstorm ideas, write poetry, debug code, or summarize
    long documents in seconds. But it’s far from alone. There are now dozens of LLMs
    and generative systems on the market, both from commercial providers such as Anthropic
    or Grok, or open source models such as Meta’s Llama series or the models from
    DeepSeek.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能听说过ChatGPT——可以说是现代GenAI的标志性产品。它以一种用户友好的方式将LLMs的力量带给公众，允许任何人几秒钟内生成电子邮件、头脑风暴想法、写诗、调试代码或总结长文档。但远不止如此。现在市场上已有数十种LLMs和生成系统，既有来自商业提供商如Anthropic或Grok，也有开源模型如Meta的Llama系列或DeepSeek的模型。
- en: One of the most exciting recent developments in GenAI is the rise of **multimodal
    models**. Unlike traditional LLMs that only work with text, these new systems
    are trained on multiple types of input-text, images, audio, and even video. That
    means they can understand and respond across different media. For instance, you
    can show a multimodal model a photo and ask it to write a story about what it
    sees, or give it a chart and have it explain the data in plain English. More impressively,
    we now have true multimodal systems that can natively generate images from text
    or from other images-without needing to go through a text-only step.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在GenAI领域最近最令人兴奋的发展之一是**多模态模型**的兴起。与仅处理文本的传统LLMs不同，这些新系统在多种类型的输入上进行了训练——文本、图像、音频，甚至视频。这意味着它们可以跨不同媒体理解和响应。例如，你可以向一个多模态模型展示一张照片，并要求它写一个关于它所看到的故事，或者给它一张图表，让它用简单的英语解释数据。更令人印象深刻的是，我们现在有了真正的多模态系统，可以从文本或其他图像中直接生成图像——无需经过仅文本的步骤。
- en: This kind of direct input-to-output mapping across modalities marks a significant
    leap in model capabilities and opens up entirely new creative and analytical possibilities.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这种跨模态的直接输入到输出的映射标志着模型能力的一个重大飞跃，并开辟了全新的创造性和分析可能性。
- en: '![Figure 2.4: Google’s Gemini creating a new image based on native image and
    text input](img/B31200_02_04.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图2.4：谷歌的Gemini根据原生图像和文本输入创建新图像](img/B31200_02_04.png)'
- en: 'Figure 2.4: Google’s Gemini creating a new image based on native image and
    text input'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.4：谷歌的Gemini根据原生图像和文本输入创建新图像
- en: 'Just like the early days of electricity, we’re still figuring out how best
    to use these tools. But one thing is clear: GenAI isn’t just a trend - it’s a
    foundational shift in how content is created and consumed. And it’s only getting
    started.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 就像电的早期时代一样，我们仍在探索如何最好地使用这些工具。但有一点很清楚：GenAI不仅仅是一个趋势，它是在内容和消费方式上的一个基础性转变。而且，它才刚刚开始。
- en: 'But unlike flicking on a light switch, it’s easy to get carried away by the
    sheer novelty and power of GenAI. With so much buzz, so many demos, and a new
    breakthrough seemingly every week, the harder question often becomes: *How can
    I actually use this in my business in a meaningful way?*'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 但与打开开关不同，人们很容易被GenAI的纯粹新颖性和力量所吸引。在如此多的炒作、如此多的演示以及每周似乎都有新的突破的情况下，更难的问题往往变成了：*我如何真正以有意义的方式在我的业务中使用它？*
- en: 'In my work with clients, I’ve found that approaching AI from a purely technical
    perspective rarely leads to actionable outcomes. Instead, the real breakthroughs
    come when we flip the lens: not *what can the tech do* but *what new business-relevant
    skills and capabilities does it unlock?* That shift-from tools to capabilities
    - is where AI starts to make practical sense.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的客户工作中，我发现仅从技术角度接近AI很少能导致可操作的结果。相反，真正的突破往往发生在我们翻转镜头的时候：不是*技术能做什么*，而是*它解锁了哪些新的与业务相关的技能和能力*。这种从工具到能力的转变——是AI开始变得实用的地方。
- en: That’s why I developed a simple but powerful framework that I call **AI Skills**.
    It breaks down the noisy, fast-moving world of AI into five practical modes of
    value creation that every business leader can grasp and act on today.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我开发了一个简单但强大的框架，我称之为**AI技能**。它将嘈杂、快速发展的AI世界分解为五种实用的价值创造模式，每位商业领袖都可以在今天掌握并付诸行动。
- en: Let’s take a closer look at them.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地了解它们。
- en: Working with the AI Skills framework and the five AI modes for business
  id: totrans-63
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与AI技能框架和五种AI商业模式一起工作
- en: To cut through the noise and make AI practically usable, we need a new lens.
    Not a technical one but a *business-relevant* one.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了穿透噪音并使AI实用，我们需要一个新的视角。不是技术视角，而是一个*与业务相关的*视角。
- en: 'Instead of trying to memorize every algorithm, vendor, or acronym, a better
    question is: *What can this technology actually do for me?* More specifically,
    *What capabilities does it unlock for my team, my product, or my operation?*'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 与其试图记住每一个算法、供应商或缩写，不如问一个更好的问题：*这项技术实际上能为我做什么？* 更具体地说，*它为我的团队、产品或运营解锁了哪些能力？*
- en: To make this shift easier, I’m using the **AI Skills framework** with my clients
    around the world - a simple but powerful way to categorize the business-relevant
    skills that AI tools can provide.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这种转变更容易，我在全球范围内使用**AI技能框架**与我的客户合作——这是一种简单但强大的方法，可以分类AI工具可以提供的与业务相关的技能。
- en: For this, I’ve broken down modern AI into five core modes, based on the types
    of business skills these systems enable. These are practical capabilities that
    leaders and teams can apply today, regardless of industry or technical background.
    Each mode reflects a different way that AI adds value in real business contexts.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我将现代AI分解为五种核心模式，这些模式基于这些系统所启用的商业技能类型。这些是领导者和管理团队可以今天应用的实际能力，无论行业或技术背景如何。每种模式都反映了AI在真实商业环境中增加价值的不同方式。
- en: 'Here’s a quick overview:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个简要概述：
- en: '**Prediction mode**: AI that anticipates what’s next by using past data to
    forecast trends, estimate outcomes, model scenarios, and predict what’s going
    to happen next.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测模式**：通过使用历史数据来预测趋势、估计结果、模拟场景和预测接下来会发生什么，来预测未来的AI。'
- en: '**Perception mode**: AI that senses the world-capable of seeing, hearing, reading,
    and extracting information from unstructured sources such as images, documents,
    and audio streams.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**感知模式**：能够感知世界的AI——能够看到、听到、阅读并从非结构化来源（如图像、文档和音频流）中提取信息的AI。'
- en: '**Creation mode**: AI that produces content - code, designs, text, visuals,
    or music. It’s about speed, scale, and lowering the barrier between an idea and
    a working output.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创作模式**：产生内容的AI——代码、设计、文本、视觉或音乐。这关乎速度、规模以及降低想法与实际输出之间的障碍。'
- en: '**Thinking mode**: AI that reasons, connects, summarizes, or personalizes based
    on context. It brings insight and intelligence to complex or ambiguous tasks.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**思考模式**：基于上下文进行推理、连接、总结或个性化的AI。它为复杂或模糊的任务带来洞察力和智慧。'
- en: '**Agentic mode**: AI that acts. These systems send messages, trigger workflows,
    carry out tasks, and adapt dynamically - autonomously pushing things forward.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理模式**：能够行动的AI。这些系统发送消息、触发工作流程、执行任务并动态适应——自主地推动事物前进。'
- en: Each of these modes includes a range of skill types that mirror things people
    already do at work every day - and that AI can help do things faster, better,
    cheaper, or at scale.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式中的每一个都包含一系列技能类型，这些技能类型反映了人们在工作中的日常行为——AI可以帮助人们更快、更好、更便宜或以规模的方式完成任务。
- en: '![Figure 2.5: Five AI modes for business overview](img/B31200_02_05.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图2.5：五种AI商业模式概述](img/B31200_02_05.png)'
- en: 'Figure 2.5: Five AI modes for business overview'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.5：五种AI商业模式概述
- en: In the sections that follow, I’ll walk you through each of these five modes.
    I’ll highlight the kinds of tasks they can support, the technologies that power
    them - such as ML, DL, or GenAI - and what kinds of tools or approaches are typically
    used.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我将逐一介绍这五种模式。我会强调它们可以支持的任务类型、驱动它们的技术（如ML、DL或GenAI），以及通常使用的工具或方法。
- en: You don’t need to learn the math behind a neural network. But by the end of
    this chapter, you’ll be able to recognize the key AI capabilities that align with
    your business goals and understand how to translate them into practical action.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要学习神经网络背后的数学。但到本章结束时，你将能够识别与你的商业目标相一致的关键AI能力，并了解如何将它们转化为实际行动。
- en: 'Let’s start with the first mode: *Prediction*.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从第一个模式开始：*预测*。
- en: Prediction mode of AI
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI的预测模式
- en: 'Prediction is one of the oldest and most proven use cases in modern AI - and
    still one of the most valuable. This mode is all about *anticipating*, *categorizing*,
    and *making sense of complexity* using data. You’ve likely seen this in action
    without realizing it: when Netflix recommends a show, when a bank detects fraud,
    or when a warehouse restocks inventory just in time. Prediction mode is the quiet
    engine behind it all. It doesn’t always make headlines but it often drives the
    clearest ROI.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 预测是现代人工智能中最古老且最被证明的使用案例之一——并且仍然是最有价值的之一。这种模式完全关乎*预测*、*分类*和*理解复杂性*，这一切都基于数据。你可能已经看到了它的实际应用，却并未意识到：当Netflix推荐一部剧集，当银行检测到欺诈，或者当仓库及时补充库存时。预测模式是这一切背后的安静引擎。它并不总是成为头条新闻，但它经常推动最清晰的回报率。
- en: For the rest of this chapter, we will use the term *skill(s)* to refer to a
    skill that AI can perform.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的剩余部分，我们将使用术语*技能*来指代AI可以执行的一种技能。
- en: 'Prediction mode includes three key types of AI skill sets:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 预测模式包括三种关键的AI技能集：
- en: '**Regression skills**: These systems forecast future values or outcomes based
    on historical data. Think of them as the AI equivalent of estimating, projecting,
    or scoring - whether it’s next month’s sales or the risk profile of a loan applicant.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**回归技能**：这些系统根据历史数据预测未来的值或结果。把它们看作是AI的估计、预测或评分的等价物——无论是下个月的销售额还是贷款申请人的风险概况。'
- en: '**Classification skills**: These skills sort, label, group, and match information.
    They help structure messy inputs, such as assigning categories to documents or
    tagging emails by urgency.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分类技能**：这些技能对信息进行排序、标记、分组和匹配。它们帮助结构化混乱的输入，例如将类别分配给文档或根据紧急程度标记电子邮件。'
- en: Together, these skills help businesses, structure and score reality in ways
    that scale far beyond manual effort.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技能共同帮助企业在结构化和评分现实方面实现超越人工努力的方式。
- en: '**What powers these skills?**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**是什么推动了这些技能？**'
- en: Most of the prediction mode is powered by traditional machine learning techniques,
    leveraging statistical algorithms like linear regression, decision trees, or clustering
    methods for structured, tabular data. Tools like XGBoost, Facebook Prophet, and
    automated ML platforms such as Azure AutoML are commonly used here.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数预测模式由传统的机器学习技术驱动，利用线性回归、决策树或聚类方法等统计算法来处理结构化、表格化的数据。XGBoost、Facebook Prophet和Azure
    AutoML等自动化机器学习平台在这里被广泛使用。
- en: '![Figure 2.6: Screenshot of Microsoft Azure AutoML comparing 62 machine learning
    models to identify the best one for a flight delay prediction task](img/B31200_02_06.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图2.6：Microsoft Azure AutoML比较62个机器学习模型以识别最适合航班延误预测任务的模型截图](img/B31200_02_06.png)'
- en: 'Figure 2.6: Screenshot of Microsoft Azure AutoML comparing 62 machine learning
    models to identify the best one for a flight delay prediction task'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.6：Microsoft Azure AutoML比较62个机器学习模型以识别最适合航班延误预测任务的模型截图
- en: However, GenAI, and particularly LLMs, can also play a role in this mode, especially
    when dealing with unstructured or text-based inputs. For example, LLMs can classify
    emails as spam or not, detect sentiment in reviews, or map country codes from
    messy, open - text address fields. In these scenarios, generative models act more
    like advanced classifiers, helping structure data rather than generate original
    content.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，生成式AI，尤其是LLM，也可以在这种模式中发挥作用，尤其是在处理非结构化或基于文本的输入时。例如，LLM可以将电子邮件分类为垃圾邮件或非垃圾邮件，检测评论中的情感，或将混乱的、开放的文本地址字段中的国家代码进行映射。在这些场景中，生成式模型更像高级分类器，帮助结构化数据而不是生成原始内容。
- en: '**Where it shows up in the business?**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**它在商业中出现在哪里？**'
- en: For these kinds of image or audio analyses, platforms such as Google Cloud Vision,
    Azure Document AI, or OpenAI Whisper (for speech) come into play. Even ChatGPT
    could be used for this.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这类图像或音频分析，平台如Google Cloud Vision、Azure Document AI或OpenAI Whisper（用于语音）就会发挥作用。甚至ChatGPT也可以用于此。
- en: 'While many modern platforms offer pre-built models or no-code interfaces -
    allowing business teams to get started with AI without needing an armada of data
    scientists - many prediction scenarios require you to train your own models from
    scratch, or at least fine-tune models based on your own data. There are several
    business use cases for the Prediction mode with it being deeply embedded across
    business functions. Here are some common use cases you will come across:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然许多现代平台提供预构建的模型或无代码界面——允许业务团队在没有需要大量数据科学家的情况下开始使用AI——但许多预测场景需要你从头开始训练自己的模型，或者至少根据你自己的数据进行模型微调。预测模式在业务功能中深度嵌入，有几种商业用途。以下是一些你可能会遇到的常见用例：
- en: '**Marketing** uses it to score leads, forecast campaign performance, and group
    customers by behavior.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**营销**使用它来评估潜在客户、预测活动表现以及根据行为分组客户。'
- en: '**Finance** applies it for risk modeling, fraud detection, and demand forecasting.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融**领域将其应用于风险建模、欺诈检测和需求预测。'
- en: '**Customer support** teams rely on it to prioritize tickets, match queries
    to help content, and detect patterns in support volume.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户支持**团队依赖它来优先处理工单、将查询与帮助内容相匹配以及检测支持量中的模式。'
- en: '**Operations** use it to estimate inventory needs, detect anomalies, and automate
    quality checks.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营**使用它来估算库存需求、检测异常情况以及自动化质量检查。'
- en: We will now talk about the world of perception. In this mode, AI moves beyond
    clean, tabular data.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在来谈谈感知的世界。在这个模式下，人工智能超越了干净、表格化的数据。
- en: Perception mode of AI
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能的感知模式
- en: 'While Prediction mode helps make sense of structured data, Perception mode
    allows AI to interpret the *unstructured* world – especially through reading,
    seeing, and hearing. This mode expands the reach of artificial intelligence to
    formats that were once accessible only to humans: documents, images, speech, and
    beyond.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当预测模式有助于理解结构化数据时，感知模式允许人工智能解释*非结构化*的世界——特别是通过阅读、观看和聆听。这种模式扩展了人工智能的触角，使其能够访问以前只有人类才能访问的格式：文档、图像、语音等。
- en: Think of Perception mode as giving AI the ability to understand sensory input.
    This is where machines start to *perceive* the world in a human-like way - processing
    real-world signals and turning them into usable business information. Whether
    it’s scanning a receipt, interpreting a voice memo, or extracting data from a
    PDF, Perception mode is the foundation for unlocking insight from raw inputs.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 将感知模式视为赋予人工智能理解感官输入的能力。这就是机器开始以类似人类的方式开始*感知*世界——处理现实世界的信号并将它们转化为可用的商业信息。无论是扫描收据、解释语音备忘录还是从PDF中提取数据，感知模式是解锁原始输入洞察力的基础。
- en: '**Core skill categories in Perception mode**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**感知模式的核心技能类别**'
- en: 'Perception mode includes three core categories of AI skills:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 感知模式包括人工智能技能的三个核心类别：
- en: '**Reading skills**: These capabilities allow AI to process and interpret written
    or printed language, especially in unstructured formats like scanned documents,
    PDFs, handwritten notes, or long - form text. **Optical character recognition**
    (**OCR**), layout detection, and document parsing fall under this category.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**阅读技能**：这些能力允许人工智能处理和解释书面或印刷语言，尤其是在扫描文档、PDF、手写笔记或长篇文本等非结构化格式中。**光学字符识别**（**OCR**）、布局检测和文档解析属于此类。'
- en: '**Seeing skills**: These visual perception skills help AI systems interpret
    images, videos, diagrams, or even physical environments. From detecting defects
    in a manufacturing line to classifying products in a photo, recognizing a face
    or understanding complex layouts in PDFs – these skills give AI visual understanding.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视觉技能**：这些视觉感知技能帮助人工智能系统解释图像、视频、图表甚至物理环境。从检测制造线上的缺陷到在照片中分类产品，识别面部或理解PDF中的复杂布局——这些技能赋予人工智能视觉理解。'
- en: '**Hearing skills**: These systems convert and analyze audio inputs – like transcribing
    spoken language, identifying speakers, or detecting emotion and tone. Or just
    recognizing your favorite song. Hearing skills unlock vast potential from audio
    data.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**听觉技能**：这些系统将音频输入进行转换和分析——如转录口语、识别说话者、检测情绪和语调。或者只是识别你最喜欢的歌曲。听觉技能从音频数据中释放出巨大的潜力。'
- en: Together, these skills enable AI to *sense* reality, bringing previously inaccessible
    formats into the realm of structured processing and decision-making.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技能共同使人工智能能够*感知*现实，将以前无法访问的格式带入结构化处理和决策的领域。
- en: '**What powers these skills?**'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**是什么赋予了这些技能力量？**'
- en: Perception mode is increasingly powered by deep learning techniques, particularly
    **convolutional neural networks** (**CNNs**) for vision and **transformer models**
    for language and audio. Unlike shallow machine learning, these models excel in
    handling complex, high-dimensional inputs like pixels or waveforms. But also GenAIhas
    led to huge breakthroughs here. Transformer - based architectures, like those
    behind OpenAI Whisper or GPT-4o, enable AI to *read*, *see*, or *hear* with contextual
    awareness across modalities.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 感知模式越来越多地依赖于深度学习技术，特别是用于视觉的**卷积神经网络**（**CNNs**）和用于语言和音频的**转换器模型**。与浅层机器学习不同，这些模型在处理复杂、高维输入（如像素或波形）方面表现出色。但GenAI也在这里取得了巨大的突破。基于转换器的架构，如OpenAI
    Whisper或GPT-4o背后的架构，使人工智能能够具有跨模态的上下文意识来*阅读*、*观看*或*聆听*。
- en: Modern AI platforms often abstract this complexity through user-friendly tools
    and APIs - so even non-technical teams can tap into perception capabilities without
    needing to train models from scratch.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 现代AI平台通常通过用户友好的工具和API来抽象这种复杂性——因此即使是非技术团队也可以利用感知能力，而无需从头开始训练模型。
- en: '**Where it shows up in the business?**'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**它在商业中体现在哪里？**'
- en: 'Perception mode is widely used across industries:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 感知模式在各个行业中广泛应用：
- en: '**Operations** use it to inspect product quality, monitor safety via cameras,
    or extract text from invoices and shipping labels.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**操作**使用它来检查产品质量，通过摄像头监控安全，或从发票和运输标签中提取文本。'
- en: '**Customer experience** teams use it to transcribe and analyze support calls,
    or classify incoming documents automatically.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户体验**团队使用它来转录和分析支持电话，或自动分类收到的文件。'
- en: '**Legal and compliance** use it to read contracts, extract clauses, or detect
    anomalies in scanned agreements.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**法律和合规**使用它来阅读合同、提取条款或在扫描的协议中检测异常。'
- en: '**Healthcare** applies it to analyze X - rays, digitize handwritten notes,
    or interpret patient voice inputs.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗保健**将其应用于分析X射线、数字化手写笔记或解释患者语音输入。'
- en: By giving AI the ability to read, see, and hear, Perception mode turns the analog
    world into digital fuel - enabling deeper insight and greater automation in contexts
    that were once entirely manual.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 通过赋予AI阅读、观看和听的能力，感知模式将模拟世界转化为数字燃料——使在曾经完全手动的情况下实现更深入的洞察和更高的自动化。
- en: Next, let’s step into the world of the Creation mode. In this mode, AI stops
    analyzing and starts building.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们进入创建模式的世界。在这种模式下，AI停止分析并开始构建。
- en: Creation mode of AI
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能的创建模式
- en: If Prediction mode and Perception mode help you understand what *is* or what
    *might be*, Creation mode is where AI begins to *build*. This is where content
    is generated, ideas come to life, and execution gets dramatically faster - with
    machines taking on creative and technical tasks that once required expert human
    hands. If you’ve ever asked ChatGPT to write an email, used Copilot to create
    a social image, or seen a tool turn a prompt into working code, you’ve touched
    Creation mode in action.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 如果预测模式和感知模式帮助你理解“是什么”或“可能是什么”，那么创建模式就是AI开始“构建”的地方。这是内容生成、想法变为现实、执行速度显著加快的地方——机器承担起曾经需要专家人工手法的创造性和技术任务。如果你曾经要求ChatGPT撰写电子邮件，使用Copilot创建社交媒体图像，或者看到工具将提示转换为可工作的代码，那么你已经接触到了创建模式在实际中的应用。
- en: 'Creation mode includes three core categories of AI skills:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模式包括人工智能技能的三个核心类别：
- en: '**Programming skills**: AI can generate, explain, debug, or convert code based
    on simple language prompts. These skills bridge the gap between idea and implementation
    - especially for non-technical users or lean teams.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编程技能**：AI可以根据简单的语言提示生成、解释、调试或转换代码。这些技能在想法和实施之间架起桥梁——特别是对于非技术用户或精简团队。'
- en: '**Content creation skills**: These are generative capabilities that produce
    original outputs - text, images, video, audio, or even interactive designs. The
    results aren’t just templated, often generated completely from scratch or with
    a light reference direction.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内容创建技能**：这些是生成性能力，可以产生原始输出——文本、图像、视频、音频，甚至是交互式设计。结果不仅仅是模板化的，通常是从零开始生成或带有轻微的参考方向。'
- en: '**Communication skills**: AI can write, reply, translate, explain, or carry
    on conversations with natural fluency, allowing businesses to streamline internal
    workflows and customer - facing communication alike.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沟通技能**：AI可以撰写、回复、翻译、解释或进行自然流畅的对话，使企业能够简化内部工作流程和面向客户的沟通。'
- en: Together, these skills give individuals and teams the power to create more,
    faster, with less overhead and often less skill-specific bottlenecking.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技能共同赋予个人和团队以创造更多、更快的能力，同时减少开销，并且通常减少对特定技能的瓶颈。
- en: '**What powers these skills?**'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '**这些技能的动力是什么？**'
- en: 'Most of the Creation mode is powered by GenAI systems designed to produce new
    original content rather than just regurgitate existing data. This includes models
    such as the following:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数的创建模式由旨在生成新原创内容而非仅仅重复现有数据的GenAI系统驱动。这包括以下模型：
- en: '**LLMs** such as GPT-4 or Claude, which generate human-like text from prompts.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLMs**如GPT-4或Claude，可以从提示中生成类似人类的文本。'
- en: '**Diffusion models** such as Midjourney or Flux, which generate original images
    from'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**扩散模型**如Midjourney或Flux，可以从'
- en: textual input.
  id: totrans-131
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 文本输入。
- en: '**Multimodal models** that can generate or transform content across text, image,
    audio, and even video formats such as GPT-4o or Google’s Gemini.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态模型**可以在文本、图像、音频甚至视频格式（如GPT-4o或谷歌的Gemini）中生成或转换内容。'
- en: On the technical side, Creation mode builds on the architecture of deep neural
    networks - especially transformer models and convolutional networks. But from
    the user’s perspective, most tools are now *incredibly accessible*. Many use drag-and-drop
    interfaces or prompt-based inputs, requiring no technical skill at all.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术方面，创造模式建立在深度神经网络架构之上——特别是转换模型和卷积网络。但从用户的角度来看，大多数工具现在*极其易于访问*。许多使用拖放界面或基于提示的输入，根本不需要任何技术技能。
- en: '**Where it shows up in the business?**'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**它在业务中的体现？**'
- en: 'Creation mode is rapidly reshaping creative, technical, and communication workflows.
    Here is how various businesses harness the power of the Creation mode AI:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 创造模式正在迅速重塑创意、技术和沟通工作流程。以下是各种企业如何利用创造模式AI的力量的例子：
- en: '**Marketing** teams use it to generate campaign copy, visuals, and video assets.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**营销**团队使用它来生成活动文案、视觉内容和视频资产。'
- en: '**Product and design** teams use it to build mockups, pitch decks, and documentation.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品和设计**团队使用它来构建原型、提案演示文稿和文档。'
- en: '**Sales** teams use it to write outreach emails, follow-ups, and value propositions
    at scale.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**销售**团队使用它来撰写大规模的拓展电子邮件、跟进邮件和价值主张。'
- en: '**Engineering** teams use it to speed up prototyping, code conversion, and
    bug resolution.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工程**团队使用它来加速原型设计、代码转换和错误修复。'
- en: '**Customer experience** teams use it to draft replies, translate messages,
    or explain product features in plain language.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户体验**团队使用它来起草回复、翻译消息或用通俗易懂的语言解释产品功能。'
- en: AI in Creation mode augments the work of creative professionals, dramatically
    increasing their speed and reducing the lift of first drafts, repetitive edits,
    or simple production tasks.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 创造模式下的AI增强了创意专业人士的工作，显著提高了他们的速度，并减少了初稿、重复编辑或简单生产任务的负担。
- en: Next, we’ll move into a more cognitive space. Let’s explore how AI can *think*,
    *reason*, and *interpret*.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将进入一个更注重认知的空间。让我们探讨人工智能如何*思考*、*推理*和*解释*。
- en: Thinking mode of AI
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI的思考模式
- en: Some business problems can’t be solved by guessing what token comes next - they
    require *reasoning*, *interpreting*, and *connecting the dots*. That’s what the
    Thinking mode is for. This mode becomes especially powerful in situations where
    the answer isn’t obvious, or when information needs to be extracted, transformed,
    or interpreted before any action can be taken.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 一些商业问题不能通过猜测下一个标记来解决——它们需要*推理*、*解释*和*连接点*。这就是思考模式的作用。在这种模式下，当答案不明显或需要提取、转换或解释信息才能采取任何行动时，这种模式变得特别强大。
- en: Think of tasks such as summarizing a 40-page research report, mapping product
    features to customer pain points, or deciding how to route a support ticket based
    on multiple variables. These aren’t just content problems - they’re *thinking*
    problems.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下这样的任务：总结一份40页的研究报告、将产品功能映射到客户痛点，或者根据多个变量决定如何路由支持工单。这些问题不仅仅是内容问题，它们是*思考*问题。
- en: 'Thinking mode includes two key skill areas:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 思考模式包括两个关键技能领域：
- en: '**Reasoning skills**: These systems analyze, connect, interpret, summarize,
    and make decisions based on data or unstructured input. They’re ideal for synthesis,
    insight generation, and intelligent prioritization.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理技能**：这些系统分析、连接、解释、总结并基于数据或非结构化输入做出决策。它们非常适合综合、洞察生成和智能优先级排序。'
- en: '**Memory skills**: These capabilities allow AI to access and apply stored information
    - whether from its own training, a knowledge base, or recent interactions. They
    improve response accuracy, personalization, and contextual relevance.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆技能**：这些能力使AI能够访问和应用存储的信息——无论是来自其自身的训练、知识库还是最近的交互。它们提高了响应准确性、个性化以及上下文相关性。'
- en: These skills let AI operate more as an analytical partner - not just responding
    to prompts, but allowing them to *think* through them by leveraging internal or
    external information.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技能让AI更像是一个分析伙伴——不仅仅是响应提示，而且通过利用内部或外部信息，让它们能够通过*思考*来处理这些提示。
- en: '**What powers these skills?**'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '**是什么赋予了这些技能力量？**'
- en: 'Under the hood, Thinking mode is still powered by LLMs, but with an important
    twist: many of the frontier AI models used here, such as, GPT-5 and later models,
    Gemini, or Claude - let you spend extra compute at inference time to favor accuracy
    over speed. This is often marketed as **reasoning** or **thinking** features;
    the exact mechanisms and ways to influence this process vary by provider.'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层，思考模式仍然由LLM提供动力，但有一个重要的转折：这里使用的许多前沿AI模型，如GPT-5和后续模型、Gemini或Claude——允许你在推理时间额外进行计算，以速度换取准确性。这通常被市场宣传为**推理**或**思考**功能；确切的机制和影响此过程的方式因提供商而异。
- en: This slower, more deliberate approach is designed for tasks where simple text
    completion would fall short. For example, proving a mathematical theorem, interpreting
    legal language, or maybe even just counting the number of *r*s in *strawberry*.
    These tasks require stepwise logic, not just fluency.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这种更慢、更谨慎的方法是为那些简单文本补全无法满足的任务设计的。例如，证明数学定理、解释法律语言，或者甚至只是计算*strawberry*中*r*的数量。这些任务需要逐步逻辑，而不仅仅是流畅性。
- en: Because of this, reasoning models may take longer - sometimes several minutes
    - to generate a response. But they’re built to shine in situations where accuracy,
    depth, or complexity matter more than fast response generation.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，推理模型可能需要更长的时间——有时是几分钟——来生成响应。但它们被设计用于那些准确性、深度或复杂性比快速响应生成更重要的场合。
- en: '![Figure 2.7: Improving accuracy with longer test - time compute (“thinking
    time”). Source: https://openai.com/index/learning - to - reason - with - llms](img/B31200_02_07.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![图2.7：通过更长的测试时间计算（“思考时间”）提高准确性。来源：https://openai.com/index/learning-to-reason-with-llms](img/B31200_02_07.png)'
- en: 'Figure 2.7: Improving accuracy with longer test-time compute (“thinking time”).
    Source: https://openai.com/index/learning-to-reason-with-llms'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.7：通过更长的测试时间计算（“思考时间”）提高准确性。来源：https://openai.com/index/learning-to-reason-with-llms
- en: You’ll also hear terms such as **retrieval-augmented generation** (**RAG**)
    used in this mode, where the model pulls in relevant documents or data at runtime.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可能会在这个模式中听到**检索增强生成**（**RAG**）这样的术语，其中模型在运行时拉入相关的文档或数据。
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)**Quick
    tip**: Need to see a high - resolution version of this image? Open this book in
    the next - gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的内容可能是不正确的。](img/1.png)**快速提示**：需要查看此图像的高分辨率版本吗？在下一代Packt
    Reader中打开此书或在其PDF/ePub副本中查看。'
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/2.png)**The
    next - gen Packt Reader** is included for free with the purchase of this book.
    Scan the QR code OR go to [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double - check the edition
    shown to make sure you get the right one.'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的内容可能是不正确的。](img/2.png)**下一代Packt Reader**随本书免费赠送。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。双检查显示的版本，以确保您获得正确的版本。'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock2.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码  AI生成的内容可能是不正确的。](img/Unlock2.png)'
- en: 'The high-level RAG architecture is shown in *Figure 2.8*:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 高级RAG架构在*图2.8*中展示：
- en: '![Figure 2.8: High - level RAG architecture](img/B31200_02_08.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图2.8：高级RAG架构](img/B31200_02_08.png)'
- en: 'Figure 2.8: High-level RAG architecture'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.8：高级RAG架构
- en: 'In simple words, RAG works as follows:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，RAG的工作原理如下：
- en: A collection of documents is stored in a searchable database - typically a vector
    store that encodes the semantic meaning of the content into numerical representations.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一组文档存储在可搜索的数据库中——通常是一个向量存储，它将内容的语义意义编码成数值表示。
- en: When a user asks a question, the system searches this database in real time
    to identify the most relevant pieces of information and injects them into the
    prompt alongside the user’s query.
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当用户提出问题时，系统会实时搜索这个数据库以识别最相关的信息片段，并将它们与用户的查询一起注入提示中。
- en: This augmented prompt is then passed to the language model, enabling it to generate
    a response that is grounded in the retrieved content.
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个增强提示随后被传递给语言模型，使其能够生成一个基于检索内容的响应。
- en: The result is a more accurate, context-aware answer that reflects the most current
    and domain-specific knowledge.
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结果是一个更准确、具有上下文意识的答案，反映了最当前和特定领域的知识。
- en: This way, RAG is able to ground LLM responses. By **grounding** its responses
    in external data rather than relying solely on pre-trained knowledge, RAG systems
    can significantly reduce hallucinations and enhance the reliability of AI - generated
    outputs.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，RAG能够将LLM的回应与外部数据相结合。通过**接地**其回应在外部数据上而不是仅仅依赖预训练的知识，RAG系统可以显著减少幻觉并增强AI生成输出的可靠性。
- en: '**Where it shows up in the business?**'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '**它在商业中体现在哪里？**'
- en: 'Thinking mode has huge potential for knowledge-heavy, insight-driven tasks:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 思考模式在知识密集型、洞察力驱动的任务中具有巨大潜力：
- en: '**Customer experience** teams use it to interpret customer feedback or decide
    next-best actions.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户体验**团队使用它来解释客户反馈或决定下一步的最佳行动。'
- en: '**Product and strategy** teams use it to map insights or prioritize features
    based on complex criteria.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品和战略**团队使用它来绘制洞察力或根据复杂标准优先排序功能。'
- en: '**Legal, compliance, and HR** teams use it to extract relevant clauses, interpret
    documents, or align policies across departments.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**法律、合规和人力资源**团队使用它来提取相关条款、解释文件或跨部门协调政策。'
- en: '**Analysts and researchers** use it to generate structured summaries, draw
    conclusions, or synthesize open-ended survey responses.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析师和研究人员**使用它来生成结构化摘要、得出结论或综合开放式调查回应。'
- en: Thinking mode doesn’t replace human insight but it accelerates how quickly teams
    can get to it, especially when navigating complexity.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 思考模式并不取代人类的洞察力，但它加速了团队获取洞察力的速度，尤其是在处理复杂性时。
- en: '**Note**'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: These modes aren’t mutually exclusive - they’re often combined in real-world
    AI solutions. For instance, Thinking mode can be paired with Creation mode to
    generate high-quality, structured output based on complex reasoning. You might
    use a non - reasoning model such as GPT-4o-mini to quickly draft documentation
    for a function, or bring in a reasoning-capable model such as Grok - 3 to refactor
    an entire codebase intelligently. The combination of depth (Thinking) and output
    (Creation) is where many advanced business use cases come to life. You’ll learn
    more about how to combine these skills to design your own solution concepts later
    in this book.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式不是相互排斥的——它们在现实世界的AI解决方案中经常结合使用。例如，思考模式可以与创造模式结合，基于复杂推理生成高质量、结构化的输出。你可能会使用非推理模型如GPT-4o-mini来快速起草功能文档，或者引入具有推理能力的模型如Grok
    - 3来智能地重构整个代码库。深度（思考）和输出（创造）的结合是许多高级商业用例得以实现的地方。你将在本书的后面部分了解更多关于如何结合这些技能来设计自己的解决方案概念。
- en: With all these modes combined - Prediction, Perception, Creation, and Thinking
    - modern AI systems already become incredibly powerful. But modern AI capabilities
    don’t end here.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 结合所有这些模式——预测、感知、创造和思考——现代人工智能系统已经变得极其强大。但现代人工智能的能力并不止于此。
- en: Let’s take a look at the Agentic mode of AI.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看人工智能的代理模式。
- en: Agentic mode of AI
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能的代理模式
- en: Most AI systems today are reactive - they analyze, generate, or explain but
    only if they get instructed to do so. But what if AI could act? Agentic mode is
    where AI shifts from being a passive assistant to an active operator. In this
    mode, AI systems don’t just produce outputs - they take actions, trigger workflows,
    and coordinate tasks across tools, systems, and environments.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的大多数人工智能系统都是反应性的——它们分析、生成或解释，但只有当它们被指示这样做时。但如果人工智能能够采取行动呢？代理模式是人工智能从被动助手转变为主动操作者的地方。在这种模式下，人工智能系统不仅产生输出，还采取行动、触发工作流程，并在工具、系统和环境中协调任务。
- en: 'Agentic mode includes two main categories of skills:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式包括两大类技能：
- en: '**Execution skills**: These are the operational arms of AI. They send messages,
    trigger processes, execute tasks, and orchestrate multi-step flows across systems,
    allowing AI systems to interact with the real world and collect feedback.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行技能**：这些是人工智能的操作臂。它们发送消息、触发流程、执行任务，并在系统间编排多步骤流程，使人工智能系统能够与真实世界互动并收集反馈。'
- en: '**Adaptation skills**: These skills allow AI to evolve its behavior over time
    based on feedback, performance data, or environmental changes with just minimal
    human intervention.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适应技能**：这些技能允许人工智能根据反馈、性能数据或环境变化随着时间的推移调整其行为，只需最小程度的人类干预。'
- en: These capabilities move AI from a tool you *ask* to one that proactively *does*
    - based on derived logic, triggers, or learned behavior.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 这些能力将人工智能从你*询问*的工具转变为基于推导逻辑、触发器或学习行为的*主动执行*的工具。
- en: '**What powers these skills?**'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '**是什么赋予了这些技能力量？**'
- en: 'Agentic mode is enabled by a combination of technologies:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式是通过一系列技术的组合实现的：
- en: '**LLMs** act as the reasoning layer, interpreting intent and making dynamic
    decisions.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLMs** 作为推理层，解释意图并做出动态决策。'
- en: '**Function calling frameworks** (such as OpenAI Functions or LangChain) let
    AI trigger actions or external tools.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**函数调用框架**（例如 OpenAI Functions 或 LangChain）让 AI 触发操作或外部工具。'
- en: '**Workflow automation platforms** (such as Zapier, N8N, or custom APIs) handle
    task execution.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作流程自动化平台**（例如 Zapier、N8N 或自定义 API）处理任务执行。'
- en: '**Autonomous agents and orchestration frameworks** (such as LangGraph or CrewAI)
    manage longer, multi - step tasks with memory and feedback loops.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自主代理和编排框架**（例如 LangGraph 或 CrewAI）通过记忆和反馈循环管理更长、多步骤的任务。'
- en: '**Reinforcement learning and feedback-based systems** support adaptation, allowing
    agents to learn from performance and evolve over time.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强化学习和基于反馈的系统**支持适应性，使代理能够从性能中学习并随着时间的推移而发展。'
- en: While execution skills are already accessible via low - code platforms, adaptation
    skills are more advanced, often requiring deeper integration, monitoring, and
    guardrails.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然执行技能可以通过低代码平台获得，但适应性技能更为高级，通常需要更深入的集成、监控和限制。
- en: '**A quick reality check**'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: '**快速现实检查**'
- en: Agentic mode is by far the most complex and technically demanding of all five
    AI modes. While the idea of a self-running AI agent sounds like the ultimate solution,
    it’s rarely a good starting point. These systems require careful configuration,
    monitoring, and often deep customization to work reliably in production.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式是五种 AI 模式中最复杂和最具技术挑战性的。虽然自运行的 AI 代理的想法听起来是终极解决方案，但它很少是一个好的起点。这些系统需要仔细配置、监控，并且通常需要深入定制才能在生产中可靠地运行。
- en: 'Throughout this book, you’ll learn how to scale your AI journey - from low
    to high automation - in a way that’s realistic and sustainable. For now, just
    remember: Agentic AI might sound like the answer to every problem, but the reality
    often lands very differently.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，你将学习如何以现实和可持续的方式扩展你的 AI 之旅——从低自动化到高自动化。现在，只需记住：代理 AI 可能听起来是每个问题的答案，但现实往往大相径庭。
- en: '**Where it shows up in the business?**'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '**它在业务中出现在哪里？**'
- en: 'Agentic mode is still emerging - but it’s already changing how work gets done:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式仍在兴起——但它已经改变了工作完成的方式：
- en: '**Sales and marketing** teams use it to send follow-ups, auto-generate reports,
    and update CRMs without lifting a finger.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**销售和营销**团队使用它来发送跟进、自动生成报告，并更新 CRM 而无需动手。'
- en: '**Support and success** teams use it to resolve customer tickets, escalate
    issues, and adapt knowledge-based responses over time.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持和成功**团队使用它来解决客户工单、升级问题，并随着时间的推移调整基于知识的响应。'
- en: '**Cross-functional teams** use agents to orchestrate multi-system handoffs,
    coordinate deliverables, or drive end-to-end processes automatically.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨职能团队**使用代理来编排多系统交接、协调交付成果或自动驱动端到端流程。'
- en: Agentic mode is where AI kind of *comes alive* - bridging insight and action
    to drive real outcomes on autopilot.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式是 AI 有点像“活过来”的地方——连接洞察力和行动，以自动驱动实际成果。
- en: 'These five AI modes - Prediction, Perception, Creation, Thinking, and Agentic
    - together with the underlying AI skill categories will be your guardrails when
    mapping AI opportunities and designing AI solution concepts along with this book.
    To make it easy for you to access these modes, I’ve created a spreadsheet you
    can keep close and use any time you want: [https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx).'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这五种 AI 模式——预测、感知、创造、思考和代理——以及背后的 AI 技能类别，将是你在这本书中映射 AI 机会和设计 AI 解决方案概念时的限制因素。为了方便你访问这些模式，我创建了一个你可以随时使用的电子表格：[https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch02/AI_Skills.xlsx)。
- en: Before we wrap up this chapter, let’s dive a little deeper into how LLMs work.
    LLMs are now an integral part of modern AI, hence it is essential to briefly touch
    upon how they function. You can skip this section if you know how LLMs function.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束这一章之前，让我们更深入地探讨一下 LLMs 的工作原理。LLMs 现在是现代 AI 的一个组成部分，因此简要了解它们是如何工作的至关重要。如果你知道
    LLMs 的工作原理，可以跳过这一节。
- en: Understanding LLMs
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解 LLMs
- en: I know this isn’t supposed to be a super technical book, but since LLMs can
    be found at so many interaction points with modern AI systems and are often used
    across all the five AI modes, it’s worth understanding how they work at a high
    level so you don’t fall for the most common pitfalls. LLMs can be a lot like those
    magicians you see on stage. If you don’t know how their *trick* works, you might
    easily overestimate their capabilities. Of course, they can’t make a real coffee
    table fly, but the illusion is perfect. So, let’s take a look behind the curtain.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道这本书不应该是一本超级技术性的书，但鉴于LLM可以在现代AI系统的许多交互点找到，并且经常用于所有五种AI模式中，了解它们在高级别上是如何工作的很有价值，这样你就不会陷入最常见的陷阱。LLM可以像你在舞台上看到的那些魔术师一样。如果你不知道他们的**技巧**是如何工作的，你可能会轻易高估他们的能力。当然，他们不能让真正的咖啡桌飞起来，但幻觉是完美的。所以，让我们揭开幕布看看。
- en: 'At their core, LLMs, such as the ones used in ChatGPT, perform one primary
    task: they predict the next word (or more precisely, a token, which can be just
    a part of one word, but we’ll talk about words to keep it simple) in a sequence
    based on the context they’ve been given. This seemingly simple mechanism powers
    everything from casual conversation to deep strategic insights.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 在本质上，LLM，如ChatGPT中使用的LLM，执行一个主要任务：根据它们所提供的上下文，预测序列中的下一个单词（或者更准确地说，一个标记，它可能只是一个单词的一部分，但为了简单起见，我们将谈论单词）。这个看似简单的机制推动了从日常对话到深入战略洞察的一切。
- en: 'Consider this example: you enter the phrase `The sky is` into an LLM. Behind
    the scenes, the model assigns probabilities to possible next words: *blue* might
    be highly probable, while *usually* or *the* would score much lower. You can see
    this example in *Figure 2.9*:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这个例子：你将短语`The sky is`输入到LLM中。幕后，模型为可能的下一个单词分配概率：`blue`可能高度可能，而`usually`或`the`的得分会低得多。你可以在**图2.9**中看到这个例子：
- en: '![Figure 2.9: Illustration of how an LLM works. Source: Annie Surla/NVIDIA
    blog at https://developer.nvidia.com/blog/how-to-get-better-outputs-from-your-large-language-model/](img/B31200_02_09.png)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![图2.9：LLM工作原理的示意图。来源：Annie Surla/NVIDIA博客[https://developer.nvidia.com/blog/how-to-get-better-outputs-from-your-large-language-model/](https://developer.nvidia.com/blog/how-to-get-better-outputs-from-your-large-language-model/)](img/B31200_02_09.png)'
- en: 'Figure 2.9: Illustration of how an LLM works. Source: Annie Surla/NVIDIA blog
    at [https://developer.nvidia.com/blog/how-to-get-better-outputs-from-your-large-language-model/](https://developer.nvidia.com/blog/how-to-get-better-outputs-from-your-large-language-model/
    )'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.9：LLM工作原理的示意图。来源：Annie Surla/NVIDIA博客[https://developer.nvidia.com/blog/how-to-get-better-outputs-from-your-large-language-model/](https://developer.nvidia.com/blog/how-to-get-better-outputs-from-your-large-language-model/)
- en: So the LLM doesn’t really *know* that the sky is blue - it’s simply inferring
    that based on having seen that phrase frequently in its training data and learned
    the statistical patterns.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，LLM并不真正**知道**天空是蓝色的——它只是根据在训练数据中频繁看到这个短语并学习到统计模式而推断出来的。
- en: But how exactly does the AI know which word to predict?
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 但AI究竟是如何知道预测哪个单词的呢？
- en: A pivotal moment came in 2017 with Google’s *Attention is All You Need* paper
    ([https://en.wikipedia.org/wiki/Attention_Is_All_You_Need](https://en.wikipedia.org/wiki/Attention_Is_All_You_Need)).
    This introduced the concept of **attention mechanisms** - an approach that helps
    models decide which parts of a sentence to *focus* on to predict the next word
    more accurately. This way, the input `The sky is` will likely return `blue`, but
    the input sequence `The sky is not always` might instead yield `clear` or `predictable`,
    because the model is now attending to the word *not* as well. In essence, attention
    enables the model to weigh the importance of each word in context, rather than
    treating all preceding words equally. This approach, known as attention, is now
    a core component that still underpins all modern LLMs.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 2017年，谷歌发表的《**Attention is All You Need**》论文([https://en.wikipedia.org/wiki/Attention_Is_All_You_Need](https://en.wikipedia.org/wiki/Attention_Is_All_You_Need))是一个转折点。这篇论文引入了**注意力机制**的概念——一种帮助模型决定关注句子中哪些部分以更准确地预测下一个单词的方法。这样，输入`The
    sky is`很可能会返回`blue`，但输入序列`The sky is not always`可能会产生`clear`或`predictable`，因为模型现在也在关注单词`not`。本质上，注意力使模型能够根据上下文权衡每个单词的重要性，而不是平等地对待所有前面的单词。这种被称为注意力的方法，现在仍然是所有现代LLM的核心组件。
- en: You might wave this off as a technical detail, but understanding the power and
    limitation of this attention mechanism is crucial when working with LLMs. If you
    clearly explain what you want to an LLM, you’ll get a better response. On the
    other hand, one tiny misplaced character in the instruction might lead the model
    to return entirely different outputs. This is why the instructions you give an
    LLM - called **prompts** - are so important. Crafting strong prompts is not just
    a technical trick; it’s a practical skill that unlocks better results.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会把这个当作一个技术细节，但理解这种注意力机制的力量和局限性，当与LLM一起工作时至关重要。如果你清楚地告诉LLM你想要什么，你会得到更好的响应。另一方面，指令中的一个小错误可能会导致模型返回完全不同的输出。这就是为什么你给LLM的指令——称为**提示**——如此重要。制作强大的提示不仅是一种技术技巧，而且是一种解锁更好结果的实际技能。
- en: A common misconception is that LLMs *get better* the more you use them. In truth,
    they **start from scratch with each session**, unless fine-tuned or explicitly
    designed to remember context (e.g., via custom solutions or memory-enabled setups
    such as personalization in ChatGPT).
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见的误解是，LLM使用得越多，就会变得越好。实际上，它们**每次会话都是从零开始**，除非经过微调或明确设计为记住上下文（例如，通过定制解决方案或具有记忆功能的设置，如ChatGPT中的个性化）。
- en: So, improving LLM performance ad hoc is less about *training the model* and
    more about adapting your inputs - a skill known as **prompt engineering**.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，临时提高LLM性能更多的是关于**训练模型**，而不是适应你的输入——这是一种称为**提示工程**的技能。
- en: To immediately get better outputs, you must adapt to the LLM, not the other
    way around!
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 要立即获得更好的输出，你必须适应LLM，而不是反过来！
- en: Let’s walk through an example to see how the LLM **thinks**.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个例子来看看LLM是如何**思考**的。
- en: 'Suppose you prompt the model with something like this:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你用类似以下的方式提示模型：
- en: '[PRE0]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Internally, the LLM begins by generating a probability distribution over the
    next possible words:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在内部，LLM首先生成一个关于下一个可能单词的概率分布：
- en: Some likely continuations might include words such as *It*, *The*, or *Typically*.
    The model chooses the next token based on a probability distribution - which means
    that if you run the same input multiple times, you might get the same response
    or a different one. It all depends on how probable each option is and how the
    model samples from that distribution.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 一些可能的后续词汇可能包括 *It*、*The* 或 *Typically*。模型根据概率分布选择下一个标记，这意味着如果你多次运行相同的输入，你可能会得到相同的响应或不同的响应。这完全取决于每个选项的可能性以及模型如何从该分布中进行采样。
- en: This built-in randomness is intentional. It allows for variation and creativity
    in the output, rather than just repeating the same phrasing or parroting the training
    data. This is what makes LLMs *generative* - they’re not simply retrieving answers,
    they’re creating responses word by word based on probabilities.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这种内置的随机性是有意为之的。它允许输出中的变化和创造力，而不仅仅是重复相同的措辞或鹦鹉学舌训练数据。这就是LLM *生成性*的原因——它们不仅仅是检索答案，而是根据概率逐词创建响应。
- en: '![Figure 2.10: LLM considering several possible completions](img/B31200_02_10.png)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
  zh: '![图2.10：LLM考虑几种可能的完成](img/B31200_02_10.png)'
- en: 'Figure 2.10: LLM considering several possible completions'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.10：LLM考虑几种可能的完成
- en: Let’s say the model picks the word *The*.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 假设模型选择了单词 *The*。
- en: 'Hence, after sampling one completion, the LLM will add it to the input context,
    as follows:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在采样一个完成之后，LLM将把它添加到输入上下文中，如下所示：
- en: '[PRE1]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The model then predicts the next word based on this updated context.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 模型随后根据这个更新的上下文预测下一个单词。
- en: And it continues from there, one word at a time. The key point is that once
    a word is selected, it becomes locked into the sequence. There’s no going back.
    No built-in revision.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 它会逐词继续下去。关键点是，一旦选择了单词，它就会锁定在序列中。无法回退。没有内置的修订。
- en: 'The model is now forced to compute the following probability distribution given
    that the word *The* is observed at the end of the input sequence:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在观察到输入序列末尾的单词 *The* 后，模型现在被迫计算以下概率分布：
- en: '![Figure 2.11: LLM adding completion to input prompt and continuing completion
    process (second word)](img/B31200_02_11.png)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![图2.11：LLM将完成添加到输入提示并继续完成过程（第二个单词）](img/B31200_02_11.png)'
- en: 'Figure 2.11: LLM adding completion to input prompt and continuing completion
    process (second word)'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.11：LLM将完成添加到输入提示并继续完成过程（第二个单词）
- en: 'This process continues, and the LLM produces the output sentence word by word
    (or technically, token by token):'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程会继续进行，LLM逐词（或技术上，逐标记）产生输出句子：
- en: '[PRE2]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: And so on…
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 以此类推…
- en: '[PRE3]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: And so forth…
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 以此类推…
- en: '[PRE4]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Until
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 直到
- en: '[PRE5]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The model decides whether the prediction is complete or reaches the maximum
    number of tokens to predict. You see this behavior when ChatGPT *types* its response
    in real time. That’s essentially how LLMs work. **Next word prediction**. You
    can observe this behavior in ChatGPT.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 模型决定预测是否完成或达到预测的最大标记数。当你看到ChatGPT*实时*输入响应时，你会看到这种行为。这就是LLM的基本工作方式。**下一词预测**。你可以在ChatGPT中观察到这种行为。
- en: This is also why tools such as ChatGPT can find their own mistakes when asked
    to double-check their output.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么当要求工具如ChatGPT双检其输出时，它们可以发现自己错误的原因。
- en: For instance, you might see in the preceding example that the model *decided*
    the best digital marketing practice was *ads*. An *unlucky* sampling of the word
    *practice* instead of *practices* has limited the model to suggest only one *best
    practice* instead of multiple ones. As LLMs generate their output, they can only
    look forward, not backward. To *review* their work, you must explicitly ask them,
    and they’ll likely catch their errors (although that’s not guaranteed).
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可能在先前的例子中看到模型*决定*最佳的数字营销实践是*广告*。由于对单词*实践*而不是*实践们*的不幸采样，限制了模型只建议一个*最佳实践*而不是多个。当大型语言模型（LLMs）生成输出时，它们只能向前看，不能向后看。要*审查*它们的工作，你必须明确地要求它们，它们很可能会捕捉到它们的错误（尽管这并不保证）。
- en: There’s a secret sauce that makes this whole process work so well, generating
    astonishing results that stretch the definition of *fancy autocomplete*. To understand
    it, let’s look at an LLM that has just completed training on a large corpus of
    data (e.g., the internet, a whole library of books, and more). This is what AI
    people call a **base model** or **foundation model**.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种秘密的调料使得整个过程如此有效，产生了令人惊叹的结果，这些结果扩展了*花哨的自动完成*的定义。为了理解它，让我们看看一个刚刚在大量数据（例如，互联网、整个图书馆的书籍等）上完成训练的大型语言模型（LLM）。这就是AI人所说的**基础模型**或**基础模型**。
- en: If you gave this base model two questions, it would return a third question,
    because it’s trained to predict/repeat the input sequence pattern.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你给这个基础模型两个问题，它会返回第三个问题，因为它被训练去预测/重复输入序列的模式。
- en: '![Figure 2.12: Text completion by base model](img/B31200_02_12.png)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![图2.12：基础模型的文本生成](img/B31200_02_12.png)'
- en: 'Figure 2.12: Text completion by base model'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.12：基础模型的文本生成
- en: 'The first GPT models up to GPT-3 worked this way. But that’s not very useful.
    When we ask an LLM two questions, we want two (ideally correct) answers. So, OpenAI
    researchers came up with a trick. They took a smaller dataset of question-answer
    pairs and used it to fine-tune their base model. Instead of giving another question,
    it would give an answer. On top of that, to improve the answers, they hired people
    to manually vote on the best response. As a result, OpenAI generated an **instruction-tuned**
    model - an LLM that does not just autocomplete but actually follows instructions.
    So, if we ask two questions, we get two answers:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 最初的GPT模型直到GPT-3都是这样工作的。但这并不很有用。当我们向LLM提出两个问题时，我们希望得到两个（理想情况下是正确）答案。因此，OpenAI的研究人员想出了一个技巧。他们使用了一个较小的问答对数据集，并用它来微调他们的基础模型。它不会给出另一个问题，而是给出一个答案。在此基础上，为了提高答案，他们雇佣了人们手动投票选择最佳回应。结果，OpenAI生成了一个**指令微调**模型——一个不仅自动完成，而且真正遵循指令的LLM。所以，如果我们问两个问题，我们会得到两个答案：
- en: '![Figure 2.13: Text completion after instruction fine - tuning](img/B31200_02_13.png)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![图2.13：指令微调后的文本生成](img/B31200_02_13.png)'
- en: 'Figure 2.13: Text completion after instruction fine - tuning'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.13：指令微调后的文本生成
- en: That was the breakthrough moment for ChatGPT. It worked so well that people
    often forgot they were interacting with an AI doing next-word prediction. This
    is where the magic happened - and where many people got the wrong idea about AI
    systems. Because ChatGPT follows instructions so well and behaves confidently,
    you might think it knows what it’s doing. In practice, this can lead to disappointment
    and pitfalls. ChatGPT or any other LLM-based chatbot doesn’t really *know* anything.
    It has no self-awareness or consciousness. This is super critical to remember.
    So, instead, you should think of the model as *dumb*, but at the same time incredibly
    useful when applied to the right things.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是ChatGPT的突破性时刻。它工作得如此之好，以至于人们常常忘记他们正在与一个进行下一词预测的AI互动。这就是魔法发生的地方——也是许多人关于AI系统产生错误观念的地方。因为ChatGPT遵循指令如此之好，表现得如此自信，你可能会认为它知道自己在做什么。实际上，这可能导致失望和陷阱。ChatGPT或任何其他基于LLM的聊天机器人实际上并不*知道*任何事情。它没有自我意识或意识。这一点非常重要需要记住。因此，相反，你应该将模型视为*愚蠢的*，但同时在应用于正确的事情时却极其有用。
- en: 'The bottom line: LLMs predict the next word in a sequence. Your main control
    over the output is the prompt. As you can see next, when we provide more context
    in addition to just asking for marketing best practices, ChatGPT’s answer is adjusted
    to fit that context - which is both a powerful and also tricky concept to master:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 核心观点：LLM预测序列中的下一个单词。你对输出的主要控制是提示。正如你接下来可以看到的，当我们提供更多上下文，而不仅仅是询问营销最佳实践时，ChatGPT的回答会调整以适应那个上下文——这是一个强大且难以掌握的概念：
- en: '![Figure 2.14: Context (prompt) influencing LLM response](img/B31200_02_14.png)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![图2.14：上下文（提示）影响LLM的响应](img/B31200_02_14.png)'
- en: 'Figure 2.14: Context (prompt) influencing LLM response'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.14：上下文（提示）影响LLM的响应
- en: That’s the essence of prompt engineering. Be very specific about what you want.
    The way to control the behavior of an LLM is to control the prompt you give it.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是提示工程的核心。对你想要的东西要非常具体。控制LLM行为的方式是控制你给出的提示。
- en: Summary
  id: totrans-257
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'As we wrap up this chapter on understanding modern AI, one thing should be
    clear: this field is vast, fast-moving, and layered with complexity. From high-level
    ideas such as AI to practical tools such as GPT-5, each layer introduces new capabilities,
    and new challenges.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束本章对现代AI的理解时，有一点应该是明确的：这个领域广阔、快速移动，并且充满了复杂性。从AI这样的高级概念到GPT-5这样的实用工具，每一层都引入了新的能力，也带来了新的挑战。
- en: By understanding the five AI modes - Prediction, Perception, Creation, Thinking,
    and Agentic - you now have a practical framework to navigate this space. These
    modes reflect not just what the technology *is* but what it can *do* - and how
    those capabilities can translate into value for your business.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解五种AI模式——预测、感知、创造、思考和代理——你现在有一个实用的框架来导航这个空间。这些模式不仅反映了技术*是什么*，还反映了它*能做什么*——以及这些能力如何转化为你业务的价值。
- en: Remember, just as the POTUS once feared touching the light switch, it’s normal
    to feel cautious with something new. But the goal here isn’t to become an AI engineer,
    it’s to become confident flipping the right switches inside your own organization.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，就像美国总统曾经害怕触摸电灯开关一样，对新事物感到谨慎是很正常的。但这里的目的是不是要成为一名AI工程师，而是要自信地在你自己的组织中切换正确的开关。
- en: In the next chapter, we’ll shift from understanding to application. You’ll learn
    how to spot and design AI-powered solutions that match your business context-without
    getting lost in the technical weeds.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将从理解转向应用。你将学习如何发现和设计符合你业务背景的AI解决方案，而不会迷失在技术细节中。
