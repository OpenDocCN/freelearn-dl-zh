  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分
- en: Setting Sail
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 扬帆起航
- en: With your course defined, it’s time to leave the harbor and set sail. This final
    part of the book takes you from planning to action. You’ll learn how to build
    effective prototypes, scale them into production-ready systems, and leverage the
    growing ecosystem of AI tools to accelerate your journey. Along the way, we’ll
    cover pitfalls to avoid, strategies for sustainable scaling, and how to equip
    your teams with the right capabilities. By the end, you’ll be ready to operationalize
    AI in a way that delivers lasting business value.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义好课程之后，是时候离开港口扬帆起航了。本书的最后一部分将带你从规划过渡到行动。你将学习如何构建有效的原型，将它们扩展到生产就绪的系统，并利用不断增长的AI工具生态系统来加速你的旅程。在这个过程中，我们将讨论需要避免的陷阱、可持续扩展的策略，以及如何为你的团队配备正确的能力。到结束时，你将准备好以能够带来持久商业价值的方式实施AI。
