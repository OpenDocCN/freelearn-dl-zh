  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '#将响应写回报告'
- en: dataset.at[index, "reslt"] = reply
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: dataset.at[index, "reslt"] = reply
