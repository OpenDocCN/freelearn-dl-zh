- en: Get Open AI API from windows environment
  id: totrans-226
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 Windows 环境中获取 Open AI API
- en: openai.api_key = "Your Open AI API Key"
  id: totrans-227
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: openai.api_key = "您的 Open AI API 密钥"
- en: '[PRE4]'
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Loop through each row in dataset & concatenate the data into a single string.
    Pass resulting string to the API
  id: totrans-229
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
  zh: 遍历dataset中的每一行，将数据合并成单个字符串。将生成的字符串传递给API
- en: 'for index,row in dataset.iterrows():'
  id: totrans-230
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'for index,row in dataset.iterrows():'
- en: messages="I am going to give you a set of company information in the following
    order Company,Price to Earnings,Price to Book,Return on Equity %,Debt to Equity,Current
    Ratio,Gross Margin %,analyze the ratios for each company, refer to the company
    by its name and write a concise response"
  id: totrans-231
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: messages="我要给你提供一系列公司信息，按照以下顺序：公司，市盈率，市净率，净资产收益率%，资产负债率，流动比率，毛利率%，分析每家公司的比率，用公司名称进行引用，并撰写简明扼要的回复"
- en: message = ''.join ([str(col) for col in row])
  id: totrans-232
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: message = ''.join ([str(col) for col in row])
- en: '[PRE5]'
  id: totrans-233
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '#Build the API request to include row level data from source'
  id: totrans-234
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '#构建API请求以包含来自源数据的行级数据'
- en: messages += " " + str(message)
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: messages += " " + str(message)
- en: '#Make a chat completion Request for the API'
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '#向API发送聊天完成请求'
- en: chat = openai.ChatCompletion.create(
  id: totrans-237
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: chat = openai.ChatCompletion.create(
- en: model = "gpt-3.5-turbo",
  id: totrans-238
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: model = "gpt-3.5-turbo",
- en: messages = [{"role":"user","content":messages}],
  id: totrans-239
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: messages = [{"role":"user","content":messages}],
- en: temperature = 0.9,
  id: totrans-240
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: temperature = 0.9,
- en: max_tokens = 500,
  id: totrans-241
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: max_tokens = 500,
- en: top_p = 1,
  id: totrans-242
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: top_p = 1,
- en: frequency_penalty = 0,
  id: totrans-243
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: frequency_penalty = 0,
- en: presence_penalty = 0.6
  id: totrans-244
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: presence_penalty = 0.6
- en: )
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: )
- en: '#Process the response from API'
  id: totrans-246
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '#处理API的响应'
- en: reply = chat.choices[0].message.content
  id: totrans-247
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: reply = chat.choices[0].message.content
