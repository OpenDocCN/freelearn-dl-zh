- en: Optimizing and refactoring Apex code
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'During many Salesforce projects, there is a metric that is usually the most
    difficult to refactor: cyclomatic complexity. Cyclomatic complexity is a software
    metric that’s used to indicate the complexity of a program. It’s calculated by
    developing a control flow graph of the code and then determining the number of
    paths through the graph. Higher values indicate more complex and potentially more
    error-prone code.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s have a look at a class with high cyclomatic complexity:'
