- en: Part 2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Designing, Building, and Scaling AI Agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this part, we dive into the practical aspects of designing, developing, and
    deploying AI agents. Building on the foundational concepts introduced in *Part
    1*, you’ll now explore how to structure intelligent, goal-oriented systems using
    modern orchestration frameworks, memory modules, and tool integrations.
  prefs: []
  type: TYPE_NORMAL
- en: We begin by understanding the role of an AI orchestrator—a central component
    that coordinates tasks, tools, and memory to enable complex workflows. You’ll
    get familiar with the most popular orchestrators in the market and learn how to
    select and configure one for your needs.
  prefs: []
  type: TYPE_NORMAL
- en: The chapters then focus on managing memory and context, which are essential
    for making AI agents persistent, adaptive, and capable of handling multi-turn
    interactions. We’ll also cover how to extend agents with external tools and APIs,
    enabling real-time data access, integration with enterprise systems, and broader
    actionability.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll put theory into practice by building your first agent using LangChain,
    step by step. Through hands-on examples, you’ll develop domain-specific assistants
    for e-commerce and customer support, and understand the reusable components that
    underpin agent design.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we will explore the world of multi-agent systems, where multiple agents
    collaborate to solve tasks. You’ll learn how to design group chats, hierarchical
    agent structures, and even build your first multi-agent app with LangGraph.
  prefs: []
  type: TYPE_NORMAL
