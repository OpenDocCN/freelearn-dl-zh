- en: '1'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Understanding AI, ML, and Azure’s AI Services
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Artificial Intelligence** (**AI**) and **Machine Learning** (**ML**) are
    becoming critical drivers of technological innovation, transforming industries
    globally. In this chapter, we’ll cover key AI and ML concepts, including supervised,
    unsupervised, and reinforcement learning, and touch on advanced areas such as
    deep learning and **Generative AI** (**GenAI**). You’ll also be introduced to
    essential elements such as **Large and Small Language Models** (**LLMs and SLMs**),
    **Natural Language Processing** (**NLP**), and prompt engineering, which are foundational
    for building intelligent systems. This chapter will give you a solid understanding
    without delving too deeply into technical theory.'
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, we’ll explore Azure’s key AI services, such as AI Search, Document
    Intelligence, Azure OpenAI Service, Vision, Speech, Language, and Content Safety.
    For each, we’ll outline its core features, functionality, and practical use cases.
    This chapter aims to build a knowledge base that will help you better understand
    the concepts and tools discussed in subsequent chapters. You can refer back to
    it for clarity as you progress through the book.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you’ll explore the following key topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Core concepts of AI, ML, and how they relate to each other
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'An overview of different types of ML: supervised, unsupervised, and reinforcement
    learning'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Introduction to deep learning and its application in real-world AI scenarios
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding GenAI and how it creates new content such as text and images
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The role of **Language Models** (**LMs**), including LLMs and SLMs, in natural
    language understanding
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Practical applications of NLP and the importance of prompt engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Six foundational AI techniques—prompt engineering, NLP, **Retrieval-Augmented
    Generation** (**RAG**), grounding, embedding, and tokenization—that power intelligent
    applications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overview of Microsoft Azure’s key AI services, including Azure AI Search, Document
    Intelligence, Azure OpenAI, Vision, Speech, Language, and Content Safety
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Real-world scenarios where each Azure AI service is most effective and guidance
    on selecting the right tools for your use case
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s jump in and review the key concepts!
  prefs: []
  type: TYPE_NORMAL
- en: 'Foundations of AI: exploring ML, LMs, and key AI capabilities'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The following diagram provides a high-level overview of the relationship between
    AI, ML, deep learning, GenAI, and LMs. Each layer represents a subset of the previous,
    showcasing the evolution of AI technology. Starting with AI in 1956, ML in 1997,
    and deep learning in 2017, the diagram also highlights how LMs and GenAI, which
    emerged more recently, fit into this broader context. Further details on these
    technologies are discussed in the following section.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.1 – Brief AI history](img/B31034_01_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.1 – Brief AI history
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive deeper.
  prefs: []
  type: TYPE_NORMAL
- en: AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While AI refers to the broader goal of simulating human intelligence, ML is
    one of the core methods used to achieve it. ML provides the statistical techniques
    and models that enable AI to learn from data.
  prefs: []
  type: TYPE_NORMAL
- en: AI is like a smart assistant that can perform tasks that typically require human
    intelligence, such as understanding language, recognizing images, making decisions,
    translating, and solving problems. Imagine having a robot that can sort your photos,
    play chess, translate to another language, book appointments for you, or even
    have conversations with you—AI makes this possible.
  prefs: []
  type: TYPE_NORMAL
- en: ML
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ML is a branch of data science focused on training models to make predictions
    or decisions based on data. Instead of being explicitly programmed for every task,
    ML enables systems to learn patterns from examples and improve over time.
  prefs: []
  type: TYPE_NORMAL
- en: ML is like teaching a child to recognize animals by showing them many pictures
    labeled with names. Over time, the child learns to identify new animals on their
    own. Similarly, ML allows computers to learn from past data and generalize to
    new, unseen situations.
  prefs: []
  type: TYPE_NORMAL
- en: 'ML is broadly categorized into three main types, each with distinct characteristics
    and use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Supervised learning**: This approach uses labeled data to train models to
    recognize patterns and make predictions. It’s used in scenarios where accuracy
    is critical, such as medical diagnosis or fraud detection. For example, a supervised
    learning model is trained on thousands of labeled X-ray images to detect whether
    a tumor is present.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unsupervised learning**: Here, the model identifies patterns or groupings
    in data without labeled outcomes. It’s useful for discovering hidden structures,
    such as customer segments or anomalies. For instance, a credit card company uses
    unsupervised learning to detect suspicious transactions that deviate from typical
    user behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reinforcement learning**: In this type, the model learns by interacting with
    an environment and receiving rewards or penalties based on its actions. It’s ideal
    for decision-making tasks involving sequences of actions. For example, a reinforcement
    learning agent optimizes energy usage in a data center by adjusting cooling and
    power settings based on real-time conditions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each of these types of ML has distinct advantages and is suitable for different
    types of problems.
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep learning is a specialized subset of ML that uses artificial neural networks
    to model and learn complex patterns from large volumes of data. These networks
    are inspired by the structure of the human brain and consist of multiple interconnected
    layers (hence the term *deep*).
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning models automatically learn features from raw data without the
    need for manual feature engineering. They excel in handling unstructured data—such
    as text, images, and audio—where traditional ML may struggle. For example, in
    NLP, deep learning enables chatbots to understand context, recognize intent, and
    respond naturally by learning from vast amounts of conversational data.
  prefs: []
  type: TYPE_NORMAL
- en: The impact of deep learning spans many domains, including image recognition,
    **Text-To-Speech** (**TTS**), language translation, recommendation systems, and
    autonomous vehicles. It has revolutionized industries such as healthcare, finance,
    retail, and digital marketing by enabling highly accurate and scalable AI solutions.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a deep learning model can power a virtual assistant capable of
    understanding your voice commands, converting them into text, interpreting your
    request, and generating a human-like response—all in real time.
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning’s ability to extract insights from complex, high-dimensional data
    has made it a cornerstone of modern AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: Did you know?
  prefs: []
  type: TYPE_NORMAL
- en: '**Generative Pre-trained Transformers** (**GPTs**) are deep learning models
    that generate natural language text. They can be customized for specific tasks
    and purposes, allowing users to create tailored GPTs for various applications.'
  prefs: []
  type: TYPE_NORMAL
- en: GenAI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GenAI is a type of AI that can create new content, such as text, images, music,
    and videos. It’s like having a creative artist who, after studying many examples
    of art, can produce original paintings. GenAI learns from existing data and generates
    new, original works based on that learning.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a talented chef who not only cooks but also creates new recipes.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.2 – An example of the GenAI process](img/B31034_01_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.2 – An example of the GenAI process
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s break down these elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data (ingredients and recipes)**: AI and ML learn from a large amount of
    data, similar to how a chef needs ingredients and recipes to cook.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**ML (learning recipes)**: ML helps the AI learn from this data, improving
    its ability to perform tasks, much like a chef practicing recipes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**AI (chef cooking)**: The AI uses what it has learned to perform tasks, just
    like a chef cooking a meal.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**GenAI (creating new recipes)**: GenAI takes it a step further by creating
    new and original content, similar to a chef inventing new recipes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Application (delicious dishes and new creations)**: The result is an application
    that can perform intelligent tasks and create new content, providing valuable
    solutions and innovative creations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Did you know?
  prefs: []
  type: TYPE_NORMAL
- en: Do you know why GenAI is so popular? Its ability to create new, original content—such
    as text, images, and music—is transforming industries with content creation, design,
    and software development. By automating creative tasks, it enhances productivity
    and enables rapid innovation across various fields.
  prefs: []
  type: TYPE_NORMAL
- en: LMs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LMs are a type of ML model trained to understand and generate human language.
    They form the foundation for many NLP tasks by analyzing vast amounts of text
    to learn grammar, meaning, and context.
  prefs: []
  type: TYPE_NORMAL
- en: LMs are used for a wide range of tasks such as text classification, summarization,
    sentiment analysis, question answering, and content generation. These models predict
    the next word in a sentence or evaluate the probability of a phrase, enabling
    them to produce coherent and contextually appropriate responses.
  prefs: []
  type: TYPE_NORMAL
- en: For example, when you ask a chatbot, “What’s the weather in London?”, an LM
    helps interpret your intent and generate a natural response such as “It’s currently
    12°C and cloudy in London.”
  prefs: []
  type: TYPE_NORMAL
- en: Modern LMs range from small, task-specific models to LLMs such as GPT, which
    are capable of handling complex, multi-turn conversations and even working across
    modalities such as text, images, or code. These models power everyday AI experiences
    such as search engines, writing assistants, and virtual agents.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs and SLMs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: LLMs are powerful AI models trained on massive datasets that enable them to
    understand, generate, and reason with natural language. Their broad knowledge
    and contextual understanding make them ideal for tasks such as chatbots, summarization,
    translation, and content creation. LLMs can also operate in **multimodal** scenarios—processing
    not just text but also images, audio, or code—extending their use cases across
    industries. For example, an LLM can power a virtual assistant that summarizes
    customer emails, generates draft replies, and extracts key tasks to populate a
    to-do list—all within seconds.
  prefs: []
  type: TYPE_NORMAL
- en: SLMs, by contrast, offer a lightweight alternative to LLMs, delivering many
    of the same capabilities with fewer computational resources. They are designed
    for efficiency, making them suitable for running on devices with limited memory,
    such as laptops or mobile phones. Microsoft’s **Phi** model series exemplifies
    this, with Phi-3 and Phi-4 models offering impressive performance despite having
    far fewer parameters than traditional LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: SLMs are especially useful when speed, cost-efficiency, and local processing
    are priorities. Together, LLMs and SLMs allow developers to choose the right balance
    of performance, size, and deployment flexibility for their AI applications. In
    **multi-model** solutions, these models can even be combined—where an SLM handles
    lightweight local tasks and an LLM steps in for more complex reasoning—creating
    a smart, efficient, and scalable AI system.
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: New models are continuously being introduced, offering greater power and efficiency
    at lower costs. Be sure to check the availability of the latest models beyond
    those mentioned in this book, as some versions may become outdated by the time
    of publication.
  prefs: []
  type: TYPE_NORMAL
- en: Six key AI capabilities
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To effectively build intelligent solutions using Azure AI, it’s essential to
    understand six foundational capabilities that drive most modern AI applications.
    These capabilities—NLP, prompt engineering, RAG, grounding, embedding, and tokenization—form
    the building blocks for working with LMs, building chat interfaces, automating
    content, and retrieving relevant data. Together, these capabilities empower developers
    to create reliable, context-aware, and high-performing AI solutions. The following
    sections explain each concept with practical examples to help you connect theory
    to real-world application.
  prefs: []
  type: TYPE_NORMAL
- en: NLP
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: NLP enables AI systems to understand, interpret, and respond to human language—both
    spoken and written. It powers capabilities such as speech-to-text, chatbots, sentiment
    analysis, and language translation. For instance, when you ask a voice assistant,
    “What’s the weather today?”, NLP helps convert your speech to text, understand
    your intent, and generate a spoken response with the current forecast. [*Chapter
    6*](B31034_06.xhtml#_idTextAnchor117) provides a detailed walkthrough of this
    topic.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt engineering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the art of crafting clear, purposeful inputs—called **prompts**—that
    guide GenAI models to produce specific results. A well-structured prompt helps
    the model stay on topic and deliver accurate content. For example, prompting a
    model with “Summarize this email thread into key points for a meeting” can produce
    a concise summary, saving time and ensuring clarity. More details will be covered
    in the *Advanced techniques in generative AI* section in [*Chapter 8*](B31034_08.xhtml#_idTextAnchor167).
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Fine-tuning is the process of adapting a pre-trained language model to perform
    better on a specific task or domain by training it further on a smaller, specialized
    dataset. This helps the model align more closely with the unique language, tone,
    or structure of your target content. For example, you can fine-tune a base GPT
    model to draft legal contracts or respond to customer service tickets in your
    organization’s preferred style. Unlike prompt engineering, which controls output
    by adjusting the input prompt, fine-tuning adjusts the model’s internal weights,
    enabling it to consistently deliver tailored responses across multiple use cases.
    Fine-tuning is particularly useful when accuracy, consistency, or domain specificity
    is critical. For a deeper dive into fine-tuning, refer to *Exercise 5*, *Fine-tuning
    models with your own data*, in [*Chapter 8*](B31034_08.xhtml#_idTextAnchor167).
  prefs: []
  type: TYPE_NORMAL
- en: RAG
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: RAG combines the power of search with language generation. Instead of relying
    solely on what the model was trained on, RAG retrieves relevant information from
    external sources and provides it to the model before it responds. This leads to
    more accurate, up-to-date answers. For example, a chatbot using RAG can look up
    your company’s internal documentation to answer a policy question, even if the
    base model wasn’t trained on that information. More details will be covered throughout
    [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140) and in the *Chat your own data*
    section of [*Chapter 10*](B31034_10.xhtml#_idTextAnchor191).
  prefs: []
  type: TYPE_NORMAL
- en: Grounding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Grounding is the process of ensuring that an AI model’s responses are based
    on factual, real-world information rather than relying solely on its internal
    training data—which may be outdated or incomplete. It connects the model to trusted
    external sources, such as company knowledge bases, databases, or documents, so
    that generated responses reflect current and contextually relevant information.
    For example, if a user asks about your organization’s travel policy, grounding
    enables the AI to retrieve and cite the latest version of that policy from an
    internal document rather than guessing. Grounding is essential in RAG systems
    and plays a key role in reducing hallucinations—responses that sound plausible
    but are inaccurate or fabricated.
  prefs: []
  type: TYPE_NORMAL
- en: Did you know?
  prefs: []
  type: TYPE_NORMAL
- en: Grounding significantly reduces hallucinations, which are when a model generates
    inaccurate or made-up responses without real-world context.
  prefs: []
  type: TYPE_NORMAL
- en: Embedding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the technique of converting text, images, or other types of data into
    numerical vectors that represent their meaning and context. These vectors allow
    AI systems to compare, group, and search information based on similarity rather
    than exact matches. This is especially useful in applications such as semantic
    search, recommendations, and RAG, where understanding context is more important
    than matching keywords.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in the simplified 3D vector space shown in *Figure 1**.3*, the
    word *cat* might be represented as *[0.8, 0.2, -0.5]*, while *dog* could be *[0.7,
    0.1, -0.4]*—close in distance, showing they’re semantically similar. In contrast,
    an unrelated word such as *car* might be *[-0.3, 0.9, 0.7]*, positioned farther
    away. This spatial arrangement enables AI models to reason about meaning and relationships
    in language. Embeddings power advanced features in Azure AI Search, such as vector
    search and hybrid retrieval, making it possible to deliver highly relevant and
    contextual search results across large, unstructured datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.3 – Similarity embedding vector space](img/B31034_01_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.3 – Similarity embedding vector space
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s look at tokenization.
  prefs: []
  type: TYPE_NORMAL
- en: Tokenization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the process of breaking down text into smaller units called **tokens**,
    which are the basic building blocks that LMs understand. Tokens can be full words,
    parts of words, or even punctuation marks. Tokenization is the first step in training
    and using transformer-based models such as GPT, enabling them to analyze and generate
    language effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, consider the following sentence: *I heard a dog bark loudly at*
    *a cat*.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To tokenize this text, you can identify each discrete word and assign token
    IDs to them, as in this example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The sentence can now be represented with the tokens `{1 2 3 4 5 6 7 3 8}`. Similarly,
    the sentence *I heard a cat* could be represented as `{1 2` `3 8}`.
  prefs: []
  type: TYPE_NORMAL
- en: 'As you continue to train the model, each new token in the training text is
    added to the vocabulary with appropriate token IDs:'
  prefs: []
  type: TYPE_NORMAL
- en: '`meow (9)`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`skateboard (10)`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And so on...
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With a sufficiently large set of training texts, a vocabulary of many thousands
    of tokens could be compiled. To explore how tokens are calculated for LLMs, you
    can visit [https://token-calculator.net/](https://token-calculator.net/).
  prefs: []
  type: TYPE_NORMAL
- en: Now that you have a solid understanding of the basic AI and ML concepts, let’s
    explore Azure AI services in a practical way. We’ll review the available services,
    examine the key features of each, understand how they function, and identify when
    to use them effectively. This section will guide you through the services, offering
    insights into how they can be applied in real-world scenarios to maximize your
    AI solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Exploring Azure AI services
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Azure provides a comprehensive suite of AI services designed to accelerate the
    development of intelligent applications. These services cover a broad range of
    capabilities, including vision, language, speech, search, and GenAI. With prebuilt
    models, APIs, and customization options, developers can quickly integrate advanced
    AI features into their solutions without needing deep ML expertise.
  prefs: []
  type: TYPE_NORMAL
- en: At the core of this ecosystem is the **Azure AI Foundry** platform (discussed
    in detail in the *AI Foundry* section of [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033))—a
    unified environment for building, deploying, and managing AI applications. It
    streamlines the development process by combining model training, data integration,
    and deployment workflows with enterprise-grade security and compliance features.
    Azure AI Foundry empowers teams to collaborate efficiently while scaling AI solutions
    across the organization.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.4 – Overview of Azure AI services](img/B31034_01_004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.4 – Overview of Azure AI services
  prefs: []
  type: TYPE_NORMAL
- en: The following is a breakdown of the key Azure AI services, their core features,
    and practical use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: As Azure AI services rapidly evolve, model availability, API versions, and regional
    support can change frequently. Before starting a project or working through the
    hands-on exercises in this book, it’s essential to verify that the services and
    models you plan to use are supported in your chosen Azure region. This step helps
    avoid compatibility issues and ensures a smooth deployment experience.
  prefs: []
  type: TYPE_NORMAL
- en: To help you stay up to date, the *Further reading* section includes direct links
    to the official Microsoft documentation for each service. Reviewing these resources
    will ensure you’re working with the most current capabilities—keeping your solutions
    scalable, cost-effective, and aligned with production-ready standards.
  prefs: []
  type: TYPE_NORMAL
- en: Azure AI Search
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Azure AI Search** (formerly Azure Cognitive Search) is a cloud-based service
    that enables fast, secure, and scalable information retrieval across your own
    data. It supports keyword, semantic, and vector-based search, making it a versatile
    tool for both traditional and GenAI applications.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Flexible search capabilities**: Supports full-text, semantic, vector, and
    hybrid search across structured and unstructured content'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Comprehensive indexing**: Offers data chunking, vectorization, **Optical
    Character Recognition** (**OCR**), and built-in language analysis tools'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Advanced query support**: Enables fuzzy search, filters, autocomplete, faceting,
    geo-search, and semantic ranking'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Seamless integration**: Easily connects with Azure OpenAI, Azure ML, and
    external data pipelines'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Azure AI Search functions in two stages: **indexing** and **querying**. During
    indexing, your content is ingested, processed (e.g., chunked, vectorized, and
    tokenized), and stored in search indexes. Built-in AI enrichments—such as OCR
    and language detection—can be applied to enhance the content. When users issue
    queries, the service searches across the appropriate indexes and returns ranked
    results. Semantic ranking and hybrid retrieval ensure highly relevant responses,
    especially in RAG-based applications. For an in-depth look, see *Figure 7**.2*
    in [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140) and the *AI Search* section
    in [*Chapter 10*](B31034_10.xhtml#_idTextAnchor191).'
  prefs: []
  type: TYPE_NORMAL
- en: When to use Azure AI Search
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Enterprise search portals**: Enable employees to find content using natural
    language across large document repositories.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GenAI and RAG applications**: Retrieve vectorized content for context-aware
    language generation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom search experiences**: Build search tools with autocomplete, filters,
    and synonyms tailored to your business.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Centralized indexing**: Unify documents, structured data, and vector content
    under one searchable index.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multilingual and domain-specific search**: Apply linguistic rules or custom
    analyzers to improve accuracy across languages or specialized content domains.
    Implement a semantic document search tool that helps employees quickly find relevant
    internal reports using natural language queries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Did you know?
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI uses Azure AI Search as the vector database and retrieval systems in
    their RAG workloads, including ChatGPT, custom GPTs, and the Assistants API. OpenAI
    found Azure AI Search to be aligned with their unique scale needs, highly productive,
    and a complete retrieval system that went beyond vectors, offering hybrid retrieval,
    metadata filtering, and more.
  prefs: []
  type: TYPE_NORMAL
- en: In the video at [https://youtu.be/cjIE5fBInAE?si=j4FHgQ0lczRKUWO9](https://youtu.be/cjIE5fBInAE?si=j4FHgQ0lczRKUWO9),
    discover how ChatGPT, the fastest-growing consumer app in history with over 100
    million weekly active users, combines RAG-powered features, OpenAI’s trusted API,
    and Azure AI Search to tackle today’s and tomorrow’s biggest challenges!
  prefs: []
  type: TYPE_NORMAL
- en: Document Intelligence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Azure Document Intelligence** (formerly **Form Recognizer**, covered in detail
    in [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140)’s *Implementing Document Intelligence
    solution* section) is a cloud-based service that automates document processing
    by extracting structured data from forms, invoices, receipts, and other document
    types. It reduces manual data entry and enables scalable, accurate document workflows.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prebuilt, custom, and composed models**: Uses ready-made models for common
    documents or trains custom models for unique layouts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI-powered extraction**: Identifies and extracts key-value pairs, tables,
    selection marks, and text from scanned documents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexible interfaces**: Supports REST APIs, SDKs, and low-code tools for easy
    integration'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The service processes documents through OCR and ML models. Depending on the
    layout, it uses either prebuilt or custom-trained models to analyze and extract
    information such as line items, totals, and metadata. The extracted data is returned
    in structured formats (e.g., JSON) that can be directly integrated into downstream
    systems such as **Enterprise Resource Planning** (**ERP**) or databases.
  prefs: []
  type: TYPE_NORMAL
- en: When to use Azure Document Intelligence
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Invoice and receipt automation**: Streamline accounts payable by extracting
    data from scanned or digital documents.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom form processing**: Train custom models to handle forms with domain-specific
    layouts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Archival and search**: Convert paper archives into structured, searchable
    formats.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regulatory and compliance workflows**: Automatically detect key fields or
    data patterns to ensure documentation standards. Automatically extract line items
    from scanned invoices and upload structured data to a financial system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do you know?
  prefs: []
  type: TYPE_NORMAL
- en: Document field extraction features to help automatic labeling, grounding, and
    confidence scores by leveraging the LLM to improve accuracy. For more details,
    visit [https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/train/custom-model?view=doc-intel-4.0.0](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/train/custom-model?view=doc-intel-4.0.0).
  prefs: []
  type: TYPE_NORMAL
- en: Video Indexer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Azure AI Video Indexer** (covered in detail in [*Chapter 5*](B31034_05.xhtml#_idTextAnchor091)’s
    *Analyzing videos with Azure AI Video Indexer* section) is a video and audio analytics
    service that uses prebuilt AI models to extract detailed metadata from media content,
    such as spoken text, faces, scenes, objects, and emotions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Automatic transcription and translation**: Supports over 50 languages and
    generates multilingual captions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rich media insights**: Identifies topics, named entities, speaker timelines,
    brands, and sentiment'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom model training**: Recognizes specific people or visuals using account-trained
    models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content moderation and accessibility**: Detects inappropriate material and
    provides captioning for inclusiveness'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The service ingests audio or video content and applies AI models to identify
    spoken words, detect objects or faces, and extract other key metadata. All metadata
    is indexed and made searchable via APIs or the **Video Indexer** portal. You can
    also customize recognition logic by training models to detect known individuals
    or brand elements.
  prefs: []
  type: TYPE_NORMAL
- en: When to use Azure AI Video Indexer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Media libraries and archives**: Make large video repositories searchable
    by topics, people, or scenes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Broadcast and content platforms**: Add multilingual subtitles, scene segmentation,
    and moderation filters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Corporate training and compliance**: Automatically summarize and tag videos
    to ensure regulatory compliance and improve internal training material discoverability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Advertising and personalization**: Identify product placements, brand mentions,
    or emotional tone. Enhance a video platform by indexing large video libraries
    for scene-based search and multilingual subtitles.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Azure OpenAI Service
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Azure OpenAI Service** (covered in detail in [*Chapter 8*](B31034_08.xhtml#_idTextAnchor167))
    provides secure access to advanced OpenAI models such as GPT-4, GPT-4 Turbo with
    Vision, and GPT-3.5\. It enables enterprise-grade language capabilities such as
    summarization, chat, content creation, and code generation.'
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: New models are continuously being introduced, offering greater power and efficiency
    at lower costs. Be sure to check the availability of the latest models beyond
    those mentioned in this book, as some versions may become outdated by the time
    of publication. For more information, visit the official documentation at [https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models?tabs=global-standard%2Cstandard-chat-completions](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models?tabs=global-standard%2Cstandard-chat-completions).
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Access to powerful LMs**: Includes GPT-4o, Codex, DALL-E, and embeddings
    models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalable interfaces**: Uses APIs, SDKs, or the Azure OpenAI Studio for prototyping
    and production'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enterprise-grade controls**: Integrates with Azure networking, identity,
    and security features'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fine-tuning and batch inference**: Customizes outputs or runs large-scale
    processing jobs efficiently'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After deploying a model in Azure, developers interact with it using prompts
    through REST APIs or SDKs. Prompt engineering helps shape the response. For specialized
    tasks, fine-tuning can adjust the model’s behavior. Azure also provides tooling
    to monitor usage, apply content filtering, and ensure responsible AI practices.
  prefs: []
  type: TYPE_NORMAL
- en: When to use Azure OpenAI Service
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conversational agents and copilots**: Build assistants that understand context
    and respond naturally.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document summarization and insights**: Extract key points from contracts,
    reports, or support tickets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Code generation and refactoring**: Leverage Codex to write, review, or optimize
    code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Image understanding (vision)**: Analyze and describe visual inputs alongside
    text in multimodal workflows. Use GPT-4 to build a customer support chatbot that
    generates accurate, natural responses based on internal knowledge.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Did you know?
  prefs: []
  type: TYPE_NORMAL
- en: LangChain is a popular open source AI framework used to build applications powered
    by LMs, such as agents, tools, and chains. Microsoft’s **Semantic Kernel** is
    a production-ready and stable SDK designed for integrating LLMs into real-world
    applications with reliability and scalability. Meanwhile, **AutoGen** is a cutting-edge
    research SDK from Microsoft for developing advanced, multi-agent LLM systems,
    ideal for exploring state-of-the-art AI coordination and reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: Azure Vision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **Azure Vision** service (covered in detail in [*Chapter 8*](B31034_08.xhtml#_idTextAnchor167)’s
    *Analyzing images* section) provides powerful capabilities to extract, classify,
    and analyze visual information from images and videos using prebuilt and custom
    computer vision models.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prebuilt models**: Recognizes objects, text, landmarks, celebrities, and
    brands'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom vision**: Trains models with your labeled images for tailored recognition'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OCR and spatial analysis**: Extracts text and layout from scanned documents
    or monitors people’s flow'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment flexibility**: Runs in the cloud or export to edge devices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You upload an image or video frame to the Vision API, which applies prebuilt
    or custom-trained models, depending on your needs. For example, OCR can extract
    text from a document, while object detection highlights specific features in a
    photo. Custom vision lets you build models that specialize in your specific domain
    data.
  prefs: []
  type: TYPE_NORMAL
- en: When to use the Azure Vision service
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Manufacturing quality control**: Detect visual defects or anomalies in production.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Retail and inventory**: Identify products on shelves and automate cataloging.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document digitization**: Use OCR to convert paper records into structured
    text.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Smart spaces**: Monitor foot traffic and room usage using spatial analytics.
    Detect product defects on a manufacturing line using a custom-trained object detection
    model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Azure Speech
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **Azure Speech** service (covered in detail in [*Chapter 6*](B31034_06.xhtml#_idTextAnchor117)’s
    *Processing speech by using Azure AI Speech* section) offers comprehensive tools
    to add speech capabilities to applications, including transcription, voice synthesis,
    and translation—all with high accuracy and natural delivery.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Speech-to-text**: Convert spoken audio into text in real-time or batch mode'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Text-to-speech**: Generate human-like speech using prebuilt or custom neural
    voices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speech translation**: Enable multilingual communication across more than
    60 languages'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom speech models**: Improve recognition in noisy environments or for
    specific jargon'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Audio input is sent to the Azure Speech service via an API or SDK. The model
    processes use neural networks to generate transcriptions, translate into another
    language, or synthesize voice from text. You can fine-tune models for specialized
    vocabularies or dialects and deploy them across web, mobile, or IoT apps.
  prefs: []
  type: TYPE_NORMAL
- en: When to use the Azure Speech service
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer support automation**: Convert voice calls to searchable transcripts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Voice assistants**: Create natural-sounding interactions with users in apps
    or devices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Live captioning and accessibility**: Provide real-time subtitles for meetings
    or broadcasts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Language learning apps**: Assess pronunciation and aid interactive speech
    practice. Create a multilingual voice assistant for a global customer service
    center.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Azure Language
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **Azure Language** service (covered in detail in [*Chapter 6*](B31034_06.xhtml#_idTextAnchor117))
    provides a comprehensive suite of NLP features that enable developers to build
    intelligent applications capable of understanding and analyzing text. This service
    unifies several previously available Azure AI services, including Text Analytics,
    QnA Maker, and **Language Understanding Intelligent Service** (**LUIS**), while
    introducing new capabilities such as document summarization and **Personally Identifiable
    Information** (**PII**) detection. Users can interact with the service through
    REST APIs, SDKs, or the web-based Language Studio, making it accessible and versatile
    for various use cases.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Text analysis**: Sentiment analysis, key phrase extraction, entity recognition,
    and language detection'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Summarization and Q&A**: Automatically summarize long documents or extract
    answers from unstructured text'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PII detection and translation**: Redact sensitive information and support
    multilingual applications'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Language Studio**: No-code interface for training and testing NLP models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Text input is submitted through the API or Language Studio. Azure Language services
    use prebuilt or custom models to analyze the content, extract linguistic insights,
    and return results in structured formats. These insights can be used to power
    applications such as customer support chatbots, document summarization tools,
    and compliance workflows.
  prefs: []
  type: TYPE_NORMAL
- en: When to use the Azure Language service
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer feedback analysis**: Identify sentiment and trends in product reviews
    or surveys.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Knowledge extraction**: Extract structured data, such as named entities,
    key phrases, and summaries, from unstructured text to support search indexing
    and reporting pipelines.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privacy compliance**: Detect and redact sensitive data (PII) before storing
    or sharing content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multilingual applications**: Build apps that support language detection and
    translation across global markets. Automatically summarize customer reviews and
    identify trends in product feedback.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content Safety
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **Azure Content Safety** service (covered in detail in [*Chapter 4*](B31034_04.xhtml#_idTextAnchor075))
    provides a comprehensive suite of tools designed to detect and moderate harmful
    user-generated and AI-generated content across various platforms and services.
    The service includes powerful capabilities for text and image moderation, helping
    businesses maintain a safe and respectful environment for their users. Developers
    can interact with the service via REST APIs, SDKs, or through the intuitive Content
    Safety Studio, making it easy to implement and manage content safety measures.
  prefs: []
  type: TYPE_NORMAL
- en: 'Key features include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Text and image moderation**: Detects hate speech, violence, sexual content,
    and self-harm'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-severity scoring**: Classifies content by risk level'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom categories**: Defines moderation rules with custom filters using the
    Rapid API'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content Safety Studio**: Visual tool for testing and refining moderation
    logic'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How it works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Content—whether text or image—is submitted via the Content Safety API or Studio.
    The service applies ML models trained to detect a range of harmful content and
    assigns severity scores based on type and intensity. Developers can use built-in
    filters or define custom moderation categories for industry-specific needs. Results
    are returned in real-time or batch mode for integration into user-facing applications.
  prefs: []
  type: TYPE_NORMAL
- en: When to use Azure Content Safety
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can use this for the following use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Social platforms**: Automatically flag or block toxic or unsafe user-generated
    content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Moderated communities**: Enforce content standards in forums, games, or chat
    applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**E-commerce and reviews**: Filter inappropriate content in product listings
    or customer comments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI-generated content filtering**: Ensure generated text and images align
    with company policies or legal requirements. Moderate user-generated content in
    a social media app to prevent abuse and ensure community safety.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Together, these Azure AI services provide a robust toolkit for developing intelligent,
    scalable, and secure AI solutions—whether you’re building a chatbot, an image
    recognition system, or a multilingual virtual assistant. As you explore each service
    in the following chapters, you’ll see how they can be combined and customized
    to meet your specific business and technical needs.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the fundamental concepts of AI and ML, delving
    into how they power modern innovations across industries. By understanding key
    types of learning—supervised, unsupervised, and reinforcement learning—we gained
    insights into how AI systems are trained to make predictions and decisions. Additionally,
    we touched on deep learning and GenAI, which extend AI’s capabilities by enabling
    the creation of original content such as text and images.
  prefs: []
  type: TYPE_NORMAL
- en: These skills are essential for building AI-powered applications that automate
    tasks, analyze data, and generate useful content, enhancing productivity and innovation.
    By understanding how LMs and neural networks function, you’re equipped to develop
    smarter, more efficient solutions. The knowledge gained here is foundational for
    leveraging AI in real-world scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will explore how to plan AI solutions that meet responsible
    AI principles. We’ll also cover key concepts such as **Continuous Integration/Continuous
    Deployment** (**CI/CD**) and how to implement container deployment to enhance
    scalability and maintainability in AI projects.
  prefs: []
  type: TYPE_NORMAL
- en: Review questions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Answer the following questions to test your knowledge of this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Which of the following best describes the primary function of ML?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ML is used to manually program computers to perform specific tasks
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: ML focuses on training models to make predictions based on data without explicit
    programming for each task
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: ML is primarily used for data storage and retrieval
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: ML is a subset of NLP that deals with speech recognition
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: B'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: What is the key difference between supervised learning and unsupervised learning
    in ML?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Supervised learning uses labeled data for training, while unsupervised learning
    does not use labels
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Supervised learning is used for speech recognition, while unsupervised learning
    is used for image recognition
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Supervised learning involves reinforcement, while unsupervised learning involves
    deep learning
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Supervised learning is always more accurate than unsupervised learning
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: A'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which AI technology is specifically designed to generate new content such as
    text, images, or music?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ML
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: NLP
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: GenAI
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Reinforcement learning
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: C'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: What is the primary purpose of embedding in ML models?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Embedding is used to encrypt data for secure transmission
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Embedding converts various data types into numeric representations to capture
    meaning and context
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Embedding is the process of training models using reinforcement learning
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Embedding is a method for tokenizing text in ML
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: B'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which Azure AI service allows customers to detect and moderate harmful user-generated
    and AI-generated content in applications and services in real time?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Azure AI Search
  prefs:
  - PREF_IND
  - PREF_OL
