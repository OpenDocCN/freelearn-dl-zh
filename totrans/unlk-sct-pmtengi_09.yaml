  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.5：根据提示创建表格
- en: Looking at these examples should have given you a clearer idea about the application
    of the formulas.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 通过查看这些示例，你应该对公式的应用有了更清晰的认识。
- en: 'You can see more examples in this Google Sheet: [https://docs.google.com/spreadsheets/d/1DnHAjvV77SZg3UYGFfUVfn5gyFqZu-E02OSI0-dDBbE/edit?usp=sharing](https://docs.google.com/spreadsheets/d/1DnHAjvV77SZg3UYGFfUVfn5gyFqZu-E02OSI0-dDBbE/edit?usp=sharing).'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这个Google Sheet中查看更多示例：[https://docs.google.com/spreadsheets/d/1DnHAjvV77SZg3UYGFfUVfn5gyFqZu-E02OSI0-dDBbE/edit?usp=sharing](https://docs.google.com/spreadsheets/d/1DnHAjvV77SZg3UYGFfUVfn5gyFqZu-E02OSI0-dDBbE/edit?usp=sharing)。
- en: Microsoft and Google have already been integrating LLMs such as GPT-4 into Office
    365 and Google Workspace. Though their approaches differ from SheetSmart’s focus,
    we can expect similar native functionality in these platforms soon.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 微软和谷歌已经将LLMs如GPT-4集成到Office 365和Google Workspace中。尽管他们的方法与SheetSmart的焦点不同，但我们预计这些平台很快将提供类似的原生功能。
- en: One particular problem with the template, at least in Google Sheets, is that
    every time you open a sheet or change to another tab, all custom formulas are
    recalculated. This is problematic and expensive. All the generations are redone,
    and they consume tokens from OpenAI.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 模板存在一个特定问题，至少在Google Sheets中是这样，每次你打开一个工作表或切换到另一个标签页时，所有自定义公式都会重新计算。这很麻烦，也很昂贵。所有生成的内容都需要重新制作，并且会消耗来自OpenAI的token。
- en: One way to avoid this is to copy the results and paste them back as **Values
    Only**. By doing that, the generated text will not be the result of a formula,
    but a text string.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 避免这种情况的一种方法是将结果复制并粘贴为**仅值**。通过这样做，生成的文本将不是公式的结果，而是一个文本字符串。
- en: 'However, more flexible approaches exist to integrate LLMs with spreadsheets:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，存在更灵活的方法来将LLMs与电子表格集成：
- en: Use platforms such as Zapier or Make to connect your spreadsheet data to an
    LLM API. The integration can feed inputs, capture responses, and write them back
    to the sheet. This automates prompting at scale.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Zapier 或 Make 等平台将电子表格数据连接到 LLM API。该集成可以提供输入、捕获响应并将它们写回表格。这实现了大规模的自动化提示。
- en: With Google’s new Bard extensions, Bard can surface relevant information from
    Gmail, Docs, Drive, Maps, and more to enhance its responses. Bard becomes a smart
    assistant across Google’s suite of apps.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着 Google 新的 Bard 扩展，Bard 可以从 Gmail、Docs、Drive、Maps 等更多地方提取相关信息以增强其响应。Bard 成为
    Google 应用套件中的智能助手。
- en: Leverage developer tools such as **LangChain** or **Superagent** to build custom
    integrations between LLMs and data pipelines. These provide APIs and frameworks
    tailored to data engineering use cases such as summaries, chatbots, and question-answering.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用 **LangChain** 或 **Superagent** 等开发工具构建 LLMs 和数据管道之间的自定义集成。这些提供针对数据工程用例（如摘要、聊天机器人和问答）定制的
    API 和框架。
- en: The optimal approach depends on your needs and technical abilities. While pasting
    values locks static text, integrations and extensions provide dynamic connections
    between spreadsheets and LLMs. They enable more complex automation and workflow
    enhancement across apps.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳方法取决于您的需求和技能。虽然粘贴值锁定静态文本，但集成和扩展提供了电子表格和 LLMs 之间的动态连接。它们使应用程序之间的更复杂自动化和工作流程增强成为可能。
- en: In the next section, we will expand on the possible applications by using Zapier
    and Make.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将通过使用 Zapier 和 Make 来扩展可能的用途。
- en: Integrating LLMs into your tech stack using Zapier and Make
  id: totrans-53
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Zapier 和 Make 将 LLMs 集成到您的技术堆栈中
- en: Zapier and Make are integration platform services that make it easy to connect
    apps, automate workflows, and share data between web services.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: Zapier 和 Make 是集成平台服务，使连接应用程序、自动化工作流程和在不同网络服务之间共享数据变得容易。
- en: '**Zapier** operates on a freemium model, offering pre-built integrations, triggers,
    and actions that let you quickly build workflows without code. Zaps, the automation
    workflows made with Zapier, connect over 2,000 different applications by leveraging
    Zapier’s existing connectors.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**Zapier** 采用免费增值模式，提供预构建的集成、触发器和动作，让您无需代码即可快速构建工作流程。使用 Zapier 构建的自动化工作流程 Zaps
    通过利用 Zapier 的现有连接器连接超过 2,000 个不同的应用程序。'
- en: '**Make** offers an enterprise integration platform for coordinating complex
    workflows and data flows and building chatbots. It includes advanced tools for
    API integration, debugging flows, version control, and access management.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**Make** 提供了一个企业级集成平台，用于协调复杂的流程和数据流以及构建聊天机器人。它包括 API 集成、调试流程、版本控制和访问管理的先进工具。'
- en: Both Zapier and Make help integrate LLMs into your existing stack. For example,
    using their connectors for Google Sheets and the GPT-3.5/4 API, you can build
    automation for passing spreadsheet data to an LLM and writing back the outputs.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Zapier 和 Make 都有助于将 LLMs 集成到您的现有堆栈中。例如，使用它们为 Google Sheets 和 GPT-3.5/4 API 提供的连接器，您可以构建将电子表格数据传递给
    LLM 并将输出写回的自动化。
- en: The benefits of using these platforms are speeding up manual processes and letting
    LLMs augment your other tools. The possibilities are limitless.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些平台的好处是加快手动流程并让 LLMs 增强您的其他工具。可能性是无限的。
- en: Zapier and Make enable the same functionality as the Google Sheets template
    using GPT-3.5/4\. With Zapier or Make, users can build custom frontends or chatbots
    to generate prompts. The AI responses can then be saved directly to the sheet
    as values rather than formulas. This avoids expensive recalculations but adds
    the cost of Zapier/Make subscriptions. Overall, Zapier and Make provide more flexibility
    in prompt collection and result storage compared to the Google template alone.
    However, all three tools empower users to leverage LLMs within Sheets workflows.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: Zapier 和 Make 通过 GPT-3.5/4 提供与 Google Sheets 模板相同的功能。使用 Zapier 或 Make，用户可以构建自定义前端或聊天机器人来生成提示。AI
    的响应可以直接作为值而不是公式保存到表格中。这避免了昂贵的重新计算，但增加了 Zapier/Make 订阅的成本。总的来说，与仅使用 Google 模板相比，Zapier
    和 Make 在提示收集和结果存储方面提供了更多的灵活性。然而，所有三种工具都赋予用户在 Sheets 工作流程中利用 LLMs 的能力。
- en: 'Here are some sophisticated use cases for integrating LLMs with other tools
    using Zapier or Make:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些使用 Zapier 或 Make 将 LLMs 与其他工具集成的复杂用例：
- en: '**Marketing automation**:'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**营销自动化**：'
- en: '**Automated ad creative generation**: Create a workflow using Make and Stability
    AI’s generative AI to continuously generate fresh ad creatives. It would identify
    top-performing ads, pass the copy to GPT-4 to rewrite text, and provide prompts
    to Stable Diffusion to generate new images. This combines automation and leading
    AI to efficiently produce volumes of high-quality new ad creatives.'
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动广告创意生成**：使用Make和Stability AI的生成式AI创建一个工作流程，持续生成新的广告创意。这将识别表现最佳的广告，将文案传递给GPT-4进行文本重写，并为Stable
    Diffusion提供提示以生成新图像。这结合了自动化和领先的AI，以高效地生产大量高质量的新广告创意。'
- en: '**Multi-language landing pages**: Translate top English landing pages and ad
    creatives into target languages using DeepL for translation and GPT-3.5 for final
    fluency polish. This expands global reach.'
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多语言着陆页**：使用DeepL进行翻译和GPT-3.5进行最终流畅度润色，将顶级英文着陆页和广告创意翻译成目标语言。这扩大了全球影响力。'
- en: '**Sales enablement**:'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**销售赋能**：'
- en: '**Meeting prep briefings**: Build a Zap to routinely summarize key client interactions
    from calendar entries, notes, emails, and more and provide action items to prepare
    for account meetings'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**会议准备简报**：构建一个Zap，定期总结日历条目、笔记、电子邮件等关键客户互动，并提供准备账户会议的行动项目。'
- en: '**Proposal generation**: Create personalized, dynamic product configuration
    and spec sheet proposals tailored to each customer’s needs by having Claude analyze
    their requirements documents and past configurations'
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提案生成**：通过让Claude分析他们的需求文档和过去的配置，创建针对每个客户需求的个性化、动态的产品配置和规格表提案。'
- en: '**Presentation drafting**: Automatically produce draft presentations for sales
    meetings by having Claude review accounts’ Salesforce history and suggest key
    points to cover, opportunities to highlight, and objections to preemptively counter'
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**演示文稿起草**：通过让Claude审查账户的Salesforce历史记录并建议要涵盖的关键点、要突出的机会和预先反驳的异议，自动生成销售会议的草案演示文稿。'
- en: '**Customer experience**:'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户体验**：'
- en: '**Ticket enrichment with articles**: Build a workflow to take raw customer
    support tickets and have Claude suggest the attachment of knowledge-based articles
    while summarizing issues for agent review before sending a response'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工单文章丰富**：构建一个工作流程，从原始客户支持工单中提取信息，让Claude建议附加基于知识的文章，并在发送回复前为代理总结问题。'
- en: '**Churn prediction and offers**: Enrich customer support conversations by having
    an LLM analyze Zendesk ticket data to proactively identify customers at high risk
    of churn and craft personalized retention offers and care packages'
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户流失预测和优惠**：通过让大型语言模型分析Zendesk工单数据，主动识别高流失风险客户，并制定个性化的保留优惠和关怀套餐，从而丰富客户支持对话。'
- en: '**Tutorial video generation**: Create dynamic narrated step-by-step tutorial
    videos personalized to each customer’s level and use cases by generating custom
    scripts with Claude'
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教程视频生成**：通过使用Claude生成定制脚本，创建针对每个客户水平和用例的动态叙述的逐步教程视频。'
- en: '**Business intelligence**:'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商业智能**：'
- en: '**Automated reporting**: Build an automated report generation workflow that
    uses Claude or GPT-4 to analyze sales data from Salesforce and produce customized
    account performance summaries, territory analyses, and forecast updates'
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动报告生成**：构建一个使用Claude或GPT-4分析Salesforce销售数据的自动报告生成工作流程，生成定制的账户绩效摘要、地区分析和预测更新。'
- en: '**Competitive intelligence**: Build a customized competitive intelligence briefing
    by having Claude analyze competitors’ earning calls, filings, patents, web traffic,
    hiring, social media, news mentions, and more to generate insights'
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**竞争情报**：通过让Claude分析竞争对手的收益电话、文件、专利、网站流量、招聘、社交媒体、新闻报道等，构建定制的竞争情报简报，以生成见解。'
- en: '**Operations**:'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营**：'
- en: '**Release note generation**: Set up a system where GPT-3.5 reviews code commits
    in GitHub and provides concise, automated release note summaries of new features
    and fixes rather than manual updates'
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发布说明生成**：建立一个系统，让GPT-3.5审查GitHub中的代码提交，并提供关于新功能和修复的简洁、自动化的发布说明摘要，而不是手动更新。'
- en: Let’s explore a simple use case to show how these integrations work. We will
    create a Zapier workflow that gathers some product data and, using GPT-3.5, produces
    descriptions in English and Spanish and saves them into a Google Sheet.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨一个简单的用例来展示这些集成的工作方式。我们将创建一个Zapier工作流程，收集一些产品数据，并使用GPT-3.5生成英文和西班牙文的描述，并将它们保存到Google表格中。
- en: Creating and translating product descriptions
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建和翻译产品描述
- en: For e-commerce companies, product content is a crucial driver of conversions
    across markets. However, manually crafting customized, localized descriptions
    for every product is extremely time-intensive. This section outlines an automated
    workflow to effortlessly produce high-quality multilingual product copy using
    Zapier and the power of GPT-3.5.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对于电子商务公司来说，产品内容是跨市场转化率的关键驱动因素。然而，为每个产品手动制作定制化的本地化描述非常耗时。本节概述了一个自动化工作流程，使用Zapier和GPT-3.5的力量轻松地生成高质量的多语言产品副本。
- en: Go to [https://zapier.com/](https://zapier.com/) and create an account if you
    do not have one. Then, on the dashboard, you will find an interface to describe
    what you want to do. Zapier flows are now powered by AI, so you can describe the
    process you want to automate and Zapier will build the workflow for you, as shown
    in *Figure 9**.6*.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 前往[https://zapier.com/](https://zapier.com/)并创建一个账户（如果您还没有的话）。然后，在仪表板上，您将找到一个界面来描述您想要执行的操作。Zapier流程现在由AI驱动，因此您可以描述您想要自动化的流程，Zapier将为您构建工作流程，如图*图9.6*所示。
- en: 'However, this case is simple, so we will start from scratch. To do that, click
    where it says **Create a Zap** **from scratch**:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个案例很简单，所以我们将从头开始。要做到这一点，点击它所说的**从头开始创建Zap**：
- en: "![Figure 9.6: Creating a Zap \uFEFFfrom scratch](img/B21161_09_06.jpg)"
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图9.6：从头开始创建Zap](img/B21161_09_06.jpg)'
- en: 'Figure 9.6: Creating a Zap from scratch'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.6：从头开始创建Zap
- en: 'You will get the following output:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 您将得到以下输出：
- en: '![Figure 9.7: Initial screen when starting from scratch](img/B21161_09_07.jpg)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图9.7：从头开始时的初始屏幕](img/B21161_09_07.jpg)'
- en: 'Figure 9.7: Initial screen when starting from scratch'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.7：从头开始时的初始屏幕
- en: 'Select the trigger step by clicking on it. Then, search for `webhook` and select
    **Webhooks by Zapier**, as shown in *Figure 9**.8*:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击触发步骤来选择触发步骤。然后，搜索`webhook`并选择**Zapier Webhooks**，如图*图9.8*所示：
- en: '![Figure 9.8: Zap of the workflow ](img/B21161_09_08.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图9.8：工作流程的Zap](img/B21161_09_08.jpg)'
- en: 'Figure 9.8: Zap of the workflow'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.8：工作流程的Zap
- en: 'Selecting the first step, **Catch Hook**, allows us to create an endpoint to
    send data to Zapier. This can be used on a form or a chatbot. In this case, we
    will send some data from Postman, a tool that allows us to test APIs and webhooks.
    *Figure 9**.9* shows the flow:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 选择第一个步骤，**捕获钩子**，允许我们创建一个端点向Zapier发送数据。这可以用于表单或聊天机器人。在这种情况下，我们将从Postman发送一些数据，Postman是一个允许我们测试API和webhook的工具。*图9.9*显示了流程：
- en: '![Figure 9.9: Selecting Catch Hook](img/B21161_09_09.jpg)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图9.9：选择捕获钩子](img/B21161_09_09.jpg)'
- en: 'Figure 9.9: Selecting Catch Hook'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.9：选择捕获钩子
- en: 'Then, click **Continue** until the webhook URL is displayed, as shown in *Figure
    9**.10*:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，点击**继续**直到显示webhook URL，如图*图9.10*所示：
- en: '![Figure 9.10: Getting the webhook URL](img/B21161_09_10.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图9.10：获取webhook URL](img/B21161_09_10.jpg)'
- en: 'Figure 9.10: Getting the webhook URL'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.10：获取webhook URL
- en: 'You need to test this webhook URL with some data. *Figure 9**.10* shows the
    call to that URL, in Postman, with a JSON payload with some products:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要用一些数据测试这个webhook URL。*图9.10*显示了在Postman中对该URL的调用，其中包含一些产品的JSON有效负载：
- en: '![Figure 9.11: Testing the webhook in Postman](img/B21161_09_11.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图9.11：在Postman中测试webhook](img/B21161_09_11.jpg)'
- en: 'Figure 9.11: Testing the webhook in Postman'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.11：在Postman中测试webhook
- en: 'Then, in Zapier, click the **Test trigger** button (*Figure 9**.10*); it will
    get the data that was submitted, as shown in *Figure 9**.12*:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在Zapier中点击**测试触发器**按钮（*图9.10*）；它将获取提交的数据，如图*图9.12*所示：
- en: '![Figure 9.12: Getting the data sent via the webhook in Zapier](img/B21161_09_12.jpg)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图9.12：在Zapier中获取通过webhook发送的数据](img/B21161_09_12.jpg)'
- en: 'Figure 9.12: Getting the data sent via the webhook in Zapier'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.12：在Zapier中获取通过webhook发送的数据
- en: 'Next, continue to `OpenAI`, as shown in *Figure 9**.13*:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，继续到`OpenAI`，如图*图9.13*所示：
- en: '![Figure 9.13: Searching for OpenAI](img/B21161_09_13.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图9.13：搜索OpenAI](img/B21161_09_13.jpg)'
- en: 'Figure 9.13: Searching for OpenAI'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.13：搜索OpenAI
- en: 'From there, when you select **Event**, you must choose **Send Prompt** from
    the list of options. Then, click on **Continue**. for **Account**, click **Choose**
    (*Figure 9**.15*) and select **Connect a New Account**. You will be asked to enter
    your OpenAI API key and organization ID. You can generate a new API key from the
    corresponding menu and you can get your organization ID from the **Settings**
    menu on the OpenAI site:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，当您选择**事件**时，您必须从选项列表中选择**发送提示**。然后，点击**继续**。对于**账户**，点击**选择**（*图9.15*）并选择**连接新账户**。您将被要求输入您的OpenAI
    API密钥和组织ID。您可以从相应的菜单生成新的API密钥，您可以从OpenAI网站上的**设置**菜单获取您的组织ID：
- en: '![Figure 9.14: Selecting Send Prompt](img/B21161_09_14.jpg)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.14：选择发送提示](img/B21161_09_14.jpg)'
- en: 'Figure 9.14: Selecting Send Prompt'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.14：选择发送提示
- en: For **Account**, click **Choose** (*Figure 9**.15*) and select **Connect a New
    Account**. You will be asked to enter your OpenAI API key and organization ID.
    You can generate a new API key from the corresponding menu, and you can get your
    organization ID from the **Settings** menu on the OpenAI site.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 **Account**，点击 **Choose** (*图 9**.15*) 并选择 **Connect a New Account**。你将被要求输入你的
    OpenAI API 密钥和组织 ID。你可以从相应的菜单生成新的 API 密钥，并且你可以从 OpenAI 网站的 **Settings** 菜单中获取你的组织
    ID。
- en: '![Figure 9.15: Choosing an OpenAI account ](img/B21161_09_15.jpg)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.15：选择 OpenAI 账户](img/B21161_09_15.jpg)'
- en: 'Figure 9.15: Choosing an OpenAI account'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.15：选择 OpenAI 账户
- en: Follow the instructions and select the GPT model that you want. In this case,
    GTP-3.5 Turbo works fine. Then, test the step. You should see the response from
    OpenAI.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 按照说明选择你想要的 GPT 模型。在这种情况下，GTP-3.5 Turbo 就足够好了。然后，测试该步骤。你应该看到 OpenAI 的响应。
- en: 'Next, add another step by clicking on the plus sign below `code` and select
    **JavaScript**. You need to write a little code snippet to parse the result from
    GPT-3.5 as a JSON object. Although the text received looks like a JSON object,
    it is just a text string. Fortunately, Zapier has an option to generate the code
    for you using AI. *Figure 9**.16* shows this option and the code needed:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，通过点击`code`下方的加号来添加另一个步骤，并选择**JavaScript**。你需要编写一小段代码片段来将 GPT-3.5 的结果解析为
    JSON 对象。虽然接收到的文本看起来像 JSON 对象，但它只是一个文本字符串。幸运的是，Zapier 提供了一个使用 AI 生成代码的选项。*图 9**.16*
    展示了此选项和所需的代码：
- en: '![Figure 9.16: Generating JavaScript code with AI in Zapier](img/B21161_09_16.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.16：在 Zapier 中使用 AI 生成 JavaScript 代码](img/B21161_09_16.jpg)'
- en: 'Figure 9.16: Generating JavaScript code with AI in Zapier'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.16：在 Zapier 中使用 AI 生成 JavaScript 代码
- en: 'Then, click on **Test** to try the code step. You will get something like what
    is shown in *Figure 9**.17*. The result is nicely parsed in value pairs – **name**:
    **A5 Digital Camera**, **brand**: **Canon**, and so on:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '然后，点击 **Test** 来尝试代码步骤。你会得到类似于 *图 9**.17* 中所示的内容。结果是按值对很好地解析的 – **name**: **A5
    Digital Camera**，**brand**: **Canon**，等等：'
- en: '![Figure 9.17: Testing the code](img/B21161_09_17.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.17：测试代码](img/B21161_09_17.jpg)'
- en: 'Figure 9.17: Testing the code'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.17：测试代码
- en: 'Now that each variable is paired with a key value, we can proceed to the last
    step: saving the data as a new row in a Google Sheet. Thus, click on the plus
    sign below *Step 3*. Search for `Google Sheets`. Follow the instructions to authenticate
    your Google Sheets account. Next, select **Create Spreadsheet Row**. Then, select
    the spreadsheet and sheet you created to save your data. Your sheet should have
    columns representing the variables to save. Once you’ve selected your Google Sheet
    and worksheet, you should see the column names below the the **Worksheet** field,
    as shown in *Figure 9**.18*:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，每个变量都已与一个键值对配对，我们可以继续到最后一步：将数据保存为 Google Sheets 中的新行。因此，点击 *Step 3* 下方的加号。搜索
    `Google Sheets`。按照说明验证你的 Google Sheets 账户。接下来，选择 **Create Spreadsheet Row**。然后，选择你创建的电子表格和表来保存你的数据。你的表应该有代表要保存的变量的列。一旦你选择了你的
    Google Sheet 和工作表，你应该在 **Worksheet** 字段下方看到列名，如图 *图 9**.18* 所示：
- en: '![Figure 9.18: Creating a new row in Google Sheets](img/B21161_09_18.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.18：在 Google Sheets 中创建新行](img/B21161_09_18.jpg)'
- en: 'Figure 9.18: Creating a new row in Google Sheets'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.18：在 Google Sheets 中创建新行
- en: 'Click on the field for each column value. We want to get the values we produced
    in *Step 3* (code), so we need to select it and then select the name of the variable
    that represents the name of the column. In *Figure 9**.19*, we are pairing the
    variable name with the column product. Repeat this for each column value:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 点击每个列值的字段。我们想要获取我们在 *Step 3*（代码）中产生的值，因此我们需要选择它，然后选择代表列名的变量名称。在 *图 9**.19* 中，我们将变量名称与列产品配对。对每个列值重复此操作：
- en: '![Figure 9.19: Mapping the value to pass to each column – part 1](img/B21161_09_19.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.19：将值映射到每个列 – 第 1 部分](img/B21161_09_19.jpg)'
- en: 'Figure 9.19: Mapping the value to pass to each column – part 1'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.19：将值映射到每个列 – 第 1 部分
- en: '*Figure 9**.20* shows the mapping:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 9**.20* 展示了映射：'
- en: '![Figure 9.20: Mapping the value to pass to each column – part 2](img/B21161_09_20.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.20：将值映射到每个列 – 第 2 部分](img/B21161_09_20.jpg)'
- en: 'Figure 9.20: Mapping the value to pass to each column – part 2'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.20：将值映射到每个列 – 第 2 部分
- en: 'Next, click on **Test** to check that the data has been saved to Google Sheets
    as expected. *Figure 9**.21* shows the results:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，点击 **测试** 以检查数据是否已按预期保存到 Google Sheets。*图 9**.21* 显示了结果：
- en: '![Figure 9.21: Results saved to Google Sheets](img/B21161_09_21.jpg)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.21：结果保存到 Google Sheets](img/B21161_09_21.jpg)'
- en: 'Figure 9.21: Results saved to Google Sheets'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.21：结果保存到 Google Sheets
- en: Finally, publish your workflow – it will be ready to receive data that’s sent
    when the webhook is called from an application – run the prompt, and add new rows
    to your Google Sheet.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，发布您的流程 – 当应用程序从 webhook 调用时，它将准备好接收发送的数据 – 运行提示，并向您的 Google Sheet 添加新行。
- en: In the next section, we will explore tools such as LangChain, Langflow, and
    Flowise, which can add even more flexibility to build AI-based tools for many
    different applications.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨 LangChain、Langflow 和 Flowise 等工具，这些工具可以为构建针对许多不同应用的 AI 工具提供更多灵活性。
- en: Moving beyond APIs – building custom LLM pipelines with LangChain
  id: totrans-132
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超越 API – 使用 LangChain 构建定制的 LLM 管道
- en: '**LangChain** is an open source Python and JavaScript library for building
    workflows and systems using LLMs such as GPT-3.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**LangChain** 是一个开源的 Python 和 JavaScript 库，用于使用 GPT-3 等LLMs 构建工作流程和系统。'
- en: Created by Harrison Chase, LangChain initially focused on streamlining integration
    with OpenAI APIs. It has since expanded to support other LLMs, including models
    such as Anthropic’s Claude.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 由 Harrison Chase 创建的 LangChain 最初专注于简化与 OpenAI API 的集成。此后，它已扩展到支持其他 LLMs，包括像
    Anthropic 的 Claude 这样的模型。
- en: The library implements techniques from the ReAct paper published in 2022\. ReAct
    demonstrates prompting methods that allow LLMs to engage in reasoning by maintaining
    a chain-of-thought context. Models can also take action by leveraging tools such
    as internet search to gather information.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 该库实现了 2022 年发表的 ReAct 论文中的技术。ReAct 展示了允许 LLMs 通过维护思维链上下文进行推理的提示方法。模型还可以通过利用工具（如网络搜索）来收集信息来采取行动。
- en: This combination, referred to as ReAct, enables LLMs to solve problems more
    effectively by thinking through logic and bringing in outside knowledge. LangChain
    codifies these techniques into developer-friendly frameworks.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这种组合，被称为 ReAct，通过逻辑思考和引入外部知识，使 LLMs 能够更有效地解决问题。LangChain 将这些技术编码为开发者友好的框架。
- en: 'LangChain supports a wide range of LLMs from various providers, including the
    following:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain 支持来自各种提供商的广泛 LLMs，包括以下：
- en: OpenAI’s GPT-3
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenAI 的 GPT-3
- en: Anthropic’s Claude and Constitutional AI
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Anthropic 的 Claude 和 Constitutional AI
- en: Google’s LaMDA and PaLM
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谷歌的 LaMDA 和 PaLM
- en: Meta’s OPT
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Meta 的 OPT
- en: Baidu’s ERNIE and PaddlePaddle
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 百度的 ERNIE 和 PaddlePaddle
- en: Tencent’s Wu Dao
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 腾讯的 Wu Dao
- en: Hugging Face’s models, such as BLOOM, LeoLM, and Jurassic-1
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hugging Face 的模型，例如 BLOOM、LeoLM 和 Jurassic-1
- en: AI21 Studio’s models, such as Jurassic-1 J1
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI21 Studio 的模型，例如 Jurassic-1 J1
- en: Cohere’s Generative QA model
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Cohere 的生成式 QA 模型
- en: Microsoft’s Turing NLG models
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微软的 Turing NLG 模型
- en: LangChain’s workflow engine handles routing prompts and chaining logic across
    multiple models with diverse strengths and capabilities. This allows developers
    to orchestrate systems using the optimal blend of LLMs for their needs, without
    vendor lock-in. LangChain also aims to provide ongoing support for major new LLMs
    so that users can integrate innovations from AI research consistently through
    LangChain.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain 的工作流程引擎处理跨多个具有不同优势和能力的模型的路由提示和链式逻辑。这允许开发者使用最适合其需求的 LLMs 的最佳组合来编排系统，而无需供应商锁定。LangChain
    还旨在为主要的新的 LLMs 提供持续支持，以便用户可以通过 LangChain 一致地集成 AI 研究的创新。
- en: 'Here are some examples of how LangChain can be used to leverage the unique
    capabilities of different LLMs:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些 LangChain 可以用来利用不同 LLMs 独特功能的示例：
- en: A developer could use LangChain to chain together GPT-4 and Jurassic-1 to generate
    creative text formats, such as poems, code, scripts, musical pieces, emails, letters,
    and more
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发者可以使用 LangChain 将 GPT-4 和 Jurassic-1 连接起来，生成创意文本格式，如诗歌、代码、脚本、音乐作品、电子邮件、信件等
- en: A researcher could use LangChain to compare the performance of different LLMs
    on a variety of **natural language processing** (**NLP**) tasks
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究人员可以使用 LangChain 比较不同 LLMs 在各种**自然语言处理**（**NLP**）任务上的性能
- en: A company could use LangChain to build a chatbot that uses the strengths of
    multiple LLMs to provide more informative and engaging responses to users
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家公司可以使用 LangChain 构建一个聊天机器人，利用多个 LLMs 的优势，为用户提供更丰富、更有吸引力的回复
- en: Overall, LangChain simplifies the process of moving LLMs from basic API usage
    to production-ready NLP systems. Its workflows enhance text generation quality
    and allow customization for real-world applications.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，LangChain 简化了将 LLM 从基本 API 使用迁移到生产就绪的 NLP 系统的过程。其工作流程增强了文本生成质量，并允许针对实际应用进行定制。
- en: Now that we’ve covered the need for tools such as LangChain, let’s explore its
    core components. These building blocks power the development of customized AI
    workflows.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了 LangChain 等工具的需求，让我们探索其核心组件。这些构建块为定制 AI 工作流程的开发提供了动力。
- en: LangChain’s building blocks
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangChain 的构建块
- en: LangChain provides a robust set of modular components for constructing complex
    NLP systems and workflows. These building blocks make it easy for developers to
    integrate LLMs into real-world production applications.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain 提供了一套强大的模块化组件，用于构建复杂的 NLP 系统和工作流程。这些构建块使开发者能够轻松地将 LLM 集成到现实世界的生产应用中。
- en: 'Now, let’s take an in-depth look at these building blocks:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们深入探讨这些构建块：
- en: '**Schemas**'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式**'
- en: Schemas in LangChain allow you to define the structure of data payload inputs
    and outputs for each step in your workflow. You can create schemas for text, images,
    audio, video, and database formats by specifying field names, data types, and
    relationships.
  id: totrans-159
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LangChain 中的模式允许您定义工作流程中每一步的数据有效负载输入和输出的结构。您可以通过指定字段名称、数据类型和关系来为文本、图像、音频、视频和数据库格式创建模式。
- en: Schemas serve as a blueprint for how data should be handled as it flows through
    your LangChain pipeline. They ensure each component knows what to expect and return.
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 模式作为数据在 LangChain 管道中流动时如何处理的蓝图。它们确保每个组件都知道期望和返回的内容。
- en: '**Models**'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型**'
- en: The Models component offers abstractions for integrating different LLMs into
    your workflow, including GPT-3, Claude, PaLM, Codex, and OPT, among others. You
    can connect custom-trained models and specify parameters such as engine version,
    temperature, top-p sampling, and more.
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 模型组件提供了将不同的 LLM 集成到您的工作流程中的抽象，包括 GPT-3、Claude、PaLM、Codex 和 OPT 等。您可以连接自定义训练的模型并指定参数，如引擎版本、温度、top-p
    样本等。
- en: Switching between alternative models is simplified by this consistent interface.
    Models can be chained together, allowing you to leverage different strengths.
  id: totrans-163
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过这个一致的界面，切换到替代模型变得简单。模型可以串联起来，让您能够利用不同的优势。
- en: '**Prompts**'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示**'
- en: LangChain provides libraries of prompt templates tailored for various NLP tasks,
    such as classification, summarization, and question-answering. These templates
    can be reused and customized as needed.
  id: totrans-165
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LangChain 提供了针对各种 NLP 任务定制的提示模板库，例如分类、摘要和问答。这些模板可以根据需要重用和定制。
- en: Tools are provided for iteratively developing prompts, analyzing how models
    interpret them, and debugging issues. Prompts can be generated programmatically
    or defined manually.
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提供了工具以迭代地开发提示，分析模型如何解释它们，以及调试问题。提示可以程序化生成或手动定义。
- en: '**Indexes**'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引**'
- en: To power performant search across large datasets, LangChain offers tools such
    as Langchain crawler for creating customized keyword indexes. You can also leverage
    pre-built indexes for common public corpora.
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为了在大数据集中实现高效搜索，LangChain 提供了如 Langchain 爬虫等工具，用于创建定制的关键词索引。您还可以利用为常见公共语料库预先构建的索引。
- en: Indexes allow you to supply context to models by quickly locating relevant documents
    or passages using keywords or semantic similarity.
  id: totrans-169
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 索引允许您通过使用关键词或语义相似性快速定位相关文档或段落，为模型提供上下文。
- en: '**Memory**'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存**'
- en: LangChain includes memory components for caching interim results, state, and
    temporary variables to share across workflow steps. Memory can be scoped globally
    across the workflow or locally within modules.
  id: totrans-171
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LangChain 包括用于在工作流程步骤之间缓存中间结果、状态和临时变量的内存组件，以实现跨工作流程步骤的共享。内存可以在整个工作流程中全局作用，也可以在模块内局部作用。
- en: Intelligent caching strategies optimize cost and latency by avoiding redundant
    computations. Persistence options allow state to be retained across executions.
  id: totrans-172
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 智能缓存策略通过避免冗余计算来优化成本和延迟。持久性选项允许在执行之间保留状态。
- en: '**Chains**'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链**'
- en: Building chains of prompts and models is a core LangChain concept for developing
    reasoning and conversational workflows. You can construct linear chains, branch
    based on conditions, iterate in loops, and break long chains into reusable modular
    blocks.
  id: totrans-174
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 构建提示和模型的链是 LangChain 开发推理和对话工作流程的核心概念。您可以构建线性链，根据条件分支，循环迭代，并将长链分解成可重用的模块化块。
- en: '**Agents**'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理**'
- en: LangChain allows you to encapsulate reusable logic into modular agents for capabilities
    such as search, question-answering, translation, and optimization. You must invoke
    these agents from within your workflows to incorporate their capabilities.
  id: totrans-176
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LangChain 允许你将可重用的逻辑封装到模块化代理中，以实现搜索、问答、翻译和优化等功能。你必须从你的工作流程中调用这些代理以集成其功能。
- en: Agents can be fully customized by developing them in Python or JavaScript. Pre-built
    agents are offered for common needs to accelerate development.
  id: totrans-177
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 代理可以完全通过在 Python 或 JavaScript 中开发来定制。为常见需求提供预构建代理以加速开发。
- en: There are also open source no-code platforms such as Langflow and Flowise that
    enable non-technical users to leverage the advanced NLP capabilities of LangChain
    for building natural language workflows and applications. For those of you who
    are not developers, both Flowise and Langflow are good options to get started.
    In the next section, we will look at these no-code platforms.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有像 Langflow 和 Flowise 这样的开源无代码平台，使非技术用户能够利用 LangChain 的先进 NLP 功能来构建自然语言工作流程和应用。对于那些不是开发者的你，Flowise
    和 Langflow 都是开始的好选择。在下一节中，我们将探讨这些无代码平台。
- en: LangChain's no-code tools – Langflow and Flowise
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangChain 的无代码工具——Langflow 和 Flowise
- en: Langflow and Flowise both provide visual workflow builders where users can drag
    and drop pre-built blocks for tasks such as text generation, classification, search,
    and translation and orchestrate them into end-to-end pipelines.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: Langflow 和 Flowise 都提供可视化工作流程构建器，用户可以拖放预构建的块来执行文本生成、分类、搜索和翻译等任务，并将它们编排成端到端管道。
- en: Intuitive drag-and-drop interfaces remove the need for coding expertise. Users
    can start from pre-made template workflows or customize flows for their specific
    use cases.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 直观的拖放界面消除了对编码专长的需求。用户可以从预制的模板工作流程开始，或根据特定用例自定义流程。
- en: Langflow and Flowise handle deploying and hosting the workflows on managed infrastructure.
    They provide monitoring, analytics, access controls, and connectors to extend
    functionality.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: Langflow 和 Flowise 处理在托管基础设施上部署和托管工作流程。它们提供监控、分析、访问控制和扩展功能的连接器。
- en: The key difference is that Langflow is focused specifically on LangChain integration,
    while Flowise has connectors to services beyond just LangChain.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 关键区别在于 Langflow 专注于 LangChain 集成，而 Flowise 有连接到 LangChain 之外服务的连接器。
- en: Langflow is written in Python while Flowise is written in JavaScript.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: Langflow 用 Python 编写，而 Flowise 用 JavaScript 编写。
- en: Ultimately, both Langflow and Flowise open up the power of LangChain to non-developers
    – product managers, growth hackers, marketers, and other domain experts can harness
    LLMs for NLP.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，Langflow 和 Flowise 都为非开发者打开了 LangChain 的力量——产品经理、增长黑客、营销人员和其他领域专家可以利用 LLM
    进行 NLP。
- en: They make it possible to build sophisticated workflows using LangChain’s repository
    of techniques without engineering resources.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 他们使得在没有工程资源的情况下，使用 LangChain 的技术库构建复杂的流程成为可能。
- en: 'You can get more information about these tools here:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里了解更多关于这些工具的信息：
- en: '**LangChain** **docs**: [https://docs.langchain.com/docs/](https://docs.langchain.com/docs/)'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LangChain** **文档**: [https://docs.langchain.com/docs/](https://docs.langchain.com/docs/)'
- en: '**Lang****f****low** **docs**: [https://docs.langflow.org/](https://docs.langflow.org/)'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Lang****f****low** **文档**: [https://docs.langflow.org/](https://docs.langflow.org/)'
- en: '**Flowise** **docs**: [https://docs.flowiseai.com/](https://docs.flowiseai.com/)'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Flowise** **文档**: [https://docs.flowiseai.com/](https://docs.flowiseai.com/)'
- en: To show some of the possible applications, we will explore some scenarios using
    Flowise.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示一些可能的应用，我们将使用 Flowise 探索一些场景。
- en: Exploring Flowise
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索 Flowise
- en: 'To see Flowise in action, let’s walk through installing it and building some
    example chatbots:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看 Flowise 的实际应用，让我们来了解一下如何安装它并构建一些示例聊天机器人：
- en: Install Flowise by running `npm install -``g flowise`.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过运行 `npm install -g flowise` 来安装 Flowise。
- en: Start Flowise by running `npx` `flowise start`.
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过运行 `npx flowise start` 来启动 Flowise。
- en: 'Open `http://localhost:3000`. You should see something similar to this:'
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 `http://localhost:3000`。你应该会看到类似这样的内容：
- en: '![Figure 9.22: Flowise interface](img/B21161_09_22.jpg)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![图 9.22：Flowise 界面](img/B21161_09_22.jpg)'
- en: 'Figure 9.22: Flowise interface'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.22：Flowise 界面
- en: If this is your first time using Flowise, there should not be any chat flows.
    Chat flows are the applications that you develop.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这是你第一次使用 Flowise，那么应该没有任何聊天流程。聊天流程是你开发的应用。
- en: 'Under **Marketplace**, you can see some templates for different applications
    and pre-made tools that you can use:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **市场** 下，你可以看到一些不同应用的模板和可使用的预制工具：
- en: '![Figure 9.23: Flowise chat flow templates](img/B21161_09_23.jpg)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![图9.23：Flowise聊天流程模板](img/B21161_09_23.jpg)'
- en: 'Figure 9.23: Flowise chat flow templates'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.23：Flowise聊天流程模板
- en: 'You can easily create tools using the APIs of the tools you want or need to
    use. Furthermore, if you create a workflow with Zapier or Make and the entry point
    to that workflow is a **webhook**, you can use it to set up your own custom tools.
    A webhook is an automated way for an app or service to provide real-time updates
    to another app or service when certain events occur. This allows you to build
    more powerful applications:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用您想要或需要的工具的API轻松创建工具。此外，如果您使用Zapier或Make创建工作流程，并且该工作流程的入口点是**webhook**，则可以使用它来设置您自己的自定义工具。webhook是一种自动化方式，当某些事件发生时，一个应用程序或服务可以实时向另一个应用程序或服务提供更新。这允许您构建更强大的应用程序：
- en: '![Figure 9.24: Flowise predefined tools](img/B21161_09_24.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![图9.24：Flowise预定义工具](img/B21161_09_24.jpg)'
- en: 'Figure 9.24: Flowise predefined tools'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.24：Flowise预定义工具
- en: 'Since Flowise is a visual builder on top of LangChain, it has several block
    types mirroring the ones of LangChain. For each type, it offers different configuration
    options, so the user can select the ones that are more appropriate for their specific
    case. These are the block types:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Flowise是建立在LangChain之上的可视化构建工具，因此它具有几个与LangChain相似的块类型。对于每种类型，它都提供不同的配置选项，因此用户可以选择更适合他们特定情况的选项。这些是块类型：
- en: '**Chat models** such as GPT-3.5 Turbo and GPT-4 are designed specifically for
    conversational AI applications. They take previous messages as input context and
    generate a relevant next response.'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天模型**如GPT-3.5 Turbo和GPT-4是专门为对话式人工智能应用设计的。它们将之前的消息作为输入上下文，并生成相关的下一个回应。'
- en: These chat-focused models are more powerful and cost-effective for dialogue
    applications compared to general-purpose “completion” models such as text-davinci-003\.
    Completion models are tuned for single-turn text generation versus multi-turn
    back-and-forth chat.
  id: totrans-208
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 与通用“完成”模型（如text-davinci-003）相比，这些以聊天为中心的模型在对话应用中更强大且成本效益更高。完成模型针对的是单轮文本生成，而不是多轮的来回聊天。
- en: Chat models build on the foundation of models such as GPT-3 and leverage added
    training data and optimizations tailored for conversation flow and coherence.
    This allows them to follow dialogue context, incorporate previous responses, and
    produce more natural, relevant replies.
  id: totrans-209
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 聊天模型建立在GPT-3等模型的基础上，并利用针对对话流程和连贯性定制的额外训练数据和优化。这使得它们能够遵循对话上下文，整合之前的回应，并生成更自然、更相关的回复。
- en: For example, chat models can handle tasks such as answering follow-up questions,
    clarifying intent, and correcting previous statements. Their training also focuses
    on engagingness, positivity, and consistency.
  id: totrans-210
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，聊天模型可以处理诸如回答后续问题、澄清意图和纠正先前陈述等任务。它们的训练也侧重于参与度、积极性和一致性。
- en: '**Embeddings** provide a way to convert text into numerical representations
    that encode semantic meaning. Machine learning models can generate embeddings
    by analyzing relationships between words and sentences in large datasets.'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入**提供了一种将文本转换为编码语义意义的数值表示的方法。机器学习模型可以通过分析大型数据集中单词和句子之间的关系来生成嵌入。'
- en: These text embeddings capture contextual nuances and similarities that go beyond
    surface-level word matching. For example, embeddings can map synonyms and analogies
    close together in the vector space.
  id: totrans-212
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这些文本嵌入捕捉了超出表面单词匹配的上下文细微差别和相似性。例如，嵌入可以将同义词和类比在向量空间中映射得非常接近。
- en: This numerical representation of text makes embeddings very useful for finding
    semantically related documents. Rather than just matching by keywords, we can
    compare the vector distances between document embeddings to identify relevant
    or similar passages.
  id: totrans-213
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种文本的数值表示使得嵌入对于查找语义相关的文档非常有用。而不仅仅是通过关键字匹配，我们还可以比较文档嵌入之间的向量距离，以识别相关或相似的段落。
- en: Embedding encodings allow us to perform vector similarity searches to retrieve
    documents containing conceptually associated content. This level of semantic matching
    is not possible with keyword indexing approaches.
  id: totrans-214
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 嵌入编码使我们能够执行向量相似性搜索，以检索包含概念相关内容的文档。这种语义匹配水平使用关键字索引方法是不可能的。
- en: '**Vector stores** are databases that are optimized for managing large collections
    of numeric vectors or embeddings. They allow efficient storage and retrieval of
    high-dimensional data points compared to traditional databases.'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量存储**是针对管理大量数值向量或嵌入进行优化的数据库。与传统的数据库相比，它们允许高效地存储和检索高维数据点。'
- en: 'Flowise provides integrations with several vector stores, such as Pinecone,
    Chroma, Supabase, and Qdrant. These can be incorporated into workflows in two
    main ways:'
  id: totrans-216
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Flowise提供了与多个向量存储的集成，如Pinecone、Chroma、Supabase和Qdrant。这些可以通过两种主要方式被纳入工作流程中：
- en: '**Upserting document embeddings**: Vectorizer blocks generate embeddings from
    text or other media. These embeddings can be ingested into the vector store using
    upsert actions. This populates the index. Upsert is the process of inserting a
    new record or updating an existing record in a database using a single statement,
    based on whether the record already exists.'
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**插入或更新文档嵌入**：向量器块从文本或其他媒体生成嵌入。这些嵌入可以通过upsert操作被摄入向量存储中，从而填充索引。upsert是一个过程，通过单个语句在数据库中插入新记录或更新现有记录，基于记录是否已存在。'
- en: '**Loading existing indexes**: Pre-built vector indexes can be loaded into the
    workflow’s state. This provides access to search over the indexed embeddings using
    the vector store’s similarity functions.'
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加载现有索引**：预构建的向量索引可以被加载到工作流程的状态中。这提供了使用向量存储的相似性函数在索引嵌入上进行搜索的访问权限。'
- en: '**Document loaders** allow you to ingest text content from diverse sources,
    including PDFs, TXT files, CSVs, Notion documents, Confluence pages, and more.'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档加载器**允许您从各种来源摄入文本内容，包括PDF文件、TXT文件、CSV文件、Notion文档、Confluence页面等。'
- en: Document loaders ingest content from various sources, vectorize it with encoders,
    and enable retrievers to match relevant documents based on vector similarity.
    They provide a bridge between unstructured text and performant semantic search.
  id: totrans-220
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 文档加载器从各种来源摄入内容，使用编码器进行向量化，并使检索器能够根据向量相似性匹配相关文档。它们在非结构化文本和高效语义搜索之间提供了一个桥梁。
- en: '**Memory components** allow chatbots to maintain context and recall previous
    conversations as a human would.'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存组件**允许聊天机器人维持上下文并像人类一样回忆之前的对话。'
- en: '**Tools** provide reusable functions that agents can leverage to perform actions.
    They encapsulate logic to interact with external data sources, execute sub-workflows,
    or access other agents.'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具**提供了代理可以利用的可重用函数来执行操作。它们封装了与外部数据源交互、执行子工作流程或访问其他代理的逻辑。'
- en: By bundling logic into tool abstractions, developers can incorporate a wide
    range of capabilities into agents. The agents can focus on coordinating the workflow
    while reusing existing tools as modular building blocks.
  id: totrans-223
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过将逻辑打包到工具抽象中，开发者可以将各种能力集成到代理中。代理可以专注于协调工作流程，同时作为模块化构建块重用现有工具。
- en: In the following sections, we will explore some simple chatbots that can be
    created with Flowise.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将探讨一些可以使用Flowise创建的简单聊天机器人。
- en: Assembling a chatbot à la ChatGPT
  id: totrans-225
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 按照ChatGPT的方式组装聊天机器人
- en: Probably the simplest implementation of a Flowise flow is to create a chatbot
    that replicates the functionality of ChatGPT. The advantage of doing this is that
    you can embed it on any website so that you can provide ChatGPT capabilities for
    your users.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 可能是Flowise流程最简单的实现方式是创建一个聊天机器人，该机器人可以复制ChatGPT的功能。这样做的好处是您可以将其嵌入到任何网站上，以便为用户提供ChatGPT功能。
- en: 'This workflow has three blocks, as shown in *Figure 9**.24*:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 此工作流程有三个块，如图*图9.24*所示：
- en: 'A conversation chain that requires two inputs: a language model and memory.'
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个需要两个输入的对话链：一个语言模型和一个内存。
- en: The language model. Since we want to clone ChatGPT, we selected the **gpt-3.5-turbo-0613**
    model.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言模型。由于我们想要克隆ChatGPT，我们选择了**gpt-3.5-turbo-0613**模型。
- en: 'Memory. In this case, **Buffer** **Memory suffices**:'
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内存。在这种情况下，**缓冲内存足够**：
- en: '![Figure 9.25: ChatGPT clone workflow](img/B21161_09_25.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![图9.25：ChatGPT克隆工作流程](img/B21161_09_25.jpg)'
- en: 'Figure 9.25: ChatGPT clone workflow'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.25：ChatGPT克隆工作流程
- en: Here, we can see the node (or block) options on the left and the chat in action
    on the right, where we run a test asking a couple of questions.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以看到左侧的节点（或块）选项和右侧正在进行的聊天，我们运行了一个测试，提出了一些问题。
- en: 'A flow can be embedded on a website or be used as an API. This can be accomplished
    by clicking on the **</>** icon in the top-right corner. A popup with the following
    options will appear:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 一个流程可以被嵌入到网站上或用作API。这可以通过点击右上角的**</>**图标来完成。将出现一个包含以下选项的弹出窗口：
- en: "![Figure 9.26: Flowise – \uFEFFembed in website or use as API options](img/B21161_09_26.jpg)"
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![图9.26：Flowise – 嵌入网站或作为API选项](img/B21161_09_26.jpg)'
- en: 'Figure 9.26: Flowise – embed in website or use as API options'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.26：Flowise – 嵌入网站或作为API选项
- en: In this case, Flowise is running locally on localhost, but it can be deployed
    to any cloud service, such as Render, Railway, or Replit. It can also be deployed
    to cloud providers such as AWS, Azure, GCP, and DigitalOcean.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，Flowise在本地主机上运行，但它可以被部署到任何云服务，如Render、Railway或Replit。它也可以部署到云提供商，如AWS、Azure、GCP和DigitalOcean。
- en: One common application of LLMs is to be able to summarize and ask questions
    about PDFs and other types of documents. In the next section, we will explore
    a workflow that allows us to do just that.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: LLM的一个常见应用是能够总结和就PDF和其他类型的文档内容提出问题。在下一节中，我们将探讨一个允许我们做到这一点的流程。
- en: Digging for answers in PDFs with LLMs
  id: totrans-239
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用LLM在PDF中寻找答案
- en: Many new start-ups and AI agency consulting companies offer services that allow
    users to chat with their documents and ask questions about their content. With
    Flowise, you can build such a workflow in just a few minutes.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 许多新的初创公司和AI代理咨询公司提供允许用户与其文档进行聊天并对其内容提出问题的服务。使用Flowise，你只需几分钟就能构建这样的工作流程。
- en: 'The workflow looks like the one shown in *Figure 9**.26*:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程看起来就像*图9.26*中所示：
- en: The first thing that we need is a document loader – in this case, a PDF loader.
    There are other types of document loaders to load text files, CSV, DOCX, web scrapers,
    and more.
  id: totrans-242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们首先需要的是一个文档加载器——在这种情况下，是一个PDF加载器。还有其他类型的文档加载器可以加载文本文件、CSV、DOCX、网络爬虫等。
- en: Then, we need a text splitter to break the document into chunks of *N* characters.
    *N* is a given number of characters defined by the user – 1,000 was chosen in
    this example. It’s good practice to set some overlay to relate a chunk with the
    adjacent ones.
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，我们需要一个文本分割器，将文档分割成*N*个字符的块。*N*是用户定义的字符数，在这个例子中选择了1,000。将一个块与相邻的块相关联设置一些重叠是良好的实践。
- en: These chunks have to be stored in a vector database that allows semantic search
    when needed. I selected Pinecone, which is a popular vector store, but there are
    several options and they are growing all the time.
  id: totrans-244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这些块必须存储在一个允许在需要时进行语义搜索的向量数据库中。我选择了Pinecone，这是一个流行的向量存储，但选项有很多，并且还在不断增加。
- en: To use Pinecone, you need to create an account at [https://www.pinecone.io/](https://www.pinecone.io/).
    Then, you need to create an index and enter the API key, the environment, and
    the index in the Pinecone node in Flowise. To vectorize the chunks, we need an
    embedding node. In this case, I’m using the OpenAI one. You need to have an account
    with OpenAI and generate an API key.
  id: totrans-245
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要使用Pinecone，你需要在[https://www.pinecone.io/](https://www.pinecone.io/)上创建一个账户。然后，你需要在Flowise中的Pinecone节点中创建一个索引并输入API密钥、环境以及索引。为了向量化块，我们需要一个嵌入节点。在这种情况下，我使用的是OpenAI的。你需要有一个OpenAI账户并生成一个API密钥。
- en: Because we want to ask questions about the PDF, I selected the conversational
    retrieval QA chain.
  id: totrans-246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 因为我们要询问PDF中的问题，我选择了对话检索QA链。
- en: 'Finally, we need an LLM. I chose ChatOpenAI with the **GPT-3.5-0613** model.
    You need to enter your OpenAI API key in that node as well:'
  id: totrans-247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们需要一个LLM。我选择了带有**GPT-3.5-0613**模型的ChatOpenAI。你还需要在该节点中输入你的OpenAI API密钥：
- en: "![Figure 9.27: Flowise flow to \uFEFFask questions about a PDF](img/B21161_09_27.jpg)"
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![图9.27：询问PDF问题的Flowise流程](img/B21161_09_27.jpg)'
- en: 'Figure 9.27: Flowise flow to ask questions about a PDF'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.27：询问PDF问题的Flowise流程
- en: Once you save your project, you can test using the chat option. In *Figure 9**.27*,
    you can see that it’s responding to the question as expected.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 保存你的项目后，你可以使用聊天选项进行测试。在*图9.27*中，你可以看到它正在按预期回答问题。
- en: You can add more PDF nodes if you want to chat with several documents.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想与多份文档进行聊天，可以添加更多PDF节点。
- en: Another simple yet powerful workflow is to allow an LLM to access the internet
    in real time. There are several nodes offered by tools to do that, such as SERP
    API, Serper, and Web Browser.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种简单而强大的工作流程是允许大型语言模型（LLM）实时访问互联网。为此，一些工具提供了多个节点，例如SERP API、Serper和Web浏览器。
- en: As these two simple examples show, LangChain, Flowise, and Langflow offer powerful
    capabilities to build sophisticated applications using LLMs. A full workflow could
    be a custom tool to another workflow. You can even integrate workflows created
    with Zapier and/or Make in these workflows. Imagine the possibilities.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 如这两个简单的例子所示，LangChain、Flowise和Langflow提供了使用LLM构建复杂应用的有力功能。一个完整的工作流程可以是一个自定义工具到另一个工作流程。你甚至可以将使用Zapier和/或Make创建的工作流程集成到这些工作流程中。想象一下可能性。
- en: LangChain recently launched LangSmith, a debugging and monitoring tool for debugging,
    testing, and monitoring LLM applications, which makes it easier to fix issues
    with LangChain workflows. We’ll explore LangSmith in more detail next.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain最近推出了LangSmith，这是一个用于调试、测试和监控LLM应用程序的工具，它使得修复LangChain工作流程中的问题变得更加容易。我们将在下一节中更详细地探讨LangSmith。
- en: LangSmith – debug, test, and monitor your LLM workflows
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangSmith – 调试、测试和监控您的LLM工作流程
- en: LangSmith provides an end-to-end solution for developing, debugging, testing,
    and monitoring LLM applications. Its unified platform helps teams move from prototype
    to production by offering robust capabilities across the LLM application life
    cycle. Its key features include debugging tools to identify bugs, testing frameworks
    to validate functionality, monitoring for production apps, visualizations to understand
    architecture, and exporting data for analysis and sharing. LangSmith aims to enable
    building enterprise-grade LLM applications from initial prototype through to launch
    and beyond.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: LangSmith为开发、调试、测试和监控LLM应用程序提供了一个端到端解决方案。其统一平台通过在整个LLM应用程序生命周期中提供强大的功能，帮助团队从原型过渡到生产。其关键特性包括用于识别错误的调试工具、用于验证功能的测试框架、用于生产应用程序的监控、用于理解架构的可视化以及用于分析和共享的数据导出。LangSmith旨在从初始原型到发布以及之后的构建企业级LLM应用程序。
- en: 'You can get more information about LangSmith here: [https://www.langchain.com/langsmith](https://www.langchain.com/langsmith).'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在LangSmith这里获取更多信息：[https://www.langchain.com/langsmith](https://www.langchain.com/langsmith)。
- en: Innovation in this field is moving very fast. We expect new developments soon.
    We’ll explore some of them in the next section.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 这个领域的创新进展非常快。我们预计很快会有新的发展。我们将在下一节中探讨其中的一些。
- en: The future of LLM integration – plugins, agents, assistants, GPTs, and multimodal
    models
  id: totrans-259
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM集成的未来——插件、代理、助手、GPT和多模态模型
- en: 'So far, we have explored integrating LLMs using templates, no-code tools, and
    developer platforms such as LangChain. However, innovation in this space is rapid.
    We can expect even more powerful and flexible integration capabilities to emerge.
    Here are some key developments on the horizon:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探讨了使用模板、无代码工具和LangChain等开发者平台来集成LLM。然而，这个领域的创新非常迅速。我们可以期待出现更强大、更灵活的集成功能。以下是即将到来的几个关键发展：
- en: '**LLM plugins** **and extensions**'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM插件** **和扩展**'
- en: Rather than custom coding, expect to see plugins and extensions for directly
    integrating LLMs into common platforms. We already have plugins for ChapGPT Plus
    and some of them, such as Code Interpreter, are extremely powerful. Code Interpreter
    provides a sandboxed Python environment for executing code. While designed for
    programmers, it can also empower general users to accomplish many tasks.
  id: totrans-262
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 而不是自定义编码，您将看到插件和扩展，可以直接将LLM集成到常见的平台中。我们已经有ChapGPT Plus的插件，其中一些，如Code Interpreter，功能极其强大。Code
    Interpreter提供了一个沙盒化的Python环境来执行代码。虽然它是为程序员设计的，但它也可以赋予普通用户完成许多任务的能力。
- en: For example, you can leverage Code Interpreter to convert PDFs using OCR, edit
    video files, solve math problems, conduct data analysis and visualization, generate
    graphs and charts, and more. ChatGPT’s Code Interpreter allows you to directly
    upload local files in various formats.
  id: totrans-263
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，您可以使用Code Interpreter通过OCR转换PDF文件、编辑视频文件、解决数学问题、进行数据分析与可视化、生成图表和更多操作。ChatGPT的Code
    Interpreter允许您直接上传各种格式的本地文件。
- en: Google also launched extensions to Bard. Bard extensions connect Google’s conversational
    AI with its ecosystem of apps, allowing Bard to draw contextual information from
    services such as Gmail, Maps, and YouTube to provide more useful, integrated responses
    in one seamless conversation. This connectivity enables enhanced productivity,
    creativity, and convenience across tasks such as planning, content creation, and
    learning.
  id: totrans-264
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 谷歌还推出了Bard的扩展。Bard扩展将谷歌的对话式AI与其应用生态系统连接起来，使Bard能够从Gmail、地图和YouTube等服务中提取上下文信息，在一个无缝的对话中提供更有用、更集成的响应。这种连接性提高了规划、内容创作和学习等任务的生产力、创造力和便利性。
- en: As LLMs become a standard workplace utility, lightweight plugins will allow
    you to sprinkle existing workflows into them with little friction. APIs and SDKs
    will handle the complexity behind simple user interfaces.
  id: totrans-265
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 随着LLM成为标准的工作场所工具，轻量级的插件将允许您以最小的摩擦将现有的工作流程添加到其中。API和SDK将处理简单用户界面背后的复杂性。
- en: '**New LLMs**'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**新的LLM（大型语言模型**）'
- en: New models will continue to pop up. One example is Google Gemini. Gemini is
    a multimodal LLM that can process and generate text, images, and code.
  id: totrans-267
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将继续出现新的模型。一个例子是Google Gemini。Gemini是一个多模态LLM，可以处理和生成文本、图像和代码。
- en: '**Specialized** **LLM agents**'
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业** **的LLM代理**'
- en: We will see more modular, specialized LLMs emerge that are pre-trained for particular
    tasks. These expert agents can provide capabilities such as advanced search, data
    analysis, optimized recommendations, and automatic report generation out of the
    box.
  id: totrans-269
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们将看到更多模块化、专业的LLM出现，这些LLM针对特定任务进行了预训练。这些专家代理可以提供诸如高级搜索、数据分析、优化推荐和自动生成报告等能力。
- en: Developers can then orchestrate pipelines by combining these best-of-breed expert
    agents to accomplish complex workflows. Rather than one universal LLM, an agent-based
    approach plays to different models’ strengths.
  id: totrans-270
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 开发者可以通过结合这些最佳专家代理来编排管道，以完成复杂的流程。而不是一个通用的LLM，基于代理的方法利用了不同模型的优势。
- en: Along with LangChain, there are other tools tailored for the same purposes that
    are being developed, such as Superagent ([https://www.superagent.sh/](https://www.superagent.sh/)),
    LlamaIndex ([https://gpt-index.readthedocs.io/en/stable/index.html](https://gpt-index.readthedocs.io/en/stable/index.html)),
    and many others.
  id: totrans-271
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 除了LangChain，还有其他针对相同目的定制的工具正在开发中，例如Superagent ([https://www.superagent.sh/](https://www.superagent.sh/))、LlamaIndex
    ([https://gpt-index.readthedocs.io/en/stable/index.html](https://gpt-index.readthedocs.io/en/stable/index.html))以及许多其他工具。
- en: '**Multimodal** **LLM integration**'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态** **LLM集成**'
- en: So far, LLMs primarily process and generate text, images, or audio. But models
    are rapidly improving at uniting text, images, audio, video, and other modalities.
    We will see tools emerge for tighter integration between LLMs and other media.
    When OpenAI announced GPT-4 in early 2023, they showed some of the potential of
    multimodal capabilities. Bard already allows you to load an image and ask it for
    the context of such an image. We will see more powerful multimodal models in the
    near future.
  id: totrans-273
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 到目前为止，LLM主要处理和生成文本、图像或音频。但模型在统一文本、图像、音频、视频和其他模态方面正在迅速改进。我们将看到LLM与其他媒体之间更紧密集成的工具出现。当OpenAI在2023年初宣布GPT-4时，他们展示了多模态能力的潜力。Bard已经允许你加载一张图片并询问其上下文。我们将在不久的将来看到更强大的多模态模型。
- en: Rather than separate utilities, we’ll see LLMs become embedded assistants that
    boost productivity across everyday apps. Tight integration unlocks more contextual
    recommendations and automation potential.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是单独的工具，我们将看到LLM成为嵌入式的助手，提高日常应用的生产力。紧密集成解锁了更多上下文推荐和自动化潜力。
- en: As LLMs advance, we can expect integration tools to grant broader access to
    their capabilities while customizing them for specialized domains. Templates and
    no-code will empower non-developers, while extensibility will prevent vendor lock-in.
    The next waves of innovation look to make LLMs flexible utilities anyone can apply
    to their unique needs.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 随着LLM的发展，我们可以期待集成工具将提供更广泛的访问权限，同时为特定领域定制。模板和无代码将赋予非开发者能力，而可扩展性将防止供应商锁定。下一波创新将使LLM成为任何人都可以根据其独特需求应用的灵活工具。
- en: 'OpenAI’s announcements on November 6, 2023, point to some key developments
    in LLM integration going forward:'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI于2023年11月6日的公告指向了未来LLM集成的一些关键发展：
- en: Simplified Assistants API
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简化的助手API
- en: Customizable GPTs
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可定制的GPTs
- en: Tighter multimodal connections
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更紧密的多模态连接
- en: OpenAI’s new Assistants API provides an easy way to build intelligent agents
    with capabilities such as code execution, data analysis, and task automation.
    Developers can quickly create assistants tailored to specific use cases without
    complex custom coding, by just prompting commands in natural language..
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的新助手API提供了一个简单的方法来构建具有代码执行、数据分析和任务自动化等能力的人工智能代理。开发者可以通过在自然语言中提示命令，快速创建针对特定用例的助手，而无需复杂的自定义编码。
- en: The Assistants API handles ingesting data sources, maintaining conversation
    context across messages, and leveraging tools such as Code Interpreter and Retrieval
    under the hood. This lowers the barrier to integrating LLMs into workflows.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 助手API处理数据源的摄入、维护消息间的对话上下文，并在幕后利用诸如代码解释器和检索等工具。这降低了将LLM集成到工作流程中的门槛。
- en: With customizable GPTs, users can now craft specialized custom-made GPTs for
    particular domains and tasks – for example, creating a math tutor GPT or a product
    copywriting assistant. GPTs make it easy to personalize LLMs without needing data
    science expertise.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 可定制的GPT允许用户现在为特定领域和任务创建专门的定制GPT，例如创建一个数学辅导GPT或产品文案助手GPT。GPT使得在不需数据科学专业知识的情况下个性化LLM变得容易。
- en: GPTs also let you share helpful AI tools with others through OpenAI’s upcoming
    GPT Store. This marketplace will allow creators to distribute and potentially
    monetize their custom assistants.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: GPT还允许您通过OpenAI即将推出的GPT Store与其他人分享有用的AI工具。这个市场将允许创作者分发并可能货币化他们的定制助手。
- en: On the multimodal front, access to models such as DALL-E 3 for generating images
    from text prompts tightly connects text and visuals. The new text-to-speech API
    similarly bridges text and audio.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 在多模态方面，访问如DALL-E 3等模型，可以从文本提示生成图像，紧密连接文本和视觉。新的文本到语音API同样架起了文本和音频之间的桥梁。
- en: As LLMs progress, we’ll see models that gracefully unite text, images, audio,
    video, and data. This interweaving empowers more assistive, personalized, and
    human-like interactions.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 随着LLM的进步，我们将看到能够优雅地结合文本、图像、音频、视频和数据等模型。这种交织赋予了更多辅助性、个性化以及类似人类的交互能力。
- en: Rather than a one-size-fits-all LLM, purpose-built assistants, GPTs, and integrations
    tailored to unique use cases appear to be the path forward for delivering value
    with AI.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 与通用的LLM不同，针对特定用途定制的助手、GPT以及针对独特用例的集成似乎是利用AI创造价值的未来之路。
- en: Summary
  id: totrans-287
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter explored different techniques for integrating LLMs into workflows
    to automate prompting at scale. We looked at easy template options such as SheetSmart
    for Google Sheets as well as no-code automation platforms such as Zapier. For
    more advanced customization, developer tools such as LangChain, Flowise, and Langflow
    enable building pipelines and applications using multiple LLMs. We walked through
    sample use cases for competitive intelligence, customer data enrichment, and conversing
    with documents to see how integrations could work in practice.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了将LLM集成到工作流程中的不同技术，以实现大规模自动提示。我们研究了如SheetSmart等Google Sheets的简单模板选项，以及如Zapier等无代码自动化平台。对于更高级的定制，开发者工具如LangChain、Flowise和Langflow允许使用多个LLM构建管道和应用。我们通过竞争情报、客户数据丰富化和与文档对话的示例用例，展示了集成在实际中的应用方式。
- en: Looking ahead, tight connections between conversational AI and everyday productivity
    apps will enable LLMs to provide more relevant, contextual recommendations and
    automation. However, while integration unlocks usefulness, it also raises important
    ethical considerations; we will explore this in the next chapter. As these powerful
    technologies become further embedded into daily life, principles such as transparency,
    accountability, and control become crucial.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，对话式AI与日常生产力应用之间的紧密联系将使LLM提供更相关、更具体的推荐和自动化。然而，尽管集成解锁了实用性，但也引发了重要的伦理考量；我们将在下一章中探讨这一点。随着这些强大的技术进一步融入日常生活，透明度、问责制和控制等原则变得至关重要。
- en: Part 4:Ethics, Limitations, and Future Developments
  id: totrans-290
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四部分：伦理、局限性和未来发展趋势
- en: '[*Chapter 10*](B21161_10.xhtml#_idTextAnchor143) explores the multifaceted
    ethical challenges posed by the rise of increasingly capable generative AI systems.
    As these technologies advance, they introduce risks of perpetuating bias, threatening
    privacy, disrupting labor markets, exacerbating climate change, and more. However,
    good governance rooted in human rights can help steer innovations toward beneficial
    ends. Solutions emphasize ethics by design, algorithmic auditing, thoughtful regulations,
    and inclusive participation.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](B21161_10.xhtml#_idTextAnchor143) 探讨了日益强大的生成式AI系统崛起所提出的多方面伦理挑战。随着这些技术的进步，它们引入了持续偏见、威胁隐私、扰乱劳动力市场、加剧气候变化等风险。然而，基于人权的良好治理可以帮助引导创新走向有益的结局。解决方案强调设计伦理、算法审计、深思熟虑的法规和包容性参与。'
- en: '[*Chapter 11*](B21161_11.xhtml#_idTextAnchor155) concludes by recapping core
    concepts from the book, including using conditional prompting for personalization,
    causality prompting for reasoning, and deanonymization prompting to probe dangers.
    As access democratizes, responsible oversight and governance will be imperative.
    Prompt engineering unlocks immense creativity, but we must thoughtfully direct
    it toward uplifting applications that synthesize the best of human and artificial
    strengths. The future remains undetermined – our choices today will resonate for
    generations.'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](B21161_11.xhtml#_idTextAnchor155) 以回顾本书的核心概念结束，包括使用条件提示进行个性化，因果提示进行推理，以及匿名化提示来探测危险。随着获取的民主化，负责任的监督和管理将变得至关重要。提示工程释放了巨大的创造力，但我们必须深思熟虑地将其引导到提升应用的方向，这些应用综合了人类和人工智能的最佳优势。未来仍然不确定——我们今天的抉择将影响几代人。'
- en: Overall, *Part 4* explores responsible stewardship of these exponentially accelerating
    technologies. With ethical mindfulness guiding development and governance, prompt
    engineering promises to unlock AI’s potential while upholding human dignity and
    wisdom.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，*第四部分*探讨了这些指数级加速技术的负责任管理。在道德意识的指导下进行发展和治理，敏捷工程承诺释放人工智能的潜力，同时维护人类的尊严和智慧。
- en: 'This part has the following chapters:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分包含以下章节：
- en: '[*Chapter 10*](B21161_10.xhtml#_idTextAnchor143), *Generative AI: Emerging
    Issues at the Intersection of Ethics and Innovation*'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第10章*](B21161_10.xhtml#_idTextAnchor143), *生成式AI：伦理与创新交汇处的新兴问题*'
- en: '[*Chapter 11*](B21161_11.xhtml#_idTextAnchor155), *Conclusion*'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第11章*](B21161_11.xhtml#_idTextAnchor155), *结论*'
