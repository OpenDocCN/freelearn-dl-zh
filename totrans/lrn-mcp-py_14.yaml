- en: 'Appendix: Building for the Web with Modern Python'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This is for those of you who want to learn about using Python and its modern
    constructs. You might have just switched to Python due to everyone using it because
    of AI, or maybe you’re fairly new to programming. Regardless, a hearty welcome;
    this appendix is for you. The goal with it is to make sure that when you read
    the other chapters, you understand all the constructs used and can use them to
    your benefit.
  prefs: []
  type: TYPE_NORMAL
- en: Type hints and data modeling
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Even though Python doesn’t enforce types, it definitely benefits from them.
    Type hints can make your code more readable and help catch errors early.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s some code without a type hint on adding a product to a basket:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: While this code works, it lacks clarity on what type of product is being added
    to the basket. There’s also a risk that we make a mistake when accessing `product`
    attributes. You should therefore consider using type hints.
  prefs: []
  type: TYPE_NORMAL
- en: Improved code with type hints
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Type hints greatly help your IDE tooling, making it easier to catch errors and
    understand code. They also help with readability. Type hints such as `str`, `int`,
    and so on just work without the need to add a library. There’s also the `typing`
    library, which brings in additional types such as `List` and `Optional`, for example.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code shown previously can be made a lot more readable using type hints:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'This is a lot better as `product` is now clearly a dictionary and `basket`
    is a list of dictionaries. We can improve this even more by making `product` into
    a class, like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: What’s even better than this? The answer is a library such as **Pydantic**.
  prefs: []
  type: TYPE_NORMAL
- en: Adding Pydantic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So, what problems do we have that warrant using a validation library? Here
    are a few:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ensuring data integrity** to ensure that the data being processed is accurate
    and reliable'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reducing boilerplate code**, as it can automatically generate validation
    logic'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Providing clear error messages**, making it easier to debug issues'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Simplifying complex data validation logic**, allowing for more maintainable
    code'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Without Pydantic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Imagine for a second that you have data coming in from a web request; the data
    is in the form of a dictionary, but needs to be a specific type, so we need to
    convert it to fix it. Here’s our situation in Python code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Here, we have a situation where the data is in a dictionary shape, `product_dictionary`,
    but we need to convert it to a specific type, `Product`. We need to create a `from_dict`
    function to handle this conversion. This is where Pydantic shines, as it can help
    us validate and parse this data easily.
  prefs: []
  type: TYPE_NORMAL
- en: With Pydantic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Enter Pydantic, and let’s see how we can leverage it for our use case. By inheriting
    from `BaseModel`, we can create a model that automatically validates and parses
    our input data. See the following example where we define a `Product` model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: With the preceding code, we have eliminated the need for a manual conversion
    function. Pydantic takes care of validating and parsing the input data, ensuring
    that it conforms to the expected structure. This not only simplifies our code
    but also makes it more robust and easier to maintain.
  prefs: []
  type: TYPE_NORMAL
- en: 'But there’s a problem here: if we feed the dictionary with incorrect data types
    or missing fields, Pydantic will raise a validation error. This code will crash,
    in fact, so let’s see how we can ensure that we capture any validation errors.'
  prefs: []
  type: TYPE_NORMAL
- en: Converting with confidence
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If the dictionary doesn’t conform to the expected structure, Pydantic will
    raise a validation error, making it clear what went wrong. Let’s make sure we
    capture any validation errors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: With this code, we wrap our call to Pydantic in a `try`-`except` block to handle
    any validation errors gracefully. Pydantic does more than just take strings, numbers,
    and Booleans; it can also handle more complex data types such as lists and dictionaries.
  prefs: []
  type: TYPE_NORMAL
- en: More advanced objects
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s look at a slightly more complex example featuring a professor and their
    office hours availability:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: In this code, we define a `Professor` model that includes an ID, name, and a
    list of office hours. Each office hour is represented by an `OfficeHour` model,
    which includes the day of the week and the start and end times. This structure
    allows us to easily validate and work with complex data types using Pydantic.
  prefs: []
  type: TYPE_NORMAL
- en: Serialization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Sometimes we have a situation where we need to go from a Pydantic model instance
    back to a dictionary. This can be useful for serialization or when we need to
    interact with APIs that expect data in a specific format. For this, we can use
    `model_dump`, a method that exists on each model. Here’s how to use it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'You can even decide what fields are being included using `model_dump(include=...)`
    and `model_dump(exclude=...)`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Pydantic is used heavily in MCP internally in the SDK, and you’re encouraged
    to use it for input and output validation.
  prefs: []
  type: TYPE_NORMAL
- en: "You can even write our own validators, but I’ll leave that as an exercise for\
    \ you. See the official docs at [https://docs.pydantic.dev/latest/concepts/validators/](https://docs.pydantic.dev/latest/concepts/\uFEFF\
    validators/)."
  prefs: []
  type: TYPE_NORMAL
- en: async and await
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Validating code is important, but another important aspect we also need to understand
    is asynchronous programming. Asynchronous programming allows us to write code
    that can perform multiple tasks at once without blocking the main thread. This
    is particularly useful in scenarios where we need to handle I/O-bound operations,
    such as making API calls or reading from a database.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s talk about **async/await**, which is a syntax for writing asynchronous
    code in Python. You should use `async`/`await` when you want to write non-blocking
    code that can handle many tasks at once. If your code is blocking, then the end
    user experience suffers, as they have to wait for each task to complete before
    moving on. Imagine the problem multiplying on a web server with many users. Okay,
    so what do we need to know? First, let’s start with the concepts:'
  prefs: []
  type: TYPE_NORMAL
- en: '`coroutine`: A so-called coroutine is created when you mark up a function with
    `async def`. That means this function can be paused and resumed, allowing other
    tasks to run in the meantime. Let’s see this pause and resume behavior in the
    following code:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: In this code, we define `fetch_data`, a function marked with the `async` keyword.
    The function itself calls `await asyncio.sleep(1)`, meaning we want the code to
    *stop* here for one second. Then, we *resume* and return a dictionary. Is this
    non-blocking? Yes, because when `asyncio.sleep` is running, other work can take
    place.
  prefs: []
  type: TYPE_NORMAL
- en: '**Event loop**: The event loop is what runs the coroutines and manages their
    execution. To interact with the event loop and run your `async` code, call `asyncio.run(fetch_data())`:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Another way to talk to the event loop is by calling `asyncio.get_running_loop()`.
    This will give you the current event loop instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '`await`: You’ve seen this in use already, but any function marked with `async`
    should use `await` when it’s called.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`asyncio`: We showed this already by calling its `run` method. It is a library
    in Python that provides support for asynchronous programming. It allows you to
    write concurrent code using the `async`/`await` syntax. You’ll often use `asyncio`
    when working with web frameworks such as FastAPI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s see a web application example using FastAPI:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '`asyncio.gather`: `asyncio` provides another useful method called `gather`,
    which allows you to run multiple coroutines concurrently and wait for all of them
    to finish. It’s often more convenient than `wait` when you need the results of
    all tasks. Here’s how to use it:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Here, each call to `fetch_data` is passed as an argument to `gather`. While
    `gather` might be more convenient, it does not provide as much control over individual
    tasks as `wait` does. Speaking of `wait`, let’s see how it works.
  prefs: []
  type: TYPE_NORMAL
- en: '`asyncio.wait`: `asyncio` has useful methods, and one such method is `wait`,
    which allows you to wait for multiple tasks to complete. This is particularly
    useful when you want to run several tasks concurrently and wait for all of them
    to finish. Here’s how to use it:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Here, the code creates three search tasks, each with a different delay and workload.
    The tasks are started concurrently using `asyncio.create_task`. The `asyncio.as_completed`
    function is used to process the results as they finish. If a task finds the target
    value, it sets the `stop` event, which cancels the other tasks. Finally, all tasks
    are awaited to ensure proper cleanup.
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see, there’s a lot of flexibility in how you can manage concurrent
    tasks in Python using `asyncio`. Let’s just mention one more thing: so far, you’ve
    seen how your methods can be made `async`, and even your web frameworks. There’s
    also a specific library for making web requests `async`, called `httpx`.'
  prefs: []
  type: TYPE_NORMAL
- en: '`httpx` is a fully featured HTTP client for Python 3 that provides `async`
    capabilities. It allows you to make HTTP requests in an asynchronous manner, making
    it a great choice for I/O-bound tasks. Here’s a simple example of how to use `httpx`
    with `async`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Great, now that we have a better grasp on `async`, let’s see how we can use
    it in a web context.
  prefs: []
  type: TYPE_NORMAL
- en: 'Uvicorn: the ASGI server'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: First, let’s see where we came from, namely, WSGI. **WSGI** stands for **Web
    Server Gateway Interface**, a standard interface between web servers and Python
    web applications. It has been the de facto standard for Python web applications
    for many years. However, the **Asynchronous Server Gateway Interface** (**ASGI**)
    was introduced to address the needs of modern web applications, particularly those
    requiring asynchronous capabilities. So, with ASGI, we can handle asynchronous
    requests more efficiently in a way we couldn’t with WSGI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Uvicorn is a lightning-fast ASGI server implementation, using `uvloop` and
    `httptools`. It’s perfect for serving your FastAPI applications and can handle
    both HTTP and WebSocket protocols. `uvloop` is a fast implementation of the event
    loop, which is the core of asynchronous programming in Python. `httptools` is
    a library for parsing HTTP requests and responses. Uvicorn works seamlessly with
    FastAPI and can, for example, start a server, enabling your application to handle
    requests concurrently. Here’s a web server example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'You can run this FastAPI application with Uvicorn using the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: What the preceding code does is to run a file called `main.py` and look for
    an instance of the FastAPI application called `app`. It will then start the server
    and enable hot-reloading, so any changes you make to your code will be automatically
    applied without needing to restart the server.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can also specify additional options such as the host and port:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: This is just the beginning of using Uvicorn, but it’s a good start to be able
    to create MCP servers using transports such as SSE or Streamable HTTP.
  prefs: []
  type: TYPE_NORMAL
- en: Context managers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Another thing you will see a lot when working with the MCP SDK is the use of
    context managers, so what are those? A context manager is a Python object that
    defines the runtime context to be established when executing a `with` statement.
    The most common use case is resource management, where you want to ensure that
    resources are properly acquired and released. For example, it’s a good idea to
    use it if you need to set up a resource such as a database connection or some
    other type of resource. Here’s a simple example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'What makes us able to use the `with` keyword, you might ask. Well, context
    managers are able to use the `with` keyword because they implement two special
    methods: `__enter__` and `__exit__`. When the `with` statement is executed, the
    `__enter__` method is called, and when the block inside the `with` statement is
    exited, the `__exit__` method is called. This allows for setup and teardown actions
    to be performed automatically. Let’s see how the preceding class implements these
    methods:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: The preceding code demonstrates the use of a context manager for managing database
    connections. You can see how the `__enter__` method establishes the connection
    and returns it, while the `__exit__` method ensures that the connection is closed
    when the block is exited, even if an exception occurs.
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s another version of `with`, namely, `async with`, which is used for
    asynchronous context managers. These are particularly useful when working with
    asynchronous code, such as when using `asyncio` or handling asynchronous I/O operations.
    The SDK uses this pattern in the client, for example, to make the initial server
    connection, like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'In this code, it now calls the `__aenter__` and `__aexit__` methods of the
    asynchronous context manager, which helps to create a server connection. If you
    keep looking at the SDK code for the client, you will see that the full initialization
    code looks like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'What’s going on here? Two asynchronous context managers are being used in tandem.
    The outer context manager (`stdio_client`) is responsible for managing the standard
    input/output streams for the server connection, while the inner context manager
    (`ClientSession`) is responsible for managing the lifecycle of the client session
    itself. From an implementation standpoint, here’s some dummy code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: Note how the `__aenter__` method in `stdio_client` is responsible for creating
    the client connection and returning the necessary streams, while the `__aenter__`
    method in `ClientSession` is responsible for initializing the session with those
    streams. So, now you hopefully understand why the code looks the way it does.
    That is, some needed initialization is happening when the context manager is created,
    and some clean up happens when it is exited. If we don’t use a pattern like this,
    it’s easy to forget the clean-up part, and we cause a resource leak.
  prefs: []
  type: TYPE_NORMAL
- en: The contextmanager library
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The `contextmanager` library in Python provides a way to create context managers
    using generator functions. Instead of defining classes with the `__enter__` and
    `__exit__` methods, you can use the `@contextmanager` decorator to turn a generator
    function into a context manager. Let’s see an example of that:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: You can see that we don’t need to write `__enter__` and `__exit__`, but can
    instead decorate a function with `@contextmanager` to achieve the same effect.
    This library is also used by the MCP SDK to set up context managers for various
    resources.
  prefs: []
  type: TYPE_NORMAL
- en: 'uv: your development environment manager'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Let’s cover our last topic in this appendix, namely, `uv`. It’s not something
    you must use, but you’re highly recommended to do so. Here’s why:'
  prefs: []
  type: TYPE_NORMAL
- en: It provides a consistent interface for managing your development environment.
    It means you can easily switch between different projects and their dependencies
    without worrying about conflicts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It streamlines the process of setting up and managing virtual environments,
    making it easier to work on multiple projects with different requirements. So,
    instead of typing `python -m venv env` and `source env/bin/activate`, you can
    simply use `uv init` to create and activate a virtual environment, which also
    initiates your project.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It simplifies the process of installing and managing dependencies, allowing
    you to easily add, remove, and update packages as needed. You’re used to typing
    `pip install <package>` to install a package, but with `uv`, you can use `uv add
    <package>` instead.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Project management with `project.toml` is made easier, allowing you to define
    your project’s dependencies and settings in a single file instead of scattering
    them across multiple files.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can even use `uv` to manage your Docker containers and images, making it
    easier to deploy your applications in a consistent environment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is what you can do:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Install it with the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create a `uv` configuration file in your project root:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Add a dependency using the `uv add` command:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Run your app with the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We’ve come to the end of this appendix. Hopefully, you feel more up to speed
    with modern Python and tools such as `uv`, `asyncio`, and Uvicorn.
  prefs: []
  type: TYPE_NORMAL
