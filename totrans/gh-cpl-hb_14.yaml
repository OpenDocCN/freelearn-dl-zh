- en: '10'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: 'Changing the Narrative: Reframing Engineering with AI'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 改变叙事：用AI重新构架工程
- en: The impact of generative AI in the SDLC is only accelerating and changing our
    entire field of work. Now, simple and mundane tasks can be handled by agents,
    so that the human engineers can focus on where the actual value is – in shipping
    durable, working applications that deliver value to the end user. We are now at
    the point where creating certain changes becomes a choice between letting a human
    engineer spend time implementing those changes or handing over the task at hand
    to an AI agent and paying a couple of dollars so it can be implemented automatically.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI在软件开发生命周期（SDLC）中的影响正在加速，并正在改变我们整个工作领域。现在，简单的日常任务可以由代理处理，这样人类工程师就可以专注于真正有价值的地方——交付对最终用户有价值的耐用、可工作的应用程序。我们现在已经到了一个地步，创建某些更改变成了让人类工程师花时间实施这些更改，还是将手头的任务交给AI代理，并支付几美元以自动实施的选择。
- en: In our opinion, we need to shift the narrative away from just enabling engineers
    to use GitHub Copilot and then simply looking at perceived productivity gains.
    Currently, companies often focus on the idea that AI produces code more easily
    and faster, leading them to think they have finally found a way to turn 1 single
    AI-enabled engineer into 10 engineers (where one engineer enabled with AI tooling
    can do the work of 10 engineers that do not have those tools available).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们看来，我们需要将叙事从仅仅让工程师使用GitHub Copilot，然后简单地观察感知到的生产力提升转变过来。目前，公司往往专注于AI更容易、更快地生成代码的想法，这让他们认为他们终于找到了一种方法，将1个配备AI工具的工程师变成10个工程师（其中，一个配备AI工具的工程师可以完成10个没有这些工具的工程师的工作）。
- en: 'We even see engineers hyping this up with stories around “vibe coding” with
    AI: they jump on their keyboards with a single prompt and accept every suggestion
    that is given, and then run the application to figure out whether their initial
    problem was solved or not. Eventually, this path leads to disappointment: either
    the code does not work as hoped, or there was crucial information missing and
    the AI took a wrong turn somewhere. Even worse, we have seen generative AI following
    the “scouting rule” where it starts to clean up after itself, changing code that
    did not need to be changed at all. This can lead to having an impact on other
    places in the code base that can introduce new bugs. On top of all that, we see
    engineers who are not even testing their “vibe coding” creations before pushing
    them to production. This is a recipe for disaster and will lead to a lot of frustration
    and disappointment in the long run.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们甚至看到工程师们用关于“氛围编码”与AI的故事来炒作这件事：他们用一个简单的提示就跳上键盘，接受给出的每一个建议，然后运行应用程序来找出他们最初的问题是否得到了解决。最终，这条路径只会导致失望：要么代码没有按预期工作，要么缺少关键信息，AI在某个地方走错了方向。更糟糕的是，我们见过生成式AI遵循“侦察规则”，开始清理自己的痕迹，修改根本不需要修改的代码。这可能导致代码库中的其他地方受到影响，从而引入新的错误。更不用说这一切了，我们还看到工程师们在将“氛围编码”的成果推送到生产环境之前甚至没有对其进行测试。这是一个灾难性的配方，最终会导致大量的挫败感和失望。
- en: 'Another issue we see is that managers often think that they will get those
    10 engineers with these new tools, and all their issues producing business value
    will be gone! The focal point tends to be on making the engineers more “productive,”
    so that they create more code and thus value for the end user, and that code is
    also produced faster than ever before. Doing so, they completely skip over the
    fact that we are focusing on just the two hours a day that an engineer has available
    to focus on coding work (see, for example, ActiveState’s 2019 Developer Survey:
    [https://www.activestate.com/wp-content/uploads/2019/05/ActiveState-Developer-Survey-2019-Open-Source-Runtime-Pains.pdf](https://www.activestate.com/wp-content/uploads/2019/05/ActiveState-Developer-Survey-2019-Open-Source-Runtime-Pains.pdf)
    ). The other time in a day is spent on things such as requirements gathering,
    documentation, and meetings. We are not talking at all about optimizing the rest
    of the workday!'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还看到另一个问题是，管理者常常认为他们会通过这些新工具获得那10名工程师，他们产生商业价值的问题都会消失！焦点往往在于使工程师更加“高效”，以便他们创造更多的代码和为最终用户创造的价值，而且代码的生成速度也比以往任何时候都要快。这样做，他们完全忽略了我们只关注工程师每天可用于编码工作的两个小时（例如，参见ActiveState的2019年开发者调查：[https://www.activestate.com/wp-content/uploads/2019/05/ActiveState-Developer-Survey-2019-Open-Source-Runtime-Pains.pdf](https://www.activestate.com/wp-content/uploads/2019/05/ActiveState-Developer-Survey-2019-Open-Source-Runtime-Pains.pdf)）。一天中的其他时间用于诸如需求收集、文档和会议等活动。我们根本不谈论优化剩余的工作日！
- en: '![Figure 10.1: Bulk of non-programming time from the ActiveState 2019 Developer
    Report](img/B34107_10_1.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图10.1：ActiveState 2019开发者报告中非编程时间的主体](img/B34107_10_1.png)'
- en: 'Figure 10.1: Bulk of non-programming time from the ActiveState 2019 Developer
    Report'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1：ActiveState 2019开发者报告中非编程时间的主体
- en: '**To view this image in color**'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**要查看此图像的颜色**'
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 使用您购买时附带的免费彩色PDF版。有关详细信息，请参阅[*前言*](Preface.xhtml#_idTextAnchor004)中的*随书免费福利*部分。
- en: GitHub Copilot can be leveraged to help with some of these tasks left and right,
    such as requirements gathering, but with tasks like standups, refinements, and
    meetings, it is harder to find a good use case for GitHub Copilot. There are other
    tools available that help with those kinds of things, such as automatic meeting
    note transcribers from various vendors.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot可以用来帮助处理一些这些任务，如需求收集，但对于站立会议、改进和会议等任务，找到GitHub Copilot的好用例就更加困难。有其他工具可以帮助处理这些类型的事情，例如来自各种供应商的自动会议记录转录器。
- en: 'Just focusing on code generation all strikes us as a bit narrow-minded. Suddenly,
    we see companies needing to defend the cost of enabling their developers with
    GitHub Copilot. This raises an interesting point: even though GitHub Copilot promises
    productivity gains, its licensing cost often becomes a focal point. We’ve seen
    business cases where the primary justification for the expense hinges entirely
    on anticipated productivity improvements, in an effort to defend the license costs.
    Of course, if you have 500 engineers who now need new tooling that costs an extra
    $19 a month (for the Business license), that becomes 500 x 12 months x $19 =$114,000.
    On the other hand, we have never needed to pitch a business case for buying licenses
    for their code editors, or for their Office tools, but for tooling that helps
    us for two hours a day, we need to define a business case and defend why we need
    to spend around $19 a month on GitHub Copilot!'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 只关注代码生成似乎有点狭隘。突然，我们看到公司需要为使他们的开发者使用GitHub Copilot而辩护成本。这提出了一个有趣的观点：尽管GitHub
    Copilot承诺提高生产力，但其许可成本通常成为焦点。我们看到了一些商业案例，其中对费用的主要辩护完全基于预期的生产力改进，以防御许可成本。当然，如果您有500名工程师，他们现在需要额外花费每月19美元（商业许可证）的新工具，那么就是500
    x 12个月 x $19 = $114,000。另一方面，我们从未需要为购买代码编辑器的许可证或办公工具的许可证提出商业案例，但为了帮助我们每天多出两个小时的工具，我们需要定义一个商业案例并辩护为什么我们需要每月花费约19美元在GitHub
    Copilot上！
- en: Most editors cost a multiple of that cost, let alone the hardware that engineers
    use these days. If you take a low figure of the salary cost for an engineer, then
    we can calculate that the license cost is already earned back if we save the engineer
    around 20 minutes of time per month! Since our entire industry is already on the
    AI bandwagon, the **return on investment** ( **ROI** ) discussion should be rather
    easy.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数编辑器的成本是这个成本的数倍，更不用说工程师现在使用的硬件了。如果你假设工程师的薪资成本较低，那么我们可以计算出，如果我们每个月为工程师节省大约20分钟的时间，那么许可费用就已经赚回来了！既然我们整个行业已经加入了人工智能的行列，那么关于投资回报率（**ROI**）的讨论应该相当简单。
- en: All the more reason to shift the narrative away from just ROI and talk about
    the actual impact GitHub Copilot can have in your organization, if you have the
    right things in mind. We need to look at the downstream effects on both the code
    base and the engineers that allow us to get the most out of the new wave of tools.
    What do we need to have in place to be able to reap the benefits? How do we extend
    the impact to the people in our teams who are not engineers?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有正确的想法，那么就有更多的理由将叙事从仅仅关注ROI转向讨论GitHub Copilot在你的组织中可以产生的实际影响。我们需要考虑对代码库和工程师的下游影响，以便我们能够充分利用新工具带来的浪潮。我们需要具备哪些条件才能获得这些好处？我们如何将影响扩展到我们团队中不是工程师的人？
- en: 'That is why we are going to look at the following topics in this chapter:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我们将在本章中探讨以下主题：
- en: Ethical use of GitHub Copilot
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub Copilot的伦理使用
- en: Building a sturdy DevOps foundation
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立坚实的DevOps基础
- en: Expanding AI to engineer-adjacent roles
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将人工智能扩展到工程师相关角色
- en: AI-enhanced engineering
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能增强的工程
- en: Ethical use of GitHub Copilot
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GitHub Copilot的伦理使用
- en: 'When using tools that generate parts of your code base, we always need to keep
    in mind several ethical aspects. There is an aspect of code generation itself
    where large language models display certain traits based on the way they have
    been trained. We already mentioned things such as bias in [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor022)
    . Another aspect is *how* engineers use these tools and are diligent in the way
    the tools impact their way of working. If the engineer stops thinking and blindly
    accepts every output of the large language models, did they actually gain anything?
    We don’t think so. This aspect is more of a cultural effect that AI can have on
    how teams work: we need to refrain from just pointing at the tools and saying
    it was generated by AI and therefore it should just work. We are the human in
    the loop, and we need to bring our professional view to creating the business
    value for our end user.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用生成代码库一部分的工具时，我们始终需要牢记几个伦理方面。代码生成本身有一个方面，大型语言模型会根据它们的训练方式表现出某些特征。我们已经在[*第二章*](Chapter_2.xhtml#_idTextAnchor022)中提到了诸如偏见等问题。另一个方面是工程师如何使用这些工具，以及他们在工具影响他们的工作方式方面的勤奋程度。如果工程师停止思考，盲目接受大型语言模型的每一个输出，他们实际上真的获得了什么？我们认为没有。这个方面更多的是人工智能对团队工作方式可能产生的一种文化影响：我们需要避免仅仅指出工具，并说它是人工智能生成的，因此它应该能够正常工作。我们是回路中的人类，我们需要将我们的专业观点带入为我们的最终用户创造商业价值。
- en: 'As engineers, that means we need to stay on top of things and be the human
    in the loop: we make ethical decisions on using the code suggestions, and we make
    choices to implement our code in a certain way. For example, we must do the following:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 作为工程师，这意味着我们需要保持警觉，并成为回路中的人类：我们对代码建议的使用做出伦理决策，并选择以某种方式实现我们的代码。例如，我们必须做以下事情：
- en: Ensure that any code we accept from GitHub Copilot does not inadvertently introduce
    security vulnerabilities, such as hardcoded credentials or unsafe input handling
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保我们从GitHub Copilot接受的任何代码不会无意中引入安全漏洞，例如硬编码的凭证或处理不安全的输入方式
- en: Be vigilant about copyright and licensing – if the suggested code closely resembles
    open source projects with restrictive licenses, it’s our responsibility to verify
    that we’re allowed to use it
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对版权和许可保持警惕——如果建议的代码与具有限制性许可的开源项目非常相似，那么我们有责任核实我们是否被允许使用它
- en: Avoid using AI-generated code that could reinforce bias or discrimination, especially
    in areas such as hiring algorithms or user-facing features
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免使用可能强化偏见或歧视的人工智能生成的代码，尤其是在招聘算法或面向用户的特性等领域的代码
- en: These are just a few examples of the ethical decisions we face as engineers
    working with AI-powered tools.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是我们在使用人工智能工具作为工程师所面临的伦理决策的几个例子。
- en: 'We need to continue to be professionals who think about all aspects of creating
    applications: we bring the vision for building a solution that takes into account
    our requirements, both from a functional perspective as well as from a technical
    aspect. All the more since the person who is linked to the code changes is still
    us, and not the AI: each commit or pull request is created in our name, so this
    is all attributed to the engineer making changes. We need to keep to our standards
    to build applications that show the right level of professionalism and purpose.
    By doing so, we ensure our applications not only meet expectations but also inspire
    confidence and pride in what we deliver. Continue to think for yourself and add
    what is needed to your prompt and implementation: you are still the pilot!'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要继续成为考虑应用程序所有方面的专业人士：我们带来构建解决方案的愿景，考虑到我们的需求，从功能角度以及技术角度。尤其是当与代码变更相关联的人仍然是我们而不是
    AI 时：每个提交或拉取请求都是以我们的名义创建的，所以这一切都归因于进行更改的工程师。我们需要坚持我们的标准来构建展示正确专业水平和目的的应用程序。通过这样做，我们确保我们的应用程序不仅满足期望，而且在我们交付的内容中激发信心和自豪感。继续独立思考，并将所需内容添加到你的提示和实现中：你仍然是飞行员！
- en: Now that we have discussed the ethical aspects of using GitHub Copilot, both
    in the known limitations of generative AI and bias, as well as the cultural aspects
    of the impact tools have on engineers and their teams, we can look at what needs
    to be in place to actually be able to get the most value out of GitHub Copilot,
    as all is dependent on following the normal best practices for creating applications
    and code.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了使用 GitHub Copilot 的伦理方面，包括生成式 AI 的已知局限性和偏见，以及工具对工程师及其团队的文化影响，我们可以看看为了真正从
    GitHub Copilot 中获得最大价值需要做些什么，因为这一切都取决于遵循创建应用程序和代码的正常最佳实践。
- en: Building a sturdy DevOps foundation
  id: totrans-28
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 建立一个坚固的 DevOps 基础
- en: When enabling engineers with AI, you need to realize that the base principles
    for creating code and applications are still in place – if you have a bad foundation,
    then adding more code on top of it does not add that much value and might even
    make things worse. Instead, we recommend focusing on enabling engineers to work
    on laying down a sturdy foundation to be able to roll out their applications faster
    and with more trust that their application works as intended.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当通过 AI 赋能工程师时，你需要意识到创建代码和应用程序的基本原则仍然存在——如果你有一个糟糕的基础，那么在上面添加更多的代码并不会增加多少价值，甚至可能使事情变得更糟。相反，我们建议专注于使工程师能够工作在打下坚固的基础，以便能够更快地推出他们的应用程序，并且更有信心他们的应用程序按预期工作。
- en: This changes the focus from getting 10x engineers to empowering engineers with
    a foundation that they can trust, which in turn will improve the flow of value
    through the SDLC.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这将重点从获得 10 倍工程师转向赋予工程师一个他们可以信赖的基础，这反过来又将提高通过 SDLC 的价值流动。
- en: '![Figure 10.2: Changing to a sturdy DevOps foundation](img/B34107_10_2.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图 10.2：转向坚固的 DevOps 基础](img/B34107_10_2.png)'
- en: 'Figure 10.2: Changing to a sturdy DevOps foundation'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.2：转向坚固的 DevOps 基础
- en: 'We’ve always been DevOps-minded, and we firmly believe in having the basic
    principles in place:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们一直秉持 DevOps 思维，我们坚信要建立基本的原则：
- en: Automated pipelines and testing that validate every change, to prevent unwanted
    side effects of those changes.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化的管道和测试验证每个变更，以防止这些变更的不希望出现的副作用。
- en: Treating everything as code or configuration to ensure consistency and reliability
    in deployments. For example, infrastructure should be codified so it can be recreated
    with the same outcome every time. If your environments have different settings,
    those differences should be captured in code. This approach allows you to manage
    variations explicitly and ensures that deployments remain predictable and trustworthy.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将一切视为代码或配置，以确保部署的一致性和可靠性。例如，基础设施应被编码化，以便每次都能以相同的结果重新创建。如果你的环境有不同的设置，这些差异应记录在代码中。这种方法允许你明确地管理变化，并确保部署保持可预测和值得信赖。
- en: Having the more eyes principle in place, where every change is reviewed by someone
    else – this helps to prevent unintended side effects and trusting in the ideas
    of a single person.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施更多的眼睛原则，即每个变更都由其他人进行审查——这有助于防止意外的副作用，并信任单个人的想法。
- en: Enough testing in place to have trust – if a deployment fails for any reason,
    a new test should be added to the pipeline to prevent it from happening again.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 足够的测试以建立信任——如果部署因任何原因失败，应向管道中添加一个新的测试以防止其再次发生。
- en: Continuous monitoring and feedback loops.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续监控和反馈循环。
- en: Only when a large portion of these fundamentals are in place can a team of engineers
    roll out their changes faster, as, for example, the testing is in place to be
    able to rely on their deployments. Note that this can be achieved in multiple
    ways – for example, with unit, regression, or integration testing. Use what works
    for your application.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 只有当大部分这些基础都建立起来后，工程师团队才能更快地推出他们的变更，例如，测试已经到位，可以依赖他们的部署。请注意，这可以通过多种方式实现——例如，使用单元测试、回归测试或集成测试。使用适合您应用程序的方法。
- en: 'Generative AI like GitHub Copilot can help to put these foundations in place
    and works really well for that kind of supporting system. We see a lot of users
    only focus on coding with GitHub Copilot, not knowing it can do so much more:
    we’ve created all sorts of scripts, pipelines, and even Splunk queries with GitHub
    Copilot, and it works really well if you understand how to prompt for the right
    things. We see GitHub Copilot as an enabler to give teams the time to get their
    foundation in order. Since normal tasks are sped up, the extra time can be spent
    on initiatives to improve the things that often get pushed to the bottom of the
    backlog or at least pushed out of the sprint.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于GitHub Copilot的生成式AI可以帮助建立这些基础，并且在这方面工作得非常好。我们发现很多用户只关注使用GitHub Copilot进行编码，却不知道它还能做更多：我们已经用GitHub
    Copilot创建了各种脚本、流水线和甚至Splunk查询，如果你知道如何正确地提示，它工作得非常好。我们将GitHub Copilot视为一个赋能者，帮助团队有时间整理好基础。由于常规任务被加速，额外的时间可以用于改善那些经常被推到待办事项底部或至少被排除在冲刺之外的事项。
- en: We recommend teams always embed these types of technical debt and either include
    it in their way of working or specially carve out time in every sprint to improve
    it. We’ve observed that successful teams consistently dedicate around 10% of each
    sprint to addressing technical debt. By making this a regular part of their workflow,
    they ensure that improvements and refactoring are never neglected.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们建议团队始终嵌入这些类型的债务，要么将其纳入他们的工作方式，要么在每次冲刺中专门留出时间来改进它。我们观察到，成功的团队通常会持续将每个冲刺的约10%时间用于解决技术债务。通过使这成为他们工作流程的常规部分，他们确保改进和重构永远不会被忽视。
- en: 'With a good, solid foundation in place, teams can actually deliver value faster,
    with increased trust, and with fewer issues in production. Engineers then start
    to leverage AI in their processes where it makes sense, from generating new requirements
    to coding, reviewing, and testing. The engineer becomes the orchestrator in the
    middle, building on top of a sturdy DevOps foundation:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立了良好的、坚实的基础之后，团队实际上可以更快地交付价值，增加信任，并减少生产中的问题。工程师开始在他们流程中利用AI，从生成新需求到编码、审查和测试。工程师成为中间的协调者，在坚实的DevOps基础上构建：
- en: '![Figure 10.3: New role of engineering teams](img/B34107_10_3.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图10.3：工程团队的新角色](img/B34107_10_3.png)'
- en: 'Figure 10.3: New role of engineering teams'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.3：工程团队的新角色
- en: When we have a good foundation in place and we trust our process to allow us
    to go faster, we can start to think about the other things our teams do and how
    to enable other people in the team, besides just focusing on the engineers.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们建立了良好的基础并信任我们的流程可以让我们更快地工作，我们就可以开始考虑团队的其他工作以及如何让团队中的其他人，而不仅仅是工程师，得到赋能。
- en: Expanding AI to engineer-adjacent roles
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将AI扩展到工程相关角色
- en: When rolling out GitHub Copilot, people often think of just the engineers in
    the team – they are the folks creating new features by writing the code to be
    able to execute them. But with that stance, we forget all the other people in
    the team. As we said, on average, an engineer is lucky if they can focus on writing
    code for two hours a day. The rest of the time is spent on preparations, discussions,
    architectural work, documentation, and so on. Then there are always teams that
    spend most of their day in meetings, sometimes overlapping or in parallel during
    their day. Sometimes it can feel like meetings are considered more important than
    actual coding!
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在推出GitHub Copilot时，人们通常会只想到团队中的工程师——他们是那些通过编写代码来创建新功能的人，以便能够执行它们。但采取这种立场，我们会忘记团队中的其他人。正如我们所说，平均而言，一个工程师如果能每天专注于编写两小时的代码就足够幸运了。其余的时间都花在准备、讨论、架构工作、文档等等上。然后，总有团队大部分时间都在开会，有时在一天中重叠或并行进行。有时甚至感觉会议被认为比实际的编码更重要！
- en: 'This brings us to a broader shift: how the work flows to engineers. Beyond
    coding, much of their time is spent translating user needs into actionable tasks,
    clarifying requirements, and ensuring everyone on the team understands the implications
    of proposed changes. These tasks often involve collaboration with stakeholders,
    and in many cases, a product owner acts as the conduit, channelling work into
    the team. GitHub Copilot can support this flow by helping teams articulate, refine,
    and communicate these changes more effectively.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这引出了更广泛的转变：工作如何流向工程师。除了编码之外，他们的大部分时间都花在将用户需求转化为可执行任务、明确需求以及确保团队中的每个人都理解提议变更的影响上。这些任务通常涉及与利益相关者的合作，在许多情况下，产品所有者充当渠道，将工作引导到团队中。GitHub
    Copilot可以通过帮助团队更有效地阐述、完善和传达这些变更来支持这一流程。
- en: In our opinion, we now need to shift our focus from just the people writing
    code towards enabling other roles in the team, such as product owners, stakeholders,
    or users. We need to give those people options to use generative AI to send in
    better, more detailed, and thus more scoped descriptions of the features they
    want to implement. They can describe in natural language what kind of changes
    they want to be made and use AI to convert that into detailed specifications.
    The more information they can add to a user story/work item/issue, the more easily
    the engineers can implement the changes in the code.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们看来，我们现在需要将重点从仅关注编写代码的人转移到使团队中的其他角色，如产品所有者、利益相关者或用户，能够使用生成式AI发送更好的、更详细且因此更具体的功能实现描述。他们可以用自然语言描述他们想要进行的更改，并使用AI将其转换为详细规范。他们可以向用户故事/工作项/问题添加的信息越多，工程师就越容易在代码中实施变更。
- en: 'GitHub Copilot now enables product owners and engineers to explore planned
    changes and describe upcoming work directly from their browser, within the context
    of the repository they’re working in. Consider this flow:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在GitHub Copilot允许产品所有者和工程师直接从他们的浏览器中探索计划中的变更和描述即将到来的工作，在他们在工作的存储库上下文中。考虑以下流程：
- en: Start a conversation with the repository context (or issue, discussion, failing
    workflow, code scanning alert, etc.).
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从存储库上下文（或问题、讨论、失败的流程、代码扫描警报等）开始对话。
- en: Let GitHub Copilot help you define the new work. Ask questions such as `Based
    on the current code base, how do we add a new feature that does <description>?`
    .
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让GitHub Copilot帮助你定义新的工作。提出像“基于当前代码库，我们如何添加一个执行<描述>的新功能？”这样的问题。
- en: Ask follow-up questions to add more context or requirements, or find the location
    where to add new tests to validate the new feature.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提出后续问题以添加更多上下文或需求，或者找到添加新测试以验证新功能的位置。
- en: When you have enough context, ask GitHub Copilot to create the issue for you,
    right from the web browser! The chat interface knows what repo you are working
    in, and it has a pop-up window to let you create a new, detailed description of
    the work you want to implement, together with all the context and files you have
    discussed.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当你有足够的上下文时，让GitHub Copilot为你创建问题，直接从网页浏览器开始！聊天界面知道你正在工作的存储库，并且有一个弹出窗口让你创建一个新工作描述，包括所有讨论的上下文和文件。
- en: With that detailed work description, an engineer who has expertise in the application
    can review the incoming work descriptions and add the finishing touches, as they
    understand the system as a whole and the necessary requirements. When the incoming
    work has enough clarity, with a detailed explanation of what is needed and references
    to existing features in the code base, AI can be used to suggest the code adjustments
    needed to be implemented and propose the actual changes. Tools such as the Coding
    Agent, where GitHub Copilot suggests changes based on the issue, can be leveraged
    to rerun tests in the pipeline and iterate as needed. Once the tests succeed and
    the changes are validated, the system will submit a pull request for final review.
    This agentic-driven workflow is becoming more common, with GitHub integrating
    these amplifiers in key areas where they make sense.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在那详细的职责描述中，一位在应用方面有专长的工程师可以审查即将到来的工作描述并添加最后的修饰，因为他们理解整个系统和必要的需求。当即将到来的工作有足够的清晰度，包括对所需内容的详细解释和对代码库中现有功能的引用时，可以使用AI来建议需要实施代码调整，并提出实际变更。可以利用像Coding
    Agent这样的工具，GitHub Copilot根据问题建议变更，来重新运行管道中的测试并根据需要迭代。一旦测试成功并且变更得到验证，系统将提交一个拉取请求以供最终审查。这种以代理驱动的流程正在变得越来越普遍，GitHub在合理的关键领域集成了这些放大器。
- en: For more details on these agent implementations, for example, the Coding Agent,
    see [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor191) .
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 有关这些代理实现的更多详细信息，例如编码代理，请参阅[*第6章*](Chapter_6.xhtml#_idTextAnchor191)。
- en: By expanding the use of AI beyond engineers, we can enable all team members
    to contribute to the application. This way, we can shift from just a focus on
    generating new code. Instead, we focus on all aspects of the SDLC, from requirements
    engineering to producing work descriptions, writing the necessary code changes,
    reviewing the code changes, fixing pipeline failures, and even addressing issues
    found with code scanning. We can close the loop by feeding any errors in production
    back into the system as work definitions.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将AI的使用范围扩展到工程师之外，我们可以使所有团队成员都能为应用程序做出贡献。这样，我们就可以从仅仅关注生成新代码转变过来。相反，我们关注SDLC的各个方面，从需求工程到编写工作描述，编写必要的代码更改，审查代码更改，修复管道故障，甚至解决代码扫描中发现的问题。我们可以通过将生产中的任何错误反馈回系统作为工作定义来闭环。
- en: This way, we can all benefit from the use of generative AI, enabling everyone
    to leverage its features and continue focusing on what we have been doing the
    whole time – creating value for our end users.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们都可以从使用生成式AI中受益，使每个人都能利用其功能，并继续专注于我们一直在做的事情——为我们的最终用户提供价值。
- en: Now, let’s see how you can enable entire teams with AI and really make an impact
    in the entire process of creating applications.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看如何利用AI使整个团队能力提升，并在创建应用程序的整个过程中真正产生影响。
- en: AI-enhanced engineering
  id: totrans-60
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI增强型工程
- en: With the advent of all the AI being infused in our day-to-day workflows, we
    see our industry shifting towards agentic AI, where tools such as GitHub Copilot
    become an extension of people with knowledge, so that we can focus on what is
    really important. With agentic AI, we refer to the use of generative AI tools
    where we trigger them based on an event, and the tools can then run an assessment
    of the work, implement changes, run tests, and validate the result, without any
    extra supervision during that process. The end result is then posted back for
    an engineer to process and follow up if needed.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 随着所有AI技术融入我们的日常工作中，我们看到我们的行业正朝着代理式AI转变，其中像GitHub Copilot这样的工具成为知识型人员的延伸，这样我们就可以专注于真正重要的事情。在代理式AI中，我们指的是基于事件触发生成式AI工具的使用，然后这些工具可以对工作进行评估，实施更改，运行测试，并在过程中无需额外监督的情况下验证结果。最终结果随后被发布回工程师处，以便在需要时进行处理和跟进。
- en: We always say that we, as engineers, are not here to write the next `if` statement
    or `for` loop. We are not applauded when we write a brilliant piece of code. Instead,
    we get our accolades when we build something that brings value to our end users.
    How we achieve that value is less important for the users, as long as the functionality
    does what it needs to do. They do not care if we wrote our solution in C# or Typescript,
    only that it works, and that they do not have to wait too long to see the result
    of their actions.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们常说，作为工程师，我们不是来编写下一个`if`语句或`for`循环的。当我们编写出精彩的代码时，并不会得到掌声。相反，当我们构建出能为最终用户提供价值的东西时，我们才会得到赞誉。对于用户来说，我们如何实现这种价值并不那么重要，只要功能能按需工作即可。他们不关心我们是用C#还是Typescript编写的解决方案，只关心它是否工作，以及他们是否不需要等待太长时间就能看到他们行动的结果。
- en: That is the new role we see for the AI-enabled engineer – be smart and use the
    right tools for the right job, to achieve the value you want to create. That means
    we can infuse the software development process with GitHub Copilot features where
    it makes sense. Just like our peers in the industry are already embracing AI in
    their processes, so too can we leverage it to get the benefits it can bring. With
    these tools, engineering shifts from just writing new code (and all the work around
    it) to focusing on system engineering, describing the functional and technical
    requirements, and then guarding the system to stay within the requirements we
    have set with incoming changes that are requested.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们看到的人工智能赋能工程师的新角色——聪明地使用合适的工具来完成合适的工作，以实现你想要创造的价值。这意味着我们可以在软件开发过程中合理地融入GitHub
    Copilot功能。就像行业中的同行已经在他们的流程中拥抱AI一样，我们也可以利用它来获得它带来的好处。有了这些工具，工程从仅仅编写新代码（及其所有相关工作）转变为专注于系统工程，描述功能和技术需求，然后保护系统，使其在请求的更改中保持在我们设定的要求范围内。
- en: 'In the following figure, you can find the current touchpoints from GitHub Copilot
    features to our SDLC (in the future, there will surely be more opportunities to
    take this further):'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下图中，你可以找到GitHub Copilot功能到我们的SDLC（未来，肯定会有更多机会进一步发展）的当前接触点：
- en: '![Figure 10.4: Touchpoints of GitHub Copilot in the SDLC](img/B34107_10_4.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图10.4：GitHub Copilot在SDLC中的接触点](img/B34107_10_4.png)'
- en: 'Figure 10.4: Touchpoints of GitHub Copilot in the SDLC'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.4：GitHub Copilot在SDLC中的接触点
- en: 'Let’s go over these touchpoints and link them to the different features from
    GitHub Copilot:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾这些接触点，并将它们与GitHub Copilot的不同功能联系起来：
- en: '| **Stage** | **GitHub Copilot Feature** |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| **阶段** | **GitHub Copilot功能** |'
- en: '| --- | --- |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Reconnaissance | Use the chat interface (either in your editor or on GitHub.com)
    to gather context for the feature you want to work on. |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| 探索 | 使用聊天界面（无论是在你的编辑器中还是在GitHub.com上）来收集你想要工作的功能的背景信息。 |'
- en: '| Creating work | When the reconnaissance is completed and you have enough
    context, you can let GitHub Copilot create the work item for you, either by leveraging
    the GitHub MCP Server in the editor or by instructing it to create a new issue
    from the web interface. |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| 创建工作 | 当侦察完成并且你有足够的背景信息时，你可以让GitHub Copilot为你创建工作项，无论是通过在编辑器中利用GitHub MCP服务器，还是通过指示它从Web界面创建一个新的问题。
    |'
- en: '| Coding in editor | To implement the necessary changes, you can use GitHub
    Copilot in your editor with all the different options you want to, from suggestions
    while you type, to the chat interface with Ask, Edit, or Agent Mode. |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| 在编辑器中编码 | 为了实施必要的更改，你可以在你的编辑器中使用GitHub Copilot，从你键入时的建议到带有询问、编辑或代理模式的聊天界面，你可以选择所有你想要的不同选项。
    |'
- en: '| Coding Agent | Instead of making all the changes yourself, hand off the work
    to the Coding Agent and let it implement the changes for you, so that you have
    a working and tested PR ready to review. You can communicate to make changes or
    load the PR state into an editor and fine-tune from there. |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| Coding Agent | 你不必自己做出所有更改，将工作交给Coding Agent，让它为你实施更改，这样你就有了一个工作并经过测试的PR，可以准备审查。你可以通过沟通来做出更改或加载PR状态到编辑器中，并从那里进行微调。
    |'
- en: '| PR review | When a PR is created, you can get a first review from the Coding
    Agent. It can be super beneficial to have at least the low-hanging fruit in the
    review already handled so that you, as the human in the loop, spend time on the
    PR. Keep in mind that the code review does not catch every single issue, of course;
    that is still the role of standard and security testing.On the other hand, we
    have seen cases where the code reviewer found issues that we did not even think
    about! See [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor191) for more examples.
    |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| PR review | 当创建一个PR时，你可以从Coding Agent那里获得第一次审查。在审查中处理至少低垂的果实，这样你作为循环中的人类，就可以花时间在PR上，这会非常有帮助。记住，代码审查当然不能捕捉到每一个问题；这仍然是标准和安全测试的角色。另一方面，我们见过代码审查员发现的问题，我们甚至都没有想过！见[*第6章*](Chapter_6.xhtml#_idTextAnchor191)了解更多例子。
    |'
- en: '| Bug analysis | Whether the bug is happening in production or in your CI/CD
    pipeline, GitHub Copilot can jump on the error message and figure out the fix.
    You can leverage that in multiple places, from the web UI to the editor, and act
    upon it where you find it makes the most sense to you and your way of working.
    |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| Bug analysis | 无论错误发生在生产环境中还是你的CI/CD管道中，GitHub Copilot都可以跳到错误消息并找出解决方案。你可以在多个地方利用这一点，从Web
    UI到编辑器，并在你认为最合理的地方采取行动。 |'
- en: 'Figure 10.5: Touchpoints of GitHub Copilot in the SDLC'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.5：GitHub Copilot在SDLC中的接触点
- en: You can see from these touchpoints that the role of the engineer (and their
    peers) is changing from focusing on writing more code, to being more diligent
    about what to build and how to make those changes high-quality and maintainable
    in the future. We do not need to make all those changes by ourselves – instead,
    we have AI agents that can help us out to implement the changes, so we can focus
    on how we bring the most value to our end users.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从这些接触点中看出，工程师（以及他们的同行）的角色正在从专注于编写更多代码，转变为更加勤奋地考虑要构建什么，以及如何使这些更改在未来保持高质量和可维护性。我们不需要自己做出所有这些更改——相反，我们有AI代理可以帮助我们实施更改，这样我们就可以专注于如何为我们的最终用户提供最大价值。
- en: We also do not worry at all about our own roles and reasons for being an engineer
    – there will always be work for highly skilled people, and yes, we think they
    will become more of an orchestrator in the future of AI agents that can produce
    large parts of the work. Engineers will oversee the AI to make sure there is enough
    trust in the system to proceed with the next steps. The next step is to enable
    our peers to be able to use these tools as well, as it brings a lot of value for
    us all. With more people with an engineering mindset, we can go further and faster.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也不担心我们自己的角色和成为工程师的原因——对于高技能人员来说，总会有工作要做，而且，我们认为他们将在未来AI代理的生产中扮演更多的协调者角色。工程师将监督AI，确保系统有足够的信任来继续下一步。下一步是让我们的同行也能够使用这些工具，因为它为我们所有人带来了很多价值。有了更多具有工程思维的人，我们可以走得更远，更快。
- en: It is also crucial to have a good way in place to train new engineers to be
    proficient in the tools, know their limitations, and understand the impact that
    changes will have on the applications they work on. See [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor254)
    for more information on creating training opportunities and community building.
    Failing to train new engineers will lead to a lot more (downstream) issues and
    frustration by both the engineers and their stakeholders.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，拥有一种良好的方法来培训新工程师，使他们能够熟练使用工具、了解其局限性，并理解变化对他们工作的应用带来的影响，这也是至关重要的。有关创建培训机会和社区建设的更多信息，请参阅[*第8章*](Chapter_8.xhtml#_idTextAnchor254)。未能培训新工程师将导致更多（下游）问题和工程师及其利益相关者的挫败感。
- en: Embracing the new way of working will lead to a more efficient way of working,
    and ultimately to a better experience for the end users of the applications we
    build, as we described in [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor277) .
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 接受新的工作方式将导致更高效的工作方式，并最终使我们的应用程序最终用户获得更好的体验，正如我们在[*第9章*](Chapter_9.xhtml#_idTextAnchor277)中描述的那样。
- en: Summary
  id: totrans-81
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, we showed the different ways to change the narrative when
    talking about GitHub Copilot. Instead of focusing on just producing more code
    more quickly, we want to focus on the impact these new tools have on our development
    process. We discussed the ethical usage of GitHub Copilot by looking at both the
    ethical objections to blindly trusting what LLMs produce, as well as the ethical
    impact of just accepting everything and stopping to think for yourself. To really
    get the benefits from generative AI, you need to have a solid (DevOps) foundation
    in place. This will guard you against a lot of failure modes and elevate the trust
    you have in the incoming changes. We then looked at expanding the use of AI to
    everyone in the team that is not an engineer by trade: from stakeholders to product
    owners/managers, and even your end users. Finally, we looked at how AI-enhanced
    engineering teams leverage all the features of GitHub Copilot in their development
    processes.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们展示了在讨论GitHub Copilot时改变叙述的不同方式。我们不仅关注更快地产生更多代码，还希望关注这些新工具对我们开发过程的影响。我们通过审视对盲目信任LLM产生的内容的伦理反对，以及仅仅接受一切并停止独立思考的伦理影响，来讨论GitHub
    Copilot的伦理使用。要真正从生成式AI中获得好处，你需要有一个坚实的（DevOps）基础。这将帮助你避免许多失败模式，并提高你对即将到来的变化的信任度。然后，我们探讨了将AI的使用扩展到团队中非工程师职业的每个人：从利益相关者到产品所有者/经理，甚至最终用户。最后，我们探讨了AI增强的工程团队如何在他们的开发过程中利用GitHub
    Copilot的所有功能。
- en: 'With that, we have reached the end of the book: we have taken you through the
    different features of GitHub Copilot, such as (inline) suggestions, (inline) chat,
    and its different chat options, such as Ask, Edit, and Agent Mode. We started
    by taking a good look at generative AI to have a basic understanding of what it
    is and is not. After diving into the different modalities for working with GitHub
    Copilot (in the editor, in the browser, and in all the different extensions and
    options, such as the GitHub Copilot CLI), we discussed embracing the learning
    curve, as there are a lot of lessons to be internalized over time when using these
    new AI tools. Since everyone learns in their own way, we also looked at how to
    set up a community that can share lessons learned for the benefit of the entire
    community. We closed off the current chapter on changing the narrative in what
    these tools can do for you and your teammates.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 由此，我们到达了本书的结尾：我们向您介绍了GitHub Copilot的不同功能，例如（内联）建议、（内联）聊天，以及其不同的聊天选项，如询问、编辑和代理模式。我们首先深入了解了生成式AI，以便对它有一个基本的了解。在深入探讨与GitHub
    Copilot合作的不同模式（在编辑器中、在浏览器中以及在所有不同的扩展和选项中，如GitHub Copilot CLI）之后，我们讨论了接受学习曲线，因为在使用这些新的AI工具的过程中，有很多教训需要随着时间的推移内化。由于每个人学习的风格都不同，我们还探讨了如何建立一个社区，以便分享学到的经验，从而造福整个社区。我们结束了关于这些工具能为你和你的队友带来什么变化的当前章节。
- en: With the advent of AI tools and GitHub Copilot at the forefront of this revolution,
    we see a fundamental shift in the way we see our contribution as engineers. Our
    added value as engineers has never been just in the code we produce, and that
    is coming to the forefront with our use of AI. Our value is in the systems thinking
    that we have learned to do. By looking at the system as a whole, we think of the
    impact changes to the application might have, and how we can bring business value
    to our end user.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI工具的出现，GitHub Copilot作为这场革命的先锋，我们看到了我们对工程师贡献看法的根本转变。作为工程师，我们增加的价值从未仅仅在于我们生产的代码，而随着我们对AI的使用，这一点正在变得日益突出。我们的价值在于我们学习到的系统思维。通过将系统作为一个整体来看待，我们思考应用变更可能产生的影响，以及我们如何为最终用户提供商业价值。
- en: 'Implementing changes to our software or script has morphed from focusing on
    adding code changes by hand, into instead describing and documenting those changes
    together with our requirements. It is now a choice between those changes being
    implemented by a human or letting GitHub Copilot implement them for us instead.
    That decision is based on capability and cost. If we expect that GitHub Copilot
    can implement the changes, it is a cost-based decision: should we implement it
    ourselves and spend a couple of minutes on it, or will this take us more time
    and can we instead hand it off to, for example, the Coding Agent, which can spend
    a premium request and a couple of GitHub Actions minutes on the problem and fix
    it that way?'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 对我们的软件或脚本的变更实施已经从手动添加代码更改转变为描述和记录这些更改以及我们的需求。现在，这是一个选择由人类实施这些更改还是让GitHub Copilot为我们实施它们的问题。这个决定基于能力和成本。如果我们预计GitHub
    Copilot可以实施这些更改，那么这是一个基于成本的决定：我们应该自己实施并花几分钟时间，还是这将花费我们更多时间，我们可以将其转交给，例如，编码代理，它可以花费额外的请求和几分钟的GitHub
    Actions时间来解决这个问题并修复它？
- en: We now have some amazing tools in all the different places in our development
    process. These tools can be leveraged to make our work a lot easier so that we
    can find the fun in our engineering practices again. Instead of hitting keys and
    diving into the code changes, we can now explore and spend time on things that
    we have always hoped to have time for, and now we can actually create that time!
    Hand off the mundane and less interesting tasks to GitHub Copilot, so that you
    can have more pleasure focusing on the fun parts of engineering work.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们在开发过程的各个不同地方都有一些令人惊叹的工具。这些工具可以被利用来使我们的工作变得更加容易，这样我们就可以再次找到工程实践中的乐趣。我们不再需要敲击键盘并深入代码更改，现在我们可以探索并花时间在我们一直希望有时间去做的事情上，现在我们实际上可以创造这样的时间！将那些枯燥且不太有趣的任务交给GitHub
    Copilot，这样你就可以更多地专注于工程工作的有趣部分。
