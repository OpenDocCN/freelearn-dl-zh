- en: Components of RAG
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RAG的组件
- en: In *Part 2*, you will learn about key components of a RAG system and how to
    implement them using LangChain. You’ll explore interfacing with RAG using Gradio
    to create interactive user interfaces, the crucial role of vectors and vector
    stores in enhancing RAG performance, and techniques for evaluating RAG quantitatively
    and with visualizations. Additionally, you’ll dive into using LangChain components
    such as document loaders, text splitters, and output parsers to further optimize
    your RAG pipeline.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在*第二部分*，你将学习关于RAG系统关键组件以及如何使用LangChain来实现它们。你将探索使用Gradio与RAG交互以创建交互式用户界面，向量及其存储在增强RAG性能中的关键作用，以及评估RAG的定量方法和可视化技术。此外，你还将深入了解使用LangChain组件，如文档加载器、文本分割器和输出解析器，以进一步优化你的RAG管道。
