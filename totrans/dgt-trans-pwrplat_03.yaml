- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Unlocking Potential: Enhancing Operations with the Power Platform'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Power Platform, a suite of low-code/no-code tools by Microsoft, offers organizations
    the opportunity to revolutionize their operations and unlock untapped potential.
    With its user-friendly interface and intuitive design, the Power Platform empowers
    both professional developers and citizen developers to create applications, automate
    processes, and drive digital transformation without extensive coding expertise.
    This low-code/no-code approach brings numerous advantages, such as accelerated
    development cycles, increased agility, and reduced reliance on traditional software
    development methods.
  prefs: []
  type: TYPE_NORMAL
- en: One of the key roles played by citizen developers within the Power Platform
    is their ability to bridge the gap between business requirements and technical
    implementation. Citizen developers, who possess deep knowledge of business processes
    but may not have formal coding backgrounds, can leverage the Power Platform’s
    tools to rapidly build and deploy applications tailored to specific operational
    needs. This democratization of app development allows for quick iterations, frequent
    feedback loops, and greater collaboration between business users and IT teams.
  prefs: []
  type: TYPE_NORMAL
- en: Within the Power Platform, various tools are available to enhance operations
    and drive efficiency. Power Apps enable the creation of custom applications, empowering
    users to design intuitive interfaces and connect with data sources seamlessly.
    Power Automate offers a visual interface for automating repetitive tasks and streamlining
    workflows, reducing manual efforts and enabling efficient processes. Power BI
    enables organizations to visualize and analyze data, gaining valuable insights
    to drive informed decision-making. Together, these tools within the Power Platform
    empower organizations to optimize operations, improve productivity, and unlock
    their full potential in a rapidly changing digital landscape.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, the Power Platform unlocks the potential for organizations to enhance
    their operations by leveraging its low-code/no-code advantages, empowering citizen
    developers, and utilizing the range of tools available. With the ability to rapidly
    develop applications, automate processes, and gain insights from data, organizations
    can drive digital transformation and achieve operational excellence. By harnessing
    the Power Platform, businesses can transform their operations, increase agility,
    and stay ahead in an increasingly competitive marketplace.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will cover the following topics in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Reimagining operations with Power Platform
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Enabling developers: the low-code/no-code edge of Power Platform'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Connecting citizen developers: aligning business needs and tech solutions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leveraging Power Apps, Power Automate, and Power BI for operational gains
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Advancing transformation: elevating operations with Power Platform'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reimagining operations with Power Platform
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The Power Platform is a suite of tools developed by Microsoft that enables
    users to build and deploy applications, automate workflows, analyze data, and
    create copilots without writing code. The Power Platform consists of several primary
    components: Power Apps, Power Automate, Power BI, Power Pages, and Custom Copilots,
    previously known as Power Virtual agents.'
  prefs: []
  type: TYPE_NORMAL
- en: The Power platform is designed for rapid application development and is designed
    as a business productivity tool that enables makers to build solutions to business
    problems fast. Power platform can be described as set of prebuilt digital building
    bricks that snap into one another to allow makers the ability to architect and
    build software solutions so solve business problems without having much coding
    or software development experience. In the market Power Platform is referred to
    as a Low Code software development platform.
  prefs: []
  type: TYPE_NORMAL
- en: The platform is typically split into 2 layers; The “Interaction Layer” and the
    “Data and managment layer”, which then ultimately integrate to the wider Microsoft
    product stack.
  prefs: []
  type: TYPE_NORMAL
- en: The interaction layer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first layer being the interaction layer, where people will interact with
    data through some sort of user experience. The experience may or may not be directly
    visible, however it is normally initiated by a user-based action. It’s important
    to state that this is the layer that most makers will have their first interaction
    with and will essentially drive the creation of assets in the Power Platform.
  prefs: []
  type: TYPE_NORMAL
- en: The interaction layer consists of Power Apps, Power Automate, Power BI, Power
    Pages and Copilot studio, formally known as Power Virtual Agents. Some of the
    components have several sub-components which will be explored in more detail later
    in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: To drive true efficiency and to truly revolutionize the way in which the Power
    Platform is leveraged within an organization, its absolutely key to focus on the
    data and governance first. Retro fitting this later will become a difficult task.
  prefs: []
  type: TYPE_NORMAL
- en: The data and management layer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The data and management layer is the most powerful aspect of the Power Platform
    and is the part that matters the most. There can be multitudes of applications,
    automations and copilots, however, if the data and the governance isn’t managed
    correctly, these assets will never be productionised. This layer consists of several
    components which we will look into detail.
  prefs: []
  type: TYPE_NORMAL
- en: Dataverse
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Dataverse is a low-code data platform that allows users to store and manage
    data for their Power Platform solutions. Dataverse provides a secure and scalable
    cloud relational and secure data storage facility that can integrate with various
    data sources, such as SharePoint, Excel, or external systems. Dataverse also enables
    users to define business rules, logic, and workflows for their data, as well as
    to create rich data models with relationships, validations, and metadata. Dataverse
    is important because it simplifies the data management process and ensures data
    quality, consistency, and compliance across the Power Platform. A person with
    a basic knowledge of data modeling can design sophisticated data structures with
    relative ease.
  prefs: []
  type: TYPE_NORMAL
- en: Managed environments
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Managed environments are containers that host the Power Platform resources,
    such as apps, flows, connectors, and data, for a specific solution or project.
    Managed environments allow users to control the security, access, and deployment
    of their Power Platform solutions, as well as to monitor and manage their performance
    and usage. Managed environments are important because they enable users to create
    and test their solutions in isolation, without affecting other environments or
    users. They also provide users with the flexibility to choose the type and size
    of environment that best suits their needs, from trial environments for experimentation
    to production environments for live deployment. Managed environments help users
    to ensure the quality, reliability, and governance of their Power Platform solutions.
  prefs: []
  type: TYPE_NORMAL
- en: AI Builder
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'AI Builder is a feature of the Power Platform that allows users to create and
    use artificial intelligence models without writing any code. AI Builder enables
    users to automate processes, analyze data, extract insights, and enhance their
    Power Platform solutions with the power of AI. Users can choose from a range of
    pre-built AI models, such as sentiment analysis, object detection, and form processing,
    or build their own custom models using a guided, no-code interface. AI Builder
    integrates seamlessly with other Power Platform components, such as Power Apps,
    Power Automate, and Power BI, allowing users to easily add AI capabilities to
    their apps, flows, and reports. AI Builder is a powerful tool for democratizing
    AI and empowering users to solve complex problems with ease. *Figure 3**.1* shows
    the prebuilt AI builder models available:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.1: AI Builder options](img/B21080_03_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.1: AI Builder options'
  prefs: []
  type: TYPE_NORMAL
- en: Connectors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Connectors are a key feature of the Power Platform that allow users to connect
    their solutions to various data sources and services, both within and outside
    the Microsoft ecosystem. Connectors enable users to access and manipulate data,
    trigger actions, and automate workflows across different applications and platforms.
    For example, users can use connectors to send an email from Outlook, create a
    record in Salesforce, or analyze data in Power BI, all from within their Power
    Platform solution. Connectors provide users with a wide range of possibilities
    and functionalities, without requiring them to write any code or deal with complex
    integration issues. Connectors are essential for creating powerful and flexible
    solutions that can leverage the best of what the cloud has to offer. Connectors
    are THE MOST important part of the platform as they super charge all power platform
    assets with the data, they need to be useable.
  prefs: []
  type: TYPE_NORMAL
- en: Power FX
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power FX is the low-code programming language of the Power Platform that allows
    users to create formulas and expressions to define the logic and behavior of their
    solutions. Power FX is based on Microsoft Excel, which makes it familiar and easy
    to use for millions of users around the world. Power FX is also an open-source
    language that can be extended and customized by developers and community members.
    Power FX is important in the Power Platform ecosystem because it enables users
    to build solutions that are dynamic, interactive, and responsive, without requiring
    them to write complex code or learn a new syntax. Power FX is the common language
    that connects the various components of the Power Platform, such as Power Apps,
    Power Automate, Copilot Studio and Power BI, and allows users to create seamless
    and integrated experiences across them. Power FX is the language of the citizen
    developer, as well as the professional developer, who can use it to accelerate
    and enhance their development process. Power FX is the key to unlocking the power
    of the Power Platform and creating solutions that can solve real-world problems
    and challenges.
  prefs: []
  type: TYPE_NORMAL
- en: Power Platform has deep roots into Microsoft Products
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Figure 3**.2* shows us a consolidated view of the Power Platform and how it
    has deep roots in the Microsoft Azure Platform. The fact of the matter is, if
    you are using any Microsoft products, there is a strong chance that you are already
    using Microsoft Power Platform in some way, within your organization.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.2:  Breakdown of the various Power Platform components](img/B21080_03_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.2: Breakdown of the various Power Platform components'
  prefs: []
  type: TYPE_NORMAL
- en: By using the Power Platform, users can leverage the power of Microsoft’s cloud
    services, such as Azure, Dynamics 365, and Office 365, to create innovative and
    scalable solutions that can transform their operations and unlock their potential.
    The Power Platform also empowers users of all types within an organization, from
    developers to business users, to collaborate and innovate without relying on IT
    or external vendors. The Power Platform is a game-changer for driving digital
    transformation and achieving operational excellence.
  prefs: []
  type: TYPE_NORMAL
- en: How has Power Platform revolutionized operations?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the ways that the Power Platform has revolutionized operations within
    organizations is by enabling people of all types, from developers to business
    users, to create and use applications, workflows, reports, and Copilots (chatbots)
    that suit their needs and goals. The components in the platform allow users to
    build and deploy solutions using scalable methods, from high code to no code at
    all, meaning that they can use High code interfaces like Visual Studio, graphical
    interfaces, drag-and-drop features, pre-built templates, and connectors to access
    various data sources and services which suite their preferred method of creating
    solutions.
  prefs: []
  type: TYPE_NORMAL
- en: 'By using low-code or no-code tools, users can benefit from several advantages,
    such as:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Faster development and deployment: Users can create and launch solutions in
    a matter of hours or days, instead of weeks or months, saving time and resources.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reduced dependency on IT or vendors: Users can solve their own problems and
    challenges without waiting for IT support or external help, increasing their autonomy
    and agility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Enhanced innovation and creativity: Users can experiment with different ideas
    and features, test and iterate quickly, and customize their solutions to fit their
    specific needs and preferences, fostering a culture of innovation and creativity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Improved collaboration and communication: Users can share and co-create solutions
    with other users across the organization, as well as with external partners and
    customers, enhancing collaboration and communication.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Empowering makers of all types: the barrier to entry of using digital tools
    to solve business problems has significantly dropped and this means that people
    of multimple technical literacy levels can create solutions. While the Power Platform
    is designed to be accessible and user-friendly for non-technical users, it also
    offers many benefits and opportunities for developers who want to leverage its
    capabilities and extend its functionality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Developers can use the Power Platform to:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Accelerate and simplify development: Developers can use the low-code or no-code
    tools of the Power Platform to build the core functionality and user interface
    of their solutions, and then use code to add custom logic, integrations, or advanced
    features. This way, they can reduce the amount of code they need to write and
    maintain and focus on the most complex and valuable aspects of their solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Enhance and optimize performance: Developers can use the Power Platform to
    monitor and analyze the performance, usage, and quality of their solutions, and
    identify and resolve any issues or bottlenecks. They can also use the Power Platform
    to optimize their solutions for different devices, platforms, and environments,
    and ensure they meet the security and compliance standards of their organization
    and industry.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Expand and scale up their solutions: Developers can use the Power Platform
    to connect their solutions to various data sources and services, both within and
    outside of Microsoft’s cloud ecosystem, such as Azure, Dynamics 365, Office 365,
    SharePoint, SQL Server, and more. They can also use the Power Platform to leverage
    the power of artificial intelligence, machine learning, and natural language processing
    to add intelligence and automation to their solutions. Moreover, they can use
    the Power Platform to distribute and share their solutions with other users and
    organizations, and scale them up as needed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are many more versions of these points mentioned. It’s important to remember
    that every organization will find its methods to improve the way they do things
    and achieve results. The key here is to be open to changing the ways that people
    work and be ready to adopt a different approach to problem solving. The more people
    who can solve problems in a safe space, the more problems will be solved and the
    more likely the organization is to be successful and enabled digitally.
  prefs: []
  type: TYPE_NORMAL
- en: 'Enabling developers: the low-code/no-code edge of Power Platform'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Developers have existed in digital ecosystems for many years and under many
    titles and roles. Software Engineer, Professional Developer or “pro-dev”, Coder,
    Full Stack Developer, Front End Developer, Back End Developer, Software Development
    Engineer. Ultimately, the concept of development is synonymous with the concepts
    of being a creator or a maker.
  prefs: []
  type: TYPE_NORMAL
- en: The typical role of a developer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Typically, developers are the people who CREATE most of the parts of a digital
    solution that solves a problem. The concept of “*Please make me an app for…*”
    is VERY common in all organizations and a lot of the time is performed by developers.
    It’s extremely prolific in larger organizations to have teams of developers working
    off a backlog of requirements shared by the business and then building to those
    requirements. The stream of “Things” is normally never ending. If business challenges
    exist in organizations, developers will be needed to solve those problems using
    technology.
  prefs: []
  type: TYPE_NORMAL
- en: Developers are often the ones who maintain and improve the software solutions
    that power organizations and enable them to achieve their goals. They have the
    skills and expertise to write code, use various technologies and frameworks, and
    follow best practices and standards.
  prefs: []
  type: TYPE_NORMAL
- en: However, developers also face many challenges and constraints in their work,
    such as limited resources, tight deadlines, complex requirements, changing needs,
    security risks, and technical debt. Moreover, they may not always have access
    to the data and systems they need, or they may have to rely on third-party services
    and APIs that are not fully compatible or reliable. As time has progressed, it
    has become more and more difficult for developers to create solutions rapidly
    as the ever-changing ecosystem constantly presents newer and more complex challenges.
    This is because the way in which we perceive and realize business problems and
    challenges has changed and become more advanced.
  prefs: []
  type: TYPE_NORMAL
- en: How Power Platform can help enable developers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Power Platform can help developers overcome MANY challenges and enhance
    their productivity and creativity. Developer may not necessarily be the person
    creating the app or the automation, but they could be the person building the
    custom components or integrations required by these assets. Developers can also
    leverage the existing data and services in the Microsoft ecosystem, such as Azure,
    Office 365, Dynamics 365, and SharePoint, and integrate them with other sources
    and platforms. Furthermore, they can customize and extend the functionality of
    the Power Platform using pro-code tools and languages, such as Visual Studio,
    C#, JavaScript, and Power Fx. They can also use the platform’s governance and
    administration features to ensure security, compliance, and performance of their
    solutions. These developers may leave the front-end app user experience or simple
    flow processes to other people within the organization.
  prefs: []
  type: TYPE_NORMAL
- en: The Power Platform enables developers to deliver value faster and more efficiently,
    while also allowing them to innovate and experiment with new ideas and solutions.
    It empowers them to solve problems at scale, collaborate with other makers and
    users, and provide better experiences and outcomes for their customers and stakeholders.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, developers in the typical “Code Writing” sense, can spend less time
    on the parts of the solution they deem less complex, or even outsource these to
    other makers within the organization, and they can focus on the parts they are
    more comfortable with and are more complex.
  prefs: []
  type: TYPE_NORMAL
- en: Drive Time to Value at pace
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Fail fast! Maybe not the words everyone is expecting to hear, but ultimately
    the concept is true for many scenarios when needing to come to an outcome for
    a solution.
  prefs: []
  type: TYPE_NORMAL
- en: One of the advantages of using the Power Platform is that it enables developers
    to deliver solutions faster and more efficiently than traditional methods. By
    leveraging the low-code or no-code capabilities of the platform, developers can
    build apps, workflows, chatbots, dashboards, and other components without writing
    much code or relying on complex infrastructure. This allows developers to focus
    on building the solution out at a rapid pace, or even as a working prototype and
    then bolt on the pieces they need as they go. Essentially, it’s as if the development
    team were clipping a set of digital building bricks together to generate a working
    solution. This type of approach is extremely common in the realms of Power Platform
    and Low Code.
  prefs: []
  type: TYPE_NORMAL
- en: The Power Platform also supports a collaborative and iterative approach to solution
    development, where developers can work with other makers, such as business analysts,
    domain experts, or end users, to co-create and validate solutions. The platform
    provides tools for testing, debugging, deploying, and monitoring solutions across
    different environments and devices, ensuring quality and performance. This is
    a great way to drive the concept of Fusion Team development with help from people
    who are closest to understanding the problem.
  prefs: []
  type: TYPE_NORMAL
- en: By using the Power Platform, developers can provide time to value at a rapid
    pace, delivering solutions that meet the needs and expectations of their customers
    and stakeholders. The platform empowers developers to innovate and solve problems
    with agility and flexibility, while reducing costs and risks.
  prefs: []
  type: TYPE_NORMAL
- en: Using the rest of the stack
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power Platform is one of the rare platforms that branches through MANY of the
    Microsoft tools in the ecosystem. If you are using Dynamics 365, Office 365 or
    Azure tools, you will encounter the Power Platform in some way, shape or form.
    This is great for makers of all types but even more fundamentally important for
    people who consider themselves developers who work with complex cloud products
    and write code.
  prefs: []
  type: TYPE_NORMAL
- en: When looking at the cross-stack integrations and interfaces that are available
    within Power Platform, we soon realize that the platform was designed to be a
    tool used for extending other solutions BUT ALSO, to be extended with the complex
    Microsoft platforms that it is built directly on top of.
  prefs: []
  type: TYPE_NORMAL
- en: One of the key advantages of Power Platform is its ability to leverage the power
    of Microsoft Azure, the cloud computing platform that provides a wide range of
    services and capabilities for building, deploying, and managing applications.
    Azure offers many tools that can enhance and extend the functionality of Power
    Platform, such as Azure Functions and Logic Apps.
  prefs: []
  type: TYPE_NORMAL
- en: Azure Functions are serverless computer services that allow developers to run
    code on demand without having to provision or manage servers. Azure Functions
    can be triggered by various events, such as HTTP requests, timers, queues, or
    messages. Azure Functions can be used to perform custom logic, integrate with
    other systems, or manipulate data in response to Power Platform events. For example,
    an Azure Function can be triggered by a Power App button click, a Power Automate
    flow, or a Power BI report refresh, and execute some code that performs a complex
    calculation, calls an external API, or sends an email notification.
  prefs: []
  type: TYPE_NORMAL
- en: Logic Apps are another serverless service that enables developers to create
    workflows that orchestrate and automate business processes and tasks across multiple
    systems and services. Logic Apps provide a graphical designer that allows users
    to drag and drop connectors and actions to build their workflows. Logic Apps can
    also be triggered by various events, such as HTTP requests, schedules, or messages.
    Logic Apps can be used to connect Power Platform with hundreds of other services,
    such as Office 365, Salesforce, X (formerly Twitter), or Dropbox. For example,
    a Logic App can be triggered by a Power Automate flow, a Power App form submission,
    or a Custom Copilot chatbot conversation, and perform actions such as creating
    a document, updating a record, or posting a tweet.
  prefs: []
  type: TYPE_NORMAL
- en: By using Azure Functions and Logic Apps, Power Platform developers can extend
    the functionality of their solutions and integrate them with other systems and
    services. Azure Functions and Logic Apps can also help developers overcome some
    of the limitations of Power Platform, such as the delegation limits, the connector
    limits, or the licensing costs. Additionally, Azure Functions and Logic Apps can
    enable developers to reuse existing code and workflows or create reusable components
    that can be shared across multiple Power Platform solutions. Azure Functions and
    Logic Apps can also benefit from the security, scalability, and reliability of
    the Azure platform, as well as the monitoring and debugging tools that Azure provides.
  prefs: []
  type: TYPE_NORMAL
- en: There are many more tools that can be used to extend the way in which Power
    Platform can augment solutions or build custom solutions from the ground up. The
    preceding examples are a small flavor of what can be done.
  prefs: []
  type: TYPE_NORMAL
- en: Developers play a crucial role in digital ecosystems, creating and maintaining
    software solutions to solve problems. However, they face challenges such as limited
    resources, tight deadlines, and evolving business needs. The Power Platform offers
    solutions to these challenges by empowering developers to enhance productivity
    and creativity. It provides low-code or no-code capabilities for building apps
    and workflows and integrates with Microsoft Azure to expand its capabilities.
    This allows developers to deliver solutions faster, innovate with agility, and
    provide better experiences for customers and stakeholders. In the next section
    we will look at how citizen developers work within the wider Power Platform and
    maker community to build solutions to solve business problems.
  prefs: []
  type: TYPE_NORMAL
- en: 'Connecting citizen developers: aligning business needs and tech solutions'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'One of the key benefits of the Power Platform is that it enables a new category
    of makers: citizen developers. Citizen developers are non-professional developers
    who can create apps and workflows without writing code, or with minimal coding.
    They are often business users or domain experts who understand the problems and
    needs of their organization and can leverage the Power Platform to create solutions
    that address them. Citizen developers can also work collaboratively with professional
    developers, who can provide guidance, support, and governance for their projects.
    By empowering citizen developers, the Power Platform can bridge the gap between
    business requirements and technical implementation and accelerate digital transformation.'
  prefs: []
  type: TYPE_NORMAL
- en: Talk about the different types of makers – Maker archetypes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We often talk about Citizen Developers but there are MANY more types of “Developers”
    or “Makers” that will leverage the Power Platform in an organization. A maker
    is someone who uses the Power Platform to build solutions and not all makers can
    be classified as the same. A person who deeply understands the way custom code
    works cannot be interacted with in the same way as a person who is still learning
    about technology and can make a 3-screen canvas app. These people need to be given
    their own rules and interaction journeys to grow and build useful solutions, hence
    the concept of “Maker Archetypes.
  prefs: []
  type: TYPE_NORMAL
- en: The maker archetypes will typically dictate the maker pathway and the tools
    that people will be enabled to use to create solutions to problems. It’s important
    to ensure that people at the correct levels have access to the tools that match
    their skillset. As an example, we probably would not give makers who are early
    on in their journey access to Visual Studio Code however, we would want new makers
    to access Canvas apps and Power Automate.
  prefs: []
  type: TYPE_NORMAL
- en: 'Essentially, the easiest way to classify makers is by setting up a set of criteria
    that define what a maker is and what they need to do to get to the next level.
    This may be that they pass certain exams, like the PL-900 or the PL-200 for Power
    platform, or that they have produced a certain number of usable solutions. Typical
    maker archetypes may include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Beginner Makers: Typically, at the start of the journey and need to learn how
    to build solutions with Power Platform.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Intermediate Makers: Relatively technical with know-how in base elements of
    the platform. Can solve problems with Low code and could be self-sufficient. These
    makers are known as Citizen Developers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Advanced Makers: Proficient in most of the components in the Power Platform
    and can build relatively complicated solutions to solve business problems. These
    makers are not part of the IT team but have very high technical skills. They are
    known as Business Technologists.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Professional Developers: Employed as developers as part of the IT team in a
    business. Can write code and leverage all areas of the Power platform. These people
    are known as “ProDevs”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Barrier to entry
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the main benefits of the Power Platform is that it lowers the barrier
    to entry for people who want to create solutions for their business needs. The
    tools in the Power Platform are designed to be used by different types of makers,
    from citizen developers to professional developers, depending on their skill level
    and requirements. The Power Platform enables makers to build applications, automate
    processes, analyze data, and create chatbots without writing code or relying on
    IT. This empowers the people closest to the problem to solve it themselves, using
    their domain knowledge and creativity.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Power Platform also provides a copilot feature that guides the makers through
    the steps of creating a solution and provides tips and best practices along the
    way. Copilot is gaining more and more traction within the Power Platform toolset
    and allowing people to use natural language prompts to develop solutions really
    makes it extremely easy to create solutions. By lowering the barrier to entry,
    the Power Platform democratizes innovation and helps businesses achieve their
    goals faster and more efficiently. *Figure 3**.3* shows copilot embedded directly
    within canvas apps:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.3: Copilot enabled within Canvas apps](img/B21080_03_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.3: Copilot enabled within Canvas apps'
  prefs: []
  type: TYPE_NORMAL
- en: People closest to the problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The individuals who are closest to the problem are the ones who truly understand
    its intricacies and impact. They are the end users, customers, or business stakeholders
    who are deeply invested in finding a solution that effectively addresses their
    needs. Their firsthand experience provides them with an in-depth understanding
    of the causes and consequences of the problem, making them uniquely positioned
    to spearhead the development of a suitable solution.
  prefs: []
  type: TYPE_NORMAL
- en: When leveraging the Power Platform, these individuals can transform into solution
    creators. With the intuitive and user-friendly tools provided by the Power Platform,
    such as Power Apps, Power Automate, and Power BI, they can develop and deploy
    applications, workflows, dashboards, and chatbots tailored to their specific challenges
    and requirements. These tools enable them to design, build, test, and deploy solutions
    without the need for extensive coding knowledge, putting the power of solution
    creation directly into their hands. Furthermore, they can collaborate with other
    makers, including citizen developers, professional developers, or IT professionals,
    to exchange expertise and feedback. This collaboration enhances the quality and
    functionality of the solution, drawing on the diverse perspectives and skills
    of different stakeholders.
  prefs: []
  type: TYPE_NORMAL
- en: By empowering those closest to the problem to take charge of the solution, the
    Power Platform enables them to create customized and efficient solutions more
    quickly and effectively than traditional development methods. This approach not
    only results in solutions that are tailored to their specific needs and expectations
    but also fosters a sense of ownership and empowerment among the solution creators.
  prefs: []
  type: TYPE_NORMAL
- en: Achieving goals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Achieving success with the Power Platform can be done rapidly! It’s important
    to remember the Fail Fast approach when building solutions. Another concept is
    that not everything needs to be perfect. Often when building a solution, the scope
    will grow, and your creation will need to have things added to it and may be larger
    than anticipated. That’s okay, if correct tools are used for the desired outcome.
    Think a bit about an excel document, where you add new rows, new data and even
    build pivot tables on the fly. Building Power Platform solutions has a similar
    approach, and it is perfectly okay to change things as needed, if the documentation
    and the plan supports the change.
  prefs: []
  type: TYPE_NORMAL
- en: Building things in Power Platform is best done as a team sport. Many different
    people with different skills can work on a Power Platform solution and complete
    a build while working together. In fact, even people who don’t focus on technology
    can contribute as part of a project. This makes it increasingly more likely for
    a solution to be produced as the people closest to the problem can have actual
    hands-on time in building the outcome.
  prefs: []
  type: TYPE_NORMAL
- en: Solutions also come in all shapes and sizes. Not everything is complex and permanent.
    Sometimes much smaller solutions are generated with the Power platform, and they
    are generated rapidly, making it extremely easy to achieve an outcome. A lot of
    these smaller solutions do not even require any sort of **Application Lifecycle
    Management** (**ALM**) and can be left where they are created and can be managed
    and supported by their maker communities.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, the goal here is to build something useful as fast as possible and
    the Power Platform really allows makers of all types to achieve this.
  prefs: []
  type: TYPE_NORMAL
- en: Developers play a crucial role in digital ecosystems, creating and maintaining
    software solutions to solve problems. The Power Platform aims to assist developers
    in overcoming challenges by enhancing their productivity and creativity. Additionally,
    it enables a new category of makers known as citizen developers, who can create
    apps and workflows without writing code or with minimal coding. The platform lowers
    the barrier to entry for these makers, empowering them to solve business problems
    using their domain knowledge and creativity. Ultimately, the goal is to build
    useful solutions as quickly as possible, and the Power Platform facilitates this
    for makers of all types. In the next section, we will talk about how to drive
    operational enhancements with the tools in the Power Platform.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging Power Apps, Power Automate, and Power BI for operational gains
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we explore the various components within the Power Platform, we need to dive
    deeper into the interaction layer and lift the veil on what is available for people
    to create solutions with. Each tool integrates with the other tools in varying
    ways, which makes the Power Platform increasingly highly adopted with various
    maker archetypes widely across organizations.
  prefs: []
  type: TYPE_NORMAL
- en: Power Apps overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power Apps is a low-code/no-code platform that allows users to create custom
    apps for web and mobile devices using pre-built templates, drag-and-drop features,
    and a user-friendly interface. Users can connect their apps to various data sources,
    such as Dataverse, Dynamics 365, SharePoint, Excel, or Salesforce, and use AI
    Builder to add artificial intelligence capabilities to their apps.
  prefs: []
  type: TYPE_NORMAL
- en: 'Power Apps are broken up into two types of applications, these are:'
  prefs: []
  type: TYPE_NORMAL
- en: Canvas apps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Canvas apps are a type of Power Apps that allow users to create custom user
    interfaces from scratch or by using pre-built components, such as buttons, galleries,
    forms, or charts. Users can design the layout and appearance of their apps by
    dragging and dropping elements on a canvas and add logic and interactivity by
    using formulas and expressions like Excel. Canvas apps are meant for scenarios
    where users need full control over the app design and functionality and want to
    create personalized and engaging experiences for their target audience. Canvas
    apps can run on web browsers, mobile devices, or desktops, and can access device
    capabilities, such as camera, microphone, or location.
  prefs: []
  type: TYPE_NORMAL
- en: Model-Driven apps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Model-driven apps are another type of Power Apps that allow users to create
    data-driven applications that follow a predefined model and structure. Users can
    define the data sources, entities, relationships, forms, views, and business logic
    of their apps by using tools such as Power Apps Studio or the Dataverse. Model-driven
    apps are meant for scenarios where users need to work with large amounts of data
    and complex processes and want to create consistent and standardized experiences
    across devices. Model-driven apps can run on web browsers, mobile devices, or
    desktops, and can leverage the capabilities of the Power Platform, such as Power
    Automate, Power BI, or Copilot Studio. Dynamics 365 Customer Engagement or **Customer
    Relationship Management** (**CRM**) first party applications are extremely complex,
    business process focused Model-Driven apps. *Figure 3**.4* shows a relatively
    simple model-driven app that has been built to manage claims. This was designed
    and written by an intermediate maker and a claims agent as the subject matter
    expert.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.4: A Power BI report embedded within a Model-Driven app](img/B21080_03_004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.4: A Power BI report embedded within a Model-Driven app'
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Power Automate is a tool that helps users automate repetitive and time-consuming
    tasks across different applications and services. Users can create workflows,
    or flows, that trigger actions based on certain conditions, events, or schedules.
    For example, a user can create a flow that sends an email notification when a
    new file is added to a Dropbox folder, or a flow that posts a message to a Teams
    channel when a new tweet is published with a specific hashtag. Power Automate
    is a bit like the wind, it operates all around us without us necessarily seeing
    it operating. You may not physically see Power Automate running, but you may see
    the results of Power Automate. There are two types of automation that can be built
    within the Power Automate framework. These are:'
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate Cloud Flows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Automate Cloud Flows are workflows that run on the cloud and can connect
    to different online services, such as Office 365, SharePoint, Dynamics 365, X
    (formerly Twitter), Dropbox, and more. Users can create cloud flows from scratch,
    using a graphical interface or a code-based editor, or choose from hundreds of
    templates available in the Power Automate gallery. Cloud flows can be triggered
    manually, by a schedule, by an event, or by a button. Cloud flows can perform
    various actions, such as sending emails, creating tasks, updating records, posting
    messages, and more. Cloud flows are useful for automating common business processes,
    streamlining workflows, and enhancing productivity. *Figure 3**.5* shows the Power
    Automate user experience where flows can be built.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.5: Power Automate user interface](img/B21080_03_005.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.5: Power Automate user interface'
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate Robotic Process Automation (RPA)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Automate Robotic Process Automation (RPA) is a tool that allows users
    to automate repetitive and manual tasks that involve interacting with legacy systems,
    desktop applications, or web browsers. Users can record their actions using a
    desktop recorder, or create scripts using a code-based editor, and then run them
    as UI flows. UI flows can be integrated with cloud flows to create end-to-end
    automation solutions that span across different environments and platforms. RPA
    is useful for improving efficiency, accuracy, and compliance in various business
    scenarios, such as data entry, form filling, invoice processing, or report generation.
  prefs: []
  type: TYPE_NORMAL
- en: Power BI overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power BI is a versatile and robust business intelligence platform designed to
    empower users to seamlessly connect, visualize, and analyze data from a wide array
    of sources, including but not limited to Excel, SQL Server, and Azure. Through
    its user-friendly interface, individuals can harness the power of data to craft
    interactive reports and dynamic dashboards that not only present key insights
    and trends but also facilitate sharing within their organization or online. Furthermore,
    Power BI equips users with the capability to construct intricate data models,
    conduct advanced analytics, and seamlessly embed visualizations into other applications,
    thereby enhancing the overall accessibility and utility of the platform.
  prefs: []
  type: TYPE_NORMAL
- en: An important point to make with regards to Power Bi is that Power BI does NOT
    use the same connectors as the rest of the Power Platform and does not obey the
    same set of rules. It FUNCTIONALLY integrates with the wider platform but the
    way it interacts with data is slightly different. *Figure 3**.6* shows a Power
    BI report with copilot stats.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.6: Copilot Report in power BI](img/B21080_03_006.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.6: Copilot Report in power BI'
  prefs: []
  type: TYPE_NORMAL
- en: Copilot Studio
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Copilot Studio, previously known as Power Virtual Agents, is a tool that allows
    users to create custom natural language experiences (chatbots, now known as copilots)
    that can interact with customers, employees, or partners through natural language.
    Users can design conversations, or topics, that guide the chatbot to answer questions,
    provide information, or perform actions. Users can also integrate their chatbots
    with other services, such as Power Automate, to enable more complex scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a user can create a chatbot that can book a flight, check the weather,
    or send an email confirmation. *Figure 3**.7* shows Power Virtual Agents user
    experience rebranded to Copilot Studio.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.7: Copilot studio](img/B21080_03_007.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.7: Copilot studio'
  prefs: []
  type: TYPE_NORMAL
- en: Power Pages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power Pages allows Makers to create and publish web pages with dynamic content
    and interactive elements. Power Pages leverage the power of Microsoft Dataverse,
    the common data service that stores and manages data across the Power Platform.
    Users can use Power Pages to create websites, blogs, landing pages, newsletters,
    and more, without coding or hosting. With Power Pages, users can easily create
    and share web content that drives business outcomes and digital transformation.
    *Figure 3**.8* shows the Power Pages build experience.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.8: Power Pages build Experience](img/B21080_03_008.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.8: Power Pages build Experience'
  prefs: []
  type: TYPE_NORMAL
- en: 'Advancing transformation: elevating operations with Power Platform'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Achieving operational excellence with the power platform requires that the organization
    does not only focus on the tools in the platform but includes the people and the
    processes as well. This approach of People, Platform and Process is vitally important
    as ultimately, it will be the people who drive the success.
  prefs: []
  type: TYPE_NORMAL
- en: Talk about the era of enablement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Society is currently in a phase called the “*Era of Enablement*”, where organizations
    no longer need to hire costly partners and contractors to build their solutions,
    they can do this themselves. This is not to say that CAN’T use contractors and
    partners. Some organizations just don’t have the capacity at hand and in their
    own teams to build solutions. The point is, The Power Platform provides tools
    that are easily adopted by makers of all types and therefore people within the
    organization can simply build their own solutions. It’s similar to when Microsoft
    Office was released. We used to pay people to make us spreadsheets, and now we
    simply do it ourselves as we have digitally evolved.
  prefs: []
  type: TYPE_NORMAL
- en: Essentially the era of enablement is a period where vendors such as Microsoft
    are driving people to be self sufficient and are releasing platforms that allow
    us to do this. It’s a wonderful time to be in technology as we can see people
    within companies driving operational excellence leveraging these very platforms.
  prefs: []
  type: TYPE_NORMAL
- en: This very approach does come with some flaws or risks and ultimately, there
    needs to be a cultural shift in the way organizations view technology and how
    it is used.
  prefs: []
  type: TYPE_NORMAL
- en: Allowing people to optimize the way they work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The biggest cultural shift we have had to face in organizations is persuading
    IT departments to allow people to build solutions to their problems themselves!
    Typically, IT departments have been stringent and locked down their ecosystems
    in fear of data leaks and breaches form malevolent agents, which is the right
    thing to do, however, it is possible in Power Platform to secure the ecosystem
    AND allow people the freedom to build the things they need to.
  prefs: []
  type: TYPE_NORMAL
- en: Think ABOUT Microsoft Office. People across the world use the Office stack to
    create all sorts of things and many organizations do not stop or block this as
    Office is what drives productivity. Why should this be any different with power
    Platform? People store huge amounts of data in Excel and most organizations have
    no idea what’s out there, at least with Power Platform, there are ways to get
    visibility across the ecosystem and into the assets that have been created.
  prefs: []
  type: TYPE_NORMAL
- en: It’s about treading a fine line between allowing people to be creative and stifling
    creativity. More mature organizations understand this and allow people the ability
    to create things, but ALSO respect their data and drive people to leverage the
    correct data storage facilities for their data all while managing the connectors
    people have access to by leveraging the Power Platform data policies. Its important
    people feel empowered to build, but also feel safe.
  prefs: []
  type: TYPE_NORMAL
- en: Driving operational excellence by enabling people to do more with their time
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The concept of leveraging technology to drive efficiency and be more productive
    is not new. In fact, you could say that that is one of the core goals of technology.
    In this day and age, people are constantly looking for smarter ways of doing things
    and in fact we have gotten so focused on efficiency, we even have tools such as
    Microsoft 365 Copilot, which can write our emails for us.
  prefs: []
  type: TYPE_NORMAL
- en: People in all roles and in all circumstances have parts of their jobs that are
    manual or are cumbersome. The more we advance as society, the less manual tasks
    we want to do, so we will ALWAYS search for ways to work smarter. One day in the
    future, the automations and apps we perceive to be time saving right now, will
    be considered archaic and “Old News”. Right now, many organizations are trying
    to remove the proliferation of micro databases and spreadsheets from their organizations
    and centralize data. At the time, these tools were considered hugely innovative.
    We simply have moved on.
  prefs: []
  type: TYPE_NORMAL
- en: Currently, the tools in the Power Platform provide amazing functionality to
    allow people to automate and digitize their tasks, processes and even some interactions.
    Manual data capture, file movements, swivel chair integrations and many more scenarios
    are considered mundane, manual tasks that can be digitized and automated by leveraging
    tools such as the Power Platform. The more time we can give back to people to
    do things that matter, the better, even if it’s 1 minute at a time. Ultimately,
    this drives efficiency gains and increases productivity, IF that is the goal of
    course.
  prefs: []
  type: TYPE_NORMAL
- en: Governance is key when managing these operations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Optimizing an entire ecosystem is a great idea and can absolutely be achieved.
    However, with great power comes great responsibility. Governance is an absolute
    need. Governance will protect your ecosystem (people, processes and platforms)
    from harm or misuse. Essentially, governance provides the rules for “how we do
    things here”. We don’t always call it “Governance” as the best governance is applied
    when people do not know they are being governed. The idea is to create a safe
    and reliable space for people to be productive and build amazing things without
    putting your ecosystem into any sort of detriment in any way.
  prefs: []
  type: TYPE_NORMAL
- en: The Power Platform contains several tools that allow us to govern the way people
    are using the tools. This includes functions such as Tenant Isolation, Data Policies,
    Monitoring, Data Auditing and MUCH more. As administrators, there are multiple
    options in the administration console that help ensure that your ecosystem is
    protected.
  prefs: []
  type: TYPE_NORMAL
- en: There are also add on options such as the Center of Excellence Starter Kit,
    which allows administrators to get a more granular view of what is being built
    within the Power Platform and what makers and users are doing. Ultimately, the
    visibility in the world of an administrator is extremely important and the Power
    Platform governance tools provide this.
  prefs: []
  type: TYPE_NORMAL
- en: The Power Platform enables operational excellence by focusing on people, platform,
    and processes. It aligns with the “Era of Enablement,” where organizations can
    build their solutions without relying on external partners. This shift requires
    a cultural change, allowing individuals to optimize their work and drive efficiency.
    However, governance is crucial to protect the ecosystem from misuse. The Power
    Platform offers tools for monitoring, data policies, and auditing to ensure responsible
    and productive usage.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you have learned about the Power Platform, a suite of low-code/no-code
    tools that allow users to build custom applications, workflows, chatbots, and
    dashboards without writing complex code. You have seen how the Power Platform
    can help you achieve operational excellence by enabling you to solve business
    problems, improve efficiency, and enhance customer satisfaction. You have also
    learned about the importance of governance and the tools available to monitor,
    manage, and secure the Power Platform environment. You have learned how to use
    the Power Platform Admin Center, the Power Platform Center of Excellence, and
    the Microsoft Cloud App Security to ensure compliance, security, and quality standards
    for your Power Platform solutions. By reading this chapter, you have gained an
    overview of the capabilities and benefits of the Power Platform, as well as the
    best practices for ensuring its responsible and productive usage. This information
    may be useful to you if you are interested in exploring the Power Platform as
    a way to optimize your work, automate your processes, and leverage your data.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter we will look at how to create a center for enablement which
    becomes a central hub, bringing together the people, processes and platforms in
    your organization and enables the creation of a useful portfolio of solutions
    that solve business problems.
  prefs: []
  type: TYPE_NORMAL
