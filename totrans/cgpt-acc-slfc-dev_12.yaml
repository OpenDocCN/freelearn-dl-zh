- en: '12'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using ChatGPT for Salesforce Testing
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Salesforce testing is pivotal in ensuring that the application developed meets
    the necessary quality, performance, and security standards. With Salesforce’s
    role as a key platform for managing customer relationships and sensitive data,
    the reliability and robustness of the system are important. Thorough testing aids
    teams in discovering and addressing potential defects in the development process,
    leading to a more effective and trustworthy final product.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Salesforce testing serves as a safeguard for user experience and system stability.
    By systematically uncovering bugs and inconsistencies, testing ensures alignment
    with defined business requirements. Implementing rigorous testing procedures reduces
    the risk of defects post-deployment, saving both time and resources in the future.
    Testing confirms that the system functions appropriately under ideal conditions
    and holds up against unexpected or incorrect usage.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Positive and negative testing are two crucial aspects of Salesforce testing.
    Positive testing, often referred to as “happy path” testing, focuses on confirming
    expected behavior using valid input data. In contrast, negative testing employs
    invalid data to verify that the system can handle erroneous inputs gracefully.
    Both are vital for a complete validation of the system’s functionality.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Structuring the testing scripts is a key aspect of this process. The test scripts
    should include the objective, preconditions, assumptions, step-by-step direction,
    and expected results. Clearly written test scripts help team members understand
    what, how, and why specific aspects are being tested. This serves as a roadmap
    for the entire project, ensuring a clear and cohesive approach to testing the
    system’s various features.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Retesting plays a significant role in the QA process. After defects have been
    identified and corrected, retests are run under the exact same conditions to confirm
    that the specific issues have been resolved. This ensures that the changes haven’t
    inadvertently created new problems, reinforcing the system’s stability and functionality.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Preparing test users and data is essential to simulate real-world scenarios
    within Salesforce. Test users must be created with different profiles and permissions,
    mirroring the actual end users, while test data must accurately represent variations
    and edge cases. This preparation enhances the relevance of testing and offers
    insights into the system’s real-world performance.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Salesforce testing transcends being mere procedural steps in the development
    cycle. It forms the backbone of practices that ensure system reliability, performance,
    and alignment with business goals. A well-thought-out approach to testing enhances
    the Salesforce instance’s quality, engendering trust in its ability to support
    the organization’s mission-critical operations.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT’s capabilities can be leveraged to significantly enhance the manual
    testing phase of Salesforce projects, offering a range of benefits.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: In the area of test scripting, ChatGPT can provide guidance to test analysts,
    suggesting various scenarios to be tested, including both critical paths and edge
    cases. The platform’s understanding of the complexities inherent in Salesforce
    and its various components enables it to assist in identifying specific areas
    that need to be carefully assessed. This ensures that testing is both comprehensive
    and meticulous, without overlooking essential functionalities.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Enhanced collaboration is another critical area where ChatGPT can make a difference.
    By acting as a bridge between business analysts, developers, and testing teams,
    and translating user stories in test scripts, it ensures a unified understanding
    of the intended functionality. This common understanding enables accurate testing
    and minimizes misunderstandings, reducing the need for unnecessary rework.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: In addition to assisting with test scripting, ChatGPT can be leveraged as a
    valuable **just-in-time** (**JIT**) training tool for manual testers. By offering
    insights into best practices, common challenges, and effective testing strategies
    tailored to Salesforce’s unique ecosystem, it supports continuous learning and
    skill enhancement. This educational aspect ensures that testers are well equipped
    to handle the nuanced demands of Salesforce testing.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT offers a multifaceted support system for manual Salesforce testing efforts,
    from the scripting phase through hands-on testing. By providing nuanced guidance,
    fostering collaboration, aiding in the identification of issues, and supporting
    the continuous growth of testing skills, it adds significant value to the testing
    process. These advantages align with the overall objective of delivering high-quality
    Salesforce solutions, underscoring the potential of ChatGPT as a transformative
    tool in Salesforce development.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, readers will delve into the critical role of testing in Salesforce
    development and learn how to integrate ChatGPT into this process for enhanced
    outcomes. The material covers the fundamentals of Salesforce testing, highlighting
    the nuances and the significant value ChatGPT brings to this domain. Participants
    will gain expertise in crafting effective test cases, using ChatGPT’s guidance
    to develop clear, comprehensive, and relevant test scripts specifically tailored
    for Salesforce deployments. The chapter includes a practical case study, demonstrating
    the transition from user stories to Salesforce project test scripts. Key skills
    imparted include mastering the principles of effective Salesforce testing, developing
    high-quality test scripts, and achieving proficiency in optimizing these scripts
    within the Salesforce environment, all augmented by ChatGPT’s insights. This comprehensive
    approach ensures that learners are equipped to produce Salesforce deployments
    that are not only functionally robust but also reliable and user-friendly.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Crafting effective test cases with ChatGPT
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using ChatGPT to write manual test scripts for Salesforce user stories is a
    seamless process that can drastically enhance the efficiency and precision of
    your testing phase. First, it involves understanding the user stories, goals,
    and acceptance criteria in detail. By inputting these elements into ChatGPT, the
    AI can then assist in defining a range of scenarios that cover both primary pathways
    and edge cases tailored to Salesforce’s environment. Through an iterative collaboration
    between the development team and ChatGPT, testers can quickly translate complex
    user stories into detailed manual test scripts. This not only streamlines the
    process but also ensures that the scripts are aligned with business goals and
    compliance requirements specific to Salesforce, thereby integrating ChatGPT into
    the team’s testing strategy as a valuable and insightful tool.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Unlike some facets of Salesforce development, there are no industry standards
    for test scripts. Fortunately, ChatGPT can help.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | What is the best way to document a Salesforce project test script?
    |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
- en: '| **Response** | The best way to document the steps in a Salesforce project
    test script is to employ a structured, comprehensive approach that aligns with
    both the technical and business requirements of the test scenario.1\. **Title
    and Objective**: Begin by defining a clear title and objective that aligns with
    the specific user story or requirement being tested. This sets the context and
    allows anyone reviewing the script to quickly understand its purpose.2\. **Preconditions
    and Assumptions**: Outline any prerequisites or environmental conditions that
    must be in place before testing, such as specific user roles, data setup, or configuration
    settings within Salesforce.3\. **Test Steps and Expected Results**: Detail each
    step of the process in a sequential manner, incorporating all actions that need
    to be performed. Each step should include the action, input data, and expected
    result, providing a clear pathway for execution. Utilizing tables or numbered
    lists can enhance readability.4\. **Negative Scenarios and Edge Scripts**: Include
    provisions for negative testing and edge scripts, specifying how the system should
    respond to invalid inputs or unexpected user behavior.5\. **Attachments and References**:
    If there are supporting documents, such as screenshots, flow diagrams, or references
    to specific Salesforce objects, include them as attachments or links.6\. **Version
    Control and Author Information**: Implement version control to track changes and
    adaptations to the test script. Include details of the author, review status,
    and any relevant comments.7\. **Integration with Test Management Tools**: If the
    team uses test management tools, the script should be structured to facilitate
    integration, enabling better tracking, reporting, and collaboration.By focusing
    on clarity, thoroughness, and alignment with the specific Salesforce functionality
    being tested, the test script becomes a robust tool, not just for QA professionals
    but for developers, analysts, and stakeholders, enhancing the quality and effectiveness
    of the testing phase. |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
- en: 'Based on the response from ChatGPT, for each user story, ChatGPT can help write
    the following:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Positive, negative, and edge test scripts
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For each test script:'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Title and objectives
  id: totrans-23
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Preconditions and assumptions
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Test steps and expected results
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Test data
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This information can be used to create a standard test script prompt that can
    be combined with a user story and any needed refining detail:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '*Please write at least one positive test script, at least one negative test
    script, and at least one edge test script for the user story below. Include a
    title, an objective, preconditions, assumptions, and detailed step-by-step directions.
    Include the expected results for* *each step.*'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Case study
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s combine the test script prompt with a basic user story from [*Appendix
    A*](B21462_Appendix_A.xhtml#_idTextAnchor205).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Please write at least one positive test script, at least one
    negative test script, and at least one edge test script for the user story below.
    Include a title, an objective, preconditions, assumptions, and detailed step-by-step
    directions. Include the expected results for each step.**Epic 2.** **Display of
    Snowflake Information on Salesforce** **Account Pages****User Story 1: Create
    Snowflake Section within Salesforce** **Account Pages**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal**: As a Sales Rep, I want a dedicated “Snowflake” section within Salesforce
    Account pages so that I can quickly access the Snowflake data related to an account.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep is viewing a Salesforce Account page,'
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the page is loaded,'
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** a dedicated “Snowflake” section should be displayed.'
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '| **Response** | Certainly! Below are the test scripts for positive, negative,
    and edge cases based on the provided user story.**Positive** **Test Script****Title**:
    Verify the Display of the Snowflake Section within Salesforce Account Pages**Objective**:
    Ensure that the dedicated “Snowflake” section appears correctly when a Sales Rep
    views a Salesforce Account page.**Preconditions**: Sales Rep is logged in to Salesforce,
    and the Snowflake section is already implemented.**Assumptions**: The Sales Rep
    has appropriate permissions to view the Account page.**Steps**:1\. **Navigate
    to Account Page**: Open an existing Salesforce Account page.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The Account page loads successfully.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. **Verify Snowflake Section**: Check if the dedicated **Snowflake** section
    is displayed on the page.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The **Snowflake** section is displayed within the Account
    page.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Negative** **Test Script****Title**: Verify the Absence of the Snowflake
    Section for Non-Sales Rep User**Objective**: Ensure that users without Sales Rep
    permissions do not see the Snowflake section within Salesforce Account pages.**Preconditions**:
    A non-Sales Rep user is logged in to Salesforce, and the Snowflake section is
    implemented.**Assumptions**: The non-Sales Rep user has limited permissions that
    exclude access to the Snowflake section.**Steps**:1\. **Navigate to Account Page**:
    Open an existing Salesforce Account page as a non-Sales Rep user.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The Account page loads successfully.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '|  | 2\. **Verify Absence of Snowflake Section**: Check if the dedicated **Snowflake**
    section is absent on the page.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The **Snowflake** section is not displayed within the Account
    page for the non-Sales Rep user.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edge** **Test Script****Title**: Verify the Display of the Snowflake Section
    with Slow Internet Connection**Objective**: Validate the display of the Snowflake
    section within Salesforce Account pages when the user has a slow internet connection.**Preconditions**:
    Sales Rep is logged in to Salesforce, the Snowflake section is implemented, and
    the internet connection is intentionally slowed down (can be simulated using browser
    tools).**Assumptions**: Sales Rep has proper permissions, and the system can handle
    varying internet speeds.**Steps**:1\. **Navigate to Account Page**: Open an existing
    Salesforce Account page with a slowed internet connection.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The Account page takes a longer time to load but eventually
    loads successfully.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. **Verify Snowflake Section**: Check if the dedicated “Snowflake” section
    is displayed on the page, even with a slow connection.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The “Snowflake” section is displayed within the Account page,
    although it might take more time to load compared to a regular connection.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These test scripts cover different aspects of the same functionality and together
    ensure that the feature behaves correctly under various scenarios, thereby contributing
    to robust and reliable software. |
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Writing detailed test scripts requires a thoughtful examination of the functionality
    to be implemented. Test scripts ensure alignment, spanning business analysts,
    developers, testers, and stakeholders. This alignment is vital, as it allows potential
    issues to be identified during the development phase, thus minimizing the risk
    of costly rework later in the project. Carefully designed test cases covering
    positive, negative, and edge scenarios provide a comprehensive perspective, ensuring
    that the implementation aligns with the intended functionality.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: The step-by-step instructions in the test scripts create a precise roadmap for
    validation. By systematically verifying each aspect of the requirement, the tester
    can ensure that functionality works as expected, contributing to the overall quality
    of the feature. This detailed approach helps in confirming that the test is executed
    properly.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The test cases can also serve as a reusable asset, supporting future development,
    regression testing, and the conversation to automating testing.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: This first example provides good test scripts for what are basic user stories
    and from a **user interface** (**UI**) POV simply display some additional fields.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: A more complex scenario from [*Appendix A*](B21462_Appendix_A.xhtml#_idTextAnchor205)
    allows the user to send an email from the Account page. This feature spans five
    user stories. The first user story adds an **Email** button to the customer Lightning
    Web Component that displays Snowflake data.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Please write at least one positive test script, at least one
    negative test script, and at least one edge test script for the user story below.
    Include a title, an objective, preconditions, assumptions, and detailed step-by-step
    directions. Include the expected results for each step.Epic 3\. **Email Functionality
    with** **Snowflake Data**User Story 1: **Add an “Email” Button to the Snowflake
    Lightning** **Web Component**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal**: As a Sales Rep, I want an “Email” button within the Snowflake section
    of the Account page so that I can initiate the process of sending Snowflake information
    via email.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep is viewing the Snowflake section on the Account page,'
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the Sales Rep looks at the Snowflake section,'
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** an “Email” button should be visible and clickable.'
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '| **Response** | **Positive** **Test Script****Title**: Verify “Email” Button
    in Snowflake Section for Sales Rep**Objective**: To validate the presence and
    functionality of the **Email** button within the Snowflake section of the Account
    page for Sales Reps.**Preconditions**: The Sales Rep is logged in to Salesforce
    and is on an Account page with a Snowflake section.**Assumptions**: The Snowflake
    section is functioning properly, and the email feature has been properly configured.**Steps**:1\.
    **Verify Account Page**: Check that the Account page has loaded successfully.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: Account page displays with all relevant sections, including
    the Snowflake section.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. **Inspect Snowflake Section**: Scroll to the Snowflake section and look
    for the “Email” button.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The **Email** button is visible within the Snowflake section.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. **Click on Email Button**: Click the **Email** button to test its clickability.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The button is clickable and initiates the email process as
    configured.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Negative** **Test Script****Title**: Verify Absence of **Email** Button for
    Non-Sales Rep**Objective**: To ensure that the **Email** button within the Snowflake
    section is not visible or accessible to non-Sales Rep users.**Preconditions**:
    A non-Sales Rep user is logged in to Salesforce and is on an Account page with
    a Snowflake section.**Assumptions**: The feature is restricted to Sales Rep users
    only.**Steps**:1\. **Verify Account Page**: Check that the Account page has loaded
    successfully.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: Account page displays without Sales Rep-specific features.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '|  | 2\. **Inspect Snowflake Section**: Scroll to the Snowflake section and
    look for the “Email” button.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The “Email” button is not visible within the Snowflake section
    for non-Sales Rep users.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edge** **Test Script****Title**: Verify **Email** Button with Incomplete
    Snowflake Data**Objective**: To validate the behavior of the **Email** button
    within the Snowflake section when the Snowflake data is incomplete or not fully
    loaded.**Preconditions**: The Sales Rep is logged in to Salesforce and is on an
    Account page where the Snowflake data is not fully loaded.**Assumptions**: The
    Snowflake section and **Email** button are properly configured, but the Snowflake
    data source is experiencing delays or has incomplete data.**Steps**:1\. **Verify
    Account Page with Incomplete Data**: Check that the Account page has loaded with
    incomplete Snowflake data.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: Account page displays with the Snowflake section showing incomplete
    or loading data.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. **Inspect Snowflake Section**: Scroll to the Snowflake section and look
    for the “Email” button.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The **Email** button is visible within the Snowflake section.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. **Click on Email Button**: Click the **Email** button to test its functionality
    with incomplete data.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: 'Expected Result: The button is clickable, and an appropriate response is observed,
    such as a warning message or a handling mechanism for incomplete data.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These test scripts provide a detailed guide for thoroughly verifying the functionality
    and accessibility of the **Email** button within the Snowflake section, covering
    positive, negative, and edge scenarios. |
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Extending test scripts for more complex user stories and tests is a matter of
    adapting to the multifaceted nature of the requirements. Complex scenarios may
    require consideration of multiple interactions, dependencies, and potential user
    paths. To handle this complexity, tests may need to layer different combinations
    of inputs and account for varying user roles and permissions. Implementing data-driven
    testing with various datasets can help explore different scenarios. Additionally,
    structuring the tests in a modular fashion and closely collaborating with different
    stakeholders can ensure that complex user stories are tested in alignment with
    both technical specifications and broader business needs. This methodical approach
    ensures a thorough and accurate validation of the user stories, even as complexity
    increases.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how ChatGPT does on a more complex user story.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Please write at least one positive test script, at least one
    negative test script, and at least one edge test script for the user story below.
    Include a title, an objective, preconditions, assumptions, and detailed step-by-step
    directions. Include the expected results for each step.**Epic 3\. Email Functionality
    with** **Snowflake Data****User Story 2: Create Flow-Based Wizard to Select**
    **a Contact**'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal**: As a Sales Rep, I want a wizard to guide me through the process of
    selecting a contact to send the email to so that I can choose the correct recipient.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep clicks the **Email** button in the Snowflake section,'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the wizard starts,'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the Sales Rep should be prompted to select a Contact associated with
    the Account.'
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '| **Response** | **Positive** **Test Script****Title**: Verify Flow-Based Wizard
    for Contact Selection**Objective**: To validate the presence and functionality
    of the flow-based wizard for selecting a contact after clicking the **Email**
    button within the Snowflake section.**Preconditions**: Sales Rep is logged in
    to Salesforce, is on an Account page with a Snowflake section, and has access
    to at least one Contact associated with the Account.**Assumptions**: The **Email**
    button, flow-based wizard, and Contact selection are functioning properly.**Steps**:1\.
    **Navigate to Snowflake Section**: Ensure the Account page with the Snowflake
    section has loaded successfully.'
