- en: '13'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using Presenter View
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I often hear from presenters that they want to have all their text on slides
    because they fear forgetting what to say. Lack of practice is often a problem,
    but some presenters fear public speaking so much that they need more support when
    using mostly visual slides.
  prefs: []
  type: TYPE_NORMAL
- en: 'That is why speakers need to learn how to leverage technology to help them
    ease their fears. PowerPoint has been providing **Presenter View** for some time
    now, helping presenters see their notes while the audience sees only their slides.
    Now is the time to learn how to leverage all its power through the topics discussed
    in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Defining and starting Presenter View
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the display and navigation tools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the annotation tools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using other tools
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Making your presentation more accessible with live subtitles
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Presenter View feature is available in all versions of PowerPoint, but there
    could be differences in the tools available depending on the version you are using.
    Be aware that since the subscription version of PowerPoint is updated on an ongoing
    basis, it is possible that screenshots shown in this chapter might differ from
    your version of the application.
  prefs: []
  type: TYPE_NORMAL
- en: Defining and starting Presenter View
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Presenter View i s a PowerPoin t feature that allows presenters to see their
    speaking notes and various tools on their computer while the audience only sees
    the slides in their presentation. We’ll see how easy it is to set up and describe
    the various parts of the **Presenter View** window.
  prefs: []
  type: TYPE_NORMAL
- en: If you are using any recent version of PowerPoint, as soon as you connect your
    computer to a second monitor, a projector, or a TV screen, PowerPoint should automatically
    set up Presenter View for you. When you are working with two monitors permanently
    connected to your computer, there might be times when you don’t want to use it,
    so let’s see where Presenter View can be turned on or off.
  prefs: []
  type: TYPE_NORMAL
- en: 'From the **Slide Show** tab ( **1** ), go to the **Monitors** group ( **2**
    ) and check or uncheck the **Use Presenter View** box ( **3** ) according to your
    needs ( *Figure 13.1* ) :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.1 – Activating or deactivating Presenter View in the Slide Show
    tab](img/B32063_13_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.1 – Activating or deactivating Presenter View in the Slide Show tab
  prefs: []
  type: TYPE_NORMAL
- en: The **Monitor** drop-dow n list ( **4** ) allows you to choose on which display
    y ou want to see Presenter View. The **Automatic** setting is usually the default
    one, allowing PowerPoint to choose the display automatically. We will see an option
    in Presenter View to change the display if it is not appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: 'Starting the slide show can be done directly in the **Slide Show** tab by using
    the **From Beginning** button ( **5** ), starting your presentation on the first
    slide, or using the **From Current Slide** button ( **6** ). You can also use
    the **Slide Show** button on the far right of the status bar ( **7** ) to start
    the slide show from the selected slide. You can also use the following keyboard
    shortcuts to start your slide show:'
  prefs: []
  type: TYPE_NORMAL
- en: 'From the first slide: *F5*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'From the current slide: *Shift* + *F5*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You may need to press the *fn* (function) key + *F5* on some external keyboards.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Once you start the slide show, you will see Presenter View on your main monitor
    and the slide displayed on the second monitor. If you want to practice your presentation
    with Presenter View but don’t have access to a second monitor, projector, or TV,
    you will need to first start your slide show and then right-click your mouse to
    get the contextual me nu wi th the **Show Presenter View** option ( **1** ) (
    *Figure 13.2* ) :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.2 – Accessing Presenter View with only one monitor](img/B32063_13_02.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.2 – Accessing Presenter View with only one monitor
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we have seen how to start Presenter View, let’s go over the main sections
    of the window ( *Figure 13.3* ) :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.3 – Exploring Presenter View’s sections](img/B32063_13_03.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.3 – Exploring Presenter View’s sections
  prefs: []
  type: TYPE_NORMAL
- en: The first section shows your actual slide and the various delivery tools you
    can access ( **1** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The seco nd secti on shows a preview of your next animation or next slide (
    **2** ), allowing you to see what is coming next.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the third section, you will see your speaker notes ( **3** ) if you added
    any during your content creation phase. It now allows adding notes in this section
    during your presentation. There’ll be more on that later in the chapter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You also have navigation buttons ( **4** ) underneath the slide preview, showing
    you the slide number of your current slide and the total number of slides in your
    presentation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The main sections in the window can be resized by clicking and dragging the
    line between the actual slide and **Next slide** /notes, or the one between **Next
    slide** and notes ( **5** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At the top of the window, you have a section to manage your displays ( **6**
    ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The previous example shows my own resized sections’ display. The default display
    usually shows a much bigger **Next slide** thumbnail, which can be confusing for
    most presenters because it is right above the speaker notes for the current slide.
  prefs: []
  type: TYPE_NORMAL
- en: Many times, when I’ve helped speakers rehearse with Presenter View, I found
    most were confused because their notes did not match the slide right above them
    – I must say it still happens to me, so I always make the next slide smaller.
    I suggest that you resize the **Next slide** section and make it much smaller,
    so your eyes can make sense of the upcoming visual, and you have even more space
    for your notes.
  prefs: []
  type: TYPE_NORMAL
- en: Now t hat we k now about the various sections in Presenter View, let’s move
    on to using the display and navigation too ls.
  prefs: []
  type: TYPE_NORMAL
- en: Using the display and navigation tools
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'When you start your s lide show with Presenter View, you might need to change
    how it is displayed, so we will first have a look at the display tools ( *Figure
    13 .4* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.4 – Using the display tools in Presenter View](img/B32063_13_04.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.4 – Using the display tools in Presenter View
  prefs: []
  type: TYPE_NORMAL
- en: If you need to look for something in another window on your computer while in
    a slide show, you will quickly realize you don’t see your taskbar when using Presenter
    View, so using the **SHOW TASKBAR** tool ( **1** ) could be helpful. It works
    like a toggle that you click to show or hide your taskbar. Be aware that it displays
    the taskbar on the primary monitor by default. If you do not want to display the
    taskbar below the slide seen by the audience, you will need to use the **DISPLAY
    SETTINGS** tool.
  prefs: []
  type: TYPE_NORMAL
- en: The **DISPLAY SETTINGS** tool ( **2** ) allows you to change the device on which
    you want Presenter View displayed by using the **Swap Presenter View and Slide
    Show** setting ( **3** ).
  prefs: []
  type: TYPE_NORMAL
- en: If you start your presentation and Presenter View opens on the wrong screen,
    don’t panic. Simply swap it over by clicking on **Swap Presenter View and Slide
    Show** . I have used it many times during training sessions so that people would
    see Presenter View on a big screen to help them learn about the feature.
  prefs: []
  type: TYPE_NORMAL
- en: The **Duplicate Slide Show** setting ( **4** ) will show only the sl ide o n
    your computer and the audi ence’s screen.
  prefs: []
  type: TYPE_NORMAL
- en: You can select **END SLIDE SHOW** ( **5** ) from the display tools or simply
    use *Esc* on your keyboard.
  prefs: []
  type: TYPE_NORMAL
- en: 'To help you deliver your presentation, let’s now have a closer look at the
    actual slide section with its tools to help you keep on track and navigate through
    your slides ( *Figure 13.5* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.5 – Presenter View tools to keep you on track and navigate your
    slides](img/B32063_13_05.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.5 – Presenter View tools to keep you on track and navigate your slides
  prefs: []
  type: TYPE_NORMAL
- en: Right a bove t he slide preview, you can see a timer ( **1** ) dis playing the
    duration of your presentation. It starts counting as soon as you open Presenter
    View, meaning that it will keep counting while you are getting ready to start
    your presentation with the audience.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to rely on the timer to know how long you have been presenting,
    you might appreciate the *Pause the timer* and *Restart the timer* tools ( **2**
    ) right next to it. But you do have the time of day displayed ( **3** ) in the
    upper-right corner of the slide preview. For example, during training sessions,
    I find the time of day convenient to keep track of when I need to give people
    a break.
  prefs: []
  type: TYPE_NORMAL
- en: To navigate through your slides, you can use the **Advance to next animation
    or slide** button ( **4** ) or **Return to previous animation or slide** button
    ( **5** ), although I think a much more efficient way is to use keyboard keys
    or a presentation remote. If you need a refresher on keyboard shortcuts, click
    on the **More slide show options** button ( **6** ) and select **Help** to access
    the whole list.
  prefs: []
  type: TYPE_NORMAL
- en: 'The final navigation tool you should know about is the **See all slides** button
    ( **1** ), allowing you to access all your slides in a new window ( **2** ) (
    *Fig ure 13.6* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.6 – Using the See all slides tool in Presenter View](img/B32063_13_06.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.6 – Using the See all slides tool in Presenter View
  prefs: []
  type: TYPE_NORMAL
- en: The new window will completely overlap your original window, so the first thing
    to know is that clicking on the **Back** arrow ( **3** ) brings you back to Presenter
    View. In my ex ample, t he sections created i n the file are shown in the left
    pane of the window ( **4** ), which can be helpful to find specific content more
    quickly than just using the scroll bar on the right ( **5** ). Clicking on any
    slide thumbnail brings you back to Presenter View. If you decide you don’t want
    to change to another slide, simply click on the **Back** arrow ( **3** ).
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, using Presenter View helps you manage your displays more easily
    and improves your flexibility with audience questions or comments by being able
    to navigate your whole presentation quickly, even if you have not planned any
    navigation elements in your presentation. Let’s now move on to another set of
    tools that can help you deliver more engaging presentations – the annot ation
    tools.
  prefs: []
  type: TYPE_NORMAL
- en: Using the annotation t ools
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'When you click on the **Pen** and **Laser Pointer** tools bu tton ( **1** )
    below the slide preview in Presenter View, you get access to nice annotation tools
    that can be easily used directly on the slide preview thumbnail ( *F igure 13.7*
    ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.7 – Accessing the annotation tools in Presenter View](img/B32063_13_07.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.7 – Accessing the annotation tools in Presenter View
  prefs: []
  type: TYPE_NORMAL
- en: Selecting either the **Laser Pointer** , **Pen** , or **Highlighter** tool options
    ( **2** ) changes your mouse cursor to the selected type, such as **Laser Pointer**
    in my example ( **3** ), making it much easier for the audience to follow your
    cursor. You can draw over an element on your slide with the laser pointer to briefly
    grab attention. If you are using the pen or highlighter, your drawings remain
    on your slide.
  prefs: []
  type: TYPE_NORMAL
- en: After changing your cursor to any of the tools, you can change its color ( **4**
    ) before using it on your slide. You can use the **Eraser** and **Erase All Ink
    on Slide** ( **5** ) tools to remove part of your annotations or all of them at
    once – the tools are active only when you have annotations on your slide.
  prefs: []
  type: TYPE_NORMAL
- en: '**Arrow Options** ( **6** ) is helpful only if you plan on moving your mouse
    cursor over what is displayed to the audience. When you are in slide show mode
    using Presenter View, what it does in the background is extend the view of your
    screen as if you had a very large monitor, on which the left part is used to display
    your speaker view, while the right part is used for the full-screen slide for
    the audience. I suggest that you leave the setting as **Automatic** and use the
    annotation tools if you need to highlight something on your slide for the audience.
    It will make things easier to follow than just having a regular mouse pointer
    moving over the slide.'
  prefs: []
  type: TYPE_NORMAL
- en: If you used any of the annotation tools, you need to go back to the list and
    click on the one you activated to turn it off. When you finish your presentation,
    any annotations left on your slides will trigger a dialog box, asking you whether
    you want to keep or discard them. If you need to refer back to them after your
    presentation is over, keep them, and they will show as editable ink objects on
    your slides.
  prefs: []
  type: TYPE_NORMAL
- en: No w that we have seen how to annotate slides during a presentation, in the
    next s ection, we will see other tools you might find helpful whi le presenting.
  prefs: []
  type: TYPE_NORMAL
- en: Using other too ls
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'We will not necessarily go through all the remaining tools and settings available
    in Presentation View. Instead, we will focus on **Zoom into the slide** ( **1**
    ), **Black or unblack slide show** ( **2** ), and **Click to add notes** ( **3**
    ) while you are presenting ( *Figure 13.8* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.8 – Extra useful tools in Presenter View](img/B32063_13_08.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.8 – Extra useful tools in Presenter View
  prefs: []
  type: TYPE_NORMAL
- en: 'I f you want the audience to have a closer look at a specific element on your
    slide, using the **Zoom into the slide** feature ( **1** ) is an excellent way
    to do it ( *Figure 13.9* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.9 – The Zooming into the slide feature in Presenter View](img/B32063_13_09.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.9 – The Zooming into the slide feature in Presenter View
  prefs: []
  type: TYPE_NORMAL
- en: After clicking on the magnifying glass icon ( **1** ), moving your cursor over
    the slide will show you a rectangle with a magnifying glass icon, helping you
    decide the area to zoom in ( **2** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you click, the slide gets zoomed in ( **3** ), showing a hand instead of
    the regular mouse cursor. If you left-click your mouse and maintain it, you can
    drag the image to move the zooming effect around your slide. You can change the
    zoom level using the *Ctrl* key + scrolling up or down with your mouse wheel.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you want to go back to your whole slide view, simply click on the magnifying
    glass icon again ( **2** ) or the *Esc* key on your keyboard.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This feature is easy to use and creates a simple but effective zooming effect
    to help improve your audience’s understanding.
  prefs: []
  type: TYPE_NORMAL
- en: 'Sometimes, helping our audience understand wh at we are saying means helping
    them focus on us without distractions, and this is when you can leverage the **Black
    or unblack slide show** feature ( **1** ) ( *Figure 13.10* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.10 – Using the Black or unblack slide show feature to improve audience
    focus](img/B32063_13_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.10 – Using the Black or unblack slide show feature to improve audience
    focus
  prefs: []
  type: TYPE_NORMAL
- en: When you click on the monitor icon ( **1** ), it becomes highlighted, and the
    slide preview becomes black. I would suggest using this feature when you need
    to talk and the slide visual is not relevant to what you have to say. You will
    see people’s eyes focus back on you, helping them concentrate on what you say.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some ways to change the black screen to white:'
  prefs: []
  type: TYPE_NORMAL
- en: Right-click the black slide ( **2** ), go to **Screen** ( **3** ), then select
    **White Screen** ( **4** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click on **More slide show options** ( **5** ), then select **Screen** and **White
    Screen** .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use the *W* key twice on your keyboard. It will first remove the black screen,
    then apply the white screen.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Making your slide preview white can make a great canvas to use annotation tools
    to sketch something to help the audience understand. If you try this trick, just
    be aware that your annotations cannot be saved, as you are drawing over the hidden
    slide.
  prefs: []
  type: TYPE_NORMAL
- en: When you want to resume your presentation, click again on the **Black or unblack
    slide show** icon ( **1** ) – you can also press the *B* key or the *Esc* key
    on your keyboard. If you have used the white screen, it will not stay for the
    next time. You will need to go back to the options settings to change it again.
  prefs: []
  type: TYPE_NORMAL
- en: If you are presenting in a room with an overhead projector and use the white
    screen, you may have a white light shining on your face. Before your presentation,
    go over your presentation once so you can test settings and equipment, making
    sure everything is going as planned.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you need to take some notes while you are presenting, Presenter View has
    received a nice upgrade, allowing M365 users to add their notes while presenting.
    The first clue that lets you know this feature is available in your version is
    seeing the **Click to add notes** text ( **1** ) when you don’t already have speaker
    notes for your slide ( *Figure 13.11* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.11 – Adding notes to your slide in Presenter View](img/B32063_13_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.11 – Adding notes to your slide in Presenter View
  prefs: []
  type: TYPE_NORMAL
- en: To add notes, simply click in the notes section and type in your text ( **2**
    ). You will also see a white outline ( **3** ) for the section. When you finish
    your presentation, your notes will be in the notes pane available under your slides.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have covered many of the tools that can help you with your delivery,
    let’s see one last feature that will help you deliver presentations that are more
    accessible.
  prefs: []
  type: TYPE_NORMAL
- en: Making your presentation more accessible with live subt itles
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you are an M365 user and want to use this feature, make su re you use a good
    microphone connected to your computer, and make sure to have access to an internet
    connection to deliver your presentation. Using live subtitles is not only a way
    to make your presentation more accessible, but also a way to make your presentation
    easier to understand for everyone in your audience.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to use subtitles during all your presentations, you can simply
    change the setting in the **Slide Show** tab ( **1** ) by checking the **Always
    Use Subtitles** box ( **2** ) ( *Figure 13.12* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.12 – Using subtitles for all your presentations](img/B32063_13_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.12 – Using subtitles for all your presentations
  prefs: []
  type: TYPE_NORMAL
- en: 'Accessing **Subtitle Settings** ( **3** ) will allow changing the settings
    of the subtitles:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Spoken Language** and **Subtitle Language** ( **4** ): You need to select
    the language you will speak from the list supplied by Microsoft, and in what language
    you want the subtitles displayed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having subtitles in another language is supported only for M365 Business, Enterprise,
    and Education licenses. Some features may be limited in Business Basic and Education
    A1.
  prefs: []
  type: TYPE_NORMAL
- en: '**Microphone** ( **5** ): If you plan on using the built-in microphone from
    your laptop, make sure to test it first. I have seen my share of laptop microphones
    not having the quality level needed to render quality live subtitles. If you are
    using an external microphone, make sure to select your device before starting
    your presentation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Choose the position of your subtitles:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The first two options, **Bottom (Overlaid)** and **Top (Overlaid)** ( **6**
    ), will add captions at the bottom or top of your slides on a semi-transparent
    shape. I suggest you avoid those options because they require extra planning when
    you are creating your content to avoid covering important information; it also
    means less space on the slide for your content.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The following two options, **Below Slide** and **Above Slide** ( **7** ), are
    the best choices. Yes, it reduces the size of your projected slide, but your content
    will never be hidden by subtitles. If you are presenting in a large room and the
    bottom of the projection screen could be hidden by people, whether sitting at
    the front of the room or on a stage, you might want to consider using the **Above
    Slide** setting instead of the default **Below Slide** setting.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'While in Presenter View, you can click on the **Toggle Subtitles** ( **1**
    ) icon to stop or start the feature. In the slide preview area, your words will
    be captured and then added in the position you chose. In the following example,
    it’s under the slide ( **2** ) ( *Figure 13.13* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.13 – Using subtitles during your presentation](img/B32063_13_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.13 – Using subtitles during your presentation
  prefs: []
  type: TYPE_NORMAL
- en: If you need to make changes to your subtitle settings while in Presenter View,
    click on **More slide show options** ( **3** ) icon and then on **Subtitle Settings**
    ( **4** ). This is a quick way to change the position of the subtitles while presenting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clicking on **More Settings…** ( **5** ) opens the **Captions & Subtitles**
    dialog box ( **6** ). While presenting, it would be useful if you wanted to make
    **Language** changes ( **7** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take note that if your spoken language is listed in the **Preview** section,
    it means the AI will not be as precise as it is for the fully supported languages.
  prefs: []
  type: TYPE_NORMAL
- en: When using subtitles during your presentation, you will need to be mindful of
    your speech pace and pronunciation to get more precise subtitle results.
  prefs: []
  type: TYPE_NORMAL
- en: Using subtitles might require extra equipment, depending on whether you are
    presenting online or in a venue. Consider getting assistance from a technology
    expert if you need help. It is worth the time and investment and will greatly
    improve the impact you will have on your audience.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you have seen how to use Presenter View and leverage many of
    its great tools to improve your presentation delivery, and how to make your presentations
    more accessible and inclusive by using subtitles.
  prefs: []
  type: TYPE_NORMAL
- en: Using Presenter View to help you reduce your fear of forgetting what to say
    is a great way to improve your presentation delivery. Just make sure that you
    don’t put very long scripts in the notes. Doing so might increase your stress
    level because you have to scroll through the notes, or it may even make your eyes
    focus on your computer instead of on your audience. Also, if you have a long script,
    reading it might make you sound unprepared and unnatural. The best advice I can
    give you is to aim to reduce your notes to very short sentences or keywords by
    the end of your delivery practices. That way, your notes become a reminder of
    the points you want to discuss.
  prefs: []
  type: TYPE_NORMAL
- en: As wonderful as I think Presenter View can be, if you think it will solve all
    your delivery problems, you are wrong! No tool can ever replace quality practice
    time; it can only help improve your performance because you have thoroughly practiced
    your presentation.
  prefs: []
  type: TYPE_NORMAL
- en: In the final chapter of this book, we will be discussing how to use the **PowerPoint
    Live** feature in Microsoft Teams. If you are doing remote or virtual presentations
    with Teams on a regular basis, it will help you manage your presentation more
    efficiently.
  prefs: []
  type: TYPE_NORMAL
