- en: '9'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Evaluating RAG Quantitatively and with Visualizations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Evaluation plays a crucial role in building and maintaining **retrieval-augmented
    generation** (**RAG**) pipelines. While you build the pipeline, you can use evaluation
    to identify areas for improvement, optimize the system’s performance, and systematically
    measure the impact of improvements. When your RAG system is deployed, evaluation
    can help ensure the effectiveness, reliability, and performance of the system.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating when building a RAG application
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluating a RAG application after deployment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Standardized evaluation frameworks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ground truth
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 9.1 – ragas
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additional evaluation techniques for RAG systems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s start by talking about how evaluation can help during the initial stages
    of building your RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The code for this chapter is placed in the following GitHub repository: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_09](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_09).'
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating as you build
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Evaluation plays a crucial role throughout the development process of a RAG
    pipeline. By continuously evaluating your system as you build it, you can identify
    areas that need improvement, optimize the system’s performance, and systematically
    measure the impact of any modifications or enhancements you make.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation is essential for understanding the trade-offs and limitations of
    different approaches within the RAG pipeline. RAG pipelines often involve various
    technical choices, such as the vector store, the retrieval algorithm, and the
    language generation model. Each of these components can have a significant impact
    on the overall performance of the system. By systematically evaluating different
    combinations of these components, you can gain valuable insights into which approaches
    yield the best results for your specific tasks and domain.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, you might experiment with different embedding models, such as
    local open source models that you can download for free or cloud service APIs
    that charge each time you convert text to an embedding. You may need to understand
    whether the cloud API service is better than the free model, and if so, whether
    it is good enough to offset the additional cost. Similarly, you can evaluate the
    performance of various language generation models, such as ChatGPT, Llama, and
    Claude.
  prefs: []
  type: TYPE_NORMAL
- en: This iterative evaluation process helps you make informed decisions about the
    most suitable architecture and components for your RAG pipeline. By considering
    factors such as efficiency, scalability, and generalization ability, you can fine-tune
    your system to achieve optimal performance while minimizing computational costs
    and ensuring robustness across different scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation is essential for understanding the trade-offs and limitations of
    different approaches within the RAG pipeline. But evaluation can also be useful
    after deployment, which we will talk about next.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating after you deploy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Once your RAG system is deployed, evaluation remains a crucial aspect of ensuring
    its ongoing effectiveness, reliability, and performance. Continuous monitoring
    and assessment of your deployed RAG pipeline are essential for maintaining its
    quality and identifying any potential issues or degradation over time.
  prefs: []
  type: TYPE_NORMAL
- en: There are numerous reasons why a RAG system’s performance might decline after
    deployment. For example, the data used for retrieval may become outdated or irrelevant
    as new information emerges. The language generation model may struggle to adapt
    to evolving user queries or changes in the target domain. Additionally, the underlying
    infrastructure, such as hardware or software components, may experience performance
    issues or failures.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a situation where you are at a financial wealth management company that
    has a RAG-based application that helps users understand the most likely factors
    to impact their financial portfolio. Your data sources might include all of the
    analyses published by major financial firms in the past five years, covering all
    the financial assets represented by your clientele.
  prefs: []
  type: TYPE_NORMAL
- en: In financial markets, though, major (macro) events around the world can have
    a dramatic impact on those portfolios that have not been captured in the past
    five years of data. Major catastrophes, political instability, or even a regional
    event for some stocks can set a whole new trajectory for their performance. For
    your RAG application, this represents shifts in the value that the data can provide
    to your end user, and over time, that value can decrease rapidly without proper
    updates. Users may start asking questions about those specific events that the
    RAG application will not be able to handle, such as *“What impact will the Category
    5 hurricane that just occurred have on my portfolio in the next year?”* But with
    continual updates and monitoring, and particularly with more recent reports about
    the impacts of the hurricane, these issues will likely be well addressed.
  prefs: []
  type: TYPE_NORMAL
- en: To mitigate these risks, it is crucial to continuously monitor your RAG system,
    particularly at common failure points. By continuously evaluating these critical
    components of your RAG pipeline, you can proactively identify and address any
    degradation in performance. This may involve updating the retrieval corpus with
    fresh and relevant data, fine-tuning the language generation model on new data,
    or optimizing the system’s infrastructure to handle increased load or address
    performance bottlenecks.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, it is essential to establish a feedback loop that allows users
    to report any issues or provide suggestions for improvement. By actively soliciting
    and incorporating user feedback, you can continuously refine and enhance your
    RAG system to better meet the needs of its users. This can also include monitoring
    aspects such as user interface usage, response times, and the relevance and usefulness
    of the generated outputs from the user’s perspective. Conducting user surveys,
    analyzing user interaction logs, and monitoring user satisfaction metrics can
    provide valuable insights into how well your RAG system is meeting its intended
    purpose. How you utilize this information depends heavily on what type of RAG
    application you have developed, but in general, these are the most common areas
    monitored for continual improvement of deployed RAG applications.
  prefs: []
  type: TYPE_NORMAL
- en: By regularly evaluating your deployed RAG system, you can ensure its long-term
    effectiveness, reliability, and performance. Continuous monitoring, proactive
    issue detection, and a commitment to ongoing improvement are key to maintaining
    a high-quality RAG pipeline that delivers value to its users over time.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation helps you get better
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Why is evaluation so important? Put simply, if you don’t measure where you are
    at, and then measure again after you have made improvements, it will be difficult
    to understand how or what improved (or hurt) the performance of your RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: It is also difficult to understand what is going wrong when something does go
    wrong without something objective to compare against. Was it your retrieval mechanism?
    Was it the prompt? Is it your LLM responses? These are questions a good evaluation
    system can help answer.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation provides a systematic and objective way to measure the performance
    of your pipeline, identify areas for enhancement, and track the impact of any
    changes or improvements you make. Without a robust evaluation framework, it becomes
    challenging to understand how your RAG system is progressing and where it needs
    further refinement.
  prefs: []
  type: TYPE_NORMAL
- en: By embracing evaluation as an integral part of your development process, you
    can continuously refine and optimize your RAG pipeline, ensuring that it delivers
    the best possible results and meets the evolving needs of its users.
  prefs: []
  type: TYPE_NORMAL
- en: Early in the RAG system development process, you have to start making decisions
    about what technical components you are going to consider. At this point, you
    haven’t even installed anything, so you can’t evaluate your code yet, but you
    can still use **standardized evaluation frameworks** to narrow down what you are
    considering. Let’s discuss these standardized evaluation frameworks for some of
    the most common RAG system elements.
  prefs: []
  type: TYPE_NORMAL
- en: Standardized evaluation frameworks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Key technical components of your RAG system include the embedding model that
    makes your embeddings, the vector store, the vector search, and the LLM. When
    you look at the different options for each technical component, there are a number
    of standardized metrics that are available for each that help you compare them
    against each other. Here are some common metrics for each category.
  prefs: []
  type: TYPE_NORMAL
- en: Embedding model benchmarks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The **Massive Text Embedding Benchmark** (**MTEB**) Retrieval Leaderboard evaluates
    the performance of embedding models on various retrieval tasks across different
    datasets. The MTEB leaderboard ranks models based on their average performance
    across many embedding and retrieval-related tasks. You can visit the leaderboard
    using this link: [https://huggingface.co/spaces/mteb/leaderboard](https://huggingface.co/spaces/mteb/leaderboard).'
  prefs: []
  type: TYPE_NORMAL
- en: 'When visiting this web page, click on the **Retrieval** and **Retrieval w/Instructions**
    tabs for retrieval-specific embedding ratings. To evaluate each of the models
    on the leaderboard, the model’s outputs are tested using a number of datasets
    that cover a wide range of domains, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Argument retrieval** (**ArguAna**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Climate fact retrieval** (**ClimateFEVER**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Duplicate question retrieval** (**CQADupstackRetrieval**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Entity retrieval** (**DBPedia**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fact extraction and verification** (**FEVER**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Financial question-answering** (**FiQA2018**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-hop question-answering** (**HotpotQA**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Passage and document ranking** (**MSMARCO**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fact-checking** (**NFCorpus**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Open-domain question-answering** (**NQ**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Duplicate-question detection** (**QuoraRetrieval**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scientific document retrieval** (**SCIDOCS**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scientific claim verification** (**SciFact**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Argument retrieval** (**Touche2020**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**COVID-19-related information retrieval** (**TRECCOVID**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The leaderboard ranks embedding models based on their average performance across
    these tasks, providing a comprehensive view of their strengths and weaknesses.
    You can also click on any metric to order the board by that metric. So, for example,
    if you are interested in a metric that is more focused on financial question-answering,
    look at what model scored top marks on the FiQA2018 dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Vector store and vector search benchmarks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**ANN-Benchmarks** is a benchmarking tool that evaluates the performance of
    **approximate nearest neighbor** (**ANN**) algorithms, which we discussed thoroughly
    in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176). ANN-Benchmarks assesses
    the search accuracy, speed, and memory usage of different vector search tools
    on various datasets, including the vector search tools we mentioned in [*Chapter
    8*](B34736_08_ePub.xhtml#_idTextAnchor176), such as **Facebook AI Similarity Search**
    (**FAISS**), **Approximate Nearest Neighbors Oh Yeah** (**ANNOY**), and **Hierarchical
    Navigable Small** **Worlds** (**HNSW**).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Benchmarking IR** (**BEIR**) is another useful resource for evaluating vector
    stores and search algorithms. It provides a heterogeneous benchmark for zero-shot
    evaluation of information retrieval models across diverse domains, including question-answering,
    fact-checking, and entity retrieval. We will further discuss what *zero-shot*
    means in [*Chapter 13*](B34736_13_ePub.xhtml#_idTextAnchor299), but basically,
    it means questions/user queries that do not have any examples included with them,
    which is a common situation in RAG. BEIR offers a standardized evaluation framework
    and includes popular datasets such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**MSMARCO**: A large-scale dataset derived from real-world queries and answers
    for evaluating deep learning models in search and question-answering'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**HotpotQA**: A question-answering dataset that features natural, multi-hop
    questions, with strong supervision for supporting facts and enabling more explainable
    question-answering systems'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CQADupStack**: A benchmark dataset for **community question-answering** (**cQA**)
    research, taken from 12 Stack Exchange subforums and annotated with duplicate
    question information'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These datasets, along with others in the BEIR benchmark, cover a diverse range
    of domains and information retrieval tasks, allowing you to assess the performance
    of your retrieval system in different contexts and compare it against state-of-the-art
    methods.
  prefs: []
  type: TYPE_NORMAL
- en: LLM benchmarks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Artificial Analysis LLM Performance Leaderboard is a comprehensive resource
    for evaluating both open source and proprietary language models, such as ChatGPT,
    Claude, and Llama. It assesses the models’ performance on a wide range of tasks.
    For quality comparisons, it uses a number of sub-leaderboards:'
  prefs: []
  type: TYPE_NORMAL
- en: '**General ability**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chatbot arena**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reasoning** **and knowledge**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Massive Multitask Language** **Understanding** (**MMLU**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-turn Benchmark** (**MT Bench**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They also track speed and price, and provide analysis to allow you to compare
    a balance of each of these areas. By ranking the models based on their performance
    across these tasks, the leaderboard provides a holistic view of their capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'It can be found here: [https://artificialanalysis.ai/](https://artificialanalysis.ai/)'
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the general LLM leaderboard, there are specialized leaderboards
    that focus on specific aspects of LLM performance. The Artificial Analysis LLM
    Performance Leaderboard evaluates the technical aspects of LLMs, such as inference
    speed, memory consumption, and scalability. It includes metrics such as throughput
    (tokens processed per second), latency (time to generate a response), memory footprint,
    and scaling efficiency. These metrics help you understand the computational requirements
    and performance characteristics of different LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: The Open LLM Leaderboard tracks the performance of open source language models
    on various natural language understanding and generation tasks. It includes benchmarks
    such as the **AI2 Reasoning Challenge** (**ARC**) for complex scientific reasoning,
    HellaSwag for common-sense reasoning, MMLU for domain-specific performance, TruthfulQA
    for generating truthful and informative responses, WinoGrande for common-sense
    reasoning through pronoun disambiguation, and **Grade School Math 8K** (**GSM8K**)
    for mathematical reasoning abilities.
  prefs: []
  type: TYPE_NORMAL
- en: Final thoughts on standardized evaluation frameworks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Using standardized evaluation frameworks and benchmarks offers a valuable starting
    point for comparing the performance of different components in your RAG pipeline.
    They cover a wide range of tasks and domains, allowing you to assess the strengths
    and weaknesses of various approaches. By considering the results on these benchmarks,
    along with other factors, such as computational efficiency and ease of integration,
    you can narrow down your options and make better-informed decisions when selecting
    the most suitable components for your specific RAG application.
  prefs: []
  type: TYPE_NORMAL
- en: However, it’s important to note that while these standardized evaluation metrics
    are helpful for initial component selection, they may not fully capture the performance
    of your specific RAG pipeline with your unique inputs and outputs. To truly understand
    how well your RAG system performs in your particular use case, you need to set
    up your own evaluation framework tailored to your specific requirements. This
    customized evaluation system will provide the most accurate and relevant insights
    into the performance of your RAG pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we need to talk about one of the most important and often overlooked aspects
    of RAG evaluation, your ground-truth data.
  prefs: []
  type: TYPE_NORMAL
- en: What is the ground truth?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Simply put, ground-truth data is data that represents the ideal responses you
    would expect if your RAG system were operating at peak performance.
  prefs: []
  type: TYPE_NORMAL
- en: As a practical example, if you had a RAG system focused on allowing someone
    to ask questions about the latest cancer research in veterinarian medicine for
    dogs, with your data source being all the latest research papers on the subject
    that have been submitted to PubMed, your ground truth would likely be questions
    and answers that could be asked and answered of that data. You would want to use
    realistic questions that your target audience would really ask, and the answers
    should be what you consider to be the ideal answer expected from the LLM. This
    could be somewhat objective, but nonetheless, having a set of ground-truth data
    to compare against the input and output of your RAG system is a critical way to
    help compare the impact of changes you make and ultimately make the system more
    effective.
  prefs: []
  type: TYPE_NORMAL
- en: How do you use the ground truth?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ground-truth data serves as a benchmark to measure the performance of RAG systems.
    By comparing the output generated by the RAG system to the ground truth, you can
    assess how well the system retrieves relevant information and generates accurate
    and coherent responses. The ground truth helps quantify the effectiveness of different
    RAG approaches and identify areas for improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Generating the ground truth
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Creating ground-truth data manually can be time-consuming. If your company already
    has a dataset of ideal responses for specific queries or prompts, that can be
    a valuable resource. However, if such data is not readily available, there are
    alternative methods to obtain the ground truth that we will look into next.
  prefs: []
  type: TYPE_NORMAL
- en: Human annotation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can employ human annotators to manually create ideal responses for a set
    of queries or prompts. This ensures high-quality ground-truth data but can be
    costly and time-consuming, especially for large-scale evaluations.
  prefs: []
  type: TYPE_NORMAL
- en: Expert knowledge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In some domains, you may have access to **subject matter experts** (**SMEs**)
    who can provide ground-truth responses based on their expertise. This can be particularly
    useful for specialized or technical domains where accurate information is crucial.
  prefs: []
  type: TYPE_NORMAL
- en: One common approach to help with this method is called **rule-based generation**.
    With rule-based generation, for specific domains or tasks, you can define a set
    of rules or templates to generate the synthetic ground truth and utilize your
    SMEs to fill in the template. By leveraging domain knowledge and predefined patterns,
    you can create responses that align with the expected format and content.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if you are building a customer support chatbot to support mobile
    phones, you may have a template such as this: To resolve [issue], you can try
    [solution]. Your SMEs can fill in various issue-solution approaches where an issue
    might be *battery drain*, and the solution is *reducing screen brightness and
    closing background apps*. This would be fed to the template (what we call hydrating),
    and the final output would be something such as this: To resolve [battery drain],
    you can try [reducing screen brightness and closing background apps].'
  prefs: []
  type: TYPE_NORMAL
- en: Crowdsourcing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Platforms such as Amazon Mechanical Turk and Figure Eight allow you to outsource
    the task of creating ground-truth data to a large pool of workers. By providing
    clear instructions and quality control measures, you can obtain a diverse set
    of responses.
  prefs: []
  type: TYPE_NORMAL
- en: Synthetic ground truth
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In cases where obtaining real ground-truth data is challenging or infeasible,
    generating the synthetic ground truth can be a viable alternative. The synthetic
    ground truth involves using existing LLMs or techniques to automatically generate
    plausible responses. Here are a couple of approaches:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fine-tuned language models**: You can fine-tune LLMs on a smaller dataset
    of high-quality responses. By providing the model with examples of ideal responses,
    it can learn to generate similar responses for new queries or prompts. The generated
    responses can serve as a synthetic ground truth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Retrieval-based methods**: If you have a large corpus of high-quality text
    data, you can use retrieval-based methods to find relevant passages or sentences
    that closely match the query or prompt. These retrieved passages can be used as
    a proxy for ground-truth responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Obtaining the ground truth can be a challenging step in building your RAG system,
    but once you have obtained it, you will have a strong foundation for effective
    RAG evaluation. In the next section, we have a code lab where we generate synthetic
    ground-truth data and then integrate a useful evaluation platform into our RAG
    system that will tell us how the hybrid search we used in the previous chapter
    impacted our results.
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 9.1 – ragas
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Retrieval-augmented generation assessment** (**ragas**) is an evaluation
    platform designed specifically for RAG. In this code lab, we will step through
    the implementation of ragas in your code, generating a synthetic ground truth,
    and then establishing a comprehensive set of metrics that you can integrate into
    your RAG system. But evaluation systems are meant to evaluate something, right?
    What will we evaluate in our code lab?'
  prefs: []
  type: TYPE_NORMAL
- en: If you remember, in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176), we
    introduced a new search method for our retrieval stage called **hybrid search**.
    In this code lab, we will both implement the original dense vector semantic-based
    search and then use ragas to evaluate the impact of using the hybrid search method.
    This will give you a real-world working example of how a comprehensive evaluation
    system can be implemented in your own code!
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we dive into how to use ragas, it is important to note that it is a
    highly evolving project. New features and API changes happen often with new releases,
    so be sure to refer to the documentation website when walking through code examples:
    [https://docs.ragas.io/](https://docs.ragas.io/).'
  prefs: []
  type: TYPE_NORMAL
- en: 'This code lab picks up right where we left off in the last chapter, when we
    added `EnsembleRetriever` from LangChain (*Code lab 8.3*):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with some new packages to install:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We install `ragas`, the evaluation platform we will be focusing on in this code
    lab. The `tqdm` package, which is used by `ragas`, is a popular Python library
    used for creating progress bars and displaying progress information for iterative
    processes. You have probably come across the `matplotlib` package before, as it
    is a widely used plotting library for Python. We will be using it to provide visualizations
    for our evaluation metric results.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, we need to add several imports related to what we just installed:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'As noted, `tqdm` will give our `ragas` platform the ability to use progress
    bars during the time-consuming processing tasks it implements. We are going to
    use the popular pandas data manipulation and analysis library to pull our data
    into `DataFrames` as part of our analysis. The `matplotlib.pyplot as plt` import
    gives us the ability to add visualizations (charts in this case) for our metric
    results. We also import `Dataset` from `datasets`. The `datasets` library is an
    open source library developed and maintained by Hugging Face. The `datasets` library
    provides a standardized interface for accessing and manipulating a wide variety
    of datasets, typically focused on the field of **natural language processing**
    (**NLP**). Finally, we’ll import a number of packages from the `ragas` library.
    Let’s review each of these imports in more depth:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`from ragas import EvaluationDataset, SingleTurnSample, evaluate`: The `evaluate`
    function takes `EvaluationDataset` along with metrics and runs the evaluation
    on the RAG pipeline. `SingleTurnSample` represents a single question-answer pair
    with its contexts and reference. `EvaluationDataset` is a container that holds
    multiple `SingleTurnSample` objects for evaluation.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`from ragas.llms import LangchainLLMWrapper`: This wrapper allows LangChain
    LLM objects to be used with RAGAS metrics that require LLM evaluation.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`from ragas.embeddings import LangchainEmbeddingsWrapper`: This wrapper allows
    LangChain embedding models to be used with RAGAS metrics that require embeddings.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`from ragas.testset import TestsetGenerator`: The `TestsetGenerator` class
    is used to generate synthetic ground-truth datasets for evaluating RAG pipelines.
    It takes documents and generates question-answer pairs along with the corresponding
    contexts.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`from ragas.testset.synthesizers.single_hop.specific import SingleHopSpecificQuerySynthesizer`:
    This synthesizer generates single-hop questions that can be answered using information
    from a single document chunk.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`from ragas.metrics import…()`: This `import` statement brings in various evaluation
    metrics: `Faithfulness`, `ResponseRelevancy`, `LLMContextPrecisionWithoutReference`,
    `LLMContextRecall`, `FactualCorrectness`, and `SemanticSimilarity`.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Overall, these imports from the `ragas` library provide a comprehensive set
    of tools for generating synthetic test datasets, evaluating RAG pipelines using
    various metrics, and analyzing the performance results.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up LLMs/embedding models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now, we are going to upgrade how we handle our LLM and embedding services.
    With `ragas`, we are introducing more complexity to the number of LLMs that we
    use; we want to better manage that by setting our initializations upfront for
    both the embedding service and the LLM services. Let’s look at the code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Note that while we still only use one embedding service, we now have two different
    LLMs to call. The main goal of this, though, is to establish the *primary* LLM
    that we want to use directly for LLMs (`llm`), and then two additional LLMs that
    are designated for the evaluation process (`generator_llm` and `critic_llm`).
  prefs: []
  type: TYPE_NORMAL
- en: 'We have the benefit of having a more advanced LLM available, ChatGPT-4o-mini,
    which we can use as the critic LLM, which, in theory, means it can be more effective
    at evaluating input that we feed to it. This may not always be the case, or you
    may have an LLM that you fine-tune specifically for the task of evaluation. Either
    way, breaking these LLMs out into specialized designations shows you how different
    LLMs can be used for different purposes within a RAG system. You can remove the
    following line from the previous code that was initializing the LLM object that
    we were originally using:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, we will add a new RAG chain for running the similarity search (which
    is what we were originally running with just the dense embeddings):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'To make things clearer, we will update the hybrid RAG chain with this name:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Note `rag_chain_hybrid`,, which used to be `rag_chain_with_source`.`,`, representing
    the hybrid search aspect.
  prefs: []
  type: TYPE_NORMAL
- en: Now we are going to update our original code for submitting a user query, only
    this time, we are going to use both the similarity and hybrid search versions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create the similarity version:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, create the hybrid version:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The primary difference between these two sets of code is that they show the
    use of the different RAG chains we have created, `rag_chain_similarity` and `rag_chain_hybrid`.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, let’s take a look at the output from the similarity search:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Next is the output from the hybrid search:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Saying which is better may be subjective, but if you look back at the code from
    [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176), the retrieval mechanism
    for each of these chains returns a different set of data for the LLM to use as
    the basis for answering the user query. You can see these differences reflected
    in the preceding responses, where each has slightly different information and
    highlights slightly different aspects of that information.
  prefs: []
  type: TYPE_NORMAL
- en: So far, we have set up our RAG system to have the ability to use two different
    RAG chains, one focused on using just the similarity/dense search and the other
    using the hybrid search. This sets the foundation for applying `ragas` to our
    code to establish a more objective approach to evaluating the results we are getting
    from either of these chains.
  prefs: []
  type: TYPE_NORMAL
- en: Generating the synthetic ground truth
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we mentioned in the previous section, ground truth is a key element for us
    to conduct this evaluation analysis. But we have no ground truth; oh no! No problem
    – we can use `ragas` to generate synthetic data for this purpose.
  prefs: []
  type: TYPE_NORMAL
- en: '**Warning**'
  prefs: []
  type: TYPE_NORMAL
- en: The `ragas` library uses your LLM API extensively. The analysis that `ragas`
    will provide is an LLM-assisted evaluation, meaning every time a ground-truth
    example is generated or evaluated, an LLM is called (sometimes multiple times
    for one metric) and an API charge is incurred. If you generate 100 ground-truth
    examples, which includes the generation of both questions and answers, and then
    run six different evaluation metrics, the number of LLM API calls you make multiplies
    substantially, well into the thousands of calls. It is recommended to use it sparingly
    until you have a good grasp on how often the calls are being made. These are cost-incurring
    API calls, and they have the potential to run up your LLM API bills! At the time
    of this writing, I was incurring a cost of about $2 to $2.50 every time I ran
    through the entire code lab with just 10 ground examples and 6 metrics. If you
    have a larger dataset or set `test_size` for your `testset` generator to generate
    more than 10 examples, the costs will increase substantially.
  prefs: []
  type: TYPE_NORMAL
- en: 'We start by creating an instance of our generator that we will use to generate
    our ground-truth dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: As you can see in this code, we are using `generator_llm` and `generator_embeddings`.
    The `query_distribution` parameter replaces the old `distributions` parameter,
    and we’re using `SingleHopSpecificQuerySynthesizer` to generate questions. As
    the previous *Warning* box states, be careful about this! That is three different
    APIs that can generate substantial costs if you are not careful with the settings
    in this code. In this code, we also take our splits of data generated earlier
    in the code and preprocess them to work more effectively with `ragas`. Each chunk
    in splits is assumed to be a string representing a portion of a document. The
    `Document` class is from the `LangChain` library and is a convenient way to represent
    a document with its content.
  prefs: []
  type: TYPE_NORMAL
- en: '`testset` uses the `generator_with_langchain_docs` function from our generator
    object to generate a synthetic test. This function takes the `documents` list
    as input. The `test_size` parameter sets the desired number of test questions
    to be generated (in this case, 10). The `distributions` parameter defines the
    distribution of question types, with simple questions comprising 50% of the dataset,
    reasoning questions 25%, and multi-context questions 25%, in this example. We
    then convert `testset` into a pandas `DataFrame`, which we can use to view the
    results, and save it as a file. Given the costs we just mentioned, saving the
    data at this point to a CSV that can persist in your file directory offers the
    added convenience of only having to run this code once!'
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s pull our saved dataset back up and look at it!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'The output should look something like what you see here in *Figure 9.1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.1 – DataFrame showing synthesized ground-truth data](img/B34736_09_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.1 – DataFrame showing synthesized ground-truth data
  prefs: []
  type: TYPE_NORMAL
- en: In this dataset, you see `user_input` (questions) and reference (answers) that
    have been generated by the `generator_llm` instance you initialized earlier. You
    now have your ground truth! The LLM will attempt to generate 10 different question-and-answer
    pairs for our ground truth, but in some cases, a failure will occur that limits
    this generation. This will result in fewer ground-truth examples than you had
    set in the `test_size` variable. In this case, the generation resulted in 7 examples,
    rather than 10\. Overall, you will likely want to generate more than 10 examples
    for a thorough test of your RAG system. We are going to accept seven examples
    for this simple example, though, primarily to keep your API costs down!
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, let’s prepare the evaluation datasets:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'This function creates a `SingleTurnSample` object that takes a question, the
    `ground_truth` data, and `rag_chain` as inputs. The `SingleTurnSample` object
    requires the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '`user_input`: The question asked'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`response`: The generated answer from our RAG chain'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`retrieved_contexts`: The list of retrieved document contents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`reference`: The ground truth answer'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This function is flexible in that it accepts either of the chains that we provide
    to it, which will come in handy when we want to generate an analysis of both the
    similarity and hybrid chains.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we are ready to prep our datasets more to work with `ragas`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: In this code, we iterate through our saved testset `DataFrame` and create `SingleTurnSample`
    objects for each row. These samples are then collected into `EvaluationDataset`
    objects, which are `ragas`' containers for evaluation data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, let’s run `ragas` on the two datasets. First, we initialize the metrics:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Here is the code for applying ragas to our similarity RAG chain:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, we apply `ragas` to evaluate `evaluation_dataset_similarity` using the
    `evaluate()` function from the `ragas` library. The evaluation is performed using
    the specified metrics, which include `Faithfulness`, `ResponseRelevancy`, `LLMContextPrecisionWithoutReference`,
    `LLMContextRecall`, `FactualCorrectness`, and `SemanticSimilarity`. The evaluation
    results are stored in the `score_similarity` variable, which is then converted
    to a pandas DataFrame, `similarity_df`, using the `to_pandas()` method. We will
    do the same with the hybrid dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Once you have reached this point, the use of `ragas` is done! We have now performed
    a full evaluation of our two chains using `ragas`, and within these two DataFrames,
    `similarity_df` and `hybrid_df`, we have all of our metrics data. All we have
    left to do is analyze the data `ragas` provided.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing the ragas results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will spend the rest of this code lab formatting the data so that we can first
    save and persist it (because again, this can be a more expensive part of our RAG
    system). The rest of this code could be reused in the future to pull the data
    from the `.csv` files if you save them, preventing you from having to re-run this
    potentially expensive evaluation process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with setting up some important variables and then saving the data
    we’ve collected to CSV files:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: In this code, we first define a `key_columns` list containing the names of the
    key columns to be used for comparison. We then calculate the mean scores for each
    key column in `similarity_df` and `hybrid_df`, using the `mean()` method, and
    store them in `similarity_means` and `hybrid_means`, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we create a new DataFrame called `comparison_df` that compares the mean
    scores of the similarity run and the hybrid run. The `Difference` column is added
    to `comparison_df`, calculated as the difference between the mean scores of the
    similarity run and the hybrid run. Finally, we save the `similarity_df`, `hybrid_df`,
    and `comparison_df` DataFrames as `.csv` files. We will save the files again,
    and we can work from these files in the future without having to go back and re-generate
    everything.
  prefs: []
  type: TYPE_NORMAL
- en: Also, keep in mind that this is just one way to conduct the analysis. This is
    where you will want to get creative and adjust this code to conduct an analysis
    that focuses on the aspects you find important in your specific RAG system. For
    example, you may be focused solely on improving your retrieval mechanisms. Or,
    you could be applying this to data that is streaming from a deployed environment,
    in which case you likely have no ground truth and will want to focus on the metrics
    that can work without a ground truth (see the *Ragas founder insights* section
    later in this chapter for more information about that concept).
  prefs: []
  type: TYPE_NORMAL
- en: 'Moving on with this analysis, though, we now want to pull the files we saved
    back up to complete our analysis, and then print out our analysis of each of the
    stages of our RAG system across the two different chains:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: This section of the code will generate a set of metrics that we will examine
    further, as follows. We first load `DataFrames` from the CSV files we generated
    in the previous code block. We then apply an analysis that consolidates everything
    into easier-to-read scores.
  prefs: []
  type: TYPE_NORMAL
- en: 'We continue, using variables we defined in the previous code block to help
    generate plots with Matplotlib:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Here, we are creating subplots for each category with increased spacing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we will iterate over each of those categories and plot the corresponding
    metrics:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Most of this code is focused on formatting our visualizations, including plotting
    bars for both the similarity and hybrid runs, as well as adding values to those
    bars. We give the bars some color and even add some hashing to improve accessibility
    for the visually impaired.
  prefs: []
  type: TYPE_NORMAL
- en: 'We have just a few more improvements to make to the visualization:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: In this code, we add labels and the title to our visualization. We also adjust
    the spacing between the subplots and increase the top margin. Then, finally, we
    use `plt.show()` to display the visualization within the notebook interface.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, the code in this section will generate a text-based analysis that shows
    you results from both chains, and then it generates a visualization in the form
    of bar charts comparing the results. While the code will generate all of this
    together, we are going to break this up and discuss each part of the output as
    it relates to the main stages of our RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: 'As we discussed in previous chapters, RAG has two primary stages of action
    when it is engaged: retrieval and generation. When evaluating a RAG system, you
    can break down your evaluation by those two categories as well. Let’s first talk
    about evaluating retrieval.'
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Ragas provides metrics for evaluating each stage of the RAG pipeline in isolation.
    For retrieval, `ragas` has two metrics, called **context precision** and **context
    recall**. You can see this here in this part of the output and charts:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Performance comparison:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'You can see the chart for the retrieval metrics in *Figure 9.2*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.2 – Chart showing retrieval performance comparison between similarity
    search and hybrid search](img/B34736_09_02.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.2 – Chart showing retrieval performance comparison between similarity
    search and hybrid search
  prefs: []
  type: TYPE_NORMAL
- en: 'Retrieval evaluation is focused on assessing the accuracy and relevance of
    the documents that were retrieved. We do this with ragas using these two metrics,
    as described on the ragas documentation website:'
  prefs: []
  type: TYPE_NORMAL
- en: '`llm_context_precision_without_reference`: The signal-to-noise ratio of retrieved
    context. This metric evaluates whether all of the ground-truth-relevant items
    present in the contexts are ranked higher or not.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`context_recall`: Can it retrieve all the relevant information required to
    answer the question? `context_recall` measures the extent to which the retrieved
    context aligns with the annotated answer, treated as the ground truth. It is computed
    based on the ground truth and the retrieved context, and the values range between
    0 and 1, with higher values indicating better performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you come from a traditional data science or information retrieval background,
    you may recognize the terms *precision* and *recall* and be wondering whether
    there is any relation to those terms. The context precision and context recall
    metrics used in ragas are conceptually similar to the traditional precision and
    recall metrics.
  prefs: []
  type: TYPE_NORMAL
- en: In traditional terms, precision measures the proportion of retrieved items that
    are relevant, while recall measures the proportion of relevant items that are
    retrieved.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, context precision evaluates the relevance of the retrieved context
    by assessing whether the ground-truth-relevant items are ranked higher, while
    context recall measures the extent to which the retrieved context covers the relevant
    information required to answer the question.
  prefs: []
  type: TYPE_NORMAL
- en: However, there are some key differences to note.
  prefs: []
  type: TYPE_NORMAL
- en: Traditional precision and recall are typically computed based on a binary relevance
    judgment (relevant or not relevant) for each item, whereas context precision and
    recall in `ragas` consider the ranking and alignment of the retrieved context
    with respect to the ground-truth answer. Additionally, context precision and recall
    are specifically designed to evaluate the retrieval performance in the context
    of question-answering tasks, taking into account the specific requirements of
    retrieving relevant information to answer a given question.
  prefs: []
  type: TYPE_NORMAL
- en: When looking at the results from our analysis, we need to keep in mind that
    we are using a small dataset for our ground truth. In fact, the original dataset
    our entire RAG system is based on is small, and that could also impact our results.
    Therefore, I wouldn’t read too much into the numbers you are seeing here. But
    what this does show you is how you can use ragas to run an analysis and then provide
    a very informative representation of what is happening in the retrieval stage
    of our RAG system. This code lab is primarily to demonstrate real-world challenges
    you will likely encounter when building a RAG system, where you have to consider
    different metrics in the context of your specific use case, the trade-offs between
    those different metrics, and having to decide which approach fits your needs in
    the most effective way.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will review a similar analysis in the generation stage of our RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: Generation evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As mentioned, `ragas` provides metrics for evaluating each stage of the RAG
    pipeline in isolation. For the generation stage, `ragas` has two metrics, called
    faithfulness and answer relevancy, as you can see here, in this part of the output
    and the following chart:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'The generation metrics can be seen in the chart in *Figure 9.3*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.3 – Chart showing the generation performance comparison between
    similarity search and hybrid search](img/B34736_09_03.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.3 – Chart showing the generation performance comparison between similarity
    search and hybrid search
  prefs: []
  type: TYPE_NORMAL
- en: 'Generation evaluation measures the appropriateness of the response generated
    by the system when the context is provided. We do this with `ragas` using the
    following two metrics, as described in the `ragas` documentation:'
  prefs: []
  type: TYPE_NORMAL
- en: '`faithfullness`: How factually accurate is the generated answer? This measures
    the factual consistency of the generated answer against the given context. It
    is calculated from the answer and the retrieved context. The answer is scaled
    to a (0-1) range, with a higher score being better.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`answer_relevancy`: How relevant is the generated answer to the question? Answer
    relevancy focuses on assessing how pertinent the generated answer is to the given
    prompt. A lower score is assigned to answers that are incomplete or contain redundant
    information, and higher scores indicate better relevancy. This metric is computed
    using the question, the context, and the answer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Again, I want to reiterate that we are using a small dataset for our ground
    truth and dataset, which likely makes these results less reliable. But you can
    see here how these results form the foundation for providing a very informative
    representation of what is happening in the generation stage of our RAG system.
  prefs: []
  type: TYPE_NORMAL
- en: This leads us to our next set of metrics, the end-to-end evaluation metrics,
    which we’ll discuss next.
  prefs: []
  type: TYPE_NORMAL
- en: End-to-end evaluation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Beyond providing the metrics for evaluating each stage of the RAG pipeline
    in isolation, `ragas` provides metrics for the entire RAG system, called end-to-end
    evaluation. For the generation stage, `ragas` has two metrics, called **answer
    correctness** and **answer similarity**, as you can see here, in the last part
    of the output and charts:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'The chart in *Figure 9.4* shows the visualization for these results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.4 – Chart showing end-to-end performance comparison between similarity
    search and hybrid search](img/B34736_09_04.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9.4 – Chart showing end-to-end performance comparison between similarity
    search and hybrid search
  prefs: []
  type: TYPE_NORMAL
- en: 'End-to-end metrics are for evaluating the end-to-end performance of a pipeline,
    gauging the overall experience of using the pipeline. Combining these metrics
    provides a comprehensive evaluation of the RAG pipeline. We do this with `ragas`
    using the following three metrics, as described in the `ragas` documentation:'
  prefs: []
  type: TYPE_NORMAL
- en: '`factual_correctness`: Gauges the accuracy of the generated answer when compared
    to the ground truth. The assessment of factual correctness involves gauging the
    accuracy of the generated answer when compared to the ground truth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`semantic_similarity`: Assesses the semantic resemblance between the generated
    answer and the ground truth. Semantic similarity pertains to the assessment of
    the semantic resemblance between the generated answer and the ground truth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`answer_similarity`: Assesses the semantic resemblance between the generated
    answer and the ground truth. The concept of answer semantic similarity pertains
    to the assessment of the semantic resemblance between the generated answer and
    the ground truth. This evaluation is based on the ground truth and the answer,
    with values falling within the range of 0 to 1\. A higher score signifies a better
    alignment between the generated answer and the ground truth.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluating the end-to-end performance of a pipeline is also crucial, as it directly
    affects the user experience and helps to ensure a comprehensive evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: To keep this code lab simple, we left out a couple more metrics you might also
    consider in your analysis. Let’s talk about those metrics next.
  prefs: []
  type: TYPE_NORMAL
- en: Other component-wise evaluation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Component-wise evaluation involves evaluating individual components of the
    pipeline, such as the retrieval and generation stages, to gain insights into their
    effectiveness and identify areas for improvement. We already shared two metrics
    for each of these stages, but here are a couple more that are available on the
    `ragas` platform:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Context relevancy**: This metric gauges the relevancy of the retrieved context,
    calculated based on both the question and contexts. The values fall within the
    range of (0-1), with higher values indicating better relevancy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context entity recall**: This metric gives the measure of recall of the retrieved
    context, based on the number of entities present in both reference data and context
    data relative to the number of entities present in the reference data alone.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Aspect critique**: Aspect critique is designed to assess submissions based
    on predefined aspects such as harmlessness and correctness. Additionally, users
    have the flexibility to define their own aspects for evaluating submissions according
    to their specific criteria. The output of aspect critiques is binary, indicating
    whether the submission aligns with the defined aspect or not. This evaluation
    is performed using the “answer” as input.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These additional component-wise evaluation metrics offer further granularity
    in assessing the retrieved context and the generated answers. To finish off this
    code lab, we are going to bring in some insights that one of the founders of `ragas`
    provided directly to help you with your RAG evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Founder’s perspective**'
  prefs: []
  type: TYPE_NORMAL
- en: In preparation for this chapter, we had a chance to talk with one of the founders
    of `ragas`, Shahul Es, to gain additional insights into the platform and how you
    can better utilize it for RAG development and evaluation. `Ragas` is a young platform,
    but as you have seen in the code lab, it already has a solid foundation of metrics
    that you can implement to evaluate your RAG system. But this also means `ragas`
    has a lot of room for growth; this platform, which is built specifically for RAG
    implementations, will continue to evolve. Shahul provided some helpful tips and
    insights that we will summarize and share with you here. We share notes from that
    discussion in the following section.
  prefs: []
  type: TYPE_NORMAL
- en: Ragas founder insights
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The following is a list of notes taken from a discussion with ragas co-founder
    Shahul Es, discussing how ragas can be used for RAG evaluation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Synthetic data generation**: The first roadblock people typically face with
    RAG evaluation is not having enough testing ground-truth data. Ragas’ main focus
    is to create an algorithm that could create a test dataset that covers a wide
    variety of question types, resulting in their synthetic data generation capabilities.
    Once you have used ragas to synthesize your ground truth, it is helpful to vet
    the ground truth generated and pick out any questions that don’t belong.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feedback metrics**: Something that is currently being emphasized in their
    development is incorporating various feedback loops into the evaluation, from
    both performance and user feedback, where there are explicit metrics (something
    went wrong) and implicit metrics (levels of satisfaction, thumbs up/down, and
    similar mechanisms). Any kind of interaction with the user can potentially be
    implicit. Implicit feedback can be noisy (from a data standpoint), but can still
    be useful if used properly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reference and reference-free metrics**: Shahul categorized the metrics into
    reference metrics and reference-free metrics, where reference means it requires
    a ground truth to process. The ragas team places emphasis on building reference-free
    metrics in their work, which you can read more about in the ragas paper ([https://arxiv.org/abs/2309.15217](https://arxiv.org/abs/2309.15217)).
    For many fields, where the ground truth is difficult to collect, this is an important
    point, as this makes at least some of the evaluation still possible. Faithfulness
    and answer relevance were reference-free metrics Shahul mentioned.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment evaluation**: Reference-free evaluation metrics are also ideal
    for deployment evaluation, where you are less likely to have a ground truth available.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These are some key insights, and it will be exciting to see where ragas development
    goes in the future to help us all continually improve our RAG systems. You can
    find the latest ragas documentation here: [https://docs.ragas.io/en/stable/](https://docs.ragas.io/en/stable/).'
  prefs: []
  type: TYPE_NORMAL
- en: That concludes our evaluation code lab using ragas. But ragas is not the only
    evaluation tool that is used for RAG evaluation; there are many more! Next, we
    will discuss some other approaches you can consider.
  prefs: []
  type: TYPE_NORMAL
- en: Additional evaluation techniques
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Ragas is just one of many evaluation tools and techniques available to evaluate
    your RAG system. This is not an exhaustive list, but in the following subsections,
    we will discuss some of the more popular techniques you can use to evaluate the
    performance of your RAG system, once you have obtained or generated ground-truth
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Bilingual Evaluation Understudy (BLEU)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: BLEU measures the overlap of n-grams between the generated response and the
    ground-truth response. It provides a score indicating the similarity between the
    two. In the context of RAG, BLEU can be used to evaluate the quality of the generated
    answers by comparing them to the ground-truth answers. By calculating the n-gram
    overlap, BLEU assesses how closely the generated answers match the reference answers
    in terms of word choice and phrasing. However, it’s important to note that BLEU
    is more focused on surface-level similarity and may not capture the semantic meaning
    or relevance of the generated answers.
  prefs: []
  type: TYPE_NORMAL
- en: Recall-Oriented Understudy for Gisting Evaluation (ROUGE)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ROUGE assesses the quality of the generated response by comparing it to the
    ground truth in terms of recall. It measures how much of the ground truth is captured
    in the generated response. For RAG evaluation, ROUGE can be used to evaluate the
    coverage and completeness of the generated answers. By calculating the recall
    between the generated answers and the ground-truth answers, ROUGE assesses how
    well the generated answers capture the key information and details present in
    the reference answers. ROUGE is particularly useful when the ground-truth answers
    are longer or more detailed, as it focuses on the overlap of information rather
    than exact word matches.
  prefs: []
  type: TYPE_NORMAL
- en: Semantic similarity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Metrics such as cosine similarity or **semantic textual similarity** (**STS**)
    can be used to evaluate the semantic relevance between the generated response
    and the ground truth. These metrics capture the meaning and context beyond exact
    word matches. In RAG evaluation, semantic similarity metrics can be used to assess
    the semantic coherence and relevance of the generated answers. By comparing the
    semantic representations of the generated answers and the ground-truth answers,
    these metrics evaluate how well the generated answers capture the underlying meaning
    and context of the reference answers. Semantic similarity metrics are particularly
    useful when the generated answers may use different words or phrasing but still
    convey the same meaning as the ground truth.
  prefs: []
  type: TYPE_NORMAL
- en: Human evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While automated metrics provide a quantitative assessment, human evaluation
    remains important for assessing the coherence, fluency, and overall quality of
    the generated responses compared to the ground truth. In the context of RAG, human
    evaluation involves having human raters assess the generated answers based on
    various criteria. These criteria may include relevance to the question, factual
    correctness, clarity of the answer, and overall coherence. Human evaluators can
    provide qualitative feedback and insights that automated metrics may not capture,
    such as the appropriateness of the answer tone, the presence of any inconsistencies
    or contradictions, and the overall user experience. Human evaluation can complement
    automated metrics by providing a more comprehensive and nuanced assessment of
    the RAG system’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: When evaluating a RAG system, it’s often beneficial to use a combination of
    these evaluation techniques to obtain a holistic view of the system’s performance.
    Each technique has its strengths and limitations, and using multiple metrics can
    provide a more robust and comprehensive evaluation. Additionally, it’s important
    to consider the specific requirements and goals of your RAG application when selecting
    the appropriate evaluation techniques. Some applications may prioritize factual
    correctness, while others may focus more on the fluency and coherence of the generated
    answers. By aligning the evaluation techniques with your specific needs, you can
    effectively assess the performance of your RAG system and identify areas for improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the key role that evaluation plays in building
    and maintaining RAG pipelines. We discussed how evaluation helps developers identify
    areas for improvement, optimize system performance, and measure the impact of
    modifications throughout the development process. We also highlighted the importance
    of evaluating the system after deployment to ensure ongoing effectiveness, reliability,
    and performance.
  prefs: []
  type: TYPE_NORMAL
- en: We introduced standardized evaluation frameworks for various components of a
    RAG pipeline, such as embedding models, vector stores, vector search, and LLMs.
    These frameworks provide valuable benchmarks for comparing the performance of
    different models and components. We emphasized the significance of ground-truth
    data in RAG evaluation and discussed methods for obtaining or generating the ground
    truth, including human annotation, expert knowledge, crowdsourcing, and synthetic
    ground-truth generation.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter included a hands-on code lab where we integrated the ragas evaluation
    platform into our RAG system. We generated synthetic ground-truth data and established
    a comprehensive set of metrics to evaluate the impact of using hybrid search compared
    to the original dense vector semantic-based search. We explored the different
    stages of RAG evaluation, including retrieval evaluation, generation evaluation,
    and end-to-end evaluation, and analyzed the results obtained from our evaluation.
    The code lab provided a real-world example of implementing a comprehensive evaluation
    system in a RAG pipeline, demonstrating how developers can leverage evaluation
    metrics to gain insights and make data-driven decisions to improve their RAG pipelines.
    We were also able to share key insights from one of the founders of ragas to help
    your RAG evaluation efforts even further.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will start our discussion about how to utilize LangChain
    with the key components of RAG systems in the most effective way.
  prefs: []
  type: TYPE_NORMAL
