- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Utility AI with Text
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Words are the backbone of many human tasks in the creative production space:
    we write scripts, we gather feedback from clients, we brainstorm new ideas, we
    summarize, and we edit. Words are also key to many computer-focused tasks in creative
    applications—SRT files used for captions in video, and XML files that describe
    an editing timeline.'
  prefs: []
  type: TYPE_NORMAL
- en: Not all tasks that AI can help with should be classed as Utility AI, though.
    If text is being created from an idea, that’s Generative AI, covered in the very
    next chapter. And if you’re using AI for extensive processing tasks that drive
    your workflow, that’s Automation AI, and we’ll be covering that later in the book.
    Utility AI tasks are those that advise, help, or perform minor fixes, rather than
    doing your work for you.
  prefs: []
  type: TYPE_NORMAL
- en: As LLMs such as ChatGPT are based around text, they’re ideal for many text processing
    tasks. Tedious, time-consuming, and uncreative text jobs are likely to be something
    that an AI service of some kind can help with, and you’ll have many choices available.
    In fact, there are so many options, and they’re changing so quickly that it would
    be foolish to try to cover them all.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of focusing on specific applications, here, I’ll focus on the tasks.
    With that in mind, I’m still happy to recommend specific tools if they have unique
    contextual strengths, such as running on your local device or being integrated
    into the tools where you’re likely to need them.
  prefs: []
  type: TYPE_NORMAL
- en: For most general tasks—those taking a text file as input and producing text
    as output—feel free to try any LLM you wish. Remember that locally run LLMs carry
    fewer risks in terms of privacy, though they don’t tend to be as powerful.
  prefs: []
  type: TYPE_NORMAL
- en: 'The main tasks that I’ll be covering in this chapter are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Summarizing documents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grammar correction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Checking and verifying
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reformatting text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summarizing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Wouldn’t it be nice if long, boring documents could be made shorter? While not
    all creative production jobs involve large written documents, at some point you’ll
    inevitably encounter a wall of text that you don’t actually need to read word-for-word,
    and that’s where AI can help. Though I’ve classified this as Utility AI, this
    is a somewhat generative task—albeit one based heavily on provided input.
  prefs: []
  type: TYPE_NORMAL
- en: If a document is long, and you need to know the key points quickly, there’s
    nothing wrong with a quick summary to get you by. However, if a client has sent
    you detailed instructions on exactly how to fulfill their brief, it’s your job
    not only to read the whole document yourself, but to *read between the lines*
    to discover the best way to meet the client’s needs. Don’t be lazy! Take the time
    to read the whole thing, and you’ll do a better job.
  prefs: []
  type: TYPE_NORMAL
- en: This practice may seem obvious, but recent advertisements from a very well-known
    company featured their AI assistant summarizing a client’s brief because the creative
    couldn’t be bothered reading it. AI should never be used because you’re too lazy
    to do your job properly, but that doesn’t mean it has no use at all.
  prefs: []
  type: TYPE_NORMAL
- en: AI summaries today go far beyond long documents and can be found integrated
    with email applications and operating systems. **Apple Intelligence**, free with
    macOS, can summarize notifications and emails in the built-in Mail app, while
    Microsoft’s **Copilot** handles summaries in Outlook. It’s even possible to use
    a browser (such as Arc, Dia, or Comet) that includes AI features such as summarizing.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.1 – Holding the Shift key while hovering over a link produces an
    AI summary of the linked page in the Arc browser](img/B34247_05_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.1 – Holding the Shift key while hovering over a link produces an AI
    summary of the linked page in the Arc browser
  prefs: []
  type: TYPE_NORMAL
- en: 'Search engines include summaries too: **Google’s AI tools** summarize almost
    every Google search result, with the result that publishers have seen significant
    reductions in visits to their sites. Searchers are more likely to stay on Google
    than to follow the links to the original sources of information ([https://arstechnica.com/ai/2025/07/research-shows-google-ai-overviews-reduce-website-clicks-by-almost-half/](https://arstechnica.com/ai/2025/07/research-shows-google-ai-overviews-reduce-website-clicks-by-almost-half/)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.2 – Google’s own summary of its AI summarization feature](img/B34247_05_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.2 – Google’s own summary of its AI summarization feature
  prefs: []
  type: TYPE_NORMAL
- en: Sadly, these summaries often contain inaccuracies, famously once recommending
    including glue in pizza toppings ([https://www.techradar.com/computing/artificial-intelligence/googles-ai-overviews-are-often-so-confidently-wrong-that-ive-lost-all-trust-in-them](https://www.techradar.com/computing/artificial-intelligence/googles-ai-overviews-are-often-so-confidently-wrong-that-ive-lost-all-trust-in-them)).
    Worse, when used for product research, these summaries can be profoundly misleading,
    recommending products that don’t even exist, and failing to mention any issues
    with a product ([https://housefresh.com/beware-of-the-google-ai-salesman/](https://housefresh.com/beware-of-the-google-ai-salesman/)).
    Most people won’t click through to verify a summary as fact, but *you should*.
  prefs: []
  type: TYPE_NORMAL
- en: As is usually the case with AI, *mostly correct* can still be useful, as long
    as you can refer to the real text to verify any key points. An email summary that
    helps you spot a needle in a haystack is helpful, while an obviously inaccurate
    summary can be ignored. On the web, it’s always worth clicking through to the
    original source(s) quoted.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s return to summaries of long documents, as not all LLMs are equally good
    at this task. In a recent test, comparing summarizing functionality using technical
    articles, Gemini came out on top. Dan Russell ([https://groups.google.com/g/searchresearch-wednesday-challenge/c/t5AJTwBPvAY](https://groups.google.com/g/searchresearch-wednesday-challenge/c/t5AJTwBPvAY))
    used a simple prompt to compare Gemini 2.5 Pro, ChatGPT 4o, Claude 3.7 Sonnet,
    Grok, Perplexity, and NotebookLM:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: As most creative professionals won’t be working with technical articles, these
    specific results aren’t likely to be directly relevant, but it’s worth trying
    a similar experiment with your own files to see how much these models can vary
    from one another.
  prefs: []
  type: TYPE_NORMAL
- en: Models will continue to change and evolve. Also, remember that each time you
    run a query like this, you’ll receive slightly different results. AI is not entirely
    predictable, and if something fails, it can be worth simply trying once more.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompting an LLM**'
  prefs: []
  type: TYPE_NORMAL
- en: Prompts are important, and while a simple prompt is often enough, you’ll sometimes
    get better results by using complex prompts, specifying how many bullet points
    you want to be presented with, a maximum word count, or even asking for a summary
    in a specific format, such as “Introduction, Key Points, Conclusion.” These strategies
    will change between documents and with your own preferences, and many people are
    happy to offer their advice on advanced prompting—don’t be afraid to experiment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some people find it useful to explicitly define the LLM’s *role*, its *task*,
    and the desired *format* in each prompt. While it’s not always necessary to be
    this specific, if a prompt isn’t producing the right results, this **role task
    format** (**RTF**) concept will guide an LLM closer to your goals:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Role** is effectively a job title for the LLM, which will define the approach
    and tone it uses for its analysis'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Task** is the job you’re giving the LLM, and if you’re asking for text to
    be transformed, this can provide important context'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Format** is the output you hope to receive'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Combining all those for a summarization task, you could end up with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'The more specific you are with your prompts, the more likely you are to get
    what you want from an AI model—but not everyone agrees on the best strategy. As
    an example of one strategy that might work for you, here’s a YouTube video presenting
    a “prompt optimizer prompt”:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.youtube.com/watch?v=1r5Wa5hYBEw](https://www.youtube.com/watch?v=1r5Wa5hYBEw)'
  prefs: []
  type: TYPE_NORMAL
- en: Meeting summaries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In an office context, an Australian Government trial of Copilot found that senior
    employees were more likely to use the summarization tools, which makes sense,
    but almost everyone who attends meetings can benefit from summaries generated
    from searchable transcripts of those meetings.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of creative production, transcribing a client meeting will make sure
    you can recap any key points afterward, but a summary of the key discussion points
    will help you ensure you haven’t missed anything important. Imperfect is still
    helpful and transcribe-then-summarize services are quickly becoming normalized
    in medical and mental health services. Creatives who meet clients should follow
    suit, because it’s impossible for anyone to recall every key point from every
    meeting.
  prefs: []
  type: TYPE_NORMAL
- en: To get the most out of a meeting summary, read it soon after the meeting concludes,
    and check that all the key points are still fresh in your mind and have been correctly
    extracted. If anything’s missing, add it in yourself. If any hallucinations are
    present, remove them. It’s better than nothing, but if you don’t check it while
    it’s fresh, you can’t fix errors.
  prefs: []
  type: TYPE_NORMAL
- en: Book summaries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What about research? If you hope to gain new insights from a book, you’re not
    going to find them on the dust jacket, nor in an AI summary; details are important.
    Of course, there’s not enough time in the world to read every book. If you only
    have time to read one book on a subject, but must choose between several potential
    options, summaries might help you make a better decision as to which ones are
    worth your time.
  prefs: []
  type: TYPE_NORMAL
- en: While an LLM should be able to provide a meta-analysis of what a book covers
    and how well it’s been received, unsurprisingly, these summaries will not always
    be accurate. The more you know about a subject, the more likely you are to find
    fault with results in that field.
  prefs: []
  type: TYPE_NORMAL
- en: For example, I wrote a book about Final Cut Pro in 2020\. It’s still in print
    and regularly updated, and I know the field well. Asking ChatGPT “Which are the
    best books to read about Final Cut Pro?” does (happily) include my book, but the
    first beginner recommendation is for a software version not sold in over a decade,
    and the Apple Pro Training series recommendation is also years out of date.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.3 – Books about Final Cut Pro; yes, I’m biased, but there are clear
    flaws in this list](img/B34247_05_3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.3 – Books about Final Cut Pro; yes, I’m biased, but there are clear
    flaws in this list
  prefs: []
  type: TYPE_NORMAL
- en: If an AI can’t give a good answer about a subject I know well, why should I
    trust its answers on subjects I’m not as familiar with? Book recommendations on
    any other topic will sound as confident as this one did, but without specialist
    knowledge to confirm their accuracy, the advice could be wildly wrong. If at all
    possible, ask a human, in person or by reading real human opinions, because you
    can’t trust an AI completely.
  prefs: []
  type: TYPE_NORMAL
- en: Verification is key
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Summaries of content you can’t access can be problematic, while, of course,
    it’s easier to verify the accuracy of an email summary or a news article because
    you can read the email in full yourself. We are drowning in news, and any help
    to deal with the firehose of information is welcome, as long as it’s accurate.
  prefs: []
  type: TYPE_NORMAL
- en: To me, Apple’s Mail and Messages summaries are good enough to be useful, and
    I leave them turned on. But for a time, Apple wouldn’t create summaries of news
    articles, because soon after release, some summaries of news stories were incorrect.
  prefs: []
  type: TYPE_NORMAL
- en: Because misrepresenting a news source carries more reputational risk than misrepresenting
    a typical email, Apple has been cautious here, deactivating the feature and upgrading
    it before re-release. With the risk of inaccuracy in mind, if your email provider
    includes a summarization tool, try it out and see whether it’s useful for you.
  prefs: []
  type: TYPE_NORMAL
- en: If you need to synthesize the key points from long documents, any LLM should
    be able to help, and these results should be easily verifiable. For convenience,
    consider an AI browser if you do this often. As ever, confirm all details yourself,
    and if you can’t do that, be wary. Results that look good might not be accurate.
  prefs: []
  type: TYPE_NORMAL
- en: Grammar correction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Good writing is key to good communication, and this space is crowded with AI-powered
    options to help you avoid mistakes. While I might like to think I’m a capable
    writer, the tools built into macOS and common word processing applications routinely
    spot errors that I haven’t been able to train myself out of.
  prefs: []
  type: TYPE_NORMAL
- en: Some errors flagged by a grammar checker are straightforward, while in other
    cases, following their guidance would remove the flavor and style from a sentence.
    If you want to stand out as a writer, you need to maintain your own voice, and
    sometimes it’s best to prioritize that voice over strict technical correctness.
  prefs: []
  type: TYPE_NORMAL
- en: However, if you’re not yet confident enough in your own writing to disregard
    AI advice, feel free to take it. This advice is often worth considering, even
    if you ultimately decide to ignore it. For example, I want to retain the “own”
    in the first sentence of this paragraph, though grammar checkers flag it as redundant.
  prefs: []
  type: TYPE_NORMAL
- en: Most word processors have included some sort of grammar checker for many years,
    including a mix of heuristic-based and machine learning features. More modern
    options, such as the well-known **Grammarly** ([https://www.grammarly.com/](https://www.grammarly.com/)),
    are more heavily AI-based and go further in their suggestions. Often these suggestions
    are helpful, while at other times, they feel (at least to me) overly aggressive,
    trying to remove anything remotely quirky.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.4 – Grammarly’s Pro suggestion, which I chose to ignore](img/B34247_05_4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.4 – Grammarly’s Pro suggestion, which I chose to ignore
  prefs: []
  type: TYPE_NORMAL
- en: Help like this will be useful to a novice, but accepting all suggestions blindly
    can lead to bland, overly homogenized text. In creative writing, quirky can be
    good; not every document needs to be readable by every audience. Also somewhat
    problematic is a lack of context, because Grammarly sits on top of a word processor
    rather than truly living within it.
  prefs: []
  type: TYPE_NORMAL
- en: To be fair to Grammarly, their advertising mostly targets students and office
    workers, who have different needs from creative professionals. If you’re in creative
    production, the world needs more unique voices, and if I’d accepted every suggestion
    Grammarly made to me, it would have changed the intended meaning and tone. I’d
    recommend fixing errors, but be careful to maintain the flavour—sorry, flavor—of
    your own text.
  prefs: []
  type: TYPE_NORMAL
- en: Integrated grammar checkers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The tricky part about using AI to selectively improve your writing is that if
    you want it to be integrated into your writing platform of choice, you’ll have
    to be willing to tolerate a somewhat noisier writing experience. Common errors
    (such as you’re/your or its/it’s) should, of course, be corrected, and Word’s
    red squiggle has made fixing the most obvious errors easily correctable for some
    time.
  prefs: []
  type: TYPE_NORMAL
- en: Grammarly adds many more colored underlines that you may find distracting, but
    the trade-off is a reduction in friction. Right-clicking an issue means you can
    fix it in place rather than sending the entire document off to an LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Grammarly’s integrated approach places its fancy underlines into Word, Apple’s
    Notes app, and any apps that use Apple’s standard text services, among others.
  prefs: []
  type: TYPE_NORMAL
- en: Note that you may wish to block Grammarly from appearing in text processing
    apps such as BBEdit, because suggestions designed for standard English-language
    text are not always relevant when working with code, scripting, or markup files.
  prefs: []
  type: TYPE_NORMAL
- en: Another integrated option on Apple platforms, **Apple Intelligence,** is available
    in Apple’s own apps, and the **Proofread** feature offers at least basic grammar
    checking. (The **Rewrite** feature offers more extensive changes and will be examined
    in the next chapter.)
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.5 – Apple Intelligence’s Proofread, as seen in Notes on an iPad](img/B34247_05_5.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.5 – Apple Intelligence’s Proofread, as seen in Notes on an iPad
  prefs: []
  type: TYPE_NORMAL
- en: After you activate it, Proofread does a competent job of highlighting problems
    it plans to fix, and it’s possible to approve or dismiss each one in turn. While
    basic spellcheck works as it always has (hooray for red squiggles), this more
    extensive analysis only appears on request. It’s not “always on” like Grammarly,
    which helps if you find that approach too intrusive.
  prefs: []
  type: TYPE_NORMAL
- en: Word’s **Spelling and Grammar** check works as it has for many years now, but
    there is an AI assistant available too. Microsoft’s **Copilot** is built into
    Word (and other Office applications), but avoid the Copilot sidebar, as it isn’t
    actually well integrated into its parent app. The sidebar feels more like a separate
    app running alongside Word rather than an integrated feature. For better integration,
    select the text you’d like feedback on, right-click, choose **Copilot**, and then
    choose **Writing Suggestions**. It’s best to select at least a few paragraphs
    at once, because this will give Copilot more context for its feedback. To me,
    the suggestions here also stray a little too far into generative territory, and
    we’ll examine those in the next chapter of the book.
  prefs: []
  type: TYPE_NORMAL
- en: External grammar checkers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Of course, if you need only a specific sentence to be checked for grammar, Copilot
    would do fine, and in fact, many LLMs could be suitable if you’re happy to copy
    and paste.
  prefs: []
  type: TYPE_NORMAL
- en: If you are considering using an LLM, make sure that private data isn’t being
    used to train it, either by setting the appropriate preferences or by using a
    local LLM instead.
  prefs: []
  type: TYPE_NORMAL
- en: So, should you go the integrated path or not?
  prefs: []
  type: TYPE_NORMAL
- en: 'I would suggest that the end goal of using an AI-based grammar checker should
    be to improve your ability to write well in the first place. If you find that
    Grammarly helps you to do that—fantastic. But if you find its presence in your
    word processor intrusive, you could do far worse than Apple Intelligence’s Proofread,
    Microsoft’s Copilot, or simply send an entire document to an LLM and ask it for
    pointers. Here’s an example of sending a paragraph to Claude:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.6 – Claude’s feedback on this draft paragraph is mostly sound, but
    it doesn’t understand what I was doing with my em-dash](img/B34247_05_6.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.6 – Claude’s feedback on this draft paragraph is mostly sound, but
    it doesn’t understand what I was doing with my em-dash
  prefs: []
  type: TYPE_NORMAL
- en: 'That way, you’ll be explicitly told which sentences could be improved, clearly
    separating the *creating* and *editing* stages of writing, rather than ticking
    a “fix it for me” box as you go along. Here’s the same query sent to ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.7 – An earlier draft of the preceding paragraph, plus pointers on
    how to make it better](img/B34247_05_7.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.7 – An earlier draft of the preceding paragraph, plus pointers on how
    to make it better
  prefs: []
  type: TYPE_NORMAL
- en: If you’d prefer to give more context, ChatGPT can be fed a full document, and
    it will not only return a document with changes implemented but will tell you
    exactly what you got wrong. Claude told me most of my mistakes but didn’t offer
    a corrected file until I asked for one.
  prefs: []
  type: TYPE_NORMAL
- en: Sending a document to an LLM also scales nicely to larger production tasks.
    If you’ve been working with colleagues on a larger job, each writing your own
    section, an LLM will be able to take a meta-view, noting ways in which the tone
    or style of each separate part might differ. I’d still recommend performing final
    fixes by hand, but an AI’s opinion could be a great way to get started.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, you may wish to consider writing directly in an AI-focused writing tool,
    taking advantage of more advanced tools to assist with writing. As many of these
    tools tend toward GenAI, we’ll examine these in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: AI writing assistance is available in many forms. You may prefer to write and
    edit in separate passes, in which case you should experiment with different LLMs
    to see which one you prefer. If a more integrated approach suits you best, try
    Grammarly, Apple Intelligence, or a dedicated AI writing app.
  prefs: []
  type: TYPE_NORMAL
- en: 'Personally, while I appreciate the help of all these options, I’m not ready
    to trust any AI to produce perfect output every time, and I do want to know what
    I—or my transcription software—got wrong. It’s a common thread: AI is useful,
    but imperfect. Using one AI service to check and improve another AI service’s
    output is a smart way to minimize mistakes.'
  prefs: []
  type: TYPE_NORMAL
- en: That idea, asking an AI’s opinion, leads neatly into the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Checking and verifying
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: All kinds of plans, opinions, and stated facts are presented in the course of
    a creative job, and it’s certainly useful to be able to verify them quickly. As
    many verification queries can be expressed as text, it’s straightforward to ask
    an AI whether a work plan has flaws, whether an essay currently fails to cover
    any key points, or whether advice you’ve been given regarding a computer purchase
    is sound.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, a common thread has been that AI advice is fallible, so it’s going
    to be worth checking multiple different LLMs and following any links they cite.
    But if you think something’s probably correct and just need a quick second opinion,
    an LLM could fit the bill—of course, if there are no suitable humans around.
  prefs: []
  type: TYPE_NORMAL
- en: 'Presenting your text to an AI model is easy; you can copy and paste, upload
    a document, or use an integrated solution such as Grammarly. To test accuracy,
    I’ve presented an LLM with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: A bullet point summary of an early draft of key points I planned to write about
    in this chapter, and asked for feedback
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: An article I recently wrote about stereoscopic video, which I asked to check
    for accuracy
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Advice received about which Mac might be suitable for video editing tasks, and
    asked it to verify this
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A question about the standard amount of bleed on a print document
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A question about advice for a 4K video production workflow
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'These are all topics for which I can offer good advice myself, which puts me
    in a good position to judge accuracy. Happily, the high-level advice given on
    all of these was sound. Here are some notes on each in turn:'
  prefs: []
  type: TYPE_NORMAL
- en: The advice given about topics to cover in this chapter was solid, but as it
    didn’t understand the context of the structure of this book (Utility, Generative
    and Automation AI), its suggestions didn’t neatly fit into the Utility category.
    Still, if you’re planning to write any essay-style non-fiction content, an LLM
    can provide a useful sounding board to make sure you haven’t missed anything obvious.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.8 – ChatGPT had a few pointers, but without a broader context, its
    suggestions weren’t always useful](img/B34247_05_8.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.8 – ChatGPT had a few pointers, but without a broader context, its
    suggestions weren’t always useful
  prefs: []
  type: TYPE_NORMAL
- en: Claude was able to verify several points mentioned in the article and was able
    to provide verifiable links to articles online to back many of them. These included
    rules about how far apart to space two cameras, specialized hardware devices,
    and resolutions of cameras mentioned.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.9 – Claude had positive feedback on this article and found links
    to back it up](img/B34247_05_9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.9 – Claude had positive feedback on this article and found links to
    back it up
  prefs: []
  type: TYPE_NORMAL
- en: “Do I need a Mac with a Max or Ultra chip for video editing?” is a question
    frequently answered on social media, with nuanced answers that can be summarized
    as *you don’t need one for simpler editing, but it’ll help with complex tasks*.
    The answers given were accurate.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.10 – Claude knows enough about specs of current Mac models to answer
    this question well](img/B34247_05_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.10 – Claude knows enough about specs of current Mac models to answer
    this question well
  prefs: []
  type: TYPE_NORMAL
- en: This simple question is one that a digital designer moving into print might
    need answered, and the response is correct and comprehensive.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.11 – How much bleed is standard in print? I say, “Usually 3mm, follow
    the specs,” but this answer is comprehensive](img/B34247_05_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.11 – How much bleed is standard in print? I say, “Usually 3mm, follow
    the specs,” but this answer is comprehensive
  prefs: []
  type: TYPE_NORMAL
- en: This question proposes a bad workflow, involving using an old hard drive and
    deleting the source files at the end of the job. Both Claude and ChatGPT responded
    correctly, saying it was risky, then proposed better alternatives. Not all the
    advice was perfect, but it was a great step for further research.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.12 – This relatively complex question goes beyond what you can expect
    from a search engine, and the answer is more comprehensive than you’d get from
    a forum; very helpful](img/B34247_05_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.12 – This relatively complex question goes beyond what you can expect
    from a search engine, and the answer is more comprehensive than you’d get from
    a forum; very helpful
  prefs: []
  type: TYPE_NORMAL
- en: Imperfect advice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: That last point is worth digging into, because workflow questions can be tricky,
    and not all commenters agree on the correct way forward. I followed up with further
    questions, including `What if I'm working with 6K multicam sources in Final Cut
    Pro?` and then `Do I have to store the original media inside a Final Cut Pro library?`
    ChatGPT did very well, while Claude included some questionable (but commonly repeated)
    information.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.13 – Claude’s answer to a follow-up question wasn’t perfect, and
    the deeper you dig, the more you should be talking to a human](img/B34247_05_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.13 – Claude’s answer to a follow-up question wasn’t perfect, and the
    deeper you dig, the more you should be talking to a human
  prefs: []
  type: TYPE_NORMAL
- en: For example, Claude stated, “*Final Cut’s multicam clips create additional rendered
    files during sync and editing*,” while these features, optimized multicam clips
    and background rendering, are both optional. It also states, “*FCP creates optimized
    media and proxy files that can double your storage needs*,” which is technically
    correct, but makes the process sound like both formats are required, while usually
    one or the other is used.
  prefs: []
  type: TYPE_NORMAL
- en: In short, the explanation was mostly correct but had more flaws than ChatGPT’s.
    The only major flaw in ChatGPT’s output was assuming that a 6K master file is
    larger than a 4K ProRes 422 HQ, which isn’t true if a more compressed codec is
    used for initial capture.
  prefs: []
  type: TYPE_NORMAL
- en: So, is it worth using a common chatbot for verification purposes? I’d say yes…
    mostly. If you know enough about a topic to phrase a question thoroughly and correctly,
    you should be OK. Since graphic design, video, and audio questions have long been
    asked and answered by countless humans on countless forums, LLMs are able to synthesize
    correct answers to many timeless questions.
  prefs: []
  type: TYPE_NORMAL
- en: Because LLMs have been trained on all those forums, as long as you keep your
    queries relatively high-level, an LLM is likely to deliver the collective wisdom
    of the internet. However, the more specific an answer you need, the less accurate
    an LLM is likely to be—though they do pretty well overall.
  prefs: []
  type: TYPE_NORMAL
- en: For feedback on a complex document or a new workflow, LLMs certainly seem to
    be able to help. A human may be able to provide more specific answers, deeper
    insights, or an alternative approach, but the answers I’ve been given here have
    been useful and mostly accurate.
  prefs: []
  type: TYPE_NORMAL
- en: A related idea, asking an LLM to teach you how to perform a creative task, also
    has promise. Because you’re able to ask complex questions and follow them up with
    more detailed queries, an LLM can sometimes perform the role of a personalized
    tutor. Because there are overlaps with AI doing your work for you, we’ll return
    to the idea of using AI as a personal tutor in the *Automation AI with Digital
    Assistants and Agents* part of the book.
  prefs: []
  type: TYPE_NORMAL
- en: Another area that overlaps with the automation section of this book is moving
    text from one format to another.
  prefs: []
  type: TYPE_NORMAL
- en: Reformatting text
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: It’s relatively common to be given data in one format and need to transform
    it into another. When this is a task performed in bulk, it’s automation, and we’ll
    certainly look at that in more detail in a later chapter. But if it’s a one-off
    bespoke task, sometimes AI can help with a job you might otherwise spend a boring
    hour doing or perhaps outsource to a colleague who owes you a favor.
  prefs: []
  type: TYPE_NORMAL
- en: One basic, common design task is to clean up provided text or Word documents.
    As you may know from hard personal experience, graphic design apps expect you
    to separate paragraphs with only a single return and use only one space after
    a full stop. While there are preset GREP search patterns in Adobe InDesign to
    fix these issues, and even a script (`FindReplaceByList`) that runs them all at
    once, this is also the kind of task that AI excels at, fixing common typos along
    the way.
  prefs: []
  type: TYPE_NORMAL
- en: As a test, I gave the same short problematic Word document to three LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT did well, getting extra points for offering to create a new Word doc
    for me to download.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Claude went further in its corrections, correctly changing “em dash” to “em-dash.”
    However, it didn’t offer a Word doc in return.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gemini found most errors, but produced text without any paragraph breaks at
    all and didn’t offer a download option.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While this is a relatively basic task, what about something more complex? One
    task I’ve been faced with recently is having to renumber images in a book chapter
    after removing an image. A chapter might contain many images, each with a unique
    number in a caption, and if an early image, say *Figure 4.5*, were to be removed,
    all the images after that point must now be renumbered. The original Word document,
    including images, was 6.7MB. Can AI help with this boring job?
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT correctly figured out that subsequent numbers should be reduced by
    one:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 5.14 – This list of figures extended to Figure 4.45](img/B34247_05_14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.14 – This list of figures extended to Figure 4.45
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, it did a great job, offering a corrected Word document for download:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.15 – This is exactly what I’d want a digital assistant to offer](img/B34247_05_15.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.15 – This is exactly what I’d want a digital assistant to offer
  prefs: []
  type: TYPE_NORMAL
- en: Claude understood the problem and proposed the correct solution, but Claude
    can’t output a Word document, and with a free account, it couldn’t process the
    file either.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Gemini outright refused to help, saying it couldn’t edit the document:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 5.16 – I was surprised at the refusal to work with a Word document,
    but it was an issue here](img/B34247_05_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.16 – I was surprised at the refusal to work with a Word document, but
    it was an issue here
  prefs: []
  type: TYPE_NORMAL
- en: 'A common task when working with academic content is to change the format of
    citations. Because this is a fairly ordered, predictable job, you’d expect it
    to proceed smoothly, and with major LLMs, it does. This prompt was no trouble:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s Gemini’s output, though ChatGPT’s output was identical:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.17 – Gemini nailing a citation format conversion](img/B34247_05_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.17 – Gemini nailing a citation format conversion
  prefs: []
  type: TYPE_NORMAL
- en: 'However, a local LLM (Gemma 3) failed completely on this task, not transforming
    the text at all, though it was confident of its success, apologized when told
    of its failure, and then failed again. A local copy of DeepSeek did better, but
    failed to list the day and month of publication before the words “*Available from*”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.18 – A distilled, local DeepSeek not quite getting there](img/B34247_05_18.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.18 – A distilled, local DeepSeek not quite getting there
  prefs: []
  type: TYPE_NORMAL
- en: Note that generating these original APA-format citations from just their URLs
    is covered in the next chapter, and it did not proceed as smoothly as you might
    hope.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s another one. What if you’ve been sent a somewhat casually-written list
    of names and positions, and you need to generate “lower thirds” title cards for
    these people in a video you’re producing? A short list won’t take too much time,
    but a longer task along these lines certainly can. Just ask an LLM to clean it
    up for you:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'ChatGPT gets it just right:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.19 – This list is only five names long, but sanitizing data would
    work with a longer list too](img/B34247_05_19.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.19 – This list is only five names long, but sanitizing data would work
    with a longer list too
  prefs: []
  type: TYPE_NORMAL
- en: Gemini was nearly there, but it put the surnames first in its final output.
    Still useful, and if you ask to swap the first and last names, it gets all the
    way there.
  prefs: []
  type: TYPE_NORMAL
- en: Most local LLMs aren’t quite there
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A local copy of **DeepSeek** can’t quite get the sorting right and doesn’t
    separate the title from the name, but it’s better than nothing. Unfortunately,
    asking the model to fix the error causes it to think for a full minute before
    making it worse:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.20 – How did the model throw one of the names away?](img/B34247_05_20.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.20 – How did the model throw one of the names away?
  prefs: []
  type: TYPE_NORMAL
- en: Another local model from Google, **gemma-3-12b**, did a similarly mixed job.
    It was able to extract the full names and produce a list, but it got the order
    wrong, just like DeepSeek.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.21 – Gemma’s output; useful, yet imperfect](img/B34247_05_21.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.21 – Gemma’s output; useful, yet imperfect
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, asking the model to re-sort the output didn’t quite work either;
    while the first two items were transposed, items 3 and 4 remained in the wrong
    order.
  prefs: []
  type: TYPE_NORMAL
- en: 'I also tried this query with the on-device AI model available in macOS 26 Tahoe,
    in the **Shortcuts** app. It failed in interesting ways, too:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.22 – Contractions were expanded, but the order is wrong](img/B34247_05_22.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.22 – Contractions were expanded, but the order is wrong
  prefs: []
  type: TYPE_NORMAL
- en: 'Happily, the local model released by OpenAI (**gpt-oss-20b**) was able to perform
    this task flawlessly:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.23 – The open version of ChatGPT seems to be more capable than other
    open models](img/B34247_05_23.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.23 – The open version of ChatGPT seems to be more capable than other
    open models
  prefs: []
  type: TYPE_NORMAL
- en: It seems clear that although local models preserve privacy and are free, they’re
    mostly not as powerful or reliable as the cloud-based models—although OpenAI’s
    effort bucks the trend and is worth downloading. For more complex tasks, if a
    cloud model can do the job quickly and you’re able to upload the data online,
    that’s likely to be more efficient.
  prefs: []
  type: TYPE_NORMAL
- en: Although the local models couldn’t quite get the order right, if you can ask
    for the data to be in a tabular format, such as CSV, it’s easy to open and sort
    the data in a spreadsheet such as Excel or Numbers. Also, if you’re struggling
    to get good results, consider showing the model an example of what you’re looking
    for.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.24 – Giving an AI an example of what you want from it is an easy
    way to improve its output](img/B34247_05_24.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.24 – Giving an AI an example of what you want from it is an easy way
    to improve its output
  prefs: []
  type: TYPE_NORMAL
- en: Export formats are key for production
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are many other text processing tasks that prove tedious for humans but
    that aren’t too much for an AI. For example, let’s say a client is changing the
    style of their documents. While they previously used just italics to indicate
    quotes, they’d now like to revert to a more standard pattern with “quote marks.”
    Can AI help? When asked, Claude thinks it can:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.25 – Claude suggests a good solution and seems to be on the right
    track](img/B34247_05_25.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.25 – Claude suggests a good solution and seems to be on the right track
  prefs: []
  type: TYPE_NORMAL
- en: While the offer is great, Claude can’t actually fix a Word document and provide
    it for download. Copying and pasting fixes manually isn’t that helpful, and while
    ChatGPT is capable, regularly uploading files isn’t really feasible on a free
    account.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, if you ask the major LLMs what they can take as input and provide as
    output, only ChatGPT can actually read **InDesign Markup Language** (**IDML**)
    files that could be useful in a graphic design workflow. It’s limited to text-based
    rather than binary formats, and while it sometimes offers to create IDML files,
    which can be opened in Adobe InDesign, this seems to be a hallucination.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s one example of a task I hoped would work:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.26 – This tedious, non-trivial task is something that ChatGPT is
    happy to attempt, but you’ll quickly need a paid account for file manipulation](img/B34247_05_26.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.26 – This tedious, non-trivial task is something that ChatGPT is happy
    to attempt, but you’ll quickly need a paid account for file manipulation
  prefs: []
  type: TYPE_NORMAL
- en: Right now, despite the confidence, this process fails. An IDML file was indeed
    created, and it did open in Adobe InDesign, but it looked identical to the file
    I uploaded. Curiously, when ChatGPT is asked explicitly what formats it can create,
    IDML files are not on the list—a shame, then, that it pretended the task was possible.
    While this is a dead end for now, it’s worth trying again in the future.
  prefs: []
  type: TYPE_NORMAL
- en: To be fair, IDML is a complex, compressed format, and many formats used in production
    are similarly tricky for a text-based system to work with. However, you may have
    more luck creating simpler formats, such as the text-based FCPXML files, which
    work with Final Cut Pro. Still, images, videos, and text files aren’t enough to
    get most jobs done, and not every file can be exported to a text-based format.
    Complex format support remains a serious roadblock between LLMs and creative production.
  prefs: []
  type: TYPE_NORMAL
- en: However, since input of IDML is possible, and any InDesign layout can be exported
    to IDML, you *can* ask ChatGPT to work with the text in your layouts. And since
    many editing applications can export to XML-based formats, you’ve got a fair chance
    of extracting any text from titles or clip names in a video timeline.
  prefs: []
  type: TYPE_NORMAL
- en: So far, ChatGPT has more export flexibility than the other leading LLMs, but
    as the field changes rapidly, I’d recommend running your own tests on your own
    files to see how they do. Start free, then move to paid (on a monthly basis to
    avoid lock-in) if you find it valuable. Do note that you’ll hit the limits of
    a free account fairly quickly with regular use, especially if you use analysis
    or upload large files.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you’re working with text, you’re in luck—AI can provide an assistant that’s
    pretty good at boring text processing jobs.
  prefs: []
  type: TYPE_NORMAL
- en: Summaries can save a decent amount of time, as long as you can avoid becoming
    so addicted to summaries that you skip all the details. You may end up using integrated
    summaries in your email application more than anything else, however.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grammar correction is a task that can be integrated or separated from the writing
    process, depending on your preferences, and while AI does enhance this process,
    it should be used with care.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Verification, especially when applied to common design workflows and questions,
    is a task for which AIs are well-suited. When you’re asking about facts near to
    your existing knowledge, you should be able to spot obvious issues but be careful
    not to stray too far from your expertise.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Text transformations can be a powerful time-saver in design and video workflows.
    Many text processing tasks are dull and too hard to automate by traditional means,
    so throw them to an AI. You just might have to start paying for the privilege.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With all these tasks, be sure to check the output carefully, and never simply
    copy and paste. These jobs might be on the less controversial side of AI, but
    if you present a hallucinated summary to a client as fact, the egg is on your
    face.
  prefs: []
  type: TYPE_NORMAL
- en: Next up, we’ll stay with text but shift gears to GenAI.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
