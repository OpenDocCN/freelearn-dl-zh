- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Generative AI in the Enterprise: Unlocking New Opportunities'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The rise of ChatGPT has been transformational for all of us, impacting our lives
    in various ways. While **generative AI** ( **GenAI** ) existed in the past and
    was widely used for applications such as synthetic data generation, this time
    it is different. ChatGPT provides us with an intuitive user interface to interact
    with these advanced models, revolutionizing the way we search for information
    and offering an effortless method to learn and retrieve knowledge. GenAI has proven
    to be transformational by reshaping how we work, decide, and innovate.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: It enhances productivity by making information retrieval easier than ever, while
    also automating routine tasks, such as drafting emails and creating summaries,
    leading to a significant boost in productivity.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Beyond productivity, it strengthens decision-making by serving as a reliable
    copilot, helping individuals brainstorm fresh ideas, uncover insights, and identify
    patterns that drive faster and more informed choices.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: On the enterprise front, multiple processes, such as customer engagement, new
    hire orientation, and brand strategies, are being transformed using GenAI. Technology
    is also being used to create intelligent apps that enable natural language interaction,
    personalized experiences, and quick delivery of new features.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Keeping all of this in mind, we explore the following key topics in this chapter:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: When to consider GenAI
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When not to consider GenAI
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Best practices for building GenAI solutions
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are some important definitions and disclaimers before we get started:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: GenAI is a field within AI that specializes in generating new data in the form
    of text, images, and other media.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Large language models** ( **LLMs** ) are advanced machine learning models
    designed to understand and generate human language. They are trained on vast amounts
    of text data. They are based on transformer architecture.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transformers use a mechanism called self-attention to focus on different parts
    of the input text, allowing the model to understand the context and relationships
    between words. This architecture enables LLMs to process longer sequences of text
    more efficiently than previous models.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Solution* and *system* in the context of LLMs are synonyms if you are using
    small or medium-sized models for your enterprise application.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We are covering the most common use cases, so we may miss a few unique to your
    organization.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: When to consider GenAI
  id: totrans-16
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Evaluating potential GenAI use cases is challenging. We get the urge to solve
    everything using GenAI, but obviously, that is impossible. We have been researching
    multiple frameworks to decide on meaningful GenAI use cases. We have divided the
    use cases into comprehension and generative applications, as follows:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Comprehension applications cover tasks that involve sentiment analysis, relationship
    extraction, intent classification, summarization, and so on. The focus area around
    these tasks is interpreting, organizing, and tagging data.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generative applications are more prevalent in an enterprise setting and involve
    generating new artifacts such as text or images. With the right prompts and fine-tuning,
    LLMs can produce the desired output through new code, images, text, and so on.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next section, we list some use cases.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Use cases of GenAI
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s explore a few use cases to understand the preceding classification:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '**5-star customer engagement** : Imagine this scenario: you are trying to book
    a flight through a chatbot, and the chatbot keeps misunderstanding your message.
    Wouldn’t that bother you? Wouldn’t you try talking to a human as soon as possible?
    I know I would! If this kept happening to all customers, the company would have
    to employ multiple human customer service representatives and might even lose
    a few customers.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Along with this, there is also a possibility that some representatives might
    be less experienced than others and might not know the answer to all questions.
    To get to those edge cases, they might go to their supervisor, who then needs
    to leave their current task at hand to answer the burning question from the customer.
    This is a common scenario in most call centers. If we look closely, this operating
    model has multiple problems:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Higher costs associated with employing different representatives and a few supervisors
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Information is not democratized, which means a few reps might know more than
    others, leading to a non-uniform customer experience
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Longer wait times for customers during holidays or busy seasons lead to chaos
    and decreased customer satisfaction
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now imagine a world where you don’t know whether you are talking to a human
    or AI, and your questions will be answered in seconds without a “human” in the
    loop. This is the definition of world-class customer service. With the advent
    of LLMs, this is achievable. The sophisticated technology allows you to build
    chatbots that can interpret human text accurately and provide the expected response
    in seconds. On top of that, LLMs can provide multilingual support.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'An AI-based solution reduces the traffic to customer service representatives,
    who can then provide 100% attention to only a few customers with complicated questions
    or situations. To achieve this within your organization, here are a few things
    you can start doing today:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: LLM systems are as good as their underlying data. Building a robust chatbot
    means training it on accurate and reliable internal documentation to reap the
    benefits of your investments. If you plan to deploy a chatbot in 2026, data strategy
    must be the top priority in 2025. This should include, but not be limited to,
    documentation on FAQs, edge cases, updated policy information, and price.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When deploying LLM-based solutions for customer experiences, it is best to perform
    detailed testing with a few customers before deploying a full-blown solution.
    This means starting with a few customers and analyzing their experiences through
    customer surveys or employing a human in the loop to monitor those conversations.
    This will help you identify the gaps and improve upon them. This should be paired
    with the LLM as a judge mechanism to ensure that you have robust evaluations that
    include humans in the loop as well as the LLM as a judge.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Along with the accuracy of the responses, it is also essential to monitor your
    LLM solution’s reactions to bad actors with malicious intent who, for example,
    try to get users’ credit card information or use inappropriate words. Monitoring
    responses for edge scenarios will help you tweak your system to block out such
    content and ensure a seamless customer experience.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI-based LLM solutions can’t replace all your customer service representatives
    on day 1. Think about an AI solution as a staff augmentation for the first few
    months or years. For example, an AI solution might reduce traffic to your human
    reps only by 3 to 5% when you start, but as the AI becomes smarter with constant
    feedback, this percentage will increase and you will experience productivity gains.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data democratization** : According to Accenture, businesses that adopt AI
    for data analysis report a 30% improvement in decision-making speed and a 20%
    increase in data-driven insights. Let’s take a scenario to understand this use
    case. Consider a data organization within your team that crunches data to produce
    results. You are an airline company interested in seeing the number of bookings,
    cancellations, and customer ratings during Thanksgiving for the last five years
    to be better prepared for the holiday season. One way for you to do this is to
    go to your data organization and ask them to prioritize this request. Often, data
    organizations are inundated with such requests and will usually put your request
    in a queue and provide a timeline, such as one week, to get back to you on the
    request. This puts you in a tight spot as the senior leadership might have asked
    for the analysis, and you might not have a week for this.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instead, think about an alternate world where all this information is fed into
    an LLM-based solution; any business user could ask these easy questions and get
    responses immediately. This is the definition of data democratization. You can
    also take this experience forward and provide visual representations from existing
    reports.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Another application within this realm is Text2SQL. It is also possible that
    your organization is not ready to launch the copilot solution discussed previously
    due to multiple reasons, such as a lack of clean data or resources. In that case,
    you can provide a copilot to your data team, which can write a SQL query for them
    based on inputs provided by the user through natural language. This will accelerate
    the process of getting data quickly and efficiently.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个领域内，另一个应用是 Text2SQL。也可能您的组织由于多种原因（如缺乏干净的数据或资源）尚未准备好推出之前讨论的副驾驶解决方案。在这种情况下，您可以为您的数据团队提供一个副驾驶，根据用户通过自然语言提供的输入为他们编写
    SQL 查询。这将加速快速高效地获取数据的过程。
- en: 'To achieve a Text2SQL use case within your organization, here are a couple
    of things you can do:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要在您的组织中实现 Text2SQL 用例，您可以采取以下几项措施：
- en: If you plan to build the solution in the cloud, the data must also reside there.
    Though it’s not mandatory, it can accelerate the development process, making it
    easier to connect to diverse data sources.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您计划在云端构建解决方案，数据也必须存储在那里。虽然这不是强制性的，但它可以加速开发过程，使连接到各种数据源变得更加容易。
- en: Identify the tables, BI reports, and their respective metadata that will be
    fed into the copilot solution. This is a great way to identify updated information
    for your LLM-based solution.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定将被输入副驾驶解决方案的表格、BI 报告及其相应的元数据。这是为基于 LLM 的解决方案识别更新信息的好方法。
- en: '**Democratizing information** : If your team members are still spending a lot
    of time getting the correct information (such as data, internal documentation,
    or email), it might be time to rethink whether that is the best use of everyone’s
    time. With the internet, information is already available in abundance and for
    free. However, with LLMs, it is available in a friendly user interface and in
    the most compact way possible. Deploying copilots within your organization and
    training them on your company’s data can ensure that information is available
    quickly, enhancing productivity.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信息民主化**：如果您的团队成员仍然花费大量时间获取正确信息（如数据、内部文档或电子邮件），可能需要重新考虑这是否是大家时间利用的最佳方式。随着互联网的发展，信息已经大量且免费地可用。然而，通过大型语言模型（LLMs），信息以友好用户界面和最紧凑的方式提供。在您的组织中部署副驾驶并对其公司数据进行培训，可以确保信息快速可用，从而提高生产力。'
- en: Let’s understand this with an example. You employed five new customer reps and
    provided them with appropriate training, but you can’t expect everyone to learn
    and grasp everything on day 1. If all the information were available to them via
    a copilot, where a customer asks a question they don’t know about and could quickly
    type it into the copilot chat to get a response, it would increase their learning
    curve and eliminate the need for another supervisor. Since your company created
    all the documentation and deployed copilots, the same information is available
    to everyone without the need to scour through hundreds of documents. This would
    also lead to faster customer responses, hence increasing brand loyalty.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个例子来理解这一点。您雇佣了五位新的客户代表，并为他们提供了适当的培训，但您不能期望每个人都能在第一天就学会并掌握所有内容。如果所有信息都通过副驾驶对他们可用，当客户提出他们不知道的问题时，他们可以快速将其输入副驾驶聊天以获得回应，这将提高他们的学习曲线并消除需要另一位主管的需求。由于您的公司创建了所有文档并部署了副驾驶，因此相同的信息对每个人都是可用的，无需翻阅数百份文档。这将导致更快的客户响应，从而提高品牌忠诚度。
- en: 'To begin implementing this within your organization, you can start with these
    actions:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的组织中开始实施此方案，您可以采取以下行动：
- en: Collect all the critical documentation and ensure it’s updated with the most
    recent information. Make sure there is a data ingestion pipeline that ensures
    that the most up-to-date information is fed to the AI system.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收集所有关键文档，并确保它们使用最新信息进行了更新。确保有一个数据摄取管道，确保将最新信息输入到 AI 系统中。
- en: Such copilots can be deployed enterprise-wide, but always start with the team
    that has the least sensitive data to get comfortable with the technology and then
    scale to all the teams.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些副驾驶可以在企业范围内部署，但始终从拥有最不敏感数据的团队开始，以熟悉技术，然后扩展到所有团队。
- en: '**Operational efficiency** : As per Forbes, 64% of businesses expect AI to
    increase productivity. We all know that some specific reports and processes must
    be run simultaneously and during the day. I have also seen analysts sending reports
    even while they are on vacation or, worse, at their weddings. This kind of dependency
    can prove to be catastrophic for an organization. With the availability of AI
    agents, they can quickly produce these defined reports and even send them to the
    right audience.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营效率**：根据《福布斯》杂志，64%的企业预计人工智能将提高生产力。我们都知道，一些特定的报告和流程必须在一天内同时运行。我也见过分析师在休假时发送报告，更糟糕的是，在他们的婚礼上。这种依赖性可能对组织造成灾难。有了AI代理的存在，他们可以快速生成这些定义良好的报告，甚至将它们发送给正确的受众。'
- en: Companies such as Tableau leverage LLMs to automate report generation and data
    visualization. By integrating LLMs such as Tableau GPT into their platform, Tableau
    users can automate report generation and data visualization effectively.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，Tableau这样的公司利用LLM来自动化报告生成和数据可视化。通过将LLM如Tableau GPT集成到其平台中，Tableau用户可以有效地自动化报告生成和数据可视化。
- en: 'Here’s how you can start applying this approach within your organization today:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是如何今天开始在您的组织中应用这种方法：
- en: Identify the top 3 or 4 workloads that are low risk but can be automated using
    LLM or agentic workloads by breaking them into well-defined steps.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定前3或4个低风险但可以通过将它们分解成定义良好的步骤使用LLM或代理工作负载自动化的工作负载。
- en: For example, every Monday, marketing files are dropped from an external vendor
    to a location, which is then loaded into your database. Some predefined questions
    are calculated from that data and sent to a specific group. This is a workflow
    with 3 or 4 fixed steps and can be automated via an agentic workload.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，每周一，营销文件从一个外部供应商传送到一个位置，然后该位置的数据被加载到你的数据库中。从这些数据中计算出一些预定义的问题并发送给特定群体。这是一个包含3或4个固定步骤的工作流程，可以通过代理工作负载实现自动化。
- en: The analyst who runs the identified workloads should be the person who validates
    the process and responses, so that they will be your SME.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行已识别工作负载的分析师应该是验证流程和响应的人，这样他们就会成为你的专家。
- en: '**Ramping up marketing efforts** : Marketing is an expensive undertaking for
    any company. But we all know it’s the secret driver behind the company’s revenue.
    Content creation and video editing take days and sometimes hours to strategize
    and implement. AI can help fast-track those efforts. Here is how:'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加大营销力度**：对任何公司来说，营销都是一项昂贵的活动。但我们都知道，它是公司收入的秘密推动力。内容创作和视频编辑需要花费几天甚至几个小时来策划和实施。AI可以帮助加速这些努力。以下是方法：'
- en: Text-to-speech and text-to-video technologies can be used to create customized
    avatars of the CEO/famous personalities, saving time and costs.
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本到语音和文本到视频技术可以用来创建CEO/名人定制的虚拟形象，节省时间和成本。
- en: Video editing/creation and content creation can be achieved in just a few hours
    rather than days. GenAI is great at “generating” any kind of data, such as images
    and video, hence this is a classic example where they can shine.
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频编辑/创建和内容创作可以在几小时内完成，而不是几天。GenAI擅长“生成”任何类型的数据，如图像和视频，因此这是一个它们可以大放异彩的典型例子。
- en: Hyper-personalization is enabled as personalized recommendations can be sent
    to customers more straightforwardly. This can be achieved by traditional machine
    learning recommendation systems or training a large/small language model through
    methods such as fine-tuning and agents, to name a few. We will cover this in detail
    in the upcoming chapters.
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过更直接地向客户发送个性化推荐，启用了超个性化。这可以通过传统的机器学习推荐系统或通过微调、代理等方法训练大型/小型语言模型来实现，仅举几个例子。我们将在接下来的章节中详细介绍。
- en: 'If you’re ready to put these ideas into action, here are some practical steps
    to get started:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经准备好将这些想法付诸实践，以下是一些开始实施的实用步骤：
- en: Identify the top 3 or 4 marketing workloads that require intensive resources
    or are challenging to implement. Analyze whether LLMs can be leveraged to automate
    these.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定前3或4个需要大量资源或难以实施的市场工作负载。分析是否可以利用LLM来自动化这些工作负载。
- en: To implement personalization, ensure that data containing past user behaviors
    is available in the proper format.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要实现个性化，确保包含过去用户行为的数据以适当的格式可用。
- en: '**Machine learning workloads** : Historically, for any predictive or forecasting
    use case, machine learning and statistical algorithms such as Random Forest, linear
    regression, ARIMA, and Holt-Winters were popular choices. However, with the advent
    of LLMs, they are being used to identify trends and patterns. LLMs can identify
    trends, correlations, and anomalies that might be elusive to traditional statistical
    models, providing businesses with a competitive advantage.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习工作负载**：历史上，对于任何预测或预测用例，机器学习和统计算法，如随机森林、线性回归、ARIMA和Holt-Winters，都是流行的选择。然而，随着LLM的出现，它们被用来识别趋势和模式。LLM可以识别传统统计模型可能难以捕捉的趋势、相关性异常，为企业提供竞争优势。'
- en: 'What are the reasons that enterprises prefer LLMs over machine learning for
    such use cases? Here are a few reasons:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 企业为何会偏好LLM而不是机器学习来处理此类用例？以下是一些原因：
- en: If the data is unstructured (e.g., customer reviews, chat logs, or legal documents)
    and you need to extract insights or generate predictions.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果数据是无结构的（例如，客户评论、聊天记录或法律文件），并且您需要提取见解或生成预测。
- en: When the relationships in the data require understanding nuanced language or
    complex dependencies.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当数据中的关系需要理解细微的语言或复杂的依赖关系时。
- en: When there is labeled data for training, LLMs can be used without extensive
    custom training. For example, Salesforce uses LLMs to predict customer churn based
    on factors such as historical purchase data and customer support interactions.
    This information is then used to identify customers at risk of churning and take
    action to prevent them from leaving.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当有用于训练的标记数据时，LLM可以在没有广泛定制训练的情况下使用。例如，Salesforce使用LLM根据历史购买数据和客户支持交互等因素来预测客户流失。然后，这些信息被用来识别有流失风险的客户，并采取措施防止他们离开。
- en: 'To make this actionable in your organization, consider the following:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 要在您的组织中实施这一行动，请考虑以下建议：
- en: If the data is structured, you might not even need LLMs, and you can stick to
    machine learning for traditional prediction and classification workloads
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果数据是有结构的，您可能甚至不需要LLM，可以坚持使用机器学习进行传统的预测和分类工作负载。
- en: LLMs can be pretty resource-intensive, so keep that in mind before committing
    to any solution
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM可能非常资源密集，因此在做出任何解决方案承诺之前请牢记这一点。
- en: '**Research and development** : Research can be a lonely field for many researchers.
    Think of AI as a smart intern who can discuss ideas, find similar research papers,
    perform complex mathematical computations, write proposals, and so on. It can
    share the burden of a researcher so that they can focus on high-value tasks. LLMs
    can also help solve complex challenges, which can fast-track the solution for
    complex problems.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研发**：对于许多研究人员来说，研究可能是一个孤独的领域。将AI视为一个聪明的实习生，它可以讨论想法、寻找类似的研究论文、执行复杂的数学计算、撰写提案等等。它可以分担研究人员的负担，使他们能够专注于高价值任务。LLM还可以帮助解决复杂挑战，从而加速复杂问题的解决方案。'
- en: 'Now that we have discussed some everyday use cases, here are a few best practices
    you can follow to implement the AI-based solution within your organization:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了一些日常用例，以下是一些您可以在组织内部实施基于AI的解决方案的最佳实践：
- en: Decide on the underlying platform (cloud provider) to build the solution as
    early as possible. This will help you make decisions regarding the data, API management,
    the scale of the solution, and so on. Most enterprises leverage model as a service
    from cloud platforms so that they don’t have to worry about the underlying infrastructure.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽早确定构建解决方案的基础平台（云服务提供商）。这将帮助您就数据、API管理、解决方案的规模等问题做出决策。大多数企业利用云平台提供的模型即服务，这样他们就不必担心底层基础设施。
- en: Your first LLM-based solution can break your trust with internal or external
    users. Choose the early adopters wisely and scale your solution slowly. Launching
    the solution to thousands of users can do more harm than good.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的第一个基于LLM（大型语言模型）的解决方案可能会破坏您与内部或外部用户之间的信任。明智地选择早期采用者，并缓慢地扩展您的解决方案。将解决方案推向成千上万的用户可能会弊大于利。
- en: Provide your users with a list of questions (prompts) for each use case. This
    will help them craft better prompts and get accurate responses. You can be creative
    and supply them through the user interface, such as “You may want to ask…” followed
    by a list of questions.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为每个用例提供用户的问题列表（提示）。这将帮助他们制定更好的提示并获得准确的响应。您可以发挥创意，并通过用户界面提供它们，例如“您可能想问...”后跟问题列表。
- en: Make your application model agnostic. As you have seen, providers launch new
    models, but that means they sometimes decommission older models, so you should
    not over-rely on one model. Choose a model that is within your reach and makes
    it easy to switch to a new model, if required. LLMs are commoditized now; it is
    how you provide the relevant context that determines the success of the application.
    Examples of context include your enterprise data or appropriate prompts.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build your A-team on day 1. This will include your human testers, data scientists,
    app developers, and the infrastructure/cloud team.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When building LLM solutions, consider data anonymization, strict access controls,
    and extreme measures such as confidential computing. These can help you safeguard
    your customers’ data and give auditors and legal authorities more confidence.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Set clear expectations for your business users. Though LLM solutions ease multiple
    pain points within the organization, they are still not a solution to all problems.
    Be clear about the launch timeline and the solution’s capabilities.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These best practices will ensure you get the required ROI for your GenAI solution.
    But how do you measure the “value” of this solution? In the next section, we will
    deep dive into how to achieve this.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Measuring the business value of your GenAI solution
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Understanding the business value of your GenAI solution is critical to getting
    appropriate funding and creating solutions that give us the required **return
    on investment** ( **ROI** ). Here are a few factors to quantify your gains:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '**Cost savings** : Measure hours recovered through automation and reduced errors.
    Here, the KPI can be the automation rate (percentage of automated tasks).'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Revenue increase** : Increased customer lifetime value and acquisition of
    new customers are identified by 5-star customer engagement and satisfaction.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Employee experience** : Internal surveys on satisfaction and productivity
    show that more time for creative work leads to happy employees and an improved
    retention rate. Here, the KPI could be the number of hours saved with the implementation
    of GenAI.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we examined a range of GenAI use cases that hold potential
    value for enterprises. While we aimed to present a broad spectrum, the list is
    intended as a general guideline rather than an exhaustive catalog. Recognizing
    the importance of securing funding and stakeholder interest, we also addressed
    the need to measure the ROI for these use cases. To that end, we discussed quantifiable
    factors such as cost, revenue impact, and employee experience.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will cover when not to consider GenAI for your enterprise workloads.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: When not to consider GenAI
  id: totrans-83
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'People often talk about how GenAI can be transformational for your organization;
    while that is true, there are also use cases where GenAI won’t add value to your
    firm. Here are a few scenarios to consider:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Purely mathematical analysis may not be the best fit for GenAI. Limited mathematical
    reasoning exists within models, but it is best to stick with predictive AI if
    you are trying to achieve large volumes of statistical data processing. GenAI
    best describes insights from numerical analysis or creates SQL queries in plain
    English. Still, you might not get value on running regression analysis or optimization
    from prompts alone. This was one of the first discoveries of model hallucinations
    when it was used for logical reasoning or numerical analysis. With the advent
    of advanced models, reasoning capabilities might improve over time, but where
    we stand now, it is best to avoid LLMs for mathematical analysis. Even though
    LLMs are becoming smarter every day with advanced reasoning capabilities, for
    solutions such as multi-variate data forecasting, it is important to either stick
    with classic machine learning or build a hybrid solution where machine learning
    is used for inferencing and LLMs are used for explanation of the inferencing and
    deriving additional information based on the results of the machine learning model.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 纯粹的数学分析可能并不适合GenAI。模型中存在有限的数学推理，但如果您试图实现大量统计数据处理，最好坚持使用预测AI。GenAI最好描述数值分析中的见解或用普通英语创建SQL查询。然而，仅凭提示进行回归分析或优化可能无法获得价值。这是模型在逻辑推理或数值分析中使用时首次发现模型幻觉的原因之一。随着高级模型的问世，推理能力可能会随着时间的推移而提高，但就目前而言，最好避免使用LLM进行数学分析。尽管LLM每天都在变得更聪明，具有高级推理能力，但对于多元数据预测等解决方案，重要的是要么坚持使用经典机器学习，要么构建一个混合解决方案，其中机器学习用于推理，LLM用于解释推理并基于机器学习模型的结果推导出更多信息。
- en: LLM-based solutions shouldn’t be treated as an end solution but rather as an
    ingredient to enhance existing solutions or workflows. It is easy to get attracted
    to “shiny new toys” and start building flashy demos to get funding, but the end
    goal is not to use AI because it’s trendy; rather, use it if it adds real business
    value. Hence, it is essential to always align your GenAI solution with the business
    goals to measure the ROI and show tangible impact. One of the examples of how
    LLM-based solutions aid traditional workflows is through improved product search
    due to metadata augmentation for products on retail websites.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于LLM的解决方案不应被视为最终解决方案，而应视为增强现有解决方案或工作流程的成分。很容易被“闪亮的新玩具”吸引，开始构建花哨的演示以获得资金，但最终目标不是因为AI潮流而使用它；而是如果它能增加真正的商业价值，那么使用它就很重要。因此，始终将您的GenAI解决方案与业务目标对齐，以衡量投资回报率并展示可衡量的影响。LLM基于的解决方案如何帮助传统工作流程的一个例子是通过零售网站上产品的元数据增强来改善产品搜索。
- en: When integrating LLMs with the existing application, create a robust integration
    plan. Your integration plan should include timelines for rollout and testing and
    a mitigation plan in case of last-minute failures and any future decommissioning
    of features that might be required. If the plan is not executed correctly, it
    can lead to poor customer experience and even loss of customers.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当将LLM与现有应用程序集成时，创建一个稳健的集成计划。您的集成计划应包括推出和测试的时间表，以及针对最后时刻失败和未来可能需要退役的任何功能的缓解计划。如果计划执行不当，可能会导致客户体验不佳，甚至失去客户。
- en: GenAI may also be a poor fit for your use case if the risks that come with it
    are unacceptable and cannot be effectively mitigated. These include unreliable
    outputs, data privacy, intellectual property, liability, cybersecurity, and regulatory
    compliance, alone or in combination.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果GenAI带来的风险不可接受且无法有效缓解，那么它可能不适合您的用例。这些风险包括不可靠的输出、数据隐私、知识产权、责任、网络安全和合规性，这些风险可能单独存在或组合出现。
- en: When making critical decisions, relying on GenAI can be risky. Current GenAI
    models are not built for reliable decision-making. Their outputs can be unpredictable,
    they often lack explainability, and they can’t model decisions clearly and explicitly
    to achieve desired outcomes. Traditional decision-making tools are more appropriate
    for tasks that require high-stakes decisions, such as financial investments or
    strategic business moves.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在做出关键决策时，依赖GenAI存在风险。当前的GenAI模型并非为可靠的决策而构建。它们的输出可能不可预测，通常缺乏可解释性，并且无法明确清晰地模拟决策以实现预期结果。传统的决策工具更适合需要高风险决策的任务，例如金融投资或战略商业行动。
- en: Planning tasks such as inventory optimization, field workforce scheduling, route
    optimization, financial portfolio optimization, pricing optimization, and resource
    allocation demand exact calculations and explicit decision modeling. GenAI models
    struggle with this level of precision and complexity. You’ll likely need optimization
    algorithms or simulation models for these use cases to handle detailed calculations
    and offer reliable solutions.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we explored how GenAI may not be suitable for tasks requiring
    precise mathematical reasoning, high-stakes decision-making, or exact optimization.
    It should be used to enhance existing workflows, rather than serve as a standalone
    solution, and must align with business goals to demonstrate ROI. Additionally,
    risks such as unreliable outputs, privacy concerns, and poor integration planning
    can outweigh its benefits in certain scenarios. In the next section, we will discuss
    a case study of building a successful GenAI solution.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Scenario – building a “chat with the data” use case
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Consider a Fortune 500 company deciding to build an internal chatbot to democratize
    data and its insights for business stakeholders. With this solution, business
    stakeholders can ask questions pertaining to the data, such as “What was the revenue
    for XYZ month for ABC product?” This “chat with the data” application can help
    them quickly get insights by conversing in natural language without the need for
    writing complex queries or code. This revolutionary approach eliminates the need
    for analysts to drop everything and prioritize queries from business stakeholders,
    freeing them from being available 24/7 to answer business queries. This way, any
    business user can get data on demand and feel empowered about their own business
    line.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are the challenges of deploying such a solution:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: Crafting prompts is crucial in these cases. Providing users with sample prompts,
    especially during the initial rollout, helps them get comfortable with prompting.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The solution improves based on user feedback, but not all users are proactive
    in providing feedback. Identifying a few power users in the initial months to
    gather feedback on responses is essential.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monitoring data drift is extremely important. Refreshing the data based on the
    original source’s refresh cadence ensures users receive the most updated information.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Involving stakeholders throughout the process is vital, but when gathering requirements,
    avoid boiling the ocean. Collect all requirements and create a phased approach
    to accommodate them as much as possible. Classify the requirements as “nice to
    have” and “must have.” As a data scientist, making that judgment call is crucial.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LLMs are great at understanding unstructured data, but sometimes understanding
    complex tables can be challenging as the AI system might not be able to capture
    the relationships between different columns within a table.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is what would make the solution successful:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Even though analysts are not involved 100%, they will still monitor the application
    to ensure it operates at the highest standards.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User feedback is collected diligently, and analysts spend time performing appropriate
    error analysis to determine which questions are answered correctly by the model
    and which are not. This helps them tweak the prompts, models, and so on.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The solution is rolled out in a phased manner, giving more control over the
    changes and allowing measurement of the lift from each change.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When chunking and indexing structured data, ensure you use the right technique
    to preserve the semantic relationship of the table.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Continuous measurement of business metrics ensures the AI system is heading
    toward the ROI. In this case, the ROI can be measured in terms of productivity,
    that is, the number of hours saved for each analyst to focus on other innovative
    tasks.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Set up data refresh pipelines to ensure data is refreshed at a fixed cadence
    and users always get the most relevant information.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rolled out in a phase-wise manner to ensure adequate buy-in and involvement
    from business stakeholders.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this scenario, we discussed how a Fortune 500 company can build an internal
    chatbot to simplify data access for business users, reducing analysts’ workloads.
    Success hinges on prompt design, phased rollout, stakeholder involvement, and
    continuous feedback. The ROI is measured through productivity gains and reliable
    data refresh pipelines. Now, let’s conclude the chapter with some best practices
    for building such AI solutions.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: Best practices for building GenAI solutions
  id: totrans-109
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Let’s end this chapter by discussing a few best practices for building GenAI
    solutions. We covered a few at the start of the chapter, but here are some additional
    things to consider:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '**Non-deterministic** : GenAI solutions are non-deterministic, so responses
    will not be 100% accurate. Set these expectations proactively with the users.
    You can reduce the hallucinations by grounding your model on your data or fine-tuning
    it, but you cannot completely eliminate the hallucinations. There are techniques
    that you can use, such as semantic caching for more deterministic output, but
    still, LLM-based systems are probabilistic systems.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Semantic caching is an advanced caching technique that stores and retrieves
    data based on meaning (semantics) rather than exact text matches. Unlike traditional
    caching, which only works when the query string is identical, semantic caching
    uses embeddings (vector representations of text) to understand the intent behind
    a query and match it to previously cached responses, even if the wording differs.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: 'Take the following example:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: '**Traditional cache:**'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “What is AI?” ≠ “What’s artificial intelligence?” Cache miss
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '**Semantic cache:**'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “What is AI?” ≈ “What’s artificial intelligence?” Cache hit
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: '**Data strategy** : This is still a critical element in the overall AI strategy.
    Spend time crafting the data strategy, ensuring the input data is in the right
    format, and set up data refresh before proceeding to build GenAI solutions.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据策略**：这仍然是整体AI策略中的一个关键要素。花时间制定数据策略，确保输入数据格式正确，并在构建生成式AI解决方案之前设置数据刷新。'
- en: '**Model testing** : Test different models based on your use case. LLMs are
    great, but small language models might suffice for your use case, saving you time
    and resources. Start with LLMs to establish baseline performance for your AI application,
    then try small language models. Compare the performance, and if small language
    models are not significantly off, you can choose them for your GenAI system.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型测试**：根据您的用例测试不同的模型。大型语言模型（LLMs）非常出色，但对于您的用例，小型语言模型可能就足够了，这样可以节省您的时间和资源。从LLMs开始，为您的AI应用建立基线性能，然后尝试小型语言模型。比较性能，如果小型语言模型没有明显偏离，您可以选择它们用于您的生成式AI系统。'
- en: '**Safety measures** : Implement robust safety measures to protect your applications
    against malicious attacks. Be proactive here.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全措施**：实施强大的安全措施以保护您的应用程序免受恶意攻击。在这方面要积极主动。'
- en: '**Scalability** : Design the solution for scalability. You might start with
    10 users but could have 10,000 in later years. Your GenAI solution should be nimble
    enough to accommodate this growth.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：设计可扩展的解决方案。您可能一开始只有10个用户，但几年后可能会有10,000个用户。您的生成式AI解决方案应该足够灵活，以适应这种增长。'
- en: All these best practices will help you succeed in your GenAI journey and have
    a seamless experience with your users.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些最佳实践都将帮助您在生成式AI之旅中取得成功，并与您的用户拥有无缝的体验。
- en: Summary
  id: totrans-123
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter introduced key GenAI concepts, including LLMs and their architecture,
    and explored practical enterprise use cases, such as customer engagement, data
    democratization, and operational efficiency. It outlined when GenAI may not be
    suitable, shared a case study on chatbot deployment, and emphasized best practices
    for implementation. We now understand how measuring the ROI through cost savings,
    revenue impact, and employee experience is essential for success.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了关键生成式AI概念，包括LLMs及其架构，并探讨了实际的企业用例，例如客户参与、数据民主化和运营效率。它概述了何时生成式AI可能不适用，分享了一个聊天机器人部署的案例研究，并强调了实施的最佳实践。我们现在了解到，通过成本节约、收入影响和员工体验来衡量投资回报率对于成功至关重要。
- en: In the next chapter, we will cover GenAI operations in detail and uncover how
    to bring GenAI applications to life.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将详细介绍生成式AI的运营，并揭示如何使生成式AI应用变得生动。
