- en: Lee, S. Y. “DNA Data Storage Is Closer Than You Think”. Scientific American.com.
    [https://www.scientificamerican.com/article/dna-data-storage-is-closer-than-you-think/](https://www.scientificamerican.com/article/dna-data-storage-is-closer-than-you-think/)
  prefs:
  - PREF_UL
