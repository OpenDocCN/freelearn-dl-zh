- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Real-World Applications and Case Studies
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 现实应用和案例研究
- en: In this chapter, we will present case studies showcasing successful platform
    transformations and the integration of platforms with business strategies. This
    chapter also shares some anti-patterns and stories of failed platform transformations
    that underscore the value of strategic planning and how enterprises with considerable
    heritage applications and legacy technologies can face disruptions. One of the
    ways we can succeed in the feedback and improvement aspects of DevOps is by capturing
    lessons from previous implementations and incorporating them to support current
    operations. This chapter also examines potential future technologies and solutions
    that have not yet been fully implemented. Reading this chapter will enable you
    to understand successful transformations, identify areas that can delay a transformation,
    and prepare for technological changes that will impact platforms.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将展示成功平台转型和平台与商业策略集成的案例研究。本章还分享了一些反模式以及失败的平台转型故事，强调了战略规划的价值以及拥有大量遗产应用程序和遗留技术的企业如何面对中断。我们可以通过从之前的实施中吸取教训并将其纳入当前操作来支持DevOps的反馈和改进方面的一种成功方式。本章还探讨了尚未完全实施的可能未来技术和解决方案。阅读本章将使你能够理解成功的转型，识别可能延迟转型的领域，并为影响平台的科技变革做好准备。
- en: In this chapter, you will explore the key elements that contribute to both successful
    and unsuccessful platform transformations. You’ll begin by understanding the components
    of a successful transformation, including how to establish meaningful metrics
    and track performance effectively. Then, you’ll examine the factors that lead
    to unsuccessful transformations, learn to identify leading and trailing indicators
    of failure, and gain insights into how to better prepare for change. Finally,
    you’ll delve into the role of evolving technology—understanding how it can impact
    a platform, when it’s appropriate to implement changes, and how leveraging the
    right technologies can drive long-term success.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将探索导致平台成功和失败的要素。你将从理解成功转型的组成部分开始，包括如何建立有意义的指标和有效跟踪绩效。然后，你将检查导致失败转型的因素，学习识别失败的领先和滞后指标，并深入了解如何更好地为变革做准备。最后，你将深入研究技术演变的作用——了解它如何影响平台，何时实施变革是合适的，以及如何利用正确的技术可以推动长期成功。
- en: 'We will be covering the following main headings:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下主要标题：
- en: Learning from successful platform transitions
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从成功的平台转型中学习
- en: Evaluating unsuccessful transformations
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估失败的转型
- en: Best practices for platform success
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台成功的最佳实践
- en: Innovating for new success
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为新的成功进行创新
- en: Making technology leaps
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现技术飞跃
- en: Learning from successful platform transitions
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从成功的平台转型中学习
- en: You must be able to identify a strategy based on clear inputs to ensure a successful
    platform transformation. Returning to the basics of what makes platforms succeed
    will prepare you to implement successful processes and technologies. The model
    we will evaluate here is the original pyramid that establishes capabilities for
    stability, security, adaptability, and scalability across functions for supporting,
    designing, developing, deploying, and operating (*Figure 8**.1*). The detailed
    discussion of this model occurred in [*Chapter 2*](B24465_02.xhtml#_idTextAnchor037).
    Each layer and pillar plays a critical role in developing successful platforms.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须能够基于清晰的输入识别策略，以确保平台转型的成功。回到使平台成功的基本要素，将帮助你实施成功的流程和技术。我们将评估的模型是建立能力以支持、设计、开发、部署和运营的原始金字塔，该金字塔确立了稳定性、安全性、适应性和可扩展性（*图8.1**）。关于此模型的详细讨论发生在[*第2章*](B24465_02.xhtml#_idTextAnchor037)。每一层和每一柱在开发成功平台中都发挥着关键作用。
- en: '![](img/B24465_02_04.jpg)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B24465_02_04.jpg)'
- en: 'Figure 8.1: DevSecOps pyramid'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1：DevSecOps金字塔
- en: When getting started with a new platform, there is an emphasis on the initial
    development, deployment, and operations while still ensuring you are adhering
    to the pillars of stability, security, adaptability, and scalability. It can be
    difficult to evaluate each area and assign detailed metrics as the requirements
    change from organization to organization. However, assigning an initial metric
    can help with determining practical barriers to improving a platform or moving
    to a different provider.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当开始使用一个新的平台时，重点在于初始的开发、部署和运营，同时确保你仍然遵循稳定性、安全性、适应性和可扩展性的支柱。由于组织之间的需求不同，评估每个领域并分配详细的指标可能很困难。然而，分配一个初始指标可以帮助确定提高平台或转向不同提供商的实际障碍。
- en: 'One standard metric used across multiple organizations is indicators to establish
    levels of performance. These include assessments such as availability on the network,
    response time to outages, query times for users, and resource utilization:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在多个组织中使用的标准指标是建立性能水平的指标。这些包括网络可用性、故障响应时间、用户查询时间和资源利用率等评估：
- en: '**Service-Level Agreements** (**SLAs**): These are strategic-level discussions
    between the customer and the provider.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务级别协议**（**SLAs**）：这是客户和提供商之间的战略级讨论。'
- en: '**Service-Level Objectives** (**SLOs**): These are the mid-level operational
    tasks to notify the organization when something exceeds bounds. Many organizations
    often skip these mid-level connected points, especially smaller companies.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务级别目标**（**SLOs**）：这些是中级运营任务，当某些指标超出界限时通知组织。许多组织经常跳过这些中级连接点，尤其是小型公司。'
- en: '**Service-Level Indicators** (**SLIs**): These are the first worker-level notifications
    about tasks within the system.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务级别指标**（**SLIs**）：这是系统内任务的第一级工作通知。'
- en: An example SLA might be 99% uptime, an SLO is to track routine uptime over a
    set increment, such as a week, while the SLI would be the current status indicator.
    Each would likely appear on dashboards.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子SLA可能是99%的可用性，SLO是跟踪一定增量（如一周）内的常规可用性，而SLI将是当前状态指示器。每个都可能会出现在仪表板上。
- en: Designing these elements requires understanding what the platform needs for
    success. While considering each element provides an excellent path to success,
    we tend to skip SLOs. Coming up with mid-level objectives can be difficult for
    small companies, and even in large companies, they become simply an aggregate
    of SLI information. These aggregates directly relate to the SLA, rather than establishing
    distinct fields. Instead of adding to the ability to identify and remediate issues,
    SLOs become a painful thought exercise for many individuals.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 设计这些元素需要了解平台成功所需的要素。虽然考虑每个元素为成功提供了绝佳的途径，但我们往往跳过了SLOs。对于小型公司来说，制定中级目标可能很困难，即使在大型公司中，它们也仅仅成为SLI信息的汇总。这些汇总直接关联到SLA，而不是建立独立的领域。相反，SLOs并没有增加识别和修复问题的能力，对于许多人来说，它们成为了一个痛苦的思想练习。
- en: The next section expands on some SLA formats to accelerate platform success.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将扩展一些SLA格式，以加速平台的成功。
- en: Service-level agreements for Platform Engineering
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平台工程的服务级别协议
- en: 'The goal of any SLA should be to set the overall objective for the service
    provided. In our designed and engineered platform, our top objectives are as follows:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 任何SLA的目标都应该是设定服务提供的整体目标。在我们设计和工程化的平台上，我们的主要目标如下：
- en: '**Development ease**: Measure the rate at which code is committed, new features
    are released, or code is replaced'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开发便捷性**：衡量代码提交的速度、新功能的发布或代码的替换率'
- en: '**Successful testing**: Evaluate test coverage, successful tests, or artifacts
    associated with release'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成功的测试**：评估测试覆盖率、成功的测试或与发布相关的工件'
- en: '**Push to production**: Evaluate how many expected features are released to
    customers'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推送到生产**：评估有多少预期功能被发布给客户'
- en: '**Real-time support elements**: Evaluate the time to recover after failure,
    time to upgrade, and response time for help-desk elements'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时支持元素**：评估故障后的恢复时间、升级时间和帮助台元素的反应时间'
- en: 'In establishing an SLA, six typical categories help ensure fidelity:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立SLA时，六个典型类别有助于确保一致性：
- en: '**Define**: Establish what the customer needs. Examples include 99% availability,
    less than 48 hours of downtime per year, 4 hours to respond to a support call,
    30 minutes to respond to an outage, multiple pipelines can run simultaneously,
    and all critical security vulnerabilities are remediated before production.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义**：确定客户的需求。例如，99%的可用性、每年少于48小时的停机时间、4小时内响应支持电话、30分钟内响应故障、多个管道可以同时运行，以及所有关键的安全漏洞在生产前都得到修复。'
- en: '**Document**: Create an interaction that regularly reports on SLA status. As
    these items are typically longer in duration, weekly, monthly, or quarterly reports
    are best as a summation of dashboard activity.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档**：创建一个定期报告SLA状态的交互。由于这些项目通常持续时间较长，因此每周、每月或每季度的报告作为仪表板活动的总结是最好的。'
- en: '**Agree**: Most critical to the SLA process is the agreement between the customer
    and producer that the agreed-upon SLAs measure the right metrics.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**同意**：对SLA过程来说，最重要的是客户和制造商之间就同意的SLA衡量正确的指标达成一致。'
- en: '**Monitor**: Any defined SLA requires monitoring. The monitoring itself occurs
    with the SLIs, but the SLA should define how monitoring occurs for each function.
    For example, the response to an outage might be per outage, or aggregated across
    multiple pipelines over time. Automated monitoring can reduce manual overhead,
    increasing the stability of the platform.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：任何定义的SLA都需要监控。监控本身是通过SLIs进行的，但SLA应该定义每个功能的监控方式。例如，对故障的响应可能是按故障进行的，或者随着时间的推移跨多个管道汇总。自动监控可以减少人工开销，提高平台的稳定性。'
- en: '**Measure**: The SLA should be defined to an acceptable level. While an initial
    SLA of less than 48 hours of downtime per year might be acceptable, noting downtime
    rates adds usability. If one has 30+ hours of downtime in the first quarter, the
    SLA might be inappropriately scaled.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测量**：SLA应该定义到一个可接受的水平。虽然每年少于48小时的初始SLA可能是可接受的，但记录停机率增加了实用性。如果第一季度有30多个小时的停机时间，SLA可能被不适当地扩展。'
- en: '**Report**: The SLA should include a reporting mechanism. An SLA that alerts
    the customer of potential lapses might be ineffective if a mechanism exists to
    remediate those lapses. This category relates to the monitor and document steps.
    Most important here is assessing when a problem exists where the customer requires
    notification and when issues are handled internally. For example, if the average
    ongoing outage time is 25 minutes, it might be valuable to identify the exceptions
    that exceed 30 minutes, as well as confirming the average.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**报告**：SLA应包括一个报告机制。如果存在一种补救这些缺陷的机制，那么一个会提醒客户潜在缺陷的SLA可能无效。这一类别与监控和文档步骤相关。这里最重要的是评估何时存在问题，客户需要通知，何时问题内部处理。例如，如果平均持续故障时间为25分钟，那么识别超过30分钟的异常以及确认平均值可能是有价值的。'
- en: All of these aspects are beneficial when it comes to establishing SLIs as well.
    Each SLI constitutes a measurement that contributes to the SLA. The most important
    aspect here is creating automated systems tracking for the different aspects.
    If you are tracking an outage, the SLI will show the time it started, the time
    it stopped, who handled the issue, and perhaps a tier level for how difficult
    the challenge was to fix. The SLI would also show availability at the current
    time, potentially aggregating into the overall SLA. While SLAs and SLIs provide
    a sound foundation, much can be learned through examining some successful scenarios
    of platform transformation.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立服务级别指标（SLIs）时，所有这些方面也都是有益的。每个SLI都是一个对SLA有贡献的测量指标。这里最重要的方面是创建自动化的系统来跟踪不同方面。如果你正在跟踪故障，SLI将显示故障开始的时间、停止的时间、处理问题的责任人，以及可能显示解决挑战难度的层级。SLI还会显示当前时间的可用性，可能汇总到整体SLA中。虽然SLA和SLIs提供了一个坚实的基础，但通过检查一些平台转型的成功案例，我们可以学到很多。
- en: Successful scenarios
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功场景
- en: Several commercial platforms have successfully delivered a customer platform
    and enhanced value through rapid production. We will look at some examples in
    this section.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 几个商业平台已经通过快速生产成功交付了客户平台并提升了价值。我们将在本节中查看一些示例。
- en: GitLab
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GitLab
- en: One of the best DevOps platforms on the market is GitLab. The company expanded
    from the initial open source model developed in 2011 to create a business model,
    GitLab Inc., in 2014\. The company uses a subscription model to offer differentiated
    product levels, although all are connected by similar SLAs and support. Gartner
    recognized GitLab as a leader in 2023 for their contributions to the DevOps Platform
    category. The company is entirely remote, with 1,800 team members across 60 countries
    and regions that support more than 1 million active users and 30+ million registered
    users.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 市场上最好的 DevOps 平台之一是 GitLab。该公司从 2011 年开发的初始开源模式扩展到 2014 年创建了一个商业模式，即 GitLab
    Inc.。公司使用订阅模式提供不同的产品级别，尽管所有产品都通过类似的 SLA 和支持相互连接。Gartner 将 GitLab 评为 2023 年 DevOps
    平台类别的领导者。该公司完全远程办公，拥有来自 60 个国家和地区的 1,800 名团队成员，支持超过 100 万活跃用户和 3000 万注册用户。
- en: What led to GitLab’s successful transformation was an emphasis on stability,
    security, adaptability, and scalability. GitLab’s transformation from the GitHub
    formats means many users are already familiar with the embedded tools. Including
    repository use as part of the basic pipeline framework emphasizes a continuation
    of previous skills. The basics for creating software with GitLab are the same
    as many students learn in computer science classes throughout high school and
    college.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 导致 GitLab 成功转型的是对稳定性、安全性、适应性和可扩展性的重视。GitLab 从 GitHub 格式转型意味着许多用户已经熟悉了内置工具。将仓库使用作为基本管道框架的一部分强调了技能的延续。使用
    GitLab 创建软件的基本方法与许多学生在高中和大学计算机科学课程中学到的相同。
- en: These features are then integrated with platform governance when using either
    a free or purchased platform version. Secrets can be embedded and shared within
    a project but not outside the project. Individual access accounts shape access,
    with organizations able to purchase a cloud-based system or local servers. At
    the same time, this allows for shared pipelines, running multiple pipelines, and
    analytics. Governance then links security automation to assist supply chain awareness
    and routine upgrades. Multiple security scans and tools are supported.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这些功能在使用免费或购买的平台版本时与平台治理集成。机密信息可以嵌入并在项目内部共享，但不能在项目外部共享。个人访问账户塑造了访问权限，组织可以购买基于云的系统或本地服务器。同时，这允许共享管道、运行多个管道和进行数据分析。治理随后将安全自动化与供应链意识以及常规升级联系起来。支持多种安全扫描和工具。
- en: 'In considering adaptability and scalability, GitLab offers faster CI pipeline
    builds by using previously constructed toolsets. These expansions augment speed
    and can build effective software that benefits the organizational value stream.
    The GitLab website contains numerous use cases of companies who have purchased
    their software and reached new heights:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑适应性和可扩展性时，GitLab 通过使用先前构建的工具集提供了更快的 CI 管道构建。这些扩展增加了速度，并能构建对组织价值流有益的有效软件。GitLab
    网站包含了许多公司购买其软件并达到新高度的使用案例：
- en: '**Lockheed Martin (defense aerospace)**: Pipeline build speed increased over
    80 times, thousands of Jenkins servers retired, and 90% less system maintenance
    time'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**洛克希德·马丁（国防航空航天）**：管道构建速度提高了 80 多倍，数千个 Jenkins 服务器退役，系统维护时间减少了 90%'
- en: '**CACI International (defense IT services)**: Security scanning speeds increased
    13 times, labor and admin costs reduced by over 90%, and consolidated over 7 tools
    into a common platform'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CACI 国际（国防 IT 服务）**：安全扫描速度提高了 13 倍，劳动力和管理成本降低了超过 90%，并将超过 7 个工具整合到一个通用平台上'
- en: '**NVIDIA (advanced hardware)**: Enabled growth of over 51% during the first
    year and 99% uptime delivered for the overall platform'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NVIDIA（先进硬件）**：在第一年实现了超过 51% 的增长，并为整体平台提供了 99% 的正常运行时间'
- en: '**Carfax (vehicle retail)**: Reduced the toolchain from 12 tools to a single
    instance focused on feature delivery, created a 20% deployment boost over multiple
    years, and 30% of vulnerabilities identified earlier in the SDLC with secret detection
    as well as container and dependency scanning'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Carfax（汽车零售）**：将工具链从 12 个工具减少到单个实例，专注于功能交付，在多年中创造了 20% 的部署提升，并在 SDLC 早期通过秘密检测以及容器和依赖项扫描识别了
    30% 的漏洞'
- en: Each of these companies experienced different successes. The common element
    between customers is that none had used a comprehensive platform before and integrating
    with GitLab created new success paths. Platforms are an enablement tool, allowing
    you to spend more time building and deploying software rather than focusing on
    platform construction.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这些公司都经历了不同的成功。客户之间的共同点是，他们之前都没有使用过综合平台，与GitLab的集成创造了新的成功路径。平台是一个赋能工具，让你有更多时间构建和部署软件，而不是专注于平台建设。
- en: One complaint about the GitLab platform is that while the code merges and pipelines
    work effectively, including the generative AI GitHub Copilot and the GitLab Duo
    application, the overall work management aspects are still lacking. The platform
    has incorporated GitLab Issues to mimic other work management systems but lacks
    some operational aspects. The platform expertly performs at the build and deploy
    levels, but operationalizing those functions to the larger organization still
    requires some work. One big gap is visualizing ongoing work through tools such
    as Scrum and Kanban boards or creating supplementary documentation for issues.
    Despite these issues, GitLab is an excellent example of a tool that sparked a
    platform design and then made that platform available to others as a completed
    woodshop, allowing a focus on needed items.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 关于GitLab平台的一个抱怨是，尽管代码合并和管道工作有效，包括生成式AI GitHub Copilot和GitLab Duo应用程序，但整体工作管理方面仍然不足。该平台已整合GitLab
    Issues来模仿其他工作管理系统，但缺乏一些操作方面。平台在构建和部署级别表现出色，但将这些功能应用于更大组织仍需要一些工作。一个很大的差距是通过Scrum和Kanban看板等工具可视化正在进行的工作，或为问题创建补充文档。尽管存在这些问题，GitLab仍然是工具激发平台设计并使该平台作为完整的木工坊对他人开放的优秀例子，允许关注所需项目。
- en: Netflix
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Netflix
- en: On the other side of the model, a well-known company that successfully integrated
    platforms into daily practices is Netflix. Netflix was one of the first adapters
    in the broader marketplace for successful container and automated system use.
    Many of the initial chaos engineering practices, such as the **Chaos Monkey**
    deployment, originated with Netflix. Chaos Monkey and associated tools, known
    as the **Simian Army**, test the operational Netflix environments for errors that
    have not yet occurred but are eventual possibilities.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型另一边，一个成功将平台整合到日常实践中的知名公司是Netflix。Netflix是更广泛市场上成功容器和自动化系统使用的首批适配器之一。许多最初的无序工程实践，如**混沌猴**部署，起源于Netflix。混沌猴及其相关工具，被称为**猴群**，测试了Netflix的操作环境，以查找尚未发生但最终可能发生的问题。
- en: In 2020, Netflix took on a significant tooling reversion to bring its development
    workforce into a stable platform. Brian Leathern led these transformations. He
    found that the microservices architecture originally used was becoming increasingly
    fragmented as the company expanded. The platform goals were to manage multiple
    services, enable discovery, and allow context switching. An example of a workflow
    that created a problem was using Bitbucket to review pull requests, Spinnaker
    to check deployment pipelines, and Jenkins to analyze build failures, and then
    having multiple internal tools for metrics regarding operational status. Every
    deployment required manual pushes between tools, rather than using a consistent
    platform.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年，Netflix进行了重大工具回归，以将开发人员团队带入一个稳定的平台。布赖恩·利瑟恩领导了这些转型。他发现，随着公司规模的扩大，最初使用的微服务架构变得越来越碎片化。平台的目标是管理多个服务，实现发现，并允许上下文切换。一个造成问题的流程示例是使用Bitbucket来审查拉取请求，Spinnaker来检查部署管道，以及Jenkins来分析构建失败，然后拥有多个用于操作状态指标的内部工具。每次部署都需要在工具之间手动推动，而不是使用一致的平台。
- en: These multiple interactions became increasingly complicated as the architecture
    continued to grow. Not only were the operational tools difficult to use, but the
    wide variety meant developers were often unaware of new tools and processes added
    to the overall chain. One team’s shortcuts on Bitbucket or Spinnaker, for example,
    might only appear in their local documentation. Further, solutions to common fixes
    were not distributed across the platform but only appeared in local implementations.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 随着架构的持续增长，这些多次交互变得越来越复杂。不仅操作工具难以使用，而且种类繁多意味着开发者往往不知道添加到整体链中的新工具和流程。例如，一个团队在Bitbucket或Spinnaker上的捷径可能只出现在他们的本地文档中。此外，常见修复的解决方案并没有在整个平台上分发，而只出现在本地实现中。
- en: Netflix started by building a platform architecture and moving into a federated
    platform **Minimum Viable Product** (**MVP**). A key aspect was not just moving
    existing experiences into a new platform, as might happen with a common **Single
    Sign-On** (**SSO**), but ensuring full integration so that the tools communicate
    with each other. This communication enabled viewing the entire SDLC, not just
    a small portion, from a development perspective. One innovative concept was the
    ability to use collections, selecting multiple elements within the platform to
    build a customized workflow. These workflows were then still visible from every
    level.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: Netflix从构建平台架构并过渡到联邦平台**最小可行产品**（**MVP**）开始。一个关键方面不仅仅是将现有体验迁移到新平台，就像常见的**单点登录**（**SSO**）那样，而是确保完全集成，以便工具能够相互通信。这种通信使得从开发的角度来看，可以查看整个SDLC，而不仅仅是其中的一小部分。一个创新的概念是能够使用集合，在平台中选择多个元素来构建定制的工作流程。然后，这些工作流程在所有级别上仍然可见。
- en: One key takeaway from Netflix’s experience, which remains ongoing, is that platforms
    must do more than consolidate business functionality. An effective platform must
    integrate workflows and create knowledge about new functions. During the transition,
    platform engineers must be able to show how the new platform reduces time and
    effort. The GitLab example showed multiple instances of reducing time and providing
    useful tools. A quick look through the Netflix TechBlog ([www.netflixtechblog.com](http://www.netflixtechblog.com))
    reveals the many challenges faced during their platform implementation, however.
    Overall, Netflix continues to be successful, with gross profit margins routinely
    exceeding 35% across multiple quarters.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 从Netflix的经验中得出的一个关键教训是，平台必须做的不仅仅是整合业务功能。一个有效的平台必须整合工作流程并创建关于新功能的知识。在过渡期间，平台工程师必须能够展示新平台如何减少时间和精力。GitLab的例子显示了多个减少时间和提供有用工具的实例。然而，快速浏览Netflix技术博客([www.netflixtechblog.com](http://www.netflixtechblog.com))可以发现，他们在平台实施过程中面临了许多挑战。总的来说，Netflix继续取得成功，多个季度的毛利润率通常超过35%。
- en: Successful transformations indicate clear wins for companies that have integrated
    Platform Engineering. Companies and organizations are always more willing to discuss
    successes than failures. Diving into unsuccessful transformations becomes more
    of an exercise in personal experiences with different instantiations rather than
    published use cases. The next section evaluates some aspects that lead to unsuccessful
    or incomplete transformations.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的转换表明，已经整合平台工程的公司获得了明显的胜利。公司和组织总是更愿意讨论成功而不是失败。深入分析失败的转换更多地成为个人对不同实例的个人体验的练习，而不是已发布的用例。下一节将评估导致失败或不完整转换的一些方面。
- en: Evaluating unsuccessful transformations
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估失败的转换
- en: 'Establishing SLAs and practical standards can lead to a successful transformation
    as you’ll be focusing on stability, security, adaptability, and scalability. But
    those same focuses can also derail the transformation. An overemphasis on one
    area can leave a platform with some areas where it is high-performing but allow
    the rest to remain seriously out of balance. Sometimes, an unsuccessful transformation
    can be a matter of opinion rather than a practical application. Small things such
    as **User Experience** (**UX**), tool integration, and update processes can matter
    when promoting a platform for internal or external use. Examples of these challenges
    are provided here:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 建立服务级别协议和实际标准可以导致成功的转换，因为您将专注于稳定性、安全性、适应性和可扩展性。但同样的关注点也可能导致转换失败。对某一领域的过度关注可能会使平台在某些方面表现出色，但允许其他方面严重失衡。有时，失败的转换可能是一个意见问题，而不是实际应用问题。在推广平台用于内部或外部使用时，小事情如**用户体验**（**UX**）、工具集成和更新流程可能很重要。以下是一些挑战的例子：
- en: '**Small challenges**: Examples of these are user happiness, tool integration,
    and update processes. These affect time to production, UX, and support ticket
    metrics.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**小挑战**：这些例子包括用户满意度、工具集成和更新流程。这些影响生产时间、用户体验和支持工单指标。'
- en: '**Large challenges**: Examples of these are lack of architecture and vision
    alignment, continually stuck in the in-progress stage, rather than done, with
    no working platform, separation from the user base, and no simple green-field
    to brown-field changes. In these cases, useful metrics are unavailable as users
    have not adopted platforms.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大型挑战**：这些挑战的例子包括缺乏架构和愿景的协调一致、持续停留在进行中阶段而不是完成，没有可工作的平台、与用户群体的分离，以及没有简单的绿色到棕色场的变化。在这些情况下，有用的指标不可用，因为用户尚未采用平台。'
- en: Recognizing potential challenges is a critical first step, but truly understanding
    those challenges is a required skill for a platform engineer. Each of these topics
    is discussed in detail in further sections.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到潜在挑战是至关重要的第一步，但真正理解这些挑战是平台工程师所需的一项技能。这些主题将在后续章节中详细讨论。
- en: Small challenges
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 小挑战
- en: These small challenges appear in the complete use case that follows on Atlassian.
    The reasons for this failure start with a poor UX based on developer unhappiness,
    high numbers of support tickets, and an increase in time to production. Fixing
    these issues requires making process and technical changes to the existing platform.
    Teams often fix these issues locally, but the challenge comes with communicating
    and integrating those fixes into the larger platform.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这些小挑战出现在以下Atlassian的完整用例中。导致这种失败的原因始于基于开发者不满意的糟糕用户体验、大量支持工单以及生产时间增加。解决这些问题需要对现有平台进行流程和技术上的改变。团队通常会局部解决问题，但挑战在于沟通和将这些修复整合到更大的平台中。
- en: Users can be finicky, and small changes in an existing platform can create high
    levels of consternation. Any movement of standard elements between different areas
    requires assessment through models such as alpha-beta implementations. Examples
    include changing repository structures, providing new tool options, or proliferating
    local shortcuts. These require allowing a few users to test a beta implementation
    and provide comments before broader dissemination. This alpha-beta model prevents
    large changes from stalling user production as a result of changing common paths
    without a solid path for new training and documentation. These example methods
    can help resolve user dissatisfaction while another effective indicator is support
    tickets submitted and resolved.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可能很挑剔，现有平台中的微小变化可能会引起高度的不满。在不同区域之间移动标准元素需要通过如alpha-beta实施等模型进行评估。例如，改变存储库结构、提供新的工具选项或推广本地快捷方式。这需要允许一些用户测试beta版本并提供反馈，然后再进行更广泛的推广。这种alpha-beta模型可以防止由于没有为新培训和文档制定明确路径而改变常见路径导致的大规模更改阻碍用户的生产。这些示例方法可以帮助解决用户的不满，而另一个有效的指标是提交和解决的支持工单。
- en: 'Support tickets should always be a significant indicator of platform experience.
    Lacking a comprehensive support team is a crucial indicator of an unsuccessful
    transformation. DevOps states that the team that builds software runs it, but
    expanding from small teams to large user bases can compromise these improvements.
    Effective support models have three levels to help maintain DevOps improvements:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 支持工单始终是平台体验的重要指标。缺乏全面的支撑团队是转型不成功的关键指标。DevOps表示，构建软件的团队运行它，但从小团队扩展到大型用户群体可能会损害这些改进。有效的支持模型有三个级别，以帮助维持DevOps的改进：
- en: '**Tier 1**: Questions about platform usage with information present in documentation'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一级**：有关平台使用的信息在文档中存在的问题'
- en: '**Tier 2**: Changes in configuration requiring administrator assistance'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二级**：需要管理员协助的配置更改'
- en: '**Tier 3**: Bugs or new features'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三级**：错误或新功能'
- en: To clarify, a bug occurs when something should work based on the original delivery
    but does not, and a feature refers to when a user wants something that is not
    included in the initial scope. With new platforms, the initial Tier 1 ticket numbers
    will be high, and then those numbers likely convert into more Tier 2 tickets as
    users become more familiar with operations. Tier 3 ticket numbers should always
    be low as bugs usually appear in development and testing, while new feature suggestions
    help design the next steps.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为了澄清，错误发生在根据原始交付应该工作但未工作的情况，而功能是指用户想要但最初范围不包括的东西。对于新平台，初始的第一级工单数量会很高，然后这些数量很可能随着用户对操作更加熟悉而转换为更多的第二级工单。第三级工单数量应该始终很低，因为错误通常出现在开发和测试中，而新功能建议有助于设计下一步。
- en: The last common small challenge occurs with tool integration and update processes.
    When discussing GitLab, we saw the ease with which files and code can easily be
    associated with projects, be transferred into pipelines, and reach production.
    In poor platforms, you might see code contained in different areas than documentation
    and work progress managed on different tools, lacking connection. For example,
    coding work might be carried out in one tool and code changes reported in a different
    management tool, rather than the two being connected. This gap means that when
    a developer submits and merges new code, they must enter a new system log changes.
    Changing systems can slow down production and impact observability for the entire
    team.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个常见的挑战发生在工具集成和更新过程中。当讨论GitLab时，我们看到了文件和代码如何轻松地与项目关联，转移到管道中，并达到生产状态。在较差的平台中，你可能会看到代码存储在不同的区域，而文档和工作进度由不同的工具管理，缺乏联系。例如，编码工作可能在一个工具中完成，而代码更改则报告在不同的管理工具中，而不是两个工具相互连接。这种差距意味着当开发者提交和合并新代码时，他们必须进入一个新的系统记录更改。改变系统可能会减慢生产速度并影响整个团队的可观察性。
- en: Following tool integration is the platform update process. Continually updating
    software with DevOps standards requires constant updates. Update management should
    either be transparent to the user or occur at set times. Transparency involves
    notifying users when updates occur and providing high-level information and links
    to more details. These updates can be functional changes linked to new tutorials
    or security updates, or even communicating backend changes to improve performance.
    Regular updates create rapport with users, informing users about when ticketed
    problems and basic fixes will be addressed. When new security patches are released,
    users may deluge support functions with requests for updates. Staying ahead of
    this creates an effective platform. Despite fixing small changes, many platforms
    struggle with more significant and extensive issues.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 工具集成之后是平台更新过程。持续使用DevOps标准更新软件需要不断的更新。更新管理应该对用户透明，或者发生在设定的时间。透明度包括在更新发生时通知用户，并提供高级信息和链接到更多详细信息。这些更新可以是功能更改，与新教程或安全更新相关，甚至可以沟通后端更改以改善性能。定期更新与用户建立联系，告知用户何时解决已记录的问题和基本修复。当发布新的安全补丁时，用户可能会向支持功能大量请求更新。提前应对这一需求可以创建一个有效的平台。尽管解决了小变化，但许多平台在更重大和广泛的问题上仍然存在挑战。
- en: Large challenges
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型挑战
- en: As mentioned earlier, large challenges can include poor integration between
    vision and architecture, inability to reach a production platform, lack of user
    response, and no brown-field to green-field model. Each of these poses a severe
    problem, with any one derailing production but a combination turning a good platform
    vision into a continuous resource drain. Addressing these requires coordination
    across an organization, confronting top-to-bottom and bottom-to-top issues. A
    common error that occurs is no communication or feedback in DevOps existing in
    verified and effective channels. This analysis goes back to Conway’s law, where
    systems produced by an organization tend to mirror the organization’s structure,
    with hierarchical organizations creating hierarchical tools and flat organizations
    creating flat models.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，大型挑战可能包括愿景和架构之间的不良集成，无法达到生产平台，缺乏用户响应，以及没有棕色地带到绿色地带模型。这些问题中的任何一个都可能导致生产中断，而它们的组合将把一个良好的平台愿景转变为持续的资源消耗。解决这些问题需要组织内部的协调，面对自上而下和自下而上的问题。一个常见的错误是DevOps中缺乏在验证和有效渠道中的沟通或反馈。这种分析回到了康威定律，即一个组织生产的系统往往反映了组织的结构，具有等级制的组织创造等级制的工具，而扁平化的组织则创造扁平化的模型。
- en: An inability to complete the transformation effectively is common. This happens
    most often when teams try to build their platform. The transformation vision starts
    with the effective planning converted to architecture demonstrated in early chapters.
    Teams often develop a vision of what they expect but lack an architectural plan.
    One example is teams that have comprehensive week-to-week delivery schedules and
    excellent five-year plans but lack the middle section where deliveries connect
    to the overall strategy. Some engineers jump from large problems to immediate
    solutions without architectural integration. The result is excellent code in many
    different areas but either no comprehensive integration or numerous manual shortcuts
    required for success.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 无法有效地完成转型是常见的问题。这种情况最常发生在团队试图构建他们的平台时。转型愿景始于在早期章节中展示的有效规划转化为架构。团队往往有一个期望的愿景，但缺乏架构计划。一个例子是那些有全面的周交付计划和优秀的五年计划的团队，但缺乏将交付与整体战略连接起来的中间部分。一些工程师在没有架构集成的情况下，从大问题跳到立即的解决方案。结果是，在许多不同的领域都有优秀的代码，但要么没有全面的集成，要么需要许多手动捷径才能成功。
- en: Another key factor can be misleading indicators during a standard metrics analysis.
    A platform may successfully enable one application to reach production but fail
    for others. While one application may deploy successfully, the Platform Engineering
    has failed. Successful platforms enable multiple applications to succeed by offering
    an integrated base with opinionated but not prescriptive solutions. Some companies
    can drive certain elements better on one platform than others, creating near-term
    success and long-term complications. We often see this appear on code-specific
    platforms such as Python or Java, or a function-specific one such as one for testing
    or security. These can be short-term fixes but fall short of the desired platform
    end goal.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键因素可能是标准指标分析中的误导性指标。一个平台可能成功地使一个应用程序达到生产状态，但其他应用程序却失败了。虽然一个应用程序可能部署成功，但平台工程已经失败了。成功的平台通过提供具有意见但非规定性解决方案的集成基础，使多个应用程序能够成功。一些公司可能在某个平台上比在其他平台上更好地推动某些元素，从而在短期内取得成功，但长期会带来复杂问题。我们经常看到这种情况出现在特定的代码平台，如Python或Java，或者特定的功能平台，如测试或安全。这些可能是短期解决方案，但不足以达到理想的平台最终目标。
- en: One of the first indications that a platform failed during a transformation
    is user response. Deploying the initial platform involves the engineering build,
    coordinating **Infrastructure as Code** ( **IAC**), and pushing products to production.
    When doing this, you must remember to measure the UX. Users tend to like using
    certain tools and functions. If you remove those functions, even if for a positive
    engineering outcome, users may decide not to use the platform. A common example
    is when platforms perform actions for the user without telling the user. This
    could result in the user duplicating code, for example, which could break the
    intended function. Platforms must focus on user happiness and be transparent in
    their functions. If we return to our woodshop example from [*Chapter 2*](B24465_02.xhtml#_idTextAnchor037),
    you could offer pre-cut wood lengths and demonstrate design elements, but users
    will want to see all the platform options. In technical terms, this can be as
    simple as offering a pull-down menu, or an approval button.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 转型过程中平台失败的一个早期迹象是用户反应。部署初始平台涉及工程构建、协调**基础设施即代码**（**IAC**）以及将产品推向生产。在这个过程中，你必须记住要衡量用户体验。用户倾向于喜欢使用某些工具和功能。如果你移除这些功能，即使是为了积极的工程结果，用户可能会决定不使用该平台。一个常见的例子是平台在未告知用户的情况下为用户执行操作。这可能导致用户重复代码，例如，这可能会破坏预期的功能。平台必须关注用户满意度，并在其功能上保持透明。如果我们回到第二章的木工店例子[*第2章*](B24465_02.xhtml#_idTextAnchor037)，你可以提供预切割的木材长度并展示设计元素，但用户会希望看到所有平台选项。从技术角度来说，这可以简单到提供下拉菜单，或者一个批准按钮。
- en: Another key area where many platforms fail is not offering sufficient instructions
    on use. This failure appears most commonly in changing brown-field to green-field
    solutions. Developers previously built an application and then want to migrate
    to a new platform. In building their application, developers may make choices
    that are no longer available. Good platforms must offer easy ways to align these
    models. Common failures in this area relate to programming languages, database
    schema, or testing versions. For example, an application may be promoted to production
    based on an earlier security test. The application no longer passes the pipeline
    when the platform includes the latest security versions. Notifying users of how
    development and production affects them and the associated platform solutions
    can mitigate these frustrations. Solution notification to users can be an area
    where GenAI solutions excel, automating the process rather than requiring manual
    solutions. The following two case studies are examples of where we have seen unsuccessful
    platform implementations.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 许多平台失败的另一个关键领域是未能提供足够的使用说明。这种失败最常见于将棕色地带解决方案转换为绿色地带解决方案。开发者之前构建了一个应用程序，然后希望迁移到新平台。在构建他们的应用程序时，开发者可能会做出不再可用的选择。好的平台必须提供轻松对齐这些模型的方法。这个领域的常见失败与编程语言、数据库模式或测试版本有关。例如，一个应用程序可能基于早期的安全测试被提升到生产环境。当平台包含最新的安全版本时，该应用程序不再通过管道。通知用户开发和生产如何影响他们以及相关的平台解决方案可以减轻这些挫折。向用户通知解决方案可以是一个GenAI解决方案表现优异的领域，自动执行该过程而不是需要手动解决方案。以下两个案例研究是我们看到的不成功的平台实施示例。
- en: Atlassian
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Atlassian
- en: Atlassian is known for offering one of the best starting points for companies
    managing a DevOps transformation. Tools such as Jira and Confluence are widespread
    throughout the commercial market. Jira offers a customized Kanban or Scrum solution
    that expands into project management across multiple levels. Some new instantiations
    of Jira Cloud even offer high-level management of multiple teams. Confluence offers
    documentation and notes that are fully interactive with the Jira solution and
    supplement those functions. However, in our opinion, Atlassian has a failed platform.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Atlassian以其为管理DevOps转型的公司提供最佳起点之一而闻名。Jira和Confluence等工具在商业市场广泛使用。Jira提供定制的看板或Scrum解决方案，该解决方案扩展到多级项目管理。一些Jira
    Cloud的新实例甚至提供对多个团队的高级管理。Confluence提供与Jira解决方案完全交互的文档和笔记，并补充这些功能。然而，据我们观察，Atlassian有一个失败的平台。
- en: The company offers integrated solutions with other functions such as Bitbucket
    to manage code and SonarQube to address security. While each function appears
    on the platform, they lack proper integration. Bitbucket is part of the Atlassian
    suite but SonarQube is a recommended plugin requiring additional integration.
    Users pull Jira tickets and releases into Confluence, and vice versa, but the
    mechanics tend to be convoluted. Jira tickets are not easily connected to Bitbucket
    outcomes or SonarQube reports. This discrepancy forces developers to move through
    multiple windows and cut and paste data to attain a single source of truth. These
    single sources are more easily obtained by other platforms.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 该公司提供与其他功能如Bitbucket管理代码和SonarQube解决安全问题的集成解决方案。虽然每个功能都显示在平台上，但它们缺乏适当的集成。Bitbucket是Atlassian套件的一部分，但SonarQube是一个推荐的插件，需要额外的集成。用户将Jira工单和发布版拉入Confluence，反之亦然，但机制往往很复杂。Jira工单难以与Bitbucket结果或SonarQube报告连接。这种差异迫使开发者需要在多个窗口之间移动并复制粘贴数据以获得单一的真实来源。这些单一来源在其他平台上更容易获得。
- en: At the same time, linking the issues is not always communicated across the platform,
    creating a challenging work environment. Visualizing change in status may require
    launching a new application rather than being observed within the current window.
    Working with actual code from Bitbucket but having to log changes in other features
    becomes very difficult for the average user. The platform problems begin with
    the advanced knowledge required and continue through difficult and needlessly
    complex administrative tools. Users often require multiple administrative passwords
    across each tool, rather than using a shared admin account for all responsibilities.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，问题链接并不总是跨平台传达，这创造了一个具有挑战性的工作环境。可视化状态的变化可能需要启动一个新应用程序，而不是在当前窗口中观察。使用 Bitbucket
    的实际代码，但需要在其他功能中记录更改，这对普通用户来说变得非常困难。平台问题始于所需的高级知识，并通过困难和过于复杂的行政工具继续下去。用户通常需要在每个工具中需要多个管理密码，而不是使用共享的管理账户来承担所有责任。
- en: One of the most common problems with Jira occurs in the workflow process. Bitbucket’s
    pipeline elements do not automatically mirror to Jira and are even more difficult
    when GitLab is integrated into Atlassian tools. Additionally, many teams try to
    create their own workflows despite all projects being in a common organization.
    An example would be one team using stages of to-do, in-progress, and done, while
    another uses code1, deploy, revise, code2, test1, deploy2, and finished. Trying
    to resolve progress across these multiple teams becomes challenging. Bitbucket
    links may be copied into a Jira ticket but it requires switching functions to
    determine progress.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: Jira 最常见的问题之一出现在工作流程过程中。Bitbucket 的管道元素不会自动镜像到 Jira，当 GitLab 集成到 Atlassian 工具中时，情况更加困难。此外，许多团队尽管所有项目都在一个共同的组织中，但仍然试图创建自己的工作流程。例如，一个团队使用待办、进行中和完成等阶段，而另一个团队则使用代码1、部署、修订、代码2、测试1、部署2
    和完成。试图解决这些多个团队之间的进度变得具有挑战性。Bitbucket 链接可以复制到 Jira 票据中，但需要切换功能来确定进度。
- en: Another simple failure of Atlassian, in dealing with user satisfaction, is that
    despite multiple user requests, as evidenced by their community board, they have
    never included wildcard searches across their platform. A wildcard search is when
    a special character, such as ***, is used before or in an alphanumeric string
    to find an item. This feature gap means that searching Atlassian requires knowing
    the exact name of the desired object. Without a wildcard search, users must search
    multiple combinations or scroll through filesystems to find the desired object.
    This small absence can cause high levels of frustration for users.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: Atlassian 在处理用户满意度方面的另一个简单失败是，尽管有多次用户请求，如他们的社区板所示，但他们从未在其平台上包含通配符搜索。通配符搜索是在数字字母字符串之前或其中使用特殊字符（如
    *****）来查找项目。这个功能差距意味着搜索 Atlassian 需要知道所需对象的准确名称。没有通配符搜索，用户必须搜索多个组合或滚动通过文件系统来找到所需的对象。这个小缺失可能会给用户带来高度的不满。
- en: One final problem with Atlassian is the numerous security challenges. The company
    has had numerous failures over the years with multiple critical and high vulnerabilities
    released in the past 12 months. A single critical vulnerability can derail a system,
    but multiple vulnerabilities affect system performance and user attitudes. Each
    vulnerability is bad, but the first critical vulnerability of 2024 resulted in
    39,000 access attempts across 18,000 ports from 600+ IP addresses in the first
    week. Some issues were fixed but many continue or have yet to appear. The sheer
    number of vulnerabilities suggests key gaps within the system with the potential
    for future exploitation.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Atlassian 存在的一个最终问题是其众多安全挑战。该公司多年来经历了多次失败，在过去 12 个月内发布了多个关键和高级漏洞。单个关键漏洞可能会使系统脱轨，但多个漏洞会影响系统性能和用户态度。每个漏洞都是不好的，但
    2024 年的第一个关键漏洞在第一周就导致了来自 600 多个 IP 地址的 18,000 个端口的 39,000 次访问尝试。一些问题已经得到解决，但许多问题仍在继续或尚未出现。漏洞的数量本身表明系统中存在关键漏洞，未来可能被利用。
- en: Combining the lack of integrated solutions, workflow challenges, and user happiness
    highlights the key failures within the Atlassian tools. The systems may work well
    for a time but fail over the long term when adhering to key platform creation
    pillars. The platform’s lack of integration challenges stability, a security problem
    is posed due to multiple vulnerabilities, user satisfaction declines, showing
    the lack of adaptability, and initially scalable, non-integrated workflows pose
    challenges as the system expands. Despite business successes, if you are looking
    at what not to do from a Platform Engineering perspective, Atlassian is that model.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 结合缺乏集成解决方案、工作流程挑战和用户满意度，突显了Atlassian工具中的关键失败。这些系统可能在一开始运行良好，但长期遵守关键平台创建支柱时，最终会失败。平台缺乏集成挑战了稳定性，由于多个漏洞，提出了安全问题，用户满意度下降，显示出缺乏适应性，以及最初可扩展的非集成工作流程在系统扩展时带来挑战。尽管在商业上取得成功，但如果从平台工程的角度来看，Atlassian就是那种模式。
- en: United States federal government
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 美国联邦政府
- en: From a personal perspective, in our experience working with **United States**
    (**U.S.**) federal programs and contractors, the government’s software factories
    frequently demonstrate poor practices. Many problems originate not from the government
    workers or their capacity to deliver but from outdated administrative requirements.
    The **Federal Acquisition Regulation** (**FAR**), a massive document with 2,000+
    pages across 37 chapters, supplements for various agencies, and then cost accounting
    standards, poses much of this challenge. Despite being updated over the years,
    the regulations are more geared toward the slower material and labor acquisition
    model, rather than being the fast-paced standard needed for delivering an effective
    platform, and the subsequent software.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 从个人角度来看，在我们与**美国**（**U.S.**）联邦项目和承包商合作的经验中，政府的软件开发工厂经常表现出不良的实践。许多问题并非源于政府工作人员或他们的交付能力，而是来自过时的行政要求。《联邦采购条例》（**FAR**），一份包含37章、2,000多页的庞大文件，以及为各个机构提供的补充材料和成本核算标准，构成了这些挑战的大部分。尽管这些法规多年来一直在更新，但它们更多地倾向于较慢的材料和劳动力获取模式，而不是提供有效平台和随后的软件所需的快速标准。
- en: Many government agencies experience personnel change at a high rate and cannot
    maintain progress. These changes occur at worker and management levels. One program
    we worked for saw regular turnover between 30% and 50% at all levels. This turnover
    created challenges in meeting team goals. In another instance, the key stakeholder
    insisted the key to progress was making no changes to the quarterly plan due to
    capacity maximization, but then personally added another 800 hours of required
    tasks within the first week. In other cases, turnover issues extend to leadership,
    who bring in new plans and ideas, overhauling previous work.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 许多政府机构人员变动率很高，无法维持进度。这些变动发生在工人和管理层。我们为一个项目工作，看到所有级别的员工流动率在30%到50%之间。这种流动给团队目标的实现带来了挑战。在另一个例子中，关键利益相关者坚持认为，由于能力最大化，保持季度计划不变是进步的关键，但在第一周就个人增加了800小时的必要任务。在其他情况下，人员流动问题扩展到领导层，他们带来新的计划和想法，彻底改变了以前的工作。
- en: One key challenge in the government processes, accentuated by FAR, is the focus
    on labor hours rather than completion. The regulatory inability to correctly identify
    developing software versus completed deliveries places a premium on labor time
    rather than completed delivery. For example, an agency that wants a legacy database
    application migrated to a platform must hire developers for a set period rather
    than contracting them for a potential delivery. Visualizing this, it would mean
    hiring 8 developers for 40 hours a week over 12 months rather than allowing a
    company to suggest an application delivery at a set cost within six weeks. Considering
    that the standard developer rate is over $100 per hour, the cost would be $16M
    versus what might be a much smaller cost for the application.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 政府流程中的一个关键挑战，由FAR加剧，是关注劳动时间而不是完成情况。监管机构无法正确区分正在开发的软件与完成的交付，这使劳动时间比完成交付更加重要。例如，一个希望将遗留数据库应用程序迁移到平台的机构必须雇佣开发者一段时间，而不是根据可能的交付来签订合同。可视化这一点，意味着雇佣8名开发者，每周工作40小时，持续12个月，而不是允许公司在六周内以固定成本提出应用程序交付。考虑到标准开发者的时薪超过100美元，成本将是1600万美元，而可能的应用程序成本要小得多。
- en: Another challenge government platforms face is converting from brown-field to
    green-field systems. The U.S. government systems are so large and embedded that
    they cannot change small parts without breaking the entire system. A good platform’s
    scalable and adaptive aspects exemplify constant improvement, but this can be
    impossible with some legacy systems. An excellent example is from the COVID era,
    when a state government needed to find COBOL developers to update an old system.
    This conversion had previously been required but data transfer and limited contractual
    opportunities presented as challenges.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 政府平台面临的另一个挑战是从棕色地带系统转换为绿色地带系统。美国政府系统如此庞大且根深蒂固，以至于它们不能在不破坏整个系统的情况下改变小部分。一个优秀的平台的可扩展性和适应性方面体现了持续改进，但某些遗留系统可能无法实现这一点。一个很好的例子来自COVID时代，当时一个州政府需要找到COBOL开发者来更新一个旧系统。这种转换之前已经需要，但数据传输和有限的合同机会被视为挑战。
- en: At the same time, government regulations often require multiple human tests
    beyond the software capability of DevOps. One organization we are familiar with
    was contracted to provide user-requested updates quarterly. After the first two
    updates, the government organization reported that they could not perform testing
    and requested that the developers slow down with delivering updates, despite the
    stated and contractual requirement for update delivery. The requested slowdown
    would lead to producing one update every 6 to 9 months, leading to user dissatisfaction,
    threatening the ability to maintain security, and impacting software performance.
    As with DORA metrics, platforms aim to support continuous delivery when updates
    complete, not when a user is available for a two-week testing cycle.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，政府法规通常要求进行多次超出DevOps软件能力的人工测试。我们熟悉的一个组织被承包提供用户请求的季度更新。在完成前两次更新后，政府机构报告称他们无法进行测试，并要求开发者放慢更新交付的速度，尽管有明确的和合同规定的更新交付要求。所要求的放缓将导致每6到9个月才发布一个更新，这会导致用户不满，威胁到维护安全的能力，并影响软件性能。与DORA指标一样，平台的目标是在更新完成后支持持续交付，而不是当用户可用进行两周测试周期时。
- en: 'These examples focused on U.S. government operations. When shifting to a different
    model, such as those used in China, we see that many of their platforms are state-sponsored.
    State-sponsored platforms are created using government funds and sold on the open
    market. At other times, China mandates the use of a specific platform, constraining
    user choice, as follows:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子主要关注美国政府的运营。当转向不同的模式，例如在中国使用的模式时，我们发现他们的大多数平台都是政府赞助的。政府赞助的平台是使用政府资金创建并在公开市场上销售的。在其他时候，中国强制使用特定的平台，限制了用户的选择，如下所示：
- en: Jihu replaces GitLab.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吉互取代了GitLab。
- en: Weibo replaces Twitter.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微博取代了推特。
- en: WeChat replaces Facebook.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微信取代了Facebook。
- en: Alibaba replaces Amazon.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 阿里巴巴取代了亚马逊。
- en: The **Chinese Communist Party** (**CCP**) reverse-engineers platforms, ignores
    intellectual property constraints, and then empowers a Chinese production company.
    They also ban Western platforms, or any similar applications, allowing users only
    to implement Chinese solutions. Metrics are then skewed by state-mandated usage,
    with over one billion users adopting the platform. These state mandates are only
    successful in regions with authoritarian governments, rather than open competition,
    as factors other than security, scalability, adaptability, and stability drive
    usage.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 中国共产党（CCP）逆向工程平台，忽视知识产权限制，然后授权一家中国生产企业。他们还禁止西方平台或任何类似的应用，只允许用户实施中国解决方案。随后，由于国家强制使用，指标被扭曲，超过10亿用户采用了该平台。这些国家强制措施只在威权政府地区而不是开放竞争中取得成功，因为除了安全性、可扩展性、适应性和稳定性之外的其他因素推动了使用。
- en: Many government platform flaws are contractual. Others are a result of mindset.
    Previous chapters emphasized culture, leadership, and organizational standards
    and showed that Platform Engineering is not just a technical solution. Artificially
    slowing down platform delivery primarily impacts security and stability. However,
    the inability to respond to user requests promptly also challenges a platform’s
    adaptability and scalability. It is not enough to purchase a platform transformation;
    in line with Conway’s law, the organization must prepare for change. The following
    section highlights some best practices that can drive successful transformation
    and ways to recognize future trends.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 许多政府平台缺陷是合同性的。其他是由于心态造成的。前几章强调了文化、领导和组织标准，并表明平台工程不仅仅是技术解决方案。人为地减缓平台交付主要影响安全和稳定性。然而，无法及时响应用户请求也挑战了平台的适应性和可扩展性。仅仅购买平台转型是不够的；根据康威定律，组织必须为变化做好准备。以下部分突出了一些可以推动成功转型和识别未来趋势的最佳实践。
- en: Best practices for platform success
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 平台成功的最佳实践
- en: 'Recognizing some best practices that accelerate delivery, integration, and
    subsequent growth is key to ensuring successful transformation. This section identifies
    best practices, sets some initial guidelines, and proposes ways to ensure platforms
    remain current. A quick list of these best practices is as follows:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到一些加速交付、集成和随后增长的最佳实践是确保成功转型的重要关键。本节确定了最佳实践，制定了一些初步的指导方针，并提出了确保平台保持当前状态的方法。以下是一些最佳实践的快速列表：
- en: Service platforms.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务平台。
- en: Recognize growth limits.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 认识到增长限制。
- en: Don’t build what already exists.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要构建已经存在的东西。
- en: Establish metrics.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立指标。
- en: The technology supporting platforms is constantly changing, and we must ensure
    a suitable mindset to anticipate these changes exists. There are multiple ways
    of incorporating changes; these best practices function as a guide rather than
    an exhaustive list. Let’s delve deeper into them.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 支持平台的技术不断变化，我们必须确保存在一种合适的思维方式来预测这些变化。有多种方式可以整合变化；这些最佳实践作为指南而不是详尽无遗的列表。让我们更深入地探讨它们。
- en: Service platforms
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 服务平台
- en: We should never forget that, despite the technological origins, humans build,
    operate, and use platforms. If a human uses a machine, it will require some form
    of service. Many organizations overlook this or attempt to divert support responsibilities
    to the purchasing customer. Some form of service should be readily available within
    a platform. Service examples are embedded knowledge bases, a common messaging
    system, routine notifications, and competent service staff.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们永远不应该忘记，尽管技术起源，但人类构建、运营和使用平台。如果人类使用机器，它将需要某种形式的服务。许多组织忽视这一点或试图将支持责任转嫁给购买客户。平台内应提供某种形式的服务。服务示例包括嵌入式知识库、通用消息系统、常规通知和合格的服务人员。
- en: Knowledge bases can take the form of notes pages and documentation. Readily
    available tools can convert code comments or Markdown language in repositories
    into clear documents. Along with this, systems can provide notifications for updates,
    downtime, or suggested training. Common metrics such as availability and usage
    are often hidden rather than shared with users. Sharing this knowledge builds
    confidence across multiple levels.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 知识库可以采取笔记页面和文档的形式。易于使用的工具可以将存储库中的代码注释或Markdown语言转换为清晰的文档。此外，系统可以提供更新、停机时间或建议培训的通知。常见的指标，如可用性和使用率，通常被隐藏而不是与用户共享。共享这些知识可以在多个层面上建立信心。
- en: When these first support attempts fail, users should be able to reach a human
    or AI-driven service to address their issues. The support staff’s first goal should
    be to identify problems as Tier 1, within the documentation; Tier 2, minor configuration
    changes; or Tier 3, a bug or feature. All issues should be tracked in an observable
    format for users and admins, such as ServiceNow or another ticketing system. This
    creates issue observability and allows rapidly aligning metrics. One key example
    of AI support is chatbots. These provide a place for users to ask questions and
    receive a tailored response that guides them through specific answers.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 当这些初步支持尝试失败时，用户应该能够联系到人类或AI驱动的服务来解决他们的问题。支持人员的第一目标应该是将问题识别为一级，在文档中；二级，轻微的配置更改；或三级，一个错误或功能。所有问题都应在用户和管理员可观察的格式中进行跟踪，例如ServiceNow或另一个票务系统。这创造了问题可观察性，并允许快速对齐指标。AI支持的一个关键例子是聊天机器人。这些提供了一个用户提问并获得定制响应的地方，引导他们通过具体的答案。
- en: Recognize growth limits
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识到增长限制
- en: Every new platform wants to be the most successful, with the widest adoption
    and the highest profit. These goals conflict with a platform’s activity to deliver
    support. Successful platform implementations might follow the Netflix model as
    a user platform versus a development orientation, or GitLab where the service
    burden falls on the users. True DevOps Platform Engineering incorporates multiple
    areas. One of the hardest things is realizing that while scalability is important,
    there are also times when growth needs to be constrained.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 每个新的平台都希望成为最成功的，拥有最广泛的采用率和最高的利润。这些目标与平台提供支持的活动相冲突。成功的平台实施可能遵循Netflix作为用户平台而不是开发导向的模式，或者GitLab，在那里服务负担落在用户身上。真正的DevOps平台工程涵盖了多个领域。最难的事情之一是意识到，虽然可扩展性很重要，但有时增长需要受到限制。
- en: All platforms might eventually support millions of users, but the growth occurs
    over time. You must realize the performance limits within the existing platform.
    Netflix grew from 24M subscribers in 2011 to over 220M in 2023; however, most
    growth areas maintained a steady pace of growth of 20% to 30% in any individual
    year. Any platform model should strive for a similar pace, expanding the capability
    to plan for and match customer growth. Customer growth is the best model to generate
    long-term value and profit. Research methods such as surveys gathering user feedback
    and market intelligence can help companies plan for what growth levels to expect.
    Unicorn-style growth is always hoped for but rarely achieved, and many companies
    would be incapable of handling growth of 100% or greater in a short period.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 所有平台最终可能支持数百万用户，但增长是随着时间的推移发生的。你必须意识到现有平台中的性能限制。Netflix从2011年的2400万订阅者增长到2023年的超过2.2亿；然而，大多数增长区域在任何一年都保持了20%到30%的稳定增长速度。任何平台模型都应该努力达到类似的增长速度，扩大规划能力和匹配客户增长的能力。客户增长是产生长期价值和利润的最佳模型。如收集用户反馈和市场情报的调查等研究方法可以帮助公司规划预期的增长水平。独角兽式的增长总是被希望，但很少实现，许多公司在短时间内无法处理100%或更高的增长。
- en: In our previous experience, a company was determined to succeed through offering
    a technical feature and spent thousands of hours and dollars achieving that capability.
    It was only after they had finished the development that they realized that only
    about 10 users would be using the feature, and the user count was unlikely to
    grow based on need. Growth should be carefully mapped and discussed. Small changes
    and features contribute to growth but require alignment to actual customer use.
    These alignments can be checked through UX metrics using surveys and operational
    metrics tracking usage.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们以往的经验中，有一家公司决心通过提供一项技术特性来实现成功，为此投入了数千小时和美元来获得这种能力。然而，在他们完成开发之后，他们才意识到只有大约10个用户会使用这个特性，而且基于需求，用户数量不太可能增长。增长应该被仔细规划和讨论。小的变化和特性有助于增长，但需要与实际客户使用保持一致。这些一致性可以通过使用调查和运营指标来检查用户体验指标。
- en: Don’t build what already exists
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不要构建已经存在的东西
- en: Many existing products are perfect for supporting platform development and deployment.
    Integrating tools can create early successes. Many of these tools either are open
    source or require minimal licensing fees. The first step when considering tool
    options should always be whether the tool is available through open source or
    licensed models. The best practice here is to recognize when you can rent, buy,
    and build when considering platform options.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 许多现有产品非常适合支持平台开发和部署。集成工具可以创造早期成功。许多这些工具要么是开源的，要么只需要最低限度的许可费用。在考虑工具选项时，第一步始终应该是工具是否可以通过开源或许可模式获得。这里的最佳实践是在考虑平台选项时，认识到何时可以租赁、购买和构建。
- en: Open source offers an answer, but not the only answer. Companies such as GitLab,
    Databricks, Elastic, MongoDB, and JFrog, among others, offer some portion of their
    code as open source. If a generic solution is the answer, these can be adopted
    into the platform early and switched to a paying model as growth increases. The
    ability to switch from open source to paid licensing by a provider makes this
    an example of the rent model.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 开源提供了一种解决方案，但并非唯一的解决方案。GitLab、Databricks、Elastic、MongoDB和JFrog等公司以及其他公司，将它们的部分代码作为开源提供。如果通用解决方案是答案，这些可以在增长增加时早期采用，并切换到付费模式。提供商从开源切换到付费许可的能力使这成为租赁模型的一个例子。
- en: Vendor lock-in is a common problem with the rent model. This means that if you
    wish to change data, architectures, or applications, they cannot be easily converted
    to a new model. The interoperability of many DevOps systems reduces how often
    true vendor lock-in occurs. A good application that leads to long-term success
    may be preferred by an organization over the ability to switch at some future
    date. This addresses the Agile and DevOps philosophies that teams must be able
    to change easily but those changes can also occur within a tightly coupled structure.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 供应商锁定是租赁模式的一个常见问题。这意味着如果你希望更改数据、架构或应用程序，它们不能轻易转换为新的模式。许多 DevOps 系统的互操作性减少了真正供应商锁定发生的频率。一个导致长期成功的好应用可能比在未来某个日期切换的能力更受组织青睐。这解决了敏捷和
    DevOps 哲学，即团队必须能够轻松地改变，但这些变化也可以在紧密耦合的结构内发生。
- en: Buying software can be either an outright purchase or through a subscription
    model. Subscription models offer limited-time solutions but open the possibility
    of vendor lock-in when options are too constrained. For example, Atlassian offers
    subscriptions to build platform capability, but if you later switch, it requires
    moving databases. Limited or excessive fields can create challenges here. Buying
    delivers value if you intend to retain the software for an extended time. The
    best purchases are often security, resource management, and program management.
    Processes such as CI/CD, testing, and other deployments change frequently, and
    the rent model is more effective in creating immediate value.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 购买软件可以是直接购买或通过订阅模式。订阅模式提供有限时间的解决方案，但选项过于受限时，可能会打开供应商锁定的大门。例如，Atlassian 提供订阅以构建平台能力，但如果你后来切换，则需要迁移数据库。有限的或过多的字段可能会在这里造成挑战。如果你打算长期保留软件，购买可以带来价值。最好的购买通常是安全、资源管理和项目管理。CI/CD、测试和其他部署流程经常变化，租赁模式在创造即时价值方面更有效。
- en: The last option is building functions. These build options are often the last
    step when you believe an internal solution can achieve better than what is offered
    on the market. Platform Engineering can require a mix of an IAC and **Configuration
    as Code** (**CAC**) build that drives the integration of other rented or bought
    pieces. Rather than building each piece, modern platform architecture allows making
    those integrations proprietary without intensive preparation. One example might
    be purchasing a repository and SSO system with your organization creating an integration
    allowing SSO control of the repository. Integration builds tend to be lighter-weight
    constructions than full functionality.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个选项是构建功能。这些构建选项通常是在你认为内部解决方案可以比市场上提供的更好时采取的最后一步。平台工程可能需要混合 IAC 和 **配置即代码**（**CAC**）构建，以推动其他租赁或购买的组件的集成。与其构建每个组件，现代平台架构允许在不进行密集准备的情况下将这些集成私有化。一个例子可能是购买一个存储库和
    SSO 系统，你的组织创建一个集成，允许对存储库进行 SSO 控制。集成构建通常比全功能构建更轻量级。
- en: Establish metrics
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立度量指标
- en: Metrics are always required for DevOps. These measurements should be tailored
    depending on what you want to achieve. Setting acceptance criteria within different
    builds should determine what metrics are later measured by the organization. The
    DORA metrics are excellent in initial development practices as they provide flow
    rates and capacity measurement, while later measuring repair and recognition times.
    You can supplement these metrics with additional statistics about usage, availability
    times, performance rates, security linkages, and others.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: DevOps 总是需要度量指标。这些度量应根据你想要实现的目标进行定制。在构建过程中设置验收标准应决定组织随后要测量的指标。DORA 度量指标在初始开发实践中非常出色，因为它们提供了流速和容量测量，同时在后续测量修复和认可时间。你可以通过关于使用情况、可用时间、性能率、安全链接等方面的额外统计数据来补充这些指标。
- en: A common path for including metrics is the previously mentioned path to establish
    SLAs and SLIs for required items. These expand beyond the initial measurement
    to create a contract between the user and provider. Moving metrics from a measurement
    to a value-creating option is always a best practice. We discussed SLAs in detail
    earlier in this chapter.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 包含度量指标的一个常见路径是之前提到的建立所需项目的 SLA 和 SLI 的路径。这些扩展到初始测量之外，在用户和供应商之间创建合同。将指标从测量转变为价值创造选项始终是最佳实践。我们之前在本章中详细讨论了
    SLA。
- en: 'It is important to remember with metrics that establishment often leads to
    gamification. In gamification, one is focused simply on achieving the metric rather
    than the underlying goal. You can rectify this by frequently evaluating metric
    success or establishing cross-referencing metrics. A good example is in code commits:
    if a metric requires more frequent commits, users may shrink the commit size;
    however, reaching the overall goal still takes the same time. You can compare
    the code commit frequency with time to customer and commit sizes. This allows
    for evaluating the best size to commit, and at what time, to reach customer value.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 记得用指标来衡量，建立往往会导致游戏化。在游戏化中，人们关注的只是实现指标，而不是背后的目标。你可以通过经常评估指标的成功或建立交叉参照指标来纠正这一点。一个很好的例子是在代码提交中：如果一个指标需要更频繁的提交，用户可能会缩小提交的大小；然而，达到整体目标仍然需要相同的时间。你可以将代码提交频率与客户时间和提交大小进行比较。这允许评估提交的最佳大小和时机，以实现客户价值。
- en: Innovating for new success
  id: totrans-123
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创新以实现新的成功
- en: Though innovation can be considered a best practice, it deserves separate consideration.
    Innovation can often be narrowly constrained to the next technology hurdle, but
    all aspects of the platform matter. Business innovation can be just as important
    as fielding new technology since it can rapidly bring more customers. Too many
    companies tend to focus solely on building the latest technology, rather than
    improving internal practices. At the same time, a business model lagging behind
    technical solutions may be incapable of supporting either value or growth. Teams
    should encourage innovation through practices such as hackathons, regular downtime
    for special projects, employee training budgets, conference attendance, publication,
    and widespread experimental options.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然创新可以被认为是一种最佳实践，但它值得单独考虑。创新通常可以狭义地限制在下一个技术障碍上，但平台的所有方面都很重要。商业创新可能和推出新技术一样重要，因为它可以迅速带来更多客户。太多的公司倾向于只关注构建最新的技术，而不是改进内部实践。同时，落后于技术解决方案的商业模式可能无法支持价值或增长。团队应通过黑客马拉松、定期为特殊项目安排的停工时间、员工培训预算、参加会议、发表文章和广泛实验选项等做法来鼓励创新。
- en: One platform pillar that remains constant is stability. In considering innovation,
    people often struggle between differentiating **evolutionary changes** and **revolutionary
    changes**. An evolutionary change makes small steps from the current model, and
    a revolutionary change rewrites the underlying model. For example, BlackBerry
    moving from a number pad to a full keyboard on cell phones was an evolutionary
    change, but Apple’s move from a cell phone to the full-scale smartphones of today
    was revolutionary. Finding a balance between adopting these changes is a key component
    of business. Historic examples of failures at multiple levels are IBM stating
    personal computers would never happen, Kodak rejecting digital film, Sears rejecting
    the change from catalog to e-commerce, Yahoo not buying Google in 1998 for $1M,
    and Atari viewing gaming as an individual rather than a shared process.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 一个始终保持不变的平台支柱是稳定性。在考虑创新时，人们常常在区分**进化变化**和**革命性变化**之间挣扎。进化变化是从当前模型的小步骤，而革命性变化是重写底层模型。例如，BlackBerry从手机上的数字键盘转向全键盘是一个进化变化，但Apple从手机转向今天的全功能智能手机是一个革命性变化。在采用这些变化之间找到平衡是商业的关键组成部分。历史上多层次的失败例子包括IBM声称个人电脑永远不会发生、柯达拒绝数字胶片、西尔斯拒绝从目录到电子商务的转变、Yahoo在1998年以100万美元的价格没有购买Google，以及Atari将游戏视为个人过程而不是共享过程。
- en: An important innovation discussion is recognizing the difference between **cutting-edge**
    and **bleeding-edge** technologies. Cutting-edge implies the newest solutions
    available on the market, while bleeding-edge is typically technology that is not
    widely available. An example of cutting-edge technology is television moving from
    tube to digital to LCD to LED, and then multiple generations, improving pixel
    count, color, and transmission. A current bleeding-edge technology might be quantum
    networks, neural-linked devices, or multi-purpose AI assistants. Each technology
    realizes a problem but does not currently have the market or operations to support
    wider-scale adoption.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的创新讨论之一是认识到**尖端技术**和**前沿技术**之间的区别。尖端技术指的是市场上可用的最新解决方案，而前沿技术通常是尚未广泛可用的技术。电视从管状到数字再到液晶到LED，以及多代产品，提高像素数、色彩和传输能力的例子就是尖端技术。当前的前沿技术可能包括量子网络、神经连接设备或多功能人工智能助手。每种技术都解决了问题，但目前还没有市场或运营来支持更广泛的采用。
- en: Platforms should attempt to include cutting-edge solutions while researching
    the bleeding edge but not expect customer adoption. Bleeding-edge solutions, despite
    increased capability, can often be derailed by things such as common formats or
    usability. Some examples are conflicts between laser disc, Beta, and VHS formats
    or audio with records, 8-tracks, cassettes, and CDs in the video recording industry.
    Both areas then faced a challenge with the growth of digital media and streaming
    transmissions.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 平台应尝试包括尖端解决方案，同时研究前沿技术，但不要期望客户会采用。尽管能力有所提高，但前沿解决方案往往会被诸如通用格式或可用性等问题所阻碍。一些例子包括激光唱片、Beta和VHS格式的冲突，或者录音行业中的录音、8轨、盒式磁带和CD之间的冲突。这两个领域随后都面临着数字媒体和流传输增长带来的挑战。
- en: Striking the right balance between innovation and usability sets the stage for
    understanding how to thoughtfully adopt and integrate new technologies.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在创新和可用性之间找到正确的平衡，为理解如何深思熟虑地采用和整合新技术奠定了基础。
- en: Making technology leaps
  id: totrans-129
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术飞跃
- en: 'Understanding technological change is the first step in implementing change
    through integration and adaptation. This leads to the question, what type of technology
    should I consider next? Everyone wants to find the next big thing, but rarely
    does a revolutionary change occur. Evolutionary platform technology focuses on
    several components: compute improvements, storage growth, and UI interaction.
    Each of these offers benefits but should be considered against the overall strategy.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 理解技术变化是实现通过整合和适应实施变化的第一步。这引出了问题，我接下来应该考虑哪种技术？每个人都想找到下一个大事件，但革命性的变化很少发生。进化平台技术专注于几个组件：计算改进、存储增长和用户界面交互。这些每个都提供了好处，但应与整体战略相权衡。
- en: Compute
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计算
- en: 'The first improvement for a platform deals with improving capacity to compute.
    Additional compute generally costs more money and deals with adding additional
    cores either to on-premises servers or through virtual machines. Changing from
    a CPU core to a GPU core improves the ability to deliver specialized actions.
    One other factor might be adding quantum cores. While adding quantum sounds difficult,
    capabilities such as Amazon Braket enable using quantum machines without purchasing
    these solutions. Other upcoming changes include the following:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 平台的第一个改进是提高计算能力。额外的计算通常需要更多的资金，并涉及在本地服务器或通过虚拟机添加额外的核心。从CPU核心转换为GPU核心提高了执行专用操作的能力。另一个可能因素是添加量子核心。虽然添加量子听起来很困难，但像Amazon
    Braket这样的能力使得无需购买这些解决方案即可使用量子机器。其他即将到来的变化包括以下内容：
- en: '**Graphene-based transistors**: Graphene uses one-carbon-atom-thickness materials
    with increased connectivity, rolled into tubes, and uses less space and energy.
    These tubes can be combined with other 2D materials to increase transmission speed.
    Graphene nano-tubes are expected to reach the market within the next five years.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于石墨烯的晶体管**：石墨烯使用单层碳原子厚度的材料，具有更高的连接性，卷成管状，占用更少的空间和能量。这些管状结构可以与其他二维材料结合，以增加传输速度。预计石墨烯纳米管将在未来五年内进入市场。'
- en: '**Neuromorphic:** Technology involving neuromorphic systems calls for replicating
    human brain architecture. The difference in problem-solving would require significantly
    less energy than traditional models. This technology lags as most attempts to
    mimic biological processes still involve internet protocols removing the advantage
    from the improved structures.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**神经形态**：涉及神经形态系统的技术需要复制人脑架构。在解决问题的差异将需要比传统模型显著更少的能量。这项技术落后，因为大多数尝试模仿生物过程的方法仍然涉及互联网协议，从而消除了改进结构的优势。'
- en: '**Optical transmission:** Transmitting with optical methods uses photons rather
    than electrons, mapping data with light-intensity levels, and varying levels to
    perform calculations. Realized optical methods could improve efficiency and decrease
    power but challenges remain with integration and portability.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**光传输**：使用光方法进行传输使用光子而不是电子，通过光强度水平映射数据，并改变水平以执行计算。实现的光方法可以提高效率并降低功耗，但在集成和便携性方面仍存在挑战。'
- en: Storage
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 存储
- en: 'Storage may not be as widely needed in basic Platform Engineering as dealing
    with data coming across the platform. At some point, applications, especially
    AI/ML applications, require more data to be successful. Making that data accessible
    to the platform creates challenges, especially as the data produced extends into
    the terabyte and petabyte ranges. Estimates suggest the world’s production of
    data exceeds 400 million terabytes daily. Most platforms do not require these
    levels, but being prepared means you can offer customers advanced capabilities:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在基础平台工程中，存储可能不像处理平台上的数据那样广泛需要。在某个时候，应用程序，尤其是AI/ML应用程序，需要更多的数据才能成功。使这些数据对平台可访问性创建挑战，特别是当产生数据扩展到千兆和太字节范围时。估计表明，全球每天的数据生产量超过4亿兆字节。大多数平台不需要这些水平，但做好准备意味着您可以向客户提供高级功能：
- en: '**DNA data storage**: Converts existing data from a binary base 2 into a DNA-based
    base 4\. This allows increasing the overall capacity so much that some researchers
    believe the world’s storage needs could be met with a cubic meter of powdered
    E. coli DNA. Challenges to this mode involve reading and writing with proteins.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**DNA数据存储**：将现有数据从二进制基础2转换为基于DNA的基础4。这使得整体容量大大增加，以至于一些研究人员认为，全球的存储需求可以用一立方米的粉末状大肠杆菌DNA来满足。这种模式的挑战涉及使用蛋白质进行读写。'
- en: '**Diamond data**: This involves using lasers to store data in nanoscale diamonds
    with laser pulses. These techniques are read-write capable, and a single, 5 cm
    diamond wafer can store up to a billion Blu-ray discs, or about 25 exabytes.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**钻石数据**：这涉及到使用激光脉冲在纳米级钻石中存储数据。这些技术具有读写能力，单个5厘米的钻石晶圆可以存储高达10亿张蓝光光盘，或约25艾字节。'
- en: '**Blockchain**: Blockchain storage has been around for a while but only for
    specific and limited functions. Extending successful blockchain into different
    and streaming data would improve the security and confidentiality of systems.
    Blockchain storage improvements are more likely to emerge from software solutions
    than user-driven suggestions.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**区块链**：区块链存储已经存在了一段时间，但仅限于特定的有限功能。将成功的区块链扩展到不同的和流式数据将提高系统的安全性和保密性。区块链存储的改进更有可能来自软件解决方案，而不是用户驱动的建议。'
- en: User interface
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用户界面
- en: 'The last major area to improve platforms through technology is the user interface.
    While the user interface may seem peripheral, improvements in how individuals
    interact with platforms can create an enormous market advantage. A good example
    is Netflix, where the change from a mail-based system to on-demand streaming improved
    users’ ability to access and view data. Some of the top trends in the user interface
    are highlighted here:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 通过技术改善平台的主要最后领域是用户界面。虽然用户界面可能看似边缘，但个人与平台互动方式的改进可以创造巨大的市场优势。一个很好的例子是Netflix，从基于邮件的系统转变为按需流媒体改善了用户访问和查看数据的能力。这里突出了一些用户界面的顶级趋势：
- en: '**Interactive 3D**: This user approach appears in many science fiction movies
    but its applications are wide-ranging This would enable a user to view, edit,
    and work in 3D spaces, rather than being confined to a traditional monitor and
    keyboard configuration. Its implementation would mean making movements to access
    and configure platform applications, such as a hand signal to call code, run pipelines,
    and apply testing results.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互式 3D**：这种用户方法出现在许多科幻电影中，但其应用范围广泛。这将使用户能够查看、编辑并在 3D 空间中工作，而不是局限于传统的显示器和键盘配置。其实施意味着通过动作来访问和配置平台应用程序，例如用手势调用代码、运行管道和应用测试结果。'
- en: '**Virtual and augmented reality interfaces**: These solutions are similar to
    interactive 3D but confined to a specific element. For example, 3D glasses can
    give the appearance of interaction without requiring a full 3D display. Augmented
    reality allows suggesting additional interactions, possibly by optical or audio
    inputs, to suggest changes within viewed applications.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**虚拟和增强现实界面**：这些解决方案与交互式 3D 类似，但局限于特定元素。例如，3D 眼镜可以提供交互的外观，而不需要完整的 3D 显示。增强现实允许通过光学或音频输入提出额外的交互，可能在查看的应用程序中建议更改。'
- en: '**Virtual assistants**: Many virtual assistants exist today in the form of
    chatbots, and other guides. You may even think of voice-activated integrations
    such as Siri or Alexa as virtual assistants. The next improvement, especially
    for platforms, will likely be AI tracking daily activities to suggest improvements.
    For example, think about an AI system that understands a worker’s ability and
    can make tailored suggestions, notifying of additional training when they exceed
    certain parameters for time or quality with applications.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**虚拟助手**：如今，许多虚拟助手以聊天机器人和其他指南的形式存在。你甚至可以将语音激活的集成，如 Siri 或 Alexa，视为虚拟助手。对于平台来说，下一个改进可能将是
    AI 跟踪日常活动以提出改进建议。例如，想象一个理解工人能力并能够根据他们在时间或质量方面的参数超出某些阈值时提供定制建议的 AI 系统，通知他们进行额外培训。'
- en: Preparing for the future involves a blend of implementing best practices and
    preparing for new technology. Best practices are people and process improvements
    such as providing service, creating growth opportunities, and updating metrics.
    Technological changes require recognizing the next steps for compute, storage,
    and UI improvements, such as quantum computing, DNA storage devices, and virtual
    chatbots. These techniques were demonstrated in the preceding best and worst case
    studies as the organizations attempted to achieve accelerated Platform Engineering.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 为未来做准备需要结合实施最佳实践和为新技术做准备。最佳实践包括人员和工作流程改进，如提供服务、创造增长机会和更新指标。技术变化需要认识到计算、存储和 UI
    改进的下一步，例如量子计算、DNA 存储设备和虚拟聊天机器人。这些技术在先前的最佳和最坏案例研究中得到了展示，因为组织试图实现加速的平台工程。
- en: Summary
  id: totrans-147
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Beginning with successful transformations, this chapter introduced SLA frameworks
    as a guideline for DevOps success. Incorporating an SLA establishes guidelines
    between the user and customer, enabling the determination of success or failure.
    While SLAs can be largely similar between different platforms, successful platforms
    such as GitLab and Netflix incorporated multiple paths to reach overall success.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 从成功的转型开始，本章介绍了 SLA 框架作为 DevOps 成功的指南。引入 SLA 建立了用户与客户之间的指导方针，使成功或失败的判断成为可能。虽然不同平台之间的
    SLA 可能非常相似，但成功的平台如 GitLab 和 Netflix 则采用了多条路径来实现整体成功。
- en: Conversely, unsuccessful platform transformations fail to address small and
    large platform construction challenges adequately. Small challenges tend to be
    technical or operational, such as the failure of a tool, poor service, or bad
    metrics. Large challenges are more strategic, with platforms unable to align vision
    with architecture and the inability to make deliveries on time. DevOps is all
    about continuous value, so anything impacting that delivery can cause failure.
    The transformation failures highlighted included Atlassian and government processes.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，不成功的平台转型未能充分解决小规模和大规模平台建设挑战。小挑战往往与技术或运营相关，例如工具故障、服务质量差或不良指标。大挑战则更多是战略性的，平台无法使愿景与架构对齐，以及无法按时交付。DevOps
    专注于持续的价值，因此任何影响交付的因素都可能导致失败。所强调的转型失败案例包括 Atlassian 和政府流程。
- en: Finally, the chapter concluded by identifying some high-level best practices
    and upcoming technological improvements for platform innovation. Platforms need
    to grow through increased value and an expanding customer base. Realizing this
    requires building effectively, incorporating existing technology, measuring success,
    and keeping up with innovation. Best practices provide guidelines to measure future
    success. Once challenges are identified, the following step requires ensuring
    that testing and measurement processes exist to maintain continuous success. The
    next chapter examines testing models in development, quality assurance in delivery,
    and successful operating platforms.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，本章通过确定一些高级最佳实践和平台创新即将到来的技术改进来结束。平台需要通过增加价值和扩大客户基础来成长。实现这一点需要有效地构建、整合现有技术、衡量成功并跟上创新。最佳实践提供衡量未来成功的指南。一旦确定了挑战，下一步需要确保存在测试和测量流程以保持持续的成功。下一章将探讨开发中的测试模型、交付中的质量保证和成功的运营平台。
- en: Call to action
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 行动呼吁
- en: Establish SLAs and SLIs driven by your strategic goals for the platform.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为平台制定由战略目标驱动的服务级别协议（SLA）和服务级别指标（SLI）。
- en: Routinely evaluate others in the field to learn from their successes and failures.
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 常规评估该领域的其他人，以从他们的成功和失败中学习。
- en: Search new technological advances for what revolutionary and evolutionary advances
    exist.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 搜索新的技术进步，了解哪些是革命性和进化性的进步。
