- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: Building an AI Proof of Concept and Measuring Your Solution
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建人工智能概念验证和衡量您的解决方案
- en: '**Proof of Concept** , a.k.a, **PoC** , is perceived differently in organizations
    depending on their size, goals, end users, leadership strategy, and so on. We
    have all been in organizations of multiple sizes and have experienced this firsthand.
    To put this in context, in regulated industries, PoC might not even start until
    you have gained the required sponsorship and compliance approvals. But for start-ups
    or technology companies, PoC is a way to prove the idea, and they might operate
    in a “fail fast, innovate faster” mindset. Whatever organization you might be
    in, PoC is still the first step towards deploying the AI solution to production;
    hence, it is extremely important to spend time and resources on building it.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**概念验证**，简称 **PoC**，在组织中的看法因组织规模、目标、最终用户、领导策略等因素而异。我们都在不同规模的组织中工作过，并亲身体验过这一点。为了使这一点更具背景，在受监管的行业中，PoC
    可能甚至在您获得所需的赞助和合规批准之前都不会开始。但对于初创公司或科技公司来说，PoC 是证明想法的一种方式，他们可能以“快速失败，更快创新”的心态运营。无论您在哪个组织，PoC
    都是部署 AI 解决方案到生产的第一步；因此，在构建它时投入时间和资源至关重要。'
- en: Each factor discussed in the previous chapters, such as framing the right AI
    problem, selecting the appropriate AI technology, and bringing the right stakeholders
    on board, is critical for building a compelling PoC. This chapter will explore
    how a well-executed PoC demonstrates the inner workings of your solution and helps
    gain the traction and buy-in needed for further development.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在前几章中讨论的每个因素，如正确界定人工智能问题、选择适当的 AI 技术、以及引入合适的利益相关者，对于构建有说服力的 PoC 都至关重要。本章将探讨一个执行良好的
    PoC 如何展示您解决方案的内部工作原理，并帮助获得进一步开发所需的牵引力和支持。
- en: 'We will cover the following key topics in this chapter:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下关键主题：
- en: PoC playbook – a guide to building effective PoCs
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PoC 案例手册 - 构建有效 PoC 的指南
- en: Best practices for building a successful AI PoC
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建成功的 AI PoC 的最佳实践
- en: Measuring the performance of a PoC
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衡量 PoC 的性能
- en: Pilot to proof – a success story
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从试点到验证 - 一个成功故事
- en: Putting it all together
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 整合所有内容
- en: PoC playbook – a guide to building effective PoCs
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: PoC 案例手册 - 构建有效 PoC 的指南
- en: PoC is the first step to bringing your idea to life and showcasing the feasibility
    of your idea to investors or senior leadership within an organization. PoC can
    range from a simple model showcased in Excel to a sophisticated UI, depending
    on the use case, budget, resources, and time. It is possible to build the same
    use case with both Excel and a machine learning model. Let’s say you are trying
    to perform forecasting. That can be achieved in Excel using simple statistical
    techniques such as ARIMA, and you could use a Python library for it. However,
    you cannot build a neural network model in Excel, which can be easily coded in
    Python using standard libraries. Such scenarios highlight the importance of using
    a code-first approach, rather than tools such as Excel.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: PoC 是将您的想法付诸实践并展示其可行性给投资者或组织内部高级领导的第一步。根据用例、预算、资源和时间，PoC 可以从 Excel 中展示的简单模型到复杂的用户界面。例如，您可能正在尝试进行预测。这可以通过
    Excel 中的简单统计技术如 ARIMA 实现，您也可以使用 Python 库。然而，您无法在 Excel 中构建一个可以用标准库轻松编码的神经网络模型。这样的场景突出了使用代码优先方法的重要性，而不是像
    Excel 这样的工具。
- en: In simple words, it is a small-scale, low-risk experiment designed to test the
    feasibility and potential impact of an AI solution for a specific use case. Consider
    your PoC as a rehearsal before the grand performance.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，它是一个小规模、低风险的实验，旨在测试特定用例的人工智能解决方案的可行性和潜在影响。将您的 PoC 视为盛大表演前的排练。
- en: 'Let’s dive further into the benefits of building a PoC:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步探讨构建 PoC 的好处：
- en: '**Cost-effective** : Building a full-fledged AI solution requires time and
    resources, but building a PoC requires significantly fewer resources and saves
    time.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本效益**：构建一个完整的 AI 解决方案需要时间和资源，但构建 PoC 需要的资源显著更少，且节省时间。'
- en: '**Fail fast and improve faster** : A PoC helps you prove whether the idea is
    suitable for the enterprise. You can quickly pivot to a new idea if the results
    are unfavorable.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速失败并快速改进**：PoC 帮助您证明想法是否适合企业。如果结果不理想，您可以快速转向新的想法。'
- en: '**Rapid deployment** : A PoC is a great way to test new features within a product
    and assess its advantages. This way, you can learn about the features that will
    work in the real world and include them in the roadmap. The ideal duration of
    building a PoC should be 4 to 6 weeks, but can vary depending on the complexity
    of the use case, data availability, team skill set, and so on.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速部署**：PoC是测试产品中新功能并评估其优势的绝佳方式。这样，你可以了解哪些功能将在现实世界中发挥作用，并将它们纳入路线图。构建PoC的理想时间应该是4到6周，但可能会根据用例的复杂性、数据可用性、团队技能等因素而有所不同。'
- en: '**Early issue detection** : A PoC allows you to detect potential issues in
    the product that might have been a roadblock in the later stages of development.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**早期问题检测**：PoC允许你检测产品中可能成为开发后期障碍的潜在问题。'
- en: '**Valuable data and knowledge** : The PoC process provides insights into data
    needs, AI tools, and required skill sets for future projects.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**宝贵的数据和知识**：PoC（Proof of Concept，概念验证）过程提供了对未来项目数据需求、AI工具和所需技能集的见解。'
- en: Creating a PoC
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建PoC
- en: Though we have covered a few of these steps in earlier chapters, we are reiterating
    them here to contextualize everything. Creating a PoC usually involves well-defined
    documentation outlining the project’s requirements and objectives, as well as
    the responsibilities assigned to each stakeholder. Another outcome of a successful
    PoC is a roadmap of deployment to production.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们在前面的章节中已经介绍了一些这些步骤，但我们在这里重申它们，以便使一切内容都得到上下文化。创建PoC通常涉及详细的项目需求、目标和分配给每个利益相关者的责任的文档。PoC成功的另一个结果是部署到生产的路线图。
- en: 'Here is the five-step process that generally works for an enterprise:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个通常适用于企业的五步流程：
- en: '**Define the need** : If you have reached this stage of creating a PoC and
    read the previous chapters, you have figured this out. This will include framing
    the problem, identifying the end users, analyzing historical solutions, defining
    the unique proposition, and estimating the resources needed to build the solution.'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义需求**：如果你已经达到创建PoC的阶段并阅读了前面的章节，你就已经弄明白了。这包括界定问题、确定最终用户、分析历史解决方案、定义独特的卖点以及估计构建解决方案所需的资源。'
- en: '**Pick the technical approach** : When creating an AI solution, more often
    than not, you have a choice between multiple models. You could be choosing between
    a simple statistical model (e.g., ARIMA) and a deep learning model (e.g., LSTM),
    let’s say, for a forecasting task. It is important to pen down all the approaches
    and ensure that you pick an approach for PoC that can be executed using limited
    resources. After a successful PoC, you can pick up a resource-intensive approach.
    Another thing to note is that data availability will also determine the approach.'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择技术方法**：在创建AI解决方案时，你通常有多种模型可供选择。你可能需要在简单的统计模型（例如ARIMA）和深度学习模型（例如LSTM）之间进行选择，比如用于预测任务。重要的是要列出所有方法，并确保你选择一个可以使用有限资源执行的PoC方法。PoC成功后，你可以选择资源密集型的方法。还有一点需要注意，数据可用性也会决定方法。'
- en: Sometimes, it is not about choosing just one model; it could be about using
    an array of different models to make an informed decision on what can be used
    for production. For example, in the case of forecasting tasks, depending on your
    data, deep learning might be a more effective approach, but you can only know
    that if you have compared the performance with statistical techniques such as
    ARIMA.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，并不是只选择一个模型；可能需要使用一系列不同的模型来做出明智的决定，确定哪些可以用于生产。例如，在预测任务的情况下，根据你的数据，深度学习可能是一个更有效的方法，但你只能通过将性能与统计技术（如ARIMA）进行比较来知道这一点。
- en: '**Creating a working PoC** : Tons of people confuse this step with boiling
    the ocean, but that’s not the purpose of the PoC. An ideal PoC should be a scaled-down
    yet working version of the solution. It should have the most crucial functionality
    and a basic UI for your end users to test the product. Avoid the nice-to-have
    features here and stick with a basic working model.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建一个可工作的PoC**：很多人把这个步骤与大海捞针混淆，但PoC的目的并不是这样。理想的PoC应该是解决方案的缩小版但仍然可以工作。它应该包含最关键的功能和基本用户界面，以便最终用户测试产品。避免添加那些“想要有”的功能，坚持基本的工作模型。'
- en: '**Iterate and improve** : The PoC is not the final product, which means that
    during its testing, you will discover issues that should be mitigated in the next
    phase of the project, which is usually building an MVP. It is important to document
    all the feedback from your end users or any individuals who are testing your product.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**迭代和改进**：PoC不是最终产品，这意味着在测试过程中，您将发现应在项目下一阶段（通常是构建MVP）中缓解的问题。记录来自您的最终用户或任何测试您产品的个人的所有反馈非常重要。'
- en: '**Create a roadmap** : Based on the PoC results, you will have a few action
    items. These could include refining the PoC, halting the project at PoC but documenting
    the learnings that could be applied to other projects, pivoting to another version
    of the solution, or migrating to production. It is important to socialize the
    next steps and milestones for your project so that everyone is informed.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**制定路线图**：根据PoC结果，您将有一些行动项。这些可能包括精炼PoC、在PoC阶段停止项目但记录可应用于其他项目的经验教训、转向解决方案的另一个版本或迁移到生产。重要的是要分享项目的下一步和里程碑，以便每个人都了解。'
- en: In the next section, we will double-click on some possibilities that could arise
    after the PoC has been built and shipped.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将深入探讨在PoC构建并交付后可能出现的某些可能性。
- en: Critical tactical decisions post-PoC for AI adoption
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: PoC之后对AI采用的临界战术决策
- en: 'After building the PoC, it is essential to analyze the performance and make
    critical decisions to determine the next steps in your AI journey. Here are the
    three basic paths to cons ider:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建PoC之后，分析性能并做出关键决策以确定AI旅程的下一步至关重要。以下是三个基本路径供您考虑：
- en: '**Refine the PoC** : Once the PoC is built, the next step is to analyze the
    results in detail to identify areas for improvement. This can include the following:'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**精炼PoC**：一旦PoC构建完成，下一步是详细分析结果以确定改进领域。这可以包括以下内容：'
- en: '**Improving model performance** : If the AI solution is underperforming or
    delivering results that aren’t meeting expectations, a different approach may
    be required to improve accuracy.'
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提升模型性能**：如果AI解决方案表现不佳或交付的结果未达到预期，则可能需要采用不同的方法来提高准确性。'
- en: '**Enhancing data quality** : During the PoC, you might realize that specific
    data is missing or of low quality. Refining the PoC could involve cleaning and
    strengthening the dataset or adding new, more relevant data.'
  id: totrans-33
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提升数据质量**：在PoC过程中，您可能会意识到某些数据缺失或质量低下。精炼PoC可能包括清理和加强数据集或添加新的、更相关的数据。'
- en: '**Improving user experience** : Gathering feedback from end users and stakeholders
    is essential to understanding how the solution performs in real-world scenarios.
    Refining the PoC might include adjustments to make the solution more user-friendly
    or aligned with the business’s needs.'
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提升用户体验**：收集最终用户和利益相关者的反馈对于了解解决方案在实际场景中的表现至关重要。精炼PoC可能包括调整以使解决方案更易于使用或符合业务需求。'
- en: '**Changing the success metric** : It is also possible that the metric you thought
    was relevant for the use case is no longer impactful, so it might be a good idea
    to take a step back and consider the success metrics.'
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**改变成功指标**：也可能发生的情况是，您认为与用例相关的指标不再具有影响力，因此退一步考虑成功指标可能是个好主意。'
- en: '**End result** : You would gather the feedback on the refined PoC and create
    a **minimal viable product** ( **MVP** ). The details for building the MVP are
    mentioned in Step 3.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**最终结果**：您将收集对精炼后的PoC的反馈，并创建一个**最小可行产品**（**MVP**）。构建MVP的详细信息在步骤3中提及。'
- en: '**Pivot** : Sometimes, the results of a PoC show that the initial approach
    is not delivering the expected value or that business goals changed while you
    were building the PoC. In such cases, you might need to pivot:'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**转型**：有时，PoC的结果表明初始方法没有产生预期的价值，或者您在构建PoC期间业务目标发生了变化。在这种情况下，您可能需要转型：'
- en: '**Rethink the approach** : If the PoC proves that the original AI approach
    is not viable (e.g., due to high complexity, lack of data, or poor performance),
    it may be necessary to explore alternative AI models, algorithms, or even business
    problems to solve.'
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新思考方法**：如果PoC证明原始AI方法不可行（例如，由于复杂性高、数据不足或性能不佳），则可能有必要探索替代AI模型、算法，甚至解决业务问题。'
- en: '**Revisit problem framing** : It’s possible that the problem you set out to
    solve wasn’t framed correctly for an AI solution. You may need to redefine the
    business challenge or explore other use cases that are a better fit for AI.'
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新审视问题框架**：可能您最初设定的要解决的问题不适合AI解决方案。您可能需要重新定义商业挑战或探索更适合AI的其他用例。'
- en: '**Change the technology stack** : Sometimes, a pivot might involve switching
    to a different technology, AI model, or toolset better suited to achieving the
    desired business outcomes.'
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**改变技术栈**：有时，转型可能涉及切换到更适合实现预期商业成果的不同技术、AI模型或工具集。'
- en: '**End result** : You would do thorough testing and evaluation again, gather
    feedback from your end users, and make a determination on whether the project
    should be deployed to production.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**最终结果**：您将再次进行彻底的测试和评估，收集最终用户的反馈，并决定项目是否应该部署到生产环境中。'
- en: '**Build an MVP:** If the PoC delivers promising results, the next logical step
    is to build an MVP. This involves the following:'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**构建MVP**：如果概念验证（PoC）提供了有希望的结果，下一步合乎逻辑的步骤就是构建MVP。这包括以下内容：'
- en: '**Scaling the solution** : The MVP is a more robust version of the PoC that
    can be deployed to a larger audience. It will likely need additional features,
    security measures, and scalability improvements to handle more complex use cases
    or larger datasets.'
  id: totrans-43
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**扩展解决方案**：MVP是比概念验证（PoC）更健壮的版本，可以部署给更广泛的受众。它可能需要额外的功能、安全措施和可扩展性改进，以处理更复杂的用例或更大的数据集。'
- en: '**Integrating with existing systems** : Building an MVP requires integrating
    the solution with other systems and workflows in the organization. This ensures
    that the AI solution can operate within the business ecosystem.'
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与现有系统集成**：构建最小可行产品（MVP）需要将解决方案与组织中的其他系统和工作流程集成。这确保了AI解决方案可以在商业生态系统中运行。'
- en: '**Testing real-world performance** : The MVP phase includes extensive testing
    to ensure the AI solution works well in a real-world environment. You’ll need
    to monitor **Key Performance Indicators** ( **KPIs** ) and make adjustments as
    necessary.'
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测试实际性能**：MVP阶段包括广泛的测试，以确保AI解决方案在现实世界环境中运行良好。您需要监控**关键绩效指标**（**KPIs**）并根据需要做出调整。'
- en: '**Gathering user feedback** : As with the PoC, it’s important to continue gathering
    feedback from stakeholders and end users to refine the solution during the MVP
    stage.'
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收集用户反馈**：与概念验证（PoC）一样，在MVP阶段继续收集利益相关者和最终用户的反馈，以完善解决方案。'
- en: '**Leverage cloud platforms** : A practical approach to scale the AI solution
    is to leverage cloud infrastructure. Managed AI services, such as AI/ML platforms
    offered by cloud hyperscalers can streamline the process of training, deploying,
    and maintaining AI models at scale while delivering high availability and resilience.'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**利用云平台**：扩展AI解决方案的一种实用方法是利用云基础设施。云超大规模提供商提供的托管AI服务，如AI/ML平台，可以简化大规模训练、部署和维护AI模型的过程，同时提供高可用性和弹性。'
- en: '**Change management** : Change management is critical to successfully adopting
    AI within your organization, as it often requires significant shifts in roles,
    responsibilities, and processes. Without a proper change management process in
    place, you could meet resistance from teams accustomed to legacy workflows, which
    can delay AI deployment or, worse, cause the initiative to fail.'
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**变更管理**：在您的组织中成功采用AI的关键是变更管理，因为它通常需要角色、责任和流程的重大转变。如果没有适当的变更管理流程，您可能会遇到习惯于传统工作流程的团队的阻力，这可能会延迟AI的部署，或者更糟，导致该倡议失败。'
- en: '**Communicate clearly:** To combat resistance, you must communicate how AI
    will enhance rather than replace existing roles. Align your AI projects with overarching
    business goals to show how AI adoption supports broader organizational success.
    Leadership should foster a culture that encourages experimentation and values
    data-driven decision-making.'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**清晰沟通**：为了克服阻力，您必须说明AI将如何增强而不是取代现有角色。将您的AI项目与整体业务目标对齐，以展示AI的采用如何支持更广泛的组织成功。领导层应培养一种鼓励实验并重视数据驱动决策的文化。'
- en: '**End result** : By now, all stakeholders and senior leadership should be convinced
    of the solution. This is the point after which you start creating deployment plans
    for production and gathering the required resources.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**最终结果**：到目前为止，所有利益相关者和高级领导都应该对解决方案有信心。这是您开始创建生产部署计划并收集所需资源的点。'
- en: We discussed the three critical decisions you would have to make post the PoC
    creation. But to lead to a successful outcome, there are certain best practices
    you can follow. In the next section, we will discuss the best practices in detail.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了在PoC创建之后你必须做出的三个关键决策。但要达到成功的结局，你可以遵循某些最佳实践。在下一节中，我们将详细讨论这些最佳实践。
- en: Best practices for building a successful AI PoC
  id: totrans-52
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建成功的AI PoC的最佳实践
- en: 'We understand there is no blueprint for best practices around the AI PoC, but
    this is what we have learned from our combined experience of shipping multiple
    PoCs across different domains:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们明白没有关于AI PoC最佳实践的蓝图，但这是我们结合在不同领域推出多个PoC的经验所学到的东西：
- en: Opt-in for agile methodology to have more flexibility in your AI project.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择敏捷方法以在AI项目中拥有更多灵活性。
- en: Define success for your AI project in the beginning. Then, set incremental goals
    and milestones to track progress throughout the PoC.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一开始就为你的AI项目定义成功。然后，设定增量目标和里程碑，以在整个PoC过程中跟踪进度。
- en: Secure sponsorship from senior leadership before beginning the development.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在开始开发之前，从高级领导层那里获得安全赞助。
- en: Ensure that you have high-quality data before the development. This will set
    you up for success. This includes detailed data quality checks, robust data cleaning
    measures, and a plan to augment data through synthetic data generation techniques,
    if necessary.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在开发之前确保你有高质量的数据。这将为你成功奠定基础。这包括详细的数据质量检查、稳健的数据清理措施，以及在必要时通过合成数据生成技术增强数据的计划。
- en: Partner with experienced AI consultants and solutions architects to guide the
    PoC.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与经验丰富的AI顾问和解决方案架构师合作，以指导PoC。
- en: Invest in training and development to upskill your team in AI. The training
    and development can be in terms of inviting experts, giving the opportunity for
    folks to attend conferences, or providing free subscriptions to e-learning platforms.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在AI方面投资于培训和开发，以提高你团队的技能。这些培训和开发可以是邀请专家、为人们提供参加会议的机会，或提供免费订阅在线学习平台。
- en: If integrating with a legacy solution, document a detailed plan highlighting
    how the integration will work. This plan should also include decommissioning any
    components to make the solution more effective.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果要集成遗留解决方案，制定一个详细的计划，突出集成将如何工作。此计划还应包括退役任何组件以使解决方案更有效。
- en: Meet your stakeholders regularly to update them on PoC progress and seek their
    input to address concerns and incorporate suggestions.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期与利益相关者会面，更新他们关于PoC进度的信息，并寻求他们的意见以解决担忧和采纳建议。
- en: To avoid last-minute hassle, focus on data governance during the PoC stage.
    This should include data anonymization, access controls, compliance requirements,
    and encryption to protect sensitive data.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了避免最后一刻的麻烦，在PoC阶段关注数据治理。这应包括数据匿名化、访问控制、合规要求和对敏感数据的加密。
- en: You should have a plan to deploy to production, as that is the goal. Include
    the next steps, resources, and timeline for deployment to keep everyone informed.
    Here, it is also important to define what success will look like in production.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你应该有一个部署到生产的计划，因为那是目标。包括部署的下一步、资源和时间表，以使每个人都能了解情况。在这里，定义生产中的成功也很重要。
- en: Meet with the model review committee from the get-go to seek their input and
    ask your data scientists to start the documentation during the PoC development
    phase to avoid missing out on any details.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一开始就与模型审查委员会会面，寻求他们的意见，并要求你的数据科学家在PoC开发阶段开始文档工作，以避免遗漏任何细节。
- en: Start with simple models for PoC so you can manage them with limited resources.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从简单的模型开始PoC，这样你就可以用有限的资源管理它们。
- en: Develop a framework for testing and evaluating your AI solutions with clearly
    defined metrics. We will explore this in the upcoming section.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为测试和评估你的AI解决方案制定一个框架，其中包含明确定义的指标。我们将在下一节中探讨这一点。
- en: Plan the scalability of your AI solution from the start. This means developing
    PoC AI that can grow and adapt as your business needs evolve. It also means allocating
    cloud resources to scale faster.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一开始就规划你AI解决方案的可扩展性。这意味着开发可以随着你的业务需求变化而增长和适应的PoC AI。这也意味着分配云资源以实现更快地扩展。
- en: Define KPIs to track the PoC’s success against its objectives.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义KPI以跟踪PoC相对于其目标的成功。
- en: Regularly analyze performance data to identify areas for improvement and optimize
    AI models accordingly.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期分析性能数据，以确定改进领域并相应优化AI模型。
- en: Normalize failing so your team members are continuously innovating and evolving
    to a better AI-driven solution.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将失败正常化，以便您的团队成员能够持续创新并不断进化到更好的AI驱动解决方案。
- en: Create a detailed report summarizing the PoC process, including successes, failures,
    and key takeaways to inform future development.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一份详细的报告，总结PoC过程，包括成功、失败和关键经验教训，以指导未来的发展。
- en: Every AI initiative should be part of a broader strategic vision that aligns
    with enterprise-wide goals. Establish clear KPIs from the outset to measure the
    success of your AI projects, then ensure that cross-functional teams support AI
    initiatives to foster collaboration.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个AI倡议都应该是与整个企业目标相一致的战略愿景的一部分。从一开始就建立明确的KPI来衡量AI项目的成功，然后确保跨职能团队支持AI倡议，以促进协作。
- en: 'Your organization should implement ethical AI frameworks to ensure the responsible
    use of AI. You should also establish a dedicated AI ethics board and stay updated
    with evolving regulations to address compliance needs and maintain public trust
    in your AI deployments. It is also important to comply with the regulations of
    the country of residence, such as if you are an EU resident, the laws are more
    stringent than those in the US (please refer to the *EU AI Act* : [https://artificialintelligenceact.eu/](https://artificialintelligenceact.eu/)
    ).'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的组织应实施道德AI框架，以确保AI的负责任使用。您还应建立一个专门的AI道德委员会，并关注不断变化的法规，以满足合规需求并维护公众对您AI部署的信任。同样重要的是遵守居住国的法规，例如，如果您是欧盟居民，法律比美国的法律更为严格（请参阅*欧盟AI法案*：[https://artificialintelligenceact.eu/](https://artificialintelligenceact.eu/)）。
- en: At the end of the day, remember the PoC is the first step towards deploying
    to production, so ensure that the overall strategy includes that, so you and your
    organization are prepared for deployment.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，记住PoC是部署到生产的第一步，因此确保整体战略包括这一点，以便您和组织为部署做好准备。
- en: 'Though building a PoC might seem like an obvious choice for most use cases,
    there are also scenarios when building a PoC is unnecessary. Let’s uncover some
    of those here:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然对于大多数用例来说，构建PoC可能看起来是一个明显的选择，但也有一些情况下构建PoC是不必要的。让我们在这里揭露一些这些情况：
- en: If the use case is time-sensitive, such as forecasting drug supply during a
    pandemic, since this is a life-and-death kind of use case, you might want to jump
    straight to the final product
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用例具有时间敏感性，例如在疫情期间预测药物供应，由于这是一个生死攸关的用例，您可能希望直接跳到最终产品。
- en: If the task just involves simple statistical methods and there is no plan for
    leveraging complex ML or deep learning algorithms, here the PoC investment cannot
    b e justified
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果任务仅涉及简单的统计方法，并且没有利用复杂机器学习或深度学习算法的计划，那么这里的PoC投资是无法证明其合理性的。
- en: Building an AI solution is one part of the equation, but measuring its success
    is equally important to prove its worth. Measuring the AI solution is one of the
    biggest challenges practitioners face, so we propose a framework to reduce the
    burden. In the next section, let’s dig deep into what metrics matter for AI success.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 构建AI解决方案只是方程的一部分，但衡量其成功同样重要，以证明其价值。衡量AI解决方案是实践者面临的最大挑战之一，因此我们提出一个框架来减轻负担。在下一节中，让我们深入探讨对AI成功至关重要的指标。
- en: Measuring the performance of a PoC
  id: totrans-79
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测量PoC的性能
- en: There is a famous saying, “You can’t improve what you can’t measure.” This is
    the case for enterprise AI solutions as well. Once you have built the PoC, you
    need to justify the investment; hence, it becomes vital to have a robust framework
    to help you track your AI solutions. As the AI solutions evolve and move from
    PoC to MVP, relying on the technical model performance gives you an incomplete
    picture of your AI solution. The technical metrics provide us with the relative
    performance of the predictive model compared to the baseline, such as random guessing,
    but offer no direct derivation of the business value of the model. Along with
    that, we also have to consider that models are not launched in silos; they are
    usually part of a system where the model is either integrated into a legacy system
    or launched as an application. You need to be able to track the performance of
    the AI system as well.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 有句名言：“你不能改进你不能衡量的东西。”这对于企业AI解决方案也是如此。一旦你构建了PoC，你需要证明投资的合理性；因此，拥有一个强大的框架来帮助你跟踪你的AI解决方案变得至关重要。随着AI解决方案的发展，从PoC到MVP，仅仅依赖技术模型性能并不能给你一个完整的AI解决方案图景。技术指标为我们提供了与基线（如随机猜测）相比的预测模型的相对性能，但并没有直接推导出模型的企业价值。此外，我们还需要考虑模型不是孤立发布的；它们通常是系统的一部分，其中模型要么集成到遗留系统中，要么作为应用程序发布。你需要能够跟踪AI系统的性能。
- en: To cover all these aspects, we propose the following guidelines, which provide
    a 360-degree view of how the AI solution is performing so that you can make appropriate
    remediation. Measuring the PoC is the same as measuring the performance of the
    AI system, which we cover in detail in future chapters. Following is a quick snapshot
    of the metrics that you might want to consider.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 为了涵盖所有这些方面，我们提出了以下指南，这些指南提供了一个全方位的视角，以了解AI解决方案的表现，以便您可以进行适当的补救。衡量PoC与衡量AI系统的性能相同，我们将在未来的章节中详细讨论。以下是您可能希望考虑的一些指标快照。
- en: Model metrics
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型指标
- en: These metrics evaluate the technical performance of the AI/ML model and ensure
    that it meets the expected level of accuracy, efficiency, and reliability. We
    will discuss this in more detail in [*Chapter 6*](Chapter_6.xhtml#_idTextAnchor197)
    .
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标评估AI/ML模型的性能，并确保其达到预期的准确度、效率和可靠性水平。我们将在[*第6章*](Chapter_6.xhtml#_idTextAnchor197)中更详细地讨论这一点。
- en: System metrics
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统指标
- en: With the advent of GenAI systems, it has become critical to measure how your
    overall system is performing. GenAI systems are complicated and often consist
    of multiple components, such as data, prompts, and foundation models, all presented
    as a UI or integration within a tool.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 随着通用人工智能（GenAI）系统的出现，衡量您整体系统的表现变得至关重要。通用人工智能系统复杂且通常由多个组件组成，如数据、提示和基础模型，这些组件都作为UI或工具内的集成呈现。
- en: 'Here are some metrics to consider while tracking system quality:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在跟踪系统质量时，以下是一些需要考虑的指标：
- en: '**Data relevance** : The degree to which all data is necessary for the current
    model and project. Outdated or irrelevant data can introduce biases and inefficiencies,
    leading to harmful outputs.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据相关性**：所有数据对于当前模型和项目的必要性程度。过时或不相关的数据可能会引入偏差和低效，导致有害的输出。'
- en: '**Data and AI assets and reusability** : The percentage of your data and AI
    assets that are discoverable and usable. It is crucial to maintain a system where
    you can measure data drift and update the data as soon as performance is below
    the threshold.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和AI资产的可发现性和可重用性**：您数据和AI资产的可发现和可使用百分比。维护一个可以衡量数据漂移并在性能低于阈值时立即更新数据的系统至关重要。'
- en: '**Throughput** : This is the volume of information a generative AI system can
    handle in a specific period. Calculating this metric involves understanding the
    model’s processing speed, efficiency at scale, parallelization, and optimized
    resource utilization.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**吞吐量**：这是生成式AI系统在特定时期内可以处理的信息量。计算此指标需要了解模型的处理速度、大规模效率、并行化和优化资源利用。'
- en: '**System latency** : This is the time it takes the system to respond with an
    answer. This includes any networking delays, data latency, model latency, and
    so on. Compromised system latency can hamper user experience and significantly
    reduce adoption within an organization or brand royalty. Speaking with your cloud
    provider to provide constant throughput is crucial, so you don’t have to worry
    about significant traffic hitting your application simultaneously.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统延迟**：这是系统响应答案所需的时间。这包括任何网络延迟、数据延迟、模型延迟等。系统延迟受损可能会损害用户体验并显著降低组织或品牌特许权使用费的采用率。与云服务提供商沟通以提供恒定的吞吐量至关重要，这样你就不必担心大量流量同时冲击你的应用程序。'
- en: '**Integration and backward compatibility** : The upstream and downstream systems
    APIs can integrate directly with GenAI models. You should also consider whether
    the next version of models will impact the system built on top of existing models
    (not just limited to prompt engineering).'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成和向后兼容性**：上游和下游系统API可以直接与GenAI模型集成。你还应考虑下一个版本的模式是否会影响基于现有模型构建的系统（而不仅仅是限于提示工程）。'
- en: Business metrics
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业指标
- en: 'These are some of the most difficult to define. But we like to think of them
    as follows: What do you define as a “success” for the AI/ML system?'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是最难定义的。但我们喜欢这样想：你如何定义AI/ML系统的“成功”？
- en: 'Align this with the KPI for the use case example: for a recommendation, it
    could be retention or an increase in net new customers; in that case, success
    might look like a 5% increase in net new customers.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 将此与用例示例的KPI对齐：对于一个推荐，可能是保留率或净新客户的增加；在这种情况下，成功可能表现为净新客户增加5%。
- en: 'Some examples of business value improvement metrics inclu de the following:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一些业务价值改进指标示例包括以下内容：
- en: Customer service
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户服务
- en: Reduction in average handling time and co st per interaction
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均处理时间和每次互动成本的降低
- en: Lift in customer s atisfactio n (NPS)
  id: totrans-98
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户满意度（NPS）提升
- en: Marketing
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场
- en: 'Time saved (e.g., hours) from streamlined processes: brief writing, editing,
    collabor ation, and so on.'
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从简化流程中节省的时间（例如，小时）：简短的写作、编辑、协作等。
- en: Higher **Return on Ad Spend** ( **ROAS** ) due to increase d personalization
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于个性化增加，**广告支出回报率**（**ROAS**）更高
- en: Augmented creativity a nd idea gen eration
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增强创造力和想法生成
- en: Healthcare
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医疗保健
- en: Increased time with patients by reducing adm inistrative burdens
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过减少行政负担增加与患者的相处时间
- en: Better patient outcomes from clear, co nsistent care plans
  id: totrans-105
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自清晰、一致护理计划的更好患者结果
- en: Improved efficiency, reduced wait times, and h igher c are capacity
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高效率、减少等待时间、提高护理能力
- en: Retail
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 零售
- en: Lift i n revenue per visit
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每次访问收入提升
- en: Increases in sales through AI-driven product suggestions
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过AI驱动的产品建议增加的销售
- en: Improvements in customer sati sfaction/experience
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户满意度/体验的提高
- en: Product development
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品开发
- en: Percentage of content influenced by generative AI tools
  id: totrans-112
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 受生成AI工具影响的内容百分比
- en: Employee hours saved from a utomating processes
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过自动化流程节省的员工小时数
- en: Accelerated time-to-value from product launches
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品发布加速带来的价值实现时间
- en: Safety metrics
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全指标
- en: 'According to KPMG, 61% of people aren’t sure they can trust AI systems. Trusting
    AI means being confident about its decisions and feeling okay sharing data to
    help it improve. But many people worry about three risks: AI compromising our
    privacy, harming society, or not being tested enough to be reliable.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 根据KPMG的调查，61%的人不确定他们能否信任AI系统。信任AI意味着对其决策有信心，并且愿意分享数据以帮助其改进。但许多人担心三个风险：AI侵犯我们的隐私、损害社会或没有经过足够的测试以成为可靠的。
- en: '**Bias assessment** : It is critical to measure the representativeness of data.
    Bias gets crippled through data. Hence, ensuring the dataset is diverse and represents
    all classes is important. Bias can cripple your data in the following three ways:'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**偏差评估**：衡量数据的代表性至关重要。偏差通过数据被削弱。因此，确保数据集多样化并代表所有类别很重要。偏差可以通过以下三种方式削弱你的数据：'
- en: '**Selection bias** : This occurs when data is selected that isn’t representative
    of the population as a whole and, therefore, presents a bias.'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择偏差**：这发生在选择的数据不代表整体人口，因此呈现偏差的情况。'
- en: '**Systematic bias** : A consistent error that repeats itself throughout the
    model.'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**系统性偏差**：在整个模型中重复出现的持续错误。'
- en: '**Response bias** : Data participants respond to questions in a way deemed
    false or inaccurate.'
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**响应偏差**：数据参与者以被认为错误或不准确的方式回答问题。'
- en: 'To combat the bias, here are a few data pre-processing steps that can be done
    proactively:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 为了对抗偏差，以下是一些可以主动执行的数据预处理步骤：
- en: Be mindful of outliers, as removing them might not be the best solution. It
    is crucial to analyze the outliers as they might be an indication of a population
    that is missing from your data.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意异常值，因为移除它们可能不是最佳解决方案。分析异常值至关重要，因为它们可能是你数据中缺失的群体的指示。
- en: Handling missing variables can also be a key indicator in introducing bias.
    If missing values are ignored or replaced with the “average” of the data, you
    are effectively altering the results. Your data collection would then be more
    biased to results than reflecting the general “average.”
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理缺失变量也可能是在引入偏差中的关键指标。如果你忽略缺失值或用数据的“平均值”替换它们，你实际上是在改变结果。你的数据收集将因此更多地偏向结果，而不是反映一般的“平均值”。
- en: Over-filtering data can often result in the absence of representation of the
    original data target.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过度过滤数据往往会导致原始数据目标缺乏代表性。
- en: Masking PII is also a great practice unless you are building a healthcare solution
    in which age or gender is an essential parameter in determining the outcome.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除非你正在构建一个需要年龄或性别作为确定结果关键参数的医疗保健解决方案，否则屏蔽PII也是一个很好的实践。
- en: Along with bias in data, it is also important to track bias in your AI system.
    This could look like men receiving better offers or richer credit lines than women.
    Within GenAI solutions, it is important to have robust safety systems in place
    that block any kind of harmful attack. Even if the user tries to jailbreak the
    solution, the LLM will be able to block it by responding, “I am sorry, I can’t
    answer this,” or something similar.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 除了数据中的偏差，跟踪AI系统中的偏差也很重要。这可能表现为男性获得比女性更好的报价或更丰富的信用额度。在GenAI解决方案中，建立强大的安全系统以阻止任何有害攻击至关重要。即使用户尝试越狱解决方案，LLM也能通过回应“很抱歉，我无法回答这个问题”或类似的话来阻止它。
- en: '**Prompt injections** : Prompt injection attacks happen when users subvert
    a language model’s programming by providing alternate instructions in natural
    language. For example, the model would execute code instead of translating text
    in a translation app. This vulnerability is especially alarming in applications
    such as AI personal assistants, which handle confidential information. Imagine
    a user successfully commanding the AI to delete or leak sensitive data. Prompt
    leaking, a variant of prompt injection, involves persuading the model to reveal
    its initial prompt. Prompt Injections and similar attacks can tarnish your brand’s
    image or, worse, cause financial losses.'
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提示注入**：当用户通过提供自然语言中的替代指令来颠覆语言模型的编程时，就会发生提示注入攻击。例如，模型会执行代码而不是在翻译应用中翻译文本。这种漏洞在处理机密信息的AI个人助理等应用程序中尤其令人担忧。想象一下，一个用户成功指挥AI删除或泄露敏感数据。提示泄露是一种提示注入的变体，涉及说服模型揭示其初始提示。提示注入和类似的攻击可能会损害你的品牌形象，或者更糟，造成经济损失。'
- en: 'Here are a few strategies that can be used to safeguard the application:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些可以用来保护应用程序的策略：
- en: Limit the user input length and format, as prompt attacks require lengthy prompts
    to make the model trip. You can perform experiments to derive that optimal number,
    but it shouldn’t be more than 1,000 for the chatbot. Also, make sure to block
    any non-reasonable characters.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制用户输入的长度和格式，因为提示攻击需要较长的提示来使模型出错。你可以进行实验以确定最佳数量，但聊天机器人不应超过1,000个字符。同时，确保阻止任何不合理字符。
- en: Implement access control for LLM access to your backend systems. Equip the LLM
    with dedicated API tokens, such as plugins and data retrieval, and assign permission
    levels (read/write). Adhere to the least privilege principle, limiting the LLM
    to the minimum access required for its designed tasks. For instance, if your app
    scans users’ calendars to identify open slots, it shouldn’t be able to create
    new events.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为LLM访问后端系统实施访问控制。为LLM配备专用API令牌，例如插件和数据检索，并分配权限级别（读取/写入）。遵守最小权限原则，限制LLM仅访问其设计任务所需的最小访问权限。例如，如果你的应用扫描用户的日历来识别空闲时段，它就不应该能够创建新事件。
- en: When implementing internal RAG/Copilot, implement access controls for employees
    based on the confidentiality of the project so that confidential information is
    not exposed. For example, if there is a secret project called “Beta,” only authorized
    users should have access to it. Even if someone tries to jailbreak, they should
    get an “access denied” message.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实施内部RAG/Copilot时，根据项目的机密性对员工实施访问控制，以确保机密信息不被泄露。例如，如果有一个名为“Beta”的秘密项目，只有授权用户才能访问它。即使有人尝试越狱，也应该收到“访问拒绝”的消息。
- en: Monitor the application continuously as users might attack it more than once.
    Be proactive about blocking any user input that starts with “Ignore all prior
    requests.”
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续监控应用程序，因为用户可能会多次攻击它。对于任何以“忽略所有先前请求”开头的用户输入，要积极阻止。
- en: Implement robust logging practices where each user interaction is logged meticulously
    for audit and flagging purposes.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施稳健的日志记录实践，确保每个用户交互都详细记录，以便进行审计和标记。
- en: Another way is to implement red-teaming proactively. This is a proactive approach
    to uncover model weaknesses before the launch. To achieve this, form a varied
    red team, including roles such as design, product, and so on. The objective is
    to develop creative methods for optimizing your language-powered app. Hence, the
    diversity of participation is necessary.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是积极实施红队战术。这是一种在发布前发现模型弱点的积极方法。为了实现这一点，组建一个多样化的红队，包括设计、产品等角色。目标是开发优化您语言驱动应用程序的创造性方法。因此，参与者的多样性是必要的。
- en: 'We have tried to be as comprehensive as possible to cover the metrics and best
    practices for AI and ML solutions within an enterprise. There are a few things
    that might be unique to your application. Here is a summary of the best practices
    for measuring the performance of your AI solutions:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经尽力全面覆盖企业中AI和ML解决方案的指标和最佳实践。可能有一些事情是您应用程序特有的。以下是衡量您AI解决方案性能的最佳实践总结：
- en: Choose metrics based on the problems and goals
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据问题和目标选择指标。
- en: Use diverse and representative data for evaluations
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用多样化和代表性的数据进行评估。
- en: Regularly monitor and track the metrics so you can pivot as needed
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期监控和跟踪指标，以便在需要时进行调整。
- en: Always rely on more than one metric to get a holistic understanding of the performance
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总是依赖多个指标来获得对性能的整体理解。
- en: Be proactive about setting the expectations that AI solutions might take some
    time to reap the benefits, so define long-term and short-term goals clearly
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 积极设定预期，即AI解决方案可能需要一些时间才能获得收益，因此要明确定义长期和短期目标。
- en: It is also important to set the right expectations with the AI solution. An
    AI solution is not the be-all and end-all. Despite the right ingredients, the
    model might hallucinate or produce incorrect predictions.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 也要正确设置AI解决方案的预期。AI解决方案不是万能的。尽管有正确的成分，模型可能会产生幻觉或错误的预测。
- en: In this section, we provided a quick summary of the metrics that you would choose
    to prove the viability of your PoC to advance it to the next stage. In the next
    section, let’s discuss a case study in detail to see how all of this fits in an
    enterprise environment.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们简要总结了您会选择哪些指标来证明您的PoC的可行性，以便将其推进到下一阶段。在下一节中，让我们详细讨论一个案例研究，看看所有这些如何在企业环境中适用。
- en: 'Scenario 1: From pilot to proof – a success story'
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景1：从试点到证明 - 一个成功故事
- en: A global pharmaceutical company faced persistent challenges with demand forecasting
    for its blockbuster drug. Traditional forecasting methods, reliant on historical
    sales data and manual adjustments, often resulted in inaccuracies, leading to
    stockouts or overproduction. Recognizing the need for a more robust and data-driven
    approach, the company explored **machine learning** ( **ML** ) as a solution to
    impro ve forecasting precision.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 一家全球制药公司在其重磅药物的需求预测方面面临持续的挑战。传统的预测方法，依赖于历史销售数据和人工调整，往往导致不准确，导致缺货或过度生产。认识到需要更稳健和基于数据的方法，公司探索**机器学习**（**ML**）作为提高预测精度的解决方案。
- en: The PoC
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 原型验证（PoC）
- en: 'The company embarked on a PoC to assess the feasibility of an ML-based forecasting
    engine. The success of this initiative was driven by four key factors:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 公司启动了一个PoC来评估基于ML的预测引擎的可行性。该倡议的成功由四个关键因素驱动：
- en: '**High-quality data** : The team ensured that the data fed into the ML models
    was clean, comprehensive, and representative of various market conditions. Historical
    sales data was augmented with external factors such as seasonality, competitor
    activities, and macroeconomic trends to enhance prediction accuracy. Robust data
    pipelines were established to maintain consistency and integrity.'
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**高质量数据**：团队确保输入到机器学习模型中的数据是干净的、全面的，并且能够代表各种市场条件。历史销售数据通过季节性、竞争对手活动和宏观经济趋势等外部因素进行了增强，以增强预测准确性。建立了稳健的数据管道以保持一致性和完整性。'
- en: '**Clear objectives** : The PoC was designed with well-defined success criteria:'
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**明确的目标**：原型验证（PoC）是根据明确的成功标准设计的：'
- en: Reduce **Mean Absolute Percentage Error** ( **MAPE** ) by at least 10% compared
    to existing models
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与现有模型相比，至少降低10%的**平均绝对百分比误差**（MAPE）
- en: Reduce the manual effort required for forecasting
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少预测所需的手动工作量
- en: Enhance decision-making for production and supply chain teams
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升生产和供应链团队的决定力
- en: '**Stakeholder buy-in** : Engaging key stakeholders early was crucial to the
    project’s success. The data science team collaborated with supply chain planners,
    demand planners and sales leaders, and IT teams to ensure alignment. Regular workshops
    and interactive sessions helped address concerns, set expectations, and secure
    executive sponsorship.'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**利益相关者支持**：早期吸引关键利益相关者对项目的成功至关重要。数据科学团队与供应链规划师、需求规划师和销售领导者以及IT团队合作，确保一致。定期的研讨会和互动会议有助于解决担忧、设定期望并获得高层支持。'
- en: '**Rapid prototyping and iteration** : Instead of a lengthy development cycle,
    the team built a working prototype within a few weeks using cloud-based ML platforms.
    They iterated quickly based on feedback, refining model features and incorporating
    domain expert ise to improve performance.'
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**快速原型设计和迭代**：团队不是通过漫长的开发周期，而是在几周内使用基于云的机器学习平台构建了一个可工作的原型。他们根据反馈快速迭代，优化模型功能，并纳入领域专业知识以提高性能。'
- en: Moving to production
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 转向生产
- en: 'After the PoC demonstrated a 10% improvement in forecasting accuracy, leadership
    approved the full-scale deployment. Key steps in transitioning to production included
    the following:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在原型验证（PoC）展示了预测准确率提高了10%之后，领导层批准了全面部署。过渡到生产的关键步骤包括以下内容：
- en: '**Automation and integration** : The ML model was integrated into the company’s
    existing demand planning tools, enabling seamless data ingestion and automated
    updates'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化和集成**：机器学习模型被集成到公司现有的需求规划工具中，实现了无缝数据摄取和自动更新'
- en: '**User training and adoption** : Supply chain and sales teams were trained
    on how to interpret and act on ML-generated forecasts, ensuring smooth adoption'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户培训和采用**：供应链和销售团队接受了如何解释和采取行动基于机器学习生成的预测的培训，确保顺利采用'
- en: '**Continuous monitoring and refinement** : A governance framework was established
    to monitor performance, retrain models with new data, and adapt t o evolving market
    conditions'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续监控和改进**：建立了一个治理框架来监控性能、用新数据重新训练模型，并适应不断变化的市场条件'
- en: Results and impact
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果和影响
- en: 'Within six months of deployment, the company saw the following:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在部署后的六个月内，公司看到了以下情况：
- en: A 10% reduction in MAPE, reducing instances of stockouts and excess inventory
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MAPE（平均绝对百分比误差）降低了10%，减少了缺货和过剩库存的情况
- en: Improved operational efficiency, with less manual intervention required in the
    forecasting process
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高运营效率，在预测过程中需要的手动干预减少
- en: Greater business agility, allowing the company to re spond faster to market
    shifts
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更高的业务敏捷性，使公司能够更快地应对市场变化
- en: Key takeaways
  id: totrans-164
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 关键要点
- en: 'Here are the key takeaways from this scenario:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是此场景的关键要点：
- en: High-quality data is the foundation of any successful ML initiative.
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高质量数据是任何成功的机器学习项目的基石。
- en: Clear objectives ensure alignment and measurable success.
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确的目标确保了一致性和可衡量的成功。
- en: Securing stakeholder buy-in early accelerates adoption and smooths the transition
    to production.
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期获得利益相关者的支持可以加速采用并使过渡到生产过程更加顺畅。
- en: Rapid prototyping and iterative development enable quick wins and continuous
    improvement.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 快速原型设计和迭代开发能够实现快速胜利和持续改进。
- en: Education is the key to success. It is important to decode technical concepts
    for the business stakeholders so that they feel confident about the PoC.
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育是成功的关键。对于业务利益相关者来说，解码技术概念很重要，这样他们才能对原型验证（PoC）感到自信。
- en: This scenario illustrates how a successful PoC can evolve into a scalable enterprise
    AI solution that delivers measurable ROI and business impact. By grounding your
    approach in solid data fundamentals and a clearly defined objective, you can confidently
    move toward a production-ready AI deployment.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这个场景说明了如何将一个成功的PoC发展成为一个可扩展的企业人工智能解决方案，该解决方案可以带来可衡量的投资回报和业务影响。通过将您的方案建立在坚实的数据基础和明确定义的目标上，您可以自信地朝着生产就绪的人工智能部署迈进。
- en: 'Scenario 2: Failed AI PoC – predictive maintenance for industrial equipment'
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景2：失败的AI PoC - 工业设备的预测性维护
- en: A mid-sized manufacturing firm specializing in industrial HVAC systems wanted
    to reduce downtime and maintenance costs by implementing an AI-based predictive
    maintenance solution.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 一家中型制造公司，专门从事工业暖通空调系统，希望通过实施基于人工智能的预测性维护解决方案来减少停机时间和维护成本。
- en: '**PoC objective** : Build a machine learning model that could predict equipment
    failures at least 48 hours in advance, using sensor data from compressors, motors,
    and temperature regulators.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**PoC目标** : 建立一个机器学习模型，能够至少提前48小时预测设备故障，使用压缩机、电机和温度调节器的传感器数据。'
- en: PoC setup
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PoC设置
- en: '**Data sources** : Historical sensor logs, maintenance records, and technician
    notes'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据来源** : 历史传感器日志、维护记录和技术人员笔记'
- en: '**Model used** : Random Forest classifier trained on labeled failure events'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用的模型** : 在标记的故障事件上训练的随机森林分类器'
- en: '**Timeline** : Six-week sprint with a cross-functional team of data scientists,
    IT engineers, and operations managers'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间表** : 由数据科学家、IT工程师和运营经理组成的跨职能团队六周冲刺'
- en: Outcome
  id: totrans-179
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果
- en: The PoC was shelved after 8 weeks
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PoC在8周后被搁置
- en: The team concluded that more groundwork was needed in data engineering, stakeholder
    alignment, and change management
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队得出结论，需要在数据工程、利益相关者协调和变革管理方面做更多的基础工作
- en: The company reverted to scheduled maintenance and postponed AI adoption
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公司恢复了计划中的维护并推迟了人工智能的采用
- en: 'Here’s what went wrong with the PoC:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是PoC出了什么问题：
- en: '**Unclear problem definition** :'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题定义不明确** :'
- en: The team didn’t align on what constituted a “failure”. Some considered any downtime
    a failure, while others only counted catastrophic breakdowns.
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队没有就“失败”的定义达成一致。一些人认为任何停机都是失败，而其他人只计算灾难性故障。
- en: KPIs were vague. “Reduce downtime” was not quantified, and no baseline was established.
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键绩效指标（KPI）含糊不清。“减少停机时间”没有量化，也没有建立基线。
- en: '**Poor data quality** :'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据质量差** :'
- en: Sensor data was inconsistent. Some machines had missing logs; others had different
    sampling rates.
  id: totrans-188
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 传感器数据不一致。一些机器缺少日志；其他机器有不同的采样率。
- en: Maintenance records were handwritten and poorly digitized, making them unusable
    for training.
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维护记录是手写的，并且数字化程度低，无法用于训练。
- en: '**Technical limitations** :'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术限制** :'
- en: The model showed promising results in Jupyter notebooks but failed in real-time
    deployment.
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型在Jupyter笔记本中显示出有希望的结果，但在实时部署中失败了。
- en: It couldn’t handle streaming data and crashed frequently due to memory overload.
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它无法处理流数据，并且由于内存过载而频繁崩溃。
- en: '**No business buy-in** :'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有业务支持** :'
- en: Operations managers didn’t trust the predictions and continued using manual
    checks.
  id: totrans-194
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营经理不相信预测，并继续使用手动检查。
- en: The model flagged false positives, leading to unnecessary maintenance and frustration.
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型标记了假阳性，导致不必要的维护和挫败感。
- en: No ROI analysis was done, and stakeholders saw it as a “science experiment”.
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有进行投资回报分析，利益相关者将其视为“科学实验”。
- en: 'So, here are the lessons learned:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，以下是我们学到的教训：
- en: Define success metrics upfront and align them across teams
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提前定义成功指标并将它们跨团队对齐
- en: Invest in data readiness before modeling
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在建模之前投资于数据准备
- en: Engage business stakeholders early and often
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期并经常与业务利益相关者互动
- en: Validate technical feasibility in real-world conditions
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实际条件下验证技术可行性
- en: 'In this section, we explored two case studies, which are basically two sides
    of a coin: one was a successful PoC with great results, stakeholder buy-in, and
    a clear path to production, while the other was a failed PoC, which did provide
    invaluable insights to the organization but did not make it to production. These
    case studies should provide clear guidelines on what to do and what not to do
    while creating PoCs within your organization. Let’s wrap up this chapter by reviewing
    a PoC checklist.'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了两个案例研究，它们基本上是硬币的两面：一个是成功的PoC，取得了显著的结果，利益相关者的支持，以及清晰的走向生产的路径，而另一个是失败的PoC，它确实为组织提供了宝贵的见解，但没有达到生产阶段。这些案例研究应该为在您的组织中创建PoC时提供明确的指导方针。让我们通过回顾PoC清单来结束这一章。
- en: Putting it all together
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整合一切
- en: 'Here is a quick and actionable checklist that you could refer to for successful
    PoCs:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个快速且可操作的清单，您可以根据它来确保成功的 PoC：
- en: 'Met clearly defined objectives:'
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 达到了明确定义的目标：
- en: Did it solve the defined problem?
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是否解决了定义好的问题？
- en: Did it meet the KPIs or success thresholds you established upfront?
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是否达到了您事先设定的关键绩效指标或成功阈值？
- en: Were these results validated using real or representative data?
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些结果是否使用真实或代表性的数据进行验证？
- en: If it does not meet all the objectives, reflect to see what might be missing
    and fix that before proceeding to the next step.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它没有达到所有目标，请反思看看可能缺少了什么，并在进行下一步之前修复这些问题。
- en: 'Demonstrated technical viability:'
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 证明了技术的可行性：
- en: Are the model performance metrics (accuracy, precision, recall, etc.) strong?
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的性能指标（准确率、精确率、召回率等）是否强劲？
- en: Can it handle real-world data without breaking or misfiring?
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它能否在不崩溃或出错的情况下处理真实世界的数据？
- en: Does it scale or integrate with existing systems?
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是否可以扩展或与现有系统集成？
- en: If it fails here, consider more iterations before production.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在这里失败，考虑在生产前进行更多迭代。
- en: 'Showed business value:'
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展示了商业价值：
- en: Did it improve speed, efficiency, revenue, or customer experience?
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是否提高了速度、效率、收入或客户体验？
- en: Do business stakeholders see its potential?
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 业务利益相关者是否看到了它的潜力？
- en: Is the ROI promising if scaled?
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果扩展，回报率是否具有前景？
- en: If the business value is unclear, the PoC may not be ready to move forward.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果业务价值不明确，PoC 可能尚未准备好向前推进。
- en: 'Gained stakeholder confidence:'
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得了利益相关者的信心：
- en: Are non-technical decision-makers excited about it?
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非技术决策者对此是否感到兴奋？
- en: Was it explained clearly, with a compelling demo or result summary?
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否已经通过引人入胜的演示或结果总结清晰地解释了它？
- en: Is there momentum to proceed with a pilot or full deployment?
  id: totrans-223
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否有动力进行试点或全面部署？
- en: If there is still resistance from senior leadership, this is where you would
    like advocates within the organization to vouch for you; these could be your business
    stakeholders, who push for the change.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如果高级管理层仍然存在阻力，这就是您希望在组织中找到支持者的地方；这些人可能是您的业务利益相关者，他们会推动变革。
- en: 'Final success indicators:'
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最终成功指标：
- en: Proved your hypothesis
  id: totrans-226
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 证明了您的假设
- en: Delivered measurable business or process value
  id: totrans-227
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现了可衡量的商业或流程价值
- en: Earned stakeholder support
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获得了利益相关者的支持
- en: The end goal is to have a clear path to production.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 最终目标是有一条清晰的路径通往生产。
- en: Summary
  id: totrans-230
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, we explored how to build a successful **Proof of Concept**
    ( **PoC** ) that lays the foundation for deploying an enterprise-ready AI solution.
    A PoC often serves as the first glimpse into what the final solution might look
    like, making it essential to focus on the fundamentals: defining a clear objective,
    securing the right data, and establishing success criteria. These elements are
    critical to ensuring your PoC is not just a technical exercise, but a strategic
    step toward production.'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何构建一个成功的 **概念验证**（**PoC**），为部署企业级 AI 解决方案奠定基础。PoC 常常是最终解决方案可能外观的第一印象，因此关注基础至关重要：明确目标、确保正确数据、建立成功标准。这些要素对于确保您的
    PoC 不仅仅是一个技术练习，而且是迈向生产的战略步骤至关重要。
- en: In the next chapter, we’ll dive into best practices for machine learning development.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将深入探讨机器学习开发的最佳实践。
- en: References
  id: totrans-233
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 参考文献
