- en: Unlock Your Exclusive Benefits
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Your copy of this book includes the following exclusive benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/cloud-computing.png) Next-gen Packt Reader'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![img](img/pdf-file.png) DRM-free PDF/ePub downloads'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Follow the guide below to unlock them. The process takes only a few minutes
    and needs to be completed once.
  prefs: []
  type: TYPE_NORMAL
- en: Unlock this Book’s Free Benefits in 3 Easy Steps
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Step 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Keep your purchase invoice ready for *Step 3* . If you have a physical copy,
    scan it using your phone and save it as a PDF, JPG, or PNG.
  prefs: []
  type: TYPE_NORMAL
- en: For more help on finding your invoice, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    .
  prefs: []
  type: TYPE_NORMAL
- en: '**Note** : If you bought this book directly from Packt, no invoice is required.
    After *Step 2* , you can access your exclusive content right away.'
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Step 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Scan the QR code or go to packtpub.com/unlock . | ![A qr code on a white background  AI-generated
    content may be incorrect.](img/Unlock.png) |
  prefs: []
  type: TYPE_NORMAL
- en: On the page that opens (similar to *Figure 11.1* on desktop), search for this
    book by name and select the correct edition.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a web page  AI-generated content may be incorrect.](img/Packt_unlock_landing_page.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 11.1: Packt unlock landing page on desktop'
  prefs: []
  type: TYPE_NORMAL
- en: Step 3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After selecting your book, sign in to your Packt account or create one for free.
    Then upload your invoice (PDF, PNG, or JPG, up to 10 MB). Follow the on-screen
    instructions to finish the process.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Need help?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you get stuck and need help, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    for a detailed FAQ on how to find your invoices and more. This QR code will take
    you to the help page. | ![img](img/Need_help.png) |
  prefs: []
  type: TYPE_NORMAL
- en: '**Note** : If you are still facing issues, reach out to [customercare@packt.com](https://www.packtpub.com/en-us/help/contact)
    .'
  prefs: []
  type: TYPE_NORMAL
