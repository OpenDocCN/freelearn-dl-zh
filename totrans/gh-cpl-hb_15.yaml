- en: '11'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: Unlock Your Exclusive Benefits
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解锁您的独家福利
- en: 'Your copy of this book includes the following exclusive benefits:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您的这本书包含以下独家福利：
- en: '![img](img/cloud-computing.png) Next-gen Packt Reader'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![img](img/cloud-computing.png) 新一代 Packt 阅读器'
- en: '![img](img/pdf-file.png) DRM-free PDF/ePub downloads'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![img](img/pdf-file.png) 免版税 PDF/ePub 下载'
- en: Follow the guide below to unlock them. The process takes only a few minutes
    and needs to be completed once.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下指南解锁它们。此过程只需几分钟，并且只需完成一次。
- en: Unlock this Book’s Free Benefits in 3 Easy Steps
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过 3 个简单步骤解锁此书的免费福利
- en: Step 1
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 1 步
- en: Keep your purchase invoice ready for *Step 3* . If you have a physical copy,
    scan it using your phone and save it as a PDF, JPG, or PNG.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 保持您的购买发票以备 *第 3 步* 使用。如果您有实体副本，请使用手机扫描并将其保存为 PDF、JPG 或 PNG 格式。
- en: For more help on finding your invoice, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    .
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如需查找发票的帮助，请访问 [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    。
- en: '**Note** : If you bought this book directly from Packt, no invoice is required.
    After *Step 2* , you can access your exclusive content right away.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您直接从 Packt 购买此书，无需发票。完成 *第 2 步* 后，您即可立即访问您的专属内容。'
- en: '|'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Step 2
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 2 步
- en: Scan the QR code or go to packtpub.com/unlock . | ![A qr code on a white background  AI-generated
    content may be incorrect.](img/Unlock.png) |
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 扫描二维码或访问 packtpub.com/unlock 。 | ![白色背景上的二维码  AI生成的内容可能不正确。](img/Unlock.png)
    |
- en: On the page that opens (similar to *Figure 11.1* on desktop), search for this
    book by name and select the correct edition.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在打开的页面（类似于桌面上的 *图 11.1*），通过名称搜索此书并选择正确的版本。
- en: '![A screenshot of a web page  AI-generated content may be incorrect.](img/Packt_unlock_landing_page.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![网页截图  AI生成的内容可能不正确。](img/Packt_unlock_landing_page.png)'
- en: 'Figure 11.1: Packt unlock landing page on desktop'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.1：桌面上的 Packt 解锁登录页面
- en: Step 3
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 3 步
- en: After selecting your book, sign in to your Packt account or create one for free.
    Then upload your invoice (PDF, PNG, or JPG, up to 10 MB). Follow the on-screen
    instructions to finish the process.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您的书籍后，登录您的 Packt 账户或免费创建一个。然后上传您的发票（PDF、PNG 或 JPG，最大 10 MB）。按照屏幕上的说明完成此过程。
- en: '|'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Need help?
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要帮助？
- en: If you get stuck and need help, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    for a detailed FAQ on how to find your invoices and more. This QR code will take
    you to the help page. | ![img](img/Need_help.png) |
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到困难需要帮助，请访问 [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    以获取有关如何查找发票及其他详细问题的 FAQ。此二维码将带您到帮助页面。 | ![img](img/Need_help.png) |
- en: '**Note** : If you are still facing issues, reach out to [customercare@packt.com](https://www.packtpub.com/en-us/help/contact)
    .'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您仍然遇到问题，请联系 [customercare@packt.com](https://www.packtpub.com/en-us/help/contact)
    。'
- en: '![img](img/Packt_Logo_New1.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/Packt_Logo_New1.png)'
- en: '[packtpub.com](http://packtpub.com)'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[packtpub.com](http://packtpub.com)'
- en: Subscribe to our online digital library for full access to over 7,000 books
    and videos, as well as industry leading tools to help you plan your personal development
    and advance your career. For more information, please visit our website.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 订阅我们的在线数字图书馆，全面访问超过 7,000 本书和视频，以及行业领先的工具，帮助您规划个人发展并推进职业生涯。更多信息，请访问我们的网站。
- en: Why subscribe?
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么订阅？
- en: Spend less time learning and more time coding with practical eBooks and Videos
    from over 4,000 industry professionals
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用来自 4,000 多位行业专业人士的实用电子书和视频，节省学习时间，多花时间编码
- en: Improve your learning with Skill Plans built especially for you
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用专为您定制的技能计划提高您的学习效果
- en: Get a free eBook or video every month
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每月免费获得一本电子书或视频
- en: Fully searchable for easy access to vital information
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全可搜索，便于快速访问关键信息
- en: Copy and paste, print, and bookmark content
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制粘贴、打印和收藏内容
- en: A t [www.packtpub.com](http://www.packtpub.com) , you can also read a collection
    of free technical articles, sign up for a range of free newsletters, and receive
    exclusive discounts and offers on Packt books and eBooks.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [www.packtpub.com](http://www.packtpub.com) 上，您还可以阅读一系列免费技术文章，订阅各种免费通讯，并享受
    Packt 书籍和电子书的独家折扣和优惠。
- en: Other Books You May Enjoy
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您可能还会喜欢的其他书籍
- en: 'If you enjoyed this book, you may be interested in these other books by Packt:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢这本书，您可能对 Packt 的以下其他书籍也感兴趣：
- en: '[![img](img/9781805125457.jpg)](https://www.packtpub.com/en-us/product/django-5-by-example-9781805122340)'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '[![img](img/9781805125457.jpg)](https://www.packtpub.com/en-us/product/django-5-by-example-9781805122340)'
- en: '**Django 5 By Example**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**Django 5 By Example**'
- en: Antonio Melé
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Antonio Melé
- en: 'ISBN: 978-1-80512-545-7'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 'ISBN: 978-1-80512-545-7'
- en: Use various Django modules to solve specific problems using the latest features
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用各种 Django 模块利用最新功能解决特定问题
- en: Integrate third-party Django applications into your project
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将第三方 Django 应用程序集成到您的项目中
- en: Build complex web applications using Redis, Postgres, Celery/RabbitMQ and Memcached
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Redis、Postgres、Celery/RabbitMQ 和 Memcached 构建复杂的网络应用程序
- en: Set up a production environment for your project with Docker Compose
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Docker Compose 为您的项目设置生产环境
- en: Build a RESTful API with Django Rest Framework (DRF)
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Django Rest Framework (DRF) 构建RESTful API
- en: '[![img](img/9781803242712.jpg)](https://www.packtpub.com/en-us/product/responsive-web-design-with-html5-and-css-9781803231723)'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '[![img](img/9781803242712.jpg)](https://www.packtpub.com/en-us/product/responsive-web-design-with-html5-and-css-9781803231723)'
- en: '**Responsive Web Design with HTML5 and CSS**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用 HTML5 和 CSS 进行响应式网页设计**'
- en: Ben Frain
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: Ben Frain
- en: 'ISBN: 978-1-80324-271-2'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 'ISBN: 978-1-80324-271-2'
- en: Use media queries, including detection for touch/mouse and color preference
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用媒体查询，包括对触摸/鼠标和颜色偏好的检测
- en: Learn HTML semantics and author accessible markup
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习 HTML 语义并编写可访问的标记
- en: Facilitate different images depending on screen size or resolution
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据屏幕大小或分辨率提供不同的图像
- en: Write the latest color functions, mix colors, and choose the most accessible
    ones
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写最新的颜色函数，混合颜色，并选择最易于访问的颜色
- en: Use SVGs in designs to provide resolution-independent images
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在设计中使用 SVGs 以提供分辨率无关的图像
- en: Create and use CSS custom properties, making use of new CSS functions including
    ‘clamp’, ‘min’, and ‘max’
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建和使用 CSS 自定义属性，利用包括‘clamp’、‘min’和‘max’在内的新 CSS 函数
- en: Add validation and interface elements to HTML forms
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向 HTML 表单添加验证和界面元素
- en: Enhance interface elements with filters, shadows, and animations
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用过滤器、阴影和动画增强界面元素
- en: Packt is searching for authors like you
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Packt 正在寻找像您这样的作者
- en: If you’re interested in becoming an author for Packt, please visit [authors.packtpub.com](http://authors.packtpub.com)
    and apply today. We have worked with thousands of developers and tech professionals,
    just like you, to help them share their insight with the global tech community.
    You can make a general application, apply for a specific hot topic that we are
    recruiting an author for, or submit your own idea.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有兴趣成为 Packt 的作者，请访问 [authors.packtpub.com](http://authors.packtpub.com) 并今天申请。我们已与成千上万的开发人员和科技专业人士合作，就像您一样，帮助他们将见解分享给全球科技社区。您可以提交一般申请，申请我们正在招募作者的特定热门话题，或提交您自己的想法。
- en: Share your thoughts
  id: totrans-58
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分享您的想法
- en: Now you’ve finished *The GitHub Copilot Handbook* , we’d love to hear your thoughts!
    If you purchased the book from Amazon, please [click here to go straight to the
    Amazon review page](https://packt.link/r/1806116634) for this book and share your
    feedback or leave a review on the site that you purchased it from.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经完成了 *The GitHub Copilot Handbook*，我们非常希望听到您的想法！如果您从亚马逊购买了这本书，请[点击此处直接进入该书的亚马逊评论页面](https://packt.link/r/1806116634)并分享您的反馈或在该购买网站上留下评论。
- en: Your review is important to us and the tech community and will help us make
    sure we’re delivering excellent quality content.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 您的评论对我们和科技社区非常重要，并将帮助我们确保我们提供高质量的内容。
