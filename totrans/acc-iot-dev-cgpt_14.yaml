- en: Now that we are at the end of this section, you will be able to observe the
    MQTT Publish message operation in both the local terminal window and the AWS IoT
    Core MQTT test client. If the results are not as expected, refine your prompts
    to more specifically suit your requirements.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经到达本节的结尾，您将能够在本地终端窗口和AWS IoT Core MQTT测试客户端中观察到MQTT发布消息操作。如果结果不符合预期，请调整您的提示以更具体地满足您的需求。
- en: Summary
  id: totrans-69
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: At the end of this chapter, the sensor data has successfully reached AWS IoT
    Core. However, this is merely the initial step for a cloud service in commercial-grade
    IoT applications. The raw data now requires further processing. This can involve
    triggering an immediate alarm if an abnormal event is detected or storing the
    data for future analysis and visualization.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章结束时，传感器数据已成功到达AWS IoT Core。然而，这仅仅是商业级物联网应用中云服务的初始步骤。现在，原始数据需要进一步处理。这可能包括在检测到异常事件时触发即时警报，或将数据存储以供未来分析和可视化。
- en: In the next chapter, you will learn storing, processing, and analyzing this
    sensor data using various AWS services. We plan to establish two message-routing
    rules in AWS IoT Core. The first rule will involve AWS Lambda, the premier serverless
    computing service. If abnormal sensor data is detected, we will request ChatGPT
    to generate a Python-based algorithm on AWS Lambda, which will trigger an email
    alert on AWS SNS. The second rule will guide data to AWS IoT Analytics for storage
    and preparation for subsequent visualization.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，您将学习使用各种AWS服务存储、处理和分析这些传感器数据。我们计划在AWS IoT Core中建立两条消息路由规则。第一条规则将涉及AWS
    Lambda，这是首屈一指的无服务器计算服务。如果检测到异常传感器数据，我们将请求ChatGPT在AWS Lambda上生成基于Python的算法，这将触发AWS
    SNS上的电子邮件警报。第二条规则将指导数据流向AWS IoT Analytics进行存储和后续可视化的准备。
