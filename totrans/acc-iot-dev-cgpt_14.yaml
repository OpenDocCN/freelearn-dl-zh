- en: '14'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: Publishing Sensor Data to AWS IoT Core
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将传感器数据发布到 AWS IoT Core
- en: In the previous chapter, we successfully instructed ChatGPT to generate code
    to connect the ESP32 to AWS IoT Core through a TLS/MQTT secured connection. In
    this chapter, we are going to use the MQTT protocol to publish sensor data to
    the AWS cloud.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在前一章中，我们成功指导 ChatGPT 生成代码，通过 TLS/MQTT 加密连接将 ESP32 连接到 AWS IoT Core。在本章中，我们将使用
    MQTT 协议将传感器数据发布到 AWS 云。
- en: By the end of this chapter, you will be able to instruct ChatGPT to program
    code on ESP32, create an MQTT Publish topic, and generate a **JavaScript Object
    Notation** (**JSON**) document. This will allow you to encapsulate sensor data
    for delivery to AWS IoT Core.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将能够指导 ChatGPT 在 ESP32 上编程代码，创建 MQTT 发布主题，并生成 **JavaScript 对象表示法**（**JSON**）文档。这将允许您封装传感器数据以发送到
    AWS IoT Core。
- en: 'This chapter will cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: '*Understanding the approach to sending sensor data through MQTT Publish*: Learn
    about the data delivery mechanism of the MQTT Publish operation'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*理解通过 MQTT Publish 发送传感器数据的方法*：了解 MQTT Publish 操作的数据传输机制'
- en: '*Constructing MQTT publish topic and payload in ESP32*: Instruct ChatGPT to
    generate code to create an MQTT topic and JSON payload'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在 ESP32 中构建 MQTT 发布主题和有效载荷*：指导 ChatGPT 生成代码以创建 MQTT 主题和 JSON 有效载荷'
- en: '*Validating the delivered sensor data*: Monitor the execution result in a local
    terminal window and observe the received messages from the AWS MQTT test client'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*验证交付的传感器数据*：在本地终端窗口中监控执行结果并观察从 AWS MQTT 测试客户端接收到的消息'
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: In this chapter, we will instruct ChatGPT to update the code on the ESP32 that
    we created in [*Chapter 13*](B22002_13.xhtml#_idTextAnchor319). On the AWS cloud,
    you will log in to AWS IoT Core to configure an MQTT test client to subscribe
    to a topic, which is the MQTT publish topic you created in the ESP32 code.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将指导 ChatGPT 更新我们在 [*第 13 章*](B22002_13.xhtml#_idTextAnchor319) 中创建的 ESP32
    代码。在 AWS 云上，您将登录 AWS IoT Core 以配置一个 MQTT 测试客户端来订阅一个主题，这是您在 ESP32 代码中创建的 MQTT 发布主题。
- en: In this book, we will only illustrate the upstreaming operation from the DHT11
    sensor to its report data to AWS IoT Core using MQTT Publish. The operation of
    transferring data from AWS IoT Core to an IoT device is called MQTT Subscribe.
    This operation, used for example when performing a device firmware upgrade, will
    not be used in our project.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，我们将仅演示使用 MQTT Publish 从 DHT11 传感器向上游传输报告数据到 AWS IoT Core 的操作。将数据从 AWS IoT
    Core 传输到物联网设备（例如，在执行设备固件升级时）的操作称为 MQTT Subscribe。此操作在本项目中将不会使用。
- en: Sending sensor data through MQTT Publish
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过 MQTT Publish 发送传感器数据
- en: In [*Chapter 5*](B22002_05.xhtml#_idTextAnchor170), we discussed the MQTT protocol
    and its Publish/Subscribe model. The following figure describes how an MQTT broker
    (such as AWS IoT Core) interacts with an MQTT Publisher or an MQTT Subscriber
    (such as IoT devices). In the previous chapter, we established a TLS connection
    between the MQTT Publisher (ESP32) and the MQTT broker (AWS IoT Core).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [*第 5 章*](B22002_05.xhtml#_idTextAnchor170) 中，我们讨论了 MQTT 协议及其发布/订阅模型。以下图描述了
    MQTT 代理（如 AWS IoT Core）如何与 MQTT 发布者或 MQTT 订阅者（如物联网设备）交互。在前一章中，我们在 MQTT 发布者（ESP32）和
    MQTT 代理（AWS IoT Core）之间建立了 TLS 连接。
- en: Once the TLS connection is successfully set up, the next step is for the IoT
    device, the MQTT Publisher, to encapsulate sensor payload data in JSON format
    with a declared *topic* to send to the MQTT broker, AWS IoT Core.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦成功建立 TLS 连接，下一步就是物联网设备（MQTT 发布者）将传感器有效载荷数据封装成 JSON 格式，并声明一个 *主题* 以发送到 MQTT
    代理，AWS IoT Core。
- en: '![Figure 14.1 – MQTT flow](img/B22002_14_01.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.1 – MQTT 流程](img/B22002_14_01.jpg)'
- en: Figure 14.1 – MQTT flow
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.1 – MQTT 流程
- en: 'The following definitions pertain to *topic*, *payload*, and *JSON*, terms
    used in the MQTT protocol flow:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 以下定义适用于 MQTT 协议流程中使用的 *主题*、*有效载荷* 和 *JSON* 术语：
- en: '`deviceID/pub` to distinguish the topic amongst various devices. The unique
    `deviceID` value is derived from `ESP.getEfuseMac()`, which is included in the
    `HardwareInfo.h` header file created in the previous chapter.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`deviceID/pub` 以区分不同设备之间的主题。唯一的 `deviceID` 值是从 `ESP.getEfuseMac()` 中派生的，它包含在前一章中创建的
    `HardwareInfo.h` 头文件中。'
- en: '**Payload**: This term refers to sensor raw data; in the case of this project,
    it includes things such as device information and temperature and humidity values,
    which are formatted using JSON.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有效载荷**：此术语指代传感器原始数据；在本项目的情况下，它包括设备信息、温度和湿度值等，这些数据使用 JSON 格式化。'
- en: '*JSON* is a data interchange format that is lightweight in nature and highly
    user-friendly. It is designed to be easily read and written by humans while simultaneously
    being simple enough for machines to parse and generate. JSON is not tied down
    to any specific programming language. Instead, it is a language-agnostic text
    format that has been widely accepted and adopted across a variety of languages.
    These languages include, but are not limited to, C, C++, C#, Java, JavaScript,
    Perl, and Python. In terms of structure, JSON is composed of different forms.
    An object, for instance, is an unordered collection of name/value pairs. The beginning
    of an object is signaled by a left brace (*{*), and it concludes with a right
    brace (*}*). Within the object, each name is succeeded by a colon, and the name/value
    pairs are differentiated by a comma.'
  id: totrans-19
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*JSON* 是一种轻量级且高度用户友好的数据交换格式。它旨在易于人类读取和编写，同时足够简单，以便机器解析和生成。JSON 不局限于任何特定的编程语言。相反，它是一种与语言无关的文本格式，已被广泛接受和采用，跨越了多种语言。这些语言包括但不限于
    C、C++、C#、Java、JavaScript、Perl 和 Python。在结构方面，JSON 由不同的形式组成。例如，一个对象是一个无序的键值对集合。对象的开始由左花括号
    `{` 标识，结束于右花括号 `}`。在对象中，每个名称后面跟着一个冒号，名称/值对由逗号分隔。'
- en: 'Let’s consider the following example to clarify this concept:'
  id: totrans-20
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 让我们考虑以下示例来阐明这个概念：
- en: '[PRE0]'
  id: totrans-21
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '`JsonSerializer.Serialize` method. This method is an essential aspect of data
    transmission and storage, as it allows complex data structures to be converted
    into a format that can be easily stored or transmitted, and then reconstructed
    when necessary. By utilizing the `JsonSerializer.Serialize` method, it is possible
    to effectively manage and manipulate JSON data, facilitating seamless data exchange
    and communication. In the PlatformIO IDE, there is a standard library, `ArduinoJson.h`,
    that is used to perform JSON format data serialization.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`JsonSerializer.Serialize` 方法。这是数据传输和存储的一个关键方面，因为它允许将复杂的数据结构转换为易于存储或传输的格式，并在必要时重新构建。通过使用
    `JsonSerializer.Serialize` 方法，可以有效地管理和操作 JSON 数据，促进无缝的数据交换和通信。在 PlatformIO IDE
    中，有一个标准库 `ArduinoJson.h`，用于执行 JSON 格式数据的序列化。'
- en: In this section, we explored the key terms in MQTT communication. These terms
    are essential for exchanging information between IoT devices and the MQTT server.
    In the next section, we will apply these terms to our project.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了 MQTT 通信中的关键术语。这些术语对于在物联网设备和 MQTT 服务器之间交换信息至关重要。在下一节中，我们将将这些术语应用到我们的项目中。
- en: Constructing an MQTT Publish topic and payload in ESP32
  id: totrans-24
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 ESP32 中构建 MQTT 发布主题和有效载荷
- en: In the previous chapter, we introduced two standard Arduino libraries related
    to TLS/MQTT functionality. The `WiFiClientSecure.h` library is used to set up
    a TLS connection, while the `PubSubClient.h` library is used for MQTT publish.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们介绍了两个与 TLS/MQTT 功能相关的标准 Arduino 库。`WiFiClientSecure.h` 库用于设置 TLS 连接，而
    `PubSubClient.h` 库用于 MQTT 发布。
- en: In this chapter, we will introduce another Arduino library, `ArduinoJson.h`.
    This library is used to construct a JSON document and serialize it for transmission
    to AWS IoT Core.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将介绍另一个 Arduino 库，`ArduinoJson.h`。这个库用于构建 JSON 文档并将其序列化，以便传输到 AWS IoT
    Core。
- en: '`platformio.ini` file under `lib_deps`. Then, incorporate it into your source
    code with `#``include <ArduinoJson.h>`.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `lib_deps` 目录下的 `platformio.ini` 文件中，然后使用 `#include <ArduinoJson.h>` 将其集成到你的源代码中。
- en: We will manually install this library in Platform before we compile the `main.cpp`
    code.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在编译 `main.cpp` 代码之前，我们将手动在 Platform 中安装这个库。
- en: 'Based on the code created in the previous chapter, you can continue to prompt
    ChatGPT to add an MQTT Publish topic, the JSON data format, and the serialization
    requirement with the following prompt:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 基于上一章创建的代码，你可以继续提示 ChatGPT 添加 MQTT 发布主题、JSON 数据格式和序列化要求，以下是一个提示示例：
- en: '`Hi, ChatGPT`'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '`Hi, ChatGPT`'
- en: '`Please update the previous code, maintain its current structure, style and
    output format, and support the following` `additional requirements:`'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '`请更新之前的代码，保持其当前的结构、风格和输出格式，并支持以下` `附加要求：`'
- en: '`Import and use ArduinoJson.h for JSON data format and` `serialization operation.`'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`导入并使用 ArduinoJson.h 进行 JSON 数据格式和` `序列化操作`。'
- en: '`Import SecureCredentials.h which stores AWS certificates and call it in` `main
    code.`'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`导入 SecureCredentials.h，该文件存储 AWS 证书，并在` `main` `代码中调用它。`'
- en: '`Import HardwareInfo.h to read eFuse MAC as the` `unique deviceID.`'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`导入 HardwareInfo.h 以读取 eFuse MAC 作为` `唯一的设备ID`。'
- en: '`Build the publish topic AWS_IOT_PUBLISH_TOPIC by deviceID + "/``pub".`'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`通过设备ID + "/``pub" 构建发布主题 AWS_IOT_PUBLISH_TOPIC。`'
- en: '`Create a dedicated function "mqttPublishMessage" to send` `sensor data.`'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`创建一个名为 "mqttPublishMessage" 的专用函数来发送` `传感器数据。`'
- en: '`Create a JSON string including objects of "timeStamp", "deviceID", "status",
    "date", "time", "timezone", "DTS", "data", and values for "data" with "temp_C",
    "temp_F"` `and "humidity".`'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`创建一个包含 "timeStamp", "deviceID", "status", "date", "time", "timezone", "DTS",
    "data" 以及 "data" 的 "temp_C", "temp_F"` `和 "humidity" 值的 JSON 字符串。`'
- en: Next, let us look at some code examples.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看一些代码示例。
- en: Code examples
  id: totrans-39
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码示例
- en: 'You can find a sample of the `main.cpp` code at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14).
    The following is an extract `main.cpp` code. ChatGPT created a new function as
    requested, `mqttPublishMessages()`:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在 [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14)
    找到 `main.cpp` 代码的示例。以下是从 `main.cpp` 代码中提取的内容。ChatGPT 按要求创建了一个新函数 `mqttPublishMessages()`：
- en: '[PRE1]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'This function publishes sensor data to AWS IoT Core using the MQTT protocol.
    It takes in four parameters: `humidity`, `temperatureC` (in Celsius), `temperatureF`
    (in Fahrenheit), and `condition`. These represent the sensor’s humidity, temperature
    readings, and condition, respectively.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数使用 MQTT 协议将传感器数据发布到 AWS IoT Core。它接受四个参数：`humidity`（湿度）、`temperatureC`（摄氏温度）、`temperatureF`（华氏温度）和
    `condition`。这些分别代表传感器的湿度、温度读数和条件。
- en: The function first checks if the MQTT client is connected to AWS IoT Core. If
    not, it calls the `connectAWS` function to establish a connection.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数首先检查 MQTT 客户端是否连接到 AWS IoT Core。如果没有连接，它将调用 `connectAWS` 函数来建立连接。
- en: It then obtains the current time using the `getLocalTime` function. If unsuccessful,
    it prints an error message and exits the function. If successful, it formats the
    date and time separately with the `strftime` function.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，它使用 `getLocalTime` 函数获取当前时间。如果失败，它将打印错误消息并退出函数。如果成功，它使用 `strftime` 函数分别格式化日期和时间。
- en: Next, it creates a `conditionStr` string to display the sensor condition in
    a human-readable format. It does this by using a ternary operator to map the `SensorConditionStatus`
    enum to a string.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，它创建一个 `conditionStr` 字符串来以人类可读的格式显示传感器条件。它是通过使用三元运算符将 `SensorConditionStatus`
    枚举映射到字符串来实现的。
- en: The function then constructs a JSON document using the `StaticJsonDocument`
    class from the `ArduinoJson` library. This document includes various details such
    as the timestamp, device model, device ID, sensor status, date, time, timezone,
    daylight-saving time status, and sensor data (temperature and humidity).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数随后使用来自 `ArduinoJson` 库的 `StaticJsonDocument` 类构建一个 JSON 文档。该文档包括各种详细信息，如时间戳、设备型号、设备
    ID、传感器状态、日期、时间、时区、夏令时状态和传感器数据（温度和湿度）。
- en: The JSON document is serialized to a string using the `serializeJson` function,
    and this string is printed to the serial monitor for debugging.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `serializeJson` 函数将 JSON 文档序列化为字符串，并将此字符串打印到串行监视器以进行调试。
- en: The function calculates the size of the JSON document with the `measureJson`
    function and prints this size to the serial monitor.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数使用 `measureJson` 函数计算 JSON 文档的大小，并将此大小打印到串行监视器。
- en: Finally, the function tries to publish the JSON string to AWS IoT Core using
    the `mqttClient.publish` function. If unsuccessful, it prints an error message.
    If successful, it prints a success message.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，该函数尝试使用 `mqttClient.publish` 函数将 JSON 字符串发布到 AWS IoT Core。如果失败，它将打印错误消息。如果成功，它将打印成功消息。
- en: 'In the same folder of [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14),
    you also can see an example of the `platformio.ini` file, reproduced here as follows:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_14)
    的同一文件夹中，您还可以看到一个 `platformio.ini` 文件的示例，如下所示：
- en: '[PRE2]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: There is a new entry of **bblanchon/ArduinoJson** under **lib_deps**. You need
    to find and install it manually in Platformio libraries.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **lib_deps** 下有一个新的 **bblanchon/ArduinoJson** 条目。您需要手动在 Platformio 库中查找并安装它。
- en: '![Figure 14.2 – Install the ArduinoJson library in PlatformIO](img/B22002_14_02.jpg)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图 14.2 – 在 PlatformIO 中安装 ArduinoJson 库](img/B22002_14_02.jpg)'
- en: Figure 14.2 – Install the ArduinoJson library in PlatformIO
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.2 – 在 PlatformIO 中安装 ArduinoJson 库
- en: In this section, you have learned the key components of the MQTT protocol and
    instructed ChatGPT to update your previous code to support MQTT Publish operations
    by creating a new dedicated function. Now, let us compile the code, upload it,
    and validate the result.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您已经学习了MQTT协议的关键组件，并指导ChatGPT通过创建一个新的专用函数来更新您之前的代码，以支持MQTT发布操作。现在，让我们编译代码，上传它，并验证结果。
- en: Validating the delivered sensor data
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 验证交付的传感器数据
- en: After compiling and uploading the updated code to ESP32, you can check the execution
    result in the local terminal window.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 编译并将更新的代码上传到ESP32后，您可以在本地终端窗口中检查执行结果。
- en: In the following screenshot, the publishing message shown includes the serialized
    JSON format payload as defined in the main code.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下屏幕截图中，显示的发布消息包括在主代码中定义的序列化JSON格式有效负载。
- en: '![Figure 14.3 – Validate the result in the local terminal window](img/B22002_14_03.jpg)'
  id: totrans-59
