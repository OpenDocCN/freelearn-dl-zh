- en: Figure 14.4 – Locate the “MQTT test client” option in AWS IoT Core
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.4 – 在AWS IoT Core中定位“MQTT测试客户端”选项
- en: Under `+/pub`. The `+` wildcard character matches exactly one item in the topic
    hierarchy. For example, a subscription to `Sensor/+/room1` will receive messages
    published to `Sensor/temp/room1`, `Sensor/moisture/room1`, and so on.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在`+/pub`下。`+`通配符字符与主题层次结构中的恰好一个项目匹配。例如，订阅`Sensor/+/room1`将接收发布到`Sensor/temp/room1`、`Sensor/moisture/room1`等消息。
- en: In the code of ESP32, we defined the topic by `+/pub` here can match every device’s
    MQTT publish topic. In the following screenshot, you can see the connection details
    read **Connected**, and the sensor data is in JSON format as we defined in the
    main code.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在ESP32的代码中，我们通过`+/pub`定义了主题，这里可以匹配每个设备的MQTT发布主题。在以下屏幕截图中，您可以看到读取的连接详情为**已连接**，传感器数据与我们定义在主代码中的JSON格式相同。
