  zh: '![图14.3 – 在本地终端窗口中验证结果](img/B22002_14_03.jpg)'
- en: Figure 14.3 – Validate the result in the local terminal window
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.3 – 在本地终端窗口中验证结果
- en: Now you can login to the AWS Management Console and select **AWS IoT** as shown
    in the following screenshot. Under **Test**, click **MQTT** **test client**.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以登录AWS管理控制台，并选择如图所示**AWS IoT**。在**测试**下，点击**MQTT** **测试客户端**。
- en: '![Figure 14.4 – Locate the “MQTT test client” option in AWS IoT Core](img/B22002_14_04.jpg)'
