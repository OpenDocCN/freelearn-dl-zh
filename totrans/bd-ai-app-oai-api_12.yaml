  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="15795">在这里，我们只需提供我们的微调</st> <st c="15835">模型和一个书的名称，并期望它返回一个类似于我们JSONL文件中的描述。</st>
    <st c="15938">给定的示例包括几个参数和头信息，用于指定请求的详细信息。</st>
