- en: <st c="0">12</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="3">Fine-Tuning ChatGPT to Create Unique API Models</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="51">In this chapter, we will explore fine-tuning the ChatGPT API.</st>
    <st c="114">This transformative process grants developers the power to mold the
    behavior of ChatGPT API responses to align with their distinct needs.</st> <st
    c="252">We will immerse ourselves in the art of fine-tuning, exploring the intricate
    techniques and critical factors at play.</st> <st c="370">By mastering the craft
    of building and deploying our very own fine-tuned model, we will unlock the potential
    to enhance our AI applications in</st> <st c="513">unprecedented ways.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="532">ChatGPT fine-tuning is a process that involves training a pre-trained
    language model, such as</st> `<st c="627">gpt-3.5-turbo</st>`<st c="640">, on
    a specific dataset to improve its performance and adapt it to a particular task
    or domain.</st> <st c="736">The fine-tuning process typically begins with a dataset
    that is carefully curated and labeled, and it involves training the model on this
    dataset using techniques such as transfer learning.</st> <st c="926">The model’s
    parameters are adjusted during fine-tuning to make it more accurate and contextually
    appropriate to generate responses in the target domain.</st> <st c="1079">With
    fine-tuning, the model can acquire domain-specific knowledge, language patterns,
    and nuances, enabling it to generate more relevant and coherent responses for
    specific applications or</st> <st c="1268">use cases.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1278">We will demonstrate how to fine-tune ChatGPT to generate concise
    book summaries using JSONL prompts and</st> <st c="1383">completion data.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1399">In this chapter, we will cover the</st> <st c="1435">following
    topics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1452">Fine-tuning ChatGPT and</st> <st c="1477">dataset preparation</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1496">Building and using the</st> <st c="1520">fine-tuned model</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1536">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="1559">The technical requirements for this chapter are listed</st> <st
    c="1615">as follows:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1626">Python 3.7 or later installed on</st> <st c="1660">your machine</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1672">An OpenAI</st> <st c="1683">API key</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1690">The OpenAI Python</st> <st c="1709">library installed</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1726">In the forthcoming section, we will commence our journey into ChatGPT
    fine-tuning by examining the array of available models, establishing our development
    environment, and acquainting ourselves with the book summary fine-tuned model
    that we are about</st> <st c="1978">to construct.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1991">You can find all code examples from this chapter on GitHub</st>
    <st c="2051">at</st> [<st c="2054">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="2130">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2131">Fine-tuning ChatGPT and dataset preparation</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2175">In this section, you will learn about the process of fine-tuning
    ChatGPT models.</st> <st c="2257">We will talk about the ChatGPT models available
    for fine-tuning and provide information on their training and usage</st> <st c="2372">costs.</st>
    <st c="2380">We will also cover the installation of the</st> `<st c="2423">openai</st>`
    <st c="2429">library and set up the API key as an environmental variable in the
    terminal session.</st> <st c="2515">This section will serve as an overview of
    fine-tuning, its benefits, and the necessary setup to train a</st> <st c="2619">fine-tuned
    model.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2636">Fine-tuning enhances the capabilities of API models in several
    ways.</st> <st c="2706">Firstly, it yields higher quality outcomes compared to
    designing prompts alone.</st> <st c="2786">By incorporating more training examples
    than can be accommodated in a prompt, fine-tuning enables models to grasp a wider
    range of patterns and nuances.</st> <st c="2939">Secondly, it reduces token usage
    by utilizing shorter prompts, resulting in more efficient processing.</st> <st
    c="3042">Additionally, fine-tuning facilitates lower latency requests, enabling
    faster and more</st> <st c="3129">responsive interactions.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3153">GPT-3.5 has undergone extensive pre-training on a vast corpus of
    text sourced from the internet.</st> <st c="3251">When given a prompt with limited
    examples, it often demonstrates the ability to understand the intended task and
    generate plausible completions – a concept referred to as</st> **<st c="3422">few-shot
    learning</st>**<st c="3439">. However, fine-tuning</st> <st c="3461">takes few-shot
    learning a step further by utilizing a larger set of examples, surpassing the
    prompt’s capacity.</st> <st c="3574">This comprehensive training enables superior</st>
    <st c="3618">performance across a wide array</st> <st c="3651">of tasks.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3660">If a model has undergone fine-tuning, we can use the resultant
    model without the need to pass any further training data.</st> <st c="3782">On</st>
    *<st c="3785">Table 12.1</st>*<st c="3795">, taken from the official OpenAI pricing
    page at</st> [<st c="3844">https://openai.com/pricing</st>](https://openai.com/pricing)<st
    c="3870">, you can see all the ChatGPT models that are available for fine-tuning,
    each accompanied by detailed information about their training and usage costs
    per 1 million tokens, as of</st> <st c="4049">May 2024.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B22414_12_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="4224">Table 12.1 – The pricing for ChatGPT model fine-tuning</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4278">During the fine-tuning process, it is necessary to provide training
    data in the form of a JSONL file, and the training token count specifically refers
    to those used within the user and assistant fields contained within</st> <st c="4498">that
    file.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4508">Each line of the JSONL document should consist of a</st> `<st c="4561">user</st>`
    <st c="4565">and</st> `<st c="4570">assistant</st>` <st c="4579">field that corresponds
    to our desired training data, as</st> <st c="4636">shown here:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: <st c="4967">This snippet is an example of how two of the training lines should
    be displayed in the JSONL file.</st> <st c="5067">In the next sections, we will
    use the complete JSONL file that holds multiple</st> <st c="5145">data points.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5157">Our objective is to develop a fine-tuned model that specializes
    in generating concise, one-sentence summaries for books provided by the user.</st>
    <st c="5300">To accomplish this, we will construct a new JSONL training file that
    includes the book titles in the prompt field and their corresponding summaries
    in the completion field.</st> <st c="5473">This training process will equip our
    model with the necessary skills to effectively generate book summaries based on
    user-provided input, once it has completed its</st> <st c="5637">training phase.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="5652">JSONL</st>** <st c="5658">stands for the</st> **<st c="5674">JSON
    Lines</st>** <st c="5684">format, which is a text-based data interchange</st>
    <st c="5731">format where each line in the file represents a single JSON object.</st>
    <st c="5800">This format is</st> <st c="5814">commonly used to store and exchange
    structured data, making it easy to read, write, and process data in a</st> <st
    c="5921">streaming fashion.</st>'
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5939">Upon the completion of the training phase, OpenAI will provide
    us with a distinct and exclusive name for our fine-tuned model.</st> <st c="6067">This
    unique name can then be utilized within the ChatGPT completion prompt to effectively
    engage with</st> <st c="6169">the model.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6179">Before jumping into the preparation</st> <st c="6215">of our dataset,
    we need to ensure that we create a new directory called</st> `<st c="6288">Fine
    Tune</st>`<st c="6297">, loading it with VS Code or another editor of your choice.</st>
    <st c="6357">After activating the virtual environment, we set up in</st> [*<st
    c="6412">Chapter 1</st>*](B22414_01.xhtml#_idTextAnchor013)<st c="6421">,</st>
    *<st c="6423">Getting Started with the ChatGPT API for NLP Tasks</st>*<st c="6473">,
    we need to install the</st> `<st c="6498">openai</st>` <st c="6504">library.</st>
    <st c="6514">To do that, open a new terminal in VS Code and type</st> <st c="6566">the
    following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: <st c="6611">This line will ensure that the last version of the</st> `<st c="6663">openai</st>`
    <st c="6669">package has been installed on</st> <st c="6700">your device.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6712">Next, we need to create the files we need to use for our fine-tuning
    task.</st> <st c="6788">From the VS Code</st> **<st c="6805">Explorer</st>** <st
    c="6813">window, create</st> <st c="6829">two files:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="6839">main.py</st>`<st c="6847">: This will hold the Python script
    that fine-tunes the</st> <st c="6903">ChatGPT model</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="6916">train_data.jsonl</st>`<st c="6933">: This will hold the JSONL</st>
    <st c="6961">training dataset</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
