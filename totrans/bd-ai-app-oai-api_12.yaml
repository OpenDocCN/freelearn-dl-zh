- en: FineTuningJob(id=<st c="13206">ftjob-EZ2V9AS46DjaSv6jWy0S4Pt7</st>. It’s important
    to note that the model is not created instantly. The process of creating the model
    may vary in duration, taking anywhere from a few minutes to hours. You can monitor
    the status of your model creation by reviewing the <st c="13470">status</st> parameter,
    currently indicating that the system is currently validating the JSONL file.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 微调作业(id=<st c="13206">ftjob-EZ2V9AS46DjaSv6jWy0S4Pt7</st>。需要注意的是，模型不是立即创建的。创建模型的过程可能有所不同，可能需要几分钟到几小时。您可以通过查看<st
    c="13470">状态</st>参数来监控模型创建的状态，目前指示系统正在验证JSONL文件。
- en: <st c="13564">You are able to monitor the status of your model by adding the
    following lines to your</st> `<st c="13652">main.py</st>` <st c="13659">file:</st>
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="13564">您可以通过在以下行中添加以下行来监控您模型的状况</st> `<st c="13652">main.py</st>` <st
    c="13659">文件：</st>
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: <st c="13886">This code snippet handles the monitoring of the fine-tuning job
    initiated in the previous segment.</st> <st c="13986">Initially, the</st> `<st
    c="14001">retrieve</st>` <st c="14009">method is utilized to retrieve details
    about the fine-tuning job.</st> <st c="14076">The</st> `<st c="14080">id</st>`
    <st c="14082">of the previously initiated fine-tuning job,</st> `<st c="14128">tuned_model.id</st>`<st
    c="14142">, is passed as an argument to this</st> <st c="14177">method.</st> <st
    c="14185">Subsequently, the status of the job is printed to provide an initial
    indication of its progress.</st> <st c="14282">A</st> `<st c="14284">while</st>`
    <st c="14289">loop is then employed to continuously check the status of the job
    until it reaches a</st> `<st c="14375">succeeded</st>` <st c="14384">state.</st>
    <st c="14392">Within the loop, the status of the job is retrieved again using
    the</st> `<st c="14460">retrieve</st>` <st c="14468">method, and the status is
    printed to keep track of any changes.</st> <st c="14533">Additionally, a</st>
    `<st c="14549">time.sleep(5)</st>` <st c="14562">statement is included within
    the loop to introduce a five-second pause between each status check, preventing
    excessive API requests and ensuring efficient resource utilization.</st> <st c="14740">This
    iterative process continues until the job status transitions to</st> `<st c="14809">succeeded</st>`<st
    c="14818">, indicating the completion of the</st> <st c="14853">fine-tuning process:</st>
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="13886">此代码片段处理在上一段中启动的微调作业的监控。</st> <st c="13986">最初，</st> `<st c="14001">retrieve</st>`
    <st c="14009">方法被用来检索关于微调作业的详细信息。</st> <st c="14076">之前启动的微调作业的</st> `<st c="14080">id</st>`
    <st c="14082">，即</st> `<st c="14128">tuned_model.id</st>`<st c="14142">，作为参数传递给此</st>
    <st c="14177">方法。</st> <st c="14185">随后，打印作业的状态以提供其进度的初步指示。</st> <st c="14282">然后使用</st>
    `<st c="14284">while</st>` <st c="14289">循环来持续检查作业的状态，直到它达到</st> `<st c="14375">succeeded</st>`
    <st c="14384">状态。</st> <st c="14392">在循环中，再次使用</st> `<st c="14460">retrieve</st>`
    <st c="14468">方法检索作业的状态，并打印状态以跟踪任何变化。</st> <st c="14533">此外，循环中包含了一个</st> `<st
    c="14549">time.sleep(5)</st>` <st c="14562">语句，在每次状态检查之间引入五秒的暂停，以防止过多的API请求并确保有效利用资源。</st>
    <st c="14740">此迭代过程持续进行，直到作业状态转换为</st> `<st c="14809">succeeded</st>`<st c="14818">，表示微调过程的完成：</st>
- en: '[PRE6]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: <st c="15125">Once our model compiles successfully, we can display the model
    name using the</st> `<st c="15204">job.fine_tuned_model</st>` <st c="15224">variable.</st>
    <st c="15235">In this case, your model name is</st> `<st c="15268">ft:gpt-3.5-turbo-0125:personal::9Jv8aUuC</st>`<st
    c="15308">. We can use this name for any chant completion, just like any base</st>
    `<st c="15376">gpt-3.5-turbo</st>` <st c="15389">and</st> `<st c="15394">gpt-4</st>`
    <st c="15399">standard models.</st> <st c="15417">You can conduct easy and quick
    tests using the</st> <st c="15463">following code.</st> <st c="15480">This allows
    you to seamlessly interact with your fine-tuned model and assess its performance
    without</st> <st c="15581">any complications:</st>
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="15125">一旦我们的模型成功编译，我们可以使用</st> `<st c="15204">job.fine_tuned_model</st>`
    <st c="15224">变量来显示模型名称。</st> <st c="15235">在这种情况下，你的模型名称是</st> `<st c="15268">ft:gpt-3.5-turbo-0125:personal::9Jv8aUuC</st>`<st
    c="15308">。我们可以使用这个名称进行任何chant完成，就像任何基础</st> `<st c="15376">gpt-3.5-turbo</st>`
    <st c="15389">和</st> `<st c="15394">gpt-4</st>` <st c="15399">标准模型一样。</st> <st
    c="15417">您可以使用以下代码进行简单快捷的测试。</st> <st c="15463">这允许您无缝地与您的微调模型交互并评估其性能，而无需</st>
    <st c="15581">任何复杂性：</st>
