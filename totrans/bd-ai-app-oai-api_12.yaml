    to our desired training data, as</st> <st c="4636">shown here:</st>
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="4508">JSONL 文档的每一行应包含一个</st> `<st c="4561">用户</st>` <st c="4565">和</st>
    `<st c="4570">助手</st>` <st c="4579">字段，这些字段对应我们希望的训练数据，如下所示：</st>
