- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: Using ChatGPT and Copilot to Create Flows and Apps
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT和Copilot创建流程和应用程序
- en: In the previous chapter, we dipped our feet in the ChatGPT water by sending
    prompts and getting back some responses.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们通过发送提示并得到一些回应，在ChatGPT的水中试水。
- en: In this chapter, we’re going to wade in a little deeper and learn about some
    interesting ways to get help from AI and automation. Perhaps you want to automate
    something a little more complex than the built-in Power Automate templates allow
    or you aren’t sure what connectors and actions are needed. Maybe you’ve never
    built a Power App before and have no idea where to start.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将更深入地探讨，了解一些从AI和自动化中获得帮助的有趣方法。也许你想要自动化比内置的Power Automate模板更复杂的事情，或者你不确定需要哪些连接器和操作。也许你以前从未构建过Power
    App，不知道从何开始。
- en: Those are all great use cases for AI-assisted automation.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是AI辅助自动化的绝佳用例。
- en: In this chapter, we’re going to look at a few use cases and use AI assistance
    to help with the building process.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨一些用例，并使用AI辅助来帮助构建过程。
- en: Working with Power Automate
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与Power Automate一起工作
- en: Power Automate, the business and process automation tooling portion of the Power
    Platform, can be as simple or as complex as you want (or need) it to be. From
    a simple flow such as copying a file or sending an email to more complex flows
    that insert rows into databases, Power Automate can help in almost any process.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Power Automate，作为Power平台中的业务和流程自动化工具部分，可以简单到你想（或需要）的任何程度。从复制文件或发送电子邮件这样的简单流程，到将行插入数据库的更复杂流程，Power
    Automate几乎可以帮助任何流程。
- en: In this next section, we’ll look at what kind of help ChatGPT can provide.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨ChatGPT可以提供什么样的帮助。
- en: Using ChatGPT to create flows
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT创建流程
- en: When it comes to Power Automate, ChatGPT can provide some good instructions
    on how to get started.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到Power Automate时，ChatGPT可以提供一些很好的指导，告诉你如何开始。
- en: Imagine you work in the marketing department for the fabled manufacturing conglomerate
    Contoso. You want to monitor Twitter (or now, X) for the times Contoso is being
    mentioned.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你在一个传说中的制造集团Contoso的市场部门工作。你希望监控Twitter（或现在称为X）上提及Contoso的时刻。
- en: 'You could ask ChatGPT something like this:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以向ChatGPT提出类似的问题：
- en: '![Figure 4.1 – Asking ChatGPT how to create a flow](img/B21234_04_01.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图4.1 – 向ChatGPT询问如何创建流程](img/B21234_04_01.jpg)'
- en: Figure 4.1 – Asking ChatGPT how to create a flow
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1 – 向ChatGPT询问如何创建流程
- en: As you can see, ChatGPT can provide pretty straightforward guidance on how to
    do something.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，ChatGPT可以提供相当直接的指导，告诉你如何做某事。
- en: Limitations of using ChatGPT to create flows
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT创建流程的限制
- en: What if you want a little more, such as a completed flow that you can then import?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想得到更多，比如一个可以导入的完整流程呢？
- en: As of this writing, ChatGPT can’t package the flow in any meaningful way or
    provide a download that you can import. When you export a flow from the Power
    Automate interface, the resulting ZIP file is a collection of JSON files that
    describe the flow’s triggers and actions along with connection definitions and
    a manifest file that provides metadata about the files and flow itself.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，ChatGPT无法以任何有意义的方式打包流程，或提供可以导入的下载。当你从Power Automate界面导出流程时，生成的ZIP文件是一组描述流程触发器和操作的JSON文件，以及连接定义和一个提供有关文件和流程本身元数据的清单文件。
- en: Instead, it can provide several different sets of instructions on how to export
    it once you’ve created it in Power Automate or using some of the Power Platform
    command-line interface tools.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，它可以在你在Power Automate中创建它或使用一些Power Platform命令行界面工具之后，提供几种不同的导出指令。
- en: You also might notice that if your instructions aren’t well-defined or complete,
    ChatGPT may offer some suggestions. When reading through the sample instructions
    from *Figure 4**.1*, notice how *Step 6* has suggestions for actions. The prompt
    didn’t provide any guidance on actions to perform—and actions are a significant
    portion of creating a flow.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可能注意到，如果你的指令没有很好地定义或不完整，ChatGPT可能会提供一些建议。在阅读*图4**.1中的样本指令时，注意*步骤6*有关于操作的提示。提示没有提供执行操作的指导——而操作是创建流程的重要组成部分。
- en: After reading through ChatGPT’s instructions, maybe you decide that you like
    the suggestion of posting to a Teams channel. You can even go back and ask ChatGPT
    how to add things to your flow!
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读了ChatGPT的指令后，你可能决定你喜欢将帖子发布到Teams频道的建议。你甚至可以回过头来询问ChatGPT如何将内容添加到你的流程中！
- en: '![Figure 4.2 – Updating a flow with ChatGPT](img/B21234_04_02.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.2 – 使用 ChatGPT 更新流程](img/B21234_04_02.jpg)'
- en: Figure 4.2 – Updating a flow with ChatGPT
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.2 – 使用 ChatGPT 更新流程
- en: 'You’ll notice that it’s imperfect—ChatGPT assumes that you already filled in
    the blanks in Step 6 with something. Fortunately, it’s pretty easy to see the
    gap and make your adjustments on the fly: you can just merge the two sets of instructions,
    taking the first six steps from the first prompt and then picking up at Step 2
    from the second prompt.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你会注意到它并不完美——ChatGPT 假设你已经用某种东西填写了第 6 步的空白。幸运的是，很容易看到差距并在飞行中做出调整：你只需合并两组指令，从第一个提示的第一步开始，然后从第二个提示的第
    2 步继续。
- en: Refining output with ChatGPT
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 精炼输出
- en: This process of refining output is a blend of art and science. In some instances,
    you may want to provide ChatGPT with examples of output to emulate or a specific
    dataset to work against.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这个精炼输出的过程是艺术和科学的结合。在某些情况下，你可能希望向 ChatGPT 提供一些输出示例以供模仿或特定的数据集以供工作。
- en: Fine-tuning a model is a lot of work, requiring an abundance of training data
    and time and resulting in more specificity for a given scenario. While that may
    be desired in some contexts, it’s not very useful with general-purpose AI. In
    that case, you can use a technique called **shot learning**.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 微调模型是一项大量工作，需要大量的训练数据和时间，并导致针对特定场景的更多特定性。虽然这在某些情况下可能是所希望的，但在通用人工智能中并不非常实用。在这种情况下，你可以使用一种称为**射击学习**的技术。
- en: 'The concepts of shot learning are pretty simple:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 射击学习的概念相当简单：
- en: '**Zero-shot learning**: With this type, the model is asked to perform a task
    with no prior knowledge or training examples. This is how most people use ChatGPT
    (and how we’ve used it in the examples so far).'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**零次学习**：这种类型的学习要求模型在没有先前的知识或训练示例的情况下执行任务。这是大多数人使用 ChatGPT（以及我们在前面的示例中使用的）的方式。'
- en: '**One-shot learning**: In this type of example, you can feed the model a little
    bit of contextual data to demonstrate how to interpret data. For example, when
    working with an image-based AI model, you might upload a few tagged images of
    different breeds of cats and dogs. Then, you could present the model with a new
    image and ask it, *Cat* *or dog?*'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**单次学习**：在这种类型的示例中，你可以向模型提供一些上下文数据来展示如何解释数据。例如，当与基于图像的人工智能模型一起工作时，你可能会上传一些不同品种的猫和狗的标记图像。然后，你可以向模型展示一张新图像并询问它，“猫还是狗？”'
- en: '**Few-shot learning**: This type of learning takes the concepts of one-shot
    learning further, allowing you to enter several examples. You could enter four
    or five Maya Angelou, Pablo Neruda, or William Shakespeare quotes and then ask
    the model to generate a quote that sounds like one of those authors.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**少次学习**：这种学习类型将单次学习的概念进一步扩展，允许你输入几个示例。你可以输入四到五个玛雅·安吉洛、巴勃罗·聂鲁达或威廉·莎士比亚的引文，然后要求模型生成一个听起来像这些作者之一的引文。'
- en: 'Maybe you’re handing this work over to someone else who doesn’t have quite
    the intuition that you do or doesn’t have the same level of familiarity with Power
    Automate and you want to provide a more concise output. You could try rephrasing
    your prompt with more detail and ask ChatGPT for a complete solution, as I did
    in *Figure 4**.3*:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 可能你会将这项工作交给其他人，他们可能没有你那么强的直觉，或者对 Power Automate 的熟悉程度不同，你希望提供更简洁的输出。你可以尝试用更详细的语言重述你的提示，并要求
    ChatGPT 提供一个完整的解决方案，就像我在*图 4.3*中做的那样：
- en: '![Figure 4.3 – Asking ChatGPT for a complete Power Automate solution](img/B21234_04_03.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.3 – 向 ChatGPT 求一个完整的 Power Automate 解决方案](img/B21234_04_03.jpg)'
- en: Figure 4.3 – Asking ChatGPT for a complete Power Automate solution
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.3 – 向 ChatGPT 求一个完整的 Power Automate 解决方案
- en: While the lower-end subscription for ChatGPT can’t directly create flows, there’s
    a new solution on the market that can.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT的低端订阅不能直接创建流程，但市场上有一个新的解决方案可以做到这一点。
- en: Using ChatGPT Plus to create flows
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 ChatGPT Plus 创建流程
- en: In September 2023, Microsoft released a new plugin for ChatGPT that provides
    better integration between ChatGPT and Power Automate.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 2023 年 9 月，微软发布了一个新的 ChatGPT 插件，它提供了 ChatGPT 和 Power Automate 之间更好的集成。
- en: First, you’ll need to upgrade your standard OpenAI subscription to a Plus subscription.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要将你的标准 OpenAI 订阅升级到 Plus 订阅。
- en: 'Once you’ve done that, you need to go through a few steps:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你完成了这些，你需要进行几个步骤：
- en: 'First, click your name or login ID in the lower left corner of the **Chat**
    page and select the **Settings & Beta** menu, as shown in *Figure 4**.4*:'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，点击页面左下角的你的名字或登录 ID，然后选择**设置和测试版**菜单，如图 4.4 所示：
- en: '![Figure 4.4 – The Settings & Beta menu](img/B21234_04_04.jpg)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.4 – 设置 & 测试版菜单](img/B21234_04_04.jpg)'
- en: Figure 4.4 – The Settings & Beta menu
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.4 – 设置 & 测试版菜单
- en: 'Then, under **Beta features**, turn on the slider for **Plugins** (see *Figure
    4**.5*):'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，在**测试版功能**下，打开**插件**的滑块（见*图 4**.5*）：
- en: '![Figure 4.5 – Enabling Plugins](img/B21234_04_05.jpg)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.5 – 启用插件](img/B21234_04_05.jpg)'
- en: Figure 4.5 – Enabling Plugins
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.5 – 启用插件
- en: 'Select the **GPT-4** model at the top of the page, and then select the **Plugins**
    **Beta** option:'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在页面顶部选择**GPT-4**模型，然后选择**插件****测试版**选项：
- en: '![Figure 4.6 – Selecting the Plugins Beta option](img/B21234_04_06.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.6 – 选择插件测试版选项](img/B21234_04_06.jpg)'
- en: Figure 4.6 – Selecting the Plugins Beta option
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.6 – 选择插件测试版选项
- en: 'Next, select the drop-down arrow next to **No plugins enabled**, and then select
    **Plugin store**:'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，选择**未启用插件**旁边的下拉箭头，然后选择**插件商店**：
- en: '![Figure 4.7 – Launching Plugin store](img/B21234_04_07.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.7 – 启动插件商店](img/B21234_04_07.jpg)'
- en: Figure 4.7 – Launching Plugin store
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.7 – 启动插件商店
- en: Click **OK** to acknowledge the information presented on the pop-up page.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**确定**以确认弹出页面上的信息。
- en: 'In the search bar, enter `Power Automate` and then click **Install** in the
    **Power Automate** plugin card:'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在搜索栏中输入`Power Automate`，然后点击**Power Automate**插件卡片中的**安装**：
- en: '![Figure 4.8 – Searching for the Power Automate plugin](img/B21234_04_08.jpg)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.8 – 搜索 Power Automate 插件](img/B21234_04_08.jpg)'
- en: Figure 4.8 – Searching for the Power Automate plugin
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.8 – 搜索 Power Automate 插件
- en: Read the consent form. Provide the necessary consent and click **Accept**.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 阅读同意书。提供必要的同意并点击**接受**。
- en: 'The Power Automate plugin is now enabled and available to use, as shown in
    *Figure 4**.9*:'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Power Automate 插件现已启用并可供使用，如*图 4**.9*所示：
- en: '![Figure 4.9 – The Power Automate plugin has been enabled](img/B21234_04_09.jpg)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.9 – Power Automate 插件已启用](img/B21234_04_09.jpg)'
- en: Figure 4.9 – The Power Automate plugin has been enabled
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.9 – Power Automate 插件已启用
- en: Now, all that’s left is to try the prompt again with the Power Automate plugin
    enabled!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，剩下的就是再次尝试使用已启用的 Power Automate 插件来输入提示了！
- en: '![Figure 4.10 – Creating a flow with ChatGPT and the Power Automate plugin](img/B21234_04_10.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.10 – 使用 ChatGPT 和 Power Automate 插件创建流程](img/B21234_04_10.jpg)'
- en: Figure 4.10 – Creating a flow with ChatGPT and the Power Automate plugin
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.10 – 使用 ChatGPT 和 Power Automate 插件创建流程
- en: 'Clicking on the link will launch Power Automate and show you a preview of your
    flow:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 点击链接将启动 Power Automate 并显示您流程的预览：
- en: '![Figure 4.11 – Reviewing the suggested flow](img/B21234_04_11.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.11 – 查看建议的流程](img/B21234_04_11.jpg)'
- en: Figure 4.11 – Reviewing the suggested flow
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.11 – 查看建议的流程
- en: You can simply follow the prompts to complete the setup.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以简单地遵循提示来完成设置。
- en: Look back
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾
- en: Did you notice anything interesting about the Power Automate page that you were
    directed to? That’s right—Power Automate’s **Describe it to design it** feature.
    We’ll look at that next.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否注意到了你被引导到的 Power Automate 页面上的有趣之处？没错——Power Automate 的**描述以设计**功能。我们将在下一节中探讨这一点。
- en: Using Copilot to create flows
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Copilot 创建流程
- en: Copilot is Microsoft’s umbrella branding that covers a wide range of AI-assisted
    technologies. Power Automate leverages OpenAI models to facilitate natural language
    processing and interaction under the feature name *Describe it to* *design it*.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 是微软的伞形品牌，涵盖了广泛的 AI 辅助技术。Power Automate 利用 OpenAI 模型，在*描述以设计*功能名下促进自然语言处理和交互。
- en: 'What does that mean? It’s essentially like having all of the power of generative
    AI such as ChatGPT natively integrated with the Power platform:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着什么？本质上就像将 ChatGPT 等生成式 AI 的所有功能原生集成到 Power 平台：
- en: '![Figure 4.12 – Copilot and the Describe it to design it feature](img/B21234_04_12.jpg)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.12 – Copilot 和“描述以设计”功能](img/B21234_04_12.jpg)'
- en: Figure 4.12 – Copilot and the Describe it to design it feature
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.12 – Copilot 和“描述以设计”功能
- en: By entering your natural language text directly in the Copilot text area, you
    can skip the step of the ChatGPT Plus plugin and begin your creating and editing
    experience directly in Power Automate.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 通过直接在 Copilot 文本区域输入您的自然语言文本，您可以跳过 ChatGPT Plus 插件的步骤，并在 Power Automate 中直接开始创建和编辑体验。
- en: 'For example, I decided to pivot from the Twitter example and try something
    a little more complex. In the example shown in *Figure 4**.13*, I asked Copilot
    to create a flow that would send a weekly summary email of all my unread messages,
    and this is what it came up with:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我决定从 Twitter 示例中转变，尝试一些更复杂的东西。在 *图 4.13* 中显示的示例中，我要求 Copilot 创建一个流程，该流程将发送我所有未读消息的每周总结电子邮件，这是它提出的内容：
- en: '![Figure 4.13 – Copilot’s initial attempt at creating a flow based on natural
    language input](img/B21234_04_13.jpg)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.13 – Copilot 根据自然语言输入创建流程的初始尝试](img/B21234_04_13.jpg)'
- en: Figure 4.13 – Copilot’s initial attempt at creating a flow based on natural
    language input
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.13 – Copilot 根据自然语言输入创建流程的初始尝试
- en: It looks close—it definitely has some of the right components (such as getting
    my Office 365 profile and connecting to my mailbox), though I don’t see any actions
    that take into account the summarization requirement. Still, it might be a good
    starting point.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它看起来很接近——它确实包含了一些正确的组件（例如获取我的 Office 365 个人资料和连接到我的邮箱），尽管我没有看到任何考虑总结要求的动作。尽管如此，它可能是一个不错的起点。
- en: 'You can also try rewording the prompt to see whether you can get something
    better. For example, I updated the prompt in *Figure 4**.14* and got what might
    even be closer, though some of the items appear to be out of order:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以尝试重新措辞提示，看看是否能得到更好的结果。例如，我在 *图 4.14* 中更新了提示，得到了可能更接近的结果，尽管一些项目似乎顺序不当：
- en: '![Figure 4.14 – The revised flow generated by Copilot](img/B21234_04_14.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.14 – Copilot 生成的修订版流程](img/B21234_04_14.jpg)'
- en: Figure 4.14 – The revised flow generated by Copilot
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.14 – Copilot 生成的修订版流程
- en: After you’ve gotten to a point where you’re satisfied (as much as you can be)
    with Copilot’s offerings, you can let Copilot create the flow. In my example,
    after clicking **Next**, I’m presented with a dialog to supply any credentials
    and, once again, a list of the steps that comprise the flow.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当你对 Copilot 提供的内容感到满意（尽可能满意）时，你可以让 Copilot 创建流程。在我的例子中，点击 **下一步** 后，我看到了一个对话框，需要提供任何凭证，以及再次列出构成流程的步骤。
- en: 'Clicking **Create flow** will instantiate the actions and steps that Copilot
    has arranged:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 **创建流程** 将实例化 Copilot 安排的动作和步骤：
- en: '![Figure 4.15 – Preparing to create the flow](img/B21234_04_15.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.15 – 准备创建流程](img/B21234_04_15.jpg)'
- en: Figure 4.15 – Preparing to create the flow
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.15 – 准备创建流程
- en: 'After the framework has been laid out, you can then drag and drop steps or
    add actions like any other flow. One of the more interesting features is the ability
    to use Copilot to *update* the flow and refine it, as highlighted in *Figure 4**.16*:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在框架搭建完毕后，你就可以像其他流程一样拖放步骤或添加动作。其中一个更有趣的功能是使用 Copilot 来 *更新* 流程并对其进行细化，如 *图 4.16*
    所强调的：
- en: '![Figure 4.16 – Using the Copilot feature to update the flow](img/B21234_04_16.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.16 – 使用 Copilot 功能更新流程](img/B21234_04_16.jpg)'
- en: Figure 4.16 – Using the Copilot feature to update the flow
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.16 – 使用 Copilot 功能更新流程
- en: 'As a preview feature, Microsoft tells you up-front that not all connectors
    or actions are supported, which may account for the hit-or-miss behavior, as shown
    in *Figure 4**.17*:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一项预览功能，Microsoft 会提前告诉你并非所有连接器或动作都受支持，这可能是导致结果好坏参半的原因，如 *图 4.17* 所示：
- en: '![Figure 4.17 – Attempting to update an existing action with Copilot](img/B21234_04_17.jpg)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.17 – 使用 Copilot 更新现有动作](img/B21234_04_17.jpg)'
- en: Figure 4.17 – Attempting to update an existing action with Copilot
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.17 – 尝试使用 Copilot 更新现有动作
- en: While it didn’t do exactly what I wanted, it’s exciting to see the progress.
    As an AI-based assistant, Copilot is a great way to help explore the Power Automate
    space.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然它没有做到我想要的样子，但看到它的进步还是很令人兴奋的。作为一个基于 AI 的助手，Copilot 是探索 Power Automate 空间的好方法。
- en: Working with Power Apps
  id: totrans-93
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与 Power Apps 一起工作
- en: Now, let’s shift gears to see how we can use AI to help create in the application
    space.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们转换一下思路，看看我们如何利用 AI 来帮助在应用程序领域进行创作。
- en: Using ChatGPT to build an app
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 构建应用程序
- en: So, how do you get started? You can try starting a new flow from a blank canvas,
    but for many of us, that blank canvas also involves a lot of blank stares. Fortunately,
    if you have an idea of where you want to go, AI can help you get there.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你如何开始呢？你可以尝试从空白画布开始创建新的流程，但对于我们中的许多人来说，这个空白画布也意味着很多迷茫。幸运的是，如果你有一个想要去的地方的想法，AI
    可以帮助你到达那里。
- en: As with Power Automate, you can try using ChatGPT to guide your design. In this
    example, I instructed ChatGPT to create a Power App that can be used to inventory
    some items in my garage with a photo. The app should attempt to perform some visual
    identification, save the data to the description, and then upload the items to
    a SharePoint list.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Power Automate 一样，你可以尝试使用 ChatGPT 来指导你的设计。在这个例子中，我指示 ChatGPT 创建一个 Power App，该应用可以用来通过照片盘点我的车库中的某些物品。该应用应尝试进行一些视觉识别，将数据保存到描述中，然后将物品上传到
    SharePoint 列表中。
- en: '*Figure 4**.18* shows how ChatGPT responds to this task:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 4.18* 展示了 ChatGPT 对这个任务的响应：'
- en: '![Figure 4.18 – Asking ChatGPT to create a Power App](img/B21234_04_18.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.18 – 请求 ChatGPT 创建 Power App](img/B21234_04_18.jpg)'
- en: Figure 4.18 – Asking ChatGPT to create a Power App
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.18 – 请求 ChatGPT 创建 Power App
- en: 'It starts off well, but as you can see in *Figure 4**.19*, the specificity
    of what I wanted to achieve quickly tapers off:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 它开始得很好，但正如你在 *图 4.19* 中可以看到的，我想要实现的具体性很快就减弱了：
- en: '![Figure 4.19 – The Power App’s configuration](img/B21234_04_19.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.19 – Power App 的配置](img/B21234_04_19.jpg)'
- en: Figure 4.19 – The Power App’s configuration
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.19 – Power App 的配置
- en: Once it got to the more complex part of the process, instead of providing good
    instructions on what to do, ChatGPT fell back to **insert your own** **steps here**.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦它到达流程的更复杂部分，ChatGPT 没有提供关于如何做的良好指令，而是退回到了 **在此处插入自己的** **步骤**。
- en: 'Remember, ChatGPT is conversational, so you can tell it that its previous input
    wasn’t what you were looking for and that you need more detail. You can provide
    specific instructions as well as part of the procedure. Using these refinement
    tactics can help you get closer to your result, as shown in *Figure 4**.20*:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，ChatGPT 是对话式的，所以你可以告诉它之前的输入不是你想要的，你需要更多细节。你可以提供具体的指令以及部分流程。使用这些细化策略可以帮助你更接近你的结果，如图
    *图 4.20* 所示：
- en: '![Figure 4.20 – ChatGPT responding with a more detailed explanation](img/B21234_04_20.jpg)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.20 – ChatGPT 提供更详细的解释](img/B21234_04_20.jpg)'
- en: Figure 4.20 – ChatGPT responding with a more detailed explanation
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.20 – ChatGPT 提供更详细的解释
- en: That’s a much more helpful response—especially for someone who isn’t as familiar
    with the Power Apps platform.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个更有帮助的响应——特别是对于那些不太熟悉 Power Apps 平台的人来说。
- en: Let’s see how Copilot, integrated with Power Apps, handles this same task!
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 Copilot 与 Power Apps 集成后如何处理这个相同的任务！
- en: Using Copilot to build an app
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Copilot 构建应用
- en: 'Like Power Automate, Power Apps also has some support for Copilot:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Power Automate 一样，Power Apps 也对 Copilot 有一些支持：
- en: '![Figure 4.21 – The Power Apps Copilot prompt](img/B21234_04_21.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.21 – Power Apps Copilot 提示](img/B21234_04_21.jpg)'
- en: Figure 4.21 – The Power Apps Copilot prompt
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.21 – Power Apps Copilot 提示
- en: 'In the following example, I’m going to provide the same initial instructions
    that I provided to ChatGPT. As you can see in *Figure 4**.22*, the initial response
    doesn’t appear to be as useful and just presents a table with the sample data,
    including columns for **Name**, **Description**, and **Photo**:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的例子中，我将提供与 ChatGPT 提供的相同初始指令。如图 *图 4.22* 所示，初始响应似乎并不那么有用，只是展示了一个包含 **名称**、**描述**
    和 **照片** 列的样本数据表：
- en: '![Figure 4.22 – The initial response from Power Apps Copilot](img/B21234_04_22.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.22 – Power Apps Copilot 的初始响应](img/B21234_04_22.jpg)'
- en: Figure 4.22 – The initial response from Power Apps Copilot
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.22 – Power Apps Copilot 的初始响应
- en: 'After clicking **Create app**, the Power Apps Studio page is presented. The
    result is a one-page app that gathers information in a table, as shown in *Figure
    4**.23*:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 **创建应用** 后，Power Apps Studio 页面就会出现。结果是一个单页应用，它以表格的形式收集信息，如图 *图 4.23* 所示：
- en: '![Figure 4.23 – A sample app created with Copilot](img/B21234_04_23.jpg)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.23 – 使用 Copilot 创建的示例应用](img/B21234_04_23.jpg)'
- en: Figure 4.23 – A sample app created with Copilot
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.23 – 使用 Copilot 创建的示例应用
- en: You can click around and preview the app, but at this point, it’s a bit underwhelming.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以点击并预览该应用，但到目前为止，它有点令人失望。
- en: Tip
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: The Power Apps Studio interface isn’t as intuitive as Power Automate for adding
    or updating components—especially if the Copilot integrations aren’t showing up
    while working on a canvas app. If you don’t see the Copilot icon on the [title
    bar of Power Apps Studio](https://admin.powerplatform.com), check out the Power
    Platform admin center ([https://admin.powerplatform.com](https://admin.powerplatform.com)),
    and under **Environments**, select your environment > **Settings** > **Product**
    > **Features** and ensure that **Copilot** and **AI Builder preview models** are
    both turned on.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: Power Apps Studio界面在添加或更新组件方面不如Power Automate直观——尤其是当在画布应用上工作时Copilot集成没有显示时。如果你在[Power
    Apps Studio的标题栏](https://admin.powerplatform.com)上没有看到Copilot图标，请查看Power Platform管理中心([https://admin.powerplatform.com](https://admin.powerplatform.com))，然后在**环境**下选择你的环境
    > **设置** > **产品** > **功能**，并确保**Copilot**和**AI Builder预览模型**都已开启。
- en: While natural language processing is helpful for a lot of things, there are
    some contexts where you need to figure out the keywords and phrases that will
    trigger the AI to assist in the way you want. I’ll go back to the drawing board
    and start over—this time, rephrasing the prompt and then using the refinements
    controls on the Copilot page.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然自然语言处理对很多事情都有帮助，但在某些情况下，你需要找出将触发AI以你想要的方式协助的关键词和短语。我将回到画板，重新开始——这次，重新措辞提示并使用Copilot页面上的细化控件。
- en: 'As you can see in *Figure 4**.24*, the combination of rephrasing the prompt
    and then using the Copilot interface helped me get much closer to the data entry
    page:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在*图4.24*中看到的，重新措辞提示并使用Copilot界面帮助我更接近数据输入页面：
- en: '![Figure 4.24 – The updated app with Copilot](img/B21234_04_24.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图4.24 – 使用Copilot更新的应用](img/B21234_04_24.jpg)'
- en: Figure 4.24 – The updated app with Copilot
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.24 – 使用Copilot更新的应用
- en: 'From here, I can create this app and then start modifying it. By selecting
    the Copilot icon on the title bar of Power Apps Studio, I can try to instruct
    Copilot to update things, sometimes more successfully than others:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，我可以创建这个应用，然后开始修改它。通过在Power Apps Studio的标题栏上选择Copilot图标，我可以尝试指示Copilot更新内容，有时比其他时候更成功：
- en: '![Figure 4.25 – Attempting to modify properties with Copilot](img/B21234_04_25.jpg)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图4.25 – 尝试使用Copilot修改属性](img/B21234_04_25.jpg)'
- en: Figure 4.25 – Attempting to modify properties with Copilot
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.25 – 尝试使用Copilot修改属性
- en: 'In *Figure 4**.25*, a checkbox was indeed added, but it ended up being added
    to the main screen. The text, instead of being set to *Gift from my mom*, was
    configured with the **Option 1** default label. After removing the checkbox and
    telling Copilot to add it to *Form1* (the name of the input form), and then to
    set the **Text** to *Gift from my mom*, I met with a little bit more success,
    though the control was still on the main screen and not actually part of the input
    form:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图4.25*中，确实添加了一个复选框，但它最终被添加到了主屏幕上。文本，而不是设置为*来自妈妈的礼物*，被配置为**选项1**的默认标签。在移除复选框并告诉Copilot将其添加到*Form1*（输入表单的名称），然后设置**文本**为*来自妈妈的礼物*后，我取得了一些成功，尽管控件仍然在主屏幕上，实际上并不是输入表单的一部分：
- en: '![Figure 4.26 – Working with the Copilot process](img/B21234_04_26.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图4.26 – 与Copilot过程合作](img/B21234_04_26.jpg)'
- en: Figure 4.26 – Working with the Copilot process
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.26 – 与Copilot过程合作
- en: 'Even after several rewording attempts, I was unable to get Copilot to add a
    simple checkbox to the input form for collecting data:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 即使经过多次改写尝试，我也无法让Copilot将一个简单的复选框添加到收集数据的输入表单中：
- en: '![Figure 4.27 – Refining with Copilot](img/B21234_04_27.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![图4.27 – 使用Copilot进行细化](img/B21234_04_27.jpg)'
- en: Figure 4.27 – Refining with Copilot
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.27 – 使用Copilot进行细化
- en: 'For many purposes, at this point—especially if you’re just getting familiar
    with Power Apps—it may be more productive to ask ChatGPT how to do something than
    to ask Copilot to do it for you:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多目的来说，目前这个阶段——尤其是如果你刚开始熟悉Power Apps——询问ChatGPT如何做某事可能比让Copilot为你做它更有效率：
- en: '![Figure 4.28 – Phoning an old friend, ChatGPT, for help](img/B21234_04_28.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图4.28 – 向老朋友ChatGPT求助](img/B21234_04_28.jpg)'
- en: Figure 4.28 – Phoning an old friend, ChatGPT, for help
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.28 – 向老朋友ChatGPT求助
- en: That’s not to say Copilot can’t do it—but as I mentioned earlier, you definitely
    need to know how to talk to Copilot to get it to be useful (we’ll get to that
    in [*Chapter 5*](B21234_05.xhtml#_idTextAnchor057)). You shouldn’t approach Copilot
    thinking you can just speak an app into existence. While Power Apps Copilot does
    help kickstart some simple canvas apps, you’ll still need a good bit of Power
    Apps knowledge combined with good old-fashioned design skills to turn its app
    generation attempts into something more useful.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是说Copilot不能做到——但正如我之前提到的，你确实需要知道如何与Copilot沟通，才能让它变得有用（我们将在[*第五章*](B21234_05.xhtml#_idTextAnchor057)中讨论）。你不应该以为只要说出一个应用的名字，Copilot就能将其变为现实。虽然Power
    Apps Copilot确实有助于启动一些简单的画布应用，但你仍然需要相当多的Power Apps知识，以及传统的设计技能，才能将它的应用生成尝试转化为更有用的东西。
- en: Summary
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The ultimate takeaway from this chapter is that AI assistants such as ChatGPT
    and Copilot are just that—assistants. While generative AI can’t do your job for
    you (at this point), it’s a great aid—especially when you’re stretching outside
    your comfort zone.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的最终收获是，像ChatGPT和Copilot这样的AI助手，本质上只是助手。尽管生成式AI目前还无法替你完成工作（至少目前是这样），但它是一个极好的辅助工具——尤其是在你尝试突破舒适区的时候。
- en: If you’re looking at bootstrapping new apps and flows, AI assistants can help
    get you started, but you’ll ultimately need to continue refining your prompts,
    searching the blogs and community groups, and learning the underlying technology
    itself to be truly successful.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在寻找启动新应用和工作流的途径，AI助手可以帮助你开始，但最终你需要继续完善你的提示，搜索博客和社区群组，以及学习底层技术本身，才能真正取得成功。
- en: In the next chapter, we’ll expand on using Copilot for Power Apps. While our
    first attempts didn’t prove very successful, there are some techniques you can
    use to get Copilot and Power Apps to come together and produce working apps in
    as little as an hour.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将扩展使用Copilot进行Power Apps的应用。虽然我们的第一次尝试并没有取得很大的成功，但有一些技巧你可以使用，以使Copilot和Power
    Apps结合在一起，在最短的时间内产生可工作的应用。
