- en: '1'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The AI Story So Far
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Artificial Intelligence** (**AI**) has captured our collective imaginations
    since Alan Turing first asked whether machines could think. While we still can’t
    give a firm answer to that big question, the increasing pace of change in the
    AI world means that creative white-collar workers are, for the first time, fearing
    for their careers.'
  prefs: []
  type: TYPE_NORMAL
- en: Computers themselves have transitioned from toys for enthusiasts, to tools for
    professionals, to enablers for everyone—and AI is on the same trajectory, over
    a much shorter time span. In the same way that smartphones have made computing
    easier for regular people, AI promises to make creativity itself easier for a
    wider audience. Many in the creative space have now felt, or started to feel,
    the impacts of AI on their professional lives.
  prefs: []
  type: TYPE_NORMAL
- en: However, the imperfect nature of AI tools means that there’s still a huge role
    for humans in creative production. Even though its help is imperfect, AI will
    still help us to find video clips more easily, fix bad audio more quickly, check
    our ideas against virtual collaborators, and, in many ways, be able to reach just
    a little bit further out of our comfort zones. Disruption is certain, but AI will
    not end human creativity. This book aims to show creative people how they can
    harness the power of many different AI-based tools to make their creations better.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: The early days of AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How AI works today
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses of AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The shortcomings of AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apps, tools, and technologies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To begin, let’s look back.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: Free Benefits with Your Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Your purchase includes a free PDF copy of this book along with other exclusive
    benefits. Check the *Free Benefits with Your Book* section in the Preface to unlock
    them instantly and maximize your learning experience. |
  prefs: []
  type: TYPE_NORMAL
- en: The early days of AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Neural networks—connected virtual nodes that work in a similar way to human
    brains—were first proposed in 1944, and they’ve experienced varying success in
    the decades since. A neural network is first trained by presenting a set of inputs
    and the matching outputs it should learn to produce. During the training process,
    each node in the interconnected network becomes stronger or weaker, assigned **weights**
    that reinforce some connections and de-emphasize others. Essentially, it’s learning
    to recognize patterns without ever being taught a rule explicitly.
  prefs: []
  type: TYPE_NORMAL
- en: After the training, a neural network can be fed a new input to produce a new,
    hopefully correct output. However, this indirect approach is quite different from
    other rule-based (or heuristic) methods that other AI systems have used, and many
    years passed before computing power unleashed its potential.
  prefs: []
  type: TYPE_NORMAL
- en: Probably the most influential event in AI history occurred when Alan Turing
    presented an *imitation game*, a test in which an interrogator exchanges messages
    with a human and a digital participant, then tries to identify which is which.
    This became known as the **Turing test**, and for many decades, it was seen as
    an insurmountable bar.
  prefs: []
  type: TYPE_NORMAL
- en: In 1965, a program called **ELIZA** simulated a psychotherapist, repeating keywords
    from a user’s input in its own responses. Techniques such as this became foundational
    in **natural language processing**, and although this technique is simple, it
    was enough to fool many people into thinking they were talking to a human.
  prefs: []
  type: TYPE_NORMAL
- en: Soon after, in the 1970s and 1980s, another focus of early AI was expert systems,
    which aimed to capture knowledge in a specific niche in order to answer related
    questions. Using heuristic methods rather than neural networks, it proved too
    difficult to codify the knowledge and deal with edge cases.
  prefs: []
  type: TYPE_NORMAL
- en: AI research continued, but the breathless hype was not met with reality, and
    enthusiasm waned. Computers continued to get faster and user interfaces became
    more friendly, but AI progress stalled. In the mid-1990s, I majored in artificial
    intelligence and artificial life in an information technology degree, implementing
    my own version of ELIZA, training neural networks, and simulating virtual plants
    that I then evolved against one another. While it was fascinating to see how these
    techniques could be used, there was a huge gap between student projects and practical
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: Heuristic approaches and neural networks found specific uses in limited areas,
    and as computers became more powerful, more uses became possible. Fuzzy logic
    allowed computers to read messy human handwriting, and rules governing enemy behavior
    governed computer-controlled enemies in video games, in real time. Language translation,
    though imperfect, became a common feature in many applications.
  prefs: []
  type: TYPE_NORMAL
- en: However, it was Google’s introduction of **transformer models** in 2017 (in
    a paper entitled *Attention Is All You Need*) that led to the modern explosion
    in the power and utility of AI, alongside a breakthrough in diffusion models for
    image generation. Let’s take a high-level look at how these modern systems work,
    while noting that we don’t truly understand all the details.
  prefs: []
  type: TYPE_NORMAL
- en: How AI works today
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Transformer models include a mechanism called **attention**, which identifies
    the most important parts of an input and assigns them a higher level of importance.
    Think of the adjectives in this sentence being assigned less importance than the
    nouns or the verb:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The* *brown* **dog attacked** *the timid* **cat** *aggressively*.'
  prefs: []
  type: TYPE_NORMAL
- en: (While I won’t be digging into the math here, the paper *Attention Is All You
    Need* is linked in the *Additional resources* section of this chapter.)
  prefs: []
  type: TYPE_NORMAL
- en: The transformer model was intended for use with translation, but its true potential
    became clear when it was combined with **Large Language Models** (**LLMs**). An
    LLM is a predictive model trained to produce output a word at a time, based on
    the words that had come before—like an advanced version of autocorrect. A sentence
    such as “The ice cream was…” is more likely to conclude with the adjective “…sweet”
    or “…delicious” than, for example, “dusty.”
  prefs: []
  type: TYPE_NORMAL
- en: Adding transformers to LLMs with large pools of training data created—or seemed
    to create—emergent abilities, such as the ability to summarize. These models can,
    at some level, perform reasoning tasks, and it’s not yet fully clear exactly how
    they do it.
  prefs: []
  type: TYPE_NORMAL
- en: Although we did train these models on vast amounts of text, we did not train
    models to summarize or reason, and yet, they can do that. It’s not clear if there’s
    any deep understanding going on, but does it matter? If you ask for a summary
    of an article and you get one that’s accurate, that’s good enough to be useful.
    Transformer-backed LLM systems are widely used today for help, advice, information,
    and even—though they aren’t sentient—companionship. Modern LLMs include OpenAI’s
    ChatGPT, Anthropic’s Claude, Meta’s Llama, and Google’s Gemini, to name a few.
  prefs: []
  type: TYPE_NORMAL
- en: The other side of the modern AI story belongs to image generation. While ChatGPT’s
    image generator uses an autoregressive transformer model, **diffusion models**
    are more common, starting with DALL·E and continuing with Midjourney, Stable Diffusion,
    and others. A diffusion model starts with random noise, then repeatedly applies
    a neural network to predict how noise should be removed until it approximates
    the requested text prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1.1 – An illustration of the Stable Diffusion denoising process by
    Benlisquare, from Wikipedia](img/B34247_01_001.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1.1 – An illustration of the Stable Diffusion denoising process by Benlisquare,
    from Wikipedia
  prefs: []
  type: TYPE_NORMAL
- en: Training is a huge part of this process, involving a forward diffusion process
    of adding noise to these images, and a reverse diffusion process where the noise
    is removed. By feeding these models immense numbers of images, we have been able
    to improve their outputs to the point where they can, at least some of the time,
    create synthetic images that look real. Videos can be similarly synthesized using
    a more complex process, but **Machine Learning** (**ML**)—in which systems learn
    directly from data rather than being given explicit instructions—can be applied
    to many different tasks.
  prefs: []
  type: TYPE_NORMAL
- en: So, what are those tasks?
  prefs: []
  type: TYPE_NORMAL
- en: Modern applications of AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The term *AI* has been overused, and for many people, AI simply now means “a
    computer made it”—but there’s so much more to AI than that. For clarity, this
    book will separate ML and AI applications into three broad categories. They are
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Utility AI**: Recognition, classification, and understanding models, which
    can be used to help sort and manage the data they are presented with'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Generative AI**: Creation of text, images, video, audio, and even programming
    code'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automation AI**: Directed control of other computer systems to perform tasks
    that humans usually would'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dig deeper. If you’re asking questions of a chatbot, that’s likely Utility
    AI. If you’re creating music or original text, that’s **G****enerative AI** (or
    **GenAI** for short). And if you’re using Siri or Google Assistant to create a
    calendar appointment for you, that’s a simpler form of Automation AI. The names
    of these terms will change over time; the term **AI agents** (or agentic AI) is
    a part of Automation AI that’s becoming more prominent.
  prefs: []
  type: TYPE_NORMAL
- en: Each of these areas will be covered in more detail in this book, and there’s
    a part of this book devoted to each of these three sections. While there is certainly
    crossover between these categories—for example, translation involves recognition
    of what was said as well as generation in another language—in general, most AI
    applications today can cleanly fit into one of them.
  prefs: []
  type: TYPE_NORMAL
- en: For now, let’s treat these categories as broad, basic headings before we drill
    into the details.
  prefs: []
  type: TYPE_NORMAL
- en: 'Today, just some of the things you might use AI tools to help you with are
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Generating ideas for an essay
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Assessing written text for completeness or accuracy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating photographic-style images
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Replacing part of an image with something synthetic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Processing audio to remove noise
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating synthetic recordings to match a particular person’s voice
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing scripts to automate features in graphic design applications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Asking for help with learning a new application
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating 3D models based on images or text descriptions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These tasks are just the tip of the iceberg, and I’ve long held the view that
    progress will really explode when agents start driving our computers for us. At
    first, AI models will start using our applications as we watch, but eventually
    they’ll just perform tasks directly, or use lower-level systems that we cannot.
    Today, we’re only at the start of the journey, but things are moving quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Where AI falls short
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Few technologies break through to the mainstream, but AI certainly has, and
    the excitement and fear across creative communities is palpable. However, one
    factor that’s known but frequently ignored is that the output from AI systems
    is rarely perfect. To the layperson, an AI-generated image can look great, but
    to a Photoshop expert, there may be obvious flaws. AI-made code will frequently
    contain references to programming interfaces that simply don’t exist. Horrifyingly,
    AI-generated legal arguments refer to fictional legal cases. Advice is not always
    accurate, and the more you know about a subject, the more likely you are to find
    fault with an AI’s output.
  prefs: []
  type: TYPE_NORMAL
- en: While the quantity of work produced by AI can sometimes make up for the overall
    lack of quality, in general, most AI output lacks something, tangible or not.
    This could be for many reasons, but chief among them is likely that AI excels
    at remixing, rather than original thought. Every image a diffusion model creates
    is, in some way, derived from the training data it was fed.
  prefs: []
  type: TYPE_NORMAL
- en: Although it’s certainly been argued (by Kirby Ferguson) that “*Everything is
    a Remix*,” the best work contains an original spark, and the process of creation
    often inspires new creations itself.
  prefs: []
  type: TYPE_NORMAL
- en: It’s critical to realize that the creative process is an important part of any
    product or artwork. If you skip the brainstorming, planning, and experimentation
    phases, the finished product will be lacking in ways both obvious and subtle,
    and you won’t have grown as an artist.
  prefs: []
  type: TYPE_NORMAL
- en: You might have what you asked for, but creativity can lead to better outcomes
    than the most obvious ones. Skipping straight to an end goal and omitting all
    the creative decisions made along the way will produce worse products, because
    the best designers don’t just create exactly what the client asks for.
  prefs: []
  type: TYPE_NORMAL
- en: How good can AI be? From everything I’ve seen to date, a good GenAI produces
    work that’s OK but not great. It’s rarely perfect, and it’s unlikely to be top-class
    A+ work. At best, it’s a solid B+. But that doesn’t mean you shouldn’t use AI
    at all.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead, use AI for what it’s really good at:'
  prefs: []
  type: TYPE_NORMAL
- en: Replacing parts of an image, not the whole thing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Extending a photograph’s edges to adapt to a size change, not creating whole
    images from scratch
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Picking the best photographs from a full-day shoot, with a human checking its
    work, not just trusting it completely
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Identifying which parts of a music track can be repeated to suit a different
    duration, not simply creating a whole new piece
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Producing temporary art to help with planning, not finished art
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Helping you write programming scripts to make creative tasks more efficient,
    not doing everything by hand
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In my opinion, the best uses of AI are to augment human creativity, not trying
    to replace it entirely. If an AI can help you extend your creative reach a little
    further, great. But if you skip all the traditional creative steps and create
    original work that’s well outside your comfort zone, you simply won’t recognize
    the mistakes it makes. AI can help you run, but you have to learn to walk first.
  prefs: []
  type: TYPE_NORMAL
- en: As well as the risk of unnoticed mistakes, AI also brings the risk of creative
    stagnation. Though a client may only care about an end product, the process of
    making it helps an artist to learn. If you skip straight to the end, you learn
    nothing and earn no sense of accomplishment. The more you rely on AI, the less
    likely you are to gain the insights that turn a novice into an expert.
  prefs: []
  type: TYPE_NORMAL
- en: 'With all that in mind, there’s still plenty for AI to do: boring, technical,
    or rote tasks that don’t teach you much or simply take too long to be practical,
    or that computers are simply better at than humans. Explore with your eyes open,
    and you’ll see where AI has value. As a tool, AI can be a great assist, but as
    a total replacement for an artist, it’s lacking.'
  prefs: []
  type: TYPE_NORMAL
- en: To conclude this chapter, we’ll next take a quick look at the different kinds
    of AI-based services available today.
  prefs: []
  type: TYPE_NORMAL
- en: Apps, tools, and technologies
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Change is inevitable, but rarely is the pace of change as fast as it is in this
    space today. While the tools I’ve mentioned here are available now, you can expect
    great new tools to pop up, and some listed here to disappear. This isn’t intended
    to be an exclusive listing of all the tools out there, but it should serve as
    an introduction to at least some services available today.
  prefs: []
  type: TYPE_NORMAL
- en: For many people, I suspect “AI” starts and finishes with chatbots, and likely
    the best-known one, ChatGPT. While it’s true that the various chat-focused LLMs
    do offer other services, you’ll also discover many specialized services with or
    without a chat-based interface, AI services in apps you may already be using,
    and a whole world of open-source models you may be able to run on your own hardware
    without a subscription.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin with a look at the best-known LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: LLM-based hosted AI services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’d like to handle a multi-faceted problem, using a service that can interpret
    text, create at least rudimentary images, search the web, analyze documents, and
    more is what you need. Starting with a service from one of the large, well-known
    AI companies is probably a good idea. All of these companies allow you some number
    of queries for free, but if you need more, subscription plans are available. Here,
    I’ll be mentioning the price of the top-level consumer-facing plans rather than
    the costs of tokens that a developer might face.
  prefs: []
  type: TYPE_NORMAL
- en: Some of these models (such as Claude) are strictly text-based, while others
    (such as ChatGPT) are multimodal, able to analyze images or the spoken word in
    addition to text. Some can create images, video, or audio, while some cannot.
    And that’s OK, because sometimes you simply want information to help you do your
    job better, and a conversational interface makes that information much more accessible.
  prefs: []
  type: TYPE_NORMAL
- en: While text generation or refinement is an obvious use of an LLM, another key
    use in the creative space is for help with ideation, learning, or research. While
    these systems may not be able to create your work for you, they definitely have
    a place.
  prefs: []
  type: TYPE_NORMAL
- en: Each of these services is trained on a unique set of training data, and their
    models are guided by a unique system prompt—a set of instructions fed to the model
    before a user’s input. As a result, each LLM will have a different feel or personality.
    Try several, map your needs to their capabilities, and if you choose to subscribe
    to one or more, re-evaluate your decision frequently.
  prefs: []
  type: TYPE_NORMAL
- en: Services in this space are upgraded frequently, but almost all are free to try.
    Be sure that a service can do what you expect before committing to a subscription
    and pay monthly if you do—everything changes quickly!
  prefs: []
  type: TYPE_NORMAL
- en: It’s also worth noting that many of these services are targeted separately toward
    regular consumers and developers, who usually access these services at a lower
    level through a more complex token-based system. Since most creatives aren’t developers,
    we’ll assume you’re going through the consumer-friendly front door and focus on
    the fixed monthly prices.
  prefs: []
  type: TYPE_NORMAL
- en: This is absolutely not an exhaustive list, but it’s unlikely you’ve heard of
    every service here. Still, one AI company you’ll have almost certainly heard of
    is…
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Just as “googling” has become synonymous with search, “ChatGPT” is often used
    when talking about any AI chatbot. **ChatGPT** is OpenAI’s flagship product, and
    it’s probably the best-known LLM in the world. You can access ChatGPT through
    the web, through their apps on many platforms, and through integrations with other
    products. Several models of ChatGPT have been developed, and the offerings are
    constantly changing, but it’s not limited to just text—you can upload documents
    and receive updated documents in return. With all of these services, if you’re
    not sure about a model’s capabilities, just ask the LLM itself.
  prefs: []
  type: TYPE_NORMAL
- en: 'As well as ChatGPT, OpenAI was once well known for **DALL·E**, an early image
    generation tool that’s now part of ChatGPT and can be tried for free. Sora is
    a newer image and video generation tool, but it’s only available on the paid plans.
    At the time of writing, the expensive ChatGPT Pro is required for 1080p video
    generation, while lower-quality 720p videos can be generated with ChatGPT Plus.
    Still, it’s potentially very useful for creatives, and here’s what you can expect
    to pay:'
  prefs: []
  type: TYPE_NORMAL
- en: '**ChatGPT**: Free to start, accessed at [https://chatgpt.com](https://chatgpt.com)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ChatGPT Plus**: US$20/month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ChatGPT Pro**: US$200/month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Google
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Search giant Google offers a number of products under the name **Gemini**—currently
    the AI Pro and AI Ultra plans, featuring Gemini Pro and Gemini Nano models alongside
    other offerings, such as Veo 3\. Gemini is an LLM with a wide range of capabilities
    that’s available on the web, in an app, and in Google Workspace, as well as being
    built directly into Google Search with the newer AI Mode. If you’re on Android,
    it’s also possible to use Gemini in place of Google Assistant, but at the time
    of writing, it cannot replace Apple’s Siri on iPhone. It’s free to start, but
    the most advanced capabilities require a Pro plan. There are definite uses in
    the creative fields, and the pricing is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Gemini**: Start for free, accessed at [https://gemini.google.com/app](https://gemini.google.com/app)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gemini AI Pro**: US$20/month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gemini AI Ultra**: US$249/month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Meta
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Better known as the creator of Facebook and owner of Instagram, Meta has created
    **Llama**, their flagship LLM, which has grown into the largest free, nearly open-source
    option. With LLMs, being open source doesn’t necessarily mean you can download
    it and run it locally, because the full-size versions are simply too big, but
    that doesn’t mean it’s impossible—more on that in the *Running your own AI services*
    section later in the chapter. And being free doesn’t make Llama immune from copyright
    issues either; Meta has faced legal action, accused of training on copyrighted
    materials, though, as long as you don’t ask Llama to reproduce copyrighted work,
    you’re unlikely to face issues yourself. There’s no need to log in before talking
    to the LLM, though image and video generation does require that you make a free
    account.Llama can be accessed at [https://meta.ai](https://meta.ai).
  prefs: []
  type: TYPE_NORMAL
- en: Anthropic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Claude is an LLM available from Anthropic, and like the previously mentioned
    LLMs, it’s happy to chat, analyze images, work with code, and more. However, Claude
    cannot generate images, so it won’t be suitable if you’re interested in GenAI
    for images or video. Pricing is in line with other services:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Claude**: Start for free, accessed at [https://claude.ai](https://claude.ai)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Claude Pro**: US$20/month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Claude Max**: US$100-200/month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Microsoft
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Copilot is Microsoft’s multi-purpose AI tool, and although it can be accessed
    on the web, it’s most commonly found inside Microsoft Office apps. In Word, it
    acts as a grammar checker and text refinement engine, while in PowerPoint, it
    can help you with layout, image generation, or creating entire presentations.
    (It can also help in Excel, but since that’s less likely to be useful in a creative
    context, we won’t cover it here.) While it’s historically been based on ChatGPT,
    Microsoft has announced a plan to use in-house models. An account is required,
    and there are limits on the free plan, but there’s currently no “expensive” plan:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Copilot**: Start for free, accessed at [https://copilot.microsoft.com](https://copilot.microsoft.com)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Copilot Pro**: Fewer limits and more capabilities, US$20/month'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DeepSeek
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'DeepSeek is a free, open-source LLM built with a focus on efficiency, and with
    a few different models available. While the base *R1* model only handles text,
    the *Janus* model is multimodal and can interpret and produce images. Note that
    the version of DeepSeek hosted in its native China censors some topics. Reportedly,
    the downloadable version of DeepSeek does not have these limitations. Here are
    the options at the time of writing:'
  prefs: []
  type: TYPE_NORMAL
- en: 'DeepSeek: Start for free, accessed at [https://deepseek.com](https://deepseek.com)
    (note that registration with an email address from a global email provider is
    required)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: API access and more advanced models require lower-level access
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While most well-known AI platforms start with an LLM and have built a variety
    of services into those chatbots, you don’t need to interact with a chatbot to
    make use of AI services. Some services are more focused.
  prefs: []
  type: TYPE_NORMAL
- en: Special-purpose hosted AI services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For some jobs, you may find it more reliable and predictable to visit a web-based
    service tailor-made for a specific task. Here are a few image, video, and audio
    generation services that we’ll be looking at later in the book:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Midjourney**: This provides high-quality image generation. While the quality
    is often higher than most other AI image generation providers, the costs are too.
    With no free trial, users will need to sign up for a paid plan. Though prices
    start at US$10/month, only the Pro (US$60/month) and Mega (US$120/month) plans
    allow you to keep your images private. It can be accessed at [Midjourney.com](http://Midjourney.com).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FLUX**: This is one of many image generators you may not have heard of, but
    worth paying attention to. From Black Forest Labs, this tool can extract items
    from existing photographs, zoom in and “enhance” like in procedural TV shows,
    change art style, and make many changes with high quality. It is currently 8c
    per image for the best model, but with an open-source version coming soon. It
    can be accessed at [https://bfl.ai](https://bfl.ai).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stability.ai**: The creators of Stable Diffusion allow you to download their
    open-source generative models for free but also offer online plans from US$9 to
    US$99/month. Though they’re best known for image generation, their latest models
    can also generate video, audio, and 3D models. It can be accessed at Stability.ai.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Canva**: The well-known online design service has branched into AI, integrating
    a chatbot that allows you to generate images, change images, and create new designs.
    While a starting point is undeniably useful for simple design tasks, I suspect
    most design professionals will need more creative control than Canva’s online
    design tools offer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Canva is free to start, but Canva Pro costs US$13/month which reduces limits
    on AI generation and grants access to more advanced tools. Note that to generate
    on-brand text and visual assets, you must use Canva Teams (at a cheaper cost per
    person for 3+ seats). Interestingly, if you sign up for Canva Enterprise (100+
    seats), you can be indemnified against intellectual property claims from AI generation
    ([https://www.canva.com/policies/ESA/](https://www.canva.com/policies/ESA/)).
    It can be accessed at [Canva.com](http://Canva.com).
  prefs: []
  type: TYPE_NORMAL
- en: '**Runway**: This video-focused AI company offers generative image and video
    services in a variety of plans ranging from US$0 to US$76/month. Content created
    with free plans is watermarked, though. For best results with the most advanced
    models, upload an image to use as the basis of video generation. (If you ask for
    a video in text form, it’ll generate an image first, then animate it.) Many video-related
    services are included. It can be accessed at [https://runwayml.com](https://runwayml.com).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gling**: This online service for video creators helps you start the editing
    process by automatically removing bad takes and cutting silences and filler words
    (um, ah) and then using text-based editing to cut your video. It is available
    from US$0 to US$20/month. It can be accessed at [https://gling.ai](https://gling.ai).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Envato**: Though Envato Elements is mostly known as a stock library, they’ve
    integrated image, video, music, and voice generation, as well as image editing,
    into their service. It is available from US$16.50/month, including Google’s Veo
    3 model for video generation. It can be accessed at [https://envato.com](https://envato.com).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Descript**: This cloud-based video editing platform has expanded its AI offerings
    recently. Automatic transcription enables text-based editing, and AI avatars can
    speak with AI-generated voices reading an AI-generated script with AI-generated
    b-roll images. It can be accessed at [https://descript.com](https://descript.com).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ElevenLabs**: This service converts text to speech using synthetic voices
    and voices cloned from specific real voices. The output can sound just like a
    real human, with emotion and a varied cadence, and it’s even possible to translate
    spoken audio to another language with the same voice as the original speaker.
    Audio cleanup tools are also included in the comprehensive offerings.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cloud-based tools aren’t the only way to attack specific tasks, though—existing
    desktop apps have adapted to the new AI paradigm in a variety of ways, with and
    without cloud assistance.
  prefs: []
  type: TYPE_NORMAL
- en: AI tools built into existing apps and platforms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Third-party cloud services face competition from the tools that many designers
    are already using. In many cases, these tools offer convenient integration with
    existing workflows and may offer more privacy controls. Here are a few you may
    find useful:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Adobe Firefly**: While Adobe has integrated many AI-based tools into their
    creative apps, collectively they’re known as Adobe Firefly, and are also available
    in a dedicated web app of the same name. Capabilities include vector generation
    in Illustrator, Generative Fill in Photoshop, and Generative Extend in Premiere
    Pro. While AI generation is included with Creative Cloud, the number of credits
    available can vary widely depending on the plan you’re on and your location. In
    general, using a feature such as Generative Fill costs 1 credit, and plans include
    between 25 and 4,000 credits per month. Some Premium features (including video
    generation) use 100–175 credits per second, so many users will face limits and
    may need to subscribe to an additional plan to use these features. Other non-generative
    features, such as automatic caption creation, will remain free. You can find Firefly
    in Adobe Creative Cloud apps and at [https://firefly.adobe.com](https://firefly.adobe.com).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Apple Intelligence in macOS and iOS**: These features are not the most advanced,
    but they’re free, and either run entirely on a device or in a private cloud. Image
    Playground lets you make low-resolution square images in a limited selection of
    styles, but several Utility AI and Automation AI tools can be very useful. For
    example, text in any image on iOS or macOS can simply be selected and copied as
    text. The Foundation Models framework built into iOS 26 and macOS 26 offers many
    more models to allow any developer to integrate generative dialogue, classification,
    summarization, tagging, and more.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Final Cut Pro**: Apple’s flagship video editing app includes ML features
    to isolate voice in audio, create captions, recognize objects in moving video,
    and create intermediate frames when slowing down video.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DaVinci Resolve**: Version 20 of this video editing and color grading application
    includes many AI tools that run on-device, without a subscription or further costs.
    Caption creation and voice isolation are just the start; Resolve can be trained
    on a voice sample and then create new audio in that voice. We’ll take a detailed
    look at these features later in the book.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Avid Media Composer**: This established video editing application has integrated
    PhraseFind and ScriptSync for some time, enabling editors to find shots more easily.
    In 2025, DeepEditor from Flawless.ai was added, allowing performances to be retimed
    and visibly spoken dialogue to be changed (even to another language), and for
    consent to these changes to be gathered from the actors involved. (A separate
    TrueSync product can work with footage independently.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Peakto**: This image management tool allows you to view and organize images
    and video across many different catalogs from many different apps. Utility AI
    now enables image classification, video transcription, and more.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running your own AI services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As well as AI services built into apps you’re already using, you can download
    new apps to implement AI services on your own hardware. For best speed on a PC,
    you’ll want to use a fast graphics card (GPU), likely from Nvidia; for best speed
    on a Mac, you’ll want a Mac with “Max” or “Ultra” in the name, as these are the
    models with the most advanced GPU and the most RAM.
  prefs: []
  type: TYPE_NORMAL
- en: Why would you want to run AI tasks locally? First, privacy, which may be mandatory
    when working with assets from some clients. Second, cost, because most of these
    services are available for free or as a one-off, outright purchase. Third, latency,
    because you’re relying on a local machine rather than “someone else’s computer”
    in the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a few ways to run these programs, some of which run like regular
    apps with graphical interfaces, and others that require you to be comfortable
    with a command line. As most creative professionals prefer graphical options,
    that’ll be the focus here. You don’t need to get your hands too dirty to play
    with local AI, but you’ll have more options for exploration if you can use a command
    line. A few key local options that aren’t part of standard graphic design, audio,
    or video apps include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stable Diffusion**: Available for free, to run locally, with many GUI options
    ([https://gist.github.com/AshtakaOOf/d4ee3cc4510dfa1385616eacfcd01652](https://gist.github.com/AshtakaOOf/d4ee3cc4510dfa1385616eacfcd01652)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MacWhisper**: Transcription and dictation with wide format support ([https://goodsnooze.gumroad.com/l/macwhisper](https://goodsnooze.gumroad.com/l/macwhisper)).
    Note that PC implementations of the open-source Whisper AI are also available.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Picture This**: Image generation that integrates with video editing applications
    ([https://apps.apple.com/au/app/picture-this/id6466822042?mt=12](https://apps.apple.com/au/app/picture-this/id6466822042?mt=12))'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Draw Things**: Free image generation for iOS, iPadOS, and macOS ([https://apps.apple.com/au/app/draw-things-offline-ai-art/id6444050820](https://apps.apple.com/au/app/draw-things-offline-ai-art/id6444050820)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LM Studio**: The easiest way to run local LLMs if you’re not a fan of the
    command line. On an Apple silicon Mac, LM Studio presents models that take advantage
    of Apple’s MLX frameworks for the best speed when processing ML algorithms on
    modern Apple hardware ([https://lmstudio.ai](https://lmstudio.ai)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ComfyUI**: A node-based tool to connect different AI models together, allowing
    you to take output from one process and send it to another. Though this isn’t
    a simple process, if you want maximum control over your own system, it’s probably
    the best option ([https://www.comfy.org](https://www.comfy.org)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Jumper**: Local AI-based transcription and clip analysis to enable searching
    across video and photo media, integrated with common video editing applications
    ([https://getjumper.io](https://getjumper.io)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Strada**: This AI tag generation, classification, and analysis tool started
    with a cloud-first focus but has shifted to a local cloud model. It promises smart
    content- and transcription-based analysis of video footage to make it easier to
    find the right video clip to suit your edit ([http://strada.tech](http://strada.tech)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we learned a little about where AI started, how these systems
    work today, what they’re good for, and where they fail. If you can discover how
    AI can help you get more done without compromising your creativity, you’ll be
    well placed to keep creating.
  prefs: []
  type: TYPE_NORMAL
- en: Different kinds of AI tools will give you many opportunities to make your work
    faster, even if you don’t want to (or cannot) use GenAI to produce client work.
    Utility AI will help you find and transform, while Automation AI will help you
    do your existing work more quickly. Not all AI is the same.
  prefs: []
  type: TYPE_NORMAL
- en: Though new services appear all the time, different kinds of AI tools will inevitably
    share strengths and limitations due to the way they’re run. For the latest, most
    capable models, you’ll probably want to pursue one or more subscriptions with
    an up-to-date cloud service provider. Almost all these services offer free trials,
    so start slow, add additional services if they prove valuable, and keep a close
    watch on progress across the field.
  prefs: []
  type: TYPE_NORMAL
- en: For the cheapest options with the best privacy, you’ll need to look for on-device
    models but also realize that you may not be running at the speeds or capabilities
    of the cutting-edge cloud solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Between these two extremes, you’ll find many apps with outright purchase and
    subscription options. It’s a competitive and quickly changing field.
  prefs: []
  type: TYPE_NORMAL
- en: However, AI tools do have some lingering ethical questions hanging over them.
    Were they made in an ethical way? Does using these tools expose you to legal issues?
    Before we fully engage with how to harness the power of AI, we need to address
    several questions regarding the ethics of AI use. For that, read on to [*Chapter
    2*](Chapter_2.xhtml#_idTextAnchor035).
  prefs: []
  type: TYPE_NORMAL
