- en: Anthony Brown transforms how aerospace and defense contractors win and execute
    government business through the strategic application of AI, data science, and
    advanced analytics. With 15+ years of building mission-critical solutions for
    the public sector, Anthony has consistently delivered innovations that drive measurable
    outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: Earlier in his career, Anthony served as Director of Data and AI at General
    Dynamics Information Technology, where he led enterprise-wide AI governance across
    Federal Civilian, Defense, Homeland Security, Health, and State sectors. By piloting
    five transformative generative AI use cases and chairing the company’s AI Steering
    Committee, he established the strategic framework that continues to shape how
    the organization leverages emerging technologies.
  prefs: []
  type: TYPE_NORMAL
- en: Anthony’s unique value comes from his combination of technical depth and practical
    government experience. At Tableau/Salesforce, he developed key relationships with
    federal system integrators like Lockheed Martin, SAIC, and Northrop Grumman, securing
    multi-million-dollar contracts through his consultative approach to solving agency
    challenges. This insider understanding of both the technology and procurement
    landscape allows him to bridge gaps that others can’t see.
  prefs: []
  type: TYPE_NORMAL
