  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once the upload is complete, click the **Review upload** button to confirm the
    video metadata and indexing settings before processing.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the checkbox to confirm compliance with Microsoft policies and click
    **Upload +** **index**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Wait a few minutes while Video Indexer processes and indexes the video.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.19 – Uploaded responsible_ai file](img/B31034_05_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.19 – Uploaded responsible_ai file
  prefs: []
  type: TYPE_NORMAL
- en: After the video is successfully uploaded and indexed, you can explore the rich
    set of insights generated by Azure AI Video Indexer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Reviewing video insights'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once the video is processed, follow these steps to explore the insights extracted
    by Azure Video Indexer:'
  prefs: []
  type: TYPE_NORMAL
- en: Once the video is processed, select it in the Video Indexer portal to view its
    insights.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Navigate to the **Timeline** tab to see the transcribed text of the audio narration.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **View** menu at the top right of the portal, enable **Transcript**,
    **OCR**, and **Speakers** to see all the extracted information:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Transcript**: Displays the audio narration converted into text'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OCR**: Extracts text shown within the video frames'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speakers**: Identifies the speakers appearing in the video (recognized by
    name or assigned a number, such as *Speaker #1*)'
  prefs:
  - PREF_IND
  - PREF_UL
