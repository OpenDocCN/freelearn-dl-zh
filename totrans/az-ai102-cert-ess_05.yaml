  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Run the script and specify the image path:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '![Figure 5.1 – Output of running python .\image-analysis.py .\images\building.jpg](img/B31034_05_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.1 – Output of running python .\image-analysis.py .\images\building.jpg
  prefs: []
  type: TYPE_NORMAL
- en: Running the script provides a caption, offering a high-level summary of the
    image contents.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Getting suggested tags for an image'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Identifying the relevant tags can often provide useful clues about an image’s
    contents:'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `AnalyzeImage` function, under the `#Get images tags` comment, review
    the code to get a list of suggested tags:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Save your changes and run the program for each image in the folder. You’ll
    see the image caption along with a list of suggested tags:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.2 – Output of list of suggested tags](img/B31034_05_002_new.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.2 – Output of list of suggested tags
  prefs: []
  type: TYPE_NORMAL
- en: The suggested tags provide additional context about an image, making it easier
    to classify and organize visual data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Detecting and locating objects in an image'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To detect and highlight objects in an image, follow these steps to configure
    and run the object detection process:.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `AnalyzeImage` function, under the `#Get objects in the image` comment,
    review the following code:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
