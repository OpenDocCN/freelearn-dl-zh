  type: TYPE_NORMAL
- en: Video Indexer
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: B'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which of the following best describes the purpose of multimodal embeddings in
    Azure AI Vision?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: They convert handwritten text into machine-readable characters for search and
    editing.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: They allow combining image and audio data into a single media stream for efficient
    processing.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: They enable both images and text queries to be mapped into a shared vector space
    for semantic search and similarity matching.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: They detect objects and classify them based on predefined categories such as
    animals or furniture.
  prefs:
