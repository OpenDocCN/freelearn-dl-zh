- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Exploring Azure AI Vision Solutions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter explores Azure AI Vision’s robust capabilities for analyzing both
    images and video. You’ll learn how to use prebuilt and custom models to perform
    tasks such as object detection, face recognition, text extraction, and video content
    indexing. We’ll cover how to extract insights from images, implement custom computer
    vision models, utilize the Face service, perform **Optical Character Recognition**
    (**OCR**), and analyze videos.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter begins with image analysis, where you’ll explore features such
    as object detection, face identification, and content moderation. After that,
    you’ll learn how to customize models to classify images or detect specific objects
    based on your requirements.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll then move on to the Face service, which includes detecting and recognizing
    human faces for scenarios such as identity verification and touchless access.
    After that, we’ll cover OCR, showing you how to extract text from various sources
    such as invoices, documents, and business cards using Azure’s deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: The final section focuses on video analysis using Azure AI Video Indexer, where
    you’ll implement advanced features such as scene detection, people tracking, and
    real-time movement analysis through Spatial Analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'By the end of this chapter, you will be able to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Analyze images using Azure AI Vision for object detection, face recognition,
    and content moderation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train and deploy custom models for image classification and object detection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use the Face service for face detection, verification, and identification
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Extract printed and handwritten text from images using OCR
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Analyze video content with Azure AI Video Indexer for transcription, object
    detection, and scene tracking
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This chapter is designed to be more hands-on, providing you with practical experience
    and use cases to solidify your understanding of these versatile services. Let’s
    get started and unlock the full potential of Azure’s computer vision and video
    analysis capabilities!
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing images
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Azure AI Vision Image Analysis service is a powerful tool designed to extract
    detailed visual insights from images, helping users automate visual data processing
    and make informed decisions. With capabilities ranging from detecting objects
    and identifying brands to recognizing human faces and analyzing content for adult
    or sensitive material, it offers comprehensive image analysis for diverse scenarios.
    The latest release, Image Analysis 4.0, which is generally available at the time
    of writing, includes enhanced features such as synchronous OCR and people detection,
    making it an even more robust solution for a wide range of applications.
  prefs: []
  type: TYPE_NORMAL
- en: Azure AI Vision provides flexibility for developers by supporting both client
    library SDKs and direct REST API calls, making it easy to integrate into different
    environments and workflows. Whether you aim to filter inappropriate content, highlight
    specific objects, or extract text from complex visual data, Azure AI Vision’s
    Image Analysis service offers a versatile approach to turning visual information
    into actionable insights. Let’s dive into how these advanced features can be leveraged
    to elevate your AI applications and streamline image-based processes with hands-on
    practices.
  prefs: []
  type: TYPE_NORMAL
- en: 'Important: The following note applies to all exercises in this chapter'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you haven’t yet cloned the repository or provisioned the Azure AI services,
    please refer to *Exercise 1: Getting started with Azure AI services* in [*Chapter
    2*](B31034_02.xhtml#_idTextAnchor033), specifically the *Cloning the GitHub repository*
    section, for detailed guidance. **Note**: Before starting the exercises, ensure
    your Azure AI endpoint and key are available. You’ll use them to authenticate
    service calls in the SDK and REST API examples.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 1: Analyzing images using Azure AI Vision'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exercise, you’ll use the Azure AI Vision service to analyze images for
    captions, tags, object detection, and more. Follow these steps to set up your
    environment, configure the SDK, and explore image analysis capabilities with Python.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Configuring the Azure AI Vision SDK'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Setting up the Azure AI Vision SDK and configuration is the first step in enabling
    image analysis capabilities in your Python environment:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the `01-analyze-images` folder and open the `Python` folder.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Install the necessary packages:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: AI_ENDPOINT=<your_endpoint>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: AI_KEY=<your_key>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Save your changes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 2: Viewing images for analysis'
  prefs:
