- en: '![Figure 5.3 – Result of object detected](img/B31034_05_003_new.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.3 – Result of object detected
  prefs: []
  type: TYPE_NORMAL
- en: After running the people, detecting program, detected objects are marked with
    bounding boxes, improving object recognition in your images.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 6: Detecting people in an image'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To detect people in an image using the Azure AI Vision service, follow these
    steps to extend your image analysis implementation:.
  prefs: []
  type: TYPE_NORMAL
- en: 'Extend the `AnalyzeImage` function to locate `# Get people in the image` to
    detect people:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Save and run the script (`python .\image-analysis.py .\images\street.jpg`) for
    each of the images. The following is an example of the `running` `street.jpg`
    image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.4 – People found in the image](img/B31034_05_004_new.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.4 – People found in the image
  prefs: []
  type: TYPE_NORMAL
- en: The script successfully identifies and marks people in the image, enabling further
    analysis of human presence.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 7: Removing background'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To remove the background from an image, follow these steps to configure and
    execute the background removal process using the Azure AI Vision API.
  prefs: []
  type: TYPE_NORMAL
- en: 'Locate the `BackgroundForeground` function, review the code, and ensure the
    API request is properly configured for background removal:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The generated image file contains the subject without its background, ready
    for further use or enhancement.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 5.5 – Remove background](img/B31034_05_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.5 – Remove background
  prefs: []
  type: TYPE_NORMAL
- en: Run the script using the `python .\image-analysis.py .\images\person.jpg` command
    with the mode set to `backgroundRemoval` to see the changes. A `background.png`
    file will be generated as the output if the script runs successfully.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: You can find the `backgoutnd.png` file in the `image-analysis` folder.
  prefs: []
  type: TYPE_NORMAL
- en: With this, we come to the end of this exercise. The next step is to review and
    explore the UI further. Experiment with different images and features, such as
    generating dense captions or additional object properties. You can also use the
    Azure documentation at [https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/)
    to explore more use cases and optimizations.
  prefs: []
  type: TYPE_NORMAL
- en: By following the steps from this exercise, you will be able to efficiently implement
    Azure AI Vision for image analysis, object detection, and text extraction using
    Python!
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive into classifying images by training a custom model with Azure AI
    Vision.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing model customization
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Custom models in Azure AI Vision allow users to train AI models to classify
    images or detect objects within them. Image classification involves analyzing
    an image to categorize it, and Azure AI Vision facilitates building custom vision
    models for this purpose. Object detection, another key computer vision task, requires
    identifying the location of specific object classes in an image. The process for
    creating an object detection project is similar to that of an image classification
    project, encompassing creation, labeling, and training. While object detection
    is introduced for context, the hands-on exercises in this section focus specifically
    on training custom models for image classification.
  prefs: []
  type: TYPE_NORMAL
- en: Custom model types overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Azure AI Vision offers three main types of custom models – **image classification**,
    **object detection**, and **product recognition**:'
  prefs: []
  type: TYPE_NORMAL
- en: Image classification assigns labels based on the entire content of an image,
    for example, categorizing fruit types such as orange, apple, or banana, as shown
    in *Figure 5**.6*. This model type supports both multi-class classification (one
    label per image) and multi-label classification (multiple labels per image).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 5.6 – Image classification](img/B31034_05_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.6 – Image classification
  prefs: []
  type: TYPE_NORMAL
- en: Object detection, on the other hand, identifies and locates multiple objects
    within an image, providing both the class label and bounding boxes for each detected
    object, as shown in the following figure. For example, it can detect one apple,
    one orange, and a banana, along with their positions, making it ideal for applications
    such as AI-powered checkout systems.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 5.7 – Object detection](img/B31034_05_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.7 – Object detection
  prefs: []
  type: TYPE_NORMAL
- en: Product recognition works similarly to object detection but is specifically
    optimized to identify and locate product labels and brand names within an image,
    offering enhanced accuracy for applications involving inventory management and
    retail.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 5.8 – Product recognition in a grocery store](img/B31034_05_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.8 – Product recognition in a grocery store
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’re familiar with the available model types, let’s explore how to
    customize them to meet our project requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a custom project
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To create a custom Vision project, start by provisioning an Azure AI services
    resource and setting up a new project. The first component required is the dataset,
    which consists of a collection of labeled images stored in Azure Blob Storage.
    After defining your dataset, train your custom model by specifying the model type,
    dataset, and training budget. Regularly monitor and evaluate the model’s performance,
    making adjustments as needed to optimize the results.
  prefs: []
  type: TYPE_NORMAL
- en: Each dataset must include a COCO file—a specific JSON format that provides label
    information, such as image metadata, annotations, and categories. COCO files are
    typically generated in an Azure Machine Learning data labeling project and contain
    essential details such as image properties (file location, width, height, and
    ID), annotations (defining objects and their bounding boxes), and categories (listing
    label classes and their IDs). These files can either be created during the data
    labeling process or migrated from previous custom Vision projects, ensuring compatibility
    and consistency across different training datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Labeling and training a custom model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before training a custom model, it’s essential to ensure that your dataset is
    properly labeled. High-quality labels directly impact the performance and accuracy
    of the model, especially for computer vision tasks like classification and object
    detection.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re classifying images—for example, different types of flowers—you’ll
    apply labels such as *Rose*, *Tulip*, or *Daisy* to your training images. For
    object detection, you’ll annotate not only the label but also the location of
    each object using bounding boxes.
  prefs: []
  type: TYPE_NORMAL
- en: Once labeling is complete, proceed with training by choosing a model type (e.g.,
    image classification or object detection), linking it to your dataset, and setting
    a training budget. Azure will then optimize the model using the provided data.
  prefs: []
  type: TYPE_NORMAL
- en: After training, it’s important to evaluate the model using a separate test dataset
    to validate its accuracy and ability to generalize to unseen images. Poor results
    may indicate the need to revisit your labels or add more diverse examples.
  prefs: []
  type: TYPE_NORMAL
- en: 'Azure Vision Studio streamlines this process, allowing you to:'
  prefs: []
  type: TYPE_NORMAL
- en: Upload labeled datasets stored in Azure Blob Storage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Import labeling metadata
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure and initiate training jobs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monitor training status and review model performance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With your labeled dataset prepared and accessible, you’re now ready to walk
    through the steps of building and training your custom model in the next exercise.
  prefs: []
  type: TYPE_NORMAL
- en: You can use either the Vision Studio web interface or REST APIs, depending on
    your development preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you understand the importance of labeling and how to prepare your dataset,
    let’s walk through the hands-on process in the next exercise.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 2: Creating a custom model training project'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exercise, you will build a custom image classification model using Azure
    AI Vision to classify images of different fruits.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Setting up a storage account to store the training images'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before training a custom model, you need to create a storage account to hold
    the dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a new storage account by navigating to [https://portal.azure.com/#create/Microsoft.StorageAccount](https://portal.azure.com/#create/Microsoft.StorageAccount).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Name the storage account using the `customclassifySUFFIX` format, replacing
    `SUFFIX` with your initials (e.g., `customclassifyJD`).
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Select the same region as the resource group you created earlier.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Choose **Azure Blob Storage** as the account kind, and set **Redundancy** to
    **Locally Redundant** **Storage (LRS)**.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Under the **Advanced** tab, in the **Security** section, enable **Allow blob**
    **anonymous access**.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a new container named **fruit** and set **Anonymous access level to Container
    (anonymous read access for containers and blobs**, as shown in the following figure.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.9 – Creating a storage account to upload the dataset](img/B31034_05_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.9 – Creating a storage account to upload the dataset
  prefs: []
  type: TYPE_NORMAL
- en: In the `training_labels.json` file from the `02-image-classification/training-images`
    folder, as shown in *Figure 5**.10*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.10 – Upload the image files to the container](img/B31034_05_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.10 – Upload the image files to the container
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Running the script'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To ensure your training dataset is correctly configured for use with Azure AI
    Vision, follow these steps to update the COCO file with your storage account details:.
  prefs: []
  type: TYPE_NORMAL
- en: Open the `/02-image-classification/replace.ps1` file and update the placeholder
    in the first line with the name of your storage account.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Run the PowerShell script (`replace.ps1`) in the integrated terminal to update
    the COCO file. The script updates the `training_labels.json` file by replacing
    all instances of the `<storageAccount>` placeholder with the actual storage account
    name created in the previous step, making it useful for dynamically updating configuration
    files during deployment or setup.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 3: Creating and training a custom model in the custom Vision portal'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this step, you will create a new dataset, link it to your storage account,
    and initiate model training in Vision Studio:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to Azure Vision Studio at [https://customvision.ai/](https://customvision.ai/)
    and log in.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To create your first project, select **New Project**. In the **Create New Project** dialog
    box, enter a name for the project. Choose the multi-service Azure AI resource
    that you created earlier in *Exercise 1* ([*Chapter 2*](B31034_02.xhtml#_idTextAnchor033)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Classification** as the project type, then choose **Multiclass (Single
    tag per image)** based on your needs. This setting can be changed later. Next,
    choose a domain optimized for your image type. Choose **General** [**A2**] for
    this exercise. Select **Create project**, as shown in the following figure.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.11 – Creating a new project](img/B31034_05_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.11 – Creating a new project
  prefs: []
  type: TYPE_NORMAL
- en: To upload and tag images, select **Add images**, then **Browse local files**,
    and choose your images. The tags you select will apply to the whole batch, so
    it’s helpful to upload images in groups by tag.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **My Tags** field, enter a tag name and press *Enter*. Click **Upload
    [number] files** to finish, as shown in the following figure.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.12 — Upload and tag images for training](img/B31034_05_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.12 — Upload and tag images for training
  prefs: []
  type: TYPE_NORMAL
- en: Once uploaded, click **Done**. To upload more images, repeat the preceding steps.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To start training, click the **Train** button. This uses all uploaded images
    to build a model based on their tags. Training takes a few minutes, and the progress
    is shown as in the following screenshot:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.13 – Train the classifier](img/B31034_05_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.13 – Train the classifier
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Testing your custom model'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After training, testing the model helps validate its accuracy and effectiveness
    in image classification:'
  prefs: []
