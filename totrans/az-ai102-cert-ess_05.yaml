  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Analyzing an image to generate captions and tags'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Using the Azure AI Vision SDK, you can generate captions and tags for images
