- en: Next, let’s explore Azure AI Video Indexer, a service that extracts insights
    from video, including face identification, text recognition, object labels, and
    scene segmentation.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing videos with Azure AI Video Indexer
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Video analysis in Azure AI Vision is a set of AI-powered tools that help extract
    meaningful insights from video content by analyzing both visual and audio components.
    It enables organizations to automatically process videos and derive information
    such as spoken words, detected objects, faces, and even emotions, transforming
    unstructured video data into structured, searchable, and actionable insights.
  prefs: []
  type: TYPE_NORMAL
- en: Key features of video analysis in Azure AI Vision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following features highlight how Azure AI Video Indexer can extract meaningful
    insights from video content through visual and audio analysis:.
  prefs: []
  type: TYPE_NORMAL
- en: '**Person detection**: Detects individuals in real time from video streams and
    provides bounding boxes with tracking IDs. This enables consistent tracking of
    individuals as they move through the camera’s field of view.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Line-crossing detection**: Triggers events when a person crosses a virtual
    line defined in the camera’s field. Useful for entrance/exit monitoring, directional
    flow tracking, or enforcing restricted zones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Region entrance and exit**: Detects when people enter or leave a defined
    polygonal region (e.g., a store aisle, waiting area, or safety zone). Ideal for
    occupancy monitoring and safety compliance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**People counting**: Counts the number of individuals present within a specific
    zone, helping monitor capacity and optimize space utilization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dwell time analysis**: Measures how long a person remains in a designated
    region, enabling insights into customer engagement or detecting potential loitering
    in sensitive areas.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Proximity detection**: Measures the distance between individuals in a frame
    and can trigger events if a certain threshold is violated—particularly useful
    for enforcing physical distancing in workplaces or public areas.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Real-time alerts**: Integrates with external systems via webhooks to trigger
    alerts or automated actions based on live events, such as someone entering a restricted
    area.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privacy-first design**: The Spatial Analysis feature processes video frames
    without storing personally identifiable data. Only metadata (e.g., bounding boxes
    and event triggers) is processed and shared, supporting GDPR compliance and privacy-sensitive
    scenarios.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common use cases for video analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s look at some use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Media and entertainment**: Automatically tag and organize video content,
    making it easier to search and manage large media libraries'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security and surveillance**: Monitor and analyze video feeds for security
    purposes, including detecting individuals or objects of interest'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Education and training**: Create searchable video content for educational
    purposes, enabling students to find specific segments or topics'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Marketing and customer insights**: Understand customer reactions and sentiments
    in marketing videos to refine future content strategies'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These features enable organizations to extract actionable insights from live
    video feeds using prebuilt AI models, without the need for custom vision training.
    The system is designed for edge-to-cloud scenarios and supports deployment on
    Azure Stack Edge or compatible hardware via a container.
  prefs: []
  type: TYPE_NORMAL
- en: Getting started with video analysis in Azure AI Vision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To use video analysis, start by uploading your video content to Azure AI Video
    Indexer. The service processes the video and generates insights, which can be
    accessed through the Azure portal or programmatically via an API. With video analysis,
    raw video data can be transformed into structured, searchable information, making
    it highly valuable for various industries.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you have a foundational understanding of how video analysis works in
    Azure AI Vision, let’s put these concepts into practice with the following exercise.
    You will learn how to upload a video, process it, and extract insights such as
    transcription, object detection, and sentiment analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 5: Analyzing video content using Azure AI Video Indexer (Python)'
  prefs:
