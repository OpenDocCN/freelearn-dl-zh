- en: Planning Your Presentation Content and Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this first part of the book, you’ll develop a solid understanding of how
    to plan your presentation content and design. We’ll be discussing questions that
    will help you plan your content before you open your PowerPoint application, and
    industry best practices to design better visuals. We’ll also learn how to leverage
    the various masters in PowerPoint. By the end of this part, you’ll have the knowledge
    needed to start planning your content and create or adapt your presentation template.
  prefs: []
  type: TYPE_NORMAL
