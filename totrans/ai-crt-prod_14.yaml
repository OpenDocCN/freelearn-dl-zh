- en: '10'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Automation AI with Images
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In the first part of the book, we looked at how Utility AI can help you to
    do your job more quickly: selecting, categorizing, or finding things. If you want
    more help than that, Automation AI can do parts of your job for you, and there
    are many image-related tasks to send its way. Automatic image culling, color correction,
    and retouching are all possible with the right apps.'
  prefs: []
  type: TYPE_NORMAL
- en: However, for the best results, I’d recommend using AI to automate only boring,
    tedious, or time-consuming tasks. No system is perfect, and if you let an automated
    system make imperfect decisions, you can deliver work that’s sub-standard. Some
    tasks need to be performed with care, and you can’t—or, at least, shouldn’t—just
    press a “make it smooth” button to give everyone fresh, plastic skin. There are
    many different ways an image can be treated—do you trust a computer to make that
    decision for you?
  prefs: []
  type: TYPE_NORMAL
- en: Of course, we all have to make a judgment about what tasks are worth our time
    and what tasks can be passed to someone else. In that sense, using an AI-powered
    app is a lot like outsourcing. Because many of these apps run on your own computer,
    you may not have to upload thousands of images to a cloud server, which saves
    time and avoids potential privacy concerns. If you’re already willing to outsource
    some image-related tasks to other humans, outsourcing these tasks to AI instead
    could help your workflow.
  prefs: []
  type: TYPE_NORMAL
- en: 'With a focus on images, this chapter will show you how AI can help with the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: Automatic image culling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automatic retouching
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automatic image processing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing scripts to speed up design tasks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s start by asking an AI to pick out the best images from a large pool.
  prefs: []
  type: TYPE_NORMAL
- en: Automatic image culling
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Professional photographers often shoot a lot of photos, and although some clients
    want to see them all, removing the bad photos is an important part of the job.
    If a photographer were to share all the original files from a photoshoot, they’d
    be judged harshly; there may be many more misses than hits, and simple adjustments
    can make a world of difference in an image’s final appearance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Culling is the first part of the process, in which the best photos are picked
    out. Obvious duds are removed, groups of shots taken on motor drive are whittled
    down, and eventually, the best shots are left behind. Different photographers
    will have different methods, but here’s how I cull manually in Adobe Lightroom
    Classic:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Glance quickly at each photo, decide whether it’s *good*, and if so, tag it
    as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If good, it gets tagged as 4 stars (good) or optionally 5 stars (great) by tapping
    that number key on the keyboard.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If a photo is better than one I just tagged as 4 or 5 stars, but very similar,
    I tag the old photo as 3 and the new one as 4 or 5.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat until done.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: View only 4+ star photos.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is obviously a simplified process, but it works in many apps and leaves
    you with a pool of *good* and/or *great* photos that you can process further.
    All these images will be at least color-corrected, while the 5-star images may
    get more personal attention.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.1 – A manual cull in Lightroom Classic doesn’t have to take long
    — can AI do better?](img/B34247_10_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.1 – A manual cull in Lightroom Classic doesn’t have to take long —
    can AI do better?
  prefs: []
  type: TYPE_NORMAL
- en: As a test, I timed how long it took me to process a batch of images from a recent
    shoot. This manual cull of 1,247 of my own images took about 22 minutes and left
    me with 268 *good* images. Not all of these will make the final cut, but I’m confident
    I haven’t missed anything—I looked at every shot I took, I know what happened,
    and I can present the shots in the best light. What can AI do?
  prefs: []
  type: TYPE_NORMAL
- en: Importantly, Lightroom itself will soon include an AI-powered assisted culling
    feature for portraits only. At the time of writing (October 2025), this feature
    has not launched, but as it’s likely to be public when you read this, be sure
    to check it out.
  prefs: []
  type: TYPE_NORMAL
- en: '**Excire Foto** ([https://excire.com/en/excire-foto/](https://excire.com/en/excire-foto/))
    is an option that can automatically analyze your images and group them in several
    useful ways—we looked at it in the Utility AI section of the book. The locally
    run app took just over a minute to cull my collection of 1,247 down to 656 with
    the default profile—pretty quick. This collects images based on similarity, by
    the person in the photo, and images taken in close succession (e.g., on a motor
    drive). It also recommended images for deletion, such as blurry shots or those
    with eyes closed.'
  prefs: []
  type: TYPE_NORMAL
- en: Analysis like this will be useful to some photographers, especially those who
    deal with large quantities of images. However, the danger with this, and with
    all other automatic culling features, is that a good photo may be rejected. In
    my testing, while blurry shots were certainly flagged for rejection, not all of
    the picks were spot on. Some blurry shots ended up being selected, and other shots
    that looked OK to me were rejected—possibly because they weren’t photos of people.
  prefs: []
  type: TYPE_NORMAL
- en: Other photos were rejected seemingly because they were too dark, but sometimes
    a photographer simply has to work in a dark environment and rescue their shots
    with extra processing; only a human has the context to make all the correct decisions.
    If the only shot of a particular subject is less than perfect, you may have to
    rescue it as best you can.
  prefs: []
  type: TYPE_NORMAL
- en: The good news is that this is OK—it’s an assistant, not a judge. There’s no
    need to automatically delete the images Excire suggests, and different culling
    profiles allow a decent amount of flexibility in how images are recognized and
    processed. You can create a new profile and choose a selection of characteristics
    you want to use as the basis for an automatic cull. If you choose photos that
    have already been analyzed, this will proceed in just a few seconds, so it’s easy
    to experiment with.
  prefs: []
  type: TYPE_NORMAL
- en: '**Aftershoot** ([https://aftershoot.com/](https://aftershoot.com/)) is another
    app that includes culling features, and overall, it did a similar job to Excire.
    Provided with the same images, it took just over six minutes to analyze them and
    present the rated images. My first pass used the **Customized AI Cull** settings,
    tagging 552 as **Selected** (5 stars) and 93 as **Highlights** (4 stars), but
    if that isn’t what you want, you can try again without a full re-analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.2 – Aftershoot’s Customized AI Cull tool gives you a few options](img/B34247_10_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.2 – Aftershoot’s Customized AI Cull tool gives you a few options
  prefs: []
  type: TYPE_NORMAL
- en: 'To re-cull, press **Quick Restart**, which takes just a few seconds. The **Automated
    AI Cull** option removes the more detailed controls, featuring only a simple slider
    to tell the app how many photos you want:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Standard** gives me 503 **Selected** and 84 **Highlights**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Few** gives 423 **Selected** and 70 **Highlights**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Extreme** option gives me 161 **Selected** and 430 **Maybe**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That last **Extreme** option is closer to my personal choices, but not close
    enough to save me time. In the **Selected** group, it chose photos I rejected
    and omitted photos I chose. The **Loupe** view provides some useful features,
    automatically grouping similar photos and letting you quickly switch between them,
    which is helpful when verifying that nothing important has been skipped.
  prefs: []
  type: TYPE_NORMAL
- en: '**Imagen** ([https://imagen-ai.com](https://imagen-ai.com)) takes a slightly
    different approach, as it runs in the cloud rather than on your local machine.
    While this service does have a desktop app and integrates with Lightroom Classic
    by default, it uploads all images to the cloud for culling, which can make the
    process take a little longer.'
  prefs: []
  type: TYPE_NORMAL
- en: My 1,247 original RAW images take 48 GB of space in their native format—RAW
    files aren’t small. Imagen compressed them with the Adobe DNG Converter before
    upload, and though I have an upload connection speed of 100 Mbps, it still took
    7.5 minutes to upload the images, and it was over 19 minutes before I could review
    its work.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.3 – Imagen lets you keep the best shots, or produce a specific
    number of images](img/B34247_10_3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.3 – Imagen lets you keep the best shots, or produce a specific number
    of images
  prefs: []
  type: TYPE_NORMAL
- en: The main focus of culling here is to identify the best photos within each group;
    it identifies **Keepers**, **Duplicates**, **Standalone**, and **Low-rated** images.
    Usefully, you can identify the best photo of each group or cull to an exact target
    number of images, but there’s no slider to let you be more or less fussy. With
    the default settings, it chose 336 **Keepers**, and while it did mostly OK, a
    couple of my favorite shots were somehow tagged as 1-star duds.
  prefs: []
  type: TYPE_NORMAL
- en: Because the photos are now online, moving between images isn’t as fast as it
    is in the local apps, and some information, such as an image’s filename, isn’t
    available in the main interface. You’ll need to set up an “AI Profile” before
    you begin a culling operation, defining a preferred look that Imagen will use
    to preprocess all your images. It’s not a final look, but it’s a lot closer to
    final than looking at the raw images and imagining what you’ll do with them.
  prefs: []
  type: TYPE_NORMAL
- en: '**Narrative** ([https://narrative.so](https://narrative.so)) offers similar
    culling features to both Excire Foto and Aftershoot. When you drop a folder full
    of photos into the app, it’ll quickly start recognizing faces in your photos,
    then mark which are in focus and any eyes that are closed. After about three minutes,
    the first pass was done, and a minute or so later, all the images had been flagged
    with an initial rating: 860 **potential picks**, 200 **unlikely picks**, and 187
    **undesirable picks**.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.4 – Narrative did a quick first pass, but it didn’t cut the pool
    down too much](img/B34247_10_4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.4 – Narrative did a quick first pass, but it didn’t cut the pool down
    too much
  prefs: []
  type: TYPE_NORMAL
- en: Related images were grouped, making it easier to choose between similar shots,
    and it’s also possible to filter based on how well a shot was focused. For a first-pass
    edit, this is useful, but I’d have preferred a deeper cut.
  prefs: []
  type: TYPE_NORMAL
- en: Working with imperfect results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Unfortunately, across all these apps, some good photos were listed as “undesirable”
    because the very best photos don’t always tick the right boxes in the eyes of
    an algorithm. Sometimes, you want the photo where someone’s eyes are closed, because
    they’re crying with tears of joy. Sometimes, an out-of-focus moment is still perfect.
    Sometimes, the only photo you have of a person smiling has issues, but you have
    to use it anyway.
  prefs: []
  type: TYPE_NORMAL
- en: Software also can’t know about the particular requirements for each photoshoot.
    For example, the photoshoot I used to test all these products featured panels
    of five people talking on a topic, sharing a microphone between them. I wanted
    to deliver at least one or two photos of each speaker holding the microphone and
    speaking, as that’s a photo they’ll each want to share. But an automated cull
    doesn’t understand that subtlety—how can it? Therefore, the trickiest culling
    tasks will probably involve some manual work, and that’s certainly possible.
  prefs: []
  type: TYPE_NORMAL
- en: If any AI-based culling solution has hidden a shot, you’ll have to take things
    into your own hands. After the first pass, I would recommend taking a very quick
    look through the collections of “worst” photos to make sure that nothing important
    has been lost. If you see anything worth saving, reclassify that shot as *good*
    or *great* and move on.
  prefs: []
  type: TYPE_NORMAL
- en: Whether these tools are useful to you or not depends on how many photos you
    need to process and how quickly that needs to happen. If you find it difficult
    to cull quickly, these tools might be extremely valuable, but if you’re already
    fast at this process, perhaps not so much. Professional photographers shooting
    several events each month have the most to gain here, though occasional photographers
    could still save time.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re considering adopting one of these solutions for your work, you’ll
    want to download all of them and test them out yourself. Culling is a personal
    process, and I don’t think there’s a clear winner in terms of culling performance.
    Each one is available as a free trial but be aware that if one of these apps makes
    `.xmp` sidecar files, the metadata (including photo ratings) will show up in another
    of these apps if you pass it the same images. For a clean test, be sure to pass
    a fresh copy of your test images and make sure it can export to a format you’re
    happy with.
  prefs: []
  type: TYPE_NORMAL
- en: Pricing is quite variable between these apps, and while Excire Foto is available
    as a one-time purchase, Aftershoot and Narrative require a subscription between
    US$10 and US$60 a month. Culling is available on the cheapest plans, but if you
    need to adjust images too, you may need to move up to a more expensive plan. Culling
    on Imagen costs US$18 per month or US$12 per month on an annual basis, but the
    next step, automated image adjustment, is on a per-image basis. (It’s also worth
    noting that **Evoto**, a solution for automated retouching discussed in the next
    section, will soon offer culling too.)
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, let’s look at another common task you may want to automate straight after
    culling: image processing.'
  prefs: []
  type: TYPE_NORMAL
- en: Automatic image processing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While this process means different things to different artists, most professional
    photographers will adjust exposure, sharpness, white balance, skin texture, and
    more before sending a final image to a client. A batch of images from an event
    might include basic exposure, white balance, and sharpness corrections, while
    the hero images from a wedding might include more extensive, focused adjustments
    made in a tool like Photoshop.
  prefs: []
  type: TYPE_NORMAL
- en: Many of the more basic adjustments can be automated to some degree, and indeed,
    most image-editing applications include some kind of automatic enhancement option—some
    of which make use of AI to make their decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Apple’s **Photos** app has an **Auto Enhance** button, **Luminar Neo** has several
    AI-powered adjustment tools, **ON1 Photo RAW** includes AI-powered raw processing,
    and **Pixelmator Pro** has an **ML Enhance** button. Even Photoshop’s **Auto Levels**
    has an **Enhance Brightness and Contrast** feature that uses machine learning
    to make its decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Many photographic features do make use of AI, but the magic largely happens
    behind the scenes, leading to a better version of an older algorithm. Here, we’ll
    look at more overt uses of AI that can help you do your job more quickly.
  prefs: []
  type: TYPE_NORMAL
- en: First up, we’ll focus on solutions that process images in bulk, turning a potentially
    time-consuming process into a quicker one. With all these solutions, you can tweak
    as you wish after the initial automatic pass, and there’s no need to live with
    the defaults if they don’t work on a particular image.
  prefs: []
  type: TYPE_NORMAL
- en: 'How does this work if you do it by hand? To perform the basic process manually
    in Lightroom, I’d filter to show only the selected images, and then do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Use the sliders to correct an image typical of each separate location.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Copy that correction.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Paste that correction to all other photos in that same location.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Tweak the exposure on each image as needed for consistent exposure.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If specific images need extra work, control lighting or perform retouching.
  prefs: []
  type: TYPE_NORMAL
- en: While I usually tackle each job on its own, some photographers would prefer
    to start from a pre-made preset instead. Making images look consistent can take
    some time, especially with photos taken within a space with variable lighting,
    but if you’re using Lightroom, the masks that select people will adapt automatically
    to each image when you paste a correction. This goes a long way to giving you
    a consistent look across many images, so… do you need anything else?
  prefs: []
  type: TYPE_NORMAL
- en: A good, modern AI-based image-processing system will be able to blend the best
    of the one-shot “enhance” tools with an understanding of their own preferred style
    and potentially perform more complex operations too. Automatic retouching is an
    option with some of these services, but you’ll want to find a balance between
    automation and preserving the character of each image. Not every client wants
    a skin-smoothing filter applied.
  prefs: []
  type: TYPE_NORMAL
- en: While Excire Foto focuses mostly on organization, the other culling apps discussed
    here can also perform automatic processing, if you want it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.5 – An AI profile can start from a simple preset, but uploading
    thousands of images is preferred](img/B34247_10_5.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.5 – An AI profile can start from a simple preset, but uploading thousands
    of images is preferred
  prefs: []
  type: TYPE_NORMAL
- en: Aftershoot, Imagen, and Narrative all offer to build a customized professional
    AI profile from a large collection of your own processed images. Aftershoot and
    Imagen are also happy to create a quick profile from a preset you provide and
    give you a quick quiz to confirm your exposure, temperature, and tint preferences.
    All three sites also offer a selection of predefined styles, including some free
    defaults and some styles from other photographers, available as an additional
    purchase.
  prefs: []
  type: TYPE_NORMAL
- en: Your profile, from any source, can now be used to process all your images. In
    some ways, this is just like choosing a custom **Look-Up Table** (**LUT**) in
    a video-editing application, although presets offer more flexibility than LUTs
    do. In my testing, the results weren’t bad, but they weren’t bespoke either. These
    apps do claim to improve their results over time, as you add more images to the
    training set, so if you want to make one of these solutions work for you, don’t
    give up too quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Imagen does offer some basic retouching (including teeth whitening), but with
    far fewer controls over skin smoothing than Aftershoot. While both include automated
    cropping, straightening, and subject masking, Aftershoot adds more extensive control
    over spots, wrinkles, flyaway hair, and overall skin smoothing. It also allows
    different effects to be applied to different kinds of faces (masculine, feminine,
    elderly, and child). These presets are perhaps a little too strong, and though
    the controls here aren’t extensive, they are tweakable.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.6 – Aftershoot’s retouching options](img/B34247_10_6.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.6 – Aftershoot’s retouching options
  prefs: []
  type: TYPE_NORMAL
- en: Pricing is where the services diverge wildly; some are all-inclusive, while
    others charge a per-image fee. Aftershoot and Narrative offer a monthly plan with
    a fixed price, with editing included on the more expensive plans. Imagen’s monthly
    plans only include culling, and there’s a per-image charge for editing. If you
    need to process a lot of images, this can cost significantly more.
  prefs: []
  type: TYPE_NORMAL
- en: As with culling, try out the free trials available, see which solutions work
    best for you, and remember that local, partly manual processing is also an option.
    There’s some clever AI in the selections in apps such as Lightroom and ON1 Photo
    RAW too, but presets will only take you so far.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s refocus on retouching, though. In Lightroom, this is a limited, largely
    manual process, making Aftershoot perhaps worth considering if you’d like to automate
    this process a little more. While Aftershoot’s options are a little deeper than
    the other tools discussed so far, there’s a lot more that can be done. If bulk
    retouching is especially important for your workflow, it may be worth considering
    some more specialized options.
  prefs: []
  type: TYPE_NORMAL
- en: Automatic image retouching
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Prompting is one way to deal with some retouching issues, and it’s probably
    the best approach when you have a specific problem that can’t be dealt with by
    hand. Still, prompting isn’t designed for batch processing, has resolution limitations,
    and can be unpredictable. More complex retouching tasks, including color matching,
    glare removal, tattoo removal, clothing smoothing, and background cleaning, are
    better dealt with using dedicated tools like **Evoto** and **Retouch4me**.
  prefs: []
  type: TYPE_NORMAL
- en: These tools use AI algorithms to perform not just exposure and color correction
    but many more subtle corrections that would have once required human attention.
    As the feature sets of many culling, sorting, and processing tools are often updated,
    check to see whether any tools you currently use have introduced any new features
    recently.
  prefs: []
  type: TYPE_NORMAL
- en: '**Evoto** includes a desktop app and provides a full suite of portrait-retouching
    tools, as well as background replacement, clothing adjustments, and color matching.
    If you’re doing a lot of portrait work, and especially if your tasks include adjusting
    makeup and body reshaping, this could be a good choice. Tethering support is also
    included, allowing you to retouch your images as you shoot them for instant client
    approval.'
  prefs: []
  type: TYPE_NORMAL
- en: While the options here are comprehensive (only a few are visible in the upcoming
    figures), sliders can’t always offer enough flexibility. Another danger is that
    you’ll be tempted to over-use the controls here, potentially leading to overprocessed,
    samey results. While I wouldn’t recommend just turning everything up to its maximum
    settings, restraint is up to you.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.7 – Here’s our earlier image in Evoto, with several portrait-retouching
    options and makeup applied](img/B34247_10_7.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.7 – Here’s our earlier image in Evoto, with several portrait-retouching
    options and makeup applied
  prefs: []
  type: TYPE_NORMAL
- en: While portrait-retouching apps are popular on mobile phones, these features
    are still rare in desktop workflows, despite their potential value to professionals.
    Many of the controls here give results that rival what a professional could produce
    in a tool such as Photoshop—except much more quickly. Of course, a full-featured
    image-processing tool like Photoshop is still the best place to make unusual,
    specific changes with full manual control, but not every job needs bespoke treatment.
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to stay within Photoshop and potentially retain full control,
    Retouch4me ([https://retouch4.me/products/retouch-plugins](https://retouch4.me/products/retouch-plugins))
    offers retouching tools through a panel in Photoshop, producing layered corrections
    that can be turned down or masked out selectively. If you’re using another image-editing
    tool, you can also use Retouch4me’s desktop app called **Arams** to access the
    same plugins, then download layered TIFF files for further adjustment.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.8 – Before and after: the results are a huge improvement, though
    not quite perfect](img/B34247_10_8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.8 – Before and after: the results are a huge improvement, though
    not quite perfect'
  prefs: []
  type: TYPE_NORMAL
- en: The pricing model here is flexible. Plugins can be purchased outright, with
    a perpetual license and free updates, or images can be processed online for a
    per-image cost. You can buy credits as a single purchase, or as a monthly subscription
    at a cheaper rate. If you do choose to process images online, Retouch4me has a
    third tool on offer, **Apex**, which can work as a plugin or standalone app.
  prefs: []
  type: TYPE_NORMAL
- en: Comparing the results between Evoto and Retouch4me, both did a good job, though
    individual preferences may guide your choice. While Evoto produces an overall
    smoother result more quickly, it’s easy to overdo the corrections with hyper-plastic
    results. For me, the layered results I can finesse after processing make Retouch4me
    the winner, and if you need just a couple of modules (**Heal** and **Dodge & Burn**,
    for example), you can buy those plugins outright and use them forever. The online
    options do allow you to use all retouching modules at once for the same one-credit-per-image
    cost, and purchasing all the modules outright isn’t cheap—so weigh up your options
    carefully.
  prefs: []
  type: TYPE_NORMAL
- en: While any of these tools can provide a serious workflow boost, you’ll still
    face an issue common to all outsourced work—you haven’t gained any skills. No
    tool is perfect, and no approach works every time; a retouching expert needs to
    know their tools well and know the best approach to tackle a particular task.
  prefs: []
  type: TYPE_NORMAL
- en: To enjoy a long career, you’ll need to learn how to deliver *consistently* good
    results, and no one tool does that on its own. Try some of today’s tools out yourself
    and see which ones, if any, work with your photo style and budget.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, what about the image-adjacent graphic design world? Is there anything
    AI can do to make that quicker or easier? Yes, but not directly.
  prefs: []
  type: TYPE_NORMAL
- en: Writing scripts to speed up design tasks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Obviously, the ease with which you can create AI images can make the overall
    design process easier, even if you replace these images after the mockup stage.
    But designs themselves? Generative image systems today are optimized toward pixel-based
    images, with only the occasional vector-based systems. In general, you’ll be creating
    an image of a layout, not the layout itself—and those systems aren’t very good.
    If you spend most of your time using Adobe InDesign, can AI help you with that
    process somehow?
  prefs: []
  type: TYPE_NORMAL
- en: While there are many ways to automate software, there’s no one system that works
    on every platform and across every app. Some apps do include built-in automation
    features, such as Photoshop, which offers recordable **actions** to help users
    repeat tedious tasks. This system has worked well for many years, but AI has the
    potential to make it better, quite soon.
  prefs: []
  type: TYPE_NORMAL
- en: In late 2025, Adobe previewed an upcoming release of Photoshop that’s set to
    include a prompt-based AI Assistant, though at the time of writing, it’s still
    in beta (and web only). When released, the Photoshop AI Assistant should be able
    to rename your layers and control many Photoshop features, but it’s not quite
    ready yet.
  prefs: []
  type: TYPE_NORMAL
- en: On the web, Firefly has launched **Creative Production** ([https://firefly.adobe.com/inspire/creative-production](https://firefly.adobe.com/inspire/creative-production)),
    which allows users to “process thousands of images with bulk actions,” though
    the list of preset workflows is currently quite small. I’m sure the feature set
    will grow, but I’m not sure if this will be able to process local files or just
    online ones.
  prefs: []
  type: TYPE_NORMAL
- en: Taking another approach, in [*Chapter 12*](Chapter_12.xhtml#_idTextAnchor190),
    we’ll look at upcoming techniques that might let third-party LLMs control your
    computer for you. Continuing the theme, that’s not ready yet either.
  prefs: []
  type: TYPE_NORMAL
- en: However, a lower-level option that works *today* is **scripting**.
  prefs: []
  type: TYPE_NORMAL
- en: On the Mac, there’s AppleScript, a scripting solution that can talk to many,
    but not all, third-party apps, and that includes many Adobe apps. Within each
    Adobe app, there are usually one or more scripting solutions, and in InDesign,
    you can use AppleScript on the Mac, VBScript on Windows, or JavaScript on either.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, since most designers are not also programmers, the pool of people
    who understand both InDesign and scripting well enough to produce advanced scripts
    is pretty small. Although I can both design and code, I’m not a great programmer,
    so I hadn’t set my sights too high—until AI came along.
  prefs: []
  type: TYPE_NORMAL
- en: One of the things that LLMs are good at is writing code. Both ChatGPT and Claude
    will actively integrate into more serious development environments or provide
    code that you can copy and paste into a simple text file. While I don’t expect
    that most readers of this book to be advanced coders, even a free ChatGPT account
    should be enough to help you get started.
  prefs: []
  type: TYPE_NORMAL
- en: What’s the goal? To write a free script to make a tedious job simple. This is
    essentially very simple *vibe coding*, and while this approach does not scale
    well to a serious app, it’s perfect for simple scripting.
  prefs: []
  type: TYPE_NORMAL
- en: Before we begin, a quick note. If scripting is too daunting, maybe you can use
    a tool to write scripts for you? **MATE** ([https://www.omata.io/mate](https://www.omata.io/mate))
    is an AI assistant for creatives that supports workflows in InDesign, Illustrator,
    and Figma. Right now, this tool is still experimental, so I can’t recommend it
    for production workflows, but keep an eye on its progress and try it yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Still, simple code is nothing to be afraid of. Let’s dive in!
  prefs: []
  type: TYPE_NORMAL
- en: Scripting in Adobe InDesign
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'InDesign includes several example scripts, and they’re a good place to get
    started:'
  prefs: []
  type: TYPE_NORMAL
- en: Open the **Scripts** panel by choosing **Window** > **Utilities** > **Scripts**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Try some example scripts by opening **Application** > **Samples** > **JavaScript**,
    then double-click on the examples to run them. Here are a few of the most useful
    ones:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**FindChangeByList** will remove multiple spaces after periods, multiple paragraph
    returns, and many other things too—it’s a great cleanup tool for messy text'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PlaceMultipagePDF** is invaluable if you need to place all the pages of a
    PDF onto separate pages within an InDesign document'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sort Paragraphs** is a great way to alphabetize a list'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Right-click the **User** folder and choose **Reveal in Finder** (Mac) or **Reveal
    in Explorer** (Windows).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To make your own InDesign scripts, I’d suggest trying one of two approaches:
    starting from scratch or starting from existing work.'
  prefs: []
  type: TYPE_NORMAL
- en: Starting an InDesign script from scratch
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, you can try simply explaining the problem to your LLM of choice (I’d
    recommend ChatGPT) and see what it produces. You’ll then download the script,
    place it into your `User` script folder, then find it in the **Scripts** panel
    and double-click it to run it in InDesign. See whether it works as claimed!
  prefs: []
  type: TYPE_NORMAL
- en: If it fails, InDesign will usually present an error, listing the line of code
    that had an issue—but the script might simply not do quite what you expected.
    Either way, tell the LLM what went wrong, telling it any errors that occur, or
    describing what didn’t work as expected. The LLM will revise its script, so copy,
    paste, and repeat the process until you succeed.
  prefs: []
  type: TYPE_NORMAL
- en: This can work, but it doesn’t always, no matter how confident the LLM may be.
    Sometimes you’ll be met with refusal, sometimes you’ll be given a script that
    does nothing, and at other times, if you’re on a free plan, you’ll hit the limits
    of what’s possible. This is where some coding know-how will come in handy—you
    *may* be able to fix the problem yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Adapting an existing InDesign script
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The second approach is to find a script—perhaps one written by a human—that
    does something similar to what you want. (Most public scripts are intended to
    be shared freely but do check the license before proceeding.) You can then upload
    this script to ChatGPT and ask it to change the script to do what you want. Vibe
    coding works best if you ask for one improvement at a time.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, when working on board games, I frequently had to export high-resolution
    print-ready PDFs as well as lower-resolution interactive PDFs for web use, and
    I had to perform these steps for several documents at once. I couldn’t find a
    script to export all these at once, so I found a script that did something similar,
    and provided it along with this request:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'ChatGPT was able to figure out how to do this and returned a script that exported
    all currently open documents at once. I then asked:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: …and it worked. I didn’t need to lift a finger or redo anything; ChatGPT just
    got it right. Now, every time I need to export all currently open files to two
    differently named PDFs, the experience is consistent and quick. I wouldn’t have
    been able to write this script on my own, and I’ve never seen this script anywhere
    online before.
  prefs: []
  type: TYPE_NORMAL
- en: Not every vibe coding script will proceed as smoothly as this one did; sometimes
    an LLM will get stuck on the wrong path, either referring to imaginary functions
    or approaching a task in entirely the wrong way. If a script request becomes an
    exercise in frustration, abandon the chat and start fresh.
  prefs: []
  type: TYPE_NORMAL
- en: Scripting in Adobe Illustrator
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The same approaches that worked in InDesign should also work in Illustrator.
    To get started, you’ll find scripts in two places *next to the Adobe Illustrator
    application*:'
  prefs: []
  type: TYPE_NORMAL
- en: In the `Presets` > `en_US` > `Scripts` folder, you’ll find the options shown
    in the **File** > **Scripts** menu
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the `Scripting` > `Sample Scripts` > `JavaScript` folder, you’ll find several
    examples that can be run from **File** > **Scripts** > **Other Script**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For something less practical, but more fun, I started an Illustrator script
    request like this with ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Note: While I did reference the famous artist Barbara Hepworth here, I wasn’t
    trying to “steal her style” as these patterns aren’t unique. When I was about
    10, I wrote my own computer programs in BASIC on an Apple II to make patterns
    like this before I discovered Barbara Hepworth had done the same thing with string
    in real life, and I’ve made many animated interactive versions since.'
  prefs: []
  type: TYPE_NORMAL
- en: The script that ChatGPT wrote, in a short time, was over 200 lines long. I copied
    it, opened TextEdit, selected **Plain Text**, pasted, and then saved it with a
    `.jsx` file extension. (It’s a good idea to use a text-editing program such as
    BBEdit, which displays line numbers even in its free mode, but any plain text
    editor is fine to get started.) Back in Illustrator, I created a new file, drew
    a circle, and ran the script with **File** > **Scripts** > **Other Script**. The
    script presented several dialog boxes for me to provide parameters for the effect,
    and I clicked **OK** through the defaults, to find… an error.
  prefs: []
  type: TYPE_NORMAL
- en: After telling ChatGPT the error, it was able to suggest a quick fix. I replaced
    the problematic line of code and ran the script again. After clicking through
    the default options once more, Illustrator successfully connected multiple lines
    on the circle.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.9 – Not like Barbara Hepworth’s work at all, but I’m impressed
    it worked](img/B34247_10_9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.9 – Not like Barbara Hepworth’s work at all, but I’m impressed it
    worked
  prefs: []
  type: TYPE_NORMAL
- en: 'While the output was not, in fact, anything like Barbara Hepworth’s sculptures,
    the script did manage to draw several new lines connecting opposing points on
    a circle. This wasn’t quite what I wanted, so I asked again:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'ChatGPT took a minute or so and came back with a script that did exactly what
    I wanted. I drew a quick S-shaped curve, ran the script, and was given this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.10 – This is a lot more like a Barbara Hepworth string sculpture](img/B34247_10_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.10 – This is a lot more like a Barbara Hepworth string sculpture
  prefs: []
  type: TYPE_NORMAL
- en: It’s pretty amazing that I can have an idea for an automated design process
    and have a working script of any standard, let alone success, within a couple
    of minutes, with just a couple of requests. If you’ve ever wanted to make geometric
    vector art but weren’t sure how to start, it’s never been easier.
  prefs: []
  type: TYPE_NORMAL
- en: '**But hang on — is that still art?**'
  prefs: []
  type: TYPE_NORMAL
- en: If an artist manually drew many lines connecting two points on another line,
    they could probably sell that as art. But if that same artist gave the task to
    an apprentice and sold it under their own name, is that fair? It’s certainly the
    kind of thing Andy Warhol did in *The Factory* ([https://en.wikipedia.org/wiki/The_Factory](https://en.wikipedia.org/wiki/The_Factory)).
  prefs: []
  type: TYPE_NORMAL
- en: Taking that to the next level, if I were to write a computer program to make
    this kind of art, which is exactly what I’ve done over many decades, is that art?
    It’s hard to sell intangibles, but my code-driven animations have been shown in
    public art installations, so let’s assume it does qualify as art.
  prefs: []
  type: TYPE_NORMAL
- en: AI automation is clearly taking this a step further, because I no longer need
    to know how code works to create a program—I can now just ask for it. While I’m
    sure that this makes the art produced even less legitimate in the eyes of many,
    seen from another perspective, it’s simply another level of abstraction between
    an artist and their vision. Abstraction is nothing new.
  prefs: []
  type: TYPE_NORMAL
- en: In early computers with graphics capabilities, you could place a pixel by hand,
    and then it became possible to draw a line ([https://en.wikipedia.org/wiki/Bresenham's_line_algorithm](https://en.wikipedia.org/wiki/Bresenham's_line_algorithm)).
    Eventually, anti-aliasing made those lines smoother, and though you could implement
    Bresenham’s line drawing algorithm today (as I did, back at university), there’s
    simply no need.
  prefs: []
  type: TYPE_NORMAL
- en: Today’s tech has abstracted away the details of implementing 2D and 3D graphics,
    game mechanics, windowing systems, text entry, writing files to storage devices,
    and everything else we expect. APIs and libraries mean we generally work at a
    much higher level now, and few people want to engage directly with the hardware.
    If you want to make a game, why re-invent the wheel when Unreal Engine, Unity,
    and Godot are available?
  prefs: []
  type: TYPE_NORMAL
- en: While some people will want to dig a little deeper, more of us will want to
    make more things more quickly, or make them of higher quality, because we no longer
    need to get stuck on implementation details. If more people are able to express
    themselves through digital art, that’s welcome.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, making art is only a tiny part of the power of scripting. Scripting
    can open up more efficient workflows across many apps, but each designer has a
    unique way of working and a unique set of favorite apps and will need to discover
    the most appropriate tasks to automate.
  prefs: []
  type: TYPE_NORMAL
- en: To get started, pay attention to how you work, trying to identify common tasks
    that are time-consuming, tedious, or error-prone. Saving to multiple formats and
    saving files with specific suffixes are easy wins, but Adobe apps aren’t the only
    candidates for automation. Finally, if you’re short on inspiration, find existing
    scripts for the apps you use, then think of ways those scripts could be changed.
  prefs: []
  type: TYPE_NORMAL
- en: Time to wrap this up.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Reading this, you may worry about the future of design and image processing,
    but we’re safe for a while. Not everything can be automated, and the interesting
    parts, the creative parts, and the interactions with other humans are still something
    that human designers are best at. Each image still needs manual attention to look
    its best, and in a wholly automated process, applying the same heavy settings
    to every image will produce poor results.
  prefs: []
  type: TYPE_NORMAL
- en: Working efficiently is important, but good design still takes time, and a client
    needs to realize that they’re paying for all the discarded ideas, false starts,
    and manual reprocessing that lead to the final work. As automation eliminates
    boring tasks, you can either produce more work in the same amount of time or produce
    better work by spending more time on the creative aspects in the same amount of
    time. It’s not always wise to optimize purely for quantity—choose well.
  prefs: []
  type: TYPE_NORMAL
- en: Next, it remains to be seen whether video production has the same potential
    for automation as some image production tasks do. Let’s take a deeper dive into
    moving images.
  prefs: []
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
