- en: '12'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: Bringing MCP Apps to Production
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将MCP应用投入生产
- en: Welcome to the final chapter of this book. Great that you’ve made it this far!
    You’ve learned how to build both servers and clients and might be wondering how
    you take that last step toward sharing what you’ve built with the world.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到本书的最后一章。很高兴你能走到这一步！你已经学会了如何构建服务器和客户端，也许你现在想知道如何迈出最后一步，将你所构建的内容与世界分享。
- en: That’s a great question, and this chapter will guide you through all the things
    you should consider to ensure that your MCP application is well-tested, reliable,
    secure, and performs well in a production environment. Let’s begin!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很好的问题，本章将指导你考虑所有应该考虑的事项，以确保你的MCP应用经过充分测试、可靠、安全，并在生产环境中表现良好。让我们开始吧！
- en: 'This chapter covers the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下主题：
- en: '**Architecture and design**: Here, we will go through modular design, integration
    patterns, and specific architectural impact due to AI'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构和设计**：在这里，我们将探讨模块化设计、集成模式和由于AI带来的特定架构影响'
- en: '**Packaging and distribution**: Here, we will discuss different packaging options,
    standalone, embedded, deployment channels, and semantic versioning'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**打包和分发**：在这里，我们将讨论不同的打包选项，包括独立、嵌入式、部署渠道和语义版本控制'
- en: '**Testing and deployment automation**: Here, we will look at different types
    of testing strategies, such as unit testing, integration testing, and AI testing,
    and ensure that those tests are used within a CI/CD pipeline to deploy with confidence'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试和部署自动化**：在这里，我们将探讨不同的测试策略，如单元测试、集成测试和AI测试，并确保这些测试在CI/CD管道中使用，以便有信心地部署'
- en: '**Operations and observability**: Here, we will talk about scaling, resiliency
    patterns, observability, governance, and future proofing'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运维和可观察性**：在这里，我们将讨论扩展、弹性模式、可观察性、治理和未来证明'
- en: Architecture and design
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 架构和设计
- en: 'When designing your MCP application, there are several architectural considerations
    to keep in mind. These include modular design, integration patterns, and the impact
    of AI on architecture. In this section, we’ll look at the following topics:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计你的MCP应用时，有几个架构考虑因素需要记住。这包括模块化设计、集成模式和AI对架构的影响。在本节中，我们将探讨以下主题：
- en: '**Integration patterns**: How does MCP fit into your existing architecture,
    and what patterns can you use to ensure seamless integration?'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成模式**：MCP如何融入你的现有架构，你可以使用哪些模式来确保无缝集成？'
- en: '**Documentation**: How do you document your architecture and design decisions
    to ensure clarity and maintainability?'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档**：你如何记录你的架构和设计决策，以确保清晰性和可维护性？'
- en: '**Architecture review**: What are the key aspects to consider when reviewing
    your architecture to ensure that it meets your requirements and is scalable, maintainable,
    and secure?'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构审查**：在审查你的架构以确保它满足你的要求、可扩展、可维护和安全的时，需要考虑哪些关键方面？'
- en: Now that we have an overview, let’s dive into each topic.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了概述，让我们深入探讨每个主题。
- en: Integration patterns
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成模式
- en: 'MCP comes with its own set of integration patterns to facilitate seamless communication
    between clients and servers. However, if you use a transport such as Streamable
    HTTP or SSE, this server is then hosted via a web app using HTTP and most likely
    organized like a RESTful API. That could mean you need to develop or use specific
    middleware for web API-to-MCP communication for the sake of logging, security,
    and more. Here’s how that could work. Note the middleware used in the web API.
    Also note how the web API is most likely a RESTful API, and the client and server
    use JSON-RPC, as dictated by the MCP protocol:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: MCP自带一套集成模式，以促进客户端和服务器之间的无缝通信。然而，如果你使用流式HTTP或SSE这样的传输方式，那么这个服务器将通过一个使用HTTP的Web应用托管，很可能组织成一个RESTful
    API。这可能意味着你需要开发或使用特定的中间件来处理Web API到MCP通信，以实现日志记录、安全等功能。以下是它可能的工作方式。注意Web API中使用的中间件。同时注意Web
    API很可能是RESTful API，客户端和服务器使用JSON-RPC，这是由MCP协议规定的：
- en: '![Figure 12.1 – Integration patterns flow](img/B34121_12_1.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图12.1 – 集成模式流程](img/B34121_12_1.png)'
- en: Figure 12.1 – Integration patterns flow
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1 – 集成模式流程
- en: In this sequence diagram, you can see how the different components interact
    with each other. The user makes a request to the web API, which then checks the
    request against its authentication middleware. If the request is allowed, the
    web API forwards the request data to the client. The client then communicates
    with the server using JSON-RPC messages.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个序列图中，你可以看到不同的组件是如何相互交互的。用户向 Web API 发出请求，然后 Web API 将请求与其身份验证中间件进行比对。如果请求被允许，Web
    API 将请求数据转发给客户端。然后客户端使用 JSON-RPC 消息与服务器通信。
- en: Documentation
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文档
- en: It’s important that we document our code well so we understand all the bigger
    parts and how they fit together. This will help both current and future developers
    to understand the system and make it easier to maintain and extend.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很好地记录代码是很重要的，这样我们才能理解所有更大的部分以及它们是如何相互配合的。这将帮助当前和未来的开发者理解系统，并使其更容易维护和扩展。
- en: 'Documentation is very important, both for developers and users. Well-documented
    code is easier to understand, maintain, and use. There are different aspects to
    consider when it comes to documentation:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 文档对于开发者和用户来说都非常重要。良好的文档使代码更容易理解、维护和使用。在考虑文档时，需要考虑以下方面：
- en: '**Document code and generate documentation**: All code should generally be
    well documented, which means we should aim to document all the operations on input
    and output. As developers, we know that out-of-date information is sometimes worse
    than no documentation, so we should strive to generate documentation from the
    code. What you’re looking for is to have your code generate documentation in an
    Open API format, formerly known as Swagger. For example, this piece of code has
    its routes documented in a way to make it easy for the used framework to generate
    documentation from it:'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记录代码并生成文档**：所有代码通常都应该有良好的文档，这意味着我们应该努力记录所有输入和输出的操作。作为开发者，我们知道过时的信息有时比没有文档更糟，因此我们应该努力从代码中生成文档。你想要的是让代码以
    Open API 格式（以前称为 Swagger）生成文档。例如，这段代码的路线以易于使用框架从中生成文档的方式进行了记录：'
- en: '[PRE0]'
  id: totrans-24
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: When the code is documented like so with `tags`, `summary`, and more, this will
    be used to generate Open API documentation automatically. Whatever framework and
    runtime you go with, make sure your code is easy to document and easy to generate
    documentation from.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当代码以 `tags`、`summary` 等方式记录时，这将用于自动生成 Open API 文档。无论你选择什么框架和运行时，都要确保你的代码易于记录且易于从代码中生成文档。
- en: '**Tests are also documentation**: Tests are sometimes the best way to understand
    how a feature is supposed to work. They provide concrete examples of expected
    behavior and can help clarify the intent behind complex logic. Ensure that you
    include comprehensive tests that cover various scenarios and edge cases.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试也是文档**：测试有时是了解一个功能应该如何工作的最佳方式。它们提供了预期行为的具体示例，并有助于阐明复杂逻辑背后的意图。确保包含全面的测试，涵盖各种场景和边缘情况。'
- en: '**Include context flow diagrams and edge case handling**: Mermaid diagrams
    are becoming a standard and are also supported by GitHub in terms of rendering
    various flowcharts, sequence diagrams, and more, so consider Mermaid or another
    way of creating these diagrams. Seeing how something works visually can save both
    developers and consumers of the code countless hours.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**包含上下文流程图和边缘情况处理**：Mermaid 图表正成为标准，并且 GitHub 也支持渲染各种流程图、序列图等，因此考虑使用 Mermaid
    或其他创建这些图表的方法。直观地看到某物的工作方式可以节省开发者和代码使用者数小时的时间。'
- en: Architecture review
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 架构审查
- en: 'Your architecture should consider the following:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你的架构应考虑以下方面：
- en: '**Modular design**: Make sure all functionality is separated into logical boundaries
    so that all areas are in their own modules. Different runtimes do this in different
    ways, but a good rule of thumb is that your code should be organized in a way
    that makes it easy to understand and maintain. Additionally, you should aim to
    keep related code together and minimize dependencies between modules. Finally,
    there should only be one reason to change, meaning each module should have a single
    responsibility. For example, you wouldn’t keep parsing logic in the same module
    as business logic.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模块化设计**：确保所有功能都分离到逻辑边界内，以便所有区域都在它们自己的模块中。不同的运行时以不同的方式做这件事，但一个好的经验法则是你的代码应该以易于理解和维护的方式组织。此外，你应该努力将相关的代码放在一起，并最小化模块之间的依赖。最后，只有一个理由需要改变，这意味着每个模块应该只有一个职责。例如，你不会将解析逻辑和业务逻辑放在同一个模块中。'
- en: '**Validation**: Implement robust validation mechanisms to ensure data integrity
    and correctness. This includes input validation, output validation, and contract
    validation between different components. There’s also a security aspect to this,
    as malicious actors may try to exploit vulnerabilities in your system. Python
    uses Pydantic for data validation and settings management with its MCP SDK Leverage
    these validation libraries for both input and output to address both correctness
    and security. Here’s an example of using input validation:'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证**：实施强大的验证机制以确保数据完整性和正确性。这包括输入验证、输出验证以及不同组件之间的合同验证。这也有一个安全方面，因为恶意行为者可能会尝试利用系统中的漏洞。Python使用Pydantic进行数据验证和设置管理，其MCP
    SDK利用这些验证库进行输入和输出，以解决正确性和安全问题。以下是一个使用输入验证的示例：'
- en: '[PRE1]'
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'In this example, you see that there’s a tool called `create_user`. It takes
    a `User` model as input, which will immediately help with validation and serialization.
    The following payload would lead to a new user being created:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，您可以看到有一个名为`create_user`的工具。它接受一个`User`模型作为输入，这将立即帮助进行验证和序列化。以下有效载荷将导致创建一个新用户：
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'On the other hand, the following payload would lead to a validation error as
    `id` is missing:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，以下有效载荷将导致验证错误，因为缺少`id`：
- en: '[PRE3]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This way, you can set up validation for all incoming data and ensure that only
    correct data enters your system. Of course, from a business and security standpoint,
    you can keep adding more validation rules as needed before you end up persisting
    the data.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，您可以设置对所有传入数据的验证，并确保只有正确数据进入您的系统。当然，从业务和安全的角度来看，在最终持久化数据之前，您可以根据需要添加更多验证规则。
- en: '**AI’s impact on architecture**: If you ship a client and a server, your client
    will most likely have access to an AI model, which means there are specific things
    to consider from an architectural standpoint. This includes how the client communicates
    with the AI model, how to manage context between the client and server, and how
    to handle any potential failures or timeouts:'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI对架构的影响**：如果您发布客户端和服务器，客户端很可能可以访问AI模型，这意味着从架构角度来看需要考虑一些特定的事情。这包括客户端如何与AI模型通信，如何管理客户端和服务器之间的上下文，以及如何处理任何潜在的故障或超时：'
- en: '**Decoupled architecture**: Ensure you decouple content management, model invocation,
    and the UI.'
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解耦架构**：确保您解耦内容管理、模型调用和UI。'
- en: '**Latency and reliability, and impact on UI**: Also consider the implications
    of latency and reliability when designing interactions with the AI model. This
    means, for example, if the AI model takes time to return a response, ensure that
    the UI remains responsive and provides feedback to the user. If the AI stops responding
    due to failure or rate limiting, it needs to be handled gracefully. Also, ensure
    you have fallback mechanisms such as retry logic and circuit breakers. We’ll talk
    more about this later in the chapter.'
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟和可靠性，以及它们对UI的影响**：在设计与AI模型交互时，也要考虑延迟和可靠性的影响。这意味着，例如，如果AI模型需要时间来返回响应，确保UI保持响应性并向用户提供反馈。如果AI因故障或速率限制而停止响应，需要优雅地处理这种情况。此外，确保您有回退机制，例如重试逻辑和断路器。我们将在本章后面更详细地讨论这一点。'
- en: '**Token budgeting**: Not only is the token budget something to consider as
    a running cost for the AI model, but it’s also important from an architectural
    standpoint, as we will need to implement caching strategies and other mechanisms
    to optimize token usage.'
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**令牌预算**：令牌预算不仅是AI模型的运行成本需要考虑的因素，从架构角度来看也非常重要，因为我们需要实施缓存策略和其他机制来优化令牌使用。'
- en: '**Security**: Implement security best practices to protect your application
    and its data. This includes securing APIs, managing user authentication and authorization,
    and ensuring data privacy and compliance with regulations. Consider how you can
    adopt *least privilege* to minimize access rights for users and services. That
    means ensuring that users and services only have access to the resources they
    absolutely need. A consequence of this is that you may need to implement more
    granular access controls and continuously monitor for any unauthorized access
    attempts.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全**：实施最佳安全实践以保护您的应用程序及其数据。这包括保护API、管理用户身份验证和授权，并确保数据隐私以及符合法规。考虑您如何采用*最小权限*来最小化用户和服务器的访问权限。这意味着确保用户和服务只访问他们绝对需要的资源。这的一个后果是，您可能需要实施更细粒度的访问控制，并持续监控任何未经授权的访问尝试。'
- en: Packaging and distribution
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 打包和分发
- en: Before you even type a single line of code, you need to consider what you’re
    building. With MCP, you have different options on how to package and distribute
    your application.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在你甚至输入第一行代码之前，你需要考虑你正在构建的内容。使用MCP，你有不同的选项来打包和分发你的应用程序。
- en: Packaging options
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 打包选项
- en: Let’s look at some packaging options.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些打包选项。
- en: '**Standalone server**: This is designed for public access or for private use.
    Regardless of private or public access, you need to think about authentication,
    authorization, and data privacy. But for private distribution within a company
    or organization, you need to think about discoverability, how internal teams will
    find and use the service, and also compliance with internal policies.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**独立服务器**：这是为公共访问或私人使用设计的。无论访问是私人的还是公共的，你都需要考虑身份验证、授权和数据隐私。但对于公司或组织内部的私人分发，你需要考虑可发现性，内部团队将如何找到并使用这项服务，以及是否符合内部政策。'
- en: '**Embedded client/server**: Such a system probably consists of a client and
    a server component, and the client most likely ships with AI capabilities, so
    make sure you consider the implications of that, such as data privacy and security
    and responsible AI use, and any regulatory requirements that may apply.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入式客户端/服务器**：这样的系统可能由客户端和服务器组件组成，客户端很可能带有AI功能，因此请确保你考虑了这一点的影响，例如数据隐私和安全以及负责任的AI使用，以及可能适用的任何监管要求。'
- en: Standalone server
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 独立服务器
- en: 'Let’s say your goal is to build an MCP server only; that means you most likely
    focus on building an API that wasn’t there before you wrap a pre-existing API.
    With this being MCP, you need to decide where this server is meant to run. Here
    are some considerations:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你的目标是仅构建一个MCP服务器；这意味着你很可能会专注于构建一个在你包装现有API之前不存在的API。由于这是MCP，你需要决定这个服务器应该在何处运行。以下是一些考虑因素：
- en: '**Local machine**: In this case, the server needs to use the STDIO transport.
    Also, because it runs on a user’s machine, from a security aspect, how can you
    ensure it’s sandboxed and doesn’t have access to resources it shouldn’t? In fact,
    should you even allow it to access the network? That’s up to you, but you should
    consider these aspects. See this filesystem MCP server, where the server comes
    with configuration that both restricts access, which directories it has access
    to, and it also ships instructions on how to run it in a container environment
    to ensure the MCP server has as little access as possible ([https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem)).'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本地机器**：在这种情况下，服务器需要使用STDIO传输。此外，由于它运行在用户的机器上，从安全的角度来看，你如何确保它是沙盒化的并且无法访问它不应访问的资源？实际上，你是否应该允许它访问网络？这取决于你，但你应该考虑这些方面。参见这个文件系统MCP服务器，其中服务器附带配置，既限制了访问权限，指定了它有权访问的目录，还提供了如何在容器环境中运行它的说明，以确保MCP服务器尽可能少地访问（[https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem)）。'
- en: '**Remotely via a URL**: If your server is accessed remotely, you might not
    need to be as much concerned about sandboxing, but you do need to think about
    authentication and authorization, and every aspect of securing the API endpoint.
    For authentication/authorization, consider using OAuth2 or API keys, and always
    validate incoming requests. Additionally, consider **role-based access control**
    (**RBAC**) to ensure that users don’t have more access to various server features
    than they need. That is, consider whether you need administrator users, normal
    users, or guest access, and what resources and what type of permission levels
    everything should have.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过URL远程访问**：如果你的服务器是远程访问的，你可能不需要过多关注沙盒化，但你确实需要考虑身份验证和授权，以及确保API端点安全的各个方面。对于身份验证/授权，考虑使用OAuth2或API密钥，并始终验证传入的请求。此外，考虑**基于角色的访问控制**（**RBAC**）以确保用户不会获得比他们需要的更多对各种服务器功能的访问权限。也就是说，考虑你是否需要管理员用户、普通用户或访客访问，以及所有资源应该具有什么类型的权限级别。'
- en: In both of these cases, you’re most likely storing the source code in something
    like GitHub or a similar version-controlled system.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，你很可能会将源代码存储在GitHub或类似的版本控制系统中的某个地方。
- en: Embedded client/server
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 嵌入式客户端/服务器
- en: Integrating MCP into your existing architecture requires careful planning. From
    a distribution standpoint, your MCP implementation will most likely deploy in
    the same motion as your existing services and apps it’s integrating with. From
    a code organizational perspective, you can still create them as separate services
    callable as APIs or a microservices architecture; the choice is yours. What you
    do need to realize, though, is that shipping an MCP integration means you ship
    more than a server; you need to ship an MCP client as well. The client will be
    responsible for communicating with the MCP server, handling requests, and managing
    context.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 将MCP集成到现有的架构中需要仔细规划。从分发角度来看，您的MCP实现可能会与您现有的服务和应用程序以相同的方式部署。从代码组织角度来看，您仍然可以将其创建为可调用的API或微服务架构的独立服务；选择权在您手中。但您需要意识到的是，交付MCP集成意味着您交付的不仅仅是服务器；您还需要交付一个MCP客户端。客户端将负责与MCP服务器通信、处理请求和管理上下文。
- en: Distribution channels
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分发渠道
- en: 'When it comes to distribution channels, you have a few options:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到分发渠道时，您有几个选择：
- en: '**Package the server as a Docker container**: This is a great option if you
    want to ensure that the server runs in a consistent environment, regardless of
    where it’s deployed. You can push the Docker image to a container registry such
    as Docker Hub or GitHub Container Registry, and users can pull and run the container
    easily. With this option, you should specify how to configure the container and
    any environment variables that need to be set, as in this example:'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将服务器打包为Docker容器**：如果您希望确保服务器在部署到任何位置时都能在一致的环境中运行，这是一个很好的选择。您可以将Docker镜像推送到容器注册库，如Docker
    Hub或GitHub Container Registry，用户可以轻松地拉取并运行容器。使用此选项时，您应指定如何配置容器以及需要设置的任何环境变量，如下例所示：'
- en: '[PRE4]'
  id: totrans-59
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The preceding example is from the example filesystem MCP server ([https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem)).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 上述示例来自示例文件系统MCP服务器（[https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem)）。
- en: '**Distribute via a package manager**: If your server is built with Node.js
    or Python, you can package it as an `npm` module or a PyPI package, respectively.
    This allows users to easily install and manage your server as a dependency in
    their own projects. The corresponding package manager for .NET would be NuGet,
    and for Java, it would be Maven or Gradle. Different package managers have different
    rules for what’s needed to package and distribute your code, but it usually involves
    the creation of a README file, a license, and compressing the code into a bundle.
    It’s a great way for users of your MCP server to find and use what you’ve built.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通过包管理器分发**：如果您的服务器是用Node.js或Python构建的，您可以分别将其打包为`npm`模块或PyPI包。这使用户能够轻松地将您的服务器作为依赖项安装和管理在自己的项目中。对于.NET，相应的包管理器将是NuGet，对于Java，将是Maven或Gradle。不同的包管理器对打包和分发您的代码有不同的规则，但通常涉及创建README文件、许可证以及将代码压缩成捆绑包。这对于您的MCP服务器用户查找和使用您所构建的内容来说是一个很好的方式。'
- en: '**Repository distribution**: You can also distribute your server by providing
    access to the source code repository directly. This allows users to clone the
    repository and build the server themselves, giving them more control over the
    build process and dependencies. Make sure you provide instructions on how to run
    it and configure it. This configuration instruction from Playwright’s MCP server
    ([https://github.com/RBC/microsoft-playwright-mcp](https://github.com/RBC/microsoft-playwright-mcp))
    is a good example showing how to start using it from a host such as VS Code or
    Claude Code:'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仓库分发**：您还可以通过直接提供源代码仓库的访问权限来分发您的服务器。这使用户能够克隆仓库并自行构建服务器，从而让他们对构建过程和依赖项有更多的控制。请确保您提供了如何运行和配置它的说明。Playwright的MCP服务器（[https://github.com/RBC/microsoft-playwright-mcp](https://github.com/RBC/microsoft-playwright-mcp)）的此配置指令是一个很好的例子，展示了如何从VS
    Code或Claude Code等宿主开始使用它：'
- en: '[PRE5]'
  id: totrans-63
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In this instruction, you see how to start the server using `npx` and how to
    provide arguments via `args`.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在本指令中，您可以看到如何使用`npx`启动服务器以及如何通过`args`提供参数。
- en: Adopting semantic versioning
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 采用语义版本控制
- en: Semantic versioning is another thing we should adopt for our code. This is because
    it makes it easier for both you and the consumer of your code to understand the
    nature of changes in each release.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 语义版本控制是我们应该采用的另一个代码规范。这是因为它使您和您的代码消费者更容易理解每个版本中变化的性质。
- en: 'It works with the following versions:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 它支持以下版本：
- en: A major version when you make incompatible API changes
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你进行不兼容的API更改时，这是一个主要版本
- en: A minor version when you add functionality in a backward-compatible manner
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你以向后兼容的方式添加功能时，这是一个次版本
- en: A patch version when you make backward-compatible bug fixes
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你进行向后兼容的错误修复时，这是一个补丁版本
- en: How you encode this in your software is to version your software; for example,
    in version 1.3.0, 1 is the major version, 3 is the minor version, and 0 is the
    patch version. If you only fix the software by applying a patch, then you should
    increment it from 1.3.0 to 1.3.1\. Adding a new feature should be seen as a minor,
    so you would increment it from 1.3.0 to 1.4.0\. A lot of changes, including changes
    that make the code break, are seen as a major change, and the version should therefore
    increase from 1.3.0 to 2.0.0.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何在软件中编码这取决于你对软件进行版本控制；例如，在版本1.3.0中，1是主版本，3是次版本，0是修订版本。如果你只通过应用补丁来修复软件，那么你应该将其从1.3.0增加到1.3.1。添加新功能应被视为次版本，因此你会将其从1.3.0增加到1.4.0。许多更改，包括导致代码损坏的更改，被视为主要更改，因此版本应从1.3.0增加到2.0.0。
- en: By encoding it this way, you create a clear and predictable versioning scheme
    that communicates the nature of changes to users and developers alike. Developer
    teams can therefore choose whether to stay on 1.3.x (in which case, they only
    update the software due to bug fixes and patch changes), or if they want new features
    but to prioritize stability, they would instead be okay with any version matching
    1.x.x, which would allow them to receive new features while still being on a stable
    base that doesn’t risk breaking changes.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种方式编码，你创建了一个清晰且可预测的版本控制方案，向用户和开发者 alike 传达了更改的性质。因此，开发团队可以选择是否停留在1.3.x（在这种情况下，他们只更新软件以修复错误和补丁更改），或者如果他们想要新功能但优先考虑稳定性，他们可以接受任何匹配1.x.x的版本，这将允许他们接收新功能，同时仍然处于一个稳定的基座上，不会带来破坏性更改的风险。
- en: Testing and deployment automation
  id: totrans-73
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试和部署自动化
- en: Testing is a crucial part of software development, and it’s especially important
    when working with AI models. Automated tests help ensure that your code behaves
    as expected and can catch issues early in the development process. Additionally,
    deploying your application should be automated to ensure consistency and reliability.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 测试是软件开发的关键部分，尤其是在与AI模型合作时尤为重要。自动测试有助于确保你的代码按预期运行，并能及早发现开发过程中的问题。此外，部署你的应用程序也应自动化，以确保一致性和可靠性。
- en: Testing strategy
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试策略
- en: 'We’ve mentioned testing already as a form of documentation. It’s also a vital
    part to ensure the code behaves as expected. Make sure that the tests you write
    are comprehensive and cover various scenarios. Some tests you might consider include
    the following:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经将测试作为一种文档形式提出来了。它也是确保代码按预期行为的关键部分。确保你编写的测试是全面的，并覆盖各种场景。你可能需要考虑以下测试：
- en: '**Unit tests**: These are good for ensuring that individual components work
    as intended. In the context of MCP, consider breaking out parsing logic into separate
    modules to facilitate easier testing.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单元测试**：这些测试有助于确保单个组件按预期工作。在MCP的上下文中，考虑将解析逻辑拆分为单独的模块，以方便更容易地进行测试。'
- en: '**Integration tests**: These validate the interaction between different components
    and ensure that they work together as expected. For MCP, if your MCP integration
    is part of a web application, it could be a good idea to set up end-to-end tests
    that simulate user interactions with the UI. Such a test would then call a web
    endpoint, which calls a client, and said client would then call an MCP server
    feature that processes the request and returns a response.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成测试**：这些测试验证了不同组件之间的交互，并确保它们按预期协同工作。对于MCP，如果你的MCP集成是Web应用程序的一部分，那么设置端到端测试模拟用户与UI的交互可能是一个好主意。这样的测试将调用一个Web端点，该端点调用客户端，然后该客户端将调用MCP服务器功能来处理请求并返回响应。'
- en: '**AI tests**: As AI models can behave unpredictably, it’s crucial to have tests
    that specifically validate their outputs. This includes testing for various input
    scenarios and edge cases, and ensuring that the model’s responses are within acceptable
    parameters. Consider using techniques such as adversarial testing to probe the
    model’s weaknesses. Adversarial testing involves creating inputs that are specifically
    designed to trick the model into making mistakes. It’s also a good idea to have
    a set of prompts to test against, where the system should work well or should
    invoke a tool or some other functionality.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI测试**：由于AI模型可能表现出不可预测的行为，因此拥有专门验证其输出的测试至关重要。这包括测试各种输入场景和边缘情况，并确保模型的响应在可接受的参数范围内。考虑使用如对抗测试等技术来探测模型的弱点。对抗测试涉及创建旨在欺骗模型犯错的特定输入。同时，拥有一系列用于测试的提示也很不错，在这些提示下，系统应该运行良好或触发工具或其他功能。'
- en: Generally, with tests, focus on various aspects such as performance, security,
    and usability.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，在测试中，关注各种方面，如性能、安全性和可用性。
- en: Deployment automation
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 部署自动化
- en: Building an app, securing it, architecting well, and logging… all that is good,
    but without a robust process for deployment, none of that matters. So what’s **robust**
    then? Robust in the year 2025 means that we can deploy something at the click
    of a button, many times a day, and that we do so with a number of guardrails in
    place. **Guardrails** are steps where we ensure that tests run and pass, policies
    are followed, and we’re keeping within certain metrics, for example, we don’t
    make the code slower, and so on.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 构建应用、保护它、良好地架构和记录……这些都是好的，但没有一个稳健的部署流程，这一切都没有意义。那么，什么是**稳健的**呢？2025年的稳健意味着我们可以点击一下按钮就部署某些东西，一天可以多次这样做，并且我们在部署时设置了多个安全措施。**安全措施**是我们确保测试运行并通过、遵循政策，并保持在某些指标内的步骤，例如，我们不使代码变慢，等等。
- en: 'There are many choices for how to deploy, such as GitHub Actions or Jenkins.
    They have one thing in common, though: to deploy, you need to define a pipeline
    with steps in it and make sure the final step leads to an artifact that either
    can be deployed or you end up with a new deployment in production.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 部署的方式有很多，例如GitHub Actions或Jenkins。尽管如此，它们有一个共同点：要部署，你需要定义一个包含步骤的管道，并确保最终步骤导致一个可以部署的工件，或者你最终在生产中获得一个新的部署。
- en: In addition to being able to deploy, we need to ensure that the deployment process
    is reliable and can be repeated consistently. Also, mistakes happen, so we need
    to be able to roll back changes if something goes wrong.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 除了能够部署之外，我们还需要确保部署过程是可靠的并且可以一致地重复。此外，错误是会发生的，因此我们需要能够在出现问题的情况下回滚更改。
- en: What does all this mean for our code? Well, it usually results in a `.yml` file
    being created to represent the pipeline mentioned previously.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我们代码意味着什么？嗯，通常会导致创建一个`.yml`文件来表示之前提到的管道。
- en: Then, you might need a different configuration or a different environment, so
    that’s also something to keep in mind.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可能需要一个不同的配置或不同的环境，这也是需要考虑的。
- en: Is this different for MCP compared to normal software? Well, the difference
    lies in realizing that you may ship AI, and for that reason, you might need a
    separate deployment pipeline for your AI, looking at performance on models, context
    management, and more.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 对于MCP与普通软件相比，情况是否不同？嗯，区别在于意识到你可能需要发布AI，因此你可能需要一个独立的AI部署管道，考虑模型性能、上下文管理等方面。
- en: Operations and observability
  id: totrans-88
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 运营和可观察性
- en: 'Once your application is in production, there’s a set of problems we need to
    address:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的应用程序投入生产，我们需要解决一系列问题：
- en: '**Observability**: Do you know how your app is doing? Is it under load, is
    it slow, is it failing, and is it secure?'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可观察性**：你知道你的应用表现如何吗？它是否在负载下运行，是否运行缓慢，是否失败，以及是否安全？'
- en: '**Scalability and resilience**: Can your app handle traffic spikes? Can it
    scale up and down, and is it resilient to failures?'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性和弹性**：你的应用能否处理流量峰值？它能否进行扩展和缩减，并且对故障具有弹性？'
- en: '**Monitoring and feedback**: Do you know when something goes wrong? Can you
    alert the right people, and do you have a feedback loop to improve the app over
    time?'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控和反馈**：你知道何时出现问题吗？你能通知正确的人，并且你有反馈循环来随着时间的推移改进应用吗？'
- en: '**Governance and compliance**: Are you compliant with regulations? Do you have
    the right policies in place, and are you managing data responsibly?'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理和合规性**：你是否遵守了法规？你是否实施了正确的政策，并且是否负责任地管理数据？'
- en: '**Future proofing**: Are you prepared for future changes? Can you adapt to
    new technologies, and are you continuously improving your app?'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Observability
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Do you know how your app is doing, really? If you do, that means you’ve been
    diligent in terms of adding logging, tracing, and metrics. You have probably added
    a dashboard so you can easily visualize all that, and you even know where to optimize
    if needed. Most of us aspire to have that level of knowledge of our app and how
    it’s doing. When you develop a piece of software at a business, for a client,
    and so on, there’s a lot at stake. We need to keep the data secure, the app needs
    to respond at a decent speed and use the resources it’s been constrained with,
    and it needs to work. It doesn’t sound that hard, right? But it is, especially
    when you start serving tens of thousands of customers, or even millions. But instead
    of focusing on how difficult it is to get all this correct, let’s talk about the
    most important things we need to get in place to at least be able to observe our
    app:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '**Logging**: Logging is crucial for understanding the behavior of your application.
    It helps understand what goes in, what went out, and hopefully, how long it took
    through various parts of the app. Having logging at the right places can help
    you identify bottlenecks and optimize performance. What’s important to consider
    is the log level (e.g., info, debug, or error) and the context you include (e.g.,
    user ID, request ID, etc.) to make your logs more useful.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tracing**: Tracing is essential for understanding the flow of requests through
    your system. It allows you to see how different services interact and where bottlenecks
    may occur. Implement distributed tracing to get a complete picture of request
    paths and latencies. Tracing differs from logging in that it captures the journey
    of a request. Therefore, it usually contains additional information such as origin,
    destination, and any intermediate services involved.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metrics**: Metrics are about knowing the health, performance, and scalability
    of your server. Important metrics to capture are therefore CPU and memory usage,
    request throughput, response time, and even error rate. Capturing all that will
    provide you with a good understanding of how your system is doing.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: "For observability, MCP isn’t vastly different from traditional applications,\
    \ but there are unique aspects to consider, such as model performance and token\
    \ usage. What could be of particular interest to measure for MCP specifically\
    \ could be token usage per request versus when it’s being cached or reused. Also,\
    \ for the sake of logging, MCP has different logs built in that we should leverage\
    \ to indicate errors, warnings, normal logs, and so on ([https://modelcontextprotocol.io/specification/2025-03-26/server/utilities/logging](https://modelcontextprotocol.io/specification/2025-03-26/\uFEFF\
    server/utilities/logging))."
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Scalability and resilience
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Another very important aspect of deploying MCP applications is ensuring that
    they can scale and remain resilient under load. The problem you’re solving is
    to ensure the following:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 部署MCP应用程序的另一个非常重要的方面是确保它们在负载下可以伸缩并保持弹性。您要解决的问题是要确保以下内容：
- en: '**Traffic spikes**: You can take on a sudden increase in traffic without degrading
    performance. This is usually business-critical if you’re an e-commerce company
    and need to be able to handle an increase in purchases during peak shopping times.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流量激增（Traffic spikes）**：您可以在不降低性能的情况下应对流量的突然增加。如果您是一家电子商务公司，这在业务关键时期尤为重要，您需要能够处理购物高峰时段购买量的增加。'
- en: '**Scaling up and down**: You can efficiently manage resources to handle varying
    loads.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弹性伸缩（Scaling up and down）**：您可以高效地管理资源以处理不同的负载。'
- en: '**Resilience**: You can quickly recover from failures and minimize downtime.
    Doing this well means the users will barely notice failures or at all. The opposite
    means the users will experience disruptions and degraded service, and might take
    their business elsewhere.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弹性（Resilience）**：您可以从故障中快速恢复并最小化停机时间。做得好意味着用户几乎不会注意到故障，或者根本不会注意到。相反，用户将经历中断和服务的降级，可能会将业务转移到其他地方。'
- en: Now that we understand the major problems and why we should care about these
    problems, what’s the solution? For traffic spikes, we need to be able to scale
    up and down quickly. Most cloud providers have this feature built in. What you
    need to decide on is how much you want to control this. For example, do you want
    to specify that scaling should happen on a certain CPU or memory load, or are
    you okay with the chosen platform to handle this?
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了主要问题和为什么我们应该关注这些问题，那么解决方案是什么呢？对于流量激增，我们需要能够快速地进行弹性伸缩。大多数云服务提供商都内置了这一功能。您需要决定您想要控制多少。例如，您是否希望指定在特定的CPU或内存负载上进行伸缩，或者您是否可以接受所选平台来处理这个问题？
- en: 'Also, as an architect, you could also design so that you, for example, use
    a message queue over directly talking to a database and so on. There are several
    ways to go about this, and only you know what size you need to account for:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，作为一名架构师，您还可以设计出这样的系统，例如，您可以通过消息队列而不是直接与数据库通信，等等。有几种方法可以做到这一点，只有您知道需要考虑多大的规模：
- en: '**Load balancing**: The idea with load balancing is to distribute incoming
    traffic across multiple instances of your application or service to ensure no
    single instance is overwhelmed. This improves responsiveness and availability.
    For the sake of your solution, though, you might treat your application and your
    AI as separate entities and therefore set up different sets of load-balancing
    schemes for your MCP server and your AI model endpoints.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负载均衡（Load balancing）**：负载均衡的理念是将进入的流量分配到您的应用程序或服务的多个实例中，以确保没有单个实例被压垮。这提高了响应性和可用性。然而，为了您的解决方案，您可能将应用程序和人工智能视为不同的实体，因此为您的MCP服务器和人工智能模型端点设置不同的负载均衡方案。'
- en: '**Rate limiting**: Rate limiting is a technique used to control the amount
    of incoming requests to a service within a specific time frame. This helps prevent
    abuse, ensures fair usage, and manages API costs. Again, just like load balancing,
    you might have different schemes for your web app and your AI endpoints.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速率限制（Rate limiting）**：速率限制是一种在特定时间框架内控制服务接收请求数量的技术。这有助于防止滥用，确保公平使用，并管理API成本。同样，就像负载均衡一样，您可能为您的Web应用程序和人工智能端点有不同的方案。'
- en: '**Circuit breakers**: The idea behind circuit breakers is to detect failures
    and prevent the system from making requests that are likely to fail. When a certain
    threshold of failures is reached, the circuit breaker trips, and subsequent requests
    are automatically rejected for a period of time. This allows the system to recover
    and prevents it from being overwhelmed by failed requests. From a user experience
    standpoint, circuit breakers can help maintain a smooth experience by providing
    fallback options or graceful degradation when certain services are unavailable.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**断路器（Circuit breakers）**：断路器的理念是检测故障并防止系统发出可能导致失败的请求。当达到一定的故障阈值时，断路器跳闸，随后一段时间内的请求将自动被拒绝。这允许系统恢复，并防止它被失败的请求所淹没。从用户体验的角度来看，断路器可以通过提供回退选项或优雅降级来帮助维持流畅的体验，当某些服务不可用时。'
- en: 'So, how do we implement these mechanisms? Well, some of them can be done at
    the application level, while others may require infrastructure support. Here are
    some strategies:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何实现这些机制呢？好吧，其中一些可以在应用层面完成，而其他一些可能需要基础设施支持。以下是一些策略：
- en: '**Load balancing**: Use a load balancer to distribute traffic across multiple
    instances of your application or service. This can be done using cloud provider
    features or dedicated load balancing solutions.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负载均衡**：使用负载均衡器将流量分配到您的应用程序或服务的多个实例。这可以通过云提供商的功能或专用负载均衡解决方案来完成。'
- en: '**Rate limiting**: Implement rate limiting at the API gateway or application
    level to control the number of requests from users or services. This can help
    prevent abuse and ensure fair usage.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速率限制**：在API网关或应用级别实施速率限制，以控制用户或服务的请求数量。这有助于防止滥用并确保公平使用。'
- en: '**Circuit breakers**: These can be implemented using an API gateway.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**断路器**：这些可以通过API网关来实现。'
- en: If you’re using a cloud provider, you should be looking into Azure API Management
    or Amazon API Gateway to implement these strategies effectively. These services
    will address security, scalability, and reliability concerns, and even have features
    helping you with AI concerns. What they have in common is that they use a declarative
    approach to define these strategies. For example, Azure API Management uses XML
    to define policies for rate limiting, caching, and other features. That makes
    it easy to apply and configure without changing any code.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用云提供商，您应该考虑使用Azure API Management或Amazon API Gateway来有效地实施这些策略。这些服务将解决安全、可扩展性和可靠性问题，甚至具有帮助您处理AI问题的功能。它们共同的特点是使用声明性方法来定义这些策略。例如，Azure
    API Management使用XML来定义速率限制、缓存和其他功能的策略。这使得应用和配置变得容易，而无需更改任何代码。
- en: So, the recommendation here is to look into your cloud provider of choice and
    leverage their API management solutions to implement these strategies. Check the
    links at the end of this chapter in the *Resources* section for more information.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这里的建议是调查您选择的云提供商，并利用他们的API管理解决方案来实施这些策略。请查看本章*资源*部分末尾的链接以获取更多信息。
- en: Monitoring and feedback
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监控和反馈
- en: 'For monitoring, we’ve alluded to the problems you can run into, such as performance
    bottlenecks, error rates, and user behavior patterns. Here are some strategies
    to address these issues:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 对于监控，我们已经提到了您可能会遇到的问题，例如性能瓶颈、错误率和用户行为模式。以下是一些解决这些问题的策略：
- en: '**Implement application performance monitoring** (**APM**) **tools**: Use APM
    tools to gain insights into performance bottlenecks and error rates.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施应用程序性能监控（APM）工具**：使用APM工具来深入了解性能瓶颈和错误率。'
- en: '**Address error rates**: Implement automated error tracking and alerting to
    quickly identify and resolve issues.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决错误率**：实施自动错误跟踪和警报，以便快速识别和解决问题。'
- en: '**User behavior analytics**: Leverage analytics tools to understand user interactions
    and identify potential areas for improvement.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户行为分析**：利用分析工具来了解用户交互并识别潜在的改进领域。'
- en: '**AI usage**: You want to make sure your AI is used as intended and not being
    abused or misused, and that it produces the responses you expect. For a solution,
    you should sample requests and analyze them at regular intervals to ensure compliance
    with usage policies and performance expectations. Also, add feedback loops in
    the form of letting users provide input on AI-generated content. Having this in
    place allows you to perform prompt tuning and context refining. Things you want
    to set up a system for are also to mitigate prompt injection attacks, unsafe content
    generation, and other potential risks, such as the mentioning of competitor names
    and more. Whichever service you end up with should be able to tackle all these.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI使用**：您希望确保您的AI按预期使用，没有被滥用或误用，并且能够产生您期望的响应。为了解决这个问题，您应该定期采样请求并分析它们，以确保符合使用政策和性能预期。此外，添加反馈循环，让用户对AI生成的内容提供反馈。这样，您可以进行提示调整和上下文细化。您想要设置系统以减轻的事项还包括减轻提示注入攻击、不安全的内容生成以及其他潜在风险，如提及竞争对手的名称等。无论您最终选择哪种服务，都应该能够应对所有这些问题。'
- en: The major cloud providers have monitoring solutions that can help you set up
    dashboards, alarms, and more. Also, for AI service usage, there are specialized
    tools that help you analyze prompts. See more on this in the *Resources* section
    in this chapter.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 主要云提供商都有监控解决方案，可以帮助您设置仪表板、警报等。此外，对于AI服务使用，还有专门的分析工具可以帮助您分析提示。更多相关信息请参阅本章的*资源*部分。
- en: Governance and compliance
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管理和合规性
- en: Governance is about ensuring that your application operates within the bounds
    of legal and ethical standards. How much you need to adhere to these depends on
    the sector you work in. There’s GDPR for data protection, HIPAA for health information,
    and other regulations that may apply. Ensure you have a robust compliance framework
    in place.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 管理是确保你的应用程序在法律和道德标准的范围内运行。你需要遵守这些标准的程度取决于你所在的行业。有 GDPR 用于数据保护，HIPAA 用于健康信息，以及其他可能适用的法规。确保你有一个强大的合规框架。
- en: From a software standpoint, make it easy to comply with these policies by ensuring
    you log all interactions and create an *audit trail* so you know who changed what
    and when. You might also consider implementing access controls and data encryption
    to further protect sensitive information. If you are shipping AI, you will need
    to care about bias and fairness in your models. Therefore, you might need things
    such as robust system prompts and usage of content safety services that help implement
    the policy you need to adhere to, whether it’s GDPR or other regulations.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 从软件的角度来看，通过确保记录所有交互并创建一个 *审计轨迹* 以了解谁改变了什么以及何时改变，使遵守这些政策变得容易。你也可能考虑实施访问控制和数据加密，以进一步保护敏感信息。如果你正在提供人工智能，你需要关注你模型中的偏见和公平性。因此，你可能需要诸如健壮的系统提示和内容安全服务的使用，这些服务有助于实施你需要遵守的政策，无论是
    GDPR 还是其他法规。
- en: Future-proofing
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 防御未来
- en: Okay, so you’ve managed to deploy a system that meets your current needs. But
    what about the future? How can you stay safe, secure, compliant, and whatever
    else you define as success?
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，所以你已经成功部署了一个满足你当前需求的系统。但未来怎么办？你如何保持安全、合规，以及你定义的成功所涉及的任何其他方面？
- en: MCP is a fairly young protocol, and as such, it will continue to evolve. You
    need to keep track of such changes; if there are no constructs you should apply,
    perhaps there are transports you should stop using (SSE is already deprecated
    in favor of Streamable HTTP). There might also be new guidance on certain feature
    usage. You need to stay on top of all of that.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: MCP 是一个相对较新的协议，因此它将继续发展。你需要跟踪这些变化；如果没有你应该应用的构造，也许有你应该停止使用的传输（SSE 已经被 Streamable
    HTTP 取代）。也可能会有关于某些功能使用的新的指导。你需要跟上所有这些。
- en: There’s also tooling associated with MCP (for example, the Inspector tool) that
    may change, with either more tools or how you interact with it changing.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 与 MCP 相关的工具（例如，检查器工具）也可能发生变化，无论是工具数量的增加还是你与之交互的方式的变化。
- en: Then, you have the SDKs, as software, which are continuously changing. Some
    changes are so major that they might break your code. You might consider staying
    on a certain major version at least for a while, but ensure you get all security
    updates. Combine this with recognized tools such as Dependabot, GitHub Advanced
    Security, and more to ensure you make informed choices and know what risks you
    are taking by staying on a certain SDK version or moving on to a new one.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你有 SDKs，作为软件，它们正在不断变化。一些变化如此重大，以至于可能会破坏你的代码。你可能考虑至少保持某个主要版本一段时间，但确保你获得所有安全更新。结合
    Dependabot、GitHub 高级安全等公认的工具，以确保你做出明智的选择，并了解通过保持某个 SDK 版本或转向新版本所承担的风险。
- en: It’s hard to foresee the future, but you can have a responsible stance on heightened
    security. Software changes quickly, and new threats are detected regularly. Stay
    informed about the latest security practices and be ready to adapt your system
    as needed.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 预见未来很难，但你可以在加强安全方面采取负责任的态度。软件变化迅速，新的威胁被定期发现。了解最新的安全实践，并准备好根据需要调整你的系统。
- en: Summary
  id: totrans-133
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This has been a long chapter with much ground to cover, but hopefully you’ve
    felt helped by the guidance provided. As long as you’re aware of the problems
    you face and actively work to address them, then the choice is yours for whether
    you choose to address them through a library, a cloud service, or something else.
    You should probably spend more time than you think on security, as it’s becoming
    a top concern of companies worldwide.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个内容丰富的章节，有很多内容需要覆盖，但希望你已经通过提供的指导感到有所帮助。只要你知道你面临的问题，并积极努力解决它们，那么选择通过库、云服务或其他方式来解决它们的选择权在你手中。你可能需要比你想的更多的时间来关注安全，因为它正成为全球公司的主要关注点。
- en: Make sure you plan according to what you need to do before production, in production,
    and post-production, and prepare for the future. Stay informed. Things will break;
    the question is how you respond to those breaks and what measures you have in
    place to mitigate any potential issues.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你根据生产前、生产中和后期制作需要做的事情来制定计划，并为未来做好准备。保持信息畅通。事情总会出问题；问题在于你如何应对这些意外，以及你采取了哪些措施来减轻任何潜在问题。
- en: If you read this far, it means you’ve learned a lot from this book, from building
    your first server and client, interacting with an LLM, consuming the server with
    a tool such as VS Code, and finally, deploying it in a responsible manner. Congratulations!
    I’m also always happy to connect with you on LinkedIn at [https://uk.linkedin.com/in/christoffer-noring-3257061](https://uk.linkedin.com/in/christoffer-noring-3257061).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你读到这儿，这意味着你已经从这本书中学到了很多，从构建你的第一个服务器和客户端，与LLM交互，使用VS Code等工具消费服务器，最后以负责任的方式部署它。恭喜！我也很高兴在LinkedIn上与你联系，[https://uk.linkedin.com/in/christoffer-noring-3257061](https://uk.linkedin.com/in/christoffer-noring-3257061)。
- en: Resources
  id: totrans-137
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 资源
- en: 'Here are some useful resources:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些有用的资源：
- en: '*API gateway in Azure AI Management*: [https://docs.azure.cn/en-us/api-management/api-management-gateways-overview](https://docs.azure.cn/en-us/api-management/api-management-gateways-overview
    )'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Azure AI Management中的API网关*：[https://docs.azure.cn/en-us/api-management/api-management-gateways-overview](https://docs.azure.cn/en-us/api-management/api-management-gateways-overview)'
- en: 'This is a great repo showcasing how to add many of the features from rate limiting,
    monitoring, security, and more – *AI Gateway*: [https://github.com/Azure-Samples/AI-Gateway](https://github.com/Azure-Samples/AI-Gateway)'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这是一个展示如何添加许多功能（如速率限制、监控、安全等）的出色仓库 – *AI网关*：[https://github.com/Azure-Samples/AI-Gateway](https://github.com/Azure-Samples/AI-Gateway)
