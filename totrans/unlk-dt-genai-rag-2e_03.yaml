- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: 'Code Lab: An Entire RAG Pipeline'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室：完整的RAG管道
- en: This code lab lays the foundation for the rest of the code in this book. We
    will spend this chapter going through an entire **retrieval-augmented generation**
    (**RAG**) pipeline. Then, as we step through the book, we will look at different
    parts of the code, adding enhancements along the way so that you have a comprehensive
    understanding of how your code can evolve to tackle more and more difficult problems.
    In the final stage of this book, we will look at advanced applications of RAG,
    ranging from semantic cache optimization to using RAG as the foundation for advanced
    autonomous agents. These are applications that only the most advanced AI developers
    are using, and you will have the chance to build them yourself!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本代码实验室为本书中其余代码奠定了基础。我们将在本章中详细讲解整个**检索增强生成**（**RAG**）管道。然后，随着我们逐步阅读本书，我们将查看代码的不同部分，并在过程中添加增强功能，以便您全面了解代码如何进化以解决越来越复杂的问题。在本书的最后阶段，我们将探讨RAG的高级应用，从语义缓存优化到将RAG作为高级自主代理的基础。这些是只有最先进的AI开发者才会使用的应用，您将有机会亲自构建它们！
- en: 'We will spend this chapter walking through each component of the RAG pipeline,
    including the following aspects:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将本章用于逐步讲解RAG管道的每个组件，包括以下方面：
- en: Setting up an LLM account with OpenAI
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用OpenAI设置LLM账户
- en: Code lab 2.1 – building your first RAG pipeline
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码实验室2.1 – 构建您的第一个RAG管道
- en: As we step through the code, you will gain a comprehensive understanding of
    each step in the RAG process programmatically by using tools such as LangChain,
    Chroma, and OpenAI’s APIs. This will provide you with a strong foundation that
    we will build upon in subsequent chapters, enhancing and evolving the code to
    tackle increasingly complex problems.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们逐步分析代码的过程中，您将通过使用LangChain、Chroma和OpenAI的API等工具，程序性地全面理解RAG过程中的每一步。这将为您提供一个强大的基础，我们将在后续章节中在此基础上进行增强和进化，以解决越来越复杂的问题。
- en: In later chapters, we will explore techniques that can help improve and customize
    the pipeline for different use cases and overcome common challenges that arise
    when building RAG-powered applications. Let’s dive in and start building!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在后续章节中，我们将探讨可以帮助改进和定制不同用例的管道以及构建RAG驱动应用程序时遇到的常见挑战的解决方法。让我们深入探讨并开始构建吧！
- en: Technical requirements
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The code for this chapter is available here: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_02](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_02).'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在以下链接找到：[https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_02](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_02).
- en: 'You will need to run this chapter’s code in an environment that’s been set
    up to run Jupyter notebooks. Experience with Jupyter notebooks is a prerequisite
    for using this book; we would not be able to provide a comprehensive introduction
    to it in a short amount of text. There are numerous ways to set up a notebook
    environment. There are online versions, versions you can download, notebook environments
    that universities provide students, and different interfaces you can use. If you
    are carrying out this for a company, they will likely have an environment that
    you will want to get familiar with. Each of these options takes very different
    instructions to set up, and those instructions often change. If you need to brush
    up on your knowledge about this type of environment, you can start on the Jupyter
    website: [https://docs.jupyter.org/en/latest/](https://docs.jupyter.org/en/latest/).
    Start here, then ask your favorite LLM for more help to get your environment set
    up.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要在已设置好运行Jupyter笔记本的环境下运行本章的代码。熟悉Jupyter笔记本是使用本书的先决条件；我们无法在简短的文字中提供全面的介绍。设置笔记本环境有众多方法。有在线版本、可下载的版本、大学为学生提供的笔记本环境，以及您可以使用的不同界面。如果您是在为公司执行这项工作，他们可能有一个您需要熟悉的环境。每个选项的设置说明都大相径庭，而且这些说明经常变化。如果您需要更新关于此类环境的知识，可以从Jupyter网站开始：[https://docs.jupyter.org/en/latest/](https://docs.jupyter.org/en/latest/)。从这里开始，然后向您最喜欢的LLM寻求更多帮助以设置您的环境。
- en: What do I use? Often, when I am traveling, I use my Chromebook and a notebook
    set up in one of the cloud environments. I prefer Google Colab or their Colab
    Enterprise notebooks, which you can find in the **Vertex AI** section of Google
    Cloud Platform. But these environments cost money, often exceeding $20 a month
    if you are active. If you are as active as me, it can exceed $1,000 per month!
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用什么？通常，当我旅行时，我会使用我的Chromebook和设置在某个云环境中的一个笔记本。我更喜欢Google Colab或他们的Colab Enterprise笔记本，你可以在Google
    Cloud Platform的**Vertex AI**部分找到它们。但这些环境需要付费，如果你很活跃，通常每月超过$20！如果你像我一样活跃，每月可能超过$1,000！
- en: As a cost-effective alternative for when I am that active, I run Jupyter notebooks
    locally using **Visual Studio Code** (**VS Code**). VS Code has excellent built-in
    support for Jupyter notebooks and provides a familiar, powerful development environment
    right on your local machine. You can install the Python extension for VS Code,
    which includes native notebook support, and run notebooks without any cloud costs.
    This approach works well on Mac, Windows, and Linux systems. The main trade-off
    is that you’re limited to your local machine’s compute resources, and you won’t
    have access to powerful cloud GPUs unless you configure a remote connection. But
    for many RAG applications and general development work, local execution is perfectly
    adequate and eliminates ongoing cloud costs.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 作为我如此活跃时的成本效益替代方案，我使用**Visual Studio Code**（**VS Code**）在本地运行Jupyter笔记本。VS Code对Jupyter笔记本有出色的内置支持，并在你的本地机器上提供熟悉且强大的开发环境。你可以为VS
    Code安装Python扩展，它包括原生的笔记本支持，并且可以在没有任何云成本的情况下运行笔记本。这种方法在Mac、Windows和Linux系统上效果良好。主要的权衡是你受限于本地机器的计算资源，除非你配置了远程连接，否则你将无法访问强大的云GPU。但对于许多RAG应用和一般开发工作，本地执行完全足够，并且消除了持续的云成本。
- en: Ultimately, the primary requirement is to find an environment in which you can
    run a Jupyter notebook using Python 3\. The code we will provide will indicate
    what other packages you will need to install.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，主要要求是找到一个可以在其中使用Python 3运行Jupyter笔记本的环境。我们将提供的代码将指示你需要安装的其他包。
- en: '**Note**'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: All of this code assumes you are working in a Jupyter notebook. You could do
    this directly in a Python file (`.py`), but you may have to change some of it.
    Running this in a notebook gives you the ability to step through it cell by cell
    and see what happens at each point to better understand the entire process.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些代码都假设你在Jupyter笔记本中工作。你可以在Python文件（`.py`）中直接这样做，但你可能需要更改其中的一些内容。在笔记本中运行它让你能够逐个单元格地逐步执行，并更好地理解整个过程。
- en: In the following coding example, we are not going to work with interfaces; we
    will cover that in [*Chapter 6*](B34736_06_ePub.xhtml#_idTextAnchor128). In the
    meantime, we will simply create a string variable that represents the prompt users
    would enter and use that as a fill-in for a full-fledged interface input.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的编码示例中，我们不会处理接口；我们将在[*第6章*](B34736_06_ePub.xhtml#_idTextAnchor128)中介绍这一点。在此期间，我们将简单地创建一个字符串变量，代表用户会输入的提示，并将其用作完整接口输入的填充。
- en: Setting up an LLM account with OpenAI
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用OpenAI设置LLM账户
- en: 'For the general public, OpenAI’s ChatGPT models are currently the most popular
    and well-known **large language models** (**LLMs**). However, there are many other
    LLMs available on the market that fit a myriad of purposes. You do not always
    need to use the most expensive, most powerful LLM. Some LLMs focus on one area,
    such as the Meditron LLMs, which are medical research-focused fine-tuned versions
    of Llama 2\. If you are in the medical area, you may want to use that LLM instead,
    as it may do better than a big general LLM in your domain. Often, LLMs can be
    used to double-check other LLMs, so you have to have more than one in those cases.
    I strongly encourage you not to just use the first LLM you have worked with and
    instead to look for the LLM that best suits your needs. But to keep things simpler
    this early in this book, I am going to talk about setting up OpenAI’s ChatGPT:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 对于公众来说，OpenAI的ChatGPT模型目前是最受欢迎和最知名的**大型语言模型**（**LLMs**）。然而，市场上还有许多其他LLMs，适用于各种用途。你并不总是需要使用最昂贵、最强大的LLM。一些LLMs专注于一个领域，例如专注于医学研究的Meditron
    LLMs，它们是Llama 2的微调版本。如果你在医学领域，你可能想使用那个LLM，因为它可能在你所在的领域中比一个大型的通用LLM表现得更好。通常，LLMs可以用作其他LLMs的二次检查，所以在这种情况下你需要不止一个。我强烈建议你不要只使用你曾经使用过的第一个LLM，而是寻找最适合你需求的LLM。但为了使本书早期内容更简单，我将讨论如何设置OpenAI的ChatGPT：
- en: Go to the OpenAI Platform website ([https://platform.openai.com](https://platform.openai.com))
    and sign up for an account if you haven’t already. The sign-up process is straightforward.
    You can register using Google, Microsoft, Apple, or your own email address.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往OpenAI平台网站([https://platform.openai.com](https://platform.openai.com))并注册账户，如果您还没有的话。注册过程很简单。您可以使用Google、Microsoft、Apple或您自己的电子邮件地址进行注册。
- en: After logging in, you may want to organize your work by creating a project.
    Projects help you manage API keys, set billing limits, and track usage separately
    for different applications.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录后，您可能想通过创建一个项目来组织您的工作。项目可以帮助您管理API密钥、设置计费限制，并为不同的应用程序分别跟踪使用情况。
- en: 'Warning: Using OpenAI’s API costs money! Use it sparingly! Where possible,
    find and use the cheapest model when starting out.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：使用OpenAI的API需要付费！请谨慎使用！在可能的情况下，在开始时寻找并使用最便宜的模式。
- en: Navigate to the **API Keys** section in your project settings and click **Create
    new secret key**.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的项目设置中导航到**API密钥**部分，并点击**创建新的密钥**。
- en: 'When creating an API key, you’ll need to choose between two ownership types:'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在创建API密钥时，您需要在两种所有权类型之间进行选择：
- en: '**You**: The key is tied to your user account and is ideal for personal development
    and local experiments.'
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**您**：密钥与您的用户账户绑定，非常适合个人发展和本地实验。'
- en: '**Service account**: This is a bot identity that belongs to the project rather
    than a person. It is ideal for production servers since it survives team changes.'
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**服务账户**：这是一个属于项目而不是个人的机器人身份。它非常适合生产服务器，因为它可以经受团队变化。'
- en: 'Select the permission level for your key:'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择您的密钥的权限级别：
- en: '**All**: Full access to all project APIs (default setting).'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**所有**：对所有项目API的完全访问权限（默认设置）。'
- en: '**Restricted**: Granular control where you can pick none, read, or write permissions
    for each endpoint group (e.g., enable embeddings only or deny assistants).'
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**受限**：细粒度控制，您可以针对每个端点组选择无权限、读取或写入权限（例如，仅启用嵌入或拒绝助手）。'
- en: '**Read Only**: Can only list and read metadata. Cannot call endpoints that
    generate content.'
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**只读**：只能列出和读取元数据。不能调用生成内容的端点。'
- en: '*Copy the key immediately when it’s displayed.* You will only see it once.
    If you lose it, you’ll need to generate a new key. Keep this key completely secret.
    Anyone with access to it can use your account, and you will be charged for their
    usage.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*立即复制显示的密钥。* 您只会看到一次。如果您丢失了它，您将需要生成一个新的密钥。请确保这个密钥绝对保密。任何能够访问它的人都可以使用您的账户，并且您将为其使用付费。'
- en: OpenAI now uses a prepaid billing system. You must purchase credits in advance
    to use the API. The minimum purchase is $5\. You can set up auto-recharge to automatically
    add credits when your balance falls below a threshold, and you can set a recharge
    limit to cap total auto-recharges per month. Note that purchased credits expire
    after one year and are non-refundable.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: OpenAI现在使用预付费计费系统。您必须提前购买信用额度才能使用API。最低购买金额为5美元。您可以设置自动充值，当您的余额低于阈值时，系统会自动添加信用额度，并且您可以设置充值上限，以限制每月的总自动充值次数。请注意，购买的信用额度在一年后过期，且不可退款。
- en: For cost control, consider keeping auto-recharge off initially or setting a
    low recharge limit until you understand your typical usage patterns.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了控制成本，最初可以考虑关闭自动充值或设置一个较低的充值上限，直到您了解自己的典型使用模式。
- en: 'With that, you have set up the key component that will serve as the *brain*
    of your RAG pipeline: the LLM! Now we’re ready to build our first complete RAG
    application. In the following code lab, we’ll walk through each component step
    by step, from loading and processing data to creating a vector database and chaining
    everything together into a working question-answering system.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样，您已经设置了将成为您RAG管道**大脑**的关键组件：LLM！现在我们准备构建我们的第一个完整的RAG应用程序。在接下来的代码实验室中，我们将逐步介绍每个组件，从加载数据和处理数据到创建向量数据库，并将所有内容连接起来形成一个工作的问题回答系统。
- en: Code lab 2.1 – building your first RAG pipeline
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码实验室2.1 – 构建您的第一个RAG管道
- en: In this code lab, we’ll implement a complete RAG pipeline using LangChain, Chroma
    DB, and OpenAI. We’ll start by loading and processing content from a web page,
    then create a vector database to enable semantic search, and finally, chain everything
    together so we can ask questions and get contextually accurate answers.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个代码实验室中，我们将使用LangChain、Chroma DB和OpenAI实现一个完整的RAG管道。我们将从加载和处理网页内容开始，然后创建一个向量数据库以实现语义搜索，最后将所有内容连接起来，以便我们可以提问并获得上下文准确的答案。
- en: 'This pipeline demonstrates the three core stages of RAG: indexing (preparing
    and storing your data), retrieval (finding relevant information), and generation
    (using an LLM to create an answer based on retrieved context). While this initial
    implementation is straightforward, it establishes the foundation we’ll build upon
    in later chapters to handle more complex scenarios and optimize performance.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 该管道演示了RAG的三个核心阶段：索引（准备和存储您的数据）、检索（查找相关信息）和生成（使用LLM根据检索到的上下文创建答案）。虽然这个初始实现很简单，但它为我们后续章节中处理更复杂场景和优化性能奠定了基础。
- en: Step 1 – installing dependencies
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步 - 安装依赖项
- en: 'Make sure these packages are installed in your Python environment. Add the
    following lines of code in the first cell of your notebook:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 确保这些包已安装在你的Python环境中。在你的笔记本的第一个单元中添加以下代码行：
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The preceding code first upgrades `pip`, then uninstalls any existing versions
    of these packages to avoid dependency conflicts, and finally, installs the specific
    versions needed for this tutorial. This approach ensures a clean installation
    regardless of what packages you may already have in your environment.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码首先升级`pip`，然后卸载这些包的任何现有版本以避免依赖冲突，最后安装本教程所需的特定版本。这种方法确保了无论你的环境中可能已经有什么包，都能进行干净的安装。
- en: '**Note**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: If you see dependency conflict warnings during the uninstall step mentioning
    packages such as langchain-together, ragas, or langmem, these can be safely ignored.
    These warnings indicate other packages in your environment that haven’t yet been
    updated for LangChain 1.x and are not needed for this lab.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在卸载步骤中看到提及langchain-together、ragas或langmem等包的依赖冲突警告，这些可以安全忽略。这些警告表明你的环境中还有其他包尚未更新为LangChain
    1.x版本，并且对于这个实验不是必需的。
- en: 'Here’s a breakdown of each library being installed:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是安装的每个库的分解：
- en: '`langchain_community`: This is a community-driven package for the LangChain
    library, which is an open source framework for building applications with LLMs.
    It provides a set of tools and components for working with LLMs and integrating
    them into various applications, including document loaders for ingesting data
    from various sources.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`langchain_community`：这是一个由社区驱动的LangChain库包，它是一个用于构建LLM应用程序的开源框架。它提供了一套工具和组件，用于与LLM一起工作并将它们集成到各种应用程序中，包括从各种来源摄取数据的文档加载器。'
- en: '`langchain_text_splitters`: This package provides text-splitting utilities
    for breaking down documents into manageable chunks. It was separated from the
    main LangChain package for better modularity and contains various splitters for
    different use cases.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`langchain_text_splitters`：此包提供将文档拆分为可管理块的工具。它从主LangChain包中分离出来，以实现更好的模块化，并包含适用于不同用例的各种拆分器。'
- en: '`langchain-openai`: This package provides integration between LangChain and
    OpenAI’s language models. It allows you to easily incorporate OpenAI’s chat models
    and embedding models into your LangChain applications.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`langchain-openai`：此包提供LangChain与OpenAI语言模型的集成。它允许你轻松地将OpenAI的聊天模型和嵌入模型集成到你的LangChain应用程序中。'
- en: '`langsmith`: This is the LangSmith SDK, which provides access to LangChain
    Hub for pulling pre-built prompt templates. LangSmith is LangChain’s unified developer
    platform for building, testing, and monitoring LLM applications. It also enables
    observability and tracing for debugging your chains.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`langsmith`：这是LangSmith SDK，它提供了访问LangChain Hub以拉取预构建提示模板的功能。LangSmith是LangChain的统一开发者平台，用于构建、测试和监控LLM应用程序。它还支持调试你的链的可观察性和跟踪。'
- en: '`langchain-chroma`: This package provides the LangChain integration with Chroma,
    allowing you to use Chroma as a vector store within the LangChain ecosystem. It
    was separated into its own package for better modularity.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`langchain-chroma`：此包提供LangChain与Chroma的集成，允许你在LangChain生态系统中使用Chroma作为向量存储。它被分离成自己的包，以实现更好的模块化。'
- en: '`chromadb`: This is the package name for Chroma DB, a high-performance embedding/vector
    database designed for efficient similarity search and retrieval.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`chromadb`：这是Chroma DB的包名，它是一个高性能的嵌入/向量数据库，旨在进行高效的相似性搜索和检索。'
- en: '`langchain`: This is the core LangChain library itself. It provides a framework
    and a set of abstractions for building applications with LLMs. LangChain includes
    the components needed for an effective RAG pipeline, including prompting, memory
    management, agents, and other integrations with various external tools and services.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`langchain`: 这是LangChain库本身的核心。它提供了一个框架和一组抽象，用于构建使用LLM的应用程序。LangChain包括构建有效的RAG管道所需的所有组件，包括提示、内存管理、代理以及其他与各种外部工具和服务的集成。'
- en: '`beautifulsoup4`: This is an HTML parsing library for web scraping and extracting
    clean content from web pages.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`beautifulsoup4`: 这是一个用于网络爬取和从网页中提取干净内容的HTML解析库。'
- en: '`python-dotenv`: This is a utility library that reads key-value pairs from
    a `.env` file and sets them as environment variables, making it easy to manage
    configuration and API keys without hardcoding them in your code.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`python-dotenv`: 这是一个实用库，可以从`.env`文件中读取键值对并将它们设置为环境变量，这使得在不将它们硬编码到您的代码中时管理配置和API密钥变得容易。'
- en: After running the preceding first notebook cell, you will need to restart your
    kernel to be able to access all of the new packages you just installed in the
    environment. Depending on what environment you are in, this can be done in a variety
    of ways. Typically, you will see a refresh button you can use or a **Restart kernel**
    option in the menu.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行前面的第一个笔记本单元后，您需要重新启动您的内核才能访问您刚刚在环境中安装的所有新包。根据您所处的环境，这可以通过多种方式完成。通常，您会看到一个可以使用的刷新按钮，或者在菜单中的**重启内核**选项。
- en: 'If you have trouble finding a way to restart the kernel, add this cell and
    run it:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您找不到重启内核的方法，请添加此单元并运行它：
- en: '[PRE1]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This is a code version for performing a kernel restart in an IPython environment
    (notebooks). You shouldn’t need it, but it is here for you just in case!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个在IPython环境（笔记本）中执行内核重启的代码版本。您可能不需要它，但这里提供给您以防万一！
- en: Once you have installed these packages and restarted your kernel, you are ready
    to start coding! Let’s start with importing many of the packages you just installed
    in your environment.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您安装了这些包并重新启动了您的内核，您就可以开始编码了！让我们从导入您在环境中刚刚安装的许多包开始。
- en: Step 2 – imports
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步 – 导入
- en: 'Now, let’s import all of the libraries needed to perform the RAG-related tasks.
    I have provided comments at the top of each group of imports to indicate what
    area of RAG the imports are relevant to. This, combined with the description in
    the following list, provides a basic introduction to everything you need for your
    first RAG pipeline:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们导入执行RAG相关任务所需的所有库。我在每个导入组顶部提供了注释，以指示导入与RAG的哪个领域相关。这，加上以下列表中的描述，为您提供了对您第一次RAG管道所需的一切的基本介绍：
- en: '[PRE2]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Let’s step through each of these imports:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐一查看这些导入：
- en: '`import os`: This provides a way to interact with the operating system. It
    is useful for performing operations such as accessing environment variables and
    working with file paths.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`import os`: 这提供了一种与操作系统交互的方式。它对于执行操作，如访问环境变量和与文件路径一起工作很有用。'
- en: '`from langchain_community.document_loaders import WebBaseLoader`: The `WebBaseLoader`
    class is a document loader that can fetch and load web pages as documents.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`from langchain_community.document_loaders import WebBaseLoader`: `WebBaseLoader`类是一个文档加载器，可以获取和加载网页作为文档。'
- en: '`import bs4`: The `bs4` module, which stands for **Beautiful Soup 4**, is a
    popular library for web scraping and parsing HTML or XML documents. Since we will
    be working with a web page, this gives us a simple way to pull out the title,
    content, and headers separately.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`import bs4`: `bs4`模块，代表**Beautiful Soup 4**，是一个流行的网络爬取和解析HTML或XML文档的库。由于我们将要处理网页，这为我们提供了一个简单的方法来分别提取标题、内容和标题。'
- en: '`import openai`: This provides an interface to interact with OpenAI’s language
    models and APIs.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`import openai`: 这提供了一个与OpenAI的语言模型和API交互的接口。'
- en: '`from langchain_openai import ChatOpenAI, OpenAIEmbeddings`: This imports both
    `ChatOpenAI` (for the LLM) and `OpenAIEmbeddings` (for the embeddings), which
    are specific implementations of language models and embeddings that use OpenAI’s
    models that work directly with LangChain.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`from langchain_openai import ChatOpenAI, OpenAIEmbeddings`: 这导入了`ChatOpenAI`（用于LLM）和`OpenAIEmbeddings`（用于嵌入），它们是使用OpenAI模型并直接与LangChain一起工作的语言模型和嵌入的特定实现。'
- en: '`from langsmith import Client`: The `Client` class from the LangSmith SDK provides
    access to LangChain Hub, where you can pull pre-built prompt templates and other
    components.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`from langsmith import Client`: 来自LangSmith SDK的`Client`类提供了对LangChain Hub的访问，您可以从那里拉取预构建的提示模板和其他组件。'
- en: '`from langchain_core.output_parsers import StrOutputParser`: This component
    parses the output generated by the language model and extracts the relevant information.
    In this case, it assumes that the language model’s output is a string and returns
    it as is.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`from langchain_core.output_parsers import StrOutputParser`: 此组件解析语言模型生成的输出，并提取相关信息。在这种情况下，它假设语言模型的输出是一个字符串，并原样返回它。'
- en: '`from langchain_core.runnables import RunnablePassthrough`: This component
    passes through the question or query without any modifications. It allows the
    question to be used as is in the subsequent steps of the chain.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`from langchain_core.runnables import RunnablePassthrough`: 此组件将问题或查询原样传递，不进行任何修改。它允许将问题直接用于链的后续步骤。'
- en: '`from langchain_chroma import Chroma`: This provides an interface to interact
    with the Chroma vector database using LangChain. This integration package was
    separated from `langchain-community` into its own dedicated package for better
    modularity and maintenance.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`from langchain_chroma import Chroma`: 这提供了一个使用LangChain与Chroma向量数据库交互的接口。这个集成包从`langchain-community`中分离出来，成为一个独立的专用包，以实现更好的模块化和维护。'
- en: '`From langchain_text_splitters import RecursiveCharacterTextSplitter`: `RecursiveCharacterTextSplitter`
    is a text-splitting utility that breaks down long text into more manageable pieces
    while trying to keep semantically related text together. It works by recursively
    trying to split on different characters (such as paragraphs, then sentences, then
    words) in order until the chunks are small enough.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`From langchain_text_splitters import RecursiveCharacterTextSplitter`: `RecursiveCharacterTextSplitter`是一个文本分割实用工具，它将长文本分解成更易于管理的片段，同时尽量保持语义相关的文本在一起。它通过递归尝试在不同的字符（如段落、句子、单词）上分割，直到块足够小为止。'
- en: '`from dotenv import load_dotenv`: This imports the `load_dotenv` function,
    which reads key-value pairs from a `.env` file and sets them as environment variables.
    This is a clean way to manage your API keys and other configurations without hardcoding
    sensitive information in your code.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`from dotenv import load_dotenv`: 这行代码导入`load_dotenv`函数，该函数从`.env`文件中读取键值对并将其设置为环境变量。这是一种在不将敏感信息硬编码到代码中的情况下管理API密钥和其他配置的干净方法。'
- en: These imports provide the essential Python packages that will be needed to set
    up your RAG pipeline. Your next step will be to connect your environment to OpenAI’s
    API.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这些导入提供了设置你的RAG管道所需的Python基本包。你的下一步将是将你的环境连接到OpenAI的API。
- en: Step 3 – OpenAI connection
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步 – OpenAI连接
- en: Now we’ll set up the connection to OpenAI using environment variables loaded
    from a file. This approach keeps your API key out of your code, which is a more
    secure practice than hardcoding sensitive credentials.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将使用从文件加载的环境变量来设置与OpenAI的连接。这种方法将你的API密钥从代码中移除，这是一种比硬编码敏感凭证更安全的做法。
- en: 'First, create a file called `env.txt` in the same directory as your notebook
    with the following content:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在你的笔记本所在目录中创建一个名为`env.txt`的文件，并包含以下内容：
- en: '`OPENAI_API_KEY=sk-###################`'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '`OPENAI_API_KEY=sk-###################`'
- en: 'Replace `sk-###################` with your actual OpenAI API key. Then, use
    the following code to load it:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 将`sk-###################`替换为你的实际OpenAI API密钥。然后，使用以下代码来加载它：
- en: '[PRE3]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Let’s break down what this code does:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解一下这段代码的功能：
- en: '`load_dotenv(dotenv_path=''env.txt'')`: This reads the key-value pairs from
    your `env.txt` file and makes them available as environment variables. The underscore
    (`_`) is used to discard the return value since we don’t need it.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`load_dotenv(dotenv_path=''env.txt'')`: 这行代码从你的`env.txt`文件中读取键值对，并将它们作为环境变量提供。下划线（`_`）用于丢弃返回值，因为我们不需要它。'
- en: '`os.environ[''OPENAI_API_KEY''] = os.getenv(''OPENAI_API_KEY'')`: This retrieves
    the API key from the environment and explicitly sets it in `os.environ`, ensuring
    it’s available to all libraries that look for it there.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`os.environ[''OPENAI_API_KEY''] = os.getenv(''OPENAI_API_KEY'')`: 这行代码从环境中检索API密钥，并显式地在`os.environ`中设置它，确保它对所有寻找它的库都是可用的。'
- en: '`openai.api_key = os.environ[''OPENAI_API_KEY'']`: This sets the API key for
    the OpenAI library directly.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`openai.api_key = os.environ[''OPENAI_API_KEY'']`: 这行代码直接为OpenAI库设置API密钥。'
- en: '**Important note**'
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**重要提示**'
- en: Make sure to add `env.txt` to your `.gitignore` file if you’re using version
    control. This prevents your API key from being accidentally committed to a repository.
    We will cover additional security practices in [*Chapter 5*](B34736_05_ePub.xhtml#_idTextAnchor103).
  id: totrans-85
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你正在使用版本控制，请确保将`env.txt`添加到`.gitignore`文件中。这可以防止你的API密钥意外提交到存储库。我们将在[*第五章*](B34736_05_ePub.xhtml#_idTextAnchor103)中介绍额外的安全实践。
- en: You have probably guessed that this OpenAI API key will be used to connect to
    the ChatGPT LLM. But ChatGPT is not the only service we will use from OpenAI.
    This API key is also used to access the OpenAI embeddings service. In the next
    section, which focuses on coding the indexing stage of the RAG process, we will
    utilize the OpenAI embeddings service to convert your content into vector embeddings,
    a key aspect of the RAG pipeline.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经猜到，这个OpenAI API密钥将用于连接到ChatGPT LLM。但ChatGPT并不是我们唯一会使用的OpenAI服务。这个API密钥也用于访问OpenAI嵌入服务。在下一节中，我们将专注于编码RAG过程的索引阶段，我们将利用OpenAI嵌入服务将你的内容转换为向量嵌入，这是RAG管道的关键方面。
- en: Step 4 – indexing
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步 – 索引
- en: 'The next few steps represent the *indexing* stage, where we obtain our target
    data, preprocess it, and vectorize it. These steps are often done *offline*, meaning
    they are done to prepare the application for usage later. But in some cases, it
    may make sense to do this all in real time, such as in rapidly changing data environments
    where the data that is used is relatively small. In this particular example, the
    steps are as follows:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的几个步骤代表*索引*阶段，其中我们获取目标数据，对其进行预处理，并将其向量化。这些步骤通常在*离线*时完成，这意味着它们是为了准备应用程序的后续使用而完成的。但在某些情况下，在实时环境中这样做可能是有意义的，例如在数据变化迅速且使用的数据相对较小的情况下。在这个特定的例子中，步骤如下：
- en: Web loading and crawling.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网页加载和爬取。
- en: Splitting the data into digestible chunks for the Chroma DB vectorizing algorithm.
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据分割成可消化的块，以便于Chroma DB向量化算法处理。
- en: Embedding and indexing those chunks.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将这些块嵌入并索引。
- en: Adding those chunks and embeddings to the Chroma DB vector store.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将这些块和嵌入添加到Chroma DB向量存储中。
- en: 'Let’s start with the first step: web loading and crawling.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从第一步开始：网页加载和爬取。
- en: Web loading and crawling
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网页加载和爬取
- en: To start, we need to pull in our data. This could be anything, of course, but
    we have to start somewhere!
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要获取我们的数据。当然，这可以是任何东西，但我们必须从某个地方开始！
- en: For our example, I am providing a web page example based on some of the content
    from [*Chapter 1*](B34736_01_ePub.xhtml#_idTextAnchor020). I have adopted the
    original structure from an example provided by LangChain at [https://lilianweng.github.io/posts/2023-06-23-agent/](https://lilianweng.github.io/posts/2023-06-23-agent/).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的示例，我提供了一个基于[*第一章*](B34736_01_ePub.xhtml#_idTextAnchor020)中一些内容的网页示例。我采用了LangChain提供的示例中的原始结构，可以在[https://lilianweng.github.io/posts/2023-06-23-agent/](https://lilianweng.github.io/posts/2023-06-23-agent/)找到。
- en: You can try that web page as well if it is still available when you read this,
    but be sure to change the question you use to query the content to one more suitable
    for the content on that page. You also need to restart your kernel if you change
    web pages; otherwise, it will include content from both web pages if you rerun
    the loader. That may be what you want, but I’m just letting you know!
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你阅读时这个网页仍然可用，你也可以尝试这个网页，但请确保将你用于查询内容的查询问题改为更适合该页面上内容的查询。此外，如果你更改网页，你还需要重新启动你的内核；否则，如果你重新运行加载器，它将包含两个网页的内容！这可能正是你想要的，但我只是让你知道！
- en: I also encourage you to try this with other web pages and see what challenges
    these other pages present. This example involves a very clean piece of data compared
    to most web pages, which tend to be rife with ads and other content you do not
    want showing up. But you may be able to find a relatively clean blog post and
    pull that in, or you can create your own. Try different web pages and see!
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我还鼓励你尝试使用其他网页，看看这些网页会带来哪些挑战。与大多数网页相比，这个示例涉及的数据非常干净，而大多数网页通常充满了广告和其他你不想显示的内容。但你可以找到一个相对干净的博客文章并拉取它，或者你可以自己创建一个。尝试不同的网页，看看结果！
- en: '[PRE4]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The preceding code starts with using the `WebBaseLoader` class from the `langchain_community
    document_loaders` module to load web pages as documents. Let’s break it down.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 上一段代码从`langchain_community document_loaders`模块中的`WebBaseLoader`类开始，用于将网页作为文档加载。让我们来分解一下。
- en: 'The `WebBaseLoader` class is instantiated with the following parameters:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '`WebBaseLoader`类使用以下参数实例化：'
- en: '`web_paths`: A tuple containing the URLs of the web pages to be loaded. In
    this case, it contains a single URL: `https://kbourne.github.io/chapter1.html`.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`web_paths`：一个包含要加载的网页URLs的元组。在这种情况下，它包含一个单独的URL：`https://kbourne.github.io/chapter1.html`。'
- en: '`bs_kwargs`: A dictionary of keyword arguments to be passed to the BeautifulSoup
    parser.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`bs_kwargs`：一个字典，包含传递给BeautifulSoup解析器的关键字参数。'
- en: '`parse_only`: A `bs4.SoupStrainer` object that specifies the HTML elements
    to parse. In this case, it is set to parse only the elements with the CSS classes,
    such as post-content, post-title, and post-header.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`parse_only`：一个 `bs4.SoupStrainer` 对象，指定要解析的 HTML 元素。在这种情况下，它被设置为仅解析具有 CSS
    类的元素，例如 post-content、post-title 和 post-header。'
- en: 'The `WebBaseLoader` instance initiates a series of steps that represent the
    loading of the document into your environment: The `load` method is called on
    `loader`, the `WebBaseLoader` instance that fetches and loads the specified web
    pages as documents. Internally, the loader is doing a lot!'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '`WebBaseLoader` 实例启动一系列步骤，代表将文档加载到您的环境中：在 `loader` 上调用 `load` 方法，即获取和加载指定网页作为文档的
    `WebBaseLoader` 实例。内部，加载器正在做很多事情！'
- en: 'Here are the steps it performs just based on this small amount of code:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是基于这段少量代码执行的步骤：
- en: Makes HTTP requests to the specified URLs to fetch the web pages
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向指定的 URL 发送 HTTP 请求以获取网页
- en: Parses the HTML content of the web pages using `BeautifulSoup`, considering
    only the elements specified by the `parse_only` parameter
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `BeautifulSoup` 解析网页的 HTML 内容，仅考虑由 `parse_only` 参数指定的元素
- en: Extracts the relevant text content from the parsed HTML elements
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从解析的 HTML 元素中提取相关文本内容
- en: Creates `Document` objects for each web page that contain the extracted text
    content, along with metadata such as the source URL
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每个包含提取的文本内容和元数据（如源 URL）的网页创建 `Document` 对象
- en: The resulting `Document` objects are stored in the `docs` variable for further
    use in our code!
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的 `Document` 对象存储在 `docs` 变量中，以便在代码中进一步使用！
- en: The classes that we are passing to `bs4` (post-content, post-title, and post-header)
    are CSS classes. If you are using an HTML page that does not have those CSS classes,
    this will not work. So, if you are using a different URL and are not getting data,
    take a look at what the CSS tags are in the HTML you are crawling. Many web pages
    do use this pattern, but not all! Crawling web pages presents many challenges
    like this.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们传递给 `bs4`（post-content、post-title 和 post-header）的类是 CSS 类。如果您使用的是没有这些 CSS
    类的 HTML 页面，这将不起作用。因此，如果您使用的是不同的 URL 并且没有获取到数据，请查看您正在爬取的 HTML 中的 CSS 标签。许多网页确实使用这种模式，但并非所有！爬取网页会带来许多这样的挑战。
- en: Once you have collected the documents from your data source, you need to pre-process
    them. In this case, this involves splitting.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦从数据源收集到文档，您需要对其进行预处理。在这种情况下，这涉及到分割。
- en: Step 5 – splitting
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 5 步 – 分割
- en: If you are using the provided URL, you will only parse the elements with the
    post-content, post-title, and post-header CSS classes. This will extract the text
    content from the main article body (usually identified by the post-content class),
    the title of the blog post (usually identified by the post-title class), and any
    header information (usually identified by the post-header class).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用提供的 URL，您将仅解析具有 post-content、post-title 和 post-header CSS 类的元素。这将提取主要文章正文（通常由
    post-content 类识别）的文本内容、博客文章的标题（通常由 post-title 类识别）以及任何标题信息（通常由 post-header 类识别）。
- en: 'If you’re curious, this is what this document looks like on the web (*Figure
    2.1*):'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您好奇，这是该文档在网页上的样子（*图 2.1*）：
- en: '![Figure 2.1 – A web page that we will process](img/B34736_02_01.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.1 – 我们将处理的网页](img/B34736_02_01.png)'
- en: Figure 2.1 – A web page that we will process
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.1 – 我们将处理的网页
- en: 'It goes down many pages too! There is a lot of content here, too much for an
    LLM to process directly. So, we will need to split the document into digestible
    chunks:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 它还会深入很多页面！这里的内容也很多，对于 LLM 直接处理来说太多了。因此，我们需要将文档分割成可消化的块：
- en: '[PRE5]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '`RecursiveCharacterTextSplitter` is the recommended text splitter for generic
    text. It works by recursively trying to split text on different characters in
    a specific order until chunks are small enough. By default, it tries to split
    on `["\n\n", "\n", " ", ""]`, which means it attempts to keep paragraphs together
    first, then sentences, then words. This approach helps preserve semantic coherence
    by keeping naturally related pieces of text together as long as possible.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '`RecursiveCharacterTextSplitter` 是用于通用文本的推荐文本分割器。它通过递归尝试以特定顺序在不同字符上分割文本，直到块足够小。默认情况下，它尝试在
    `["\n\n", "\n", " ", ""]` 上分割，这意味着它首先尝试保持段落在一起，然后是句子，然后是单词。这种方法通过尽可能长时间地保持自然相关的文本块来帮助保持语义连贯性。'
- en: 'The parameters we’re using are as follows:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用的参数如下：
- en: '`chunk_size=1000`: Limits each chunk to approximately 1,000 characters.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`chunk_size=1000`：将每个块限制在大约 1,000 个字符。'
- en: '`chunk_overlap=200`: Includes 200 characters of overlap between consecutive
    chunks to help preserve context at boundaries.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`chunk_overlap=200`: 在连续块之间包含 200 个字符的重叠，以帮助在边界处保留上下文。'
- en: '`length_function=len`: Uses Python’s built-in `len()` function to measure chunk
    size.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`length_function=len`: 使用 Python 内置的 `len()` 函数来测量块的大小。'
- en: '`is_separator_regex=False`: Treats separators as literal strings rather than
    regular expressions. I encourage you to go ahead and try different splitters and
    see what happens! For example, you might experiment with different chunk sizes
    or overlap amounts.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`is_separator_regex=False`: 将分隔符视为字面字符串，而不是正则表达式。我鼓励你尝试不同的分割器，看看会发生什么！例如，你可能想尝试不同的块大小或重叠量。'
- en: In [*Chapter 11*](B34736_11_ePub.xhtml#_idTextAnchor271), we will explore other
    text splitters, including `SemanticChunker`, and see how they compare with `RecursiveCharacterTextSplitter`
    for this content. Maybe speed is more important than quality in your particular
    case, so the question is which splitter is faster?
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [*第 11 章*](B34736_11_ePub.xhtml#_idTextAnchor271) 中，我们将探讨其他文本分割器，包括 `SemanticChunker`，并看看它们与
    `RecursiveCharacterTextSplitter` 在此内容上的比较。也许在你的特定情况下，速度比质量更重要，所以问题是哪个分割器更快？
- en: Once you have chunked up your content, the next step is to convert it into the
    vector embeddings we have talked so much about!
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦将内容分割成块，下一步就是将其转换为我们所谈论的向量嵌入！
- en: Step 6 – embedding and indexing the chunks
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 6 步 – 嵌入和索引块
- en: The next few steps represent the retrieval and generation steps, where we will
    use Chroma DB as the vector database. As mentioned multiple times now, Chroma
    DB is a great vector store! I selected this vector store because it is easy to
    run locally and it works well for demos like this, but it is a fairly powerful
    vector store. As you may recall from when we talked about vocabulary and the difference
    between vector stores and vector databases, Chroma DB is indeed both! Chroma is
    one of many options for your vector store, though. In [*Chapter 7*](B34736_07_ePub.xhtml#_idTextAnchor137),
    we will discuss many of the vector store options and reasons to choose one over
    the other. Some of these options even provide free vector embedding generation.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的几个步骤代表检索和生成步骤，我们将使用 Chroma DB 作为向量数据库。如前所述多次，Chroma DB 是一个优秀的向量存储！我选择这个向量存储是因为它易于本地运行，并且对于此类演示效果良好，但它确实是一个相当强大的向量存储。如您所回忆的，当我们谈论词汇和向量存储与向量数据库之间的区别时，Chroma
    DB 确实是两者兼备！Chroma 是你的向量存储的许多选项之一。在第 [*第 7 章*](B34736_07_ePub.xhtml#_idTextAnchor137)
    中，我们将讨论许多向量存储选项以及选择其中一个而不是另一个的原因。其中一些选项甚至提供免费的向量嵌入生成。
- en: 'We are using OpenAI embeddings here as well, which will use our OpenAI key
    to send our chunks of data to the OpenAI API, convert them into embeddings, and
    then send them back in their mathematical form. Note that this *does* cost money!
    It is a fraction of a cent for each embedding, but it is worth noting. So, please
    use caution when using this code if you are doing this on a tight budget! In [*Chapter
    7*](B34736_07_ePub.xhtml#_idTextAnchor137), we will review some ways to use free
    vectorization services to generate these embeddings for free:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里也使用 OpenAI 嵌入，它将使用我们的 OpenAI 密钥将我们的数据块发送到 OpenAI API，将它们转换为嵌入，并以数学形式发送回来。请注意，这确实会花费金钱！每个嵌入的费用是几分之一美分，但这是值得注意的。因此，如果你在预算紧张的情况下使用此代码，请谨慎使用！在第
    [*第 7 章*](B34736_07_ePub.xhtml#_idTextAnchor137) 中，我们将回顾一些使用免费向量服务免费生成这些嵌入的方法：
- en: '[PRE6]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'First, we create the Chroma vector store with the `Chroma.from_documents` method,
    which is called to create a Chroma vector store from the split documents. This
    is one of many methods we can use to create a Chroma database. This typically
    depends on the source, but for this particular method, it takes the following
    parameters:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们使用 `Chroma.from_documents` 方法创建 Chroma 向量存储，该方法用于从分割的文档中创建 Chroma 向量存储。这是我们创建
    Chroma 数据库的许多方法之一。这通常取决于来源，但针对这种方法，它需要以下参数：
- en: '`documents`: The list of split documents (splits) obtained from the previous
    code snippet'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`documents`: 从前面的代码片段中获得的分割文档（分割）列表'
- en: '`embedding`: An instance of the `OpenAIEmbeddings` class, which is used to
    generate embeddings for the documents'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`embedding`: `OpenAIEmbeddings` 类的一个实例，用于为文档生成嵌入'
- en: 'Internally, the method is doing a few things:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在内部，该方法执行了一些操作：
- en: It iterates over each `Document` object in the `splits` list.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它遍历 `splits` 列表中的每个 `Document` 对象。
- en: For each `Document` object, it uses the provided `OpenAIEmbeddings` instance
    to generate an embedding vector.
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个`Document`对象，它使用提供的`OpenAIEmbeddings`实例生成一个嵌入向量。
- en: It stores the document text and its corresponding embedding vector in the Chroma
    vector database.
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它将文档文本及其对应的嵌入向量存储在Chroma向量数据库中。
- en: At this point, you now have a vector database called `vectorstore`, and it is
    full of embeddings, which are…? That’s right; mathematical representations of
    all of the content from the web page you just crawled! So cool!
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你现在有一个名为`vectorstore`的向量数据库，它充满了嵌入，这些嵌入是……？没错；是你刚刚爬取的网页上所有内容的数学表示！太酷了！
- en: But what is this next part? Is it a retriever? Is this of the canine variety?
    Nope. This is creating the mechanism that you will use to perform vector similarity
    searches on your new vector database. You call the `asretriever` method right
    on the `vectorstore` instance to create the retriever. The retriever is an object
    that provides a convenient interface for performing these similarity searches
    and retrieving the relevant documents from the vector database based on those
    searches.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 但下一部分是什么？是一个检索器吗？是犬类的吗？不，这是创建你将用于在新的向量数据库上执行向量相似性搜索的机制。你直接在`vectorstore`实例上调用`asretriever`方法来创建检索器。检索器是一个提供方便接口以执行这些相似性搜索并基于这些搜索从向量数据库检索相关文档的对象。
- en: 'If you just want to perform the document retrieval process, you can. This is
    not officially part of the code, but if you want to test this out, add this in
    an extra cell and run it:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只想执行文档检索过程，你可以这样做。这并不是代码的官方部分，但如果你想测试这个，可以在额外的单元中添加它并运行：
- en: '[PRE7]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The output should be what I list later in this code when I indicate what is
    passed to the LLM, but it is essentially a list of the content stored in the `vectorstore`
    vector database that is most similar to the query.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应该是我在此代码中稍后列出当我指出传递给LLM的内容时，但本质上是一个列表，其中包含存储在`vectorstore`向量数据库中最相似于查询的内容。
- en: Aren’t you impressed? This is a simple example, of course, but it is the foundation
    for much more powerful tools that you can use to access your data and supercharge
    generative AI applications for your organization!
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 你不觉得印象深刻吗？这只是一个简单的例子，但它是构建更强大工具的基础，你可以使用这些工具来访问你的数据，并为你的组织超级充电生成式AI应用！
- en: However, at this point in the application, you have only created the receiver.
    You have not used it within the RAG pipeline yet. We will review how to do that
    next!
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在这个应用阶段，你只创建了接收器。你还没有在RAG管道中使用它。我们将在下一节中回顾如何使用它！
- en: Retrieval and generation
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检索和生成
- en: 'In the code, the retrieval and generation stages are combined within the chain
    we set up to represent the entire RAG process. This leverages pre-built components
    from **LangChain Hub**, such as **prompt templates**, and integrates them with
    a selected LLM. We will also utilize the **LangChain Expression Language** (**LCEL**)
    to define a chain of operations that retrieves relevant documents based on an
    input question, formats the retrieved content, and feeds it into the LLM to generate
    a response. Overall, the steps we take in retrieval and generation are as follows:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码中，检索和生成阶段被组合在我们设置的链中，以表示整个RAG过程。这利用了来自**LangChain Hub**的预构建组件，例如**提示模板**，并将它们与选定的LLM集成。我们还将利用**LangChain表达式语言**（**LCEL**）来定义一系列操作，这些操作基于输入问题检索相关文档，格式化检索内容，并将其输入到LLM以生成响应。总的来说，我们在检索和生成中采取的步骤如下：
- en: Take in a user query.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接收用户查询。
- en: Vectorize that user query.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将用户查询向量化。
- en: Perform a similarity search of the vector store to find the closest vectors
    to the user query vector, as well as their associated content.
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对向量存储执行相似性搜索，以找到与用户查询向量最接近的向量及其相关内容。
- en: Pass the retrieved content into a prompt template, where variables represent
    the context. This is a process known as **hydrating**.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将检索到的内容传递到提示模板中，其中变量代表上下文。这是一个称为**填充**的过程。
- en: Pass that *hydrated* prompt to the LLM.
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将那个**填充后的**提示传递给LLM。
- en: Once you receive a response from the LLM, present it to the user.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦你从LLM收到响应，就将其展示给用户。
- en: From a coding standpoint, we will start by defining the prompt template so that
    we have something to hydrate when we receive the user query. We will cover this
    in the next section.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 从编码的角度来看，我们将首先定义提示模板，以便我们在收到用户查询时有所依据。我们将在下一节中介绍这一点。
- en: Step 7 – prompt templates from LangChain Hub
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7步 – LangChain Hub的提示模板
- en: 'LangChain Hub is a collection of pre-built components and templates that can
    be easily integrated into LangChain applications. It provides a centralized repository
    for sharing and discovering reusable components, such as prompts, agents, and
    utilities. The Hub is now part of LangSmith, LangChain’s unified developer platform.
    Here, we are calling a prompt template from LangChain Hub using the LangSmith
    Client and assigning it to a prompt, a prompt template representing what we will
    pass to the LLM:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain Hub是一个预构建组件和模板的集合，可以轻松集成到LangChain应用中。它提供了一个集中式存储库，用于共享和发现可重用的组件，如提示、代理和实用工具。Hub现在是LangSmith的一部分，LangChain的统一开发者平台。在这里，我们使用LangSmith客户端调用LangChain
    Hub中的提示模板，并将其分配给一个提示，该提示模板代表我们将传递给LLM的内容：
- en: '[PRE8]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This code retrieves a pre-built prompt template from LangChain Hub using the
    `pull` method of the `hub` module. The prompt template is identified by the `jclemens24/rag-prompt`
    string. This identifier follows the *repository/component* convention, where *repository*
    represents the organization or user hosting the component and *component* represents
    the specific component being pulled. The `rag-prompt` component indicates it is
    a prompt designed for RAG applications.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码使用`hub`模块的`pull`方法从LangChain Hub检索一个预构建的提示模板。提示模板由`jclemens24/rag-prompt`字符串标识。该标识符遵循*仓库/组件*约定，其中*仓库*代表托管组件的组织或用户，而*组件*代表被拉取的具体组件。`rag-prompt`组件表明它是一个为RAG应用设计的提示。
- en: 'If you print out the prompt with `print(prompt)`, you can see what is used
    here, as well as what the inputs are:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用`print(prompt)`打印出提示，你可以看到这里使用了什么，以及输入的内容：
- en: '[PRE9]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'This is the initial part of the prompt that gets passed to the LLM, which,
    in this case, tells it this:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这是传递给LLM的提示的初始部分，它在这种情况下告诉它：
- en: '[PRE10]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Later, you add the question and context variables to *hydrate* the prompt, but
    starting with this format optimizes it to work better for RAG applications.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，你将问题和上下文变量添加到提示中以*激活*它，但以这种格式开始可以优化它以更好地适用于RAG应用。
- en: '**Note**'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: 'The `jclemens24/rag-prompt` string is one version of the predefined starting
    prompts. Visit LangChain Hub to find many more; you may even find one that better
    fits your needs: [https://smith.langchain.com/hub/search?q=rag-prompt](https://smith.langchain.com/hub/search?q=rag-prompt).'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '`jclemens24/rag-prompt`字符串是预定义起始提示的一个版本。访问LangChain Hub以找到更多；你甚至可能找到一个更适合你需求的：[https://smith.langchain.com/hub/search?q=rag-prompt](https://smith.langchain.com/hub/search?q=rag-prompt)。'
- en: You can also use your own! The hub contains dozens of RAG prompt variations
    contributed by the community, each optimized for different use cases and models.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以使用自己的！该中心包含由社区贡献的数十种RAG提示变体，每个变体都针对不同的使用场景和模型进行了优化。
- en: The prompt template is a key part of the RAG pipeline as it represents how you
    communicate with the LLM to receive the response you are seeking. But in most
    RAG pipelines, getting the prompt into a format so that it can work with the prompt
    template is not as straightforward as just passing it a string. In this example,
    the context variable represents the content we get from the retriever, and that
    is not in a string format yet! We will walk through how to convert our retrieved
    content into the proper string format that we need next.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 提示模板是RAG管道的关键部分，因为它代表了你是如何与LLM沟通以获取你寻求的响应。但在大多数RAG管道中，将提示转换为可以与提示模板一起工作的格式并不像只是传递一个字符串那样简单。在这个例子中，上下文变量代表我们从检索器获得的内容，而且它还不是字符串格式！我们将逐步介绍如何将检索内容转换为所需的正确字符串格式。
- en: Step 8 – formatting a function so that it matches the next step’s input
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第8步 - 格式化函数以匹配下一步的输入
- en: 'First, we will set up a function that takes the list of retrieved documents
    (docs) as input:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将设置一个函数，该函数接受检索到的文档列表（docs）作为输入：
- en: '[PRE11]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Inside this function, a generator expression (`doc.page_content for doc in docs`)
    is used to extract the `page_content` attribute from each document object. The
    `page_content` attribute represents the text content of each document.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个函数内部，使用了生成器表达式（`doc.page_content for doc in docs`）来从每个文档对象中提取`page_content`属性。`page_content`属性代表每个文档的文本内容。
- en: '**Note**'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: In this case, a *document* is not the entire document that you crawled earlier.
    It is just one small section of it, but we generally call these documents.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个情况下，一个*文档*并不是你之前爬取的整个文档。它只是其中的一小部分，但我们通常将这些文档称为。
- en: The `join` method is called on the `\n\n` string to concatenate `page_content`
    of each document with two newline characters between each document’s content.
    The formatted string is returned by the `format_docs` function to represent the
    context key in the dictionary that is piped into the prompt object.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '`join` 方法被调用在 `\n\n` 字符串上，用于将每个文档的 `page_content` 连接起来，每个文档的内容之间有两个换行符。格式化后的字符串由
    `format_docs` 函数返回，以表示字典中的“`context`”键，并将其管道输入到提示对象中。'
- en: The purpose of this function is to format the output of the retriever into the
    string format that it will need to be in for the next step in the chain, after
    the retriever step. We will explain this further in a moment, but short functions
    such as this are often necessary for LangChain chains to match up inputs and outputs
    across the entire chain.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数的目的是将检索器的输出格式化为链中下一步所需的字符串格式，在检索器步骤之后。我们稍后会进一步解释，但像这样的简短函数对于 LangChain 链来说通常是必要的，以确保整个链中输入和输出的匹配。
- en: Next, we will review the last step before we can create our LangChain chain,
    that is, defining the LLM we will use in that chain.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们可以创建 LangChain 链之前，我们将回顾最后一步，即定义我们将在这个链中使用的 LLM。
- en: Step 9 – defining your LLM
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 9 步 – 定义你的 LLM
- en: 'Let’s set up the LLM you will use:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们设置你将使用的 LLM：
- en: '[PRE12]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The preceding code creates an instance of the `ChatOpenAI` class from the `langchain_openai`
    module, which serves as an interface to OpenAI’s language models, specifically
    the GPT-4o mini model. This model was released at a significant discount to the
    older models. Using this model will help keep your inference costs down while
    still allowing you to use a recent model! If you would like to try a different
    version of ChatGPT, such as GPT-5, you can just change the model name. Look up
    the newest models on the OpenAI API website, they add them often!
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的代码创建了一个 `ChatOpenAI` 类的实例，该类来自 `langchain_openai` 模块，作为 OpenAI 语言模型的接口，特别是
    GPT-4o mini 模型。这个模型以比旧模型更大的折扣发布。使用这个模型可以帮助你降低推理成本，同时仍然允许你使用最新的模型！如果你想尝试 ChatGPT
    的不同版本，比如 GPT-5，只需更改模型名称即可。在 OpenAI API 网站上查找最新的模型，他们经常添加新的模型！
- en: Step 10 – setting up a LangChain chain using LCEL
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 10 步 – 使用 LCEL 设置 LangChain 链
- en: This *chain* is in a code format specific to LangChain called LCEL. You will
    see me using LCEL throughout the code from here on out. Not only does it make
    the code easier to read and more concise, but it also opens up new techniques
    focused on improving the speed and efficiency of your LangChain code.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 *链* 使用的是 LangChain 特定的代码格式，称为 LCEL。从现在开始，你将看到我会在代码中使用 LCEL。这不仅使代码更容易阅读和更简洁，而且还开辟了专注于提高
    LangChain 代码速度和效率的新技术。
- en: 'If you walk through this chain, you’ll see that it provides a great representation
    of the entire RAG process:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遍历这个链，你会看到它提供了整个 RAG 流程的绝佳表示：
- en: '[PRE13]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: All of these components have already been described, but to summarize, the `rag_chain`
    variable represents a chain of operations using the LangChain framework. Let’s
    walk through each step of the chain, digging into what is happening at each point.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些组件都已经描述过了，但为了总结，`rag_chain` 变量代表使用 LangChain 框架的一系列操作。让我们逐一分析链中的每个步骤，深入了解每个点的具体情况。
- en: The first *link* in the chain can be called **retrieval** since that is what
    it handles. However, it has its own chain. Let’s break this step down even further.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 链中的第一个 *链接* 可以称为 **检索**，因为它处理的就是这个。然而，它有自己的链。让我们进一步分解这个步骤。
- en: 'When we call on the `rag_chain` variable in a moment, we will pass it a “question.”
    As shown in the preceding code, the chain starts with a dictionary that defines
    two keys: `"context"` and `"question"`. The question part is pretty straightforward,
    but where does the context come from? The `"context"` key assigned is the result
    of the `retriever | format_docs` operation.'
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当我们稍后调用 `rag_chain` 变量时，我们将传递一个“问题”。如前述代码所示，链从定义两个键的字典开始：“`context`”和“`question`”。问题部分相当直接，但“`context`”键是从
    `retriever | format_docs` 操作的结果中分配的。
- en: Does `format_docs` sound familiar? That’s because we just set up that function
    previously. Here, we use that function alongside `retriever`. The `|` operator,
    called a pipe, between `retriever` and `format_docs` indicates that we are chaining
    these operations together. So, in this case, the `retriever` object is *piped*
    into the `format_docs` function. We are running the retriever operation here,
    which is the vector similarity search. The similarity search should return a set
    of matches; that set of matches is what is passed to the function. Our `format_docs`
    function, as described earlier, is then used on the content provided by the retriever
    to format all the results of that retriever into a single string. That complete
    string is then assigned to the *context*, which, as you may remember, is a variable
    in our prompt. The expected input format of the next step is a dictionary with
    two keys, that is, `"context"` and `"question"`. The values that are assigned
    to these keys are expected to be strings. So, we can’t just pass retriever output,
    which is a list of objects. This is why we use the `format_docs` function to convert
    the retriever results into the string we need for the next step. Let’s go back
    to the *question* that was passed into the chain, which is already in the string
    format we require. We don’t need any formatting! So, we use the `RunnablePassthrough()`
    object to just let that input (the question provided) pass through as the string
    that it is already formatted as. That object takes the question we pass into the
    `rag_chain` variable and passes it through without any modification. We now have
    our first step in the chain, which is defining the two variables that the prompt
    in the next step accepts.
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`format_docs`听起来熟悉吗？这是因为我们之前刚刚设置了那个函数。在这里，我们使用该函数与`retriever`一起。位于`retriever`和`format_docs`之间的`|`操作符，被称为管道，表示我们将这些操作串联在一起。因此，在这种情况下，`retriever`对象被*管道化*到`format_docs`函数中。我们在这里运行检索操作，即向量相似度搜索。相似度搜索应该返回一组匹配项；那一组匹配项就是传递给函数的内容。正如之前所描述的，我们的`format_docs`函数随后用于对检索器提供的内容进行格式化，将检索器的所有结果格式化为单个字符串。这个完整的字符串随后被分配给*上下文*，正如你可能记得的，这是一个在我们的提示中的变量。下一步的预期输入格式是一个包含两个键的字典，即`"context"`和`"question"`。分配给这些键的值预期是字符串。因此，我们不能直接传递检索器的输出，它是一个对象列表。这就是为什么我们使用`format_docs`函数将检索器结果转换为下一步所需的字符串。让我们回到传递到链中的*问题*，它已经是我们需要的字符串格式。我们不需要任何格式化！因此，我们使用`RunnablePassthrough()`对象仅让那个输入（提供的提问）以它已经格式化的字符串形式通过。该对象接收我们传递给`rag_chain`变量的提问，并毫无修改地传递它。我们现在有了链中的第一步，即定义下一步提示接受的两个变量。'
- en: We can see another pipe (`|`) followed by the `prompt` object, and we *pipe*
    the variables (in a dictionary) into that `prompt` object. This is known as hydrating
    the prompt. As mentioned previously, the prompt object is a prompt template that
    defines what we will pass to the LLM, and it typically includes input variables
    (context and question) that are filled/hydrated first. The result of this second
    step is the full prompt text as a string, with the variables filling in the placeholders
    for context and question. Then, we have another pipe (`|`) and the `llm` object
    that we defined earlier. As we have seen already, this step in the chain takes
    the output from the previous step, which is the prompt string that includes all
    the information from previous steps. The `llm` object represents the language
    model we set up, which in this case is GPT-4o mini. The formatted prompt string
    is passed as input to the language model, which generates a response based on
    the provided context and question.
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们可以看到另一个管道（`|`）后面跟着`prompt`对象，我们将（字典中的）变量*管道化*到那个`prompt`对象中。这被称为填充提示。如前所述，提示对象是一个提示模板，它定义了我们将要传递给LLM的内容，并且通常包括首先填充/填充的输入变量（上下文和问题）。这一第二步的结果是完整的提示文本作为一个字符串，变量填充了上下文和问题的占位符。然后，我们又有另一个管道（`|`）和之前定义的`llm`对象。正如我们已经看到的，链中的这一步接受前一步的输出，即包含之前步骤所有信息的提示字符串。`llm`对象代表我们设置的语模型，在这个例子中是GPT-4o
    mini。格式化的提示字符串作为输入传递给语言模型，该模型根据提供的上下文和问题生成响应。
- en: It almost seems like this would be enough, but when you use an LLM API, it is
    not just sending you the text you might see when you type something into ChatGPT.
    It is in JSON format and has a lot of other data included with it. So, to keep
    things simple, we are going to *pipe* the LLM’s output to the next step and use
    LangChain’s `StrOutputParser()` object. Note that `StrOutputParser()` is a utility
    class in LangChain that parses the key output of the language model into a string
    format. Not only does it strip away all the information you do not want to deal
    with right now, but it also ensures that the generated response is returned as
    a string.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这几乎看起来就足够了，但当你使用LLM API时，它不仅仅是你输入ChatGPT时可能看到的文本。它是JSON格式，并包含很多其他数据。因此，为了保持简单，我们将LLM的输出通过管道传输到下一步，并使用LangChain的`StrOutputParser()`对象。请注意，`StrOutputParser()`是LangChain中的一个实用类，它将语言模型的关键输出解析为字符串格式。它不仅移除了你现在不想处理的所有信息，而且还确保生成的响应以字符串的形式返回。
- en: Let’s take a moment to appreciate everything we just did here. This *chain*
    we created using LangChain represents the core code for our entire RAG pipeline,
    and it is just a few strings long!
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们花点时间来欣赏我们刚刚所做的一切。我们使用LangChain创建的这个链代表了整个RAG管道的核心代码，而且它只有几行字符串长！
- en: When the user uses your application, it will start with the user query. But
    from a coding standpoint, we set up everything else so that we can process the
    query properly. At this point, we are ready to accept the user query, so let’s
    review this last step in our code.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户使用您的应用程序时，它将从用户查询开始。但从编码的角度来看，我们设置了所有其他内容，以便我们可以正确处理查询。在这个阶段，我们已经准备好接受用户查询，所以让我们回顾一下代码中的最后一步。
- en: Step 11 – submitting a question for RAG
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第11步 – 向RAG提交问题
- en: 'So far, you have defined the chain, but you haven’t run it. So, let’s run the
    entire RAG pipeline in this one line, using a query you are feeding in:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经定义了链，但还没有运行它。所以，让我们用一行代码运行整个RAG管道，使用你提供的查询：
- en: '[PRE14]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: As mentioned when stepping through what happens in the chain, `"What are the
    advantages of using RAG?"` is the string we are going to pass into the chain to
    begin with. The first step in the chain expects this string as the question we
    discussed in the previous section, as one of the two expected variables. In some
    applications, this may not be in the proper format and will need an extra function
    to prepare it, but for this application, it is already in the string format we
    are expecting, so we pass it right into that `RunnablePassThrough()` object.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 如同在链中逐步查看发生的事情时提到的，`"What are the advantages of using RAG?"`是我们一开始要传递给链的字符串。链中的第一步期望这个字符串作为我们之前讨论的问题，作为两个期望变量之一。在某些应用中，这可能不是正确的格式，需要额外的函数来准备，但在这个应用中，它已经是我们期望的字符串格式，所以我们直接传递给那个`RunnablePassThrough()`对象。
- en: In the future, this prompt will include a query from a user interface, but for
    now, we will represent it as this variable string. Keep in mind that this is not
    the only text the LLM will see; you added a more robust prompt defined by `prompt`
    previously, hydrated by the `"context"` and `"question"` variables.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来，这个提示将包括来自用户界面的查询，但就目前而言，我们将它表示为这个变量字符串。请注意，这不是LLM将看到的唯一文本；你之前添加了一个更健壮的提示，由`prompt`定义，并通过`"context"`和`"question"`变量进行填充。
- en: That is it from a coding standpoint! But what happens when you run the code?
    Let’s review the output you can expect from this RAG pipeline code.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 从编码的角度来看，这就结束了！但当你运行代码时会发生什么呢？让我们回顾一下从这个RAG管道代码中可以预期的输出。
- en: Final output
  id: totrans-200
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终输出
- en: 'The final output will look something like this:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 最终输出将看起来像这样：
- en: '[PRE15]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'This has some basic formatting in it, so when it’s displayed, it will look
    like this (including the bullets and bolded text):'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这里面有一些基本的格式，所以当它显示时，它将看起来像这样（包括项目符号和粗体文本）：
- en: '[PRE16]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'For your use case, you will need to make decisions by asking questions such
    as: Could a less expensive model do a good enough job at a significantly reduced
    cost? Or do I need to spend the extra money to get more robust responses? Your
    prompt may have said to keep it very brief, and you end up with the same shorter
    response as a less expensive model anyway, so why spend the extra money? This
    is a common consideration when using these models, and in many cases, the largest,
    most expensive models are not always what is needed to meet the requirements of
    the application.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 对于您的用例，您需要通过提出以下问题来做出决策：是否可以使用更便宜的模式以显著降低成本完成足够好的工作？或者我需要额外花钱以获得更稳健的响应？您的提示可能要求非常简短，但最终您仍然会得到与较便宜模型相同的较短的响应，那么为什么还要额外花钱呢？这在使用这些模型时是一个常见的考虑因素，在许多情况下，最大的、最昂贵的模型并不总是满足应用程序需求所需的。
- en: 'Here’s what the LLM will see when you combine this with the RAG-focused prompt
    from earlier:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将此与之前的RAG重点提示结合使用时，LLM将看到以下内容：
- en: '[PRE17]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: As you can see, the context is quite large; it returns all of the most relevant
    information from the original document to help the LLM determine how to answer
    the new question. The context is what was returned by the vector similarity search,
    something we will talk about in more depth in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，上下文相当大；它返回了原始文档中所有最相关的信息，以帮助LLM确定如何回答新问题。上下文是向量相似度搜索返回的内容，我们将在[*第8章*](B34736_08_ePub.xhtml#_idTextAnchor176)中更深入地讨论这一点。
- en: Summary
  id: totrans-209
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter provided a comprehensive code lab that walked through the implementation
    of a complete RAG pipeline. We began by installing the necessary Python packages,
    including LangChain, Chroma DB, and various LangChain extensions. Then, we learned
    how to set up an OpenAI API key, load documents from a web page using `WebBaseLoader`,
    and preprocess the HTML content with Beautiful Soup to extract relevant sections.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了一个全面的代码实验室，详细介绍了完整RAG管道的实现。我们首先安装了必要的Python包，包括LangChain、Chroma DB和各种LangChain扩展。然后，我们学习了如何设置OpenAI
    API密钥，使用`WebBaseLoader`从网页中加载文档，并使用Beautiful Soup预处理HTML内容以提取相关部分。
- en: Next, the loaded documents were split into manageable chunks using `RecursiveCharacterTextSplitter`
    from LangChain’s `text-splitters` module. These chunks were then embedded into
    vector representations using OpenAI’s embedding model and stored in a Chroma DB
    vector database.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用LangChain的`text-splitters`模块中的`RecursiveCharacterTextSplitter`将加载的文档分割成可管理的块。然后，这些块被嵌入到OpenAI的嵌入模型中，并存储在Chroma
    DB向量数据库中。
- en: After that, we introduced the concept of a retriever, which is used to perform
    a vector similarity search on the embedded documents based on a given query. We
    stepped through the retrieval and generation stages of RAG, which in this case
    are combined into a LangChain chain using the LCEL. The chain integrates pre-built
    prompt templates from LangChain Hub, a selected LLM, and utility functions for
    formatting retrieved documents and parsing LLM outputs.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们引入了检索器的概念，它用于根据给定的查询在嵌入的文档上执行向量相似度搜索。我们逐步介绍了RAG的检索和生成阶段，在这个案例中，这些阶段通过LCEL结合成一个LangChain链。该链集成了来自LangChain
    Hub的预构建提示模板、选定的LLM以及用于格式化检索文档和解析LLM输出的实用函数。
- en: We also learned how to submit a question to the RAG pipeline and receive a generated
    response that incorporates the retrieved context. We saw the output from the LLM
    and discussed key considerations for choosing the appropriate model based on accuracy,
    depth, and cost.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还学习了如何向RAG管道提交问题并接收一个包含检索上下文的生成响应。我们看到了LLM的输出，并讨论了根据准确性、深度和成本选择适当模型的关键考虑因素。
- en: Finally, the complete code for a RAG pipeline was provided! That’s it! You can
    close this book for now and still be able to build an entire RAG application.
    Good luck! But before you go, there are still many concepts to review so that
    you can optimize your RAG pipeline. If you do a quick search of the web for trouble
    with RAG or something similar, you will likely find millions of questions and
    problems highlighted where RAG applications have issues with all but the simplest
    of applications. There are also many other solutions that RAG can solve that need
    the code just provided to be adjusted. The rest of this book is dedicated to helping
    you build up knowledge that will help you get past any of these problems and form
    many new solutions. If you hit a similar challenge, don’t despair! There is a
    solution! It just might take the time to go beyond *Chapter 2*!
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，RAG管道的完整代码已提供！这就足够了！现在您可以关闭这本书，仍然能够构建一个完整的RAG应用。祝您好运！但在您离开之前，还有许多概念需要复习，以便您优化您的RAG管道。如果您在网上快速搜索RAG或类似的问题，您可能会找到数百万个问题和高亮显示的问题，这些问题表明RAG应用在除了最简单的应用之外的所有应用中都存在问题。还有许多其他问题需要RAG解决，需要调整刚刚提供的代码。本书的其余部分致力于帮助您构建知识，帮助您克服任何这些问题，并形成许多新的解决方案。如果您遇到类似的挑战，不要绝望！有解决方案！但这可能需要您超越*第二章*！
- en: 'In the next chapter, we will take some of the practical applications we discussed
    in [*Chapter 1*](B34736_01_ePub.xhtml#_idTextAnchor020) and dive much deeper into
    how they are being implemented in various organizations. We will also provide
    some hands-on code related to one of the most common practical applications of
    RAG: providing the sources of the content that the RAG application is quoting
    to you.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨在[*第一章*](B34736_01_ePub.xhtml#_idTextAnchor020)中讨论的一些实际应用，并深入探讨它们在各个组织中的实施方式。我们还将提供一些与RAG（关系抽取和生成）最常见实际应用相关的实际代码：提供RAG应用引用给您的内容的来源。
