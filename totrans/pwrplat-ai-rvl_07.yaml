  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择“合并演示文稿”操作。
- en: Enter a `Presentation.pptx`).
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入 `Presentation.pptx`）。
- en: Under **Advanced parameters**, select **Show all**.
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“高级参数”下，选择“显示所有”。
- en: 'In the `<``guid>.PPTX` names:'
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `<``guid>.PPTX` 名称中：
- en: '![Figure 7.43 – Changing the input type](img/B21234_07_43.jpg)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![图7.43 – 更改输入类型](img/B21234_07_43.jpg)'
- en: Figure 7.43 – Changing the input type
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.43 – 更改输入类型
- en: 'Click inside the **Documents Item** field and select the dynamic content token
    icon. Under **Compose PowerPoint Slides**, choose **Outputs**:'
  id: totrans-266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“文档项”字段内点击，并选择动态内容令牌图标。在“组合演示文稿幻灯片”下，选择“输出”：
- en: '![Figure 7.44 – Updating the Document Item field](img/B21234_07_44.jpg)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![图7.44 – 更新文档项字段](img/B21234_07_44.jpg)'
- en: Figure 7.44 – Updating the Document Item field
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.44 – 更新文档项字段
- en: Collapse the **Merge** **Presentations** flyout.
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收起 **合并演示文稿** 飞出菜单。
- en: 'Drag the **Merge Presentations** card outside of the **Apply to each** and
    **Scope – Generate Slides** cards and place it on the **+** icon below the scope
    card. See *Figure 7**.**45*:'
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 **合并演示文稿** 卡片拖动到 **应用至每个** 和 **范围 – 生成幻灯片** 卡片之外，并将其放置在范围卡片下方的 **+** 图标上。参见
    *图 7**.**45*：
- en: '![Figure 7.45 – Moving the Merge Presentations card](img/B21234_07_45.jpg)'
  id: totrans-271
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.45 – 移动合并演示文稿卡片](img/B21234_07_45.jpg)'
- en: Figure 7.45 – Moving the Merge Presentations card
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.45 – 移动合并演示文稿卡片
- en: This order of steps is necessary to ensure that the **Compose PowerPoint Slides**
    output can be chosen from the dynamic content menu.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 此步骤顺序是必要的，以确保可以从动态内容菜单中选择 **组合 PowerPoint 幻灯片** 输出。
- en: Click the **+** icon after **Merge Presentations** and then select **Add a step**
    to add it to the end of the flow.
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **合并演示文稿** 后的 **+** 图标，然后选择 **添加步骤** 将其添加到流程末尾。
- en: Select the **Create file** action (either SharePoint or OneDrive for Business),
    depending on where you want the output. It does not have to be in the same location
    where the template file is stored.
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据您希望输出位置选择 **创建文件** 动作（SharePoint 或 OneDrive for Business），它不必存储模板文件的同一位置。
- en: On the **Create file** flyout, select the location (either a **Folder Path**
    location if you chose OneDrive for Business or a **Site Address** and **Folder
    Path** location if you chose SharePoint Online).
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **创建文件** 飞出菜单中，选择位置（如果您选择 OneDrive for Business，则为 **文件夹路径** 位置；如果您选择 SharePoint
    Online，则为 **网站地址** 和 **文件夹路径** 位置）。
- en: In the **File Name** field, add the **Filename** dynamic content token from
    the **Merge** **Presentations** action.
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **文件名** 字段中，从 **合并演示文稿** 动作中添加 **文件名** 动态内容令牌。
- en: 'In the **File Content** field, add the **File Content** dynamic content token
    from the **Merge Presentations** action, as shown in *Figure 7**.4**6*:'
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **文件内容** 字段中，添加来自 **合并演示文稿** 动作的 **文件内容** 动态内容令牌，如图 *图 7**.4**6* 所示：
- en: '![Figure 7.46 – Selecting the File Content dynamic content token](img/B21234_07_46.jpg)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.46 – 选择文件内容动态内容令牌](img/B21234_07_46.jpg)'
- en: Figure 7.46 – Selecting the File Content dynamic content token
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.46 – 选择文件内容动态内容令牌
- en: Click **Save**.
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **保存**。
- en: Click the **Flow checker** area to ensure your flow contains no obvious errors.
    When you’re finished with that, it’s time to test the flow!
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 **流程检查器** 区域以确保您的流程不包含明显错误。完成这些后，就是时候测试流程了！
- en: Testing the flow
  id: totrans-283
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试流程
- en: 'To test the flow, follow these steps:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试流程，请按照以下步骤操作：
- en: Open a new browser tab. Navigate to Wikipedia ([https://en.wikipedia.org](https://en.wikipedia.org))
    and search for an article of your choosing. For this example, you might try searching
    for `Sailing` or `History` `of cryptography`.
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个新的浏览器标签页。导航到维基百科 ([https://en.wikipedia.org](https://en.wikipedia.org))
    并搜索您选择的文章。例如，您可以尝试搜索 `航海` 或 `密码学历史`。
- en: After the article loads, click the URL bar and copy the URL value using *Ctrl*
    + *C*.
  id: totrans-286
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在文章加载后，点击 URL 栏并使用 *Ctrl* + *C* 复制 URL 值。
- en: Switch back to the browser tab that’s running the Power Automate canvas.
  id: totrans-287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 切换回运行 Power Automate 画布的浏览器标签页。
- en: 'Click the **beaker** icon labeled **Test**:'
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击标记为 **测试** 的 **试管** 图标：
- en: '![Figure 7.47 – Preparing to test the flow](img/B21234_07_47.jpg)'
  id: totrans-289
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.47 – 准备测试流程](img/B21234_07_47.jpg)'
- en: Figure 7.47 – Preparing to test the flow
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.47 – 准备测试流程
- en: On the **Test Flow** flyout, select the **Manually** radio button and click
    **Test**.
  id: totrans-291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **测试流程** 飞出菜单中，选择 **手动** 单选按钮并点击 **测试**。
- en: 'If prompted, confirm any permissions and click **Continue**:'
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果提示，确认任何权限并点击 **继续**：
- en: '![Figure 7.48 – Confirming permissions for the flow](img/B21234_07_48.jpg)'
  id: totrans-293
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.48 – 确认流程的权限](img/B21234_07_48.jpg)'
- en: Figure 7.48 – Confirming permissions for the flow
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.48 – 确认流程的权限
- en: 'Paste the copied Wikipedia URL into the prompt area and click **Run flow**:'
  id: totrans-295
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将复制的维基百科 URL 粘贴到提示区域，然后点击 **运行流程**：
- en: '![Figure 7.49 – Entering a URL](img/B21234_07_49.jpg)'
  id: totrans-296
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.49 – 输入 URL](img/B21234_07_49.jpg)'
- en: Figure 7.49 – Entering a URL
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.49 – 输入 URL
- en: Click **Done** to return to the canvas and watch the flow run execute.
  id: totrans-298
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **完成** 返回画布并观察流程运行执行。
- en: 'Wait while the flow executes:'
  id: totrans-299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在流程执行时等待：
- en: '![Figure 7.50 – Waiting for the flow to complete](img/B21234_07_50.jpg)'
  id: totrans-300
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.50 – 等待流程完成](img/B21234_07_50.jpg)'
- en: Figure 7.50 – Waiting for the flow to complete
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.50 – 等待流程完成
- en: After the flow has been completed, navigate to the location where you specified
    the completed presentation should be saved.
  id: totrans-302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 流程完成后，导航到您指定完成演示文稿应保存的位置。
- en: 'Open the presentation:'
  id: totrans-303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开演示文稿：
- en: '![Figure 7.51 – Launching the presentation](img/B21234_07_51.jpg)'
  id: totrans-304
  prefs: []
  type: TYPE_IMG
  zh: '![图7.51 – 启动演示文稿](img/B21234_07_51.jpg)'
- en: Figure 7.51 – Launching the presentation
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.51 – 启动演示文稿
- en: 'Review the completed presentation, taking note of how the content tokens in
    the slide were replaced with the corresponding JSON values that were passed to
    the Encodian Flowr connector:'
  id: totrans-306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看完成的演示文稿，注意幻灯片中的内容标记是如何被传递给Encodian Flowr连接器的相应JSON值所替换的：
- en: '![Figure 7.52 – Reviewing the completed presentation](img/B21234_07_52.jpg)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![图7.52 – 查看完成的演示文稿](img/B21234_07_52.jpg)'
- en: Figure 7.52 – Reviewing the completed presentation
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.52 – 查看完成的演示文稿
- en: That’s it! You’ve now created an entire PowerPoint presentation just by scraping
    website content.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！您现在已经通过抓取网站内容创建了一个完整的PowerPoint演示文稿。
- en: Further exploration
  id: totrans-310
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步探索
- en: 'Think about all the ways you can further expand, reuse, or repurpose this type
    of solution to build slide decks from different types of content sources:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 想想您可以用哪些方式进一步扩展、重用或重新利用此类解决方案，从不同类型的内容源构建幻灯片：
- en: Quarterly reports
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 季度报告
- en: Executive summaries
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行摘要
- en: Sales reports
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售报告
- en: By combining the power of Generative AI with automation for common Microsoft
    365 Apps document creation tools, you can create presentations in a snap!
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将生成式AI的力量与Microsoft 365 Apps文档创建工具的自动化功能相结合，您可以轻松创建演示文稿！
- en: Summary
  id: totrans-316
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter demonstrated some of the incredible capabilities that are available
    by harnessing the power of Generative AI. By using the native AI Builder ChatGPT
    connector, you were able to ingest web content from the world’s largest online
    encyclopedia, summarize it, and turn it into a PowerPoint presentation (with the
    help of the Encodian Flowr connector).
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 本章展示了通过利用生成式AI的强大功能所能实现的令人难以置信的能力。通过使用本地的AI Builder ChatGPT连接器，您能够从世界上最大的在线百科全书获取网络内容，对其进行总结，并将其转换为PowerPoint演示文稿（借助Encodian
    Flowr连接器的帮助）。
- en: Using the skills you learned here, you could adapt this flow to pull together
    reports and presentations from content stored in SharePoint, OneDrive, or other
    websites and documents.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 使用在这里学到的技能，您可以调整此流程，从存储在SharePoint、OneDrive或其他网站和文档中的内容中提取报告和演示文稿。
- en: In the next chapter, we’ll learn about using the AI Builder ID reader model.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将学习如何使用AI Builder ID读取器模型。
