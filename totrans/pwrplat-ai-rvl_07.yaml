  prefs: []
  type: TYPE_NORMAL
- en: Further exploration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Think about all the ways you can further expand, reuse, or repurpose this type
    of solution to build slide decks from different types of content sources:'
  prefs: []
  type: TYPE_NORMAL
- en: Quarterly reports
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Executive summaries
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sales reports
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By combining the power of Generative AI with automation for common Microsoft
    365 Apps document creation tools, you can create presentations in a snap!
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter demonstrated some of the incredible capabilities that are available
    by harnessing the power of Generative AI. By using the native AI Builder ChatGPT
    connector, you were able to ingest web content from the world’s largest online
    encyclopedia, summarize it, and turn it into a PowerPoint presentation (with the
    help of the Encodian Flowr connector).
  prefs: []
  type: TYPE_NORMAL
- en: Using the skills you learned here, you could adapt this flow to pull together
    reports and presentations from content stored in SharePoint, OneDrive, or other
    websites and documents.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll learn about using the AI Builder ID reader model.
  prefs: []
  type: TYPE_NORMAL
