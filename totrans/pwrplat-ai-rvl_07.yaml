  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Wait while the flow executes:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.50 – Waiting for the flow to complete](img/B21234_07_50.jpg)'
