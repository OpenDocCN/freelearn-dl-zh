    **Run history** area, selecting the output of the **Create text with GPT using
    a prompt** action, and then pasting it into the **Use sample payload to generate**
    **schema** popup.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Click **Save**. Do not close the Power Automate flow canvas.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, we’ll start sending data to the Encodian connector.
