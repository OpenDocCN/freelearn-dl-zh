- en: Configuring the JSON parameters
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置JSON参数
- en: 'In this section, we’ll import the JSON schema or definition of how the content
    is structured. To get the schema output, you’ll need to manually construct the
    API endpoint with the necessary parameters and then insert an article name. Follow
    these steps:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将导入JSON模式或内容结构的定义。要获取模式输出，您需要手动构造带有必要参数的API端点，然后插入文章名称。按照以下步骤操作：
- en: 'Launch a new browser tab, navigate to [https://en.wikipedia.org](https://en.wikipedia.org),
    and search for any article of your choosing. In this example, `/` character –
    for example, `History_of_cryptography`. See *Figure 7**.1**8*:'
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个新的浏览器标签页，导航到[https://en.wikipedia.org](https://en.wikipedia.org)，并搜索你选择的任何文章。在这个例子中，`/`字符
    – 例如，`History_of_cryptography`。见*图7**.1**8*：
- en: '![Figure 7.18 – Extracting the relative URL of a Wikipedia article](img/B21234_07_18.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图7.18 – 提取维基百科文章的相对URL](img/B21234_07_18.jpg)'
- en: Figure 7.18 – Extracting the relative URL of a Wikipedia article
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.18 – 提取维基百科文章的相对URL
- en: 'Open a new browser tab and navigate to the Wikipedia API endpoint: [https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php).'
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个新的浏览器标签页并导航到维基百科API端点：[https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php)。
- en: 'At the end of the URL, append `?action=query&format=json&prop=extracts&titles=`
    and then paste the copied Wikipedia article value at the end of the URL bar –
    for example, `?action=query&format=json&prop=extracts&titles=History_of_cryptograpy`.
    The result should be a JSON-formatted object that contains the text of the Wikipedia
    article, as shown in *Figure 7**.1**9*:'
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在URL末尾附加`?action=query&format=json&prop=extracts&titles=`然后将复制的维基百科文章值粘贴到URL栏的末尾
    – 例如，`?action=query&format=json&prop=extracts&titles=History_of_cryptograpy`。结果应该是一个包含维基百科文章文本的JSON格式对象，如图*图7**.1**9*所示：
- en: '![Figure 7.19 – Viewing the JSON output of the Wikipedia API](img/B21234_07_19.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图7.19 – 查看维基百科API的JSON输出](img/B21234_07_19.jpg)'
- en: Figure 7.19 – Viewing the JSON output of the Wikipedia API
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.19 – 查看维基百科API的JSON输出
