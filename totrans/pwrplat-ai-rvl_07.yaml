- en: Creating the Generate Slides scope
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we’ll take the JSON object array and turn it into a PowerPoint
    slide deck. Follow these steps to process the AI-generated content:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Scroll to the bottom of the flow on the canvas and select the **+** icon outside
    the **Scope – Generate** **Summaries** control:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.31 – Adding a new step](img/B21234_07_31.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.31 – Adding a new step
  prefs: []
  type: TYPE_NORMAL
- en: Add a new scope control and rename it `Scope -` `Generate Slides`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the **+** icon and choose **Add an action** inside the **Scope - Generate**
    **Slides** card.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Choose the **Get file content using path** action for either SharePoint Online
    or OneDrive for Business, depending on where you saved your template file:'
