- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Using Power Automate and AI to Build PowerPoint Presentations
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Power Automate和AI构建PowerPoint演示文稿
- en: If you’ve ever been faced with a last-minute requirement to prepare a presentation
    for your boss or an activity club, you’re not alone. Whether it’s familiar content
    or something you’ve never seen before, condensing information and making it accessible
    to an audience is no small task.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您曾经面临过为老板或活动俱乐部准备演示文稿的最后一刻要求，您并不孤单。无论是熟悉的内容还是您以前从未见过的内容，压缩信息并使其对观众易于理解都不是一件小事情。
- en: In this chapter, we’ll start with everyone’s favorite open source knowledge
    base, Wikipedia, and use ChatGPT to summarize sections of it and insert it into
    a PowerPoint deck.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将从大家最喜欢的开源知识库维基百科开始，使用ChatGPT总结其部分内容并将其插入到PowerPoint演示文稿中。
- en: With a little bit of tweaking, you can reuse this same type of summarization
    tooling on documents stored in SharePoint, internal corporate websites, or other
    digital content sources.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 通过一点调整，您可以在存储在SharePoint、内部企业网站或其他数字内容源中的文档上重复使用这种类型的摘要工具。
- en: Licensing prerequisites
  id: totrans-5
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 许可证要求
- en: 'Using AI models and connectors in Power Platform has several prerequisites:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Platform中使用AI模型和连接器的几个先决条件：
- en: A subscription that includes Microsoft Dataverse
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含Microsoft Dataverse的订阅
- en: AI Builder capacity (or trial capacity)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI Builder容量（或试用容量）
- en: Power Apps or Power Automate premium licensing
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Power Apps或Power Automate高级许可证
- en: If you haven’t already enabled Dataverse and AI Builder capacity, see [*Chapter
    2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to Support
    AI Services*, and [*Chapter 6*](B21234_06.xhtml#_idTextAnchor069), *Processing
    Data with* *Sentiment Analysis*.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您尚未启用Dataverse和AI Builder容量，请参阅[*第2章*](B21234_02.xhtml#_idTextAnchor027)，*配置支持AI服务的环境*，以及[*第6章*](B21234_06.xhtml#_idTextAnchor069)，*使用情感分析处理数据*。
- en: Since Power Automate does not have a native connector for PowerPoint, this particular
    solution requires a third-party connector product by software vendor **Encodian**.
    This connector allows you to transform standard Power Automate objects into PowerPoint
    content.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Power Automate没有内置的PowerPoint连接器，这个特定的解决方案需要第三方连接器产品，由软件供应商**Encodian**提供。此连接器允许您将标准的Power
    Automate对象转换为PowerPoint内容。
- en: 'Encodian offers a free 30-day trial, including 500 credits, of the Flowr connector
    at [https://www.encodian.com/product/flowr/](https://www.encodian.com/product/flowr/):'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Encodian在[https://www.encodian.com/product/flowr/](https://www.encodian.com/product/flowr/)提供免费的30天试用，包括500个积分的Flowr连接器：
- en: '![Figure 7.1 – Establishing a Flowr trial](img/B21234_07_01.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图7.1 – 设置Flowr试用](img/B21234_07_01.jpg)'
- en: Figure 7.1 – Establishing a Flowr trial
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1 – 设置Flowr试用
- en: 'After signing up, you will receive an API key (sample shown in *Figure 7**.2*)
    that you can use to configure the Encodian connector in Power Automate:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在注册后，您将收到一个API密钥（如图*图7.2*.2*所示），您可以使用它来配置Power Automate中的Encodian连接器：
- en: '![Figure 7.2 – Sample Encodian API key](img/B21234_07_02.jpg)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图7.2 – Encodian API密钥示例](img/B21234_07_02.jpg)'
- en: Figure 7.2 – Sample Encodian API key
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2 – Encodian API密钥示例
- en: Once that’s activated, you’ll want to build a generic PowerPoint template file
    that can be saved and reused whenever you need it!
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦激活，您将想要创建一个通用的PowerPoint模板文件，这样您就可以在需要时保存和重复使用它！
- en: Learning about the Encodian Flowr connector
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 了解Encodian Flowr连接器
- en: 'Before you get started working on a flow, you’ll need to understand how to
    use the Encodian Flowr connector and its actions. In this section, we’ll look
    at the critical pieces that are needed to make this flow work. To successfully
    work with the connector and actions, you’ll need to understand the following concepts,
    terminology, and actions:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在您开始处理流程之前，您需要了解如何使用Encodian Flowr连接器和其动作。在本节中，我们将查看使此流程正常工作所需的关键部分。为了成功使用连接器和动作，您需要了解以下概念、术语和动作：
- en: Input formatting
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入格式化
- en: Tokens
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 令牌
- en: The **Populate** **PowerPoint** action
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**填充** **PowerPoint** 动作'
- en: The **Merge** **Presentations** action
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合并** **演示文稿** 动作'
- en: Let’s take a quick look at each of these areas!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速浏览一下这些领域的每个部分！
- en: Input formatting
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 输入格式化
- en: 'Many of Encodian’s content manipulation actions require the use of structured
    data. In this case, structured data is typically supplied in the **JavaScript
    Object Notation** (**JSON**) syntax:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: Encodian的许多内容操作都需要使用结构化数据。在这种情况下，结构化数据通常以**JavaScript对象表示法**（**JSON**）语法提供：
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: As shown in this simple example, the JSON text is formatted as a **key/value**
    (think *term:definition*) pair. JSON, like many programming constructs, also has
    the concept of **arrays** or **collections**. An array or collection is a group
    of similar objects.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如此简单示例所示，JSON文本格式化为**键/值**（想想*术语：定义*）对。JSON，就像许多编程结构一样，也有**数组**或**集合**的概念。数组或集合是一组相似的对象。
- en: 'Let’s say you wanted to list a collection containing various kinds of foods.
    It might look something like this when formatted as JSON:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想要列出一个包含各种食物的集合。当格式化为JSON时，它可能看起来像这样：
- en: '[PRE1]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'In the `foods` JSON object, you can see several examples of how data values
    are specified. There are both standard key/value pairs (as in `"category":"fruit"`),
    which identify a single object, as well as arrays (such as `"data": [ {"type":
    "sorghum","count":1"},{"type":"wheat","count": 3}]`), which are used to identify
    groups of key/value pairs.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '在`foods` JSON对象中，你可以看到如何指定数据值的几个示例。既有标准键/值对（如`"category":"fruit"`），用于标识单个对象，也有数组（如`"data":
    [{"type": "sorghum","count":1},{"type":"wheat","count": 3}]`），用于标识键/值对组。'
- en: A JSON object can include a variety of data types, including **strings** (text),
    **integers** (numbers), **arrays** (collections of strings or key/value pairs),
    **Boolean** values (True or False), as well as other JSON objects.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: JSON对象可以包含各种数据类型，包括**字符串**（文本）、**整数**（数字）、**数组**（字符串或键/值对的集合）、**布尔**值（True或False），以及其他JSON对象。
- en: Further reading
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: JSON is an extraordinarily flexible format for working with structured content
    since it’s both human-readable as well as platform and language-agnostic. For
    more information on working with JSON objects and syntax, see [https://www.w3schools.com/JS/js_json_intro.asp](https://www.w3schools.com/JS/js_json_intro.asp).
    You can also use tools such as [https://jsonformatter.org/](https://jsonformatter.org/)
    to help ensure your JSON is formatted correctly.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: JSON是一种非常灵活的格式，用于处理结构化内容，因为它既易于阅读，又与平台和语言无关。有关处理JSON对象和语法的更多信息，请参阅[https://www.w3schools.com/JS/js_json_intro.asp](https://www.w3schools.com/JS/js_json_intro.asp)。你还可以使用[https://jsonformatter.org/](https://jsonformatter.org/)等工具来帮助确保你的JSON格式正确。
- en: Tokens
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 标记
- en: Several of the Flowr actions work with specially formatted **tags** (or **tokens**,
    as Encodian refers to them), which the connector will use in a find-and-replace
    fashion with the content you supply.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Flowr的几个操作与特别格式化的**标签**（或Encodian所说的**标记**）一起工作，连接器将使用这些标签以查找和替换的方式与您提供的内容一起使用。
- en: 'Let’s say, for example, you wanted Flowr to place the words or phrase “The
    quick brown fox did some things” inside a document. You might decide to assign
    that phrase to a token named `fox`. Inside the document template, you would indicate
    the locations you want this text to appear in by typing the token name surrounded
    by a series of square and angled brackets:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你想要Flowr将单词或短语“The quick brown fox did some things”放入一个文档中。你可能会决定将这个短语分配给名为`fox`的标记。在文档模板中，你会通过输入一系列方括号和尖括号包围的标记名称来指示你想要此文本出现的位置：
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'See *Figure 7**.3* for an example of a token inside a PowerPoint slide:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅*图7**.3*以了解PowerPoint幻灯片中一个标记的示例：
- en: '![Figure 7.3 – Viewing the <<[fox]>> token inside a PowerPoint slide](img/B21234_07_03.jpg)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图7.3 – 在PowerPoint幻灯片中查看<<[fox]>>标记](img/B21234_07_03.jpg)'
- en: Figure 7.3 – Viewing the <<[fox]>> token inside a PowerPoint slide
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3 – 在PowerPoint幻灯片中查看<<[fox]>>标记
- en: Populate PowerPoint
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 填充PowerPoint
- en: The **Populate PowerPoint** action does just what it says – it’s the primary
    action that’s used to place content into a PowerPoint slide. After assigning values
    to the tokens, the **Populate PowerPoint** action will search the template files,
    replacing the tokens with the values. The inputs to this will be the token/content
    key/value pairs and any source PowerPoint template files. The output will be a
    completed PowerPoint slide.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**填充PowerPoint**操作正是其名称所表示的——它是将内容放入PowerPoint幻灯片的主要操作。在分配标记值后，**填充PowerPoint**操作将搜索模板文件，用值替换标记。此操作的输入将是标记/内容键/值对以及任何源PowerPoint模板文件。输出将是一个完成的PowerPoint幻灯片。'
- en: Merge Presentations
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合并演示文稿
- en: Finally, the **Merge Presentations** action can be used to compile the modified
    PowerPoint pages into a single, cohesive document. The inputs will be the generated
    PowerPoint files (typically, one slide per file) and the output will be a single
    multi-slide PowerPoint deck.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，可以使用**合并演示文稿**操作将修改后的PowerPoint页面编译成一个单一、连贯的文档。输入将是生成的PowerPoint文件（通常，每个文件一个幻灯片）和输出将是一个多幻灯片的PowerPoint演示文稿。
- en: Now that you’re familiar with the core concepts that we’ll be using during the
    flow, it’s time to start working!
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经熟悉了我们将要在流程中使用的核心概念，是时候开始工作了！
- en: Interacting with Wikipedia articles
  id: totrans-48
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与维基百科文章交互
- en: 'Since the source of our content for this example is going to be a Wikipedia
    article, it’s important to understand how to gather the data. Wikipedia has an
    API endpoint ([https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php))
    that returns the page content as JSON, as shown in *Figure 7**.4*:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 由于本例中内容的来源将是一个维基百科文章，因此了解如何收集数据非常重要。维基百科有一个 API 端点 ([https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php))，它以
    JSON 格式返回页面内容，如图 7.4 所示：
- en: '![Figure 7.4 – Viewing the JSON output of a Wikipedia article](img/B21234_07_04.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.4 – 查看维基百科文章的 JSON 输出](img/B21234_07_04.jpg)'
- en: Figure 7.4 – Viewing the JSON output of a Wikipedia article
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.4 – 查看维基百科文章的 JSON 输出
- en: 'The link is constructed using the following components:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 链接是通过以下组件构建的：
- en: 'API URL: [https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php)'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: API URL：[https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php)
- en: '**Action** parameter: Query'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**操作**参数：查询'
- en: '**Format** parameter: JSON'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**格式**参数：JSON'
- en: '**Titles** parameter: The title of the Wikipedia article'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标题**参数：维基百科文章的标题'
- en: 'Properties (**Prop**) parameter: Extracts (the full content of the article)'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 属性（**Prop**）参数：提取（文章的全部内容）
- en: The data itself that we’ll be using is in the **extract** node, nested inside
    the **query** JSON object.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用的数据本身位于 **extract** 节点中，嵌套在 **query** JSON 对象内。
- en: 'When reviewing Wikipedia articles, you might notice that the headings are a
    mix of heading level 2 (`<H2>`) tags, which are used as main topic headings, and
    heading level 3 (`<H3>`) tags, which denote subtopics. For this flow, we’ll focus
    on treating the content inside a `<H2>` tag as one unit. *Figure 7**.5* shows
    examples of text being displayed as `<``H2>` headings:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在审阅维基百科文章时，你可能会注意到标题是 2 级标题 (`<H2>`) 标签和 3 级标题 (`<H3>`) 标签的混合，其中 `<H2>` 标签用作主要主题标题，而
    `<H3>` 标签表示子主题。对于这个流程，我们将专注于将 `<H2>` 标签内的内容作为一个单元处理。*图 7.5* 展示了文本作为 `<H2>` 标题显示的示例：
- en: '![Figure 7.5 – Viewing a Wikipedia article](img/B21234_07_05.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.5 – 查看维基百科文章](img/B21234_07_05.jpg)'
- en: Figure 7.5 – Viewing a Wikipedia article
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.5 – 查看维基百科文章
- en: 'You can confirm this by viewing the document source in your chosen web browser,
    as shown in *Figure 7**.6*:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过查看所选网络浏览器中的文档源来确认这一点，如图 7.6 所示：
- en: '![Figure 7.6 – Viewing the source of a Wikipedia article](img/B21234_07_06.jpg)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.6 – 查看维基百科文章的源代码](img/B21234_07_06.jpg)'
- en: Figure 7.6 – Viewing the source of a Wikipedia article
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.6 – 查看维基百科文章的源代码
- en: 'In terms of how we’ll use this information, we’ll be summarizing the content
    using the following structure:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用这些信息方面，我们将使用以下结构来总结内容：
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Translating that to how the Flowr connector works, we’ll create three tokens:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 将其转换为 Flowr 连接器的工作方式，我们将创建三个标记：
- en: '[PRE4]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now that you’ve got a basic understanding of how this is going to work, let’s
    create a PowerPoint template to hold the generated content!
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经对如何操作有了基本的了解，让我们创建一个 PowerPoint 模板来存放生成的内容！
- en: Creating a PowerPoint template
  id: totrans-70
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建 PowerPoint 模板
- en: Before you execute any flows, you need to create a template so that the **Populate
    PowerPoint** action has something to manipulate. For this example, we’ll just
    use a single slide in the template file.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行任何流程之前，你需要创建一个模板，以便 **填充 PowerPoint** 动作有所操作。对于这个示例，我们将在模板文件中使用单个幻灯片。
- en: 'To create a simple template file, follow these steps:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个简单的模板文件，请按照以下步骤操作：
- en: 'Launch PowerPoint and select **New**. You can either choose **Blank Presentation**
    or use a themed template file:'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动 PowerPoint 并选择 **新建**。你可以选择 **空白演示文稿** 或使用主题模板文件：
- en: '![Figure 7.7 – Creating a new template file](img/B21234_07_07.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.7 – 创建新的模板文件](img/B21234_07_07.jpg)'
- en: Figure 7.7 – Creating a new template file
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
