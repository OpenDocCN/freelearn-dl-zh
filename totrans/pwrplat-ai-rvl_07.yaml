  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Parse** **JSON** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rename the `Parse JSON –` `PPT Values`.
