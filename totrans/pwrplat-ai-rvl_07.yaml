- en: '7'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using Power Automate and AI to Build PowerPoint Presentations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you’ve ever been faced with a last-minute requirement to prepare a presentation
    for your boss or an activity club, you’re not alone. Whether it’s familiar content
    or something you’ve never seen before, condensing information and making it accessible
    to an audience is no small task.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll start with everyone’s favorite open source knowledge
    base, Wikipedia, and use ChatGPT to summarize sections of it and insert it into
    a PowerPoint deck.
  prefs: []
  type: TYPE_NORMAL
- en: With a little bit of tweaking, you can reuse this same type of summarization
    tooling on documents stored in SharePoint, internal corporate websites, or other
    digital content sources.
  prefs: []
  type: TYPE_NORMAL
- en: Licensing prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Using AI models and connectors in Power Platform has several prerequisites:'
  prefs: []
  type: TYPE_NORMAL
- en: A subscription that includes Microsoft Dataverse
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Builder capacity (or trial capacity)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power Apps or Power Automate premium licensing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you haven’t already enabled Dataverse and AI Builder capacity, see [*Chapter
    2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to Support
    AI Services*, and [*Chapter 6*](B21234_06.xhtml#_idTextAnchor069), *Processing
    Data with* *Sentiment Analysis*.
  prefs: []
  type: TYPE_NORMAL
- en: Since Power Automate does not have a native connector for PowerPoint, this particular
    solution requires a third-party connector product by software vendor **Encodian**.
    This connector allows you to transform standard Power Automate objects into PowerPoint
    content.
  prefs: []
  type: TYPE_NORMAL
- en: 'Encodian offers a free 30-day trial, including 500 credits, of the Flowr connector
    at [https://www.encodian.com/product/flowr/](https://www.encodian.com/product/flowr/):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.1 – Establishing a Flowr trial](img/B21234_07_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.1 – Establishing a Flowr trial
  prefs: []
  type: TYPE_NORMAL
- en: 'After signing up, you will receive an API key (sample shown in *Figure 7**.2*)
    that you can use to configure the Encodian connector in Power Automate:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.2 – Sample Encodian API key](img/B21234_07_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.2 – Sample Encodian API key
  prefs: []
  type: TYPE_NORMAL
- en: Once that’s activated, you’ll want to build a generic PowerPoint template file
    that can be saved and reused whenever you need it!
  prefs: []
  type: TYPE_NORMAL
- en: Learning about the Encodian Flowr connector
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before you get started working on a flow, you’ll need to understand how to
    use the Encodian Flowr connector and its actions. In this section, we’ll look
    at the critical pieces that are needed to make this flow work. To successfully
    work with the connector and actions, you’ll need to understand the following concepts,
    terminology, and actions:'
  prefs: []
  type: TYPE_NORMAL
- en: Input formatting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tokens
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Populate** **PowerPoint** action
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Merge** **Presentations** action
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s take a quick look at each of these areas!
  prefs: []
  type: TYPE_NORMAL
- en: Input formatting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Many of Encodian’s content manipulation actions require the use of structured
    data. In this case, structured data is typically supplied in the **JavaScript
    Object Notation** (**JSON**) syntax:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: As shown in this simple example, the JSON text is formatted as a **key/value**
    (think *term:definition*) pair. JSON, like many programming constructs, also has
    the concept of **arrays** or **collections**. An array or collection is a group
    of similar objects.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you wanted to list a collection containing various kinds of foods.
    It might look something like this when formatted as JSON:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'In the `foods` JSON object, you can see several examples of how data values
    are specified. There are both standard key/value pairs (as in `"category":"fruit"`),
    which identify a single object, as well as arrays (such as `"data": [ {"type":
    "sorghum","count":1"},{"type":"wheat","count": 3}]`), which are used to identify
    groups of key/value pairs.'
  prefs: []
  type: TYPE_NORMAL
- en: A JSON object can include a variety of data types, including **strings** (text),
    **integers** (numbers), **arrays** (collections of strings or key/value pairs),
    **Boolean** values (True or False), as well as other JSON objects.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs: []
  type: TYPE_NORMAL
- en: JSON is an extraordinarily flexible format for working with structured content
    since it’s both human-readable as well as platform and language-agnostic. For
    more information on working with JSON objects and syntax, see [https://www.w3schools.com/JS/js_json_intro.asp](https://www.w3schools.com/JS/js_json_intro.asp).
    You can also use tools such as [https://jsonformatter.org/](https://jsonformatter.org/)
    to help ensure your JSON is formatted correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Tokens
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Several of the Flowr actions work with specially formatted **tags** (or **tokens**,
    as Encodian refers to them), which the connector will use in a find-and-replace
    fashion with the content you supply.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say, for example, you wanted Flowr to place the words or phrase “The
    quick brown fox did some things” inside a document. You might decide to assign
    that phrase to a token named `fox`. Inside the document template, you would indicate
    the locations you want this text to appear in by typing the token name surrounded
    by a series of square and angled brackets:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'See *Figure 7**.3* for an example of a token inside a PowerPoint slide:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.3 – Viewing the <<[fox]>> token inside a PowerPoint slide](img/B21234_07_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.3 – Viewing the <<[fox]>> token inside a PowerPoint slide
  prefs: []
  type: TYPE_NORMAL
- en: Populate PowerPoint
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **Populate PowerPoint** action does just what it says – it’s the primary
    action that’s used to place content into a PowerPoint slide. After assigning values
    to the tokens, the **Populate PowerPoint** action will search the template files,
    replacing the tokens with the values. The inputs to this will be the token/content
    key/value pairs and any source PowerPoint template files. The output will be a
    completed PowerPoint slide.
  prefs: []
  type: TYPE_NORMAL
- en: Merge Presentations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, the **Merge Presentations** action can be used to compile the modified
    PowerPoint pages into a single, cohesive document. The inputs will be the generated
    PowerPoint files (typically, one slide per file) and the output will be a single
    multi-slide PowerPoint deck.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’re familiar with the core concepts that we’ll be using during the
    flow, it’s time to start working!
  prefs: []
  type: TYPE_NORMAL
- en: Interacting with Wikipedia articles
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Since the source of our content for this example is going to be a Wikipedia
    article, it’s important to understand how to gather the data. Wikipedia has an
    API endpoint ([https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php))
    that returns the page content as JSON, as shown in *Figure 7**.4*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.4 – Viewing the JSON output of a Wikipedia article](img/B21234_07_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.4 – Viewing the JSON output of a Wikipedia article
  prefs: []
  type: TYPE_NORMAL
- en: 'The link is constructed using the following components:'
  prefs: []
  type: TYPE_NORMAL
- en: 'API URL: [https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Action** parameter: Query'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Format** parameter: JSON'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Titles** parameter: The title of the Wikipedia article'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Properties (**Prop**) parameter: Extracts (the full content of the article)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The data itself that we’ll be using is in the **extract** node, nested inside
    the **query** JSON object.
  prefs: []
  type: TYPE_NORMAL
- en: 'When reviewing Wikipedia articles, you might notice that the headings are a
    mix of heading level 2 (`<H2>`) tags, which are used as main topic headings, and
    heading level 3 (`<H3>`) tags, which denote subtopics. For this flow, we’ll focus
    on treating the content inside a `<H2>` tag as one unit. *Figure 7**.5* shows
    examples of text being displayed as `<``H2>` headings:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.5 – Viewing a Wikipedia article](img/B21234_07_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.5 – Viewing a Wikipedia article
  prefs: []
  type: TYPE_NORMAL
- en: 'You can confirm this by viewing the document source in your chosen web browser,
    as shown in *Figure 7**.6*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.6 – Viewing the source of a Wikipedia article](img/B21234_07_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.6 – Viewing the source of a Wikipedia article
  prefs: []
  type: TYPE_NORMAL
- en: 'In terms of how we’ll use this information, we’ll be summarizing the content
    using the following structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Translating that to how the Flowr connector works, we’ll create three tokens:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Now that you’ve got a basic understanding of how this is going to work, let’s
    create a PowerPoint template to hold the generated content!
  prefs: []
  type: TYPE_NORMAL
- en: Creating a PowerPoint template
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Before you execute any flows, you need to create a template so that the **Populate
    PowerPoint** action has something to manipulate. For this example, we’ll just
    use a single slide in the template file.
  prefs: []
  type: TYPE_NORMAL
- en: 'To create a simple template file, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Launch PowerPoint and select **New**. You can either choose **Blank Presentation**
    or use a themed template file:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.7 – Creating a new template file](img/B21234_07_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.7 – Creating a new template file
  prefs: []
  type: TYPE_NORMAL
- en: 'Edit the content of the file, placing it in the tokens you identified earlier.
    You can apply formatting such as **bolding** or *italics* to the tokens:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.8 – Updating the template with the content tokens](img/B21234_07_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.8 – Updating the template with the content tokens
  prefs: []
  type: TYPE_NORMAL
- en: 'Save the document in a SharePoint or OneDrive for Business site:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.9 – Saving a PowerPoint template file](img/B21234_07_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.9 – Saving a PowerPoint template file
  prefs: []
  type: TYPE_NORMAL
- en: With that done, it’s time to start building our flow!
  prefs: []
  type: TYPE_NORMAL
- en: Creating the flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The flow is going to be comprised of two sections performing discrete actions,
    divided into scopes to help manage them:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Scope 1**: Generating the content summaries'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scope 2**: Adding content to the PowerPoint templates'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: About scopes
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate includes an oft-overlooked control object called a **scope**.
    A scope is essentially a logical container that can be used to group actions together.
    Scopes can be expanded and collapsed, allowing you to more easily visualize and
    manipulate parts of complex flows.
  prefs: []
  type: TYPE_NORMAL
- en: While this flow features the use of scopes, they’re essentially organization
    objects. If you don’t feel comfortable adding them, you don’t need to.
  prefs: []
  type: TYPE_NORMAL
- en: What do I do if I’m stuck?
  prefs: []
  type: TYPE_NORMAL
- en: 'If you run into a roadblock for some reason (can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Generate Content Summaries scope
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To begin creating the flow, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Automate Maker Portal ([https://make.powerautomate.com](https://make.powerautomate.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From the navigation pane, select **Create**. Then, under **Start from blank**,
    select **Instant** **cloud flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Build an instant cloud flow** page, enter a **Flow** **name** value.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Choose how to trigger this flow**, select **Manually trigger a flow**.
    Then, click **Create**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.10 – Creating a new flow](img/B21234_07_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.10 – Creating a new flow
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Manually trigger a flow** action to expose the **Manually trigger
    a** **flow** flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select the **Parameters** tab and choose **Add** **an input**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.11 – Adding an input](img/B21234_07_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.11 – Adding an input
  prefs: []
  type: TYPE_NORMAL
- en: For the **Choose the type of user input** prompt, select the **Text** input
    type.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If you wish, modify the input prompt with a description that describes the
    type of content that should be supplied – for example, `Enter Wikipedia` `article
    URL`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.12 – Customizing the text entry prompt](img/B21234_07_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.12 – Customizing the text entry prompt
  prefs: []
  type: TYPE_NORMAL
- en: Under the **Manually trigger a flow** card, click **+** and then **Add** **an
    action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `Scope` and select the **Scope** **control** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.13 – Adding the Scope control action](img/B21234_07_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.13 – Adding the Scope control action
  prefs: []
  type: TYPE_NORMAL
- en: 'Click the maroon `Scope – Generate Summaries` by clicking on the word **Scope**
    and editing the field:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.14 – Updating the scope’s name](img/B21234_07_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.14 – Updating the scope’s name
  prefs: []
  type: TYPE_NORMAL
- en: Inside the **Scope** card on the canvas, click the **+** icon and then select
    **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Add an action** flyout, select the **Compose** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.15 – Adding the Compose action](img/B21234_07_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.15 – Adding the Compose action
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `/` character or click the *𝑓**x* icon to open the `last(split(triggerBody()?[''text''],''/''))`
    and click `/` character as a separator, the expression will take the last value
    from the text input string (from the `History_of_Cryptography`. See *Figure 7**.13*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.16 – Adding the expression](img/B21234_07_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.16 – Adding the expression
  prefs: []
  type: TYPE_NORMAL
- en: Inside the **Scope – Generate Summaries** control card, after the **Compose**
    card, click **+** and choose **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Add an action** flyout, select the **HTTP** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the `/` character or click the *𝑓**x* icon to open the `concat(''https://en.wikipedia.org/w/api.php?action=query&format=json&titles='',outputs(''Compose''),`
    **''&prop=extracts'')** and click `CONCAT` function to combine the Wikipedia API
    endpoint, the query and formatting parameters, and the extracted title value:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.17 – Customizing the HTTP action](img/B21234_07_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.17 – Customizing the HTTP action
  prefs: []
  type: TYPE_NORMAL
- en: Under the **Method** dropdown, select **GET**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Save**. Do not exit the Power Automate flow canvas.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, we’ll start configuring the content processing.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the JSON parameters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we’ll import the JSON schema or definition of how the content
    is structured. To get the schema output, you’ll need to manually construct the
    API endpoint with the necessary parameters and then insert an article name. Follow
    these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Launch a new browser tab, navigate to [https://en.wikipedia.org](https://en.wikipedia.org),
    and search for any article of your choosing. In this example, `/` character –
    for example, `History_of_cryptography`. See *Figure 7**.1**8*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.18 – Extracting the relative URL of a Wikipedia article](img/B21234_07_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.18 – Extracting the relative URL of a Wikipedia article
  prefs: []
  type: TYPE_NORMAL
- en: 'Open a new browser tab and navigate to the Wikipedia API endpoint: [https://en.wikipedia.org/w/api.php](https://en.wikipedia.org/w/api.php).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'At the end of the URL, append `?action=query&format=json&prop=extracts&titles=`
    and then paste the copied Wikipedia article value at the end of the URL bar –
    for example, `?action=query&format=json&prop=extracts&titles=History_of_cryptograpy`.
    The result should be a JSON-formatted object that contains the text of the Wikipedia
    article, as shown in *Figure 7**.1**9*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.19 – Viewing the JSON output of the Wikipedia API](img/B21234_07_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.19 – Viewing the JSON output of the Wikipedia API
  prefs: []
  type: TYPE_NORMAL
- en: Select all the content (*Ctrl* + *A*) and copy it to the buffer (*Ctrl* + *C*).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Switch back to the browser tab containing the Power Automate flow.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Inside the **Scope – Generate Summaries** control card, after the **HTTP** card,
    click **+** and choose **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Add an action** flyout, select the **Parse** **JSON** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.20 – Adding the Parse JSON action](img/B21234_07_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.20 – Adding the Parse JSON action
  prefs: []
  type: TYPE_NORMAL
- en: In the **Parse JSON** flyout, select the **Parameters** tab.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click inside the **Content** text area, select the dynamic content icon, and
    then choose the **Outputs** object of the **HTTP** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.21 – Adding the HTTP Outputs object](img/B21234_07_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.21 – Adding the HTTP Outputs object
  prefs: []
  type: TYPE_NORMAL
- en: 'Paste the contents of the buffer into the **Schema** area, as shown in *Figure
    7**.**22*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 7.22 – Populating Content with the Wikipedia API output](img/B21234_07_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.22 – Populating Content with the Wikipedia API output
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Save** icon. Do not exit the Power Automate flow canvas.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Customizing the GPT prompt
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Working with completion prompts is as much about art as it is about science.
    It can take a lot of refinement to get consistently good results.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt frameworks
  prefs: []
  type: TYPE_NORMAL
- en: As the old saying goes, “Garbage in, garbage out.” AI models are becoming increasingly
    more sophisticated and can interpret instructions. To get good results, you need
    to provide good instructions. Just as people can mimic and learn through examples,
    so can AI models. Prompt frameworks are one way of helping explain the type of
    results that meet your expectations. For examples of common prompt frameworks,
    go to [https://www.undocumented-features.com/2023/12/15/chatgpt-patterns-practices-and-prompts/](https://www.undocumented-features.com/2023/12/15/chatgpt-patterns-practices-and-prompts/).
  prefs: []
  type: TYPE_NORMAL
- en: 'In this section, you’ll create a custom prompt that ChatGPT can use to build
    the data object. Follow these steps:'
