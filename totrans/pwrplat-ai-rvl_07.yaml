  type: TYPE_IMG
- en: Figure 7.33 – Selecting the PowerPoint template file
  prefs: []
  type: TYPE_NORMAL
- en: Inside the **Scope – Generate Slides** card, click the **+** icon and select
    **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add the **Apply to** **each** control.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Apply to each** control flyout, select the **Parameters** tab.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Select an Output From Previous Steps** field, add the **Body** output
