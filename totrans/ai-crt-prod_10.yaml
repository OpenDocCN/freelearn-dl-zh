- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Generative AI with Images
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于图像的生成式AI
- en: 'Few topics in GenAI are more polarized than AI generation of synthetic images.
    If you’re a creative professional who creates or modifies images—and most of us
    do work with images in one way or another—you might already have strong opinions
    on this. Here’s mine: although AI can be powerful, I don’t think AI is guaranteed
    to take over from all designers, photographers, and retouchers. In fact, there
    are many ways to use AI that don’t fill the world with slop, and that help us
    do our jobs better.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成人工智能（GenAI）的众多话题中，合成图像的AI生成可能比其他话题更具争议性。如果你是一位创作或修改图像的创意专业人士——我们大多数人都会以某种方式与图像打交道——你可能已经对这一点有强烈的看法。以下是我的观点：尽管AI可能很强大，但我认为AI并不一定会取代所有的设计师、摄影师和修复师。实际上，有许多使用AI的方法不会让世界充满垃圾，而且可以帮助我们更好地完成工作。
- en: Creativity means very different things to different people, and there are many
    different jobs in the broad category of “creative production”. Some of those tasks
    are boring, or tedious, or are never shown to clients, and those are more likely
    to be tasks you might perform with an AI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力对不同的人意味着不同的事情，在“创意生产”这个广泛的类别中有很多不同的工作。其中一些任务可能很无聊，或很繁琐，或者从未向客户展示过，这些任务更有可能是由AI完成的。
- en: Other tasks, such as complex image retouching or restoration, are sometimes
    better performed by an AI, and in this context, they can be seen as a more advanced
    version of the tools we used before. AI can also open up entirely new workflows,
    allowing you to visualize a shoot before it happens, or create mood boards based
    on images created for the purpose rather than simply reusing other people’s images.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 其他任务，如复杂的图像修复或恢复，有时由AI完成会更好，在这种情况下，它们可以被视为我们之前使用的工具的更高级版本。AI还可以开辟全新的工作流程，让你在拍摄之前可视化拍摄，或根据为特定目的创建的图像创建情感板，而不是简单地重复使用他人的图像。
- en: Of course, the marketplace is changing rapidly, and progress is swift. Although
    I’ll show the results from several different tools, there are far too many services
    to test in depth, and the speed of change in this industry means that any firm
    recommendations would be outdated by the time you read this. Don’t get too attached
    to any one solution—I’d be surprised if they’re all still around five years from
    now.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，市场正在迅速变化，进步迅速。尽管我会展示几个不同工具的结果，但测试的服务太多，而且这个行业的变革速度意味着任何具体的推荐在你阅读这本书时都可能已经过时。不要对任何一种解决方案过于依赖——如果五年后它们都还在，我会感到惊讶。
- en: To keep this book as helpful as possible, I’ll try to focus more on techniques
    and workflows than specific applications and services, and I’ll cover web and
    desktop solutions rather than mobile. Some comparative reviews are included, but
    please confirm results for yourself on your own images, with whatever service(s)
    you end up using.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这本书尽可能有用，我将尽量更多地关注技术和工作流程，而不是具体的应用和服务，我将涵盖网页和桌面解决方案，而不是移动端。书中包含了一些比较性评论，但请使用您最终选择的服务在自己的图像上确认结果。
- en: 'No matter what kind of images you’re making, human supervision or direction
    is important. In this chapter, we’ll be looking at the following main topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你制作什么类型的图像，人类监督或指导都是重要的。在本章中，我们将探讨以下主要主题：
- en: Manipulating existing images
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理现有图像
- en: Creating original images
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建原始图像
- en: Generative vector art
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式矢量艺术
- en: Mood boards and design ideas
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感板和设计理念
- en: Creating 3D models
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建3D模型
- en: First off, let’s take a look at the state of the art in retouching.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看图像修复领域的最新技术。
- en: Manipulating existing images
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 处理现有图像
- en: 'Though many AI-based tools can perform image manipulation, **Adobe Photoshop**
    has been the retouching tool of choice for so long that it’s become a verb: *to
    Photoshop*. I’ve personally and professionally used Photoshop since the late 1990s,
    and new tools, including some that incorporate machine learning, have changed
    the state of the art multiple times over.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管许多基于AI的工具可以进行图像处理，但**Adobe Photoshop**作为修复工具的选择已经如此之久，以至于它已经成为一个动词：*Photoshop*。我自1990年代末以来在个人和专业上使用Photoshop，包括一些结合机器学习的新工具，已经多次改变了技术的状态。
- en: For example, the Clone Stamp was once the only tool available for retouching
    jobs. Covering skin blemishes was tricky because it wasn’t always easy to find
    a matching patch of clean skin to clone from. With the Clone Stamp tool, you must
    match texture and light between the source and the destination.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，克隆图章曾经是唯一可用于修图工作的工具。覆盖皮肤瑕疵很棘手，因为并不总是容易找到一块匹配的干净皮肤区域进行克隆。使用克隆图章工具时，必须在源和目标之间匹配纹理和光线。
- en: In the early 2000s, I was working as a retoucher in London, and the introduction
    of the Healing Brush tool changed the game entirely. We still had to find an area
    of clean skin, but we now only had to worry about texture—Photoshop could match
    the brightness of the source to the destination for us.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在2000年代初，我在伦敦担任修图师，修复画笔工具的引入彻底改变了游戏规则。我们仍然需要找到一个干净的皮肤区域，但现在我们只需要担心纹理——Photoshop可以为我们匹配源和目标之间的亮度。
- en: In 2010, **Content-Aware Fill** was added to the **Spot Healing Brush** tool
    in Photoshop CS5\. With this tool, you didn’t even need to choose a source area
    to clone from—indeed, you couldn’t choose one at all. Instead, Photoshop chose
    which parts of the image to reuse, creating a new area that (usually) looked seamless,
    remixing parts of the original image to create a replacement area.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 2010年，**内容感知填充**被添加到Photoshop CS5中的**修复画笔**工具中。使用这个工具，您甚至不需要选择一个克隆的源区域——实际上，您根本无法选择。相反，Photoshop会选择图像中哪些部分可以重复使用，创建一个（通常）看起来无缝的新区域，通过重新混合原始图像的部分来创建替代区域。
- en: This tool remains in use today, and while it predates modern AI tools, it can
    be said to use machine learning techniques. At the time, it was marketed under
    the **Adobe Sensei** banner ([https://web.archive.org/web/20190404055934/https://research.adobe.com/project/content-aware-fill/](https://web.archive.org/web/20190404055934/https://research.adobe.com/project/content-aware-fill/)).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工具至今仍在使用，尽管它早于现代AI工具，但可以说它使用了机器学习技术。当时，它是在**Adobe Sensei**的旗帜下推广的 ([https://web.archive.org/web/20190404055934/https://research.adobe.com/project/content-aware-fill/](https://web.archive.org/web/20190404055934/https://research.adobe.com/project/content-aware-fill/))。
- en: Today, the existing tools are augmented by **Generative Remove** and **Generative
    Fill**, two fully generative features that draw on Adobe Stock images licensed
    for the purpose. While many retouching tasks are still best performed with Content-Aware
    Spot Healing, the Healing Brush, or even the Clone Stamp, AI-based tools bring
    unprecedented flexibility.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，现有的工具通过**生成移除**和**生成填充**两种完全生成功能得到增强，这些功能利用了为该目的许可的Adobe Stock图像。尽管许多修图任务仍然最好使用内容感知修复点、修复画笔或甚至克隆图章来完成，但基于AI的工具带来了前所未有的灵活性。
- en: For example, if you start with a photograph of a person not wearing a hat, but
    a client wants them to be wearing a hat, cloning alone is not enough. You’d need
    to find an image with a suitable hat, taken with lighting at a similar angle,
    at a similar level of sharpness, and this process can take significant effort.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您从一个不戴帽子的照片开始，但客户希望他们戴上帽子，仅仅克隆是不够的。您需要找到一个合适的帽子图像，光线角度相似，清晰度相似，这个过程可能需要相当大的努力。
- en: '![Figure 7.1 – I’d like a hat here, please](img/B34247_07_1.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图7.1 – 我想要在这里放一顶帽子，请](img/B34247_07_1.png)'
- en: Figure 7.1 – I’d like a hat here, please
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1 – 我想要在这里放一顶帽子，请
- en: Today, you can select the area where you want the hat with the **Lasso** tool,
    then tell Photoshop exactly what kind of hat you want in a text entry field, and
    it’ll generate three options within a few seconds. You don’t even have to tell
    Photoshop what you want; leave the field blank, and it’ll figure out the best
    option.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以使用**套索**工具选择想要放帽子的区域，然后在文本输入字段中告诉Photoshop您想要的帽子类型，它将在几秒钟内生成三个选项。您甚至不需要告诉Photoshop您想要什么；留空字段，它将找出最佳选项。
- en: '![Figure 7.2 – This hat isn’t real, and neither is the man on the beach](img/B34247_07_2.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图7.2 – 这顶帽子不是真的，海滩上的男人也不是](img/B34247_07_2.png)'
- en: Figure 7.2 – This hat isn’t real, and neither is the man on the beach
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2 – 这顶帽子不是真的，海滩上的男人也不是
- en: In most other apps, this is known as **inpainting**, and it’s a common workflow
    found across services such as **Freepik** ([https://www.freepik.com/](https://www.freepik.com/))
    and **Claid.ai** ([https://claid.ai/](https://claid.ai/)); we’ll take a look at
    them soon.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数其他应用程序中，这被称为**修复**，它是一种在**Freepik** ([https://www.freepik.com/](https://www.freepik.com/))
    和 **Claid.ai** ([https://claid.ai/](https://claid.ai/)) 等服务中常见的常规工作流程；我们很快就会看看它们。
- en: Similarly, if you want to remove people from an image, Photoshop’s **Remove**
    tool can automatically select people or wires and cables, then replace selected
    areas with a generated background. Although selections aren’t always perfect,
    it’s easy to paint in items that have been missed.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，如果你想从图像中移除人物，Photoshop的**移除**工具可以自动选择人物或电线和电缆，然后用生成的背景替换所选区域。尽管选择并不总是完美的，但很容易用颜色填充遗漏的项目。
- en: '![Figure 7.3 – Using the Remove tool’s Find Distractions > People option; most
    but not all people were found](img/B34247_07_3.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图7.3 – 使用移除工具的查找干扰>人物选项；大多数但并非所有人被找到](img/B34247_07_3.png)'
- en: Figure 7.3 – Using the Remove tool’s Find Distractions > People option; most
    but not all people were found
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3 – 使用移除工具的查找干扰>人物选项；大多数但并非所有人被找到
- en: When this feature was introduced, many novice users may have been tempted to
    use this new tool and never learn any of the other tools. However, from mid-2025,
    some generative tools in Adobe apps, now under the **Adobe Firefly** banner ([http://firefly.adobe.com](http://firefly.adobe.com)),
    switched from free to requiring *generative credits* on some plans. However, the
    Remove tool remains free on all plans, at least for now, whether you choose to
    use GenAI or not.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当这个功能被引入时，许多新手用户可能会被诱惑使用这个新工具，而从未学习过其他工具。然而，从2025年中旬开始，Adobe应用程序中的一些生成工具，现在在**Adobe
    Firefly**的旗帜下（[http://firefly.adobe.com](http://firefly.adobe.com)），从免费转变为在某些计划上需要*生成积分*。但是，移除工具在所有计划上仍然是免费的，至少目前是这样，无论你是否选择使用GenAI。
- en: '![Figure 7.4 – This image is usable; certainly better than the results without
    AI](img/B34247_07_4.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图7.4 – 这张图像是可用的；当然比没有AI的结果要好](img/B34247_07_4.png)'
- en: Figure 7.4 – This image is usable; certainly better than the results without
    AI
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.4 – 这张图像是可用的；当然比没有AI的结果要好
- en: Your subscription determines the cost and type of generations you can use. Most
    generative tasks in Adobe apps are labeled as *standard*, while tasks involving
    video are *premium*, as are third-party models used in Firefly. If you subscribe
    to all the apps (**Creative Cloud Pro**) then standard generations are free, and
    you can use these features as you wish.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 你的订阅决定了你可以使用的生成成本和类型。Adobe应用程序中的大多数生成任务都被标记为*标准*，而涉及视频的任务以及Firefly中使用的第三方模型都被标记为*高级*。如果你订阅了所有应用程序（**Creative
    Cloud Pro**），则标准生成是免费的，你可以随意使用这些功能。
- en: On other plans, a typical Generative Fill task now costs 1 credit, and different
    accounts receive varying numbers of generative credits per month—currently, somewhere
    between 25 and 500\. (Though Creative Cloud Pro does include 4,000 generative
    credits, since *standard* generations remain free, these credits are only used
    for *premium* tasks.)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他计划中，典型的生成填充任务现在需要1个积分，并且不同账户每月获得的生成积分数量不同——目前大约在25到500之间。（尽管Creative Cloud
    Pro包括4,000个生成积分，但由于标准生成仍然免费，这些积分仅用于*高级*任务。）
- en: Additional credits can be purchased with an add-on Firefly plan over the regular
    Creative Cloud plan, but some users planning to use generative techniques for
    bulk processing may now have to consider the cost. (We’ll also return to these
    credits in the next chapter, because the costs for video generation are much higher
    than they are for stills.)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过附加Firefly计划在常规Creative Cloud计划之外购买额外的积分，但一些计划使用生成技术进行批量处理的用户现在可能必须考虑成本。（我们将在下一章中再次回到这些积分，因为视频生成的成本比静态图像要高得多。）
- en: Even with the potential cost, Adobe’s generative options are tempting for creatives
    worried by the legal and ethical risks of using most generative image models,
    because commercial use is explicitly permitted, at least with the default Firefly
    models.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有潜在的额外成本，Adobe的生成选项对于担心使用大多数生成图像模型的合法和道德风险的创意人士来说仍然具有吸引力，因为商业使用是明确允许的，至少对于默认的Firefly模型来说是这样。
- en: However, in late 2025, it became possible to use other generative image models
    instead. As it’s still in beta, costs are yet to be finalized, but **Flux Kontext**
    and Google’s **Nano Banana** (AKA Gemini Flash) can be used for Generative Fill
    instead of the Firefly models, if you wish. This does come with an ethical question,
    though—were these models trained on images they didn’t have permission to use?
    Even if they didn’t have permission, was looking at these images permissible under
    fair use?
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，到2025年底，可以使用其他生成图像模型。由于它仍在测试阶段，费用尚未确定，但如果你愿意，可以使用**Flux Kontext**和谷歌的**Nano
    Banana**（又称Gemini Flash）来代替Firefly模型进行生成填充。但这确实带来了一个道德问题——这些模型是否在未经授权使用的图像上进行了训练？即使没有授权，在合理使用下查看这些图像是否允许？
- en: Also, if you were wondering, Adobe *doesn’t* train its models on your images,
    but other AI providers *might*. Policies vary, but in general, if you’re paying
    for a service, they probably won’t use your data for training. If you’re using
    a service for free, it’s more likely; read the fine print to find out.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果您有所疑问，Adobe **不会**在您的图像上训练其模型，但其他AI提供商**可能**会这样做。政策各不相同，但一般来说，如果您为服务付费，他们可能不会使用您的数据来训练。如果您免费使用服务，这种情况更可能发生；请仔细阅读条款以了解详情。
- en: In contrast to many models that have been trained on images of unknown origins,
    Adobe’s models have been trained only on specific, known images. While largely
    sourced from Adobe Stock, some public domain and other openly licensed content
    were also used ([https://helpx.adobe.com/au/firefly/get-set-up/learn-the-basics/adobe-firefly-faq.html](https://helpx.adobe.com/au/firefly/get-set-up/learn-the-basics/adobe-firefly-faq.html)).
    Though not all contributors to Adobe Stock were aware that their images would
    be used for AI training, it was legally permitted in the agreements they signed
    ([https://www.techradar.com/pro/software-services/creators-slam-adobe-over-firefly-ai-training](https://www.techradar.com/pro/software-services/creators-slam-adobe-over-firefly-ai-training)).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 与许多基于未知来源图像训练的模型相比，Adobe的模型仅基于特定、已知的图像进行训练。虽然主要来源于Adobe Stock，但也使用了部分公有领域和其他开放许可的内容（[https://helpx.adobe.com/au/firefly/get-set-up/learn-the-basics/adobe-firefly-faq.html](https://helpx.adobe.com/au/firefly/get-set-up/learn-the-basics/adobe-firefly-faq.html)）。尽管并非所有Adobe
    Stock的贡献者都意识到他们的图像将被用于AI训练，但在他们签署的协议中这是法律允许的（[https://www.techradar.com/pro/software-services/creators-slam-adobe-over-firefly-ai-training](https://www.techradar.com/pro/software-services/creators-slam-adobe-over-firefly-ai-training)）。
- en: To briefly recall the ethical points raised in [*Chapter 2*](Chapter_2.xhtml#_idTextAnchor035),
    if you’re concerned about the way in which an image generation tool was trained,
    search for a statement from the tool’s maker. Adobe’s statement is clear, and
    Apple says they use “licensed data” ([https://machinelearning.apple.com/research/introducing-apple-foundation-models](https://machinelearning.apple.com/research/introducing-apple-foundation-models)).
    Major LLM creators, including OpenAI and Meta, have faced lawsuits regarding the
    origins of their training data, and have claimed “fair use.”
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 简要回顾一下在[*第二章*](Chapter_2.xhtml#_idTextAnchor035)中提出的伦理问题，如果您对图像生成工具的训练方式感到担忧，请寻找该工具制造商的声明。Adobe的声明很明确，苹果公司表示他们使用“授权数据”([https://machinelearning.apple.com/research/introducing-apple-foundation-models](https://machinelearning.apple.com/research/introducing-apple-foundation-models))。包括OpenAI和Meta在内的主要LLM创作者都因训练数据的来源面临诉讼，并声称“合理使用”。
- en: If you want to edit images using a combination of traditional retouching tools
    and AI, Photoshop is likely still your best bet, whether you use third-party models
    or not. Generative Fill is a great tool for adding to or changing an image; third-party
    models extend that capability in new ways, and if you want to remove something,
    Generative Remove usually produces clean, useful results. However, Adobe’s tools
    are far from the only way to change part of an image with AI.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想结合传统修图工具和AI来编辑图像，无论是否使用第三方模型，Photoshop可能仍然是您的最佳选择。生成填充是一个很好的工具，可以添加或更改图像；第三方模型以新的方式扩展了这一功能，如果您想移除某些内容，生成移除通常会产生干净、有用的结果。然而，Adobe的工具并不是改变图像一部分的唯一方式。
- en: Multi-modal LLMs such as ChatGPT and Gemini are capable, as are a host of third-party
    web-based services and the photo editing tools built into mobile phone operating
    systems.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态LLM如ChatGPT和Gemini都具备能力，还有众多第三方基于网络的在线服务和集成在手机操作系统中的照片编辑工具。
- en: On phones, Android users can use Google Photos’ AI editing tools, where **Magic
    Eraser** and **Magic Editor** are included for free. Brush over an area, circle
    it, or tap distinct items to remove them, and the AI models will fill in the blanks.
    On an iPhone or iPad, circling an unwanted part of an image in the Photos app
    works in much the same way. Though these simple tools don’t always provide the
    flexibility, power, or scalability that creative production pros want, they can
    be a convenient tool for quick, occasional fixes.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在手机上，Android用户可以使用Google Photos的AI编辑工具，其中**魔法橡皮擦**和**魔法编辑器**是免费提供的。在某个区域刷过、画圈或点击特定项目以移除它们，AI模型将填补空白。在iPhone或iPad上，在照片应用中画圈移除图像中的不需要部分也以类似的方式工作。尽管这些简单工具并不总是提供创意生产专业人士所需的灵活性、力量或可扩展性，但它们可以成为快速、偶尔修复的便捷工具。
- en: Assuming that your needs extend beyond what a phone can do, if you’d rather
    not use Photoshop, consider a web- or desktop-based option such as Freepik, Evoto,
    or Claid.ai, use services integrated with AI offerings from OpenAI or Google,
    or even consider website creation tools such as Wix. (Other tools, such as Imagen,
    aim their image retouching services at automated production, and we’ll look at
    some of those tools in the *Automation AI* part of this book.)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你的需求超出了手机所能做到的，如果你不想使用Photoshop，可以考虑基于网页或桌面的选项，如Freepik、Evoto或Claid.ai，使用与OpenAI或Google的AI服务集成的服务，或者甚至考虑使用网站创建工具，如Wix。（其他工具，如Imagen，将他们的图像修图服务定位在自动化生产上，我们将在本书的*自动化AI*部分探讨一些这些工具。）
- en: Though many kinds of tools are available, I suspect most creative professionals
    would prefer to use a desktop-based app to avoid the file management hassles that
    can arise from uploading and downloading images from websites.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管有许多种工具可用，但我怀疑大多数创意专业人士更愿意使用基于桌面的应用程序来避免从网站上传和下载图像时可能出现的文件管理麻烦。
- en: Not all tools offer desktop apps, and multiple services may offer the same models.
    Adobe’s Firefly web service currently offers the most prominent models, including
    their own Firefly Image models, plus more from Imagen, GPT Image, Flux, and Runway.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有工具都提供桌面应用程序，并且多个服务可能提供相同的模型。Adobe的Firefly网络服务目前提供最突出的模型，包括他们自己的Firefly Image模型，以及来自Imagen、GPT
    Image、Flux和Runway的更多模型。
- en: Let’s take a deeper look at how to make images from text prompts.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地了解一下如何从文本提示中制作图像。
- en: Retouching through AI prompting
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过AI提示进行修图
- en: 'Competition is active in this area. In August 2025, Gemini launched its Flash
    2.5 (AKA Nano Banana) system, actively inviting users to refine images by prompting
    via a web interface:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这个领域的竞争非常激烈。2025年8月，Gemini推出了其Flash 2.5（又称Nano Banana）系统，积极邀请用户通过网页界面进行提示以优化图像：
- en: '![Figure 7.5 – Gemini now asks users to be specific in their requests](img/B34247_07_5.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图7.5 – Gemini现在要求用户在请求中具体说明](img/B34247_07_5.png)'
- en: Figure 7.5 – Gemini now asks users to be specific in their requests
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.5 – Gemini现在要求用户在请求中具体说明
- en: 'Uploading the same “man on beach” image as before and asking it to `add a hat
    to this man` gave decent results:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 上传之前相同的“海滩上的男人”图像，并要求“给这个男人加上一顶帽子”，得到了不错的结果：
- en: '![Figure 7.6 – Gemini’s output; I could have been more specific, but this hat
    is an appropriate choice](img/B34247_07_6.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图7.6 – Gemini的输出；我本可以更具体一些，但这个帽子是一个合适的选择](img/B34247_07_6.png)'
- en: Figure 7.6 – Gemini’s output; I could have been more specific, but this hat
    is an appropriate choice
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.6 – Gemini的输出；我本可以更具体一些，但这个帽子是一个合适的选择
- en: Consistency is high, but the main problem with this from a production standpoint
    is that the output doesn’t quite match the input; it’s been cropped and slightly
    enlarged, the resolution has changed from `1024 x 512 px` to `1024 x 535 px`,
    and there’s visible quality loss.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性很高，但从生产角度来看，主要问题是输出并不完全匹配输入；它已被裁剪并略微放大，分辨率从`1024 x 512 px`变为`1024 x 535 px`，并且有明显的质量损失。
- en: Another issue stems from file management. When you upload, process, and redownload,
    the original filename is lost, and each downloaded file must be renamed and copied
    to a stable location. Issues like this are inevitable for web-based systems, and
    while these aren’t insurmountable issues for one-off tests, they are problematic
    for production workflows.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个问题源于文件管理。当你上传、处理和重新下载时，原始文件名会丢失，每个下载的文件都必须重命名并复制到稳定的位置。这类问题对于基于网络的系统来说是不可避免的，虽然这些并不是无法克服的问题，但对于一次性的测试来说，它们在生产流程中可能会造成问题。
- en: Production workflows based entirely within Photoshop are much easier to manage,
    so if you want to use Nano Banana, I’d use it within Photoshop if possible. Resolution
    is still an issue, but this can be worked around by selecting a smaller area to
    be generated or by regenerating only part of a larger area.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 完全在Photoshop内部的生产流程更容易管理，所以如果你想使用Nano Banana，如果可能的话，我会在Photoshop中使用它。分辨率仍然是一个问题，但可以通过选择生成较小的区域或仅重新生成较大区域的一部分来解决这个问题。
- en: Another concern is that generations are sometimes offset or with a different
    brightness level from the original. To fix these issues, add a layer mask and
    paint that mask around the edges with a soft, black brush. AI generation within
    Photoshop is powerful, and though it’s not perfect, it can be a useful tool for
    difficult retouching tasks. This feature is under active development right now,
    and it may change again soon in upcoming releases.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个担忧是，生成的图像有时与原始图像的偏移或亮度级别不同。为了修复这些问题，添加一个图层蒙版，并使用柔软的黑色画笔在该蒙版周围绘制。Photoshop
    中的 AI 生成功能强大，尽管它并不完美，但可以成为困难修图任务的实用工具。这个功能目前正在积极开发中，并且在未来版本中可能会再次发生变化。
- en: 'For the very latest information on Photoshop, I’d recommend following the latest
    from Unmesh Dinda at PiXImperfect—in my opinion, the best Photoshop educator on
    YouTube. Here’s a video about the introduction of Nano Banana into Photoshop,
    likely slightly out of date by the time you read this, but with plenty of great
    ideas: [https://youtu.be/RJ2eqkk_JxI](https://youtu.be/RJ2eqkk_JxI). For example,
    did you know you can annotate an image with text instructions and use a text prompt
    such as `follow the prompts in the image`?'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 Photoshop 的最新信息，我建议关注 PiXImperfect 的 Unmesh Dinda 的最新动态——在我看来，他是 YouTube
    上最好的 Photoshop 教育者。这是一段关于将 Nano Banana 引入 Photoshop 的视频，可能在你阅读时已经有些过时，但其中有很多很好的想法：[https://youtu.be/RJ2eqkk_JxI](https://youtu.be/RJ2eqkk_JxI)。例如，你知道你可以用文本说明来注释图像，并使用文本提示，如
    `跟随图像中的提示` 吗？
- en: 'Still, web-based text prompting could be an option worth considering, so let’s
    see how different web services can handle the same people-removal task I performed
    in Photoshop at the start of this section. Instead of using menus and painting
    missed areas by hand, I’m just going to ask the tool to do it in plain English:
    `Remove the people from this image`. Here’s how different models performed:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，基于网络的文本提示可能是一个值得考虑的选项，让我们看看不同的网络服务如何处理我在本节开头在 Photoshop 中执行的同一个人脸移除任务。我不再使用菜单和手动绘制遗漏的区域，而是直接用简单的英语请求工具完成：`从这张图片中移除人物`。以下是不同模型的表现：
- en: '**Gemini** ([http://gemini.google.com](http://gemini.google.com)): Its older
    image model did a passable job, but the replacement area could be better. Resolution
    was poor, and detail was lost. The newer Nano Banana model did a better job but
    still suffered from poor resolution and lost detail.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Gemini** ([http://gemini.google.com](http://gemini.google.com))：其较旧的图像模型完成了可接受的工作，但替换区域可以做得更好。分辨率较差，细节丢失。较新的
    Nano Banana 模型做得更好，但仍然存在分辨率低和细节丢失的问题。'
- en: '**ChatGPT** ([http://chatgpt.com](http://chatgpt.com), with a free account):
    It did an OK job of the removal, but took its time, and cropped the image to a
    square.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ChatGPT** ([http://chatgpt.com](http://chatgpt.com), 使用免费账户)：它在移除方面做得不错，但花费了较长时间，并且裁剪了图像成方形。'
- en: '**Sora** ([http://sora.chatgpt.com](http://sora.chatgpt.com), v1, with a ChatGPT
    Plus paid account): It did a good job in a minute or two, and didn’t change the
    image’s aspect ratio, but resolution wasn’t as high as the original.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Sora** ([http://sora.chatgpt.com](http://sora.chatgpt.com), v1, 使用 ChatGPT
    Plus 付费账户)：它在一两分钟内完成了良好的工作，没有改变图像的宽高比，但分辨率没有原始图像高。'
- en: '**Freepik** ([https://www.freepik.com/](https://www.freepik.com/)): It did
    a very good job, very quickly, using the Flux Kontext Max model. A paid plan is
    required for a commercial license or high-resolution output.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Freepik** ([https://www.freepik.com/](https://www.freepik.com/))：它非常快速地完成了出色的工作，使用了
    Flux Kontext Max 模型。需要付费计划才能获得商业许可证或高分辨率输出。'
- en: '**Claid.ai** ([https://claid.ai/](https://claid.ai/)): It did a pretty good
    job. High resolution output is only available with a paid plan.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Claid.ai** ([https://claid.ai/](https://claid.ai/))：它做得相当不错。高分辨率输出仅适用于付费计划。'
- en: Though many options exist for this task, if you need a high-resolution result,
    you’ll need to pay for it.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这个任务有许多选项，但如果你需要高分辨率的结果，你可能需要为此付费。
- en: '![Figure 7.7 – Freepik (shown) and Claid produced results equal to Photoshop](img/B34247_07_7.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.7 – Freepik（显示）和 Claid 生成的结果与 Photoshop 相当](img/B34247_07_7.png)'
- en: Figure 7.7 – Freepik (shown) and Claid produced results equal to Photoshop
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.7 – Freepik（显示）和 Claid 生成的结果与 Photoshop 相当
- en: Not all AI-enhanced photo tools accept text input, so if you’d prefer a tool
    to handle more unusual requests, check that prompting is supported. This approach
    also allows a service provider such as Freepik to design prompts to support specific
    workflows, such as `Generate Different Angles of Person` or `Place Product in
    a New Setting`.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有增强型AI照片工具都接受文本输入，所以如果你希望工具能够处理更不寻常的请求，请检查是否支持提示。这种方法还允许服务提供商如Freepik设计提示以支持特定的流程，例如`Generate
    Different Angles of Person`或`Place Product in a New Setting`。
- en: ChatGPT’s text model interprets your requests, then other image models handle
    the image creation.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的文本模型解释你的请求，然后其他图像模型处理图像创建。
- en: '![Figure 7.8 – Freepik offers many prompt-driven workflows, including these](img/B34247_07_8.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图7.8 – Freepik提供许多由提示驱动的流程，包括这些](img/B34247_07_8.png)'
- en: Figure 7.8 – Freepik offers many prompt-driven workflows, including these
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.8 – Freepik提供许多由提示驱动的流程，包括这些
- en: Some of these go well beyond what would be possible through simple retouching,
    and usable results can be obtained in just a few seconds. We’ll return to more
    complex image-to-image workflows shortly.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一些远远超出了简单修图所能达到的效果，而且可以在几秒钟内获得可用的结果。我们很快将回到更复杂的图像到图像的工作流程。
- en: Expanding original images
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展原始图像
- en: It’s not unusual for an image to be more tightly framed than a layout artist
    would prefer. In an ideal world, a photographer could frame their shots more loosely,
    giving the designer final control over cropping and placement.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图像被构图得比布局艺术家希望的更紧密并不罕见。在一个理想的世界里，摄影师可以更宽松地构图他们的照片，让设计师最终控制裁剪和放置。
- en: Because we *don’t* live in an ideal world, a photographer is more likely to
    frame their shots in a way that looks good to them, cropping the subject more
    closely in the camera or during processing. The client then approves those “nicely
    cropped” shots in their own context, and everyone is happy. But later, if the
    edges of the image turn out to be needed after all, AI can help to fill in the
    missing areas.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们**不**生活在一个理想的世界里，摄影师更有可能以对他们来说看起来好的方式构图他们的照片，在相机或处理过程中更紧密地裁剪主题。然后客户在自己的环境中批准那些“裁剪得很好”的照片，每个人都感到高兴。但后来，如果图像的边缘最终被发现是必需的，AI可以帮助填补缺失的区域。
- en: '**Image extension** is conceptually similar to replacing an unwanted part of
    an image. Instead of replacing part of the original image, its boundaries are
    extended in one or more dimensions, then the new area is filled in with image
    data that looks like the original. While it’s possible to use older tools such
    as the Healing Brush and Content-Aware Fill to perform this task, it’s often easier
    with Generative Fill.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像扩展**在概念上与替换图像中不需要的部分相似。不是替换原始图像的一部分，而是在一个或多个维度上扩展其边界，然后使用看起来像原始图像的图像数据填充新区域。虽然可以使用像修复画笔和内容感知填充这样的旧工具来完成这项任务，但使用生成填充通常更容易。'
- en: '![Figure 7.9 – With the original image shown here outlined in green, Photoshop
    offers three potential expansion options](img/B34247_07_9.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图7.9 – 在这里用绿色轮廓显示的原始图像，Photoshop提供了三种可能的扩展选项](img/B34247_07_9.png)'
- en: Figure 7.9 – With the original image shown here outlined in green, Photoshop
    offers three potential expansion options
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.9 – 在这里用绿色轮廓显示的原始图像，Photoshop提供了三种可能的扩展选项
- en: Adobe apps offer this feature in a few ways. You can perform this task in Photoshop
    with a manual selection and Generative Fill, as a generative expand with the Crop
    tool, or even in InDesign, depending on workflow requirements. Other image processing
    tools can get the job done, too.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: Adobe应用程序以几种方式提供此功能。您可以在Photoshop中使用手动选择和生成填充来完成此任务，作为裁剪工具的生成扩展，或者在InDesign中，具体取决于工作流程要求。其他图像处理工具也可以完成这项工作。
- en: '![Figure 7.10 – Claid.ai required two upscaling operations (vertical, then
    horizontal) to get this result](img/B34247_07_10.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图7.10 – Claid.ai需要两次上采样操作（垂直，然后水平）才能得到这个结果](img/B34247_07_10.png)'
- en: Figure 7.10 – Claid.ai required two upscaling operations (vertical, then horizontal)
    to get this result
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.10 – Claid.ai需要两次上采样操作（垂直，然后水平）才能得到这个结果
- en: This feature, often called **outpainting**, is common in AI image processing
    services, and many services can give good results. If you need to reuse an image
    in a new context, and the original image can’t be found, it’s not a bad way to
    go. However, be aware that if an original uncropped image does exist, you should
    always try to find it, or you could accidentally misrepresent reality. Inventing
    any part of a human’s body—as shown in the preceding figure—is ill-advised.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这个功能通常被称为**扩展绘画**，在AI图像处理服务中很常见，许多服务都能给出良好的结果。如果你需要在新的语境中重新使用一个图像，而原始图像找不到，这不是一个坏的选择。然而，请注意，如果确实存在原始未裁剪的图像，你应该始终尝试找到它，否则你可能会无意中歪曲现实。如前图所示，创造人体任何一部分都是不明智的。
- en: While the woman in the images shown here is not real, it’s easy to imagine offence
    to real people being caused by image extension—and this has indeed happened. In
    early 2024, Australian TV network *Channel Nine* faced criticism after using AI
    to expand an image. As part of a TV news story, Georgie Purcell (Member of Parliament,
    Victoria) was filmed and photographed wearing a white dress. This image was later
    cropped to show only the area above her waist and used in another context. Later,
    this cropped image was expanded with GenAI to show her wearing a crop top rather
    than the original dress ([https://theconversation.com/nine-was-slammed-for-ai-editing-a-victorian-mps-dress-how-can-news-media-use-ai-responsibly-222382](https://theconversation.com/nine-was-slammed-for-ai-editing-a-victorian-mps-dress-how-can-news-media-use-ai-responsibly-222382)).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这里展示的图像中的女性并非真实存在，但很容易想象到通过图像扩展可能会对真实人物造成冒犯——这确实已经发生了。2024年初，澳大利亚电视网络**九号台**在使用AI扩展图像后遭到了批评。作为一条电视新闻故事的一部分，维多利亚州的国会议员Georgie
    Purcell（议员）被拍摄和拍照时穿着一件白色连衣裙。这张照片后来被裁剪，只展示了她腰以上的区域，并在另一个语境中使用。后来，这张裁剪后的图像通过生成式AI扩展，展示了她穿着露脐装而不是原来的连衣裙（[https://theconversation.com/nine-was-slammed-for-ai-editing-a-victorian-mps-dress-how-can-news-media-use-ai-responsibly-222382](https://theconversation.com/nine-was-slammed-for-ai-editing-a-victorian-mps-dress-how-can-news-media-use-ai-responsibly-222382))。
- en: While Generative AI has clear uses in advertising and ideation, be very careful
    when using it on images of real people in a fact-based context. Still, generative
    expansion isn’t anywhere near as controversial as creating complete images, and
    that’s up next.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然生成式AI在广告和创意方面有明显的用途，但在基于事实的语境中使用真实人物的图像时，请务必非常小心。然而，生成式扩展并不像创建完整图像那样具有争议性，而这正是接下来要讨论的。
- en: Creating original images
  id: totrans-87
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建原始图像
- en: You’ll have almost certainly encountered AI-made images in the wild by now,
    but… do you want to use an AI to make images for you? The closer you are to the
    image creation process, the less likely you are to be excited by the prospect.
    If your main job is marketing, and you see graphic design and photography as expenses,
    you might like the idea a lot. But if you’re a photographer or illustrator, why
    would you want to stop doing it?
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可能已经在野外遇到了AI制作的图像，但……你想要使用AI为你制作图像吗？你越接近图像创建过程，你对这个前景就越可能不感兴趣。如果你的主要工作是市场营销，并且你将图形设计和摄影视为费用，你可能非常喜欢这个想法。但如果你是一位摄影师或插画家，你为什么要停止做这件事呢？
- en: Still, while clients should care enough about their images to hire skilled professionals
    to create them, not all do, and this is nothing new. If a small business doesn’t
    see the benefit in hiring a photographer or designer to craft their image, historically,
    they’d do it themselves, or use a template, or ask a family member who “knows
    Photoshop” to help. Today, they might just use AI.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管客户应该足够关心他们的图像，以至于雇佣有技能的专业人士来创建它们，但并非所有客户都这样做，这并不是什么新鲜事。如果一个小型企业看不到雇佣摄影师或设计师来制作图像的好处，从历史上看，他们可能会自己制作，或者使用模板，或者请一个“知道Photoshop”的家庭成员帮忙。今天，他们可能会直接使用AI。
- en: Even in professional jobs for larger companies, not every image is of the same
    worth. A graphic designer tasked with finding an image to illustrate a point in
    an annual report doesn’t have a budget for photography, but they might have a
    stock image.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在大公司中的专业职位上，并非每个图像都具有相同的价值。被指派在年度报告中找到一个图像来说明观点的图形设计师可能没有摄影预算，但他们可能拥有库存图像。
- en: Today, that budget might have shrunk to zero, and they might choose to source
    an image from a free stock image site such as [pexels.com](http://pexels.com)
    or [pixabay.com](http://pixabay.com), or [unsplash.com](http://unsplash.com),
    with its hybrid free/paid model. All these sites now include real photos alongside
    AI-made images, though the AI-made images are tagged as such.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这个预算可能已经缩减为零，他们可能会选择从免费股票图片网站如[pexels.com](http://pexels.com)或[pixabay.com](http://pixabay.com)，或[unsplash.com](http://unsplash.com)（其混合免费/付费模式）获取图片。所有这些网站现在都包括真实照片和AI制作的图像，尽管AI制作的图像被标记为这样的。
- en: In a situation where a stock image made by humans would be acceptable, is it
    OK to use an AI-made image instead? Ask your customers. Their answer might be
    different regarding abstract images used in an annual report when compared to
    an art-focused project, such as a board game. If consumers have a strong preference
    for human-made art, using AI art could sink a crowdfunding project.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在人类制作的库存图片可以接受的情况下，使用AI制作的图像是否合适？询问您的客户。他们的答案可能因年度报告中使用的抽象图像与以艺术为重点的项目（如桌面游戏）而不同。如果消费者对人工艺术有强烈的偏好，使用AI艺术可能会使众筹项目失败。
- en: But even if you choose not to use AI-made images for finished art, consider
    using AI image creation tools for ideation and mockups. Even though AI art is,
    by its nature, derivative of other art, so is the traditional mockup process,
    in which other people’s images are used for inspiration and mood-setting.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 即使您选择不使用AI制作的图像来完成艺术作品，也请考虑使用AI图像创建工具进行创意和原型设计。尽管AI艺术本质上是对其他艺术的衍生，但传统的原型设计过程也是如此，其中使用他人的图像作为灵感和情绪设置的来源。
- en: You’re in charge of what you use this tech for. Here, we’ll look at what’s possible,
    what’s good, and what’s not, and we’ll start with creating images from text.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 您负责决定如何使用这项技术。在这里，我们将探讨可能实现的内容、好的方面以及不好的方面，并从从文本创建图像开始。
- en: Image generation from text prompts
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从文本提示生成图像
- en: Prompting allows you to define what an image should contain and in what style
    it should be presented. While text prompting can’t reliably produce an image showing
    a specific product—for that, you’ll need an image-to-image workflow—it’s still
    very useful. If a stock image search comes up empty, and there’s no budget to
    capture the image for real, just ask an AI to make one.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 提示允许您定义图像应包含的内容以及其应呈现的风格。虽然文本提示无法可靠地生成显示特定产品的图像——为此您需要图像到图像的工作流程——但它仍然非常有用。如果库存图片搜索结果为空，且没有预算来真实捕捉图像，只需让AI制作一个即可。
- en: Services can vary in their output quality, speed, user interface, and pricing,
    and your use cases will determine how much you prioritize each of these. If you
    only want images for mockups, an imperfect solution that’s built into your existing
    software may be more appealing than a higher-quality paid solution, for example.
    In other situations, you may be limited by platform self-censorship. Many models
    steer a long way clear of anything that could be considered violent or explicit,
    and Firefly won’t even generate an image of the Eiffel Tower.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 服务的输出质量、速度、用户界面和定价可能各不相同，而您的用例将决定您对每个方面的优先级。例如，如果您只想为原型制作图像，那么内置在现有软件中的不完美解决方案可能比高质量的付费解决方案更有吸引力。在其他情况下，您可能受到平台自我审查的限制。许多模型会尽量避免任何可能被认为是暴力或露骨的内容，而Firefly甚至不会生成埃菲尔铁塔的图像。
- en: '![Figure 7.11 – This prompt was simply “The Eiffel Tower, at a 45° angle, on
    a sunny day with blue skies”](img/B34247_07_11.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图7.11 – 这个提示仅仅是“埃菲尔铁塔，以45°角，在晴朗的蓝天下的样子”](img/B34247_07_11.png)'
- en: Figure 7.11 – This prompt was simply “The Eiffel Tower, at a 45° angle, on a
    sunny day with blue skies”
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.11 – 这个提示仅仅是“埃菲尔铁塔，以45°角，在晴朗的蓝天下的样子”
- en: While some tools are exclusively available on specific platforms, other models
    can be found across multiple vendors. For example, Apple’s **Image Playground**
    is available only on Apple’s hardware, but you can access the **FLUX.1 Kontext**
    model through Adobe Firefly, Freepik, and others. Progress in this space is rapid,
    and you’ll need to run your own tests to see which service(s) suits your needs.
    If you’re using Firefly, remember that using third-party models costs generative
    credits—check how many you have before you start.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然一些工具仅可在特定平台上使用，但其他模型可以在多个供应商之间找到。例如，苹果的**Image Playground**仅在苹果的硬件上可用，但您可以通过Adobe
    Firefly、Freepik和其他方式访问**FLUX.1 Kontext**模型。这个领域的进步非常迅速，您需要自己测试以查看哪个服务（或服务组合）符合您的需求。如果您使用Firefly，请记住使用第三方模型会消耗生成信用——在开始之前检查您有多少。
- en: If you know what you’re looking for, using detailed instructions will give better
    results, and if you leave the details up to the model, you can expect more variety.
    Be sure to specify the subject, what’s happening, where they are, and the style
    of image you want.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您知道您在寻找什么，使用详细的说明将给出更好的结果，如果您将细节留给模型，您可以期待更多样化的结果。务必指定主题、正在发生的事情、它们所在的位置以及您想要的图像风格。
- en: Use descriptive adjectives, specify the desired aspect ratio, and include photographic
    and lighting instructions, too. If a prompt doesn’t quite work, add to it and
    try again, or add negative information, such as `no extra limbs`, if you face
    repeated issues.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 使用描述性形容词，指定所需的宽高比，并包括摄影和照明说明。如果提示不太有效，可以添加内容并再次尝试，或者如果您遇到重复问题，可以添加负面信息，例如`没有额外的肢体`。
- en: Some services, such as Firefly, allow you to choose additional options such
    as aspect ratio and style using options alongside the prompt. We’ll discuss reference
    images and style options in the next section of this chapter.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 一些服务，例如Firefly，允许您在提示旁边选择额外的选项，如宽高比和风格。我们将在本章下一节讨论参考图像和风格选项。
- en: Simpler, faster models can struggle with more complex prompts involving multiple
    subjects. You’ll face trade-offs between the size of generated images and speed
    and may need to upscale low-resolution images for some purposes. Also, you’ll
    find that many models produce garbled text—be ready to fix it manually if needed.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 简单、快速的模型可能难以处理涉及多个主题的更复杂提示。您将在生成的图像大小和速度之间面临权衡，并且可能需要为了某些目的提高低分辨率图像的分辨率。此外，您会发现许多模型会产生混乱的文本——如果需要，请准备好手动修复它。
- en: 'Here, we’ll try the same prompts on several different models, highlight important
    differences between vendors, and offer some strategies. Here are the prompts:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将尝试在几个不同的模型上使用相同的提示，突出供应商之间的重要差异，并提供一些策略。以下是提示：
- en: '`A hand holding soil from which a small green seedling is growing, dark clear
    background, strong overhead lighting, realistic modern photo`'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`一只手握着从土壤中生长的小绿苗，背景是黑暗的清晰背景，强烈的顶光，逼真的现代照片`'
- en: '`New York City streets devastated by flooding, people in a rowboat moving through
    the intersection of Broadway and 51st Street, grainy black and white historical
    photo`'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`洪水破坏的纽约市街道，人们在驳船上穿过百老汇和51街的交叉口，模糊的黑白历史照片`'
- en: '`A menacing skeleton holding a sword, dark dungeon background, mouth open,
    ready to attack, fantasy illustration style`'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`一个手持剑的威胁性骷髅，背景是黑暗的地牢，嘴巴张开，准备攻击，幻想插画风格`'
- en: '`Abstract art with neon gradients featuring dots and swirls, modern tech style,
    vector illustration`'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`具有霓虹渐变和点的漩涡的抽象艺术，现代科技风格，矢量插画`'
- en: '`A brown fox is jumping quickly over a dog that is lying down asleep in a pine
    forest, dappled light, fairytale watercolor illustration`'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`一只棕色的狐狸快速跳过躺在松树林中睡觉的狗，斑驳的光线，童话水彩插画`'
- en: 'Importantly, note that some services will advise you how to improve the prompting
    process, and may even “enhance” your prompts. For example, Firefly includes a
    **Prompt Enhancement** feature that’s on by default with their own models, turning
    the preceding New York City prompt into the following:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，一些服务会指导您如何改进提示过程，甚至可能“增强”您的提示。例如，Firefly包含一个默认开启的**提示增强**功能，将先前的纽约市提示转换为以下内容：
- en: '![Figure 7.12 – An enhanced prompt can add unwanted details](img/B34247_07_12.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图7.12 – 增强的提示可能会添加不希望出现的细节](img/B34247_07_12.png)'
- en: Figure 7.12 – An enhanced prompt can add unwanted details
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.12 – 增强的提示可能会添加不希望出现的细节
- en: While a more detailed description will give more specific results, the emotional
    language added here is not appropriate for a news-style image. Specifying water
    rising “to the mid-calf” simply isn’t what I asked for or wanted. Be wary. On
    the other hand, because Firefly allows you to select from many third-party models
    as well as their own, it can be a good place to quickly compare how effective
    they might be for your own work, and if you’re an Adobe subscriber, you already
    have access.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然更详细的描述会给出更具体的结果，但这里添加的情感语言对于新闻风格的图像来说并不合适。指定水位“升到小腿中部”并不是我所要求的或想要的。要小心。另一方面，由于Firefly允许您从许多第三方模型以及他们自己的模型中选择，因此它是一个快速比较它们可能对您的工作有多有效的好地方，如果您是Adobe订阅者，您已经可以访问了。
- en: To find a model that creates work you like from prompts you’re happy to write,
    it’s worth running *many* free tests before paying for a subscription. Besides
    the Firefly-accessible models, you currently need a paid ChatGPT account to access
    Sora, and if you want to try Midjourney for free, download the mobile app *Niji
    Journey* (in your mobile app store) for a free trial there.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到一个能够根据你愿意撰写的提示创建你喜欢的作品的模型，在付费订阅之前进行多次免费测试是值得的。除了萤火虫可访问的模型外，你目前需要付费的ChatGPT账户才能访问Sora，如果你想免费尝试Midjourney，请下载移动应用*Niji
    Journey*（在你的移动应用商店中）进行免费试用。
- en: Here, I’ve tried these prompts with Adobe Firefly models, Runway, Flux 1.1 Ultra,
    Sora, ChatGPT, Midjourney, KlingAI, Nano Banana Pro, and others. Note that Apple
    includes an app called Image Playground on Apple devices, but it can’t handle
    longer prompts the same way these other tools can.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我尝试了Adobe Firefly模型、Runway、Flux 1.1 Ultra、Sora、ChatGPT、Midjourney、KlingAI、Nano
    Banana Pro和其他模型的这些提示。请注意，苹果设备上包含一个名为Image Playground的应用程序，但它无法像这些其他工具一样处理较长的提示。
- en: All of the models tested did well on at least some of these prompts, but overall,
    the most consistent, highest-quality results came from OpenAI’s Sora (v1) and
    Nano Banana Pro, the only models to create images showing the requested location
    in New York City, and that included legible, relevant text.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 所有测试过的模型在至少一些提示上表现良好，但总体而言，最一致、质量最高的结果来自OpenAI的Sora（v1）和Nano Banana Pro，这是唯一能够创建显示纽约市请求位置的图像的模型，并且包括可辨认的相关文本。
- en: '![Figure 7.13 – Sora’s NYC image is pretty much exactly what I wanted](img/B34247_07_13.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图7.13 – Sora的纽约市图像几乎完全符合我的期望](img/B34247_07_13.png)'
- en: Figure 7.13 – Sora’s NYC image is pretty much exactly what I wanted
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.13 – Sora的纽约市图像几乎完全符合我的期望
- en: This particular prompt proved challenging for most other models. In some generations,
    people were walking on sidewalks next to the “flooded” road; in most, the text
    was garbled. The most common issue was a general feeling of inauthenticity.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 这个特定的提示对大多数其他模型来说都很有挑战性。在某些生成中，人们正在“洪水”道路旁边的人行道上行走；在大多数情况下，文本是混乱的。最常见的问题是感觉不真实。
- en: 'Sora did well on the other prompts, too:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: Sora在其他的提示上也表现良好：
- en: '![Figure 7.14 – Other results from Sora](img/B34247_07_14.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图7.14 – Sora的其他结果](img/B34247_07_14.png)'
- en: Figure 7.14 – Other results from Sora
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.14 – Sora的其他结果
- en: 'Nano Banana Pro did well, with no major errors and a high level of adherence
    to the prompts provided. While I’d still *just* give the edge to Sora (v1), these
    results are solid:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: Nano Banana Pro表现良好，没有重大错误，并且高度遵循提供的提示。虽然我仍然只稍微倾向于Sora（v1），但这些结果很稳固：
- en: '![Figure 7.15 – Nano Banana Pro’s results on all prompts](img/B34247_07_15.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图7.15 – Nano Banana Pro在所有提示上的结果](img/B34247_07_15.png)'
- en: Figure 7.15 – Nano Banana Pro’s results on all prompts
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.15 – Nano Banana Pro在所有提示上的结果
- en: 'Firefly’s built-in model has a big advantage in that its basic generations
    are free with an Adobe account, and four images are produced by default. While
    its soil hands were mostly OK, the last one is nightmare fuel:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 萤火虫内置模型的一个大优势是，其基本生成在Adobe账户下是免费的，默认情况下会生成四张图像。虽然其土壤手部图像大多还可以，但最后一张图像简直是噩梦：
- en: '![Figure 7.16 – What happened with the last hand?](img/B34247_07_16.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图7.16 – 最后的手发生了什么？](img/B34247_07_16.png)'
- en: Figure 7.16 – What happened with the last hand?
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.16 – 最后的手发生了什么？
- en: Further, while Firefly’s New York City images showed more or less the right
    content, they were lacking in detail. The illustrative images didn’t match the
    prompt at all; most of the “dogs” were actually foxes, and sometimes the jumping
    foxes were levitating.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，虽然萤火虫的纽约市图像大致显示了正确的内容，但细节不足。示例图像与提示完全不匹配；大多数所谓的“狗”实际上是狐狸，有时跳跃的狐狸看起来像是漂浮在空中。
- en: '![Figure 7.17 – These NYC images aren’t quite there, and the fox images are
    unusably poor](img/B34247_07_17.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图7.17 – 这些纽约市图像还不够完美，狐狸图像几乎无法使用](img/B34247_07_17.png)'
- en: Figure 7.17 – These NYC images aren’t quite there, and the fox images are unusably
    poor
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.17 – 这些纽约市图像还不够完美，狐狸图像几乎无法使用
- en: To be fair, Firefly is a multipurpose tool with many other tricks in its toolbox.
    If you want to style an image of text to look like liquid metal or orange fur,
    it’s got you covered, but its default models aren’t the best at pure photographic
    output just yet.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 公平地说，萤火虫是一个多用途工具，其工具箱中有很多其他技巧。如果你想将文本图像的风格化为液态金属或橙色皮毛，它都能满足你的需求，但它的默认模型在纯摄影输出方面还不太出色。
- en: '![Figure 7.18 – Firefly’s Text Effects hooks into a prompt-based style creator
    within Adobe Express](img/B34247_07_18.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![图7.18 – Firefly的文本效果在Adobe Express中的基于提示的风格创建器中](img/B34247_07_18.png)'
- en: Figure 7.18 – Firefly’s Text Effects hooks into a prompt-based style creator
    within Adobe Express
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.18 – Firefly的文本效果在Adobe Express中的基于提示的风格创建器中
- en: But let’s return to the photographic and illustration comparisons. **Midjourney**
    produced some terrific illustration-style images of skeletons but couldn’t make
    the fox jump over the sleeping dog—instead, they’re both asleep.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 但让我们回到摄影和插图比较。**Midjourney**产生了一些出色的骨骼风格插图，但无法让狐狸跳过睡狗——相反，它们都睡着了。
- en: '![Figure 7.19 – Midjourney’s menacing skeleton and sleeping animals](img/B34247_07_19.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图7.19 – Midjourney的威胁性骨骼和睡眠中的动物](img/B34247_07_19.png)'
- en: Figure 7.19 – Midjourney’s menacing skeleton and sleeping animals
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.19 – Midjourney的威胁性骨骼和睡眠中的动物
- en: 'Google’s **Imagen** produced some solid results, including these:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: Google的**Imagen**产生了一些可靠的结果，包括以下这些：
- en: .![Figure 7.20 – Imagen’s soil hand was good, and its skeleton is suitably menacing](img/B34247_07_20.jpg)
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: .![图7.20 – Imagen的手部土壤效果很好，其骨骼造型也相当威胁](img/B34247_07_20.jpg)
- en: Figure 7.20 – Imagen’s soil hand was good, and its skeleton is suitably menacing
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.20 – Imagen的手部土壤效果很好，其骨骼造型也相当威胁
- en: '**KlingAI**, from DeepSeek, was mostly quick and effective:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '**KlingAI**，来自DeepSeek，大多数情况下既快又有效：'
- en: '![Figure 7.21 – Kling’s hand was good, and its fox jumps nicely over the lazy
    dog](img/B34247_07_21.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图7.21 – Kling的手部效果很好，其狐狸跳过懒狗](img/B34247_07_21.png)'
- en: Figure 7.21 – Kling’s hand was good, and its fox jumps nicely over the lazy
    dog
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.21 – Kling的手部效果很好，其狐狸跳过懒狗的动作也很自然
- en: 'Via Firefly, Flux did a good job on most of these prompts, at a higher resolution
    than most other models:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 通过Firefly，Flux在这些提示中做得很好，分辨率高于大多数其他模型：
- en: '![Figure 7.22 – Flux produced the best abstract art, and its other images were
    good too](img/B34247_07_22.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图7.22 – Flux产生的抽象艺术作品最佳，其其他图像也很好](img/B34247_07_22.png)'
- en: Figure 7.22 – Flux produced the best abstract art, and its other images were
    good too
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.22 – Flux产生的抽象艺术作品最佳，其其他图像也很好
- en: 'Runway was also able to produce decent output:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: Runway也能产生不错的输出：
- en: '![Figure 7.23 – Runway’s offerings were solid](img/B34247_07_23.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![图7.23 – Runway的提供内容扎实](img/B34247_07_23.png)'
- en: Figure 7.23 – Runway’s offerings were solid
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.23 – Runway的提供内容扎实
- en: Quantity production options
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 量产选项
- en: 'If you care about quantity and not quality, check out **Diffusion Bee**: a
    free Mac app that runs the older Stable Diffusion locally, for free. If you need
    a high quantity for rough mockup purposes, the cost is unbeatable.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更关心数量而不是质量，可以查看**Diffusion Bee**：一个免费的Mac应用程序，可以在本地免费运行较旧的Stable Diffusion。如果你需要大量的粗糙草图，成本是无法比拟的。
- en: '![Figure 7.24 – These generations aren’t very good, but they are completely
    free and unlimited](img/B34247_07_24.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图7.24 – 这些生成效果不是很好，但它们是完全免费且无限的](img/B34247_07_24.png)'
- en: Figure 7.24 – These generations aren’t very good, but they are completely free
    and unlimited
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.24 – 这些生成效果不是很好，但它们是完全免费且无限的
- en: Another option that’s great for quantity production is **Grok** ([https://grok.com/imagine](https://grok.com/imagine)
    or via the Grok mobile app), which lets you simply scroll down to see more images,
    and more again. The speed of generation here is impressive, and for ideation,
    this could be remarkably useful. Even though a large number of images are produced,
    the quality is OK, and video generation (discussed in the next chapter) is a tap
    away from any image.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个非常适合量产的选项是**Grok**（[https://grok.com/imagine](https://grok.com/imagine)或通过Grok移动应用程序），它允许你简单地向下滚动查看更多图像，还有更多。这里的生成速度令人印象深刻，对于创意来说，这可能非常有用。尽管产生了大量图像，但质量尚可，视频生成（下一章讨论）只需轻触即可从任何图像开始。
- en: '![Figure 7.25 – Grok’s images aren’t best-in-class for quality, but it’s very
    fast](img/B34247_07_25.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图7.25 – Grok的图像在质量上不是最佳，但速度非常快](img/B34247_07_25.png)'
- en: Figure 7.25 – Grok’s images aren’t best-in-class for quality, but it’s very
    fast
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.25 – Grok的图像在质量上不是最佳，但速度非常快
- en: For each prompt here, I’ve shown the first four but looked at many more and
    found similar issues to most other models. Dogs were often foxes or at least had
    a fox’s tail; New York wasn’t realistic; the fantasy illustrations looked cheap
    compared to other models; and some of the plant images included garbled, unwanted
    text. If speed is a focus, note that each set of four images took just a few seconds,
    and scrolling for more can be addictive. It’s unclear what the long-term cost
    of these images will be, but it’s all free right now.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这里的每个提示，我展示了前四个，但已经看过更多，并发现与大多数其他模型类似的问题。狗通常是狐狸或至少有狐狸的尾巴；纽约不真实；与其他模型相比，幻想插图看起来很廉价；一些植物图像包含了混乱的、不希望出现的文字。如果速度是重点，请注意，每组四张图像只需几秒钟，滚动查看更多可能会上瘾。这些图像的长期成本尚不清楚，但现在是完全免费的。
- en: Because models change and your needs won’t be the same as mine, you could get
    good results from any of these services, or from many others I haven’t included
    here, such as Leonardo or the latest Stable Diffusion models. Still, between Sora
    and the offerings available through Firefly, I think you’ll be able to produce
    good results. Resolution is a concern with most of these models, but Flux (available
    through Firefly and others) can produce high resolution natively, and upscaling
    is likely to be effective with outputs from other models.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 由于模型会变化，你的需求不会与我的相同，因此你可以从这些服务中的任何一个，或者从我没有包括在内的许多其他服务中获得良好的结果，例如Leonardo或最新的Stable
    Diffusion模型。然而，在Sora和通过萤火虫提供的选项之间，我认为你将能够产生良好的结果。分辨率是大多数这些模型的一个担忧，但Flux（通过萤火虫和其他提供）可以原生地产生高分辨率，并且从其他模型的输出中提升分辨率可能是有效的。
- en: As with many other AI generations, expect imperfections and you won’t be disappointed,
    but you might be pleasantly surprised at how well some of these models can perform.
    One of the sticking points for creatives is that telling a computer what you want
    is an entirely different creation process. For more control over exactly what
    an AI model creates, consider giving it images rather than just text.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 与许多其他AI生成一样，预期会有不完美之处，这样你就不会失望，但你可能会对一些模型的表现感到惊喜。对于创意人士来说，告诉计算机你想要的是什么是一个完全不同的创作过程。为了更精确地控制AI模型创建的内容，考虑给它图像而不是仅仅文本。
- en: Image generation from other images
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从其他图像生成图像
- en: Image-to-image workflows can take several forms. If you need to replace just
    part of an image, that’s still best done with a tool such as Photoshop, but if
    you want to use one image as inspiration or style source for another, or ensure
    consistency in a suite of images, look for a tool that explicitly supports this.
    Many do, including Photoshop, most models at Firefly (including Nano Banana),
    and Freepik, to name just a few.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图像到图像的工作流程可以有多种形式。如果你只需要替换图像的一部分，仍然最好使用像Photoshop这样的工具，但如果你想要将一个图像作为另一个图像的灵感或风格来源，或者确保一系列图像的一致性，寻找一个明确支持这一功能的工具。许多工具都支持，包括Photoshop，萤火虫模型中的大多数（包括Nano
    Banana），以及Freepik，仅举几个例子。
- en: Simply asking for a specific image style is possible during text-to-image workflows,
    and some models, such as Firefly, allow you to upload a reference image for composition
    and/or for style—just be sure to choose the right image for each context. Sample
    images can be used if you don’t have an original source of your own.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在文本到图像的工作流程中，可以简单地要求特定的图像风格，一些模型，例如萤火虫模型，允许你上传一个参考图像用于构图和/或风格——但请确保为每个上下文选择正确的图像。如果你没有自己的原始来源，可以使用样本图像。
- en: Photoshop’s **Generate Image** feature allows you to include a **Style reference**
    and/or a **Composition reference**, and it’s a helpful way to make a generated
    image match the layout or colors from an existing logo or photo.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: Photoshop的**生成图像**功能允许你包含**风格参考**和/或**构图参考**，这是一种使生成的图像与现有标志或照片的布局或颜色相匹配的有用方法。
- en: '![Figure 7.26 – Upload reference image(s) for composition and/or style image
    if you want a generation to match your existing work](img/B34247_07_26.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![图7.26 – 如果你想生成的图像与现有作品相匹配，请上传参考图像（s）用于构图和/或风格图像](img/B34247_07_26.png)'
- en: Figure 7.26 – Upload reference image(s) for composition and/or style image if
    you want a generation to match your existing work
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.26 – 如果你想生成的图像与现有作品相匹配，请上传参考图像（s）用于构图和/或风格图像
- en: 'If you don’t want to use an existing image, you can draw from a large bank
    of existing reference images, some of which can be seen here:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不想使用现有的图像，你可以从大量现有的参考图像中获取灵感，其中一些可以在下面看到：
- en: '![Figure 7.27 – The gallery here shows just a few of Photoshop’s style references](img/B34247_07_27.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图7.27 – 这里展示的是Photoshop的一些风格参考](img/B34247_07_27.png)'
- en: Figure 7.27 – The gallery here shows just a few of Photoshop’s style references
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.27 – 这里展示的是Photoshop的一些风格参考
- en: 'Returning to pure text, it’s possible to prompt a service such as **Sora**
    to create additional images in the style of an existing image. Here, I’ve asked
    for a few new images based on the skeleton that Sora made earlier:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 返回纯文本，可以提示像**Sora**这样的服务创建与现有图像风格相匹配的额外图像。在这里，我要求基于Sora之前制作的骨架生成几张新图像：
- en: '![Figure 7.28 – The skeleton was the style template for the dwarf, dragon,
    and treasure (all lightened to show detail)](img/B34247_07_28.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![图7.28 – 骨架是矮人、龙和宝藏（所有都加亮以显示细节）的风格模板](img/B34247_07_28.png)'
- en: Figure 7.28 – The skeleton was the style template for the dwarf, dragon, and
    treasure (all lightened to show detail)
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.28 – 骨架是矮人、龙和宝藏（所有都加亮以显示细节）的风格模板
- en: If you need this level of control more broadly, you’ll want to move to a service
    like **Freepik**, which allows you to provide a larger pool of training images
    from which a LoRA can be generated. Named from **Low Rank Adaptation**, a **LoRA**
    lets a model imitate a style without the model needing to be retrained from scratch
    and is conceptually a custom style that matches your own existing images.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要更广泛地控制这一级别，你可能需要转向像**Freepik**这样的服务，它允许你提供更大的训练图像库，从中可以生成LoRA。名为**低秩自适应**的**LoRA**允许模型模仿一种风格，而无需从零开始重新训练模型，在概念上是一种与你的现有图像相匹配的定制风格。
- en: 'Freepik also offers premade styles if you’d prefer to use theirs, and this
    helps your generations stay similar to one another. These styles can also be used
    to reimagine an image in a new style, a service also offered by Google Whisk.
    Here’s an example, where I’ve uploaded two images to the left, chosen the style
    of a soft toy, and let the site do its thing:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更喜欢使用Freepik提供的预定义风格，这有助于你的生成保持相似。这些风格也可以用来重新想象图像的新风格，这是Google Whisk也提供的一项服务。以下是一个例子，我将两张左边的图片上传，选择了软玩具的风格，并让网站自行处理：
- en: '![Figure 7.29 – Google Whisk, a useful way to remix](img/B34247_07_29.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图7.29 – Google Whisk，一种有用的混搭方式](img/B34247_07_29.png)'
- en: Figure 7.29 – Google Whisk, a useful way to remix
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.29 – Google Whisk，一种有用的混搭方式
- en: The two images shown to the right were generated by two different prompts that
    Google Whisk wrote based on the images to the left. As finished art, they’re not
    so great, but as inspiration? Just fine. It’s also possible to use Photoshop’s
    Generative Fill with prompts such as `make this image into an oil painting` if
    you use a model that’s capable, like Nano Banana. Resolution isn’t perfect, but
    the results are often impressive.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 右侧显示的两幅图像是由Google Whisk根据左侧的图像编写的两个不同提示生成的。作为完成的艺术作品，它们并不那么出色，但作为灵感？那就足够了。如果你使用像Nano
    Banana这样的能够胜任的模型，还可以使用Photoshop的生成填充功能，例如输入“将此图像制作成油画”这样的提示。分辨率可能不是完美的，但结果通常令人印象深刻。
- en: What if you do need photographic images at the quality of finished art, though?
    With some services, this is indeed possible.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，如果你确实需要具有完成艺术作品质量的摄影图像呢？一些服务确实可以实现这一点。
- en: Creating virtual photo shoots
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建虚拟摄影棚
- en: 'Like Firefly, Freepik offers models from other AI providers and repackages
    them within its own interface and unique features: `Generate Different Angles
    of Person`, `Place Product in a New Setting`, and so on. After uploading a single
    image of a girl in a field to Freepik, it can be asked to generate photos at different
    angles:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 就像Firefly一样，Freepik提供来自其他AI提供商的模型，并在其自己的界面和独特功能中重新包装它们：“生成人物的多个角度”、“将产品放置在新环境中”等等。将一位女孩在田野中的单张图片上传到Freepik后，可以要求它以不同的角度生成照片：
- en: '![Figure 7.30 – Freepik allows you to upload a single image, then prompts “Hey!
    Create multiple images from different angles of this photograph” for you](img/B34247_07_30.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![图7.30 – Freepik 允许你上传一张图片，然后为你提示“嘿！从这张照片的不同角度创建多张图片”](img/B34247_07_30.png)'
- en: Figure 7.30 – Freepik allows you to upload a single image, then prompts “Hey!
    Create multiple images from different angles of this photograph” for you
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.30 – Freepik 允许你上传一张图片，然后为你提示“嘿！从这张照片的不同角度创建多张图片”
- en: 'Freepik then produces these three new images:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: Freepik随后生成这三张新图像：
- en: '![Figure 7.31 – Three usable new options, and more available if you ask for
    it](img/B34247_07_31.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![图7.31 – 三种可用的新选项，如果你要求更多，还有更多可用](img/B34247_07_31.png)'
- en: Figure 7.31 – Three usable new options, and more available if you ask for it
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.31 – 三种可用的新选项，如果你要求的话还有更多
- en: Although these photographs don’t *quite* look like they’re of the same person,
    they’re very close, and the value of a tool like this could be huge in the right
    situation. Image-to-image workflows have the potential to scale to a production
    workflow in a way that simply asking for an image with text cannot.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些照片看起来并不完全像是同一个人，但它们非常接近，这种工具在正确的情况下可能具有巨大的价值。图像到图像的工作流程有可能扩展到生产工作流程，而仅仅要求带有文本的图像是无法做到的。
- en: While Freepik includes a selection of predefined characters, you can create
    a new virtual character, or avatar, by uploading many images of a person, real
    or not. These images will then be used to train a model, making it possible to
    create images of a specific, consistent person. This technique is helpful for
    continuity purposes, and we’ll return to it in the next chapter.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Freepik包含一组预定义的角色，但你可以通过上传许多一个人的图片（无论是真实的还是虚拟的）来创建一个新的虚拟角色或头像。然后，这些图片将被用来训练一个模型，使其能够创建特定、一致的人物的图像。这种技术在保持连续性方面很有帮助，我们将在下一章中再次讨论它。
- en: Freepik isn’t the only service able to create images of the same person at different
    angles. **Higgsfield**([https://higgsfield.ai/](https://higgsfield.ai/)) offers
    virtual characters alongside an impressive set of presets, and as it’s mostly
    video-focused, we’ll return to them in the next chapter. Sora can do this job
    too, though it takes a little longer, and you’ll have to make this request in
    a prompt.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: Freepik并不是唯一能够以不同角度创建同一个人图像的服务。**Higgsfield**([https://higgsfield.ai/](https://higgsfield.ai/))提供虚拟角色以及一组令人印象深刻的预设，由于它主要关注视频，我们将在下一章中再次讨论它。Sora也能做这项工作，尽管它需要更长的时间，你需要在提示中提出这个请求。
- en: '![Figure 7.32 – Sora’s Remix feature allows you to request variations, too](img/B34247_07_32.png)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
  zh: '![图7.32 – Sora的Remix功能允许你请求变化，也是如此](img/B34247_07_32.png)'
- en: Figure 7.32 – Sora’s Remix feature allows you to request variations, too
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.32 – Sora的Remix功能允许你请求变化，也是如此
- en: Claid.ai is another image-focused service, and it includes an AI fashion shoot
    feature. You can use one of the virtual models provided or your own images, along
    with images of the clothes you’d like them to model, and it’ll take the virtual
    photos for you.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: Claid.ai是另一个以图像为中心的服务，它包括一个AI时尚拍摄功能。你可以使用提供的虚拟模型或你自己的图片，以及你希望他们展示的衣服图片，然后它会为你拍摄虚拟照片。
- en: '![Figure 7.33 – Here’s Claid.ai’s virtual photo shoot results](img/B34247_07_33.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图7.33 – 这是Claid.ai的虚拟照片拍摄结果](img/B34247_07_33.png)'
- en: Figure 7.33 – Here’s Claid.ai’s virtual photo shoot results
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.33 – 这是Claid.ai的虚拟照片拍摄结果
- en: Combining these ideas, you can now perform a photo shoot with a model holding
    a client’s products or wearing their clothes, either for real or virtually. With
    that in the can, you can create new poses and provide new options without having
    to reshoot. Should you do this, though? That’s a thornier question.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 结合这些想法，你现在可以进行一次模特手持客户产品或穿着他们衣服的摄影，无论是真实的还是虚拟的。有了这个，你可以创建新的姿势并提供新的选项，而无需重新拍摄。尽管如此，你真的应该这样做吗？这是一个更加棘手的问题。
- en: For the best, most original results, I recommend real photography of actual
    people and products, using AI to augment and supplement those photos if needed.
    A real shoot can produce magic results that haven’t been requested or expected,
    and those moments of serendipity are valuable.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得最佳、最原创的结果，我建议使用真实的人物的真实产品摄影，如果需要，可以使用AI来增强和补充这些照片。真实的拍摄可以产生未被请求或预期的神奇效果，这些意外的时刻是非常宝贵的。
- en: On the other hand, in some circumstances, real shoots aren’t possible because
    the products being sold haven’t been created yet. I’ve created photorealistic
    3D renders to sell board games before they’ve been manufactured, and that’s surely
    the same thing?
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，在某些情况下，由于正在销售的产品尚未被创造出来，因此无法进行真实的发芽。我曾在游戏板在制造之前，创建了逼真的3D渲染图来销售游戏，这难道不是同一回事吗？
- en: If you don’t misrepresent reality, and you have approval from the other creatives
    involved in the project, the method by which you fake reality—with Photoshop or
    with an AI-assisted tool—shouldn’t matter. Faking images is nothing new but always
    remember that the less you have to fake, the better the results.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不歪曲现实，并且得到了项目中其他创意人员的批准，那么你伪造现实的方式——无论是使用Photoshop还是使用AI辅助工具——都不应该很重要。伪造图像并不是什么新鲜事，但始终要记住，你伪造得越少，结果就越好。
- en: Another important factor is that templates become stale quickly, and even quicker
    if they’re heavily used. Therefore, if you consider using AI fashion shoots, I’d
    steer clear of stock AI fashion models. They might look fine the first time you
    see them, but when consumers have seen the same models in exactly the same poses
    multiple times on many different sites, they’ll harm more than help.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要因素是，模板很快就会过时，如果使用频繁，则更快。因此，如果你考虑使用AI时尚拍摄，我会建议避免使用库存AI时尚模特。它们第一次看起来可能很好，但当消费者在许多不同网站上多次看到完全相同的模特时，它们可能会造成更多伤害而不是帮助。
- en: While we’ve looked at photographic and illustration images, what about true
    vector art?
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们已经看了照片和插图图像，但真正的矢量艺术呢？
- en: Generative vector art
  id: totrans-200
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成矢量艺术
- en: While most AI-generated images are pixel-based, Adobe has a couple of options
    for generating vector art with AI. Firefly, on the web, can create subjects or
    scenes based on a prompt, with reference images or styles as a control. It’s effective,
    and the downloads are in SVG format.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然大多数AI生成的图像是基于像素的，但Adobe提供了一些使用AI生成矢量艺术的选择。在网页上的Firefly可以根据提示创建主题或场景，以参考图像或风格作为控制。这非常有效，下载的文件格式为SVG。
- en: '![Figure 7.34 – Two different styles of vector art, all downloadable as SVG](img/B34247_07_34.png)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![图7.34 – 两种不同风格的矢量艺术，均可下载为SVG格式](img/B34247_07_34.png)'
- en: Figure 7.34 – Two different styles of vector art, all downloadable as SVG
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.34 – 两种不同风格的矢量艺术，均可下载为SVG格式
- en: Although one of the issues with most generated art is a lack of complexity,
    that’s a strength for most vector art, where a crisp, clean style is usually desired.
    Based on a look at the art, it appears to have been traced from generated pixel
    art, but that’s usually not too much of a problem.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大多数生成艺术的问题之一是缺乏复杂性，但这对于大多数矢量艺术来说是一个优点，因为通常希望有一个清晰、干净的风格。根据对艺术的观察，它似乎是从生成的像素艺术中追踪而来的，但这通常不是太大的问题。
- en: If you’d prefer to access this tech in Adobe Illustrator directly, use the Contextual
    Task Bar. Draw a rectangle, press the **Generate Vectors** button, then type your
    prompt in.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更喜欢直接在Adobe Illustrator中访问这项技术，请使用上下文任务栏。画一个矩形，按下**生成矢量**按钮，然后输入你的提示。
- en: For creations more closely based on your own art, create that art, then click
    **Gen Shape Fill** instead. Here, I’ve created a simple octagon and a rectangle,
    then asked it to generate a stop sign.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更接近你自己的艺术创作的作品，先创建那个艺术作品，然后点击**生成形状填充**。在这里，我创建了一个简单的八边形和一个矩形，然后要求它生成一个停车标志。
- en: '![Figure 7.35 – A simple prototype stop sign, and a more developed version](img/B34247_07_35.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![图7.35 – 一个简单的原型停车标志，以及一个更成熟的版本](img/B34247_07_35.png)'
- en: Figure 7.35 – A simple prototype stop sign, and a more developed version
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.35 – 一个简单的原型停车标志，以及一个更成熟的版本
- en: '**Generative Expand**, also found in Photoshop and InDesign, is extremely useful
    here in Illustrator. Opening an SVG from Firefly, it’s easy to use the **Artboard**
    tool to extend the bounds of an existing artboard, then optionally add a prompt.'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: '**生成扩展**，也存在于Photoshop和InDesign中，在Illustrator中这里非常实用。打开Firefly中的SVG文件，使用**画板**工具很容易扩展现有画板的边界，然后可选地添加一个提示。'
- en: '![Figure 7.36 – No prompt was required here, just more of the same, please](img/B34247_07_36.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![图7.36 – 这里不需要提示，只是更多相同的内容，请](img/B34247_07_36.png)'
- en: Figure 7.36 – No prompt was required here, just more of the same, please
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.36 – 这里不需要提示，只是更多相同的内容，请
- en: 'Quickly, you’ll be given a choice of three options, and can request additional
    generations if needed:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 很快，你会得到三个选项的选择，如果需要可以请求额外的生成：
- en: '![Figure 7.37 – The third option was the best on offer here](img/B34247_07_37.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![图7.37 – 这里的第三种选择是提供的最佳选项](img/B34247_07_37.png)'
- en: Figure 7.37 – The third option was the best on offer here
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.37 – 这里的第三种选择是提供的最佳选项
- en: Illustrator can also generate vector patterns from prompts. Open the **Generate
    Patterns** panel, then type in a prompt to create three seamless repeating patterns.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: Illustrator还可以根据提示生成矢量图案。打开**生成图案**面板，然后输入一个提示以创建三个无缝重复的图案。
- en: '![Figure 7.38 – Three easy vector patterns available in the Variations panel](img/B34247_07_38.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![图7.38 – 变化面板中可用的三种简单矢量图案](img/B34247_07_38.png)'
- en: Figure 7.38 – Three easy vector patterns available in the Variations panel
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.38 – 变化面板中可用的三种简单矢量图案
- en: 'There’s one more generative feature hidden in Illustrator at the moment: **Generative
    Recolor**. You’ll find this option in the **Recolor Art** panel (**Edit**>**Edit****Colors**
    > **Generative Recolor** is one way to reach it), and it provides a quick way
    to transform the colors of any selected artwork. While the regular **Recolor Art**
    dialog can do this with a small amount of manual effort, using the generative
    version is quicker, easier, and a fun way to experiment with colors.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 目前在Illustrator中隐藏的一个更多生成功能是**生成重着色**。你可以在**重着色艺术**面板中找到这个选项（**编辑**>**编辑**>**颜色**>**生成重着色**是到达它的方法之一），它提供了一种快速转换任何选定艺术作品颜色的方法。虽然常规的**重着色艺术**对话框可以通过少量手动操作来完成这项工作，但使用生成版本更快、更简单，也是一种有趣的尝试颜色的方式。
- en: '![Figure 7.39 – Here, the leaves from earlier have been duplicated, expanded,
    and then recolored](img/B34247_07_39.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图7.39 – 这里，之前的叶子已经被复制、扩展，然后重新着色](img/B34247_07_39.png)'
- en: Figure 7.39 – Here, the leaves from earlier have been duplicated, expanded,
    and then recolored
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.39 – 这里，之前的叶子已经被复制、扩展，然后重新着色
- en: You can type a prompt or use a sample, such as `Summer by the sea` in the preceding
    figure, click **Generate**, then click one of the variations below to apply it.
    Try as many variations as you wish, then click back over to **Recolor** to tweak
    the results manually.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以输入一个提示或使用一个示例，如前图中的`Summer by the sea`，点击**生成**，然后点击下面的一个变体来应用它。尝试尽可能多的变体，然后点击回到**重着色**来手动调整结果。
- en: 'While Illustrator’s not the only AI-enabled tool that can create vector images,
    it’s likely the most convenient. If you’d like to explore other options, try **VectorArt.ai**
    ([https://vectorart.ai](https://vectorart.ai)), the **Canva** AI vector generator
    ([https://www.canva.com/create/vector-ai/](https://www.canva.com/create/vector-ai/)),
    or **Recraft** ([https://www.recraft.ai/](https://www.recraft.ai/)). Recraft allows
    you to choose a style of vector art (or pixel art) and prompt as usual:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Illustrator不是唯一能够创建矢量图像的AI启用工具，但它可能是最方便的。如果你想探索其他选项，可以尝试**VectorArt.ai**([https://vectorart.ai](https://vectorart.ai))、**Canva**
    AI矢量生成器([https://www.canva.com/create/vector-ai/](https://www.canva.com/create/vector-ai/))或**Recraft**([https://www.recraft.ai/](https://www.recraft.ai/))。Recraft允许你选择矢量艺术（或像素艺术）的风格，并像往常一样提示：
- en: '![Figure 7.40 – Recraft allows you to create vector and pixel images](img/B34247_07_40.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![图7.40 – Recraft允许你创建矢量和像素图像](img/B34247_07_40.png)'
- en: Figure 7.40 – Recraft allows you to create vector and pixel images
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.40 – Recraft允许你创建矢量和像素图像
- en: Even though these tools aren’t integrated into the Adobe suite, you may find
    one of these tools to be a more flexible way to create vector art—give them a
    test.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 即使这些工具没有集成到Adobe套件中，你也可能会发现这些工具是创建矢量艺术的一种更灵活的方式——给他们一个尝试的机会。
- en: In fact, Recraft is one of many modern web-based image generation tools that
    integrate GenAI models into a flexible interface suitable for simple design projects.
    As it supports both pixel and vector art, it’s a great place to build a mood board—let’s
    dig deeper.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，Recraft是许多将GenAI模型集成到灵活界面的现代基于网络的图像生成工具之一，这种界面适合简单的项目设计。由于它支持像素和矢量艺术，它是一个构建情绪板的绝佳地方——让我们深入了解。
- en: Mood boards and design ideation
  id: totrans-227
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 情绪板和设计构思
- en: Using other people’s images has long been an accepted practice for building
    mood boards, allowing a group of creatives to agree on a style and feel for a
    project. By allowing you to create images that inspire you rather than just borrowing
    other people’s images, generated images add flexibility. Of course, you can mix
    generated and found images in a single board, and at the end of the day, none
    of these images will become part of the finished work.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 使用他人的图像长期以来一直是构建情绪板的一种公认做法，它允许一群创意人士就项目的风格和感觉达成一致。通过允许你创建启发你的图像，而不仅仅是借用他人的图像，生成的图像增加了灵活性。当然，你可以在单个板上混合生成的和找到的图像，最终，这些图像都不会成为最终作品的一部分。
- en: Although it’s entirely possible to create images in any GenAI solution and assemble
    them in the layout tool of your choice, you may find it easier to build a mood
    board in a web tool, potentially enabling easier collaboration and sharing. Some
    tools, such as Apple’s Freeform, enable shared workspaces and could be a natural
    place for a group of creatives to brainstorm together.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在任意的GenAI解决方案中创建图像并在你选择的布局工具中组装是完全可能的，但你可能会发现在一个网络工具中构建情绪板更容易，这可能有助于更轻松的协作和共享。一些工具，如苹果的Freeform，允许共享工作空间，可能是一个创意团队一起头脑风暴的自然场所。
- en: However, if the process is more heavily focused on creation, you may prefer
    to use a tool that’s more AI-focused. As mentioned earlier, Recraft’s flexible
    workspace allows you to import images, duplicate/resize/pan using familiar shortcuts,
    generate pixel or vector art, create restyled variations of those images, and
    arrange them all on an infinite canvas.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果过程更侧重于创作，你可能更喜欢使用更专注于 AI 的工具。如前所述，Recraft 的灵活工作空间允许你导入图像，使用熟悉的快捷键进行复制/调整大小/平移，生成像素或矢量艺术，创建这些图像的重新风格变体，并将它们全部排列在无限画布上。
- en: '![Figure 7.41 – Just part of the expansive Recraft canvas with a few variations
    of the generated art and some samples](img/B34247_07_41.png)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.41 – 扩展的 Recraft 画布的一部分，包含一些生成的艺术作品的变体和一些样本](img/B34247_07_41.png)'
- en: Figure 7.41 – Just part of the expansive Recraft canvas with a few variations
    of the generated art and some samples
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.41 – 扩展的 Recraft 画布的一部分，包含一些生成的艺术作品的变体和一些样本
- en: 'You’ll need to pay for Recraft for it to be useful, but the integration may
    be worth it. However, if you’re already subscribed to Adobe, they now offer a
    dedicated app for moodboarding: **Firefly Boards**. Like Recraft, this enables
    an infinitely large area for uploading, generating, and remixing images. You can
    also access Generative Fill and Generative Expand, as well as Flux and GPT models.'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要为 Recraft 支付费用才能使其变得有用，但集成可能值得。然而，如果你已经订阅了 Adobe，他们现在提供了一个专门用于情绪板的应用程序：**Firefly
    Boards**。与 Recraft 类似，这允许上传、生成和混搭图像的无尽空间。你还可以访问生成填充和生成扩展，以及 Flux 和 GPT 模型。
- en: 'In this example, I uploaded my earlier collection of dungeon art, created variations
    on the skeleton and dwarf, then remixed the female warrior with the treasure chest
    to create the options on the right:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我上传了我之前收集的地牢艺术作品，对骨架和矮人进行了变体创作，然后将女战士与宝箱混搭以创建右侧的选项：
- en: '![Figure 7.42 – Combining art has never been this easy](img/B34247_07_42.png)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.42 – 结合艺术从未如此简单](img/B34247_07_42.png)'
- en: Figure 7.42 – Combining art has never been this easy
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.42 – 结合艺术从未如此简单
- en: This process is fun, fast, and potentially revolutionary for the right project.
    The art clearly isn’t perfect, and the variations created aren’t always close
    to the original, but the brainstorming process should be messy. There’s competition
    in this space, including **Kittl.com**, so check out the alternatives and see
    what works with your team.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程很有趣，快速，对于合适的项目来说可能是革命性的。艺术作品显然并不完美，创建的变体也不一定接近原始作品，但头脑风暴的过程应该是混乱的。这个领域有竞争，包括
    **Kittl.com**，所以请查看替代方案，看看哪些适合你的团队。
- en: Another help during brainstorming is to use a model with quick iteration based
    on previous image generations. **Leonardo.ai** offers **Flow State** to encourage
    this workflow, and Grok’s endless scroll (mentioned earlier) is good for this
    too.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 在头脑风暴过程中，使用基于先前图像生成的快速迭代模型也是一种帮助。**Leonardo.ai** 提供了 **Flow State** 来鼓励这种工作流程，Grok
    的无限滚动（前面提到过）也适用于此。
- en: '![Figure 7.43 – Flow State, in Leonardo.ai, which generates several images
    on the same prompt, then invites you to create more like this](img/B34247_07_43.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.43 – Leonardo.ai 中的流动状态，它根据相同的提示生成多张图像，然后邀请你创建更多类似的作品](img/B34247_07_43.png)'
- en: Figure 7.43 – Flow State, in Leonardo.ai, which generates several images on
    the same prompt, then invites you to create more like this
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.43 – Leonardo.ai 中的流动状态，它根据相同的提示生成多张图像，然后邀请你创建更多类似的作品
- en: 'Whatever AI generation tool you end up using, interactive moodboarding like
    this is one of the best use cases I’ve seen for GenAI. But can you get help with
    entire designs in a format suitable for development in professional design apps?
    Not yet. So far, most tools are focused on creating single design elements: a
    photo, a background, or an icon. If you want to stretch, try creating variations
    of potential YouTube thumbnails—they’re pretty simple.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你最终使用哪种 AI 生成工具，这种交互式情绪板是我所见过的 GenAI 的最佳用例之一。但是，你能得到在适合专业设计应用程序开发格式中的整个设计的帮助吗？目前还不能。到目前为止，大多数工具都专注于创建单个设计元素：一张照片、一个背景或一个图标。如果你想挑战一下，尝试创建潜在
    YouTube 缩略图的变体——它们相当简单。
- en: 'To take things further, you have a few options: **Lovart.ai** can create editable
    posters, **Claude** can drive Canva for you, or you can use Canva’s AI tools directly.
    Unfortunately, none of these approaches will lead to a professional design solution
    for a complex, multi-page document. Perhaps in the future we’ll be able to ask
    InDesign to generate new design ideas based on provided references, but not yet.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 要进一步发展，你有几个选择：**Lovart.ai** 可以创建可编辑的海报，**Claude** 可以为你操作Canva，或者你可以直接使用Canva的AI工具。不幸的是，这些方法中的任何一种都不会导致复杂的多页文档的专业设计解决方案。也许在将来，我们能够要求InDesign根据提供的参考生成新的设计理念，但还不是现在。
- en: Let’s end this chapter with a look at 3D model creation.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以查看3D模型创建过程来结束这一章。
- en: Creating 3D models
  id: totrans-244
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建3D模型
- en: Though most creative professionals aren’t using 3D packages day to day, some
    definitely are, and AI tools promise to make the field more accessible. While
    motion graphics professionals are used to keyframe animation and may have a good
    handle on working in 3D space, becoming a modeling expert is a long, painful road
    for many.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大多数创意专业人士并不是每天都在使用3D软件包，但有些人确实在用，AI工具承诺将使该领域更容易接近。虽然动态图形专业人士习惯了关键帧动画，并且可能很好地掌握了在3D空间中工作，但对于许多人来说，成为一名建模专家是一条漫长而痛苦的道路。
- en: Despite the pain, proper modeling skills will remain important for serious 3D
    applications for some time. If you have very light needs, though—perhaps you want
    to orbit a camera a small amount around a 3D object—a GenAI 3D tool might be helpful.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管痛苦，但适当的建模技能在一段时间内对于严肃的3D应用仍然很重要。如果你有非常轻的需求——也许你只想在3D对象周围轻微地旋转相机——一个GenAI 3D工具可能会有所帮助。
- en: Similar to image generation tools, model generation tools can work from a text
    prompt or an existing image.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 与图像生成工具类似，模型生成工具可以从文本提示或现有图像开始工作。
- en: '**Meshy.ai** is a well-known service, and though it no longer offers a free
    trial, it’s a capable tool that can generate a choice of draft models, and after
    confirmation, a texture for your chosen final model. I took the treasure chest
    Sora made, quickly brightened it, and removed the background in Photoshop, then
    uploaded it. While it’s possible to upload additional images from different angles,
    I just went with this one image, which worked well:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: '**Meshy.ai** 是一个知名的服务，尽管它不再提供免费试用，但它是一个功能强大的工具，可以生成多种草稿模型，并在确认后为所选的最终模型生成纹理。我使用了Sora制作的宝箱，快速将其变亮，并在Photoshop中移除了背景，然后上传了它。虽然可以上传来自不同角度的额外图像，但我只使用了这张图像，效果很好：'
- en: '![Figure 7.44 – The Meshy interface, with an image uploaded on the left, one
    of the four gray draft generations chosen, and the final texture](img/B34247_07_44.png)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![图7.44 – Meshy界面，左侧上传了一张图片，选择了四个灰色草稿生成中的一个，以及最终的纹理](img/B34247_07_44.png)'
- en: Figure 7.44 – The Meshy interface, with an image uploaded on the left, one of
    the four gray draft generations chosen, and the final texture
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.44 – Meshy界面，左侧上传了一张图片，选择了四个灰色草稿生成中的一个，以及最终的纹理
- en: 'Meshy did a decent job of the generation, and while this object might be challenging
    to develop further—it’s all one mesh, after all—it could be just fine as a smaller
    scale or background element. Here it is in Blender:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: Meshy在生成方面做得相当不错，尽管这个物体可能难以进一步开发——毕竟它是一个整体网格——但它可以作为一个较小的比例或背景元素。以下是它在Blender中的样子：
- en: '![Figure 7.45 – The downloaded model in Blender](img/B34247_07_45.png)'
  id: totrans-252
  prefs: []
  type: TYPE_IMG
  zh: '![图7.45 – 在Blender中下载的模型](img/B34247_07_45.png)'
- en: Figure 7.45 – The downloaded model in Blender
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.45 – 在Blender中下载的模型
- en: Downloads are available in several other 3D formats, including USDZ, OBJ, GLB,
    and STL. It’s a similar story at **Hyper3D.ai**, which also allows you to upload
    one or more images and uses the Rodin model to output a 3D mesh.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 可以下载的3D格式包括USDZ、OBJ、GLB和STL。在 **Hyper3D.ai** 也有类似的故事，它也允许你上传一张或多张图片，并使用Rodin模型输出3D网格。
- en: '![Figure 7.46 – The creation process here allows for regeneration at multiple
    stages](img/B34247_07_46.png)'
  id: totrans-255
  prefs: []
  type: TYPE_IMG
  zh: '![图7.46 – 在此创建过程中允许在多个阶段进行再生](img/B34247_07_46.png)'
- en: Figure 7.46 – The creation process here allows for regeneration at multiple
    stages
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.46 – 在此创建过程中允许在多个阶段进行再生
- en: Though Hyper3D can’t create a `.blend` file directly, I could import the generated
    USDZ file correctly in Blender. For better or worse, it was a little more ordered
    than the Meshy output and had a little less detail. Though the metal cup at the
    center didn’t have the same level of shine that the Meshy model had, and the coins
    in the front were arranged in a slightly too-formal way, this result could be
    just as usable.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Hyper3D不能直接创建`.blend`文件，但我能够正确地将生成的USDZ文件导入Blender。不管好坏，它的结构比Meshy输出的更有序，细节也稍微少一些。虽然中心金属杯的亮度没有Meshy模型那么高，而且前面的硬币排列得稍微过于正式，但这个结果仍然可以很好地使用。
- en: '![Figure 7.47 – After importing into Blender, this is a slightly more ordered
    result](img/B34247_07_47.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![图7.47 – 导入Blender后的结果略有序](img/B34247_07_47.png)'
- en: Figure 7.47 – After importing into Blender, this is a slightly more ordered
    result
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.47 – 导入Blender后的结果略有序
- en: 'For a few more options, you may prefer Tripo 3D, which can also segment a mesh
    into components—vital if you plan to animate or edit your generated model. Note
    that because the first step involves generating an image from your image, if you’re
    not careful, you can end up with something slightly different. This one worked
    well, though, with better definition on the wooden chest:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更多选项，你可能更喜欢Tripo 3D，它也可以将网格分割成组件——如果你计划对生成的模型进行动画或编辑，这是非常重要的。请注意，因为第一步涉及从你的图像生成图像，如果你不小心，最终可能会得到一些略微不同的结果。不过，这个结果在木箱的细节上表现良好：
- en: '![Figure 7.48 – The Tripo3D website lists the possible steps along the top
    of the workspace](img/B34247_07_48.png)'
  id: totrans-261
  prefs: []
  type: TYPE_IMG
  zh: '![图7.48 – Tripo3D网站列出了工作区顶部的可能步骤](img/B34247_07_48.png)'
- en: Figure 7.48 – The Tripo3D website lists the possible steps along the top of
    the workspace
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.48 – Tripo3D网站列出了工作区顶部的可能步骤
- en: 'This model has not been segmented, but if I wanted to refine the model by hand,
    it’s what I’d pursue. Here in Blender, you can see that these results are useful:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型尚未分割，但如果我想手动细化模型，这就是我会追求的。在这里，在Blender中，你可以看到这些结果是有用的：
- en: '![Figure 7.49 – Tripo3D’s USD output imports cleanly into Blender](img/B34247_07_49.png)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![图7.49 – Tripo3D的USD输出可以干净地导入Blender](img/B34247_07_49.png)'
- en: Figure 7.49 – Tripo3D’s USD output imports cleanly into Blender
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.49 – Tripo3D的USD输出可以干净地导入Blender
- en: On the default settings, each of these sites takes quite a different approach.
    Hyper3D produced a model with 120,000 faces, Tripo3D created 500,000, and Meshy,
    the most complex, at 929,000\. While the details can be decimated away, it’s interesting
    to see such different approaches. If I had to choose one, I’d go for the cleaner
    results and extra control available from Tripo3D, but your needs may be very different
    from mine.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 在默认设置下，这些网站采取了相当不同的方法。Hyper3D生成了一个有120,000个面的模型，Tripo3D创建了500,000个面，而Meshy，最复杂的，有929,000个面。虽然细节可以被削减，但看到这样不同的方法很有趣。如果必须选择一个，我会选择Tripo3D提供的更干净的结果和额外的控制，但你的需求可能与我非常不同。
- en: Other options, such as **Rendable3d.com**, offer similar services. I tested
    this in alpha while it was packaged as a fork of Blender, but you can now access
    the same generative tech on their website instead. A simple image-to-mesh feature
    is even now available in Copilot ([https://copilot.microsoft.com/labs/experiments/copilot-3d](https://copilot.microsoft.com/labs/experiments/copilot-3d)),
    and a new option from Meta called **SAM 3D** ([https://ai.meta.com/sam3d/](https://ai.meta.com/sam3d/))
    looks very promising indeed.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 其他选项，如**Rendable3d.com**，提供类似的服务。我在它作为Blender分支打包的alpha版本中进行了测试，但现在你可以在他们的网站上访问相同的生成技术。现在Copilot([https://copilot.microsoft.com/labs/experiments/copilot-3d](https://copilot.microsoft.com/labs/experiments/copilot-3d))甚至提供了一个简单的图像到网格的功能，Meta的新选项**SAM
    3D**([https://ai.meta.com/sam3d/](https://ai.meta.com/sam3d/))看起来非常有前景。
- en: '![Figure 7.50 – SAM 3D is new and not yet a complete solution, but it looks
    good so far](img/B34247_07_50.png)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![图7.50 – SAM 3D是新的，但还不是完整的解决方案，但到目前为止看起来不错](img/B34247_07_50.png)'
- en: Figure 7.50 – SAM 3D is new and not yet a complete solution, but it looks good
    so far
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.50 – SAM 3D是新的，但还不是完整的解决方案，但到目前为止看起来不错
- en: This space is set to change further, so if you need 3D mesh generation, try
    any free trials that are currently available, explore the latest generative models,
    and see which one works best for you.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 这个空间将会进一步变化，所以如果你需要3D网格生成，尝试目前可用的任何免费试用，探索最新的生成模型，看看哪一个最适合你。
- en: Interestingly, similar tech (based on Gaussian Splats) is used on modern Apple
    devices, turning any photo into a simple 3D spatial scene that responds to device
    movement. On the 2026 OS releases, this goes well beyond the Spatial Photos available
    on previous iterations of Apple Vision Pro, which only provided left-right movement.
    Spatial scenes allow movement in all dimensions and can be extremely effective.
    Apple’s latest research in this area is impressive ([https://machinelearning.apple.com/research/sharp-monocular-view](https://machinelearning.apple.com/research/sharp-monocular-view)).
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，类似的技术（基于高斯斑点）在现代苹果设备上得到应用，可以将任何照片转换成简单的3D空间场景，并能够响应设备移动。在2026年操作系统版本中，这比之前苹果Vision
    Pro版本中的空间照片功能更为先进，后者仅提供左右移动。空间场景允许在所有维度上移动，并且可以非常有效。苹果在这个领域的最新研究令人印象深刻([https://machinelearning.apple.com/research/sharp-monocular-view](https://machinelearning.apple.com/research/sharp-monocular-view))。
- en: You may be wondering whether ChatGPT can help. Although it can’t help directly,
    it does offer to create a script that runs offline to do the same task. While
    the dedicated sites are likely to produce better results, if you need a large
    quantity of models and aren’t afraid of running some code, this is a route you
    could take. We’ll look more at scripting approaches later in the book, though.
    Time to wrap this chapter up.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道ChatGPT是否可以帮助。虽然它不能直接帮助，但它提供创建一个离线运行的脚本来执行相同任务。虽然专门的网站可能产生更好的结果，但如果你需要大量模型并且不介意运行一些代码，这可以是一条可行的路径。不过，我们将在本书的后面部分更详细地探讨脚本方法。现在是时候结束这一章了。
- en: Summary
  id: totrans-273
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: If you’re making AI images, you should now have a much better idea of how to
    get the best results, either by writing more expressive prompts or providing image
    examples for an AI to imitate. You’ll know several ways to get what you need to
    help you in a creative workflow, whether it’s for mockups, for finished imagery,
    or for vector assets.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在制作AI图像，你现在应该对如何获得最佳结果有了更清晰的认识，无论是通过编写更具表现力的提示，还是为AI提供模仿的图像示例。你将了解几种方法来获取你需要的，以帮助你在创意工作中，无论是用于原型设计，还是用于成品图像，或是矢量资产。
- en: 'Generating images can come with ethical questions: some new, some not. Is it
    OK to use AI for images that don’t matter much, in contexts where photographers
    and illustrators would not be hired? That’s up to you and your customers.'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 生成图像可能会带来道德问题：一些是新的，一些不是。在不涉及摄影师和插画师的情况下，使用AI生成不太重要的图像是否合适？这取决于你和你客户。
- en: Is it OK to use AI in ideation, brainstorming, and moodboarding? If it informs
    your work without directly becoming part of it, there’s no problem at all. Borrowing
    is part of the creative process, and as long as you’re not trying to rip anyone
    off, it should be OK. The gap between thinking of something and seeing an imperfect
    version of that vision has never been shorter, and I can immediately see how it
    could have transformed the ideation process on projects I’ve worked on.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 在构思、头脑风暴和情绪板中使用AI是否合适？如果它能够提供信息而不直接成为工作的一部分，那就完全没有问题。借鉴是创意过程的一部分，只要你不试图剽窃他人，就应该没问题。从想到某个东西到看到那个愿景的不完美版本之间的差距从未如此之短，我立刻就能看到它如何改变了我参与的项目中的构思过程。
- en: There is a revolution here, but I don’t think it’s going to displace artists
    any more than stock sites and templated designs already have. Exploring this new
    frontier is worth your time.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 这里正在发生一场革命，但我认为它不会像现有的股票网站和模板设计那样取代艺术家。探索这个新领域值得你的时间。
- en: Next up, from the frying pan into the fire—we’ll be generating AI video.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，从煎锅跳进火坑——我们将生成AI视频。
- en: '|'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Get This Book’s PDF Version and Exclusive Extras
  id: totrans-280
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
