- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: Building the Enterprise AI Strategy
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建企业AI战略
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor022) showed that most AI failures
    are not technology failures; they are strategy failures. Products collapse when
    they chase algorithms without the supporting data foundations and operational
    excellence, as well as having incomplete data pipelines, missing key skills, unclear
    ownership and accountability, or misalignment with business priorities. Fixing
    this requires a deliberate enterprise AI strategy.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第一章*](Chapter_1.xhtml#_idTextAnchor022) 显示，大多数AI失败不是技术失败；它们是战略失败。当产品在没有支持性的数据基础和运营卓越的情况下追逐算法，以及数据管道不完整、缺少关键技能、所有权和责任不明确，或者与业务优先级不一致时，产品就会崩溃。解决这个问题需要明确的
    企业AI战略。'
- en: 'To capture durable business values, organizations must deliberately align the
    business initiatives, people and culture, technology, and operating model around
    how AI will be used. In the pages ahead, through the following key topics, we
    outline the structural elements of a mature AI strategy:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了捕捉持久的企业价值，组织必须明确地将业务倡议、人员和文化、技术以及运营模式围绕AI的使用方式进行对齐。在接下来的页面中，通过以下关键主题，我们概述了成熟AI战略的结构性要素：
- en: Aligning business initiatives with technical development and project selection
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将业务倡议与技术开发和项目选择相一致
- en: Governance and compliance
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 治理和合规
- en: Data strategy – the differentiator for your AI systems
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据战略 – 您AI系统的差异化因素
- en: AI platform – scalable infrastructure for experimentation and deployment
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI平台 – 可扩展的基础设施用于实验和部署
- en: AI algorithms/pattern selection strategy
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI算法/模式选择策略
- en: Organizational structure and change management
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组织结构和变革管理
- en: Connecting strategy to technical development
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将战略与技术开发联系起来
- en: Before debating model architectures, leaders must first be clear on the business
    outcomes and whether AI is the right lever to achieve it. Not every problem is
    an AI problem.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在辩论模型架构之前，领导者必须首先明确业务成果以及AI是否是实现它的正确杠杆。不是每个问题都是AI问题。
- en: Roadmap prioritization
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 路线图优先级排序
- en: 'Not all AI projects warrant immediate attention. So, a structured evaluation
    process, for example, the **Impact, Confidence, Ease** ( **ICE** ) framework,
    could help separate high-potential concepts from less urgent pursuits:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有AI项目都值得立即关注。因此，一个结构化的评估流程，例如**影响、信心、易用性**（**ICE**）框架，可以帮助区分高潜力概念和不太紧急的追求：
- en: '**Impact** : Does the project address a top-line business priority (e.g., reducing
    churn, boosting revenue, or improving user experience)?'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**影响**：项目是否解决了业务的首要优先事项（例如，减少流失、增加收入或改善用户体验）？'
- en: '**Confidence** : How certain are we that a model-based solution will work?
    Do we have the right data, domain knowledge, and staff expertise?'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信心**：我们对基于模型的解决方案能够工作的确定性有多大？我们是否有正确的数据、领域知识和员工的专业技能？'
- en: '**Ease** : How technically challenging is the project? Is the data already
    in good shape, or do we need extensive collection/cleaning efforts?'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**易用性**：项目的技术挑战有多大？数据是否已经处于良好状态，或者我们需要进行大量的收集/清理工作？'
- en: Score each project on these dimensions, then rank them. This ensures focus goes
    to initiatives with the greatest upside and likelihood of success, rather than
    dispersing resources across an unfiltered backlog of “cool ideas.”
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些维度上对每个项目进行评分，然后进行排名。这确保了重点放在具有最大上升空间和成功可能性的倡议上，而不是将资源分散在未经筛选的“酷想法”待办事项列表中。
- en: Let’s take banking as a case study.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以银行为案例研究。
- en: 'A mid-sized super-regional bank is launching an AI strategy with six potential
    use cases:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一家中型超级区域银行正在推出一个AI战略，有六个潜在用例：
- en: Credit card fraud detection
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信用卡欺诈检测
- en: '**Next-best product** ( **NBP** ) recommendations for consumer marketing'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最佳产品推荐**（**NBP**）用于消费者营销'
- en: Branch-staffing optimization via demand forecasting
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过需求预测进行分支机构人员配置优化
- en: Deposit churn prediction and retention
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存款流失预测和保留
- en: GenAI-powered customer service ag ent
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由GenAI驱动的客户服务代理
- en: Commercial loan understanding assistant
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商业贷款理解助手
- en: 'The leadership team needs to decide what to deliver first. They apply the ICE
    framework to score each use case on impact, confidence, and effort. The following
    table illustrates the potential outcomes:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 领导团队需要决定首先交付什么。他们应用ICE框架对每个用例在影响、信心和努力上进行评分。以下表格说明了潜在的结果：
- en: '| **Use case** | **Impact** | **Confidence** | **Effort** | **ICE score** |
    **Notes** |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
  zh: '| **用例** | **影响** | **信心** | **努力** | **ICE评分** | **备注** |'
- en: '| Credit card fraud detection | 5 | 4 | 3 | 6.7 | Existing pipeline and clear
    ROI, moderate effort |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| 信用卡欺诈检测 | 5 | 4 | 3 | 6.7 | 现有管道和清晰的ROI，中等努力 |'
- en: '| NBP recommendations for consumer marketing | 4 | 3 | 2 | 6.0 | Strong business
    pull, fast to pilot in app |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| NBP消费者营销推荐 | 4 | 3 | 2 | 6.0 | 强烈的业务拉动，快速在应用中试点 |'
- en: '| Branch-staffing optimization via demand forecasting | 3 | 4 | 2 | 6.0 | Operational
    savings, easy data sourcing |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| 通过需求预测进行分支人员配置优化 | 3 | 4 | 2 | 6.0 | 运营节约，易于数据获取 |'
- en: '| Mortgage churn prediction and retention | 5 | 2 | 4 | 2.5 | High value but
    low confidence and heavy effort |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| 房贷流失预测和保留 | 5 | 2 | 4 | 2.5 | 高价值但低置信度和高努力 |'
- en: '| GenAI-powered customer service agent | 3 | 3 | 3 | 3.0 | Good for productivity
    and experience, unclear ROI |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| GenAI驱动的客户服务代理 | 3 | 3 | 3 | 3.0 | 有助于生产力和体验，但ROI不明确 |'
- en: '| Commercial loan understanding assistant | 4 | 2 | 5 | 1.6 | High governance
    friction and integration risk |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| 商业贷款理解助手 | 4 | 2 | 5 | 1.6 | 高治理摩擦和集成风险 |'
- en: 'Table 2.1: Use case scoring based on ICE framework (scale 1–5, ICE = Impact
    x Confidence ÷ Effort)'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 表2.1：基于ICE框架的使用案例评分（1-5级，ICE = 影响 x 置信度 ÷ 努力程度）
- en: 'Based on the analysis, the bank can make an informed decision on what the first
    three initiatives to start with are, based on the highest ICE score:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 根据分析，银行可以根据最高的ICE评分做出明智的决定，确定首先启动的前三项倡议：
- en: '**Fraud model uplift** : Immediate economic impact and measurable risk reduction'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欺诈模型提升**：立即的经济影响和可测量的风险降低'
- en: '**NBP recommendation** : Revenue and engagement with low incremental effort'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NBP推荐**：低增量努力下的收入和参与度'
- en: '**Branch staffing optimization** : Cost savings and efficiency win with high
    feasibility'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分支人员配置优化**：高可行性带来成本节约和效率提升'
- en: Mortgage churn and loan-underwriting assistant products are deferred until data-,
    pipeline-, and organization-readiness improve. The GenAI agent is staged as an
    experiment, not a top-three initiative.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 房贷流失和贷款审批辅助产品将推迟至数据、管道和组织准备就绪。GenAI代理作为实验，而非前三项主要倡议。
- en: Start small, scale fast
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从小开始，快速扩展
- en: A major hurdle when pushing many AI programs is justifying investment and convincing
    stakeholders that these initiatives will deliver real results. This is where proof-of-concept
    projects play a critical role. Rather than launching a full-scale deployment from
    the start, organizations run a proof of concept by focusing on a specific, well-defined
    use case, such as predicting churn for a subset of customers or automating a single
    step of a larger workflow. The purpose is to start small, show measurable benefits
    quickly, using a limited scope and manageable resources, then scale fast.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在推广许多AI程序时，一个主要障碍是证明投资的价值并说服利益相关者这些倡议将带来实际结果。这正是概念验证项目发挥关键作用的地方。组织不是从一开始就进行全面部署，而是通过关注一个具体、明确的使用案例来运行概念验证，例如预测客户子集的流失或自动化更大工作流程的单一步骤。目的是从小开始，快速展示可衡量的好处，使用有限的范围和可管理的资源，然后快速扩展。
- en: 'The process begins by starting small: select just one or two key metrics that
    have a strong connection to an important business outcome, such as using support
    ticket volume as a signal in a churn pilot. The main goal is to achieve a tangible
    **return on investment** ( **ROI** ) in a short time frame. For instance, if the
    pilot improves customer retention by 5% or reduces operating costs in one department,
    it offers clear evidence of value for stakeholders and decision-makers.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程从从小开始：选择一两个与重要业务成果有强烈关联的关键指标，例如在流失试点中使用支持工单量作为信号。主要目标是短期内实现可观的**投资回报率**（**ROI**）。例如，如果试点将客户保留率提高5%或降低一个部门的运营成本，这将向利益相关者和决策者提供明确的证据，证明其价值。
- en: Beyond demonstrating outcomes, getting to a stage where stakeholders are aligned
    so that a pilot can be launched can be challenging. The best way to overcome this
    challenge is to build trust by sharing the journey from the beginning with the
    business, receiving feedback, and iterating to a version that achieves internal
    alignment.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 除了展示成果外，达到利益相关者达成一致并启动试点阶段可能具有挑战性。克服这一挑战的最佳方式是与业务从开始就分享旅程，获取反馈，并迭代到一个实现内部一致性的版本。
- en: Once a proof of concept demonstrates its impact, the next step is to iterate
    and scale. This could mean adding more features to the model, applying the approach
    to new business areas, or gradually automating more of the workflow. Proofs of
    concept help organizations build confidence, refine their approach, and set the
    stage for sustainable, enterprise-wide AI adopti on.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦概念验证证明了其影响，下一步就是迭代和扩展。这可能意味着向模型添加更多功能，将方法应用于新的业务领域，或逐步自动化更多的工作流程。概念验证有助于组织建立信心，完善他们的方法，并为可持续的、企业级的人工智能采用奠定基础。
- en: With a clear AI vision and strategy, it’s crucial to establish strong governance
    and compliance practices to ensure your AI systems are trustworthy, transparent,
    and aligned with legal requirements.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 明确的人工智能愿景和战略至关重要，必须建立强大的治理和合规实践，以确保您的AI系统值得信赖、透明，并与法律要求保持一致。
- en: Governance and compliance
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 治理和合规
- en: The regulatory landscape in 2025 is fragmented and rapidly evolving. Laws such
    as the EU AI Act have set new global standards, while the US, China, and other
    jurisdictions are rolling out sector-by-sector rules, causing overlapping requirements
    and uncertainty about what’s expected and how enforcement will play out.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 2025年的监管环境是碎片化和快速演变的。例如，欧盟AI法案设定了新的全球标准，而美国、中国和其他司法管辖区正在分部门推出规则，导致重叠的要求和关于期望和执法如何进行的疑虑。
- en: 'The following is a list of established frameworks for AI. Organizations should
    use these frameworks as a reference point and extract the principles and controls
    that map to their business, risk profile, and operating model:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个人工智能已建立框架的列表。组织应将这些框架作为参考点，提取与他们的业务、风险概况和运营模式相对应的原则和控制措施：
- en: '| **Framework** | **Source/Focus** | **How it helps** |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| **框架** | **来源/焦点** | **如何帮助** |'
- en: '| NIST **AI Risk Management Framework** ( **AI RMF** ) | US NIST (2023) | Provides
    a structured approach for risk identification, mitigation, and monitoring |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| NIST **人工智能风险管理框架** ( **AI RMF** ) | 美国NIST (2023) | 提供了一种结构化的风险识别、缓解和监控方法
    |'
- en: '| EU AI Act – risk-tiered model | EU Legislation (2024) | Introduces risk-based
    obligations and is useful for classifications and oversight tiers |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| 欧盟AI法案 – 风险分层模型 | 欧盟立法 (2024) | 引入了基于风险的责任，并适用于分类和监管层 |'
- en: '| OECD AI principles | Global policy body | Offers high-level responsible AI
    principles aligned across governments |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| OECD人工智能原则 | 全球政策机构 | 提供了跨政府的高层次负责任人工智能原则 |'
- en: '| ISO/IEC 23894:2023 | ISO standard on AI risk | Provides standardized vocabulary
    and life cycle risk guidance |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| ISO/IEC 23894:2023 | 人工智能风险ISO标准 | 提供了标准化的词汇和生命周期风险指南 |'
- en: '| Model Risk Management (SR 11-7 adaptation) | Banking precedent | Extends
    the mature model governance discipline to an AI/GenAI context |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| 模型风险管理（SR 11-7 调整） | 银行业惯例 | 将成熟的模型治理学科扩展到AI/通用AI环境中 |'
- en: 'Table 2.2: A list of established frameworks for AI'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 表2.2：人工智能已建立的框架列表
- en: 'A modern AI governance strategy should lead with value creation. The goal is
    to build a system that starts with business value, not regulation for its own
    sake; sets guardrails that allow innovation without constant escalation; pushes
    decision rights and account stability to the teams doing the work, rather than
    centralizing all decisions; and establishes clear ownership, a clear escalation
    path, and self-service controls so compliance becomes built in, not bolted on.
    Consider the following four-layer operating model:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现代人工智能治理策略应首先关注价值创造。目标是构建一个从商业价值出发的系统，而不是仅仅为了法规；设定护栏，允许创新而无需不断升级；将决策权和账户稳定性推给执行团队，而不是集中所有决策；并建立清晰的归属感、清晰的升级路径和自助控制，以便合规性成为内置的，而不是附加的。考虑以下四层运营模型：
- en: '![A diagram of a diagram  Description automatically generated](img/B34239_02_1.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![一个图表的图表  自动生成的描述](img/B34239_02_1.png)'
- en: 'Figure 2.1: A four-layer AI governance operating model'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1：四层人工智能治理运营模型
- en: Establishing AI governance and ensuring compliance can feel overwhelming, and
    it’s no surprise. This is something that even experienced organizations struggle
    to navigate. The accelerated pace of AI innovation, especially in agentic AI and
    GenAI, only intensifies the challenge. Many business leaders and legal teams admit
    that it’s hard to keep up and feel pressure balancing the excitement of new AI
    capabilities with the need for guardrails and public trust. Many organizations
    also lack in-house experts who can bridge technical and legal domains, making
    it hard to know where to even begin.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 建立人工智能治理和确保合规性可能会感到压力巨大，这并不奇怪。即使是经验丰富的组织也难以应对这种情况。人工智能创新的加速步伐，尤其是在代理人工智能和通用人工智能领域，只会加剧这一挑战。许多商业领袖和法律团队承认，跟上节奏很困难，感到在平衡新人工智能能力的兴奋与需要护栏和公众信任之间有压力。许多组织也缺乏能够连接技术和法律领域的内部专家，这使得知道从哪里开始都变得困难。
- en: Given this reality, it’s important to start with practical, manageable steps.
    Begin by identifying and cataloging exactly where AI is being used in your organization,
    especially in areas that handle sensitive data or make high-impact decisions.
    Assign clear responsibility for AI oversight. This might mean forming a cross-functional
    group that brings together compliance, risk, technology, and business stakeholders.
    Document your policies and processes, even if they feel basic at first, and make
    sure you can explain in plain language how key models are built, tested, and monitored.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 鉴于这种现实情况，重要的是从实际、可管理的步骤开始。首先，确定并记录在您的组织中人工智能的使用情况，特别是在处理敏感数据或做出重大决策的领域。明确分配人工智能监督的责任。这可能意味着建立一个跨职能团队，将合规性、风险、技术和业务利益相关者聚集在一起。即使最初感觉这些政策和流程很基础，也要记录下来，并确保您能够用通俗易懂的语言解释关键模型是如何构建、测试和监控的。
- en: Transparency and regular review are critical. Even as standards shift, keeping
    records of how decisions are made and problems handled will go a long way during
    audits or when questions arise. Don’t be afraid to automate wherever possible;
    tools that can flag bias, track model drift, or update compliance alerts are increasingly
    available and designed for non-specialists. Most importantly, foster a culture
    where reporting issues or uncertainties about AI’s behavior is seen as a strength,
    not a weakness.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度和定期审查至关重要。即使标准发生变化，记录决策是如何做出的以及问题是如何处理的，在审计或出现问题时也会大有裨益。不要害怕尽可能自动化；可以标记偏见、跟踪模型漂移或更新合规性警报的工具越来越多，并且是为非专业人士设计的。最重要的是，培养一种文化，使报告人工智能行为的问题或不确定性被视为一种优势，而不是弱点。
- en: Finally, expect this work to be ongoing. Regulations will change and new risks
    will emerge, and your policies should evolve in response. By taking small, steady
    steps and building good habits, organizations not only reduce risk but also develop
    the confidence to innovate responsibly even as the rules of AI keep changing.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，预期这项工作将是一个持续的过程。法规将发生变化，新的风险将出现，您的政策应该相应地演变。通过采取小而稳定的步骤并养成良好的习惯，组织不仅降低了风险，而且还在人工智能规则不断变化的情况下，增强了负责任创新的自信心。
- en: With governance and compliance foundations in place, the next priority is to
    design a clear data strategy that ensures your AI systems are driven by relevant,
    high-quality, and well-managed information.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在治理和合规性基础建立之后，下一个优先事项是设计一个清晰的数据策略，确保您的AI系统由相关、高质量且管理良好的信息驱动。
- en: Data strategy – the differentiator for your AI systems
  id: totrans-64
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据策略——您人工智能系统的差异化因素
- en: Creating a data strategy that enables AI is often the biggest hurdle for organizations.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个能够使人工智能发挥作用的数据策略往往是组织面临的最大挑战。
- en: A modern data strategy for AI should be value-driven, productized, governed,
    semantic, and using a multi-modal architecture that makes trusted data continuously
    usable by **machine learning** ( **ML** ), GenAI, and agentic systems in production.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的现代数据策略应该是以价值为导向的、产品化的、受管理的、语义化的，并采用多模态架构，使可信数据能够持续地被**机器学习**（**ML**）、通用人工智能（GenAI）和生产中的代理系统使用。
- en: 'Below are the key pillars of a modern data strategy for AI:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个现代人工智能数据策略的关键支柱：
- en: '![A blue and white diagram with text  Description automatically generated](img/B34239_02_2.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![一个带有文字描述的蓝色和白色图表，描述自动生成](img/B34239_02_2.png)'
- en: 'Figure 2.2: The modern data strategy'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.2：现代数据策略
- en: '**Value-anchored, not asset-anchored** : A modern data strategy for AI should
    begin with clarity of purpose: what business decisions or processes are we trying
    to improve, and how will we know if it works? Anchoring to value means translating
    business objectives into an explicit value hypothesis before any modeling effort
    begins, defining the target population, the business action expected to follow,
    and the economic signal that will validate the impact in production. When the
    data strategy is anchored to explicit business outcomes, prioritization becomes
    disciplined, execution becomes aligned, and success is measurable.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**以价值为导向，而非以资产为导向**：AI的现代数据策略应以明确的目标开始：我们试图改善哪些业务决策或流程，我们将如何知道它是否有效？以价值为导向意味着在开始任何建模工作之前，将业务目标转化为明确的价值假设，定义目标人群、预期的业务行动以及将在生产中验证影响的经济学信号。当数据策略以明确的企业成果为基础时，优先级变得有纪律，执行变得一致，成功变得可衡量。'
- en: '**Treat data as a product, not a by-product** : In most organizations, data
    is still treated as something that is left over from applications, a by-product
    of transactions, logs, or operations. When data is treated this way, it’s nobody’s
    responsibility to ensure it is accurate, usable, documented, or trusted. AI systems
    built on such data will inherit the mess.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将数据视为产品，而非副产品**：在大多数组织中，数据仍然被视为应用程序的遗留物，是交易、日志或操作的副产品。当数据以这种方式处理时，没有人负责确保其准确性、可用性、文档化或可信度。建立在如此数据之上的AI系统将继承混乱。'
- en: Treating data as a product flips the paradigm. A data product is not data sitting
    in storage. It is a maintained, documented, trusted, and consumable asset with
    a defined purpose, defined users, and defined service expectations. Just like
    any product, it has an owner, a roadmap, quality standards, and a support model.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据视为产品颠覆了范式。数据产品不是存储在存储中的数据。它是一个维护的、文档化的、可信的、可消费的资产，具有明确的目的、定义的用户和定义的服务期望。就像任何产品一样，它有一个所有者、路线图、质量标准和支持模型。
- en: 'A data product could take many forms: a curated customer-360 table, a feature
    store for modeling, a fraud detection model score, an embeddings catalog for GenAI,
    or a metric layer exposed to the finance reporting team. Treating data as a product
    requires several shifts:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 数据产品可以采取多种形式：一个精心制作的客户360度表格、用于建模的特征存储、欺诈检测模型评分、用于GenAI的嵌入目录，或对财务报告团队公开的指标层。将数据视为产品需要几个转变：
- en: Someone must own it
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须有人负责
- en: It must be discoverable and interpretable by others
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它必须能够被他人发现和理解
- en: It must be versioned and governed
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它必须进行版本控制和治理
- en: It must be built to serve a known use case or consumer
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它必须构建来服务于已知的用例或消费者
- en: It must be monitored, supported, and eventually retired through its life cycle
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它必须在整个生命周期中得到监控、支持和最终退役
- en: '**Semantic and governed** : Historically, organizations believed that once
    data was centralized or piped into a lake/warehouse, it was “ready.” AI has now
    exposed the flaw in that assumption: integrated data without meaning is not useful
    intelligence. ML, GenAI, and especially agentic AI need to understand not just
    the format of the data but the business meaning, its intent, its constraints,
    and its appropriate use.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义和治理**：历史上，组织认为一旦数据被集中或流入湖/仓库，它就是“准备好了”。现在，AI已经暴露了这种假设的缺陷：没有意义的集成数据不是有用的情报。ML、GenAI，尤其是代理AI需要理解的不只是数据的格式，还有其商业意义、意图、约束和适当的使用。'
- en: Semantics provide shared meaning, such as what a customer is, what counts as
    attrition, what an active balance is, and what “churn” means in wealth versus
    retail banking. Without enforcing this logical business model on the AI systems,
    they could produce conflicting answers to the same questions.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 语义提供了共享的意义，例如客户是什么，什么算作流失，活跃余额是什么，以及“流失”在财富管理和零售银行中的含义。如果不强制在AI系统上实施这种逻辑商业模型，它们可能会对相同的问题产生相互冲突的答案。
- en: Governance ensures the right data is being accessed by the right people to perform
    the right tasks. It defines who can access what, which fields are sensitive, which
    models need review, and how AI decisions are monitored and justified.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 治理确保正确的人访问正确的数据以执行正确的任务。它定义了谁可以访问什么，哪些字段是敏感的，哪些模型需要审查，以及AI决策的监控和证明。
- en: '**Multi-modal, multi-speed architecture** : Legacy data strategies were built
    around structured, slow-moving data, such as quarterly finances, monthly risk
    reports, and daily warehouse refreshes. Modern AI systems, especially GenAI and
    agentic AI systems, learn from and act upon many kinds of signals moving at different
    speeds.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态、多速度架构**：传统数据策略是围绕结构化、缓慢移动的数据构建的，如季度财务、月度风险报告和每日仓库刷新。现代AI系统，尤其是GenAI和代理AI系统，从不同速度移动的许多信号中学习并采取行动。'
- en: '“Multi-modal” means the system can consume more than rows and tables: text
    (notes, chats, and policies), audio (calls), documents (PDFs and contracts), images
    (checks and IDs), events (clickstreams), logs, vectors, embeddings, knowledge
    graphs, and more.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: “多模态”意味着系统可以消费的不仅仅是行和表：文本（笔记、聊天和政策）、音频（通话）、文档（PDF和合同）、图像（支票和身份证）、事件（点击流）、日志、向量、嵌入、知识图谱等等。
- en: '“Multi-speed” means the architecture must support both slow and fast decisions
    at once: some use cases (marketing, forecasting, and capital planning) tolerate
    daily or weekly refresh, while others (payment fraud, personalization, and agentic
    responses) require real-time or near-real-time streaming.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: “多速度”意味着架构必须同时支持慢速和快速决策：某些用例（如营销、预测和资本规划）可以容忍每日或每周刷新，而其他用例（如支付欺诈、个性化和小型代理响应）则需要实时或近实时流式处理。
- en: 'Practically, a multi-modal, multi-speed strategy means the following:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，多模态、多速度策略意味着以下内容：
- en: Designing the platform to handle structured + unstructured + vectorized embeddings
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计平台以处理结构化、非结构化和向量化的嵌入
- en: Supporting batch + micro-batch + streaming, depending on the business decision
    horizon
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据业务决策范围支持批量、微批量和流式处理
- en: Using specialized stores where needed, for example, document stores, vector
    databases, feature stores, or knowledge graphs, rather than pushing everything
    into one warehouse pattern
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在需要时使用专用存储，例如，文档存储、向量数据库、特征存储或知识图谱，而不是将所有内容推入一个仓库模式
- en: Treating latency as a business design choice, not a technical afterthought
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将延迟视为业务设计选择，而不是技术后续考虑
- en: '**Trust and compliance by design** : It goes without saying that building a
    trustworthy and transparent data platform is critical. Trust is not earned after
    deployment; it should be engineered into the life cycle. That means privacy, fairness,
    transparency, monitoring, and human oversight should be built into design, data
    preparation, modeling, validation, and ongoing operations.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计信任与合规性**：不言而喻，构建一个值得信赖且透明的数据平台至关重要。信任并非在部署后获得；它应该被设计到生命周期中。这意味着隐私、公平性、透明度、监控和人工监督应该被整合到设计、数据准备、建模、验证和持续运营中。'
- en: 'A “trust-by-design” data strategy in practice could look as follows:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 实践中的“设计信任”数据策略可能如下所示：
- en: Classification, sensitivity tagging, and quality assurance at ingestion
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在摄取时进行分类、敏感度标记和质量保证
- en: Row-/column-/attribute-level access controls built into the fabric
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在结构化、列或属性级别内置访问控制
- en: Policy-aware data products, containing usage bounds, lineage, and disclaimers
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有使用界限、血缘和免责声明的策略感知数据产品
- en: Automated audit trails, lineage, access logs, and transformation recorded as
    data moves
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动审计跟踪、血缘、访问日志和转换记录在数据移动过程中
- en: Remember, AI does not fix bad data governance; it amplifies it. A data strategy
    that embeds trust at the source is required to enable more AI work with less friction
    and more agility.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，AI并不能修复不良的数据治理；它放大了它。需要一种在源头嵌入信任的数据策略，以实现更少的摩擦和更多的敏捷性。
- en: '**Interoperable execution** : As organizations adopt AI across multiple clouds,
    SaaS platforms, and agent ecosystems, data can’t live in isolated environments.
    Models, GenAI systems, and autonomous agents must be able to work off the same
    facts, reason over the same entities, and act within the same constraints, regardless
    of where they run or who built them.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可互操作执行**：随着组织在多个云、SaaS平台和代理生态系统采用AI，数据不能存在于孤立的环境中。模型、GenAI系统和自主代理必须能够在相同的事实上工作，对相同的实体进行推理，并在相同的约束下行动，无论它们在哪里运行或由谁构建。'
- en: 'Note the following about data interoperability:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 注意以下关于数据互操作性的内容：
- en: Customer, account, claim, and transaction means the same thing across clouds,
    systems, and platforms.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户、账户、索赔和交易在云、系统和平台中具有相同的意义。
- en: Policies on data usage, privacy, retention, and lineage travel with the data,
    not within the infrastructure that hosts it.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据使用、隐私、保留和血缘跟踪的政策与数据同行，而不是在承载它的基础设施内部。
- en: Systems can reference, not replace—that is, moving meaning, not copying raw
    data everywhere.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统可以参考而不是替换——即移动意义而不是复制原始数据到每个地方。
- en: A data strategy that ensures interoperability is critical. Interoperability
    is what allows models, GenAI systems, and agents to operate consistently across
    clouds and platforms, turning data into a reusable enterprise asset instead of
    a set of disconnected silos.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保互操作性的数据策略至关重要。互操作性是允许模型、通用人工智能系统和代理在云和平台之间一致运行的关键，将数据转化为可重用的企业资产，而不是一系列孤立的孤岛。
- en: Consider these six pillars when building a modern data strategy that is AI-ready.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建一个为AI准备就绪的现代数据策略时，请考虑这六个支柱。
- en: The next step is to build an AI platform that can support experimentation, development,
    and reliable deployment at scale.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是构建一个能够支持实验、开发和可靠大规模部署的AI平台。
- en: AI platform – scalable infrastructure for experimentation and deployment
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI平台 – 可扩展的基础设施，用于实验和部署
- en: 'A modern AI platform is the engine that powers innovation across all stages
    of the AI life cycle, from experimentation to production scale. Leading organizations
    and major cloud providers agree: moving from isolated pilot models to reliable,
    business-critical AI requires more than powerful algorithms. It demands an infrastructure
    that’s modular, robust, and built for both rapid prototyping and enterprise stability.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 一个现代AI平台是推动AI生命周期所有阶段创新的动力，从实验到生产规模。领先的组织和主要云服务提供商一致认为：从孤立的试点模型转向可靠、业务关键型AI需要的不只是强大的算法。它需要的是一个模块化、健壮且适用于快速原型设计和企业稳定性的基础设施。
- en: Today, the core challenge is balancing speed of innovation with security, reliability,
    and compliance. The most effective AI platforms, whether on-premises, hybrid,
    or fully cloud-native, are designed as modular systems. They separate key functions
    such as data ingestion, feature engineering, model training, testing, and production
    serving. Modular design allows teams to update or scale individual components,
    such as rolling out a new model or swapping in a better data pipeline without
    risk to the entire system. This blueprint is regularly cited by major cloud platforms
    and industry leaders such as Netflix, Uber, and Airbnb.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，核心挑战是在创新速度、安全性、可靠性和合规性之间取得平衡。最有效的AI平台，无论是本地、混合还是完全云原生，都设计为模块化系统。它们将关键功能如数据摄取、特征工程、模型训练、测试和生产服务分离。模块化设计允许团队更新或扩展单个组件，例如推出新模型或更换更好的数据管道，而不会对整个系统造成风险。这个蓝图被主要云平台和行业领导者如Netflix、Uber和Airbnb广泛引用。
- en: 'A well-architected platform draws a clear line between sandboxed environments
    (where data scientists iterate and test with flexibility) and hardened production
    pipelines (where business continuity, compliance, and security take priority).
    This separation ensures innovation remains fast but doesn’t put live services
    or sensitive data at risk. Many advanced teams run “shadow mode” tests: new models
    operate in parallel with production models, letting teams measure real-world performance
    and spot problems before a full rollout.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 一个架构良好的平台在沙盒环境（数据科学家可以灵活迭代和测试）和加固的生产管线（业务连续性、合规性和安全性优先）之间划出一条清晰的界限。这种分离确保创新保持快速，但不会将实时服务或敏感数据置于风险之中。许多高级团队运行“影子模式”测试：新模型与生产模型并行运行，让团队能够衡量现实世界的性能并在全面推出之前发现问题。
- en: Scheduling and orchestration patterns also matter. Event-driven workflows power
    real-time systems, such as fraud detection, content personalization, or agentic
    AI, that adapt instantly to user interactions. Batch processes handle periodic
    retraining or large-scale analytics, offering efficiency for tasks that don’t
    need immediate results. The best platforms blend both, automatically routing tasks
    to the right pipeline based on latency and cost needs.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 调度和编排模式也很重要。事件驱动的流程为实时系统提供动力，例如欺诈检测、内容个性化或代理AI，它们能够即时适应用户交互。批量处理处理周期性再训练或大规模分析，为不需要即时结果的任务提供效率。最好的平台将两者结合，根据延迟和成本需求自动将任务路由到正确的管线。
- en: '**AI operations** ( **AIOps** ) has become the backbone for managing complexity
    at scale. Automated tools track models from initial build through testing and
    into production, with version control, reproducibility, and rollback capabilities
    as standard features. **Continuous integration/continuous deployment** ( **CI/CD**
    ) pipelines allow frequent, controlled updates backed by automated testing, minimizing
    the risk of pushing flawed models into production.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI运营**（**AIOps**）已成为管理大规模复杂性的骨干。自动化工具从初始构建跟踪到测试和生产，标准功能包括版本控制、可重复性和回滚能力。**持续集成/持续部署**（**CI/CD**）管道允许通过自动化测试进行频繁、受控的更新，最小化将有缺陷的模型推入生产的风险。'
- en: Monitoring and observability are now non-negotiable. Beyond basic accuracy scores,
    platforms need to track model drift, latency, user outcomes, and even fairness
    metrics, with triggers to retrain or roll back as soon as anomalies appear. Full
    stack observability, recommended by Google and Azure, means capturing not just
    system logs but operational metrics that actually matter to business performance.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 监控和可观察性现在是不可协商的。除了基本准确度评分之外，平台还需要跟踪模型漂移、延迟、用户结果，甚至公平性指标，并在异常出现时触发重新训练或回滚。由谷歌和Azure推荐的全面可观察性意味着不仅要捕获系统日志，还要捕获对业务性能真正重要的运营指标。
- en: Governance and compliance should be built directly into the platform, not handled
    after deployment. Enterprise-grade platforms now automate audit trails, access
    controls, model documentation, and approval workflows to stay ahead of evolving
    regulations (such as the EU AI Act and NIST frameworks). Steering committees and
    documented review processes maintain oversight.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 管理和合规性应直接构建到平台中，而不是在部署后处理。企业级平台现在自动化审计跟踪、访问控制、模型文档和审批工作流程，以保持对不断变化的法规（如欧盟AI法案和NIST框架）的领先。指导委员会和记录在案的审查流程保持监督。
- en: In summary, a mature AI platform is critical to enable agility and scalability
    for enterprise innovation.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，一个成熟的AI平台对于企业创新实现灵活性和可扩展性至关重要。
- en: AI algorithms/pattern selection strategy
  id: totrans-114
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI算法/模式选择策略
- en: 'Choosing the right AI algorithm isn’t a simple matter. Today’s enterprise environments
    deal with complex, mixed data and must meet requirements set by compliance, security,
    cost, and explainability, which are often more decisive than raw accuracy or novelty.
    Research and experience show that the best results come from a principled, business-first
    process that blends experimentation, clear evaluation criteria, and continuous
    collaboration between technical and business stakeholders. For example:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 选择正确的AI算法并非易事。今天的企业环境处理复杂、混合数据，必须满足合规性、安全性、成本和可解释性等要求，这些要求通常比原始准确度或新颖性更为关键。研究和经验表明，最佳结果来自一个基于原则、以业务为先的过程，该过程结合了实验、明确的评估标准以及技术利益相关者和业务利益相关者之间的持续协作。例如：
- en: '**Start with business and compliance requirements** : Algorithm choices should
    always begin with a clear understanding of the problem domain. Regulatory needs,
    interpretability demands, and operational constraints often rule out entire model
    classes before technical performance is even considered. For example, in heavily
    regulated sectors, such as financial services, healthcare, and government, explainability,
    transparency, and documented risk controls are essential. For other contexts,
    high-throughput or low-latency use cases may shape method selection as much as
    predictive power.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从业务和合规性要求开始**：算法选择应始终从对问题领域的清晰理解开始。监管需求、可解释性要求和运营限制经常在考虑技术性能之前就排除了整个模型类别。例如，在高度监管的行业，如金融服务、医疗保健和政府，可解释性、透明度和记录在案的风险控制是必不可少的。在其他情况下，高吞吐量或低延迟用例可能像预测能力一样影响方法选择。'
- en: '**Align model types with data and use cases** : For structured, tabular data
    or problems requiring transparent decision paths (such as risk scoring or operational
    analytics), classical ML methods remain reliable. Tree-based models, linear models,
    and generalized boosting strike a strong balance between performance, interpretability,
    and ease of deployment.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将模型类型与数据和用例对齐**：对于结构化、表格数据或需要透明决策路径的问题（如风险评估或运营分析），经典机器学习方法仍然可靠。基于树的模型、线性模型和广义提升模型在性能、可解释性和部署简便性之间取得了良好的平衡。'
- en: Deep learning excels with large, unstructured datasets, such as images, natural
    language text, or multimodal sensor feeds. However, the higher demands for data,
    compute, and monitoring must be measured against cost and maintenance realities.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习在处理大型、非结构化数据集方面表现出色，例如图像、自然语言文本或多模态传感器数据。然而，对数据、计算和监控的更高需求必须与成本和维护现实情况进行权衡。
- en: Transfer learning sits between these two extremes and is particularly valuable
    when labeled data is scarce or time to production matters. Rather than training
    models from scratch, organizations adapt pre-trained models, for example, fine-tuning
    foundation models or reusing pre-trained embeddings, to dramatically reduce cost,
    training data requirements, and development time while still achieving high accuracy.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 转移学习介于这两种极端之间，当标注数据稀缺或生产时间紧迫时尤其有价值。组织不是从头开始训练模型，而是调整预训练模型，例如微调基础模型或重用预训练嵌入，以显著降低成本、训练数据需求和开发时间，同时仍能实现高精度。
- en: GenAI is a subset of deep learning, having the new capabilities for language,
    image, and code generation, as well as **retrieval-augmented generation** ( **RAG**
    ) for search and automation workflows. These models introduce powerful capabilities
    but bring added risk around unpredictability, high compute costs, and greater
    oversight for safety and ethical compliance.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI是深度学习的一个子集，具有语言、图像和代码生成的新能力，以及用于搜索和自动化工作流程的**检索增强生成**（**RAG**）。这些模型引入了强大的功能，但同时也带来了不可预测性、高计算成本以及更大程度的安全和伦理合规性监管的风险。
- en: Reinforcement learning and agentic architectures address dynamic, sequential
    decision problems, such as autonomous vehicles or adaptive supply chain systems,
    but require users to conduct careful reward design, simulation, and robust monitoring
    to avoid unintended outcomes in complex environments.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习和代理架构解决动态、顺序决策问题，如自动驾驶汽车或自适应供应链系统，但需要用户进行仔细的奖励设计、模拟和稳健的监控，以避免在复杂环境中的意外结果。
- en: '**Evaluate, experiment, and combine approaches** : Enterprises rarely succeed
    by committing to a single model type from the outset. Instead, running structured
    experiments, via AutoML tools, cloud-based pilot platforms, and benchmark competitions,
    allows teams to compare classical, deep, and generative approaches early in the
    process. Increasingly, hybrid architectures are adopted: for instance, using gradient
    boosting to summarize tabular business data, followed by a transformer for document
    analysis, or combining a knowledge graph with a foundation model for enterprise
    search.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估、实验和结合方法**：企业很少从一开始就承诺单一模型类型而取得成功。相反，通过AutoML工具、基于云的试点平台和基准竞赛进行结构化实验，可以让团队在早期过程中比较经典、深度和生成方法。越来越普遍的是采用混合架构：例如，使用梯度提升来总结表格型业务数据，然后使用转换器进行文档分析，或者将知识图谱与基础模型结合用于企业搜索。'
- en: '**Consider deployment and life cycle impacts** : Performance in development
    rarely guarantees success in the field. As such, algorithm selection should account
    for downstream factors such as the following:'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**考虑部署和生命周期影响**：在开发阶段的表现很少能保证在实际应用中的成功。因此，算法选择应考虑以下下游因素：'
- en: Ease of monitoring, interpretability, and retraining (especially as regulations
    shift or new data arrives)
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控的简便性、可解释性和重新训练（特别是在法规变动或新数据到来时）
- en: Total compute and storage demand, at both training and inference time
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练和推理时间所需的总体计算和存储需求
- en: Technical support, integration with existing MLOps stacks, and the ability to
    meet business KPIs by scaling
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术支持、与现有MLOps堆栈的集成，以及通过扩展来满足业务KPI的能力
- en: Risk of “technical debt” as over-complex models may look impressive but prove
    brittle, hard to govern, or too costly to maintain
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “技术债务”的风险，因为过度复杂的模型可能看起来令人印象深刻，但可能脆弱、难以管理或维护成本过高
- en: '**Test, validate, and reassess regularly** : Organizations don’t succeed by
    picking the “perfect” model right away. Instead, they treat model selection as
    an ongoing, step-by-step process. They rely on pilot tests, A/B comparisons, and
    regular performance checks. Business feedback helps keep solutions on track as
    needs change. Thorough documentation, version control, and audit trails are now
    essentials for compliance and trust. Here are the key considerations:'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期测试、验证和重新评估**：组织不会一开始就选择“完美”的模型就取得成功。相反，他们将模型选择视为一个持续、逐步的过程。他们依赖试点测试、A/B比较和定期的性能检查。业务反馈有助于在需求变化时保持解决方案的正确方向。详尽的文档、版本控制和审计跟踪现在是合规性和信任的必要条件。以下是关键考虑因素：'
- en: '| **Application domain** | **Preferred approaches** | **Key considerations**
    |'
  id: totrans-129
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| **应用领域** | **首选方法** | **关键考虑因素** |'
- en: '| Credit risk scoring | Tree-based, interpretable | Must be explainable, low
    latency, and compliant |'
  id: totrans-130
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 信用风险评估 | 基于树的、可解释的 | 必须可解释、低延迟且合规 |'
- en: '| Document summarization | GenAI + RAG | Context, quality control, and auditability
    |'
  id: totrans-131
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 文档摘要 | 通用人工智能 + RAG | 上下文、质量控制以及可审计性 |'
- en: '| Image analysis | Deep learning (CNNs) | High data/compute, GPU scaling, and
    privacy |'
  id: totrans-132
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 图像分析 | 深度学习（CNNs） | 高数据/计算、GPU扩展和隐私 |'
- en: '| Real-time recommendations | Hybrid (classic + deep) | Cost, retraining frequency,
    and continuous feedback |'
  id: totrans-133
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 实时推荐 | 混合（经典+深度） | 成本、再训练频率和持续反馈 |'
- en: '| Fraud detection | Ensemble/hybrid | Balance accuracy, explainability, and
    cost |'
  id: totrans-134
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 欺诈检测 | 集成/混合 | 平衡准确性、可解释性和成本 |'
- en: '| Dynamic control/agents | Reinforcement learning, agentic | Complex monitoring
    and risk of unintended action |'
  id: totrans-135
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 动态控制/代理 | 强化学习、代理 | 复杂的监控和意外行为的风险 |'
- en: '| Low-data domain adaptation (medical NLP, legal AI, etc.) | Transfer learning/fine-tuning
    | Limited labeled data, ability to reuse pre-trained models, and domain shift
    risks |'
  id: totrans-136
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 低数据域适应性（医疗自然语言处理、法律人工智能等） | 迁移学习/微调 | 标签数据有限、能够重用预训练模型以及领域迁移风险 |'
- en: 'Table 2.3: Model selection in enterprise context'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 表2.3：企业环境中的模型选择
- en: Algorithm selection is not a one-off technical exercise but a dynamic, business-critical
    process. Organizations that see real impacts from AI routinely revisit model choices,
    prioritize operational clarity, and ground decisions in real-world constraints,
    using hybrid setups and pilot-driven validation whenever possible.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 算法选择不是一次性的技术练习，而是一个动态的、业务关键的过程。看到人工智能带来实际影响的组织通常会定期回顾模型选择，优先考虑操作清晰度，并将决策建立在现实世界的限制之上，尽可能使用混合设置和试点驱动的验证。
- en: Organizational structure and change management
  id: totrans-139
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 组织结构和变革管理
- en: 'Launching AI initiatives is as much about people and processes as technology.
    Whether you’ve built an advanced data strategy or a sophisticated AI architecture,
    success depends on how teams are organized, motivated, and guided through change.
    Below are some proven best practices:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 启动人工智能项目不仅关乎技术和流程，还关乎人和过程。无论你已经构建了先进的数据策略还是复杂的人工智能架构，成功都取决于团队的组织方式、激励措施以及如何引导团队通过变革。以下是一些经过验证的最佳实践：
- en: 'Team structure matters:'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队结构很重要：
- en: AI touches both technical and business areas, so a clear team structure is key.
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能触及技术和商业领域，因此清晰的团队结构至关重要。
- en: 'Common models include the following:'
  id: totrans-143
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 常见模型包括以下：
- en: '**Centralized** : A single **center of excellence** ( **CoE** ) steers ML for
    the whole company. This drives consistency and deep expertise, but risks alienating
    frontline teams.'
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集中式**：一个单一的**卓越中心**（**CoE**）负责整个公司的机器学习。这推动了一致性和深入的专业知识，但可能会使前线团队感到疏远。'
- en: '**Embedded** : Each business unit has its own ML staff, allowing for quick
    domain-specific solutions, but risking duplicated work and inconsistent standards.'
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入式**：每个业务单元都有自己的机器学习团队，这允许快速针对特定领域提供解决方案，但同时也存在重复工作和标准不一致的风险。'
- en: '**Hybrid** : A core platform team handles governance and tooling, while domain
    teams manage local projects. This “hub-and-spoke” approach offers balance but
    needs strong communication to avoid confusion.'
  id: totrans-146
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合式**：核心平台团队处理治理和工具，而领域团队管理本地项目。这种“中心辐射”方法提供了平衡，但需要强大的沟通以避免混淆。'
- en: Choosing the best approach depends on the organization’s size and needs, but
    most mature organizations lean toward hybrid to combine shared knowledge with
    business context.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 选择最佳方法取决于组织的规模和需求，但大多数成熟组织倾向于混合模式，以结合共享知识和业务背景。
- en: 'Build collaboration and shared goals:'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立协作和共同目标：
- en: Form cross-functional “tiger teams” that unite data, tech, and business experts
    on high-priority projects.
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组建跨职能的“老虎团队”，在高优先级项目中将数据、技术和业务专家联合起来。
- en: Use shared objectives (such as OKRs) so technical and business staff work toward
    the same outcomes, not isolated targets.
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用共享目标（如OKR），以便技术和业务人员朝着相同的成果努力，而不是孤立的目标。
- en: Invest in ongoing training. Leaders should learn ML basics, and technical staff
    should deepen their business context. Regular internal workshops and upskilling
    programs help teams stay adaptable.An open, learning-focused culture, one that
    invites hands-on feedback and celebrates both successes and failures, keeps AI
    teams engaged and resilient.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 投资于持续培训。领导者应学习机器学习基础知识，技术人员应深化其业务背景。定期的内部研讨会和提升技能项目帮助团队保持适应性。一个开放、以学习为导向的文化，它欢迎动手反馈并庆祝成功与失败，使AI团队保持参与和韧性。
- en: 'Manage change and align incentives:'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理变革和调整激励：
- en: Set shared metrics and rewards that reflect both business value and ML performance,
    such as revenue growth or customer retention, not just technical benchmarks.
  id: totrans-153
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定反映业务价值和机器学习性能的共享指标和奖励，例如收入增长或客户保留，而不仅仅是技术基准。
- en: Ensure strong executive sponsorship. Senior leaders should champion ML, clear
    obstacles, and communicate the “why” behind the transformation.
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保强有力的高管支持。高级领导者应倡导机器学习，清除障碍，并传达变革背后的“为什么”。
- en: Use structured change management frameworks, such as Kotter’s eight steps or
    ADKAR, to support new workflows, roles, and mindsets. Start with small, focused
    pilots instead of wide-scale rollouts to build trust and momentum.
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用结构化的变革管理框架，如科特的八个步骤或ADKAR，以支持新的工作流程、角色和心态。从小规模、专注的试点项目开始，而不是大规模推广，以建立信任和动力。
- en: Successful AI organizations see change as ongoing, not one-time. They encourage
    ownership at all levels, keep communication open, and regularly review progress
    to adapt quickly as business and technology needs evo lve.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的AI组织将变革视为持续的过程，而非一次性事件。他们鼓励各级别的所有权，保持沟通渠道畅通，并定期审查进度以快速适应业务和技术需求的变化。
- en: Summary
  id: totrans-157
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we outlined the structural elements of a mature AI strategy.
    We showed that organizations with high-performing AI systems do not start with
    algorithms but with business alignment, structure, and repeatable patterns.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们概述了成熟AI策略的结构要素。我们展示了具有高性能AI系统的组织并非从算法开始，而是从业务对齐、结构和可重复的模式开始。
- en: 'Key takeaways include the following:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点包括以下内容：
- en: Business alignment should come first. AI must be tied to defined business initiatives
    and measured against real outcomes, not technical proxies.
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 业务对齐应放在首位。AI必须与定义明确的企业倡议相结合，并针对实际结果进行衡量，而不是技术代理。
- en: Governance is an enabler, not a brake. Policies, guardrails, and compliance
    must be built into the life cycle so innovation can scale safely and repeatedly.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 治理是推动者，而非制动器。政策、指导方针和合规性必须融入生命周期，以确保创新可以安全且反复地扩展。
- en: Data is the foundation and your organization’s differentiator. Reliable, ethical,
    interoperable, and well-governed data products make AI trustworthy and reusable
    across use cases.
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据是基础，也是你组织的差异化因素。可靠、道德、互操作和良好治理的数据产品使AI在各个用例中值得信赖且可重复使用。
- en: Platform thinking replaces one-off projects. A modular AI platform enables fast
    iteration in the lab and hardened execution in production.
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台思维取代了单一项目。模块化AI平台使实验室中的快速迭代和生产中的硬化执行成为可能。
- en: The right family of algorithms depends on context, constraints, and value. Having
    a hammer should not mean everything looks like a nail.
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正确的算法系列取决于上下文、约束和价值。拥有锤子并不意味着一切看起来都像钉子。
- en: The operating model is what makes all elements work efficiently. AI succeeds
    when incentives, roles, and collaboration paths are designed for cross-functional
    delivery.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运营模式是使所有元素高效工作的关键。当激励措施、角色和协作路径被设计为跨职能交付时，AI才能成功。
- en: When these elements are in place, AI stops being experimental and starts becoming
    a durable business capability.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 当这些要素到位时，AI就不再只是实验性的，而是开始成为一种持久的企业能力。
- en: What’s next?
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是什么？
- en: Now that we have a foundation for how to build AI effectively, the next question
    is what to build first. The next chapter will show how to identify, rank, and
    select AI projects with the highest business imp act.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经建立了有效构建AI的基础，接下来的问题是先构建什么。下一章将展示如何识别、排序和选择具有最高商业影响的AI项目。
