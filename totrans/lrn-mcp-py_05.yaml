  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'At this point, you should see a bunch of notifications and the final result
    in the second terminal window, like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s focus on the following message, a notification that says we’re on file
    2/3\. Imagine we went into a tunnel and lost network connection. Make note of
    the ID, as this ID is the last you saw before losing connection:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'In our final step, we need to send a `GET` request to the `/mcp` endpoint with
    the session ID and last event ID passed in the headers. That should lead to the
    server replaying all messages that we missed out on, which should be the `sales3.csv`
    file notification and the final tool result. Remember to replace both `mcp-session-id`
    and `last-event-id` before you paste the following in the second terminal window:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Pasting this result means you should see the following in the second terminal
    window:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Our one missing notification and the tool result! Isn’t that great? We didn’t
    lose any messages.
  prefs: []
  type: TYPE_NORMAL
- en: It should be said, though, that if you write code that can leverage replayability,
    you should listen to browser events when you lose network connection, so you have
    a chance to save the session ID and last event ID, and remember to call the server
    with `GET /mcp` rather than `POST /mcp`, as the latter would start a new session.
  prefs: []
  type: TYPE_NORMAL
- en: Also, if you use the event store I’m using, remember it’s not good for production
    and that it would need to persist the message in a database or similar to be deemed
    production-ready.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the concept of Streamable HTTP and how it differs
    from SSE. We learned that streaming allows for real-time data transmission, which
    is beneficial for applications that require immediate access to data, such as
    live events or large files.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, we implemented an MCP server that supports Streamable HTTP and
    demonstrated how to consume streaming data using the MCP SDK. We also discussed
    the importance of notifications in providing real-time updates to clients and
    how to handle them effectively.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll explain how you can use a low-level server API, as
    there are some use cases where you might want to do that.
  prefs: []
  type: TYPE_NORMAL
- en: Assignment
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'For this assignment, we’ll again focus on e-commerce. Imagine you have CSV
    files on the server that need processing. Processing happens when all CSV files
    on a server are sent one by one as input to a web API. The idea is that this process
    will be kicked off by calling a tool. Imagine the following program output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: The point of this assignment is to learn how to use notifications. The files
    can be a list of in-memory entries that get removed as they’re processed. You
    will need to create both a server, where the files to process are, and a client
    that can process input commands.
  prefs: []
  type: TYPE_NORMAL
- en: Solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
