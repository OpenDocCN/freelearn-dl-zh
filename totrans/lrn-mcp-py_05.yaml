    /main/Chapter05/solutions/README.md)访问解决方案。"
- en: Quiz
  id: totrans-178
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 问答
- en: What is the primary benefit of using Streamable HTTP?
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 使用可流式HTTP的主要好处是什么？
- en: 'A: It allows for faster access to data'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 它允许更快地访问数据'
- en: 'B: It requires fewer server resources'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 它需要更少的服务器资源'
- en: 'C: It is more secure than other protocols'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 它比其他协议更安全'
- en: How does Streamable HTTP differ from SSE?
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 可流式HTTP与SSE有何不同？
- en: 'A: Streamable HTTP uses a text-based format, while SSE uses JSON.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 可流式HTTP使用基于文本的格式，而SSE使用JSON。'
- en: 'B: Streamable HTTP can send binary data, while SSE is limited to text.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B: 可流式HTTP可以发送二进制数据，而SSE仅限于文本。'
- en: 'C: Streamable HTTP is unidirectional, while SSE is bidirectional.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C: 可流式HTTP是单向的，而SSE是双向的。'
