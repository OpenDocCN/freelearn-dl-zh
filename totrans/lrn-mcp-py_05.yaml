  type: TYPE_IMG
  zh: '![](img/Unlock1.png)'
- en: 'Now, if you run a tool, you will see the tool result, and you will see an area
    below it showing notifications, like so:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你运行一个工具，你会看到工具结果，你会在其下方看到一个显示通知的区域，如下所示：
- en: "![Figure 5.3 – No\uFEFFtifications](img/B34121_05_3.png)"
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.3 – 通知](img/B34121_05_3.png)'
- en: Figure 5.3 – Notifications
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.3 – 通知
- en: Notifications with resumability
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可恢复的通知
- en: As we said before, notifications can be sent with SSE and Streamable HTTP, but
    with the latter, it becomes extra important. Imagine you have a client that disconnects
    a number of times due to a spotty internet connection, but thanks to logic in
    the client performing reconnects and resumability support in the server, the end
    user still has a good experience, as they won’t miss out on either notifications
    or normal messages, such as a tool response, for example.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前所说的，通知可以通过 SSE 和 Streamable HTTP 发送，但后者尤为重要。想象一下，由于网络连接不稳定，客户端多次断开连接，但多亏了客户端中执行的重新连接逻辑和服务器中的可恢复性支持，最终用户仍然拥有良好的体验，因为他们不会错过通知或正常消息，例如工具响应等。
- en: Now, let’s move on to creating a server.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们继续创建服务器。
- en: Creating and testing a server with Streamable HTTP
  id: totrans-88
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Streamable HTTP 创建和测试服务器
- en: Let’s create a server, and in doing so, we’ll also integrate notifications.
    After the server is built, in the next section, we’ll try testing it out with
    the different tools we have at our disposal, such as writing our own client, using
    the Inspector tool, and testing with cURL.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个服务器，在这个过程中，我们还将集成通知。服务器构建完成后，在下一节中，我们将尝试使用我们可用的不同工具对其进行测试，例如编写我们自己的客户端，使用检查器工具，以及使用cURL进行测试。
- en: 'To create the server code, there are a few things we need to do:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建服务器代码，我们需要做一些事情：
- en: Set up the transport as Streamable HTTP.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将传输设置为可流式传输HTTP。
- en: Add features.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加功能。
- en: Add code that sends notifications when a tool is called.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加在调用工具时发送通知的代码。
- en: 'Great, now that we have our plan in place, let’s implement it. Here’s an attempt
    to implement the first two points of our plan:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，现在我们已经制定了计划，让我们开始实施。以下是我们计划前两点的尝试性实施：
- en: '[PRE4]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'To add sending notifications, we need to add the `Context` object to our method
    signature, like so:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 要添加发送通知的功能，我们需要将`Context`对象添加到我们的方法签名中，如下所示：
- en: '[PRE5]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Let’s finally add the part in the tool where it produces a notification using
    the `Context` object:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们在工具中添加使用`Context`对象生成通知的部分：
- en: '[PRE6]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Our full code now looks like this:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们完整的代码现在看起来是这样的：
- en: '[PRE7]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Let’s look at testing our server next.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如何测试我们的服务器。
- en: Testing the server
  id: totrans-103
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试服务器
- en: 'As always, we have different choices to try out the server functionality:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，我们有不同的选择来测试服务器功能：
- en: Creating a client
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建客户端
- en: Using the Inspector tool
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用检查器工具
- en: Testing with cURL
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用cURL进行测试
- en: Let’s try out each of these options.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试每个选项。
- en: Using the Inspector tool
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用检查器工具
- en: 'We covered the Inspector tool earlier in this chapter, but let’s quickly remind
    ourselves how it works with our newly created server. We can call the Inspector
    tool like so to start up a web server. Select the following fields:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在本章前面介绍了检查器工具，但让我们快速回顾一下它是如何与我们的新创建的服务器一起工作的。我们可以像这样调用检查器工具来启动一个Web服务器。选择以下字段：
- en: '**Transport Type**: **HTTP**'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**传输类型**：**HTTP**'
- en: '**Server URL**: `http://localhost:8000/mcp` (adjust the port if necessary)'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器URL**：`http://localhost:8000/mcp`（如有必要，调整端口号）'
- en: 'Click the **Connect** button to connect to the server so you can use its features
    and then enter the following:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**连接**按钮连接到服务器，以便使用其功能，然后输入以下内容：
- en: '[PRE8]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: As you can see, it’s very similar to testing SSE servers; just change the transport
    type and make sure your URL has `/mcp` at the end instead of `/sse`.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，它与测试SSE服务器非常相似；只需更改传输类型，并确保您的URL以`/mcp`结尾而不是`/sse`。
- en: Testing with cURL
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用cURL进行测试
- en: We introduced cURL in the previous chapter; we can use it here as well. To get
    a session ID, you will need to send an `initialize` message. The message should
    contain what capabilities you support, such as `tools`, for example.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在上一章介绍了cURL；我们也可以在这里使用它。要获取会话ID，您需要发送一个`initialize`消息。消息应包含您支持的功能，例如`tools`。
- en: 'Here’s the message you need to send:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是您需要发送的消息：
- en: '[PRE9]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Note that you need to send `Accept` headers and content type. Make a note of
    the session ID returned, as you will use it for all remaining calls.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 注意您需要发送`Accept`头部和内容类型。记下返回的会话ID，因为您将在所有剩余的调用中使用它。
- en: 'Create a second terminal window and then run the following command, but replace
    the `mcp-session-id` value with the session ID you got back in the previous step:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 创建第二个终端窗口，然后运行以下命令，但将`mcp-session-id`值替换为上一步中获取的会话ID：
- en: '[PRE10]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Note how the session ID isn’t a query parameter called `session_id` anymore,
    but a header value called `mcp-session-id`. The message you sent was a notification
    of the `notifications/initialized` type, meaning it’s the last message of the
    handshake process. After this message, we can now do more normal things, such
    as listing tools, calling them, and so on, so let’s do that next.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到会话ID不再是名为`session_id`的查询参数，而是一个名为`mcp-session-id`的头部值。您发送的消息是`notifications/initialized`类型的通知，这意味着它是握手过程的最后一条消息。在这条消息之后，我们现在可以做一些更正常的事情，比如列出工具、调用它们等等，所以让我们继续这样做。
- en: 'Replace the value for `mcp-session-id` and keep using the second terminal window,
    and then run the following command:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 替换`mcp-session-id`的值，并继续使用第二个终端窗口，然后运行以下命令：
- en: '[PRE11]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'In this message of the `tools/call` type, we call a specific tool, `echo`,
    with the `chris` argument, and we should see a tool response similar to the following:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个`tools/call`类型的消息中，我们使用`chris`参数调用特定的工具`echo`，我们应该看到类似于以下工具响应：
- en: '[PRE12]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This response, in the second terminal window, says we got three notifications
    and a final tool response, which shows that our MCP server works as intended.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个终端窗口中的响应表明我们收到了三个通知和一个最终的工具响应，这表明我们的MCP服务器按预期工作。
- en: As you can see, both Inspector and cURL are good tools to use for testing out
    your server. Building a client, however, might be how we end up integrating our
    MCP server in a working solution, so let’s look at that in our next section.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，Inspector和cURL都是用于测试服务器的好工具。然而，构建客户端可能是我们将MCP服务器集成到工作解决方案中的方法，所以让我们在下一节中看看这一点。
- en: Creating a client to handle notifications
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建一个处理通知的客户端
- en: 'Let’s talk about the client. Clients generally need to be instructed to also
    handle notifications. This is something that’s seen as an extra thing needed in
    addition to the normal features. Let’s work out an implementation plan next. Let’s
    define our plan first:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们谈谈客户端。客户端通常需要被指示也处理通知。这被视为除了正常功能之外额外需要的东西。让我们制定一个实施计划。让我们首先定义我们的计划：
- en: Create a streamable HTTP transport and client.
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个可流式传输的HTTP传输和客户端。
- en: Set up a notification handler.
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置通知处理器。
- en: Call a tool.
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调用一个工具。
- en: 'Addressing the first point in our plan, our code looks like so:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 解决计划中的第一个问题，我们的代码如下所示：
- en: '[PRE13]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Here, we use the `streamablehttp_client` function to create a Streamable HTTP
    client. Thereafter, we create a client instance by initiating `ClientSession`.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们使用`streamablehttp_client`函数创建一个可流式传输的HTTP客户端。然后，我们通过初始化`ClientSession`创建一个客户端实例。
- en: 'To support incoming notifications, we need to configure the client session
    by assigning it a function to a property called `message_handler`, like so:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 为了支持传入的通知，我们需要通过将一个函数分配给一个名为`message_handler`的属性来配置客户端会话：
- en: '[PRE14]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Note how `message_handler` is assigned to `ClientSession` and how it points
    to a function called `message_handler`. The said function handles incoming messages
    and prints them out.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 注意`message_handler`是如何分配给`ClientSession`的，以及它指向一个名为`message_handler`的函数。该函数处理传入的消息并将它们打印出来。
- en: 'That’s it, that’s all we need to create a Streamable HTTP client and also support
    incoming notifications. Let’s have a look at the full code:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样，这就是我们创建可流式传输的HTTP客户端并支持传入通知所需的所有内容。让我们看看完整的代码：
- en: '[PRE15]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Now, if we run the client, it will tell us that the notifications are indeed
    notifications:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们运行客户端，它会告诉我们通知确实是通知：
- en: '[PRE16]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The conclusion is that by using the `message_handler` method, we can capture
    all messages, notifications, and exceptions that are sent from the server. This
    allows us to handle them appropriately and provide feedback to the user.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 结论是，通过使用`message_handler`方法，我们可以捕获从服务器发送的所有消息、通知和异常。这使我们能够适当地处理它们并向用户提供反馈。
- en: Testing out resumability
  id: totrans-146
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试可恢复性
- en: There’s actually an example implementation in the SDK for resumability. Let’s
    try that code out and see how it differs. You can find a simplified version of
    it at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter05/solutions/resumability/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter05/solutions/resumability/README.md).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: SDK中实际上有一个关于可恢复性的示例实现。让我们尝试这段代码并看看它有何不同。您可以在[https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter05/solutions/resumability/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter05/solutions/resumability/README.md)找到它的简化版本。
- en: 'What the code does is define a server with one tool, `process-files`. Upon
    calling the tool, you get three notifications and one final response. The easiest
    way to test the server out is by using cURL. With cURL, we can perform the handshake
    process, call a tool, and even do the needed bespoke request so it replays events.
    Let’s take it step by step:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 代码所做的是使用一个工具`process-files`定义一个服务器。在调用该工具时，你会收到三个通知和一个最终响应。测试服务器的最简单方法是通过使用cURL。使用cURL，我们可以执行握手过程，调用工具，甚至进行所需的定制请求，以便重放事件。让我们一步一步来：
- en: Start the server first.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先启动服务器。
- en: 'Start a second terminal and call `curl` with the following payload to exchange
    what features the client and the server both have:'
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在第二个终端中启动并使用以下有效载荷调用`curl`，以交换客户端和服务器都有的功能：
- en: '[PRE17]'
  id: totrans-151
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Check the terminal response in the first terminal window. You should see the
    server display session ID; copy that field for later use.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 检查第一个终端窗口中的终端响应。您应该看到服务器显示会话ID；复制该字段以供以后使用。
- en: 'End the server-client handshake by sending an `initialized` notification; replace
    the `mcp-session-id` value with the value you just copied in the previous step:'
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过发送一个 `initialized` 通知来结束服务器-客户端握手；将 `mcp-session-id` 的值替换为上一步中复制的值：
- en: '[PRE18]'
  id: totrans-154
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Call the tool by pasting the following command in the second terminal window,
    making sure to replace the `"mcp-session-id"` value first:'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在第二个终端窗口粘贴以下命令来调用工具，确保首先替换 `"mcp-session-id"` 的值：
- en: '[PRE19]'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'At this point, you should see a bunch of notifications and the final result
    in the second terminal window, like so:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你应该在第二个终端窗口中看到一系列通知和最终结果，如下所示：
- en: '[PRE20]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Let’s focus on the following message, a notification that says we’re on file
    2/3\. Imagine we went into a tunnel and lost network connection. Make note of
    the ID, as this ID is the last you saw before losing connection:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们关注以下消息，一个表示我们处于文件 2/3 的通知。想象一下，我们进入了一个隧道并失去了网络连接。注意 ID，因为这个 ID 是你在失去连接之前看到的最后一个
    ID：
- en: '[PRE21]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'In our final step, we need to send a `GET` request to the `/mcp` endpoint with
    the session ID and last event ID passed in the headers. That should lead to the
    server replaying all messages that we missed out on, which should be the `sales3.csv`
    file notification and the final tool result. Remember to replace both `mcp-session-id`
    and `last-event-id` before you paste the following in the second terminal window:'
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在我们的最后一步，我们需要向 `/mcp` 端点发送一个 `GET` 请求，并在头部传递会话 ID 和最后事件 ID。这应该会导致服务器重新播放我们错过的所有消息，这些消息应该是
    `sales3.csv` 文件通知和最终工具结果。记住在将以下内容粘贴到第二个终端窗口之前，替换掉 `mcp-session-id` 和 `last-event-id`：
- en: '[PRE22]'
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Pasting this result means you should see the following in the second terminal
    window:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 将此结果粘贴意味着你应该在第二个终端窗口中看到以下内容：
- en: '[PRE23]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Our one missing notification and the tool result! Isn’t that great? We didn’t
    lose any messages.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我们缺失的一个通知和工具结果！这不是很棒吗？我们没有丢失任何消息。
- en: It should be said, though, that if you write code that can leverage replayability,
    you should listen to browser events when you lose network connection, so you have
    a chance to save the session ID and last event ID, and remember to call the server
    with `GET /mcp` rather than `POST /mcp`, as the latter would start a new session.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 应该说，尽管如此，如果你编写的代码可以利用可重放性，那么当失去网络连接时，你应该监听浏览器事件，这样你就有机会保存会话 ID 和最后事件 ID，并记得用
    `GET /mcp` 而不是 `POST /mcp` 调用服务器，因为后者会启动一个新的会话。
- en: Also, if you use the event store I’m using, remember it’s not good for production
    and that it would need to persist the message in a database or similar to be deemed
    production-ready.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，如果你使用我使用的事件存储，请记住它不适合生产，并且它需要在数据库或类似的地方持久化消息，才能被认为是生产就绪的。
- en: Summary
  id: totrans-168
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored the concept of Streamable HTTP and how it differs
    from SSE. We learned that streaming allows for real-time data transmission, which
    is beneficial for applications that require immediate access to data, such as
    live events or large files.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了可流式 HTTP 的概念以及它与 SSE 的区别。我们了解到流式传输允许实时数据传输，这对于需要立即访问数据的程序很有益，例如现场活动或大文件。
- en: Additionally, we implemented an MCP server that supports Streamable HTTP and
    demonstrated how to consume streaming data using the MCP SDK. We also discussed
    the importance of notifications in providing real-time updates to clients and
    how to handle them effectively.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还实现了一个支持可流式 HTTP 的 MCP 服务器，并演示了如何使用 MCP SDK 消费流式数据。我们还讨论了通知在向客户端提供实时更新中的重要性以及如何有效地处理它们。
- en: In the next chapter, we’ll explain how you can use a low-level server API, as
    there are some use cases where you might want to do that.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将解释如何使用低级服务器 API，因为有些用例你可能想要这样做。
- en: Assignment
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 作业
- en: 'For this assignment, we’ll again focus on e-commerce. Imagine you have CSV
    files on the server that need processing. Processing happens when all CSV files
    on a server are sent one by one as input to a web API. The idea is that this process
    will be kicked off by calling a tool. Imagine the following program output:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个作业，我们再次关注电子商务。想象一下，服务器上有需要处理的 CSV 文件。处理发生在服务器上的所有 CSV 文件逐个作为输入发送到 Web API
    时。这个想法是这个过程将通过调用一个工具来启动。想象以下程序输出：
- en: '[PRE24]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The point of this assignment is to learn how to use notifications. The files
    can be a list of in-memory entries that get removed as they’re processed. You
    will need to create both a server, where the files to process are, and a client
    that can process input commands.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 本作业的目的是学习如何使用通知。文件可以是内存中的条目列表，在处理时会移除。您需要创建一个服务器，其中包含要处理的文件，以及一个可以处理输入命令的客户端。
