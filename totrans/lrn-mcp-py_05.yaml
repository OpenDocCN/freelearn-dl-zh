    /main/Chapter05/solutions/README.md)."
  prefs: []
  type: TYPE_NORMAL
- en: Quiz
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What is the primary benefit of using Streamable HTTP?
  prefs: []
  type: TYPE_NORMAL
- en: 'A: It allows for faster access to data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'B: It requires fewer server resources'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'C: It is more secure than other protocols'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How does Streamable HTTP differ from SSE?
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Streamable HTTP uses a text-based format, while SSE uses JSON.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'B: Streamable HTTP can send binary data, while SSE is limited to text.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'C: Streamable HTTP is unidirectional, while SSE is bidirectional.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: "You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter05/solutions/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/C\uFEFF\
    hapter05/so\uFEFFlutions/solution-quiz.md)."
  prefs: []
