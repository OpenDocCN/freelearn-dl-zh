- en: 'Let’s break down this code:'
  prefs: []
  type: TYPE_NORMAL
- en: We start by creating a session store that will help store and retrieve messages.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, we create a session manager that controls the access to the store of the
    `StreamableHTTPSessionManager` type.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We start the session manager and create the web server with the appropriate
    lifespan handler.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, we create the web server and assign the lifespan handler.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There, everything is set up, and any client can now connect to the server and
    start a session.
  prefs: []
  type: TYPE_NORMAL
- en: Okay, now that we understand a bit more about how resumability can really improve
    the user experience, as the client can get messages where they were when the disconnect
    happened, let’s talk about another concept, namely, notifications.
  prefs: []
  type: TYPE_NORMAL
- en: Notifications
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Notifications** are not a concept unique to Streamable HTTP but can also
    be used in SSE. However, paired with resumability, they suddenly become very powerful.
    Let’s describe what they are first and then discuss how they relate to resumability.'
  prefs: []
  type: TYPE_NORMAL
- en: Notifications come in many different forms to communicate that something important
    has happened. They are real-time updates and, for the sake of the SDK, are handled
    as a separate thing. That means the SDK provides a special way to listen to notifications
    by implementing a handler for them, as you will soon see.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some scenarios where notifications make sense:'
  prefs: []
  type: TYPE_NORMAL
- en: Status updates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Progress notifications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Error messages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Informational messages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For example, the final message sent from the client to the server is a notification
    called `notifications/initialized` and signals that the client and the server
    can exchange non-handshake messages and more normal operations such as listing
    tools, reading a resource, and so on. The following is the JSON-RPC shape of the
    `notifications/initialized` message:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Producing a notification
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How do we produce a notification? Well, a notification is nothing more than
    a JSON-RPC message, and your SDK usually has a dedicated method to make it easier
    to send notifications. As there are different types of notifications, it’s more
    a matter of using the right method with the appropriate parameters.
  prefs: []
  type: TYPE_NORMAL
- en: 'To produce a notification, we need a reference to the context object, which
    we can add as an input parameter in our tool, for example. Once we have that reference,
    we can call specific notification methods such as `debug`, `info`, `warning`,
    and `error`. Each method has its own purpose, such as sending debug info, informational
    messages, warning messages, and error messages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: In this code, the `echo` tool will produce four different notifications and
    a final result.
  prefs: []
  type: TYPE_NORMAL
- en: Handling a notification
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When you consume notifications as a client, they show up in a different place
    than where you would normally expect them. Instead of being part of the regular
    message flow, they are handled separately with their own callbacks:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'In this client, we do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Define the message handler; the handler is capable of taking different types
    of messages and processing them accordingly.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create the client session and assign a message handler to the `message_handler`
    property.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We also observe that normal feature responses, such as calling a tool or reading
    a resource, are handled the normal way, whereas notifications are dealt with via
    the message handler, `message_handler`.
  prefs: []
  type: TYPE_NORMAL
- en: Notifications in the Inspector tool
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Great, now that we have a sense for how to set up sending notifications and
    receiving them, let’s see how notifications appear in our Inspector tool, as we
    need to learn to look for them in the right place.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you start the Inspector tool in a visual mode, you will see a screen like
