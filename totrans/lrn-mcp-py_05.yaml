  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.2 – 检查器工具](img/B34121_05_2.png)'
- en: Figure 5.2 – Inspector tool
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.2 – 检查器工具
