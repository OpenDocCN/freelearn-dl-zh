- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Streamable HTTP
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In *Chapter 4*, we discussed building MCP servers with the **Server-Sent Events**
    (**SSE**) transport. In that chapter, you learned that if you want users to access
    your MCP server on the web, you can’t use STDIO, but instead you need to use a
    transport such as SSE or, as described in this chapter, Streamable HTTP.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'So, in this chapter, you will learn about the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: The Streamable HTTP transport
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why this transport should be used over SSE
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to work with concepts such as notifications and resumability
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The chapter covers the following topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Streamable HTTP versus SSE, and why it is the new standard
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Streamable HTTP in MCP
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Resumability
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notifications
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating and testing a server with Streamable HTTP
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing the server
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing resumability
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Streamable HTTP versus SSE, and why it is the new standard
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The differences between SSE and Streamable HTTP are important to understand
    when choosing the right technology for your application.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: There are some key distinctions. The first reason is that SSE in MCP is considered
    **deprecated**; you should be using Streamable HTTP instead.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: So, why is there a chapter called *SSE* in this book? The reason is that this
    book is written for you as both a developer of MCP servers and also as a consumer
    of servers, where you might be writing a client toward an existing server that
    might be using SSE. In short, you should know how to deal with both types of transport
    due to there being legacy code that you might be asked to work with. In fact,
    the article at [https://github.com/modelcontextprotocol/modelcontextprotocol/discussions/308](https://github.com/modelcontextprotocol/modelcontextprotocol/discussions/308)
    states that 20 reference servers, over 50 official integrations, and 186 community-developed
    servers and clients were using SSE when it was announced that it was deprecated.
    This means when you develop for MCP, ensure you keep in mind that you need to
    handle both SSE and Streamable HTTP, even if you develop new servers in Streamable
    HTTP.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'Okay, but why the deprecation decision? Well, there are several reasons why
    Streamable HTTP is a better choice:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '**Single endpoint simplicity**: Clients and servers communicate via a single
    endpoint (e.g., `/mcp`), supporting both `POST` and `GET` methods. This simplifies
    implementation and reduces connection overhead.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resumability support**: Streamable HTTP supports resumable sessions using
    headers such as `Last-Event-ID` and `Mcp-Session-ID`, allowing clients to reconnect
    and resume streams reliably. This is a powerful feature where, when clients lose
    connection, they can resume connection and start receiving data from where they
    were before the disconnect rather than starting from the beginning.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Better compatibility**: It works seamlessly with modern HTTP infrastructure—load
    balancers, proxies, and API gateways—where SSE often fails or requires workarounds.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bidirectional communication**: While SSE is unidirectional, Streamable HTTP
    can be upgraded to support bidirectional flows, making it more versatile for agent-to-agent
    or client-server interactions.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双向通信**：虽然SSE是单向的，但可流式HTTP可以升级以支持双向流，使其在代理到代理或客户端到服务器交互中更加灵活。'
- en: '**Future-proofing**: Streamable HTTP aligns with evolving MCP standards and
    community best practices. It’s modular, extensible, and designed for stateless
    or session-based models. Stateless servers are more lightweight and easier to
    construct, and being able to choose the right model for the right scenario is
    a compelling argument.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未来兼容性**：可流式HTTP与不断发展的MCP标准和社区最佳实践保持一致。它是模块化的、可扩展的，并设计用于无状态或基于会话的模型。无状态服务器更轻量级且更容易构建，能够根据不同场景选择合适的模型是一个有说服力的论点。'
- en: Streamable HTTP in MCP
  id: totrans-25
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: MCP中的可流式HTTP
- en: 'Okay, so normally when we’re talking about streaming, some of you might think
    of how you divide up files in chunks or how you have AI models return their response
    in smaller parts. However, in the context of MCP, streaming is more about how
    we transmit data over HTTP while following the *streamable* standard, meaning
    that clients using Streamable HTTP typically send the following `Accept` header:
    `Accept: application/json, text/event-stream`.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '好的，通常当我们谈论流式传输时，有些人可能会想到如何将文件分成块，或者AI模型如何以更小的部分返回其响应。然而，在MCP的上下文中，流式传输更多地关乎我们在遵循**可流式**标准的同时如何通过HTTP传输数据，这意味着使用可流式HTTP的客户端通常发送以下`Accept`头信息：`Accept:
    application/json, text/event-stream`。'
- en: This tells the server the client can handle both batch JSON responses and streamed
    events (via SSE). The server can choose the appropriate response mode based on
    the request type and context.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉服务器客户端可以处理批量JSON响应和流式事件（通过SSE）。服务器可以根据请求类型和上下文选择适当响应模式。
- en: Is that it, streaming that just sends simple responses? There’s a bit more to
    it, namely, resumability.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是全部的流式传输，只是发送简单的响应吗？其实还有更多，特别是可恢复性。
- en: Resumability
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 可恢复性
- en: '**Resumability** is a concept that means that, if a client loses connection
    with a server while data is being transferred, upon reconnecting with the server,
    it can resume the data exchange where it was, rather than starting from the beginning.
    For long-running operations, this can be a game-changer. Technically, resumability
    can be achieved by both SSE and Streamable HTTP, but within the context of the
    MCP protocol, it’s only supported for Streamable HTTP.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**可恢复性**是一个概念，意味着如果客户端在数据传输过程中与服务器断开连接，在重新连接到服务器后，它可以从上次断开的地方恢复数据交换，而不是从头开始。对于长时间运行的操作，这可能会带来变革。技术上，可恢复性可以通过SSE和可流式HTTP实现，但在MCP协议的上下文中，它仅支持可流式HTTP。'
- en: 'Let’s illustrate it with a diagram:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个图例来说明：
- en: '![Figure 5.1 – Resumability](img/B34121_05_1.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图5.1 – 可恢复性](img/B34121_05_1.png)'
- en: Figure 5.1 – Resumability
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1 – 可恢复性
- en: As you can see from the preceding diagram, the client doesn’t have to restart
    from the beginning but can resume where they were. This works because the client,
    upon reconnecting, sends `mcp-session-id` and `last-event-id` headers. It’s important
    to note that upon disconnecting, the client needs to do so gracefully, so it stores
    these two headers for later use.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如前图所示，客户端不必从头开始，而可以从中断的地方恢复。这是因为客户端在重新连接时发送`mcp-session-id`和`last-event-id`头信息。需要注意的是，在断开连接时，客户端需要优雅地断开，因此它存储这两个头信息以备后用。
- en: 'What needs to be done on the server side to support this, though? Well, the
    server needs to do the following for resumability to work:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 那么服务器端需要做些什么来支持这一点呢？嗯，为了使可恢复性工作，服务器需要执行以下操作：
- en: Create a session store, which is where produced messages are placed.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个会话存储，这是放置生成消息的地方。
- en: 'Set up a middleware that handles incoming requests and outgoing responses to
    ensure messages are properly stored and can be retrieved for resuming sessions.
    Exactly how this happens differs between frameworks:'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置一个中间件来处理传入请求和传出响应，以确保消息被正确存储并且可以用于恢复会话。具体如何实现这取决于不同的框架：
- en: '[PRE0]'
  id: totrans-38
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
