- en: Notifications with resumability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we said before, notifications can be sent with SSE and Streamable HTTP, but
    with the latter, it becomes extra important. Imagine you have a client that disconnects
    a number of times due to a spotty internet connection, but thanks to logic in
    the client performing reconnects and resumability support in the server, the end
    user still has a good experience, as they won’t miss out on either notifications
    or normal messages, such as a tool response, for example.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s move on to creating a server.
  prefs: []
  type: TYPE_NORMAL
