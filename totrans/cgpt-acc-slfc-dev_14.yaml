    user story that does not meet the INVEST criteria, iteratively decompose the user
    stories until they do meet the INVEST criteria. These stories should cover adding
    a “Feedback” button to the Snowflake Lightning Web Component on the account page,
    developing a Flow-based wizard that allows the user to enter feedback about what
    Snowflake information is incorrect, calling an Apex Call Out to send the feedback
    to Snowflake, and the Apex Call Out.4\. Feedback mechanism for incorrect Snowflake
    information:'
