  type: TYPE_NORMAL
  zh: '| **提示** | 请为以下史诗编写用户故事。对于每个不符合INVEST标准的用户故事，迭代分解用户故事，直到它们符合INVEST标准。这些故事应涵盖在账户页面的Snowflake
