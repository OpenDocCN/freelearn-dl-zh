  - PREF_UL
  type: TYPE_NORMAL
  zh: 假设销售代表在账户页面上点击了“生成报告”按钮
- en: When the button is clicked
  id: totrans-398
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当点击按钮时
- en: Then the system should invoke the parameterized report, populating it with the
    specific account and Snowflake information
  id: totrans-399
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，系统应调用参数化报告，并用特定账户和Snowflake信息填充它
- en: '|'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '|  | User story 4 – enable report export options:'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: '|  | 用户故事 4 – 启用报告导出选项：'
- en: 'Goal: As a sales rep, I want the ability to export the generated report in
    various formats (for example, PDF and Excel) so that I can share or archive the
    information as needed'
  id: totrans-402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标：作为一名销售代表，我希望能够以各种格式（例如，PDF和Excel）导出生成的报告，以便我能够根据需要共享或存档信息
- en: 'Acceptance criteria:'
  id: totrans-403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接受标准：
- en: Given a sales rep has generated a report for a specific account
