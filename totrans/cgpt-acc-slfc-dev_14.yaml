- en: User stories
  id: totrans-146
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用户故事
- en: ChatGPT works best when used as a writing partner. Do not try to write a perfect
    prompt the first time. Leave some possibilities open and allow ChatGPT to make
    suggestions. **Large language models** (**LLMs**) are, at their core, prediction
    machines. Start the process of creating user stories from epics by allowing ChatGPT
    some freedom to predict what might work.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 在用作写作伙伴时效果最佳。不要试图第一次就写出一个完美的提示。留下一些可能性，并允许 ChatGPT 提出建议。**大型语言模型**（**LLMs**）本质上都是预测机器。通过允许
    ChatGPT 一定的预测自由度，从史诗创建用户故事的过程就可以开始了。
- en: 'Before we start working on the user stories, let’s define the user story structure
    that will be used:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始撰写用户故事之前，让我们定义将要使用的用户故事结构：
- en: '| **Prompt** | In a well-structured agile user story, the narrative typically
    begins with a clear statement of the goal, following the pattern “As a [user type],
    I want [an action] so that [benefit/value].” The simplicity of this format aids
    in aligning the development work with user needs and business goals. Alongside
    the story, the acceptance criteria define the specific conditions that the functionality
    must satisfy to be accepted by the stakeholder. Here, employing the Gherkin syntax
    elevates the precision and readability of the criteria. Written in a natural,
    business-readable language, the Gherkin syntax follows a “Given-When-Then” pattern:
    “Given [a context], When [an action is carried out], Then [a set of observable
    consequences should occur].” Please follow this process when writing user stories
    from epics.Please do not write a response attempting to “answer” my prompt; simply
    ingest the materials and prepare to be asked to write user stories. |'
  id: totrans-149
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 在一个结构良好的敏捷用户故事中，叙述通常从一个清晰的目标陈述开始，遵循“作为 [用户类型]，我想 [一个动作] 以便 [好处/价值]”的模式。这种格式的简单性有助于将开发工作与用户需求和商业目标对齐。与故事一起，验收标准定义了功能必须满足的特定条件，以便得到利益相关者的接受。在这里，采用
    Gherkin 语法提高了标准的精确性和可读性。用自然、可读的商业语言编写的 Gherkin 语法遵循“Given-When-Then”模式：“Given
    [一个上下文]，When [执行一个动作]，Then [应发生一系列可观察的结果]。”请按照此过程从史诗撰写用户故事。请不要写一个试图“回答”我的提示的响应；只需吸收这些材料，并准备被要求撰写用户故事。
    |'
- en: '| **Response** | Understood. I have taken note of your guidelines for structuring
    user stories and employing the Gherkin syntax for defining acceptance criteria.
    I am prepared to assist with writing user stories as and when you require. Feel
    free to proceed with your next inquiry. |'
  id: totrans-150
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 已理解。我已记录下您关于构建用户故事和采用 Gherkin 语法定义验收标准的指南。我随时准备协助您撰写用户故事。请随意继续您的下一个查询。
    |'
- en: Let’s briefly touch on the process of decomposing user stories from **Level
    1** (**L1** – high level) to the level where they can be groomed, estimated, and
    scheduled for development.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要地谈谈从 **Level 1**（**L1** – 高级）到可以整理、估算和为开发排期的级别的用户故事分解过程。
- en: Decomposing user stories
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用户故事分解
- en: 'When writing user stories from epics, it is important to understand the process
    of decomposing user stories from L1 to a level where they become actionable:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 从史诗撰写用户故事时，理解从 L1 到可操作级别的用户故事分解过程非常重要：
- en: '**Level 1** (**L1**): These are high-level user stories that often encapsulate
    the broad vision or strategic goals of a project. L1s are mainly oriented toward
    understanding the customer’s major needs or the overall business objective.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Level 1**（**L1**）：这些是高级用户故事，通常封装了项目的广泛愿景或战略目标。L1 主要面向理解客户的主要需求或整体商业目标。'
- en: '**Level 2** (**L2**): This level further decomposes L1s into more detailed
    functionalities or features. L2s describe significant functionalities that must
    be implemented to fulfill the strategic goals, yet may not be detailed enough
    for development.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第2级**（**L2**）：这一级别将L1进一步分解为更详细的功能或特性。L2描述了必须实现以实现战略目标的重要功能，但可能不足以进行开发。'
- en: '**Level 3** (**L3**): These stories break down L2s into finer details. L3s
    are closer to the actual development stage, with enough detail to understand the
    specific requirements, but may still need further refinement.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第3级**（**L3**）：这些故事将L2分解为更详细的细节。L3更接近实际开发阶段，有足够的细节来理解具体需求，但仍可能需要进一步细化。'
- en: '**Level 4** (**L4**): L4s are the most granular level of user stories, ready
    for the development stage. They include all the necessary details and acceptance
    criteria, and they are small enough to be tackled within a single iteration or
    sprint.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第4级**（**L4**）：L4是用户故事中最细粒度的一级，已准备好进入开发阶段。它们包括所有必要的细节和验收标准，并且足够小，可以在单个迭代或冲刺内完成。'
- en: The decomposition process takes a top-down approach. Starting from L1, each
    level is dissected into the next, focusing on more granular details. From L1 to
    L2, the broad vision is translated into key functionalities or feature sets. From
    L2 to L3, these functionalities are further detailed into specific requirements.
    The decomposition from L3 to L4 refines these requirements into actionable user
    stories, complete with acceptance criteria, estimates, and all the necessary details
    for coding and testing.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 分解过程采用自上而下的方法。从L1开始，每个级别都被分解到下一个级别，关注更细粒度的细节。从L1到L2，广泛的愿景被转化为关键功能或功能集。从L2到L3，这些功能被进一步细化到具体需求。从L3到L4的分解将这些需求细化成可操作的用户故事，包括验收标准、估计值以及编码和测试所需的全部必要细节。
- en: Determining when a user story has been decomposed enough for grooming for development
    is a crucial part of the process. A user story is considered ready when it is
    concise and clear, includes well-defined acceptance criteria, and is small enough
    to be implemented within a sprint. One way to determine this is to apply the **Independent**,
    **Negotiable**, **Valuable**, **Estimable**, **Small**, and **Testable** (**INVEST**)
    criteria.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 确定用户故事是否已经分解到足够细的程度以便进行开发梳理是流程中的关键部分。一个用户故事被认为是准备就绪的，当它是简洁明了的，包含明确的验收标准，并且足够小，可以在一个冲刺周期内实现。确定这一点的其中一种方法是应用**独立**、**可协商**、**有价值**、**可估计**、**小**和**可测试**（**INVEST**）标准。
- en: With ChatGPT prepared to write user stories, let’s get started.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT准备好编写用户故事后，让我们开始吧。
