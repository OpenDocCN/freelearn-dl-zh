  zh: 让我们考虑这个方面的提示：
- en: '| **Prompt** | Please write the user stories for the following epic. For each
    user story that does not meet the INVEST criteria, iteratively decompose the user
    stories until they do meet the INVEST criteria. These stories should cover adding
    an “Email” button to the Snowflake Lightning Web Component on the account page,
    developing a Flow-based wizard that prompts the user to select a contact to send
    the email to, and giving the user the ability to edit the email subject and body
    before sending it. |'
  id: totrans-267
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 请为以下史诗编写用户故事。对于每个不符合INVEST标准的用户故事，迭代分解用户故事，直到它们符合INVEST标准。这些故事应涵盖在账户页面的Snowflake
    Lightning Web组件中添加“电子邮件”按钮，开发基于流的向导，提示用户选择发送电子邮件的联系人，以及在使用前允许用户编辑电子邮件主题和正文。 |'
- en: '| **Response** | Certainly! Let’s break down the epic into user stories that
    cover the requirements and meet the INVEST criteria.User story 1 – add an “Email”
    button to the Snowflake Lightning Web Component:'
