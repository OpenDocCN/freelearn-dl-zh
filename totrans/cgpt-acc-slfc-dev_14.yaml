  type: TYPE_NORMAL
  zh: 用户故事3 – 在Snowflake部分显示产品分析：
- en: '**Goal**: As a sales rep, I want to see products quoted but not purchased,
    as analyzed by Snowflake within the “Snowflake” section, so that I can understand
    opportunities for up-selling or cross-selling'
  id: totrans-580
  prefs:
