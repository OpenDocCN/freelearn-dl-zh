- en: 'Goal: As a sales rep, I want to be notified if there’s an error in generating
    or exporting the report so that I am aware of any issues that might occur'
  id: totrans-408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标：作为一名销售代表，如果生成或导出报告时出现错误，我希望得到通知，以便我了解可能发生的任何问题
- en: 'Acceptance criteria:'
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接受标准：
- en: Given a sales rep has invoked the report generation
  id: totrans-410
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假设销售代表已调用报告生成
- en: When there’s an error in generating or exporting the report
  id: totrans-411
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
