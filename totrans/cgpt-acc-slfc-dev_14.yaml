  type: TYPE_NORMAL
  zh: '**目标**：作为一名销售代表，我希望看到Snowflake在“Snowflake”部分分析的产品报价但未购买的情况，以便我了解提升销售或交叉销售的机会'
- en: '**Acceptance criteria**:'
  id: totrans-581
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验收标准**:'
- en: '**Given** a sales rep is viewing the “Snowflake” section'
  id: totrans-582
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**一名销售代表正在查看“Snowflake”部分'
- en: '**When** the product analysis data is retrieved from Snowflake'
  id: totrans-583
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**从Snowflake检索产品分析数据时'
- en: '**Then** the analysis should be displayed in a dedicated text field'
  id: totrans-584
