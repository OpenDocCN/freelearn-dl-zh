  zh: '**然后**该部分的布局应具有视觉吸引力和直观性'
- en: 'User story 2 – display billing history in the Snowflake section:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 用户故事2 – 在Snowflake部分显示账单历史：
- en: '**Goal**: As a sales rep, I want to see the billing and payment history analysis
    from Snowflake within the “Snowflake” section so that I can understand the account’s
    financial status'
  id: totrans-574
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为一名销售代表，我希望在“Snowflake”部分看到来自Snowflake的账单和支付历史分析，以便我了解账户的财务状况'
- en: '**Acceptance criteria**:'
  id: totrans-575
  prefs:
