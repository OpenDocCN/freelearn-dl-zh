- en: '14'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What You’ve Learned and What’s Next
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this concluding chapter, we aim to summarize and reflect on the key insights
    you’ve acquired throughout this book. This chapter is organized into three main
    sections that cover various aspects of working with generative AI, such as ChatGPT,
    in the context of Salesforce and IT development.
  prefs: []
  type: TYPE_NORMAL
- en: The first part of this chapter reviews how to effectively engage with ChatGPT
    as a tool within the Salesforce environment. This includes treating ChatGPT as
    a knowledgeable partner in the development process, understanding its capabilities,
    and applying it across all stages of project activities. Whether it’s assisting
    with documentation, design, grooming, development, or testing, we’ll outline the
    practical ways in which ChatGPT can be utilized, and provide guidance on how to
    leverage it when challenges arise.
  prefs: []
  type: TYPE_NORMAL
- en: The middle section takes a closer look at the current state of generative AI
    and its impact on IT development. This includes an examination of the latest technological
    developments, current best practices, and existing challenges. The focus here
    is on the practical applications of AI in IT, the trends shaping the industry,
    and the lessons that can be drawn from contemporary use cases.
  prefs: []
  type: TYPE_NORMAL
- en: In the final part of this chapter, we’ll consider the future of IT development
    concerning generative AI. This will involve us exploring potential developments,
    considering the ethical implications, and identifying areas for growth and innovation.
    The emphasis will be on informed predictions and thoughtful analysis, rather than
    speculative claims.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, this chapter serves as both a recap of the learning journey and an
    exploration of the paths that lie ahead. It intends to provide a clear, grounded
    understanding of where we are now, and what the future may hold for integrating
    generative AI into the complex and ever-evolving landscape of IT development.
  prefs: []
  type: TYPE_NORMAL
- en: A journey recapped
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Across this book, a handful of points have been made again and again:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Use ChatGPT across the project life cycle**: ChatGPT’s application spans
    various project activities, including documentation, design, grooming, development,
    and testing within Salesforce projects. Developers should utilize it for drafting
    technical documents, modeling designs, aiding in requirement analysis, code development,
    and testing automation. This multifaceted engagement enables efficient project
    execution and quality enhancement.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explore design alternatives with ChatGPT**: ChatGPT should be used to explore
    various design alternatives for Salesforce projects, including the evaluation
    of different options, their implications, and alignment with business needs. By
    engaging in detailed dialogues and posing complex queries, developers can leverage
    ChatGPT’s capabilities to analyze and compare different solutions, ensuring a
    comprehensive consideration of the project requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Utilize ChatGPT as a partner**: Salesforce developers should treat ChatGPT
    as a partner with extensive knowledge of the Salesforce ecosystem. During the
    development process, ChatGPT should be consulted for code reviews, suggestions
    on scalability, and troubleshooting complex challenges. This collaborative model
    fosters a dynamic environment for innovation and problem-solving.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Seek guidance from ChatGPT when you’re stuck**: When faced with challenges
    or roadblocks, Salesforce developers should turn to ChatGPT for assistance in
    crafting prompts or generating solutions. By articulating the problem and seeking
    guided exploration, developers should be able to tap into ChatGPT’s analytical
    capabilities to break down complex issues and derive actionable insights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Avoid making assumptions about ChatGPT’s limitations**: Developers should
    approach ChatGPT with an open mind and not make assumptions about what it cannot
    do. By engaging in iterative and exploratory dialogues, developers will discover
    new ways to leverage ChatGPT’s capabilities in the Salesforce context, even in
    complex scenarios. This open exploration promotes a more nuanced understanding
    and utilization of generative AI in Salesforce development.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Balance ChatGPT’s assistance with human oversight**: While ChatGPT acts as
    a valuable partner and accelerator, its collaboration with human experts, especially
    senior developers or architects, remains vital. Developers must recognize that
    ChatGPT can greatly aid the development process, but human judgment, creativity,
    and critical thinking are still needed, particularly in intricate design decisions
    that may require user stories and requirements to be revisited.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By focusing on these aspects, Salesforce developers can enhance their collaboration
    with ChatGPT, leveraging it as a powerful tool that complements human intelligence
    across various stages of project development. The synthesis of AI-driven insights
    with human creativity and judgment creates a process that fosters innovation,
    efficiency, and growth within the Salesforce landscape.
  prefs: []
  type: TYPE_NORMAL
- en: The current landscape of generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The current state of generative AI in software development represents a significant
    evolution in automating and enhancing various aspects of the development life
    cycle. One of the key areas where generative AI has made a substantial impact
    is code generation and automation. These models can generate code snippets, templates,
    and even entire classes or functions by understanding the contextual requirements
    provided by developers. They can create code in multiple languages, aligning with
    coding standards and best practices, thus speeding up the development process
    and reducing common errors.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, developers are engaging with AI models as virtual pair programmers,
    assisting in code reviews, proposing alternative solutions, and aiding in debugging.
    This integration of AI into the development process fosters a dynamic and responsive
    environment that encourages exploration and innovation. The automation of testing
    scenarios and the generation of test cases is another exciting application. AI
    can analyze the code base and requirements to create extensive test suites, ensuring
    early identification of bugs and freeing human resources for more complex tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI is also becoming a valuable tool for personalized learning and
    skill development, providing tailored examples and guidance that adapt to individual
    needs and competencies. This facet of AI has implications for continuous learning,
    whether you’re mastering new programming languages or complex algorithms. Another
    notable trend is the integration of AI into existing development tools and platforms,
    from IDE plugins to CI/CD pipelines, offering contextual assistance right where
    developers need it.
  prefs: []
  type: TYPE_NORMAL
- en: The advancement of generative AI in software development is not without its
    challenges. Ethical considerations and human oversight are vital to ensure compliance
    with legal, security, and ethical standards. Striking the right balance between
    automation and human creativity remains a nuanced challenge. The current state
    of generative AI in software development is marked by transformative changes that
    are reshaping traditional development paradigms. The collaboration between human
    intelligence and AI, which is guided by ethical considerations, remains central
    to unlocking the full potential of this technology, promising efficiency, quality
    improvements, creativity, exploration, and personalized growth for developers.
  prefs: []
  type: TYPE_NORMAL
- en: Conjectures on generative AI’s evolution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the coming years, generative AI is expected to significantly impact the software
    development landscape, transforming the way developers work, collaborate, and
    innovate. Enhanced productivity will be within reach as AI takes on routine coding
    tasks, freeing developers to focus on complex problems and creative solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Learning and professional growth are poised to become more adaptive and personalized.
    Generative AI will offer guidance tailored to individual needs and industry trends,
    bridging the gaps between novice and expert, theory and practice.
  prefs: []
  type: TYPE_NORMAL
- en: Intelligent and adaptive development environments will emerge as powerful allies
    for developers. These environments will understand the coding context, predict
    potential challenges, and offer solutions proactively, facilitating a more efficient
    development process.
  prefs: []
  type: TYPE_NORMAL
- en: The domain of automated testing and quality assurance will be revolutionized
    by AI’s ability to craft precise test cases and guard the quality of code. The
    relentless pursuit of perfection in code quality will be enabled by intelligent
    automation, with AI acting as both the creator and reviewer.
  prefs: []
  type: TYPE_NORMAL
- en: The ethical integration of AI will be a critical challenge, demanding responsible
    practices that ensure transparency, accountability, and trust. As AI takes on
    a more prominent role, ethical considerations will become paramount, shaping the
    frameworks within which AI operates.
  prefs: []
  type: TYPE_NORMAL
- en: Collaboration will transcend borders and barriers as AI enables a global community
    of developers to work together seamlessly. Open source innovation and real-time
    collaboration will become defining features of the new development ecosystem,
    enriched by diverse perspectives and collective wisdom.
  prefs: []
  type: TYPE_NORMAL
- en: Security in software development will be bolstered by AI’s precise and vigilant
    mechanisms. The proactive identification of vulnerabilities and implementation
    of robust defenses will reinforce the trustworthiness of digital systems.
  prefs: []
  type: TYPE_NORMAL
- en: Strategic alignment with business goals will become more dynamic and responsive
    as AI supports real-time analysis and predictive modeling. This alignment will
    enable organizations to not only react to market changes but to anticipate and
    shape the future, aligning technology with strategic objectives.
  prefs: []
  type: TYPE_NORMAL
- en: The integration of generative AI into software development over the next 5 years
    is poised to reshape the field. From enhancing productivity to fostering collaboration
    and ensuring quality, the impact of AI will be profound but must be navigated
    with care and consideration regarding ethical, human, and business factors. The
    future promises a more efficient, responsive, and creative development landscape,
    guided by the intelligent and responsible use of AI technology.
  prefs: []
  type: TYPE_NORMAL
- en: The future of Salesforce development with generative AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: “*In the vibrant cityscape of 2029, Sarah begins her day like many Salesforce
    developers of her generation, with a friendly greeting to her personal AI* *companion,
    AIDEN.*
  prefs: []
  type: TYPE_NORMAL
- en: '*“Good morning, AIDEN. Let’s plan our day,” Sarah says, her voice filled with
    the anticipation of another* *exciting workday.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Of course, Sarah! Your work AI assistant, CORA, just messaged me about a
    priority task to make an update to the CRM system. Would you like to start with
    that?” AIDEN responds, their voice cheerful* *and helpful.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*With a nod, Sarah heads to her workspace, a comfortable blend of ergonomic
    design and cutting-edge technology. The commute to work is a thing of the past;
    her home office is seamlessly connected to all the corporate systems through*
    *AI interfaces.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Once settled, Sarah activates CORA, her work AI assistant, who immediately
    coordinates with AIDEN to ensure a smooth transition. “CORA, let’s review that
    task. And please bring in FREDDY, the AI from Finance, and MIRA from Supply Chain.
    We’ll need* *their insights.”*'
  prefs: []
  type: TYPE_NORMAL
- en: '*As the developer’s day unfolds, the lines between human and AI interaction
    blur. Each system’s AI embodies specific roles and characteristics, from the assertive
    FREDDY in Finance to the meticulous MIRA in Supply Chain. They aren’t mere tools
    but partners, each possessing their own personality* *and expertise.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The morning is filled with complex problem-solving, all conducted through
    speech and natural language. Reading and writing code has become a specialized
    skill, a relic of the past that only the old-timers cling to. In this world, communication
    is key, and the AIs assist, challenge, and innovate alongside the* *human team.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Sarah’s lunch break is a collaboration with AIDEN, planning a weekend getaway,
    while CORA coordinates with the other AIs to ensure that work progress* *continues
    uninterrupted.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*In the afternoon, a creative session ensues. Sarah, CORA, and the other AIs
    brainstorm solutions to enhance the CRM system’s user experience. Their thoughts
    flow in a symphony of voices, a dynamic interplay of human intuition and* *AI-powered
    insights.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The day isn’t without its challenges. An unexpected issue in the HR system
    requires immediate attention, and LUCIA, the HR AI, joins the team. Together,
    they diagnose the problem, develop a solution, and even improve the* *system’s
    efficiency.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*A highlight of the day is the mentoring session with a junior developer, James.
    Sarah and her AI companions guide him through a complex task, the AIs acting as
    facilitators, providing resources, examples,* *and encouragement.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*As the workday concludes, Sarah reflects on the profound change in her role.
    Coding, once the core of her profession, has evolved into orchestrating a collaborative
    dance between human and AI intellects. The AIs are not just pieces of software
    but colleagues, each contributing* *unique value.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*She bids farewell to CORA and the other work AIs and spends her evening with
    AIDEN, exploring hobbies, learning new recipes, and simply enjoying a conversation
    about life* *and technology.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The future of Salesforce development, as envisioned in Sarah’s world, is an
    inspiring blend of humanity and technology. The AIs are more than tools; they
    are partners and friends, each with a unique presence. The tasks are not confined
    to screens and keyboards but transcend into an organic collaboration of voices,
    ideas,* *and creativity.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*In 5 years, the profession of “Salesforce Developer” will transform into something
    richer, more accessible, and filled with endless possibilities. The developer’s
    role will shift from configuration and coding to guiding intelligent, anthropomorphized
    systems, unlocking potentials that we can only begin to imagine today. The essence
    of development will become an art of communication, innovation, and empathy, a
    future where technology and humanity walk hand* *in hand.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Appendix A: Case Study'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We use a case study to tie the topics in this book together. It is a real-world
    example of a Salesforce project that requires the techniques and skills taught
    in this book.
  prefs: []
  type: TYPE_NORMAL
- en: Problem statement
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Acme Corp has recently deployed Salesforce Sales Cloud, and as part of that
    project, they created an integration with Oracle ERP. This integration keeps the
    Salesforce and Oracle ERP accounts in sync. Acme also has Snowflake in production.
    Snowflake is consuming data from multiple internal and external systems and has
    started to ramp up AI-based analytics. The Acme business leadership has asked
    the IT department to design a solution and estimate the time and cost of what
    it would take to have a **Snowflake** section on the Salesforce account pages
    that summarizes the information in Snowflake for the account, and also allows
    the sales rep to select a contact related to the account and automatically copy
    the Snowflake information to the email.
  prefs: []
  type: TYPE_NORMAL
- en: Assumptions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s look at the assumptions for this case study.
  prefs: []
  type: TYPE_NORMAL
- en: Current state
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There is an existing Sales Cloud implementation that’s currently used by sales
    reps
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Account and Contact objects are being used by sales reps
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is an existing integration between Salesforce and Oracle ERP
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No middleware is in use, so integrations are point-to-point
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No integration exists today between Salesforce and Snowflake
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Future state
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There is valuable data available within their Snowflake platform that is not
    visible to the sales reps today. The request is to update the account page to
    display the following information:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Billing and payment history analysis (Snowflake will provide a one-paragraph
    natural language summary)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Products quoted but not purchased (Snowflake will provide a one-paragraph natural
    language summary)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Customer sentiment analysis data (Snowflake will provide a three to five-paragraph
    natural language summary)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Industry and market trends that are impacting the account (Snowflake will provide
    a three to five-paragraph natural language summary)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Recent news and events related to the customer (Snowflake will provide a three
    to five-paragraph natural language summary)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The sales rep can click on a button saying that the information from Snowflake
    is incorrect, provide a written explanation, and click a button to send the explanation
    back to Snowflake.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The sales rep can click on a button to post a summary of the account and Snowflake
    information to Slack, add commentary, and then post it to Slack.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The sales rep can run a report with a summary of the account and Snowflake information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With the problem statement and assumptions defined, let’s start by working with
    ChatGPT to define and write the epics.
  prefs: []
  type: TYPE_NORMAL
- en: Creating epics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The first step is to have ChatGPT digest the problem statement and assumptions:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | I am going to ask you a series of questions so that you can
    write epics and user stories for a project to integrate Salesforce and Snowflake.
    The first step is for you to ingest the problem statement and assumptions. Please
    do not write a response attempting to “answer” my prompt; simply ingest the materials
    and prepare to be asked questions.<The problem statement and assumptions mentioned
    previously> |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | Certainly! I will await your questions related to the problem
    statement and assumptions. Thank you for providing the context and setting the
    direction for our collaboration. Feel free to proceed with your inquiries when
    you are ready. |'
  prefs: []
  type: TYPE_TB
- en: 'The next step is to have ChatGPT make a first pass at writing the epics:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Please suggest the epics that capture the intent of this problem
    statement and assumptions. |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | Certainly! The situation presented by Acme Corp requires a
    thoughtful and comprehensive approach. Based on the problem statement and assumptions,
    the following epics capture the intent of the proposed enhancement to the Salesforce
    account pages, aligning with both the existing architecture and the new requirements:1\.
    Integrate Snowflake data with Salesforce account pages:'
  prefs: []
  type: TYPE_NORMAL
- en: Design and implement a point-to-point integration between Salesforce and Snowflake
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure real-time or near-real-time synchronization of account-specific data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2\. Display Snowflake information on Salesforce account pages:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a dedicated “Snowflake” section within the Salesforce account pages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide a visualization of various data points, such as billing history, product
    analysis, customer sentiment, industry trends, and recent news/events
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3\. Email functionality with Snowflake data:'
  prefs: []
  type: TYPE_NORMAL
- en: Enable sales reps to select a contact and automatically attach the Snowflake
    information summary to an email
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '4\. Feedback mechanism for incorrect Snowflake information:'
  prefs: []
  type: TYPE_NORMAL
- en: Implement a button and an input field allowing sales reps to mark information
    as incorrect and send feedback to Snowflake
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5\. Integrate the Snowflake summary with Slack:'
  prefs: []
  type: TYPE_NORMAL
- en: Design a feature enabling sales reps to post a summary of the account and Snowflake
    information to Slack, including the ability to add commentary
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6\. Provide reporting capabilities for the account and Snowflake information:'
  prefs: []
  type: TYPE_NORMAL
- en: Develop reporting functionality within Salesforce to generate summaries of the
    account and Snowflake information as required by sales reps
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '7\. Compliance, security, and performance considerations:'
  prefs: []
  type: TYPE_NORMAL
- en: Assess and address the security, performance, and compliance requirements pertinent
    to integrating and displaying Snowflake information within Salesforce
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '|  | 8\. User training and documentation:'
  prefs: []
  type: TYPE_NORMAL
- en: Develop comprehensive training materials and documentation to ensure that sales
    reps can effectively utilize the new features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These epics encapsulate a robust plan that meets the business objectives while
    also considering important technical factors such as security and performance.
    By following this framework, the IT department at Acme can work in collaboration
    with sales reps to innovate and enhance the existing Salesforce implementation,
    thus fulfilling the strategic vision articulated by the business leadership. |
  prefs: []
  type: TYPE_NORMAL
- en: Let’s analyze each of the proposed epics, review how well they match the problem
    statement and assumptions, and craft a prompt to refine the initial response.
  prefs: []
  type: TYPE_NORMAL
- en: '*1\. Integrate Snowflake data with Salesforce* *account pages*:'
  prefs: []
  type: TYPE_NORMAL
- en: Design and implement a point-to-point integration between Salesforce and Snowflake
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensure real-time or near-real-time synchronization of account-specific data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The first bullet is good, but more detail is needed. Specifically, it should
    say what the integration will do – that is, it will be used for Salesforce to
    get information about the account from Snowflake. The second bullet is not correct.
    The call will be made when a Salesforce user views the account page. Because some
    of the information provided by Snowflake can change fairly quickly, each time
    the page is viewed, another call will be made to Snowflake. For a Salesforce org
    with many users who view the same account page multiple times a day, the epic
    may have the Snowflake calls manually initiated by the users. For this example,
    however, each account page refresh will refresh the Snowflake information.
  prefs: []
  type: TYPE_NORMAL
- en: '*2\. Display Snowflake information on Salesforce* *account pages*:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a dedicated “Snowflake” section within the Salesforce account pages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide visualization of various data points, such as billing history, product
    analysis, customer sentiment, industry trends, and recent news/events
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is good. The user stories will include the details of the information to
    be displayed and how to display the information.
  prefs: []
  type: TYPE_NORMAL
- en: '*3\. Email functionality with* *Snowflake data*:'
  prefs: []
  type: TYPE_NORMAL
- en: Enable sales reps to select a contact and automatically attach the Snowflake
    information summary to an email
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is a good starting point, but the language should be updated to have the
    Snowflake information in the body of the email.
  prefs: []
  type: TYPE_NORMAL
- en: '*4\. Feedback mechanism for incorrect* *Snowflake information*:'
  prefs: []
  type: TYPE_NORMAL
- en: Implement a button and an input field allowing sales reps to mark information
    as incorrect and send feedback to Snowflake
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is good.
  prefs: []
  type: TYPE_NORMAL
- en: '*5\. Integrate the Snowflake summary* *with Slack*:'
  prefs: []
  type: TYPE_NORMAL
- en: Design a feature that enables sales reps to post a summary of the account and
    Snowflake information to Slack, including the ability to add commentary
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is good. One quirk to note about ChatGPT is that it uses the writing rule
    about using the same words to say the same thing over and over. As we can see,
    the bullets start with *Enable*, *Implement*, and *Design*. Technical writing
    should not follow this rule, but the authors have yet to figure out how to get
    ChatGPT to follow technical writing rules.
  prefs: []
  type: TYPE_NORMAL
- en: '*6\. Provide reporting capabilities for the account and* *Snowflake information*:'
  prefs: []
  type: TYPE_NORMAL
- en: Develop reporting functionality within Salesforce to generate summaries of the
    account and Snowflake information as required by sales reps
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is good.
  prefs: []
  type: TYPE_NORMAL
- en: '*7\. Compliance, security, and* *performance considerations*:'
  prefs: []
  type: TYPE_NORMAL
- en: Assess and address the security, performance, and compliance requirements pertinent
    to integrating and displaying Snowflake information within Salesforce
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are times when ChatGPT will extend/augment the provided directions. The
    problem statement didn’t include **non-functional requirements** (**NFRs**) but
    ChatGPT, quite correctly, is suggesting an epic for the needed NFRs.
  prefs: []
  type: TYPE_NORMAL
