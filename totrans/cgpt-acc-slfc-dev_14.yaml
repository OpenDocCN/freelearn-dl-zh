- en: 'Appendix B: A Deep Dive Into ChatGPT and User Stories'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: User stories have become the lingua franca of defining development on many modern
    IT projects, serving as a bridge between technical complexity and human understanding.
    They capture the essence of a requirement in a manner that is both concise and
    relatable to various stakeholders, from developers to business analysts. While
    it’s not the only way to frame prompts for generative AI tools such as ChatGPT
    to aid in development, the widespread familiarity and acceptance of user stories
    make them a logical choice for interaction. Team members and stakeholders are
    accustomed to thinking and communicating through this format, making it a coherent
    method to engage with AI as well. Recognizing this synergy, this book primarily
    focuses on using user stories as a means to articulate and translate requirements.
    This appendix provides a guide on how to utilize ChatGPT effectively to convert
    requirements into user stories, thereby maintaining a familiar and consistent
    approach to the development process.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the process
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'One of the distinctive advantages of utilizing ChatGPT in the development process
    is its ability to understand and generate content based on examples rather than
    requiring explicit instructions. In the context of translating requirements into
    user stories, this ability proves invaluable. Rather than investing time and effort
    in explaining how to structure and write user stories from given requirements,
    all that is needed is to provide ChatGPT with some illustrative examples of the
    desired outcome. The AI can then infer the underlying pattern and create user
    stories that align with the provided examples. This approach not only simplifies
    the process but also fosters a more intuitive and adaptive workflow. It allows
    developers and analysts to focus more on the content and quality of the requirements,
    knowing that the translation into user stories can be handled efficiently by AI:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | I am going to ask you to help me turn natural language requirements
    into structured user stories. The first step in this process is going to be me
    providing you with some sample user stories. Please analyze the user stories for
    both content, structure, and level of detail. Do not write a response attempting
    to “answer” my prompt, simply ingest the materials and prepare to be asked questions.
    |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | Understood. I’m prepared to analyze the user stories you provide
    for their content, structure, and level of detail. Please proceed with providing
    the sample user stories, and I will be ready to assist you with your subsequent
    questions and requests. |'
  prefs: []
  type: TYPE_TB
- en: Sample user stories
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: It’s important to recognize that ChatGPT can be tailored to craft stories in
    the specific style employed within your project. However, for cohesiveness and
    clarity in this appendix, the focus will be on generating user stories in the
    style that was demonstrated in the case study found in [*Appendix A*](B21462_Appendix_A.xhtml#_idTextAnchor205).
    This approach ensures that the examples and guidelines provided here align with
    a consistent framework, enabling you to follow along and apply the same principles
    to your unique project context, even as the methodology presented here serves
    as a foundation rather than a rigid template.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | I am going to provide you with the requirements and ask you
    to write user stories from these requirements. The first step in this process
    is to give you some sample user stories. The samples are as follows. Please ask
    any questions you have about the user stories and share your thoughts on how the
    structure and approach can be improved.User story 1 – create a Snowflake Section
    within the Salesforce account pages:'
