  type: TYPE_NORMAL
  zh: '**验收标准**:'
- en: '**Given** a sales rep is viewing the “Snowflake” section'
  id: totrans-576
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**一名销售代表正在查看“Snowflake”部分'
- en: '**When** the billing history data is retrieved from Snowflake'
