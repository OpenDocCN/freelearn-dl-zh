- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The Spectrum of LLM Adaptation for Agents: RAG to Fine-tuning'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the previous chapter, we explored the critical considerations for selecting
    and deploying LLMs, establishing them as the cognitive engines that drive the
    reasoning and decision-making capabilities of AI agents. We saw how an LLM's capacity
    for understanding, planning, and tool use is fundamental to an agent's ability
    to perform its designated functions effectively.
  prefs: []
  type: TYPE_NORMAL
- en: However, the journey to creating a truly proficient AI agent rarely ends with
    selecting a powerful, general-purpose LLM. The initial wave of generative AI focused
    on monolithic frontier models, but the landscape is evolving toward a distributed
    society of intelligent agents. To unlock business value, these agents must operate
    correctly, reliably, and optimally within a specific enterprise context, which
    requires significant adaptation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 1](img/B33147_3_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.1 – An LLM as the brain of agents (image generated with Google Imagen)
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we'll explore the techniques used to tailor these models. We'll
    begin by examining why adaptation is essential, outlining the benefits of specializing
    a generic LLM for a specific agent's role. Then, we'll introduce a hierarchical
    agentic architecture as a concrete blueprint for building advanced multi-agent
    systems. Understanding this architecture will set the stage for our core discussion
    of the practical techniques that you'll use to build and specialize agents within
    these systems, from RAG to fine-tuning and **in-context learning** (**ICL**).
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we''ll be covering the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: From generic LLMs to specialized agents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A hierarchical agentic architecture for business process automation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Contextual enhancement: enhancement with RAG (agent-focused)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tuning for agentic capabilities
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In-context learning for agent adaptation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grounding the model output
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From generic LLMs to specialized agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While pretrained LLMs possess a vast range of general skills, they are, by design,
    generalists. In contrast, enterprise idx_a46193f1agents need to be specialists,
    tailored to excel in specific domains such as finance, healthcare, or legal services.
    These domains involve unique vocabularies, complex workflows, and proprietary
    data that generic models aren't equipped to fully understand out of the box.
  prefs: []
  type: TYPE_NORMAL
- en: Another important shift is the move away from relying on a single, centralized
    LLM. We're now seeing a trend toward distributed systems composed of multiple
    agents, with each potentially powered by its own "brain." These internal models
    or LLMs can vary based on factors such as cost, performance, latency, or quality,
    and may include different modalities or architectures depending on the specific
    role of the agent. This evolution is exemplified by emerging industry practices
    often idx_7c84f8b3referred to idx_d6fe75e6as Router-Executor or Planner-Worker
    models. In this book, we formalize these concepts in *[Chapter 5](Chapter_5.xhtml#h1_101)*
    through idx_9188d037the ***Tool Routing*** and ***Supervisor Architecture*** patterns,
    and we idx_2200a1a8will explore the frameworks that support them later in the
    book.
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned, an agent's purpose is to perform focused tasks, such as ensuring
    strict compliance or conducting a risk assessment, with a level of precision and
    behavioral nuance that a general-purpose model is not optimized for.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, *adapting* *an LLM* is a critical process for bridging the gap between
    broad potential and specialized application. This tailoring is essential for transforming
    the agent's cognitive core into an expert for its designated role.
  prefs: []
  type: TYPE_NORMAL
- en: The benefits of this specialization are clear and direct. It leads to enhanced
    accuracy and relevance, as the agent learns to speak the language of its domain.
    It fosters improved reliability and trustworthiness by grounding the model and
    reducing the risk of hallucinations. Specialization also drives optimized efficiency,
    as smaller, focused models can deliver superior performance with lower latency
    and cost for specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, adaptation ensures better goal alignment, shaping the agent's behavior
    to precisely match its operational objectives and constraints.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 2](img/B33147_3_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.2 – Agent specialization: adapting agents for task-specific execution'
  prefs: []
  type: TYPE_NORMAL
- en: Successfully navigating the path from a generic LLM to a specialized intelligence
    core for an agent involves a idx_713950f6strategic selection of adaptation techniques.
    Often, it's not a matter of choosing a single method, but rather a thoughtful
    combination of strategies, carefully aligned with the agent's specific requirements
    and context, the resources available for adaptation, and the precise level of
    customization needed to ensure that it performs its role effectively and responsibly.
  prefs: []
  type: TYPE_NORMAL
- en: A thoughtful combination of adaptation strategies, carefully aligned with an
    agent's specific requirements, is necessary for successfully navigating the path
    from a generic LLM to a specialized intelligence core for that agent. We will
    transition from the foundational aspects of LLM selection to the diverse spectrum
    of techniques used to tailor these models and the agents they empower, transforming
    them into highly specialized and effective components ready for more sophisticated
    agentic tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Another maturity model for agentic AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we'll elaborate on the various levels of maturity, this time
    specifically in the context of agentic AI, tracing the journey from simple, centralized
    idx_bc5dea5emodels to complex, decentralized networks of collaborating agents.
    This spectrum helps frame why different patterns (such as ***Multi-Agent Planning***,
    ***Consensus***, ***Resource Allocation***, and ***Trust Modeling***) become essential
    as agentic systems grow in complexity and autonomy. The use of these patterns
    is intended to address specific challenges that arise at each stage of adoption
    and maturity in LLM-based and agentic applications.
  prefs: []
  type: TYPE_NORMAL
- en: In *[Chapter 1](Chapter_1.xhtml#h1_14)*, we explored the GenAI Maturity Model.
    The last two levels of that model were single- and multi-agent systems. Here we
    will expand those into their own levels of sophistication using the Agentic AI
    Maturity Model as described below.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Maturity** **l****evel** | **Description** | **Scalability** **i****nsight**
    | **Compliance** **i****nsight** | **Key** **p****atterns/****m****ethods** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1\. Basic agentic systems | Single agents handle specific, well-defined tasks
    semi-autonomously, using simple, predefined workflows and function calls to external
    APIs or tools. | Adaptable but rigid. Workflows are relatively fixed, which limits
    the potential for innovation. | Straightforward to manage as tasks are well-defined,
    minimizing the risk of policy violations. | Single-agent, single-LLM calling tools
    with function calling |'
  prefs: []
  type: TYPE_TB
- en: '| 2\. Dynamic single-agent workflows | A single agent can dynamically choose
    from idx_89343199a variety of pre-selected tools or APIs based on the problem
    at hand, allowing for more flexible problem-solving. | More versatile and efficient,
    as agents can tackle more complex problems by selecting the appropriate tools.
    | Manageable due to the pre-selection of approved tools, but requires careful
    monitoring of agent behavior as autonomy increases | Basic agentic system/single-LLM
    calling tools with dynamic tool selection |'
  prefs: []
  type: TYPE_TB
- en: '| 3\. Introspective patterns with ReAct and Reflexion | Single agents use methods
    such as ReAct and Reflexion patterns that incorporate step-by-step reasoning and
    self-reflection. This enables them to learn from their actions and self-correct
    through feedback loops. | The introduction of feedback and self-correction allows
    agents to handle more complex tasks and improve over time, creating paths for
    scalability. | Real-time monitoring and corrective mechanisms become essential
    to ensure that agents remain aligned with policies while learning. | ReAct (Reasoning
    and Action) and Reflexion |'
  prefs: []
  type: TYPE_TB
- en: '| 4\. Multi-agent systems | Multiple specialized agents collaborate to handle
    complex tasks. Each agent focuses on different, non-overlapping functions, and
    their coordination allows for parallel processing. | Ideal for high-scale environments.
    Tasks can be distributed across multiple agents, enabling efficient parallel processing
    of complex workflows. | More complex to manage. Monitoring systems are required
    to ensure that all semi-autonomous agents collaborate in ways that adhere to regulations.
    | Multi-agent systems |'
  prefs: []
  type: TYPE_TB
- en: '| 5\. Advanced multi-agent coordination with meta-agents | A "meta-agent" is
    introduced to oversee and idx_58c83494coordinate the other agents. This allows
    for dynamic task reassignment and real-time planning adjustments. | Enhanced adaptability.
    The system can scale effectively even in changing environments due to optimized
    task distribution by the meta-agent. | Meta-agents act as overseers, helping to
    maintain policy adherence by adjusting workflows and redistributing tasks as needed.
    | Meta-agent policy adherence, advanced agent coordination, and conflict resolution
    |'
  prefs: []
  type: TYPE_TB
- en: '| 6\. Self-correcting agents: Agentic workflows with feedback mechanisms for
    self-learning | Advanced multi-agent systems use complex, multi-turn feedback
    loops. Agents critique, correct, and refine one another''s outputs iteratively,
    leading to continuous process improvement. | Highly scalable with continuous improvement
    built in. These systems can evolve in real time, making them extremely efficient
    for dynamic tasks. | Most complex. Automated compliance checks and self-corrective
    actions are necessary to ensure that agents stay aligned with policies while adapting.
    | Multi-agent learning systems |'
  prefs: []
  type: TYPE_TB
- en: Table 3.1 – Agent and LLM maturity spectrum
  prefs: []
  type: TYPE_NORMAL
- en: To unlock business value for your organization or for a specific industry or
    functional area, we need to ensure that the organization operates correctly, reliably,
    and optimally within the specific enterprise context. This is only feasible if
    we are able to solve each of the problems and challenges that arise as the levels
    of complexity and sophistication increase. Models and agents often require significant
    adaptation, augmentation, guardrails, policy adherence, steering, and collaboration.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter idx_ec477cefmoves from the foundational aspects of LLM selection
    to the wide range of techniques for tailoring these models (and the agents they
    enable) into specialized, high-performing components. These agents may serve as
    atomic units that handle simple, narrowly defined tasks or operate as more complex,
    compound systems designed for sophisticated workflows.
  prefs: []
  type: TYPE_NORMAL
- en: The granularity of agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As we move toward the building of more advanced systems, a key design question
    arises: how large or granular should an agent be? Should a single agent encompass
    an entire business process, or should it idx_875c2748focus on a simple, atomic
    task as part of a larger AI orchestration?'
  prefs: []
  type: TYPE_NORMAL
- en: There is no single correct answer, as the optimal granularity depends on the
    problem. An agent can be a fine-grained, atomic unit of functionality (e.g., an
    agent whose only job is to check inventory levels) or a coarse-grained system
    that manages a compound, multi-step process (e.g., an agent orchestrating the
    entire order fulfillment process).
  prefs: []
  type: TYPE_NORMAL
- en: The architecture we will explore next provides a practical model for how these
    different granularities can coexist and collaborate effectively. As agentic systems
    evolve from simple to increasingly complex architectures, the demands on adaptation
    grow significantly, necessitating more advanced and flexible strategies to maintain
    performance, coherence, and responsiveness. We will investigate why such adaptation
    is not merely beneficial but often crucial for enhancing an agent's performance,
    its reliability, and its relevance to the tasks at hand.
  prefs: []
  type: TYPE_NORMAL
- en: Our exploration will cover methods for dynamically enriching an LLM's knowledge
    at the moment of inference through RAG, dive into the more enduring model modifications
    achieved via various fine-tuning strategies, including the increasingly popular
    PEFT approaches, and examine the flexibility of ICL for on-the-fly behavioral
    adjustments.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout this discussion, we will also underscore the vital importance of
    grounding the outputs of these adapted models to maintain accuracy and foster
    trust, a non-negotiable aspect of developing responsible and dependable agentic
    AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: A hierarchical agentic architecture for business process automation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The example we're about to show represents a significant evolution from the
    concept of a single agent navigating a flat list of tools. That monolithic approach,
    while functional for simple automation, struggles to scale and maintain clarity
    as process complexity grows. Instead, this architecture idx_7692b68cestablishes
    a structured, observable ecosystem that mirrors a well-run organization, designed
    for modularity and resilience.
  prefs: []
  type: TYPE_NORMAL
- en: At the top of idx_b6cbcff0this hierarchy are coarse-grained **o****rchestrator
    agents**. These agents function like AI conductors; their primary responsibility
    is not to execute every small step, but to understand the end-to-end business
    process and conduct the overall workflow by designing and supervising the collaboration
    between specialized agents.
  prefs: []
  type: TYPE_NORMAL
- en: To achieve the overall goal, they delegate specialized, compound tasks to a
    team of fine-grained **s****ub-****a****gents**. Each sub-agent idx_c60c50c1is
    an expert, designed and adapted to perform a specific function reliably, such
    as analyzing a document, checking compliance, or accessing a specific database.
  prefs: []
  type: TYPE_NORMAL
- en: In a hierarchical agentic architecture, a complex workflow is broken down and
    delegated to specialized agents. We can visualize this structure with a practical
    example.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 3](img/B33147_3_3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.3 – Orchestrator agent architecture
  prefs: []
  type: TYPE_NORMAL
- en: In the figure, the `NewCustomerOnboarding_Agent` acts as the orchestrator, or
    the AI conductor, responsible idx_54b4618dfor managing the end-to-end business
    process of onboarding a new customer. To achieve this high-level goal, it delegates
    specific, compound tasks to a team of specialized sub-agents.
  prefs: []
  type: TYPE_NORMAL
- en: It invokes a `KYC_Agent` to handle idx_2810d008the complex **k****now** **y****our**
    **c****ustomer** (**KYC**) check and a `CreditCheck_Agent` to perform the credit
    assessment. For simpler, atomic tasks, such as sending the final welcome email,
    the orchestrator directly invokes a fine-grained `send_email_tool`. This architecture
    allows the orchestrator to focus on the overall process flow, delegating specialized
    work without needing to know the intricate details of how each sub-agent or tool
    operates.
  prefs: []
  type: TYPE_NORMAL
- en: 'By coordinating these specialist agents, the orchestrator can effectively manage
    and complete complex business processes that would be too brittle or convoluted
    for a single agent to handle. To see how this powerful structure is built, we
    will break down the architecture into its three core capabilities: the core components
    that define every agent, the hierarchical structure that organizes them, and the
    governance and observability framework that ensures reliability.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The core components: agents and their capabilities'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To implement the hierarchical architecture described above, we must move from
    conceptual blocks to a concrete programming model. While modern AI development
    often relies on high-level frameworks (which we will dive into in *[Chapter 1](Chapter_1.xhtml#h1_14)**5*),
    understanding the foundational code structure is essential for building production-grade
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: In this book, we use Python as our primary implementation language. Python's
    dominance in the AI ecosystem and its support for object-oriented programming
    make it the ideal choice for defining modular, reusable agentic components. By
    defining a base blueprint for our agents, we ensure that every specialist, from
    a simple email tool to a complex orchestrator, shares a predictable interface.
  prefs: []
  type: TYPE_NORMAL
- en: 'This idx_9c002b93consistency is established by defining two fundamental aspects
    for every agent: its core definition and its spectrum of capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent definition**: Every agent is an instance of a base `LLMAgent` class,
    ensuring that all actors in the system share a common set of foundational properties
    and methods. This inheritance provides consistency and simplifies development.
    The core of each agent instance is its cognition, powered by an assigned LLM that
    acts as its "brain." This cognitive core is responsible for all higher-order functions:
    interpreting its environment, reasoning through problems, formulating plans, and
    making decisions within its given context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The capability spectrum****—f****rom simple tools to sophisticated** **A****gent****T****ools**:
    An agent''s power comes from the "toolbox" it has at its disposal. In this architecture,
    that toolbox is not a simple list but a spectrum of capabilities, ranging from
    atomic functions to entire self-contained agents:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools (fine-grained functions)**: A tool is the most basic building block
    of action. It is a direct, stateless wrapper around a single function or API endpoint,
    designed to perform one specific, atomic action. These are the fundamental action
    verbs an agent can use to interact with its environment.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Examples**: A `send_email` tool, a `query_database` tool, or a `calculate``_amortization`
    tool.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Usage**: Tools are best used for simple, deterministic tasks that do not
    require complex reasoning or a multi-step process to execute. They are the simple,
    reliable actions an agent can take.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AgentTools** **(sophisticated, compound agents)**: An `AgentTool` represents
    a far more sophisticated idx_1433b274capability. Critically, an **AgentTool**
    is a complete, self-contained, fine-grained agent (a sub-agent) that has been
    packaged and exposed as a tool for other agents to use. It is a powerful idx_acb95d76abstraction
    that can have its own internal state, a multi-step workflow, and its own dedicated
    set of tools.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Examples**: A `CustomerSentimentAnalyzer` agent that takes raw text as input,
    internally uses several NLP tools to process it, and returns a structured sentiment
    score. A `DataProfiler` agent that accepts a dataset, internally uses various
    statistical tools to perform a full analysis, and returns a comprehensive data
    profile.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Usage**: `AgentTools` are designed to be invoked by an orchestrator agent
    to delegate a complex, multi-step sub-task, allowing the orchestrator to manage
    workflows without needing to know the intricate details of how the sub-task is
    performed.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The hierarchical structure: orchestrators and specialists'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This architecture is deliberately not flat. It is a hierarchy of control and
    specialization, designed to mirror idx_51e57690an effective organizational structure.
    This allows for greater modularity, oversight, and scalability. Let''s look at
    the structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sub-****a****gents (fine-grained specialists)**: These are the specialist
    workers or domain experts idx_d5187179of the system. Each sub-agent is an `LLMAgent`
    instance designed and adapted to become an expert at a specific compound task
    or within a narrow domain. They are the components that are packaged into AgentTools,
    making their specialized expertise available to the broader system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Example**: A `KnowYourCustomer_Agent` is a perfect example of a sub-agent.
    Its sole purpose is to perform comprehensive KYC checks. To do this, it might
    have its own internal workflow and use several simple tools, such as `query_identity_database`,
    `check_sanctions_list`, and `verify_address_api`.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Orchestrator** **a****gents (coarse-grained orchestrators)**: These are the
    managers or process idx_a89dda0dcoordinators of the architecture. An orchestrator
    agent''s primary responsibility is not to perform the low-level tasks, but to
    orchestrate sub-agents to complete an end-to-end business process. Their workflows
    are designed to directly reflect a high-level business objective.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Example**: A `NewCustomerOnboarding_Agent` is a perfect example of an orchestrator
    agent. Its primary responsibility is to manage the end-to-end business process
    of onboarding a new customer. To achieve this goal, it functions as an "AI conductor,"
    orchestrating the collaboration between specialized sub-agents by delegating compound
    tasks, such as a `KnowYourCustomer_Agent` for identity verification or a `CreditCheck_Agent`
    for financial assessment. While it manages the complex workflow, it may also use
    its own simple tools for straightforward final actions, such as a `send_email_tool`
    to welcome the customer.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Toolbox** **c****omposition**: An orchestrator agent''s toolbox consists
    primarily of AgentTools, the specialized sub-agents it manages. It delegates work
    to them idx_42f3a4feto handle the complex parts of the process. The orchestrator
    might also have a few simple tools of its own, but these are typically for straightforward
    tasks such as sending a final notification or logging the completion of the overall
    process.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Governance and observability via callbacks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A sophisticated, multi-agent architecture is only as good as our ability to
    manage and understand it. To prevent the system from becoming an opaque "black
    box," a robust observability framework would be beneficial and essential. For
    instance, consider a scenario where idx_0476404bagent adaptation fails, such as
    an agent hallucinating a tool call with invalid parameters during a high-stakes
    transaction. Without granular tracing, this results in a silent failure. By implementing
    callbacks, we gain the visibility needed to detect these anomalies immediately.
    We will explore idx_47c811ccthe specific patterns to mitigate such failures, specifically
    ***Instruction Fidelity Auditing*** for idx_1b0f7496verification and ***Adaptive
    Retry*** for recovery, in detail in *[Chapter 6](Chapter_6.xhtml#h1_231)* and
    *[Chapter 7](Chapter_7.xhtml#h1_269)*, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: This instrumentation of the agent's workflow is the practical implementation
    of the AgentOps and governance principles discussed in *[Chapter 2](Chapter_2.xhtml#h1_35)*,
    in the *AgentOps:* *m**anaging LLMs in agentic systems* section. The mechanism
    for achieving this is a comprehensive system of callbacks, which provide hooks
    into the critical moments of every component's life cycle, enabling powerful,
    real-time debugging, monitoring, and governance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let''s explore some examples of callbacks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Monitoring the cognitive core (**`on_model_start`/`on_model_end`): These
    callbacks fire whenever any agent''s "brain" queries its LLM, providing a granular
    window into its thought process. The purpose is to log the exact prompt sent to
    the model, any intermediate reasoning steps, the final generated response, and
    key performance metrics such as token counts and latency.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This level of detailed traceability is essential for auditing agent decisions
    for compliance, diagnosing hallucinations by inspecting the exact context used,
    and managing operational costs. It lays the groundwork for achieving true explainability
    in the agent's behavior.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Tracking actions and interactions** (`on_tool_start`/`on_tool_end`): These
    callbacks are triggered whenever any `t``ool` or `AgentTool` is invoked, effectively
    logging every action an agent takes upon its environment. Their purpose is to
    create an immutable audit trail, recording which agent called which tool, the
    precise input arguments it used, the data that was returned, and any errors encountered.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is vital for security and debugging, as it helps isolate failures. It helps
    pinpoint whether a fault lies in the agent's reasoning or in the execution of
    the tool itself. In a multi-agent system, this provides a clear view of the chain
    of delegation from an orchestrator to a sub-agent.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**High-level process oversight (**`on_agent_start`/`on_agent_end`): These callbacks
    track the entire life cycle of an individual agent''s execution run from beginning
    to end. This provides the high-level perspective needed for business-level monitoring.
    Their purpose is to log the agent''s initial goal, its final outcome (success
    or failure), and the total duration.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This data idx_267a1cc4feeds directly into **business process monitoring** (**BPM**)
    dashboards idx_3a895c30and is essential for tracking and enforcing **service****-****level
    agreements** (**SLAs**), connecting the technical performance of the agentic system
    directly to business value.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'This idx_dbc8dd39refined architecture establishes a powerful and scalable paradigm
    for building agentic systems. It creates a clear and logical separation of concerns
    that is easy to maintain and extend:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Orchestrator** **a****gents** own the *what* and *when*—the high-level business
    process flow and orchestration'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sub-****a****gents** own the *how*—the expert execution of a specific, complex
    task they have been specialized for'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools** represent the most basic, atomic capabilities that any agent can
    use to interact with its environment'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By orchestrating specialist sub-agents (as AgentTools), an orchestrator agent
    can execute complex, end-to-end business processes in a way that is far more robust,
    modular, and maintainable than a single, monolithic agent attempting to manage
    every detail itself.
  prefs: []
  type: TYPE_NORMAL
- en: The integrated callback system is the critical final piece, ensuring that this
    entire multi-agent ecosystem is not just powerful, but also transparent, governable,
    and truly ready for production deployment.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have established a robust architecture for organizing agents, we
    can turn our attention to the agents themselves. The following section explores
    the critical process of transforming a generic LLM into the specialized cognitive
    core that each agent needs to perform its role effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'Contextual enhancement: stage 1, enhancement with RAG'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As emphasized in *[Chapter 1](Chapter_1.xhtml#h1_14)*, the principle that *context
    is king* holds especially true for LLMs, and its significance becomes even greater
    in the context of AI agents. These agents must consistently make well-informed
    decisions and execute precise actions; however, these abilities are highly dependent
    idx_dbbe61a6on access to current, relevant, and accurate information.
  prefs: []
  type: TYPE_NORMAL
- en: In this regard, RAG has emerged as a powerful and widely adopted technique to
    dynamically furnish an agent's LLM core with essential context precisely when
    it's needed, at the point of inference. Rather than an agent operating solely
    on the basis of its LLM's static, pretrained knowledge, which can inevitably become
    outdated or lack crucial niche details, RAG empowers the agent with the capability
    to actively fetch pertinent information from designated external and up-to-date
    knowledge sources.
  prefs: []
  type: TYPE_NORMAL
- en: Within an agentic system, RAG serves as a key mechanism for enhancing an agent's
    operational intelligence. Agents often need to interact with proprietary or rapidly
    changing data, ranging from internal enterprise knowledge bases such as detailed
    product specifications, confidential customer interaction histories, and internal
    policy documents to dynamic external information such as real-time news feeds
    or current market data. RAG allows agents to query and retrieve this specific
    information on the fly, ensuring their actions are based on the most current and
    relevant knowledge available.
  prefs: []
  type: TYPE_NORMAL
- en: This ability is fundamental to improving factual grounding and substantially
    reducing the tendency for hallucinations. When an agent's responses or decisions
    are directly informed by retrieved documents, it can produce more factually accurate
    outputs. Moreover, this often allows the agent to provide citations or references
    back to the source documents, which dramatically increases transparency and user
    trust in the agent's pronouncements.
  prefs: []
  type: TYPE_NORMAL
- en: Consequently, the overall relevance of the agent's actions is enhanced, as the
    retrieved context ensures that the agent's LLM is reasoning over information that
    is directly pertinent to the immediate task or query at hand, leading to more
    coherent plans, more appropriate actions, and ultimately, more successful goal
    achievement.
  prefs: []
  type: TYPE_NORMAL
- en: 'To truly appreciate how RAG transforms agent capabilities, let''s examine specific
    operational flows for the agents in our examples. We will have two contrasting
    scenarios: one where the agent operates with RAG and the other without this dynamic
    retrieval mechanism.'
  prefs: []
  type: TYPE_NORMAL
- en: RAG-powered customer support agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In today's idx_f2dcd37edemanding customer idx_87d62250service landscape, an
    AI-powered customer support agent is frequently the first point of contact, and
    its primary goal is to deliver swift, accurate, and genuinely helpful resolutions.
  prefs: []
  type: TYPE_NORMAL
- en: Users expect solutions tailored to their specific problems, not generic, time-wasting
    advice. However, this expectation presents a significant challenge when the issues
    encountered are highly specific to a particular product model, involve obscure
    error codes, or, crucially, stem from very recent changes such as a software or
    firmware update that occurred "last night."
  prefs: []
  type: TYPE_NORMAL
- en: These are precisely the kinds of situations where an agent relying solely on
    a general-purpose LLM's static, pretrained knowledge is likely to falter.
  prefs: []
  type: TYPE_NORMAL
- en: To bring this into sharp focus, imagine such a customer support agent tasked
    with assisting a user who idx_ddd26b48presents a common yet potentially complex
    issue. The user is seeking immediate, effective help for a problem that has just
    arisen with idx_34d0197ftheir specific device due to a recent software update.
    Let's compare how an agent would handle this with and without RAG.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the scenario:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Let''s look at the flow options:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Flow without RAG****,****t****he** **g****eneralist''s** **f****ailure**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**User** **q****uery** **r****eceived**: The agent''s LLM core processes the
    user''s statement.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LLM** **r****easoning (****based on pretrained k****nowledge)**: The LLM
    accesses its general knowledge. It might know about common error codes or general
    troubleshooting steps, such as restarting devices. However, if `"``ProWidget`
    `X"` or `"Error E404"` are new or specific to a recent update, this information
    won''t be in its training data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generated** **r** **esponse**: The agent falls back on generic advice:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Outcome**: This response is unhelpful because the error is due to a known
    firmware bug. The user remains frustrated, resolution time increases, and the
    agent appears ineffective and out of touch.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Flow with RAG****, t****he** **s****pecialist****''****s** **s****uccess**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**User** **q** **uery** **r** **eceived**: The agent''s LLM core processes
    the statement:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**LLM** **r****easoning (****identifies need for specific in****fo****rmation****)**:
    The LLM recognizes `"``ProWidget` `X"`, `"Error` `E404``"`, and `"after the update"`
    as key entities requiring specific, potentially recent, information. This triggers
    the RAG process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**RAG** **s****tep 1 (****r****etrieve)**: The agent executes a targeted query
    against its integrated idx_51aadda7knowledge sources (e.g., a vector database
    containing product manuals and recent service bulletins). The idx_ddf79f13query
    might be `search("``ProWidget` `X Error` `E404` `firmware update June 2025")`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**RAG** **s****tep 2 (****a****ugment)**: The retrieval system returns the
    most relevant document snippets, such as the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Snippet 1 (Service Bulletin #SB2025-06-26)**:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Snippet 2 (Knowledge Base Article #FW789)**:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**RAG** **s****tep 3 (****g****enerate)**: The LLM synthesizes this retrieved,
    authoritative information into a helpful, specific, and empathetic response:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Outcome**: The agent provides an accurate, actionable solution based on the
    very latest information. This leads to a much faster resolution, higher user satisfaction,
    and demonstrates the agent''s competence. The ability to refer to the knowledge
    base article further builds trust.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '| **Key** **a****spect** | **Agent** **w****ithout RAG** | **Agent** **w****ith
    RAG** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Knowledge source | Static, pretrained model data | Dynamic, external knowledge
    base (service bulletins) |'
  prefs: []
  type: TYPE_TB
- en: '| Agent''s insight | No context for the specific error or update | Understands
    the error is a known, recent issue with a documented fix |'
  prefs: []
  type: TYPE_TB
- en: '| Generated response | Generic troubleshooting (`"restart device"`) | Specific,
    actionable solution (`"update to patch v1.2.3"`) |'
  prefs: []
  type: TYPE_TB
- en: '| Business outcome | User frustration, increased support time | Fast resolution,
    high user satisfaction, and increased trust |'
  prefs: []
  type: TYPE_TB
- en: Table 3.2 – Impact of RAG in agentic experiences
  prefs: []
  type: TYPE_NORMAL
- en: Let's idx_b3bfab21compare both scenarios; we can clearly see the transformative
    idx_aaaba05eimpact of RAG. The agent without RAG, constrained by its static training
    data, defaults to generic and unhelpful advice. Its inability to access the most
    current service bulletins renders it useless for timely, specific problems, leading
    directly to user frustration.
  prefs: []
  type: TYPE_NORMAL
- en: The integration of RAG, however, fundamentally shifts the agent's capabilities
    from a simple conversationalist to a competent problem-solver. By actively querying
    dedicated knowledge sources, the agent grounds its reasoning in verifiable, real-time
    facts. This allows it to provide accurate, actionable solutions that build user
    confidence and dramatically improve the effectiveness of the support interaction.
  prefs: []
  type: TYPE_NORMAL
- en: Financial analyst agent leveraging RAG for timely market insights
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the idx_9316e6c1fast-paced world of financial markets, decisions must be
    grounded in the most current and comprehensive information available. A financial
    analyst agent is often tasked with synthesizing vast amounts of rapidly changing
    data to provide actionable insights for investment strategies, risk assessment,
    or market understanding.
  prefs: []
  type: TYPE_NORMAL
- en: The challenge here is extreme timeliness; market sentiment can shift in minutes
    based on new information, and an LLM relying on its potentially months-old training
    data would be severely disadvantaged. An earnings report release, for instance,
    can dramatically alter a company's outlook and market perception literally overnight.
    To bridge this gap, organizations typically architect a retrieval pipeline using
    a vector database to index real-time streams, which the agent then queries dynamically
    before generating a response.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate how RAG addresses this need for currency and depth, consider a
    financial analyst agent assigned a critical task. This request demands an understanding
    of financial performance, immediate market reactions, and broader sentiment, all
    within a 24-hour window.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the scenario:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Let''s idx_a1c3b288look at the flow options:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Flow without RAG****, t****he** **o****utdated** **g****eneralist**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Task** **r****eceived**: The agent''s LLM processes the request.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LLM** **r****easoning (****b****ased on** **p****retrained** **k****nowledge)**:
    The LLM''s knowledge about *CompanyCorp* is limited to its last training update,
    which could be months old. It has no information about yesterday''s specific earnings
    figures, real-time market reactions, or subsequent analyst commentary.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generated** **r****esponse**: The agent produces a generic, outdated, and
    therefore irrelevant summary:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Outcome**: The summary is useless for understanding *current* market sentiment.
    It provides no value for timely investment decisions and could lead to significant
    strategic errors based on old data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Flow** **w****ith RAG****, t****he** **r****eal-****t****ime** **s****pecialist**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Task** **r****eceived**: The agent''s LLM processes the request for a current
    sentiment summary on SMCP.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LLM** **r****easoning (****identifies need for real-time financial d****ata)**:
    The LLM recognizes the need for very recent information: SMCP''s Q1 earnings figures,
    financial news published in the last 24 hours, and stock performance data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**RAG** **s****tep 1 (****r****etrieve)**: The agent orchestrates queries to
    multiple connected data sources, such as the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Financial news APIs (e.g., Bloomberg and Reuters) for articles matching `search("``CompanyCorp`
    `OR` `SMCP` `earnings` `Q1` `2025"` `since:yesterday``)`
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: A press release database for SMCP's official Q1 earnings announcement
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: A stock market data API for SMCP's price movement and volume since yesterday's
    close
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RAG** **s****tep 2 (****a****ugment)**: Key idx_32397383information snippets
    are retrieved and consolidated:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**News** **s****nippet 1**:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: '**Earnings** **r****elease** **h****ighlight**:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: '**Market** **d****ata**:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: '**RAG** **s** **tep 3 (** **g** **enerate)**: The LLM synthesizes these diverse,
    current data points into a coherent, data-rich summary:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Outcome**: The agent delivers a timely and actionable summary explicitly
    grounded in the latest financial reports and market reactions. This provides genuine
    value for decision-making.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The idx_91fd8f72following diagram illustrates the flow:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Image 4](img/B33147_3_4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.4 – Example flow for RAG with a real-time specialist
  prefs: []
  type: TYPE_NORMAL
- en: 'The following table summarizes these stark differences, highlighting how the
    integration of RAG shifts the agent''s capability from generic description to
    actionable insight:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Key** **a****spect** | **Agent** **w****ithout RAG** | **Agent** **w****ith
    RAG** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Knowledge source | Static, outdated training data | Real-time financial news
    APIs, press releases, and market data feeds |'
  prefs: []
  type: TYPE_TB
- en: '| Agent''s insight | No knowledge of recent events | Synthesizes yesterday''s
    earnings figures, market reaction, and news |'
  prefs: []
  type: TYPE_TB
- en: '| Generated response | Generic, irrelevant company description | Data-rich,
    timely, and actionable market summary |'
  prefs: []
  type: TYPE_TB
- en: '| Business outcome | Misinformed decisions and potential financial loss | Informed
    strategic planning and timely investment decisions |'
  prefs: []
  type: TYPE_TB
- en: Table 3.3 – Impact of RAG on a financial analyst agent
  prefs: []
  type: TYPE_NORMAL
- en: This idx_26bb7ee4financial analysis scenario underscores how RAG empowers an
    agent to transcend the limitations of static knowledge. Without it, the agent's
    outputs are anachronistic and potentially misleading, failing entirely to capture
    the impact of market-moving events. It offers no value in a domain where currency
    is a primary requirement.
  prefs: []
  type: TYPE_NORMAL
- en: With RAG, however, the agent transforms into a dynamic information synthesizer,
    actively seeking out and integrating the latest financial news, official company
    reports, and real-time market data to construct a comprehensive understanding
    of the current situation. This is crucial for informed trading and investment
    strategies.
  prefs: []
  type: TYPE_NORMAL
- en: Compliance agent ensuring adherence with RAG in transaction monitoring
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Within financial institutions, the role of a compliance agent is critical, involving
    the meticulous review idx_a41fabe8of transactions to prevent illicit activities
    and ensure adherence to a complex web of evolving regulations.
  prefs: []
  type: TYPE_NORMAL
- en: The stakes are exceptionally high, with non-compliance potentially leading to
    severe regulatory penalties, financial losses, and significant reputational damage.
    An agent tasked with such responsibilities must navigate specific, often jurisdiction-dependent,
    anti-money laundering (AML) rules, internal bank policies that may be even stricter
    than public regulations, and constantly updated international sanctions lists.
    Relying on a generic LLM's baseline knowledge for such a sensitive and dynamic
    task would be fraught with unacceptable risk.
  prefs: []
  type: TYPE_NORMAL
- en: Envision such a compliance agent within a major bank. Its immediate task is
    to review a high-value, international wire transfer. The agent must determine
    whether this transaction is permissible according to all relevant external regulations
    and internal bank policies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the scenario:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Let''s idx_34d87fb5look at the flow options:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Flow** **w****ithout RAG****, t****he** **r****isky** **g****eneralist**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Transaction** **d****etails** **r****eceived**: The agent''s LLM core processes
    the transaction information.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LLM** **r****easoning (****based on general pretrained k****nowledge)**:
    The LLM might have general knowledge of AML principles, but is highly unlikely
    to know the specific, current AML regulations of Country A and Country B, the
    bank''s detailed internal policy nuances, or whether Mr. John Doe''s name has
    recently appeared on a sanctions list.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generated** **r****ecommendation/****a****ction**: The agent makes a decision
    based on overly simplistic rules. It might be overly cautious and inefficient,
    or worse, miss a critical detail:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Outcome**: This approach leads to either inefficient processing (flagging
    too many benign transactions) or, more severely, non-compliance if a specific,
    newly enacted regulation is missed. This exposes the institution to significant
    legal and financial risk.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This diagram illustrates the limitations of relying on pretrained knowledge,
    where the agent misses critical regulatory nuances such as *Form XYZ* requirements:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Image 5](img/B33147_3_5.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.5 – The risky generalist workflow
  prefs: []
  type: TYPE_NORMAL
- en: This *better safe than sorry* approach highlighted in *Figure 3.**5* creates
    operational bottlenecks and leaves the institution vulnerable to specific regulatory
    breaches that the model idx_008c7decsimply doesn't know about. To close this gap,
    we must move from a closed system to an open one. Let's examine how the workflow
    transforms when we inject real-time context via RAG, turning the agent into a
    precise gatekeeper.
  prefs: []
  type: TYPE_NORMAL
- en: '**AI** **o****rchestration** **w****ork****f****low** **w****ith RAG as** **the
    p****recise** **g****atekeeper**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Transaction** **d****etails** **r****eceived**: The agent processes the $75,000
    wire transfer details.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LLM** **r****easoning (****identifies need for specific regulatory** **and**
    **policy d****ata)**: The LLM determines it needs to check current AML rules for
    both countries, the bank''s internal policy for this specific transaction type,
    and global sanctions lists.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**RAG** **s****tep 1 (****r****etrieve)**: The agent queries its integrated,
    specialized data sources:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A regularly updated regulatory intelligence database for rules on large outbound
    transfers from Country A and inbound transfers to Country B
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bank's internal, version-controlled policy document repository
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: A real-time sanctions screening API with the recipient's details
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RAG** **s****tep 2 (****a****ugment)**: The system retrieves critical, specific
    contextual information:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Regulatory** **s****nippet (effective June 1, 2025)**:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: '**Internal** **policy snipp****et (Bank Policy Manual v3.1.2)**:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: '**Sanctions** **check res****ult (as of June 27, 2025)**:'
