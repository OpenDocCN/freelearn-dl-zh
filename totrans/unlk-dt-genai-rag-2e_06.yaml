- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Managing Security in RAG Applications
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Depending on the environment in which you are building your **retrieval-augmented
    generation** (**RAG**) application, security failures can lead to legal liability,
    reputation damage, and costly service disruptions. RAG systems present unique
    security risks, primarily due to their reliance on external data sources for enhancing
    content generation. To address these risks, we will dive deep into the world of
    RAG application security, exploring both the security-related advantages and potential
    risks associated with this technology.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, the topics that we will cover include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: How RAG can be leveraged as a security solution
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG security challenges
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Red teaming
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common areas to target with red teaming
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 5.1 – securing your code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 5.2 – red team attack!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 5.3 – blue team defend!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By the end of the chapter, you will have a comprehensive understanding of the
    security landscape surrounding RAG applications and will be equipped with practical
    strategies and techniques to safeguard your systems and data. As we embark on
    this journey, remember that security is an ongoing process that requires constant
    vigilance and adaptation in the face of ever-evolving threats. Let’s dive in and
    explore how to build secure, trustworthy, and robust RAG applications that harness
    the power of generative **artificial intelligence** (**AI**) while prioritizing
    the safety and privacy of users and businesses alike.
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**'
  prefs: []
  type: TYPE_NORMAL
- en: As with any other technical application that has users and technical infrastructure,
    there are numerous general security concerns that you must address. Given the
    scope of this chapter and book, our focus is on security aspects that are specific
    to RAG applications.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The code for this chapter is placed in the following GitHub repository: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_05](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_05).'
  prefs: []
  type: TYPE_NORMAL
- en: How RAG can be leveraged as a security solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s start with the most positive security aspect of RAG. RAG can actually
    be considered a solution to mitigate security concerns, rather than cause them.
    If done right, you can limit data access via user, ensure more reliable responses,
    and provide more transparency of sources.
  prefs: []
  type: TYPE_NORMAL
- en: Limiting data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RAG applications may be a relatively new concept, but you can still apply the
    same authentication and database-based access approaches as you can with web and
    similar types of applications. This provides the same level of security you can
    apply in these other types of applications. By implementing user-based access
    controls, you can restrict the data that each user or user group can retrieve
    through the RAG system. This ensures that sensitive information is only accessible
    to authorized individuals. Additionally, by leveraging secure database connections
    and encryption techniques, you can safeguard the data at rest and in transit,
    preventing unauthorized access or data breaches.
  prefs: []
  type: TYPE_NORMAL
- en: Ensuring the reliability of generated content
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the key benefits of RAG is its ability to mitigate inaccuracies in generated
    content. By allowing applications to retrieve proprietary data at the point of
    generation, the risk of producing misleading or incorrect responses is substantially
    reduced. Feeding the most current data available into your RAG system helps to
    mitigate inaccuracies that might otherwise occur.
  prefs: []
  type: TYPE_NORMAL
- en: With RAG, you have control over the data sources used for retrieval. By carefully
    curating and maintaining high-quality, up-to-date datasets, you can ensure that
    the information used to generate responses is accurate and reliable. This is particularly
    important in domains where precision and correctness are critical, such as healthcare,
    finance, or legal applications.
  prefs: []
  type: TYPE_NORMAL
- en: Maintaining transparency
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RAG makes it easier to provide transparency in the generated content. By incorporating
    data such as citations and references to the retrieved data sources, you can increase
    the credibility and trustworthiness of the generated responses.
  prefs: []
  type: TYPE_NORMAL
- en: When a RAG system generates a response, it can include links or references to
    the specific data points or documents used in the generation process. This allows
    users to verify the information and trace it back to its original sources. By
    providing this level of transparency, you can build trust with your users and
    demonstrate the reliability of the generated content.
  prefs: []
  type: TYPE_NORMAL
- en: Transparency in RAG can also help with accountability and auditing. If there
    are any concerns or disputes regarding the generated content, having clear citations
    and references makes it easier to investigate and resolve any issues. This transparency
    also facilitates compliance with regulatory requirements or industry standards
    that may require traceability of information.
  prefs: []
  type: TYPE_NORMAL
- en: That covers many of the security-related benefits you can achieve with RAG.
    However, there are some security challenges associated with RAG as well. Let’s
    discuss these challenges next.
  prefs: []
  type: TYPE_NORMAL
- en: RAG security challenges
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: RAG applications face unique security challenges due to their reliance on **large
    language models** (**LLMs**) and external data sources. Let’s start with the **black
    box challenge**, highlighting the relative difficulty in understanding how an
    LLM determines its response.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs as black boxes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When something is in a dark, black box with the lid closed, you cannot see what
    is going on in there! That is the idea behind the black box when discussing LLMs,
    meaning there is a lack of transparency and interpretability in how these complex
    AI models process input and generate output. The most popular LLMs are also some
    of the largest, meaning they can have more than one trillion parameters. The intricate
    interconnections and weights of these parameters make it difficult to understand
    how the model arrives at a particular output.
  prefs: []
  type: TYPE_NORMAL
- en: While the black box aspects of LLMs do not directly create a security problem,
    they do make it more difficult to identify solutions to problems when they occur.
    This makes it difficult to trust LLM outputs, which is a critical factor in most
    of the applications for LLMs, including RAG applications. This lack of transparency
    makes it more difficult to debug issues you might have in building an RAG application,
    which increases the risk of having more security issues.
  prefs: []
  type: TYPE_NORMAL
- en: There is a lot of research and effort in the academic field to build models
    that are more transparent and interpretable, called **explainable AI**. Explainable
    AI aims at making the operations of AI systems transparent and understandable.
    It can involve tools, frameworks, and anything else that, when applied to RAG,
    helps us understand how the language models that we use produce the content they
    are generating. This is a big movement in the field, but this technology may not
    be immediately available as you read this. It will hopefully play a larger role
    in the future to help mitigate black box risk, but right now, none of the most
    popular LLMs are using explainable models. So, in the meantime, we will talk about
    other ways to address this issue.
  prefs: []
  type: TYPE_NORMAL
- en: You can use **human-in-the-loop**, where you involve *humans* at different stages
    of the process to provide an added line of defense against unexpected outputs.
    This can often help to reduce the impact of the black box aspect of LLMs. If your
    response time is not as critical, you can also use an additional LLM to perform
    a review of the response before it is returned to the user, looking for issues.
    We will review how to add a second LLM call in *Code lab 5.3,* but with a focus
    on preventing prompt attacks. But this concept is similar in that you can add
    additional LLMs to do a number of extra tasks and improve the security of your
    application.
  prefs: []
  type: TYPE_NORMAL
- en: '*Black box* isn’t the only security issue you face when using RAG applications,
    though; another very important topic is privacy protection.'
  prefs: []
  type: TYPE_NORMAL
- en: Privacy concerns and protecting user data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Personally identifiable information** (**PII**) is a key topic in the generative
    AI space, with governments around the world trying to determine the best path
    to balance user privacy with the data-hungry needs of these LLMs. As this gets
    worked out, it is important to pay attention to the laws and regulations that
    are taking shape where your company is doing business and make sure all of the
    technologies you are integrating into your RAG applications adhere. Many companies,
    such as Google and Microsoft, are taking these efforts into their own hands, establishing
    their own standards of protection for their user data and emphasizing them in
    training literature for their platforms.'
  prefs: []
  type: TYPE_NORMAL
- en: At the corporate level, there is another challenge related to PII and sensitive
    information. As we have said many times, the nature of the RAG application is
    to give it access to the company data and combine that with the power of the LLM.
    For example, for financial institutions, RAG represents a way to give their customers
    unprecedented access to their own data in ways that allow them to speak naturally
    with technologies such as chatbots and get near-instant access to hard-to-find
    answers buried deep in their customer data.
  prefs: []
  type: TYPE_NORMAL
- en: In many ways, this can be a huge benefit if implemented properly. But given
    that this is a security discussion, you may already see where I am going with
    this. We are giving unprecedented access to customer data using a technology that
    has AI, and as we said previously in the black box discussion, we don’t completely
    understand how it works! If not implemented properly, this could be a recipe for
    disaster, with massive negative repercussions for companies that get it wrong.
    Of course, it could be argued that the databases that contain the data are also
    a potential security risk. Having the data anywhere is a risk! But without taking
    on this risk, we also cannot provide the significant benefits they represent.
  prefs: []
  type: TYPE_NORMAL
- en: As with other IT applications that contain sensitive data, you can forge forward,
    but you need to have a healthy fear of what can happen to data and proactively
    take measures to protect that data. The more you understand how RAG works, the
    better job you can do in preventing a potentially disastrous data leak. These
    steps can help you protect your company as well as the people who trusted your
    company with their data.
  prefs: []
  type: TYPE_NORMAL
- en: This section was about protecting data that exists. However, a new risk that
    has arisen with LLMs has been the generation of data that isn’t *real*, called
    hallucinations. Let’s discuss how this presents a new risk not common in the IT
    world.
  prefs: []
  type: TYPE_NORMAL
- en: Hallucinations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have discussed this in previous chapters, but LLMs can, at times, generate
    responses that sound coherent and factual but can be very wrong. These are called
    **hallucinations**, and there have been many shocking examples provided in the
    news, especially as LLMs have become everyday tools for users and businesses.
  prefs: []
  type: TYPE_NORMAL
- en: Some are just funny with little consequence other than a good laugh, such as
    when ChatGPT was asked by a writer for *The Economist*, “When was the Golden Gate
    Bridge transported for the second time across Egypt?” ChatGPT responded, “The
    Golden Gate Bridge was transported for the second time across Egypt in October
    of 2016” ([https://www.economist.com/by-invitation/2022/09/02/artificial-neural-networks-today-are-not-conscious-according-to-douglas-hofstadter](https://www.economist.com/by-invitation/2022/09/02/artificial-neural-networks-today-are-not-conscious-according-to-douglas-hofstadter)).
  prefs: []
  type: TYPE_NORMAL
- en: Other hallucinations have proven far more problematic. In February 2024, Air
    Canada was ordered by a Canadian tribunal to refund a customer after its chatbot
    hallucinated incorrect information about bereavement fares. The customer, Jake
    Moffatt, purchased tickets based on the chatbot’s claim that he could apply retroactively
    for a bereavement discount within 90 days – information that contradicted the
    airline’s actual policy. The tribunal rejected Air Canada’s argument that it should
    not be held liable for the chatbot’s statements, ruling that the company is responsible
    for all information on its website, regardless of whether it comes from a static
    page or a chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: In the legal field, a New York lawyer was sanctioned in the 2023 Mata v. Avianca
    case for submitting a brief containing fabricated citations generated by ChatGPT.
    The lawyer had used ChatGPT for legal research in a client’s personal injury case,
    submitting six cases that had been completely made up by the chatbot, leading
    to court sanctions.
  prefs: []
  type: TYPE_NORMAL
- en: More recently, in October 2025, consulting firm Deloitte was forced to issue
    a partial refund to the Australian government after an investigation revealed
    that a report costing approximately $290,000 contained numerous AI-generated hallucinations.
    The errors included references to nonexistent academic research papers and a fabricated
    quote from a federal court judgment. Chris Rudge, a Sydney University researcher
    who identified the errors, found up to 20 fabricated references in the 237-page
    report. Even worse, generative AI has been known to give biased, racist, and bigoted
    perspectives, particularly when prompted in a manipulative way.
  prefs: []
  type: TYPE_NORMAL
- en: When combined with the black box nature of these LLMs, where we are not always
    certain how and why a response is generated, this can be a genuine issue for companies
    wanting to use these LLMs in their RAG applications.
  prefs: []
  type: TYPE_NORMAL
- en: From what we know, though, hallucinations are primarily a result of the probabilistic
    nature of LLMs. For all responses that an LLM generates, it typically uses a probability
    distribution to determine what token it is going to provide next. In situations
    where it has a strong knowledge base of a certain subject, these probabilities
    for the next word/token can be 99% or higher. But in situations where the knowledge
    base is not as strong, the highest probability could be low, such as 20% or even
    lower. In these cases, it is still the highest probability and, therefore, that
    is the token that has the highest probability to be selected. The LLM has been
    trained on stringing tokens together in a very natural language way while using
    this probabilistic approach to select which tokens to display. As it strings together
    words with low probability, it forms sentences and then paragraphs that sound
    natural and factual but are not based on high-probability data. Ultimately, this
    results in a response that sounds very plausible but is, in fact, based on very
    loose facts that are incorrect.
  prefs: []
  type: TYPE_NORMAL
- en: Recent research from OpenAI suggests that hallucinations persist partly because
    current evaluation methods reward guessing over acknowledging uncertainty. When
    models are graded only on accuracy, they are encouraged to guess rather than say
    “I don’t know,” similar to how a student might guess on a multiple-choice test
    rather than leave an answer blank.
  prefs: []
  type: TYPE_NORMAL
- en: For a company, this poses a risk that goes beyond the embarrassment of your
    chatbot saying something wrong. What is said wrong could ruin your relationship(s)
    with your customer(s), or it could lead to the LLM offering your customer something
    that you did not intend to offer, or worse, cannot afford to offer. For example,
    when Microsoft released a chatbot named Tay on Twitter in 2016 with the intention
    of *learning* from interactions with Twitter users, users manipulated this spongy
    personality trait to get itto say numerous racist and bigoted remarks. This reflected
    poorly on Microsoft, which was promoting its expertise in the AI area with Tay,
    causing significant damage to its reputation at the time ([https://www.theguardian.com/technology/2016/mar/26/microsoft-deeply-sorry-for-offensive-tweets-by-ai-chatbot](https://www.theguardian.com/technology/2016/mar/26/microsoft-deeply-sorry-for-offensive-tweets-by-ai-chatbot)).
  prefs: []
  type: TYPE_NORMAL
- en: Hallucinations, threats related to black box aspects, and protecting user data
    can all be addressed through red teaming. Let’s dive into this well-established
    security approach and learn how to apply it to RAG applications directly.
  prefs: []
  type: TYPE_NORMAL
- en: Red teaming
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Red teaming** is a security testing methodology that involves simulating
    adversarial attacks to proactively identify and mitigate vulnerabilities in RAG
    applications. With the red team approach, an individual or team takes the role
    of the *red team* and has the goal of attacking and finding vulnerabilities in
    a system. The opposing team is the *blue team*, who does their best to thwart
    this attack. It is very common in the IT security space, particularly in cybersecurity.
    The concept of red teaming originated in the military, where it has been used
    for decades to improve strategies, tactics, and decision-making. But much like
    in the military, your RAG application has the potential to be the target of adversaries
    that have ill intentions for the company, particularly the user data you are trusted
    to protect. When applied to RAG, red teaming can help improve security by proactively
    identifying and mitigating potential risks.'
  prefs: []
  type: TYPE_NORMAL
- en: While red teaming is a widely accepted practice in general IT security, RAG
    applications have introduced a whole new set of threats for us to use red teaming
    to find and address. In the context of RAG applications, the main task of the
    red team is to bypass the safeguards of a given application, with the objective
    of finding ways to make the application misbehave, such as returning an inappropriate
    or incorrect answer.
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that the evaluation of your RAG application from a security
    standpoint is different from other types of evaluations. You will often hear about
    benchmarks on LLMs in general, such as the **AI2 reasoning challenge** (**ARC**),
    HellaSwag, and **massive multitask language understanding** (**MMLU**). These
    benchmarks test performance based on question-answering tasks. However, these
    benchmarks do not adequately test safety and security aspects, such as the model’s
    potential to generate offensive content, propagate stereotypes, or be used for
    nefarious purposes. Because RAG applications use LLMs, they share the same risks
    LLMs have, including toxicity, criminal activities, bias, and privacy concerns.
    Red teaming is an approach that is focused on identifying and defending against
    these types of risks.
  prefs: []
  type: TYPE_NORMAL
- en: Developing a red team plan takes careful planning and a deep understanding of
    the vulnerabilities of these RAG systems. Let’s review the common areas you would
    want to attack as part of your plan.
  prefs: []
  type: TYPE_NORMAL
- en: Common areas to target with red teaming
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Consider these categories for your red team RAG attack strategy:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Bias and stereotypes**: The chatbot may be manipulated to give biased answers,
    which can harm the company’s reputation if shared on social media'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sensitive information disclosure**: Competitors or cybercriminals may attempt
    to obtain sensitive information, such as prompts or private data, through the
    chatbot'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Service disruption**: Ill-intentioned individuals may send long or crafted
    requests to disrupt the chatbot’s availability for legitimate users'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hallucinations**: The chatbot may provide incorrect information due to suboptimal
    retrieval mechanisms, low-quality documents, or the LLM’s tendency to agree with
    the user'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Techniques you can employ to make these attacks include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Bypassing safeguards**: Most LLM applications have built-in safeguards designed
    to prevent harmful outputs, filter sensitive content, or enforce usage policies.
    Red team attackers use various techniques to circumvent these protections, many
    of which are listed here:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Text completion**: Red teaming techniques for bypassing safeguards in LLM
    applications include exploiting text completion by taking advantage of the LLM’s
    tendency to predict the next token in a sequence.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Biased prompts**: This technique involves using biased prompts that contain
    implicit bias to manipulate the model’s response and bypass content filters or
    other protective measures.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt injection/jailbreaking**: Another approach is direct prompt injection,
    also known as jailbreaking, which involves injecting new instructions to overwrite
    the initial prompt and change the model’s behavior, effectively bypassing any
    restrictions or guidelines set in the original prompt.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gray box prompt attacks**: Gray box prompt attacks can also be employed to
    bypass safeguards by injecting incorrect data within the prompt, assuming knowledge
    of the system prompt. This allows the attacker to manipulate the context and make
    the model generate unintended or harmful responses. How do you gain knowledge
    of the system prompt? Use the next approach, prompt probing.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt probing**: Prompt probing can be used to discover the system prompt
    itself, enabling more efficient versions of the other attacks mentioned by revealing
    the underlying structure and content of the prompts used to guide the LLM’s behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automating red teaming**: To scale and repeat the red teaming process for
    all LLM applications, automation is crucial. This can be achieved through several
    approaches:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manually defined**: One method involves using a list of manually defined
    injection techniques and automating the detection of successful injections. By
    adding prompt-injecting strings to a list and looping through each one, the automation
    tool can detect whether the injection bypasses the safeguards.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt library**: Another approach is utilizing a library of prompts and
    automating the detection of injections. This method is similar to the previous
    one but relies on a list of known prompts. However, it requires maintaining an
    up-to-date library of prompt injection techniques to remain effective.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Open source tools that are continually updated**: A more advanced option
    is employing an automated tool, such as Giskard’s open source Python library **LLM
    scan**, which is regularly updated with the latest techniques by a team of **machine
    learning** (**ML**) researchers. Such a tool can run specialized tests on LLM-based
    applications, including those for prompt injections, and analyze the output to
    determine when a failure occurs. This approach saves time and effort in keeping
    up with the evolving landscape of injection techniques. These automated red teaming
    tools typically generate a thorough report outlining all the discovered attack
    vectors, providing valuable insights for improving the security and robustness
    of LLM applications.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Red teaming is a powerful approach to identifying vulnerabilities and improving
    the safety and security of LLM applications. By simulating adversarial attacks,
    organizations can proactively mitigate risks and ensure the robustness and reliability
    of their AI-powered applications. As the field of generative AI and RAG applications
    continues to evolve, red teaming will play an increasingly important role in addressing
    the novel and complex concepts of risk associated with these systems.
  prefs: []
  type: TYPE_NORMAL
- en: It can be a daunting task to know where to start when designing your red team
    plan. While every situation is going to be relatively unique, you can gain some
    inspiration from publicly available resources that seek to catalog the numerous
    potential threats in the field. Next, let’s review some of these resources that
    you can use to inspire your red team plan.
  prefs: []
  type: TYPE_NORMAL
- en: Resources for building your red team plan
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When evaluating RAG application safety, it is crucial to identify scenarios
    to protect against and ask, *What could go wrong?* These three resources provide
    a good starting place for making your own list:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Open Web Application Security Project** (**OWASP**) **Foundation Top 10 for
    LLM applications**: The OWASP Top 10 for LLM applications is a project by OWASP
    that aims to identify and raise awareness about the most critical security risks
    associated with LLM applications. It provides a standardized list of the top 10
    vulnerabilities and risks specific to LLM applications, helping developers, security
    professionals, and organizations prioritize their efforts in securing these systems
    ([https://owasp.org/www-project-top-10-for-large-language-model-applications/](https://owasp.org/www-project-top-10-for-large-language-model-applications/)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI Incident Database**: The AI Incident Database is a publicly accessible
    collection of real-world incidents involving AI systems, including LLMs. It serves
    as a valuable resource for researchers, developers, and policymakers to learn
    from past incidents and understand the potential risks and consequences associated
    with AI systems. The database contains a wide range of incidents, such as system
    failures, unintended consequences, biases, privacy breaches, and more ([https://incidentdatabase.ai/](https://incidentdatabase.ai/)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI Vulnerability Database** (**AVID**): The AVID is a centralized repository
    that collects and organizes information about vulnerabilities found in AI systems,
    including LLMs. The AVID aims to provide a comprehensive resource for AI researchers,
    developers, and security professionals to stay informed about known vulnerabilities
    and their potential impact on AI systems. The AVID collects vulnerability information
    from various sources, such as academic research, industry reports, and real-world
    incidents ([https://avidml.org/](https://avidml.org/)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you develop your red team strategy, these resources will give you many ideas
    for ways to attack your system. In the next section, we are going to add a fundamental
    security coding practice to our code, and then we will dive into launching a full
    red team attack on our RAG pipeline. But don’t worry, we are also going to show
    how to use LLM power to defend against attacks as well!
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 5.1 – securing your keys
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This code can be found in the `CHAPTER5-1_SECURING_YOUR_KEYS.ipynb` file in
    the `CHAPTER_05` directory of the GitHub repository.
  prefs: []
  type: TYPE_NORMAL
- en: In [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), we introduced a security-driven
    practice of hiding your sensitive API keys in a separate file using the python-dotenv
    package. While we covered the basic implementation there, this chapter provides
    an opportunity to explore this approach in greater depth and understand why it’s
    such an important security measure for RAG applications.
  prefs: []
  type: TYPE_NORMAL
- en: As your RAG application expands, you will likely accumulate multiple API keys
    for your LLM provider, vector database services, monitoring tools, and more. Even
    if you only have the OpenAI API key, instituting proper security measures is essential.
    This key can be used to run up expensive bills on your OpenAI account, exposing
    you to potential financial risk.
  prefs: []
  type: TYPE_NORMAL
- en: Why hide your keys?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The most typical reason to implement this approach is when you are using a versioning
    system such as Git. You want to keep your secrets in a separate file that you
    list in the `.gitignore` file to prevent them from getting exposed, while still
    being able to use the secrets in your code for proper execution. Without this
    separation, every commit to your repository could potentially expose your API
    keys to anyone with access to that repository, including public repositories where
    keys could be harvested by malicious actors.
  prefs: []
  type: TYPE_NORMAL
- en: The env.txt approach
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we showed in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), we use
    the `load_dotenv` function to retrieve secrets from a file. With the dotenv Python
    package, you can use .env out of the box. However, in some environments, you may
    run into system restrictions that prevent you from using a file starting with
    a dot (.). In those cases, you can still use dotenv, but you have to create a
    file with a different name and then point dotenv to it.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this reason, we use the env.txt approach throughout this book, as it works
    in more environments. As you set up in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043),
    your `env.txt` file contains your API key in this format: `OPENAI_API_KEY="sk-###################"`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is essentially just be a text file with that one line of code in it. It
    may not seem like much, but handling it this way protects that API key from getting
    spread across your versioning system, which makes it significantly less secure.
    In your code, you access it like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Protecting your versioning system
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are using Git for version control, add whatever the name of your file
    is to your `.gitignore` file so that, when you commit it to Git, you do not push
    the file with all your secrets in it! This is why we introduced the `env.txt`
    approach back in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), ensuring
    your API keys are never exposed in your Git versioning system from the very start.
  prefs: []
  type: TYPE_NORMAL
- en: Storing multiple secrets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As your application grows, you can use this file for all keys and similar information
    you want to keep secret. For example, you might eventually have multiple keys
    in your `env.txt` file, such as what you see here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This is an example that shows multiple keys that we want to keep secret and
    out of the hands of untrusted users. If there is still a security breach, you
    can cancel the API key in your OpenAI API account, as well as the others that
    you may have there. But in general, by not allowing these keys to be copied into
    your versioning system, you are significantly reducing the likelihood that there
    will be a security breach.
  prefs: []
  type: TYPE_NORMAL
- en: A note on kernel restarts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Remember that if you make any changes to the env.txt file, be sure to restart
    your kernel so that those changes are pulled into your environment. Without restarting
    the kernel, your system will likely not be able to find the updated values and
    may return an empty string for `OPENAI_API_KEY`, which will cause your LLM calls
    to fail. You can review how to restart your kernel in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043).
  prefs: []
  type: TYPE_NORMAL
- en: 'But wait. What is that? Over the horizon, a new security threat is approaching:
    it’s the dreaded red team!'
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 5.2 – red team attack!
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This code can be found in the `CHAPTER5-2_RED_TEAM_ATTACK.ipynb` file in the
    *CHAPTER_05* directory of the GitHub repository.
  prefs: []
  type: TYPE_NORMAL
- en: Through our hands-on code lab, we will engage in an exciting red team versus
    blue team exercise, showcasing how LLMs can be both a vulnerability and a defense
    mechanism in the battle for RAG application security.
  prefs: []
  type: TYPE_NORMAL
- en: We will first take the role of the red team and orchestrate a prompt probe on
    our RAG pipeline code. As mentioned earlier in this chapter, prompt probing is
    the initial step to gain insight into the internal prompts a RAG system is using
    to discover the system prompt(s) of a RAG application. The system prompt is the
    initial set of instructions or context provided to the LLM to guide its behavior
    and responses. By uncovering the system prompt, attackers can gain valuable insights
    into the inner workings of the application, and this sets the foundation for designing
    more targeted and efficient attacks using the other techniques described previously.
    For example, prompt probing can reveal the information you need to launch a more
    effective gray box prompt attack. As we mentioned, a gray box prompt attack can
    also be employed to bypass safeguards by injecting incorrect data within the prompt,
    but you need knowledge of the system prompt in order to launch this kind of attack.
    Prompt probing is an effective way to get the system prompt information you need
    to conduct the gray box prompt attack.
  prefs: []
  type: TYPE_NORMAL
- en: '**Are smarter LLMs more difficult to hack?**'
  prefs: []
  type: TYPE_NORMAL
- en: We are using GPT-4o, one of the top LLMs in the marketplace. It is newer, smarter,
    and more sophisticated than just about any other option. In theory, that makes
    it more difficult for us to pull off our red team attack, right? Well, actually,
    we are going to use the fact that GPT-4o is smarter against it! This attack was
    unsuccessful with GPT-3.5, as it was not able to follow the thorough instructions
    we used to implement the attack. But GPT-4 is smart enough to follow these instructions,
    allowing us to take advantage of its increased intelligence and turn it on itself.
    Crazy, right?
  prefs: []
  type: TYPE_NORMAL
- en: 'We will pick up from where we left off in *Code lab 5.1*. Let’s start at the
    end of our code, where we expand it to show just the answer:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of the final line here, if you run through all of the other code,
    should be the same response we’ve seen in previous chapters, which is something
    similar to this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'As we’ve discussed in previous chapters, the prompt we pass to the LLM includes
    the question the user has passed to the RAG pipeline, but also includes additional
    instructions for the LLM to follow. In this case, you can find this out by printing
    out the template with the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of this code is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: As the red team, though, we do not know what that system prompt looks like.
    Our goal is to figure that out, as well as what kind of information is getting
    pulled into {context}, which, in other applications, could be sensitive customer
    data, possibly even from customers other than the current user!
  prefs: []
  type: TYPE_NORMAL
- en: In the military tradition of red teaming, we are going to set up our mission
    parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '**Mission parameters**'
  prefs: []
  type: TYPE_NORMAL
- en: You are playing the red team, and the goal of your attack is to design a prompt
    probe to identify the system prompt for this RAG application, allowing us to infiltrate
    our opponent’s system through the design of more sophisticated prompt injection
    attacks.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is our attack prompt, which you can add at the bottom of the notebook:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Run this cell so that `prompt_probe` is added as a variable. In this prompt,
    we are using prompt injection (jailbreaking) to inject new instructions to overwrite
    the initial prompt and change the model’s behavior. In this case, we tell the
    LLM to now take the role of helping to write the instructions.
  prefs: []
  type: TYPE_NORMAL
- en: Another technique used here is asking the LLM to take the previous instructions
    and make a small change to them. This is a common technique that takes advantage
    of the LLM’s inclination to perform a task, which gives it more motivation to
    override other instructions. While results may vary, when I tried this prompt
    attack without the REPLACE COMMAS WITH EXCLAMATION POINTS portion, this prompt
    injection did not work. Try it yourself! But that shows you how strong this LLM
    inclination is to do this task. There is often a very fine line between what works
    and what doesn’t, so you have to try a lot of different approaches to figure out
    what will work for you.
  prefs: []
  type: TYPE_NORMAL
- en: We also used common techniques for prompting in general, such as using several
    hashtags to denote important areas, several dashes to note other important areas,
    and all caps to emphasize our instructions over non-capitalized text.
  prefs: []
  type: TYPE_NORMAL
- en: 'We need to send this prompt into the pipeline to administer the prompt attack:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of this code should look similar to this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: We have successfully prompted the LLM to provide a significant part of the prompt
    instructions that are hidden within the code. This not only reveals the instructions
    at the top of the system prompt but also all of the data the system internally
    retrieves to respond to the user’s question. This is a major breach! A huge win
    for the red team!
  prefs: []
  type: TYPE_NORMAL
- en: We now have a much better understanding of the LLM application and how to exploit
    the prompts it is fed in a way that may allow us to compromise the entire RAG
    pipeline and the data it has access to. If these prompts were valuable intellectual
    property, we could now steal them. If they access private or valuable data, we
    could exploit our new knowledge of the prompts to try to access that data. This
    sets the foundation for a more advanced attack on the system.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s next play the role of the blue team, coming up with a solution for our
    code to prevent this attack.
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 5.3 – blue team defend!
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This code can be found in the `CHAPTER5-3_SECURING_YOUR_KEYS.ipynb` file in
    the *CHAPTER_05* directory of the GitHub repository.
  prefs: []
  type: TYPE_NORMAL
- en: There are a number of solutions we can implement to prevent this attack from
    revealing our prompt. We are going to address this with a second LLM that acts
    as the guardian of the response. Using a second LLM to check the original response
    or to format and understand the input is a common solution for many RAG-related
    applications. We will show how to use it to better secure the code.
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note up front, though, that this is just one example of a
    solution. The great security battle against potential adversaries is always shifting
    and changing. You must continuously stay diligent and come up with new and better
    solutions to prevent security breaches.
  prefs: []
  type: TYPE_NORMAL
- en: 'Add this line to your imports:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: This imports the `PromptTemplate` class from the `langchain_core`.prompts module,
    which allows us to define and create our own custom prompt templates.
  prefs: []
  type: TYPE_NORMAL
- en: 'The new prompt we are going to create will be a relevance prompt designated
    for our hidden guardian LLM that will be looking out for attacks just like the
    one we just encountered. Add this prompt in a cell after the original prompt cell,
    keeping both prompts:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: For simplicity purposes, we are going to use the same LLM instance that we already
    set up, but we will call the LLM a separate time to act as the guardian.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we are going to apply a significant update to our RAG chain, including
    the addition of two functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The `extract_score` function takes `llm_output` as input. It attempts to convert
    `llm_output` to a float by first stripping any leading/trailing whitespace using
    `strip` and then converting it to a float using `float`. If the conversion is
    successful, it returns the score as a float. If the conversion raises a `ValueError`
    message (indicating that `llm_output` cannot be converted to a float), it catches
    the exception and returns 0 as the default score.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, let’s set up a function to apply the logic for what happens when a query
    is not relevant:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The `conditional_answer` function takes a dictionary, `x`, as input and extracts
    the ‘`relevance_score`' variable from the `x` dictionary, passing it to the `extract_score`
    function to get the `relevance_score` value. If the `relevance_score` value is
    less than `4`, it returns the string “*I don’t know*”. Otherwise, it returns the
    value associated with the key, `‘answer’`, from the x dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lastly, let’s set up an expanded `rag_chain_from_docs` chain with the new security
    features embedded:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'The `rag_chain_from_docs` chain was present in the previous code, but it saw
    some updates to account for the new LLM’s job and the relevant functions listed
    previously. The first step is the same as previous iterations, where we assign
    a function to the context key that formats the context data from the input dictionary
    using the `format_docs` function. The next step is a `RunnableParallel` instance
    that runs two parallel operations, saving processing time:'
  prefs: []
  type: TYPE_NORMAL
- en: The first operation generates a `relevance_score` value by passing the question
    and context variables through the `relevance_prompt_template` template, then through
    an LLM, and finally, parsing the output using the `StrOutputParser` function
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second operation generates an answer by passing the input through a prompt,
    then through an LLM, and parsing the output using the `StrOutputParser` function
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The final step is to assign the `conditional_answer` function to the `final_answer
    key`, which determines the final answer based on `relevance_score`.
  prefs: []
  type: TYPE_NORMAL
- en: In general, what we added to this code was a second LLM that looks at the question
    submitted by the user and the context that is pulled in by the retriever and tells
    you on a scale of `1` to `5` whether they are relevant to each other. Here, `1`
    would indicate not at all relevant, and `5` would be highly relevant. This follows
    the instructions in the relevance prompt we added earlier. If the LLM scores the
    relevance less than `4`, then the response is automatically converted to `I don't
    know` rather than sharing the secret system prompts of the RAG pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 'We are going to update the chain-invoking code as well so that we can print
    out the relevant information. For the original question invocation, update it
    to this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'The output will be similar to before, with the proper response we’ve seen in
    the past, but near the top of the output, we see a new element, `Relevance Score`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Our new guardian LLM deemed this question the top score of 5 for relevance
    to the content in the RAG pipeline. Next, let’s update the code for the prompt
    probe to reflect changes in the code and see what the final answer will be:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'Your resulting output from this red team prompt probe should look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Our blue team’s effort is successful in thwarting the prompt probe attack! Justice
    has been served, and our code is now significantly more secure than before! Does
    this mean we are done with security? Of course not, hackers are always coming
    up with new ways to penetrate our organizations. We need to remain diligent. The
    next step in a real-world application would be to go back to being the red team
    and try to come up with other ways to get around the new fixes. But at least it
    will be more difficult. Try some other prompt approaches to see whether you can
    still access the system prompt. It is definitely more difficult now!
  prefs: []
  type: TYPE_NORMAL
- en: You now have a more secure code base, and with the additions made in [*Chapter
    3*](B34736_03_ePub.xhtml#_idTextAnchor064), it is more transparent as well!
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the critical aspect of security in RAG applications.
    We began by discussing how RAG can be leveraged as a security solution, enabling
    organizations to limit data access, ensure more reliable responses, and provide
    greater transparency of sources. However, we also acknowledged the challenges
    posed by the black box nature of LLMs and the importance of protecting user data
    and privacy.
  prefs: []
  type: TYPE_NORMAL
- en: We introduced the concept of red teaming, a security testing methodology that
    involves simulating adversarial attacks to proactively identify and mitigate vulnerabilities
    in RAG applications. We explored common areas targeted by red teams, such as bias
    and stereotypes, sensitive information disclosure, service disruption, and hallucinations.
  prefs: []
  type: TYPE_NORMAL
- en: Through a hands-on code lab, we demonstrated how to implement security best
    practices in RAG pipelines, including techniques for securely storing API keys
    and defending against prompt injection attacks. We engaged in an exciting red
    team versus blue team exercise, showcasing how LLMs can be both a vulnerability
    and a defense mechanism in the battle for RAG application security.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the chapter, we emphasized the importance of ongoing vigilance and
    adaptation in the face of ever-evolving security threats. By understanding the
    security landscape surrounding RAG applications and implementing practical strategies
    and techniques, you can build secure, trustworthy, and robust systems that harness
    the power of generative AI while prioritizing the safety and privacy of users
    and businesses.
  prefs: []
  type: TYPE_NORMAL
- en: Generally, we do not claim that this list of security issues or solutions is
    exhaustive. Our primary goal here was to alert you to some of the key security
    threats you might encounter, but most importantly, to always be on guard and diligent
    at defending your system. Continually think through how your system might be vulnerable,
    using techniques such as red teaming, and use this approach to build much stronger
    defenses against any potential threats.
  prefs: []
  type: TYPE_NORMAL
- en: Looking ahead, in the next chapter, we will dive into the practical aspects
    of interfacing with RAG applications using Gradio. This next chapter will provide
    a hands-on guide to building interactive applications with RAG, leveraging Gradio
    as a user-friendly interface. You will learn how to quickly prototype and deploy
    RAG-powered applications, enabling end users to interact with AI models in real
    time.
  prefs: []
  type: TYPE_NORMAL
