- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Building Your First AI Agent with LangChain
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the previous chapters, we explored the theory behind AI agents—their architecture,
    the role of tools, memory, and planning, and how frameworks such as LangChain
    make it possible to orchestrate these components. Now, it’s time to move from
    theory to practice.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll walk through the process of building your first AI agent
    using LangChain. We’ll do so through a practical use case: an e-commerce assistant
    for a digital *piadineria*. From understanding the scenario and assembling the
    core building blocks to developing and evaluating the agent’s performance, you’ll
    gain hands-on experience with LangChain’s capabilities. You’ll also explore how
    to trace and observe agent behavior using tools such as LangSmith, and finally,
    how to extend this assistant into a mobile experience.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'We will cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to the LangChain ecosystem
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overview of the out-of-the-box components
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use case – e-commerce AI agent
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By the end of this chapter, you’ll not only have a working AI agent prototype—you’ll
    also understand the patterns and components needed to build and maintain intelligent,
    trustworthy assistants in real-world applications.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  id: totrans-9
  prefs:
