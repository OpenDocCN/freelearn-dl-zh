- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Insights and Future Directions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We have made the case for how to build AI-enabled systems. Building AI-enabled
    systems is a challenge. There exist high expectations for the system and the likelihood
    that the software system is complex. There are several ways for a software development
    effort to fail; these range from not understanding key requirements, a technology
    not performing as expected, an erroneous system design, and compute, storage,
    or data flows being misunderstood. A major driver for failure is that humans can
    lose trust in the system if outputs are inconsistent, wrong, or just not sensible.
    AI-enabled systems have these risks plus algorithmic complexity, sensitive to
    off-nominal scenarios, and data inputs being off. A key driver of AI system failures
    is that users lose trust or have low confidence in the results provided by the
    system. AI-enabled systems must be built from inception so that they will utilize
    AI technologies. These systems must address decision-making without a human in
    the full inference or control cycle. The authors propose that architecture concepts
    and practices provide a mechanism to tame complexity and ensure that the correct
    system is built and built correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Architecture
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The role of an architect is both centuries old and a modern practice. This role
    cuts across many domains where complex systems are built. One now hears of architects
    in domains from semiconductors, aerospace, software, devices, autonomous systems,
    robotics, and others. The case has been made for the use of architecture concepts
    to deliver AI-enabled software systems. The implementation of disciplined architecture
    processes provides for a coherent vision of the end system. It also ensures that
    the correct system is being built. This is done by giving time and space for the
    key stakeholders, a mechanism to have their needs, desires, and concerns communicated.
    The architect team also has the charge of providing documentation. This documentation
    provides a mechanism to enable unity of effort across the technical team from
    requirements engineers, systems engineers, software engineers, and testers. Taking
    a holistic perspective, the architect ensures that a balanced design and appropriate
    mitigations are put in place.
  prefs: []
  type: TYPE_NORMAL
- en: If one takes away only one lesson from this book, it is that an architect must
    identify, communicate, document, and ensure that designs satisfy the non-functional
    requirements of the system. Almost certainly, the designs to meet the non-functional
    requirements of the end system impact the AI implementation, and vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: The architect is pivotal for the execution of the engineering and building of
    the end system. The architect abstracts and usually conducts the system partitioning
    to enable the execution of software development across teams so that a unity of
    effort exists. The software engineering teams require documentation to understand
    how their respective parts of the system fit into the greater whole of the system.
    The documentation developed by the architect should encompass both written documents
    and modeling diagrams. The written artifacts should be, at a minimum, a concept
    of operations, a requirements specification, and key use cases. The modeling diagrams
    should include a logical block, activity, sequence, interface, use case, and state
    machine diagrams. Finally, there should be a diagram of the physical compute,
    storage, and networking hardware and specifications that are to be used. The architect
    must also work with the project and program managers to inform project control,
    scope, schedule, and resource management. The architect provides insight and feedback
    to inform project management tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Building AI-enabled systems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We discussed the importance of software engineering for successful systems deployment.
    As of this writing, AI systems are primarily realized in software. Thus, one needs
    to grapple with classic software engineering risks. It was highlighted that the
    AI models or techniques used will most likely not be developed from the ground
    up. There exist many open source software libraries or references to lean on to
    build the major components of a system. In successfully built systems, a key enabler
    is to develop the system faster, for more time to develop, prototype, test, and
    learn.
  prefs: []
  type: TYPE_NORMAL
- en: The system and use of AI are very specific to the organization, domain, and
    needs of the stakeholders. It is naive to think that one can simply lift or update
    a prior system built for another domain.
  prefs: []
  type: TYPE_NORMAL
- en: It was pointed out that the overall complexity of systems drives software development
    risks. A disciplined approach and use of software building methodologies mitigate
    development risks. We highlighted the role of integration risks and methods to
    mitigate those risks. Integration efforts need to be accounted for and continuously
    considered.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the role of the architect in project management was highlighted. Many
    times, development teams and groups are organized around the software architecture
    itself.
  prefs: []
  type: TYPE_NORMAL
- en: The architect provides insight into how well a system is being built and whether
    key project milestones are occurring and at the expected level of cost and schedule.
    They also have a role in informing the staffing needs of the project.
  prefs: []
  type: TYPE_NORMAL
- en: Data engineering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'A principal insight in this new era of data analytics and science is that a
    system’s effectiveness is dependent on the quality of the data. This truism applies
    to the training and configuring of models, inference, the validation processes,
    and the production data. This has led to the emergence of a new engineering sub-specialty:
    the data engineer.'
  prefs: []
  type: TYPE_NORMAL
- en: The data engineer must deal with the volume, velocity, variety, and provenance
    of the total data ecosystem. The field of data engineering is still in its early
    stages. These activities are now recognized as an engineering sub-specialty rather
    than “just data processing.” When one engineers a system, the concepts and processes
    of architecture come to the fore. The data engineering efforts require the scoping
    of the data volumes, processing needs, storage capacity, and networking infrastructure.
    These analyses impact the planning of required hardware and software tooling.
  prefs: []
  type: TYPE_NORMAL
- en: As part of the architecting process, considerations must be made for the role
    of data quality. Data quality spans integrity, format, and consistency. We discussed
    how the architect needs to ensure that data quality concerns and issues are readily
    addressed either through active means or fallback capabilities. Of note is that
    data quality issues many times lead to errors or inconsistencies that can impact
    the trust of the inferences made by the system.
  prefs: []
  type: TYPE_NORMAL
- en: To reiterate, key components of the data engineering process require a first-order
    understanding of datasets themselves and the computing characteristics to enable
    the execution of models.
  prefs: []
  type: TYPE_NORMAL
- en: Data analytics and models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The heart of an AI system is the learning component – the place where the “smarts”
    of the system reside. Matching the right technique to customer objectives drives
    the technical teams’ implementations. Many times, an architecture must be able
    to support different types of techniques to solve a specific problem: the importance
    of matching the relevant technique to a customer domain and the importance of
    visualization, and how the architecture should be used for capturing model performance
    metrics.'
  prefs: []
  type: TYPE_NORMAL
- en: It is important to address model quality monitoring to aid in troubleshooting
    and monitoring of the system. The use of canaries and robust gold standard testing
    is key so that the decisions that are driven by the model are correct.
  prefs: []
  type: TYPE_NORMAL
- en: The authors are quite confident that many more techniques will be created and
    deployed. It is the charge of the architect to design and build robust systems
    to deal with this uncertainty. The aspiring AI architect should take this challenge
    head-on.
  prefs: []
  type: TYPE_NORMAL
- en: Conceptual design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we have said throughout the book, the architect defines the conceptual foundations
    of the system to be built. The conceptual design captures the abstractions, functions,
    actors, and processes of the to-be-built system. The conceptual design and its
    associated artifacts should guide the reasoning, clarification, communication,
    and planning that underpin the actual system development. We highlighted that
    some of the key aspects of the conceptual design are to enable the communication
    of a clear rationale of the system and the value the new system shall deliver.
    The conceptual design documents the limitations of the current system. It also
    documents the challenges that need to be overcome and opportunities to be realized.
  prefs: []
  type: TYPE_NORMAL
- en: As has been laid out, the conceptual design activities should identify the major
    objectives of the system and how AI will be used. During this phase, the architect
    needs to balance the many stakeholders of the new system. A key consideration
    is the end user of the system and how the new system shall impact them. The conceptual
    design should also inform the non-technical aspects of the system development,
    such as cost and schedule constraints.
  prefs: []
  type: TYPE_NORMAL
- en: Known and true approaches to realize these are to use scenarios and conduct
    requirements engineering processes. These processes should be done at the very
    start of the project and revisited as systems development occurs. By revisiting
    requirements engineering processes, the impact of learning and feedback can be
    captured and inform further development. The development of scenarios and the
    conduct of requirements engineering must involve the full span of stakeholders
    to mitigate the risk that a key requirement is missed or misunderstood.
  prefs: []
  type: TYPE_NORMAL
- en: Not all systems development efforts are the same. Some projects may be as small
    as a few engineers to many dozens of engineers or more, but the value of documentation
    is constant, despite the size of the project. The documentation can span simple
    PowerPoint slides, spreadsheets, and full enterprise diagramming tools and requirements
    management databases. These documents should also be managed under a configuration
    control mechanism, as they can be a formal contract deliverable for the project.
  prefs: []
  type: TYPE_NORMAL
- en: 'The conceptual design culminates with a series of artifacts:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Concept of operations document: This document describes the to-be-built system
    from the perspective of the user. It captures the key business goals and objectives
    that the system is to help realize. It lays out the major constraints and assumptions
    that underpin the system’s development, and the metrics and attributes that are
    used to judge the performance and acceptance of the system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Requirements specifications: This document uses traditional requirements engineering
    processes of customer elicitation, workshops, brainstorming, modeling and simulation,
    mock-ups, and prototyping to describe all the many facets of what an operational
    system needs to do to ensure that it is successfully built.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Modeling diagrams: The key diagrams here are use case diagrams, logical structure,
    behavioral diagrams, physical allocation, and interface definitions. This set
    of artifacts provides insight into the requirements specifications and aids in
    system design efforts. These diagrams also enable a first understanding of how
    the system is going to work.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Technical development plan: This document details both the project capability
    that needs to be realized and the associated schedule gates.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Design, integration, and testing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A key theme we tried to convey was that an architect’s role does not stop with
    the conceptual design. As an architect, one is judged by what is built and how
    well the system performs. A successful system is one that meets the many needs
    of the customer and that delivers the value expected of it. It is at this phase
    that the transition goes to actual development, and software engineering occurs.
    A critical role the architect plays is to ensure that the key non-functional or
    quality requirements are realized in the design.
  prefs: []
  type: TYPE_NORMAL
- en: We discussed the use of tactics and patterns to build software. In looking to
    solve existing design challenges, the use of tactics and patterns has shown itself
    to be quite powerful. The tactics and patterns we laid out are some that the authors
    found helpful. We think the use of tactics and patterns aids in managing complexity
    and improves communications across the engineering teams. The use of patterns
    is not a strict mandate. In building complex software, every system, use case,
    domain, and customer is different, so the use of tactics and patterns is left
    to the judgment of the architect.
  prefs: []
  type: TYPE_NORMAL
- en: Once the software is realized in code, the need for integration and testing
    comes to the fore. Integration should be done methodically and be timely. Many
    times, it is at integration that system-level effects are first realized. Integration
    challenges must be addressed from a holistic perspective. What one engineer would
    consider a minor change may have dramatic impacts on another part of the system.
    Integration is also where the potential friction comes out within and between
    teams. As mentioned, it is here that the big picture and vision of the architect
    can be used to ensure that integration remedies do not contradict or compromise
    the software system.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the architect at the end of development activities reviews test plans
    and testing results.
  prefs: []
  type: TYPE_NORMAL
- en: In modern software practices, there should be a culture of continuous testing.
    This ensures that errors and misunderstandings are discovered as soon as possible.
    The notion of waiting for a single point in time or event to do testing is a recipe
    for disaster. Testing should cover as many layers of the system, test interfaces,
    and load testing to ensure that the design and implementation are correct. The
    architect uniquely certifies that the correct system was built correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Future directions of AI and architecture
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI systems and advanced software are going to continue to redefine many domains.
    There will be many new opportunities identified where AI technology can be used
    in a new or novel manner. The building of AI systems on a large scale and across
    our many areas of life is just beginning. Future directions for software development
    should look to aid in the requirements engineering of systems that involve decision-making
    for both inference and control. Robust modeling and simulation standards for the
    development of AI systems shall aid in specifying the overall quality and reliability
    of systems.
  prefs: []
  type: TYPE_NORMAL
- en: A future enabler for the design process includes the human as both a user and
    contributor to system functionality. Also, the use of tactics and patterns for
    AI systems needs to be better defined and given more specificity. Robust tactics
    need to be defined and capture how designs can be impacted by AI-centric patterns.
    We also need to address that software development itself is now being impacted
    by AI technologies. These new tools for development are powerful, can save time,
    and can give interesting insight, but they are not a replacement for the high
    cognitive thinking that is done by an architect.
  prefs: []
  type: TYPE_NORMAL
- en: Looking ahead, AI agents are poised to take on much more than simple automation.
    With the continued advancement of large language models and generative AI, these
    agents are becoming capable digital collaborators. They will be able to reason,
    learn from experience, and coordinate with other systems to achieve complex goals.
    In the near future, we can expect to see networks of agents working across industries,
    improving workflows, supporting decision-making, and enhancing human capabilities.
    This book is designed not only to help you build intelligent systems today but
    also to prepare you to take part in shaping the intelligent systems of the future.
  prefs: []
  type: TYPE_NORMAL
- en: Moving forward
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The book has laid out a whirlwind of concepts, insights, and lessons learned.
    The best way to master this field is by doing – doing concepts of operations,
    working on defining use cases, conducting requirements elicitation, modeling,
    design activities, conducting testing, and working with customers. Learning how
    to be a competent architect is hard, and there are no guaranteed right guides
    or processes. We hope this book can be used as a reference for developing one’s
    architectural knowledge and instincts. The journey to becoming an architect is
    like steadily climbing a never-ending mountain – but this just makes the view
    get better.
  prefs: []
  type: TYPE_NORMAL
- en: Good luck. Go forth and build systems that impact us all!
  prefs: []
  type: TYPE_NORMAL
