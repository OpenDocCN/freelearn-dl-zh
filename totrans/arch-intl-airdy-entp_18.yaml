  zh: 第三部分：
- en: The Future of Intelligent Enterprise
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能企业的未来
- en: This set of chapters looks ahead to how AI systems, and the enterprise platforms
    they rely on, must evolve. From rethinking legacy document stores to implementing
    causal intelligence, Model Context Protocol, and agentic orchestration at scale,
    this part outlines the architectural patterns and operating models that will define
    the next generation of intelligent enterprise systems.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这套章节展望了AI系统及其依赖的企业平台必须如何发展。从重新思考传统文档存储到实施因果智能、模型上下文协议和大规模代理编排，本部分概述了将定义下一代智能企业系统的架构模式和运营模式。
