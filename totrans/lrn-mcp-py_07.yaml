- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Building Clients
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To consume an MCP server, you need some form of client. You could, for example,
    use an application such as **Claude Desktop** or **Virtual Studio Code** (**VS
    Code**), as they have the ability to consume MCP servers and will handle the discovery
    of features and be able to use them. There are also cases where you want your
    own written client. A good example of this situation is when you want to build
    in AI capabilities as part of your app. Imagine, for example, that you have an
    e-commerce app and want to have an AI-improved search. The MCP server would be
    a separate app, whereas the client would be built into the e-commerce app.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: With this in mind, let’s explore how we can build a client and what goes into
    it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will learn how to do the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Build a client using both STDIO and SSE transports
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consume an MCP server and its features
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leverage an LLM to enhance your client experience
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The chapter covers the following topics:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Building a client
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Exercise: Building a client'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clients with LLMs
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Working with an LLM
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Exercise: Integrating the LLM'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Building a client
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'So, what goes into building a client? At a mile-high level, here’s what we
    need to do:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Set up the client to connect to the server.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: List features.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select a feature to use.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prompt the user for parameters.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Present the results.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Great, now that we understand the high-level steps, let’s see if we can build
    it next in an exercise that you’re welcome to code along with.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise: Building a client'
  id: totrans-22
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this exercise, you will build a client that connects to the server and consumes
    its features. You will use the SDK to build the client and call the server. The
    client will be a simple command-line application that allows you to select a feature
    and provide its parameters. The client will then call the server and display the
    results.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Set up the client to connect to the server
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s first create the client code needed to establish a connection to the
    server:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Created a `StdioServerParameters` object that specifies the command to run the
    server and any optional command-line arguments. Why we do this is because the
    server will be run at the same time as the client, so we need to specify how to
    run it.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defined a `run` function that creates a `ClientSession` object and initializes
    the connection to the server. Inside the `run` function, we will soon add the
    code to list and call features.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: List features
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So far, we’ve set up the client to connect to the server. Now, let’s add the
    code to list the features available on the server. This is done differently depending
    on the type of feature. Let’s add some code:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'There, we have the following code to list the features:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '`List available resources`: This lists all the resources available on the server.
    We also print the resource name to the console.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`List available tools`: This lists all the tools available in the server, and
    we print the tool name to the console. We could also print the tool description
    and input schema, but for now, we just print the name.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Select a feature to use
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s show how to use our listed features by taking one of the tools and calling
    it. In this case, we will use the `add` tool that we created in the previous chapter.
    The `add` tool takes two parameters, `a` and `b`, and returns the sum of the two
    numbers. However, imagine now the user has been presented with a list of tools
    and chosen a tool. Let’s now prompt the user for the parameters needed to call
    the tool:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Read the name of the first tool in the list and printed it to the console.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompted the user for the first and second value to use as parameters for the
    tool.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Called the tool using the `call_tool` method and passed the parameters as a
    dictionary. The result is printed to the console.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Great, now we have a client that can connect to the server, list the features,
    and call a tool. However, this is still quite programmatic and not very user-friendly.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: The full code
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we move on to integrate an LLM, let’s show the complete code for the
    client:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Okay, if you typed along with the code, you should now have a working client
    that can connect to the server and consume its features. You will get an additional
    chance to practice this in the assignment at the end of this chapter.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Let’s improve the client next by integrating an LLM into it. You will get to
    see how this offers a better user experience and how it can be used to abstract
    away the complexity of using the server.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Clients with LLMs
  id: totrans-49
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So far, you’ve seen how you can build and test a client using STDIO and SSE.
    However, you might have noticed how this approach is quite programmatic and not
    very user-friendly. That is, for each capability you want to use, you need to
    know the exact name of the feature and its parameters. This is where LLMs come
    in. By involving an LLM in the client, you can abstract away the *knowing* part
    and instead focus on the *doing* part. Here’s how it works.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Before using an LLM
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s how you would build an app without an LLM and how the flow in the app
    would be:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: List server features.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The user selects a feature and the client asks for the parameters.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Do something with the response.
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This approach is quite rigid and requires the user to explicitly know and select
    one of the features listed. So, what’s better?
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: After involving an LLM
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To address clients that feel rigid, imagine instead that the user doesn’t know
    about the features; they only communicate with prompts. With that thought in mind,
    now let’s look at the flow of the app:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: List server features.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Convert the list of features into an LLM tool.
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The user types a natural language request.
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The client sends the request to the LLM, which figures out which feature to
    use and what parameters to send, and if there’s no matching feature, responds
    with a generic LLM response.
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The difference in user experience is quite significant. This second approach
    means the user no longer needs to know about the features, and doesn’t need to
    select features to use. Instead, the user can just type a natural language request,
    and the LLM will figure out the rest.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how this works in practice.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Working with an LLM
  id: totrans-65
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are many AI providers out there that let you call an LLM. In this book,
    we will use **GitHub Models**, as that’s a free option, and all you need to use
    it is a GitHub account. To use GitHub Models, you will either need to start your
    project in GitHub Codespaces or set up a **personal access token** (**PAT**) with
    the right permissions. The reason you need a token in the first place is that
    you are calling an API, and the token is used as a bearer token to authenticate
    the request. To use a local AI model via, for example, **Ollama**, you wouldn’t
    need a token. You can type the token directly in the source code, but it’s recommended
    to keep it in an environment variable for security reasons.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: So, what do we need to know if we’ve never worked with AI before? Well, the
    idea is to send in a prompt and get back a response. The prompt is natural language
    text that describes what you want the LLM to do. The response is also natural
    language text that contains the answer to your prompt.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: To use LLM in combination with MCP, however, the idea is to have the LLM indicate
    which functions to call given a specific prompt. For example, with the prompt
    `Add 1 and 2`, the LLM should indicate that the `add` function should be called
    with the parameters `a=1` and `b=2`, if we have defined an `add` function in the
    MCP server with that name and parameters.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what the calling code looks like. In the following code, we will be calling
    a GitHub model, so make sure you have a GitHub account and have created a PAT
    with the right permissions, or start it in GitHub Codespaces.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 'What’s important to define is the following:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: The endpoint for GitHub Models
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model to use – in this case, `gpt-4o`
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The prompt to send in – you can collect this data from a user input or hardcode
    it, as in the following example
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The functions to use – in this case, we will be using the `add` tool that we
    created in the previous chapter
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s entirely possible to just send a prompt and get a response back, but in
    this case, we want the LLM to indicate which function to call, so we will be sending
    in a function definition as well. A **function definition** is a JSON object that
    describes the function name, description, and parameters. The parameters are defined
    using JSON schema.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: It’s worth mentioning though that, additionally to prompts, you can also send
    in configuration to the LLM, such as `temperature`, `max_tokens`, and `top p`.
    We won’t dive into what these parameters mean – you can read more about them in
    the OpenAI documentation – but in short, they control the randomness and creativity
    of the LLM response and also the size of what’s known as the context window.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise: Integrating the LLM'
  id: totrans-78
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'So, let’s see how we can integrate an LLM into the client. The goal is to have
    a much better user experience and to abstract away the complexity of using the
    server. To get there, we will need to take the following steps:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '**List server features**: By listing the features, we can see what we have
    available to us'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Convert the list of features to an LLM tool**: The features from the MCP
    server are not directly usable by the LLM, so we need to convert them into a format
    that the LLM can understand'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Manage user input**: This will allow the user to type a natural language
    request and the LLM on our client will make a completion request, and in doing
    so, tell us which feature to use and what parameters to send.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s do this!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: List server features
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You might be building this client as the first thing you do if you, for example,
    are consuming someone else’s MCP server. In that case, make sure you install the
    MCP SDK before proceeding.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: 'The first step is no different from what we did before. We need to list the
    features available on the server. This is done by a call to listing tools, like
    so:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Convert the list of features into an LLM tool
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Our next step is important, as we’re going to convert the list of features
    into a format that the LLM can understand. This will set us up for the next step,
    where we will use the LLM to figure out which feature to use. Here’s the conversion
    code:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s add the conversion code function:'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-91
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The preceding code defines a function that takes a tool as input and converts
    it into a format that the LLM can understand.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s call the conversion code:'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-94
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: From the code, you can see that we loop through the tools’ response and call
    the conversion code for each tool.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: Great, now we are well set up for using the LLM. The next step is to manage
    user input and send a completion request to the LLM. In the response from the
    LLM, the LLM will tell us which function to use and what parameters. In this case,
    the function to call will be a feature on the server.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: The user types a natural language request and the LLM makes a completion request
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s look at how we can call the LLM now that we have tools for it to use.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two parts to this: the first part is to call the LLM, and the second
    part is to learn whether the LLM has returned a function call or a generic response.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: 'Make the LLM call:'
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-101
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Created a function that takes a prompt and the list of functions as input and
    returns the LLM response.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Called the LLM using the `complete` method and passed the prompt and functions
    as parameters. The response is printed to the console.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s check whether the LLM returned a function call by adding the following
    code:'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-106
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Checked whether the LLM returned a function call by checking whether the `tool_calls`
    property is present in the response message
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Looped through the `tool_calls` and printed the tool name and arguments to the
    console
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Returned the list of functions to call
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The client figures out which server feature to use and what parameters to send
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'At this point, we have the LLM response, and it even returns which functions
    to call, if any. The next step is to check the functions to call and call the
    MCP server if needed:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'In the preceding code, we’ve done the following:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Called the LLM and got the functions to call.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Looped through the functions to call and called the MCP server using the `call_tool`
    method. The result is printed to the console.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nice, right? The user is surely thanking you now for making their life easier,
    as they can use natural language to interact with the server.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-118
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’ve explored how to build clients that can connect to an
    MCP server and consume its features. We started by building a simple client that
    could list and call features on the server. We then improved the client by integrating
    an LLM, which allowed us to create a much better user experience by enabling natural
    language interactions with the server.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will explore how to consume an MCP server using VS Code
    and Claude for desktop.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Assignment
  id: totrans-121
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'For this assignment, you will once again focus on e-commerce. You will build
    an experience where the user can interact with an e-commerce server:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Ask for products of a certain category
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add products to the cart, all done using natural language
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solution
  id: totrans-125
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Here’s a solution for a client. It covers both clients with and without an LLM.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: "You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter07/solutions/README.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Ch\uFEFF\
    apter07/solutions/README.md)."
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Quiz
  id: totrans-128
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What can a client access on an MCP server?
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: 'A: Prompts, tools, and resources'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'B: Tools, prompts, and services'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'C: Tools and prompts'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What’s the benefit of adding an LLM to your client?
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: 'A: It’s better to place the LLM on the server'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'B: It makes the client faster'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'C: An LLM on the client allows the end user to use prompts to interact with
    the server, which makes for a much better user experience'
