- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: Configuring an Environment to Support AI Services
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置支持AI服务的环境
- en: In this chapter, we’re going to begin exploring how to obtain and set up the
    various services and environments you’re going to need to perform the exercises
    in this book.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将开始探索如何获取和设置您将需要执行本书练习的各种服务和环境。
- en: Since this book is primarily focused on working with the AI services available
    in the Microsoft ecosystem, we’ll spend the most time working with the Azure and
    Power Platform services. At the end of the chapter, we’ll walk through getting
    connected to other AI platforms in case you want to use those as part of your
    learning as well.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由于本书主要关注与Microsoft生态系统中的AI服务一起工作，我们将花费大部分时间与Azure和Power Platform服务一起工作。在本章结束时，我们将介绍如何连接到其他AI平台，以防您想将它们作为学习的一部分。
- en: Note
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Some of these services may have free trials available for individual interactive
    usage, but most will require some form of payment for anything that accesses resources
    programmatically, such as from a Power App. You may need to budget accordingly
    to take full advantage of the available platforms.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一些服务可能提供个人交互使用的免费试用，但大多数将需要某种形式的支付，以便任何以编程方式访问资源（如从Power App）的用户。您可能需要相应地制定预算，以充分利用可用的平台。
- en: For those who are only going to use AI in low-code scenarios (such as AI Builder
    or as OpenAI actions in Power Apps or Power Automate), configuring the OpenAI
    service resources in Azure may not be necessary, and you can skip to the *Configuring
    Power Platform* section. However, if you want to dive deeper into the world of
    AI-enabled services with what Azure has to offer, keep reading.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些只会在低代码场景（如AI Builder或Power Apps或Power Automate中的OpenAI动作）中使用AI的用户，配置Azure中的OpenAI服务资源可能不是必需的，您可以跳转到*配置Power
    Platform*部分。然而，如果您想深入了解Azure提供的AI服务世界，请继续阅读。
- en: Configuring Azure
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置Azure
- en: There are a number of ways to use OpenAI-based services such as ChatGPT in the
    Azure environment. Depending on your context, you may be willing to use a public
    service such as ChatGPT for your generative needs. However, if you want to configure
    OpenAI to work against your own dataset within the boundaries of your Azure tenant,
    you’ll want to request access to Azure OpenAI Service.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在Azure环境中，有几种方式可以使用基于OpenAI的服务，如ChatGPT。根据您的上下文，您可能愿意使用公共服务如ChatGPT来满足您的生成需求。但是，如果您想在Azure租户的范围内配置OpenAI以处理您自己的数据集，您将需要请求访问Azure
    OpenAI服务。
- en: One of the many benefits of enabling OpenAI in your Azure tenant is that you
    can connect it to your own tenant data. When you start to review the terms of
    service for public or free AI interfaces, you’ll notice that the service providers
    can claim ownership over the results that you produce, as well as use the data
    you supply to further train models. If your goal is to use AI to work against
    your own proprietary data (which may contain anything from **personally identifiable
    information** (**PII**) to trade secrets), you need to be assured that you remain
    in control (both from a data stewardship perspective as well as a content ownership
    perspective) of any data that passes through the system.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的Azure租户中启用OpenAI的好处之一是您可以将其连接到您自己的租户数据。当您开始审查公共或免费AI接口的服务条款时，您会注意到服务提供商可以声称拥有您产生的结果的所有权，以及使用您提供的数据来进一步训练模型。如果您旨在使用AI来处理您自己的专有数据（这可能包含从**个人身份信息**（PII）到商业机密的各种内容），您需要确保您始终控制着通过系统传输的任何数据（从数据治理的角度以及内容所有权的角度来看）。
- en: Note
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: OpenAI does offer an enterprise subscription for ChatGPT that protects your
    prompts, source data, and results from being used to train the general model.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI为ChatGPT提供企业订阅，可以保护您的提示、源数据和结果不被用于训练通用模型。
- en: Requesting API access for Azure OpenAI services
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为Azure OpenAI服务请求API访问
- en: Due to the rapidly evolving nature of AI services and the potential risks that
    **generative AI** (**GenAI**) poses, Microsoft has gated access to OpenAI services.
    As part of its responsible AI commitments, Microsoft works to ensure that the
    services it provides are being used in a way that is safe.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由于AI服务的快速发展和**生成AI**（GenAI）可能带来的潜在风险，Microsoft限制了访问OpenAI服务。作为其负责任的AI承诺的一部分，Microsoft致力于确保其提供的服务以安全的方式被使用。
- en: In order to use Azure services, you will need an Azure subscription.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用Azure服务，您需要一个Azure订阅。
- en: Tip
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: To find your Azure subscriptions, navigate to the Azure portal ([https://portal.azure.com](https://portal.azure.com))
    and type `Subscriptions` in the **Search** bar. The subscription ID is formatted
    as a GUID, which you will need to provide during the request process. For more
    information on viewing your Azure subscriptions, see [https://learn.microsoft.com/en-us/azure/azure-portal/get-subscription-tenant-id](https://learn.microsoft.com/en-us/azure/azure-portal/get-subscription-tenant-id).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 要查找您的 Azure 订阅，请导航到 Azure 门户 ([https://portal.azure.com](https://portal.azure.com))
    并在 **搜索** 栏中输入 `Subscriptions`。订阅 ID 的格式为 GUID，您在请求过程中需要提供。有关查看您的 Azure 订阅的更多信息，请参阅
    [https://learn.microsoft.com/en-us/azure/azure-portal/get-subscription-tenant-id](https://learn.microsoft.com/en-us/azure/azure-portal/get-subscription-tenant-id)。
- en: 'To begin requesting access to Azure OpenAI services, follow these steps:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始请求访问 Azure OpenAI 服务，请按照以下步骤操作：
- en: With a browser, navigate to [https://aka.ms/oai/access](https://aka.ms/oai/access).
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用浏览器，导航到 [https://aka.ms/oai/access](https://aka.ms/oai/access)。
- en: '![Figure 2.1 – Requesting access to Azure OpenAI services](img/B21234_02_001.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.1 – 请求访问 Azure OpenAI 服务](img/B21234_02_001.jpg)'
- en: Figure 2.1 – Requesting access to Azure OpenAI services
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.1 – 请求访问 Azure OpenAI 服务
- en: Fill out the form with your name and Azure subscription IDs.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用您的姓名和 Azure 订阅 ID 填写表格。
- en: 'Select which Azure OpenAI services you want to use. The available options are
    **Text and code models** and **DALL-E 2 models**. See *Figure 2**.2*:'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择您想要使用的 Azure OpenAI 服务。可用的选项包括 **文本和代码模型** 和 **DALL-E 2 模型**。请参阅 *图 2.2*：
- en: '![Figure 2.2 – Selecting Azure OpenAI service models](img/B21234_02_002.jpg)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.2 – 选择 Azure OpenAI 服务模型](img/B21234_02_002.jpg)'
- en: Figure 2.2 – Selecting Azure OpenAI service models
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.2 – 选择 Azure OpenAI 服务模型
- en: Select use cases for each model. When selecting use cases, be aware that selecting
    **Most Valuable Professional (MVP) or Regional Director (RD) Demo Use** will result
    in denial if you are not currently a Microsoft MVP or RD.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每个模型选择用例。在选择用例时，请注意，如果您不是当前的微软 MVP 或 RD，选择 **最有价值专家 (MVP) 或区域总监 (RD) 演示用**
    将导致拒绝。
- en: Ensure you fill out any required fields, such as your organization’s phone number
    or company website.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保填写所有必填字段，例如您组织的电话号码或公司网站。
- en: For *question 18*, you must select **I acknowledge these terms apply to use
    the Azure OpenAI Service**. Read the terms linked in the question, including legal
    terms, support terms for products in Azure Previews, as well as the Code of Conduct
    for Azure OpenAI Service.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 **问题 18**，您必须选择 **我承认这些条款适用于使用 Azure OpenAI 服务**。阅读问题中链接的条款，包括法律条款、Azure
    预览版产品的支持条款，以及 Azure OpenAI 服务的行为准则。
- en: For *question 19*, you must select **Yes, I attest** to confirm adherence with
    the service requirements and to acknowledge that Microsoft is monitoring the use
    of completions and generations APIs.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 **问题 19**，您必须选择 **是的，我声明** 以确认符合服务要求，并承认微软正在监控完成和生成 API 的使用。
- en: Click **Submit**.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **提交**。
- en: The form will be sent to Microsoft for review and approval. Currently, it takes
    approximately 10 business days for a request to be reviewed. Once your access
    has been approved, you’ll be able to create and use OpenAI resources in the Azure
    portal.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 表格将被发送到微软进行审查和批准。目前，请求审查大约需要 10 个工作日。一旦您的访问得到批准，您就能在 Azure 门户中创建和使用 OpenAI 资源。
- en: Setting up OpenAI service resources in Azure
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Azure 中设置 OpenAI 服务资源
- en: Once you’ve been approved by Microsoft for OpenAI services in your Azure tenant,
    it’s time to set it up!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦微软批准了您在 Azure 租户中的 OpenAI 服务，就到了设置它的时候了！
- en: All of the services you need to work with OpenAI already exist—they’re just
    waiting to be enabled. To take advantage of the examples in this book, you’ll
    need to register several resource providers.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要与 OpenAI 一起工作的所有服务已经存在——它们只是等待被启用。为了利用本书中的示例，您需要注册几个资源提供者。
- en: An Azure resource provider is a collection of REST operations designed to support
    the functionality of a specific Azure service, such as *Microsoft.Search* for
    the Azure Cognitive Search service. This provider specifies the REST operations
    used to manage various aspects of the service, including configuring search indices
    and enabling the development of semantic search-based apps.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: Azure 资源提供者是一组 REST 操作，旨在支持特定 Azure 服务的功能，例如用于 Azure 认知搜索服务的 *Microsoft.Search*。此提供者指定用于管理服务各个方面的
    REST 操作，包括配置搜索索引和启用基于语义搜索的应用程序的开发。
- en: 'Resource providers are registered and enabled per subscription. In this section,
    we’ll take the necessary steps to enable connections that will support using Azure
    OpenAI services later:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 资源提供者按订阅进行注册和启用。在本节中，我们将采取必要的步骤来启用支持以后使用 Azure OpenAI 服务的连接：
- en: Navigate to the Azure portal ([https://portal.azure.com](https://portal.azure.com))
    and select **Subscriptions**.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 Azure 门户 ([https://portal.azure.com](https://portal.azure.com)) 并选择 **订阅**。
- en: Select one of the subscriptions that you used to register for OpenAI Service
    access.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择您用于注册 OpenAI 服务访问的订阅之一。
- en: 'Under **Settings**, select **Resource providers**, as shown in *Figure 2**.3*:'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **设置** 下，选择 **资源提供者**，如图 *图 2*.3* 所示：
- en: '![Figure 2.3 – Navigating the Azure subscription](img/B21234_02_003.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.3 – 导航 Azure 订阅](img/B21234_02_003.jpg)'
- en: Figure 2.3 – Navigating the Azure subscription
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.3 – 导航 Azure 订阅
- en: 'From the list of resource providers, select **Microsoft.AppConfiguration**:'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从资源提供者列表中选择 **Microsoft.AppConfiguration**：
- en: '![Figure 2.4 – Selecting the Microsoft.AppConfiguration resource provider](img/B21234_02_004.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.4 – 选择 Microsoft.AppConfiguration 资源提供者](img/B21234_02_004.jpg)'
- en: Figure 2.4 – Selecting the Microsoft.AppConfiguration resource provider
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.4 – 选择 Microsoft.AppConfiguration 资源提供者
- en: Click **Register**.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **注册**。
- en: 'Repeat *steps 4* and *5* for the following service providers that will be used
    throughout this book:'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于本书中将使用的以下服务提供者，重复 *步骤 4* 和 *步骤 5*：
- en: Microsoft.AppPlatform
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.AppPlatform
- en: Microsoft.App
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.App
- en: Microsoft.Authorization
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.Authorization
- en: Microsoft.BotService
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.BotService
- en: Microsoft.CognitiveSearch
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.CognitiveSearch
- en: Microsoft.CognitiveServices
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.CognitiveServices
- en: Microsoft.Insights
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.Insights
- en: Microsoft.Logic
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.Logic
- en: Microsoft.ManagedIdentity
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.ManagedIdentity
- en: Microsoft.KeyVault
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.KeyVault
- en: Microsoft.Storage
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.Storage
- en: Microsoft.Web
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Microsoft.Web
- en: As you expand your use cases with Azure OpenAI, you’ll need these enabled to
    start working with the models and services.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用 Azure OpenAI 扩展你的用例时，你需要启用这些功能以开始与模型和服务一起工作。
- en: Configuring API access for ChatGPT
  id: totrans-59
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置 ChatGPT 的 API 访问
- en: While anyone can browse to OpenAI and use ChatGPT for free interactively, you’ll
    need to obtain API access if you want to start using ChatGPT in your apps and
    automations.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然任何人都可以浏览到 OpenAI 并免费交互式地使用 ChatGPT，但如果你想在应用程序和自动化中使用 ChatGPT，你需要获得 API 访问权限。
- en: 'To sign up for API access, follow these steps:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 要注册 API 访问，请按照以下步骤操作：
- en: With a browser, navigate to [https://beta.openai.com/signup](https://beta.openai.com/signup).
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用浏览器，导航到 [https://beta.openai.com/signup](https://beta.openai.com/signup)。
- en: On the **Create your account** page, enter an email address and click **Continue**.
    Alternatively, you could use an OAuth connection to authenticate with Google,
    a Microsoft account, or an Apple ID.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **创建您的账户** 页面上，输入一个电子邮件地址并点击 **继续**。或者，您可以使用 OAuth 连接通过 Google、Microsoft 账户或
    Apple ID 进行身份验证。
- en: Enter a password for your new OpenAI account and click **Continue**.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为您的新 OpenAI 账户输入一个密码并点击 **继续**。
- en: Check the account you provided during *step 2* for a confirmation message. Click
    the link to confirm your identity and proceed to the onboarding.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查您在 *步骤 2* 中提供的账户，以确认消息。点击链接以确认您的身份并继续注册流程。
- en: On the **Tell us about you** onboarding page, add your personal details, including
    your **Full name**, **Organization**, and **Birthday** details. Click **Agree**.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **告诉我们关于您的情况** 注册页面上，添加您的个人详细信息，包括您的 **全名**、**组织** 和 **生日** 信息。点击 **同意**。
- en: If you have registered previously, you may receive a message about upgrading
    to a paid plan to start using the API. Click **Continue**.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你之前已经注册，你可能会收到一条关于升级到付费计划以开始使用 API 的消息。点击 **继续**。
- en: 'If necessary, click **Upgrade** on the **Welcome to the OpenAI platform** overview
    page, as shown in *Figure 2**.5*:'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果需要，在 **欢迎使用 OpenAI 平台** 概览页面上点击 **升级**，如图 *图 2*.5* 所示：
- en: '![Figure 2.5 – OpenAI platform overview page](img/B21234_02_005.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.5 – OpenAI 平台概览页面](img/B21234_02_005.jpg)'
- en: Figure 2.5 – OpenAI platform overview page
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.5 – OpenAI 平台概览页面
- en: Otherwise, click **API keys** in the navigation menu.
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 否则，在导航菜单中点击 **API 密钥**。
- en: Click **Start verification** to begin a phone verification process.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **开始验证** 以开始电话验证过程。
- en: On the **Verify your phone number** page, enter a phone number for a device
    that is capable of receiving SMS messages. Click **Send code**.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **验证您的电话号码** 页面上，输入一个能够接收短信的设备的电话号码。点击 **发送代码**。
- en: On the **Enter code** page, enter the six-digit code that you received from
    the OpenAI verification service.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **输入代码** 页面上，输入您从 OpenAI 验证服务收到的六位数字代码。
- en: Click **Start** **payment plan**.
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**开始** **支付计划**。
- en: On the **What best describes you?** page, select the classification that best
    describes your usage scenario (**Individual** or **Company**).
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**您最好描述自己**页面，选择最能描述您的使用场景的分类（**个人**或**公司**）。
- en: On the **Set up payment plan** page, enter your credit card information and
    click **Continue**.
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**设置支付计划**页面，输入您的信用卡信息并点击**继续**。
- en: On the **Configure payment** page, enter a value for **Initial credit purchase**.
    You can select any amount between $5 and $50.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**配置支付**页面，输入**初始信用购买**的值。您可以选择介于5美元和50美元之间的任何金额。
- en: On the **Payment summary** page, click **Confirm payment**. You will be charged
    for the amount specified on the **Configure payment** page and displayed in the
    summary.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**支付摘要**页面，点击**确认支付**。您将被收取**配置支付**页面和摘要中指定的金额。
- en: 'On the **Billing overview** page, in the navigation menu under **User**, select
    **API keys**. See *Figure 2**.6*:'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**计费概览**页面，在**用户**下的导航菜单中选择**API密钥**。见*图2.6*：
- en: '![Figure 2.6 – Selecting API keys](img/B21234_02_006.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图2.6 – 选择API密钥](img/B21234_02_006.jpg)'
- en: Figure 2.6 – Selecting API keys
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.6 – 选择API密钥
- en: 'On the **API keys** page, select **Create new** **secret key**:'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**API密钥**页面，选择**创建新** **密钥**：
- en: '![Figure 2.7 – Creating a new API key](img/B21234_02_007.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图2.7 – 创建新的API密钥](img/B21234_02_007.jpg)'
- en: Figure 2.7 – Creating a new API key
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.7 – 创建新的API密钥
- en: On the **Create new secret key** popup, enter a name for the API key (such as
    OpenAI API key) and click **Create** **secret key**.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**创建新密钥**弹出窗口中，输入API密钥的名称（例如OpenAI API密钥）并点击**创建** **密钥**。
- en: 'Copy the value displayed to a safe location. You will need this value when
    connecting to the OpenAI service from other apps and services. As soon as you
    click **Done**, this value will be hidden, and you will be unable to retrieve
    it in the future:'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将显示的值复制到安全位置。当您从其他应用程序和服务连接到OpenAI服务时，您将需要此值。一旦您点击**完成**，此值将被隐藏，并且您将无法在未来检索它：
- en: '![Figure 2.8 – Capturing the API key](img/B21234_02_008.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图2.8 – 捕获API密钥](img/B21234_02_008.jpg)'
- en: Figure 2.8 – Capturing the API key
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.8 – 捕获API密钥
- en: Important note
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Protect this API key value like it’s money. If it is compromised or stolen,
    others could use it to execute API calls and queries against your account balance.
    If it is lost or stolen, you will need to go back to this page, generate a new
    key, and then revoke the old key by clicking on the trash can icon. Additionally,
    if OpenAI detects that your key has been saved or posted to a public location
    (such as GitHub), your key will be invalidated, and you’ll need to generate a
    new one.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 像对待金钱一样保护此API密钥值。如果它被泄露或被盗，其他人可以使用它来执行针对您的账户余额的API调用和查询。如果它丢失或被盗，您需要返回此页面，生成新的密钥，然后通过点击垃圾桶图标撤销旧密钥。此外，如果OpenAI检测到您的密钥已被保存或发布到公共位置（如GitHub），您的密钥将被无效化，您需要生成一个新的。
- en: Click **Done**.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**完成**。
- en: When you configure other services to integrate with ChatGPT, you’ll supply this
    API key for authenticating to the service.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当您配置其他服务以与ChatGPT集成时，您将为此服务提供此API密钥进行身份验证。
- en: Configuring your workstation
  id: totrans-94
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置您的工作站
- en: There are a number of tools that you can use to build and deploy AI-based applications.
    For purposes of this book, you may need to download and deploy a handful of t[ools:](https://code.visualstudio.com/download)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多工具可以帮助您构建和部署基于AI的应用程序。为了本书的目的，您可能需要下载和部署一些工具：[工具](https://code.visualstudio.com/download)
- en: '[Visual Studio Code:](https://code.visualstudio.com/download)'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Visual Studio Code：](https://code.visualstudio.com/download)'
- en: '[Azure Developer CLI:](https://aka.ms/azure-dev/install)'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Azure开发者CLI：](https://aka.ms/azure-dev/install)'
- en: '[Python 3.9+:](https://www.python.org/downloads/)'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Python 3.9+：](https://www.python.org/downloads/)'
- en: '[Node.js 14+:](https://nodejs.org/en/download/)'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Node.js 14+：](https://nodejs.org/en/download/)'
- en: '[Git:](https://git-scm.com/download/win)'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Git：](https://git-scm.com/download/win)'
- en: '[PowerShell 7+:](https://github.com/powershell/powershell) https://github.com/powershell/powershell'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[PowerShell 7+：](https://github.com/powershell/powershell) https://github.com/powershell/powershell'
- en: Download and install each of those using the provided links. Be sure to use
    the default installation options for all of them, as any examples in this book
    will reference default options and paths.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的链接下载并安装每个工具。请确保使用所有工具的默认安装选项，因为本书中的任何示例都将引用默认选项和路径。
- en: Configuring Power Platform
  id: totrans-103
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置Power Platform
- en: Lastly, we’re going to set up the necessary subscriptions and prerequisite services
    for Power Platform.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将设置Power Platform所需的必要订阅和先决服务。
- en: 'AI models, available through AI Builder in the Power Platform tooling, require
    AI Builder licensing as well as access to Microsoft Dataverse. To get started,
    follow these steps:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 Power Platform 工具中的 AI Builder 可用的 AI 模型需要 AI Builder 许可证以及访问 Microsoft Dataverse
    的权限。要开始，请按照以下步骤操作：
- en: Navigate to the Micr[osoft Power Automate web porta](https://make.powerautomate.com)l
    ([https://make.powerautomate.com](https://make.powerautomate.com)) and sign in
    with an administrative account.
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 Microsoft Power Automate 网站端口（[https://make.powerautomate.com](https://make.powerautomate.com)）并使用管理员账户登录。
- en: From the navigation menu, select **AI hub**.
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从导航菜单中选择**AI 中心**。
- en: On the **Discover an AI capability** page, select **AI models**.
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**发现 AI 功能**页面，选择**AI 模型**。
- en: If prompted, select **Create a database** to create a new Dataverse database.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果需要，选择**创建数据库**以创建新的 Dataverse 数据库。
- en: On the **New database** page, select a **Currency** and **Language** value,
    and then click **Create** **my database**.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**新数据库**页面，选择一个**货币**和**语言**值，然后点击**创建** **我的数据库**。
- en: 'If you don’t already have AI Builder capacity, you should see a **Start free
    trial** banner at the top of the page, as shown in *Figure 2**.9*. Select it:'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你还没有 AI Builder 容量，你应该在页面顶部看到**开始免费试用**横幅，如图 *图 2*.9* 所示。选择它：
- en: '![Figure 2.9 – Starting a free trial of AI Builder](img/B21234_02_009.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.9 – 开始 AI Builder 的免费试用](img/B21234_02_009.jpg)'
- en: Figure 2.9 – Starting a free trial of AI Builder
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.9 – 开始 AI Builder 的免费试用
- en: Follow the prompts to sign up or extend your trial.
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按提示注册或延长试用。
- en: That’s it! You’re ready to go with AI Builder in Power Automate and Power Apps!
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！你就可以在 Power Automate 和 Power Apps 中使用 AI Builder 了！
- en: Summary
  id: totrans-116
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you configured all of the prerequisites for using AI services—including
    OpenAI in Azure, ChatGPT, and Power Platform AI Builder. You also configured your
    workstation with the necessary tools to deploy AI apps to Azure.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你配置了使用 AI 服务所需的所有先决条件——包括 Azure 中的 OpenAI、ChatGPT 和 Power Platform AI Builder。你还配置了工作站，以便将
    AI 应用部署到 Azure。
- en: Next, we’re going to start interacting with ChatGPT as an end user to get an
    idea of how it works.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将以最终用户身份开始与 ChatGPT 互动，以了解其工作原理。
