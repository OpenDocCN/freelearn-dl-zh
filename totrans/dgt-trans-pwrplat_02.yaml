- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Gauging Growth: Assessing Digital Maturity for Strategic Advancement'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Gauging growth and assessing digital maturity is crucial for organizations seeking
    strategic advancement within Power Platform—a comprehensive suite of tools by
    Microsoft for low-code app development and process automation. To evaluate digital
    maturity, organizations often employ a framework that categorizes different levels
    of maturity across various dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: One common framework for digital maturity assessment includes levels such as
    foundational, developing, advanced, and leading. At the foundational level, organizations
    are in the early stages of adopting Power Platform, with limited awareness and
    utilization. In the developing stage, organizations start to expand their usage
    and gain proficiency in leveraging the platform’s capabilities. Advanced maturity
    indicates a higher level of proficiency, where organizations have well-established
    processes, governance, and successful adoption across departments. Finally, at
    the leading level, organizations are at the forefront of innovation, driving continuous
    improvement and demonstrating exceptional results through Power Platform.
  prefs: []
  type: TYPE_NORMAL
- en: The **Center of Excellence** (**CoE**) and the **Center for Enablement** (**C4E**)
    play integral roles in assessing and advancing digital maturity within Power Platform.
    The CoE takes the lead in evaluating the organization’s current maturity level,
    identifying gaps, and defining a strategic roadmap for advancement. It establishes
    best practices, governance frameworks, and standards for Power Platform adoption,
    ensuring a structured approach to Digital Transformation. The C4E focuses on building
    capabilities and enabling users to unlock the full potential of Power Platform.
    It offers training, resources, and support to enhance skills and proficiency,
    empowering employees to contribute effectively to the organization’s digital maturity
    journey.
  prefs: []
  type: TYPE_NORMAL
- en: By employing a maturity framework and leveraging the expertise of the CoE and
    C4E within Power Platform, organizations can systematically assess their digital
    maturity across various dimensions and strategically advance their capabilities.
    This holistic approach ensures a clear understanding of the current state, identifies
    areas for improvement, and guides the organization toward higher levels of digital
    maturity. As organizations progress through the maturity levels, they gain the
    ability to drive innovation, streamline processes, and achieve sustainable growth
    within the Power Platform ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will cover the following topics in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding digital maturity in Power Platform
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Navigating maturity levels in Power Platform adoption
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Driving digital maturity with the CoE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Empowering digital maturity in Power Platform
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding digital maturity in Power Platform
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Various mechanisms allow organizations to measure the maturity of their Power
    Platform ecosystem centrally or within various departments or communities of practice.
    Often, the term *maturity* can be relatively negative depending on the organizations
    or departments we may find ourselves working with, so the term *readiness* is
    leveraged within the industry to drive the process forward. It’s important to
    ensure that whichever body of the organization, or the entire organization itself,
    is *ready* to take on the responsibility of embracing, adopting, and managing
    a low-code ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: There are many different interpretations of the concept of *ready*. Sometimes,
    the actual definition of the concept of *ready* needs to be clearly defined. Does
    *ready* mean you have your technical infrastructure set up and your environment
    strategy defined, or does *ready* mean you have installed the Microsoft CoE Starter
    Kit and decided that that’s that? There are many defined states of readiness and
    actually, even most Microsoft Power Platform partners will have a differing opinion
    of what *good readiness* looks like. Often, this opinion or perspective may differ
    somewhat from what Microsoft may even say. Ultimately, there are going to be several
    versions of this *readiness* model. Depending on the size and complexity of your
    organization, the need for varying depths of the readiness assessment will differ.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, if you are a five-person organization that is just starting out
    and you want to use Power Platform to build and run business productivity solutions
    that help you in your day-to-day, you probably don’t need to go down the route
    of a 500-question assessment focusing on all the aspects of low-code technical
    guardrails, user adoption, maker enablement, and process automation. This just
    does not fit the bill for what you really need and will ultimately be far too
    much. You want to get going fast and get the basics in place as soon as possible.
  prefs: []
  type: TYPE_NORMAL
- en: If you are a half-a-million-person organization that has a global presence,
    with multiple departments, communities of practice, and varying subsidiaries,
    then depending on the layer of the business being assessed, you definitely want
    to think about a more in-depth assessment. This will be important because there
    will be far more processes that exist and many different teams of people who will
    be affected by the release of a wide range of tools that will drive productivity.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, one size does not fit all, so what is the best approach?
  prefs: []
  type: TYPE_NORMAL
- en: People, processes, platforms (technology)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s rewind a bit before we decide to start assessing everything. It’s important
    to find a common point (or common *points*) where at least most organizations
    have commonalities. This makes it easier to be more focused. In around the 1960s,
    a person by the name of Harold Leavitt generated a model called *Leavitt’s Diamond*.
    The diamond’s four corners represented **people**, **structure**, **technology**,
    and **tasks**. This was later changed in the 1990s; the structure and tasks corners
    were rolled into one single corner representing Processes. In recent adaptions,
    technology has been updated to **platforms**. This is indicated in *Figure 2**.1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.1: Leavitt’s Diamond and a recent adaptation in the form of a triangle](img/B21080_02_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.1: Leavitt’s Diamond and a recent adaptation in the form of a triangle'
  prefs: []
  type: TYPE_NORMAL
- en: When looking at the core majority, most organizations consist of people. People
    are the core of most businesses and will drive growth. Making people more productive
    is the key to ensuring that more can be done, as accurately, in a shorter amount
    of time. In fact, *many* businesses boast the fact that people are the core of
    their business and are most important to them.
  prefs: []
  type: TYPE_NORMAL
- en: In order to ensure things are done correctly, a set of rules is put in place.
    These rules are known as processes. The processes define “*how we do things here*.”
    The better the processes are thought out and laid out, the easier it becomes for
    people to do their work.
  prefs: []
  type: TYPE_NORMAL
- en: Good processes are repetitive. People and processes require tools to work efficiently.
    In this modern world, some refer to these tools as *apps* or *automations*, but
    of course, the scope is *much* wider than just these two things. The tools ultimately
    do their best to make the person’s life easier, allowing them to work more efficiently
    and thus saving time. In fact, some of these processes can be completely automated
    to the point where they do not even need a human in the loop. Platforms typically
    supply these tools that allow people to follow these processes more efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: If the readiness assessment can be focused on these core areas, it becomes way
    easier to set a baseline readiness score that can be common among many organizations.
    This is because most companies will have these three core areas as a focus in
    some way, shape, or form.
  prefs: []
  type: TYPE_NORMAL
- en: The importance of baselining
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the most important aspects of undertaking a readiness assessment is the
    ability to set a baseline. This process is known as *baselining* and is extremely
    common in *many* change and project management methodologies. Essentially, the
    act of baselining sets the bar of the level of the organization with regard to
    the perceived level of what is “good” or a “best practice”. In order to baseline,
    there needs to be a set of levels, rules, and metrics that are deemed relevant
    to what “good” looks like. Typically, a type of framework is followed to ensure
    that everyone who is implementing a certain product follows the same process and
    is ultimately successful.
  prefs: []
  type: TYPE_NORMAL
- en: 'The process of baselining is incredibly important when implementing Power Platform.
    That’s because it sets the bar and then enables the organization to *re-baseline*
    as the project is undertaken and then ultimately is completed, in order to show
    a level of progression. The key question here is: “*Where were we and where are*
    *we now?*”'
  prefs: []
  type: TYPE_NORMAL
- en: The process of baselining is one that should happen periodically as the platform
    is implemented and adopted. This is because it will provide a great mechanism
    of reporting and structure to anyone following the delivery and adoption. It’s
    important to ensure that *all* updates and metrics are constantly tracked. As
    an example, the report in *Figure 2**.2* shows a custom baseline report with current
    readiness metrics focusing on people, process, and platform as the primary categories
    around several core sub-categories.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.2: An example of a baseline report that shows the current scoring
    for various categories and sub-categories](img/B21080_02_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.2: An example of a baseline report that shows the current scoring
    for various categories and sub-categories'
  prefs: []
  type: TYPE_NORMAL
- en: The score here is a total out of 500, which will be aggregated from the various
    sub-categories per category. In the example, Microsoft’s Power BI was leveraged
    as the reporting mechanism as it is interactive and a great way for the people
    involved in the project to understand exactly where the points of growth are.
    In this report, these points are highlighted by the areas with the lowest scores.
    These areas will become points to focus on when implementing governance.
  prefs: []
  type: TYPE_NORMAL
- en: Another reason why baselining and tracking these scores against a framework
    is extremely important is that often, *governance* (or, as we term it here, *ecosystem
    enablement*) can be considered *non-tangible* where a lot of the work is done
    on a strategy and operational level. There is often not a tangible *app* that
    gets released. The core output is the ability to derisk an ecosystem and make
    it safer for makers to create solutions in a more compliant manner. There will
    need to be a tangible output of metrics and goals achieved.
  prefs: []
  type: TYPE_NORMAL
- en: Readiness categories and sub-categories
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power Platform is extremely diverse, and there is a lot to consider because
    the technical ecosystem is extremely vast and reaches into so many other areas
    of the Microsoft stack. When talking about concepts such as *security*, it’s important
    to realize that this is not just localized to Power Platform but to Microsoft
    365, as well as many other areas within Microsoft Azure. Power Platform is one
    of the most interlinked Microsoft product sets in the stack, and this seems to
    be by design.
  prefs: []
  type: TYPE_NORMAL
- en: 'This can often be difficult when undertaking readiness assessments as there
    are many aspects to consider, which are not necessarily technology-focused. Just
    because an organization understands the core security areas within Power Platform
    environments does not necessarily give them a high readiness score in the category
    of security. There will be other aspects to consider, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The relationship between the Power Platform team and the security team
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The processes involved in requesting a new Entra Security Group
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The process to get users added to that group
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The way in which new connectors are reviewed and passed through the security
    team
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are just examples of questions that need to be asked when understanding
    the readiness of an organization, department, or community of practice when looking
    to adopt Power Platform. Again, as mentioned before, this level of depth may not
    be required, but it is important to know that it absolutely can be.
  prefs: []
  type: TYPE_NORMAL
- en: Essentially, when looking at the example mentioned, there is a combination of
    the categories of people, processes, and platforms, with a focus on the subcategory
    of security.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you were to explore the wider subcategories of Power Platform, you would
    find that there are many. Several white papers, websites, and even Microsoft Learn
    will go into varying levels of detail regarding these subcategories. The list
    of aspects includes, and is definitely not limited to, the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Environment management
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data policies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Security
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Operations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Communities of practice
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Champions programs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ideation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Project intake
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Landing zones
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copilot/AI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rings of release
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Communications and collaboration
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s important to note that not all of these aspects mentioned will be specific
    to your business, and therefore, the readiness assessment will need to be flexible
    to an extent. Not all organizations can or should be treated as a complex, large
    business.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, the readiness assessment for a Power Platform ecosystem should
    be tailored to an organization’s size and complexity. The assessment should be
    focused on people, processes, and platforms, and a baseline readiness score should
    be set and periodically tracked. The process of baselining is important as it
    enables an organization to show progress and identify areas of growth. The Power
    Platform is diverse, and there are many aspects to consider, including security,
    which requires a holistic approach. The level of depth required in the assessment
    may vary depending on the organization’s perception. Overall, the assessment should
    focus on the categories of people, processes, and platforms, with a focus on subcategories
    such as security. In the next section, we will discuss the pathway to readiness
    with the assessment frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: Navigating maturity levels in Power Platform adoption
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Driving growth and progression with Power Platform in your organization can
    seem like a difficult task with many moving parts. Thankfully, there are defined
    pathways to help organizations on this journey. It’s not just haphazard guesswork.
    Many partners, as well as Microsoft themselves, have developed assessments based
    on detailed experience. As the platform has matured, many experts and organizations
    have fed back to Microsoft with fantastic detail and experiences that have ultimately
    helped the wider community understand the best practices. Understanding and setting
    levels of maturity is important when undertaking these readiness assessments.
    The better and more well-defined the levels are, the more each organization can
    understand its level of readiness and the steps needed to progress.
  prefs: []
  type: TYPE_NORMAL
- en: The Microsoft Power Platform adoption maturity model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After implementations of Power Platform at multiple organizations, and with
    the world’s largest low-code adoption of tools such as Power Apps, Microsoft was
    able to generate a great mechanism for organizations to baseline their readiness
    levels and get a great idea of where they are in their Power Platform journey.
  prefs: []
  type: TYPE_NORMAL
- en: The way in which the framework is created leverages several primary categories,
    which are broken down into five levels of maturity. Typically, this is a great
    way to get an initial idea of where your organization is in its Power Platform
    journey. However, you may find that you will want to conduct a deeper assessment
    should your organization be of a more complex nature. Normally, the Microsoft
    Partner Network is a great place to leverage expertise to conduct such assessments.
  prefs: []
  type: TYPE_NORMAL
- en: Primary categories and levels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Microsoft’s model is broken up into seven levels, which have an all-round focus
    on multiple areas within an organization. It’s not just a technology-focused model,
    as suggested in the first section of this chapter. These categories are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Strategy and vision
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Business value
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Admin and governance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nurture and citizen makers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fusion teams
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The primary aim here is to think about the wider plan for adoption and not just
    the creation of apps and flows. This is important because Power Platform is a
    business productivity set of tools and is not designed to solve only one single
    problem. To compare this set of tools to Microsoft Office, you almost certainly
    did not buy Office to send only one email or make a single Excel spreadsheet.
    Chances are, you bought Office to be more productive. This is why this approach
    to Power Platform and low-code, in general, is massively crucial to realizing
    a true return on investment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Each of these key categories is broken down into five levels, which are summarized
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Level** **100**: Initial'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Level** **200**: Repeatable'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Level** **300**: Defined'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Level** **400**: Capable'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Level** **500**: Efficient'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An interesting point to make here is that the concept of leveling in this manner
    is not actually different from other low-code vendors such as Mendix, who have
    a similar way of understanding maturity.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft adoption assessment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Microsoft has worked hard to create a relatively generic adoption assessment
    that will give an organization a first baseline of where they are in their journey,
    as well as some suggestions of things that need to be done to reach their preferred
    baseline. The adoption assessment leverages elements of the model mentioned previously
    and walks the user through a set of relatively open questions. You can access
    the assessment through the Microsoft Learn site. From the **Discover** menu, select
    **Assessments**.
  prefs: []
  type: TYPE_NORMAL
- en: Simply search for **Power Platform** and you will see **Power Platform Adoption
    Assessment** appear in the list.
  prefs: []
  type: TYPE_NORMAL
- en: You will notice an assessment summary where you can simply select **Start Assessment**,
    provided you are logged in. All your past assessments will be saved so you can
    reference them at a later point for baselining purposes. As you can see in *Figure
    2**.3*, there are past assessments available from past dates in this user profile.
    If you are unable to complete the assessment, that’s perfectly fine because it
    saves your progress and lets you continue in your own time.
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure \uFEFF2.3: A user profile \uFEFFwith past Power Platform assessments](img/B21080_02_003.jpg)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.3: A user profile with past Power Platform assessments'
  prefs: []
  type: TYPE_NORMAL
- en: To progress the assessment, you are able to select your specific interests from
    a list of three options. As you select interests, more questions will be added
    to the list under each interest category, so you can focus your efforts as you
    need and even have specific assessments focusing on specific interests. In *Figure
    2**.3*, two of the three interests have been captured in order to focus this assessment
    on these two primary interests. As you select your interests from the list shown
    in *Figure 2**.4*, you will see the number of questions building on the left.
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure \uFEFF2.4: Power Platform adoption assessment focused on administration,\
    \ governance, support, strategy, vision, and business value](img/B21080_02_004.jpg)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.4: Power Platform adoption assessment focused on administration, governance,
    support, strategy, vision, and business value'
  prefs: []
  type: TYPE_NORMAL
- en: As you track through the assessment, you can see your progress on the left,
    as well as what still needs to be answered. This is visible in *Figure 2**.5*.
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure \uFEFF2.5: Power Platform assessment progression visibility](img/B21080_02_005.jpg)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.5: Power Platform assessment progression visibility'
  prefs: []
  type: TYPE_NORMAL
- en: Tracking through the assessment is relatively straightforward, with complete
    visibility of where you are, where you have been, and how to answer questions.
    You can see in *Figure 2**.6* that the user is about to complete this assessment
    and get guidance on what to do next.
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure \uFEFF2.6: A user wrapping up an assessment, about to get guidance](img/B21080_02_006.jpg)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.6: A user wrapping up an assessment, about to get guidance'
  prefs: []
  type: TYPE_NORMAL
- en: Once the assessment is complete, you will notice that there are three levels
    as opposed to the five mentioned in the initial model. This is just an initial
    assessment and only uses three of the five mentioned categories. As you can see
    in the model in *Figure 2**.7*, this assessment suggests that there is a fair
    bit of work to be done to reach efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure \uFEFF2.7: The final assessment result with guidance for the organization](img/B21080_02_007.jpg)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.7: The final assessment result with guidance for the organization'
  prefs: []
  type: TYPE_NORMAL
- en: This is a great way to get started and to understand immediate gaps. However,
    as you may have noticed, a more thorough assessment may need to be undertaken
    in order to establish a more detailed view of an organization’s readiness to adopt
    Power Platform.
  prefs: []
  type: TYPE_NORMAL
- en: The concept of setting levels of maturity or readiness across an organization,
    department, or community of practice is enormously helpful to enable both governance
    and adoption within a business. The idea is that people can create solutions safely
    in a space that is well-governed but also provides users with the freedom to be
    productive. These assessments are meant to set a clearer path for the organization
    to truly adopt Power Platform in a manner that best suits them and their people.
  prefs: []
  type: TYPE_NORMAL
- en: This section discusses how to drive growth and progression with Power Platform
    in an organization. It starts by highlighting the defined pathways available to
    help organizations on this journey. These pathways are based on detailed experiences
    and assessments developed by Microsoft and its partners. The section then introduces
    the Microsoft Power Platform adoption maturity model, which is a readiness model
    that leverages several primary categories broken down into five levels of maturity.
    The primary categories are not just technology-focused but encompass a wider plan
    for adoption. The section explores the Microsoft adoption assessment, which is
    relatively generic and gives an organization a baseline of where they are in their
    journey, as well as suggestions for things that need to be done to reach their
    preferred baseline. The aim of setting levels of maturity or readiness across
    an organization is to enable both governance and adoption within a business. Next,
    we will explore the ways in which an organization can drive this process forward
    to encourage wider adoption.
  prefs: []
  type: TYPE_NORMAL
- en: Driving digital maturity with the CoE
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The concept of a CoE has existed for a long time in the world of solution and
    platform adoption. In the world of Power Platform, the CoE concept started out
    as being completely associated with a technical toolkit built by one of the teams
    at Microsoft. The Center of Excellence Starter Kit is an exceptional tool that
    helps organizations manage and monitor a large amount of user and maker engagement
    within the Power Platform ecosystem. This tool is extremely technically focused
    and a great start in setting up a full CoE. However, there is a *lot* more to
    it than just a technical toolset.
  prefs: []
  type: TYPE_NORMAL
- en: Center of enablement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we have progressed our thinking around low-code tools, especially Power Platform,
    we have realized that we need to focus our efforts on more than the technology.
    Once again, people and processes become equally important. As organizations started
    to adopt Power Platform more widely, it was soon realized that without the trio
    of people, process, and technology, a proper CoE was nearly impossible to create.
    Also, it was not at all possible to drive proper adoption across an organization
    to provide value to the wider user and maker communities without that trio.
  prefs: []
  type: TYPE_NORMAL
- en: Thought patterns started to change somewhat over the years. The focus on change
    management and adoption become much more prominent than originally anticipated.
    Switching to Power Platform was not just a technical thing that people did; it
    was so much more than that. Organizations started to become well-known for having
    thriving maker communities. A classic example is a UK-based rail organization
    with the center of enablement being organically generated and managed. At the
    time of writing this, Power Platform has organically grown to almost 28,000 assets;
    this was mainly organic growth. Maker communities organically appeared and people
    started naturally collaborating.
  prefs: []
  type: TYPE_NORMAL
- en: Now, this is a rare case, as most organizations have to work for this level
    of adoption. Ultimately, the community plays a huge part in the adoption of the
    platform, and this is classic word of mouth based on proven technology that solves
    problems. This is one example of *many* companies that have thriving maker communities
    that leverage Power Platform as their preferred technical platform to solve issues.
  prefs: []
  type: TYPE_NORMAL
- en: Something that has become extremely apparent is the fact that people form the
    center of the Power Platform ecosystem. The more we enable people to solve problems
    with technology and processes, the more widely the platform will be utilized.
    This means that people will have better tools to optimize the way they work.
  prefs: []
  type: TYPE_NORMAL
- en: Look at the tools in the Microsoft Office suite. There aren’t many “Excel Centers
    of Excellence”; people just naturally use spreadsheets because they seem to make
    sense for the use cases that people experience. This is similar to other Office
    products, and therefore, the adoption has been huge. So, why can’t the Power Platform
    tools be treated the same way as the Microsoft Office tools? They are both built
    for business productivity and to optimize the way people do their jobs!
  prefs: []
  type: TYPE_NORMAL
- en: This exact scenario is what is happening more and more as people realize that
    they can better perform their job roles with low code tools, but they require
    guidance and help. This is where the center of enablement comes in. The center
    of enablement is a great centralized mechanism to help people engage with Power
    Platform to solve business problems. It’s not just technically focused; it is
    *much* wider than that and includes the people and process aspects while having
    a strong focus on *enablement* *and adoption*.
  prefs: []
  type: TYPE_NORMAL
- en: You will notice that the original readiness assessment suggests that there needs
    to be a focus on people, processes, and platforms. The reason for this is to drive
    a wider enablement program throughout an organization. This is otherwise known
    as ecosystem enablement.
  prefs: []
  type: TYPE_NORMAL
- en: How to get going
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The toughest part is starting out! Power Platform is just so expansive and starting
    out on your enablement journey can be tough. There is so much content out there
    and so many differing opinions that all of this information can become convoluted
    and not really make sense, which then can become difficult to manage. There is
    a recipe for success in this scenario and it’s not as difficult to get going as
    it may seem.
  prefs: []
  type: TYPE_NORMAL
- en: Stakeholder mapping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first action is to find your people! Who are the people in the organization
    who are likely to support an enablement program such as this and who will most
    likely benefit? There are always people in organizations looking to optimize processes,
    work smarter, and just be more productive. This is great! However, someone will
    need to provide resources to do all of this and this is typically in the form
    of time from people, as well as money. What you need to find and establish is
    a group of stakeholders to sponsor the program of work. This may be you, or it
    may be a group of people in your business, but ultimately, someone needs to be
    responsible for the overall input and output of the work done.
  prefs: []
  type: TYPE_NORMAL
- en: In order to achieve this, a stakeholder mapping exercise needs to be undertaken.
    This is the very start of the process whereby you will look for people with the
    budget and appetite to be willing to participate in this program.
  prefs: []
  type: TYPE_NORMAL
- en: Assemble the team
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This step sometimes happens before stakeholder mapping and sometimes after it!
    It’s very dependent on the scenario; however, it is still important. These programs
    of work cannot all be completed by one person, as there are many areas to focus
    on and many types of roles that need to be filled. It’s important to also understand
    that these roles are *not* all technical and that many of the roles are people-focused.
    There are a number of skills that you will need and not each skill is related
    to one person. Also, if you are a smaller organization, some of these skills may
    not be at all relevant as you will not need the same level of governance, administration,
    and enablement.
  prefs: []
  type: TYPE_NORMAL
- en: 'The typical roles you would be looking for in implementing a C4E in an organization
    are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Program sponsor**: This person is responsible for the sponsorship of the
    program of work and the overall CoE. Typically, this person controls the budget.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Head of CoE**: Overall, the Power Platform CoE owner plays a critical role
    in ensuring the successful adoption and effective use of Power Platform within
    an organization, driving business value, and enabling digital transformation initiatives.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Change management and adoption**: The role of a change manager within the
    Power Platform CoE is to plan, manage, and implement change initiatives related
    to the adoption and utilization of Power Platform within an organization. The
    change manager is responsible for driving successful change management practices
    and ensuring that the changes are well received and effectively integrated within
    the organization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Power Platform admin**: The role of the Power Platform admin is responsible
    for operationally maintaining and managing the Power Platform ecosystem. This
    role focuses on many of the technical aspects of Power Platform, including environments,
    DLP, security, and monitoring. This person will work closely with the head of
    the CoE.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Solution architect**: A solution architect designs and implements solutions
    using the tools available in the Power Platform. They translate business requirements
    into technical specifications, ensuring solutions are secure, scalable, and aligned
    with organizational goals. Their role is essential in integrating platform components
    to create efficient workflows and valuable data insights. Solution architects
    are technical experts who will own the design of a solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Support lead**: The head of support in a Power Platform CoE is responsible
    for overseeing the application and platform support function within the CoE. This
    role involves managing a team of platform and application support professionals.
    It also involves ensuring that the applications built using Power Platform are
    functioning correctly and meeting the needs of the business, as well as ensuring
    that the platform support team is working with the operations team.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your team will grow over time as your enablement program grows. You can expect
    to add more and more people, or to split these roles out into other areas such
    as capability management, operations, technical architecture, and many more.
  prefs: []
  type: TYPE_NORMAL
- en: Setting your purpose
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most important aspect of starting is simply to start communicating with
    your peers. We call this *setting a purpose*. What exactly are you looking to
    achieve? The answer can’t simply be “making apps and flows.” There is way more
    to it than that. It’s important to ensure that the relevant stakeholders in the
    organization are on the same page and that everyone agrees on the purpose of initiating
    a Power Platform ecosystem enablement program.
  prefs: []
  type: TYPE_NORMAL
- en: Typically, the focus should be on driving organization-wide productivity through
    a centralized enablement and governance framework, which protects data and allows
    people to use and create Power Platform assets safely. We will explore this process
    in more detail in [*Chapter 5*](B21080_05.xhtml#_idTextAnchor105).
  prefs: []
  type: TYPE_NORMAL
- en: Defining success and ROI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When stakeholders are all on the same page and it is apparent and agreed that
    some level of a center of enablement is important to drive productivity, it’s
    time to start that baselining process again. This time, think about **Return on
    Investment** (**ROI**). What will make this project a success? What does “good”
    look like? How do you ensure that actual results are achieved?
  prefs: []
  type: TYPE_NORMAL
- en: In any sort of implementation of Power Platform, it’s important to have these
    types of goals, especially because someone is likely to be spending some money
    and time on this. Agreement is crucial here, even if the data is captured manually
    and not automatically generated through the information generated in the CoE starter
    kit. This data will only get you so far. You will need to get people to report
    back through feedback loops when interacting with the products.
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to bear in mind that ROI is not always money or time. It’s essential
    to break down your metrics and success criteria into both qualitative and quantitative
    metrics.
  prefs: []
  type: TYPE_NORMAL
- en: Qualitative metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The term *qualitative* refers to a type of information that describes traits
    or characteristics. Qualitative metrics focus on the subjective aspects of performance
    evaluation. They are gathered through surveys, interviews, or observation, and
    are usually presented as a story. Qualitative metrics provide an in-depth understanding
    of various factors that contribute to overall performance. They can be particularly
    helpful in understanding how a phenomenon or action affects individuals and groups.
    While gathering and analyzing data through qualitative measurements can be challenging,
    the insights you get at the end of the project are often well worth the effort.
    They provide insights that aren’t necessarily numerical, such as customer feedback
    or product reviews. Qualitative metrics help you see patterns and trends so you
    can make actionable changes. They can also answer questions posed by your project
    so you can provide company stakeholders with helpful information and insights.
  prefs: []
  type: TYPE_NORMAL
- en: Quantitative metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The term *quantitative metrics* refers to measurable impacts that are related
    to certain business choices and actions. They are represented numerically, which
    experts may analyze to provide meaning and support for their business assessments.
    These metrics are often communicated using visual tools like charts and graphs,
    which may assist professionals in comprehending their significance and how measurements
    may connect to one another. They are commonly used for assessing, comparing, and
    tracking performance or production. They provide numerical data that can be used
    to make better data-driven decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Focus areas for your plan
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are now ready to define a plan for your ecosystem enablement program. This
    is absolutely essential for success. It is important to ensure that your plan
    takes your baselining and success measures into account and includes your team
    at the correct times. This seems obvious, but actually, it can be difficult to
    map the process to an overall timeline.
  prefs: []
  type: TYPE_NORMAL
- en: There are also multiple aspects to the plan that need to be taken into consideration.
    However, using the maturity assessment and understanding the people, process,
    and platform mapping, a certain strategy can be employed when designing your plan.
  prefs: []
  type: TYPE_NORMAL
- en: This specific breakdown is something that is relatively common across *many*
    customer and partner organizations. It is a great way to get started when defining
    exactly what it is you need to do first.
  prefs: []
  type: TYPE_NORMAL
- en: Digital guardrails
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The best way to get started is by securing Power Platform and ensuring the
    actual technology is secured so that people can build safely. There are several
    workstreams or categories in the ecosystem enablement program that need to be
    reviewed within the digital guardrails pillar. These areas include, but are not
    limited to, the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Environment strategy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data policies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Security
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monitoring
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There may be areas you would like to focus more on in the guardrails section,
    such as tenant isolation, licensing, and more. However, this is the core you will
    require to get started. These will be further explored in [*Chapter 5*](B21080_05.xhtml#_idTextAnchor105),
    in the *What is your* *plan?* section.
  prefs: []
  type: TYPE_NORMAL
- en: Processes
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The processes that you put in place are inherently reliant on the technical
    areas that have been configured. The guardrails need to be completed before any
    processes can be defined. You may notice a blurred line between the guardrails
    and some of the processes. However, this is by design. Initial areas to focus
    on as a start are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Application Life Cycle** **Management** (**ALM**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Change management
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Governance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ideation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are many other areas that can be reviewed here, such as process and automation,
    feedback, project intake, operations, and more. It’s important to get going in
    these primary areas and then grow outward. As you mature in your program of work,
    so will the processes you put in place. The better the processes and the more
    automated they are, the easier it will be for the team to manage the CoE. Further
    process-related areas will be focused on in [*Chapter 5*](B21080_05.xhtml#_idTextAnchor105),
    in the *What is your* *plan?* section.
  prefs: []
  type: TYPE_NORMAL
- en: People – organization enablement
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The people element of this is often referred to as *organization enablement*.
    This essentially means that we find ways to enable people in the organization
    to be more productive through the CoE, as well as set up structures to manage
    the program. There are several workstreams that can be focused on. However, it
    is suggested that initially, the following workstreams are a great place to start:'
  prefs: []
  type: TYPE_NORMAL
- en: Community
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Training
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Communications
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Community champions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you grow your CoE, your team will grow, and so will the roles of people.
    The more people engage in the platform, the more people will need to make sure
    things run smoothly. There are many organizations out there with thousands of
    makers. Therefore, these people will need support when building out their solutions
    and supporting their creations. Further process-related areas will be focused
    on in [*Chapter 5*](B21080_05.xhtml#_idTextAnchor105), in the *What is your* *plan?*
    section.
  prefs: []
  type: TYPE_NORMAL
- en: Defining your plan
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you have established the workstreams and/or categories you would like to
    focus on, you can start establishing the order in which you will do them. It is
    highly suggested that you start by securing the platform with digital guardrails,
    as this is going to help you set off in the correct direction. After that, focus
    on the processes and people elements as you ensure that your platform is considered
    safe.
  prefs: []
  type: TYPE_NORMAL
- en: Once your key workstreams are selected, it is advised to set up a timeline or
    Gantt chart, as you would in a regular project, where tasks and timelines can
    be accurately managed. This means that each workstream selected will have sub-actions
    and tasks. A great way to manage this is within Azure DevOps or even Microsoft
    Planner, as you can see in the example shared in *Figure 2**.8*. The program of
    work is meant to be collaborative. Therefore, you will need to ensure that people
    are constantly sharing and communicating.
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure \uFEFF2.8: A basic example of a simple project plan in Microsoft Planner\
    \ relating to ecosystem enablement](img/B21080_02_008.jpg)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.8: A basic example of a simple project plan in Microsoft Planner relating
    to ecosystem enablement'
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, the concept of a CoE for the Power Platform ecosystem has evolved
    to focus on more than just technical tools. It has evolved into a center of enablement.
    People and processes have become equally important for a proper CoE to be created
    and for driving adoption across an organization. Setting up a CoE requires finding
    stakeholders who will sponsor the enablement program, assembling a team with various
    roles, and defining success measures with both qualitative and quantitative metrics.
    The plan should include digital guardrails to secure the platform, processes to
    manage the platform effectively, and people enablement to increase productivity.
    It is important to establish a timeline and manage tasks collaboratively to ensure
    the success of the program.
  prefs: []
  type: TYPE_NORMAL
- en: Empowering digital maturity in Power Platform
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We have spoken about the concept of ecosystem enablement throughout this chapter.
    It is one of the most important aspects of driving a center of enablement in an
    organization; it is a new way of thinking. This is by design because, in the past,
    we have been completely focused on technology as the main part of any implementation
    or program of work.
  prefs: []
  type: TYPE_NORMAL
- en: As we progress through understanding the mechanisms to mature from a readiness
    perspective, we cannot simply look at one area. We have also mentioned the trifecta
    of people, processes, and platforms, which inherently give us more than one angle
    to observe the areas, categories, and subcategories that make up a center of enablement.
  prefs: []
  type: TYPE_NORMAL
- en: A key focus for any organization right now is to ensure that Power Platform
    is adopted more widely across the organization and that people find it a useful
    tool for optimizing their day-to-day tasks and processes. This doesn’t just happen;
    actually, this can be rather complicated as all people are different. Everyone
    has different ways of interacting with the Power Platform ecosystem, so we need
    to think widely about how we support the various parts of our organizations to
    ensure that there is a wider adoption.
  prefs: []
  type: TYPE_NORMAL
- en: The difference between enablement and adoption
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This comes up constantly in organizations as there can be a very fine line between
    the two areas. It is important to understand both concepts in order to ensure
    that Power Platform is leveraged to its full potential in an organization.
  prefs: []
  type: TYPE_NORMAL
- en: Enablement
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Enablement is the methods taken to ensure that the right tools, processes,
    and people are available across the center of enablement so that makers have the
    ability to learn freely and create solutions in a safe, supported space and so
    that people can access and use these solutions in a safe and supported space.
    This means the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Guardrails need to be set up to provide safety
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Processes need to be set up and automated in a refined manner
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Organizational enablement needs to be executed such that people can access the
    information they need to create freely, safely, and productively
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are *many* fine lines in this scenario as there is a difficult tightrope
    to walk. You do not want to “over-govern” so people cannot do what they need to,
    but you absolutely cannot make it free for all and risk compliance issues. It’s
    important to provide just the right amount of room for people to be creative and
    safe. Enablement is about helping people do their jobs more productively.
  prefs: []
  type: TYPE_NORMAL
- en: Adoption
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Adoption is normally a result of well-planned and placed enablement. The better
    the enablement, the more widely Power Platform will be adopted. After defining
    your ecosystem enablement program, it’s important to define an adoption program.
  prefs: []
  type: TYPE_NORMAL
- en: We need to ask a critical question. What is the best process we can implement
    in order to help our staff be more productive?
  prefs: []
  type: TYPE_NORMAL
- en: Power Platform is an amazing set of tools. When leveraged in a well-governed,
    safe space, those tools are extremely effective. Great governance is when people
    don’t know it’s happening, and they feel comfortable using the tools without worrying
    about breaking something or disobeying the rules.
  prefs: []
  type: TYPE_NORMAL
- en: Driving enablement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In order to drive wider enablement across the organization, it’s key to ensure
    that you’re ready for wide uptake because people will use things if you let them.
    Once you go out with your Power Platform launch communications, make sure that
    the guardrails are already set up, your processes are in place, and your enablement
    infrastructure is set up and ready, typically in that order.
  prefs: []
  type: TYPE_NORMAL
- en: In order to achieve this, it’s important to build capabilities to grow your
    readiness maturity. This can only come from actively growing the wider enablement
    team and program of work. There are some key areas you can focus on when driving
    this level of enablement.
  prefs: []
  type: TYPE_NORMAL
- en: Community
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Community is one of the most important aspects of driving enablement and will
    form one of the core, essential areas of focus as you grow your Power Platform
    adoption in your business. The community is the central location where people
    can congregate to share experiences. A great community will consist of extremely
    strong community champions and a highly collaborative network of people who follow
    the same message and are intent on helping one another.
  prefs: []
  type: TYPE_NORMAL
- en: If the community is set up and managed correctly, it will act as your epicenter
    for problem-solving, support, feedback, collaboration, and centralized communications.
  prefs: []
  type: TYPE_NORMAL
- en: Training
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A well-thought-out training plan is important for both users and makers. People
    learn in many ways, so it’s important to take that into account. People will assume
    that training and enablement content will be made available through the centralized
    community portal. This is correct, as this should act as a central hub for people
    to communicate and learn. A well-laid-out training plan with the right array of
    materials and content will really get people engaged. It’s essential to spend
    time on this and get feedback from your audience as often as possible.
  prefs: []
  type: TYPE_NORMAL
- en: Community champions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These people are the heart and soul of the community! These people are your
    key advocates and will often be passionate about problem-solving and engaging
    others. It’s really important to make sure that these people are recognized for
    their work and are attributed change agents. This is all about visibility and
    visibly rewarding those who grow your Power Platform community. The more the change
    agents are recognized, the more widely they will be able to drive growth and passion
    for problem-solving. This type of hero network is essential to adoption and enablement.
  prefs: []
  type: TYPE_NORMAL
- en: Communications
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Communications are your center of enablement voice into the community and into
    your entire hero, maker, and user base. Often in larger organizations, the CoE
    team will have one shot at getting the communications correct. Therefore, the
    enablement infrastructure needs to be ready for people to visit and engage in
    a safe and governed way.
  prefs: []
  type: TYPE_NORMAL
- en: Driving these types of enablement processes will ultimately increase adoption
    and capability across your organization and therefore increase your readiness
    maturity within your Power Platform ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, ecosystem enablement is a crucial aspect of driving a center
    of enablement in an organization. It involves the right tools, processes, and
    people being available to ensure makers have the ability to learn and create solutions
    in a safe and supported space. Adoption of Power Platform is a result of well-planned
    and placed enablement, and it’s important to build capabilities to grow your readiness
    maturity. This can be achieved through community training, community champions,
    and effective communications. By driving these types of enablement processes,
    organizations can increase adoption and capability across the board, leading to
    an increase in readiness maturity within the Power Platform ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored various aspects of the digital readiness of an
    organization wanting to adopt Power Platform and build a thriving ecosystem focused
    on enablement and adoption. We learned that adopting Power Platform requires more
    than just technical skills and tools. It also requires a holistic approach that
    considers people, processes, and platforms.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduces a framework for assessing the readiness and maturity
    of an organization in adopting Power Platform. It also provides guidance on how
    to set up a center of enablement that can drive adoption and governance across
    the organization.
  prefs: []
  type: TYPE_NORMAL
- en: The concept of readiness and how it can be measured using various categories
    and levels was a central topic in this chapter. We learned that it is an important
    area of impact when setting up a center of enablement. We also covered the Microsoft
    Power Platform adoption maturity model and the adoption assessment.
  prefs: []
  type: TYPE_NORMAL
- en: There was a focus on how to drive growth and progression with Power Platform
    in an organization. We explored the defined pathways available to help organizations
    on this journey, based on detailed experiences and assessments developed by Microsoft
    and its partners.
  prefs: []
  type: TYPE_NORMAL
- en: The Center of Enablement is a central topic for the Power Platform ecosystem
    and how it has evolved to focus on more than just technical tools. It outlines
    the steps and roles involved in setting up a CoE, such as finding stakeholders,
    assembling a team, defining success measures, and planning the program. We covered
    this topic in this chapter as well.
  prefs: []
  type: TYPE_NORMAL
- en: We focused on the importance of ecosystem enablement and how it involves the
    right tools, processes, and people being available to ensure makers have the ability
    to learn and create solutions in a safe and supported space. We also highlighted
    the key areas to focus on when driving enablement, such as community training,
    community champions, and communications.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will focus on the possibilities of enhancing operations
    leveraging the tools in Power Platform and how to further optimize processes that
    are specific to your organization.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The further reading sources shared below will be useful when doing research
    and developing your center of enablement.
  prefs: []
  type: TYPE_NORMAL
- en: 'You will be able to find more information at the following locations:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Microsoft Learn: [https://learn.microsoft.com/en-us/power-platform/guidance/adoption/maturity-model-details](https://learn.microsoft.com/en-us/power-platform/guidance/adoption/maturity-model-details)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Power Platform adoption framework: [https://github.com/PowerPlatformAF/PowerPlatformAF](https://github.com/PowerPlatformAF/PowerPlatformAF)'
  prefs:
  - PREF_UL
