- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Utility AI with Audio
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To kick off the next main section of this book, we’ll look at AI tools that
    perform *utility tasks* with audio. These tasks may involve some generation, but
    the focus is on cleanup, analysis, or new workflows—making your job easier or
    faster. In fact, these tools have made my own video production and post-production
    workflows far faster and more reliable, tearing up the old rules about what was
    possible in audio.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Today, a video editor can use AI assistance to find their footage faster, enable
    clients to be more directly involved in the editing process, and fix audio problems
    that once would have meant a reshoot. While I personally approach these tools
    from the perspective of a videographer and video editor, podcast production and
    general audio production can benefit from these tools too.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: The next chapter will discuss video-focused tools, but here, the focus is audio—even
    if it’s used in a video context.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, and in the rest of this book, headings will introduce tasks
    that AI can help with before exploring specific tools and related workflows. Remember
    that new tools become available regularly, and that the options explored here
    are not the only ones available. Where possible, tools discussed will be readily
    available, reasonably priced, and from reliable providers—but we may mention new,
    experimental tools too.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we’ll talk about the following:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Transcription and text-based editing
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dialogue cleanup
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Audio remix
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Selecting musical stems
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Identifying music beats
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transcription and text-based editing
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Just a few years ago, computer-based **transcription**—commonly used for **captions**—was
    primitive and error-prone. You could use a cheap service to get a transcription
    that had obvious flaws or pay a service like **rev** ([https://www.rev.com/](https://www.rev.com/))
    to produce much better results at a cost of around US$1 per minute. Most commonly,
    transcription was used for finished edits, not source media.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Today, an AI system called **Whisper** ([https://whisperai.com/](https://whisperai.com/)),
    created by OpenAI and released as open source in 2022, is at the heart of many
    modern transcription services available for little cost and with no per-minute
    processing fees. While Whisper supports many languages, accuracy may vary depending
    on the language spoken, and not all systems support multiple languages. For example,
    caption generation in **Final Cut Pro** (**FCP**) is very fast, but it only officially
    supports US English at the time of writing.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Progress hasn’t slowed, and the best algorithms have improved on the original
    Whisper. They can give excellent results, potentially identifying different speakers
    and coping with input in multiple languages. I’ve been pleasantly surprised that
    transcripts of many hours of speeches usually correctly spell (and capitalize)
    most place, company, and organization names.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: However, if any people’s names are mentioned, you’ll still need to correct those
    by hand. Almost all names have multiple potential spellings, and a computer can’t
    know whether a name should be spelled “Gerry,” “Jerry,” or “Geri.” While humans
    can often figure out how a name should be spelled from context (perhaps a name
    is shown onscreen), a program that only processes audio just takes its best guess.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: While these flaws serve as a great reminder that a human should still be involved
    in many AI-assisted processes, correction may not be needed for every application.
    The captions that accompany a public video should be correct, but creating a transcription
    of video clips that you plan to edit can make it much easier to find the right
    words in a sea of source material. In those cases, the benefits of transcription
    outweigh the flaws.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Notably, while many video platforms support automatic captions for videos added
    to their platforms, they’re often not very good. For example, YouTube’s automatic
    captions have been available for many years, and haven’t improved. Worse, if problematic
    captions are burned into the video (such as in a TikTok post or Instagram reel),
    then typos are saved forever, providing an even more distracting experience for
    all viewers.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'Transcription has become commonplace, and you can find support in the following:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '**MacWhisper**: A paid app for Mac supporting several models and many output
    formats'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 3.1 – MacWhisper’s transcription of a recent interview, exporting
    Segments to CSV](img/B34247_03_001.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
- en: Figure 3.1 – MacWhisper’s transcription of a recent interview, exporting Segments
    to CSV
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '**Adobe Premiere Pro**: Lets you enable automatic transcription of every source
    clip, enabling a full text-based editing workflow'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Final Cut Pro**: Provides automatic transcription of any timeline, with search
    through the timeline index'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Da****V****inci Resolve**: Provides automatic transcription of source clips,
    with AI IntelliScript able to create an automatic rough cut based on a provided
    script'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Jumper**: Provides automatic transcription of source clips for all major
    video editing applications, to enable quick dialogue search through source clips'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Many other applications also provide transcription services, including macOS
    and the major multimodal LLM providers, so I don’t want to focus too much on the
    specific tools involved. However, the best tool for the job will depend on the
    workflows you plan to use these transcriptions with.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Hybrid text-based editing workflows
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some uses of AI-based transcription may seem relatively mundane, though they
    can still be utterly transformative to a workflow in a way that text-based editing
    within a video editing application cannot. Just a few years ago, documentary workflows
    involved comprehensive on-set note-taking, logging, cross-referencing, and scrubbing
    through clips to find the right moments, but today, it can be an easy job if the
    information you need during the edit can simply be spoken aloud.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: For example, on a recent week-long video shoot, I travelled with a team of three
    (though I was the only video professional) to interview 27 people at four different
    locations across Australia. While on the trip, I was able to use MacWhisper to
    produce transcriptions of all the videos and provide them to the team in a format
    that could be opened as a spreadsheet. They were quickly able to use colors to
    highlight the best words spoken for each particular answer, and I was then able
    to use the timecodes as references when marking those sections of each clip.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一周的视频拍摄中，我带着一个由三人组成的团队（尽管我唯一是视频专业人士）前往澳大利亚四个不同的地点采访了27人。在旅途中，我能够使用MacWhisper生成所有视频的转录，并以电子表格格式提供给团队。他们能够迅速使用颜色突出显示每个特定答案的最佳单词，然后我能够使用时间码作为参考，在标记每个剪辑的相应部分时使用。
- en: 'Because each shoot was fresh in our minds, we were able to remember specific
    people and their delivery style, giving context to our choices. We also employed
    specific techniques to support a transcription-based workflow:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每次拍摄都清晰地留在我们的脑海中，我们能够记住特定的人和他们的表达风格，这为我们的选择提供了背景。我们还采用了特定的技术来支持基于转录的工作流程：
- en: Begin each video by asking the interviewee to spell out their name. This avoids
    any issues with speaker identification and spelling.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个视频开始时，请要求受访者拼读他们的名字。这避免了任何与说话人识别和拼写相关的问题。
- en: If you plan to ask multiple interviewees the same question (common in documentaries),
    then number each unique question and say the number out loud as you ask the question.
    This makes it very easy to find answers to specific questions in a transcript
    and allows the interviewer to slightly reword each question if they wish.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你计划向多个受访者提出相同的问题（这在纪录片中很常见），那么请为每个独特的问题编号，并在提问时大声说出编号。这使得在转录中找到特定问题的答案变得非常容易，并且如果需要，采访者可以稍微改写每个问题。
- en: Any notes important to the edit, such as “That was a great take!” should be
    spoken aloud, close enough to a mic to be recorded.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何对编辑重要的笔记，例如“那是一个很好的版本！”，应该大声说出，并且足够靠近麦克风以便被录制。
- en: From MacWhisper, export Segments as `.csv` to separate lines into time-stamped
    rows in a spreadsheet. Since transcriptions often include commas, this format
    uses tabs instead of commas to separate columns. It will be automatically formatted
    if you open it in Apple’s **Numbers** app, but if you prefer **Excel**, use the
    **Data** tab’s **Text to Columns** command to format it correctly.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从MacWhisper导出Segment为`.csv`格式，将单独的行分隔成电子表格中的时间戳行。由于转录通常包含逗号，这种格式使用制表符而不是逗号来分隔列。如果你在苹果的**Numbers**应用程序中打开它，它将自动格式化，但如果你更喜欢**Excel**，请使用**数据**选项卡中的**文本分列**命令来正确格式化它。
- en: In any **non linear editing** (**NLE**) app, you can locate a time-stamped moment
    in a clip with just a timecode, so make sure to create clips that start at `0:00`
    to make sure that the references your collaborators give you match up to your
    clips.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在任何**非线性编辑**（NLE）应用程序中，你只需一个时间码就可以在剪辑中找到带时间戳的时刻，所以请确保创建从`0:00`开始的剪辑，以确保你合作者给出的参考与你剪辑的匹配。
- en: 'A hybrid workflow like this is ideal if content decisions are made by people
    who don’t have access to the video clips themselves, and it’ll work in any video
    editing application. Reading or searching a transcript is much faster than trying
    to find an answer in a sea of video clips, but be sure to advise your collaborators
    of the following:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 如果内容决策是由无法直接访问视频剪辑的人做出的，那么这种混合工作流程是理想的，并且它可以在任何视频编辑应用程序中工作。阅读或搜索转录比在视频剪辑的海洋中寻找答案要快得多，但请务必通知你的合作者以下事项：
- en: A transcription will often omit “um”, “ah,” and pauses, so it’s not always possible
    to judge how good a particular clip is just from a transcript
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转录通常会省略“嗯”、“啊”和停顿，因此仅从转录中判断某个剪辑的好坏并不总是可能的。
- en: There’s often no record of which take might be the best one, though this can
    be spoken aloud on set
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常没有记录哪个版本可能是最好的，尽管这可以在现场大声说出。
- en: Emotion doesn’t come through, and a perfectly spoken line of dialogue may be
    less impactful than an imperfect line spoken with emotion
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感无法传达，一句完美的话语可能不如带有情感的、不完美的台词有影响力。
- en: Videos cannot be edited as easily as text, so bear that in mind when requesting
    edits
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频不像文本那样容易编辑，所以在要求编辑时请记住这一点。
- en: While these tips are based on an unscripted production, in a largely scripted
    workflow, AI still has a place. Avid Media Composer offers the option of **ScriptSync**
    ([https://www.avid.com/products/media-composer-scriptsync-option](https://www.avid.com/products/media-composer-scriptsync-option)),
    which uses AI-based transcription to associate spoken dialogue with a provided
    script. Rather than searching for words you hope someone said, this tool helps
    an editor link a script to real-world footage.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Hybrid workflows can be very useful, but a full text-based editing workflow
    can help you immensely if you’re a video editor who’s empowered to make every
    decision about the video on your own. The preceding transcription tips can still
    help, and you may use these workflows to help collaborators inform your editing
    decisions, but full text-based editing is a different beast.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: 'Full text-based editing workflows: Premiere Pro'
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In **Premiere Pro**, make sure you’ve enabled automatic transcription of all
    clips (If you prefer, you can also transcribe clips manually):'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.2 – Activate automatic transcription in Preferences](img/B34247_03_002.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
- en: Figure 3.2 – Activate automatic transcription in Preferences
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: After importing your clips, select a clip containing audio dialogue, then activate
    the **Text-Based Editing** workspace from the workspace menu at the top right.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'The **Text** panel should become active, and it will include three tabs at
    the top to guide you through the process. **Transcript**, on the left, should
    already be showing you a transcript of the selected clip. There may be errors,
    as there are in the clip shown here:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.3 – The original transcript, good but with a few errors](img/B34247_03_003.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: Figure 3.3 – The original transcript, good but with a few errors
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: If you want to correct these errors, you can edit the text just as you would
    in any word processor, and this is a good idea if you’re planning to create captions
    from the transcript later on. If you’ll be generating final captions another way,
    this doesn’t matter so much.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.4 – Use the pencil “edit” button above the transcript to correct
    any errors](img/B34247_03_004.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
- en: Figure 3.4 – Use the pencil “edit” button above the transcript to correct any
    errors
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: As you select the words in the transcript, they’ll be selected in the clip or
    sequence timeline to the right. Conversely, as you play the clip or sequence,
    words will highlight as they’re encountered.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: To use the transcript for editing, you now have two options. Firstly, if you’ve
    added your clip to a sequence, you can select that clip in the sequence, then
    select words you don’t want to keep in the transcript, then press the *;* (semicolon)
    key to **Lift** (delete and leave a gap) or press the*’* (apostrophe) key to **Extract**
    (ripple delete, removing the gap) that part of the clip from the sequence.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: The other option is to double-click the original clip in the project pane, select
    the words you *do* want to keep, and then **Insert** (comma) or **Overwrite**
    (period) them into a sequence.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: With a sequence built, you can continue to use the **Text** panel if you wish.
    Pauses are indicated by **[…]**, and it’s possible to ripple delete them if you
    wish. Editing with text can be a powerful way to work, and as it lets your clients
    tell you which words to remove rather than sending you timecodes, it can make
    revisions far easier. Clips can also be searched for words spoken in those clips,
    but there’s no way to search across all clips at once. If you need this functionality,
    add all clips to a single timeline and search there.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the transcript of the parts of clips that make up your timeline can
    be converted directly into captions by switching to the **Captions** tab and clicking
    the **Create captions from transcript** button. Captions will then be added to
    a new **Subtitle** track at the top of the timeline. Switch to the **Captions**
    and **Graphics** workspace from the **Workspace** menu.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: If you wish to burn the captions into the video (recommended only if **closed
    captions** aren’t available on your delivery platform), then select all the captions
    and change their appearance using the **Properties** panel to the right. However,
    if closed captions are available, it’s better to use them rather than burning
    in the titles, because many people prefer not to see captions, and other people
    need to control caption appearance themselves.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: For closed captions only, select the **Timeline** pane, then choose **File**
    > **Export** **Captions** and export an SRT file to be uploaded alongside the
    finished video file. Finally, click the eye icon next to the subtitle track, and
    they will no longer be included in the final output video.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: 'Full text-based editing workflow: DaVinci Resolve'
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’ll find all the AI-related features in **DaVinci Resolve** in the same right-click
    menu. In **Media Pool**, select one or more clips, then choose **AI Tools** >
    **Audio Transcription** > **Transcribe**.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.5 – AI Transcription works well in Resolve, but you’ll have to initiate
    it manually](img/B34247_03_005.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
- en: Figure 3.5 – AI Transcription works well in Resolve, but you’ll have to initiate
    it manually
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'When complete, a new window will appear containing the transcription—and though
    your experience may vary, I’ve found Resolve to be more accurate than Premiere
    Pro:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.6 – This unedited transcript contains names such as “Spork Tank
    Games,” which have been spelled and capitalized correctly](img/B34247_03_006.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
- en: Figure 3.6 – This unedited transcript contains names such as “Spork Tank Games,”
    which have been spelled and capitalized correctly
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 'To use the text pane to add part of this clip to a timeline, select the text
    you want to include, then use the buttons at the lower right of the window: **Place
    on Top**, **Insert**, or **Append**.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: When you’ve added clips to a timeline, you can continue to use text to edit
    by switching the toggle at the top left of the window. The second icon shows you
    transcription segments that have been added to clips in your timeline, and you
    can use this to build selections before using commands such as **Ripple Delete**.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.7 – After switching the toggle at the top left, use this window
    to select specific moments](img/B34247_03_007.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
- en: Figure 3.7 – After switching the toggle at the top left, use this window to
    select specific moments
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: 'If you find that not all clips in your timeline have transcription data, you
    can use the ellipsis (**…**) menu at the top right to add it, and also to export
    subtitles:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.8 – Missing clips can be transcribed here](img/B34247_03_008.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: Figure 3.8 – Missing clips can be transcribed here
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Online text-based editing workflows
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While I’d recommend using a desktop-based system for video editing simply to
    avoid the hassle of uploading source clips, online systems are easier for non-editing
    collaborators to use. A system such as **Riverside** ([http://riverside.fm](http://riverside.fm))
    allows clips to be uploaded, automatically transcribed, and then edited by deleting
    parts of the text that aren’t wanted. It works, but it’s far less efficient than
    doing the same steps on a local NLE.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.9 – Riverside works well enough, and the transcription is clear](img/B34247_03_009.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: Figure 3.9 – Riverside works well enough, and the transcription is clear
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: For transcription and editing of specific clips rather than many long clips,
    I can see the benefit of online platforms. However, the real power of these systems
    is in automatic editing workflows, and we’ll be returning to those later.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Automated audio-based editing workflows
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If your focus is on *automated* text-based editing workflows, I’ll be covering
    those later in the book, in [*Chapter 11*](Chapter_11.xhtml#_idTextAnchor183).
    There is often some crossover between different uses of AI tools, but as they
    often do some of the editing work for you, that mostly falls under **automation**.
    Similarly, if you’ll be translating the captions into another language or generating
    new audio in another language, that falls firmly under **Gen** **AI**, and we’ll
    cover those workflows in the next major part of the book.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: Still, transcription isn’t the only trick **U****tility AI** can play with audio…
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Dialogue cleanup
  id: totrans-84
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Most major NLEs now include machine-learning-powered noise removal to enhance
    voice. While this function has been included for decades in one form or another,
    before AI became involved, it simply wasn’t very good—the results often sounded
    like an underwater robot.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Today, in FCP and Davinci Resolve, you’ll find a feature known as **voice isolation**,
    and it removes anything that isn’t a voice remarkably well, with very few noticeable
    artifacts. While these two voice isolation features aren’t identical, they’re
    very similar, and both do a great job of turning recorded dialogue from “OK” to
    “great.”
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: 'Both apps also include automatic levelling features: **Loudness** in FCP, and
    **AI Dialogue Balance** in Resolve. These features try to make quieter sounds
    louder and louder sounds quieter to produce a more balanced result, but they can
    be blunt tools. However, if you’re comfortable with these results, Resolve lets
    you take this a step further with **Timeline** > **AI Tools** > **Audio Assistant**,
    which will complete a full balance and mix for all tracks at once.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: While these features can do a very good job, they’re not a complete substitute
    for a human audio professional, who may make more subtle judgements. Fully automatic
    solutions always have limitations, but the time saved is a trade-off most of us
    are willing to make. If you have the time and budget, hire a professional.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Premiere Pro has a more extreme dialogue enhancement feature in **Essential
    Sound** for clips tagged as **Dialogue**. Look in the **Enhance Speech** section,
    then simply click the **Enhance** button to process any selected clips. This feature
    does improve the quality of the dialogue, but it doesn’t simply remove the parts
    of the recording that don’t resemble voice. Instead, it’s more of a generative
    feature, trying to make a recording sound like it came from a professional recording
    booth. To achieve this, it applies much heavier processing, which has pros and
    cons.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: If a source recording has severe issues—say, a lapel mic rubbing on a synthetic
    shirt—**Enhance** is more likely to produce good results than voice isolation.
    But there’s also a good chance that very faint speech will be turned into much
    louder nonsense words, because this model is prone to hallucinations.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: While most of my recordings sound pristine with voice isolation alone, **Enhance**
    is a great secret weapon to save the day when everything else fails. If **Enhance**
    can’t help, you might want to consider a dedicated plugin. iZotope’s RX plugins
    have many useful features, and RX11 includes a dedicated **AI repair assistant**,
    which promises to fix all common problems in a single step.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: For a more hands-on approach, Logic Pro is a full digital audio workstation
    available as a one-off purchase, and Adobe Audition is a comprehensive audio processing
    app available as part of Creative Cloud. With or without the help of AI, these
    audio-focused tools all have tools to rescue poor recordings.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: With the voice recordings sorted, it’s time to look at the music. Sometimes
    you need to change its length…
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: Audio remix
  id: totrans-94
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Both Premiere Pro and Davinci Resolve offer tools to cleverly change the duration
    of a piece of music. Rather than stretching the music out or changing its tempo,
    repeating or similar parts of the music will be identified, and those parts will
    then be repeated to make the track longer or cut out to make the track shorter.
    Whatever length you need the music to be, these algorithms are likely to do a
    very good job and will certainly be much quicker than a human.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: In Premiere Pro, select the **Audio Remix** tool; it’s the last tool in the
    third stack in the toolbar. With that tool active, simply drag the right edge
    of a music track to the left to make it shorter, or to the right to make it longer.
    Don’t be alarmed if the resulting clip ends up a few seconds longer or shorter
    than the exact spot you dragged it to. Song structure is more important than an
    exact duration.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.10 – Audio Remix in Premiere Pro, showing the repeated sections
    in a music track that’s been extended](img/B34247_03_010.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
- en: Figure 3.10 – Audio Remix in Premiere Pro, showing the repeated sections in
    a music track that’s been extended
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: Jagged lines on the clip will now indicate where parts of the track have been
    repeated or cut out. Play over these sections to make sure you’re happy with the
    results. Happily, this feature doesn’t cost you any AI generative credits in Premiere
    Pro.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: In Davinci Resolve, on the **Edit** page, select **AI Music Editor** in the
    inspector’s **Audio** tab. (Note that this feature is also available on the **Cut**
    and **Fairlight** pages.) If you know the duration you want, you can edit the
    timecode and click the **Adjust** button. The **1**, **2**, **3**, and **4** buttons
    give you different options for the remix, and you can switch between them to pick
    your favorite. Alternatively, if you’d prefer to work interactively, click the
    **Live Trim** checkbox, then drag the right edge of the audio track to the desired
    length. This feature is in the free and paid versions of Resolve, so if you’re
    using FCP or another NLE without a similar feature, Resolve is your friend here.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Resolve also offers other AI-based audio tools, found on the **Fairlight** page.
    Right-click on a clip, choose **AI tools**, and you’ll find **Dialogue Matcher**
    and **Voice Convert**. **Voice Convert** is more on the generative side of things,
    so we’ll cover it later in the book, but **Dialogue Matcher** is easier to classify
    as a utility. Its purpose is to make one clip sound like another clip, though
    it’s not always able to get completely there.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Start by selecting a source clip, then right-click and choose **AI Tools** >
    **Dialogue Matcher** > **Capture Dialogue Profile**. Next, select a clip you’d
    like to sound more like the source clip, then right-click and choose **AI Tools**
    > **Dialogue Matcher** > **Apply Dialogue Profile**. If this is a feature you
    need, FCP has a similar tool called **Match Audio**, found in the **Enhancements**
    menu (a magic wand) under **Viewer**. Select the destination clip, choose **Match
    Audio**, then click on the source clip you want to copy from, and click **Apply**.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: With dialogue cleaned and matched, let’s look at how to remove vocals (or any
    other component) from a finished track.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Selecting musical stems
  id: totrans-104
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: For more complex musical reworking, you may wish to extract the separate parts
    of a music track to be able to remix them yourself. Sometimes you just need to
    separate the vocals from everything else; sometimes you want to take out the rhythm
    section. Depending on your needs, you might choose to do this in Davinci Resolve,
    in Logic Pro, or with another tool.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: 'The easiest solution is in Resolve. In the **Fairlight** tab, select an audio
    track, then turn on **AI Music Remixer** in the inspector. You can use the simple
    sliders here to mute or control the levels of **Voice**, **Drums**, **Bass**,
    **Guitar**, and **Other** parts of a track, or access the same options in a dedicated
    floating window if you prefer:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.11 – Resolve’s AI Music Remixer is quick, but the results aren’t
    perfect](img/B34247_03_011.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
- en: Figure 3.11 – Resolve’s AI Music Remixer is quick, but the results aren’t perfect
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: In general, this tool does allow for some flexibility in the mix, but the separation
    isn’t perfect. For better results, head to Logic Pro, import your track, then
    choose **Function** > **Stem Splitter**. Leave all the options checked on the
    next page, then wait a short time for the results. In my tests with my own tracks,
    Logic Pro’s outputs are far cleaner than the real-time effect in Resolve. It’s
    also pretty convenient to have each stem available as a separate unit for easier
    remixing.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.12 – Logic Pro’s Stem Splitter does a great job of separating components
    into separate tracks](img/B34247_03_012.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
- en: Figure 3.12 – Logic Pro’s Stem Splitter does a great job of separating components
    into separate tracks
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: 'These established desktop apps aren’t the only options today, though. If you
    don’t have Logic Pro, look online and you’ll find a number of different options,
    often making use of the same *Demucs* algorithm. Ultimate Vocal Remover 5 ([https://ultimatevocalremover.com](https://ultimatevocalremover.com))
    is free, and here are several alternatives worth trying: Moises ([https://moises.ai](https://moises.ai)),
    LANDR Stems ([https://landr.com](https://landr.com)), lalal.ai ([https://lalal.ai](https://lalal.ai)),
    and AudioPod.AI ([https://audiopod.ai](https://audiopod.ai)). Some of these services
    also offer other audio processing tools (such as noise reduction or speaker separation),
    so consider building them into your workflow if they perform well for you.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: Stem splitters can be used as a forensic tool to judge the authenticity of a
    music track. Because Gen AI music has been trained on compressed music tracks,
    music generated by AI often contains audible artifacts and cannot be separated
    cleanly into its components. If Logic Pro’s Stem Splitter can’t get good results,
    the track you’re trying to split might have been heavily compressed, or it might
    have been made by Gen AI.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Whether you pulled the music apart or not, AI can also help you find its rhythm.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Identifying music beats
  id: totrans-115
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s end on something simple. While it’s not usually a good idea to always
    time the edits in a video to exactly match music beats, it can bring helpful emphasis
    to key moments. It’s not difficult to add markers manually, but you can use the
    help of AI to spot the beats automatically. In Resolve, right-click an audio track
    on the **Cut** or **Edit** page, then choose **Show Music Beats**.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.13 – Show Music Beats takes a few seconds to initialize, then processes
    very quickly](img/B34247_03_013.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
- en: Figure 3.13 – Show Music Beats takes a few seconds to initialize, then processes
    very quickly
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Lines on the clip will now show potentially impactful places to place your edits.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: For the same trick in FCP, look to BeatMark 2 ([https://ulti.media/beatmark-2/](https://ulti.media/beatmark-2/))
    from Ulti.Media. You can process a clip in this third-party app, then export an
    FCPXML (with markers added) back to FCP.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-121
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Utility AI is undeniably useful, and though it’s not perfect, it’s a lot better
    than nothing. Older audio algorithms could get the job done, but a little machine
    learning has added a lot. Of course, if you’re an expert, you’ll be able to spot
    the flaws in their work, but if you’re an *expert*, they’re just a starting point
    for something better. As ever, if the results are good enough, you can use them
    on their own, but if you also want to get better at a task, tweak some settings,
    listen more closely, and you’ll get better at that task yourself.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll take a look at how Utility AI can help you with image
    and video production tasks.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
