    functionality with Snowflake dataUser story 2 – create a Flow-based wizard to
    select a contact:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '| **提示** | 请提供如何创建 Salesforce 流程以解决以下用户故事的详细说明。请注意用户故事中可能造成误解的空白，以及可能难以创建的流程部分。在流程中包含错误处理，并描述流程对项目文档的作用.Epic
    3 – 与 Snowflake 数据相关的电子邮件功能用户故事 2 – 创建一个基于流程的向导以选择联系人：'
