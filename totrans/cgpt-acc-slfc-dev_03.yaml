  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 用户故事 2 – *创建一个基于流程的向导以选择* *联系人*：
- en: '**Goal**: As a sales rep, I want a wizard to guide me through the process of
    selecting a contact to send the email to so that I can choose the correct recipient.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为销售代表，我希望有一个向导引导我通过选择联系人的过程来发送电子邮件，以便我可以选择正确的收件人。'
- en: '**Acceptance criteria**:'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验收标准**：'
- en: '**Given** a sales rep clicks the **Email** button in the **Snowflake** section'
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定** 销售代表在 **Snowflake** 部分点击 **Email** 按钮'
- en: '**When** the wizard starts'
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当** 向导开始时'
- en: '**Then** the sales rep should be prompted to select a contact associated with
    the account'
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**则** 销售代表应被提示选择与账户关联的联系人'
- en: 'Let’s take a look:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看：
- en: '| **Prompt** | Please provide detailed directions on how to create a Salesforce
    flow to address the following user story. Please note any gaps in the user story
    that leave an opportunity for misunderstandings, as well as any parts of the flow
    that may be tricky to create. Include error handling in the flow, and write a
