  zh: 来自 [*附录 A*](B21462_Appendix_A.xhtml#_idTextAnchor205) 的案例研究有几个用户故事可以使用流程来解决。
- en: 'Let’s use the base flow request:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用基本流程请求：
- en: “*Please provide detailed directions on how to create a Salesforce Flow to address
    the following user story. Please note any gaps in the user story that leave an
    opportunity for misunderstandings, as well as any parts of the flow that may be
    tricky to create. Include error handling in the Flow, and write a description
    of what the Flow does for the* *project documentation.*”
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: “*请提供如何创建 Salesforce 流程以解决以下用户故事的详细说明。请注意用户故事中可能造成误解的空白，以及可能难以创建的流程部分。在流程中包含错误处理，并描述流程对项目文档的作用*”
- en: We’ll also use epic 3 and user story 2 from the case study to investigate ChatGPT’s
    capabilities.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将使用案例研究中的大型任务 3 和用户故事 2 来调查 ChatGPT 的能力。
- en: Epic 3 – *email functionality with* *Snowflake data*
  id: totrans-154
  prefs: []
