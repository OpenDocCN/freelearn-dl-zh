- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Implementing Knowledge Mining, Document Intelligence, and Content Understanding
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施知识挖掘、文档智能和内容理解
- en: In today’s data-driven world, extracting valuable insights from vast amounts
    of unstructured data is essential for businesses to stay competitive. Azure offers
    a powerful suite of AI services—**Knowledge mining**, **Document Intelligence**,
    and the newly introduced **Content Understanding**—to help organizations transform
    unstructured data into actionable knowledge.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今以数据驱动为主的世界里，从大量非结构化数据中提取有价值的见解对于企业保持竞争力至关重要。Azure 提供了一整套强大的 AI 服务——**知识挖掘**、**文档智能**以及新推出的**内容理解**——以帮助组织将非结构化数据转化为可操作的知识。
- en: This chapter explores the practical implementation and use cases of these services.
    You’ll learn how to build intelligent search pipelines using **Azure AI Search**,
    extract structured data from complex documents using Document Intelligence, and
    orchestrate multimodal analysis across text, image, audio, and video content using
    Content Understanding. Each of these services plays a unique role in enabling
    smarter data extraction and enrichment.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了这些服务的实际实施和使用案例。你将学习如何使用 **Azure AI Search** 构建智能搜索管道，使用文档智能从复杂文档中提取结构化数据，以及使用内容理解在文本、图像、音频和视频内容之间进行多模态分析。这些服务中的每一个都在实现更智能的数据提取和丰富中扮演着独特的角色。
- en: 'By the end of this chapter, you will be able to do the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将能够做到以下几件事情：
- en: Leverage Azure AI Search to build scalable search solutions that support both
    lexical and vector-based queries
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用 Azure AI 搜索构建可扩展的搜索解决方案，支持基于词汇和基于向量的查询
- en: Create and run indexers and skillsets to ingest, enrich, and organize data for
    fast retrieval
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建和运行索引器和技能集，以摄取、丰富和组织数据以实现快速检索
- en: Use Document Intelligence to process structured and unstructured documents using
    prebuilt and custom models
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用文档智能通过预构建和自定义模型处理结构化和非结构化文档
- en: Apply Content Understanding to design schema-based analyzers for rich, multimodal
    content pipelines using a low-code/no-code approach
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用低代码/无代码方法将内容理解应用于设计基于模式的丰富多模态内容管道的分析器
- en: Let’s get started!
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Exploring Azure AI Search
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索 Azure AI Search
- en: Azure AI Search is a search-as-a-service solution that enables you to create
    and manage search indexes optimized for fast, efficient information retrieval.
    It supports both **vector** and **text-based** (non-vector) indexing and querying,
    allowing you to find information that is either semantically or lexically similar
    to search queries.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Search 是一种搜索即服务解决方案，它使您能够创建和管理针对快速、高效信息检索优化的搜索索引。它支持**向量**和基于**文本**（非向量）的索引和查询，允许您找到与搜索查询在语义上或词汇上相似的信息。
- en: The service offers a wide range of features, including **relevance tuning**,
    **faceted navigation**, **filters** (such as geo-spatial search), **synonym mapping**,
    and **autocomplete**. It also supports **rich query syntax** for various search
    types—vector, text, hybrid, fuzzy, autocomplete, and geo-search. *Hybrid search*
    enables simultaneous vector and keyword searches, returning a unified result set
    with re-ranking for optimal relevance.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 该服务提供了一系列功能，包括**相关性调整**、**分面导航**、**过滤器**（例如地理空间搜索）、**同义词映射**和**自动完成**。它还支持各种搜索类型的**丰富查询语法**——向量、文本、混合、模糊、自动完成和地理搜索。*混合搜索*允许同时进行向量和关键词搜索，返回一个经过重新排序的统一结果集，以实现最佳的相关性。
- en: 'From my experience, many customers find it challenging to grasp the concept
    of AI Search. Using these analogies—Azure AI Search as the server, indexes as
    databases, indexers as the **Extract, Transform, and Load** (**ETL**) pipeline,
    and skillsets as transformations—helps them see how AI Search’s core components
    mirror familiar database architecture patterns, as shown in *Figure 7**.1*:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，许多客户发现理解 AI 搜索的概念具有挑战性。使用这些类比——将 Azure AI 搜索视为服务器、索引视为数据库、索引器视为**提取、转换和加载**（**ETL**）管道，以及技能集视为转换——有助于他们了解
    AI 搜索的核心组件如何与熟悉的数据库架构模式相呼应，如图*7*1*所示：
- en: '**Azure AI Search**: Think of Azure AI Search as the *database server*. Just
    as a single physical server can host multiple databases (as long as it has enough
    compute), one Azure AI Search resource can host multiple indexes.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure AI Search**：将 Azure AI 搜索视为*数据库服务器*。就像单个物理服务器可以托管多个数据库（只要它有足够的计算能力），一个
    Azure AI 搜索资源可以托管多个索引。'
- en: '**Index**: An index is like a *database* in a relational system. You define
    the *schema* for your searchable content (fields and types), and the index stores
    all documents in that structure. This is where all your searchable data resides.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引**：索引在关系型系统中类似于数据库。您为可搜索内容定义**模式**（字段和类型），索引存储所有文档在该结构中。这是所有可搜索数据所在的地方。'
- en: '**Indexer**: This acts as your ETL pipeline. It extracts data from sources
    (e.g., Blob Storage and SQL databases), transforms it with AI enrichment (via
    skillsets), and then loads it into the index. For example, you can schedule the
    indexer to run every five minutes, automatically pulling in new or updated documents
    and refreshing your index.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引器**：这充当您的ETL管道。它从源（例如Blob存储和SQL数据库）提取数据，使用AI增强（通过技能集）进行转换，然后将数据加载到索引中。例如，您可以安排索引器每五分钟运行一次，自动拉取新或更新的文档并刷新您的索引。'
- en: '**Skillset**: This is a collection of data transformation or enrichment steps,
    similar to the transformation logic in ETL. It can include built-in AI functions
    such as**Optical Character Recognition** (**OCR**), language detection, or entity
    recognition. This enrichment lets the indexer add metadata and insights—much like
    a data quality or data transformation step—before data is loaded into the index.
    For example, suppose you store PDFs about company policies in multiple languages.
    An indexer with a skillset can extract text (OCR), detect each document’s language,
    and store that metadata in the index. This makes it easier to filter or search
    by language later, just as you would filter records in a database.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技能集**：这是一组数据转换或增强步骤，类似于ETL中的转换逻辑。它可以包括内置的AI函数，如**光学字符识别**（**OCR**）、语言检测或实体识别。这种增强允许索引器在数据加载到索引之前添加元数据和洞察——就像数据质量或数据转换步骤一样。例如，假设您以多种语言存储有关公司政策的PDF文件。具有技能集的索引器可以提取文本（OCR），检测每个文档的语言，并将该元数据存储在索引中。这使得以后可以根据语言过滤或搜索变得更容易，就像在数据库中过滤记录一样。'
- en: '![Figure 7.1 – Azure AI Search vs Traditional Database: A component-Level comparisons](img/B31034_07_001.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图7.1 – Azure AI搜索与传统数据库：组件级比较](img/B31034_07_001.jpg)'
- en: 'Figure 7.1 – Azure AI Search vs Traditional Database: A component-Level comparisons'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1 – Azure AI搜索与传统数据库：组件级比较
- en: Azure AI Search integrates with other Azure services, allowing for automated
    data ingestion and retrieval from Azure data sources, and incorporates consumable
    AI from Azure AI services, such as image and **Natural Language Processing** (**NLP**).
    The indexing process can be extended with AI enrichment, which includes skills
    such as OCR, image description, structure inference, text translation, and machine
    learning capability. The service is accessible through the Azure portal, REST
    APIs, and Azure SDKs for .NET, Python, and JavaScript.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI搜索与其他Azure服务集成，允许从Azure数据源自动摄取和检索数据，并整合来自Azure AI服务的可消费AI，例如图像和**自然语言处理**（**NLP**）。索引过程可以通过AI增强来扩展，包括OCR、图像描述、结构推理、文本翻译和机器学习能力。该服务可通过Azure门户、REST
    API和.NET、Python和JavaScript的Azure SDK访问。
- en: Let’s explore how the Azure AI Search process works. It’s essential to understand
    the concept and flow to fully grasp its functionality.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索Azure AI搜索过程是如何工作的。理解其概念和流程对于完全掌握其功能至关重要。
- en: Azure AI Search process
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Azure AI搜索过程
- en: Azure AI Search ingests data from various sources, such as Azure Blob Storage,
    Azure Cosmos DB, and other supported data sources, as shown in *Figure 7**.2*.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI搜索从各种来源摄取数据，如图*图7.2*所示，例如Azure Blob存储、Azure Cosmos DB和其他支持的数据源。
- en: The indexing engine processes data by tokenizing and storing it in indexes for
    efficient search retrieval, while AI enrichment enhances the data using cognitive
    skills such as OCR and others to improve its structure and searchability. The
    indexer pipeline follows a multi-step process involving content extraction, field
    mapping, skillset application, and output field mapping, ultimately pushing the
    enriched data into the search index. The query engine then processes search requests,
    allowing applications to collect user input, submit queries, and display relevant
    results, enabling fast and accurate search from large datasets.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 索引引擎通过标记化并将数据存储在索引中以进行高效搜索检索来处理数据，同时AI增强使用认知技能（如OCR等）来增强数据，以改善其结构和可搜索性。索引器管道遵循一个多步骤过程，包括内容提取、字段映射、技能集应用和输出字段映射，最终将增强后的数据推送到搜索索引。然后查询引擎处理搜索请求，允许应用程序收集用户输入、提交查询并显示相关结果，从而实现从大型数据集中快速准确地搜索。
- en: The following diagram illustrates the entire process from data ingestion to
    going through the indexer pipelines to enrich data and prepare it for searching.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表说明了从数据摄取到通过索引器管道丰富数据并为其搜索准备的全部过程。
- en: '![Figure 7.2 – Overall AI Search indexing process](img/B31034_07_002.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图7.2 – 总体AI搜索索引过程](img/B31034_07_002.jpg)'
- en: Figure 7.2 – Overall AI Search indexing process
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2 – 总体AI搜索索引过程
- en: 'Let’s look at the process in detail:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们详细看看这个过程：
- en: '**Data sources**: Data can be ingested from various sources, including Azure
    Blob Storage, Azure Cosmos DB, Azure Data Lake Storage Gen2, Azure SQL Database,
    Azure Table Storage, and other preview sources. Azure AI Search continues to incorporate
    new data sources to enhance its capabilities.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据源**：数据可以从各种来源摄取，包括Azure Blob存储、Azure Cosmos DB、Azure Data Lake Storage
    Gen2、Azure SQL数据库、Azure Table存储和其他预览来源。Azure AI搜索继续整合新的数据源以增强其功能。'
- en: '**Indexing engine**: The indexing engine automates data ingestion and retrieval
    by performing both **full indexing** (initial data load) and **refresh indexing**
    (incremental updates). During this process, the following happens:'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**索引引擎**：索引引擎通过执行**完整索引**（初始数据加载）和**刷新索引**（增量更新）来自动化数据摄取和检索。在这个过程中，以下情况发生：'
- en: Text is tokenized and stored in **inverted indexes** for fast keyword-based
    searches
  id: totrans-31
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本被分词并存储在**倒排索引**中，以支持基于关键词的快速搜索
- en: Vector embeddings are stored in **vector indexes** to support semantic and similarity-based
    searches
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向量嵌入存储在**向量索引**中，以支持语义和基于相似度的搜索
- en: '**AI enrichment**: Optional AI enrichment enhances content before indexing
    by using **built-in cognitive skills** (such as OCR, language detection, and entity
    recognition) or **custom AI models** (via Azure Machine Learning). This step helps
    create a searchable structure and metadata where none existed, improving the quality
    of search results.'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**AI增强**：可选的AI增强在索引之前通过使用**内置的认知技能**（如OCR、语言检测和实体识别）或**自定义AI模型**（通过Azure机器学习）来增强内容。这一步骤有助于创建一个可搜索的结构和元数据，其中原本不存在，从而提高搜索结果的质量。'
- en: '**Indexer pipeline**: This defines how content is processed and transformed
    before entering the index. The pipeline typically includes the following:'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**索引器管道**：这定义了内容在进入索引之前如何被处理和转换。管道通常包括以下内容：'
- en: '**Document cracking**: Extracting content from documents to make it searchable'
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档破解**：从文档中提取内容以使其可搜索'
- en: '**Field mappings**: Mapping fields to appropriate types to ensure data integrity
    and relevance'
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字段映射**：将字段映射到适当的类型以确保数据完整性和相关性'
- en: '**Skillset execution**: Applying AI skills to enhance data by performing tasks
    such as text translation, sentiment analysis, and more'
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技能集执行**：通过执行文本翻译、情感分析等任务来应用AI技能以增强数据'
- en: '**Output field mappings**: Preparing data for indexing by structuring it in
    a way that aligns with the search schema'
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输出字段映射**：通过以与搜索架构一致的方式结构化数据来准备数据以便索引'
- en: '**Push into index**: Adding the processed data to the search index, making
    it ready for querying'
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推入索引**：将处理后的数据添加到搜索索引中，使其准备好进行查询'
- en: '**Your app**: This handles user input, formulates and sends search requests,
    and manages responses to display the result set or a single document.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**您的应用**：这处理用户输入，制定并发送搜索请求，并管理响应以显示结果集或单个文档。'
- en: '**Query engine**: This processes search requests from applications, utilizing
    rich query syntax for vector queries, text search, hybrid queries, fuzzy search,
    autocomplete, geo-search, and more. It provides simple and advanced query capabilities
    using supported syntax and full Lucene query syntax extensions.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**查询引擎**：处理来自应用的搜索请求，利用丰富的查询语法进行向量查询、文本搜索、混合查询、模糊搜索、自动完成、地理搜索等。它使用支持的语法和完整的Lucene查询语法扩展提供简单和高级的查询功能。'
- en: Let’s solidify your understanding of the indexing process by working through
    the following exercises.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以下练习来巩固您对索引过程的了解。
- en: Exercise instructions
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 练习说明
- en: '*Exercises 1* and the next three explorations introduce the core concepts of
    Azure AI Search, including how to create a search service, index, skillset, and
    indexer using the Azure portal for a visual learning experience. These foundational
    steps prepare you for *Exercise 2*, which brings all these elements together using
    the SDK approach and incorporates advanced topics such as custom skills, Azure
    Functions, and knowledge stores. This progression reinforces earlier concepts
    and helps you build proficiency in both portal-based and SDK-driven workflows.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '*练习1*以及接下来的三个探索介绍了Azure AI Search的核心概念，包括如何使用Azure门户创建搜索服务、索引、技能集和索引器，以获得直观的学习体验。这些基础步骤为你准备*练习2*，该练习使用SDK方法将所有这些元素整合在一起，并包含高级主题，如自定义技能、Azure
    Functions和知识库。这种进展加强了早期概念，并帮助你熟练掌握基于门户和SDK驱动的流程。'
- en: Later, in [*Chapter 10*](B31034_10.xhtml#_idTextAnchor191), you’ll learn about
    Azure OpenAI’s integrated vectorization for AI Search, which streamlines data
    preparation and indexing for both **Retrieval-Augmented Generation** (**RAG**)
    and traditional search applications.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在后续的[*第10章*](B31034_10.xhtml#_idTextAnchor191)中，你将了解Azure OpenAI为AI Search提供的集成向量化功能，该功能简化了数据准备和索引过程，适用于**检索增强生成**（**RAG**）和传统搜索应用。
- en: 'Exercise 1: Creating an Azure AI Search service'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习1：创建Azure AI Search服务
- en: 'In this exercise, you will explore the Azure portal by creating an Azure AI
    Search service. This will make it easier to understand the configuration options:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，您将通过创建Azure AI Search服务来探索Azure门户。这将使您更容易理解配置选项：
- en: 'Either navigate from [https://portal.azure.com](https://portal.azure.com) to
    create a resource and select **AI Search** or use the following URL to jump straight
    to it: [https://portal.azure.com/#create/Microsoft.Search](https://portal.azure.com/#create/Microsoft.Search).'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要创建资源并选择**AI Search**，请从[https://portal.azure.com](https://portal.azure.com)导航，或者使用以下链接直接跳转到该页面：[https://portal.azure.com/#create/Microsoft.Search](https://portal.azure.com/#create/Microsoft.Search)。
- en: Select your subscription from the **Subscription** dropdown and select an existing
    resource group from the **Resource Group** dropdown, if you have one that you’d
    like to use. Alternatively, select the option to create a new resource group.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从**订阅**下拉菜单中选择您的订阅，如果有的话，从**资源组**下拉菜单中选择一个现有的资源组。或者，选择创建新资源组的选项。
- en: Enter the desired name for your service, and select your region.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入您服务的所需名称，并选择您的区域。
- en: 'Click on the **Change Pricing Tier** link to be taken to a different window,
    called **Select Pricing Tier**, which is a different kind of specification picker
    than you might be used to from other resource types. You’ll be able to see the
    different pricing tiers available and their respective resources, as shown in
    *Figure 7**.3*:'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**更改定价层**链接，将打开一个名为**选择定价层**的新窗口，它不同于您可能从其他资源类型中习惯的指定选择器。您将能够看到不同的定价层及其相应的资源，如图*图7.3*所示：
- en: '![Figure 7.3 – Select Pricing Tier view](img/B31034_07_003.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图7.3 – 选择定价层视图](img/B31034_07_003.jpg)'
- en: Figure 7.3 – Select Pricing Tier view
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3 – 选择定价层视图
- en: Important note
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: It’s important to select the most suitable pricing tier for your solution because
    you can’t change it later. If you find that the pricing tier you have chosen is
    no longer suitable for your solution, you must create a new Azure AI Search resource
    and recreate all indexes and objects. Currently, Azure AI Search does not offer
    a built-in mechanism or tool to automate the migration from a lower SKU to a higher
    SKU. The recommended approach is to use the backup and restore method. For more
    details, refer to [https://learn.microsoft.com/en-us/samples/azure-samples/azure-search-dotnet-utilities/azure-search-backup-restore-index/](https://learn.microsoft.com/en-us/samples/azure-samples/azure-search-dotnet-utilities/azure-search-backup-restore-index/).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 选择最适合您解决方案的价格层非常重要，因为您以后无法更改它。如果您发现您选择的价格层不再适合您的解决方案，您必须创建一个新的Azure AI Search资源，并重新创建所有索引和对象。目前，Azure
    AI Search不提供内置机制或工具来自动化从较低SKU迁移到较高SKU的过程。建议的方法是使用备份和还原方法。有关更多详细信息，请参阅[https://learn.microsoft.com/en-us/samples/azure-samples/azure-search-dotnet-utilities/azure-search-backup-restore-index/](https://learn.microsoft.com/en-us/samples/azure-samples/azure-search-dotnet-utilities/azure-search-backup-restore-index/)。
- en: 'After selecting an appropriate Azure AI Search service pricing tier, click
    **Next: Scale**.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在选择适当的Azure AI Search服务价格层后，点击**下一步：扩展**。
- en: 'You can choose an appropriate setting for **Replicas** and **Partitions**,
    as shown in *Figure 7**.3*; note that these configurations can be modified after
    the creation of the Azure AI Search service later:'
  id: totrans-57
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您可以选择适当的**副本**和**分区**设置，如图*图 7.3*所示；请注意，这些配置可以在创建 Azure AI 搜索服务后进行修改：
- en: '**Replicas** are instances of the Search service; you can think of them as
    nodes in a cluster. Increasing the number of replicas can help ensure there is
    sufficient capacity to service multiple concurrent query requests while managing
    ongoing indexing operations.'
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**副本**是搜索服务的实例；您可以将它们视为集群中的节点。增加副本的数量可以帮助确保有足够的容量来服务多个并发查询请求，同时管理持续进行的索引操作。'
- en: '**Partitions** are used to divide an index into multiple storage locations,
    enabling you to split I/O operations such as querying or rebuilding an index.'
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分区**用于将索引分成多个存储位置，使您能够分割 I/O 操作，如查询或重建索引。'
- en: The combination of replicas and partitions you configure determines the *search
    units* used by your solution. Put simply, the number of search units is the number
    of replicas multiplied by the number of partitions (*R x P = SU*). For example,
    a resource with two replicas and two partitions uses four search units.
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您配置的副本和分区的组合决定了您的解决方案使用的*搜索单元*。简单来说，搜索单元的数量是副本数量与分区数量的乘积（*R x P = SU*）。例如，具有两个副本和两个分区的资源使用四个搜索单元。
- en: '![Figure 7.4 – Replica and partition units on the Scale tab](img/B31034_07_004.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.4 – 在“缩放”选项卡上的副本和分区单元](img/B31034_07_004.jpg)'
- en: Figure 7.4 – Replica and partition units on the Scale tab
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.4 – 在“缩放”选项卡上的副本和分区单元
- en: Click on **Review + create** and select **Create** to provision the new Azure
    AI Search service. Once completed, go into your new Azure AI Search service and
    look through the available settings. You will be able to see indexes, indexers,
    data sources, skillsets, debug sessions, and horizontal scaling options.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**审查 + 创建**并选择**创建**以部署新的 Azure AI 搜索服务。完成后，进入您的新 Azure AI 搜索服务并查看可用的设置。您将能够看到索引、索引器、数据源、技能集、调试会话和横向扩展选项。
- en: '![Figure 7.5 – Overview of the Azure AI Search service after creation](img/B31034_07_005.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.5 – 创建后的 Azure AI 搜索服务概述](img/B31034_07_005.jpg)'
- en: Figure 7.5 – Overview of the Azure AI Search service after creation
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.5 – 创建后的 Azure AI 搜索服务概述
- en: Alternatively, you can create an Azure AI Search service using the following
    CLI or PowerShell commands.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 或者，您可以使用以下 CLI 或 PowerShell 命令创建 Azure AI 搜索服务。
- en: 'This is the CLI command:'
  id: totrans-67
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是 CLI 命令：
- en: '[PRE0]'
  id: totrans-68
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: While the CLI accepts but doesn’t require a location (because it will inherit
    from the resource group), PowerShell requires the location to be specified.
  id: totrans-69
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 虽然 CLI 接受但不要求指定位置（因为它将从资源组继承），但 PowerShell 需要指定位置。
- en: Now that you have explored the Azure AI Search service, which provides compute,
    storage, indexing, and search capabilities, you can put it to good use.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您已经探索了 Azure AI 搜索服务，它提供了计算、存储、索引和搜索功能，您可以将它用于良好的用途。
- en: 'Before we dive into the full SDK-based implementation in *Exercise 2: Creating
    an index, skillset, indexer, custom skill, and knowledge store within VS Code*,
    let’s take a moment to explore the core components of Azure AI Search—**indexes**,
    **skillsets**, and **indexers**—using the Azure portal. Gaining a visual understanding
    of how these elements interact will help you better grasp the concepts behind
    the code.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入到基于 SDK 的完整实现之前，在*练习 2：在 VS Code 中创建索引、技能集、索引器、自定义技能和知识库*，让我们花点时间探索 Azure
    AI 搜索的核心组件——**索引**、**技能集**和**索引器**——使用 Azure 门户。对这些元素如何交互的视觉理解将帮助您更好地掌握代码背后的概念。
- en: Understanding indexes, skillsets, and indexers in the Azure portal
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Azure 门户中理解索引、技能集和索引器
- en: Before jumping into *Exercise 2*, which walks you through building a full search
    pipeline using the Azure SDK and REST APIs, it’s helpful to first understand what
    happens behind the scenes by using the Azure portal. Visualizing these elements
    makes it easier to comprehend the code you’ll work with later. Think of this as
    a guided walk-through, not a hands-on exercise.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在跳转到*练习 2*之前，该练习将指导您使用 Azure SDK 和 REST API 构建完整的搜索管道，首先理解使用 Azure 门户幕后发生的事情是有帮助的。可视化这些元素会使您更容易理解稍后将要工作的代码。将其视为一个引导性的浏览，而不是一个动手练习。
- en: Many developers start coding without fully grasping how the components of Azure
    AI Search connect. But being able to *see* your index, skillset, and indexer reflected
    in the portal not only reinforces conceptual understanding but also builds confidence
    when troubleshooting SDK code.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 许多开发者在没有完全理解Azure AI搜索组件如何连接的情况下开始编码。但能够*看到*你的索引、技能集和索引器在门户中的反映不仅加强了概念理解，而且在调试SDK代码时也增强了信心。
- en: We recommend that after completing each step in *Exercise 2*, you navigate to
    the portal and review the corresponding changes in the Azure AI Search interface.
    The next few sections explain how to do that, starting with indexes.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们建议在完成*练习2*的每个步骤后，导航到门户并审查Azure AI搜索界面中的相应更改。接下来的几节将解释如何做到这一点，从索引开始。
- en: Exploring indexes
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索索引
- en: 'In this section, you will navigate an index with proper fields and definitions.
    This will give you a good overview of all the steps and elements needed for this
    process:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将导航一个具有适当字段和定义的索引。这将为你提供一个关于此过程所需的所有步骤和元素的全面概述：
- en: Navigate to **Overview** from the navigator menu on the left and click **Add
    index** in the **+ Add index** dropdown to be taken to a different window, called
    **Create index**.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从左侧的导航菜单转到**概览**，然后在**+ 添加索引**下拉菜单中点击**添加索引**，将被带到名为**创建索引**的不同窗口。
- en: Create a new index field by clicking `title`, `summary`, or `id` if you want
    them to appear in the output. This is read-only for the `key` field (e.g., `id`),
    which is always retrievable.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你希望它们出现在输出中，可以通过点击`title`、`summary`或`id`来创建一个新的索引字段。对于`key`字段（例如，`id`），这是只读的，总是可检索的。
- en: '`category`, `status`, or `price` ranges–for example, `category` `eq ''Books''`.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`category`、`status`或`price`范围，例如，`category` `eq ''Books''`。'
- en: '`Edm.String` fields. This setting defines how the text is tokenized and normalized
    for indexing and querying. You can choose language-specific analyzers such as
    `en.lucene`, `fr.microsoft`, and so on, to support linguistic nuances in different
    languages.'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Edm.String`字段。此设置定义了文本在索引和查询中的分词和规范化方式。你可以选择特定于语言的分析器，如`en.lucene`、`fr.microsoft`等，以支持不同语言的语言细微差别。'
- en: '`Collection(Edm.Single)`.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Collection(Edm.Single)`。'
- en: Important note
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: While you can add new fields later, existing field definitions are locked permanently
    once the index is created. Therefore, developers often use the Azure portal for
    simple indexes, testing ideas, or reviewing settings before finalizing the index
    structure.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可以在之后添加新字段，但一旦索引创建完成，现有的字段定义将永久锁定。因此，开发者通常在Azure门户中用于简单的索引、测试想法或审查设置，在最终确定索引结构之前。
- en: 'Before finalizing the index creation, it is essential to define the appropriate
    fields and their attributes to ensure optimal search performance. The following
    sample figure illustrates how to configure these fields within the Azure AI Search
    index creation interface:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在最终确定索引创建之前，定义适当的字段及其属性对于确保最佳搜索性能至关重要。以下示例图说明了如何在Azure AI搜索索引创建界面中配置这些字段：
- en: "![Figure 7.6 – Example of index field definitions w\uFEFFith configuration\
    \ settings](img/B31034_07_006.jpg)"
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图7.6 – 具有配置设置的索引字段定义示例](img/B31034_07_006.jpg)'
- en: Figure 7.6 – Example of index field definitions with configuration settings
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.6 – 具有配置设置的索引字段定义示例
- en: 'Once the index is created and data is pulled in through the indexer pipeline,
    you will see all the details of the schema configuration, as shown in *Figure
    7**.7* and described in the following list:'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦索引创建完成并通过索引器管道拉取数据，你将看到模式配置的所有详细信息，如图*图7.7*所示，并在以下列表中描述：
- en: '![Figure 7.7 – Example view of the Search explorer tab with index schema preview](img/B31034_07_007.jpg)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图7.7 – 搜索探索器标签页的索引模式预览示例视图](img/B31034_07_007.jpg)'
- en: Figure 7.7 – Example view of the Search explorer tab with index schema preview
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.7 – 搜索探索器标签页的索引模式预览示例视图
- en: '**Search explorer**: If you click the **Search** button, no data will be shown
    except the header, since we only created the schema definition without data.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**搜索探索器**：如果你点击**搜索**按钮，除了标题外不会显示任何数据，因为我们只创建了模式定义而没有数据。'
- en: '**Fields**: Displays the full list of fields (schema) defined for your index,
    along with each field’s type and attributes such as *filterable*, *sortable*,
    *searchable*, and so on.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字段**：显示为你的索引定义的完整字段列表（模式），以及每个字段的类型和属性，如*可筛选的*、*可排序的*、*可搜索的*等。'
- en: '**CORS**: **Cross-origin resource sharing** (**CORS**) is an HTTP feature that
    enables a web application running on one domain to access resources hosted on
    another domain. This is especially useful when allowing client-side JavaScript
    to interact with your Azure AI Search index from a different domain.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CORS**：**跨源资源共享**（**CORS**）是一个HTTP功能，它允许运行在一个域上的Web应用程序访问另一个域上托管的资源。这在允许客户端JavaScript从不同域与您的Azure
    AI搜索索引交互时特别有用。'
- en: '**Scoring profiles**: Scoring profiles allow you to customize the relevance
    of search results based on criteria you define. Each profile consists of weighted
    fields, scoring functions, and parameters. By assigning higher weights to specific
    fields, you can influence the ranking of search results to prioritize the most
    relevant content.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评分配置文件**：评分配置文件允许您根据您定义的标准自定义搜索结果的相关性。每个配置文件都包含加权字段、评分函数和参数。通过将更高的权重分配给特定字段，您可以影响搜索结果的排名，优先显示最相关的内容。'
- en: '**Semantic configurations**: This enhances the relevance of search by leveraging
    advanced AI capabilities. It allows you to define how the search service interprets
    and ranks content based on semantic understanding, rather than relying solely
    on keyword matching.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义配置**：这通过利用高级AI能力来增强搜索的相关性。它允许您定义搜索服务如何根据语义理解来解释和排名内容，而不是仅仅依赖于关键词匹配。'
- en: '**Vector profiles**: Define the settings for **vector-based similarity search**
    within the index. These profiles specify algorithms (such as HNSW), parameters
    (e.g., top-k), and the vector fields used for embedding comparisons, enabling
    hybrid or purely semantic search experiences.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量配置文件**：在索引中定义基于向量的相似性搜索的设置。这些配置文件指定算法（如HNSW）、参数（例如，top-k）和用于嵌入比较的向量字段，从而实现混合或纯语义搜索体验。'
- en: 'Now that you’ve explored a new index, let’s proceed with the next step: exploring
    skillsets.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经探索了一个新的索引，让我们继续下一步：探索技能集。
- en: Exploring skillsets
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索技能集
- en: '**Skills** in Azure AI Search are used to enrich and transform content during
    the indexing process. Skills can perform various operations such as OCR, language
    detection, key phrase extraction, and entity recognition. These skills help in
    converting raw content into a more searchable format. Skills are organized into
    categories, including built-in skills that wrap API calls to Azure resources and
    customer skills that execute external code provided by the users. The output of
    these skills is typically text-based, making it suitable for full-text search
    or vector search.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI搜索中的**技能**用于在索引过程中丰富和转换内容。技能可以执行各种操作，如OCR、语言检测、关键词提取和实体识别。这些技能有助于将原始内容转换为更易于搜索的格式。技能被组织到不同的类别中，包括内置技能，这些技能封装了对Azure资源的API调用，以及用户提供的代码执行的外部技能。这些技能的输出通常是文本形式的，这使得它们适合全文搜索或向量搜索。
- en: 'In this section, you will explore creating skillsets and understand a variety
    of skillsets that enhance the indexing process by applying AI capabilities to
    your data:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将探索创建技能集，并了解各种通过将AI能力应用于您的数据来增强索引过程的技能集：
- en: Navigate to the left panel of the menu, select **Skillsets** under **Search
    management**, and select **+ Add skillset** on the right side of the window. This
    will open a new window called **Add skillset**.
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到菜单的左侧面板，在**搜索管理**下选择**技能集**，然后在窗口右侧选择**+ 添加技能集**。这将打开一个名为**添加技能集**的新窗口。
- en: Click **+ Add new skill**, which will open the **Add new skill** pane on the
    right. For more information on a specific skill, select it, and detailed information
    will appear just below the drop-down menu.
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**+ 添加新技能**，这将打开右侧的**添加新技能**面板。有关特定技能的更多信息，请选择它，详细信息将出现在下拉菜单下方。
- en: Select an appropriate skill from the skill definition templates, then click
    the **Add** button to include it in the main skillset definition on the left side.
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从技能定义模板中选择一个合适的技能，然后点击**添加**按钮，将其包含在左侧的主要技能集定义中。
- en: Important note
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: You may have to create an Azure AI service in order to use skillsets by clicking
    on **Connect** **AI service**.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能需要通过点击**连接** **AI服务**来创建Azure AI服务，以便使用技能集。
- en: 'Let’s take a look at the portal to help your understanding:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个门户，以帮助您更好地理解：
- en: '![Figure 7.8 – Example of adding a skillset](img/B31034_07_008.jpg)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图7.8 – 添加技能集的示例](img/B31034_07_008.jpg)'
- en: Figure 7.8 – Example of adding a skillset
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.8 – 添加技能集的示例
- en: Now, let’s examine indexers and how they pull data and populate the index.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们检查索引器以及它们如何拉取数据和填充索引。
- en: Exploring indexers
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索索引器
- en: An indexer is a component that automates the process of pulling data from the
    data source and populating the index. It can be scheduled to run at regular intervals
    to keep the index updated.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 索引器是一个组件，它自动化从数据源提取数据并填充索引的过程。它可以定期运行以保持索引更新。
- en: This section will guide you through the steps to create indexers associated
    with an index, set up skills for data ingestion, and process the data through
    the pipeline.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将指导您完成创建与索引关联的索引器、设置数据摄取技能以及通过管道处理数据的步骤。
- en: 'From the **Overview** blade of AI Search, select **Indexers** under **Search
    management** and click the **Add indexer** option. This opens an **Add indexer**
    window, as shown in the following figure:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 从AI搜索的**概览**选项卡下，在**搜索管理**中选中**索引器**，然后点击**添加索引器**选项。这将打开一个**添加索引器**窗口，如图下所示：
- en: '![Figure 7.9 – Example of configuring indexer settings](img/B31034_07_009.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图7.9 – 配置索引器设置的示例](img/B31034_07_009.jpg)'
- en: Figure 7.9 – Example of configuring indexer settings
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.9 – 配置索引器设置的示例
- en: 'The **Add indexer** window allows users to configure and schedule an indexer,
    which is a tool that extracts content from a data source and applies enrichment
    before adding it to an Azure AI Search index. Let’s walk through the various fields:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**添加索引器**窗口允许用户配置和安排索引器，这是一个从数据源提取内容并在将其添加到Azure AI搜索索引之前应用丰富化的工具。让我们浏览各个字段：'
- en: '**Basic Settings**:'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基本设置**：'
- en: '**Name**: Provide a unique name for your indexer. This is used to identify
    the indexer within the Azure AI Search service.'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**名称**：为您的索引器提供一个唯一的名称。这用于在Azure AI搜索服务中识别索引器。'
- en: '**Index**: Select the index you want the data to be added to. This is where
    the searchable content will be stored.'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引**：选择您想要添加数据的索引。这是可搜索内容将被存储的地方。'
- en: '**Data sources**: Choose the data source from which the indexer will pull the
    data. This could be Blob Storage, Cosmos DB, SQL Database, and so on.'
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据源**：选择索引器将从中提取数据的源。这可能包括Blob存储、Cosmos DB、SQL数据库等。'
- en: '**Skillset**: If you have created a skillset for AI enrichment, select it here.
    Skillsets apply cognitive skills such as OCR, key phrase extraction, and entity
    recognition to enhance the data.'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技能集**：如果您为AI丰富创建了技能集，请在此处选择它。技能集将OCR、关键词提取和实体识别等认知技能应用于数据以增强数据。'
- en: '**Schedule**:'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计划**：'
- en: '**Once**, **Hourly**, **Daily**, or **Custom**: Set the frequency with which
    the indexer should run. You can choose to run it once or on an hourly, daily,
    or custom schedule. Note that 5 minutes is the maximum interval time between indexer
    executions.'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一次**、**每小时**、**每天**或**自定义**：设置索引器应运行的频率。您可以选择一次性运行或按小时、每天或自定义计划运行。请注意，5分钟是索引器执行之间的最大间隔时间。'
- en: '**Advanced Settings**:'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级设置**：'
- en: '**Base-64 Encode Keys**: Enable this if your keys are Base-64 encoded.'
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Base-64编码密钥**：如果您的密钥是Base-64编码的，请启用此选项。'
- en: '**Enable incremental enrichment**: Check this if you want the indexer to perform
    incremental enrichment, meaning it will only process new or updated data since
    the last run.'
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启用增量丰富**：如果您希望索引器执行增量丰富，请勾选此选项，这意味着它将只处理自上次运行以来新或更新的数据。'
- en: '**Batch size**: Specify the number of documents to process in each batch. Adjusting
    the batch size can help optimize performance based on your data and resources.'
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**批量大小**：指定每个批次中要处理的文档数量。根据您的数据和资源调整批量大小可以帮助优化性能。'
- en: '**Indexer cache location**: Choose an existing connection if you want to use
    a specific cache location for the indexer.'
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引器缓存位置**：如果您想为索引器使用特定的缓存位置，请选择现有的连接。'
- en: '**Max failed items**: Set the maximum number of items that can fail before
    the indexer stops.'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最大失败项数**：设置在索引器停止之前可以失败的最大项数。'
- en: '**Max failed items per batch**: Set the maximum number of failed items allowed
    per batch.'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每批最大失败项数**：设置每批允许的最大失败项数。'
- en: '**Managed identity authentication**: Choose whether you want to use managed
    identity for authentication.'
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**托管标识认证**：选择是否要使用托管标识进行认证。'
- en: '**Excluded extensions**: Specify any file extensions that should be excluded
    from indexing.'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**排除扩展**：指定应从索引中排除的任何文件扩展名。'
- en: '**Indexed extensions**: Optionally, specify file extensions that should be
    indexed.'
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引扩展**：可选地指定应索引的文件扩展名。'
- en: '**Data to extract**: Choose whether to extract content, metadata, or both from
    the documents.'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**要提取的数据**：选择是否从文档中提取内容、元数据或两者。'
- en: '**Parsing mode**: Select the parsing mode for the documents. **Default** is
    typically used.'
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解析模式**：选择文档的解析模式。**默认**模式通常被使用。'
- en: '**Image action**: Configure how to handle image content during indexing.'
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像操作**：配置在索引过程中如何处理图像内容。'
- en: '**Allow Skillset to read file data**: Enable this to allow the skillset to
    read file data for enrichment.'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**允许技能集读取文件数据**：启用此选项以允许技能集读取文件数据进行丰富。'
- en: '**PDF Text rotation algorithm**: Select the algorithm to handle text rotation
    in PDF documents, if needed.'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PDF 文本旋转算法**：根据需要选择处理 PDF 文档中文本旋转的算法。'
- en: With a visual understanding of the index, skillset, and indexer, let’s move
    on to the topic of knowledge stores, which act as secondary storage for analysis.
    We’ll explore why they are necessary and walk through their overall process.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在对索引、技能集和索引器有了视觉理解之后，让我们继续探讨知识库的话题，它作为分析的第二级存储。我们将探讨为什么它们是必要的，并概述其整体流程。
- en: Managing knowledge store projections
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 管理知识库投影
- en: A **knowledge store** in Azure AI Search provides secondary storage for AI-enriched
    content generated by a skillset. Defined within the skillset, it includes a connection
    to Azure Storage and projections that determine the format, such as tables, objects,
    or files. The key advantage is flexible access, enabling data use beyond search
    queries, such as integration with Power BI or Azure Data Factory. Data is enriched
    through cognitive skills such as OCR and language detection, and the knowledge
    store complements the search index by offering broader data accessibility for
    analysis or reporting.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Search 中的**知识库**为技能集生成的 AI 丰富内容提供二级存储。在技能集中定义，它包括连接到 Azure Storage
    的连接和确定格式（如表格、对象或文件）的投影。主要优势是灵活访问，允许数据在搜索查询之外的使用，例如与 Power BI 或 Azure Data Factory
    的集成。数据通过认知技能（如 OCR 和语言检测）进行丰富，知识库通过提供更广泛的数据访问性来补充搜索索引，以便于分析或报告。
- en: The creation of a knowledge store involves defining a data source, a skillset,
    and an index schema, which are combined using either an API or the **Import Data**
    wizard. Each run of the indexer updates the knowledge store, reflecting changes
    in source data. This flexible setup enables more comprehensive data processing
    for various tools.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 创建知识库涉及定义数据源、技能集和索引模式，这些可以通过 API 或 **导入数据**向导进行组合。索引器的每次运行都会更新知识库，反映源数据的变化。这种灵活的设置使各种工具能够进行更全面的数据处理。
- en: '![Figure 7.10 – Overall knowledge store process](img/B31034_07_010.jpg)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.10 – 知识库整体流程](img/B31034_07_010.jpg)'
- en: Figure 7.10 – Overall knowledge store process
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.10 – 知识库整体流程
- en: The preceding diagram illustrates the flow of data within Azure AI Search, beginning
    with source data ingestion, which undergoes document cracking to make it readable.
    The cognitive skillset processes and enriches this data, sending the results to
    both the search index and the knowledge store. The knowledge store stores projections,
    which can be used for various tasks such as retrieval, machine learning, analytics,
    and human validation. The two outputs of the index and knowledge store system
    provide a flexible approach to storing and analyzing enriched data beyond just
    search indexing.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 上述图表说明了 Azure AI Search 内部数据流，从源数据摄取开始，经过文档拆分以使其可读。认知技能集处理并丰富这些数据，将结果发送到搜索索引和知识库。知识库存储投影，可用于各种任务，如检索、机器学习、分析和人工验证。索引系统和知识库系统的两个输出提供了一种灵活的方法来存储和分析丰富的数据，而不仅仅是搜索索引。
- en: The following exercise will consolidate all the concepts learned about in previous
    sections, including the index, skillset, and indexer, along with the knowledge
    store and custom skills.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 以下练习将巩固之前章节中学到的所有概念，包括索引、技能集和索引器，以及知识库和自定义技能。
- en: 'Exercise 2: Creating an index, skillset, indexer, custom skill, and knowledge
    store within VS Code'
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 2：在 VS Code 中创建索引、技能集、索引器、自定义技能和知识库
- en: This exercise will guide you through creating a custom skill and implementing
    a knowledge store using Visual Studio Code, allowing you to apply these components
    in a real-world context. You’ll gain hands-on experience working with the full
    Azure AI Search pipeline, reinforcing key ideas and integrating them into a practical
    solution.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 本练习将指导您创建自定义技能并使用 Visual Studio Code 实现知识库，使您能够在实际环境中应用这些组件。您将获得实际操作经验，使用完整的
    Azure AI Search 管道，强化关键概念并将它们整合到实际解决方案中。
- en: This exercise is designed to help you grasp essential concepts such as data
    sourcing, index creation, skillset definition, custom skills implementation, indexer
    creation, index querying, and knowledge store management in Visual Studio Code.
    It will show you how to use skillsets, including custom skills and the knowledge
    store as auxiliary storage, together with an indexer to enhance an AI skills pipeline
    for integration into a search index. I highly suggest engaging in this exercise
    to not only comprehend these concepts but also prepare to apply them to actual
    projects following certification.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 本练习旨在帮助您掌握数据来源、索引创建、技能集定义、自定义技能实现、索引器创建、索引查询和知识库管理在Visual Studio Code中的基本概念。它将向您展示如何使用技能集，包括自定义技能和知识库作为辅助存储，以及索引器来增强AI技能管道以集成到搜索索引中。我强烈建议您参与此练习，不仅为了理解这些概念，而且为了在认证后准备将它们应用于实际项目。
- en: 'Step 1: Preparing to develop an app in Visual Studio Code'
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：准备在Visual Studio Code中开发应用程序
- en: If you have already cloned the repository, navigate to the `exercise2` folder.
    Otherwise, open Visual Studio Code, press *Shift* + *Ctrl* + *P*, and select `chapter-7`.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已经克隆了存储库，请导航到`exercise2`文件夹。否则，打开Visual Studio Code，按*Shift* + *Ctrl* + *P*，并选择`chapter-7`。
- en: 'Step 2: Creating Azure resources (AI multi-services account, storage account,
    and AI Search)'
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：创建Azure资源（AI多服务账户、存储账户和AI搜索）
- en: 'To complete this exercise, the `setup.cmd` script will provision a new Azure
    AI service account for data enrichment, a storage account for the knowledge store,
    and Azure AI Search services for indexing and querying:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成此练习，`setup.cmd`脚本将为数据丰富创建一个新的Azure AI服务账户，为知识库创建一个存储账户，并为索引和查询创建Azure AI搜索服务：
- en: Right-click on the `chapter-7` folder and choose **Open in** **Integrated Terminal**.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 右键点击`chapter-7`文件夹，并选择**在****集成终端**中**打开**。
- en: 'Run the following command, and a login window will appear for you to sign in:'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行以下命令，将出现一个登录窗口供您登录：
- en: '[PRE1]'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'After logging in, use this command to locate the region’s name corresponding
    to your resource group:'
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录后，使用以下命令查找与您的资源组对应的区域名称：
- en: '[PRE2]'
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: ./setup.cmd
  id: totrans-159
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: ./setup.cmd
- en: '[PRE3]'
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'When the script is completed, you will see the output in the following source
    section. Take note of the following resource details, as they will be needed later
    when connecting the search service to your data sources:'
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当脚本完成后，您将在以下源部分看到输出。请注意以下资源详细信息，因为它们将在稍后连接搜索服务到您的数据源时需要：
- en: Storage account name
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存储账户名称
- en: Storage connection string
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存储连接字符串
- en: Search service endpoint
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 搜索服务端点
- en: Search service admin key
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 搜索服务管理员密钥
- en: 'Search service query key:'
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 搜索服务查询密钥：
- en: '[PRE4]'
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: With these essential resources in place, you are now ready to integrate them
    into your AI Search solution. The following steps will guide you through connecting
    your search service to data sources, configuring the index, and setting up the
    necessary components for efficient data retrieval and enrichment.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些基本资源就绪后，您现在可以准备将它们集成到您的AI搜索解决方案中。以下步骤将指导您连接搜索服务到数据源、配置索引以及设置必要的组件以实现高效的数据检索和丰富。
- en: 'The following screenshot displays the resources created after running the `setup.cmd`
    file:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 以下截图显示了运行`setup.cmd`文件后创建的资源：
- en: "![Figure 7.11 – Thre\uFEFFe resources upon successful execution of setup.cmd](img/B31034_07_011.jpg)"
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![图7.11 – setup.cmd成功执行后的三个资源](img/B31034_07_011.jpg)'
- en: Figure 7.11 – Three resources upon successful execution of setup.cmd
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.11 – setup.cmd成功执行后的三个资源
- en: Important note
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: All credential key values displayed have been altered for demonstration purposes
    to showcase the anticipated results of the scripts.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 所显示的所有凭据密钥值均已更改，以演示目的展示脚本预期的结果。
- en: Now, let’s move on to creating a custom skill using an Azure function. This
    will allow us to extend the functionality of Azure AI Search and tailor the skill
    to specific needs.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们继续创建一个使用Azure函数的自定义技能。这将使我们能够扩展Azure AI搜索的功能，并使技能适应特定需求。
- en: 'Step 3: Creating an Azure function for a custom skill'
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：为自定义技能创建Azure函数
- en: Azure AI Search offers several built-in skills to enrich the index with information
    from documents, such as sentiment analysis and key phrase extraction. However,
    you can extend these capabilities by creating custom skills when specific functionality
    is not available out of the box. For instance, if you need to count the most frequently
    used words in each document, which isn’t covered by built-in skills, you can create
    a custom skill. To do this, you’ll implement the word count functionality using
    an Azure function in your preferred programming language.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Search 提供了几个内置技能，用于通过文档中的信息丰富索引，例如情感分析和关键词提取。然而，当没有现成的功能时，您可以通过创建自定义技能来扩展这些功能。例如，如果您需要计算每个文档中最常用的单词，而这不是内置技能所涵盖的，您可以创建一个自定义技能。为此，您将使用您首选的编程语言中的
    Azure 函数实现单词计数功能。
- en: Important note
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: In this exercise, you’ll create a simple Node.js function using the Azure portal’s
    code editor. While this is suitable for demonstration purposes, in a production
    environment, you would typically use a development environment such as Visual
    Studio Code to build a function app in your preferred language (such as C#, Python,
    Node.js, or Java). You’d then publish the function to Azure as part of a DevOps
    workflow for more streamlined and scalable deployment.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，您将使用 Azure 门户的代码编辑器创建一个简单的 Node.js 函数。虽然这适用于演示目的，但在生产环境中，您通常会使用开发环境（如
    Visual Studio Code）来构建函数应用，并使用您首选的语言（如 C#、Python、Node.js 或 Java）进行构建。然后，您将作为 DevOps
    工作流的一部分将函数发布到 Azure，以实现更流畅和可扩展的部署。
- en: 'To get started, you’ll create a basic Azure function that serves as a custom
    skill endpoint. This function will allow you to enrich your indexed data with
    custom logic—in this case, by calculating the most frequent words found in each
    document. Follow these steps:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，您将创建一个基本的 Azure 函数，该函数作为自定义技能端点。此函数将允许您通过自定义逻辑丰富索引数据——在这种情况下，通过计算每个文档中最频繁出现的单词。按照以下步骤操作：
- en: 'In the Azure portal, create a new function app with these settings:'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Azure 门户中，创建一个新的函数应用并设置以下参数：
- en: '**Hosting** **Plan**: **Consumption**'
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**托管计划**：**消费**'
- en: '**Subscription**: Your subscription'
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**订阅**：您的订阅'
- en: '**Resource Group**: Same as Azure AI Search'
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源组**：与 Azure AI Search 相同'
- en: '**Function App name**: Unique name'
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**函数应用名称**：唯一名称'
- en: '**Publish**: **Code**'
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发布**：**代码**'
- en: '**Runtime**: Node.js'
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行时**：Node.js'
- en: '**Version**: 22 LTS (select the latest available version, as versions are continuously
    updated)'
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**版本**：22 LTS（选择最新可用的版本，因为版本会持续更新）'
- en: 'Once deployed, create an HTTP trigger function:'
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 部署后，创建一个 HTTP 触发函数：
- en: '`wordcount`'
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`wordcount`'
- en: '**Authorization**: **Function**'
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**授权**：**函数**'
- en: 'Replace the default code with `wordcount.js` located in the `functionApp` folder,
    save, and test using `test.json`, as shown in *Figure 7**.12*:'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将默认代码替换为位于 `functionApp` 文件夹中的 `wordcount.js`，保存并使用 `test.json` 进行测试，如图 *图 7.12*
    所示：
- en: '![Figure 7.12 – Test/Run result after successful execution of the Azure function](img/B31034_07_012.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.12 – 执行 Azure 函数后的测试/运行结果](img/B31034_07_012.jpg)'
- en: Figure 7.12 – Test/Run result after successful execution of the Azure function
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.12 – 执行 Azure 函数后的测试/运行结果
- en: Verify the output and copy the function URL from the **Get function URL** tab
    for future use.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证输出，并从 **获取函数 URL** 选项卡中复制函数 URL 以供将来使用。
- en: 'Step 4: Creating a search solution'
  id: totrans-195
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤 4：创建搜索解决方案
- en: 'Now that the Azure resources are set up, you can build a search solution with
    these components:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Azure 资源已设置好，您可以使用以下组件构建搜索解决方案：
- en: '**Data sources**: References documents in your Azure storage'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据源**：引用 Azure 存储中的文档'
- en: '**Skillset**: Defines an enrichment pipeline using Azure AI services (multi-service
    account)'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技能集**：使用 Azure AI 服务定义一个丰富管道（多服务帐户）'
- en: '**Index**: A searchable set of document records'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引**：一组可搜索的文档记录'
- en: '**Indexer**: Extracts data, applies the skillset, and populates the index for
    search'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引器**：提取数据，应用技能集，并为搜索填充索引'
- en: 'In this exercise, using the **Azure AI Search REST** interface, you’ll submit
    JSON requests to create these components. You can use programming languages such
    as Python or C# for the process:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，您将使用 **Azure AI Search REST** 接口提交 JSON 请求以创建这些组件。您可以使用 Python 或 C# 等编程语言进行此过程：
- en: In Visual Studio Code, open `data_source.json` in the `exercise5` folder. Replace
    `YOUR_CONNECTION_STRING` with your Azure storage connection string from *Step
    2*.
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Visual Studio Code 中，打开 `exercise5` 文件夹中的 `data_source.json`。将 *步骤 2* 中的 `YOUR_CONNECTION_STRING`
    替换为您的 Azure 存储连接字符串。
- en: 'Open `skillset.json` and replace `YOUR_AI_SERVICES_KEY` with your Azure AI
    services key from *Step 2*. For the `get-top-words` custom skill, update the URI
    with the URL of your Azure function from *Step 3*:'
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开`skillset.json`，将`YOUR_AI_SERVICES_KEY`替换为从*步骤2*中获得的Azure AI服务密钥。对于`get-top-words`自定义技能，更新URI以包含从*步骤3*中获得的Azure函数的URL：
- en: '[PRE5]'
  id: totrans-204
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Save and close the updated JSON file. The skillset includes the `get-top-words`
    custom skill with the function URL you added.
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存并关闭更新的JSON文件。技能集包括您添加的功能URL的`get-top-words`自定义技能。
- en: 'Finally, review the `skillset.json` and `indexer.json` files in the folder
    for accuracy and save the changes. Follow these instructions for the knowledge
    store definition:'
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，检查文件夹中的`skillset.json`和`indexer.json`文件以确保准确性，并保存更改。按照以下说明进行知识库定义：
- en: At the end of the skills collection in your skillset, locate the `Microsoft.Skills.Util.ShaperSkill`
    skill named `define-projection`. This skill defines a JSON structure for the enriched
    data, which will be used to create projections. These projections are persisted
    in the knowledge store for each document processed by the indexer.
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的技能集中的技能集合末尾，找到名为`Microsoft.Skills.Util.ShaperSkill`的`define-projection`技能。此技能定义了一个用于创建投影的JSON结构，这些投影将用于索引器处理每个文档时。
- en: 'At the bottom of the skillset file, observe that the skillset also includes
    a `knowledgeStore` definition, which includes a connection string for the Azure
    storage account where the knowledge store is to be created, and a collection of
    projections. This skillset includes three projection groups:'
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在技能集文件底部，注意技能集还包括一个`knowledgeStore`定义，其中包含要创建知识库的Azure存储账户的连接字符串以及一组投影。此技能集包括三个投影组：
- en: A group containing an `object` projection based on the `knowledge_projection`
    output of the `shaper` skill in the skillset
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含基于技能集中“shaper”技能的“knowledge_projection”输出的“object”投影的组
- en: A group containing a `file` projection based on the `normalized_images` collection
    of image data extracted from the documents
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含基于从文档中提取的图像数据“normalized_images”集合的“file”投影的组
- en: 'A group containing the following `table` projections:'
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含以下`table`投影的组：
- en: '`KeyPhrases`: Contains an automatically generated key column and a `keyPhrase`
    column mapped to the `knowledge_projection/key_phrases/` collection output of
    the `shaper` skill'
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`KeyPhrases`: 包含自动生成的键列以及映射到`shaper`技能的`knowledge_projection/key_phrases/`集合输出的`keyPhrase`列'
- en: '`Locations`: Contains an automatically generated key column and a `location`
    column mapped to the `knowledge_projection/key_phrases/` collection output of
    the `shaper` skill'
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Locations`: 包含自动生成的键列以及映射到`shaper`技能的`knowledge_projection/key_phrases/`集合输出的`location`列'
- en: '`ImageTags`: Contains an automatically generated key column and a `tag` column
    mapped to the `knowledge_projection/image_tags/` collection output of the `shaper`
    skill'
  id: totrans-214
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ImageTags`: 包含自动生成的键列以及映射到`shaper`技能的`knowledge_projection/image_tags/`集合输出的`tag`列'
- en: '`Docs`: Contains an automatically generated key column and all of the `knowledge_projection`
    output values from the `shaper` skill that are not already assigned to a table'
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Docs`: 包含自动生成的键列以及所有尚未分配给表的“shaper”技能的“knowledge_projection”输出值'
- en: 'Replace the `YOUR_CONNECTION_STRING` placeholder for the `storageConnectionString`
    value with the connection string for your storage account:'
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将`YOUR_CONNECTION_STRING`占位符替换为`storageConnectionString`值的存储账户连接字符串：
- en: '[PRE6]'
  id: totrans-217
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Save and close the updated `skillset.json` file.
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存并关闭更新的`skillset.json`文件。
- en: 'Open `index.json` in the `create-search` folder. This defines the `hotels-custom-index`
    index. At the bottom of the `index.json` file, observe that the `top_words` element
    corresponds to the Azure function’s response:'
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开`create-search`文件夹中的`index.json`。这定义了`hotels-custom-index`索引。在`index.json`文件底部，注意`top_words`元素对应于Azure函数的响应：
- en: '[PRE7]'
  id: totrans-220
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Review the JSON code to familiarize yourself with it, then close without making
    any changes.
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查JSON代码以熟悉它，然后关闭文件，不进行任何更改。
- en: 'Open `indexer.json` in the `create-search` folder. This defines `hotels-custom-indexer`.
    Just review and close the file:'
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开`create-search`文件夹中的`indexer.json`。这定义了`hotels-custom-indexer`。只需审查并关闭文件：
- en: '[PRE8]'
  id: totrans-223
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Open `create-search.cmd`, which submits the JSON definitions via cURL. Replace
    `YOUR_SEARCH_URL` and `YOUR_ADMIN_KEY` with your Azure AI Search service values
    received from *Step 2*:'
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开`create-search.cmd`，该命令通过cURL提交JSON定义。将`YOUR_SEARCH_URL`和`YOUR_ADMIN_KEY`替换为从*步骤2*中获得的Azure
    AI Search服务值：
- en: '[PRE9]'
  id: totrans-225
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: You can also find these values on the **Overview** and **Keys** pages for your
    Azure AI Search resource in the Azure portal.
  id: totrans-226
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您还可以在Azure门户中找到您的Azure AI搜索资源的**概览**和**密钥**页面上的这些值。
- en: Save the batch file.
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存批处理文件。
- en: 'Run the batch script to create a data source, index, indexer, and skillset:'
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行批处理脚本以创建数据源、索引、索引器和技能集：
- en: '[PRE10]'
  id: totrans-229
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Once the script completes, go to the Azure portal, select **Indexers** under
    **Search management** on the left panel, and refresh to monitor the indexing progress.
    This may take a minute to complete.
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦脚本完成，请转到Azure门户，在左侧面板的**搜索管理**下选择**索引器**，并刷新以监控索引进度。这可能需要一分钟才能完成。
- en: 'Step 5: Searching the index'
  id: totrans-231
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：搜索索引
- en: 'Now that you have an index, you can search for it. To do so, follow these steps:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经有一个索引，您可以搜索它。为此，请按照以下步骤操作：
- en: Navigate to your Azure AI Search resource and select **Search explorer** at
    the top of the blade.
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到您的Azure AI搜索资源，并在选项卡顶部选择**搜索资源管理器**。
- en: 'In **Search explorer**, switch to the **JSON** view, then enter and submit
    the following search query:'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**搜索资源管理器**中，切换到**JSON**视图，然后输入并提交以下搜索查询：
- en: '[PRE11]'
  id: totrans-235
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This query retrieves the `url` and `top_words` fields from all documents that
    reference New York.
  id: totrans-236
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此查询从所有引用纽约的文档中检索`url`和`top_words`字段。
- en: Important note
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: OData `$filter` expressions are case-sensitive!
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: OData `$filter`表达式是区分大小写的！
- en: 'Step 6: Viewing the knowledge store'
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第6步：查看知识库
- en: After running an indexer that utilizes a skillset to generate a knowledge store,
    the enriched data extracted during the indexing process is stored as knowledge
    store projections.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行利用技能集生成知识库的索引器之后，索引过程中提取的丰富数据被存储为知识库投影。
- en: Viewing object projections
  id: totrans-241
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 查看对象投影
- en: 'Object projections in the skillset are stored as JSON files for each indexed
    document. These files reside in a blob container within the Azure storage account
    specified in the skillset configuration. Let’s open the Azure portal to verify
    their presence:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 技能集中的对象投影以JSON文件的形式存储在每个索引文档中。这些文件位于Azure存储帐户中，该帐户在技能集配置中指定。让我们打开Azure门户以验证它们的存在：
- en: Open the Azure portal and navigate to the Azure storage account you created.
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开Azure门户并导航到您创建的Azure存储帐户。
- en: Select the **Storage browser** tab on the left panel to access the **Storage
    Explorer** interface in the portal. If you have Azure Storage Explorer installed,
    click **Open in Explorer** on the **Overview** blade.
  id: totrans-244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧面板中选择**存储浏览器**选项卡，以访问门户中的**存储资源管理器**界面。如果您已安装Azure存储资源管理器，请点击**在资源管理器中打开**选项卡。
- en: Expand `hotels-images` and `hotels-knowledge`, created during the indexing process.
  id: totrans-245
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开在索引过程中创建的`hotels-images`和`hotels-knowledge`。
- en: Select the `hotels-knowledge` container and open a folder for an indexed document.
  id: totrans-246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择`hotels-knowledge`容器并打开索引文档的文件夹。
- en: 'Download the `knowledge-projection.json` file to see the enriched data extracted
    by the skillset, as shown here:'
  id: totrans-247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载`knowledge-projection.json`文件以查看技能集提取的丰富数据，如下所示：
- en: '[PRE12]'
  id: totrans-248
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The ability to create object projections allows you to generate enriched data
    objects that can be seamlessly integrated into enterprise data analysis solutions.
    For example, JSON files generated from object projections can be ingested into
    an Azure Data Factory pipeline for further processing or loaded into a data warehouse
    for advanced analytics.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 创建对象投影的能力允许您生成可以无缝集成到企业数据分析解决方案中的丰富数据对象。例如，从对象投影生成的JSON文件可以导入到Azure数据工厂管道中进行进一步处理，或加载到数据仓库中进行高级分析。
- en: Viewing file projections
  id: totrans-250
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 查看文件投影
- en: 'The file projections defined in the skillset generate JPEG files for each image
    extracted from documents during the indexing process. Follow these steps to view
    the extracted images:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 技能集中定义的文件投影为索引过程中从文档中提取的每个图像生成JPEG文件。按照以下步骤查看提取的图像：
- en: In the `hotels-images` blob container. This container contains a folder for
    each document that contains images.
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`hotels-images`blob容器中。此容器包含每个包含图像的文档的文件夹。
- en: Open any of the folders and view its contents; each folder contains at least
    one `*.``jpg` file.
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开任何文件夹并查看其内容；每个文件夹至少包含一个`*.jpg`文件。
- en: Open any of the image files to verify that they contain images extracted from
    the documents.
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开任何图像文件以验证它们是否包含从文档中提取的图像。
- en: The ability to generate file projections like this makes indexing an efficient
    way to extract embedded images from a large volume of documents.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 生成此类文件投影的能力使索引成为从大量文档中提取嵌入图像的高效方式。
- en: Viewing table projections
  id: totrans-256
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 查看表投影
- en: 'The table projections defined in the skillset form a relational schema of enriched
    data:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 技能集中定义的表投影形成了一个增强数据的关系模式：
- en: In the **Storage browser** interface in the Azure portal, expand **Tables**.
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Azure门户中的**存储浏览器**界面中，展开**表格**。
- en: Select the `docs` table to view its columns. To hide default Azure Storage columns,
    modify `document_id` (key generated by the indexing process)
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择`docs`表以查看其列。要隐藏默认的Azure存储列，修改`document_id`（由索引过程生成的键）
- en: '`file_id` (encoded file URL)'
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`file_id`（编码的文件URL）'
- en: '`file_name` (extracted from metadata)'
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`file_name`（从元数据中提取）'
- en: '`language` (document language)'
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`language`（文档语言）'
- en: '`sentiment` (calculated sentiment score)'
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`sentiment`（计算出的情感分数）'
- en: '`url` (Azure Blob Storage URL)'
  id: totrans-264
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`url`（Azure Blob存储URL）'
- en: 'Explore other tables such as `ImageTags`, `KeyPhrases`, and `Locations`, which
    contain rows for each tag, key phrase, and location linked to the document, as
    shown in *Figure 7**.13*:'
  id: totrans-265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索其他表格，例如 `ImageTags`、`KeyPhrases` 和 `Locations`，这些表格包含与文档相关联的每个标签、关键词和位置的行，如图
    *图7.13* 所示：
- en: '![Figure 7.13 – Table projections in the Azure storage account](img/B31034_07_013.jpg)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![图7.13 – Azure存储账户中的表投影](img/B31034_07_013.jpg)'
- en: Figure 7.13 – Table projections in the Azure storage account
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.13 – Azure存储账户中的表投影
- en: The ability to create table projections allows you to develop analytical and
    reporting solutions that leverage relational schemas for structured queries. For
    example, you can use Microsoft Power BI to analyze and visualize enriched data
    efficiently. Additionally, the automatically generated key columns facilitate
    table joins, enabling queries such as retrieving all locations referenced within
    a specific document.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 创建表投影的能力允许您开发利用关系模式进行结构化查询的分析和报告解决方案。例如，您可以使用Microsoft Power BI高效地分析和可视化增强数据。此外，自动生成的键列简化了表连接，使查询如检索特定文档中引用的所有位置成为可能。
- en: In the next section, we’ll delve into how to extract valuable insights from
    large volumes of unstructured data using the Azure AI Document Intelligence service.
    This powerful tool leverages AI to transform raw, unstructured data into structured,
    actionable insights.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将深入探讨如何使用Azure AI 文档智能服务从大量非结构化数据中提取有价值的见解。这个强大的工具利用AI将原始的非结构化数据转换为结构化、可操作的见解。
- en: Implementing the Document Intelligence solution
  id: totrans-270
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施文档智能解决方案
- en: '**Azure AI Document Intelligence** is a cloud-based suite of AI services designed
    to automate the extraction, analysis, and understanding of information from documents.
    Leveraging advanced machine learning models, it processes documents in various
    formats, including PDFs, images, and scanned files, to extract structured data
    from unstructured content. Part of Azure’s broader AI services offerings, this
    service is particularly useful for handling large volumes of documents such as
    invoices, receipts, forms, and legal papers. By managing data collection and processing
    speed, Azure AI Document Intelligence helps improve operations, enables data-driven
    decisions, and fosters innovation.'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: '**Azure AI 文档智能** 是一套基于云的AI服务，旨在自动化从文档中提取、分析和理解信息。利用先进的机器学习模型，它处理各种格式的文档，包括PDF、图像和扫描文件，从非结构化内容中提取结构化数据。作为Azure更广泛AI服务提供的一部分，这项服务特别适用于处理大量文档，如发票、收据、表格和法律文件。通过管理数据收集和处理速度，Azure
    AI 文档智能有助于提高运营效率，实现数据驱动决策，并促进创新。'
- en: 'Azure AI Document Intelligence offers several benefits that enhance document
    processing and data management:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 文档智能提供了几个增强文档处理和数据管理的优势：
- en: It automates the extraction of key text and structural elements from various
    document types, significantly speeding up data entry processes and improving accuracy
    by reducing manual errors.
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它自动化从各种文档类型中提取关键文本和结构化元素，显著加快数据录入过程，并通过减少人工错误来提高准确性。
- en: It supports a wide range of prebuilt models tailored for specific document types,
    such as invoices, receipts, and ID documents, as well as custom models for unique
    business needs. This versatility makes it suitable for various industries and
    use cases, including compliance, auditing, and financial analysis.
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它支持广泛的预构建模型，针对特定文档类型定制，如发票、收据和身份证件，以及针对独特业务需求的定制模型。这种多功能性使其适用于各种行业和用例，包括合规性、审计和财务分析。
- en: Additionally, it ensures data privacy, compliance, and security, with all data
    processed in the same region where the resource was created and encrypted in transit.
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，它确保数据隐私、合规性和安全性，所有数据都在创建资源的同一区域进行处理，并在传输过程中加密。
- en: By leveraging these capabilities, organizations can streamline their workflows,
    enhance data-driven strategies, and enrich document search capabilities, ultimately
    leading to increased efficiency and productivity.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用这些功能，组织可以简化其工作流程，增强数据驱动策略，并丰富文档搜索功能，最终导致效率和生产力的提高。
- en: Document Intelligence capabilities
  id: totrans-277
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文档智能功能
- en: Azure AI Document Intelligence provides powerful capabilities for extracting,
    analyzing, and understanding structured data from unstructured documents. By leveraging
    machine learning and NLP, it enables organizations to automate document processing,
    reducing manual effort and improving efficiency.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 文档智能提供了从非结构化文档中提取、分析和理解结构化数据的功能。通过利用机器学习和自然语言处理技术，它使组织能够自动化文档处理，减少人工工作量并提高效率。
- en: 'This service includes several key components that enhance data extraction and
    analysis:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 此服务包括几个关键组件，这些组件增强了数据提取和分析：
- en: '**Analysis models (Read and Layout)**: The foundation of Document Intelligence
    is built on OCR, which enables text detection and extraction from various document
    types, including printed and handwritten materials. The *Read* model focuses on
    extracting lines and words, while the *Layout* model identifies structural elements
    such as text, tables, selection marks, and document formatting. These models work
    together to preserve the document’s logical structure, ensuring that extracted
    content remains contextually relevant.'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析模型（读取和布局）**：文档智能的基础建立在OCR之上，它能够从各种文档类型中检测和提取文本，包括打印和手写材料。*读取*模型专注于提取行和单词，而*布局*模型识别文本、表格、选择标记和文档格式等结构元素。这些模型协同工作以保留文档的逻辑结构，确保提取的内容在上下文中保持相关性。'
- en: '**Prebuilt models**: Document Intelligence offers several prebuilt models tailored
    for specific document types:'
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置模型**：文档智能提供针对特定文档类型的几个预置模型：'
- en: '**prebuilt-read**: Detects lines, words, and languages'
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置读取**：检测行、单词和语言'
- en: '**prebuilt-layout**: Extracts text, tables, and document structure'
  id: totrans-283
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置布局**：提取文本、表格和文档结构'
- en: '**prebuilt-contract**: Extracts key contract details'
  id: totrans-284
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置合同**：提取关键合同详情'
- en: '**prebuilt-healthInsuranceCard.us**: Extracts data from US health insurance
    cards'
  id: totrans-285
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置健康保险卡**：从美国健康保险卡中提取数据'
- en: '**prebuilt-tax.us**: Processes US tax forms'
  id: totrans-286
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置美国税表**：处理美国税表'
- en: '**prebuilt-invoice**: Extracts sales invoice details'
  id: totrans-287
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置发票**：提取销售发票详情'
- en: '**prebuilt-receipt**: Extracts data from receipts'
  id: totrans-288
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置收据**：从收据中提取数据'
- en: '**prebuilt-idDocument**: Extracts information from IDs, passports, and social
    security cards'
  id: totrans-289
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预置身份证明**：从身份证、护照和社保卡中提取信息'
- en: 'For more information, visit the official document at: [https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/model-overview?view=doc-intel-4.0.0](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/model-overview?view=doc-intel-4.0.0).'
  id: totrans-290
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如需更多信息，请访问官方文档：[https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/model-overview?view=doc-intel-4.0.0](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/model-overview?view=doc-intel-4.0.0).
- en: '**Custom models**: For documents that do not fit prebuilt models, custom models
    offer a flexible solution by allowing organizations to train AI to extract specific
    fields tailored to their business needs. Unlike prebuilt models, custom models
    require at least five training documents per document type, enabling them to learn
    unique patterns and structures. This capability is particularly useful for industry-specific
    documents such as medical records, legal contracts, and financial reports, where
    predefined templates may not be sufficient.'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自定义模型**：对于不适合预置模型的文档，自定义模型通过允许组织训练AI以提取针对其业务需求定制的特定字段，提供了一种灵活的解决方案。与预置模型不同，自定义模型需要每个文档类型至少五个训练文档，使其能够学习独特的模式和结构。这种能力对于行业特定文档（如病历、法律合同和财务报告）特别有用，在这些文档中，预定义模板可能不足以满足需求。'
- en: '**APIs and SDKs**: To facilitate easy integration, Document Intelligence provides
    a set of APIs and SDKs, allowing developers to incorporate document processing
    capabilities into applications and workflows. The REST API enables programmatic
    access to document analysis, while SDKs are available in Python, C#, and Java,
    offering flexibility for various development environments. These integration options
    allow organizations to automate document processing at scale, improving efficiency
    across different business operations.'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**APIs 和 SDKs**：为了便于集成，文档智能提供了一套 API 和 SDK，允许开发者将文档处理功能集成到应用程序和工作流程中。REST API
    允许以编程方式访问文档分析，而 SDKs 提供了 Python、C# 和 Java 版本，为各种开发环境提供了灵活性。这些集成选项允许组织在规模上自动化文档处理，提高不同业务操作的效率。'
- en: 'Let’s begin with two approaches for the exercises: one using the portal UI
    interface, and the other utilizing APIs and SDKs.'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从两种练习方法开始：一种使用门户 UI 界面，另一种利用 API 和 SDKs。
- en: 'Exercise 3: Document Intelligence Studio/Azure AI Foundry – UI interface and
    no coding'
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 3：文档智能工作室/Azure AI Foundry – UI 界面和无代码
- en: 'This exercise will guide you through using the Azure AI Foundry interface instead
    of Document Intelligence Studio. As Microsoft transitions toward Azure AI Foundry
    as the unified platform, it is becoming the preferred interface for building and
    managing AI solutions. Follow these steps to get started:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 本练习将指导您使用 Azure AI Foundry 界面而不是文档智能工作室。随着微软向 Azure AI Foundry 作为统一平台过渡，它正成为构建和管理
    AI 解决方案的首选界面。按照以下步骤开始：
- en: '**Creating** **a hub**:'
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建** **中心点**：'
- en: Navigate to [AI.azure.com](http://AI.azure.com) and select **Explore Azure AI
    Service**, or go directly to [https://ai.azure.com/explore/aiservices](https://ai.azure.com/explore/aiservices),
    and then choose **Vision +** **Document**.
  id: totrans-297
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 [AI.azure.com](http://AI.azure.com) 并选择 **探索 Azure AI 服务**，或直接访问 [https://ai.azure.com/explore/aiservices](https://ai.azure.com/explore/aiservices)，然后选择
    **视觉 + 文档**。
- en: Under **General Document Analysis Models**, select **Layout**.
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **通用文档分析模型** 下选择 **布局**。
- en: Sign in with Azure and choose an Azure subscription.
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 Azure 登录并选择一个 Azure 订阅。
- en: Choose or create a new hub. Provide a name, subscription, resource group, and
    location.
  id: totrans-300
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择或创建一个新的中心点。提供名称、订阅、资源组和位置。
- en: '**Connecting to the Azure** **AI service**:'
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**连接到 Azure** **AI 服务**：'
- en: If you don’t have an Azure AI service, click **Connect to or create an Azure
    AI Service resource** to create one.
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果您没有 Azure AI 服务，请点击 **连接到或创建 Azure AI 服务资源** 来创建一个。
- en: 'Once a hub and Azure AI service have been created, follow these steps:'
  id: totrans-303
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建了一个中心点和 Azure AI 服务后，请按照以下步骤操作：
- en: Click on **Layout** under **Document Intelligence** in the left navigation and
    select a sample file.
  id: totrans-304
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧导航中点击 **文档智能** 下的 **布局**，并选择一个样本文件。
- en: Important note
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: There are several pre-formatted options available under **Document Intelligence**.
    It’s recommended to explore and experiment with sample files for each format to
    better understand their specific capabilities and use cases.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **文档智能** 下有几种预格式化选项可用。建议探索并使用每种格式的样本文件，以更好地了解它们的具体功能和用例。
- en: 'Click **Run analysis**, and the analysis options will appear. On the far left,
    you’ll see a list of sample files. The middle section highlights the elements
    captured, showing the specific text information that can be extracted as you hover
    over the document. On the right-hand side, the extracted text is displayed with
    multiple tabs: **Markdown**, **Text**, **Selection marks**, **Tables**, and **Figures**.
    These tabs provide different formats for viewing the extracted data, offering
    flexibility depending on your analysis needs.'
  id: totrans-307
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **运行分析**，分析选项将出现。在左侧，您将看到一个样本文件列表。中间部分突出显示捕获的元素，显示在您悬停在文档上时可以提取的特定文本信息。在右侧，提取的文本以多个标签显示：**Markdown**、**文本**、**选择标记**、**表格**
    和 **图像**。这些标签提供了不同的格式来查看提取的数据，根据您的分析需求提供灵活性。
- en: '![Figure 7.14 – The Layout format](img/B31034_07_014.jpg)'
  id: totrans-308
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.14 – 布局格式](img/B31034_07_014.jpg)'
- en: Figure 7.14 – The Layout format
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.14 – 布局格式
- en: 'The **Layout** format is widely used due to the option to output in Markdown,
    which is highly favored by **Large Language Models** (**LLMs**) for its hierarchical
    structure, aiding better contextual understanding. Here’s a brief explanation
    of the options:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: '**布局** 格式因其可以输出 Markdown 而被广泛使用，Markdown 格式因其层次结构而受到 **大型语言模型**（**LLMs**）的高度青睐，有助于更好地理解上下文。以下是选项的简要说明：'
- en: '**Run analysis range**: Analyze the current or all documents'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行分析范围**: 分析当前或所有文档'
- en: '**Page range**: Analyze all or specific pages'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**页面范围**: 分析所有或特定页面'
- en: '**Output format style**: Choose **Text** or **Markdown**'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输出格式样式**: 选择**文本**或**Markdown**'
- en: '**Optional detection**: Detect barcodes, languages, or key-value pairs'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可选检测**: 检测条形码、语言或键值对'
- en: '**Premium detection**: Offers high resolution, style fonts, and formulas (charged
    services)'
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级检测**: 提供高分辨率、样式字体和公式（收费服务）'
- en: Now, the Document Intelligence API and SDK provide a more programmatic way to
    achieve your desired outcomes, offering greater flexibility and scalability.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，文档智能API和SDK提供了一种更程序化的方式来实现您期望的结果，提供了更大的灵活性和可扩展性。
- en: In the next exercise, we’ll explore how to use these tools effectively to automate
    document analysis and extraction, allowing you to handle more complex tasks with
    ease.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个练习中，我们将探索如何有效地使用这些工具来自动化文档分析和提取，让您能够轻松处理更复杂的任务。
- en: 'Exercise 4: Document Intelligence client libraries approach'
  id: totrans-318
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习4：文档智能客户端库方法
- en: Important note
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: This is not intended to be a full hands-on exercise. Instead, the purpose here
    is to provide a conceptual overview and share a snippet of sample code to help
    you understand how Azure AI Document Intelligence can be used in practice. You
    are not expected to follow every step line by line.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是旨在成为一个完整的动手练习。相反，这里的目的是提供一个概念概述，并分享一段示例代码片段，以帮助您了解如何在实践中使用Azure AI文档智能。您不需要逐行遵循每个步骤。
- en: To illustrate how Azure AI Document Intelligence can be used to analyze and
    extract common fields from structured documents such as invoices, consider the
    following example. Azure provides various `prebuilt-invoice` model.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明如何使用Azure AI文档智能来分析和提取结构化文档（如发票）中的常见字段，请考虑以下示例。Azure提供了各种`预置发票`模型。
- en: The following example code demonstrates how you could set up a Python script
    to extract content such as **text**, **tables**, **selection marks**, and **document
    layout** from a sample PDF file. Key steps include retrieving your Azure endpoint
    and API key, installing the required Python libraries, and pointing the script
    to the target document. This lightweight snippet is meant to give you a sense
    of how the process works rather than serve as a comprehensive implementation guide.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例代码演示了如何设置一个Python脚本来从示例PDF文件中提取内容，例如**文本**、**表格**、**选择标记**和**文档布局**。关键步骤包括获取您的Azure端点和API密钥、安装所需的Python库，并将脚本指向目标文档。这个轻量级片段旨在让您了解这个过程是如何工作的，而不是作为全面实施指南。
- en: 'For further details, you can explore the *Layout* model at [https://aka.ms/di-layout](https://aka.ms/di-layout)
    and sample code examples at [https://github.com/MicrosoftLearning/mslearn-ai-document-intelligence/tree/main](https://github.com/MicrosoftLearning/mslearn-ai-document-intelligence/tree/main):'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 如需进一步了解，您可以探索[https://aka.ms/di-layout](https://aka.ms/di-layout)上的**布局**模型和[https://github.com/MicrosoftLearning/mslearn-ai-document-intelligence/tree/main](https://github.com/MicrosoftLearning/mslearn-ai-document-intelligence/tree/main)上的示例代码示例：
- en: '[PRE13]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: So far, we’ve explored how Azure AI Search and Document Intelligence can help
    process unstructured content such as text documents and PDFs. However, enterprise
    data isn’t limited to text—it often includes multimedia content such as scanned
    documents, images, audio, and even videos. Extracting meaningful insights from
    this diverse range of content requires a unified, intelligent pipeline that can
    orchestrate multiple AI services. This is where Azure AI Content Understanding
    comes in.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探讨了如何使用Azure AI搜索和文档智能来处理非结构化内容，如文本文档和PDF文件。然而，企业数据并不仅限于文本——它通常包括扫描文档、图像、音频，甚至视频等多媒体内容。从这一广泛的内容中提取有意义的见解需要一个统一的、智能的管道，可以协调多个AI服务。这正是Azure
    AI内容理解的作用所在。
- en: Information
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 信息
- en: The *Document Intelligence* section in [*Chapter 10*](B31034_10.xhtml#_idTextAnchor191)
    will offer more sample examples for further exploration.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](B31034_10.xhtml#_idTextAnchor191)中的**文档智能**部分将提供更多示例，以供进一步探索。'
- en: Understanding Azure AI Content Understanding
  id: totrans-328
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解Azure AI内容理解
- en: As organizations handle increasingly diverse and large-scale unstructured data
    sources—such as PDFs, scanned images, audio recordings, and videos—extracting
    meaningful insights from them becomes essential. Azure AI Content Understanding
    is a unified orchestration framework that streamlines the processing, enrichment,
    and analysis of such content by combining the power of multiple Azure AI services
    under a single pipeline-based model.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 随着组织处理越来越多样化、大规模的非结构化数据源（如 PDF、扫描图像、音频记录和视频）——从这些数据中提取有意义的见解变得至关重要。Azure AI
    内容理解是一个统一的编排框架，通过结合多个 Azure AI 服务在单一基于管道的模型下的力量，简化了此类内容的处理、丰富和分析。
- en: What is Azure AI Content Understanding?
  id: totrans-330
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 Azure AI 内容理解？
- en: 'Azure AI Content Understanding is a platform designed to help you extract and
    interpret information from unstructured content using modular AI building blocks.
    These building blocks leverage services such as the following:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 内容理解是一个平台，旨在帮助您使用模块化 AI 构建块从非结构化内容中提取和解释信息。这些构建块利用以下等服务：
- en: '**Azure AI Vision** for OCR and image analysis'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure AI 视觉** 用于 OCR 和图像分析'
- en: '**Document Intelligence (formerly Form Recognizer)** for layout, key-value,
    and table extraction'
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档智能（原名表单识别器）** 用于布局、键值和表格提取'
- en: '**Azure AI Language** for summarization, classification, and entity recognition'
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure AI 语言** 用于摘要、分类和实体识别'
- en: '**Azure AI Speech** for audio transcription'
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure AI 语音** 用于音频转录'
- en: '**Azure Video Indexer** for multimedia content analysis'
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure 视频索引器** 用于多媒体内容分析'
- en: What makes this service unique is its ability to define **pipelines**—sequences
    of AI operations that transform raw content into structured, meaningful data.
    It provides a scalable, low-code/no-code approach to designing intelligent workflows.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 使此服务独特的是其定义 **管道** 的能力——一系列 AI 操作，将原始内容转换为结构化、有意义的数据。它提供了一种可扩展的、低代码/无代码的方法来设计智能工作流程。
- en: Recommendation
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐
- en: 'We recommend watching this overview video of Azure AI Content Understanding,
    presented by the Microsoft Product Manager for the service: [https://youtu.be/kYwq9HNVj1s?si=HeEXSOCThxGALmUB](https://youtu.be/kYwq9HNVj1s?si=HeEXSOCThxGALmUB).
    This video offers a clear introduction to the key concepts and will help you better
    understand the hands-on exercise that follows.'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 我们建议观看由该服务的微软产品经理提供的 Azure AI 内容理解概述视频：[https://youtu.be/kYwq9HNVj1s?si=HeEXSOCThxGALmUB](https://youtu.be/kYwq9HNVj1s?si=HeEXSOCThxGALmUB)。此视频对关键概念进行了清晰的介绍，并将帮助您更好地理解接下来的动手练习。
- en: Creating a Content Understanding analyzer
  id: totrans-340
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建内容理解分析器
- en: 'To develop a Content Understanding solution, you begin by creating an analyzer.
    An analyzer is configured to extract specific data points from unstructured content
    based on a schema you define. The process follows these key steps:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 要开发内容理解解决方案，您首先创建一个分析器。分析器配置为根据您定义的架构从非结构化内容中提取特定的数据点。该过程遵循以下关键步骤：
- en: Provision an Azure AI Services resource to access the required cognitive capabilities.
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供一个 Azure AI 服务资源以访问所需的认知能力。
- en: Define a schema using a sample content file and an analyzer template. This scheme
    outlines what information should be extracted.
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用示例内容文件和分析器模板定义架构。此方案概述了应提取哪些信息。
- en: Build the analyzer by training it on the defined schema. Thanks to generative
    AI, only minimal training examples are needed in many cases.
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在定义的架构上训练来构建分析器。多亏了生成式 AI，在许多情况下只需要极少的训练示例。
- en: Submit content via the REST API to have the analyzer extract structured data.
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过 REST API 提交内容，让分析器提取结构化数据。
- en: Microsoft provides a library of prebuilt analyzer templates to accelerate the
    development process. During schema definition, the system can often automatically
    recognize and map data points from your example content to schema elements. You
    can also manually label fields to improve accuracy.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 微软提供了一系列预构建的分析器模板，以加速开发过程。在架构定义期间，系统通常可以自动识别并将示例内容中的数据点映射到架构元素。您还可以手动标记字段以提高准确性。
- en: You will learn about this by completing the following exercise.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 通过完成以下练习，您将了解这些内容。
- en: 'Exercise 5: Analyzing content with Azure AI Content Understanding'
  id: totrans-348
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 5：使用 Azure AI 内容理解分析内容
- en: In this hands-on exercise, you’ll use the Azure AI Foundry portal to create
    a Content Understanding project that extracts structured data from travel insurance
    policy forms. You’ll test the analyzer using sample documents and access it via
    the REST API.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个动手练习中，您将使用 Azure AI Foundry 门户创建一个内容理解项目，从旅行保险保单表格中提取结构化数据。您将使用样本文档测试分析器，并通过
    REST API 访问它。
- en: 'Step 1: Create a Content Understanding project'
  id: totrans-350
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤 1：创建内容理解项目
- en: 'In this step, you’ll initiate your Content Understanding project by setting
    up the core environment where your content analysis will take place:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 在此步骤中，您将通过设置核心环境来启动内容理解项目，您的内容分析将在该环境中进行：
- en: Open [https://ai.azure.com](https://ai.azure.com) in your web browser and sign
    in with your Azure account. In Azure AI Foundry, you can create a Content Understanding
    project within an existing AI hub or create a new hub during project setup. Creating
    a hub also provisions essential Azure resources such as an AI services instance,
    storage, and a key vault to securely store credentials and keys.
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的网络浏览器中打开 [https://ai.azure.com](https://ai.azure.com)，并使用您的 Azure 账户登录。在
    Azure AI Foundry 中，您可以在现有的 AI 中心内创建一个内容理解项目，或者在项目设置期间创建一个新的中心。创建中心还会配置必要的 Azure
    资源，例如 AI 服务实例、存储和密钥保管库，以安全地存储凭证和密钥。
- en: '![Figure 7.15 – Azure AI Foundry main page to navigate to Content Understanding](img/B31034_07_015.jpg)'
  id: totrans-353
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.15 – 导航到内容理解的 Azure AI Foundry 主页面](img/B31034_07_015.jpg)'
- en: Figure 7.15 – Azure AI Foundry main page to navigate to Content Understanding
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.15 – 导航到内容理解的 Azure AI Foundry 主页面
- en: On the home page, select **Explore Azure AI Services** by either scrolling down
    or navigating to [https://ai.azure.com/explore/aiservices](https://ai.azure.com/explore/aiservices).
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在主页上，通过滚动或导航到 [https://ai.azure.com/explore/aiservices](https://ai.azure.com/explore/aiservices)
    选择 **探索 Azure AI 服务**。
- en: Select **Try** **Content Understanding**.
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **尝试** **内容理解**。
- en: Click `ai102-content-understanding`
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 `ai102-content-understanding`
- en: '`ai102-content-understanding testing for` `data extraction`'
  id: totrans-358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ai102-content-understanding testing for` `data extraction`'
- en: '**Hub**: Select **Create a new hub or use the** **existing one**'
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**中心**：选择 **创建一个新的中心或使用现有的一个**'
- en: On the `contentunderstanding-west`
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `contentunderstanding-west`
- en: Choose your Azure subscription
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择您的 Azure 订阅
- en: '**Resource group**: Create a new one'
  id: totrans-362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**资源组**：创建一个新的'
- en: '**Location**: Any available region'
  id: totrans-363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**位置**：任何可用区域'
- en: '**Azure AI Services**: Create a new one with an appropriate name'
  id: totrans-364
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Azure AI 服务**：创建一个新的，并使用合适的名称'
- en: On the **Storage settings** page, create a new storage account, then click **Next**.
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **存储设置** 页面上，创建一个新的存储账户，然后点击 **下一步**。
- en: Review and click **Create project**. Once ready, it will open to the **Define**
    **schema** page.
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查并点击 **创建项目**。一旦准备就绪，它将打开到 **定义** **架构** 页面。
- en: '![Figure 7.16 – Create new Content Understanding project](img/B31034_07_016.jpg)'
  id: totrans-367
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.16 – 创建新的内容理解项目](img/B31034_07_016.jpg)'
- en: Figure 7.16 – Create new Content Understanding project
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.16 – 创建新的内容理解项目
- en: 'After creating a project, five Azure resources are automatically provisioned:
    Azure AI hub, Azure AI project, Azure AI service, a storage account, and a key
    vault.'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 创建项目后，会自动配置五个 Azure 资源：Azure AI 中心、Azure AI 项目、Azure AI 服务、存储账户和密钥保管库。
- en: 'Step 2: Define the schema'
  id: totrans-370
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤 2：定义架构
- en: 'Next, you’ll define the schema to specify exactly what information you want
    the analyzer to extract from your documents:'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您将定义架构以指定分析器从您的文档中提取的确切信息：
- en: 'Locate the training sample under the `exercise8` folder: `train-form.pdf`.'
  id: totrans-372
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `exercise8` 文件夹下找到训练样本：`train-form.pdf`。
- en: In the project, upload this form onto the **Define** **schema** page.
  id: totrans-373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在项目中，将此表单上传到 **定义** **架构** 页面。
- en: Choose the **Document analysis** template, then select **Create**.
  id: totrans-374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **文档分析** 模板，然后选择 **创建**。
- en: In the schema editor, select `PersonalDetails`
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在架构编辑器中，选择 `PersonalDetails`
- en: '`Policyholder information`'
  id: totrans-376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`保单持有人信息`'
- en: '**Value** **type**: **Table**'
  id: totrans-377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**值类型**：**表格**'
- en: Select **Save Changes**.
  id: totrans-378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **保存更改**。
- en: 'Configure the new subfield with the following values:'
  id: totrans-379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用以下值配置新的子字段：
- en: '`PolicyholderName`'
  id: totrans-380
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`PolicyholderName`'
- en: '`Policyholder name`'
  id: totrans-381
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`保单持有人姓名`'
- en: '**Value** **type**: **String**'
  id: totrans-382
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**值类型**：**字符串**'
- en: '**Method**: **Extract**'
  id: totrans-383
