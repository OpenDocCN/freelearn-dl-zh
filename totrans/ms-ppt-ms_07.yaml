- en: '5'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '5'
- en: Starting Your Presentation with M365 Copilot
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 M365 Copilot 开始您的演示文稿
- en: During the fall of 2023, Microsoft introduced Copilot for M365 as a collaboration
    and productivity tool integrated within its Microsoft 365 business environment.
    So, even if you don’t personally use Copilot for M365, you have probably heard
    about Microsoft’s **Artificial Intelligence** ( **AI** ) assistant. It’s also
    important to mention that Microsoft has re-branded the feature as **Microsoft
    365 Copilot** since its introduction and now simply refers to it as **Copilot**
    when used within an application – we will use this new name from now on.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在 2023 年秋季，微软将其 Copilot for M365 作为协作和生产力工具引入其 Microsoft 365 商业环境中。因此，即使您个人没有使用
    Copilot for M365，您可能也听说过微软的**人工智能**（**AI**）助手。值得一提的是，自其推出以来，微软已经将该功能重新命名为**Microsoft
    365 Copilot**，并在应用程序中使用时简单地称之为**Copilot**。从现在起，我们将使用这个新名称。
- en: Within PowerPoint, Copilot still needs to be considered as *an assistant* because
    it is still not able to produce content aligned with the best presentation practices
    that you have learned so far. I often refer to it as a *smart start* .
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在 PowerPoint 中，Copilot 仍然需要被视为**助手**，因为它仍然无法产生与您迄今为止学到的最佳演示文稿实践相一致的内容。我经常称它为**智能起点**。
- en: Writing about an AI assistant that will continue improving through time seemed
    like a daunting task at first. But the topics chosen for this chapter will help
    you learn the basics of Copilot in PowerPoint no matter how it evolves.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 写关于一个会随着时间的推移而不断改进的人工智能助手的文章，一开始似乎是一项艰巨的任务。但本章选择的主题将帮助您学习 PowerPoint 中 Copilot
    的基础知识，无论它如何演变。
- en: 'In this chapter, we will discuss the following topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: Learning what Copilot can do in PowerPoint
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习 Copilot 在 PowerPoint 中能做什么
- en: Understanding the basics of good prompts
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解良好提示的基本知识
- en: Creating a new presentation with Copilot
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Copilot 创建新演示文稿
- en: Modifying and summarizing a presentation with Copilot
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Copilot 修改和总结演示文稿
- en: Technical requirements
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: The Copilot in PowerPoint features described in this chapter require a Microsoft
    365 license and the Microsoft 365 Copilot add-on license. Some suggested prompts
    can be used in **Microsoft 365 Copilot Chat** , the free version made available
    to business users in February 2025, but slide content creation will not be available.
    Also, keep in mind that since Microsoft keeps improving applications and Copilot
    on an ongoing basis, features available at the time this edition was written might
    differ from what you will see in the future. For more information on Microsoft
    365 Copilot licensing requirements and pricing, see links in *Further reading*
    .
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中描述的 PowerPoint 中的 Copilot 功能需要 Microsoft 365 许可证和 Microsoft 365 Copilot 扩展许可证。一些建议的提示可以在
    2025 年 2 月向商业用户提供的免费版本**Microsoft 365 Copilot Chat**中使用，但不会提供幻灯片内容创建功能。此外，请注意，由于微软持续改进应用程序和
    Copilot，本版编写时提供的功能可能与您未来看到的不同。有关 Microsoft 365 Copilot 许可要求和定价的更多信息，请参阅*进一步阅读*中的链接。
- en: Learning what Copilot can do in PowerPoint
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 学习 Copilot 在 PowerPoint 中能做什么
- en: 'Before we discuss what Copilot can do in PowerPoint, let’s try to demystify
    licensing and names. The first requirement for having access to Copilot is a Microsoft
    365 subscription. This means your organization, employer, or school purchased
    licenses so that users can access Microsoft’s collaborative applications and environment.
    The second requirement is purchasing an add-on Copilot license that will give
    users access to various AI capabilities within several Microsoft applications
    – PowerPoint in our case. A visual summary of the requirements can be seen in
    *Figure 5.1* :'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们讨论 Copilot 在 PowerPoint 中的功能之前，让我们先尝试解开许可和名称的谜团。访问 Copilot 的第一个要求是拥有 Microsoft
    365 订阅。这意味着您的组织、雇主或学校购买了许可证，以便用户可以访问微软的协作应用程序和环境。第二个要求是购买附加的 Copilot 许可证，这将使用户能够访问几个微软应用程序中的各种
    AI 功能——在我们的案例中是 PowerPoint。要求的一个视觉总结可以在*图 5.1*中看到：
- en: '![Figure 5.1 – Requirements for using Copilot in PowerPoint](img/B32063_05_01.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图 5.1 – 在 PowerPoint 中使用 Copilot 的要求](img/B32063_05_01.png)'
- en: Figure 5.1 – Requirements for using Copilot in PowerPoint
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.1 – 在 PowerPoint 中使用 Copilot 的要求
- en: If you have a **Microsoft 365 Personal** or **Microsoft 365 Family** license,
    pricing has been adjusted in 2025 so that it automatically includes access to
    Copilot in your applications. Descriptions and screenshots included in this chapter
    have been done using Business or Enterprise subscriptions, which might differ
    from personal-use licenses. You won’t be able to add Copilot with any of the perpetual
    Microsoft Office licenses (2021, 2024), and some organizations might completely
    block access to Copilot. Let’s move on to discuss what Copilot is and what it
    can do.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你拥有**Microsoft 365 个人版**或**Microsoft 365 家庭版**许可证，2025年的价格已经调整，以便自动包括应用程序中对
    Copilot 的访问权限。本章包含的描述和截图是使用商业或企业订阅完成的，这可能与个人使用许可证不同。你无法使用任何永久性 Microsoft Office
    许可证（2021、2024）添加 Copilot，并且一些组织可能会完全阻止对 Copilot 的访问。让我们继续讨论 Copilot 是什么以及它能做什么。
- en: Defining Copilot and its basic functions
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义 Copilot 及其基本功能
- en: Copilot is an AI technology based on **GPT-4/GPT-5** , which stands for **Generative
    Pre-trained Transformer** . In plain language, it means it is a model that was
    pre-trained using huge sets of text data from the internet. Then it learned from
    more specific data, such as conversations between users and the assistant, and
    it uses what it has learned to generate answers for new conversations.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 是一种基于 **GPT-4/GPT-5** 的 AI 技术，代表 **生成预训练转换器**。简单来说，这意味着它是一个使用来自互联网的大量文本数据预先训练的模型。然后它从更具体的数据中学习，例如用户与助手的对话，并使用所学到的知识为新对话生成答案。
- en: It’s important to note that while Copilot’s AI can generate informative and
    helpful responses, it doesn’t understand the meaning of words and phrases in the
    same way that a human would. Answers are based on patterns learned during training,
    not on true understanding or awareness. In addition, Copilot’s AI does not have
    access to personal or organizational information unless that information is explicitly
    provided during the conversation. For business use, Copilot will primarily use
    your business data and files to help you with your daily tasks, although it can
    also search the web to help you while still protecting your organization’s data.
    Depending on your organization’s IT admins, it is possible that the web search
    might be limited or unavailable.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，尽管 Copilot 的 AI 可以生成信息和有帮助的回复，但它并不像人类那样理解单词和短语的含义。答案基于训练期间学习的模式，而不是基于真正的理解或意识。此外，除非在对话中明确提供，否则
    Copilot 的 AI 无法访问个人信息或组织信息。对于商业用途，Copilot 将主要使用你的业务数据和文件来帮助你完成日常任务，尽管它也可以搜索网络以帮助你，同时仍然保护你的组织数据。根据你组织的
    IT 管理员，网络搜索可能会受到限制或不可用。
- en: 'Overall, your Copilot assistant can accomplish a nice list of tasks:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，你的 Copilot 助手可以完成一系列的任务：
- en: '**Multilingual assistance** : It can help you understand or communicate in
    another language.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多语言辅助**：它可以帮助你理解或用另一种语言进行交流。'
- en: '**Content generation** : It can help you generate presentation drafts, improve
    your content, and quickly produce summaries of existing content.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内容生成**：它可以帮助你生成演示文稿草案，改进你的内容，并快速生成现有内容的摘要。'
- en: '**Search information** : It can help you find multiple types of information
    in your organization, such as files and conversations, or search the web to add
    statistics or elaborate on a topic. It can also help you think about potential
    questions an audience might ask.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**搜索信息**：这可以帮助你在组织中找到多种类型的信息，例如文件和对话，或者搜索网络以添加统计数据或详细说明某个主题。它还可以帮助你思考观众可能提出的问题。'
- en: '**Create graphic elements** : It can help you create new images or graphic
    elements from your organization’s data.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建图形元素**：它可以帮助你从组织的数据中创建新的图像或图形元素。'
- en: We will see PowerPoint-specific examples in upcoming sections, but before we
    get to that, let’s learn how to engage in conversation with Copilot with the next
    section on prompting.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在接下来的部分中看到 PowerPoint 特定的示例，但在我们到达那里之前，让我们通过下一节关于提示的部分来学习如何与 Copilot 进行对话。
- en: Understanding the basics of good prompts
  id: totrans-26
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解良好提示的基本要素
- en: Being productive with Copilot means becoming familiar with the art of asking
    your assistant what you want with precise requests, known as **prompts** . Prompts
    are created using natural language, just as you would when having a conversation
    with someone. These prompts must be clear, precise, and relevant to your goal.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Copilot 提高生产力意味着熟悉如何通过精确的请求与助手交流，这些请求被称为**提示**。提示使用自然语言创建，就像你与人交谈时一样。这些提示必须清晰、精确，并与你的目标相关。
- en: 'As mentioned in Microsoft’s documentation titled *Learn about Copilot prompts*
    (see *Further reading* for the link), there are four types of information in a
    prompt that will improve Copilot’s results:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如同在Microsoft的文档《了解Copilot提示》中提到的（见*进一步阅读*中的链接），提示中有四种类型的信息可以改善Copilot的结果：
- en: '**Goal** : Tell Copilot what your desired outcome is, such as a document, a
    list, a summary, or a presentation'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：告诉Copilot你期望的结果是什么，例如文档、列表、摘要或演示文稿'
- en: '**Context** : Explain why you need the information (e.g., a meeting, a report,
    etc.) and who it is for'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文**：解释你需要信息的原因（例如，会议、报告等）以及它是为谁准备的'
- en: '**Tone** : Explain the tone to use in its reply (e.g., for stakeholders, for
    trainees, for colleagues, etc.)'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语气**：解释在回复中应使用的语气（例如，针对利益相关者、针对学员、针对同事等）'
- en: '**Source** : Ask precisely from which source you want the information, whether
    it is the web, documents in your organization, discussions in Teams, and so on'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**来源**：精确地询问你想要的信息来源，无论是网络、你组织中的文档、Teams中的讨论，等等'
- en: It will take you time to adapt to this new way of asking for something, as Copilot
    will not give you good results if you keep using the keyword approach used in
    browser search engines. And after you have sent your first prompt, keep the conversation
    going! If Copilot’s reply was incomplete, say so. If the reply was inaccurate,
    say so. The more you craft your prompts as if you are asking a colleague to help
    you, the better your results will be.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要时间来适应这种新的提问方式，因为如果继续使用在浏览器搜索引擎中使用的关键词方法，Copilot将不会给出好的结果。在你发送了第一个提示之后，继续进行对话！如果Copilot的回复不完整，请说明。如果回复不准确，请说明。你越像询问同事帮忙一样精心制作你的提示，你的结果就会越好。
- en: For help with prompting and getting the most out of Copilot for Microsoft, please
    see the *Further reading* section.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如需了解如何使用提示并充分利用Copilot for Microsoft的帮助，请参阅*进一步阅读*部分。
- en: Instead of sharing prompt examples out of context, we’ll share them in upcoming
    sections with specific tasks that Copilot can accomplish for us. Let’s start with
    the creation of a new presentation.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会在上下文中分享提示示例，而是在即将到来的部分中，我们将与Copilot能为我们完成的特定任务一起分享它们。让我们从创建一个新的演示文稿开始。
- en: Creating a new presentation with Copilot
  id: totrans-36
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Copilot创建新的演示文稿
- en: We discussed the importance of planning our presentation content in [*Chapter
    1*](Chapter_01.xhtml#_idTextAnchor022) and saw how it can improve our content
    when we move away from thinking in terms of slides to focus on our narrative and
    story. Let’s see where we can find Copilot in PowerPoint and discuss the terminology
    that will be used for the rest of this chapter.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[*第一章*](Chapter_01.xhtml#_idTextAnchor022)中讨论了规划演示文稿内容的重要性，并看到当我们从以幻灯片为思考方式转向关注叙事和故事时，它如何改善我们的内容。让我们看看我们可以在PowerPoint中找到Copilot的哪里，并讨论本章余下部分将使用的术语。
- en: 'There are three ways to access Copilot’s features ( *Figure 5.2* ):'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 有三种方式可以访问Copilot的功能（*图5.2*）：
- en: '![Figure 5.2 – Accessing Copilot in PowerPoint](img/B32063_05_02.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图5.2 – 在PowerPoint中访问Copilot](img/B32063_05_02.png)'
- en: Figure 5.2 – Accessing Copilot in PowerPoint
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.2 – 在PowerPoint中访问Copilot
- en: '**Narrative Builder** : The icon just above a slide is named the **Narrative
    Builder** ( **1** ). When you click on it, you get a contextual menu with tasks
    Copilot can accomplish.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**叙事构建器**：位于幻灯片上方图标的名字叫做**叙事构建器**（**1**）。当你点击它时，你会得到一个上下文菜单，其中包含Copilot可以完成的任务。'
- en: 'Please consider *Figure 5.2* as a starting point that will evolve through time
    and where options can be renamed or new ones added. From the first slide in a
    brand-new file, it will suggest **Create a new presentation** , **Create a new
    presentation with file** , **Add a slide** , **Add a topic** , and **Ask Copilot**
    ( **2** ). From any slide in an existing file with content, it will suggest the
    same options with an extra one: **Summarize this presentation** ( **3** ).'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 请将*图5.2*视为一个起点，它将随着时间的推移而发展，其中选项可以被重命名或添加新的选项。从全新文件的第一张幻灯片开始，它将建议**创建一个新的演示文稿**、**创建一个新的演示文稿并添加文件**、**添加幻灯片**、**添加主题**和**询问Copilot**（**2**）。从任何包含内容的现有文件中的任何幻灯片，它将建议相同的选项，并额外添加一个：**总结这个演示文稿**（**3**）。
- en: '**Copilot chat pane** : When in your **Home** tab ( **4** ), the **Copilot**
    button ( **5** ) will be the last one on the far right of the ribbon when you
    do not have any add-ins installed. Clicking on it will open the Copilot chat pane,
    where prompts are usually listed as a starting point ( **6** ). The prompting
    field ( **7** ) has a series of tools that will be explained in the *Modifying
    and summarizing a presentation with Copilot* section of this chapter.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Copilot聊天窗格**：当您处于**主页**标签（**4**）时，如果没有安装任何插件，**Copilot**按钮（**5**）将是工具栏最右边的一个。点击它将打开Copilot聊天窗格，其中提示通常作为起点列出（**6**）。提示字段（**7**）包含一系列将在本章的*使用Copilot修改和总结演示文稿*部分中解释的工具。'
- en: The language of suggested prompts will depend on your operating system’s language
    and that is why the prompts are listed in French in the example. That’s not a
    problem because Copilot is multilingual.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 建议的提示语言将取决于您的操作系统语言，这就是为什么示例中的提示以法语列出。这并不是问题，因为Copilot是多语言的。
- en: '**From the File tab (8)** : Whether you are in **Home** or **New** , you have
    access to a **Create with Copilot** tile ( **9** ) that opens a new file with
    the Copilot window open, ready for you to add your prompt.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从文件标签（8**）：无论您处于**主页**还是**新建**，您都可以访问一个**使用Copilot创建**的瓷砖（**9**），它会打开一个新窗口，Copilot窗口已打开，准备好添加您的提示。'
- en: '**Disclaimer** : As this chapter was in its final review before publishing,
    many Copilot changes had already occurred. In the following sections, some figures
    have been updated to reflect the most important and recent changes. Others might
    have icons and task lists from an earlier version, but the results will be similar.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**免责声明**：由于本章在出版前处于最终审查阶段，许多Copilot的更改已经发生。在以下部分，一些图表已经更新，以反映最重要的和最新的更改。其他可能包含早期版本的图标和任务列表，但结果将是相似的。'
- en: If you try creating a new presentation from the Copilot chat pane, it will first
    create a text outline and then you will have a suggested prompt to create the
    presentation. My preferred way is using the Narrative Builder to create a new
    presentation from a prompt, which is our next topic.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您尝试从Copilot聊天窗格创建新的演示文稿，它将首先创建一个文本大纲，然后您将获得一个建议的提示来创建演示文稿。我首选的方法是使用Narrative
    Builder从提示创建新的演示文稿，这是我们接下来要讨论的主题。
- en: Creating a new presentation in the Narrative Builder with a prompt
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Narrative Builder和提示创建新的演示文稿
- en: 'Let’s discuss how a new presentation can be created by using a prompt in the
    Narrative Builder. After clicking on the Narrative Builder icon and selecting
    the **Create a new presentation** option ( **1** ), a new window opens where the
    prompt box has the beginning of a prompt: **Create a presentation about** ( **2**
    ) ( *Figure 5.3* ):'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们讨论如何在Narrative Builder中使用提示创建新的演示文稿。在点击Narrative Builder图标并选择**创建新的演示文稿**选项（**1**）后，将打开一个新窗口，其中提示框包含提示的开始部分：**创建一个关于的演示文稿**（**2**）（*图5.3*）：
- en: '![Figure 5.3 – Creating a presentation in the Narrative Builder with a prompt](img/B32063_05_03.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图5.3 – 使用Narrative Builder和提示创建演示文稿](img/B32063_05_03.png)'
- en: Figure 5.3 – Creating a presentation in the Narrative Builder with a prompt
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.3 – 使用Narrative Builder和提示创建演示文稿
- en: As you can see in the previous prompt, we have given Copilot our goal, the context,
    and the tone to be used. We have not specified a source since this relates to
    information that should be searched on the web. It used 500 characters from the
    2,000-character limit available for prompts in Narrative Builder ( **3** ), which
    might change as the tool evolves.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如前一个提示中所示，我们向Copilot提供了目标、上下文和要使用的语气。我们没有指定来源，因为这涉及到应在网络上搜索的信息。它使用了Narrative
    Builder中提示可用字符限制的500个字符（**3**），这个限制可能会随着工具的演变而改变。
- en: 'As proof that Copilot evolves at lightning speed, after the first draft of
    this chapter was written, Microsoft introduced a great improvement: the ability
    to apply the template we want with the **Change design** button ( **4** ). This
    opens a new window, allowing us to select from **Recent** , **Your organization**
    , or **Microsoft 365** templates ( **5** ). If you need help adding organization
    or custom templates to your list in PowerPoint, please refer to the Microsoft
    articles listed in *Further reading* .'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作为Copilot以闪电般的速度进化的证明，在撰写本章初稿之后，微软推出了一项重大改进：通过**更改设计**按钮（**4**）应用我们想要的模板。这会打开一个新窗口，允许我们从**最近**、**您的组织**或**Microsoft
    365**模板（**5**）中进行选择。如果您需要在PowerPoint中添加组织或自定义模板到您的列表中，请参阅*进一步阅读*中列出的微软文章。
- en: 'The last step is to click on the arrow to start generating content ( **6**
    ). *Note* : The list of proposed Microsoft 365 templates will vary a lot as Microsoft’s
    development team works on Copilot. Do expect it to vary from what is displayed
    in Figure 5.3.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是点击箭头以开始生成内容（**6**）。*注意*：由于微软的开发团队正在对Copilot进行开发，因此建议的Microsoft 365模板列表会有很大的变化。请预期它可能与图5.3中显示的内容不同。
- en: '**Try it yourself**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**试试看**'
- en: 'The best way to learn about Copilot is to try it. Start a new blank presentation
    and save it to OneDrive or SharePoint so you can easily share it for collaboration
    or go back to the previous version. Then, use this prompt:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '了解Copilot的最佳方式是亲自尝试。开始一个新的空白演示文稿并将其保存到OneDrive或SharePoint，这样你可以轻松地共享它以进行协作或返回到上一个版本。然后，使用以下提示： '
- en: '`Create a presentation about the benefits of physical activity on employee
    mental health. This presentation will be made to my co-workers at a short friendly
    lunchtime meeting. Ideally, we should have a maximum of 30 minutes of content
    to encourage conversation. We must use relevant images and a friendly, even humorous
    tone, so that they understand the benefits while being encouraged to try new experiences
    to move. Don''t hesitate to offer me new ideas or ideas that are out of the usual
    framework.`'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '`创建一个关于员工心理健康活动益处的演示文稿。这个演示文稿将在一个简短的友好午餐时间会议中向我的同事展示。理想情况下，我们应该有最多30分钟的内容来鼓励对话。我们必须使用相关的图片和友好、甚至幽默的语气，以便他们在尝试新的运动体验的同时理解益处。不要犹豫，给我提供新的想法或超出常规框架的想法。`'
- en: 'After Copilot is done generating your presentation outline, the Narrative Builder
    window will display a series of tools allowing you to change numerous elements
    before you generate the slides ( *Figure 5.4* ):'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在Copilot完成生成你的演示文稿大纲后，叙事构建器窗口将显示一系列工具，允许你在生成幻灯片之前更改多个元素（*图5.4*）：
- en: '![Figure 5.4 – Using the Narrative Builder tools to work on an outline](img/B32063_05_04.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图5.4 – 使用叙事构建器工具处理大纲](img/B32063_05_04.png)'
- en: Figure 5.4 – Using the Narrative Builder tools to work on an outline
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.4 – 使用叙事构建器工具处理大纲
- en: '**Edit prompt** : After reading through the first proposed outline, you can
    simply edit your prompt to generate a new outline.'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编辑提示**：阅读完第一个建议的大纲后，你可以简单地编辑你的提示以生成新的大纲。'
- en: '**Like/dislike** : These icons allow you to send Microsoft feedback about content
    generated by Copilot. This feature might not be available if your organization’s
    IT department has disabled sending this type of feedback or if Microsoft removes
    it.'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**喜欢/不喜欢**：这些图标允许你向微软发送关于Copilot生成内容的反馈。如果您的组织IT部门已禁用发送此类反馈或微软取消此功能，则此功能可能不可用。'
- en: '**Reorder topic** : A topic created by Copilot becomes a section in your presentation.
    The slide icons show us the number of slides in a section with their titles. When
    you hover over a topic, the dotted icon on the left can be used to click and drag
    it. You can reorder the suggested topics any way you want.'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重新排序主题**：Copilot创建的主题将成为你演示文稿中的一个部分。幻灯片图标显示了每个部分的幻灯片数量及其标题。当你悬停在主题上时，左侧的虚线图标可以用来点击并拖动它。你可以按任何方式重新排序建议的主题。'
- en: My suggestion is to read through all the suggested topics and their content
    carefully and decide whether they make sense with the message you want to convey.
    Resist the urge to simply create the slides with the intention of dealing with
    the relevance of content later. As human beings, the minute we start dealing with
    slides, our brains go into design mode instead of focusing on content. Resist!
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议是仔细阅读所有建议的主题及其内容，并决定它们是否与你想传达的信息相符。抵制简单创建幻灯片以处理内容相关性的冲动。作为人类，当我们开始处理幻灯片时，我们的大脑就会进入设计模式，而不是专注于内容。抵制！
- en: '**Delete topic** : If you have the feeling a topic is not relevant, just delete
    it with the **Recycle bin** icon visible on the right when hovering over a topic.'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**删除主题**：如果你觉得某个主题不相关，只需在悬停在主题上时，点击右侧可见的**回收站**图标将其删除。'
- en: '**Add new topic** : When you hover over a topic, a plus sign ( **+** ) icon
    allows you to add a new topic to the suggested list. Clicking on the icon adds
    a new prompt box where you type the information about the topic and let Copilot
    generate it.'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**添加新主题**：当你悬停在某个主题上时，一个加号（**+**）图标允许你将新主题添加到建议列表中。点击该图标会添加一个新提示框，你可以在这里输入关于主题的信息，并让Copilot生成内容。'
- en: '**Estimated number of slides** : At the bottom of the Narrative Builder window,
    you have the estimated number of slides that will be added to your file. As you
    can see, the slide limit at the time of writing this edition is **40** . If you
    need to build a larger slide deck, you will need to add content after your first
    draft is generated.'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**估计幻灯片数量**：在叙事构建器窗口底部，您可以看到将要添加到文件中的估计幻灯片数量。如您所见，撰写本版时的幻灯片限制是**40**。如果您需要构建更大的幻灯片集，您需要在生成第一稿内容后添加内容。'
- en: '**Generate slides** : When you are done adjusting the proposed outline, click
    on the **Generate slides** button and Copilot will start the slide creation process.'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成幻灯片**：当您完成调整提出的概要后，点击**生成幻灯片**按钮，协作者将开始幻灯片创建过程。'
- en: 'During Copilot’s slide creation process, the Narrative Builder window shows
    grayed-out slide thumbnails with various messages at the bottom, such as **Crafting
    a compelling narrative...** . You can stop the process by using the *Esc* key
    on your keyboard or by clicking the **Stop generating** button ( *Figure 5.5*
    ):'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在协作者幻灯片创建过程中，叙事构建器窗口显示带有各种消息的灰色缩略图，例如**构建一个引人入胜的故事...**。您可以通过按键盘上的*Esc*键或点击**停止生成**按钮来停止这个过程（*图5.5*）：
- en: '![Figure 5.5 – Copilot’s slide generation process](img/B32063_05_05.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图5.5 – 协作者幻灯片生成过程](img/B32063_05_05.png)'
- en: Figure 5.5 – Copilot’s slide generation process
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.5 – 协作者幻灯片生成过程
- en: 'When the slide creation process is complete, you are presented with slides
    in slide sorter view ( **1** ) ( *Figure 5.6* ):'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当幻灯片创建过程完成后，您将看到幻灯片排序视图中的幻灯片（**1**）（*图5.6*）：
- en: '![Figure 5.6 – Viewing generated slides in slide sorter view](img/B32063_05_06.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图5.6 – 在幻灯片排序视图中查看生成的幻灯片](img/B32063_05_06.png)'
- en: Figure 5.6 – Viewing generated slides in slide sorter view
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.6 – 在幻灯片排序视图中查看生成的幻灯片
- en: Copilot has also included slides for an introduction and created sections for
    each topic that you accepted in the outline ( **2** ). You must click on the **Keep
    it** button or the delete icon ( **3** ) to continue or start over.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 协作者还包含了一个介绍幻灯片，并为您在概要中接受的每个主题创建了部分（**2**）。您必须点击**保留**按钮或删除图标（**3**）以继续或重新开始。
- en: 'Keep in mind that you could be using the same prompt on multiple occasions
    and get different results, whether for the outline or the generated slides. Whatever
    Copilot generates, your presentation is not finished and ready to deliver. Using
    it as is will result in a presentation that is far from impactful. Also, Copilot
    keeps improving over time, which affects the results you get. I experienced this
    while writing this chapter between my original draft and its full revision a couple
    of months later. The section slides have much less text and visual and layout
    choices are more consistent. See for yourself in *Figure 5.7* :'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，您可能会多次使用相同的提示符并得到不同的结果，无论是概要还是生成的幻灯片。无论协作者生成什么，您的演示文稿还没有完成，准备好交付。直接使用它将导致一个远非有影响力的演示文稿。此外，协作者随着时间的推移也在不断改进，这会影响您得到的结果。我在撰写本章时亲身体验了这一点，从最初的草稿到几个月后的完整修订。部分幻灯片的文本更少，视觉和布局选择更加一致。您可以在*图5.7*中亲自查看：
- en: '![Figure 5.7 – Evolving Copilot-generated results over time using the same
    prompt](img/B32063_05_07.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图5.7 – 使用相同提示符随时间演变协作者生成的结果](img/B32063_05_07.png)'
- en: Figure 5.7 – Evolving Copilot-generated results over time using the same prompt
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.7 – 使用相同提示符随时间演变协作者生成的结果
- en: 'Taking a closer look at slides generated by Copilot, we usually find the following
    design elements that are not aligned with the best practices discussed in [*Chapter
    2*](Chapter_02.xhtml#_idTextAnchor130) ( *Figure 5.8* ):'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细查看协作者生成的幻灯片，我们通常会发现以下设计元素，这些元素与在[*第2章*](Chapter_02.xhtml#_idTextAnchor130)中讨论的最佳实践不符（*图5.8*）：
- en: '![Figure 5.8 – Reviewing alignment with slide design best practices](img/B32063_05_08.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图5.8 – 检查与幻灯片设计最佳实践的符合度](img/B32063_05_08.png)'
- en: Figure 5.8 – Reviewing alignment with slide design best practices
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.8 – 检查与幻灯片设计最佳实践的符合度
- en: Titles using **title case** instead of **sentence case (1)** .
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**标题大小写**而不是**句子大小写（1**）的标题。
- en: Paragraphs of text with **fonts too small** for presentation projection ( **2**
    ).
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本段落中字体太小，不适合用于演示投影（**2**）。
- en: I’m happy that the Copilot-generated slides have improved in terms of visuals
    being more aligned with the presentation’s context, and that Copilot seems to
    have stopped suggesting blocks of text in all caps! If you do get suggestions
    with text in all caps, please make sure to assess its readability.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴看到Copilot生成的幻灯片在视觉上与演示文稿的上下文更加一致，而且Copilot似乎也不再建议使用全大写的文本块了！如果你确实收到了包含全大写文本的建议，请确保评估其可读性。
- en: Results have improved, but there is still plenty of work to do on Copilot-generated
    slides to make them more compelling. We will discuss what changes and adjustments
    Copilot can and cannot make in the upcoming *Modifying and summarizing a presentation
    with Copilot* section. But first, let’s discuss how to start a presentation in
    the Narrative Builder from a file.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 结果有所改善，但仍然需要在Copilot生成的幻灯片上做大量工作，以使其更具吸引力。我们将在即将到来的*使用Copilot修改和总结演示文稿*部分中讨论Copilot可以和不能做出的更改和调整。但首先，让我们讨论如何从文件开始使用叙事构建器创建演示文稿。
- en: Creating a new presentation in the Narrative Builder from a file
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从文件创建叙事构建器中的新演示文稿
- en: Even though it will still need some adjustments, my favorite way to start a
    new presentation with the help of Copilot is by using an existing Word file. I
    find that creating a presentation’s structure and content draft with Copilot in
    Word gives me features such as referencing more than one existing file as a starting
    point and rewriting paragraphs. Even if Copilot in PowerPoint keeps improving
    and might eventually have features like the ones in Word, I still think it is
    a good idea to create your narrative and story without opening PowerPoint.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 即使它仍然需要一些调整，但我最喜欢的使用Copilot开始新演示文稿的方式是使用现有的Word文件。我发现，在Word中使用Copilot创建演示文稿的结构和内容草案，可以给我提供诸如以多个现有文件作为起点进行引用和重写段落等功能。即使PowerPoint中的Copilot持续改进，并可能最终拥有Word中的类似功能，我仍然认为在不打开PowerPoint的情况下创建你的叙述和故事是一个好主意。
- en: 'Just as we saw in *Figure 5.3* , when creating a new presentation with the
    Narrative Builder, we start by clicking the Narrative Builder icon to open its
    prompt window. Adding a reference file as a starting point can be done in two
    ways ( *Figure 5.9* ):'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在*图5.3*中看到的，当使用叙事构建器创建新演示文稿时，我们首先点击叙事构建器图标以打开其提示窗口。以引用文件作为起点可以通过两种方式完成（*图5.9*）：
- en: '![Figure 5.9 – Referencing a file in the Narrative Builder](img/B32063_05_09.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图5.9 – 在叙事构建器中引用文件](img/B32063_05_09.png)'
- en: Figure 5.9 – Referencing a file in the Narrative Builder
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.9 – 在叙事构建器中引用文件
- en: Type in a forward slash ( `/` ), then select the name of the file in the list
    of recent files or start typing the file name to help Copilot search for it in
    your work environment storage (OneDrive or SharePoint) ( **1** ).
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入一个正斜杠（`/`），然后在最近文件列表中选择文件名称，或者开始键入文件名称以帮助Copilot在您的环境存储（OneDrive或SharePoint）中搜索它（**1**）。
- en: Click on the Reference a file icon ( **![Paperclip with solid fill](img/icon.png)
    ** ) to get a list of recent files or start typing the file name ( ** 2 ** ).
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击引用文件图标（**![实心纸夹图标](img/icon.png) **）以获取最近文件列表或开始键入文件名称（** 2 **）。
- en: In both cases, you also get access to the **Attach cloud files** option ( **3**
    ), which opens your full list of recent files. It also allows you to browse your
    OneDrive files ( **4** ) and the SharePoint sites you have access to ( **5** ).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，您还可以访问**附加云文件**选项（**3**），它将打开您完整的最近文件列表。它还允许您浏览您的OneDrive文件（**4**）以及您可以访问的SharePoint站点（**5**）。
- en: At the time this edition was written, only Word and PDF file formats were supported,
    and only one file could be referenced in a prompt. Be aware that the maximum file
    size is 10 MB as of May 2025.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本版时，仅支持Word和PDF文件格式，并且在一个提示中只能引用一个文件。请注意，截至2025年5月，最大文件大小为10 MB。
- en: The slide-generation process is the same, but I find that slide decks created
    in this way tend to have a bit less text, especially when the referenced Word
    file was created with heading styles. But, then again, I might just have been
    lucky that Copilot generated slides with less text when I used this feature. You
    will need to test it for yourself a few times and see how it behaves and **always**
    read everything Copilot suggests to make sure it is true and aligned with the
    message you want to convey.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 幻灯片生成过程是相同的，但我发现以这种方式创建的幻灯片通常文本较少，尤其是在引用的Word文件使用标题样式创建时。但，话又说回来，我可能只是运气好，Copilot在启用此功能时生成的幻灯片文本较少。你需要亲自测试几次，看看它的行为，并且**始终**阅读Copilot建议的内容，以确保它是真实的并且与你想传达的信息一致。
- en: You could also simply ask Copilot to create your presentation from a reference
    file without using a long and detailed prompt. The results you will get will always
    depend on the referenced file structure and how Copilot behaves that day. While
    testing various prompts for this chapter, I obtained various results, generating
    an outline with as few as 3 slides to as many as 23 slides.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以简单地要求Copilot从参考文件创建你的演示文稿，而不使用长而详细的提示。你将得到的结果将始终取决于参考文件的结构和Copilot当天的行为。在测试本章的各种提示时，我得到了各种结果，生成的提纲从3张幻灯片到23张幻灯片不等。
- en: 'If you try creating a presentation from a file that contains a lot of content
    and many headers, making it impossible to fit in the 40-slide Copilot limit, it
    gives you the **View more topics** option ( **1** ) ( *Figure 5.10* ):'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你尝试从一个包含大量内容和许多标题的文件创建演示文稿，使其无法适应Copilot的40张幻灯片限制，它将为你提供**查看更多主题**选项（**1**）（*图5.10*）：
- en: '![Figure 5.10 – Viewing and choosing topics for Copilot slide generation](img/B32063_05_10.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图5.10 – 查看和选择Copilot幻灯片生成主题](img/B32063_05_10.png)'
- en: Figure 5.10 – Viewing and choosing topics for Copilot slide generation
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.10 – 查看和选择Copilot幻灯片生成主题
- en: 'If the estimated number of slides is close to the maximum but you don’t see
    **View more topics** , scroll down to the bottom of the suggested list of topics.
    When clicking on the link, a new window will open with the **Customize your presentation
    by adding or removing topics** option and allowing you to include the following
    elements:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果估计的幻灯片数量接近最大值，但你没有看到**查看更多主题**，则将鼠标滚动到建议主题列表的底部。当点击链接时，将打开一个新窗口，其中包含**通过添加或删除主题自定义您的演示文稿**选项，并允许您包含以下元素：
- en: 'A column for **Included topics** ( **2** ): Hovering over a topic will reveal
    an arrow ( **3** ) allowing you to view a bullet list of the content when clicking
    on it, and a minus icon ( **4** ) to send the topic into the **Available topics**
    column.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**包含主题**（**2**）的列：当鼠标悬停在主题上时，将显示一个箭头（**3**），允许你在点击时查看内容的列表，以及一个减号图标（**4**）将主题发送到**可用主题**列。
- en: 'A column for **Available topics** ( **5** ): Again, when hovering over a topic,
    you can click on the arrow to view a bullet list of the content ( **6** ) and
    a plus sign icon ( **7** ) to add the topic to the **Included topics** column.
    When it is grayed out, it means you must remove a topic before including a new
    one.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**可用主题**（**5**）的列：同样，当鼠标悬停在主题上时，你可以点击箭头查看内容的列表（**6**）和一个加号图标（**7**）将主题添加到**包含主题**列。当它变灰时，意味着你必须先删除一个主题才能包含新的主题。
- en: Looking at the bottom of the window will let you know if you have reached the
    maximum number of slides that can be generated ( **8** ).
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查看窗口底部将告诉你是否已达到可以生成的最大幻灯片数量（**8**）。
- en: When you are done adding and removing topics, click on **Save topics** ( **9**
    ) and then **Generate slides** ( **10** ) to get your draft presentation file.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你完成添加和删除主题后，点击**保存主题**（**9**）然后点击**生成幻灯片**（**10**）以获取你的草稿演示文稿。
- en: Whatever the method you use, you will need to try it on your own and see what
    works best with the type of content you are trying to create. If you don’t get
    the results you want the first time, try it again because Copilot seldom creates
    the exact same content every time you try a prompt.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你使用什么方法，你都需要亲自尝试并看看哪种最适合你试图创建的内容类型。如果你第一次没有得到你想要的结果，再试一次，因为Copilot很少每次尝试提示时都创建完全相同的内容。
- en: Let’s now discuss the creation of a new presentation using an existing template,
    whether it is one made available by Microsoft or your organization’s template.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来讨论使用现有模板创建新演示文稿的过程，无论是Microsoft提供的模板还是你组织的模板。
- en: Creating a new presentation with Copilot using an existing template
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用现有模板通过Copilot创建新的演示文稿
- en: 'If you usually start new presentations from a regular `.pptx` example file,
    you can still use Copilot to create new content. You will be able to use the Narrative
    Builder, as we discussed previously, and will have a similar experience ( *Figure
    5.11* ):'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您通常从常规`.pptx`示例文件开始新的演示文稿，您仍然可以使用Copilot创建新内容。您将能够使用我们之前讨论的叙事构建器，并将有类似的经验（*图5.11*）：
- en: '![Figure 5.11 – Creating a draft Copilot presentation with an existing template](img/B32063_05_11.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图5.11 – 使用现有模板创建Copilot演示文稿草稿](img/B32063_05_11.png)'
- en: Figure 5.11 – Creating a draft Copilot presentation with an existing template
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.11 – 使用现有模板创建Copilot演示文稿草稿
- en: Open your file as you would normally do. If you go to the **Design** tab ( **1**
    ), you will see the theme applied to your presentation ( **2** ).
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按照您通常的方式打开您的文件。如果您转到**设计**选项卡（**1**），您将看到应用于您的演示文稿的主题（**2**）。
- en: 'Since it’s an existing file, the **Narrative Builder** ( **3** ) offers options
    to **Create a new presentation** , **Create a new presentation with file** , **Add
    a slide** , **Summarize this presentation** , and **Ask Copilot** . *Note* : **Add
    a topic** has been added to the list of tasks.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于它是一个现有文件，**叙事构建器**（**3**）提供了以下选项：**创建新的演示文稿**、**使用文件创建新的演示文稿**、**添加幻灯片**、**总结此演示文稿**、**询问Copilot**。*注意*：**添加主题**已被添加到任务列表中。
- en: When creating a new presentation, whether from a prompt or a file, you will
    go through all the steps we already described except that Copilot will generate
    a brand-new file with a generic name, **Presentation6** in our example ( **4**
    ). The only thing left to do is naming and saving your new file and move on to
    review and adapt the content.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您创建一个新的演示文稿时，无论是从提示还是从文件开始，您将经历我们之前描述的所有步骤，除了Copilot将生成一个全新的文件，在我们的例子中是**Presentation6**（**4**）。剩下要做的就是命名和保存您的新文件，然后继续审查和调整内容。
- en: 'In [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206) , we discussed Microsoft’s
    recommendations to make your slide masters AI compatible. As a reminder, here
    are the elements a good slide master should include:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第三章*](Chapter_03.xhtml#_idTextAnchor206)中，我们讨论了Microsoft关于使您的幻灯片母版与AI兼容的建议。作为提醒，以下是一个好的幻灯片母版应包括的元素：
- en: A variety of slide layouts that have various sizes of placeholders
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 各种大小的占位符幻灯片布局
- en: Slide layouts named for their intended use (e.g., Section, Agenda)
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命名为预期用途的幻灯片布局（例如，章节、议程）
- en: Since Microsoft provides a Copilot PowerPoint Starter Template (see *Further
    Reading* for a link), I decided to compare drafts created using an existing template
    with and without including the starter template.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Microsoft提供了Copilot PowerPoint起始模板（见*进一步阅读*获取链接），我决定比较使用现有模板创建的草稿，包括和不包括起始模板的情况。
- en: My conclusion? If the template you use has more variety than the nine standard
    layouts found in Microsoft’s Blank template and their names reflect their function,
    you won’t need to add layouts from Microsoft’s Starter Template.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我的结论是？如果您使用的模板比Microsoft空白模板中的九种标准布局更多样，并且它们的名称反映了它们的功能，您就不需要添加Microsoft起始模板中的布局。
- en: 'I first tried with a template named Pine Design that can be found in the Microsoft
    templates ( *Figure 5.12* ):'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先尝试了一个名为Pine Design的模板，该模板可在Microsoft模板中找到（*图5.12*）：
- en: '![Figure 5.12 – Comparing original and with starter layouts using the Pine
    Design template](img/B32063_05_12.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图5.12 – 使用Pine Design模板比较原始布局和起始布局](img/B32063_05_12.png)'
- en: Figure 5.12 – Comparing original and with starter layouts using the Pine Design
    template
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.12 – 使用Pine Design模板比较原始布局和起始布局
- en: The screenshot on the left shows a presentation Copilot created with the original
    Pine Design template, which includes 19 layouts. The screenshot on the right was
    created using the same template to which I added all of Microsoft’s suggested
    starter layouts, now totaling 62 layouts. As you can see, they look very similar.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 左侧的截图显示了Copilot使用原始Pine Design模板创建的演示文稿，该模板包含19种布局。右侧的截图使用相同的模板创建，我在其中添加了所有Microsoft建议的起始布局，现在总共有62种布局。正如您所看到的，它们看起来非常相似。
- en: 'Let’s have a look at a second comparison with the Dividend template ( *Figure
    5.13* ):'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看使用Dividend模板的第二个比较（*图5.13*）：
- en: '![Figure 5.13 – Comparing original and with starter layouts using the Dividend
    template](img/B32063_05_13.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图5.13 – 使用Dividend模板比较原始布局和起始布局](img/B32063_05_13.png)'
- en: Figure 5.13 – Comparing original and with starter layouts using the Dividend
    template
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '![图5.13 – 使用Dividend模板比较原始布局和起始布局](img/B32063_05_13.png)'
- en: At first glance, it seems that differences are more visible than in the previous
    example because of the dark rectangle on the first slide. It’s just because Copilot
    decided to use a Section layout in the original template instead of a Title layout.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 初看之下，由于第一张幻灯片上的深色矩形，似乎差异比之前的例子更明显。这仅仅是因为Copilot决定在原始模板中使用节布局而不是标题布局。
- en: One thing became clear with my second example. Copilot is choosing layouts from
    the Copilot Starter Template made available by Microsoft more often when they
    are included with the original template. If you are using a corporate-branded
    template, that is not a good thing.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第二个例子中，有一点变得清晰。当这些布局包含在原始模板中时，Copilot更频繁地选择由Microsoft提供的Copilot起始模板中的布局。如果你使用的是公司品牌的模板，这可不是什么好事。
- en: 'Whether you decide to create a new presentation with Copilot with or without
    a template, let me repeat something I previously mentioned: this is the first
    *very rough* draft. More work is required if you want your slides to be compelling
    and aligned with your message. Let’s now see how the slide starters feature can
    help you to quickly add new slides with interesting layouts.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你决定是否使用模板与Copilot一起创建新的演示文稿，让我重复一下之前提到的话：这是第一个*非常粗糙*的草稿。如果你想让你的幻灯片引人入胜并与你的信息保持一致，还需要做更多的工作。现在让我们看看幻灯片起始器功能如何帮助你快速添加具有有趣布局的新幻灯片。
- en: Using slide starters when adding slides
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在添加幻灯片时使用幻灯片起始器
- en: 'Having a Copilot license adds an interesting feature named **slide starters**
    . When you have a presentation open and add a new slide, the **Design Suggestions**
    pane will open ( **1** ) in the **Home** tab ( *Figure 5.14* ):'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 拥有Copilot许可证将添加一个名为**幻灯片起始器**的有趣功能。当你打开一个演示文稿并添加新幻灯片时，**设计建议**面板将在**主页**标签页中打开（**1**）（*图5.14*）：
- en: '![Figure 5.14 – Using slide starters](img/B32063_05_14.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图5.14 – 使用幻灯片起始器](img/B32063_05_14.png)'
- en: Figure 5.14 – Using slide starters
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.14 – 使用幻灯片起始器
- en: It will give you ideas of layouts that can be quickly applied to your new slide
    while using the template applied to your file. At the time of writing this chapter,
    the great additions to slide starters are a layout with a table and one with a
    timeline – such time savers! We can probably hope for new visual layouts becoming
    available in slide starters in the future.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 它将为你提供一些想法，这些想法可以快速应用于使用文件中应用的模板的新幻灯片。在撰写本章时，对幻灯片起始器的重大补充是一个带有表格的布局和一个带有时间线的布局——这些节省时间的方法！我们或许可以期待未来在幻灯片起始器中提供新的视觉布局。
- en: We have seen most of the Copilot features you can use to create a presentation.
    Let’s now have a look at Copilot’s ability to modify and summarize a presentation.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了你可以用来创建演示文稿的大部分Copilot功能。现在让我们看看Copilot修改和总结演示文稿的能力。
- en: Modifying and summarizing a presentation with Copilot
  id: totrans-135
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Copilot修改和总结演示文稿
- en: 'The Copilot chat pane in PowerPoint has a nice list of features that can be
    used to improve your presentation and have a conversation with the AI. Before
    discussing which prompts I find interesting, let’s describe the features you will
    find in that chat pane, available when you click the **Copilot** button on the
    **Home** tab ( **1** ) ( *Figure 5.15* ):'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint中的Copilot聊天面板提供了一系列功能，可用于提升你的演示文稿并与人机交互。在讨论哪些提示让我感兴趣之前，让我们先描述一下当你点击**主页**标签页上的**Copilot**按钮时，你将在聊天面板中找到的功能（**1**）（*图5.15*）：
- en: '![Figure 5.15 – Accessing the Copilot chat pane and feature description](img/B32063_05_15.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图5.15 – 访问Copilot聊天面板和功能描述](img/B32063_05_15.png)'
- en: Figure 5.15 – Accessing the Copilot chat pane and feature description
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.15 – 访问Copilot聊天面板和功能描述
- en: The **Work / Web** toggle ( **2** ) can be used to constrain Copilot’s search
    to your work environment only or use the web.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工作/网络**切换器（**2**）可用于将Copilot的搜索限制在你的工作环境内或使用网络。'
- en: The chat box allows adding your prompts ( **3** ).
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聊天框允许添加你的提示（**3**）。
- en: 'The Plus ( **+** ) sign allows you to add content or agents ( **4** ):'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加号（**+**）符号允许你添加内容或代理（**4**）：
- en: '**Add work content** will open a list of recent files. If you don’t see the
    one you want, there is a search box, the possibility to upload from a local drive,
    or attach a cloud file. When your toggle is on **Work** , you will be able to
    refer to people, files, meetings, emails, and sites from your organization to
    help Copilot answer your prompt.'
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**添加工作内容**将打开最近文件的列表。如果你没有看到你想要的文件，有一个搜索框，可以从本地驱动器上传，或者附加云文件。当你将切换器置于**工作**状态时，你将能够引用来自你组织的人员、文件、会议、电子邮件和网站，以帮助Copilot回答你的提示。'
- en: '**Upload image and files** and **Attach cloud files** are direct access to
    search for local or cloud files.'
  id: totrans-143
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上传图片和文件**和**附加云文件**是直接搜索本地或云文件的方式。'
- en: '**Chat with an agent** allows us to use agents that can accomplish specific
    tasks.'
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与代理聊天**允许我们使用能够完成特定任务的代理。'
- en: Generic prompts are suggested ( **5** ). Clicking on one of the prompts adds
    it to the prompting box. The **See more** link develops a longer list of prompts.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建议使用通用提示（**5**）。点击其中一个提示会将它添加到提示框中。**查看更多**链接会展开一个更长的提示列表。
- en: '**Start a new conversation** when you want to change topic or do separate research
    ( **6** ).'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你想改变话题或进行独立研究时，**开始新的对话**（**6**）。
- en: '**Open navigation panel** ( **7** ) gives you access to other elements that
    we will see in *Figure 5.16* .'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**打开导航面板**（**7**）让你可以访问我们在*图5.16*中将要看到的其他元素。'
- en: 'After clicking on the **Open navigation** **panel** icon, a new view overlaps
    the chat pane to give you access to **Agents** ( **1** ) and all your Copilot
    **Conversations** history ( **2** ) ( *Figure 5.16* ):'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在点击**打开导航面板**图标后，一个新的视图会覆盖聊天面板，让你可以访问**代理**（**1**）和所有你的Copilot**对话**历史（**2**）（*图5.16*）：
- en: '![Figure 5.16 – Viewing the navigation panel to agents and conversation history](img/B32063_05_16.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![图5.16 – 查看导航面板以访问代理和对话历史](img/B32063_05_16.png)'
- en: Figure 5.16 – Viewing the navigation panel to agents and conversation history
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.16 – 查看导航面板以访问代理和对话历史
- en: Clicking on an agent re-opens the chat pane with the selected agent so you can
    start prompting for a specific task. Clicking on a conversation in the list re-opens
    the chat pane with your previous conversation. Copilot in PowerPoint can be used
    as an ongoing assistant. Conversations created in your file will be listed in
    your overall Copilot Chat history.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 点击一个代理会重新打开聊天面板，并选择该代理，以便你可以开始对特定任务进行提示。点击列表中的对话会重新打开聊天面板，显示之前的对话。PowerPoint中的Copilot可以用作持续助手。你在文件中创建的对话将列在你的整体Copilot聊天历史中。
- en: Adding agents could become a complex topic in itself because of special licensing
    requirements or relevance within PowerPoint. The most common ones you can add
    and will work without extra costs throughout your M365 environment are **Researcher**
    , **Analyst** , **Writing Coach** , and **Prompt Coach** . If you don’t see agents
    in your pane, ask your IT support as they might not have been deployed. If you
    see an **All Agents** or **Add Agents** link in the navigation panel, explore
    options offered from there. A link to a Microsoft article on agents is available
    in *Further reading* .
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 由于特殊的许可要求或与PowerPoint的相关性，添加代理本身可能成为一个复杂的话题。你可以在M365环境中添加并无需额外费用即可使用的最常见代理包括**研究员**、**分析师**、**写作教练**和**提示教练**。如果你在你的面板中没有看到代理，请咨询你的IT支持，因为他们可能尚未部署。如果你在导航面板中看到**所有代理**或**添加代理**链接，请从那里探索提供的选项。在*进一步阅读*中有一个关于代理的Microsoft文章链接。
- en: Now that we have reviewed how the Copilot chat pane works, let’s have a look
    at some of the tasks Copilot can accomplish to make sure your content is clear.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了Copilot聊天面板的工作方式，让我们看看Copilot可以完成的一些任务，以确保你的内容清晰。
- en: Using Copilot to ensure content clarity
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Copilot确保内容清晰度
- en: Whether you created your presentation draft with the help of Copilot or you
    are working on an existing presentation, the Copilot chat pane can be a great
    place to start to ask your assistant questions about the content.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是借助Copilot创建演示文稿草案，还是正在处理现有的演示文稿，Copilot聊天面板都是一个询问助手有关内容的好地方。
- en: 'When you open the Copilot chat pane, it will usually suggest some prompts (
    *Figure 5.17* ). *Note* : The following figure does not show the latest Copilot
    version but prompting to ensure content clarity works the same. The presentation
    summary is not offered by default anymore.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 当你打开Copilot聊天面板时，它通常会建议一些提示（*图5.17*）。*注意*：以下图示不显示最新的Copilot版本，但确保内容清晰度的提示功能仍然相同。默认情况下不再提供演示文稿摘要。
- en: '![Figure 5.17 – Prompting Copilot to evaluate content clarity](img/B32063_05_17.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![图5.17 – 请求Copilot评估内容清晰度](img/B32063_05_17.png)'
- en: Figure 5.17 – Prompting Copilot to evaluate content clarity
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.17 – 请求Copilot评估内容清晰度
- en: Since a presentation **Summary** ( **1** ) is not offered by default anymore,
    you can prompt Copilot to summarize it in the chat box. A summary is a great way
    to check whether your content supports your message, or if some key elements are
    missing. This summary can be compared to asking a colleague to review your content.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 由于默认情况下不再提供演示文稿的**摘要**（**1**），您可以在聊天框中提示Copilot进行总结。总结是检查您的内文是否支持您的信息或是否缺少某些关键元素的好方法。这种总结可以比作请同事审查您的内文。
- en: 'You can use any of the suggested prompts or just add your own. Here is one
    you should try: `What are the three main takeaways for this presentation?` ( **2**
    ). As you can see from Copilot’s answer, we get a list of the main points ( **3**
    ), each including a summary. There used to be a list of slide numbers ( **4**
    ) from which the information was taken, but it seems that this feature stopped
    working when testing for this chapter – keep looking for it; it should come back.
    At the bottom of Copilot’s reply, you always have some follow-up questions to
    keep the conversation going. Use them if they are helpful.'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用任何建议的提示，或者仅添加您自己的提示。这里有一个您应该尝试的提示：“`这个演示文稿的三个主要收获是什么？`”（**2**）。如您从Copilot的回答中看到，我们得到了一个主要观点的列表（**3**），每个都包括一个总结。曾经有一个从其中提取信息的幻灯片编号列表（**4**），但似乎在测试本章时这个功能停止工作了——继续寻找它；它应该会回来。在Copilot的回答底部，您总是有一些后续问题来保持对话进行。如果它们有帮助，请使用它们。
- en: I recommend that you have a look at the **Copilot Prompt Gallery** link provided
    in *Further reading* and filter the prompts to get only the ones for PowerPoint.
    It will give you an up-to-date list every time you browse through it. Keep in
    mind that the number of tasks Copilot will understand will evolve.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议您查看“*进一步阅读*”中提供的**Copilot Prompt Gallery**链接，并筛选出仅针对PowerPoint的提示。每次浏览时，它都会为您提供最新的列表。请记住，Copilot能理解的任务数量将会不断演变。
- en: We will now see a few prompts that will help you add content to your presentation
    with the help of Copilot.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将看到一些提示，这些提示将帮助您在Copilot的帮助下向您的演示文稿添加内容。
- en: Using Copilot to add content
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Copilot添加内容
- en: Why are we discussing adding content first? Simply because it is aligned with
    what we discussed previously about messaging and structure first, then working
    on visuals. Of course, using Copilot makes us work in PowerPoint right away, so
    my suggestion is using tasks to add content first, then continuing with tasks
    that will improve visuals.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们先讨论添加内容？简单来说，因为它与我们之前讨论的信息和结构先于视觉效果的顺序相一致。当然，使用Copilot使我们能够立即在PowerPoint中工作，因此我的建议是先使用任务添加内容，然后继续使用可以改善视觉效果的任务。
- en: 'If you look at the Copilot Prompt Gallery, you will find various tasks related
    to adding content to your presentation. In this section, we will see a basic content-adding
    task Copilot can understand: adding a slide or an image.'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您查看Copilot Prompt Gallery，您会发现与向您的演示文稿添加内容相关的各种任务。在本节中，我们将看到Copilot可以理解的基本内容添加任务：添加幻灯片或图片。
- en: 'After reviewing your content, if you need to add a new topic or expand on a
    topic listed on a slide, click on the **New Slide with Copilot** button in the
    Home tab ( **1** ) or click on the **Narrative Builder** ( **2** ) to access **Add
    a slide** and **Add a topic** features ( *Figure 5.18* ):'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在审查完您的内文后，如果您需要添加新主题或扩展幻灯片上列出的主题，请点击“首页”选项卡中的**使用Copilot添加新幻灯片**按钮（**1**）或点击**叙事构建器**（**2**）以访问**添加幻灯片**和**添加主题**功能（*图5.18*）：
- en: '![Figure 5.18 – Adding a new slide or new topic from the Home tab or Narrative
    Builder](img/B32063_05_18.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图5.18 – 从首页或叙事构建器添加新幻灯片或新主题](img/B32063_05_18.png)'
- en: Figure 5.18 – Adding a new slide or new topic from the Home tab or Narrative
    Builder
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.18 – 从首页或叙事构建器添加新幻灯片或新主题
- en: 'When adding a new slide, a **Add an slide with Copilot** window opens ( *Figure
    5.19* ):'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 当添加新幻灯片时，会打开一个**使用Copilot添加幻灯片**窗口（*图5.19*）：
- en: '![Figure 5.19 – Adding a new slide with Add a slide with Copilot window](img/B32063_05_19.png)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![图5.19 – 使用Copilot添加新幻灯片](img/B32063_05_19.png)'
- en: Figure 5.19 – Adding a new slide with Add a slide with Copilot window
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.19 – 使用Copilot添加新幻灯片
- en: Enter your prompt describing the content you want to add to your new slide (
    **1** ). You can reference an existing file that can help Copilot with the content
    creation ( **2** ) and tell it where images should be sourced ( **3** ) – the
    default is Stock, but if your organization has a configured brand library it could
    be listed in the dropdown. Click on the arrow ( **4** ) to generate the slide.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 输入您想要添加到新幻灯片的提示内容（**1**）。您可以参考一个现有文件来帮助Copilot进行内容创作（**2**），并告诉它图像的来源位置（**3**）——默认为Stock，但如果您的组织配置了品牌库，它可能会列在下拉菜单中。点击箭头（**4**）以生成幻灯片。
- en: 'If using the feature to add a topic, we then get the **Add a topic with Copilot**
    window that works like the Narrative Builder we have discussed previously ( *Figure
    5.20* ):'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 如果使用添加主题的功能，我们将得到**使用Copilot添加主题**窗口，它的工作方式与我们之前讨论的叙事构建器类似（*图5.20*）：
- en: '![Figure 5.20 - Adding a topic with Add a topic with Copilot window](img/B32063_05_20.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![图5.20 - 使用“添加主题”窗口添加主题](img/B32063_05_20.png)'
- en: Figure 5.20 - Adding a topic with Add a topic with Copilot window
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.20 - 使用“添加主题”窗口添加主题
- en: Enter your prompt describing the topic you want to add to your new slide ( **1**
    ) and click on the arrow to generate ( **2** ).
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入您想要添加到新幻灯片的主题提示内容（**1**）并点击箭头以生成（**2**）。
- en: You could also click on the Plus ( **+** ) sign ( **3** ) before entering your
    prompt so the topic is added in a specific position in your outline.
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您也可以在输入提示之前点击加号（**+**）（**3**），以便在您的大纲中添加主题到特定位置。
- en: Copilot will identify your new section ( **4** ) and you will be able to move
    sections around, just as you did when creating a new presentation with Narrative
    Builder.
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Copilot将识别您的新部分（**4**），您将能够移动部分，就像您使用叙事构建器创建新演示文稿时做的那样。
- en: Click on the **Generate slides** button ( **5** ) to add content to your presentation.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**生成幻灯片**按钮（**5**）以将内容添加到您的演示文稿中。
- en: 'At the time this chapter was revised before publication, if you try using Copilot
    chat to change an image or even add an image, it will reply that it understands
    what you are asking but cannot do it directly. If you only want to change or add
    an image using stock images or your brand library you will need to go to the **Insert**
    tab to do so. But if you want to create a brand-new AI-generated image, then Copilot
    chat will cooperate ( *Figure 5.21* ):'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章修订并出版之前，如果您尝试使用Copilot聊天来更改图像或甚至添加图像，它将回复它理解您的要求，但不能直接执行。如果您只想使用库存图像或您的品牌库更改或添加图像，您需要转到**插入**选项卡来执行此操作。但如果您想创建全新的AI生成图像，那么Copilot聊天将合作（*图5.21*）：
- en: '![Figure 5.21: Creating an image in Copilot chat](img/B32063_05_21.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![图5.21：在Copilot聊天中创建图像](img/B32063_05_21.png)'
- en: 'Figure 5.21: Creating an image in Copilot chat'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.21：在Copilot聊天中创建图像
- en: I used the prompt `Create an image of a person running in a park during fall
    season in the morning` to get this new image. Copilot offers some follow-up prompts
    you can use to further improve the image for your needs. When satisfied, hover
    over the image to click a Plus ( **+** ) sign to add it to your slide. You will
    see more details with another example in [*Chapter 7*](Chapter_07.xhtml#_idTextAnchor580)
    . This leads us to discussing prompts that will help modify an existing presentation
    with various levels of success.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用提示`Create an image of a person running in a park during fall season in the
    morning`来获取这张新图像。Copilot提供了一些后续提示，您可以使用它们来进一步改进图像以满足您的需求。当您满意时，将鼠标悬停在图像上并点击一个加号（**+**）来将其添加到您的幻灯片中。您将在[*第7章*](Chapter_07.xhtml#_idTextAnchor580)中看到更多细节和另一个示例。这使我们讨论有助于以各种成功程度修改现有演示文稿的提示。
- en: Using Copilot to modify content
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Copilot修改内容
- en: At the time the first draft of this chapter was written, trying to modify and
    improve content on slides from the Copilot chat pane was not a very successful
    undertaking. Within just two months, half of the four examples I had chosen as
    tasks Copilot could not perform were improved! This is a fast-paced world.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章初稿撰写时，尝试从Copilot聊天窗格中修改和改进幻灯片内容并不是一项非常成功的尝试。仅仅两个月内，我选择的四个任务中有一半Copilot无法执行得到了改进！这是一个快节奏的世界。
- en: 'Let’s start with two prompts that should be basic slide content management
    that Copilot could understand but was not able to perform ( *Figure 5.22* ):'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从两个应该被Copilot理解但无法执行的基本幻灯片内容管理提示开始（*图5.22*）：
- en: '![Figure 5.22 – Prompts Copilot could understand but not perform](img/B32063_05_22.png)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![图5.22 – Copilot能理解但不能执行的提示](img/B32063_05_22.png)'
- en: Figure 5.22 – Prompts Copilot could understand but not perform
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.22 – Copilot能够理解但不能执行提示
- en: '`Increase the font size in the content placeholder` : Copilot does show understanding
    but cannot accomplish the task'
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`增加内容占位符中的字体大小`：Copilot确实表现出理解，但无法完成任务。'
- en: '`For all Title placeholders in this presentation, please change "title case"
    to "sentence case"` : For the second time when asking it to carry out basic content
    management tasks, Copilot could not do it'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`对于本演示文稿中所有的标题占位符，请将“标题大小写”更改为“句子大小写”`：在第二次要求它执行基本内容管理任务时，Copilot无法完成。'
- en: '`From this slide, create 3 different slides, one per paragraph in the content
    placeholder` : Again, Copilot understood but could not act on it. Although, the
    latest version does provide scripts and ideas to create the three slides.'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`从本幻灯片创建3个不同的幻灯片，每个幻灯片对应内容占位符中的一个段落`：再次，Copilot理解但无法执行。尽管如此，最新版本确实提供了创建三个幻灯片的脚本和想法。'
- en: '`For all Title placeholders in this presentation, please change "title case"
    to "sentence case"` : For the third time asking basic content management tasks,
    Copilot could not do it.'
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`对于本演示文稿中所有的标题占位符，请将“标题大小写”更改为“句子大小写”`：第三次要求执行基本内容管理任务时，Copilot无法完成。'
- en: The key sentence for those Copilot replies is that it **can’t make changes to
    your presentation directly** . At least, not for now. By the time you read this
    chapter, things might have improved. Microsoft’s development teams are hard at
    work to keep improving how Copilot can improve our productivity.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 那些Copilot回复的关键句子是它**不能直接更改你的演示文稿**。至少，现在还不能。在你阅读这一章的时候，事情可能已经有所改善。微软的开发团队正在努力工作，以不断提高Copilot提高我们生产力的方式。
- en: 'If adding slides is not what you want, too much text on slides and small font
    sizes can be addressed from the placeholder. Instead of removing some text yourself,
    you can use a Copilot tool available for content placeholders ( **1** ) ( *Figure
    5.23* ):'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果添加幻灯片不是你想要的，你可以在占位符中解决幻灯片上过多的文本和小字体问题。与其自己删除一些文本，你还可以使用适用于内容占位符的Copilot工具（**1**）（*图5.23*）：
- en: '![Figure 5.23 – Using Copilot tools on a content placeholder](img/B32063_05_23.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![图5.23 – 在内容占位符上使用Copilot工具](img/B32063_05_23.png)'
- en: Figure 5.23 – Using Copilot tools on a content placeholder
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.23 – 在内容占位符上使用Copilot工具
- en: In the list of quick actions Copilot can do on the content, use **Make it a
    list** ( **2** ). This greatly reduces the amount of text for you ( **3** ). If
    you don’t like the suggested list, generate a new suggestion or prompt Copilot
    for changes ( **4** ) before you click on the **Keep it button** .
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在Copilot可以在内容上执行快速操作列表中，使用**将其转换为列表**（**2**）。这大大减少了你需要处理的文本量（**3**）。如果你不喜欢建议的列表，在点击**保留按钮**之前，可以生成一个新的建议或提示Copilot进行更改（**4**）。
- en: 'You can then use PowerPoint’s **Reset** slide function on the **Home** tab
    ( **1** ) ( *Figure 5.24* ):'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以在“主页”选项卡上使用PowerPoint的**重置幻灯片**功能（**1**）（*图5.24*）：
- en: '![Figure 5.24 – Using the reset slide function on the Home tab](img/B32063_05_24.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![图5.24 – 在主页选项卡上使用重置幻灯片功能](img/B32063_05_24.png)'
- en: Figure 5.24 – Using the reset slide function on the Home tab
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.24 – 在主页选项卡上使用重置幻灯片功能
- en: This button will automatically reset the slide layout so that it is aligned
    with the font size configured in the slide master ( **2** ). In *Figure 5.24*
    , the text on the first line of the content placeholder ( **Challenges Affecting
    Productivity** ) would make a much better title than the generic one Copilot first
    created ( **Cognitive Performance Issues** ). If you get similar results, just
    cut the text out of the placeholder and paste it into the title placeholder.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 此按钮将自动重置幻灯片布局，使其与幻灯片母版中配置的字体大小对齐（**2**）。在*图5.24*中，内容占位符的第一行文本（**影响生产力的挑战**）将比Copilot最初创建的通用标题（**认知性能问题**）要好得多。如果你得到类似的结果，只需将文本从占位符中剪切出来并粘贴到标题占位符中。
- en: If your slide master and layouts have been configured appropriately, this step
    will work well. I am not saying that all these changes will be made quickly, especially
    if you have many slides in your presentation, but taking the time to do it is
    the only way to produce more impactful presentations.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经适当地配置了幻灯片母版和布局，这一步将工作得很好。我并不是说所有这些更改都会很快完成，尤其是如果你演示文稿中有许多幻灯片，但花时间做这件事是制作更具影响力的演示文稿的唯一方法。
- en: 'Let’s now discuss the second element I find irritating: having most/all title
    placeholders, and any text used as a subtitle in other placeholders, in title
    case instead of sentence case. If you want to improve readability, that must be
    changed, and we know Copilot cannot accomplish this task at the time this chapter
    was written. But Copilot is a great assistant to help us with code! You can use
    **Visual Basic for Applications** ( **VBA** ) code within PowerPoint to automate
    certain repetitive tasks.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来讨论第二个让我感到烦恼的元素：大多数/所有标题占位符，以及在其他占位符中用作副标题的任何文本，都使用标题大小写而不是句子大小写。如果你想提高可读性，这必须改变，我们知道在撰写本章时Copilot无法完成这项任务。但Copilot是一个伟大的助手，可以帮助我们处理代码！你可以在PowerPoint中使用**Visual
    Basic for Applications**（**VBA**）代码来自动化某些重复性任务。
- en: So, even though this book is not intended to teach you how to use VBA (I consider
    myself a code dummy!), since we are discussing Copilot and how it can help you,
    here are the prompts and steps I used to remove title case throughout the presentation.
    If you want to learn more about macros, please refer to the *Microsoft Learn*
    article listed in *Further reading* .
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，尽管这本书的目的是不教你如何使用VBA（我认为自己是个代码菜鸟！），既然我们在讨论Copilot以及它如何能帮助你，这里是我用来在整个演示文稿中移除标题大小写的提示和步骤。如果你想了解更多关于宏的信息，请参阅*进一步阅读*中列出的*Microsoft
    Learn*文章。
- en: 'In the Copilot chat pane, I first tried the following prompt:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在Copilot聊天窗格中，我首先尝试了以下提示：
- en: '`I want all the title placeholders to use "sentence case" instead of "title
    case", help me write a macro that will accomplish this task.`'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '`我想所有标题占位符都使用"句子大小写"而不是"标题大小写"，帮我写一个宏来完成这个任务。`'
- en: With the latest Copilot improvements, the chat pane returned a warning message
    that VBA is not fully supported and that syntax highlighting is based on Python.
    Re-testing the prompts and macro did work.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 随着最新的Copilot改进，聊天窗格返回了一个警告消息，指出VBA不受完全支持，并且语法高亮基于Python。重新测试提示和宏确实有效。
- en: 'Copilot was able to help and returned the lines of code and steps to accomplish
    the task. If you try it and Copilot replies that it cannot do that, try it again
    later ( *Figure 5.25* ):'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot能够帮助并返回完成任务的代码行和步骤。如果你尝试了，而Copilot回复说它做不到，稍后再试（*图5.25*）：
- en: '![Figure 5.25 – Copilot’s answer to a macro creation prompt](img/B32063_05_25.png)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![图5.25 – Copilot对宏创建提示的回答](img/B32063_05_25.png)'
- en: Figure 5.25 – Copilot’s answer to a macro creation prompt
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.25 – Copilot对宏创建提示的回答
- en: 'One of the suggested follow-up questions made me think I could automate this
    task even more, so I decided to follow up with this question:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个建议的后续问题让我想到我可以进一步自动化这项任务，所以我决定跟进这个问题：
- en: '`Can this type of macro be used for all the placeholder types in the file that
    has text?`'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '`这种类型的宏能否用于文件中所有带有文本的占位符类型？`'
- en: 'Copilot understood and gave me a completely revised macro ( **1** ) and the
    steps to run it ( **2** ) ( *Figure 5.26* ):'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot理解了，并给了我一个完全修改后的宏（**1**）和运行步骤（**2**）（*图5.26*）：
- en: '![Figure 5.26 – Copilot returning a revised macro and the steps to run it](img/B32063_05_26.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![图5.26 – Copilot返回修改后的宏和运行步骤](img/B32063_05_26.png)'
- en: Figure 5.26 – Copilot returning a revised macro and the steps to run it
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.26 – Copilot返回修改后的宏和运行步骤
- en: 'To use the macro, you first need to select the lines of code in the Copilot
    chat pane and copy them ( *Ctrl* + *C* ). *Note* : A new Copy code icon is available
    before the lines of code. Then you can proceed with opening the VBA editor. You
    will probably run into the same problem I had with the *Alt* + *F11* keyboard
    shortcut: it only displayed letter shortcuts to be used with the *Alt* key to
    open functions.'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用宏，你首先需要在Copilot聊天窗格中选择代码行并复制它们（*Ctrl* + *C*）。*注意*：在代码行之前有一个新的复制代码图标。然后你可以继续打开VBA编辑器。你可能遇到我遇到的问题，即使用*Alt*
    + *F11*键盘快捷键：它只显示与*Alt*键一起使用的字母快捷键来打开函数。
- en: 'The macro can be created and run from the **Developer** tab ( **1** ) ( *Figure
    5.27* ):'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 宏可以从**开发者**选项卡（**1**）创建和运行（*图5.27*）：
- en: '![Figure 5.27 – Using the Developer tab to create and run the macro](img/B32063_05_27.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![图5.27 – 使用开发者选项卡创建和运行宏](img/B32063_05_27.png)'
- en: Figure 5.27 – Using the Developer tab to create and run the macro
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.27 – 使用开发者选项卡创建和运行宏
- en: If you don’t see the tab, go to **File** | **Options** | **Customize Ribbon**
    and add a check mark beside **Developer** in the column on the right of the window.
    You can then click on the **Visual Basic** button ( **2** ). When the **Microsoft
    Visual Basic for Applications** window opens, click on the **Insert** tab ( **3**
    ), then **Module** ( **4** ). Paste the code in the module window that opens (
    **5** ). The last step is pressing *F5* on your keyboard or using the **Run Sub/UserForm**
    button in the toolbar ( **6** ). Then, close the VBA window.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您看不到选项卡，请转到**文件** | **选项** | **自定义功能区**，并在窗口右侧的列中勾选**开发者**。然后您可以点击**Visual
    Basic**按钮（**2**）。当**Microsoft Visual Basic for Applications**窗口打开时，点击**插入**选项卡（**3**），然后点击**模块**（**4**）。将代码粘贴到打开的模块窗口中（**5**）。最后一步是在键盘上按*F5*或使用工具栏中的**运行子程序/用户表单**按钮（**6**）。然后，关闭VBA窗口。
- en: If you get any error messages when running the macro, note what the error is
    and go back to the Copilot chat pane. Tell Copilot the macro has an error and
    ask it to review the code. Depending on the file I was testing, I got errors when
    running the suggested macro, but it worked after copying and pasting the corrected
    macro into the editor.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在运行宏时收到任何错误消息，请注意错误是什么，并返回到Copilot聊天窗格。告诉Copilot宏有错误，并要求它审查代码。根据我测试的文件，我在运行建议的宏时遇到了错误，但将修正后的宏复制粘贴到编辑器中后，它就正常工作了。
- en: 'The macro does a good job, even if in some instances you might encounter an
    uppercase letter missing at the beginning of a sentence. If that happens, just
    go back and ask a macro to change all the text placeholders to sentence case.
    After running the macro you will be able to view the changes on your slides (
    **1** ) ( *Figure 5.28* ):'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 宏工作得很好，即使在某些情况下您可能会遇到句子开头缺少大写字母。如果发生这种情况，只需返回并让宏将所有文本占位符更改为句子大小写。运行宏后，您将能够在您的幻灯片中查看更改（**1**）（*图5.28*）：
- en: '![Figure 5.28 – Running the macro results and removing the macro from the file](img/B32063_05_28.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![图5.28 – 运行宏结果和从文件中删除宏](img/B32063_05_28.png)'
- en: Figure 5.28 – Running the macro results and removing the macro from the file
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.28 – 运行宏结果和从文件中删除宏
- en: 'But, as you can see in *Figure 5.28* , adding a macro to your file turns off
    autosave (files saved to OneDrive or SharePoint) ( **2** ), asking you to save
    it as a macro-enabled file. But depending on the security settings for macro-enabled
    presentations in organizations, the file might not even open in the future. You
    can keep a copy of the macro-enabled file if you want, but I strongly suggest
    removing the macro from the file you will be using to continue your presentation
    creation process. Go through the following steps:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如您在*图5.28*中看到的，将宏添加到您的文件中会关闭自动保存（保存到OneDrive或SharePoint的文件）（**2**），要求您将其保存为启用宏的文件。但是，根据组织中对启用宏演示文稿的安全设置，文件未来可能甚至无法打开。如果您想保留启用宏的文件副本，我强烈建议从您将用于继续演示文稿创建过程的文件中删除宏。按照以下步骤操作：
- en: On the **Developer** tab, click on **Macros** ( **3** ).
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**开发者**选项卡上，点击**宏**（**3**）。
- en: In the **Macro** window, select the macro ( **4** ), click on the **Delete**
    button ( **5** ), and confirm you want to delete it.
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**宏**窗口中，选择宏（**4**），点击**删除**按钮（**5**），并确认您想要删除它。
- en: Go to **File** | **Save as** or use the **Save as** button in ( **2** ). Use
    the filename you want and make sure you are using the `.pptx` file format. PowerPoint
    will warn you that VBA cannot be saved in macro-free presentations. Click on the
    **Yes** button to continue.
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往**文件** | **另存为**或使用（**2**）中的**另存为**按钮。使用您想要的文件名，并确保您正在使用`.pptx`文件格式。PowerPoint会警告您VBA无法保存到无宏演示文稿中。点击**是**按钮继续。
- en: Close your file and re-open it so you see that **AutoSave** is back on.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关闭您的文件并重新打开它，以便您看到**自动保存**已恢复。
- en: With the previous example, my goal was to help you understand that any repetitive
    cleaning task has the potential to be accomplished with VBA if you leverage Copilot’s
    knowledge to create the lines of code for you. So, until Copilot can do it on
    its own, you have a tool to avoid a lot of manual clean-up work.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的示例中，我的目标是帮助您理解，如果您利用Copilot的知识为您创建代码行，任何重复性的清洁任务都有可能通过VBA完成。所以，直到Copilot能够独立完成，您就有了一个工具来避免大量的手动清理工作。
- en: Summary
  id: totrans-231
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we learned about tasks Copilot can accomplish and discussed
    the basics of good prompts. We also learned how to create a new presentation with
    the help of Copilot, how to summarize a presentation, and which tasks it can understand
    to modify the contents of a file.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们学习了 Copilot 可以完成的任务，并讨论了良好提示的基础知识。我们还学习了如何借助 Copilot 创建新的演示文稿，如何总结演示文稿，以及它可以理解哪些任务来修改文件内容。
- en: As much as I love my Copilot assistant in many other applications in my M365
    environment, I do think it is still a work-in-progress within PowerPoint. I encourage
    you to try it and test its limits, always keeping in mind that a Copilot-created
    presentation is far from ready for delivery. Make sure you always review the visuals
    with the best practices that should be applied to impactful presentations.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我非常喜欢在我的 M365 环境中的许多其他应用程序中使用我的 Copilot 助手，但我确实认为它仍然在 PowerPoint 中处于开发中。我鼓励您尝试它并测试其极限，同时始终牢记，Copilot
    创建的演示文稿远未准备好交付。请确保您始终使用适用于有影响力的演示的最佳实践来审查视觉效果。
- en: In the next chapter, you will be learning about using other AI tools available
    in PowerPoint that are included with your regular M365 license to help you improve
    your visuals. By creating image layouts, visual lists, and timelines, or creating
    presentations without a tem plate, you will see how the designer can become your
    next best friend.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，您将学习如何使用 PowerPoint 中包含的、与您的常规 M365 许可证一起提供的其他 AI 工具来提高您的视觉效果。通过创建图像布局、视觉列表和时间线，或者创建无模板的演示文稿，您将看到设计师如何成为您下一个最好的朋友。
