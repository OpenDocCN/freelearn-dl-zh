- en: 'Part 3: Building and Enhancing ChatGPT-Powered Applications'
  id: totrans-263
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分：构建和增强ChatGPT应用
- en: In this part, we will explore **Retrieval-Augmented Generation** (**RAG**) systems,
    demonstrating how to use vector stores as a knowledge base. Then, we will bring
    together all the concepts covered so far to build and enhance ChatGPT-powered
    applications. You’ll work on your own practical project to create a chatbot that
    can handle complex tasks and provide personalized interactions. Finally, we will
    look into the future of conversational AI and **large language models** (**LLMs**),
    discussing the challenges of taking ChatGPT applications to production and examining
    alternative technologies and emerging trends in the field.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在本部分，我们将探索**检索增强生成**（**RAG**）系统，展示如何使用向量存储作为知识库。然后，我们将结合到目前为止所涵盖的所有概念，构建和增强ChatGPT应用。你将进行自己的实际项目，创建一个能够处理复杂任务并提供个性化交互的聊天机器人。最后，我们将探讨对话式AI和**大型语言模型**（**LLMs**）的未来，讨论将ChatGPT应用推向生产的挑战，并考察该领域的替代技术和新兴趋势。
