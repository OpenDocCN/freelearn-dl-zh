  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您阅读了《GitHub Copilot手册》，我们很乐意听到您的想法！请[点击此处直接访问此书的亚马逊评论页面](https://packt.link/r/1806116634)并分享您的反馈。
- en: Your review is important to us and the tech community and will help us make
