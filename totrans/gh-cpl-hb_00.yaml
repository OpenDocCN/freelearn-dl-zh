- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Welcome to your learning journey using GitHub Copilot for coding-related
    engineering tasks. We are excited to show you around its toolset and how it extends
    our normal workflows.**'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: '**GitHub Copilot is having a profound impact on the tech industry, from helping
    engineers implement code changes faster to helping stakeholders and product owners
    describe their requirements more easily. It does not matter how much experience
    you have with coding – GitHub Copilot provides help to everyone, supporting all
    phases of the software development lifecycle. That makes it easier to generate
    code changes, add tests to it, and write the deployment pipelines. Want to discover
    more about coding practices? GitHub Copilot is your peer programming helper that
    can explain it all to you.**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '**Leveraging the foundation language models such as GPT-5, Gemini, Claude Sonnet,
    and more, GitHub has added specific features in lots of smart places in your favorite
    editors, including VS Code, Eclipse, Visual Studio, JetBrains IDEs, and more.
    Next to that, there is a realm of additional support on GitHub.com, where the
    engineering process happens: from general research to issue creation, to adding
    code, making a pull request, and helping with debugging your pipeline issues.
    GitHub Copilot has integrations with all these steps into the developer workflow.**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '**Join us to learn all about GitHub Copilot, as we guide you through the learning
    curve that the authors have used to train thousands of engineers over the last
    few years.**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Who this book is for
  id: totrans-5
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This book is for anyone who works with application creation and who wants to
    harness GitHub Copilot in real-world coding environments. Whether you’re a beginner
    looking to speed up learning or a seasoned engineer aiming to boost productivity,
    this guide shows how to put Copilot to work effectively.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Software engineers, DevOps professionals, QA specialists, and tech leads will
    discover how to streamline coding, reviews, and delivery with AI-assisted workflows.
    Product managers and other collaborators will also gain insight into how, with
    GitHub Copilot, they themselves can leverage AI.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: What this book covers
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '[*Chapter 1*](Chapter_1.xhtml#_idTextAnchor007) , *GitHub Copilot Explained*
    , provides an overview of GitHub Copilot and its features, from suggestions to
    the Chat interface, and shows how they impact our day-to-day engineering process.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor022) , *Getting Started with Generative
    AI* , offers a foundation for understanding what generative AI is and what it
    is not – from the basics of language models to how these features are applied
    to the engineering process.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 3*](Chapter_3.xhtml#_idTextAnchor041) , *Choosing the Right GitHub
    Copilot* *Plan* , outlines the different subscription options you have for GitHub
    Copilot and why you would choose one over the other.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 4*](Chapter_4.xhtml#_idTextAnchor100) , *Mastering GitHub Copilot
    in Your IDE: Inline Suggestions, Chat, and Agent Mode* , dives into the features
    of GitHub Copilot in your favorite editor.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 5*](Chapter_5.xhtml#_idTextAnchor144) , *Beyond Code: Debugging,
    Terminal, and Collaboration with GitHub Copilot* , covers the next steps after
    learning about the main features of the tools and shows you the smart integrations
    into the rest of the development process.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 6*](Chapter_6.xhtml#_idTextAnchor191) , *Collaborating with GitHub
    Copilot on GitHub.com: Issues, PRs, Reviews, and Coding Agent* , teaches you about
    the powerful features built into the web interface on GitHub.com, such as collaboration
    on issues and pull requests, as well as triggering the coding agent to let GitHub
    Copilot create the code changes needed to implement the requested functional updates.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 7*](Chapter_7.xhtml#_idTextAnchor230) , *Extending GitHub Copilot
    with the Model Context Protocol (MCP)* , shows how the MCP servers add extra context
    to your Chat interface in agent mode, so that you can read and write into external
    systems.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 8*](Chapter_8.xhtml#_idTextAnchor254) , *Navigating the GitHub Copilot
    Learning Curve* , talks about the learning curve that GitHub Copilot has, as this
    is more than just a new tool for your toolbelt. We show how to address the learning
    curve so that you and your team members can get the most out of GitHub Copilot.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 9*](Chapter_9.xhtml#_idTextAnchor277) , *Building an Internal GitHub
    Copilot Community* , explains how we humans learn the best from seeing other people
    work with the tools we have, and how you can build an internal community around
    GitHub Copilot to continuously educate yourself and unlock the next level of proficiency.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 10*](Chapter_10.xhtml#_idTextAnchor294) , *Changing the Narrative:
    Reframing Engineering with AI* , discusses using AI in your engineering processes
    as a complete rewire of our own muscle memory, and how to approach this new way
    of thinking about getting the most benefit out of GitHub Copilot.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: To get the most out of this book
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'You need the following for this book:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: A basic understanding of the software development life cycle
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some experience using coding editors to work with your code base
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Usage of GitHub.com with issues and pull request processes
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conventions used
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are a number of text conventions used throughout this book.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '`CodeInText` : Indicates code words in text, database table names, folder names,
    filenames, file extensions, pathnames, dummy URLs, user input, and X/Twitter handles.
    For example: “You can use `/explain #symbol` to ask for an explanation of only
    the function or symbol under your cursor, not the entire file.”'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 'A block of code is set as follows:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Bold** : Indicates a new term, an important word, or words that you see on
    the screen. For instance, words in menus or dialog boxes appear in the text like
    this. For example: “Under **Permissions** , click **Add permissions** , then select
    **Copilot Requests** .”'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Warnings or important notes appear like this.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Tips and tricks appear like this.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Get in touch
  id: totrans-32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Feedback from our readers is always welcome.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '**General feedback** : If you have questions about any aspect of this book
    or have any general feedback, please email us at [customercare@packt.com](https://www.packtpub.com/en-us/help/contact)
    and mention the book’s title in the subject of your message.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '**Errata** : Although we have taken every care to ensure the accuracy of our
    content, mistakes do happen. If you have found a mistake in this book, we would
    be grateful if you reported this to us. Please visit [http://www.packt.com/submit-errata](http://www.packt.com/submit-errata)
    , click **Submit Errata** , and fill in the form.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '**Piracy** : If you come across any illegal copies of our works in any form
    on the internet, we would be grateful if you would provide us with the location
    address or website name. Please contact us at `copyright@packt.com` with a link
    to the material.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '**If you are interested in becoming an author** : If there is a topic that
    you have expertise in and you are interested in either writing or contributing
    to a book, please visit [http://authors.packt.com/](http://authors.packt.com/)
    .'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Share your thoughts
  id: totrans-38
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Once you’ve read *The GitHub Copilot Handbook* , we’d love to hear your thoughts!
    Please [click here to go straight to the Amazon review page](https://packt.link/r/1806116634)
    for this book and share your feedback.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Your review is important to us and the tech community and will help us make
    sure we’re delivering excellent quality content.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
