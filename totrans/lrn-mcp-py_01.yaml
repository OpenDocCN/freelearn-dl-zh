  zh: '1'
- en: Introduction to the Model Context Protocol
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模型上下文协议简介
- en: Generative AI has rapidly become a force in today’s technological landscape,
    reshaping industries and redefining how we approach problem-solving. From natural
    language processing to image generation, the integration of generative AI into
    various domains has opened up new possibilities for innovation and efficiency.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI迅速成为当今技术景观中的一股力量，重塑行业并重新定义我们解决问题的方法。从自然语言处理到图像生成，生成式AI在各个领域的集成为创新和效率开辟了新的可能性。
- en: For us developers, integrating generative AI into app development workflows
    is not without its complexities. We must carefully evaluate factors such as model
    accuracy, ethical considerations, and computational efficiency.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们开发者来说，将生成式AI集成到应用程序开发工作流程中并非没有复杂性。我们必须仔细评估模型准确性、伦理考虑和计算效率等因素。
- en: It’s in the process of building applications that we need to consider how we
    standardize the way we build our AI applications. Standardization means that everything
    looks the same, which should mean easier integration and collaboration across
    different teams and tools.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建应用程序的过程中，我们需要考虑如何标准化我们构建AI应用程序的方式。标准化意味着一切看起来都一样，这意味着跨不同团队和工具的集成和协作应该更加容易。
- en: This is where the **Model Context Protocol** (**MCP**) comes in, to standardize
    how we ensure that AI-powered applications can easily find what they need from
    tools, content, and prompts; more on that shortly.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 正是**模型上下文协议**（**MCP**）在这里发挥作用，以标准化我们确保AI应用程序能够轻松从工具、内容和提示中找到所需内容的方式；更多内容将在稍后介绍。
