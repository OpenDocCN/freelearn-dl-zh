  prefs: []
  type: TYPE_NORMAL
- en: Benefits of using procedural memory
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'We’ve come a long way, progressing from basic RAG to its most advanced application:
    autonomous agents that can use retrieval as their data plane and procedural memory
    as the engine for not just improvement, but full recognition of user patterns
    that can automatically accelerate your effort to fulfill whatever goals you have
    as an organization and for your users. In other words, whatever you are trying
    to achieve as an organization, whatever your goals are, you can use this agent
    to help accelerate this effort in shockingly effective ways.'
  prefs: []
  type: TYPE_NORMAL
- en: The applications of this approach are far-reaching. Once your agent reaches
    this level of autonomy, it can scale far faster than a purely human-in-the-loop
    system. It becomes a proprietary advantage over competitors (or a disadvantage
    if they get there first), because your agent will develop strategies to serve
    users more quickly and effectively than an entire team of marketers, product managers,
    and engineers. Most importantly, this capability is not magic; it is the natural
    outcome of building and using RAG in its most advanced form, where retrieval powers
    understanding and procedural memory transforms that understanding into continuous
    behavioral refinement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Procedural memory enables agents to tailor their behavior at precisely the
    right level, whether for individual users, teams, tasks/intents, or entire organizations,
    through hierarchical namespace organization. The system captures rich contextual
    signals, including success indicators, satisfaction scores, and behavioral patterns,
    then segments these into meaningful groups to discover what works for each group.
    This deep understanding reveals not just what users ask for, but what actually
    drives their satisfaction and success. This segmentation approach naturally accommodates
    both common patterns and unusual scenarios. By maintaining separate learning tracks
    for edge cases while preserving common flows, agents can handle exceptional situations
    without degrading typical user experiences. The result is an agent that truly
    knows its users: their preferences, their pain points, and most importantly, the
    specific approaches that work best for each segment.'
  prefs: []
  type: TYPE_NORMAL
- en: Through continuous analysis of conversation trajectories, procedural memory
    learns to produce more accurate, relevant responses while reducing hallucinations
    and dead ends. The system’s retrieval reformulation capabilities optimize query
    patterns and similarity thresholds based on what actually returns useful results,
    while failure-aware adjustments preemptively shift strategies when standard approaches
    are likely to fail. Templates for clarification, sequencing, and escalation keep
    conversations structured and productive. LangMem provides several algorithms for
    extracting and optimizing these patterns, with different approaches suited to
    different complexity levels. For this chapter’s implementation, we’ll use the
    `prompt_memory` algorithm, which provides efficient learning with minimal computational
    overhead. The comprehensive safety features, including A/B testing, gradual rollouts,
    and instant rollback, ensure that improvements are validated before full deployment,
    preventing regressions from reaching users.
  prefs: []
  type: TYPE_NORMAL
- en: Procedural memory automates the traditionally manual process of prompt maintenance
    and optimization across entire agent fleets. Pattern-to-rule transformation eliminates
    the need for developers to hand-craft prompt updates, while storage-agnostic APIs
    and LangGraph-native integration ensure seamless deployment at scale. The system
    accelerates onboarding through rule templates for common patterns, enabling new
    agents to immediately benefit from organizational learning. Continuous improvement
    happens without expensive retraining cycles as the core feedback loop automatically
    triggers optimizations based on conversation outcomes. This automation extends
    beyond simple logging to sophisticated trajectory clustering, cross-reference
    analysis between memory types, and temporal pattern detection that reveals how
    effectiveness changes over time.
  prefs: []
  type: TYPE_NORMAL
- en: By learning optimal retrieval strategies and conversation flows, procedural
    memory dramatically reduces both computational costs and time-to-resolution. The
    learning algorithms can optimize behavior efficiently, while learned diagnostic
    patterns eliminate wasteful regenerations and re-asks. Tuned retrieval thresholds
    prevent unnecessary document processing, and rule-driven flows streamline common
    interactions. The system’s significance testing and temporal stability checks
    ensure that optimization efforts focus on changes that deliver measurable impact.
    Perhaps most importantly, the reduction in maintenance overhead through automated
    updates, version control, and vendor-agnostic storage frees engineering resources
    for higher-value work while ensuring that every interaction makes the system more
    efficient.
  prefs: []
  type: TYPE_NORMAL
- en: These benefits aren’t theoretical but emerge naturally when you implement procedural
    memory in your own systems. In *Code Lab 18.1*, we’ll build a complete investment
    advisor agent that demonstrates these capabilities in action. Starting from the
    memory-enabled agent we created in [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422),
    you’ll add hierarchical procedural learning that captures successful patterns
    from conversations and applies them at the appropriate scope. Through hands-on
    implementation, you’ll see firsthand how an agent evolves from generic responses
    to sophisticated, personalized advice that continuously improves with each interaction.
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 18.1 – implementing procedural memory optimization
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In this lab,you’ll build a procedural memory system that enables any agent
    to learn and adapt its behavior at multiple hierarchical levels for a specific
    domain, but with the flexibility to apply it to any domain. This lab starts with
    the memory-enabled agent from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422),
    but we’ve consolidated it for you into the separate `baseline_agent.py` for convenience.
    The core of this chapter’s functionality lives in `procedural_memory.py`, a pre-built
    module that implements hierarchical learning, retrieval, and adaptation. Rather
    than constructing this system line by line, this lab takes a guided demonstration
    approach: you’ll run the code, observe how procedural memory operates at each
    scope level, and understand the architectural decisions that make it work. This
    approach lets you focus on grasping the concepts and seeing the system in action,
    rather than typing out infrastructure code. We’ll demonstrate how to create a
    modular system where the core learning mechanisms are completely separated from
    domain-specific logic, allowing you to easily create agents for any domain, such
    as investment advisory, healthcare, education, or customer service, simply by
    implementing a domain interface. We focus on investment advisors in this code
    lab, but at the end, we talk about how to convert this to your domain, whatever
    it is.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This implementation showcases two key architectural insights:'
  prefs: []
  type: TYPE_NORMAL
- en: '**First, separation of concerns**: The procedural memory system itself is domain-agnostic,
    working with any domain that implements the `DomainAgent` interface. All domain-specific
    logic prompts, community definitions, and success metrics live in isolated domain
    directories (such as `domain_investment/` or `domain_educator/`), making it trivial
    to add new domains without modifying the core system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Second, hierarchical learning**: Not all patterns should be learned globally.
    The system automatically determines the appropriate scope for each learned pattern:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User-level**: Capture individual preferences and personalized approaches'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Community-level (group)**: Learn patterns that work for user segments sharing
    common characteristics'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Task-level (intents, groups of actions, similar grouped concepts)**: Develop
    specialized approaches for specific types of requests'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Global-level**: Extract universal best practices that apply across all users'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The procedural memory system allows agents to learn from their own successes
    and failures. After each conversation, the agent extracts what worked (or didn’t
    work) and stores these insights as concrete strategies. These learned strategies
    are stored as readable instructions that the agent can retrieve and follow in
    similar future situations. You can inspect, edit, or remove any learned strategy,
    giving you full control over how the agent evolves. Each strategy maintains its
    own success metrics and can be independently evaluated, updated, or rolled back.
  prefs: []
  type: TYPE_NORMAL
- en: 'This modular approach enables rapid domain-specific deployment. Here are some
    potential examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Healthcare**: In medical settings, the procedural memory system learns from
    patient interactions to discover optimal care patterns. It might identify that
    elderly patients have better outcomes with morning appointments, that certain
    explanation styles improve medication adherence for diabetic patients, or that
    specific follow-up sequences reduce readmission rates. The system automatically
    segments patients by relevant characteristics (age groups, conditions, treatment
    responses) and learns what works best for each segment while maintaining safety
    compliance standards.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer service**: For support operations, the system analyzes ticket resolutions
    to uncover patterns that improve customer satisfaction and reduce escalations.
    It learns that offering refunds early in certain situations prevents escalations,
    that enterprise customers respond better to technical deep-dives while individual
    users prefer step-by-step guidance, or that specific troubleshooting sequences
    resolve issues faster. The procedural memory automatically categorizes tickets
    and customer segments to apply the most effective resolution strategies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Education**: In educational contexts, the system observes tutoring sessions
    to identify which teaching techniques work for different learners. It discovers
    that visual learners benefit from diagram-based explanations, that certain pacing
    strategies improve comprehension for struggling students, or that specific practice
    sequences enhance retention. The system naturally groups students by learning
    styles and academic needs, continuously refining its approach based on comprehension
    metrics and learning outcomes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For this lab’s implementation, we’ll use an investment advisor as our example
    domain, demonstrating how to implement the `DomainAgent` interface. The entire
    investment domain lives in `domain_investment/`, showing how cleanly separated
    domain logic can be. The agent will learn what works globally, individually, task-wise,
    or group-wise, all while using the exact same procedural memory system that could
    power a healthcare or education agent.
  prefs: []
  type: TYPE_NORMAL
- en: 'Throughout this lab, you’ll see how the following happens:'
  prefs: []
  type: TYPE_NORMAL
- en: The baseline agent from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422)
    provides episodic and semantic memory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We add a domain-agnostic procedural memory system that works with any domain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We implement the investment advisor domain as a clean, isolated module
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The agent learns from interactions at the appropriate hierarchical level
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The same architecture could be used for any other domain simply by implementing
    the interface
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The result is a modular, extensible system where domain experts can create specialized
    agents without touching the core learning infrastructure, demonstrating how proper
    architectural separation enables both powerful learning capabilities and practical
    maintainability.
  prefs: []
  type: TYPE_NORMAL
- en: Step 1 – setting up the foundation with imports and a baseline agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We begin by importing all the necessary libraries and modules that will power
    our hierarchical procedural memory implementation. Understanding these imports
    helps clarify the architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Most of this code is focused on importing the libraries we need for the rest
    of the code lab. Here’s what we’re importing:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Core Python libraries**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**os, sys, json**: Handle environment variables, paths, and parse JSON responses
    from the LLM’s learning extractions'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**typing (Dict, List, Optional)**: Provide type hints for better code clarity
    and IDE support'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data modeling**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**pydantic (BaseModel, Field)**: Define structured data models for our learned
    procedures, ensuring type safety and validation'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Our modular agent system**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CoALABaselineAgent**: The foundation agent from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422)’s
    code labs, now consolidated into a single file (`baseline_agent.py`) that combines
    the episodic and semantic memory implementations'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DomainProcedure from domain_agent**: The generic procedure structure that
    any domain can use'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DomainAgent abstract base class**: Defines the interface that all domain-specific
    agents must implement'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ProceduralMemory**: The domain-agnostic procedural memory system that works
    with any domain agent'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Domain-specific implementation**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**InvestmentAdvisorAgent**: Our example domain implementation, demonstrating
    how to create a domain-specific agent'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**EnhancedInvestmentAdvisorDataGenerator**: Generates realistic investment
    advisor conversations for testing'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Investment test scenarios and utilities**: Helper functions for demonstrating
    the hierarchical learning'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The key architectural insight here is the separation of concerns. The core
    procedural memory system (`ProceduralMemory`) is completely domain-agnostic. It
    works with any domain that implements the `DomainAgent` interface. All investment-specific
    logic lives in the `domain_investment` directory, making it trivial to create
    new domains (such as `domain_educator` or `domain_healthcare`) by implementing
    the same interface. `CoALABaselineAgent` represents the culmination of [*Chapter
    17*](B34736_17_ePub.xhtml#_idTextAnchor422)’s work; it includes both episodic
    memory (storing conversation histories) and semantic memory (extracting and storing
    facts), consolidated from the separate implementations in *Code labs 17.1, 17.2,
    and 17.3* into a single, clean module. However, this baseline agent cannot learn
    from successful interactions or improve its patterns over time. This limitation
    is universal across domains:'
  prefs: []
  type: TYPE_NORMAL
- en: A healthcare assistant might remember a patient’s medical history, but won’t
    learn that morning appointments work better for elderly patients
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A customer service bot might recall previous tickets, but won’t discover that
    offering refunds early reduces escalation rates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An educational tutor might track what topics were covered, but won’t learn that
    certain students respond better to visual explanations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For our implementation example, we’re using an investment advisor that will
    demonstrate these learning capabilities. The baseline agent responds to investment
    queries using its base knowledge, but won’t adapt based on what approaches work
    best for different client types or market conditions. The key innovation we’re
    adding is procedural memory through LangMem’s approach. LangMem automates what
    traditionally required manual intervention: observing agent behaviors, identifying
    patterns in successes and failures, and updating prompts to incorporate learned
    procedures. We provide some test code to see where we stand at this point, where
    we ask the agent: “I’m looking to rebalance my portfolio. I’m 35 and have moderate
    risk tolerance.”'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s the expected output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'The baseline response shows the limitation: while the agent provides reasonable
    advice based on the user’s age and risk tolerance, it lacks the ability to learn
    patterns such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: This particular user might prefer ETFs over mutual funds based on past interactions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Similar 35-year-old moderate-risk clients have had better success with a 60/40
    allocation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rebalancing discussions are more successful when tax implications are addressed
    upfront
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The memory stats confirm that the agent has stored some documents (from this
    test message) in its episodic/semantic memory, but no procedural patterns are
    available yet. This is precisely where hierarchical procedural memory will transform
    the agent’s capabilities, allowing it to learn not just what works, but what works
    for whom.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have our baseline running with the episodic and semantic memory
    from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422), let’s define the domain-agnostic
    procedure structure that will enable learning at multiple scopes across any domain.
  prefs: []
  type: TYPE_NORMAL
- en: Step 2 – define procedure structure for hierarchical learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’ll create a domain-agnostic data structure that captures learned procedures
    at multiple scopes, embodying LangMem’s comprehensive data collection capabilities.
    This structure will store success indicators, behavioral patterns, and adaptation
    history that enable sophisticated pattern analysis beyond surface-level metrics,
    while remaining flexible enough to work with any domain.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'This structure demonstrates the power of domain-agnostic design while maintaining
    LangMem’s data collection capabilities. Let’s break the code down:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Core pattern tracking (universal across domains)**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`strategy_pattern`: Identifies the type of situation this procedure addresses
    – completely domain-neutral (e.g., “moderate risk portfolio rebalancing” for investments,
    “password reset troubleshooting” for customer service, “visual learning approach”
    for education)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`steps`: The concrete sequence of actions that have proven successful, expressed
    as simple strings that any domain can populate'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`segments`: Generic tags indicating which user groups benefit from this procedure
    – not tied to any specific domain terminology'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Performance metrics (domain-independent)**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`success_rate`: Tracks correlation between using this procedure and positive
    outcomes – universal metric'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`usage_count`: Enables temporal pattern detection to see if effectiveness changes
    over time'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`domain_metrics`: A flexible dictionary where each domain stores its specific
    metrics – investments might track `avg_portfolio_performance`, education might
    track `comprehension_score`, healthcare might track `treatment_adherence`'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hierarchical learning scopes (works for any domain)**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`scope`: Indicates the hierarchical level at which this procedure should be
    applied: “user” for individual personalization, “community” for user segment patterns,
    “task” for request-type specialization, or “global” for universal best practices
    – a concept that applies uniformly across all domains'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`scope_id`: Identifies the specific user or community when the scope is not
    global'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`priority`: Determines which procedure to use when multiple match (more specific
    scopes have higher priority)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evolution tracking (critical for all domains)**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`adaptations`: Maintains complete version history, enabling rollback if new
    strategies underperform'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`learned_from_count`: Tracks how many conversation examples contributed to
    this procedure'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The benefit of this structure is its flexibility through the `domain_metrics`
    dictionary. Each domain can store whatever metrics matter to it without changing
    the core structure. An investment advisor tracks portfolio performance, a healthcare
    agent tracks patient outcomes, and an educator tracks learning progress – all
    using the same `DomainProcedure` class. In [*Chapter 19*](B34736_19_ePub.xhtml#_idTextAnchor464),
    in the *Designing domain metrics: the art of measuring success* section, we will
    discuss how to approach metrics with one goal, many goals, some in between, and
    the implications for these different strategies.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This structure embodies a critical insight from LangMem: not all patterns should
    be learned globally, regardless of domain. In our investment advisor example,
    a retiree needs different strategies than a young professional. In healthcare,
    morning appointment preferences might be user-specific or common to all elderly
    patients. In education, visual learning preferences might apply to individual
    students or entire learning style segments. The structure handles all these cases
    uniformly.'
  prefs: []
  type: TYPE_NORMAL
- en: The `adaptations` field is particularly important for production safety across
    all domains. As LangMem notes, this version history enables rollback if new rules
    degrade performance. Each adaptation entry tracks what changed, when it changed,
    and what performance metrics justified the change. This creates an audit trail
    that makes procedural learning transparent and reversible, whether you’re tracking
    investment returns, patient health outcomes, or student test scores. We will talk
    more about how to roll things back after the code lab.
  prefs: []
  type: TYPE_NORMAL
- en: 'To see this structure in action, let’s create a sample procedure that demonstrates
    how all these fields work together. The following code creates a concrete example
    of a rebalancing strategy learned from successful interactions with moderate-risk
    millennial investors, complete with specific steps, success metrics, and domain-specific
    performance tracking:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s the expected output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This sample procedure demonstrates how the generic structure captures a complete
    learned strategy for our investment domain. The five-step rebalancing procedure
    represents a pattern extracted from successful conversations with moderate-risk
    millennials. The domain-specific metrics (stored in `domain_metrics`) show 8.5%
    average portfolio performance and a 90-day rebalancing frequency – metrics specific
    to investment advisory but stored in the domain-agnostic structure.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how the `segments` field uses generic terms such as `millennials` and
    `moderate_risk` rather than domain-specific terminology such as `client_segments`.
    This allows the same structure to work whether segments represent investor profiles,
    patient demographics, or student learning styles. The `scope` fields prepare us
    for the multi-level learning we’ll implement next, which will work identically
    regardless of domain.
  prefs: []
  type: TYPE_NORMAL
- en: With our domain-agnostic procedure structure defined to support LangMem’s data
    collection and versioning capabilities, we need to initialize the procedural memory
    system that will use these structures. Next, we’ll create the procedural memory
    system that works with any domain agent, demonstrating how the separation of concerns
    enables both flexibility and power.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3 – initialize hierarchical procedural memory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’ll create the core learning engine that automates the extraction of successful
    patterns from conversations. This system demonstrates how LangMem creates a feedback
    loop where every interaction potentially improves future performance, while maintaining
    complete separation between the domain-agnostic learning mechanism and domain-specific
    logic.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'This initialization demonstrates the clean separation of concerns in our architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Domain agent encapsulation**: `InvestmentAdvisorAgent` encapsulates all investment-specific
    logic – prompts, community definitions, success metrics – in the `domain_investment`
    directory. This domain agent implements the `DomainAgent` interface, providing
    the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning prompts for different scopes (global, user, community, task)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Community definitions (conservative retirees, aggressive millennials, moderate
    professionals)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Task identification logic (rebalancing, tax planning, risk assessment)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Success scoring calculations specific to investment outcomes
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Domain-specific metric updates (portfolio performance, rebalancing frequency)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Procedural memory system**: The `ProceduralMemory` class is completely domain-agnostic.
    It receives a domain agent and uses it to do the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create learning prompts from the domain’s templates
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Identify task types using the domain’s categorization
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculate success scores using the domain’s metrics
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Update domain-specific metrics after performance feedback
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This separation means the same `ProceduralMemory` class works with any domain.
    To create a healthcare agent, you’d simply pass a `HealthcareAgent` instance –
    for education, `EducatorAgent`. The procedural memory system doesn’t change; only
    the domain agent implementation differs.
  prefs: []
  type: TYPE_NORMAL
- en: '**Hierarchical storage structure**: The system maintains separate storage for
    each learning scope, with retrieval prioritizing the most specific applicable
    knowledge (user → community → task → global):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**user_procedures**: Individual user preferences and personalized strategies
    (highest priority)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**community_procedures**: Patterns for user segments (defined by the domain)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**task_procedures**: Specialized approaches for different query types'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**global_procedures**: Universal patterns that work across all users (lowest
    priority, but always available as a fallback)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Learning history tracking**: Separate history tracking for each scope enables
    what LangMem calls “trajectory analysis”:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`user_learning_history`: Records user-specific adaptations'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`community_learning_history`: Monitors segment-level learning and tracks discovered
    segments dynamically as they emerge from data'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`task_learning_history`: Captures the evolution of task-specific strategies
    and their effectiveness across different query types'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`global_learning_history`: Tracks all universal pattern discoveries'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The initialization confirms our procedural memory system is ready with four
    hierarchical scopes, but no learned strategies yet. This empty state represents
    our starting point, which is an agent with the capability to learn but no accumulated
    knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s verify this initialization by printing out the system’s status and examining
    its empty but ready-to-learn state. The following code confirms the domain agent
    is properly connected and displays the initial statistics across all four hierarchical
    scopes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s the expected output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The output confirms successful initialization of the domain-agnostic procedural
    memory system. The system recognizes it’s working with an `InvestmentAdvisorAgent`,
    but would work identically with any other domain agent. The four storage scopes
    are ready to capture patterns at different levels of specificity, and the learning
    history tracking is prepared to maintain an audit trail of all learned strategies.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key insight here is that all the investment-specific logic lives in the
    domain agent, while the procedural memory system remains pure and reusable. The
    domain agent provides the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning prompts**: Templates that extract patterns in the domain’s language'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Community definitions**: How to segment users in this domain'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Task types**: Categories of queries specific to this domain'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Success metrics**: How to measure success in this domain'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Domain metrics**: What additional measurements matter'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The procedural memory system uses these domain-specific elements through a clean
    interface, never directly depending on investment concepts. This architecture
    embodies LangMem’s principle of “hierarchical namespace organization” while maintaining
    modularity.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have the learning engine initialized with our domain agent, we need
    to demonstrate how it learns from actual interactions. Next, we’ll show how the
    system extracts patterns from conversations and stores them at the appropriate
    hierarchical level, transforming raw interactions into actionable strategies.
  prefs: []
  type: TYPE_NORMAL
- en: Step 4 – demonstrate learning from interactions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the following code block, we will demonstrate how the procedural memory system
    learns from actual conversations, extracting patterns at multiple hierarchical
    levels. This shows how LangMem’s approach transforms raw interactions into actionable
    strategies that the agent can apply in future conversations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'This demonstration shows the procedural memory system in action, learning from
    just two successful interactions. The system demonstrates several key LangMem
    capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Multi-scope learning from single interactions**: Each conversation potentially
    generates learning at multiple levels. From a single rebalancing query, the system
    might do the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Extract a global pattern about how to handle rebalancing requests
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn a user-specific preference for `user_001`
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Identify a community pattern for moderate-risk investors
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Develop a task-specific approach for rebalancing queries
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This multi-scope extraction embodies LangMem’s principle that different patterns
    are valuable at different levels of specificity.
  prefs: []
  type: TYPE_NORMAL
- en: '**Domain-agnostic learning process**: Notice how the learning process itself
    is completely domain-agnostic. The `learn_from_interaction` method does the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Receives a query and interaction data (universal concepts)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Delegates to the domain agent to identify task types and communities
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses domain-provided prompts to extract patterns
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Stores procedures in the hierarchical structure
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The same method would work identically for a healthcare agent learning from
    patient interactions or an education agent learning from tutoring sessions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Automatic scope determination**: The system automatically determines which
    scopes are appropriate for each interaction:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If `user_id` is provided, it attempts user-level learning
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If the user belongs to a community, it learns community patterns
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If the query matches a task type, it develops task-specific strategies
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Global patterns are always considered for universal insights
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This automatic scoping ensures patterns are learned at the most appropriate
    level without manual intervention.
  prefs: []
  type: TYPE_NORMAL
- en: '**Error resilience**: The learning process is designed for production robustness.
    If learning fails at one scope (perhaps due to LLM parsing errors), it continues
    learning at other scopes. This resilience ensures that valuable patterns aren’t
    lost due to isolated failures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here, we run some tests to see our output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s the expected output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'The output shows successful multi-scope learning from just two interactions.
    The system has learned eight strategies distributed across all four scopes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Two global strategies**: Universal patterns that work for any user'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Two user strategies**: Personalized approaches for specific users'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Two community strategies**: Patterns for the user segments identified'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Two task strategies**: Specialized procedures for the query types'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This balanced distribution demonstrates how the system extracts different types
    of value from the same interactions. The global strategies might capture general
    best practices such as “always provide specific rebalancing steps,” while user
    strategies remember that “`user_001` prefers detailed explanations.” Community
    strategies could note that “moderate-risk investors want balanced approaches,”
    and task strategies might specify that “ESG queries should include sustainability
    metrics.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the key insights from this learning:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Efficiency**: From just two conversations, the system extracted eight different
    strategies, thus maximizing learning from minimal data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Specificity**: Each strategy is stored at the appropriate scope, preventing
    overgeneralization'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Completeness**: The system captures patterns that might be missed by single-scope
    learning'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Modularity**: The entire learning process uses the domain agent interface,
    making it trivial to swap domains'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The learned strategies are now ready to be retrieved and applied to new conversations.
    When a similar query comes in, the system will search through these hierarchical
    scopes to find the most specific applicable strategy.
  prefs: []
  type: TYPE_NORMAL
- en: With strategies learned and stored at multiple scopes, we need mechanisms to
    retrieve the right strategy for each situation and update it based on real-world
    performance. Next, we’ll implement hierarchical retrieval and performance feedback
    systems that enable continuous improvement through actual usage.
  prefs: []
  type: TYPE_NORMAL
- en: Step 5 – add strategy retrieval and performance feedback
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retrieval, the “R” in RAG, finds a whole new level of functionality with this
    approach. The retrieval itself becomes dynamic and hierarchical, automatically
    selecting the most personalized strategy available rather than just finding relevant
    documents. Now we’ll implement the retrieval and feedback mechanisms that make
    procedural memory truly dynamic. These components enable the system to find the
    most appropriate strategy for each situation and continuously improve based on
    real-world performance – the essence of LangMem’s continuous learning approach.
  prefs: []
  type: TYPE_NORMAL
- en: Step 5a – demonstrate hierarchical retrieval
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First, we’ll demonstrate how the system retrieves strategies using hierarchical
    priority, always preferring the most specific applicable knowledge:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'This demonstration showcases LangMem’s hierarchical retrieval in action. The
    system checks scopes in priority order (**user** **→** **community** **→** **task**
    **→** **global**), ensuring the most personalized strategy is used when available.
    Let’s explore the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: The output confirms proper hierarchical retrieval across all four scopes. Each
    query correctly matched its intended level, demonstrating how the system provides
    increasingly specific guidance when available. The hierarchy summary shows we
    have strategies distributed across all scopes, ready to serve different specificity
    needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'This hierarchical retrieval fundamentally transforms how RAG operates. In traditional
    RAG, retrieval would search for documents containing keywords such as “rebalance”
    and return the same investment advice documents regardless of who’s asking. But
    look at what’s happening in our output (**the transformation of retrieval**):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identity-aware retrieval**: When `user_001` asks about rebalancing, the system
    doesn’t just search for “rebalancing documents.” It first checks if `user_001`
    has any personalized strategies learned from their past successful interactions.
    Finding one with 85% confidence, it retrieves that user-specific approach instead
    of generic advice.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Community-based fallback**: For `user_003`, who lacks personal strategies,
    traditional RAG would return the same generic documents. But our system recognizes
    `user_003` belongs to the `moderate_professionals` community and retrieves strategies
    that have worked well for similar users in that segment. This is retrieval based
    on learned group patterns, not document similarity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dynamic strategy selection**: Notice how the same concept (“rebalancing”)
    triggers different retrievals for different users. Here, `user_001` gets their
    personalized approach, `user_004` gets task-specific rebalancing strategies, and
    new users get global best practices. Traditional RAG would return the same documents
    for all these users.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Confidence-based prioritization**: Each retrieved strategy comes with a confidence
    score (85% in these examples) based on its historical performance. This isn’t
    similarity scoring from vector search, but success-rate tracking from actual usage.
    The system knows which strategies actually work, not just which documents contain
    matching keywords.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scope-aware retrieval logic**: The retrieval process itself has become intelligent,
    following the hierarchy **user** **→** **community** **→** **task** **→** **global**.
    This ensures the most specific, relevant strategy is always preferred, with graceful
    degradation to more general approaches when specific ones aren’t available.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In essence, we’ve evolved from “retrieve documents about X” to “retrieve the
    most successful strategy for this specific user asking about X, falling back through
    increasingly general scopes until we find applicable knowledge.” The retrieval
    process has become a decision tree that considers user identity, community membership,
    task type, and historical performance, a far cry from simple semantic similarity
    search.
  prefs: []
  type: TYPE_NORMAL
- en: This priority order ensures users get the most relevant advice possible. In
    healthcare, this might mean a diabetic patient gets their personalized insulin
    protocol over generic diabetes guidelines. In education, a visual learner receives
    their customized approach rather than standard teaching methods.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve demonstrated how the system retrieves strategies using hierarchical
    priority, we need to show how these strategies evolve based on real-world performance.
    The true power of procedural memory isn’t just in storing successful patterns,
    but in continuously refining them based on actual outcomes. Each time a strategy
    is applied, the system tracks its effectiveness and adjusts confidence accordingly.
    This creates a feedback loop where strategies that consistently succeed become
    more trusted, while those that fail are downweighted or eventually removed. Let’s
    implement this critical adaptation mechanism, which transforms static rules into
    dynamic, self-improving knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: Step 5b – demonstrate performance feedback loop
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, we’ll show how strategies adapt based on real-world performance, implementing
    LangMem’s continuous improvement mechanism:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'The `update_from_performance` method in `procedural_memory.py` handles this
    feedback processing. Let’s examine its core logic:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: This method demonstrates several important design decisions. Scope-aware procedure
    lookup ensures updates are applied at the correct hierarchical level by first
    determining which procedure store to search based on the provided scope parameter.
    Rather than requiring exact matches, the method uses case-insensitive substring
    matching for flexibility in finding relevant procedures even when strategy names
    vary slightly. The actual success calculation is delegated to the domain agent
    through `calculate_success_score()`, keeping the procedural memory system domain-agnostic
    while allowing each domain to define what “success” means in its context. Finally,
    the `min(1.0, ...)` cap ensures success rates never exceed 100%, maintaining valid
    probability values even after many positive feedback rounds.
  prefs: []
  type: TYPE_NORMAL
- en: This feedback processing demonstrates LangMem’s multi-source feedback triangulation.
    The domain agent’s `calculate_success_score` method weighs different success factors
    according to domain priorities. For investments, returns matter most (50%), followed
    by satisfaction (30%) and goal achievement (20%). These weights fundamentally
    shape how the agent evolves. If we changed them to prioritize user satisfaction
    (50%), returns (30%), and goal achievement (20%), the agent would develop very
    different strategies. Instead of learning to maximize portfolio performance even
    if clients don’t fully understand the approach, it would learn to prioritize clear
    explanations and client comfort, potentially accepting lower returns for higher
    satisfaction. Over time, this satisfaction-focused agent might develop strategies
    such as “always explain tax implications in simple terms” or “check for understanding
    before proceeding,” while a returns-focused agent would learn strategies such
    as “immediately identify underperforming assets” or “prioritize high-yield opportunities.”
    The same procedural memory system would produce completely different learned behaviors
    based on these success metrics, demonstrating how domain-specific values directly
    influence agent evolution. A healthcare domain might prioritize patient outcomes
    differently, while education might focus on comprehension scores.
  prefs: []
  type: TYPE_NORMAL
- en: 'The momentum-based update (80% old, 20% new) prevents single outliers from
    drastically changing strategies while still allowing adaptation. Notice the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Good performance improves confidence**: Rounds 1-2 with high satisfaction
    and positive returns increase success rate'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Poor performance triggers adjustment**: Round 3’s poor results immediately
    lower the success rate'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recovery is gradual**: Round 4’s moderate success begins recovery, but doesn’t
    immediately restore high confidence'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The adaptation history provides complete auditability – every change is tracked
    with timestamp, reason, and impact. This enables what LangMem calls “safe rollback”
    – if a strategy’s performance degrades persistently, we can revert to previous
    versions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the expected output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: The output shows realistic strategy evolution. Starting at 75% confidence, the
    strategy improves with successful applications, drops sharply after failure, then
    begins recovering. The domain metrics (average portfolio performance) also adapt,
    providing domain-specific tracking alongside universal success rates.
  prefs: []
  type: TYPE_NORMAL
- en: With our feedback mechanism in place and strategies actively adapting based
    on performance, we need a way to inspect and understand the current state of our
    procedural memory. The system has been learning and evolving through multiple
    interactions, but without visibility into its structure, it’s difficult to verify
    that our hierarchical organization is working as intended. Let’s visualize the
    complete memory structure to see how strategies are distributed across scopes,
    which communities have formed, and how performance metrics are tracked. This transparency
    is essential for debugging, monitoring, and building trust in the learning system.
  prefs: []
  type: TYPE_NORMAL
- en: Step 5c – visualize procedural memory structure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now let’s visualize the complete hierarchical structure and see how strategies
    are organized:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: This visualization provides transparency into the learned knowledge structure.
    The performance bars give immediate visual feedback on strategy effectiveness,
    while usage counts show which strategies are actually being applied.
  prefs: []
  type: TYPE_NORMAL
- en: Community membership mapping reveals how users are automatically segmented based
    on their characteristics – a critical feature for providing appropriate group-level
    guidance. The discovered segments show patterns that emerged from the data rather
    than being predefined.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the expected output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'The visualization reveals the complete learning state:'
  prefs: []
  type: TYPE_NORMAL
- en: Global strategies serve as universal fallbacks with varying success rates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User-specific strategies provide personalization for active users
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Community strategies capture segment patterns with membership tracking
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Task strategies offer specialized approaches for different query types
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Our visualization confirms that strategies are properly organized across the
    hierarchical structure, with clear performance metrics and community assignments.
    However, a production system must handle more than just ideal scenarios. Real-world
    usage invariably produces edge cases: empty queries, users who don’t fit into
    any community, or situations where multiple strategies could apply. These boundary
    conditions test whether our hierarchical retrieval truly degrades gracefully.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s verify that the system maintains robust behavior even when faced with
    unexpected inputs or ambiguous situations.
  prefs: []
  type: TYPE_NORMAL
- en: Step 5d – test edge cases and fallbacks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Finally, let’s verify the system handles edge cases gracefully:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: 'These edge cases demonstrate production readiness:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Empty queries**: The system still attempts retrieval even with minimal input'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Orphan users**: Users without community assignment gracefully fall back to
    global strategies'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scope conflicts**: When multiple scopes match, the hierarchy (user &gt; community
    &gt; task &gt; global) determines the winner'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This robustness ensures the system never fails to provide some guidance, even
    in unexpected situations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the expected output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: The edge case handling confirms the system’s resilience. Empty queries still
    find relevant strategies through partial matching. Users with unusual profiles
    receive global guidance rather than errors. Scope conflicts resolve predictably
    according to the hierarchy.
  prefs: []
  type: TYPE_NORMAL
- en: These retrieval and feedback mechanisms complete the core procedural memory
    system. The three essential components – learning, retrieval, and adaptation –
    create the feedback loop that enables continuous improvement. The system learns
    from conversations, retrieves the most appropriate strategies, and refines them
    based on real-world performance.
  prefs: []
  type: TYPE_NORMAL
- en: With the procedural memory system fully functional and tested, we’re ready to
    integrate it with the episodic and semantic memories from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422).
    In the next chapter, we’ll create the complete CoALA agent that combines all three
    memory types for truly intelligent, adaptive behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Architectural implications and production readiness
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The journey through procedural memory optimization reveals a fundamental shift
    in how we architect AI agents. No longer are we limited to static systems that
    repeat the same behaviors regardless of experience; instead, we can build domain-agnostic
    learning frameworks that enable agents to adapt and improve through every interaction.
    The modular architecture we’ve developed, with complete separation between core
    memory systems and domain-specific logic, represents a crucial evolution in RAG-augmented
    systems. While traditional RAG retrieves documents and memory-enhanced RAG retrieves
    personalized context, procedural memory optimizes the very mechanisms by which
    agents operate, creating a meta-learning layer that continuously refines behavior
    based on empirical performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code lab has demonstrated this architecture in action, showing how a single
    procedural memory system can work with any domain agent that implements the standard
    interface. We’ve seen how the investment advisor domain lives entirely within
    its own directory structure, with the core system remaining completely agnostic
    to investment concepts. Through five implementation steps, we’ve built the following:'
  prefs: []
  type: TYPE_NORMAL
- en: A foundation that leverages the baseline agent from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422)
    with its episodic and semantic memory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A domain-agnostic procedure structure supporting hierarchical learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A procedural memory system that works with any domain through clean interfaces
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning mechanisms that extract patterns from conversations at multiple scopes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retrieval and feedback systems that enable continuous improvement
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This same core system could power a healthcare assistant learning patient communication
    patterns, an educator discovering effective teaching strategies, or a customer
    service bot optimizing resolution paths – all without modifying a single line
    of the procedural memory code.
  prefs: []
  type: TYPE_NORMAL
- en: As you implement procedural memory in your own systems, remember that this modular
    approach is not just about code organization; it’s about enabling rapid innovation.
    Domain experts can create specialized agents without understanding the intricacies
    of memory systems. Machine learning engineers can improve the core learning algorithms
    without domain expertise. Organizations can deploy multiple domain-specific agents
    using the same infrastructure. This separation of concerns transforms procedural
    memory from an interesting research concept into a practical tool for building
    production-ready adaptive agents.
  prefs: []
  type: TYPE_NORMAL
- en: The transformation from static to learning agents represents more than a technical
    upgrade; it’s a fundamental reimagining of what AI assistants can be. By giving
    your agents the ability to learn from experience within a clean, maintainable
    architecture, you’re not just improving their performance metrics. You’re creating
    systems that build genuine expertise in their domains, that become more valuable
    over time, and that adapt to the unique needs of each deployment context while
    remaining manageable and extensible.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Throughout this chapter, we explored how procedural memory transforms the theoretical
    promise of self-improving agents into a practical, deployable reality. The clean
    architectural separation we implemented enables any domain – investment advisory,
    healthcare, education, or customer service – to benefit from sophisticated learning
    capabilities simply by implementing a domain interface. The hierarchical learning
    approach ensures patterns are applied at the appropriate scope (user, community,
    task, or global), preventing overgeneralization while maximizing the value of
    learned knowledge. The comprehensive feedback loops enable continuous refinement,
    with every interaction potentially improving future performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The fundamental principles you’ve internalized through this chapter, from hierarchical
    learning, domain-agnostic architectures, continuous adaptation, to modular design,
    will serve you well regardless of how the field evolves. These principles provide
    a mental framework for evaluating new AI technologies and architectures: you’ll
    recognize when systems properly separate concerns, when learning occurs at appropriate
    hierarchical levels, and when adaptation mechanisms enable sustainable improvement.
    Whether you encounter new memory systems, novel learning algorithms, or entirely
    different agent frameworks, these foundational concepts will help you assess their
    design quality, identify potential issues, and make informed architectural decisions.
    But we’re not done yet.'
  prefs: []
  type: TYPE_NORMAL
- en: While this chapter has shown you how to build the procedural memory system itself,
    [*Chapter 19*](B34736_19_ePub.xhtml#_idTextAnchor464) will take you further into
    practical implementation details. We’ll integrate procedural memory with the episodic
    and semantic memories from [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422)
    to create a complete CoALA-based cognitive architecture, explore LangMem’s different
    learning algorithms and when to use each one, dive deep into designing domain
    metrics that shape your agent’s evolution, and provide a complete framework for
    adapting this system to any domain you choose. The journey from static to adaptive
    agents continues, and the next chapter will equip you with everything you need
    to deploy these learning systems in production.
  prefs: []
  type: TYPE_NORMAL
