- en: '18'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Procedural Memory for RAG with LangMem
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Throughout our exploration of agentic memory in [*Chapter 16*](B34736_16_ePub.xhtml#_idTextAnchor381),
    we saw how the CoALA framework organizes cognition into four complementary memory
    types: working, episodic, semantic, and procedural. Working memory is basically
    chat history. In [*Chapter 17*](B34736_17_ePub.xhtml#_idTextAnchor422), we put
    episodic and semantic memory to work with hands-on labs. Now we arrive at the
    piece that turns a capable agent into an autonomous one. Procedural memory, the
    encoded know-how for performing tasks and the behavioral patterns that guide actions,
    marks the difference between an agent that merely remembers and one that learns,
    adapts, and improves on its own. In terms of the primary topic of this book, RAG,
    this chapter will show you how even the most advanced applications of generative
    AI still fall back on fundamental RAG principles. Without RAG, none of what we
    will discuss would be possible!'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduces LangMem, LangChain’s SDK for procedural memory optimization.
    With LangMem, an agent can review its own trajectories, extract stable behavioral
    patterns, and evolve its operational playbook through systematic prompt and policy
    updates. The result is a semi- or even fully autonomous agent that (1) learns
    for itself, (2) self-heals by detecting and correcting failure modes, (3) improves
    over time as every interaction feeds a learning loop, and (4) surfaces customer
    insights, including recurring intents, friction points, and resolution patterns
    that would otherwise take teams significant manual effort to uncover.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what procedural memory unlocks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Autonomy**: Delegate workflows end to end, not just single turns'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-healing**: Detect regressions, apply fixes, and promote better procedures'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Compounding performance**: Every interaction becomes training data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer intelligence**: Mine patterns across chats to reveal needs, gaps,
    and opportunities without manual tagging marathons'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Benefits of using procedural memory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code lab 18.1 – procedural memory management with LangMem
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The transformation from static to adaptive agents through procedural memory
    isn’t just a technical achievement but one that delivers concrete benefits across
    every aspect of agent deployment. From personalizing interactions at multiple
    hierarchical levels to dramatically reducing operational costs, procedural memory
    fundamentally changes what’s possible with RAG-augmented systems. Let’s examine
    how these capabilities translate into real-world advantages for your applications.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
