- en: '16'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '16'
- en: Creating a Data Visualization Dashboard on ThingsBoard
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 ThingsBoard 上创建数据可视化仪表板
- en: In the previous chapter, we successfully processed abnormal events and handled
    data storage and queries. These steps allowed us to effectively onboard sensor
    data to the cloud, preparing it for analysis and visualization.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们成功处理了异常事件，并处理了数据存储和查询。这些步骤使我们能够有效地将传感器数据上传到云，为分析和可视化做准备。
- en: 'In this chapter, we’ll proceed to the final step and go through the following
    topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将继续到最后一步，并讨论以下主题：
- en: Integrating the AWS cloud with ThingsBoard
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 AWS 云与 ThingsBoard 集成
- en: Task 1 – Provisioning a ThingsBoard agent with AWS
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务 1 – 使用 AWS 提供ThingsBoard代理
- en: Task 2 – Creating the data converter and integrating it with ThingsBoard
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务 2 – 创建数据转换器并将其集成到 ThingsBoard 中
- en: Task 3 – Producing a real-time dashboard with ThingsBoard
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务 3 – 使用 ThingsBoard 生成实时仪表板
- en: By the end of this chapter, you will be equipped with the knowledge to transform
    your innovation into a commercial-grade solution using this vibrant dashboard.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将具备将创新转化为商业级解决方案的知识，使用这个充满活力的仪表板。
- en: Technical requirements
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: In this chapter, in addition to access to your current AWS account, it is assumed
    that you have already enrolled in a ThingsBoard Cloud account at [https://thingsboard.cloud](https://thingsboard.cloud).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，除了访问您的当前 AWS 账户外，还假设您已在 [https://thingsboard.cloud](https://thingsboard.cloud)
    注册了 ThingsBoard 云账户。
- en: Integrating the AWS cloud with ThingsBoard
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将 AWS 云与 ThingsBoard 集成
- en: '**ThingsBoard** ([https://thingsboard.io/](https://thingsboard.io/)) is a renowned
    open source IoT platform used for data collection, processing, visualization,
    and device management. It supports device connectivity via industry-standard IoT
    protocols such as MQTT, CoAP, and HTTP, and can be deployed both on the cloud
    and on-premises. With its scalable, fault-tolerant, and high-performance features,
    ThingsBoard ensures your data is always secure and accessible.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**ThingsBoard** ([https://thingsboard.io/](https://thingsboard.io/)) 是一个著名的开源物联网平台，用于数据收集、处理、可视化和设备管理。它支持通过行业标准物联网协议（如
    MQTT、CoAP 和 HTTP）连接设备，并可在云和本地部署。凭借其可扩展性、容错性和高性能特性，ThingsBoard 确保您的数据始终安全且可访问。'
- en: ThingsBoard is a user-friendly platform ideal for beginners starting their IoT
    innovation journey. It allows for quick data ingestion from your device and visualizes
    the data in a customized real-time dashboard.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: ThingsBoard 是一个用户友好的平台，非常适合刚开始物联网创新之旅的初学者。它允许快速从您的设备中摄取数据，并在定制的实时仪表板上可视化数据。
- en: To integrate the AWS cloud as an IoT data source, ThingsBoard provides detailed
    guidance at [https://thingsboard.io/docs/user-guide/integrations/aws-iot/](https://thingsboard.io/docs/user-guide/integrations/aws-iot/).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 要将 AWS 云集成作为 IoT 数据源，ThingsBoard 在 [https://thingsboard.io/docs/user-guide/integrations/aws-iot/](https://thingsboard.io/docs/user-guide/integrations/aws-iot/)
    提供了详细的指导。
- en: 'The integration approach consists of three steps:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 集成方法包括三个步骤：
- en: '**Provision a thing in AWS IoT Core**: This *thing* will represent a ThingsBoard
    agent, which will subscribe to a dedicated topic published by IoT devices. This
    *thing* will generate its own certificates and attach the policy we created in
    [*Chapter 13*](B22002_13.xhtml#_idTextAnchor319).'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在 AWS IoT Core 中提供设备**：此**设备**将代表 ThingsBoard 代理，它将订阅由物联网设备发布的专用主题。此**设备**将生成自己的证书，并附加我们在
    [*第 13 章*](B22002_13.xhtml#_idTextAnchor319) 中创建的策略。'
- en: '**Generate a data converter in ThingsBoard**: This converter will be responsible
    for transforming the received payload from the published messages into the output
    data you want to display on the final dashboard.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在 ThingsBoard 中生成数据转换器**：此转换器将负责将接收到的消息负载转换为要在最终仪表板上显示的输出数据。'
- en: '**Create an integration in ThingsBoard**: This integration instance will utilize
    the agent’s certificates to access AWS IoT Core, subscribe to the published topic,
    and incorporate the data converter.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在 ThingsBoard 中创建集成**：此集成实例将利用代理的证书访问 AWS IoT Core，订阅发布的主题，并整合数据转换器。'
- en: As long as this instance is active, it indicates that the integration is successful
    and ready to ingest real-time data from the AWS cloud to build the final dashboard
    at ThingsBoard.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 只要此实例处于活动状态，就表示集成成功，并准备好从 AWS 云摄取实时数据，在 ThingsBoard 中构建最终仪表板。
- en: Let us start the configuration guidance with the following tasks.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从以下任务开始配置指导。
- en: Task 1 – Provisioning a ThingsBoard agent with AWS
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 任务 1 – 使用 AWS 提供 ThingsBoard 代理
- en: To successfully receive sensor data from AWS IoT Core, it’s necessary to have
    a specific *thing* provisioned in AWS IoT Core, representing ThingsBoard Cloud.
    This agent is used to subscribe to the MQTT messages published by the target devices.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功从AWS IoT Core接收传感器数据，必须在AWS IoT Core中配置一个特定的*实体*，代表ThingsBoard Cloud。此代理用于订阅目标设备发布的MQTT消息。
- en: After creating this specific *thing* in AWS IoT Core, ThingsBoard needs to adopt
    the certificates that are generated when this agent is created to gain access
    to AWS IoT Core. This is a critical step as it enables secure and verified communication
    between the two platforms.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在AWS IoT Core中创建此特定*实体*后，ThingsBoard需要采用在创建此代理时生成的证书，以访问AWS IoT Core。这是一个关键步骤，因为它使得两个平台之间的安全验证通信成为可能。
- en: In essence, the agent is more than just a simple conduit for data. It serves
    as a service integration anchor point, bridging the gap between AWS IoT Core and
    ThingsBoard Cloud. It ensures the seamless transfer of data from one point to
    another, all while maintaining the integrity and security of the information being
    transmitted. Subscribing to MQTT messages from target devices facilitates real-time
    communication and data exchange, thus effectively linking AWS IoT Core and ThingsBoard
    Cloud.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，代理不仅仅是简单的数据通道。它作为服务集成锚点，架起了AWS IoT Core和ThingsBoard Cloud之间的桥梁。它确保数据从一个点到另一个点的无缝传输，同时保持传输信息的一致性和安全性。订阅目标设备的MQTT消息促进了实时通信和数据交换，从而有效地将AWS
    IoT Core和ThingsBoard Cloud连接起来。
- en: 'Let’s begin the task:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始任务：
- en: Log in to the AWS console as the regular user role, navigate to the **IoT Core**
    service, and click on **Create things**.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以常规用户角色登录AWS控制台，导航到**IoT Core**服务，然后单击**创建实体**。
- en: '![Figure 16.1 – Creating things for ThingsBoard Cloud](img/B22002_16_01.jpg)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图16.1 – 为ThingsBoard Cloud创建实体](img/B22002_16_01.jpg)'
- en: Figure 16.1 – Creating things for ThingsBoard Cloud
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.1 – 为ThingsBoard Cloud创建实体
- en: Create a single *thing*.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建单个*实体*。
- en: '![Figure 16.2 – Creating a single thing for ThingsBoard Cloud](img/B22002_16_02.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图16.2 – 为ThingsBoard Cloud创建单个实体](img/B22002_16_02.jpg)'
- en: Figure 16.2 – Creating a single thing for ThingsBoard Cloud
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.2 – 为ThingsBoard Cloud创建单个实体
- en: Give the *thing* a name here, for example, `ThingsBoard_Agent`.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这里为*实体*命名，例如，`ThingsBoard_Agent`。
- en: '![Figure 16.3 – Give the thing a name](img/B22002_16_03.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图16.3 – 为实体命名](img/B22002_16_03.jpg)'
- en: Figure 16.3 – Give the thing a name
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.3 – 为实体命名
- en: Create a new device certificate.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个新的设备证书。
- en: '![Figure 16.4 – Creating a new certificate for this thing](img/B22002_16_04.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图16.4 – 为此实体创建新证书](img/B22002_16_04.jpg)'
- en: Figure 16.4 – Creating a new certificate for this thing
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.4 – 为此实体创建新证书
- en: Attach the policy that we created in [*Chapter 13*](B22002_13.xhtml#_idTextAnchor319).
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 附加我们在[*第13章*](B22002_13.xhtml#_idTextAnchor319)中创建的策略。
- en: '![Figure 16.5 – Attaching the policy to this new certificate](img/B22002_16_05.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图16.5 – 将策略附加到这个新证书上](img/B22002_16_05.jpg)'
- en: Figure 16.5 – Attaching the policy to this new certificate
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.5 – 将策略附加到这个新证书上
- en: Download all the certificates and keys here. Since the AWS IoT integration supported
    by ThingsBoard Cloud only requests a device certificate, private key file, and
    Amazon Root CA 1, you just need to import these three files, as shown in *Figure
    16**.6*.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里下载所有证书和密钥。由于ThingsBoard Cloud支持的AWS IoT集成只请求设备证书、私钥文件和Amazon Root CA 1，您只需导入这三个文件，如图*图16.6*所示。
- en: '![Figure 16.6 – Downloading and saving certificate files](img/B22002_16_06.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图16.6 – 下载并保存证书文件](img/B22002_16_06.jpg)'
- en: Figure 16.6 – Downloading and saving certificate files
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.6 – 下载并保存证书文件
- en: A new *thing* named `ThingsBoard_Agent` has been successfully created in AWS
    IoT Core.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 已在AWS IoT Core中成功创建一个名为`ThingsBoard_Agent`的新*实体*。
- en: '![Figure 16.7 – The thing’s successful creation page](img/B22002_16_07.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图16.7 – 实体成功创建页面](img/B22002_16_07.jpg)'
- en: Figure 16.7 – The thing’s successful creation page
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.7 – 实体成功创建页面
- en: In `your_account_ID-ats-iot.your_region.amazonaws.com`. We will need this information
    for the integration process in ThingsBoard.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`your_account_ID-ats-iot.your_region.amazonaws.com`。我们将在ThingsBoard的集成过程中需要这些信息。
- en: '![Figure 16.8 – Locating the Endpoint information](img/B22002_16_08.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图16.8 – 定位端点信息](img/B22002_16_08.jpg)'
- en: Figure 16.8 – Locating the Endpoint information
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.8 – 定位端点信息
- en: At this point, we have successfully created `ThingsBoard_Agent` as a device
    in AWS IoT Core, downloaded it with its own certificate files, and attached the
    existing policy. In the next task, we are going to complete the integration task
    at ThingsBoard.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经成功地将`ThingsBoard_Agent`作为设备创建在AWS IoT Core中，下载了它及其自己的证书文件，并附加了现有的策略。在下一个任务中，我们将完成在ThingsBoard上的集成任务。
- en: Task 2 – Creating the data converter and integrating it with ThingsBoard
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 任务2 – 创建数据转换器并将其集成到ThingsBoard
- en: In addition to receiving published messages from AWS IoT Core, ThingsBoard needs
    to execute data decoder function to parse the payload of the incoming message
    and transform it to the format that ThingsBoard uses.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 除了接收来自AWS IoT Core的发布消息外，ThingsBoard还需要执行数据解码函数来解析传入消息的有效负载并将其转换为ThingsBoard使用的格式。
- en: The data converter process in ThingsBoard Cloud involves decoder function creation.
    ThingsBoard adopts **ThingsBoard Expression Language** (**TBEL**) ([https://thingsboard.io/docs/pe/user-guide/tbel/](https://thingsboard.io/docs/pe/user-guide/tbel/))
    to create a decoder function to facilitate data processing and manipulation. TBEL
    allows you to write expressions that can parse, transform, and process device
    data as it is ingested into ThingsBoard.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ThingsBoard Cloud中的数据转换器过程涉及解码函数的创建。ThingsBoard采用**ThingsBoard表达式语言**（**TBEL**）([https://thingsboard.io/docs/pe/user-guide/tbel/](https://thingsboard.io/docs/pe/user-guide/tbel/))来创建解码函数，以方便数据处理和操作。TBEL允许您编写可以解析、转换和处理设备数据的表达式，这些数据在进入ThingsBoard时被摄取。
- en: In the context of a decoder function, TBEL is utilized to interpret incoming
    JSON, text, or binary (Base64) format data from devices, typically sent over IoT
    protocols such as MQTT or CoAP. The decoder function then extracts values from
    the raw device data, transforms them if necessary, and formats them into a structure
    that ThingsBoard can use for further processing and visualization.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在解码函数的上下文中，TBEL用于解释来自设备的传入JSON、文本或二进制（Base64）格式数据，这些数据通常通过MQTT或CoAP等IoT协议发送。解码函数随后从原始设备数据中提取值，如果需要则进行转换，并将它们格式化为ThingsBoard可以用于进一步处理和可视化的结构。
- en: You can find more details at [https://thingsboard.io/docs/user-guide/integrations/](https://thingsboard.io/docs/user-guide/integrations/).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://thingsboard.io/docs/user-guide/integrations/](https://thingsboard.io/docs/user-guide/integrations/)找到更多详细信息。
- en: 'For instance, in our project, the JSON payload published from ESP32 to AWS
    IoT Core is in the following format:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在我们的项目中，从ESP32发布到AWS IoT Core的JSON有效负载格式如下：
- en: '[PRE0]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'For the data visualization dashboard on ThingsBoard Cloud, we might *not* need
    to incorporate all the objects from this input payload. Instead, we plan to use
    the following output objects to construct our dashboard:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 对于ThingsBoard Cloud上的数据可视化仪表板，我们可能*不需要*将此输入有效负载中的所有对象都包含在内。相反，我们计划使用以下输出对象来构建我们的仪表板：
- en: '[PRE1]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The following TBEL code example is used for data conversion in our case. It
    can also be found at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_16](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_16):'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的案例中，以下TBEL代码示例用于数据转换。您也可以在[https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_16](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_16)找到它：
- en: '[PRE2]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Now, let us go through the steps to complete the data converter and integration
    on ThingsBoard Cloud:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们逐步完成在ThingsBoard Cloud上的数据转换器和集成：
- en: Log in to [https://thingsboard.cloud](https://thingsboard.cloud). Then, click
    on **Data converters** under **Integrations center** in the left-side navigation
    bar.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录到[https://thingsboard.cloud](https://thingsboard.cloud)。然后，在左侧导航栏中点击**集成中心**下的**数据转换器**。
- en: '![Figure 16.9 – Locating Integrations center in ThingsBoard Cloud](img/B22002_16_09.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图16.9 – 在ThingsBoard Cloud中定位集成中心](img/B22002_16_09.jpg)'
- en: Figure 16.9 – Locating Integrations center in ThingsBoard Cloud
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.9 – 在ThingsBoard Cloud中定位集成中心
- en: Click on **+** and then on **Create** **new converter**.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**+**，然后点击**创建****新转换器**。
- en: '![Figure 16.10 – Starting to create a new converter](img/B22002_16_10.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图16.10 – 开始创建新的转换器](img/B22002_16_10.jpg)'
- en: Figure 16.10 – Starting to create a new converter
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.10 – 开始创建新的转换器
- en: Give a name to this data converter, such as `AWS IoT Uplink Converter`, set
    **Type** to **Uplink**, and then click on **Test** **decoder function**.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 给这个数据转换器起一个名字，例如`AWS IoT Uplink Converter`，将**类型**设置为**上行链路**，然后点击**测试****解码函数**。
- en: '![Figure 16.11 – Creating the decoder function](img/B22002_16_11.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图16.11 – 创建解码函数](img/B22002_16_11.jpg)'
- en: Figure 16.11 – Creating the decoder function
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.11 – 创建解码函数
- en: In this step, we’ll create a decoder function under **TBEL**, as we discussed
    at the beginning of this section. This decoder function will convert the input
    payload from AWS IoT Core to our desired output data format.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在此步骤中，我们将在**TBEL**下创建一个解码函数，正如我们在本节开头所讨论的。此解码函数将把AWS IoT Core的输入有效载荷转换为我们的期望输出数据格式。
- en: '![Figure 16.12 – Testing our decoder function](img/B22002_16_12.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图16.12 – 测试我们的解码函数](img/B22002_16_12.jpg)'
- en: Figure 16.12 – Testing our decoder function
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.12 – 测试我们的解码函数
- en: You can copy and paste the example input into the payload contents. Then, paste
    the data converter code into the function decoder. Click **Test** to verify the
    output and save it to move to the next step.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以将示例输入复制并粘贴到有效载荷内容中。然后，将数据转换器代码粘贴到函数解码器中。点击**测试**以验证输出并将其保存以进入下一步。
- en: Click on **Add** to add this data converter.
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**添加**以添加此数据转换器。
- en: '![Figure 16.13 – Adding the data converter](img/B22002_16_13.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图16.13 – 添加数据转换器](img/B22002_16_13.jpg)'
- en: Figure 16.13 – Adding the data converter
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.13 – 添加数据转换器
- en: Now, this data converter has been successfully created in ThingsBoard.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，此数据转换器已在ThingsBoard中成功创建。
- en: '![Figure 16.14 – Completing the data converter](img/B22002_16_14.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图16.14 – 完成数据转换器](img/B22002_16_14.jpg)'
- en: Figure 16.14 – Completing the data converter
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.14 – 完成数据转换器
- en: Now, move to **Integrations** under **Integrations center** to add an integration
    instance.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，转到**集成中心**下的**集成**以添加集成实例。
- en: '![Figure 16.15 – Starting to add integration](img/B22002_16_15.jpg)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图16.15 – 开始添加集成](img/B22002_16_15.jpg)'
- en: Figure 16.15 – Starting to add integration
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.15 – 开始添加集成
- en: Under **Integration type**, select **AWS IoT**.
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**集成类型**下，选择**AWS IoT**。
- en: '![Figure 16.16 – Setting the integration type to AWS IoT](img/B22002_16_16.jpg)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图16.16 – 将集成类型设置为AWS IoT](img/B22002_16_16.jpg)'
- en: Figure 16.16 – Setting the integration type to AWS IoT
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.16 – 将集成类型设置为AWS IoT
- en: Enable the three options and click **Next**.
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启用三个选项并点击**下一步**。
- en: '![Figure 16.17 – Enabling the options](img/B22002_16_17.jpg)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图16.17 – 启用选项](img/B22002_16_17.jpg)'
- en: Figure 16.17 – Enabling the options
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.17 – 启用选项
- en: Select the existing uplink data converter we just created and click **Next**.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择我们刚刚创建的现有上行链路数据转换器并点击**下一步**。
- en: '![Figure 16.18 – Selecting the data converter created in step 6](img/B22002_16_18.jpg)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图16.18 – 选择在第6步创建的数据转换器](img/B22002_16_18.jpg)'
- en: Figure 16.18 – Selecting the data converter created in step 6
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.18 – 选择在第6步创建的数据转换器
- en: Skip **Downlink** **data converter**.
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 跳过**下行链路**数据转换器。
- en: '![Figure 16.19 – Skipping Downlink data converter](img/B22002_16_19.jpg)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图16.19 – 跳过下行链路数据转换器](img/B22002_16_19.jpg)'
- en: Figure 16.19 – Skipping Downlink data converter
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.19 – 跳过下行链路数据转换器
- en: Now, enter the AWS IoT `xxxxxxxxxxxxxx-ats.iot.your_region.amazonaws.com`. Also,
    upload the three certificate files downloaded in *step 5* of the previous task.
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，输入AWS IoT `xxxxxxxxxxxxxx-ats.iot.your_region.amazonaws.com`。同时，上传在上一任务的*步骤5*中下载的三个证书文件。
- en: '![Figure 16.20 – Configuring the AWS IoT Endpoint information and uploading
    the three certificate files](img/B22002_16_20.jpg)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图16.20 – 配置AWS IoT端点信息并上传三个证书文件](img/B22002_16_20.jpg)'
- en: Figure 16.20 – Configuring the AWS IoT Endpoint information and uploading the
    three certificate files
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.20 – 配置AWS IoT端点信息并上传三个证书文件
- en: Finally, under `+/pub`, and click on **Add** to add this integration instance.
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，在`+/pub`下，点击**添加**以添加此集成实例。
- en: "![Figu\uFEFFre 16.21 – Defining the published topic you want to subscribe](img/B22002_16_21.jpg)"
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图16.21 – 定义您想要订阅的发布主题](img/B22002_16_21.jpg)'
- en: Figure 16.21 – Defining the published topic you want to subscribe
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.21 – 定义您想要订阅的发布主题
- en: You will notice that the integration status is **Pending**.
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您会注意到集成状态为**挂起**。
- en: '![Figure 16.22 – The integration status is Pending after creation](img/B22002_16_22.jpg)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图16.22 – 创建后集成状态为挂起](img/B22002_16_22.jpg)'
- en: Figure 16.22 – The integration status is Pending after creation
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.22 – 创建后集成状态为挂起
- en: Click the *Refresh* icon in a few seconds, and you will see the status changed
    to **Active**, which means that the integration was successful.
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 几秒钟后点击**刷新**图标，您将看到状态变为**活动**，这意味着集成已成功。
- en: '![Figure 16.23 – The integration status changes to Active after refreshing](img/B22002_16_23.jpg)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图16.23 – 刷新后集成状态变为活动状态](img/B22002_16_23.jpg)'
- en: Figure 16.23 – The integration status changes to Active after refreshing
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.23 – 刷新后集成状态变为活动状态
- en: Click on this integration. Under **Event**, you will see the received message,
    as shown in the following example.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击此集成。在**事件**下，您将看到以下示例中所示接收到的消息。
- en: '![Figure 16.24 – Observing the received message from AWS IoT Core](img/B22002_16_24.jpg)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图16.24 – 观察从AWS IoT Core接收到的消息](img/B22002_16_24.jpg)'
- en: Figure 16.24 – Observing the received message from AWS IoT Core
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.24 – 观察从AWS IoT Core接收到的消息
- en: Click on **Data converters**. Under **Event**, you will see the received payload
    listed under **In** and the output payload under **Out**, as illustrated in the
    following figure.
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**数据转换器**。在**事件**下，您将看到在**输入**下列出的接收到的有效负载，以及在**输出**下的输出有效负载，如图所示。
- en: '![Figure 16.25 – Observing the converted data from the decoder function](img/B22002_16_25.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图16.25 – 观察解码函数转换的数据](img/B22002_16_25.jpg)'
- en: Figure 16.25 – Observing the converted data from the decoder function
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.25 – 观察解码函数转换的数据
- en: Click on **Entities**. Under **Device**, you will see that the ESP32 device
    information has been recorded and is marked as **Active**.
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**实体**。在**设备**下，您将看到ESP32设备信息已被记录，并标记为**活动**。
- en: '![Figure 16.26 – New device showing in Devices in ThingsBoard](img/B22002_16_26.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图16.26 – ThingsBoard中的设备中显示的新设备](img/B22002_16_26.jpg)'
- en: Figure 16.26 – New device showing in Devices in ThingsBoard
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.26 – ThingsBoard中的设备中显示的新设备
- en: Click the device, and under **Latest telemetry**, you can see the value read
    from ESP32.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击设备，在**最新遥测**下，您可以看到从ESP32读取的值。
- en: '![Figure 16.27 – Observing the converted sensor data under the device](img/B22002_16_27.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图16.27 – 观察设备下的转换后的传感器数据](img/B22002_16_27.jpg)'
- en: Figure 16.27 – Observing the converted sensor data under the device
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.27 – 观察设备下的转换后的传感器数据
- en: By now, the integration task has been successfully completed! Now, we can move
    to the final step to produce a real-time dashboard at ThingsBoard.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，集成任务已成功完成！现在，我们可以进行最后一步，在ThingsBoard上生成实时仪表板。
- en: Task 3 – Producing a real-time dashboard with ThingsBoard
  id: totrans-122
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 任务3 – 使用ThingsBoard生成实时仪表板
- en: In this task, we are going to use the **Dashboards** feature provided by ThingsBoard.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个任务中，我们将使用ThingsBoard提供的**仪表板**功能。
- en: The *Data Dashboard* feature in ThingsBoard offers a range of tools for creating
    customizable dashboards. These can include a variety of widgets such as charts,
    maps, gauges, and tables, designed for real-time and historical data analysis.
    Users can set up dashboards for dynamic monitoring with real-time data streaming
    and conduct detailed historical data analysis using advanced data aggregation
    capabilities such as averages, sums, and counts. Dashboards are interactive, facilitating
    direct parameter manipulation and thorough data exploration. They can be shared
    with controlled access for collaboration without compromising security. Furthermore,
    the responsive design ensures usability across various devices and screen sizes,
    an essential aspect for effective IoT environment monitoring.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: ThingsBoard中的**数据仪表板**功能提供了一系列工具，用于创建可定制的仪表板。这些工具可以包括各种小部件，如图表、地图、仪表盘和表格，它们旨在进行实时和历史数据分析。用户可以设置仪表板进行动态监控，使用实时数据流进行，并利用高级数据聚合功能（如平均值、总和和计数）进行详细的历史数据分析。仪表板是交互式的，便于直接参数操作和彻底的数据探索。它们可以与受控访问权限共享，以实现协作而不会损害安全性。此外，响应式设计确保了在各种设备和屏幕尺寸上的可用性，这对于有效的物联网环境监控是一个重要方面。
- en: In addition to customizing with the **Dashboards** feature, you can browse **Solution
    templates** to check whether some templates meet your application requirements.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 除了使用**仪表板**功能进行自定义外，您还可以浏览**解决方案模板**，以检查是否有模板符合您的应用需求。
- en: 'In this section, we will use the **Dashboards** feature to create our own dashboard:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用**仪表板**功能来创建自己的仪表板：
- en: Under **Dashboards**, create a new dashboard.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**仪表板**下创建一个新的仪表板。
- en: '![Figure 16.28 – Starting to create a new dashboard](img/B22002_16_28.jpg)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图16.28 – 开始创建新的仪表板](img/B22002_16_28.jpg)'
- en: Figure 16.28 – Starting to create a new dashboard
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.28 – 开始创建新的仪表板
- en: Here, you can provide the title and description for the dashboard, such as `DHT11`
    and `Temperature and Humidity` `Data Measurement`.
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这里，您可以提供仪表板的标题和描述，例如`DHT11`和`温度和湿度数据测量`。
- en: '![Figure 16.29 – Giving a name to the new dashboard](img/B22002_16_29.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图16.29 – 为新的仪表板命名](img/B22002_16_29.jpg)'
- en: Figure 16.29 – Giving a name to the new dashboard
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.29 – 为新的仪表板命名
- en: On the new **DHT11** dashboard, proceed to add a new widget.
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在新的**DHT11**仪表板中，继续添加新的小部件。
- en: '![Figure 16.30 – Adding new widgets](img/B22002_16_30.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![图16.30 – 添加新小部件](img/B22002_16_30.jpg)'
- en: Figure 16.30 – Adding new widgets
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.30 – 添加新小部件
- en: ThingsBoard offers a variety of widget bundles. Choose one that fits your use
    case. For our project, we’ll start with **Charts**.
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ThingsBoard提供了各种小部件包。选择一个适合你用例的。对于我们项目，我们将从**图表**开始。
- en: '![Figure 16.31 – Selecting Charts from the widget bundles](img/B22002_16_31.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图16.31 – 从小部件包中选择图表](img/B22002_16_31.jpg)'
- en: Figure 16.31 – Selecting Charts from the widget bundles
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.31 – 从小部件包中选择图表
- en: In the **Charts** section, select **Line chart** from the various available
    widgets.
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**图表**部分，从各种可用小部件中选择**折线图**。
- en: '![Figure 16.32 – Selecting Line chart](img/B22002_16_32.jpg)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![图16.32 – 选择折线图](img/B22002_16_32.jpg)'
- en: Figure 16.32 – Selecting Line chart
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.32 – 选择折线图
- en: Click on **Device** under **Datasource**, where you will find the device ID
    reported by ESP32\. Select it.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**Datasource**下的**Device**，在那里你可以找到ESP32报告的设备ID。选择它。
- en: '![Figure 16.33 – Selecting the target device to display its data](img/B22002_16_33.jpg)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图16.33 – 选择目标设备以显示其数据](img/B22002_16_33.jpg)'
- en: Figure 16.33 – Selecting the target device to display its data
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.33 – 选择目标设备以显示其数据
- en: Go to **Series** | **Key** | **temperature**, and click the *Edit* icon to edit
    this key.
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往**Series** | **Key** | **temperature**，并点击*编辑*图标来编辑这个键。
- en: '![Figure 16.34 – Starting to configure data entry (key)](img/B22002_16_34.jpg)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图16.34 – 开始配置数据输入（键）](img/B22002_16_34.jpg)'
- en: Figure 16.34 – Starting to configure data entry (key)
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.34 – 开始配置数据输入（键）
- en: Click **x** on the right of the **Key** value to load the current value.
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**Key**值右侧的**x**来加载当前值。
- en: '![Figure 16.35 – Customizing the data entry format, unit, and appearance color](img/B22002_16_35.jpg)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![图16.35 – 自定义数据输入格式、单位和外观颜色](img/B22002_16_35.jpg)'
- en: Figure 16.35 – Customizing the data entry format, unit, and appearance color
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.35 – 自定义数据输入格式、单位和外观颜色
- en: Now you will see the actual data entry (*key*), such as **temp_c**, **temp_f**,
    and **humidity**.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你将看到实际的数据输入（*key*），例如**temp_c**、**temp_f**和**humidity**。
- en: '![Figure 16.36 – Selecting what data entry you want to show](img/B22002_16_36.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图16.36 – 选择你想要显示的数据输入](img/B22002_16_36.jpg)'
- en: Figure 16.36 – Selecting what data entry you want to show
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.36 – 选择你想要显示的数据输入
- en: For example, select **temp_c** and click **Add**. You will see the dynamic line
    chart of the **temp_c** data in the dashboard.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，选择**temp_c**并点击**添加**。你将在仪表板上看到**temp_c**数据的动态折线图。
- en: '![Figure 16.37 – Selecting the data entry of temp_c](img/B22002_16_37.jpg)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图16.37 – 选择temp_c的数据输入](img/B22002_16_37.jpg)'
- en: Figure 16.37 – Selecting the data entry of temp_c
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.37 – 选择temp_c的数据输入
- en: By repeating the preceding steps, you can display three-line charts for **temp_c**,
    **temp_f**, and **humidity**. You can also add more widgets to the dashboard as
    needed.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 通过重复前面的步骤，你可以显示**temp_c**、**temp_f**和**humidity**的三条折线图。根据需要，你还可以向仪表板添加更多小部件。
- en: '![Figure 16.38 – The dashboard appearance](img/B22002_16_38.jpg)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
  zh: '![图16.38 – 仪表板外观](img/B22002_16_38.jpg)'
- en: Figure 16.38 – The dashboard appearance
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 图16.38 – 仪表板外观
- en: You have now completed the task of creating a data visualization dashboard of
    a temperature and humidity sensor on ThingsBoard! You can now finally show the
    real-time sensor data on this dashboard, and you can change the environmental
    temperature and humidity conditions around your ESP32, and then observe the data
    chart change on your dashboard accordingly!
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在已经完成了在ThingsBoard上创建温度和湿度传感器数据可视化仪表板的任务！你现在可以最终在这个仪表板上显示实时传感器数据，你可以改变ESP32周围的环境温度和湿度条件，然后相应地观察仪表板上的数据图表变化！
- en: Summary
  id: totrans-161
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Reflecting on our journey from [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302)
    onward, with the assistance of ChatGPT, we began programming the first line of
    C++ code on ESP32\. We collected DHT11 sensor data, connected it to our home Wi-Fi
    network, and accessed and published the sensor data to the AWS cloud. We created
    multiple tasks in the AWS cloud to handle abnormal events and stored the sensor
    data for future queries. Finally, we completed the integration of ThingsBoard
    to ingest data from the AWS cloud and created a real-time dashboard to display
    the dynamic data reported by the ESP32!
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 反思我们从[*第11章*](B22002_11.xhtml#_idTextAnchor302)开始的旅程，在ChatGPT的帮助下，我们开始在ESP32上编写第一行C++代码。我们收集了DHT11传感器的数据，将其连接到我们的家庭Wi-Fi网络，并将传感器数据访问和发布到AWS云。我们在AWS云中创建了多个任务来处理异常事件，并存储传感器数据以供未来查询。最后，我们完成了ThingsBoard的集成，以从AWS云中摄取数据，并创建了一个实时仪表板来显示ESP32报告的动态数据！
- en: By now, you should be able to observe your sensor’s real-time data on the dashboard!
    It truly is a long journey for such a tiny packet of data, with several bytes
    flying from an ESP32 board on your table, crossing the Internet, arriving at AWS,
    and finally showing their meaningful value on a commercial-grade dashboard. Among
    these elements in this journey, the most challenging part is programming C++ code
    on the ESP32 to capture the sensor data and coordinate sensors, LEDs, and buzzers
    to work together. Thanks to the smart coding skills of ChatGPT and other AI tools,
    you don’t have to worry too much. By using effective prompting frameworks and
    skills, you can instruct ChatGPT to create C++ code based on your innovative ideas!
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，你应该能够在仪表板上观察到你的传感器实时数据了！对于这样一小包数据来说，这真是一个漫长的旅程，从你桌上的ESP32板上飞出几个字节，穿越互联网，到达AWS，最终在商业级仪表板上显示出它们有意义的值。在这段旅程的这些元素中，最具挑战性的部分是在ESP32上编程C++代码以捕获传感器数据，并协调传感器、LED和蜂鸣器协同工作。多亏了ChatGPT和其他AI工具的智能编码技能，你不必过于担心。通过使用有效的提示框架和技能，你可以指导ChatGPT根据你的创新想法创建C++代码！
- en: Looking ahead, the integration of AI tools in IoT development is poised to become
    even more sophisticated. As AI continues to evolve, it will bring new capabilities
    that simplify complex coding tasks and enhance the overall development process.
    For instance, future advancements may include more intuitive AI-driven debugging
    tools, advanced code optimization techniques, and seamless integration with various
    IoT platforms.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，AI工具在物联网开发中的集成将变得更加复杂。随着AI的不断发展，它将带来新的能力，简化复杂的编码任务并提升整体开发过程。例如，未来的进步可能包括更直观的AI驱动调试工具、高级代码优化技术，以及与各种物联网平台的无缝集成。
- en: Remember, the journey of IoT development is continuous and ever-evolving. Embrace
    the challenges, stay curious, and keep experimenting with new tools and techniques.
    With dedication and the right resources, you’ll be well-equipped to bring your
    innovative IoT ideas to life and make a meaningful impact in the world of connected
    devices.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，物联网发展的旅程是持续不断且不断演变的。拥抱挑战，保持好奇心，并不断尝试新的工具和技术。有了奉献精神和正确的资源，你将充分准备，将你的创新物联网想法付诸实践，并在连接设备的世界中产生有意义的影響。
