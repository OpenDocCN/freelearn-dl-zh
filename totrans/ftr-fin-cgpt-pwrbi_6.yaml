- en: This next section provides an overview of the Financial Fortress trading strategy,
    which capitalizes on the strength and resilience of bank stocks using both traditional
    financial metrics and NLP insights from social media sentiments. The aim of this
    strategy is to create a robust, data-driven approach for trading bank stocks,
    by making use of important metrics to gauge the financial health of the banks.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分提供了金融堡垒交易策略的概述，该策略利用了银行股票的强度和韧性，结合了传统的金融指标和社交媒体情绪的NLP洞察。该策略的目的是通过利用重要的指标来衡量银行的财务健康状况，创建一个稳健、数据驱动的银行股票交易方法。
- en: Implementing the Financial Fortress trading strategy – a data-driven approach
    using Python and Power BI
  id: totrans-145
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施金融堡垒交易策略 – 使用Python和Power BI的数据驱动方法
- en: This strategy symbolizes the strength and resilience that we seek in the banks
    that we will be investing in. It will leverage both traditional financial metrics
    and NLP insights from social media sentiments, taking advantage of the metrics
    that were most critical to gauge the financial health of SVB.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 此策略象征着我们在将要投资的银行中寻求的强度和韧性。它将利用传统金融指标和来自社交媒体情绪的NLP洞察，利用对衡量SVB财务健康最关键的指标。
- en: The Financial Fortress trading strategy is a comprehensive method that combines
    the analysis of financial metrics, such as the **Capital Adequacy Ratio** (**CAR**),
    and sentiment data from social media platforms such as Twitter (now X). This strategy
    provides a set of specific trade triggers, which, when combined with a periodic
    portfolio rebalancing routine and proper risk management measures, can help achieve
    consistent investment outcomes.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 金融堡垒交易策略是一种综合方法，它结合了财务指标（如**资本充足率**（CAR））的分析和来自社交媒体平台（如Twitter（现在称为X））的情绪数据。此策略提供了一套特定的交易触发器，当与定期投资组合再平衡常规和适当的风险管理措施相结合时，可以帮助实现一致的投资结果。
- en: The steps for this strategy are as follows.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 此策略的步骤如下。
- en: The selection of the financial metric
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 财务指标的选择
- en: We will use the CAR as our hard financial indicator.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用资本充足率（CAR）作为我们的硬金融指标。
- en: What is the CAR? This is one of the most important financial solvency measures
    for a bank, since it directly measures a bank’s ability to absorb losses. The
    higher the ratio, the more capable the bank is of managing losses without becoming
    insolvent.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: CAR是什么？这是衡量银行财务偿债能力最重要的指标之一，因为它直接衡量银行吸收损失的能力。比率越高，银行在不会破产的情况下管理损失的能力就越强。
- en: To pull CARs for US banks, you can use the US Federal **Reserve’s Federal Reserve
    Economic Data** (**FRED**) website or the SEC’s EDGAR database. For the sake of
    this example, let’s assume you want to use the FRED website and its API.
  id: totrans-152
