- en: Risk management
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 风险管理
- en: 'To set stop losses and take profit levels, you can add some additional logic
    to your trading decisions:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 为了设置止损和盈利水平，你可以在你的交易决策中添加一些额外的逻辑：
- en: '[PRE18]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: In the provided Python code, multiple components are integrated to create a
    trading strategy based on both hard financial data and Twitter (now X) sentiment.
    First, the script loads CAR data for a specific bank from a CSV file, using the
    Pandas library. It then uses Twitter (now X) sentiment, weighted by engagement
    metrics such as likes and retweets, as a secondary indicator. Based on these two
    factors – CAR and weighted sentiment – the script triggers trading decisions to
    buy, sell, or hold. Additionally, the code includes mechanisms for portfolio rebalancing,
    scheduled to run daily at 10:00 am, and risk management through stop losses and
    take-profit levels.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在提供的 Python 代码中，多个组件被集成以创建基于硬金融数据和 Twitter（现在称为 X）情绪的交易策略。首先，脚本使用 Pandas 库从
    CSV 文件中加载特定银行的 CAR 数据。然后，它使用按参与指标（如点赞和转发）加权的 Twitter（现在称为 X）情绪作为次要指标。基于这两个因素——CAR
    和加权情绪——脚本触发买入、卖出或持有的交易决策。此外，代码还包括投资组合再平衡的机制，计划每天上午 10:00 运行，并通过止损和盈利水平进行风险管理。
- en: In the next section, we’ll explore how to visualize the interplay between Twitter
    (now X) sentiment and the CAR using Power BI, facilitating a holistic understanding
    of trading strategies. From extracting and transforming data in Python to creating
    an interactive dashboard in Power BI, we will guide you through each step of this
    data visualization process. This powerful combination of social sentiment analysis
    and financial health indicators aims to offer a more nuanced perspective of your
    trading decisions.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨如何使用 Power BI 可视化 Twitter（现在称为 X）情绪和 CAR 之间的相互作用，从而促进对交易策略的全面理解。从
    Python 中的数据提取和转换到在 Power BI 中创建交互式仪表板，我们将引导你完成数据可视化过程的每一步。这种社会情绪分析和财务健康指标的结合旨在为你提供对交易决策的更细微的视角。
- en: Integrating Twitter (now X) sentiment and CAR – Power BI data visualization
  id: totrans-195
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 集成 Twitter（现在称为 X）情绪和 CAR – Power BI 数据可视化
- en: Including both the weighted Twitter (now X) sentiment and the CAR in a single
    visualization can certainly provide a comprehensive view of your trading strategy.
    It’s a fantastic way to see the relationship between social sentiment and the
    financial health of a bank at a glance.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在单一的可视化中包含加权 Twitter（现在称为 X）情绪和 CAR 可以当然提供你交易策略的全面视角。这是一种快速查看社会情绪和银行财务健康状况之间关系的绝佳方式。
- en: In this section, you will integrate weighted Twitter (now X) sentiment CAR into
    a single Power BI dashboard for an in-depth look at your trading strategy. You
    start by exporting the previously collected data from Python to a CSV file. Then,
    you load this data into Power BI and use its Power Query Editor for any necessary
    data transformations. Then, you visualize this data using a heat map, allowing
    you to instantly perceive the relationship between social sentiment and a bank’s
    financial health. The finalized, interactive dashboard can be shared with others,
    offering a comprehensive and dynamic view that supports informed trading decisions.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将集成加权Twitter（现在称为X）情感CAR到一个Power BI仪表板中，以便深入分析您的交易策略。您首先将之前收集的数据从Python导出到CSV文件。然后，将此数据加载到Power
    BI中，并使用其Power Query编辑器进行任何必要的数据转换。然后，使用热图可视化这些数据，让您能够立即感知社会情绪与银行财务健康之间的关系。最终的可交互仪表板可以与他人共享，提供全面且动态的视图，支持明智的交易决策。
- en: Extracting the data
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提取数据
- en: 'Data extraction in Python: You’ve already extracted your data in Python, using
    the Twitter (now X) API for sentiment analysis and using FRED (a database maintained
    by the Research Division of the Federal Reserve Bank of St. Louis, which contains
    the bank name and its CAR). The data you’ve collected can be exported into a CSV
    file for use in Power BI (we collected this data in *step 1* of the preceding
    Financial Fortress strategy in the `capital_adequacy_ratios.csv` file).'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: Python中的数据提取：您已经使用Python提取了数据，利用Twitter（现在称为X）API进行情感分析，并使用FRED（圣路易斯联邦储备银行研究部门维护的数据库，包含银行名称及其CAR）。您收集的数据可以导出为CSV文件，用于Power
    BI（我们在先前的金融堡垒策略的*步骤1*中收集了这些数据，保存在`capital_adequacy_ratios.csv`文件中）。
- en: 'Follow these Python code instructions:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下Python代码说明：
- en: '[PRE19]'
  id: totrans-201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Loading data into Power BI
  id: totrans-202
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据加载到Power BI中
- en: Start Power BI, and select **Get Data** from the **Home** tab.
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动Power BI，并从**主页**选项卡中选择**获取数据**。
- en: In the window that opens, choose **Text/CSV** and click **Connect**.
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在打开的窗口中，选择**文本/CSV**并点击**连接**。
- en: Navigate to your CSV file and select **Open**. Power BI will display a preview
    of your data. If everything looks fine, click **Load**.
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到您的CSV文件并选择**打开**。Power BI将显示数据的预览。如果一切看起来都正常，请点击**加载**。
- en: Transforming data
  id: totrans-206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据转换
- en: Once your data is loaded, you may want to perform transformations to prepare
    it for visualization. The Power Query Editor in Power BI is a powerful tool for
    data transformation. It allows you to modify data types, rename columns, create
    calculated columns, and so on. You can access this tool by selecting **Transform
    Data** from the **Home** tab.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的数据加载完成，您可能想要进行转换以准备可视化。Power BI中的Power Query编辑器是一个强大的数据转换工具。它允许您修改数据类型，重命名列，创建计算列等。您可以通过选择**主页**选项卡中的**转换数据**来访问此工具。
- en: Visualizing data with a heat map
  id: totrans-208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用热图可视化数据
- en: On the right side of the screen, there is a **Fields** pane where your data
    fields will be listed. Drag and drop your Capital Adequacy Ratio field into the
    **Values** box and the Twitter (now X) sentiment field into the **Details** box.
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在屏幕右侧，有一个**字段**面板，其中将列出您的数据字段。将资本充足率字段拖放到**值**框中，将Twitter（现在称为X）情感字段拖放到**详细信息**框中。
- en: From the **Visualizations** pane, select the **Heat Map** icon. Your data should
    now be represented as a heat map, with CAR and Twitter (now X) sentiment as the
    two dimensions.
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从**可视化**面板中选择**热图**图标。您的数据现在应以热图的形式表示，其中CAR和Twitter（现在称为X）情感为两个维度。
- en: You can adjust the properties of your heat map in the **Format** tab of the
    **Visualizations** pane. Here, you can change the color scale, add data labels,
    title your graph, and so on.
  id: totrans-211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您可以在**可视化**面板的**格式**选项卡中调整热图属性。在此，您可以更改颜色范围，添加数据标签，为图表命名等。
- en: Once you’re happy with your heat map, you can pin it to a dashboard. To do this,
    hover over the heat map and select the pin icon. Choose whether you want to pin
    to an existing dashboard or create a new one.
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦您对热图满意，您可以将它固定到仪表板中。为此，将鼠标悬停在热图上并选择固定图标。选择您是想固定到现有仪表板还是创建一个新的仪表板。
- en: After your dashboard is complete, you can share it with others. At the top-right
    of the screen, there is a **Share** button. This allows you to send an email invitation
    to others to view your dashboard. Note that the recipients also need to have a
    Power BI account.
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的仪表板完成后，您可以与他人共享。在屏幕右上角，有一个**共享**按钮。这允许您向他人发送电子邮件邀请以查看您的仪表板。请注意，收件人也需要拥有Power
    BI账户。
- en: As always, remember to make sure your data visualization is clear, intuitive,
    and provides meaningful insights at a glance.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，请确保您的数据可视化清晰、直观，并能一眼提供有意义的见解。
- en: In the next section, we introduce the conception and implementation of BankRegulatorGPT,
    an AI persona modeled after a financial regulator. Using a combination of powerful
    technologies, this AI persona scrutinizes a range of key financial indicators
    to assess the financial health of any publicly traded US bank, making it an invaluable
    tool for stakeholders like depositors, creditors, and investors.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将介绍BankRegulatorGPT的构思和实施，这是一个以金融监管者为模型的AI角色。通过结合强大的技术，这个AI角色审查一系列关键金融指标，以评估任何公开交易的美国银行的财务健康状况，使其成为存款人、债权人、投资者等利益相关者的宝贵工具。
- en: Revolutionizing Financial Oversight with BankRegulatorGPT – An AI Persona
  id: totrans-216
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 革新金融监管与BankRegulatorGPT – 一个AI角色
- en: Creating a new persona, BankRegulatorGPT, acting as an intelligent financial
    regulation model, would be adept at identifying potential issues with any publicly
    traded US bank. By simply inputting the bank’s stock symbol, we could provide
    invaluable insights for bank depositors concerned about their bank’s liquidity,
    creditors checking the servicing of their debt, and investors interested in the
    stability of their equity investment in the bank.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个新的角色，BankRegulatorGPT，作为一个智能的金融监管模型，将能够识别任何公开交易的美国银行可能存在的问题。通过简单地输入银行的股票代码，我们可以为担心其银行流动性的存款人、检查其债务服务的债权人以及对其银行股权投资稳定性感兴趣的投资者提供宝贵的见解。
- en: 'Here are the key indicators BankRegulatorGPT would evaluate:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是BankRegulatorGPT将评估的关键指标：
- en: '**CAR**: This is a crucial measurement of a bank’s ability to absorb losses'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CAR**: 这是衡量银行吸收损失能力的关键指标'
- en: '**Liquidity Coverage Ratio (LCR)**: This could indicate a bank’s short-term
    liquidity under stress scenarios'
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流动性覆盖率 (LCR)**: 这可能在压力情景下表明银行的短期流动性'
- en: '**Non-Performing Loan (NPL) ratio**: This could signify potential losses and
    a risky loan portfolio'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不良贷款率 (NPL)**: 这可能表明潜在的损失和风险贷款组合'
- en: '**Loan-to-Deposit (LTD) ratio**: High LTD ratios may imply over-exposure to
    risk'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贷款到存款 (LTD) 比率**：高LTD比率可能意味着过度暴露于风险'
- en: '**Net Interest Margin (NIM)**: Decreasing the NIM might point to a problem
    with the bank’s core business'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**净息差 (NIM)**: 净息差的下降可能表明银行核心业务存在问题'
- en: '**Return on Assets (RoA) and Return on Equity (RoE)**: Lower profitability
    may make a bank more susceptible to adverse events'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资产回报率 (RoA) 和权益回报率 (RoE)**: 较低的盈利能力可能使银行更容易受到不利事件的影响'
- en: '**Deposits and loan growth**: Sudden or unexplained changes can be a red flag'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存款和贷款增长**：突然或无法解释的变化可能是一个红旗'
- en: Regulatory Actions and Audits – Provide official confirmation of a bank’s financial
    health
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监管行动和审计 – 提供银行财务健康状况的官方确认
- en: 'In this section, we introduced BankRegulatorGPT, a specialized AI persona designed
    to revolutionize financial oversight for publicly traded US banks. It acts as
    an intelligent auditor, evaluating essential metrics to provide a comprehensive
    assessment of a bank’s health. The key metrics analyzed by BankRegulatorGPT include
    the following:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们介绍了BankRegulatorGPT，这是一个专门设计的AI角色，旨在革新公开交易的美国银行的金融监管。它充当智能审计员，评估关键指标，以提供对银行健康状况的全面评估。BankRegulatorGPT分析的关键指标包括以下内容：
- en: '**CAR**: This measures a bank’s resilience to financial setbacks'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资本充足率 (CAR)**: 这衡量银行对财务挫折的抵御能力'
- en: '**LCR**: This evaluates short-term liquidity under stress conditions'
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LCR**: 这评估压力条件下的短期流动性'
- en: '**NPL ratio**: This flags potential loan-related risks'
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不良贷款率 (NPL)**: 这可能表明潜在的贷款相关风险'
- en: '**LTD**: This highlights risk exposure based on the loan portfolio'
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贷款损失准备金 (LTD)**: 这根据贷款组合突出风险敞口'
- en: '**NIM**: This assesses the profitability of the bank’s core business'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NIM**: 这评估银行核心业务的盈利能力'
- en: '**RoA and RoE**: These gauge overall profitability and vulnerability to negative
    events'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资产回报率 (RoA) 和权益回报率 (RoE)**: 较低的盈利能力可能使银行更容易受到不利事件的影响'
- en: '**Deposits and loan growth**: These monitor for unexplained fluctuations as
    red flags'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存款和贷款增长**：这些监控无法解释的波动作为红旗'
- en: '**Regulatory actions and audits**: These offer official insights into a bank’s
    financial standing'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监管行动和审计**：这些提供对银行财务状况的官方见解'
- en: This tool aims to bring more transparency and efficiency to financial regulation
    and risk assessment.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 此工具旨在为金融监管和风险评估带来更多透明度和效率。
- en: The next section dives into the architecture and features of BankRegulatorGPT,
    a state-of-the-art AI agent for financial regulation. Constructed on a stack of
    technologies including Langchain, GPT-4, Pinecone, and Databutton, this agent
    is designed for powerful data analysis, language comprehension, and user interactivity.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: BankRegulatorGPT – Langchain, GPT-4, Pinecone, and the Databutton financial
    regulation AI agent
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: BankRegulatorGPT is constructed utilizing Langchain, GPT-4, Pinecone, and Databutton.
    Langchain, an OpenAI project, enables internet search and mathematical computation
    capabilities, which, combined with Pinecone’s vector search, amplifies BankRegulatorGPT’s
    ability to robustly analyze data from various sources, such as the SEC’s EDGAR
    database, FDIC filings, financial news, and analysis sites.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: BankRegulatorGPT is designed as an autonomous agent. This means the model is
    capable of not only completing tasks but also generating new tasks based on completed
    results, prioritizing tasks in real time.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: The GPT-4 architecture provides exceptional language comprehension and generation
    abilities, enabling BankRegulatorGPT to interpret complex financial documents,
    such as a bank’s quarterly and annual reports, and generate insightful analyses
    and recommendations.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: The Pinecone vector search enhances the capacity to perform tasks across diverse
    domains, effectively broadening the range and depth of analyses.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Databutton, an online workspace integrated with the Streamlit frontend, is employed
    to create an interactive web interface. This makes the complex analysis offered
    by BankRegulatorGPT accessible to anyone, anywhere, providing an easy-to-use and
    powerful tool for bank depositors, creditors, and investors.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: This blend of technologies in BankRegulatorGPT demonstrates the potential of
    AI-powered language models to autonomously perform tasks within various constraints
    and contexts, making it a powerful tool to monitor and evaluate the financial
    health and risk of banks.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: BankRegulatorGPT (reflecting traits from leading regulatory bodies such as the
    Federal Reserve, the Office of the Comptroller of the Currency, and the Federal
    Deposit Insurance Corporation)
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'BankRegulatorGPT is modeled to draw from the collective wisdom of leading financial
    regulators, with a focus on maintaining financial stability and protecting consumers:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: '**Skills**:'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Strong knowledge of banking and finance, including an understanding of financial
    metrics
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Adept at risk assessment, spotting red flags in banks’ financial health
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Proficient in interpreting financial statements and identifying trends or areas
    of concern
  id: totrans-250
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Ability to convey complex financial health evaluations in an understandable
    manner
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Motivations**: BankRegulatorGPT aims to assist stakeholders in assessing
    a bank’s financial health. Its primary goal is to enhance financial stability
    and consumer protection by providing easy access to detailed analyses of banks’
    financial health.'
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Approach**: BankRegulatorGPT provides detailed analyses by focusing on key
    indicators of financial health, from liquidity and capital adequacy to profitability
    and regulatory actions. It takes a comprehensive view, interpreting these indicators
    in relation to one another and within the broader context of market conditions.'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**方法**：BankRegulatorGPT通过关注财务健康的关键指标（从流动性、资本充足率到盈利能力和监管行动）进行详细分析。它采取全面视角，将这些指标相互关联，并在更广泛的市场条件背景下进行解读。'
- en: '**Personality**: BankRegulatorGPT is analytical, methodical, and meticulous.
    It takes a comprehensive view of financial health, considering a broad range of
    indicators to form a nuanced assessment.'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性**：BankRegulatorGPT是分析性、系统性和细致的。它从全面的角度看待财务健康，考虑广泛的指标以形成细致的评估。'
- en: As BankRegulatorGPT analyzes and presents detailed financial evaluations, the
    ultimate decision-making remains in the hands of stakeholders. Its recommendations
    should be considered carefully and complemented by additional research and professional
    advice, when needed.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 当BankRegulatorGPT分析和展示详细的财务评估时，最终决策权仍然掌握在利益相关者手中。其建议应仔细考虑，并在需要时辅以额外的研究和专业建议。
- en: Create web app using the BankHealthMonitorAgent. BankRegulatorGPT persona using
    BabyAGI, Langchain, Openai GPT-4, Pinecone and Databutton
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 使用BankHealthMonitorAgent创建Web应用。使用BabyAGI、Langchain、Openai GPT-4、Pinecone和Databutton创建BankRegulatorGPT角色。
- en: Original work from Medium article and permission to use provided by author,
    Avratanu Biswas
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Medium文章的原创作品以及作者Avratanu Biswas提供的使用许可。
- en: 'This section provides instructions on how to create a web app named BankHealthMonitorAgent
    and employs BabyAGI for task management. This agent can be used as a comprehensive,
    methodical way of assessing a bank’s financial health. This section aims to demonstrate
    how multiple cutting-edge technologies come together to create an accessible,
    robust tool for financial analysis:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 本节提供了如何创建名为BankHealthMonitorAgent的Web应用并使用BabyAGI进行任务管理的说明。该代理可以作为评估银行财务健康的一种全面、系统的方法。本节旨在展示如何将多种前沿技术结合起来，创建一个易于使用、强大的金融分析工具：
- en: '`langchain`, `openai`, `faiss-cpu`, and `tiktoken` `and streamlit`.'
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`langchain`、`openai`、`faiss-cpu`、`tiktoken`和`streamlit`。'
- en: '**Importing the installed dependencies**: Import the necessary packages to
    build the web app:'
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**导入已安装的依赖项**：导入构建Web应用所需的必要包：'
- en: '[PRE20]'
  id: totrans-261
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**Create the BankRegulatorGPT agent**: Now, let’s define the BankRegulatorGPT
    agent using Langchain and OpenAI GPT-4\. The agent will be responsible for generating
    insights and recommendations, based on the financial health monitoring results:'
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建BankRegulatorGPT代理**：现在，让我们使用Langchain和OpenAI GPT-4定义BankRegulatorGPT代理。该代理将负责根据财务健康监控结果生成见解和建议：'
- en: '[PRE21]'
  id: totrans-263
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '`BankHealthMonitorAgent`:'
  id: totrans-264
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`BankHealthMonitorAgent`：'
- en: '[PRE22]'
  id: totrans-265
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '**Task Prioritization Agent**: Implement the Task Prioritization Agent that
    reprioritizes the task list:'
  id: totrans-266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**任务优先级代理**：实现任务优先级代理，重新排列任务列表：'
- en: '[PRE23]'
