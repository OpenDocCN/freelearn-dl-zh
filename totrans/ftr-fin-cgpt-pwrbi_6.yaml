- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: 'SVB’s Downfall and Ethical AI: Smart AI Regulation'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: SVB的衰落与道德AI：智能AI监管
- en: In the previous chapter, we looked at the remarkable transformation of Salesforce,
    from being under siege to being a trailblazer in the AI and ChatGPT revolution,
    using sentiment analysis, and being a game-changer in assessing market trends
    and predicting corporate turnarounds.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们探讨了Salesforce的显著转型，从受到围攻到成为AI和ChatGPT革命中的先驱，利用情感分析，并在评估市场趋势和预测企业转型方面成为变革者。
- en: This captivating narrative unfolded through the prism of market sentiment. We
    also introduced you to a trailblazing AI-driven options trading strategy, ingeniously
    combining sentiment analysis with the Rule of 40\. We created an autonomous Activist
    AI Agent, using tools such as Langchain, ChatGPT, and Streamlit. Finally, this
    chapter offered an incisive examination of **Large Language Models** (**LLMs**).
    We navigated the vast expanse of proprietary, open source, and specialized finance
    LLMs, unraveling their unique attributes and comparative advantages.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这个引人入胜的故事是通过市场情绪的棱镜展开的。我们还向您介绍了一种开创性的AI驱动期权交易策略，巧妙地将情感分析与40规则相结合。我们创建了一个自主的积极AI代理，使用Langchain、ChatGPT和Streamlit等工具。最后，本章对**大型语言模型**（**LLMs**）进行了深入的考察。我们穿越了专有、开源和专门金融LLMs的广阔领域，揭示了它们的独特属性和比较优势。
- en: In this chapter, we will explore the dramatic collapse of **Silicon Valley Bank**
    (**SVB**) following a cascade of unfortunate decisions, serving as a sobering
    testament to the perils of unchecked growth strategies and deficient risk management.
    This was a scenario perhaps better managed using the **Natural Language Processing**
    (**NLP**) power of AI and ChatGPT.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨硅谷银行（**SVB**）在一系列不幸决策后的戏剧性崩溃，这成为对无节制增长策略和风险管理不足的严峻警示。这是一个或许可以更好地利用AI和ChatGPT的**自然语言处理**（**NLP**）能力来管理的场景。
- en: At the heart of this narrative, we will introduce NLP, used in AI/ChatGPT, and
    present the Sentinel Strategy and the Financial Fortress Strategy, two groundbreaking
    approaches in the financial sector. The Sentinel Strategy underscores the potential
    of NLP in banking, highlighting the untapped power of public sentiment on social
    media platforms as a tool for financial forecasting. In contrast, the Financial
    Fortress Strategy melds these unconventional insights derived from NLP with traditional
    financial metrics, creating a resilient trading strategy that can withstand market
    volatility.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个故事的中心，我们将介绍在AI/ChatGPT中使用的NLP，并展示哨兵策略和金融堡垒策略，这是金融领域的两项开创性方法。哨兵策略强调了NLP在银行领域的潜力，突出了社交媒体平台上公众情绪作为金融预测工具的未被挖掘的力量。相比之下，金融堡垒策略将NLP从非传统洞察与传统金融指标相结合，创造了一种能够抵御市场波动的弹性交易策略。
- en: We also introduce BankregulatorGPT, an advanced AI tool that takes banking regulation
    to a whole new level. You’ll uncover how BankregulatorGPT can parse through vast
    volumes of financial data, predict potential risks, and flag irregularities with
    unmatched efficiency. The revelation of this game-changing tool is a compelling
    reason to explore this chapter.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还介绍了BankregulatorGPT，这是一种先进的AI工具，将银行监管提升到了全新的水平。您将发现BankregulatorGPT如何以无与伦比的效率解析大量金融数据，预测潜在风险，并标记异常。这个颠覆性工具的揭示是探索本章的令人信服的理由。
- en: To facilitate the application of these strategies, we offer a comprehensive
    guide that includes detailed instructions on the Twitter (now referred to as X)
    API and data collection, NLP application and sentiment quantification, and portfolio
    rebalancing and risk management.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了便于应用这些策略，我们提供了一份全面的指南，其中包括Twitter（现称为X）API和数据收集的详细说明，NLP应用和情感量化，以及投资组合再平衡和风险管理。
- en: Venture further into the chapter, and you’ll find an immersive tutorial on data
    visualization with Power BI. This section guides you in creating interactive heatmaps
    and dashboards to represent your trading strategies visually. From data extraction
    using the Twitter (now X) API to heatmap creation and dashboard customization,
    you’ll be equipped to transform raw data into compelling visual narratives.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 深入本章，您将找到关于使用Power BI进行数据可视化的沉浸式教程。本节指导您创建交互式热图和仪表板来直观地表示您的交易策略。从使用Twitter（现称为X）API进行数据提取到热图创建和仪表板定制，您将能够将原始数据转化为引人入胜的视觉叙事。
- en: This chapter is a must-read for everyone in the financial industry. Whether
    you’re a bank manager, regulator, investor, or depositor, the insights within
    these pages are pivotal to making informed decisions. This chapter is more than
    a history lesson – it is a gateway to the future of finance.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是金融行业每个人的必读之作。无论你是银行经理、监管者、投资者还是储户，这些页面中的见解对于做出明智的决定至关重要。本章不仅仅是一堂历史课——它是通往金融未来的门户。
- en: 'The following key topics will be covered in this chapter:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下关键主题：
- en: '**SVB’s collapse**: A detailed timeline and analysis of events leading to the
    bank’s failure'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SVB的崩溃**：对导致银行失败的详细事件时间线和分析'
- en: '**The Sentinel Strategy**: An innovative trading strategy using social media
    sentiment analysis with the Twitter (now X) API and NLP'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**哨兵策略**：一种创新的交易策略，使用Twitter（现在称为X）API和NLP进行社交媒体情绪分析'
- en: '**The Financial Fortress Strategy**: A powerful trading strategy combining
    traditional financial metrics and social media sentiment'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融堡垒策略**：一种结合传统金融指标和社交媒体情绪的强大交易策略'
- en: '**Introduction of BankRegulatorGPT**: An exploration of an AI model aimed at
    financial regulation tasks, built using various AI and tech tools, and illustrating
    its application in the field of finance'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**BankRegulatorGPT的介绍**：探索一个旨在金融监管任务的AI模型，使用各种AI和科技工具构建，并展示其在金融领域的应用'
- en: '**Creating the BankRegulatorGPT agent**: A step-by-step guide on setting up
    an AI agent'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建BankRegulatorGPT代理**：设置AI代理的逐步指南'
- en: '**A Regional Bank ETF**: A commercial real estate strategy, outlining a specific
    trading strategy utilizing AI tools and Python code example'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**区域银行ETF**：一种商业房地产策略，概述利用AI工具和Python代码示例的具体交易策略'
- en: '**A Power BI visualization of a Regional Bank ETF explorer**: Navigating commercial
    real estate, by demonstrating the creation of a visualization for the aforementioned
    trading strategy'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power BI可视化中的区域银行ETF探索器**：通过展示上述交易策略的可视化创建，导航商业房地产'
- en: '**AI regulation**: An in-depth discussion on the current state, potential implications,
    and future of regulating artificial intelligence in the finance industry'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能监管**：深入探讨金融行业中人工智能监管的当前状态、潜在影响和未来'
- en: As we venture into the nuances of SVB’s collapse, we invite you to consider
    an unconventional comparison. In this section, we’ll use the intriguing example
    of a renowned pastry chef baking a colossal cake, drawing compelling parallels
    with the rise and fall of SVB. The purpose of this analogy is to distill the complex
    factors leading to SVB’s downfall into a relatable narrative, illustrating how
    intricate structures, whether in baking or banking, can crumble without careful
    management and a sustainable foundation.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们深入SVB崩溃的微妙之处，我们邀请您考虑一个非传统的比较。在本节中，我们将使用一位著名糕点大师烘焙一座巨大蛋糕的有趣例子，将SVB的兴衰与糕点或银行业的复杂结构崩溃进行引人入胜的比较。这个比喻的目的是将导致SVB崩溃的复杂因素简化为一个易于理解的故事，说明无论在烘焙还是银行业，结构如果不经过谨慎管理和可持续的基础，都可能会崩溃。
- en: The pastry chef’s tale – unpacking the collapse of SVB
  id: totrans-20
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 糕点大师的故事——SVB崩溃的剖析
- en: Imagine a highly celebrated pastry chef, SVB CEO Greg Becker, embarking on a
    daring culinary venture – creating a towering, multi-tiered cake, named *SVB*,
    that would stand taller and richer than any other in history. It would be the
    chef’s crowning glory, an accomplishment that would forever change the world of
    pastries.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一位备受赞誉的糕点大师，SVB首席执行官Greg Becker，开始一项大胆的烹饪冒险——制作一座高耸、多层的大蛋糕，名为*SVB*，它将比历史上的任何蛋糕都要高、都要丰富。这将是大厨的巅峰之作，一项将永远改变糕点世界的成就。
- en: As the cake started to rise in the oven, it drew admiration from onlookers.
    Everyone was fascinated by its rapid rise. However, hidden under the surface,
    the cake was developing structural weaknesses. The ingredients, while of high
    quality individually, were not proportioned correctly. The batter was too thin,
    the yeast was too active, and the sugar was too much, creating an unstable structure
    that could not support the weight of the rising cake.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当蛋糕在烤箱中开始膨胀时，它赢得了旁观者的赞赏。每个人都对它的快速膨胀感到着迷。然而，在表面之下，蛋糕正在形成结构上的弱点。虽然原料本身质量上乘，但比例并不正确。面糊太薄，酵母活性太强，糖分太多，形成了一个无法支撑膨胀蛋糕重量的不稳定结构。
- en: In the realm of social media, a culinary influencer noticed the irregularities
    in the cake and posted a video about the possible collapse of this grand creation.
    The video went viral, causing panic among the spectators, many of whom had a stake
    in the cake’s success.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在社交媒体领域，一位烹饪影响者注意到了蛋糕的不规则性，并发布了一段关于这个宏伟作品可能崩溃的视频。视频迅速走红，引起了观众们的恐慌，其中许多人都在蛋糕的成功中有所投资。
- en: Suddenly, the oven timer rang prematurely – the cake had cooked too fast due
    to excessive heat and rapid yeast action. When the chef opened the oven door,
    the cake collapsed in an instant. The once-majestic cake was now a heap of crumbs.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 突然，烤箱计时器提前响了——由于过热和酵母作用过快，蛋糕烤得太快。当厨师打开烤箱门时，蛋糕瞬间崩塌。曾经宏伟的蛋糕现在变成了一堆碎片。
- en: The collapse of the cake was a reminder that baking, much like banking, is a
    delicate balance. It requires careful oversight, accurate measurement, and a clear
    understanding of how different ingredients interact. No matter how experienced
    the chef is, a cake built without a solid foundation and proper heat management
    is prone to collapse. Similarly, a bank, however sophisticated its operations,
    can fall if its risk is mismanaged and its rapid growth isn’t supported by a solid
    and sustainable structure.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 蛋糕的崩塌提醒我们，烘焙，就像银行业一样，需要微妙的平衡。它需要细致的监管、准确的测量以及对不同成分如何相互作用的清晰理解。无论厨师经验多么丰富，如果没有坚实的基础和适当的热量管理，蛋糕就很容易崩塌。同样，无论银行的运营多么复杂，如果其风险被错误管理，且其快速增长没有得到稳固和可持续的结构支持，银行也可能崩溃。
- en: Embark with us on a turbulent journey through the final days of SVB. Uncover
    how a seemingly invincible financial titan succumbed to a perfect storm of risks
    and vulnerabilities, offering invaluable lessons for stakeholders across the financial
    landscape. This is a gripping saga of how ambition, systemic gaps, and an unexpected
    market turn can drive even the most robust institutions to the brink of catastrophe.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们一同踏上SVB最后几天的动荡之旅。揭示一个看似不可战胜的金融巨头如何屈服于风险和脆弱性的完美风暴，为金融领域的利益相关者提供了宝贵的教训。这是一个扣人心弦的故事，讲述了抱负、系统性差距和意外的市场转折如何将即使是最稳健的机构推向灾难边缘。
- en: The silicon storm – dissecting the downfall of SVB
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 硅谷风暴——剖析SVB的衰落
- en: In the bustling heart of Silicon Valley, SVB had enjoyed decades of success.
    With assets nearing $200 billion, the bank had not only secured a stronghold among
    the tech titans, but also spread its influence across the global financial sector.
    Yet, beneath this shiny exterior, a storm was brewing, unnoticed to most.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在硅谷繁华的中心地带，硅谷银行（SVB）已经享受了几十年的成功。随着资产接近2000亿美元，该银行不仅在科技巨头中确立了稳固的地位，而且其影响力也扩展到了全球金融领域。然而，在这光鲜亮丽的外表之下，一场风暴正在酝酿，大多数人都未察觉。
- en: Throughout 2022, SVB had been walking a risky tightrope. The bank’s aggressive
    growth strategy led to dangerous exposure to liquidity and interest rate risks.
    This was a precarious balance, largely invisible to the public eye, yet understood
    by some within SVB and regulatory circles.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在2022年全年，SVB一直在走一条危险的钢丝。银行的激进增长策略导致了危险的流动性风险和利率风险暴露。这是一个危险的平衡，对公众来说大部分是看不见的，但SVB内部和一些监管机构的人士是理解的。
- en: 'Here is a timeline of SVB’s collapse in March 2023:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是SVB在2023年3月崩溃的时间线：
- en: '**March 8, 2023**: The day started like any other, but everything changed with
    the Federal Reserve’s unexpected announcement. Interest rates were to rise faster
    than anticipated by the market, which sent tremors through the financial world.
    SVB, overexposed to interest-sensitive assets, had to write down $20 billion from
    its portfolio. The bank’s shares quaked, and rumors began to circulate like wildfire
    through social media.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2023年3月8日**：这一天开始得像任何其他日子一样，但随着美联储意外宣布加息，一切都发生了变化。市场预计的利率上升速度比预期快，这给金融世界带来了震动。SVB对利率敏感的资产过度暴露，不得不从其投资组合中减记200亿美元。银行的股价震荡，谣言像野火一样在社交媒体上迅速传播。'
- en: '**March 9, 2023**: Anxiety escalated into panic. As rumors about SVB’s vulnerability
    flew around Twitter (now X) and Reddit, Becker and his team went into overdrive
    trying to quell the fears. Their regulator, the FDIC, found itself scrambling,
    navigating a supervision system that had grown rigid and complacent over the years.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2023年3月9日**：焦虑升级为恐慌。随着关于SVB脆弱性的谣言在Twitter（现在称为X）和Reddit上四处传播，贝克和他的团队全力以赴试图平息恐惧。他们的监管机构FDIC发现自己正在慌乱中，试图驾驭一个多年来已经变得僵化和自满的监督系统。'
- en: '**March 10, 2023**: The crisis reached its climax. The trust that once stood
    strong had evaporated, replaced by fear. A modern-day bank run ensued, orchestrated
    through smartphones and computers. The bank’s liquidity reserves dwindled at an
    alarming rate, leading SVB to publicly admit to a $30 billion shortfall by midday.
    This was the final blow, causing a rapid sell-off in SVB shares and sending the
    bank into the abyss of financial disaster.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**2023年3月10日**：危机达到顶峰。曾经坚定的信任已蒸发，取而代之的是恐惧。一场现代银行挤兑随之而来，通过智能手机和电脑进行策划。银行的流动性储备以惊人的速度减少，导致硅谷银行（SVB）在中午公开承认有300亿美元的缺口。这是最后的打击，导致SVB股价迅速抛售，使银行陷入金融灾难的深渊。'
- en: The SVB collapse was a sudden implosion that shook everyone, a stark reminder
    of how a combination of overconfidence, systemic shortcomings, and a volatile
    environment can result in catastrophic outcomes. It is a tale of risk and regret,
    a sobering lesson to all stakeholders in the world of finance.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: SVB的崩溃是一次突然的崩盘，震惊了所有人，这是一个鲜明的提醒，说明过度自信、系统性缺陷和动荡的环境如何导致灾难性的后果。这是一个关于风险和遗憾的故事，对所有金融世界利益相关者都是一个令人清醒的教训。
- en: 'The key takeaways from this episode for various stakeholders are as follows:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 从这一事件中，对各种利益相关者的关键启示如下：
- en: 'Bank management:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 银行管理：
- en: Ensure sound risk management practices, focusing on inherent risks such as liquidity
    and interest rate risks
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保健全的风险管理实践，重点关注固有风险，如流动性和利率风险
- en: Develop a clear and timely communication strategy for times of crisis
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在危机时期制定清晰和及时的沟通策略
- en: Balance growth objectives with stability and sustainability considerations
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平衡增长目标与稳定性和可持续性考虑
- en: 'Regulators:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 监管机构：
- en: Be proactive and decisive, instead of relying heavily on consensus-building
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 采取积极主动和果断的态度，而不是过度依赖共识建设
- en: Conduct thorough and ongoing assessments of banks’ risk profiles
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对银行的信用风险进行全面和持续的评估
- en: Make use of stress testing and pre-mortem scenarios to identify potential threats
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用压力测试和事前分析来识别潜在威胁
- en: 'Depositors:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 存款人：
- en: Understand the financial health of a bank, including its exposure to various
    risks
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解银行的财务状况，包括其面临的各种风险
- en: Stay informed about economic news and its potential impact on your bank
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关注经济新闻及其对您银行潜在的影响
- en: Maintain a healthy skepticism, and don’t hesitate to ask questions
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持健康的怀疑态度，不要犹豫提问
- en: 'Investors:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 投资者：
- en: Assess a bank’s risk management practices thoroughly before investing
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在投资前彻底评估银行的信用风险管理实践
- en: Monitor a bank’s liquidity position and its resilience to interest rate changes
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监测银行的流动性状况及其对利率变化的抗性
- en: Beware of banks showing rapid growth without adequate risk mitigation strategies
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 警惕那些缺乏充分风险缓解策略却显示快速增长的银行
- en: Now, we will delve into the intriguing world of NLP and its application in finance
    through a robust trading strategy – the Sentinel Strategy. This strategy, rooted
    in sentiment analysis, capitalizes on the vast sea of public opinion available
    on social media platforms, transforming them into actionable trading decisions.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将深入探讨自然语言处理（NLP）的迷人世界及其在金融中的应用，通过一个稳健的交易策略——哨兵策略。这个策略基于情绪分析，利用社交媒体平台上可用的庞大公众舆论海洋，将其转化为可执行的交易决策。
- en: Harnessing the social pulse – the Sentinel Strategy for banking trading decisions
  id: totrans-53
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 利用社会脉搏——银行交易决策的哨兵策略
- en: This reflects the strategy’s reliance on tracking and analyzing public sentiment
    to make informed trading decisions.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这反映了该策略对跟踪和分析公众情绪以做出明智交易决策的依赖。
- en: This trade demonstrates how to utilize the Twitter (now X) API to monitor public
    sentiment toward banks and convert it into valuable trading signals. We will shift
    our focus to data collection and pre-processing, incorporating Tweepy to access
    Twitter’s (now X) API, and TextBlob to quantify sentiment. The next part of our
    journey revolves around tracking traditional financial indicators using the yfinance
    module. By the end of this section, you should have a solid understanding of how
    social media sentiment can be harnessed to make informed trading decisions.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这笔交易展示了如何利用Twitter（现在称为X）API来监测公众对银行的看法并将其转化为有价值的交易信号。我们将重点转向数据收集和预处理，包括使用Tweepy访问Twitter（现在称为X）API和TextBlob来量化情绪。我们旅程的下一部分将围绕使用yfinance模块跟踪传统金融指标。到本节结束时，你应该对如何利用社交媒体情绪来做出明智的交易决策有一个扎实的理解。
- en: Obtain the Twitter (now X) API (if you don’t have one already)
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获取Twitter（现在称为X）API（如果您还没有的话）
- en: 'To obtain Twitter (now X) API credentials, you must first create a Twitter
    (now X) Developer account and create an application. Here’s a step-by-step guide:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取 Twitter（现在称为 X）API 凭证，您必须首先创建一个 Twitter（现在称为 X）开发者账户并创建一个应用程序。以下是分步指南：
- en: Create a Twitter (now X) Developer account.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个 Twitter（现在称为 X）开发者账户。
- en: Navigate to the Twitter (now X) Developer’s site ([https://developer.twitter.com/en/apps](https://developer.twitter.com/en/apps)).
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导航到 Twitter（现在称为 X）开发者的网站 ([https://developer.twitter.com/en/apps](https://developer.twitter.com/en/apps))。
- en: Click **Apply** for a developer account.
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击 **申请** 开发者账户。
- en: Follow the prompts and provide the necessary information.
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按照提示提供必要的信息。
- en: 'Create a new application:'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个新的应用程序：
- en: After your developer account is approved, navigate to **Dashboard** and click
    on **Create** **an app**.
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的开发者账户获得批准后，导航到 **仪表板** 并点击 **创建应用**。
- en: Fill out the required fields, such as **App name**, **Application Description**,
    and **Website URL**.
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 填写所需的字段，例如 **应用名称**、**应用程序描述**和**网站 URL**。
- en: You will need Basic Level access to search tweets, which costs $100 a month.
    Free access does not include the ability to search tweets, which is required to
    complete the following example.
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您需要基本级别的访问权限来搜索推文，这每月需要 100 美元。免费访问不包括搜索推文的能力，这是完成以下示例所必需的。
- en: 'Obtain your API keys:'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取您的 API 密钥：
- en: After your application is created, you will be redirected to the app’s dashboard.
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的应用程序创建后，您将被重定向到应用的仪表板。
- en: Navigate to the **Keys and** **Tokens** tab.
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导航到 **密钥和令牌** 选项卡。
- en: Here, you’ll find your API key and API secret key under the **Consumer** **Keys**
    section.
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这里，您可以在 **消费者密钥** 部分下找到您的 API 密钥和 API 密钥秘密。
- en: Scroll down, and you’ll see the **Access token & access token secret** section.
    Click on **Generate** to create your access token and access token secret.
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 滚动到页面底部，您会看到 **访问令牌和访问令牌秘密** 部分。点击 **生成** 以创建您的访问令牌和访问令牌秘密。
- en: You’ll need all four of these keys (**API Key**, **API Secret Key**, **Access
    Token**, and **Access Token Secret**) to interact with Twitter’s (now X) API programmatically.
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您需要这四个密钥（**API 密钥**、**API 密钥秘密**、**访问令牌**和**访问令牌秘密**）来以编程方式与 Twitter 的（现在称为
    X）API 交互。
- en: Important note
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Keep these keys confidential. Never expose them in client-side code or public
    repositories.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 请保密这些密钥。永远不要在客户端代码或公共存储库中暴露它们。
- en: 'After obtaining these credentials, you can use them in your Python script to
    connect to the Twitter (now X) API, like so:'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取这些凭证后，您可以在 Python 脚本中使用它们来连接到 Twitter（现在称为 X）API，如下所示：
- en: 'Install the Tweepy library first:'
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先安装 Tweepy 库：
- en: '[PRE0]'
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Run the following Python code:'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行以下 Python 代码：
- en: '[PRE1]'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Replace `'YOUR_CONSUMER_KEY'`, `'YOUR_CONSUMER_SECRET'`, `'YOUR_ACCESS_TOKEN'`,
    and `'YOUR_ACCESS_TOKEN_SECRET'` with your actual Twitter (now X) API credentials.
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将 `'YOUR_CONSUMER_KEY'`、`'YOUR_CONSUMER_SECRET'`、`'YOUR_ACCESS_TOKEN'` 和 `'YOUR_ACCESS_TOKEN_SECRET'`
    替换为您实际的 Twitter（现在称为 X）API 凭证。
- en: Remember to follow Twitter’s (now X) policies and guidelines when using their
    API, including the limitations they place on the number of requests your app can
    make in a given period.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住在使用他们的 API 时遵守 Twitter（现在称为 X）的政策和指南，包括他们对应用程序在特定时间段内可以发出的请求数量的限制。
- en: Data collection
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据收集
- en: 'We’ll use Tweepy to access the Twitter (now X) API. This step requires your
    own Twitter (now X) Developer API keys:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用 Tweepy 来访问 Twitter（现在称为 X）API。这一步需要您自己的 Twitter（现在称为 X）开发者 API 密钥：
- en: '[PRE2]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Important note
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: '`''Silicon Valley Bank''` is the example name for the bank in the preceding
    Python code snippet. You should replace this with the name of the bank you are
    interested in researching.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '`''Silicon Valley Bank''` 是前面 Python 代码片段中银行的示例名称。您应该将其替换为您感兴趣研究的银行的名称。'
- en: In the provided Python code, the main objective is to connect to Twitter’s (now
    X) API and collect tweets that mention a specific bank name.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在提供的 Python 代码中，主要目标是连接到 Twitter 的（现在称为 X）API 并收集提及特定银行名称的推文。
- en: 'Here’s a breakdown of what the code accomplishes:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是代码实现功能的分解：
- en: '**Obtaining the Twitter (now X) API credentials**: Creating a Twitter (now
    X) Developer account and an application to get API keys (a consumer key, consumer
    secret, access token, and access token secret).'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取 Twitter（现在称为 X）API 凭证**：创建 Twitter（现在称为 X）开发者账户和应用程序以获取 API 密钥（消费者密钥、消费者密钥秘密、访问令牌和访问令牌秘密）。'
- en: '`tweepy` library is imported to facilitate API interaction.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入 `tweepy` 库以方便 API 交互。
- en: '`''YourConsumerKey''` and `''YourConsumerSecret''`, with your actual API credentials.
    These keys authenticate your application and provide access to Twitter’s (now
    X) API.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`'YourConsumerKey'`和`'YourConsumerSecret'`，以及您的实际API凭证。这些密钥验证您的应用程序并提供对Twitter（现在称为X）API的访问权限。
- en: '`OAuthHandler` instance with your consumer key and consumer secret. This object
    will handle authentication.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用您的消费者密钥和消费者密钥创建`OAuthHandler`实例。此对象将处理身份验证。
- en: '`OAuth` process, making your application authorized to interact with Twitter
    (now X) on behalf of your account.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`OAuth`过程，使您的应用程序能够代表您的账户与Twitter（现在称为X）进行交互。'
- en: '**Initializing an API object**: Initializing the Tweepy API object with the
    authentication details.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化API对象**：使用身份验证详情初始化Tweepy API对象。'
- en: '`''YourBankName''`) are searched for and stored in the `public_tweets` variable.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`public_tweets`变量中搜索并存储的`'YourBankName'`。
- en: '**Adhering to Twitter (now X) policies**: Be mindful of Twitter’s (now X) API
    usage policies and limitations on the number of API calls.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**遵守Twitter（现在称为X）政策**：注意Twitter（现在称为X）的API使用政策和API调用次数的限制。'
- en: This code serves as a foundational step for any project requiring Twitter (now
    X) data related to banking or financial institutions.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码是任何需要与银行或金融机构相关的Twitter（现在称为X）数据的项目的基石。
- en: Next steps – pre-processing, applying NLP, and quantifying sentiment
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步 - 预处理、应用自然语言处理（NLP）和量化情感
- en: The next phase of the project involves enriching the basic sentiment analysis
    by incorporating the level of engagement a tweet has received. This is to provide
    a more nuanced and possibly more accurate view of public sentiment. By weighting
    sentiment scores with metrics such as likes and retweets, we aim to capture not
    just what is being said but also how much that sentiment resonates with the Twitter
    (now X) audience.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 项目的下一阶段涉及通过结合推文收到的参与度水平来丰富基本的情感分析。这是为了提供一个更细致和可能更准确的公众情感视图。通过用点赞和转发等指标加权情感分数，我们旨在捕捉到不仅仅是被说出的内容，还有这种情感在Twitter（现在称为X）观众中的共鸣程度。
- en: 'Steps:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤：
- en: '**Access engagement metrics**: Use the Twitter (now X) API to gather data about
    likes, retweets, and replies for each tweet.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**访问参与度指标**：使用Twitter（现在称为X）API收集关于每条推文的点赞、转发和回复的数据。'
- en: '**Calculate a weighted sentiment score**: Utilize these engagement metrics
    to weight the sentiment scores of each tweet.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算加权情感分数**：利用这些参与度指标为每条推文的情感分数加权。'
- en: 'Here is how you would proceed in Python using the Tweepy library:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何使用Tweepy库在Python中进行的：
- en: The script will search for tweets containing a specific hashtag.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该脚本将搜索包含特定标签的推文。
- en: For each tweet found, it will retrieve the number of likes and retweets.
  id: totrans-104
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于找到的每条推文，它将检索点赞和转发的数量。
- en: A weighted sentiment score will then be calculated based on these engagement
    metrics.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将基于这些参与度指标计算加权情感分数。
- en: By performing these steps, you will generate a sentiment score that not only
    reflects the content of the tweets but also the level of public engagement with
    them.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 通过执行这些步骤，您将生成一个情感分数，它不仅反映了推文的内容，还反映了公众对这些推文的参与程度。
- en: Pre-processing, NLP application, and quantifying sentiment
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预处理、应用NLP和量化情感
- en: Let’s apply weights to the sentiment scores based on the engagement a tweet
    has received (likes, retweets, and replies), which can potentially provide a more
    accurate measure of the general sentiment. This is because tweets with more engagement
    have a larger impact on public perception.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们根据推文收到的参与度（点赞、转发和回复）对情感分数进行加权，这可能会提供一个更准确的总体情感度量。这是因为参与度更高的推文对公众认知的影响更大。
- en: To do this, you would need to use the Twitter (now X) API, which provides data
    about the number of likes, retweets, and replies a tweet has received. You would
    need to apply for a Twitter Developer account and create a Twitter (now X) app
    to obtain the necessary API keys.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，您需要使用Twitter（现在称为X）API，该API提供了关于推文收到的点赞、转发和回复数量的数据。您需要申请Twitter开发者账户并创建Twitter（现在称为X）应用以获取必要的API密钥。
- en: 'Here is a Python script using the Tweepy library to access the Twitter (now
    X) API. This script finds tweets with a specific hashtag and calculates a weighted
    sentiment score based on likes and retweets:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个使用Tweepy库访问Twitter（现在称为X）API的Python脚本。该脚本查找包含特定标签的推文，并根据点赞和转发计算加权情感分数：
- en: '[PRE3]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This script retrieves tweets with a specific hashtag and then calculates a sentiment
    score for each tweet, weighted by the number of likes and retweets. It sums up
    these weighted scores to give a total sentiment score.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 此脚本检索具有特定标签的推文，然后为每条推文计算一个情绪分数，并根据点赞和转发次数进行加权。它将这些加权分数相加，以给出总情绪分数。
- en: Please note that Twitter’s (now X) API has rate limits, meaning that there’s
    a limit to the number of requests you can make in a certain amount of time. You
    will need the Basic level of Twitter (now X) API access to search tweets, which
    is $100 per month.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，Twitter（现在称为X）的API有速率限制，这意味着在特定时间内你可以发出的请求数量是有限的。你需要Twitter（现在称为X）API的基本访问级别来搜索推文，这每月费用为100美元。
- en: Also, remember to replace `'YourBankName'` with the actual name or hashtag that
    you are interested in, and set ‘`date_since`’ to the date from which you want
    to start collecting tweets. Finally, you’ll need to replace `'your-consumer-key'`,
    `'your-consumer-secret'`, `'your-access-token'`, and `'your-access-token-secret'`
    with your actual Twitter (now X) API credentials.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，记得将`'YourBankName'`替换为你感兴趣的实际名称或标签，并将`'date_since'`设置为你要开始收集推文的日期。最后，你需要将`'your-consumer-key'`、`'your-consumer-secret'`、`'your-access-token'`和`'your-access-token-secret'`替换为你的真实Twitter（现在称为X）API凭证。
- en: Tracking traditional indicators
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 跟踪传统指标
- en: 'We’ll use yfinance, which allows you to download stock data:'
