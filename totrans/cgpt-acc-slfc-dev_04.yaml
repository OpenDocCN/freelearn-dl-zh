- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using ChatGPT for Salesforce Feature Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Utilizing ChatGPT to evaluate a user story can be a useful aspect of the Salesforce
    development process. It offers a way to explore different solutions within Salesforce,
    taking into account the specific requirements of the user story. While it might
    not provide insights beyond seasoned developers, it serves as a valuable tool
    to verify or expand on existing ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Scalability is an important factor in Salesforce, and ChatGPT’s ability to assess
    different solutions in this context can help in making informed choices. Although
    relying solely on ChatGPT might not be sufficient, it can supplement human judgment
    by providing additional perspectives on how a solution might scale over time.
    It’s important to use this information in conjunction with other assessments to
    get a well-rounded view of the potential scalability of a given solution.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT can aid in alignment within a project team, but it shouldn’t replace
    direct communication and collaboration. By listing various design approaches and
    their pros and cons, it can contribute to the understanding of potential solutions.
    However, it should be used in conjunction with regular meetings and discussions
    to ensure that all stakeholders are on the same page.
  prefs: []
  type: TYPE_NORMAL
- en: The tool’s ability to quickly enumerate different solutions can be helpful in
    speeding up the decision-making process. However, it’s important to recognize
    that ChatGPT’s insights should be part of a broader evaluation, including human
    analysis and team discussions. While it can enhance the decision-making process,
    reliance solely on this tool might not be sufficient for complex and nuanced projects.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can provide access to information and insights that might not be readily
    available to all team members. While it does not replace the expertise of experienced
    Salesforce developers, it can be used to supplement knowledge and foster a more
    informed conversation among team members. It’s a tool that should be leveraged
    in a supportive role rather than as a standalone solution for designing and implementing
    Salesforce projects.
  prefs: []
  type: TYPE_NORMAL
- en: Prepare to unlock the potential of ChatGPT in articulating a range of design
    strategies. This chapter guides you through leveraging ChatGPT’s vast understanding
    of detail and critically assessing numerous solutions, aiding you to weigh their
    benefits and trade-offs effectively. You’ll gain insights into integrating broad
    Salesforce methodologies and best practices into your design choices, focusing
    on key aspects such as scalability, maintenance, and strategic alignment. By the
    end of this chapter, you will have sharpened your skills in evaluating design
    options, understood the importance of scalability, and enhanced your ability to
    collaboratively make decisions that are robust for the present and flexible for
    the future of your Salesforce environment.
  prefs: []
  type: TYPE_NORMAL
- en: Exploring multiple solutions with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting started with having ChatGPT review a user story and provide solution
    options is a relatively straightforward process. You’ll want to begin by clearly
    defining the user story (see [*Chapter 11*](B21462_11.xhtml#_idTextAnchor166)),
    outlining the specific requirements, constraints, and goals you want to achieve
    within the Salesforce environment. Then, you can pose a query to ChatGPT that
    encapsulates the user story, requesting an analysis of potential solutions and
    their associated pros and cons. It’s beneficial to frame the query in a way that
    encourages a comprehensive response, possibly including questions about scalability,
    integration with other systems, or adherence to Salesforce best practices. Engaging
    with ChatGPT in this manner allows you to leverage its vast knowledge base to
    explore various design approaches and evaluate them according to your project’s
    unique needs. Keep in mind that the insights provided by ChatGPT should ideally
    be used in conjunction with your expertise to ensure that the chosen solution
    aligns well with the broader project context and objectives.
  prefs: []
  type: TYPE_NORMAL
- en: Integrating Salesforce and Snowflake
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There is a case study in [*Appendix A*](B21462_Appendix_A.xhtml#_idTextAnchor205)
    with epics and user stories. *Epic 1* addresses integrating Salesforce and Snowflake
    (**Data as a Service**, or **DaaS**). Let’s use *Epic 1* to have ChatGPT enumerate
    the design options for this epic:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Please list all of the different ways this epic and these L1
    and L2 user stories could be implemented in SalesforceEpic 1: Integration of Snowflake
    Data with Salesforce Account Pages:'
  prefs: []
  type: TYPE_NORMAL
- en: Design and implement a point-to-point integration for Salesforce to call Snowflake
    and retrieve information for a specific Salesforce account when a user views the
    account page.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'User Story 1: Retrieve Snowflake Data for Specific Salesforce Account:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal:** As a Sales Rep, I want Salesforce to call Snowflake and retrieve
    information for a specific Salesforce account when I view the account page so
    that I have real-time insights related to that account.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep is viewing a specific Salesforce account page,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the page is loaded,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the system should call Snowflake and retrieve the relevant information
    for that specific account.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'User Story 1.1: Establish a Secure Connection with Snowflake:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal:** As a Sales Rep, I want Salesforce to establish a secure connection
    with Snowflake when I view an account page, ensuring data integrity and privacy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep is viewing a specific Salesforce account page,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the page is loaded,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the system should establish a secure connection with Snowflake.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Notes: Specific, focused on security, and meets INVEST criteria.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '|  | User Story 1.2: Call Out to Request Specific Account Information from
    Snowflake'
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal:** As a Sales Rep, I want Salesforce to make a Call Out to Snowflake
    to request specific information related to a Salesforce account when I view the
    account page, providing me with timely insights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep is viewing a specific Salesforce account page and a secure
    connection to Snowflake is established,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the page is loaded,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the system should make a Call Out to Snowflake to retrieve the relevant
    information for that specific account.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Notes: Specific, focused on the Call Out mechanism, and meets INVEST criteria.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'User Story 1.3: Implement Error Handling for Snowflake Connection and Data
    Retrieval'
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal**: As a Sales Rep, I want any errors that occur during the connection
    to Snowflake or data retrieval to be handled gracefully so that I am informed
    about the issue and can continue using the system without disruption.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep is attempting to view a specific Salesforce account page,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** an error occurs in connecting to Snowflake or retrieving data,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the system should log the error, notify the Sales Rep, and allow them
    to continue using the system without disruption.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Notes: Specific, focused on error handling, and meets INVEST criteria.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Response** | The epic and the associated L1 and L2 user stories you’ve
    described can be implemented in Salesforce through various methods, each with
    distinct considerations. Here’s an outline of the different ways this could be
    accomplished:1\. Using Salesforce Connect with Custom Adapter:Description: Develop
    a custom adapter for Salesforce Connect to establish a connection with Snowflake.
    Use External Objects to represent the Snowflake data in Salesforce, allowing real-time
    querying of data.Pros: Simplifies data retrieval, leverages built-in features,
    and promotes real-time interaction.Cons: Requires customization for the specific
    connection to Snowflake, may have some limitations depending on the complexity
    of the data.2\. Utilizing Custom Apex Classes and Callouts:Description: Develop
    custom Apex classes and perform HTTP callouts to interact with Snowflake’s APIs.
    Implement robust error handling and security measures.Pros: Highly flexible and
    customizable, allows for precise control over data retrieval and connection handling.Cons:
    More complex development, potential scalability concerns.3\. Integration Through
    Middleware (for example, MuleSoft):Description: Utilize middleware such as MuleSoft
    to facilitate the integration between Salesforce and Snowflake. The middleware
    acts as a broker, handling communication, data transformation, and error handling.Pros:
    Offers abstraction, simplifies integration complexity, provides robust error handling
    and transformation capabilities.Cons: Introduces additional components, potential
    latency, costs related to middleware.4\. Utilizing Salesforce Einstein Analytics
    with Direct Data Connectors:Description: Use Salesforce Einstein Analytics’ direct
    data connectors to Snowflake, pulling data directly into Einstein Analytics and
    displaying it on the Salesforce account page.Pros: Easy to set up, provides robust
    analytics capabilities.Cons: Limited to the capabilities and constraints of Einstein
    Analytics, potential cost implications. |'
  prefs: []
  type: TYPE_TB
- en: '|  | 5\. Embedding Snowflake UI within Salesforce through Canvas App:Description:
    Embed Snowflake’s UI directly into Salesforce account pages using a Canvas App.
    The Canvas App can provide direct interaction with Snowflake within the Salesforce
    interface.Pros: Provides direct access to Snowflake features, minimizes data synchronization
    challenges.Cons: Requires a deeper understanding of Snowflake’s UI interaction,
    potential security considerations.6\. Implementing Scheduled Batch Jobs with Bulk
    API:Description: Use scheduled batch jobs in conjunction with the Bulk API to
    periodically pull data from Snowflake and store it in Salesforce, displaying it
    on account pages.Pros: Can be efficient for large data volumes, allows control
    over synchronization frequency.Cons: Not real-time, potential complexity in handling
    data changes and synchronization.Each of these approaches addresses various aspects
    of the user stories, ranging from data retrieval and security to error handling.
    The optimal solution would likely be a hybrid approach, carefully tailored to
    the specific needs, data volume, real-time requirements, and budget constraints
    of the project. Always consider testing the chosen approach thoroughly, ensuring
    that it aligns with the overall architectural best practices within the Salesforce
    ecosystem. |'
  prefs: []
  type: TYPE_TB
- en: Considering an assortment of ways to implement an epic and associated user stories
    is vital to the decision-making process, enhancing the quality, scalability, and
    sustainability of the chosen solution. Examining multiple approaches fosters a
    comprehensive understanding of the problem domain. By comparing different methods,
    the development team gains insight into the intricacies of the requirements and
    possible hidden challenges or dependencies. This broader perspective empowers
    the team to design a solution closely aligned with current and anticipated future
    needs.
  prefs: []
  type: TYPE_NORMAL
- en: Reviewing various options often brings to light unique edge cases or scenarios
    that might have otherwise gone unnoticed. Discussing these situations in the context
    of different approaches allows the team to determine how best to handle them,
    reducing the risk of unforeseen issues. Furthermore, a structured review of different
    solutions fosters collaboration among team members, encouraging open dialogue
    and ensuring that various viewpoints and expertise are considered. This process
    leads to a more robust decision and promotes innovative and creative problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: Presenting multiple options, along with their pros and cons, to stakeholders
    demonstrates a thoughtful approach, reassures them that the chosen path has been
    carefully considered, and builds trust. It helps ensure alignment across the entire
    project team, including both technical and business stakeholders. Moreover, understanding
    why certain options were rejected can guide decisions in later stages of the project
    or even in subsequent projects, facilitating future development and maintenance.
  prefs: []
  type: TYPE_NORMAL
- en: The careful examination of different approaches also enhances risk management
    by evaluating the risks associated with each option. Understanding these risks
    upfront allows the team to make more informed decisions and mitigate potential
    issues. A thorough exploration of possible ways to implement epics and user stories,
    even those that may be rejected, is a strategic approach that fosters collaboration,
    encourages innovation, ensures alignment, and enhances the overall quality of
    the chosen solution. This reflective and methodical process is key to success
    in complex Salesforce development projects.
  prefs: []
  type: TYPE_NORMAL
- en: '#1 – Using Salesforce Connect with Custom Adapter'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Option *#1*, although presenting a reasonable and potentially effective solution,
    carries an underlying challenge that places it in the “no” column for the current
    phase of the project. The implementation of this option requires the purchase
    of additional licenses, a process that could introduce delays in the project timeline.
    Acquiring these licenses necessitates navigating through procurement, budget approval,
    and possibly legal review, all of which can extend the lead time significantly.
    In the context of a project where timeliness is paramount, this delay becomes
    a critical concern. While this option may still hold value for future considerations
    or in different scenarios, the immediate implications on schedule make it unsuitable
    for the current requirements and objectives. Therefore, the decision to set aside
    option *#1* in favor of alternatives that align more closely with the existing
    timeline and resources is a strategic and practical move.
  prefs: []
  type: TYPE_NORMAL
- en: '#2 – Utilizing Custom Apex Classes and Callouts'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Option *#2*, despite demanding more work upfront and necessitating a careful
    design to ensure scalability, offers a set of benefits that make it a compelling
    choice for the current project needs. Most notably, it does not require the acquisition
    of any additional Salesforce licenses, a factor that enhances its attractiveness
    by eliminating potential procurement delays. Furthermore, this approach is the
    most flexible option, providing a tailored solution that can be closely aligned
    with specific project requirements. Its capability to deliver near-real-time results
    adds another layer of appeal. The confidence in this option is further bolstered
    by the development team’s prior experience in building custom integrations. Their
    hands-on expertise with similar projects not only assures that the implementation
    can be executed well but also fosters optimism that it can be accomplished quickly.
    This combination of flexibility, speed, and in-house expertise makes option *#2*
    a strong contender that aligns with both the technical needs and the organizational
    capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '#3 – Integration Through Middleware (for example, MuleSoft)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Option *#3* stands out as a likely candidate for selection in specific circumstances,
    most notably if there was already an established MuleSoft infrastructure in place
    along with an experienced Mulesoft team to manage and implement the integration.
    The synergies between MuleSoft and Salesforce could offer substantial benefits
    and streamline the development process. However, the present challenges around
    procuring MuleSoft and the time and resources required to build or hire a skilled
    MuleSoft team render this option impractical at this point in time. The complexities
    and potential delays associated with these challenges firmly place this option
    in the “no” column for the immediate project. Nevertheless, the strengths of this
    option should not be overlooked, and it would be prudent for the team to carefully
    review the “pros” associated with it. Insights gained from this analysis may prove
    valuable, allowing the team to incorporate elements of this approach where practical
    into the option eventually selected, thereby enhancing the final solution’s robustness
    and functionality.
  prefs: []
  type: TYPE_NORMAL
- en: '#4 – Utilizing Salesforce Einstein Analytics with Direct Data Connectors'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Option *#4*, similar to option *#3*, presents certain procurement and team skill
    challenges that must be carefully considered. While this approach might align
    with certain aspects of the project, it also exhibits an overlap with the existing
    capabilities of Snowflake. Given its narrow focus on specific capabilities, it
    potentially limits future flexibility and optimization. If the required software
    was already procured and the team possessed the necessary skills, this option
    could be a viable consideration. However, in the current scenario, it doesn’t
    align with the immediate project needs and timelines. It’s essential to recognize
    the insights and perspectives that have shaped the support for this approach,
    and although it is not the optimal path at this moment, the considerations behind
    it are valued. By maintaining open communication and collaborative exploration
    of these ideas, we ensure that all stakeholders feel heard and engaged, fostering
    a united vision and a shared commitment to selecting the best solution for the
    project’s success.
  prefs: []
  type: TYPE_NORMAL
- en: '#5 – Embedding Snowflake UI within Salesforce through Canvas App'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Option *#5*, while an intriguing suggestion, bears some characteristics that
    render it less suitable for the current project requirements. The approach is
    somewhat dated, reflecting methodologies that may not align with contemporary
    best practices within the Salesforce and Snowflake ecosystems. Implementing this
    option would likely introduce undue complexity around data movement and challenges
    in maintaining a consistent UI look and feel. Additionally, neither the Salesforce
    nor Snowflake teams have experience or expertise in this specific methodology,
    which could lead to potential delays and inefficiencies in the development process.
    Given these factors, although the idea is appreciated and its exploration reflects
    a healthy curiosity toward innovation, it falls into the “no” column for this
    particular project. It serves as a reminder that sometimes a thoughtful examination
    of various approaches can lead to a more deliberate and confident selection of
    the best-fit solution.
  prefs: []
  type: TYPE_NORMAL
- en: '#6 – Implementing Scheduled Batch Jobs with Bulk API'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Option *#6*, while offering certain advantages in some contexts, does not align
    with the specific requirement for the integration to be real-time in the current
    project. Choosing this approach would entail storing Snowflake data in Salesforce,
    thereby introducing synchronization challenges that could complicate the overall
    architecture and increase maintenance overhead. Managing such synchronization
    would diverge from the desired real-time interaction between Salesforce and Snowflake
    and could lead to inconsistencies in data representation. While there may indeed
    be scenarios where this option should be carefully considered, implementing it
    would necessitate a comprehensive revisit of the user stories and underlying requirements.
    Given the current project scope and the alignment sought between technical capabilities
    and business needs, this option is categorized as a “no” for the moment. The assessment
    serves as a reminder of the importance of closely matching implementation strategies
    with clearly defined project goals and requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion – Integrating Salesforce and Snowflake
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For the purposes of this book, *#6* is a “no” because it does not meet the requirements.
    *#5*, *#4*, *#3*, and *#1* are “no” due to a mix of procurement and team skills.
    This leaves *#2*, *Utilizing Custom Apex Classes* *and Callouts*.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is an assistant and accelerator. Rather than the development team members
    each reading the epic and thinking about the solution options (and likely not
    thinking about all of them, and then attending a meeting to espouse a particular
    solution based on an incomplete consideration of the options and the related pros
    and cons), ChatGPT was able to quickly provide the information needed for the
    team to align with a decision.
  prefs: []
  type: TYPE_NORMAL
- en: While option *#2* is presently being recommended for its favorable balance of
    procurement concerns, licensing costs, existing team skills, and adaptability
    to future changes, it’s essential to acknowledge the inherent strengths of option
    *#3*. The merit of option *#3* lies in its potential scalability, modularity,
    and efficiency, possibly facilitated by existing middleware such as MuleSoft,
    if it were in place. By conducting a deep dive into these attributes, the development
    team can discover ways to enhance the *#2*-based solution. For instance, the modular
    design principles and integration patterns that are typically inherent in option
    *#3* could be emulated within option *#2*. This might involve creating reusable
    integration components and employing best practices that allow for streamlined
    data exchange and transformation. The analytical comparison between options *#2*
    and *#3* exemplifies the importance of evaluating multiple solutions during the
    design phase. It’s not merely about finding a solution that will work but synthesizing
    the best solution by carefully considering and potentially blending the strengths
    of various alternatives. Such a thoughtful approach ensures a more resilient and
    adaptable system that’s well-aligned with both current needs and potential future
    evolutions.
  prefs: []
  type: TYPE_NORMAL
- en: Brainstorming with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Using ChatGPT to brainstorm solutions can be used from very basic epics and
    user stories (for example, *Epic 6*, *User Story 6.3: Implement Functionality
    to Invoke Report*, in [*Appendix A*](B21462_Appendix_A.xhtml#_idTextAnchor205)
    *– Case Study*), all the way through to a high-level requirement pending analysis
    and the epics and user stories being written (for example, *Create a React frontend
    that uses GraphQL to view and edit* *Salesforce Accounts*).'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | I have a project requirement to create a React frontend that
    uses GraphQL to view and edit Salesforce accounts. What are the major components
    of this work? |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | Certainly! The project requirement to create a React frontend
    that utilizes GraphQL to view and edit Salesforce accounts is complex and involves
    multiple major components. Below, I outline the components and possible options
    for developing each one.1\. React Frontend Development:Components:UI Design: Creation
    of the interface where users will interact with the accounts.State Management:
    Managing the state of the application to keep track of changes in real time.Error
    Handling: Providing feedback to the users in case of failures or validation errors.Options:UI
    Libraries: Consider using Material UI, Ant Design, or other UI frameworks for
    consistent styling.State Management Libraries: Utilize Redux, MobX, or React’s
    Context API for state management.Validation Libraries: Employ libraries such as
    Formik or Yup for form validation.2\. GraphQL Integration:Components:Schema Definition:
    Defining the types, queries, and mutations that map to the Salesforce accounts.Resolver
    Implementation: Creating functions to handle fetching and manipulation of data.Authentication
    and Authorization: Ensuring only authorized users can access and modify the data.
    |'
  prefs: []
  type: TYPE_TB
- en: '|  | Options:Server: Use Apollo Server, Express-GraphQL, or other server middleware
    compatible with GraphQL.Client-side Libraries: Employ Apollo Client or Relay Modern
    for client-side GraphQL management.Security Measures: Implement JWT or OAuth 2.0
    for authentication.3\. Salesforce Integration:Components:Connection Configuration:
    Setting up secure communication between Salesforce and your application.Data Mapping
    and Transformation: Ensuring the data structure aligns with Salesforce objects.Batch
    Operations: Handling bulk view and edit operations.Options:Connection Libraries:
    Utilize JSforce or other Salesforce SDKs for establishing a connection.Middleware
    Integration: Consider using MuleSoft or other middleware if complex transformations
    are needed.API Utilization: Leverage Salesforce REST or Bulk APIs as per the requirement.4\.
    Testing and Deployment:Components:Unit and Integration Testing: Validating individual
    components and their interactions.Deployment Automation: Continuous deployment
    for releasing changes smoothly.Options:Testing Frameworks: Use Jest, the React
    Testing Library, or other testing frameworks.Deployment Tools: Consider deploying
    with Docker, Kubernetes, or using a Platform-as-a-Service solution such as Heroku.
    |'
  prefs: []
  type: TYPE_TB
- en: '|  | The development of each component should align with the business goals
    and constraints such as budget, timeline, and expertise. Leveraging existing libraries
    and tools can accelerate development while ensuring that a scalable, secure, and
    maintainable solution is crafted. Collaboration with stakeholders and cross-functional
    teams throughout the development will ensure alignment with strategic objectives
    and a successful project execution. |'
  prefs: []
  type: TYPE_TB
- en: Using ChatGPT at this level should only be done by architects and senior developers
    who know their way around Salesforce. This is because when working at this level,
    ChatGPT may miss the correct answer. In this case, ChatGPT missed that there is
    a Salesforce GraphQL API. This may be because ChatGPT’s training material is out
    of date or because there is simply very little on the internet about the Salesforce
    GraphQL API.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s ask ChatGPT a direct question about the Salesforce GraphQL API:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Salesforce has a GraphQL API. How much do you know about it?
    |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | As of my knowledge cut-off date in September 2021, Salesforce
    does not offer a native GraphQL API out of the box. Instead, Salesforce primarily
    provides REST and SOAP APIs for external integration.Many developers have worked
    around this by implementing a GraphQL server that acts as an intermediary between
    Salesforce and the frontend application. The GraphQL server would be responsible
    for translating GraphQL queries into the appropriate SOQL (Salesforce Object Query
    Language) or API calls, and then translating the responses back into the GraphQL
    format.Such an implementation would typically involve defining GraphQL schemas
    that map to Salesforce objects, writing resolvers to handle the translation between
    GraphQL and Salesforce’s APIs, and implementing appropriate authentication and
    authorization to ensure that access is properly controlled.Some third-party tools
    and libraries may offer GraphQL interfaces to Salesforce, and the specifics of
    these solutions would depend on the particular technologies involved. It’s also
    worth considering that the landscape of available technologies is constantly evolving,
    and there may be new developments related to GraphQL and Salesforce since my last
    update.If Salesforce has introduced a native GraphQL API after my knowledge cut-off,
    I recommend referring to the official Salesforce documentation and community forums
    for the most accurate and up-to-date information. This will provide guidance on
    how to use the GraphQL API with Salesforce, including details on authentication,
    query execution, error handling, and more. |'
  prefs: []
  type: TYPE_TB
- en: There is the answer – because the Salesforce GraphQL API was announced in 2022
    and **Generally Available** (**GA**) in the Salesforce Winter ’23 release, ChatGPT
    can’t help, at least, at the time this chapter was written.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT, and similar language models, are powered by **deep learning** (**DL**)
    algorithms that have been trained on vast datasets comprising a wide variety of
    textual content. These models are not merely stringing words together but are
    identifying complex patterns, relationships, and structures within the language.
    By analyzing countless examples of human-written text, the models develop an intricate
    understanding of syntax, semantics, and context. This enables them to generate
    coherent and contextually relevant text that aligns with human-like expression.
    The training process involves fine-tuning weights in the **neural network** (**NN**)
    to minimize errors in predictions, thereby facilitating the model’s ability to
    generate text that resembles the way humans communicate. It is this robust interaction
    with language data, and the sophisticated architecture that interprets it, that
    empowers ChatGPT to respond to a wide array of prompts with remarkable fluency
    and relevance.
  prefs: []
  type: TYPE_NORMAL
- en: In a philosophical context, an entity that knows everything about everything
    is often referred to as “omniscient.” In the realm of current technology, there’s
    no existing entity that can truly claim omniscience, as even the most advanced
    **artificial intelligence** (**AI**) systems have limitations in their understanding
    and knowledge. While the term might be used metaphorically in some contexts, it’s
    essential to recognize the boundaries and constraints of human-made systems and
    the ongoing exploration and learning that defines the field of **generative AI**
    (**GenAI**) and, specifically, ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Scaling solutions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Salesforce’s robust platform provides scalable solutions for configuration changes,
    enabling virtually limitless growth. However, when it comes to writing custom
    Apex code, the onus is on developers to ensure that the code can handle the expected
    level of growth without hitting the platform’s governor limits. These are built-in
    restrictions (for example, Governor Limits) that prevent undue resource consumption,
    and they present a unique challenge in the Salesforce ecosystem. Writing code
    that scales seamlessly requires a thoughtful approach that takes these limits
    into account. Typically, a project will document its anticipated growth and scaling
    needs, providing a clear benchmark for developers. This guidance allows them to
    architect solutions that not only meet current demands but also can gracefully
    handle projected increases in data volume and user interaction. By aligning Apex
    code with these growth expectations, developers can craft efficient, scalable
    solutions that harmonize with Salesforce’s inherent strengths while avoiding the
    pitfalls of governor limits.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can serve as an instrumental asset in analyzing a user story requiring
    Apex code development within Salesforce, focusing on enhancing scalability. Through
    a comprehensive understanding of the underlying business needs, including expected
    levels of growth, it can grasp the core requirements of the user story. This insight
    becomes the foundation for suggesting appropriate coding practices tailored for
    scalability.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of merely evaluating existing solutions, ChatGPT can actively engage
    in the development process, functioning akin to a “pair programmer.” As the code
    is being developed, ChatGPT can continuously assess it, pinpointing areas where
    scalability might become a concern and providing real-time guidance. This partnership
    ensures that scalability principles are embedded right from the start, preventing
    potential bottlenecks.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging its vast knowledge of Salesforce development, ChatGPT can also propose
    suitable design patterns, best practices, efficient query structures, bulk processing
    techniques, asynchronous processing methods, and more. It can even generate customized
    code snippets that align with scalable development practices, serving as a starting
    point for the developers.
  prefs: []
  type: TYPE_NORMAL
- en: This collaboration extends beyond initial development, as ChatGPT continues
    to assist in code reviews and refinements throughout the life cycle of the project.
    By guiding the creation of relevant test cases targeting scalability, it ensures
    that the code is robust enough to withstand the pressures of expected growth.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT’s multifaceted approach transcends mere suggestion, transforming into
    a continuous engagement that resonates with both immediate needs and future growth.
    It acts as a virtual mentor, guiding developers to craft scalable solutions and
    ensuring alignment with Salesforce’s scalability principles. By incorporating
    elements of analysis, real-time collaboration, and iterative refinement, ChatGPT
    fosters a development environment that is not only innovative but robust and future-proof.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a user story from [*Appendix A*](B21462_Appendix_A.xhtml#_idTextAnchor205)
    *– Case Study* and ask ChatGPT to analyze it for potential scaling issues:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | The user story below is going to include a Call Out. As the
    number of Salesforce users increases to the point that there will be multiple
    simultaneous calls from Salesforce to Snowflake, and the load on Snowflake may
    result in it taking seconds or more for a response, what governor limits should
    be front of mind and managed in the code?Epic 1: Integration of Snowflake Data
    with Salesforce Account PagesUser Story 1.2: Call Out to Request Specific Account
    Information from Snowflake'
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal**: As a Sales Rep, I want Salesforce to make a Call Out to Snowflake
    to request specific information related to a Salesforce account when I view the
    account page, providing me with timely insights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance Criteria**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a Sales Rep is viewing a specific Salesforce account page and a secure
    connection to Snowflake is established,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the page is loaded,'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the system should make a Call Out to Snowflake to retrieve the relevant
    information for that specific account.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Notes**: Specific, focused on the Call Out mechanism, and meets INVEST criteria.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Response** | The described user story, focusing on making a Call Out to
    Snowflake for specific account information, will indeed introduce specific challenges
    as the number of simultaneous Salesforce users increases. Managing Salesforce’s
    governor limits will be paramount in ensuring that the code scales with the user
    load and handles any latency from Snowflake.Here are the governor limits that
    should be front of mind and managed within the code:1\. Concurrent Remote Call
    Outs: Salesforce imposes a limit on the number of simultaneous remote callouts
    that can be made at a given time. This needs to be carefully managed, especially
    as multiple users might trigger callouts simultaneously.2\. HTTP Request Timeout:
    The standard timeout for HTTP callouts is 120 seconds. Given that the load on
    Snowflake might result in delays, it’s essential to manage this timeout to prevent
    user experience issues. You may choose to modify this based on expected response
    times from Snowflake, but you’ll need to strike the right balance.3\. Maximum
    CPU Time: Salesforce enforces limits on the maximum CPU time on the Salesforce
    servers. Writing efficient code to manage callouts will be crucial to ensure that
    this limit is not exceeded, especially under high load.4\. Asynchronous Callout
    Limits: If the integration utilizes asynchronous callouts to manage potential
    delays from Snowflake, keep in mind the limit on the number of future method invocations
    or Batch Apex jobs.5\. Total Number of Callouts in a Transaction: There is a limit
    on the number of callouts that can be made within a single transaction. This may
    need to be considered if multiple callouts are made within the same context.6\.
    Queueable Apex: If using Queueable Apex to manage callouts, the number of jobs
    added to the queue must be monitored to stay within limits.7\. Handling Errors
    and Retries: Implementing proper error handling and retry logic will be necessary
    to manage potential failures due to hitting these or other unforeseen limits.These
    constraints necessitate a careful, thoughtful design that can effectively scale
    with the expected load. It might be beneficial to consider bulkifying callouts
    where applicable and utilizing asynchronous patterns to manage the load and potential
    delays from Snowflake. By keeping these governor limits in mind and building around
    them, a scalable and robust integration can be achieved. |'
  prefs: []
  type: TYPE_TB
- en: ChatGPT can be used to do a deep dive into each of these issues and provide
    guidance on how to navigate each of these limits. In scenarios where the needed
    prompt is not clear, ChatGPT can help refine the needed prompt. When getting into
    complex issues, it is important to not just blindly run with what ChatGPT produces.
    For example, in the preceding response, the responses around concurrent remote
    callouts and asynchronous callout limits both make assumptions about implementation
    and blend conditions together. This is the same thing an experienced developer
    might do when asked the same questions, but it is important to use ChatGPT to
    dive into the details of an answer if it is at all unclear.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | How can ChatGPT help understand and address the first limit
    mentioned previously: **Concurrent Remote** **Call Outs**? |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | ChatGPT can serve as a valuable tool for Salesforce developers,
    providing insights and guidance on managing each of the mentioned governor limits.
    By engaging with ChatGPT, developers can explore potential challenges, solutions,
    and best practices related to these limits. This interactive exploration allows
    for a more comprehensive understanding of how to build scalable Apex code tailored
    to specific scenarios such as the Call Out to Snowflake.For example, if a developer
    wants to delve into the concurrent remote callouts limit, they might pose a prompt
    to ChatGPT such as:“Given a Salesforce integration that involves multiple simultaneous
    callouts to Snowflake for retrieving specific account information, I’m concerned
    about hitting the limit on concurrent remote callouts. Can you provide details
    on how this limit might impact my user story and suggest strategies to avoid exceeding
    this limit while maintaining performance?”Through this prompt, ChatGPT can provide
    detailed insights into how the concurrent remote callout limit operates, the potential
    consequences of hitting this limit, and various solutions that can be implemented.
    Solutions might include implementing a queuing mechanism, optimizing callout patterns,
    or utilizing asynchronous callouts with Queueable Apex. By leveraging ChatGPT’s
    capabilities, developers have a resource to consult, helping them navigate the
    complex landscape of governor limits and craft code that aligns with Salesforce’s
    best practices. |'
  prefs: []
  type: TYPE_TB
- en: ChatGPT is trying to respond to the prompt but is still blending limits in the
    response. This exchange makes the point that as much as ChatGPT is a fantastic
    and knowledgeable assistant, validating answers, especially at the design level,
    is a good idea. Taking a minute to look through Salesforce documentation to ensure
    a complete understanding of the applicable limits is a very good idea.
  prefs: []
  type: TYPE_NORMAL
- en: 'While things are getting a little bit meta here, let’s try the prompt ChatGPT
    suggested:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Given a Salesforce integration that involves multiple simultaneous
    callouts to Snowflake for retrieving specific account information, I’m concerned
    about hitting the limit on concurrent remote callouts. Can you provide details
    on how this limit might impact my user story and suggest strategies to avoid exceeding
    this limit while maintaining performance? |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | Certainly! The concurrent remote callouts limit in Salesforce
    is a critical consideration when dealing with simultaneous connections to external
    systems such as Snowflake. Hitting this limit can lead to throttling, delays,
    and even failed transactions, thereby affecting the user experience:1\. Impact
    on Your User Story: In your specific scenario, where Salesforce is making multiple
    simultaneous callouts to Snowflake to fetch account information, exceeding the
    concurrent remote callouts limit might result in some of the callouts being delayed
    or failing. Since your user story requires timely retrieval of information, hitting
    this limit can cause inconsistencies, longer loading times, or partial failures,
    depending on how the integration is structured.2\. Strategies to Avoid Exceeding
    the Limit:Implement Queuing Mechanism: By introducing a queueing system, you can
    control the number of concurrent callouts, ensuring that they are processed in
    a controlled manner. This prevents overwhelming the system while still allowing
    for efficient processing.Utilize Asynchronous Callouts with Queueable Apex: By
    handling callouts asynchronously, you can better manage the load on the system,
    distributing callouts over time and thus avoiding hitting the governor limit.Optimize
    Callout Patterns: If possible, try to group requests or minimize the number of
    simultaneous callouts required. Using Bulk API calls or reducing the frequency
    of callouts based on user behavior or needs can help in maintaining performance
    without breaching the limit.Monitoring and Error Handling: Implement robust logging,
    monitoring, and error-handling mechanisms to detect potential issues early and
    handle them gracefully. This not only provides a safeguard against hitting the
    limit but also ensures a better user experience if something goes wrong.3\. Performance
    Considerations: While implementing these strategies, it’s crucial to balance the
    need to stay within governor limits with the requirement for real-time insights.
    Careful planning, testing, and ongoing monitoring will help in finding the right
    balance that meets the business requirements without sacrificing performance.By
    understanding the specific demands of your integration and applying these strategies,
    you can develop a robust and scalable solution that aligns with Salesforce’s governor
    limits and delivers the desired user experience. It’s always a good practice to
    conduct thorough testing under simulated load conditions to validate the chosen
    approach in the real-world context of your application. |'
  prefs: []
  type: TYPE_TB
- en: While ChatGPT has made several good recommendations, it does feel like the solution
    is going down a rabbit hole of complexity. Before building a complex integration
    that still may not quickly display up-to-date Snowflake data on a near-real-time
    basis, it is worth reviewing the design options ChatGPT suggested and seeing if
    with a change in requirements, there is a straightforward way to tackle this work.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | This is getting complicated. Earlier in this thread, one of
    the options you recommended was: Implementing Scheduled Batch Jobs with Bulk API.
    While this would not meet the requirement for the Snowflake information to be
    real-time, would this approach avoid the limits you suggested might be a concern?
    |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | Yes, implementing scheduled batch jobs with the Bulk API would
    indeed circumvent many of the governor limits that might concern simultaneous
    callouts, but it does introduce a trade-off in terms of real-time data retrieval.Here’s
    how this approach works and the implications:1\. **Batch Processing**: Scheduled
    batch jobs allow you to collect multiple requests and process them as a single
    bulk operation. By aggregating requests and making fewer overall callouts, you
    significantly reduce the risk of hitting the concurrent remote callouts limit.2\.
    **Time Delay**: However, this approach inherently introduces a time delay as the
    system waits to accumulate a batch of requests before processing them. This means
    that the Snowflake data retrieval would no longer be real-time, as callouts would
    be made at scheduled intervals or once enough requests are queued.3\. **Suitability
    for Your Use Case**: If real-time retrieval of Snowflake data is a core requirement
    for your user story, this approach may not be suitable. However, if there is flexibility
    in the timing requirements or if the data can be slightly delayed without affecting
    the overall user experience, this option might be a practical solution.4\. **Scalability**:
    This approach also offers better scalability, as batching callouts allows for
    more efficient utilization of resources, making it easier to manage increased
    load as the number of users grows.5\. **Complexity**: Implementing scheduled batch
    jobs does add a layer of complexity to the system. It requires careful design
    to ensure that the batching, scheduling, and data retrieval processes are aligned
    with the business needs and user expectations.In conclusion, while implementing
    scheduled batch jobs with the Bulk API would likely alleviate governor limit concerns,
    it’s essential to weigh the trade-offs, particularly the shift away from real-time
    data access. If the real-time requirement can be relaxed, this approach offers
    an efficient and scalable solution that can be tailored to suit your specific
    integration needs. It would be prudent to collaborate with the stakeholders to
    discuss this option and ensure that it aligns with the overall objectives of the
    integration with Snowflake. |'
  prefs: []
  type: TYPE_TB
- en: ChatGPT serves as a remarkable partner and accelerator in the various stages
    of project work, from ideation to execution. It can provide invaluable insights,
    generate code snippets, analyze user stories, and offer solutions to complex technical
    challenges. The synergy of machine learning (ML) and human expertise opens doors
    to rapid innovation, efficiency, and creativity.
  prefs: []
  type: TYPE_NORMAL
- en: However, when it comes to intricate design work, especially those instances
    where the project might require suggesting changes to the foundational requirements,
    the human touch of an experienced architect or senior developer remains essential.
    While ChatGPT can furnish extensive data, ideas, and technical possibilities,
    the nuanced understanding, judgment, empathy, and strategic vision required to
    align technology with business goals are uniquely human traits. An experienced
    architect will not only consider the technical dimensions but also the broader
    organizational context, stakeholders’ needs, long-term scalability, and potential
    future directions. This ability to synthesize complex variables and navigate the
    often delicate terrain of changing requirements is something that, at least for
    the moment, requires the depth and breadth of human expertise. Therefore, while
    ChatGPT can be a vital tool in the arsenal of a development team, it complements
    rather than replaces the irreplaceable insight, wisdom, and guidance that seasoned
    human professionals bring to the table.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You’ve now enhanced your ability to harness ChatGPT for mapping out multiple
    Salesforce design strategies tailored to specific user stories. Throughout this
    chapter, you’ve absorbed the practice of critically weighing the strengths and
    limitations of each design option, underpinned by a thorough understanding of
    Salesforce’s varied methodologies and best practices. You’re now equipped to make
    more strategic decisions, with a keen eye on scalability, maintainability, and
    alignment with business objectives. The collaborative decision-making skills you’ve
    refined will serve you in fostering team consensus and driving effective, adaptable
    solutions within your Salesforce projects.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, you'll learn the art of dissecting and refining Salesforce
    features created by others. This chapter will guide you through the analytical
    process of understanding the purpose and mechanics of pre-existing Apex, teaching
    you how to assess its functionality and identify any underlying issues. You’ll
    learn how to address these issues effectively, ensuring your Apex code adheres
    to best practices and serves business needs seamlessly. Additionally, the chapter
    will highlight the importance of clear commentary in code, offering strategies
    for documenting your work to aid in future maintenance and collaboration. By the
    end of this chapter, you’ll be adept at leveraging ChatGPT to enhance your approach
    to interacting with and improving legacy Apex code, elevating your capacity for
    maintaining robust and efficient Salesforce applications.
  prefs: []
  type: TYPE_NORMAL
