- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Utility AI with Images and Videos
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Images and videos drive much of the creative space, so you’ll find many opportunities
    for AI to help organize, classify, and select parts of images and videos. Some
    of these Utility AI tasks will sometimes stray into the GenAI space, but if they’re
    covered in this chapter, these features will create new work that is very much
    based on existing work, instead of creating something entirely new.
  prefs: []
  type: TYPE_NORMAL
- en: '*Automation AI*, covered later in the book, is more about replacing your existing
    workflow, rather than augmenting it. *Utility AI* in this context is more about
    helping you find and select, rather than helping you create or doing your job
    for you.'
  prefs: []
  type: TYPE_NORMAL
- en: If you shoot photos or record videos yourself, you’ll already know how hard
    it can sometimes be to find a particular shot or clip. Personal and family photos
    eventually grow into a huge, unmanageable pile, and just like printed photos in
    a shoebox, if they’re not organized, they’ll rarely be seen again.
  prefs: []
  type: TYPE_NORMAL
- en: Cameras do create metadata (such as time, date, and location), which can help
    to locate a photo later, but they can’t find the photo where your cousin was wearing
    that shirt, or the video of the sheep scratching itself on a fence. For that,
    and for all the times when a client asks for *that shot with the thing*, AI is
    the best solution we have.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve found the shot you need, AI can help some more, selecting the person
    in the frame and letting you color-correct them separately. You can automatically
    convert a widescreen video into a portrait one and get AI to reframe all the shots
    for you. When the client sends you time-stamped feedback, you can even ask AI
    to annotate your timeline to make your editing process smoother.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, by straying slightly into the generative space, you can use AI to help
    with the conversion of photos and videos from monoscopic to stereoscopic—and even
    beyond.
  prefs: []
  type: TYPE_NORMAL
- en: Though images and videos are treated separately in other parts of the book,
    in the Utility AI arena, they are covered together. Several tools allow you to
    work with both still and moving images in the same way, and it didn’t quite make
    sense to separate them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we’ll talk about the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Organization and classification for photos and videos
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Selecting people and objects
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reframing for aspect ratio changes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stereoscopic conversion
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Managing time-stamped editing requests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Removing jump cuts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retiming video
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Upscaling images and videos
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Organization and classification for photos and videos
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Searching for a photo or video can be time-consuming if you can’t remember
    when or where you captured it, and AI can provide powerful ways to make complex
    searches easier. Note that some tools go further than search, performing aspects
    of your job for you: either automatic color correction, automatic logging, or
    outright image culling. As these tools (including **Eddie AI**, **Aftershoot**,
    and more) focus on not just organization but on automating your workflows, they
    will be covered in *Part 4* of the book, *Automation AI*.'
  prefs: []
  type: TYPE_NORMAL
- en: Most photographers use a **Digital Asset Manager** (**DAM**) to organize their
    photos, and some of these tools can also manage videos. Conversely, while most
    users would use a video editing program to manage only videos, these apps can
    also be used to manage still images. You may find that AI tools are better in
    some of these programs than others, so consider keeping an open mind when it comes
    to AI search.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll start with a simple solution that most Apple device owners will have encountered.
  prefs: []
  type: TYPE_NORMAL
- en: Apple Photos
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Apple Photos** is a basic solution for photo and video management, and although
    it may not scale to the needs of most creative professionals, it does come with
    comprehensive AI tools that many overlook. A photo taken on an iPhone will be
    automatically tagged and can be found by searching for its content, and this is
    all thanks to AI, but this feature does not rely on the space-limited and online-only
    iCloud Photo Library.'
  prefs: []
  type: TYPE_NORMAL
- en: If you have an iPhone handy, head to the **Photos** app and click the magnifying
    glass to search. Rather than typing something that metadata recorded, such as
    a date or a location, search for content—`beer`, `dancing`, or `green`. Your phone
    will find all the photos containing that subject, or activity, or color, or even
    that word written somewhere in an image or video. Yes, you can find a photo of
    a sign by searching for the text in the sign.
  prefs: []
  type: TYPE_NORMAL
- en: Amazing and useful though this is, if you’re not loading all your images into
    Photos, you won’t be able to make use of this feature. Since Photos isn’t the
    best place to edit videos, it’s unlikely you’ll store or access most video clips
    there, and you may prefer to use another app, such as Lightroom, to manage client
    photo shoots. Still, there are many ways to access powerful AI-powered search,
    and we’ll start with Photos.
  prefs: []
  type: TYPE_NORMAL
- en: Though it’s not obvious, you can create as many Photos libraries as you need
    and use one for each client or for each job if you wish. You can also load images
    and videos into Photos without duplicating them or even moving them from their
    current location.
  prefs: []
  type: TYPE_NORMAL
- en: 'To set this up, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Hold the *Option* key as you launch Photos, create a new library by clicking
    the **Create New** button, and store it on the same storage device as your images
    or videos.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Head to **Settings** and uncheck **Copy items to the Photos library**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Drag in your images and/or videos from their current location. (You can repeat
    these steps and choose your original Photos library to return to later, and you
    may also wish to re-check the **Copy items to the Photos library** checkbox.)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It’s perfectly OK to drag in images from a Final Cut Pro library, Premiere Pro
    or Resolve projects, or from a Lightroom CC library—you’ll just be using this
    for search. Unfortunately, though, AI analysis isn’t immediate, and worse, you
    can’t force it to take place. If you enter text in the search field and the pop-up
    below says **Indexing**, then you’ll just have to leave Photos running until that
    process finishes. This shortcoming may make Photos the wrong choice for quick-turnaround
    client work, but it may still be appropriate for longer-term and personal jobs.
  prefs: []
  type: TYPE_NORMAL
- en: If you can wait, searching for the content of an image or video will help you
    find things much more easily. If you want more, you’ll need to look for another
    app or plugin with similar powers—and there are many to choose from.
  prefs: []
  type: TYPE_NORMAL
- en: Excire Foto
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of a few local digital asset management tools that incorporate AI features,
    **Excire (**[https://excire.com/en/](https://excire.com/en/)) lets you search
    by text prompt, such as `girl surfing a wave` or `autumn leaves in a forest`.
    Similar to Apple Photos and Google Photos, if you tag a face with that person’s
    name, you can find other photos they appear in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Excire Foto is an independent app, but **Excire Search** is a plugin that adds
    prompt-style search to Adobe Lightroom. The advantage of using a free text-based
    search is that you’re more likely to find photos. Here, I’ve searched for `yosemite`
    on a collection of free stock photos:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.1 – These images are all judged to be Yosemite-ish](img/B34247_04_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.1 – These images are all judged to be Yosemite-ish
  prefs: []
  type: TYPE_NORMAL
- en: Though none of these images have “Yosemite” in their names, AI is able to match
    these as either taken in Yosemite National Park or looking somewhat like it. Excire
    scans and searches quickly, though some searches (such as `water`) didn’t return
    all possible images.
  prefs: []
  type: TYPE_NORMAL
- en: Peakto
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Uniquely, **Peakto** ([http://peakto.com](http://peakto.com)) doesn’t force
    you to change how you organize your photos or videos. Instead, it ingests your
    assets from their existing libraries, including Apple Photos, Adobe Lightroom,
    Capture One or Aperture, and videos managed by Final Cut Pro, Premiere Pro, or
    DaVinci Resolve. Once ingested, AI processing classifies and categorizes your
    assets, allowing you to search across your entire digital life, or just across
    a single library. This is the only tool I’ve used that can show me every photo
    I’ve ever taken of `waves` all at once.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.2 – Many hundreds of shots of waves, pulled from hundreds of GB
    of images](img/B34247_04_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.2 – Many hundreds of shots of waves, pulled from hundreds of GB of
    images
  prefs: []
  type: TYPE_NORMAL
- en: As well as enabling content-based search for your own requests, Peakto categorizes
    your images and groups them by content, color, brightness, saturation, and contrast,
    so if you need a predominantly green shot, you can find it relatively quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Peakto recently added more comprehensive video support, extending the AI search
    capabilities to video clips. You can find clips that are similar to an existing
    clip, search across multiple libraries with natural language, add keywords automatically,
    and enable workgroup access to a local device. Additionally, audio is automatically
    transcribed, so you can search through spoken dialogue too.
  prefs: []
  type: TYPE_NORMAL
- en: In my own tests with many thousands of photos and videos loaded, Peakto’s AI
    search did make it easier to find specific items. While only a few of my own jobs
    span multiple years, if you’re working on longer-term projects, Peakto’s AI search
    could help you find a needle in a haystack. Transcription search through a large
    and growing collection of video clips allows you (or a non-editor collaborator)
    to find every instance of a specific spoken word, potentially across many years
    of footage and many separate projects. Content recognition in videos is also effective—here,
    I was able to find all the clips in a single FCP library that contain statues.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.3 – Each of these video clips does indeed contain at least one statue,
    and now they’re easy to find](img/B34247_04_3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.3 – Each of these video clips does indeed contain at least one statue,
    and now they’re easy to find
  prefs: []
  type: TYPE_NORMAL
- en: Transcriptions aren’t as accurate as those found in some other apps, but they’re
    good enough to be useful. Dialogue search is something that could be done more
    slowly with a transcription search in a **non-linear** **editing** (**NLE**) app,
    but multi-library search is a unique benefit of Peakto.
  prefs: []
  type: TYPE_NORMAL
- en: ON1 Photo Keyword AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**ON1 Photo Keyword AI** ([https://www.on1.com/products/photo-keyword-ai](https://www.on1.com/products/photo-keyword-ai))
    is available as a standalone app, or as part of ON1 Photo RAW. After using AI
    to detect content-based keywords, it then embeds these keywords using industry-recognized
    XMP metadata, and is compatible with popular photo management solutions like Lightroom
    CC.'
  prefs: []
  type: TYPE_NORMAL
- en: While this solution doesn’t offer the aesthetic judgments that Peakto does,
    its results can be seen in other apps. Keywords automatically generated in this
    app can be accessed when imported into Lightroom CC and other DAMs, so you don’t
    necessarily need to change your workflow to integrate AI.
  prefs: []
  type: TYPE_NORMAL
- en: However, one shortcoming of this app is that the keywords generated may not
    be good enough to help you find an image you’re looking for. This can be an issue
    when AI generates a specific list of keywords; if you want to search for `Yosemite`
    but the AI only generates `mountain` or `landscape`, then you’re out of luck.
    Instead of typing any phrase you wish, you’ll need to look through the list of
    generated keywords.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.4 – ON1 Photo Keyword generated many keywords, but not “Yosemite”](img/B34247_04_4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.4 – ON1 Photo Keyword generated many keywords, but not “Yosemite”
  prefs: []
  type: TYPE_NORMAL
- en: This app offers a free trial, so you can try it with your own media to see if
    it could help your workflow. However, some AI-based engines take another approach
    that isn’t directly based on keywords.
  prefs: []
  type: TYPE_NORMAL
- en: Jumper
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A plugin that integrates with video editing applications (including Premiere
    Pro and Final Cut Pro, with more to come), **Jumper** ([https://getjumper.io/](https://getjumper.io/))
    can perform AI analysis across any assets shown to it, then enable search across
    them all at once. As it’s primarily designed for video, Jumper won’t just find
    a clip, but *a specific range within a clip* that contains the item you’re searching
    for. This tool does work with still images, though you’ll probably want to load
    them into your NLE to make it easier for Jumper to see them.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.5 – Jumper does need to be told which media files to index, and
    whether you want to index video, audio, or both](img/B34247_04_5.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.5 – Jumper does need to be told which media files to index, and whether
    you want to index video, audio, or both
  prefs: []
  type: TYPE_NORMAL
- en: Instead of generating a limited set of keywords that stay with the images, Jumper
    uses a fuzzy search. It can find the correct mountain image shown earlier after
    a search for `Yosemite`, even though that information appears nowhere in the metadata
    for that image.
  prefs: []
  type: TYPE_NORMAL
- en: The downside of this fuzzy approach is that Jumper always finds *something*.
    If you search for `elephant` in a group of images that definitely don’t contain
    an elephant, you’ll still be shown something. Still, given that everyone will
    search in a slightly different way, Jumper’s fuzzier approach is more likely to
    produce useful results quickly. While the initial processing can take a little
    while for videos with audio, search is nearly instant.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.6 – Yes, Jumper can find “Yosemite” images with its fuzzy search](img/B34247_04_6.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.6 – Yes, Jumper can find “Yosemite” images with its fuzzy search
  prefs: []
  type: TYPE_NORMAL
- en: Because videos and their audio are both indexed, you can search through visuals
    or the words spoken in dialogue. While you can’t access a transcript directly,
    you can search for a word or phrase to locate it quickly and then add that specific
    phrase to a timeline.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.7 – This dialogue was all correctly transcribed, and the correct
    phrase was found, along with similar phrases (thumbnails blurred for privacy)](img/B34247_04_7.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.7 – This dialogue was all correctly transcribed, and the correct phrase
    was found, along with similar phrases (thumbnails blurred for privacy)
  prefs: []
  type: TYPE_NORMAL
- en: Strada
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Early demos of Strada ([http://strada.tech](http://strada.tech)) placed a heavy
    emphasis on tagging and analysis, and it was able to assign keywords to specific
    parts of clips where objects are recognized. These selected ranges could then
    be sent back to your video editing app of choice, though FCP is the best tool
    for range-based keywords. Transcription is supported, so you can search by spoken
    dialogue too, and translation is also built in—it’s comprehensive.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.8 – An early shot of Strada during development, showing how it’s
    able to detect objects at specific times](img/B34247_04_8.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.8 – An early shot of Strada during development, showing how it’s able
    to detect objects at specific times
  prefs: []
  type: TYPE_NORMAL
- en: However, this tool is still in development and has shifted focus from cloud-only
    to local-first, though analysis is expected to return. Check on Strada’s current
    progress if you need AI keyword support for video.
  prefs: []
  type: TYPE_NORMAL
- en: Axle AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Axle AI** ([https://axle.ai](https://axle.ai)) is an AI-powered video automation
    platform that incorporates an AI-based tagging and search feature called **Axle
    AI Tags**. While we’ll return to this platform in [*Chapter 11*](Chapter_11.xhtml#_idTextAnchor183),
    tagging could be useful on its own.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.9 – Axle AI Tags performs analysis to figure out what’s in each
    section of a clip](img/B34247_04_9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.9 – Axle AI Tags performs analysis to figure out what’s in each section
    of a clip
  prefs: []
  type: TYPE_NORMAL
- en: Axle takes a slightly different approach from Jumper or Strada. Where Jumper
    doesn’t expose its search index, and Strada finds single words, Axle uses AI to
    describe what it sees in a shot, then allows you to search through that text.
    People and objects can be recognized, and this categorization can happen locally,
    on premises, not in the cloud. While it’s a more expensive solution (US$200/month)
    than Jumper, it may still be worth considering for workgroups.
  prefs: []
  type: TYPE_NORMAL
- en: While these options are more comprehensive, some other apps may be worth considering
    too.
  prefs: []
  type: TYPE_NORMAL
- en: Adobe Premiere Pro Media Intelligence
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Introduced in the Adobe Premiere Pro ([https://www.adobe.com/products/premiere.html](https://www.adobe.com/products/premiere.html))
    2025 Beta release, this feature automatically classifies media you’ve imported
    into your project and allows you to search for content with natural language.
    Though Premiere Pro is, of course, most suited for video assets, if you want to
    use this feature to search through photos, you can import them and search them
    too.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, in the analysis I’ve done to date, it isn’t as strong as Peakto,
    Excire, or Jumper; searches for `Yosemite` came up short, though keywords added
    in other apps were successfully imported here. If you’re searching for dialogue,
    the full text-based editing workflow we covered in the last chapter is excellent,
    but there are better options for content-based search. Jumper is available for
    Premiere Pro if you need the functionality, though.
  prefs: []
  type: TYPE_NORMAL
- en: Google Photos
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many of the same “smart” features that Apple Photos offers are available in
    **Google Photos** ([https://photos.google.com/](https://photos.google.com/)) too.
    Searching by content works well, faces can be recognized, and mobile apps are
    available for quick upload from those devices. However, if you’re a professional
    photographer or videographer, I’d think twice about using an online-only solution.
  prefs: []
  type: TYPE_NORMAL
- en: Even if you’re usually able to connect to the internet, at some point your connection
    will be slow or non-existent, and your workflow will collapse. RAW photos and
    original video clips are too large for many creatives to upload in bulk, so online-only
    solutions won’t work for everyone—but this might be fine for your personal phone-based
    photos.
  prefs: []
  type: TYPE_NORMAL
- en: PhotoPrism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This open-source solution ([https://www.photoprism.app/](https://www.photoprism.app/))
    runs in a container, performing AI classification and allowing you to search using
    natural language. While the AI search doesn’t seem as flexible or powerful as
    some of the other solutions here, the free, local nature of this product means
    it might still find a use for some applications.
  prefs: []
  type: TYPE_NORMAL
- en: Monument
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Available in cloud (Monument Cloud) and self-hosted (Monument 2) versions, **Monument**
    ([https://www.getmonument.com/](https://www.getmonument.com/)) offers an alternative
    to iCloud or Google Photos, or indeed to storing your images in a cloud at all.
    In either cloud or local forms, it acts as a platform- and device-independent
    photo storage system, performing AI classification to make searches easier. While
    I can see the utility of a solution such as this in a family environment, I’m
    not sure that many professionals want to keep their high-resolution original files
    on a third-party hardware device or upload them all to a cloud.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting people and objects
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Selection is at the core of retouching and photo improvement tasks, and AI-based
    area selection has improved to the point where workflows can be reinvented. Just
    a few years ago, a photographer might have to spend significant effort adjusting
    the light illuminating a person and the background behind to get the correct degree
    of subject separation.
  prefs: []
  type: TYPE_NORMAL
- en: Modern *segmentation* algorithms are now good enough to select not just a person
    quickly and accurately, but to separate parts of a person, and even separate parts
    of an eye. This allows a photographer to adjust the light on the person and the
    background independently without extensive manual selection and lets them work
    faster.
  prefs: []
  type: TYPE_NORMAL
- en: These features have been added to photo-focused apps on various platforms, and
    with varying degrees of finesse. Many Apple-made tools include automatic background
    removal, and though it’s easy to access, it’s not controllable enough for most
    professional tasks.
  prefs: []
  type: TYPE_NORMAL
- en: ML-powered subject selection appears in apps such as Pixelmator Pro, and while
    this feature is helpful in portrait photography, other tools offer more extensive
    selection options. At the time of writing, the most complete set of masking tools
    is found in Adobe **Lightroom Classic**, so let’s start there.
  prefs: []
  type: TYPE_NORMAL
- en: Lightroom Classic and Photoshop Masking
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In recent versions of **Lightroom Classic** ([https://www.adobe.com/products/photoshop-lightroom.html](https://www.adobe.com/products/photoshop-lightroom.html)),
    the masking functionality has expanded to automatically select people in an image—one,
    more, or all of the people in a shot. In the **Develop** mode, on a photo containing
    people, click the **Masking** mode icon below the **Histogram**. At the bottom
    of the **Masking** section, people in your photo will be recognized, and you’ll
    then be able to click on a person’s face to select them, or part of them.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.10 – In this illustration, all seven people can be selected individually,
    or all at once](img/B34247_04_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.10 – In this illustration, all seven people can be selected individually,
    or all at once
  prefs: []
  type: TYPE_NORMAL
- en: Of course, most images stored in Lightroom are photographs of real people, and
    image correction tasks can be quite specific—brighten the eyes, change the color
    of a top. Selecting these items was once only a task for Photoshop, but now it’s
    possible in Lightroom too.
  prefs: []
  type: TYPE_NORMAL
- en: 'Within each recognized person, you can now select the *entire* person or dig
    deeper and select just part of them: different areas of skin, eyebrows, parts
    of their eyes, lips, teeth, hair, or their clothes.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.11 – Selections like this allow you to fine-tune a person’s appearance
    without Photoshop](img/B34247_04_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.11 – Selections like this allow you to fine-tune a person’s appearance
    without Photoshop
  prefs: []
  type: TYPE_NORMAL
- en: These AI-powered selections can also recognize parts of a landscape, automatically
    segmenting skies, mountains, vegetation, water, and more.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.12 – If you select Landscape instead of a person, you can then choose
    which part of a landscape you wish to select](img/B34247_04_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.12 – If you select Landscape instead of a person, you can then choose
    which part of a landscape you wish to select
  prefs: []
  type: TYPE_NORMAL
- en: With a mask selected, all the standard Lightroom controls become available,
    allowing you to correct the color, exposure, sharpness, and more within just that
    part of the image. Tasks that once took significant effort can now be done nearly
    automatically, in a preset.
  prefs: []
  type: TYPE_NORMAL
- en: The most complex tasks still require a trip to Photoshop, and we’ll spend more
    time there in the GenAI section of the book. You’ll also find these automated
    selections in Photoshop, though they’re hidden a little deeper. Open an image,
    choose the **Object Selection** tool, and you’ll see the same selection options
    (people, eyes, etc.) in the **Options** bar at the top of the screen.
  prefs: []
  type: TYPE_NORMAL
- en: ON1 Photo RAW MAX Masking
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Comprehensive smart selections aren’t only found in Adobe’s apps; ON1’s photo
    apps can automatically segment parts of images too. While the Inspector offers
    some controls that automatically affect only part of a face, if you select an
    image without people, you’ll be able to select specific parts of that photograph
    with similar results to Lightroom.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.13 – Selecting “flora” gets most of the trees, but the selection
    near the sky is fuzzy](img/B34247_04_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.13 – Selecting “flora” gets most of the trees, but the selection near
    the sky is fuzzy
  prefs: []
  type: TYPE_NORMAL
- en: When processing an image, local selections can be accessed in the **Develop**
    tab, where you can choose exactly where to apply an automatic **Brilliance AI**
    effect, and also how strong an effect you want to use. For more control, use the
    **Local** tab to add an adjustment, then look at the floating **Properties** panel
    and pick a region in the **Masking** section. Finally, you can control the correction
    in the Inspector to the right.
  prefs: []
  type: TYPE_NORMAL
- en: For more precise control, you can also use the **Super Select AI** tool (a magic
    wand icon) and then simply click on an object to select it. This works for clearly
    defined objects, and also to select parts of a person, such as their hair. These
    masks can be adjusted by painting, but fine details around a selection’s edges
    are difficult to accurately select by hand.
  prefs: []
  type: TYPE_NORMAL
- en: In my testing, Lightroom Classic produced masks with more clearly defined edges,
    and this can be very helpful around objects such as trees and hair. The less precise
    masks in Same as above meant that the edges of complex areas became visible after
    adjustment, and I couldn’t push my corrections as far as I’d like to. Tools are
    included to adjust a mask, but that takes time, and they aren’t always enough.
  prefs: []
  type: TYPE_NORMAL
- en: These two apps aren’t the only ones with image segmentation advances; I’d expect
    this tech to spread into other image processing apps in the near future. You’ll
    also find similar tech in some video apps, starting with…
  prefs: []
  type: TYPE_NORMAL
- en: Final Cut Pro Magnetic Mask
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While automatic image segmentation is very helpful for still images, it’s almost
    a necessity for moving images. It’s just not feasible to manually adjust a selection
    24 times every second! Before AI-based selection algorithms, tracked selections
    were either painstakingly tedious to create or used large fuzzy edges to disguise
    their imprecision.
  prefs: []
  type: TYPE_NORMAL
- en: With Final Cut Pro 11, the Magnetic Mask was introduced, allowing the selection
    of many kinds of objects—even as they move around a shot or are occluded by objects
    moving in front. You start by dragging any effect or color correction to an object
    or person in the Viewer and wait for the target to be highlighted.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.14 – Your author, prepped for color correction in Final Cut Pro](img/B34247_04_14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.14 – Your author, prepped for color correction in Final Cut Pro
  prefs: []
  type: TYPE_NORMAL
- en: Selections can be fine-tuned with painting if needed, and then an entire clip
    can be analyzed. Additional Magnetic Masks added to the same clip will appear
    in different colors, and many kinds of objects can be recognized and tracked.
  prefs: []
  type: TYPE_NORMAL
- en: This feature makes the impossible possible. I’ve successfully corrected a person
    separately from the (much brighter) projection screen they sometimes walked in
    front of, in a single continuous track, in a 50-minute clip. It’s really very
    good. This builds upon (and is far more effective than) an older macOS feature
    (used in plugins such as FxFactory’s Keyper), which could automatically recognize
    people in a shot.
  prefs: []
  type: TYPE_NORMAL
- en: Still, all the major NLEs like to copy features from one another, and FCP isn’t
    the only one with this trick…
  prefs: []
  type: TYPE_NORMAL
- en: DaVinci Resolve Magic Mask
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In Resolve, the AI Magic Mask feature allows you to select which parts of a
    clip you wish to correct:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.15 – The AI Magic Mask controls with part of a clip tracked](img/B34247_04_15.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.15 – The AI Magic Mask controls with part of a clip tracked
  prefs: []
  type: TYPE_NORMAL
- en: 'Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: On the **Color** page, select the **Magic Mask** icon from the central panel,
    then adjust the controls below to increase the quality to **Better**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Starting on the first frame, click repeatedly on the image to identify which
    parts of the frame (for example, a person) you wish to correct separately. To
    see the mask, quickly adjust the exposure (or anything else) on the **Primaries**
    wheels below, or use the **Toggle Mask Overlay** button at the top right of the
    Magic Mask controls in the center. If any unwanted areas have been selected, hold
    *option* or *alt*, then click on those areas to remove them.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 4.16 – Though it wasn’t visible at first, the hand here was automatically
    added to the tracked area around the person](img/B34247_04_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.16 – Though it wasn’t visible at first, the hand here was automatically
    added to the tracked area around the person
  prefs: []
  type: TYPE_NORMAL
- en: Track the selection throughout the clip using the **Track Forward** button.
    It’s also possible to use **Track Backward** if you didn’t start at the beginning
    of a clip. Because this tool knows what people look like, if a previously unseen
    part of a body pops into frame—for example, a gesticulating hand—this will be
    automatically added to the selection.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This tool isn’t as fast as FCP’s Magnetic Mask, but it’s controllable, effective,
    and flexible. If you want to take this further, Resolve has many amazing tools
    for color correction, including the Relight effect, which can do an amazing job.
  prefs: []
  type: TYPE_NORMAL
- en: What if you’re using Adobe apps?
  prefs: []
  type: TYPE_NORMAL
- en: Premiere Pro object masking
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s taken a while, but the beta version of Premiere Pro finally added an object
    masking tool in September 2025, and it does much the same job as the tools in
    FCP and Resolve. Here’s how to use it:'
  prefs: []
  type: TYPE_NORMAL
- en: Add a clip to a sequence, then select the clip and choose the new object masking
    tool, second from last.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Wait a moment for your clip to be prepared, then hover over a person or object
    in the Program Monitor and click on it. The selection should be accurate, but
    you can use the **+** and **-** buttons to finesse it if needed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Open **Effect Controls** and look for the new **Object Mask** setting on the
    clip. Press the button in the middle of the **Tracker** controls to track in both
    directions from the current frame. A dialog box will show progress, which should
    be fairly quick.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When the track is complete, you can use this mask for color correction by switching
    to the **Color** workspace and then making a change in the **Lumetri Color** panel
    to the right. To instead mask out the background, right-click on **Object Mask**
    and choose **Use as Opacity Mask**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 4.17 — Premiere Pro Beta’s new object masking tool in action](img/B34247_04_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.17 — Premiere Pro Beta’s new object masking tool in action
  prefs: []
  type: TYPE_NORMAL
- en: This tool will be received warmly by Premiere Pro editors. Those using After
    Effects have another option with more control, though.
  prefs: []
  type: TYPE_NORMAL
- en: After Effects Roto Brush
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s see how this feature works:'
  prefs: []
  type: TYPE_NORMAL
- en: Import your clip and create a composition to hold it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Timeline** window, double-click your clip to load it in the **Layer**
    panel, then click **Roto Brush** in the tool panel at the top.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, add paint strokes over the object you want to keep. If the selection includes
    areas you don’t want, hold *option* or *alt* as you paint over those to remove
    them. The effect will automatically propagate through the rest of the clip if
    you play it with the *Spacebar*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Like the previously discussed tools, the modern **Roto Brush** is smart enough
    to add a limb that enters the frame to a selection of a person.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.18 – This arm wasn’t in the initial selection, but has been added
    automatically](img/B34247_04_18.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.18 – This arm wasn’t in the initial selection, but has been added automatically
  prefs: []
  type: TYPE_NORMAL
- en: Its speed isn’t as fast as FCP’s Magnetic Mask, but it’s a little faster than
    Resolve’s Magic Mask. Built-in features aren’t the only way to use AI in video,
    though—well-known plugins are now integrating AI features too.
  prefs: []
  type: TYPE_NORMAL
- en: Boris FX Mocha selections
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Boris FX Mocha** has been used for complex video masking tasks for many years,
    and as of mid-2025, it now includes AI assistance for the creation of the initial
    mask. Rather than using the traditional Bezier tools, a new tool allows you to
    create a new **Mask ML** layer. Clicking on the head of a person, followed by
    a second click lower down the body, is all that’s now usually needed to obtain
    a good selection—a massive time saver over manually drawn paths.'
  prefs: []
  type: TYPE_NORMAL
- en: In addition to click-based selections, you’ll also now find a prompt-based selection
    method. It’s not always perfect but typing the name of the object(s) that you’d
    like to select, such as `cars`or `people`, is a good step forward.
  prefs: []
  type: TYPE_NORMAL
- en: As the algorithms are now well-documented, I suspect many other tools will incorporate
    AI-based image segmentation. Even the most basic **Subject Selection** feature
    in Adobe InDesign’s **Text Wrap** feature can save you a trip into Photoshop,
    and in this context, the results don’t need to be pixel-perfect to be effective.
    Watch for more image segmentation features in your favorite apps sooner or later.
  prefs: []
  type: TYPE_NORMAL
- en: '**AI color correction**'
  prefs: []
  type: TYPE_NORMAL
- en: While automatic color correction tools have been present in many video and image
    editing applications for many years, you may not realize that some of these are
    based on machine learning algorithms—even some of the earliest auto corrections
    in Photoshop.
  prefs: []
  type: TYPE_NORMAL
- en: The more recent options, including the automatic options in Final Cut Pro’s
    **Color Adjustments**, are generally more useful than earlier adjustments, but
    none are perfect. While some of these features are useful as a starting point
    for further correction, I’m yet to see a magic “make it look great” button that
    works every time.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a reliable solution for consistent, serious color correction, test
    out a solution such as **Colourlab AI** ([https://colourlab.ai](https://colourlab.ai)),
    which supports many video editing applications.
  prefs: []
  type: TYPE_NORMAL
- en: AI-powered subject selection also helps with reframing when changing aspect
    ratio—let’s take a look.
  prefs: []
  type: TYPE_NORMAL
- en: Reframing for aspect ratio changes
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With the rise of vertical social media videos, aspect ratio changes (usually
    from widescreen to portrait) have become more common. Converting between these
    formats isn’t always trivial, and I recommend shooting wider than normal, zooming
    in on the widescreen version, and cropping the edges of the portrait version.
    If your camera allows you to shoot “open gate,” then you can simply crop that
    taller frame (`4:3` or `3:2`) to widescreen and to portrait independently.
  prefs: []
  type: TYPE_NORMAL
- en: However you shoot, each clip in an edit will need to be adjusted when transitioning
    between aspect ratios, and all the major NLEs include a feature to make this smoother.
    Let’s explore each.
  prefs: []
  type: TYPE_NORMAL
- en: Final Cut Pro
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Right-click on a project (i.e., a timeline) in the **Browser**.Choose **Duplicate
    Project As**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the subsequent dialog, choose the new aspect ratio (likely **Vertical**)
    and a resolution, then check **Smart Conform**. Each clip will be repositioned,
    using machine learning to pick the most important part of the shot.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Play through the sequence and adjust position and/or scale if needed. Note that
    though you can add animation yourself, FCP won’t track movement for you; it picks
    a single position and sticks to it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Premiere Pro
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Right-click on a sequence, then choose **Auto Reframe Sequence**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the dialog that appears, choose your new aspect ratio, likely **Vertical**.
    Note that the new sequence uses the name of the current sequence with the new
    aspect ratio in parentheses, such as `Sequence Name (9x16)`, and it will be created
    in a new bin (i.e., folder) called `Auto Reframed Sequences`. In this bin, find
    the new sequence (with the aspect ratio in the name), right-click, then choose
    **Sequence Settings**. Check that the frame size meets your needs—because Premiere
    only adjusts the width of a sequence rather than exchanging width and height,
    and you may prefer to use `1080x1920` for vertical videos.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Play through the sequence and check that each clip looks right. While Premiere
    will adjust framing within a shot, this animation isn’t always what you want,
    and the easiest fix is to turn the **Auto Reframe** effect off.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To do this on each clip that needs it, find the **Effect Controls** panel, then
    click the “fx” icon next to **Auto Reframe**. To reset the position, right-click
    that clip in the timeline and choose **Fill** to fill the frame. In **Effect Controls**
    or **Properties**, adjust scale and position if needed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: DaVinci Resolve (Studio version)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Right-click a timeline and duplicate it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rename the new timeline with the target aspect ratio.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Right-click and choose **Timeline Settings**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Uncheck **Use Project Settings** at the lower left, then choose **Custom** in
    the **Timeline Resolution** menu at the top.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Type in the desired target resolution.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Mismatched Resolution** menu at the bottom, choose **Scale full frame
    with crop**. In the **Inspector**, in the **Transform** section, look for **AI
    Smart Reframe** at the bottom of the section. Within this section, leave **Object
    of Interest** set to **Auto**, and press **Reframe** to track throughout the shot.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If this isn’t successful, change **Auto** to **Reference Point**, then move
    the box that appears onto the object or person you want to keep centered in shot.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Reframe** again, wait for processing, and that area will stay in the
    middle of your reframed image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: No matter which tool you choose, you’ll be able to get at least some assistance
    with reframing.
  prefs: []
  type: TYPE_NORMAL
- en: Stereoscopic conversion
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Stereoscopy**, the capture of stereoscopic photographs, has been popular
    for over a hundred years, and stereoscopic video has been popular (on and off)
    since the 1950s. To capture stereoscopic photos or videos, normally a left and
    right image must be recorded at the same time, either using a camera with two
    lenses or two synced independent cameras.'
  prefs: []
  type: TYPE_NORMAL
- en: However, most images are obviously captured in 2D. Because viewers using a device
    such as an Apple Vision Pro can see images in 3D, machine learning algorithms
    have now made it possible to turn a 2D image into 3D. This involves image segmentation
    and depth recreation to decide which parts of the image are closer to the camera
    and which are further away, and also a generative component, to fill in any missing
    areas behind foreground objects.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.19 – This video, shot in 2D and converted with Owl3D, has impressive
    depth that’s hard to share on a 2D page](img/B34247_04_19.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.19 – This video, shot in 2D and converted with Owl3D, has impressive
    depth that’s hard to share on a 2D page
  prefs: []
  type: TYPE_NORMAL
- en: In the latest visionOS, it’s possible to create not just a stereoscopic version
    of the image, but a 3D version of the image with freedom to move your viewpoint
    in any direction. This is known as a **spatial scene**, and so far, it’s even
    more effective than the previously available spatial photo conversion. Currently,
    this is built into the OS but is not something that’s available to common third-party
    apps.
  prefs: []
  type: TYPE_NORMAL
- en: Third-party apps can transform video from 2D to 3D with varying levels of success.
    The best results I’ve seen have been with Owl3D (which offers Mac and PC apps),
    but it’s possible to perform live conversion at a lower quality with apps such
    as Moon Player, directly on the Apple Vision Pro. While the output from these
    apps isn’t perfect, the quality of 3D conversion is likely to continue to improve.
    Today, if you want to create a stereo image, it’s best to capture in stereo, but
    watch for improvements in this space.
  prefs: []
  type: TYPE_NORMAL
- en: Managing time-stamped editing requests
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: During video (and audio) production, it’s common to receive feedback requests,
    asking for specific words or time-stamped areas to be removed, for an alternative
    take, for a shot to be replaced, or for an effect to be changed. But if a request
    affects the length of a shot, it can make other requests more difficult to interpret.
    For example, if a 5-second shot is to be removed at the start of a timeline, the
    time stamps of all other requests after that point will be invalid and difficult
    to follow.
  prefs: []
  type: TYPE_NORMAL
- en: One old-school way to solve this problem is to tackle the list backwards, starting
    at the end, so that earlier timecodes in a change list remain valid. But this
    doesn’t always work well; sometimes one request relates to an earlier change,
    and context means it’s usually easier to edit from start to finish. What’s the
    solution?
  prefs: []
  type: TYPE_NORMAL
- en: Markers provide a great way to solve this issue, allowing you to add a virtual
    sticky note to every spot on a timeline where a client has asked for a change.
    Markers exist in all common NLEs, and the shortcut key *M* will add a marker to
    a timeline clip in Resolve, Final Cut Pro, and Premiere Pro. Because a marker
    is attached to a clip and not just a timecode, markers will move when clips are
    deleted from a timeline, so you can tackle a change list from start to finish.
  prefs: []
  type: TYPE_NORMAL
- en: 'Adding all those notes by hand can be a little tedious, though, and if you
    use Final Cut Pro, the **Marker Toolbox** app can use AI to process a client-friendly
    list of timecodes into *to-do* markers with instructions attached. (Marker Toolbox
    can also convert comments from online review sites such as Vimeo and Frame.io
    to timeline markers.) This gives the best possible experience for an editor and
    for their client, and they just need to give their notes a very loose structure.
    For example, they could write the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '`5 secs end this shot here`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`0:35 replace this shot`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`0:47 cut this section from here`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`0:52 end cut here`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`1min 23sec fix spelling in title, should be "Jeri"`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`1:53 check long blank section at end?`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Marker Toolbox, packaged as a Final Cut Pro workflow extension, can turn all
    that into sensible markers on an editing timeline very quickly. If your clients
    can follow simple rules for writing text like the preceding example, it’s going
    to work just fine. If the requests are less well formatted, AI processing from
    ChatGPT (or a local LLM) will make sense of them. After installation, you’ll need
    to click the plugin icon to access the installed **Workflow Extensions**, then
    choose **Marker Toolbox**. Click **Settings** (below the text areas) and make
    sure the frame rate in this dialog matches your timeline.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.20 – Rough instructions on the left become accurate time stamps
    on the right, ready to drag into a timeline](img/B34247_04_20.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.20 – Rough instructions on the left become accurate time stamps on
    the right, ready to drag into a timeline
  prefs: []
  type: TYPE_NORMAL
- en: As shown in *Figure 4.20*, paste your client’s feedback into the left-hand text
    pane, then click **Process Comments Locally**. You’ll now see the processed change
    list on the right, and if the client expressed themselves clearly, it should be
    fine. If not, you can reprocess with ChatGPT by adding an API key (accessible
    in a paid account) into settings and then clicking **Process Comments with ChatGPT**.
    The developer plans to add support for Apple Intelligence local processing soon.
  prefs: []
  type: TYPE_NORMAL
- en: Assuming you now have good results on the right, drag the green icon at the
    lower right to the start of your timeline in Final Cut Pro, visible behind this
    window.
  prefs: []
  type: TYPE_NORMAL
- en: In this example timeline, markers are placed onto titles, each containing the
    same feedback, all within a new compound clip containing a time-coded stream.
    To enable the markers to flow along with changes, select the newly added clip,
    then choose **Clip** > **Break Apart Clip Items**. Finally, delete the Timecode
    track that’s created.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.21 – The first marker in the list can be seen in the timeline—note
    that the title connects to the clip and the marker is on the title](img/B34247_04_21.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.21 – The first marker in the list can be seen in the timeline—note
    that the title connects to the clip and the marker is on the title
  prefs: []
  type: TYPE_NORMAL
- en: Markers (with accompanying titles) now connect directly to the clips below them
    and will stay connected to the right clips as changes are made. All markers can
    be seen in the Timeline **Index**, to the left of the timeline, in the **Tags**
    section. This workflow doesn’t use a lot of AI, but it makes a common task easier
    and allows clients to express themselves more freely.
  prefs: []
  type: TYPE_NORMAL
- en: Another feature clients will enjoy is removing their mistakes, which you can
    sometimes do without leaving a trace.
  prefs: []
  type: TYPE_NORMAL
- en: Removing jump cuts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Hiding an edit in plain sight is a feature that is common in editing applications
    today, and though it’s not part of the modern AI toolset, it’s still powered by
    machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: In any major NLE, you’ll just need to place a talking head video on a timeline,
    then remove part of it to create a jump cut. You can do this by selecting two
    separate ranges in a source clip and then adding them sequentially to a timeline,
    or by using the Razor or Blade tool, making a couple of cuts, then selecting that
    section in the middle and performing a ripple delete.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the end of the day, technique is up to you, but you’ll want to end up with
    two clips in which the same person is in roughly the same position. Ideally, the
    two shots should be as similar as possible: eyes open in both, head facing the
    same direction, and so on. Avoid situations where part of their body (such as
    a hand) is visible in one shot but not the other, or you can end up with a mess
    like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.22 – Flow, Morph, and Smooth Cut will all fail if you try to blend
    two frames like this, with different hand positions](img/B34247_04_22.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.22 – Flow, Morph, and Smooth Cut will all fail if you try to blend
    two frames like this, with different hand positions
  prefs: []
  type: TYPE_NORMAL
- en: Now, you’ll need to find the right transition. In Final Cut Pro, this is the
    Flow transition; in Premiere Pro, it’s the Morph Cut; in DaVinci Resolve, it’s
    the Smooth Cut. Apply the transition, wait for processing, then play it back.
    The transition will use machine learning techniques to morph one clip into another,
    but no matter which one you use, it’s unlikely to look great the first time. Experiment
    with the duration of the transition; often, shorter is better, perhaps just a
    few frames. Also experiment with the exact timing of the transition by rolling
    the edit back or forward a few frames. Sometimes this takes a little tweaking.
  prefs: []
  type: TYPE_NORMAL
- en: The most reliable solution is to coach your subject, asking them to pause, reset,
    and relax between sentences. If they can get back into roughly the same position
    with a similar facial expression before starting each sentence, you’ll have much
    more luck trying to mash one shot into another than if each shot is wildly different.
  prefs: []
  type: TYPE_NORMAL
- en: 'Still, sometimes this transition simply doesn’t work. In those situations,
    try to mask the edit another way: cut to b-roll, cut to a different angle, or
    punch in with a quick zoom on the second clip. The usual non-AI techniques are
    still available; this is just another tool in your box of tricks.'
  prefs: []
  type: TYPE_NORMAL
- en: Something else that could be useful is retiming, and while optical flow retiming
    is common across many apps, the best machine learning slow motion is currently
    found in Final Cut Pro. Let’s slow down some clips.
  prefs: []
  type: TYPE_NORMAL
- en: Video retiming
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While it’s still best to record at a high frame rate for the best quality slow
    motion effects, sometimes the decision to slow video down is made after shooting.
    Also, most cameras face a limit in the maximum frame rate they can offer at a
    particular resolution, and it may not be possible to capture at the resolution
    and frame rate that’s desired.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, it may be necessary to create new intermediate frames in the post-production
    process, and a method known as **optical flow** is available in many apps. While
    this algorithm has been useful, new machine learning algorithms have been added
    in Final Cut Pro, in the Super Slo-Mo feature, and they’re a huge step up in quality.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.23 – The Smooth Slo-Mo option uses machine learning to interpolate
    needed frames, with excellent results](img/B34247_04_23.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.23 – The Smooth Slo-Mo option uses machine learning to interpolate
    needed frames, with excellent results
  prefs: []
  type: TYPE_NORMAL
- en: With a clip selected in a timeline, choose **Smooth Slo-Mo** from the **Retiming**
    menu below the **Viewer**, then pick a percentage to use as a starting point.
    Using advanced interpolation, new intermediate frames will be created to fill
    any gaps, and the AI does an excellent job. Compressor also offers this advanced
    retiming option.
  prefs: []
  type: TYPE_NORMAL
- en: 'While DaVinci Resolve and Adobe Premiere can’t quite match this quality just
    yet, free apps such as FlowFrames could be a useful substitute, and it’s also
    possible in an app better known for upscaling: Topaz AI Video.'
  prefs: []
  type: TYPE_NORMAL
- en: Upscaling images and videos
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Increasing the detail or resolution in an image is a task that image processing
    utilities have handled for years, but without AI, there are limits as to how far
    you can push. Videos also sometimes need to be sharpened or upscaled, and this
    can be a more specialized task. Today, AI tools are offered in many applications
    and have become somewhat mainstream.
  prefs: []
  type: TYPE_NORMAL
- en: 'In production terms, these tools are simple to use; you’ll input a low-resolution
    image, run the process, and you’ll receive a higher resolution image. Depending
    on how bad the original image or video is, you may prefer to process it before
    you upscale, or afterwards. In general, if an image is really poor, you may wish
    to upscale first before doing a manual cleanup pass afterwards. However, if you’re
    starting with a decent image and trying to make it very large, try this:'
  prefs: []
  type: TYPE_NORMAL
- en: Save your original layered image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Save a flattened copy of that image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Upscale that flattened copy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why? Simply, very high-resolution images with layers can become quite large
    and hard to work with. I’ve upscaled images for trade show displays that have
    ended up over 500 MB for a single image, and while that isn’t much in video terms,
    it’s slow to load and save in Photoshop.
  prefs: []
  type: TYPE_NORMAL
- en: For best results, try to exactly double the image’s size. In fact, many tools
    will only make an image 2x larger, and if you need more than that, you’ll simply
    run the process twice. As usual, the more you try to do, the less likely you are
    to get away with it—there’s no substitute for real pixels, and if you want to
    cover a large display at 300 dpi, you should start with a high-resolution image.
  prefs: []
  type: TYPE_NORMAL
- en: 'While there are many options (read on for some suggestions), probably the best-known
    image and video enhancers come from Topaz Labs. They offer a suite of desktop
    products: **Photo AI**, a cheaper, upscaling-focused **Gigapixel AI**, and a more
    expensive **Video AI**. In addition to the desktop apps, Topaz has several web
    apps that offer upscaling and other improvements for images and video. For most
    production needs, I’d recommend local processing, but if you have a lower-powered
    machine, you may need to use cloud processing at an extra cost.'
  prefs: []
  type: TYPE_NORMAL
- en: While there is a generative component in all these apps—they do invent detail,
    after all—I’ve included them in this section of the book because they’re not trying
    to create something from nothing. However, at their more extreme settings, some
    of the shapes and textural details produced by these apps can tend towards the
    artificial. To avoid this, be sure to capture at the highest quality possible
    and use these as a slight step up.
  prefs: []
  type: TYPE_NORMAL
- en: The results from these apps can be very good, though processing can be slow.
    AI-based noise removal can really help clean up grainy images, and the other tools
    here help with recovering from missed focus, with color balance, and, of course,
    upscaling helps when you need more resolution than you could capture.
  prefs: []
  type: TYPE_NORMAL
- en: 'As AI image improvement algorithms have become somewhat mainstream, other apps
    also offer AI-based tools that can perform some of these tasks, including the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Adobe Photoshop** has many AI features—**Neural Filters**, which include
    a **Super Zoom** **upscaler** and a Photo Restoration module (among others) plus
    a **Generative Upscale** feature that can be used with Topaz models if you wish.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pixelmator Pro’s Super Resolution** feature, which doubles image resolution
    with minimal quality loss.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DaVinci Resolve’s AI Super Scale**, which offers 2x to 4x upscaling with
    sharpening and noise reduction built in.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Upscayl**, which offers a free desktop app capable of 2x to 16x still image
    upscaling. Paid cloud upscaling is also available.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apple’s macOS 26 includes APIs for video filters, which will allow apps to upscale,
    perform video retiming, add motion blur, reduce noise, and add sharpening, even
    in real time on a video call.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 4.24 – Photoshop includes several Neural Filters, but Super Zoom is
    probably the most immediately useful](img/B34247_04_24.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.24 – Photoshop includes several Neural Filters, but Super Zoom is probably
    the most immediately useful
  prefs: []
  type: TYPE_NORMAL
- en: Because many GenAI services tend to create low-resolution images, they will
    often also include upscaling features. Always be careful that upscaling hasn’t
    invented false details (some of these are technically *GenAI*, after all) and
    start from the best source you can find.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Machine learning continues to have a big impact on many image processing pipelines.
    While it’s helpful to be able to find an image in a massive collection, it’s even
    more powerful to be able to find a specific moment in a video. Once you’ve found
    that shot, it’s incredibly handy to be able to relight someone’s face, even as
    they move around. You can then use AI to help you deal with client change requests,
    reframe for a new aspect ratio, make a video much slower, or create a much larger
    version of an image.
  prefs: []
  type: TYPE_NORMAL
- en: While your production pipeline is unlikely to use all these techniques, they
    can make it easier to say *yes* to a client’s requests, make your workflows smoother,
    and they’ll still leave your creativity at the heart of what you make. We’re not
    done yet; later in the book, in *Part 4*, on *Automation AI*, we’ll discuss techniques
    that could change your workflow entirely.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll look at Utility AI as it relates to text. Although
    creative production usually revolves around images, videos, or music, text is
    still behind scripts, instructions, and many interactions with clients, so it’s
    worth a deeper look.
  prefs: []
  type: TYPE_NORMAL
