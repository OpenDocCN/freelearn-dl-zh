  type: TYPE_NORMAL
- en: 'To be able to play with the prompts in this chapter, you will need to create
    an account with one or more of these tools:'
  prefs: []
  type: TYPE_NORMAL
- en: '**OpenAI** **ChatGPT**: [https://chat.openai.com/](https://chat.openai.com/).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once you create an account, if you haven’t created one already, you can upgrade
    to ChatGPT Plus for $20/month. This is not required to take advantage of this
    book.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Google** **Bard**: [https://bard.google.com/](https://bard.google.com/).'
  prefs:
