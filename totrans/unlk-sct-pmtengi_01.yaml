  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Anthropic** **Claude**: [https://console.anthropic.com/](https://console.anthropic.com/)'
- en: We will start with an introduction to LLM prompts, how they work, and what type
    of prompt we can use to produce the best possible results.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从LLM提示的介绍开始，了解它们是如何工作的，以及我们可以使用哪种类型的提示来产生最佳结果。
- en: Introducing LLM prompts
  id: totrans-31
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍LLM提示
- en: LLMs have revolutionized the way we interact with technology, shaping our digital
    landscape and transforming the way we communicate, learn, and innovate. At the
    forefront of this revolution are large-scale LLMs such as OpenA GPT-4, Google
    LaMDA, and Anthropic. These language models can be used programmatically using
    their APIs or throughout their chat interfaces. These interfaces are called OpenAI
    ChatGPT, Google Bard, and Anthropic Claude, respectively.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs已经彻底改变了我们与技术互动的方式，塑造了我们的数字景观，并改变了我们沟通、学习和创新的方式。在这场革命的最前沿是像OpenAI GPT-4、Google
    LaMDA和Anthropic这样的大规模LLM。这些语言模型可以通过它们的API或通过它们的聊天界面程序化地使用。这些界面分别被称为OpenAI ChatGPT、Google
    Bard和Anthropic Claude。
- en: Prompt engineering is the process of designing and refining input prompts for
    LLMs to achieve desired outputs. While it may initially seem trivial or purely
    technical, it is, in fact, a multidisciplinary endeavor. It demands a comprehensive
    understanding of linguistics, cognitive science, **artificial intelligence** (**AI**),
    user experience design, and ethics, among other fields. The goal of this chapter
    is to provide a comprehensive framework for understanding and mastering the intricacies
    of prompt engineering, equipping you with the necessary tools to harness the full
    potential of LLMs.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是为LLM设计和完善输入提示以实现所需输出的过程。虽然它可能最初看起来微不足道或纯粹是技术性的，但实际上，它是一个多学科的努力。它要求对语言学、认知科学、**人工智能**（**AI**）、用户体验设计和伦理学等多个领域的全面理解。本章的目标是提供一个全面的框架来理解和掌握提示工程的复杂性，并为你提供利用LLMs全部潜力的必要工具。
- en: How LLM prompts work
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM提示是如何工作的
- en: Large-scale LLMs are a form of AI that focuses on understanding and generating
    human language. They use sophisticated machine learning algorithms, primarily
    neural networks, to process and analyze a massive amount of textual data. The
    main objective of LLMs is to produce coherent, contextually relevant, and human-like
    responses to given input prompts. To comprehend how LLMs function, it’s crucial
    to discuss their underlying architecture and the training process. Using some
    analogies to explain these concepts will make them easier to understand.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 大规模LLM是一种专注于理解和生成人类语言的AI形式。它们使用复杂的机器学习算法，主要是神经网络，来处理和分析大量文本数据。LLM的主要目标是针对给定的输入提示产生连贯、上下文相关且类似人类的响应。要理解LLM是如何工作的，讨论其底层架构和训练过程至关重要。使用一些类比来解释这些概念将使它们更容易理解。
- en: Architecture
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 架构
- en: LLMs, such as OpenAI’s GPT-4, are made using a special type of neural network
    called the Transformer. Transformers have a special structure that helps them
    work well with text.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs，如OpenAI的GPT-4，是使用一种称为Transformer的特殊类型的神经网络制作的。Transformer具有一种特殊的结构，有助于它们很好地处理文本。
- en: One important thing in Transformers is self-attention. This means that the model
    can focus on different parts of a sentence and decide which words are more important
    in a particular context. It’s like giving attention to the words that matter the
    most.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer 中的一个重要特点是自注意力。这意味着模型可以关注句子的不同部分，并决定在特定上下文中哪些词更重要。这就像关注最重要的词。
- en: Another thing Transformers use is positional encoding. This helps the model
    keep track of where each word is in a sentence. It’s like giving each word a special
    label so that the model knows where it belongs in the sequence.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个 Transformer 使用的是位置编码。这有助于模型跟踪每个词在句子中的位置。这就像给每个词一个特殊的标签，以便模型知道它在序列中的位置。
- en: With these features, LLMs can process and understand long pieces of text well.
    They can figure out the meaning of words based on the context they appear in and
    remember the order of words in a sentence.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 带有这些特性，LLM 可以很好地处理和理解长篇文本。它们可以根据它们出现的上下文理解单词的意义，并记住句子中单词的顺序。
- en: LLM training
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM 训练
- en: 'The training process for an LLM consists of two main phases: pre-training and
    fine-tuning. LLMs are like extremely skilled language students. During their training,
    they go through these two main phases.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 的训练过程包括两个主要阶段：预训练和微调。LLM 像极富语言技巧的学生。在训练过程中，它们会经历这两个主要阶段。
- en: Pre-training
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预训练
- en: In this first phase, the LLM is exposed to massive amounts of text from books,
    articles, websites, and more. It’s like it gets to read a huge library full of
    diverse information.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个第一阶段，LLM 被暴露于来自书籍、文章、网站等的大量文本。这就像它有机会阅读一个充满各种信息的巨大图书馆。
- en: 'As the LLM reviews all this text, it starts to pick up on patterns in how language
    is structured. The LLM learns things such as the following:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当 LLM 审查所有这些文本时，它开始注意到语言结构的模式。LLM 学习以下内容：
- en: Which words tend to follow each other (the probability of “dog” being followed
    by “bark”)
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些单词倾向于相互跟随（“dog”后面跟“bark”的概率）
- en: The grammar and sentence structure of different languages (where the verb goes
    in a sentence)
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同语言的语法和句子结构（动词在句子中的位置）
- en: The topics and concepts that certain words relate to (learning that “dog” and
    “puppy” are connected to animals, pets, and so on)
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 某些单词相关的主题和概念（学习“dog”和“puppy”与动物、宠物等相关联）
- en: To process all this text, the LLM breaks it down into smaller digestible pieces,
    kind of like chewing language into bite-sized chunks. This process is called chunking.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了处理所有这些文本，LLM 将其分解成更小的、易于消化的部分，有点像将语言咀嚼成一口大小的块。这个过程称为分块。
- en: The LLM chops up sentences into smaller parts called tokens. Tokens can be individual
    words, partial words, or even special characters such as punctuation.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 将句子分割成更小的部分，称为标记。标记可以是单个单词、部分单词，甚至是特殊字符，如标点符号。
- en: After chunking the text, the LLM embeds or encodes each token into a numerical
    vector, which is like giving each token a mathematical representation – for example,
    translating *dog* into something like *[0.51, 0.72, 0.33,...]* for the computer
    to process. This process is called embedding.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在将文本分割成块之后，LLM 将每个标记嵌入或编码成一个数值向量，这就像给每个标记一个数学表示——例如，将 *dog* 翻译成类似 *[0.51, 0.72,
    0.33,...]* 的形式，以便计算机处理。这个过程称为嵌入。
- en: It’s like translating a sentence from English into numbers. Instead of words,
    each token now has a corresponding vector of numbers that computers can understand.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像将句子从英语翻译成数字。不是用单词，每个标记现在都有一个对应的数字向量，计算机可以理解。
- en: This embedding process captures information about the meaning of each token
    based on the patterns the LLM learned from its extensive pre-training. Tokens
    with similar meanings get embedded closer together in the vector space.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这个嵌入过程基于 LLM 从其广泛的预训练中学习到的模式，捕捉每个标记的意义信息。具有相似意义的标记在向量空间中嵌入得更近。
- en: All these numerical token vectors get stored in the LLM’s vector database, which
    it can use later to look up tokens and analyze their relationships to other tokens.
    This vector database is like a mathematical library index for the LLM.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些数值标记向量都存储在 LLM 的向量数据库中，它可以在以后查找标记并分析它们与其他标记之间的关系。这个向量数据库就像是 LLM 的数学图书馆索引。
- en: So, in pre-training, the LLM forms connections between words and concepts by
    analyzing massive amounts of text and storing the patterns in its complex neural
    network brain. Thus, the LLM stores that *dog* and *puppy* have similar vector
    representations since they have related meanings and contexts.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在预训练中，LLM通过分析大量文本并在其复杂的神经网络大脑中存储模式，在单词和概念之间建立联系。因此，LLM存储了“*狗*”和“*小狗*”具有相似的向量表示，因为它们具有相关的意义和上下文。
- en: However, *dog* and *bicycle* are farther apart since they are semantically different.
    The vector space organizes words by their similarities and differences.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，“*狗*”和“*自行车*”在语义上不同，因此它们之间的距离更远。向量空间根据它们的相似性和差异性组织单词。
- en: Fine-tuning
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微调
- en: After pre-training, the LLM moves on to the fine-tuning phase. Here, it receives
    additional training on smaller datasets that are relevant to specific tasks.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在预训练之后，LLM进入微调阶段。在这里，它会在与特定任务相关的小型数据集上接受额外的训练。
- en: This is like having the LLM focus on particular areas of study after completing
    general education – for example, taking advanced biology classes after learning
    fundamentals in science.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像LLM在完成通识教育后专注于特定的研究领域——例如，在掌握科学基础知识后学习高级生物学课程。
- en: In fine-tuning, the LLM practices generating outputs for specific tasks based
    on labeled example data. Labeled data refers to data that has been annotated with
    labels that categorize or describe the contents. These labels help train models
    by providing examples of the expected output.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调过程中，大型语言模型（LLM）根据标记的示例数据练习生成特定任务的输出。标记数据是指已经用标签进行注释的数据，这些标签将内容分类或描述。这些标签通过提供预期输出的示例来帮助训练模型。
- en: When you later provide the LLM with a new prompt, it uses the patterns learned
    in pre-training and fine-tuning to analyze the prompt and generate a fitting response.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当你后来向LLM提供新的提示时，它使用在预训练和微调中学习的模式来分析提示并生成合适的响应。
- en: The LLM doesn’t truly understand language like humans. But by recognizing patterns
    from tons of examples in its training, it can imitate human-like responses and
    be a highly capable language learner.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: LLM并不真正像人类一样理解语言。但通过从其训练中的大量示例中识别模式，它可以模仿类似人类的响应，并成为一个高度胜任的语言学习者。
- en: Additionally, these vector representations can be used for various natural language
    processing tasks, such as sentiment analysis, topic modeling, and document classification.
    By comparing the vectors of words or phrases, algorithms can determine the similarity
    or relatedness of the concepts they represent, which is essential for many advanced
    language understanding and generation tasks.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这些向量表示可以用于各种自然语言处理任务，如情感分析、主题建模和文档分类。通过比较单词或短语的向量，算法可以确定它们所代表的概念的相似性或相关性，这对于许多高级语言理解和生成任务至关重要。
- en: 'A critical factor for all models is the context window – the amount of text
    a model can consider at once – which affects coherence and depth during interactions.
    In particular, the context window matters for the following reasons:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有模型来说，一个关键因素是上下文窗口——模型一次可以考虑的文本量——这会影响交互中的连贯性和深度。特别是，上下文窗口对于以下原因很重要：
- en: '**Coherence and relevance**: A larger context window lets the model maintain
    the thread of a conversation or document, leading to more coherent and contextually
    relevant responses'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**连贯性和相关性**：更大的上下文窗口允许模型保持对话或文档的线索，从而产生更连贯和上下文相关的响应。'
- en: '**Text generation**: For tasks such as writing articles, stories, or code,
    a larger context window enables the model to generate content that is consistent
    with previous sections'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本生成**：对于撰写文章、故事或代码等任务，更大的上下文窗口使模型能够生成与前一部分内容一致的内容。'
- en: '**Conversation depth**: In dialogue systems, a larger context window allows
    the AI to remember and refer to earlier parts of the conversation, creating a
    more engaging and natural interaction'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话深度**：在对话系统中，更大的上下文窗口允许AI记住并引用对话的早期部分，从而创建更吸引人和自然的交互。'
- en: '**Knowledge retrieval**: For tasks that require referencing large bodies of
    text or pulling from multiple segments in a document, a larger context window
    allows the model to cross-reference and synthesize information more effectively'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识检索**：对于需要参考大量文本或从文档的多个部分提取信息的任务，更大的上下文窗口允许模型更有效地交叉引用和综合信息。'
- en: However, there are trade-offs, as larger context windows require more computational
    power and memory to process. This can impact response times and costs. It is a
    key area of differentiation among LLMs as improvements to the context window can
    significantly enhance the usability and adaptability of the model in complex tasks.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，存在权衡，因为更大的上下文窗口需要更多的计算能力和内存来处理。这可能会影响响应时间和成本。这是 LLM 之间差异的关键领域，因为上下文窗口的改进可以显著提高模型在复杂任务中的可用性和适应性。
- en: Claude 2 has a context window of 100,000 tokens, while the new GPT-4-turbo-1106-
    review has a context window of 128,000 tokens. In English, the average number
    of words per 1,000 tokens is around 750\. Researchers are predicting models with
    one million-plus tokens by 2024.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: Claude 2 的上下文窗口为 100,000 个标记，而新的 GPT-4-turbo-1106- 评测的上下文窗口为 128,000 个标记。在英语中，每
    1,000 个标记的平均单词数约为 750。研究人员预测到 2024 年将出现一百万以上标记的模型。
- en: A journey from prompt to reply – how inference helps LLMs fill in the blanks
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从提示到回复的旅程——推理如何帮助 LLM 填补空白
- en: Once an LLM finishes its training, it’s ready to start generating responses
    to the prompts users provide it.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦 LLM 完成训练，它就准备好开始生成对用户提供的提示的响应。
- en: When a user inputs a prompt, that prompt gets fed into the LLM’s neural network
    brain. The LLM has special components in its brain architecture that help analyze
    the prompt.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户输入一个提示时，该提示被输入到 LLM 的神经网络大脑中。LLM 在其大脑架构中具有特殊组件，有助于分析提示。
- en: One part pays extra close attention to the most relevant words for the context,
    kind of like how we focus on key words when reading.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一部分特别关注上下文中最相关的单词，有点像我们在阅读时关注关键词一样。
- en: Another component remembers the order of the words and where they’re located
    in the prompt, which is important for getting the context right.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个组件记得单词的顺序以及它们在提示中的位置，这对于正确获取上下文很重要。
- en: Using its brain components, the LLM generates a list of words that could logically
    come next in the response. It assigns a probability score to each potential next
    word.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 使用其大脑组件，LLM 生成一个可能逻辑上接下来在响应中出现的单词列表。它为每个可能的下一个单词分配一个概率分数。
- en: Then, the LLM uses a technique called decoding to pick the top word options
    and turn those into its final response.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，LLM 使用一种称为解码的技术来选择最佳单词选项，并将它们转换为其最终响应。
- en: It might greedily choose the single most likely next word. Or it may randomly
    select from a few of the most probable candidates, to make the response less repetitive
    and more human-sounding.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它可能会贪婪地选择最有可能的下一个单词。或者它可能从几个最可能的候选人中随机选择，以使响应不那么重复，听起来更像人类。
- en: So, in summary, the LLM’s special brain architecture helps it pay attention
    to the right words, remember their order, and assign probabilities to the next
    words. Then, it decodes the top choices into a response that fits the prompt appropriately.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，总的来说，LLM 的特殊大脑架构帮助它关注正确的单词，记住它们的顺序，并为下一个单词分配概率。然后，它将最佳选择解码成符合提示的响应。
- en: This process allows the LLM to generate very human-like responses that continue
    the conversation sensibly, based on the initial prompt provided by the user.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程使得 LLM 能够生成非常类似人类的响应，根据用户提供的初始提示合理地继续对话。
- en: One of the key strengths of LLMs is their ability to perform *few-shot* or *zero-shot*
    learning. This means that they can generalize their knowledge from the pre-training
    phase and quickly adapt to new tasks or domains with minimal additional training
    data. In few-shot learning, the model is provided with a small number of examples
    to learn from, while in zero-shot learning, the model relies solely on its pre-existing
    knowledge and the given prompt to generate a response.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 的一个关键优势是它们能够执行 *少量样本* 或 *零样本* 学习。这意味着它们可以从预训练阶段的知识中推广，并快速适应新的任务或领域，而无需额外的训练数据。在少量样本学习中，模型被提供少量示例来学习，而在零样本学习中，模型仅依赖于其预存在的知识和给定的提示来生成响应。
- en: LLMs have demonstrated remarkable progress in natural language understanding
    and generation tasks, with applications spanning diverse domains such as conversation
    AI, content creation, translation, question-answering systems, and more. However,
    it is essential to recognize that LLMs are not without limitations. They can sometimes
    produce incorrect or nonsensical answers, be sensitive to slight changes in input
    phrasing, or exhibit biases present in the training data. As such, prompt engineering
    plays a crucial role in mitigating these limitations and ensuring that LLMs produce
    the desired output for a given task or application.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: LLM在自然语言理解和生成任务上取得了显著的进步，应用范围涵盖多个领域，如对话AI、内容创作、翻译、问答系统等。然而，必须认识到LLM并非没有局限性。它们有时可能会产生错误或不合逻辑的答案，对输入措辞的微小变化敏感，或表现出训练数据中的偏差。因此，提示工程在减轻这些局限性并确保LLM为特定任务或应用生成所需输出方面发挥着至关重要的作用。
- en: In the next section, we will examine different types of LLM prompts. Understanding
    these various types of prompts will provide you with valuable insights into how
    to effectively interact with language models, enabling you to generate more accurate
    and tailored responses for your desired applications or tasks.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨不同类型的LLM提示。了解这些不同类型的提示将为您提供宝贵的见解，了解如何有效地与语言模型互动，使您能够为所需的特定应用或任务生成更准确和定制的响应。
- en: Types of LLM prompts
  id: totrans-84
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM提示类型
- en: LLM prompts can be categorized based on several aspects, such as their purpose,
    format, and level of detail provided.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: LLM提示可以根据多个方面进行分类，例如它们的目的、格式和提供的详细程度。
- en: 'One way of classifying them is by the type of information that’s being prompted:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 将它们进行分类的一种方式是根据所提示信息的类型：
- en: '**Zero-shot prompting**: This is a technique that allows an LLM to generate
    responses to tasks that it has not been specifically trained for. In this technique,
    the LLM is provided with an input text and a prompt that describes the expected
    output from the model in natural language. The LLM then uses its knowledge to
    generate a response that is consistent with the prompt.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零样本提示**：这是一种允许LLM对它未特别训练过的任务生成响应的技术。在这个技术中，LLM被提供了一段输入文本和一个用自然语言描述模型预期输出的提示。然后LLM使用其知识生成一个与提示一致的响应。'
- en: 'For example, if you provide the LLM with the input text *Write a poem about
    love*, and the prompt *The poem should be beautiful and romantic*, the LLM might
    generate the following response:'
  id: totrans-88
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，如果你向LLM提供输入文本“写一首关于爱的诗”，以及提示“这首诗应该是美丽而浪漫的”，LLM可能会生成以下响应：
- en: '[PRE0]'
  id: totrans-89
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Fine-tuning**: In fine-tuning, the LLM is trained on a small dataset of labeled
    examples for the task that it is being asked to perform. This can be a more effective
    way to generate high-quality responses, but it requires a larger dataset of labeled
    examples.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微调**：在微调中，LLM被训练在一个小型标记示例数据集上，用于它被要求执行的任务。这可能是一种更有效的方法来生成高质量的响应，但它需要一个更大的标记示例数据集。'
- en: As an example, let’s say that the input is an article about new research on
    treating cancer, while the training data is articles about cancer research labeled
    with summaries.
  id: totrans-91
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，假设输入是一篇关于治疗癌症的新研究的文章，而训练数据是带有摘要标签的癌症研究文章。
- en: Here’s the prompt for this.
  id: totrans-92
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里是这个提示。
- en: 'Prompt:'
  id: totrans-93
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE1]'
  id: totrans-94
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Data augmentation**: In data augmentation, the LLM is trained on a dataset
    that has been artificially expanded by adding noise or variations to the existing
    data. This can be a way to improve the performance of the LLM on tasks where there
    is limited labeled data available.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据增强**：在数据增强中，LLM被训练在一个通过向现有数据添加噪声或变化来人工扩展的数据集上。这可能是一种提高LLM在有限标记数据可用任务上的性能的方法。'
- en: As an example, let’s say that the original training data consists of 1,000 sentences
    about the weather, while the augmented data consists of 2,000 additional sentences
    that were created by adding synonyms, paraphrasing, and introducing typos to the
    original sentences.
  id: totrans-96
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，假设原始训练数据由关于天气的1,000个句子组成，而增强数据由通过添加同义词、改写和引入原句中的错别字创建的2,000个额外句子组成。
- en: 'Here’s the prompt:'
  id: totrans-97
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里是提示内容：
- en: '[PRE2]'
  id: totrans-98
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Active learning**: In active learning, also known as *few-shot learning*,
    the LLM is given a small number of labeled examples and is then asked to identify
    the most informative examples to label. This can be a more efficient way to train
    the LLM as it focuses on labeling the examples that will be most helpful in improving
    the model’s performance.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主动学习**：在主动学习中，也称为“少样本学习”，LLM被提供少量标记示例，然后被要求识别最有信息量的示例进行标记。这可能是一种更有效的训练LLM的方法，因为它专注于标记那些将最有帮助于提高模型性能的示例。'
- en: Fine-tuning is done globally for all conversations. In active learning, the
    user provides a few examples during prompting to get the outputs to follow a certain
    pattern.
  id: totrans-100
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 微调是在所有对话中全局进行的。在主动学习中，用户在提示时提供一些示例，以获得遵循某种模式的输出。
- en: 'For example, if the output was *the person’s name is Peter and he is 23 years
    old*, the user may want to get a response of *{“name”: “Peter”, “age”: 23 }*.
    In this case, the user would provide a couple of examples of raw responses and
    explicitly ask the LLM to produce the output as JSON, as shown previously.'
  id: totrans-101
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '例如，如果输出是“这个人的名字是Peter，他23岁”，用户可能希望得到一个响应为*{“name”: “Peter”, “age”: 23 }*。在这种情况下，用户将提供一些原始响应的示例，并明确要求LLM以JSON格式生成输出，如之前所示。'
- en: '**Transfer learning**: In transfer learning, the LLM is trained on a task that
    is similar to the task that it is being asked to perform. This can be a more effective
    way to generate high-quality responses as it allows the LLM to learn from a larger
    dataset.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迁移学习**：在迁移学习中，LLM被训练在与其被要求执行的任务相似的任务上。这可能是一种更有效的方法来生成高质量的响应，因为它允许LLM从更大的数据集中学习。'
- en: As an example, let’s say that the original task was sentiment analysis of movie
    reviews, while the new task is sentiment analysis of product reviews.
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 例如，假设原始任务是电影评论的情感分析，而新任务是产品评论的情感分析。
- en: 'Here’s the prompt:'
  id: totrans-104
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是提示：
- en: '[PRE3]'
  id: totrans-105
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Here’s the output:'
  id: totrans-106
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里是输出结果：
- en: '[PRE4]'
  id: totrans-107
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The best type of prompt to use will depend on the specific task that the LLM
    is being asked to perform and the amount of labeled data that is available.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 使用的最佳提示类型将取决于LLM被要求执行的具体任务以及可用的标记数据量。
- en: 'Another way of classifying the prompt types is by function:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种按功能分类提示类型的方法是：
- en: '**Instructional prompts**: These prompts explicitly instruct the model to perform
    a particular task, such as summarizing a text, translating a sentence, or answering
    a question. Instructional prompts typically begin with a clear directive, such
    as *Translate the following sentence into French:* or *Summarize the* *following
    paragraph:*.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**指令提示**：这些提示明确指示模型执行特定任务，例如总结文本、翻译句子或回答问题。指令提示通常以明确的指令开始，例如“将以下句子翻译成法语：”或“总结以下段落：”。'
- en: '**Conversational prompts**: These prompts are designed to engage the model
    in a natural, human-like conversation. They can be framed as questions or statements
    and often involve a back-and-forth dialogue between the user and the model. Conversational
    prompts can cover a wide range of topics, from casual chit-chat to more focused
    discussions on specific subjects. Let’s look at an example.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**会话提示**：这些提示旨在使模型参与自然、类似人类的对话。它们可以以问题或陈述的形式呈现，通常涉及用户和模型之间的来回对话。会话提示可以涵盖广泛的主题，从闲聊到更专注于特定主题的讨论。让我们看看一个例子。'
- en: 'Prompt:'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE5]'
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Prompt:'
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE6]'
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This back-and-forth exchange allows for natural, free-flowing conversation.
    Conversational prompts are important for developing personable, helpful AI assistants.
  id: totrans-116
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种来回交流允许进行自然、流畅的对话。会话提示对于开发亲切、有帮助的人工智能助手非常重要。
- en: '**Contextual prompts**: These prompts provide background or contextual information
    to guide the model’s response. Contextual prompts help the model understand the
    user’s intent, the desired format of the output, or any constraints that should
    be considered while generating a response. They may include examples, explanations,
    or descriptions to help clarify the task. Here’s an example:'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文提示**：这些提示提供背景或上下文信息以指导模型的响应。上下文提示有助于模型理解用户的意图、期望的输出格式或生成响应时应考虑的任何约束。它们可能包括示例、解释或描述，以帮助阐明任务。以下是一个示例：'
- en: '*You are an AI assistant created by OpenAI to be helpful, harmless, and honest.
    The user has asked you to summarize the key events in the following passage: [**insert
    passage]*'
  id: totrans-118
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*您是OpenAI创建的AI助手，旨在提供帮助、无害和诚实。用户要求您总结以下段落中的关键事件：[**插入段落]*'
- en: '**Creative prompts**: These prompts invite the model to generate original content
    or ideas, such as writing a poem, creating a story, or brainstorming solutions
    to a problem. Creative prompts often leave room for the model’s imagination and
    may require multiple iterations and refinements to achieve the desired output.
    An example of this is *Write a haiku poem about* *the ocean*.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创造性提示**：这些提示邀请模型生成原创内容或想法，例如写一首诗、创作一个故事或为问题头脑风暴解决方案。创造性提示通常为模型的想象力留出空间，并且可能需要多次迭代和改进以达到期望的输出。例如，*写一首关于海洋的俳句诗*。'
- en: '**Factual prompts**: These prompts seek accurate and specific information or
    knowledge from the model, often in the form of a question. Examples include queries
    about historical events, scientific concepts, or general trivia. Factual prompts
    rely on the model’s ability to recall and synthesize information that it learned
    during its pre-training phase. An example of this is *What year was the Declaration
    of* *Independence signed?*'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**事实性提示**：这些提示要求模型提供准确和具体的信息或知识，通常以问题的形式出现。例如，关于历史事件、科学概念或一般常识的查询。事实性提示依赖于模型在预训练阶段学习并综合信息的能力。例如，*独立宣言是在哪一年签署的？*'
- en: '**Step-by-step prompts**: These prompts require the model to provide a sequence
    of steps or a procedure to accomplish a particular task, such as a recipe, a tutorial,
    or an algorithm. Step-by-step prompts necessitate the model to generate coherent,
    ordered, and logical instructions – for instance, *Provide directions for baking
    a cake from scratch, breaking down each step*. Step-by-step prompts are often
    used to ask the LLM to solve a mathematical problem. Let’s look at an example.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**逐步提示**：这些提示要求模型提供完成特定任务的步骤序列或程序，例如食谱、教程或算法。逐步提示需要模型生成连贯、有序和逻辑的指令——例如，*提供从零开始烘焙蛋糕的步骤，分解每个步骤*。逐步提示通常用于要求LLM解决数学问题。让我们看看一个例子。'
- en: 'Prompt:'
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE7]'
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This is the wrong answer. So, we need to use a step-by-step prompt to get the
    right one. Solve it using step by step reasoning
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这不是正确的答案。因此，我们需要使用逐步提示来获得正确的答案。通过逐步推理来解决这个问题
- en: 'Response:'
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE8]'
  id: totrans-126
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'By breaking the problem down into clear sequential steps, I was able to evaluate
    the operations in the proper order of operations. This step-by-step approach prevented
    me from making a mistake by adding before multiplying. Deliberately walking through
    the reasoning allowed me to correctly solve the problem:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将问题分解为清晰的顺序步骤，我能够按照正确的运算顺序评估操作。这种逐步的方法防止我在乘法之前进行加法，故意逐步推理使我能够正确解决问题：
- en: '**Opinion-based prompts**: These prompts ask the model to provide an opinion,
    perspective, or recommendation on a given topic. While LLMs do not have personal
    beliefs or preferences, they can generate responses based on patterns and insights
    derived from their training data. Opinion-based prompts often require careful
    consideration of potential biases present in the model’s output – for example,
    *What are the pros and cons of self-driving car technology? Support* *your perspective.*'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于意见的提示**：这些提示要求模型对给定主题提供意见、观点或建议。虽然LLM没有个人信念或偏好，但它们可以根据从训练数据中提取的模式和见解生成响应。基于意见的提示通常需要仔细考虑模型输出中可能存在的潜在偏差——例如，*自动驾驶汽车技术的优缺点是什么？支持你的观点*。'
- en: '**Multi-modal prompts**: These prompts involve input data from multiple modalities,
    such as text combined with images, audio, or video. Multi-modal prompts require
    the model to process and integrate information from various sources to generate
    an appropriate response. While some LLMs are primarily designed for text-based
    interactions, recent advancements in AI have led to the development of models
    capable of handling multi-modal inputs, such as OpenAI’s DALL-E and CLIP. An example
    of this is *Describe the scene in this image: [**insert image]*.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态提示**：这些提示涉及来自多个模态的数据输入，如文本结合图像、音频或视频。多模态提示要求模型处理和整合来自各种来源的信息以生成适当的响应。虽然一些LLM主要设计用于基于文本的交互，但AI的最新进展导致了能够处理多模态输入的模型的发展，例如OpenAI的DALL-E和CLIP。例如，*描述这张图片中的场景：[**插入图片**]*。'
- en: '**Systematic prompts**: These prompts aim to elicit responses that follow a
    specific structure, pattern, or format. Examples include generating a list of
    items, creating an outline for an essay or presentation, or providing a structured
    analysis of a given topic. Systematic prompts often necessitate the model to organize
    and present information coherently and logically. Here’s an example:'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统化提示符**：这些提示符旨在引发遵循特定结构、模式或格式的响应。例如，生成项目列表、创建文章或演示文稿的大纲，或提供给定主题的结构化分析。系统化提示符通常需要模型有组织地、逻辑地组织和呈现信息。这里有一个例子：'
- en: '*Categorize the following animals into* *taxonomy groups:*'
  id: totrans-131
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*将以下动物分类到* *分类组中：*'
- en: '*[list* *of animals]*'
  id: totrans-132
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*[动物列表]*'
- en: '**Prompt chains, also known as chain of thought**: These prompts involve a
    series of interconnected inputs and outputs, where the model’s response to one
    prompt serves as the input for the next prompt. Prompt chains can be used for
    complex problem-solving, multi-step tasks, or to maintain continuity in a conversation
    with the model. Let’s look at an example.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示链，也称为思维链**：这些提示符涉及一系列相互关联的输入和输出，其中模型对一个提示符的响应作为下一个提示符的输入。提示链可用于复杂问题解决、多步骤任务或在与模型的对话中保持连续性。让我们看看一个例子。'
- en: 'Prompt:'
  id: totrans-134
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE9]'
  id: totrans-135
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Prompt:'
  id: totrans-136
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE10]'
  id: totrans-137
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The LLM maintains context and consistency across prompts.
  id: totrans-138
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LLM在提示符之间保持上下文和一致性。
- en: When designing prompts for LLMs, it is essential to consider the specific needs
    and goals of the intended application. By understanding and combining different
    types of prompts, prompt engineers can tailor their approach to elicit the most
    accurate, relevant, and useful responses from the model. Moreover, effective prompt
    engineering often involves iterative refinement and experimentation, incorporating
    user feedback and adjusting the prompt structure to optimize the model’s performance.
    As the field of LLMs continues to evolve, the art and science of prompt engineering
    will play a critical role in shaping the way we interact with these powerful AI
    tools, unlocking their full potential across a wide range of applications and
    domains.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计针对大型语言模型（LLMs）的提示符时，考虑预期应用的特定需求和目标是至关重要的。通过理解和结合不同类型的提示符，提示符工程师可以调整他们的方法，以从模型中获得最准确、最相关和最有用的响应。此外，有效的提示符工程通常涉及迭代优化和实验，包括用户反馈并调整提示符结构以优化模型的表现。随着LLMs领域的持续发展，提示符工程的艺术和科学将在塑造我们与这些强大AI工具互动的方式中发挥关键作用，解锁它们在广泛的应用和领域中的全部潜力。
- en: Components of an LLM prompt
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM提示符的组成部分
- en: 'An LLM prompt serves as the input to a large-scale LLM, guiding its response
    generation process. Crafting an effective prompt is crucial for obtaining accurate,
    relevant, and useful outputs. The components of an LLM prompt can vary depending
    on the task, application, and desired outcome. However, several key elements are
    often present in well-designed prompts:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 一个LLM提示符作为大规模LLM的输入，指导其响应生成过程。制作一个有效的提示符对于获得准确、相关和有用的输出至关重要。LLM提示符的组成部分可能因任务、应用和期望的结果而异。然而，在精心设计的提示符中通常存在几个关键元素：
- en: '**Task description**:'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务描述**:'
- en: An essential component of a prompt is a clear and concise description of the
    task the model is expected to perform. This can be an instruction, a question,
    or a statement that specifies the purpose of the interaction, such as summarizing
    a passage, translating text, or answering a query.
  id: totrans-143
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一个提示符的基本组成部分是对模型预期执行的任务的清晰简洁描述。这可以是一条指令、一个问题或一个声明，用于指定交互的目的，例如总结一段文字、翻译文本或回答查询。
- en: 'Here’s an example:'
  id: totrans-144
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '[PRE11]'
  id: totrans-145
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Context**:'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文**:'
- en: Providing context within the prompt helps the model understand the scope, constraints,
    and background information relevant to the task. This can include domain-specific
    terminology, examples, or explanations that guide the model’s response generation.
    Contextual information can be particularly useful for disambiguation, refining
    the model’s focus, or ensuring that the output adheres to a specific format or
    style.
  id: totrans-147
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在提示符中提供上下文有助于模型理解任务的范围、约束和相关的背景信息。这可以包括特定领域的术语、示例或解释，以指导模型生成响应。上下文信息在消除歧义、细化模型焦点或确保输出遵循特定格式或风格时特别有用。
- en: 'Here’s an example:'
  id: totrans-148
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '[PRE12]'
  id: totrans-149
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '**Input data**:'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入数据**：'
- en: The input data is the actual content that the model will process and generate
    a response based on. This can be a sentence, a paragraph, or a series of questions
    or statements. The input data should be relevant to the task and formulated in
    a way that is easy for the model to understand and analyze.
  id: totrans-151
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 输入数据是模型将处理并据此生成响应的实际内容。这可能是一句话、一个段落，或一系列问题或陈述。输入数据应与任务相关，并以便于模型理解和分析的方式表述。
- en: 'Here’s an example:'
  id: totrans-152
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '[PRE13]'
  id: totrans-153
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**Placeholder tokens**:'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**占位符标记**：'
- en: In some cases, prompts may include placeholder tokens (variables) that indicate
    where the model should insert its response. These tokens can help maintain the
    structure and format of the output, especially when multiple outputs or responses
    need to be generated in a specific sequence or layout. Let’s look at an example.
  id: totrans-155
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在某些情况下，提示可能包含占位符标记（变量），指示模型应在何处插入其响应。这些标记可以帮助保持输出结构和格式，尤其是在需要按特定顺序或布局生成多个输出或响应时。让我们来看一个例子。
- en: 'Prompt:'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE14]'
  id: totrans-157
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Response:'
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE15]'
  id: totrans-159
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Since the initial prompt includes variables (the terms included in `[]`), the
    user can now ask again only by providing a prompt, such as the following:'
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 由于初始提示包含变量（`[]`中包含的术语），用户现在可以通过提供以下提示再次提问：
- en: '[PRE16]'
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The LLM will provide the corresponding list. The user can continue adding prompts
    similar to this one to get the recommended attractions for as many cities as they
    would like.
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LLM将提供相应的列表。用户可以继续添加类似于此的提示，以获取他们想要的任何城市的推荐景点。
- en: '**Examples**:'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**：'
- en: Including examples within the prompt can be beneficial, especially when dealing
    with few-shot learning scenarios. These examples serve as a demonstration of the
    desired output format and can help the model understand the task more effectively.
    Examples can be particularly valuable when the task is complex or requires the
    model to generate outputs in a specific structure. Let’s look at one.
  id: totrans-164
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在提示中包含示例可能有益，尤其是在处理少样本学习场景时。这些示例作为所需输出格式的演示，可以帮助模型更有效地理解任务。当任务复杂或需要模型以特定结构生成输出时，示例尤其有价值。让我们来看一个例子。
- en: 'Prompt:'
  id: totrans-165
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE17]'
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Output:'
  id: totrans-167
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE18]'
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Input:'
  id: totrans-169
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 输入：
- en: '[PRE19]'
  id: totrans-170
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Output:'
  id: totrans-171
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE20]'
  id: totrans-172
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Response:'
  id: totrans-173
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 响应：
- en: '[PRE21]'
  id: totrans-174
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: These examples could be of the tone and type of vocabulary that the user wants
    from the response as well.
  id: totrans-175
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这些示例可以是用户希望从响应中获得的那种语气和词汇类型。
- en: '**Constraints**:'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**限制**：'
- en: Sometimes, it is necessary to impose constraints on the model’s response to
    ensure it meets specific requirements, adheres to guidelines, or avoids problematic
    content. Constraints can be expressed explicitly within the prompt or implicitly
    by carefully crafting the task’s description and context. Let’s look at an example.
  id: totrans-177
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 有时，为了确保模型响应满足特定要求、遵守指南或避免问题内容，有必要对模型的响应施加限制。这些限制可以在提示中明确表达，或者通过精心设计任务的描述和上下文隐含表达。让我们来看一个例子。
- en: 'Prompt:'
  id: totrans-178
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE22]'
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '**Tone** **and style**:'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语气** **和风格**：'
- en: The tone and style of a prompt can influence the model’s response. Specifying
    the desired tone, such as formal, casual, or persuasive, can help generate outputs
    that align with the intended purpose and audience.
  id: totrans-181
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示的语气和风格可以影响模型的响应。指定所需的语气，如正式、随意或说服性，可以帮助生成与预期目的和受众相一致的结果。
- en: The following example specifies a sarcastic tone.
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下示例指定了讽刺的语气。
- en: 'Prompt:'
  id: totrans-183
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE23]'
  id: totrans-184
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The following example specifies a pirate tone.
  id: totrans-185
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下示例指定了海盗的语气。
- en: 'Prompt:'
  id: totrans-186
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE24]'
  id: totrans-187
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE24]'
- en: When designing LLM prompts, prompt engineers must consider the interplay between
    these components to create an effective input that elicits the desired output
    from the model. The process often involves iterative refinement, experimentation,
    and incorporating user feedback to optimize the prompt’s structure and content.
    By understanding and skillfully combining these components, prompt engineers can
    harness the full potential of large-scale LLMs and ensure that their responses
    are accurate, relevant, and valuable across a wide range of tasks and applications.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计LLM提示时，提示工程师必须考虑这些组件之间的相互作用，以创建一个有效的输入，从而从模型中获得预期的输出。这个过程通常涉及迭代优化、实验和结合用户反馈，以优化提示的结构和内容。通过理解和巧妙地结合这些组件，提示工程师可以充分发挥大规模LLM的潜力，并确保其响应在广泛的任务和应用中准确、相关且有价值。
- en: 'Putting it all together, here is an example of using the interplay between
    components of prompts. The complete prompt would be as follows:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有这些放在一起，以下是一个使用提示组件之间相互作用的例子。完整的提示如下：
- en: '[PRE25]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This prompt effectively combines all the necessary components to guide the LLM
    in generating a concise and accurate summary of the given passage. By providing
    a clear task description, context, input data, and tone and style, the model is
    directed toward generating the desired output. The examples demonstrate the expected
    format, while the constraints ensure that the summary is succinct and appropriate
    for a general audience. The placeholder token helps maintain the structure of
    the output, making it easier to extract and process the model’s response. Through
    the thoughtful integration of these components, this prompt serves as an effective
    example of prompt engineering in action.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示有效地结合了所有必要的组件，以引导LLM生成给定段落的简洁和准确摘要。通过提供清晰的任务描述、上下文、输入数据和语气和风格，模型被引导生成期望的输出。示例展示了预期的格式，而约束确保了摘要简短且适合一般受众。占位符标记有助于保持输出结构，使其更容易提取和处理模型的响应。通过深思熟虑地整合这些组件，这个提示成为实际操作中提示工程的有效示例。
- en: Another technique that can be incorporated into prompt engineering is role prompting,
    where the user and/or system adopt a specific persona or perspective to guide
    the language model’s response.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种可以融入提示工程的技术是角色提示，其中用户和/或系统采用特定的角色或视角来引导语言模型的响应。
- en: Adopt any persona – role prompting for tailored interactions
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 承担任何人格 – 定制交互的角色提示
- en: Role prompting is a technique in prompt engineering where the user and/or the
    system (the LLM) assume a specific role or persona, often with unique knowledge
    or expertise, to guide the LLM in generating more accurate, relevant, and contextually
    appropriate responses. By explicitly defining the role or relationship between
    the user and the model, role prompting can help create a more engaging and interactive
    experience, resulting in higher-quality outputs.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 角色提示是提示工程中的一种技术，其中用户和/或系统（LLM）承担特定的角色或人格，通常具有独特的知识或专长，以引导LLM生成更准确、相关和上下文适当的响应。通过明确定义角色或用户与模型之间的关系，角色提示可以帮助创建更吸引人和互动的体验，从而产生高质量的输出。
- en: 'Role prompting can take several forms. Some of them are listed here:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 角色提示可以采取多种形式。其中一些列在这里：
- en: '**Expert roles**: The user may pretend to be an expert in a specific domain
    or field, such as a scientist, historian, or professional, to elicit more specific
    and informed responses from the model. This approach can also encourage the model
    to provide more detailed and nuanced information, drawing on its extensive pre-trained
    knowledge.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专家角色**：用户可以假装成为特定领域或领域的专家，例如科学家、历史学家或专业人士，以从模型中获得更具体和有见地的响应。这种方法还可以鼓励模型提供更详细和细微的信息，利用其广泛的预训练知识。'
- en: You can also ask the system to pretend to be an expert or act as someone. Let’s
    look at an example.
  id: totrans-197
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您也可以要求系统假装成为专家或扮演某个人。让我们来看一个例子。
- en: 'Prompt:'
  id: totrans-198
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE26]'
  id: totrans-199
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '**Fictional roles**: The user can assume the persona of a fictional character
    such as a detective or an explorer to create a more immersive and creative interaction
    with the model. This can be particularly useful for generating stories, dialogues,
    or role-playing scenarios. Let’s look at an example.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**虚构角色**：用户可以扮演虚构角色，如侦探或探险家，以与模型创建更沉浸和创造性的互动。这特别适用于生成故事、对话或角色扮演场景。让我们来看一个例子。'
- en: 'Prompt:'
  id: totrans-201
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE27]'
  id: totrans-202
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '**Guiding roles**: The user may take on a role that guides or mentors the model,
    such as a teacher or coach. This approach encourages the model to think more deeply
    about the topic, explore alternative perspectives, or refine its understanding
    of complex concepts. Let’s look at an example.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**引导角色**：用户可以承担引导或指导模型的角色，例如教师或教练。这种方法鼓励模型更深入地思考主题，探索不同的视角，或完善对复杂概念的理解。让我们来看一个例子。'
- en: 'Prompt:'
  id: totrans-204
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE28]'
  id: totrans-205
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '**Collaborative roles**: The user can adopt a role that emphasizes collaboration
    or partnership with the model, such as a teammate or co-author. This approach
    can lead to more dynamic interactions, mutual learning, and synergistic problem-solving.
    Let’s look at an example.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协作角色**：用户可以采用强调与模型协作或伙伴关系的角色，例如队友或合著者。这种方法可以导致更动态的互动、相互学习和协同解决问题的效果。让我们来看一个例子。'
- en: 'Prompt:'
  id: totrans-207
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE29]'
  id: totrans-208
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The effectiveness of role prompting depends on the clarity and specificity of
    the role, as well as the model’s ability to understand and adapt to the given
    context. By adopting a well-defined role, users can set expectations and guide
    the model to generate responses that align with the desired persona or expertise.
    This approach can lead to more engaging, informative, and accurate interactions
    with the LLM.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 角色提示的有效性取决于角色的清晰度和具体性，以及模型理解和适应给定上下文的能力。通过采用一个定义良好的角色，用户可以设定期望并引导模型生成与期望的个性或专业知识相一致的反应。这种方法可以导致与LLM的互动更加吸引人、信息丰富且准确。
- en: It is essential to keep in mind that role prompting may not always guarantee
    perfect results as the model’s output depends on various factors, such as the
    quality of the training data and the model’s ability to generalize knowledge.
    However, role prompting can be a valuable tool in any prompt engineer’s toolkit,
    enabling more effective and context-aware interactions with LLMs across a wide
    range of applications and domains.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 必须牢记的是，角色提示并不总是保证完美的结果，因为模型的输出取决于各种因素，例如训练数据的质量和模型泛化知识的能力。然而，角色提示可以是任何提示工程师工具箱中的宝贵工具，它能够使LLM在广泛的应用和领域中实现更有效和上下文感知的交互。
- en: Let’s look at a couple of examples so that we can make sense of this information.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看几个例子，以便我们能够理解这些信息。
- en: Few-shot learning – training models with example prompts
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 少样本学习——使用示例提示训练模型
- en: Using prompting examples during training, the model is guided to generate responses
    that align with the desired format, style, or content for a specific task. These
    examples are known as “few-shot learning,” and they demonstrate the model’s ability
    to generalize its knowledge from pre-training and quickly adapt to new tasks with
    minimal additional training data.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中使用提示示例，模型被引导生成与特定任务所需的格式、风格或内容相一致的反应。这些示例被称为“少样本学习”，它们展示了模型从预训练中泛化其知识并快速适应新任务的能力，而无需额外的训练数据。
- en: 'Here are some examples of using prompting examples for different tasks:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些使用提示示例来完成不同任务的示例：
- en: '**Text summarization**:'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本摘要**：'
- en: 'Prompt:'
  id: totrans-216
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE30]'
  id: totrans-217
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE30]'
- en: '**Language translation**:'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言翻译**：'
- en: 'Prompt:'
  id: totrans-219
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE31]'
  id: totrans-220
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE31]'
- en: '**Sentiment** **analysis**:'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感分析**：'
- en: 'Prompt:'
  id: totrans-222
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE32]'
  id: totrans-223
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE32]'
- en: '**Text** **classification**:'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本分类**：'
- en: 'Prompt:'
  id: totrans-225
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE33]'
  id: totrans-226
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE33]'
- en: '**Analogies**:'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类比**：'
- en: 'Prompt:'
  id: totrans-228
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE34]'
  id: totrans-229
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Response:'
  id: totrans-230
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 反应：
- en: '[PRE35]'
  id: totrans-231
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE35]'
- en: In each example, the prompt starts with a clear task description, followed by
    an example input-output pair that demonstrates the expected format and desired
    response. By providing these prompting examples, the model can better understand
    the task and generate more accurate and contextually appropriate outputs.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个示例中，提示从明确的任务描述开始，接着是一个示例输入-输出对，展示了预期的格式和所需反应。通过提供这些提示示例，模型可以更好地理解任务并生成更准确、上下文相关的输出。
- en: It is crucial to bear in mind that the effectiveness of few-shot learning depends
    on the model’s capability to generalize its pre-trained knowledge and the quality
    of the examples provided. As the field of LLMs continues to evolve, techniques
    such as few-shot learning and effective prompt engineering will play a vital role
    in unlocking the full potential of these AI models and enhancing their performance
    across a wide range of tasks and applications.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 必须牢记的是，少样本学习的效果取决于模型泛化其预训练知识的能力以及提供的示例质量。随着LLM领域的持续发展，少样本学习和有效的提示工程等技术将在解锁这些AI模型的全部潜力以及增强它们在广泛任务和应用中的性能方面发挥至关重要的作用。
- en: Next, we will discuss voice definition. This plays a vital role as it refers
    to the special qualities and style that make someone’s way of expressing themselves
    unique. Defining the desired voice is crucial for crafting prompts that elicit
    engaging, natural responses from the language model that align with the intended
    tone and personality. By incorporating voice definition into prompts, users can
    shape the model’s responses to be more relatable, aligned with a brand identity,
    and overall more effective depending on the application.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将讨论声音定义。这起着至关重要的作用，因为它指的是使某人表达方式独特的特殊品质和风格。定义所需的声调对于制作能够从语言模型中引发吸引人、自然反应的提示至关重要，这些反应与预期的语气和个性相一致。通过将声音定义纳入提示，用户可以塑造模型的反应，使其更具相关性、与品牌身份一致，并总体上更有效，具体取决于应用。
- en: Finding your voice – defining personality in prompts
  id: totrans-235
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 寻找你的声音——在提示中定义个性
- en: Voice definition refers to the unique characteristics, style, and tone that
    distinguish an individual or entity’s manner of communication. In the context
    of writing, voice is an essential element that gives the content its personality,
    making it engaging, relatable, and memorable. A well-defined voice helps convey
    the intended message effectively, resonate with the target audience, and establish
    the author’s identity or brand.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 声音定义指的是区分个人或实体沟通方式的独特特征、风格和语气。在写作的背景下，声音是内容个性化的一个基本元素，使其引人入胜、相关且难忘。一个定义良好的声音有助于有效地传达意图信息，与目标受众产生共鸣，并建立作者的个性或品牌。
- en: 'Developing a distinct voice involves considering various aspects of language,
    such as the following:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 发展独特的声音需要考虑语言的各个方面，如下所示：
- en: '**Tone**:'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语气**：'
- en: The tone of a piece of writing reflects the attitude or emotion the author wishes
    to convey. Depending on the context and purpose, the tone can be formal, informal,
    conversational, authoritative, persuasive, or playful, among others.
  id: totrans-239
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 写作作品的语气反映了作者希望传达的态度或情感。根据背景和目的，语气可以是正式的、非正式的、对话式的、权威的、有说服力的或轻松的，等等。
- en: '**Vocabulary**:'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**词汇**：'
- en: The choice of words, phrases, and expressions contributes significantly to the
    voice of a piece. A unique vocabulary can reflect the author’s personality, expertise,
    and cultural background, as well as cater to the preferences and expectations
    of the target audience.
  id: totrans-241
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 词语、短语和表达方式的选择对文章的声音有重大影响。独特的词汇可以反映作者的个性、专业知识和文化背景，同时满足目标受众的偏好和期望。
- en: '**Sentence structure** **and syntax**:'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**句子结构和句法**：'
- en: The way sentences are constructed, including their length, complexity, and rhythm,
    can influence the voice of a piece. Varied sentence structures can create a dynamic
    and engaging reading experience, while consistent syntax can establish a recognizable
    voice.
  id: totrans-243
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 句子的构建方式，包括它们的长度、复杂性和节奏，可以影响文章的声音。多样化的句子结构可以创造一个动态和吸引人的阅读体验，而一致的句法可以建立可识别的声音。
- en: '**Perspective**:'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视角**：'
- en: The point of view from which a piece is written, such as first person, second
    person, or third person, can impact the voice and the connection established with
    the reader. Choosing the right perspective can help create a more immersive and
    relatable experience for the audience.
  id: totrans-245
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一篇文章的写作视角，例如第一人称、第二人称或第三人称，可以影响声音和与读者建立的联系。选择正确的视角可以帮助创造一个更沉浸式和相关的体验，为观众。
- en: '**Imagery and** **figurative language**:'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**意象和** **比喻语言**：'
- en: The use of vivid imagery, metaphors, similes, and other figurative language
    elements can enhance the voice and make the content more engaging, evocative,
    and memorable.
  id: totrans-247
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用生动的意象、隐喻、明喻和其他比喻语言元素可以增强声音，使内容更具吸引力、唤起性和难忘性。
- en: When crafting content, writers must consider these aspects to develop a consistent
    and appealing voice that aligns with their goals, resonates with their audience,
    and sets them apart from others. A well-defined voice can help establish an author’s
    or brand’s identity, create a sense of trust and familiarity among readers, and
    ultimately contribute to the success and impact of their communication efforts.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 当创作内容时，作家必须考虑这些方面，以发展一个一致且吸引人的声音，使其与目标相符，与受众产生共鸣，并使他们与其他人区别开来。一个定义良好的声音可以帮助建立作者或品牌的身份，在读者中建立信任和熟悉感，并最终有助于他们沟通工作的成功和影响力。
- en: In the context of AI-generated content, developing a distinct voice can be achieved
    through prompt engineering techniques, such as providing the model with specific
    instructions regarding tone, style, and vocabulary. By tailoring prompts to elicit
    the desired voice, AI models such as LLMs can generate content that aligns with
    the author’s or brand’s unique communication style, further enhancing the value
    and effectiveness of AI-generated content.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能生成内容的背景下，通过提示工程技术，如向模型提供有关语气、风格和词汇的具体指令，可以发展出独特的声音。通过调整提示以激发所需的声音，如LLM等人工智能模型可以生成与作者或品牌独特沟通风格一致的内容，进一步增强了人工智能生成内容的价值和有效性。
- en: 'Here are some examples of voice definitions for different types of writing
    and contexts:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些不同类型写作和情境下声音定义的例子：
- en: '**Professional and** **authoritative voice**:'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业和** **权威的声音**：'
- en: This voice is characterized by a formal tone, precise vocabulary, and well-structured
    sentences. It is commonly used in business reports, academic articles, or legal
    documents.
  id: totrans-252
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种声音以正式的语调、精确的词汇和结构良好的句子为特点。它通常用于商业报告、学术论文或法律文件。
- en: 'Here’s an example:'
  id: totrans-253
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '*The comprehensive analysis of the market trends indicates a substantial growth
    potential for renewable energy sources in the coming decade. This report presents
    a detailed examination of the factors driving this growth and provides strategic
    recommendations for capitalizing on* *emerging opportunities.*'
  id: totrans-254
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*对市场趋势的综合分析表明，可再生能源在未来十年具有巨大的增长潜力。本报告详细探讨了推动这一增长的因素，并提供了利用新兴机会的战略建议。*'
- en: '**Conversational and** **friendly voice**:'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话式和** **友好式**：'
- en: This voice adopts an informal tone, everyday vocabulary, and a casual sentence
    structure. It is suitable for blog posts, social media content, or personal essays.
  id: totrans-256
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种声音采用非正式的语调、日常词汇和随意的句子结构。它适合博客文章、社交媒体内容或个人论文。
- en: 'Here’s an example:'
  id: totrans-257
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '*Hey everyone! I just tried out this amazing new recipe for chocolate chip
    cookies, and I couldn’t wait to share it with you. They’re super easy to make
    and taste absolutely delicious. Give them a try and let me know what* *you think!*'
  id: totrans-258
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*嘿，大家好！我刚刚尝试了这个令人惊叹的新巧克力曲奇饼食谱，我迫不及待想和你们分享。它们超级容易做，味道绝对美味。试试看，并告诉我你的想法！*'
- en: '**Inspirational and** **motivational voice**:'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启发性和** **激励性的语调**：'
- en: This voice uses an uplifting tone, vivid imagery, and emotional language to
    engage and inspire readers. It is often found in motivational speeches, self-help
    books, or personal narratives.
  id: totrans-260
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种声音使用振奋人心的语调、生动的意象和情感化的语言来吸引和激励读者。它通常出现在励志演讲、自助书籍或个人叙述中。
- en: 'Here’s an example:'
  id: totrans-261
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '*Every journey begins with a single step, and it’s up to you to take that leap
    of faith. Embrace the unknown, conquer your fears, and unleash your true potential.
    Remember, the only limits that exist are the ones you create* *for yourself.*'
  id: totrans-262
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*每一次旅程都始于一小步，而迈出这步信仰的跳跃取决于你。拥抱未知，克服恐惧，释放你的真正潜能。记住，存在的唯一限制是你为自己设定的限制。*'
- en: '**Humorous and** **witty voice**:'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幽默和** **机智的语调**：'
- en: This voice incorporates a playful tone, clever wordplay, and humor to entertain
    and amuse readers. It can be used in satirical essays, comedic scripts, or humorous
    articles.
  id: totrans-264
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个声音融合了轻松的语调、巧妙的文字游戏和幽默，以娱乐和逗笑读者。它可以用于讽刺性文章、喜剧剧本或幽默文章。
- en: 'Here’s an example:'
  id: totrans-265
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '*If procrastination were an Olympic sport, I’d probably win the gold medal...
    eventually. Of course, I’d first have to finish binge-watching that latest TV
    series, rearrange my sock drawer, and contemplate the meaning* *of life.*'
  id: totrans-266
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*如果拖延是一种奥林匹克运动，我可能最终会赢得金牌...当然，我首先得看完最新的电视剧，整理我的袜子抽屉，然后思考生活的意义。*'
- en: '**Persuasive and** **compelling voice**:'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**说服性和** **引人入胜的语调**：'
- en: This voice employs a convincing tone, strong arguments, and targeted language
    to persuade readers to adopt a particular viewpoint or act. It is commonly used
    in opinion editorials, sales copies, or political speeches.
  id: totrans-268
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这种声音使用有说服力的语调、强有力的论点和针对性的语言来说服读者接受特定的观点或采取行动。它通常用于观点社论、销售文案或政治演讲。
- en: 'Here’s an example:'
  id: totrans-269
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '*Investing in education is not just a moral imperative; it is an economic necessity.
    By empowering our youth with the knowledge and skills required for the 21st century,
    we lay the foundation for a prosperous and sustainable future* *for all.*'
  id: totrans-270
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*投资教育不仅是一种道德上的必要，也是一种经济上的必需。通过赋予我们的青年21世纪所需的知识和技能，我们为所有人建立一个繁荣和可持续的未来奠定基础。*'
- en: Each of these voice definitions has unique characteristics, tone, and style,
    suitable for different contexts and purposes. By understanding and mastering these
    voice definitions, writers can tailor their content to resonate with their target
    audience effectively and achieve their communication objectives.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 每种声音定义都有其独特的特点、语调和风格，适合不同的环境和目的。通过理解和掌握这些声音定义，作家可以调整他们的内容，有效地与目标受众产生共鸣，并实现他们的沟通目标。
- en: When working with AI-generated content, providing clear instructions and examples
    of the desired voice definition can help guide the LLM in generating content that
    aligns with the intended tone, style, and vocabulary. By incorporating voice definition
    into prompt engineering, AI models can create content that is more engaging, relatable,
    and impactful, further enhancing the value of AI-generated content across various
    applications and domains. Voice definition can be incorporated in two ways. The
    first way is by specifying in the prompt that you wish the LLM to copy the style,
    tone, and other characteristics of someone’s voice in the response. This is useful
    if we want to use the voice definition of a well-known writer, such as Shakespeare
    or Tim Ellis. The second is by providing examples of the target person’s writing
    as part of the prompt.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 当与AI生成的内容一起工作时，提供清晰的指令和所需声音定义的示例可以帮助指导LLM生成与预期语气、风格和词汇相符的内容。通过将声音定义纳入提示工程，AI模型可以创建更具吸引力、相关性和影响力的内容，从而进一步增加AI生成内容在各种应用和领域的价值。声音定义可以通过两种方式融入。第一种方式是在提示中指定您希望LLM在响应中复制某人的风格、语调和其他特征。如果我们要使用像莎士比亚或蒂姆·埃利斯这样的知名作家的声音定义，这很有用。第二种方式是在提示中提供目标人物写作的示例。
- en: 'Now that we have explored the concept of voice definition and its significance
    in written communication, let’s shift our focus to another important aspect: patterns.
    Just as voice adds personality to content, patterns add structure and rhythm,
    making the writing flow smoothly and engagingly.'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了声音定义的概念及其在书面沟通中的重要性，让我们将注意力转向另一个重要方面：模式。正如声音为内容增添个性一样，模式为写作增添结构和节奏，使写作流畅且引人入胜。
- en: Using patterns to enhance prompt effectiveness
  id: totrans-274
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用模式来增强提示的有效性
- en: In the context of prompt engineering, patterns refer to the recognizable structures,
    sequences, and relationships that emerge from the organization and repetition
    of elements within a given input prompt. Understanding and leveraging these patterns
    can improve the effectiveness of prompts and help elicit more accurate, relevant,
    and contextually appropriate responses from LLMs.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程的背景下，模式指的是从给定输入提示中元素的组织和重复中出现的可识别的结构、序列和关系。理解和利用这些模式可以提高提示的有效性，并有助于从LLM中获得更准确、相关和上下文适当的响应。
- en: 'Patterns in prompt engineering can encompass several aspects, such as the following:'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中的模式可以涵盖以下几个方面：
- en: '**Linguistic patterns**: These include the syntax, grammar, and vocabulary
    used in crafting prompts. By understanding linguistic patterns, prompt engineers
    can create more effective and coherent prompts that guide the LLM to generate
    responses in the desired format, style, and tone.'
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言模式**：这包括在构建提示时使用的语法、语法和词汇。通过理解语言模式，提示工程师可以创建更有效和连贯的提示，引导LLM以所需的格式、风格和语调生成响应。'
- en: '**Task patterns**: Certain tasks or applications may have specific patterns
    or conventions that the model needs to follow. For instance, summarization tasks
    may require the model to condense information while retaining the key points.
    Translation tasks, on the other hand, involve converting text while preserving
    meaning and structure. Recognizing and incorporating these patterns in the prompts
    helps the model generate more appropriate outputs for the given task.'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务模式**：某些任务或应用可能需要遵循特定的模式或惯例。例如，摘要任务可能要求模型在保留关键点的同时压缩信息。另一方面，翻译任务则涉及在保留意义和结构的同时转换文本。在提示中识别和结合这些模式有助于模型为给定任务生成更合适的输出。'
- en: '**Contextual patterns**: These patterns involve the relationships and dependencies
    between the elements in a prompt, such as the context provided to the model, the
    input data, and the desired output. By understanding these patterns, prompt engineers
    can create prompts that better guide the model in generating contextually relevant
    and accurate responses.'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文模式**：这些模式涉及提示中元素之间的关系和依赖性，例如提供给模型的上下文、输入数据和所需输出。通过理解这些模式，提示工程师可以创建更好的提示，以更好地引导模型生成上下文相关和准确的响应。'
- en: '**Response patterns**: This refers to the patterns in the model-generated outputs,
    which can be influenced by the prompt’s structure, phrasing, and tone. Analyzing
    the patterns in LLM responses can help prompt engineers iteratively refine their
    prompts to optimize the model’s performance and reduce inaccuracies or biases.'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应模式**：这指的是模型生成的输出中的模式，它可以受到提示的结构、措辞和语气的影响。分析LLM响应中的模式可以帮助提示工程师迭代优化他们的提示，以优化模型性能并减少不准确或偏差。'
- en: 'In prompt engineering, recognizing, and leveraging patterns is essential for
    several reasons:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示工程中，识别和利用模式对于以下几个原因至关重要：
- en: '**Improves model performance**: Understanding patterns allows prompt engineers
    to design more effective prompts that guide the model in generating accurate and
    contextually appropriate responses'
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高模型性能**：理解模式使得提示工程师能够设计出更有效的提示，引导模型生成准确和上下文相关的响应。'
- en: '**Reduces ambiguity**: By incorporating patterns that make the task, context,
    or desired output more explicit, the model is less likely to produce ambiguous,
    nonsensical, or irrelevant responses'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少歧义**：通过结合使任务、上下文或所需输出更明确的模式，模型产生模糊、无意义或不相关响应的可能性降低。'
- en: '**Adapts to new tasks**: The ability to identify patterns can help prompt engineers
    quickly adapt their prompts to new tasks or domains, enabling more efficient use
    of LLMs in diverse applications'
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适应新任务**：识别模式的能力可以帮助提示工程师快速调整他们的提示以适应新的任务或领域，从而在多样化的应用中更有效地使用LLM。'
- en: '**Mitigates biases**: Recognizing and addressing biases in model-generated
    patterns can help prompt engineers create prompts that generate more fair, unbiased,
    and responsible outputs'
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减轻偏差**：识别和解决模型生成模式中的偏差可以帮助提示工程师创建生成更公平、无偏见和负责任的输出的提示。'
- en: Output patterns refer to the specific structures, formats, or conventions that
    the generated response from an LLM should follow. By providing clear instructions
    and examples within the prompt, you can guide the model to generate outputs that
    adhere to the desired pattern. In the case of generating a list of items formatted
    as a JSON array, the prompt could include an example that demonstrates the expected
    output format.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 输出模式指的是LLM生成的响应应遵循的具体结构、格式或约定。通过在提示中提供明确的指令和示例，您可以引导模型生成遵循所需模式的输出。在生成格式为JSON数组的列表项的情况下，提示可以包括一个示例，展示预期的输出格式。
- en: 'Here’s an example of how to craft such a prompt:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个如何构建此类提示的示例：
- en: 'Prompt:'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE36]'
  id: totrans-289
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'Input:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 输入：
- en: '[PRE37]'
  id: totrans-291
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Output:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE38]'
  id: totrans-293
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'Input:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 输入：
- en: '[PRE39]'
  id: totrans-295
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: 'Output:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE40]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: In this prompt, the task description clearly states the objective of creating
    a JSON array of the items. The example provided within the prompt showcases the
    desired output format, helping the model understand the pattern it should follow
    when generating the response.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个提示中，任务描述清楚地说明了创建项目JSON数组的目标。提示中提供的示例有助于模型理解在生成响应时应遵循的模式。
- en: To ensure consistency in the output pattern, you can also specify additional
    constraints or formatting guidelines within the prompt. For example, you could
    mention that the output should include double quotes around each item or that
    the array should maintain the order of the input items.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保输出模式的一致性，您还可以在提示中指定额外的约束或格式指南。例如，您可以提到输出应包括每个项目周围的引号，或者数组应保持输入项目的顺序。
- en: When working with JSON arrays or other structured data formats, it is crucial
    to ensure that the generated output adheres to the proper syntax and conventions
    of that format. By carefully crafting prompts that include clear instructions,
    examples, and constraints, you can guide the LLM to generate responses that follow
    the desired output pattern, resulting in more accurate, useful, and well-formatted
    outputs for various tasks and applications.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理JSON数组或其他结构化数据格式时，确保生成的输出遵循该格式的正确语法和约定至关重要。通过精心设计包含明确指令、示例和约束的提示，您可以引导LLM生成遵循所需输出模式的响应，从而为各种任务和应用生成更准确、有用和格式良好的输出。
- en: As we have explored so far, there are various effective techniques in prompt
    engineering, such as role prompting, using examples, and applying output patterns.
    Each technique has its strengths but combining them can lead to even more powerful
    results. The synergistic effect of blending different techniques allows prompt
    engineers to craft prompts that elicit highly accurate, natural, and contextually
    appropriate responses from language models.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所探讨的，提示工程中有各种有效技术，如角色提示、使用示例和应用输出模式。每种技术都有其优势，但结合它们可以产生更强大的效果。不同技术融合的协同效应使得提示工程师能够制作出能够从语言模型中引发高度准确、自然和上下文适当的响应的提示。
- en: Mix and match – strategic combinations for enhanced prompts
  id: totrans-302
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 混合搭配——增强提示的战略组合
- en: By thoughtfully integrating complementary approaches, prompt engineers can develop
    prompts that are engaging, natural, and highly effective. In this section, we’ll
    explore examples of prompting techniques working in tandem to elicit accurate,
    contextual responses from language models. Through role prompting, constraints,
    and other techniques working in unison, prompt engineers can guide models to generate
    precisely what is needed for the task at hand.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 通过深思熟虑地整合互补的方法，提示工程师可以开发出引人入胜、自然且高度有效的提示。在本节中，我们将探讨一些提示技术协同工作以从语言模型中引发准确、上下文相关的响应的示例。通过角色提示、约束和其他技术协同工作，提示工程师可以引导模型生成完成任务所需的精确内容。
- en: 'Here are some examples that demonstrate the combination of these techniques:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些示例，展示了这些技术的结合：
- en: '**Combining role prompting** **with examples**:'
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合角色提示和示例**：'
- en: Suppose we want to ask the model for advice on time management in the context
    of a mentor-student relationship. We can combine role prompting with examples
    to create an effective prompt.
  id: totrans-306
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 假设我们想在导师-学生关系的背景下询问模型关于时间管理的建议。我们可以结合角色提示和示例来创建一个有效的提示。
- en: 'Prompt:'
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE41]'
  id: totrans-308
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE41]'
- en: '**Combining role prompting with examples and the** **output pattern**:'
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合角色提示、示例和输出模式**：'
- en: 'Task: Write a concise weather report for a news channel.'
  id: totrans-310
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 任务：为新闻频道写一段简洁的天气预报。
- en: 'Prompt:'
  id: totrans-311
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE42]'
  id: totrans-312
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE42]'
- en: In this case, the prompt provides an example of the output, which also serves
    as a pattern of how the response should be provided.
  id: totrans-313
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这种情况下，提示提供了一个输出示例，同时也作为响应应如何提供的模式。
- en: '**Combining role prompting, examples, and the** **output pattern**:'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合角色提示、示例和输出模式**：'
- en: 'Task: Write a brief movie review for a family-oriented blog.'
  id: totrans-315
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 任务：为面向家庭的博客写一篇简短的电影评论。
- en: 'Prompt:'
  id: totrans-316
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE43]'
  id: totrans-317
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE43]'
- en: The prompt provides an example of the output, which also serves as a pattern
    of how the response should be provided.
  id: totrans-318
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示提供了一个输出示例，同时也作为响应应如何提供的模式。
- en: '**Combining role prompting with the output pattern** **and examples**:'
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合角色提示、输出模式和示例**：'
- en: 'Task: Create a motivational quote to inspire young entrepreneurs.'
  id: totrans-320
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 任务：创建一句励志名言来激励年轻企业家。
- en: 'Prompt:'
  id: totrans-321
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE44]'
  id: totrans-322
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE44]'
- en: '**Combining role prompting, examples, and the** **output pattern**:'
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合角色提示、示例和输出模式**：'
- en: 'Task: Write a short recipe description for a vegan pasta dish.'
  id: totrans-324
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 任务：为素食意面菜谱写一段简短的描述。
- en: 'Prompt:'
  id: totrans-325
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE45]'
  id: totrans-326
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE45]'
- en: '**Combining role prompting, examples, and the** **output pattern**:'
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结合角色提示、示例和输出模式**：'
- en: 'Task: Write a concise fitness tip for people working from home.'
  id: totrans-328
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 任务：为在家工作的人写一条简洁的健身建议。
- en: 'Prompt:'
  id: totrans-329
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 提示：
- en: '[PRE46]'
  id: totrans-330
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE46]'
- en: 'Output:'
  id: totrans-331
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE47]'
  id: totrans-332
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Now that we have covered various techniques for crafting effective prompts,
    let’s shift our focus to exploring the key parameters that can be adjusted to
    control and refine LLM outputs.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经介绍了各种制作有效提示的技术，让我们将注意力转向探索可以调整以控制和细化 LLM 输出的关键参数。
- en: Exploring LLM parameters
  id: totrans-334
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索 LLM 参数
- en: 'LLMs such as OpenAI’s GPT-4 consist of several parameters that can be adjusted
    to control and fine-tune their behavior and performance. Understanding and manipulating
    these parameters can help users obtain more accurate, relevant, and contextually
    appropriate outputs. Some of the most important LLM parameters to consider are
    listed here:'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs，如 OpenAI 的 GPT-4，由几个可以调整以控制和微调其行为和性能的参数组成。理解和操作这些参数可以帮助用户获得更准确、相关和上下文适当的输出。以下列出了一些最重要的
    LLM 参数：
- en: '**Model size**: The size of an LLM typically refers to the number of neurons
    or parameters it has. Larger models can be more powerful and capable of generating
    more accurate and coherent responses. However, they might also require more computational
    resources and processing time. Users may need to balance the trade-off between
    model size and computational efficiency, depending on their specific requirements.'
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型大小**: LLM的大小通常指的是它拥有的神经元或参数数量。较大的模型可能更强大，能够生成更准确和连贯的响应。然而，它们可能也需要更多的计算资源和处理时间。用户可能需要根据具体需求在模型大小和计算效率之间进行权衡。'
- en: '**Temperature**: The temperature parameter controls the randomness of the output
    generated by the LLM. A higher temperature value (for example, 0.8) produces more
    diverse and creative responses, while a lower value (for example, 0.2) results
    in more focused and deterministic outputs. Adjusting the temperature can help
    users fine-tune the balance between creativity and consistency in the model’s
    responses.'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**温度**: 温度参数控制LLM生成的输出的随机性。较高的温度值（例如，0.8）会产生更多样化和创造性的响应，而较低的温度值（例如，0.2）则会导致更专注和确定性的输出。调整温度可以帮助用户微调模型响应中的创造性和一致性之间的平衡。'
- en: '**Top-k**: The top-k parameter is another way to control the randomness and
    diversity of the LLM’s output. This parameter limits the model to consider only
    the top “k” most probable tokens for each step in generating the response. For
    example, if top-k is set to 5, the model will choose the next token from the five
    most likely options. By adjusting the top-k value, users can manage the trade-off
    between response diversity and coherence. A smaller top-k value generally results
    in more focused and deterministic outputs, while a larger top-k value allows for
    more diverse and creative responses.'
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Top-k**: Top-k参数是控制LLM（大型语言模型）输出随机性和多样性的另一种方式。此参数限制模型在生成响应的每一步中仅考虑前“k”个最可能的标记。例如，如果top-k设置为5，模型将从一个最有可能的五个选项中选择下一个标记。通过调整top-k值，用户可以管理响应多样性和连贯性之间的权衡。较小的top-k值通常会导致更专注和确定性的输出，而较大的top-k值则允许有更多样化和创造性的响应。'
- en: '**Max tokens**: The max tokens parameter sets the maximum number of tokens
    (words or subwords) allowed in the generated output. By adjusting this parameter,
    users can control the length of the response provided by the LLM. Setting a lower
    max tokens value can help ensure concise answers, while a higher value allows
    for more detailed and elaborate responses.'
  id: totrans-339
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最大令牌数**: 最大令牌数参数设置了生成输出中允许的最大令牌数（单词或子词）。通过调整此参数，用户可以控制LLM提供的响应长度。设置较低的max
    tokens值可以帮助确保简洁的答案，而较高的值则允许有更详细和详尽的响应。'
- en: '**Prompt length**: While not a direct parameter of the LLM, the length of the
    input prompt can influence the model’s performance. A longer, more detailed prompt
    can provide the LLM with more context and guidance, resulting in more accurate
    and relevant responses. However, users should be aware that very long prompts
    can consume a significant portion of the token limit, potentially truncating the
    model’s output.'
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示长度**: 虽然提示长度不是LLM的直接参数，但它会影响模型的表现。较长的、更详细的提示可以为LLM提供更多的上下文和指导，从而产生更准确和相关的响应。然而，用户应意识到非常长的提示可能会消耗大量令牌限制，从而可能截断模型的输出。'
- en: By understanding these LLM parameters and adjusting them according to specific
    needs and requirements, users can optimize their interactions with the model and
    obtain more accurate, relevant, and contextually appropriate outputs. Balancing
    these parameters and tailoring them to the task at hand is a crucial aspect of
    prompt engineering, which can significantly enhance the overall effectiveness
    of the LLM.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解这些LLM参数并根据具体需求和需求进行调整，用户可以优化与模型的交互，并获得更准确、相关和上下文适当的输出。平衡这些参数并根据手头的任务进行定制是提示工程的关键方面，这可以显著提高LLM的整体有效性。
- en: It’s important to note that different tasks may require different parameter
    settings to achieve optimal results. Users should experiment with various parameter
    combinations and consider the trade-offs between factors such as creativity, consistency,
    response length, and computational requirements. This iterative process of testing
    and refining parameter settings will aid users in unlocking the full potential
    of LLMs such as GPT-4, Claude, and Google Bard.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，不同的任务可能需要不同的参数设置才能达到最佳效果。用户应尝试各种参数组合，并考虑创造力、一致性、响应长度和计算需求等因素之间的权衡。这种测试和改进参数设置的迭代过程将帮助用户充分发挥GPT-4、Claude和Google
    Bard等LLM的潜力。
- en: Playing with different parameters and with different techniques will help you
    understand what works best for every case. The next section dives deeper into
    how to approach that experimentation mindset when working with prompts.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 通过尝试不同的参数和技术，可以帮助你了解每种情况的最佳方案。下一节将深入探讨在处理提示时如何采用这种实验心态。
- en: How to approach prompt engineering (experimentation)
  id: totrans-344
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何处理提示工程（实验）
- en: 'Approaching prompt engineering involves a systematic and iterative process
    of experimentation to achieve the desired output from an LLM. The key is to refine
    and adapt your prompt based on the model’s responses, continually improving its
    effectiveness. Here are the steps to approach prompt engineering through experimentation:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 接近提示工程涉及一个系统性和迭代的实验过程，以从LLM中获得期望的输出。关键是根据模型的响应来精炼和调整你的提示，不断改进其有效性。以下是通过实验方法接近提示工程的步骤：
- en: '**Define the objective**: Clearly outline the goal of the interaction with
    the LLM. Determine the specific information, format, and context required for
    the desired output.'
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义目标**: 明确说明与LLM交互的目标。确定所需的具体信息、格式和上下文，以生成期望的输出。'
- en: '**Craft the initial prompt**: Using the components of a prompt, such as context,
    instruction, role prompting, examples, and output pattern, create a clear and
    concise prompt that communicates your expectations and requirements to the LLM.'
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**制定初始提示**: 使用提示的组成部分，如上下文、指令、角色提示、示例和输出模式，创建一个清晰简洁的提示，向LLM传达你的期望和要求。'
- en: '**Adjust LLM parameters**: Set the initial values for LLM parameters, such
    as temperature, top-k, and max tokens, based on your output preferences, such
    as creativity, determinism, and response length.'
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**调整LLM参数**: 根据你的输出偏好，如创造力、确定性和响应长度，设置LLM参数的初始值，如温度、top-k和最大标记数。'
- en: '**Test and evaluate**: Submit the prompt to the LLM and analyze the generated
    output. Assess how well the response aligns with your expectations, considering
    factors such as relevance, coherence, format, and tone.'
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**测试和评估**: 将提示提交给LLM，并分析生成的输出。评估响应与你的期望如何相符，考虑因素包括相关性、连贯性、格式和语气。'
- en: '**Refine the prompt**: Based on the output’s evaluation, identify areas of
    improvement, and modify the prompt accordingly. This could involve clarifying
    the instructions, adding examples, adjusting the output pattern, or altering the
    role prompting. Also, consider refining the LLM parameters if necessary, tweaking
    values such as temperature or top-k to influence the response’s creativity or
    determinism.'
  id: totrans-350
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**精炼提示**: 根据输出评估，确定改进区域，并相应地修改提示。这可能包括澄清指令、添加示例、调整输出模式或改变角色提示。如有必要，还可以考虑精炼LLM参数，调整如温度或top-k等值，以影响响应的创造力和确定性。'
- en: '**Iterate**: Repeat the testing, evaluation, and refinement process until the
    LLM generates a satisfactory output that meets your criteria. This iterative approach
    helps fine-tune the prompt engineering process and adapt it to various tasks and
    requirements.'
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**迭代**: 重复测试、评估和改进过程，直到LLM生成满足你标准的满意输出。这种迭代方法有助于微调提示工程流程，并适应各种任务和需求。'
- en: '**Document successes and failures**: Keep a record of successful prompt engineering
    techniques and parameter settings, as well as those that didn’t work as expected.
    This documentation will serve as a valuable reference in future experiments, allowing
    you to build on previous experiences and streamline the prompt engineering process.'
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**记录成功与失败**: 保留成功和未达到预期效果的提示工程技术和参数设置的记录。这份文档将在未来的实验中作为宝贵的参考资料，帮助你基于以往的经验构建，并简化提示工程流程。'
- en: '**Share findings and collaborate**: Engage with the broader LLM user community
    to share insights, learn from others’ experiences, and collaboratively develop
    best practices for prompt engineering. Exchanging knowledge and ideas can help
    improve the overall effectiveness and efficiency of the prompt engineering process.'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分享发现并合作**：与更广泛的LLM用户社区互动，分享见解，从他人的经验中学习，并共同制定提示工程的最佳实践。知识和思想的交流可以帮助提高提示工程过程的整体效果和效率。'
- en: '**Apply transferable techniques**: As you gain experience in prompt engineering,
    identify techniques and strategies that can be applied across various tasks and
    domains. These transferable approaches can help you quickly adapt your prompt
    engineering skills to new challenges and maximize the effectiveness of LLM interactions.'
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**应用可转移的技术**：随着你在提示工程中积累经验，识别可以应用于各种任务和领域的技巧和策略。这些可转移的方法可以帮助你快速适应新的挑战，并最大化LLM交互的有效性。'
- en: '**Stay up to date with LLM advancements**: As large-scale LLMs continue to
    evolve, it’s essential to stay informed about new developments, features, and
    best practices. Regularly review updates, research, and resources from LLM developers,
    such as OpenAI, to ensure that your prompt engineering techniques remain effective
    and relevant.'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**关注LLM的进步**：随着大规模LLM的持续发展，了解新的发展、功能和最佳实践至关重要。定期审查LLM开发者（如OpenAI）的更新、研究和资源，以确保你的提示工程技巧保持有效和相关性。'
- en: '**Explore creative applications**: Prompt engineering is not limited to conventional
    tasks and outputs. Experiment with innovative and creative applications of LLMs,
    pushing the boundaries of what these models can achieve. This exploratory approach
    can lead to novel solutions, insights, and applications that demonstrate the true
    potential of large-scale LLMs. By approaching prompt engineering through systematic
    experimentation, users can incrementally improve their prompts and LLM interactions,
    ensuring more accurate, relevant, and contextually appropriate outputs. This process
    encourages learning, adaptation, and the development of effective strategies for
    harnessing the full potential of large-scale LLMs such as GPT-4.'
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**探索创意应用**：提示工程不仅限于传统任务和输出。尝试创新和创意的LLM应用，推动这些模型所能达到的边界。这种探索性方法可以带来新颖的解决方案、见解和应用，展示大规模LLM的真实潜力。通过系统实验的方法来处理提示工程，用户可以逐步改进他们的提示和LLM交互，确保输出更加准确、相关和符合上下文。'
- en: Even though prompt engineering is very powerful, it can lead to wrong results.
    Thus, in the next section, we will explore some of their limitations and how you
    can try to mitigate them.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管提示工程非常强大，但它可能导致错误的结果。因此，在下一节中，我们将探讨一些限制以及如何尝试减轻它们。
- en: The challenges and limitations of using LLM prompts
  id: totrans-358
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用LLM提示的挑战和限制
- en: 'While LLMs such as GPT-4 have demonstrated remarkable capabilities in generating
    human-like responses, they also come with their own set of challenges and limitations
    when it comes to crafting effective prompts. Some of these challenges and limitations
    are as follows:'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管LLM如GPT-4在生成类似人类的响应方面表现出惊人的能力，但在制定有效的提示时，它们也带来了一组挑战和限制。以下是一些挑战和限制：
- en: '**Verbosity**: LLMs tend to generate verbose outputs, often providing more
    information than necessary or repeating ideas. Crafting prompts that encourage
    concise responses can be challenging and may require iterating on the prompt and
    setting appropriate constraints.'
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**冗长**：LLM倾向于生成冗长的输出，经常提供比必要更多的信息或重复观点。构建鼓励简洁响应的提示可能具有挑战性，可能需要迭代提示并设置适当的约束。'
- en: '**Ambiguity**: LLMs may struggle with ambiguous or poorly defined prompts,
    resulting in outputs that do not meet the user’s expectations. Users must invest
    time and effort to create clear and specific prompts that minimize ambiguity.'
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**歧义**：LLM可能难以处理模糊或定义不明确的提示，导致输出不符合用户的期望。用户必须投入时间和精力来创建清晰和具体的提示，以最大限度地减少歧义。'
- en: '**Inconsistency**: LLMs can sometimes generate responses that contain contradicting
    information or vary in quality across different runs. Ensuring the consistency
    of the output may require fine-tuning the parameters and prompt engineering techniques.'
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不一致性**：LLM有时会生成包含相互矛盾信息或在不同运行中质量不同的响应。确保输出的连贯性可能需要微调参数和提示工程技术。'
- en: '**Lack of common sense**: Although LLMs have a vast knowledge base, they can
    occasionally produce outputs that lack common sense or make incorrect assumptions.
    Users may need to experiment with different prompt techniques to obtain more accurate
    and sensible responses.'
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺乏常识**：尽管大型语言模型（LLMs）拥有庞大的知识库，但它们有时会产生缺乏常识或做出错误假设的输出。用户可能需要尝试不同的提示技巧来获得更准确和合理的响应。'
- en: '**Bias**: LLMs can inadvertently exhibit biases present in their training data.
    Consequently, the LLMs may inadvertently learn and perpetuate these biases and
    discriminatory beliefs, leading to skewed perspectives and unfair outcomes. This
    can have serious implications, especially when LLMs are used in areas such as
    hiring, education, and decision-making. Therefore, it is crucial to recognize
    and address these biases in LLMs, ensuring that these powerful tools are used
    responsibly and ethically.'
  id: totrans-364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏见**：LLMs可能会无意中表现出其训练数据中存在的偏见。因此，LLMs可能会无意中学习和延续这些偏见和歧视性信念，导致观点偏颇和不公平的结果。这可能会产生严重的影响，尤其是在LLMs被用于招聘、教育和决策等领域时。因此，识别和解决LLMs中的这些偏见至关重要，确保这些强大的工具被负责任和道德地使用。'
- en: '**Hallucinations**: LLM hallucinations refer to instances when an LLM generates
    text that is factually incorrect, nonsensical, or unrelated to the context of
    the input. This phenomenon occurs because LLMs learn patterns and associations
    from the vast amount of training data, but they do not possess an intrinsic understanding
    of the world or the ability to reason like humans. As a result, they may sometimes
    produce outputs that seem plausible but are inaccurate or illogical. Hallucinations
    can be particularly concerning when users rely on LLMs for factual information,
    decision-making, or content generation. To mitigate the impact of hallucinations,
    users must invest in refining the models, creating better evaluation metrics,
    and implementing user feedback loops to enhance the performance and reliability
    of LLMs.'
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻觉**：LLMs的幻觉指的是LLMs生成与输入上下文不符、不合逻辑或无关的文本的情况。这种现象发生是因为LLMs从大量的训练数据中学习模式和关联，但它们不具备对世界的内在理解或像人类一样推理的能力。因此，它们有时可能会产生看似合理但实际上不准确或不合逻辑的输出。当用户依赖LLMs获取事实信息、进行决策或生成内容时，幻觉可能会特别令人担忧。为了减轻幻觉的影响，用户必须投资于改进模型、创建更好的评估指标和实施用户反馈循环，以增强LLMs的性能和可靠性。'
- en: As we come to the end of this chapter, we have embarked on a comprehensive exploration
    of AI prompts, delving into their components, types, and practical applications.
    With this foundational knowledge, we are now equipped to dive deeper into the
    world of prompt engineering and uncover advanced techniques in the upcoming chapters.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 随着本章的结束，我们开始全面探索AI提示，深入其组成部分、类型和实际应用。有了这些基础知识，我们现在可以更深入地探索提示工程的世界，并在接下来的章节中揭示高级技术。
- en: Summary
  id: totrans-367
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this introductory chapter, you embarked on a journey to explore the world
    of AI prompts. This chapter provided a comprehensive overview of LLM prompts,
    including their components, types, and how they function. Through practical examples
    and use cases, you witnessed the power and versatility of LLM prompts, such as
    generating product descriptions and translating text.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的介绍中，你开始了探索AI提示世界的旅程。本章提供了LLM提示的全面概述，包括其组成部分、类型及其工作方式。通过实际示例和用例，你见证了LLM提示的力量和多功能性，例如生成产品描述和翻译文本。
- en: By exploring the different types of prompts and their role in guiding LLMs,
    you gained a solid foundation in prompt engineering. You became familiar with
    the key components of a prompt, such as the input prompt, context, and response,
    and understood how they shape the output of the language model.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 通过探索不同类型的提示及其在引导LLMs中的作用，你在提示工程方面打下了坚实的基础。你熟悉了提示的关键组成部分，如输入提示、上下文和响应，并理解了它们如何塑造语言模型的输出。
- en: This chapter emphasized the importance of voice definition and patterns in creating
    engaging and effective content. You discovered how these elements give your writing
    a unique personality and maintain a smooth flow, making your messages impactful
    and memorable.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 本章强调了在创建引人入胜和有效内容时，声音定义和模式的重要性。你发现了这些元素如何赋予你的写作独特的个性，并保持流畅，使你的信息具有影响力和记忆点。
- en: While exploring the potential of LLM prompts, this chapter also addressed the
    challenges and limitations associated with their usage. By understanding these
    obstacles, you gained insights into how to navigate them and make informed decisions
    in your prompt engineering endeavors.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索 LLM 提示语的潜力时，本章还讨论了与它们使用相关的挑战和限制。通过理解这些障碍，你获得了如何应对它们并在你的提示语工程实践中做出明智决策的见解。
- en: As this chapter concludes, you are now equipped with a comprehensive foundation
    for the rest of this book. With a solid understanding of LLM prompts, you are
    ready to explore advanced techniques, combine different prompt engineering approaches,
    experiment with various parameters, and overcome challenges to unlock new possibilities.
    Throughout your journey, you will harness the power of LLM prompts to create remarkable
    experiences and achieve your desired outcomes.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 随着本章的结束，你现在拥有了本书其余部分的综合基础。通过对 LLM 提示语的深入理解，你准备好探索高级技术，结合不同的提示语工程方法，尝试各种参数，并克服挑战以开启新的可能性。在整个旅程中，你将利用
    LLM 提示语的强大功能来创造非凡的体验并实现你的预期目标。
- en: Having established a solid foundation in prompt engineering, we will now set
    our sights on applying these skills to unlock the power of AI for automated content
    creation. This will be explored in depth in the upcoming chapter.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立了提示语工程的坚实基础之后，我们现在将目光转向将这些技能应用于释放 AI 自动内容创建的潜力。这将在接下来的章节中深入探讨。
