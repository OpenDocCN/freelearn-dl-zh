  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 要能够在这个章节中玩转提示，你需要使用以下工具之一或多个创建一个账户：
- en: '**OpenAI** **ChatGPT**: [https://chat.openai.com/](https://chat.openai.com/).'
  id: totrans-25
  prefs:
