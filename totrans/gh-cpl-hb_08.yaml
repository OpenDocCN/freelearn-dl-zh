- en: Part 3
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3部分
- en: Exploring GitHub Copilot Integrations
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索GitHub Copilot集成
- en: 'Outside of all the features integrated in the editor, there are a lot of extension
    points with other systems as well. GitHub shows its industry strengths with its
    platform, which handles all different software development lifecycle steps in
    a single integrated platform, layering GitHub Copilot functionality on top of
    it: you can start a conversation with the AI right from github.com, create an
    issue with all the context you need to define the changes that you want to have
    implemented, and then hand that off to the Coding Agent to create the pull request
    and changes for you. Even better: for incoming PRs, GitHub Copilot can already
    do the first PR review for you!'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 除了集成在编辑器中的所有功能外，还有许多与其他系统的扩展点。GitHub凭借其平台展示了其行业实力，该平台可以处理所有不同的软件开发生命周期步骤，并在其上叠加GitHub
    Copilot功能：你可以在github.com上直接与AI开始对话，创建一个包含所有必要上下文的问题，以定义你想要实现的变化，然后将它交给编码代理来为你创建拉取请求和更改。更好的是：对于传入的PR，GitHub
    Copilot已经可以为你进行第一次PR审查了！
- en: As well as those features integrated into the web interface, we also take a
    deep look at how the Model Context Protocol (MCP) is revolutionizing the integration
    with other systems to bring even more context into your AI experience. From adding
    requirements from an external system (Jira, Azure DevOps – you name it) to letting
    the Agent Mode write back to external systems as well. You’ll see how powerful
    it is to bring in the requirements right from where you define them into your
    chat conversation, and let Agent Mode make the necessary changes!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 除了集成到Web界面中的功能外，我们还深入探讨了模型上下文协议（MCP）如何革命性地改变与其他系统的集成，将更多的上下文带入你的AI体验。从添加来自外部系统（Jira、Azure
    DevOps——你叫什么名字）的要求，到让代理模式也能将更改写回外部系统。你将看到将要求直接从你定义的地方带入你的聊天对话是多么强大，让代理模式进行必要的更改！
