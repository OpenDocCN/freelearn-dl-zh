- en: '12'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Creating a Generative AI-Based Bot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So far, we’ve worked on things that are pretty limited as far as human interaction
    goes – you create a file, start a process, send an email, and then hand it off
    to an app or a flow and wait for a result. It can be great.
  prefs: []
  type: TYPE_NORMAL
- en: However, when dealing with people sometimes a little more is needed – such as
    some level of response and follow-up, someone (or something) that can understand
    their questions – even if they’re not exactly phrased in the right way. This is
    an area where a generative, conversational AI bot can be helpful.
  prefs: []
  type: TYPE_NORMAL
- en: In many large companies, human resources is one of the busiest departments –
    constantly being bombarded by people trying to figure out where the latest benefits
    forms are, what the vacation accrual policy is, or where to apply for a corporate
    credit card. While **frequently asked question** (**FAQ**) sites have been staples
    of the self-service world since websites were created, they can be cumbersome
    to manage, update, and search. They depend on people using the right keywords
    or phrases to get to the answer, which can be a frustrating experience if you
    don’t know the technical term for something. In times such as these, it’s easier
    just to pick up the phone and call someone.
  prefs: []
  type: TYPE_NORMAL
- en: What if there was a better way? What if you could build an app that could somehow
    understand the intent behind these questions?
  prefs: []
  type: TYPE_NORMAL
- en: What if I told you that a smarter way exists and that it exists in Microsoft
    365?
  prefs: []
  type: TYPE_NORMAL
- en: Learning about the solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this solution, we’ll be exploring the new Copilot Studio, the upgraded home
    for copilots – previously known as Power Virtual Agents. This set of development
    tools enables users to build powerful chatbots using a guided, no-code graphical
    interface.
  prefs: []
  type: TYPE_NORMAL
- en: These chatbots are used to automate conversations and interactwith customers
    or employees without the need for direct human intervention – perfect for our
    human resources scenario.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we dig in, let’s talk about the features and capabilities of copilots
    at a high level:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Integration across the Microsoft 365 ecosystem**: Chatbots can integrate
    with various Microsoft products and services (such as Dynamics 365, Power BI,
    and Azure services), as well as external systems through APIs. This integration
    allows the chatbots to perform complex actions and retrieve data from other systems
    as part of the conversation flow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Using AI and natural language processing**: Copilots use Microsoft’s AI and
    natural language processing capabilities to understand and interpret user inputs,
    enabling the chatbot to respond to queries in a more natural and effective manner.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customizable workflows**: Copilot authors can define specific workflows,
    or **topics**, which guide the chatbot’s responses and actions based on the conversation
    context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s look at some of the foundational elements of working with a copilot.
  prefs: []
  type: TYPE_NORMAL
- en: What’s a topic, anyway?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Topics are essentially conversation paths that a chatbot or conversational bot
    can take. They’re the most basic building blocks of chatbots. Authors define topics
    that a chatbot can answer, populate questions or keywords (known as **triggers**)
    that will cause the bot to take a certain path (called a **conversation node**),
    and end with pre-defined content, answers, or workflows.
  prefs: []
  type: TYPE_NORMAL
- en: For example, imagine you have created a chatbot that is designed to answer questions
    about expense reports. You think about the common requests that a user might make,
    such as *Where do I submit my expense report?*, *Can I expense meals?*, or *How
    long until my expense report gets paid?* You can create a topic for those questions
    and populate the trigger with phrases such as *expense*, *submit expense report*,
    or *reimbursement schedule*. When the user enters one of those words or phrases
    (or something similar), the appropriate conversation node is started.
  prefs: []
  type: TYPE_NORMAL
- en: Along that path, you might configure the bot to ask refining questions. The
    user’s answers to those questions can be saved into **variables** and then used
    to check against **conditions** (think about the Power Automate flows used earlier
    in this book) that further route the conversation down a decided path. Ultimately,
    you might display something as simple as a link to a web page or a redirection
    to another topic. You could also return something more complex, such as the result
    of retrieving a record from a database or handing off an interaction to an agent.
  prefs: []
  type: TYPE_NORMAL
- en: Copilot Studio also provides a variety of **system topics**. These built-in
    topics take care of a lot of the nuts-and-bolts parts of your copilot, such as
    starting and ending conversations or error handling. You can’t delete system topics,
    although you can disable them. *Figure 12**.1* depicts the built-in system topics.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.1 – Viewing the system topics](img/B21234_12_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.1 – Viewing the system topics
  prefs: []
  type: TYPE_NORMAL
- en: What are generative answers?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The topics we’ve discussed so far are pre-defined conversation paths – either
    curated topics that you’ve created or system-defined ones that are added when
    your copilot is first created. Generative answers are a bit different – rather
    than designing a path, they allow you to supply information (documents, websites,
    or other data sources) that a generative AI can reason over and attempt to return
    an answer. Generative answers return information even if no specific topic has
    been created.
  prefs: []
  type: TYPE_NORMAL
- en: Expanding on the previous section’s expense report example, let’s say a user
    is looking for information on how to categorize expenses. They enter the `expense`
    keyword, but the topic directs them to the expense reporting application.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, the *expense* keyword has triggered a topic about submitting an
    expense report, but it doesn’t match their intent. You might, however, have a
    table embedded in a document that explains qualifying expense items and categories.
    Copilot allows you to leverage this type of existing documented knowledge using
    a process called **Retrieval-Augmented Generation** (**RAG**). By updating the
    copilot configuration with data sources, you can allow the copilot to “read” content
    and dynamically answer questions based on what it understands.
  prefs: []
  type: TYPE_NORMAL
- en: By leveraging both curated topics and generative AI, copilots can provide a
    great service experience and help both customers and employees get the answers
    they’re looking for.
  prefs: []
  type: TYPE_NORMAL
- en: Designing a solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When developing a copilot, the first question that must be answered is, *what
    is the goal of this copilot*? In this case, we’re going to build a copilot that
    answers human resources questions based on a mix of pre-defined topics and organizational
    content (RAG). The content will be sourced from a sample set of human resources
    policy documentation and include information such as the organization’s employee
    handbook, vacation policy, internet usage policy, cell phone policy, and work-from-home
    policy.
  prefs: []
  type: TYPE_NORMAL
- en: 'When designing chatbots, you’ll want to consider questions such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: What kinds of topics should be included?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are possible scenarios for the topics? What categories do the scenarios
    fall into, such as informational, task completion, or troubleshooting?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What types of trigger words, phrases, or questions could you, as a user, utter
    to activate a particular topic?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What kind of information or outcomes would you expect or find helpful?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It may be helpful to draw a map for the conversation nodes tree, organize the
    topics, and refine how to best direct user questions. See *Figure 12**.2* for
    an example of how you might diagram topics.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.2 – An example topic flow](img/B21234_12_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.2 – An example topic flow
  prefs: []
  type: TYPE_NORMAL
- en: You can create a diagram for each topic area, refining it until you have identified
    the most efficient paths to help the consumers of your bot get the information
    they need. You’ll also want to note the outcomes, such as navigating to a particular
    file or site, providing a defined answer, and identifying what data sources you’ll
    use as part of your workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: While it is indeed possible to configure a copilot to pull data directly from
    SharePoint sites or other security-walled content, that process is a lot more
    involved (including Entra ID app registrations and API permission delegation),
    and it’s much more of a *pro-code* type of solution than we’re aiming for in this
    book. If you want to learn more about expanding into content stored in SharePoint
    Online and OneDrive for Business, visit [https://learn.microsoft.com/en-us/microsoft-copilot-studio/nlu-generative-answers-sharepoint-onedrive](https://learn.microsoft.com/en-us/microsoft-copilot-studio/nlu-generative-answers-sharepoint-onedrive).
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’ll look at what it takes (from a licensing perspective) to enable these
    features.
  prefs: []
  type: TYPE_NORMAL
- en: Licensing prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Copilot Studio and copilots require licensing (like other features in the Microsoft
    365 suite). For the purposes of this chapter, we’ll be focusing on internal copilots
    and their requirements. In order to complete the examples here, you’ll need a
    Copilot Studio license (either a Copilot Studio tenant subscription or Copilot
    for Microsoft 365).
  prefs: []
  type: TYPE_NORMAL
- en: Licensing guidance
  prefs: []
  type: TYPE_NORMAL
- en: For more information on precise Copilot licensing scenarios, visit [https://go.microsoft.com/fwlink/?linkid=2085130](https://go.microsoft.com/fwlink/?linkid=2085130).
  prefs: []
  type: TYPE_NORMAL
- en: This solution will also use ChatGPT to generate certain types of answers. If
    you configured an OpenAI subscription for one of the other chapters in this book,
    you can go ahead and use that.
  prefs: []
  type: TYPE_NORMAL
- en: Preparing solution prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Before we start working with Copilot Studio, you’ll want to gather documents
    that can be used for the generative AI answers.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll be using a set of sample organizational policy documents,
    including content covering work-from-home, harassment, and corporate credit card
    policies. You can gather your own or use the set supplied here: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  prefs: []
  type: TYPE_NORMAL
- en: Creating the copilot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With your source data gathered, it’s time to start working with Copilot Studio!
  prefs: []
  type: TYPE_NORMAL
- en: To create your copilot, follow these steps.
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Create a custom copilot** or **New copilot** to get started.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.3 – Launching Copilot Studio](img/B21234_12_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.3 – Launching Copilot Studio
  prefs: []
  type: TYPE_NORMAL
- en: On the **Create a copilot** page, enter a copilot name and select a language.
    Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.4 – Bootstrapping a copilot](img/B21234_12_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.4 – Bootstrapping a copilot
  prefs: []
  type: TYPE_NORMAL
- en: Wait while Copilot Studio sets up your copilot.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, it’s time to update your new copilot with some topics!
  prefs: []
  type: TYPE_NORMAL
- en: Customizing the copilot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: First, we’ll start by configuring our curated content and conversation paths.
    As you’ll recall from earlier, this type of configuration, called a **topic**,
    is used when you have an idea of what a user might ask and where the best matching
    content is located. You can also use topics to integrate your copilot with other
    Power Platform components, such as a flow.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new topic that uses ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The process for creating a new topic is very similar to creating a Power Automate
    flow. Like a flow, a topic has **triggers** and **actions** and can utilize **conditions**
    to determine what paths to take.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, we’ll create a simple topic:'
  prefs: []
  type: TYPE_NORMAL
- en: On the **Topics** page, click **Create**. Point to **Topic**, and then select
    **Create from description** **with Copilot**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.5 – Creating a new topic](img/B21234_12_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.5 – Creating a new topic
  prefs: []
  type: TYPE_NORMAL
- en: In the `Holidays`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Tell user what this year's observed holidays are` and `List` `company-paid
    holidays`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.6 – Providing instructions to the copilot](img/B21234_12_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.6 – Providing instructions to the copilot
  prefs: []
  type: TYPE_NORMAL
- en: Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Review the trigger that was generated. If you think of other ideas (or want
    to remove some of the generated trigger phrases), you can click **Edit** in the
    **Phrases** card to configure other words or phrases that will activate this topic.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.7 – Reviewing the trigger phrases](img/B21234_12_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.7 – Reviewing the trigger phrases
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see that Copilot Studio populated a **Message** card with a response
    that the bot will give back. While that’s potentially helpful, it excludes a lot
    of our observed holidays. Go ahead and delete any message cards that have been
    configured by clicking the ellipsis in the upper-right corner of the card and
    selecting **Delete**, as shown in *Figure 12**.8*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.8 – Deleting a card](img/B21234_12_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.8 – Deleting a card
  prefs: []
  type: TYPE_NORMAL
- en: Click **+** under the trigger card to add a node. Select **Ask** **a question**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.9 – Adding a question node](img/B21234_12_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.9 – Adding a question node
  prefs: []
  type: TYPE_NORMAL
- en: We want to allow users to plan their vacation schedules further in advance,
    so we need an option for what years they want to view the holiday schedule.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.10 – Adding question text](img/B21234_12_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.10 – Adding question text
  prefs: []
  type: TYPE_NORMAL
- en: In the **Identify** box, choose **User’s entire response**. This will allow
    the virtual agent to capture the text response that the user enters.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.11 – Updating the Identify variable type](img/B21234_12_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.11 – Updating the Identify variable type
  prefs: []
  type: TYPE_NORMAL
- en: Under `Year` (see *Figure 12**.12*).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.12 – Updating the variable name](img/B21234_12_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.12 – Updating the variable name
  prefs: []
  type: TYPE_NORMAL
- en: After the **Question** card, select **+** and add a node. Then, select **Create**
    **a flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.13 – Adding a flow action](img/B21234_12_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.13 – Adding a flow action
  prefs: []
  type: TYPE_NORMAL
- en: 'Wait until a new browser window for Power Automate opens. After a moment, it
    should appear with two cards added – **When Power Virtual Agents calls a flow**
    and **Return value(s) to Power Virtual Agents**, as shown in *Figure 12**.14*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.14 – Viewing the Power Automate canvas with PVA actions](img/B21234_12_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.14 – Viewing the Power Automate canvas with PVA actions
  prefs: []
  type: TYPE_NORMAL
- en: Select the `Prompt`, and then place the `Prompt` text in the hint box.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.15 – Adding a text input](img/B21234_12_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.15 – Adding a text input
  prefs: []
  type: TYPE_NORMAL
- en: Add an `ChatCompletion` and set its type to **String** (see *Figure 12**.16*).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.16 – Initializing a variable](img/B21234_12_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.16 – Initializing a variable
  prefs: []
  type: TYPE_NORMAL
- en: Add an **HTTP** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **URI** field, enter [https://api.openai.com/v1/chat/completions](https://api.openai.com/v1/chat/completions).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Method** dropdown, select **POST**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add a header named `Authorization` with the value `Bearer <OpenAI key>` (see
    *Figure 12**.17*).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.17 – Configuring the HTTP action](img/B21234_12_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.17 – Configuring the HTTP action
  prefs: []
  type: TYPE_NORMAL
- en: 'Enter the following text in the **Body** field. You can replace the holidays
    as you wish:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Replace the `**PROMPT**` text with the **Prompt** dynamic content token from
    the **When Power Virtual Agents calls a** **flow** trigger.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.18 – Updating the body with the Prompt dynamic content token](img/B21234_12_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.18 – Updating the body with the Prompt dynamic content token
  prefs: []
  type: TYPE_NORMAL
- en: After the **HTTP** action, add a **Parse** **JSON** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Content** field, select the **Body** dynamic content token from the
    **HTTP** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Schema** text area, paste the following content:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: If this looks familiar, it should. It’s the schema that gets generated when
    you paste the text from an API call to OpenAI’s ChatGPT completions endpoint.
    You can generate it yourself by creating a manual flow, configuring an HTTP action,
    and then sending a chat completion request (*steps 15* to *20*). The schema, as
    you may recall, defines the format of the JSON output object.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Review *Figure 12**.19* to see what the configured schema looks like.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 12.19 – Configuring the Parse JSON action](img/B21234_12_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.19 – Configuring the Parse JSON action
  prefs: []
  type: TYPE_NORMAL
- en: After the **Parse JSON** action, add a **Set** **Variable** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Name** dropdown of the **Set Variable** action, choose the variable
    for **ChatCompletion** that you created earlier.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Value** field, select the **Body content** dynamic content token of
    the **Parse JSON** action, as shown in *Figure 12**.20*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.20 – Configuring the Set variable action](img/B21234_12_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.20 – Configuring the Set variable action
  prefs: []
  type: TYPE_NORMAL
- en: Select the **Return value(s) to Power Virtual** **Agents** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add an output** and select **Text** as the type.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set the name of the output as `Completion`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set the value of the output to be the dynamic content token for the **ChatCompletion**
    variable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.21 – Configuring the return value](img/B21234_12_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.21 – Configuring the return value
  prefs: []
  type: TYPE_NORMAL
- en: If desired, rename the flow `Holiday Completion` (or something similar) so that
    you can identify it when looking at your flows.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Go back to the browser tab that has Copilot Studio open. You may be asked to
    refresh it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'After the question card, click **+** to call an action again. This time, the
    **Holiday Completion** flow should appear for you to select, as shown in *Figure
    12**.**22*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.22 – Adding the Holiday Completion action](img/B21234_12_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.22 – Adding the Holiday Completion action
  prefs: []
  type: TYPE_NORMAL
- en: Update the action with the **Prompt** variable (**Year**) that you set up in
    *step 10*. This will configure the copilot to send the **Year** variable that
    will be used as the input in the **Holiday** **Completion** flow.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.23 – Setting up the variable to send to the flow](img/B21234_12_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.23 – Setting up the variable to send to the flow
  prefs: []
  type: TYPE_NORMAL
- en: After the action, click **+** and add the **Send a** **message** card.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.24 – Adding the Send a message card](img/B21234_12_24.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.24 – Adding the Send a message card
  prefs: []
  type: TYPE_NORMAL
- en: Customize the message card with text. You can select the **{x}** icon to insert
    the variables that you’ve used in this node. For example, adding the **Year**
    variable will display the year that the user entered, while entering the **Completion**
    variable will insert the value returned from ChatGPT.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.25 – Configuring the message card](img/B21234_12_25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.25 – Configuring the message card
  prefs: []
  type: TYPE_NORMAL
- en: After the message card, add a node, point to **Topic management**, and select
    **End conversation**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.26 – Adding an End conversation node](img/B21234_12_26.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.26 – Adding an End conversation node
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s move ahead and continue customizing the copilot.
  prefs: []
  type: TYPE_NORMAL
- en: Disabling template topics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Every copilot is created with some base topic templates. Before making your
    copilot public, you should disable unused or template topics to ensure that your
    copilot behaves as anticipated and only returns relevant content.
  prefs: []
  type: TYPE_NORMAL
- en: 'To disable topics, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: In Copilot Studio, select **Topics**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Hover over the **Lesson 1** - a sample topic to expose the **More** **options**
    ellipsis.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.27 – Exploring topics](img/B21234_12_27.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.27 – Exploring topics
  prefs: []
  type: TYPE_NORMAL
- en: Click the ellipsis to expand the **More options** panel, and then select either
    the **Status** toggle to disable the topic or the **Delete** option to delete
    the topic altogether. If deleting a topic, you will be prompted for confirmation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.28 – Disabling and deleting topics](img/B21234_12_28.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.28 – Disabling and deleting topics
  prefs: []
  type: TYPE_NORMAL
- en: Repeat for the **Lesson 2** and **Lesson** **3** topics.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, your bot will only respond with appropriate topics.
  prefs: []
  type: TYPE_NORMAL
- en: Adding content for generative AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At this point, we’re going to add our organizational content to bolster our
    bot’s capability to answer questions.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are three primary content sources for generative AI:'
  prefs: []
  type: TYPE_NORMAL
- en: Public websites
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Files stored in Dataverse
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Files stored in OneDrive for Business and SharePoint Online
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Both content from public websites and files stored in Dataverse are very easy
    to configure and integrate. Files stored in OneDrive for Business and SharePoint
    Online require substantially more configuration from an authentication perspective,
    falling more into the *pro-code* category of development.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we’ll add our stock files.
  prefs: []
  type: TYPE_NORMAL
- en: Online content
  prefs: []
  type: TYPE_NORMAL
- en: For the sample online content used to develop this solution, see the [*Chapter
    12*](B21234_12.xhtml#_idTextAnchor165) artifacts located at [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).
  prefs: []
  type: TYPE_NORMAL
- en: 'To start configuring a generative topic, follows these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to Copilot Studio ([https://copilotstudio.microsoft.com](https://copilotstudio.microsoft.com))
    and open your newly created copilot.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Overview** page of the copilot, select **Add files**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.29 – Testing the generative AI response](img/B21234_12_29.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.29 – Testing the generative AI response
  prefs: []
  type: TYPE_NORMAL
- en: On the **Generative AI** page, either drag your policy document files into the
    **Upload a document** area or select the **click to browse** link to navigate
    to your source folder containing the policy document files.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.30 – Configuring the generative AI sources](img/B21234_12_30.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.30 – Configuring the generative AI sources
  prefs: []
  type: TYPE_NORMAL
- en: After you upload the files to Dataverse, Copilot Studio will initiate an indexing
    process. After the indexing process has been completed, you’ll be able to ask
    questions about the content in these policy documents!
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.31 – Indexing the policy documents](img/B21234_12_31.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.31 – Indexing the policy documents
  prefs: []
  type: TYPE_NORMAL
- en: After the content has been indexed, scroll down toward the bottom of the page.
    Uploading content by itself doesn’t enable the generative AI features, so we need
    to do that as well. Enable the **Boost conversational coverage with generative
    answers** slide toggle.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.32 – Enabling the generative answers feature](img/B21234_12_32.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.32 – Enabling the generative answers feature
  prefs: []
  type: TYPE_NORMAL
- en: 'Click the **Save** icon at the top of the panel. The status bar should update,
    indicating that Copilot Studio is enabling generative answers, as shown in *Figure
    12**.33*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.33 – Saving changes](img/B21234_12_33.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.33 – Saving changes
  prefs: []
  type: TYPE_NORMAL
- en: To verify that it’s ready to go, head back over to **Topics** > **System** and
    look for the **Conversational boosting** system topic.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.34 – Verifying that the Conversational boosting topic has been
    created](img/B21234_12_34.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.34 – Verifying that the Conversational boosting topic has been created
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’ll put our copilot through its paces!
  prefs: []
  type: TYPE_NORMAL
- en: Testing the copilot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this section, we’re going to test both of our copilot configurations – the
    ChatGPT-based **Holidays** topic and the generative answers.
  prefs: []
  type: TYPE_NORMAL
- en: The Holidays topic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, we’ll test the **Holidays** topic that we created:'
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Test copilot** button in the navigation bar to open the **Test copilot**
    chat flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Once the flyout has appeared, enter one of the trigger phrases to launch the
    **Holidays** topic:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.35 – Testing the copilot](img/B21234_12_35.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.35 – Testing the copilot
  prefs: []
  type: TYPE_NORMAL
- en: Review the output. If you’ve made it all the way through successfully, your
    bot should respond with the output it retrieved from ChatGPT!
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.36 – Reviewing the data from ChatGPT](img/B21234_12_36.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.36 – Reviewing the data from ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: That’s pretty great!
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s ask it a question that could only be answered through generative
    answer boosting.
  prefs: []
  type: TYPE_NORMAL
- en: Generative answers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To see what information generative answers have learned, try asking your new
    copilot a question that you would be able to obtain from the uploaded documents:'
  prefs: []
  type: TYPE_NORMAL
- en: In the chat area, ask your copilot a question. In this example, you might ask
    something such as *What is the* *discrimination policy?*
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.37 – Asking the copilot for a generative answer-based response](img/B21234_12_37.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.37 – Asking the copilot for a generative answer-based response
  prefs: []
  type: TYPE_NORMAL
- en: Click the link for the citation to bring up the uploaded policy document.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 12.38 – Reviewing the source material for the copilot’s answer](img/B21234_12_38.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.38 – Reviewing the source material for the copilot’s answer
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! You’ve built a copilot with two different types of AI-enhanced
    content!
  prefs: []
  type: TYPE_NORMAL
- en: Further exploration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This just scratches the surface of what a copilot can be for your organization.
    You can build a giant copilot to reason over tomes of data, or several smaller,
    more targeted copilots that can be used to help provide users with answers based
    on organizational knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: 'What are some ideas that you might have to expand on this copilot? Consider
    using conditions to navigate to new conversation nodes and topics, such as the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a topic about corporate credit cards and provide a multiple-choice option
    to navigate to the card request application or the expense reporting site.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrate a question at the end of a curated topic to find out whether the answer
    was useful. If not, link to the **Conversational booster** topic and let the user
    ask generative answers for more details.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored different ways to integrate generative AI into
    copilots (formerly known as Power Virtual Agents). You were able to send requests
    to ChatGPT to obtain answers for corporate holidays using a specifically crafted
    prompt, while RAG allowed you to provide answers to questions based on organizational
    content that you uploaded to Dataverse.
  prefs: []
  type: TYPE_NORMAL
- en: Each of these ideas can be expanded to create even more functional copilots.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll take this copilot and make it available for people
    to use!
  prefs: []
  type: TYPE_NORMAL
