- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the following 10 project cases, we are going to select ESP32-C3 as an example
    of interaction with the Arduino sensors. The hardware specification and pin definition
    of ESP32-C3 are illustrated in [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302).
  prefs: []
