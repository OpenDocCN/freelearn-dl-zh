- en: Code example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'An example of the `main.cpp` code can be found at the following link: [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_2/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_2/main.cpp).'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example code, the following three functions were reused from the previous
    project:'
  prefs: []
  type: TYPE_NORMAL
- en: '`void updateIndicatorStatus()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`void beepBuzzerAlert()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`void printSystemStatus()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instead of reading the analog value of the flame sensor, we use a new Boolean
    function, `isFlameOn()`, to read the digital value (`LOW` for no flame detected
    or `HIGH` for flame detected), and return the comparison result as `true` or `false`,
    simplifying the logic for determining the system’s response to the flame sensor’s
    output.
  prefs: []
  type: TYPE_NORMAL
- en: In this project, we effectively determined the presence of a flame by examining
    the digital value of the flame sensor pin in each loop period. This approach allowed
    us to use an LED and a buzzer to indicate whether a flame was detected, reinforcing
    our understanding of condition-based responses using digital sensor readings.
  prefs: []
  type: TYPE_NORMAL
- en: Building on this knowledge, our next project will involve using a similar approach
    to read the digital value from a PIR motion sensor. This project aims to detect
    the presence of people or animals in front of the sensor, further enhancing your
    skills in integrating sensors for real-time monitoring and alert systems in IoT
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: Project 3 – PIR motion detection
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The project employs the HC-SR501, a PIR sensor that is engineered specifically
    for the purpose of detecting the presence of humans or animals. It achieves this
    through the utilization of infrared signals. The sensor offers two distinct operating
    modes, which are *Repeatable (H)* and *Non-Repeatable (L)*. These modes offer
    flexibility in terms of application and use. The sensor finds itself particularly
    well suited for a wide variety of applications, including but not limited to automatic
    lighting, security alarms, and industrial automation control.
  prefs: []
  type: TYPE_NORMAL
- en: One of the standout features of this sensor is its wide temperature range capabilities.
    This means it can function effectively in a range of different environmental conditions.
    In addition to this, it also boasts low power consumption. This makes it an economical
    choice, particularly for long-term deployment. As such, it proves to be a versatile
    option for any motion detection requirements, delivering both efficiency and adaptability.
  prefs: []
  type: TYPE_NORMAL
