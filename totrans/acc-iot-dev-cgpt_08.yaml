- en: Project 8 – collision detection
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This project focuses on the concept of collision detection, an essential component
    in many fields and applications. The main feature of this project is the use of
    a switch sensor, which is also commonly known as a **bump switch**, a **mechanical
    switch**, or a **tactile switch**.
  prefs: []
  type: TYPE_NORMAL
- en: These types of switches are simple, yet highly effective, making them a popular
    choice for detecting physical contact or impact. They are widely used in various
    fields and applications, ranging from complex robotic systems to critical safety
    devices. The primary function of these switches is their ability to change states
    – from `ON` to `OFF` or vice versa – upon encountering any sort of physical force
    or obstruction.
  prefs: []
  type: TYPE_NORMAL
- en: This unique characteristic makes them exceptionally suitable for tasks requiring
    basic collision or proximity detection. Whether it is to prevent a robot from
    bumping into an obstacle or to trigger an alarm when a certain boundary is breached,
    these switches prove to be highly useful and reliable. The project aims to provide
    a comprehensive understanding of how to best use these switches in various practical
    scenarios.
  prefs: []
  type: TYPE_NORMAL
