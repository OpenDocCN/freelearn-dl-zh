- en: Project 4 – gas detection
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This project adopts an MQ-2 sensor, a sensor that has garnered widespread acceptance
    and use in the field of gas detection equipment due to its robust capabilities.
    The MQ-2 sensor is not only capable but also highly proficient in detecting an
    extensive variety of gases. These include **liquefied petroleum gas** (**LPG**),
    i-butane, propane, methane, alcohol, hydrogen, and even smoke.
  prefs: []
  type: TYPE_NORMAL
- en: This wide range of detection capabilities makes the MQ-2 sensor an incredibly
    versatile tool. It’s not just the variety of gases the sensor can detect that
    separates it from the rest, but also its speed and sensitivity. The sensor is
    highly regarded for its rapid response time, a feature that is particularly valuable
    in critical situations where time is of the essence. Furthermore, its high sensitivity
    allows for the detection of even minute amounts of gas, which can be crucial in
    preventing potential hazards.
  prefs: []
  type: TYPE_NORMAL
- en: Given these unique attributes, the MQ-2 sensor is an ideal choice for myriad
    safety applications, especially those where the detection of gas leakage is of
    paramount importance.
  prefs: []
  type: TYPE_NORMAL
