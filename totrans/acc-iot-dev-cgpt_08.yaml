  type: TYPE_NORMAL
- en: 'An example of the `main.cpp` code can be found at the following link: [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_5/main.cpp](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_8/Project_5/main.cpp).'
  prefs: []
  type: TYPE_NORMAL
- en: In this project, we utilized the HC-SR04 ultrasonic sensor to report real-time
    distance measurements from the sensor to objects in its path. Unlike our previous
    projects, which returned Boolean results, indicating the presence or absence of
    a condition, this project uses the `readUltrasoundSensor()` function to calculate
    and return the measured distance. This distance is calculated by measuring the
    time lapse between sending a pulse from the Trig pin and receiving the echo at
    the Echo pin, using the `SOUND_SPEED_CM_PER_US = 0.017` constant, which represents
    the speed of sound in cm/μs, divided by 2\. The distance thus measured is indicated
    using an LED and a buzzer, enhancing our proficiency in processing real-time sensor
    data and implementing responsive alert systems.
  prefs: []
  type: TYPE_NORMAL
- en: For our next project, we plan to incorporate the SW-520D sensor for tilt detection.
    This project will focus on enhancing our understanding of monitoring tilt status
    changes and responding promptly. This will further cultivate our expertise in
    integrating diverse sensor types for real-time monitoring and alert systems.
  prefs: []
  type: TYPE_NORMAL
- en: Project 6 – tilt detection
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This project employs the use of the SW-520D sensor, a simplistic yet highly
    effective tilt sensor that boasts a wide range of applications. This versatility
    makes it suitable for anything from small-scale hobbyist projects to more complex
    and advanced electronic systems. The core of the sensor is comprised of two metal
    balls housed within a cylindrical case.
  prefs: []
  type: TYPE_NORMAL
- en: The functionality of this sensor is based on its position relative to the ground.
    When the sensor is tilted beyond a 15-degree angle from a horizontal position,
    the two metal balls make contact with the terminals, subsequently closing the
    circuit. This mechanism allows the sensor to detect significant shifts in orientation.
  prefs: []
  type: TYPE_NORMAL
- en: However, when the sensor returns to a horizontal state or is tilted less than
    15 degrees, the metal balls will not touch the terminals. This results in the
    circuit remaining open.
  prefs: []
  type: TYPE_NORMAL
- en: The practical applications of the SW-520D sensor are numerous. By detecting
    the orientation or movement of an object, it can be used in various contexts such
    as monitoring the opening and closing of a door, tracking the movement of a robot,
    or even as a component in a toy.
  prefs: []
  type: TYPE_NORMAL
