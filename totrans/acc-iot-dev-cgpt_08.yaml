  type: TYPE_NORMAL
- en: '**Distance measurement**: The sensor is used in applications requiring precise
    distance measurements, such as in manufacturing and quality control processes'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Parking sensors**: In automotive applications, the HC-SR04 can be used to
    develop parking assistance systems to alert drivers about the distance to objects
    behind the vehicle'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security and surveillance**: The sensor can be integrated into security systems
    to detect the presence of persons or objects in restricted areas'
  prefs:
  - PREF_UL
