  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这导入了我们在LangChain中需要使用`ChatTogether`集成的包，并加载了API密钥（在运行此行代码之前别忘了将其添加到`env.txt`文件中！）。
- en: 'Just like we did in the past with the OpenAI API key, we are going to pull
