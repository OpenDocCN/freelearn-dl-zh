  id: totrans-171
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'We are going to use the Llama 3 Chat model and Mistral’s Mixtral 8X22B Instruct
    model, but you can choose from 50+ models here: [https://docs.together.ai/docs/inference-models](https://docs.together.ai/docs/inference-models
    )'
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们将使用Llama 3 Chat模型和Mistral的Mixtral 8X22B Instruct模型，但你可以在这里选择50多个模型：[https://docs.together.ai/docs/inference-models](https://docs.together.ai/docs/inference-models)
- en: You may find a better model for your particular needs!
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会找到更适合你特定需求的更好模型！
- en: 'Here, we are defining the models:'
