- en: '10'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Key RAG Components in LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter takes an in-depth look at the key technical components that we
    have been talking about as they relate to **LangChain** and **retrieval-augmented
    generation** (**RAG)**. As a refresher, the key technical components of our RAG
    system, in order of how they are used, are **vector stores**, **retrievers**,
    and **large language models** (**LLMs**). We will step through the latest version
    of our code, last seen in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176),
    *Code lab – 8.3*. We will focus on each of these core components, and we will
    show the various options for each component using LangChain in the code. Naturally,
    a lot of this discussion will highlight differences among the options and discuss
    the different scenarios in which one option might be better over another.
  prefs: []
  type: TYPE_NORMAL
- en: We start with a code lab outlining options for your vector store.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The code for this chapter is placed in the following GitHub repository: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_10](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_10).'
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 10.1 – LangChain vector store
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The goal for all these code labs is to help you become more familiar with how
    the options for each key component offered within the LangChain platform can enhance
    your RAG system. We will dive deep into what each component does, available functions,
    parameters that make a difference, and ultimately, all of the options you can
    take advantage of for a better RAG implementation. Starting with *Code lab 8.3*,
    (skipping [*Chapter 9*](B34736_09_ePub.xhtml#_idTextAnchor209)’s evaluation code),
    we will step through these elements in order of how they appear in code, starting
    with the vector stores. You can find this code in its entirety in the *Chapter
    10* code folder on GitHub, also labeled as 10.1.
  prefs: []
  type: TYPE_NORMAL
- en: Vector stores, LangChain, and RAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Vector stores** play a crucial role in RAG systems by efficiently storing
    and indexing vector representations of the knowledge base documents. LangChain
    provides seamless integration with various vector store implementations, such
    as **Chroma**, **Weaviate**, **FAISS** (**Facebook AI Similarity Search**), **pgvector**,
    and **Pinecone**. For this code lab, we will show the code for adding your data
    to Chroma, Weaviate, and FAISS, laying the groundwork for you to be able to integrate
    any vector store among the many that LangChain offers. These vector stores offer
    high-performance similarity search capabilities, enabling fast retrieval of relevant
    documents based on the query vector.'
  prefs: []
  type: TYPE_NORMAL
- en: LangChain’s vector store class serves as a unified interface for interacting
    with different vector store backends. It provides methods for adding documents
    to the vector store, performing similarity searches, and retrieving the stored
    documents. This abstraction allows developers to easily switch between vector
    store implementations without modifying the core retrieval logic.
  prefs: []
  type: TYPE_NORMAL
- en: When building a RAG system with LangChain, you can leverage the vector store
    class to efficiently store and retrieve document vectors. The choice of vector
    store depends on factors such as scalability, search performance, and deployment
    requirements. Pinecone, for example, offers a fully managed vector database with
    high scalability and real-time search capabilities, making it suitable for production-grade
    RAG systems. On the other hand, FAISS provides an open source library for efficient
    similarity search, which can be used for local development and experimentation.
    Chroma is a popular place for developers to start when building their first RAG
    pipelines due to its ease of use and its effective integration with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you look at the code we discussed in previous chapters, we are already using
    Chroma. Here is a snippet of that code showing our use of Chroma, which you can
    find in the code for this code lab as well:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: LangChain calls this an **integration** since it is integrating with a third
    party called Chroma. There are many other integrations available with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: On the LangChain website, as it currently stands, there is an **Integrations**
    link in the main website navigation at the top of the website page. If you click
    on that, you will see a menu down the left side that stretches out pretty far
    and has the main categories of **Providers** and **Components**. As you might
    have guessed, this gives you the ability to view all the integrations by either
    providers or components. If you click on **Providers**, you will first see **Partner
    Packages** and **Featured Community Providers**. Chroma is not currently in either
    of these lists, but if you want to find out more about Chroma as a provider, click
    on the link near the end of the page that says **Click here to see all providers**.
    The list is in alphabetical order. Scroll down to the Cs and find Chroma. This
    will show you useful LangChain documentation related to Chroma, particularly in
    creating both the vector store and the retriever.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another useful approach is to click on **Vector stores** under **Components**.
    There are currently 49 vector store options! The current link is here for version
    0.2.0, but keep an eye out for future versions as well:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://python.langchain.com/v0.2/docs/integrations/vectorstores/](https://python.langchain.com/v0.2/docs/integrations/vectorstores/
    )'
  prefs: []
  type: TYPE_NORMAL
- en: 'Another area we highly recommend you review is the LangChain vector store documentation
    here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://api.python.langchain.com/en/latest/core_api_reference.html#module-langchain_core.vectorstores](https://api.python.langchain.com/en/latest/core_api_reference.html#module-langchain_core.vectorstores
    )'
  prefs: []
  type: TYPE_NORMAL
- en: We have already talked about our current vector store and Chroma in general
    in depth in past chapters, but let’s review Chroma and discuss where it is most
    useful.
  prefs: []
  type: TYPE_NORMAL
- en: Chroma
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Chroma** is an open source AI-native vector database designed for developer
    productivity and ease of use. It offers fast search performance and seamless integration
    with LangChain through its Python SDK. Chroma supports various deployment modes,
    including in-memory, persistent storage, and containerized deployment using Docker.'
  prefs: []
  type: TYPE_NORMAL
- en: One of the key advantages of Chroma is its simplicity and developer-friendly
    API. It provides straightforward methods for adding, updating, deleting, and querying
    documents in the vector store. Chroma also supports dynamic filtering of collections
    based on metadata, allowing for more targeted searches. Additionally, Chroma offers
    built-in functionality for document chunking and indexing, making it convenient
    to work with large text datasets.
  prefs: []
  type: TYPE_NORMAL
- en: When considering Chroma as a vector store for a RAG application, it’s important
    to evaluate its architecture and selection criteria. Chroma’s architecture consists
    of an indexing layer for fast vector retrieval, a storage layer for efficient
    data management, and a processing layer for real-time operations. Chroma integrates
    smoothly with LangChain, allowing developers to leverage its capabilities within
    the LangChain ecosystem. The Chroma client can be easily instantiated and passed
    to LangChain, enabling efficient storage and retrieval of document vectors. Chroma
    also supports advanced retrieval options, such as **maximum marginal relevance**
    (**MMR**) and metadata filtering to refine search results.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, Chroma is a solid choice for developers seeking an open source, easy-to-use
    vector database that integrates well with LangChain. Its simplicity, fast search
    performance, and built-in document processing features make it an attractive option
    for building RAG applications. In fact, these are some of the reasons why we chose
    to feature Chroma in this book in several of the chapters. However, it’s important
    to assess your specific requirements and compare Chroma with other vector store
    alternatives to determine the best fit for your project. Let’s look at the code
    and discuss some of the other options available, starting with FAISS.
  prefs: []
  type: TYPE_NORMAL
- en: FAISS
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s start with how our code would change if we wanted to use FAISS as our
    vector store. You would first need to install FAISS:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'After you have restarted the kernel (since you installed a new package), run
    all the code down to the vector store-related cell, and replace the Chroma-related
    code with the FAISS vector store instantiation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The `Chroma.from_documents()` method call has been replaced with `FAISS.from_documents()`.
    The `collection_name` and `client` parameters are not applicable to FAISS, so
    they have been removed from the method call. We repeat some of the code that we
    saw with the Chroma vector store, such as the document generation, which allows
    us to show the exact equivalent in code between the two vector store options.
    With these changes, the code can now use FAISS as the vector store instead of
    Chroma.
  prefs: []
  type: TYPE_NORMAL
- en: '**FAISS** is an open source library developed by Facebook AI. FAISS offers
    high-performance search capabilities and can handle large datasets that may not
    fit entirely in memory. Much like other vector stores mentioned here, the architecture
    of FAISS consists of an indexing layer that organizes vectors for fast retrieval,
    a storage layer for efficient data management, and an optional processing layer
    for real-time operations. FAISS provides various indexing techniques, such as
    clustering and quantization, to optimize search performance and memory usage.
    It also supports GPU acceleration for even faster similarity search.'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have NVIDIA GPUs available, you can install the GPU-accelerated version
    instead of the CPU version we installed previously:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Note that `faiss-gpu` requires an NVIDIA GPU with CUDA support. This package
    will not work on Apple Silicon Macs, AMD GPUs, or machines without a compatible
    NVIDIA graphics card. If you are unsure whether your system has a compatible GPU,
    stick with `faiss-cpu`.
  prefs: []
  type: TYPE_NORMAL
- en: Using the GPU version of FAISS can significantly speed up the similarity search
    process, especially for large-scale datasets. GPUs can handle a large number of
    vector comparisons in parallel, enabling faster retrieval of relevant documents
    in a RAG application. If you are working in an environment that deals with massive
    amounts of data and requires a substantial performance boost compared to what
    we have already been working with (Chroma), you should definitely test FAISS GPU
    and see the impact it can have for you.
  prefs: []
  type: TYPE_NORMAL
- en: The FAISS LangChain documentation provides detailed examples and guides on how
    to use FAISS within the LangChain framework. It covers topics such as ingesting
    documents, querying the vector store, saving and loading indexes, and performing
    advanced operations, such as filtering and merging. The documentation also highlights
    FAISS-specific features, such as similarity search with scores and serialization/deserialization
    of indexes.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, FAISS is a powerful and efficient vector store option for building
    RAG applications with LangChain. Its high-performance search capabilities, scalability,
    and seamless integration with LangChain make it a compelling choice for developers
    seeking a robust and customizable solution for storing and retrieving document
    vectors.
  prefs: []
  type: TYPE_NORMAL
- en: Those are two powerful options for your vector store needs. Next, we will show
    and discuss the Weaviate vector store option.
  prefs: []
  type: TYPE_NORMAL
- en: Weaviate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are multiple options for how you want to use and access Weaviate. We are
    going to show the embedding version, which runs a Weaviate instance from your
    application code rather than from a standalone Weaviate server installation.
  prefs: []
  type: TYPE_NORMAL
- en: When Embedded Weaviate starts for the first time, it creates a permanent datastore
    in the location set in `persistence_data_path`. When your client exits, the Embedded
    Weaviate instance also exits, but the data persists. The next time the client
    runs, it starts a new instance of Embedded Weaviate. New Embedded Weaviate instances
    use the data that is saved in the datastore.
  prefs: []
  type: TYPE_NORMAL
- en: If you are familiar with **GraphQL**, you may recognize the influence it has
    had on Weaviate when you start looking at the code. The query language and API
    are inspired by GraphQL, but Weaviate does not use GraphQL directly. Weaviate
    uses a RESTful API with a query language that resembles GraphQL in terms of its
    structure and functionality. Weaviate uses predefined data types for properties
    in the schema definition, similar to GraphQL’s scalar types. The available data
    types in Weaviate include string, int, number, Boolean, date, and others.
  prefs: []
  type: TYPE_NORMAL
- en: One strength of Weaviate is its support of batch operations for creating, updating,
    or deleting multiple data objects in a single request. This is similar to GraphQL’s
    mutation operations, where you can perform multiple changes in a single request.
    Weaviate uses the `client.batch` context manager to group multiple operations
    into a batch, which we will demonstrate in a moment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with how our code would change if we wanted to use Weaviate as
    our vector store. You will first need to install Weaviate and its dependencies.
    Note that Weaviate has specific dependency requirements that may conflict with
    some system-installed packages, particularly on macOS with Homebrew Python:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'After you have restarted the kernel (since you installed a new package), you
    run all the code down to the vector store-related cell, and update the code with
    the FAISS vector store instantiation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, there are many additional packages to import for Weaviate. We
    also install `tqdm`, which is not specific to Weaviate, but it is required, as
    Weaviate uses `tqdm` to show progress bars when it loads.
  prefs: []
  type: TYPE_NORMAL
- en: 'We must first declare `weaviate_client` as the Weaviate client:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The differences between our original Chroma vector store code and using Weaviate
    are more complicated than other approaches we have taken so far. With Weaviate,
    we initialized with the `weaviate.Client` client and the embedding options to
    enable embedded mode, as you saw previously.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we proceed, we need to make sure there is not already an instance of
    the `weaviate_client` client in place, or our code will fail:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: For Weaviate, you have to make sure you clear out any lingering schemas from
    past iterations since they can persist in the background.
  prefs: []
  type: TYPE_NORMAL
- en: 'We then use `weaviate_client` to establish our database using a GraphQL-like
    definition schema:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: This provides a full schema class that you will later pass into the vector store
    definition as part of the `weviate_client` object. You need to define this schema
    for your collection using the `client.collections.create()` method. The schema
    definition includes specifying the class name, properties, and their data types.
    Properties can have different data types, such as string, integer, and Boolean.
    As you can see, Weaviate enforces a stricter schema validation compared to what
    we’ve used in previous labs with Chroma.
  prefs: []
  type: TYPE_NORMAL
- en: While this GraphQL-like schema adds some complexity to establishing your vector
    store, it also gives you more control of your database in helpful and powerful
    ways. In particular, you have more granular control over how to define your schema.
  prefs: []
  type: TYPE_NORMAL
- en: 'You may recognize the next code as it looks a lot like the `dense_documents`
    and `sparse_documents` variables we have defined in the past, but if you look
    closely, there is a slight difference that is important in Weaviate:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: There is a slight change to these definitions for Weaviate when we pre-process
    the documents with the metadata. We use `"doc_id"` rather than `"id"` for Weaviate.
    This is because `"id"` is used internally and is not available for our use. Later
    in the code, when you extract the ID from the metadata results, you will want
    to update that code to use `"doc_id"` as well.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we define our vector store, similar to what we have done in the past
    with Chroma and FAISS, but with Weaviate-specific parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: For the vector store initialization, Chroma uses the `from_documents` method
    to create the vector store directly from the documents, whereas, for Weaviate,
    we create the vector store and then add the documents after. Weaviate also requires
    additional configuration, such as `text_key`, `attributes`, and `by_text`. One
    major difference is Weaviate’s use of a schema.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lastly, we load up the Weaviate vector store instance with our actual content,
    which also applies the `embedding` function in the process:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: In summary, Chroma offers a simpler and more flexible approach to data schema
    definition and focuses on embedding storage and retrieval. It can be easily embedded
    into your application. On the other hand, Weaviate provides a more structured
    and feature-rich vector database solution with explicit schema definition, multiple
    storage backends, and built-in support for various embedding models. It can be
    deployed as a standalone server or hosted in the cloud. The choice between Chroma,
    Weaviate, or any of the other vector stores depends on your specific requirements,
    such as the level of schema flexibility, deployment preferences, and the need
    for additional features beyond embedding storage.
  prefs: []
  type: TYPE_NORMAL
- en: Note that you can use any one of these vector stores, and the remaining code
    will work with the data loaded into them. This is a strength of using LangChain,
    which allows you to swap components in and out. This is particularly necessary
    in the world of generative AI, where new and dramatically improved technologies
    are launching all the time. Using this approach, if you come across a newer and
    better vector store technology that makes a difference in your RAG pipeline, you
    can make this change relatively quickly and easily.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s talk next about another key component in the LangChain arsenal that is
    at the center of a RAG application: the retriever.'
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 10.2 – LangChain retrievers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In this code lab, we will cover a few examples of the most important component
    in the retrieval process: the **LangChain retriever**. Like the LangChain vector
    store, there are too many options for LangChain retrievers to list here. We will
    focus on a few popular choices that are particularly applicable to RAG applications,
    and we encourage you to look at all the others to see if there are better options
    for your specific situation. Just like we discussed with the vector stores, there
    is ample documentation on the LangChain website that will help you find your best
    solution: [https://python.langchain.com/v0.2/docs/integrations/retrievers/](https://python.langchain.com/v0.2/docs/integrations/retrievers/
    )'
  prefs: []
  type: TYPE_NORMAL
- en: 'The documentation for the retriever package can be found here: [https://api.python.langchain.com/en/latest/core_api_reference.html#module-langchain_core.retrievers](https://api.python.langchain.com/en/latest/core_api_reference.html#module-langchain_core.retrievers
    )'
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s get started with coding for retrievers!
  prefs: []
  type: TYPE_NORMAL
- en: Retrievers, LangChain, and RAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Retrievers** are responsible for querying the vector store and retrieving
    the most relevant documents based on the input query. LangChain offers a range
    of retriever implementations that can be used in conjunction with different vector
    stores and query encoders.'
  prefs: []
  type: TYPE_NORMAL
- en: In our code so far, we have already seen three versions of the retriever; let’s
    review them first, as they relate to the original Chroma-based vector store.
  prefs: []
  type: TYPE_NORMAL
- en: Basic retriever (dense embeddings)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We start with the **dense retriever**. This is the code we have used in several
    of our code labs up to this point:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The dense retriever is created using the `vectorstore.as_retriever` function,
    specifying the number of top results to retrieve (`“k”:10`). Under the hood of
    this retriever, Chroma uses dense vector representations of the documents and
    performs a similarity search using cosine distance or Euclidean distance to retrieve
    the most relevant documents based on the query embedding.
  prefs: []
  type: TYPE_NORMAL
- en: This is using the simplest type of retriever, the vector store retriever, which
    simply creates embeddings for each piece of text and uses those embeddings for
    retrieval. The retriever is essentially a wrapper around the vector store. Using
    this approach gives you access to the built-in retrieval/search functionality
    of the vector store, but in a way that integrates and interfaces with the LangChain
    ecosystem. It is a lightweight wrapper around the vector store class that gives
    you a consistent interface for all of the retriever options in LangChain. Because
    of this, once you construct a vector store, it’s very easy to construct a retriever.
    If you need to change your vector store or retriever, that is also very easy to
    do.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two primary search capabilities that come from these types of retrievers,
    stemming directly from the vector stores that they wraps: similarity search and
    MMR.'
  prefs: []
  type: TYPE_NORMAL
- en: Similarity score threshold retrieval
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'By default, retrievers use similarity search. If you want to set a threshold
    of similarity, though, you simply need to set the search type to `similarity_score_threshold`
    and set that similarity score threshold within the `kwargs` function that you
    pass to the `retriever` object. The code looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: This is a useful upgrade to the default similarity search that can be useful
    in many RAG applications. However, similarity search is not the only type of search
    these retrievers can support; there is also MMR.
  prefs: []
  type: TYPE_NORMAL
- en: MMR
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**MMR** is a technique used to retrieve relevant items from a query while avoiding
    redundancy. It balances relevancy and diversity in the items retrieved, as opposed
    to simply retrieving the most relevant items, which can be similar. MMR is often
    used in information retrieval and can be used to summarize documents by calculating
    the similarity between parts of the text. To set up your retriever to use this
    type of search, rather than a similarity search, you can add `search_type="mmr"`
    as a parameter when you define the retriever, like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Adding this to any vector store-based retriever will cause it to utilize an
    MMR-type search.
  prefs: []
  type: TYPE_NORMAL
- en: Similarity search and MMR can be supported by any vector stores that also support
    those search techniques. Let’s next talk about the sparse search mechanism we
    introduced in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176), the BM25 retriever.
  prefs: []
  type: TYPE_NORMAL
- en: BM25 retriever
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**BM25** is a ranking function used for sparse text retrieval, and `BM25Retriever`
    is the LangChain representation of BM25 that can be used for sparse text retrieval
    purposes.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You have seen this retriever as well, as we used it to turn our basic search
    into a hybrid search in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176).
    We see this in our code with these settings:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: The `BM25Retriever.from_documents()` method is called to create a sparse retriever
    from the sparse documents, specifying the number of top results to retrieve (`k=10`).
  prefs: []
  type: TYPE_NORMAL
- en: BM25 works by calculating a relevance score for each document based on the query
    terms and the document’s **term frequencies and inverse document frequencies**
    (**TF-IDF**). It uses a probabilistic model to estimate the relevance of documents
    to a given query. The retriever returns the top-k documents with the highest BM25
    scores.
  prefs: []
  type: TYPE_NORMAL
- en: Ensemble retriever
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'An **ensemble retriever** combines multiple retrieval methods and uses an additional
    algorithm to combine their results into one set. An ideal use of this type of
    retriever is when you want to combine dense and sparse retrievers to support a
    hybrid retriever approach, like what we created in [*Chapter 8*](B34736_08_ePub.xhtml#_idTextAnchor176)’s
    *Code lab 8.3*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: In our case, the ensemble retriever combines the Chroma dense retriever and
    the BM25 sparse retriever to achieve better retrieval performance. It is created
    using the `EnsembleRetriever` class, which takes the list of retrievers and their
    corresponding weights. In this case, the dense retriever and sparse retriever
    are passed with equal weights of 0.5 each.
  prefs: []
  type: TYPE_NORMAL
- en: The `c` parameter in the ensemble retriever is a reranking parameter that controls
    the balance between the original retrieval scores and the reranking scores. It
    is used to adjust the influence of the reranking step on the final retrieval results.
    In this case, the `c` parameter is set to `0`, which means no reranking is performed.
    When `c` is set to a non-zero value, the ensemble retriever performs an additional
    reranking step on the retrieved documents. The reranking step rescores the retrieved
    documents based on a separate reranking model or function. The reranking model
    can take into account additional features or criteria to assess the relevance
    of the documents to the query.
  prefs: []
  type: TYPE_NORMAL
- en: In RAG applications, the quality and relevance of the retrieved documents directly
    impact the generated output. By utilizing the `c` parameter and a suitable reranking
    model, you can enhance the retrieval results to better suit the specific requirements
    of your RAG application. For example, you can design a reranking model that takes
    into account factors such as document relevance, coherence with the query, or
    domain-specific criteria. By setting an appropriate value for `c`, you can strike
    a balance between the original retrieval scores and the reranking scores, giving
    more weight to the reranking model when needed. This can help prioritize documents
    that are more relevant and informative for the RAG task, leading to improved generated
    outputs.
  prefs: []
  type: TYPE_NORMAL
- en: When a query is passed to the ensemble retriever, it sends the query to both
    the dense and sparse retrievers. The ensemble retriever then combines the results
    from both retrievers based on their assigned weights and returns the top-k documents.
    Under the hood, the ensemble retriever leverages the strengths of both dense and
    sparse retrieval methods. Dense retrieval captures semantic similarity using dense
    vector representations, while sparse retrieval relies on keyword matching and
    term frequencies. By combining their results, the ensemble retriever aims to provide
    more accurate and comprehensive search results.
  prefs: []
  type: TYPE_NORMAL
- en: The specific classes and methods used in the code snippet may vary depending
    on the library or framework being used. However, the general concepts of dense
    retrieval using vector similarity search, sparse retrieval using BM25, and ensemble
    retrieval combining multiple retrievers remain the same.
  prefs: []
  type: TYPE_NORMAL
- en: That covers the retrievers we have already seen in previous code, all drawn
    from the data we accessed and processed during the indexing stage. There are numerous
    other retriever types that work with data you extract from documents that you
    can explore on the LangChain website to suit your needs. However, not all retrievers
    are designed to pull from documents you are processing. Next, we will review an
    example of a retriever built off a public data source, Wikipedia.
  prefs: []
  type: TYPE_NORMAL
- en: Wikipedia retriever
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'As described by the creators of the Wikipedia retriever on the LangChain website
    ([https://www.langchain.com/](https://www.langchain.com/)):'
  prefs: []
  type: TYPE_NORMAL
- en: '*Wikipedia is the largest and most-read reference work in history, acting as
    a multilingual free online encyclopedia written and maintained by a community
    of volunteers.*'
  prefs: []
  type: TYPE_NORMAL
- en: That sounds like a great resource to tap for useful knowledge in your RAG applications!
    We will add a new cell after our existing retriever cell, where we will use this
    Wikipedia retriever to retrieve wiki pages from wikipedia.org into the document
    format that is used downstream.
  prefs: []
  type: TYPE_NORMAL
- en: 'We first need to install a couple of new packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: As always, when you install new packages, don’t forget to restart your kernel!
  prefs: []
  type: TYPE_NORMAL
- en: 'With the `WikipediaRetriever` retriever, we now have a mechanism that can fetch
    data from Wikipedia as it relates to the user query we pass to it, similar to
    the other retrievers we have used, but using the whole of Wikipedia data behind
    it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: In this code, we import the `WikipediaRetriever` class from the `langchain_community.retrievers`
    module. `WikipediaRetriever` is a retriever class specifically designed to retrieve
    relevant documents from Wikipedia based on a given query. We then instantiate
    an instance of this receiver using the `WikipediaRetriever` class and assign it
    to the variable retriever. The `load_max_docs` parameter is set to 10, indicating
    that the retriever should load a maximum of 10 relevant documents. The user query
    here is `"What defines the golden age of piracy in the Caribbean?"`, and we can
    look at the response to see what Wikipedia articles are retrieved to help answer
    this question.
  prefs: []
  type: TYPE_NORMAL
- en: 'We call the `get_relevant_documents` method of the retriever object, passing
    in a query string as an argument, and receive this as the first document in that
    response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: 'You can see the matching content at this link:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://en.wikipedia.org/wiki/Golden_Age_of_Piracy](https://en.wikipedia.org/wiki/Golden_Age_of_Piracy)'
  prefs: []
  type: TYPE_NORMAL
- en: This link was provided as the source by the retriever.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, this code demonstrates how to use the `WikipediaRetriever` class
    from the `langchain_community.retrievers` module to retrieve relevant documents
    from Wikipedia based on a given query. It then extracts and prints specific metadata
    information (title, summary, source) and the content of the first retrieved document.
  prefs: []
  type: TYPE_NORMAL
- en: '`WikipediaRetriever` internally handles the process of querying Wikipedia’s
    API or search functionality, retrieving the relevant documents, and returning
    them as a list of `Document` objects. Each `Document` object contains metadata
    and the actual page content, which can be accessed and utilized as needed. There
    are many other retrievers that can access public data sources similar to this,
    but focused on specific domains. For scientific research, there is `PubMedRetriever`.
    For other fields of research, such as mathematics and computer science, there
    is `ArxivRetreiver`, which accesses data from the open-access archive of more
    than 2 million scholarly articles about these subjects. In the finance world,
    there is a retriever called `KayAiRetriever` that can access **Securities and
    Exchange Commission** (**SEC**) filings, which contain the financial statements
    that public companies are required to submit to the US SEC.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For projects that deal with data that is not on a massive scale, we have one
    more retriever to highlight: the kNN retriever.'
  prefs: []
  type: TYPE_NORMAL
- en: kNN retriever
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The nearest-neighbor algorithms we have been working with up to this point,
    the ones responsible for finding the most closely related content to the user
    query, have been based on **approximate nearest neighbor** (**ANN**). There is
    a more *traditional* and *older* algorithm that serves as an alternative to ANN,
    though, and that is the **k-nearest neighbor** (**kNN**). But kNN is based on
    an algorithm that dates back to 1951; why would we use this when we have a more
    sophisticated and powerful algorithm, such as ANN, available? Because kNN is *still
    better* than anything that came after it. That is not a misprint. kNN is still
    the *most effective* way to find the nearest neighbors. It is better than ANN,
    which is touted as *the* solution by all of the database, vector database, and
    information retrieval companies that operate in this field. ANN comes close, but
    kNN is still considered better.
  prefs: []
  type: TYPE_NORMAL
- en: Why is ANN touted as *the* solution then? Because kNN does not scale to the
    level you see in the large enterprises these vendors are targeting. But this is
    all relative. You may have a million data points, which sounds like a lot, with
    1,536 dimension vectors, but that is still considered quite small on the global
    enterprise stage. kNN can handle that pretty easily! Many of the smaller projects
    that are using ANN in the field could probably benefit from using kNN instead.
    The theoretical limit of kNN is going to depend on many things, such as your development
    environment, your data, the dimensions of your data, internet connectivity if
    using APIs, and many more. So, we cannot give a specific number of data points.
    You will need to test this. But if it is smaller than the project I just described
    (1 million data points with 1,536 dimension vectors), in a relatively capable
    development environment, you should really consider kNN! At some point, you will
    notice a significant increase in processing time, and when the wait becomes too
    long for the usefulness of your application, switch to ANN. But in the meantime,
    be sure to take full advantage of the superior search capabilities of kNN.
  prefs: []
  type: TYPE_NORMAL
- en: 'Luckily, kNN is available in an easy-to-set-up retriever called `KNNRetriever`.
    This retriever will utilize the same dense embeddings we use with our other algorithms,
    and therefore, we will replace `dense_retriever` with the kNN-based `KNNRetriever`.
    Here is the code to implement that, fitting in nicely after we defined the previous
    version of our `dense_retriever` retriever object:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Run the remaining code in the code lab to see it take the place of our previous
    `dense_retriever` retriever and perform in its place. In this particular situation,
    with a very limited dataset, it is difficult to evaluate whether it is doing better
    than the ANN-based algorithm we were previously using. But, as your project scales,
    we highly recommend you take advantage of this approach until its scaling issues
    become too much of a burden.
  prefs: []
  type: TYPE_NORMAL
- en: 'This concludes our exploration of the retrievers that can support RAG. There
    are additional types of retrievers, as well as notable integrations with vector
    stores that support those retrievers, that can be reviewed on the LangChain website.
    For example, there is a time-weighted vector store retriever that allows you to
    incorporate recency into the retrieval process. There is also a retriever called
    the Long-Context Reorder, focused on improving results from long-context models
    that have difficulty paying attention to information in the middle of the retrieved
    documents. Be sure to take a look at what is available, as they have the potential
    to have a significant impact on your RAG application. We will now move on to talking
    about the *brains* of the operation and of the generation stage: the LLMs.'
  prefs: []
  type: TYPE_NORMAL
- en: Code lab 10.3 – LangChain LLMs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'We now turn our attention to the last key component for RAG: the LLM. Just
    like the retriever in the retrieval stage, without the LLM for the generation
    stage, there is no RAG. The retrieval stage simply retrieves data from our data
    source – typically data the LLM does not know about. However, that does not mean
    that the LLM does not play a vital role in our RAG implementation. By providing
    the retrieved data to the LLM, we quickly catch the LLM up with what we want it
    to talk about, and this allows the LLM to do what it is really good at: providing
    a response based on that data to answer the original question posed by the user.'
  prefs: []
  type: TYPE_NORMAL
- en: The synergy between LLMs and RAG systems stems from the complementary strengths
    of these two technologies. RAG systems enhance the capabilities of LLMs by incorporating
    external knowledge sources, enabling the generation of responses that are not
    only contextually relevant but also factually accurate and up to date. In turn,
    LLMs contribute to RAG by providing a sophisticated understanding of the query
    context, facilitating more effective retrieval of pertinent information from the
    knowledge base. This symbiotic relationship significantly improves the performance
    of AI systems in tasks that require both deep language understanding and access
    to a wide range of factual information, leveraging the strengths of each component
    to create a more powerful and versatile system.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this code lab, we will cover a few examples of the most important component
    in the generation stage: the LangChain LLM.'
  prefs: []
  type: TYPE_NORMAL
- en: LLMs, LangChain, and RAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As with the previous key components, we will first provide links to the LangChain
    documentation related to this major component, the LLMs: [https://python.langchain.com/v0.2/docs/integrations/llms/](https://python.langchain.com/v0.2/docs/integrations/llms/
    )'
  prefs: []
  type: TYPE_NORMAL
- en: 'A second helpful source of information, combining LLMs with LangChain, is the
    API documentation: [https://api.python.langchain.com/en/latest/community_api_reference.html#module-langchain_community.llms](https://api.python.langchain.com/en/latest/community_api_reference.html#module-langchain_community.llms
    )'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with the API we have been using already: OpenAI.'
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We already have this code in place, but let’s refresh the inner workings of
    this code by stepping through the key areas of our lab that make this component
    work:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we must install the `langchain-openai` package:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The `langchain-openai` library provides integration between OpenAI’s language
    models and LangChain.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, we import the `openai` library, which is the official Python library
    for interacting with OpenAI’s API, and will be used in this code primarily to
    apply the API key to the model so that we can access the paid API. We then import
    the `ChatOpenAI` and `OpenAIEmbeddings` classes from the `langchain_openai` library:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '`ChatOpenAI` is used to interact with OpenAI’s chat models, and `OpenAIEmbeddings`
    is used for generating embeddings from text.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the next line, we load the environment variables from a file named `env.txt`
    using the `load_dotenv` function:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We are using the `env.txt` file to store sensitive information (an API key)
    in a way that we can hide it from our versioning system, practicing better and
    more secure secret management.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We then pass that API key into OpenAI using the following code:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We first set up the API key as an environment variable called `OPENAI_API_KEY`.
    Then, we set the OpenAI API key for the OpenAI library using the retrieved value
    from the environment variable. At this point, we can use the OpenAI integration
    with LangChain to call the LLM that is hosted on OpenAI with the proper access.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Later in the code, we define the LLM we want to use:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This line creates an instance of the `ChatOpenAI` class, specifying the model
    name as gpt-4o-mini and setting the temperature variable to 0\. The temperature
    controls the randomness of the generated responses, with lower values producing
    more focused and deterministic outputs. Currently, gpt-4o-mini is the newest and
    most capable model while also being the most cost-effective of the GPT4 series.
    But even that model costs 10X more than gpt-3.5-turbo, which is actually a relatively
    capable model.
  prefs: []
  type: TYPE_NORMAL
- en: The most expensive of OpenAI’s models, gpt-4-32k, is not as fast or capable
    as gpt-4o-mini and has a context window 4X its size. There will likely be newer
    models soon, including gpt-5, that may be even lower cost and more capable. What
    you can take away from all of this is that you shouldn’t just assume the latest
    model is going to be the most expensive, and there are alternative versions that
    can be more capable and even more cost-effective coming out all the time. Stay
    diligent in following the latest releases of the models, and for each release,
    weigh the benefits of cost, LLM capability, and any other related attributes to
    decide whether a change is warranted.
  prefs: []
  type: TYPE_NORMAL
- en: But in this effort, you do not need to limit yourself to just OpenAI. Using
    LangChain makes it easy to switch LLMs and broaden your search for the best solution
    to all options within the LangChain community. Let’s step through some other options
    you may consider.
  prefs: []
  type: TYPE_NORMAL
- en: Together AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Together AI** offers a developer-friendly platform with access to 200+ OSS
    and speciality models via a simple API, plus options for dedicated endpoints and
    GPU clusters.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create an account, then navigate to **Settings** **→** **API Keys** to generate
    an API key. Set it as the `TOGETHER_API_KEY` environment variable. If you are
    new to Together API, you can use this link to set up your API key and add it to
    your `env.txt` file just like we did in the past, with the OpenAI API key: [https://api.together.ai/settings/api-keys](https://api.together.ai/settings/api-keys)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you are logged in, you can see the current costs for each LLM here: [https://api.together.ai/models](https://api.together.ai/models)'
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, Meta Llama 3.3 70B Instruct-Turbo is currently listed as costing
    $0.88 per 1M tokens, and Mixtral 8X7B Instruct v0.1 as $0.60 per 1M tokens. Follow
    these steps to set up and use Together AI:'
  prefs: []
  type: TYPE_NORMAL
- en: 'We start by installing the package we need to use the Together API:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'This prepares us to use the integration between the Together API and LangChain:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This imports what we need in LangChain to use the `ChatTogether` integration
    and loads the API key (don’t forget to add it to the `env.txt` file before running
    this line of code!).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Just like we did in the past with the OpenAI API key, we are going to pull
    in `TOGETHER_API_KEY` so that it can access your account:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'We are going to use the Llama 3 Chat model and Mistral’s Mixtral 8X22B Instruct
    model, but you can choose from 50+ models here: [https://docs.together.ai/docs/inference-models](https://docs.together.ai/docs/inference-models
    )'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You may find a better model for your particular needs!
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we are defining the models:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: In the preceding code snippet, we are establishing two different LLMs that we
    can run through the remainder of our code and see the results.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here, we have updated the final code for using the Llama 3 model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: This should look familiar, as it is the RAG chain we have used in the past,
    but running with the Llama 3 LLM.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This is the final RAG chain we use, updated with the previous Llama 3-focused
    RAG chain.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we want to run similar code to what we have run in the past that invokes
    and runs the RAG pipeline with the Llama 3 LLM replacing the ChatGPT-4o-mini model:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The resulting response to the question, `“What are Google’s environmental initiatives?”`
    is as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Let’s see what it looks like if we use the mixture of experts model:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Again, this should look familiar, as it is the RAG chain we have used in the
    past, but this time running with the mixture of experts LLM.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Just as we did before, we update the final RAG pipeline with the previous mixture-of-experts-focused
    RAG chain.
  prefs: []
  type: TYPE_NORMAL
- en: 'This code will let us see the results of the mixture of experts replacing the
    ChatGPT-4o-mini model:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The resulting response to `“What are Google’s environmental initiatives?”`
    is the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Compare this to the original response we saw in previous chapters:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The new responses from Llama 3 and the mixture of experts models show expanded
    responses that seem to be similar, if not more robust, compared to the original
    responses we were able to achieve with OpenAI’s gpt-4o-mini model, at a considerably
    lower cost than OpenAI’s more expensive but more capable models.
  prefs: []
  type: TYPE_NORMAL
- en: Extending the LLM capabilities
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are aspects of these LLM objects that can be better utilized in your
    RAG application, as described in the LangChain LLM documentation ([https://python.langchain.com/v0.1/docs/modules/model_io/llms/streaming_llm/](https://python.langchain.com/v0.1/docs/modules/model_io/llms/streaming_llm/)):'
  prefs: []
  type: TYPE_NORMAL
- en: All LLMs implement the Runnable interface, which comes with default implementations
    of all methods, i.e., `ainvoke`, `batch`, `abatch`, `stream`, `astream`. This
    gives all LLMs basic support for async, streaming and batch.
  prefs: []
  type: TYPE_NORMAL
- en: These are key features that can significantly speed up the processing of your
    RAG application, particularly if you are processing multiple LLM calls at once.
    In the following subsections, we will look at the key methods and how they can
    help you.
  prefs: []
  type: TYPE_NORMAL
- en: Async
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By default, async support runs the regular `sync` method in a separate thread.
    This allows other parts of your async program to keep running while the language
    model is working.
  prefs: []
  type: TYPE_NORMAL
- en: Stream
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Streaming support typically returns `Iterator` (or `AsyncIterator` for async
    streaming) with just one item: the final result from the language model. This
    doesn’t provide word-by-word streaming, but it ensures your code can work with
    any of the LangChain language model integrations that expect a stream of tokens.'
  prefs: []
  type: TYPE_NORMAL
- en: Batch
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Batch support processes multiple inputs at the same time. For a sync batch,
    it uses multiple threads. For an async batch, it uses `asyncio.gather`. You can
    control how many tasks run at once using the `max_concurrency` setting in `RunnableConfig`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Not all LLMs support all of these functions natively, though. For the two implementations
    we have discussed, as well as many more, LangChain provides an in-depth chart
    that can be found here: [https://python.langchain.com/v0.2/docs/integrations/llms/.](https://python.langchain.com/v0.2/docs/integrations/llms/
    )'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This chapter explored the key technical components of RAG systems in the context
    of LangChain: vector stores, retrievers, and LLMs. It provided an in-depth look
    at the various options available for each component and discussed their strengths,
    weaknesses, and scenarios in which one option might be better than another.'
  prefs: []
  type: TYPE_NORMAL
- en: The chapter started by examining vector stores, which play a crucial role in
    efficiently storing and indexing vector representations of knowledge base documents.
    LangChain integrates with various vector store implementations, such as Pinecone,
    Weaviate, FAISS, and PostgreSQL with vector extensions. The choice of vector store
    depends on factors such as scalability, search performance, and deployment requirements.
    The chapter then moved on to discuss retrievers, which are responsible for querying
    the vector store and retrieving the most relevant documents based on the input
    query. LangChain offers a range of retriever implementations, including dense
    retrievers, sparse retrievers (such as BM25), and ensemble retrievers that combine
    the results of multiple retrievers.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the chapter covered the role of LLMs in RAG systems. LLMs contribute
    to RAG by providing a sophisticated understanding of the query context and facilitating
    more effective retrieval of pertinent information from the knowledge base. The
    chapter showcased the integration of LangChain with various LLM providers, such
    as OpenAI and Together AI, and highlighted the capabilities and cost considerations
    of different models. It also discussed the extended capabilities of LLMs in LangChain,
    such as async, streaming, and batch support, and provided a comparison of the
    native implementations offered by different LLM integrations.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will continue to talk about how LangChain can be utilized
    to build a capable RAG application, focusing on the smaller components that can
    be used in support of the key components we just discussed in this chapter.
  prefs: []
