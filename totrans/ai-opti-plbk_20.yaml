- en: '15'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '15'
- en: Regulatory and Legal Frameworks for Responsible AI
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 负责任人工智能的监管和法律框架
- en: The increasing emphasis on **Responsible AI** ( **RAI** ) is not simply a passing
    trend; it reflects a growing necessity for ethical and responsible use of this
    powerful technology. We are at a critical juncture where aligning AI development
    and deployment with evolving ethical considerations and legal requirements is
    paramount. This journey goes beyond merely adopting AI; it requires embedding
    ethical principles and compliance mechanisms into the very fabric of AI systems.
    The rapid proliferation of AI technologies necessitates the development of robust
    governance and regulatory frameworks that promote responsible innovation, mitigate
    potential risks, and adapt to the dynamic nature of the AI field. Understanding
    and navigating this evolving regulatory landscape is crucial for organizations
    seeking to leverage AI’s benefits while upholding ethical standards and adhering
    to legal compliance.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 对**负责任的人工智能**（**RAI**）日益重视不仅仅是一个短暂的潮流；它反映了在道德和负责任地使用这项强大技术方面日益增长的需求。我们正处于一个关键转折点，将人工智能的开发和部署与不断发展的伦理考虑和法律规定相一致至关重要。这一旅程不仅涉及采用AI，还需要将伦理原则和合规机制嵌入到AI系统的本质之中。人工智能技术的快速扩散需要发展强大的治理和监管框架，以促进负责任的创新、减轻潜在风险并适应人工智能领域的动态性质。理解和导航这一不断发展的监管环境对于寻求利用AI的益处、维护伦理标准并遵守法律合规的组织至关重要。
- en: This chapter explores the key legal and regulatory frameworks governing AI and
    provides actionable strategies for implementing compliance within an organization.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了管理人工智能的关键法律和监管框架，并提供了在组织内实施合规的策略。
- en: 'We will cover the following key topics in this chapter:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在本章中将涵盖以下关键主题：
- en: Comparing global AI regulatory approaches
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较全球人工智能监管方法
- en: Implementing effective AI compliance strategies
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施有效的AI合规策略
- en: Addressing regulatory challenges – case studies
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应对监管挑战——案例研究
- en: 'To provide a cohesive and actionable guide to RAI governance, this chapter
    follows a three-part structure designed to take you from the high-level global
    landscape down to practical organizational execution:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提供一个连贯且可操作的RAI治理指南，本章采用三部分结构，旨在从高级全球格局逐步过渡到实际的组织执行：
- en: '**Global regulatory approaches** : We first establish the external landscape
    by comparing the core philosophical and legal models (e.g., the EU’s risk-based
    approach, the US’s sectoral approach) shaping AI governance worldwide. This provides
    the necessary foundational context.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**全球监管方法**：我们首先通过比较塑造全球人工智能治理的核心哲学和法律模型（例如，欧盟的风险方法、美国的部门方法）来建立外部环境。这提供了必要的背景基础。'
- en: '**Organizational compliance (KYAI framework)** : We then pivot to the internal
    action required by introducing the **Know Your AI** ( **KYAI** ) system. This
    section is dedicated to translating abstract global principles into a structured,
    practical internal framework for risk assessment, classification, and compliance
    control within an organization.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**组织合规（KYAI框架）**：然后，我们通过引入**了解你的AI**（**KYAI**）系统来转向组织内部所需采取的行动。本节致力于将抽象的全球原则转化为一个结构化、实用的内部框架，用于组织内的风险评估、分类和合规控制。'
- en: '**GenAI risks, accountability, and case studies** : Finally, we address the
    unique, high-stakes challenges posed by GenAI and provide a clear framework for
    accountability. This material is then grounded through concrete, real-world case
    studies that illustrate how successful organizations have managed these regulations
    and risks in practice.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生成式人工智能的风险、责任和案例研究**：最后，我们针对生成式人工智能带来的独特、高风险挑战进行探讨，并提供一个清晰的问责框架。然后，通过具体的、现实世界的案例研究来巩固这一材料，这些案例研究展示了成功组织如何在实际中管理这些法规和风险。'
- en: Comparing global AI regulatory approaches
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 比较全球人工智能监管方法
- en: While the need for RAI is globally recognized, different regions are adopting
    distinct approaches to regulation.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然全球范围内都认识到RAI的需求，但不同地区正在采用不同的监管方法。
- en: 'This section compares the frameworks of several key players:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 本节比较了几个关键参与者的框架：
- en: '**EU – a risk-based and comprehensive approach** : The EU AI Act represents
    a pioneering effort to establish comprehensive AI regulation. It employs a risk-based
    approach, categorizing AI systems based on their potential to cause harm.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欧盟——基于风险和全面的方法**：欧盟人工智能法案代表了建立全面人工智能监管的先驱努力。它采用基于风险的方法，根据人工智能系统可能造成伤害的潜力对其进行分类。'
- en: 'Here are its key features:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是其关键特性：
- en: Defines “AI system” broadly, encompassing systems th at operate autonomously
    or semi-autonomously, adapt after deployment, and generate outputs that impact
    digital or physical environments
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广泛定义“AI系统”，包括自主或半自主运行、部署后适应以及产生影响数字或物理环境的输出
- en: Prohibits high-risk applications deemed unacceptable (e.g., social scoring or
    real-time facial recognition in public spaces)
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 禁止被认为不可接受的高风险应用（例如，公共场所的社会评分或实时人脸识别）
- en: Imposes stringent requirements on high-risk systems, including transparency,
    data governance, and human oversight
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对高风险系统施加严格的强制性要求，包括透明度、数据治理和人工监督
- en: Addresses **General-Purpose AI** ( **GPAI** ) models with specific transparency
    obligations
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 针对具有特定透明度义务的**通用人工智能**（**GPAI**）模型
- en: Enforcement includes significant fines (up to €35M or 7% of global annual revenue)
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执法包括重大罚款（高达3500万欧元或全球年度收入的7%）
- en: '**Comparative perspective** : The EU’s approach is notable for its broad scope
    and emphasis on protecting fundamental rights. It sets a high bar for AI development
    and deployment.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**比较视角**：欧盟的方法以其广泛的范围和强调保护基本权利而著称。它为AI发展和部署设定了高标准。'
- en: '**United States – a sectoral and principles-based approach** : The US takes
    a more sectoral approach, with different agencies regulating AI in specific domains.
    It also emphasizes ethical principles.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**美国 – 部门和原则基础方法**：美国采取更部门化的方法，不同机构监管特定领域的AI。它还强调伦理原则。'
- en: 'Here are the key features of the US approach:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是美国方法的关键特征：
- en: The AI Bill of Rights outlines principles for safe and effective systems, algorithmic
    discrimination protections, data privacy, transparency, and accountability.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能权利法案概述了安全有效系统的原则、算法歧视保护、数据隐私、透明度和问责制。
- en: Sector-specific regulations exist in areas such as healthcare ( **Food and Drug
    Administration** , or **FDA** ), finance (various agencies), and employment (e.g.,
    New York City’s **Automated Employment Decision Tools** , or **AEDT** ). State-level
    laws, such as the **California Consumer Privacy Act** ( **CCPA** ), address data
    privacy related to AI.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在医疗保健（**食品药品监督管理局**，或**FDA**）、金融（各种机构）和就业（例如，纽约市的**自动化就业决策工具**，或**AEDT**）等领域存在特定部门的法规。州级法律，如**加利福尼亚消费者隐私法案**（**CCPA**），解决与AI相关的数据隐私问题。
- en: It’s important to note that while the US primarily adopts a sectoral approach
    to AI regulation, a degree of decentralization exists, with various state and
    local laws complementing federal guidelines.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，尽管美国主要采用针对人工智能的部门方法，但存在一定程度的地方分权，各种州和地方法律补充了联邦指南。
- en: '**Comparative perspective** : The US approach is characterized by its flexibility
    and focus on innovation within specific sectors. However, it can lead to a fragmented
    regulatory landscape.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**比较视角**：美国的方法以其灵活性和在特定部门内关注创新而著称。然而，它可能导致监管格局碎片化。'
- en: '**China – a government-led and control-oriented approach** : China’s AI regulation
    is heavily influenced by government priorities and emphasizes control and social
    stability.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**中国 – 以政府领导和控制为导向的方法**：中国的AI监管受到政府优先事项的严重影响，强调控制和社交稳定。'
- en: 'Here are its key features:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是其关键特征：
- en: Regulations focus on areas such as GenAI services, algorithmic recommendations,
    and deep synthesis technologies
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规章制度关注诸如GenAI服务、算法推荐和深度合成技术等领域
- en: Emphasis on transparency, non-discrimination, data protection, and content control
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强调透明度、非歧视、数据保护和内容控制
- en: Government plays a significant role in guiding AI development and deployment
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 政府在引导人工智能发展和部署中发挥着重要作用
- en: '**Comparative perspective** : China’s approach prioritizes government oversight
    and social control, which contrasts with the EU’s focus on individual rights and
    the US’s emphasis on innovation.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**比较视角**：中国的做法优先考虑政府监管和社会控制，这与欧盟关注个人权利和美国强调创新形成对比。'
- en: '**Other notable approaches** :'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**其他显著方法**：'
- en: '**India** : Focuses on policies such as “AI for all” and ethical frameworks
    but lacks a strong enforcement mechanism'
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**印度**：关注“AI普及”和伦理框架等政策，但缺乏强有力的执行机制'
- en: '**Australia** : Emphasizes AI ethics principles centered on human well-being,
    fairness, and transparency'
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**澳大利亚**：强调以人类福祉、公平和透明为中心的AI伦理原则'
- en: '**Singapore and Canada** : Promote principles-based governance frameworks to
    guide RAI development'
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**新加坡和加拿大**：推广基于原则的治理框架，以指导RAI发展'
- en: '**Japan** : Relies on industry self-regulation and guidelines from the AI Strategy
    Council to foster ethical AI development by aiming to enhance data handling, security,
    and transparency among AI operators'
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日本**：依靠行业自律和人工智能战略委员会的指南，通过提高人工智能操作者的数据处理、安全和透明度来促进道德人工智能发展'
- en: It’s important to note that while the US primarily adopts a sectoral approach
    to AI regulation, a degree of decentralization exists, with various state and
    local laws complementing federal guidelines.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，尽管美国主要采用部门性的人工智能监管方法，但存在一定程度的地方分权，各种州和地方法律补充了联邦指南。
- en: 'The following table provides a comprehensive comparison of global AI regulatory
    approaches, outlining key features such as their scope, enforcement, and focus:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 下表提供了一个全球人工智能监管方法的全面比较，概述了范围、执法和重点等关键特征：
- en: '| **Feature** | **EU** | **US** | **China** | **Other notable examples** |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| **特性** | **欧盟** | **美国** | **中国** | **其他显著例子** |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| **Regulatory approach** | Risk-based and comprehensive | Sectoral, principles-based,
    with elements of decentralization (state and local laws) | Government-led, control-oriented,
    and innovation-focused | Principles-based: Singapore (Model AI Governance Framework)
    and Canada (AI Principles)Ethics-focused: Australia (AI Ethics Principles)Developing:
    India (AI for All), Brazil (developing AI framework) |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| **监管方法** | 基于风险和全面性 | 部门性、基于原则，具有分权化（国家和地方法律）的元素 | 以政府为主导、控制导向和创新导向 | 基于原则：新加坡（模型人工智能治理框架）和加拿大（人工智能原则）伦理导向：澳大利亚（人工智能伦理原则）发展中的：印度（人工智能普及），巴西（制定人工智能框架）
    |'
- en: '| **Scope** | A broad definition of AI, categorized by risk | Specific sectors
    (healthcare, finance, law enforcement, etc.), principles for critical sectors
    | Focus on specific AI applications (GenAI, recommendations) | Varied, often focused
    on ethical guidelines or specific AI uses |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| **范围** | 广泛定义的人工智能，按风险分类 | 特定部门（医疗保健、金融、执法等），关键部门的准则 | 关注特定的AI应用（生成式AI、推荐）
    | 多样化，通常集中在伦理准则或特定的AI用途上 |'
- en: '| **Enforcement** | Strong, with significant fines | Varies by sector and state/local
    level, indicating some decentralization | Strong government oversight and enforcement
    | Developing or less centralized enforcement mechanisms in some cases |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| **执法** | 强有力的，有重大罚款 | 根据部门和州/地方级别而变化，表明存在一定程度的地方分权 | 强有力的政府监督和执法 | 在某些情况下，发展中的或较少集中的执法机制
    |'
- en: '| **Key focus** | Protecting fundamental rights, managing high-risk AI | Promoting
    innovation while addressing specific risks (bias, privacy) | Social stability,
    government control, technological advancement | Ethical considerations, guiding
    principles, adapting to global trends |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| **关键焦点** | 保护基本权利，管理高风险人工智能 | 在解决特定风险（偏见、隐私）的同时促进创新 | 社会稳定、政府控制、技术进步 | 伦理考量、指导原则、适应全球趋势
    |'
- en: '| **Notable regulations** | EU AI Act | US notable regulations: AI Bill of
    Rights (principles), CCPA (state privacy law), NY Local Law 144 (local employment
    law), FDA guidelines (federal sectoral), FTC (consumer protection), NIST AI (risk
    management framework) | Measures for the Management of Generative AI Services,
    Algorithmic Recommendation Management. China’s regulations are evolving rapidly.
    | Model AI Governance Framework (Singapore), AI Principles (Canada), AI Ethics
    Principles (Australia) |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| **显著法规** | 欧盟人工智能法案 | 美国显著法规：人工智能权利法案（原则）、CCPA（州隐私法）、纽约地方法144（地方就业法）、FDA指南（联邦部门）、FTC（消费者保护）、NIST人工智能（风险管理框架）
    | 生成式人工智能服务管理措施，算法推荐管理。中国的法规正在迅速演变。 | 模型人工智能治理框架（新加坡）、人工智能原则（加拿大）、人工智能伦理原则（澳大利亚）
    |'
- en: 'Table 15.1: Comparison of global AI regulatory approaches'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 表15.1：全球人工智能监管方法比较
- en: This comparative analysis demonstrates the varying global priorities for AI
    regulation, highlighting the importance of a nuanced and comprehensive approach
    to compliance.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这项比较分析展示了全球对人工智能监管的不同优先级，突出了在合规方面采取细致和全面方法的重要性。
- en: Navigating cross-border AI compliance
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 跨境人工智能合规导航
- en: For multinational organizations, achieving AI compliance is complicated by conflicting
    jurisdictional demands, primarily concerning data localization and data transfer.
    While some regions (e.g., China and India) impose data localization requirements
    that restrict data processing to within national borders, others (e.g., the EU)
    rely on strict **Standard Contractual Clauses** ( **SCCs** ) or adequacy decisions
    to permit cross-border data flows. This forces companies to adopt a “highest common
    denominator” compliance standard, where the most stringent regulatory requirement
    (e.g., GDPR’s privacy rules) must often be applied globally to avoid deploying
    multiple, segregated AI instances. The key challenge lies in maintaining this
    harmonized policy while the underlying la ws rapidly change.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 对于跨国组织来说，由于管辖权要求的冲突，实现人工智能合规变得复杂，主要涉及数据本地化和数据传输。虽然一些地区（例如中国和印度）对数据本地化提出要求，限制数据处理在国内边界内进行，而其他地区（例如欧盟）则依靠严格的**标准合同条款**（**SCCs**）或充分性决定来允许跨境数据流动。这迫使公司采用“最高共同分母”合规标准，即最严格的监管要求（例如，GDPR的隐私规则）通常必须在全球范围内应用，以避免部署多个、隔离的人工智能实例。关键挑战在于在基础法律迅速变化的同时保持这种协调一致的政策。
- en: Next, we will explore the practical strategies organizations can implement to
    navigate this complex landscape.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探讨组织可以实施的实用策略，以应对这一复杂的环境。
- en: Implementing effective AI compliance strategies
  id: totrans-54
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施有效的AI合规策略
- en: Organizations today must proactively address AI compliance to mitigate the risks
    of penalties, legal challenges, and reputational damage. This requires not only
    staying informed about evolving AI regulations but also establishing robust AI
    governance frameworks. A crucial component of such frameworks is the KYAI process,
    which provides a structured approach to identifying and managing AI systems in
    accordance with regulatory requirements.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的组织必须积极应对人工智能合规，以减轻处罚、法律挑战和声誉损害的风险。这不仅需要了解不断发展的AI法规，还需要建立强大的AI治理框架。这些框架的关键组成部分是KYAI流程，它提供了一种结构化的方法来识别和管理符合监管要求的人工智能系统。
- en: 'The KYAI process empowers organizations to systematically navigate AI compliance.
    It involves the following key steps:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: KYAI流程赋予组织系统地导航人工智能合规的权力。它包括以下关键步骤：
- en: '**Identification** : Determine whether a system qualifies as an “AI system”
    under applicable regulations. This often involves assessing whether the system
    achieves the following:'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别**：确定系统是否根据适用法规符合“人工智能系统”的定义。这通常涉及评估系统是否达到以下标准：'
- en: Operates with some level of autonomy (autonomously or semi-autonomously). It
    has the capacity to adapt its behavior after deployment.
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以某种程度的自主性（自主或半自主）运行。它具有在部署后调整其行为的能力。
- en: Generates outputs that can significantly impact digital or physical environments.
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成可能对数字或物理环境产生重大影响的输出。
- en: '**Practical guidance** : Maintain a comprehensive inventory of all AI systems
    within the organization, documenting their functionalities and potential impact.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**实用指南**：维护组织内所有人工智能系统的全面清单，记录其功能和潜在影响。'
- en: '**Risk assessment** : Evaluate the potential risks associated with each AI
    system and determine whether it falls into any “high-risk” categories defined
    by relevant regulations. Common high-risk areas include the following:'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**风险评估**：评估每个人工智能系统相关的潜在风险，并确定它是否属于相关法规定义的任何“高风险”类别。常见的高风险领域包括以下内容：'
- en: Healthcare
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医疗保健
- en: Financial services
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 金融服务业
- en: Critical infrastructure
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键基础设施
- en: Law enforcement
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公安执法
- en: Employment decisions
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 就业决策
- en: Public safety
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公共安全
- en: '**Practical guidance** : Conduct thorough risk assessments, considering potential
    harm to individuals, society, and the organization itself. Use risk assessment
    frameworks provided by regulatory bodies where available.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**实用指南**：进行彻底的风险评估，考虑对个人、社会和组织本身的潜在危害。如有可用的监管机构提供风险评估框架，请使用。'
- en: '**Compliance implementation** : Identify and implement the specific compliance
    measures necessary for each AI system to adhere to regulatory requirements. These
    measures may include the following:'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**合规实施**：确定并实施每个人工智能系统遵守监管要求的必要具体合规措施。这些措施可能包括以下内容：'
- en: Implementing safety and security mechanisms
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施安全和安全机制
- en: Maintaining data quality and governance
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维护数据质量和治理
- en: Providing transparency and explainability
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供透明度和可解释性
- en: Establishing human oversight and intervention protocols
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立人类监督和干预协议
- en: Maintaining detailed documentation and audit trails
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持详细的文档和审计跟踪
- en: Conducting regular audits and impact assessments
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期进行审计和影响评估
- en: '**Practical guidance** : Develop a detailed compliance plan for each AI system,
    assigning responsibilities and timelines.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**实用指南**：为每个AI系统制定详细的合规计划，分配责任和截止时间。'
- en: 'Beyond the KYAI process, organizations can employ additional compliance strategies
    to strengthen their overall AI compliance posture:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在KYAI流程之外，组织可以采用额外的合规策略来加强其整体AI合规态势：
- en: '**Continuous regulatory training and awareness** :'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续的监管培训和意识提升**：'
- en: Provide ongoing training and education to employees on AI regulations and ethical
    considerations
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为员工提供关于AI法规和伦理考量的持续培训和教育活动
- en: Foster a culture of responsibility and vigilance regarding AI compliance
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 培养关于AI合规的责任感和警觉性
- en: '**Practical guidance** : Establish a system for monitoring regulatory changes
    and disseminating updates to relevant personnel. Note: The team is solely responsible
    and will evaluate downstream changes and share relevant updates, as not all information
    is applicable for all verticals or **Business Units** ( **BUs** ) within an organization.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**实用指南**：建立一个监控系统变更并向相关人员传达更新的系统。注意：团队负全部责任，并将评估下游变化并分享相关更新，因为并非所有信息都适用于所有垂直领域或组织内的**业务单元**（**BU**）。'
- en: '**Independent audits and certifications** :'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**独立审计和认证**：'
- en: Engage independent third-party auditors to assess AI systems for compliance
    and ethical soundness
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聘请独立的第三方审计员评估AI系统的合规性和道德性
- en: Pursue certifications from recognized bodies to demonstrate commitment to RAI
    practices.
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从认可的机构获取认证，以展示对RAI实践的承诺。
- en: '**Practical guidance** : Select reputable auditors with expertise in AI governance
    and relevant industry regulations.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**实用指南**：选择在AI治理和相关行业法规方面具有专业知识的信誉良好的审计员。'
- en: '**Regulatory Technology (RegTech) solutions** :'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监管科技（RegTech）解决方案** :'
- en: Leverage RegTech tools to automate compliance tasks, monitor regulatory developments,
    and manage compliance documentation efficiently
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用RegTech工具自动化合规任务，监控监管发展，并高效管理合规文档
- en: Reduce the burden of manual compliance efforts and minimize the risk of errors
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少手动合规工作的负担，并最小化错误风险
- en: '**Practical guidance** : Carefully evaluate RegTech solutions to align with
    the organization’s specific needs and regulatory requirements.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**实用指南**：仔细评估RegTech解决方案，以确保与组织的具体需求和监管要求相一致。'
- en: By adopting a proactive approach and implementing these strategies, organizations
    can effectively navigate the evolving AI regulatory landscape, embed ethical AI
    practices into their operations, and cultivate trust with stakeholders.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 通过采取主动方法并实施这些策略，组织可以有效地应对不断变化的AI监管环境，将道德AI实践融入其运营，并与利益相关者建立信任。
- en: Implementing the KYAI system – registration template
  id: totrans-91
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施KYAI系统 – 注册模板
- en: 'The KYAI framework is only effective if every deployed AI model is formally
    registered and classified. The following template is to be used as a starting
    point for your organization’s internal model registry and defines the steps for
    building an AI system inventory:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: KYAI框架只有在每个部署的AI模型都正式注册和分类的情况下才有效。以下模板应作为您组织内部模型注册表的起点，并定义了构建AI系统清单的步骤：
- en: '| **Field** | **Purpose** | **Example** |'
  id: totrans-93
  prefs: []
  type: TYPE_TB
  zh: '| **字段** | **目的** | **示例** |'
- en: '| --- | --- | --- |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| **System name** | Unique, internal project identifier. | Customer_Sentiment_Analyzer
    V2.0 |'
  id: totrans-95
  prefs: []
  type: TYPE_TB
  zh: '| **系统名称** | 唯一、内部项目标识符。 | Customer_Sentiment_Analyzer V2.0 |'
- en: '| **System owner** | The product owner holds accountability for the system’s
    performance, risk, and compliance. | VP of customer success |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
  zh: '| **系统负责人** | 产品负责人对系统的性能、风险和合规负责。 | 客户成功副总裁 |'
- en: '| **Model type** | Classification of the technology (e.g., traditional ML,
    LLM/GenAI, RAG, simple heuristic). | GenAI (LLM) |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
  zh: '| **模型类型** | 技术的分类（例如，传统机器学习、LLM/GenAI、RAG、简单启发式）。 | GenAI (LLM) |'
- en: '| **Primary use case** | A simple, clear description of the system’s function
    and the decision it supports. | Summarize customer feedback and auto-generate
    draft help documentation |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
  zh: '| **主要用例** | 对系统功能及其支持的决策的简单、清晰描述。 | 总结客户反馈并自动生成帮助文档草稿 |'
- en: '| **Data scope** | What kind of data does the model ingest? (PII, financial,
    protected health information, public) | Customer support transcripts (contains
    PII) |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| **数据范围** | 模型摄入了哪些类型的数据？（PII、财务、受保护的健康信息、公开） | 客户支持记录（包含PII） |'
- en: '| **Regulatory scope** | Which regulations apply? (GDPR, HIPAA, AI Act, sectoral
    regulations) | GDPR (data minimization), AI Act (transparency) |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
  zh: '| **监管范围** | 哪些法规适用？（GDPR、HIPAA、AI法案、行业法规） | GDPR（数据最小化），AI法案（透明度） |'
- en: '| **Initial risk score (1–5)** | A quick, initial self-assessment of the system’s
    potential to cause harm (1=Low, 5=High). | 4 (high, due to PII and customer-facing
    nature) |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
  zh: '| **初始风险评分（1–5）** | 对系统可能造成伤害的潜在性的快速、初步自我评估（1=低，5=高）。 | 4（高，由于PII和面向客户的特点）
    |'
- en: '| **Control priority** | Which areas need immediate focus? (Fairness, security,
    explainability) | Security (prompt injection), fairness (bias in summaries) |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
  zh: '| **控制优先级** | 哪些领域需要立即关注？（公平性、安全性、可解释性） | 安全性（提示注入），公平性（摘要中的偏见） |'
- en: 'Table 15.2: The KYAI system registration template'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 表15.2：KYAI系统注册模板
- en: The checklist shared in the next section is the **AI Impact Assessment** ( **AIIA**
    ). This is a critical tool used when the KYAI system flags a model as *high risk*
    .
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分中分享的清单是**人工智能影响评估**（**AIIA**）。这是当KYAI系统将模型标记为*高风险*时使用的关键工具。
- en: AI Impact Assessment (AIIA) checklist template
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能影响评估（AIIA）清单模板
- en: 'The AIIA provides a granular, mandatory review of high-risk AI systems. This
    template is designed so that all regulatory and ethical domains are explicitly
    reviewed and mitigated before deployment:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: AIIA对高风险人工智能系统提供细粒度、强制性的审查。此模板设计得如此，以便在部署之前明确审查并缓解所有监管和伦理领域：
- en: '| **Risk domain** | **Assessment question** | **Status (Y/N/NA)** | **Required
    mitigation/Action owner** |'
  id: totrans-107
  prefs: []
  type: TYPE_TB
  zh: '| **风险领域** | **评估问题** | **状态（是/否/不适用）** | **所需缓解/行动负责人** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-108
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| **Fairness and bias** | Is the model’s performance equitable across all identified
    sensitive subgroups (e.g., race, gender, age) based on testing metrics? |  |  |'
  id: totrans-109
  prefs: []
  type: TYPE_TB
  zh: '| **公平性和偏见** | 根据测试指标，模型在所有已识别的敏感子群体（例如，种族、性别、年龄）中的性能是否公平？ |  |  |'
- en: '| **Transparency** | Is there a clear, non-technical explanation of the model’s
    core function and its impact provided to end users (e.g., a model card)? |  |  |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
  zh: '| **透明度** | 是否向最终用户提供了关于模型核心功能及其影响的清晰、非技术性解释（例如，模型卡片）？ |  |  |'
- en: '| **Data governance** | Is all training and deployment data legally sourced,
    accurately labeled, and compliant with all privacy regulations (e.g., GDPR and
    CCPA)? |  |  |'
  id: totrans-111
  prefs: []
  type: TYPE_TB
  zh: '| **数据治理** | 所有训练和部署数据是否合法来源、准确标记，并符合所有隐私法规（例如，GDPR和CCPA）？ |  |  |'
- en: '| **Robustness and security** | Has the system been tested for resilience against
    adversarial attacks, including prompt injection and data poisoning? |  |  |'
  id: totrans-112
  prefs: []
  type: TYPE_TB
  zh: '| **鲁棒性和安全性** | 系统是否已针对对抗性攻击进行了测试，包括提示注入和数据中毒？ |  |  |'
- en: '| **Accountability** | Are clear human oversight and intervention mechanisms
    defined for all decisions where the system operates as “high risk”? |  |  |'
  id: totrans-113
  prefs: []
  type: TYPE_TB
  zh: '| **问责制** | 对于系统作为“高风险”操作的所有决策，是否已定义明确的人类监督和干预机制？ |  |  |'
- en: '| **Testing and validation** | Have independent third parties (or a distinct
    internal validation team) verified the system’s compliance and risk mitigation
    controls? |  |  |'
  id: totrans-114
  prefs: []
  type: TYPE_TB
  zh: '| **测试和验证** | 是否有独立第三方（或一个独立的内部验证团队）验证了系统的合规性和风险缓解控制？ |  |  |'
- en: '| **Approved for deployment** | Has the system been formally approved for deployment
    by the internal AI governance board or a designated executive owner? |  |  |'
  id: totrans-115
  prefs: []
  type: TYPE_TB
  zh: '| **批准部署** | 系统是否已由内部人工智能治理委员会或指定的执行所有者正式批准部署？ |  |  |'
- en: 'Table 15.3: AIIA checklist'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 表15.3：AIIA清单
- en: Your organization’s AI governance process can be formalized using these templates
    as a starting point. Use the KYAI registration template for your model registry
    and initial risk assessment. Once KYAI identifies a system as high risk, deploy
    the AIIA checklist template to conduct the required detailed risk analysis and
    structured review process. These tools work in tandem, providing a necessary control
    loop for RAI deployment.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 您的组织可以使用这些模板作为起点来正式化人工智能治理流程。使用KYAI注册模板进行模型注册和初始风险评估。一旦KYAI将系统识别为高风险，就部署AIIA清单模板以进行所需详细的风险分析和结构化审查流程。这些工具协同工作，为RAI部署提供必要的控制回路。
- en: As we have explored practical compliance strategies, we will now delve into
    the broader challenges of navigating the complexities of AI regulation.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们探讨了实际合规策略之后，我们现在将深入研究导航人工智能监管复杂性的更广泛挑战。
- en: Navigating the complexities of AI regulation
  id: totrans-119
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索人工智能监管的复杂性
- en: 'The AI regulatory landscape is rapidly evolving, presenting organizations with
    a complex web of challenges. The journey toward comprehensive AI governance is
    fraught with systemic difficulties inherent to regulating rapidly evolving, cross-sectoral
    technology. Understanding these challenges is crucial for organizations building
    resilient compliance programs:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能监管环境正在迅速演变，为组织带来了错综复杂的挑战。走向全面人工智能治理的旅程充满了监管快速演变、跨行业技术的系统性困难。理解这些挑战对于构建有弹性的合规计划的组织至关重要：
- en: '**The pace of innovation versus the pace of regulation** : Regulatory frameworks
    are slow by nature, often taking years to draft, debate, and enact. In contrast,
    new AI models, capabilities, and risks (such as new jailbreaks or model attacks)
    can emerge in months or even weeks. This fundamental mismatch means laws risk
    becoming obsolete before they are even enforced, creating a continuous game of
    regulatory catch-up.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新速度与监管速度**：监管框架本质上是缓慢的，通常需要数年才能起草、辩论和实施。相比之下，新的AI模型、能力和风险（如新的越狱或模型攻击）可能在几个月甚至几周内出现。这种根本性的不匹配意味着法律在实施之前就有可能过时，从而形成持续的监管追赶游戏。'
- en: '**The challenge of technology neutrality** : Regulators strive for technology-neutral
    laws that govern the *impact* of an AI system rather than the *specific technology*
    used. However, the unique properties of GenAI (its opacity, its scale, and its
    tendency to “hallucinate”) constantly challenge this neutrality, requiring specific,
    prescriptive rules (such as those targeting foundation models) that can quickly
    become outdated.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术中立性的挑战**：监管机构力求制定技术中立的法律，这些法律规范人工智能系统的*影响*，而不是使用的*具体技术*。然而，生成人工智能的独特属性（其不透明性、其规模以及其“幻觉”倾向）不断挑战这种中立性，需要具体、规定性的规则（例如针对基础模型的规则），这些规则可能会迅速过时。'
- en: '**Regulatory fragmentation and overlap** : Unlike other regulated industries,
    AI systems are subject to overlapping rules from multiple jurisdictions (e.g.,
    GDPR, CCPA, sector-specific laws such as HIPAA for the US healthcare industry).
    For multinational organizations, complying with this diverse patchwork of often
    conflicting global, national, and state-level requirements presents an enormous
    hurdle in achieving a harmonized corporate standard.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监管碎片化和重叠**：与其他受监管行业不同，人工智能系统受到来自多个司法管辖区重叠规则的约束（例如，GDPR、CCPA、针对特定行业的法律，如美国的HIPAA医疗保健行业）。对于跨国组织来说，遵守这一多样化的、经常冲突的全球、国家和州级要求，在实现统一的行业标准方面构成了巨大的障碍。'
- en: '**The unprecedented scale of risk** : AI systems introduce risk at a scale
    that traditional software does not. A single flawed LLM deployed globally can
    instantly affect millions of users, leading to brand damage, market volatility,
    and massive regulatory fines. This forces organizations to move from reactive
    compliance (checking boxes) to a proactive, risk-first culture where the potential
    for catastrophic failure must be modeled and mitigated before deployment.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**前所未有的风险规模**：人工智能系统引入的风险规模是传统软件所不具备的。一个部署全球的单个有缺陷的LLM可以瞬间影响数百万用户，导致品牌损害、市场波动和巨额监管罚款。这迫使组织从被动合规（打勾）转变为主动、以风险为首要文化的文化，在部署之前必须对潜在的灾难性失败进行建模和减轻。'
- en: The ongoing evolution of AI regulation presents a continuous challenge for enterprises.
    By adopting a strategic and adaptable approach to governance, organizations can
    not only mitigate risks but also build a foundation of trust that fosters long-term
    success.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能监管的持续演变对企业来说是一个持续的挑战。通过采用战略性和适应性强的治理方法，组织不仅可以减轻风险，还可以建立一个促进长期成功的信任基础。
- en: Liability, accountability, and risk management in the age of GenAI
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成人工智能时代的责任、问责制和风险管理
- en: As AI systems become more autonomous and capable of generating novel content,
    the question of responsibility is no longer theoretical. The development of powerful
    LLMs and multimodal GenAI models necessitates a clear understanding of who is
    responsible when these systems cause harm. The legal and ethical landscape for
    AI is rapidly evolving to address the crucial concepts of liability, accountability,
    and risk management.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能系统变得更加自主和能够生成新颖内容，责任问题已不再是理论上的。强大的人工智能语言模型（LLM）和多模态生成人工智能（GenAI）模型的发展，需要明确了解当这些系统造成损害时谁应承担责任。人工智能的法律和伦理环境正在迅速演变，以应对责任、问责制和风险管理的关键概念。
- en: 'What’s at stake: defining the core concepts'
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 危机所在：定义核心概念
- en: 'Let’s delve into the foundational ideas shaping the legal and ethical aspects
    of AI:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入了解塑造人工智能法律和伦理方面的基础理念：
- en: '**Liability** : In the context of AI, liability is the legal responsibility
    for harm or damage caused by an AI system. This can range from a chatbot providing
    incorrect medical advice to a GenAI model producing content that infringes copyright.
    Unlike traditional software, the unpredictable and emergent nature of GenAI makes
    assigning liability particularly challenging.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**责任**：在人工智能的背景下，责任是指由人工智能系统造成的伤害或损害的法律责任。这可以从聊天机器人提供错误的医疗建议到GenAI模型生成侵犯版权的内容。与传统的软件不同，GenAI不可预测和自发的本质使得分配责任特别具有挑战性。'
- en: '**Accountability** : The obligation to explain and justify the actions and
    decisions of an AI system. With complex “black-box” models, this means an organization
    must establish clear lines of responsibility for the AI’s design, development,
    and deployment, by always making sure there is a human or a team that can answer
    the system’s behavior.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问责制**：解释和证明人工智能系统行动和决策的义务。对于复杂的“黑盒”模型来说，这意味着组织必须明确AI的设计、开发和部署的责任线，始终确保有一个能够解释系统行为的人类或团队。'
- en: '**Risk management** : This is the proactive process of identifying, assessing,
    and mitigating potential harms before they occur. For modern GenAI, this involves
    addressing new risks such as the creation of convincing deepfakes, the spread
    of hate speech at scale, or the unintentional generation of malicious or biased
    content.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险管理**：这是在潜在危害发生之前主动识别、评估和减轻危害的过程。对于现代GenAI来说，这包括解决新风险，如创建令人信服的深度伪造、大规模传播仇恨言论或无意中生成恶意或偏见内容。'
- en: New risks from advanced GenAI
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 先进GenAI的新风险
- en: The proliferation of advanced GenAI, including multimodal models capable of
    generating images, video, and code, introduces a new category of risks that go
    beyond traditional AI concerns. These risks require a more nuanced approach to
    security and governance.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 先进通用人工智能（GenAI）的扩散，包括能够生成图像、视频和代码的多模态模型，引入了一种新的风险类别，这些风险超越了传统人工智能的担忧。这些风险需要更细致的安全和治理方法。
- en: The adoption of GenAI in businesses has grown exponentially, especially in the
    last two years, transforming industries and accelerating innovation. On average,
    organizations are using about 66 GenAI applications, with 10% of these classified
    as high risk, significantly increasing the potential attack surface (Hendren,
    2025).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI在商业中的应用呈指数级增长，尤其是在过去两年中，它正在改变行业并加速创新。平均而言，组织使用大约66个GenAI应用，其中10%被归类为高风险，显著增加了潜在的攻击面（Hendren，2025年）。
- en: Enterprise risks
  id: totrans-136
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 企业风险
- en: These are threats that impact an organization’s operations, data, and reputation.
    The unsanctioned use of GenAI by employees, a phenomenon known as “Shadow AI,”
    is a primary concern. When employees use unapproved third-party models, it can
    lead to unintentional data leakage and intellectual property exposure (Safe Security,
    2025).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这些威胁会影响组织的运营、数据和声誉。员工未经授权使用GenAI，即所谓的“影子AI”现象，是一个主要关注点。当员工使用未经批准的第三方模型时，可能导致无意中数据泄露和知识产权暴露（Safe
    Security，2025年）。
- en: A significant risk is the unauthorized use of GenAI tools, which can expose
    confidential corporate data to third-party services and models (Oswal, 2025).
    This can lead to security vulnerabilities and compliance issues.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 一个显著的风险是未经授权使用GenAI工具，这可能导致机密企业数据暴露给第三方服务和模型（Oswal，2025年）。这可能导致安全漏洞和合规性问题。
- en: GenAI capability risks
  id: totrans-139
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GenAI能力风险
- en: 'These risks stem from the inherent behaviors and limitations of the models
    themselves, which can compromise the integrity and reliability of their outputs:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这些风险源于模型本身的固有行为和局限性，可能会损害其输出的完整性和可靠性：
- en: '**Hallucinations and misinformation** : The newest, more sophisticated models
    still generate “hallucinations,” factually incorrect or illogical outputs that
    are highly convincing and difficult to detect. This was demonstrated in a real-world
    case where Air Canada faced a lawsuit due to its chatbot providing incorrect information.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻觉和错误信息**：最新的、更复杂的模型仍然会产生“幻觉”，即事实错误或不合逻辑的输出，这些输出非常令人信服且难以检测。这在加拿大航空因其聊天机器人提供错误信息而面临诉讼的真实案例中得到了证明。'
- en: '**Prompt injection** : This is a form of adversarial attack where a user’s
    input manipulates the model into bypassing its security controls or performing
    unintended actions.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示注入**：这是一种对抗性攻击的形式，其中用户的输入操纵模型绕过其安全控制或执行未预期的行为。'
- en: Adversarial AI risks
  id: totrans-143
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 对抗性AI风险
- en: 'These are risks associated with malicious actors using GenAI to execute more
    sophisticated and large-scale attacks:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是与恶意行为者使用GenAI执行更复杂和大规模攻击相关的风险：
- en: '**Deepfakes and social engineering** : Advanced generative models can create
    hyper-realistic deepfakes and personalized social engineering attacks, such as
    highly convincing phishing emails, that are difficult to distinguish from authentic
    content (UK Government, 2025)'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深度伪造和社会工程**：高级生成模型可以创建超逼真的深度伪造和个性化的社会工程攻击，例如高度令人信服的钓鱼邮件，这些攻击难以与真实内容区分（英国政府，2025）'
- en: '**Insecure AI-generated code** : Models that write code can introduce vulnerabilities
    or security flaws, making the resulting software a new attack vector (PwC, 2024)'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI生成代码不安全**：编写代码的模型可能会引入漏洞或安全缺陷，使得生成的软件成为新的攻击向量（PwC，2024）'
- en: Regulatory and governance risks
  id: totrans-147
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 监管和治理风险
- en: 'There are broader, systemic risks that affect the wider economy and society,
    often resulting from the lack of established legal frameworks:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 影响更广泛经济和社会的更广泛、系统性风险，通常源于缺乏建立的法律框架：
- en: '**Erosion of trust** : The widespread availability of synthetic media, including
    deepfakes and hyper-realistic bots, can erode public trust in information (Center
    for AI Safety, 2024).'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**信任侵蚀**：合成媒体（包括深度伪造和超逼真机器人）的广泛可用性可能会侵蚀公众对信息的信任（AI安全中心，2024）。'
- en: '**Evolving legal landscape** : The legal and regulatory landscape is rapidly
    changing. For example, enforcement under the EU AI Act could result in significant
    fines, up to €35M or 7% of global annual revenue (Article 99: Penalties. EU AI
    Act, 2025), highlighting the severe consequences of non-compliance.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**法律环境演变**：法律和监管环境正在迅速变化。例如，根据欧盟AI法案的执行可能会导致重大罚款，高达3.5亿欧元或全球年收入的7%（第99条：处罚。欧盟AI法案，2025），突显了不遵守规定的严重后果。'
- en: '**Lack of transparency in risk appetite** : The absence of a publicly clear
    risk appetite, which is the level of risk an organization is willing to accept
    with AI development, makes it difficult for regulators and the public to trust
    companies. Making these risk frameworks more “legible” is essential for building
    public confidence and driving RAI development (CDT Insights, 2025).'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险偏好透明度不足**：缺乏公开明确的风险偏好，即组织在AI发展中所愿意接受的风险水平，使得监管机构和公众难以信任公司。使这些风险框架更加“可读”对于建立公众信心和推动RAI发展（CDT
    Insights，2025）至关重要。'
- en: Next, let’s explore some best practices for navigating these risks.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们探讨一些应对这些风险的最佳实践。
- en: Building an accountability framework – best practices for enterprises
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建立问责框架——企业最佳实践
- en: 'To navigate the new risks and the evolving regulatory landscape, organizations
    must proactively build a robust accountability framework based on several key
    practices:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对新的风险和不断变化的监管环境，组织必须积极构建基于几个关键实践的强大问责框架：
- en: '**Conducting AIIAs** : These assessments are a proactive measure to identify,
    evaluate, and mitigate potential risks and harms of an AI system before and during
    its deployment. AIIAs help define the system’s purpose, identify affected stakeholders,
    map relevant laws, and assess potential benefits and risks.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**进行AIIA**：这些评估是主动措施，旨在在AI系统部署前和部署期间识别、评估和减轻潜在风险和危害。AIIA有助于定义系统的目的，确定受影响的利益相关者，映射相关法律，并评估潜在的利益和风险。'
- en: '**Establishing AI governance boards** : Enterprises should create dedicated
    governance boards or committees with diverse expertise (legal, technical, ethical,
    and business) to oversee AI strategy, risk management, and compliance. These boards
    ensure that AI initiatives are aligned with the company’s values and that clear
    roles and responsibilities are assigned for accountability.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立AI治理委员会**：企业应创建具有多元专业知识的专门治理委员会或委员会（法律、技术、伦理和商业），以监督AI战略、风险管理以及合规性。这些委员会确保AI项目与公司的价值观保持一致，并为问责制分配明确的角色和责任。'
- en: '**Prioritizing human oversight** : For high-risk AI applications, meaningful
    human oversight is critical. This means empowering humans with the ability to
    understand, monitor, and, most importantly, override or correct a system’s output.
    Training for human reviewers is essential to ensure they can interpret AI decisions
    and maintain a healthy skepticism toward automation bias.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优先考虑人工监督**：对于高风险AI应用，有意义的人工监督至关重要。这意味着赋予人类理解、监控，最重要的是，覆盖或纠正系统输出的能力。对人工审查员的培训对于确保他们能够解释AI决策并保持对自动化偏差的健全怀疑至关重要。'
- en: RAI is a journey of continuous adaptation and innovation. By embedding ethical
    principles and a proactive accountability framework, organizations can move from
    merely leveraging AI’s technical capabilities to upholding a higher standard of
    ethical responsibility. This not only mitigates risks but also builds the trust
    necessary to achieve sustainable business excellence in an AI-driven future.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: RAI是一个持续适应和创新的旅程。通过嵌入伦理原则和主动问责框架，组织可以从仅仅利用AI的技术能力转变为维护更高的伦理责任标准。这不仅降低了风险，还建立了在AI驱动未来实现可持续商业卓越所需的信任。
- en: Building on the best practices for establishing an accountability framework,
    the following section on case studies will explore how organizations have practically
    applied these principles to address real-world risks and comply with evolving
    regulatory landscapes.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立问责框架的最佳实践基础上，以下关于案例研究的部分将探讨组织如何将这些原则实际应用于应对现实世界风险和遵守不断变化的监管环境。
- en: Addressing regulatory challenges – case studies
  id: totrans-160
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 应对监管挑战——案例研究
- en: 'Real-world scenarios highlight the importance of proactive AI compliance and
    the consequences of non-compliance. They also illustrate how addressing regulatory
    needs can yield positive outcomes. The following table gives a consolidated view
    of real-world incidents, the specific regulatory issues they raised, and the organizational
    or technical solutions required to prevent recurrence:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 现实场景突出了主动AI合规的重要性以及不合规的后果。它们还说明了如何应对监管需求可以带来积极的结果。以下表格提供了一个综合的视角，展示了现实世界事件、它们引发的特定监管问题以及防止再次发生所需的组织或技术解决方案：
- en: '| **Case study/incident** | **Situation/problem (immediate failure)** | **Regulation/compliance
    issues (the “why”)** | **Solution/change needed (actionable fixes)** |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
  zh: '| **案例研究/事件** | **情况/问题（即时故障）** | **监管/合规问题（“为什么”**） | **所需解决方案/变更（可执行修复**）
    |'
- en: '| --- | --- | --- | --- |'
  id: totrans-163
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Air Canada chatbot (hallucination) | The customer service chatbot provided
    a non-existent bereavement policy, leading to customer harm and financial liability.
    | Accountability failure (model was an agent of the company); LLM03: Lack of grounding
    (OWASP Top 10). | Technical: Mandate RAG/grounding; Implement safe/fallback responses.
    Governance: Establish AI content administrator role; define human-in-the-loop
    thresholds. |'
  id: totrans-164
  prefs: []
  type: TYPE_TB
  zh: '| 加拿大航空聊天机器人（幻觉） | 客户服务聊天机器人提供了一项不存在的丧葬政策，导致客户受损和财务责任。 | 问责失败（模型是公司的代理人）；LLM03：缺乏扎根（OWASP
    Top 10）。 | 技术：强制执行RAG/扎根；实施安全/回退响应。治理：建立AI内容管理员角色；定义人工介入的阈值。 |'
- en: '| Meta’s ad targeting (bias) | The ad delivery system showed job or housing
    ads unevenly by demographic, reinforcing bias. | Discrimination/fairness (violation
    of equal opportunity laws); AI Act: High-risk (used for employment services).
    | Technical: Apply in-processing debiasing (e.g., adversarial debiasing). Governance:
    Mandatory AIIA on disparate impact; implement fairness audits. |'
  id: totrans-165
  prefs: []
  type: TYPE_TB
  zh: '| Meta的广告定位（偏差） | 广告投放系统根据人口统计信息不均匀地显示工作或住房广告，加剧了偏见。 | 歧视/公平（违反平等机会法律）；AI法案：高风险（用于就业服务）。
    | 技术：应用处理过程中的去偏（例如，对抗性去偏）。治理：强制执行不同影响上的AIIA；实施公平审计。 |'
- en: '| Google Gemini image gen (inaccuracy) | The model generated historically inaccurate
    images due to the over-correction of existing bias controls. | Transparency/trust
    erosion (lack of control over content guardrails); KYAI failure (misclassification
    of cultural/historical harm risk). | Technical: Tweak RLHF policies; implement
    output validation filters for sensitive categories. Governance: Establish an RAI
    review board for sensitive content. |'
  id: totrans-166
  prefs: []
  type: TYPE_TB
  zh: '| Google Gemini图像生成（不准确性） | 由于现有偏差控制的过度校正，该模型生成了历史上不准确的照片。 | 透明度/信任侵蚀（对内容护栏缺乏控制）；KYAI失败（对文化/历史伤害风险的误分类）。
    | 技术：调整RLHF政策；为敏感类别实施输出验证过滤器。治理：为敏感内容建立RAI审查委员会。 |'
- en: '| OpenAI ChatGPT (data breach) | A temporary software bug caused user chat
    histories and payment information to be exposed to other users. | Privacy and
    security (violation of GDPR/CCPA data security requirements); LLM04: Denial of
    Service (system became unreliable). (OWASP Top 10). | Technical: Implement robust
    multi-tenant separation logic; conduct frequent security penetration testing.Governance:
    Mandatory **Data Protection Impact Assessment** ( **DPIA** ); formal breach response
    plan. |'
  id: totrans-167
  prefs: []
  type: TYPE_TB
  zh: '| OpenAI ChatGPT (数据泄露) | 一个临时软件漏洞导致用户聊天历史和支付信息被暴露给其他用户。 | 隐私和安全（违反GDPR/CCPA数据安全要求）；LLM04：拒绝服务（系统变得不可靠）。（OWASP
    Top 10）。 | 技术：实施强大的多租户分离逻辑；进行频繁的安全渗透测试。治理：强制进行**数据保护影响评估**（**DPIA**）；制定正式的泄露应对计划。
    |'
- en: '| Microsoft Bing/Copilot (toxic output) | The model was jailbroken to generate
    abusive, manipulative, or emotionally harmful text during long, unmonitored sessions.
    | Safety and harms (violation of acceptable use policies); LLM01: Prompt Injection/Jailbreak
    (OWASP Top 10). | Technical: Implement stronger guardrails and content filters;
    enforce turn limits and conversation resets.Governance: Define acceptable use
    policy; implement continuous monitoring of harmful outputs. |'
  id: totrans-168
  prefs: []
  type: TYPE_TB
  zh: '| 微软Bing/Copilot（有害输出） | 模型被越狱以在长时间未监控的会话中生成侮辱性、操纵性或情感有害的文本。 | 安全和危害（违反可接受使用政策）；LLM01：提示注入/越狱（OWASP
    Top 10）。 | 技术：实施更强的护栏和内容过滤器；执行回合限制和会话重置。治理：定义可接受使用政策；实施对有害输出的持续监控。 |'
- en: '| Apple Siri (privacy review) | User voice recordings were stored and manually
    reviewed by third-party contractors without fully explicit user consent. | Data
    governance/privacy (violation of GDPR/CCPA consent and data processing principles).
    | Technical: Implement differential privacy (data anonymization); introduce client-side
    processing. Governance: Update privacy policy with explicit review consent; implement
    mandatory data minimization protocol. |'
  id: totrans-169
  prefs: []
  type: TYPE_TB
  zh: '| 苹果Siri（隐私审查） | 用户语音录音被存储并由第三方承包商手动审查，而没有完全明确的用户同意。 | 数据治理/隐私（违反GDPR/CCPA同意和数据处理原则）。
    | 技术：实施差分隐私（数据匿名化）；引入客户端处理。治理：更新隐私政策，包含明确的审查同意；实施强制数据最小化协议。 |'
- en: '| Pragya Prasun & Ors. v. Union of India (Supreme Court of India) | Government
    digital KYC program requiring blinking/facial gestures led to automatic rejection
    for acid attack survivors and visually impaired persons, denying access to essential
    services (e.g., bank accounts and telecom services). | Fairness/bias (Violation
    of the Fundamental Right to Life – Article 21) and Violating the **Rights of Persons
    with Disabilities** ( **RPwD** ) Act, 2016, failing to provide reasonable accommodation.
    | Technical: Mandate alternative, non-biometric alternatives (e.g., in-person
    verification) for users who cannot meet the biometric requirement. Governance:
    Require human-assisted review for accessibility-related rejections and establish
    inclusivity audits and design for reasonable accommodation during the system architecture
    phase. |'
  id: totrans-170
  prefs: []
  type: TYPE_TB
  zh: '| Pragya Prasun & Ors. v. Union of India（印度最高法院） | 政府数字KYC项目要求眨眼/面部动作，导致酸攻击幸存者和视障人士自动被拒绝，无法获得基本服务（例如，银行账户和电信服务）。
    | 公平/偏见（违反生命基本权利——第21条）和违反2016年**残疾人权利**（**RPwD**）法，未能提供合理的便利。 | 技术：强制要求对无法满足生物识别要求的用户提供替代的非生物识别替代方案（例如，面对面验证）。治理：要求对与可访问性相关的拒绝进行人工辅助审查，并在系统架构阶段建立包容性审计和合理便利的设计。
    |'
- en: 'Table 15.4: Summary of AI governance failures and actionable compliance fixes'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 表15.4：人工智能治理失败总结和可操作的合规修复
- en: These case studies collectively illustrate that regulatory and legal challenges
    are a continuous reality in the AI landscape. Proactive compliance, robust governance,
    and a commitment to ethical design are essential for mitigating risk and fostering
    public trust. We have examined the key legal and regulatory frameworks governing
    AI and explored practical strategies for achieving compliance. We will now conclude
    this chapter with a summary of the key takeaways and a look ahead at future trends.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例研究共同表明，在人工智能领域，监管和法律挑战是一个持续的现实。主动合规、强大的治理和对道德设计的承诺对于降低风险和培养公众信任至关重要。我们已经审查了管理人工智能的关键法律和监管框架，并探讨了实现合规的实际策略。现在，我们将通过总结关键要点和展望未来趋势来结束这一章。
- en: Summary
  id: totrans-173
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The challenge of RAI governance is that it is a dynamic, continuous process,
    not a static destination. By establishing a robust, immediate compliance structure
    such as the KYAI system and standardized post-incident review through an AIIA,
    organizations can confidently meet current global legal requirements. However,
    the regulatory landscape will continue to be fundamentally reshaped by rapid technological
    progress. The next chapter will focus on the strategic imperative of looking forward,
    examining the emerging technical trends (such as scaling laws, quantum computing,
    and agentic AI) and the profound societal impacts (including sustainability and
    equitable AI) that will define the AI-driven enterprise of 2030.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: RAI 管理的挑战在于它是一个动态的、持续的过程，而不是一个静态的目标。通过建立如 KYAI 系统等强大、即时的合规结构以及通过 AIIA 进行标准化的事后审查，组织可以自信地满足当前的全球法律要求。然而，监管环境将继续受到快速技术进步的根本性重塑。下一章将重点关注前瞻性的战略必要性，探讨新兴的技术趋势（如规模定律、量子计算和代理人工智能）以及定义2030年AI驱动企业的深刻社会影响（包括可持续性和公平的AI）。
