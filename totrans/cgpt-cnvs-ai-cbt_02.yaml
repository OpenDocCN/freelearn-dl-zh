  zh: '2'
- en: Using ChatGPT with Conversation Design
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行对话设计
- en: In this chapter, we will delve into the intersection of ChatGPT and conversation
    design. We’ll look at the role of the conversation designer and explore how **large
    language models** (**LLMs**) such as ChatGPT have impacted conversation design.
    We will also examine the practical applications of ChatGPT in conversation design,
    including its use in simulating conversations and creating personas. Finally,
    we’ll discuss the importance of testing and iterative design in creating effective
    and engaging conversational AI systems. By the end of this chapter, you will have
    a comprehensive understanding of how to utilize ChatGPT in conversation design.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入探讨ChatGPT与对话设计的交汇点。我们将探讨对话设计师的角色，并探讨**大型语言模型**（**LLMs**）如ChatGPT如何影响对话设计。我们还将检查ChatGPT在对话设计中的实际应用，包括其在模拟对话和创建角色中的应用。最后，我们将讨论测试和迭代设计在创建有效和引人入胜的对话人工智能系统中的重要性。到本章结束时，您将全面了解如何利用ChatGPT进行对话设计。
- en: Some of the prompt results are listed, while others have been omitted in the
    interests of space. We encourage you to try the prompts for yourself.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 一些提示结果被列出，而其他结果则因空间限制而被省略。我们鼓励您亲自尝试这些提示。
- en: 'In this chapter, we’re going to cover the following main topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主要主题：
- en: Understanding conversation design
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解对话设计
- en: Working with practical applications of ChatGPT in conversation design
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与ChatGPT在对话设计中的实际应用合作
- en: Simulating conversations
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟对话
- en: Persona creation with ChatGPT
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT创建角色
- en: Testing and iteration in conversation design with ChatGPT
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行对话设计的测试和迭代
- en: Technical requirements
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: In this chapter, we will be using ChatGPT. We recommend that you sign up with
    OpenAI.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将使用ChatGPT。我们建议您在OpenAI上注册。
- en: Understanding conversation design
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解对话设计
- en: Conversation design is a complex and involved role that is key to creating a
    chatbot or voice assistant that is helpful and natural and, as a result, successful.
    There are other roles in the field of conversation design, particularly that of
    an AI trainer and variations of this role. For the purpose of this book, we will
    consider these other roles when discussing conversation design, as there is considerable
    overlap between the tasks carried out for many of them.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计是一个复杂且重要的角色，对于创建一个有用、自然并且因此成功的聊天机器人或语音助手至关重要。对话设计领域还有其他角色，尤其是AI训练师及其变体。为了本书的目的，在讨论对话设计时，我们将考虑这些其他角色，因为许多任务的执行在这些角色之间有很大的重叠。
- en: Conversation design leverages the principles of user experience design, linguistics,
    cognitive psychology, and AI to create engaging, interactive experiences between
    humans and machines over the medium of voice or text. At their core, conversation
    designers understand communications, the technology landscape of conversational
    AI, the mediums to deploy to their users, and how to satisfy user requirements.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计利用用户体验设计、语言学、认知心理学和人工智能的原则，通过语音或文字媒介创造人类与机器之间引人入胜的互动体验。在核心上，对话设计师理解沟通、对话人工智能的技术格局、向用户部署的媒介，以及如何满足用户需求。
- en: The goal of conversation design is to create a smooth, intuitive, and conversational
    user interface that feels natural to the user with the technologies available
    to mimic human-like conversation.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计的目的是创建一个流畅、直观、自然的用户界面，使用户感觉像是在进行类似人类的对话，同时利用现有技术来模拟这种对话。
- en: Exploring the role of conversation designers
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索对话设计师的角色
- en: Conversation designers carry out several important tasks. These are important
    to cover so we can see where LLMs and ChatGPT can be used to streamline and improve
    the process. Let’s look at the processes involved in creating conversation designs.
    It’s these designs that will be implemented on the chosen conversational AI platform
    for the project.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计师执行几个重要的任务。这些任务很重要，这样我们才能看到LLMs和ChatGPT如何被用来简化并改进这个过程。让我们看看创建对话设计所涉及的过程。这些设计将在项目所选的对话人工智能平台上实施。
- en: Understanding user needs
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解用户需求
- en: The first step in conversation design is to understand the user’s needs and
    behaviors, as well as the context in which the conversation takes place.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计的第一步是理解用户的需求和行为，以及对话发生的背景。
- en: A conversation designer’s role is to understand an organization’s operations,
    processes, challenges, and aims. A good designer can turn business requirements
    into customer journeys, use cases, and natural flows. The designer needs to understand
    the personas of the intended users, including their age, demographic, needs, expectations,
    and language. They also need to understand the current interactions within the
    organization or application. A thorough understanding of existing inquiries and
    existing unstructured or structured data is especially important here, as is a
    solid understanding of the channel the conversational experience will be deployed
    to.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计师的角色是理解组织的运营、流程、挑战和目标。一个好的设计师可以将业务需求转化为客户旅程、用例和自然流程。设计师需要了解目标用户的角色，包括他们的年龄、人口统计、需求、期望和语言。他们还需要了解组织或应用中的当前交互。对现有查询和现有非结构化或结构化数据的彻底理解在这里尤为重要，对对话体验将部署到的渠道的深入了解也同样重要。
- en: Designing the persona
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设计角色
- en: The persona for the agent not only decides its tone of voice but also guides
    its approach to conversations. This needs to be carefully considered to match
    user needs.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 代理的角色不仅决定了其语气，还指导了其对话方式。这需要仔细考虑以匹配用户需求。
- en: Existing brand and content guidelines will also need to be considered.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 还需要考虑现有的品牌和内容指南。
- en: For instance, a chatbot deployed on an enterprise software platform to handle
    customer support queries is going to have a different tone of voice and persona
    than an agent designed to help students with queries on WhatsApp during orientation
    week .
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，部署在企业软件平台上处理客户支持查询的聊天机器人，其语气和角色将与设计在新生入学周期间帮助学生在WhatsApp上查询的代理不同。
- en: Designing conversations
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设计对话
- en: The conversation flow is the sequence of interactions between the user and the
    conversational agent.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 对话流程是用户与对话代理之间交互的序列。
- en: A conversation designer will need to prioritize existing use cases to understand
    what jobs an agent needs to carry out and how a conversation can be structured
    to achieve this task.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计师需要优先考虑现有用例，以了解代理需要执行的任务以及如何构建对话来实现这一目标。
- en: Intents clarification, utterance creation, and entities clarification
  id: totrans-28
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 意图澄清、话语创建和实体澄清
- en: An intent represents the user’s intention. For example, the intent could be
    to find out the status of an order or to book a flight. Each intent is associated
    with a set of utterances, which are the phrases that users might use to express
    that intent. For example, for the intent of checking flight status, the utterances
    could be “*When does my flight leave?*” or “*Is my flight* *on time?*”.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 意图代表了用户的意图。例如，意图可能是查询订单状态或预订航班。每个意图都与一组话语相关联，这些话语是用户可能用来表达该意图的短语。例如，对于检查航班状态的意图，话语可能是“*我的航班什么时候起飞？*”或“*我的航班*
    *准时吗？*”。
- en: Entities are the specific pieces of information that the chatbot needs to fulfill
    an intent. For example, for the intent of booking a flight, the entities could
    be the departure city, arrival city, and date of travel. It’s the conversation
    designers’ job to understand each type of entity and the different entries for
    each one. Common entities are often straightforward, as they are supported by
    conversational AI models. However, if a custom entity is needed, each one will
    have to be sourced. For example, a dog-training chatbot may need to understand
    all the different dog breeds.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 实体是聊天机器人需要用来实现意图的具体信息片段。例如，对于预订航班的意图，实体可能是出发城市、目的地城市和旅行日期。理解每种类型的实体及其不同条目是对话设计师的工作。常见的实体通常很简单，因为它们由对话AI模型支持。然而，如果需要自定义实体，每个都需要单独获取。例如，一个狗训练聊天机器人可能需要理解所有不同的狗品种。
- en: Dialogue design
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 对话设计
- en: With the user journeys mapped out for the conversation, it’s the conversation
    designers’ job to create the details of the interactions. This involves designing
    the conversation flow between the user and the conversational agent. It includes
    defining the prompts that the chatbot will use to guide the conversation, the
    user responses, and the agent’s replies. The dialogue should be designed to be
    natural and engaging, and it should guide the user toward achieving their goal.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在对话的用户旅程被规划出来后，对话设计师的任务是创建交互的细节。这包括设计用户与对话代理之间的对话流程。它包括定义聊天机器人将用于引导对话的提示、用户响应和代理的回复。对话应该设计得自然且引人入胜，并引导用户实现他们的目标。
- en: Designers carefully script dialogue and responses with different paths. These
    are based on potential user inputs where information needs to be gathered to enable
    the user to convey their needs, and the agent to gather the values needed to answer
    the query. Designers start with what is commonly known as the happy path, which
    is the easiest route through conversation to achieve the goal, and then build
    out to handle the edge cases around a conversation.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 设计师会仔细编写对话和响应的不同路径。这些路径基于可能的用户输入，其中需要收集信息以使用户能够传达他们的需求，并使代理收集回答查询所需的值。设计师从通常所说的“快乐路径”开始，这是实现目标的最简单对话路径，然后扩展以处理对话周围的边缘情况。
- en: The design needs to support other situational edge cases, such as unhandled
    intents, mismatched intents, on-input, and any other ways a user can try to steer
    a conversation. There is a lot to document here. These designs can become complex
    with many turns of a conversation, as conversations are often not linear, and
    users may change topics or ask unexpected questions. It’s the conversation designer’s
    job to include this in a design.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 设计需要支持其他情境边缘情况，例如未处理的意图、不匹配的意图、输入时以及用户尝试引导对话的任何其他方式。这里有很多需要记录的内容。随着对话的许多转折，这些设计可能会变得复杂，因为对话通常不是线性的，用户可能会改变话题或提出意外的问题。这是对话设计师在设计中包含这一点的任务。
- en: 'Conversation designs are shared between project stakeholders using several
    different methods, as follows:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计通过以下几种不同的方法在项目利益相关者之间共享：
- en: Flow charts
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 流程图
- en: Spreadsheets
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电子表格
- en: Pseudocode
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟伪代码
- en: Conversation management software, such as Voiceflow
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话管理软件，如Voiceflow
- en: Depending on the size of the project, team, and budget, as well as personal
    preference, there is no one-size-fits-all approach for conversation design tools.
    As long as they are easy to iterate and collaborate on, these designs will often
    be touched by several different teams on the way to sign-off. However, some of
    the more popular conversation management tools offer a lot more than just design
    and collaboration and include some very useful features leveraging LLMs. This
    will be covered in the next section.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 根据项目的大小、团队和预算，以及个人偏好，没有一种适合所有对话设计工具的方法。只要它们易于迭代和协作，这些设计通常会在签署前被多个不同的团队触及。然而，一些更受欢迎的对话管理工具提供了比设计和协作更多的功能，并包括一些利用LLMs的非常有用的功能。这将在下一节中介绍。
- en: Copywriting
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 写作
- en: The last step is to write the actual text of the chatbot’s responses. This involves
    using persuasive and engaging language to guide the user through the conversation.
    The copy should reflect the chatbot’s persona and align with the brand’s voice
    and tone. For larger agents with hundreds or even thousands of responses, the
    challenge is often in securing consistency, particularly if there are several
    conversation designers working on a project in tandem or over time. As a conversational
    AI project matures, it’s even more likely that this will occur. As each party
    brings their own style to the project, the tone of voice can deviate from the
    original persona and brand guidelines for the agent.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是编写聊天机器人的实际回复文本。这需要使用有说服力和引人入胜的语言引导用户通过对话。文案应反映聊天机器人的个性，并与品牌的语气和风格保持一致。对于拥有数百甚至数千个回复的大型代理，挑战通常在于确保一致性，尤其是在有多个对话设计师同时或随着时间的推移在一个项目上工作时。随着对话人工智能项目的成熟，这种情况发生的可能性更大。由于每个参与者都会为项目带来自己的风格，因此语气可能会偏离代理的原始个性和品牌指南。
- en: Now we’ve covered the role of a conversation designer and the specific tasks
    that make up the process of conversation design before implementing a conversational
    AI solution, it’s time to see where ChatGPT can be utilized in these specific
    workflows.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们介绍了对话设计师的角色以及构成对话设计过程的特定任务，并在实施对话式人工智能解决方案之前，现在是时候看看ChatGPT在这些特定工作流程中可以如何被利用了。
- en: Working with practical applications of ChatGPT in conversation design
  id: totrans-44
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在对话设计中使用ChatGPT的实际应用
- en: From our understanding of the tasks that need to be carried out for conversation
    design, it’s easy to see that in some areas, we can leverage ChatGPT to help complete
    them. Some of the most popular conversation design tools also supply the ability
    to carry out these tasks as part of their functionality.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从我们对需要执行对话设计任务的了解来看，很容易看出在某些领域，我们可以利用ChatGPT来帮助完成这些任务。一些最受欢迎的对话设计工具也提供了作为其功能一部分执行这些任务的能力。
- en: Tip
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Remember that ChatGPT is a conversation design tool, not a replacement for conversation
    design best practices.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，ChatGPT是一个对话设计工具，而不是对话设计最佳实践的替代品。
- en: Intent clustering with ChatGPT
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行意图聚类
- en: Intents are the core concept of most traditional conversational AI agents. The
    intent is there to define the intention of the user, and each intent needs to
    have a set of utterances to fire this intent. Many conversational AI implementations
    start with large volumes of live chat data, voice transcripts, or other unstructured
    text data, which will form the basis of the tasks or intents that a chatbot or
    voice interface will need to support.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 意图是大多数传统对话式人工智能代理的核心概念。意图的存在是为了定义用户的意图，每个意图都需要有一组话语来触发这个意图。许多对话式人工智能实现都是从大量的实时聊天数据、语音转录或其他非结构化文本数据开始的，这些数据将形成聊天机器人或语音界面需要支持的任务或意图的基础。
- en: How can intent clustering be useful?
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 意图聚类有什么用？
- en: A conversational AI project may be in its infancy. It may also be a mature project
    under heavy use or one whose subject matter changes often. It’s often the conversation
    designer or AI trainer’s job to use this data to understand and prioritize the
    intents by clustering unstructured training data or utterances.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 一个对话式人工智能项目可能还处于起步阶段。它也可能是一个在重压下使用或主题内容经常变化的成熟项目。通常，对话设计师或AI训练师的工作是利用这些数据通过聚类非结构化训练数据或话语来理解和优先排序意图。
- en: For example, if you are looking to move from live chat to chatbot automation,
    you may have a large corpus of historical chat. You’ll want to look at this and
    decide which common questions or intents are asked the most. Similarly, a chatbot
    or voice assistant that handles a specific fluid subject matter, such as holidays,
    may need to be changed regularly to answer new questions arising from external
    factors. These new questions could be highlighted by clustering.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你正打算从实时聊天过渡到聊天机器人自动化，你可能有一个大量的历史聊天语料库。你将需要查看这些数据并决定哪些常见问题或意图被问得最多。同样，处理特定流动主题内容（如假日）的聊天机器人或语音助手可能需要定期更新以回答由外部因素引起的新问题。这些新问题可以通过聚类来突出显示。
- en: What is intent clustering?
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是意图聚类？
- en: Intent clustering essentially means looking at a large corpus of data and looking
    for groupings of semantically similar sentences. So, for our use case, we will
    be looking at our unstructured chat data and grouping based on semantically similar
    meanings so that we can start surfacing intents.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 意图聚类本质上意味着查看大量数据并寻找语义相似句子的分组。因此，对于我们的用例，我们将查看我们的非结构化聊天数据，并根据语义相似的意义进行分组，以便我们可以开始浮现意图。
- en: 'In the past, the process of intent surfacing by clustering has involved either
    a complex process using embeddings, or the use of proprietary solutions such as
    HumanFirst. The process would follow these steps:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，通过聚类进行意图浮现的过程涉及使用嵌入的复杂过程，或者使用如HumanFirst之类的专有解决方案。这个过程将遵循以下步骤：
- en: '**Data collection**: Assemble the corpus of text data that you want to analyze.
    This could range from a collection of scientific articles to a dataset of user-generated
    content.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据收集**：组装你想要分析的文本数据语料库。这可能包括从科学文章的集合到用户生成内容的数据库。'
- en: '**Embedding generation**: Use machine learning libraries such as TensorFlow,
    services such as Word2Vec, or **Bidirectional Encoder Representations from Transformers**(**BERT**)
    to generate similarity embeddings for your text data. These embeddings are high-dimensional
    vector representations that capture the semantic content of the text. So, if a
    text has a similar meaning to another, then the embeddings will be closer together'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**嵌入生成**：使用TensorFlow等机器学习库、Word2Vec等服务或**双向编码器表示的Transformer**(**BERT**)生成文本数据的相似性嵌入。这些嵌入是高维向量表示，捕获文本的语义内容。因此，如果一个文本与另一个文本具有相似的意义，那么嵌入将更接近。'
- en: '**Clustering algorithm**: Apply an unsupervised machine learning algorithm
    such as K-means to the generated embeddings. These algorithms separate the high-dimensional
    embedding space into clusters based on the density and distance between points.'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**聚类算法**：将无监督机器学习算法（如K-means）应用于生成的嵌入。这些算法根据点之间的密度和距离将高维嵌入空间分离成簇。'
- en: '**Cluster analysis**: Once complete, there should be sets of clusters of utterances,
    each containing semantically similar texts. Analyzing these clusters can reveal
    intents or questions, which can then be used to train an intent-based machine
    learning model.'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**聚类分析**：一旦完成，应该有一组包含语义相似文本的话语簇。分析这些簇可以揭示意图或问题，然后可以用来训练基于意图的机器学习模型。'
- en: In essence, clustering in this context is an unsupervised technique that uses
    semantic embeddings to group similar texts together, helping the discovery of
    underlying intents in large text datasets of unstructured text data.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，聚类是一种无监督技术，它使用语义嵌入将相似文本分组在一起，帮助发现大量非结构化文本数据集中的潜在意图。
- en: Learning how to create intent clusters with ChatGPT
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学习如何使用ChatGPT创建意图簇
- en: 'Looking at achieving this with ChatGPT is straightforward when you follow the
    simple rules of prompt engineering: instruction, context, input data, and output
    indicator. We’ll cover more examples of prompt engineering in more detail in [*Chapter
    4*](B21100_04.xhtml#_idTextAnchor110).'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遵循简单的提示工程规则时，使用ChatGPT实现这一点很简单：指令、上下文、输入数据和输出指示符。我们将在[*第4章*](B21100_04.xhtml#_idTextAnchor110)中更详细地介绍更多提示工程示例。
- en: Prompting, for our intents, could look something like the following. It’s important
    to note that designing prompts is an iterative process that sometimes requires
    experimentation to get the results you are looking for.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的意图，提示可能看起来像以下这样。重要的是要注意，设计提示是一个迭代过程，有时需要实验才能得到你想要的结果。
- en: For our first example, we are looking at creating a chatbot for our college
    website that will answer questions about the college. We have a set of unstructured
    utterances that have been harvested from a live chat implementation.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的第一个示例，我们正在创建一个用于我们大学网站的聊天机器人，该机器人将回答有关大学的问题。我们有一组从实时聊天实现中收集的非结构化话语。
- en: 'For this example, we are using instructions, input data, and an output indicator
    in our prompt. The instructions and input data handle telling ChatGPT what we
    want and what utterances to use. The output indicator also shows the format we
    want the result to use. In this case, JSON will be the most useful, as we’re looking
    at using the intents or utterances as part of an automated process. The model
    would also handle other output formats such as CSV. It looks something like this:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个示例，我们在提示中使用指令、输入数据和输出指示符。指令和输入数据处理告诉ChatGPT我们想要什么以及使用哪些话语。输出指示符还显示了我们想要的输出格式。在这种情况下，JSON将最有用，因为我们正在考虑将意图或话语作为自动化过程的一部分使用。该模型还将处理其他输出格式，如CSV。它看起来像这样：
- en: '[PRE0]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The result should look something like the following:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 结果应该看起来像以下这样：
- en: '[PRE1]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Along with manually creating intents via the ChatGPT interface, it would also
    be possible to automate this process further by using the ChatGPT API directly.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 除了通过ChatGPT界面手动创建意图外，还可以通过直接使用ChatGPT API进一步自动化此过程。
- en: Expanding the example to create intents
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将示例扩展以创建意图
- en: Considering our chatbot use case, it may be that we want to build our intent
    set by creating more intents. For example, if your live chat data is limited and
    you would like to expand out to other intents, you can use ChatGPT to carry out
    a task to create more intents and utterances using some of your existing ones.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到我们的聊天机器人用例，我们可能希望通过创建更多意图来构建我们的意图集。例如，如果你的实时聊天数据有限，并且你想扩展到其他意图，你可以使用ChatGPT执行一个任务，通过使用一些现有的意图来创建更多意图和话语。
- en: 'Let’s create our prompt by using the output from our earlier example, prompting
    for intent clusters, which you can see in the prompt with the `{``input_data}`
    placeholder:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过使用我们之前示例的输出，提示意图聚类来创建我们的提示，您可以在提示中看到`{``input_data}`占位符：
- en: '[PRE2]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'If we run this prompt, we can see that this works well. This is the output:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们运行这个提示，我们可以看到这很有效。这是输出：
- en: '[PRE3]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Understanding utterance and entity generation
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解语句和实体生成
- en: In modern conversational AI systems, intents and entities are crucial components
    that enable the system to understand and process human language, enabling more
    natural and effective conversations. The task of creating these elements is one
    of the most common tasks for a conversation designer. These elements can then
    be used to train our machine learning model for the conversational AI platform
    we are using.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代对话式人工智能系统中，意图和实体是至关重要的组成部分，它们使系统能够理解和处理人类语言，从而实现更自然、更有效的对话。创建这些元素是对话设计师最常见的任务之一。这些元素随后可以用于训练我们用于对话式人工智能平台的机器学习模型。
- en: Creating utterances
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建语句
- en: In the earlier *Learning how to create intent clusters with ChatGPT* section,
    we looked at clustering utterances to surface intents from unstructured training
    data. ChatGPT can also be used to create utterances.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的*如何使用ChatGPT创建意图聚类*部分，我们探讨了如何从非结构化训练数据中聚类语句以提取意图。ChatGPT也可以用来创建语句。
- en: 'If we don’t have enough utterances for a specific intent, we can prompt ChatGPT
    to create a set of utterances for a specific intent, as follows:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们没有足够多的语句来满足特定的意图，我们可以提示ChatGPT为特定意图创建一组语句，如下所示：
- en: '[PRE4]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The results are surprisingly good:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 结果令人惊讶地好：
- en: '[PRE5]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'We can also be more specific about the types of utterances. For example, if
    we wanted a larger spread of utterances, we could prompt ChatGPT for longer tail
    examples. Let’s use the “Get College Location” intent use case and add long tail
    utterances to the existing utterances:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以更具体地说明语句的类型。例如，如果我们想要更广泛的语句范围，我们可以提示ChatGPT提供更长的尾部示例。让我们以“获取大学位置”的意图用例为例，向现有语句中添加长尾语句：
- en: '[PRE6]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'This results in a larger breadth of utterances for our NLU training dataset:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得我们的NLU训练数据集的语句范围更广：
- en: '[PRE7]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Each of the created utterances matches our criteria with a more conversational
    and complex (long tail) format.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 每个创建的语句都符合我们的标准，具有更对话式和复杂的（长尾）格式。
- en: Tip
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Remember that artificial training data, even that created by LLMs, is no replacement
    for real usage data. This is particularly true when we are creating utterances
    for voice, as ChatGPT has been trained on textual data.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，人工训练数据，即使是LLM创建的，也不能替代真实使用数据。这一点在创建语音语句时尤其正确，因为ChatGPT是在文本数据上训练的。
- en: Creating entities
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建实体
- en: Another generative task that ChatGPT is very capable of is creating entities.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT非常擅长的一项生成任务是创建实体。
- en: Entities are the specific pieces of information that relate to the intent. They
    are the variables that supply the details of the user’s request.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 实体是与意图相关的具体信息片段。它们是提供用户请求详细信息的变量。
- en: 'For example, consider our `Get_College_Events` intent. To answer the question
    correctly, we need to know a couple of things: the dates and types of events.
    While system dates tend to be supported by the conversational AI platform, custom
    entities often need to be created to train the NLU. For this particular use case,
    the event type would be the custom entity we need to populate. We can ask ChatGPT
    to help us with this. Remember to be as specific as possible with the prompt.
    In this case, we’re asking for the output to be formatted correctly for importing
    into our conversational AI platform:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑我们的`Get_College_Events`意图。为了正确回答问题，我们需要了解一些事情：事件的日期和类型。虽然系统日期通常由对话式人工智能平台支持，但为了训练NLU，通常需要创建自定义实体。对于这个特定用例，事件类型就是我们需要填充的自定义实体。我们可以请ChatGPT帮助我们。记住，提示要尽可能具体。在这种情况下，我们要求输出格式正确，以便导入到我们的对话式人工智能平台：
- en: '[PRE8]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The results are a comprehensive set of entity types and corresponding synonyms:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一套全面的实体类型及其对应同义词：
- en: '[PRE9]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: By correctly finding and processing entities, ChatGPT can create precise and
    useful responses quickly.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 通过正确地查找和处理实体，ChatGPT可以快速创建精确且有用的响应。
- en: In the absence of any customer conversational data, ChatGPT utterances can serve
    as a good means to bootstrap a chatbot for further iterations.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在没有客户对话数据的情况下，ChatGPT的语句可以作为启动聊天机器人进行进一步迭代的好方法。
- en: Using ChatGPT to help write your dialogue
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT帮助编写您的对话
- en: Writing engaging chat and voice dialogue is one of the critical parts of a conversation
    designer’s role. So, how can ChatGPT help, and should you even consider using
    it?
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 编写引人入胜的聊天和语音对话是对话设计师角色的重要部分。那么，ChatGPT如何帮助，您甚至应该考虑使用它吗？
- en: Understanding the challenges of writing dialogue
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解编写对话的挑战
- en: As conversation designers, one of the most engaging yet challenging aspects
    of our work is crafting the responses of our chatbot or voice assistant. After
    all, this is your chance to shine. Good dialogue is the difference between a flat
    conversational experience and one that is truly engaging for your users.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 作为对话设计师，我们工作中最吸引人但最具挑战性的方面之一是制作聊天机器人或语音助手的回应。毕竟，这是您展示自己的机会。好的对话是平淡的对话体验和真正吸引用户的对话体验之间的区别。
- en: 'Creating sample dialogue, ensuring smooth transitions between bits of dialogue
    within a flow, and formulating precise responses for highly specific contexts
    all take time and careful consideration. This is all done while dealing with the
    pressure of meeting deadlines and keeping stakeholders informed and feedback actioned.
    Some of the things to consider include the following:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 创建示例对话，确保对话流中各部分之间的平稳过渡，并为高度具体的环境制定精确的回应，这些都需要时间和仔细的考虑。这一切都是在应对满足截止日期的压力、保持利益相关者知情并采取反馈行动的同时完成的。以下是一些需要考虑的事项：
- en: Upholding a voice and tone that resonate with your AI assistant’s persona
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持与您的AI助手角色相呼应的声音和语调
- en: Keeping to company content guidelines
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遵守公司内容指南
- en: Utilizing language that aligns with the content you may need to offer your users
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用与您可能需要提供给用户的内含内容相一致的语言
- en: Handling error scenarios capably and consistently
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够熟练且一致地处理错误情况
- en: Striking a balance between saying too little and being overly verbose
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在说得太多和过于冗长之间找到平衡
- en: Ensuring that the crafted responses are effective across various modalities,
    not just in theory
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保精心制作的回应在各种模态中都是有效的，而不仅仅是理论上
- en: Addressing inherent biases that could influence the language we use and impact
    the end users
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决可能影响我们使用语言的内隐偏见，并可能对最终用户产生影响
- en: Following legal and compliance guidelines carefully to ensure the language we
    use is correct and not going to land you legal hot water
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细遵循法律和合规指南，以确保我们使用的语言是正确的，不会让您陷入法律麻烦
- en: In essence, editing conversational dialogue is a complex set of tasks that requires
    a delicate balance of creativity, precision, and compliance.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，编辑对话性对话是一系列复杂的任务，需要创造力和精确性的微妙平衡。
- en: Editing your dialogue with ChatGPT
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用ChatGPT编辑您的对话
- en: ChatGPT can perform several tasks to enhance your dialogue. Let’s delve into
    a few examples, such as rewriting for readability, checking content guidelines,
    or creating different versions of copy for a better conversational experience.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以执行多项任务来增强您的对话。让我们深入探讨一些例子，例如重新编写以提高可读性、检查内容指南或为更好的对话体验创建副本的不同版本。
- en: Rewriting for readability
  id: totrans-116
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 重新编写以提高可读性
- en: 'If you have copy that is not written for your use case, but you still need
    to convey the included information, you can ask ChatGPT to rewrite it for you.
    Here is an example of a prompt for doing this. This is a copy of a patient information
    sheet for a clinical trial:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有不适合您用例的副本，但仍然需要传达包含的信息，您可以要求ChatGPT为您重新编写。以下是一个执行此操作的提示示例。这是一个临床试验患者信息表的副本：
- en: '[PRE10]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'From the result, you can see that ChatGPT has done an excellent job of summarizing
    the content:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 从结果来看，您可以看到ChatGPT在总结内容方面做得非常出色：
- en: '[PRE11]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Try this with your own example text. Keep iterating on your prompt until you
    have something you’re satisfied with.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 用您自己的示例文本尝试这个方法。不断迭代您的提示，直到您对结果满意为止。
- en: 'Another good dialog creation example is rewriting content for a specific purpose.
    For example, if we want to create a set of concise instructions from descriptive
    copy, we might use the following:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个良好的对话创建示例是为特定目的重新编写内容。例如，如果我们想从描述性副本中创建一组简洁的说明，我们可能会使用以下方法：
- en: '[PRE12]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Providing concise instructions with context, input, and output instructions
    yields good results and something we can work with. Try this with your own examples.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 提供具有上下文、输入和输出指令的简洁说明，可以得到良好的结果，并且是我们可以工作的内容。用您自己的例子尝试这个方法。
- en: It’s tempting to think that we can automate our response creation. However,
    it’s not wise to do so. The content created by ChatGPT is only a starting point.
    It’s essential to ensure that ChatGPT is supplying the right information and not
    changing meaning while also keeping to your conversation design requirements.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 认为我们可以自动化响应创建是很诱人的。然而，这样做并不明智。ChatGPT创建的内容只是一个起点。确保ChatGPT提供正确的信息，同时不改变意义，并遵守你的对话设计要求是至关重要的。
- en: Persona creation with ChatGPT
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT创建用户画像
- en: User personas are critical components in user-centric design, as they enable
    organizations to understand their target demographics and construct solutions
    tailored to their needs. This section will delve into how ChatGPT can be used
    to generate sophisticated and intelligent user personas.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 用户画像在以用户为中心的设计中是关键组成部分，因为它们使组织能够了解他们的目标受众，并构建满足他们需求的解决方案。本节将深入探讨如何使用ChatGPT生成复杂和智能的用户画像。
- en: Real-world example
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 真实世界案例
- en: Meet LuxeLocks, our imaginary company that specializes in selling luxury haircare
    products. LuxeLocks is passionate about providing its customers with high-end,
    quality products that transform their hair into a crowning glory. In an effort
    to elevate their customer service to the next level and to answer queries around
    the clock, LuxeLocks has decided to implement a chatbot.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 认识LuxeLocks，这是我们虚构的公司，专门销售奢华护发产品。LuxeLocks热衷于为其客户提供高端、高质量的产品，将他们的头发变成荣耀的象征。为了将客户服务提升到下一个层次，并随时回答查询，LuxeLocks决定实施聊天机器人。
- en: This chatbot will be designed to assist customers in various ways, from helping
    them choose the perfect product based on their hair type and concerns, to answering
    frequently asked questions about product usage and ingredients, and even assisting
    with order tracking and returns.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这个聊天机器人将被设计成以各种方式协助客户，从帮助他们根据头发类型和问题选择完美的产品，到回答关于产品使用和成分的常见问题，甚至协助订单跟踪和退货。
- en: By posing questions and presenting scenarios, you can gain insights into user
    preferences, behaviors, and pain points.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提出问题和呈现场景，你可以深入了解用户偏好、行为和痛点。
- en: Persona creation is based on hard facts and user-specific data. Using ChatGPT
    is not a shortcut for real research, but it can help.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 画像创建基于硬事实和特定用户数据。使用ChatGPT不是真实研究的捷径，但它可以帮助。
- en: Using ChatGPT for user research
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行用户研究
- en: 'It’s beyond the scope of this book to outline the process of gathering information
    about your target audience through surveys, interviews, and market research. There
    is also no substitute for this. Here are some external sources to learn more about
    this process:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中概述通过调查、访谈和市场研究收集关于目标受众信息的过程超出了范围。这也无法替代。以下是一些外部资源，以了解更多关于此过程的信息：
- en: '[https://www.questionpro.com/blog/research-process-steps/](https://www.questionpro.com/blog/research-process-steps/)'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[研究流程步骤](https://www.questionpro.com/blog/research-process-steps/)'
- en: '[https://medium.com/@h_locke/every-ux-book-i-recommend-and-why-673d634ca530](mailto:https://medium.com/@h_locke/every-ux-book-i-recommend-and-why-673d634ca530)'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[我推荐的每本UX书籍及其原因](mailto:https://medium.com/@h_locke/every-ux-book-i-recommend-and-why-673d634ca530)'
- en: '[https://www.nngroup.com/articles/why-you-only-need-to-test-with-5-users/](https://www.nngroup.com/articles/why-you-only-need-to-test-with-5-users/)'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[为什么你只需要测试5个用户](https://www.nngroup.com/articles/why-you-only-need-to-test-with-5-users/)'
- en: '[https://www.usability.gov/what-and-why/user-experience.html](https://www.usability.gov/what-and-why/user-experience.html)'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[用户体验](https://www.usability.gov/what-and-why/user-experience.html)'
- en: 'However, it is feasible to use ChatGPT to help you with some ideas to carry
    out your research. You can do this with the following prompt:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使用ChatGPT帮助你提出一些进行研究的想法是可行的。你可以通过以下提示来完成：
- en: '[PRE13]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'The output can, at the very least, form a basis to start your research. This
    might look like this:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 至少，输出可以形成一个基础，开始你的研究。这可能看起来是这样的：
- en: '[PRE14]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Once you have your details, you can also use ChatGPT to analyze the data and
    surface some details about the user groups:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了详细信息，你还可以使用ChatGPT来分析数据，并揭示一些关于用户群体的细节：
- en: '[PRE15]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The preferences and characteristics of LuxeLocks users can then help us build
    up our user persona and supply steering for our chatbot persona.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: LuxeLocks用户的偏好和特征可以帮助我们构建用户画像，并为我们的聊天机器人画像提供指导。
- en: Creating our user and chatbot personas
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建我们的用户和聊天机器人画像
- en: You can use the demographic characteristics created from the earlier prompt
    to help you create your user and chatbot personas.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用从早期提示中创建的人口统计特征来帮助您创建用户和聊天机器人角色。
- en: Creating our user persona
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建我们的用户角色
- en: 'Let’s prompt ChatGPT to create a persona and use the results from our earlier
    prompt for preferences and characteristics. Replace `*characteristics*` and `*preferences*`
    with those values in the prompt that follows:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们提示ChatGPT创建一个角色，并使用我们之前提示中的偏好和特征结果。在以下提示中，将`*characteristics*`和`*preferences*`替换为这些值：
- en: '[PRE16]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: We can use the resulting persona description in follow-up questions to ChatGPT.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在后续问题中用这个角色描述来询问ChatGPT。
- en: Creating our chatbot persona
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建我们的聊天机器人角色
- en: 'You can also use ChatGPT to create your chatbot or virtual assistant’s persona.
    As with any prompt, you can vary the amount of information you include, but I’ve
    found that more detailed prompts lead to better results. Try using something like
    this:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以使用ChatGPT来创建您的聊天机器人或虚拟助手的角色。与任何提示一样，您可以调整包含的信息量，但我发现更详细的提示会产生更好的结果。尝试使用类似以下的内容：
- en: '[PRE17]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: We can now use our users’ and chatbot’s personas to guide ChatGPT in further
    tasks related to creating dialogue and interactions.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用用户和聊天机器人的角色来指导ChatGPT在创建对话和交互相关的进一步任务中。
- en: Simulating conversations
  id: totrans-156
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模拟对话
- en: ChatGPT can be used to create sample conversations with potential users with
    a specific persona, which can be used to help create your conversation flows.
    Again, I’m stressing that this should not replace the conversational flow design
    process, but that it is an effective way of looking at specific use cases.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以用来与具有特定角色的潜在用户创建样本对话，这可以帮助创建您的对话流程。我再次强调，这不应取代对话流程设计过程，而是一种有效查看特定用例的方法。
- en: What is a sample dialogue?
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 样例对话是什么？
- en: Sample dialogue entails examples of specific multi-turn conversations between
    a user and an agent.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 样例对话包括用户和代理之间特定多轮对话的例子。
- en: For those involved in the design and development of conversational experiences,
    these bits of dialogue are an essential tool. They allow us to explore the potential
    pathways a conversation can follow, and to evaluate which of these branches call
    for consideration and integration into the final conversational design.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 对于参与对话体验设计和开发的人来说，这些对话片段是必不可少的工具。它们使我们能够探索对话可能遵循的潜在路径，并评估哪些分支需要考虑并整合到最终的对话设计中。
- en: '[PRE18]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Let’s now look at creating our own chatbot dialogue in the next section.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将来看如何创建我们自己的聊天机器人对话。
- en: Creating sample dialogue
  id: totrans-163
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建示例对话
- en: 'In the following prompt, we supply information for tone, language, clarification,
    and elements of the conversation. We want to provide these in this case to ensure
    we have solved the problem:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下提示中，我们提供有关语气、语言、澄清和对话元素的信息。我们希望在这种情况下提供这些信息，以确保我们已经解决了问题：
- en: '[PRE19]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: This results in a good conversational example. It’s worth trying different variations
    so that you can build up an understanding of the sorts of ways a conversation
    can go.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这产生了一个好的对话示例。尝试不同的变体是值得的，这样您可以建立起对对话可能走向的理解。
- en: At this stage, we’re designing our flows, but we’ll also see later that we can
    use a similar technique as part of our testing process.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，我们正在设计我们的流程，但稍后我们也会看到，我们可以将这种技术作为我们测试过程的一部分。
- en: Creating sample dialogue with personas
  id: totrans-168
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建带有角色的示例对话
- en: 'We can build on the creation of bits of sample dialogue, which have so far
    been centered on specific use cases, by passing more information about the user
    and agents’ personas into the prompt:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过将更多关于用户和代理角色的信息传递到提示中，来构建基于样本对话片段的创建，这些片段到目前为止主要集中在特定的用例上：
- en: '[PRE20]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The trick here is to provide ChatGPT with details of your user and chatbot personas.
    Once you’ve provided these to ChatGPT, you can then give follow-up prompts requesting
    further examples of dialogue or use cases.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的技巧是向ChatGPT提供您的用户和聊天机器人角色的详细信息。一旦您向ChatGPT提供了这些信息，您就可以给出后续提示，要求进一步提供对话或用例的示例。
- en: 'This technique will also work when looking at example use cases. In the next
    prompt, we will build on this and ask for another conversation example:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 当查看示例用例时，这种技术同样适用。在下一个提示中，我们将在此基础上继续，并要求另一个对话示例：
- en: '[PRE21]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: ChatGPT’s response is impressive here, as it goes one step further and creates
    some quiz questions, although the best choice would be to include details of your
    quiz.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回应在这里很令人印象深刻，因为它更进一步，创建了一些测验问题，尽管最好的选择是包括您的测验细节。
- en: The technique of detailed prompting to create conversation examples can also
    be used in testing and further iterations, which we’ll cover in the next section.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 使用详细提示来创建对话示例的技术也可以用于测试和进一步的迭代，我们将在下一节中介绍。
- en: Testing and iteration in conversation design with ChatGPT
  id: totrans-176
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行对话设计和迭代测试
- en: Conversation design is an iterative process. Automated agents are always changing
    and being improved. In this section, we’ll look at testing and improving our agents
    with ChatGPT.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 对话设计是一个迭代的过程。自动化智能体总是在变化和改进。在本节中，我们将探讨使用ChatGPT测试和改进我们的智能体。
- en: Testing with ChatGPT
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行测试
- en: In the earlier sections, we saw that ChatGPT can be a valuable tool in streamlining
    the design process by creating dialogue to help us craft our designs. We can carry
    out a similar approach when we test our agent before deployment.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们看到了ChatGPT可以通过创建对话来帮助我们设计，从而在简化设计过程中成为一个有价值的工具。在部署之前测试我们的智能体时，我们可以采取类似的方法。
- en: We often create our agents based on which questions we think they are going
    to be asked. This is even more likely to be the case if we are starting a conversational
    AI project from scratch with little or no training data. If this is the case,
    it’s even more important to test your agent before releasing your agent into the
    wild.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常根据我们认为他们会被问到的问题来创建智能体。如果我们是从零开始启动一个对话人工智能项目，几乎没有训练数据，这种情况就更加可能。如果是这种情况，在将智能体发布到野外之前测试您的智能体就更加重要。
- en: Even if the conversational AI project has internal testers, or if you can expose
    friends or family to your agent before alpha or beta releases, it’s still valuable
    to test as thoroughly as possible before handing it over to human users. This
    is where ChatGPT can be utilized.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 即使对话人工智能项目有内部测试人员，或者您在alpha或beta发布之前可以向朋友或家人展示您的智能体，但在将其交给人类用户之前尽可能彻底地进行测试仍然很有价值。这就是ChatGPT可以发挥作用的地方。
- en: Conversation simulations for testing
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试的对话模拟
- en: This process is similar to the design process. We can create simulations where
    ChatGPT plays the role of a user. You can then build up sets of test user interaction
    scripts to follow with the chatbot without real user engagement.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程与设计过程类似。我们可以创建模拟，其中ChatGPT扮演用户角色。然后，您可以构建一系列测试用户交互脚本，以便在无需真实用户参与的情况下与聊天机器人进行交互。
- en: We’ll consider this in the context of our luxury haircare chatbot example. In
    the same way that ChatGPT was used to create entities and utterances, we can also
    use it to generate additional training data that mirrors real-world conversations.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在我们的奢华护发聊天机器人示例的上下文中考虑这一点。就像ChatGPT被用来创建实体和话语一样，我们也可以用它来生成反映现实对话的额外训练数据。
- en: Tip
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: If you continue with the same ChatGPT session from before, we’ll already have
    prompted our personas. If you’re starting a new session, remember to add these
    to your prompt to set the context.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您继续使用之前的ChatGPT会话，我们已经在提示中设置了角色。如果您开始一个新的会话，请记住将这些添加到您的提示中，以设置上下文。
- en: 'So, we’ll simply ask ChatGPT to create training data results in the form of
    questions that cover a range of topics related to haircare, product recommendations,
    sustainability, and personalized routines, reflecting Sophia’s persona and interests:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们将简单地要求ChatGPT创建以问题形式呈现的训练数据结果，这些问题涵盖了与护发、产品推荐、可持续性和个性化流程相关的各种主题，反映了Sophia的角色和兴趣：
- en: '[PRE22]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'We can also prompt for more long-tail examples so we can test these with our
    agent:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以提示更多长尾示例，以便我们可以用我们的智能体进行测试：
- en: '[PRE23]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Once we have a set of training questions, you can test our agent manually or
    create an automation if your chatbot provides APIs.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有一组训练问题，您就可以手动测试我们的智能体，或者如果您的聊天机器人提供API，您可以创建自动化。
- en: Creating more specific test scripts
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建更具体的测试脚本
- en: For more complex conversational interactions, ChatGPT can also be used to create
    examples of the same flow so they can be used to test your agent.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更复杂的对话交互，ChatGPT也可以用来创建相同的流程示例，以便您可以使用它们来测试您的智能体。
- en: 'Consider an example inquiry from a user interested in the status of their order.
    This can be used as a prompt to ChatGPT to create other examples with different
    conversational turns:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个用户对其订单状态感兴趣的具体询问。这可以用作提示ChatGPT创建具有不同对话转折的其他示例：
- en: '[PRE24]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: You can then run through these script examples with your chatbot to see how
    it performs.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您可以通过这些脚本示例运行您的聊天机器人，以查看其表现。
- en: Testing for failures and edge cases
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试失败和边缘情况
- en: Other conversational outcomes for the same use case can also be considered and
    accounted for with ChatGPT. For example, you can use ChatGPT to cover edge cases
    that need to be accounted for within the design.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 对于同一用例的其他对话结果也可以考虑并使用 ChatGPT 进行处理。例如，你可以使用 ChatGPT 来覆盖设计中需要考虑的边缘情况。
- en: 'Some examples could involve users straying away from the happy path, or the
    following example, where there are issues with the services Lila relies on to
    provide answers:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 一些例子可能涉及用户偏离了快乐路径，或者以下例子，其中存在 Lila 提供答案所依赖的服务问题：
- en: '[PRE25]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'You can also prompt ChatGPT to provide its own suggestions here:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以提示 ChatGPT 在这里提供自己的建议：
- en: '[PRE26]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The results can be used to check whether you’ve missed anything in the design
    and implementation.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这些结果可以用来检查你在设计和实施过程中是否遗漏了任何内容。
- en: Iterating your chatbot with ChatGPT
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 迭代你的聊天机器人
- en: 'As soon as you have real users testing your agent, you can use transcripts
    and interaction logs to see how your conversation designs can be improved by feeding
    examples to ChatGPT:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的代理有真实用户进行测试，你就可以使用转录和交互日志来查看如何通过向 ChatGPT 提供示例来改进你的对话设计。
- en: '[PRE27]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: This is particularly useful if you want to look at failed conversations, conversations
    that ended with unsatisfactory results, or conversations that ended with a dissatisfied
    user. It lets you look at ways you can improve your conversation flow.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这尤其有用，如果你想要查看失败的对话、以不满意结果结束的对话或以不满意的用户结束的对话。它让你能够查看你可以改进对话流程的方式。
- en: Summary
  id: totrans-208
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we focused on how ChatGPT can be used in conversation design.
    We explored the multifaceted role of the conversation designer and looked at some
    of the many tasks that make up the conversation design process in more detail.
    We learned that some of these tasks can be tackled with the help of ChatGPT.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们重点介绍了如何将 ChatGPT 应用于对话设计。我们探讨了对话设计师的多重角色，并更详细地审视了构成对话设计过程的许多任务。我们了解到，其中一些任务可以在
    ChatGPT 的帮助下完成。
- en: We delved into the practical tasks involved, such as understanding user needs,
    designing personas, creating conversation flows, and writing dialogue.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 我们深入探讨了涉及的实际任务，例如理解用户需求、设计角色、创建对话流程和编写对话。
- en: We also learned that it’s important to understand that ChatGPT is not a replacement
    for good conversation design practices, but that it is an incredibly powerful
    tool.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还了解到，理解 ChatGPT 并非是优秀对话设计实践的替代品，而是一个功能极其强大的工具。
- en: At the heart of our use of ChatGPT as a conversation design assistant is the
    effective implementation of prompt engineering. We started to look at the principles
    involved with prompt engineering. In [*Chapter 4*](B21100_04.xhtml#_idTextAnchor110),
    we’ll look at prompt engineering in more detail to gain a deeper understanding
    of this emerging field. In the next chapter, we’ll look at the different ways
    of using ChatGPT.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将 ChatGPT 作为对话设计助手的使用核心是有效实施提示工程。我们开始研究提示工程所涉及的原则。在[*第 4 章*](B21100_04.xhtml#_idTextAnchor110)中，我们将更详细地探讨提示工程，以深入了解这一新兴领域。在下一章中，我们将探讨使用
    ChatGPT 的不同方式。
