- en: 'Part 2: Using ChatGPT, Prompt Engineering, and Exploring LangChain'
  id: totrans-217
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分：使用 ChatGPT、提示工程和探索 LangChain
- en: This part focuses on the hands-on use of ChatGPT, the intricacies of prompt
    engineering, and a deep dive into LangChain. You’ll explore different ways to
    interact with ChatGPT, whether through the web interface, APIs, or official libraries.
    You’ll also gain insights into prompt engineering, learning how to craft effective
    prompts. Finally, this section introduces LangChain, guiding you through both
    its basic and advanced uses, including debugging techniques, memory management,
    and leveraging agents for enhanced functionality.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 本部分侧重于 ChatGPT 的实际应用、提示工程的复杂性以及深入探讨 LangChain。你将探索与 ChatGPT 交互的不同方式，无论是通过网页界面、API
    还是官方库。你还将深入了解提示工程，学习如何制作有效的提示。最后，本节介绍了 LangChain，指导你了解其基本和高级用法，包括调试技术、内存管理和利用代理增强功能。
