  type: TYPE_NORMAL
- en: Achieving outcomes through data strategies
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The role of data in delivering business value
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Case studies and examples of successful data-driven businesses
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data architecture in Platform Engineering
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DataOps – Streamlining data management and operations
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The crucial role of data in Platform Engineering
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the modern digital landscape, data is the lifeblood of enterprises, driving
    innovation, efficiency, and strategic decision-making. After exploring AI in Platform
    Engineering, we now focus on data—a critical component that powers AI and underpins
    business success. Understanding the intimate relationship between data and Platform
    Engineering is essential for maximizing their potential to deliver substantial
    business value.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: The fusion of data and Platform Engineering is a powerful concept that drives
    significant business value. Data, often called the new gold, powers modern enterprises
    by providing insights for informed decision-making and strategic planning. Integrating
    data into Platform Engineering is about transforming raw data into actionable
    intelligence. Data within **machine learning (ML)** requires training, test, and
    production elements to be successful, and managing those elements is the first
    step. Sound data practices help ensure success for AI and ML initiatives. With
    a robust data foundation, AI and ML models can function effectively and may lead
    to optimal outcomes.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The integral role of data in AI and business success
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data serves as the foundation of AI, supplying the raw material for AI algorithms
    to learn, adapt, and make predictions. High-quality, well-structured data is essential
    for training accurate and reliable AI models. A robust data infrastructure is
    vital for successful AI initiatives as it prevents subpar outcomes and missed
    opportunities.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Data is also vital for achieving business objectives. It provides insights into
    customer behavior, market trends, and operational efficiency, aiding strategic
    decision-making and process optimization. Ultimately, data becomes a strategic
    asset driving business success. Data-driven decision-making transforms organizations
    by replacing intuition with factual evidence, leading to more accurate forecasting,
    improved risk management, and optimized resource allocation. Predictive analytics
    can identify trends and issues early, enabling proactive measures that save time
    and resources. Integrating data analytics into Platform Engineering allows organizations
    to continually enhance operations, improve customer experiences, and drive business
    growth. This approach ensures that every decision is backed by reliable data,
    reducing uncertainty and improving overall business performance. Each step requires
    collecting data, analyzing it against a baseline, and applying it to ML algorithms.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: The correlation between data and Platform Engineering
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Platform Engineering creates the infrastructure and tools to manage and process
    large volumes of data efficiently. It involves designing and implementing scalable,
    resilient, and flexible platforms to support data-intensive applications. These
    platforms enable seamless data flow across different systems, ensuring readily
    available information for analysis and decision-making.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Organizations must prioritize Platform Engineering for robust data infrastructure
    to support complex AI applications. This involves designing scalable, resilient
    platforms that integrate diverse data sources, facilitate advanced analytics,
    and ensure data security and compliance. Platform Engineering enables advanced
    data strategies such as **DataOps**, a methodology that combines data engineering
    and operations to streamline data management. DataOps ensures consistent, high-quality,
    readily available data, empowering organizations to make faster, more reliable
    data-driven decisions.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Improving operational efficiency in Platform Engineering is crucial. Data analytics
    helps organizations understand their operations, pinpoint bottlenecks, and identify
    improvement areas. Real-time monitoring and analytics provide immediate feedback
    on system performance, allowing quick adjustments and minimizing downtime. Data-powered
    predictive maintenance anticipates equipment failures and scheduled maintenance
    and prevents costly disruptions, extending equipment lifespan and ensuring reliable
    service. Let’s learn about a few strategies through which data can be integrated
    within Platform Engineering.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Data strategies in Platform Engineering
  id: totrans-23
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Due to AI, ML, and big data technologies, the role of data will expand in Platform
    Engineering. Increasing data volumes requires effective management and analysis,
    becoming a critical business differentiator. Organizations integrating robust
    data strategies into Platform Engineering will leverage their data assets for
    valuable insights, driving strategic decisions and business success. Adapting
    to the data-driven landscape is crucial for the future of Platform Engineering,
    requiring continual evolution to meet the demands of the digital age.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Having established the importance of data in AI and Platform Engineering, we
    must explore effective data strategies that we can integrate into Platform Engineering
    practices. These strategies encompass selecting appropriate tools and technologies,
    optimizing processes, driving innovation through data integration, and fostering
    a culture prioritizing data-driven decision-making. The following table outlines
    key data management strategies, comparing their complexity, cost, and typical
    use cases to help organizations choose the most effective approach for their needs.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '| **Strategy** | **Complexity** | **Cost** | **Use Cases** |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
- en: '| Tools and Technology | Med | Low to high | Data lake, data warehouse, analytic
    platforms |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
- en: '| Process Optimization | Medium for governance, high for automation | Low |
    Data governance frameworks, quality standards, automated workflows |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
- en: '| Enhance Operational Efficiency | Low | Medium | Real-time monitoring, operations
    centers, transparency |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
- en: '| Data Integration | High | Medium | Silo removal, unified views |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
- en: '| Cultivate Culture | High | Low | Agile foundations, retrospective, innovation
    first, observability |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
- en: 'Table 6.1: Comparison of Data Management Strategies by Complexity, Cost, and
    Use Cases'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: With that foundation in place, let’s take a closer look at how to select the
    right tools and technologies to support effective data management within your
    platform ecosystem.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Tool and technology selection
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The choice of tools and technologies is fundamental to effective data management.
    Organizations must select solutions that align with their specific needs and goals.
    This could include data lakes, data warehouses, **extract, transform, load** (**ETL**)
    tools, and advanced analytics platforms. Ensuring these tools are seamlessly integrated
    into the Platform Engineering ecosystem is essential for maintaining data integrity
    and accessibility.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: How do you select the proper data management tools for your organization? The
    key is understanding your data requirements, scalability needs, and integration
    capabilities. Choosing the right tools ensures that your data infrastructure is
    solid and can support advanced analytics and AI applications.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: Process optimization
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Optimizing data processes involves implementing best practices for data collection,
    storage, and analysis. This includes adopting data governance frameworks, establishing
    data quality standards, and automating data workflows. Data governance frameworks
    set guidelines for data collection and usage, ensuring data quality and compliance.
    Establishing data quality standards involves defining and maintaining data accuracy,
    consistency, and reliability. Automating data workflows reduces manual intervention,
    minimizes errors, and accelerates the delivery of insights.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: How can your organization streamline data processes to enhance efficiency and
    reduce errors? The answer lies in adopting automated workflows, implementing stringent
    data quality checks, and continuously monitoring data processes to identify and
    address inefficiency. Some key tools to help ensure workflow efficiency are Azure
    Data Factory, Luigi, and Google Cloud Composer, especially with data streaming.
    The key goals in orchestration are workflow automation, error handling, governance
    practices, data scalability, and overall observability for all data practices.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Enhancing operational efficiency
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data plays a crucial role in enhancing operational efficiency within Platform
    Engineering. By leveraging data analytics, organizations can comprehensively understand
    their operations, identifying bottlenecks and areas for improvement. This insight
    enables the optimization of workflows, reducing redundancy and improving productivity.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: For example, real-time monitoring and analytics can provide immediate feedback
    on system performance, allowing for rapid adjustments and minimizing downtime.
    Predictive maintenance, powered by data, can foresee potential equipment failures
    and schedule maintenance before issues arise, thus preventing costly disruptions.
    This proactive approach to maintenance extends the equipment’s lifespan and ensures
    continuous, reliable service.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Driving innovation through data integration
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Integrating data strategies within Platform Engineering is a powerful driver
    of innovation. Access to high-quality data allows organizations to experiment
    with new ideas, validate hypotheses, and iterate quickly. This environment fosters
    a culture of innovation where teams are encouraged to explore and develop cutting-edge
    solutions.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Data integration also facilitates collaboration across different departments,
    breaking down silos and enabling a more holistic approach to problem-solving.
    Platform Engineering ensures all stakeholders can access the information they
    need to innovate effectively by providing a unified view of data. This collaborative
    atmosphere accelerates the development of new products and services, driving competitive
    advantage and market leadership.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Cultivating a data-driven culture
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Integrating data with Platform Engineering provides the foundation for making
    well-informed, real-time decisions. This transformative approach enables leaders
    to base strategies on empirical evidence, leading to more accurate forecasting,
    improved risk management, and optimized resource allocation. Cultivating a culture
    that prizes data-driven decision-making is crucial for successful data strategy
    integration. This involves promoting data literacy, fostering collaboration between
    data and business teams, and supporting continuous learning and development. Leadership
    sets the tone for a data-centric culture, emphasizing data as a strategic asset
    and empowering everyone to contribute to its success.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: For instance, predictive analytics can identify trends and potential issues
    before they become critical, enabling proactive measures that save time and resources.
    By embedding data analytics into the core of Platform Engineering, organizations
    can continuously refine their operations, enhance customer experiences, and drive
    business growth. This approach ensures that every decision is backed by solid
    data, reducing uncertainty and improving overall business performance.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: How can your organization foster a culture that values data-driven decision-making?
    The answer lies in promoting data literacy, encouraging cross-functional collaboration,
    and supporting continuous learning and development. By emphasizing the importance
    of staying up-to-date with the latest data trends and technologies, you can keep
    your team engaged and committed to the success of your data strategies in Platform
    Engineering.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: As we delve deeper into implementing data strategies in Platform Engineering,
    we will explore how these strategies drive business value, the essential components
    of data architecture, and the role of DataOps. Real-world examples and case studies
    will illustrate the transformative impact of integrating data with Platform Engineering,
    providing practical insights and actionable guidance. This exploration will inspire
    and motivate you to leverage data for the success of your Platform Engineering
    initiatives. Once one decides on a strategic approach, one critical element becomes
    how data drives that strategy through metrics-driven approaches.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Implementing data in Platform Engineering
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: How can your organization better harness the power of data to enhance AI capabilities
    and drive business success? The knowledge gained from the previous chapter on
    AI serves as a foundation for understanding the pivotal role of data in Platform
    Engineering. As we move forward, understanding and leveraging the critical role
    of data will be essential for any organization aiming to thrive in the competitive,
    data-centric world.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Data is an asset and a foundational element of successful Platform Engineering.
    Its integration into platform strategies enhances decision-making, drives innovation,
    and ensures operational efficiency. By reflecting on these insights and embracing
    a data-driven approach, organizations can unlock new levels of innovation, efficiency,
    and competitive advantage. We will continue building on this foundation in the
    following sections, providing insights into integrating data strategies, architecture,
    and operations within Platform Engineering. This journey will equip you with the
    knowledge and tools to harness data’s full potential and transform it into a powerful
    driver of business success.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Implementing data strategies for optimal Platform Engineering
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the fast-paced digital landscape, integrating data strategies into Platform
    Engineering is not just a competitive edge but a strategic necessity. Data-driven
    platforms are fundamental for successfully deploying AI and ML models, relying
    on vast amounts of high-quality data. This section explores crucial data strategies
    for Platform Engineering, their impact on driving business value, and best practices
    for integration.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Critical data strategies in Platform Engineering
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Effective data strategies are central to maximizing the potential of Platform
    Engineering. These strategies encompass various aspects of data management, from
    collection and storage to analysis and utilization. Here are some critical data
    strategies that organizations should consider.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Mastering data integration and interoperability
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Seamless data integration and interoperability are crucial for organizations
    in data-siloed environments. Companies can create a unified view that supports
    real-time analytics and informed decision-making by combining data from different
    sources. Achieving seamless data flow enables a comprehensive understanding of
    business operations and customer behavior. Mastery in data integration and interoperability
    ensures that platforms remain Agile, scalable, and ready to leverage emerging
    data sources.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Excellence in data governance and quality management
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Creating reliable AI models and insightful analytics relies on solid data governance
    and quality management. Rigorous data governance frameworks are essential for
    ensuring data accuracy, consistency, and security. Organizations must invest in
    stringent data quality management processes, which include cleansing, validation,
    and enrichment. High-quality data fuels AI with reliable inputs, leading to effective
    analytics and strategic decision-making. Upholding data integrity through disciplined
    governance practices builds stakeholder trust and ensures compliance with regulatory
    mandates.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Goals for checking data should include early error detection, improving overall
    quality, reducing the cost of gathering and analyzing data, increasing efficiency
    through speed, and building scalable processes. Determining initial steps relies
    on a needs assessment often leading to tool selection. Open source tools are Great
    Expectations, dbt, and Talend, while some paid tools are Informatica Cloud Data
    Quality, RightData, and Deepchecks.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Fortifying data security and privacy
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In today’s environment of increasing data breaches and stringent regulations
    such as the GDPR, fortifying data security and privacy is essential. Implementing
    advanced security measures such as encryption, access controls, and regular audits
    is crucial for protecting data from unauthorized access and breaches. Ensuring
    data privacy involves anonymizing sensitive data and maintaining transparency
    about data usage. Prioritizing data security and privacy not only safeguards against
    legal and financial repercussions but also fosters customer trust. A reliable
    data security and privacy approach establishes a resilient foundation for data-driven
    initiatives.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Integrating advanced analytics and AI for innovation
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Harnessing advanced analytics and integrating AI within Platform Engineering
    provides deeper insights and fosters innovation. Deploying AI models for analyzing
    large datasets, identifying patterns, and making predictions transforms data into
    actionable intelligence. Advanced analytics tools empower organizations to conduct
    complex analyses, from predictive modeling to natural language processing.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: AI integration enables automated decision-making, enhancing operational efficiency
    and reducing human error. For instance, AI-powered recommendation systems tailor
    customer experiences, while predictive maintenance models optimize asset management.
    Embedding advanced analytics and AI into Platform Engineering helps organizations
    drive continuous innovation and maintain a competitive edge.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: Achieving outcomes through data strategies
  id: totrans-68
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Implementing effective data strategies within Platform Engineering can help
    organizations achieve success in their strategic outcomes in several ways:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '**Elevating decision-making**: Data-driven decision-making is transformative,
    enabling organizations to base strategies on empirical evidence rather than intuition.
    Leveraging real-time data analytics leads to more accurate forecasting, superior
    risk management, and optimized resource allocation. Predictive analytics can identify
    trends and potential issues before they become critical, enabling proactive measures
    that save time and resources.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When organizations embed data analytics into their core operations, they continuously
    refine processes, enhance customer experiences, and drive business growth. Data-backed
    decisions reduce uncertainty and improve overall business performance.
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Fueling innovation and competitive advantage**: Effective data strategies
    empower organizations to experiment, innovate, and iterate quickly. Access to
    high-quality data allows teams to test new ideas, validate hypotheses, and refine
    products and services. This culture of innovation is crucial for staying competitive
    in a rapidly changing market.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For instance, financial institutions leveraging data analytics to develop new
    financial products, optimize pricing strategies, and improve risk management exemplify
    how data-driven experimentation can drive continuous improvement and market leadership.
  id: totrans-73
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Enhancing operational efficiency**: Data strategies streamline operations
    by providing insights into process efficiencies and inefficiencies. Real-time
    data analytics can identify bottlenecks, predict equipment failures, and optimize
    resource allocation. This proactive approach to operations management reduces
    costs, minimizes downtime, and enhances productivity.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing predictive analytics and real-time monitoring systems provides
    the insights needed to optimize workflows and prevent disruptions, significantly
    improving operational efficiency.
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Transforming customer experience**: Data-driven platforms enable organizations
    to deliver personalized and seamless customer experiences. By analyzing customer
    data, businesses can tailor offerings to meet individual preferences and needs,
    improving customer satisfaction and loyalty. E-commerce platforms using data analytics
    to recommend products, optimize pricing, and personalize marketing messages exemplify
    this transformation.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrating AI-powered recommendation systems and advanced analytics can provide
    the personalization modern customers expect, enhancing overall customer experiences.
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Next, we will learn some best practices to achieve optimal outcomes.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: Best practices for integrating data strategies with Platform Engineering
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Integrating data strategies with Platform Engineering requires a comprehensive
    and systematic approach. Some strategies apply to Platform Engineering as well
    as the broader organization. For example, successful platforms require good data
    practices beyond the platform bounds to handle customer data, governance standards,
    and other elements. Here are five best practices to ensure successful integration
    across the platform:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '**Cultivating a data-driven culture**: Establishing a data-driven culture is
    essential for the successful implementation of data strategies. Promoting data
    literacy across the organization, encouraging collaboration between data and business
    teams, and supporting continuous learning and development are critical steps.
    Leadership must set the tone, ensuring data is viewed as a strategic asset.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encouraging cross-functional collaboration, providing data literacy training,
    and celebrating data-driven successes help embed this mindset throughout the organization.
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Investing in scalable and flexible infrastructure**: Building scalable and
    flexible data infrastructure is crucial for supporting data-intensive applications
    and future growth. Investing in cloud-based solutions, data lakes, and data warehouses
    that can handle large volumes of data and support real-time analytics is essential.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Modern, cloud-based infrastructure provides the scalability and flexibility
    needed to support advanced data strategies and AI integration, ensuring the organization
    can adapt to changing data needs.
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Implementing robust data governance frameworks**: Robust data governance
    frameworks ensure data accuracy, consistency, and security. Establishing clear
    policies and procedures for data management, including data quality standards,
    data stewardship roles, and compliance requirements, is essential for maintaining
    data integrity.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regularly reviewing and updating data governance policies ensures they meet
    current regulatory requirements and support high-quality data management, which
    is critical for successful Platform Engineering. Specific frameworks and foundations
    can be found in [*Chapter 2*](B24465_02.xhtml#_idTextAnchor037), and [*Chapter
    9*](B24465_09.xhtml#_idTextAnchor197).
  id: totrans-86
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Leveraging advanced analytics tools**: Advanced analytics tools are critical
    for deriving actionable insights from data. Investing in tools that support predictive
    analytics, ML, and real-time data processing enables organizations to perform
    complex analysis, identify patterns, and make data-driven decisions.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regularly evaluating and upgrading analytics capabilities ensures alignment
    with business needs and technological advancements, maximizing the potential of
    data-driven initiatives. For a broader evaluation, see [*Chapter 4*](B24465_04.xhtml#_idTextAnchor076).
  id: totrans-88
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Ensuring data security and privacy**: Maintaining robust data security and
    privacy is paramount in the digital age. Implementing advanced security measures,
    such as encryption, access controls, and regular audits, protects data from unauthorized
    access and breaches. Ensuring compliance with data privacy regulations builds
    trust with customers and can prevent legal repercussions.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regular assessments of security practices and staying updated with the latest
    security technologies and regulatory requirements protect data assets and support
    the integrity of data-driven strategies. For a broader discussion, see [*Chapter
    7*](B24465_07.xhtml#_idTextAnchor160).
  id: totrans-90
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The integration of effective data strategies within Platform Engineering is
    essential for harnessing AI’s full potential and driving business success. By
    focusing on crucial data strategies such as data integration, governance, security,
    and advanced analytics, organizations can transform data into a strategic asset
    that drives innovation, enhances decision-making, and improves operational efficiency.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: As we continue to explore the role of data in Platform Engineering, we will
    delve deeper into data architecture and DataOps, providing practical insights
    and real-world examples that illustrate the transformative impact of these strategies.
    Mastering data in Platform Engineering begins with recognizing its importance
    and implementing best practices that align with organizational goals and technological
    advancements. The next step converts those strategies into business value through
    data.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: The role of data in delivering business value
  id: totrans-93
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the current business landscape, data is not just a tool but a strategic asset
    that drives significant business outcomes. The strategic impact of data on business
    operations, decision-making, and innovation cannot be overstated. When effectively
    harnessed, data can transform organizations, enabling them to operate more efficiently,
    respond to market changes swiftly, and deliver exceptional value to customers.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: Strategic impact of data on business outcomes
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The strategic impact of data on business outcomes is multifaceted. Fundamentally,
    data offers insights for making informed decisions, optimizing operations, and
    driving innovation. Utilizing data for decision-making allows businesses to spot
    opportunities and threats in real time, leading to a proactive approach to strategy
    and operations. Analyzing large volumes of data to extract actionable insights
    can significantly boost competitive advantage.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: In a competitive market, businesses that use data to gain insights into customer
    behavior, market trends, and operational efficiency are better positioned to outperform
    their competitors. Data-driven organizations are Agile, responsive, and capable
    of making decisions based on empirical evidence rather than intuition. Data also
    plays a crucial role in risk management. By analyzing historical data, businesses
    can identify patterns and predict potential risks, enabling them to implement
    preventive measures. This proactive approach to risk management mitigates potential
    threats and ensures business continuity and resilience.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Aligning data initiatives with business goals
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Organizations must align their data initiatives with their overall business
    objectives to utilize data fully. This alignment ensures that data efforts are
    focused on delivering tangible business results rather than operating independently
    from strategic goals. The first step in this process is clearly defining the business
    goals and identifying the **key performance indicators** (**KPIs**) to measure
    success.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: Organizations should then create a data strategy that supports these goals.
    This involves identifying the necessary data sources, establishing data governance
    frameworks, and implementing appropriate tools and technologies. Data initiatives
    should be prioritized based on their potential impact on business outcomes, ensuring
    that resources are allocated to the most critical projects. Additionally, it’s
    vital to foster a data-driven culture within the organization. This includes promoting
    data literacy, encouraging collaboration between data and business teams, and
    embedding data-driven decision-making in the organizational culture. Leadership
    plays a crucial role in championing data initiatives and setting the tone for
    a data-centric culture.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Using AI and data to deliver business value
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI and data are tightly linked, with data fueling AI models. Integrating AI
    and data can unlock substantial business value by automating processes, improving
    decision-making, and delivering personalized customer experiences. AI requires
    high-quality data to learn and make predictions. By leveraging AI, businesses
    can analyze complex datasets, identify patterns, and derive insights to optimize
    operations, reduce costs, and improve efficiency.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: For instance, AI-powered predictive analytics can forecast customer demand,
    helping optimize inventory levels and reduce waste. AI-driven recommendation systems
    can personalize marketing efforts, increasing customer engagement and sales. Delivering
    tailored experiences based on customer data enhances satisfaction and loyalty.
    Learning the best AI practices involves reviewing case studies for feedback, finding
    those elements that succeeded, and viewing those that failed as paths to improvement.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Case studies and examples of successful data-driven businesses
  id: totrans-104
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Several leading companies have successfully harnessed the power of data and
    AI to drive business value. Let’s explore four notable examples.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Netflix – Revolutionizing entertainment with data-driven insights
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Netflix is a prime example of a company that has leveraged data to revolutionize
    the entertainment industry. By analyzing user data, Netflix provides highly personalized
    content recommendations, enhancing the user experience and increasing viewer engagement.
    The company uses data to inform content creation, ensuring that new shows and
    movies resonate with its audience. Data from various areas drives the platform
    strategy from development and marketing areas.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Netflix’s data-driven approach extends to its marketing strategies. By analyzing
    viewing patterns and user preferences, Netflix can effectively tailor its marketing
    efforts to target specific segments. This data-centric strategy has contributed
    to Netflix’s dominance in the streaming industry, demonstrating the profound impact
    of data on business success. Additionally, Netflix utilizes A/B testing to determine
    the most effective user interfaces, promotional strategies, and content delivery
    methods. This meticulous analysis ensures that every aspect of the platform is
    optimized for user engagement and satisfaction.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, Netflix leverages predictive analytics to anticipate viewing trends
    and manage content licensing agreements efficiently. This proactive approach allows
    Netflix to secure rights for potential hit shows and movies before competitors,
    ensuring a robust and appealing content library. Integrating advanced analytics
    and machine learning models enables Netflix to maintain a competitive edge in
    an increasingly crowded market.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Amazon – Redefining retail with data-driven strategies
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Amazon’s success in the retail sector is largely attributed to its data-driven
    approach. Again, similar to Netflix, having a successful data strategy becomes
    key to overall platform success. The company collects and analyzes vast amounts
    of data on customer behavior, purchasing patterns, and market trends. This data
    is used to optimize inventory management, personalize product recommendations,
    and enhance the overall shopping experience. Amazon’s recommendation engine, powered
    by AI, analyzes customer data to suggest products that are likely to interest
    each shopper. This personalized approach not only boosts sales but also improves
    customer satisfaction. Additionally, data analytics helps Amazon streamline its
    supply chain, reducing costs and ensuring timely delivery of products.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, Amazon employs predictive analytics to forecast demand and manage
    inventory levels more effectively. By anticipating customer needs, Amazon can
    reduce stockouts and overstock situations, optimize the supply chain, and minimize
    operational costs. This strategic use of data ensures that Amazon remains a leader
    in customer satisfaction and operational efficiency.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '**Amazon Web Services** (**AWS**), another arm of the company, exemplifies
    how data-driven strategies can diversify business models and drive innovation.
    AWS provides cloud computing solutions that leverage data analytics, enabling
    businesses worldwide to harness the power of big data and AI. This contributes
    to Amazon’s revenue and positions the company as a critical player in the global
    tech industry.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Databricks – Unifying data and AI for business innovation
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Databricks is at the forefront of unifying data and AI to drive business innovation.
    The company’s platform integrates data engineering, data science, and ML, enabling
    organizations to build and deploy AI models at scale. In this case, the delivered
    platform has become the product with the emphasis on allowing users to ingest
    and modify data. Databricks’ unified approach simplifies data management, accelerates
    analytics, and enhances team collaboration.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: By leveraging Databricks, organizations can unlock the full potential of their
    data, driving innovation and achieving significant business outcomes. The platform’s
    ability to handle large-scale data processing and advanced analytics makes it
    a valuable asset for companies looking to harness the power of AI and data. Databricks
    also supports collaborative projects by providing a unified workspace where data
    engineers, scientists, and analysts can work together seamlessly. This collaborative
    environment fosters innovation and accelerates the development of AI-driven solutions.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Databricks has empowered numerous organizations to transform their operations
    through data and AI. For instance, global enterprises use Databricks to optimize
    supply chains, enhance customer insights, and streamline product development.
    By providing a robust and scalable platform, Databricks enables these companies
    to execute their data strategies effectively, resulting in measurable business
    value.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: Uber – Data-driven transformation in transportation
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Uber’s use of data and AI has transformed the transportation industry. The company’s
    platform collects vast amounts of data on ride patterns, driver behavior, and
    customer preferences. This data is used to optimize routes, predict demand, and
    set dynamic pricing. These effective data elements underpin a successful platform.
    Uber’s AI-powered algorithms analyze real-time data to match riders with drivers
    efficiently, reducing wait times and improving service quality. Additionally,
    data analytics helps Uber identify areas for expansion, optimize driver incentives,
    and enhance overall operational efficiency. Uber’s data-driven approach has enabled
    it to scale rapidly and maintain a competitive edge in the market.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Uber’s commitment to leveraging data extends to its efforts in safety and compliance.
    By analyzing driver and rider behavior, Uber can identify potential safety risks
    and implement measures to mitigate them. This proactive approach enhances user
    trust and ensures regulatory compliance, which is crucial for sustainable growth.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, Uber’s advanced analytics capabilities enable the company to innovate
    continuously. For example, data insights drove the development of UberPOOL, a
    ride-sharing service that matches riders traveling in the same direction. By optimizing
    vehicle utilization and reducing riders’ costs, UberPOOL demonstrates how data-driven
    strategies can lead to new business models and revenue streams.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Strategic insights from these case studies
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Netflix, Amazon, Databricks, and Uber’s success stories demonstrate the critical
    importance of data and AI in driving business value. A data-centric approach can
    provide significant competitive advantages, improve customer experiences, and
    enhance operational efficiency. Examples such as Netflix’s personalized recommendations
    and Amazon’s optimized supply chain showcase the transformative power of data-driven
    strategies. Organizations investing in data and AI are better equipped to navigate
    complexities, adapt to market changes, and deliver exceptional customer value.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Data as a strategic asset
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data is a strategic asset that drives business value when aligned with business
    goals, utilizing AI and fostering a data-driven culture. This strategic impact
    empowers companies to make informed decisions, innovate, and stay competitive.
    Exploring data architecture and DataOps within Platform Engineering provides practical
    insights and real-world examples of the transformative impact of effective data
    management and advanced analytics. Mastering data in Platform Engineering requires
    continuous learning, adaptation, and a commitment to excellence. In the following
    section, we will examine how a robust and carefully planned data architecture
    can improve Platform Engineering to expedite the delivery of business value.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Data architecture in Platform Engineering
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Architecture should always design the form for distributing data within a platform.
    One should return to early evaluations of Conway’s Law, ensuring the designed
    structure remains supportable by the broader organization. Data must flow through
    architecture in a manner the company can use and understand. The first step is
    designing a reliable, scalable architecture. This allows identifying key components
    and best practices for your platform data management. Once data is streaming,
    steps should ensure quality data, governance practices, and security. Finally,
    this section concludes with some examples of tools, especially in generative AI,
    that can assist in data solutions. For specific architectural patterns, reference
    [*Chapter 2*](B24465_02.xhtml#_idTextAnchor037).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Similar to any other aspect of the platform, data management requires a sound
    architecture to demonstrate a path. Data architectures consider data at rest and
    data in motion as well as transitions between those states. The more advanced
    architectures consider data not just as a single element but as a myriad of potential
    feeds and reports. Integrating all those elements in the modern IoT world requires
    careful planning.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: Data architecture design
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Designing a reliable and scalable architecture focuses on those two key components.
    Reliability is what ensures the platform soundness between data users, data providers,
    and platform teams. Those reliable discussions should focus on agreements between
    the different stakeholders, which are usually confirmed through the establishment
    of clear SLAs demonstrating a level of reliability. These measures can include
    technical specifications such as update rates, downtime, throughput, packet sizes,
    and encryption standards. Each agreement contributes to making the platform data
    more accessible at a higher rate than other alternatives. Contributing to reliability
    can address transmitted data accuracy, how closely data matches original sources,
    and at what point data changes or the extension of those data points occurs.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: 'When examining reliable big data platforms with the 5 Vs (*velocity, volume,
    value, variety, and veracity*), you have to ensure not only transmission but that
    accurate data reaches the user. The following list highlights some characteristics
    of each of those big data components:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: '**Velocity**: How quickly data is created within a system and how fast that
    created data moves to the next element. For example, traffic cameras record all
    events at a set location but may not instantly pass that data to a reporting element.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Volume**: The amount of data generated from multiple sources, including social
    media, commercial transactions, and user interfaces. Large data volumes allow
    high-level analysis to reveal patterns that may not be apparent in small data
    sets.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Value**: How much impact each element of data has on a company’s business.
    Most big data value comes from the ability to achieve pattern recognition to generate
    insights to improve performance, operations, and other quantifiable benefits.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Variety**: How many different types of data are collected within a system.
    Modern systems collect text-based inputs, streaming video, and other factors.
    Data can be structured, semi-structured, or unstructured. Data management tools
    must be able to handle multiple types of data within common dashboards and visualizations.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Veracity**: Quality and accuracy of collected data. Data often contains errors,
    inconsistency, and other uncertainty from multiple sources. As an example, errors
    can occur in addresses, names, or other information tied to an individual. You
    might see an address with transposed street numbers, misspelled avenue names,
    or other bad inputs.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data that meets these 5 Vs can be challenging to handle from a reliability standpoint.
    The impacts on collected data within the platform can impact velocity, volume,
    and veracity frequently. If a platform supports multiple users on the same application
    with teams deploying multiple times per day, the velocity is impacted. When you
    add the operational management of those systems, the user volume across development
    and operational aspects can drive challenging alignment. Finally, the data veracity
    might be challenged by having multiple versions running, different test measurements,
    and then the operational data. One way to manage big data consists of implementing
    scalable solutions.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: Scalability forms the other data architecture component for platforms. Once
    you achieve initial reliability, measures should be introduced for scalability.
    Scalability enhances reliability by offering additional options. When the platform
    scales, options are introduced to manage data through other formats. One common
    example involves structuring data flows to have earlier stopping points before
    the data hits the full system. Testing scenarios on the platform can use captured
    data representative of the true data without streaming access. One example is
    a healthcare system that manages user requests, safeguards case management data,
    and provides clinical services, all subject to **personal identifiable information**
    (**PII**) and healthcare-restricted data. A scalable test solution could segment
    the data and prevent critical data from reaching other data stores.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: Modeling data management
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Modeling a reliable and scalable architecture might involve using a modeling
    language such as the **Unified Modeling Language** (**UML**). UML serves as a
    general-purpose modeling tool published by the Object Management Group in 2005
    and later published as an **International Organization for Standardization** (**ISO**)
    standard. These standards break every item into an object with attachments, associated
    by class and arranged into components. These groupings then represent functions
    within the architecture diagram. Items within UML are related by *association*,
    *inheritance*, and *aggregation*. As a simple example, all medical records for
    a particular clinic might be associated and inherited by the broader insurance,
    while all instances for a particular individual or medical case might be aggregated.
    The following image depicts an architecture for data entry within UML.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B24465_06_1.jpg)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.1: UML example of a data conversion architecture'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: The diagram displays how entry and search can be aligned into a common schema.
    Most tools provide an option to convert designed architecture into additional
    formats. The challenge can be ensuring the right key pairs are presented in the
    correct manner. As an example, Keycloak allows bringing user groups from one database
    to another, updating users from previous SSO solutions to a new one. However,
    during the conversion, Keycloak frequently adds a backslash to the user group’s
    name. This prevents them from reaching the same areas although transferred users
    may still use Keycloak. This type of conversion error reinforces the name for
    a clear schema and conversion in data management.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: 'Another modeling option involves **The Open Group Architecture Framework**
    (**TOGAF**). TOGAF was first introduced in 1995 as part of a US Department of
    Defense project. The language was intended to address four goals:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Improving return on investment
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using more cost-effective resources
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Avoiding vendor lock-in
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Establishing a common language
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Like UML, the language is relatively simple to use but additional certifications
    are possible. TOGAF uses three pillars of continuum tracking, an architectural
    development model, and enterprise architecture domains. The following figure demonstrates
    how TOGAF might show interactions within a data format:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B24465_06_2.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6.2: TOGAF architecture model'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: You can see how the system of interest, the platform, shows the architecture
    while linking with stakeholders at multiple points. These connections demonstrate
    which areas exhibit control over which factors in moving the design forward. The
    most important thing in Platform Engineering is the capacity to use the domains
    of business, data, applications, and technical architecture to diagram needs.
    TOGAF excels at modeling flow between the domains, making it a natural fit for
    some data concerns.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: 'One other key to TOGAF is that every element within the architecture has four
    aspects:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: '**Active**: Every time the data is received, an action must occur.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Passive**: Data is collected and held until an outside call to action is
    received.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Behavior**: The data, when collected, moves to a certain store point or repository.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Motivation**: Data objects are assigned a motivation for when they must shift
    from active to passive or exhibit a motivation.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The weakness of using TOGAF is that it requires much more depth than UML to
    develop a comprehensive architecture. This can work well if you have a lot of
    time, but it can be challenging with rapid projects. One suggestion is to begin
    with UML modeling structures and expand into the more complete TOGAF model as
    more data is collected.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: Data architecture best practices
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When considering some best practices, you should return to Conway, ensuring
    modeling mirrors business practices, and the proposed structure does not run counter
    to existing pathways. If the pathways diverge too much, even excellent data may
    be unavailable to individuals within the platform. Data architecture should strive
    to identify key areas for documentation and quality, performance monitoring, testing,
    and scalability.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: Best practices start with how one documents the data architecture. The previous
    sections mentioned using formats such as UML or TOGAF, but this extends into clear
    terminology with visual representations. For example, if there is a date or time
    format, all entries should be in a common standard. If one set of data uses the
    MM/DD/YYYY (02/10/2012) structure and another uses the DD, Mon, Year (10 Feb 2012)
    structure, there may be difficulty in aligning records. Each format selected within
    the schema should be built on a clear rationale for why a particular scheme has
    been collected. This can range from a declared status, such as a date, to ingestion
    from other components that have set sales standards and inventory numbers.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: The next area builds from initial documentation to creating quality data. Just
    as the standards for the initial data are set, those quality standards should
    live in the same documentation. The quick list to ensure quality data is that
    all data is complete, unique, timely, valid, accurate, and consistent. Quality
    in the platform might be verified users, links to testing structure, or comparison
    against the existing database to prevent duplication. When using the platform,
    you can allow guest users but not want those users to submit merge tickets during
    applications. At the same time, guest users might be allowed to develop without
    limits, but not move data into a testing environment. Qualifying data originators
    and verification during quality validation can help prevent erroneous data from
    reaching production.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: Data versioning occurs in multiple areas. Data can be restricted to specific
    collection sets, evaluated as a time series in multiple sets, or distinguished
    by sensors. Multiple paths are usually assessed to determine the best data versioning
    for a specific implementation. Most platform data implementations prefer using
    a streaming approach with a constant data flow, so new data, once quality-checked,
    will become part of the overall stream. Using separate data versions is most appropriate
    during the initial stages of determining an initial dataset, test set, and then
    the production data for ML. Different sets can be used to periodically check the
    ML model for errors in quality, regression, or bias.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: Our third best practice area involves performance monitoring. Effective monitoring
    follows best practices for observability in establishing clear objectives, automating
    data collection, creating scalability, and using alerting to notify exceptions.
    Clear objectives require clear metrics, such as the amount of data in throughput,
    required fields, and verified users. Required fields might be only the key ID
    field, or extend to other items such as prices, inventory numbers, and stocking
    rates. The required fields should always be inputted and allow for the extension
    of submitted data but not the alteration of existing elements. These first fields
    allow scalability because data can be either the lowest compute drain or one of
    the highest depending on the required validity. For example, if the primary data
    source archives video clips and every clip must be run to verify if an AI submission
    occurs, those checks can be difficult. Verifying data against an existing inventory
    for duplicate entries is much easier.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: 'Moving on from monitoring should address how you test data during the initial
    ingestion and when data is stored in the platform. Not all data remains consistent
    all the time, and the system should test to ensure data meets new specifications.
    An easy check for data testing within platforms is to call only the latest data.
    The following example shows some initial code that may address calling only data
    within a specific timeframe from a SQL database:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This code looks at all data in the platform and creates groups for each subject
    where the data is published within 5 minutes. Different groups are created by
    subject, so A entries are grouped in one set, and B entries in another. These
    differentiators can be easily integrated and extended into a variety of coding
    tools and APIs.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: 'More testing formats are covered extensively in [*Chapter 9*](B24465_09.xhtml#_idTextAnchor197).
    There are some unique areas for testing that are specific to data. Data testing
    typically involves three separate types within a production instance. These tests
    are designed to measure whether the desired data inputs through an application
    correctly and are described as follows:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '**Standard test**: An expected input gives an expected output. If you enter
    a username and password, you expect to either enter the application or be informed
    the username does not exist.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Boundary test**: These tests form edge cases for multiple events. An example
    from the previous paragraphs is entering data in a non-standard format and the
    application rejecting the data.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Erroneous test**: The opposite of the standard test, these tests require
    the application to notify when bad data has been entered. One example is putting
    in inventory numbers in a non-standard format, or an inventory number that does
    not exist.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data testing should look for some very specific database items. A shortlist
    includes data schema, table structure, columns, key IDs, stored macros within
    the elements, server validation, and data duplication. One frequent need for evaluating
    macros is a format called SQL injection, where code can be entered within the
    database, and when the form runs, the code is executed. These malicious code items
    can delete other data elements, ruin formats, and make it a very difficult day
    for developers. A suggestion when using data in tests is to employ software to
    generate fake tables from a known schema. This ensures testing processes are validated
    but do not break actual data. Many AI/ML processes are fairly efficient at generating
    large, alternative databases for testing. Similar to the versioning approach,
    metadata catalogs can be used to compare various sets. The metadata ensures the
    data catalogs measure similar features and provide comparison elements. Effective
    catalogs also allow scalability and comparison between elements.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: 'The final best practice for data architecture is to ensure scalability. This
    seems an easy approach: ensuring enough compute and storage exist to manage the
    database. Other issues might address the number of users, consecutive use, and
    the SOLID principles addressed in [*Chapter 2*](B24465_02.xhtml#_idTextAnchor037).
    One example of scalability might be limiting an order number, or inventory number
    to a set number of characters. When the business expands past that initial limit
    or additional features are required, adjusting those factors to scale might require
    a full database revision. For example, if an inventory number is set for nine
    numbers, with a dash between characters four and five, the later addition of a
    three-digit code to the end might be difficult. You can always add additional
    columns, but that again causes a full database revision. These best practices
    in architecture are linked to being able to conduct effective DataOps within your
    platform.'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: DataOps – Streamlining data management and operations
  id: totrans-174
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: DataOps integrates DevOps best practices with flow, feedback, and improvements
    to data engineering practices. As DevOps primarily focuses on delivering products,
    DataOps can often be a subset of overall business strategies, required in production
    but falling behind during development and test phases. Incorporating data management
    to test functions early ensures the best data becomes available to support analytics,
    ML, and continuous improvement models. Much like other areas, building effective
    DataOps concentrates on key areas such as collaboration, automation, and observability.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: The importance of DataOps
  id: totrans-176
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When starting a DataOps journey, many of the best practices are common with
    the best practices in areas such as MLOps, DevOps, AIOps, FinOps, or any other
    construction of the operational mindset. Every operational journey should start
    with defined objectives, cross-functional teams, a commitment to automation, and
    observability. These factors are supplemented with data-focused language such
    as automating data pipelines, controlling data versions, emphasizing quality,
    and maintaining data security, especially with more sensitive data volumes.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: You can define objectives for DataOps similar to any other operational factor.
    In [*Chapter 9*](B24465_09.xhtml#_idTextAnchor197), we take a detailed look at
    constructing metrics and service-level agreements to support various operations.
    For data, the best look measures those items against testing for standard, boundary,
    and erroneous use cases. You should ensure that users can reach the data, that
    the data meets quality standards, and that applications continue to function.
    Cross-functional teams then use the data to ensure success. In this case, cross-functional
    means including developers, database engineers, and analysts within the same spectrum.
    In the interest of maintaining small teams, these database specialists are often
    considered a support team, available for questions and support applications but
    not development team members. As platforms expand, the associated databases often
    expand.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: One element to consider when launching a platform is whether you intend to manage
    the data or allow users to manage data as needed for applications. Some constructions
    manage every development aspect, while others use third-party software. There
    are some standard database tools that add options for better operations and management
    such as Oracle Database, MongoDB, Amazon RDS or Dynamo DB, SAP SE, or Snowflake.
    Each has different strengths and weaknesses depending on your database needs.
    One frequent requirement is automation in operations.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: Database pipelines
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Database pipelines should be constructed in a DevOps manner to ingest new data.
    Depending on your platform use case, you might need to handle streaming data,
    automated entries from a retail web service, or some other format. Just as application
    pipelines have stages, so too do automated data pipelines, and they are as follows:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '**Data ingestion**: Initial gathering from databases, microservice, APIs, and
    applications.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data processing**: Cleaning, verifying, converting, and enriching data while
    ensuring it meets quality standards.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data storage**: The process of storing data within a database, data warehouse,
    data lake, or other schema to make it readily accessible at the needed time.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data analysis**: Evaluating data to determine trends across large ingestion
    elements, especially when considering big data input.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data visualization**: Converting ingested data into easily visualized formats
    to allow users to observe activity, activate alert notifications, and address
    emerging needs.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data pipelines handle data in either batch or real-time processes. In batch
    processes, data is stored until a certain point, either time or size, and then
    processed. In real-time processes, all data is immediately ingested into the database.
    In either case, two formats are typically used, **extract-transform-load** (**ETL**)
    or **extract-load-transform** (**ELT**). The difference between the two is whether
    the transformation occurs in the primary database, or before it gets there. If
    there are multiple developers on a platform, it may be easier to use ETL format.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: You can use pipeline elements to continuously monitor data drift and distribution
    changes. These changes can impact downstream ML models or analytics dashboards.
    For example, if you are monitoring power usage in an urban environment, unusual
    weather patterns can influence data. If you are using a time regression model
    comparing baselines from one seasonal average to the next, the influence of an
    event can alternate baselines. This may result in changes for preventative maintenance,
    or scalability within the platform. When dealing with a cold front, the analytics
    dashboard might show a significant increase in power usage but not one that would
    be repeated in previous seasons or years. Once you ingest data, it is time to
    consider security and observability for that data.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: Data security and observability
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data security and observability mirror solutions that have been presented in
    later chapters to maximize platform performance. Security is a must for data but
    should be considered within the overall platform format. Implementing encryption
    and SSO techniques ensures that data remains protected within the platform security
    architecture. The biggest challenge emerges when you input data from external
    sources. The previous section briefly mentioned this with the ETL approach, ensuring
    that data meets quality standards before bringing those elements into your system.
    Addressing quality early stops the easiest failures, such as preventing SQL injection,
    and then allows delivering quality solutions.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: The next step for security should be considering what happens if corrupted data
    does enter the system. You should always maintain an ability to recover previous
    data models from hot, warm, or cold storage. This can be challenging for businesses
    that depend on real-time communication. For example, in the e-retail industry,
    losing 30 minutes of customer data after launching a sale can be devastating.
    In addition to losing sales, customers can be unhappy at having to resubmit data,
    and inventory stocks might prevent order fulfillment.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: Observability for DataOps occurs in two ways. Just like security is designed
    to signal and guard, observability for data should be the same. The signal standard
    notifies when new data is ingested, or data does not meet quality standards. The
    guard element prevents and notifies when bad data attempts to enter the platform.
    Most database management tools provide a path to observe data. These tools can
    be combined with the observability standards introduced in [*Chapter 9*](B24465_09.xhtml#_idTextAnchor197).
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 数据运营的可观察性以两种方式发生。就像安全是为了发出信号和防护一样，数据可观察性也应该如此。信号标准在新的数据被摄取或数据不符合质量标准时发出通知。防护元素防止不良数据进入平台，并在尝试进入时发出通知。大多数数据库管理工具都提供了一种观察数据的方法。这些工具可以与在第9章中引入的可观察性标准相结合。
- en: Summary
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter launched from the previous usage of generative AI tools to expand
    into using that data once it hits the platform. This begins by recognizing the
    importance of data within the platform. While the platform’s basics solve many
    issues, these issues are frequently impotent until data has been added. Adding
    data means constructing an effective strategy to consume and manage data within
    various formats. Effective strategies demonstrated how to maximize value for the
    business, and we presented several case studies where businesses converted sound
    practices into actual dollars.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 本章从之前对生成式AI工具的使用扩展到数据一旦进入平台后如何使用这些数据。这首先认识到数据在平台中的重要性。虽然平台的基本功能解决了许多问题，但这些问题的解决通常是无力的，直到数据被添加。添加数据意味着构建一个有效的策略来以各种格式摄取和管理数据。有效的策略展示了如何为业务最大化价值，并且我们展示了几个案例研究，其中企业将良好的实践转化为实际美元。
- en: Once a strategy is in place, you must develop an architecture supporting those
    practices. The chapter demonstrated building an architecture, introduced several
    modeling languages, and suggested management techniques. Implementing sound data
    practices at the platform’s early stages support DataOps management, working with
    data at rest and data in motion throughout the platform. The next chapter takes
    these initial platform stages and begins applying security, compliance, and risk
    management techniques to make your platform secure and reliable.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦制定出策略，就必须开发一个支持这些实践的建筑。本章展示了构建架构的过程，介绍了几种建模语言，并提出了管理技术。在平台的早期阶段实施良好的数据实践支持数据运营管理，在整个平台中与静态数据和动态数据一起工作。下一章将应用这些初始平台阶段，并开始应用安全、合规性和风险管理技术，以确保您的平台安全可靠。
- en: Call to action
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 行动呼吁
- en: Understand the data needed for platform success and implement a strategy.
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解平台成功所需的数据，并实施策略。
- en: Design an architecture supporting your organization and platform.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计支持您组织和平台架构。
- en: Apply sound operational techniques to ingest and manage data during daily operations.
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在日常运营中应用有效的操作技术来摄取和管理数据。
