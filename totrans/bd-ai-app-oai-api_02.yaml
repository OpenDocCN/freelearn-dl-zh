- en: <st c="12175">Creating a</st> `<st c="12187">templates</st>` <st c="12196">folder
    is important because it allows you to organize your HTML files separately from
    your Python code, which makes it easier to manage and modify your web application.</st>
    <st c="12366">Additionally, the Flask framework is specifically designed to look
    for the templates folder to render HTML templates, so creating this folder is
    necessary for the proper functioning of your</st> <st c="12556">Flask application.</st>
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 创建一个`<div>templates</div>`文件夹很重要，因为它允许您将HTML文件与Python代码分开组织，这使得管理和管理您的Web应用更容易。</div>此外，Flask框架专门设计为查找模板文件夹以渲染HTML模板，因此创建此文件夹对于您的`<div>Flask应用</div>`的正常运行是必要的。
- en: <st c="12574">We can</st> <st c="12581">now create the frontend of our chat
    application using</st> <st c="12636">HTML and Bootstrap.</st> <st c="12656">Initially,
    our frontend code will contain a basic layout with a chat window, an input field,
    and a submit button.</st> <st c="12770">You can include the following code in
    your</st> `<st c="12813">index.html</st>` <st c="12823">file:</st>
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们现在可以使用HTML和Bootstrap创建我们的聊天应用的前端。</div>最初，我们的前端代码将包含一个基本的布局，包括聊天窗口、输入字段和提交按钮。</div>您可以将以下代码包含在您的`<div>index.html</div>`文件中：
