  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`<st c="10828">在下一节中，您将学习如何将后端端点连接到聊天应用程序的前端。</st>` `<st c="10943">我们还将使用</st>`
    **`<st c="10960">jQuery</st>`** `<st c="10966">来处理前端和后端之间的通信，允许在聊天应用程序中进行实时消息传递。</st>`'
