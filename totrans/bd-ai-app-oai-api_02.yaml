- en: <st c="18439">The</st> `<st c="18444">body</st>` <st c="18448">rule sets the
    background color of the page to a dark greenish-gray color and the text color
    to a light gray color.</st> <st c="18564">The</st> `<st c="18568">.container</st>`
    <st c="18578">rule applies a 20-pixel margin on top of the container element,
    which will push the chat interface down a bit from the top of the page.</st> <st
    c="18715">The</st> `<st c="18719">#chat</st>` <st c="18724">rule sets the height
    of the chat message display area to 400 pixels and applies a vertical scrollbar
    to the area when the content exceeds the</st> <st c="18867">height limit.</st>
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="18439">The</st> `<st c="18444">body</st>` <st c="18448">规则将页面的背景颜色设置为深绿色灰色，并将文本颜色设置为浅灰色。</st>
    <st c="18564">The</st> `<st c="18568">.container</st>` <st c="18578">规则在容器元素顶部应用20像素的边距，这将使聊天界面从页面顶部向下移动一点。</st>
    <st c="18715">The</st> `<st c="18719">#chat</st>` <st c="18724">规则将聊天消息显示区域的高度设置为400像素，并在内容超过</st>
    <st c="18867">高度限制时应用垂直滚动条。</st>
- en: <st c="18880">The</st> `<st c="18885">.list-group-item</st>` <st c="18901">block
    sets the border radius and background color of the list items displayed in the
    chat panel.</st> <st c="18999">The</st> `<st c="19003">.submit</st>` <st c="19010">block
    sets the background color, text color, and border radius of the</st> `<st c="19100">.input-group</st>`
    <st c="19112">input block styles the input field within the input group, setting
    the background color and text color and removing the border.</st> <st c="19241">You
    can verify that all CSS changes are implemented correctly by stopping and re-running</st>
    <st c="19330">your project.</st>
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="18880">The</st> `<st c="18885">.list-group-item</st>` <st c="18901">块设置了在聊天面板中显示的列表项的边框半径和背景颜色。</st>
    <st c="18999">The</st> `<st c="19003">.submit</st>` <st c="19010">块设置了`.input-group`
    <st c="19100">输入块</st>的背景颜色、文本颜色和边框半径，输入块样式化输入组内的输入字段，设置背景颜色和文本颜色并移除边框。</st> <st
    c="19241">您可以通过停止并重新运行</st> <st c="19330">您的项目</st>来验证所有CSS更改是否正确实施。
- en: <st c="19343">Those styles</st> <st c="19357">contribute to a cohesive and visually
    appealing design.</st> <st c="19413">You can now rerun the application to see
    the finalized style of the ChatGPT</st> <st c="19489">clone application.</st>
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="19343">这些样式</st> <st c="19357">有助于实现一个统一且视觉上吸引人的设计。</st> <st c="19413">现在您可以重新运行应用程序，以查看ChatGPT克隆应用程序的最终样式。</st>
    <st c="19489">clone application。</st>
- en: <st c="19507">In this section, we improved the design of the ChatGPT clone using
    CSS code, including an external style sheet from Bootstrap and custom CSS modifications.</st>
    <st c="19664">In the next section, you will learn how to intercept ChatGPT API
    endpoints using Flask.</st> <st c="19752">This will allow you to create custom
    routes to send and receive HTTP requests between the frontend of the ChatGPT clone
    application and the</st> <st c="19892">backend server.</st>
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="19507">在本节中，我们使用CSS代码改进了ChatGPT克隆的设计，包括从Bootstrap中引入的外部样式表和自定义CSS修改。</st>
    <st c="19664">在下一节中，您将学习如何使用Flask拦截ChatGPT API端点。</st> <st c="19752">这将允许您创建自定义路由，在ChatGPT克隆应用程序的前端和后端服务器之间发送和接收HTTP请求。</st>
- en: <st c="19907">Intercepting ChatGPT API endpoints</st>
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="19907">拦截ChatGPT API端点</st>
- en: <st c="19942">Our ChatGPT clone needs to use JavaScript to handle user interactions
    with the chat application</st> <st c="20039">in real time.</st> <st c="20053">To
    do that, we can use a jQuery script that listens for a click on the</st> `<st
    c="20189">GET</st>` <st c="20192">request to the server with the user input as
    a query parameter, and then receives a response from ChatGPT.</st> <st c="20300">The
    use of JavaScript in this way will enable the chat application to update and display
    new chat messages without the need for a page refresh, making for a more seamless
    and</st> <st c="20475">user-friendly experience.</st>
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="19942">我们的ChatGPT克隆需要使用JavaScript来实时处理与聊天应用程序的用户交互</st> <st c="20039">。</st>
    <st c="20053">为此，我们可以使用一个jQuery脚本，该脚本监听对服务器的</st> `<st c="20189">GET</st>` <st
    c="20192">请求，其中用户输入作为查询参数，然后从ChatGPT接收响应。</st> <st c="20300">以这种方式使用JavaScript将使聊天应用程序能够在不刷新页面的情况下更新和显示新的聊天消息，从而提供更流畅和</st>
    <st c="20475">用户友好的体验。</st>
- en: <st c="20500">We can write the JavaScript code just under the</st> `<st c="20549">input-group</st>`
    <st c="20560">class, as</st> <st c="20571">shown here:</st>
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="20500">我们可以在</st> `<st c="20549">input-group</st>` <st c="20560">类下面编写JavaScript代码，如下所示：</st>
- en: '[PRE13]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: <st c="21194">JavaScript will make our application more dynamic and responsive.</st>
    <st c="21261">Here is how the preceding code snipped</st> <st c="21300">is implemented:</st>
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="21194">JavaScript将使我们的应用程序更加动态和响应。</st> <st c="21261">以下是如何实现前面的代码片段：</st>
- en: <st c="21315">Firstly, we included</st> <st c="21337">the jQuery library from
    the</st> <st c="21365">Google</st> `<st c="21485">$("#submit")</st>` <st c="21497">selector
    is used to select the HTML element with the ID of</st> `<st c="21557">submit</st>`<st
    c="21563">, which is the</st> `<st c="21621">.click()</st>` <st c="21629">method
    is then used to attach a click event listener to this element.</st> <st c="21700">Every
    time the user clicks the</st> **<st c="21731">Submit</st>** <st c="21737">button,
    the rest of the code in the JavaScript function will</st> <st c="21799">take action.</st>
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，我们包含了来自谷歌的jQuery库<st c="21315">，使用</st> <st c="21337">Google</st> `<st c="21485">$("#submit")</st>`
    <st c="21497">选择器用于选择具有ID为</st> `<st c="21557">submit</st>`<st c="21563">的HTML元素，它就是</st>
    `<st c="21621">.click()</st>` <st c="21629">方法被用来附加一个点击事件监听器到这个元素。</st> <st c="21700">每次用户点击</st>
    **<st c="21731">提交</st>** <st c="21737">按钮时，JavaScript函数中的其余代码将</st> <st c="21799">执行操作。</st>
- en: <st c="21811">The</st> `<st c="21816">function()</st>` <st c="21826">code block
    that follows is the event handler function that is executed when the</st> `<st
    c="21959">var userInput</st>` <st c="21972">variable is used to retrieve the value
    entered by the user in the chat input field.</st> <st c="22057">This value is
    obtained using the</st> `<st c="22090">$("#userInput")</st>` <st c="22105">jQuery
    selector to select the HTML element with the ID of</st> `<st c="22164">userInput</st>`<st
    c="22173">, which is the chat input field.</st> <st c="22206">The</st> `<st c="22210">.val()</st>`
    <st c="22216">method is then used to get the value entered by the user in this
    field and store it in the</st> `<st c="22308">userInput</st>` <st c="22317">variable.</st>
