  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`<st c="11111">让我们开始创建生成我们聊天应用前端的必要 HTML 和 CSS。</st>` `<st c="11175">我们将使用
    HTML、CSS 和 Bootstrap 来创建</st>` `<st c="11262">用户</st>` `<st c="11271">界面，并使用 jQuery
    来处理前端和后端之间的通信。</st>` `<st c="11358">HTML 和 CSS 将负责创建用户界面的结构和样式。</st>`'
- en: <st c="11454">When creating a Flask web application, it is recommended to keep
    your HTML files in a separate folder called</st> `<st c="11564">templates</st>`<st
    c="11573">. This is because</st> <st c="11591">Flask uses the</st> `<st c="11606">Jinja2</st>`
    <st c="11612">template engine, which allows you to write reusable HTML code in
    a more modular way by separating it into smaller, reusable pieces</st> <st c="11744">called
    templates.</st>
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`<st c="11454">在创建 Flask 网络应用程序时，建议将您的 HTML 文件保存在一个名为</st>` `<st c="11564">templates</st>`
    `<st c="11573">的单独文件夹中。这是因为</st>` `<st c="11591">Flask 使用</st>` `<st c="11606">Jinja2</st>`
    `<st c="11612">模板引擎，它允许您通过将其分成更小、可重用的部分来以更模块化的方式编写可重用的 HTML 代码，这些部分被称为模板。</st>`'
