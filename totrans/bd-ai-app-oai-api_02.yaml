  zh: <st c="17725">接下来，在Bootstrap链接下，我们可以包含CSS代码，用于自定义body元素的背景颜色和文本颜色，设置</st> `<st
    c="17881">margin-top</st>` <st c="17891">属性</st>的`<st c="17908">container</st>`
    <st c="17917">类，调整聊天消息区域的`<st c="17917">高度</st>`和`<st c="17917">溢出</st>`属性，以及样式化“提交”按钮和</st>
    `<st c="18033">输入字段</st>`：
