- en: <st c="10498">This is how you can efficiently create a Flask application by
    installing Flask, defining routes, setting up the API key, creating an HTML template,
    and building a function to get the response</st> <st c="10691">from the ChatGPT
    API.</st> <st c="10713">You also learned</st> <st c="10730">how to structure the
    configuration files and we emphasized the importance of securing the</st> <st
    c="10820">API key.</st>
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`<st c="10498">这就是您如何通过安装 Flask、定义路由、设置 API 密钥、创建 HTML 模板以及构建从 ChatGPT API
    获取响应的功能来高效地创建 Flask 应用程序的方法。</st>` `<st c="10691">您还学习了如何构建配置文件的结构，并强调了保护</st>`
    `<st c="10820">API 密钥的重要性。</st>`'
- en: <st c="10828">In the next section, you will learn how to connect the backend
    endpoints to the frontend of the chat application.</st> <st c="10943">We will
    also use</st> **<st c="10960">jQuery</st>** <st c="10966">to handle communication
    between the frontend and the backend, allowing for real-time messaging in the</st>
    <st c="11069">chat application.</st>
