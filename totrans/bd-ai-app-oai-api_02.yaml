  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: <st c="17239">When added to the HTML code, it allows the use of the various
    classes provided by Bootstrap to style the web page.</st> <st c="17355">This link
    points to version</st> `<st c="17383">3.3.7</st>` <st c="17388">of the Bootstrap
    framework, and it includes various CSS rules for styling common HTML elements
    such as headings, paragraphs, forms, and buttons, among others.</st> <st c="17548">Using
    Bootstrap can help to ensure consistency in the design of the web page while also
    simplifying the task of styling and making the page responsive to different</st>
    <st c="17712">screen sizes.</st>
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="17239">将其添加到HTML代码中后，它允许使用Bootstrap提供的各种类来样式化网页。</st> <st c="17355">此链接指向Bootstrap框架的</st>
    `<st c="17383">3.3.7</st>` <st c="17388">版本，并包括用于样式化常见HTML元素（如标题、段落、表单和按钮等）的CSS规则。</st>
    <st c="17548">使用Bootstrap可以帮助确保网页设计的统一性，同时简化样式化任务，并使页面能够适应不同的</st> <st c="17712">屏幕尺寸。</st>
