  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="21811">下面的</st> `<st c="21816">function()</st>` <st c="21826">代码块是当使用</st>
    `<st c="21959">var userInput</st>` <st c="21972">变量来检索用户在聊天输入字段中输入的值时执行的事件处理函数。</st>
    <st c="22057">这个值是通过使用</st> `<st c="22090">$("#userInput")</st>` <st c="22105">jQuery选择器来选择具有ID为</st>
    `<st c="22164">userInput</st>`<st c="22173">的HTML元素获得的，它就是聊天输入字段。</st> <st c="22206">然后，使用</st>
    `<st c="22210">.val()</st>` <st c="22216">方法获取用户在此字段中输入的值并将其存储在</st> `<st c="22308">userInput</st>`
    <st c="22317">变量中。</st>
- en: <st c="22327">Then, a</st> `<st c="22336">GET</st>` <st c="22339">request is
    sent to the server with the user input message as a parameter using the jQuery
    library’s</st> `<st c="22440">$.get()</st>` <st c="22447">method.</st> <st c="22456">The
    response from the server is received as the data parameter in the</st> <st c="22526">anonymous
    function.</st>
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="22327">然后，使用jQuery库的</st> `<st c="22440">$.get()</st>` <st c="22447">方法将用户输入消息作为参数发送到服务器上的</st>
    `<st c="22336">GET</st>` <st c="22339">请求。</st> <st c="22456">服务器响应作为匿名函数中的数据参数接收。</st>
- en: '<st c="22545">Once the response is received, the code appends two new list
    items to the chat area,</st> `<st c="22631">(#chat)</st>`<st c="22638">, in the
    HTML document using the jQuery library’s</st> `<st c="22688">append()</st>` <st
    c="22696">method.</st> <st c="22705">The first list item shows the user’s input
    message as</st> `<st c="22759">"You: <message>"</st>` <st c="22775">in bold.</st>
    <st c="22785">This item will</st> <st c="22800">record and show the user input
    in the chat history.</st> <st c="22852">The second list item shows the response
    from the ChatGPT API as</st> `<st c="22916">"OpenAI: <response>"</st>` <st c="22936">in
    the</st> <st c="22944">chat history.</st>'
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '<st c="22545">一旦收到响应，代码将使用 jQuery 库的</st> `<st c="22688">append()</st>` <st
    c="22696">方法在 HTML 文档的聊天区域</st> `<st c="22631">(#chat)</st>`<st c="22638">中添加两个新的列表项。</st>
    <st c="22705">第一个列表项以粗体显示用户输入的消息</st> `<st c="22759">"您: <message>"</st>` <st
    c="22775">。</st> <st c="22785">此项目将记录并显示聊天历史中的用户输入。</st> <st c="22800">第二个列表项显示
    ChatGPT API 的响应</st> `<st c="22916">"OpenAI: <response>"</st>` <st c="22936">在聊天历史中。</st>'
- en: <st c="22957">Once this step is done, you’ll be all set to utilize the ChatGPT
    clone application and easily exchange responses with the ChatGPT API through a
    user-friendly interface.</st> <st c="23127">To get started, simply run the</st>
    `<st c="23158">app.py</st>` <st c="23164">file and begin chatting.</st> <st c="23190">Feel
    free to ask any question, and the answer will be saved in the chat history window.</st>
    <st c="23278">Here are a few examples (see</st> *<st c="23307">Figure 2</st>**<st
    c="23315">.4</st>*<st c="23317">):</st>
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="22957">完成此步骤后，您就准备好使用 ChatGPT 克隆应用程序，并通过用户友好的界面轻松与 ChatGPT API 交换响应了。</st>
    <st c="23127">要开始，只需运行</st> `<st c="23158">app.py</st>` <st c="23164">文件并开始聊天。</st>
    <st c="23190">请随时提问，答案将被保存在聊天历史窗口中。</st> <st c="23278">以下是一些示例（见</st> *<st c="23307">图
    2</st>**<st c="23315">.4</st>*<st c="23317">）：</st>
