- en: <st c="24446">Going back</st> <st c="24458">to the VSCode</st> `<st c="24508">GET</st>`
    <st c="24511">requests were properly sent to ChatGPT.</st> <st c="24552">As you
    can see, we have received a response with</st> `<st c="24601">code 200</st>`<st
    c="24609">, which means that the HTTP request was successful, and the server has
    returned the requested data.</st> <st c="24709">The server sends this code as
    a part of the HTTP response when it can process the client’s request and deliver
    the</st> <st c="24824">requested data:</st>
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="24446">回到</st> <st c="24458">VSCode</st> `<st c="24508">GET</st>` <st
    c="24511">请求已正确发送到 ChatGPT。</st> <st c="24552">如您所见，我们已收到一个带有</st> `<st c="24601">代码
    200</st>`<st c="24609">的响应，这意味着 HTTP 请求成功，服务器已返回所需的数据。</st> <st c="24709">当服务器能够处理客户端的请求并返回所需数据时，它会将此代码作为
    HTTP 响应的一部分发送：</st>
- en: '[PRE14]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: <st c="25414">Those are the</st> <st c="25429">instructions on how to use JavaScript
    to handle user interactions with a chat application.</st> <st c="25520">We used
    a jQuery script to listen to user inputs and send GET requests to the server with
    user input as a query parameter, then receive a response from the ChatGPT API.</st>
    <st c="25689">We also completed a few examples of how to use the ChatGPT clone
    and verify that all get requests were properly sent to ChatGPT, with a response
    code of</st> `<st c="25842">200</st>`<st c="25845">. You are now ready to build
    more functional</st> <st c="25890">AI applications.</st>
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="25414">这些是</st> <st c="25429">如何使用 JavaScript 处理与聊天应用的用户交互的说明。</st> <st
    c="25520">我们使用 jQuery 脚本来监听用户输入，并将用户输入作为查询参数发送到服务器上的 GET 请求，然后从 ChatGPT API 接收响应。</st>
    <st c="25689">我们还完成了一些如何使用 ChatGPT 克隆的示例，并验证所有 GET 请求都已正确发送到 ChatGPT，响应代码为</st>
    `<st c="25842">200</st>`<st c="25845">。你现在可以构建更多功能性的</st> <st c="25890">AI 应用程序。</st>
- en: <st c="25906">In the next section, we will elevate the capabilities of our ChatGPT
    clone by implementing a feature to retain conversation history seamlessly.</st>
    <st c="26051">Not only will this enhancement allow users to access previous conversations
    and review past interactions, but it will also empower our clone to remember the
    conversation history dynamically as new questions are asked.</st> <st c="26269">This
    means that each subsequent interaction will build upon the context of the previous
    ones, offering a more personalized and engaging experience for</st> <st c="26420">the
    users.</st>
  id: totrans-116
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="25906">在下一节中，我们将通过实现一个无缝保留对话历史的特性来提升我们的 ChatGPT 克隆的功能。</st> <st c="26051">这一增强不仅允许用户访问之前的对话并回顾过去的交互，而且还将使我们的克隆能够在新问题提出时动态地记住对话历史。</st>
    <st c="26269">这意味着每次后续交互都将建立在之前交互的上下文之上，为用户提供更加个性化和吸引人的体验。</st>
- en: <st c="26430">ChatGPT clone conversation retention</st>
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="26430">ChatGPT 克隆对话保留</st>
- en: <st c="26467">We successfully</st> <st c="26483">created a simple ChatGPT clone
    using OpenAI’s GPT-3.5 engine and Flask.</st> <st c="26556">Now, let’s take our
    clone a step further by implementing a feature that retains conversation history
    and incorporates it into the context of</st> <st c="26697">the conversation.</st>
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="26467">我们成功</st> <st c="26483">使用 OpenAI 的 GPT-3.5 引擎和 Flask 创建了一个简单的
    ChatGPT 克隆。</st> <st c="26556">现在，让我们通过实现一个保留对话历史并将其纳入对话上下文的功能，将我们的克隆提升到一个新的层次。</st>
- en: <st c="26714">Retaining conversation history allows our ChatGPT clone to maintain
    context across interactions.</st> <st c="26812">Each exchange between the user
    and the AI is stored in a list called</st> `<st c="26881">conversation_history</st>`<st
    c="26901">. The following list keeps track of both the user’s messages and the</st>
    <st c="26970">AI’s</st> <st c="26975">responses:</st>
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="26714">保留对话历史允许我们的 ChatGPT 克隆在交互中保持上下文。</st> <st c="26812">用户和 AI 之间的每次交流都存储在一个名为</st>
    `<st c="26881">conversation_history</st>`<st c="26901">的列表中。</st> <st c="26970">以下列表跟踪了用户的消息和</st>
    <st c="26975">AI 的</st> <st c="26975">响应：</st>
- en: <st c="26985">We begin by initializing an empty list called</st> `<st c="27032">conversation_history</st>`
    <st c="27052">outside of our Flask application.</st> <st c="27087">This list will
    store all the messages exchanged between the user and</st> <st c="27156">the AI:</st>
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="26985">我们首先在 Flask 应用程序外部初始化一个名为</st> `<st c="27032">conversation_history</st>`
    <st c="27052">的空列表。</st> <st c="27087">此列表将存储用户和</st> <st c="27156">AI</st> <st
    c="27156">之间交换的所有消息：</st>
- en: '[PRE15]'
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: <st c="27255">After receiving a message from the user, we initially append it
    to the</st> `<st c="27327">conversation_history</st>` <st c="27347">list along
    with the</st> `<st c="27368">"user"</st>` <st c="27374">role identifier to indicate
    that it originated from</st> <st c="27427">the user:</st>
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: <st c="27255">在收到用户的消息后，我们最初将其附加到</st> `<st c="27327">conversation_history</st>`
    <st c="27347">列表中，并附带</st> `<st c="27368">"user"</st>` <st c="27374">角色标识符，以表明它来自</st>
    <st c="27427">用户：</st>
- en: '[PRE16]'
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'ai_response = response.choices[0].message.content <st c="27907">conversation_history.append({"role":
    "assistant", "content": ai_response})</st> return ai_response'
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'ai_response = response.choices[0].message.content <st c="27907">conversation_history.append({"role":
    "assistant", "content": ai_response})</st> return ai_response'
- en: '[PRE17]'
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: <st c="28000">In the context of the ChatGPT API,</st> `<st c="28036">"assistant"</st>`
    <st c="28047">refers to the role played by the AI model, responsible for generating
    responses, whereas</st> `<st c="28137">"user"</st>` <st c="28143">signifies the
    human interacting with the AI, providing input</st> <st c="28205">or queries.</st>
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="28000">在ChatGPT API的上下文中，`<st c="28036">"assistant"</st>` <st c="28047">指的是AI模型扮演的角色，负责生成响应，而</st>
    `<st c="28137">"user"</st>` <st c="28143">表示与AI交互的人类，提供输入</st> <st c="28205">或查询。</st>
- en: <st c="28216">Now that we’ve implemented conversation history retention in our
    ChatGPT clone, it’s essential to test and validate its functionality.</st> <st
    c="28352">We’ll perform a series of interactions with our application to confirm
    that the conversation history is indeed being retained and utilized in</st> <st
    c="28494">subsequent responses.</st>
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="28216">现在我们已经在我们ChatGPT克隆中实现了对话历史保留功能，测试和验证其功能是至关重要的。</st> <st c="28352">我们将与我们的应用程序进行一系列交互，以确认对话历史确实被保留并在</st>
    <st c="28494">后续响应中被利用。</st>
- en: <st c="28515">Here is the testing</st> <st c="28536">procedure of the ChatGPT</st>
    <st c="28561">Clone app:</st>
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="28515">以下是ChatGPT克隆应用的测试</st> <st c="28536">程序：</st>
- en: '**<st c="28571">Initial interaction</st>**<st c="28591">: Start by initiating
    a conversation with the ChatGPT clone.</st> <st c="28653">Send a message or ask
    a question to trigger the</st> <st c="28701">AI’s response.</st>'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**<st c="28571">初始交互</st>**<st c="28591">：首先与ChatGPT克隆开始对话。</st> <st c="28653">发送消息或提问以触发</st>
    <st c="28701">AI的响应。</st>'
- en: '**<st c="28715">Observing conversation history</st>**<st c="28746">: After
    receiving the AI’s response, observe the contents of the conversation history.</st>
    <st c="28834">Ensure that both the user’s messages and the AI’s responses are</st>
    <st c="28898">correctly stored.</st>'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**<st c="28715">观察对话历史</st>**<st c="28746">：在收到AI的响应后，观察对话历史的内</st> <st c="28834">容。确保用户的消息和AI的响应都被</st>
    <st c="28898">正确存储。</st>'
- en: '**<st c="28915">Subsequent interactions</st>**<st c="28939">: Continue the
    conversation by asking follow-up questions or making related statements.</st>
    <st c="29028">Pay attention to how the AI’s responses evolve based on the context
    established in</st> <st c="29111">previous interactions.</st>'
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**<st c="28915">后续交互</st>**<st c="28939">：通过提问后续问题或发表相关陈述来继续对话。</st> <st c="29028">注意AI的响应如何根据之前交互中建立的上下文而演变。</st>'
- en: '**<st c="29133">Validation</st>**<st c="29144">: Validate that the AI’s responses
    are coherent and relevant, indicating that it’s utilizing the conversation history
    to</st> <st c="29266">maintain context.</st>'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**<st c="29133">验证</st>**<st c="29144">：验证AI的响应是否连贯且相关，这表明它正在利用对话历史来</st> <st
    c="29266">维持上下文。</st>'
- en: <st c="29283">In the test scenario provided in</st> *<st c="29317">Figure 2</st>**<st
    c="29325">.5</st>*<st c="29327">, we engaged our ChatGPT clone in a series of
    interactions to assess its ability to retain and utilize conversation history
    effectively.</st> <st c="29464">Initially, we introduced ourselves to the AI as
    “Martin” and our favorite programming language as “Python,” prompting it to acknowledge
    our name in subsequent interactions.</st> <st c="29637">The AI successfully remembered
    our name and our favorite programming language and incorporated it into its responses,
    demonstrating its capability to retain user-provided information.</st> <st c="29821">Furthermore,
    when we inquired about our name and favorite programming language, the AI accurately
    recalled it from the conversation history, showcasing its ability to retrieve
    and utilize</st> <st c="30009">contextual information.</st>
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="29283">在图2*<st c="29317">.5</st>**<st c="29325">中提供的测试场景中，我们与我们的ChatGPT克隆进行了一系列交互，以评估其有效保留和利用对话历史的能力。</st>
    <st c="29464">最初，我们向AI介绍自己为“Martin”，并说明我们最喜欢的编程语言为“Python”，提示它在后续交互中承认我们的名字。</st>
    <st c="29637">AI成功记住了我们的名字和最喜欢的编程语言，并将其纳入其响应中，展示了其保留用户提供信息的能力。</st> <st c="29821">此外，当我们询问我们的名字和最喜欢的编程语言时，AI能够从对话历史中准确回忆起它，展示了其检索和利用</st>
    <st c="30009">上下文信息的能力。</st>
- en: '![Figure 2.5 – ChatGPT clone conversation retention](img/B22414_02_5.jpg)'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
  zh: '![图2.5 – ChatGPT克隆对话保留](img/B22414_02_5.jpg)'
- en: <st c="30558">Figure 2.5 – ChatGPT clone conversation retention</st>
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="30558">图2.5 – ChatGPT克隆对话保留</st>
- en: <st c="30607">This scenario</st> <st c="30622">underscores the effectiveness
    of our ChatGPT clone in retaining and utilizing conversation history to maintain
    context and deliver relevant responses.</st> <st c="30773">By successfully recalling
    user-provided information and tailoring responses accordingly, the AI enhances
    the conversational experience, fostering a sense of continuity and engagement.</st>
    <st c="30957">Additionally, the AI’s ability to adapt its responses based on user
    preferences and interests showcases its versatility in generating coherent and</st>
    <st c="31104">personalized interactions.</st>
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="30607">这个场景</st> <st c="30622">强调了我们的ChatGPT克隆在保留和利用对话历史以维持情境并传递相关响应方面的有效性。</st>
    <st c="30773">通过成功回忆用户提供的信息并相应地定制响应，AI增强了对话体验，培养了一种连续性和参与感。</st> <st c="30957">此外，AI根据用户偏好和兴趣调整其响应的能力展示了其在生成连贯和</st>
    <st c="31104">个性化交互方面的多功能性。</st>
- en: <st c="31130">Summary</st>
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="31130">总结</st>
- en: <st c="31138">In this chapter of the book, you were introduced to the process
    of building a ChatGPT clone, which is a chatbot that utilizes OpenAI’s language
    model to generate human-like responses to user input.</st> <st c="31337">The application
    was built using Flask, a lightweight web framework for Python, and was customizable
    to allow for the use of different OpenAI models and other options such as the
    length of the</st> <st c="31529">generated text.</st>
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="31138">在本章中，您了解了构建ChatGPT克隆的过程，这是一个利用OpenAI的语言模型生成类似人类响应的用户输入的聊天机器人。</st>
    <st c="31337">该应用程序使用Flask构建，这是一个用于Python的轻量级Web框架，并且可定制，允许使用不同的OpenAI模型以及其他选项，如生成的文本长度。</st>
    <st c="31529">。
- en: <st c="31544">We also covered topics such as creating and generating the frontend
    HTML for the ChatGPT clone, intercepting ChatGPT API endpoints, passing user input
    from the frontend to the backend using AJAX, and displaying the generated text
    in</st> <st c="31778">the frontend.</st>
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="31544">我们还涵盖了创建ChatGPT克隆的前端HTML、拦截ChatGPT API端点、使用AJAX将用户输入从前端传递到后端以及在前端显示生成的文本等主题。</st>
    <st c="31778">。
- en: <st c="31791">We learned how to retain conversation history to enable our ChatGPT
    clone to become more contextually aware, providing more coherent and relevant
    responses based on</st> <st c="31957">previous interactions.</st>
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="31791">我们学习了如何保留对话历史，使我们的ChatGPT克隆更加情境感知，根据之前的交互提供更连贯和相关的响应。</st> <st
    c="31957">。
- en: <st c="31979">In</st> [*<st c="31983">Chapter 3</st>*](B22414_03.xhtml#_idTextAnchor046)<st
    c="31992">, you will learn how to create and deploy an AI-powered code bug-fixing
    SaaS application using Flask and the ChatGPT language model.</st> <st c="32125">You
    will become proficient in using the ChatGPT API.</st> <st c="32178">You will learn
    how to create a web form that accepts user inputs, deploy the application to the
    Azure cloud platform, and integrate it with a WordPress website.</st> <st c="32339">After
    completing the chapter, you will have the necessary skills to make a ChatGPT application
    accessible to</st> <st c="32448">individuals worldwide.</st>
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: <st c="31979">在第</st> [*<st c="31983">3章</st>*](B22414_03.xhtml#_idTextAnchor046)<st
    c="31992">中，您将学习如何使用Flask和ChatGPT语言模型创建和部署一个AI驱动的代码错误修复SaaS应用程序。</st> <st c="32125">您将熟练使用ChatGPT
    API。</st> <st c="32178">您将学习如何创建一个接受用户输入的Web表单，将应用程序部署到Azure云平台，并将其与WordPress网站集成。</st>
    <st c="32339">完成本章后，您将具备使ChatGPT应用程序对</st> <st c="32448">全球个人可访问的必要技能。</st>
- en: '[PRE18]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '<st c="0">Part 2: Build Web Applications with ChatGPT API</st>'
  id: totrans-143
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="0">第二部分：使用ChatGPT API构建Web应用程序</st>
- en: '<st c="48">Here, you will master web application development through the seamless
    integration of ChatGPT with renowned Python web frameworks such as Django and
    Stripe.</st> <st c="206">You will embark on the journey of creating two cutting-edge
    applications from the ground up: a dynamic code-fixing tool and an innovative
    quiz generation application, harnessing the immense potential of the ChatGPT API.</st>
    <st c="426">Additionally, you will acquire valuable insights on deploying your
    web application to the Azure cloud, uploading it to your website, and implementing
    user payment functionalities with the</st> <st c="614">Stripe API.</st>'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="48">在这里，您将通过将ChatGPT与知名的Python Web框架如Django和Stripe无缝集成，掌握Web应用程序开发。</st>
    <st c="206">您将从零开始创建两个前沿的应用程序：一个动态的代码修复工具和一个创新的测验生成应用程序，利用ChatGPT API的巨大潜力。</st>
    <st c="426">此外，您还将获得有关将您的Web应用程序部署到Azure云、上传到您的网站以及使用</st> <st c="614">Stripe
    API实现用户支付功能的宝贵见解。</st>
