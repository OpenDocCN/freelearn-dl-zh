  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Flask <st c="1678">创建一个ChatGPT克隆</st>
- en: <st c="1689">Generating frontend</st> **<st c="1710">HTML</st>** <st c="1714">for
    the</st> <st c="1723">ChatGPT clone</st>
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成ChatGPT克隆的**<st c="1710">HTML</st>**
