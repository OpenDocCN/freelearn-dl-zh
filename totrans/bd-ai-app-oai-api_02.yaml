- en: <st c="0">2</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2">Building a ChatGPT Clone</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="26">The first application in this chapter and this book is going to</st>
    <st c="91">be a</st> **<st c="96">ChatGPT clone</st>** <st c="109">that utilizes
    OpenAI’s powerful language model to generate human-like responses to user input.</st>
    <st c="205">The application will</st> <st c="226">be built using</st> **<st c="241">Flask</st>**<st
    c="246">, a lightweight web framework for Python, and will feature a simple and
    elegant frontend interface for users to interact with.</st> <st c="373">With just
    a few lines of code, users will be able to input their text and receive a response
    generated by the OpenAI language model.</st> <st c="506">Specifically, the application
    will be able to render a simple browser chat interface to interact with a chatbot.</st>
    <st c="619">The chatbot will accept user input and send it to the ChatGPT API,
    display the response from the ChatGPT API to the user, and show</st> <st c="750">chat
    history.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="763">The clone app will be able to take in a user’s input, send it to
    OpenAI’s API, and receive a response, which will be displayed to the user in real
    time.</st> <st c="917">The app will be customizable to allow for the use of different
    OpenAI models and other options such as the length of the</st> <st c="1038">generated
    text.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1053">Initially, our chatbot will lack the ability to maintain a contextual
    conversation.</st> <st c="1138">While it will generate responses based on individual
    queries, it will not possess the memory to retain information from previous interactions.</st>
    <st c="1281">Then, we will be introduced to a simple yet efficient technique to
    help our chatbot keep the conversation context, using the dictionary structure
    and roles of the GPT-3.5 model.</st> <st c="1459">We will explore techniques and
    tools that enable our chatbot to understand and respond coherently within the
    context of an</st> <st c="1582">ongoing dialogue.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1599">In this chapter, we will cover the</st> <st c="1635">following
    topics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1652">Creating a ChatGPT Clone</st> <st c="1678">using Flask</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1689">Generating frontend</st> **<st c="1710">HTML</st>** <st c="1714">for
    the</st> <st c="1723">ChatGPT clone</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1736">Intercepting ChatGPT</st> <st c="1758">API endpoints</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1771">OpenAI’s ChatGPT API for</st> <st c="1797">text generation</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1812">Passing user input from the frontend to the backend</st> <st c="1865">using</st>
    **<st c="1871">AJAX</st>**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1875">Displaying the generated text in</st> <st c="1909">the frontend</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1921">Retaining and updating the</st> <st c="1949">chat context</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1961">When building a ChatGPT clone with Flask, there are a few things
    to keep in mind.</st> <st c="2044">It’s important to set up a Python virtual environment
    to keep your dependencies separate from other projects on your machine.</st> <st
    c="2170">This ensures that your project has all the necessary dependencies and
    won’t conflict with other projects.</st> <st c="2276">Additionally, make sure
    to securely store your ChatGPT API key to avoid unauthorized access.</st> <st
    c="2369">It’s also important to carefully manage your API requests, as the pricing
    is based on the number of tokens processed.</st> <st c="2487">Finally, Flask offers
    flexibility in terms of how you structure your application, but it’s important
    to keep your code organized and maintainable as your</st> <st c="2641">project
    grows.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2655">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2678">To fully benefit from this chapter, you will require some fundamental
    tools.</st> <st c="2756">In-depth explanations of all installations not covered
    in the preceding chapter will</st> <st c="2841">be provided.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2853">You will require</st> <st c="2871">the following:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '**<st c="2885">Python 3.7</st>** <st c="2896">or later installed on</st> <st
    c="2919">your computer</st>'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2932">An</st> **<st c="2936">OpenAI API key</st>**<st c="2950">, obtained
    from your</st> <st c="2971">OpenAI account</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2985">A code editor, such as</st> <st c="3009">VSCode (recommended)</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3029">The Flask framework installed in your Python</st> <st c="3075">virtual
    environment</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="3094">The code examples from this chapter can be found on GitHub</st>
    <st c="3154">at</st> [<st c="3157">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="3233">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3234">In the next section, we will start building the ChatGPT clone with
    Flask by setting up a backend that communicates with the ChatGPT API to generate
    responses to user input.</st> <st c="3408">You will create a simple Flask application
    and gradually enhance it by incorporating the ChatGPT API.</st> <st c="3510">We
    will also structure the code and store the ChatGPT API key as an environment variable
    to improve</st> <st c="3610">its security.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3623">Creating a ChatGPT clone with Flask</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="3659">To create a ChatGPT clone with Flask, you will need to set up a
    backend that communicates</st> <st c="3750">with the ChatGPT API to generate responses
    to user input.</st> <st c="3808">Flask is a popular Python web framework that
    can be used to</st> <st c="3868">create web applications, including ChatGPT clones.</st>
    <st c="3919">We will begin our project by creating a simple Flask application
    and gradually enhance it by incorporating the ChatGPT API, additional web pages,
    and</st> <st c="4069">the frontend:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4082">To get started, initiate a new folder and name it</st> `<st c="4133">ChatGPT_Clone</st>`<st
    c="4146">. Create and activate your Python virtual environment following the steps
    outlined in</st> [*<st c="4232">Chapter 1</st>*](B22414_01.xhtml#_idTextAnchor013)<st
    c="4241">. Create a new file named</st> `<st c="4267">app.py</st>` <st c="4273">to
    serve as the backend of your application, where you’ll define your Flask application
    and interact with the ChatGPT API.</st> <st c="4397">Once you have created the
    project, you will need to install the Flask package using</st> `<st c="4481">pip</st>`<st
    c="4484">. You can do this by running the following command in your</st> <st c="4543">project’s
    terminal:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: from flask import Flask
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: app = Flask(__name__)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="4947">In Flask, a route is a URL path that a user can visit in your application.</st>
    <st c="5023">You can define routes using the</st> `<st c="5055">@app.route</st>`
    <st c="5065">decorator and a Python function.</st> <st c="5099">Let’s create a
    route that displays</st> `<st c="5134">Hello, World!</st>` <st c="5147">as follows:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="5211">Finally, you can run your Flask app using the</st> `<st c="5258">app.run()</st>`
    <st c="5267">method.</st> <st c="5276">This will allow you to start a development
    server that you can access in your</st> <st c="5354">web browser:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="5403">Once you</st> <st c="5413">have created the run configuration,
    you can run your Flask application by clicking the</st> `<st c="5557">app.py</st>`
    <st c="5563">and selecting the</st> **<st c="5582">Run</st>** <st c="5585">option.</st>
    <st c="5594">You will then see the URL to your Flask application in the</st> **<st
    c="5653">Run</st>** <st c="5656">window, as shown in</st> *<st c="5677">Figure
    2</st>**<st c="5685">.</st><st c="5686">1</st>*<st c="5688">:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 2.1 – Flask application URL](img/B22414_02_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="5913">Figure 2.1 – Flask application URL</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5947">With these steps, you can build a basic Flask application that
    displays</st> `<st c="6020">Hello, World!</st>` <st c="6033">when a user visits
    the root URL of the application.</st> <st c="6086">From here, you can add more
    routes, templates, and functionality to your Flask app to build more complex web
    applications with the ChatGPT API (see</st> *<st c="6234">Figure 2</st>**<st c="6242">.2</st>*<st
    c="6244">).</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.2 – Flask application page](img/B22414_02_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="6270">Figure 2.2 – Flask application page</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6305">Every ChatGPT application starts with setting up your API key.</st>
    <st c="6369">When using ChatGPT API keys in a Python file, you would typically
    hardcode the keys directly into the file, just like you did when building a simple
    ChatGPT API response, which means the key is visible in the code itself.</st>
    <st c="6591">This can be a security risk if someone gains access to the code or
    if you accidentally push your code to a</st> <st c="6698">public repository.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6716">On the other hand, adding the ChatGPT API key as an environment
    variable means that the key is</st> <st c="6812">stored outside the code base
    and can be accessed by the code at runtime.</st> <st c="6885">This makes it more
    secure because the key is not visible</st> <st c="6942">in the code itself and
    can be changed easily without modifying</st> <st c="7005">the code.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7014">Another way to store your API key securely is by adding it to a
    separate file that is kept outside your Git repository.</st> <st c="7135">To follow
    that approach, let’s create</st> `<st c="7173">config.py</st>` <st c="7182">and
    then use the</st> `<st c="7200">config</st>` <st c="7206">package to access it
    from</st> `<st c="7233">app.py</st>`<st c="7239">. The following code is an example
    of how to structure both</st> <st c="7299">files accordingly:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7317">config.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: <st c="7352">app.py</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: <st c="7551">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7566">If you want to push your</st> <st c="7592">project to a Git repository,
    it is important to add the</st> `<st c="7648">config.py</st>` <st c="7657">file
    to your project’s</st> `<st c="7681">.gitignore</st>` <st c="7691">file to prevent
    accidentally committing your API key to</st> <st c="7748">version control.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7764">Let’s modify</st> <st c="7778">the functionality of your</st> `<st
    c="7804">index()</st>` <st c="7811">function by</st> <st c="7824">configuring
    it to return an HTML template from</st> <st c="7871">the frontend:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: from flask import Flask, <st c="8576">index.html</st> file is typically the
    first page that a user will see when they load a web application. This is where
    the user will enter their initial input to start the chat with the ChatGPT API.
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8768">The next step is to build a function that will get the response
    from the ChatGPT API, so you can use that response in your chat clone.</st> <st
    c="8904">You can do that easily by building the</st> `<st c="8943">get_bot_response()</st>`
    <st c="8961">function just under the</st> `<st c="8986">index()</st>` <st c="8993">function:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: <st c="9319">This code</st> <st c="9330">sets up a</st> `<st c="9340">/get</st>`
    <st c="9344">route for the Flask app.</st> <st c="9370">When a</st> <st c="9377">user
    requests this route,</st> `<st c="9403">get_bot_response()</st>` <st c="9421">is
    called.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="9432">The</st> `<st c="9437">request.args.get()</st>` <st c="9455">method
    is used to retrieve the value of the</st> `<st c="9500">msg</st>` <st c="9503">parameter
    from the URL query string.</st> <st c="9541">This parameter is used as the input
    for the ChatGPT API.</st> <st c="9598">Later, we will create a button on our frontend
    that will activate the</st> `<st c="9668">/get</st>` <st c="9672">upon selection.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="9688">The</st> `<st c="9693">client.chat.completions.create()</st>` <st
    c="9725">method is used to generate a response from the ChatGPT API.</st> <st
    c="9786">It takes in several parameters, such as the model to use, the messages
    to provide to the API, and the number of tokens to generate in</st> <st c="9920">the
    response.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="9933">After generating the response, the function extracts the response
    text from the API’s response using dictionary keys.</st> <st c="10052">Finally,
    the response is returned as</st> <st c="10089">a string.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="10098">When a user types a message and hits send, the JavaScript code
    will make an HTTP request to this route to get the AI response and then display
    it on the</st> <st c="10252">web page.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="10261">To finalize the backend of your chatbot application, it’s important
    to update your imports and add any necessary packages</st> <st c="10384">for</st>
    `<st c="10388">get_bot_response()</st>`<st c="10406">:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: <st c="10498">This is how you can efficiently create a Flask application by
    installing Flask, defining routes, setting up the API key, creating an HTML template,
    and building a function to get the response</st> <st c="10691">from the ChatGPT
    API.</st> <st c="10713">You also learned</st> <st c="10730">how to structure the
    configuration files and we emphasized the importance of securing the</st> <st
    c="10820">API key.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="10828">In the next section, you will learn how to connect the backend
    endpoints to the frontend of the chat application.</st> <st c="10943">We will
    also use</st> **<st c="10960">jQuery</st>** <st c="10966">to handle communication
    between the frontend and the backend, allowing for real-time messaging in the</st>
    <st c="11069">chat application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="11086">Frontend HTML generation</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="11111">Let’s start creating the HTML and CSS necessary to generate the</st>
    <st c="11175">frontend of our chat application.</st> <st c="11210">We will be
    using HTML, CSS, and Bootstrap to create</st> <st c="11262">the user</st> <st
    c="11271">interface and jQuery to handle the communication between the frontend
    and the backend.</st> <st c="11358">The HTML and CSS will be responsible for creating
    the structure and style of the</st> <st c="11439">user interface.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="11454">When creating a Flask web application, it is recommended to keep
    your HTML files in a separate folder called</st> `<st c="11564">templates</st>`<st
    c="11573">. This is because</st> <st c="11591">Flask uses the</st> `<st c="11606">Jinja2</st>`
    <st c="11612">template engine, which allows you to write reusable HTML code in
    a more modular way by separating it into smaller, reusable pieces</st> <st c="11744">called
    templates.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="11761">To create the</st> `<st c="11776">templates</st>` <st c="11785">folder,
    simply create a new directory in your project directory and name it</st> `<st
    c="11862">templates</st>`<st c="11871">. Inside the</st> `<st c="11884">templates</st>`
    <st c="11893">folder, you can create your HTML file, which is called</st> `<st
    c="11949">index.html</st>` <st c="11959">in this case.</st> <st c="11974">To do
    that, right-click on the</st> `<st c="12005">templates</st>` <st c="12014">folder
    and select</st> **<st c="12033">New</st>** <st c="12036">|</st> **<st c="12039">HTML
    file</st>**<st c="12048">. Here is what the project directory should</st> <st
    c="12092">look like:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: <st c="12175">Creating a</st> `<st c="12187">templates</st>` <st c="12196">folder
    is important because it allows you to organize your HTML files separately from
    your Python code, which makes it easier to manage and modify your web application.</st>
    <st c="12366">Additionally, the Flask framework is specifically designed to look
    for the templates folder to render HTML templates, so creating this folder is
    necessary for the proper functioning of your</st> <st c="12556">Flask application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="12574">We can</st> <st c="12581">now create the frontend of our chat
    application using</st> <st c="12636">HTML and Bootstrap.</st> <st c="12656">Initially,
    our frontend code will contain a basic layout with a chat window, an input field,
    and a submit button.</st> <st c="12770">You can include the following code in
    your</st> `<st c="12813">index.html</st>` <st c="12823">file:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: <st c="13330">The</st> `<st c="13335"><!DOCTYPE html></st>` <st c="13350">declaration
    at the beginning of the code indicates the document type and version.</st> <st
    c="13433">The</st> `<st c="13437"><html></st>` <st c="13443">tag indicates the
    start of the HTML document, and the</st> `<st c="13498"><head></st>` <st c="13504">tag
    contains information about the document, such as the title of the document, which
    is specified in the</st> `<st c="13611"><title></st>` <st c="13618">tag.</st>
    <st c="13624">The</st> `<st c="13628"><body></st>` <st c="13634">tag contains
    the visible content of</st> <st c="13670">the document that is displayed in the
    browser, which includes the chat history and</st> <st c="13754">user messages.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="13768">In HTML, the</st> `<st c="13782">div</st>` <st c="13785">element
    is a container that is used to group other HTML elements and apply styles to them
    as a group.</st> <st c="13888">It does not have any inherent semantic meaning,
    but its flexibility allows web developers to create layouts and organize content
    in a</st> <st c="14022">structured manner.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="14040">The first</st> `<st c="14051"><div></st>` <st c="14056">element
    is a class attribute of a container.</st> <st c="14102">The entire chat application
    will be contained within this container.</st> <st c="14171">We also have an</st>
    `<st c="14187"><h2></st>` <st c="14191">element with the text</st> `<st c="14214">"OpenAI
    GPT Chat"</st>`<st c="14231">. This is the title of the</st> <st c="14258">chat
    application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="14275">Next, we have an</st> `<st c="14293"><hr></st>` <st c="14297">element,
    which is used to create a horizontal line to separate the title from the rest
    of the chat interface.</st> <st c="14408">Following that, we have another</st>
    `<st c="14440"><div></st>` <st c="14445">element with a class attribute of</st>
    `<st c="14480">panel panel-default</st>`<st c="14499">. The</st> `<st c="14505">panel</st>`
    <st c="14510">will construct a bordered container that encompasses the content
    within and provides additional space around it through padding.</st> <st c="14640">This
    class is used to create a panel that will contain the chat message history.</st>
    <st c="14721">In the chat history window, there are two</st> <st c="14763">more
    elements.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="14777">The first</st> `<st c="14788"><div></st>` <st c="14793">element
    has a class attribute of</st> `<st c="14827">panel-heading</st>` <st c="14840">and
    contains the</st> `<st c="14858">"Chat Messages"</st>` <st c="14873">text.</st>
    <st c="14880">This is the heading for the panel that will contain the</st> <st
    c="14936">chat messages.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="14950">The second</st> `<st c="14962"><div></st>` <st c="14967">element
    has a class attribute of</st> `<st c="15001">panel-body</st>` <st c="15011">and
    an</st> `<st c="15019">id</st>` <st c="15021">attribute of</st> `<st c="15035">chat</st>`<st
    c="15039">. This element will be used to display the chat messages.</st> <st c="15097">Inside
    this</st> `<st c="15109"><div></st>` <st c="15114">element, we have an unordered</st>
    `<st c="15145"><ul></st>` <st c="15149">list element with a class attribute of</st>
    `<st c="15189">list-group</st>`<st c="15199">, which will contain the individual</st>
    <st c="15235">chat messages.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="15249">Next, we will</st> <st c="15264">build the input box where users
    can enter their messages and a submit button to send the message to the server
    for processing.</st> <st c="15391">The input box is created using the</st> `<st
    c="15426"><input></st>` <st c="15433">tag with</st> `<st c="15443">type="text"</st>`<st
    c="15454">. The input box has a class of</st> `<st c="15485">"form-control"</st>`<st
    c="15499">, which is a Bootstrap class for styling the form</st> <st c="15549">control
    elements.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="15566">The</st> `<st c="15606"><button></st>` <st c="15614">tag with
    an ID of</st> `<st c="15633">submit</st>`<st c="15639">. The</st> `<st c="15645">input-group</st>`
    <st c="15656">class is a Bootstrap class used to group the input box and the “submit”</st>
    <st c="15729">button together.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="15745">Once the basic HTML file is created, you can activate your application
    by running the</st> `<st c="15832">app.py</st>` <st c="15838">file (see</st> *<st
    c="15849">Figure 2</st>**<st c="15857">.3</st>*<st c="15859">).</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 2.3 – Initial ChatGPT clone frontend](img/B22414_02_3.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: <st c="15918">Figure 2.3 – Initial ChatGPT clone frontend</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="15961">The interface will have a heading that says</st> **<st c="16006">OpenAI
    GPT Chat</st>**<st c="16021">, a chat panel where messages will be displayed,
    and an input box at the bottom where the user can type their message.</st> <st
    c="16140">There will also be a</st> **<st c="16161">Submit</st>** <st c="16167">button
    next to the input box.</st> <st c="16198">However, the chat functionality will
    not be working yet as the backend endpoints</st> <st c="16279">are not connected
    to the frontend of</st> <st c="16316">the application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="16332">In this section, we discussed how to create the frontend of a
    chat application using HTML.</st> <st c="16424">We created the</st> `<st c="16439">templates</st>`
    <st c="16448">folder in Flask for reusable HTML templates for a basic chat interface
    with a chat window, input field, and a submit button.</st> <st c="16574">We can
    now explore different ways to customize the application’s appearance, such as
    changing fonts and adding icons, to make it even more</st> <st c="16713">visually
    appealing.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="16732">Enhancing the ChatGPT clone design</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="16767">To enhance the</st> <st c="16783">design and aesthetics of the
    ChatGPT clone, we will be applying some CSS code.</st> <st c="16862">By applying
    CSS modifications, we can improve the overall visual appeal of the chat application
    and create a more</st> <st c="16976">user-friendly interface.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="17000">Let’s first add an external style sheet provided by the Bootstrap
    framework.</st> <st c="17078">To do that, under the page title, you can add</st>
    <st c="17124">the following:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: <st c="17239">When added to the HTML code, it allows the use of the various
    classes provided by Bootstrap to style the web page.</st> <st c="17355">This link
    points to version</st> `<st c="17383">3.3.7</st>` <st c="17388">of the Bootstrap
    framework, and it includes various CSS rules for styling common HTML elements
    such as headings, paragraphs, forms, and buttons, among others.</st> <st c="17548">Using
    Bootstrap can help to ensure consistency in the design of the web page while also
    simplifying the task of styling and making the page responsive to different</st>
    <st c="17712">screen sizes.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="17725">Next, under the Bootstrap link, we can include the CSS code that
    includes customizing the background color and text color of the body element,
    setting the</st> `<st c="17881">margin-top</st>` <st c="17891">property of the</st>
    `<st c="17908">container</st>` <st c="17917">class, adjusting the height and overflow
    properties of the chat messages area, and styling the “submit” button and</st>
    <st c="18033">input field:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: <st c="18439">The</st> `<st c="18444">body</st>` <st c="18448">rule sets the
    background color of the page to a dark greenish-gray color and the text color
    to a light gray color.</st> <st c="18564">The</st> `<st c="18568">.container</st>`
    <st c="18578">rule applies a 20-pixel margin on top of the container element,
    which will push the chat interface down a bit from the top of the page.</st> <st
    c="18715">The</st> `<st c="18719">#chat</st>` <st c="18724">rule sets the height
    of the chat message display area to 400 pixels and applies a vertical scrollbar
    to the area when the content exceeds the</st> <st c="18867">height limit.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="18880">The</st> `<st c="18885">.list-group-item</st>` <st c="18901">block
    sets the border radius and background color of the list items displayed in the
    chat panel.</st> <st c="18999">The</st> `<st c="19003">.submit</st>` <st c="19010">block
    sets the background color, text color, and border radius of the</st> `<st c="19100">.input-group</st>`
    <st c="19112">input block styles the input field within the input group, setting
    the background color and text color and removing the border.</st> <st c="19241">You
    can verify that all CSS changes are implemented correctly by stopping and re-running</st>
    <st c="19330">your project.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="19343">Those styles</st> <st c="19357">contribute to a cohesive and visually
    appealing design.</st> <st c="19413">You can now rerun the application to see
    the finalized style of the ChatGPT</st> <st c="19489">clone application.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="19507">In this section, we improved the design of the ChatGPT clone using
    CSS code, including an external style sheet from Bootstrap and custom CSS modifications.</st>
    <st c="19664">In the next section, you will learn how to intercept ChatGPT API
    endpoints using Flask.</st> <st c="19752">This will allow you to create custom
    routes to send and receive HTTP requests between the frontend of the ChatGPT clone
    application and the</st> <st c="19892">backend server.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="19907">Intercepting ChatGPT API endpoints</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="19942">Our ChatGPT clone needs to use JavaScript to handle user interactions
    with the chat application</st> <st c="20039">in real time.</st> <st c="20053">To
    do that, we can use a jQuery script that listens for a click on the</st> `<st
    c="20189">GET</st>` <st c="20192">request to the server with the user input as
    a query parameter, and then receives a response from ChatGPT.</st> <st c="20300">The
    use of JavaScript in this way will enable the chat application to update and display
    new chat messages without the need for a page refresh, making for a more seamless
    and</st> <st c="20475">user-friendly experience.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="20500">We can write the JavaScript code just under the</st> `<st c="20549">input-group</st>`
    <st c="20560">class, as</st> <st c="20571">shown here:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: <st c="21194">JavaScript will make our application more dynamic and responsive.</st>
    <st c="21261">Here is how the preceding code snipped</st> <st c="21300">is implemented:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="21315">Firstly, we included</st> <st c="21337">the jQuery library from
    the</st> <st c="21365">Google</st> `<st c="21485">$("#submit")</st>` <st c="21497">selector
    is used to select the HTML element with the ID of</st> `<st c="21557">submit</st>`<st
    c="21563">, which is the</st> `<st c="21621">.click()</st>` <st c="21629">method
    is then used to attach a click event listener to this element.</st> <st c="21700">Every
    time the user clicks the</st> **<st c="21731">Submit</st>** <st c="21737">button,
    the rest of the code in the JavaScript function will</st> <st c="21799">take action.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="21811">The</st> `<st c="21816">function()</st>` <st c="21826">code block
    that follows is the event handler function that is executed when the</st> `<st
    c="21959">var userInput</st>` <st c="21972">variable is used to retrieve the value
    entered by the user in the chat input field.</st> <st c="22057">This value is
    obtained using the</st> `<st c="22090">$("#userInput")</st>` <st c="22105">jQuery
    selector to select the HTML element with the ID of</st> `<st c="22164">userInput</st>`<st
    c="22173">, which is the chat input field.</st> <st c="22206">The</st> `<st c="22210">.val()</st>`
    <st c="22216">method is then used to get the value entered by the user in this
    field and store it in the</st> `<st c="22308">userInput</st>` <st c="22317">variable.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="22327">Then, a</st> `<st c="22336">GET</st>` <st c="22339">request is
    sent to the server with the user input message as a parameter using the jQuery
    library’s</st> `<st c="22440">$.get()</st>` <st c="22447">method.</st> <st c="22456">The
    response from the server is received as the data parameter in the</st> <st c="22526">anonymous
    function.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '<st c="22545">Once the response is received, the code appends two new list
    items to the chat area,</st> `<st c="22631">(#chat)</st>`<st c="22638">, in the
    HTML document using the jQuery library’s</st> `<st c="22688">append()</st>` <st
    c="22696">method.</st> <st c="22705">The first list item shows the user’s input
    message as</st> `<st c="22759">"You: <message>"</st>` <st c="22775">in bold.</st>
    <st c="22785">This item will</st> <st c="22800">record and show the user input
    in the chat history.</st> <st c="22852">The second list item shows the response
    from the ChatGPT API as</st> `<st c="22916">"OpenAI: <response>"</st>` <st c="22936">in
    the</st> <st c="22944">chat history.</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="22957">Once this step is done, you’ll be all set to utilize the ChatGPT
    clone application and easily exchange responses with the ChatGPT API through a
    user-friendly interface.</st> <st c="23127">To get started, simply run the</st>
    `<st c="23158">app.py</st>` <st c="23164">file and begin chatting.</st> <st c="23190">Feel
    free to ask any question, and the answer will be saved in the chat history window.</st>
    <st c="23278">Here are a few examples (see</st> *<st c="23307">Figure 2</st>**<st
    c="23315">.4</st>*<st c="23317">):</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '`<st c="23320">Who invented the</st>` `<st c="23338">light bulb?</st>`'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="23349">Is the Panda a type</st>` `<st c="23370">of bear?</st>`'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="23378">Is it possible to divide a number</st>` `<st c="23413">by zero?</st>`'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="23421">If I have two apples and I eat a half apple, how many apples
    will I</st>` `<st c="23490">have left?</st>`'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 2.4 – ChatGPT clone responses](img/B22414_02_4.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: <st c="24191">Figure 2.4 – ChatGPT clone responses</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="24227">Important note</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="24242">The screenshot displayed here shows the application in the light
    color mode for clarity and visibility purposes.</st> <st c="24356">Please note
    that the actual application will be in dark mode, as per its</st> <st c="24429">default
    settings.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="24446">Going back</st> <st c="24458">to the VSCode</st> `<st c="24508">GET</st>`
    <st c="24511">requests were properly sent to ChatGPT.</st> <st c="24552">As you
    can see, we have received a response with</st> `<st c="24601">code 200</st>`<st
    c="24609">, which means that the HTTP request was successful, and the server has
    returned the requested data.</st> <st c="24709">The server sends this code as
    a part of the HTTP response when it can process the client’s request and deliver
    the</st> <st c="24824">requested data:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: <st c="25414">Those are the</st> <st c="25429">instructions on how to use JavaScript
    to handle user interactions with a chat application.</st> <st c="25520">We used
    a jQuery script to listen to user inputs and send GET requests to the server with
    user input as a query parameter, then receive a response from the ChatGPT API.</st>
    <st c="25689">We also completed a few examples of how to use the ChatGPT clone
    and verify that all get requests were properly sent to ChatGPT, with a response
    code of</st> `<st c="25842">200</st>`<st c="25845">. You are now ready to build
    more functional</st> <st c="25890">AI applications.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="25906">In the next section, we will elevate the capabilities of our ChatGPT
    clone by implementing a feature to retain conversation history seamlessly.</st>
    <st c="26051">Not only will this enhancement allow users to access previous conversations
    and review past interactions, but it will also empower our clone to remember the
    conversation history dynamically as new questions are asked.</st> <st c="26269">This
    means that each subsequent interaction will build upon the context of the previous
    ones, offering a more personalized and engaging experience for</st> <st c="26420">the
    users.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26430">ChatGPT clone conversation retention</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26467">We successfully</st> <st c="26483">created a simple ChatGPT clone
    using OpenAI’s GPT-3.5 engine and Flask.</st> <st c="26556">Now, let’s take our
    clone a step further by implementing a feature that retains conversation history
    and incorporates it into the context of</st> <st c="26697">the conversation.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26714">Retaining conversation history allows our ChatGPT clone to maintain
    context across interactions.</st> <st c="26812">Each exchange between the user
    and the AI is stored in a list called</st> `<st c="26881">conversation_history</st>`<st
    c="26901">. The following list keeps track of both the user’s messages and the</st>
    <st c="26970">AI’s</st> <st c="26975">responses:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="26985">We begin by initializing an empty list called</st> `<st c="27032">conversation_history</st>`
    <st c="27052">outside of our Flask application.</st> <st c="27087">This list will
    store all the messages exchanged between the user and</st> <st c="27156">the AI:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="27255">After receiving a message from the user, we initially append it
    to the</st> `<st c="27327">conversation_history</st>` <st c="27347">list along
    with the</st> `<st c="27368">"user"</st>` <st c="27374">role identifier to indicate
    that it originated from</st> <st c="27427">the user:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'ai_response = response.choices[0].message.content <st c="27907">conversation_history.append({"role":
    "assistant", "content": ai_response})</st> return ai_response'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="28000">In the context of the ChatGPT API,</st> `<st c="28036">"assistant"</st>`
    <st c="28047">refers to the role played by the AI model, responsible for generating
    responses, whereas</st> `<st c="28137">"user"</st>` <st c="28143">signifies the
    human interacting with the AI, providing input</st> <st c="28205">or queries.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="28216">Now that we’ve implemented conversation history retention in our
    ChatGPT clone, it’s essential to test and validate its functionality.</st> <st
    c="28352">We’ll perform a series of interactions with our application to confirm
    that the conversation history is indeed being retained and utilized in</st> <st
    c="28494">subsequent responses.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="28515">Here is the testing</st> <st c="28536">procedure of the ChatGPT</st>
    <st c="28561">Clone app:</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '**<st c="28571">Initial interaction</st>**<st c="28591">: Start by initiating
    a conversation with the ChatGPT clone.</st> <st c="28653">Send a message or ask
    a question to trigger the</st> <st c="28701">AI’s response.</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**<st c="28715">Observing conversation history</st>**<st c="28746">: After
    receiving the AI’s response, observe the contents of the conversation history.</st>
    <st c="28834">Ensure that both the user’s messages and the AI’s responses are</st>
    <st c="28898">correctly stored.</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**<st c="28915">Subsequent interactions</st>**<st c="28939">: Continue the
    conversation by asking follow-up questions or making related statements.</st>
    <st c="29028">Pay attention to how the AI’s responses evolve based on the context
    established in</st> <st c="29111">previous interactions.</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**<st c="29133">Validation</st>**<st c="29144">: Validate that the AI’s responses
    are coherent and relevant, indicating that it’s utilizing the conversation history
    to</st> <st c="29266">maintain context.</st>'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="29283">In the test scenario provided in</st> *<st c="29317">Figure 2</st>**<st
    c="29325">.5</st>*<st c="29327">, we engaged our ChatGPT clone in a series of
    interactions to assess its ability to retain and utilize conversation history
    effectively.</st> <st c="29464">Initially, we introduced ourselves to the AI as
    “Martin” and our favorite programming language as “Python,” prompting it to acknowledge
    our name in subsequent interactions.</st> <st c="29637">The AI successfully remembered
    our name and our favorite programming language and incorporated it into its responses,
    demonstrating its capability to retain user-provided information.</st> <st c="29821">Furthermore,
    when we inquired about our name and favorite programming language, the AI accurately
    recalled it from the conversation history, showcasing its ability to retrieve
    and utilize</st> <st c="30009">contextual information.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 2.5 – ChatGPT clone conversation retention](img/B22414_02_5.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: <st c="30558">Figure 2.5 – ChatGPT clone conversation retention</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="30607">This scenario</st> <st c="30622">underscores the effectiveness
    of our ChatGPT clone in retaining and utilizing conversation history to maintain
    context and deliver relevant responses.</st> <st c="30773">By successfully recalling
    user-provided information and tailoring responses accordingly, the AI enhances
    the conversational experience, fostering a sense of continuity and engagement.</st>
    <st c="30957">Additionally, the AI’s ability to adapt its responses based on user
    preferences and interests showcases its versatility in generating coherent and</st>
    <st c="31104">personalized interactions.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="31130">Summary</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="31138">In this chapter of the book, you were introduced to the process
    of building a ChatGPT clone, which is a chatbot that utilizes OpenAI’s language
    model to generate human-like responses to user input.</st> <st c="31337">The application
    was built using Flask, a lightweight web framework for Python, and was customizable
    to allow for the use of different OpenAI models and other options such as the
    length of the</st> <st c="31529">generated text.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="31544">We also covered topics such as creating and generating the frontend
    HTML for the ChatGPT clone, intercepting ChatGPT API endpoints, passing user input
    from the frontend to the backend using AJAX, and displaying the generated text
    in</st> <st c="31778">the frontend.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="31791">We learned how to retain conversation history to enable our ChatGPT
    clone to become more contextually aware, providing more coherent and relevant
    responses based on</st> <st c="31957">previous interactions.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="31979">In</st> [*<st c="31983">Chapter 3</st>*](B22414_03.xhtml#_idTextAnchor046)<st
    c="31992">, you will learn how to create and deploy an AI-powered code bug-fixing
    SaaS application using Flask and the ChatGPT language model.</st> <st c="32125">You
    will become proficient in using the ChatGPT API.</st> <st c="32178">You will learn
    how to create a web form that accepts user inputs, deploy the application to the
    Azure cloud platform, and integrate it with a WordPress website.</st> <st c="32339">After
    completing the chapter, you will have the necessary skills to make a ChatGPT application
    accessible to</st> <st c="32448">individuals worldwide.</st>
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
