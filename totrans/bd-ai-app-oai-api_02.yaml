- en: <st c="2">Building a ChatGPT Clone</st>
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建一个ChatGPT克隆
- en: <st c="26">The first application in this chapter and this book is going to</st>
    <st c="91">be a</st> **<st c="96">ChatGPT clone</st>** <st c="109">that utilizes
    OpenAI’s powerful language model to generate human-like responses to user input.</st>
    <st c="205">The application will</st> <st c="226">be built using</st> **<st c="241">Flask</st>**<st
    c="246">, a lightweight web framework for Python, and will feature a simple and
    elegant frontend interface for users to interact with.</st> <st c="373">With just
    a few lines of code, users will be able to input their text and receive a response
    generated by the OpenAI language model.</st> <st c="506">Specifically, the application
    will be able to render a simple browser chat interface to interact with a chatbot.</st>
    <st c="619">The chatbot will accept user input and send it to the ChatGPT API,
    display the response from the ChatGPT API to the user, and show</st> <st c="750">chat
    history.</st>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章和本书的第一个应用将是一个**<st c="96">ChatGPT克隆</st>**，它利用OpenAI强大的语言模型对用户输入生成类似人类的响应。<st
    c="226">该应用将使用**<st c="241">Flask</st>**<st c="246">构建，这是一个用于Python的轻量级Web框架，并具有简单优雅的前端界面，供用户与之交互。</st>
    <st c="373">只需几行代码，用户就可以输入文本并接收由OpenAI语言模型生成的响应。</st> <st c="506">具体来说，该应用将能够渲染一个简单的浏览器聊天界面，与聊天机器人进行交互。</st>
    <st c="619">聊天机器人将接受用户输入并将其发送到ChatGPT API，向用户显示ChatGPT API的响应，并显示聊天历史。</st>
- en: <st c="763">The clone app will be able to take in a user’s input, send it to
    OpenAI’s API, and receive a response, which will be displayed to the user in real
    time.</st> <st c="917">The app will be customizable to allow for the use of different
    OpenAI models and other options such as the length of the</st> <st c="1038">generated
    text.</st>
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 克隆应用将能够接收用户的输入，将其发送到OpenAI的API，并实时接收响应，这些响应将显示给用户。<st c="917">该应用将可定制，以便使用不同的OpenAI模型以及其他选项，例如生成的文本的长度。</st>
- en: <st c="1053">Initially, our chatbot will lack the ability to maintain a contextual
    conversation.</st> <st c="1138">While it will generate responses based on individual
    queries, it will not possess the memory to retain information from previous interactions.</st>
    <st c="1281">Then, we will be introduced to a simple yet efficient technique to
    help our chatbot keep the conversation context, using the dictionary structure
    and roles of the GPT-3.5 model.</st> <st c="1459">We will explore techniques and
    tools that enable our chatbot to understand and respond coherently within the
    context of an</st> <st c="1582">ongoing dialogue.</st>
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，我们的聊天机器人将缺乏维持上下文对话的能力。<st c="1138">虽然它将根据单个查询生成响应，但它将不具备保留先前交互信息的记忆。</st>
    <st c="1281">然后，我们将介绍一种简单而有效的技术，帮助我们的聊天机器人保持对话上下文，使用GPT-3.5模型的字典结构和角色。</st> <st
    c="1459">我们将探讨使我们的聊天机器人在进行中的对话上下文中理解和连贯响应的技术和工具。</st>
- en: <st c="1599">In this chapter, we will cover the</st> <st c="1635">following
    topics:</st>
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
