- en: <st c="5947">With these steps, you can build a basic Flask application that
    displays</st> `<st c="6020">Hello, World!</st>` <st c="6033">when a user visits
    the root URL of the application.</st> <st c="6086">From here, you can add more
    routes, templates, and functionality to your Flask app to build more complex web
    applications with the ChatGPT API (see</st> *<st c="6234">Figure 2</st>**<st c="6242">.2</st>*<st
    c="6244">).</st>
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5947">按照这些步骤，你可以构建一个基本的 Flask 应用程序，当用户访问应用程序的根 URL 时，它会显示</st> `<st c="6020">Hello,
    World!</st>` <st c="6033">。</st> <st c="6086">从这里，你可以向 Flask 应用程序添加更多路由、模板和功能，使用
    ChatGPT API 构建更复杂的 Web 应用程序（见图 <st c="6234">图 2</st>**<st c="6242">.2</st>*<st
    c="6244">）。</st>
- en: '![Figure 2.2 – Flask application page](img/B22414_02_2.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.2 – Flask 应用程序页面](img/B22414_02_2.jpg)'
- en: <st c="6270">Figure 2.2 – Flask application page</st>
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="6270">图 2.2 – Flask 应用程序页面</st>
- en: <st c="6305">Every ChatGPT application starts with setting up your API key.</st>
    <st c="6369">When using ChatGPT API keys in a Python file, you would typically
    hardcode the keys directly into the file, just like you did when building a simple
    ChatGPT API response, which means the key is visible in the code itself.</st>
    <st c="6591">This can be a security risk if someone gains access to the code or
    if you accidentally push your code to a</st> <st c="6698">public repository.</st>
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="6305">每个 ChatGPT 应用程序都从设置你的 API 密钥开始。</st> <st c="6369">当在 Python 文件中使用
    ChatGPT API 密钥时，你通常会直接将密钥硬编码到文件中，就像你在构建简单的 ChatGPT API 响应时做的那样，这意味着密钥在代码本身中是可见的。</st>
    <st c="6591">如果有人获取了代码或你意外地将代码推送到公共仓库，这可能会带来安全风险。</st>
- en: <st c="6716">On the other hand, adding the ChatGPT API key as an environment
    variable means that the key is</st> <st c="6812">stored outside the code base
    and can be accessed by the code at runtime.</st> <st c="6885">This makes it more
    secure because the key is not visible</st> <st c="6942">in the code itself and
    can be changed easily without modifying</st> <st c="7005">the code.</st>
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="6716">另一方面，将ChatGPT API密钥作为环境变量添加意味着密钥存储在代码库之外，并且可以在运行时由代码访问。</st> <st
    c="6812">这使得它更安全，因为密钥不在代码本身中可见，并且可以轻松更改而无需修改</st> <st c="7005">代码。</st>
