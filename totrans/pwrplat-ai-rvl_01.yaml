  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: Introduction to AI Services
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能服务简介
- en: In the last few years, the field of **artificial intelligence** (**AI**) has
    undergone remarkable advancements, revolutionizing various domains and reshaping
    the way we think about and interact with technology. One particularly fascinating
    branch of AI that has gained significant attention recently is **Generative AI**.
    By enabling machines to exhibit creativity (or, more specifically, the appearance
    of creativity), Generative AI has opened up new frontiers in areas such as art,
    music, design, and storytelling, in addition to chat and human interaction.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，人工智能（AI）领域取得了显著的进步，彻底改变了各个领域，并重塑了我们思考和技术互动的方式。最近引起广泛关注的一个特别迷人的AI分支是**生成式AI**。通过使机器展现出创造力（或者更具体地说，创造力的外观），生成式AI在艺术、音乐、设计和讲故事等领域开辟了新的前沿，除了聊天和人类交互。
- en: Before we get too ahead of ourselves, let’s talk about some core concepts to
    help shed some light on how all this works.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们过于深入之前，让我们先讨论一些核心概念，以帮助大家了解这一切是如何运作的。
- en: What do all these AI terms mean? Generative AI, in particular, refers to a class
    of algorithms and models that can autonomously generate new and (somewhat) original
    content. Unlike traditional AI systems, which rely on pre-defined rules or explicit
    instructions, Generative AI systems are designed to learn from patterns and existing
    data to produce novel outputs. These systems leverage deep learning techniques,
    such as **generative adversarial networks** (**GANs**), **variational autoencoders**
    (**VAEs**), and **recurrent neural networks** (**RNNs**), to emulate the creative
    processes of the human mind.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些AI术语是什么意思？特别是，生成式AI指的是一类可以自主生成新内容（某种程度上是原创内容）的算法和模型。与依赖于预定义规则或明确指令的传统AI系统不同，生成式AI系统旨在从模式和现有数据中学习，以产生新颖的输出。这些系统利用深度学习技术，如**生成对抗网络**（GANs）、**变分自编码器**（VAEs）和**循环神经网络**（RNNs），来模拟人类大脑的创造性过程。
- en: 'As you’ll see, AI has a lexicon all its own. What do we mean when we say things
    such as *generative adversarial networks* and *variational autoencoders*? Let’s
    make a quick detour and define some of the terms that we’re going to use:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你们将看到的，AI有自己的词汇表。当我们说诸如*生成对抗网络*和*变分自编码器*之类的术语时，我们指的是什么？让我们快速偏离一下，定义一下我们将要使用的术语：
- en: '**Algorithm**: An algorithm is a set of rules (typically expressed in a computer
    programming language) that are followed when solving problems.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**算法**：算法是一组规则（通常用计算机编程语言表达），在解决问题时遵循这些规则。'
- en: '**Neural network**: When we talk about neural networks, we’re talking about
    computer systems and interactions that are modeled on our understanding of the
    human brain and nervous system. Like the human brain, the fundamental building
    blocks of artificial neural networks are referred to as neurons (nodes), each
    of which connects to other nodes. The connections have concepts of weight and
    bias, and when inputs reach certain thresholds, they flip on the next node in
    the chain. Imagine a neural network as layers of nodes arranged in grids, with
    each node connecting to multiple nodes on the adjacent layer, and each node’s
    output being used to influence the input in the adjacent layer’s nodes.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**神经网络**：当我们谈论神经网络时，我们指的是基于我们对人类大脑和神经系统的理解而构建的计算机系统和交互。像人类大脑一样，人工神经网络的基本构建块被称为神经元（节点），每个节点都连接到其他节点。这些连接具有权重和偏差的概念，当输入达到某个阈值时，它们会在链中的下一个节点上翻转。想象一下，神经网络就像由节点组成的网格层，每个节点连接到相邻层上的多个节点，每个节点的输出被用来影响相邻层节点的输入。'
- en: '**GAN**: A GAN is comprised of two neural networks that compete based on the
    same source data. GANs can create synthetic data that is unique but imitates the
    seed data.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GAN**：GAN由两个基于相同源数据的神经网络组成，它们通过竞争来相互对抗。GAN可以创建独特但模仿种子数据的合成数据。'
- en: '**VAE**: A VAE is an algorithm that has two functions. The first takes a complex
    data structure and then stores a more simplified version of it with some amount
    of randomness, while the second takes the simplified version and then generates
    a more complex output. Imagine the encode function as taking a high-resolution
    picture of a tree, downscaling it (so that it still looks like a tree but is missing
    some data and possibly looks blurry), and adding a few random pixels to it. When
    the decode function is activated, it retrieves the simplified data that’s stored
    and uses it to reconstitute a more high-resolution image of a tree. The new picture
    looks similar to the original, but partially due to the loss incurred through
    the simplification of original data and partially due to the insertion of some
    amount of randomness by the encoder, the new picture is also different.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VAE**：VAE是一种具有两个功能的算法。第一个功能将复杂的数据结构转换为一个更简化的版本，其中包含一定程度的随机性，而第二个功能则从简化的版本生成一个更复杂的结果。想象一下编码函数就像对一棵树进行高分辨率拍照，将其下采样（使其仍然看起来像一棵树，但可能缺少一些数据并且可能看起来有些模糊），并添加一些随机像素。当解码函数被激活时，它检索存储的简化数据，并使用它来重新构建一棵树的高分辨率图像。新的图片看起来与原始图片相似，但部分原因是由于原始数据简化的损失，部分原因是编码器插入了一定程度的随机性，新的图片也有所不同。'
- en: '**RNN**: An RNN is a type of artificial neural network that can process sequential
    data by preserving information from previous steps.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RNN**：RNN是一种可以处理序列数据的人工神经网络，它通过保留之前步骤的信息来处理。'
- en: '**AI model**: An AI model is a mathematical algorithm that mimics human intelligence,
    processing data to make predictions and generate outputs. It learns from training
    data to perform specific tasks such as image recognition or natural language processing.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI模型**：AI模型是一种模仿人类智能的数学算法，通过处理数据来做出预测和生成输出。它通过训练数据学习执行特定任务，如图像识别或自然语言处理。'
- en: '**Large language model**: A large language model is a type of AI model that
    is designed to understand and generate coherent and contextually relevant, human-like
    text. The popular ChatGPT is an example of a large language model.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大型语言模型**：大型语言模型是一种AI模型，旨在理解和生成连贯且与上下文相关的、类似人类的文本。流行的ChatGPT就是一个大型语言模型的例子。'
- en: There are many more complex concepts (including many more types of neural networks
    and AI models) behind deep learning and AI systems.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习和AI系统背后还有许多更复杂的概念（包括更多类型的神经网络和AI模型）。
- en: 'In addition to Generative AI, many types of AI models are currently in use
    today, such as those designed to do the following:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 除了生成式AI之外，目前还有许多类型的AI模型正在使用，例如那些被设计来完成以下任务：
- en: Estimate shipping routes
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 估算航运路线
- en: Predict traffic patterns and congestion
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测交通模式和拥堵
- en: Find weather anomalies
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找天气异常
- en: Identify objects in pictures
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别图片中的物体
- en: Each of these different types of models depends on vast quantities of existing
    data and purpose-built algorithms, combined with training procedures to help the
    models “learn” how to predict or identify things.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不同类型的模型都依赖于大量现有数据和专门设计的算法，以及训练程序来帮助模型“学习”如何预测或识别事物。
- en: Throughout this book, we’ll be using a variety of AI technologies – from prebuilt,
    purpose-oriented models to Generative AI. By the time you reach the final examples
    and exercises, I hope you’ll have some exciting ideas on how you can accelerate
    your team, organization, or even personal life with AI.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们将使用各种AI技术——从预构建、以特定目的为导向的模型到生成式AI。当你到达最后的示例和练习时，我希望你会有一些关于如何利用AI加速你的团队、组织甚至个人生活的激动人心的想法。
- en: What kinds of things can Generative AI do?
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式AI可以做哪些事情？
- en: The remarkable power of Generative AI lies in its ability to create realistic
    and diverse outputs that exhibit human-like creativity. For instance, in the area
    of visual arts, Generative AI can produce lifelike paintings, generate photorealistic
    images, or even assist in designing new products with particular aesthetics. In
    music composition, Generative AI algorithms can compose original melodies and
    harmonies, imitating the style of different composers or creating entirely new
    musical genres. Similarly, in the realm of storytelling, Generative AI can develop
    compelling narratives, write poetry, or generate realistic dialogue.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的显著力量在于其创造真实多样输出并展现类似人类创造力的能力。例如，在视觉艺术领域，生成式AI可以创作逼真的画作，生成逼真的图像，甚至帮助设计具有特定美学的新产品。在音乐创作中，生成式AI算法可以创作原创旋律和和声，模仿不同作曲家的风格或创造全新的音乐流派。同样，在叙事领域，生成式AI可以开发引人入胜的故事，写诗，或生成逼真的对话。
- en: The impact of Generative AI extends far beyond artistic and creative pursuits.
    It has already found applications in various fields, including data augmentation,
    synthetic data generation, video game design, and drug discovery. Generative AI
    techniques can also aid in enhancing existing content, enabling the creation of
    high-quality image upscaling, text summarization, and even voice synthesis that
    closely resembles human speech! The future of what AI can do is only limited by
    the creativity of the people building and training the models.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的影响远远超出了艺术和创造性追求。它已经在包括数据增强、合成数据生成、视频游戏设计和药物发现等各个领域找到了应用。生成式AI技术还可以帮助增强现有内容，实现高质量的图像放大、文本摘要，甚至生成与人类语音非常相似的语音合成！AI能够做到的未来仅限于构建和训练模型的人们的创造力。
- en: However, Generative AI is not without its challenges. Ethical concerns, such
    as the potential for misuse or the propagation of biased content, need to be addressed.
    Striking the right balance between the creativity of the AI system and its alignment
    with societal values is a crucial aspect that requires careful consideration.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，生成式AI并非没有挑战。如滥用或传播有偏见内容的潜在问题等伦理问题需要解决。在AI系统的创造力和其与社会价值观的一致性之间找到正确的平衡是一个需要仔细考虑的关键方面。
- en: Ethical and responsible AI
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 道德和负责任的AI
- en: The responsible use of AI is critical to ensuring its success in the marketplace.
    Responsible AI includes concepts such as fairness (treating every user equitably),
    inclusiveness (making sure people of all races, genders, and abilities are empowered
    to use the systems), transparency (understanding how the AI models reached their
    conclusions), and accountability (ensuring people can be held responsible for
    an AI system’s decisions).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 负责任地使用AI对于确保其在市场上的成功至关重要。负责任的AI包括公平（公平对待每一位用户）、包容性（确保所有种族、性别和能力的人都有权使用系统）、透明度（理解AI模型如何得出结论）和问责制（确保人们可以为AI系统的决策承担责任）。
- en: Responsible AI design and use covers all aspects of all AI systems, from machine
    learning models having representative data samples that don’t hold biases toward
    nationalities or genders to ensuring Generative AI doesn’t get used for creating
    likenesses of people (sometimes called **deepfakes**) without their consent.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 负责任的AI设计和使用涵盖了所有AI系统的各个方面，从机器学习模型具有代表性的数据样本且不持有对国籍或性别的偏见，到确保生成式AI在没有得到同意的情况下不被用于创建人们的肖像（有时称为**深度伪造**）。
- en: 'Microsoft, in part, has been working on establishing principles for ethical
    and responsible AI. You can read more about their commitments here: [https://www.microsoft.com/en-us/ai/responsible-ai](https://www.microsoft.com/en-us/ai/responsible-ai).'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 微软在部分程度上一直在致力于建立道德和负责任的AI原则。您可以在以下链接中了解更多关于他们的承诺：[https://www.microsoft.com/en-us/ai/responsible-ai](https://www.microsoft.com/en-us/ai/responsible-ai)。
- en: Overall, though, Generative AI represents a significant breakthrough in working
    toward AI. By harnessing the power of machine learning and deep neural networks,
    Generative AI systems can unlock new realms of creativity and innovation, business
    automation, and human-to-computer interaction.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，生成式AI代表了在AI领域的一个重大突破。通过利用机器学习和深度神经网络的力量，生成式AI系统可以开启新的创造力和创新领域，商业自动化以及人机交互。
- en: 'Not to mention, it’s also unleashing many ninja cat dinosaur mashups:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 不提这些，它还在释放许多忍者猫恐龙混合体：
- en: '![Figure 1.1 – Bing Image Creator, powered by DALL-E](img/B21234_01_01.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图1.1 – 由DALL-E驱动的Bing图像创建器](img/B21234_01_01.jpg)'
- en: Figure 1.1 – Bing Image Creator, powered by DALL-E
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.1 – Bing 图像创建者，由 DALL-E 提供支持
- en: Let’s shift gears to understanding how various types of AI might be used in
    the context of business – specifically, with Microsoft’s Power Platform.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们转换一下思路，了解各种类型的 AI 在商业环境中的应用，特别是与微软的 Power Platform 相关的应用。
- en: What is Power Platform?
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是 Power Platform？
- en: 'Power Platform is a comprehensive suite of **low-code** and **no-code** tools
    that’s designed to empower individuals and organizations to create custom business
    applications, automate processes, analyze data, and develop virtual agents. It
    consists of four main components:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 是一套全面的 **低代码** 和 **无代码** 工具套件，旨在赋予个人和组织创建定制业务应用、自动化流程、分析数据和开发虚拟代理的能力。它由四个主要组件组成：
- en: '**Power Apps**: This component enables users to build web and mobile applications
    with drag-and-drop functionality, all while connecting to various data sources.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Apps**：此组件使用户能够通过拖放功能构建网页和移动应用程序，同时连接到各种数据源。'
- en: '**Power Automate**: Formerly known as Microsoft Flow, it allows the creation
    of automated workflows, integrating and synchronizing data and processes across
    multiple applications and services. Power Automate has expanded from being a cloud-only
    process automation platform to including process mining and **robotic process**
    **automation** (**RPA**).'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Automate**：之前称为 Microsoft Flow，它允许创建自动化工作流，整合和同步多个应用程序和服务之间的数据和流程。Power
    Automate 已从仅作为云端的流程自动化平台扩展到包括流程挖掘和 **机器人流程** **自动化**（**RPA**）。'
- en: '**Power BI**: This component provides robust data analytics and visualization
    capabilities, transforming raw data into meaningful insights and interactive reports.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power BI**：此组件提供强大的数据分析可视化功能，将原始数据转化为有意义的见解和交互式报告。'
- en: '**Copilots**: This component allows intelligent chatbots to be created without
    the need to code, enabling organizations to provide instant support and engagement
    with customers.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Copilots**：此组件允许创建无需编码的智能聊天机器人，使组织能够提供即时支持和与客户的互动。'
- en: Together, these tools empower users of all skill levels to drive digital transformation,
    improve productivity, and innovate within their organizations. This book will
    focus primarily on integrating AI services and models with the Power Automate,
    Power App, and Copilots components of Power Platform.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具共同赋予所有技能水平的用户推动数字化转型、提高生产力和在其组织中创新的能力。本书将主要关注将 AI 服务和模型与 Power Platform
    的 Power Automate、Power App 和 Copilots 组件集成。
- en: What is no-code or low-code software?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是无代码或低代码软件？
- en: Microsoft bills the Power Platform tools as a development environment that encourages
    **no-code** and **low-code** solutions. So, what are those? No-code is just like
    it sounds – a way for creators to assemble a solution from widgets, components,
    or modules in a **what-you-see-is-what-you-get** (**WYSIWYG**) fashion. No formal
    development experience is necessary to generate a working solution.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 微软将 Power Platform 工具定位为一个鼓励 **无代码** 和 **低代码** 解决方案的开发环境。那么，这些是什么？无代码正如其名——创作者从小部件、组件或模块中组装解决方案的一种
    **所见即所得**（**WYSIWYG**）的方式。生成一个可工作的解决方案不需要正式的开发经验。
- en: Low-code software, which is one step up, involves using a simplified development
    language in conjunction with the available connectors or modules. Power Platform
    leverages a language called **Power Fx**, which is similar in structure to the
    syntax that’s used by popular Office macros or spreadsheet formulas.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 低代码软件，比无代码软件高一个层次，涉及使用简化的开发语言与可用的连接器或模块结合使用。Power Platform 利用一种名为 **Power Fx**
    的语言，其结构类似于流行 Office 宏或电子表格公式的语法。
- en: Power Platform tools can also support **pro-code** or **code-first** authoring
    (which is decidedly the opposite of the low-code or no-code methodology), meaning
    you can interface with REST API interfaces or use traditional development environments
    such as Visual Studio.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 工具还可以支持 **代码优先** 或 **代码优先** 的创作（这与低代码或无代码方法截然相反），这意味着您可以与 REST
    API 接口交互或使用传统的开发环境，如 Visual Studio。
- en: Learning about Power Automate
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 了解 Power Automate
- en: Power Automate is a workflow and process automation tool. As a no-code/low-code
    solution, Power Automate relies on various components or building blocks to create
    automation.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: Power Automate 是一个工作流和流程自动化工具。作为一个无代码/低代码解决方案，Power Automate 依赖于各种组件或构建块来创建自动化。
- en: 'Here’s a quick list of some of the terminology you’ll see in this book as it
    relates to Power Automate:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些与 Power Automate 相关的术语列表，您将在本书中看到：
- en: '**Flow**: The basic unit of Power Automate, flows are logical groupings of
    connectors, conditions, and tasks that are used to perform an automation'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流程**：Power Automate 的基本单元，流程是由连接器、条件和任务组成的逻辑分组，用于执行自动化操作。'
- en: '**Connector**: Connectors are configuration components that are used to define
    the necessary parameters to communicate with services and apps'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**连接器**：连接器是配置组件，用于定义与服务和应用程序通信所需的参数。'
- en: '**Trigger**: A trigger is an event or activity that causes a flow to begin,
    such as *When a new file is created* or *When a row is added to a SQL* *database
    table*'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**触发器**：触发器是导致流程开始的事件或活动，例如 *当创建新文件时* 或 *当向 SQL 数据库表添加一行时*。'
- en: '**Actions**: Actions are the logical steps or units that describe the actions
    and evaluations being performed, such as *Copy a file*, *Check if the value is
    greater than or equal to*, or *Add a row to a SQL* *database table*'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**操作**：操作是描述正在执行的动作和评估的逻辑步骤或单元，例如 *复制文件*、*检查值是否大于或等于* 或 *向 SQL 数据库表添加一行*。'
- en: We’ll use Power Automate in many of the exercises and examples throughout this
    book.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本书的许多练习和示例中使用 Power Automate。
- en: Further reading
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: To learn more about Power Automate, check out *Workflow Automation with Microsoft
    Power Automate, Second* *Edition* ([https://www.packtpub.com/product/workflow-automation-with-microsoft-power-automate-second-edition/9781803237671](https://www.packtpub.com/product/workflow-automation-with-microsoft-power-automate-second-edition/9781803237671)).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于 Power Automate 的信息，请查看 *《使用 Microsoft Power Automate 进行工作流自动化，第二版》*
    ([https://www.packtpub.com/product/workflow-automation-with-microsoft-power-automate-second-edition/9781803237671](https://www.packtpub.com/product/workflow-automation-with-microsoft-power-automate-second-edition/9781803237671))。
- en: Learning about Copilots
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 了解协作者
- en: '**Copilot** technology (not to be confused with *Copilot for something*) empowers
    users to design and deploy chatbots to interact with people, providing instant
    support and engagement. With a visual interface and pre-built templates, creators
    can easily define conversation flows, connect and integrate with various systems,
    and train the chatbot using **natural language** **understanding** (**NLU**).'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**协作者**技术（不要与 *某物的协作者* 混淆）赋予用户设计和部署聊天机器人的能力，以与人们互动，提供即时支持和参与。通过可视化界面和预构建模板，创作者可以轻松定义对话流程，连接和集成各种系统，并使用
    **自然语言理解**（**NLU**）来训练聊天机器人。'
- en: So many copilots
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 有这么多协作者
- en: We’ll try to keep things straightforward, but Microsoft has infused its products
    with the copilot nomenclature. There’s **Microsoft 365 Copilot** (a Generative
    AI assistant that’s built into the Microsoft 365 experience), **Copliot in Viva
    Sales** (a Generative AI assistant that connects Outlook and other collaboration
    workloads with Dynamics CRM), and **Copilot for Security** (an AI assistant for
    threat hunting and management).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将尽量使事情简单明了，但微软在其产品中融入了协作者的命名法。有 **Microsoft 365 协作者**（一个内置在 Microsoft 365
    体验中的生成式 AI 助手）、**Viva Sales 中的协作者**（一个连接 Outlook 和其他协作工作负载与 Dynamics CRM 的生成式
    AI 助手）以及 **安全协作者**（一个用于威胁搜索和管理的 AI 助手）。
- en: Power Platform has its own set of copilot features, including **AI Copilot**
    (an AI-enabled generative assistant for creating Power Apps and Flows) and **Copilot
    Studio**, the web interface that’s used to create – you guessed it – copilots.
    **Copilots** (in Copilot Studio) are the revamped Power Virtual Agents – chatbots
    that can be enabled to provide answers and initiate workflows in other applications.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 有自己的协作者功能集，包括 **AI 协作者**（一个用于创建 Power Apps 和流程的 AI 启用生成式助手）和
    **协作者工作室**，这是一个用于创建——您猜对了——协作者的网络界面。**协作者**（在协作者工作室中）是经过改进的 Power Virtual Agents——聊天机器人，可以启用以在其他应用程序中提供答案和启动工作流。
- en: 'Since we’re going to be using copilots in some of the exercises in this book,
    you’ll want to be familiar with their terminology, too:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将在本书的一些练习中使用协作者，您也需要熟悉它们的术语：
- en: '**Topics**: Topics represent the main areas or subjects that your chatbot can
    handle. Each topic consists of triggers, actions, and responses to guide the conversation
    flow.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主题**：主题代表您的聊天机器人可以处理的主要领域或主题。每个主题都包含触发器、操作和响应，以引导对话流程。'
- en: '**Triggers**: Triggers are conditions or user inputs that initiate a conversation
    or direct it to a specific topic. They can be based on keywords, phrases, or system
    events.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**触发器**：触发器是启动对话或将其引导到特定主题的条件或用户输入。它们可以基于关键词、短语或系统事件。'
- en: '**Actions**: Actions are the steps or operations that the chatbot performs
    in response to user inputs or triggers. They can include sending messages, asking
    questions, calling APIs, or performing calculations.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**操作**：操作是聊天机器人针对用户输入或触发器执行的操作或步骤。它们可以包括发送消息、提问、调用 API 或执行计算。'
- en: '**Entities**: Entities are pieces of information that the chatbot can extract
    from user inputs.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实体**：实体是聊天机器人可以从用户输入中提取的信息片段。'
- en: '**Responses**: Responses are the messages or content that the chatbot generates
    to communicate with users.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应**：响应是聊天机器人用于与用户沟通的消息或内容。'
- en: Copilots can be deployed to a variety of locations and interfaces, including
    websites and Microsoft Teams.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: Copilots 可以部署到各种位置和界面，包括网站和 Microsoft Teams。
- en: Further reading
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: For more information on Copilots, please read *Empowering Organizations with
    Power Virtual* *Agents* ([https://www.packtpub.com/product/empowering-organizations-with-power-virtual-agents/9781801074742](https://www.packtpub.com/product/empowering-organizations-with-power-virtual-agents/9781801074742)).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多关于 Copilots 的信息，请阅读《Empowering Organizations with Power Virtual Agents》：[https://www.packtpub.com/product/empowering-organizations-with-power-virtual-agents/9781801074742](https://www.packtpub.com/product/empowering-organizations-with-power-virtual-agents/9781801074742).
- en: Learning about Power Apps
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 了解 Power Apps
- en: The Power Apps component of Power Platform enables users to create custom web
    and mobile applications without extensive coding knowledge. It offers a low-code
    development environment where users can visually design app interfaces, define
    data sources, and add functionality through a wide range of pre-built connectors.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 的 Power Apps 组件使用户能够在没有广泛编码知识的情况下创建自定义的网页和移动应用程序。它提供了一个低代码开发环境，用户可以在其中通过可视设计应用程序界面、定义数据源以及通过一系列预构建的连接器添加功能。
- en: 'Like Power Automate and Copilots, Power Apps has terminology that you should
    know about:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Power Automate 和 Copilots 一样，Power Apps 有一些术语您应该了解：
- en: '**Screens**: Screens are the building blocks of an app and represent different
    views or pages. Each screen can contain various controls and components.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**屏幕**：屏幕是应用程序的构建块，代表不同的视图或页面。每个屏幕可以包含各种控件和组件。'
- en: '**Controls**: Controls are the interactive elements that are used to display
    data, capture user input, or trigger actions. Examples include text boxes, buttons,
    galleries, forms, and charts.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**控件**：控件是用于显示数据、捕获用户输入或触发操作的交互式元素。示例包括文本框、按钮、库、表单和图表。'
- en: '**Data sources**: Data sources are the places where app data is stored, such
    as SharePoint, Microsoft Dataverse (formerly Common Data Service), Excel, SQL
    databases, or external systems via connectors.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据源**：数据源是应用程序数据存储的地方，例如 SharePoint、Microsoft Dataverse（以前称为 Common Data
    Service）、Excel、SQL 数据库或通过连接器的外部系统。'
- en: '**Formulas**: Power Apps uses formulas (the Power Fx language) to perform calculations,
    manipulate data, and control app behavior. Formulas can be used in properties,
    events, and actions.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公式**：Power Apps 使用公式（Power Fx 语言）进行计算、操作数据和控制应用程序行为。公式可用于属性、事件和操作中。'
- en: '**Data cards**: Data cards are containers for data entry controls within forms.
    They represent fields from a data source and enable users to view and edit data.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据卡**：数据卡是表单内数据输入控件的容器。它们代表数据源的字段，并使用户能够查看和编辑数据。'
- en: '**Galleries**: Galleries are controls that are used to display lists or collections
    of data. They can be customized to show data in different layouts, such as a table
    or a gallery with cards.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**库**：库是用于显示列表或数据集合的控件。它们可以根据需要定制，以显示不同的布局，例如表格或卡片库。'
- en: One of the most exciting new features of Power Platform is the *Describe it
    to design it* feature, which allows you to use natural language to build a framework
    for a Power App. We’ll explore that a little bit in [*Chapter 5*](B21234_05.xhtml#_idTextAnchor057),
    *Bootstrapping a Power App* *with Copilot*.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 最令人兴奋的新功能之一是“描述以设计”功能，它允许您使用自然语言为 Power App 建立框架。我们将在 [*第 5 章*](B21234_05.xhtml#_idTextAnchor057)，*使用
    Copilot 引导 Power App* 中稍作探讨。
- en: Further reading
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: 'For more information on creating apps with Microsoft Power Apps, check out
    *Learn Microsoft Power Apps, Second* *Edition*: [https://www.packtpub.com/product/learn-microsoft-power-apps-second-edition/9781801070645](https://www.packtpub.com/product/learn-microsoft-power-apps-second-edition/9781801070645).'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多关于使用 Microsoft Power Apps 创建应用程序的信息，请查看《Learn Microsoft Power Apps, Second
    Edition》：[https://www.packtpub.com/product/learn-microsoft-power-apps-second-edition/9781801070645](https://www.packtpub.com/product/learn-microsoft-power-apps-second-edition/9781801070645).
- en: Learning about AI Builder technologies
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 了解 AI Builder 技术
- en: AI Builder is the original AI component of Power Platform and allows users to
    incorporate AI capabilities into their Power Apps and Power Automate workflows.
    It enables users, even those without extensive AI expertise, to build and deploy
    AI models for common business scenarios.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: AI Builder 是 Power Platform 的原始 AI 组件，允许用户将 AI 能力集成到他们的 Power Apps 和 Power Automate
    工作流程中。它使即使没有广泛 AI 专业知识的使用者也能构建和部署用于常见业务场景的 AI 模型。
- en: Working with prebuilt models
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用预构建模型
- en: AI Builder offers a set of prebuilt models and samples that can be customized
    to meet specific needs. These models cover various AI capabilities, such as form
    processing, object detection, prediction, text classification, and sentiment analysis.
    Users can train and refine these models using their data or leverage existing
    data connectors.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: AI Builder 提供了一系列预构建模型和示例，这些模型可以根据特定需求进行定制。这些模型涵盖了各种 AI 能力，如表单处理、目标检测、预测、文本分类和情感分析。用户可以使用他们的数据训练和优化这些模型，或者利用现有的数据连接器。
- en: With AI Builder, users can automate data extraction from forms, classify and
    predict outcomes, analyze sentiment in text, and identify objects in images. These
    AI capabilities enhance the power and functionality of Power Apps and Power Automate
    – and you’ll get hands-on experience with them in this book!
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 AI Builder，用户可以自动化从表单中提取数据，对结果进行分类和预测，分析文本中的情感，并在图像中识别对象。这些 AI 能力增强了 Power
    Apps 和 Power Automate 的功能和能力——您将在本书中获得实际操作经验！
- en: We’ll be using the sentiment analysis feature in [*Chapter 6*](B21234_06.xhtml#_idTextAnchor069),
    *Processing Data with* *Sentiment Analysis*.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在[*第6章*](B21234_06.xhtml#_idTextAnchor069)“使用情感分析处理数据”中，使用情感分析功能。
- en: We’ll work with the AI Builder document reader in [*Chapter 8*](B21234_08.xhtml#_idTextAnchor099),
    *Building an Event Registration App with* *Identity Verification*.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在[*第8章*](B21234_08.xhtml#_idTextAnchor099)“使用身份验证构建活动注册应用”中，使用 AI Builder
    文档阅读器。
- en: Finally, in [*Chapter 9*](B21234_09.xhtml#_idTextAnchor114), *Implementing an
    AI-Enabled Resume Screener*, you’ll learn how to train an AI Builder model to
    extract key pieces of data from a resume.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在[*第9章*](B21234_09.xhtml#_idTextAnchor114)“实现 AI 驱动的简历筛选器”中，您将学习如何训练 AI Builder
    模型从简历中提取关键数据。
- en: Working with custom models
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用自定义模型
- en: Custom models, in contrast to prebuilt models, allow users to create and train
    their custom AI models tailored to their specific business needs. Where prebuilt
    models are already trained for common scenarios, custom models allow you to train
    models with your data to meet specialized requirements.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 与预构建模型相比，自定义模型允许用户创建和训练符合其特定业务需求的定制 AI 模型。预构建模型已经针对常见场景进行了训练，而自定义模型允许您使用自己的数据来训练模型以满足专业化的需求。
- en: We’ll use a custom model to work with unstructured data in [*Chapter 9*](B21234_09.xhtml#_idTextAnchor114),
    *Building a Resume Screener Using Copilot and* *Power Apps*.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在[*第9章*](B21234_09.xhtml#_idTextAnchor114)“使用 Copilot 和 Power Apps 构建简历筛选器”中，使用自定义模型来处理非结构化数据。
- en: Understanding Power Platform licensing
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解 Power Platform 许可证
- en: 'The licensing structure of Power Platform can be a bit complex, but here’s
    an overview of the main licensing options:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform 的许可结构可能有点复杂，但以下是主要许可选项的概述：
- en: '**Power Apps and Power Automate Free**: There is a free version available for
    Power Apps and Power Automate that provides basic functionality and limited access
    to connectors and features. This licensing plan is sometimes referred to as the
    *seeded offering*.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Apps 和 Power Automate 免费版**：Power Apps 和 Power Automate 提供了一个免费版本，该版本提供基本功能以及对连接器和功能的有限访问。此许可计划有时被称为*种子提供*。'
- en: '**Power Apps and Power Automate per-user plans**: These are paid plans that
    offer enhanced capabilities and more extensive access to connectors and features
    on a per-user basis. These plans are suitable for individual users who need advanced
    functionality and are licensed on a monthly or annual basis.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Apps 和 Power Automate 每用户计划**：这些是付费计划，提供增强功能以及对连接器和功能的更广泛访问，按用户计费。这些计划适用于需要高级功能且按月或按年许可的个人用户。'
- en: '**Power Apps and Power Automate per-app or per-flow plans**: These plans allow
    organizations to license specific apps or flows, rather than licensing individual
    users. They are useful when an organization has a large user base but only a subset
    of users need access to specific apps or flows.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Apps 和 Power Automate 每应用或每流程计划**：这些计划允许组织为特定的应用或流程许可，而不是为单个用户许可。当组织拥有大量用户但只有一小部分用户需要访问特定应用或流程时，这些计划很有用。'
- en: '**Power Apps and Power Automate licensing with Microsoft 365 and Dynamics 365
    plans**: Power Apps and Power Automate are also included in various Microsoft
    365 and Dynamics 365 plans. These plans provide broader access to Power Platform
    capabilities alongside other Microsoft productivity and business applications.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与 Microsoft 365 和 Dynamics 365 计划的 Power Apps 和 Power Automate 许可证**：Power
    Apps 和 Power Automate 也包含在多种 Microsoft 365 和 Dynamics 365 计划中。这些计划提供对 Power Platform
    功能的更广泛访问，同时还包括其他 Microsoft 生产力和企业应用程序。'
- en: It’s important to note that certain premium features, add-ons, connectors, and
    capacity-based usage may require additional licensing or higher-tier plans. Additionally,
    Microsoft regularly updates and refines its licensing options, so it’s recommended
    to consult the official Microsoft licensing documentation or contact Microsoft
    directly for the most up-to-date information on licensing options for Power Platform.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，某些高级功能、附加包、连接器和基于容量的使用可能需要额外的许可证或更高等级的计划。此外，Microsoft 定期更新和改进其许可证选项，因此建议咨询官方
    Microsoft 许可证文档或直接联系 Microsoft 以获取有关 Power Platform 许可证选项的最新信息。
- en: 'AI Builder is a feature that is billed on a capacity model – separate from
    the Power Apps and Power Automate per-user, per-app, or per-flow plans. Here’s
    an overview of the key aspects:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: AI Builder 是一种按容量计费的特性——与 Power Apps 和 Power Automate 每用户、每应用或每流程计划分开。以下是关键方面的概述：
- en: '**Free usage**: AI Builder offers limited usage for free, allowing users to
    explore and experience its basic features without additional cost.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**免费使用**：AI Builder 提供有限的免费使用量，允许用户免费探索和体验其基本功能。'
- en: '**Consumption-based pricing**: When usage surpasses the free limit or requires
    more advanced capabilities, AI Builder capacity licensing comes into play. It
    follows a consumption-based pricing model, where organizations purchase capacity
    to enable AI Builder’s features.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于消费的定价**：当使用量超过免费限制或需要更高级的功能时，AI Builder 容量许可证开始生效。它遵循基于消费的定价模式，组织购买容量以启用
    AI Builder 的功能。'
- en: '**Capacity types**: There are two types of capacity available for AI Builder
    licensing – AI Builder standalone capacity and AI Builder capacity add-on:'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容量类型**：AI Builder 许可证提供两种容量类型——AI Builder 独立容量和 AI Builder 容量附加包：'
- en: '**AI Builder standalone capacity**: This type of capacity is dedicated solely
    to AI Builder and covers the consumption of AI Builder models and services.'
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI Builder 独立容量**：此类容量仅用于 AI Builder，涵盖 AI Builder 模型和服务的消耗。'
- en: '**AI Builder capacity add-on**: This capacity is an add-on for existing Power
    Apps and Power Automate capacity. It allows organizations to extend their existing
    capacity so that it includes AI Builder capabilities.'
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI Builder 容量附加包**：此容量是现有 Power Apps 和 Power Automate 容量的附加包。它允许组织扩展其现有容量，使其包括
    AI Builder 功能。'
- en: '**Capacity units**: AI Builder capacity is measured in capacity units, with
    each unit providing a certain level of compute resources and performance. The
    number of capacity units required depends on the volume of AI Builder usage and
    the complexity of the models being deployed.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容量单位**：AI Builder 容量以容量单位衡量，每个单位提供一定水平的计算资源和性能。所需的容量单位数量取决于 AI Builder 的使用量和部署的模型的复杂性。'
- en: It’s important to consider the total number of users, expected usage, and the
    specific AI Builder features required when determining the appropriate capacity
    licensing for an organization. Organizations may need to allocate sufficient capacity
    units to ensure optimal performance and scalability.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在确定组织的适当容量许可证时，需要考虑用户总数、预期使用量和所需的特定 AI Builder 功能。组织可能需要分配足够的容量单位以确保最佳性能和可扩展性。
- en: For precise details on AI Builder capacity licensing, including pricing, specific
    features, and licensing agreements, it is recommended to refer to the official
    Microsoft documentation or consult with a Microsoft licensing specialist to ensure
    compliance and appropriate licensing for your organization’s needs.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 若要获取关于 AI Builder 容量许可证的精确细节，包括定价、特定功能和许可协议，建议参考官方微软文档或咨询微软许可专家，以确保符合您组织的需求并适当许可。
- en: Further reading
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: For a deeper dive into Power Platform licensing, see [https://learn.microsoft.com/en-us/power-platform/admin/pricing-billing-skus](https://learn.microsoft.com/en-us/power-platform/admin/pricing-billing-skus)
    and [https://learn.microsoft.com/en-us/ai-builder/administer-licensing](https://learn.microsoft.com/en-us/ai-builder/administer-licensing).
    If all that is as clear as mud, you can contact a Microsoft Partner ([https://partner.microsoft.com/en-us/marketing](https://partner.microsoft.com/en-us/marketing/find-microsoft-partners)).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 若要深入了解 Power Platform 许可证，请参阅[https://learn.microsoft.com/en-us/power-platform/admin/pricing-billing-skus](https://learn.microsoft.com/en-us/power-platform/admin/pricing-billing-skus)和[https://learn.microsoft.com/en-us/ai-builder/administer-licensing](https://learn.microsoft.com/en-us/ai-builder/administer-licensing)。如果这一切仍然像泥巴一样模糊不清，您可以联系微软合作伙伴([https://partner.microsoft.com/en-us/marketing](https://partner.microsoft.com/en-us/marketing/find-microsoft-partners))。
- en: Exploring additional AI services
  id: totrans-110
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索其他 AI 服务
- en: Now that we’ve spent a little bit of time learning about some of the features
    of Generative AI and Power Platform, let’s look at a few of the AI services currently
    in the marketplace.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经花了一些时间了解了一些生成式 AI 和 Power Platform 的功能，让我们来看看市场上的一些 AI 服务。
- en: Working with Azure AI Services
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Azure AI 服务
- en: Microsoft offers a wide array of AI and machine learning capabilities under
    the **Azure AI Services** (formerly Azure Cognitive Services) umbrella. These
    services enable developers to add intelligent capabilities to their applications
    without needing to build complex AI algorithms from scratch. With Azure Cognitive
    Services, developers can tap into pre-built models and **application programming
    interfaces** (**APIs**) to incorporate functionalities such as vision, speech,
    language, and decision-making into their applications.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 微软在 **Azure AI 服务**（以前称为 Azure 认知服务）的伞形下提供了一系列 AI 和机器学习功能。这些服务使开发者能够在不从头开始构建复杂的
    AI 算法的情况下，将智能功能添加到他们的应用程序中。借助 Azure 认知服务，开发者可以访问预构建的模型和 **应用程序编程接口**（**API**），将视觉、语音、语言和决策制定等功能集成到他们的应用程序中。
- en: 'The vision-capable services include the following:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 具有视觉功能的包括以下服务：
- en: '**Computer Vision**: This service enables image analysis and object detection.
    Computer Vision can do things such as identify objects in a scene (*dog*, *frisbee*,
    and *tree*) as well as perform contextual image analysis (*There is a dog catching
    a frisbee by the tree*) and optical character recognition.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算机视觉**：此服务使图像分析和物体检测成为可能。计算机视觉可以执行诸如识别场景中的物体（*狗*、*飞盘*和*树*）以及执行上下文图像分析（*在树下，有一只狗正在接飞盘*）和光学字符识别等任务。'
- en: '**Face**: The Face service is used to identify the presence of faces in image
    data, as well as identify and analyze faces in images. You might use the Face
    service to verify someone’s identity against a government-issued identification
    card or to blur out face content in a picture or video.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人脸识别**：人脸识别服务用于识别图像数据中的面部存在，以及识别和分析图像中的面部。您可能使用人脸识别服务来验证某人的身份是否与政府颁发的身份证件相符，或者用于模糊处理图片或视频中的面部内容。'
- en: '**Custom Vision**: The Custom Vision service, now part of Image Analysis 4.0,
    enables developers to create custom image recognition models for tagging and applying
    labels to content based on visual characteristics.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自定义视觉**：自定义视觉服务，现在是图像分析 4.0 的一部分，使开发者能够创建自定义图像识别模型，用于根据视觉特征对内容进行标记和添加标签。'
- en: 'Azure Cognitive Services includes several language and speech APIs, which provide
    the following features:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: Azure 认知服务包括多个语言和语音 API，提供以下功能：
- en: '**Speech**: The Speech service provides a broad array of speech-to-text, text-to-speech,
    content translation, and speaker recognition capabilities.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语音识别**：语音识别服务提供了一系列语音转文本、文本转语音、内容翻译和说话人识别功能。'
- en: '**Language**: This service has several sub-services and capabilities based
    on natural language understanding, including the ability to perform key phrase
    extraction, named entity recognition, and the ability to detect **personally identifiable
    information** (**PII**). The Language service can also provide text translation
    between two languages, classify bodies of text and determine their sentiment,
    and perform content summarization.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言**：该服务基于自然语言理解，具有多个子服务和功能，包括执行关键词提取、命名实体识别以及检测**个人身份信息**（**PII**）的能力。语言服务还可以在两种语言之间提供文本翻译，对文本体进行分类并确定其情感，以及执行内容摘要。'
- en: '**Translator**: While the Language service handles text-to-text content conversion,
    the Translator service can provide machine-based translation in real time.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**翻译器**：虽然语言服务处理文本到文本的内容转换，但翻译器服务可以提供实时基于机器的翻译。'
- en: '**Language Understanding** (**LUIS**): The **LUIS** service is a machine learning
    model that can predict overall meaning and content extraction from natural language
    conversation.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言理解**（**LUIS**）：LUIS 服务是一个机器学习模型，可以从自然语言对话中预测整体意义和内容提取。'
- en: '**QnA Maker**: You can think of the QnA Maker service as a bot or answering
    service that can reason over semi-structured content and provide answers to customers.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**QnA Maker**：您可以将 QnA Maker 服务视为一个机器人或回答服务，它可以对半结构化内容进行推理并提供客户答案。'
- en: 'The decision models that are available alongside Azure AI Services also provide
    unique capabilities:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Azure AI 服务一起提供的决策模型也提供了独特的功能：
- en: '**Content Moderator**: The Content Moderator service provides analysis for
    potentially offensive, undesirable, unsafe, or otherwise risky content'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内容审查员**：内容审查员服务提供对可能冒犯性、不受欢迎、不安全或存在其他风险的内容的分析。'
- en: '**Personalizer**: Using behavior and habits analysis, the Personalizer service
    helps select which content experiences to choose for your customers'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化推荐**：通过行为和习惯分析，个性化推荐服务帮助选择为您的客户选择的内容体验。'
- en: '**Anomaly Detector**: The Anomaly Detector service allows you to monitor and
    detect inconsistencies in time-based datasets'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常检测器**：异常检测器服务允许您监控和检测基于时间的数据集中的不一致性。'
- en: Azure AI Services also includes the **Azure OpenAI service**, which has several
    language models, including GPT-3 and Codex, to support content generation, summarization,
    and natural language-to-code translation.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI 服务还包括 **Azure OpenAI 服务**，该服务包含多个语言模型，包括 GPT-3 和 Codex，以支持内容生成、摘要和自然语言到代码的翻译。
- en: Change is a-comin’
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 变化即将到来
- en: If there’s anything constant, it’s change. As the AI landscape evolves, newer
    features, services, or capabilities replace older counterparts. Over the next
    few years, you’ll need to say “goodbye” to the LUIS and QnA Maker services, as
    they’ll be retired. Microsoft recommends transitioning LUIS-enabled applications
    and services to Conversational Language Understanding and retooling services by
    using QnA Maker with the question-and-answer capability in the Azure AI Language
    service.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有什么是恒定的，那就是变化。随着 AI 领域的发展，新的功能、服务或能力会取代旧的对立面。在未来几年里，您将需要告别 LUIS 和 QnA Maker
    服务，因为它们将被淘汰。Microsoft 建议将启用 LUIS 的应用程序和服务过渡到对话语言理解，并使用 Azure AI 语言服务中的问答功能重新配置
    QnA Maker 服务。
- en: Together, this family of services provides developers with the mechanisms to
    programmatically add AI-based capabilities to their applications without having
    lots of experience in AI modeling, improving user experiences, and driving innovation
    in areas such as healthcare and customer service.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 一起，这个服务家族为开发者提供了将 AI 基础功能编程添加到他们的应用程序中的机制，而无需在 AI 模型方面有大量经验，从而改善用户体验，并在医疗保健和客户服务等领域推动创新。
- en: Further reading
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: For more information on the complete lineup of Azure Cognitive Services, go
    to [https://learn.microsoft.com/en-us/azure/cognitive-services/what-are-cognitive-services](https://learn.microsoft.com/en-us/azure/cognitive-services/what-are-cognitive-services).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 如需了解 Azure 认知服务的完整产品系列，请访问 [https://learn.microsoft.com/en-us/azure/cognitive-services/what-are-cognitive-services](https://learn.microsoft.com/en-us/azure/cognitive-services/what-are-cognitive-services)。
- en: Working with OpenAI models
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与 OpenAI 模型合作
- en: OpenAI is the organization behind popular models such as GPT-3, GPT-4, and the
    DALL-E image generation platform.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 是 GPT-3、GPT-4 和 DALL-E 图像生成平台等流行模型的背后组织。
- en: 'OpenAI offers a range of advanced AI technologies and services that aim to
    empower individuals and organizations to leverage the power of AI. Let’s look
    at some of their offerings:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI提供了一系列先进的AI技术和服务，旨在赋予个人和组织利用AI力量的能力。让我们来看看他们的部分产品：
- en: '**Generative Pre-trained Transformer** (**GPT**): This is OpenAI’s flagship
    language model. It can generate coherent and contextually relevant text, making
    it useful for tasks such as natural language processing, text completion, and
    chatbot development.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成式预训练转换器**（**GPT**）：这是OpenAI的旗舰语言模型。它能够生成连贯且与上下文相关的文本，这使得它在自然语言处理、文本补全和聊天机器人开发等任务中非常有用。'
- en: '**OpenAI API**: This offering provides developers with easy access to OpenAI’s
    models, enabling them to integrate language generation capabilities into their
    applications or services.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI API**：这项服务为开发者提供了轻松访问OpenAI模型的方式，使他们能够将语言生成功能集成到他们的应用程序或服务中。'
- en: '**Images API**: The Images API provides methods for creating or editing new
    and existing images based on text prompts.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图像API**：图像API提供了基于文本提示创建或编辑新图像和现有图像的方法。'
- en: '**OpenAI Gym**: This is a toolkit for developing and comparing reinforcement
    learning algorithms. It provides a wide range of pre-built environments and tools
    to train and evaluate AI agents.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI Gym**：这是一个用于开发比较强化学习算法的工具包。它提供了一系列预构建的环境和工具，用于训练和评估AI代理。'
- en: '**OpenAI Platform**: OpenAI Platform offers a suite of tools and resources
    for researching, developing, and deploying AI models. It includes model training
    infrastructure, collaboration features, and model management tools.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI平台**：OpenAI平台提供了一套用于研究、开发和部署AI模型的工具和资源。它包括模型训练基础设施、协作功能和模型管理工具。'
- en: '**OpenAI Scholars Program**: This is a research internship program that supports
    aspiring AI researchers from underrepresented backgrounds. It provides mentorship,
    stipends, and resources to help participants advance their AI knowledge and contribute
    to the field.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI学者计划**：这是一个研究实习项目，旨在支持来自代表性不足背景的有志于AI研究的学者。它提供指导、津贴和资源，以帮助参与者提升他们的AI知识并贡献于该领域。'
- en: OpenAI, like Microsoft, emphasizes ethical considerations and responsible AI
    development.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 与Microsoft一样，OpenAI强调道德考虑和负责任的AI开发。
- en: Further reading
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: In this book, we’ll mainly be focusing on the OpenAI services that are exposed
    through Power Platform directly or via Azure AI Services. OpenAI’s products are
    available separately, as well. For more information on developing with the OpenAI
    platform, go to [https://platform.openai.com/overview](https://platform.openai.com/overview).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们将主要关注通过Power Platform直接或通过Azure AI服务暴露的OpenAI服务。OpenAI的产品也可以单独获取。有关使用OpenAI平台进行开发的更多信息，请访问[https://platform.openai.com/overview](https://platform.openai.com/overview)。
- en: Working with services from Google, Anthropic, and more
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与Google、Anthropic等公司的服务合作
- en: While we’re mainly going to focus on services offered in the Microsoft cloud
    (Power Platform AI Builder, Azure AI Services, and OpenAI, to be more specific),
    they aren’t the only big names in AI right now. There are several other AI platforms
    – both general and specific – that are currently being developed. Some are even
    open for you to experiment with now!
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们将主要关注在Microsoft云中提供的服务（更具体地说，是Power Platform AI Builder、Azure AI服务和OpenAI），但它们现在并不是AI领域的唯一大玩家。目前还有几个其他AI平台——既有通用的也有特定的——正在开发中。其中一些甚至现在就开放供你实验！
- en: 'Here’s a list of a few services that you might come across:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可能遇到的服务列表：
- en: '**Google Bard**: Based on Google’s **Language Model for Dialogue Applications**
    (**LaMDA**), Bard is an advanced language model that’s developed by Google’s research
    team. LaMDA’s training involves dialogues instead of isolated prompts, allowing
    it to grasp the underlying meaning and engage in more conversational exchanges.
    You can start a conversation with Bard at [https://bard.google.com](https://bard.google.com).'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Google Bard**：基于Google的**对话应用语言模型**（**LaMDA**），Bard是由Google研究团队开发的高级语言模型。LaMDA的训练涉及对话而非孤立的提示，这使得它能够理解深层含义并参与更深入的对话交流。你可以在[https://bard.google.com](https://bard.google.com)与Bard开始对话。'
- en: '**Anthropic Claude**: Claude is another type of conversational AI model. Anthropic
    approaches their AI models a bit differently, however, training with a method
    they call Constitutional AI. Constitutional AI involves supervised learning and
    review so that the AI learns from the feedback to generate harmless outputs. Talk
    to Claude at [https://claude.ai](https://claude.ai).'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Anthropic Claude**：Claude是另一种类型的对话式AI模型。Anthropic在处理AI模型时采取了一些不同的方法，他们使用一种称为宪法AI的方法进行训练。宪法AI涉及监督学习和审查，以便AI从反馈中学习，生成无害的输出。与Claude在[https://claude.ai](https://claude.ai)交谈。'
- en: '**Midjourney**: Whereas ChatGPT, Bard, and Claude use text for both input and
    output, Midjourney is an AI-based art generation platform. Midjourney can be used
    to create high-quality art using text prompts. Experience Midjourney at [https://www.midjourney.com/](https://www.midjourney.com/).'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Midjourney**：与ChatGPT、Bard和Claude使用文本作为输入和输出不同，Midjourney是一个基于AI的艺术生成平台。Midjourney可以通过文本提示来创建高质量的艺术作品。在[https://www.midjourney.com/](https://www.midjourney.com/)体验Midjourney。'
- en: AI has also found its way into countless plugins and extensions. A quick internet
    search or two will quickly reveal new ad hoc tools you can try out.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: AI也融入了无数的插件和扩展中。进行一次或两次快速的互联网搜索，很快就能发现您可以尝试的新工具。
- en: Summary
  id: totrans-153
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: Hopefully, having a high-level understanding of some of the types of computing,
    algorithms, and frameworks that go into Generative AI makes it a little less scary
    to approach. While the machines may not be coming for us (yet), they certainly
    are going to be influencing how businesses and customers interact for years to
    come.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 希望对生成AI中涉及的某些计算类型、算法和框架的高层次理解，能让您在接触它时感到不那么可怕。虽然机器可能（目前）还没有来“找”我们，但它们无疑将影响未来多年商业和客户之间的互动。
- en: Now, it’s time to begin your AI journey by getting your development environment
    ready!
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，是时候通过准备您的开发环境来开始您的AI之旅了！
