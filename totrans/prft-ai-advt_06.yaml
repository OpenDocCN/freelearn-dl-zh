- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting Started on Your AI Journey
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Hot take: Your AI journey has already started. After all, your interest in
    AI is what brought you to this book. Perhaps you’ve experimented with tools like
    ChatGPT or interacted with AI in other forms, sparking your curiosity to learn
    more. This widespread curiosity and accessibility are what truly distinguish the
    modern AI revolution from the early days of AI and machine learning back in the
    2010s.'
  prefs: []
  type: TYPE_NORMAL
- en: Today, AI is nearly everywhere - from your smartphone to the supply chains that
    power global commerce. So, the real question isn’t whether to start your AI journey,
    but rather, where you currently stand on it.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll explore the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Why a roadmap matters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common pitfalls in AI adoption
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Taking ownership of the AI roadmap
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overview of the AI roadmap process
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Identifying pain points and bottlenecks: The foundation of your AI roadmap'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finding the right starting point for profitable AI projects
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing a value filter
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why a roadmap matters
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Most organizations I’ve worked with tend to fall somewhere in the middle of
    their journey. They’re often approached by vendors offering tools that promise
    sophisticated AI solutions. These tools may seem impressive at first, but they
    often under-deliver, leading to disappointment and, in many cases, leaving AI
    projects stuck in the prototyping phase. This is what happens when your goal is
    divide and conquer AI, but what you are doing is selective (opportunistic) AI.
    This clash will eventually create a cycle of frustration where AI remains a tantalizing
    but elusive promise rather than a transformative reality.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why it’s critical to start with a clear **AI roadmap**. Understanding
    where you are on this journey - and knowing when to move forward or take a step
    back - is key to avoiding these common pitfalls. A roadmap will help you be clear
    about where you start, where you want to go, and which obstacles you need to overcome
    on your way to get there. Ultimately, your AI roadmap ensures that AI initiatives
    are tied to your business interests right from the start.
  prefs: []
  type: TYPE_NORMAL
- en: 'Without a roadmap, it’s easy to get lost in the hype, invest in the wrong tools,
    or set unrealistic expectations. A roadmap provides clarity and direction, helping
    you stay focused on what truly matters: solving your business challenges and driving
    business outcomes.'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is designed to help you build that roadmap. It will lay the foundation
    for approaching AI solutions in a structured way, guiding you through the process
    of integrating AI into your company’s processes. Most importantly, it will help
    you nail down the starting point, identifying where AI can have the most significant
    impact on your business. The rest of this book will build on the phases introduced
    here, so whenever you feel uncertain, you can refer back to this roadmap and reassess
    where you are and whether you’re on the right path.
  prefs: []
  type: TYPE_NORMAL
- en: Common pitfalls in AI adoption
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Jumping into AI without a clear plan can lead to some common pitfalls. One of
    the biggest mistakes is over-reliance on vendors. External vendors can offer valuable
    tools and expertise, but their solutions are often generic - designed to meet
    the needs of a broad audience rather than tailored to your specific business challenges.
    This can leave you with a prototype that never scales into a real implementation
    ultimately adding more cost than value.
  prefs: []
  type: TYPE_NORMAL
- en: Another challenge is setting unrealistic expectations. AI can be exciting, and
    it’s easy to assume it will deliver quick, easy wins. But in reality, AI projects
    often require significant time, resources, and even cultural changes within your
    organization - especially after the prototyping phase. Without understanding these
    demands, you might become disillusioned when AI doesn’t immediately deliver the
    results you were hoping for.
  prefs: []
  type: TYPE_NORMAL
- en: Integrating AI into existing systems is another major hurdle. AI needs to work
    seamlessly with your current processes, data flows, and organizational structure.
    If you don’t account for this, you could end up with disruptions, inefficiencies,
    or even project failures. A company might invest heavily in an AI-driven customer
    service tool, only to find that it doesn’t integrate well with their existing
    CRM system, leading to frustration and a lack of adoption by the team.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, there’s the pitfall of ignoring the human element. AI can help you to
    speed up tasks or provide higher-quality outputs, but it’s the people in your
    organization who will ultimately determine its success. If your team isn’t on
    board, or if they don’t understand how AI fits into their daily work, your AI
    initiatives are likely to falter.
  prefs: []
  type: TYPE_NORMAL
- en: All of these pitfalls could be prevented by ensuring proper alignment between
    business objectives and technical capabilities, embedded in a pragmatic AI governance
    framework, which are core components of your AI roadmap.
  prefs: []
  type: TYPE_NORMAL
- en: Taking ownership of the AI roadmap
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'AI is often seen as the domain of data scientists, IT experts, and tech-savvy
    innovators. While these specialists are essential for the technical side of AI,
    the real responsibility for driving AI initiatives should rest on the shoulders
    of business leaders in the entire organization. Here’s why: AI isn’t just another
    piece of software that you can install and expect to run smoothly. It’s a transformative
    technology with the potential to revolutionize how your business operates. The
    use case for this technology must come from you - the business leader.'
  prefs: []
  type: TYPE_NORMAL
- en: Think of it like trying to build a skyscraper without a blueprint. You could
    have the world’s best engineers and construction workers, but without a clear
    plan, the result would be chaotic at best, catastrophic at worst. The same goes
    for AI. Your organization might have talented data scientists and IT professionals,
    but without a clear vision and strategic direction, your AI initiatives will easily
    miss the mark.
  prefs: []
  type: TYPE_NORMAL
- en: Why leadership matters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a business leader, it’s your job to define that vision. You understand your
    company’s goals, market position, and competitive landscape better than anyone
    else. You know where the business needs to go, and it’s up to you to steer AI
    initiatives in that direction. Yes, you’ll rely on experts to navigate the technical
    aspects, but the roadmap should be driven by what your business needs, not just
    by what’s technically possible.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing AI into your organization often requires a cultural shift, much
    like how a conductor might introduce a new piece of music to an orchestra. This
    shift can be met with resistance, as people may be wary of change or uncertain
    about how AI will impact their roles. As a leader, it’s your responsibility to
    champion this change, address concerns, and foster a culture of experimentation
    and learning. Remember, your involvement is not just beneficial, it’s essential.
    When AI initiatives are driven by business leaders who understand the company’s
    strategic goals, they are far more likely to succeed. Leaders who actively participate
    in AI adoption not only guide the strategic direction but also set the tone for
    the organizational culture around AI.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve established why taking ownership of the AI roadmap is crucial,
    let’s take a look at what this process actually looks like. The next sections
    will guide you through building a practical, actionable roadmap that aligns with
    your business objectives, leverages the strengths of your team, and sets you up
    for long-term success in your AI journey.
  prefs: []
  type: TYPE_NORMAL
- en: Overview of the AI roadmapping process
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The high-level framework for building an AI roadmap below comes from my years
    of AI consulting experience in the field. It has worked successfully for both
    small and big companies, and the process is always the same. What’s different,
    though, is the entry point where you start. Depending on your AI adoption strategy
    and your current situation, it can be one of three entry points:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Process-based:** You look at this roadmap from a process perspective, typically
    driven by a department leader or head of a business unit. This fits nicely with
    the Opportunistic AI approach.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product-based:** This looks at user journeys instead of process steps. Your
    goal is to improve an existing product by shipping new (or improved) AI-enhanced
    features. This maps to the Product-led AI approach.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Organizational-based:** When you gather your C-level in a room and start
    thinking about AI opportunities, then taking this roadmap from an organizational
    view is a good start. This typically involves looking at your org chart and then
    collecting opportunity areas on a super high-level. From there, you typically
    need to either go into process-based or product-based deep dives to flesh out
    your use cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This approach works for approaching AI through a Divide-and-conquer or a Moonshot
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a broken head  Description automatically generated](img/B31200_04_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.1: Entry points for AI roadmapping process'
  prefs: []
  type: TYPE_NORMAL
- en: If this doesn’t make total sense to you right now, don’t worry. Everything will
    get clearer once we go through the roadmap framework in detail. Just remember
    that the key steps and milestones will stay the same, but they might come in different
    flavors, and the level of details varies depending on your starting point.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s walk through these milestones (*Figure 4.2*) so you can get a sense
    of what’s involved.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a diagram  Description automatically generated](img/B31200_04_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.2: AI roadmapping process milestones'
  prefs: []
  type: TYPE_NORMAL
- en: '**Milestone 1: Understanding AI core concepts**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before you can effectively integrate AI into your business, it’s important to
    build a shared knowledge foundation. Otherwise, AI will always be a buzzword,
    which means different things to different people, and you won’t be able to figure
    out what’s a potentially good problem for AI to solve and what isn’t. This involves
    understanding of the fundamentals of AI - what AI is, how it works, and the different
    ways it can be applied. In [*Chapter 2*](Chapter_02.xhtml#_idTextAnchor035), we
    laid out these basics, covering the 5 AI modes and some common terminologies.
    You can always spend more time learning AI core concepts, but it’ll be much easier
    to do so while your roadmap unfolds.
  prefs: []
  type: TYPE_NORMAL
- en: To get started, make sure everyone involved in AI projects shares this basic
    understanding. Consider organizing workshops or seminars to get everyone on the
    same page and ensure that AI discussions are based on a common knowledge base.
  prefs: []
  type: TYPE_NORMAL
- en: If you wish to explore some AI core concepts, here are a few resources that
    c[ould help:](https://www.elementsofai.com)
  prefs: []
  type: TYPE_NORMAL
- en: '[Elements of AI Free On](https://www.elementsofai.com)l[ine Course (https://www.elementsofai.com/)](https://www.deeplearning.ai/courses/ai-for-everyone/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[AI For Everyone by Andrew Ng (F](https://www.deeplearning.ai/courses/ai-for-everyone/)r[ee
    Course) (https://www.deeplearning.ai/courses/ai-for-everyone/)](https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[AI in a Nutshell: A Practical Guide to Key AI Terminology (Bl](https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology)og
    article) (https://blog.tobiaszwingmann.com/p/demystifying-ai-practical-guide-key-terminology)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Milestone 2: Identifying business pain points and bottlenecks**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With a solid foundation in place, the next milestone is to look for AI opportunities
    in your business. This stage involves identifying the specific challenges - both
    current and future - that are big enough to be even considered as AI enhancements.
    We’ll filter these challenges with the $10K threshold using the concept of pain
    points and bottlenecks for later in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: '**Milestone 3: Mapping AI capabilities to business needs**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once you’ve identified your pain points and bottlenecks, the next milestone
    involves exploring how AI can address these issues. This is where you map your
    business needs to specific AI capabilities. For example, if processing large volumes
    of customer feedback is a challenge, AI reading skills, which can be referred
    to as AI reading skills, might be the right fit. If you want to predict e-commerce
    sales, **Supervised Machine Learning** (or Prediction mode for simplicity) might
    be an important capability to explore.
  prefs: []
  type: TYPE_NORMAL
- en: Achieving this milestone is about finding the intersection where your business
    challenges and AI’s capabilities meet. It’s not about chasing the latest AI trends;
    it’s about identifying practical applications that deliver tangible results. We
    will explore this area further in [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor140).
  prefs: []
  type: TYPE_NORMAL
- en: '**Milestone 4: Defining and analyzing AI use cases**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With your business needs and AI capabilities aligned, the next milestone is
    to work on and conceptualize specific AI use cases. These use case concepts help
    you pull everything together into a roadmap and ultimately decide which projects
    to tackle and in what order. At this stage, your ideas begin to take shape, transforming
    from broad ideas into specific, well-defined initiatives with clear business objectives
    that will eventually become your first AI projects. [*Chapter 6*](Chapter_06.xhtml#_idTextAnchor181)
    will be all dedicated to this.
  prefs: []
  type: TYPE_NORMAL
- en: '**Milestone 5: Prioritizing and prototyping AI initiatives**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The next milestone is to prioritize and prototype your AI initiatives. Not all
    AI projects will have the same impact or be equally easy to implement. It’s crucial
    to prioritize initiatives based on their potential impact and feasibility as well
    as their cost of prototyping. Reaching this milestone is where your strategy begins
    to translate into action. Chapters *7* and *8* will be packed with actionable
    tips and strategies for this stage.
  prefs: []
  type: TYPE_NORMAL
- en: '**Milestone 6: Iterating and scaling AI initiatives**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once you’ve launched your first AI projects, the final milestone is to make
    sure you’re ready to learn from failure and deliver increments toward a clear
    goal. Adopting AI is not a one-time effort; it’s an iterative process that requires
    continuous monitoring, refinement, and scaling. Reaching this milestone allows
    you to adapt to new information, experiment with new ideas, and scale successful
    projects across the organization. Chapters *9* and *10* take a closer look at
    this critical phase.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, your AI roadmap is the place where your AI initiatives evolve from
    ideas to pilot projects to integral components of your business strategy. It’s
    a living and breathing document that guides your process of learning, adapting,
    and growing, ensuring that your AI efforts continue to deliver value over time.
  prefs: []
  type: TYPE_NORMAL
- en: Your role as a business leader in each step
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a business leader, your role is central at every stage of this roadmap. You’re
    not just overseeing the process - you’re actively guiding it. Your involvement
    ensures that AI initiatives stay aligned with business objectives and that the
    organization remains focused on driving real value.
  prefs: []
  type: TYPE_NORMAL
- en: In the early stages, your role is to set the vision and identify the areas where
    AI can have the most impact. As the journey progresses, you’ll make strategic
    decisions about which initiatives to prioritize, how to allocate resources, and
    when to scale successful projects.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the process, your leadership will be crucial in fostering a culture
    of experimentation, learning, and continuous improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Be a visible champion for AI within your organization. Clearly communicate the
    vision, involve key stakeholders early, and ensure that everyone understands how
    AI fits into the broader business strategy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that you have a clear picture of the overall roadmap, it’s time to dive
    deeper into the foundation of your AI strategy: identifying your business’s pain
    points and bottlenecks.'
  prefs: []
  type: TYPE_NORMAL
- en: This is where your AI journey truly begins.
  prefs: []
  type: TYPE_NORMAL
- en: 'Identifying pain points and bottlenecks: The foundation of your AI roadmap'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To make sure AI will deliver value by solving real problems, you need to think
    about your AI roadmap business first, not technology first. When there’s no problem
    to solve, there’s no need for AI. If your customer support can handle every incoming
    query easily, you don’t need a chatbot. If you’re selling an evergreen product,
    you probably don’t need a good demand forecast. So, understanding AI opportunities
    means understanding your business needs.
  prefs: []
  type: TYPE_NORMAL
- en: This is where a concept called pain points and bottlenecks comes into play.
    In simple terms, these are problems that your businesses are either unfolding
    right now or in the future.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pain points** are the current issues that are causing friction within your
    business. These could be anything from inefficiencies in your processes to rising
    costs to customer dissatisfaction. Pain points are often things that are actively
    hurting your business right now, and they’re usually quite visible - they show
    up in financial reports, customer feedback, or operational metrics.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B31200_04_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.3: Pain points: Business problems that are hurting right now'
  prefs: []
  type: TYPE_NORMAL
- en: For example, imagine you’re running a customer service department. If you’re
    seeing a high volume of customer complaints about slow response times, that’s
    a pain point. It’s something that’s negatively impacting your customer experience,
    and by extension, your business.
  prefs: []
  type: TYPE_NORMAL
- en: '**Bottlenecks**, on the other hand, are constraints or limitations that could
    prevent your business from thriving in the future. They might not be a significant
    issue right now, but if left unaddressed, they could become serious roadblocks
    to scaling, innovating, or maintaining a competitive edge. Bottlenecks often represent
    potential risks or missed opportunities - they’re the obstacles that prevent future
    growth.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A white bottle with black background  AI-generated content may be incorrect.](img/B31200_04_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.4: Bottlenecks: problems that limit your growth or competitiveness
    in the future'
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a straightforward, non-AI example: If your company plans to expand
    into new markets, but your current production line can’t handle the increased
    demand, that’s a bottleneck. It’s not a problem today, but it needs to be removed
    so you can grow. While bottlenecks like this are often obvious in traditional,
    non-technical workflows, they become more obscure and difficult to identify in
    digital and AI-driven environments. In the context of AI and digital processes,
    bottlenecks often lurk in places that aren’t immediately visible. They can include
    outdated IT infrastructure that can’t support the integration of AI tools, data
    silos that prevent the efficient flow of information, or even a lack of skilled
    personnel capable of leveraging new technologies. These digital bottlenecks can
    silently undermine your company’s ability to innovate, respond to market changes,
    or scale effectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Finding the right starting point for profitable AI projects
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Pain points and bottlenecks can be analyzed from a process-, product-, or organizational-level.
    But before diving into the specific processes and methodologies for identifying
    pain points and bottlenecks, it’s critical to recognize that the starting point
    for this journey will vary depending on your role within the organization. Whether
    you’re a C-level executive overseeing the entire organization or a department
    leader focused on a specific business unit, the approach you take to uncover these
    challenges will differ. Understanding your position and the scope of your responsibility
    is key to effectively navigating the AI roadmap.
  prefs: []
  type: TYPE_NORMAL
- en: So, there are typically two scenarios that can happen. Let’s explore each in
    turn.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario 1: Organizational-level approach for C-level leaders'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you’re an executive, your perspective naturally extends to the entire organization.
    At this stage, you need to get a helicopter-level view, which typically means
    mapping the major pain points and bottlenecks on an organizational chart, as shown
    in the following figure:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer keyboard  Description automatically generated](img/B31200_04_05.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.5: Mapping pain points and bottlenecks to an org chart'
  prefs: []
  type: TYPE_NORMAL
- en: 'This organizational overview serves as the foundation for identifying where
    AI can create real impact - but it needs a clear north star to guide it. Before
    scanning departments, pinpoint your top-level business goal: What is the most
    pressing challenge right now? Do you need to cut costs, accelerate growth, or
    launch a new line of business? Having this north star helps narrow the analysis
    to pain points and bottlenecks that matter in direct relation to that goal.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of north stars I’ve seen include: doubling output without doubling
    desks, achieving cost leadership, or launching a new business line in the next
    six months. Once the goal is clear, assemble your leadership team and systematically
    evaluate the organization, unit by unit, to identify where inefficiencies, delays,
    or customer dissatisfaction are blocking progress toward that north star.'
  prefs: []
  type: TYPE_NORMAL
- en: 'But the organizational view is just the beginning of the journey. It gives
    you the context you need and informs the approach you should take: Opportunistic
    AI, Product-led, Divide and conquer, or Moonshot. Depending on this, your AI initiatives
    will be driven by different people:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Opportunistic AI approach:** Departmental leaders take responsibility for
    AI initiatives within their areas of control, focusing on specific process improvements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI divide-and-conquer approach**: An AI **Center of Excellence** (**CoE**)
    coordinates AI efforts across the organization, working closely with business
    units to ensure alignment and resource efficiency.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI Moonshot approach:** The moonshot is typically directly overseen by a
    member of the C-level executive team and implemented as a separate project.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product-led AI approach**: The head of product is ultimately responsible
    for driving AI innovation in the products they oversee.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Scenario 2: Business unit or department leaders - focusing on specific areas'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re a leader of a business unit or department, your approach to identifying
    pain points and bottlenecks will be more focused and specific to your area of
    responsibility. Unlike C-level leaders who must consider the organization as a
    whole, your task is to dive deep into the processes or product journeys that directly
    impact your department’s performance - ideally as part of a team of experts that
    are deeply involved in the daily operations.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on your role, function, and AI adoption approach, you can run this
    exploration as process- or product-based.
  prefs: []
  type: TYPE_NORMAL
- en: Process-based analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For department managers, the easiest place to start is often a process-based
    analysis. This approach involves breaking down the key processes within your department
    into a series of key steps. Breaking down a process into 5-6 key steps that transform
    a given process input into a desired process output has proven to be an effective
    abstraction.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t try to stay too high-level, but don’t get bogged down in the details.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B31200_04_06.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.6: Mapping pain points and bottlenecks to a business process'
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if you manage a sales department, you might break down the sales
    process into stages such as lead generation, qualification, nurturing, and closing.
    By examining each stage, you can pinpoint where leads might be falling through
    the cracks, where sales cycles are getting too long, or where communication with
    potential customers could be improved. For each step, ask yourself:'
  prefs: []
  type: TYPE_NORMAL
- en: Where do we spend most resources?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where do we experience the most delays?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where are errors or inconsistencies most common?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Which steps generate the most customer complaints or dissatisfaction?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will explore some more methods to source pain points and bottlenecks below.
    But first, let’s see how this analysis would look if we were looking at products,
    not processes.
  prefs: []
  type: TYPE_NORMAL
- en: Product-based analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If your department is product-focused, such as in product management or development,
    a product-based analysis may be more appropriate. This approach involves examining
    the entire user journey associated with your product, from initial awareness to
    post-purchase support. By mapping out the customer experience, you can identify
    pain points that are causing friction or dissatisfaction.
  prefs: []
  type: TYPE_NORMAL
- en: The setup looks very similar compared to the process-based analysis, with the
    only difference that, instead of process steps, you’re looking at steps in the
    user journey - often described with user stories that are required to move the
    user from a given starting state to a desired end state.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B31200_04_07.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.7: Mapping pain points and bottlenecks across a user journey'
  prefs: []
  type: TYPE_NORMAL
- en: For example, if your product is an e-commerce platform, you might look at the
    user journey from the moment a customer lands on the site, through browsing and
    selection, to checkout and delivery. Are customers dropping off during the checkout
    process? Is there confusion about product descriptions? Are delivery times inconsistent?
    These are all potential problem areas that, if addressed, can significantly enhance
    the customer experience and increase satisfaction and loyalty.
  prefs: []
  type: TYPE_NORMAL
- en: In both process-based and product-based analyses, the key is to be thorough
    and specific. The more detailed your understanding of where the pain points and
    bottlenecks exist, the more targeted and effective your AI solutions will be.
  prefs: []
  type: TYPE_NORMAL
- en: What’s important at this stage is that we’re not talking about AI solutions
    yet; just collecting problems, waiting to be solved (whether AI is a good fit
    for that will be the next step to decide).
  prefs: []
  type: TYPE_NORMAL
- en: Coordinating with organizational strategy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While your focus is on your department or product, it’s important to ensure
    that your efforts are aligned with the broader organizational AI strategy. If
    your organization has adopted an Opportunistic AI approach, your initiatives should
    be coordinated with other departments to ensure consistency and resource sharing.
    If a divide-and-conquer approach is in place, work closely with the **AI CoE**
    to leverage their expertise and align your projects with organizational goals.
  prefs: []
  type: TYPE_NORMAL
- en: For product-led AI initiatives, your role is crucial in driving innovation and
    ensuring that AI is integrated seamlessly into the products under your purview.
    Collaboration with other departments, such as marketing, engineering, and customer
    support, is essential to ensure that AI solutions are effective and enhance the
    overall product offering.
  prefs: []
  type: TYPE_NORMAL
- en: In all cases, maintaining open communication with C-level leadership and the
    AI CoE (if applicable) will help ensure that your efforts contribute to the organization’s
    overall AI roadmap and strategic goals.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve established where to start and how to approach the identification
    process, it’s time to dive deeper into what pain points and bottlenecks actually
    are, and where you can find them within your organization.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing a value filter
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Identifying the pain points and bottlenecks to the success of your AI initiatives
    will help you deliver the meaningful impact of AI adoption in your organization.
  prefs: []
  type: TYPE_NORMAL
- en: 'How do you identify pain points effectively? Below is a series of techniques
    that you can use, no matter if you’re looking for pain points on an organizational,
    process, or product level:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identify internal frustrations**: One of the most straightforward ways to
    identify pain points is to ask your employees. Conduct surveys or interviews to
    gather insights about where they encounter frustrations or inefficiencies in their
    daily work. Often, your team is keenly aware of the obstacles that prevent them
    from being as effective as they could be. For example, an internal survey might
    reveal that your sales team spends an inordinate amount of time manually entering
    data into the CRM system, which prevents them from spending time with customers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Customer service feedback**: Your customers can also be a valuable source
    of information about your pain points. Analyze customer complaints, inquiries,
    and feedback to understand what aspects of your product or service are causing
    dissatisfaction - both qualitatively and quantitatively. This external perspective
    can highlight issues that may not be as visible internally. Some customer feedback
    can be measured, such as your email marketing open and click-through rates as
    a proxy for customer engagement, while others require more explicit surveys and
    interviews.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Workflow analysis**: Take a close look at your existing workflows. Where
    are the tasks repetitive, time-consuming, or prone to errors? Map out the steps
    in your processes and identify where delays or mistakes commonly occur. A good
    example of this is missing or wrong information provided in manual customer support.
    Both your customer service reps and your customers probably wouldn’t even bother
    because *they don’t know what they don’t know*. But the fact that customer insights
    need to be pulled manually by support reps is a huge hidden pain point.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Competitive analysis**: Look at how your competitors are addressing similar
    issues. If they’re outperforming you on a given task with regards to quality,
    speed, or cost of delivery, it could be a sign that you’re facing a severe pain
    point. For example, if you see that your competitor has successfully rolled out
    personalized marketing campaigns, while you’re still using generic outreach, this
    might highlight a pain point in your marketing strategy. Conduct regular competitor
    benchmarking to stay informed about industry best practices and innovations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: But it’s not just about addressing the problems you have today. You also need
    to think about the challenges that could arise tomorrow. That’s where bottlenecks
    come in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Looking for things that limit future growth is typically harder than looking
    for specific pain points, for the same reason that more people buy aspirin than
    vitamins. We’re usually so busy solving today’s most pressing problems that we
    forget to anticipate tomorrow’s. That’s why it’s so important to think strategically
    about this area. Here are some ways to get started:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Capacity limitations**: Identify areas where your operations hit a ceiling
    - whether it’s data processing capabilities, production throughput, or the ability
    to serve more customers. These limitations can become significant bottlenecks
    as your business grows. For example, a financial institution might find that its
    manual fraud detection processes are effective today but would struggle to scale
    as transaction volumes increase.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Skill gaps**: Find out where your team lacks the skills needed to support
    future growth. As digital tools become more integrated into business operations,
    the demand for certain skills, such as data literacy or AI-specific knowledge
    - will increase. Identifying and addressing these gaps now can prevent them from
    becoming bottlenecks later. For example, if nobody in your operations understands
    AI, how would they be able to control and monitor AI-driven systems effectively?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Scalability issues**: Assess processes that work well today but might not
    scale efficiently as your business expands. This could be anything from manual
    data entry to customer service processes that rely heavily on human agents. For
    instance, a B2B e-commerce platform could rely on manually curated recommendations
    for now, but this approach won’t scale as their product catalog grows.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Innovation blockers**: Sometimes, the desire to innovate is there, but existing
    technological or organizational limitations stand in the way. These blockers can
    prevent you from delivering new products, services, or business models that could
    drive growth.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By identifying these bottlenecks, you can proactively address the challenges
    that might slow down your business in the future. In many cases, AI can play a
    key role in overcoming these limitations, helping you to stay agile and competitive
    as you grow.
  prefs: []
  type: TYPE_NORMAL
- en: 'Filtering business problems worth solving: The $10K threshold framework'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: After identifying pain points and bottlenecks across your organization, processes,
    or product journeys, you’ll likely end up with a substantial list of problems.
    Not all of these issues are worth the investment of your time and attention, especially
    not when AI gets involved. This is where the **$10K threshold** **framework**
    comes in - a simple yet powerful framework I’ve developed through my years of
    consulting work.
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need a value filter?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before diving into specific solutions, you need to determine which problems
    are significant enough to warrant your attention. Many business leaders make the
    mistake of looking at problems that look *most interesting* or that they personally
    find most *annoying*. However, while making them great candidates, this isn’t
    necessarily a sufficient reason. So, what do you do?
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you could try to exactly measure or quantify impact of every problem
    in meticulous detail. But this approach doesn’t just cost a lot of time; it’s
    also very hard, as not every problem can be exactly quantified. What I find much
    easier, instead of prioritizing or measuring problems, is **filtering** them.
    Quickly get rid of problems that are *too small* and prioritize all the remaining
    ones later once you get closer to the solution space.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this, you need one single number to start with: Your **value threshold**.'
  prefs: []
  type: TYPE_NORMAL
- en: Your value threshold defines the minimal reward you want to see in order to
    get started on a new journey.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if I told you *Solving this problem will save you $35K per year*,
    would you do it? Your answer depends on your situation. If you’re a small business,
    then probably yes - you’d take this opportunity. However, if you’re working for
    a large enterprise, a $35K per year impact might not even be worth the meeting
    time you’d spend with your colleagues discussing this idea.
  prefs: []
  type: TYPE_NORMAL
- en: A value threshold will also help you to keep everyone aligned. Some people need
    **moonshots** in order to change anything in an existing process, while others
    are happy if a little improvement just pays for itself.
  prefs: []
  type: TYPE_NORMAL
- en: You’d better find out what the minimum hurdle is for everyone to jump over before
    you work on any solution, otherwise, you’ll realize it when it’s too late.
  prefs: []
  type: TYPE_NORMAL
- en: How the $10K threshold works?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How do you set this threshold? I’ve learned that using a recurring multiple
    of $10K works great for this. $10K isn’t an arbitrary number. It represents a
    reasonable proxy for human labor costs in many contexts - roughly what it might
    cost to employ someone for a month, including salary, benefits, and overhead.
    Breaking it down further, that’s about $500 per business day, $60 per hour, or
    $1 per minute.
  prefs: []
  type: TYPE_NORMAL
- en: Now you can adjust this number to a timeframe to adjust it to the size of your
    business and your risk appetite.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a computer  Description automatically generated](img/B31200_04_08.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.8: $10K threshold depending on business size'
  prefs: []
  type: TYPE_NORMAL
- en: Choosing a minimal impact of $10K per year will work great for small businesses
    or for larger businesses that don’t want to engage in complex AI projects and
    just want to see quick ROI by implementing low-hanging fruit solutions that pay
    for themselves within a short time.
  prefs: []
  type: TYPE_NORMAL
- en: The other extreme - $10K per day - roughly translates into a $3.6 million impact
    per year, which would even be noticeable for larger corporations. At the same
    time, this typically results in more complex solutions (because you’re looking
    at bigger, more complex problems) and ROI becomes harder to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: Whatever threshold you pick, make sure that the team working on the AI roadmapping
    process has the same understanding of their minimal reward to move.
  prefs: []
  type: TYPE_NORMAL
- en: Applying the $10K threshold
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once you set the $10K threshold for yourself, you can go through all your listed
    pain points and bottlenecks, and ask yourself:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Will solving this problem generate at least $10K in recurring value (year/quarter/month/day)?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This could come through:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Revenue increases**: Will it create new customers or boost sales worth at
    least $10K?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost reductions**: Will it eliminate wasted labor, reduce outsourcing, or
    prevent inefficiencies worth $10K+?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Opportunity unlock**: Will removing this problem allow you to pursue new
    opportunities worth $10K+?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Risk mitigation**: Would failing to address this issue cost at least $10K
    in compliance penalties, lost opportunities, or competitive disadvantage?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Is the value truly recurring?** One-time benefits, no matter how large, may
    not justify the continuous resources needed for ongoing solutions, especially
    with AI systems that require ongoing maintenance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Does the solution scale?** As your business grows, will the value generated
    by this AI solution grow proportionally, or will it hit a ceiling? For instance,
    time savings only hit your P&L if they translate into higher throughput or margin.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By applying this filter early in your process, you can quickly eliminate problems
    that, while intriguing, simply won’t deliver sufficient value to justify the investment.
    This allows you to concentrate your resources on high-impact areas that will truly
    move the needle for your business.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a custom AI tool that helps a sales team respond to inquiries 20%
    faster might sound impressive. But if that only translates to $30K per year in
    additional revenue, it falls below the $10K per quarter and wouldn’t be prioritized.
    Conversely, an AI solution that reduces customer churn by just 2% might easily
    exceed the $10K quarterly threshold if that 2% represents significant recurring
    revenue.
  prefs: []
  type: TYPE_NORMAL
- en: Whatever threshold you set, the key is maintaining discipline in applying it.
    This prevents the all-too-common pitfall of pursuing AI for its own sake rather
    than for genuine business value.
  prefs: []
  type: TYPE_NORMAL
- en: As we move forward in the roadmapping process, this initial filtering step ensures
    you’re focused on problems worth solving, setting the stage for matching them
    with appropriate capabilities - including AI where relevant, and avoiding bringing
    in AI for AI’s sake - in the next milestone.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Analyzing pain points and bottlenecks allows you to tackle your AI strategy
    head-on. It’s the definitive foundation for aligning everything else down the
    road. In combination with the $10K threshold, you make sure that the problems
    you’re investigating are actually worth solving with AI, and rally team members
    around the same goal.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll explore how to map AI capabilities to these pain
    points and bottlenecks so we can begin developing specific use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Before you move forward, take a moment to reflect on where you are today and
    which pain points and bottlenecks you see.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, this is a collaborative exercise - gather your team, discuss, and
    identify the most critical challenges. If you get this right, you’ll be well on
    your way to successfully using AI to deliver meaningful business value.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll look at some real-world examples and practical methods
    for uncovering AI opportunities within your organization. We’ll begin by mapping
    AI capabilities to your existing processes to pinpoint where AI can resolve pain
    points and eliminate bottlenecks, helping you to do your work faster, better,
    or cheaper.
  prefs: []
  type: TYPE_NORMAL
