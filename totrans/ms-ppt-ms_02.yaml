- en: '1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: Analyzing Your Audience and Presentation Delivery Needs
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分析你的受众和演示需求
- en: Readers might think it is odd to start a PowerPoint book with information about
    how to analyze your audience and presentation delivery needs. After many years
    as a presentation expert and public speaking coach, I can assure you that the
    first step in creating an impactful PowerPoint presentation is to avoid opening
    the application at all costs!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 读者可能会觉得，以如何分析受众和演示需求的信息开始一本PowerPoint书很奇怪。作为一名多年的演示专家和公开演讲教练，我可以向你保证，创建有影响力的PowerPoint演示的第一步是无论如何都要避免打开应用程序！
- en: Like most business professionals, you’ve probably attended many presentations
    and conferences where using a PowerPoint presentation was almost a requirement.
    When you recall your experiences as an attendee, how many times did you think
    about how boring the content was? Or did you start to tune out, checking your
    emails or social media from your smartphone?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 和大多数商业专业人士一样，你可能参加过很多需要使用PowerPoint演示的演示和会议。当你回忆起作为参会者的经历时，你有多少次想过内容有多无聊？或者你开始从智能手机上查看电子邮件或社交媒体，开始分心？
- en: As a presenter, you might have imposed death by PowerPoint on your audiences
    a few times. If your main reason is always a lack of time to prepare, then I would
    advise trying to review your preparation timeline. There is no way anyone can
    plan, prepare, and deliver an impactful presentation in a few days, whatever the
    duration of it. As a matter of fact, the shorter the duration, the longer it will
    take you to choose the right content and deliver it in a memorable way.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名演讲者，你可能已经几次让你的观众遭受了PowerPoint的死亡。如果你的主要原因总是缺乏准备时间，那么我建议你尝试回顾你的准备时间表。无论演示的持续时间有多长，没有人能在几天内计划、准备和交付一个有影响力的演示。
- en: 'There is one important reason I have heard many times throughout the years
    for not putting in more time to prepare presentations: *I don’t know where to
    start* . This is the main reason that I chose to have this topic as the first
    chapter in my PowerPoint book. You’ll know how to plan better presentations simply
    by following the three main sections in this chapter:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，我多次听到的一个重要的原因，就是没有花更多的时间来准备演示：*我不知道从哪里开始*。这就是我选择将这个主题作为我的PowerPoint书的第一章的主要原因。通过遵循本章的三个主要部分，你将知道如何更好地规划演示：
- en: 10 questions to help you plan your presentation
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10个问题帮助你规划你的演示
- en: Analyzing and sorting your content
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析和整理你的内容
- en: Structuring and developing your message
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建和发展你的信息
- en: 10 questions to help you plan your presentation
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10个问题帮助你规划你的演示
- en: 'Before sharing my top 10 questions to help you plan your next presentation,
    let me ask you the first question I ask *all* my clients before they can even
    start the official planning process: *What are the three most important elements
    your audience needs to remember or act on after your presentation?*'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在分享我帮助你规划下一次演示的顶级10个问题之前，让我问你我在我的所有客户开始正式规划过程之前都会问的第一个问题：*在你的演示之后，观众需要记住或采取行动的三个最重要的要素是什么？*
- en: This question usually triggers a long moment of silence, mainly because too
    many presenters are not clear on what they want their audience to remember. If
    that question triggers the same reaction for you regarding your next presentation,
    then take some time to think through what three elements need to be remembered
    or acted on by your audience before you dive into the next question. This will
    make your planning task even more efficient.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题通常会引起一段长时间的沉默，主要是因为太多演讲者不清楚他们希望观众记住什么。如果你对下一次演示有同样的反应，那么在你深入下一个问题之前，花点时间思考一下，在深入下一个问题之前，观众需要记住或采取行动的三个要素是什么。这将使你的规划任务更加高效。
- en: 'Here is a summary diagram of the 10 questions you should go through before
    you create your presentations:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在你创建演示之前，这里是一个你应该经历的10个问题的总结图：
- en: '![Figure 1.1 – Planning questions summary diagram](img/B32063_01_01.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图1.1 – 规划问题总结图](img/B32063_01_01.png)'
- en: Figure 1.1 – Planning questions summary diagram
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.1 – 规划问题总结图
- en: Why’s the diagram in a circular representation? Because it is an ongoing process
    leading to more impactful presentations.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个图是圆形表示的？因为它是一个持续的过程，旨在创造更有影响力的演示。
- en: Question 1 – what is my presentation’s goal?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题1 – 我的演示目标是什么？
- en: Presenting for an informative session does not have the same end goal as a project
    update, a training session, or an investor pitch deck. This is why you need to
    think through th e actual goal of your next presentation. Not only will it improve
    your audience satisfaction, but you will also be able to find more effective visuals
    for your content when you are clear on what you want to achieve.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 举办一个信息会议并不等同于项目更新、培训课程或投资者演示文稿的目标。这就是为什么你需要仔细思考你下一次演示的实际目标。这不仅会提升观众的满意度，而且当你清楚自己想要达到的目标时，你还能为你的内容找到更有效的视觉元素。
- en: Let’s see a few examples.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些例子。
- en: An informative session
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信息会议
- en: 'Even if you think your task is *only* to inform the audience, make sure they
    will be leaving with clea r takeaways. Many years ago, I remember attending an
    information session for a school trip program. Yes, it was full of nice and enchanting
    photos of the cities our kids would be visiting, but the trip coordinator made
    sure we had three clear action steps:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你认为你的任务“仅仅”是告知观众，也要确保他们离开时能带走明确的收获。许多年前，我记得参加过一次学校旅行项目的信息会议。是的，它充满了孩子们将要访问的城市中美好迷人的照片，但旅行协调员确保我们有了三个明确的行动步骤：
- en: Meeting the due dates for payments
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按时支付款项
- en: Meeting the due date for passport validation
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按时完成护照验证
- en: Attending the vaccination clinic on the specified date
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在指定日期参加疫苗接种诊所
- en: So, even though it was an information session, we all knew we had some specific
    tasks to accomplish and that there were date limits for each of them. This example
    can easily be transposed to any business information session. You just need to
    keep in mind any action steps that the audience needs to accomplish while you
    are preparing your presentation.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尽管这是一个信息会议，但我们都知道我们有一些具体的任务要完成，并且每个任务都有截止日期。这个例子可以很容易地应用到任何商业信息会议中。你只需要在准备演示时记住观众需要完成的任何行动步骤。
- en: Project update presentation
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 项目更新演示
- en: This ty pe of presentation is usually known to be very repetitive and boring
    in businesses. The main reason is that most presenters only keep repeating the
    same type of information. Instead of simply stating the percentage of advancement
    or whether the team is on target budget-wise, find three key elements t hat stand
    out since the last update. As an example, if a team member found a new way to
    improve processes and avoid delays, put that information in your project update
    presentation. Take some time to reflect on why you have had successes or even
    failures. This will be a much more interesting report than simply stating data.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的演示在商业中通常被认为是非常重复和无聊的。主要原因在于，大多数演讲者只是反复重复相同类型的信息。与其简单地陈述进展的百分比或团队是否在预算范围内，不如找出自上次更新以来三个突出的关键要素。例如，如果团队成员找到了一种改进流程和避免延误的新方法，就将这一信息纳入你的项目更新演示中。花点时间反思一下你为什么取得了成功或甚至失败。这将比简单地陈述数据更有趣。
- en: A client or investor pitch deck
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 客户或投资者演示文稿
- en: This type of presentation serves the dual needs of helping the audience know
    about y our product or service *and* convincing them to invest in your business
    or buy your product/service. If this is the type of presentation you need to prepare,
    think about the advantages of your products or services and identify their perceived
    value. You need to gain and build your audience’s trust before anyone will buy
    your products or services, and simply listing features and processes won’t be
    enough. Of course, if you present to investors, your financial forecast needs
    to be realistic!
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的演示同时满足了帮助观众了解你的产品或服务，并说服他们投资你的业务或购买你的产品/服务的双重需求。如果你需要准备这种类型的演示，考虑一下你产品或服务的优势，并确定它们的感知价值。在任何人购买你的产品或服务之前，你需要赢得并建立观众的信任，仅仅列出特性和流程是不够的。当然，如果你向投资者演示，你的财务预测需要是现实的！
- en: A corporate training session
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 企业培训课程
- en: Delivering corporate training requires clarity on the objectives of the session.
    Were you ta sked with creating training for new hires or because current employees
    do not produce quality work? It might also be because there is a brand-new operating
    system or new applications that people need to get familiar with in order to accomplish
    their daily tasks. Taking the time to reflect on whom you will train, for what
    reasons, and your management’s expectations will help you select important topics
    and decide on the type of content you’ll create to help learners meet expectat
    ions.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 提供企业培训需要明确培训课程的目标。你是被要求为新员工创建培训课程，还是因为现有员工无法完成高质量的工作？也可能是因为有全新的操作系统或新应用，人们需要熟悉这些以完成日常任务。花时间反思你要培训的对象、原因以及管理层期望，将帮助你选择重要主题并决定你将创建哪种类型的内容来帮助学习者达到预期目标。
- en: Question 2 – what is at stake?
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题2 - 存在的风险是什么？
- en: 'Time is the most precious resource in businesses. So, we need to know where
    we absol utely need to put in more time and effort for the best return on our
    investment. That is why you need to ask yourself: what will be the impact if your
    presentation lacks preparation and practice? If you are preparing a bi-weekly
    update, the stakes are not as high as if you were preparing a pitch that could
    win you a $10 million grant for your project. If you are short on time for your
    project update, you can always do better at the next one. But if you don’t put
    in more time and effort for the grant pitch, you might wonder whether your presentation
    made you lose it if you don’t get the grant.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 时间是企业中最宝贵的资源。因此，我们需要知道我们绝对需要在哪些方面投入更多的时间和精力以获得最佳的投资回报。这就是为什么你需要问自己：如果你的演示缺乏准备和实践，会产生什么影响？如果你正在准备一个双周更新，其风险不如你准备一个可能为你赢得1000万美元项目资助的提案高。如果你在项目更新上时间紧张，你可以在下一次做得更好。但如果你不为提案投入更多的时间和精力，你可能会怀疑如果你没有得到资助，你的演示是否让你失去了它。
- en: In a corporate training environment, the stakes might also be very high. You
    need to reflect on what happens if your training content does not meet the requirements.
    What happens to the company’s bottom line if employees cannot accomplish the desired
    tasks? Even if it is difficult to put a precise dollar value on this, you can
    think in terms of inc reased efficiency by taking less time to accomplish certain
    tasks. If you estimate that your training will help employees gain 1 hour each
    week, you can then establish a dollar amount by adding hours saved for the whole
    gro up and multiplying by their salary to help management see the value of the
    tra ining.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在企业培训环境中，风险可能也非常高。你需要反思如果培训内容不符合要求会发生什么。如果员工无法完成预期任务，公司的底线会受到什么影响？即使很难精确地用美元价值来衡量这一点，你可以从提高完成某些任务所需时间的效率来思考。如果你估计你的培训将帮助员工每周节省1小时，那么你可以通过将整个团队节省的时间相加并乘以他们的工资来估算一个美元金额，以帮助管理层看到培训的价值。
- en: Question 3 – what is my main message?
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题3 - 我的主要信息是什么？
- en: This question is most important when you are putting together a presentation
    that will be a su bset or a shorter version of the content you usually present.
    Knowing your main message helps you decide what content needs to be kept and what
    needs to be removed for the actual presentation. Every presenter I know works
    with a lot of content and usually thinks everything is important. But when we
    put our audience’s needs or expectations first, while making sure the main message
    remains the central thread of our presentation, we soon realize that some content
    is not as relevant. In the presentation industry, less is more. Choose your content
    wisely so that it will have more impact.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当你准备一个将成为你通常演示内容的子集或简短版本时，这个问题尤为重要。了解你的主要信息有助于你决定哪些内容需要保留，哪些内容需要删除以进行实际演示。我认识的每个演讲者都处理大量的内容，通常认为每件事都很重要。但当我们把观众的需
- en: 'If you are creating training content, your main message also needs to be very
    clear. Make sure learners see the value of the training for them. I suggest that
    you think about two main messages for corporate training sessions: one that fits
    management expectations in terms of productivity or efficiency, and one that fits
    your learners’ expectations, whether they want to save some time on some tasks
    or understand their role better. There is no magic wand to help you craft messages
    that will appeal to learners and management. You will need to take some time to
    ask both parties about their expectations and pain points.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在创建培训内容，你的主要信息也需要非常清晰。确保学习者看到培训对他们来说的价值。我建议你考虑企业培训会议的两个主要信息：一个符合管理层对生产率或效率的期望，另一个符合学习者的期望，无论他们是否想在某些任务上节省时间，或者更好地理解他们的角色。没有魔法棒能帮助你制定出既能吸引学习者又能吸引管理层的消息。你需要花些时间询问双方对他们的期望和痛点。
- en: Question 4 – what story can help the audience understand the messag e?
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题4 - 哪个故事能帮助观众理解信息？
- en: Human beings love stories. When we look closely, we can even say that most of
    our decisions are influenced by stories. Have you ever taken a close look at popular
    advertisements? They all have a story attached to them, just like in movies.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 人类喜欢故事。当我们仔细观察时，我们甚至可以说，我们的大部分决定都受到故事的影响。你有没有仔细观察过流行的广告？它们都有故事与之相关，就像电影一样。
- en: This is why you need to find a supporting story for your presentation to make
    it more impactful. I am not telling you to craft an intricate plot. Just look
    at a personal or client story that supports your content. For example, if you
    are presenting in front of a room full of potential clients, you could tell the
    story of a past client who came to you with a specific challenge. Tell the audience
    how, after using your product or service, the client was able to increase their
    overall productivity or revenue. If you have permission to name your past client,
    or even get a testimonial you can use, that would be even better. The important
    part is to make sure any story you choose supports the main goal of your presentation.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么你需要找到一个支持性的故事来增强你的演示效果。我并不是要你编织一个复杂的情节。只需看看一个个人或客户故事，它支持你的内容。例如，如果你在面向一群潜在客户的房间里进行演示，你可以讲述一个过去客户带着特定挑战来找你的故事。告诉听众，在使用你的产品或服务后，客户如何能够提高他们的整体生产率或收入。如果你有权限提及你的过去客户，或者甚至得到你可以使用的推荐信，那就更好了。重要的是要确保你选择的任何故事都支持你演示的主要目标。
- en: In a corporate training setting, you could try to craft a story around an employee’s
    journey from before and after the training. Or you could simply state the actual
    situation in the work environment versus what it can be after the training and
    how this will serve the learners too. When I was a trainer in a big telecommunications
    company for their customer service department, I usually used some client experiences
    I had when doing the job so that they could relate and realize why some content
    was extremely important. It is okay to use stories in corporate training as long
    as they illustrate why your teaching points are important and their value when
    going back t o the job.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在企业培训环境中，你可以尝试围绕员工在培训前后的旅程来编织一个故事。或者，你也可以简单地陈述工作环境中实际的情况与培训后的情况相比，以及这将如何服务于学习者。当我是一家大型电信公司客户服务部门的培训师时，我通常会使用我在工作中的一些客户经验，这样他们就能联系起来，意识到为什么某些内容极其重要。在企业培训中使用故事是完全可以接受的，只要它们能说明你的教学重点为什么重要，以及它们在工作中的价值。
- en: Question 5 – who is my target audience?
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题5 - 我的目标受众是谁？
- en: Knowing whom you are presenting to will definitely help you craft a better presentation.
    The language and examples you use need to be aligned with the level of knowledge
    your aud ience might have about the topic. For example, if you are presenting
    to your peers or industry experts, you can use commonly used technical terms.
    But if you are presenting at a conference where your audience might be from different
    backgrounds, the language needs to be simpler. Also, be aware that any acronyms
    or industry jargon might be too much for some people. I am not saying to not use
    them at all. But when it comes to people who don’t have the relevant background,
    introducing these terms first could help them understand the high-level meaning.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 了解你的听众将肯定帮助你制作出更好的演示文稿。你使用的语言和例子需要与听众对主题可能拥有的知识水平相一致。例如，如果你在向同行或行业专家演讲，可以使用常用的技术术语。但如果你在一个可能来自不同背景的听众的会议上演讲，语言需要更简单。此外，要意识到任何缩写或行业行话可能对某些人来说太多。我并不是说完全不用它们。但针对那些没有相关背景的人，首先介绍这些术语可能有助于他们理解高层次的意义。
- en: When you are presenting within your company, and you know the topic could be
    controversial or not be well accepted by some colleagues, make sure to think through
    what objections they might have. This will let you prepare content that will help
    them understand your point, even if they still don’t agree with it.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在公司内部进行演讲，并且你知道这个话题可能会引起争议或不会被某些同事接受时，确保思考他们可能有的反对意见。这将让你准备出有助于他们理解你的观点的内容，即使他们仍然不同意。
- en: When preparing corporate training sessions, think about who will be attending
    the training. If they are new hires, give more detailed information and make sure
    you avoid using jargon without giving proper definitions. When it is content destined
    for current employees, consider what their a ctual level of knowledge might be
    before the session and what level of knowledge you are expecting after th e training.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在准备企业培训课程时，想想谁会参加培训。如果他们是新员工，提供更详细的信息，并确保你在没有给出适当定义的情况下避免使用行话。当内容是为现有员工准备的，考虑他们在会前的实际知识水平以及你期望培训后的知识水平。
- en: Question 6 – what is the duration of my presentation?
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题6 - 我的演讲时长是多少？
- en: 'There is one rule I ask all my clients not to break: *never go over the allotted
    time* . By sticking to this, you are showing respect for your audience’s time
    and for othe r presenters coming after you if you are speaking at an event. Remember
    what I said previously? More information is not always better. Quality and targeted
    information brings more value and is more impactful in the long run.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我要求所有客户遵守的一条规则是：**永远不要超过规定的时间**。遵守这一点，你是在尊重你的听众的时间，如果你在活动中发言，也是在尊重你之后的演讲者。还记得我之前说过的话吗？信息量并不总是越多越好。高质量和针对性的信息在长期来看更有价值，也更有影响力。
- en: So, keeping in mind the duration of your presentation will also help you estimate
    how much detail you can include in your content. Also, always include enough time
    so that attendees can ask questions and interact with you.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，考虑到你的演讲时长也将帮助你估计你可以在内容中包含多少细节。此外，总是要留出足够的时间，以便参与者可以提问并与你互动。
- en: 'You might be wondering whether there is a simple way to figure out how much
    content you can plan according to the allotted time. Through the years, I have
    shared this rule of thumb with clients to help them out. It is not an exact science,
    but it worked every time I used it:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道有没有一种简单的方法来确定你可以根据规定的时间规划多少内容。多年来，我向客户分享了这个经验法则，以帮助他们。这并不是一门精确的科学，但每次我使用它都有效：
- en: '**Content planning rule**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**内容规划规则**'
- en: Plan content for 75% of the allotted time. That means that if your talk is scheduled
    to be 1 hour, plan content for 45 minutes. You never know when technology glitches
    might get in the way or if the event experiences scheduling delays. If you are
    wondering how this rule can be translated into the number of slides, we will address
    this burning question in [*Chapter 2*](Chapter_02.xhtml#_idTextAnchor130) , on
    industry best practices.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 规划内容占规定时间的75%。这意味着如果你的演讲安排为1小时，就规划45分钟的内容。你永远不知道技术故障何时会出现，或者活动是否会有调度延迟。如果你想知道这个规则如何转化为幻灯片的数量，我们将在[*第二章*](Chapter_02.xhtml#_idTextAnchor130)中解答这个热门问题，讨论行业最佳实践。
- en: Depending on your topic, you could even consider having less content and allowing
    more time for interactions. When the audience gets the chance to really participate,
    it will make your presentation more memorable and meaningful. Don’t be afraid
    of finishing early because the audience did not participate as much as you thought.
    In my over 25 years in the industry, I have never seen anyone complain because
    a presentation finished early. Some people will use the extra time for a break
    before their next obligation, and others will take this as an opportunity to ask
    you more questions. In either case, ever yone is happy.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的主题，你甚至可以考虑减少内容，并留出更多的时间进行互动。当观众有机会真正参与时，这将使你的演示文稿更加难忘和有意义。不要害怕提前结束，因为观众没有像你想象的那样积极参与。在我的超过25年的行业生涯中，我从未见过有人因为演示文稿提前结束而抱怨。有些人会利用额外的时间在他们下一个义务之前的休息，而其他人则会抓住这个机会问你更多的问题。在两种情况下，每个人都感到高兴。
- en: Question 7 – what type of venue will I present in?
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题7 - 我将在哪种类型的场所进行演示？
- en: How you will be delivering your presentation is a very important question. Your
    content design needs to consider whether you will be presenting in a huge venue
    for 1,000 attendees – that usually means very large screens and some people very
    far away – a small meeting room, or even a remote virtual presentation that might
    be watched on regular computer screens, tablets, or mobile phones.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 你将如何呈现你的演示文稿是一个非常重要的问题。你的内容设计需要考虑你是在为1,000名参会者的巨大场馆进行演示——这通常意味着非常大的屏幕和一些人离得很远——一个小会议室，或者甚至是一个可能通过普通电脑屏幕、平板电脑或手机观看的远程虚拟演示。
- en: When you are presenting in large venues, you need to be informed of the size
    of the room and screen, and the lighting in the venue. This will allow you to
    use the best font sizes and contrast to make sure everyone in the room will be
    able to read any words you have on your slides, even from the back of the room.
    If you will be presenting virtually, keep in mind the various screen sizes from
    which your talk will be viewed. The smaller the screen, the less content you can
    have on slides to keep them readable.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在大型场馆进行演示时，你需要了解房间和屏幕的大小，以及场馆的照明。这将使你能够使用最佳的字体大小和对比度，确保房间里的每个人都能阅读你幻灯片上的任何文字，即使是从房间后面也能看清楚。如果你将进行虚拟演示，请记住你的演讲将被观看的各种屏幕大小。屏幕越小，你可以在幻灯片上放置的内容就越少，以保持其可读性。
- en: Thinking about where your presentation will be delivered also allows you to
    plan what type of equipment will be used. When presenting for an event, you might
    have to use the venue’s computer instead of yours. This means making sure the
    presentation you design is compatible with the venue’s computer – is it Windows
    or Mac? Also, asking which PowerPoint version is used on the venue’s computer
    will help you avoid compatibility issues with your pr esentation file.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑你的演示文稿将在哪里呈现，也允许你计划将使用哪种类型的设备。当你为活动进行演示时，你可能不得不使用场馆的电脑而不是你自己的。这意味着确保你设计的演示文稿与场馆的电脑兼容——它是Windows还是Mac？询问场馆的电脑上使用的是哪个PowerPoint版本将帮助你避免演示文稿文件与你的演示文稿不兼容的问题。
- en: Question 8 – what type of presenter am I?
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题8 - 我是什么样的演讲者？
- en: This question usually triggers some surprised looks! The reason I think this
    is impo rtant is to help presenters reflect on how comfortable they are with technology
    and equipment and to get them to consider whether they suffer from various levels
    of public speaking fears.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题通常会引发一些惊讶的表情！我认为这个问题之所以重要，是为了帮助演讲者反思他们对技术和设备的舒适程度，并让他们考虑自己是否受到各种程度的公众演讲恐惧的影响。
- en: Being honest about our fears or lack of technological and equipment knowledge
    is important. It allows presenters to act on and refine elements that will improve
    their delivery, making them more impactful. Learning how to use a presentation
    remote when on stage for an event will allow you to get closer to the audience,
    in stead of standing behind a lectern. Getting more familiar with PowerPoint’s
    native tools such as **Presenter View** , **PowerPoint Live** , and **Pr esenter
    Coach** will improve your presence and reduce your fear of public speaking. This
    is why I have dedicated the last section of this book to delivering better presentations
    with PowerPoint’s advanced delivery tools. Presentation success is much mor e
    than your visuals!
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 对我们的恐惧或技术和设备知识的缺乏保持诚实是很重要的。这允许演讲者采取行动并完善将提高其演讲效果的因素，使他们更具影响力。学习如何在活动期间站在舞台上使用演示文稿遥控器，将使你能够更接近观众，而不是站在讲台后面。更熟悉PowerPoint的内置工具，如**演示者视图**、**PowerPoint
    Live**和**演示者教练**，将提高你的表现力并减少你公开演讲的恐惧。这就是为什么我把这本书的最后一部分奉献给了使用PowerPoint的高级演示工具来制作更好的演示。演示的成功远不止你的视觉元素！
- en: Question 9 – what questions might be asked by the audience?
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第9个问题——观众可能会提出哪些问题？
- en: Through the years, this question has triggered many discussions with my clie
    nts. Many did not see any value in thinking about potential questions from their
    audience. I usually replied that the more prepared you are, the less chance you
    have of being taken off-guard by questions that would have been so easy to prepare
    in advance.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 多年来，这个问题激发了我与客户之间的许多讨论。许多人没有看到从他们的观众那里思考潜在问题的任何价值。我通常回答说，你准备得越充分，你被那些本可以提前准备好的问题搞得措手不及的机会就越小。
- en: For example, if you must present a new work process impacting workers in their
    daily tasks, ask yourself what resistance they might have to this change. Being
    able to acknowledge their fears and reassure them quickly is much better than
    having to tell them you will have to check and come back with an answer. If you
    are presenting your latest revolutionary product, be prepared to answer questions
    on what advantages your product might have compared to your competitors’ products.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你必须展示一个影响工人日常任务的新工作流程，问问自己他们可能对这个变化有什么阻力。能够承认他们的恐惧并迅速安慰他们，比告诉他们你需要检查并回来回答要好得多。如果你在展示你最新的革命性产品，请准备好回答关于你的产品与竞争对手的产品相比可能有哪些优势的问题。
- en: Being prepared will give you much more control over how well your presentation
    will go. It does not mean you need to have answers to every question. Telling
    someone you will have to check more details and get back to them with an answer
    is proof that you are a professional. You just need to avoid having to do this
    for most questions asked during your presentation so that you don’t lose your
    credibility.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 准备充分将使你对自己的演示效果有更多的控制。这并不意味着你需要对每个问题都有答案。告诉某人你需要检查更多细节，并在回答后回复他们，这证明了你是专业人士。你只需要避免在演示过程中回答大多数问题，这样你就不会失去信誉。
- en: Question 10 – what content do I already have available?
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第10个问题——我已经有什么内容可用？
- en: This final question on my top 10 list is essential if you want to be efficient.
    Thr ough the years, I have seen so many people re-creating content repeatedly,
    from scratch. Even if you have not done so before, take some time to go through
    previous presentations you created, and create an image and graphics library you
    can go to instead of starting the whole process over each time you create a presentation.
    Know what you have on hand or what content your organization might have stored
    on a shared drive so that you can make your content production much more efficient.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的前十大问题中，这个问题对于想要提高效率的人来说是至关重要的。多年来，我见过许多人从头开始重复创建内容。即使你以前没有这样做过，也请花些时间回顾一下你之前创建的演示文稿，并创建一个你可以随时查阅的图像和图形库，而不是每次创建演示文稿时都从头开始整个过程。了解你手头有什么，或者你的组织可能在共享驱动器上存储了哪些内容，这样你可以使你的内容制作更加高效。
- en: Reading through the list of my top 10 questions before creating any slides might
    have put you in a bit of a panic. If that’s the case, breathe and relax! Just
    keep *Figure 1.1* as a reference for your next presentation planning. Your presentation
    will improve, even if you take just one step at a time.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建任何幻灯片之前阅读我的前十大问题列表可能让你有些慌张。如果是这样，深呼吸，放松！只需将*图1.1*作为你下一次演示计划时的参考。即使你一次只迈出一小步，你的演示也会有所改进。
- en: Now that you have planned your content, it is time to analyze and sort it. This
    is what you will lea rn in the next section.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经规划了你的内容，是时候分析并整理它了。这就是你将在下一节中学到的内容。
- en: Analyzing and sorting your content
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分析和整理你的内容
- en: Making sure your content has a good structure and a clear messa ge requires
    you to take some time to analyze the content you already have. By content, I don’t
    mean only other PowerPoint files you might have created before. Any photos or
    graphics created for other corporate documents, or even your website, need to
    be looked at as potentially reusable content. In this section, you will learn
    how you can start the process and go through the sorting step using one of the
    printin g features in PowerPoint.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 确保你的内容有一个良好的结构和清晰的信息，需要你花一些时间分析你已经拥有的内容。通过内容，我并不是指你之前可能创建的其他 PowerPoint 文件。任何为其他公司文件或甚至你的网站创建的照片或图形，都需要被视为可能可重复使用的内容。在本节中，你将学习如何开始这个过程，并使用
    PowerPoint 中的一个打印功能进行排序步骤。
- en: What is the best way to start?
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最好的开始方式是什么？
- en: 'I’ll repeat myself once again: *the last place to start is on a blank slide
    in the PowerPoint application* . If you know you have content in other PowerPoint
    files that could be reused, you should open your files and print the relevant
    slides in the six-slides-per-page format.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我再重复一遍：*最后一个开始的地方是在 PowerPoint 应用程序的空白幻灯片上*。如果你知道你有其他 PowerPoint 文件中的内容可以重复使用，你应该打开你的文件，并按每页六个幻灯片的格式打印相关幻灯片。
- en: 'If you have never done that, here is how it can be done. Each of the following
    steps is represented by the same number bubble in *Figure 1.2* :'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从未这样做过，以下是操作方法。以下每个步骤在*图 1.2*中都有相同的数字气泡表示：
- en: From the **File** tab in PowerPoint, go to **Print** .
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 PowerPoint 的**文件**选项卡转到**打印**。
- en: Choose the **6 Slides Horizontal** layout from the **Handouts** layouts in the
    drop-down list.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉列表中的**讲义**布局中选择**6 幻灯片横向**布局。
- en: Make sure you are not printing on both sides of the pages.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保你不会在页面的两面都打印。
- en: "![Figure 1.2 – Settings to print six sli\uFEFFdes per page](img/B32063_01_02.png)"
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.2 – 每页打印六个幻灯片的设置](img/B32063_01_02.png)'
- en: Figure 1.2 – Settings to print six sli des per page
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.2 – 每页打印六个幻灯片的设置
- en: 'If you don’t need all the slides in your file, don’t forget to select the slides
    you want to print in the slide range field. In our example in *Figure 1.2* , we
    would be printing slides 10 to 16 ( **10-16** ). If you need to print a range
    and some specific slides, it can be done by adding a comma between the slide numbers.
    As an example, to print slide 1, slide 3, and slides 10 to 16, it would be entered
    in the field as follows: `1,3,10-16` . Creating more impactful presentations does
    not require killing too many trees in the process.'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你不需要文件中的所有幻灯片，不要忘记在幻灯片范围字段中选择你想要打印的幻灯片。在我们的例子*图 1.2*中，我们将打印幻灯片 10 到 16（**10-16**）。如果你需要打印一个范围和一些特定的幻灯片，可以通过在幻灯片编号之间添加逗号来完成。例如，要打印幻灯片
    1、幻灯片 3 和幻灯片 10 到 16，它将在字段中输入如下：`1,3,10-16`。创建更具影响力的演示文稿不需要在这个过程中砍伐太多树木。
- en: 'Once you have your pages printed, cut the small slides ( *Figure 1.3* ) so
    that you can use them to play around wi th your content sequence:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的页面打印完成，将小幻灯片（*图 1.3*）裁剪下来，这样你就可以使用它们来调整你的内容顺序：
- en: "![Figure 1.3 – Printout with the six-sli\uFEFFde layout](img/B32063_01_03.png)"
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.3 – 六幻灯片布局的打印输出](img/B32063_01_03.png)'
- en: Figure 1.3 – Printout with the six-sli de layout
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.3 – 六幻灯片布局的打印输出
- en: If you find any other type of content that could help you make your presentation
    more visual, then start a blank PowerPoint file in which you can add visuals,
    with each on its own slide, so that you can again use the previous printing tip.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你发现任何其他类型的内容可以帮助你使你的演示文稿更加视觉化，那么就创建一个空白 PowerPoint 文件，在其中你可以添加视觉元素，每个元素都在自己的幻灯片上，这样你就可以再次使用之前的打印技巧。
- en: If you have any other idea that came to mind while planning your content, but
    don’t have any existing content for it, just use some plain index cards or any
    other type of paper on which you can quick ly sketch or add keywords.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你规划内容时想到了其他想法，但没有现有内容，只需使用一些普通的索引卡或任何其他类型的纸张，你可以在上面快速绘制或添加关键词。
- en: So rting the content
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整理内容
- en: 'Now that you have the printouts of visuals and index cards, you can start organizing
    and grouping your ideas (see *Figure 1.4* ). Many times, people have asked me
    whether mind mapping software can be used instead of printouts and index cards;
    the answer is yes. However, working with physical elements that you can manipulate
    will help your creativity. It usually makes it easier to play around with groupings
    and start prioritizing what content is important:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你有了视觉和索引卡片的打印件，你可以开始组织和分组你的想法（见*图1.4*）。很多时候，人们问我是否可以使用思维导图软件代替打印件和索引卡片；答案是肯定的。然而，使用你可以操作的物理元素将有助于你的创造力。这通常使得玩转分组和开始优先考虑哪些内容重要变得更容易：
- en: '![Figure 1.4 – Organizing and grouping your ideas](img/B32063_01_04.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图1.4 – 组织和分组你的想法](img/B32063_01_04.png)'
- en: Figure 1.4 – Organizing and grouping your ideas
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.4 – 组织和分组你的想法
- en: 'If you went through the planning questions, you should already be able to start
    seeing which ideas or content will support your message. It is now time to start
    grouping ideas into two categories: *need to know* and *nice to have* . Maybe
    you have som e interesting content that does not quite fit the actual purpose
    of your presentation but could be part of extra content that could be shown on
    demand. Always keep in mind the most important question I shared at the beginning
    of this chapter: *What are the three most important elements your audience needs
    to remember or act on after your presentation?* This will help you determine what
    content is important for your talk.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经通过了规划问题，你应该已经能够开始看到哪些想法或内容将支持你的信息。现在是时候开始将想法分为两类：*需要知道*和*希望有*。也许你有一些有趣的内容并不完全符合你演示的实际目的，但可以是额外内容的一部分，可以在需要时展示。始终牢记我在本章开头分享的最重要的问题：*在你的演示之后，你的观众需要记住或采取行动的三个最重要的元素是什么？*这将帮助你确定哪些内容对你的演讲很重要。
- en: Even if you have the feeling that you don’t have time to do this, trust me –
    it will save you a *lot* of time when you start building the content. Many times,
    I have had to tell people that they need to remove some irrelevant slides from
    their presentation deck. Most of them replied they did not want to because they
    had spent many hours building those slides. Putting in the time to plan, sort,
    structure, and develop your message outside of PowerPoint is how you will avoid
    spending hours creating irrelevant slides.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你感觉你没有时间做这件事，相信我——当你开始构建内容时，它将为你节省很多时间。很多时候，我不得不告诉人们他们需要从他们的演示文稿中删除一些无关的幻灯片。他们中的大多数人都回答说他们不想这样做，因为他们已经花费了很多小时来构建这些幻灯片。在PowerPoint之外花时间规划、整理、结构化和开发你的信息，这样你就可以避免花费数小时创建无关的幻灯片。
- en: Structuring and developi ng your message
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结构化和开发你的信息
- en: If you have accomplished the planning and analysis tasks from the previous sections,
    you are in a great position to create a more impactful presentation in less time
    than you thought possible. Putting aside, or even throwing away, ideas that were
    slide printouts or index cards is much easier to do than deleting slides you sp
    ent hours creating.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经完成了前几节中的规划和分析任务，你现在处于一个很好的位置，可以在比你想的更短的时间内创建一个更有影响力的演示。摒弃或甚至丢弃那些作为幻灯片打印件或索引卡片的想法，比删除你花费数小时创建的幻灯片要容易得多。
- en: Now, you need to structure your me ssage and content. There are many ways to
    accomplish this, and you might even have heard of other models that can be used.
    Since I want to make this part as easy as possible for any business context, I’ll
    introduce you to the three-part model.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要结构化你的信息和内容。有许多方法可以实现这一点，你可能甚至听说过其他可以使用的模型。由于我想让这部分对任何商业环境尽可能简单，我将向你介绍三部分模型。
- en: The th ree-part model
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 三部分模型
- en: 'The three-part model might look f amiliar. This is because it’s the structure
    adopted by movies, novels, and even some ads. It starts with an introduction,
    flows through three important elements, and then conc ludes, as shown in *Figure
    1.5* :'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 三部分模型可能看起来很熟悉。这是因为它被电影、小说甚至一些广告所采用的结构。它从介绍开始，通过三个重要元素流动，然后结束，如*图1.5*所示：
- en: '![Figure 1.5 – The three-part model content structure](img/B32063_01_05.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图1.5 – 三部分模型内容结构](img/B32063_01_05.png)'
- en: Figure 1.5 – The three-part model content structure
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.5 – 三部分模型内容结构
- en: 'In case you have not realized it yet, it’s also the model I’ve used for this
    PowerPoint book. I started by introducing the main problems we see in business
    presentations and how they can affect how impactful your presentation will be,
    your credibility, and even the level of success, whether it is measured by reviews
    or sales. The content of the book is divided into three parts: planning and preparation,
    creating visually appealing content, and delivering better presentations by leveraging
    the advanced delivery tools in PowerPoint. As for my conclusion, you will be able
    to read it a t the end of the book!'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有意识到，这也是我用于这本PowerPoint书籍的模型。我开始介绍我们在商业演示中看到的主要问题以及它们如何影响你的演示的影响力、你的可信度，甚至成功水平，无论是通过评论还是销售来衡量。本书的内容分为三个部分：规划和准备、创建视觉吸引力的内容，以及通过利用PowerPoint的高级演示工具来提供更好的演示。至于我的结论，你可以在书的结尾阅读到它！
- en: 'By using this model, you will be able to create your presentation using the
    following three steps:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用这个模型，你将能够按照以下三个步骤创建你的演示：
- en: 'Plan an introduction that will catch your audience’s attention:'
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定一个能够吸引观众注意力的开场白：
- en: Think about a personal story that adds value to the topic you are presenting.
    Maybe you went through a challenge and overcame it with the elements that you
    will be discussing in your presentation.
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑一个与你要展示的主题相关的个人故事，增加价值。也许你经历了一个挑战，并使用你将在演示中讨论的元素克服了它。
- en: Maybe you have a client case study that shows how challenging their situation
    was before they came to you and how your solution helped them.
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 也许你有一个客户案例研究，展示了他们在来找你之前的情况是多么具有挑战性，以及你的解决方案是如何帮助他们。
- en: Think about any surprising statistics from your industry that show how important
    it is to find a solution.
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑你所在行业中的任何令人惊讶的统计数据，这些数据表明找到解决方案是多么重要。
- en: Ask a disruptive question, knowing that it will get the audience’s attention
    and that you will show them a different way to see things during your talk.
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出一个颠覆性的问题，知道这将吸引观众的注意力，并在你的谈话中向他们展示看待事物的一种不同方式。
- en: Use anything that can help you show your audience that your message or solutions
    are linked to an everyday problem or their own lives. Make sure to address any
    problem or irritating situation they might be going through, its impact on them,
    and what can be done to resolve it.
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用任何可以帮助你向观众展示你的信息或解决方案与日常问题或他们自己的生活相关联的东西。确保解决他们可能遇到的问题或令人烦恼的情况，它对他们的影响，以及可以采取什么措施来解决它。
- en: 'Choose the three most important points you want to talk about during your presentation:'
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在你的演示中，选择你想要讨论的三个最重要的要点：
- en: Your content is where you need to show your audience the difference you can
    make on their problem or challenge.
  id: totrans-105
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的内容是你向观众展示你可以在他们的问题或挑战上产生差异的地方。
- en: Why three? Simply because human beings can easily remember three main points.
    When we think about it, we have seen many examples using the number three in our
    lives, whether in children’s stories (three blind mice, three musketeers) or from
    fast food restaurants with their *combos* that have three components. Increase
    your chances of being memorable and avoid having more than thre e main points
    in your talk.
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么是三个？简单来说，因为人类很容易记住三个主要点。当我们思考时，我们在生活中看到许多使用数字三的例子，无论是儿童故事（三只瞎老鼠，三个火枪手）还是快餐店的*套餐*，它们由三个部分组成。增加你的记忆度，并避免在谈话中包含超过三个主要点。
- en: 'Plan an impactful conclusion:'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定一个有影响力的结论：
- en: You can summarize your three most important points again so that the audience
    is reminded of them one more time.
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以再次总结你的三个最重要的要点，这样观众就会再次提醒自己。
- en: Make sure to have a specific call to action, helping your audience realize that
    they too can overcome a challenge or solve a problem if they use what you taught
    them during your talk.
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保有一个具体的行动号召，帮助观众意识到，如果他们使用你在谈话中教给他们的东西，他们也可以克服挑战或解决问题。
- en: My description of the three-part model is intentionally kept simple so that
    you don’t feel overwhelmed or that you cannot apply it on your own. If you give
    yourself enough time before your next presentation, you will be able to reproduce
    the steps to improve your content.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意将三部分模型描述得简单，这样你就不会感到不知所措，或者觉得自己无法独立应用它。如果你在下次演示之前给自己足够的时间，你将能够重现这些步骤来改进你的内容。
- en: Telling your story
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 讲述你的故事
- en: Before ending this chapter, I want to talk a little more about using stories
    in your presentations. If I ask you to think about anything you hav e seen or
    heard that you can still remember after a long time, was there a story attached
    to it? A specific emotion that comes back when you think about it? I bet this
    is the case. People remember things much longer when it has a story that either
    resonated with their daily lives or made them feel a special way.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在结束这一章之前，我想再谈谈在演示中使用故事的重要性。如果我问你思考一下你长时间后仍然记得看到或听到的任何事情，有没有与之相关的故事？当你想起它时，有没有一种特定的情感回来？我打赌这是真的。当故事与他们的日常生活产生共鸣或让他们有特别的感觉时，人们会记得事情更长。
- en: Some people have saved their businesses because they found the perfect story
    to help their potential clients realize how important their product or service
    could be. I have had some workshop attendees tell me that their topic was much
    too serious to include stories. All human beings will react to emotions, and emotions
    are triggered best with relatable stories. Unless you are presenting to robots,
    there is no reason why you should avoid using stories. Of course, make sure your
    story is relevant to your audience and adapted to their level of expertise or
    needs.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人通过找到完美的故事来帮助他们的潜在客户意识到他们的产品或服务可能有多么重要，从而挽救了他们的企业。我有一些研讨会参与者告诉我，他们的主题太严肃，不能包含故事。所有的人类都会对情感做出反应，而情感最好通过相关的故事来激发。除非你是在向机器人做演示，否则没有理由你应该避免使用故事。当然，确保你的故事与你的听众相关，并适应他们的专业知识水平或需求。
- en: 'When you have found the right story to convey your message, there is another
    element that you absolutely need to put into practice: *use visuals, not endless
    bullet points* .'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 当你找到了传达你信息的正确故事时，还有另一个你必须实践的元素：*使用视觉，而不是无穷无尽的要点*。
- en: 'Let me give you an example. A few years ago, I was asked to give a talk on
    taking advantage of artificial intelligence in the latest version of PowerPoint
    to help craft better presentations. The script for my introduction was as follows:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 让我给你举一个例子。几年前，我被要求就如何利用最新版PowerPoint中的人工智能来制作更好的演示进行演讲。我的开场白剧本如下：
- en: The means of human communication have greatly evolved since the drawings of
    cavemen.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自从洞穴人的绘画以来，人类交流的方式已经发生了巨大的变化。
- en: From the first art schools, the teachings were mainly based on the art of public
    speaking.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从第一所艺术学校开始，教学主要基于公共演讲的艺术。
- en: And then the creation of large, majestic libraries filled with books of all
    kinds.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后是创建大型、壮丽的图书馆，里面装满了各种书籍。
- en: After that came the first films.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之后出现了第一批电影。
- en: Then the introduction of overhead projectors as a means of teaching.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后是投影仪作为教学手段的引入。
- en: The technology then took over with desktop software, projectors, Apple TV, tablets,
    and even smartphones.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随后，桌面软件、投影仪、Apple TV、平板电脑甚至智能手机等技术接管了市场。
- en: But why do people still talk so much about boring presentations and d eath by
    PowerPoint?
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 但为什么人们还在如此津津乐道于无聊的演示和PowerPoint导致的死亡？
- en: Imagine if I had put that script onto slides as bullet points. First, asking
    my audience to listen to me and read slides would not have given me great results.
    People usually read faster than they can speak, so they would have reached the
    end of the bullet list without paying much attention to how I delivered the content.
    What I did instead was look for a series of nice photos that could relate to my
    script and go through them while I talked.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我把那个剧本放在幻灯片上作为要点。首先，要求我的听众听我说话并阅读幻灯片不会给我带来很好的效果。人们通常阅读速度比说话快，所以他们会在没有太多注意我如何呈现内容的情况下就到达了要点列表的末尾。我实际上做的是寻找一系列与我的剧本相关的精美照片，并在谈话时浏览它们。
- en: 'This is a screen capture of my presentation introduction (see *Figure 1.6*
    ). After the title slide, each bullet in the previous list is matched to a slide
    with a photo. Take a look at each slide and re ad the preceding associated bullet:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我演示开场屏幕截图（见图1.6）。在标题幻灯片之后，上一个列表中的每个要点都与一张照片幻灯片相匹配。看看每一张幻灯片并阅读前面的相关要点：
- en: "![Figure 1.6 – Presentation introd\uFEFFuction using photos](img/B32063_01_06.png)"
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图1.6 – 使用照片的演示开场](img/B32063_01_06.png)'
- en: Figure 1.6 – Presentation introd uction using photos
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.6 – 使用照片的演示开场
- en: Can you imagine how different the experience was for the audience? Instead of
    being forced to read sentences on a slide, they were listening to me and letting
    their eyes take in a visual, which was much more memorable than words alone.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 你能想象听众的经验会有多不同吗？他们不是被迫阅读幻灯片上的句子，而是在听我说话，并让他们的眼睛吸收视觉信息，这比单纯的文字更容易记住。
- en: I now challenge you to go back to your ideas for future PowerPoint presentations
    and start thinking about visual elements that could replace sentences and bullet
    points in your presentation. You will then have a starting point for when you
    go through the chapters discussing PowerPoint features that will help you create
    visually appealing content. If you need visual inspiration, you should consider
    *The Better Deck Deck* , a great tool from my MVP colleague Nolan Haims. Information
    is prov ided in the Further reading section.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在挑战你回到你为未来的PowerPoint演示文稿的想法，开始思考可以替代你演示文稿中的句子和项目符号的视觉元素。然后你将有一个起点，当你阅读讨论PowerPoint功能的章节时，这些章节将帮助你创建视觉上吸引人的内容。如果你需要视觉灵感，你应该考虑来自我的MVP同事诺兰·海姆斯的《更好的演示文稿》工具。相关信息可以在进一步阅读部分找到。
- en: Summary
  id: totrans-129
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we covered my top 10 questions to help you plan your presentation,
    considered how to analyze and sort your content, and discussed how to structure
    and develop your message. You now have a better understanding of how to improve
    your presentation’s impact by focusing on the key message, story, and structure.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了帮助你规划演讲的十大问题，考虑了如何分析和整理你的内容，并讨论了如何构建和开发你的信息。你现在对如何通过关注关键信息、故事和结构来提高演讲的影响力有了更好的理解。
- en: Of course, reading this chapter won’t make you fully comfortable with the process
    the first time you use it. You might even go through a phase of thinking that
    it takes too much time and is not worth it. My wish is that you keep on trying,
    even if it means improving only one element in your planning phase each time.
    Your overall success won’t be determined by how many changes you made in one presentation
    but by how many baby steps you took to keep improving your presentations.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，第一次使用这个章节的内容时，你可能不会完全适应这个过程。你甚至可能会经历一个认为这需要太多时间且不值得的阶段。我的愿望是，即使每次只改进规划阶段的一个元素，你也能继续尝试。你的整体成功不会由你在一次演讲中做了多少改变来决定，而是由你为了持续改进演讲所采取的多少小步骤来决定。
- en: 'I will leave you with a comment I received from a client I worked with not
    long ago: “This process was eye-opening. It allowed me to think about important
    information that added value to my message. I now realize how efficient this process
    is, allowing me to save time during the creation process. Taking that extra time
    to plan and structure the content also helped me master my content even more and
    made my delivery practice very efficient.”'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我将把不久前一位客户给我的评论留给你：“这个过程让我眼界大开。它让我思考了那些能为我信息增值的重要信息。我现在意识到这个过程是多么高效，它让我在创作过程中节省了时间。花额外的时间来规划和结构化内容也帮助我更好地掌握我的内容，并使我的演讲练习非常高效。”
- en: In the next chapter, we will be moving along our journey to more impactful presentations
    by learning about industry best practices in terms of font choice and sizes, contrast
    rules, and how to avoid unnecessary visual elements so that you can impro ve the
    look and feel of your slides.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将继续我们的旅程，通过学习关于字体选择和大小、对比规则以及如何避免不必要的视觉元素等方面的行业最佳实践，来提高你的演讲影响力。这样你可以改善幻灯片的视觉效果和感觉。
