    .'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要深入了解本章中讨论的三步模型，你应该阅读我杰出的同事南希·杜尔特的《共鸣》。她出色地研究了最具影响力的演讲应该如何构建。你可以在她的网站上找到电子书：[https://www.duarte.com/resonate/](https://www.duarte.com/resonate/)。
- en: 'If you want to get visual inspiration to avoid using bulleted lists, you should
