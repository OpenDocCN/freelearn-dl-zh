    developed this inspirational deck of cards to help presentation creators avoid
    endless text lists. You can find information on his website here: [htt ps://www.nolanhaimscreative.com/shop](https://www.nolanhaimscreative.com/shop)
    .'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您想要获得视觉灵感以避免使用项目符号列表，您应该看看我的创意同事Nolan Haims的*更好的牌组*。他开发了这套启发性的卡片，以帮助演示创建者避免无穷无尽的文本列表。您可以在他的网站上找到相关信息：[https://www.nolanhaimscreative.com/shop](https://www.nolanhaimscreative.com/shop)。
