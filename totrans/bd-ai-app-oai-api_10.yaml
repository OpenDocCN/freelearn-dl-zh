- en: <st c="0">10</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="3">Speech Recognition and Text-to-Speech with the Whisper API</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="62">Welcome to</st> [*<st c="74">Chapter 10</st>*](B22414_10.xhtml#_idTextAnchor120)
    <st c="84">of our journey into the world of cutting-edge AI technologies.</st>
    <st c="148">In this chapter, we’ll embark on an exploration of the remarkable</st>
    **<st c="214">Whisper API</st>**<st c="225">. Harnessing the</st> <st c="242">power
    of advanced speech recognition and translation, the Whisper API opens exciting
    possibilities for transforming audio into text.</st> <st c="375">Imagine having
    the ability to transcribe conversations, interviews, podcasts, or any spoken content
    effortlessly.</st> <st c="489">Whether you aim to extract valuable insights from
    multilingual audio files or create accessible content for a global audience, the
    Whisper API has</st> <st c="636">you covered.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="648">In this chapter, we will do a deep dive into the core functionalities
    of the Whisper API by developing a language transcription project using Python.</st>
    <st c="799">We’ll get acquainted with its essential endpoints, namely transcriptions
    and translations, which form the backbone of its speech-to-text capabilities.</st>
    <st c="950">With its state-of-the-art open source model, Whisper equips developers
    with powerful tools to seamlessly transcribe audio files in multiple languages
    and even translate them into English.</st> <st c="1138">The Whisper API handles
    an extensive range of languages, ensuring compatibility with diverse speech requirements.</st>
    <st c="1252">It can be utilized in smart speakers, hands-free devices, and other
    voice-enabled technologies, enhancing user experiences by providing accurate and
    responsive speech</st> <st c="1419">synthesis capabilities.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1442">In a world where global communication is more important than ever,
    the translations endpoint of the Whisper API plays a vital role.</st> <st c="1575">This
    endpoint not only transcribes audio files but also translates them into English,
    bridging the gap between languages and facilitating</st> <st c="1713">seamless
    understanding.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1736">In this chapter, you will go through the</st> <st c="1778">following
    topics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="1795">Implementing text translation and transcription with the</st> <st
    c="1853">Whisper API</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1864">Building a voice</st> <st c="1882">transcription application</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1907">Using PyDub for longer</st> <st c="1931">audio inputs</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="1943">By the end of this chapter, you will have gained a comprehensive
    understanding of the Whisper API and its remarkable capabilities, including speech-to-text
    conversion and language translation.</st> <st c="2137">You will also have learned
    how to leverage the API to transcribe audio files accurately, translate them into
    English, handle longer inputs, and unlock the potential of spoken language in</st>
    <st c="2324">your applications.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2342">Technical requirements</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2365">To successfully undertake this project of developing a desktop
    application for language translation, you must meet the following</st> <st c="2495">technical
    prerequisites:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2519">Ensure that your machine has Python 3.7 or a newer</st> <st c="2571">version
    installed</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2588">Have a code editor such as VSCode (recommended)</st> <st c="2637">set
    up</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2643">Create a Python</st> <st c="2660">virtual environment</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2679">Obtain an OpenAI</st> <st c="2697">API key</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2704">Install PyDub in</st> <st c="2722">your project</st>
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2734">The code snippets showcased in this chapter are available on the
    GitHub platform.</st> <st c="2817">You can access them by following this</st>
    <st c="2855">link:</st> [<st c="2861">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="2937">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2938">Implementing text translation and transcription with the Whisper
    API</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="3007">In this section, we</st> <st c="3028">will explore the capabilities</st>
    <st c="3058">of the Whisper API to</st> <st c="3080">transcribe and translate</st>
    <st c="3105">audio files seamlessly using Python.</st> <st c="3142">With the advancements
    in speech recognition and translation technology, we can now effortlessly convert
    spoken language into text and bridge language barriers effectively.</st> <st c="3314">By
    following the step-by-step instructions provided, you will be equipped with the
    knowledge and skills necessary to integrate the Whisper API into your Python projects
    and unlock the potential of</st> <st c="3511">audio-based data.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3528">Throughout this section, we will explore the different aspects
    of transcribing and translating</st> <st c="3624">audio files.</st> <st c="3637">Starting
    with the</st> <st c="3655">setup and installation</st> <st c="3678">requirements,
    we will ensure</st> <st c="3707">that you have the necessary tools, including
    Python, a code editor, a Python virtual environment, and an OpenAI</st> <st c="3819">API
    key.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3827">To proceed with transcribing and translating audio files using
    the Whisper API in Python, it is recommended to create a directory called</st>
    `<st c="3965">WhisperAPI</st>` <st c="3975">and load it with the VSCode IDE.</st>
    <st c="4009">Activate your virtual environment from the terminal window following
    the steps outlined in</st> [*<st c="4100">Chapter 1</st>*](B22414_01.xhtml#_idTextAnchor013)<st
    c="4109">,</st> *<st c="4111">Getting Started with the ChatGPT API for</st>* *<st
    c="4152">NLP Tasks</st>*<st c="4161">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4162">Once the project is created, you will be presented with the VSCode
    editor window, where you can start writing your Python code.</st> <st c="4291">You
    can create Python scripts, import libraries, and organize your project structure
    within the VSCode</st> <st c="4394">project view.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4407">Now that you have set up your project, the next step is to install
    the necessary libraries, namely OpenAI and PyDub.</st> <st c="4525">To do that,
    open the terminal by going to your terminal window.</st> <st c="4589">From there,
    type the</st> <st c="4610">following commands:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: <st c="4689">By executing these commands, you will automatically download and
    install the OpenAI and PyDub libraries, ensuring that they are readily available
    for your project.</st> <st c="4854">FFmpeg is a powerful and versatile open source
    multimedia framework used for processing audio and</st> <st c="4952">video files.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4964">Installing these libraries is crucial as OpenAI provides the necessary
    functionality to interact with the Whisper API, and PyDub allows for efficient
    handling of audio files, including splitting and</st> <st c="5164">exporting them.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5179">Now, it’s time to create a new file called</st> `<st c="5223">config.py</st>`
    <st c="5232">in your project.</st> <st c="5250">This file will store your API
    key securely, allowing your code to access the</st> <st c="5327">Whisper API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5339">To create the</st> `<st c="5354">config.py</st>` <st c="5363">file
    and add your API key, follow</st> <st c="5398">these steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5410">Right-click on your project</st> <st c="5439">view area.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="5449">Select</st> **<st c="5457">New File</st>** <st c="5465">from the</st>
    <st c="5475">context menu.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="5488">Name the file</st> `<st c="5503">config.py</st>` <st c="5512">and</st>
    <st c="5517">press</st> *<st c="5523">Enter</st>*<st c="5528">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="5529">Now, you</st> <st c="5539">have created the</st> `<st c="5556">config.py</st>`
    <st c="5565">file.</st> <st c="5572">Open the file in the editor and add the following
    line</st> <st c="5627">of code:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: <st c="5660">To keep</st> <st c="5669">your</st> <st c="5674">audio files organized
    and easily accessible throughout this chapter, it is recommended to create a folder
    called</st> `<st c="5787">audio_files</st>` <st c="5798">within</st> <st c="5806">your
    project.</st> <st c="5820">This folder will serve as a centralized location to
    store all the audio files that will be used in the various examples and demonstrations
    covered in</st> <st c="5970">the chapter.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="5982">To create the</st> `<st c="5997">audio_files</st>` <st c="6008">folder,
    follow</st> <st c="6024">these steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6036">Right-click on your project</st> <st c="6065">view area.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="6075">Select</st> **<st c="6083">New Folder</st>** <st c="6093">from
    the</st> <st c="6103">context menu.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="6116">Name the directory</st> `<st c="6136">audio_files</st>` <st c="6147">and</st>
    <st c="6152">press</st> *<st c="6158">Enter</st>*<st c="6163">.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="6164">Now that you have set up the necessary configurations and folder
    structure, it’s time to create a new Python file called</st> `<st c="6286">transcribe.py</st>`<st
    c="6299">. This file will serve as the starting point for testing the transcription
    capabilities of the Whisper API.</st> <st c="6407">Open the file in the editor,
    and this will be the space where you’ll write the code to interact with the Whisper
    API and transcribe</st> <st c="6539">audio files.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6551">Before writing any code, you can place an English speech audio
    file of your choice in the</st> `<st c="6642">audio_files</st>` <st c="6653">folder.</st>
    <st c="6662">For this example, I will use an audio file called</st> `<st c="6712">apple.mp3</st>`<st
    c="6721">. The file consists of a few sentences about Apple computers, and you
    can download it from our Git</st> <st c="6820">repository:</st> [<st c="6832">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter10%20Whisper/audio_files/apple.mp3</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter10%20Whisper/audio_files/apple.mp3)<st
    c="6960">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6961">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6976">When using the Whisper API for audio processing and transcription
    tasks, it is crucial to ensure that the audio files provided as input are in one
    of the supported file formats.</st> <st c="7155">The Whisper API currently accepts
    the following file types:</st> `<st c="7215">mp3</st>`<st c="7218">,</st> `<st
    c="7220">mp4</st>`<st c="7223">,</st> `<st c="7225">mpeg</st>`<st c="7229">,</st>
    `<st c="7231">mpga</st>`<st c="7235">,</st> `<st c="7237">m4a</st>`<st c="7240">,</st>
    `<st c="7242">wav</st>`<st c="7245">,</st> <st c="7247">and</st> `<st c="7251">webm</st>`<st
    c="7255">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7256">Now let’s transcribe our audio file by following</st> <st c="7306">these
    steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7318">Once your audio</st> <st c="7335">file is in place, you can</st>
    <st c="7361">transcribe it by adding</st> <st c="7385">the following code</st>
    <st c="7404">to</st> `<st c="7407">transcribe.py</st>`<st c="7420">:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="7644">Here, the</st> `<st c="7655">openai</st>` <st c="7661">library
    provides access to the OpenAI API, which allows developers to interact with various
    language models and AI capabilities.</st> <st c="7791">The API key is assigned
    to the</st> `<st c="7822">OpenAI(api_key=config.API_KEY)</st>` <st c="7852">variable,
    using the value stored in the</st> <st c="7893">API key.</st>
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: <st c="7901">Then, we open a file named</st> `<st c="7929">apple.mp3</st>` <st
    c="7938">located at the</st> `<st c="7954">audio_files/apple.mp3</st>` <st c="7975">local
    file path in read-binary mode,</st> `<st c="8013">rb</st>`<st c="8015">. This
    suggests that the code intends to read an</st> <st c="8064">audio file.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="8075">After that, the</st> `<st c="8092">client.audio.transcriptions.create()</st>`
    <st c="8128">function is called with two arguments:</st> `<st c="8168">whisper-1</st>`
    <st c="8177">and the opened audio file.</st> <st c="8205">This function is part
    of the OpenAI library and is</st> <st c="8256">used to transcribe the</st> <st
    c="8279">audio file.</st> <st c="8291">The</st> `<st c="8295">whisper-1</st>`
    <st c="8304">parameter</st> <st c="8315">is the specific</st> <st c="8331">transcription
    model within the</st> <st c="8362">OpenAI system.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="8376">Finally, we see the result of the transcription in</st> <st c="8428">the
    console:</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: <st c="8682">The result of the transcription, printed in the console, is a JSON
    object containing a single key-value pair.</st> <st c="8792">The key is</st> `<st
    c="8803">text</st>`<st c="8807">, and the corresponding value is the</st> <st
    c="8844">transcribed text.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8861">This suggests that the transcription process has successfully converted
    the audio file into text, capturing the content related to the features and reputation
    of</st> <st c="9024">MacBook laptops.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9040">If your audio file is in a language other than English, Whisper
    will handle that scenario too, by automatically transcribing and then translating
    the file in the background.</st> <st c="9215">Now, we will guide you on how to
    translate the transcribed text, using the Whisper API.</st> <st c="9303">For this
    example, we will use a German speech file called</st> `<st c="9361">german.mp3</st>`<st
    c="9371">:</st> [<st c="9374">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-APIs/blob/main/Chapter10%20Whisper/audio_files/german.mp3</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-APIs/blob/main/Chapter10%20Whisper/audio_files/german.mp3)<st
    c="9504">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9505">You can also use an</st> `<st c="9526">mp3</st>` <st c="9529">file
    recorded in</st> <st c="9547">any language.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9560">To utilize the Whisper API for translating audio files, you can
    create a new Python file called</st> `<st c="9657">translate.py</st>` <st c="9669">and
    add the</st> <st c="9682">following code:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: <st c="9934">Once the API key and the path to the audio file have been correctly
    set, the code calls the</st> `<st c="10027">client.audio.translations.create()</st>`
    <st c="10061">function, providing the model name or</st> `<st c="10100">whisper-1</st>`
    <st c="10109">configuration</st> <st c="10124">and the opened audio file,</st>
    `<st c="10151">whisper_file</st>`<st c="10163">. This function performs the translation
    using</st> <st c="10210">the</st> <st c="10214">Whisper API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10226">The translated result</st> <st c="10249">will be stored in the</st>
    `<st c="10271">result</st>` <st c="10277">variable,</st> <st c="10288">and it
    can be printed using</st> `<st c="10316">print(result)</st>` <st c="10329">to
    display the translated text in</st> <st c="10364">the console:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: <st c="10554">As you can see, the text was successfully transcribed and translated
    from German to English using the Whisper API in combination with less than 10
    lines of</st> <st c="10710">Python code.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10722">In this section, you learned about the capabilities of the Whisper
    API for transcribing and translating audio files seamlessly using Python.</st>
    <st c="10864">The step-by-step instructions guided you through the setup process
    to transcribe and translate audio files, along with the supported file formats.</st>
    <st c="11011">The section showcased successful transcription and translation examples,
    demonstrating the effectiveness of the Whisper API in converting audio to text
    and bridging language barriers with</st> <st c="11199">minimal code.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11212">In the next section, you will learn how to integrate Tkinter and
    the Whisper API to develop a user-friendly language transcription application
    that can convert spoken language into text in</st> <st c="11402">real time.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11412">Building a voice transcription application</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="11455">In this section, we</st> <st c="11476">will explore the development
    of a language transcription application by integrating Tkinter, a popular Python
    GUI toolkit with the powerful Whisper API.</st> <st c="11629">This integration
    will allow us to create a user-friendly interface that enables the real-time transcription
    of spoken language.</st> <st c="11757">By following the step-by-step instructions
    and harnessing the capabilities of Tkinter and the Whisper API, you will be empowered
    to develop your own GUI application, opening a myriad of possibilities in speech
    recognition and</st> <st c="11983">language processing.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12003">Whether you aspire to create a tool for transcribing interviews,
    generating subtitles for videos, or simply exploring the potential of speech-to-text
    technology, this section will equip you with the knowledge and skills to bring
    your ideas to life.</st> <st c="12253">So, let’s dive in and embark on this exciting
    journey of building a language transcription app with Tkinter and the</st> <st
    c="12369">Whisper API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12381">To continue with the language transcription application project,
    you can create a new Python file called</st> `<st c="12487">app.py</st>` <st c="12493">within
    the same project.</st> <st c="12519">This file will serve as the main code base
    for developing</st> <st c="12577">the application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12593">By creating the</st> `<st c="12610">app.py</st>` <st c="12616">file,
    you will have a dedicated space to write the necessary code to integrate Tkinter
    and the Whisper API, enabling real-time transcription functionality in</st> <st
    c="12775">your application.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12792">In our pursuit of simplicity, our application will adopt a minimalist
    design featuring a text field and a button.</st> <st c="12907">The text field
    will serve as the dedicated space for displaying the transcribed text, while the
    button will provide the functionality to effortlessly browse through our file
    system and locate the desired audio file</st> <st c="13122">for transcription.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13140">To convert our language translation code into an actual application,
    we will need to create the</st> `<st c="13237">transcribe_audio()</st>` <st c="13255">function
    and use it from the</st> <st c="13285">Tkinter graphics:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: <st c="14229">Upon</st> <st c="14235">execution of the function, it first opens
    a file dialog window using the</st> `<st c="14308">filedialog.askopenfilename()</st>`
    <st c="14336">method, allowing the user to select an audio file for transcription.</st>
    <st c="14406">The file dialog is restricted to display only files with the</st>
    `<st c="14467">.mp3</st>` <st c="14471">extension, as specified by the</st> `<st
    c="14503">filetypes</st>` <st c="14512">parameter.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14523">If a valid file path is obtained from the file dialog, indicating
    that the user has selected an audio file, the code proceeds to transcribe the
    audio.</st> <st c="14675">Inside a</st> `<st c="14684">try</st>` <st c="14687">block,
    the selected audio file is opened in read-binary mode using</st> `<st c="14755">open()</st>`
    <st c="14761">and assigned to the</st> `<st c="14782">audio_file</st>` <st c="14792">variable.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14802">Using the</st> `<st c="14813">client.audio.transcriptions.create()</st>`
    <st c="14849">function, the audio file is passed along with the specific transcription
    model to initiate the transcription process by the Whisper API.</st> <st c="14987">The
    resulting transcription is stored in the</st> `<st c="15032">transcript</st>`
    <st c="15042">variable.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15052">Finally, the transcribed text is inserted into a text window.</st>
    <st c="15115">The</st> `<st c="15119">tk.END</st>` <st c="15125">argument ensures
    that the text is inserted at the end of the text window.</st> <st c="15200">In
    case of any exceptions or errors during the process, an error message is displayed
    in the</st> <st c="15293">text window.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15305">If no file path is obtained from the file dialog, indicating that
    the user did not select an audio file, a</st> `<st c="15413">No file selected</st>`
    <st c="15429">message is inserted into the</st> <st c="15459">text window.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15471">Under the</st> `<st c="15482">transcribe_audio()</st>` <st c="15500">function,
    we have created the Tkinter app that is using it.</st> <st c="15561">First, a
    Tkinter window is created using</st> `<st c="15602">tk.Tk()</st>`<st c="15609">.
    The window’s title is set as</st> `<st c="15640">Whisper</st>` `<st c="15648">Transcription
    App</st>`<st c="15665">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="15666">Next, a text window is created using</st> `<st c="15704">tk.Text()</st>`<st
    c="15713">, where the Whisper API transcription will be displayed.</st> <st c="15770">A
    button is also added to the Tkinter window using</st> `<st c="15821">tk.Button()</st>`<st
    c="15832">. The button’s label is set as</st> `<st c="15863">Select Audio File</st>`<st
    c="15880">, and the</st> `<st c="15890">command</st>` <st c="15897">parameter
    is set to</st> `<st c="15918">transcribe_audio</st>`<st c="15934">. This means
    that when the button is clicked, the</st> `<st c="15984">transcribe_audio()</st>`
    <st c="16002">function (previously defined) will</st> <st c="16038">be executed.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16050">To run the Whisper transcription app, follow</st> <st c="16096">these
    steps:</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="16108">In VSCode, locate the</st> `<st c="16131">app.py</st>` <st c="16137">file
    and</st> <st c="16147">run it.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="16154">Once the application is running, a Tkinter window titled</st>
    **<st c="16212">Whisper Transcription App</st>** <st c="16237">will appear.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="16250">The window will display a text area where the transcribed text
    will</st> <st c="16319">be shown.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="16328">Click on the</st> **<st c="16342">Select Audio File</st>** <st
    c="16359">button.</st> <st c="16368">A file dialog window will open, allowing
    you to navigate your</st> <st c="16430">file system.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="16442">Find and select an MP3 audio file that you want</st> <st c="16491">to
    transcribe.</st>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="16505">After</st> <st c="16512">selecting the file, the code will attempt
    to transcribe the audio.</st> <st c="16579">If successful, the transcribed text
    will be displayed in the text area within the Tkinter window (see</st> *<st c="16681">Figure
    10</st>**<st c="16690">.1</st>*<st c="16692">).</st> <st c="16696">If there are
    any errors during the transcription process, an error message will be</st> <st
    c="16779">displayed instead.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.1 – Whisper transcription application](img/B22414_10_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: <st c="17072">Figure 10.1 – Whisper transcription application</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17119">Important note</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17134">Please be aware that in certain screen resolutions, the</st> **<st
    c="17191">Select Audio File</st>** <st c="17208">button might be concealed.</st>
    <st c="17236">To ensure its visibility, maximize the</st> <st c="17275">application
    window.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17294">By running the app and</st> <st c="17318">selecting an MP3 file,
    you will be able to witness the Whisper API’s transcription capabilities in action.</st>
    <st c="17425">The app will leverage the selected audio file, initiate the transcription
    process using the Whisper API, and display the transcribed text within the Tkinter
    window.</st> <st c="17590">This allows you to convert spoken language into written
    text, opening possibilities for various applications and</st> <st c="17703">use
    cases.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17713">In this</st> <st c="17722">section, we embarked on the development
    of a language transcription application, integrating Tkinter and the Whisper API.</st>
    <st c="17844">With a minimalist design featuring a text field and a button, the
    application allows users to select an MP3 audio file for transcription.</st> <st
    c="17982">Upon selecting the file, the code initiates the transcription process
    using the Whisper API and displays the transcribed text in the</st> <st c="18115">Tkinter
    window.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18130">In the next section, you will learn how to integrate PyDub with
    the Whisper API to overcome the file size limitation and efficiently split large
    audio files for</st> <st c="18292">seamless transcription.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18315">Using P</st><st c="18323">yDub for longer audio inputs</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="18352">In this section, we</st> <st c="18373">will explore the integration
    of</st> **<st c="18405">PyDub</st>**<st c="18410">, a</st> <st c="18414">powerful
    audio processing library for Python, with the Whisper API to overcome the file
    size limitation of 25 MB imposed by the API.</st> <st c="18547">With PyDub, we
    can efficiently split large audio files into smaller segments, enabling the seamless
    transcription of lengthy recordings.</st> <st c="18684">By following the instructions
    and leveraging PyDub’s capabilities, you will be able to harness the full potential
    of the Whisper API for transcribing audio files of</st> <st c="18849">any size.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18858">Leveraging the power of PyDub to enhance your language transcription
    workflow is a straightforward process.</st> <st c="18967">By utilizing this library,
    you can effortlessly divide lengthy audio files into smaller segments.</st> <st
    c="19065">For instance, if you have a 10-minute audio file, you can easily split
    it into two separate files, each with a duration of 5 minutes.</st> <st c="19199">These
    smaller files can then be submitted to the Whisper API for transcription, ensuring
    that your files are not rejected due to their size limitations.</st> <st c="19352">With
    PyDub, you can seamlessly overcome the file size constraint and streamline your</st>
    <st c="19437">transcript</st><st c="19447">ion process.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="19460">In this exercise, we utilized an approximately eleven-minute-long
    audio file from an iPhone review.</st> <st c="19561">Now, you can create a new
    Python file within your project, specifically named</st> `<st c="19639">longer_files.py</st>`<st
    c="19654">. This file will serve as a dedicated space to implement the necessary
    code for handling larger audio files in your language</st> <st c="19779">transcription
    workflow:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: <st c="20499">The provided code demonstrates the usage of the</st> `<st c="20548">PyDub</st>`
    <st c="20553">library</st> <st c="20561">and the Whisper API for processing larger
    audio files in the language</st> <st c="20632">transcription workflow.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20655">You can download the</st> `<st c="20677">phone.mp3</st>` <st c="20686">file
    from</st> <st c="20697">here:</st> [<st c="20703">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter10%20Whisper/audio_files/phone.mp3</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter10%20Whisper/audio_files/phone.mp3)
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20831">First, the necessary imports are made, including the</st> `<st
    c="20885">openai</st>` <st c="20891">and</st> `<st c="20896">AudioSegment</st>`
    <st c="20908">modules from the respective libraries.</st> <st c="20948">We load
    an audio file named</st> `<st c="20976">phone.mp3</st>` <st c="20985">using PyDub’s</st>
    `<st c="21000">AudioSegment.from_mp3()</st>` <st c="21023">method and assign it
    to the</st> `<st c="21052">song</st>` <st c="21056">variable.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21066">To break</st> <st c="21076">down the audio file into smaller segments,
    the code defines a five-minute portion using the</st> `<st c="21168">five_minutes</st>`
    <st c="21180">variable, which represents the desired duration in milliseconds.</st>
    <st c="21246">The</st> `<st c="21250">song</st>` <st c="21254">variable is then
    sliced using the specified duration to obtain the first five minutes of the audio,
    which is stored in the</st> `<st c="21378">first_min_5</st>` <st c="21389">variable.</st>
    <st c="21400">This segment is then exported as a separate MP3 file named</st>
    `<st c="21459">phone_first_5.mp3</st>` <st c="21476">using the</st> `<st c="21487">export()</st>`
    <st c="21495">method.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21503">Similarly, the code obtains the remaining portion of the audio
    file, starting from the five-minute mark until the end, using the slicing operation,
    and assigns it to the</st> `<st c="21674">last_min_5</st>` <st c="21684">variable.</st>
    <st c="21695">This segment is also exported as a separate MP3 file</st> <st c="21748">named</st>
    `<st c="21754">phone_last_5.mp3</st>`<st c="21770">.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21771">The code proceeds to open the</st> `<st c="21802">phone_first_5.mp3</st>`
    <st c="21819">file with the</st> `<st c="21834">client.audio.transcriptions.create()</st>`
    <st c="21870">method invoked.</st> <st c="21887">The resulting transcription is
    stored in the</st> `<st c="21932">result</st>` <st c="21938">variable, which is
    then printed to the console.</st> <st c="21987">Following the same procedure,
    the code repeats the transcription process for the</st> `<st c="22068">phone_last_5.mp3</st>`
    <st c="22084">file, opening it, transcribing it, and printing</st> <st c="22133">the
    result.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="22144">You can see the unique transcriptions for each file printed in
    the console</st> <st c="22220">as follows:</st>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: <st c="22688">By breaking down the larger audio file into smaller segments using
    PyDub, the code enables the processing of these segments within the</st> <st c="22823">size
    limits of the Whisper API.</st> <st c="22855">This approach allows for the efficient
    handling of larger audio files while leveraging the transcription capabilities
    provided by the</st> <st c="22989">Whisper API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23001">This is how we can integrate PyDub with the Whisper API to overcome
    the file size limitation, enabling the seamless transcription of longer</st> <st
    c="23142">audio files.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23154">Summary</st>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="23162">In this chapter, we explored the Whisper API, a powerful tool
    for converting audio into text through advanced speech recognition and translation.</st>
    <st c="23309">The chapter provided step-by-step instructions on developing a language
    transcription project using Python, covering essential aspects such as handling
    audio files, installing necessary libraries, and setting up the API key.</st>
    <st c="23534">You learned how to transcribe and translate audio files using the
    Whisper API.</st> <st c="23613">The chapter also introduced a voice transcription
    application, integrating Tkinter and the Whisper API for</st> <st c="23720">real-time
    transcription.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="23744">You also learned how to use PyDub, a powerful audio processing
    library for Python, with the Whisper API to overcome the file size limitation
    of 25 MB.</st> <st c="23896">By leveraging PyDub’s capabilities, we can efficiently
    split large audio files into smaller segments, enabling the seamless transcription
    of lengthy recordings.</st> <st c="24057">You saw how to use PyDub and the Whisper
    API to process larger audio files in the language transcription workflow.</st>
    <st c="24172">By breaking down an audio file into smaller segments and transcribing
    each segment individually, we can handle larger audio files while benefiting from
    the transcription capabilities of the</st> <st c="24362">Whisper API.</st>
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24374">In</st> [*<st c="24378">Chapter 11</st>*](B22414_11.xhtml#_idTextAnchor132)<st
    c="24388">, you will learn about the different API models available in the ChatGPT
    API and gain insights into how to choose the most suitable model for your specific
    projects.</st> <st c="24554">We will explore the various parameters that can be
    utilized in API requests to achieve more efficient, improved prompt completions.</st>
    <st c="24686">You will also understand the limitations associated with different</st>
    <st c="24753">AI models.</st>
  prefs: []
  type: TYPE_NORMAL
- en: '<st c="0">Part 4: Advanced Concepts for Powering ChatGPT Apps</st>'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="52">In this final part, you will explore the AI models and their unique
    attributes, allowing you to develop a comprehensive grasp of their cost, quality,
    and prompt length considerations.</st> <st c="237">Armed with this knowledge,
    you will be empowered to select the optimal model that aligns with the requirements
    of your specific applications.</st> <st c="379">Moreover, you will unlock the
    ability to construct your very own ChatGPT model and enhance its functionalities
    through fine-tuning and embeddings, thereby tailoring it to perfectly cater to
    your</st> <st c="574">individual needs.</st>
  prefs: []
  type: TYPE_NORMAL
