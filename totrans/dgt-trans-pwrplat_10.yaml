- en: '10'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Fortifying the Foundation: Integrating Systems, Ensuring Governance, and Security'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'As technology advances rapidly, organizations need to build a solid foundation
    that can integrate systems, enforce governance, and enhance security. This requires
    a **Center of Excellence** (**CoE**) journey that consists of four key stages:
    Secure, Evangelize, Monitor, and Evolve. The Secure stage establishes a comprehensive
    security framework based on industry standards and best practices. The Evangelize
    stage spreads the knowledge and adoption of best practices across the workforce.
    The Monitor stage continuously monitors and manages risks using advanced tools
    and technologies. The Evolve stage adopts a culture of continuous improvement
    and innovation using the insights and feedback from monitoring and other sources.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter will explain how organizations can fortify their foundation through
    a CoE journey that covers the preceding states. By doing so, they can create a
    robust and secure technological ecosystem that can navigate the dynamic landscape
    of technology and protect their valuable assets and data. Here is what we will
    explore as part of this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Establishing a solid security framework (Secure)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cultivating a security-centric culture (Evangelize)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Continuous monitoring and proactive risk management (Monitor)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Embracing continuous improvement and innovation (Evolve)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Establishing a solid security framework (Secure)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Microsoft Power Platform is a suite of low-code tools that enable anyone
    to build apps, automate workflows, analyze data, and create chatbots. It empowers
    users to solve business problems and innovate faster, without depending on IT
    or developers. However, this also introduces some challenges for governance, security,
    and compliance. How can you ensure that your users are following best practices,
    protecting sensitive data, and using the right licenses and connectors?
  prefs: []
  type: TYPE_NORMAL
- en: That’s where the CoE strategy comes in. A CoE is a team or a function that provides
    leadership, guidance, and support for the adoption and governance of Power Platform
    in your organization. A CoE can help you balance the benefits of self-service
    and citizen development with the risks of data loss, security breaches, and license
    violations.
  prefs: []
  type: TYPE_NORMAL
- en: A CoE can start off quite simply with a single individual using the provided
    tools and best practices to get a view of their Power Platform adoption in their
    organization and might grow into a more mature investment with multiple functions
    and roles to manage multiple aspects of governance, training, support, and automated
    app deployment across the organization. We encourage you to understand where you
    are in your adoption journey and invest accordingly, as described in previous
    chapters of this book. We recommend you start your governance journey by establishing
    **data loss prevention** (**DLP**) policies and managing licenses and access to
    data sources. Let’s start with a definition of DLP policies, how they can help
    you prevent data leakage and unauthorized access, and how you can create and manage
    them using the Power Platform admin center. We will also cover how you can manage
    licenses and access to data sources for your Power Platform users, and how you
    can use the CoE Starter Kit to automate and simplify some of these tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Data loss prevention policies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To control which connectors can be used together in Power Platform, you can
    create DLP policies. Connectors are the components that enable apps, flows, and
    chatbots to access data and services from various sources, such as SharePoint,
    Outlook, X (formerly Twitter), or Salesforce. Depending on the sensitivity and
    confidentiality of the data, you can classify connectors as business data only,
    no business data allowed, or blocked. For example, you might want to prevent users
    from creating an app that connects to a SharePoint site with sensitive customer
    information and an X account, and posts tweets with that information. By creating
    DLP policies, you can avoid data leakage and unauthorized access to your data.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can use the Power Platform admin center to create and manage DLP policies.
    These policies can be created at the tenant level, which applies to all environments
    in your organization, or at the environment level, which applies to a specific
    environment. You can also add policies for specific security groups, which apply
    to the users who are members of those groups. You can assign connectors to one
    of the three groups: business data only, non-business data, or blocked. You can
    also use the default policies provided by Microsoft, which are based on the connector
    classifications and the connector certification status.'
  prefs: []
  type: TYPE_NORMAL
- en: When you create or edit a DLP policy, you can choose when to enforce it and
    how to apply it. You can enforce it immediately or on a future date, by applying
    the policy to specific environments as your organization may see fit. You can
    view the impact of your policy on the apps and flows in your organization and
    see whether any of them will be affected or blocked by the policy. You can also
    view the policy violations and take actions to resolve them, such as notifying
    the app or flow owner or deleting the app or flow.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.1 – Power Platform DLP levels](img/B21080_10_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.1 – Power Platform DLP levels
  prefs: []
  type: TYPE_NORMAL
- en: Licenses and access to data sources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another aspect of securing your Power Platform adoption is managing the licenses
    and access to data sources for your users. Licenses determine what features and
    capabilities your users can access in Power Platform, such as the number of apps,
    flows, and chatbots they can create and run, the types of connectors they can
    use, and the storage and capacity limits they have. Access to data sources determines
    what data and services your users can connect to and use in their apps, flows,
    and chatbots, such as SharePoint, Outlook, SQL Server, or Salesforce.
  prefs: []
  type: TYPE_NORMAL
- en: You can manage licenses and access to data sources using the Power Platform
    admin center, the Microsoft 365 admin center, or the Microsoft Entra ID admin
    center. You can assign licenses to users individually or in bulk or use group-based
    licensing to automatically assign licenses to users who are members of a security
    group. You can also view the license usage and consumption in your organization,
    and see how many licenses are assigned, used, and available.
  prefs: []
  type: TYPE_NORMAL
- en: You can grant or revoke access to data sources for users individually or in
    bulk or use Conditional Access policies to enforce rules and conditions for accessing
    data sources, such as requiring multi-factor authentication, device compliance,
    or location-based restrictions. You can also view the data source usage and connections
    in your organization and see which data sources are used, by whom, and for what
    purpose.
  prefs: []
  type: TYPE_NORMAL
- en: CoE Starter Kit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the challenges of managing licenses and access to data sources is that
    it can be time-consuming and tedious, especially if you have many users, environments,
    apps, flows, and chatbots in your organization. That’s why we recommend using
    the CoE Starter Kit, a set of tools and templates that can help you automate and
    simplify tasks, especially when it comes to security.
  prefs: []
  type: TYPE_NORMAL
- en: 'The CoE Starter Kit consists of four components:'
  prefs: []
  type: TYPE_NORMAL
- en: Core component
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Governance component
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nurture component
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Audit component
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each component contains a set of apps, flows, and dashboards that you can install
    and customize for your organization. The Core component provides you with a holistic
    view of your Power Platform inventory, usage, and performance. The Governance
    component helps you enforce DLP policies, manage orphaned apps and flows, and
    archive unused apps and flows. The Nurture component helps you create a community
    of practice, provide training and support, and showcase success stories. The Audit
    component helps you monitor and audit the actions and activities of your Power
    Platform users.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: 'You can download and install the CoE Starter Kit from the GitHub repository:
    [https://github.com/microsoft/coe-starter-kit](https://github.com/microsoft/coe-starter-kit).
    You can also find the documentation, tutorials, and videos on how to use and customize
    the CoE Starter Kit for your organization.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Having established a solid security framework, the next step is to ensure that
    your organization cultivates a security-centric culture. In the next section,
    you will learn how to promote a security-first mindset throughout your organization.
    This involves the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Building awareness and understanding of security practices among all users
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Providing ongoing training and resources to keep security at the forefront
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encouraging collaboration and communication to maintain a vigilant security
    posture
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By focusing on these aspects, you can ensure that security is embedded into
    the fabric of your organization, creating a proactive and resilient approach to
    protecting your data and applications. This will build upon the foundation laid
    in the current chapter and further enhance your organization’s governance and
    security practices.
  prefs: []
  type: TYPE_NORMAL
- en: Cultivating a security-centric culture (Evangelize)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A security-centric culture is essential for ensuring that security practices
    are ingrained in the daily operations of an organization. This culture ensures
    that security considerations are deeply embedded in the organizational ethos,
    decision-making processes, and daily practices of all employees. Within the context
    of Power Platform and the CoE, fostering this culture involves promoting security
    awareness, encouraging security best practices, and utilizing specific tools to
    reinforce these principles. Let’s explore how to create such a culture in your
    organization using Power Platform and the CoE framework.
  prefs: []
  type: TYPE_NORMAL
- en: Promoting security awareness
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Promoting security awareness ensures that all employees understand the importance
    of security and their role in maintaining it. This is crucial for preventing security
    breaches and ensuring compliance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the ways to promote security awareness among employees are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conduct regular security awareness campaigns**: Security awareness campaigns
    are initiatives that aim to educate and inform employees about the latest security
    threats, best practices, and policies. Security awareness campaigns can be delivered
    through various methods, such as posters, videos, quizzes, games, or newsletters.
    They should be tailored to the audience, relevant to the context, and engaging
    for the participants. Organizations can also measure the effectiveness of their
    campaigns by tracking metrics, such as participation rates, feedback scores, or
    knowledge retention.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Implement a security awareness training program**: Security awareness training
    is a formal and structured way of teaching employees the skills and behaviors
    they need to protect the organization’s data and assets. Security awareness training
    should cover topics such as password management, phishing prevention, device security,
    data protection, and incident reporting. Security awareness training should be
    mandatory for all employees and updated regularly to reflect the changing security
    landscape. Organizations can also use gamification, simulations, or scenarios
    to make the training more interactive and realistic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Facilitating training and education
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To cultivate a security-centric culture effectively, it is imperative to invest
    in comprehensive training and education initiatives. These initiatives should
    be designed to enhance the security acumen of all employees, ensuring they are
    well-equipped to handle potential threats and understand the importance of their
    roles in maintaining the organization’s security posture. Here are some strategies
    to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Regular training sessions**: Conduct regular training sessions that cover
    both general security best practices and specific guidelines for using Power Platform
    securely. These sessions should be mandatory for all employees, with additional,
    more in-depth training for those involved in development and IT.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Role-based training**: Provide specialized training tailored to different
    user roles within Power Platform. For instance, makers should be trained in secure
    app development, while IT administrators should focus on managing security configurations
    and monitoring.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Certification programs**: Encourage employees to pursue certifications relevant
    to Power Platform and security, such as Microsoft Certified: Power Platform Fundamentals
    and Microsoft Certified: Security, Compliance, and Identity Fundamentals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using clear communication
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Effective communication is a cornerstone of fostering a secure environment
    within an organization. By ensuring that employees are well-informed and continually
    updated, organizations can significantly enhance their security posture. Here
    are some methods to achieve this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Security policies and guidelines**: Develop and distribute clear, concise
    security policies and guidelines specific to Power Platform usage. Ensure these
    documents are easily accessible through the CoE portal or intranet.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regular updates**: Keep employees informed about new security threats, policy
    updates, and best practices through newsletters, webinars, and intranet postings.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visual aids and reminders**: Use visual aids such as posters, infographics,
    and digital signage within office spaces and online platforms to reinforce key
    security messages and reminders.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encouraging security best practices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Encouraging security best practices involves empowering individuals and teams
    to take ownership of security within their areas of responsibility. The following
    are a few suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: Identify and promote security champions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To foster a culture of security awareness and proactive engagement, organizations
    must take deliberate steps to empower their employees and provide ongoing support:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Role definition**: Clearly define the responsibilities of security champions
    within each team. Their role is to advocate for security practices, assist in
    enforcing policies, and act as liaisons between their teams and the CoE.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Empowerment**: Provide security champions with advanced training, access
    to security tools, and the authority to influence security decisions within their
    teams. Regularly update them on new security trends and practices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recognition**: Recognize and reward the efforts of security champions through
    incentives such as awards, bonuses, or public acknowledgment. This motivation
    can drive continuous engagement and commitment to security.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Establish a feedback loop
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To effectively address security concerns and enhance the organization’s security
    posture, consider implementing the following strategies:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reporting mechanisms**: Establish simple, straightforward mechanisms for
    reporting security concerns, such as dedicated email addresses, chat channels,
    or intranet forms. Ensure these channels are well publicized and easily accessible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Anonymous feedback**: Enable anonymous reporting to encourage employees to
    report security issues without fear of retribution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Continuous improvement**: Regularly review the feedback received and implement
    changes to address security concerns. Communicate back to the organization on
    how their feedback is driving improvements to foster a sense of involvement and
    ownership.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Action plans**: Develop action plans based on Secure Score recommendations
    to address identified security gaps. Secure Score in Microsoft Defender for Cloud
    is a numerical value that summarizes an organization’s security posture. Prioritize
    actions based on their potential impact and ease of implementation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Progress tracking**: Regularly monitor Secure Score to track progress and
    adjust strategies as needed. Use the score as a benchmark to measure the effectiveness
    of your security initiatives over time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Plan phishing simulations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To enhance security awareness and improve employees’ ability to recognize and
    respond to phishing attacks, organizations can implement the following comprehensive
    strategies:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Simulation campaigns**: Conduct regular phishing simulation campaigns to
    test employee awareness and readiness in identifying and responding to phishing
    attacks. Use realistic scenarios to create impactful learning experiences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Training follow-up**: Follow up phishing simulations with targeted training
    for employees who failed the test. Provide feedback and resources to help them
    improve their skills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metrics and reporting**: Analyze the results of phishing simulations to identify
    trends and areas for improvement. Use this data to refine your training programs
    and increase overall security awareness.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrating security culture with CoE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The CoE plays a pivotal role in embedding a security-centric culture within
    an organization. The CoE can provide the structure, resources, and governance
    needed to ensure security is a priority across all Power Platform initiatives.
  prefs: []
  type: TYPE_NORMAL
- en: CoE responsibilities in cultivating a security-centric culture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Governance framework**: Establish and maintain a governance framework that
    includes security policies, standards, and best practices specific to Power Platform.
    Ensure these are communicated and enforced across the organization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Knowledge sharing**: Use the CoE to facilitate knowledge sharing and collaboration
    on security topics. This can include creating a central repository of security
    resources, hosting webinars, and organizing workshops.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Innovation and best practices**: Promote innovation in security practices
    by encouraging the exploration of new tools and techniques. Share success stories
    and best practices across teams to foster a culture of continuous improvement.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitoring and reporting**: Leverage the CoE to monitor compliance with security
    policies and track key security metrics. Regularly report on the organization’s
    security posture to senior leadership and stakeholders.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 10.2 – Key elements for security-centric culture](img/B21080_10_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.2 – Key elements for security-centric culture
  prefs: []
  type: TYPE_NORMAL
- en: Sharing success stories
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sharing success stories can inspire and motivate makers and users to adopt security
    best practices and learn from the experiences of others. It can also showcase
    the value and impact of Power Platform solutions on the organization’s security
    posture and performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the methods your organization can use to share success stories are
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Organize show-and-tell sessions**, where makers or users can present their
    Power Platform solutions and demonstrate how they have implemented security features
    and followed security guidelines. Show-and-tell sessions can be an interactive
    and engaging way to share knowledge, tips, and lessons learned, as well as to
    solicit feedback and suggestions from the audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Publish case studies as a newsletter**, where the CoE can highlight the security
    aspects and outcomes of Power Platform solutions that have been deployed or used
    in the organization. Case studies can provide a detailed and comprehensive overview
    of the security challenges, solutions, results, and benefits of Power Platform
    projects, as well as the best practices and recommendations that can be applied
    to similar scenarios.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we establish a security-centric culture, it’s equally important to ensure
    that security measures are continually monitored and managed. In the next section,
    we will explore strategies for ongoing security monitoring and risk management
    to protect your organization proactively. This includes implementing continuous
    monitoring systems, setting up proactive risk management protocols, and ensuring
    real-time responses to potential threats.
  prefs: []
  type: TYPE_NORMAL
- en: This approach will build upon the security culture you’ve cultivated, ensuring
    that your organization remains vigilant and responsive to emerging security challenges.
  prefs: []
  type: TYPE_NORMAL
- en: Continuous monitoring and proactive risk management (Monitor)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The Microsoft Power Platform CoE and admin center emphasize continuous monitoring
    and proactive risk management to maintain secure and efficient environments. By
    leveraging advanced tools and technologies, such as the Power Platform admin center
    and CoE, Power BI dashboards, Power Automate flows, and Starter Kit Power Apps,
    organizations can track usage and performance, identifying and mitigating potential
    risks early to ensure compliance with governance policies. Additionally, management
    and admin connectors within Power Platform allow for automated monitoring and
    administrative tasks. These connectors, along with PowerShell cmdlets, facilitate
    efficient risk management and operational oversight, ensuring a resilient technological
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: The role of monitoring in the CoE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The CoE acts as the central hub for overseeing the deployment, maintenance,
    and governance of Power Platform within an organization. Effective monitoring
    by the CoE involves a comprehensive approach to observe and assess the performance
    of various components continuously. This ensures alignment with organizational
    standards and regulatory requirements, preventing risks from escalating into significant
    problems.
  prefs: []
  type: TYPE_NORMAL
- en: Key metrics and performance indicators
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To establish a robust monitoring framework, it is essential to identify and
    track key metrics and performance indicators. These include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Resource usage**: Monitor the consumption of resources such as data storage,
    compute power, and API calls to optimize usage and prevent bottlenecks'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Access and usage patterns**: Track user activity to identify unusual patterns
    or unauthorized access attempts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dataverse utilization**: Assess the health and performance of CDS environments
    to ensure data integrity and efficient operations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Connector management**: Monitor the usage of connectors, especially new or
    custom connectors, to maintain security and compliance'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sharing and alerts**: Implement sharing policies and alert mechanisms to
    detect and respond to unauthorized data sharing or policy violations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tools and technologies for monitoring
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Several tools and technologies can assist the CoE in implementing effective
    monitoring practices:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Power Platform admin center**: Provides a centralized dashboard to monitor
    the health, usage, and security of Power Platform components'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Azure Monitor**: Offers comprehensive monitoring for applications, infrastructure,
    and networks, integrating seamlessly with Power Platform'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Power BI**: Enables advanced data visualization and analysis, helping to
    identify trends and insights from monitoring data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security Information and Event Management (SIEM) systems**: Integrates with
    Power Platform to detect and respond to security threats in real time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Proactive risk management
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Proactive risk management involves anticipating potential risks and implementing
    measures to mitigate them before they impact the organization. Key strategies
    include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Risk assessment and analysis**: Regularly conduct risk assessments to identify
    potential vulnerabilities and threats. Use this analysis to prioritize mitigation
    efforts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Policy development and enforcement**: Develop and enforce security policies
    that govern the use of Power Platform. Ensure all users are aware of these policies
    and their responsibilities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Incident response planning**: Create and maintain an incident response plan
    outlining procedures for addressing security incidents and breaches. Regularly
    test and update this plan to ensure its effectiveness.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User training and awareness**: Educate users on best practices for security
    and compliance. Regular training sessions can help reinforce the importance of
    these practices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Governance and compliance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Governance and compliance are integral to the management and monitoring framework
    within Power Platform. The admin center and CoE Starter Kit provide robust features
    to ensure that all activities within the platform align with organizational policies
    and regulatory standards. Administrators can define and enforce governance rules,
    monitor adherence to these rules, and take corrective actions when necessary.
  prefs: []
  type: TYPE_NORMAL
- en: Compliance monitoring is facilitated through detailed audit logs and activity
    reports, which provide a comprehensive view of user interactions and system changes.
    These logs are crucial for conducting audits, investigating incidents, and demonstrating
    compliance with industry regulations. The CoE Starter Kit’s analytics tools further
    aid in compliance management by highlighting areas of concern and suggesting improvements.
  prefs: []
  type: TYPE_NORMAL
- en: 'Continuous monitoring and proactive risk management are indispensable pillars
    for safeguarding the Microsoft Power Platform environment. Leveraging advanced
    tools such as the Power Platform admin center, CoE Power BI dashboards, Power
    Automate flows, and Starter Kit Power Apps enables organizations to monitor usage,
    track performance metrics, and identify potential risks early on. This proactive
    approach ensures compliance with governance policies and minimizes disruptions
    to operations. Here’s what you can expect:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Continuous improvement strategies**: Implementing iterative approaches to
    enhance security measures over time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Encouraging innovation**: Fostering a culture that embraces creativity while
    maintaining rigorous security standards'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adapting to technological changes**: Staying ahead by adapting to evolving
    technologies and industry trends'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will explore strategies to continually improve security measures, encourage
    innovative solutions, and adapt to changing technological landscapes, ensuring
    that your organization remains at the forefront of operational excellence and
    security.
  prefs: []
  type: TYPE_NORMAL
- en: Embracing continuous improvement and innovation (Evolve)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Continuous improvement and innovation are key objectives of the management and
    monitoring processes within Power Platform. By leveraging the insights gained
    from continuous monitoring and proactive risk management, organizations can identify
    opportunities for optimization and innovation. The CoE Starter Kit’s feedback
    mechanisms enable administrators to gather user feedback and performance data,
    which can be used to enhance existing solutions and develop new ones. Establishing
    a culture of continuous improvement ensures that the Power Platform environment
    remains agile, responsive, and aligned with the evolving needs of the organization.
    The tools available within the CoE can help maintain a culture of innovation,
    ensure that solutions are constantly refined, and align development with business
    needs and user expectations.
  prefs: []
  type: TYPE_NORMAL
- en: The role of continuous improvement and innovation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Continuous improvement and innovation are crucial for sustaining a competitive
    advantage and operational efficiency. In the context of the Power Platform CoE,
    these concepts involve the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Regularly assessing and enhancing solutions**: Ensuring that Power Platform
    applications and workflows are consistently optimized for performance and user
    experience'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Encouraging innovation**: Promoting a culture where employees are motivated
    to propose new ideas and improvements'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Aligning with business goals**: Ensuring that innovations and improvements
    align with the strategic objectives of the organization'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CoE Starter Kit dashboards
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The dashboards within the CoE Starter Kit provide key support for policy enforcement
    and procedural enhancements within your organization. These visual tools primarily
    serve the purpose of monitoring for potential security issues. Additionally, they
    help identify the most frequently used apps, their authors (makers), and the connectors
    being utilized. The information provided by these dashboards assists businesses
    in deciding who, what, and which aspects of the platform need attention and improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Maker dashboard
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Figure 10.3 – Maker dashboard](img/B21080_10_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.3 – Maker dashboard
  prefs: []
  type: TYPE_NORMAL
- en: This dashboard page provides a comprehensive view of maker activities and contributions
    within the organization. Its main features include the number of active makers,
    trends in maker activity over time, top makers based on app and flow creation,
    and a detailed list of apps and flows created by each maker.
  prefs: []
  type: TYPE_NORMAL
- en: App Usage dashboard
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Figure 10.4 – App Usage dashboard](img/B21080_10_4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.4 – App Usage dashboard
  prefs: []
  type: TYPE_NORMAL
- en: The App Usage dashboard tracks and analyzes the usage patterns of apps within
    the organization. Key data highlighted on this dashboard includes metrics on app
    launches and active users, usage trends over time, and the identification of the
    most used apps.
  prefs: []
  type: TYPE_NORMAL
- en: Year-over-year (YoY) adoption
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Figure 10.5 –YoY dashboard](img/B21080_10_5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.5 –YoY dashboard
  prefs: []
  type: TYPE_NORMAL
- en: This visualization compares adoption metrics year over year to identify growth
    and trends. The data presented includes a comparison of apps and flows creation
    and usage. This information assists leaders in deciding which areas require additional
    attention.
  prefs: []
  type: TYPE_NORMAL
- en: Innovation Backlog app
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Figure 10.6 – Innovation Backlog app](img/B21080_10_6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.6 – Innovation Backlog app
  prefs: []
  type: TYPE_NORMAL
- en: The Innovation Backlog app is designed to manage and prioritize new ideas and
    innovations proposed by employees and stakeholders. It helps ensure that innovative
    ideas are captured, evaluated, and implemented systematically.
  prefs: []
  type: TYPE_NORMAL
- en: The following are some of the key features of the Innovation Backlog app.
  prefs: []
  type: TYPE_NORMAL
- en: '**Idea submission**: Employees can submit their innovative ideas through a
    user-friendly interface. Submissions can include detailed descriptions, expected
    benefits, and any relevant documentation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluation and scoring**: Ideas are evaluated based on criteria such as feasibility,
    potential impact, alignment with business goals, and resource requirements. Scoring
    mechanisms can be used to rank ideas.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tracking and management**: Once approved, ideas are tracked through various
    stages of implementation. This includes resource allocation, development, testing,
    and deployment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Collaboration and communication**: The app facilitates collaboration among
    stakeholders, ensuring that ideas are refined and developed effectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration and synergy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Both the feedback and Innovation Backlog apps are integral to a holistic approach
    to continuous improvement and innovation within the Power Platform CoE. Their
    integration provides several synergies:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Unified platform for improvement and innovation**: By combining feedback
    management and innovation tracking, the CoE can ensure that both incremental improvements
    and breakthrough innovations are handled efficiently'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data-driven decision-making**: Insights from feedback analytics can inform
    the evaluation of new ideas, ensuring that innovations address actual user needs
    and pain points'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enhanced collaboration**: A unified approach facilitates better communication
    and collaboration among different teams, including development, operations, and
    business stakeholders'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementation best practices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To maximize the benefits of the feedback and Innovation Backlog apps, organizations
    should consider the following best practices:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Promote adoption**: Encourage employees to use these tools regularly. This
    can be achieved through training, awareness campaigns, and by demonstrating the
    impact of user contributions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Define clear processes**: Establish clear processes for feedback collection,
    idea evaluation, and innovation implementation. This includes setting criteria
    for prioritization and decision-making.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Leverage analytics**: Use the analytics capabilities of these apps to identify
    trends, measure impact, and make informed decisions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regular reviews**: Conduct regular reviews of the feedback and innovation
    backlog to ensure that the most critical issues and valuable ideas are addressed
    promptly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Align with business strategy**: Ensure that the continuous improvement and
    innovation efforts are closely aligned with the organization’s strategic objectives
    and goals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This chapter focused on building a robust, secure, and well-governed Power
    Platform environment through a structured CoE approach. It introduced four key
    stages of the CoE journey: Secure, Evangelize, Monitor, and Evolve, each playing
    a critical role in establishing a solid foundation for Power Platform adoption.'
  prefs: []
  type: TYPE_NORMAL
- en: The Secure stage emphasizes creating a comprehensive security framework, including
    implementing DLP policies, managing licenses, and using the CoE Starter Kit to
    automate security tasks. The Evangelize stage focuses on fostering a security-centric
    culture through awareness, training, and clear communication, ensuring that security
    is integrated into everyday practices across the organization. The Monitor stage
    involves continuous monitoring of the platform’s performance, user activity, and
    compliance with governance policies, leveraging tools such as the Power Platform
    admin center, CoE dashboards, and advanced risk management strategies. Finally,
    the Evolve stage highlights the importance of continuous improvement and innovation,
    utilizing insights from monitoring and feedback to refine existing solutions and
    drive new developments.
  prefs: []
  type: TYPE_NORMAL
- en: By adopting this structured approach, organizations can ensure that their Power
    Platform initiatives are secure, well governed, and continuously optimized, laying
    the groundwork for sustained success and innovation.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, you will learn how to build strong foundations for your
    Power Platform solutions by applying governance and security principles and practices.
    You will see how to define and enforce policies and standards, how to monitor
    and audit your environment, and how to manage risks and compliance issues. By
    doing so, you will ensure that your Power Platform solutions are secure, reliable,
    and trustworthy.
  prefs: []
  type: TYPE_NORMAL
