- en: Architecting AI Systems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The second part of the book walks you through more detailed explanations, guides,
    and lessons learned to build AI-enabled systems. This part of the book starts
    with conceptual design, one of the most critical phases led by an architect. The
    final chapters of this section go into more detail on the architect’s role in
    going from conceptual design to system testing. Finally, a case study is highlighted
    as a real and common challenge where an AI-enabled system can readily transform
    a business problem.
  prefs: []
  type: TYPE_NORMAL
