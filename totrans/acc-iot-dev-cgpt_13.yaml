- en: '13'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Connecting the ESP32 to AWS IoT Core
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In the previous chapter, we successfully instructed ChatGPT to generate code
    on the ESP32 to connect to your Wi-Fi network, obtain an IP address, ping an internet
    host, and synchronize with an **NTP** (**Network Time Protocol**) server to get
    the local time Now, we’re moving on to the most critical step: connecting the
    ESP32 to **AWS IoT Core** via the MQTT protocol over a **Transport Layer Security**
    (**TLS**) connection.'
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you will be able to possess the skills and knowledge
    to provision your ESP32 as a new **THING** in AWS IoT Core. Not only that, but
    you will also be able to connect your ESP32 to AWS IoT Core through a secured
    TLS/MQTT connection.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Understanding the approach to connect the ESP32 to AWS IoT Core*: Learn about
    the X.509 certificates-based TLS-secured access mechanism implemented by AWS IoT
    Core'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Creating a Thing in AWS IoT Core*: Provision your ESP32 as a new thing in
    the AWS IoT Core console, generate device certificates and private keys, and attach
    a connection policy'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Creating AWS credential header file on the ESP32*: Generate a header file
    to store the contents of the AWS root **certificate authority** (**CA**) certificate,
    device certificates, and private key for TLS setup'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Instructing ChatGPT to produce TLS and MQTT code on the ESP32*: Request ChatGPT
    to generate code by importing MQTT and TLS libraries and header files on the ESP32'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Validating access status on the ESP32*: Monitor the connection status in the
    ESP32 local terminal window'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will continue to use the `Platformio.ini` file to store
    and pass AWS IoT Core access information to the ESP32’s code. In addition to creating
    a certificate header file, we will create a hardware information header file to
    identify the module information of the ESP32 and include it in the main code for
    device identification.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the approach to connect the ESP32 to AWS IoT Core
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The IoT device access service provided by the AWS cloud is AWS IoT Core, as
    discussed in [*Chapter 5*](B22002_05.xhtml#_idTextAnchor170) in the *AWS for IoT*
    section. As highlighted in that section, as of December 2023, the following four
    communication protocols are supported:'
  prefs: []
  type: TYPE_NORMAL
- en: '**MQTT**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MQTT over** **WebSockets** **Secure** (**WSS**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hypertext Transfer Protocol –** **Secure** (**HTTPS**)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LoRaWAN**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Among these protocols, MQTT stands out as one of the most widely used. It accommodates
    the clients by enabling the publishing and subscribing of messages. The mechanisms
    of MQTT are explained in the [*Chapter 5*](B22002_05.xhtml#_idTextAnchor170) section
    *Communication protocols between IoT devices and* *the cloud*.
  prefs: []
  type: TYPE_NORMAL
- en: Before establishing MQTT communication between an IoT device and AWS IoT Core,
    a secured low-layer connection must be created using TLS. TLS is a cryptographic
    protocol designed to provide secure communication over a network, supporting both
    server and client authentication.
  prefs: []
  type: TYPE_NORMAL
- en: 'Implementing TLS functionality on the ESP32 requires three credential files
    to establish an X.509 certificate-based TLS connection with AWS IoT Core: the
    AWS root CA file, your ESP32 device certificate `.pem` file, and the private key
    `.pem` file. The following are the explanations, their functions, and how to get
    them:'
  prefs: []
  type: TYPE_NORMAL
- en: '`iot:Data` and `iot:Data-ATS`. The `iot:Data` endpoints present a certificate
    signed by the VeriSign Class 3 Public Primary G5 root CA certificate. The `iot:Data-ATS`
    endpoints present a server certificate signed by an Amazon Trust Services CA.
    You can find the detailed information at [https://docs.aws.amazon.com/iot/latest/developerguide/server-authentication.html](https://docs.aws.amazon.com/iot/latest/developerguide/server-authentication.html).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please note that the Arduino TLS library only supports the endpoint type of
    `iot:Data`. We will select the AWS IoT Core regions supporting the `iot:Data`
    type of endpoint, such as `us-west-2-amazonaws.com`. You can find those regions’
    capability at [https://docs.aws.amazon.com/general/latest/gr/iot-core.html](https://docs.aws.amazon.com/general/latest/gr/iot-core.html),
    in [*Chapter 5*](B22002_05.xhtml#_idTextAnchor170) in the *AWS IoT* *Core* section.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: You can download the AWS root CA certificate, VeriSign Class 3 Public Primary
    G5 root CA certificate for the `iot:Data` type endpoints, from [https://cacerts.digicert.com/pca3-g5.crt.pem](https://cacerts.digicert.com/pca3-g5.crt.pem).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '`----``BEGIN CERTIFICATE-----`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The base64-encoded `----``END CERTIFICATE-----`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This certificate contains the public key of the device and is signed by a CA.
    It’s used in the TLS handshake process to prove the device’s identity to another
    party.
  prefs: []
  type: TYPE_NORMAL
- en: '`----BEGIN` `PRIVATE KEY-----`*   The base64-encoded key*   `----END` `PRIVATE
    KEY-----`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: During the TLS handshake, the device does not transmit its private key. Instead,
    it uses the key to create digital signatures or to decrypt information sent to
    it that was encrypted with its public key, proving that it holds the corresponding
    private key without revealing it.
  prefs: []
  type: TYPE_NORMAL
- en: When you create a thing in the AWS IoT Core console, you will be prompted to
    download the device certificate PEM file and device private key file. You need
    to save them, copy and paste their contents into the credential file, which we
    will create in this chapter’s exercise, and then program them to the ESP32\. We
    will show you how to create the credential file and call it in the main code in
    this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the ESP32 code implementation, we will use two standard Arduino libraries:
    `WiFiClientSecure.h` for establishing a TLS connection, and `PubSubClient.h` for
    performing MQTT communication. These two libraries are commonly used together
    to ensure secure MQTT communication over TLS:'
  prefs: []
  type: TYPE_NORMAL
- en: '`WiFiClientSecure.h`: Part of the Arduino Wi-Fi shield library, this library
    supports TLS/SSL connections. It is a variant of `WiFiClient` designed to handle
    encrypted connections, vital for securely transmitting sensitive data over the
    Internet.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`PubSubClient.h`: This library provides a client for simple publish/subscribe
    messaging with an MQTT server.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following is the procedure to set up a TLS connection between the ESP32
    and AWS IoT Core:'
  prefs: []
  type: TYPE_NORMAL
- en: Log in to the AWS console.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **AWS IoT** **Core service**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a *Thing*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Generate and download certificates (device certificate PEM and private key).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Generate policy and attach it to certificates.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create `SecureCredentials.h` in PlatformIO by the AWS root CA certificate, and
    the downloaded certificates.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Program code on the ESP32 by calling `WiFiClientSecure.h` and `PubSubClient.h`
    to set up a TLS/MQTT connection.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Observe print messages on the ESP32 local terminal window.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In this section, we went through the entire procedure, from provisioning a device
    in AWS IoT Core to establishing a TLS connection. In the next section, we will
    complete the procedure step by step.
  prefs: []
  type: TYPE_NORMAL
- en: Provisioning the ESP32 in AWS IoT Core
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before starting provisioning the ESP32 in AWS IoT Core, you must complete the
    following tasks as prerequisites:'
  prefs: []
  type: TYPE_NORMAL
- en: Create an AWS account in your region
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have an admin role with a permission policy of **AdministratorAccess**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Assuming you already completed the preceding tasks, let us follow these steps
    to provision your ESP32 in AWS IoT Core:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Login to your AWS account from AWS Console as an **IAM** (**Identity and Access
    Management**)user by your admin role:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.1 – AWS login page](img/B22002_13_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.1 – AWS login page
  prefs: []
  type: TYPE_NORMAL
- en: 'Find and click the **IAM** service:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.2 – Locate and start the IAM console](img/B22002_13_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.2 – Locate and start the IAM console
  prefs: []
  type: TYPE_NORMAL
- en: 'Find and click on **Users** on the left side:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![ Figure 13.3 – Locate Users in the IAM console](img/B22002_13_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.3 – Locate Users in the IAM console
  prefs: []
  type: TYPE_NORMAL
- en: Find the regular IAM user for accessing AWS IoT Core service, such as `jun.wen`
    in the following screenshot. If you don’t have such a regular IAM user, you can
    click **Create User** to set up one in the following screenshot. This operation
    adheres to AWS’s *least privilege* principle, a fundamental security practice
    that involves granting users and systems the minimal access levels needed for
    their tasks. Implementing this principle in AWS is essential for minimizing potential
    security risks and ensuring the security of your AWS environment. In this step,
    we will create a regular user and grant them sufficient access to eligible AWS
    resources. Once we complete this operation, we will use this regular IAM user
    to execute the configuration from the rest of the steps.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.4 – Locate a regular IAM user](img/B22002_13_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.4 – Locate a regular IAM user
  prefs: []
  type: TYPE_NORMAL
- en: 'Click the regular IAM user name, and make sure that it is attached to these
    five permissions policies as in the following screenshot since we are going to
    use all these services in later steps:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.5 – Check the permission policies of this regular IAM user](img/B22002_13_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.5 – Check the permission policies of this regular IAM user
  prefs: []
  type: TYPE_NORMAL
- en: 'In this step, we will attach this regular IAM user to the following permission
    policies needed by this chapter and [*Chapter 15*](B22002_15.xhtml#_idTextAnchor338):'
  prefs: []
  type: TYPE_NORMAL
- en: '`AWSIoTFullAccess`: This gives access to IoT full services and will be used
    in this chapter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`AmazonSNSFullAccess`: This gives access to the **SNS** (**Simple Notification
    Service**) service and will be used in [*Chapter 15*](B22002_15.xhtml#_idTextAnchor338).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`AWSIoTAnalyticsFullAccess`: This gives access to the IoT Analytics service
    and will be used in [*Chapter 15*](B22002_15.xhtml#_idTextAnchor338).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`AWSLambda_FullAccess`: This gives access to the Lambda service and will be
    used in [*Chapter 15*](B22002_15.xhtml#_idTextAnchor338).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If you didn’t find these permissions policies attached to this regular IAM
    user, please click **Add permission** in the preceding screenshot. Search, and
    attach policies directly as the following screenshot:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.6 – Attach the necessary permissions to this regular IAM user](img/B22002_13_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.6 – Attach the necessary permissions to this regular IAM user
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, you are all set to log in to the AWS console as this regular IAM user
    as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.7 – Use this regular IAM user to log in to the AWS console](img/B22002_13_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.7 – Use this regular IAM user to log in to the AWS console
  prefs: []
  type: TYPE_NORMAL
- en: 'After login, select the region close to your location and support the endpoint
    type of `iot:Data`, such as `us-west-2` ([iot.us-west-2.amazonaws.com](http://iot.us-west-2.amazonaws.com));
    you can find it at [https://docs.aws.amazon.com/general/latest/gr/iot-core.html](https://docs.aws.amazon.com/general/latest/gr/iot-core.html)
    in **AWS IoT Core - control** **plane endpoints**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.8 – Select your region with the AWS IoT Core service](img/B22002_13_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.8 – Select your region with the AWS IoT Core service
  prefs: []
  type: TYPE_NORMAL
- en: 'Find and click the **IoT** **Core** service:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.9 – Locate and move to the IoT Core console](img/B22002_13_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.9 – Locate and move to the IoT Core console
  prefs: []
  type: TYPE_NORMAL
- en: 'You will see the **AWS IoT** service as it is in the following screenshot:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.10 – The IoT Core welcome page](img/B22002_13_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.10 – The IoT Core welcome page
  prefs: []
  type: TYPE_NORMAL
- en: 'Find and click **Things** on the left side and then click **Create things**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.11 – Start to create things](img/B22002_13_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.11 – Start to create things
  prefs: []
  type: TYPE_NORMAL
- en: 'Click **Create single thing** and click on **Next**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.12 – Select Create single thing](img/B22002_13_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.12 – Select Create single thing
  prefs: []
  type: TYPE_NORMAL
- en: Give the thing a `deviceID` name, the eFuse MAC you got from running the code
    in the last chapter.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.13 – Give deviceID to Thing name](img/B22002_13_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.13 – Give deviceID to Thing name
  prefs: []
  type: TYPE_NORMAL
- en: 'Generate the device certificates. Please note the certificate files can be
    shared with other devices. When you create additional devices after the first
    one, you can select **Skip creating a certificate at this time**, and then attach
    the same certificates to these devices:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.14 – Generate device certificate](img/B22002_13_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.14 – Generate device certificate
  prefs: []
  type: TYPE_NORMAL
- en: Now, you can download all these files for future usage, or just download **Device
    certificate** and **Private key file** as shown in the following screenshot. Save
    these two files on your computer, and we will copy and paste their contents to
    the credential header file to program on the ESP32.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.15 – Download device certificate and private key file](img/B22002_13_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.15 – Download device certificate and private key file
  prefs: []
  type: TYPE_NORMAL
- en: Click **Create thing** to complete the first device creation process.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.16 – Complete the new device creation](img/B22002_13_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.16 – Complete the new device creation
  prefs: []
  type: TYPE_NORMAL
- en: You will see the `deviceID` that you previously gave.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.17 – The successful page](img/B22002_13_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.17 – The successful page
  prefs: []
  type: TYPE_NORMAL
- en: 'On the left side, find and click **Policies** to create a policy:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.18 – Create IoT Core access policy](img/B22002_13_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.18 – Create IoT Core access policy
  prefs: []
  type: TYPE_NORMAL
- en: 'You can enter a policy name here, for example, `AWS_IOT_Core_Access`, as shown
    in the following screenshot. Then, click `us-west-2`) and your account ID. You
    can get your account ID information by clicking your account name in the top right
    corner:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.19 – Edit the policy document](img/B22002_13_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.19 – Edit the policy document
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a closer look at the contents of the policy document (you can find
    the example at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_13/AWS_IOT_Core_Access](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/blob/main/Chapter_13/AWS_IOT_Core_Access)):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, you will create a policy called `AWS_IOT_Core_Access` as shown in the
    following screenshot:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.20 – Complete AWS IoT Core access policy creation](img/B22002_13_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.20 – Complete AWS IoT Core access policy creation
  prefs: []
  type: TYPE_NORMAL
- en: 'On the left side, click **Certificate** and you will see the certificate ID
    that has been created. Click this **Certificate ID**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.21 – Locate certificates previously created](img/B22002_13_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.21 – Locate certificates previously created
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, click **Attach policies**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.22 – Start to attach a policy to the certificate](img/B22002_13_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.22 – Start to attach a policy to the certificate
  prefs: []
  type: TYPE_NORMAL
- en: In the prompt window, select the policy we created in the previous step.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.23 – Locate the policy previously created](img/B22002_13_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.23 – Locate the policy previously created
  prefs: []
  type: TYPE_NORMAL
- en: Now, you can see the policy that is attached to this certificate ID.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 13.24 – The policy attachment successful page](img/B22002_13_24.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.24 – The policy attachment successful page
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, you have completed a device provisioning process in AWS IoT Core including
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: You have created a device with a thing name of the device ID of your ESP32 (the
    device’s eFuse MAC address)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have generated the device certificates and private key
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have downloaded the device certificates and private key on your PC
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have created a connection policy and attached it to the certificate ID
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use the same certificates, private keys, and connection policies that
    you create for other devices in the future. This means that you don’t need to
    create new certificates, keys, and policies when you add more devices. In this
    step, you have completed your ESP32 provisioning in AWS IoT Core, generated a
    device certificate and a private key, and created a permission policy to access
    AWS IoT Core. The configuration task was done on the AWS side in this chapter;
    now, let us move on to programming AWS to support TLS and MQTT.
  prefs: []
  type: TYPE_NORMAL
- en: Creating an AWS credential header file on the ESP32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As stated, we will make a credential header file that contains the AWS root
    CA certificate, device certificate, and private key, which is requested for TLS
    setup. This header file will be imported and called by the main code on the ESP32.
  prefs: []
  type: TYPE_NORMAL
- en: You can find an example of the `SecureCredential.h` header file at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_13](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_13).
    This header file will be called in `main.cpp`. Your `SecureCredential.h` contents
    shall look like the following screenshot.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.25 – The SecureCredential.h file format example](img/B22002_13_25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.25 – The SecureCredential.h file format example
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the credential header file, we will have to create a hardware
    header file to read the ESP32 chipset hardware information, including the eFuse
    MAC address for `deviceID`. You can find an example of the `HardwareInfo.h` header
    file in the same link folder.
  prefs: []
  type: TYPE_NORMAL
- en: As long as you created these two header files, `SecureCredential.h` and `HardwareInfo.h`,
    in the next step, we are going to continue to prompt ChatGPT to update the code
    from the previous chapter to call these new header files, `SecureCredential.h`,
    `HardwareInfo.h`, `WiFiClientSecure.h`, and `PubSubClient.h`, in the `mail.cpp`
    code, and initiate TLS/MQTT connection with AWS IoT Core.
  prefs: []
  type: TYPE_NORMAL
- en: Instructing ChatGPT to produce TLS code on the ESP32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Now, let us list the necessary information in the ESP32’s main code to access
    AWS IoT Core:'
  prefs: []
  type: TYPE_NORMAL
- en: TLS certificates, which will be stored in the `SecureCredentials.h` header file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MQTT server address and port, which will be stored in the `Platformio.ini` file,
    for example, `AWS_IOT_MQTT_SERVER=\"xxxxxxxxxxxxxx.iot.your_aws_region.amazonaws.com\",
    AWS_IOT_MQTT_PORT=8883`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`deviceID`, which will be populated from the `HardwareInfo.h` header file'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be aware that `AWS_IOT_MQTT_SERVER` is the endpoint address as shown in the
    following figure; it is in the settings under AWS IoT. Please remember to remove
    `-ats` from the endpoint address because we use the endpoint type of `iot:Data`,
    not `iot:Data-ATS`.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.26 – Locate your endpoint information](img/B22002_13_26.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.26 – Locate your endpoint information
  prefs: []
  type: TYPE_NORMAL
- en: 'You can now continue using the code created in the previous chapter and add
    the TLS MQTT requirement as the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '`Hi, ChatGPT.`'
  prefs: []
  type: TYPE_NORMAL
- en: '`Please update the previous code, maintain its current structure, style, and
    output format, and support the following` `additional requirements:`'
  prefs: []
  type: TYPE_NORMAL
- en: '`Import and use the ESP32 standard libraries of WiFiClientSecure.h for TLS
    and PubSubClient.h for the` `MQTT stack.`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Import SecureCredentials.h, which stores AWS certificates, and call it in
    the` `main code.`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Import HardwareInfo.h to read the eFuse MAC address as` `the deviceID.`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Store AWS_IOT_MQTT_SERVER and AWS_IOT_MQTT_PORT information in the build_flagsin`
    `Platformio.ini file.`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Create a dedicated function called connectAWS in the main code for AWS IoT`
    `Core access.`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Normal condition: If the ESP32 successfully accesses AWS IoT Core, print out`
    `successful messages.`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Abnormal condition: If the ESP32 fails to access AWS IoT Core, print out the
    received` `error messages.`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Code examples
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There is a sample of the `main.cpp` code, which is located at [https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_13](https://github.com/PacktPublishing/Accelerating-IoT-Development-with-ChatGPT/tree/main/Chapter_13).
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `main.cpp` code, you’ll find a new function called `connectAWS()`, created
    by ChatGPT. This function is located in the `setup()` section and is responsible
    for initiating the TLS connection. It calls the root CA, device certificate, and
    private key contents during this process:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Before you compile and upload the new code, you need to search and install `PubSubClient.h`
    from PlatformIO **Libraries**; please refer to the following screen to execute
    it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.27 – Install the PubSubClient library](img/B22002_13_27.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.27 – Install the PubSubClient library
  prefs: []
  type: TYPE_NORMAL
- en: 'You now save the `SecureCredentials.h` and `HardwareInfo.h` files in the same
    folder in PlatformIO with the `main.cpp` code, as shown in the following screenshot:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.28 – Copy SecureCredential.h and HardwareInfo.h in the folder with
    main.cpp](img/B22002_13_28.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.28 – Copy SecureCredential.h and HardwareInfo.h in the folder with
    main.cpp
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this section, you will be able to request ChatGPT to update the
    code to support a TLS/MQTT connection. In the next section, we will compile and
    upload the code and validate the access status on the terminal window of the ESP32.
  prefs: []
  type: TYPE_NORMAL
- en: Validating access status on the ESP32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You can now copy and paste the updated main code from ChatGPT, compile and transfer
    it to the ESP32, and check the access status in the local terminal window, as
    shown in the following screenshot.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13.29 – Validate AWS IoT Core connection status](img/B22002_13_29.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13.29 – Validate AWS IoT Core connection status
  prefs: []
  type: TYPE_NORMAL
- en: In this section, you uploaded the revised version of the `main.cpp` code to
    the ESP32\. After that, you will check the printout message regarding the connection
    status between the ESP32 and AWS IoT Core. If your `SecureCredential.h` header
    file and AWS MQTT server are configured correctly, your ESP32 should successfully
    connect to AWS IoT Core.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you made the ESP32 access to the AWS cloud through MQTT over
    a TLS connection. This is the fundamental step to send sensor data to the AWS
    cloud.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, after a successful connection to AWS IoT Core, we will
    use the Arduino JSON library on the ESP32 to publish DHT11 temperature and humidity
    data to AWS, and we will observe the received MQTT message at AWS IoT Core. We
    will continue to use ChatGPT to build the code on the ESP32 to publish the MQTT
    topic and create a JSON payload.
  prefs: []
  type: TYPE_NORMAL
