- en: '<st c="2">Integrating the ChatGPT and DALL-E APIs: Building an End-to-End PowerPoint
    Presentation Generator</st>'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 集成 ChatGPT 和 DALL-E API：构建端到端 PowerPoint 演示生成器
- en: <st c="99">In this exciting chapter, we’ll dive into the world of AI art and
    explore the incredible capabilities of</st> **<st c="205">DALL-E</st>**<st c="211">,
    an</st> <st c="216">AI model developed by OpenAI.</st> <st c="246">We’ll start
    by introducing you to DALL-E and its groundbreaking approach to generating images
    from textual descriptions.</st> <st c="367">You’ll learn how to access the power
    of DALL-E through the DALL-E API, allowing you to integrate this cutting-edge
    technology into your own Python applications.</st> <st c="528">You will unleash
    your creativity as you discover the fascinating possibilities of generating AI
    art</st> <st c="628">with DALL-E.</st>
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个令人兴奋的章节中，我们将深入 AI 艺术的世界，并探索由 OpenAI 开发的 AI 模型 **DALL-E** 的惊人能力。<st c="246">我们将首先向您介绍
    DALL-E 及其从文本描述生成图像的开创性方法。</st> <st c="367">您将学习如何通过 DALL-E API 访问 DALL-E 的力量，使您能够将这项尖端技术集成到您自己的
    Python 应用程序中。</st> <st c="528">随着您发现使用 DALL-E 生成 AI 艺术的迷人可能性，您将释放您的创造力。</st> <st
    c="628">您将能够使用 DALL-E 生成引人入胜的 AI 艺术作品。</st>
- en: <st c="640">Presentations play a crucial role in conveying information effectively,
    and in this chapter, we’ll show you how to automate the development of PowerPoint
    presentations using a Python framework and DALL-E image generation.</st> <st c="863">You’ll
    gain hands-on experience in leveraging the power of programming to streamline
    the</st> <st c="952">creation process.</st>
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将展示如何使用 Python 框架和 DALL-E 图像生成自动化 PowerPoint 演示的开发。您将获得利用编程力量简化创建过程的实践经验。<st
    c="952">。</st>
- en: <st c="969">We will explore the integration of DALL-E and ChatGPT, two powerful
    AI models, to build an end-to-end PowerPoint Presentation Generator application.</st>
    <st c="1119">This project will enable you to combine the abilities of DALL-E in
    generating captivating AI art with ChatGPT’s expertise in generating human-like
    text.</st> <st c="1272">By integrating these APIs, you’ll be able to create an
    application that takes user-specified text and generates PowerPoint slides with
    accompanying images</st> <st c="1427">and text.</st>
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨将 DALL-E 和 ChatGPT 这两个强大的 AI 模型集成起来，以构建一个端到端的 PowerPoint 演示生成器应用程序。<st
    c="1119">这个项目将使您能够结合 DALL-E 在生成引人入胜的 AI 艺术方面的能力以及 ChatGPT 在生成类似人类文本方面的专业知识。</st>
    <st c="1272">通过集成这些 API，您将能够创建一个应用程序，该应用程序可以接受用户指定的文本并生成带有图像和文本的 PowerPoint 幻灯片。</st>
    <st c="1427">和文本。</st>
- en: <st c="1436">In this chapter, we will cover the</st> <st c="1472">following
    topics:</st>
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: <st c="1489">Using DALL-E and the</st> <st c="1511">DALL-E API</st>
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 DALL-E 和 DALL-E API
- en: <st c="1521">Building PowerPoint applications with the PPTX</st> <st c="1569">Python
    framework</st>
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 PPTX Python 框架构建 PowerPoint 应用程序
- en: <st c="1585">Generating art with the</st> <st c="1610">DALL-E API</st>
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 DALL-E API 生成艺术作品
- en: <st c="1620">Finalizing and testing the PowerPoint</st> <st c="1659">Presentation
    Generator</st>
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成并测试 PowerPoint 演示生成器
- en: <st c="1681">By the end of this chapter, you will have boosted your AI application
    development skills by integrating the DALL-E and ChatGPT APIs to build an end-to-end
    PowerPoint Presentation Generator application.</st> <st c="1884">By combining
    the image generation capabilities of DALL-E with the text generation expertise
    of ChatGPT, you will know how to automate the development of PowerPoint presentations
    that include both captivating AI-generated images and</st> <st c="2116">human-like
    text.</st>
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将通过将 DALL-E 和 ChatGPT API 集成到构建端到端的 PowerPoint 演示生成器应用程序中来提高您的 AI 应用程序开发技能。<st
    c="1884">通过结合 DALL-E 的图像生成能力和 ChatGPT 的文本生成专业知识，您将了解如何自动化包含引人入胜的 AI 生成的图像和类似人类文本的
    PowerPoint 演示的开发。</st> <st c="2116">。</st>
- en: <st c="2132">Technical requirements</st>
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: <st c="2155">To make the most of this chapter, you’ll need to have certain essential
    tools in place.</st> <st c="2244">We will provide detailed explanations and instructions
    for installations that were not covered in the previous chapter.</st> <st c="2364">Here’s
    what</st> <st c="2376">you’ll need:</st>
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2388">Python 3.7 or a later version installed on</st> <st c="2432">your
    computer</st>
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2445">An OpenAI API key, which you can obtain from your</st> <st c="2496">OpenAI
    account</st>
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2510">A code editor, such as VS Code (recommended), to write and edit</st>
    <st c="2575">your code</st>
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2584">The Tkinter framework installed in your Python</st> <st c="2632">virtual
    environment</st>
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2651">PowerPoint software installed on</st> <st c="2685">your device</st>
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="2696">The code examples for this chapter can be found on GitHub</st>
    <st c="2755">at</st> [<st c="2758">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API)<st
    c="2834">.</st>
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2835">In the next section, we will explore the DALL-E AI art generation
    AI model and cover the basics of the</st> <st c="2939">DALL-E API.</st>
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: <st c="2950">Using the DALL-E API</st>
  id: totrans-20
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="2971">DALL-E is a</st> <st c="2983">remarkable AI model that can generate
    stunning images from textual descriptions.</st> <st c="3065">In this section,
    you will gain an understanding of the concept behind DALL-E and its groundbreaking
    approach to image synthesis.</st> <st c="3194">You’ll learn about the unique capabilities
    of DALL-E in translating text prompts into vibrant and imaginative visual representations.</st>
    <st c="3328">Additionally, we’ll explore the practical application of DALL-E through</st>
    <st c="3400">the DALL-E API, empowering you to seamlessly integrate this powerful
    technology into your applications and unlock a myriad of</st> <st c="3526">creative
    possibilities.</st>
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: <st c="3549">DALL-E is an advanced AI model developed by OpenAI.</st> <st c="3602">It
    was introduced to the world in January 2021\.</st> <st c="3650">DALL-E is a neural
    network-based model that combines elements of the ChatGPT language models with
    a</st> **<st c="3750">G</st>****<st c="3751">enerative Adversarial Network</st>**
    <st c="3780">(</st>**<st c="3782">GAN</st>**<st c="3785">) architecture.</st>
    <st c="3802">The</st> <st c="3805">name DALL-E is a playful combination of the
    artist Salvador Dalí and the character WALL-E from the animated film.</st> <st
    c="3920">This unique model was designed to generate highly realistic and novel
    images based on textual descriptions, showcasing the incredible potential of AI
    in the field of visual creativity.</st> <st c="4105">By training on a massive
    dataset of images and textual prompts, DALL-E can create intricate and imaginative
    visual outputs, providing a glimpse into the groundbreaking advancements in AI-driven</st>
    <st c="4299">image synthesis.</st>
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: <st c="4315">You can integrate DALL-E directly into your applications by using
    the DALL-E API.</st> <st c="4398">It provides a convenient interface to interact
    with DALL-E, enabling users to generate images based on custom textual</st> <st
    c="4516">prompts programmatically.</st>
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="4315">您可以通过使用 DALL-E API 直接将 DALL-E 集成到您的应用程序中。</st> <st c="4398">它提供了一个方便的接口与
    DALL-E 交互，使用户能够根据自定义的文本</st> <st c="4516">提示程序化地生成图像。</st>
- en: <st c="4541">To use the</st> <st c="4552">DALL-E API, you can use the same API
    key from your OpenAI account.</st> <st c="4620">Once you have your API key, you
    can make requests to the API endpoint, specifying the text prompt for which you
    want to generate an image.</st> <st c="4759">You can create a single Python file
    and generate your first DALL-E image within a few lines of code.</st> <st c="4860">The
    API will process the request and return the generated image as a response, as
    shown in the following</st> <st c="4965">code example:</st>
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="4541">要使用</st> <st c="4552">DALL-E API，您可以使用来自您的 OpenAI 账户的相同 API 密钥。</st>
    <st c="4620">一旦您有了 API 密钥，您就可以向 API 端点发出请求，指定您想要生成图像的文本提示。</st> <st c="4759">您可以在几行代码内创建一个单独的
    Python 文件并生成您的第一个 DALL-E 图像。</st> <st c="4860">API 将处理请求并返回生成的图像作为响应，如下面的</st>
    <st c="4965">代码示例</st> <st c="4969">所示：</st>
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: <st c="5133">The preceding</st> <st c="5148">code demonstrates how to use the</st>
    `<st c="5181">openai.Image.create()</st>` <st c="5202">function to generate an
    image using the DALL-E API and retrieve the URL of the</st> <st c="5282">generated
    image.</st>
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5133">前面的</st> <st c="5148">代码演示了如何使用</st> `<st c="5181">openai.Image.create()</st>`
    <st c="5202">函数通过 DALL-E API 生成图像并检索生成的图像的 URL。</st>
- en: <st c="5298">The</st> `<st c="5303">prompt</st>` <st c="5309">parameter serves
    as the textual description or instruction for the desired image.</st> <st c="5392">This
    prompt provides guidance to the DALL-E model on what the generated image should
    depict.</st> <st c="5485">The</st> `<st c="5489">size</st>` <st c="5493">parameter
    determines the dimensions of the generated image, indicating a square image with
    a resolution of</st> `<st c="5601">1024</st>` <st c="5605">pixels by</st> `<st
    c="5616">1024</st>` <st c="5620">pixels.</st>
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5298">`<st c="5303">prompt</st>` <st c="5309">参数作为所需图像的文本描述或指令。</st>
    <st c="5392">此提示为 DALL-E 模型提供指导，说明生成的图像应描绘什么。</st> <st c="5485">`<st c="5489">size</st>`
    <st c="5493">参数确定生成图像的尺寸，表示分辨率为</st> `<st c="5601">1024</st>` <st c="5605">像素乘以</st>
    `<st c="5616">1024</st>` <st c="5620">像素的正方形图像。</st>
- en: <st c="5628">After making the</st> <st c="5646">API request, the response is
    stored in the</st> `<st c="5689">response</st>` <st c="5697">variable.</st> <st
    c="5708">The code then retrieves the URL of the generated image from the API response.</st>
    <st c="5786">The URL is obtained by accessing the appropriate keys in the response
    dictionary.</st> <st c="5868">By assigning</st> `<st c="5881">response</st>` <st
    c="5889">to</st> `<st c="5893">image_url</st>`<st c="5902">, the URL of the generated
    image is stored for further use in</st> <st c="5964">any application.</st>
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5628">在发出</st> <st c="5646">API 请求后，响应存储在</st> `<st c="5689">response</st>`
    <st c="5697">变量中。</st> <st c="5708">然后代码从 API 响应中检索生成的图像的 URL。</st> <st c="5786">URL
    通过访问响应字典中的适当键来获取。</st> <st c="5868">通过将</st> `<st c="5881">response</st>` <st
    c="5889">分配给</st> `<st c="5893">image_url</st>`<st c="5902">，生成的图像的 URL 被存储以供在</st>
    <st c="5964">任何应用程序中进一步使用。</st>
- en: <st c="5980">This is how you can use the DALL-E API to integrate that AI art
    into your applications.</st> <st c="6069">In the next section, we will do that
    by launching our PowerPoint Presentation</st> <st c="6147">Generator application.</st>
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="5980">这就是您如何使用 DALL-E API 将该 AI 艺术集成到您的应用程序中的方法。</st> <st c="6069">在下一节中，我们将通过启动我们的
    PowerPoint 演示</st> <st c="6147">生成器应用程序来实现这一点。</st>
- en: <st c="6169">Building PowerPoint applications with the PPTX Python framework</st>
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="6169">使用 PPTX Python 框架构建 PowerPoint 应用程序</st>
- en: <st c="6233">In this</st> <st c="6242">section, we will guide you</st> <st c="6269">through
    the process of setting up your very own PowerPoint Presentation Generator application
    using the</st> `<st c="6373">pptx</st>` <st c="6377">Python library and the ChatGPT
    API.</st> <st c="6414">We’ll explore how to leverage the power of the</st> `<st
    c="6461">pptx</st>` <st c="6465">library to automate the creation of PowerPoint
    presentations, allowing you to dynamically generate slides with customized content.</st>
    <st c="6597">Furthermore, we’ll demonstrate how to integrate this PowerPoint generation
    functionality into a Tkinter application, enabling you to build a user-friendly
    interface for your</st> <st c="6771">slide generator.</st>
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: <st c="6787">For this project, we will use the VS Code IDE, which is our preferred
    IDE when working with Python.</st> <st c="6888">Launch VS Code and create a new
    project.</st> <st c="6929">Choose the location where you want to create your project
    and name it</st> `<st c="6999">PowerPoint Generator</st>`<st c="7019">.</st>
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: <st c="7020">Once your project is open, find the</st> **<st c="7057">Terminal</st>**
    <st c="7065">tab.</st> <st c="7071">Once the</st> **<st c="7080">Terminal</st>**
    <st c="7088">tab is open, you can start using it just like a regular command-line
    interface to install the necessary libraries for</st> <st c="7207">our project:</st>
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: <st c="7286">Here’s how we’re going to use</st> <st c="7317">those libraries:</st>
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="7333">python-pptx</st>`<st c="7345">: The</st> `<st c="7352">python-pptx</st>`
    <st c="7363">package is</st> <st c="7375">used for working with PowerPoint files
    (</st>`<st c="7415">.pptx</st>`<st c="7420">) and provides functionalities to
    create, modify, and automate the development of PowerPoint</st> <st c="7514">presentations
    programmatically.</st>'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`<st c="7545">openai</st>`<st c="7552">: The</st> `<st c="7559">openai</st>`
    <st c="7565">package provides</st> <st c="7582">access to the OpenAI API, which
    allows you to interact with AI models such as DALL-E and ChatGPT, enabling you
    to utilize their capabilities in your</st> <st c="7732">Python applications.</st>'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`<st c="7752">requests</st>`<st c="7761">: The</st> `<st c="7768">requests</st>`
    <st c="7776">package</st> <st c="7784">is used for making HTTP requests and is
    used to communicate with the DALL-E API and retrieve the generated image URL after
    sending</st> <st c="7916">a request.</st>'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="7926">We can</st> <st c="7934">continue</st> <st c="7943">developing
    our project structure by creating two files,</st> `<st c="7999">app.py</st>` <st
    c="8005">and</st> `<st c="8010">config.py</st>`<st c="8019">:</st>
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: <st c="8021">app.py</st>
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: <st c="8287">config.py</st>
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: <st c="8322">Here, the</st> `<st c="8333">app.py</st>` <st c="8339">file is</st>
    <st c="8347">the core of the application and serves as the main entry point.</st>
    <st c="8412">It imports various libraries and</st> <st c="8445">modules to enable
    connection to the ChatGPT, DALL-E, and PowerPoint frameworks.</st> <st c="8525">Here’s
    a breakdown of the imports and</st> <st c="8563">their purposes:</st>
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="8578">collections.abc</st>` <st c="8594">is imported to ensure compatibility
    with collections from the Python</st> <st c="8664">Standard Library</st>'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="8680">config</st>` <st c="8687">is imported to access the</st> `<st
    c="8714">API_KEY</st>` <st c="8721">variable, which holds the API key required
    for authentication with the</st> <st c="8793">OpenAI API</st>'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="8803">tkinter</st>` <st c="8811">is imported to utilize the Tkinter
    library for building the user interface of</st> <st c="8890">the application</st>'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="8905">pptx</st>` <st c="8910">and</st> `<st c="8915">pptx.util</st>`
    <st c="8924">are imported to work with PowerPoint files, allowing the application
    to create and modify PowerPoint</st> <st c="9026">presentations programmatically</st>'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="9056">openai</st>` <st c="9063">is imported to interact with the OpenAI
    API and access its services, such as language models and</st> <st c="9161">image
    generation</st>'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`<st c="9177">io</st>` <st c="9180">and</st> `<st c="9185">requests</st>` <st
    c="9193">are imported to handle input/output operations and make HTTP</st> <st
    c="9255">requests, respectively</st>'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <st c="9277">On the other hand, the</st> `<st c="9301">config.py</st>` <st c="9310">file
    serves as a configuration file for the project.</st> <st c="9364">It contains
    the API key, represented by the</st> `<st c="9408">API_KEY</st>` <st c="9415">variable,
    which is required for authentication with the OpenAI API.</st> <st c="9484">By
    separating the API key into a configuration file, it becomes easier to manage
    and update the key without modifying the main application code directly.</st>
    <st c="9638">This modular approach allows for better organization and flexibility
    in handling</st> <st c="9719">sensitive information.</st>
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: <st c="9741">Next, inside our</st> `<st c="9759">app.py</st>` <st c="9765">file,
    we will focus on building the Tkinter application window, which will serve</st>
    <st c="9847">as the</st> **<st c="9854">Graphical User Interface</st>** <st c="9878">(</st>**<st
    c="9880">GUI</st>**<st c="9883">) for our PowerPoint Presentation</st> <st c="9918">Generator
    application:</st>
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: <st c="10319">Here, we create the Tkinter application frame that will allow
    users to generate PowerPoint slides based on the</st> <st c="10431">input text.</st>
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10442">First, the code</st> <st c="10458">initializes a Tkinter application
    window using the</st> `<st c="10510">tk.Tk()</st>` <st c="10517">function.</st>
    <st c="10528">The</st> `<st c="10532">app</st>` <st c="10535">variable is assigned
    as the application instance.</st> <st c="10586">Here, we set a title for the application
    window, which will be displayed in the window’s title bar.</st> <st c="10686">Then,
    we set the initial size of the application window to</st> `<st c="10745">800</st>`
    <st c="10748">pixels in width and</st> `<st c="10769">600</st>` <st c="10772">pixels</st>
    <st c="10780">in height.</st>
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: <st c="10790">We also</st> <st c="10798">create a text field using the</st>
    `<st c="10829">tk.Text()</st>` <st c="10838">function.</st> <st c="10849">This
    text field is used to accept user input for generating PowerPoint slides.</st>
    <st c="10928">The</st> `<st c="10932">pack()</st>` <st c="10938">method is called
    to place the text field within the application window.</st> <st c="11011">The</st>
    `<st c="11015">configure()</st>` <st c="11026">method is used to customize the
    text field’s appearance.</st> <st c="11084">In this case,</st> `<st c="11098">wrap="word"</st>`
    <st c="11109">is set to wrap the text at</st> <st c="11137">word boundaries.</st>
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11153">Lastly, we create a button using the</st> `<st c="11191">tk.Button()</st>`
    <st c="11202">function.</st> <st c="11213">The button is labeled</st> `<st c="11235">Create
    Slides</st>` <st c="11248">using the</st> `<st c="11259">text</st>` <st c="11263">parameter,
    and the</st> `<st c="11283">command</st>` <st c="11290">parameter is set to</st>
    `<st c="11311">get_slides</st>`<st c="11321">. This means that when the button
    is clicked, the</st> `<st c="11371">get_slides</st>` <st c="11381">function will</st>
    <st c="11396">be called.</st>
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: <st c="11406">Next, we will</st> <st c="11421">proceed to build the</st> `<st
    c="11442">get_slides()</st>` <st c="11454">function, which will be responsible
    for creating the PowerPoint presentation and slides.</st> <st c="11544">It is
    important to note that the</st> `<st c="11577">get_slides()</st>` <st c="11589">function
    should be defined above the lines that create the Tkinter application window</st>
    <st c="11676">and the associated widgets.</st> <st c="11704">This ensures that
    the function is defined and available for use when the application interacts with</st>
    <st c="11804">the user:</st>
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: <st c="12481">Here, the</st> `<st c="12492">text_field.get()</st>` <st c="12508">method</st>
    <st c="12515">is</st> <st c="12519">used to retrieve the contents of the text
    field.</st> <st c="12568">The</st> `<st c="12572">1.0</st>` <st c="12575">parameter
    indicates that the retrieval should start from the first character of the text
    field, and</st> `<st c="12676">end-1c</st>` <st c="12682">indicates that the retrieval
    should end at the last character, excluding the newline character.</st> <st c="12779">This
    allows us to obtain the entire text entered by</st> <st c="12831">the user.</st>
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: <st c="12840">Next, the text string is split into paragraphs.</st> <st c="12889">The</st>
    `<st c="12893">\n\n</st>` <st c="12897">delimiter is used to identify the paragraphs,
    assuming that each paragraph is separated by two consecutive newline characters.</st>
    <st c="13025">This split operation will create a list of paragraphs stored in
    the</st> `<st c="13093">paragraphs</st>` <st c="13103">variable.</st>
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13113">A new PowerPoint presentation object is created using</st> `<st
    c="13168">prs = Presentation()</st>`<st c="13188">. This initializes an empty
    presentation that will store the generated slides.</st> <st c="13267">Then, we
    set the dimensions of the slides to</st> `<st c="13312">1920</st>` <st c="13316">points
    in width and</st> `<st c="13337">1080</st>` <st c="13341">points</st> <st c="13349">in
    height.</st>
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13359">A loop is then initiated to iterate over each paragraph in the</st>
    `<st c="13423">paragraphs</st>` <st c="13433">list.</st> <st c="13440">For each
    paragraph, the</st> `<st c="13464">slide_generator()</st>` <st c="13481">function
    is called, passing the paragraph and the presentation object as parameters.</st>
    <st c="13567">This function, which will be implemented separately, is responsible
    for creating individual slides based on the content of</st> <st c="13690">each
    paragraph.</st>
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13705">Once the loop finishes, the generated presentation object is saved
    as a PowerPoint file.</st> <st c="13795">The resulting PowerPoint file will be
    named</st> `<st c="13839">my_presentation.pptx</st>` <st c="13859">and will contain
    the slides that were created from the</st> <st c="13915">user’s input.</st>
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: <st c="13928">To test your application at this early stage, you can click the</st>
    `<st c="14281">get_slides()</st>` <st c="14293">function, which generates the
    slides based on the</st> <st c="14344">input text:</st>
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9.1 – PowerPoint Presentation Generator GUI](img/B22414_09_01.jpg)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
- en: <st c="14387">Figure 9.1 – PowerPoint Presentation Generator GUI</st>
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14437">However, at</st> <st c="14450">this point, if you try to generate
    the AI slides, you will encounter an error.</st> <st c="14529">This is</st> <st
    c="14537">because the</st> `<st c="14549">slide_generator()</st>` <st c="14566">function,
    which is responsible for creating the AI art and text for our slides, has not
    been</st> <st c="14660">defined yet.</st>
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: <st c="14672">In the next section, we’ll jump into building the</st> `<st c="14723">slide_generator()</st>`
    <st c="14740">function, where the text provided by the user will be transformed
    into AI art using the DALL-E API.</st> <st c="14841">This function will access
    the capabilities of the DALL-E API to generate images based on the text input,
    allowing for the creation of stunning slides with</st> <st c="14996">AI-generated
    artwork.</st>
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="14672">在下一节中，我们将进入构建</st> `<st c="14723">slide_generator()</st>` <st
    c="14740">函数，其中用户提供的文本将通过 DALL-E API 转换为 AI 艺术。</st> <st c="14841">此函数将访问 DALL-E
    API 的功能，根据文本输入生成图像，从而创建带有</st> <st c="14996">AI 生成的艺术品</st> 的令人惊叹的幻灯片。
- en: <st c="15017">Generating art with the DALL-E API</st>
  id: totrans-70
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <st c="15017">使用 DALL-E API 生成艺术作品</st>
- en: <st c="15052">In this</st> <st c="15060">section, we</st> <st c="15072">will
    explore the exciting integration of the ChatGPT API and the DALL-E API.</st> <st
    c="15150">We will demonstrate how these two powerful AI tools can be combined
    to create unique and visually stunning artwork.</st> <st c="15266">By leveraging
    the ChatGPT API, we will generate a DALL-E prompt based on user-provided paragraphs
    from our application.</st> <st c="15386">We will then utilize the DALL-E API to
    transform that prompt into a</st> <st c="15454">captivating image.</st>
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15052">在本节中，我们将探索 ChatGPT API 和 DALL-E API 的激动人心的集成。</st> <st c="15060">我们将展示这两个强大的
    AI 工具如何结合以创建独特且视觉上令人惊叹的艺术作品。</st> <st c="15150">通过利用 ChatGPT API，我们将根据应用程序中提供的用户段落生成
    DALL-E 提示。</st> <st c="15266">然后，我们将利用 DALL-E API 将该提示转换为</st> <st c="15454">迷人的图像。</st>
- en: <st c="15472">To begin, we’ll start</st> <st c="15495">building the</st> `<st
    c="15508">slide_generator()</st>` <st c="15525">function, which will play a crucial
    role in generating the PowerPoint slides based on the user’s input.</st> <st c="15630">It
    is important to note that this function should be created right after the API
    key definition in the</st> `<st c="15733">app.py</st>` <st c="15739">file and
    above the</st> `<st c="15759">get_slides()</st>` <st c="15771">function.</st>
    <st c="15782">Placing it in this position ensures that it is defined and available
    for use when we invoke it within the</st> `<st c="15888">get_slides()</st>` <st
    c="15900">function.</st>
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15472">首先，我们将开始</st> <st c="15495">构建</st> `<st c="15508">slide_generator()</st>`
    <st c="15525">函数，该函数在根据用户输入生成 PowerPoint 幻灯片方面将发挥关键作用。</st> <st c="15630">需要注意的是，此函数应在</st>
    `<st c="15733">app.py</st>` <st c="15739">文件中 API 密钥定义之后以及</st> `<st c="15759">get_slides()</st>`
    <st c="15771">函数之上创建。</st> <st c="15782">将其放置在此位置确保它在</st> `<st c="15888">get_slides()</st>`
    <st c="15900">函数中调用时已定义并可供使用。</st>
- en: <st c="15911">This</st> <st c="15916">approach allows for the structured organization
    of the code and ensures the smooth</st> <st c="15998">execution of the slide</st>
    <st c="16022">generation process:</st>
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="15911">这种方法允许对代码进行结构化组织，并确保</st> <st c="15998">幻灯片生成过程的</st> <st c="16022">顺利执行：</st>
- en: '[PRE6]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: <st c="16652">The preceding code shows</st> <st c="16678">how we can define
    the</st> `<st c="16700">slide_generator()</st>` <st c="16717">function, which
    is responsible for generating a DALL-E image generation prompt based on the user-provided
    text and integrating it with the ChatGPT API.</st> <st c="16870">This</st> <st
    c="16874">function takes two parameters:</st> `<st c="16906">text</st>`<st c="16910">,
    which represents the user’s input, and</st> `<st c="16951">prs</st>`<st c="16954">,
    which refers to the PowerPoint</st> <st c="16987">presentation object.</st>
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="16652">前面的代码展示了</st> <st c="16678">我们如何定义</st> `<st c="16700">slide_generator()</st>`
    <st c="16717">函数，该函数负责根据用户提供的文本生成 DALL-E 图像生成提示，并将其与 ChatGPT API 集成。</st> <st
    c="16870">此函数接受两个参数：</st> `<st c="16906">text</st>`<st c="16910">，代表用户的输入，以及</st>
    `<st c="16951">prs</st>`<st c="16954">，指的是 PowerPoint</st> <st c="16987">演示对象。</st>
- en: <st c="17007">The</st> `<st c="17012">prompt</st>` <st c="17018">variable is
    defined by concatenating a static introductory text with the user-provided</st>
    `<st c="17106">text</st>` <st c="17110">parameter.</st> <st c="17122">This prompt
    will be used to instruct the ChatGPT model to summarize the given text into a
    DALL-E image</st> <st c="17225">generation prompt.</st>
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="17007">`<st c="17012">prompt</st>`</st> <st c="17018">变量是通过将静态引入文本与用户提供的</st>
    `<st c="17106">text</st>` <st c="17110">参数连接起来定义的。</st> <st c="17122">此提示将用于指示
    ChatGPT 模型将给定文本总结为 DALL-E 图像</st> <st c="17225">生成提示。</st>
- en: <st c="17243">The</st> `<st c="17248">create()</st>` <st c="17256">method is
    then called to make a request to the ChatGPT API for text completion.</st> <st
    c="17337">The JSON response from the ChatGPT API is stored in the</st> `<st c="17393">dlp</st>`
    <st c="17396">variable, which contains the completion result.</st> <st c="17445">The
    actual text from the ChatGPT completion result is extracted and assigned to the</st>
    `<st c="17529">dalle_prompt</st>` <st c="17541">variable.</st> <st c="17552">This</st>
    `<st c="17557">dalle_prompt</st>` <st c="17569">variable will serve as the input
    prompt for the DALL-E image</st> <st c="17631">generation API.</st>
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: <st c="17646">Now, we can begin using the DALL-E API to generate an image based
    on the DALL-E prompt created in the</st> `<st c="17749">slide_generator</st>`
    <st c="17764">function.</st> <st c="17775">We call the</st> `<st c="17787">client.images.generate()</st>`
    <st c="17811">method to make a request to the DALL-E API for image generation
    using the</st> <st c="17886">following parameters:</st>
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: '`<st c="17907">prompt</st>`<st c="17914">: The prompt for image generation,
    which is constructed by appending</st> `<st c="17984">dalle_prompt</st>` <st c="17996">(generated
    by the ChatGPT API) with the desired style for the image, specified as</st> `<st
    c="18079">Style:</st>` `<st c="18086">digital art</st>`<st c="18097">.</st>'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="18098">This prompts DALL-E to generate an image with a digital art style
    based on the text input.</st> <st c="18190">You can change this style according
    to</st> <st c="18229">your preferences.</st>
  id: totrans-80
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '`<st c="18246">n</st>`<st c="18248">: This specifies the number of images to
    generate.</st> <st c="18299">In this case, we request only</st> <st c="18329">one
    image.</st>'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`<st c="18339">size</st>`<st c="18344">: This sets the desired size of the
    generated image.</st> <st c="18398">Here, it is specified as</st> `<st c="18423">1024x1024</st>`
    <st c="18432">pixels, which is the</st> <st c="18454">highest-quality style.</st>'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="18476">The response</st> <st c="18490">from the DALL-E API is stored
    in the</st> `<st c="18527">response</st>` <st c="18535">variable.</st> <st c="18546">It</st>
    <st c="18549">contains information about the generated image, including its URL.</st>
    <st c="18616">The URL of the generated image is extracted from the response and
    assigned to the</st> `<st c="18698">image_url</st>` <st c="18707">variable.</st>
    <st c="18718">This URL can be used to retrieve and display the generated image
    in our</st> <st c="18790">PowerPoint slides.</st>
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: <st c="18808">In this section, we built the</st> `<st c="18839">slide_generator()</st>`
    <st c="18856">function to generate a DALL-E prompt using the ChatGPT API based
    on user input and then utilized the DALL-E API to generate an image with a desired
    style.</st> <st c="19012">This integration allows us to create visually stunning
    artwork and enhance the quality and impact of our</st> <st c="19117">PowerPoint
    slides.</st>
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: <st c="19135">In the next section, we will cover how to create slide headers
    and bullet points in our PowerPoint presentation.</st> <st c="19249">We will demonstrate
    how to incorporate AI-generated images and text</st> <st c="19317">into slides.</st>
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: <st c="19329">Finalizing and testing the PowerPoint Presentation Generator</st>
  id: totrans-86
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: <st c="19390">In this final</st> <st c="19405">section, you will learn the process
    of creating slide content for our PowerPoint presentations using AI-generated
    images</st> <st c="19525">and text.</st> <st c="19536">We will explore how to
    seamlessly integrate AI-generated elements, including images from DALL-E and text
    from ChatGPT, into our slides.</st> <st c="19672">By completing this section,
    you will be able to pass AI-generated content to your PowerPoint slides, adding
    a touch of uniqueness and sophistication to</st> <st c="19824">your presentations.</st>
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: <st c="19843">You will learn</st> <st c="19859">how to retrieve an AI-generated
    image URL and apply it as a slide background or insert it into a specific slide
    element.</st> <st c="19980">Additionally, you will incorporate AI-generated text
    as bullet points in a slide.</st> <st c="20062">By</st> <st c="20065">combining
    the power of AI image generation with ChatGPT’s text completion capabilities,
    users will be able to enrich their slides with visually appealing images and</st>
    <st c="20230">relevant text.</st>
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: <st c="20244">To begin, we will demonstrate how to create slide headers and
    bullet points using AI-generated images and text.</st> <st c="20357">To generate
    that content, you can include the following code snippet in your</st> `<st c="20434">slide_generator()</st>`
    <st c="20451">function:</st>
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: <st c="21265">In the first</st> <st c="21278">part of the code, a</st> `<st
    c="21299">prompt</st>` <st c="21305">string is</st> <st c="21316">constructed
    using a single paragraph that’s entered into the application by the user.</st>
    <st c="21402">This prompt asks the AI model to generate bullet point text for
    a PowerPoint slide.</st> <st c="21486">The prompt is then passed to the ChatGPT</st>
    `<st c="21527">create()</st>` <st c="21535">method.</st> <st c="21544">The result
    of the completion is stored in the</st> `<st c="21590">ppt</st>` <st c="21593">variable,
    and the generated bullet point text is extracted from</st> `<st c="21658">ppt.choices[0].message.content</st>`
    <st c="21688">and assigned to the</st> `<st c="21709">ppt_text</st>` <st c="21717">variable.</st>
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: <st c="21727">Similarly, in the second part of the code, another</st> `<st c="21779">prompt</st>`
    <st c="21785">string is constructed to ask the AI model to generate a title for
    a PowerPoint slide based on the same user-provided text.</st> <st c="21909">The
    text result of the completion is extracted from</st> `<st c="21961">ppt.choices[0].message.content</st>`
    <st c="21991">and assigned to the</st> `<st c="22012">ppt_header</st>` <st c="22022">variable.</st>
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: <st c="22032">This generated bullet point text and title will be used to create
    the actual PowerPoint slides.</st> <st c="22129">You can include the following
    code, adding a new slide to the PowerPoint presentation</st> <st c="22215">and
    populating it with an image, bullet</st> <st c="22254">point text, and</st> <st
    c="22271">a title:</st>
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: <st c="22697">Here are the steps for implementing a new</st> <st c="22740">PowerPoint
    slide:</st>
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: <st c="22757">First, a new slide is added to the presentation using the</st>
    `<st c="22816">add_slide()</st>` <st c="22827">method.</st> <st c="22836">The
    method takes the desired slide layout as an argument, which in this case represents
    the layout for a</st> <st c="22941">content slide.</st>
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="22955">Next, an HTTP request is made to retrieve the image from the image
    URL.</st> <st c="23028">The response is obtained, and its content is read into
    a</st> `<st c="23085">BytesIO</st>` <st c="23092">object named</st> `<st c="23106">img_bytes</st>`<st
    c="23115">. This allows the image data to be accessed and processed.</st> <st
    c="23174">To add the image to the slide, the</st> `<st c="23209">add_picture()</st>`
    <st c="23222">method is used.</st> <st c="23239">It takes the</st> `<st c="23252">img_bytes</st>`
    <st c="23261">object, along with the desired positioning parameters, as arguments.</st>
    <st c="23331">In this case, the image is positioned</st> `<st c="23369">1</st>`
    <st c="23370">inch from the left and</st> `<st c="23394">1</st>` <st c="23395">inch
    from the top of</st> <st c="23417">the slide.</st>
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="23427">A textbox is then added to the slide using the</st> `<st c="23475">slide.shapes.add_textbox()</st>`
    <st c="23501">method.</st> <st c="23510">The method takes the positioning parameters
    for the textbox as arguments.</st> <st c="23584">The text frame of the textbox
    is accessed using the</st> `<st c="23636">txBox.text_frame</st>` <st c="23652">attribute,
    and the</st> `<st c="23672">ppt_text</st>` <st c="23680">variable, which contains
    the generated bullet point text, is assigned to</st> `<st c="23754">tf.text</st>`<st
    c="23761">. This sets the content of the textbox to the</st> <st c="23807">AI-generated
    text.</st>
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="23825">Finally, the</st> <st c="23839">title shape of the slide is</st>
    <st c="23867">accessed.</st> <st c="23877">The</st> `<st c="23881">ppt_header</st>`
    <st c="23891">variable, which contains the generated title text, is assigned to</st>
    `<st c="23958">title_shape.text</st>`<st c="23974">. This sets the title of the
    slide to the</st> <st c="24016">AI-generated title.</st>
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: <st c="24035">In that way, our presentation will be populated with the desired
    content, including images, bullet point text,</st> <st c="24147">and titles.</st>
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24158">Your PowerPoint Presentation Generator application is now complete
    and ready to be tested.</st> <st c="24250">To avoid any unexpected errors, you
    can verify that your lines of code are correct by using the complete</st> `<st
    c="24355">app.py</st>` <st c="24361">file available on</st> <st c="24380">GitHub:</st>
    [<st c="24388">https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter09%20PowerPoint%20Generator/app.py</st>](https://github.com/PacktPublishing/Building-AI-Applications-with-ChatGPT-API/blob/main/Chapter09%20PowerPoint%20Generator/app.py)<st
    c="24516">.</st>
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24517">To run the application, simply execute the code or run the</st>
    `<st c="24577">app.py</st>` <st c="24583">file.</st> <st c="24590">This will launch
    the Tkinter application window, which serves as the user interface for your</st>
    <st c="24683">slide generator.</st>
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24699">Once the application is running, you will see an application window
    with a text field where you can enter the content for your slides.</st> <st c="24835">Simply
    type or paste the desired text into the text field.</st> <st c="24894">For this
    example, we used an article about jellyfish (see</st> *<st c="24952">Figure 9</st>**<st
    c="24960">.2</st>*<st c="24962">).</st>
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: <st c="24965">“</st>*<st c="24967">Jellyfish, also known as medusas or sea jellies,
    are fascinating creatures that inhabit the world’s oceans.</st> <st c="25075">They
    belong to the phylum Cnidaria and are characterized by their gelatinous bodies
    and tentacles.</st> <st c="25174">Jellyfish come in a wide variety of shapes,
    sizes, and colors, ranging from small and transparent to large and vibrant.</st>
    <st c="25294">They have a unique life cycle, starting as a polyp attached to the
    ocean floor before transforming into a</st>* *<st c="25400">free-swimming medusa.</st>*
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: '*<st c="25421">One of the most intriguing aspects of jellyfish is their ability
    to sting.</st> <st c="25497">They possess specialized cells called cnidocytes,
    which contain nematocysts that deliver venomous toxins.</st> <st c="25603">These
    stinging cells allow jellyfish to capture prey and defend themselves from potential
    predators.</st> <st c="25704">While most jellyfish stings are harmless to humans,
    some species can cause painful or even dangerous reactions.</st> <st c="25816">It
    is advisable to exercise caution when swimming in waters known to have</st>* *<st
    c="25890">jellyfish populations.</st>*'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '*<st c="25912">Jellyfish play important roles in marine ecosystems.</st> <st
    c="25966">They are opportunistic feeders, consuming small planktonic organisms,
    fish eggs, and even other jellyfish.</st> <st c="26073">As predators, they help
    maintain a balance in the marine food web.</st> <st c="26140">Additionally, jellyfish
    have a unique ability to adapt to changing</st>* *<st c="26207">environmental
    conditions.</st>*<st c="26232">”</st>'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: <st c="26234">You can</st> <st c="26242">either use the text provided</st> <st
    c="26271">or you can experiment with a text depending on</st> <st c="26318">your
    preferences:</st>
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以选择使用提供的文本，或者根据您的偏好进行实验性的文本输入。
- en: '![Figure 9.2 – Populating the PowerPoint Presentation Generator application
    with text input](img/B22414_09_02.jpg)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图9.2 – 使用文本输入填充PowerPoint演示文稿生成器应用](img/B22414_09_02.jpg)'
- en: <st c="27640">Figure 9.2 – Populating the PowerPoint Presentation Generator
    application with text input</st>
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2 – 使用文本输入填充PowerPoint演示文稿生成器应用
- en: <st c="27729">Important note</st>
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: <st c="27744">Ensure that you include a double line break between each paragraph
    to properly indicate the separation between paragraphs, allowing your application
    to accurately identify and</st> <st c="27921">distinguish them.</st>
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 确保在每段之间包含一个双行空格，以正确地表示段落之间的分隔，使您的应用能够准确地识别和区分它们。
- en: <st c="27938">Now, you can click on the</st> **<st c="27965">Create Slides</st>**
    <st c="27978">button to generate the PowerPoint slides based on the text entered.</st>
    <st c="28047">Please be patient and wait a few seconds; your presentation will
    be swiftly</st> <st c="28123">generated and saved in your project’s</st> <st c="28161">primary</st>
    <st c="28168">directory.</st>
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以通过点击**创建幻灯片**按钮来根据输入的文本生成PowerPoint幻灯片。请耐心等待几秒钟；您的演示文稿将迅速生成并保存在您项目的**主**目录中。
- en: <st c="28179">Important note</st>
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: <st c="28194">OpenAI has a rate limit that specifies the allowed number of tokens
    that can be used per minute.</st> <st c="28292">If you use the application extensively,
    you may reach the free-trial rate limit, which is currently 40,000 tokens</st>
    <st c="28406">per minute.</st>
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI有一个速率限制，指定了每分钟允许使用的令牌数量。如果您广泛使用该应用，可能会达到免费试用版的速率限制，目前为每分钟40,000个令牌。
- en: <st c="28417">Upon opening the presentation, you will be greeted with three
    slides, with each slide dedicated to a paragraph of the input text.</st> <st c="28548">These
    slides will showcase captivating AI art images created by DALL-E, accompanied
    by concise bullet points and a distinctive title for each slide (see</st> *<st
    c="28701">Figure 9</st>**<st c="28709">.3</st>*<st c="28711">):</st>
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 打开演示文稿后，您将看到三张幻灯片，每张幻灯片对应输入文本的一个段落。这些幻灯片将展示由DALL-E创建的引人入胜的AI艺术图像，配有简洁的项目符号和每张幻灯片的独特标题（见*图9*<st
    c="28701">.3</st>*<st c="28709">）：
- en: '![Figure 9.3 – Slides generated by the PowerPoint Presentation Generator app](img/B22414_09_03.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图9.3 – PowerPoint演示文稿生成器应用生成的幻灯片](img/B22414_09_03.jpg)'
- en: <st c="28754">Figure 9.3 – Slides generated by the PowerPoint Presentation Generator
    app</st>
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.3 – PowerPoint演示文稿生成器应用生成的幻灯片
- en: <st c="28828">To enhance</st> <st c="28839">the visual arrangement of elements</st>
    <st c="28875">on the slide, you have the flexibility to utilize the built-in</st>
    **<st c="28938">Designer</st>** <st c="28946">option within PowerPoint, conveniently
    located in the</st> <st c="29001">top-right corner.</st>
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 为了增强幻灯片上元素的可视布局，您可以使用PowerPoint内置的**设计器**选项，它方便地位于右上角。
- en: <st c="29018">That was the</st> <st c="29032">complete process of completing
    and</st> <st c="29067">testing the DALL-E AI presentation generator.</st> <st
    c="29113">You learned how to generate slide headers, bullet points, and AI-generated
    images.</st> <st c="29196">We covered how to construct AI prompts and retrieve
    the generated content.</st> <st c="29271">This section also outlined how to populate
    a PowerPoint presentation with generated content, including images, bullet points,</st>
    <st c="29397">and titles.</st>
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这是完成和测试DALL-E AI演示文稿生成器的完整过程。您学习了如何生成幻灯片标题、项目符号和AI生成的图像。我们介绍了如何构建AI提示并检索生成的内容。本节还概述了如何使用生成的图像、项目符号和标题填充PowerPoint演示文稿。
- en: <st c="29408">Summary</st>
  id: totrans-120
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: <st c="29416">This chapter explored the capabilities of DALL-E, an advanced
    AI model, to generate realistic, novel images based on textual descriptions.</st>
    <st c="29556">You learned how to integrate DALL-E into your applications using
    the DALL-E API.</st> <st c="29637">Additionally, we guided you in developing a
    PowerPoint Presentation Generator application using the</st> `<st c="29737">pptx</st>`
    <st c="29741">Python library and the ChatGPT API.</st> <st c="29778">We built
    the GUI using Tkinter, allowing users to generate slides with the</st> `<st c="29853">get_slides()</st>`
    <st c="29865">function, which retrieved user input and created a</st> <st c="29917">PowerPoint
    presentation.</st>
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="29416">本章探讨了DALL-E，一个高级AI模型，根据文本描述生成逼真、新颖图像的能力。</st> <st c="29556">您学习了如何使用DALL-E
    API将DALL-E集成到您的应用程序中。</st> <st c="29637">此外，我们指导您使用</st> `<st c="29737">pptx</st>`
    <st c="29741">Python库和ChatGPT API开发PowerPoint演示生成器应用程序。</st> <st c="29778">我们使用Tkinter构建了GUI，允许用户使用</st>
    `<st c="29853">get_slides()</st>` <st c="29865">函数生成幻灯片，该函数检索用户输入并创建一个</st> <st
    c="29917">PowerPoint演示文稿。</st>
- en: <st c="29941">Then, we built the</st> `<st c="29961">slide_generator()</st>`
    <st c="29978">function, which played a key role in transforming the user input
    into AI-generated slides.</st> <st c="30070">This chapter also provided instructions
    for seamlessly incorporating AI-generated images and text, such as bullet points
    and slide headers, into the PowerPoint slides.</st> <st c="30238">We tested our
    AI Presentation Generator application, enabling you to run and evaluate your enhanced</st>
    <st c="30338">PowerPoint presentations.</st>
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="29941">然后，我们构建了</st> `<st c="29961">slide_generator()</st>` <st c="29978">函数，它在将用户输入转换为AI生成的幻灯片方面发挥了关键作用。</st>
    <st c="30070">本章还提供了将AI生成的图像和文本，如项目符号和幻灯片标题，无缝集成到PowerPoint幻灯片中的说明。</st> <st c="30238">我们测试了我们的AI演示生成器应用程序，让您能够运行并评估您增强的</st>
    <st c="30338">PowerPoint演示文稿。</st>
- en: <st c="30363">In</st> [*<st c="30367">Chapter 10</st>*](B22414_10.xhtml#_idTextAnchor120)<st
    c="30377">,</st> *<st c="30379">Speech Recognition and Text-to-Speech with the
    Whisper API</st>*<st c="30437">, you will learn how to utilize the Whisper API
    for audio transcription.</st> <st c="30510">We will focus on a practical project
    that involves transcribing various file types into text to create subtitles using
    human-level robustness and accuracy in English</st> <st c="30676">speech recognition.</st>
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: <st c="30363">在第</st> [*<st c="30367">第10章</st>*](B22414_10.xhtml#_idTextAnchor120)<st
    c="30377">中，</st> *<st c="30379">使用Whisper API进行语音识别和文本到语音转换</st>*<st c="30437">，您将学习如何利用Whisper
    API进行音频转录。</st> <st c="30510">我们将专注于一个实际项目，该项目涉及将各种文件类型转录成文本，以创建使用英语人类水平鲁棒性和准确性的字幕。</st>
    <st c="30676">语音识别。</st>
