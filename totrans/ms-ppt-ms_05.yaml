- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using PowerPoint’s Document Masters for Accessible Handouts and Notes
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We previously stated that PowerPoint’s **s** **lide master** is often overlooked
    by users, but I must say that the **handout master** and the **notes master**
    are features that are unknown to many users. This is unfortunate because most
    of the time, they allow users to make their PowerPoint files work harder in much
    less time than having to create separate files for their presentation and document
    needs.
  prefs: []
  type: TYPE_NORMAL
- en: PowerPoint’s two document masters work in a similar way to the slide master.
    They allow you to determine the overall look of documents you might want to produce
    for your audience, so you are on brand while avoiding the obligation to create
    Word documents. You should consider creating a document for participants instead
    of filling your slides with text as discussed in [*Chapter 2*](Chapter_02.xhtml#_idTextAnchor130)
    , in the *Decluttering your slide contents* section.
  prefs: []
  type: TYPE_NORMAL
- en: Again, our goal is to help you format the handout master and notes master so
    you can quickly produce documents from your presentation file. This means there
    will be no need to create multiple files before your next presentation. Your PowerPoint
    file will be configured so you can deliver your talk and see your presentation
    notes, use a formatted handout master to create a simple document with slide images
    and lines to take notes, and create a more elaborate document that includes a
    slide image and text for your audience with the notes master.
  prefs: []
  type: TYPE_NORMAL
- en: 'In both cases, you will be able to easily print the documents or export them
    as a `.pdf` file. So, in this chapter, we will discuss the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the handout master for a simple document
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configuring the notes master for a complete handout
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Making your presentations accessible
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Printing your documents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exporting your document as a `.pdf` fil e
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: PowerPoint’s document masters can be found in all versions of the application.
    The topics discussed in this chapter can be applied to all desktop versions of
    PowerPoint, although you might encounter some differences if you are not using
    PowerPoint in its **Microsoft 365 (M365)** subscription model .
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the handout master for a simple document
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The handout master allo ws you to create a branded look for your simple document
    needs. Although many users don’t know about that specific master, many have used
    its view when printing handouts that have six slide thumbnails per page for their
    audience. Let’s see how you can format it so your printouts or `.pdf` files will
    be branded, and your audience sees your company information on each page.
  prefs: []
  type: TYPE_NORMAL
- en: 'To access the handout master, you need to use the **View** tab ( **1** ) and
    choose **Handout Master** ( **2** ) ( *Figure 4.1* ) :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.1 – Accessing the handout master](img/B32063_04_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.1 – Accessing the handout master
  prefs: []
  type: TYPE_NORMAL
- en: Whenever you are unsure about what a button will do, take time to read the tooltip
    provided each time you hover over one so you will get a brief description, such
    as the one provided in *Figure 4.1* for the **Handout Master** view.
  prefs: []
  type: TYPE_NORMAL
- en: 'You then get the **Handout Master** view tab where you will be able to make
    all the necessary formatting changes ( *Figure 4.2* ) :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.2 – Handout Master page settings](img/B32063_04_02.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.2 – Handout Master page settings
  prefs: []
  type: TYPE_NORMAL
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)
    ** Quick tip ** : Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![img](img/2.png) ** The next-gen Packt Reader ** is included for free with
    the purchase of this book. Scan the QR code OR go to [ https://packtpub.com/unlock
    ](https://packtpub.com/unlock) , then use the search bar to find this book by
    name. Double-check the edition shown to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s start by d iscussing the first three buttons on the ribbon:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Handout Orientation** : You can decide to format your handout so that the
    content is displayed in portrait or landscape orientation. You need to keep in
    mind that if you change page orientation in the handout master, it will also apply
    in the notes master, which we will discuss in the next section.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Slide Size** : Although this option shows in your **Handout Master** view,
    be aware that if you change it here, it will also change the size of your slides
    in your presentation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you are still wondering whether you should consider using the standard 4:3
    slide size that was the default in older PowerPoint versions, I would say that
    you simply need to evaluate where your presentation will be displayed most of
    the time. In most in-person and virtual settings, your audience will be watching
    your presentation on devices that usually show content with the modern widescreen
    16:9 aspect ratio. The widescreen format also has the advantage of giving more
    space for your content, helping you create better visuals that have enough empty
    spaces between components on slides.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Slides Per Page** : This option lets you choose how many slide thumbnails
    you want to display on your page. As you can see in *Figure 4.2* , there are more
    display options than the famous **6 Slides** per page one. The trick is to choose
    the one that suits your needs *before* you do anything else. The reason is quite
    simple: changing the number of slides per page does not create different branded
    layouts. You will need to manually adapt any extra graphic elements that were
    added according to the display you choose. Whatever the layout you choose, the
    slide thumbnail areas cannot be moved or resized—they show as rectangles with
    a dotted-line border.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'After changing any page settings, you can decide whether you want to keep or
    remove any placeholders from the page and configure any of the options in the
    **Background** group ( *Figure 4.3* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.3 – Handout Master layout and background settings](img/B32063_04_03.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.3 – Handout Master layout and background settings
  prefs: []
  type: TYPE_NORMAL
- en: '**Placeholders** : This group allows you to remove or add any of the placeholders.
    If you deleted one of them directly on the **Handout Master** page, you could
    simply add it back by checking the corresponding checkbox. All four placeholders
    can be moved or resized, and the text formatted. We will see how to include header
    and footer content later in this section.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The **Background** group: This is where you can choose your color palette and
    fonts to be aligned with your choices in the presentation. Unfortunately, even
    if you created and applied a custom color palette or font pair in your slide master,
    it will not be applied automatically in the handout master, but you can easily
    apply them from both lists. If you do not remember how to create custom colors
    or font pairs, have another look at [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206)
    .'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now that we have covered the basics of the handout layouts, we will see in the
    next two sections how to add graphic elements to help you give a corporate look
    to your handout and properly add any header and footer to your document.
  prefs: []
  type: TYPE_NORMAL
- en: Adding graphic elements to your handout master
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From the handout master, you can add any graphi c element you want after selecting
    the number of slides displayed on a page. Explore what is available in your **Insert**
    tab and be creative! You can reproduce any look you usually have in your organization’s
    Word documents if you want.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a fictitious example of what your handout master could look like (
    *Figure 4.4* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.4 – Example of a formatted handout master](img/B32063_04_04.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.4 – Example of a formatted handout master
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the steps that we followed to add graphics to the handout master in
    *Figure 4.4* :'
  prefs: []
  type: TYPE_NORMAL
- en: We have first selected the **4 Slides** per page layout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then, we changed the font size and color of the header and resized the placeholder
    to cover most of the width of the page. We also added a colored rectangle and
    used the **Send to Back** feature available either in the **Home** or **Shape
    Format** tabs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We added horizontal lines under each thumbnail to accommodate notes. If you
    decide to draw the lines, a productivity tip to draw them is to create the first
    four lines, then select them all, press the *Ctrl* + *Shift* keyboard keys, then
    click and drag them to the right to create the second set of lines. Now select
    both sets of lines and again press the shortcut keys while dragging toward the
    bottom of the page. You could also insert a table and remove the lines on the
    left and on the right, so it looks like the manually drawn lines.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We then added a Microsoft stock illustration. For that, go to the **Insert**
    tab on the ribbon, then click on the **Pictures** button and select **Stock Images...**
    . In the stock library window, you have several tabs to choose from at the top.
    In our example, we navigated to the **Illustrations** tab. This illustration could
    easily be replaced by any company logo or any visual relevant to your content.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, t he date placehold er was moved to the bottom of the page and formatted.
    Don’t forget to close the Handout Master view when you are done .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adding your header and footer content
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Just like in the slide master, you should not add your content in the master
    view. To properly add your handout’s header and footer information, you need to
    go to the **Insert** tab | **Header & Footer** | **Notes and Handouts** options
    ( *Figure 4.5* ).
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.5 – Inserting header and footer information in your handout](img/B32063_04_05.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.5 – Inserting header and footer information in your handout
  prefs: []
  type: TYPE_NORMAL
- en: You can then decide to add a date that will be updated automatically or fixed.
    The **Page number** checkbox is checked by default, a good choice since we are
    creating a document, not slides.
  prefs: []
  type: TYPE_NORMAL
- en: In our example, we also added content in the header and footer placeholders
    that were already represented in their exact place in **Preview** . The only thing
    left to do was to click on the **Apply to All** button so all our pages would
    be displayed in the same way.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, creating a professional-looking handout does not need to take
    a very long time. You only need to choose elements that represent your content
    well while being aligned w ith your corporate look or branding guidelines. However,
    if you need to create a document that has more than just picture thumbnails of
    your slides, the next section on the notes master will be valuable to yo u.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the notes master for a complete handout
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The notes master all ows you to create a branded look for documents that need
    an image of the slide and notes beneath it. The notes are captured from the notes
    pane beneath each slide in the **Normal** view. Most of the time, notes are used
    for the presenter, but that does not mean they cannot be used for your audience.
    There are some workarounds that allow you to create a file that can contain notes
    for the presenter and notes for the handout, but let’s start by going through
    the changes you should make in the notes master.
  prefs: []
  type: TYPE_NORMAL
- en: 'To access the notes master, you need to use the **View** tab and choose **Notes
    Master** ( *Figure 4.6* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.6 – Accessing Notes Master](img/B32063_04_06.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.6 – Accessing Notes Master
  prefs: []
  type: TYPE_NORMAL
- en: 'You then get the **Notes Master** view, from which you will be able to make
    all the necess ary changes to customize your document’s look ( *Figure 4.7* )
    :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.7 – Notes Master view](img/B32063_04_07.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.7 – Notes Master view
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the functions in the **Notes Master** view that will help you customize
    your document:'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Page Setup** group, you can change **Notes Page Orientation** or **Slide
    Size** just like in the handout master ( **1** ). If you change the page orientation,
    keep in mind that it will also change the orientation for your handout and will
    probably significantly change the look of it if you had added any graphic elements.
    It’s the same for the slide size: changing this setting will change the size of
    your whole presentation and it’s probably not what you want.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Placeholders** group looks like the one in the handout master, although
    we now have a checkbox for **Slide Image** and one for **Body** ( **2** ). As
    you can see, besides the arrows in *Figure 4.7* , those two placeholders take
    up most of the space on the page. The advantage is that they can be moved and
    resized, helping us create a custom look for our documents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One thing you will notice when in the **Background** group ( **3** ) is that
    even if you have chosen **Colors** and **Fonts** options in the handout master,
    you will need to do it again in this view. Just select any custom color palette
    and font pair you created already to apply them to your notes master.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we have covered how to access the notes master and its functions and
    layout, we can proceed to learn how you can customize i t.
  prefs: []
  type: TYPE_NORMAL
- en: Customizing your notes master
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All placehold ers in the **Notes Master** view can be moved, resized, and formatted.
    You just need to select them and make changes with any available formatting tools,
    whether in the **Home** tab or the **Shape Format** contextual tab that becomes
    available when you click on a placeholder. Unfortunately, even if you have customized
    your handout master already, you will need to start over in the notes master.
    If having the exact same look for both masters is not important for you, just
    go ahead and make all the necessary changes. If it is and you want to save time,
    keep reading.
  prefs: []
  type: TYPE_NORMAL
- en: Have another look at the formatted handout master in *Figure 4.4* . You can
    see we have increased the width of our header, added a colored rectangle under
    it, moved the date to the bottom, and changed the font formatting in all placeholders.
    Nothing was kept in the **Notes Master** view, except the header and footer information—if
    you forgot how to add header and footer information, go back to *Figure 4.5* .
  prefs: []
  type: TYPE_NORMAL
- en: 'Since the first edition of this book, I am happy to report that we can save
    some time by copying graphic elements and formatted placeholders from the **Handout
    Master** view and pasting them to the **Notes Master** view. Here are the steps
    you can follow ( *Figure 4.8* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.8 – Copying and pasting elements from Handout Master to Notes Master](img/B32063_04_08.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.8 – Copying and pasting elements from Handout Master to Notes Master
  prefs: []
  type: TYPE_NORMAL
- en: Open the **Handout Master** view, select graphic elements and formatted placeholders,
    copy them, and close the view. ( **1** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Open the **Notes Master** view, delete existing header and footer placeholders,
    and paste what was copied from the handout ( **2** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make the necessary adjustments to the Slide Image and Body placeholders in terms
    of position and size, and make sure the pasted graphic elements are also sized
    and layered properly ( **3** ).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be aware that if the placeholders are deleted and you add them back by ticking
    the boxes available in the **Placeholders** group in the **Notes Master** view
    (see *Figure 4.7* ), they are added back with the default formatting, not the
    customized one.
  prefs: []
  type: TYPE_NORMAL
- en: If your handout master formatting is intact, you can always copy and paste from
    there to avoid formatting everything manually.
  prefs: []
  type: TYPE_NORMAL
- en: The only thing left to do is to adjust the font size for the body placeholder
    according to your needs. If you are producing a document for your audience, a
    12-point font size is usually easy to read by everyone and makes it easier to
    fit all the text that supports the sli de.
  prefs: []
  type: TYPE_NORMAL
- en: Adapting your presentation file for a handout and delivery notes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There may come a time when you need to have your own presentation notes and
    create a complete handout for your audience or participants. Some might be tempted
    to make a copy of their PowerPoint file, so they have one for the delivery and
    one for the document. It does work, but if you know you’ll need to update the
    content often, it can become a hugely time-consuming task. Instead, you might
    want to consider trying these two hacks we use from time to time.
  prefs: []
  type: TYPE_NORMAL
- en: Making copies of your slides in a new section
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first hack simply requires making copies of your presentation slides in
    a new section that you label as `Handout` and making sure the section is the first
    one in your presentation deck. When you select those *Handout* slides, you can
    then print the selection or create a `.pdf` file that will have page numbers starting
    at *#1* . If you hide the slides in that section, you will start your slideshow
    directly from the first slide in your **Presentation** section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the steps to accomplish this:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Add a section before your slides; right-click just before your first slide
    and click **Add Section** . Then, give it a name; you could use `Handout` . Click
    **Rename** to confirm the change ( *Figure 4 .9* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.9 – Adding and naming a section in your PowerPoint file](img/B32063_04_09.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.9 – Adding and naming a section in your PowerPoint file
  prefs: []
  type: TYPE_NORMAL
- en: Creating a section also has the advantage of helping you select all your presentation
    slides simply by clicking the **Handout** section name. You can now copy ( *Ctrl
    + C* ) the slides and paste them ( *Ctrl + V* ) directly after the section in
    the slide navigation pane. You then get a section with the same name; right-click
    it to be able to select **Rename Section** ( *Figure 4.10* ).
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see, this menu offers you many other options to help you manage
    your sections, and getting familiar with them will help you improve your efficie
    ncy:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.10 – Renaming a section and other options](img/B32063_04_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.10 – Renaming a section and other options
  prefs: []
  type: TYPE_NORMAL
- en: You are now ready to add notes for your audience for the slides in the first
    section, and your own notes for the slides in the **Presentation** section. You
    can also remove any slides you don’t want in the handout. The advantage of this
    is having only one file to manage and being able to easily adjust the content
    of any slides with a simple copy/paste between sections.
  prefs: []
  type: TYPE_NORMAL
- en: When you want to deliver your presentation, make sure to use the **Hide Slide**
    command for your handout section so they don’t show during your slideshow.
  prefs: []
  type: TYPE_NORMAL
- en: '**Important note**'
  prefs: []
  type: TYPE_NORMAL
- en: When using this trick, you should avoid showing slide numbers during your delivery
    because the numbering will start with the slide number following the hidden slides.
    If you are wondering how you will keep track of your slides during delivery, you
    can read [*Chapter 13*](Chapter_13.xhtml#_idTextAnchor1296) . This feature will
    help you keep track of your delivery without having slide numbers.
  prefs: []
  type: TYPE_NORMAL
- en: This method is easy to reproduce and easy to handle for anyone that might have
    to work on the file. However, if you are the only one using the file and are now
    more familiar with the various masters, you could try the next hack.
  prefs: []
  type: TYPE_NORMAL
- en: Hacking the notes master to produce presenter and audience notes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Whe n you are in the **Notes Master** view, the **Slide Image** placeholder
    is automatically populated from your slides, and the **Body** placeholder from
    the notes you add beneath your slides when you are in the **Normal** view. If
    you need space for your notes while you are presenting, and information for your
    audience when you print or create a `.pdf` file, you need to trick PowerPoint
    to do it.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll use the following steps to do that:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Open the **Notes Master** view and move the **Body** placeholder to the left
    or the right of the canvas, in the gray area ( *Figure 4.11* ), then close the
    **Notes Master** view:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 4.11 – Moving the Body placeholder outside the Notes Master](img/B32063_04_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.11 – Moving the Body placeholder outside the Notes Master
  prefs: []
  type: TYPE_NORMAL
- en: 'You could start entering your personal notes in the **Notes** pane under your
    slides when in the **Normal** view, but you can simply change to the **Notes Page**
    view by going to the **View** tab and clicking on **Notes Page** in the **Presentation
    Views** group ( *Figure 4.12* ). You will see the **Body** placeholder from the
    Notes Master with either your own notes or the **Click to add text** prompt, over
    the gray area. You now have a blank space under the slide image on the page to
    add your handout text. If you use a **text box** , it will resize according to
    the text you include in it. If you draw a shape, you can then define the exact
    size and position and remove the fill and outline, aligning the text in the upper-left
    corner of the shape. If you want to provide lines for people to take their own
    notes, you can add a simple one-column table with no left and right bor ders:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 4.12 – Customizing your document in the Notes Page view](img/B32063_04_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.12 – Customizing your document in the Notes Page view
  prefs: []
  type: TYPE_NORMAL
- en: The design you create on one page in the **Notes Page** view wil l need to be
    copied and pasted on all other pages, or you can create a variety of layouts depending
    on the information you need to include under each slide image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'As you can see, you can easily create one presentation file that will serve
    the double purpose of being a visual tool for your delivery and a complete handout
    for your audience. If you want to see what it will look like, *Figure 4.13* shows
    the **Notes Page** view, **Presenter View** in the slideshow, and **Print Preview**
    of a slide that has been adapted to various uses:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.13 – Notes Master hack results](img/B32063_04_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.13 – Notes Master hack results
  prefs: []
  type: TYPE_NORMAL
- en: If you are wondering what **Presenter View** is and how to use it, it will be
    covered in [*Chapter 13*](Chapter_13.xhtml#_idTextAnchor1296) .
  prefs: []
  type: TYPE_NORMAL
- en: Using the handout and notes masters helps you create accessible documents, but
    th ere is also a feature in PowerPoint that helps you verify accessibility problems
    for your slides, which we will briefly cover in the next se ction.
  prefs: []
  type: TYPE_NORMAL
- en: Making your presentations accessible
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Making doc uments and presentations more accessible is making sure users with
    a disability can access your content with the various devices they can use, such
    as **screen readers** . Whether your country has laws or official guidelines or
    not, there is no reason to shy away from making your documents and presentations
    accessible because Microsoft has included a great feature to help you do it: **Accessibility
    Check er** . This feature was made available as far back as **Office 2010** ,
    although it was less user-friendly at the time. If you are using any of the modern
    supported versions (Office 2021 and 2024, or Office for M365), you will get a
    much nicer interface that helps you track where the accessibility problems are
    and how to solve them. Take note that the following screen captures were done
    in PowerPoint for M365 – other versions might not look the same or have the same
    features.'
  prefs: []
  type: TYPE_NORMAL
- en: Since the first edition of this book, I must say that Microsoft has added a
    much-improved experience to help anyone without any prior accessibility knowledge
    do a better job creating accessible presentations. It will help you correct issues
    that impact people using screen readers or those with low vision or colorblindness.
  prefs: []
  type: TYPE_NORMAL
- en: 'To display the **Accessibility Assistant** pane in your presentation, you can
    click on **Accessibility** in the status bar ( **1** ) to open the pane and its
    contextual tab ( **2** ) ( *Figure 4.14* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.14 – The Accessibility pane and its contextual tab in PowerPoint](img/B32063_04_14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.14 – The Accessibility pane and its contextual tab in PowerPoint
  prefs: []
  type: TYPE_NORMAL
- en: You can also show it by clicking the **Review** tab and then the **Check Accessibility**
    button. But there is a new feature, still in preview at the time this edition
    was written, that allows you to click the **Accessibility** icon beside any slide
    thumbnail to view what needs attention on that specific slide ( **3** ) ( *Figure
    4.14* ).
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s have a look at the improved **Accessibility Assistant** pane that will
    help you correct issues in your presentation. The top and bottom parts of the
    pane are displayed side-by-side in *Figure 4.15* :'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.15 – The Accessibility pane and its category of issues in PowerPoint](img/B32063_04_15.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.15 – The Accessibility pane and its category of issues in PowerPoint
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a short description of each category:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Show only issues on current slide** toggle: It allows you to see the list
    of issues for the selected slide. It will be turned **On** automatically if you
    have displayed the pane by clicking the Accessibility icon beside a slide thumbnail.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Color and contrast** : It will highlight issues when your text is hard to
    read but it is not completely reliable. A check mark means no issues were found.
    At the time this edition was written, text in some placeholders had contrast issues
    that were not picked up by the **Accessibility Checker** . Beware of contrast
    issues in the **Title** , **Content** , **Chart** , and **Text** placeholders.
    It will not work properly if you have text boxes over colored shapes – text must
    be added to the shape itself.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Media and Illustrations** : It will warn you about missing **alt text** for
    your visual objects and for missing audio or video **subtitles** .'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Tables** : The assistant will warn you if a table in your presentation file
    does not have a header row or has merged or split cells.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Document Structure** : This category is to ensure an easy-to-understand reading
    experience with **screen readers** . Slide titles and sections are read out loud.
    Just imagine how confusing it would be if a screen reader repeated the same title
    throughout a section, or if objects on your slide are not read in the right order!'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Document Access** : It verifies if your file has any **Information Right
    Management** ( **IRM** ) or other restrictions that are problematic for screen
    readers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Give Feedback, Learn about accessibility, Settings** : The last three links
    in the **Accessibility Assistant** pane are tools to give Microsoft feedback about
    PowerPoint (e.g. reporting a feature not working as expected), to access the **Help**
    pane to learn more about accessibility, and to access accessibility settings in
    **PowerPoint Options** – this is where you can activate the **Accessibility**
    icon beside slide thumbnails.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Numbers of issues or check mark** : If a check mark is displayed beside potential
    issues, it means there are no issues. A number indicates instances of the issues
    in your presentation or on a specific slide. When you click on the issue type
    it will display potential solutions and how to resolve the issue.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If you start by concentrating on the **Accessibility Assistant** pane, you
    will realize that most of the suggested solutions are tools you will also find
    in the **Accessibility** contextual tab. There is one tool I want to point out:
    **Inspect without Color** ( *Figure 4.16* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.16 – The Inspect without Color feature in the Accessibility tab](img/B32063_04_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.16 – The Inspect without Color feature in the Accessibility tab
  prefs: []
  type: TYPE_NORMAL
- en: This feature allows you to check if you rely solely on color to convey information
    by showing your slides in grayscale. As an example, if you decided to categorize
    shapes on a slide by using only different colors, you would realize it becomes
    difficult to understand if color is not perceived. A common way to improve accessibility
    would be to use different shapes and an associated color.
  prefs: []
  type: TYPE_NORMAL
- en: I encourage you to visit the Microsoft Support site articles shared in the *Further
    reading* section to learn more about accessibility features that need to be considered
    in various document types.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on to how you can print the documents after you have configured your
    masters and checked for accessibility issues.
  prefs: []
  type: TYPE_NORMAL
- en: Printing your documents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You m ight be wondering why I would cover how to print documents, especially
    since most users have been doing so for a very long time. Even though everyone
    knows how they can print from the **File | Print** options, or *Ctrl + P* , many
    have overlooked some nice features hidden in PowerPoint’s printing options that
    you should know about. Those are the ones I will cover in this section.
  prefs: []
  type: TYPE_NORMAL
- en: 'When you are in the **Print** options view ( *Figure 4.17* ), you can change
    so much more than the number of copies and the printer prop erties:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.17 – PowerPoint’s Print options view](img/B32063_04_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.17 – PowerPoint’s Print options view
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s review important settings that you might have missed over the years:'
  prefs: []
  type: TYPE_NORMAL
- en: Selecting what you need to print might be something you are aware of already,
    but when we look at the bottom part of that drop-down list, we have two hidden
    gems ( **1** ). The first one is the possibility to print specific **sections**
    in your presentation. If you have put in place the previous strategy of making
    a copy of all your slides in a separate section to produce your handout, you can
    easily print only that section, with this setting. If you have decided to hide
    some slides but want them in a printout, the **Print Hidden Slides** command will
    be active, so you can decide if you want to include them. If custom shows have
    been created in the file, a specific section will allow you to print those too.
    You can learn more about custom shows in [*Chapter 10*](Chapter_10.xhtml#_idTextAnchor1003)
    .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the slide range field ( **2** ), remember that you can select specific slides
    or a slide range. For example, if you want to print slides 2, 4, and 6, you will
    enter `2;4;6` in the field. For a range of slides, such as 2 to 6, you will enter
    `2-6` .
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can choose your printing layout, selecting between **Full Page Slides**
    and **Notes Pages** or selecting one of the **Handouts** layouts ( **3** ). Don’t
    forget to have a look at the options at the bottom of that list for any element
    you want to include and for settings that you want to use for your printed document.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Changing your document orientation between **Portrait** and **Landscape** is
    straightforward ( **4** ). However, you need to keep in mind that if you change
    your document orientation here, it changes the orientation of the handout and
    notes masters too. If you have included any images or illustrations on your master,
    changing the document orientation will inevitably distort them in the process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A word on **Grayscale** ( **5** ): If you are printing on a monochrome printer
    (black and white), you will get better results using grayscale, but it also means
    you should review what your text contrast looks like in the preview. When we look
    at **6** in *Figure 4.17* , we can see the title is hardly visible. And looking
    at **7** , we do see an outline to the shape used for the notes document. If this
    happens, follow the steps given in *Figure 4.18* .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I encourage you to explore your **Print** settings more closely to make sure
    you are producing the best-quality documents you can get.
  prefs: []
  type: TYPE_NORMAL
- en: Troubleshooting text contrast in grayscale
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I mentioned the possibility of text color contrast problems when printing in
    grayscale. Sometimes the titles are shown in a dark color on a dark background,
    or text in placeholders or text boxes cannot be read, and shapes can have a darker
    border than expected. The following sections will show you how you can solve those
    problems.
  prefs: []
  type: TYPE_NORMAL
- en: Problems when printing handouts or notes documents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Text contrast problems in handouts and notes documents usually come from the
    document masters. This is because the slides shown on the page are images of the
    slides in grayscale. We’ll fix this problem, as shown in this screenshot ( *Fig
    ure 4.18* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.18 – Changing settings in Grayscale to correct printing problems](img/B32063_04_18.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.18 – Changing settings in Grayscale to correct printing problems
  prefs: []
  type: TYPE_NORMAL
- en: 'To correct the problem, you need to go through these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Make sure you are in the **Notes Page** view or open the document master view
    ( **Notes Master** or **Handout Master** ). Then click on **Grayscale** .
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The **Grayscale** tab becomes active. Select the object with poor contrast and
    change its color with one of the commands on the ribbon. In our example, **White**
    produces the best results. As you can see in the tooltip, it only adjusts colors
    when printing in black and white.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you have an object showing an outline that should not be visible, select
    it and click on the **Don’t Show** command.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Back To Color View** to close the **Grayscale** tab.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you were in a document master view, close it, and then go back to printing.
    All the text elements you fixed will now show appropriate contrast with no outlines
    in the print preview.
  prefs: []
  type: TYPE_NORMAL
- en: Problems when printing slides
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you need to print full-page slides, I recommend that you review the print
    preview for all your slides. Depending on how the content was created, you might
    run into text contrast problems when printing in grayscale. If you stumble on
    any slides that do have text contrast problems, get out of the printing view,
    and repeat the two steps described earlier to access the **Grayscale** view. You
    will then be able to see objects that need color adjustments for printing purposes.
  prefs: []
  type: TYPE_NORMAL
- en: You now have a better overview of what printing options you can adjust to get
    the best-quality documents. Many people have stopped printing documents either
    for environmental reasons or because they send digital copies. The next section
    will help you with the various PDF export settings available within PowerPoint.
  prefs: []
  type: TYPE_NORMAL
- en: Exporting your document as a .pdf file
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The PDF export feature has been available for many years within Office applications,
    but many users are unaware of how these settings can help them produce various
    types of PDF documents.
  prefs: []
  type: TYPE_NORMAL
- en: 'To create a PDF document, you need to go to the backstage view using the **File**
    tab. From there, you can use **Save a Copy** if your file is saved in cloud storage
    or **Save as** if it’s a local file. My preferred method is the **Export** function
    ( *F igure 4.19* ):'
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure 4.19 – Creating a PDF from a PowerPo\uFEFFint \uFEFFfile](img/B32063_04_19.png)"
  prefs: []
  type: TYPE_IMG
- en: Figure 4.19 – Creating a PDF from a PowerPo int file
  prefs: []
  type: TYPE_NORMAL
- en: You can use the **Save a Copy** command and select **PDF** in the file type
    drop-down list.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There is also the possibility to use the **Export** command, then the **Create
    PDF/XPS Document** option.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In both cases, you might see an **Investigate Accessibility** button if any
    elements are missing to create an accessible PDF.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When you click on the **Save** button while in the **Save a Copy** section,
    it automatically creates the `.pdf` file in the same folder as your PowerPoint
    file assuming you have not changed the destination. That may seem like a quick
    and efficient way to do it, but it will automatically create a document with full-page
    slides. To be able to change the document format, you need to click on the **More
    options...** link below the file format.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Clicking on the **Create PDF/XPS** button when in the **Export** section will
    give you much more flexibility with one click of the mouse.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'After going through the previous steps, you will get the **Publish as PDF or
    XPS** window, which will give you access to extra publishing options with the
    **Options** button ( *F igure 4.20* ):'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.20 – PDF publishing options](img/B32063_04_20.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.20 – PDF publishing options
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s g o thr ough the list of options you have available to suit your needs:'
  prefs: []
  type: TYPE_NORMAL
- en: In the **Range** section, you can decide which slides you want to have in your
    `.pdf` file. If you created any **custom shows** in your file, you could also
    select one to create a specific `.pdf` file.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first element you can configure in **Publish options** is whether you want
    to create a `.pdf` file of your **Slides** , **Handouts** , or **Notes pages**
    . When choosing **Handouts** , the grayed-out options will become active, allowing
    you to choose the number of slides per page and the order in which they will be
    printed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The following four checkboxes give you the option to print some specific elements,
    such as any hidden slides, comments, or ink notes you added.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The **Include non-printing information** section usually has the options selected
    by default. You should leave it as is to ensure people can track how the `.pdf`
    file was created in the properties and make your document accessible to screen
    readers with the structure tags.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **PDF options** section, the first option should be added to make sure
    your `.pdf` file will remain readable in the future, whatever the application
    used or its version – it should be selected by default in more recent versions.
    The second option is selected by default to make sure any fonts you have used
    will display properly even when they can’t be embedded.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When you have verified all the options, the only thing left to do is click on
    the **Publish** button.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you used a variable font type in your presentation file, you could encounter
    font-rendering issues when saving your file as a PDF. As mentioned in [*Chapter
    2*](Chapter_02.xhtml#_idTextAnchor130) , the best resource to help you understand
    potential font issues is Julie Terberg’s whitepaper on choosing fonts. Look in
    the *Further reading* section for the link to her PDF.
  prefs: []
  type: TYPE_NORMAL
- en: Y ou now have a clearer understanding of how to create better documents from
    your presentation file and how to make your content more accessible. In [*Chapter
    5*](Chapter_05.xhtml#_idTextAnchor491) , we will learn how to start a presentation
    with the help of Copi lot for M365.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we discussed PowerPoint’s document masters to help you create
    handouts and notes from your main presentation file, and how to print them and
    create PDF documents. You now have enough knowledge to be able to leverage those
    masters so you can create professional-looking documents and visual slides for
    your delivery.
  prefs: []
  type: TYPE_NORMAL
- en: 'I will repeat myself from the previous chapter on the slide master: even if
    you think it will take you too much time, I can guarantee you that it is worth
    it. Taking some time to format your document masters properly will save you time
    in the long run. Having everything you need in one properly formatted file will
    also save you the headache of having to manage separate files.'
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, you will be learning about Microsoft 365 Copilot and what
    it can do in PowerPoint. We will discuss the basics for good prompts, an essential
    skill if you want AI to produce more relevant content and start creating content
    with the help of Copilot. Leveraging AI is a *smart start* to speed the presentation
    creation process, but we will also discuss its limitations in terms of design
    be st practices.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Additional information on the Accessibility Checker: [https://support.microsoft.com/en-us/office/improve-accessibility-with-the-accessibility-checker-a16f6de0-2f39-4a2b-8bd8-5ad801426c7f](https://support.microsoft.com/en-us/office/improve-accessibility-with-the-accessibility-checker-a16f6de0-2f39-4a2b-8bd8-5ad801426c7f)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additional information on the Accessibility Assistant: [https://support.microsoft.com/en-us/topic/improve-accessibility-in-your-documents-with-the-accessibility-assistant-f01562ca-0119-40ad-8dd6-f6223df50bef](https://support.microsoft.com/en-us/topic/improve-accessibility-in-your-documents-with-the-accessibility-assistant-f01562ca-0119-40ad-8dd6-f6223df50bef)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Information on how to write alternative text: [https://support.microsoft.com/en-us/office/everything-you-need-to-know-to-write-effective-alt-text-df98f884-ca3d-456c-807b-1a1fa82f5dc2](https://support.microsoft.com/en-us/office/everything-you-need-to-know-to-write-effective-alt-text-df98f884-ca3d-456c-807b-1a1fa82f5dc2)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additional information on making your content accessible to everyone: [https://support.microsoft.com/en-us/office/make-your-content-accessible-to-everyone-ecab0fcf-d143-4fe8-a2ff-6cd596bddc6d](https://support.microsoft.com/en-us/office/make-your-content-accessible-to-everyone-ecab0fcf-d143-4fe8-a2ff-6cd596bddc6d)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Julie Terberg’s whitepaper on choosing fonts in PDF format: [https://designtopresent.com/2024/07/31/choosing-fonts-for-powerpoint-templates-august-2024/](https://designtopresent.com/2024/07/31/choosing-fonts-for-powerpoint-templates-august-2024/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
