  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于如何使您的内容对每个人可访问的附加信息：[https://support.microsoft.com/en-us/office/make-your-content-accessible-to-everyone-ecab0fcf-d143-4fe8-a2ff-6cd596bddc6d](https://support.microsoft.com/en-us/office/make-your-content-accessible-to-everyone-ecab0fcf-d143-4fe8-a2ff-6cd596bddc6d)
- en: 'Julie Terberg’s whitepaper on choosing fonts in PDF format: [https://designtopresent.com/2024/07/31/choosing-fonts-for-powerpoint-templates-august-2024/](https://designtopresent.com/2024/07/31/choosing-fonts-for-powerpoint-templates-august-2024/)'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 朱莉·特伯格关于在PDF格式中选择字体的白皮书：[https://designtopresent.com/2024/07/31/choosing-fonts-for-powerpoint-templates-august-2024/](https://designtopresent.com/2024/07/31/choosing-fonts-for-powerpoint-templates-august-2024/)
