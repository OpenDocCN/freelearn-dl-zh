- en: '6'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Applications of LLMs in Education and Law
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In today’s rapidly evolving technological landscape, **artificial intelligence**
    (**AI**) and **machine learning** (**ML**) have made significant advancements,
    opening new possibilities in various fields. **Large language models** (**LLMs**),
    in particular, have gained considerable attention for their ability to process
    and generate human-like text, making them valuable tools for education, legal
    research, document review, and more.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will explore the wide range of applications where LLMs can
    be harnessed to enhance educational experiences, support legal professionals,
    and streamline various tasks. We will delve into the realm of education, where
    LLMs can assist in crafting course materials, developing handouts and quizzes,
    and even assessing student comprehension. Furthermore, we will explore applications
    in the legal domain, where LLMs can aid in legal research, document drafting,
    and IP management, revolutionizing how legal professionals handle their workloads
    and enhancing their efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: By talking about education, we’ll discover how educators can leverage LLMs to
    rapidly generate curriculum materials, assessments, interactive practice questions,
    and feedback tailored to learning objectives. Through examples, we will uncover
    techniques for AI-assisted creation of quizzes, prompts, rubrics, and other content
    that engages students.
  prefs: []
  type: TYPE_NORMAL
- en: Then, we will traverse into the legal realm, where emerging AI applications
    are transforming research, discovery, drafting, compliance, risk analysis, and
    more. You will see how attorneys can use LLMs to quickly digest volumes of case
    law, analyze contracts, predict litigation outcomes, and automate document creation.
    We will also discuss the implications of increasingly capable AI for legal training
    and education.
  prefs: []
  type: TYPE_NORMAL
- en: However, while showcasing the tremendous potential of LLMs in education and
    law, we will emphasize the importance of human oversight. Educators and legal
    professionals must engineer prompts strategically, validate results, and make
    necessary adjustments. AI should augment human expertise, not replace it. When
    thoughtfully implemented, LLMs have the power to free professionals from repetitive
    tasks so that they can focus on higher-order reasoning and judgment.
  prefs: []
  type: TYPE_NORMAL
- en: 'The topics we’ll cover in this chapter are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Creating course materials with ChatGPT (unit outline, lesson plans, discussion
    questions)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating handouts and other materials (instructions, solved examples, word problems)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating quizzes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating rubrics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating cloze comprehension tests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI for legal research
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reviewing legal documents using an LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Drafting legal documents with an LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI for legal education and training
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LLMs for eDiscovery and litigation support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI for **intellectual property** (**IP**) management
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating course materials with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When it comes to designing and developing course materials, LLMs offer a valuable
    resource for educators. With their ability to process and generate text, LLMs
    can assist in creating unit outlines, lesson plans, and engaging discussion questions
    that cater to the specific needs of students. Let’s explore how LLMs can be harnessed
    to enhance the course development process.
  prefs: []
  type: TYPE_NORMAL
- en: '**Unit outlines**: Developing a comprehensive unit outline is crucial for guiding
    both educators and students through the learning journey. LLMs can be leveraged
    to generate unit outlines that cover the key concepts, learning objectives, and
    progression of the course material. By inputting relevant information, such as
    the topic, subtopics, and desired outcomes, LLMs can provide educators with well-structured
    and organized unit outlines.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lesson plans**: LLMs can play a significant role in creating effective and
    engaging lesson plans. Educators can utilize LLMs to generate lesson plans that
    include specific learning activities, assessments, and resources to support student
    learning. By leveraging the capabilities of LLMs, instructors can customize and
    refine their lesson plans to meet the unique requirements of their students and
    address various learning styles.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Discussion questions**: Promoting active participation and critical thinking
    skills among students is a crucial aspect of any educational setting. LLMs can
    aid in the creation of thought-provoking discussion questions that stimulate intellectual
    discourse. By providing LLMs with relevant context and desired learning outcomes,
    educators can generate a variety of discussion questions that encourage students
    to analyze, evaluate, and articulate their thoughts on the subject matter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not only do LLMs assist in creating course materials, but they also offer the
    opportunity for collaboration and idea generation. Educators can utilize LLMs
    to brainstorm ideas, explore different approaches, and develop innovative materials
    that resonate with their students. It is important to note that while LLMs can
    provide valuable assistance, human expertise and guidance are crucial in ensuring
    the quality and effectiveness of the course materials generated.
  prefs: []
  type: TYPE_NORMAL
- en: By harnessing the power of LLMs, educators can streamline the course development
    process, save time in generating materials, and ultimately create more engaging
    and effective learning experiences for their students. The integration of LLMs
    in creating unit outlines, lesson plans, and discussion questions opens up new
    possibilities for educators to enhance their instructional strategies and cater
    to the diverse needs of today’s learners.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say you are going to teach a class about the history of ancient Greece.
    The following prompt can help generate the unit outlines, the lessons’ objectives,
    and the assignments and assessments.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, the LLM (in this case, I used Claude 2) provides a great starting
    point. You can add prompts to refine the output and then manually make the final
    adjustments.
  prefs: []
  type: TYPE_NORMAL
- en: When preparing a class, educators may want to prepare some handouts for the
    students, to serve as complementary material. Using AI, the teacher could get
    ideas and refine them as needed. In the next section, we’ll explore an example
    of that as well as how to create solved examples and provide word problems to
    enhance cross-learning among different areas.
  prefs: []
  type: TYPE_NORMAL
- en: Creating handouts and other materials
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When it comes to creating instructional materials for educational settings,
    handouts, solved examples, and word problems play a crucial role in engaging students
    and reinforcing their understanding. With the advancements in LLMs and AI, educators
    now have access to powerful tools that can assist in generating these materials.
    In this section, we will delve into some examples of them.
  prefs: []
  type: TYPE_NORMAL
- en: Creating handouts for the unit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Handouts play a supplemental yet vital role in learning by encapsulating key
    concepts, examples, and reference information into digestible resources. In this
    section, we will explore how educators can prompt an AI assistant to generate
    handout ideas tailored to a specific course unit. The AI assistant can propose
    various handout formats and content based on the unit topic and learning objectives.
    While the AI assistant provides a starting point, teachers would still need to
    review, refine, and compile final handouts.
  prefs: []
  type: TYPE_NORMAL
- en: We will start by asking the LLM to provide us with handout ideas for the course.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This isn’t bad, but maybe you would prefer solved handouts. Solved handouts
    show more details.
  prefs: []
  type: TYPE_NORMAL
- en: Creating solved examples
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In addition to handouts that provide unit overviews, solved examples are an
    invaluable resource for demonstrating concepts in action. In this section, we
    will examine how educators can leverage AI to generate handouts with fully worked-out
    solutions to problems, proofs, derivations, and other step-by-step processes.
    By providing the AI system with the relevant subject matter context, it can output
    solved examples tailored to the learning objectives. Teachers can then curate
    the AI’s suggestions into polished handouts that offer students accessible models
    of the knowledge and skills being cultivated in the unit. Solved examples scaffold
    learning by revealing the thought processes experts use when putting concepts
    into practice. Let’s explore this application of AI assistants in developing supplemental
    materials.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Notice that I didn’t have to write a prompt such as *Now create solved examples
    for those handouts* since the LLM maintains context and knows that I am referring
    to those handouts.
  prefs: []
  type: TYPE_NORMAL
- en: While solved examples provide important scaffolding, word problems assess students’
    ability to apply knowledge and skills independently in contextualized situations.
  prefs: []
  type: TYPE_NORMAL
- en: Word problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Word problems are questions that are posed in the context of real-world or fictional
    scenarios that require students to analyze the situation, extract relevant details,
    identify solution strategies, and perform calculations or logical reasoning to
    arrive at a solution. Word problems build critical thinking, literacy, and mathematical
    reasoning skills by grounding practice in authentic contexts rather than abstract
    equations. Well-designed word problems motivate learning, connect concepts to
    meaningful situations, and provide a more engaging method to develop and assess
    comprehension, strategic thinking, and problem-solving capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Continuing with the example of the history of ancient Greece unit, we will explore
    a couple of word problems – one that emphasizes language skills and another that
    focuses on simple math.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the prompt for emphasizing language skills.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Notice that in all of these examples, I didn’t have to mention ancient Greek
    history. This is because the LLM *remembers* the context of the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: As always, you can add follow-up prompts if you want or need to get more detailed
    or concrete answers.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we will ask for math word problems.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The two preceding examples, one focusing on simple math and integrating math
    skills such as calculating dates, multiplication, Pythagorean theorem, speed/distance/time,
    and combining multiple groups, and the other focusing on language skills while
    reinforcing the key concepts of ancient Greek history, give us a better understanding
    of word problems.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will learn how to use AI to create quizzes for the class unit.
  prefs: []
  type: TYPE_NORMAL
- en: Creating quizzes
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Assessing learning through periodic quizzes is a cornerstone of education. In
    this section, we will see how educators can utilize AI to automatically generate
    engaging quiz questions tailored to the concepts and learning goals of a particular
    unit. With the right prompts, AI can develop diverse quizzes, saving teachers’
    time. However, educators should always maintain agency over curating the quiz
    content produced by AI, ensuring standards alignment and an appropriate level
    of challenge that stimulates rather than overwhelms learners. Let’s explore this
    example of AI augmenting the assessment design process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: You can even follow that prompt with another one asking what the right answers
    are.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Quizzes are a good way to assess the general knowledge of the students concerning
    a certain topic. However, educators often use more than just quizzes to assess
    comprehension of the topics covered.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, next, we will explore how generative AI can help educators create rubrics.
  prefs: []
  type: TYPE_NORMAL
- en: Creating rubrics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Rubrics are scoring tools that outline specific criteria and performance indicators
    that are used to assess and evaluate the quality of student work. They provide
    a structured and standardized way to measure and communicate expectations, providing
    students with clear guidelines on how they will be assessed and allowing educators
    to provide constructive feedback.
  prefs: []
  type: TYPE_NORMAL
- en: Rubrics typically consist of a set of criteria related to the learning objectives
    of an assignment or project, along with a detailed description of different levels
    of performance for each criterion. These levels often range from novice or unsatisfactory
    to proficient or exemplary, allowing for a spectrum of performance to be assessed.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of rubrics is to establish a fair and transparent assessment process.
    By using rubrics, educators can ensure that grading remains consistent and objective,
    regardless of who is evaluating the work. Rubrics also help students understand
    what is expected of them, allowing them to self-assess their progress and make
    improvements based on the feedback provided.
  prefs: []
  type: TYPE_NORMAL
- en: Rubrics can be used for various types of assignments, including essays, presentations,
    projects, lab reports, and more. They not only provide a framework for grading
    but also guide students in the development of their work by outlining the specific
    criteria they need to address or fulfill.
  prefs: []
  type: TYPE_NORMAL
- en: Continuing with the example of the ancient Greece class unit, let’s look at
    a simple prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: The rubrics define expectations for key elements of performance and products
    using a point system. This allows clear and consistent grading for subjective
    assessments.
  prefs: []
  type: TYPE_NORMAL
- en: Rubrics provide critical frameworks for evaluating student work products and
    performances on diverse assessments. However, cloze comprehension activities offer
    a more focused approach for routinely assessing students’ command of key vocabulary
    and ability to understand passages with missing words. These fill-in-the-blank
    exercises quickly gauge the learning of core terms and concepts from instructional
    texts. With reading comprehension skills being essential for success across disciplines,
    targeted activities to monitor comprehension such as cloze tests have become vital
    teaching tools.
  prefs: []
  type: TYPE_NORMAL
- en: Creating cloze comprehension tests
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Cloze comprehension tests are a specific type of assessment tool that evaluates
    a student’s reading comprehension skills by presenting a passage with certain
    words or phrases deliberately omitted. The goal of a cloze test is for the student
    to fill in the missing words and demonstrate their understanding of the text.
  prefs: []
  type: TYPE_NORMAL
- en: In a cloze test, every nth word or phrase in the passage is removed, leaving
    a blank space in its place. The student must then determine the missing word based
    on the context and their understanding of the passage as a whole. The missing
    words can range from nouns, verbs, adjectives, adverbs, and prepositions, among
    others.
  prefs: []
  type: TYPE_NORMAL
- en: Cloze comprehension tests assess multiple aspects of reading comprehension,
    such as vocabulary knowledge, understanding of sentence structure, context clues,
    and overall comprehension of the text. They require students to not only grasp
    the meaning of the individual words and sentences but also to comprehend the passage
    as a coherent whole.
  prefs: []
  type: TYPE_NORMAL
- en: These tests are widely used in language learning, literature studies, and reading
    assessments to gauge a student’s ability to read and comprehend a given text accurately.
    Cloze tests can be administered using both fictional and non-fictional passages,
    depending on the educational context and learning objectives.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: In summary, leveraging AI tools opens up promising new workflows for generating
    high-quality, customized course content. As demonstrated through examples such
    as unit outlines, assignments, assessments, and hands-on activities, the right
    prompts can yield education materials tailored to specific learning objectives,
    curriculum standards, and student needs. While AI-generated content requires review
    and refinement by teachers, the ability to automate the base creation of standards-aligned
    materials provides a starting point to amplify instructor productivity. As AI
    capabilities and prompt engineering techniques continue to advance, instructors
    will be empowered to rapidly create diverse course materials that stimulate learning
    and comprehensively support student success.
  prefs: []
  type: TYPE_NORMAL
- en: While the previous sections focused on lesson and curriculum development for
    academic instruction, AI also has emerging applications in legal education and
    practice. Just as prompt engineering techniques can generate materials tailored
    to learning objectives for students, AI shows promise for building skills and
    improving workflows among legal professionals. The natural language capabilities
    of LLMs allow materials for teaching law students, training attorneys, streamlining
    research and discovery, automating document drafting, and more to be customized.
    In law, a field so contingent on comprehension and creation of written text, AI
    looks primed to assist legal experts, enhancing access and quality while reducing
    labor time on rote tasks. The following sections will explore leading-edge uses
    of AI in law, from legal training to litigation support.
  prefs: []
  type: TYPE_NORMAL
- en: AI for legal research
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Traditionally, legal professionals have had to invest substantial amounts of
    time and effort in conducting case analysis and legal research. However, with
    the advent of LLMs, these tasks have been significantly streamlined. LLMs can
    quickly sift through massive volumes of legal documents, statutes, and case law,
    extracting relevant information and providing comprehensive summaries. By leveraging
    LLMs, legal practitioners can now access a wealth of knowledge at their fingertips,
    expediting their research and analysis process.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if an attorney needs to prepare for a case related to the 1973
    US Supreme Court case Roe versus Wade, the following prompt can be used.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Let’s consider another example.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: You could follow the conversation by asking for more details about certain aspects
    to better prepare your case analysis and legal research, saving substantial effort.
  prefs: []
  type: TYPE_NORMAL
- en: Building on the groundbreaking advancements of AI in legal research, we will
    now turn our attention to the transformative capabilities of LLMs in revolutionizing
    legal document review. Harnessing the power of LLMs, legal professionals can streamline
    and optimize the review process, ensuring accuracy, efficiency, and enhanced decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Reviewing legal documents using an LLM
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the realm of legal practice, reviewing legal documents plays a critical role
    in ensuring accuracy, compliance, and effective decision-making. Thanks to advancements
    in AI, specifically LLMs, the landscape of legal document review has undergone
    a significant transformation. This section explores how LLMs are revolutionizing
    legal document review, streamlining workflows, improving efficiency, and leveraging
    the power of ML to drive accurate and informed analyses.
  prefs: []
  type: TYPE_NORMAL
- en: Suppose you have a partnership agreement that you want to review. You want to
    know whether or not it is comprehensive and whether it covers all the necessary
    aspects to protect both parties. The following prompt asks the LLM to review it
    and give you some recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Although this is a very simple example, you can see how, in just a few seconds,
    you can get a review of a legal document with actionable recommendations. With
    more complex contracts, it can be even more impactful.
  prefs: []
  type: TYPE_NORMAL
- en: Now, suppose that the contract language is too technical. You can ask the LLM
    to write it or explain it in layman’s terms. Continuing with the same example,
    let’s look at a prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: While AI tools such as ChatGPT can aid attorneys in reviewing and analyzing
    existing documents, they also show promise for expediting the creation of new
    legal documents. After using AI to extract insights from precedents, lawyers can
    leverage these systems to generate first drafts of materials such as contracts
    and lawsuits. We will explore that in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Drafting legal documents with an LLM
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LLMs have shown promising capabilities in assisting with drafting legal documents.
    With the right training data and prompt engineering, I can generate first drafts
    of various common legal documents, such as contracts, wills, and pleadings.
  prefs: []
  type: TYPE_NORMAL
- en: When using AI to draft legal documents, it is important to carefully craft the
    prompts to provide sufficient context and guidelines. For example, a prompt could
    specify the jurisdiction, the names and details of the parties involved, and the
    general purpose of the document. AI should be directed to draft documents that
    are legally sound, ethically appropriate, and logically coherent.
  prefs: []
  type: TYPE_NORMAL
- en: While AI-generated documents provide a solid starting point, human review and
    editing are still essential. An attorney should verify that documents created
    by AI conform to the law and serve the client’s interests. The AI system may miss
    nuances or make logical leaps that require adjustment. Legal documents also often
    need to be customized to each client’s unique circumstances.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at one example of a valid last will and testament.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: This example provides the key context needed to draft a basic valid will. The
    AI system can take these details and generate legalese-compliant text. The human
    attorney can then review, customize, and verify its quality before finalizing
    it for the client. With the right prompts, AI can provide a strong starting point
    for drafting common legal documents.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: This kind of prompt works for any type of draft for legal documents. Let’s look
    at an example prompt for drafting a simple divorce settlement agreement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: This divorce agreement provides details on the assets, incomes, and responsibilities
    that must be divided. The AI system can incorporate the facts into a suitable
    legal text that lawyers can then adapt as needed. With thoughtful prompts, AI
    assistants can help expedite the drafting of such common legal documents.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some other common legal document types that AI assistants can help
    draft:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Contracts**: Service agreements, non-disclosure agreements, and settlement
    agreements'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Real estate documents**: Deeds, mortgages, leases, easements, and titles'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Corporate documents**: Articles of incorporation, bylaws, shareholder agreements,
    and resolutions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Estate planning**: Trusts, healthcare directives, living wills, and powers
    of attorney'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Compliance documents**: Privacy policies, terms of service, disclaimers,
    and copyright notices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Legal research memos**: Analyzing issues and summarizing primary/secondary
    sources'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pleadings**: Complaints, answers, motions, petitions, and briefs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Discovery**: Interrogatories, requests for production, and requests for admission'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Patents and IP filings**: Applications, inventor declarations, assignments,
    and licenses'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Immigration**: Petitions, applications, affidavits, and employment authorization'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With proper training data and prompts, AI can help automate and expedite drafting
    for any widely used legal documents. But human review is still critical before
    finalizing any binding or filed paperwork.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to increased efficiency for legal drafting, AI has impacts on the
    training of new lawyers. Law schools and firms are finding ways to incorporate
    AI into educational curricula and professional development programs.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will delve into how AI is not just automating legal
    tasks but reshaping how law students gain essential knowledge and abilities.
  prefs: []
  type: TYPE_NORMAL
- en: AI for legal education and training
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI holds enormous potential to transform legal education by providing adaptive
    and personalized instruction to law students. AI-based tools can offer customized
    feedback, simulated courtroom practice, and unique insights to supplement traditional
    law school pedagogy.
  prefs: []
  type: TYPE_NORMAL
- en: However, effectively harnessing the power of AI relies heavily on engineering
    appropriate prompts. Well-designed prompts allow the AI system to tailor its responses
    and capabilities to the specific needs of each student. Prompts frame scenarios,
    shape feedback, and define the parameters for AI-assisted exercises such as drafting
    arguments and oral advocacy practice.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few ways an AI system could be useful for legal education and training:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Review and summarize case law**: An AI system could read through legal cases
    and identify the key facts, issues, rationale, and decisions in each case. This
    would help law students quickly get up to speed on relevant case law.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Generate practice exam questions**: Based on a curriculum or set of materials,
    an AI system could generate practice exam questions along with model answers.
    This allows students to test their knowledge and practice constructing legal arguments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provide feedback on written assignments**: An AI system could analyze student
    essays, memos, briefs, and more and provide feedback on their quality, structure,
    argumentation, use of evidence, and so on. This helps students improve their legal
    writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tutor students**: In a Socratic dialogue, an AI tutor could quiz students
    on concepts, force them to make arguments, and identify flaws in their reasoning.
    This develops critical thinking skills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Simulate court proceedings**: An AI system could act as a particular attorney,
    witness, judge, and so on and allow students to practice direct and cross-examinations,
    oral arguments, negotiations, and other legal skills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adapt to students’ level**: An advanced AI system could assess a student’s
    current skill level and dynamically adjust the difficulty and subject matter to
    provide the right level of challenge and support.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provide personalized feedback**: Based on a student’s performance, an AI
    system could give specific feedback tailored to their strengths/weaknesses and
    suggest resources to help in problem areas.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s look at an example of an LLM providing an example of a brief written by
    a student.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: By iterating back and forth, the student can refine their essays, memos, or
    briefs, thereby getting immediate feedback.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will explore an example of how to use AI to generate practice exam
    questions. In this case, the student can ask the LLM to generate some questions,
    then try to answer them and ask the LLM to provide feedback on the answers. Alternatively,
    the student can ask for some suggested answers. The following example focuses
    on the latter, although the former would be more effective since it forces the
    student to think about a potential good answer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: While AI systems show much promise for enhancing legal pedagogy, LLMs also are
    transforming aspects of the discovery process and litigation support, such as
    conducting eDiscovery, reviewing documents, and analyzing case strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Moving from the classroom to the courtroom, AI systems are not just hypothetical
    tools for tomorrow’s lawyers but are already being deployed today to assist with
    discovery and litigation. Specifically, **natural language processing** (**NLP**)
    and ML capabilities are enabling attorneys to handle eDiscovery and document review
    at a scale that’s not possible manually.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs for eDiscovery and litigation support
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The manual document review and analysis that’s involved in litigation is increasingly
    being transformed through AI. However, effectively leveraging AI for eDiscovery
    and case preparation relies heavily on prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: 'eDiscovery and litigation support refers to the processes involved in managing
    and reviewing electronic records and documents for legal cases and proceedings.
    This includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identifying relevant information**: Lawyers and legal teams need to locate
    all documents, emails, and other electronic materials that could be relevant to
    a case. This includes documents held by their client as well as collecting records
    from other parties through legal discovery rules.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Processing and organizing documents**: Once collected, documents need to
    be processed into a review platform. This includes extracting text and metadata,
    removing duplicates, and organizing documents.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document review**: Lawyers or legal teams must review all collected documents
    to identify those that are relevant to legal issues in the case or privileged
    materials that should not be disclosed. This is often the costliest and most time-intensive
    part of eDiscovery.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privilege review**: Related to document review, privilege review focuses
    on identifying materials protected by attorney-client privilege or work product
    doctrine that should not be disclosed to opposing counsel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Producing documents**: The relevant, non-privileged documents need to be
    produced to opposing counsel or regulators in a properly formatted and organized
    manner.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data analysis**: eDiscovery teams use analytics such as keyword searching,
    ML, and concept clustering to help identify key information in document collections.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Well-designed prompts allow attorneys to extract useful insights from massive
    document sets relevant to a case. Prompts frame specific questions and tasks to
    elicit the capabilities of AI tools. For example, prompts can ask an AI system
    to identify key topics and relationships within communications data. Alternatively,
    attorneys can use prompts to direct AI to surface important details and patterns
    across thousands of contracts.
  prefs: []
  type: TYPE_NORMAL
- en: The following example illustrates how an LLM could assist with privilege review
    in eDiscovery.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: The email messages are not included, but the real prompt should include them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: As you have probably noted, using ChatGPT, Claude 2, or Bard to do these types
    of tasks is possible and does save a lot of time during the eDiscovery tasks.
    However, it requires a lot of manual work to go through all the digital documents
    (emails in the previous example) and copying and pasting them. Furthermore, depending
    on the number of documents and their length, they can surpass the token context
    window.
  prefs: []
  type: TYPE_NORMAL
- en: Claude 2 can handle a large token context window of 100,000; the other tools
    will be increasing their capabilities over time.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, for sophisticated eDiscovery applications, solely prompting an LLM
    has limitations. It is better to develop custom solutions that automatically extract
    relevant emails, texts, and documents and feed them into the LLM in a structured
    format. This allows the AI system to efficiently analyze large volumes of case
    evidence. Tools such as LangChain ([https://github.com/langchain-ai/langchain](https://github.com/langchain-ai/langchain))
    provide frameworks for building custom AI applications that do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Connect the LLM to external data sources such as databases of case documents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enable the LLM to take actions through code rather than just respond to prompts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Making the LLM data-aware and agentic. This way, developers can automate document
    ingestion, analysis, and review at scale. This creates more robust eDiscovery
    and litigation support applications powered by the strengths of LLMs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In [*Chapter 9*](B21161_09.xhtml#_idTextAnchor131), we’ll introduce some ways
    to integrate OpenAI, Anthropic, and other LLM providers with different modules
    to provide model inputs and outputs, data connections, chains, memory, agents,
    and more.
  prefs: []
  type: TYPE_NORMAL
- en: After seeing AI’s utility for eDiscovery, it’s worth exploring how these capabilities
    translate to other legal domains, such as managing patents, trademarks, and other
    IPs. That’s coming next.
  prefs: []
  type: TYPE_NORMAL
- en: AI for intellectual property (IP) management
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: IP refers to creations of the human mind that have commercial value and are
    legally protected, enabling owners to benefit from their innovation and creativity.
    AI technology is transforming IP management by automating tasks such as patent
    searching and drafting, thereby enabling more efficient and cost-effective IP
    protection. With capabilities such as analyzing patent databases, assessing trademark
    availability, and mapping technology landscapes, AI systems are becoming indispensable
    tools for IP professionals seeking to maximize the value of their innovation portfolios.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some ideas for using AI to assist with IP management:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Patent searching**: The AI system could help search patent databases to see
    whether a proposed invention already exists or find prior art that could impact
    patentability. It could also identify relevant patent classifications. If the
    LLM you are using can’t access the internet for real-time information, the patent
    search will be limited to the cutout of training the LLM.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Patent application drafting**: The AI system could help draft patent applications
    by taking a description of an invention and generating patent claims and detailed
    specifications. This could save time and legal fees.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Trademark searching**: Check proposed trademarks against trademark databases
    to assess availability and risk of infringement.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Copyright registration**: The AI system could walk through the copyright
    registration process, asking questions to determine what type of work is being
    registered, who the authors/owners are, and more, and fill out the application
    forms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**IP landscaping**: Analyze a technology field to map out existing patents,
    identify leading innovators, where there are gaps, and so on. This can help guide
    R&D strategy and identify licensing opportunities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**IP portfolio management**: Keep track of patent prosecution deadlines and
    annuity payments. Analyze a patent portfolio to identify unused assets to consider
    abandoning as well as high-value patents to invest more in.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**IP licensing and agreements**: The AI system could help value IP assets,
    conduct competitive analyses to benchmark rates, and provide standard licensing
    contract language.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**IP risk assessment**: Identify potential IP infringements or violations based
    on product descriptions, marketing materials, and more, and suggest mitigation
    strategies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We are going to use a fictional example to analyze a product description to
    identify potential patent infringement.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: Continuing with the example of wearable electronic devices, let’s examine how
    an LLM could be used to map technology spaces and guide R&D.
  prefs: []
  type: TYPE_NORMAL
- en: We need to provide some inputs and instructions for the expected output for
    better results.
  prefs: []
  type: TYPE_NORMAL
- en: The key inputs are defining the technology scope, accessing comprehensive patent
    data, and determining relevant search parameters. The output provides a data-driven
    landscape analysis to strategically guide R&D investments, partnerships, and patent
    filing strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, here’s the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: This example shows the type of report that can be generated. However, we cannot
    use ChatGPT, Claude 2, or Bard directly to ask for this type of report. The response
    that was provided has been invented. This is what is called hallucination.
  prefs: []
  type: TYPE_NORMAL
- en: 'LLM models can be more susceptible to hallucinating or generating incorrect
    information under certain conditions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**When trained on limited or biased data**: If the training data does not sufficiently
    cover the full range of knowledge about a topic, the model may fill in the gaps
    by generating plausible-sounding but incorrect information. This is more likely
    for obscure topics with little training data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When asked about topics outside its training**: LLMs perform best when queried
    about topics within the domain of their training data. When asked about unfamiliar
    topics, they are more likely to hallucinate or guess.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When prompted with incorrect premises**: If the human provides incorrect
    information to the model as part of the prompt, the model may continue the conversation
    based on those false premises and generate logical but incorrect responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When asked open-ended, ambiguous questions**: Broad, vague questions allow
    more room for the model to creatively fill in details, which increases the chances
    of hallucination. Specific, unambiguous questions reduce this risk.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When generating long, detailed responses**: The risk of hallucination grows
    as the model tries to continue generating plausible text over many sentences without
    grounding in sources/memory. Short, concise responses are less prone to hallucination.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**With larger models**: Larger models with more parameters can generate more
    coherent long-form text but are also more prone to sounding persuasive, even when
    hallucinating. Smaller models are more likely to fail or admit ignorance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The core issue is that models may sound confident and plausible while being
    wrong or providing fabricated information. Careful prompting, training data selection,
    and skepticism of responses can help reduce hallucination risks.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are using the LLMs without training and fine-tuning them with your data,
    the best way to reduce these hallucinations are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: For open-ended generative tasks, set the temperature close to zero, and use
    top-k sampling to avoid excessive creativity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ask the LLM if the response that’s been given is based on factual data or if
    the LLM is hallucinating
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have covered many cases and listed many more of how AI can be used to assist
    attorneys in their day-to-day jobs. The next section will explore other areas
    in which AI can be helpful for legal practices.
  prefs: []
  type: TYPE_NORMAL
- en: Other applications of LLMs for lawyers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While the previous sections explored AI applications such as legal research,
    document review, drafting, education, eDiscovery, and IP management, there are
    many other emerging use cases for AI in the legal domain. Law firms and legal
    departments are just scratching the surface of how AI and ML can transform and
    augment all aspects of legal work. Some other high-potential applications include
    leveraging NLP for predictive analytics on litigation outcomes, contract review
    automation, legal research augmentation, intelligent billing, risk detection,
    client intake chatbots, and overall law firm management. This section will provide
    an overview of these innovative AI use cases that aim to enhance efficiency, quality,
    access, compliance, and decision-making throughout the legal industry. By combining
    domain expertise with advanced AI, lawyers can automate repetitive tasks and focus
    their skills on high-value advisory services. The adoption of AI is still in the
    early stages but holds tremendous promise for the future of legal services.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some other potential legal applications of AI:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Predictive analytics for litigation outcomes**: Using NLP and ML, AI systems
    can analyze past court decisions, case documents, and judge/jury profiles to predict
    the likelihood of success in new cases. This can assist with case strategy and
    settlement decisions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automated firm management**: AI chatbots and virtual assistants can handle
    common administrative/operational tasks such as scheduling meetings, tracking
    billable hours, and managing calendars to reduce overhead costs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Intelligent legal billing**: Using NLP and optimization algorithms, AI can
    analyze hourly billing records to flag inefficiencies and unnecessary work, and
    also suggest improvements to streamline legal bills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI for fraud/risk detection**: ML models can be trained to identify potential
    fraud, conflicts of interest, insider trades, and other compliance risks by analyzing
    documents, communications, and metadata.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Legal chatbots**: AI chatbots can provide interactive legal guidance for
    common inquiries, automate client intake, or act as virtual assistants for lawyers/clients.
    This is useful for access to justice.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For most of these use cases, prompting ChatGPT or a similar system would not
    be enough. Knowing how to craft good prompts is still valuable, but the system
    will need to have access to other resources. In some cases, it could be possible
    to use ChatGPT Plus by using plugins such as Code Interpreter that can write Python
    code and execute it on behalf of the user.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, to be able to predict case outcomes with AI to build an ML model
    that can predict the likelihood of success in litigation cases using past court
    decisions and case documents, you would need the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data sources**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A court records database containing extensive case history (parties, judges,
    jurisdiction, claims, defense, rulings, verdicts, and more)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Full-text legal documents – motions, briefs, filings, evidence, and trial transcripts
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Judge and jury analytics – profiles, past rulings, and tendencies
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data processing**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Extract structured metadata from court records into a consistent format
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Use NLP techniques such as topic modeling, sentiment analysis, named entity
    recognition, and more to analyze unstructured case text
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Link to judge/jury analytics to incorporate decision-maker profiles per case
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model development**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explore supervised learning approaches such as logistic regression, SVM, random
    forest, and others that can handle mixed data types
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Use 75% of processed data for training and 25% for testing
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluate models using accuracy, precision, recall, F1 score, and more
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Perform feature importance analysis to ID key case factors
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Applications**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For pending cases, predict win probability based on case specifics
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Allow lawyers to stress test case strategies by modifying key case variables
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Estimate case value ranges for settlement negotiation
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This outlines the key steps and considerations for developing an AI litigation
    prediction model using real case data.
  prefs: []
  type: TYPE_NORMAL
- en: Using LangChain or similar tools, it is possible to build a solution that uses
    generative AI APIs to access GPT-3.5 turbo, GPT-4, Claude 2, AI21, Cohere, and
    other LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at a prompt for such an application.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: In essence, the legal domain is only just scratching the surface when it comes
    to potentially transformative applications of AI. As this section illuminated,
    LLMs have tremendous utility across predictive analytics, process automation,
    risk detection, client service, education, and overall law firm operations. While
    thoughtful oversight remains crucial, AI promises to automate repetitive tasks,
    surface hidden insights, and allow legal professionals to focus on high-value
    skills such as critical thinking, communication, and ethical judgment. By combining
    the complementary strengths of humans and AI, the legal community can enhance
    quality, efficiency, access, compliance, and decision-making for a more just future.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter explored various applications of LLMs, such as ChatGPT, for education
    and legal practice. We began by looking at how LLMs can assist in creating course
    materials such as unit outlines, lesson plans, handouts, quizzes, and rubrics.
    LLMs are very useful for quickly generating quality educational content tailored
    to specific learning objectives.
  prefs: []
  type: TYPE_NORMAL
- en: Then, we examined key ways in which LLMs are being used in legal research and
    document review. Their NLP capabilities allow them to rapidly analyze large volumes
    of case law and contracts. While an attorney still needs to validate the LLM’s
    work, these tools can significantly expedite tasks such as prior art searches
    and due diligence.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, we discussed how LLMs can draft legal documents by incorporating
    a lawyer’s instructions and desired formatting. This can save attorneys time while
    producing an initial draft, though human review is essential to ensure accuracy.
    Beyond drafting, LLMs show promise for IP management and eDiscovery applications
    in litigation when incorporated into customized applications built with tools
    such as Anthropic’s Claude or Google’s LaMDA, and integrated with libraries such
    as LangChain or similar.
  prefs: []
  type: TYPE_NORMAL
- en: We also talked about how it’s critical to review an LLM’s responses to confirm
    accuracy and avoid potential hallucinations. Human oversight remains essential
    to realizing the benefits of LLMs in the legal domain.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, this chapter has highlighted the tremendous potential of LLMs such
    as ChatGPT to augment human legal professionals when thoughtfully implemented.
    Prompt engineering and validation of responses are key to successfully leveraging
    these AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: While this chapter explored applications of LLMs for education, law, and other
    professional domains, our next chapter delves into the burgeoning impact of AI
    on software development.
  prefs: []
  type: TYPE_NORMAL
