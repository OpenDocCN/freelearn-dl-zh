- en: '3 Doing Ethics: Overcoming Objections'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3 进行伦理学研究：克服反对意见
- en: 'Now that we understand how we got *here* in our relationship with technology,
    we must decide what to do now. Unfortunately, getting started is one of the most
    challenging parts of doing ethics. And there are many reasons that can be used
    to avoid doing the work. Yet, the **objections** to moving forward are not insurmountable
    once they are better understood and more fully explained. That is the point of
    this chapter and the foundation on which our future work will be based.This chapter
    aims to address the many objections to doing ethics. It will also explain why
    this work is difficult, why it may be tempting to avoid, and how we find a way
    past the problems to begin the work of “doing ethics.”In this chapter, we’re going
    to cover the following main topics and objections:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了我们在与技术的关系中是如何走到**这里**的，我们必须决定接下来要做什么。不幸的是，开始行动是进行伦理学研究的最具挑战性的部分之一。而且有许多理由可以用来避免这项工作。然而，一旦更好地理解并充分解释了这些**反对意见**，前进的障碍就不再是不可逾越的。这正是本章的目的，也是我们未来工作的基础。本章旨在解决进行伦理学研究的许多反对意见。它还将解释这项工作为什么困难，为什么可能诱人回避，以及我们如何找到克服问题开始进行“进行伦理学研究”的方法。在本章中，我们将涵盖以下主要主题和反对意见：
- en: Overcoming objections to doing ethics
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 克服进行伦理学研究的反对意见
- en: Finding Commonality in Conflicting Ideas and Priorities
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在冲突的观点和优先事项中找到共性
- en: Finding Practicality in Advice and Guidance
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在建议和指导中找到实用性
- en: Overcoming Perfection and Ideal Theories in Ethics
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 克服伦理学中的完美和理想理论
- en: Challenging Frameworks
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 挑战框架
- en: Doing Ethics
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行伦理学研究
- en: Overcoming objections to doing ethics
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 克服进行伦理学研究的反对意见
- en: In philosophy, **overcoming objections** means addressing head-first criticisms
    against a viewpoint or position. In this instance, the argument is that we must
    do the important work of ethics. Now, the process of overcoming objections to
    that view can begin. To start, we must identify the objections to doing ethics
    and do our best to try to understand them. To do this, we must see the objection
    as worthy and valid and see the objection through a position of generosity, which
    means listening with an open mind, considering that we may have made a mistake
    before responding, and taking to heart that the other person may be the correct
    one. Only then can we work on constructing a response. Responses often include
    adding nuance, clarification, details, or missing facts while respecting the objection
    and the objector. The benefit of this process is that it helps to strengthen the
    original argument and to make it better able to withstand criticism. Usually,
    this is a back-and-forth dialogue between those who disagree. However, when it
    is in written form, critique often takes place during review or even after it
    has been published.Remember, focusing on only a few objections means that other
    objections may be left out, making those who disagree with you turn to new ideas
    to maintain their position. This means that there will be new objections to overcome.
    So, the process of overcoming objections is iterative.A final note about overcoming
    objections that must be mentioned is that the most essential part of this process
    is to sincerely consider that your view may be wrong – not theirs. This is why
    viewing opposing arguments from a position of generosity and an open mind is essential.
    Only by fully understanding their argument and exploring its strengths can you
    understand how you might explain to them why yours is the stronger idea. You cannot
    argue against something you do not understand or fully explore. Once you understand
    the opposing side, you can determine which position you’ll take and better understand
    how to defend it.We will first talk about how to find an intersection in conflicting
    ideas and prioritize ethics.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在哲学中，**克服异议**意味着首先针对一个观点或立场提出的主要批评进行回应。在这个例子中，论点是我们必须做重要的伦理工作。现在，克服对该观点的异议的过程可以开始了。首先，我们必须确定反对做伦理的理由，并尽我们所能去理解它们。为了做到这一点，我们必须将异议视为有价值和有效的，并以慷慨的态度看待它，这意味着要怀着开放的心态去倾听，考虑到在回应之前我们可能已经犯了一个错误，并且要真心实意地认为对方可能是正确的。只有这样，我们才能着手构建回应。回应通常包括在尊重异议和异议者的情况下，增加细微差别、澄清、细节或缺失的事实。这个过程的好处是它有助于加强原始论点，并使其更能经受住批评。通常，这发生在那些不同意的人之间的来回对话中。然而，当它以书面形式出现时，批评往往发生在审查期间甚至出版之后。记住，只关注少数异议意味着其他异议可能被忽略，这会让不同意你的人转向新想法来维持他们的立场。这意味着将有新的异议需要克服。因此，克服异议的过程是迭代的。关于克服异议的最后一点必须提到的是，这个过程最关键的部分是真诚地考虑你的观点可能是错误的——而不是他们的。这就是为什么从慷慨和开放的心态来看待对立的论点是至关重要的。只有完全理解他们的论点并探索其优势，你才能理解你如何向他们解释为什么你的观点更加强大。你不能反对你不理解或没有充分探索的东西。一旦你理解了对立的一方，你就可以确定你将采取什么立场，并更好地理解如何捍卫它。我们首先将讨论如何在冲突的观念中找到一个交集，并优先考虑伦理。
- en: Finding Commonality in Conflicting Ideas and Priorities in Ethics
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在伦理学中寻找冲突观念和优先事项中的共性
- en: One of the first challenges that comes up when discussing ethics is a lack of
    commonality between ethical concepts, ideas, and priorities. For example, trust
    is a topic that most are familiar with and understand personally. Because of this
    personal nature and their personal beliefs, many believe that ethics seems to
    be a matter of personal preference. They say, “I feel I can trust a person when
    they….” Individuals also understand that different people can end this sentence
    differently. This individualistic view often results in a narrower view of ethics
    focused on difference rather than commonality.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当讨论伦理学时，首先遇到的挑战之一是伦理概念、思想和优先事项之间缺乏共性。例如，信任是一个大多数人熟悉并了解个人经历的话题。由于这种个人性质和他们的个人信仰，许多人认为伦理似乎是一个个人偏好的问题。他们说：“当我感觉到一个人……时，我觉得我可以信任这个人。”个人也明白不同的人可能会以不同的方式结束这个句子。这种个人主义观点通常会导致一种更狭窄的伦理观，关注差异而不是共性。
- en: Individualism
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 个人主义
- en: ''
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The act of working alone or of viewing individual needs over collective interest.
  id: totrans-14
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 单独工作或将个人需求置于集体利益之上的行为。
- en: '**Individualism** is not only connected to ideas that people hold about what
    is trustworthy, but they also recognize that what is very important to one person
    may be less important to another. In other words, we recognize ethical terms and
    prioritize them in order of their priority to ourselves. This individualistic
    view poses unique challenges when explored through our perception of ethics as
    it relates to AI.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**个人主义**不仅与人们对什么是值得信赖的看法有关，而且他们也认识到，对一个人来说非常重要的东西可能对另一个人来说不那么重要。换句话说，我们认识到道德术语，并按照它们对我们自己的重要性来优先排序。这种个人主义观点在探索与人工智能相关的道德观念时提出了独特的挑战。'
- en: Ideas
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 思想
- en: '**Ideas** are meant to describe thoughts that we have about certain terms or
    concepts. Some of these concepts in technology are ethical, including trust, protection,
    and safety. To begin, let’s discuss safety. It should be familiar to recognize
    that some people are less risk-averse than others, indicating their preference
    for what feels safe. Similarly, with honesty, what one person considers dishonest
    and a reason to withhold trust, another may believe that situation to be nothing
    more than a harmless white lie keeping trust intact. Lastly, what makes someone
    feel protected can be different for many people. Some people are willing to walk
    to the edge of a cliff without a barrier, and others might prefer not to leave
    their vehicles.When applying these concepts to technology, there seem to be too
    many conflicting preferences and thoughts on the matter to find a “real” answer.
    Let’s consider three hypothetical people tackling the idea of safety. Let’s consider
    that Sally’s preference regarding safety (or any of the concepts we’ve mentioned)
    is rejected by Mark. Meanwhile, it can only follow that Mark rejects Sally’s conception
    of safety. And imagine that Sally or Mark does not desire Jason’s idea of safety.
    Jason rejects both of their conceptions. *Figure 3.1*. The challenge of finding
    a middle ground seems next to impossible. By extension, creating policies and
    preferences with such differences is also a challenge since many will be disappointed
    regardless of what decision is made.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**思想**旨在描述我们对某些术语或概念所持有的想法。在技术领域，其中一些概念是道德性的，包括信任、保护和安全。首先，让我们讨论安全。我们应该熟悉这样的认识，即有些人比其他人更不愿意冒险，这表明他们更喜欢感觉安全的事物。同样，在诚实方面，一个人认为的不诚实和拒绝信任的理由，另一个人可能认为那只是保持信任的无害的小谎言。最后，使许多人感到受保护的因素可能因人而异。有些人愿意在没有障碍的情况下走到悬崖边缘，而其他人可能更喜欢不离开他们的车辆。当将这些概念应用于技术时，似乎有太多相互冲突的偏好和想法，以至于很难找到“真正的”答案。让我们考虑三个假设的人物，他们正在处理安全这一想法。让我们假设萨莉对安全的偏好（或我们提到的任何概念）被马克所拒绝。与此同时，马克拒绝萨莉对安全的理解似乎是不可避免的。想象一下，萨莉或马克不希望杰森对安全的想法。杰森拒绝了他们的两种理解。*图
    3.1*。找到中间立场似乎几乎是不可能的。由此延伸，制定具有这种差异的政策和偏好也是一个挑战，因为无论做出什么决定，许多人都会感到失望。'
- en: '![Figure 3.1 – Demonstrating Lack of Agreement](img/file2.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图 3.1 – 展示缺乏一致性](img/file2.png)'
- en: Figure 3.1 – Demonstrating Lack of Agreement
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.1 – 展示缺乏一致性
- en: The previous paragraph briefly mentioned our hypothetical Jason’s idea of safety.
    The subtle change from discussing safety to Jason’s idea of safety is significant.
    Safety as a definition means to be protected, but here we’re focused on what makes
    Jason *feel* safe.This reveals that the challenge of drawing conclusions about
    these concepts hinges on what people believe or their ideas about them. And if
    each person has their own ideas about each ethical term or principle that inform
    their reaction to circumstances and there are roughly 7.5 billion people in the
    world – that’s a lot of conflicting ideas and too many to consider – let alone
    act upon or use to create policies thoughtfully. And yet, these concepts are meant
    to become part of the **ethical frameworks** that guide AI. But how?
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 前一段简要提到了我们假设的杰森对安全的想法。从讨论安全到杰森对安全的想法的微妙变化是显著的。安全作为一个定义意味着受到保护，但在这里我们关注的是使杰森*感觉*安全的事物。这揭示了关于这些概念的结论的挑战在于人们对其信念或想法。而且，如果每个人对每个道德术语或原则都有自己的看法，这些看法影响着他们对情境的反应，而世界上大约有75亿人口——这有很多相互冲突的想法，太多以至于无法考虑——更不用说深思熟虑地采取行动或用来制定政策了。然而，这些概念旨在成为指导人工智能的**道德框架**的一部分。但如何呢？
- en: Ethical Framework
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 道德框架
- en: ''
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A structured set of rules or guides that provide a systematic approach to ethical
    problem-solving.
  id: totrans-23
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一套结构化的规则或指南，提供了一种系统化的道德问题解决方法。
- en: Suppose that instead of seeing individuals, we saw them as groups. Let’s aim
    to create 3 large groups to make things simple (and manageable) at this point.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们不是看到个体，而是将他们视为群体。让我们尝试创建三个大型群体，以使事情在这个阶段简单（且可管理）。
- en: We’ll call the first group the Mavericks; they are the risk-takers. These are
    people who look before they leap, “go fast and break things,” or consider the
    risk worth the reward (without giving the risk much consideration). For example,
    they may bungee jump for the first time with a company they are unfamiliar with
    beyond reviews, they may find seatbelts unnecessary or may believe that protections
    are largely overreaching.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将第一组称为“独行侠”；他们是冒险者。这些人会三思而后行，“快速行动，打破常规”，或者认为风险值得回报（而不太考虑风险）。例如，他们可能会第一次与一家他们不熟悉的公司进行蹦极跳，他们可能会认为安全带没有必要，或者认为保护措施过于过度。
- en: Then, let’s create a second group for very risk-averse people; let’s call them
    the Cautioners. Cautioners are dotting their I’s and crossing their T’s. They
    leave little to chance and err on the side of caution at every turn. They have
    lists, plans, and contingency plans. And there is no way they are bungee jumping
    – and if for some reason they decide to attempt it they will vet the company,
    the plane, the person who pack their gear, their safety protections, reviews,
    and will want documentation to prove it – and they will not agree to be the first
    jump of the day. After all that research, they may not even go at all.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，让我们为非常谨慎的人创建第二组；让我们称他们为“谨慎者”。谨慎者会仔细检查每一个细节。他们几乎不留任何机会给运气，并在每个转折处都采取谨慎的态度。他们有清单、计划和应急计划。他们绝对不会进行蹦极跳——如果出于某种原因他们决定尝试，他们会审查公司、飞机、打包装备的人、他们的安全保护措施、评论，并希望有文件证明这一切——而且他们不会同意成为当天的第一个跳伞者。在所有这些研究之后，他们甚至可能根本不去尝试。
- en: Lastly, we’ll create a list for those who are in between – they are neither
    Mavericks nor Cautioners and instead are the Centers. These people focus on a
    pragmatic approach to risk. They will “kick the tires” but with strong assurance
    they are likely to take the leap. They may also have a plan B, but not a contingency
    for excessive potential outcomes. They are willing to take calculated risks, but
    they do not need to be an engineer. This is the middle position, much like the
    golden mean of virtue ethics. *Figure 3.2*.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们将为那些处于中间位置的人创建一个列表——他们既不是独行侠也不是谨慎者，而是中心位置的人。这些人专注于对风险采取实用主义的方法。他们会“踢轮胎”，但会非常确信他们可能会采取跳跃。他们也可能有一个B计划，但不是针对过度潜在结果的应急计划。他们愿意承担计算风险，但不需要是工程师。这是中间位置，就像美德伦理学的黄金法则。*图3.2*。
- en: While you may not know everyone’s personal view on safety, you can sort through
    this challenge using categories.We are not looking to create overlap between the
    groups or a Venn diagram; instead, think of these as containers or buckets – separate
    from each other. Now imagine a fast sorting of people; you only have three choices,
    and each person can only be placed in a single category. (The Venn-like diagram
    can come later and allow more nuance for this process, but the idea here is a
    starting point, and a simpler starting point is best.)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可能不知道每个人的个人安全观，但你可以通过分类来解决这个问题。我们不是要在这两组之间创建重叠或维恩图；相反，将这些视为容器或桶——彼此分开。现在想象一下快速地对人群进行分类；你只有三个选择，每个人只能被放置在单个类别中。（维恩图可以稍后出现，为这个过程提供更多细微差别，但这里的想法是一个起点，一个更简单的起点是最好的。）
- en: '![Figure 3.2 – Sorting Method by Risk](img/file3.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图3.2 – 风险排序方法](img/file3.png)'
- en: Figure 3.2 – Sorting Method by Risk
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2 – 风险排序方法
- en: No two people will be identical, but there can still be a way to determine who
    you have the most in common with. Even now, if challenged to choose one of the
    buckets above for yourselves, you could sort yourselves into a group without introducing
    other choices. (Some wouldn’t like it, but that doesn’t mean that they couldn’t
    choose one.)It should be important to note that rather than looking for **commonality**
    between those who disagree, we’re finding commonality within each group. So, the
    cautioners are united in their caution, the Mavericks by their risk-taking, and
    the Centers by their middle-ground approach to risk. We do not need to find a
    commonality between Cautioners and Mavericks – or any combination of Jason, Sally,
    and Mark. Instead, we need to recognize who is most like Mark, most like Sally,
    and most like Jason. That gets us to a starting point (of course, more nuance
    is needed, and in time, we’ll get there).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 没有两个人是完全相同的，但仍然可以找到一种方法来确定你与谁最相似。即使现在，如果被要求为自己选择上述桶中的一个，你也能将自己归类到一个群体中，而不需要引入其他选择。（有些人可能不喜欢这样，但这并不意味着他们不能选择。）重要的是要注意，我们不是在寻找那些意见不一致的人之间的共性，而是在每个群体内部寻找共性。因此，谨慎者团结在他们的谨慎中，拓荒者团结在他们的冒险中，中心派团结在他们中间风险的处理方法中。我们不需要在谨慎者和拓荒者之间——或者任何由贾森、萨莉和马克组成的组合之间寻找共性。相反，我们需要认识到谁最像马克，谁最像萨莉，谁最像贾森。这使我们到达一个起点（当然，还需要更多的细微差别，并且随着时间的推移，我们会达到那里）。
- en: Principle of Commonality
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 共同性原则
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Seeking to look for commonality rather than difference when confronted with
    an enormous number of disparate ideas or preferences.
  id: totrans-34
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 面对大量不同观点或偏好时，寻求寻找共性而非差异。
- en: To move forward with doing ethics (which involves and is focused on ethical
    concepts like these), instead of identifying differences, it would be wise to
    look for commonality. In fact, finding commonality is essential to moving forward
    with this work. Of course, there will be a time to address differences, but it
    should not be the first step nor used to avoid this work.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 要在伦理学（涉及并专注于这些伦理概念）方面取得进展，而不是识别差异，寻找共性将是明智的。事实上，找到共性对于推进这项工作至关重要。当然，会有时间来解决差异，但这不应该是第一步，也不应该用来避免这项工作。
- en: Priorities
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优先级
- en: 'Now, we can see issues related to trust broken into categories: those who are
    willing to take chances, those who wish to see caution, and those who are in the
    center; we find another challenge: determining **priorities**. While it is one
    thing to understand what trust means to us, determining whether to prioritize
    safety over trust or trust over safety is another question altogether. To determine
    our priorities, we must first have some basic ethical concepts to consider and
    weigh against the others. In AI ethics, you’ll see terms like those mentioned
    previously, such as trust and safety, but you’ll also hear about rights protections,
    doing no harm, doing good (beneficence), and bias. But how can we know which of
    these should be our first priority or our last?While no one truly knows how many
    ethical frameworks are being implemented today, we know that individual organizations
    are creating their own frameworks for implementing AI at their organizations.
    So, once again, a majority solution does not seem likely or within reach – there
    will be differences. Unfortunately, a common view is that if there are many solutions,
    there are none. It seems AI and organizations could succumb to this view – or
    that relying on difference again allows for the derailment of ethical AI. But
    this is misleading. Are we certain that we cannot find something to use as a guide
    to determine our priorities?Of course, you may have already guessed that commonality
    can also help us with this challenge. Of the many frameworks, there is commonality
    among them. So, by looking for commonality, we can find the topics or themes that
    have resonated with others to give us a starting point. Fortunately, researchers
    have begun doing this work, and primary analysis of 84 frameworks has revealed
    commonalities among them ([https://arxiv.org/ftp/arxiv/papers/1906/1906.11668.pdf](https://arxiv.org/ftp/arxiv/papers/1906/1906.11668.pdf)
    ) Jobin et al., pp. 7-10). While no specific idea or ethical principle was in
    all the frameworks, the following principles were noted in most of them (73-47
    of the evaluated frameworks): transparency, justice and fairness, non-maleficence,
    responsibility, and privacy. While no specific principle was identified, commonality
    was still able to be identified and can serve as a foundation to begin ethical
    evaluations.Yet, we’re still at a loss for how to prioritize those. The decision
    to consider any of these 5 as equal in priority doesn’t seem to make sense, and
    merely relying on commonality is a challenge, too. What if your organization is
    heavily regulated? What if your industry is high-risk? The answer to this dilemma
    is a matter of **triage**.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以看到与信任相关的问题被划分为几个类别：那些愿意冒险的人，那些希望看到谨慎的人，以及那些处于中间位置的人；我们发现了另一个挑战：确定**优先级**。虽然理解信任对我们意味着什么是一回事，但确定是优先考虑安全还是信任，则是另一个完全不同的问题。为了确定我们的优先级，我们首先必须有一些基本的道德概念来考虑和权衡。在人工智能伦理学中，你会看到之前提到的术语，如信任和安全，但你也会听到关于权利保护、不造成伤害、行善（仁慈）和偏见的内容。但我们如何知道这些中哪些应该是我们的首要任务或最后任务？当然，你可能已经猜到了，共性也可以帮助我们应对这个挑战。在众多框架中，它们之间存在着共性。因此，通过寻找共性，我们可以找到那些引起他人共鸣的主题或主题，为我们提供一个起点。幸运的是，研究人员已经开始进行这项工作，对84个框架的初步分析揭示了它们之间的共性([https://arxiv.org/ftp/arxiv/papers/1906/1906.11668.pdf](https://arxiv.org/ftp/arxiv/papers/1906/1906.11668.pdf)
    Jobin等人，第7-10页)。虽然没有任何具体想法或伦理原则在所有框架中都有，但以下原则在大多数框架中都被注意到了（在评估的框架中有73-47个）：透明度、正义与公平、无害、责任和隐私。虽然没有确定具体原则，但共性仍然能够被识别，并可以作为开始伦理评估的基础。然而，我们仍然不知道如何对这些进行优先排序。将这5个中的任何一个视为同等优先级似乎没有意义，仅仅依赖共性也是一个挑战。如果你的组织受到严格的监管怎么办？如果你的行业风险很高怎么办？这个困境的答案是**分级**。
- en: Triage in AI Ethics
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人工智能伦理中的分级
- en: ''
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The act of prioritizing ethical concerns and principles is determined by the
    threat of ignoring them on persons, places, the environment, organizations, and
    larger society.
  id: totrans-40
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 将道德关切和原则置于首位的行为，是由忽视它们对个人、地点、环境、组织以及更广泛社会的威胁所决定的。
- en: 'As you are likely aware, triage is a medical term that allows doctors or emergency
    staff to determine their priorities. This is usually based on a patient’s risk
    for negative outcomes, death being the primary driver. Using this as an analogy,
    we can begin to see how triage can help us prioritize the risks to an organization
    by AI. For example, if you are heavily regulated regarding privacy, then privacy
    is likely to be higher on your list of priorities. If you are working with technology
    that can affect the outcome of people’s lives, then rights protections would fall
    higher on your list of priorities. Here, the threat to your organization drives
    your priorities. This makes the choices more straightforward and clearer when
    they previously may have seemed unclear.For those familiar with engineering this
    practice may have correlations to on-call shifts where incidents are responded
    to in the moment, but determining the severity of the issue and the appropriate
    response is needed. In engineering the idea is to minimize the impact of the issue
    and to implement a fix if needed. Ethics in this instance can help identify and
    prioritize which issues need attention first and which may be moved down on the
    list of priorities.One caveat that is worthy of mentioning, regardless of the
    need for triage, any situation or circumstance that requires a solution is only
    bumped down on the priorities list – not removed. Exercise caution and avoid the
    temptation to remove a task due to difficulty.The concept of triage, pr and on-call
    work also fits well to the guidance of the Eisenhower Matrix:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所知，分级治疗是一个医学术语，允许医生或紧急工作人员确定他们的优先级。这通常基于患者负面结果的风险，死亡是主要驱动力。将此作为类比，我们可以开始看到分级治疗如何帮助我们通过人工智能优先考虑组织的风险。例如，如果你在隐私方面受到严格监管，那么隐私可能在你优先事项列表中排名更高。如果你正在使用可能影响人们生活结果的技术，那么权利保护可能在你优先事项列表中排名更高。在这里，对你组织的威胁驱动了你的优先级。这使得选择在之前可能看似不明确的情况下变得更加直接和清晰。对于那些熟悉工程的人来说，这种做法可能与现场应对事件的值班班次有关，但需要确定问题的严重性和适当的响应。在工程中，目标是最大限度地减少问题的影響，并在需要时实施修复。在这个例子中，伦理可以帮助确定和优先考虑哪些问题需要首先关注，哪些可能被移至优先事项列表的较低位置。有一个值得注意的例外，无论是否需要分级治疗，任何需要解决方案的情况或情况都只会被降低在优先事项列表中——而不是被移除。请谨慎行事，避免因困难而删除任务的诱惑。分级治疗、公关和值班工作的概念也与艾森豪威尔矩阵的指导原则相吻合：
- en: Do tasks that are urgent and have significant consequences.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行紧急且具有重大后果的任务。
- en: Schedule tasks that are important for success but can be delayed.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排那些对成功重要但可以延迟的任务。
- en: Delegate tasks to those better suited to tackle them.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将任务委托给更适合处理它们的人。
- en: Remove/Delete tasks that are redundant, unnecessary, or distract from the work
    that is required.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除/移除那些重复、不必要或分散对所需工作注意力的任务。
- en: Finding Practicality in Advice and Guidance
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在建议和指导中寻找实用性
- en: It can be tempting to believe that ethical advice and guidance lacks the practicality
    that is needed to support AI innovation. This is to misunderstand or make assumptions
    about the contributions of AI ethicists and the work of ethics.challenge to beginning
    the work of doing ethics is the claim that little of the advice that is received
    is practical. This view is supported by the many principles, terms, definitions,
    and disagreements that have come from suggestions. For example, the definition
    of trust may be interpreted, changed, nuanced, or revised. And in some cases,
    trust can mean more than one thing. When a technologist talks about trust, they
    often talk about an algorithm that performs as programmed, and when users discuss
    it, they are considering whether they should put trust in the app or program they
    are using. Yet few slow down to realize this challenge or take the time to explain
    what kind of trust is on offer or is claimed.This challenge of language, terms,
    and definitions becomes even more problematic when advice is offered under the
    standard method of frameworks. While a framework appears to be a wonderful tool,
    many organizational leaders and some of the most tech-savvy individuals see only
    a list of important terms but no way to make them actionable or to apply them.
    This often leaves those attempting to tackle ethics and technology with the feeling
    of, “Now what”? With no one available to answer that question.Fortunately, this
    challenge has more to do with failing to “say the quiet part out loud” – a phrase
    that has become a favorite since beginning this work. Saying the quiet part out
    loud often means saying what no one else will or saying something that was missed
    by others. So, what is the quiet part that hasn’t been said in this instance?
    Imagine that a person asks if you have made a revision to a project, you understand
    that they are really asking when they will see the changes. Regarding frameworks,
    their creators have largely left the quiet part to the implementers, providing
    only terms and definitions – and no guidance on using them to do the work. It
    is the quiet part when doing ethics, that often matters most. Frameworks can be
    actionable and made practical. Terms and definitions can be made clear and explained
    to others, so each understands how they are seen by different roles, through different
    tasks, and by leadership. But this requires understanding where the discussion
    has gone off course. Technologists, AI ethicists, and users must begin to speak
    the same language and say their quiet parts out loud to facilitate this process.
    Each speaking to another but misunderstanding the others or being unwilling to
    leave the silos of our expertise to see things another way is part of the problem.
    There is a huge misunderstanding by technologists and developers about what ethicists
    *actually do*, and there are misunderstandings by users about what developers
    and technologists are creating and how ethicists can help. Let alone the host
    of others involved in this work. Talking past each other helps no one, progress
    is in the unsaid clarifications that have not been provided. This is a watershed
    moment, and it is time those involved with AI created and fostered strong non-adversarial
    relationships with the many people working in the field. This is not a reason
    to avoid ethics but rather a reason to do technology in a new way that merges
    ethics, technology, leadership, regulators, developers, and users (all those involved)
    working together toward a positive end. And that is doing AI ethics.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易产生这样的想法，即道德建议和指导缺乏支持人工智能创新所需的实用性。这是对人工智能伦理学家贡献和工作的一种误解或假设。开始进行道德工作的挑战之一是，收到的建议很少具有实用性。这种观点得到了许多原则、术语、定义和由此产生的分歧的支持。例如，信任的定义可能被解释、改变、细化或修订。在某些情况下，信任可能意味着不止一件事。当技术专家谈论信任时，他们通常指的是一个按程序运行的算法，而当用户讨论它时，他们正在考虑他们是否应该信任他们正在使用的应用程序或程序。然而，很少有人放慢脚步意识到这个挑战，也没有花时间去解释提供的或声称的信任类型。当建议以标准框架方法提供时，这种语言、术语和定义的挑战变得更加严重。虽然框架看起来是一个很好的工具，但许多组织领导者和一些最懂技术的人只看到了一个重要术语的列表，但没有方法使它们变得可操作或应用。这往往使那些试图解决伦理和技术问题的人感到困惑，“接下来怎么办”？没有人可以回答这个问题。幸运的是，这个挑战更多是因为没有“大声说出内心的想法”——这是一个自从开始这项工作以来就变得非常受欢迎的短语。大声说出内心的想法通常意味着说出别人不会说的话，或者说出别人忽略的事情。那么，在这个例子中，还有什么没有说出来的“内心的想法”？想象一下，如果有人问你是否对项目进行了修订，你明白他们实际上是在问他们何时会看到变化。关于框架，它们的创造者主要把“内心的想法”留给了实施者，只提供了术语和定义——而没有提供如何使用它们来完成工作的指导。在伦理工作中，最关键的是“内心的想法”。框架可以变得可操作并变得实用。术语和定义可以变得清晰并解释给他人，以便每个人都能理解它们在不同角色、不同任务和领导力下的看法。但这需要理解讨论偏离了什么方向。技术专家、人工智能伦理学家和用户必须开始使用相同的语言，大声说出他们的“内心的想法”，以促进这一过程。每个人都在对另一个人说话，但误解了他人，或者不愿意离开我们专业领域的隔阂，以另一种方式看待事物，这是问题的一部分。技术专家和开发者对伦理学家实际上做什么存在巨大的误解，用户对开发者和技术专家正在创建的内容以及伦理学家如何提供帮助也存在误解。更不用说其他参与这项工作的人了。相互之间说些无关紧要的话对任何人都没有帮助，进步在于那些尚未提供的未说出的澄清。这是一个转折点，是时候那些参与人工智能的人与该领域工作的许多人建立了强大且非对抗性的关系。这不是避免伦理的理由，而是一个以新的方式做技术，将伦理、技术、领导力、监管者、开发者和用户（所有相关人员）合并在一起，共同朝着积极目标努力的理由。这就是做人工智能伦理。
- en: Preferences Not Solutions
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 偏好而非解决方案
- en: 'Another practical challenge is that ethics does not work as a practical solution
    to anything. Instead, it’s merely people''s preferences. But this also lacks an
    important consideration: ethics is the foundation of law. Consider reduced speed
    zones near schools or important gathering spaces. Why are the reduced speeds required
    in those spaces? The straightforward answer is that someone noticed that fast-moving
    cars were dangerous in those locations. Then, they noticed that the danger was
    not an aberration or one-off circumstance but was instead a continuous threat.
    Finally, unofficial signs or crossing guards might be placed, hoping that drivers
    would reduce their speed. Whichever intervention was used, its success (warnings
    worked) or even the lack of success (still speeding) could lead to an official
    reduced speed sign being placed. But this is predicated on someone noticing a
    problem and intervening, the intervention being practical.In AI ethics, the same
    process exists. A problem is noted, and a solution is sought. Since the problem
    is tangible, the solution will also serve a practical purpose. This means that
    ethics is not some impractical attempt to address the impossible but rather a
    method to solve tangible problems and address them. In fact, **objectives and
    key results** (**OKRs**) and **Specific, Measurable, Achievable, Relevant, and
    Time-Based** (**SMART**) goals can be used in concert with ethical frameworks
    to provide tangible and measurable actions motivated by ethical concerns. This
    will be discussed more in future chapters, but for now, know that these processes
    will assist you in your ethical work. We often do not need to reinvent the wheel
    but use the knowledge we have to better serve our needs.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个实际的挑战是，道德并不能作为解决任何问题的实际方案。相反，它仅仅是人们的偏好。但这也缺少了一个重要的考虑：道德是法律的基础。考虑一下学校或重要集会场所附近的减速区域。为什么那些地方需要减速？直接的答案是有人注意到在这些位置快速行驶的汽车是危险的。然后，他们注意到这种危险并不是一个异常或一次性的情况，而是一个持续的威胁。最后，可能会放置非官方的标志或交通协管员，希望驾驶员会减速。无论使用了哪种干预措施，其成功（警告有效）或者甚至是不成功（仍然超速）都可能导致官方减速标志的设置。但这基于有人注意到问题并采取干预，干预措施是实用的。在人工智能伦理中，存在同样的过程。一个问题被注意到，然后寻求解决方案。由于问题是具体的，解决方案也将服务于实际目的。这意味着道德并不是一些不切实际的尝试去解决不可能的事情，而是一种解决具体问题和解决问题的方法。事实上，**目标与关键结果**（**OKRs**）和**具体、可衡量、可实现、相关和基于时间的**（**SMART**）目标可以与伦理框架结合使用，提供由伦理关切驱动的具体和可衡量的行动。这将在未来的章节中进一步讨论，但就目前而言，要知道这些过程将帮助你在伦理工作中。我们通常不需要重新发明轮子，而是使用我们已有的知识来更好地满足我们的需求。
- en: The Role of Ethicists
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 伦理学家的作用
- en: 'A final practical challenge of ethics work is determining the right placement
    within an organization for an ethicist. Who will they report to, what department
    will they belong to, and what will they do all day? Since ethicists are neither
    lawyers, HR specialists, nor developers who code, it might be tempting to think
    that finding someone with the above skills is the better choice and easier fit.
    Again, this is to misunderstand an ethicist''s purpose and value to organizations.First,
    the study of ethics falls under philosophy. Philosophy is distinct from the social
    sciences because of its adherence to logic as foundational (not coding or law).
    Logic, as the underpinning of philosophical inquiry, also means that it underpins
    ethics. This means that applied ethicists (distinct from theoretical ethicists)
    do not merely want to find an answer to a problem; they seek the right answer
    based on evidence and reason (logic), allowing them to provide strong justifications
    for their guidance. These philosophers are not theorists, though they are well-versed
    in theory. Instead, they want to see their solutions used in the world.Through
    this foundation, the applied ethicist’s problem-solving and fact-finding mission
    is closer to that of a lawyer who must know and understand the truth of a situation
    to assist their client. These ethicists are working on finding solutions to real-world
    problems and dilemmas. In fact, philosophers have a 75% admission rate to law
    school – a higher rate than any other major ([https://nationaljurist.com/prelaw/classics-philosophy-majors-do-best-when-it-comes-getting-law-school/](https://nationaljurist.com/prelaw/classics-philosophy-majors-do-best-when-it-comes-getting-law-school/)).
    When you retain a philosopher’s help, you engage with a critical thinker and meet
    a skilled problem solver – but without a law degree. It seems right to mention
    that developers, technologists, lawyers, and HR can be ethics-informed, but being
    an ethicist is a unique skill set and training that doesn’t exist outside philosophical
    training.Because of their drive to be compelled by facts and logic, ethicists
    make expert policy specialists who easily understand the positioning of legal
    recommendations, consequences, and impact in the world and on people. They are
    especially skilled at working in a lawless environment where regulations and policies
    are questioned because they do not rely on laws to do their work. Their natural
    working environment is exactly like the one in which AI exists today: complicated,
    lawless, ambiguous, and with many problems to solve.Yet, positioning ethicists
    within an organization is also an objection to fully embracing AI ethics. With
    the overlap between logic and problem-solving, an ethicist might be part of an
    ethics, legal, or technology team within a larger organization. An ethicist might
    be a board advisor, special advisor, director, or vice president at a small business.
    The goal would be to place them in roles with influence and adjacent to where
    decisions are being made. In a heavily regulated industry, annexing them with
    legal may be a strategic choice. If the industry is customer-facing, they should
    be positioned to assist HR but aligned with legal. For those dealing with cutting-edge
    technology, an ethicist should be positioned to assist both legally and with technology.Make
    no mistake: Applied ethicists are not attorneys, developers, or HR specialists,
    but they are uniquely qualified to address AI innovations. Similarly, developers,
    HR specialists, and attorneys do not have the skillset of an ethicist. The roles
    are not interchangeable but have tremendous value (*Further reading*, *Resources
    1, 2, and 3*).'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理工作的一个最终实际挑战是在组织中为伦理学家确定合适的职位。他们将向谁汇报，他们将属于哪个部门，他们将整天做什么？由于伦理学家既不是律师，也不是人力资源专家，也不是编写代码的开发者，因此可能会觉得找到具有上述技能的人是更好的选择，也更容易适应。然而，这又是对伦理学家在组织中的目的和价值的一种误解。首先，伦理学的学习属于哲学范畴。哲学之所以与社会科学不同，是因为它坚持逻辑作为基础（而不是编码或法律）。作为哲学探究的基础，逻辑也意味着它是伦理学的基础。这意味着应用伦理学家（与理论伦理学家不同）不仅仅想要找到一个问题的答案；他们寻求基于证据和理由（逻辑）的正确答案，从而能够为他们提供的指导提供强有力的论证。这些哲学家不是理论家，尽管他们对理论很精通。相反，他们希望看到他们的解决方案在世界中得到应用。通过这个基础，应用伦理学家的解决问题和查找事实的任务与律师相似，律师必须知道和理解情况的真实性以协助他们的客户。这些伦理学家正在努力寻找解决现实世界问题和困境的方案。事实上，哲学家有75%的入学率进入法学院——这是所有专业中最高的([https://nationaljurist.com/prelaw/classics-philosophy-majors-do-best-when-it-comes-getting-law-school/](https://nationaljurist.com/prelaw/classics-philosophy-majors-do-best-when-it-comes-getting-law-school/))。当你聘请哲学家的帮助时，你将接触到一位批判性思维者，并遇到一位熟练的问题解决者——但他们没有法学学位。似乎有必要指出，开发者、技术专家、律师和人力资源专家可以具有伦理意识，但伦理学家是一个独特的技能集和培训，这种技能和培训在哲学培训之外是不存在的。由于他们被事实和逻辑所驱使，伦理学家成为专家政策专家，他们能够轻松理解法律建议、后果和影响在世界和人们身上的定位。他们在处理法规和政策受到质疑的无序环境中特别擅长，因为他们不依赖法律来完成他们的工作。他们的自然工作环境与今天存在的AI环境非常相似：复杂、无序、模糊，并且有许多问题需要解决。然而，在组织中定位伦理学家也是完全接受AI伦理的一个反对意见。由于逻辑和解决问题的重叠，伦理学家可能是一个大型组织中的伦理、法律或技术团队的一部分。伦理学家可能是一家小企业的董事会顾问、特别顾问、总监或副总裁。目标是将他们安置在具有影响力的角色中，并且靠近决策制定的地方。在一个高度监管的行业中，将他们与法律部门合并可能是一个战略选择。如果行业面向客户，他们应该定位为协助人力资源部门，但与法律部门保持一致。对于那些处理尖端技术的人来说，伦理学家应该定位为在法律和技术两方面提供帮助。不要误解：应用伦理学家不是律师、开发者或人力资源专家，但他们独特地有资格解决AI创新问题。同样，开发者、人力资源专家和律师都没有伦理学家的技能集。这些角色不可互换，但具有巨大的价值（*进一步阅读*，*资源1、2和3*）。
- en: Overcoming Perfection and Ideal Theories in Ethics
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 克服伦理中的完美和理想理论
- en: 'The goals of perfection and ideals have often hindered applied ethics (ethics
    in the world). This is because they are unattainable. For many the desire to do
    things perfectly is a challenge that must be overcome. Voltaire once said that
    “perfection is the enemy of the good.” And it is the good that we seek when engaging
    with ethics. Rather than perfect work we would be better served by understanding
    what perfection might be while aiming for excellence in our work today.Let’s direct
    our attention to the challenge of **perfection in AI ethics**. Many believe that
    since we cannot master or perfect – or guarantee perfection – in AI ethics, we
    might not consider engaging with it at all. Again, the default answer to this
    is to wait for regulation – and while it’s coming, it’s not here now, and many
    situations cannot or will not be addressed by them. And yet, it is true that ethics
    is unlikely to make things perfect now or in the future. There are too many variables,
    more innovations to follow, bad actors, and a host of other challenges awaiting
    us in the future. Failure to engage in this work does not prevent or allow us
    to avoid these challenges. They will still appear and make themselves known worldwide
    through publicity, lawsuits, loss of market share, reputational hits, or worse.So,
    while ethicists cannot guarantee perfection (and no one can), they are able to
    assist organizations and users in adopting AI and mitigating the damage it can
    cause. They are also more likely to benefit you through publicity, protecting
    your reputation, and avoiding lawsuits – essentially the opposite of everything
    listed above. While there are no *magic wands* to prevent all the bad, it still
    seems that seeking the good is a better idea than avoiding it. And your attorneys
    will thank you for helping them make an argument on your behalf if something does
    go wrong.After all, your statement to your attorney in case of a public mistake
    or problem would look like this:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 完美和理想的目标常常阻碍了应用伦理（世界中的伦理）。这是因为它们是无法实现的。对许多人来说，追求完美是一个必须克服的挑战。伏尔泰曾经说过：“完美是好的敌人。”当我们参与伦理时，我们寻求的是好。与其追求完美的工作，不如在今天的工作中追求卓越，同时理解完美可能是什么。让我们将注意力转向**人工智能伦理中的完美挑战**。许多人认为，由于我们无法掌握或完善——或者保证完美——人工智能伦理，我们可能根本不会考虑参与其中。再次强调，默认的答案仍然是等待监管——虽然它在路上，但现在还没有到来，许多情况无法或不会通过它们得到解决。然而，确实，伦理现在或将来不太可能使事情变得完美。变量太多，还有更多的创新要跟进，有不良行为者，以及未来等待我们的其他一系列挑战。不参与这项工作并不能阻止或允许我们避免这些挑战。它们仍然会出现，并通过宣传、诉讼、市场份额的损失、声誉打击或更糟糕的事情在全球范围内为人所知。所以，虽然伦理学家不能保证完美（没有人可以），但他们能够帮助组织和个人采用人工智能并减轻它可能造成的损害。他们还更有可能通过宣传、保护你的声誉和避免诉讼来为你带来好处——这基本上是上述所有内容的反面。虽然没有魔法棒可以防止所有的不良行为，但寻求善似乎比避免它更好。如果出了问题，你的律师会感谢你帮助他们为你辩护。毕竟，如果你在公共错误或问题发生时向你的律师陈述，可能会是这样的：
- en: “Our actions conformed to all applicable laws.”
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我们的行为符合所有适用的法律。”
- en: “There are no laws governing this; our actions conformed to all applicable laws.”
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这里没有适用的法律；我们的行为符合所有适用的法律。”
- en: “We look forward to a time when laws are enacted the provide guidance in these
    circumstances.”
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我们期待着有法律出台，为这些情况提供指导。”
- en: 'Or it could look like the following statement:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 或者它可能看起来像以下这样的陈述：
- en: “Unfortunately, a situation occurred that no one anticipated, but we are committed
    to doing what is needed to remedy this – and to continue to make the best choices
    possible, to find the best answers, and adhere to ethical best practices.”
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “不幸的是，发生了一种没有人预料到的情况，但我们承诺去做需要做的事情——并且继续做出可能的最优选择，找到最好的答案，并遵守道德的最佳实践。”
- en: While an attorney would have to vet and improve these statements, it seems that
    in the absence of violating laws, the priority would be to care for those impacted
    and a nod to ethics. The last statement is the only one that acknowledges this.Unfortunately,
    the statement often relied upon is the first one. Doubly unfortunate is that it
    is the one customer cares about least. The fact that you made a choice you were
    sure you couldn’t be sued over offers nothing to your customers or users and resonates
    as self-protection or self-serving. The second statement fares only slightly better
    since it focuses on the laws that weren’t broken, leading to the perception that
    your interests trump theirs. And softening it by promising to follow future regulations
    also hints that you will continue as you have until new laws are passed. Again,
    these offer nothing to those you serve. While doing AI ethics is challenging,
    bypassing it because it cannot be perfect and offers little to organizations,
    customers, users, or the greater public. And they know that, too.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然律师可能需要审查和改进这些声明，但似乎在没有违反法律的情况下，优先考虑的是关心受影响的人，并对伦理表示认可。最后一条声明是唯一承认这一点的。不幸的是，经常依赖的声明是第一条。双倍不幸的是，这是客户最不关心的声明。你做出了一个你确信不会因此被起诉的选择，对你的客户或用户没有任何帮助，听起来像是自我保护或自我服务。第二条声明表现略好，因为它关注的是未违反的法律，导致人们产生你的利益高于他们的印象。通过承诺遵守未来的法规来软化它，也暗示你将继续按照原来的方式行事，直到新的法律出台。同样，这些对服务你的人没有任何帮助。虽然进行人工智能伦理是具有挑战性的，但因为它不完美且对组织、客户、用户或更广泛的公众贡献甚微，所以绕过它是不可取的。他们也知道这一点。
- en: Ideal Theory
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理想理论
- en: On the other side of perfection is the concept of AI ethics as an **ideal theory**.
    To explain this objection to engaging in AI ethics, we must first explain what
    ideal theories are in philosophy. In this instance, an ideal theory is a certain
    kind of perfect world to have as a goal. This means that ideal theories are not
    able to be realized but instead can be used to identify where the challenges are
    and the problems and harms that need to be resolved or improved.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在完美的另一面是人工智能伦理作为一个**理想理论**的概念。为了解释参与人工智能伦理的这种反对意见，我们首先必须解释在哲学中理想理论是什么。在这种情况下，理想理论是一种作为目标追求的某种完美世界。这意味着理想理论无法实现，但可以用来确定挑战所在，以及需要解决或改进的问题和危害。
- en: Ideal Theory
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 理想理论
- en: ''
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: An ideal theory is meant to identify problems in an existing situation or circumstance
    by identifying the ideal situation or circumstance, revealing the true nature
    of the challenges and their potential solution. The ideal theory is a goal or
    aim that directs and informs the needed changes.
  id: totrans-64
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 理想理论旨在通过确定理想的情况或环境来识别现有情况或环境中的问题，揭示挑战的真实性质及其潜在解决方案。理想理论是一个目标或目的，它指导并告知所需的变化。
- en: In AI ethics, the challenge is analogous. Some believe ethical technology is
    impossible since technology makes mistakes and cannot be perfect. After all, there
    will always be bad actors, changes in the environment, future innovations with
    glitches, etc. The general idea is that since we cannot correct everything and
    we are chasing the impossible, it is pointless to begin the work. This can be
    tempting to believe, and it is highly likely that ethicists have also confronted
    this thought. After all, ethicists have been laid off en masse at certain organizations,
    and there is much pushback against their work. For every problem solved, fifty
    to thousands more appear.While ethicists have learned to overcome the challenges
    of their field. Others use this challenge to avoid the work of doing ethics. Here,
    as with perfection, failure to attain an ideal has led to some abandoning the
    work involved in improvement. Yet, again, this abandonment is unwise since the
    alternative is to accept no improvement in the state of technology’s challenges
    and problems. It means to accept a world unimproved and not bettered even when
    better is possible. It is a mistake to focus on an ideal when any improvement
    beyond the now is still an improvement, and settling for less can lead to more
    harm.Ethics is not an easy path, even for the ethicist. But to deem it unworthy
    of exploration or to do the work is counter to the best interests of everyone
    and the organizations whose ability to thrive depends on their relationships with
    people outside of their offices and structure. AI has a global impact, and its
    consequences are felt around the globe. Surely, the world deserves the effort
    and investment to do what we can while looking for ways to do more.In parenting,
    it is often said that when you know better, you will do better. An argument that
    requires ideals and perfection is akin to saying that knowing better should lead
    to no change or improvement.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '在人工智能伦理学中，挑战是类似的。有些人认为伦理技术是不可能的，因为技术会出错，无法完美。毕竟，总会有不良行为者，环境变化，带有缺陷的未来创新等。一般观点是，既然我们无法纠正一切，我们追求的是不可能的事情，那么开始这项工作是没有意义的。这可能会让人信服，而且伦理学家很可能也面临过这种想法。毕竟，某些组织大量裁员，而且对他们的工作有很多反对意见。每当一个问题得到解决，就会有五十到数千个新的问题出现。虽然伦理学家已经学会了克服他们领域的挑战，但其他人却利用这个挑战来避免做伦理工作。在这里，就像追求完美一样，未能达到理想导致一些人放弃了改进工作。然而，再次强调，放弃是不明智的，因为接受技术挑战和问题的状态不改进，甚至当有可能改进时也不改进。当任何超出现在的改进仍然是改进时，专注于理想是一种错误，满足于现状可能导致更大的伤害。伦理学对伦理学家来说不是一条容易的道路，但认为它不值得探索或进行这项工作，这与每个人的最佳利益以及那些依赖与办公室外和结构外的人的关系来繁荣发展的组织的最佳利益相悖。人工智能具有全球影响，其后果在全球范围内都能感受到。当然，世界值得付出努力和投资，在寻找做更多事情的方法的同时，尽我们所能去做。在育儿方面，人们常说，当你知道得更多时，你会做得更好。需要理想和完美的论点类似于说，知道得更多应该导致没有变化或改进。 '
- en: Challenging Frameworks
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 具有挑战性的框架
- en: We have already explored the objections to determining the ethical principles
    that fit frameworks and the difficulty in arriving at a practical or recommended
    action from merely a principle. But there are other objections too.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经探讨了确定适合框架的伦理原则的反对意见以及仅从原则出发得出实用或推荐行动的困难。但还有其他反对意见。
- en: Cultural Relativism
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文化相对主义
- en: When evaluating a principle for a framework, the culture of the entity evaluating
    it will make a value judgment about it (determining if it is good or bad or how
    it should be perceived). However, what is ethically acceptable in one culture
    may be rejected in another. This challenge is especially relevant to AI since
    it can be deployed globally. Here, commonality can also assist this process through
    popularity or acceptance but through an evaluation of underlying principles that
    reveal the reasons why the challenge exists. For example, European nations have
    a different ethic of care embedded in society than the United States. This does
    not mean the US is uncaring or the EU is overinvested in care. Instead, this review
    reveals that care matters but is demonstrated differently.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 当评估框架的原则时，评估实体的文化将对它做出价值判断（确定它是好是坏或应该如何被看待）。然而，在一种文化中被认为是道德可接受的，在另一种文化中可能被拒绝。这个挑战对于人工智能尤其相关，因为它可以在全球范围内部署。在这里，共同性也可以通过流行或接受来帮助这个过程，但通过评估揭示挑战存在原因的基本原则。例如，欧洲国家在社会中嵌入的护理伦理与美国不同。这并不意味着美国不关心，或者欧盟过度投资于护理。相反，这次审查揭示出关心很重要，但表现方式不同。
- en: Incomplete and Rigid Frameworks
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不完整和僵化的框架
- en: It can also be said that frameworks can also be both incomplete and rigid. This
    is because frameworks can appear to leave important considerations out or only
    remain fixed on a few main ideas. For those looking for differences, a lot of
    information would appear to be missed and left out altogether. This does not need
    to be the case. Instead, frameworks can be expanded to include new priorities
    or new information. Here, the challenge is to view applied ethics as responsive
    to changing dynamics and innovation. Additionally, while a *line in the sand*
    is needed to begin work and to make progress, regular reviews allow for expansion
    and the flexibility that we just mentioned. In a society that is not static, with
    technology that is not static, there is no reason that ethical guidance should
    be static, too. Still, just as a product launch has to occur at some point, there
    must be a moment for ethics work to begin. Review, refinement, and adaptation
    are required in AI ethics and technology.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以说框架既可能不完整又可能僵化。这是因为框架可能看起来遗漏了重要的考虑因素，或者仅仅固定在几个主要观点上。对于那些寻找差异的人来说，大量的信息似乎被遗漏并完全被忽略。这种情况并不一定发生。相反，框架可以被扩展以包括新的优先事项或新的信息。在这里，挑战在于将应用伦理视为对变化动态和创新的响应。此外，虽然需要一条“底线”来开始工作并取得进展，但定期的审查允许扩展和我们所提到的灵活性。在一个非静态的社会中，技术也不是静态的，没有理由说道德指导也应该是静态的。然而，正如产品发布必须在某个时刻发生一样，道德工作也必须有一个开始的时刻。在人工智能伦理和技术中，需要审查、改进和适应。
- en: Bias in Frameworks
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 框架中的偏见
- en: Just as bias exists in our society and all people within society, bias is also
    a challenge for ethicists. As a result, it is possible for biases to creep into
    frameworks. Ethicists are not perfect or some unfailing examples of moral good.
    Instead, they are fallible and susceptible to cultural ideas and their own perceptions.
    They do not somehow get a pass from their own humanity or weaknesses. Still, ethicists
    are trained to root out their own preconceived ideas, to challenge their thoughts,
    and to not accept weak answers even in defense of their own views. Self-reflection
    is required for all ethicists to do their work and to ensure that if there is
    alignment in their own views to a recommendation, they have examined the possibility
    that bias is steering them.It is also possible that ethicists could be biased
    towards ethical theories or principles. This could find its way into frameworks,
    making them less about the work to be done and more about the views of the philosopher.
    The degree of self-reflection and transparency that are required to do this work
    is why philosophical training should be required for those leading ethical AI
    initiatives. If a different lead is chosen, the likelihood of ethical initiatives
    reflecting a leader’s views rather than an impartial reflection of what’s needed
    greatly increases.Let’s move on to doing ethics next.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 正如偏见存在于我们的社会以及社会中的所有人一样，偏见也是伦理学家面临的挑战。因此，偏见可能会悄悄地渗透到框架中。伦理学家并非完美或道德善良的不朽典范。相反，他们是会犯错的，容易受到文化观念和自身认知的影响。他们并没有从自己的人性或弱点中得到豁免。然而，伦理学家接受过训练，以根除自己的先入之见，挑战自己的思想，即使在捍卫自己观点时也不接受薄弱的答案。所有伦理学家都必须进行自我反思，以确保如果他们的观点与建议一致，他们已经检查了偏见引导他们的可能性。伦理学家也可能对伦理理论或原则有偏见。这可能会在框架中找到其位置，使得框架更多地关乎哲学家观点，而不是待完成的工作。为了完成这项工作所需的自我反思和透明度，为什么那些领导伦理人工智能倡议的人需要接受哲学训练。如果选择不同的领导，伦理倡议反映领导者的观点而不是对所需内容的公正反映的可能性大大增加。让我们继续讨论如何做伦理学。
- en: Doing Ethics
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 做伦理学
- en: In this chapter, we have addressed the many reasons that are given for not engaging
    in ethical work. But more than a reason not to do ethics, it is important to consider
    if there are reasons or a good argument to do ethics. After all, saying a person
    shouldn’t do one thing isn’t a good reason for why they should do another. In
    other words, a no to one idea doesn’t immediately lead to a yes for the opposite.
    Instead, the answer to why you should do ethics is quite different.To do ethics
    is to recognize our troubled world includes traumatized and harmed people who
    should not be made worse by our efforts or innovations. The motivation to do ethics
    is a choice between futures – one of optimism and one of harm.The future of harm
    involves staying the course. It is a world full of bias, harm, stereotypes, and
    lost opportunities for everyone. It’s a world where we become unable to fully
    engage with others and where our technology fails to understand our challenges.
    It’s a world where chatbots and algorithms make choices as though they are neutral
    in a world that has no neutrality or objectivity. Explanations of the harm default
    to legal requirements and a demand for better regulation that cannot be passed
    nor agreed upon. Technology is developed based on profit rather than need, and
    the initiatives that can help the world fall to the wayside under a profit model
    or are left to philanthropy. That world looks a lot like this one, but worse.There
    is another possible future. It’s not the best of all possible worlds, but it's
    improving daily. Bias, harm, and stereotypes are addressed and mediated through
    technology, self-awareness, and self-improvement. More opportunities for us are
    made available and possible through innovation. We are realizing, again, the importance
    of engaging with each other and recognizing just how much (and how little) our
    technology understands our world. We admit that even technology’s choices are
    ours – coded as capabilities to help us. Explanations of harm involve accountability
    and responsibility while maintaining profit along with the protection of people
    and our world. Regulations are valued for what they offer, and ethics is recognized
    for its ability to fill in the gaps as technology advances. Technology emphasizes
    the world's needs and profit, noting that a failure to address needs leaves profit
    in doubt. Philanthropy, profit, and innovation are partners driving a better world
    – and people are made better for it.These different worlds are examples of ideal
    theory since we can clearly see what is wrong in society and its relationship
    to technology, and by extension, we understand what should be made better.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了不参与道德工作的许多原因。但除了不进行道德工作的理由之外，考虑是否有理由或合理的论据来支持进行道德工作同样重要。毕竟，说一个人不应该做某件事并不是他们应该做另一件事的好理由。换句话说，对一种想法的否定并不立即导致对相反想法的肯定。相反，为什么应该进行道德工作的答案与这个答案截然不同。进行道德工作意味着认识到我们的世界充满了受到创伤和伤害的人们，他们不应该因为我们的努力或创新而变得更糟。进行道德工作的动机是在未来之间做出选择——一个是乐观的，另一个是伤害的。伤害的未来涉及坚持现状。这是一个充满偏见、伤害、刻板印象和每个人失去机会的世界。这是一个我们无法完全与他人互动的世界，我们的技术无法理解我们的挑战。这是一个聊天机器人和算法像在一个没有中立性或客观性的世界中一样做出选择的世界。对伤害的解释默认为法律要求和对更好监管的需求，这种监管无法通过或达成共识。技术是基于利润而不是需求来开发的，那些可以帮助世界的倡议在利润模式下被边缘化，或者留给慈善事业。那个世界看起来很像这个，但更糟。还有一种可能性的未来。它不是所有可能世界中最好的，但它每天都在改善。偏见、伤害和刻板印象通过技术、自我意识和自我改进得到解决和调解。通过创新，为我们提供了更多可能的机会。我们再次意识到，相互交流和认识到我们的技术对世界的理解（以及理解得多么少）的重要性。我们承认，即使是技术的选择也是我们的——编码为帮助我们的能力。对伤害的解释涉及问责制和责任，同时保持利润，并保护人们和我们的世界。法规因其提供的价值而受到重视，道德因其填补技术进步中空白的能力而被认可。技术强调世界的需求和利润，指出未能满足需求会使利润变得可疑。慈善事业、利润和创新是推动更美好世界的伙伴——而且人们因此变得更好。这些不同的世界是理想理论的例子，因为我们可以清楚地看到社会及其与技术的关系中存在的问题，并且由此延伸，我们理解了什么应该得到改善。
- en: Broken Mirror Theory
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 破碎的镜子理论
- en: 'But there is another theory that is equally helpful to doing ethics: **broken
    mirror theory**. This theory states that technology, data, and societal challenges
    provide a true reflection of society but that our temptation will be to clean
    the data or undertake performative actions (thereby improving our reflection)
    while avoiding the societal work needed to prevent them.In other words, broken
    mirror theory is another way to avoid doing ethics, but it also provides insight
    into what we must fix in ourselves, not just our technology. This is because our
    technology reflects our unconscious biases, our disregard for others and the environment,
    our failure to engage with the care or support of developing nations, our hatred,
    our anger, and our frustrations. Our data, technology (such as generative AI’s
    output), and how we treat each other (which eventually ends up in our data) all
    make clear that a needed component of this is our own change and development.
    AI is not only a watershed moment for tech but also one for us.A necessary component
    of ethical AI is training and educating users, developers, deployers, organizations,
    and all who interact with or create our technology. Doing ethics then will involve
    all of us as a society meeting this moment as well.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 但还有一个理论对进行伦理学同样有帮助：**破碎的镜子理论**。这个理论指出，技术、数据和 societal challenges 提供了社会的真实反映，但我们的诱惑将是清理数据或采取表演性行动（从而改善我们的反映），同时避免防止这些社会工作的需要。换句话说，破碎的镜子理论是避免进行伦理学的另一种方式，但它也为我们必须在我们自己身上修复的东西提供了洞察，而不仅仅是我们的技术。这是因为我们的技术反映了我们的无意识偏见，我们对他人和环境的不尊重，我们未能与正在发展的国家的关怀或支持进行互动，我们的仇恨、愤怒和挫折。我们的数据、技术（如生成式
    AI 的输出），以及我们如何对待彼此（最终会反映在我们的数据中），都清楚地表明，这个必要组成部分是我们自己的变化和发展。AI 不仅是一个技术上的分水岭时刻，也是一个对我们自己的时刻。道德
    AI 的一个必要组成部分是培训和教育用户、开发者、部署者、组织以及所有与或创造我们技术互动的人。那么，进行伦理学将涉及我们作为一个社会迎接这一时刻。
- en: Broken Mirror Theory
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 破碎的镜子理论
- en: ''
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Technology, data, and societal challenges provide a true reflection of society,
    but our temptation will be to clean the data or undertake performative actions
    (thereby improving our reflection) while avoiding the societal work needed to
    prevent them.
  id: totrans-80
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 技术、数据和 societal challenges 提供了社会的真实反映，但我们的诱惑将是清理数据或采取表演性行动（从而改善我们的反映），同时避免防止这些社会工作的需要。
- en: Unfortunately, the tendency is to bypass this work through another method, and
    that is through **washing**. Washing is a concept where organizations and people
    hope to gain positive attention by making claims about their ethical initiatives
    that are not supported by actions or facts. This process has been used in ethics,
    DEI, work from home, and many other initiatives that have proven difficult to
    do without the assistance of ethicists.In AI ethics, the problem is more challenging
    when the most pervasive example of ethics-washing is the hiring and then quiet
    firing of entire AI ethics departments. Or dispersing ethical voices across an
    organization preventing collaboration or raising of challenges. This is occurring
    at some of the largest technology firms including Microsoft, Meta, Twitter, Google,
    and Amazon. Apple so far has fared rather well but is only new to embracing AI.
    Overall, in tech, the unofficial motto is to cheer ethics in AI while removing
    teams or collaborative efforts specifically tasked with ethical work.And what
    of AI companies? Anthropic was supposed to be one of the good AI companies, focusing
    on ethics. And it, too, fell to the pressure of the tech industry and is in the
    process of fighting AI regulation, has financial ties to Google and Amazon, and
    is accused of mass data scraping. Competition and a drive for profit has even
    pushed this “good one” to teeter or cross the line of the good into the not good.
    Meanwhile, OpenAI disbanded its AI risk team with leadership defecting to other
    organizations.Yet each company mentioned still relies on their claims of responsible
    AI through trust, safety, risk mediation, and ethics. Even as all have struggled
    to provide with any consistency the good, ethical, innovation and oversight they
    have promised.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，趋势是绕过这项工作通过另一种方法，那就是通过**洗白**。洗白是一个概念，其中组织和人们希望通过关于他们道德倡议的声明来获得积极的关注，而这些声明没有得到行动或事实的支持。这个过程在道德、DEI（多样性、平等与包容）、远程办公以及许多其他证明没有伦理学家协助就难以完成的倡议中已被使用。在人工智能伦理中，当最普遍的洗白例子是雇佣然后悄无声息地解散整个AI伦理部门，或者在一个组织中分散道德声音，阻止协作或提出挑战时，问题变得更加具有挑战性。这发生在包括微软、Meta、Twitter、谷歌和亚马逊在内的几家最大的科技公司中。到目前为止，苹果的表现相当不错，但它只是刚开始拥抱人工智能。总的来说，在科技领域，非官方的座右铭是在人工智能中高喊道德，同时移除或解散专门负责道德工作的团队或协作努力。那么AI公司呢？Anthropic本应是一家好的AI公司，专注于伦理。然而，它也屈服于科技行业的压力，正在努力反对AI监管，与谷歌和亚马逊有财务联系，并被指控大规模数据抓取。竞争和利润驱动的追求甚至将这个“好人”推向了摇摆不定或越过从好到不好的界限。与此同时，OpenAI解散了其AI风险团队，领导层跳槽到其他组织。然而，上述提到的每家公司仍然依赖于他们关于负责任人工智能的声明，通过信任、安全、风险调解和伦理来实现。
- en: Ethics Washing
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 道德洗白
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It is a term used by organizations and people to describe the practice of misrepresenting
    their ethical commitments and social responsibility to be more positive than they
    are to gain trust.
  id: totrans-84
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是一个由组织和人们用来描述他们道德承诺和社会责任被错误表述为比实际情况更积极以获得信任的术语。
- en: This avoidance, now the status quo at many organizations, is also a choice between
    the two worlds first discussed. Some resist a world where DEI, the environment,
    and social issues bring about change. However, change has already arrived through
    younger generations, technology, and potential harms that are waiting for us.
    If there were one situation or circumstance that might impede progress on AI ethics,
    it is that we are working on engaging ethics in a world and industry that has
    not yet fully embraced it.In addition to ethics-washing in general, it can apply
    to specific tasks in AI such as collecting, evaluating, and telling the story
    of data. Each of these can be flawed or merely influenced by deeply held ideas
    (biases both positive and negative). Even where to source data are not neutral
    as certain resources may be favored over others. Finally, the story the data tells
    can be influenced by needs, preferences, and biases. And each of these influences
    may be tied to data analysts but also the organization or interests that use them.
    The interesting thing about data is how much of the process is subject to narrowing
    choices, decision-making, and biases entrenched in our world.There is always a
    choice to do ethics, to avoid it, or to question its worth. And with choices come
    their corresponding consequences, benefits, risks, and responsibility.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这种避免，现在已成为许多组织的常态，也是对两个世界首先讨论的选择之一。有些人抵制一个由DEI（多样性、平等与包容）、环境和社交问题带来变革的世界。然而，变革已经通过年轻一代、技术和等待我们的潜在危害而到来。如果有一个情况或环境可能会阻碍人工智能伦理的进步，那就是我们在一个和行业中工作，这个和行业还没有完全接受它。除了普遍的伦理漂白之外，它还可以应用于人工智能的特定任务，如收集、评估和讲述数据的故事。这些都可以是有缺陷的，或者仅仅受到根深蒂固的思想（正面和负面的偏见）的影响。甚至数据来源也不是中立的，因为某些资源可能被优先考虑。最后，数据所讲述的故事可能受到需求、偏好和偏见的影响。而且，这些影响可能与数据分析师以及使用它们的组织或利益相关者有关。有趣的是，数据的过程中有多少是受到我们世界中狭窄的选择、决策和根深蒂固的偏见的影响。我们总是可以选择进行伦理工作、避免它或质疑其价值。随着选择的出现，随之而来的是相应的后果、利益、风险和责任。
- en: Summary
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The complicated nature of *doing ethics* should now be clear. Those new to philosophy
    may find themselves feeling stressed and overwhelmed by the path ahead. Others
    may be excited to begin. Either or any reaction to the insights provided here
    is to be expected. If ethics were meant for everyone, there would be far more
    people majoring in the subject. The good news is that there are experts who can
    make this process less intimidating, and there are ethics-informed voices that
    can make even the expert insight better. Notice easiness was not mentioned because
    this work is difficult. But it remains worthy of our attention and efforts. And
    while there are arguments that seem reasonable to dissuade us from the work at
    hand, they can be challenged and overcome.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 进行伦理工作的复杂性质现在应该是清晰的。那些刚开始学习哲学的人可能会发现自己感到压力和不知所措。其他人可能会兴奋地开始。对这里提供的见解的任何反应都是可以预料的。如果伦理是为每个人准备的，那么主修这个学科的人会更多。好消息是，有专家可以使这个过程不那么令人畏惧，而且有基于伦理的声音可以使专家的见解更加完善。没有提到容易，因为这项工作是有难度的。但它仍然值得我们关注和努力。尽管有似乎合理的论点来劝阻我们进行手头的工作，但它们可以被挑战和克服。
