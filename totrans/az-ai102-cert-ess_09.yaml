- en: Which of the following best describes the purpose of the `AgentGroupChat` class
    in the Semantic Kernel `AgentChat` framework?
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪个最好地描述了 `AgentGroupChat` 类在语义内核 `AgentChat` 框架中的作用？
- en: It only supports interactions between agents of the same type
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它仅支持同一类型的代理之间的交互
- en: It is an abstract class that must be subclassed to enable multi-agent interactions
  id: totrans-220
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它是一个抽象类，必须被子类化才能启用多代理交互
- en: It acts as a static configuration file for defining system prompts
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它充当定义系统提示的静态配置文件
- en: It facilitates interaction between multiple agents and uses strategic mechanisms
    to manage the dynamics of the conversation
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它促进了多个代理之间的交互，并使用战略机制来管理对话的动态
- en: '**Correct** **answer**: D'
  id: totrans-223
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确** **答案**：D'
- en: What is the purpose of a termination strategy in the Semantic Kernel Agent Framework?
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语义内核代理框架中终止策略的目的是什么？
- en: It determines when a conversation should end based on defined logic
  id: totrans-225
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它根据定义的逻辑确定何时结束对话
- en: It ensures that only one agent can speak at a time
  id: totrans-226
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它确保一次只有一个代理可以发言
- en: It defines how the conversation should be routed between different agents
  id: totrans-227
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它定义了不同代理之间对话应该如何路由
- en: It stores previous conversations for long-term memory
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它存储之前的对话以供长期记忆
- en: '**Correct** **answer**: A'
  id: totrans-229
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确** **答案**：A'
