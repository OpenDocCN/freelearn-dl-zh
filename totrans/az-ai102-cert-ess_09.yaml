- en: '9'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Implementing Agentic Solutions with Azure AI Agent Service
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Azure AI代理服务实现代理解决方案
- en: 'In this chapter, we’ll explore how to design, configure, and implement intelligent
    agentic solutions using Azure AI Agent Service and supporting frameworks such
    as Semantic Kernel and AutoGen. We’ll guide you through the foundational concepts,
    walk through deployment strategies, and introduce advanced multi-agent orchestration
    workflows. The content is designed to help you build a solid foundation in agentic
    architecture across different frameworks—preparing you both to pass the *AI-102:
    Azure AI Engineer Associate Certification* exam and to confidently apply these
    concepts in real-world solutions.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何使用Azure AI代理服务和支持框架（如语义内核和AutoGen）设计、配置和实现智能代理解决方案。我们将引导你了解基础概念，介绍部署策略，并介绍高级多代理编排工作流程。内容旨在帮助你建立不同框架下的代理架构坚实基础——既为通过*AI-102：Azure
    AI工程师助理认证*考试做准备，也让你能够自信地将这些概念应用于实际解决方案。
- en: 'By the end of this chapter, you will be able to do the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将能够做到以下事项：
- en: Understand the role and use cases of AI agents
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解AI代理的角色和用例
- en: Configure Azure resources to support agent development
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置Azure资源以支持代理开发
- en: Build an agent using Azure AI Agent Service
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Azure AI代理服务构建代理
- en: Implement advanced agents with Semantic Kernel and AutoGen
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用语义内核和AutoGen实现高级代理
- en: Orchestrate complex workflows involving multiple agents and users
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协调涉及多个代理和用户的复杂工作流程
- en: Test, optimize, and deploy agents for production use
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试、优化和部署用于生产使用的代理
- en: To begin building effective agentic solutions, it’s important to first understand
    what AI agents are, how they function, and where they can add value. This foundational
    knowledge will guide your design decisions across various development tools and
    use cases.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始构建有效的代理解决方案，首先了解AI代理是什么、它们如何工作以及它们可以在哪里创造价值是非常重要的。这种基础知识将指导你在各种开发工具和用例中的设计决策。
- en: Understanding AI agents and their use cases
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解AI代理及其用例
- en: An AI agent is a software-based entity capable of autonomously reasoning, planning,
    and executing tasks to achieve a specific goal. Unlike traditional automation
    scripts or static bots, agents are dynamic, context-aware, and equipped to perform
    complex operations such as tool use, memory management, and decision-making.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理是一种基于软件的实体，能够自主推理、规划和执行任务以实现特定目标。与传统自动化脚本或静态机器人不同，代理是动态的、上下文感知的，并能够执行复杂操作，如工具使用、内存管理和决策。
- en: For example, a healthcare provider might develop an AI agent to assist clinicians
    with patient record summarization. This agent could integrate with **Electronic
    Health Records** (**EHR**) systems and use a **Large Language Model** (**LLM**)
    to extract relevant clinical details such as diagnoses, medications, and lab results.
    It can summarize this information into a concise note for the clinician ahead
    of patient consultations. In addition, the agent can use tool calling to fetch
    the latest treatment guidelines from medical knowledge bases and alert clinicians
    about potential drug interactions. Over time, the agent can also learn provider
    preferences, improving the structure and focus of its summaries.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，医疗保健提供者可能会开发一个AI代理来协助临床医生进行患者记录摘要。这个代理可以与**电子健康记录**（**EHR**）系统集成，并使用**大型语言模型**（**LLM**）提取相关的临床细节，如诊断、药物和实验室结果。它可以将这些信息总结成简短的笔记，供临床医生在患者会诊前参考。此外，代理可以使用工具调用从医学知识库中获取最新的治疗指南，并提醒临床医生潜在的药物相互作用。随着时间的推移，代理还可以学习提供者的偏好，改善其摘要的结构和重点。
- en: 'According to Microsoft Learn, an AI agent has the following characteristics:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Microsoft Learn，AI代理具有以下特征：
- en: '**Reasoning**: The agent can evaluate a goal and determine whether it has sufficient
    information to proceed'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理**：代理可以评估目标并确定是否拥有足够的信息继续进行'
- en: '**Planning**: If required, the agent can generate a series of steps or sub-tasks
    to achieve the goal'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规划**：如果需要，代理可以生成一系列步骤或子任务以实现目标'
- en: '**Action-taking**: It can perform actions such as invoking APIs, querying knowledge
    bases, and interacting with other systems'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行操作**：它可以执行诸如调用API、查询知识库和与其他系统交互等操作'
- en: '**Dialogue management**: Agents can conduct multi-turn conversations with users
    to clarify intent or collect more information'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话管理**：代理可以与用户进行多轮对话，以明确意图或收集更多信息'
- en: '**Memory**: Agents may remember previous interactions and maintain short-term
    or long-term memory to improve responses'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆**：代理可能会记住之前的交互并保持短期或长期记忆以改进响应'
- en: Agents are well-suited for real-world tasks that require decision-making, adaptability,
    and interaction with external systems. Agents can take on various forms depending
    on how they are designed and what capabilities they include.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 代理非常适合需要决策、适应性和与外部系统交互的现实世界任务。代理可以采取各种形式，具体取决于它们的设计和包含的功能。
- en: 'Types of agents include the following:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 代理的类型包括以下几种：
- en: Tool-using agents, which enhance their capabilities by accessing APIs
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用工具的代理，通过访问 API 来增强其功能
- en: Goal-oriented agents, which deconstruct goals into sub-tasks and execute them
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以目标为导向的代理，将目标分解为子任务并执行它们
- en: Collaborative agents, which work alongside users or other agents to solve problems
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作代理，与用户或其他代理一起解决问题
- en: Important note
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: One of the core differences between AI agents and traditional bots lies in their
    level of autonomy and adaptability. Traditional bots typically follow pre-defined
    rule sets and handle simple, linear workflows, whereas AI agents can reason over
    goals, dynamically plan actions, use tools, and retain memory over multi-turn
    conversations. This enables agents to solve more complex problems, adapt to new
    inputs, and interact more intelligently across a range of tasks.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代理与传统机器人之间的核心区别在于它们的自主程度和适应性。传统机器人通常遵循预定义的规则集，处理简单的线性工作流程，而人工智能代理可以推理目标、动态规划行动、使用工具，并在多轮对话中保留记忆。这使得代理能够解决更复杂的问题，适应新的输入，并在各种任务中更智能地交互。
- en: To effectively design and deploy AI agents, it’s important to understand the
    core building blocks that give them their capabilities. These components form
    the foundation of an agent’s intelligence, adaptability, and usefulness across
    different scenarios.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地设计和部署 AI 代理，了解赋予它们能力的核心构建块非常重要。这些组件构成了代理智能、适应性和在不同场景中的有用性的基础。
- en: Components of an agent
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理的组件
- en: 'Agents developed using Azure AI Agent Service typically consist of four core
    components that work together to support reasoning, interaction, and automation:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Azure AI 代理服务开发的代理通常由四个核心组件组成，这些组件协同工作以支持推理、交互和自动化：
- en: '**Model**: This is the deployed generative AI model that powers the agent’s
    ability to understand input and generate natural language responses. Azure supports
    a wide selection of models, including OpenAI’s GPT-4, and others available through
    Azure AI Foundry. For example, an agent that helps employees complete HR tasks
    might use GPT-4 to understand requests such as “file a leave request for next
    Friday.”'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型**：这是部署的生成式 AI 模型，它为代理理解输入和生成自然语言响应的能力提供动力。Azure 支持广泛的模型选择，包括 OpenAI 的
    GPT-4 以及通过 Azure AI Foundry 可用的其他模型。例如，一个帮助员工完成人力资源任务的代理可能会使用 GPT-4 来理解“下周五提交请假申请”之类的请求。'
- en: '**Knowledge**: This is the data sources used to ground the agent’s responses
    in contextually relevant content. Agents can access Azure AI Search indexes, company-specific
    documents, or web search results via Bing to ensure their answers are accurate
    and specific. For example, when asked about internal travel policies, an agent
    could retrieve answers from an HR SharePoint site indexed in Azure AI Search.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识**：这是用于将代理的响应建立在上下文相关内容中的数据源。代理可以通过 Azure AI 搜索索引、特定公司的文档或通过必应的网页搜索结果来访问，以确保它们的答案准确且具体。例如，当被问及内部差旅政策时，代理可以从
    Azure AI 搜索中索引的 HR SharePoint 网站检索答案。'
- en: '**Tools**: Tools are programmatic functions the agent can use to perform actions,
    such as executing workflows, retrieving external data, or running computations.
    Built-in tools include Azure AI Search, Bing Search, and a Python code interpreter.
    Developers can also create custom tools using Azure Functions. As an example,
    an agent helping with marketing tasks might call a custom function that posts
    content directly to social media platforms.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具**：工具是代理可以使用的程序化函数，用于执行操作，例如执行工作流程、检索外部数据或运行计算。内置工具包括 Azure AI 搜索、必应搜索和
    Python 代码解释器。开发者还可以使用 Azure Functions 创建自定义工具。例如，一个帮助进行营销任务的代理可能会调用一个自定义函数，直接将内容发布到社交媒体平台。'
- en: '**Conversation threads**: Conversations between users and agents occur in persistent
    threads. These threads track the entire history of exchanges and store any attached
    documents or outputs generated by tools. This allows agents to maintain continuity,
    refer back to prior steps, and build long-term memory across sessions.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话线程**：用户和智能体之间的对话发生在持久线程中。这些线程跟踪整个交流历史，并存储任何附加的文档或由工具生成的输出。这使得智能体能够保持连续性，回顾先前的步骤，并在会话之间建立长期记忆。'
- en: Important note
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: 'Watch the following two videos from Microsoft to gain a comprehensive understanding
    of AI agents and see them in action:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 观看以下两个来自微软的视频，以全面了解 AI 智能体并看到它们在实际中的应用：
- en: '*Overview of AI Agent Capabilities* *and Features*'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '*AI 智能体功能和特性概述*'
- en: 'Video URL: [https://youtu.be/dMEwpthSuhU?si=GYlyC4jQJObZLnNm](https://youtu.be/dMEwpthSuhU?si=GYlyC4jQJObZLnNm
    )'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 视频URL：[https://youtu.be/dMEwpthSuhU?si=GYlyC4jQJObZLnNm](https://youtu.be/dMEwpthSuhU?si=GYlyC4jQJObZLnNm)
- en: This video provides a high-level introduction to the capabilities and features
    of AI Agents.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 此视频提供了对 AI 智能体功能和特性的高级介绍。
- en: '*Detailed Use Case with* *Sample Code*'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*详细用例与* *示例代码*'
- en: 'Video URL: [https://youtu.be/ph-1-OIqsxY?si=rMJs8FqECKDw_0KI](https://youtu.be/ph-1-OIqsxY?si=rMJs8FqECKDw_0KI
    )'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 视频URL：[https://youtu.be/ph-1-OIqsxY?si=rMJs8FqECKDw_0KI](https://youtu.be/ph-1-OIqsxY?si=rMJs8FqECKDw_0KI)
- en: This session walks through a practical use case, complete with sample code and
    implementation details.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 本次会议将介绍一个实际用例，包括示例代码和实施细节。
- en: With a solid understanding of these components, let’s now explore some common
    use cases that demonstrate how agents can be leveraged to solve real-world problems
    across different industries.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在对这些组件有扎实理解的基础上，现在让我们探索一些常见的用例，以展示智能体如何被利用来解决不同行业中的实际问题。
- en: 'Common use cases include the following:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 常见用例如下：
- en: '**Customer support assistants**: Handling multi-turn conversations with access
    to internal tools and documentation'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户支持助理**：处理多轮对话，并能够访问内部工具和文档'
- en: '**Document summarization agents**: Parsing large files and extracting key information
    for human review'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档摘要智能体**：解析大型文件并提取关键信息供人类审查'
- en: '**Process automation bots**: Coordinating workflows across systems such as
    **Customer Relationship Management** (**CRM**) and **Enterprise Resource Planning**
    (**ERP**) tools, or ticketing tools'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**流程自动化机器人**：协调跨系统如**客户关系管理**（CRM）和**企业资源规划**（ERP）工具，或票务工具的工作流程'
- en: '**Multi-agent planning systems**: Solving complex problems using collaboration
    between specialized agents'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多智能体规划系统**：通过专用智能体之间的协作解决复杂问题'
- en: These use cases illustrate the broad impact AI agents can have across industries.
    To build effective agentic solutions, it’s essential to choose the right tools
    and frameworks. The selection should be guided by your team’s technical expertise,
    the complexity of the use case, and the target deployment environment.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这些用例展示了 AI 智能体在各个行业中的广泛影响。为了构建有效的智能体解决方案，选择正确的工具和框架至关重要。选择应指导你的团队的技术专长、用例的复杂性和目标部署环境。
- en: Options for agent development
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 智能体开发选项
- en: 'There are many ways that developers can create AI agents in Azure, using different
    services, SDKs, and development environments depending on the needs of the project.
    Here are the key options:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者有多种方式在 Azure 中创建 AI 智能体，根据项目需求使用不同的服务、SDK 和开发环境。以下是关键选项：
- en: '**Azure AI Agent Service**: This is a fully managed, enterprise-ready service
    integrated with Azure AI Foundry. It is based on the OpenAI Assistants API but
    offers enhanced support for model choice, data integration, and enterprise-grade
    security. This service is ideal for creating, managing, and scaling production-grade
    agents.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure AI 智能体服务**：这是一个完全托管、企业级服务，与 Azure AI Foundry 集成。它基于 OpenAI 助手 API，但提供了对模型选择、数据集成和企业级安全的增强支持。此服务非常适合创建、管理和扩展生产级智能体。'
- en: '**OpenAI Assistants API**: This provides a streamlined version of agent development
    capabilities focused on OpenAI models. It can be used with Azure OpenAI Service,
    but lacks the full extensibility of Azure AI Agent Service. This makes it suitable
    for lightweight scenarios or where tight alignment with OpenAI is preferred.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI 助手 API**：这提供了一个专注于 OpenAI 模型的智能体开发能力的简化版本。它可以与 Azure OpenAI 服务一起使用，但缺乏
    Azure AI 智能体服务的完全可扩展性。这使得它适用于轻量级场景或需要与 OpenAI 紧密对齐的情况。'
- en: Important note
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: While both Azure AI Agent Service and Azure OpenAI Assistants support agent
    creation through the same APIs and SDKs, Azure AI Agent Service offers enhanced
    enterprise capabilities. These include flexible model selection (supporting GPT,
    Llama 3, Mistral, Cohere, and others), deeper data integrations (with Bing, Azure
    AI Search, and custom APIs), enterprise-grade security (keyless authentication
    and no public egress), and storage flexibility (bring-your-own Azure Blob Storage
    or use platform-managed storage). If your use case involves compliance, advanced
    data handling, or deployment at scale, Azure AI Agent Service is recommended.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Azure AI 代理服务和 Azure OpenAI 助手都支持通过相同的 API 和 SDK 创建代理，但 Azure AI 代理服务提供了增强的企业功能。这些包括灵活的模型选择（支持
    GPT、Llama 3、Mistral、Cohere 等）、更深入的数据集成（与 Bing、Azure AI 搜索和自定义 API）、企业级安全（无密钥认证和无公共出口）以及存储灵活性（使用您自己的
    Azure Blob Storage 或使用平台管理的存储）。如果您的用例涉及合规性、高级数据处理或大规模部署，建议使用 Azure AI 代理服务。
- en: '**Semantic Kernel**: This is a lightweight, open source **Software Development
    Kit** (**SDK**) for building intelligent agents and orchestrating multi-agent
    workflows. It includes the Semantic Kernel Agent Framework, which provides tools
    and patterns for building flexible and modular agents. This option is ideal for
    developers looking to implement custom logic, planning, and memory-based behaviors.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Semantic Kernel**：这是一个轻量级、开源的 **软件开发工具包**（**SDK**），用于构建智能代理和编排多代理工作流程。它包括语义内核代理框架，为构建灵活和模块化代理提供工具和模式。此选项非常适合希望实现自定义逻辑、规划和基于内存行为的开发者。'
- en: '**AutoGen**: This is an open source Python framework ideal for prototyping
    and conducting research around agent behaviors. It encourages rapid experimentation
    and coordination of agents with different roles.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AutoGen**：这是一个理想的 Python 开源框架，适用于原型设计和围绕代理行为的研究。它鼓励快速实验和不同角色代理的协调。'
- en: '**Microsoft 365 Agents SDK**: This enables the creation of self-hosted agents
    that can be delivered through platforms such as Teams, Slack, Messenger, and other
    channels. Despite its name, it is not limited to Microsoft 365 scenarios.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft 365 代理 SDK**：这允许创建自托管代理，可以通过 Teams、Slack、Messenger 和其他渠道交付。尽管其名称如此，但它并不仅限于
    Microsoft 365 场景。'
- en: '**Microsoft Copilot Studio**: This provides a low-code environment that empowers
    business users to build agents using a visual design interface. It integrates
    seamlessly with Microsoft 365, Power Platform, and external connectors, making
    it a great choice for low-code development or fusion teams.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft Copilot Studio**：这提供了一个低代码环境，使业务用户能够使用可视化设计界面构建代理。它与 Microsoft
    365、Power Platform 和外部连接器无缝集成，是低代码开发或融合团队的理想选择。'
- en: '**Copilot Studio Agent Builder in Microsoft 365 Copilot**: This declarative
    tool allows business users to define agent behaviors using natural language or
    visual configuration. It is especially useful for automating everyday tasks without
    writing any code.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft 365 Copilot 中的 Copilot Studio 代理构建器**：这是一个声明性工具，允许业务用户使用自然语言或可视化配置来定义代理行为。它特别适用于无需编写任何代码即可自动化日常任务。'
- en: Before diving into hands-on agent building, it’s essential to choose the right
    development approach and supporting toolset. Azure provides multiple frameworks
    and SDKs that vary in complexity and capabilities, so selecting the appropriate
    one depends on the use case and audience.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入实际代理构建之前，选择正确的发展方法和支持工具集至关重要。Azure 提供了多种框架和 SDK，它们在复杂性和功能上有所不同，因此选择合适的工具取决于用例和受众。
- en: Choosing the right tool for agent development
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择合适的代理开发工具
- en: 'Here are some guidelines to help determine the best approach:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些帮助确定最佳方法的指南：
- en: '**No-code business users**: Use Copilot Studio Agent Builder to create basic
    task automation agents with minimal setup'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无代码业务用户**：使用 Copilot Studio 代理构建器创建基本任务自动化代理，设置简单'
- en: '**Low-code business technologists**: Choose Microsoft Copilot Studio to build
    integrated, low-code agents that work with Teams, Slack, or Power Platform'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低代码业务技术专家**：选择 Microsoft Copilot Studio 来构建与 Teams、Slack 或 Power Platform
    集成的低代码代理'
- en: '**Pro developers building enterprise-grade agents**: Start with Azure AI Agent
    Service for full observability, scalability, and model/tool flexibility'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**构建企业级代理的专业开发者**：从 Azure AI 代理服务开始，以实现全面的可观察性、可扩展性和模型/工具灵活性'
- en: '**Research and experimental agents**: Use AutoGen or Semantic Kernel for multi-agent
    orchestration and rapid ideation'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究和实验代理**：使用 AutoGen 或 Semantic Kernel 进行多代理编排和快速构思'
- en: Important note
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: These tools are complementary, and developers often use multiple tools together
    depending on the use case, skills, and environment.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具是互补的，开发者通常会根据用例、技能和环境使用多个工具。
- en: 'In this following section, we’ll focus on pro developer-oriented tools and
    services, as they align with the target audience of the *AI-102: Azure AI Engineer
    Associate Certification* exam. Let’s dive into the three core frameworks: Azure
    AI Agent Service, Semantic Kernel, and AutoGen.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将专注于面向专业开发者的工具和服务，因为它们与目标受众为*AI-102：Azure AI工程师助理认证*考试相一致。让我们深入了解三个核心框架：Azure
    AI代理服务、Semantic Kernel和AutoGen。
- en: Comparison of agent development frameworks
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理开发框架比较
- en: 'The following table summarizes three of the most widely used frameworks for
    agent development in Azure. This will help you understand their capabilities and
    determine which is best suited to your development goals:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 下表总结了Azure中用于代理开发的三个最广泛使用的框架。这将帮助您了解它们的特性，并确定哪个最适合您的开发目标：
- en: '| Framework | Best For | Model Support | Memory | Tool Integration | Complexity
    |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| 框架 | 最佳用途 | 模型支持 | 内存 | 工具集成 | 复杂性 |'
- en: '| Azure AI Agent Service | Production-grade managed agents | OpenAI, Llama,
    Cohere, Mistral | Yes | Built-in + custom tools | Low |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| Azure AI代理服务 | 生产级托管代理 | OpenAI、Llama、Cohere、Mistral | 是 | 内置 + 自定义工具 | 低
    |'
- en: '| Semantic Kernel | Custom orchestration and planning | Any LLM via API/SDK
    | Yes (semantic) | Plugin-based | Medium |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| Semantic Kernel | 自定义编排和计划 | 通过API/SDK的任何LLM | 是（语义） | 插件式 | 中等 |'
- en: '| AutoGen | Research, prototyping, experimentation | Python-based LLMs via
    OpenAI, others | Yes | Python APIs + code tools | Medium |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| AutoGen | 研究、原型设计、实验 | 基于Python的LLMs通过OpenAI，其他 | 是 | Python API + 代码工具 |
    中等 |'
- en: Table 9.1 – Comparison of agent development frameworks
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 表9.1 – 代理开发框架比较
- en: 'Now that we’ve compared the key frameworks available for agent development,
    let’s explore two common deployment approaches—starting with a single-agent setup
    and progressing to more advanced multi-agent orchestration scenarios:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经比较了可用于代理开发的键框架，让我们探索两种常见的部署方法——从单代理设置开始，逐步过渡到更高级的多代理编排场景：
- en: '**Option 1 – Single-agent deployment**: Start by deploying standalone agents
    using Azure AI Foundry. These agents are managed through microservices and are
    designed for production readiness with enterprise-grade observability, security,
    and model flexibility.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选项1 – 单代理部署**：首先使用Azure AI Foundry部署独立代理。这些代理通过微服务进行管理，并设计为适用于生产就绪，具有企业级可观察性、安全性和模型灵活性。'
- en: '**Option 2 – Multi-agent orchestration**: Once your solution requires coordination
    between multiple specialized agents, you can use AutoGen for ideation and rapid
    experimentation, and Semantic Kernel for production-grade multi-agent orchestration.
    AutoGen is especially suited for iterative design and research workflows, while
    Semantic Kernel is optimized for extensible, secure, and stable deployments.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选项2 – 多代理编排**：一旦您的解决方案需要多个专业代理之间的协调，您可以使用AutoGen进行构思和快速实验，并使用Semantic Kernel进行生产级多代理编排。AutoGen特别适合迭代设计和研究工作流程，而Semantic
    Kernel则针对可扩展、安全和稳定的部署进行了优化。'
- en: For more detailed information about Azure AI Agent Service, please visit [https://techcommunity.microsoft.com/blog/azure-ai-services-blog/introducing-azure-ai-agent-service/4298357](https://techcommunity.microsoft.com/blog/azure-ai-services-blog/introducing-azure-ai-agent-service/4298357).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如需有关Azure AI代理服务的更详细信息，请访问[https://techcommunity.microsoft.com/blog/azure-ai-services-blog/introducing-azure-ai-agent-service/4298357](https://techcommunity.microsoft.com/blog/azure-ai-services-blog/introducing-azure-ai-agent-service/4298357)。
- en: Let’s now explore how to prepare your Azure environment to support intelligent
    agents by provisioning the necessary resources and creating agents using different
    frameworks.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来探讨如何通过配置必要资源和创建使用不同框架的代理来准备您的Azure环境以支持智能代理。
- en: Configuring resources to build an agent
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置资源以构建代理
- en: 'Before we dive into implementation, it’s important to highlight that the next
    sections will focus on hands-on exercises using three primary development paths:
    Azure AI Agent Service, Semantic Kernel, and AutoGen. Each of these paths demonstrates
    a distinct approach to building intelligent agents using different toolsets in
    Azure.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入实施之前，重要的是要强调，接下来的几节将侧重于使用三个主要开发路径进行动手练习：Azure AI代理服务、Semantic Kernel和AutoGen。每条路径都展示了使用Azure中不同的工具集构建智能代理的独特方法。
- en: To help you compare, we’ll apply the same prompt scenario to each platform,
    showing how similar functionality can be implemented using each method. This side-by-side
    perspective will provide insight into how different platforms handle agent reasoning,
    tool integration, and memory management. These practical examples will prepare
    you to confidently select and apply the right development path for your own agentic
    solutions.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你比较，我们将对每个平台应用相同的提示场景，展示如何使用每种方法实现类似的功能。这种并排视角将提供不同平台如何处理代理推理、工具集成和内存管理的见解。这些实际示例将帮助你自信地选择并应用适合你自己的代理解决方案的正确开发路径。
- en: Creating a basic agent using Azure AI Agent Service
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Azure AI 代理服务创建基本代理
- en: To bring theory into practice, we’ll begin by developing a basic agent using
    Azure AI Agent Service. This hands-on example introduces foundational concepts
    in a production-ready, managed environment.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将理论应用于实践，我们将首先使用 Azure AI 代理服务开发一个基本的代理。这个动手实验在一个生产就绪、托管的环境中介绍了基础概念。
- en: You’re ready to create your first agent using Azure AI Agent Service.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经准备好使用 Azure AI 代理服务创建你的第一个代理。
- en: 'Exercise 1: Create an agent using the Azure AI Foundry web portal'
  id: totrans-88
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 练习 1：使用 Azure AI Foundry 网页门户创建代理
- en: 'To complete this exercise, you will need access to the Azure AI Foundry web
    portal and a project named `ai-data-demo` under the `a102-hub` workspace. This
    project should have been created in [*Chapter 8*](B31034_08.xhtml#_idTextAnchor167).
    If it’s not yet available, refer back to [*Chapter 8*](B31034_08.xhtml#_idTextAnchor167)’s
    *Exercise 1: Creating a hub, project, and AI service in the Azure portal* section
    to set it up. Once your project is in place, navigate to the overview page of
    `ai-data-demo` within `a102-hub`.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成这个练习，你需要访问 Azure AI Foundry 网页门户，并在 `a102-hub` 工作区下有一个名为 `ai-data-demo` 的项目。该项目应该在
    [*第 8 章*](B31034_08.xhtml#_idTextAnchor167) 中创建。如果它尚未可用，请参考 [*第 8 章*](B31034_08.xhtml#_idTextAnchor167)
    的 *练习 1：在 Azure 门户中创建中心、项目和 AI 服务* 部分来设置它。一旦你的项目就绪，请导航到 `a102-hub` 中 `ai-data-demo`
    的概览页面。
- en: Important note
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: You need to check which regions Azure AI Agent Service is available in by visiting
    [https://learn.microsoft.com/en-us/azure/ai-services/agents/concepts/model-region-support#azure-openai-models](https://learn.microsoft.com/en-us/azure/ai-services/agents/concepts/model-region-support#azure-openai-models).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要通过访问 [https://learn.microsoft.com/en-us/azure/ai-services/agents/concepts/model-region-support#azure-openai-models](https://learn.microsoft.com/en-us/azure/ai-services/agents/concepts/model-region-support#azure-openai-models)
    来检查 Azure AI 代理服务在哪些区域可用。
- en: 'In this exercise, you’ll build a simple travel assistant agent using Azure
    AI Foundry. The agent will be configured with an LLM model as its only tool and
    will help users create personalized travel itineraries. It will generate location-specific
    suggestions such as activities, places to visit, accommodation, and helpful travel
    tips based on user preferences:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，你将使用 Azure AI Foundry 创建一个简单的旅行助手代理。该代理将配置一个 LLM 模型作为其唯一工具，并帮助用户创建个性化的旅行行程。它将根据用户偏好生成特定地点的建议，例如活动、参观地点、住宿和有用的旅行提示：
- en: 'Creating an agent in Azure AI Foundry:'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Azure AI Foundry 中创建代理：
- en: Navigate to `travel agent`, select the LLM model if you don’t see any model
    in the **Deployment** drop-down menu, and then you can create a new model by clicking
    **Create new deployment** as shown in *Figure 9**.1*.
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 `旅行代理`，如果你在**部署**下拉菜单中看不到任何模型，请选择 LLM 模型，然后你可以通过点击**创建新部署**来创建一个新模型，如图 9**.1**
    所示。
- en: In this exercise, the travel agent configuration only includes an LLM model
    as its core tool. However, Azure AI Agent Service allows you to enhance your agent
    by adding other capabilities such as knowledge sources and actions. To ground
    responses with external or enterprise-specific information, you can integrate
    Bing search results or Azure AI Search indexes as knowledge tools. Additionally,
    to enable dynamic actions, you can incorporate function calling by connecting
    your agent to custom APIs or Azure Functions—allowing it to execute real-time
    operations such as generating reports, querying databases, or initiating workflows.
    You can also configure the model’s behavior and performance using system settings
    such as temperature, top-p, and token limits.
  id: totrans-95
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这个练习中，旅行代理配置仅包括一个LLM模型作为其核心工具。然而，Azure AI代理服务允许您通过添加其他功能，如知识源和动作来增强您的代理。为了将外部或企业特定信息与响应相结合，您可以将Bing搜索结果或Azure
    AI搜索索引作为知识工具进行集成。此外，为了启用动态动作，您可以通过将代理连接到自定义API或Azure Functions来调用函数，使其能够执行实时操作，例如生成报告、查询数据库或启动工作流。您还可以使用系统设置，如温度、top-p和令牌限制来配置模型的行为和性能。
- en: 'Click **Try in playground** to create a thread and test the agent:'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**在游乐场中尝试**以创建线程并测试代理：
- en: Start a conversation by typing **Could you help me plan a sunny vacation in
    Seoul,** **South Korea?**
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过输入**你能帮我计划一次在首尔，韩国的阳光假期吗**来开始对话：
- en: 'The agent should respond with tailored travel guidance specific to Seoul, South
    Korea, including recommendations for attractions, dining, and local tips, as demonstrated
    in the following figure:'
  id: totrans-98
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代理应响应针对首尔，韩国的定制旅行指南，包括景点、餐饮和当地小贴士，如下面的图所示：
- en: '![Figure 9.1 – Travel agent playground](img/B31034_09_01.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图9.1 – 旅行代理游乐场](img/B31034_09_01.jpg)'
- en: Figure 9.1 – Travel agent playground
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1 – 旅行代理游乐场
- en: This visual exercise walks you through defining an agent’s behavior, configuring
    model and tool settings, and testing the agent in Azure AI Foundry using its intuitive
    no-code interface. It provides a clear foundation for understanding how LLM-based
    agents function in practice. Now that you’ve completed the no-code setup, let’s
    move on to achieving the same implementation using an SDK-based approach in the
    next exercise.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这个视觉练习将引导您定义代理的行为，配置模型和工具设置，并在Azure AI Foundry中使用直观的无代码界面测试代理。它为理解基于LLM的代理在实际中的工作方式提供了清晰的基础。现在您已经完成了无代码设置，让我们在下一项练习中通过基于SDK的方法实现相同的实现。
- en: 'Exercise 2: Create an agent using the Azure AI Agent SDK'
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 练习2：使用Azure AI代理SDK创建代理
- en: 'In this part, you will use SDK-based development to configure and manage your
    agent programmatically. This method is ideal for production automation, integration
    into pipelines, or dynamic agent creation. Let’s dive in:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在这部分，您将使用基于SDK的开发来以编程方式配置和管理您的代理。这种方法非常适合生产自动化、集成到管道中或动态代理创建。让我们开始吧：
- en: Navigate to the `01-azure-ai-agent-service.ipynb` file located in the `Chapter
    9` folder. Open the notebook and follow along by reviewing and executing each
    cell to walk through the agent creation process programmatically. The notebook
    includes detailed explanations, so they won’t be repeated here.
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到位于“第9章”文件夹中的`01-azure-ai-agent-service.ipynb`文件。打开笔记本，通过审查和执行每个单元来跟随，以程序化地遍历代理创建过程。笔记本中包含详细的说明，因此这里不再重复。
- en: 'Import the required libraries:'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入所需的库：
- en: '[PRE0]'
  id: totrans-106
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Here’s the authentication and project client setup code:'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这是认证和项目客户端设置代码：
- en: '[PRE1]'
  id: totrans-108
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Here’s the code for creating an AI agent:'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这是创建AI代理的代码：
- en: '[PRE2]'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Here’s the code for creating a thread:'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这是创建线程的代码：
- en: '[PRE3]'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Here’s the code for running the agent:'
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这是运行代理的代码：
- en: '[PRE4]'
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Here’s the code for retrieving conversation messages:'
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这是检索对话消息的代码：
- en: '[PRE5]'
  id: totrans-116
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Now that you’ve built a foundational agent using Azure’s AI Agent SDK, let’s
    take it a step further by exploring how to create more advanced and flexible agents
    using open source SDKs. We’ll begin with Semantic Kernel, followed by a deep dive
    into AutoGen in the next section.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经使用Azure的AI代理SDK构建了一个基础代理，让我们进一步探索如何使用开源SDK创建更高级和灵活的代理。我们将从语义内核开始，然后在下一节深入探讨AutoGen。
- en: Implementing a single agent with Semantic Kernel and AutoGen
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用语义内核和AutoGen实现单个代理
- en: 'Before proceeding with the next three exercises using Semantic Kernel and AutoGen,
    you’ll need to authenticate with a model hosted on GitHub. Start by copying the
    `.env-sample` file to a new `.env` file. Then, generate a `GITHUB_TOKEN` variable
    in the `.env` file. This token enables secure access to models and services that
    require GitHub authentication. You can create your PAT by following the instructions
    here: [https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens).'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续使用 Semantic Kernel 和 AutoGen 进行接下来的三个练习之前，您需要使用托管在 GitHub 上的模型进行身份验证。首先，将
    `.env-sample` 文件复制到一个新的 `.env` 文件中。然后，在 `.env` 文件中生成一个 `GITHUB_TOKEN` 变量。此令牌允许安全访问需要
    GitHub 身份验证的模型和服务。您可以通过以下说明创建您的 PAT：[https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens)。
- en: Each exercise is detailed in its corresponding notebook within GitHub. Please
    follow the step-by-step instructions in each notebook, as they won’t be repeated
    in this section.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 每个练习都在 GitHub 中相应的笔记本中详细说明。请遵循每个笔记本中的逐步说明，因为它们不会在本节中重复。
- en: To build more flexible and customized agentic solutions—especially those requiring
    complex task planning, memory integration, and orchestration—you can leverage
    open source SDKs such as Semantic Kernel. Semantic Kernel provides a modular,
    extensible foundation for combining traditional programming constructs with AI
    capabilities, giving developers greater control over agent behaviors beyond what
    the Azure AI Agent SDK alone offers.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建更灵活和定制的代理解决方案——特别是那些需要复杂任务规划、内存集成和编排的解决方案——您可以利用像 Semantic Kernel 这样的开源
    SDK。Semantic Kernel 提供了一个模块化、可扩展的基础，可以将传统编程结构与 AI 功能相结合，使开发者能够对代理行为有比仅使用 Azure
    AI Agent SDK 更大的控制权。
- en: The Semantic Kernel framework
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 语义内核框架
- en: Semantic Kernel is an open source SDK developed by Microsoft that enables you
    to integrate AI capabilities with traditional programming logic. It supports blending
    natural language processing with plugins, tools, memory, and planning to construct
    powerful and adaptable AI agents.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 语义内核是由微软开发的开源 SDK，它使您能够将 AI 功能与传统编程逻辑集成。它支持将自然语言处理与插件、工具、内存和规划相结合，以构建强大且适应性强的
    AI 代理。
- en: 'At its core, Semantic Kernel is composed of several modular components:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，语义内核由几个模块化组件组成：
- en: '**Kernel**: The central coordinator that manages skill execution, memory access,
    and orchestration'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内核**：管理技能执行、内存访问和编排的中心协调器。'
- en: '**Skills and functions**: Reusable blocks of functionality—such as summarization,
    math calculations, or external API calls—that agents can invoke to complete tasks'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技能和函数**：可重用功能块——例如摘要、数学计算或外部 API 调用——代理可以调用以完成任务。'
- en: '**Planners**: Components that can break down a user’s high-level goal into
    sequenced subtasks that invoke relevant functions'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规划器**：可以将用户的整体目标分解为一系列子任务，这些子任务调用相关函数的组件。'
- en: '**Memory**: It supports both semantic memory (using vector embeddings) and
    traditional memory to maintain context and continuity across interactions'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存**：它支持语义内存（使用向量嵌入）和传统内存，以在交互中维护上下文和连续性。'
- en: This SDK is particularly suited for scenarios that require chaining tasks together
    and injecting structured programming logic around AI responses, making it ideal
    for the planner-based exercise that follows.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 此 SDK 特别适合需要将任务链式连接并围绕 AI 响应注入结构化编程逻辑的场景，使其非常适合后续基于规划器的练习。
- en: As mentioned earlier, the following exercise will demonstrate how to produce
    the same output using a different approach—this time implemented through Semantic
    Kernel. This comparison highlights how agents can be constructed and orchestrated
    using SDK-based methods, offering more flexibility, modularity, and control than
    a fully managed platform such as Azure AI Agent Service.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，以下练习将演示如何使用不同的方法产生相同的输出——这次是通过 Semantic Kernel 实现。这种比较突出了如何使用基于 SDK 的方法构建和编排代理，提供了比完全托管的平台（如
    Azure AI Agent 服务）更多的灵活性、模块化和控制。
- en: 'Exercise 3: A single agent using Semantic Kernel'
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 练习 3：使用语义内核的单个代理
- en: 'This exercise demonstrates how to implement a single-agent solution using Semantic
    Kernel’s SDK-based approach. You’ll walk through setting up the kernel, configuring
    the agent, and running a conversation—all within a notebook to illustrate how
    Semantic Kernel orchestrates AI behavior in a modular and extensible way:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习演示了如何使用基于语义内核SDK的方法实现单代理解决方案。你将遍历设置内核、配置代理和运行对话的过程，所有这些都在笔记本中完成，以说明语义内核如何以模块化和可扩展的方式编排AI行为：
- en: Navigate to the `02-semantic-kernel.ipynb` file located in the `Chapter 9` folder.
    Open the notebook and follow along by reviewing and executing each cell to walk
    through the agent creation process programmatically. The notebook includes detailed
    explanations, so they won’t be repeated here.
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到位于`Chapter 9`文件夹中的`02-semantic-kernel.ipynb`文件。打开笔记本，通过审查和执行每个单元来跟随程序化代理创建过程。笔记本中包含详细的说明，因此这里不会重复。
- en: 'Import the required libraries (not shown here to save space), create the client,
    and initialize the kernel:'
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入所需的库（此处未显示以节省空间），创建客户端并初始化内核：
- en: '[PRE6]'
  id: totrans-135
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Run the agents:'
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行代理：
- en: '[PRE7]'
  id: totrans-137
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The `02-semantic-kernel.ipynb` notebook showcases an open source SDK approach
    using Microsoft’s Semantic Kernel framework. It demonstrates how to build a client-side
    agent leveraging the `semantic_kernel` library and GitHub Models API. The architecture
    centers around a kernel that orchestrates services and plugins, a `ChatCompletionAgent`
    that defines agent behaviors, and a `ChatHistory` component to manage conversations
    locally. This approach offers greater flexibility, the ability to run in any environment,
    and an extensible plugin-based design, giving developers full control over how
    the agent is implemented. Let’s examine how AutoGen works in contrast.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '`02-semantic-kernel.ipynb`笔记本展示了使用微软的语义内核框架的开源SDK方法。它演示了如何构建一个利用`semantic_kernel`库和GitHub模型API的客户端代理。该架构围绕一个内核，它协调服务和插件，一个`ChatCompletionAgent`定义代理行为，以及一个`ChatHistory`组件来管理本地对话。这种方法提供了更大的灵活性，能够在任何环境中运行，并具有可扩展的基于插件的架构，使开发者能够完全控制代理的实现方式。让我们对比一下AutoGen的工作方式。'
- en: The AutoGen framework
  id: totrans-139
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: AutoGen框架
- en: AutoGen is an open source, extensible framework designed to simplify the development
    of LLM applications using a multi-agent conversation approach. It enables the
    creation of agents that communicate with one another, coordinate tasks, and automate
    complex workflows through structured conversations. Each agent in AutoGen can
    be configured with its own goal, behavior, tools, and memory—making it ideal for
    prototyping advanced LLM-based systems.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: AutoGen是一个开源、可扩展的框架，旨在通过多代理对话方法简化LLM应用程序的开发。它允许创建相互通信、协调任务并通过结构化对话自动化复杂工作流程的代理。AutoGen中的每个代理都可以配置自己的目标、行为、工具和内存，使其非常适合原型设计基于高级LLM的系统。
- en: Unlike single-agent approaches, AutoGen provides abstractions for group chat,
    agent memory, tool calling, and function execution chains. It is particularly
    well-suited for research workflows, iterative content generation, and simulated
    task delegation. For example, in a document summarization pipeline, you might
    have one agent that performs information retrieval, another that drafts the summary,
    and a third that validates for quality—all communicating through AutoGen’s conversational
    orchestration.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 与单代理方法不同，AutoGen提供了群聊、代理内存、工具调用和函数执行链的抽象。它特别适合研究工作流程、迭代内容生成和模拟任务委派。例如，在文档摘要管道中，你可能有一个代理执行信息检索，另一个代理起草摘要，第三个代理进行质量验证——所有这些通过AutoGen的对话编排进行通信。
- en: 'AutoGen also supports essential conversation management patterns for multi-agent
    coordination:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: AutoGen还支持多代理协调的基本对话管理模式：
- en: '**Chat termination**: AutoGen includes flexible termination logic to control
    when a multi-agent chat should end. Strategies may include ending after a fixed
    number of message rounds, upon reaching a certain response condition (e.g., “task
    complete”), or when all agents signal agreement. This prevents endless conversations
    and ensures efficiency. For example, if a user asks, “What’s the weather today?”
    and the agent responds with the current weather, the conversation can naturally
    end there unless the user follows up. A clear condition or signal, such as the
    user saying “Thanks, that’s all,” can be used to trigger termination.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天终止**：AutoGen包括灵活的终止逻辑，以控制多代理聊天何时结束。策略可能包括在固定数量的消息回合后结束，达到一定的响应条件（例如，“任务完成”）或当所有代理表示同意时。这防止了无休止的对话并确保了效率。例如，如果用户问“今天天气怎么样？”代理回答当前天气，对话可以自然地在那里结束，除非用户继续提问。可以使用清晰的条件或信号，例如用户说“谢谢，这就够了”，来触发终止。'
- en: '**Human-in-the-Loop (HITL)**: AutoGen can integrate human decision points into
    the workflow. For instance, if a customer support agent cannot verify a user’s
    account information, it might escalate the chat to a human representative by saying,
    “I’m transferring you to a support specialist who can help further.” This enables
    a balanced approach to automation with oversight.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工介入（HITL）**：AutoGen可以将人工决策点集成到工作流程中。例如，如果客户支持代理无法验证用户的账户信息，它可能会通过说“我将您转接到一位可以进一步帮助您的支持专家。”将聊天升级到人工代表。这使自动化与监督相结合的方法更加平衡。'
- en: '**Conversation patterns**: AutoGen provides built-in support for several structured
    conversation patterns that enable effective multi-agent collaboration:'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话模式**：AutoGen提供内置支持，以支持几种结构化对话模式，这些模式能够有效地实现多代理协作：'
- en: '**One-to-One (UserProxyAgent** ⇄ **AssistantAgent)**: A straightforward interaction
    between a user proxy agent and a single assistant agent. This pattern is suitable
    for simple tasks where only one agent is needed.'
  id: totrans-146
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一对一（用户代理代理** ⇄ **助手代理）**：用户代理代理与单个助手代理之间的直接交互。这种模式适用于只需要一个代理的简单任务。'
- en: '*Example*: A user proxy agent communicates with a coding assistant to generate
    Python code.'
  id: totrans-147
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*示例*：用户代理代理与编码助手通信以生成Python代码。'
- en: '**One-to-Many (UserProxyAgent** ⇄ **[Agent1, Agent2, ...])**: The user proxy
    agent broadcasts messages to a group of agents, each with a distinct role. This
    allows multiple agents to respond in parallel or take turns based on the task
    flow.'
  id: totrans-148
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一对多（用户代理代理** ⇄ **[代理1，代理2，...]）**：用户代理代理向一组具有不同角色的代理广播消息。这允许多个代理并行响应或根据任务流程轮流响应。'
- en: '*Example*: A user proxy agent asks a group of agents (e.g., a code generator,
    an optimizer, and a validator) to collaborate on solving a programming problem.'
  id: totrans-149
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*示例*：用户代理代理请求一组代理（例如，代码生成器、优化器和验证器）协作解决编程问题。'
- en: '**Many-to-Many (GroupChat)**: Multiple agents engage in a dynamic, autonomous
    conversation without direct user input. This pattern is useful for complex, multi-step
    workflows where agents reason, plan, and execute collaboratively.'
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多对多（群聊）**：多个代理在无需直接用户输入的情况下进行动态、自主的对话。这种模式适用于复杂的多步骤工作流程，其中代理可以协同推理、计划和执行。'
- en: '*Example*: A planner agent, a developer agent, and a tester agent hold a group
    chat to design, implement, and validate a software module.'
  id: totrans-151
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*示例*：规划代理、开发代理和测试代理进行群聊，以设计、实施和验证一个软件模块。'
- en: These features make AutoGen not only flexible for development and prototyping
    but also capable of supporting structured enterprise workflows where reliability
    and reviewability are key.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这些功能使AutoGen不仅适用于开发和原型设计，而且能够支持结构化的企业工作流程，其中可靠性和可审查性是关键。
- en: Before diving into the hands-on example, it’s important to understand how AutoGen
    enables the simulation and orchestration of agent roles through simple and modular
    definitions. Now, let’s explore a practical exercise that puts these principles
    to work.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入实际示例之前，了解AutoGen如何通过简单和模块化的定义来模拟和编排代理角色非常重要。现在，让我们探索一个实际练习，将这些原则付诸实践。
- en: 'Exercise 4: A single-agent scenario with AutoGen'
  id: totrans-154
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 练习4：使用AutoGen的单代理场景
- en: 'AutoGen enables single-agent collaboration:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: AutoGen支持单代理协作：
- en: Navigate to the `03-autogen.ipynb` file located in the `Chapter 9` folder. Open
    the notebook and follow along by reviewing and executing each cell to walk through
    the agent creation process programmatically. The notebook includes detailed explanations,
    so they won’t be repeated here.
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到位于`Chapter 9`文件夹中的`03-autogen.ipynb`文件。打开笔记本，通过审查和执行每个单元来按程序遍历代理创建过程。该笔记本包含详细的说明，因此此处不再重复。
- en: 'Import the required libraries (not shown here to save space), create a client
    instance to interact with the Azure OpenAI Service, and send a test question:'
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入所需的库（此处未显示以节省空间），创建一个客户端实例以与Azure OpenAI服务交互，并发送一个测试问题：
- en: '[PRE8]'
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Create an `AssistantAgent` for travel planning:'
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建用于旅行计划的`AssistantAgent`：
- en: '[PRE9]'
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Run an `async` function to demonstrate the travel agent assistant:'
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行一个`async`函数来演示旅行代理助手：
- en: '[PRE10]'
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The AutoGen implementation provides a streamlined way to build an AI agent for
    travel planning. It begins by configuring `AzureAIChatCompletionClient`, which
    connects to GitHub’s model inference API using a personal access token stored
    in environment variables. This client is enabled with key capabilities such as
    JSON-formatted outputs, function calling, and vision support. `AssistantAgent`
    is then created to serve as the travel planner, with its behavior guided by a
    defined system message. Finally, an asynchronous function is executed, sending
    a user message to plan a vacation in Seoul, South Korea. The notebook captures
    both the detailed internal agent reasoning and the final chat output. This setup
    focuses on simplicity—enabling direct message exchanges between the user and the
    agent with minimal configuration or architectural overhead.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: AutoGen的实现提供了一种简化的方式来构建用于旅行计划的AI代理。它首先通过配置`AzureAIChatCompletionClient`开始，该客户端使用存储在环境变量中的个人访问令牌连接到GitHub的模型推理API。此客户端具备诸如JSON格式输出、函数调用和视觉支持等关键功能。然后创建`AssistantAgent`作为旅行计划者，其行为由定义的系统消息引导。最后，执行一个异步函数，将用户消息发送以计划在韩国首尔度假。该笔记本捕捉了详细的内部代理推理和最终的聊天输出。这种设置侧重于简单性——允许用户和代理之间直接进行消息交换，同时配置或架构开销最小。
- en: Comparison with Azure AI Agent Service and Semantic Kernel
  id: totrans-164
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与Azure AI代理服务和语义内核的比较：
- en: Compared to Semantic Kernel and Azure AI Agent Service, AutoGen strikes a balance
    between simplicity and capability. Semantic Kernel adopts a more layered design,
    involving kernels, services, and chat history tracking for flexible orchestration.
    Azure AI Agent Service, on the other hand, abstracts most infrastructure concerns
    through cloud-hosted agents and persistent threads, making it ideal for scalable
    enterprise scenarios.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 与语义内核和Azure AI代理服务相比，AutoGen在简单性和能力之间取得了平衡。语义内核采用更分层的架构，包括内核、服务和聊天历史跟踪，以实现灵活的编排。另一方面，Azure
    AI代理服务通过云托管代理和持久线程抽象化大多数基础设施关注点，使其非常适合可扩展的企业场景。
- en: 'AutoGen sits in the middle—it’s more direct than Semantic Kernel and less abstract
    than Azure AI Agent Service. While this example shows a simple one-to-one interaction,
    AutoGen’s architecture supports more advanced multi-agent collaboration patterns.
    Although all three frameworks use the same underlying model in this travel agent
    example, their development styles vary: AutoGen emphasizes minimal setup and message
    passing, Semantic Kernel focuses on orchestrated workflows, and Azure AI Agent
    Service provides managed, stateful agent interactions in the cloud.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: AutoGen位于中间——它比语义内核更直接，比Azure AI代理服务更不抽象。虽然这个例子展示了简单的点对点交互，但AutoGen的架构支持更高级的多代理协作模式。尽管在这个旅行代理示例中，所有三个框架都使用相同的底层模型，但它们的开发风格不同：AutoGen强调最小设置和消息传递，语义内核侧重于编排工作流程，Azure
    AI代理服务在云中提供托管、有状态的代理交互。
- en: 'Now that we’ve explored how to implement intelligent agents using Azure AI
    Agent Service, Semantic Kernel, and AutoGen, we’ll take the next step: orchestrating
    collaboration between multiple agents. This approach is essential for solving
    more complex tasks that require specialization, coordination, and communication
    between agents—making orchestration strategies a critical component of advanced
    agentic solutions.'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了如何使用Azure AI代理服务、语义内核和AutoGen实现智能代理，我们将迈出下一步：在多个代理之间进行协作编排。这种方法对于解决需要专业、协调和代理之间沟通的更复杂任务至关重要，使编排策略成为高级代理解决方案的关键组成部分。
- en: Orchestrating multi-agents using Semantic Kernel
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用语义内核编排多代理：
- en: Semantic Kernel also plays a key role in orchestrating multi-agent solutions
    in Azure. Unlike single-agent frameworks, the Semantic Kernel Agent Framework
    allows you to define modular, role-specific agents that communicate, share memory,
    and delegate tasks through a consistent message-passing protocol. Each agent operates
    within a defined scope and can include access to its own tools, memory stores,
    and plugin capabilities.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 语义内核在编排Azure中的多代理解决方案中也发挥着关键作用。与单代理框架不同，语义内核代理框架允许您定义模块化、角色特定的代理，这些代理通过一致的消息传递协议进行通信、共享内存和委派任务。每个代理在其定义的范围内运行，可以包括对其自己的工具、内存存储和插件功能的访问。
- en: In Semantic Kernel, an agent is constructed from a planner, a collection of
    tools or plugins, a memory store, and a core orchestration loop. This structure
    makes it ideal for scenarios such as research assistants, content generation workflows,
    or multi-step business automation, where sub-agents must collaborate to fulfill
    complex requests.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在语义内核中，代理由一个规划器、一组工具或插件、一个内存存储和一个核心编排循环构成。这种结构使其非常适合研究助手、内容生成工作流程或多步骤业务自动化等场景，在这些场景中，子代理必须协作以完成复杂请求。
- en: For example, a Semantic Kernel-based orchestration could include a `WriterAgent`
    that drafts content, an `EditorAgent` that checks clarity and grammar, and a `PublisherAgent`
    that pushes updates to a CMS. Each agent is isolated in logic but works together
    in a shared conversational thread through the orchestrator.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，基于语义内核的编排可能包括一个`WriterAgent`用于起草内容，一个`EditorAgent`用于检查清晰度和语法，以及一个`PublisherAgent`用于将更新推送到CMS。每个代理在逻辑上都是隔离的，但通过编排器在共享的对话线程中协同工作。
- en: To demonstrate this in practice, let’s walk through the orchestration of multiple
    agents using Azure-native tools and the design patterns you’ve already explored.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在实践中展示这一点，让我们通过使用Azure原生工具和您已经探索的设计模式来演示多个代理的编排。
- en: 'To effectively coordinate multiple agents, you need more than just individual
    capabilities—you need a strategy for how agents collaborate, how they are selected
    for tasks, and when the conversation concludes. Azure’s Semantic Kernel Agent
    Framework introduces three key orchestration patterns that help structure such
    multi-agent interactions:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地协调多个代理，您需要的不仅仅是单个能力——您还需要一个策略来指导代理如何协作、如何选择任务代理以及何时结束对话。Azure的语义内核代理框架引入了三种关键的编排模式，有助于结构化这种多代理交互：
- en: '**Create an agent group chat**: In Semantic Kernel, you can define a group
    of agents that interact in a structured conversation. Each agent maintains its
    own memory and capabilities but contributes to the shared objective through an
    orchestrated message exchange. You can initialize the chat with a user prompt
    and allow agents to take turns based on relevance or predefined logic.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建代理群组聊天**：在语义内核中，您可以定义一组在结构化对话中交互的代理。每个代理维护自己的记忆和能力，但通过编排的消息交换为共享目标做出贡献。您可以使用用户提示初始化聊天，并允许代理根据相关性或预定义逻辑轮流发言。'
- en: '**Design an agent selection strategy**: Not every agent in a group needs to
    respond to every message. Using Semantic Kernel, you can implement a selection
    strategy that determines which agents participate at each turn. This could be
    round-robin, role-based, or even based on content relevance using an LLM. This
    helps reduce unnecessary responses and focuses the conversation on the most capable
    agent at each step.'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计代理选择策略**：组中的每个代理不需要对每条消息做出响应。使用语义内核，您可以实施一个选择策略，以确定每个回合参与哪些代理。这可能包括轮询、基于角色的选择，甚至基于内容相关性使用LLM。这有助于减少不必要的响应，并将对话集中在每个步骤中最有能力的代理上。'
- en: '**Define a chat termination strategy**: Multi-agent conversations should have
    clear completion criteria. You can define termination logic based on a fixed number
    of rounds, a specific agent response (e.g., “Task complete”), or consensus among
    the agents. This prevents infinite loops and helps ensure efficient resolution.'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义聊天终止策略**：多代理对话应该有明确的完成标准。您可以根据固定轮数、特定代理响应（例如，“任务完成”）或代理之间的共识来定义终止逻辑。这可以防止无限循环并有助于确保有效解决。'
- en: These patterns ensure that agents collaborate effectively, stay on task, and
    stop at the appropriate time—providing both control and flexibility for multi-agent
    orchestration.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模式确保代理有效地协作，专注于任务，并在适当的时间停止——为多代理编排提供控制和灵活性。
- en: 'Exercise 5: Orchestrate a multi-agent workflow with Semantic Kernel'
  id: totrans-178
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 练习 5：使用语义内核编排多代理工作流程
- en: 'In this exercise, you’ll learn how to orchestrate a multi-agent workflow where
    each agent takes on a clearly defined role and collaborates through structured
    dialogue. The process begins with a user-facing agent that receives a travel-related
    request. This input is then handled by a front desk agent, which generates a recommendation.
    A second agent—the concierge—reviews the suggestion for authenticity and quality,
    providing feedback for improvement. The front desk agent refines its response
    based on this feedback, and the interaction continues iteratively until the concierge
    approves the recommendation or a maximum number of iterations is reached. Through
    this exercise, you’ll gain hands-on experience with key orchestration patterns,
    including role-specific agent design, message passing, refinement loops, and termination
    strategies—all critical concepts for building intelligent, collaborative agentic
    systems using Semantic Kernel:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，你将学习如何编排一个多代理工作流程，其中每个代理承担一个明确定义的角色并通过结构化对话进行协作。该过程从面向用户的代理接收与旅行相关的请求开始。然后，该输入由前台代理处理，生成推荐。第二个代理——礼宾部——审查建议的真实性和质量，提供改进的反馈。前台代理根据这些反馈改进其响应，然后交互迭代进行，直到礼宾部批准推荐或达到最大迭代次数。通过这个练习，你将获得关键编排模式的手动经验，包括特定角色的代理设计、消息传递、细化循环和终止策略——所有这些都是使用语义内核构建智能、协作代理系统的重要概念：
- en: Navigate to the `04-multiagent-semantic-kernel.ipynb` file located in the `Chapter
    9` folder. Open the notebook and follow along by reviewing and executing each
    cell to walk through the agent creation process programmatically. The notebook
    includes detailed explanations, so they won’t be repeated here.
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到位于“第 9 章”文件夹中的 `04-multiagent-semantic-kernel.ipynb` 文件。打开笔记本，通过审查和执行每个单元来按程序化方式遍历代理创建过程。笔记本中包含详细说明，因此此处不再重复。
- en: 'Import the required libraries (not shown here to save space) and create a Semantic
    Kernel instance with the OpenAI chat completion service:'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入所需的库（此处未显示以节省空间）并使用 OpenAI 聊天完成服务创建一个语义内核实例：
- en: '[PRE11]'
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Implement the main conversation flow between a hotel concierge, a front desk
    agent, and a user seeking travel recommendations. For more details, please refer
    to the third cell in the `semantic-kernel.ipynb` notebook. To save space, the
    full code is not shown here—only the initial `agent_reviewer` code is included:'
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实现酒店礼宾部、前台代理和寻求旅行推荐的用户之间的主要对话流程。更多详情请参阅 `semantic-kernel.ipynb` 笔记本中的第三个单元。为了节省空间，此处未显示完整代码——仅包含初始的
    `agent_reviewer` 代码：
- en: '[PRE12]'
  id: totrans-184
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'This notebook demonstrates how multiple AI agents can collaborate to provide
    better results through structured conversation and feedback loops. The code creates
    two distinct agents: a front desk travel agent that provides specific recommendations
    for Seoul vacations, and a concierge who evaluates these recommendations to ensure
    they’re authentic and non-touristy. What makes this implementation special is
    its orchestration of agent interactions through *selection strategies* (which
    determine which agent speaks next) and *termination strategies* (which determine
    when the conversation should end). The `AgentGroupChat` manages this collaborative
    process, ensuring a back-and-forth exchange where the front desk agent suggests
    activities in Seoul, the concierge critiques them, and the front desk agent refines
    suggestions based on feedback until the concierge approves. This sophisticated
    approach demonstrates how multiple specialized agents can work together to produce
    higher-quality recommendations through structured collaboration, representing
    a significant advancement over single-agent implementations.'
  id: totrans-185
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个笔记本演示了多个 AI 代理如何通过结构化对话和反馈循环协作以提供更好的结果。代码创建了两个不同的代理：一个提供首尔度假具体推荐的柜台旅行代理，以及一个评估这些推荐以确保其真实性和非旅游性质的礼宾部。这个实现的特殊之处在于其通过
    *选择策略*（确定下一个发言的代理）和 *终止策略*（确定对话何时结束）编排代理交互。《AgentGroupChat》管理这个协作过程，确保有来有往的交流，其中前台代理建议首尔的活动，礼宾部进行评论，前台代理根据反馈改进建议，直到礼宾部批准。这种复杂的方法展示了多个专业代理如何通过结构化协作共同产生高质量的推荐，这比单代理实现有显著进步。
- en: Now that your agentic solutions are up and running, it’s time to focus on quality,
    performance, and deployment. The next section walks through how to test, refine,
    and operationalize your agents in a production environment.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您的代理解决方案已经启动并运行，是时候关注质量、性能和部署了。下一节将介绍如何在生产环境中测试、精炼和使代理投入运营。
- en: Testing, optimizing, and deploying agents
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试、优化和部署代理
- en: Once your agent is developed, it’s crucial to go through a structured process
    of testing, optimization, and deployment to ensure reliable and scalable performance.
    Each stage plays a vital role in validating the agent’s behavior and preparing
    it for real-world use.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 代理开发完成后，进行结构化的测试、优化和部署过程至关重要，以确保可靠和可扩展的性能。每个阶段都在验证代理行为并为实际使用做准备方面发挥着至关重要的作用。
- en: Testing begins by verifying that the agent performs as expected across different
    input scenarios. Developers can create unit tests for individual functions, especially
    for tool plugins or external API calls. One effective method for testing multi-turn
    conversations and reasoning is using prompt flow traces, which allow you to simulate
    interactions and inspect decision paths. For instance, when testing a customer
    support agent, you can run scenarios such as *reset password* or *track my order*,
    and verify that the agent responds consistently and calls the correct tools. Additionally,
    evaluating hallucination risk—how often the agent generates inaccurate or fabricated
    content—is essential, particularly when working with both grounded (e.g., Azure
    AI Search) and non-grounded data.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 测试从验证代理在不同输入场景下按预期执行开始。开发者可以为单个函数创建单元测试，特别是对于工具插件或外部API调用。测试多轮对话和推理的有效方法之一是使用提示流跟踪，这允许您模拟交互并检查决策路径。例如，在测试客户支持代理时，您可以运行诸如*重置密码*或*追踪我的订单*等场景，并验证代理是否始终如一地响应并调用正确的工具。此外，评估幻觉风险——代理生成不准确或虚构内容的多频繁，对于与基于（例如，Azure
    AI搜索）和非基于（例如，Azure AI搜索）数据的工作至关重要。
- en: Optimization involves refining the agent’s performance and resource usage. Tuning
    the system prompt—which sets the personality and boundaries of the agent—can dramatically
    impact response accuracy and behavior. Adjusting model parameters such as temperature,
    top-p, or max tokens helps control creativity and cost. If an agent routinely
    performs time-intensive tasks, such as calling an API to fetch currency exchange
    rates, caching those responses can reduce latency and token consumption. It’s
    also important to monitor token usage to avoid cost overruns, especially in high-volume
    or production environments.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 优化涉及改进代理的性能和资源使用。调整系统提示——它设定了代理的个性和边界——可以显著影响响应准确性和行为。调整模型参数，如温度、top-p或max tokens，有助于控制创造力和成本。如果一个代理经常执行耗时任务，例如调用API获取货币汇率，缓存这些响应可以减少延迟和令牌消耗。同样，监控令牌使用也很重要，以避免成本超支，尤其是在高流量或生产环境中。
- en: Deployment is the final step in operationalizing your agent. Most Azure-based
    agents are deployed as RESTful endpoints using Azure App Service or **Azure Kubernetes
    Service** (**AKS**). To secure these endpoints, it’s recommended to use Managed
    Identity and **Role-Based Access Control** (**RBAC**). This ensures only authorized
    users or applications can invoke the agent. Once deployed, use Azure Monitor and
    Log Analytics to track usage metrics, latency, error rates, and other operational
    indicators. These insights help you continuously improve the agent’s responsiveness
    and reliability.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 部署是使您的代理投入运营的最终步骤。大多数基于Azure的代理都是通过Azure App Service或**Azure Kubernetes服务**（**AKS**）作为RESTful端点进行部署。为了保护这些端点，建议使用托管标识和**基于角色的访问控制**（**RBAC**）。这确保只有授权的用户或应用程序可以调用代理。一旦部署，使用Azure
    Monitor和日志分析来跟踪使用指标、延迟、错误率和其他运营指标。这些洞察有助于您持续改进代理的响应性和可靠性。
- en: By rigorously testing, carefully optimizing, and securely deploying your agents,
    you create intelligent systems that are robust, efficient, and production-ready.-
    Secure endpoints using Managed Identity and RBAC
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 通过严格测试、精心优化和安全部署您的代理，您创建出健壮、高效且生产就绪的智能系统。- 使用托管标识和RBAC保护端点
- en: Summary
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you explored how to design, configure, and implement intelligent
    AI agents using Azure’s suite of services and SDKs. We began by defining what
    AI agents are, examining their components, and identifying key use cases across
    domains such as customer support, automation, and knowledge retrieval.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你探讨了如何使用 Azure 的一套服务和 SDK 设计、配置和实现智能 AI 代理。我们首先定义了 AI 代理是什么，检查了它们的组件，并确定了在客户支持、自动化和知识检索等领域的关键用例。
- en: We then evaluated multiple development paths—including Azure AI Agent Service,
    Semantic Kernel, and AutoGen—highlighting their strengths, differences, and appropriate
    use cases. Through a set of progressively structured exercises, you learned how
    to build standalone agents using Azure AI Foundry, then re-implement the same
    logic using Semantic Kernel and AutoGen to compare approaches. You also learned
    how to orchestrate agents in collaborative workflows using message-passing, selection
    strategies, and termination logic.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 我们随后评估了多个开发路径——包括 Azure AI 代理服务、语义内核和 AutoGen——突出了它们的优点、差异和适当的用例。通过一系列结构化的练习，你学习了如何使用
    Azure AI Foundry 构建独立的代理，然后使用语义内核和 AutoGen 重新实现相同的逻辑以比较方法。你还学习了如何使用消息传递、选择策略和终止逻辑在协作工作流程中编排代理。
- en: Lastly, we covered best practices for testing, optimizing, and deploying agents
    to production using Azure-native tools for monitoring, observability, and security.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们介绍了使用 Azure 原生工具进行测试、优化和部署代理到生产环境中的最佳实践。
- en: 'These foundational concepts and patterns will enable you to confidently build
    scalable, modular, and collaborative AI agent solutions tailored to your enterprise
    needs. The next chapter focuses on preparing you for the *AI-102: Azure AI Engineer
    Associate Certification* exam. It covers exam structure, key topics, and proven
    study strategies, along with a full-length practice test to help you assess your
    readiness and reinforce what you’ve learned.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 这些基础概念和模式将使你能够自信地构建可扩展、模块化和协作的 AI 代理解决方案，以满足你的企业需求。下一章将重点介绍如何为 *AI-102：Azure
    AI 工程师认证考试* 做准备。它涵盖了考试结构、关键主题和经过验证的学习策略，以及一个完整的练习测试，以帮助你评估你的准备情况并巩固你所学的知识。
- en: Review questions
  id: totrans-198
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 复习问题
- en: 'Answer the following questions to test your knowledge of this chapter:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 回答以下问题以测试你对本章知识的了解：
- en: What is a primary capability that distinguishes agentic solutions from traditional
    bots?
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪个是区分代理解决方案和传统机器人的主要功能？
- en: They can reason and call tools autonomously
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们可以自主推理和调用工具
- en: They use only rule-based decision trees
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们仅使用基于规则的决策树
- en: They use static responses
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们使用静态响应
- en: They require pre-programmed workflows
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们需要预编程的工作流程
- en: '**Correct** **answer**: A'
  id: totrans-205
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确** **答案**：A'
- en: Which Azure service is used to ground an agent’s responses with enterprise data?
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
