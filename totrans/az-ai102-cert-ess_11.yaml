- en: '11'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '11'
- en: Preparing for the AI-102 Azure AI Engineer Associate Certification Exam
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 准备AI-102 Azure AI工程师助理认证考试
- en: 'In this chapter, we’ll equip you with essential tools and strategies to help
    you tackle the *AI-102: Azure AI Engineer Associate Certification*exam with confidence.
    Designed to simplify your preparation journey, the content within focuses on the
    exam’s framework, key topics, and practical preparation techniques to ensure success.
    This chapter provides a breakdown of the exam topics and includes a comprehensive
    practice exam to reinforce your learning. By completing this mock exam, you’ll
    be able to assess your readiness for certification.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将为你提供必要的工具和策略，帮助你自信地应对*AI-102：Azure AI工程师助理认证*考试。旨在简化你的准备过程，内容集中在考试的框架、关键主题和实际准备技巧上，以确保成功。本章提供了考试主题的分解，并包括一个全面的练习考试，以巩固你的学习。通过完成这个模拟考试，你将能够评估自己是否准备好进行认证。
- en: 'By the end of this chapter, you will be able to do the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章结束时，你将能够做到以下事项：
- en: Master effective strategies and exam tips for success
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掌握有效的策略和考试技巧以取得成功
- en: Understand the structure and weight of each topic in the AI-102 exam
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解AI-102考试中每个主题的结构和权重
- en: Strengthen your knowledge by practicing mock tests
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过练习模拟测试来加强你的知识
- en: Let’s gear up for the final steps toward the AI-102 certification!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为迈向AI-102认证的最终步骤做好准备！
- en: Strategies and tips for success
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 成功的策略和技巧
- en: Earning 18 industry certifications has given me valuable insights into what
    it takes to succeed in certification exams. This section will outline strategies
    and tips that have consistently worked for me, which I believe will help you prepare
    for and pass the AI102-*Azure AI Engineer Associate certified exam* with confidence.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 通过获得18项行业认证，我获得了关于在认证考试中取得成功所需条件的宝贵见解。本节将概述对我一直有效的方法和技巧，我相信这将帮助你自信地准备并通过AI102-*Azure
    AI工程师助理认证考试*。
- en: Master key concepts through explanation
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过解释掌握关键概念
- en: 'To truly grasp the material, review each chapter’s key concepts and practice
    explaining them as if you were teaching someone else. If you cannot articulate
    a topic clearly, revisit the relevant chapter and refine your understanding. For
    example, when studying *Document Intelligence Solutions* ([*Chapter 7*](B31034_07.xhtml#_idTextAnchor140)),
    you might state that “AI Document Intelligence Studio extracts text, key-value
    pairs, tables, and structures from documents. It offers three models: Document
    Analysis Model (for Read and Layout), Prebuilt Models (for tax or invoice forms),
    and Custom Models (for unique document types).”'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 要真正掌握材料，回顾每一章的关键概念，并练习像教别人一样解释它们。如果你不能清楚地表达一个主题，请重新阅读相关章节，并深化你的理解。例如，当学习*文档智能解决方案*([*第7章*](B31034_07.xhtml#_idTextAnchor140))时，你可能会说：“AI文档智能工作室从文档中提取文本、键值对、表格和结构。它提供三种模型：文档分析模型（用于阅读和布局）、预建模型（用于税务或发票表单）和自定义模型（用于独特文档类型）。”
- en: This iterative approach helps embed the knowledge, ensuring it stays with you
    for the long term. As a Solution Architect at Microsoft, I use this method daily.
    If you cannot explain a concept clearly to a colleague or customer, it often means
    you need to revisit and strengthen your understanding.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这种迭代方法有助于知识内化，确保它长期留在你身边。作为微软的解决方案架构师，我每天都在使用这种方法。如果你不能向同事或客户清楚地解释一个概念，这通常意味着你需要重新审视并加强你的理解。
- en: Hands-on practice
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实践操作
- en: Concepts alone won’t be enough – you need to gain hands-on experience. The exercises
    provided in each chapter of this book are designed to help you apply what you’ve
    learned and develop a clear understanding of how each service works. By following
    these exercises, you will gain practical knowledge of each of the service’s functionalities
    and learn how to integrate them into solutions effectively.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 单纯的概念是不够的——你需要获得实践经验。本书每一章提供的练习旨在帮助你应用所学知识，并清晰地理解每个服务的工作方式。通过遵循这些练习，你将获得每个服务功能的实际知识，并学习如何有效地将它们集成到解决方案中。
- en: Additionally, [*Chapter 10*](B31034_10.xhtml#_idTextAnchor191) includes more
    advanced, real-world examples to enhance your skills further. While these exercises
    are optional, they provide an excellent opportunity for you to deepen your expertise,
    whether you’re preparing for the exam or looking to expand your knowledge after
    passing it.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，[*第10章*](B31034_10.xhtml#_idTextAnchor191) 包含更多高级、现实世界的示例，以进一步提高你的技能。虽然这些练习是可选的，但它们为你提供了一个极好的机会，无论是为考试做准备还是通过考试后扩展你的知识。
- en: This practical approach ensures that the knowledge you gain is not only exam-ready
    but also applicable in real-world scenarios, supporting both your certification
    journey and your professional growth.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这种实用方法确保你获得的知识不仅为考试做好准备，而且适用于现实世界的场景，支持你的认证之旅和职业成长。
- en: Thoroughly practice and analyze test questions
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 仔细练习和分析测试问题。
- en: 'Once you’ve built a solid understanding of the concepts and completed all the
    exercises provided in each chapter, move on to practice tests. Completing as many
    mock questions as possible is essential. However, it’s equally important to analyze
    each answer carefully – both correct and incorrect:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你对概念有了坚实的理解并完成了每一章中提供的所有练习，就可以进行实践测试。完成尽可能多的模拟问题至关重要。然而，仔细分析每个答案同样重要——无论是正确的还是错误的：
- en: Understand why a specific answer is correct.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解为什么某个答案是正确的。
- en: Identify why the incorrect options are invalid. Utilize any links and references
    provided to deepen your understanding of the underlying topics. This not only
    prepares you for the certification but also sharpens your problem-solving skills
    for real-world scenarios. If any area remains unclear, revisit the relevant chapters
    to strengthen your grasp of the material.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别为什么某些选项是无效的。利用提供的任何链接和参考资料来加深你对基础主题的理解。这不仅为你准备认证做好准备，也提高了你在现实世界场景中解决问题的技能。如果任何领域仍然不清楚，请回顾相关章节以加强你对材料的掌握。
- en: Additionally, you may notice that some granular details in the mock exams aren’t
    explicitly covered in the chapters. However, the *Further reading* links provided
    should guide you to the necessary information and help you bridge these gaps effectively.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，你可能会注意到模拟考试中的一些细节在章节中并没有明确涵盖。然而，提供的*进一步阅读*链接应指导你到必要的信息，并帮助你有效地弥合这些差距。
- en: Prioritize high-weighted topics first
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优先考虑权重较高的主题。
- en: After grasping the foundational concepts covered in *Chapters 1* and *2*, focus
    on the high-weighted topics to maximize your exam preparation. As highlighted
    in the *Preface*, starting with *Chapters 1* and *2* is essential, but you might
    consider diving into [*Chapter 6*](B31034_06.xhtml#_idTextAnchor117) next since
    it accounts for 30-35% of the exam – making it the most significant section. This
    approach is optional, but it helps ensure you’re prioritizing effectively.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在掌握第1章和第2章中涵盖的基础概念之后，关注高权重主题以最大限度地提高你的考试准备。正如*前言*中强调的，从第1章和第2章开始是至关重要的，但你可能考虑接下来深入到[*第6章*](B31034_06.xhtml#_idTextAnchor117)，因为它占考试30-35%的比例——使其成为最重要的部分。这种方法是可选的，但它有助于确保你有效地优先考虑。
- en: 'Here’s a high-level breakdown of the exam’s weighted areas:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 考试的权重领域的高级概述如下：
- en: '**Plan and manage an Azure AI** **solution** (15-20%)'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规划和管理工作负载的Azure AI解决方案**（15-20%）'
- en: '**Implement content moderation** **solutions** (10-15%)'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施内容审核解决方案**（10-15%）'
- en: '**Implement computer vision** **solutions** (15-20%)'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施计算机视觉解决方案**（15-20%）'
- en: '**Implement Natural Language Processing (NLP)** **solutions** (30-35%)'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施自然语言处理（NLP）解决方案**（30-35%）'
- en: '**Implement knowledge mining and document intelligence** **solutions** (10-15%)'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施知识挖掘和文档智能解决方案**（10-15%）'
- en: '**Implement generative AI** **solutions** (10-15%)'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实施生成式AI解决方案**（10-15%）'
- en: By targeting these areas strategically, you can build confidence and ensure
    balanced preparation across all topics. Now, let’s dive into some additional exam
    tips.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通过有策略地针对这些领域，你可以建立信心并确保对所有主题的全面准备。现在，让我们深入了解一些额外的考试技巧。
- en: Exam tips
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 考试技巧
- en: In this section, you will learn about the exam’s duration, taking unscheduled
    breaks, accessing Microsoft Learn during the exam, practice assessments, exam
    types, and other helpful tips.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将了解考试的时长、考试中的非计划休息、在考试期间访问Microsoft Learn、练习评估、考试类型以及其他有用的技巧。
- en: '*Exam duration*: 100 minutes. It typically contains between 40-60 questions.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '*考试时长*：100分钟。通常包含40-60个问题。'
- en: Taking unscheduled breaks
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非计划休息
- en: 'You can take *unscheduled breaks* during most exams:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在大多数考试中安排休息时间：
- en: Use the **Take a Break** option in the exam’s UI to pause
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用考试界面的**休息**选项来暂停。
- en: Important note
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: The exam timer continues to run while you are on break.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在你休息期间，考试计时器会继续运行。
- en: You can leave the camera view for breaks (e.g., to use the restroom), but accessing
    unauthorized materials will result in the exam being revoked
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以在休息时间离开摄像头视图（例如，去洗手间），但访问未经授权的材料会导致考试被取消。
- en: '*Once you take a break, you cannot return to previously viewed or* *marked
    questions*'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*一旦你休息，你将无法返回之前查看或* *标记的问题*'
- en: More details can be found at [https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#unscheduled-breaks-on-exams](https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#unscheduled-breaks-on-exams)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更多详细信息可以在[https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#unscheduled-breaks-on-exams](https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#unscheduled-breaks-on-exams)找到。
- en: Accessing Microsoft Learn resources during the exam
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在考试期间访问 Microsoft Learn 资源
- en: 'During the exam, you can access Microsoft Learn:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在考试期间，你可以访问 Microsoft Learn：
- en: Use it to look up information related to problem-solving questions.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用它来查找与问题解决相关的问题信息。
- en: It can be accessed via a split screen in the exam interface. *Note that the
    timer will continue to run while you use Microsoft Learn, so use* *it wisely*.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以通过考试界面的分屏访问。*请注意，当你使用 Microsoft Learn 时，计时器将继续运行，所以请明智地使用它*。
- en: Available resources include content within the Microsoft Learn domain, but Q&A,
    practice assessments, and profiles are restricted.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可用的资源包括 Microsoft Learn 域内的内容，但问答、练习评估和资料是受限的。
- en: More details can be found at [https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#accessing-microsoft-learn-during-your-certification-exam](https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#accessing-microsoft-learn-during-your-certification-exam).
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更多详细信息可以在[https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#accessing-microsoft-learn-during-your-certification-exam](https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#accessing-microsoft-learn-during-your-certification-exam)找到。
- en: 'Personally, I don’t use this option often, but if you’re searching for a command
    or API name you cannot recall, it might be worth a try. However, it’s crucial
    to familiarize yourself with where and how to find answers efficiently, as time
    management is key. I recommend going through all the questions first, marking
    the **Review later** box for those you want to revisit for validation. Refer to
    the following figure for guidance:'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人来说，我不经常使用这个选项，但如果你在寻找无法回忆起的命令或 API 名称，这可能值得一试。然而，熟悉如何高效地找到答案至关重要，因为时间管理是关键。我建议先过一遍所有问题，为那些你想再次验证的问题标记**查看稍后**框。参考以下图示以获取指导：
- en: '![Figure 11.1 – The Review later box](img/B31034_11_001.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.1 – 查看稍后框](img/B31034_11_001.jpg)'
- en: Figure 11.1 – The Review later box
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.1 – 查看稍后框
- en: This approach allows you to manage your time wisely while still leveraging Microsoft
    Learn’s resource access feature.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法允许你明智地管理时间，同时仍然利用 Microsoft Learn 的资源访问功能。
- en: Additional features for preparation and recommendations
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备和推荐的附加功能
- en: 'The following three features are highly recommended as they maximize the resources
    provided by Microsoft: practice assessments, the exam sandbox, and preparation
    videos. These tools help you familiarize yourself with the exam format and refine
    your strategies for success:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 以下三个功能强烈推荐，因为它们最大化了 Microsoft 提供的资源：练习评估、考试沙盒和准备视频。这些工具帮助你熟悉考试格式并完善成功的策略：
- en: '**Practice assessments**: Available on Microsoft Learn, these simulate question
    styles and difficulty. To learn more, go to [https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-engineer/practice/assessment?assessment-type=practice&assessmentId=61&practice-assessment-type=certification](https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-engineer/practice/assessment?assessment-type=practice&assessmentId=61&practice-assessment-type=certification).'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**练习评估**：在 Microsoft Learn 上提供，这些模拟了问题和难度。要了解更多信息，请访问[https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-engineer/practice/assessment?assessment-type=practice&assessmentId=61&practice-assessment-type=certification](https://learn.microsoft.com/en-us/credentials/certifications/azure-ai-engineer/practice/assessment?assessment-type=practice&assessmentId=61&practice-assessment-type=certification)。'
- en: '**Exam sandbox**: Familiarize yourself with the user interface and how to navigate
    before the actual exam. It can be found at [https://aka.ms/examdemo](https://aka.ms/examdemo).'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**考试沙盒**：在实际考试之前熟悉用户界面和导航方式。您可以在[https://aka.ms/examdemo](https://aka.ms/examdemo)找到它。'
- en: '**Exam AI-102 prep video**: This video provides tips, tricks, and strategies
    for preparing for the exam. It can be found at [https://learn.microsoft.com/en-us/shows/exam-readiness-zone/preparing-for-ai-102-plan-and-manage-an-azure-ai-solution](https://learn.microsoft.com/en-us/shows/exam-readiness-zone/preparing-for-ai-102-plan-and-manage-an-azure-ai-solution).'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI-102 考试准备视频**：本视频提供了准备考试的建议、技巧和策略。您可以在[https://learn.microsoft.com/en-us/shows/exam-readiness-zone/preparing-for-ai-102-plan-and-manage-an-azure-ai-solution](https://learn.microsoft.com/en-us/shows/exam-readiness-zone/preparing-for-ai-102-plan-and-manage-an-azure-ai-solution)找到它。'
- en: Now, let’s familiarize ourselves with the exam format and effective time management.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们熟悉一下考试格式和有效的时间管理。
- en: Types of questions on exams
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 考试中的问题类型
- en: Microsoft provides an **exam sandbox** to help candidates familiarize themselves
    with the exam interface and question types. This interactive environment replicates
    the actual exam experience and includes introductory screens, navigation, question
    types (e.g., multiple choice, drag and drop, case studies, labs), and key features
    such as being able to mark questions for review and monitor time. I strongly recommend
    going through the types of questions at [https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#question-types-on-exams](https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#question-types-on-exams).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 微软提供了一个**考试沙盒**，帮助考生熟悉考试界面和问题类型。这个交互式环境模拟了实际的考试体验，包括介绍屏幕、导航、问题类型（例如，多项选择、拖放、案例研究、实验室）以及关键功能，如标记问题以供回顾和监控时间。我强烈建议您查看[https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#question-types-on-exams](https://learn.microsoft.com/en-us/credentials/support/exam-duration-exam-experience#question-types-on-exams)上的问题类型。
- en: 'The following figure shows an example exam – in this case, a case study:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了一个示例考试——在这种情况下，是一个案例研究：
- en: '![Figure 11.2 – A case study](img/B31034_11_002.jpg)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图 11.2 – 一个案例研究](img/B31034_11_002.jpg)'
- en: Figure 11.2 – A case study
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.2 – 一个案例研究
- en: Familiarizing yourself with the exam format is closely tied to time management,
    something we’ll cover next.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 熟悉考试格式与时间管理紧密相关，我们将在下一部分进行讲解。
- en: Time management tips
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时间管理技巧
- en: 'To succeed in the exam, you must plan your approach effectively by familiarizing
    yourself with the format, managing your time wisely, and staying focused under
    pressure:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 要在考试中取得成功，您必须通过熟悉格式、明智地管理时间和在压力下保持专注来有效地规划您的策略：
- en: '**Familiarize yourself with the exam format**: Review the types of questions
    (e.g., multiple choice, case studies, drag and drop) and how the interface works.
    I strongly recommend using an exam sandbox tool to practice navigation beforehand.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**熟悉考试格式**：回顾问题类型（例如，多项选择、案例研究、拖放）以及界面如何工作。我强烈建议使用考试沙盒工具提前练习导航。'
- en: '**Scan the entire exam first**: Identify easy questions you can tackle quickly
    and mark tougher ones, such as those requiring access to Microsoft Learn resources,
    so that you can revisit them later.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**先扫描整个考试**：识别您可以快速解决的问题，并标记较难的问题，例如需要访问微软学习资源的问题，这样您可以在稍后回顾它们。'
- en: '**Allocate time per question**: Deduct 10 minutes from the total exam time
    for a final review and divide the remaining time by the number of questions. For
    example, if you have 100 minutes for 45 questions, allocate about 1.5 minutes
    per question, reserving the rest for review.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为每个问题分配时间**：从总考试时间中减去 10 分钟用于最终复习，然后将剩余时间除以问题的数量。例如，如果您有 100 分钟的时间回答 45 个问题，每个问题大约分配
    1.5 分钟，剩余时间用于复习。'
- en: '**Leave time for the final review**: Reserve time at the end to revisit marked
    questions, check for errors, and ensure all answers are submitted. Always submit
    answers – there are no penalties for incorrect responses.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为最终复习留出时间**：在考试结束时留出时间回顾标记的问题，检查错误，并确保所有答案都已提交。始终提交答案——对于错误答案没有惩罚。'
- en: '**Stay calm and focused**: If you feel stressed, use deep breathing techniques
    to stay composed. Start with the easy questions to build confidence and momentum.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保持冷静和专注**：如果您感到紧张，请使用深呼吸技巧保持镇定。从简单的问题开始，以建立信心和动力。'
- en: '**Ensure you’re prepared technically**: Check your internet connection and
    create a distraction-free environment. Log in early to resolve any potential technical
    issues before starting the exam.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确保您在技术上做好准备**：检查您的互联网连接并创建一个无干扰的环境。提前登录以解决在开始考试前可能出现的任何潜在技术问题。'
- en: Effective preparation, strategic time management, and leveraging resources such
    as the exam sandbox, practice assessments, and Microsoft Learn will help you succeed
    with the AI-102 exam. By familiarizing yourself with the format and staying composed
    under pressure, you’ll be well-equipped to achieve your certification goals. Now,
    let’s dive into the practice tests and validate what you’ve learned!
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的准备、战略的时间管理以及利用考试沙盒、练习评估和 Microsoft Learn 等资源将帮助您在 AI-102 考试中取得成功。通过熟悉格式并在压力下保持冷静，您将准备好实现您的认证目标。现在，让我们深入实践测试，验证您所学的知识！
- en: Practice exams
  id: totrans-74
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实践考试
- en: We have included 45 mock questions, some of which extend beyond the content
    covered directly in this book. However, all these questions are supported by the
    links and *Further reading* sections provided in each chapter. Our goal is to
    ensure in-depth coverage and allow you to revisit and reinforce your understanding,
    equipping you thoroughly for the exam. Take the time to analyze each question
    carefully and understand why your answers are correct or incorrect by using the
    links provided. Focus on mastering the underlying concepts; these mock questions
    serve as an excellent review tool. Additionally, create notes for quick reference
    before the exam and practice navigating the Microsoft Learn website, which will
    be accessible during the exam.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们包括了 45 个模拟问题，其中一些超出了本书直接涵盖的内容。然而，所有这些问题都得到了每个章节中提供的链接和*进一步阅读*部分的支撑。我们的目标是确保深入覆盖，并允许您回顾和巩固您的理解，为考试做好充分准备。花时间仔细分析每个问题，并使用提供的链接了解为什么您的答案是正确或错误的。专注于掌握基本概念；这些模拟问题是一个极好的复习工具。此外，在考试前创建笔记以供快速参考，并练习在考试期间可访问的
    Microsoft Learn 网站上的导航。
- en: Reminder
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 提醒
- en: All embedded URL links in this book have been consolidated on GitHub for easy
    access, eliminating the need to type lengthy URLs manually. You can find them
    at [https://github.com/PacktPublishing/Designing-and-Implementing-a-Microsoft-Azure-AI-Solution-AI-102-Certification/blob/main/resources.md](https://github.com/PacktPublishing/Designing-and-Implementing-a-Microsoft-Azure-AI-Solution-AI-102-Certification/blob/main/resources.md).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的所有嵌入式 URL 链接都已汇总到 GitHub 上，以便轻松访问，消除了手动输入长 URL 的需要。您可以在[https://github.com/PacktPublishing/Designing-and-Implementing-a-Microsoft-Azure-AI-Solution-AI-102-Certification/blob/main/resources.md](https://github.com/PacktPublishing/Designing-and-Implementing-a-Microsoft-Azure-AI-Solution-AI-102-Certification/blob/main/resources.md)找到它们。
- en: You are configuring a search index in Azure AI Search. You want a field that
    users can sort by. Which attribute should you assign to the field?
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置 Azure AI Search 中的搜索索引。您希望用户可以按其排序的字段。您应该将该属性分配给哪个字段？
- en: '`sortable`'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`可排序的`。'
- en: '`facetable`'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`可分面的`。'
- en: '`filterable`'
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`可过滤的`。'
- en: '`retrievable`'
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`可检索的`。'
- en: '`sortable`.'
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`可排序的`。'
- en: This attribute allows the field to be used for sorting search results – for
    example, sorting a list of products by price or rating.
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此属性允许字段用于排序搜索结果——例如，按价格或评分对产品列表进行排序。
- en: 'Here are some details on the incorrect options:'
  id: totrans-85
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'B. `facetable`: This attribute is used for faceted navigation, not for sorting.'
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. `可分面的`：此属性用于分面导航，而不是排序。
- en: 'C. `filterable`: This attribute is used to filter search results, not to sort
    them.'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. `可过滤的`：此属性用于过滤搜索结果，而不是排序它们。
- en: 'D. `retrievable`: This attribute determines whether the field can be returned
    in search results. It is not related to sorting.'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `可检索的`：此属性确定字段是否可以返回在搜索结果中。它与排序无关。
- en: 'References:'
  id: totrans-89
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考文献：
- en: '*Search indexes in Azure AI* *Search*: [https://learn.microsoft.com/en-us/azure/search/search-what-is-an-index](https://learn.microsoft.com/en-us/azure/search/search-what-is-an-index)'
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Azure AI 中的搜索索引*：[https://learn.microsoft.com/en-us/azure/search/search-what-is-an-index](https://learn.microsoft.com/en-us/azure/search/search-what-is-an-index)'
- en: '*Filters in keyword* *search*: [https://learn.microsoft.com/en-us/azure/search/search-filters](https://learn.microsoft.com/en-us/azure/search/search-filters)'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*关键字搜索中的过滤器*：[https://learn.microsoft.com/en-us/azure/search/search-filters](https://learn.microsoft.com/en-us/azure/search/search-filters)'
- en: You are configuring projections in Azure AI Search for storing normalized image
    files. Which type of projection should you use?
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置 Azure AI Search 中的投影以存储归一化的图像文件。您应该使用哪种类型的投影？
- en: Tables
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表格
- en: Files
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文件
- en: Objects
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对象
- en: JSON
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: JSON
- en: '**Correct answer**: B. Files.'
  id: totrans-97
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 文件。'
- en: Files are used when you need to save normalized, binary image files.
  id: totrans-98
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当您需要保存归一化、二进制图像文件时使用文件。
- en: 'Here are some details on the incorrect options:'
  id: totrans-99
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. **Tables**: These are used for data that is best represented as rows and
    columns'
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **表**：这些用于最佳表示为行和列的数据
- en: 'C. **Objects**: These are used when you need the full JSON representation of
    your data and enrichments in one JSON document'
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **对象**：当您需要数据的完整 JSON 表示以及在一个 JSON 文档中的富化时使用
- en: 'D. **JSON**: This is not a valid projection type for storing binary files'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **JSON**：这不是存储二进制文件的有效投影类型
- en: 'Reference:'
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Types of projections and* *usage*: [https://learn.microsoft.com/en-us/azure/search/knowledge-store-projection-overview#types-of-projections-and-usage](https://learn.microsoft.com/en-us/azure/search/knowledge-store-projection-overview#types-of-projections-and-usage)'
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*投影类型和用法*：[https://learn.microsoft.com/en-us/azure/search/knowledge-store-projection-overview#types-of-projections-and-usage](https://learn.microsoft.com/en-us/azure/search/knowledge-store-projection-overview#types-of-projections-and-usage)'
- en: You have a web app named `App1` that performs custom searches. You need to integrate
    this app as a custom skill in an Azure AI Search solution. Which `@odata.type`
    should you use?
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您有一个名为 `App1` 的 Web 应用程序，执行自定义搜索。您需要将此应用程序集成到 Azure AI 搜索解决方案中作为一个自定义技能。您应该使用哪个
    `@odata.type`？
- en: '`Microsoft.Skills.Custom.AmlSkill`'
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Custom.AmlSkill`'
- en: '`Microsoft.Skills.Custom.WebApiSkill`'
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Custom.WebApiSkill`'
- en: '`Microsoft.Skills.Text.CustomEntityLookupSkill`'
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.CustomEntityLookupSkill`'
- en: '`Microsoft.Skills.Util.ConditionalSkill`'
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Util.ConditionalSkill`'
- en: '`Microsoft.Skills.Custom.WebApiSkill`.'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Custom.WebApiSkill`.'
- en: '`Microsoft.Skills.Custom.WebApiSkill` allows the extensibility of an AI enrichment
    pipeline by making an HTTP call to a custom web API.'
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Custom.WebApiSkill` 通过对自定义 Web API 进行 HTTP 调用来扩展 AI 富化管道。'
- en: 'Here are some details on the incorrect options:'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. `Microsoft.Skills.Custom.AmlSkill`: This is used to integrate Azure Machine
    Learning models, not custom web APIs'
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. `Microsoft.Skills.Custom.AmlSkill`：此技能用于集成 Azure Machine Learning 模型，而不是自定义
    Web API
- en: 'C. `Microsoft.Skills.Text.CustomEntityLookupSkill`: This does not exist according
    to the provided documents'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. `Microsoft.Skills.Text.CustomEntityLookupSkill`：根据提供的文档，此技能不存在
- en: 'D. `Microsoft.Skills.Util.ConditionalSkill`: This is used for conditional operations
    within the enrichment pipeline, not for custom web APIs'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `Microsoft.Skills.Util.ConditionalSkill`：此技能用于富化管道中的条件操作，而不是用于自定义 Web API
- en: 'Reference:'
  id: totrans-116
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Skills for extra processing during indexing (Azure AI* *Search)*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*索引期间的额外处理技能（Azure AI Search）*：[https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
- en: You are configuring a skillset in Azure Cognitive Search to enrich your data.
    You want to project the enriched documents as tables in Azure Storage for further
    analysis. Which component should you use to achieve this?
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置 Azure 认知搜索中的技能集以丰富您的数据。您希望将富文档作为表投影到 Azure 存储中进行进一步分析。您应该使用哪个组件来实现此目的？
- en: Indexer
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 索引器
- en: Data source
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据源
- en: Knowledge store
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 知识库
- en: Skill
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 技能
- en: '**Correct answer**: C. Knowledge store.'
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：C. 知识库。'
- en: A knowledge store is used to project enriched documents as tables or objects
    in Azure Storage. It is defined within a skillset and allows the enriched data
    to be stored in a structured format that can be accessed for further analysis
    or downstream processing.
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 知识库用于将富文档作为表或对象投影到 Azure 存储中。它在技能集中定义，并允许将富数据以结构化格式存储，以便进行进一步分析或下游处理。
- en: 'Here are some details on the incorrect options:'
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. **Indexer**: An indexer is responsible for pulling data from a data source
    and pushing it into an index. It does not project enriched documents into Azure
    Storage as tables.'
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **索引器**：索引器负责从数据源拉取数据并将其推送到索引中。它不会将富文档作为表投影到 Azure 存储中。
- en: 'B. **Data source**: A data source specifies the location of the data to be
    indexed but does not project enriched documents.'
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **数据源**：数据源指定了要索引的数据的位置，但不将富文档投影。
- en: 'D. **Skill**: A skill is a function within a skillset that performs a specific
    enrichment task, such as extracting entities or translating text. It does not
    project the enriched documents into Azure Storage.'
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **技能**：技能是技能集中执行特定富化任务的功能，例如提取实体或翻译文本。它不会将富文档投影到 Azure 存储中。
- en: 'Reference:'
  id: totrans-129
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考文献：
- en: 'AI enrichment in Azure AI Search: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-concept-intro](https://learn.microsoft.com/en-us/azure/search/cognitive-search-concept-intro)'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Azure AI Search中的AI丰富：[https://learn.microsoft.com/en-us/azure/search/cognitive-search-concept-intro](https://learn.microsoft.com/en-us/azure/search/cognitive-search-concept-intro)
- en: You are developing a search solution using Azure AI Search and need to preprocess
    and enrich the content of documents stored in Azure Blob Storage. Specifically,
    you want to extract text from images embedded within PDF files during the enrichment
    process. Which built-in skill should you use?
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在使用Azure AI Search开发一个搜索解决方案，并需要在Azure Blob Storage中存储的文档内容进行预处理和丰富。具体来说，您希望在丰富过程中从PDF文件中提取图像中的文本。您应该使用哪个内置技能？
- en: '`Microsoft.Skills.Text.KeyPhraseExtractionSkill`'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.KeyPhraseExtractionSkill`'
- en: '`Microsoft.Skills.Vision.ImageAnalysisSkill`'
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Vision.ImageAnalysisSkill`'
- en: '`Microsoft.Skills.Util.DocumentExtractionSkill`'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Util.DocumentExtractionSkill`'
- en: '`Microsoft.Skills.Text.OcrSkill`'
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.OcrSkill`'
- en: '`Microsoft.Skills.Util.DocumentExtractionSkill`: This skill is used to extract
    content from a file within the enrichment pipeline, including text from images
    embedded in documents such as PDF files.'
  id: totrans-136
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Util.DocumentExtractionSkill`：此技能用于在丰富管道中提取文件内容，包括从PDF文件等文档中提取的图像中的文本。'
- en: 'Here are some details on the incorrect options:'
  id: totrans-137
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. `Microsoft.Skills.Text.KeyPhraseExtractionSkill`: This skill is used for
    identifying and extracting important terms from a text, but it does not extract
    text from images embedded in documents'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. `Microsoft.Skills.Text.KeyPhraseExtractionSkill`：此技能用于从文本中识别和提取重要术语，但它不提取文档中嵌入的图像中的文本
- en: 'B. `Microsoft.Skills.Vision.ImageAnalysisSkill`: While this skill analyzes
    and describes image content, it is not specifically used for extracting text from
    images embedded in documents'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. `Microsoft.Skills.Vision.ImageAnalysisSkill`：虽然此技能分析和描述图像内容，但它不是专门用于从文档中提取图像中的文本
- en: 'D. `Microsoft.Skills.Text.OcrSkill`: OCR is used to recognize printed and handwritten
    text in images, but `DocumentExtractionSkill` is more appropriate for extracting
    text from images embedded within documents during the AI enrichment process'
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `Microsoft.Skills.Text.OcrSkill`：OCR用于识别图像中的印刷和手写文本，但`DocumentExtractionSkill`更适合在AI丰富过程中从文档中提取图像中的文本。
