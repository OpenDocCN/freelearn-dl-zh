  id: totrans-141
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考文献：
- en: '*Skills for extra processing during indexing (Azure AI* *Search)*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*索引期间额外的处理技能（Azure AI Search）*：[https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
- en: You are using the Azure Image Analysis API to process images in your app. You
    want to extract specific information from the images by configuring the API call
    with appropriate features. If you use `https://<your-resource-name>.cognitiveservices.azure.com/computervision/imageanalysis:analyze?features=tags,objects`
    as a request, what results will it return?
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在使用Azure Image Analysis API处理您的应用程序中的图像。您希望通过配置API调用并使用适当的特性来从图像中提取特定信息。如果您使用`https://<your-resource-name>.cognitiveservices.azure.com/computervision/imageanalysis:analyze?features=tags,objects`作为请求，它将返回什么结果？
- en: A description of the image’s content only
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 仅对图像内容的描述
- en: The visible text in the image and a description of the image’s content
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像中的可见文本以及图像内容的描述
- en: The tags associated with the image’s content and the objects that were detected
    in the image, along with their approximate locations
  id: totrans-146
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与图像内容相关的标签以及图像中检测到的对象，以及它们的近似位置
- en: A description of the image’s content and the objects that were detected in the
    image
  id: totrans-147
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对图像内容的描述以及图像中检测到的对象
- en: '`tags` and `objects`) will return two types of results:'
  id: totrans-148
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: (`tags`和`objects`)将返回两种类型的结果：
- en: '`cat`, `tree`, and so on'
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cat`、`tree`等'
- en: '`description` feature was specified, not `tags` and `objects`'
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指定了`description`特性，而不是`tags`和`objects`
- en: B. `read` and `description` features were specified, not `tags` and `objects`
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. 指定了`read`和`description`特性，而不是`tags`和`objects`
- en: D. `description` and `objects` features would need to be specified, not `tags`
    and `objects`
  id: totrans-152
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. 需要指定`description`和`objects`特性，而不是`tags`和`objects`
- en: 'Reference:'
  id: totrans-153
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考文献：
- en: '*Call the Image Analysis 3.2* *API*: [https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/call-analyze-image?tabs=rest#select-visual-features](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/call-analyze-image?tabs=rest#select-visual-features)'
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*调用 Image Analysis 3.2* *API*：[https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/call-analyze-image?tabs=rest#select-visual-features](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/call-analyze-image?tabs=rest#select-visual-features)'
- en: You are developing an app named `App1` that utilizes the Azure AI Face service.
    The app needs to detect faces in images accurately, even when the faces are blurry.
    Which of the following actions should you take to optimize the app for this scenario?
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个名为 `App1` 的应用程序，该程序利用 Azure AI Face 服务。该应用程序需要准确检测图像中的面部，即使面部模糊。为了优化应用程序以适应这种场景，你应该采取以下哪些操作？
- en: Set the detection model to `detection_03`
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将检测模型设置为 `detection_03`
- en: Enable the `enhanceImageQuality` feature
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启用 `enhanceImageQuality` 特性
- en: Change the recognition model to `recognition_03`
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将识别模型更改为 `recognition_03`
- en: Adjust the `faceIdTimeToLive` parameter to a higher value
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 `faceIdTimeToLive` 参数调整到更高的值
- en: '`detection_03`.'
  id: totrans-160
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`detection_03`。'
- en: By setting the detection model to `detection_03`, you are leveraging a model
    that improves accuracy on small, side-view, and blurry faces. This is specifically
    designed to handle challenging scenarios, including blurred images.
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 通过将检测模型设置为 `detection_03`，你正在利用一个能够提高小、侧面和模糊人脸准确性的模型。这是专门为处理包括模糊图像在内的挑战性场景而设计的。
- en: 'Here are some details on the incorrect options:'
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: B. `enhanceImageQuality` specifically within the Azure AI Face service for improving
    detection accuracy on blurry faces.
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. `enhanceImageQuality` 特性专门用于 Azure AI Face 服务中，以提升模糊人脸的检测准确性。
- en: C. `recognition_03` improves facial recognition capabilities but does not directly
    address the initial detection of blurry faces. The detection model is more appropriate
    for this task.
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. `recognition_03` 提升了面部识别能力，但并不直接解决模糊人脸的初始检测问题。检测模型更适合这项任务。
- en: D. `faceIdTimeToLive` parameter controls the duration for which the face ID
    is cached. It has no impact on the accuracy of detecting blurry faces.
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `faceIdTimeToLive` 参数控制面部 ID 缓存的时间长度。它对检测模糊人脸的准确性没有影响。
- en: 'Reference:'
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Specify a face detection* *model*: [https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/specify-detection-model](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/specify-detection-model)'
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*指定人脸检测* *模型*：[https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/specify-detection-model](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/specify-detection-model)'
- en: You are developing an app that leverages Azure AI Vision to monitor a video
    feed and analyze the spatial relationships between people and their interactions
    with objects in a physical environment. Which feature of Azure AI Vision should
    you use?
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个应用程序，该程序利用 Azure AI Vision 监控视频流并分析人们在物理环境中与物体之间的空间关系和交互。你应该使用 Azure
    AI Vision 的哪个功能？
- en: Face Detection
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人脸检测
- en: Image Analysis
  id: totrans-170
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分析
- en: '**Optical Character** **Recognition** (**OCR**)'
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**光学字符识别**（**OCR**）'
- en: Spatial Analysis
  id: totrans-172
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 空间分析
- en: '**Correct answer**: D. Spatial Analysis.'
  id: totrans-173
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：D. 空间分析。'
- en: Spatial Analysis is specifically designed to analyze real-time streaming video
    to aid with understanding spatial relationships between people, their movement,
    and interactions with objects in physical environments. This feature is ideal
    for scenarios where you need to monitor the presence and behavior of people in
    a video feed.
  id: totrans-174
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 空间分析专门设计用于分析实时流媒体视频，以帮助理解人们在物理环境中与物体之间的空间关系、运动和交互。此功能非常适合需要监控视频流中人们存在和行为的情况。
- en: 'Here are some details on the incorrect options:'
  id: totrans-175
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. **Face Detection**: This feature is used to detect and analyze individual
    faces in images or video frames, but it does not provide information on spatial
    relationships or interactions between people and objects.'
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **人脸检测**：此功能用于检测和分析图像或视频帧中的单个面部，但它不提供关于人们与物体之间空间关系或交互的信息。
- en: 'B. **Image Analysis**: This feature is more general and focuses on analyzing
    static images to extract information such as tags, descriptions, and objects.
    It is not optimized for analyzing real-time video feeds for spatial relationships.'
  id: totrans-177
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **图像分析**：此功能更为通用，专注于分析静态图像以提取信息，如标签、描述和对象。它不针对分析实时视频流中的空间关系进行优化。
- en: 'C. **OCR**: OCR is used to extract text from images and videos. It does not
    provide capabilities for detecting the presence of people or analyzing their interactions
    in a video feed.'
  id: totrans-178
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **OCR**：OCR用于从图像和视频中提取文本。它不提供检测视频中人物存在或分析其交互的能力。
- en: 'Reference:'
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What is Azure AI* *Vision?*: [https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview)'
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是Azure AI视觉？*：[https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview)'
- en: You have an app named `App2` that uses Azure AI Document Intelligence to process
    TIFF files. Users report that `App2` is unable to process some files. The TIFF
    files are around 1 GB in size each and contain up to 1,500 pages. What could be
    a potential reason for this issue?
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您有一个名为`App2`的应用程序，它使用Azure AI文档智能处理TIFF文件。用户报告称`App2`无法处理某些文件。这些TIFF文件大小约为1
    GB，包含多达1,500页。这个问题可能的原因是什么？
- en: The files exceed the maximum allowed file size for the S0 tier
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文件大小超过了S0层的最大允许文件大小
- en: The files exceed the maximum number of pages allowed for the S0 tier
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文件超过了S0层允许的最大页数
- en: The files are in an unsupported format
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文件格式不受支持
- en: The files have insufficient image resolution
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文件图像分辨率不足
- en: '**Correct answer**: A. The files exceed the maximum allowed file size for the
    S0 tier.'
  id: totrans-186
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：A. 文件大小超过了S0层的最大允许文件大小。'
- en: The S0 tier for Azure AI Document Intelligence can process files up to 500 MB
    in size. Since the files are around 1 GB each, they exceed this limit, causing
    the processing failure.
  id: totrans-187
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure AI文档智能的S0层可以处理大小高达500 MB的文件。由于文件大小约为1 GB，因此超过了此限制，导致处理失败。
- en: 'Here are some details on the incorrect options:'
  id: totrans-188
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里是一些关于错误选项的详细信息：
- en: 'B. **The files exceed the maximum number of pages allowed for the S0 tier**:
    The S0 tier can handle up to 2,000 pages, so the 1,500 pages in the files are
    within the acceptable range'
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **文件超过了S0层允许的最大页数**：S0层可以处理高达2,000页，因此文件中的1,500页在可接受范围内
- en: 'C. **The files are in an unsupported format**: TIFF is a supported format,
    so this cannot be the issue.'
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **文件格式不受支持**：TIFF是一种受支持的格式，因此这不可能是问题所在。
- en: 'D. **The files have insufficient image resolution**: The minimum resolution
    requirements are specified, but the file size issue is the more likely cause given
    the provided data'
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **文件图像分辨率不足**：已指定最小分辨率要求，但根据提供的数据，文件大小问题是更可能的原因
- en: 'Reference:'
  id: totrans-192
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Document Intelligence invoice* *model*: [https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/invoice?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/invoice?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0)'
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*文档智能发票* *模型*：[https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/invoice?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/invoice?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0)'
- en: You are developing a mobile app that uses Azure AI Custom Vision to detect various
    types of vehicles in images. The app must be able to function without internet
    connectivity and perform real-time classification on the device. Which model domain
    should you choose?
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在开发一个使用Azure AI自定义视觉在图像中检测各种类型车辆的移动应用程序。该应用程序必须在没有互联网连接的情况下运行，并在设备上执行实时分类。您应该选择哪个模型领域？
- en: General domain
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通用领域
- en: Compact domain
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 紧凑领域
- en: Logo domain
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Logo领域
- en: Products on shelves domain
  id: totrans-198
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 商架上的产品领域
- en: '**Correct answer**: B. Compact domain.'
  id: totrans-199
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 紧凑领域。'
- en: The Compact domain is optimized for the constraints of real-time classification
    on mobile devices and can be exported to run locally without internet connectivity
    being required.
  id: totrans-200
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 紧凑领域针对移动设备上实时分类的约束进行了优化，并且可以导出以在无需互联网连接的情况下本地运行。
- en: 'Here are some details on the incorrect options:'
  id: totrans-201
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里是一些关于错误选项的详细信息：
- en: 'A. **General domain**: This domain is not optimized for real-time classification
    on edge devices and cannot be exported for offline use'
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **通用领域**：此领域未针对边缘设备上的实时分类进行优化，并且不能导出用于离线使用
- en: 'C. **Logo domain**: This domain is specifically optimized for finding brand
    logos in images and is not designed for the general purpose of detecting various
    types of vehicles'
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **Logo领域**：此领域专门优化用于在图像中查找品牌标志，并不设计用于检测各种类型车辆的通用目的
- en: 'D. **Products on shelves domain**: This domain is optimized for detecting and
    classifying products on shelves, so it’s not suitable for vehicle detection or
    offline use'
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **货架上的产品领域**：此领域针对检测和分类货架上的产品进行优化，因此不适用于车辆检测或离线使用
- en: 'Reference:'
  id: totrans-205
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Select a domain for a Custom Vision* *project*: [https://learn.microsoft.com/en-us/azure/ai-services/custom-vision-service/select-domain](https://learn.microsoft.com/en-us/azure/ai-services/custom-vision-service/select-domain)'
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*为自定义视觉项目选择一个领域*：[https://learn.microsoft.com/en-us/azure/ai-services/custom-vision-service/select-domain](https://learn.microsoft.com/en-us/azure/ai-services/custom-vision-service/select-domain)'
- en: You are developing an app that uses Azure AI Video Indexer to analyze webinar
    recordings. The app needs to identify and extract insights about specific products
    and services mentioned during the webinars. Which content model should you use?
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在开发一个使用 Azure AI 视频索引器分析网络研讨会记录的应用程序。该应用程序需要识别和提取网络研讨会中提到的特定产品和服务的见解。您应该使用哪种内容模型？
- en: Custom Language
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义语言
- en: Custom Brands
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义品牌
- en: Custom Person
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义人物
- en: Custom Topic
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义主题
- en: '**Correct answer**: B. Custom Brands.'
  id: totrans-212
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 自定义品牌。'
- en: The Custom Brands model is designed to detect and recognize mentions of specific
    products, services, and companies from speech and visual text during the indexing
    of video and audio content. This makes it suitable for identifying specific products
    and services mentioned during webinars.
  id: totrans-213
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 自定义品牌模型旨在在视频和音频内容的索引过程中从语音和视觉文本中检测和识别特定产品、服务和公司的提及。这使得它适合识别网络研讨会中提到的特定产品和服务。
- en: 'Here are some details on the incorrect options:'
  id: totrans-214
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Custom Language**: This model is used to add specific words and phrases
    that are not in the standard language model, which helps improve transcription
    accuracy but does not directly support brand detection'
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **自定义语言**：此模型用于添加标准语言模型中不存在的特定单词和短语，这有助于提高转录准确性，但并不直接支持品牌检测
- en: 'C. **Custom Person**: This model is used to recognize and identify specific
    people in videos and is not suitable for detecting products or services'
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **自定义人物**：此模型用于识别和识别视频中的特定人物，不适用于检测产品或服务
- en: 'D. **Custom Topic**: This model is used to extract and categorize different
    topics discussed in the video but does not specifically detect brands or products'
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **自定义主题**：此模型用于提取和分类视频中讨论的不同主题，但不专门检测品牌或产品
- en: 'Reference:'
  id: totrans-218
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Customize a brands model in Azure AI Video* *Indexer*: [https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal)'
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在 Azure AI 视频索引器中自定义品牌模型*：[https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal)'
- en: 'You are using a Custom Language content model in an Azure AI Video Indexer
    solution. During testing, you upload a text file that includes the following sentence:
    *Azure AI Video Indexer & other tools are essential for video analysis.* The sentence
    is discarded. You need to ensure that the model retains the sentence. What should
    you do?'
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在使用 Azure AI 视频索引器解决方案中的自定义语言内容模型。在测试期间，您上传了一个包含以下句子的文本文件：*Azure AI 视频索引器与其他工具对于视频分析至关重要。*
    该句子被丢弃。您需要确保模型保留该句子。您应该怎么做？
- en: Include the sentence in a text file with multiple paragraphs
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在包含多个段落的文本文件中包含该句子
- en: Remove the *&* character from the text file
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从文本文件中移除 *&* 字符
- en: Use the Custom Brands content model
  id: totrans-223
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用自定义品牌内容模型
- en: Add more sentences with special characters to the text file
  id: totrans-224
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在文本文件中添加更多包含特殊字符的句子
- en: '**Correct answer**: B. Remove the *&* character from the text file.'
  id: totrans-225
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 从文本文件中移除 *&* 字符。'
- en: Sentences containing special characters such as *&* are discarded during the
    training process. To ensure the sentence is retained, you need to remove such
    special characters from the text file.
  id: totrans-226
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在训练过程中，包含特殊字符（如 *&*）的句子会被丢弃。为确保句子被保留，您需要从文本文件中移除此类特殊字符。
- en: 'Here are some details on the incorrect options:'
  id: totrans-227
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Include the sentence in a text file with multiple paragraphs**: Including
    the sentence in a text file with multiple paragraphs does not address the issue
    of special characters causing the sentence to be discarded'
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **在包含多个段落的文本文件中包含该句子**：在包含多个段落的文本文件中包含该句子并不能解决由特殊字符导致句子被丢弃的问题
- en: 'C. **Use the Custom Brands content model**: This model is used for brand detection
    and is not relevant to the issue of special characters in text files used for
    training language models'
  id: totrans-229
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **使用自定义品牌内容模型**：此模型用于品牌检测，与用于训练语言模型的文本文件中的特殊字符问题无关
- en: 'D. **Add more sentences with special characters to the text file**: Adding
    more sentences with special characters will not solve the problem; it will only
    lead to more sentences being discarded'
  id: totrans-230
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **在文本文件中添加更多包含特殊字符的句子**：添加更多包含特殊字符的句子并不能解决问题；它只会导致更多句子被丢弃
- en: 'Reference:'
  id: totrans-231
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Customize a language model with Azure AI Video* *Indexer*: [https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal)'
  id: totrans-232
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用Azure AI视频索引器自定义语言模型*：[https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal)'
- en: You are configuring the training phase for a Custom Language model in an Azure
    AI Video Indexer solution. The model needs to learn from the probability of specific
    word combinations and improve transcription accuracy. Which three practices should
    be followed for the training data? Each correct answer presents a complete solution.
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置Azure AI视频索引器解决方案中自定义语言模型的训练阶段。该模型需要从特定词组合的概率中学习，并提高转录准确性。对于训练数据，应遵循哪三种实践？每个正确答案都提供了一个完整的解决方案。
- en: Include at least 500,000 sentences
  id: totrans-234
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含至少500,000个句子
- en: Include multiple examples of spoken sentences
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含多个口语句子的例子
- en: Include special characters such as *~*, *#*, *@*, *%*, and *&*
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含特殊字符，如 *~*, *#*, *@*, *%*, 和 *&*
- en: Provide multiple adaptation options
  id: totrans-237
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供多种适应选项
- en: Put only one sentence per line
  id: totrans-238
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每行只放一个句子
- en: Repeat the identical sentence multiple times
  id: totrans-239
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复相同的句子多次
- en: '**Correct answers**:'
  id: totrans-240
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：'
- en: 'B. **Include multiple examples of spoken sentences**: Including multiple examples
    of spoken sentences helps the model learn the context and usage of words, improving
    transcription accuracy'
  id: totrans-241
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **包含多个口语句子的例子**：包含多个口语句子的例子有助于模型学习语境和词汇的使用，从而提高转录准确性
- en: 'D. **Provide multiple adaptation options**: Providing multiple adaptation options
    helps the model understand different contexts and variations of word usage, enhancing
    its learning process'
  id: totrans-242
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **提供多种适应选项**：提供多种适应选项有助于模型理解不同的语境和词汇使用的变体，从而增强其学习过程
- en: 'E. **Put only one sentence per line**: Putting only one sentence per line ensures
    that the model learns probabilities within sentences rather than across sentences,
    which is crucial for accurate transcription'
  id: totrans-243
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: E. **每行只放一个句子**：每行只放一个句子确保模型学习句子内的概率，而不是跨句子，这对于准确转录至关重要
- en: 'Here are some details on the incorrect options:'
  id: totrans-244
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Include at least 500,000 sentences**: Including too many sentences, such
    as hundreds of thousands, can dilute the effect of boosting and is not recommended
    for effective training'
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **包含至少500,000个句子**：包含过多的句子，如数十万个，可能会稀释提升效果，并且不建议用于有效训练
- en: 'C. **Include special characters such as ~, #, @, %, and &**: Special characters
    will be discarded, and the sentences in which they appear will also be discarded,
    making this practice incorrect'
  id: totrans-246
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C. **包含特殊字符，如 ~, #, @, % 和 &**：特殊字符将被丢弃，包含这些字符的句子也将被丢弃，这使得这种做法是错误的'
- en: 'F. **Repeat the identical sentence multiple times**: Repeating the identical
    sentence multiple times can create bias against the rest of the input and should
    be avoided'
  id: totrans-247
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: F. **重复相同的句子多次**：重复相同的句子多次可能会对其他输入产生偏见，应该避免
- en: 'Reference:'
  id: totrans-248
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Customize a language model with Azure AI Video* *Indexer*: [https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal)'
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用Azure AI视频索引器自定义语言模型*：[https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/customize-language-model-how-to?tabs=customizewebportal)'
- en: You are developing an app that utilizes Azure AI Video Indexer to extract insights
    from multilingual video content. To ensure accurate transcription and language
    detection, you need to configure the API call correctly. Which parameter should
    you use to allow the API to detect multiple languages in the video?
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在开发一个利用 Azure AI 视频索引器从多语言视频内容中提取洞察的应用程序。为确保转录和语言检测的准确性，您需要正确配置 API 调用。您应使用哪个参数允许
    API 检测视频中的多种语言？
- en: '`isAutoDetect`'
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`isAutoDetect`'
- en: '`customLanguages`'
  id: totrans-252
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`customLanguages`'
- en: '`sourceLanguage`'
  id: totrans-253
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`sourceLanguage`'
- en: '`multiLanguage`'
  id: totrans-254
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`multiLanguage`'
- en: '`sourceLanguage`.'
  id: totrans-255
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`sourceLanguage`。'
- en: To enable the Azure AI Video Indexer API to detect multiple languages within
    a video, you should use the `sourceLanguage` parameter and set it to multi-language
    detection. This allows the Video Indexer API to automatically identify and transcribe
    multiple languages within the video content.
  id: totrans-256
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 要启用 Azure AI 视频索引器 API 在视频中检测多种语言，您应使用 `sourceLanguage` 参数并将其设置为多语言检测。这允许视频索引器
    API 自动识别和转录视频内容中的多种语言。
- en: 'Here are some details on the incorrect options:'
  id: totrans-257
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的一些详细信息：
- en: 'A. `isAutoDetect`: This parameter is used to indicate whether automatic language
    detection should be enabled, but it does not specifically configure multi-language
    detection'
  id: totrans-258
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. `isAutoDetect`：此参数用于指示是否应启用自动语言检测，但它不具体配置多语言检测
- en: 'B. `customLanguages`: This parameter is used to specify a custom list of languages
    for detection but requires `sourceLanguage` to be set to multi-language or auto'
  id: totrans-259
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. `customLanguages`：此参数用于指定用于检测的自定义语言列表，但需要将 `sourceLanguage` 设置为多语言或自动
- en: 'D. `multiLanguage`: This is not a valid parameter name for configuring the
    API so that it can detect multiple languages'
  id: totrans-260
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `multiLanguage`：这不是配置 API 以检测多种语言的正确参数名称
- en: 'Reference:'
  id: totrans-261
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Get media transcription, translation, and language identification* *insights*:
    [https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/transcription-translation-lid-insight](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/transcription-translation-lid-insight)'
  id: totrans-262
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*获取媒体转录、翻译和语言识别洞察*：[https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/transcription-translation-lid-insight](https://learn.microsoft.com/en-us/previous-versions/azure/azure-video-indexer/transcription-translation-lid-insight)'
- en: You are configuring Azure AI Search so that it supports complex search scenarios,
    including wildcard, fuzzy, and regular expression searches. Which query type should
    you set in your API request to leverage these advanced search capabilities?
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置 Azure AI Search 以支持复杂的搜索场景，包括通配符、模糊和正则表达式搜索。在您的 API 请求中应设置哪种查询类型以利用这些高级搜索功能？
- en: '`"``queryType": "simple"`'
  id: totrans-264
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`"``queryType": "simple"`'
- en: '`"``queryType": "full"`'
  id: totrans-265
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`"``queryType": "full"`'
- en: '`"``queryType": "advanced"`'
  id: totrans-266
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`"``queryType": "advanced"`'
- en: '`"``queryType": "lucene"`'
  id: totrans-267
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`"``queryType": "lucene"`'
- en: '`"``queryType": "full"`.'
  id: totrans-268
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`"``queryType": "full"`.'
- en: Setting `"queryType"` to `"full"` enables the use of the `full` Lucene query
    syntax, which supports advanced search capabilities such as wildcard, fuzzy, and
    regular expression searches. This allows for more complex and powerful search
    queries compared to the simple query language, which is more limited in scope.
  id: totrans-269
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将 `"queryType"` 设置为 `"full"` 启用了 `full` Lucene 查询语法的使用，它支持高级搜索功能，如通配符、模糊和正则表达式搜索。这允许进行比简单查询语言更复杂和强大的搜索查询，简单查询语言在范围上更为有限。
- en: 'Here are some details on the incorrect options:'
  id: totrans-270
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的一些详细信息：
- en: 'A. `"queryType": "simple"`: This is incorrect because the `simple` query type
    supports basic search functionality and does not include advanced search capabilities
    such as wildcards, fuzzy searches, or regular expressions.'
  id: totrans-271
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A. `"queryType": "simple"`：这是错误的，因为 `simple` 查询类型仅支持基本搜索功能，不包括通配符、模糊搜索或正则表达式等高级搜索功能。'
- en: 'C. `"queryType": "advanced"`: This is incorrect because there is no recognized
    query type named `advanced` in Azure AI Search. The supported query types are
    `simple` and `full`.'
  id: totrans-272
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C. `"queryType": "advanced"`：这是错误的，因为在 Azure AI Search 中没有名为 `advanced` 的查询类型。支持的查询类型是
    `simple` 和 `full`。'
- en: 'D. `"queryType": "lucene"`: This is incorrect because `lucene` is not a valid
    query type parameter. The correct parameter to enable Lucene query syntax is `"``queryType":
    "full"`.'
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'D. `"queryType": "lucene"`：这是错误的，因为 `lucene` 不是一个有效的查询类型参数。启用 Lucene 查询语法的正确参数是
    `"``queryType": "full"`。'
- en: 'Reference:'
  id: totrans-274
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Full text search in Azure AI* *Search*: [https://learn.microsoft.com/en-us/azure/search/search-lucene-query-architecture](https://learn.microsoft.com/en-us/azure/search/search-lucene-query-architecture)'
  id: totrans-275
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Azure AI搜索中的全文搜索* *模型*：[https://learn.microsoft.com/en-us/azure/search/search-lucene-query-architecture](https://learn.microsoft.com/en-us/azure/search/search-lucene-query-architecture)'
- en: You are tasked with extracting data from various document formats using the
    Azure AI Document Intelligence prebuilt-read model. Which of the following file
    formats are supported by this model? Select all that apply.
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的任务是使用Azure AI文档智能预构建读取模型从各种文档格式中提取数据。以下哪些文件格式由该模型支持？选择所有适用的选项。
- en: JPEG
  id: totrans-277
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: JPEG
- en: XML
  id: totrans-278
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: XML
- en: PowerPoint
  id: totrans-279
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: PowerPoint
- en: HEIF
  id: totrans-280
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: HEIF
- en: '**Correct answers**:'
  id: totrans-281
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：'
- en: 'A. **JPEG**: The prebuilt-read model supports extracting data from JPEG images
    since it is one of the supported image formats.'
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **JPEG**：预构建读取模型支持从JPEG图像中提取数据，因为它是一种受支持的图像格式。
- en: 'C. **PowerPoint**: The prebuilt-read model supports extracting data from Microsoft
    PowerPoint (PPTX) files'
  id: totrans-283
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **PowerPoint**：预构建读取模型支持从Microsoft PowerPoint (PPTX) 文件中提取数据
- en: 'D. **HEIF**: The prebuilt-read model supports extracting data from HEIF images,
    making it a supported image format'
  id: totrans-284
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **HEIF**：预构建读取模型支持从HEIF图像中提取数据，使其成为一种受支持的图像格式
- en: 'Here are some details on the incorrect option:'
  id: totrans-285
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'B. **XML**: XML is not listed as a supported file format for the prebuilt-read
    model'
  id: totrans-286
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **XML**：XML未列为预构建读取模型支持的文件格式
- en: 'Reference:'
  id: totrans-287
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Document Intelligence read* *model*: [https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/read?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0&tabs=sample-code](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/read?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0&tabs=sample-code)'
  id: totrans-288
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*文档智能读取* *模型*：[https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/read?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0&tabs=sample-code](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/read?view=doc-intel-3.1.0&viewFallbackFrom=form-recog-3.0.0&tabs=sample-code)'
- en: You are developing an app that uses the Azure AI Language service to analyze
    documents and redact sensitive information. You need to configure the **Personally
    Identifiable Information** (**PII**) detection feature to remove email addresses
    and phone numbers from the documents. Which categories should you specify in your
    request?
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在开发一个使用Azure AI语言服务分析文档并擦除敏感信息的应用程序。您需要配置**个人身份信息**（**PII**）检测功能以从文档中删除电子邮件地址和电话号码。您应该在请求中指定哪些类别？
- en: '**Contact** and **Address**'
  id: totrans-290
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**联系**和**地址**'
- en: '**Email** and **PhoneNumber**'
  id: totrans-291
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**电子邮件**和**电话号码**'
- en: '**Email**, **PhoneNumber**, and **Organization**'
  id: totrans-292
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**电子邮件**、**电话号码**和**组织**'
- en: '**Person**, **Address**, and **PhoneNumber**'
  id: totrans-293
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人员**、**地址**和**电话号码**'
- en: '**Correct answer**: B. **Email** and **PhoneNumber**.'
  id: totrans-294
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. **电子邮件**和**电话号码**。'
- en: To specifically remove email addresses and phone numbers, you should specify
    the **Email** and **PhoneNumber** categories in your request. These categories
    target the exact types of information you want to redact.
  id: totrans-295
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 要特别删除电子邮件地址和电话号码，您应该在请求中指定**电子邮件**和**电话号码**类别。这些类别针对您想要擦除的确切类型的信息。
- en: 'Here are some details on the incorrect options:'
  id: totrans-296
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Contact and Address**: While **Contact** might suggest communication information,
    it is not a recognized category. The **Address** category would remove physical
    address information, not email addresses and phone numbers.'
  id: totrans-297
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **联系和地址**：虽然**联系**可能暗示通信信息，但它不是一个认可的类别。**地址**类别会移除物理地址信息，而不是电子邮件地址和电话号码。
- en: 'C. **Email, PhoneNumber, and Organization**: While **Email** and **PhoneNumber**
    are correct, **Organization** is unnecessary for your specific requirement of
    removing email addresses and phone numbers.'
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **电子邮件、电话号码和组织**：虽然**电子邮件**和**电话号码**是正确的，但对于您要删除电子邮件地址和电话号码的具体要求来说，**组织**是不必要的。
- en: 'D. **Person, Address, and PhoneNumber**: The **Person** and **Address** categories
    would remove names and physical addresses, respectively. **PhoneNumber** is correct,
    but the other two categories are not needed for your specific requirement.'
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **人员、地址和电话号码**：**人员**和**地址**类别分别会移除姓名和物理地址。**电话号码**是正确的，但其他两个类别对于您的具体要求来说不是必需的。
- en: 'Reference:'
  id: totrans-300
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Supported PII entity* *categories*: [https://learn.microsoft.com/en-us/azure/ai-services/language-service/personally-identifiable-information/concepts/entity-categories](https://learn.microsoft.com/en-us/azure/ai-services/language-service/personally-identifiable-information/concepts/entity-categories)'
  id: totrans-301
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*支持的PII实体类别*：[https://learn.microsoft.com/en-us/azure/ai-services/language-service/personally-identifiable-information/concepts/entity-categories](https://learn.microsoft.com/en-us/azure/ai-services/language-service/personally-identifiable-information/concepts/entity-categories)'
- en: You are developing a feedback analysis app using Azure AI Language Sentiment
    Analysis. You have a test document named `Feedback.docx` that contains one negative
    sentence and several positive sentences. Which sentiment label will the app return
    for `Feedback.docx`?
  id: totrans-302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个使用Azure AI语言情感分析的反馈分析应用。你有一个名为`Feedback.docx`的测试文档，其中包含一个负面句子和几个正面句子。应用将为`Feedback.docx`返回哪种情感标签？
- en: '`mixed`'
  id: totrans-303
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`混合`'
- en: '`negative`'
  id: totrans-304
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`负面`'
- en: '`neutral`'
  id: totrans-305
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`中立`'
- en: '`positive`'
  id: totrans-306
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`正面`'
- en: '`mixed`.'
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`混合`'
- en: If the document contains at least one negative sentence and at least one positive
    sentence, the sentiment label for the entire document will be `mixed`.
  id: totrans-308
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果文档中至少有一个负面句子和一个正面句子，整个文档的情感标签将是`混合`。
- en: 'Here are some details on the incorrect options:'
  id: totrans-309
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'B. `negative`: The `negative` label would be returned if the document contained
    at least one negative sentence and the rest were neutral, but since there are
    positive sentences as well, the label will be `mixed`.'
  id: totrans-310
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. `负面`：如果文档中至少有一个负面句子且其余句子都是中立的，则将返回`负面`标签，但由于也存在正面句子，标签将是`混合`。
- en: 'C. `neutral`: The `neutral` label would be returned if all sentences in the
    document were neutral. Since there are both positive and negative sentences, the
    label will be `mixed`.'
  id: totrans-311
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. `中立`：如果文档中的所有句子都是中立的，则将返回`中立`标签。由于既有正面句子也有负面句子，标签将是`混合`。
- en: 'D. `positive`: The `positive` label would be returned if there was at least
    one positive sentence and the rest were neutral. Since there is a negative sentence,
    the label will be `mixed`.'
  id: totrans-312
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `正面`：如果文档中至少有一个正面句子且其余句子都是中立的，则将返回`正面`标签。由于存在负面句子，标签将是`混合`。
- en: 'Reference:'
  id: totrans-313
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*How to: Use Sentiment analysis and Opinion* *Mining*: [https://learn.microsoft.com/en-us/azure/ai-services/language-service/sentiment-opinion-mining/how-to/call-api](https://learn.microsoft.com/en-us/azure/ai-services/language-service/sentiment-opinion-mining/how-to/call-api)'
  id: totrans-314
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*如何使用情感分析和意见挖掘*：[https://learn.microsoft.com/en-us/azure/ai-services/language-service/sentiment-opinion-mining/how-to/call-api](https://learn.microsoft.com/en-us/azure/ai-services/language-service/sentiment-opinion-mining/how-to/call-api)'
- en: You are creating an app that needs to generate summaries of text documents by
    identifying the most important sentences. Which Azure AI Language feature should
    you use?
  id: totrans-315
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在创建一个需要通过识别最重要句子来生成文本文档摘要的应用。你应该使用哪个Azure AI语言功能？
- en: Key phrase extraction
  id: totrans-316
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关键短语提取
- en: Language Summarization
  id: totrans-317
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言摘要
- en: '**Named Entity** **Recognition** (**NER**)'
  id: totrans-318
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**命名实体识别**（NER）'
- en: PII detection
  id: totrans-319
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: PII检测
- en: '**Correct answer**: B. Language Summarization.'
  id: totrans-320
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 语言摘要。'
- en: Language Summarization extracts sentences that collectively represent the most
    important or relevant information within the original content, making it the appropriate
    choice for generating summaries.
  id: totrans-321
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 语言摘要提取代表原始内容中最重要或相关信息的句子，使其成为生成摘要的合适选择。
- en: 'Here are some details on the incorrect options:'
  id: totrans-322
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Key phrase extraction**: Key phrase extraction identifies the main concepts
    in the text but does not provide summaries of the most important sentences'
  id: totrans-323
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **关键短语提取**：关键短语提取识别文本中的主要概念，但不会提供最重要句子的总结
- en: 'C. **NER**: NER identifies and classifies named entities in text, such as names
    of people, organizations, and locations, but it does not summarize text'
  id: totrans-324
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **命名实体识别**（NER）：NER识别和分类文本中的命名实体，例如人名、组织名和地点名，但它不会总结文本
- en: 'D. **PII detection**: PII detection identifies and redacts sensitive information
    from text, such as names, addresses, and phone numbers, but it does not summarize
    text'
  id: totrans-325
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **PII检测**：PII检测从文本中识别并删除敏感信息，例如姓名、地址和电话号码，但它不会总结文本
- en: 'Reference:'
  id: totrans-326
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What is* *summarization?*: [https://learn.microsoft.com/en-us/azure/ai-services/language-service/summarization/overview?tabs=text-summarization](https://learn.microsoft.com/en-us/azure/ai-services/language-service/summarization/overview?tabs=text-summarization)'
  id: totrans-327
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是* *摘要*？*：[https://learn.microsoft.com/en-us/azure/ai-services/language-service/summarization/overview?tabs=text-summarization](https://learn.microsoft.com/en-us/azure/ai-services/language-service/summarization/overview?tabs=text-summarization)'
- en: You are configuring an Azure OpenAI service resource and need to ensure that
    only specific virtual networks within your Azure subscription can access it. Which
    network security setting should you configure?
  id: totrans-328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置 Azure OpenAI 服务资源，并需要确保只有您 Azure 订阅内的特定虚拟网络可以访问它。您应该配置哪种网络安全设置？
- en: All networks
  id: totrans-329
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所有网络
- en: All networks, and configure a network security group to control traffic
  id: totrans-330
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所有网络，并配置网络安全组以控制流量
- en: Disabled, and allow a private endpoint connection to establish access
  id: totrans-331
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 禁用，并允许建立私有端点连接以建立访问
- en: Selected networks
  id: totrans-332
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择网络
- en: '**Correct answer**: D. Selected networks.'
  id: totrans-333
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：D. 选择网络。'
- en: This setting allows you to specify which virtual networks are permitted to access
    your Azure AI service resource. By configuring this option, you can restrict access
    to only the networks within your Azure subscription that you explicitly permit.
  id: totrans-334
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此设置允许您指定哪些虚拟网络被允许访问您的 Azure AI 服务资源。通过配置此选项，您可以限制访问仅限于您明确允许的 Azure 订阅内的网络。
- en: 'Here are some details on the incorrect options:'
  id: totrans-335
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **All networks**: Allows access from any network, including the internet,
    which does not restrict access to specific networks within your subscription'
  id: totrans-336
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **所有网络**：允许从任何网络访问，包括互联网，这并不限制对订阅内特定网络的访问
- en: 'B. **All networks, and configure a network security group to control traffic**:
    While this can help control traffic, it does not inherently restrict access to
    specific virtual networks within your subscription'
  id: totrans-337
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **所有网络，并配置网络安全组以控制流量**：虽然这可以帮助控制流量，但它本身并不限制对订阅内特定虚拟网络的访问
- en: 'C. **Disabled, and allow a private endpoint connection to establish access**:
    This setting disables all network access and requires the use of private endpoints,
    which is more restrictive than needed if you only want to limit access to specific
    virtual networks within your subscription'
  id: totrans-338
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **禁用，并允许建立私有端点连接以建立访问**：此设置禁用了所有网络访问，并要求使用私有端点，如果您只想限制对订阅内特定虚拟网络的访问，则此设置比所需更为严格
- en: 'Reference:'
  id: totrans-339
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Configure Azure AI services virtual* *networks*: [https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal](https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal)'
  id: totrans-340
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*配置 Azure AI 服务虚拟* *网络*：[https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal](https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-virtual-networks?tabs=portal)'
- en: You have deployed a GPT-35-Turbo model in Azure OpenAI Service with auto-update
    disabled. After some time, you find that your apps are utilizing a newer version
    of the model without manual intervention. What could have caused this update?
  id: totrans-341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您在 Azure OpenAI 服务中部署了一个 GPT-35-Turbo 模型，并禁用了自动更新。一段时间后，您发现您的应用程序正在使用模型的新版本，而无需手动干预。什么可能导致这次更新？
- en: The model version was automatically updated due to a new feature release
  id: totrans-342
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型版本因新功能发布而自动更新
- en: The model version was updated because the previous version had a critical bug
  id: totrans-343
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型版本已更新，因为前一个版本存在一个关键错误
- en: The model version was retired, triggering an automatic upgrade to the current
    default version
  id: totrans-344
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型版本已退役，触发自动升级到当前默认版本
- en: The model version was updated as part of a routine maintenance schedule
  id: totrans-345
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型版本作为常规维护计划的一部分进行了更新
- en: '**Correct answer**: C. The model version was retired, triggering an automatic
    upgrade to the current default version.'
  id: totrans-346
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：C. 模型版本已退役，触发自动升级到当前默认版本。'
- en: When a specific model version is selected for deployment and auto-update is
    disabled, the model will retain that version until it reaches its retirement date.
    Upon reaching the retirement date, the model will automatically upgrade to the
    current default version to ensure continued functionality.
  id: totrans-347
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当选择特定模型版本进行部署并禁用自动更新时，该模型将保留该版本，直到达到其退休日期。达到退休日期后，模型将自动升级到当前默认版本，以确保持续的功能性。
- en: 'Here are some details on the incorrect options:'
  id: totrans-348
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **The model version was automatically updated due to a new feature release**:
    This is incorrect as auto-update is disabled, and updates only occur at retirement'
  id: totrans-349
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **模型版本由于新功能发布而自动更新**：这是不正确的，因为自动更新已禁用，更新仅在退休时发生
- en: 'B. **The model version was updated because the previous version had a critical
    bug**: While critical bugs can prompt updates, this scenario is specifically managed
    by retirement dates'
  id: totrans-350
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **模型版本更新是因为之前的版本有一个关键错误**：虽然关键错误可以促使更新，但这种情况特别由退休日期管理
- en: 'D. **The model version was updated as part of a routine maintenance schedule**:
    This is incorrect; updates are based on retirement dates rather than routine maintenance'
  id: totrans-351
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **模型版本作为常规维护计划的一部分进行了更新**：这是不正确的；更新是基于退休日期而不是常规维护
- en: 'Reference:'
  id: totrans-352
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Working with Azure OpenAI* *models*: [https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/working-with-models?tabs=powershell](https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/working-with-models?tabs=powershell)'
  id: totrans-353
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用 Azure OpenAI 模型*：[https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/working-with-models?tabs=powershell](https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/working-with-models?tabs=powershell)'
- en: You are developing a web app that generates images using the DALL-E 3 model
    from Azure OpenAI Service. To ensure the HTTP requests to the Azure OpenAI API
    are properly configured, which three URI parameters must be included in your requests?
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个网页应用程序，使用 Azure OpenAI 服务中的 DALL-E 3 模型生成图像。为了确保对 Azure OpenAI API 的
    HTTP 请求配置正确，你的请求中必须包含哪三个 URI 参数？
- en: '`endpoint`'
  id: totrans-355
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`endpoint`'
- en: '`deployment-id`'
  id: totrans-356
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`deployment-id`'
- en: '`api-version`'
  id: totrans-357
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`api-version`'
- en: '`user`'
  id: totrans-358
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`user`'
- en: '`endpoint`: Specifies the URL of the Azure OpenAI endpoint, which includes
    the resource name'
  id: totrans-359
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`endpoint`：指定 Azure OpenAI 端点的 URL，包括资源名称'
- en: 'B. `deployment-id`: The unique identifier of the DALL-E 3 model deployment'
  id: totrans-360
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: B. `deployment-id`：DALL-E 3 模型部署的唯一标识符
- en: 'C. `api-version`: Indicates the version of the API being used for the request'
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: C. `api-version`：指示请求中使用的 API 版本
- en: Here are some details on the incorrect options
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息
- en: 'D. `user`: The `user` parameter is *not required* for configuring HTTP requests
    to the Azure OpenAI API'
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `user`：`user` 参数对于配置对 Azure OpenAI API 的 HTTP 请求不是必需的
- en: 'Reference:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 参考：
- en: '*URI* *Parameters*: [https://learn.microsoft.com/en-us/azure/ai-services/openai/reference#uri-parameters](https://learn.microsoft.com/en-us/azure/ai-services/openai/reference#uri-parameters)'
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*URI* *参数*：[https://learn.microsoft.com/en-us/azure/ai-services/openai/reference#uri-parameters](https://learn.microsoft.com/en-us/azure/ai-services/openai/reference#uri-parameters)'
- en: You are building a web app that will moderate user-generated content to ensure
    it is free from harmful material. The app will use Azure AI services. You need
    to ensure that the model can detect inappropriate content. Which additional Azure
    service should you deploy? Select only one answer.
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在构建一个网页应用程序，用于审核用户生成的内容，以确保其不包含有害材料。该应用程序将使用 Azure AI 服务。你需要确保模型能够检测不适当的内容。你应该部署哪些额外的
    Azure 服务？请只选择一个答案。
- en: Azure AI Search
  id: totrans-367
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI 搜索
- en: Azure AI Content Safety
  id: totrans-368
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI 内容安全
- en: Language
  id: totrans-369
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言
- en: Azure Content Moderator
  id: totrans-370
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure 内容审核器
- en: '**Correct answer**: D. Azure Content Moderator.'
  id: totrans-371
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：D. Azure 内容审核器。'
- en: Azure Content Moderator is a service designed to detect and filter inappropriate
    content in text, images, and videos. It provides capabilities such as profanity
    filtering, image moderation, and customizable term lists, making it suitable for
    apps that require content moderation to ensure safety and appropriateness.
  id: totrans-372
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure 内容审核器是一个旨在检测和过滤文本、图像和视频中的不适当内容的服务的。它提供诸如粗话过滤、图像审核和可定制的术语列表等功能，使其适用于需要内容审核以确保安全和适当性的应用程序。
- en: 'Here are some details on the incorrect options:'
  id: totrans-373
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Azure AI Search**: This service is used for search and indexing, not for
    content moderation'
  id: totrans-374
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **Azure AI 搜索**：此服务用于搜索和索引，而不是内容审核
- en: 'B. **Azure AI Content Safety**: Although this service also provides content
    moderation, the question specifically asks for the traditional Content Moderator
    service'
  id: totrans-375
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **Azure AI 内容安全**：尽管这项服务也提供内容审核，但问题具体询问的是传统的内容审核器服务
- en: 'C. **Language**: This service focuses on language understanding and processing,
    not on content moderation'
  id: totrans-376
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **语言**：此服务专注于语言理解和处理，而不是内容审核
- en: 'Reference:'
  id: totrans-377
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What is Azure AI Content* *Safety?*: [https://learn.microsoft.com/en-us/azure/ai-services/content-safety/overview](https://learn.microsoft.com/en-us/azure/ai-services/content-safety/overview)'
  id: totrans-378
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是 Azure AI 内容* *安全性？*：[https://learn.microsoft.com/en-us/azure/ai-services/content-safety/overview](https://learn.microsoft.com/en-us/azure/ai-services/content-safety/overview)'
- en: You are designing a GPT-based chat assistant for your organization using Azure
    OpenAI Service. You want to ensure that your data is ingested and supported properly.
    Which file types can you upload to ground the model with your enterprise data?
  id: totrans-379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在使用 Azure OpenAI 服务为您的组织设计一个基于 GPT 的聊天助手。您希望确保您的数据被正确摄取和支持。您可以将哪些文件类型上传以将模型与您的企业数据固定？
- en: XML
  id: totrans-380
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: XML
- en: DOCX
  id: totrans-381
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: DOCX
- en: PPTX
  id: totrans-382
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: PPTX
- en: ZIP
  id: totrans-383
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: ZIP
- en: '**Correct answers**:'
  id: totrans-384
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：'
- en: 'B. **DOCX**: Microsoft Word files (DOCX) are supported for grounding the model
    with your data in Azure OpenAI'
  id: totrans-385
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **DOCX**：Microsoft Word 文件（DOCX）支持在 Azure OpenAI 中使用您的数据固定模型。
- en: 'C. **PPTX**: Microsoft PowerPoint files (PPTX) are also supported for this
    purpose'
  id: totrans-386
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **PPTX**：Microsoft PowerPoint 文件（PPTX）也支持此目的。
- en: 'Here are some details on the incorrect options:'
  id: totrans-387
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的详细信息：
- en: 'A. **XML**: XML files are not supported for grounding the model in Azure OpenAI'
  id: totrans-388
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **XML**：XML 文件不支持在 Azure OpenAI 中用于将模型固定。
- en: 'D. **ZIP**: ZIP files are not supported either'
  id: totrans-389
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **ZIP**：ZIP 文件也不受支持。
- en: 'Reference:'
  id: totrans-390
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Data formats and file* *types*: [https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#data-formats-and-file-types](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#data-formats-and-file-types)'
  id: totrans-391
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*数据格式和文件* *类型*：[https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#data-formats-and-file-types](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#data-formats-and-file-types)'
- en: You are configuring an Azure OpenAI resource to ensure that only the most relevant
    documents from your company’s data are used in generating responses. What parameter
    would you adjust to increase the relevance threshold for document filtration?
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置 Azure OpenAI 资源以确保仅使用您公司数据中最相关的文档生成回复。您需要调整哪个参数来提高文档过滤的相关性阈值？
- en: '`Temperature`'
  id: totrans-393
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Temperature`'
- en: '`TopNDocuments`'
  id: totrans-394
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`TopNDocuments`'
- en: '`Strictness`'
  id: totrans-395
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Strictness`'
- en: '`System Message`'
  id: totrans-396
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`System Message`'
- en: '`Strictness`.'
  id: totrans-397
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Strictness`。'
- en: The `Strictness` parameter controls how aggressively the system filters out
    less relevant documents based on their similarity scores to the user query. Increasing
    the value of `Strictness` means that the system will apply a higher similarity
    threshold, filtering out more documents that are considered less relevant, thereby
    enhancing the accuracy of the responses.
  id: totrans-398
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Strictness` 参数控制系统根据用户查询的相似度分数过滤掉不太相关的文档的积极性。增加 `Strictness` 的值意味着系统将应用更高的相似度阈值，过滤掉更多被认为不太相关的文档，从而提高响应的准确性。'
- en: 'Here are some details on the incorrect options:'
  id: totrans-399
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的详细信息：
- en: 'A. `Temperature`: This controls the randomness of the model’s responses and
    is not related to document filtration'
  id: totrans-400
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. `Temperature`：这控制着模型回复的随机性，与文档过滤无关。
- en: 'B. `TopNDocuments`: Specifies the number of top-scoring documents to include
    in the response generation, but does not control the relevance threshold'
  id: totrans-401
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. `TopNDocuments`：指定在响应生成中包含的得分最高的文档数量，但不控制相关性阈值。
- en: 'D. `System Message`: Used to customize the model’s replies but does not affect
    document filtration'
  id: totrans-402
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `System Message`：用于自定义模型的回复，但不影响文档过滤。
- en: 'Reference:'
  id: totrans-403
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Runtime* *parameters*: [https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#runtime-parameters](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#runtime-parameters)'
  id: totrans-404
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*运行时* *参数*：[https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#runtime-parameters](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search%2Ccopilot#runtime-parameters)'
- en: You are developing a customer support chatbot using Azure OpenAI Service. During
    testing, you want to ensure that the chatbot provides accurate and relevant responses.
    Which of the following prompt engineering strategies should you utilize? Select
    all that apply.
  id: totrans-405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在使用 Azure OpenAI 服务开发一个客户支持聊天机器人。在测试过程中，您希望确保聊天机器人提供准确且相关的回复。以下哪些提示工程策略应该使用？选择所有适用的选项。
- en: Use contextual specificity
  id: totrans-406
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用上下文具体性
- en: Be vague
  id: totrans-407
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持模糊
- en: Include examples
  id: totrans-408
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含示例
- en: Use random prompts
  id: totrans-409
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用随机提示
- en: '**Correct answers**:'
  id: totrans-410
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：'
- en: 'A. **Use contextual specificity**: Adding specific context to the prompts helps
    the model better understand the scenario, leading to more accurate and relevant
    responses'
  id: totrans-411
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **使用上下文特异性**：在提示中添加特定上下文有助于模型更好地理解场景，从而产生更准确和相关的响应
- en: 'C. **Include examples**: Providing examples of desired outputs can guide the
    model to produce similar responses, improving the accuracy and relevance of its
    answers'
  id: totrans-412
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **包含示例**：提供期望输出的示例可以引导模型产生类似的响应，从而提高其答案的准确性和相关性
- en: 'Here are some details on the incorrect options:'
  id: totrans-413
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'B. **Be vague**: Vague prompts can lead to ambiguous and less accurate responses,
    which is not recommended for prompt engineering'
  id: totrans-414
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **模糊不清**：模糊的提示可能导致模糊和不准确的响应，这在提示工程中是不推荐的
- en: 'D. **Use random prompts**: Random prompts do not provide a clear direction
    or context for the model, which can result in inconsistent and irrelevant outputs'
  id: totrans-415
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **使用随机提示**：随机提示不提供模型清晰的方向或上下文，可能导致不一致和不相关的输出
- en: 'Reference:'
  id: totrans-416
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Prompt engineering* *techniques*: [https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/prompt-engineering?tabs=chat](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/prompt-engineering?tabs=chat)'
  id: totrans-417
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*提示工程* *技术*：[https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/prompt-engineering?tabs=chat](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/prompt-engineering?tabs=chat)'
- en: You are setting up a new Azure Cognitive Search index. Which of the following
    sequences correctly represents the order of stages in the indexing process?
  id: totrans-418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在设置一个新的Azure Cognitive Search索引。以下哪个序列正确地表示了索引过程中的阶段顺序？
- en: Field mapping, Output field mapping, Skillset execution, Push into index
  id: totrans-419
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 字段映射，输出字段映射，技能集执行，推入索引
- en: Document cracking, Field mapping, Skillset execution, Push into index
  id: totrans-420
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文档破解，字段映射，技能集执行，推入索引
- en: Document cracking, Skillset execution, Field mapping, Push into index
  id: totrans-421
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文档破解，技能集执行，字段映射，推入索引
- en: Field mapping, Document cracking, Skillset execution, Push into index
  id: totrans-422
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 字段映射，文档破解，技能集执行，推入索引
- en: '**Correct answer**: B. Document cracking, Field mapping, Skillset execution,
    Push into index.'
  id: totrans-423
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 文档破解，字段映射，技能集执行，推入索引。'
- en: 'The correct sequence of stages in the Azure Cognitive Search indexing process
    is as follows:'
  id: totrans-424
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure Cognitive Search索引过程中的正确阶段顺序如下：
- en: '**Document cracking**: This is the first stage, where files are opened and
    content is extracted.'
  id: totrans-425
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文档破解**：这是第一阶段，涉及打开文件并提取内容。'
- en: '**Field mapping**: The next step involves mapping the extracted content to
    the fields defined in the index schema.'
  id: totrans-426
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**字段映射**：下一步涉及将提取的内容映射到索引模式中定义的字段。'
- en: '**Skillset execution**: Cognitive skills are applied to enrich the extracted
    data.'
  id: totrans-427
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**技能集执行**：认知技能被应用于丰富提取的数据。'
- en: '**Push into index**: Finally, the enriched and structured data is pushed into
    the search index.'
  id: totrans-428
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**推入索引**：最后，丰富和结构化的数据被推入搜索索引。'
- en: 'Here are some details on the incorrect options:'
  id: totrans-429
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. **Field mapping, Output field mapping, Skillset execution, Push into index**:
    This sequence is incorrect as it starts with field mapping instead of document
    cracking and includes an unnecessary stage (Output field mapping)'
  id: totrans-430
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **字段映射，输出字段映射，技能集执行，推入索引**：这个顺序是错误的，因为它以字段映射开始而不是文档破解，并且包含一个不必要的阶段（输出字段映射）
- en: 'C. **Document cracking, Skillset execution, Field mapping, Push into index**:
    This sequence incorrectly places skillset execution before field mapping'
  id: totrans-431
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **文档破解，技能集执行，字段映射，推入索引**：这个顺序错误地将技能集执行放在了字段映射之前
- en: 'D. **Field mapping, Document cracking, Skillset execution, Push into index**:
    This sequence incorrectly places field mapping before document cracking'
  id: totrans-432
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **字段映射，文档破解，技能集执行，推入索引**：这个顺序错误地将字段映射放在了文档破解之前
- en: 'Reference:'
  id: totrans-433
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Stages of* *indexing*: [https://learn.microsoft.com/en-us/azure/search/search-indexer-overview#stages-of-indexing](https://learn.microsoft.com/en-us/azure/search/search-indexer-overview#stages-of-indexing)'
  id: totrans-434
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*索引阶段*：[https://learn.microsoft.com/en-us/azure/search/search-indexer-overview#stages-of-indexing](https://learn.microsoft.com/en-us/azure/search/search-indexer-overview#stages-of-indexing)'
- en: You are configuring a skillset in Azure AI Search and want to include optional
    settings for projecting the skillset output into Azure Storage. Which section
    should you add to your skillset definition?
  id: totrans-435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在配置Azure AI Search中的技能集，并希望为将技能集输出投影到Azure Storage添加可选设置。你应该将哪个部分添加到你的技能集定义中？
- en: '`skills`'
  id: totrans-436
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`技能`'
- en: '`cognitiveServices`'
  id: totrans-437
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`认知服务`'
- en: '`knowledgeStore`'
  id: totrans-438
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`知识库`'
- en: '`encryptionKey`'
  id: totrans-439
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`加密密钥`'
- en: '`knowledgeStore`.'
  id: totrans-440
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`知识库`。'
- en: This optional section specifies an Azure Storage account and settings for projecting
    skillset output into tables, blobs, and files in Azure Storage.
  id: totrans-441
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此可选部分指定了一个Azure存储账户以及将技能集输出投影到Azure存储中的表、blob和文件的设置。
- en: 'Here are some details on the incorrect options:'
  id: totrans-442
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. `skills`: This section is required and specifies the collection of skills
    to execute'
  id: totrans-443
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. `skills`：此部分是必需的，并指定了要执行的一组技能
- en: 'B. `cognitiveServices`: This optional section is used for billable skills that
    call Azure Cognitive Services APIs'
  id: totrans-444
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. `cognitiveServices`：此可选部分用于调用Azure认知服务API的可计费技能
- en: 'D. `encryptionKey`: This optional section specifies an Azure Key Vault location
    and customer-managed keys used to encrypt sensitive content in a skillset definition'
  id: totrans-445
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. `encryptionKey`：此可选部分指定了Azure Key Vault位置和用于在技能集定义中加密敏感内容的客户管理的密钥
- en: 'Reference:'
  id: totrans-446
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Add a skillset* *definition*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-defining-skillset#add-a-skillset-definition](https://learn.microsoft.com/en-us/azure/search/cognitive-search-defining-skillset#add-a-skillset-definition)'
  id: totrans-447
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*添加技能集* *定义*：[https://learn.microsoft.com/en-us/azure/search/cognitive-search-defining-skillset#add-a-skillset-definition](https://learn.microsoft.com/en-us/azure/search/cognitive-search-defining-skillset#add-a-skillset-definition)'
- en: You are configuring an Azure AI Search solution and need to persist enriched
    data for reuse in future skillset executions. What should you create?
  id: totrans-448
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在配置一个Azure AI搜索解决方案，并需要在未来的技能集执行中持久化富集数据以供重用。你应该创建什么？
- en: A knowledge store
  id: totrans-449
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 知识库
- en: A searchable index
  id: totrans-450
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可搜索索引
- en: A searchable store
  id: totrans-451
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可搜索存储
- en: An enrichment cache
  id: totrans-452
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个富集缓存
- en: '**Correct answer**: D. An enrichment cache.'
  id: totrans-453
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：D. 一个富集缓存。'
- en: This is used for caching enrichments for reuse in subsequent skillset executions.
    The cache stores imported, unprocessed content (cracked documents) and the enriched
    documents created during skillset execution, which helps avoid the time and expense
    of reprocessing image files or other data-intensive operations.
  id: totrans-454
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这用于在后续的技能集执行中缓存富集内容以供重用。缓存存储了导入的未处理内容（破损的文档）以及在技能集执行期间创建的富集文档，这有助于避免重新处理图像文件或其他数据密集型操作的时间和费用。
- en: 'Here are some details on the incorrect options:'
  id: totrans-455
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. **A knowledge store**: While useful for downstream apps such as knowledge
    mining or data science, it is not specifically designed for caching data for reuse
    in future skillset executions'
  id: totrans-456
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **知识库**：虽然对下游应用如知识挖掘或数据科学很有用，但它并非专门设计用于在未来的技能集执行中缓存数据以供重用
- en: 'B. **A searchable index**: This is used for full-text search and other query
    forms and does not serve the purpose of caching enrichments'
  id: totrans-457
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **可搜索索引**：这用于全文搜索和其他查询形式，并不服务于缓存富集的目的
- en: 'C. **A searchable store**: This option is not a relevant term or recognized
    structure within Azure AI Search solutions'
  id: totrans-458
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **可搜索存储**：此选项不是Azure AI搜索解决方案中的相关术语或已识别的结构
- en: 'Reference:'
  id: totrans-459
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Incremental enrichment and caching in Azure AI* *Search*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-incremental-indexing-conceptual](https://learn.microsoft.com/en-us/azure/search/cognitive-search-incremental-indexing-conceptual)'
  id: totrans-460
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Azure AI搜索中的增量富集和缓存*：[https://learn.microsoft.com/en-us/azure/search/cognitive-search-incremental-indexing-conceptual](https://learn.microsoft.com/en-us/azure/search/cognitive-search-incremental-indexing-conceptual)'
- en: You are designing an Azure AI Search index to identify and extract personal
    information from your data. Which skill should you use to achieve this?
  id: totrans-461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在设计一个Azure AI搜索索引，以从你的数据中识别和提取个人信息。你应该使用哪个技能来实现这一点？
- en: '`Microsoft.Skills.Text.KeyPhraseExtractionSkill`'
  id: totrans-462
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.KeyPhraseExtractionSkill`'
- en: '`Microsoft.Skills.Text.PIIDetectionSkill`'
  id: totrans-463
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.PIIDetectionSkill`'
- en: '`Microsoft.Skills.Text.V3.EntityRecognitionSkill`'
  id: totrans-464
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.V3.EntityRecognitionSkill`'
- en: '`Microsoft.Skills.Text.TranslationSkill`'
  id: totrans-465
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.TranslationSkill`'
- en: '`Microsoft.Skills.Text.PIIDetectionSkill`.'
  id: totrans-466
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.PIIDetectionSkill`.'
- en: This skill is specifically designed to extract personal information from text,
    and it also provides options for masking the detected personal information entities
    in the text.
  id: totrans-467
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此技能专门设计用于从文本中提取个人信息，并且它还提供了在文本中屏蔽检测到的个人信息实体的选项。
- en: 'Here are some details on the incorrect options:'
  id: totrans-468
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. `Microsoft.Skills.Text.KeyPhraseExtractionSkill`: This skill detects important
    phrases based on term placement and other linguistic features but does not focus
    on personal information'
  id: totrans-469
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. `Microsoft.Skills.Text.KeyPhraseExtractionSkill`：此技能根据术语位置和其他语言特征检测重要短语，但并不专注于个人信息
- en: 'C. `Microsoft.Skills.Text.V3.EntityRecognitionSkill`: This skill recognizes
    entities in text but does not specifically target personal information'
  id: totrans-470
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C. `Microsoft.Skills.Text.V3.EntityRecognitionSkill`: 此技能识别文本中的实体，但并不专门针对个人信息'
- en: 'D. `Microsoft.Skills.Text.TranslationSkill`: This skill translates text into
    different languages but does not deal with identifying personal information'
  id: totrans-471
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'D. `Microsoft.Skills.Text.TranslationSkill`: 此技能将文本翻译成不同语言，但不处理识别个人信息'
- en: 'Reference:'
  id: totrans-472
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Skills for extra processing during indexing (Azure AI* *Search)*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
  id: totrans-473
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*索引期间额外处理的技能（Azure AI Search）*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
- en: You are configuring an Azure AI Search index and need to consolidate text from
    multiple fields into a single searchable field. Which built-in skill should you
    use?
  id: totrans-474
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置一个Azure AI Search索引，需要将多个字段中的文本合并到一个可搜索的字段中。您应该使用哪个内置技能？
- en: '`Microsoft.Skills.Text.KeyPhraseExtractionSkill`'
  id: totrans-475
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.KeyPhraseExtractionSkill`'
- en: '`Microsoft.Skills.Util.DocumentExtractionSkill`'
  id: totrans-476
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Util.DocumentExtractionSkill`'
- en: '`Microsoft.Skills.Text.SplitSkill`'
  id: totrans-477
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.SplitSkill`'
- en: '`Microsoft.Skills.Text.MergeSkill`'
  id: totrans-478
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.MergeSkill`'
- en: '`Microsoft.Skills.Text.MergeSkill`.'
  id: totrans-479
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`Microsoft.Skills.Text.MergeSkill`.'
- en: This skill consolidates text from a collection of fields into a single field,
    making it easier to search and process the content as a unified entity.
  id: totrans-480
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此技能将来自一系列字段的文本合并到一个字段中，使得作为统一实体进行搜索和处理内容变得更加容易。
- en: 'Here are some details on the incorrect options:'
  id: totrans-481
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. `Microsoft.Skills.Text.KeyPhraseExtractionSkill`: Extracts key phrases from
    text but does not merge fields'
  id: totrans-482
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A. `Microsoft.Skills.Text.KeyPhraseExtractionSkill`: 从文本中提取关键短语，但不合并字段'
- en: 'B. `Microsoft.Skills.Util.DocumentExtractionSkill`: Extracts content from a
    file within the enrichment pipeline, but does not merge fields'
  id: totrans-483
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B. `Microsoft.Skills.Util.DocumentExtractionSkill`: 在丰富管道中从文件中提取内容，但不合并字段'
- en: 'C. `Microsoft.Skills.Text.SplitSkill`: Splits text into pages for incremental
    enrichment but does not merge fields'
  id: totrans-484
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C. `Microsoft.Skills.Text.SplitSkill`: 将文本拆分为页面以进行增量丰富，但不合并字段'
- en: 'Reference:'
  id: totrans-485
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Skills for extra processing during indexing (Azure AI* *Search)*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
  id: totrans-486
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*索引期间额外处理的技能（Azure AI Search）*: [https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills](https://learn.microsoft.com/en-us/azure/search/cognitive-search-predefined-skills)'
- en: You are configuring an Azure AI Search indexer to extract and analyze colors
    from images in a document. Which Azure AI Search feature would you use to extract
    the color information?
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在配置一个Azure AI Search索引器以从文档中的图像中提取和分析颜色。您将使用哪个Azure AI Search功能来提取颜色信息？
- en: OCR
  id: totrans-488
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: OCR
- en: Image Analysis
  id: totrans-489
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分析
- en: Custom Vision
  id: totrans-490
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Custom Vision
- en: Facetable
  id: totrans-491
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Facetable
- en: '**Correct answer**: B. Image Analysis.'
  id: totrans-492
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**: B. 图像分析。'
- en: This feature in Azure AI Search allows visual features to be extracted from
    images, including color information.
  id: totrans-493
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure AI Search中的此功能允许从图像中提取视觉特征，包括颜色信息。
- en: 'Here are some details on the incorrect options:'
  id: totrans-494
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **OCR**: This is used for optical character recognition, extracting text
    from images, not color information'
  id: totrans-495
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A. **OCR**: 这用于光学字符识别，从图像中提取文本，而不是颜色信息'
- en: 'C. **Custom Vision**: This service is used for creating custom image classification
    models, not specifically for extracting color information'
  id: totrans-496
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C. **Custom Vision**: 此服务用于创建自定义图像分类模型，而不是专门用于提取颜色信息'
- en: 'D. **Facetable**: This attribute is used for enabling faceted navigation in
    search results, not for image analysis'
  id: totrans-497
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'D. **Facetable**: 此属性用于在搜索结果中启用分面导航，而不是用于图像分析'
- en: 'Reference:'
  id: totrans-498
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Analyze* *Image*: [https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview-image-analysis?tabs=4-0#analyze-image](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview-image-analysis?tabs=4-0#analyze-image)'
  id: totrans-499
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*分析图像*: [https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview-image-analysis?tabs=4-0#analyze-image](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview-image-analysis?tabs=4-0#analyze-image)'
- en: You are developing a security app to monitor and understand the spatial relationships
    between people and objects in real-time video streams using Azure AI Vision. Which
    feature should you use to achieve this?
  id: totrans-500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在开发一个安全应用程序，使用Azure AI Vision实时视频流监控和理解人与物体之间的空间关系。您应该使用哪个功能来实现这一点？
- en: Face detection
  id: totrans-501
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人脸检测
- en: Image Analysis
  id: totrans-502
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像分析
- en: OCR
  id: totrans-503
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: OCR
- en: Spatial Analysis
  id: totrans-504
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 空间分析
- en: '**Correct answer**: D. Spatial Analysis.'
  id: totrans-505
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：D. 空间分析。'
- en: Spatial Analysis in Azure AI Vision is designed to understand spatial relationships
    between people, their movements, and interactions with objects in physical environments
    from real-time streaming video. This feature is specifically tailored for analyzing
    the presence and movements of people in video feeds, making it the appropriate
    choice for the given scenario.
  id: totrans-506
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure AI 视觉中的空间分析旨在理解人们、他们的运动以及与物理环境中物体的交互在实时视频流中的空间关系。这个功能专门针对分析视频流中人们的存在和运动，因此是给定场景的合适选择。
- en: 'Here are some details on the incorrect options:'
  id: totrans-507
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. **Face detection**: This feature detects and identifies faces in a media
    file but does not provide information on spatial relationships or interactions
    between people and objects'
  id: totrans-508
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **人脸检测**：这个功能在媒体文件中检测和识别人脸，但不提供关于人与人或人与物体之间空间关系或交互的信息
- en: 'B. **Image Analysis**: This feature identifies and categorizes visual objects
    and actions within images but does not focus on real-time spatial relationships
    in video streams'
  id: totrans-509
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **图像分析**：这个功能在图像中识别和分类视觉对象和动作，但不专注于视频流中的实时空间关系
- en: 'C. **OCR**: This feature extracts text from images and videos, such as street
    signs or product labels but does not analyze the presence or movements of people'
  id: totrans-510
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **OCR**：这个功能从图像和视频中提取文本，如街牌或产品标签，但不分析人们的存在或运动
- en: 'Reference:'
  id: totrans-511
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What is Azure AI* *Vision?*: [https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview)'
  id: totrans-512
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是 Azure AI 视觉？*：[https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/overview)'
- en: You are developing an app using Azure AI Video Indexer and need to detect when
    scene changes occur in the uploaded videos. Which API feature should you use?
  id: totrans-513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个应用程序，使用 Azure AI 视频索引器来检测上传视频中场景变化发生的时间。你应该使用哪个 API 功能？
- en: Keyframe extraction
  id: totrans-514
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关键帧提取
- en: Scene segmentation
  id: totrans-515
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 场景分割
- en: Object detection
  id: totrans-516
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目标检测
- en: Audio event detection
  id: totrans-517
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 音频事件检测
- en: '**Correct answer**: B. Scene segmentation.'
  id: totrans-518
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 场景分割。'
- en: Scene segmentation determines when a scene changes in the video based on visual
    cues. A scene depicts a single event and is composed of a series of consecutive
    shots that are semantically related.
  id: totrans-519
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 场景分割根据视觉线索确定视频中的场景何时发生变化。一个场景描述一个单一事件，由一系列语义相关的连续镜头组成。
- en: 'Here are some details on the incorrect options:'
  id: totrans-520
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'A. **Keyframe extraction**: This identifies stable keyframes in a video but
    does not focus on scene changes'
  id: totrans-521
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **关键帧提取**：这个功能识别视频中的稳定关键帧，但不专注于场景变化
- en: 'C. **Object detection**: This identifies visual objects and actions displayed
    in the video but does not determine scene changes'
  id: totrans-522
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **目标检测**：这个功能识别视频中的视觉对象和动作，但不确定场景变化
- en: 'D. **Audio event detection**: This feature is related to detecting specific
    audio events, not visual scene changes'
  id: totrans-523
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **音频事件检测**：这个功能与检测特定音频事件相关，而不是视觉场景变化
- en: 'Reference:'
  id: totrans-524
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Azure AI Video Indexer* *overview*: [https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview](https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview)'
  id: totrans-525
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Azure AI 视频索引器* 概述：[https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview](https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview)'
- en: You are developing an app that leverages Azure AI Video Indexer to identify
    specific products and logos in marketing videos. Which custom model should you
    configure for this task?
  id: totrans-526
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个应用程序，利用 Azure AI 视频索引器来识别营销视频中的特定产品和标志。你应该为此任务配置哪个自定义模型？
- en: Custom Brands
  id: totrans-527
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义品牌
- en: Custom People
  id: totrans-528
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义人物
- en: Custom Language
  id: totrans-529
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义语言
- en: Custom Slate
  id: totrans-530
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义板
- en: '**Correct answer**: A. Custom Brands.'
  id: totrans-531
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：A. 自定义品牌。'
- en: This model is specifically designed for detecting brands from both speech and
    visual content in videos, making it suitable for identifying products and logos.
  id: totrans-532
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个模型专门设计用于从视频中的语音和视觉内容中检测品牌，因此适合识别产品和标志。
- en: 'Here are some details on the incorrect options:'
  id: totrans-533
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 下面是一些关于错误选项的详细信息：
- en: 'B. **Custom People**: This model is used for recognizing specific individuals
    in the video, not products or logos'
  id: totrans-534
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **自定义人物**：这个模型用于识别视频中的特定个人，而不是产品或标志
- en: 'C. **Custom Language**: This model is used to add words that are not in the
    standard language model but does not help in recognizing brands or logos'
  id: totrans-535
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'C. **自定义语言**: 此模型用于添加不在标准语言模型中的单词，但并不帮助识别品牌或标志'
- en: 'D. **Custom Slate**: This model is used for detecting clapperboards and digital
    patterns with color bars and is unrelated to brand detection'
  id: totrans-536
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'D. **自定义滑板**: 此模型用于检测滑板和带有色条的数字图案，与品牌检测无关'
- en: 'Reference:'
  id: totrans-537
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Customize a brands model in Azure AI Video* *Indexer*: [https://learn.microsoft.com/en-us/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal)'
  id: totrans-538
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在Azure AI Video Indexer中自定义品牌模型*: [https://learn.microsoft.com/en-us/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal](https://learn.microsoft.com/en-us/azure/azure-video-indexer/customize-brands-model-how-to?tabs=customizewebportal)'
- en: You are developing a custom speech model for a medical transcription service
    using Azure AI Services. During testing, you notice a high **Word Error Rate**
    (**WER**) due to many insertion errors. What type of audio data should you focus
    on collecting to improve the model’s accuracy?
  id: totrans-539
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在使用Azure AI服务为医疗转录服务开发自定义语音模型。在测试过程中，你注意到由于许多插入错误而导致高**词错误率**（WER）。你应该专注于收集哪种类型的音频数据以提高模型的准确性？
- en: Audio recordings with custom medical terminologies
  id: totrans-540
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具有自定义医疗术语的音频录音
- en: Audio recordings with clear pronunciation
  id: totrans-541
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语音清晰度高的音频录音
- en: Audio recordings without background noise
  id: totrans-542
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 无背景噪音的音频录音
- en: Audio recordings with multiple speakers
  id: totrans-543
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 具有多个说话人的音频录音
- en: '**Correct answer**: C. Audio recordings without background noise.'
  id: totrans-544
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**: C. 无背景噪音的音频录音。'
- en: Insertion errors often occur when the audio has been recorded in a noisy environment
    or where crosstalk is present. Collecting audio data without background noise
    can help reduce these errors by ensuring that the model focuses on the intended
    speech rather than extraneous sounds.
  id: totrans-545
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当音频在嘈杂环境中录制或存在串扰时，插入错误经常发生。收集无背景噪音的音频数据可以通过确保模型专注于目标语音而不是杂音来帮助减少这些错误。
- en: 'Here are some details on the incorrect options:'
  id: totrans-546
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的一些详细信息：
- en: 'A. **Audio recordings with custom medical terminologies**: While this can help
    with substitution errors, it does not directly address insertion errors caused
    by background noise'
  id: totrans-547
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A. **具有自定义医疗术语的音频录音**: 虽然这有助于替换错误，但并未直接解决由背景噪音引起的插入错误'
- en: 'B. **Audio recordings with clear pronunciation**: Clear pronunciation helps
    with overall accuracy but does not specifically target the reduction of insertion
    errors due to background noise'
  id: totrans-548
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'B. **语音清晰度高的音频录音**: 清晰的发音有助于整体准确性，但并不专门针对减少由背景噪音引起的插入错误'
- en: 'D. **Audio recordings with multiple speakers**: This can help in understanding
    conversational context but does not address the issue of background noise leading
    to insertion errors'
  id: totrans-549
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'D. **具有多个说话人的音频录音**: 这有助于理解对话上下文，但并未解决由背景噪音导致的插入错误问题'
- en: 'Reference:'
  id: totrans-550
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Test accuracy of a custom speech* *model*: [https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-custom-speech-evaluate-data?pivots=speech-studio](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-custom-speech-evaluate-data?pivots=speech-studio)'
  id: totrans-551
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*自定义语音模型的测试精度*: [https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-custom-speech-evaluate-data?pivots=speech-studio](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-custom-speech-evaluate-data?pivots=speech-studio)'
- en: You are developing an app that will transcribe meeting recordings and distinguish
    between different speakers during the conversation. Which feature should you use
    to achieve this?
  id: totrans-552
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个应用，该应用将转录会议录音并在对话中区分不同的说话人。你应该使用哪个功能来实现这一点？
- en: Speech-to-text conversion
  id: totrans-553
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语音转文本转换
- en: Text-dependent verification
  id: totrans-554
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本依赖验证
- en: Text-independent verification
  id: totrans-555
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本无关验证
- en: Speaker identification
  id: totrans-556
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 说话人识别
- en: '**Correct answer**: D. Speaker identification.'
  id: totrans-557
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**: D. 说话人识别。'
- en: This feature is specifically designed to determine an unknown speaker’s identity
    within a group of enrolled speakers. It helps attribute speech to individual speakers,
    which is essential for distinguishing between different participants in a meeting
    recording.
  id: totrans-558
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此功能专门设计用于在注册的说话人群体中确定未知说话人的身份。它有助于将语音归因于个别说话人，这对于区分会议录音中的不同参与者至关重要。
- en: 'Here are some details on the incorrect options:'
  id: totrans-559
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的一些详细信息：
- en: 'A. **Speech-to-text conversion**: Converts spoken language into text but does
    not identify individual speakers'
  id: totrans-560
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **语音转文本转换**：将口语转换为文本，但不会识别个别说话人
- en: 'B. **Text-dependent verification**: Verifies a speaker’s identity based on
    a specific passphrase but is not suitable for distinguishing between multiple
    speakers in a recording'
  id: totrans-561
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **基于文本的验证**：基于特定的口令来验证说话人的身份，但不适合区分录音中的多个说话人
- en: 'C. **Text-independent verification**: Verifies a speaker’s identity without
    requiring a specific passphrase but, similar to text-dependent verification, it
    does not distinguish between multiple speakers'
  id: totrans-562
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **文本无关的验证**：无需特定的口令即可验证说话人的身份，但与基于文本的验证类似，它也无法区分多个说话人
- en: 'Reference:'
  id: totrans-563
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What is speaker* *recognition?*: [https://learn.microsoft.com/en-us/azure/ai-services/speech-service/speaker-recognition-overview](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/speaker-recognition-overview)'
  id: totrans-564
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是说话人识别？*：[https://learn.microsoft.com/en-us/azure/ai-services/speech-service/speaker-recognition-overview](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/speaker-recognition-overview)'
- en: You are designing a voice-controlled app that must recognize specific user commands
    with high precision. In which scenario should you consider using pattern matching
    over **Conversational Language Understanding** (**CLU**) in Azure AI Speech services?
  id: totrans-565
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在设计一个必须以高精度识别特定用户命令的语音控制应用。在哪种场景下你应该考虑在Azure AI语音服务中使用模式匹配而不是**会话语言理解（CLU**）？
- en: When you need to recognize intents based on exact phrases spoken by the user
  id: totrans-566
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当你需要根据用户说的确切短语来识别意图时
- en: When you want to leverage pre-trained machine learning models
  id: totrans-567
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当你想要利用预训练的机器学习模型
- en: When you need to handle a large variety of natural language variations
  id: totrans-568
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当你需要处理大量的自然语言变体时
- en: When you require the use of prebuilt entities for intent recognition
  id: totrans-569
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当你需要使用预构建的实体进行意图识别时
- en: '**Correct answer**: A. When you need to recognize intents based on exact phrases
    spoken by the user.'
  id: totrans-570
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：A. 当你需要根据用户说的确切短语来识别意图时。'
- en: Pattern matching should be used when you need to recognize intents based on
    exact phrases spoken by the user. This approach is more aggressive and precise,
    making it suitable for scenarios where the specific phrasing of the command is
    important.
  id: totrans-571
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当你需要根据用户说的确切短语来识别意图时，应使用模式匹配。这种方法更为激进和精确，适用于命令的具体措辞很重要的场景。
- en: 'Here are some details on the incorrect options:'
  id: totrans-572
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'B. **When you want to leverage pre-trained machine learning models**: This
    is not correct for pattern matching, as pattern matching does not use machine
    learning models but rather predefined patterns'
  id: totrans-573
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **当你想要利用预训练的机器学习模型**：这在模式匹配中是不正确的，因为模式匹配不使用机器学习模型，而是使用预定义的模式
- en: 'C. **When you need to handle a large variety of natural language variations**:
    This is more suited for CLU, which can handle variations in natural language'
  id: totrans-574
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **当你需要处理大量的自然语言变体时**：这更适合使用CLU，因为它可以处理自然语言的变体
- en: 'D. **When you require the use of prebuilt entities for intent recognition**:
    Prebuilt entities are a feature of CLU, not pattern matching'
  id: totrans-575
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **当你需要使用预构建的实体进行意图识别时**：预构建的实体是CLU的一个功能，而不是模式匹配
- en: 'Reference:'
  id: totrans-576
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*How to recognize intents with custom entity pattern* *matching*: [https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-use-custom-entity-pattern-matching?tabs=jre%2Cwindows%2Cubuntu%2Cmaven&pivots=programming-language-csharp](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-use-custom-entity-pattern-matching?tabs=jre%2Cwindows%2Cubuntu%2Cmaven&pivots=programming-language-csharp)'
  id: totrans-577
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*如何使用自定义实体模式匹配来识别意图*：[https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-use-custom-entity-pattern-matching?tabs=jre%2Cwindows%2Cubuntu%2Cmaven&pivots=programming-language-csharp](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/how-to-use-custom-entity-pattern-matching?tabs=jre%2Cwindows%2Cubuntu%2Cmaven&pivots=programming-language-csharp)'
- en: You are developing an app that must translate documents while preserving their
    original format and structure. Which feature of the Azure AI Translator service
    allows you to achieve this?
  id: totrans-578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在开发一个必须保留原始格式和结构的文档翻译应用。Azure AI翻译服务的哪个功能允许你实现这一点？
- en: Text Translation
  id: totrans-579
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文本翻译
- en: Custom Translator
  id: totrans-580
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义翻译器
- en: Document Translation
  id: totrans-581
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文档翻译
- en: Real-time Translation
  id: totrans-582
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实时翻译
- en: '**Correct answer**: C. Document Translation.'
  id: totrans-583
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：C. 文档翻译。'
- en: Document Translation allows you to translate documents while preserving their
    original format and structure. This feature supports both asynchronous batch translation
    for multiple documents and synchronous single-file translation.
  id: totrans-584
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 文档翻译允许你在保留原始格式和结构的同时翻译文档。此功能支持对多个文档的异步批量翻译和对单个文件的同步翻译。
- en: 'Here are some details on the incorrect options:'
  id: totrans-585
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Text Translation**: This is used for translating text in real time but
    does not preserve document format and structure'
  id: totrans-586
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **文本翻译**：这用于实时翻译文本，但不保留文档格式和结构。
- en: 'B. **Custom Translator**: This allows customized translation models to be built
    for specific domains but is not directly related to document format preservation'
  id: totrans-587
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **自定义翻译器**：这允许为特定领域构建定制的翻译模型，但与文档格式保留无直接关系。
- en: 'D. **Real-time Translation**: This term is not specifically mentioned in the
    Azure AI Translator documentation and is likely referring to Text Translation,
    which does not preserve document format and structure'
  id: totrans-588
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **实时翻译**：这个术语在Azure AI翻译器的文档中并未明确提及，很可能是指文本翻译，它不保留文档格式和结构。
- en: 'Reference:'
  id: totrans-589
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What is Document* *Translation?*: [https://learn.microsoft.com/en-us/azure/ai-services/translator/document-translation/overview](https://learn.microsoft.com/en-us/azure/ai-services/translator/document-translation/overview)'
  id: totrans-590
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是文档翻译？*：[https://learn.microsoft.com/en-us/azure/ai-services/translator/document-translation/overview](https://learn.microsoft.com/en-us/azure/ai-services/translator/document-translation/overview)'
- en: You are configuring an orchestration workflow for a multilingual CLU project.
    Which of the following steps should you take to ensure language support for the
    orchestration workflow?
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在为多语言CLU项目配置编排工作流。为确保编排工作流的语言支持，你应该采取以下哪些步骤？
- en: Enable the multilingual option within the same project
  id: totrans-592
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在同一个项目中启用多语言选项。
- en: Create separate orchestration workflow projects for each language
  id: totrans-593
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每种语言创建单独的编排工作流项目。
- en: Use a single orchestration workflow project with multiple language settings
  id: totrans-594
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用单个编排工作流项目并设置多种语言。
- en: Train a single model to handle multiple languages
  id: totrans-595
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练一个模型来处理多种语言。
- en: '**Correct answer**: B. Create separate orchestration workflow projects for
    each language.'
  id: totrans-596
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. 为每种语言创建单独的编排工作流项目。'
- en: Orchestration workflow projects in Azure do not support the multilingual option,
    meaning each language must be handled by a separate project to ensure proper language
    support. This approach minimizes administrative effort by clearly segregating
    language-specific configurations and models within distinct projects.
  id: totrans-597
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure中的编排工作流项目不支持多语言选项，这意味着每种语言必须由一个单独的项目处理，以确保适当的语言支持。这种方法通过在独立的项目中明确分离语言特定的配置和模型，从而最小化了管理工作量。
- en: 'Here are some details on the incorrect options:'
  id: totrans-598
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'A. **Enable the multilingual option within the same project**: Orchestration
    workflow projects do not support the multilingual option. Each project can only
    handle one language.'
  id: totrans-599
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **在同一个项目中启用多语言选项**：编排工作流项目不支持多语言选项。每个项目只能处理一种语言。
- en: 'C. **Use a single orchestration workflow project with multiple language settings**:
    As orchestration workflow projects do not support multiple languages within the
    same project, this would not work.'
  id: totrans-600
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **使用单个编排工作流项目并设置多种语言**：由于编排工作流项目不支持在同一项目中使用多种语言，这不会起作用。
- en: 'D. **Train a single model to handle multiple languages**: While advanced models
    can handle multilingual data, orchestration workflow projects must still be separated
    by language for proper functionality.'
  id: totrans-601
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **训练一个模型来处理多种语言**：虽然高级模型可以处理多语言数据，但编排工作流项目仍必须按语言分开，以确保正常功能。
- en: 'Reference:'
  id: totrans-602
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Language support for orchestration workflow* *projects*: [https://learn.microsoft.com/en-us/azure/ai-services/language-service/orchestration-workflow/language-support](https://learn.microsoft.com/en-us/azure/ai-services/language-service/orchestration-workflow/language-support)'
  id: totrans-603
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*编排工作流项目对语言的支持*：[https://learn.microsoft.com/en-us/azure/ai-services/language-service/orchestration-workflow/language-support](https://learn.microsoft.com/en-us/azure/ai-services/language-service/orchestration-workflow/language-support)'
- en: You are designing an orchestration workflow using the Azure AI Language service
    to integrate various language processing projects. What are two valid actions
    you can perform within this orchestration workflow?
  id: totrans-604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在使用Azure AI语言服务设计编排工作流，以集成各种语言处理项目。在这个编排工作流中，你可以执行哪两个有效操作？
- en: Add intents that connect to different projects such as **Language Understanding
    Intelligent Service** (**LUIS**), CLU, or custom question-answering
  id: totrans-605
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加连接到不同项目（如**语言理解智能服务**（LUIS**）、CLU或自定义问答）的意图
- en: Train a single model that combines all connected projects
  id: totrans-606
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练一个结合所有连接项目的单个模型
- en: Directly add entities to your orchestration workflow
  id: totrans-607
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 直接将实体添加到您的编排工作流中
- en: Use the orchestration workflow to predict which project should handle a specific
    user query
  id: totrans-608
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用编排工作流来预测哪个项目应该处理特定的用户查询
- en: '**Correct answers**:'
  id: totrans-609
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：'
- en: 'A. **Add intents that connect to different projects such as LUIS, CLU, or custom
    question answering**: In an orchestration workflow, you can create intents and
    connect them to various language understanding projects, such as LUIS, CLU, or
    custom question-answering projects'
  id: totrans-610
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **添加连接到不同项目（如LUIS、CLU或自定义问答）的意图**：在编排工作流中，您可以创建意图并将它们连接到各种语言理解项目，如LUIS、CLU或自定义问答项目
- en: 'D. **Use the orchestration workflow to predict which project should handle
    a specific user query**: The orchestration workflow is designed to predict which
    connected project should handle an incoming query and route the request accordingly'
  id: totrans-611
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **使用编排工作流来预测哪个项目应该处理特定的用户查询**：编排工作流旨在预测哪个连接项目应该处理传入的查询，并相应地路由请求
- en: 'Here are some details on the incorrect options:'
  id: totrans-612
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的一些详细信息：
- en: 'B. **Train a single model that combines all connected projects**: The orchestration
    workflow does not combine all connected projects into a single model; instead,
    it routes requests to the appropriate project based on predictions.'
  id: totrans-613
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **训练一个结合所有连接项目的单个模型**：编排工作流不会将所有连接项目合并为单个模型；相反，它根据预测将请求路由到适当的项目。
- en: 'C. **Directly add entities to your orchestration workflow**: Entities cannot
    be directly added to the orchestration workflow; it focuses on routing intents
    and connecting to existing projects'
  id: totrans-614
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **直接将实体添加到您的编排工作流中**：实体不能直接添加到编排工作流中；它专注于路由意图和连接到现有项目
- en: 'Reference:'
  id: totrans-615
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What is Azure AI Foundry?* (Frequently asked questions for orchestration workflows):
    [https://learn.microsoft.com/en-us/azure/ai-studio/what-is-ai-studio](https://learn.microsoft.com/en-us/azure/ai-studio/what-is-ai-studio)'
  id: totrans-616
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是Azure AI Foundry？（编排工作流的常见问题解答）*：[https://learn.microsoft.com/en-us/azure/ai-studio/what-is-ai-studio](https://learn.microsoft.com/en-us/azure/ai-studio/what-is-ai-studio)'
- en: You are adding synonyms to a project in Azure Cognitive Services for a question-answering
    solution. Which of the following actions should you take if your API call fails
    due to an error with the synonyms?
  id: totrans-617
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在将同义词添加到Azure认知服务中的问答解决方案项目。如果由于同义词错误导致API调用失败，您应该采取以下哪些操作？
- en: Modify the order of the synonyms
  id: totrans-618
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 修改同义词的顺序
- en: Ensure that there is at least one question and answer pair in the project
  id: totrans-619
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保项目中至少有一个问题和答案对
- en: Remove any special characters from the synonyms
  id: totrans-620
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从同义词中删除任何特殊字符
- en: Add stop words to the synonym list
  id: totrans-621
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将停用词添加到同义词列表中
- en: '**Correct answer**: C. Remove any special characters from the synonyms.'
  id: totrans-622
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：C. 从同义词中删除任何特殊字符。'
- en: Removing special characters from the synonyms is the correct action because
    special characters are not allowed in synonyms for Azure Cognitive Services. For
    example, characters such as *#* are considered special and will cause the API
    call to fail.
  id: totrans-623
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 从同义词中删除特殊字符是正确的操作，因为Azure认知服务的同义词不允许特殊字符。例如，*#* 这样的字符被认为是特殊的，会导致API调用失败。
- en: 'Here are some details on the incorrect options:'
  id: totrans-624
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是关于错误选项的一些详细信息：
- en: 'A. **Modify the order of the synonyms**: The order of synonyms does not affect
    the computational logic, so modifying it will not resolve the error.'
  id: totrans-625
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **修改同义词的顺序**：同义词的顺序不会影响计算逻辑，因此修改它不会解决错误。
- en: 'B. **Ensure that there is at least one question and answer pair in the project**:
    While it is true that a project needs at least one question and answer pair to
    add synonyms, this is not related to the error caused by special characters in
    the synonyms.'
  id: totrans-626
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **确保项目中至少有一个问题和答案对**：虽然确实需要至少一个问题和答案对来添加同义词，但这与同义词中特殊字符引起的错误无关。
- en: 'D. **Add stop words to the synonym list**: Adding stop words to the synonym
    list can cause unexpected results and is not recommended. Additionally, it will
    not resolve the issue with special characters.'
  id: totrans-627
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **将停用词添加到同义词列表中**：将停用词添加到同义词列表可能会导致意外结果，并且不建议这样做。此外，它也不会解决特殊字符的问题。
- en: 'Reference:'
  id: totrans-628
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Improve quality of response with* *synonyms*: [https://learn.microsoft.com/en-us/azure/ai-services/language-service/question-answering/tutorials/adding-synonyms](https://learn.microsoft.com/en-us/azure/ai-services/language-service/question-answering/tutorials/adding-synonyms)'
  id: totrans-629
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*通过使用同义词提高响应质量*：[https://learn.microsoft.com/en-us/azure/ai-services/language-service/question-answering/tutorials/adding-synonyms](https://learn.microsoft.com/en-us/azure/ai-services/language-service/question-answering/tutorials/adding-synonyms)'
- en: You need to automate how purchase orders are processed by extracting key information
    such as customer name, billing address, and total amount from scanned documents.
    Which Azure AI service should you use?
  id: totrans-630
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您需要通过从扫描的文件中提取关键信息（如客户名称、账单地址和总金额）来自动化处理采购订单。您应该使用哪个 Azure AI 服务？
- en: Azure AI Search
  id: totrans-631
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI Search
- en: Azure AI Document Intelligence
  id: totrans-632
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI 文档智能
- en: Azure AI Computer Vision
  id: totrans-633
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI 计算机视觉
- en: Azure AI Custom Vision
  id: totrans-634
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure AI Custom Vision
- en: '**Correct answer**: B. Azure AI Document Intelligence.'
  id: totrans-635
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B. Azure AI 文档智能。'
- en: This service is designed specifically for extracting key information from various
    types of documents, including purchase orders. It uses powerful OCR capabilities
    combined with deep learning models to extract key fields such as customer name,
    billing address, total amount, and more from scanned documents.
  id: totrans-636
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此服务专门设计用于从各种类型的文档中提取关键信息，包括采购订单。它结合了强大的 OCR 功能和深度学习模型，从扫描的文档中提取关键字段，如客户名称、账单地址、总金额等。
- en: 'Here are some details on the incorrect options:'
  id: totrans-637
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是一些关于错误选项的详细信息：
- en: 'A. **Azure AI Search**: This is a cloud search service that helps you identify
    and explore relevant content at scale, but it is not designed for extracting key
    information from scanned documents.'
  id: totrans-638
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **Azure AI Search**：这是一个云搜索服务，可以帮助您在大规模上识别和探索相关内容，但它不是为从扫描的文档中提取关键信息而设计的。
- en: 'C. **Azure AI Computer Vision**: While it can extract text from images, it
    is not specialized for structured document processing and key-value pair extraction
    like Document Intelligence.'
  id: totrans-639
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **Azure AI 计算机视觉**：虽然它可以从图像中提取文本，但它不是针对结构化文档处理和键值对提取（如文档智能）的专业化。
- en: 'D. **Azure AI Custom Vision**: This service is used to build custom image recognition
    models, which is not directly related to extracting key information from documents'
  id: totrans-640
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **Azure AI Custom Vision**：此服务用于构建自定义图像识别模型，这与从文档中提取关键信息无直接关系
- en: 'Reference:'
  id: totrans-641
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*What are Azure AI* *services?*: [https://learn.microsoft.com/en-us/azure/ai-services/what-are-ai-services](https://learn.microsoft.com/en-us/azure/ai-services/what-are-ai-services)'
  id: totrans-642
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*什么是 Azure AI 服务？*：[https://learn.microsoft.com/en-us/azure/ai-services/what-are-ai-services](https://learn.microsoft.com/en-us/azure/ai-services/what-are-ai-services)'
- en: You are developing an app that will utilize Azure AI Services. What methods
    are available for authenticating requests to Azure AI Services?
  id: totrans-643
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您正在开发一个将利用 Azure AI 服务的应用程序。有哪些方法可用于认证 Azure AI 服务的请求？
- en: Using a resource key
  id: totrans-644
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用资源密钥
- en: Using an API key
  id: totrans-645
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 API 密钥
- en: Using an access token
  id: totrans-646
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用访问令牌
- en: Using a user password
  id: totrans-647
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用用户密码
- en: '**Correct answers**:'
  id: totrans-648
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：'
- en: 'A. **Using a resource key**: Azure AI Services can be authenticated using a
    resource key, which can be a single-service or multi-service resource key. This
    is a common and straightforward method for authentication.'
  id: totrans-649
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: A. **使用资源密钥**：Azure AI 服务可以通过资源密钥进行认证，这可以是单一服务或多项服务的资源密钥。这是一种常见且直接的方法进行认证。
- en: 'C. **Using an access token**: Authentication can also be performed using an
    access token obtained through Microsoft Entra ID (formerly Azure Active Directory).
    This method involves a token exchange process and is considered more secure than
    using a subscription key.'
  id: totrans-650
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **使用访问令牌**：认证还可以通过通过 Microsoft Entra ID（以前称为 Azure Active Directory）获得的访问令牌进行。这种方法涉及令牌交换过程，并且被认为比使用订阅密钥更安全。
- en: 'Here are some details on the incorrect options:'
  id: totrans-651
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以下是一些关于错误选项的详细信息：
- en: 'B. **Using an API key**: Azure AI Services specifically refers to resource
    keys rather than API keys for authentication purposes'
  id: totrans-652
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **使用 API 密钥**：Azure AI 服务专门指的是用于认证目的的资源密钥，而不是 API 密钥。
- en: 'D. **Using a user password**: User passwords are not a supported method for
    authenticating requests to Azure AI Services'
  id: totrans-653
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **使用用户密码**：用户密码不是用于认证 Azure AI 服务请求的支持方法
- en: 'Reference:'
  id: totrans-654
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Authenticate with an access* *token*: [https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authenticate-with-an-access-token](https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authenticate-with-an-access-token)'
  id: totrans-655
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*使用访问* *令牌*进行身份验证：[https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authenticate-with-an-access-token](https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authenticate-with-an-access-token)'
- en: You have an Azure App Services web app named `App1`. You need to configure `App1`
    so that it can access an Azure AI Search resource while using Microsoft Entra
    ID for authentication. The solution must adhere to the principle of least privilege.
    What should you do?
  id: totrans-656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你有一个名为`App1`的Azure App Services Web应用。你需要配置`App1`，使其能够在使用Microsoft Entra ID进行身份验证的同时访问Azure
    AI搜索资源。解决方案必须遵循最小权限原则。你应该怎么做？
- en: Enable system-assigned managed identity for `App1` and assign it the `App1`
    `App1` and enable certificate-based authentication
  id: totrans-657
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为`App1`启用系统分配的托管身份并将其分配`App1`的`App1`和启用基于证书的认证
- en: From PowerShell, create a secret that never expires and use it for authentication
  id: totrans-658
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从PowerShell创建一个永不过期的密钥并用于身份验证
- en: '`App1` and assign it the **Search Index Data Reader** role on the Azure AI
    Search resource.'
  id: totrans-659
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`App1`并分配它在Azure AI搜索资源上的**搜索索引数据读取者**角色。'
- en: This option minimizes administrative effort as the managed identity is managed
    by Azure and does not require secrets or certificates to be handled manually.
    It adheres to the principle of least privilege by assigning the minimal necessary
    role (**Search Index Data Reader**) to access the Azure AI Search resource.
  id: totrans-660
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此选项最小化了管理努力，因为托管身份由Azure管理，不需要手动处理密钥或证书。它通过分配最小的必要角色（**搜索索引数据读取者**）来访问Azure
    AI搜索资源，遵循最小权限原则。
- en: 'Here are some details on the incorrect options:'
  id: totrans-661
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一些关于错误选项的详细信息：
- en: 'B. **Create a secret in an Azure Key Vault location and assign App1 RBAC permissions
    to the secret**: This approach requires more administrative effort to manage and
    rotate secrets manually, which does not minimize administrative effort'
  id: totrans-662
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: B. **在Azure Key Vault位置创建一个密钥并分配App1 RBAC权限给该密钥**：这种方法需要更多的管理努力来手动管理和轮换密钥，这并不会最小化管理努力
- en: 'C. **Create a Microsoft Entra app registration for App1 and enable certificate-based
    authentication**: This method involves more complex setup and maintenance of certificates,
    which increases administrative effort'
  id: totrans-663
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: C. **为App1创建一个Microsoft Entra应用注册并启用基于证书的认证**：这种方法涉及更复杂的证书设置和维护，这增加了管理努力
- en: 'D. **From PowerShell, create a secret that never expires and use it for authentication**:
    Secrets created in this way still need to be managed and rotated, and creating
    secrets that never expire is not recommended for security reasons'
  id: totrans-664
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: D. **从PowerShell创建一个永不过期的密钥并用于身份验证**：以这种方式创建的密钥仍然需要管理和轮换，出于安全原因不建议创建永不过期的密钥
- en: 'Reference:'
  id: totrans-665
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 参考：
- en: '*Authorize access to managed* *identities*: [https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authorize-access-to-managed-identities](https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authorize-access-to-managed-identities)'
  id: totrans-666
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*授权对托管* *身份*的访问：[https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authorize-access-to-managed-identities](https://learn.microsoft.com/en-us/azure/ai-services/authentication?tabs=powershell#authorize-access-to-managed-identities)'
- en: Summary
  id: totrans-667
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'Hooray! You did it! Completing this book is no small feat, and you should be
    incredibly proud of yourself. You’ve delved into the world of Azure AI at the
    perfect time, with market demand for AI expertise at an all-time high. Along the
    way, you’ve mastered essential concepts, tackled hands-on exercises, and prepared
    yourself thoroughly for the *AI-102: Azure AI Engineer Associate Certification*exam.
    Your dedication, curiosity, and hard work have brought you to this milestone,
    showcasing your commitment to advancing as an AI professional.'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 哈喽！你做到了！完成这本书不是一件小事，你应该为自己感到无比自豪。你恰好在市场需求AI专业知识达到历史最高点的时候深入Azure AI的世界。在这个过程中，你掌握了基本概念，完成了动手练习，并充分准备了自己参加*AI-102：Azure
    AI工程师助理认证*考试。你的奉献、好奇心和努力使你达到了这个里程碑，展示了你作为AI专业人士不断进步的承诺。
- en: By completing this book, you’ve not only equipped yourself with the tools to
    excel in the exam but also laid a strong foundation for solving real-world business
    problems using Azure AI. Remember, this is just the beginning – AI is an ever-evolving
    field, and your newfound skills position you to thrive in this exciting domain.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 通过完成这本书，你不仅为考试中的出色表现装备了工具，还为使用 Azure AI 解决现实世界商业问题打下了坚实的基础。记住，这只是一个开始——人工智能是一个不断发展的领域，你新获得的能力让你在这个激动人心的领域中蓬勃发展。
- en: Take pride in your accomplishments, and best of luck with your certification
    and future endeavors. The AI community is vast, and your contributions will surely
    make an impact. Keep exploring, keep innovating, and keep pushing boundaries!
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的成就感到自豪，并祝你在认证和未来的努力中好运。人工智能社区非常庞大，你的贡献必将产生影响。继续探索，继续创新，并不断突破边界！
