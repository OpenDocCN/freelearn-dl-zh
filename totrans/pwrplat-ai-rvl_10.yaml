- en: '10'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Crafting an Executive Summary with GPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Many of us have to put together proposals of some sort—whether it’s responding
    to an RFP, delivering a statement of work, proposing a solution to a customer,
    or presenting a quarterly business report. The executive report is a key feature
    of each of those kinds of documents—bringing the key points together in a high-level,
    digestible overview.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll look at how we can leverage the power of generative AI
    to reason over content, build an executive summary, and insert it back into the
    document. We’ll use some familiar tools (such as the Encodian and Cloudmersive
    connectors) to make it happen!
  prefs: []
  type: TYPE_NORMAL
- en: Designing a solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you went through the exercises in [*Chapter 7*](B21234_07.xhtml#_idTextAnchor080),
    *Using Power Automate to Build PowerPoint Presentations*, and [*Chapter 9*](B21234_09.xhtml#_idTextAnchor114),
    *Implementing an AI-Enabled Resume Screener*, you’re already familiar with the
    Encodian Flowr and Cloudmersive connectors. This solution builds on both of those
    and combines it with the power of OpenAI ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Licensing prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Using AI models and connectors in the Power Platform has several prerequisites:'
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate premium licensing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An OpenAI subscription
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An Encodian free trial
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Cloudmersive Free Tier account
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you haven’t already enabled Dataverse and AI Builder capacity, see [*Chapter
    2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to Support
    AI Services*, and [*Chapter 6*](B21234_06.xhtml#_idTextAnchor069), *Processing
    Data with* *Sentiment Analysis*.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring solution prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Before you start the workflow configuration, you’ll need to get a few prerequisites
    out of the way—namely, to obtain free, trial, or paid subscriptions to OpenAI,
    Encodian, and Cloudmersive, set up a template document, and ensure you have a
    storage location for the finished document.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s quickly look at getting these ready.
  prefs: []
  type: TYPE_NORMAL
- en: Enabling subscriptions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’ve already got those, great! If not, you can refer to [*Chapter 2*](B21234_02.xhtml#_idTextAnchor027)
    for information on the configuration of an OpenAI subscription, [*Chapter 7*](B21234_07.xhtml#_idTextAnchor080)
    for obtaining an Encodian trial, and [*Chapter 9*](B21234_09.xhtml#_idTextAnchor114)
    for signing up for a free Cloudmersive subscription.
  prefs: []
  type: TYPE_NORMAL
- en: Preparing a document template
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you’ve already completed the exercise in [*Chapter 7*](B21234_07.xhtml#_idTextAnchor080),
    you’re familiar with the `<<[]>>`, as shown in *Figure 10**.1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.1 – Placing a token in a document](img/B21234_10_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.1 – Placing a token in a document
  prefs: []
  type: TYPE_NORMAL
- en: In *Figure 10**.1*, the **<<[ExecutiveSummary]>>** token represents the location
    where Flowr will insert the executive summary content that the GPT service generates.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a cloud storage provider
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we’ll be using the OneDrive for Business service that comes
    with an Office 365 or Microsoft 365 subscription. You can use another solution
    (such as DropBox or Google Drive), but you’ll have to configure those separately
    and use the appropriate connector.
  prefs: []
  type: TYPE_NORMAL
- en: Creating the flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With all of the prerequisites out of the way, it’s time to start working with
    some automation!
  prefs: []
  type: TYPE_NORMAL
- en: What do I do if I’m stuck?
  prefs: []
  type: TYPE_NORMAL
- en: If you run into a roadblock for some reason (you can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site at [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).
  prefs: []
  type: TYPE_NORMAL
- en: We’ll start with the trigger.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the trigger
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This flow works best with a manual trigger, where you will supply the document
    that will be used as the basis for the executive summary.
  prefs: []
  type: TYPE_NORMAL
- en: GPTs, as you already know, utilize prompts to provide instruction on the types
    of tasks to be performed. You have the option of supplying the entire prompt upfront
    in the trigger or moving the base of the prompt language to later on and allowing
    for customizations or tweaks in the trigger.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this flow, we’ll take the latter approach. This trigger will employ four
    input variables:'
  prefs: []
  type: TYPE_NORMAL
- en: A list of document sections that you want to include in the summary
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A list of document sections that you want to exclude from the summary
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A place where you can input additional instructions to tailor the response
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A file upload input
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To configure the flow, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com))
    and select **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Start from blank**, select **Instant** **cloud flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the `Generate executive summary`) and select the **Manually trigger a flow**
    trigger. Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Manually trigger a flow** trigger. In the flyout, select **Add**
    **an input**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select **Text**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.2 – Selecting the Text input](img/B21234_10_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.2 – Selecting the Text input
  prefs: []
  type: TYPE_NORMAL
- en: 'Replace `Inclusions`. This will be the text area where you can describe the
    document sections or components to include in your flow. In the text area, you
    can replace `scope of work and project deliverables`), as shown in *Figure 10**.3*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.3 – Customizing the input](img/B21234_10_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.3 – Customizing the input
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to note that the text you use as a suggestion is not the same
    as **default text** (text that will be automatically included if no customization
    is given). Power Automate currently does not support default text. You’ll have
    to fill in this text during the flow run.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on how your organization’s scopes of work are constructed and what
    your typical executive summaries look like, you may want to customize this further.
  prefs: []
  type: TYPE_NORMAL
- en: Click **Add** **an input**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Replace `Inclusions`. This will be the text area where you can describe the
    document sections or components to include in your flow. In the text area, you
    can replace `project governance, project management, period of performance, resource
    planning, customer resource commitments, and pricing`). Depending on how your
    organization’s scopes of work are constructed and what your typical executive
    summaries look like, you may want to customize this further.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add** **an input**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Replace `Additional Instructions`. This will be the text area where you can
    provide any other relevant instructions, such as what types of things may be important
    to a particular customer. In the text area, you can replace `Focus on the positive
    outcomes and partnership opportunity with` `the customer`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add an input** and select **File**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Replace `Upload`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With the trigger configured, it’s time to start processing the document.
  prefs: []
  type: TYPE_NORMAL
- en: Converting the document
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Since GPT can only process content in text form (and not the binary format
    of the Word document), it’s necessary to convert it. This next set of steps will
    send the document to the Cloudmersive connector to convert it to plaintext:'
  prefs: []
  type: TYPE_NORMAL
- en: After the trigger, click **+** and select **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `Cloudmersive`, scroll to the **Cloudmersive Document Conversion** connector,
    and click **See more**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.4 – Selecting the connector](img/B21234_10_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.4 – Selecting the connector
  prefs: []
  type: TYPE_NORMAL
- en: 'Select the **Convert Word DOCX Document to Text (txt)** action, as shown in
    *Figure 10**.5*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.5 – Selecting the Convert action](img/B21234_10_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.5 – Selecting the Convert action
  prefs: []
  type: TYPE_NORMAL
- en: 'The **Convert Word DOCX to Document to Text (txt)** flyout appears. In the
    **Input File to Perform the Operation On** box, add the dynamic content token
    for **File Content contentBytes** under the **Manually trigger a** **flow** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.6 – Adding the File Content contentBytes dynamic content token](img/B21234_10_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.6 – Adding the File Content contentBytes dynamic content token
  prefs: []
  type: TYPE_NORMAL
- en: In the **Input File to Perform The Operation On (File Name)** box, add the **File
    Content name** dynamic content token under the **Manually trigger a** **flow**
    action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, we’ll send the data over to OpenAI’s ChatGPT for processing!
  prefs: []
  type: TYPE_NORMAL
- en: Sending the content to GPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we’ll configure the steps necessary to save the attachment
    and then add a SharePoint list item for candidates who send in their resumes.
    We’ll use the HTTP premium connector for this section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we do that, though, let’s explore the JSON payload that will be sent
    to OpenAI. This payload contains information about the model that will be used,
    the prompt information, and the parameters that will control how the model responds:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'When reviewing this code sample, there are several key areas:'
  prefs: []
  type: TYPE_NORMAL
- en: '`model`: In this example, we’ll be using **gpt-4**. You can use other models,
    but GPT-4 is the most advanced that OpenAI currently offers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`messages`: This object defines two roles, **system** and **user**, each with
    an associated **content** key/value pair. The **system** role represents internal
    instructions that you, as the developer, are giving to the GPT. The related content
    key is where you can supply the instructions to the system role. In this case,
    you’re instructing the GPT to act as a system architect. The **user** role is
    the person or service asking the GPT to perform a task. Its content key/value
    pair is used to supply the request context and instructions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`max_tokens`: This is the maximum number of tokens you want the service to
    consume. As you may recall from [*Chapter 3*](B21234_03.xhtml#_idTextAnchor036),
    *Talking to ChatGPT*, tokens are the chunks of content (words or parts of words)
    that the GPT breaks down the request into. Each document may vary, but 5,000 tokens
    is approximately equivalent to a 10-15 page double-spaced document. You can use
    OpenAI’s Tokenizer ([https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer))
    to estimate how many tokens your source document contains:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 10.7 – Using the OpenAI Tokenizer](img/B21234_10_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.7 – Using the OpenAI Tokenizer
  prefs: []
  type: TYPE_NORMAL
- en: '`temperature`: This is a parameter (value between 0 and 1) that governs the
    randomness and creativity exhibited in the response. Closer to zero is more deterministic,
    while closer to 1 is more creative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`n`: How many completion choices to provide.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`stream`: This allows partial message content to be sent. In this case, we
    want the full body of the response as a single entity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’ll also notice some content that is surrounded by asterisks, such as ****Inclusions****
    and ****Exclusions****. These are simply placeholders that you will replace with
    dynamic content tokens.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go!
  prefs: []
  type: TYPE_NORMAL
- en: 'After the **Convert Word DOCX Document to Text (txt)** action, add the **HTTP**
    action under the **HTTP** connector:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.8 – Adding the HTTP action](img/B21234_10_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.8 – Adding the HTTP action
  prefs: []
  type: TYPE_NORMAL
- en: In the `https://api.openai.com/v1/chat/completions`
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is the OpenAI service endpoint for chat completions.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Under **Method**, select **POST**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under `Authorization` in the **Key** field.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, you’ll need your OpenAI API key. Under `Bearer <OpenAI AI key>` in the
    `Bearer sk-qztnj1CoTtoXFsXXlFYnT3ClbkFJqOOBf7gFcn9ErCKqeYbV` in the **Value**
    field. See *Figure 10**.9*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.9 – Configuring the HTTP authorization](img/B21234_10_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.9 – Configuring the HTTP authorization
  prefs: []
  type: TYPE_NORMAL
- en: No, that’s not a real key, so don’t try to use it. It just looks like one.
  prefs: []
  type: TYPE_NORMAL
- en: 'The **Body** field is where we’ll be sending the request to GPT. The request
    that we’ll send will be structured as a JSON payload. You can copy the following
    payload (repeated from the beginning of the section):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Select the text ****Inclusions**** and replace it with the **Inclusions** dynamic
    content token from the **Manually trigger a** **flow** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the text ****Exclusions**** and replace it with the **Exclusions** dynamic
    content token from the **Manually trigger a** **flow** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select the text ****Additional Instructions**** and replace it with the **Additional
    Instructions** dynamic content token from the **Manually trigger a flow** action.
    See *Figure 10**.10*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.10 – Configuring the body of the HTTP action](img/B21234_10_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.10 – Configuring the body of the HTTP action
  prefs: []
  type: TYPE_NORMAL
- en: After the **HTTP** action, add a **Parse** **JSON** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Content** field, select the **Body** dynamic content token from the
    **HTTP** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Schema** text area field, paste the following content:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The **schema** defines the formatting of the output. In Power Automate, it
    is derived from the actual output of running the HTTP POST request against the
    ChatGPT API directly. There are a number of ways to do this yourself, such as
    using Postman ([https://www.postman.com](https://www.postman.com)) to run a basic
    query, as shown in *Figure 10**.11*:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 10.11 – Generating the schema source file through Postman](img/B21234_10_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.11 – Generating the schema source file through Postman
  prefs: []
  type: TYPE_NORMAL
- en: 'After generating the output, you can click **Use sample payload to generate
    schema** on the **Parse JSON** flyout and then copy/paste the content from the
    original ChatGPT output, as shown in *Figure 10**.12*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.12 – Adding the JSON payload to generate the schema](img/B21234_10_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.12 – Adding the JSON payload to generate the schema
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you can click **Save** to preserve your progress. Next, we’ll
    take this output and plug it into the Word document.
  prefs: []
  type: TYPE_NORMAL
- en: Populating the document and saving the new file
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We’re in the home stretch on this example! We’ll process the Word document
    and then send the output to OneDrive for Business by following these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: After the **Parse JSON** action, add the **Populate Word Document** Encodian
    action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Parse JSON** flyout, in the **File Content** field, add the **File
    Content contentBytes** dynamic content token under the **Manually trigger a**
    **flow** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Document Data** text area field, enter the past the following content:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Replace ****Body Content**** with the **Body content** dynamic content token
    from the **Parse JSON** action, as shown in *Figure 10**.13*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.13 – Configuring the Populate Word Document action](img/B21234_10_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.13 – Configuring the Populate Word Document action
  prefs: []
  type: TYPE_NORMAL
- en: Add the **Create file** OneDrive for Business action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `concat(utcNow('yyyyMMddHHmm'),'_',triggerBody()?['file']?['name'])`.
    This will create a file named by concatenating a date stamp with the original
    name of the file.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **File Content** field, add the **File Content** dynamic token under
    the **Populate Word Document** action. See *Figure 10**.14*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.14 – Configuring the Populate Word Document action](img/B21234_10_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.14 – Configuring the Populate Word Document action
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, for the moment of truth!
  prefs: []
  type: TYPE_NORMAL
- en: Testing the flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To test the flow, you’ll need a Word document structured, such as a statement
    of work with the **<<[ExecutiveSummary]>>** token added to it. When you’re ready,
    let’s walk through testing this flow:'
  prefs: []
  type: TYPE_NORMAL
- en: From the flow designer, click **Test**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Manually** radio button and then click **Test**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Fill out the **Inclusions**, **Exclusions**, and **Additional instructions**
    (see screen text in *Figure 10**.15*) areas. Use the sample text to craft your
    own inclusions and exclusions based on the Word document that you’re using:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.15 – Testing the flow](img/B21234_10_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.15 – Testing the flow
  prefs: []
  type: TYPE_NORMAL
- en: Click **Import** and browse to the sample statement of work.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Run flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Review the output steps to ensure everything worked correctly:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.16 – Reviewing the flow run steps](img/B21234_10_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.16 – Reviewing the flow run steps
  prefs: []
  type: TYPE_NORMAL
- en: Browse to OneDrive for Business and look in the folder root for a newly created
    file. Open it and navigate to the part of the document where you had placed the
    **<<[****ExecutiveSummary]>>** token.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Review the inserted content. Make any edits as necessary to ensure the content
    is appropriate for your use case:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.17 – Reviewing the updated Word document](img/B21234_10_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.17 – Reviewing the updated Word document
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! You’ve successfully verified the flow!
  prefs: []
  type: TYPE_NORMAL
- en: If the flow miscategorizes resumes, you can easily go back and adjust the prompt
    to raise or lower the confidence requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Further exploration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Now that you’ve successfully created an executive summary for a statement of
    work, you can look toward expanding this with the following ideas:'
  prefs: []
  type: TYPE_NORMAL
