- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: Components of a RAG System
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RAG 系统的组件
- en: When you’re developing with **retrieval-augmented generation** (**RAG**), it
    is essential to understand the intricacies of each component, how they can be
    integrated, and the technologies that empower these systems.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当您使用**检索增强生成**（**RAG**）进行开发时，了解每个组件的复杂性、它们如何集成以及支持这些系统的技术至关重要。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Key component overview
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键组件概述
- en: Indexing
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 索引
- en: Retrieval and generation
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检索和生成
- en: Prompting
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示
- en: Defining your LLM
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义您的 LLM
- en: User interface or UI
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户界面或 UI
- en: Evaluation
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估
- en: These topics should provide you with a comprehensive understanding of the key
    components representing a RAG application.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这些主题应为您提供对代表 RAG 应用程序的关键组件的全面理解。
- en: Technical requirements
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The code for this chapter is placed in the following GitHub repository: [https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_04](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_04).'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码放置在以下 GitHub 仓库中：[https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_04](https://github.com/PacktPublishing/Unlocking-Data-with-Generative-AI-and-RAG-Second-Edition/tree/main/CHAPTER_04)。
- en: Key component overview
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关键组件概述
- en: This chapter explores the intricate components that make up a RAG system. Let’s
    start with an overview of the entire system.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了构成 RAG 系统的复杂组件。让我们从整个系统的概述开始。
- en: 'In [*Chapter 1*](B34736_01_ePub.xhtml#_idTextAnchor020), we introduced the
    three main stages of the RAG system from a technical standpoint (see *Figure 4.1*):'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第 1 章*](B34736_01_ePub.xhtml#_idTextAnchor020)中，我们从技术角度介绍了 RAG 系统的三个主要阶段（参见
    *图 4.1*）：
- en: '**Indexing**'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引**'
- en: '**Retrieval**'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检索**'
- en: '**Generation**'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成**'
- en: '![Figure 4.1 – The three stages of a RAG system](img/B34736_04_01.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.1 – RAG 系统的三个阶段](img/B34736_04_01.png)'
- en: Figure 4.1 – The three stages of a RAG system
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.1 – RAG 系统的三个阶段
- en: We will continue to build on this concept, but we will also introduce the practical
    aspects of development that are required for building an application. These include
    prompting, defining your **large language model** (**LLM**), the **user interface**
    (**UI**), and an evaluation component. Later chapters will cover each of those
    areas even further. All of this will be done with code so that you can tie the
    conceptual framework we’ll discuss directly into the implementation. Let’s start
    with indexing.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将继续构建这个概念，但也会介绍构建应用程序所需的实际开发方面。这包括提示、定义您的**大型语言模型**（**LLM**）、**用户界面**（**UI**）以及评估组件。后面的章节将进一步涵盖这些领域。所有这些都将通过代码来完成，以便您可以将我们讨论的概念框架直接与实现联系起来。让我们从索引开始。
- en: Indexing
  id: totrans-23
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 索引
- en: The first stage in the RAG system we will examine more closely is indexing.
    Note that we are skipping the setup, where we install and import packages, as
    well as setting up OpenAI and related accounts. That is a typical step in every
    generative **artificial intelligence** (**AI**) project, not just RAG systems.
    We provided a thorough setup guide in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043),
    so jump back there if you want to review the libraries we’ve added to support
    these next steps.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将更详细地检查 RAG 系统中的第一个阶段：索引。请注意，我们跳过了设置步骤，包括安装和导入包，以及设置 OpenAI 和相关账户。这是每个生成**人工智能**（**AI**）项目的典型步骤，而不仅仅是
    RAG 系统。我们在[*第 2 章*](B34736_02_ePub.xhtml#_idTextAnchor043)中提供了详细的设置指南，所以如果您想回顾我们为支持这些步骤而添加的库，请回到那里。
- en: 'Indexing occurs as the first main stage of RAG. As *Figure 4.2* indicates,
    it is the step after the user query:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 索引是 RAG 的第一个主要阶段。如图 4.2 所示，它是用户查询之后的步骤：
- en: '![Figure 4.2 – The Indexing stage of RAG highlighted](img/B34736_04_02.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.2 – RAG 的索引阶段突出显示](img/B34736_04_02.png)'
- en: Figure 4.2 – The Indexing stage of RAG highlighted
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.2 – RAG 的索引阶段突出显示
- en: 'In our code from [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), *Indexing*
    is the first section of code you see. This is the step where the data you are
    introducing to the RAG system is processed. As you can see in the code, the *data*
    in this scenario is the web document that is being loaded by `WebBaseLoader`.
    This is the beginning of that document (*Figure 4.3*):'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的代码中[*第 2 章*](B34736_02_ePub.xhtml#_idTextAnchor043)，*索引*是您看到的第一个代码部分。这是处理您向
    RAG 系统引入的数据的步骤。正如您在代码中所见，在这个场景中*数据*是通过 `WebBaseLoader` 加载的网页文档。这是该文档的开始（*图 4.3*）：
- en: '![Figure 4.3 – The web page that we process](img/B34736_04_03.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图4.3 – 我们处理的网页](img/B34736_04_03.png)'
- en: Figure 4.3 – The web page that we process
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.3 – 我们处理的网页
- en: In [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), you may have noticed
    that the code in the latter stages, *Retrieval* and *Generation*, is used after
    the user query is passed to the chain. This is done in *real time*, meaning that
    it happens at the time that the user interacts with it. Indexing, on the other
    hand, typically happens well before the user interacts with the RAG application.
    This aspect of indexing makes it a very different step from the other two stages,
    with the flexibility of being run at a different time than when the application
    is used. This is called **pre-processing offline**, meaning that this step is
    done before the user has even opened the application. There are instances where
    indexing can be done in real time as well, but that is much less common. For now,
    we will focus on the much more common step of pre-processing offline.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第2章*](B34736_02_ePub.xhtml#_idTextAnchor043)中，你可能已经注意到，在用户查询传递给链的后期阶段，*检索*和*生成*的代码被使用。这是在*实时*进行的，这意味着它发生在用户与之交互的时候。另一方面，索引通常在用户与RAG应用交互之前很久就会发生。索引的这一方面使其与其他两个阶段非常不同，具有在应用使用时不同时间运行的灵活性。这被称为**离线预处理**，意味着这一步是在用户甚至打开应用之前完成的。也有索引可以在实时进行的情况，但这要少得多。现在，我们将关注更常见的步骤：离线预处理。
- en: 'The following code is our **document extraction**:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码是我们的**文档提取**：
- en: '[PRE0]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In this extract, we are ingesting a web page. But imagine if this was pulling
    data in from a PDF or Word document, or other forms of unstructured data. As discussed
    in [*Chapter 3*](B34736_03_ePub.xhtml#_idTextAnchor064), unstructured data is
    a very popular data format in RAG applications. Historically, unstructured data
    has been very difficult for companies to access relative to structured data (from
    SQL databases and similar applications). But RAG has changed all of this, and
    companies are finally realizing how to significantly tap into this data. We will
    review how to access other types of data using **document loaders** in [*Chapter
    11*](B34736_11_ePub.xhtml#_idTextAnchor271) and how to do it with LangChain.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个摘录中，我们正在摄取一个网页。但想象一下，如果这是从PDF或Word文档或其他形式的无结构数据中拉取数据。如[*第3章*](B34736_03_ePub.xhtml#_idTextAnchor064)中讨论的，无结构数据在RAG应用中是一个非常流行的数据格式。从历史上看，相对于结构化数据（来自SQL数据库和类似的应用），公司获取无结构数据非常困难。但RAG改变了这一切，公司终于意识到如何显著地利用这些数据。我们将在[*第11章*](B34736_11_ePub.xhtml#_idTextAnchor271)中回顾如何使用**文档加载器**访问其他类型的数据，以及如何使用LangChain实现。
- en: 'Regardless of what type of data you are pulling in, it all goes through a similar
    process, as shown in *Figure 4.4*:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你拉取什么类型的数据，它们都会经过一个类似的过程，如图*4.4*所示：
- en: '![Figure 4.4 – Creating a retriever in the Indexing stage of the RAG process](img/B34736_04_04.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图4.4 – 在RAG过程的索引阶段创建检索器](img/B34736_04_04.png)'
- en: Figure 4.4 – Creating a retriever in the Indexing stage of the RAG process
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.4 – 在RAG过程的索引阶段创建检索器
- en: 'The document loader from the code fills the **Documents** component so that
    the documents can be retrieved later using the user query. But in most RAG applications,
    you must turn that data into a more searchable format: vectors. We will talk more
    about vectors in a moment, but first, to get your data into vector format, you
    must apply **splitting**. In our code, that is this section:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 从代码中加载的文档加载器填充了**Documents**组件，以便以后可以使用用户查询检索文档。但在大多数RAG应用中，你必须将那些数据转换成更易于搜索的格式：向量。我们稍后会更多地讨论向量，但首先，为了将你的数据转换为向量格式，你必须应用**分割**。在我们的代码中，这就是这一部分：
- en: '[PRE1]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Splitting breaks your content into digestible chunks that can be vectorized.
    The `RecursiveCharacterTextSplitter` class works by recursively trying to split
    on different characters (such as paragraphs, then sentences, then words) until
    the chunks are small enough.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 分割将你的内容分解成可消化的块，这些块可以被向量化。`RecursiveCharacterTextSplitter`类通过递归尝试在不同的字符上分割（例如段落、然后句子、然后单词），直到块足够小。
- en: '**Note**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: In the OpenAI API, the text is tokenized using a byte-level **byte pair encoding**
    (**BPE**) vocabulary. This means the raw text is split into `subword` tokens rather
    than individual characters. The number of tokens that are consumed for a given
    input text depends on the specific content, as common words and `subwords` are
    represented by single tokens, while less common words may be split into multiple
    tokens. On average, one token is approximately four characters for English text.
    However, this is just a rough estimate and can vary significantly based on the
    specific text. For example, short words such as *a* or *the* would be a single
    token, while a long, uncommon word might be split into several tokens.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在 OpenAI API 中，文本使用字节级 **字节对编码**（**BPE**）词汇表进行分词。这意味着原始文本被分割成 `subword` 标记，而不是单个字符。对于给定的输入文本，消耗的标记数量取决于具体内容，因为常见单词和
    `subwords` 通常由单个标记表示，而较少见的单词可能被分割成多个标记。平均而言，英文文本中的一个标记大约是四个字符。然而，这只是一个粗略估计，并且会根据具体文本而有很大差异。例如，像
    *a* 或 *the* 这样的短单词可能是一个单独的标记，而一个长且不常见的单词可能被分割成几个标记。
- en: 'These digestible chunks need to be smaller than that 8191 token limit, and
    other embedding services have their token limits. If you’re using a splitter that
    defines a chunk size and a chunk overlap, keep the chunk overlap in mind for that
    token limit as well. You have to add that overlap to the overall chunk size to
    be able to determine how large that chunk is. Expanding the chunk overlap is a
    common approach to ensuring that no context is lost between chunks. For example,
    if a chunk happens to cut an address in half in a legal document, it is unlikely
    you will find that address if you search for it. But with chunk overlap, you can
    account for issues like that. We will review various splitter options in LangChain
    in [*Chapter 11*](B34736_11_ePub.xhtml#_idTextAnchor271), including semantic chunking
    approaches that can split based on meaning rather than just character counts.
    The last part of the *Indexing* stage is defining the vector store and adding
    the embeddings, built from your data splits, to that vector store. You see it
    here in this code:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这些可消化的块需要小于 8191 个标记的限制，其他嵌入服务也有它们的标记限制。如果你使用一个定义块大小和块重叠的分隔器，也要考虑到那个标记限制的块重叠。你必须将这个重叠加到整体块大小上，才能确定那个块的大小。扩展块重叠是确保块之间不丢失上下文的常见方法。例如，如果一个块在法律文件中恰好将一个地址切成了两半，那么你不太可能找到那个地址。但是有了块重叠，你可以考虑到这类问题。我们将在
    LangChain 的 [*第 11 章*](B34736_11_ePub.xhtml#_idTextAnchor271) 中回顾各种分隔器选项，包括可以根据意义而不是仅根据字符数进行分割的语义块分割方法。*索引*阶段的最后部分是定义向量存储库，并将从你的数据分割中构建的嵌入添加到该向量存储库中。你在这里的代码中可以看到：
- en: '[PRE2]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: In this case, we use **Chroma** as a vector database (or store), pass it the
    splits, and apply OpenAI’s embeddings algorithm. As with the other indexing steps,
    all of this is most often done *offline* before the application is accessed by
    the user. These vector-based embeddings are stored in this vector database for
    querying and retrieval in the future. Chroma is just one of many databases that
    can be used here. The `OpenAIEmbeddings` API is just one of many vectorizing algorithms
    that can be used here as well. We will dive into this topic in more detail in
    *Chapters 7* and *8*, when we discuss vectors, vector stores, and vector searches.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们使用 **Chroma** 作为向量数据库（或存储），传递分割数据，并应用 OpenAI 的嵌入算法。与其他索引步骤一样，所有这些通常在应用程序被用户访问之前
    *离线* 完成。这些基于向量的嵌入存储在这个向量数据库中，以便将来进行查询和检索。Chroma 只是这里可以使用的许多数据库之一。`OpenAIEmbeddings`
    API 只是这里可以使用的许多向量化算法之一。我们将在 *第 7 章* 和 *第 8 章* 中更详细地探讨这个主题，当我们讨论向量、向量存储和向量搜索时。
- en: 'Going back to our diagram of the *Indexing* process, *Figure 4.5* is an even
    more accurate representation of what it looks like:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 回到我们关于 *索引*过程的图示，*图 4.5* 是一个更准确的表示：
- en: '![Figure 4.5 – Vectors during the Indexing stage of the RAG process](img/B34736_04_05.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.5 – RAG 过程索引阶段中的向量](img/B34736_04_05.png)'
- en: Figure 4.5 – Vectors during the Indexing stage of the RAG process
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.5 – RAG 过程索引阶段中的向量
- en: You might be wondering why we aren’t calling the step where we define the *retriever*
    a part of the *Retrieval* step. This is because we are establishing this as the
    mechanism that we retrieve from, but we do not apply the retrieval until later,
    during the retrieval step, as a result of the user submitting their user query.
    The *Indexing* step focuses on building the infrastructure that the other two
    steps work from, and we are indeed indexing the data so that it can be retrieved
    later. At the end of this part of the code, you have a retriever ready and waiting
    to receive a user query when the process starts. Let’s talk about the parts of
    the code that will use this retriever – the retrieval and generation steps!
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道为什么我们不说定义*检索器*的步骤是检索步骤的一部分。这是因为我们将此作为检索的机制，但我们不会在检索步骤中应用检索，直到用户提交他们的查询。*索引*步骤专注于构建其他两个步骤工作的基础设施，我们确实在索引数据，以便以后可以检索。在这部分代码的末尾，你将有一个准备就绪并等待接收用户查询的检索器。让我们谈谈将使用此检索器的代码部分——检索和生成步骤！
- en: Retrieval and generation
  id: totrans-50
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 检索与生成
- en: 'In our RAG application code, we have combined the *Retrieval* and *Generation*
    stages. From a diagram standpoint, this looks like what’s shown in *Figure 4.6*:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的RAG应用代码中，我们将检索和生成阶段结合起来。从图表的角度来看，这看起来就像*图4.6*中所示的那样：
- en: '![Figure 4.6 – Vectors during the Indexing stage of the RAG process](img/B34736_04_06.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图4.6 – RAG过程中索引阶段的向量](img/B34736_04_06.png)'
- en: Figure 4.6 – Vectors during the Indexing stage of the RAG process
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.6 – RAG过程中索引阶段的向量
- en: While retrieval and generation are two separate stages serving two important
    functions of the RAG application, they are combined in our code. When we invoke
    `rag_chain` as the last step, it steps through both of these stages, making them
    difficult to separate when talking about the code. But conceptually, we will separate
    them here and then show how they pull them together to process the user query
    and provide an intelligent generative AI response. Let’s start with the retrieval
    step.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然检索和生成是两个独立阶段，分别服务于RAG应用的两个重要功能，但我们在代码中将它们结合起来。当我们调用`rag_chain`作为最后一步时，它将遍历这两个阶段，这使得在谈论代码时很难将它们分开。但从概念上讲，我们将在这里将它们分开，然后展示它们如何将它们结合起来处理用户查询并提供智能生成式AI响应。让我们从检索步骤开始。
- en: Retrieval-focused steps
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检索重点步骤
- en: 'In the complete code (which can be found in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043)),
    there are only two areas in this code where actual retrieval takes place or is
    processed. This is the first:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在完整的代码（可以在[*第2章*](B34736_02_ePub.xhtml#_idTextAnchor043)中找到），在这个代码中只有两个地方实际发生检索或处理。这是第一个：
- en: '[PRE3]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The second can be found as the first step within the RAG chain:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步可以在RAG链中的第一步找到：
- en: '[PRE4]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'When the code is initiated, it runs in this order:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当代码启动时，它按以下顺序运行：
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The chain is invoked with the user query and runs through the steps we defined
    in the chain here:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 链接被用户查询调用，并运行我们在这里定义的链中的步骤：
- en: '[PRE6]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: With this chain, the user query is passed to the first link, which passes that
    user query into the retriever we defined earlier, where it performs a similarity
    search to match the user query against the other data in the vector store. At
    this point, we have a retrieved list of content strings that is contextually similar
    to the user query.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个链，用户查询被传递到第一个链接，该链接将用户查询传递到我们之前定义的检索器中，在那里它执行相似性搜索以匹配用户查询与向量存储中的其他数据。在这个时候，我们有一个检索到的内容字符串列表，它与用户查询上下文相关。
- en: However, as shown in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), there
    is a bit of a glitch in our retrieval steps due to the formatting of the tools
    we are using. The `{question}` and `{context}` placeholders both expect strings,
    but the retrieval mechanism we use to fill in the context is a long list of separate
    content strings. We need a mechanism to turn that list of content pieces into
    the string format that the prompt in the next chain link is expecting.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如[*第2章*](B34736_02_ePub.xhtml#_idTextAnchor043)所示，由于我们使用的工具的格式问题，我们的检索步骤中存在一些小故障。`{question}`和`{context}`占位符都期望字符串，但我们用来填充上下文的检索机制是一个包含单独内容字符串的长列表。我们需要一个机制将这个内容片段列表转换为下一个链链接中提示所期望的字符串格式。
- en: 'So, if you look closely at the code for the retriever, you may notice that
    the retriever is actually in a mini-chain `(retriever | format_docs)`, indicated
    by the pipe `(|)` symbol, so the output of the retriever is passed right into
    the `format_docs` function shown here:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果您仔细查看检索器的代码，您可能会注意到检索器实际上在一个迷你链`(retriever | format_docs)`中，由管道`(|)`符号指示，因此检索器的输出直接传递到此处所示的`format_docs`函数：
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Let’s consider this a post-processing step in the *Retrieval* stage. The data
    has been retrieved, but it is not in the right format, so we are not done. The
    `format_docs` function completes the task and returns our content in the proper
    format.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将这视为检索阶段的后处理步骤。数据已经被检索，但它不是正确的格式，所以我们还没有完成。`format_docs`函数完成了任务，并以正确的格式返回我们的内容。
- en: However, this only provides us with `{context}`, one of the input variable placeholders.
    The other placeholder we need to hydrate our prompt is the `{question}` placeholder.
    We do not have the same formatting problem with the *question* that we had with
    the *context* since the *question* is already a string. So, we can use a convenient
    object called `RunnablePassThrough` that, as its name suggests, passes the input
    (the *question*) through as is.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这仅为我们提供了`{context}`，这是输入变量占位符之一。我们需要填充提示的另一个占位符是`{question}`。与`context`相比，我们不会遇到相同的格式化问题，因为`question`已经是一个字符串。因此，我们可以使用一个方便的对象`RunnablePassThrough`，正如其名称所暗示的，它将输入（即`question`）原样传递。
- en: 'If you take the entire first chain link in its entirety, this is essentially
    performing the retrieval step, formatting its output, and pulling it all together
    in the proper format to pass on to the next step:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您将整个第一个链链接完整地考虑，这本质上是在执行检索步骤，格式化其输出，并将所有内容以适当的格式汇总以传递给下一步：
- en: '[PRE8]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'But wait a minute. If you’re doing a vector search, you need to convert the
    user query into a vector, right? Did we not say that we are taking the mathematical
    representation of the user query and measuring the distance to other vectors,
    finding which ones are closer? So, where does that happen? The retriever was created
    from a method of the vector store:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等。如果您正在进行向量搜索，您需要将用户查询转换为向量，对吧？我们没有说过我们正在获取用户查询的数学表示并测量与其他向量的距离，找到哪些更接近吗？那么这发生在哪里？检索器是从向量存储的方法创建的：
- en: '[PRE9]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'The vector store that this was generated from is a Chroma vector database that
    was declared using the `OpenAIEmbeddings()` object as its embedding function:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 生成此内容的向量存储是一个使用`OpenAIEmbeddings()`对象作为其嵌入函数声明的Chroma向量数据库：
- en: '[PRE10]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: That `.as_retriever()` method has all of the functionality built in to take
    that user query, convert it into an embedding that matches the embedding format
    of the other embeddings, and then run the retrieval process.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '`.as_retriever()`方法内置了所有功能，可以接受用户查询，将其转换为与其他嵌入匹配的嵌入格式，然后运行检索过程。'
- en: '**Note**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: Because this is using the `OpenAIEmbeddings()` object, it sends your embeddings
    to the OpenAI API, and you will incur charges from this. In this case, it is just
    one embedding; with OpenAI, this currently costs $0.10 per 1M tokens. So, for
    the `What are the advantages of using RAG?` input, which is 10 tokens according
    to OpenAI, this is going to cost a whopping $0.000001\. That may not seem like
    a lot, but we want to be completely transparent when there is any cost involved!
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 因为这是使用`OpenAIEmbeddings()`对象，它会将您的嵌入发送到OpenAI API，因此您将产生相关费用。在这种情况下，这只是单个嵌入；在OpenAI，目前每1M个token的费用是$0.10。所以，对于`使用RAG的优势是什么？`这个输入，根据OpenAI，它有10个token，这将花费高达$0.000001。这可能看起来并不多，但我们希望在涉及任何费用时都完全透明！
- en: That concludes our *Retrieval* stage, with an output that is properly formatted
    for the next step – the prompt! Next, we’ll discuss the *Generation* stage, where
    we utilize the LLM to take the final step of generating a response.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这就结束了我们的检索阶段，输出已经正确格式化，可以传递给下一步——提示！接下来，我们将讨论生成阶段，在这个阶段，我们将利用LLM来执行生成响应的最后一步。
- en: The generation stage
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成阶段
- en: The *Generation* stage is the final stage and is where you will use the LLM
    to generate the response to the user query based on the content you retrieved
    in the *Retrieval* stage. But before we can do this, we have to do a little bit
    of preparation work. Let’s walk through this.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 生成阶段是最后一个阶段，您将在这个阶段使用LLM根据在检索阶段检索到的内容生成对用户查询的响应。但在我们能够这样做之前，我们必须做一些准备工作。让我们来了解一下。
- en: 'Overall, the *Generation* stage is represented by two parts of the code, starting
    with the prompt:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，*生成*阶段由代码的两个部分表示，从提示开始：
- en: '[PRE11]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Then, we have the LLM:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们有LLM：
- en: '[PRE12]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'With the prompt and LLM defined, these components are used in the RAG chain:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义了提示和LLM之后，这些组件在RAG链中被使用：
- en: '[PRE13]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Note that the question section was bolded in both the *Retrieval* and the *Generation*
    stages. We already noted how it is used in the *Retrieval* stage as the basis
    for what the similarity search is run against. Now, we will show how it is used
    again when integrating it into a prompt that is fed to the LLM for generation.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在*检索*和*生成*阶段，问题部分都被加粗了。我们之前已经提到，它在*检索*阶段是如何作为相似性搜索基础的。现在，我们将展示当将其整合到提供给LLM进行生成的提示中时，它是如何再次被使用的。
- en: Prompting
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示
- en: '**Prompts** are a fundamental part of any generative AI application, not just
    RAG. When you start talking about prompts, particularly with RAG, you know LLMs
    are going to be involved soon after. But first, you must create and prepare a
    proper prompt for our LLM. In theory, you could write your prompt, but I wanted
    to take this chance to teach you this very common development pattern and get
    you used to using it when you need it. In this example, we’ll pull the prompt
    from the LangChain Hub using the LangSmith client.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示**是任何生成式AI应用的基本部分，不仅仅是RAG。当你开始谈论提示时，尤其是与RAG相关时，你知道LLM很快就会涉及其中。但首先，你必须为我们的LLM创建和准备一个合适的提示。从理论上讲，你可以编写你的提示，但我想要抓住这个机会教你这个非常常见的发展模式，并让你习惯在需要时使用它。在这个例子中，我们将使用LangSmith客户端从LangChain
    Hub中提取提示。'
- en: The LangChain Hub, now part of LangSmith (LangChain’s unified developer platform),
    is a place to “*discover, share, and version control prompts.*” Other users of
    the hub have shared their polished prompts, making it easier for you to build
    off common knowledge. It is a good way to start with prompts, pulling down pre-designed
    prompts and seeing how they are written. But you will eventually want to move
    on to writing your own, more customized prompts.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain Hub，现在是LangSmith（LangChain的统一开发者平台）的一部分，是一个“*发现、分享和版本控制提示*”的地方。Hub的其他用户已经分享了他们的精炼提示，这使得你更容易基于共同知识进行构建。这是一个很好的开始提示的方式，拉取预先设计的提示，看看它们是如何编写的。但最终，你将想要转向编写你自己的、更定制的提示。
- en: 'Let’s talk about what the purpose of this prompt is in terms of the retrieval
    process. The “prompt” is the next link in the chain after the *Retrieval* stage
    we just discussed. You can see it here in `rag_chain`:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们谈谈这个提示在检索过程中的目的。这里的“提示”是我们在刚刚讨论的*检索*阶段之后的链中的下一个链接。你可以在`rag_chain`中看到它：
- en: '[PRE14]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Staying true to the LangChain pattern, the inputs of the prompt are the outputs
    of the previous step. You can see these inputs at any time by printing them out
    like this:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 坚持LangChain模式，提示的输入是前一步的输出。你可以通过像这样打印出来在任何时候看到这些输入：
- en: '[PRE15]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'This results in the following output:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致了以下输出：
- en: '[PRE16]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'This matches what we defined in the previous step:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我们之前定义的一致：
- en: '[PRE17]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Printing out the entire `prompt` object, using print(prompt), shows that there
    is much more than just the text prompt and input variables:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`print(prompt)`打印出整个`prompt`对象，显示的不仅仅是文本提示和输入变量：
- en: '[PRE18]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Let’s unravel this a bit further, starting with the input variables. These
    are the variables we just discussed that this particular prompt takes as input.
    These can vary depending on the prompt. There is a messages [] list, but in this
    case, there is only one message in the list. This message is an instance of `HumanMessagePromptTemplate`,
    which represents a specific type of message template. It is initialized with a
    `PromptTemplate` object. The `PromptTemplate` object is created with the specified
    `input_variables` and a template string. Again, `input_variables` are context
    and question, and you can see where they are placed in the template string:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步解开这个，从输入变量开始。这些是我们刚刚讨论的特定提示作为输入的变量。这些变量可能因提示而异。有一个消息[]列表，但在这个例子中，列表中只有一个消息。这个消息是`HumanMessagePromptTemplate`的一个实例，它代表了一种特定的消息模板。它使用一个`PromptTemplate`对象初始化。`PromptTemplate`对象是用指定的`input_variables`和模板字符串创建的。再次强调，`input_variables`是上下文和问题，你可以在模板字符串中看到它们的位置：
- en: '[PRE19]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: The `{question}` and `{context}` placeholders will be replaced with the actual
    values of the question and context variables when the prompt is used in the chain.
    The output of this chain link is the string template that was filled in with `{question}`
    and `{context}` from the previous retrieval step.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示在链中使用时，`{question}` 和 `{context}` 占位符将被实际的问题和上下文变量的值所替换。这个链链接的输出是填充了从先前检索步骤中的
    `{question}` 和 `{context}` 的字符串模板。
- en: 'The last part is simply Answer: with nothing after that. This prompts the LLM
    for an answer and is a prevalent pattern that works well for LLM interactions
    to elicit an answer.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的部分仅仅是“答案：”，后面没有任何内容。这会提示 LLM 提供答案，并且这是一个在 LLM 交互中引发答案的常见模式。
- en: In short, a prompt is an object that is plugged into your LangChain chain with
    inputs to fill a prompt template, generating the prompt that you will pass to
    an LLM for inference. This is essentially a preparation stage for the *Generation*
    stage of the RAG system.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，一个提示符是一个对象，它被连接到你的 LangChain 链中，并带有输入来填充提示模板，生成你将传递给 LLM 进行推理的提示符。这本质上是为
    RAG 系统的 *生成* 阶段所做的准备阶段。
- en: In the next step, we will pull in the LLM, the brains behind the whole operation!
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一步中，我们将引入 LLM，这是整个操作背后的智慧！
- en: Defining your LLM
  id: totrans-108
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 定义你的 LLM
- en: 'With the prompt template selected, we can select an LLM, a central component
    for any RAG application. The following code shows the LLM model as the next chain
    link in `rag_chain`:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择了提示模板后，我们可以选择一个 LLM，这是任何 RAG 应用程序的核心组件。以下代码显示了 LLM 模型作为 `rag_chain` 中的下一个链链接：
- en: '[PRE20]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: As discussed previously, the output of the previous step, which was the prompt
    object, is going to be the input of the next step, the LLM. In this case, the
    prompt will *pipe* right into the LLM with the prompt we generated in the previous
    step.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，上一步的输出，即提示符对象，将成为下一步，即 LLM 的输入。在这种情况下，提示符将直接通过我们上一步生成的提示符 *管道* 进入 LLM。
- en: 'Above `rag_chain`, we define the LLM we want to use:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `rag_chain` 上方，我们定义我们想要使用的 LLM：
- en: '[PRE21]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'This creates an instance of the `ChatOpenAI` class from the `langchain_openai`
    module, which serves as an interface to OpenAI’s language models, specifically
    the GPT-4o -mini model. LLMs are typically fed a prompt using the invoke method,
    and you could call this directly in the code here by adding the following:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这创建了一个来自 `langchain_openai` 模块的 `ChatOpenAI` 类的实例，该模块作为 OpenAI 语言模型的接口，具体是 GPT-4o
    -mini 模型。LLM 通常使用 invoke 方法接收提示，你可以在代码中直接调用它，只需添加以下内容：
- en: '[PRE22]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Doing it this way, you are asking the LLM directly for the answer.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式操作，你是在直接向 LLM 请求答案。
- en: 'If you run the preceding code, it will give you the response from GPT-4o-mini,
    which will know about RAG. But for comparison, what if we changed it to GPT3.5?
    Here is the response I received when using ChatGPT 3.5:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你运行前面的代码，它将给出 GPT-4o-mini 的响应，这将了解 RAG。但为了比较，如果我们将其更改为 GPT3.5 会怎样？以下是使用 ChatGPT
    3.5 收到的响应：
- en: '[PRE23]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Uh-oh! ChatGPT 3.5 doesn’t know about RAG! At least not in the context we are
    talking about. This highlights the value of using RAG to add your data. The most
    recent cutoff date for ChatGPT 3.5 was January 2022\. The generative AI-focused
    concept of RAG must not have been popular enough for it to instantly know what
    I was referring to with the RAG acronym.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀！ChatGPT 3.5 不了解 RAG！至少在我们讨论的上下文中不了解。这突出了使用 RAG 添加你的数据的价值。ChatGPT 3.5 的最新截止日期是
    2022 年 1 月。RAG（检索增强生成）这一生成式 AI 概念可能还不够流行，以至于它能够立即知道我所说的 RAG 缩写代表什么。
- en: Using RAG, we can augment its knowledge and utilize the LLM’s other skills of
    summarizing and finding data to have a more successful result overall. But try
    changing this to question `answering in less than 100 words, what are the Advantages
    of using Retrieval Augmented Generation (RAG)?` and see what results you can get.
    Try it with a newer model that likely has more information about RAG applications
    in its training data. You will likely get a better response because the data that
    the LLM was trained on has a more recent cutoff date!
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 RAG，我们可以增强其知识，并利用 LLM 的其他技能，如总结和查找数据，以获得更成功的整体结果。但尝试将其更改为问题“用不到 100 字回答，使用检索增强生成（RAG）的优势是什么？”并看看你能得到什么结果。尝试使用一个更新的模型，该模型在其训练数据中可能包含更多关于
    RAG 应用的信息。你可能会得到更好的响应，因为 LLM 训练所使用的数据的截止日期更近！
- en: 'But instead of calling the LLM directly, we pass it the prompt we structured
    using the *Retrieval* stage and can get a much more informed answer. You could
    end the chain here, and the output of your chain would be what’s returned from
    the LLM. In most cases, this is not just the text you might see when you type
    something into ChatGPT – it is in JSON format and has a lot of other data included
    with it. So, if you want a nicely formatted string output reflecting the LLM’s
    response, you have one more chain link to pipe the LLM response into: the `StrOutputParser()`
    object. The `StrOutputParser()` object is a utility class in LangChain that parses
    the key output of the language model into a string format. Not only does it strip
    away all the information you did not want to deal with right now, but it ensures
    that the generated response is returned as a string.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们不是直接调用LLM，而是传递给它使用*检索*阶段构建的提示，从而可以得到一个更全面的信息回答。你可以在这里结束链，你的链的输出将是LLM返回的内容。在大多数情况下，这不仅仅是你在ChatGPT中输入某些内容时可能看到的文本——它是以JSON格式呈现的，并包含很多其他数据。因此，如果你想得到一个格式良好的字符串输出，反映LLM的响应，你还有一个链链接可以将LLM响应传递到：`StrOutputParser()`对象。`StrOutputParser()`对象是LangChain中的一个实用类，它将语言模型的关键输出解析为字符串格式。它不仅移除了你现在不想处理的所有信息，而且还确保生成的响应以字符串的形式返回。
- en: 'And of course, the last line of code is the line that kicks everything off:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，代码的最后一行是启动一切的那一行：
- en: '[PRE24]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: After the *Retrieval* stage, this user query is used a second time as one of
    the input variables for the prompt that is passed to the LLM. Here, `What are
    the advantages of using RAG?` is the string that’s passed into the chain.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在*检索*阶段之后，这个用户查询被第二次用作传递给LLM的提示中的一个输入变量。在这里，“使用RAG的优势是什么？”是传递到链中的字符串。
- en: As we discussed in [*Chapter 2*](B34736_02_ePub.xhtml#_idTextAnchor043), in
    the future, this prompt will include a query that comes from a UI. Let’s discuss
    the UI as another important component of the RAG system.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在[*第二章*](B34736_02_ePub.xhtml#_idTextAnchor043)中讨论的那样，在未来，这个提示将包括一个来自UI的查询。让我们讨论UI作为RAG系统另一个重要组成部分。
- en: User interface or UI
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用户界面或UI
- en: At some point, to make this application more professional and usable, you must
    add a way for regular users who do not have your code to enter their queries directly
    and see the results. The UI serves as the primary point of interaction between
    the user and the system and therefore, is a critical component when building a
    RAG application. Advanced interfaces might include **natural language understanding**
    (**NLU**) capabilities to interpret the user’s intent more accurately, a form
    of **natural language processing** (**NLP**) that focuses on the understanding
    part of natural language. This component is crucial for ensuring that users can
    easily and effectively communicate their needs to the system.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在某个时候，为了使这个应用程序更加专业和易用，你必须为那些没有你代码的普通用户提供一种直接输入查询并查看结果的方式。UI作为用户和系统之间交互的主要点，因此在构建RAG应用程序时，它是一个关键组件。高级界面可能包括**自然语言理解**（NLU）功能，以更准确地解释用户的意图，这是一种专注于自然语言理解部分的**自然语言处理**（NLP）。这个组件对于确保用户能够轻松有效地将需求传达给系统至关重要。
- en: 'This begins with replacing this last line with a UI:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这是从替换最后一行为一个UI开始：
- en: '[PRE25]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This line would be replaced with an entry field for the user to submit a text
    question, rather than a set string that we pass it in, as shown here.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这一行将被替换为用户提交文本问题的输入字段，而不是我们传递给它的固定字符串，如下所示。
- en: This also includes displaying the resulting response from the LLM in a more
    user-friendly interface, such as on a nicely designed screen. In [*Chapter 6*](B34736_06_ePub.xhtml#_idTextAnchor128),
    we will show this in code, but for now, let’s have a higher-level talk about adding
    an interface to your RAG application.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这也包括以更用户友好的界面显示LLM生成的响应，例如在一个设计精美的屏幕上。在[*第六章*](B34736_06_ePub.xhtml#_idTextAnchor128)中，我们将用代码展示这一点，但现在，让我们就向你的RAG应用程序添加界面进行更高层次的讨论。
- en: When an application is loaded for a user, they will have some way to interact
    with it. This is typically facilitated through an interface that can range from
    simple text input fields on a web page to more complex voice recognition systems.
    The key is to accurately capture the intent of the user’s query in a format that
    can be processed by the system. One obvious advantage of adding a UI is that it
    allows your users to test the results of other queries. A user could enter any
    query they want and see what the result is.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个应用程序为用户加载时，他们会有某种方式与之交互。这通常是通过一个界面来实现的，这个界面可以从网页上的简单文本输入字段到更复杂的语音识别系统不等。关键是要准确捕捉用户查询的意图，并以系统可以处理的形式呈现。添加用户界面的一个明显优势是它允许用户测试其他查询的结果。用户可以输入他们想要的任何查询并查看结果。
- en: Pre-processing
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预处理
- en: As we discussed, even though the user just enters a question such as What is
    Task Decomposition? in the UI, after that question is submitted, there is pre-processing
    that often occurs to make that query more LLM-friendly. This is primarily done
    in the prompt, which also gets help from many of the other functions. But all
    of this happens behind the scenes and not in the view of the user. All they will
    see in this scenario is the final output displayed in a user-friendly way.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们讨论的那样，尽管用户只是在用户界面中输入一个像“什么是任务分解？”这样的问题，但在提交这个问题之后，通常会有预处理来使这个查询更适合大型语言模型（LLM）。这主要是在提示中完成的，同时也会得到许多其他功能的帮助。但所有这些都是在幕后发生的，用户看不到。在这种情况下，他们只会看到以用户友好的方式显示的最终输出。
- en: Post-processing
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后处理
- en: Even after the LLM has returned the response, this response is often post-processed
    before it is shown to the user.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 即使大型语言模型（LLM）返回了响应，这个响应在显示给用户之前通常也会进行后处理。
- en: 'Here’s what an actual LLM output looks like:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是实际的大型语言模型（LLM）输出的样子：
- en: '[PRE26]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'As a last step in the chain, we pass that through `StrOutput Parser()` to parse
    out just the string:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 作为链中的最后一步，我们将其传递给`StrOutput Parser()`来解析出字符串：
- en: '[PRE27]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: That is certainly better than the previous step’s output, but this is still
    displaying in your notebook. In a more professional application, you will want
    to display this on a screen in a way that is friendly for the user. You may want
    to display other information, such as the source document we showed in the [*Chapter
    3*](B34736_03_ePub.xhtml#_idTextAnchor064) code. This will depend on the intentions
    of your application and will vary significantly across RAG systems.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这确实比之前步骤的输出要好，但仍然是在你的笔记本中显示。在一个更专业的应用程序中，你可能会希望以对用户友好的方式在屏幕上显示这些信息。你可能还想显示其他信息，例如我们在[*第3章*](B34736_03_ePub.xhtml#_idTextAnchor064)代码中展示的源文档。这取决于应用程序的意图，并且在不同的大语言模型（RAG）系统中会有显著差异。
- en: Output interface
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 输出界面
- en: 'For a full UI, this string will be passed to the interface that displays the
    message that’s returned to the chain. This interface can be very simple, like
    what you can see with ChatGPT in *Figure 4.7*:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个完整的用户界面，这个字符串将被传递到显示返回给链的消息的界面。这个界面可以非常简单，就像你在*图4.7*中看到的ChatGPT一样：
- en: '![Figure 4.7 – The ChatGPT 4 interface](img/B34736_04_07.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![图4.7 – ChatGPT 4界面](img/B34736_04_07.png)'
- en: Figure 4.7 – The ChatGPT 4 interface
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.7 – ChatGPT 4界面
- en: You could also build something more robust that is more suitable for your particular
    target user group. If it is meant to be more conversational, the interface should
    also be designed to facilitate further interaction. You could give users options
    to refine their queries, ask follow-up questions, or request additional information.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以构建一个更健壮的界面，更适合你的特定目标用户群体。如果它旨在更具有对话性，界面也应该设计成促进进一步的交互。你可以给用户提供选项来细化他们的查询，提出后续问题，或请求更多信息。
- en: 'Another common feature in the UI is the collection of feedback on the usefulness
    and accuracy of the response. This can be used to continuously improve the system’s
    performance. By analyzing user interactions and feedback, the system can learn
    to better understand user intent, refine the vector search process, and enhance
    the relevance and quality of the generated responses. This leads us to our last
    key component: evaluation.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 用户界面中另一个常见的功能是收集关于响应的有用性和准确性的反馈。这可以用来持续改进系统的性能。通过分析用户交互和反馈，系统可以学习更好地理解用户意图，细化向量搜索过程，并提高生成响应的相关性和质量。这引出了我们最后一个关键组件：评估。
- en: Evaluation
  id: totrans-148
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估
- en: The evaluation component is essential for assessing and improving the RAG system’s
    performance. While there are many common practices for evaluation, the most effective
    evaluation system will focus on what is most important for your users and provide
    an evaluation for improving those features and capabilities. Often, this involves
    analyzing the system’s outputs using various metrics, such as accuracy, relevance,
    response time, and user satisfaction. This feedback is used to identify areas
    of improvement and guide adjustments in the system’s design, data handling, and
    LLM integration. Continuous evaluation is crucial for maintaining high-quality
    responses and ensuring that the system meets users’ needs effectively.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 评估组件对于评估和改进RAG系统的性能至关重要。虽然有许多常见的评估实践，但最有效的评估系统将专注于对用户最重要的方面，并提供评估以改进这些特性和功能。通常，这涉及到使用各种指标（如准确性、相关性、响应时间和用户满意度）分析系统的输出。这些反馈用于确定改进领域并指导系统设计、数据处理和LLM集成的调整。持续的评估对于保持高质量响应并确保系统有效满足用户需求至关重要。
- en: As mentioned previously, you can also collect user feedback in various ways,
    including qualitative data (entry forms with open-ended questions) or quantitative
    (true/false, ratings, or other numerical representations) on the usefulness and
    accuracy of the response. A thumbs up/down is often used to get a quick feedback
    response from the user and gauge the general effectiveness of the application
    among many users.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，你还可以通过多种方式收集用户反馈，包括定性数据（开放式问题的表格）或定量数据（对错、评分或其他数值表示）关于响应的有用性和准确性。点赞/踩通常用于从用户那里快速获得反馈并评估应用程序在众多用户中的总体有效性。
- en: We will go more in-depth about how to incorporate evaluation into your code
    in [*Chapter 9*](B34736_09_ePub.xhtml#_idTextAnchor209).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在[*第9章*](B34736_09_ePub.xhtml#_idTextAnchor209)中更深入地探讨如何将评估融入你的代码中。
- en: Summary
  id: totrans-152
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter hasn’t provided an exhaustive list of components for a RAG system.
    However, these are components that tend to be in every successful RAG system.
    Keep in mind that RAG systems are constantly evolving, and new types of components
    are appearing every day. The key aspect of your RAG system should be to add the
    components that will deliver what your users need. This can be very specific to
    your project, but it is often an intuitive outgrowth of what your company does.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 本章并未提供RAG系统组件的详尽列表。然而，这些组件往往存在于每个成功的RAG系统中。请记住，RAG系统不断进化，每天都有新的组件类型出现。你RAG系统的关键方面应该是添加那些能够满足用户需求的组件。这可能与你的项目非常具体，但通常是你公司所做事情的直观扩展。
- en: 'This chapter provided a comprehensive overview of the essential components
    that make up a successful RAG system. It delved into the three main stages: *Indexing*,
    *Retrieval*, and *Generation*, and explained how these stages work together to
    deliver enhanced responses to user queries.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了对构成成功RAG系统必要组件的全面概述。它深入探讨了三个主要阶段：*索引*、*检索*和*生成*，并解释了这些阶段如何协同工作以向用户查询提供增强的响应。
- en: In addition to the core stages, this chapter highlighted the importance of the
    UI and evaluation components. The UI serves as the primary point of interaction
    between the user and the RAG system, allowing users to input their queries and
    view the generated responses. Evaluation is crucial for assessing and improving
    the RAG system’s performance. This involves analyzing the system’s outputs using
    various metrics and collecting user feedback. Continuous evaluation helps identify
    areas for improvement and guides adjustments in the system’s design, data handling,
    and LLM integration.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 除了核心阶段之外，本章还强调了UI和评估组件的重要性。UI是用户与RAG系统交互的主要点，使用户能够输入他们的查询并查看生成的响应。评估对于评估和改进RAG系统的性能至关重要。这涉及到使用各种指标分析系统的输出，并收集用户反馈。持续的评估有助于确定改进领域并指导系统设计、数据处理和LLM集成的调整。
- en: While the components that were discussed in this chapter are not exhaustive,
    they form the foundation of most successful RAG systems.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本章讨论的组件并不全面，但它们构成了大多数成功RAG系统的基础。
- en: 'However, there is a very important aspect of every RAG system that we didn’t
    cover in this chapter: security. We will dedicate the entire next chapter to covering
    key aspects of security, particularly as it relates to RAG.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，每个RAG系统都有一个非常重要的方面，我们在这章中没有涉及：安全性。我们将用下一章的整个章节来涵盖安全性的关键方面，特别是与RAG相关的内容。
- en: Reference
  id: totrans-158
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 参考资料
- en: '**LangChain Hub** (part of LangSmith): [https://smith.langchain.com/hub](https://smith.langchain.com/hub).'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '**LangChain Hub**（LangSmith的一部分）: [https://smith.langchain.com/hub](https://smith.langchain.com/hub).'
