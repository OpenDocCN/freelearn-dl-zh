  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 问题
- en: What analogy does the chapter use to describe designing AI systems?
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 本章使用了什么类比来描述设计人工智能系统？
- en: Name three main challenges in AI system design discussed in the chapter.
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列出本章讨论的 AI 系统设计中的三个主要挑战。
- en: What was the primary goal of APEX Manufacturing and Distribution in implementing
    an AI system?
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: APEX 制造和分销在实施人工智能系统时的主要目标是什么？
- en: In the step-by-step implementation process, why is defining clear objectives
    the first crucial step?
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在逐步实施过程中，为什么定义明确的目标是第一个关键步骤？
- en: How does the chapter suggest addressing potential biases in AI systems?
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 本章建议如何解决人工智能系统中可能存在的偏见？
- en: What role does human-centered AI design play in the development process?
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以人为本的人工智能设计在开发过程中扮演什么角色？
- en: In the APEX case study, what were two significant areas of improvement achieved
    after implementing the AI system?
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 APEX 案例研究中，实施人工智能系统后实现了哪两个显著的改进领域？
