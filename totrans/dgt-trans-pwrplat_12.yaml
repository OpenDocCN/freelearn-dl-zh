- en: '12'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Navigating Compliance: Meeting Industry Regulations in Power Platform Deployments'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Ensuring compliance with industry regulations is paramount for organizations
    of all sizes. As data breaches and privacy concerns become increasingly prevalent,
    adhering to regulatory requirements not only protects sensitive information but
    also helps maintain customer trust and avoid hefty fines. **Power Platform**,
    with its robust capabilities for developing and automating business solutions,
    is a powerful tool for organizations striving to meet these compliance demands.
    However, leveraging this platform effectively requires a deep understanding of
    the regulatory landscape and the specific compliance measures that need to be
    implemented.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will show you how to make sure your Power Platform solutions
    follow the key industry regulations. We will start by explaining why compliance
    is important and what can happen if you don’t follow it. We will then look at
    specific regulations, such as the **General Data Protection Regulation** (**GDPR**),
    **Health Insurance Portability and Accountability Act** (**HIPAA**), and **California
    Consumer Privacy Act** (**CCPA**), and tell you what they mean for your organization.
    Here are the topics we will explore further:'
  prefs: []
  type: TYPE_NORMAL
- en: Security compliance and regulations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Establishing geographical locations and environments in Power Platform deployments
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Microsoft Trust Center – your resource for compliance and transparency
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Securing data transmission and API access in Power Platform deployments
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Security compliance and regulations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will explore the intricate relationship between global information
    security regulations and Power Platform. We provide a comprehensive overview of
    key regulatory frameworks, such as GDPR, HIPAA, and CCPA, and examine how these
    frameworks impact the development and deployment of solutions on Power Platform.
    By detailing specific compliance requirements and best practices, we demonstrate
    how to align your Power Platform initiatives with these regulations, ensuring
    that your organization’s data-handling processes are secure and legally compliant.
    Understanding this context is critical as businesses navigate an increasingly
    complex regulatory environment, where the ability to adapt and adhere to stringent
    security standards is essential for safeguarding sensitive information and maintaining
    operational integrity. Additionally, we will examine IT compliance and regulations
    across major global geographical regions and discuss Microsoft’s strategy for
    providing support and guidelines to address them.
  prefs: []
  type: TYPE_NORMAL
- en: Europe
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In Europe, regulations such as GDPR impose strict requirements on data handling
    and protection, influencing how businesses develop and manage applications on
    Power Platform. Compliance with GDPR is crucial, particularly regarding user consent,
    data minimization, and cross-border data transfers:'
  prefs: []
  type: TYPE_NORMAL
- en: '**GDPR**: GDPR sets a high standard for data protection across the **European
    Union** (**EU**). Power Platform users in Europe must ensure that personal data
    is processed lawfully, transparently, and for a specific purpose. Solutions must
    include features for data anonymization, encryption, and secure data transfers
    to comply with GDPR.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ePrivacy Directive**: Also known as the “Cookie Law,” the ePrivacy Directive
    complements GDPR by focusing on electronic communications. Power Platform solutions
    that utilize cookies or similar technologies must obtain user consent and ensure
    the confidentiality of communications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: North America
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In North America, several key information security regulations govern how organizations
    must handle and protect data. These regulations impact the development and use
    of business applications within Power Platform, necessitating specific compliance
    measures to ensure data security and privacy:'
  prefs: []
  type: TYPE_NORMAL
- en: '**GDPR**: Though an EU regulation, GDPR affects many North American companies
    that handle the data of EU citizens. GDPR mandates strict data protection measures,
    including data minimization, consent for data processing, and the right to be
    forgotten. Power Platform solutions must incorporate these principles, ensuring
    data encryption, secure data storage, and robust access controls.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**HIPAA**: HIPAA is critical for organizations handling **protected health
    information** (**PHI**) in the **United States** (**US**). Power Platform solutions
    used in healthcare must ensure compliance with HIPAA’s requirements for data confidentiality,
    integrity, and availability. This includes implementing encryption, access controls,
    and audit logging to track data access and modifications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CCPA**: The CCPA enhances privacy rights and consumer protection for residents
    of California. Organizations using Power Platform must provide transparency regarding
    data collection practices, allow consumers to opt out of data selling, and ensure
    the secure handling of personal information. Compliance with CCPA in Power Platform
    solutions involves rigorous data protection policies and user rights management.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sarbanes-Oxley Act (SOX)**: SOX impacts publicly traded companies in the
    US, requiring stringent controls over financial data to prevent fraud. Power Platform
    solutions that manage financial data must include audit trails, data integrity
    checks, and access controls to comply with SOX requirements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Asia-Pacific
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the Asia-Pacific region, countries such as Australia and Singapore have
    implemented their own data protection laws, such as the Australian Privacy Act
    and Singapore’s **Personal Data Protection Act** (**PDPA**). These regulations
    require organizations to implement robust security measures when using platforms
    such as Power Platform to ensure that personal data is handled securely and in
    compliance with local laws:'
  prefs: []
  type: TYPE_NORMAL
- en: '**PDPA – Singapore**: The PDPA governs the collection, use, and disclosure
    of personal data in Singapore. Power Platform solutions must adhere to PDPA by
    implementing data protection policies, ensuring data accuracy, and securing consent
    for data processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privacy Act 1988 – Australia**: This act regulates the handling of personal
    information in Australia. Power Platform users must comply by safeguarding data,
    providing access to personal information upon request, and implementing policies
    for data correction and breach notifications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**China’s Cybersecurity Law**: This law imposes strict data localization requirements
    and security measures for personal information and important data. Power Platform
    solutions in China must ensure data is stored locally and implement robust cybersecurity
    measures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Middle East
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'UAE, Saudi Arabia, and other countries in the Middle East have introduced data
    protection regulations, such as the UAE Data Protection Law and Saudi Arabia’s
    **Personal Data Protection Law** (**PDPL**). These regulations mandate specific
    security practices and compliance measures to protect data privacy, impacting
    the way business applications are developed and used on Power Platform in the
    region:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Protection Law Dubai International Financial Centre (DIFC)– UAE**: This
    law governs data protection within the DIFC. Power Platform solutions used in
    DIFC must ensure data processing transparency, obtain user consent, and implement
    data security measures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PDPL – Saudi Arabia**: Effective from 2022, this law regulates the processing
    of personal data in Saudi Arabia. Power Platform users must comply by securing
    personal data, ensuring data accuracy, and providing individuals with access to
    their data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Across these regions, adherence to local regulations is critical to ensuring
    that the use of Power Platform aligns with global standards for data security
    and privacy.
  prefs: []
  type: TYPE_NORMAL
- en: Establishing geographical locations and environments in Power Platform deployments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Organizations must navigate a complex web of data privacy and regulatory requirements.
    Establishing geographical locations and environments in Power Platform deployments
    is crucial to ensure compliance with these regulations across different regions.
    This section explores how to strategically set up geographical environments within
    Power Platform to meet compliance and regulatory standards, focusing on key regions
    around the world.
  prefs: []
  type: TYPE_NORMAL
- en: Importance of geographical locations in compliance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The geographical location of data storage and processing can significantly impact
    compliance with local and international regulations. Various regulations, such
    as the GDPR in Europe and the CCPA in California, impose strict requirements on
    how and where data can be stored and processed. By strategically deploying environments
    in specific geographical locations, organizations can better manage data sovereignty,
    privacy, and security.
  prefs: []
  type: TYPE_NORMAL
- en: Power Platform environment strategy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Regional Data Centers**: Microsoft’s Power Platform offers data centers in
    multiple regions worldwide, allowing organizations to choose where their data
    is stored and processed. This capability is essential for complying with data
    residency requirements, such as those imposed by GDPR, which mandates that the
    personal data of EU citizens must be processed within the EU unless certain conditions
    are met.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-Region Deployment**: Organizations can deploy environments in multiple
    regions to ensure compliance with local laws and regulations. This approach helps
    in addressing data residency requirements and provides redundancy and disaster
    recovery capabilities. For example, a multinational corporation may set up environments
    in Europe, North America, and Asia to serve its global operations while ensuring
    data compliance in each region.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Environment Types**: Power Platform allows the creation of various environment
    types, such as production, sandbox, and trial. Each environment type can be deployed
    in specific regions to segregate data and applications based on compliance needs.
    Production environments can be in regions with stringent data protection laws,
    while sandbox environments used for development and testing can be placed in regions
    with more flexible regulations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing compliance in Power Platform
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To ensure compliance with various regional regulations, organizations should
    consider the following best practices:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Residency and Sovereignty**: Select appropriate geographical locations
    for deploying Power Platform environments to comply with data residency requirements.
    Use Microsoft’s regional data centers to ensure data remains within specified
    regions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Protection and Privacy**: Implement comprehensive data protection measures,
    including encryption, access controls, and **data loss prevention** (**DLP**)
    policies. Ensure Power Platform solutions are configured to support user consent
    management and data subject rights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regular Audits and Assessments**: Conduct regular compliance audits and assessments
    to ensure that Power Platform environments adhere to relevant regulations. Use
    Microsoft’s compliance tools and resources to monitor and report on compliance
    status.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Documentation and Transparency**: Maintain thorough documentation of data
    protection policies, procedures, and compliance measures. Ensure transparency
    with stakeholders regarding data processing practices and compliance efforts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Microsoft Government Cloud and Power Platform – ensuring global infosec compliance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Microsoft Government Cloud offers a robust and secure cloud environment designed
    to meet the stringent compliance and security requirements of government agencies
    around the world. Integrating Power Platform with Microsoft Government Cloud provides
    organizations with powerful tools for building applications, automating workflows,
    and gaining insights from data, all while ensuring adherence to various infosec
    compliance policies. This section explores the capabilities of Microsoft Government
    Cloud, its relationship with Power Platform, and how it addresses compliance needs
    across different regions.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft Government Cloud overview
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Microsoft Government Cloud is tailored to meet the specific regulatory and
    security requirements of government entities. It includes Azure Government, Microsoft
    365 Government, and Dynamics 365 Government, each offering a comprehensive suite
    of services designed to support the unique needs of public sector organizations.
    Key features of Microsoft Government Cloud include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Enhanced Security and Compliance**: Built-in security controls and compliance
    certifications to meet government standards'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Residency and Sovereignty**: Ensuring data is stored and processed within
    specific geographic boundaries to comply with local regulations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Isolation and Dedicated Infrastructure**: Physical and logical isolation
    from commercial cloud instances to provide higher levels of security and compliance'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power Platform on Microsoft Government Cloud
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Power Platform, consisting of Power BI, Power Apps, Power Automate, Power Pages,
    and Copilot Studio, can be deployed on Microsoft Government Cloud to leverage
    its secure and compliant environment. This integration offers several benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Compliance with Government Regulations**: By deploying Power Platform solutions
    on Microsoft Government Cloud, organizations can ensure that their applications
    and workflows meet the stringent regulatory requirements imposed by government
    bodies. This is particularly crucial for handling sensitive government data and
    personal information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enhanced Security Measures**: Power Platform on Microsoft Government Cloud
    inherits the robust security features of the cloud environment, including advanced
    threat protection, data encryption, and identity management. These measures help
    safeguard data and maintain the integrity and confidentiality of government information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Seamless Integration with Government Services**: Power Platform’s ability
    to integrate with other Microsoft Government Cloud services, such as Azure Government
    and Dynamics 365 Government, enables seamless data sharing and collaboration across
    different government systems, enhancing operational efficiency and decision-making.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compliance coverage across regions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Microsoft Government Cloud is designed to meet the compliance needs of various
    regions around the world. The following sections include some examples of how
    it aligns with specific infosec compliance policies in different countries.
  prefs: []
  type: TYPE_NORMAL
- en: US (FedRAMP, CJIS, and DoD SRG)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Federal Risk and Authorization Management Program (FedRAMP)**: Microsoft
    Government Cloud complies with FedRAMP, which sets rigorous security standards
    for cloud services used by federal agencies. This includes maintaining high levels
    of data protection and continuous monitoring.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Criminal Justice Information Services (CJIS)**: For law enforcement agencies,
    compliance with the CJIS Security Policy is critical. Microsoft Government Cloud
    meets CJIS requirements, ensuring secure handling of criminal justice information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Department of Defense (DoD) Security Requirements Guide (SRG)**: The DoD
    SRG mandates strict security controls for handling DoD data. Microsoft Government
    Cloud achieves the necessary compliance levels to support DoD missions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: United Kingdom (G-Cloud)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**G-Cloud**: The UK government’s G-Cloud framework provides a compliant cloud
    services marketplace for public sector organizations. Microsoft Government Cloud
    is part of this framework, ensuring it meets the UK government’s security and
    compliance standards, such as GDPR and other local data protection laws.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: United Arab Emirates (UAE)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**UAE Dubai Electronic Security Center (DESC)**: DESC sets forth security requirements
    for government entities in Dubai. Microsoft Government Cloud complies with DESC
    regulations, providing a secure and compliant environment for processing and storing
    data in the UAE.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: EU (GDPR)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**GDPR**: GDPR imposes strict data protection requirements on organizations
    handling EU citizens’ data. Microsoft Government Cloud ensures compliance with
    GDPR by providing data residency options within the EU, robust data protection
    measures, and support for data subject rights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Australia (IRAP)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Information Security Registered Assessors Program (IRAP)**: IRAP sets security
    standards for Australian government agencies. Microsoft Government Cloud meets
    IRAP requirements, offering a secure environment for storing and processing government
    data in Australia.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing Power Platform on Microsoft Government Cloud
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To leverage the benefits of Power Platform on Microsoft Government Cloud, organizations
    should consider the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Assess Compliance Requirements**: Understand the specific compliance requirements
    for your region and industry. This includes local data protection laws, security
    standards, and government regulations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Choose the Right Environment**: Select the appropriate Microsoft Government
    Cloud environment (e.g., Azure Government, Microsoft 365 Government) that aligns
    with your compliance needs. Ensure the environment provides the necessary certifications
    and compliance assurances.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Configure Security Controls**: Implement security controls and configurations
    in Power Platform to enhance data protection. This includes setting up encryption,
    access controls, and compliance policies tailored to your organization’s requirements.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Regular Compliance Audits**: Conduct regular audits and assessments to ensure
    ongoing compliance with relevant regulations. Use Microsoft’s compliance tools
    and resources to monitor and report on compliance status.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Training and Awareness**: Educate employees and stakeholders on compliance
    requirements and best practices for using Power Platform in a secure and compliant
    manner. This includes training on data handling, security protocols, and regulatory
    obligations.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Overview of Microsoft compliance offerings
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Here is a summary of the compliance offerings for various industries and global
    regions:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Category** | **Compliance Standards** |'
  prefs: []
  type: TYPE_TB
- en: '| Global | CIS Benchmark, CSA-STAR Attestation, CSA-STAR Certification, CSA-STAR
    Self-Assessment, CyberGRX, ISO 20000-1:2011, ISO 22301, ISO 27001, ISO 27017,
    ISO 27018, ISO 27701, ISO 9001, SOC 1, SOC 2, SOC 3, WCAG |'
  prefs: []
  type: TYPE_TB
- en: '| US Government | CJIS, CNSSI 1253, DFARS, DoD IL2, DoD IL5, DoE 10 CFR Part
    810, EAR, FedRAMP, FIPS 140-2, IRS 1075, ITAR, NIST 800-171, NIST CSF, Section
    508 VPATS |'
  prefs: []
  type: TYPE_TB
- en: '| Industry | 23 NYCRR Part 500, AFM + DNB (Netherlands), APRA (Australia),
    AMF and ACPR (France), CDSA, DPP (UK), EBA (EU), FACT (UK), FCA + PRA (UK), FDA
    CFR Title 21 Part 11, FERPA, FFIEC (US), FINMA (Switzerland), FISC (Japan), FSA
    (Denmark), GLBA (US), GSMA, GxP, HDS (France), HIPAA / HITECH, HITRUST, KNF (Poland),
    Know Your Third Party (KY3P), MARS-E (US), MAS + ABS (Singapore), MPA, NBB + FSMA
    (Belgium), NEN-7510 (Netherlands), NERC, OSFI (Canada), PCI-3DS, PCI-DSS, RBI
    + IRDAI (India), SEC 17a-4, SEC 18a-6, FINRA 4511, & CFTC 1.31, SEC Regulation
    SCI (US), Shared Assessments, SOX, TISAX |'
  prefs: []
  type: TYPE_TB
- en: '| Regional | ABS OSPAR (Singapore), BIR 2012 (Netherlands), C5 (Germany), Canadian
    Privacy Laws, CCCS Medium (Canada), CCPA (US-California), Cyber Essentials Plus
    (UK), IRAP (Australia), DJCP (China), EN 301 549 (EU), ENISA IAF (EU), ENS (Spain),
    EU Model Clauses, GB 18030 (China), GDPR (EU), G-Cloud (UK), IDW PS 951 (Germany),
    ISMAP (Japan), ISMS (Korea), IT-Grundschutz workbook (Germany), LOPD (Spain),
    MeitY (India), MTCS (Singapore), My Number (Japan), National Information Assurance
    (Qatar), NZ CC Framework (New Zealand), PASF (UK), PDPA (Argentina), Personal
    Data Localization (Russia), TRUCS (China), VCDPA (US-Virginia) |'
  prefs: []
  type: TYPE_TB
- en: Table 12.1 – Compliance standards per category
  prefs: []
  type: TYPE_NORMAL
- en: This comprehensive compliance coverage makes Power Platform a versatile and
    secure tool for organizations navigating complex regulatory landscapes. For more
    details, refer to [https://learn.microsoft.com/en-us/compliance/regulatory/offering-home](https://learn.microsoft.com/en-us/compliance/regulatory/offering-home).
  prefs: []
  type: TYPE_NORMAL
- en: The Microsoft Trust Center – your resource for compliance and transparency
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **Microsoft Trust Center** serves as a vital resource for organizations
    seeking to ensure compliance and maintain transparency in their use of Power Platform.
    As regulatory requirements evolve and become more stringent, the Trust Center
    provides essential tools and information to help businesses navigate these complexities.
  prefs: []
  type: TYPE_NORMAL
- en: Overview of the Microsoft Trust Center
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Microsoft Trust Center is designed to be a comprehensive hub for information
    on Microsoft’s security, privacy, and compliance practices. It offers detailed
    documentation, compliance guides, and certification information that cover a wide
    array of global standards and regulations. This centralized resource is invaluable
    for organizations aiming to meet industry-specific compliance requirements while
    leveraging Microsoft’s cloud services.
  prefs: []
  type: TYPE_NORMAL
- en: Key features and offerings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Compliance Documentation**: The Trust Center provides extensive documentation
    on how Microsoft products and services comply with various regulatory standards,
    such as GDPR, HIPAA, and ISO/IEC 27001\. This includes detailed white papers,
    audit reports, and FAQs that help organizations understand the measures Microsoft
    has implemented to ensure compliance. The Power Platform admin guide on compliance
    and data privacy further details how the platform supports compliance efforts
    across various jurisdictions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Certifications and Attestations**: Organizations can access up-to-date information
    on Microsoft’s certifications and attestations. This includes independent third-party
    audit reports that verify Microsoft’s adherence to international standards and
    regulatory requirements. These certifications can be used to support your organization’s
    compliance claims and demonstrate due diligence to auditors and stakeholders.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privacy and Data Protection**: The Trust Center outlines Microsoft’s commitment
    to privacy and data protection. It provides insights into how Microsoft handles
    data, including data residency, data transfer mechanisms, and data processing
    agreements. This transparency helps organizations ensure that their data is managed
    in accordance with regulatory expectations. For Power Platform, specific measures
    include data encryption, access control, and compliance with data protection laws,
    such as GDPR and CCPA.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security Practices**: Detailed information on Microsoft’s security practices,
    including threat management, security monitoring, and incident response, is available
    through the Trust Center. Understanding these practices can help organizations
    align their own security measures with Microsoft’s, creating a cohesive and robust
    security posture. Power Platform adheres to Microsoft’s comprehensive security
    framework, ensuring that solutions are built on a secure foundation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Compliance Manager**: The Microsoft Compliance Manager is an essential tool
    provided through the Trust Center. It offers a comprehensive compliance score
    and actionable insights to help organizations manage and improve their compliance
    posture. The tool provides a detailed assessment of your compliance with various
    standards and regulations, offering guidance on how to address gaps and enhance
    your compliance efforts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Microsoft Trust Center is an essential resource for organizations aiming
    to ensure compliance and maintain transparency when using Power Platform. As regulatory
    requirements grow increasingly complex, the Trust Center offers the necessary
    tools and information to help businesses navigate these challenges effectively.
    Understanding how to leverage this resource is key to staying compliant. Next,
    we will explore securing data transmission and API access in Power Platform deployments,
    crucial aspects of maintaining data integrity and security.
  prefs: []
  type: TYPE_NORMAL
- en: Securing data transmission and API access in Power Platform deployments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power Platform enables rapid application development, data analysis, and business
    process automation. However, these capabilities also pose significant risks if
    the data transmission and API access are not properly secured. In today’s digital
    landscape, attackers can exploit vulnerabilities in these areas to compromise
    the integrity and confidentiality of sensitive information within Power Platform
    deployments. Therefore, it is essential for technical authorities in Power Platform
    and information security to follow the best practices and essential strategies
    outlined in this section. This section will help you to implement robust security
    measures to protect your data and applications from unauthorized access and manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: At-rest data protection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One way to protect your data from unauthorized access, even if someone breaches
    your firewalls, penetrates your network, gains physical access to your devices,
    or overrides the permissions on your local machine, is to encrypt it. This makes
    it unreadable to anyone who does not have the proper key. Power Platform uses
    various storage types to store the data. The data is distributed across different
    storage types:'
  prefs: []
  type: TYPE_NORMAL
- en: Azure SQL Database for relational data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Azure Blob Storage for binary data, such as images and documents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Azure Search for search indexing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Microsoft 365 Activity Log and Azure Cosmos DB for audit data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Azure Data Lake for analytics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power Platform databases, also known as Dataverse, utilize SQL **transparent
    data encryption** (**TDE**) compliant with FIPS 140-2 standards to provide real-time
    encryption and decryption for data and log files, ensuring data encryption at
    rest. For data stored in Azure Blob Storage, Azure Storage Encryption is used,
    employing 256-bit AES encryption that is also FIPS 140-2 compliant. By default,
    Microsoft manages the database encryption key for environments using a Microsoft-managed
    key. However, for those seeking greater control over data protection, Power Platform
    offers the option of using a **customer-managed encryption key** (**CMK**). This
    option allows you to manage your encryption key within your Azure key vault, giving
    you the ability to rotate or change the key as needed and revoke Microsoft’s access
    to your data by restricting key access at any time.
  prefs: []
  type: TYPE_NORMAL
- en: In-transit data protection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Platform leverages Azure’s capabilities to protect data in transit, both
    externally and internally. Data in transit refers to data that is moving from
    one location to another, such as from a user device to a data center, or from
    one virtual network to another. Power Platform uses industry-standard transport
    protocols, such as TLS, to encrypt data in transit and prevent unauthorized access
    or interception. It also makes use of industry-standard protocols, such as **Transport
    Layer Security** (**TLS**), to encrypt data in transit. This ensures that any
    data exchanged between clients and servers, or between different services, is
    protected from interception and eavesdropping. Additionally, Power Platform uses
    Microsoft’s own backbone network for internal communication between Microsoft
    services, which reduces the exposure of data to the public internet.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft utilizes a variety of encryption methods, protocols, and algorithms
    to secure data at rest – data that is stored within the infrastructure. Power
    Platform employs industry-leading encryption protocols, such as **AES**, **RSA**,
    and **SHA**, to ensure the confidentiality and integrity of data at rest. Additionally,
    Power Platform follows best practices for key management, which include the generation,
    storage, and use of encryption keys. The platform ensures that encryption keys
    are properly secured, rotated, and audited, with access limited to authorized
    entities only.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 12**.1* shows the levels of security within different storage or transport
    states.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.1 – Data encryption per state](img/B21080_12_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.1 – Data encryption per state
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 12**.1* illustrates the levels of security applied to data across various
    states, including data at rest, data in transit, and data in use. Each state represents
    a critical phase in the data life cycle, requiring tailored security measures
    to protect sensitive information.'
  prefs: []
  type: TYPE_NORMAL
- en: API access through connectors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Platform services and data sources use different authentication methods
    to ensure security. First, let’s investigate how Power Platform services access
    external data sources. The general process is similar for all data sources. Next,
    we’ll dive into how the authentication credentials are determined. They may vary
    depending on the app and the data sources. Power Platform’s main data source is
    called **Dataverse**, which is a cloud-based data platform that provides secure
    and scalable storage for Power Platform and other applications.
  prefs: []
  type: TYPE_NORMAL
- en: Connecting to Microsoft Dataverse
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Apps and Power Automate are two of the main components of Power Platform
    that enable users to create and automate business processes. They can access Dataverse
    data in different ways, depending on the type of app and the connector used.
  prefs: []
  type: TYPE_NORMAL
- en: Power Apps and Dataverse
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Power Apps enables users to build two kinds of applications: canvas apps and
    model-driven apps. Canvas apps offer a drag-and-drop interface, allowing users
    to design from the ground up, while model-driven apps are structured around the
    underlying data model and business logic provided by Dataverse. Both app types
    can connect directly to Dataverse without the need for an additional connector.
    However, canvas apps require storing consent for interaction with other environments
    within the Power Apps **resource provider** (**RP**), a service responsible for
    managing permissions and resources in Power Apps. The following diagram provides
    a visual overview of how canvas apps integrate with Dataverse:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.2 – Power Apps connection to Dataverse (reference: https://learn.microsoft.com/en-us/power-platform/admin/security/overview)](img/B21080_12_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.2 – Power Apps connection to Dataverse (reference: https://learn.microsoft.com/en-us/power-platform/admin/security/overview)'
  prefs: []
  type: TYPE_NORMAL
- en: With an understanding of how canvas and model-driven apps integrate with Dataverse,
    we can now explore how Power Automate interacts with Dataverse to streamline workflows
    and automate business processes.
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate and Dataverse
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Power Automate** is a service that enables users to create workflows and
    automate tasks across different applications and services. Power Automate can
    access Dataverse data using two methods: the API Hub and the legacy connectors.
    The API Hub is a service that provides a unified authentication and discovery
    mechanism for Power Platform and other Microsoft services. Power Automate uses
    the API Hub to authenticate with Dataverse, but after that, it communicates directly
    with Dataverse for data operations. The legacy connectors are older connectors
    that use the **Common Data Service** (**CDS**) endpoint to access Dataverse data.
    They are still supported, but they have some limitations and drawbacks compared
    to the API Hub method.'
  prefs: []
  type: TYPE_NORMAL
- en: Connecting to other data sources
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Platform services leverage connectors to interface with external data
    sources beyond Dataverse. The following diagram depicts a typical architecture
    where an Azure **API Management** (**APIM**) connector is utilized.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 12**.3* illustrates how Power Platform backend services communicate
    with an API Hub / APIM connector to access external data sources.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.3 – Power Platform connector execution](img/B21080_12_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12.3 – Power Platform connector execution
  prefs: []
  type: TYPE_NORMAL
- en: '**Power Platform Service**: This initiates a connection request to the Power
    Apps RP.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Power Apps RP**: This requests the API Hub to establish a connection and
    manage authentication token exchange.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Power Platform Service**: This sends a data query request to the APIM connector.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**APIM Connector**: This requests authorization from the consent service to
    access the data source.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consent Service**: This provides authorization credentials to the APIM connector.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**APIM Connector**: This forwards consent credentials to the Power Apps RP,
    which stores them for future data requests to bypass re-consent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**APIM Connector**: This relays the data query to the external connector.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**External Connector**: This sends the query to the data source.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Source**: This returns the requested data to the external connector.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**External Connector**: This passes the data back to the Power Platform backend
    cluster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The APIM connector sends consent credentials to the Power Apps RP. These credentials
    are stored in the RP, ensuring that Power Apps doesn’t prompt for consent again
    the next time data is accessed.
  prefs: []
  type: TYPE_NORMAL
- en: Authenticating data sources
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Platform connects to various data sources through connectors, which are
    pre-built or custom-made interfaces that facilitate data exchange. To ensure data
    security and compliance, Power Platform and its connectors require different levels
    of authentication.
  prefs: []
  type: TYPE_NORMAL
- en: Power Platform authentication
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first level of authentication is between the user and the Power Platform
    service. The user needs to sign in to the Power Platform service with a valid
    Microsoft account or a Microsoft Entra account. This authentication verifies the
    user’s identity and grants access to the Power Platform tools and features.
  prefs: []
  type: TYPE_NORMAL
- en: Data source authentication
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The second level of authentication is between the user and the data source.
    The user needs to provide the credentials that the connector requires to access
    the data source. These credentials are stored and managed by the API Hub credentials
    service, which is a secure vault that encrypts and protects the credentials. The
    user can manage the credentials through the Power Platform portal or the Power
    Apps app.
  prefs: []
  type: TYPE_NORMAL
- en: Some connectors support more than one authentication method. For example, the
    SharePoint connector supports OAuth 2.0, Windows, and basic authentication methods.
    The authentication method determines how the credentials are obtained and used
    by the connector. The authentication method is specific to each data source instance
    and is based on the choice of the app maker when creating the connection.
  prefs: []
  type: TYPE_NORMAL
- en: Explicit and implicit authentication
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In Power Apps, there are two primary methods for authenticating data sources:
    explicit and implicit authentication. They are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Explicit authentication** involves using the credentials of the app user
    to access the data source. This approach ensures that data access aligns with
    the user’s specific permissions and roles. For instance, if a user has read-only
    permissions for a SharePoint list, the app will restrict them from editing or
    deleting any data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Implicit authentication** uses the credentials provided by the app creator
    during the connection setup. In this case, the data access permissions are based
    on the app creator’s roles. For example, if the app creator has full control over
    a SharePoint list, the app will permit any user to view, edit, or delete data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Whenever possible, it is recommended to use explicit authentication, as it is
    more secure and adheres to the principle of least privilege, ensuring users have
    only the access necessary for their tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Data source permissions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Even in the case of explicit authentication, it’s important to remember that
    it’s the user’s rights on a data source that determines what the user can see
    and edit. The app interface does not override or restrict the data source permissions
    that the user has.
  prefs: []
  type: TYPE_NORMAL
- en: For example, suppose you have a SharePoint list that includes `Name` and `Salary`
    columns. You then build an app that exposes only the `Name` column. This means
    that users have access only to the `Name` column in your app.
  prefs: []
  type: TYPE_NORMAL
- en: However, suppose your users have SharePoint list permissions that allow them
    to view and edit both the `Name` and `Salary` columns. Now, suppose a specific
    user has Power Apps maker rights to that SharePoint list. In this case, nothing
    prevents that user from creating a new app that accesses the `Salary` column.
    The permissions that you grant through the user interface of your app don’t deny
    the data source permissions that the user has.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, you should always ensure that the data source permissions are aligned
    with the business requirements and the app functionality. You should also educate
    your users about the data security and compliance policies and best practices.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we wrap up our discussion on navigating compliance in Power Platform deployments,
    it’s clear that adhering to industry regulations is fundamental to maintaining
    trust, security, and operational integrity. This chapter has provided a comprehensive
    overview of the regulatory landscape and compliance standards across industries
    and regions, emphasizing strategies to ensure Power Platform solutions meet requirements
    for data classification, protection, retention, and governance. It covered authentication
    levels for accessing data sources, highlighting their impact on security and compliance.
    The difference between explicit and implicit authentication in Power Apps was
    explained, with guidance on selecting the right approach. Finally, it outlined
    the role of APIM in monitoring and controlling data access within Power Platform.
    In the next chapter, we will explore how to measure the success of your Power
    Platform initiatives. We will discuss how to define and track **key performance
    indicators** (**KPIs**) that align with your business goals and outcomes. We will
    also introduce you to the tools and resources available in Power Platform to help
    you monitor and improve your app performance, user adoption, and return on investment.
    You will learn how to use Power Platform Starter Kit and the Center of Excellence
    to create dashboards, reports, and alerts that provide actionable insights into
    your Power Platform environment.
  prefs: []
  type: TYPE_NORMAL
