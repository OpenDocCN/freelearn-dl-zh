  type: TYPE_NORMAL
  zh: '11'
- en: Using ChatGPT for Salesforce User Stories
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT为Salesforce用户故事服务
- en: In the ever-evolving world of Salesforce, user stories stand as vital pillars
    that capture and convey the business needs and desires of stakeholders. These
    narratives lay the groundwork for targeted and efficient development, bridging
    the gap between abstract requirements and actionable tasks. This chapter describes
    an innovative approach to crafting, refining, and managing user stories by leveraging
    the power of ChatGPT.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在不断演变的Salesforce世界中，用户故事作为至关重要的支柱，捕捉并传达利益相关者的业务需求和愿望。这些叙述为有针对性的高效开发奠定基础，弥合了抽象需求和可执行任务之间的差距。本章描述了一种利用ChatGPT的力量来构思、完善和管理用户故事的创新方法。
- en: Integrating ChatGPT into the delivery process can help confirm that user stories
    are not only accurately reflective of business needs but are also structured in
    a way that propels efficient development. This technology enhances clarity, fosters
    collaboration, and adds a nuanced understanding of priorities, facilitating an
    alignment between business goals and technological solutions.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT集成到交付流程中可以帮助确认用户故事不仅准确反映了业务需求，而且其结构也促进了高效开发。这项技术增强了清晰度，促进了协作，并增加了对优先级的细微理解，促进了业务目标和技术解决方案之间的对齐。
- en: Throughout this chapter, we will explore the concept of how ChatGPT can be employed
    as a potent tool in the creation and grooming process. From crafting impactful
    narratives to refining and prioritizing them, the insights provided here will
    act as a guide. Together, we’ll uncover the collaborative dynamics and agile adaptability
    that ChatGPT brings to the table, thereby unlocking new horizons in the field
    of Salesforce customization and configuration. It’s more than just an integration
    of technology; it’s a pioneering approach that redefines the way we think about
    and execute Salesforce user-story definition.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何将ChatGPT作为创建和培养过程中的强大工具。从构思有影响力的叙述到完善和优先排序，这里提供的见解将起到指南的作用。我们将一起揭示ChatGPT带来的协作动态和敏捷适应性，从而在Salesforce定制和配置领域开辟新的天地。这不仅仅是技术的集成；这是一种开创性的方法，重新定义了我们思考并执行Salesforce用户故事定义的方式。
- en: Whether you’re a developer, an architect, or a business analyst, the lessons
    and insights captured here will equip you with a robust understanding of how to
    innovate and excel in your projects using ChatGPT.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 不论你是开发者、架构师还是业务分析师，这里记录的教训和洞察将帮助你掌握如何利用ChatGPT在项目中创新和卓越。
- en: Understanding user stories and ChatGPT’s contribution
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解用户故事和ChatGPT的贡献
- en: User stories in the Salesforce ecosystem are essential tools for capturing end-user
    requirements. They are typically crafted through collaboration with stakeholders,
    particularly the product owner, and translate the users’ needs into actionable
    functionalities. The conventional process involves detailed discussions, interpretations,
    and alignments with business goals to create concise and clear user stories. Working
    with the product owner, developers engage in a continuous dialogue to ensure user
    stories are both reflective of the users’ needs and aligned with the product’s
    vision.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce生态系统中的用户故事是捕捉最终用户需求的关键工具。它们通常通过与利益相关者（尤其是产品所有者）的合作来制定，将用户的需求转化为可执行的功能。传统流程涉及详细的讨论、解释和与业务目标的协调，以创建简洁明了的用户故事。与产品所有者合作，开发者参与持续的对话，以确保用户故事既反映了用户的需求，又与产品的愿景保持一致。
- en: Integrating ChatGPT into the process of creating and grooming user stories offers
    practical support for developers and product owners. By inputting specific contextual
    information about the project into ChatGPT, the AI can provide suggestions that
    aid in shaping clear and directly tied user stories. This assistance helps in
    refining the stories and aligning them with business objectives. The technology
    doesn’t replace the human intellect in the process but rather augments it, offering
    insights that can lead to more precise user stories.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT集成到创建和培养用户故事的过程中，为开发者和产品所有者提供了实际支持。通过将关于项目的具体上下文信息输入ChatGPT，人工智能可以提供有助于塑造清晰且直接关联用户故事的建议。这种帮助有助于完善故事并使其与业务目标保持一致。这项技术不会取代人类智慧在过程中的作用，而是增强它，提供可以导致更精确用户故事的见解。
- en: The collaboration between human decision-making and AI-driven insights such
    as ChatGPT brings a complementary dimension to the Salesforce user-story process.
    It assists in making iterative discussions with the product owner more focused,
    potentially reducing the time required to align stories with business values.
    While it doesn’t revolutionize the process, the integration of ChatGPT can provide
    practical support in shaping and refining user stories, making the process more
    streamlined.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 人类决策与AI驱动的见解（如ChatGPT）之间的协作为Salesforce用户故事过程带来了互补维度。它有助于使与产品负责人的迭代讨论更加专注，可能减少将故事与业务价值对齐所需的时间。虽然它并没有彻底改变这个过程，但ChatGPT的集成可以在塑造和细化用户故事方面提供实际支持，使过程更加流畅。
- en: In sum, the combination of the traditional user-story creation process with
    the capabilities of ChatGPT provides an accelerated solution for developers and
    product owners. By adding AI-driven insights to human creativity, the creation
    and grooming of user stories can become a more efficient and targeted task. Let’s
    take an in-depth look at how ChatGPT can contribute to the everyday practice of
    Salesforce professionals, offering a supportive role rather than a transformative
    one.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，将传统的用户故事创建过程与ChatGPT的能力相结合，为开发人员和产品负责人提供了一个加速的解决方案。通过将AI驱动的见解与人类创造力相结合，用户故事的创建和培养可以变得更加高效和有针对性。让我们深入探讨ChatGPT如何为Salesforce专业人士的日常实践做出贡献，提供支持性角色而不是变革性角色。
- en: Refining and prioritizing user stories
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 精炼和优先排序用户故事
- en: The creation of an initial product backlog and user stories by the product owner
    is an essential starting point in Salesforce development. However, these user
    stories typically require further refinement, decomposition, and prioritization
    to become development-ready. This section focuses on practical techniques and
    approaches to shape these initial user stories into actionable tasks. It also
    explores how ChatGPT can provide guidance in this process, offering insights that
    may help in organizing and focusing on the most crucial business needs. This section
    aims to equip Salesforce professionals with the tools needed to transition from
    broad user stories to targeted development actions efficiently.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 产品负责人创建初始产品待办事项和用户故事是Salesforce开发的一个基本起点。然而，这些用户故事通常需要进一步的细化、分解和优先排序，才能成为开发就绪状态。本节重点介绍将初始用户故事塑造成可执行任务的实际技术和方法。它还探讨了ChatGPT如何在这一过程中提供指导，提供可能有助于组织和关注最关键业务需求的见解。本节旨在为Salesforce专业人士提供所需的工具，以便有效地从广泛的用户故事过渡到有针对性的开发行动。
- en: To illustrate this process, we are going to use a user story from the case study
    in [*Appendix A*](B21462_Appendix_A.xhtml#_idTextAnchor205) and utilize ChatGPT
    to assist in refining, expanding, and improving that user story.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这个过程，我们将使用来自[*附录A*](B21462_Appendix_A.xhtml#_idTextAnchor205)案例研究的一个用户故事，并利用ChatGPT来协助细化、扩展和改进该用户故事。
- en: '*Epic 2: Display of Snowflake Information on Salesforce* *Account Pages*'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '*史诗2：在Salesforce* *账户页面上显示雪花信息*'
- en: '**User Story 2.1**: **Create Snowflake Section within Salesforce** **Account
    Pages**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**用户故事2.1**：在**Salesforce账户**页面上**创建雪花部分**'
- en: '**Goal**: As a Sales Rep, I want a dedicated “Snowflake” section within Salesforce
    Account pages so that I can quickly access the Snowflake data related to an account.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为一名销售代表，我希望在Salesforce账户页面上有一个专门的“雪花”部分，这样我就可以快速访问与账户相关的雪花数据。'
- en: '**Acceptance Criteria**:'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验收标准**：'
- en: '**Given** a Sales Rep is viewing a Salesforce Account page,'
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**一个销售代表正在查看Salesforce账户页面，'
- en: '**When** the page is loaded,'
  id: totrans-19
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**页面加载时，'
- en: '**Then** a dedicated “Snowflake” section should be displayed.'
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后**应显示一个专门的“雪花”部分。'
- en: 'Some common questions need to be addressed within the grooming process. Let’s
    utilize ChatGPT to guide us along the next steps:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在培养过程中需要解决一些常见问题。让我们利用ChatGPT来引导我们进行下一步：
- en: '| **Prompt** | I’ve been given the below user story from the product owner.
    Please provide the initial next steps for how I should groom and refine this user
    story so that it meets INVEST criteria.Epic 2: Display of Snowflake Information
    on Salesforce Account PagesUser Story 2.1: Create Snowflake Section within Salesforce
    Account Pages'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '| **提示** | 我已经从产品负责人那里收到了以下用户故事。请提供我应该如何培养和细化这个用户故事，以便它符合INVEST标准。史诗2：在Salesforce账户页面上显示雪花信息用户故事2.1：在Salesforce账户页面上创建雪花部分'
- en: '**Goal**: As a Sales Rep, I want a dedicated “Snowflake” section within Salesforce
    Account pages so that I can quickly access the Snowflake data related to an account.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为一名销售代表，我希望在 Salesforce 账户页面中有一个专门的“雪花”部分，这样我就可以快速访问与账户相关的雪花数据。'
- en: '**Acceptance Criteria**:'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验收标准**：'
- en: '**Given** a Sales Rep is viewing a Salesforce Account page,'
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**一个销售代表正在查看 Salesforce 账户页面，'
- en: '**When** the page is loaded,'
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**页面加载时，'
- en: '**Then** a dedicated “Snowflake” section should be displayed.'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后**应显示一个专门的“雪花”部分。'
- en: '|'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| **Response** | Certainly! Grooming and refining the provided user story to
    meet the INVEST (Independent, Negotiable, Valuable, Estimable, Small, Testable)
    criteria will help to ensure that it’s well understood, easily implemented, and
    delivers value to the users. Here’s a step-by-step approach:1\. Independent: Check
    if the user story can be developed independently of other stories. If there are
    dependencies on other stories or epics, make sure to document them.2\. Negotiable:
    Discuss with the product owner and other stakeholders to confirm that there’s
    flexibility in how the story can be implemented. This may require understanding
    different options for displaying the Snowflake data within Salesforce.3\. Valuable:
    Confirm that the goal and acceptance criteria align with the actual value the
    Sales Reps are expecting from having the “Snowflake” section. If necessary, gather
    more details on what specific Snowflake data they need and why.4\. Estimable:
    Break down the story into smaller tasks, such as designing the UI for the “Snowflake”
    section, integrating Snowflake data, and testing. Evaluate the complexity and
    provide an initial estimation of effort.5\. Small: If the story appears too large
    to be completed in a single iteration, consider splitting it into smaller, more
    manageable user stories. For example, one story could focus on the UI design,
    another on the integration, and so on. |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！对提供的用户故事进行梳理和细化，以满足 INVEST（独立、可协商、有价值、可估计、小、可测试）标准，将有助于确保其被充分理解、易于实施，并为用户提供价值。以下是一步一步的方法：1\.
    独立性：检查用户故事是否可以独立于其他故事开发。如果有其他故事或史诗的依赖关系，请确保记录下来。2\. 可协商性：与产品负责人和其他利益相关者讨论，以确认在实施故事方面有灵活性。这可能需要了解在
    Salesforce 中显示雪花数据的不同选项。3\. 价值性：确认目标和验收标准与销售代表期望从“雪花”部分获得的实际价值一致。如有必要，收集更多关于他们需要哪些具体雪花数据以及为什么的信息。4\.
    可估计性：将故事分解成更小的任务，例如设计“雪花”部分的 UI、集成雪花数据和测试。评估复杂性并提供初步的努力估计。5\. 小型：如果故事太大，无法在一个迭代中完成，考虑将其拆分成更小的、更易于管理的用户故事。例如，一个故事可以专注于
    UI 设计，另一个可以专注于集成，等等。 |'
- en: '|  | 6\. Testable: The acceptance criteria provided are a good start but might
    need more details to create proper test cases. Collaborate with QA to define specific
    tests that verify the “Snowflake” section loads correctly and displays the expected
    data.7\. Collaborate with the Development Team: Engage with your development team
    to discuss the technical feasibility and gather their insights on how best to
    implement the feature. Their input can greatly aid in refining the story.8\. Validate
    with the Product Owner: Review the refined user story with the product owner to
    ensure that it aligns with their expectations and the needs of the Sales Reps.By
    following these steps, you’ll help to align the user story with the INVEST criteria,
    providing a clear and actionable path for development. This refinement process
    emphasizes collaboration, understanding, and alignment with business values, promoting
    a more efficient and successful implementation. |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '|  | 6\. 可测试性：提供的验收标准是一个好的开始，但可能需要更多细节来创建适当的测试用例。与 QA 团队合作，定义特定的测试，以验证“雪花”部分是否正确加载并显示预期的数据。7\.
    与开发团队协作：与开发团队进行交流，讨论技术可行性，并收集他们对如何最好地实现功能的见解。他们的意见可以极大地帮助完善故事。8\. 与产品负责人验证：与产品负责人审查完善后的用户故事，以确保其符合他们的期望和销售代表的需要。通过遵循这些步骤，您将帮助将用户故事与
    INVEST 标准 对齐，为开发提供清晰和可操作的道路。这个完善过程强调协作、理解和与业务价值的对齐，促进更高效和成功的实施。 |'
- en: ChatGPT provided the preceding response, which does not address our need as
    it chose to explain **INVEST** rather than provide the next steps for this specific
    user story.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 提供了前面的响应，但它没有解决我们的需求，因为它选择解释 **INVEST** 而不是提供这个特定用户故事的下一步操作。
- en: 'Let’s stay with ChatGPT and steer it in the right direction:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续使用 ChatGPT 并将其引导到正确的方向：
- en: '| **Prompt** | Thank you. Rather than describing INVEST, please provide typical
    activities and questions I should be asking the product owner in order to groom
    and refine the user story. |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 谢谢。与其描述 INVEST，请提供我应该向产品负责人询问的典型活动和问题，以便培养和细化用户故事。 |'
- en: '| **Response** | Certainly! Grooming and refining the user story requires a
    collaborative effort, and here’s what you might typically do, including the key
    questions to ask the product ownerActivities:Clarify the Objective: Ensure that
    you understand the purpose and benefit of the “Snowflake” section within the Salesforce
    Account pages.Questions: What specific Snowflake data needs to be displayed? Why
    is this data important for the Sales Reps?Understand the Acceptance Criteria:
    Go through the given criteria and ask for any additional requirements or specific
    conditions that need to be met.Questions: What should happen if the Snowflake
    data is not available? Are there any specific layout or formatting preferences?Assess
    Dependencies: Determine if there are any dependencies or constraints that need
    to be considered during development.Questions: Are there any dependencies on other
    epics or user stories? Are there any technical limitations or constraints to be
    aware of? |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| **回复** | 当然！培养和细化用户故事需要协作努力，以下是你可能会做的典型活动，包括向产品负责人提出的关键问题。活动：明确目标：确保你理解 Salesforce
    账户页面中“雪花”部分的目的和好处。问题：需要显示哪些具体的雪花数据？为什么这些数据对销售代表很重要？理解验收标准：审查给定的标准，并询问任何额外的需求或需要满足的具体条件。问题：如果雪花数据不可用，会发生什么？有没有特定的布局或格式偏好？评估依赖关系：确定在开发过程中是否需要考虑任何依赖关系或约束。问题：有没有依赖于其他史诗或用户故事的依赖关系？有没有需要了解的技术限制或约束？
    |'
- en: '|  | Estimate the Effort: Discuss with the product owner the complexity of
    the story to ensure that it can be realistically implemented in a single iteration.Questions:
    How critical is this feature, and when is it needed? Do you have any preference
    regarding the implementation approach?Identify Potential Risks or Challenges:
    Identify any potential roadblocks or risks that might affect the implementation
    and discuss them with the product ownerQuestions: Are there any known issues or
    challenges that might affect the implementation? What are your expectations for
    handling these challenges?Review Mockups or Designs: If applicable, present mockups
    or preliminary designs for the “Snowflake” section and gather feedback.Questions:
    Does this design meet your expectations? Are there any specific branding or visual
    guidelines that need to be followed?Prioritize the Story: Understand the priority
    of this user story within the larger epic or project.Questions: How does this
    user story rank in priority compared to others? Are there any deadlines associated
    with this feature?Collaborate and Finalize: Iterate on the user story with the
    product owner making necessary adjustments until you both agree that it’s ready
    for development.Questions: Are there any additional details or clarifications
    needed? Are you satisfied with the final version of the user story?By engaging
    in these activities and asking these targeted questions, you’ll ensure that the
    user story is clear, actionable, and aligned with the product owner’s expectations,
    setting the stage for successful development. |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '|  | 评估工作量：与产品负责人讨论故事的复杂性，以确保它可以在单个迭代中实际实现。问题：这个功能有多重要？何时需要它？你有没有关于实现方法的偏好？识别潜在风险或挑战：识别可能影响实施的任何潜在障碍或风险，并与产品负责人讨论。问题：有没有已知的问题或挑战可能会影响实施？你对于处理这些挑战有什么期望？审查原型或设计：如果适用，展示“雪花”部分的原型或初步设计，并收集反馈。问题：这个设计是否符合你的期望？有没有需要遵循的特定品牌或视觉指南？优先级排序故事：理解这个用户故事在更大的史诗或项目中的优先级。问题：这个用户故事在优先级上与其他故事相比如何？这个功能有没有相关的截止日期？协作并最终确定：与产品负责人迭代用户故事，进行必要的调整，直到你们都同意它已准备好开发。问题：有没有需要额外细节或澄清的地方？你对用户故事的最终版本满意吗？通过参与这些活动和提出这些有针对性的问题，你将确保用户故事清晰、可操作，并与产品负责人的期望一致，为成功开发奠定基础。
    |'
- en: 'The preceding response was better than the first response, but it still isn’t
    quite what we need. Let’s try again by clicking the **Regenerate** button in ChatGPT:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 前一个回复比第一个回复要好，但它仍然不是我们需要的。让我们通过点击 ChatGPT 中的 **重新生成** 按钮再试一次：
- en: '| **Prompt** | <Regenerate> - Click the Regenerate button |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | <重新生成> - 点击重新生成按钮 |'
- en: '| **Response** | Certainly! Grooming and refining the user story requires specific
    activities and questions directed at the product owner to ensure clarity, alignment
    with business goals, and readiness for development. Here’s what you might consider:Activities:1\.
    Review the User Story: Start by analyzing the current state of the user story
    with your team to identify any areas that might need further clarification or
    details.2\. Arrange a Meeting with the Product Owner: Schedule a focused session
    with the product owner to discuss the user story in depth.3\. Collaborate with
    the Development Team: Encourage interaction between the product owner and the
    development team to ensure a shared understanding.4\. Document Changes and Clarifications:
    Maintain a record of refinements made to the user story, capturing any additional
    requirements or changes.Questions to Ask the Product Owner:1\. Understanding the
    Need:   - “Can you explain more about why the Sales Reps need the “Snowflake”
    section?”   - “What specific Snowflake data should be displayed, and how will
    it be used by the Sales Reps?”2\. Clarifying the Acceptance Criteria:   - “Are
    there specific visual or functional requirements for the “Snowflake” section?”   -
    “How should the system behave if the Snowflake data is not available?”3\. Exploring
    Dependencies:   - “Are there any dependencies or prerequisites that we need to
    consider before implementing this?”   - “Do we need to align this with any existing
    features or upcoming changes?”4\. Evaluating Priority and Timeline:   - “How critical
    is this feature, and when do you expect it to be delivered?”   - “Are there any
    business events or dates that we should be aware of that might affect the priority
    or timeline?” |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！对用户故事进行梳理和细化需要针对产品所有者进行特定的活动和提问，以确保清晰度、与业务目标的契合度以及开发准备就绪。以下是你可能需要考虑的事项：活动：1.
    审查用户故事：首先与你的团队一起分析用户故事的当前状态，以确定可能需要进一步澄清或详细说明的任何区域。2. 安排与产品所有者的会议：安排一个专注于讨论用户故事的会议。3.
    与开发团队协作：鼓励产品所有者与开发团队之间的互动，以确保共享理解。4. 记录变更和澄清：维护对用户故事所做的细化的记录，捕捉任何额外的需求或变更。向产品所有者提问：1.
    理解需求：   - “你能解释一下为什么销售代表需要“雪花”部分吗？”   - “应该显示哪些具体的雪花数据，以及销售代表将如何使用这些数据？”2. 澄清验收标准：   -
    ““雪花”部分是否有特定的视觉或功能要求？”   - “如果雪花数据不可用，系统应该如何表现？”3. 探索依赖关系：   - “在实施此功能之前，我们需要考虑哪些依赖关系或先决条件？”   -
    “我们需要将其与任何现有功能或即将到来的变更保持一致吗？”4. 评估优先级和时间表：   - “这个功能有多重要，你期望何时交付？”   - “有哪些业务事件或日期我们应了解，可能会影响优先级或时间表？”|'
- en: '|  | 5\. Gathering Input on Potential Challenges:   - “Are there any known
    challenges or constraints that might impact the design or implementation of this
    feature?”6\. Confirming the Details:   - “Have we captured all the necessary details,
    and does the refined user story align with your expectations?”By engaging in these
    activities and asking these targeted questions, you’ll be working closely with
    the product owner to refine the user story. This collaborative approach ensures
    that the final user story is clear, aligned with business goals, and ready to
    be taken into development. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '|  | 5. 收集关于潜在挑战的反馈：   - “有哪些已知的挑战或限制可能会影响此功能的设计或实施？”6. 确认细节：   - “我们已经捕捉到所有必要的细节，并且经过细化的用户故事是否符合你的期望？”通过参与这些活动和提出这些有针对性的问题，你将与产品所有者紧密合作，以细化用户故事。这种协作方法确保最终的用户故事清晰、与业务目标一致，并准备好进入开发阶段。|'
- en: The preceding responses have provided some actionable ideas and next steps.
    As we progress on each of the next steps, we can also use ChatGPT to provide insights
    to enhance our discussions with the product owner and other stakeholders.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的回复提供了一些可操作的想法和下一步行动。随着我们对每个下一步行动的推进，我们也可以使用ChatGPT来提供见解，以增强与产品所有者和其他利益相关者的讨论。
- en: 'Let’s return to ChatGPT:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到ChatGPT：
- en: '| **Prompt** | Please provide additional questions for discussion with the
    product owner within items 1, 2, and 3 of the “Questions to Ask the Product Owner”
    section. |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 请在“向产品所有者提问”部分的1、2和3项中提供与产品所有者讨论的额外问题。|'
- en: '| **Response** | Certainly! Here are additional questions you can discuss with
    the product owner for those specific items:1\. Understanding the Need:   - “What
    problem are we solving for the Sales Reps with the integration of the “Snowflake”
    section?”   - “How do you envision the Sales Reps interacting with the Snowflake
    data within the Salesforce Account pages?”   - “Are there specific user behaviors
    or scenarios we should consider while designing this section?” |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！以下是您可以与产品负责人讨论的关于这些特定项目的附加问题：1. 理解需求：   - “我们通过整合“雪花”部分来解决销售代表的哪些问题？”   -
    “您如何看待销售代表在Salesforce账户页面中与雪花数据的交互？”   - “在设计此部分时，我们应该考虑哪些特定的用户行为或场景？” |'
- en: '|  | 2\. Clarifying the Acceptance Criteria:   - “What formatting or presentation
    of the Snowflake data would be most useful for the Sales Reps?”   - “Is there
    a preferred location within the Salesforce Account pages for the “Snowflake” section?”   -
    “How should the system handle different levels of access or permissions for viewing
    the Snowflake data?”   - “Are there any compliance or security considerations
    we need to be aware of regarding the Snowflake data display?”3\. Exploring Dependencies:   -
    “Does this feature rely on any other upcoming or existing integrations with Snowflake
    or other systems?”   - “How does this user story align with or differ from similar
    features or sections within Salesforce?”   - “What external data sources, if any,
    will need to be considered for the Snowflake data integration?”   - “Are there
    any specific technical considerations or limitations we should be aware of while
    implementing this?”These additional questions foster a more detailed and comprehensive
    discussion with the product owner By delving into these aspects, you ensure a
    well-rounded understanding of the requirements and expectations, leading to a
    user story that’s more closely aligned with the actual needs and constraints of
    the project. |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '|  | 2. 明确验收标准：   - “对于销售代表来说，哪种格式或展示方式对雪花数据最有用？”   - “在Salesforce账户页面中，“雪花”部分的最佳位置在哪里？”   -
    “系统应该如何处理查看雪花数据的不同访问级别或权限？”   - “关于雪花数据的显示，我们需要注意哪些合规性或安全性问题？”3. 探索依赖关系：   - “这个功能是否依赖于任何即将推出或现有的与雪花或其他系统的集成？”   -
    “这个用户故事是如何与Salesforce中类似的功能或部分相匹配或不同的？”   - “如果有的话，需要考虑哪些外部数据源以实现雪花数据集成？”   -
    “在实施此功能时，我们应该注意哪些特定的技术考虑或限制？”通过深入探讨这些方面，您确保了对需求和期望有一个全面的理解，从而产生一个更接近项目实际需求和限制的用户故事。
    |'
- en: This response is better. It has given us a starting point for discussion with
    the product owner and other stakeholders within the user-story refinement process.
    As noted in the introduction to this chapter, ChatGPT isn’t automating the entire
    user story refinement process, but it can significantly accelerate the process
    by providing us with valuable insights, inputs, and discussion topics along the
    way.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这个响应更好。它为我们与产品负责人和其他利益相关者在用户故事细化过程中的讨论提供了一个起点。正如本章引言中提到的，ChatGPT并没有自动化整个用户故事细化过程，但它可以通过提供有价值的见解、输入和讨论话题来显著加速这个过程。
- en: Now that we have a list of initial discussion points to utilize within the refinement
    process, let’s move on to the collaborative story-writing process and see where
    ChatGPT can assist.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经有一份初始讨论点的清单，可以在细化过程中使用，让我们继续进行协作故事编写过程，看看ChatGPT可以在哪里提供帮助。
- en: Collaborative story writing
  id: totrans-47
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 协作故事编写
- en: Collaborative story writing is an essential aspect of the Salesforce project
    process. It involves key stakeholders such as the product owner developers, and
    business analysts working together to shape and refine user stories. In this section,
    we’ll examine how tools such as ChatGPT can be utilized in the collaborative story-writing
    process, using the “Snowflake” section within Salesforce Account pages as a case
    in point.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 协作故事编写是Salesforce项目流程的一个基本方面。它涉及产品负责人、开发人员和业务分析师等关键利益相关者共同协作，以塑造和细化用户故事。在本节中，我们将探讨如何利用ChatGPT等工具在协作故事编写过程中发挥作用，以Salesforce账户页面中的“雪花”部分为例。
- en: ChatGPT can provide practical support in facilitating discussions, gathering
    feedback, and aligning understanding among the team members. The integration of
    such tools doesn’t replace human insight but complements the team’s efforts by
    offering structured guidance and suggestions. This approach aims to contribute
    to a more efficient and coherent story-writing process, helping to ensure that
    the final user stories accurately reflect the business needs and user requirements.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以在促进讨论、收集反馈和团队成员之间统一理解方面提供实际支持。这种工具的集成并不取代人类洞察力，而是通过提供结构化的指导和建议来补充团队的努力。这种方法旨在提高故事编写的效率和一致性，确保最终的用户故事准确反映业务需求和用户需求。
- en: 'Here’s how it manifests in three key areas:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何在三个关键领域体现的：
- en: '**Facilitating discussions**: When team members discuss various facets of a
    user story, having a tool such as ChatGPT can help to moderate and guide the conversation.
    It can assist in keeping the discussions focused by suggesting relevant questions,
    highlighting potential dependencies, and offering insight into best practices.
    This guidance can be particularly useful when the team encounters complex issues
    or conflicts, as ChatGPT can provide unbiased perspectives based on industry standards
    and methodologies. It essentially acts as a knowledgeable facilitator, promoting
    productive dialogues.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**促进讨论**：当团队成员讨论用户故事的各个方面时，拥有像ChatGPT这样的工具可以帮助调节和引导对话。它可以通过提出相关问题、突出潜在依赖关系和提供最佳实践见解来帮助保持讨论的焦点。当团队遇到复杂问题或冲突时，这种指导尤其有用，因为ChatGPT可以基于行业标准和方法提供无偏见的观点。它本质上充当一个知识渊博的促进者，促进富有成效的对话。'
- en: '**Gathering feedback**: ChatGPT’s ability to analyze and synthesize information
    allows it to support the feedback collection process. Capturing the insights and
    concerns of different stakeholders can assist in organizing and summarizing the
    feedback, making it more accessible for review and consideration. For example,
    if multiple stakeholders have input on a particular feature or requirement, ChatGPT
    can compile these inputs into a coherent summary, highlighting areas of agreement
    or divergence.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收集反馈**：ChatGPT分析和综合信息的能力使其能够支持反馈收集过程。捕捉不同利益相关者的见解和担忧有助于组织和总结反馈，使其更容易进行审查和考虑。例如，如果有多个利益相关者对特定功能或需求提出意见，ChatGPT可以将这些意见汇总成一个连贯的摘要，突出共识或分歧的领域。'
- en: '**Aligning understanding**: Achieving alignment among team members is vital
    for a successful collaborative writing process. ChatGPT can contribute by providing
    clarification on terms, concepts, and methodologies that might be unfamiliar or
    ambiguous to some stakeholders. Through its capability to offer detailed explanations
    and examples, it helps bridge knowledge gaps and creates a shared understanding
    of the project’s objectives and requirements. This alignment ensures that all
    team members are on the same page, enhancing collaboration and contributing to
    a more cohesive final product.'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**统一理解**：在协作写作过程中，团队成员之间达成一致至关重要。ChatGPT可以通过提供对某些利益相关者可能不熟悉或含糊其辞的术语、概念和方法论的澄清来做出贡献。通过其提供详细解释和例子的能力，它有助于弥合知识差距，并形成对项目目标和要求的共同理解。这种一致性确保所有团队成员都站在同一起跑线上，增强协作，并有助于产生更统一的产品。'
- en: ChatGPT’s role in the collaborative story-writing process isn’t about automation
    but augmentation. It amplifies the team’s capabilities, enriching discussions,
    streamlining feedback, and fostering alignment. This integration of technology
    doesn’t replace human insight and collaboration but supports them, enhancing the
    team’s ability to craft user stories that resonate with the project’s goals and
    user needs.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在协作故事编写过程中的作用不是关于自动化，而是增强。它放大了团队的能力，丰富了讨论，简化了反馈，并促进了统一。这种技术的集成并不取代人类洞察力和协作，而是通过提供结构化的指导和建议来补充团队的努力。这种方法旨在提高故事编写的效率和一致性，确保最终的用户故事准确反映业务需求和用户需求。
- en: Let’s return to our case study example and walk through some examples of how
    to utilize ChatGPT within the collaborative story-writing process.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到我们的案例研究示例，并探讨一些如何在协作故事编写过程中利用ChatGPT的例子。
- en: 'In our previous section, ChatGPT provided some initial questions to discuss
    with the product owner Let’s assume that we have had a discussion with the product
    owner and now have additional input to provide to ChatGPT to further the writing
    process:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前的章节中，ChatGPT提供了一些与产品负责人讨论的初始问题。假设我们已经与产品负责人进行了讨论，并且现在有额外的输入要提供给ChatGPT以进一步推进写作过程：
- en: '| **Prompt** | The product owner and I had a discussion on the questions that
    were suggested related to understanding the need of this user story.Below are
    the answers to each question.Please update User Story 2.1 by incorporating these
    answers and then provide 3-5 additional questions to discuss with the product
    owner to further clarify or confirm the need.1\. Understanding the Need:   - Question:
    “What problem are we solving for the Sales Reps with the integration of the “Snowflake”
    section?”   - Answer: “There is valuable data available within the Snowflake platform
    that is not visible to the Sales Reps today. Specifically, we would like our Sales
    Reps to be able to see Billing data, customer sentiment analysis, industry trends,
    and news related to the customer.”   - Question: “How do you envision the Sales
    Reps interacting with the Snowflake data within the Salesforce Account pages?”   -
    Answer: “The data should be presented in an easily consumable format so that the
    Sales Rep can use it in real-time when interacting with a customer virtually or
    quickly prior to meeting a customer face to face. The Snowflake data is already
    summarized, so it just needs to be displayed nicely to the Sales Rep in Salesforce.”   -
    Question: “Are there specific user behaviors or scenarios we should consider while
    designing this section?”   - Answer: “As mentioned already, we want the Sales
    Rep to be able to easily and quickly view the summarized Snowflake data within
    Salesforce. Also, we want the Sales Rep to be able to submit feedback on the accuracy
    of the data to Snowflake and Slack.” |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 产品负责人和我讨论了与理解这个用户故事需求相关的建议问题。以下是每个问题的答案。请通过结合这些答案更新用户故事2.1，并提供3-5个额外的问题与产品负责人讨论，以进一步明确或确认需求。1.
    理解需求：   - 问题：“通过集成“雪花”部分，我们为销售代表解决了什么问题？”   - 答案：“雪花平台内部有宝贵的可用数据，但销售代表目前看不到。具体来说，我们希望我们的销售代表能够看到账单数据、客户情绪分析、行业趋势和与客户相关的新闻。”   -
    问题：“您如何看待销售代表在Salesforce账户页面上与雪花数据的互动？”   - 答案：“数据应以易于消费的格式呈现，以便销售代表在虚拟互动或面对面会面前快速使用。雪花数据已经汇总，只需在Salesforce中将其以良好的方式展示给销售代表即可。”   -
    问题：“在设计这个部分时，我们应该考虑哪些特定的用户行为或场景？”   - 答案：“如前所述，我们希望销售代表能够轻松快速地在Salesforce中查看汇总的雪花数据。此外，我们希望销售代表能够向雪花和Slack提交关于数据准确性的反馈。”
    |'
- en: '| **Response** | Certainly! Based on the information you provided, the updated
    User Story 2.1 appears as follows:Epic 2: Display of Snowflake Information on
    Salesforce Account PagesUser Story 2.1: Create Snowflake Section within Salesforce
    Account PagesGoal: As a Sales Rep, I want a dedicated “Snowflake” section within
    Salesforce Account pages so that I can quickly access Billing data, customer sentiment
    analysis, industry trends, and news related to the customer. The data must be
    presented in an easily consumable format to facilitate real-time interaction with
    customers, both virtually and in person. |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！根据您提供的信息，更新的用户故事2.1如下：史诗2：在Salesforce账户页面上显示雪花信息用户故事2.1：在Salesforce账户页面上创建雪花部分目标：作为销售代表，我希望在Salesforce账户页面上有一个专门的“雪花”部分，这样我就可以快速访问账单数据、客户情绪分析、行业趋势和与客户相关的新闻。数据必须以易于消费的格式呈现，以便与客户进行实时互动，无论是虚拟的还是面对面的。
    |'
- en: '|  | Acceptance Criteria:- Given a Sales Rep is viewing a Salesforce Account
    page,- When the page is loaded,- Then a dedicated “Snowflake” section should be
    displayed, summarizing Billing data, customer sentiment analysis, industry trends,
    and news related to the customer.- And the Sales Rep must have the ability to
    submit feedback on the accuracy of the data to Snowflake and Slack.Here are 3-5
    additional questions to discuss with the product owner to further clarify or confirm
    the need:1\. Feedback Mechanism Specifics: “What specific mechanism should be
    used for the Sales Rep to submit feedback on the accuracy of the data? Do we need
    any specific integrations with Snowflake and Slack, and what will be the flow
    of this feedback process?”2\. Data Security and Compliance: “Are there any security
    or compliance considerations we need to take into account when displaying the
    Snowflake data within Salesforce? What measures should be put in place to ensure
    that sensitive information is handled appropriately?”3\. User Experience Considerations:
    “How should the Snowflake section be visually designed to align with the existing
    Salesforce Account page? Are there any specific guidelines or preferences for
    the layout, color scheme, or interactivity?”4\. Data Refresh and Synchronization:
    “How frequently should the Snowflake data be updated or synchronized within Salesforce?
    Are there specific requirements for real-time data retrieval or periodic refresh?”5\.
    User Roles and Permissions: “Are there different user roles that need specific
    access or restrictions to the Snowflake section? How do we ensure that the right
    people have the correct level of access?”These questions delve into various aspects
    such as functionality, security, design, synchronization, and user access, which
    would help in refining the user story further to meet the exact needs of the stakeholders.
    |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '|  | 接受标准：- 当销售代表正在查看 Salesforce 账户页面时，- 当页面加载时，- 则应显示一个专门的“Snowflake”部分，总结账单数据、客户情感分析、行业趋势以及与客户相关的新闻。-
    并且销售代表必须能够向 Snowflake 和 Slack 提交关于数据准确性的反馈。以下是与产品所有者讨论以进一步明确或确认需求的 3-5 个附加问题：1.
    反馈机制的具体细节：“销售代表应使用什么具体机制来提交关于数据准确性的反馈？我们需要与 Snowflake 和 Slack 进行任何特定的集成，以及这个反馈流程的流程是什么？”2.
    数据安全和合规性：“在 Salesforce 中显示 Snowflake 数据时，我们需要考虑哪些安全或合规性因素？应采取哪些措施来确保敏感信息得到适当处理？”3.
    用户体验考虑：“Snowflake 部分应该如何进行视觉设计，以与现有的 Salesforce 账户页面保持一致？对于布局、配色方案或交互性是否有任何特定的指南或偏好？”4.
    数据刷新和同步：“Snowflake 数据应在 Salesforce 中多久更新或同步一次？是否有对实时数据检索或定期刷新的具体要求？”5. 用户角色和权限：“是否有不同的用户角色需要特定的访问或限制
    Snowflake 部分？我们如何确保正确的人拥有正确的访问级别？”这些问题深入探讨了功能、安全、设计、同步和用户访问等各个方面，有助于进一步细化用户故事，以满足利益相关者的确切需求。|'
- en: As demonstrated here, ChatGPT is enhancing our ability to facilitate the dialogue
    with the product owner In addition to accelerating discussion, ChatGPT has provided
    topics for discussion that we may have overlooked on our own.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如此展示，ChatGPT 正在增强我们与产品所有者进行对话的能力。除了加速讨论外，ChatGPT 还提供了我们可能自己忽略的讨论主题。
- en: 'Let’s now consider hypothetical feedback that we have received from the product
    owner and business stakeholders after their review of the updated *User Story
    2.1*. Rather than trying to address that feedback on our own, let’s utilize ChatGPT
    to augment our process:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们考虑在产品所有者和业务利益相关者审查更新后的 *用户故事 2.1* 后收到的假设反馈。而不是试图自行解决这些反馈，让我们利用 ChatGPT
    来增强我们的流程：
- en: '| **Prompt** | The product owner and business stakeholders reviewed the updated
    User Story 2.1 and had the following feedback.Please synthesize this feedback,
    suggest a consolidated response to their feedback, and provide an updated User
    Story 2.1.Business Stakeholder 1: “Our Sales Reps don’t have time to read a lengthy
    summary. Snowflake already provides this information in brief natural language
    sentences. We want that content visible in Salesforce rather than something new.”Business
    Stakeholder 2: “Our Sales Reps need detailed, actionable data from Snowflake in
    order for this to be valuable. We should provide the Sales Rep with all the detailed
    data from Snowflake and they will know what to do with it.”Product Owner: “We
    need to keep this simple. We have already invested the effort to generate summarized
    data within Snowflake.” |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 产品负责人和业务利益相关者审查了更新的用户故事2.1，并给出了以下反馈。请综合这些反馈，提出一个对反馈的统一回应，并提供更新的用户故事2.1。业务利益相关者1：“我们的销售代表没有时间阅读冗长的摘要。Snowflake已经以简短的自然语言句子提供了这些信息。我们希望这些内容在Salesforce中可见，而不是新的内容。”业务利益相关者2：“我们的销售代表需要从Snowflake获取详细、可操作的数据，这样这项内容才有价值。我们应该向销售代表提供Snowflake的所有详细数据，他们就会知道如何使用这些数据。”产品负责人：“我们需要保持简单。我们已经在Snowflake内部生成总结数据上投入了努力。”
    |'
- en: '| **Response** | Certainly! It seems like there are differing opinions among
    the stakeholders, but the consensus is toward using the existing summarized data
    within Snowflake and keeping the integration simple. Here’s the consolidated response
    to their feedback:1\. Content Presentation: The integration will focus on displaying
    the existing summarized data from Snowflake, as generated. This ensures that the
    Sales Reps receive concise information without the need for additional processing.2\.
    Balance between Summary and Detail: Recognizing the need for both brevity and
    detail, the integration will prioritize displaying the summarized information
    while exploring options for Sales Reps to access detailed data if required.3\.
    Investment Consideration: Acknowledging the effort already invested in summarizing
    data within Snowflake, the integration will leverage this existing work and avoid
    duplication or reprocessing.Based on this consolidated understanding, here’s the
    updated User Story 2.1:Epic 2: Display of Snowflake Information on Salesforce
    Account PagesUser Story 2.1: Create Snowflake Section within Salesforce Account
    PagesGoal: As a Sales Rep, I want a dedicated “Snowflake” section within Salesforce
    Account pages, displaying the existing summarized Snowflake data so that I can
    quickly access information related to an account, including Billing data, customer
    sentiment analysis, industry trends, and news. |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| **回应** | 当然！看起来利益相关者之间意见不一，但共识是使用Snowflake中现有的总结数据，并保持集成简单。以下是针对他们反馈的统一回应：1.
    内容展示：集成将专注于显示Snowflake生成的现有总结数据，这确保了销售代表能够接收到简洁的信息，而无需额外的处理。2. 摘要和详细之间的平衡：认识到简洁和详细的需求，集成将优先显示总结信息，同时探索销售代表在需要时访问详细数据的选项。3.
    投资考虑：承认在Snowflake内部总结数据上已经投入的努力，集成将利用这项现有工作，避免重复或重新处理。基于这种综合理解，以下是更新的用户故事2.1：史诗2：在Salesforce账户页面上显示Snowflake信息用户故事2.1：在Salesforce账户页面上创建Snowflake部分目标：作为销售代表，我希望在Salesforce账户页面上有一个专门的“Snowflake”部分，显示现有的总结Snowflake数据，这样我就可以快速访问与账户相关的信息，包括账单数据、客户情绪分析、行业趋势和新闻。
    |'
- en: '|  | Acceptance Criteria:- Given a Sales Rep is viewing a Salesforce Account
    page,- When the page is loaded,- Then a dedicated “Snowflake” section should be
    displayed, using the existing brief natural language sentences from Snowflake,
    summarizing Billing data, customer sentiment analysis, industry trends, and news
    related to the customer.- And there should be an option for the Sales Rep to access
    more detailed data from Snowflake if needed.- And the Sales Rep must have the
    ability to submit feedback on the accuracy of the data to Snowflake and Slack.This
    updated version retains the original objectives while taking into consideration
    the stakeholders’ emphasis on brevity, leveraging existing investments in summarizing
    data, and balancing the need for summarized and detailed information. |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '|  | 验收标准：- 当销售代表正在查看Salesforce账户页面时，- 当页面加载时，- 则应显示一个专门的“雪花”部分，使用来自Snowflake的现有简短自然语言句子，总结账单数据、客户情绪分析、行业趋势和与客户相关的新闻。-
    并且销售代表应有一个选项，如果需要的话，可以访问Snowflake的更详细数据。- 并且销售代表必须有能力向Snowflake和Slack提交关于数据准确性的反馈。这个更新版本保留了原始目标，同时考虑到利益相关者对简洁性的强调，利用现有投资在总结数据，以及平衡总结和详细信息的需要。|'
- en: We can observe in the preceding example how ChatGPT has assisted us in synthesizing
    feedback from different stakeholders and providing a suggested conclusion or next
    step. While we could have done this manually, ChatGPT can accelerate the iterative
    user-story refinement process and potentially help us reach consensus faster among
    stakeholders.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在前面的例子中观察到ChatGPT是如何帮助我们综合来自不同利益相关者的反馈，并提供一个建议的结论或下一步行动的。虽然我们也可以手动完成这项工作，但ChatGPT可以加速迭代用户故事精炼的过程，并有可能帮助我们更快地在利益相关者之间达成共识。
- en: Staying agile and iterative
  id: totrans-66
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 保持敏捷和迭代
- en: The agile grooming process represents a crucial phase in the life cycle of a
    user story, transforming it from a raw draft penciled into an upcoming sprint
    into a refined narrative that meets the criteria of being “ready” for implementation.
    It begins with the introduction of a user story into the sprint backlog, often
    as a high-level idea or a customer need. During grooming sessions, the cross-functional
    team, including developers, testers, and product owners, collaboratively refines
    and details the story. This entails breaking it down into smaller, actionable
    tasks, defining acceptance criteria, and estimating its complexity. ChatGPT plays
    a pivotal role in this process by offering insights, facilitating discussions,
    and ensuring that the story aligns with best practices.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 敏捷梳理过程是用户故事生命周期中的一个关键阶段，它将一个草稿转变为一个符合“准备就绪”实施标准的精炼叙述。它始于将用户故事引入冲刺待办事项，通常是一个高级想法或客户需求。在梳理会议期间，包括开发者、测试人员和产品所有者在内的跨职能团队共同精炼和细化故事。这包括将其分解为更小的、可执行的任务，定义验收标准，并估计其复杂性。ChatGPT在这个过程中发挥着关键作用，通过提供见解、促进讨论并确保故事符合最佳实践。
- en: As grooming progresses, the user story evolves to a point where it becomes “ready”
    for development. This means that it is well-defined, with clear acceptance criteria
    that leave no room for ambiguity. It includes all the information necessary for
    the development team to understand what needs to be done and how to test it. ChatGPT’s
    assistance in this phase aids in refining the story further, making sure that
    it meets the standard of being “ready” to enter the sprint. This transformation
    ensures that the user story seamlessly integrates into the agile development process,
    contributing to efficient and effective project execution.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 随着梳理工作的进行，用户故事发展到成为一个“准备就绪”进行开发的状态。这意味着它定义清晰，具有明确的验收标准，没有模糊的空间。它包含了开发团队理解需要做什么以及如何测试所需的所有信息。ChatGPT在这一阶段的协助有助于进一步精炼故事，确保它符合“准备就绪”进入冲刺的标准。这种转变确保用户故事能够无缝集成到敏捷开发过程中，从而有助于高效和有效地执行项目。
