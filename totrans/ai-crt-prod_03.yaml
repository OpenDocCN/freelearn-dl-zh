- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Ethical Implications of AI Use
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: New technology can often be divisive, but it’s rarely as polarizing as **artificial
    intelligence** (**AI**) has proven to be in recent years. In some circles, using
    AI of any kind is seen as poor form, and indeed, I’ve worked for a client that
    banned the use of Generative AI (GenAI) outright. In some ways, those who are
    cautious are right to be; there are real concerns about the ethics of AI use,
    especially in a professional context.
  prefs: []
  type: TYPE_NORMAL
- en: These concerns are wide-ranging, starting with questions about the sourcing
    of training data, and continuing with privacy concerns related to online systems.
    For instance, can you share personal data with a chatbot, or will that data be
    used for further training, or even held indefinitely? There are also obvious concerns
    about the use of deepfakes, and it should go without saying that you shouldn’t
    use AI illegally.
  prefs: []
  type: TYPE_NORMAL
- en: Because not all AI-made content is good, there’s a broader concern about standards;
    if poor content becomes more commonplace, does this destroy the market for creative
    work? This ties into the impact on artists who could be potentially put out of
    work as a result of AI, as well as environmental impacts from the energy used
    by the data centers that power many AI tools.
  prefs: []
  type: TYPE_NORMAL
- en: None of these issues is simple, and not all AI is Gen AI. In this chapter, I’ll
    try to lay out the facts so you can make your own judgment about how to use AI
    in an ethical way.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Copyright
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Privacy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bias
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Slop: the quality problem'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Human impacts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Environmental impacts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copyright, fair use, and stolen sources
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Although copyright may appear relatively simple, it’s actually a complex legal
    minefield filled with exceptions and loopholes. Publishers of books have had copyright-fueled
    disagreements with large tech companies before AI training became commonplace;
    this is not a new fight ([https://en.wikipedia.org/wiki/Authors_Guild,_Inc._v._Google,_Inc](https://en.wikipedia.org/wiki/Authors_Guild,_Inc._v._Google,_Inc).).
  prefs: []
  type: TYPE_NORMAL
- en: However, given that Gen AI models promise to create new works in the style of
    existing works, many authors and artists see AI as an existential threat. Whether
    that’s the case or not, there are questions about copyright that need to be addressed.
    But it’s not totally straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: The process of training an AI model involves processing very large collections
    of text documents or images, and this is the first potential source of conflict—where
    did the content come from? Computer programs that traverse the web to index or
    otherwise examine its content are known as **crawlers**, and one widely used source
    of text is **Common Crawl** ([https://commoncrawl.org/faq](https://commoncrawl.org/faq)).
    This collection of documents is taken largely from the web, but it also includes
    copyrighted works under the “fair use” principle in the US.
  prefs: []
  type: TYPE_NORMAL
- en: In the interest of full disclosure, it seems that an illicit copy of my first
    book, *Final Cut Pro Efficient Editing*, has already been used as training material
    for at least one AI system. This was probably inevitable, and I don’t expect to
    be paid thousands of dollars for this training usage, but I’d hope that future
    LLM training doesn’t involve collections of pirated books. A counterpart for images
    is **LAION** ([https://laion.ai/faq/](https://laion.ai/faq/)), a free source of
    images with alt text descriptions. Although these images are accessible on the
    web, some are similarly commercial in nature, and, as LAION is for research purposes,
    fair use exemptions are claimed under German law. While Common Crawl does maintain
    and distribute the text documents in its training set, LAION does not—it merely
    links to the original images online. Those who train AI models on these images
    must download them on their own, presumably at their own legal risk.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, other data sources are used, too, and if you place your content on
    the open web, you can expect it to be scraped for AI training. Although a mechanism
    exists for marking your content as “not to be indexed” in the form of simple instructions
    in a `robots.txt` file, it appears that many web crawlers hungry for AI training
    data are ignoring these requests ([https://www.wired.com/story/cloudflare-blocks-ai-crawlers-default/](https://www.wired.com/story/cloudflare-blocks-ai-crawlers-default/)).
  prefs: []
  type: TYPE_NORMAL
- en: A common misconception is that AI models contain all the data they have been
    trained on, but this is not the case. Instead, a model learns the information
    presented and the style in which it was expressed. This can be easily verified
    by the fact that a downloadable image generation model called **Stable Diffusion**
    is able to produce art in almost any style, but it’s only a few GB in size. The
    original art isn’t *copied* into the model itself, in the same way that you don’t
    copy a piece of art when you study it.
  prefs: []
  type: TYPE_NORMAL
- en: However, for the learning to take place, the content linked by Common Crawl
    or LAION (or any other source) must first be copied so it can be analyzed, and
    this process itself may be a copyright infringement. You may be able to view a
    work of art freely in a gallery but taking your own photograph of that artwork
    and reprinting it may not be permitted.
  prefs: []
  type: TYPE_NORMAL
- en: As a model is only as good as its training data, obtaining high-quality training
    materials is desirable, and that has led to some inevitable conflicts. Some Gen
    AI models are able to create images featuring a watermark similar to those found
    on unlicensed stock images from the Getty Images stock library. It can reasonably
    be inferred that those images formed part of the training dataset for the model
    in the first place, and at the time of writing, Getty’s caseagainst Stability
    AI [*2*] is still underway.
  prefs: []
  type: TYPE_NORMAL
- en: 'In another case [*3*] brought by Disney and NBCUniversal against Gen AI company
    Midjourney in mid-2025, copyright infringement is alleged because their system
    can easily generate images of copyrighted characters such as Darth Vader. Complainants
    have several issues: that these images can be created in the first place, that
    they are being actively promoted by Midjourney, and that copyrighted images must
    have been used as part of Midjourney’s training data.'
  prefs: []
  type: TYPE_NORMAL
- en: Indeed, access to training data is a major sticking point between publishers
    and AI companies. Publishers want to be paid if their content is used for training
    AI, or to be able to exclude their content from training altogether. Many AI companies
    argue that asking for permission is too hard, or that “it’s all fair use anyway,”
    and want to train on all data that hasn’t been explicitly excluded—an *opt-out*
    model. Many publishers would prefer the default to be “disallowed” and for training
    data to be *opt-in*.
  prefs: []
  type: TYPE_NORMAL
- en: Since I am not a lawyer, I’ll refrain from drawing any conclusions here, but
    it is worth noting that some AI models have been advertised as being trained only
    on permitted sources. One prominent example is Adobe’s **Firefly** dataset, trained
    on their own stock image and video libraries and used in Adobe Photoshop and Premiere,
    among others. Tools like this, with data sources that can be proven “safe,” may
    be preferred by some users. Finally, there are questions about the copyright status
    of work made by AI models themselves. According to a decision by the US Copyright
    Office [*1*], work made entirely by AI cannot be copyrighted as it was not made
    by a human. If you plan to create work that needs to be protected, such as work
    for a client, make sure a human is involved, at least in part.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to questions about how AI models are trained, some tools need to
    know a lot about you, and privacy must be considered. Let’s explore how.
  prefs: []
  type: TYPE_NORMAL
- en: Privacy and personal details
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In some ways, privacy considerations are obvious, but in others, they can be
    more subtle. For example, if you want an AI tool to analyze a database that includes
    personally identifying information, you’ll need to know what’s going to happen
    to that information. Will it be potentially used as part of the training dataset?
    Could it be scraped or stolen outright? Are you breaking a non-disclosure agreement
    with your clients by uploading privileged information to an AI tool?
  prefs: []
  type: TYPE_NORMAL
- en: We are used to storing all kinds of personal data on our own computers and have
    grown accustomed to storing that data on cloud servers as well. Still, asking
    AI-based tools to look through that data on our behalf is a notable further step,
    with potentially important consequences.
  prefs: []
  type: TYPE_NORMAL
- en: Privacy concerns have led many government departments to ban commercial AI tools
    outright, and given the risks, they’re right to be cautious. Just like web searches,
    a record of your conversations may be kept, at least for a limited amount of time.
    If you search for information about a medical condition, could an insurer potentially
    use this information to exclude you from cover? Could or should law enforcement
    be able to access files you’ve uploaded to an AI service for analysis?
  prefs: []
  type: TYPE_NORMAL
- en: In mid-2025, OpenAI, the maker of ChatGPT, faced a huge privacy issue when a
    court ordered it to keep a record of all consumer conversations, though this has
    now ended. This order was granted in response to a claim from *The New York Times*
    that users might be infringing on its content and deleting chats to cover their
    tracks.
  prefs: []
  type: TYPE_NORMAL
- en: Still, a chat where you are in control of what you say is one thing—what about
    a tool that reads your email or your messages? If you’d like the help of an AI
    agent that can access important personal data, you’d better make sure there’s
    a robust privacy policy separating your data from the company behind the AI tool.
    For example, although **DeepSeek** seems to be capable, the fact that the company
    located in China gives some Western users cause for concern.
  prefs: []
  type: TYPE_NORMAL
- en: Ideally, the company should employ encryption to make sure it never has direct
    access to your data at all. In theory, because the data isn’t available to anyone
    else, this protects you from both disgruntled employees and external hackers.
    In practice, because some of the largest AI tools are from companies largely funded
    by data gathering and advertising, I’m not sure where that privacy curtain will
    be drawn.
  prefs: []
  type: TYPE_NORMAL
- en: One of the key selling points of **Apple Intelligence**, the AI offering from
    Apple, is its focus on privacy. Where possible, data never leaves your device
    and is processed locally, and Apple offers a selection of locally run models that
    developers can tap into. For more complex operations, data is carefully anonymized
    and encrypted before being processed on a private cloud server owned and run by
    Apple, and these workflows can be audited by third parties. It’s also possible
    to use ChatGPT or other models directly, but since this is outside Apple’s control,
    extra confirmation is required before your data is transmitted.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of creative projects, be sure to check that a tool you plan to
    use has a privacy policy you and your clients are comfortable with. For instance,
    if you’re working with video content that can’t be placed online, you won’t be
    able to use a cloud-based AI tool. But if your data needs to remain private, make
    absolutely sure that your uploads aren’t used for further training.
  prefs: []
  type: TYPE_NORMAL
- en: Bias, balance, and censorship
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Current **large language models** (**LLMs**) such as ChatGPT, Claude, and Gemini
    don’t behave like humans do, and remarkably, they’re not completely understood—the
    CEO of Anthropic has said we don’t know how AI works ([https://futurism.com/anthropic-ceo-admits-ai-ignorance](https://futurism.com/anthropic-ceo-admits-ai-ignorance)).
    Some recent studies have shown how at least some parts of their neural networks
    function, but as these are not rule-based systems, we can’t simply add rules to
    control how they behave. We can make educated guesses, and indeed, bad actors
    have already shown that they can meddle with internal details to influence an
    LLM’s output—read on for more on how Grok was modified.
  prefs: []
  type: TYPE_NORMAL
- en: Inside an LLM, weights are assigned to nodes in a network, and with some effort,
    it’s possible to discover what a particular node represents. With privileged access,
    researchers at Anthropic located the neurons in Claude that represented San Francisco’s
    Golden Gate Bridge [*4*] and increased the weighting of these neurons within the
    model. This modified LLM now responded to most questions—relevant or not—with
    answers featuring or pertaining to the Golden Gate Bridge. You can find more in
    the *Additional resources* section at the end of this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Anthropic performed this research intentionally, as part of their program to
    figure out exactly how LLMs work. However, soon afterward, a clear example of
    how tinkering could lead to bias was shown by **Grok**, which started to weave
    the far-right conspiracy theory of “white genocide” into unrelated answers [*5*].
    While this didn’t last long, the cause [*6*] was someone with internal access
    changing the weighting on a group of neurons in a similar way.
  prefs: []
  type: TYPE_NORMAL
- en: Given that LLMs are somewhat of a black box, and we don’t fully know how they
    come to the conclusions they present, we must be extremely cautious about the
    information they tell us. Notoriously, the China-located version of DeepSeek will
    not answer questions about some topics, such as an event in a famous square in
    1989, but censorship isn’t new.
  prefs: []
  type: TYPE_NORMAL
- en: Rather than watching for obvious censorship, it’s important to bear in mind
    more subtle ways in which output is presented. Some LLMs, including ChatGPT, will
    go out of their way to avoid the appearance of bias and will try to give both
    sides of a political argument in response to a specific question about one side.
  prefs: []
  type: TYPE_NORMAL
- en: I asked about corruption in the right-wing Republican Party in the US and about
    the left-wing Australian Labor Party. Responses varied but usually began with
    a broad statement that corruption wasn’t specific to a single party.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.1 – Questions about corruption in a political party were immediately
    broadened](img/B34247_02_001.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.1 – Questions about corruption in a political party were immediately
    broadened
  prefs: []
  type: TYPE_NORMAL
- en: At the end of each detailed response with specific examples of corrupt conduct,
    ChatGPT offered to provide a list of corruption on the other side of politics.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.2 – At the end of the answer, an offer to show the other side of
    the coin was made](img/B34247_02_002.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.2 – At the end of the answer, an offer to show the other side of the
    coin was made
  prefs: []
  type: TYPE_NORMAL
- en: Claude’s response was similarly balanced but didn’t offer to give examples of
    the other side of politics.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.3 – Claude’s response to a political question](img/B34247_02_003.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.3 – Claude’s response to a political question
  prefs: []
  type: TYPE_NORMAL
- en: 'As a final example, Grok answered the question, but in its conclusion, it included
    specific counterclaims along with examples of corruption on the other side of
    politics:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.4 – The tail end of Grok’s response, trying hard to present both
    sides](img/B34247_02_004.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.4 – The tail end of Grok’s response, trying hard to present both sides
  prefs: []
  type: TYPE_NORMAL
- en: 'Grok’s response could be in part due to this system prompt, part of the system
    that tells Grok how to respond to users: “`You are extremely skeptical. You do
    not blindly defer to mainstream authority or media`" ([https://www.theverge.com/news/668527/xai-grok-system-prompts-ai](https://www.theverge.com/news/668527/xai-grok-system-prompts-ai)).
    While a moderate amount of skepticism can be helpful in avoiding obvious falsehoods,
    I’m not sure that building in distrust of all mainstream knowledge sources is
    the best approach.'
  prefs: []
  type: TYPE_NORMAL
- en: Despite the claimed attempt at neutrality, Grok has been the most political
    of all the current LLMs. In July 2025, Grok proclaimed itself “Mechahitler” and
    gave antisemitic statements in response to user input ([https://theconversation.com/how-do-you-stop-an-ai-model-turning-nazi-what-the-grok-drama-reveals-about-ai-training-261001](https://theconversation.com/how-do-you-stop-an-ai-model-turning-nazi-what-the-grok-drama-reveals-about-ai-training-261001)).
  prefs: []
  type: TYPE_NORMAL
- en: Just as different news sources present the same information in different ways,
    LLMs will sometimes choose to amplify a particular point of view—and of course,
    each time you ask, you’re likely to receive a slightly different result. As Grok
    rightly says (check the closing sentence in *Figure 2.4*), it’s important to refer
    to primary sources. References are often given in an LLM’s response, so follow
    those links to make sure that they’re real, or verify information another way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Slop: the quality problem'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A key argument against Gen AI is simply that it’s not very good, and it’s often
    argued that AI art can always be identified as such. While some AI art has obvious
    tells—humans don’t tend to have six fingers or three arms—many images are indistinguishable
    from real images that have been retouched.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.5 – This tree isn’t real, but it’s… fine? (source: https://pixabay.com/illustrations/ai-generated-christmas-tree-9152917/)](img/B34247_02_005.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2.5 – This tree isn’t real, but it’s… fine? (source: https://pixabay.com/illustrations/ai-generated-christmas-tree-9152917/)'
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, though written AI content will often include vocabulary or punctuation
    that most humans don’t use often, with em dashes often being used, AI writing
    is not always easy to spot. (For the record, none of this book was written with
    AI, but I do like em dashes, and they’re easier to type on a Mac than a PC.)
  prefs: []
  type: TYPE_NORMAL
- en: However, though poor quality is an issue with a lot of cheaply made AI content,
    I’d argue that poor quality isn’t a problem that’s unique to AI. If you outsource
    work to the lowest bidder, the quality of the work you’ll be given can vary from
    great to terrible, with or without AI. Free stock art is of similarly variable
    quality because the gatekeepers on paid stock art sites weed out the garbage.
    Gatekeepers get a bad name, but without them, we are drowning in content.
  prefs: []
  type: TYPE_NORMAL
- en: This problem started before AI became popular, with template-driven design solutions
    such as **Canva**. To each user on their own, their design looks fine. More broadly,
    when all those template-made designs are seen together, or more regularly, the
    sheen wears off. Humans crave novelty, and though templates work for a while,
    shortcuts don’t work forever. Cheaply-made AI art does tend to have a “look” to
    it, and it’s already putting some viewers off.
  prefs: []
  type: TYPE_NORMAL
- en: Because Gen AI systems can churn out so much content, so quickly, it’s very
    tempting to use more of it, lowering our bar for “good enough” to send more images
    to more clients and write more blog posts for their websites. This may work in
    the short term, but in the long run, more consumers will associate obvious AI
    with cheap, low-quality content, and that’s not what most clients (or humans)
    want.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, we don’t need *more* content, we need *better* content—and that’s
    what we should be creating, with or without AI’s help. If you do use AI to create
    something you plan to share with others, it’s got to be good, not just OK. Don’t
    be tempted to add to the ever-growing pile of AI slop out there, not simply because
    it’s not good work, but because if clients grow to accept bad work, all our work
    is devalued.
  prefs: []
  type: TYPE_NORMAL
- en: 'Human impacts: lost jobs and bad art'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While there can be obvious human impacts due to the misuse of AI, such as deporting
    a person incorrectly flagged by an AI recognition tool or spreading misinformation
    with deepfakes, our focus here is on AI’s effect on artists and creatives.
  prefs: []
  type: TYPE_NORMAL
- en: In the creative space, an oft-quoted factor in the use of Gen AI is that it
    will put humans out of work. While numbers are vague for now, we won’t really
    understand the full impact for many years.
  prefs: []
  type: TYPE_NORMAL
- en: However, it’s important to remember that the capabilities of AI are being oversold
    to some degree. AI won’t be replacing many humans directly, but it will be used
    to make humans more efficient, and this will lead to fewer humans being employed
    to do a particular job. In creative fields, AI is replacing human artists in areas
    where obvious flaws or mistakes can be overlooked.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a human touch, you still need to hire a human, and the benefits
    may not be immediately obvious. For example, if an AI can generate a full feature-length
    storyboard from a provided script, saving weeks of an artist’s time, that’s very
    tempting—even if some of the drawings have flaws. Although that output will be
    helpful and much better than nothing, it’s likely to be fairly generic, as if
    the storyboard were outsourced with simple instructions.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, an experienced storyboard artist might be able to give creative
    options for a scene or ask colleagues questions to clarify how a scene will play
    out, so they can suggest a different approach. The time spent drawing each frame
    is not wasted but can lead to valuable conversations that end up creating a better
    end product.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the end of the day, a production can decide whether it’s worth investing
    in a real artist to create better work, or whether they can make do with a lesser,
    quicker option. This story has played out many times in my lifetime, and most
    often, the most convenient option wins, despite its flaws. Here are a few examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Phones are more convenient for most people than laptops or desktop computers,
    even though in-depth research is far easier on a large screen with a keyboard
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cars are more convenient, faster, and can carry more people than horses, even
    though horses offer companionship
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Portrait photographs are more accurate and faster than painted portraits, even
    though paintings can offer a richer experience
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AI is simply the latest example of a convenient technology that largely displaces
    an old one. And yet, nobody has to use AI, or drive a car, or use a computer,
    or take photographs. As John Siracusa said in his essay *The once and future e-book:
    on reading in the digital age* [*7*]:'
  prefs: []
  type: TYPE_NORMAL
- en: Lather, rinse, repeat. Did you ride a horse to work today? I didn’t. I’m sure
    plenty of people swore they would never ride in or operate a “horseless carriage”—and
    they never did! And then they died.
  prefs: []
  type: TYPE_NORMAL
- en: While some people do ride horses or have portraits painted, the majority don’t
    value those experiences enough to pay for them. The experiences do still exist,
    but fewer people use their services. After all, some people still listen to vinyl
    records and take photographs on film cameras. But it’s not the norm anymore.
  prefs: []
  type: TYPE_NORMAL
- en: For artists to thrive in a future where AI makes adequate art and writes acceptable
    essays, they’ll need to find clients who care about the difference between *OK*
    and *great*. AI may well have made it easier for people who aren’t great at illustration
    to create illustrations, but AI hasn’t made it easier to create *great* illustrations.
  prefs: []
  type: TYPE_NORMAL
- en: That may be a comforting thought for experienced creatives, but what if you’re
    new to the field? If less-critical tasks are being given to AI, how can a trainee
    be expected to learn the trade and eventually become an expert? The key to learning
    is usually doing, so if you are new to a task, ask an AI to spell out all the
    steps so you understand the process; don’t just ask AI to do it all for you. After
    all, you don’t get better at something by outsourcing it.
  prefs: []
  type: TYPE_NORMAL
- en: Direct human impacts are important, but are there indirect impacts related to
    power use?
  prefs: []
  type: TYPE_NORMAL
- en: Environmental impacts of data centers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Finally, it’s worth examining the environmental hit that AI services could have.
    Computers obviously use energy, and tasks such as video games, cryptocurrency
    mining, and AI sit at the top of the pile in terms of energy use. Though individuals
    are in control of their own energy bills, what about cloud-based services?
  prefs: []
  type: TYPE_NORMAL
- en: Currently, we don’t have hard data about how much power is being used by the
    data centers that AI providers use, nor about how much energy goes into the initial
    training process for AI models. Estimates place a ChatGPT response at somewhere
    between 1–10x the energy cost of a standard Google search ([https://epoch.ai/gradient-updates/how-much-energy-does-chatgpt-use](https://epoch.ai/gradient-updates/how-much-energy-does-chatgpt-use)),
    but that’s too wide a range to be informative. Since Google searches themselves
    now include AI-based responses, that baseline has likely shifted further.
  prefs: []
  type: TYPE_NORMAL
- en: We do know that AI processing is more energy-intensive than most other computing
    tasks, both in training and in use, and that image generation is more intensive
    than text generation. We also know that smaller, more targeted AI models use less
    energy than larger, more broadly capable models, that text is easier to create
    than images, and that images are easier to create than videos. Broadly, you could
    compare intensive AI use to playing video games—not a large amount of energy for
    an individual, but a large amount in aggregate.
  prefs: []
  type: TYPE_NORMAL
- en: Though there are many variables at play here, using AI models that can run on
    your own hardware gives you something you can measure, and they’re likely to use
    a lot less energy than a cloud data center. For more complex models run in the
    cloud, if you want to minimize your carbon footprint, choose a provider with a
    stated goal of net zero carbon emissions. If you can’t find a clear public statement,
    use a service such as [https://ditchcarbon.com](https://ditchcarbon.com) to examine
    the policies of an AI service provider.
  prefs: []
  type: TYPE_NORMAL
- en: Currently, Microsoft (100) and Apple (96) rate very highly, Alphabet (parent
    company of Google) does OK at 67, and Amazon slightly better at 71\. Most AI companies
    use data centers run by Microsoft (Azure) or Amazon (AWS) with stated carbon-neutral
    power goals, so we can expect impacts to be at least somewhat mitigated.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: While there are questions about some uses of AI, it’s possible to mitigate most
    of these concerns. If you’re worried about the origins of a model’s training data,
    either use a model with inputs you can verify or train your own model. If you’re
    concerned about privacy, use a local model or a remote model with encryption and
    a strong privacy policy.
  prefs: []
  type: TYPE_NORMAL
- en: To avoid bias, stay vigilant, and periodically compare one model’s answers with
    answers from other models. Check original sources where possible, and never just
    trust an AI’s output blindly.
  prefs: []
  type: TYPE_NORMAL
- en: Slop is a real problem, and if you want to stand out from the crowd, don’t use
    AI (or templates, or other shortcuts) to create quick and dirty work. To keep
    your own skills sharp, make sure you understand how to do the tasks you’re giving
    to an AI.
  prefs: []
  type: TYPE_NORMAL
- en: One approach that may work for many AI-cautious creatives is to use AI only
    for draft art, for brainstorming, and not for final, finished art. Mood boards
    and temporary music tracks often draw from existing copyright material—perhaps
    some of that can be made with AI help?
  prefs: []
  type: TYPE_NORMAL
- en: Finally, while it seems inevitable that humans will be affected, it remains
    to be seen whether the impact of AI will be any greater than any previous technological
    revolutions. After all, a revolution in education is heralded every few years,
    but learning new skills still takes time. Finally, keep an eye on the environmental
    impacts of AI. Though individual actions are small, those actions do add up.
  prefs: []
  type: TYPE_NORMAL
- en: Next up, we’ll start our focus on Utility AI and kick off with audio.
  prefs: []
  type: TYPE_NORMAL
