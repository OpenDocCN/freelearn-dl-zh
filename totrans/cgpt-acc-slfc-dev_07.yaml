- en: '[PRE161]'
  prefs: []
  type: TYPE_PRE
- en: In this version, all string values and property names are enclosed in double
    quotes, making it a well-formed JSON object. |
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s easy for ChatGPT to come up with a good example and explain the root cause
    of the problem. But why don’t we take it a couple of steps further? One common
    issue when dealing with callouts is getting the following error:'
  prefs: []
  type: TYPE_NORMAL
- en: '`Error - ''You have uncommitted` `work pending''`'
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT can help identify the issue and suggest a solution:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Why am I getting this error: `Error - ''You have uncommitted`
    `work pending`? |'
  prefs: []
  type: TYPE_TB
- en: '| **Response** | The error “You have uncommitted work pending” often occurs
    in Salesforce when you are trying to perform a callout after making a **Data Manipulation
    Language** (**DML**) operation in the same transaction. Salesforce does not allow
    you to do any DML operations before a callout in the same transaction to ensure
    data consistency.Here are some typical scenarios where this can happen:'
  prefs: []
  type: TYPE_NORMAL
- en: You perform a DML operation (insert, update, delete, and so on) and then immediately
    attempt to make an HTTP callout.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You start a database transaction, perform some operation, and then try to make
    a callout before committing the transaction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To fix this issue, you have several options:'
  prefs: []
  type: TYPE_NORMAL
- en: '`@future` method to move the callout to a separate transaction, allowing the
    DML operation to commit before the callout occurs. Just remember that `@future`
    methods have governor limits:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE162]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '`@future`, Queueable Apex runs in a separate transaction. This allows for more
    flexibility and is the modern replacement for future methods:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE163]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Rearrange your logic**: Sometimes, you can rearrange your code logic to perform
    all DML operations after all the callouts are done.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Perform callouts first**: If possible, perform the callout first and then
    do the DML operations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By ensuring that DML operations and callouts are separated into different transactions,
    you can avoid this error. |
  prefs: []
  type: TYPE_NORMAL
- en: With that, we can summarize what we’ve learned.
  prefs: []
