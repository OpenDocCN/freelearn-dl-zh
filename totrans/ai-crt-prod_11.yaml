- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Generative AI with Video
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Let’s kick off with a dose of reality: Gen AI video is incredibly technically
    impressive, but it can’t replace most human-made video. If you’re currently shooting
    videos for clients, you can expect to keep doing it for some time yet. There’s
    an AI revolution all right, but it’s in other areas, and it’s unlikely to take
    over mainstream video production.'
  prefs: []
  type: TYPE_NORMAL
- en: At first glance, AI output can look amazing, and those who don’t shoot video
    themselves might be suddenly excited that maybe they don’t have to hire anyone
    to make videos for them. For most, this feeling doesn’t last. The sample videos
    shared most widely are some of the few that look OK, but the majority of shots
    are flawed in some way, even those made with the latest models.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fully AI-generated videos have all the problems that photos have (weird anatomy,
    oversmoothing) plus many more of their own: movement, audio, and resolution issues,
    just for starters. Consistency during a shot is hard, talking is hard, natural
    movement is hard, and most telling of all, *nothing usually happens*.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s rare for any action in an AI-made video to have actual consequences, such
    as taking a bite from a hot dog and seeing less of the hot dog afterwards. People
    can stand there and move a little, but they have no motivation, no driving force
    behind them. People can *talk*, but they can’t *do* anything important.
  prefs: []
  type: TYPE_NORMAL
- en: Because everything’s an imitation of another frame or a best guess, there’s
    no underlying common structure as there would be in real life, and this is far
    more of a problem in a video context—where continuity matters—than it is in still
    photography.
  prefs: []
  type: TYPE_NORMAL
- en: 'After all, most videos feature a specific person or a specific place. If you
    film that person or visit that place, continuity is free. Most AI shots are generic:
    a café, not a specific café; a random person, not actually an employee. If your
    goal is to tell stories, capturing some version of reality as people move through
    it and make changes, film it! AI video is not the best solution to this problem.'
  prefs: []
  type: TYPE_NORMAL
- en: That doesn’t mean it’s all bad. If you treat AI as a special effects engine,
    allowing you to mess with reality in specific ways, to augment existing shots,
    it could do a good job. It’s also possible to create one-off shots that would
    be impossible to film, and the most recent models are a step up from what’s come
    before.
  prefs: []
  type: TYPE_NORMAL
- en: Some ideas are quite achievable, such as an animated version of a still image
    with minimal movement. It’s possible to create several videos from the same image,
    then edit those pieces together to create a montage, common in some advertising.
    If you keep shot length short and don’t try to do too much, there are ways to
    make AI videos that work nicely within the limits of what’s possible.
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to realize that many generative services aren’t aimed at creatives,
    but at their employers. Indeed, clients tempted to cut creative professionals
    entirely out of the loop may be tempted to use services such as **Creatify** ([https://creatify.ai](https://creatify.ai)).
    This site offers not just individual video creation but *automated* video ad creation
    services, first analyzing your website, then mashing it together with a template
    to create an AI avatar delivering a message. So far, I’ve found that the more
    you ask from AI, the higher the chance that mistakes will be compounded, so I
    haven’t been impressed by all-in-one solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, many of the most obvious fully AI videos are *bad* videos. The
    same clients who were happy with no graphic design or templated graphic design
    are happy with AI-made avatars reading AI-written scripts, speaking to an audience
    that’s quickly learning to associate AI video with scams, cheap ads, and low-quality
    products.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are also potential ethical issues: very few models are guaranteed “commercially
    safe.” Adobe’s **Firefly** ([https://firefly.adobe.com](https://firefly.adobe.com))
    and Moon Valley’s **Marey** ([https://www.moonvalley.com/marey](https://www.moonvalley.com/marey))
    are, but most other models can’t or won’t state that their models were trained
    only on permitted media. A traditional creative ideation process often takes liberties
    with existing work, but in the finished product? It simply might not be an option
    for some projects, and you’ll want to consider ethical implications yourself.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In August 2025, Netflix released a set of guiding principles around GenAI ([https://partnerhelp.netflixstudios.com/hc/en-us/articles/43393929218323-Using-Generative-AI-in-Content-Production](https://partnerhelp.netflixstudios.com/hc/en-us/articles/43393929218323-Using-Generative-AI-in-Content-Production)),
    and while they’re all worth reading, point 4 is brutally plain:'
  prefs: []
  type: TYPE_NORMAL
- en: Generated material is temporary and not part of the final deliverables.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We’re obviously not all making content for Netflix, but that’s a pretty blunt
    statement—GenAI is OK for temp work, but not the end product. That doesn’t mean
    GenAI videos aren’t useful, but don’t be taken in by clickbait from anyone selling
    courses on how to use AI video generation. There’s huge potential here, but AI
    is not a full replacement for videographers.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, AI has the power to give video professionals new tools to make different
    kinds of videos, to augment videos they’re currently making, and to fix common
    issues.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll be looking at these topics, each trickier than the last:'
  prefs: []
  type: TYPE_NORMAL
- en: Extending existing clips
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating videos from text prompts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating videos from reference images
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating videos from reference video and audio
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transforming existing videos
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'That’s right—it’s actually easier to create new videos than it is to modify
    existing ones. Let’s start with a trick that only Premiere Pro can do for now:
    making a clip longer.'
  prefs: []
  type: TYPE_NORMAL
- en: Extending existing videos
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Premiere Pro** allows you to extend a clip past its end, and depending on
    how much video you make, this may be exciting or a complete non-event. If you’re
    a video professional already, you’ll know the ropes: hit the big red record button
    to start rolling early, well before the action starts, and don’t press that button
    again until the action is completely done.'
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, your on-screen talent—which may be you!—should know their job too.
    Whoever’s speaking needs to leave gaps between sentences to allow for editing,
    and at the end, they need to hold their final position and expression for at least
    a couple of seconds. They really shouldn’t look immediately off-screen to ask
    if that was a good take.
  prefs: []
  type: TYPE_NORMAL
- en: But some people will, indeed, make these mistakes. Not every situation is perfect,
    and not everyone knows the rules. It’s not always down to the talent, either.
    Sometimes there’s a technical glitch that ruins an otherwise good take just at
    the end (forcing you to trim the clip short), or you are provided a clip that
    simply isn’t long enough. If you need an extra second or two of vision at the
    end, but the end of the shot is no good, what can you do?
  prefs: []
  type: TYPE_NORMAL
- en: One possible method would be to use a Razor or Blade tool to separate the last
    few frames of the clip, then slow that tiny segment right down. You’ll get the
    best results with Final Cut Pro’s Super Slo-Mo feature, and potentially passable
    results with optical flow found in all modern NLEs. But it’s probably not going
    to be great.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have Premiere Pro, you can use the new **Generative Extend** tool to
    simply trim the end of a clip a short way to the right or trim the start of a
    clip a short way to the left. Most common media formats are supported: 720p, 1080p,
    UHD or DCI 4K resolutions, in landscape or portrait, up to 30fps, in 8-bit SDR.
    Read this page for more details on the current requirements ([https://helpx.adobe.com/premiere-pro/using/generative-extend-faq.html](https://helpx.adobe.com/premiere-pro/using/generative-extend-faq.html)).'
  prefs: []
  type: TYPE_NORMAL
- en: Because this feature is built in, there’s no need to mess around with uploading
    or downloading clips through websites—the clip will just be magically fixed on
    your existing timeline, and the new assets will be stored next to your project,
    in a new folder called `Generative Assets`. If you’d prefer to store files elsewhere,
    change it in **File** > **Project Settings** > **Scratch Disks**.
  prefs: []
  type: TYPE_NORMAL
- en: So far, so good, but there are limitations. The maximum duration of a video
    extension is currently two seconds, and results are (as you may expect) imperfect.
    You may notice issues with brightness shifts, flickering, loss of detail, janky
    movement, or with excessive smoothing on grainy clips. The less you try to do,
    the less likely it is to fail.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll probably have more luck using Generative Extend on audio, where the duration
    limit is 10 seconds instead of two. However, you can’t extend dialogue or music,
    just ambience, and you’ll need a clip that’s already at least three seconds long.
  prefs: []
  type: TYPE_NORMAL
- en: One real issue with this feature is that Generative Video is a premium feature,
    not free, and it could take a significant amount of your generative credits. To
    create a second of 4K 30fps footage, you’ll pay 175 credits, while 720 at 24fps
    costs only 50 credits per second, and audio generation costs 10 credits each time.
    Still, this is a much higher cost than the 1-credit cost of using Generative Fill
    in Photoshop on a single-app plan.
  prefs: []
  type: TYPE_NORMAL
- en: How much can you use this? The standard Creative Cloud Pro account available
    in the US and other countries comes with 4,000 credits, not enough to make extensive
    use of this feature. If you’re working with 4K, you’d get 22 seconds of Generative
    Extend in a month. Remember, as it’s a “premium” feature, it’s not available to
    single-app subscribers, only to those with all apps. Also remember that each generation
    costs credits, so if you aren’t happy with the first result, you may need to pay
    more than once.
  prefs: []
  type: TYPE_NORMAL
- en: While Generative Extend can sometimes get you out of trouble, at other times,
    it might be appropriate to create a shot that doesn’t exist at all. Let’s take
    a look.
  prefs: []
  type: TYPE_NORMAL
- en: Creating videos from text prompts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We’ve already seen the variation possible when generating images from text prompts.
    Given the increased number of variables involved in video, consider your video
    generation prompts carefully.
  prefs: []
  type: TYPE_NORMAL
- en: Some AI providers, including **Canva AI** ([http://canva.com/ai](http://canva.com/ai)),
    include drop-down choices to help you specify important preferences such as style,
    aspect ratio, and focal length.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.1 – Canva AI (using Veo 3) gives you several options to guide your
    video generation](img/B34247_08_1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.1 – Canva AI (using Veo 3) gives you several options to guide your
    video generation
  prefs: []
  type: TYPE_NORMAL
- en: If you have a very specific shot in mind, you may need to provide a detailed
    prompt to make sure you get what you want. Simple prompts could be fine for developing
    ideas or adding to a mood board or storyboard, but the clearer your vision, the
    longer your prompt should be.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.2 – Canva’s example prompts are nice for ideas, but high-level prompts
    like this can produce wildly differing results with each generation](img/B34247_08_2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.2 – Canva’s example prompts are nice for ideas, but high-level prompts
    like this can produce wildly differing results with each generation
  prefs: []
  type: TYPE_NORMAL
- en: 'As well as the technical considerations, be sure to specify whether you want
    to include multiple shots or a single shot; **Sora** ([https://sora.chatgpt.com](https://sora.chatgpt.com),
    using version 1, not version 2) will sometimes produce a video consisting of multiple
    separate shots if you don’t specify a single unbroken shot. Most text-to-video
    models currently don’t include any audio, but it’s becoming more common: Grok,
    Sora version 2 (from OpenAI), and Veo 3 (and higher, from Google) can generate
    background audio and spoken dialogue.'
  prefs: []
  type: TYPE_NORMAL
- en: Note that some models, such as Veo 3 and up, are available through many different
    providers; it’s available in paid Gemini plans and also through Canva, Firefly,
    Creatify, and others. However, some models are only available through specific
    providers, such as Act-Two, found only at Runway. If you like a particular model,
    it may be available through multiple providers, so shop around to find a price
    and interface that fits your needs.
  prefs: []
  type: TYPE_NORMAL
- en: Most providers offer video in a maximum resolution of 720p, though higher-end
    plans at some providers can offer 1080p. Today, most generations are created at
    24fps, so you’ll need to use retiming techniques like those discussed in [*Chapter
    4*](Chapter_4.xhtml#_idTextAnchor062) if you need a higher frame rate. Upscaling
    can help if you need more resolution, but it’s not magic, and AI video today usually
    looks fairly soft compared to video created with a traditional camera.
  prefs: []
  type: TYPE_NORMAL
- en: While high-quality image generation is widely available from several providers,
    video generation is less mature, and older models are more likely to show flaws.
    It’s fairly easy to generate a generic stock-style drone shot with no people,
    but real shots like this are easy to find on stock sites.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.3 – Both of these generic drone shots, from Sora, are usable](img/B34247_08_3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.3 – Both of these generic drone shots, from Sora, are usable
  prefs: []
  type: TYPE_NORMAL
- en: If you want simple, basic shots at relatively low quality, you could have luck
    with simple text prompts. However, as soon as you ask for something more complex—such
    as two humans dancing—problems with physical movement, or even excessive blinking,
    can ruin a shot. Consistency can also be an issue, and the more people there are
    in a shot, the more likely you are to have problems.
  prefs: []
  type: TYPE_NORMAL
- en: I prompted `A smiling modern couple dancing with a crowd around them, in a nightclub
    with strong colored lighting, golden hour` and madness ensued. In the resulting
    videos, sometimes a person’s limbs will vanish. Entire people can randomly appear
    or disappear as other people move in front of them. Sometimes, if you’re really
    unlucky, as someone’s head spins around, another face is revealed on the other
    side. It can be nightmarish.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.4 – How many arms? How are they moving?](img/B34247_08_4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.4 – How many arms? How are they moving?
  prefs: []
  type: TYPE_NORMAL
- en: After testing Veo 3 (via Canva), Sora (v1, via ChatGPT), Vidu ([https://www.vidu.com](https://www.vidu.com)),
    and Firefly, I found Veo 3 most useful, but it’s not consistently good, and other
    options are worth trying too. For me, Firefly produced the least convincing results,
    with blurry faces and inconsistent characters, and while Sora offers more realistic
    imagery, its unnatural body movements can be disturbing, and it doesn’t always
    follow your instructions closely enough. Vidu also suffered from unpredictability,
    sometimes creating characters that disappeared when characters moved in front
    of one another.
  prefs: []
  type: TYPE_NORMAL
- en: Given the difficulty all these models have had synthesizing complex human movement,
    we can infer it’s a hard problem to solve. I’m sure all these models will evolve,
    and of course, there are other models (such as Wan and Seedance) available too,
    but from what I’ve seen online, they all suffer from similar issues with people
    and movement. As any conclusions I might draw today would be out of date soon,
    I won’t give any firm advice on which you should try first. Try several, then
    try another if you can’t get good results.
  prefs: []
  type: TYPE_NORMAL
- en: Today, while Veo can produce results that are mostly believable (and Veo 3.1
    is an improvement over Veo 3.0), it’s not cheap to use. While it seems that a
    limited version of Veo will become free as part of YouTube, that’s not yet available,
    and it seems that free generations will be capped at 480p. When that goes public,
    it should be a good place to experiment for free, because 720p and higher generations
    are expensive.
  prefs: []
  type: TYPE_NORMAL
- en: On a standard Canva AI plan, you can create just five videos per month—barely
    enough to test it properly. Through Firefly, a Veo 3.1 generation costs 400 credits,
    so if you used no other premium AI features with a Creative Cloud Pro plan, the
    4,000 included generative credits would also allow just 10 videos per month. These
    costs do change frequently—they were recently twice as high—so check to see the
    current rates.
  prefs: []
  type: TYPE_NORMAL
- en: 'Given that Veo 3 can include frames like this in its output, I’m not sure it’s
    worth it:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.5 – Veo 3 is better than the others, but it’s not good at complex
    movement](img/B34247_08_5.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.5 – Veo 3 is better than the others, but it’s not good at complex movement
  prefs: []
  type: TYPE_NORMAL
- en: For more extensive experimentation, if you have a ChatGPT Plus account, unlimited
    access to Sora video generations is included, though there can be delays during
    busy times. Some services like Runway include unlimited video generation in “relaxed”
    (i.e., “slow”) mode on their top plans, and a service like one of these will be
    important if you want to explore more fully.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt with precision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is possible to create relatively clean results from text prompts if you have
    simple requests, such as a single person, standing still and smiling, or steam
    rising from a vent, but you still won’t always get what you want or need.
  prefs: []
  type: TYPE_NORMAL
- en: To minimize the number of generations required, limit uncertainty by defining
    your request precisely. For example, if you don’t say how many shots or what type
    of shots you want, you might get a tracking shot, or a static shot, or three shots
    cut together—ask for `a single static shot with no cuts` if that’s what you want.
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t always enough, though, because models won’t always understand what
    you want. Asking for `a person standing still while the camera moves` can lead
    to confusion, and asking for something specific to happen (such as `sharpening
    a knife`) can lead to unexpected results if the model doesn’t know how to do it.
  prefs: []
  type: TYPE_NORMAL
- en: Distinguishing features can be important too. If you don’t ask for a person
    with specific characteristics, you’ll get a generic result. Here, I asked Sora
    for an `adventurer` and received two completely different men. While that could
    be fine in a brainstorming context, if I had a particular type of person in mind,
    I should have asked for it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Yet, even when you do ask, it’s not always enough. I requested a camera following
    an adventurer entering a jungle, but that’s not what I got:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.6 – The first video started well, but the character then walked
    backwards; the second character never moves—neither is what I asked for](img/B34247_08_6.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.6 – The first video started well, but the character then walked backwards;
    the second character never moves—neither is what I asked for
  prefs: []
  type: TYPE_NORMAL
- en: 'Though a model may not always understand everything, it’s important to provide
    detailed requests because anything left to chance will fall back to “defaults,”
    and they may not make sense in the greater context. Here’s a prompt that doesn’t
    fill in enough blanks:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![Figure 8.7 – Six of the eight attempts with this prompt, and only one (left,
    middle row) was accurate](img/B34247_08_7.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.7 – Six of the eight attempts with this prompt, and only one (left,
    middle row) was accurate
  prefs: []
  type: TYPE_NORMAL
- en: 'I generated eight videos using the same prompt with Sora, and every time it
    produced:'
  prefs: []
  type: TYPE_NORMAL
- en: A female model wearing a coat, though I hadn’t specified gender or clothing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Night-time, though I hadn’t asked for a time of day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A wide angle, though this seems a sensible choice given the prompt
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A European-style street with vintage lampposts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The bag style did vary from shot to shot, but only two generations showed it
    swinging slowly, and only four generations actually showed the model leaning against
    the lamppost as requested. In the others, she stood nearby, hung onto it, merged
    into it, or stepped around it oddly. The lamppost placement was also pretty random.
    Of the eight attempts, only one single generation actually showed what I asked
    for; being detailed isn’t always enough.
  prefs: []
  type: TYPE_NORMAL
- en: You may be more successful requesting abstract images, shots without people,
    because those requests don’t fall into the uncanny valley of “human-but-not-human-enough.”
    Still, it’s not just human movement we’re familiar with; it’s all kinds of movement,
    and in general, AI models don’t understand how one thing affects another. If you
    ask for a blue shoe to fall into a pool of green viscous liquid, the shoe will
    only sometimes fall consistently, and only sometimes correctly connect with the
    liquid.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.8 – This blue shoe fell, but it bounced against air and created
    a splash, then fell further](img/B34247_08_8.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.8 – This blue shoe fell, but it bounced against air and created a splash,
    then fell further
  prefs: []
  type: TYPE_NORMAL
- en: 'To counter these issues, you can provide longer prompts, specifying with as
    much detail as possible what you do and do not want. If you’re working with Veo
    3, this will include dialogue and audio cues and could run to several paragraphs
    in length. From the Gemini site ([https://gemini.google/overview/video-generation/](https://gemini.google/overview/video-generation/)),
    here’s an example prompt for Veo 3:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Though the output video was technically impressive, using AI to do everything
    at once doesn’t produce professional-grade results: movement is stiff, dialogue
    expression is not good enough, ambient sound has looping issues, and the overall
    shot only tells a tiny part of a story.'
  prefs: []
  type: TYPE_NORMAL
- en: Worse, because this wasn’t created using a traditional animation or audio production
    pipeline, none of these elements can be tweaked or adjusted in a controllable,
    predictable way. It doesn’t scale to a full production.
  prefs: []
  type: TYPE_NORMAL
- en: As a mockup, it’s fine—but honestly, I’d prefer still images in a storyboard.
    I’d rather imagine what a final shot could be than be distracted by the inevitable
    issues this approach brings.
  prefs: []
  type: TYPE_NORMAL
- en: If complex, controllable shots can’t be achieved—and today, they can’t—telling
    a coherent story of any length is almost impossible with text prompts alone. That
    doesn’t mean this technology is useless in a professional context, though. A montage-style
    advertisement made of short, simple shots is doable. A short film where a crowd
    of strange characters say one line each? Sure. A futuristic dream sequence full
    of special effects? Yep. If your project is able to play to the tools’ strengths,
    you can have success.
  prefs: []
  type: TYPE_NORMAL
- en: 'With that in mind, most real projects need more control: a specific character
    wearing a specific outfit, in a particular place. Consistency between shots is
    also vital: multiple shots often need to show the same characters, dressed in
    the same clothes, in the same environments. You can’t build a real short film
    with “an owl” in “a forest”—details matter.'
  prefs: []
  type: TYPE_NORMAL
- en: We’ve already used models to generate variations of existing images, and this
    approach works with some generative video models too. For greater consistency
    between shots and far greater control over the finished output, I’d recommend
    using reference images. Let’s try it out.
  prefs: []
  type: TYPE_NORMAL
- en: Creating original videos from reference images
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A text prompt leaves a lot to chance, but providing an image alongside a text
    prompt gives an anchor to guide video generation. While multiple generations may
    still be required for a detailed prompt to be accurately followed, the characters,
    clothing, and environment should all match the reference image.
  prefs: []
  type: TYPE_NORMAL
- en: Firefly offers this as part of the **Image to Video** feature, and it can currently
    be used with their own Firefly Video model, or with Veo 2 or Veo 3\. Note that
    with the Firefly model, it’s possible to provide a composition reference video,
    a camera reference video, or a first frame, but only one of these can be used
    at a time alongside a text prompt. It’s also possible to choose a style (such
    as illustration) by clicking on one of several thumbnails provided.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.9 – Providing a composition video to Firefly is useful, but without
    an image alongside, a prompt doesn’t give enough control](img/B34247_08_9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.9 – Providing a composition video to Firefly is useful, but without
    an image alongside, a prompt doesn’t give enough control
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, because the Firefly model can’t accept an image alongside a composition
    video, you’ll spend a video generation’s worth of credits each time you roll the
    dice with a prompt. If you instead switch to the Veo 3 model, only the first frame
    can be provided—no composition reference—and you’ll have to specify styles as
    part of the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: In an ideal world, I’d like to provide both a starting image and a performance
    video to follow, but that’s not yet possible with this tool. Later in this chapter,
    we’ll cover **Runway’s Act-Two**, which can do this, but several services are
    able to accept an image alongside a prompt to describe what happens.
  prefs: []
  type: TYPE_NORMAL
- en: Using one reference image as a starting frame
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Given the speed with which Grok lets you generate images and then transform
    them into videos, I thought it might be worth trying the earlier `model on a deserted
    street` prompt. Discussed in the previous chapter, Grok excels at quantity and
    allows you to simply scroll down to generate more and more images.
  prefs: []
  type: TYPE_NORMAL
- en: 'Most of the images weren’t quite what I wanted: the street wasn’t deserted;
    the pavement and road often didn’t make sense. After scrolling down for some time,
    I found one deserted street, though the system’s creative randomness had now changed
    my original prompt to request an Asian model.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.10 – Some of the first images Grok created, and the first deserted
    street](img/B34247_08_10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.10 – Some of the first images Grok created, and the first deserted
    street
  prefs: []
  type: TYPE_NORMAL
- en: It’s easy to generate a video from an image by pressing the **Play** button
    visible on the images in the gallery view. While an image is being animated, the
    play button is replaced with a percentage readout indicating progress, and it
    took about 10-15 seconds to create the video. If you tap an image to move into
    single-image view, use the **Make video** button beneath the image instead.
  prefs: []
  type: TYPE_NORMAL
- en: However, either way, the original prompt was only used to create the still images
    and will be ignored when generating the video. Across several attempts, the model
    usually walked around rather than swinging her bag.
  prefs: []
  type: TYPE_NORMAL
- en: 'To adhere to the original prompt more closely, copy the original prompt into
    your clipboard, tap the image to enter single-image view, press the **Make Video**
    button, then quickly re-prompt the video generation by pasting the original prompt
    and pressing **Make video** again. This did produce a swinging bag, but the movement
    shown had the same unrealistic body movements common to other AI video models:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.11 – Technically, this movement is possible, but it’s unnatural](img/B34247_08_11.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.11 – Technically, this movement is possible, but it’s unnatural
  prefs: []
  type: TYPE_NORMAL
- en: As few of the original images adhered to my prompts, achieving specific results
    might be hard with Grok alone, but it is possible to upload your own image as
    the starting point for an animation rather than Grok’s own generations. I’ve tested
    this with several models, with mixed results.
  prefs: []
  type: TYPE_NORMAL
- en: 'In Firefly, using a starting image with text prompts, I tried to add some subtle
    motion to this image, expanded to 16:9 from earlier image generations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.12 – Can we turn this still image into a simple animation?](img/B34247_08_12.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.12 – Can we turn this still image into a simple animation?
  prefs: []
  type: TYPE_NORMAL
- en: 'With most of the details provided by the image, I used a simple prompt: `natural
    subtle movement from a light wind, the camera moves very slowly left to right,
    and the woman stands still`'
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, this wasn’t enough, and results showed poor *prompt adherence*—that
    is, the model failed to follow my instructions. Most of the time, the woman started
    walking, and none of the Firefly generations could maintain her appearance. Why?
  prefs: []
  type: TYPE_NORMAL
- en: AI systems don’t understand your request in the way a human would and using
    a prompt containing “movement” and “moves” is more likely to create just that,
    despite the additional request that the subject stay still. Using a term such
    as “pan” rather than “camera moves” might have helped, but I think it’s fair to
    expect imperfectly expressed instructions to be followed.
  prefs: []
  type: TYPE_NORMAL
- en: How did other tools do?
  prefs: []
  type: TYPE_NORMAL
- en: Canva AI also uses Veo 3 and suffered the same issues—walking instead of standing
    still—as did Grok, across several tests. Runway ML’s video generation had the
    same issue with walking, but with added excessive blinking and bouncy movement.
    **Higgsfield** ([https://higgsfield.ai](https://higgsfield.ai)), like the others,
    gave me a video with my character walking. It offered more natural movement than
    Runway, and with no extra blinks, but not what I wanted. Image-to-video is a common
    workflow that’s supported by many platforms, so if you have a plan with a provider
    such as Freepik or Envato already, explore the models available.
  prefs: []
  type: TYPE_NORMAL
- en: In another attempt with a similar prompt, the Firefly **Enhance prompt** option
    changed “girl” to “young girl,” which forced our character to get younger across
    the length of the clip. Yes, details can help, but incorrect details will ruin
    your work. Either double-check that an “enhanced” prompt actually matches your
    request or deactivate it entirely.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.13 – First, she walks away, then she gets younger](img/B34247_08_13.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.13 – First, she walks away, then she gets younger
  prefs: []
  type: TYPE_NORMAL
- en: Using two reference images as the start and end
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With either model in Firefly, if you provide a first frame, you can also provide
    an optional last frame. By transitioning between a logo and a blank frame, this
    can be used to create interesting transitions, but most filmmakers will want to
    use this to move the camera with control. If you plan a camera movement by providing
    a starting and ending frame, the model can move its virtual camera to bridge the
    gap.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, it’s not always easy to create that final frame, because not
    all image generation models are consistent enough to maintain the same characters
    and settings with different framing. Sora failed repeatedly to create a closer
    view of the same person, while the more consistent Gemini Flash 2.5 (AKA Nano
    Banana) did better.
  prefs: []
  type: TYPE_NORMAL
- en: 'With this strategy, it’s possible to create a second, closer image, then adapt
    the prompt to reflect the change: `natural subtle movement from a light wind,
    the camera moves in, and the woman stands still`'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.14 – A first frame and a last frame, surely this should work?](img/B34247_08_14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.14 – A first frame and a last frame, surely this should work?
  prefs: []
  type: TYPE_NORMAL
- en: This failed with Veo 3, producing a video that used a cross dissolve from the
    first frame to a closer frame—not my frame!—where a similar-looking woman walked
    away. I’m not sure that a more detailed prompt would help here, since even my
    simple instructions were often ignored. Other users seem to be experiencing similar
    issues with prompt adherence, but not all prompts have issues, and not all models
    are bad at this.
  prefs: []
  type: TYPE_NORMAL
- en: '**Midjourney** ([https://www.midjourney.com/](https://www.midjourney.com/))
    can also produce good results and makes the process easy by allowing you to extend
    a video from its last frame—potentially several times over. While this seems like
    a simple user interface tweak, it’s these little touches that can make difficult
    things far easier.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Vidu** ([https://vidu.com](https://vidu.com)) is able to take a first and
    last frame and produce good results with a simple prompt, moving its virtual camera
    with a slow zoom in, as you might expect.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.15 – Vidu did a good job of moving from one image to the next](img/B34247_08_15.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.15 – Vidu did a good job of moving from one image to the next
  prefs: []
  type: TYPE_NORMAL
- en: Using multiple reference images for control
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In another useful interface tweak, Vidu allows you to create videos by combining
    multiple images and referencing them explicitly in a prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.16 – If you want to see how elements could work together, this is
    a great way to make that happen](img/B34247_08_16.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.16 – If you want to see how elements could work together, this is a
    great way to make that happen
  prefs: []
  type: TYPE_NORMAL
- en: This extremely powerful approach lets you mix a character from one image, an
    object from another, and a location from a third—exactly the kind of control that’s
    useful in the creative process.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.17 – Vidu did an excellent job of combining these three elements
    in a video](img/B34247_08_17.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.17 – Vidu did an excellent job of combining these three elements in
    a video
  prefs: []
  type: TYPE_NORMAL
- en: Vidu nailed both these requests on the first try, and this would be the platform
    I’d return to if I needed more control. To be fair, my movement requests were
    simple—Vidu’s characters still can’t dance—but given that some other models couldn’t
    make a person reliably stand still, I’ll take this as a win. Veo 3.1 also offers
    this feature, allowing you to provide “ingredients” to be part of a generation,
    but the precision of the Vidu interface is very helpful indeed.
  prefs: []
  type: TYPE_NORMAL
- en: Simple and complex remixing with Sora
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you don’t need quite that much control and can be a little more flexible,
    **Sora** ([https://sora.chatgpt.com/explore](https://sora.chatgpt.com/explore),
    through a ChatGPT Plus plan) allows you to upload a reference image for guidance,
    and then describe what happens in a video in a similar way to Firefly. For a cinemagraph-style
    effect, turning a still photo into a slowly moving video, this can work well.
    I tried both of the earlier prompts with the same image, and at least one generation
    of prompt was acceptable—a much higher success rate:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.18 – Multiple remix requests with Sora](img/B34247_08_18.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.18 – Multiple remix requests with Sora
  prefs: []
  type: TYPE_NORMAL
- en: More adventurous remix requests are likely to fail in similar ways to the text-only
    prompts. When I tried `The girl spins around in slow motion as the camera slowly
    lifts up`, the results included similar body-horror results to the earlier dancing
    text prompts, and the camera movement instruction was ignored too.
  prefs: []
  type: TYPE_NORMAL
- en: When planning a shot, whether it contains people or not, remember that most
    of these AI models don’t understand how most things affect one another. Food isn’t
    consumed, drinks are not drunk, and if you ask for a meteor to crash into a mountain
    and for a fireball to destroy everything, it doesn’t know how that’s supposed
    to work.
  prefs: []
  type: TYPE_NORMAL
- en: 'I used Sora to create a still reference image of two dinosaurs and a meteor
    crashing down, and the illustrative image produced was fine. I then asked Runway
    to animate it, using this prompt: `A diplodocus and a stegosaurus are eating plants,
    in an open grassy plain with mountains in the background, as a huge meteor crashes
    into the mountains and a fireball expands to consume the entire scene.`'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.19 – In this video, a meteor turned into a flamethrower—it’s simply
    not how these objects would behave](img/B34247_08_19.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.19 – In this video, a meteor turned into a flamethrower—it’s simply
    not how these objects would behave
  prefs: []
  type: TYPE_NORMAL
- en: 'An example like this reveals the flaws that can ruin videos generated from
    stills. Essentially, generative video models don’t understand the situation that
    would have led to the image, nor what comes after. In this image, the streak behind
    the meteor is a trail, not the source of the fire, and the mountain was breaking
    apart from the force of the meteor; it’s not an erupting volcano. And if you ask
    for a video of a chef sharpening a knife, they should be using a tool, not just
    their hands:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.20 – A smiling chef, sharpening a knife by moving his hands near
    it](img/B34247_08_20.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.20 – A smiling chef, sharpening a knife by moving his hands near it
  prefs: []
  type: TYPE_NORMAL
- en: Whether you’re creating videos featuring people or not, *making things happen*
    is a challenge. While sometimes you can get lucky, it’s too expensive and/or time-consuming
    to repeatedly prompt and re-prompt with such a low success rate. If you have the
    patience, consider a site with a plan that allows unlimited generations, even
    at a slower pace. Runway’s top-level plan allows this, as does Sora.
  prefs: []
  type: TYPE_NORMAL
- en: Sora allows unlimited watermarked 720p generations, and for mockups, those limitations
    are livable. Unfortunately, you need to be on the top-tier US$200/month plan to
    generate longer 1080p videos without watermarks, but consistency and quality still
    aren’t guaranteed.
  prefs: []
  type: TYPE_NORMAL
- en: If Sora’s generations are working well enough, try the **Re-cut** feature, which
    allows you to define what happens in different parts of a timeline. Given the
    length limitations, you may prefer to combine separate shots in a video editing
    application instead.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.21 – Starting from a previously generated video, I trimmed the end
    shorter and requested a different action](img/B34247_08_21.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.21 – Starting from a previously generated video, I trimmed the end
    shorter and requested a different action
  prefs: []
  type: TYPE_NORMAL
- en: While I’ve had mixed results with this feature, being able to control exactly
    what happens at specific moments is often important, and this feature is worth
    trying. But not every job needs full manual control. If you’re happy to go with
    a pre-built template, you could consider an entirely different solution.
  prefs: []
  type: TYPE_NORMAL
- en: Using presets to animate reference images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Higgsfield includes some impressive presets called **Higgsfield apps**, each
    including a simple, eye-catching effect. While writing your own text prompts is
    obviously more flexible, the trade-off here is the promise of greater prompt adherence.
    You provide a photo of a person, then choose from options as complex as having
    that person attacked by a sea monster or as simple as having that person eat a
    banana. If one of those offers an appealing way to transform an image into a video,
    and it hasn’t already been used widely, it could work well.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.22 – Yes, they’re presets, but they’re cool presets](img/B34247_08_22.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.22 – Yes, they’re presets, but they’re cool presets
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you don’t have to create from scratch or from a still image. Some
    tools allow you to work with existing videos, using AI as an effects engine, and
    this could potentially take a lot of the unpredictability out of the process.
    Let’s take a look.
  prefs: []
  type: TYPE_NORMAL
- en: Creating new videos from reference video and audio
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: If you have a clean dialogue recording, but need those words to be spoken by
    an on-screen person, is that possible? Or perhaps you’ve recorded a piece to camera
    already, with regular human expressions and gestures, but you want to replace
    them with someone else, or a cartoon? Both of these things are possible.
  prefs: []
  type: TYPE_NORMAL
- en: Using audio files with digital avatars
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**HeyGen** allows you to upload an audio file (or record one directly on the
    site), then have a digital avatar say those words. Pre-made avatars are available,
    or for more control, you can upload a photo of the character you’d like to see
    talk, or a more extensive video from which a digital twin can be created. Note
    that if you create your own avatar, you need to have permission to use the images
    or video involved in the process. There are other providers too—Higgsfield offers
    the **Lipsync Studio** feature with their own models, alongside Veo 3 and models
    from Kling.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: both HeyGen and Higgsfield are happy to generate audio from a script,
    although you’ll probably get better results with a real audio recording. We’ll
    return to generative audio in the next chapter.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.23 – HeyGen can create an avatar speaking your words from your own
    photos or drawings](img/B34247_08_23.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.23 – HeyGen can create an avatar speaking your words from your own
    photos or drawings
  prefs: []
  type: TYPE_NORMAL
- en: The problem I’ve seen with all avatar-based services is that they’re quite robotic.
    I find that they either over-emphasize gestures or don’t use gestures enough,
    and the results feel inauthentic. While I can appreciate that talking to camera
    is not a skill everyone has, AI avatars are, so far, a poor replacement for humans.
  prefs: []
  type: TYPE_NORMAL
- en: OK then. What if you record a piece to camera, with audio, gestures, and facial
    expressions, and then make it look like someone else?
  prefs: []
  type: TYPE_NORMAL
- en: Performance transfer with Runway Act-Two
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Runway** ([https://runwayml.com](https://runwayml.com)), using their own
    Gen-4 model, has some unique offerings that can help you transform an existing
    video into something quite different, and we’ll start with **Act-Two**. This tool
    lets you take a waist-up video of a person talking, then transfer their expressions,
    mouth movements, and gestures onto an AI-generated character. (Act-One did a similar
    trick with animated characters, and presumably there will be an Act-Three in the
    future). In general, this technique is known as **pose transfer** and is also
    offered by WAN Animate ([https://wan.video/blog/wan2.2-animate](https://wan.video/blog/wan2.2-animate))
    and some other providers—I expect it to be more widely available soon.'
  prefs: []
  type: TYPE_NORMAL
- en: To test Act-Two, I recorded a quick 1080p video of me speaking a few words,
    then trimmed it and cleaned up the audio in Final Cut Pro—some video editing know-how
    is still needed. I then generated an image of a professor with Sora, then expanded
    the image to 16:9 with Photoshop and uploaded both to Runway. Note that it’s also
    possible to upload a character video rather than a still, but Act-Two will only
    adjust the facial expressions (and not gestures) if you do so.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.24 – Act-Two requires no prompt, just a performance video and a
    character image or video](img/B34247_08_24.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.24 – Act-Two requires no prompt, just a performance video and a character
    image or video
  prefs: []
  type: TYPE_NORMAL
- en: So, did it work? The good news is that the professor did, in fact, exactly copy
    my movements, and it did an excellent job of matching them. The created video
    is only 720p at 24fps, which did not quite match up with my original 25fps video,
    but that’s manageable—you can upscale here on Runway and adjust the speed in an
    editing application if needed.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.25 – The pose has transferred correctly, and the result is quite
    usable—but keep your hands empty](img/B34247_08_25.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.25 – The pose has transferred correctly, and the result is quite usable—but
    keep your hands empty
  prefs: []
  type: TYPE_NORMAL
- en: Here are a few tips for better results. First, you should match the pose of
    your appearance video to the character video as much as possible. If the character
    is holding a prop, the performer should be holding a matching prop too, but empty
    hands are more reliable. The “professor” character reference is holding a marker
    pen in the character image, and as there’s no correct way to hold that pen while
    matching my hand movements, the pen morphs into other objects.
  prefs: []
  type: TYPE_NORMAL
- en: For results that avoid the uncanny valley, try to create obviously unreal characters,
    such as cartoons or obviously computer-generated characters. We know exactly what
    humans should look like, but we expect cartoon characters and CGI renders to be
    a little odd. You can make photo-real humans work, but it’s harder.
  prefs: []
  type: TYPE_NORMAL
- en: While pose transfer is useful, **localization** is one area where you want the
    generated video to be almost identical to the original. Visual dubbing services,
    including LipDub AI ([https://www.lipdub.ai/](https://www.lipdub.ai/)) and Flawless
    ([https://flawlessai.com/](https://flawlessai.com/)) are able to convert an existing
    video in one language into another language with none of the mismatches you’d
    expect from dubbing alone. While most of the original video remains as it was,
    all mouth movements are regenerated to match the translated version of the dialogue.
  prefs: []
  type: TYPE_NORMAL
- en: In a Swedish feature film, *Watch The Skies*, the original cast re-recorded
    their own parts in English, then TrueSync was used to regenerate the video to
    match. A system is in place to obtain approvals from the original actors, and
    it’s been integrated with Avid Media Composer. With LipDub, the translated voice
    recording is generated in the voice of the original speaker. We’ll return to generative
    audio in the next chapter, but if translation is your focus, there are services
    tailored to your needs.
  prefs: []
  type: TYPE_NORMAL
- en: The best aspect of Act-Two is that it enables new kinds of outputs without replacing
    the performer. Animation is very expensive in traditional production, and if a
    client is set on an animated avatar, this approach could save money while leaving
    human artists in charge of the look of the characters and how they move.
  prefs: []
  type: TYPE_NORMAL
- en: While we’re looking at Runway, they have another unique feature that promises
    to retain much more of the original video. Let’s dig in.
  prefs: []
  type: TYPE_NORMAL
- en: Transforming existing videos
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Runway’s **Aleph** allows you to transform an existing video with prompting,
    retaining most of the original with high-quality results. Examples include style
    transformations; changing the camera angle completely; changing environments,
    time of day, or seasons; adding tracked elements; object and reflection removal;
    relighting; and more.
  prefs: []
  type: TYPE_NORMAL
- en: After uploading a drone video I took for a recent project, I asked for the time
    of day to be changed to night, and for fireworks to be added. This isn’t a shot
    I could have captured easily—it’s not normally allowed to use a drone at night
    or near fireworks.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.26 – My original drone shot, transformed into a night-time fireworks
    display](img/B34247_08_26.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.26 – My original drone shot, transformed into a night-time fireworks
    display
  prefs: []
  type: TYPE_NORMAL
- en: Impressively, the positions of all the marquees and people in the foreground
    were maintained. While some details were skipped, this result was a success. One
    limitation is that because the output is only 720p, it would need to be upscaled
    to approach the clarity of the 1080p clip I uploaded, let alone the original 4K
    clip. Happily, this upscaling is built into the system, and costs just a few credits
    to perform. It’s not magic, but it helps a lot.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the advertised Aleph features is to remove a cameraperson from a reflection
    in an image, and since this can be a tricky VFX task, I gave it a shot. Providing
    a simple handheld iPhone video at 1080p24 and the prompt shown here, I was hopeful:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.27 – Simply asking it to remove the reflected person feels like
    asking for magic](img/B34247_08_27.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.27 – Simply asking it to remove the reflected person feels like asking
    for magic
  prefs: []
  type: TYPE_NORMAL
- en: After about a minute, the result came back, and while it wasn’t perfect, the
    reflected person and their phone had indeed been impressively removed. Resolution
    was lacking, even after a 4K upscale; some areas lacked texture compared to the
    original. The side of the mirror was smoothed out, though it shouldn’t have been,
    and though it’s minor, the interior door handle was changed despite a request
    not to do so.
  prefs: []
  type: TYPE_NORMAL
- en: You may be tempted to composite parts of the new shot over the old one, but
    because the two shots don’t quite match—the processed clip seems to have skipped
    a frame—this could be slightly trickier than expected. Brightness was also slightly
    different between the original and downloaded clips, likely due to HDR transformations,
    but this can be managed.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.28 – A few frames of the original clip below and the processed clip
    above—impressive](img/B34247_08_28.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.28 – A few frames of the original clip below and the processed clip
    above—impressive
  prefs: []
  type: TYPE_NORMAL
- en: While the maximum clip length of five seconds limits what you can do, and considering
    the preceding issues, this is still a good result. The issues with the replacement
    areas here are far less problematic than a full re-imagination of the shot would
    be, and there are many contexts in which the quality limits would be acceptable.
    Given how complex a tracked object removal task can be, Aleph could work well
    as a quicker, cheaper alternative.
  prefs: []
  type: TYPE_NORMAL
- en: Tracking comes in many forms, though. As another test, I gave Aleph a new moving
    drone shot and a logo, then asked it to `Add this logo to a large circular banner
    on the large blank area of the right side of the building`. While the tracking
    itself was fine, the logo wasn’t placed in the correct spot, and the logo itself
    was completely reinterpreted and mangled.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.29 – That’s not the logo I gave it, nor the placement I requested](img/B34247_08_29.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.29 – That’s not the logo I gave it, nor the placement I requested
  prefs: []
  type: TYPE_NORMAL
- en: Another test, to add a whale into the background of a seaside scene, didn’t
    work at all. Instead of augmenting the original, a new, quite different shot was
    generated.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.30 – The created video has little to do with the original](img/B34247_08_30.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.30 – The created video has little to do with the original
  prefs: []
  type: TYPE_NORMAL
- en: 'Mixed results for Runway Aleph, then. If you struggle, another approach is
    to ask Sora for changes to existing videos using the **Remix** feature, but you’ll
    need to turn the Remix strength down to avoid changing the video completely. While
    Sora can’t change day for night like Aleph, it can add a whale:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.31 – Yes, that’s a whale in the waves with a subtle remix](img/B34247_08_31.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.31 – Yes, that’s a whale in the waves with a subtle remix
  prefs: []
  type: TYPE_NORMAL
- en: Sora doesn’t have the same level of control as tools such as Runway or Vidu,
    so you may need to try a few times to get usable results. No matter which systems
    you end up using, you may need to mix and match still and image outputs with traditional
    effects techniques such as chromakey and tracking. If you can’t make a video generation
    work, it may be possible to generate a still image and then incorporate that into
    traditional video using traditional masking and tracking techniques. But there’s
    another solution that might solve this problem.
  prefs: []
  type: TYPE_NORMAL
- en: '**EbSynth** ([https://ebsynth.com](https://ebsynth.com)) is currently available
    on free and paid plans and offers more control than most other solutions we’ve
    looked at so far. Here’s an overview of the process:'
  prefs: []
  type: TYPE_NORMAL
- en: Upload a video clip, then scrub through it to find a specific frame.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Change that frame somehow, by painting on it, or uploading a replacement for
    some or all of the image or even selecting part of the frame and then prompting
    for a replacement.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Propagate the changes on that frame throughout the rest of the clip, and the
    additions will be transformed as if they’re painted onto the original image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The most appealing part of this tool is that it resembles common desktop video
    editing apps, including a timeline, keyframes, tools, and layers in its user interface.
    If you’ve used After Effects, Apple Motion, or a video editing app, you’ll understand
    it pretty quickly.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.32 – Here, I’ve painted a red nose onto one frame, then propagated
    that red nose throughout a clip](img/B34247_08_32.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.32 – Here, I’ve painted a red nose onto one frame, then propagated
    that red nose throughout a clip
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the built-in painting interface allows you to get started quickly, but
    the controls are fairly simple and better for experimentation than finished art.
    To use the more extensive controls available in an app such as Photoshop or Procreate,
    download the current frame and edit your image locally. Downloading is easy: use
    the download button at the top left of the interface, or the **Save Frame As…**
    option in the on-screen menu (both visible in the preceding screenshot).'
  prefs: []
  type: TYPE_NORMAL
- en: With the image downloaded, you could apply a filter to the entire image, then
    upload that newly transformed image. For a more targeted change, you can create
    a new layer, add something new on that layer, then save the new layer as a PNG
    and upload that alone. The new image can be repositioned on top of the original
    image, and changes will automatically propagate throughout the clip.
  prefs: []
  type: TYPE_NORMAL
- en: It’s also possible to transform all or part of an existing frame with a generative
    image model. Optionally, select part of the image, then click the **Generate Image**
    icon to the right of the other tools. Prompt as you normally would (using Stable
    Diffusion or Nano Banana) and a new still frame, based on the original, will be
    generated. You can change an object’s color, change a photo into a drawing, or
    anything else you care to prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.33 – This “blue hair” prompt was used in frame 1, then successfully
    propagated throughout the clip](img/B34247_08_33.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.33 – This “blue hair” prompt was used in frame 1, then successfully
    propagated throughout the clip
  prefs: []
  type: TYPE_NORMAL
- en: One limitation is that you’re effectively adding paint to the original image,
    not an actual 3D object. A color change may succeed, but if you were to add an
    image of sunglasses to a face, when the face turns, those sunglasses will start
    to look more like body paint than they should. The further the object strays from
    the original frame, the more likely the illusion will fail, though it is possible
    to add further keyframes to control the effect more precisely.
  prefs: []
  type: TYPE_NORMAL
- en: Despite the limitations, EbSynth can still allow a performance to puppet a digital
    double, bring a drawing to life, or add or remove a blemish or tattoo from a real
    video of a real person. At the time of writing, this tool is quite new, so I don’t
    want to come to any firm conclusions, but I do like the level of control it offers
    and can see potential applications.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve now looked at a number of tools and several potentially useful workflows.
    Let’s recap.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Overall, while some Gen AI video services are too hit-and-miss to recommend,
    there are some bright spots:'
  prefs: []
  type: TYPE_NORMAL
- en: Vidu was able to pull off some impressive results moving between first and last
    frames, and it was also able to combine elements in a believable way
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sora produced mostly good results with simple requests, though these results
    were less repeatable
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runway’s Act-Two reference videos empower voice and performance artists to use
    their skills in new ways
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aleph can sometimes perform genuinely useful transformations on existing videos
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While EbSynth is new, its powerful UI and unique feature set could prove very
    useful in the right situations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While the other services I’ve tested here are worth trying, I found them to
    be less predictable and controllable than I’d prefer, and predictability affects
    cost. All these solutions are cloud only, and many of them are simply too expensive
    to prompt repeatedly.
  prefs: []
  type: TYPE_NORMAL
- en: Their unpredictability means you’ll often need to perform multiple generations
    for good results, and even the most expensive plans include serious limitations.
    Some of those expensive plans do offer unlimited generations at a more relaxed
    pace, while others just include a higher amount of paid credits, and serious users
    will churn through those credits quickly.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to use AI generation for video, I’d keep your expectations relatively
    low, at least for now. Focusing on creating videos for mockup purposes—where perfection
    is not required—is a lot easier, quicker, and cheaper than creating customer-ready
    finished pieces.
  prefs: []
  type: TYPE_NORMAL
- en: While testing these services, I experienced repeatable, generation-ruining bugs,
    and though these issues were eventually solved, I was unable to use some services
    for days at a time. Video has a long way to go when compared to still images,
    and it’s going to be a tricky problem to solve.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of workflows, while generating video using only text feels like a magic
    trick, it doesn’t scale well to longer pieces. For more predictable results, I’d
    recommend focusing on image-to-video workflows, using reference video and audio,
    and transforming existing videos.
  prefs: []
  type: TYPE_NORMAL
- en: There is no magic button to just *make it work*, and the higher your expectations,
    the more frustrated you’re likely to become. While this space will continue to
    evolve quickly, I don’t expect progress to be linear, and I suspect that output
    will remain unpredictable for some time.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, there are, of course, other generative video models available, and
    though they’re worth trying, most seem to suffer from similar issues to those
    I found here. In a year, or with a new tool, or with different prompts, you may
    have very different results. Every run is different, everyone’s needs are different,
    and models are constantly revised. Keep an eye on this space, but don’t expect
    miracles just yet.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll round out the generative section of this book with
    a look at audio—and there are some pleasant surprises.
  prefs: []
  type: TYPE_NORMAL
