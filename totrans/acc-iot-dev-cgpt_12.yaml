- en: '12'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: Establishing Wi-Fi Connectivity
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 建立Wi-Fi连接
- en: In the previous chapter, we successfully built the hardware prototype and programmed
    the first code to read data from the DHT11 sensor. This data can be observed from
    the local console port in the PlatformIO **TERMINAL** window. The next step is
    to establish Wi-Fi connectivity from the ESP32 to your home Wi-Fi router.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们成功构建了硬件原型并编写了第一个代码来读取 DHT11 传感器的数据。这些数据可以从 PlatformIO **终端**窗口的本地控制台端口观察到。下一步是从
    ESP32 建立到您家 Wi-Fi 路由器的 Wi-Fi 连接。
- en: Connecting ESP32 to the internet is an imperative step to deliver sensor data
    to the cloud. In this chapter, we will continue to design the Wi-Fi access logic,
    draw a diagram using AI Chat at [https://mermaidchart.com](https://mermaidchart.com),
    and instruct ChatGPT to produce code to enable Wi-Fi access on ESP32.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ESP32 连接到互联网是将传感器数据发送到云端的必要步骤。在本章中，我们将继续设计 Wi-Fi 访问逻辑，使用 AI Chat 在 [https://mermaidchart.com](https://mermaidchart.com)
    绘制图表，并指导 ChatGPT 生成代码以启用 ESP32 上的 Wi-Fi 访问。
- en: 'This chapter will cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Designing Wi-Fi access logic
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计 Wi-Fi 访问逻辑
- en: Creating the Wi-Fi access flow diagram
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建 Wi-Fi 访问流程图
- en: Instructing ChatGPT to generate code
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指导 ChatGPT 生成代码
- en: Code examples
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码示例
- en: Validating internet access on ESP32
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 ESP32 上验证互联网访问
- en: In this chapter, we will store the Wi-Fi credentials, ping host address, and
    NTP server address in the `Platformio.ini` file, and then pass them to the main
    code. This is a highly adaptable methodology that has been designed to circumvent
    the need to directly store information within the main body of the code. Doing
    so makes future alterations and modifications easier, thereby improving the code’s
    overall efficiency, functionality, security, and readability.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将 Wi-Fi 凭据、ping 主机地址和 NTP 服务器地址存储在 `Platformio.ini` 文件中，然后将其传递给主代码。这是一种高度适应性的方法，旨在绕过在代码主体中直接存储信息的需求。这样做使得未来的修改和改进更加容易，从而提高了代码的整体效率、功能、安全性和可读性。
- en: Designing Wi-Fi access logic
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设计 Wi-Fi 访问逻辑
- en: 'Imagine taking the hardware prototype we created in the last chapter to a warehouse.
    Here, you would need to connect the ESP32 to the local Wi-Fi network using the
    proper SSID and password. After receiving a valid IP address, you would ping a
    public host to verify internet access and then sync with an NTP server to get
    accurate clock timing. There are two ways to provide the SSID and password to
    your device:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下将我们在上一章中创建的硬件原型带到仓库。在这里，您需要使用正确的 SSID 和密码将 ESP32 连接到本地 Wi-Fi 网络。在收到有效的 IP
    地址后，您将 ping 一个公共主机以验证互联网访问，然后与 NTP 服务器同步以获取准确的时钟时间。有两种方法可以向您的设备提供 SSID 和密码：
- en: '`main.cpp` code or by storing and passing them through the `Platformio.ini`
    file.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过 `main.cpp` 代码或通过存储并通过 `Platformio.ini` 文件传递。
- en: '**Option 2**: Use your mobile phone to assist ESP32 to connect to your local
    SSID and type in your password.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选项 2**：使用您的手机帮助 ESP32 连接到您的本地 SSID 并输入您的密码。'
- en: '**Option 1** is straightforward and simple but lacks security and flexibility.
    **Option 2** is flexible, secure, and easy to deploy at various sites, but it
    has a high level of complexity in the code design.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**选项 1** 简单直接，但缺乏安全和灵活性。**选项 2** 灵活、安全，且易于在各种地点部署，但代码设计复杂度高。'
- en: 'In this project, we’ll use **Option 1** as an example to configure the SSID
    and password. Here’s what the simplified Wi-Fi access logic looks like:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们将以 **选项 1** 为例来配置 SSID 和密码。以下是简化后的 Wi-Fi 访问逻辑：
- en: The ESP32 uses the SSID and password to access the local Wi-Fi **Access Point**
    (**AP**) or router.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ESP32 使用 SSID 和密码访问本地的 Wi-Fi **接入点**（**AP**）或路由器。
- en: The local Wi-Fi AP or router executes WPA2-PSK authentication with the ESP32.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 本地 Wi-Fi AP 或路由器与 ESP32 执行 WPA2-PSK 认证。
- en: If authentication is successful, the local Wi-Fi AP or router assigns the ESP32
    a valid local IP address. If the password is incorrect, the authentication fails.
  id: totrans-19
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果认证成功，本地 Wi-Fi AP 或路由器将为 ESP32 分配一个有效的本地 IP 地址。如果密码错误，认证将失败。
- en: Under normal conditions, once the ESP32 receives a valid IP address, it pings
    a public internet destination and synchronizes with an NTP server to get the current
    time.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在正常情况下，一旦 ESP32 接收到有效的 IP 地址，它就会ping一个公共互联网目标并与 NTP 服务器同步以获取当前时间。
- en: Under abnormal conditions, should the ESP32 fail to obtain a valid IP address,
    the ESP32 is set to turn on the LED D4 as an indicator of internet connection
    failure, sound the buzzer, retry three times, and then reboot.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在异常情况下，如果ESP32无法获取有效的IP地址，ESP32将设置为打开LED D4作为互联网连接失败的指示器，蜂鸣器将发出声音，重试三次，然后重启。
- en: In this section, we designed logic for ESP32 to access a Wi-Fi network, taking
    into consideration normal conditions and abnormal contingencies. In the next section,
    we will use this logic to create a flow diagram with AI.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们为ESP32访问Wi-Fi网络设计了逻辑，考虑了正常情况和异常情况。在下一节中，我们将使用这个逻辑与AI创建流程图。
- en: Creating the Wi-Fi access flow diagram
  id: totrans-23
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建Wi-Fi访问流程图
- en: As with [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302), we can continue to
    generate a diagram on [mermaidchart.com](http://mermaidchart.com), you may see
    a service flow diagram generated, as shown in the following example.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 与[*第11章*](B22002_11.xhtml#_idTextAnchor302)一样，我们可以在[mermaidchart.com](http://mermaidchart.com)上继续生成一个服务流程图，您可能会看到如下示例中生成的一个服务流程图。
- en: '![Figure 12.1 – An internet access diagram](img/B22002_12_01.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图12.1 – 互联网访问图](img/B22002_12_01.jpg)'
- en: Figure 12.1 – An internet access diagram
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1 – 互联网访问图
- en: In this diagram, we use the LED D4 on the ESP32 and the buzzer to indicate the
    status of internet access. They provide visual and auditory signals to easily
    show whether internet access is successful or not. This method is more convenient
    than observing printed messages in the **TERMINAL** window.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在此图中，我们使用ESP32上的LED D4和蜂鸣器来指示互联网访问状态。它们提供视觉和听觉信号，以便轻松显示互联网访问是否成功。这种方法比在**终端**窗口中观察打印消息更方便。
- en: In this section, we created an internet access diagram with AI Chat on [mermaidchart.com](http://mermaidchart.com).
    By following this diagram, we can start to instruct ChatGPT to update the previous
    code in [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302) to support internet access
    through Wi-Fi.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们使用AI Chat在[mermaidchart.com](http://mermaidchart.com)创建了一个互联网访问图。通过遵循此图，我们可以开始指导ChatGPT更新[*第11章*](B22002_11.xhtml#_idTextAnchor302)中的先前代码，以支持通过Wi-Fi进行互联网访问。
- en: Instructing ChatGPT to generate code
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 指示ChatGPT生成代码
- en: 'In this section, we will request ChatGPT to update the previous code generated
    in [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302) to implement the Wi-Fi access
    logic. You can instruct ChatGPT to work on the previous code and add internet
    access requirements:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将要求ChatGPT更新在[*第11章*](B22002_11.xhtml#_idTextAnchor302)中生成的先前代码，以实现Wi-Fi访问逻辑。您可以指示ChatGPT处理先前代码并添加互联网访问需求：
- en: '`Hi, ChatGPT`'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '`Hi, ChatGPT`'
- en: '`Please refer to the following code, maintain its current structure and style,
    and support the following` `additional requirements.`'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '`请参考以下代码，保持其当前的结构和风格，并支持以下` `附加要求。`'
- en: '`Requirements:`'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '`需求：`'
- en: '`Wi-Fi access: Use the pre-provisioned SSID and password to access Wi-Fi. The
    SSID and password are stored in the` `Platformio.ini file.`'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`Wi-Fi访问：使用预配置的SSID和密码访问Wi-Fi。SSID和密码存储在` `Platformio.ini文件中。`'
- en: '`Normal condition: The ESP32 receives a valid IP address. It then pings a public
    internet destination and syncs with an NTP server to get the` `current time.`'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`正常情况：ESP32收到一个有效的IP地址。然后它ping一个公共互联网目标并与NTP服务器同步以获取` `当前时间。`'
- en: '`Abnormal condition: If the ESP32 fails to obtain a valid IP address, the ESP32
    LED D4 (IO12) will turn on as an indicator of Wi-Fi connection failure. The buzzer
    will beep, and the system will retry three times` `before rebooting.`'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`异常情况：如果ESP32无法获取有效的IP地址，ESP32的LED D4（IO12）将打开作为Wi-Fi连接失败的指示器。蜂鸣器将发出蜂鸣声，系统将在重启前重试三次。`'
- en: '`Platformio.ini File:`'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`Platformio.ini文件：`'
- en: '`Create a new file that incorporates the` `ESP32Ping library.`'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`创建一个新文件，包含` `ESP32Ping库。`'
- en: Next, let’s look at some examples of the code that ChatGPT can generate for
    us.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看ChatGPT为我们生成的代码示例。
- en: Code examples
  id: totrans-40
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码示例
- en: You can find completed snippets of `main.cpp` and `Platformio.i`[`ni` at](https://github.com/ai-camps/book/blob/main/Chapter_12)
    .
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://github.com/ai-camps/book/blob/main/Chapter_12](https://github.com/ai-camps/book/blob/main/Chapter_12)找到完成的`main.cpp`和`Platformio.ini`片段。
- en: 'In that updated `main.cpp`, you can see three new functions created by ChatGPT
    based on the previous version:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在更新的`main.cpp`中，您可以看到ChatGPT基于先前版本创建的三个新函数：
- en: '`connectToWiFi()`: The function to connect Wi-Fi by SSID and password'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`connectToWiFi()`: 通过SSID和密码连接Wi-Fi的函数'
- en: '`pingHost()`: Ping [google.com](http://google.com) to check whether the public
    internet is accessible'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pingHost()`: Ping [google.com](http://google.com)以检查公共互联网是否可访问'
- en: '`syncNTP`: Obtain the current date and time from the public internet NTP server'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`syncNTP`：从公共互联网NTP服务器获取当前日期和时间'
- en: 'In addition, in the updated platformio.ini, we also adopt a flexible approach
    to store and pass the following critical parameters to the main code using `build_flags`.
    When prompting, you can ask ChatGPT to use the same name macros from platformio.ini.
    Doing so would ensure that the output of ChatGPT does not use different names:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在更新的platformio.ini中，我们还采用了一种灵活的方法来存储和传递以下关键参数，使用`build_flags`将它们传递到主代码中。在提示时，您可以要求ChatGPT使用platformio.ini中相同的名称宏。这样做可以确保ChatGPT的输出不使用不同的名称：
- en: '[PRE0]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Utilizing `build_flags` in this context offers several benefits. It encapsulates
    your credentials’ parameters, keeping them separate from your code and configuration
    files, which enhances security by reducing the risk of credential leakage. This
    practice also enhances portability, allowing you to easily transfer your project
    to another machine or development environment without exposing sensitive information.
    Updates become easier as well, as you only need to modify the `build_flags` section
    in your platformio.ini file to change these parameters, eliminating the need to
    alter your code. Importantly, `build_flags` is a build-time construct, making
    it platform-agnostic and usable on different platforms without modifications.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在此上下文中使用`build_flags`提供了几个好处。它封装了您的凭证参数，将它们与您的代码和配置文件分开，通过降低凭证泄露的风险来增强安全性。这种做法也提高了可移植性，允许您轻松地将项目转移到另一台机器或开发环境中，而不会泄露敏感信息。更新也变得更加容易，因为您只需修改platformio.ini文件中的`build_flags`部分来更改这些参数，从而无需修改您的代码。重要的是，`build_flags`是一个构建时构造，使其与平台无关，可以在不同的平台上使用而无需修改。
- en: In the `platformio.ini` file example, there is a new library under `lib_deps`,
    `marian-craciunescu/ESP32Ping@^1.7`. Before compiling the code, you need to manually
    install it from the PlatformIO libraries, as shown in the following screenshot.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在`platformio.ini`文件示例中，`lib_deps`下有一个新的库，即`marian-craciunescu/ESP32Ping@^1.7`。在编译代码之前，您需要从PlatformIO库中手动安装它，如下面的截图所示。
- en: '![Figure 12.2 – Install the ESP32Ping library from PlatformIO](img/B22002_12_02.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图12.2 – 从PlatformIO安装ESP32Ping库](img/B22002_12_02.jpg)'
- en: Figure 12.2 – Install the ESP32Ping library from PlatformIO
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2 – 从PlatformIO安装ESP32Ping库
- en: In this section, we asked ChatGPT to revise the previous code by adding a requirement
    for Wi-Fi access. Next, let’s compile and upload the new version to ESP32 to verify
    the results.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们要求ChatGPT通过添加对Wi-Fi访问的要求来修改之前的代码。接下来，让我们编译并上传新版本到ESP32以验证结果。
- en: Validating internet access on ESP32
  id: totrans-53
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 验证ESP32上的互联网访问
- en: In this section, we will observe the `Ping` command response and NTP synchronization
    result in the PlatformIO **TERMINAL** window. You can use PlatformIO to compile
    and upload this code to your ESP32 as per the steps in the last chapter.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将观察PlatformIO **终端**窗口中的`Ping`命令响应和NTP同步结果。您可以使用PlatformIO按照上一章中的步骤编译和上传此代码到您的ESP32。
- en: '*Figure 12**.3* shows a screenshot of the successful messages printed in the
    PlatformIO console **TERMINAL** window.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*图12*.*3*显示了在PlatformIO控制台**终端**窗口中打印的成功消息截图。'
- en: '![Figure 12.3 – Observe the printout message in the TERMINAL window](img/B22002_12_03.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图12.3 – 观察终端窗口中的打印信息](img/B22002_12_03.jpg)'
- en: Figure 12.3 – Observe the printout message in the TERMINAL window
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3 – 观察终端窗口中的打印信息
- en: Make a note of the device ID displayed on your screenshot. The device ID is
    derived from the unique values read from the eFuse Mac address, using the `ESP.getEfuseMac()`
    function. We will use the device ID as the *THING*’s name when provisioning this
    device in AWS IoT Core in the next chapter. It’s important to know that the eFuse
    Mac address cannot be altered once the hardware module has been manufactured.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 记下您屏幕截图上显示的设备ID。设备ID是通过使用`ESP.getEfuseMac()`函数从eFuse Mac地址读取的唯一值派生出来的。在下一章中配置此设备在AWS
    IoT Core时，我们将使用设备ID作为*THING*的名称。重要的是要知道，一旦硬件模块制造完成，eFuse Mac地址就不能更改。
- en: In this section, you have learned using Platformio to validate the updated code
    generated by ChatGPT. As with [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302),
    you might need to refine your prompts to ChatGPT to make them more specific. This
    iterative conversation will help fine-tune its code generation. After making adjustments,
    you should re-validate the new versions until the outcomes match your service
    flow diagram completely.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您已经学习了如何使用 Platformio 验证 ChatGPT 生成的更新代码。与[*第11章*](B22002_11.xhtml#_idTextAnchor302)一样，您可能需要调整对
    ChatGPT 的提示，使其更加具体。这种迭代对话将有助于微调其代码生成。调整后，您应该重新验证新版本，直到结果完全符合您的服务流程图。
- en: Summary
  id: totrans-60
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you connected the ESP32 to your local Wi-Fi network. You should
    be able to validate the preceding output in the PlatformIO console **TERMINAL**
    window, observing the Wi-Fi access, internet ping, and NTP synchronization information
    in addition to the temperature and humidity data.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将 ESP32 连接到您的本地 Wi-Fi 网络。您应该能够在 PlatformIO 控制台 **TERMINAL** 窗口中验证前面的输出，观察
    Wi-Fi 访问、互联网 ping 和 NTP 同步信息，以及温度和湿度数据。
- en: In the next chapter, we will start the journey to connect the ESP32 to the AWS
    cloud, focusing on the IoT Core first. To do this, we will create a device in
    AWS IoT Core, generate access credential files, program these files in the code
    on ESP32, and set up a **TLS** (**Transport Layer Security**)-based **MQTT** (**Message
    Queuing Telemetry Transport**) connection between ESP32 and AWS.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将开始将 ESP32 连接到 AWS 云的旅程，首先关注 IoT Core。为此，我们将在 AWS IoT Core 中创建一个设备，生成访问凭证文件，将这些文件编程到
    ESP32 上的代码中，并在 ESP32 和 AWS 之间设置基于 **TLS**（**传输层安全性**）的 **MQTT**（**消息队列遥测传输**）连接。
