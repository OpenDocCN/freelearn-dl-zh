- en: '20'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '20'
- en: Unlock Your Exclusive Benefits
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解锁您的专属权益
- en: 'Your copy of this book includes the following exclusive benefits:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您的这本书包含以下专属权益：
- en: '![](img/cloud-computing1.png) Next-gen Packt Reader'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![下一代Packt阅读器](img/cloud-computing1.png)'
- en: '![](img/pdf-file.png) DRM-free PDF/ePub downloads'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![无DRM的PDF/ePub下载](img/pdf-file.png)'
- en: Follow the guide below to unlock them. The process takes only a few minutes
    and needs to be completed once.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下指南解锁它们。整个过程只需几分钟，并且只需完成一次。
- en: Unlock this Book’s Free Benefits in 3 Easy Steps
  id: totrans-6
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 三步轻松解锁本书的免费权益
- en: Step 1
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步
- en: Keep your purchase invoice ready for *Step 3*. If you have a physical copy,
    scan it using your phone and save it as a PDF, JPG, or PNG.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好您的购买发票以进行**第3步**。如果您有实体副本，请使用手机扫描并将其保存为PDF、JPG或PNG格式。
- en: For more help on finding your invoice, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如需查找发票的更多帮助，请访问[https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)。
- en: '**Note**: If you bought this book directly from Packt, no invoice is required.
    After *Step 2*, you can access your exclusive content right away.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您直接从Packt购买此书，则无需发票。在**第2步**之后，您可以直接访问您的专属内容。'
- en: '|'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Step 2
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步
- en: Scan the QR code or go to [packtpub.com/unlock](http://packtpub.com/unlock).
    | ![A qr code on a white background  AI-generated content may be incorrect.](img/Unlock.png)
    |
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 扫描二维码或访问[packtpub.com/unlock](http://packtpub.com/unlock)。 | ![白色背景上的二维码  AI生成的内容可能不正确](img/Unlock.png)
    |
- en: On the page that opens (similar to *Figure* *20**.1* on desktop), search for
    this book by name and select the correct edition.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在打开的页面（类似于桌面上的**图20.1**），通过名称搜索此书并选择正确的版本。
- en: '![A screenshot of a web page  AI-generated content may be incorrect.](img/Packt_unlock_landing_page.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![网页截图  AI生成的内容可能不正确](img/Packt_unlock_landing_page.png)'
- en: 'Figure 20.1: Packt unlock landing page on desktop'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图20.1：桌面上的Packt解锁着陆页面
- en: Step 3
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步
- en: After selecting your book, sign in to your Packt account or create one for free.
    Then upload your invoice (PDF, PNG, or JPG, up to 10 MB). Follow the on-screen
    instructions to finish the process.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您的书籍后，登录您的Packt账户或免费创建一个账户。然后上传您的发票（PDF、PNG或JPG，最大10MB）。按照屏幕上的说明完成此过程。
- en: '|'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Need help?
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要帮助？
- en: If you get stuck and need help, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    for a detailed FAQ on how to find your invoices and more. This QR code will take
    you to the help page. | ![](img/Need_help.png) |
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到困难需要帮助，请访问[https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)获取有关如何查找您的发票及其他详细FAQ。此二维码将带您到帮助页面。
    | ![需要帮助的图片](img/Need_help.png) |
- en: '**Note**: If you are still facing issues, reach out to [customercare@packt.com](https://mailto:customercare@packt.com).'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您仍然遇到问题，请联系[customercare@packt.com](https://mailto:customercare@packt.com)。'
