- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Bootstrapping a Power App with Copilot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Copilot has begun to make its way into the Microsoft 365 platform. However,
    as you saw in the previous chapter, if you just approach Copilot the same way
    you approach ChatGPT for help, you may end up frustrated.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’re going to dig into the details of how to get Copilot to
    partner with you to create usable applications. We’ll try an app that’s a little
    more complex than the garage inventory app we worked with in [*Chapter 4*](B21234_04.xhtml#_idTextAnchor047).
    Here, we’re going to try creating a simple leave or time-off request app using
    a few SharePoint lists and Copilot.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This sample leave request app is going to be comprised of a few SharePoint
    lists: one to store information about the request (requestor, start and end dates,
    approval status, and such) and another to store information about the approvers.'
  prefs: []
  type: TYPE_NORMAL
- en: Creating identities in Entra ID
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since we’re going to be picking users from Entra ID, you’ll need to populate
    the directory with users. You should create users that provide as much detail
    as possible.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs: []
  type: TYPE_NORMAL
- en: For more information on creating users in Entra ID, go to [https://learn.microsoft.com/en-us/microsoft-365/admin/add-users/add-users?view=o365-worldwide](https://learn.microsoft.com/en-us/microsoft-365/admin/add-users/add-users?view=o365-worldwide).
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Dataverse environment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While a Microsoft 365 tenant is the logical boundary for your organization,
    an **environment** is a logical container or boundary that’s used to segment applications,
    users, departments, or business units. A Microsoft 365 tenant can have multiple
    environments. An environment is used to group Power Platform components (such
    as Power Automate flows, Power Apps applications, Power Pages sites, or Dynamics
    365 components), as well as dedicated information storage in a Dataverse database.
    A Dataverse environment can only have one database.
  prefs: []
  type: TYPE_NORMAL
- en: 'By default, your Microsoft 365 tenant should have a pre-built Dataverse environment
    (with a database that can store up to 3 GB of data), as shown in *Figure 5**.1*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.1 – Viewing Dataverse’s capacity](img/B21234_05_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.1 – Viewing Dataverse’s capacity
  prefs: []
  type: TYPE_NORMAL
- en: 'If for whatever reason it doesn’t (or you don’t want to use the default environment),
    you can create a new one by following these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Platform admin center ([https://admin.powerplatform.com](https://admin.powerplatform.com))
    and log in with a user who’s been assigned an administrative role (such as a Global
    Admin or Microsoft Power Platform admin).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Environments**, then click **New**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter a **Name** value for the environment and select a **Region** value.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select a **Type** value (either **Trial**, **Development**, **Production**,
    or **Sandbox**) and, optionally, enter a description in the **Purpose** area.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Add a Dataverse data store**, move the slider to **Yes** to enable a
    database. Then, click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The only required area on this page of the wizard is **Security group**. Click
    **Select** to choose the security controls for the environment. You can choose
    **None** under **Open access** to allow any user or select an existing security
    group under **Restricted access** to limit access.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After a few moments, the environment should be created. Whenever you wish to
    create or manage content in this environment, you’ll need to switch environments
    in the Maker Portal, as shown in *Figure 5**.2*.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.2 – Choosing an environment](img/B21234_05_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.2 – Choosing an environment
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s explore using Copilot to create a new Power App.
  prefs: []
  type: TYPE_NORMAL
- en: What do I do if I’m stuck?
  prefs: []
  type: TYPE_NORMAL
- en: 'If you run into a roadblock for some reason (can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  prefs: []
  type: TYPE_NORMAL
- en: Building a new Power App with Copilot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With our prerequisites met, it’s time to start building an app! As you saw in
    [*Chapter 4*](B21234_04.xhtml#_idTextAnchor047), if you simply use the Copilot
    prompts to create an app, you essentially get a table that can be used for data
    entry. We’re going to try a different approach – starting with a blank app and
    then using Copilot to add and link components.
  prefs: []
  type: TYPE_NORMAL
- en: This solution, which is built on a **Dataverse** (formerly known as the **Common
    Data Service**) environment with a database, will utilize both a frontend entry
    component for employees to request time off and a backend solution for approvers
    or managers to use.
  prefs: []
  type: TYPE_NORMAL
- en: Canvas and model-driven apps
  prefs: []
  type: TYPE_NORMAL
- en: Power Apps come in two flavors – **canvas** apps and **model-driven** apps.
    Canvas apps are built by adding controls to blank canvas pages (hence the name).
    Controls are essentially the building blocks that users interact with through
    actions such as clicking buttons, adding text, or submitting forms. Model-driven
    apps, however, approach design from the opposite end of the spectrum. Model-driven
    apps are used to interact with structured data and derive their core architecture
    and interface component configurations from the connected data sources. For more
    information on canvas apps, see [https://learn.microsoft.com/en-us/power-apps/maker/canvas-apps/getting-started](https://learn.microsoft.com/en-us/power-apps/maker/canvas-apps/getting-started).
    For more information on model-driven apps, see [https://learn.microsoft.com/en-us/power-apps/maker/model-driven-apps/model-driven-app-overview](https://learn.microsoft.com/en-us/power-apps/maker/model-driven-apps/model-driven-app-overview).
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the data elements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you can start creating applications, you need to set up some structures
    to hold the data. Essentially, you’ll create a table with **columns** – you can
    think of it as a spreadsheet. In a Dataverse table, columns are configured to
    have a **type**, which equates to what type of data can be stored in them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Follow these steps to get started:'
  prefs: []
  type: TYPE_NORMAL
- en: Copilot availability
  prefs: []
  type: TYPE_NORMAL
- en: At the time of writing, the Dataverse portion of the Power Apps Maker Portal
    does not have a Copilot interface.
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Apps Maker Portal ([https://make.powerapps.com](https://make.powerapps.com))
    and select **Solutions**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What’s a solution?
  prefs: []
  type: TYPE_NORMAL
- en: '**Solutions** can be viewed as container objects that are used to transport
    applications and components between environments and implement **application life
    cycle management** (**ALM**) in Power Platform. A solution can be as simple as
    a single flow or include apps and components, such as site maps, apps, and tables.'
  prefs: []
  type: TYPE_NORMAL
- en: Click **New solution**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter a **Display name** value. The **Name** property will be automatically
    calculated, though you can edit it. Then, click **Create**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.3 – Creating a new solution](img/B21234_05_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.3 – Creating a new solution
  prefs: []
  type: TYPE_NORMAL
- en: 'Expand the **New** menu, point to **Table**, and select **Table**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.4 – Adding a table](img/B21234_05_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.4 – Adding a table
  prefs: []
  type: TYPE_NORMAL
- en: 'Enter a `Time off Table`. Select the **Enable attachments (including notes
    and files)** checkbox and click **Save**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.5 – Creating a new table](img/B21234_05_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.5 – Creating a new table
  prefs: []
  type: TYPE_NORMAL
- en: Updated terminology
  prefs: []
  type: TYPE_NORMAL
- en: '**Tables** were previously called **entities**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Click **New** > **Column**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.6 – Adding a column](img/B21234_05_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.6 – Adding a column
  prefs: []
  type: TYPE_NORMAL
- en: Updated terminology
  prefs: []
  type: TYPE_NORMAL
- en: '**Columns** were previously called **fields**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'On the `First name` in the **Display name** field, select **Single line of
    text** under **Data type**, and click **Save**. See *Figure 5**.7*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.7 – Configuring a column](img/B21234_05_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.7 – Configuring a column
  prefs: []
  type: TYPE_NORMAL
- en: 'Repeat *step 7* to create additional fields based on what’s shown in *Table
    5.1*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '| **Field name** | **Data type** | **Additional properties** | **Required**
    |'
  prefs: []
  type: TYPE_TB
- en: '| Last name | A single line of text |  | Business required |'
  prefs: []
  type: TYPE_TB
- en: '| Email | A single line of text | Format: Email | Business required |'
  prefs: []
  type: TYPE_TB
- en: '| Supervisor | A single line of text |  | Business required |'
  prefs: []
  type: TYPE_TB
- en: '| Supervisor Email | A single line of text | Format: Email | Business required
    |'
  prefs: []
  type: TYPE_TB
- en: '| Start date | Date and time | Date only | Business required |'
  prefs: []
  type: TYPE_TB
- en: '| End date | Date and time | Date only | Business required |'
  prefs: []
  type: TYPE_TB
- en: '| Request Type | Choice | Sync with global choice: NoChoice: VacationChoice:
    SickChoice: BereavementChoice: Jury Duty |  |'
  prefs: []
  type: TYPE_TB
- en: Table 5.1 – Dataverse fields
  prefs: []
  type: TYPE_NORMAL
- en: '9. From the Power Apps Maker Portal, expand **Tables** > **Views** and select
    **Active Time off Tables**. See *Figure 5**.8*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.8 – Activing Time off Tables](img/B21234_05_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.8 – Activing Time off Tables
  prefs: []
  type: TYPE_NORMAL
- en: '10. Drag the **First name**, **Last name**, **Start date**, and **End date**
    fields from the **Table columns** area into the main window:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.9 – Updating the view](img/B21234_05_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.9 – Updating the view
  prefs: []
  type: TYPE_NORMAL
- en: 11. Click **Save** **and publish**.
  prefs: []
  type: TYPE_NORMAL
- en: 12. Click **Back** to return to the **Objects** view.
  prefs: []
  type: TYPE_NORMAL
- en: '13. Expand **Tables** > **Time off Table** and select **Forms**. Select the
    form with **Form type** set to **Main**. See *Figure 5**.9*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.10 – Viewing the forms](img/B21234_05_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.10 – Viewing the forms
  prefs: []
  type: TYPE_NORMAL
- en: '14. Add the Dataverse columns you created earlier to the view, as shown in
    *Figure 5**.11*. When you’re finished, click **Save** **and publish**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.11 – Adding the Dataverse columns](img/B21234_05_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.11 – Adding the Dataverse columns
  prefs: []
  type: TYPE_NORMAL
- en: Next, it’s time to build the backend app.
  prefs: []
  type: TYPE_NORMAL
- en: Creating the model-driven backend app
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, you’ll configure a new model-driven app that managers will
    use for approving time-off requests. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Copilot availability
  prefs: []
  type: TYPE_NORMAL
- en: At the time of writing, Copilot is not available for working with model-driven
    apps.
  prefs: []
  type: TYPE_NORMAL
- en: 'Navigate to the Power Apps Maker Portal ([https://make.powerapps.com](https://make.powerapps.com)).
    Then, expand **Solutions** and select the **Time off** **Requests** solution:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.12 – Selecting the Time off Requests app](img/B21234_05_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.12 – Selecting the Time off Requests app
  prefs: []
  type: TYPE_NORMAL
- en: 'Click **New**, expand **App**, and select **Model-driven app**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.13 – Creating a new model-driven app](img/B21234_05_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.13 – Creating a new model-driven app
  prefs: []
  type: TYPE_NORMAL
- en: Enter a `Time off` `Back-end App`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Expand the **Advanced** dropdown and select **Use components from a custom
    solution**. Under **Solution**, select the **Time off Requests** solution and
    click **Create**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.14 – Setting the parameters for the new model-driven app](img/B21234_05_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.14 – Setting the parameters for the new model-driven app
  prefs: []
  type: TYPE_NORMAL
- en: Click **Back** to navigate back to the **Objects** page.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Site maps**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select the **Time off Back-end App** site map:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.15 – Viewing the site map](img/B21234_05_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.15 – Viewing the site map
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Area1** label, and then click **Add** from the menu. Select **Group**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add** and then click **Subarea**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Properties** pane, under **Type**, select **Entity**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Entity**, select **Time** **off Table**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.16 – Updating the site map](img/B21234_05_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.16 – Updating the site map
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save** **and Close**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Objects** view, with **Site maps** selected, click **Publish**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.17 – Publishing the site map](img/B21234_05_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.17 – Publishing the site map
  prefs: []
  type: TYPE_NORMAL
- en: 'Click **Apps** and then click **Publish** **all customizations**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.18 – Publishing app customizations](img/B21234_05_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.18 – Publishing app customizations
  prefs: []
  type: TYPE_NORMAL
- en: Open the app by clicking on it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'From the top menu, select **Play**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.19 – Running the application](img/B21234_05_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.19 – Running the application
  prefs: []
  type: TYPE_NORMAL
- en: 'On the app, click **New** to add a new record:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.20 – Creating a new record](img/B21234_05_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.20 – Creating a new record
  prefs: []
  type: TYPE_NORMAL
- en: 'Fill out the record, like so:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.21 – Creating a record](img/B21234_05_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.21 – Creating a record
  prefs: []
  type: TYPE_NORMAL
- en: With that, the model-driven app has been created. Now, it’s time to create the
    end user interface.
  prefs: []
  type: TYPE_NORMAL
- en: Creating the canvas frontend app
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The canvas app will be used by end users to create time off requests. Here,
    you’ll be able to use Copilot to help configure the app:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Apps Maker Portal ([https://make.powerapps.com](https://make.powerapps.com)).
    Then, expand **Solutions** and select the **Time off** **Requests** solution.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Apps**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **New** > **App** > **Canvas app**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the `Time off Requests`), select a format (either **Tablet** or **Phone**),
    and click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the navigation pane, select **Data**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Add data** and select **Office 365 Users connector**. On the flyout,
    click **Connect**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `Add a new form. Set the datasource for the form to ''Time` `off Tables''`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.22 – Adding a table and connecting to a data source](img/B21234_05_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.22 – Adding a table and connecting to a data source
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: It may take a few tries with Copilot to get the result you want. If it can’t
    connect to the data source, make sure you are entering the name just as it appears
    under **Tables**. You can open the properties of the form and select the **Data
    source** dropdown to choose it manually.
  prefs: []
  type: TYPE_NORMAL
- en: Under **Data source**, click **Edit fields**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **Add field**. Add the fields (columns) you created earlier:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.23 – Adding the remaining fields](img/B21234_05_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.23 – Adding the remaining fields
  prefs: []
  type: TYPE_NORMAL
- en: Update the default mode of the form by instructing Copilot to `Set the default
    mode of the selected form to New`. Alternatively, you can update the configuration
    by clicking the dropdown next to **Default mode** on the property sheet and choosing
    **New**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Instruct Copilot to `Add a button to Screen1\. Configure the button to submit
    the form and then navigate to Screen2`. Verify that the button’s `OnSelect` method
    displays the `SubmitForm(''FormName'');Navigate(''Screen2'')` function and references
    the form’s name. Drag the button to an appropriate location on the screen:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.24 – Adding a button to the screen](img/Image96731.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.24 – Adding a button to the screen
  prefs: []
  type: TYPE_NORMAL
- en: Instruct Copilot to `Update button text to` `say Submit`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Instruct Copilot to `Add a new screen using the Success template`. Alternately,
    select **New screen** > **Templates** > **Success** from the menu. By default,
    the screen will be named Screen2\. You should be directed to Screen2 automatically.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Instruct Copilot to `Add a text label on Screen2 that says "Thank you for submitting
    your request."` A new label should appear on the screen. Resize it so that all
    of the text is visible.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Instruct Copilot to `Add a button on Screen2 labelled "Start a new request"
    that navigates to Screen1 and resets the form`. A new button should be created
    that has the `Navigate(''Screen1'');ResetForm(''Form1'')` (or whatever your form
    name is). Drag it to an empty area of the screen and resize it so that all the
    text is visible. See *Figure 5**.25*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.25 – Finalizing the form](img/B21234_05_25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.25 – Finalizing the form
  prefs: []
  type: TYPE_NORMAL
- en: 'Click the **Play** button to test it out and add a record:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.26 – Testing the app](img/B21234_05_26.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.26 – Testing the app
  prefs: []
  type: TYPE_NORMAL
- en: After testing the app, click the **X** icon to close it. Then, click **Save**
    **and publish**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Publish** page, enter a brief description and click **Publish** **this
    version**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.27 – Publishing the app](img/B21234_05_27.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.27 – Publishing the app
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’ll use Power Automate to launch an approval.
  prefs: []
  type: TYPE_NORMAL
- en: Enabling automation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, you’ll use Power Automate to help automate processing and
    notifications:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Power Apps Maker Portal ([https://make.powerapps.com](https://make.powerapps.com)).
    Then, expand **Solutions** and select the **Time off** **Requests** solution.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Apps**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **New**, point to **Automation**, point to **Cloud flow**, and then select
    **Automated**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.28 – Creating a new flow](img/B21234_05_28.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.28 – Creating a new flow
  prefs: []
  type: TYPE_NORMAL
- en: 'On the **Build an automated cloud flow** wizard, enter a **Flow name** value
    and select the **When a row is added, modified, or deleted** Microsoft Dataverse
    trigger:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.29 – Choosing a trigger](img/B21234_05_29.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.29 – Choosing a trigger
  prefs: []
  type: TYPE_NORMAL
- en: Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Update the trigger. To do so, under **Change type**, select **Added**. Then,
    under **Table name**, select the **Time off Tables** option. Finally, under **Scope**,
    select **Organization**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.30 – Updating the trigger](img/B21234_05_30.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.30 – Updating the trigger
  prefs: []
  type: TYPE_NORMAL
- en: Click **New step**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `Start and wait` and select the **Start and wait for an approval** action,
    as shown in *Figure 5**.31*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.31 – Selecting the Start and wait for an approval action](img/B21234_05_31.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.31 – Selecting the Start and wait for an approval action
  prefs: []
  type: TYPE_NORMAL
- en: 'Using **dynamic content** tokens, fill in the approval:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.32 – Filling out the approval step](img/B21234_05_32.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.32 – Filling out the approval step
  prefs: []
  type: TYPE_NORMAL
- en: Click **New step** and select the **Condition** control.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the first `Approve`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.33 – Populating the condition](img/B21234_05_33.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.33 – Populating the condition
  prefs: []
  type: TYPE_NORMAL
- en: In the **If yes** branch, click **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Send an** **email (V2)**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Populate the email response with dynamic content tokens and text.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **If no** branch, click **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Send an** **email (V2)**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Populate the email response with dynamic content tokens and text.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Review the flow. See *Figure 5**.34*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 5.34 – Finishing the flow](img/B21234_05_34.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.34 – Finishing the flow
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once you’ve done this, you can launch the canvas app to input data and then
    check on the submitted data with the model-driven app. This way, the end users
    have a simple frontend to work with and managers or approvers have a larger view
    of the organization’s time off requests.
  prefs: []
  type: TYPE_NORMAL
- en: Further exploration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are several ways to increase the usability of these apps. For example,
    instead of accepting the default values for the requestor’s name or email address
    (as well as the manager’s name and address), you could automatically populate
    them by changing the **Default** property so that it utilizes the **Office365Users**
    connector:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5.35 – Changing the Default property](img/B21234_05_35.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5.35 – Changing the Default property
  prefs: []
  type: TYPE_NORMAL
- en: 'Try updating the controls with the values shown in *Table 5.2* to improve the
    usability of the app:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Field** | **Updated default** **property value** |'
  prefs: []
  type: TYPE_TB
- en: '| First name | `Office365Users.MyProfile().GivenName` |'
  prefs: []
  type: TYPE_TB
- en: '| Last name | `Office365Users.MyProfile().SurName` |'
  prefs: []
  type: TYPE_TB
- en: '| Email | `Office365Users.MyProfile().Mail` |'
  prefs: []
  type: TYPE_TB
- en: '| Supervisor | `Office365Users.Manager(Office365Users.MyProfile().UserPrincipalName).DisplayName`
    |'
  prefs: []
  type: TYPE_TB
- en: '| Supervisor email | `Office365Users.Manager(Office365Users.MyProfile().UserPrincipalName).Mail`
    |'
  prefs: []
  type: TYPE_TB
- en: Table 5.2 – Suggested default property values
  prefs: []
  type: TYPE_NORMAL
- en: While this particular solution isn’t the most complex, it can be used to demonstrate
    the capabilities of Power Platform and Copilot.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Copilot has the potential to be a really powerful addition to a citizen (and
    pro) developer’s toolbox. However, as you can see from our interactions with it,
    it’s neither foolproof nor a replacement for understanding how Power Platform
    works. At the time of writing, Dataverse and model-driven apps don’t have Copilot
    interfaces, nor does Power Automate when it’s started in the context of a Power
    Platform solution.
  prefs: []
  type: TYPE_NORMAL
- en: Copilot is still in its infancy, so you can expect it to get better over the
    coming months and years. That being said, if you need to build an app and you’re
    starting from a place of minimal Power Apps knowledge, you may want to start with
    some of the basics, such as *Learn Microsoft Power Apps, 2nd Edition*, by Matthew
    Weston and Elisa Barcena Martin.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll explore how to use some of the AI Builder tools that
    are part of Power Platform to analyze customer feedback.
  prefs: []
  type: TYPE_NORMAL
