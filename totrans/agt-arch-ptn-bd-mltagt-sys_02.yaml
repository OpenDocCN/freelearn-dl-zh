- en: The transformative potential of GenAI
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通用人工智能（GenAI）的变革潜力
- en: GenAI empowers systems by idx_ad42cef6synthesizing capabilities analogous to
    complex facets of human cognition. It moves beyond simple computation to engage
    in processes that resemble our own ability to create. Just as human imagination
    fuels art, storytelling, and invention, GenAI can create new or synthesized content.
    This includes generating coherent text (marketing copies, product descriptions,
    emails, social media posts, etc.), composing music, designing images, writing
    code, and producing other novel artifacts that are not mere copies of existing
    data but original outputs based on learned patterns and structures.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI通过合成能力赋予系统类似于人类认知复杂方面的能力。它超越了简单的计算，参与到类似于我们自身创造能力的过程。正如人类的想象力激发艺术、讲故事和发明一样，GenAI可以创建新的或合成的内容。这包括生成连贯的文本（营销文案、产品描述、电子邮件、社交媒体帖子等）、创作音乐、设计图像、编写代码以及产生其他新颖的成果，这些成果不是现有数据的简单复制，而是基于学习到的模式和结构产生的原创输出。
- en: GenAI synthesizes information from multiple sources and formats, uncovers patterns
    in the data it was trained on, and exhibits a form of analytical capability akin
    to human reasoning. It processes complex information, finds patterns in data,
    draws logical inferences, identifies significant relationships (even potential
    causal links), and constructs step-by-step approaches to solve problems or answer
    sophisticated questions. This allows it to ingest and understand context with
    remarkable depth, going beyond keyword matching to interpret nuances in language,
    consider conversational history, incorporate user preferences (user modeling),
    and even integrate external knowledge. This contextual understanding is crucial
    for providing responses that are not just relevant but truly appropriate to the
    specific situation, much like how humans adjust their communication based on subtle
    cues and shared background.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI从多个来源和格式中综合信息，揭示其训练数据中的模式，并展现出类似于人类推理的分析能力。它处理复杂信息，在数据中寻找模式，进行逻辑推理，识别重要关系（甚至潜在的因果关系），并构建逐步解决问题的方法或回答复杂问题。这使得它能够以非凡的深度理解和吸收上下文，超越关键词匹配，解释语言中的细微差别，考虑对话历史，整合用户偏好（用户建模），甚至整合外部知识。这种上下文理解对于提供不仅相关而且真正适合特定情境的回应至关重要，就像人类根据微妙线索和共同背景调整他们的沟通方式一样。
- en: Finally, this combination of pattern recognition and contextual understanding
    enables GenAI to make recommendations. Similar to how an experienced advisor might
    anticipate needs or provide personalized guidance, these systems can identify
    patterns in behavior or data to suggest relevant products, information pathways,
    or potential actions, thereby personalizing interactions and supporting decision-making
    processes. These synthesized abilities – *creating*, *reasoning*, *understanding
    context*, and *recommending* – are the foundation upon which GenAI's transformative
    potential is built.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这种模式识别和上下文理解相结合的能力使GenAI能够提供建议。类似于经验丰富的顾问可能会预测需求或提供个性化指导，这些系统可以识别行为或数据中的模式，以建议相关产品、信息路径或潜在行动，从而个性化互动并支持决策过程。这些综合能力——*创造*、*推理*、*理解上下文*和*推荐*——是GenAI变革潜力的基础。
- en: To bring these capabilities to life, GenAI relies on sophisticated underlying
    technologies. Prominent among these, and acting as the cognitive core for many
    generative applications, are powerful engines known idx_0b4500f6as **large language
    models** (**LLMs**). These models are specifically designed to understand, process,
    and generate human-like text and other forms of complex data, making them instrumental
    in how GenAI systems perceive, reason, and create.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这些能力得以实现，GenAI依赖于复杂的底层技术。在这些技术中，最为突出的是作为许多生成性应用认知核心的强大引擎，被称为**大型语言模型**（**LLMs**）。这些模型专门设计用于理解、处理和生成类似人类的文本和其他复杂数据，使它们在GenAI系统感知、推理和创造方面变得至关重要。
- en: 'While these core capabilities are powerful, their effective application hinges
    critically on one indispensable element: **context**. Think of LLMs like an incredibly
    knowledgeable and fluent conversationalist droppedidx_a052c8dd into a discussion
    mid-stream. Without understanding the preceding dialogue, the topic at hand, or
    the specific nuances of the situation, even the most articulate speaker would
    provide irrelevant, incorrect, or nonsensical contributions.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这些核心能力非常强大，但它们的有效应用关键取决于一个不可或缺的元素：**上下文**。想象一下，将一个知识渊博且流利的对话者突然放入一个讨论的中间，就像LLMs一样。如果没有理解先前的对话、当前的主题或特定情境的细微差别，即使是口才最好的说话者也会提供无关、错误或不合逻辑的贡献。
- en: Despite their considerable pretraining data, LLMs require relevant, timely,
    and accurate context to generate outputs that are truly useful, safe, and aligned
    with the desired task. Without sufficient context, LLMs can produce incorrect
    answers in several ways. Sometimes, they might generate responses that sound plausible
    but are factually incorrect or even nonsensical – this is referred to idx_dabf41e3as
    **hallucinations**. In other cases, the model might provide an answer that is
    factually correct in a general sense but inapplicable to and thus incorrect for
    the specific situation, primarily because crucial contextual details were missing.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管LLM有大量的预训练数据，但它们仍然需要相关、及时和准确的上下文来生成真正有用、安全和符合预期任务输出的结果。没有足够的上下文，LLM可能会以几种方式产生错误的答案。有时，它们可能会生成听起来合理但实际上是错误或甚至荒谬的响应——这被称为**幻觉**。在其他情况下，模型可能会提供一个在一般意义上事实正确但与特定情况不适用、因此错误的答案，主要是因为缺少关键上下文细节。
- en: Let's look at a case study. Consider an AI assistant designed to help a mortgage
    underwriter. The underwriter might ask, `What is the maximum allowable debt-to-income
    ratio for this application?`. An LLM, drawing on its general knowledge, might
    respond with `43 percent`. This answer isidx_d881149c factually correct as a common
    guideline for many idx_12a0b863conventional **q****ualified** **m****ortgages**
    (**QM****s**) in the US. However, suppose the unstated context is that the underwriter
    is idx_d7c60633evaluating a **Federal Housing Administration** (**FHA**) loan
    application for a borrower in Florida, seeking financing from a specific lender,
    MegaBank USA. In this specific context, the *43%* answer is likely incorrect and
    potentially misleading. FHA guidelines generally permit idx_c3f9dac9higher **debt-to-****i****ncome**
    (**DTI**) ratios, perhaps up to 50% or even 57% with certain compensating factors.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个案例研究。考虑一个旨在帮助抵押贷款承保人的AI助手。承保人可能会问，“这个申请的最大允许债务收入比是多少？”一个基于其一般知识的LLM可能会回答“43%”。这个答案在许多美国传统**合格抵押贷款**（QM）的常见指南中是事实正确的。然而，假设未声明的上下文是承保人在评估佛罗里达州借款人的**联邦住房管理局**（FHA）贷款申请，并从特定的贷款机构MegaBank
    USA寻求融资。在这种情况下，*43%*的答案可能是错误的，甚至可能是误导性的。FHA指南通常允许更高的**债务收入比**（DTI），可能高达50%甚至57%，在某些补偿因素下。
- en: 'MegaBank USA might also have its own internal lender overlays that impose a
    stricter cap, say 48%, even if FHA allows more. Additionally, state-specific regulations
    in Florida might add other nuances. The truly correct maximum DTI ratio depends
    entirely on the intersection of these contextual factors: the loan program (FHA),
    the applicant''s specific compensating factors, the lender''s specific policies
    (MegaBank USA overlays), and potentially, geographic regulations (Florida). The
    model needs this precise operational context, which goes far beyond general lending
    knowledge, to provide the correct and actionable answer for that specific underwriting
    task. Providing insufficient or ambiguous context is therefore a primary driver
    behind inaccurate or misleading outputs in complex, real-world scenarios.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: MegaBank USA也可能有自己的内部贷款覆盖层，施加更严格的限制，例如48%，即使FHA允许更多。此外，佛罗里达州的具体法规可能还会增加其他细微差别。真正正确的最大债务收入比（DTI）完全取决于这些上下文因素的交集：贷款计划（FHA）、申请人的具体补偿因素、贷款人的具体政策（MegaBank
    USA覆盖层），以及可能的地域性法规（佛罗里达）。模型需要这种精确的操作上下文，这远远超出了一般贷款知识，以提供针对特定承保任务的正确和可操作的答案。因此，提供不充分或模糊的上下文是复杂、现实场景中不准确或误导性输出的主要驱动因素。
- en: Throughout this book, we will dive deep into a number of foundational principles
    as takeaways, with principle number 1 being *context is king*.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在整本书中，我们将深入探讨一系列基础原则，并将原则编号1定为*上下文为王*。
- en: This is especially valid when working with GenAI within agentic systems (which
    we will talk about later in this chapter). You will learn that crafting effective
    initial prompts is only the beginning. To truly unlock reliable and high-quality
    results, particularly in complex, multi-step tasks performed by agents in enterprise
    settings where accuracy and trustworthiness are paramount, we must strive to architect
    systems that consistently equip the AI agent's reasoning core (often an LLM) with
    the right contextual information at the right time during its operational loop.
    This involves moving beyond reliance on the model's static internal knowledge,
    which can be outdated, incomplete, or lack crucial domain-specific details. Just
    as insufficient context can lead to contextually wrong answers (aka hallucinations)
    in a simple Q&A, within an agent, poor context management can derail planning,
    lead to incorrect actions, and undermine the agent's goals.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这在处理代理系统中的GenAI（我们将在本章后面讨论）时尤其有效。你将了解到，制定有效的初始提示只是开始。为了真正解锁可靠和高质量的结果，尤其是在企业环境中由代理执行的复杂多步骤任务中，准确性至关重要，我们必须努力构建系统，使AI代理的推理核心（通常是LLM）在操作循环的适当时间获得正确的上下文信息。这涉及到超越对模型静态内部知识的依赖，这些知识可能过时、不完整或缺乏关键领域特定细节。就像缺乏上下文可能导致简单的问答中出现上下文错误答案（即幻觉）一样，在代理中，上下文管理不善可能导致计划失败、采取错误行动，并损害代理的目标。
- en: This is where the **agentic design patterns** presentedidx_8f5e0c11 in this
    book become essential. As we will explore in detail in *Part* *2*, these patterns
    provide structured, repeatable solutions for common challenges in building agent-based
    systems, including the critical task ofidx_0cf8851e managing contextidx_75d1a50e
    effectively. Patterns such as the ***Task Delegation Framework***, ***Collaborative
    Task Decomposition***, or ***Iterative Debate for Robust Reasoning*** offer blueprints
    for designing idx_a3b6de8bagents and **multi-agent systems** that canidx_ba5eae6d
    handle idx_54874fe2complex information flows, maintain situational awareness,
    and refine their understanding or plans.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是本书中提出的**代理设计模式**变得至关重要的地方。正如我们将在*第2部分*中详细探讨的那样，这些模式为构建基于代理的系统中的常见挑战提供了结构化、可重复的解决方案，包括管理上下文的临界任务。例如，***任务委托框架***、***协作任务分解***或***稳健推理的迭代辩论***为设计**代理**和**多代理系统**提供了蓝图，这些系统能够处理复杂的信息流，保持情境意识，并完善他们的理解或计划。
- en: 'To understand this concept better, let''s idx_7e74ac0bbriefly look at an example
    of one such pattern that we will explore in detail later – ***Task Delegation
    Framework (Supervisor Architecture)***:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解这个概念，让我们简要地看看我们将要详细探讨的一个这样的模式示例——***任务委托框架（监督器架构）***：
- en: '**Context**: A financial institution needs to automate a complex, multi-step
    business process such as loan underwriting. A single, monolithic agent would struggle
    to manage all the different rules, data sources, and system interactions required.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文**：一家金融机构需要自动化一个复杂的多步骤业务流程，如贷款审批。一个单一的、单体代理将难以管理所有不同的规则、数据源和系统交互。'
- en: '**Problem**: How can this complex workflow be automated reliably, ensuring
    that each step is handled by an expert and the overall process is managed coherently
    from start to finish?'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**问题**：如何可靠地自动化这个复杂的流程，确保每个步骤都由专家处理，并且整个过程从开始到结束都能得到连贯的管理？'
- en: '**Solution using the** **p****attern**: The system is designed with a hierarchical
    structure using a central "supervisor" or "orchestrator" agent that acts as a
    project manager. This orchestrator doesn''t perform the individual checks itself.
    Instead, it receives the high-level task, decomposes it, and delegates the sub-tasks
    to a team of specialized "worker" agents.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用** **p** **模式的解决方案**：系统设计采用分层结构，使用一个中央的“监督器”或“协调器”代理，充当项目经理。这个协调器本身不执行单个检查。相反，它接收高级任务，将其分解，并将子任务委托给一组专门的“工人”代理。'
- en: '**Example in** **a****ction (****l****oan** **p****rocessing)**:'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动中的示例（贷款处理）**：'
- en: A `LoanOrchestratorAgent` (the supervisor) receives a new application.
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`LoanOrchestratorAgent`（监督器）接收一个新的申请。'
- en: It first delegates the task of verifying the submitted documents to a specialized
    `DocumentValidationAgent`.
  id: totrans-33
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它首先将验证提交的文件的任务委托给专门的`DocumentValidationAgent`。
- en: Once validated, it delegates the next task to a `CreditCheckAgent` to pull the
    applicant's credit history.
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦验证，它将下一项任务委托给`CreditCheckAgent`以获取申请人的信用记录。
- en: Finally, it sends all the verified information to a `RiskAssessmentAgent` for
    a final score.
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，它将所有经过验证的信息发送到`RiskAssessmentAgent`进行最终评分。
- en: '**Outcome**: The orchestrator gathers the outputs from each specialist agent
    and assembles the final result to make a decision. This pattern makes the entire
    workflow modular, predictable, and easier to govern, as each agent has a clearly
    defined idx_a5e866a3responsibility.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**：协调者收集每个专业代理的输出，组装最终结果以做出决策。这种模式使整个工作流程模块化、可预测且易于管理，因为每个代理都有一个明确定义的责任。'
- en: By considering these agentic design patterns during design and implementing
    them, we'll adhere to best practices and establish a stronger basis to design
    implicit guardrails into the architecture and the application. This provides boundaries
    for agent behavior, which increases the chances that decisions are better informed
    and actions are more likely to align with the required context. Also, these structured
    interactions, such as iterative debate or specific feedback loops built into patterns,
    create opportunities for *self-correction*, allowing an agent or a system of agents
    to catch inconsistencies or refine reasoning based on dynamically available context
    or peer review before taking potentially erroneous actions. Effectively leveraging
    these patterns is key to mitigating context-related failures and building more
    dependable, adaptable, and ultimately, more intelligent agents.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计和实施过程中考虑这些代理设计模式，我们将遵循最佳实践，并为将隐式护栏设计到架构和应用中建立一个更坚实的基础。这为代理行为提供了边界，增加了决策更加明智、行动更有可能与所需环境一致的可能性。此外，这些结构化交互，如迭代辩论或嵌入到模式中的特定反馈循环，为*自我纠正*创造了机会，使代理或代理系统在采取可能错误的行为之前，能够捕捉到不一致性或根据动态可用的环境或同行评审来细化推理。有效地利用这些模式对于减轻与上下文相关的失败、构建更可靠、更适应性强、最终更智能的代理至关重要。
- en: Therefore, a significant focus will be on techniques such as **retrieval-augmented
    generation** (**RAG**), which idx_a74340bddynamically fetches relevant information
    from external sources to inform an LLM's response. We will explore methods for
    grounding AI-generated answers in verifiable source material, providing citations
    and ensuring factual accuracy. We will also examine how leveraging more sophisticated
    data structures, including databases and knowledge graphs, can provide richer,
    more structured context, enabling more complex reasoning and more reliable outcomes
    for your AI agents. Mastering these techniques for managing and injecting context
    is fundamental to building practical and production-ready agentic AI solutions.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，重点将放在**检索增强生成**（**RAG**）等技术上，这些技术动态地从外部来源检索相关信息以告知LLM的响应。我们将探讨将AI生成的答案基于可验证的源材料的方法，提供引用并确保事实准确性。我们还将研究如何利用更复杂的数据结构，包括数据库和知识图谱，以提供更丰富、更有结构的上下文，从而为您的AI代理提供更复杂的推理和更可靠的成果。掌握这些管理上下文和注入上下文的技术对于构建实用和可生产的代理AI解决方案至关重要。
- en: 'Now that we''ve outlined the core concepts of GenAI, let''s connect theory
    to practice: examining its business applications will illustrate the real-world
    value of these capabilities and set the stage for the specific problems agentic
    AI can solve.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经概述了GenAI的核心概念，让我们将理论与实践相结合：探讨其商业应用将展示这些能力的实际价值，并为代理AI可以解决的特定问题奠定基础。
- en: Overview of business applications
  id: totrans-40
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 商业应用概述
- en: GenAI's versatility allows its application idx_385bc76facross various business
    functions (horizontal applications) and within the specific contexts of different
    industry domains (vertical applications).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI的通用性允许其在各种业务功能（横向应用）以及不同行业领域的特定环境中（纵向应用）得到应用。
- en: Horizontal applications (cross-functional use cases)
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 横向应用（跨职能用例）
- en: 'GenAI offers powerful tools to enhanceidx_52b3e5e5 efficiency and effectiveness
    across standard business operations:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI提供强大的工具来提高标准业务操作的效率和效果：
- en: '**Marketing and sales**: Moving idx_c22e33d8beyond basic personalization, GenAI
    enables hyper-personalized customer experiences and communications at scale. For
    instance, a cruise line could use GenAI to dynamically suggest onboard activities,
    dining reservations, or shore excursions tailored to individual passenger profiles
    (families, couples, adventure seekers, etc.) derived from past behavior and stated
    preferences. The system can incorporate feedback from these interactions to continuously
    refine its understanding and provide increasingly relevant future recommendations.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**营销和销售**：超越idx_c22e33d8b基本个性化，GenAI可以实现大规模的超级个性化客户体验和沟通。例如，一家邮轮公司可以使用GenAI根据乘客的个人档案（家庭、情侣、探险者等）动态建议船上活动、餐饮预订或岸上观光，这些档案基于过去的行为和声明的偏好。系统可以结合这些互动的反馈，不断优化其理解并提供越来越相关的未来推荐。'
- en: For targeted advertising, GenAI can facilitate a deeper understanding of customer
    buying patterns and the relationships between different products (potentially
    leveraging knowledge graphs), allowing for more nuanced campaign strategies than
    traditional predictive methods. It can also generate diverse creative assets such
    as targeted ad copy and campaign materials optimized for different segments and
    platforms.
  id: totrans-45
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于定向广告，GenAI可以促进对客户购买模式和不同产品之间关系的更深入理解（可能利用知识图谱），从而实现比传统预测方法更细致的营销策略。它还可以生成多样化的创意资产，如针对不同细分市场和平台的定向广告文案和营销材料。
- en: '**Customer service**: GenAI canidx_2b706176 power sophisticated chatbots and
    virtual assistants capable of providing 24/7 support. These agents can often handle
    complex inquiries independently, diving deep into knowledge bases or interacting
    with backend systems (e.g., checking order status and processing returns). They
    can be designed with the capability to recognize the limits of their knowledge
    or authority and intelligently escalate an issue to a human agent, potentially
    transferring the conversation context smoothly.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户服务**：GenAI可以idx_2b706176驱动复杂的聊天机器人和虚拟助手，提供24/7的支持。这些代理通常可以独立处理复杂的查询，深入知识库或与后端系统（例如，检查订单状态和处理退货）交互。它们可以设计成能够识别自己知识和权限的局限性，并智能地将问题升级给人类代理，可能还能平滑地转移对话上下文。'
- en: These agents can also adapt their communication style, adjusting their narrative,
    tone, and complexity based on the user, interacting differently with a teenager
    asking about a game update versus an adult inquiring about complex billing details.
  id: totrans-47
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这些代理还可以根据用户调整他们的沟通风格，根据用户的年龄、对话内容、语气和复杂性进行调整，与询问游戏更新的青少年和询问复杂账单细节的成年人进行不同的互动。
- en: '**Human resources**: Although idx_2a1e00cbGenAI can streamline recruitment
    tasks such as analyzing resumes against job descriptions or generating initial
    interview questions, its application in HR extends to establishing crucial guardrails
    and ethical guidelines. It can assist in developing personalized employee onboarding
    plans and training modules tailored to roles and learning styles.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人力资源**：尽管idx_2a1e00cbGenAI可以简化招聘任务，如分析简历与职位描述的匹配或生成初步面试问题，但其应用在人力资源领域不仅限于建立关键的安全线和道德准则。它可以帮助制定个性化的员工入职计划和针对不同角色和学习风格的培训模块。'
- en: In addition, GenAI can idx_89a6ea88enhance internal knowledge sharing by powering
    systems that answer employee questions about benefits, IT procedures, or company
    policies, ensuring consistency while acknowledging the human element and potential
    sensitivities involved in HR interactions.
  id: totrans-49
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此外，GenAI可以idx_89a6ea88通过提供系统来增强内部知识共享，这些系统可以回答员工关于福利、IT程序或公司政策的问题，确保一致性，同时承认人力资源互动中涉及的人性因素和潜在的敏感性。
- en: '**Finance and accounting**: Beyond idx_0e41e40aautomating financial analysis
    and assisting with report generation, GenAI plays a critical role in areas requiring
    high degrees of accuracy and control. It significantly improves anomaly and fraud
    detection by identifying subtle patterns indicative of illicit activity.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融和会计**：除了idx_0e41e40a自动化财务分析和协助报告生成外，GenAI在需要高度准确性和控制力的领域发挥着关键作用。它通过识别非法活动的细微模式，显著提高了异常和欺诈检测能力。'
- en: An important factor for regulated industries, GenAI can be employed to help
    enforce policy adherence and implement financial guardrails, ensuring that processes
    and recommendations align with internal rules and external regulations.
  id: totrans-51
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于受监管的行业来说，GenAI可以用来帮助执行政策遵守和实施财务安全线，确保流程和建议与内部规则和外部法规保持一致。
- en: '**Operations and supply chain**: GenAIidx_9824b530 can be used to enhance operational
    efficiency by interpreting outputs from predictive AI models and initiating actions.
    For example, it can optimize inventory levels by analyzing and acting upon complex
    demand forecasts (often generated by predictive models), perhaps by automatically
    adjusting stock orders.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营和供应链**：GenAI可以通过解释预测AI模型的输出并采取行动来提高运营效率。例如，它可以通过分析和采取复杂的预测需求（通常由预测模型生成）来优化库存水平，可能通过自动调整库存订单来实现。'
- en: GenAI can streamlineidx_fdaca33b logistics by processing dynamic routing suggestions
    (which might incorporate predictive traffic/weather data) and coordinating dispatch.
    It can improve production line management and enable predictive maintenance by
    interpreting alerts from predictive models, analyzing sensor data, and automatically
    generating detailed maintenance work orders or rescheduling production runs to
    accommodate the needed service.
  id: totrans-53
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: GenAI可以通过处理动态路由建议（可能包含预测交通/天气数据）和协调调度来简化物流流程。它可以通过解释预测模型的警报、分析传感器数据以及自动生成详细的维护工作单或重新安排生产运行以适应所需服务，从而改善生产线管理并实现预测性维护。
- en: '**IT** **and** **development**: GenAI idx_1e392fd2can accelerate software development
    through code generation; for instance, it could generate Python boilerplate code
    for a common web framework API endpoint or create complex SQL queries based on
    natural language descriptions of the desired data. It can assist with automated
    debugging by analyzing error logs and code snippets and suggesting potential root
    causes and code fixes.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IT和开发**：GenAI可以通过代码生成加速软件开发；例如，它可以生成常见Web框架API端点的Python模板代码或根据所需数据的自然语言描述创建复杂的SQL查询。它可以通过分析错误日志和代码片段，并建议潜在的根源和代码修复来协助自动化调试。'
- en: It can also facilitate code refactoring by suggesting optimizations or translating
    code between languages, and idx_5323b549automatically generate diverse test cases
    for functions based on their signatures and requirements.
  id: totrans-55
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 它还可以通过建议优化或在不同语言之间转换代码来促进代码重构，并基于函数的签名和要求自动生成多样化的测试用例。
- en: '**General productivity**: GenAI canidx_5ea506f7 automate document summarization
    by condensing lengthy research papers into key findings, summarizing complex legal
    contracts into plain language points, or extracting action items from long meeting
    transcripts.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通用生产力**：GenAI可以通过将冗长的研究论文压缩为关键发现、将复杂的法律合同总结为简单的语言要点，或从冗长的会议记录中提取行动项目来自动化文档摘要。'
- en: It enhances informationidx_a741e0d6 retrieval and enterprise search by allowing
    users to ask complex questions in natural language (e.g., *What were the main
    concerns raised by European customers in Q4 feedback?*) and receive synthesized
    answers drawn from multiple internal reports and documents, rather than just a
    list of links. GenAI has the ability to generate synthetic data to augment datasets,
    for example, by generating realistic but artificial customer profiles or transaction
    records to train fraud detection models without using sensitive real data, or
    by balancing datasets for ML training.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 它通过允许用户用自然语言提出复杂问题（例如，“在欧洲客户Q4反馈中提出了哪些主要担忧？”）并从多个内部报告和文档中获取综合答案来增强信息检索和企业搜索，而不是仅仅提供链接列表。GenAI有能力生成合成数据来增强数据集，例如，通过生成真实但人工的客户档案或交易记录来训练欺诈检测模型，而无需使用敏感的实时数据，或者通过平衡数据集来为机器学习训练提供平衡。
- en: Vertical or domain-specific applications
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 垂直或特定领域的应用
- en: 'Beyond general functions, GenAI isidx_07013b2d being tailored to address the
    unique challenges idx_0f064feeand opportunities within specific industries:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 除了通用功能之外，GenAI正在针对特定行业内的独特挑战和机遇进行定制：
- en: '**Healthcare**: GenAIidx_a4b242e2 accelerates drug discovery by analyzing simulation
    results and proposing potential candidates. It assists in medical diagnosis by
    interpreting outputs from predictive models, such as explaining high-risk patient
    scores or summarizing findings from automated medical image analyses, for clinician
    review.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医疗保健**：GenAI通过分析模拟结果和提出潜在候选者来加速药物发现。它通过解释预测模型的输出，如解释高风险患者评分或总结自动医学图像分析的发现，以供临床医生审查，从而协助医疗诊断。'
- en: GenAI can generate initial drafts of clinical documentation (such as discharge
    summaries) that adhere to established clinical standards and privacy regulations
    (e.g., HIPAA), using structured data inputs. It can develop personalized treatment
    plans by synthesizing patient data and research, ensuring that all suggestions
    comply with strict clinical policy guardrails and ethical guidelines.
  id: totrans-61
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: GenAI可以使用结构化数据输入生成符合既定临床标准和隐私法规（例如，HIPAA）的临床文档（如出院总结）的初始草稿。它可以通过综合患者数据和研究成果制定个性化的治疗方案，确保所有建议都符合严格的临床政策限制和道德指南。
- en: '**Finance**: GenAI can idx_51f06ae0enhance algorithmic trading strategies by
    interpreting signals and proposing actions based on data from predictive market
    models, all within predefined risk parameters. It can improve credit risk assessment
    by synthesizing reports that interpret predictive risk scores alongside qualitative
    application data, ensuring that recommendations align with lending policies and
    fairness guidelines.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金融**: GenAI可以通过解释预测市场模型的数据并基于预定义的风险参数提出行动，从而增强算法交易策略。它可以通过综合解释预测风险分数和定性申请数据的报告来改善信用风险评估，确保建议与贷款政策和公平指南一致。'
- en: GenAI can automate the drafting of regulatory compliance reports by using structured
    data and regulatory templates, while ensuring that all outputs undergo human verification
    and adhere to internal compliance guardrails. It can provide personalized financial
    advice by generating AI-driven recommendations that strictly follow suitability
    regulations, such asidx_d64e19e6 the SEC's **Regulation Best Interest** (**Reg
    BI**), as idx_e4e1a097well as internal policies and ethical standards, ensuring
    responsible and compliant guidance.
  id: totrans-63
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: GenAI可以通过使用结构化数据和监管模板自动编制合规性报告，同时确保所有输出都经过人工验证，并遵守内部合规性限制。它可以提供个性化的财务建议，通过生成遵循适用性法规的AI驱动建议，例如idx_d64e19e6
    SEC的**最佳利益监管规则**（**Reg BI**），以及内部政策和道德标准，确保负责任和合规的指导。
- en: '**Retail**: GenAI idx_285189b6can offer hyper-personalized product recommendations
    and shopping experiences by generating curated *style bundles* based on a customer''s
    purchase history and browsing behavior/history, and by enabling virtual try-ons
    that show how clothing items appear on personalized avatars.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零售**: GenAI idx_285189b6可以基于客户的购买历史和浏览行为/历史，生成定制的*风格组合*，提供超个性化的产品推荐和购物体验，并通过启用虚拟试穿功能，展示服装物品在个性化头像上的外观。'
- en: It can optimize dynamic pricing by adjusting prices in real time, taking into
    account demand, competitor pricing, and inventory levels. Additionally, it can
    automate the creation of targeted promotions, for example, drafting email campaigns
    with personalized offers tailored to customer segments identified through purchasing
    patterns.
  id: totrans-65
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 它可以通过实时调整价格来优化动态定价，考虑需求、竞争对手定价和库存水平。此外，它还可以自动化创建有针对性的促销活动，例如，起草针对通过购买模式识别的客户细分市场的个性化优惠的电子邮件营销活动。
- en: '**Manufacturing**: GenAI optimizesidx_268519d1 complex production scheduling
    and resource allocation in dynamic factory environments by considering machine
    availability, material constraints, and order priorities. It enhances quality
    control through automated visual inspection systems by analyzing images from the
    production line to detect subtle defects or inconsistencies in products more accurately
    than traditional methods.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**制造**: GenAI通过考虑机器可用性、材料限制和订单优先级，优化动态工厂环境中的复杂生产调度和资源分配。它通过分析生产线上的图像，使用自动视觉检查系统提高质量控制，比传统方法更准确地检测产品中的细微缺陷或不一致性。'
- en: It utilizes generativeidx_109f8fc1 design techniques to propose novel, material-efficient
    designs for parts based on specified performance constraints (e.g., load-bearing
    capacity, weight limits, etc.), often resulting in optimized structures suitable
    for additive manufacturing.
  id: totrans-67
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 它利用生成idx_109f8fc1设计技术，根据指定的性能限制（例如，承重能力、重量限制等）提出新颖、材料效率高的零件设计，通常产生适合增材制造的优化结构。
- en: After this overview of GenAI in the context of business applications, let's
    explore agentic systems and where they fit in this landscape we are describing.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在此概述GenAI在商业应用中的情况之后，让我们探讨代理型系统及其在我们所描述的景观中的位置。
- en: Introducing agentic AI systems
  id: totrans-69
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍代理型AI系统
- en: While the applications just discussed cover a wide range of GenAI uses, a significant
    focus of modern AI development, and idx_2a3461c2indeed this book, is on **agentic
    AI systems**. These systems represent a step toward more autonomous, goal-oriented
    AI applications, leveraging the core GenAI capabilities in a more integrated and
    proactive manner.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管刚才讨论的应用涵盖了广泛的 GenAI 应用，但现代人工智能发展的一个重要焦点，以及这本书的重点，确实是 **代理人工智能系统**。这些系统代表了向更自主、目标导向的人工智能应用迈出的一步，更集成和主动地利用了核心
    GenAI 能力。
- en: An **AI agent** can be idx_52cd54c0understood as a system, often powered by
    LLMs, designed to perceive its environment, make decisions, and take actions to
    achieve specific goals. Key characteristics often include *autonomy*, *reactivity*
    (responding to the environment), *proactivity* (taking initiative toward goals),
    and, potentially, *social ability* to interact with other agents. They typically
    operate in a characteristic loop involving sensing, reasoning, planning, and acting
    – the specific anatomy of which we will dissect shortly. Understanding this operational
    cycle and the agent's components is key to designing effective agentic solutions.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 **AI 代理** 可以理解为一种系统，通常由 LLM 驱动，旨在感知其环境、做出决策并采取行动以实现特定目标。关键特征通常包括 *自主性*、*反应性*（对环境的响应）、*主动性*（向目标采取主动）以及，可能还有
    *社交能力*，以与其他代理进行交互。它们通常在一个特征循环中运行，涉及感知、推理、规划和行动——我们将在稍后剖析其具体解剖结构。理解这个操作周期和代理的组件对于设计有效的代理解决方案至关重要。
- en: 'We can broadly categorize agentic systems as follows:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以广泛地将代理系统分类如下：
- en: '**Agent-based systems**: Oftenidx_6ef93d26 involve a single agent tackling
    tasks, leveraging its capabilities to interact with systems or data.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于代理的系统**：通常 idx_6ef93d26 涉及单个代理处理任务，利用其能力与系统或数据进行交互。'
- en: '**Multi-agent system****s**: Employ idx_9336a669multiple, often specialized,
    agents that collaborate, coordinate, and communicate to solve more complex problems.
    Multi-agent systems emphasize decentralized control and dynamic interaction between
    agents.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多代理系统** idx_9336a669：使用多个，通常是专业的代理进行协作、协调和通信，以解决更复杂的问题。多代理系统强调去中心化控制和代理之间的动态交互。'
- en: Understanding the concept of idx_57f06f9fagents and agentic systems is crucial
    as we move toward more sophisticated AI implementations. These systems often encapsulate
    the advanced capabilities of GenAI and are central to unlocking higher levels
    of automation, complex problem-solving, and ultimately, business value. Recognizing
    this potential and learning how to architect these systems effectively, starting
    with their fundamental anatomy, is a primary goal of this book.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们迈向更复杂的 AI 实现，理解 idx_57f06f9f 代理和代理系统的概念至关重要。这些系统通常封装了 GenAI 的高级能力，是解锁更高水平自动化、复杂问题解决和最终商业价值的关键。认识到这种潜力，并学习如何有效地构建这些系统，从它们的基本解剖结构开始，是本书的主要目标。
- en: The anatomy of agentic AI
  id: totrans-76
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理人工智能的解剖结构
- en: Let's elaborate on theidx_dc471266 structure of agentic AI and how these systems
    operate internally.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们详细探讨 agentic AI 的 idx_dc471266 结构以及这些系统内部是如何运作的。
- en: '![Image 1](img/B33147_1_1.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片 1](img/B33147_1_1.png)'
- en: Figure 1.1 – Agentic anatomy by Dr. Ali Arsanjani
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.1 – 阿里·阿桑贾尼博士的代理解剖图
- en: The preceding diagramidx_ab4a3743 conceptually illustrates an agentic AI architecture,
    involving multiple agents collaborating within an environment. Understanding the
    core components is essential for design and implementation.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的 idx_ab4a3743 图概念性地展示了代理人工智能架构，涉及多个代理在环境中的协作。理解核心组件对于设计和实现至关重要。
- en: Core components
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核心组件
- en: The primary building blocks are the agents idx_023c2d01themselves and the environments
    (business or physical) they interact with. In a multi-agent system architecture,
    each agent operates semi-autonomously, perceiving its environment, reasoning,
    making decisions, and acting to achieve goals. Interactions occur within digital
    contexts (data feeds, APIs, and databases) and potentially physical ones (via
    sensors/actuators). In multi-agent idx_72dc11c1systems, a **shared memory** or
    **communication protocol** oftenidx_6b2c445a acts as a hub for coordination, allowing
    agents to exchange information, plans, and goals.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 主要构建块是智能体idx_023c2d01自身以及它们与之交互的环境（商业或物理环境）。在多智能体系统架构中，每个智能体半自主地运行，感知其环境、推理、做出决策并采取行动以实现目标。交互发生在数字环境中（数据流、API和数据库）以及可能的物理环境中（通过传感器/执行器）。在多智能体idx_72dc11c1系统中，**共享记忆**或**通信协议**通常idx_6b2c445a充当协调中心，允许智能体交换信息、计划和目标。
- en: Agent anatomy
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 智能体解剖
- en: 'Each individual agent possesses an internal structure enabling its function:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 每个个体智能体都拥有一个内部结构，使其能够发挥作用：
- en: '**Goals**: Theidx_21d19891 objectives or desired outcomes the agent seeks to
    achieve, which may be updated based on feedback or changing context.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：idx_21d19891智能体寻求实现的目标或期望的结果，这些目标可能根据反馈或变化的环境进行更新。'
- en: '**Sense (****p****erception)**: Thisidx_65233d3e component is how the agent
    gathers information and data from its environment (digital or physical sources
    such as APIs, databases, and sensors). This perception process is the agent''s
    mechanism for acquiring context, the situational awareness that is critical for
    all subsequent reasoning and decision-making, reinforcing the principle that "context
    is king." One popular mechanism to standardize how models idx_99b1de98access this
    contextual information is through protocols such as the **Model Context Protocol**
    (**MCP**) from idx_9e842067Anthropic ([http://anthropic.ai/](https://http://anthropic.ai/)).'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**感知（**感知**）**：idx_65233d3e这个组件是智能体从其环境（数字或物理来源，如API、数据库和传感器）收集信息和数据的方式。这个感知过程是智能体获取上下文、对后续推理和决策至关重要的情境意识，强化了“上下文为王”的原则。一种流行的机制是通过协议（如来自idx_9e842067Anthropic的**模型上下文协议**（**MCP**））标准化模型访问上下文信息的方式（[http://anthropic.ai/](https://http://anthropic.ai/))。'
- en: '**Reason (****t****hinking models,** **c****ognition)**: The idx_c93bac48core
    processing unit where sensed information is analyzed. This often heavily involves
    LLMs for interpreting data, understanding relationships (between goals, perception,
    and actions), and complex inference.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理（**思考模型**，**认知**）：idx_c93bac48核心处理单元，用于分析感知信息。这通常涉及大量使用LLMs来解释数据、理解关系（目标、感知和行动之间的关系）以及进行复杂推理。'
- en: '**Plan**: Devising a idx_92432230course of action or sequence of steps based
    on the reasoned insights and current goals.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计划**：根据推理洞察和当前目标制定行动方案或步骤序列。'
- en: '**Act (****a****ction)**: Executing idx_ffce658ethe planned actions upon the
    environment using available tools (e.g., calling APIs, controlling robotic elements,
    and generating text).'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行动（**行动**）**：使用可用的工具（例如调用API、控制机器人元素和生成文本）在环境中执行计划中的行动。'
- en: '**Memory**: Stores theidx_6ab89f09 agent''s individual knowledge, past experiences,
    internal state, and learned information, providing context for decision-making.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**记忆**：存储idx_6ab89f09智能体的个体知识、过往经验、内部状态和所学信息，为决策提供上下文。'
- en: '**Coordinate (****o****ptional; only for** **multi-agent system****s****)**:
    Interacting with other agents, often via sharedidx_221351e1 memory or communication
    protocols, to align actions and collaborate toward collective goals. This may
    involve negotiation or following specific protocols. This coordination is specifically
    recommended to occur via the **a****gent-to-****a****gent** (**A2A**) interoperability
    idx_d2a38defprotocol.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协调（**可选；仅适用于**多智能体系统**）**：与其他智能体交互，通常通过共享idx_221351e1记忆或通信协议，以协调行动并共同实现集体目标。这可能涉及协商或遵循特定协议。这种协调特别建议通过**智能体到智能体**（**A2A**）互操作性idx_d2a38def协议进行。'
- en: The agent's ability to act is typically enabled by a mechanism idx_569ae05dknown
    as **function calling**. To instruct the LLM, developers provide it with a list
    of available tools. Each tool is defined with a name, a clear description of its
    purpose, and a structured schema of its required parameters. Based on the ongoing
    task, the LLM's reasoning core decides when to use a tool, which tool is most
    appropriate, and what parameters to use. The model then generates a structured
    output, such as a JSON object, signaling its intent to call that function with
    the extracted arguments. The agent's code receives this, executes the function,
    and feeds the result back to the LLM to continue its operational loop.
  id: totrans-92
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 代理的执行能力通常由一种称为**函数调用**的机制idx_569ae05d启用。为了指导LLM，开发者向它提供一组可用的工具。每个工具都定义了名称、其目的的清晰描述以及其所需参数的结构化模式。根据持续的任务，LLM的推理核心决定何时使用工具、哪个工具最合适以及使用哪些参数。然后，模型生成一个结构化输出，例如JSON对象，表示其打算使用提取的参数调用该函数。代理的代码接收此信息，执行函数，并将结果反馈给LLM以继续其操作循环。
- en: 'Agents idx_890ff2c9operate in a continuous loop: sensing the environment, reasoning
    about the situation using their memory and LLM core, planning the next action
    toward their goals, acting upon the environment, and then sensing the results
    (a feedback loop) to update their memory and inform subsequent cycles. This allows
    for adaptation and learning over time.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: Agents idx_890ff2c9在连续循环中操作：感知环境，使用他们的记忆和LLM核心对情况进行分析，规划向目标采取的下一步行动，对环境进行操作，然后感知结果（反馈循环）以更新他们的记忆并告知后续周期。这允许随着时间的推移进行适应和学习。
- en: '![Image 2](img/B33147_1_2.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![Image 2](img/B33147_1_2.png)'
- en: Figure 1.2 – The agentic loop
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.2 – 代理循环
- en: This diagram shows the cyclical process that enables an agent to function autonomously.
    It begins by sensing the environment to gather context, then uses its LLM core
    and memory to reason about the situation and create a plan. The agent then acts
    on that plan using its available tools. The results of this action create a feedback
    loop, providing new information that the agent senses in the next cycle, allowing
    it to learn and adapt its behavior over time.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 此图显示了使代理能够自主运行的循环过程。它从感知环境以收集上下文开始，然后使用其LLM核心和记忆对情况进行分析并制定计划。代理随后使用其可用的工具执行该计划。此行动的结果创建了一个反馈循环，为代理在下一个周期中感知的新信息提供，使其能够随着时间的推移学习和适应其行为。
- en: Data stores and environment context
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据存储和环境上下文
- en: 'Agents rely heavily on data. Their environment contextidx_69a047ff includes
    the following:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 代理高度依赖数据。他们的环境上下文idx_69a047ff包括以下内容：
- en: '**Digital business context**: This idx_24614e7aincludes relevant digital data
    idx_6fda5527sources such as unstructured data (text or images), structured data
    (databases or knowledge graphs), and vector stores (for efficient similarity search
    on embeddings). Knowledge graphs are particularly useful for providing a structured,
    semantic understanding of entities and relationships.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数字业务上下文**：这idx_24614e7a包括相关的数字数据idx_6fda5527来源，如非结构化数据（文本或图像）、结构化数据（数据库或知识图谱）和向量存储（用于在嵌入上进行高效的相似性搜索）。知识图谱对于提供实体和关系的结构化、语义理解特别有用。'
- en: '**Physical environment context**: For idx_eb89c7e5agents interacting idx_b7dcec14with
    the real world, this involves sensors providing data (cameras or IoT devices)
    and actuators allowing physical manipulation (robotic arms).'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**物理环境上下文**：对于与真实世界交互的idx_eb89c7e5agents，这涉及到提供数据（摄像头或物联网设备）的传感器和允许物理操作（机器人臂）的执行器。'
- en: Effective agents often need access to multiple data stores and must integrate
    information from diverse contexts.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的代理通常需要访问多个数据存储，并必须整合来自不同上下文的信息。
- en: Key architectural features
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键架构特性
- en: Agentic anatomy inherentlyidx_8246385a enables several powerful idx_a0086a23architectural
    features. **Modularity** is often a core principle, allowing systems to be designed
    such that agents can be added, removed, or updated without necessitating a complete
    overhaul, thus providing flexibility. This modularity contributes idx_da03e682to
    **scalability**, as the architecture must be prepared to handle potentially large
    numbers of agents, complex interactions, and diverse data sources efficiently.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 代理解剖结构内在地idx_8246385a使几个强大的idx_a0086a23架构特性成为可能。**模块化**通常是核心原则，允许系统设计成可以添加、删除或更新代理，而无需进行全面改造，从而提供灵活性。这种模块化有助于**可扩展性**，因为架构必须准备好高效地处理可能的大量代理、复杂交互和多样化的数据源。
- en: The internal sense-reason-act loop, combined with memory and feedback mechanisms,
    facilitates **adaptability**, enablingidx_751c42c0 agents to learn from experience
    and adjust their behavior over time. Furthermore, agents can be designed for **multimodal
    interaction**, processing information, andidx_a0684215 acting upon environments
    using various data types such as text, images, or sensor readings.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 内部感知-推理-行动循环，结合记忆和反馈机制，促进**适应性**，使智能体能够从经验中学习并随着时间的推移调整其行为。此外，智能体可以被设计为**多模态交互**，处理来自不同模态（文本、图像或传感器读数）的信息并采取行动。
- en: Finally, particularly in multi-agent systems, mechanisms such as shared memory
    or defined communication protocols idx_a337f74ffoster **collaboration**, leading
    to enhanced collective problem-solving and decision-making capabilities.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，尤其是在多智能体系统中，诸如共享内存或定义的通信协议等机制可以促进**协作**，从而增强集体问题解决和决策能力。
- en: '| **Feature** | **Description** |'
  id: totrans-106
  prefs: []
  type: TYPE_TB
  zh: '| **特征** | **描述** |'
- en: '| --- | --- |'
  id: totrans-107
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Modularity | Systems can often be designed so agents can be added or removed
    without a complete redesign, allowing flexibility. |'
  id: totrans-108
  prefs: []
  type: TYPE_TB
  zh: '| 模块化 | 系统通常可以设计为智能体可以添加或删除而无需完全重新设计，从而提供灵活性。|'
- en: '| Scalability | Architectures must handle potentially many agents, diverse
    data sources, and complex interactions efficiently. |'
  id: totrans-109
  prefs: []
  type: TYPE_TB
  zh: '| 可扩展性 | 架构必须高效地处理可能有很多智能体、多样化的数据源和复杂的交互。|'
- en: '| Adaptability | The sense-reason-act loop with memory and feedback enables
    agents to learn and adjust behavior over time. |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
  zh: '| 适应性 | 带有记忆和反馈的感知-推理-行动循环使智能体能够随着时间的推移学习和调整行为。|'
- en: '| Multimodal interaction | Agents can be designed to process and act upon information
    from different modalities (text, image, or sensor data). |'
  id: totrans-111
  prefs: []
  type: TYPE_TB
  zh: '| 多模态交互 | 智能体可以被设计为处理和行动于来自不同模态（文本、图像或传感器数据）的信息。|'
- en: '| Collaboration (multi-agent systems) | Shared memory or communication protocols
    facilitate coordination, enabling collective problem-solving. |'
  id: totrans-112
  prefs: []
  type: TYPE_TB
  zh: '| 协作（多智能体系统） | 共享内存或通信协议促进协调，使集体问题解决成为可能。|'
- en: Table 1.1 – Agentic anatomy features
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1.1 – 智能体解剖特征
- en: Building robust and effective agentic systems, based on the anatomy we've described,
    is a technically demanding endeavor. It's not simply a matter of assembling components;
    it requires establishing a developmental journey where capabilities are progressively
    mastered.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 基于我们所描述的解剖结构，构建稳健且有效的智能体系统是一项技术要求很高的任务。这不仅仅是组装组件的问题；它需要建立一个能力逐步掌握的发展历程。
- en: Careful attention must be paid to critical technical aspects at each stage.
    Architects must design for scalability to handle growth in agent numbers and data
    complexity. Efficient and low-latency inter-agent communication becomes vital
    for collaborative multi-agent systems.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个阶段都必须仔细关注关键的技术方面。架构师必须设计可扩展性以处理智能体数量和数据复杂性的增长。对于协作的多智能体系统，高效且低延迟的智能体间通信变得至关重要。
- en: Sophisticated data processing techniques are needed to manage diverse data types
    effectively, while leveraging advanced knowledge representation, such as knowledge
    graphs, can unlock deeper reasoning. Furthermore, ensuring optimal LLM integration
    for core cognitive functions and implementing reliable tool use mechanisms for
    environmental interaction are idx_031bbbbffundamental engineering challenges.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 需要复杂的数据处理技术来有效管理多种数据类型，同时利用高级知识表示，如知识图谱，可以解锁更深入的推理。此外，确保核心认知功能的最佳 LLM 集成以及实施可靠的环境交互工具使用机制是**基本工程挑战**。
- en: Mastering these technical considerations typically doesn't happen overnight;
    it reflects a maturing capability within an organization. Going through this technical
    journey usually means moving step by step through different stages, a process
    explained by models such as the **GenAI Maturity Model**, which idx_ad4ec036we'll
    look at next.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，掌握这些技术考虑因素不会一蹴而就；它反映了组织内能力的成熟。经历这一技术旅程通常意味着逐步通过不同的阶段，这个过程可以通过如**GenAI 成熟度模型**等模型来解释，我们将在下一部分探讨。
- en: 'The GenAI Maturity Model: a path to agentic systems'
  id: totrans-118
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GenAI 成熟度模型：通往智能体系统的路径
- en: Navigating the GenAI journey from simple applications to sophisticated, value-driving
    systems, such as those whose anatomy we just discussed, requires a strategic perspective.
    The GenAI Maturity Modelidx_c36011cd provides such a framework, serving as a strategic
    tool for organizations to assess their current capabilities and chart a course
    forward.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 从简单的应用导航到复杂、价值驱动的系统，如我们刚才讨论的系统，需要战略视角。GenAI成熟度模型idx_c36011cd提供了一个这样的框架，作为组织评估其当前能力并规划前进道路的战略工具。
- en: It outlines distinct levels of capability and sophistication, illustrating the
    typical progression from foundational activities toward advanced agentic systems.
    Understanding an organization's position on this model helps tailor investment,
    skill development, and implementation efforts to achieve desired business outcomes.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 它概述了不同的能力和复杂程度，展示了从基础活动到高级代理系统的典型进展。了解组织在这个模型中的位置有助于调整投资、技能发展和实施工作，以实现预期的业务成果。
- en: Importantly, advancing through these levels, particularly toward agentic and
    multi-agent systems (Levels 5 and 6), often necessitates embracing new standards
    for interoperability.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，在通过这些级别，尤其是向代理和多代理系统（第5级和第6级）发展时，通常需要接受新的互操作性标准。
- en: 'The key levels on this path idx_617ff500include the following:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在这条路径上的关键级别包括以下内容：
- en: '**Level 0** **–** **Prepare data for AI consumption (data foundation)**: The
    essential starting point. Focuses on acquiring, generating (including synthetic
    data), cleaning, curating, preparing, and governing the data needed for AI. Addresses
    data quality, relevance, licensing, and accessibility. Without a solid data foundation,
    higher levels are difficult to achieve.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第0级** **–** **为AI准备数据（数据基础）**：基本起点。专注于获取、生成（包括合成数据）、清理、整理、准备和治理AI所需的数据。涉及数据质量、相关性、许可和可访问性。没有坚实的数据基础，难以达到更高级别。'
- en: '**Level 1** **–** **Select model(s) and prompt/serve models**: Entry-level
    interaction. Involves selecting suitable pretrained foundation models, designing
    effective prompts (**prompt engineering**) to elicitidx_547d38c7 desired responses,
    and deploying (serving) these models, often via APIs, for basic tasks such as
    content generation or Q&A based on the model''s inherent knowledge. Tool use via
    basic function calling might start here and later evolve into agents as tools
    or full-fledged agents.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第1级** **–** **选择模型和提示/服务模型**：入门级交互。涉及选择合适的预训练基础模型，设计有效的提示（**提示工程**）以引发idx_547d38c7期望的响应，并通过API等部署（服务）这些模型，通常用于基本任务，如内容生成或基于模型固有知识的问答。基本功能调用的工具使用可能从这里开始，并最终演变为工具代理或完全成熟的代理。'
- en: '**Level 2** **–** **Contextual enhancement (RAG)**: Overcoming model limitations
    by providing external context. RAG techniques are central, dynamically fetching
    relevant information from specified external knowledge sources (corporate documents
    or databases) to augment the prompt and improve the accuracy and relevance of
    the LLM''s output. This is a crucial step toward more factual and useful AI responses.
    An example of this includes a chatbot using RAG to pull the latest policy details
    from an internal knowledge base before answering an employee''s question.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第2级** **–** **上下文增强（RAG）**：通过提供外部上下文来克服模型限制。RAG技术是核心的，动态地从指定的外部知识源（公司文件或数据库）获取相关信息，以增强提示并提高LLM输出的准确性和相关性。这是向更事实性和有用的AI响应迈出的关键一步。一个例子是，聊天机器人使用RAG在回答员工问题之前从内部知识库中提取最新的政策细节。'
- en: '**Level 3** **–** **Tuning for specificity (agent-ready LLMs)**: Adapting models
    for specific needs. This involves fine-tuning pretrained models using domain-specific
    or proprietary data. Techniques rangeidx_d92d133b from **parameter-efficient fine-tun****ing**
    (**PEFT**) methods, such as LoRA or adaptor tuning (modifying only a small part
    of the model), to **full fine-tu****ning** (**FFT**) (retraining more substantial
    parts). The goal is to idx_4717971bspecialize the model''s knowledge, terminology,
    style, or behavior, making it more suitable for specialized agent roles. An example
    of this includes tuning a model on enterprise sales data so an agent can better
    understand sales-specific jargon and context.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Level 4** **–** **Grounding and evaluation**: Building trust and reliability.
    Incorporates mechanisms to ground outputs in verifiable facts, often by linking
    responses back to the source data retrieved via RAG (providing citations). Implements
    robust evaluation frameworks and metrics to continuously monitor performance,
    accuracy, fairness, bias, and safety, ensuring alignment with responsible AI principles.
    An example of this includes a financial analysis agent providing summaries with
    clear references to the specific financial reports used.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Level 5** **–** **Single-agent systems**: The emergence of true agentic AI,
    applying the anatomy described earlier. Architectures are built around a single,
    coordinated AI agent (often orchestrated by an LLM) capable of multi-step reasoning,
    planning, interacting with tools (reliably invoked via function calling or potentially
    discovered via MCP, and executing tasks autonomously to achieve a goal. Mature
    LLMOps/AgentOps practices for monitoring, logging, and managing the agent life
    cycle are essential here. An example of this includes an autonomous travel planning
    agent interacting with flight and hotel APIs to book a trip based on user preferences.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Level 6** **–****M****ulti-agent system****s**: The forefront of current
    development. Involves multiple, often specialized, agents collaborating, coordinating,
    communicating (potentially using A2A protocols), and potentially negotiating to
    tackle complex problems that exceed the capabilities of a single agent. Requires
    sophisticated architectures for inter-agent communication, task allocation, conflict
    resolution, and orchestration. An example of this includes a supply chain optimization
    system where inventory agents, logistics agents, and forecasting agents collaborate
    (perhaps via A2A) to idx_2e49f05crespond dynamically to disruptions.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Image 3](img/B33147_1_3.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
- en: Figure 1.3 – Maturity Model levels
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: Later on in the book we will expand on Levels 5 and 6 of the GenAI Maturity
    Model, presenting them as a separate Agentic AI Maturity Model to better capture
    the nuances and spectrum of sophistication involved.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '| **Level** | **Title/****F****ocus** | **Brief** **description** **and** **key
    a****ctivities** |'
  id: totrans-133
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-134
  prefs: []
  type: TYPE_TB
- en: '| 0 | Prepare data (data foundation) | Acquire, generate, clean, curate, and
    govern data. Focus on quality, relevance, licensing, and accessibility. Essential
    prerequisite. |'
  id: totrans-135
  prefs: []
  type: TYPE_TB
  zh: '| 0 | 准备数据（数据基础） | 获取、生成、清理、整理和治理数据。关注质量、相关性、许可和可访问性。基本先决条件。|'
- en: '| 1 | Select model and prompt/serve | Select pretrained models, use prompt
    engineering, and serve models via APIs for basic tasks (e.g., generation, Q&A).
    Basic tool use (function calling). |'
  id: totrans-136
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 选择模型和提示/服务 | 选择预训练模型，使用提示工程，并通过 API 提供基本任务（例如，生成、问答）的服务。基本工具使用（功能调用）。|'
- en: '| 2 | Contextual enhancement (RAG) | Use RAG to fetch external context (documents,
    databases) to augment prompts, improving accuracy and relevance. An example is
    a chatbot retrieving policy info. |'
  id: totrans-137
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 上下文增强（RAG） | 使用 RAG 获取外部上下文（文档、数据库）以增强提示，提高准确性和相关性。例如，聊天机器人检索政策信息。|'
- en: '| 3 | Tuning for specificity | Fine-tune models (PEFT or FFT) with domain-specific
    data to specialize knowledge, terminology, or behavior for agent roles. An example
    is tuning for sales jargon. |'
  id: totrans-138
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 调整以实现特定性 | 使用特定领域的数据对模型（PEFT 或 FFT）进行微调，以专门针对代理角色的知识、术语或行为。例如，调整以适应销售术语。|'
- en: '| 4 | Grounding and evaluation | Implement grounding (linking outputs to sources,
    citations) and robust evaluation (accuracy, bias, safety) for trust and reliability.
    An example is an agent citing sources. |'
  id: totrans-139
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 基础和评估 | 实施基础（将输出链接到来源、引用）和稳健的评估（准确性、偏差、安全性）以实现信任和可靠性。例如，代理引用来源。|'
- en: '| 5 | Single-agent systems | Architect systems around one autonomous AI agent
    performing multi-step tasks (reasoning, planning, tool use via function calling/MCP).
    Requires LLMOps/AgentOps. An example is a travel booking agent.Requires grounding
    (citations) and robust evaluation for trust and reliability. An example is an
    automated SAR reporting agent. |'
  id: totrans-140
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 单个代理系统 | 围绕一个执行多步任务（推理、规划、通过功能调用/MCP 使用工具）的自主 AI 代理构建系统。需要 LLMOps/AgentOps。例如，旅行预订代理。需要基础（引用）和稳健的评估以实现信任和可靠性。例如，自动
    SAR 报告代理。|'
- en: '| 6 | Multi-agent systems | Deploy idx_4eff3785multiple specialized agents
    that collaborate, coordinate, communicate (via A2A), and negotiate to solve complex
    problems. An example is supply chain agents collaborating.Foundational. Here,
    multiple specialized agents operate in structured, top-down workflows. Typically
    managed by a central supervisor to ensure predictability and auditability.Advanced.
    At this level, agents can also collaborate, negotiate, and reach consensus in
    decentralized or swarm architectures to solve highly dynamic problems. |'
  id: totrans-141
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 多代理系统 | 部署 idx_4eff3785多个专门化的代理，它们协作、协调、通信（通过 A2A），并协商以解决复杂问题。例如，供应链代理协作。基础。在这里，多个专门化的代理在结构化、自上而下的工作流程中运行。通常由中央监督员管理，以确保可预测性和可审计性。高级。在这个层面，代理也可以在去中心化或蜂群架构中协作、协商并达成共识，以解决高度动态的问题。|'
- en: Table 1.2 – GenAI levels of maturity
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1.2 – GenAI 成熟度级别
- en: This Maturity Model illustrates that achieving sophisticated agentic AI (Levels
    5 and 6) relies on building capabilities across the preceding levels, from data
    foundations to context enhancement and specialized tuning. It provides a roadmap
    for organizations assessing their current state and planning the steps, technically
    and organizationally, to achieve their desired level of GenAI and agentic capability.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 这个成熟度模型表明，实现复杂的代理 AI（第 5 级和第 6 级）依赖于在先前级别上构建能力，从数据基础到上下文增强和专门调整。它为组织评估其当前状态并规划技术和组织步骤以实现其期望的
    GenAI 和代理能力水平提供了路线图。
- en: While the GenAI Maturity Model provides the roadmap, the agentic design patterns
    we introduce later in this book act as the vehicle to move you along it. It is
    important to recognize that the level of maturity your organization achieves is
    a direct result of the specific patterns you choose to implement.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 GenAI 成熟度模型提供了路线图，但我们在这本书后面介绍的行为设计模式则是推动您沿着该路线前进的工具。重要的是要认识到，您组织达到的成熟度水平是您选择实施的具体模式的直接结果。
- en: By identifying a target capability, for example, a system that must be fully
    auditable and safe for financial transactions, you can reverse-engineer your architectural
    requirements. This allows your organization to concentrate its resources and investment
    on mastering the four or five critical patterns required for that specific level
    of reliability. Instead of an unfocused attempt to *build AI*, this approach enables
    a deliberate and cost-effective engineering path. By focusing on the implementation
    of these select patterns, you ensure that every technical investment translates
    directly into a validated state of maturity and business value.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 通过确定一个目标能力，例如，一个必须完全可审计且对金融交易安全的系统，你可以逆向工程你的架构需求。这允许你的组织集中其资源和投资，掌握实现该特定可靠性级别所需的四到五个关键模式。这种方法不是无目标的“构建
    AI”，而是实现了一种有目的且成本效益高的工程路径。通过专注于这些选定模式的实施，你确保每一次技术投资都能直接转化为验证的成熟度和商业价值状态。
- en: Now that we have a deeper understanding of agents, let's discuss the building
    blocks for developing agents.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对代理有了更深入的了解，让我们来讨论开发代理的构建块。
- en: The new agentic stack
  id: totrans-147
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 新的代理堆栈
- en: As systems evolve beyond standaloneidx_f1c91d8a prompts toward the agentic architectures
    described previously, the ability for models and agents to interact reliably with
    tools and each other becomes paramount.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 随着系统从独立的提示向之前描述的代理架构演变，模型和代理能够可靠地与工具和彼此交互的能力变得至关重要。
- en: 'This involves understanding and potentially implementing key layers of the
    emerging AI interoperability stack: function calling, the MCP, and the A2A protocol.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这涉及到理解和可能实现新兴 AI 互操作性堆栈的关键层：函数调用、MCP 和 A2A 协议。
- en: Function calling enables LLMs within an agent's reasoning component to intelligently
    trigger specific tools (e.g., `book_flight``(destination="Tokyo")` in a travel
    assistant, `get_credit_score` for a loan application, or execute a local Python
    script for data analysis). MCP provides a standardized way to describe, discover,
    and securely invoke tools (including weather services, calculators, vector search
    utilities, or enterprise-specific APIs such as `verify_property_appraisal` for
    real estate applications) as independent, interoperable services, enhancing modularity
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 函数调用使代理推理组件内的 LLM 能够智能地触发特定工具（例如，在旅行助手中的 `book_flight`(destination="Tokyo")`，贷款申请的
    `get_credit_score`，或执行数据分析的本地 Python 脚本）。MCP 提供了一种标准化的方式来描述、发现和安全的调用工具（包括天气服务、计算器、向量搜索实用程序或针对特定企业应用的
    API，如 `verify_property_appraisal`），作为独立的、可互操作的服务，增强模块化。
- en: A2A offers a protocol for structured task delegation and collaboration between
    different agents, crucial for multi-agent systems (Level 6). Mastering these complementary
    layers is often fundamental to building the modular, scalable, and robust agentic
    systems characteristic of higher maturity stages.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: A2A 为不同代理之间的结构化任务委派和协作提供了一个协议，这对于多代理系统（第 6 级）至关重要。掌握这些互补层通常是构建具有更高成熟度阶段特征的模块化、可扩展和鲁棒代理系统的基础。
- en: In later chapters, we will expand Levels 5 and 6 (single-agent and multi-agent
    systems) of the GenAI Maturity Model into its own set of agentic AI levels of
    maturity.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在后面的章节中，我们将扩展 GenAI 成熟度模型的第 5 级和第 6 级（单代理和多代理系统）到其自身的代理人工智能成熟度级别集合。
- en: 'Enabling agent communication: from tools to collaboration'
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 启用代理通信：从工具到协作
- en: 'Let''s explore the distinctionidx_05ca1106 between MCP by Anthropic and the
    A2A protocol by Google:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨 Anthropic 的 MCP 和 Google 的 A2A 协议之间的区别：
- en: 'MCP is all about how a single AI agent/LLMs connects to tools, data, and external
    systems. Think of it as giving your AI access to everything it needs to do its
    job, such as search tools, databases, or prebuilt prompts. It''s about vertical
    integration: connecting the agent to its tools.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MCP 主要关于单个 AI 代理/LLMs 如何连接到工具、数据和外部系统。把它想象成给你的 AI 提供访问它完成工作所需的一切，例如搜索工具、数据库或预构建的提示。这是垂直整合：将代理连接到其工具。
- en: A2A focuses on how different AI agents talk to each other, no matter which company
    or framework they come from. It's like giving AI agents a shared language so they
    can collaborate, delegate tasks, and work as a team. This is horizontal integration,
    connecting agents to other agents.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: A2A 关注的是不同 AI 代理如何相互交流，无论它们来自哪个公司或框架。这就像给 AI 代理一个共享的语言，以便它们可以协作、委派任务并以团队工作。这是水平整合，将代理连接到其他代理。
- en: 'Here''s a simple mental model:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个简单的思维模型：
- en: MCP = AI agent connects to tools
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MCP = AI 代理连接到工具
- en: A2A = AI agents connect to each other
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: A2A = AI代理相互连接
- en: 'Note that these protocols are designed to work together:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这些协议被设计成可以一起工作：
- en: An orchestrator agent uses A2A to delegate tasks to other agents.
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个编排器代理使用A2A将任务委派给其他代理。
- en: Those agents use MCP to access tools and data they need.
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这些代理使用MCP来访问他们需要的工具和数据。
- en: Results flow back through A2A, completing a powerful, collaborative workflow.
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结果通过A2A流回，完成一个强大、协作的工作流程。
- en: 'Let''s take a look at how these protocols can co-exist. The following diagram
    shows a distributed multi-agent architecture with two agents (Agent A and Agent
    B), each operating independently with theidx_71f0464c following:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这些协议如何共存。以下图表显示了一个分布式多代理架构，其中包含两个代理（代理A和代理B），每个代理独立运行，如下所示：
- en: Local AI stack (LLM orchestration, memory, and toolchain)
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本地AI堆栈（LLM编排、内存和工具链）
- en: Remote access to external tools and data (via MCP)
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过MCP访问外部工具和数据
- en: '![Image 4](img/B33147_1_4.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图像4](img/B33147_1_4.png)'
- en: Figure 1.4 – Distributed multi-agent systems using MCP and A2A
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.4 – 使用MCP和A2A的分布式多代理系统
- en: 'The remote access from Agent A to Agent B is facilitated by the A2A protocol,
    which underscores two key components for agent registry and discovery:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 代理A到代理B的远程访问由A2A协议提供便利，该协议强调了代理注册和发现的两个关键组件：
- en: '**Agent** **s****erver**: An idx_6abe8910endpoint exposing the agent''s A2A
    interface'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理** **服**：一个暴露代理A2A接口的端点'
- en: '**Agent** **c****ard**: A idx_677ee702discovery mechanism for advertising agent
    capabilities'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理** **卡**：一种用于宣传代理能力的发现机制'
- en: For an agent to effectivelyidx_38b4edc1 use these external communication protocols,
    it must first have a robust internal architecture. Let's now delve into the core
    components that enable an agent to process information, reason, and decide on
    its actions.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使代理能够有效地使用这些外部通信协议，它必须首先拥有一个强大的内部架构。现在让我们深入了解那些使代理能够处理信息、推理并决定其行为的核心组件。
- en: Agent internals (common to A and B for simplicity)
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理内部结构（为了简单起见，A和B通用）
- en: 'The internal structure of the agent is composed of three core components: the
    LLM orchestrator, tools and knowledge, and memory.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 代理的内部结构由三个核心组件组成：LLM编排器、工具和知识以及内存。
- en: The LLM orchestrator serves as the agent's reasoning and coordination engine,
    interpreting user prompts, planning actions, and invoking tools or external services.
    The tools and knowledge module contains the agent's local utilities, plugins,
    or domain-specific functions it can call upon during execution. Memory stores
    persistent or session-based context, such as past interactions, user preferences,
    or retrieved information, enabling the agent to maintain continuity and personalization.
    These components are all accessible locally within the agent's runtime environment
    and are tightly coupled to support fast, context-aware responses. Together, they
    form the self-contained "brain" of each agent, making it capable of acting autonomously.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: LLM编排器作为代理的推理和协调引擎，解释用户提示，规划行动，并调用工具或外部服务。工具和知识模块包含代理在执行期间可以调用的本地实用程序、插件或特定领域的函数。内存存储持久或基于会话的上下文，如过去的交互、用户偏好或检索到的信息，使代理能够保持连续性和个性化。这些组件都在代理的运行时环境中本地访问，并且紧密耦合以支持快速、上下文感知的响应。它们共同构成了每个代理自包含的“大脑”，使其能够自主行动。
- en: There are two remote layers, which we'll talk about in the upcoming subsections.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个远程层，我们将在接下来的小节中讨论。
- en: The MCP server
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MCP服务器
- en: This plays a critical role inidx_ad0b9a89 connecting the agent to external tools,
    databases, and services through a standardized JSON-RPC (a stateless, lightweight,
    remote procedure call protocol that uses JSON as its data format) API. Agents
    interact with these servers as clients, sending requests to retrieve information
    or trigger actions, such as searching documents, querying systems, or executing
    predefined workflows.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 这在连接代理到外部工具、数据库和服务方面发挥着关键作用，通过标准化的JSON-RPC（一种无状态的、轻量级的远程过程调用协议，使用JSON作为其数据格式）API。代理作为客户端与这些服务器交互，发送请求以检索信息或触发操作，例如搜索文档、查询系统或执行预定义的工作流程。
- en: This capability allows agents to dynamically inject real-time, external data
    into the LLM's reasoning process, significantly improving the accuracy, grounding,
    and relevance of their responses. For example, Agent A might use an MCP server
    to retrieve a product catalog from an ERP system in order to generate tailored
    insights for a sales representative.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这种能力允许代理动态地将实时外部数据注入LLM的推理过程中，显著提高其响应的准确性、基础和相关性。例如，代理A可能使用MCP服务器从ERP系统中检索产品目录，以便为销售代表生成定制见解。
- en: The agent server
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理服务器
- en: This is the endpoint that makes idx_6f439738an agent addressable via the A2A
    protocol. It enables agents to receive tasks from peers, respond with results
    or intermediate updates using Server-Sent Events (SSE), and support multimodal
    communication with format negotiation.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这是通过A2A协议使idx_6f439738代理可寻址的端点。它使代理能够从同伴那里接收任务，使用服务器发送事件（SSE）响应结果或中间更新，并支持格式协商的多模态通信。
- en: Complementing this is the agent card, a discovery layer that provides structured
    metadata about an agent's capabilities, including descriptions, input requirements,
    and enabling dynamic selection of the right agent for a given task. Agents can
    delegate tasks, stream progress, and adapt output formats during interaction.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 与此相辅相成的是代理卡，这是一个发现层，它提供了有关代理能力的结构化元数据，包括描述、输入要求和允许动态选择给定任务的正确代理。代理可以在交互过程中委派任务、流式传输进度并调整输出格式。
- en: The agentic stack we've just described provides the powerful technical foundation
    for building sophisticated, interconnected agent systems. However, possessing
    the blueprint and successfully constructing the building are two different things.
    Transitioning these powerful concepts fromidx_73645c92 experimental **proofs****of****concept**
    (**PoCs**) to robust, reliable, and scalable production systems requires navigating
    a complex landscape of challenges. We will now turn our attention to these critical
    hurdles.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚描述的代理栈为构建复杂、互联的代理系统提供了强大的技术基础。然而，拥有蓝图和成功建造建筑是两回事。将这些强大的概念从idx_73645c92实验性**概念验证**（**PoCs**）过渡到稳健、可靠和可扩展的生产系统需要克服一系列复杂挑战。我们现在将关注这些关键障碍。
- en: Challenges hindering production-grade GenAI
  id: totrans-184
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 阻碍生产级生成式AI的挑战
- en: Despite the immense idx_cb8958b1potential and burgeoning applications, transitioning
    GenAI initiatives from experimental PoCs to robust, reliable, and scalable production-grade
    systems presents significant hurdles for many organizations. Building and deploying
    these systems, especially advanced agentic AI with their complex anatomy and interactions,
    requires overcoming a complex web of interconnected technical, operational, legal,
    and ethical challenges. Successfully navigating these is key to moving beyond
    the hype and achieving sustainable business impact.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管idx_cb8958b1潜力巨大，应用领域不断涌现，但将生成式AI倡议从实验性PoCs过渡到稳健、可靠和可扩展的生产级系统对许多组织来说是一个重大挑战。构建和部署这些系统，特别是具有复杂结构和交互的高级代理式AI，需要克服复杂的技术、运营、法律和伦理挑战的交织网络。成功应对这些挑战是超越炒作并实现可持续业务影响的关键。
- en: Successfully graduating PoCs hinges significantly on strategic and organizational
    readiness, and not just technical feasibility. Demonstrating clear business value
    and ROI is paramount, as many pilots stall without quantifiable benefits that
    justify further investment.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 成功毕业PoCs在很大程度上取决于战略和组织准备，而不仅仅是技术可行性。证明明确的企业价值和投资回报率至关重要，因为许多试点项目因缺乏可量化的收益而停滞不前，这些收益无法证明进一步投资的合理性。
- en: Achieving broad stakeholder alignment across business units, IT, legal, and
    compliance teams, coupled with a clear plan for operational integration into existing
    workflows, is essential. Furthermore, ensuring a strong problem-solution fit –
    matching GenAI capabilities appropriately to business needs – prevents misapplication
    of the technology.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 在业务单元、IT、法律和合规团队之间实现广泛的利益相关者一致，并制定明确的计划将运营整合到现有工作流程中，这是至关重要的。此外，确保强大的问题-解决方案匹配——将生成式AI的能力适当地匹配到业务需求——可以防止技术的误用。
- en: Ultimately, realizing value also depends heavily on effective change management
    strategies to prepare the workforce and focused efforts on driving user adoption
    through usable and trustworthy systems.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，实现价值也严重依赖于有效的变革管理策略，以准备劳动力，并通过可用和值得信赖的系统集中精力推动用户采用。
- en: Foundational to any successful GenAI deployment are data governance and quality.
    Ensuring the legal rights (data ownership and licensing) for training data is
    a critical first step. The system's performance is deeply reliant on access to
    high-quality, relevant, and unbiased data.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 任何成功的通用人工智能（GenAI）部署的基础是数据治理和质量。确保训练数据的法律权利（数据所有权和许可）是关键的第一步。系统的性能深度依赖于访问高质量、相关且无偏见的数据。
- en: Poor data quality undermines all subsequent efforts, especially for agents needing
    accurate environmental perception. Overcoming challenges related to integrating
    data often involves breaking down complex data silos across the organization.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 低质量的数据会破坏所有后续的努力，特别是对于需要准确环境感知的代理。克服与数据集成相关的挑战通常涉及打破组织内部复杂的复杂数据孤岛。
- en: Alongside quality and governance, maintaining privacy and compliance is non-negotiable
    when handling sensitive data, requiring adherence to regulations such as GDPR
    or HIPAA through techniques such as anonymization and encryption, which is vital
    for maintaining user trust.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 与质量和治理一样，在处理敏感数据时维护隐私和合规性是不可或缺的，需要通过匿名化和加密等技术遵守GDPR或HIPAA等法规，这对于维护用户信任至关重要。
- en: From a model and technical perspective, production systems demand high levels
    of robustness and security. Models and agents must be resilient against adversarial
    attacks, and robust input validation and sanitization are crucial defenses.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 从模型和技术角度来看，生产系统需要高度的鲁棒性和安全性。模型和代理必须能够抵御对抗性攻击，并且健壮的输入验证和清理是至关重要的防御措施。
- en: Consistent performance across diverse real-world scenarios (domain fit and generalization)
    must be ensured, and mechanisms to manage potential model or agent behavior drift
    over time are necessary.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 确保在多样化的真实世界场景中（领域适应性和泛化）保持一致的性能，并且需要管理模型或代理行为随时间可能发生的潜在漂移的机制。
- en: For agents interacting with external systems, securing tool use (e.g., API interactions)
    is vital. Achieving production scalability requires appropriate infrastructure
    choices (cloud, hardware such as TPUs/GPUs), efficient low-latency model serving
    architectures, and robust data pipelines. Comprehensive monitoring through mature
    LLMOps/AgentOps practices becomes essential for managing the entire life cycle.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 对于与外部系统交互的代理，确保工具使用（例如，API交互）的安全性至关重要。实现生产可扩展性需要适当的基础设施选择（云、TPUs/GPUs等硬件）、高效的低延迟模型服务架构和强大的数据处理管道。通过成熟的LLMOps/AgentOps实践进行全面的监控对于管理整个生命周期变得至关重要。
- en: Additionally, significant technical hurdles often exist in technical integration
    with existing legacy systems and designing effective, maintainable APIs; interoperability
    standards such as MCP and A2A aim to help here. Minimizing inaccuracies or hallucinations
    through effective context management and grounding also remains a key technical
    focus.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在技术集成现有遗留系统和设计有效、可维护的API方面通常存在重大的技术障碍；MCP和A2A等互操作性标准旨在提供帮助。通过有效的上下文管理和扎根来最小化不准确或幻觉仍然是关键的技术焦点。
- en: Deploying these sophisticated systems inevitably involves resource-related challenges.
    Acquiring and retaining the necessary technical expertise across data science,
    ML engineering, software development, and operations is often difficult. Moreover,
    the cost and resource constraints associated with building, training, fine-tuning,
    and running large models or complex agentic systems can be substantial and require
    careful management.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 部署这些复杂的系统不可避免地会涉及资源相关的挑战。在数据科学、机器学习工程、软件开发和运营等领域获取和保留必要的专业技术往往很困难。此外，构建、训练、微调和运行大型模型或复杂代理系统相关的成本和资源限制可能很大，需要谨慎管理。
- en: Finally, overarching all these considerations are ethical and responsible AI
    practices. Addressing and mitigating potential biases in data, models, and agent
    decision-making is crucial for fairness and equity. Establishing transparency,
    explainability (understanding why an agent or model made a decision), and robust
    governance frameworks are essential for accountability and responsible deployment.
    Adherence to legal and ethical standards isn't optional; it's fundamental to building
    sustainable and trustworthy AI solutions.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，所有这些考虑因素都涵盖在伦理和负责任的AI实践中。解决和减轻数据、模型和代理决策中的潜在偏见对于公平和公正至关重要。建立透明度、可解释性（理解代理或模型为何做出决策）和健壮的治理框架对于问责制和负责任的部署至关重要。遵守法律和伦理标准不是可选择的；它是构建可持续和值得信赖的AI解决方案的基础。
- en: 'Let''s examine an example of what a failure may look like. A large e-commerce
    company developed a *Returns & Order Status Agent* to handle common customer service
    inquiries and reduce the load on itsidx_2063ffd9 human support team. The goal
    was to provide instant, 24/7 support for the two most frequently-asked customer
    questions: "What is my order status?" and "How do I return an item? ".'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个失败可能是什么样子。一家大型电子商务公司开发了一个*退货与订单状态代理*来处理常见的客户服务查询，并减轻其idx_2063ffd9人工支持团队的负担。目标是提供即时、24/7的支持，以应对两个最常问的客户问题：“我的订单状态是什么？”和“我如何退货？”。
- en: However, despite the clear objectives and early promise, the transition from
    a controlled pilot to a dynamic production environment revealed critical flaws
    in the system’s design.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管目标明确且早期前景看好，但从受控试点到动态生产环境的过渡揭示了系统设计中的关键缺陷。
- en: '**The PoC**: In a controlled lab environment, the agent was a resounding success.
    It was trained on a curated set of FAQs and connected to a clean, static copy
    of the order database. When asked *How do I return an item?* or *What is the status
    of order #12345?*, it provided perfect, accurate answers. The PoC was approved,
    and the project was fast-tracked to production.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PoC（原型验证）**: 在一个受控的实验室环境中，该代理取得了显著的成功。它被训练在一个精心挑选的FAQ集合上，并连接到一个干净、静态的订单数据库副本。当被问及“我如何退货？”或“订单#12345的状态是什么？”时，它提供了完美、准确的答案。PoC得到了批准，项目被快速推进到生产阶段。'
- en: '**The** **p****roduction** **f****ailure**: Once deployed to the live website,
    the agent began to fail spectacularly within hours:'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产失败**: 一旦部署到实时网站，代理在数小时内开始出现惊人的失败：'
- en: '**Poor** **context manag****ement**: A customer whose package was delayed by
    a widespread courier strike asked, *My order #54321 was supposed to be here yesterday**.
    W**here is it?* The agent, only able to access the internal order database, saw
    the status was `Shipped` and repeatedly responded, `Your order #54321 has been
    shipped`. It lacked the real-world context of the courier''s public service disruption
    and was unable to provide a helpful answer, leading to extreme customer frustration.'
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**糟糕的** **上下文管理**: 一位包裹因全国范围内的快递罢工而延误的客户询问，“我的订单#54321本应昨天到达**。它在**哪里？*”代理只能访问内部订单数据库，看到状态是“已发货”，并反复回应，“您的订单#54321已发货”。它缺乏快递公共服务中断的现实世界背景，无法提供有用的答案，导致客户极度沮丧。'
- en: '**Hallucination and** **f****aulty** **d****esign**: A customer asked about
    the return policy for a *Final Sale* promotional item. This specific policy was
    not in the agent''s RAG knowledge base. Instead of admitting it didn''t know,
    the agent''s LLM core hallucinated a response by generalizing from the standard
    return policy. It confidently told the customer they were eligible for a full
    cash refund, a promise the company could not honor, leading to an angry escalation
    and a financial write-off to appease the customer.'
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**幻觉和** **设计错误**: 一位客户询问了关于一款“最终销售”促销商品的退货政策。这项具体政策不在代理的RAG知识库中。而不是承认不知道，代理的LLM核心通过从标准退货政策中泛化来虚构了一个响应。它自信地告诉客户他们有资格获得全额现金退款，这是公司无法兑现的承诺，导致愤怒升级和财务核销以安抚客户。'
- en: '**Entangled** **w****orkflow** **f****ailure**: The agent was not properly
    integrated into the human support workflow. When it failed to resolve an issue,
    its only function was to say, `I cannot help with that. Please contact support`.
    It did not transfer the chat, provide a ticket number, or pass the conversation
    history to a human. This forced frustrated customers to start the entire process
    over again, destroying any potential efficiency gains and worsening the customer
    experience.'
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**纠缠的** **工作流程** **失败**: 代理没有被正确地整合到人工支持工作流程中。当它无法解决问题时，它的唯一功能就是说，“我无法帮助您。请联系支持”。它没有转接聊天，提供工单号，或把对话历史传递给人类。这迫使沮丧的客户不得不重新开始整个过程，破坏了任何潜在效率的提升，并恶化了客户体验。'
- en: 'After a week ofidx_f2d63835 escalating customer complaints, negative social
    media mentions, and the high cost of manual corrections for the agent''s mistakes,
    the company pulled the agent from production. The project was a stark lesson:
    a successful PoC that works on clean data in a lab is not a guarantee of a production-ready
    system. The failure to architect for real-world context, handle edge cases, and
    integrate seamlessly into existing business processes turned a promising experiment
    into a costly failure.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在一周内，由于客户投诉不断升级、社交媒体上的负面提及以及代理错误的手动更正成本高昂，公司撤回了该代理。这个项目是一个鲜明的教训：在实验室中仅对干净数据进行成功PoC并不能保证生产就绪的系统。未能为现实世界上下文进行架构设计、处理边缘情况以及无缝集成到现有业务流程，将一个有希望的实验变成了代价高昂的失败。
- en: The following table will help organizing the type of challenges you may face
    when taking GenAI applications to production.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格将帮助组织您在将GenAI应用投入生产时可能面临的各种挑战类型。
- en: '| **Challenge** **c****ategory** | **Key** **c****onsiderations/****s****pecific**
    **c****hallenges** |'
  id: totrans-207
  prefs: []
  type: TYPE_TB
  zh: '| **挑战** **类别** | **关键** **考虑因素/****特定** **挑战** |'
- en: '| --- | --- |'
  id: totrans-208
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Strategic and organizational | Graduating PoCs (demonstrating ROI, stakeholder
    alignment, operational integration), ensuring problem-solution fit, managing change
    management, and driving user adoption |'
  id: totrans-209
  prefs: []
  type: TYPE_TB
  zh: '| 战略和组织 | 毕业PoC（证明回报率、利益相关者一致、运营整合），确保问题-解决方案匹配，管理变革管理，并推动用户采用|'
- en: '| Data-related | Data governance (ownership, licensing), ensuring data quality
    (relevant, unbiased), breaking down data silos, and ensuring privacy and compliance
    (GDPR, HIPAA, user trust) |'
  id: totrans-210
  prefs: []
  type: TYPE_TB
  zh: '| 数据相关 | 数据治理（所有权、许可），确保数据质量（相关、无偏见），打破数据孤岛，并确保隐私和合规（GDPR、HIPAA、用户信任）|'
- en: '| Model and technical | Ensuring model robustness and security (adversarial
    attacks, input validation, drift management, secure tool use), achieving scalability
    (infrastructure, serving), handling technical integration (legacy systems, APIs),
    implementing monitoring and LLMOps/AgentOps, and minimizing hallucinations/ensuring
    accuracy (grounding, context) |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| 模型和技术 | 确保模型稳健性和安全性（对抗攻击、输入验证、漂移管理、安全工具使用），实现可扩展性（基础设施、服务），处理技术集成（遗留系统、API），实施监控和LLMOps/AgentOps，以及最小化幻觉/确保准确性（扎根、上下文）|'
- en: '| Resource-related | Acquiring/retaining necessary technical expertise and
    managing cost and resource constraints (compute, development) |'
  id: totrans-212
  prefs: []
  type: TYPE_TB
  zh: '| 资源相关 | 获取/保留必要的专业技术知识，并管理成本和资源限制（计算、开发）|'
- en: '| Ethical and responsible AI | Addressing/mitigating bias, ensuring transparency
    and explainability, establishing governance frameworks, and adhering to compliance
    requirements and ethical standards |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '| 道德和负责任的AI | 解决/减轻偏见，确保透明度和可解释性，建立治理框架，并遵守合规要求和道德标准|'
- en: Table 1.3 – Challenges and considerations for taking GenAI-based applications
    to production
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 表1.3 – 将基于GenAI的应用投入生产时的挑战和考虑因素
- en: Overcoming this idx_cae3e0d4multifaceted set of challenges requires a strategic,
    C-level commitment, significant investment in infrastructure and talent, robust
    governance practices, and a clear roadmap that moves beyond experimentation to
    embedding GenAI and agentic AI as core, value-driving capabilities within the
    enterprise.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 克服这一多方面的挑战集需要战略性的高层承诺、对基础设施和人才的重大投资、稳健的治理实践，以及超越实验，将GenAI和代理AI嵌入企业核心、价值驱动能力的明确路线图。
- en: Summary
  id: totrans-216
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter provided a foundational overview of the GenAI landscape within
    the enterprise context, charting a course from core concepts toward the sophisticated
    realm of agentic AI systems.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了企业环境中生成式人工智能（GenAI）领域的基础概述，从核心概念到复杂的代理人工智能系统领域的发展路径。
- en: We examined the transformative potential of GenAI, its underlying capabilities,
    and diverse applications. We emphasized the critical role of context management
    in achieving reliable results and introduced the fundamental anatomy of AI agents
    (sense, reason, plan, and act) as the building blocks for more autonomous systems.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 我们研究了GenAI的变革潜力、其潜在能力以及多样化的应用。我们强调了在实现可靠结果中上下文管理的关键作用，并介绍了AI代理的基本结构（感知、推理、计划和行动）作为构建更自主系统的基石。
- en: The GenAI Maturity Model was presented as a strategic roadmap for navigating
    development, highlighting the increasing importance of interoperability standards
    (function calling, MCP, and A2A) when building toward advanced single-agent systems
    and multi-agent systems.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI成熟度模型被提出作为导航发展的战略路线图，强调了在构建高级单智能体系统和多智能体系统时，互操作性标准（函数调用、MCP和A2A）的重要性。
- en: Finally, we acknowledged the significant challenges organizations face in transitioning
    these powerful technologies from experimentation to robust, production-grade solutions.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们承认组织在将这些强大的技术从实验过渡到稳健的生产级解决方案时面临的重大挑战。
- en: 'The key takeaways are as follows:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点如下：
- en: '**GenAI''s** **v****alue is** **s****trategic**: GenAI offers powerful capabilities
    such as reasoning and content creation, but realizing its business value requires
    a strategic, production-focused approach that moves beyond simple experimentation.'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GenAI的价值是战略性的**：GenAI提供了强大的能力，如推理和内容创作，但实现其商业价值需要一种战略性的、以生产为导向的方法，这种方法超越了简单的实验。'
- en: '**Context is** **k****ing**: The reliability of any agentic system depends
    on effectively managing context to prevent errors such as hallucinations. This
    is a central challenge in system design.'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文至关重要**：任何智能系统的可靠性都取决于有效管理上下文以防止错误，例如幻觉。这是系统设计中的核心挑战。'
- en: '**Agentic AI is a** **s****tructural** **s****hift**: Agentic AI represents
    a move toward autonomous, goal-oriented systems. Understanding an agent''s core
    anatomy, that is, its ability to sense, reason, plan, and act, is foundational
    to building them.'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能体AI是一个结构性转变**：智能体AI代表了向自主、目标导向系统的转变。理解智能体的核心结构，即其感知、推理、规划和行动的能力，是构建它们的基础。'
- en: '**The GenAI Maturity Model is the** **r****oadmap**: The Maturity Model provides
    a strategic path for enterprises, outlining the journey from basic applications
    to sophisticated agentic systems and highlighting the key challenges (e.g., data
    governance, security, and ROI) that must be overcome to graduate from a PoC to
    a production-grade system.'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GenAI成熟度模型是路线图**：成熟度模型为企业提供了一条战略路径，概述了从基本应用到复杂的智能体系统的旅程，并突出了必须克服的关键挑战（例如，数据治理、安全和投资回报率），以从原型验证过渡到生产级系统。'
- en: '**An** **a****gentic** **s****tack is** **e****merging**: The development of
    advanced single-agent and multi-agent systems relies on an emerging stack of technologies,
    including interoperability standards such as function calling, MCP, and A2A, to
    enable critical features such as modularity, scalability, and collaboration.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能体策略正在兴起**：高级单智能体和多智能体系统的发展依赖于一个新兴的技术堆栈，包括如函数调用、MCP和A2A等互操作性标准，以实现模块化、可扩展性和协作等关键特性。'
- en: 'In the next chapter, we will focus specifically on the engine driving many
    agentic systems: the LLM. We will deep dive into selecting, deploying, and adapting
    LLMs to ensure that they are truly "agent-ready," capable of powering the reasoning
    (aka thinking), planning, and communication required for effective agent performance.'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将专门关注驱动许多智能体系统的引擎：LLM。我们将深入探讨选择、部署和调整LLM，以确保它们真正“智能体就绪”，能够提供推理（即思考）、规划和沟通，这对于有效的智能体性能至关重要。
