- en: 'GenAI in the Enterprise: Landscape, Maturity, and Agent Focus'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 企业中的通用人工智能：格局、成熟度和代理关注点
- en: '**Generative AI** (**GenAI**) is a field of **artificial intelligence** (**AI**)
    thatidx_ffafbff6 allows systems to create new or synthesized idx_21f7dedccontent,
    reason, understand context, and make recommendations by learning from underlying
    patterns in vast datasets. Unlike traditional AI, which primarily analyzes existing
    information, GenAI excels at producing novel artifacts, such as marketing copies,
    functional code, and other creative content.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**生成式人工智能（Generative AI，简称GenAI**）是人工智能（AI）的一个领域，它允许系统通过学习大量数据集中的潜在模式来创建新内容或合成内容、推理、理解上下文并做出推荐。与主要分析现有信息的传统人工智能不同，GenAI擅长产生新颖的成果，例如营销文案、功能性代码和其他创意内容。'
- en: While the potential of GenAI is immense, transitioning from experimental concepts
    to robust, production-grade systems presents significant challenges for enterprises.
    Successfully deploying these systems requires a strategic focus on security, reliability,
    and governance. To build trustworthy applications, the architecture must include
    robust guardrails, such as rigorous input validation and sanitization, to protect
    against malicious attacks, and policy enforcement mechanisms to ensure compliance.
    This chapter provides the essential framework for navigating this journey, introducing
    the core concepts and applications of agentic AI and charting a path from initial
    design to responsible, production-ready solutions.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管通用人工智能的潜力巨大，但将实验性概念过渡到稳健、生产级系统对企业来说是一个重大的挑战。成功部署这些系统需要战略性地关注安全性、可靠性和治理。为了构建可信赖的应用程序，架构必须包括稳健的防护措施，例如严格的输入验证和净化，以防止恶意攻击，以及政策执行机制以确保合规性。本章提供了导航这一旅程的基本框架，介绍了代理人工智能的核心概念和应用，并规划了一条从初始设计到负责任、生产就绪解决方案的路径。
- en: By grounding you in these core concepts, this chapter provides the essential
    strategic framework needed to understand not just what agentic AI is, but why
    it represents a pivotal shift in enterprise technology. Mastering this foundational
    knowledge is the first and most critical step on your journey to designing, building,
    and deploying effective and valuable AI agents.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 通过让您掌握这些核心概念，本章提供了理解代理人工智能不仅是什么，而且为什么它代表了企业技术的一个关键转变所必需的基本战略框架。掌握这一基础知识是您设计、构建和部署有效且有价值的人工智能代理的第一步和最关键的一步。
- en: 'In this chapter, we''ll be covering the following topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨以下主题：
