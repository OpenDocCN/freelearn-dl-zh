- en: '11'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Establishing Strong Foundations: Governance and Security in Power Platform
    Solutions'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Foundations of governance and security in Power Platform offer a comprehensive
    solution for governance and security, enabling users to create compelling apps
    and workflows while safeguarding their data and information. In this chapter,
    you will learn how to leverage the following features and functionalities of the
    Power Platform ecosystem:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Data loss prevention (DLP) policies: safeguarding organizational data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tenant isolation: ensuring safe and secure utilization of Power Platform connectors'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Specialized security roles
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By establishing strong foundations in governance and security, you will be able
    to leverage the full potential of the Power Platform ecosystem while protecting
    your valuable data and information.
  prefs: []
  type: TYPE_NORMAL
- en: 'Data loss prevention policies: safeguarding organizational data'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**DLP** policies are one of the key features of the Power Platform ecosystem
    that enable users to safeguard their organizational data and uphold information
    security standards. DLP policies serve as guardrails, preventing inadvertent exposure
    of sensitive data across different connectors and environments. In this section,
    you will learn how to implement data protection measures, define connector usage
    rules, prevent inadvertent data exposure, and assess the impact of DLP policies
    on canvas apps and cloud flows in tenants.'
  prefs: []
  type: TYPE_NORMAL
- en: Connectors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A **connector** is a component that enables users to connect to a data source
    or service and perform various actions within Power Platform. Connectors, at their
    most basic level, are strongly typed representations of restful **application
    programming interfaces**, also known as **APIs**. Connectors can be classified
    into three categories:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Business**: Connectors that access sensitive or confidential data, such as
    SharePoint, Dynamics 365, or SQL Server'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Non-business**: Connectors that access public or non-sensitive data, such
    as Twitter, YouTube, or Weather'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Blocked**: Connectors that are prohibited from being used in the tenant,
    such as Dropbox, Gmail, or Facebook'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Besides organization data categories, connectors can be grouped by design and
    industry maturity into three categories: **certified connectors**, **custom connectors**,
    and **virtual connectors**.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 11**.1* lists connectors available within Power Platform, showcasing
    the range of options that users have at their disposal to integrate with various
    services and applications seamlessly.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.1 – Certified connectors (image from the Microsoft Learn portal)](img/B21080_11_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.1 – Certified connectors (image from the Microsoft Learn portal)
  prefs: []
  type: TYPE_NORMAL
- en: '**Certified connectors** refer to connectors that have undergone rigorous testing
    and certification processes to ensure they meet Microsoft’s standards for security,
    reliability, and compliance. These connectors provide users with a reliable means
    of integrating with other Microsoft services and external services, all while
    maintaining data integrity and security.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Custom connectors** allow makers to create their own connectors to integrate
    with external systems or services not covered by the standard set of certified
    connectors. While offering flexibility and customization options, custom connectors
    require careful consideration to ensure that they comply with data policies and
    don’t compromise data security. *Figure 11**.2* illustrates how makers can design
    their own connectors, enabling seamless integration with external systems and
    services beyond the standard certified options.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.2 – Custom connectors](img/B21080_11_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.2 – Custom connectors
  prefs: []
  type: TYPE_NORMAL
- en: '**Virtual connectors** are connectors that appear in data policies for administrators
    to control; however, they’re not based on a restful API. The proliferation of
    virtual connectors has stemmed from data policies being one of the most popular
    governance controls in Power Platform (e.g. Copilot Studio connectors). *Figure
    11**.3* highlights how virtual connectors are listed in the data policies area,
    enabling administrators to effectively manage their tenants and environments.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.3 – Virtual connectors](img/B21080_11_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.3 – Virtual connectors
  prefs: []
  type: TYPE_NORMAL
- en: Virtual connectors, like Copilot Studio, show the range of integration options
    in Power Platform. The next section covers their pros and cons to help you make
    the most of them.
  prefs: []
  type: TYPE_NORMAL
- en: Pros and cons of Power Platform connectors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power Platform connectors offer several advantages that make them a valuable
    tool for integrating various services and applications. One of the primary benefits
    is the ease of integration they provide. These connectors simplify the process
    of connecting different services without requiring extensive coding knowledge,
    making them accessible to non-developers. Additionally, the platform boasts a
    wide range of connectors for popular services such as Microsoft 365, Azure, Salesforce,
    and many more, which offers extensive integration options. This facilitates seamless
    data flow between different systems, enabling real-time data synchronization and
    the automation of workflows.
  prefs: []
  type: TYPE_NORMAL
- en: The pre-built connectors save time by reducing the time needed to create integrations,
    thus allowing for faster deployment of solutions. They are also part of Power
    Platform’s low-code/no-code approach, which lowers the barrier to entry for users
    with minimal coding experience. Security and compliance are also key advantages,
    as connectors are designed with enterprise-grade security features to ensure data
    privacy and protection. Moreover, connectors can scale with your business needs,
    supporting projects of varying sizes, from small to large enterprise-level applications.
    Lastly, the large user community and extensive documentation provide valuable
    support and resources to help troubleshoot and optimize the use of connectors.
  prefs: []
  type: TYPE_NORMAL
- en: Despite these benefits, there are some downsides to using Power Platform connectors.
    One major drawback is the limited customization they offer, which might not meet
    the needs of more complex or unique integration scenarios. Furthermore, since
    connectors often rely on cloud services, a stable internet connection is necessary
    for them to function properly. Performance issues can also arise, particularly
    when dealing with large volumes of data or frequent operations. Another consideration
    is licensing costs, as some connectors, especially premium ones, may require additional
    fees that can accumulate based on the number of users and services integrated.
    Moreover, connectors might not always support the latest features or updates of
    the integrated services immediately, leading to potential delays in leveraging
    new functionalities. Although they are user-friendly, there is still a learning
    curve associated with effectively using and troubleshooting connectors, particularly
    for users with no technical background.
  prefs: []
  type: TYPE_NORMAL
- en: Given the potential risks and limitations, it is crucial to control the access
    and execution of connectors through well-established governance strategies. Implementing
    governance ensures that the use of connectors aligns with organizational policies
    and compliance requirements. A key aspect of governance is managing DLP policies.
    Let’s explore DLP further.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding DLP in Power Platform
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Protecting your organization’s data is crucial, especially in a world where
    data breaches and cyber-attacks happen frequently. You need to have effective
    ways to prevent data loss in Power Platform, a set of tools that help you create
    business solutions. This chapter explains how to secure your corporate data with
    DLP in Power Platform. It also covers the importance of having good governance
    strategies, and how to set up DLP policies and follow best practices to ensure
    data security.
  prefs: []
  type: TYPE_NORMAL
- en: A well-established DLP strategy within Power Platform offers significant advantages
    for **makers**, a**dministrators**, and **developers**, closely tying into the
    broader goals defined in the Power Platform **Center of Excellence** (**CoE**).
    For makers, a robust DLP strategy provides a secure framework within which they
    can innovate confidently, knowing that the data they handle is protected, thus
    fostering creativity without compromising security. Administrators benefit from
    streamlined governance, as clear DLP policies reduce the risk of data breaches
    and ensure compliance with regulatory standards, making it easier to manage and
    monitor data usage across the organization. For developers, well-defined DLP policies
    simplify the integration of various services and connectors, as they have clear
    guidelines on data handling and can focus on building effective solutions rather
    than worrying about security loopholes.
  prefs: []
  type: TYPE_NORMAL
- en: Aligning these DLP strategies with the principles of a CoE, organizations can
    standardize best practices, promote a culture of continuous improvement, and ensure
    that all stakeholders are aligned in their approach to data security and governance.
    This holistic approach enhances collaboration, drives efficiency, and ultimately
    contributes to the organization’s overall success. Following are examples of major
    data breaches in organizations that failed to implement security measures and
    incorporate a solid DLP strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Major data breaches through a fragile DLP strategy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Data breaches continue to highlight the critical importance of robust DLP strategies.
    Major incidents have stemmed from vulnerabilities that could have been mitigated
    by stronger DLP measures. These significant data breaches, affecting millions
    of individuals, highlight the critical need for robust DLP policies, effective
    patch management, and continuous monitoring to safeguard sensitive information
    and prevent unauthorized access:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Equifax data breach (2017)**: One of the most infamous breaches occurred
    when a vulnerability in a web application framework led to the exposure of personal
    information for approximately 147 million people. This incident was attributed
    to inadequate patch management and a lack of effective DLP policies that could
    have prevented unauthorized access. According to the Bank Info Security magazine,
    the 2017 Equifax data breach resulted in financial losses exceeding $1.4 billion,
    including fines, legal settlements, and remediation expenses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Target data breach (2013)**: Attackers gained access to the personal and
    credit card information of over 40 million customers. The breach was facilitated
    by weak DLP measures and insufficient monitoring of data flow between systems,
    emphasizing the need for comprehensive DLP strategies. The 2013 Target data breach
    cost the company over $202 million, covering legal fees, settlements, security
    upgrades, and lost revenue, as reported by Breach Sense.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Capital One data breach (2019)**: A misconfigured firewall resulted in the
    exposure of personal information for over 100 million customers. This breach underscored
    the importance of stringent DLP policies and continuous monitoring to mitigate
    unauthorized access to sensitive data. The Capital One data breach cost the company
    hundreds of millions, including an $80 million regulatory fine, a $190 million
    class-action settlement, and extensive remediation efforts, as reported by CBS
    News.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The concept of DLP
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DLP involves a collection of tools and processes aimed at ensuring sensitive
    data is not lost, misused, or accessed by unauthorized users. DLP strategies are
    designed to prevent data breaches by monitoring, detecting, and blocking the transfer
    of critical information.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of Power Platform, DLP is particularly important because the
    platform integrates and automates various business processes, often handling sensitive
    data. Without proper DLP measures, organizations risk exposing confidential information,
    potentially resulting in significant financial losses, reputational harm, and
    regulatory penalties.
  prefs: []
  type: TYPE_NORMAL
- en: Components of DLP
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A comprehensive DLP strategy typically includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identification of sensitive data**: Recognizing what constitutes sensitive
    information within the organization'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enumeration of certified connectors**: Identifying and listing all connectors
    that are required by solutions within the organization and evaluating the connectors’
    access to information'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Policy creation**: Establishing rules and policies for handling sensitive
    data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monitoring and detection**: Continuously monitoring data flow to detect potential
    violations of DLP policies'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Response and mitigation**: Implementing measures to block or remediate unauthorized
    access or data breaches'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Setting up DLP in Power Platform
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Implementing a DLP policy in Power Platform is essential for safeguarding your
    organization’s data and ensuring compliance with regulatory requirements. By following
    a structured process within the Power Platform admin center, you can define how
    data moves between different connectors, control access, and protect sensitive
    information. This proactive approach helps to mitigate risks and reinforces your
    organization’s data security framework. Following are the steps involved in setting
    up DLP policies:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Identify sensitive data**: Determine what data within your organization is
    sensitive and requires protection. This includes personal information, financial
    data, intellectual property, and any other data that is critical to the organization.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Create DLP policies**: In Power Platform, DLP policies are created in the
    Power Platform admin center. These policies define which connectors can be used
    together in apps and flows, and which data can be shared between services.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Configure connectors**: Classify connectors as either “Business” or “Non-Business.”
    Business connectors are those that handle sensitive data, while Non-Business connectors
    are used for general data. This classification helps control data flow and prevents
    the inadvertent sharing of sensitive information.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Enforce policies**: Apply DLP policies to environments within Power Platform
    to ensure compliance. This enforcement can be tailored to specific environments,
    ensuring that different departments or projects adhere to relevant data protection
    rules.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Monitor and audit**: Continuously monitor the usage of connectors and data
    flows within Power Platform. Regular audits help identify potential policy violations
    and areas where policies may need to be adjusted.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Step-by-step guide
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Access the Power Platform admin center:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Navigate to the Power Platform admin center and sign in with admin credentials.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create a new DLP policy:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the admin center, go to the **Data** **policies** section.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click on **New policy** to create a new DLP policy.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Provide a name and description for the policy.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Classify connectors:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the connectors you want to classify as Business or Non-Business.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: For example, classify connectors such as SharePoint, Dynamics 365, and SQL Server
    as Business connectors, and connectors such as Twitter and RSS as Non-Business
    connectors.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Apply the policy:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Choose the environments where the policy should be applied.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Save and publish the policy to enforce it across the selected environments.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Monitor and adjust:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Regularly review the policy’s effectiveness through the admin center.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Adjust it as needed based on usage patterns and new data protection requirements.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Figure 11**.4* presents a view of the DLP setup wizard.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.4 – DLP setup](img/B21080_11_004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.4 – DLP setup
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a DLP policy in Power Platform is a vital measure to protect your
    organization’s data by controlling how it flows between connectors. However, creating
    a policy is just the first step; ongoing assessment and monitoring are essential
    to ensure compliance and to identify any potential breaches. Regularly reviewing
    these policies and adjusting them as needed will help maintain the integrity of
    your data and prevent unauthorized access, ultimately fortifying your organization’s
    overall security posture.
  prefs: []
  type: TYPE_NORMAL
- en: 'Tenant isolation: ensuring safe and secure utilization of Power Platform connectors'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Companies increasingly adopt cloud services and platforms to streamline operations
    and enhance productivity. The importance of ensuring secure and isolated environments
    within these platforms is paramount. Tenant isolation in Power Platform is a critical
    strategy for ensuring that data and resources are securely segregated, preventing
    unauthorized access and minimizing the risk of data breaches. This section explores
    the concept of tenant isolation, its importance, implementation strategies, and
    best practices for utilizing Power Platform connectors securely within isolated
    environments.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding tenant isolation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tenant isolation refers to the practice of segregating resources and data within
    a multi-tenant environment to ensure that each tenant’s data and activities are
    isolated from others. In the context of Power Platform, this means creating separate
    environments for different departments, projects, or clients, ensuring that data
    and workflows within one environment do not interfere with or access those in
    another.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 11**.5* underscores the importance of Power Platform environment isolation
    in enhancing security, ensuring compliance, optimizing performance, and enabling
    tailored customizations.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.5 – Environment isolation strategy in Power Platform](img/B21080_11_005.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.5 – Environment isolation strategy in Power Platform
  prefs: []
  type: TYPE_NORMAL
- en: 'The importance of tenant isolation cannot be overstated. It serves multiple
    purposes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Security**: Prevents unauthorized access to sensitive data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Compliance**: Ensures adherence to regulatory requirements by isolating data
    based on geographical or departmental boundaries'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Performance**: Reduces the risk of performance degradation caused by resource
    contention between different tenants'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customization**: Allows for environment-specific customizations without affecting
    other tenants'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Key components of tenant isolation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Effective tenant isolation involves several key components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Environments**: Separate environments within Power Platform that serve as
    isolated containers for resources and data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security groups**: Microsoft Entra security groups to control access to environments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data policies**: DLP policies that govern data sharing and connector usage
    within and across environments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Role-Based Access Control** (**RBAC**): Fine-grained access control based
    on user roles to enforce least privilege access. We will expand on this subject
    in [*Chapter 12*](B21080_12.xhtml#_idTextAnchor285).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing tenant isolation in Power Platform
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Implementing tenant isolation in Microsoft Power Platform is essential for safeguarding
    data and ensuring secure collaboration across different organizational units or
    external partners. Tenant isolation allows administrators to control cross-tenant
    connections, thereby minimizing the risk of unauthorized data access or exfiltration.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding tenant isolation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Tenant isolation in Power Platform refers to the ability to restrict or allow
    connections between your tenant and external tenants. By default, cross-tenant
    connections are permitted, enabling users to establish connections to external
    data sources if they possess valid Microsoft Entra credentials. However, enabling
    tenant isolation allows administrators to block these connections, ensuring that
    data remains within the organization’s boundaries unless explicitly permitted.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring tenant isolation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To set up tenant isolation, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Access the Power Platform admin center**: Navigate to the Power Platform
    admin center and sign in with administrative credentials.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Enable tenant isolation**: Within the admin center, locate the tenant isolation
    setting. Toggle the setting to **On** to activate tenant isolation. This action
    will block all inbound and outbound cross-tenant connections by default.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Define allowlist rules**: To permit specific cross-tenant connections, create
    allowlist rules. These rules specify which external tenants are allowed to connect
    to your tenant (inbound) and which external tenants your users can connect to
    (outbound). You can configure these rules to allow all tenants in a specific direction
    by using the wildcard pattern “*”.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: While tenant isolation focuses on securing data flow and restricting external
    access across tenants, environment isolation takes this a step further by creating
    distinct environments within a single tenant, ensuring data and resources are
    securely segmented at an internal level.
  prefs: []
  type: TYPE_NORMAL
- en: Environment isolation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Environment isolation is a cornerstone of information segregation throughout
    the **application lifecycle management** (**ALM**) cycle. By creating distinct
    environments for each stage – such as development, testing, and production – organizations
    can maintain clear boundaries for data, applications, and resources. This segmentation
    minimizes the risk of accidental data exposure, ensures controlled access at every
    phase, and supports a streamlined workflow where changes can be developed and
    tested without impacting live production systems. Such an approach is critical
    for maintaining compliance, improving collaboration, and safeguarding the integrity
    of solutions as they progress through the ALM cycle. Creating environments in
    Power Platform is a straightforward process that helps you organize and manage
    your apps and data. In the Power Platform admin center, you start by selecting
    the option to create a new environment.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up isolated environments
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Setting up isolated environments in Power Platform involves creating separate
    workspaces to keep your data and applications distinct and secure. By defining
    different environments, you can ensure that each project or team operates independently,
    with its own set of resources and configurations. This isolation helps protect
    sensitive information, simplifies management, and reduces the risk of conflicts
    between different projects. It’s a key step in maintaining a well-organized and
    secure platform where each environment can be tailored to specific needs or compliance
    requirements. The following are key points to cover when designing an environment
    strategy and creating specific environments:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Create environments**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the Power Platform admin center, create separate environments for different
    departments, projects, or clients.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Each environment should be configured with specific resources and settings tailored
    to its purpose.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Configure** **security groups**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use Microsoft Entra to create security groups for each environment.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Assign users to security groups based on their roles and responsibilities.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Apply** **DLP policies**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Define and enforce DLP policies that control which connectors can be used within
    each environment.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure that sensitive data is only accessible through approved connectors.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Figure 11**.6* shows the main settings associated with Power Platform environment
    creation.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.6 – Create a new environment](img/B21080_11_006.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.6 – Create a new environment
  prefs: []
  type: TYPE_NORMAL
- en: In addition to configuring environments and applying DLP policies, it is imperative
    to establish specialized security roles to enhance governance and control. These
    roles play a significant role in managing access and permissions within Power
    Platform and Dataverse environments, contributing to a robust security framework.
  prefs: []
  type: TYPE_NORMAL
- en: Specialized security roles
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As digital transformation progresses rapidly, it is essential to have strong
    governance and control over data and applications. Power Platform enables you
    to build, automate, and analyze business solutions, but it also requires a solid
    security framework. Security roles are a key component of Power Platform and Dataverse
    environments, as they help you manage access and permissions. In this section,
    you will learn about the different types of security roles, data access levels,
    **out-of-the-box** (**OOB**) security roles, field-based security, and how to
    integrate Microsoft Entra groups with these roles to create a comprehensive security
    strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Security roles in Power Platform/Dataverse environments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Security roles in Power Platform and Dataverse environments define what actions
    users can perform and what data they can access. These roles are essential for
    maintaining a secure environment by ensuring that users have the appropriate permissions
    based on their responsibilities. Security roles encompass various aspects of data
    and application security, including access control, data modification, and user
    management.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 11**.7* shows the security role setup interface in Dataverse, featuring
    a grid where rows represent entities and columns display permission levels, with
    circular icons indicating access scope.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.7 – Dataverse security roles](img/B21080_11_007.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.7 – Dataverse security roles
  prefs: []
  type: TYPE_NORMAL
- en: Security roles in Power Platform and Dataverse are crucial for defining the
    actions users can perform and the data they can access, ensuring a secure environment
    tailored to their responsibilities. These roles are vital for managing access
    control, data modification, and user management, safeguarding the integrity of
    the system. Understanding these roles sets the foundation for exploring data access
    levels, which will be discussed in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Data access levels
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data access levels in Dataverse security roles define the scope of data users
    can access based on their roles, ranging from their own records to the entire
    organization. This ensures users have the right level of visibility and control,
    aligning with their job functions and maintaining data security.
  prefs: []
  type: TYPE_NORMAL
- en: 'Data access levels in Power Platform determine the extent to which users can
    view or modify data. These levels include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**None**: No access to data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User**: Access to data owned by the user'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business Unit**: Access to data within the user’s business unit'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Parent: Child Business Units**: Access to data within the user’s business
    unit and its child business units.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Organization**: Access to all data within the organization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Figure 11**.8* displays a key for Dataverse data access levels, using circular
    icons from **None** (empty) to **Organization** (fully filled). Each level, such
    as **User** and **Business Unit**, is color-coded and labeled for easy reference.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.8 – Data access levels](img/B21080_11_008.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.8 – Data access levels
  prefs: []
  type: TYPE_NORMAL
- en: These access levels ensure that data is only accessible to those who need it,
    thereby minimizing the risk of unauthorized access and data breaches.
  prefs: []
  type: TYPE_NORMAL
- en: Out-of-the-box (OOB) security roles
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Power Platform and Dataverse provide several OOB security roles that simplify
    the management of user permissions. Some of the key OOB security roles include
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**System Administrator**: Full access to all data and configuration settings.
    This role can perform any action within the environment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**System Customizer**: Access to customize the system but limited data access.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Environment Maker**: Can create apps, flows, and other resources within an
    environment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Basic User**: Access to use apps and data that they own or that is shared
    with them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Basic User**: Basic access to Dataverse data and apps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These roles provide a foundation for managing security within Power Platform
    and can be customized to fit organizational needs. Administrators can create custom
    roles to define specific permissions, granting users access only to the data and
    tools required for their roles. Custom security roles can be scoped to tables
    and combined with Microsoft Entra security groups for streamlined management.
  prefs: []
  type: TYPE_NORMAL
- en: Column-level security
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Field-based security in Dataverse allows for granular control over access to
    specific fields within an entity. This is particularly useful when sensitive information
    needs to be protected even from users who have access to other parts of the record.
    Field-based security settings determine whether a user can read, update, or create
    specific fields based on their security role.
  prefs: []
  type: TYPE_NORMAL
- en: 'Field security in Dataverse involves defining permissions for individual fields
    and grouping them into field security profiles, which are then assigned to specific
    security roles:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Field-level permissions**: Define read, update, and create permissions for
    individual fields'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Field security profiles**: Group field-level permissions and assign them
    to security roles'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Field-based security features ensure that sensitive information remains protected
    while still allowing users to perform their necessary tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 11**.9* shows the Dataverse field security setup, listing fields with
    toggles to enable security and set **Read**, **Update**, and **Create** permissions.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.9 – Field-level security](img/B21080_11_009.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.9 – Field-level security
  prefs: []
  type: TYPE_NORMAL
- en: The screenshot illustrates how column-level security in Dataverse protects sensitive
    data. Next, we’ll explore how to streamline security by integrating Microsoft
    Entra groups with Power Platform security roles.
  prefs: []
  type: TYPE_NORMAL
- en: Integrating Microsoft Entra groups with security roles
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Integrating Microsoft Entra groups with security roles in Power Platform enhances
    user management by simplifying the assignment of permissions, ensuring consistency
    across applications, and providing scalability for large organizations.
  prefs: []
  type: TYPE_NORMAL
- en: Benefits of integration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Integrating Microsoft Entra groups with security roles in Power Platform offers
    several benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Simplified user management**: Streamlines the process of assigning and managing
    user permissions by leveraging existing Microsoft Entra groups'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consistency**: Ensures that users have consistent access across various applications
    and services'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability**: Facilitates the management of permissions for large numbers
    of users, especially in dynamic and growing organizations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Steps to integrate Microsoft Entra groups with security roles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Integrating Microsoft Entra groups with security roles in Dataverse involves
    a series of steps to align your organization’s structure with user access needs:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Create Microsoft Entra groups**: In Microsoft Entra, create groups that reflect
    the organizational structure and access needs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Add users to Microsoft Entra groups**: Manage user memberships within Microsoft
    Entra groups to control access.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Create a team in Dataverse**: Create a Dataverse team of type Microsoft Entra
    Security Group.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assign security roles to Microsoft Entra groups**: In the Power Platform
    admin center, assign the appropriate security roles to the Microsoft Entra groups.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Figure 11**.10* depicts the steps to integrate Microsoft Entra groups with
    security roles in Dataverse.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11.10 – AAD group and Dataverse team integration](img/B21080_11_010.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11.10 – AAD group and Dataverse team integration
  prefs: []
  type: TYPE_NORMAL
- en: This section outlined the process of integrating Microsoft Entra groups with
    security roles in Dataverse, which includes creating Microsoft Entra groups, managing
    user memberships, forming corresponding teams in Dataverse, and assigning security
    roles through the Power Platform admin center. Let us explore a real-life scenario
    demonstrating how these steps are applied in practice, highlighting the practical
    benefits of this integration.
  prefs: []
  type: TYPE_NORMAL
- en: Example scenario
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Consider a scenario where a marketing department requires access to specific
    datasets and apps within Power Platform. The steps to integrate Microsoft Entra
    groups with security roles would be the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a marketing AAD group: Create a Microsoft Entra group named `Marketing
    Department`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Assign roles: In the Power Platform admin center, assign the **Environment
    Maker** and **Basic User** security roles to the **Marketing** **Department**
    group.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add users: Add all marketing team members to the **Marketing Department** AAD
    group.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By following these steps, all users in the marketing department automatically
    receive the necessary permissions based on their group membership, simplifying
    the management of security roles and ensuring consistent access control.
  prefs: []
  type: TYPE_NORMAL
- en: Best practices for managing security roles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Effective security management in Dataverse relies on key practices such as
    enforcing the principle of least privilege, conducting regular audits, customizing
    roles to fit business needs, and providing user training to ensure a secure and
    compliant environment. Let us explore the details of each practice:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Principle of least privilege**: Grant users only the minimum permissions
    required to perform their tasks. Regularly review and update security roles to
    align with changes in responsibilities and organizational structure.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regular audits**: Perform regular audits of security roles and permissions
    to identify and mitigate discrepancies or potential security risks. This ensures
    a secure and compliant environment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Role customization**: While OOB security roles provide a solid foundation,
    customize roles to suit specific business needs. Tailoring these roles helps ensure
    that users have appropriate permissions, reducing the risk of unauthorized access.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User training**: Educate users about the importance of security roles and
    the appropriate use of permissions. Training helps users understand their responsibilities
    and the impact of their actions on data security.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These best practices will help you define and maintain security by managing
    roles effectively and ensuring proper implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we explored the foundational aspects of governance and security
    within Power Platform, focusing on key areas that ensure data protection and compliance.
    We began by delving into DLP policies, understanding their importance in safeguarding
    organizational data and preventing inadvertent exposure across various connectors
    and environments. We then discussed the concept of tenant isolation, highlighting
    its role in securing data flow and minimizing risks associated with multi-tenant
    environments. Finally, we examined specialized security roles, emphasizing their
    significance in enhancing governance and control by providing granular access
    to data and functionalities within Power Platform.
  prefs: []
  type: TYPE_NORMAL
- en: We detailed how to implement data protection measures, define connector usage
    rules, and assess the impact of DLP policies on canvas apps and cloud flows.
  prefs: []
  type: TYPE_NORMAL
- en: We explored how to manage secure data flows, govern tenant connectivity, and
    minimize data exfiltration risks by implementing isolated environments within
    Power Platform.
  prefs: []
  type: TYPE_NORMAL
- en: We discussed how to assign role-based access, control platform functionalities,
    and integrate Microsoft Entra groups with security roles to enhance governance
    and control.
  prefs: []
  type: TYPE_NORMAL
- en: By establishing these strong foundations in governance and security, you are
    better equipped to leverage the full potential of the Power Platform ecosystem
    while protecting your valuable data and information.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will shift our focus to understanding how we can ensure
    Power Platform solutions comply with industry-specific regulations and standards.
    We will explore the various compliance requirements, best practices for meeting
    these standards, and how to leverage Power Platform tools and features to maintain
    regulatory compliance. This will include discussions on GDPR, and other key regulatory
    frameworks, providing you with a comprehensive guide to navigating compliance
    in your Power Platform environment.
  prefs: []
  type: TYPE_NORMAL
