- en: '12'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '12'
- en: 'RegData, MongoDB, and Voyage AI: Semantic Data Protection in FSI'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: RegData、MongoDB和Voyage AI：金融服务业的语义数据保护
- en: 'AI has become an increasingly important part of modern banking transformation.
    However, as the **financial services industry** (**FSI**) worldwide embraces AI
    technologies, it faces a critical challenge: how to leverage AI *without compromising*
    the privacy, compliance, and control requirements that define the financial industry.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已成为现代银行转型中越来越重要的部分。然而，随着全球金融服务行业（**FSI**）拥抱人工智能技术，它面临着一项关键挑战：如何在不损害定义金融行业的隐私、合规性和控制要求的情况下利用人工智能。
- en: This chapter explores how MongoDB, RegData, and Voyage AI have formed a powerful
    alliance to address this challenge through semantic data protection, a sophisticated
    methodology that allows financial institutions to preserve the quality and utility
    of AI outputs while enforcing rigorous data security standards. It also supports
    the secure deployment of AI agents, which are increasingly acting autonomously
    on regulated information across complex financial workflows. Together, these technologies
    offer an integrated solution tailored to the high-security, high-stakes demands
    of AI in financial services.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了MongoDB、RegData和Voyage AI如何通过语义数据保护形成一个强大的联盟来应对这一挑战，这是一种复杂的方法，允许金融机构在执行严格的数据安全标准的同时，保持人工智能输出的质量和效用。它还支持人工智能代理的安全部署，这些代理越来越多地在复杂的金融工作流程中自主处理受监管的信息。这些技术共同提供了一种针对金融服务中人工智能高安全、高风险需求的综合解决方案。
- en: 'By the end of this chapter, you will understand the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将理解以下内容：
- en: Why traditional protection methods such as encryption and masking fall short
    in AI-driven financial services
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么传统的保护方法，如加密和屏蔽，在人工智能驱动的金融服务中不足
- en: How semantic data protection preserves meaning, context, and format while without
    exposing sensitive data
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语义数据保护如何在保护意义、上下文和格式的同时，不暴露敏感数据
- en: The core components of a secure AI architecture for financial institutions,
    from tokenization to prompt decoration
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 金融机构安全人工智能架构的核心组件，从令牌化到提示装饰
- en: How domain-specific embeddings improve both protection and performance in financial
    AI applications
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在金融人工智能应用中通过特定领域的嵌入提高保护和性能
- en: Secure deployment patterns for AI agents, including **Model Context Protocol**
    (**MCP**) and hybrid cloud strategies
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能代理的安全部署模式，包括**模型上下文协议**（**MCP**）和混合云策略
- en: Compliance strategies aligned to frameworks such as GDPR, FINMA, and the EU
    AI Act
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与GDPR、FINMA和欧盟人工智能法案等框架对齐的合规策略
- en: The data protection dilemma in financial AI
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 金融人工智能中的数据保护困境
- en: 'Financial institutions sit at the intersection of two powerful but seemingly
    contradictory forces: the drive to innovate with AI and the mandate to protect
    sensitive data. Banks and financial services companies possess vast repositories
    of highly regulated information, from **personally identifiable information**
    (**PII**), which includes data such as names, addresses, and social security numbers
    that can identify an individual, to **client identifying data** (**CID**), which
    refers to any information that can be used to identify a specific client or customer,
    and transaction histories. This data represents both their greatest asset for
    AI innovation and their greatest vulnerability. If mishandled, it can enable fraud,
    privacy violations, or costly regulatory penalties. If locked down too tightly,
    it becomes unusable for innovation.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 金融机构处于两种强大但看似矛盾的力量交汇处：利用人工智能进行创新的驱动和保护敏感数据的命令。银行和金融服务公司拥有大量高度监管的信息库，从**个人身份信息**（**PII**），包括姓名、地址和社会安全号码等可以识别个人的数据，到**客户识别数据**（**CID**），指的是任何可以用来识别特定客户或客户的信息，以及交易历史。这些数据既是他们人工智能创新的最大资产，也是他们最大的脆弱性。如果处理不当，它可能导致欺诈、隐私侵犯或昂贵的监管罚款。如果过于严格地锁定，它将无法用于创新。
- en: Traditional approaches to data security, such as complete encryption, data masking,
    and restricted access, often render data unusable for AI applications or significantly
    diminish the quality of AI outputs. When financial institutions attempt to leverage
    cloud-based AI services, they face additional challenges as sensitive data may
    leave their controlled environments, exposing them to regulatory violations and
    security risks.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的数据安全方法，如完全加密、数据遮蔽和受限访问，通常会使数据对人工智能应用不可用或显著降低人工智能输出的质量。当金融机构试图利用基于云的人工智能服务时，他们面临额外的挑战，因为敏感数据可能会离开他们的控制环境，使他们面临违规和安全隐患。
- en: 'This dilemma has created a significant barrier to AI adoption in financial
    services. According to industry research, many financial institutions cite data
    security and compliance concerns as major obstacles to implementing advanced AI
    solutions. The consequences are substantial: limited innovation, competitive disadvantage,
    and an inability to deliver the personalized, intelligent services that customers
    increasingly expect.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这种困境为金融服务中人工智能的采用设置了重大障碍。根据行业研究，许多金融机构将数据安全和合规问题列为实施高级人工智能解决方案的主要障碍。后果是严重的：创新受限、竞争劣势以及无法提供客户日益期望的个性化、智能服务。
- en: 'Traditional data protection methods fall short in AI contexts for several key
    reasons:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 传统数据保护方法在人工智能环境中存在不足，原因有几个关键点：
- en: '**Loss of context**: Masking or encryption strips away the semantic relationships
    and context that AI models need to generate meaningful outputs. A fraud-detection
    system, for instance, can no longer see spending patterns that flag suspicious
    behavior.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文丢失**：遮蔽或加密剥夺了人工智能模型生成有意义输出所需的语义关系和上下文。例如，一个欺诈检测系统将无法看到标记可疑行为的消费模式。'
- en: '**Binary approach**: Traditional methods often take an all-or-nothing approach;
    either data is fully accessible or completely restricted, with no middle ground
    for AI processing. For example, either every analyst sees a customer’s full SSN,
    or no one does, and neither works for AI processing.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**二分法**：传统方法通常采取全有或全无的方法；要么数据完全可访问，要么完全受限，没有中间地带供人工智能处理。例如，要么每个分析师都能看到客户的完整SSN，要么没有人能看到，这两种方法都不适用于人工智能处理。'
- en: '**Static protection**: Fixed rules for data protection cannot adapt to the
    dynamic, contextual nature of AI interactions and use cases. Consider a rule that
    works during training but fails when the model encounters novel inputs in production.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**静态保护**：数据保护固定的规则无法适应人工智能交互和用例的动态、上下文性质。考虑一个在训练期间有效但在模型在生产中遇到新颖输入时失败的规则。'
- en: '**Diminished utility**: Heavy-handed protection techniques significantly reduce
    the quality and relevance of AI outputs. In such cases, insights become so generic
    that they no longer help relationship managers or product teams.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效用降低**：过于强硬的保护技术显著降低了人工智能输出的质量和相关性。在这种情况下，洞察变得如此泛泛，以至于它们不再帮助关系经理或产品团队。'
- en: 'These shortcomings explain why legacy approaches are incompatible with the
    needs of financial AI and point to the necessity of a new paradigm: semantic data
    protection.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这些不足解释了为什么传统方法与金融人工智能的需求不兼容，并指出了新范式——语义数据保护的必要性。
- en: Understanding the MongoDB, RegData, and Voyage AI approach to semantic data
    protection
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解MongoDB、RegData和Voyage AI的语义数据保护方法
- en: The integration of MongoDB, RegData, and Voyage AI represents a paradigm shift
    in how financial institutions can secure sensitive information while preserving
    AI functionality. Unlike traditional approaches that focus solely on hiding or
    restricting data, this combined solution preserves the meaning, context, and format
    of information while replacing the sensitive values themselves.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 将MongoDB、RegData和Voyage AI的集成代表了金融机构在保护敏感信息的同时保持人工智能功能的一种范式转变。与仅关注隐藏或限制数据的传统方法不同，这种综合解决方案在替换敏感值的同时，保留了信息的意义、上下文和格式。
- en: MongoDB provides a flexible, scalable data foundation with its document model
    and Atlas Vector Search capabilities. RegData contributes its advanced protection
    methodology and compliance expertise. Voyage AI (acquired by MongoDB) supplies
    domain-specific embeddings that understand financial terminology and concepts.
    Together, they create a comprehensive approach to addressing the unique challenges
    of AI security in financial services. This alliance makes AI adoption practical,
    not theoretical, for banks under regulatory scrutiny.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB通过其文档模型和Atlas向量搜索功能提供了一种灵活、可扩展的数据基础。RegData贡献了其先进的保护方法和合规专业知识。Voyage
    AI（被MongoDB收购）提供了解释金融术语和概念的特定领域嵌入。它们共同创造了一种全面的方法来应对金融服务中AI安全的独特挑战。这个联盟使银行在监管审查下采用AI变得实用，而非理论化。
- en: What is semantic data protection?
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是语义数据保护？
- en: Semantic data protection safeguards the *meaning* and *context* of information
    rather than just its raw values or surface format. While traditional data protection
    methods (such as encryption, masking, and access control) often focus on securing
    data values or formats, semantic data protection looks deeper. It replaces sensitive
    values in ways that preserve format, relationships, and regulatory context so
    that AI systems remain useful without exposing real identities.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 语义数据保护保护信息的**意义**和**上下文**，而不仅仅是其原始值或表面格式。虽然传统数据保护方法（如加密、掩码和访问控制）通常侧重于保护数据值或格式，但语义数据保护则更深入。它以保留格式、关系和监管上下文的方式替换敏感值，从而使AI系统保持有用性，而不暴露真实身份。
- en: 'The core principles of semantic data protection include the following:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 语义数据保护的核心原则包括以下内容：
- en: '**Semantic protection**: The protection keeps the semantic or the original
    data. A phone number is replaced by another phone number; a city name is replaced
    by another city name.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义保护**：保护保持语义或原始数据。一个电话号码被另一个电话号码所替代；一个城市名称被另一个城市名称所替代。'
- en: '**Contextual semantic protection**: Protection depends on the meaning and usage
    of data, not just its type or label. For example, a phone number may be treated
    differently depending on whether it’s personal, business-related, or public. The
    name of a city may be replaced by the name of a city of the same jurisdiction,
    where the same type of laws will apply.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文语义保护**：保护依赖于数据的含义和用法，而不仅仅是其类型或标签。例如，一个电话号码可能根据它是个人、与业务相关还是公共的而以不同的方式处理。一个城市的名称可能被替换为同一司法管辖区内的城市名称，在那里将适用相同类型的法律。'
- en: Beyond these foundational approaches, semantic data protection incorporates
    several additional sophisticated capabilities. Data classification and controls
    are determined by semantic sensitivity rather than simple data types, ensuring
    that protection levels match the actual risk and importance of the information.
    The system leverages semantic models such as ontologies, taxonomies, or knowledge
    graphs to define data relationships and meanings, enabling consistent policy enforcement
    across complex data ecosystems. Furthermore, data governance becomes truly contextual,
    with usage rules that dynamically adapt based on the contextual meaning of data,
    user roles, intended use cases, and applicable regulatory frameworks such as GDPR,
    FINMA, or HIPAA.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些基础方法之外，语义数据保护还纳入了几个额外的复杂功能。数据分类和控制由语义敏感性而非简单的数据类型决定，确保保护级别与信息的实际风险和重要性相匹配。系统利用诸如本体、分类法或知识图谱之类的语义模型来定义数据关系和含义，使复杂数据生态系统中的一致政策执行成为可能。此外，数据治理变得真正具有上下文性，使用户用规则根据数据的上下文含义、用户角色、预期用例以及适用的监管框架（如GDPR、FINMA或HIPAA）动态适应。
- en: '![](img/B34136_12_01.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_12_01.png)'
- en: 'Figure 12.1: Semantic data protection framework architecture and data flow'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1：语义数据保护框架架构和数据流
- en: This diagram illustrates the key components of a semantic data protection framework,
    showing how data flows through discovery, classification, protection, and secure
    processing stages while maintaining semantic integrity. It demonstrates how sensitive
    information is transformed while preserving context and format, enabling AI systems
    to process protected data without compromising security or output quality.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了语义数据保护框架的关键组件，展示了数据如何在发现、分类、保护和安全处理阶段流动，同时保持语义完整性。它展示了敏感信息在保留上下文和格式的同时被转换，使AI系统能够在不损害安全或输出质量的情况下处理受保护的数据。
- en: The **Discovery & Classification** module analyzes the input data to identify
    any sensitive information, classifies it appropriately, and understands the context
    and scope of the query. Based on these findings, the data protection module applies
    the most suitable protection technique to safeguard the sensitive data, ensuring
    that the chosen method aligns with the classification and contextual understanding
    provided by the discovery and classification module. The data protection module
    is responsible for protecting the sensitive data contained in the input. Based
    on the classification and context identified by the **Discovery & Classification**
    module, the most appropriate technique is chosen to protect the sensitive data.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**发现与分类**模块分析输入数据以识别任何敏感信息，对其进行适当的分类，并理解查询的上下文和范围。基于这些发现，数据保护模块应用最合适的保护技术来保护敏感数据，确保所选方法与发现和分类模块提供的分类和上下文理解相一致。数据保护模块负责保护输入中包含的敏感数据。基于**发现与分类**模块确定的分类和上下文，选择最合适的技巧来保护敏感数据。'
- en: RegData supports techniques that preserve the format or type of information
    (e.g., tokens matching **International Bank Account Number** (**IBAN**) format
    and checksum, or replacing a city name with another from the same country). With
    added semantic logic, it can now choose the technique based on an understanding
    of the information. The output is tokenized data that can be processed by public
    LLMs without revealing PII.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: RegData支持保留信息格式或类型的技巧（例如，匹配**国际银行账户号码**（**IBAN**）格式和校验和，或用一个国家的城市名称替换另一个城市名称）。通过增加语义逻辑，它现在可以根据对信息的理解来选择技术。输出是经过标记的数据，可以被公共LLMs处理，同时不泄露PII。
- en: Key techniques in semantic data protection
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语义数据保护的关键技术
- en: Semantic data protection in financial services relies on advanced techniques
    designed to safeguard sensitive information while preserving its utility. Let’s
    take a closer look at these techniques.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 金融服务中的语义数据保护依赖于旨在保护敏感信息同时保留其有用性的高级技术。让我们更详细地看看这些技术。
- en: Format-preserving tokenization
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 格式保留标记化
- en: One such method is *format-preserving tokenization*, which replaces sensitive
    data with surrogate tokens that maintain the same format (length, character classes,
    patterns) as the original. For example, an IBAN number such as **CH93 0076 2011
    6238 5295 7** might be replaced with **CH93 [BANK_TOKEN_001]**, where the token
    preserves the format while obscuring the actual account details. This technique
    is particularly valuable for financial data such as account numbers, credit card
    numbers, IBANs and routing codes, and transaction IDs.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一种方法是*格式保留标记化*，它用保持相同格式（长度、字符类别、模式）的代理标记替换敏感数据。例如，一个像**CH93 0076 2011 6238
    5295 7**这样的IBAN号码可能被替换为**CH93 [BANK_TOKEN_001]**，其中标记保留了格式，同时隐藏了实际的账户详情。这种技术在金融数据（如账户号码、信用卡号码、IBAN和路由代码以及交易ID）方面尤其有价值。
- en: Contextual semantic protection
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文语义保护
- en: 'Another powerful approach is *Contextual Semantic Protection*, which maps real
    entities into consistent pseudonyms that carry the same type and role in the data.
    For instance, let’s focus on a relocation application. This application contains
    location information about people: where they are moving from and where they are
    moving to. If we are only interested in hiding the locations, then semantic protection
    is enough. We would replace the names of the cities with other random city names,
    or with names of cities in the same country as the destination country.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种强大的方法是*上下文语义保护*，它将真实实体映射到一致的化名，这些化名在数据中具有相同的类型和角色。例如，让我们关注一个搬迁申请。这个申请包含有关人们的位置信息：他们从哪里搬走以及他们要搬到哪里。如果我们只对隐藏位置感兴趣，那么语义保护就足够了。我们会用其他随机城市名称替换城市名称，或者用目标国家所在国家的城市名称替换。
- en: But if we are interested in providing advice or in estimating the cost of relocation,
    including the living costs, as well as local taxes that will apply in the target
    location, then a random pseudonym will fail to provide the advice. This is where
    contextual semantic protection comes in. The name of the target city will be pseudonymized
    to the name of another city where the same rules or taxes will apply.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '但如果我们对提供建议或在估计搬迁成本（包括生活成本以及将在目标位置适用的当地税收）感兴趣，那么随机化名将无法提供建议。这就是上下文语义保护发挥作用的地方。目标城市的名称将被伪匿名化为另一个城市，在那里将适用相同的规则或税收。 '
- en: 'For instance, the question: *What would be the increase in taxes if John Smith
    moved to Zurich?* might get pseudonymized to *What would be the increase in taxes
    if Marcus Reed moved to Elsau?* In this transformation, semantics are preserved.
    *Marcus Reed* remains clearly identifiable as a person (individual customer).
    Elsau is a legitimate city name, and the tax rules in Elsau are consistent with
    the rules in Zurich.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，问题：“如果约翰·史密斯搬到苏黎世，税收会增加多少？”可能会被匿名化成“如果马库斯·里德搬到艾尔萨乌，税收会增加多少？”在这个转换中，语义得到了保留。*马库斯·里德*作为一个个人（单个客户）被清楚地识别出来。艾尔萨乌是一个合法的城市名称，艾尔萨乌的税收规则与苏黎世的规则一致。
- en: We could also think about banking transfers, where we could pseudonymize the
    IBAN values, with a format-preserving scheme. In contextual semantic protection,
    we would choose target pseudonymized IBANs that are consistent with some company
    rules. For example, an IBAN of a given European country would be replaced by the
    **IBAN of another European country**, while a US IBAN would be replaced by **another
    US IBAN**.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以考虑银行转账，其中我们可以使用格式保留方案对IBAN值进行匿名化。在上下文语义保护中，我们会选择符合某些公司规则的目标匿名化IBAN。例如，一个欧洲国家的IBAN会被替换为另一个欧洲国家的**IBAN**，而美国的IBAN会被替换为**另一个美国的IBAN**。
- en: For instance, all client names might be replaced with consistent pseudonyms
    that preserve their identity as people while hiding their actual identities.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，所有客户名称都可能被替换为一致的匿名名称，以保留他们作为人的身份，同时隐藏他们的真实身份。
- en: By maintaining a consistent relationship between the data to protect, we are
    allowing AI models to generate meaningful insights without exposing real identities.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 通过保持要保护的数据之间的一致关系，我们允许AI模型生成有意义的见解，同时不暴露真实身份。
- en: Semantic partitioning with token classes
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于标记类的语义分区
- en: 'This technique classifies tokens into semantic buckets (PII, client identifiers,
    financial, location, etc.) and tokenizes each category with its own namespace.
    Here are some examples:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术将标记分类到语义桶（PII、客户标识符、财务、位置等）中，并为每个类别使用其自己的命名空间进行标记化。以下是一些示例：
- en: '[PII_001] for PII'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[PII_001] 用于PII'
- en: '[CID_017] for CID'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[CID_017] 用于CID'
- en: '[FIN_042] for financial information'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[FIN_042] 用于财务信息'
- en: Semantic partitioning with token classes allows for granular protection policies
    based on data type and context, while still enabling AI models to understand the
    semantic role of each token.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 基于标记类的语义分区允许基于数据类型和上下文实现细粒度保护策略，同时仍然使AI模型能够理解每个标记的语义角色。
- en: Deterministic tokens
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确定性标记
- en: Deterministic tokenization ensures that the same input always produces the same
    token (e.g., `Alice` always maps to the same token). This consistency is crucial
    for multi-step reasoning or dialogue, where the model must recognize references
    across interactions. For example, if a client asks about `"my UBS account"` in
    one message and then refers to it as `that account` in a follow-up, deterministic
    tokens ensure the AI understands both references resolve to the same entity, preserving
    continuity.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 确定性标记化确保相同的输入总是产生相同的标记（例如，`Alice`总是映射到相同的标记）。这种一致性对于多步推理或对话至关重要，其中模型必须识别交互之间的引用。例如，如果客户在一则消息中询问“我的UBS账户”，然后在后续消息中将其称为“那个账户”，确定性标记确保AI理解这两个引用都指向同一个实体，从而保持连续性。
- en: Building a comprehensive semantic protection architecture
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建全面的语义保护架构
- en: Effective semantic data protection extends beyond individual techniques; it
    requires a holistic architecture that integrates with all components of a financial
    institution’s AI ecosystem. The MongoDB, RegData, and Voyage AI alliance has pioneered
    this comprehensive approach, developing an end-to-end architecture that addresses
    the full spectrum of security and compliance challenges. This section outlines
    the key components of this integrated semantic protection framework.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的语义数据保护不仅限于个别技术；它需要一个整体架构，该架构与金融机构AI生态系统的所有组件集成。MongoDB、RegData和Voyage AI联盟在这方面开创了全面的方法，开发了一个端到端架构，解决了安全性和合规性的全面挑战。本节概述了这一集成语义保护框架的关键组件。
- en: '![](img/B34136_12_02.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_12_02.png)'
- en: 'Figure 12.2: End-to-end semantic protection architecture'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2：端到端语义保护架构
- en: This diagram shows the complete flow of data through a semantically protected
    AI system, from initial data ingestion through processing by cloud AI services
    to secure output rendering. The visualization highlights integration points between
    bank systems, protection layers, API gateways, and cloud services, demonstrating
    how sensitive data remains protected throughout the entire lifecycle.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了通过语义保护的人工智能系统中的数据完整流程，从初始数据摄取到通过云人工智能服务处理，再到安全输出渲染。可视化突出了银行系统、保护层、API网关和云服务之间的集成点，展示了敏感数据在整个生命周期中如何保持保护状态。
- en: Input data can be of multiple types and can come from different sources, such
    as files, databases, applications, and audio files. Calls to public LLMs are generally
    done via API calls through an API gateway. The API gateway ensures that the PII
    is protected before being sent to public LLMs. So, the gateway uses protection
    services to classify and protect the sensitive data. The data protection module
    replaces the sensitive fields with tokenized data before being sent to the LLMs.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 输入数据可以是多种类型，并可能来自不同的来源，例如文件、数据库、应用程序和音频文件。对公共LLM的调用通常是通过API网关的API调用完成的。API网关确保在发送到公共LLM之前保护PII。因此，网关使用保护服务对敏感数据进行分类和保护。数据保护模块在发送到LLM之前用标记化数据替换敏感字段。
- en: MongoDB as the foundation with RegData’s data security platform
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MongoDB作为基础，结合RegData的数据安全平台
- en: 'MongoDB is the foundational data platform for this integrated solution, with
    RegData’s **Data Security Platform** (**DSP**) providing the specialized protection
    layer. This combination offers the following:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB是该集成解决方案的基础数据平台，RegData的**数据安全平台**（**DSP**）提供专业的保护层。这种组合提供了以下功能：
- en: '**Unified data storage**: MongoDB’s flexible document model stores structured,
    semi-structured, and unstructured data in a single platform, eliminating silos
    and simplifying architecture'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统一数据存储**：MongoDB的灵活文档模型将结构化、半结构化和非结构化数据存储在单一平台上，消除了孤岛并简化了架构'
- en: '**Discovery and classification**: RegData’s automated identification of sensitive
    data within unstructured content uses advanced techniques such as NLP and **Named
    Entity Recognition** (**NER**), a technology that identifies and categorizes specific
    entities in text'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发现和分类**：RegData使用先进的NLP和**命名实体识别**（**NER**）技术自动识别非结构化内容中的敏感数据，这是一种识别和分类文本中特定实体的技术'
- en: '**Scalable performance**: MongoDB’s distributed architecture ensures the solution
    can handle financial data at any scale, from thousands to billions of records'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性能**：MongoDB的分布式架构确保解决方案可以处理任何规模的数据，从数千到数十亿条记录'
- en: '**Protection technique selection**: Intelligent application of the most appropriate
    protection method based on data type and context'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保护技术选择**：根据数据类型和上下文智能应用最合适的保护方法'
- en: '**Token vault management**: Secure storage of the mapping between original
    values and their tokenized representations'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**令牌保险库管理**：安全存储原始值与其标记表示之间的映射'
- en: '**Policy enforcement**: Consistent application of protection policies across
    all AI interactions'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略执行**：在所有人工智能交互中一致应用保护策略'
- en: Together, MongoDB and RegData provide a resilient and intelligent backbone for
    financial services, enabling institutions to unify their data, enforce robust
    protection policies, and accelerate AI adoption without sacrificing security.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 一起，MongoDB和RegData为金融服务提供了一个弹性且智能的骨干，使机构能够统一其数据，执行强大的保护策略，并加速人工智能的采用，而不会牺牲安全性。
- en: API gateway with MongoDB and RegData’s prompt decoration
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有MongoDB和RegData提示装饰的API网关
- en: 'The integrated solution features an API gateway that acts as an intelligent
    AI-aware secure middleware (intermediary software that connects different applications)
    between financial applications and AI models. MongoDB provides the data infrastructure,
    while RegData contributes prompt decoration capabilities:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 集成解决方案具有一个API网关，充当金融应用程序和人工智能模型之间的智能AI感知安全中间件（连接不同应用程序的中间软件）。MongoDB提供数据基础设施，而RegData贡献了提示装饰功能：
- en: '**MongoDB Atlas as the data hub**: Serves as the central repository for all
    data flowing through the API gateway, ensuring consistency and persistence'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MongoDB Atlas作为数据枢纽**：作为通过API网关流动的所有数据的中央存储库，确保一致性和持久性'
- en: '**Prompt decoration**: RegData’s wrapper layer modifies, annotates, or enhances
    prompts (instructions given to AI models) before they’re sent to AI models'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示装饰**：RegData的包装层在将提示（提供给AI模型的指令）发送到AI模型之前对其进行修改、注释或增强'
- en: '**Normalization**: Standardizes the format of semantic tokens and wrappers
    to ensure consistent processing'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**规范化**：标准化语义标记和包装的格式，以确保一致的处理'
- en: '**Protection application**: Applies all required protection techniques before
    sending requests to cloud-based AI models'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保护应用**：在向云基础AI模型发送请求之前应用所有必需的保护技术'
- en: '**MCP**: A standardized framework that defines how context (relevant information
    about the conversation or task) is passed between user sessions, AI models, and
    backend systems'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP**：一个标准化的框架，定义了如何在用户会话、AI模型和后端系统之间传递上下文（关于对话或任务的相关信息）'
- en: By combining MongoDB’s centralized data infrastructure with RegData’s intelligent
    prompt handling, the solution creates a secure, AI-ready bridge between financial
    systems and models, streamlining interactions while safeguarding sensitive content
    at every step.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将MongoDB的集中式数据基础设施与RegData的智能提示处理相结合，该解决方案在金融系统和模型之间创建了一个安全、AI就绪的桥梁，简化了交互，同时在每一步保护敏感内容。
- en: Protected vector search with MongoDB Atlas and Voyage AI
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用MongoDB Atlas和Voyage AI进行受保护的向量搜索
- en: 'MongoDB Atlas Vector Search, combined with RegData’s protection techniques
    and Voyage AI’s domain-specific embeddings, creates a powerful protected search
    capability essential for RAG in financial AI applications:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB Atlas向量搜索，结合RegData的保护技术和Voyage AI的特定领域嵌入，创建了一个强大的受保护搜索能力，这对于金融AI应用中的RAG至关重要：
- en: '**MongoDB Atlas Vector Search**: Provides the infrastructure for storing and
    querying billions of vectors with sub-second performance'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MongoDB Atlas向量搜索**：提供存储和查询数十亿向量并实现亚秒级性能的基础设施'
- en: '**Voyage AI’s financial embeddings**: Generate domain-specific vector representations
    that understand financial terminology and concepts'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Voyage AI的金融嵌入**：生成理解金融术语和概念的特定领域向量表示'
- en: '**RegData’s tokenized embeddings**: Store vector embeddings (numerical representations
    of text that capture semantic meaning) of documents and data in tokenized form'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RegData的标记嵌入**：以标记形式存储文档和数据的向量嵌入（捕获语义意义的文本的数值表示）'
- en: '**Semantic preservation**: Ensures vector similarity remains valid even when
    surface text is masked'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义保留**：确保即使表面文本被屏蔽，向量相似性仍然有效'
- en: '**Contextual recall**: Allows AI to *remember* that [ADDR_42] is semantically
    similar to other addresses without exposing the actual address'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境回忆**：允许AI记住[ADDR_42]与其他地址在语义上相似，而不暴露实际地址'
- en: This integrated approach delivers high-performance, privacy-preserving vector
    search tailored for financial contexts, allowing AI systems to retrieve nuanced,
    domain-aware insights while keeping all sensitive details under wraps.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这种集成方法提供了一种高性能、隐私保护向量搜索，适用于金融环境，允许AI系统检索细微、领域感知的见解，同时将所有敏感细节保密。
- en: Secure output rendering
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安全输出渲染
- en: 'The final component ensures that protected data is only revealed in appropriate
    contexts:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个组件确保受保护的数据仅在适当的情况下被揭示：
- en: '**Token remapping**: On authorized devices or within secure environments, tokens
    are mapped back to their original values'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**令牌重映射**：在授权设备或安全环境中，令牌被映射回其原始值'
- en: '**Contextual authorization**: Access to original values is granted based on
    user role, location, and purpose'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境授权**：根据用户角色、位置和目的授权访问原始值'
- en: '**Audit logging**: All access to original values is logged for compliance and
    security monitoring'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审计日志**：记录对原始值的所有访问，以进行合规性和安全监控'
- en: This final safeguard ensures that sensitive information is revealed only when
    conditions are met, maintaining compliance and trust while giving authorized users
    access to the data they need; nothing more, nothing less.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的保障措施确保只有在满足条件时才会透露敏感信息，在保持合规性和信任的同时，授权用户访问他们所需的数据；不多也不少。
- en: Domain-specific intelligence for enhanced security and performance
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 针对特定领域的智能，以增强安全和性能
- en: While semantic protection provides the foundation for secure AI in financial
    services, domain-specific intelligence takes both security and performance to
    the next level. As explored in detail in [*Chapter 11*](11.xhtml#_idTextAnchor255),
    *Financial Services and the Next Wave of AI*, financial services involve specialized
    language, complex regulations, and nuanced concepts that general-purpose AI models
    often struggle to interpret accurately.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然语义保护为金融服务中的安全AI提供了基础，但特定领域的智能将安全和性能提升到了新的水平。如在第11章[*“金融服务与AI的下一波”*](11.xhtml#_idTextAnchor255)中详细探讨的那样，金融服务涉及专业语言、复杂法规和细微的概念，这些是通用AI模型往往难以准确解释的。
- en: Leveraging financial-specific embeddings for enhanced protection
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用金融特定嵌入进行增强保护
- en: 'The MongoDB, RegData, and Voyage AI integration builds upon the domain-specific
    embedding capabilities detailed in [*Chapter 11*](11.xhtml#_idTextAnchor255).
    By incorporating Voyage AI’s financial-specialized embedding models, the semantic
    protection framework gains several key advantages:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: MongoDB、RegData和Voyage AI的集成建立在第11章[*“金融服务与AI的下一波”*](11.xhtml#_idTextAnchor255)中详细描述的特定领域嵌入能力之上。通过整合Voyage
    AI的金融特定嵌入模型，语义保护框架获得了几个关键优势：
- en: '**Enhanced detection accuracy**: Financial embeddings better identify sensitive
    information that requires protection, improving the precision of RegData’s classification
    systems'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强检测精度**：金融嵌入更好地识别需要保护的安全信息，提高了RegData分类系统的精确度'
- en: '**Contextual protection**: Domain-specific understanding enables more nuanced
    protection decisions based on financial context rather than simple pattern matching'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文保护**：特定领域的理解使基于金融上下文的保护决策更加细腻，而不是简单的模式匹配'
- en: '**Improved retrieval quality**: When combined with MongoDB Atlas Vector Search,
    financial embeddings ensure that protected searches maintain relevance and accuracy'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进检索质量**：与MongoDB Atlas Vector Search结合使用时，金融嵌入确保受保护的搜索保持相关性和准确性'
- en: This approach delivers significant performance improvements over general-purpose
    models, particularly for compliance-related tasks and sensitive data identification.
    It ensures that semantic protection is not only secure but also maintains the
    high-quality, contextually relevant outputs that financial institutions require
    for effective AI applications. The combination of RegData’s protection techniques
    with financial-specific intelligence creates a comprehensive solution that addresses
    both security and performance requirements in the demanding financial services
    environment.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法在通用模型之上实现了显著的性能提升，尤其是在合规相关任务和敏感数据识别方面。它确保语义保护不仅安全，而且还能保持金融机构对有效AI应用所需的高质量、上下文相关的输出。将RegData的保护技术与金融特定智能相结合，为要求严格的金融服务环境提供了一个全面的解决方案，该解决方案解决了安全和性能需求。
- en: 'Real-world innovation: interactive banking'
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现实世界的创新：互动银行
- en: To illustrate how the integrated MongoDB, RegData, and Voyage AI solution works
    in practice, let’s examine a use case scenario of a private bank offering a digital
    GenAI-powered chat assistant for its **ultra-high-net-worth** (**UHNW**) clients.
    This implementation showcases the power of combining MongoDB’s data platform,
    **RegData’s Protection Suite** (**RPS**), and Voyage AI’s domain-specific embeddings
    to enable secure yet effective AI interactions in a highly regulated environment.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明集成的MongoDB、RegData和Voyage AI解决方案在实际中的应用，让我们考察一个私人银行为其**超高净值**（**UHNW**）客户提供数字通用人工智能（GenAI）驱动的聊天助手的用例场景。这种实施展示了将MongoDB的数据平台、**RegData的保护套件**（**RPS**）和Voyage
    AI的特定领域嵌入相结合以在高度监管的环境中实现安全且有效的AI交互的力量。
- en: 'The bank’s UHNW clients use the AI banking assistant for various tasks:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 银行的超高净值（UHNW）客户使用AI银行助手完成各种任务：
- en: Checking account balances and transaction histories
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查账户余额和交易历史
- en: Requesting transfers (e.g., *Transfer 300K CHF to my lawyer*)
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求转账（例如，*将30万瑞士法郎转账给我的律师*）
- en: Receiving market alerts and investment insights
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接收市场警报和投资洞察
- en: Reviewing portfolio performance and asset allocations
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查投资组合表现和资产配置
- en: Scheduling meetings with relationship managers
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排与客户经理的会议
- en: 'These interactions involve highly sensitive data: account numbers, transaction
    histories, personal identifiers, and behavioral patterns. Processing this data
    through cloud-based GenAI models risks exposing it to third-party platforms, potentially
    violating regulations and compromising client confidentiality. How can we then
    leverage public GenAI services or LLM models while protecting highly sensitive
    data?'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这些交互涉及高度敏感的数据：账户号码、交易历史、个人标识符和行为模式。通过基于云的GenAI模型处理这些数据可能会将其暴露给第三方平台，可能违反法规并损害客户机密性。那么我们如何在保护高度敏感数据的同时利用公共GenAI服务或LLM模型呢？
- en: '![A diagram of a data flow  AI-generated content may be incorrect.](img/B34136_12_03.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![数据流图，AI生成的内容可能不正确。](img/B34136_12_03.png)'
- en: 'Figure 12.3: Interactive banking system workflow and user interface components'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3：交互式银行系统工作流程和用户界面组件
- en: This diagram illustrates the comprehensive architecture of a semantically protected
    banking assistant, showing how client queries are processed through multiple protection
    layers before reaching AI models. The system integrates MongoDB’s data platform
    with Voyage AI’s domain-specific embeddings and RPS to deliver both semantic and
    contextual protection.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了语义保护银行助手的综合架构，展示了客户查询如何通过多个保护层处理，然后到达AI模型。系统集成了MongoDB的数据平台、Voyage AI的特定领域嵌入和RPS，以提供语义和上下文保护。
- en: The architecture demonstrates how semantic protection maintains data meaning
    and format (replacing sensitive values with semantically equivalent tokens), while
    contextual protection adapts security measures based on data usage, user roles,
    and regulatory requirements. Client queries flow through the API gateway to the
    **Discovery & Classification** layer (utilizing SLM, NLP, and NER technologies),
    then through the **Semantic & Contextual Protection** module with its integrated
    policies, protection mechanisms, and reporting capabilities.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 该架构展示了语义保护如何维护数据意义和格式（用语义等价令牌替换敏感值），同时上下文保护根据数据使用、用户角色和监管要求调整安全措施。客户查询通过API网关流向**发现与分类**层（利用SLM、NLP和NER技术），然后通过集成了策略、保护机制和报告能力的**语义与上下文保护**模块。
- en: Protected data is then processed by public cloud LLMs, with responses securely
    rendered, showing original values only on authorized devices. The visualization
    highlights the end-to-end protection of sensitive financial information throughout
    the entire conversation flow, ensuring regulatory compliance while maintaining
    the quality and utility of AI-powered banking interactions.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 受保护的数据随后由公共云LLM处理，响应安全呈现，仅在授权设备上显示原始值。可视化突出了整个对话流程中敏感金融信息的端到端保护，确保合规性同时保持AI驱动的银行交互的质量和实用性。
- en: 'Here’s how the MongoDB, RegData, and Voyage AI integration enables secure yet
    effective AI interactions:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何通过MongoDB、RegData和Voyage AI的集成实现安全且有效的AI交互：
- en: '**Data Discovery & Classification**: When a client says *Transfer 200K CHF
    to Pierre*, the system uses RegData AI-powered PII identification and Voyage AI’s
    financial-specific models to identify *Pierre* as PII and *200K CHF* as financial
    information requiring protection.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据发现与分类**：当客户说*将20万瑞士法郎转账给Pierre*时，系统使用RegData AI驱动的PII识别和Voyage AI的特定金融模型将*Pierre*识别为PII，将*200K
    CHF*识别为需要保护的金融信息。'
- en: '**Semantic data protection with RegData**: Before sending the details to the
    GenAI model, **RegData Protection Suite** (**RPS**) applies the following:'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用RegData进行语义数据保护**：在将详细信息发送到GenAI模型之前，**RegData保护套件（RPS**）应用以下操作：'
- en: '**Semantic-preserving protection**: *What are the fees, and conditions, if
    I want to transfer 200K CHF to this IBAN CH93 0076 2011 6238 5295 7?* becomes
    *What are the fees,* *and conditions,* *if I want to transfer 200K CHF to* *CH2008770435380216999?*'
  id: totrans-116
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保留语义的保护**：*我想知道，如果我想将20万瑞士法郎转账到这个IBAN CH93 0076 2011 6238 5295 7，费用和条件是什么？*变为*我想知道，*
    *费用，* *和条件，* *如果我想将20万瑞士法郎转账到* *CH2008770435380216999？*'
- en: '**Contextual semantic protection**: *Provide me with the list of all the transactions
    on my UBS account* becomes *Provide me with the list of all the transactions on
    my* *Bank_CH account*'
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文语义保护**：*提供我UBS账户上所有交易列表*变为*提供我* *Bank_CH账户* *上所有交易列表*'
- en: '**Deterministic tokens**: *Pierre* always maps to Jacques and *IBAN CH2008770435380216999*
    always maps to CH93 0076 2011 6238 5295 7, across all interactions'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定性令牌**：*Pierre*始终映射到*Jacques*，而*IBAN CH2008770435380216999*始终映射到CH93 0076
    2011 6238 5295 7，在所有交互中'
- en: '**Prompt decoration with MCP**: The prompt decorator ensures the GenAI model
    receives only protected tokens, and treats them accordingly, while preserving
    their semantic meaning through MCP.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MCP的提示装饰**：提示装饰器确保GenAI模型仅接收受保护的令牌，并相应地处理它们，同时通过MCP保留其语义意义'
- en: '**Protected vector search with MongoDB Atlas**: When the client asks *What
    did I spend on philanthropic activities last month?*, the system uses Voyage AI
    to convert the protected query into a vector (a mathematical representation of
    text). MongoDB Atlas Vector Search finds similar content in tokenized transaction
    data, and RegData ensures only protected data is retrieved without exposing actual
    transaction details.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用MongoDB Atlas的受保护向量搜索**：当客户询问“我上个月在慈善活动上花了多少钱？”时，系统使用Voyage AI将受保护的查询转换为向量（文本的数学表示）。MongoDB
    Atlas向量搜索在标记化交易数据中找到类似的内容，RegData确保仅检索受保护的数据，而不暴露实际交易细节'
- en: '**Secure output rendering**: On the client’s authorized device, the app re-maps
    tokens to real values (e.g., Jacques → Pierre). The client sees natural, fluent
    responses with their actual data, while the AI model only processed protected
    tokens.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全的输出渲染**：在客户的授权设备上，应用程序将令牌重新映射到真实值（例如，雅克 → 皮埃尔）。客户看到自然流畅的响应，其中包含实际数据，而AI模型仅处理受保护的令牌'
- en: 'This integrated MongoDB, RegData, and Voyage AI implementation delivers significant
    benefits:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这种集成的MongoDB、RegData和Voyage AI实现带来了显著的好处：
- en: '**Regulatory compliance**: Meets requirements of FINMA (the Swiss Financial
    Market Supervisory Authority), GDPR, and other regulations by never exposing sensitive
    data to third-party AI providers'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规性**：通过从不向第三方AI提供商暴露敏感数据，满足FINMA（瑞士金融市场监督局）、GDPR和其他法规的要求'
- en: '**Enhanced user experience**: Clients receive personalized, context-aware responses
    despite the underlying protection'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强的用户体验**：即使在底层保护的情况下，客户也能收到个性化的、上下文感知的响应'
- en: '**Operational efficiency**: Relationship managers focus on high-value activities
    while the AI handles routine inquiries'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运营效率**：关系经理专注于高价值活动，而AI处理常规查询'
- en: '**Scalable security**: MongoDB’s distributed architecture, combined with RegData’s
    protection, ensures the solution can scale to handle growing AI use cases without
    compromising data protection'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展的安全性**：MongoDB的分布式架构与RegData的保护相结合，确保解决方案可以扩展以处理不断增长的AI用例，而不会损害数据保护'
- en: '**Superior relevance**: Voyage AI’s domain-specific embeddings ensure responses
    are highly relevant to financial contexts'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优越的相关性**：Voyage AI的特定领域嵌入确保响应与金融环境高度相关'
- en: These core capabilities form the foundation, whereas advanced techniques can
    build on them to unlock even greater possibilities.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 这些核心能力构成了基础，而高级技术可以在此基础上构建，以解锁更大的可能性
- en: Building the future with advanced techniques and emerging standards
  id: totrans-129
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用高级技术和新兴标准构建未来
- en: As financial institutions continue to advance their AI capabilities, several
    emerging techniques and standards are shaping the future of semantic data protection.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 随着金融机构继续提升其AI能力，一些新兴的技术和标准正在塑造语义数据保护的未来
- en: MCP
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP
- en: 'MCP represents a significant advancement in standardizing how context is managed
    across AI interactions. As will be detailed extensively in [*Chapter 19*](19.xhtml#_idTextAnchor429),
    *Outlook*: *Beyond Today’s AI*, MCP is transforming how AI applications are built
    and integrated, moving beyond the previous approach of creating one-off tools
    for each integration.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: MCP代表了在AI交互中标准化上下文管理方面的重大进步。正如将在[*第19章*](19.xhtml#_idTextAnchor429)中详细阐述的，*展望：超越今天的AI*，MCP正在改变AI应用程序的构建和集成方式，超越了之前为每个集成创建一次性工具的方法
- en: 'MCP provides several key advantages for semantic data protection systems:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: MCP为语义数据保护系统提供了几个关键优势：
- en: '**Standardized context management**: A consistent framework for passing context
    between user sessions, AI models, AI agents, and backend systems'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标准化的上下文管理**：一个一致的框架，用于在用户会话、AI模型、AI代理和后端系统之间传递上下文'
- en: '**Enhanced interoperability**: Elimination of data silos by standardizing AI
    model interactions with business applications'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强的互操作性**：通过标准化AI模型与业务应用程序的交互，消除数据孤岛'
- en: '**Reduced cloud processing time**: More efficient context handling reduces
    the time sensitive data spends in cloud environments'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少云处理时间**：更高效的上下文处理减少了敏感数据在云环境中花费的时间'
- en: In the context of the MongoDB, RegData, and Voyage AI alliance, MCP enables
    more seamless integration of protection workflows with AI agents and external
    systems. This standardization is particularly valuable for financial institutions
    that need to maintain context across complex, multi-step AI interactions while
    ensuring data protection remains consistent throughout.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在MongoDB、RegData和Voyage AI联盟的背景下，MCP使保护工作流程与人工智能代理和外部系统的集成更加无缝。这种标准化对于需要在整个复杂的、多步骤的人工智能交互中保持上下文，同时确保数据保护保持一致性的金融机构来说尤其有价值。
- en: As you’ll discover, MongoDB’s MCP server exemplifies this integration potential,
    enabling AI agents to directly interact with MongoDB databases while respecting
    existing access controls, a critical capability for maintaining semantic protection
    in agentic AI environments.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 正如您将发现的，MongoDB的MCP服务器展示了这种集成潜力，使人工智能代理能够直接与MongoDB数据库交互，同时尊重现有的访问控制，这对于在代理人工智能环境中保持语义保护是一个关键能力。
- en: Hybrid protection strategies
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混合保护策略
- en: Establishing hybrid cloud approaches can enhance both security and performance
    by enabling secure data processing across private and public cloud environments.
    Through intelligent data orchestration and the selective exposure of protected
    data, a hybrid cloud architecture ensures that sensitive information remains secure
    while still supporting advanced analytics and AI workloads. RegData further strengthens
    this approach with support for both hybrid and multi-cloud deployments, allowing
    organizations to choose the infrastructure that best meets their operational and
    compliance needs.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 建立混合云方法可以通过在私有和公共云环境中实现安全数据处理来增强安全和性能。通过智能数据编排和受保护数据的选择性暴露，混合云架构确保敏感信息保持安全，同时仍支持高级分析和人工智能工作负载。RegData通过支持混合和多云部署进一步强化了这种方法，使组织能够选择最适合其运营和合规需求的架构。
- en: Within this architecture, multi-layer protection plays a key role by incorporating
    structured and unstructured documents, as well as knowledge graphs, into a unified
    ecosystem framework. This integration ensures that all forms of data are consistently
    protected and accessible for authorized use. The result is a system that systematically
    safeguards sensitive information while enabling AI capabilities across diverse
    environments, delivering both enhanced security and flexible deployment options.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在此架构中，多层保护通过将结构化和非结构化文档以及知识图谱纳入统一的生态系统框架中发挥关键作用。这种集成确保所有形式的数据都得到一致的保护和授权访问。结果是，一个系统性地保护敏感信息的同时，在多样化的环境中启用人工智能能力，既增强了安全性，又提供了灵活的部署选项。
- en: '![](img/B34136_12_04.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![图12.4：安全的金融AI混合云架构](img/B34136_12_04.png)'
- en: 'Figure 12.4: Hybrid cloud architecture for secure financial AI'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.4：安全的金融AI混合云架构
- en: This diagram illustrates a hybrid cloud architecture that enables secure financial
    AI processing across private/on-premises and public cloud environments. The visualization
    shows how sensitive data remains protected in private cloud/on-premises infrastructure
    (including legacy databases, files, and media) while leveraging powerful public
    cloud AI services through RegData protection layers. The API gateway ensures that
    only semantically protected data (tokenized, pseudonymized, or anonymized) crosses
    into public cloud environments, where MongoDB provides unified data orchestration
    and public LLMs deliver advanced AI capabilities. This hybrid approach maximizes
    both security compliance and AI performance by keeping sensitive data secure while
    accessing cutting-edge cloud AI services through comprehensive data protection
    throughout the entire process.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了支持在私有/本地和公共云环境中进行安全金融人工智能处理的混合云架构。可视化显示了敏感数据如何在私有云/本地基础设施（包括传统数据库、文件和媒体）中保持保护，同时通过RegData保护层利用强大的公共云人工智能服务。API网关确保只有语义保护的数据（标记化、匿名化或脱敏）进入公共云环境，其中MongoDB提供统一的数据编排，公共LLM提供高级人工智能能力。这种混合方法通过在整个过程中保持敏感数据的安全，同时通过全面的数据保护访问前沿的云人工智能服务，最大程度地提高了安全合规性和人工智能性能。
- en: Compliance and regulatory considerations
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 遵守性和监管考量
- en: Financial institutions must navigate complex regulatory requirements when implementing
    AI with semantic data protection. This section outlines key considerations and
    best practices.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 金融机构在实施具有语义数据保护的AI时必须应对复杂的监管要求。本节概述了关键考虑事项和最佳实践。
- en: Regulatory framework alignment
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 监管框架对齐
- en: 'Semantic protection architectures must align with the complex regulatory landscape
    and frameworks detailed in [*Chapter 4*](04.xhtml#_idTextAnchor074), *Trustworthy
    AI, Compliance, and Data Governance*. As discussed in that chapter’s analysis
    of navigating regulatory requirements across different industries and jurisdictions,
    organizations must address multiple overlapping regulatory frameworks, such as
    the following:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 语义保护架构必须与详细说明在[*第4章*](04.xhtml#_idTextAnchor074)，“可信AI、合规性和数据治理”中的复杂监管环境和框架保持一致。正如该章节对不同行业和司法管辖区监管要求的分析所讨论的，组织必须解决多个重叠的监管框架，例如以下内容：
- en: '**GDPR**: Ensures proper handling of personal data with principles such as
    data minimization and purpose limitation[1]'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GDPR**：确保以数据最小化和目的限制等原则正确处理个人数据[1]'
- en: '**FINMA**: Addresses Swiss financial regulatory requirements for data security
    and client confidentiality[2]'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FINMA**：解决瑞士金融监管机构的数据安全和客户保密要求[2]'
- en: '**MAS**: Complies with Monetary Authority of Singapore guidelines for AI governance
    and data protection[3]'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MAS**：符合新加坡金融管理局的AI治理和数据保护指南[3]'
- en: '**EU AI Act**: Meets European Union requirements for AI risk management, transparency,
    and accountability in high-risk AI applications[4]'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**EU AI Act**：符合欧盟对高风险AI应用的风险管理、透明度和问责制的要求[4]'
- en: '**ECB**: Meets European Central Bank standards for operational resilience and
    data security[5]'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ECB**：符合欧洲中央银行的操作弹性标准和数据安全标准[5]'
- en: The semantic protection approach directly supports trustworthy AI principles,
    particularly transparency, accountability, and robust data governance, by ensuring
    that sensitive data protection is maintained even while enabling AI explainability
    and regulatory compliance. This alignment demonstrates how technical solutions
    can operationalize the ethical and regulatory frameworks that are essential for
    responsible AI implementation.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 语义保护方法直接支持可信AI原则，特别是透明度、问责制和稳健的数据治理，通过确保即使在启用AI可解释性和合规性时，敏感数据保护也得到维持。这种一致性展示了技术解决方案如何将伦理和监管框架转化为负责AI实施的必要操作化。
- en: Auditability and explainability
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 审计性和可解释性
- en: Regulatory compliance requires comprehensive audit capabilities, including detailed
    access logging that records who accessed specific data, when the access occurred,
    and for what purpose. It also demands protection verification to provide evidence
    that sensitive data was properly safeguarded throughout AI processing. In addition,
    decision traceability is essential, ensuring clear audit trails that document
    how AI-generated recommendations were produced.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 监管合规性需要全面的审计能力，包括详细访问日志，记录谁访问了特定数据，何时发生访问以及访问的目的。它还要求进行保护验证，以提供证据证明敏感数据在整个AI处理过程中得到了适当保护。此外，决策可追溯性至关重要，确保清晰的审计轨迹，记录AI生成的建议是如何产生的。
- en: '![A screenshot of a computer  AI-generated content may be incorrect.](img/B34136_12_05.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图，AI生成的内容可能不正确。](img/B34136_12_05.png)'
- en: 'Figure 12.5: Sensitive data consumption, per user'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.5：每个用户敏感数据消耗
- en: This dashboard visualization shows how financial institutions can monitor and
    demonstrate compliance with various regulatory requirements across their AI systems.
    The interface displays key metrics, including protection coverage, access logs,
    and compliance status across different regulations and data types.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 此仪表板可视化显示了金融机构如何监控和证明其AI系统在遵守各种监管要求方面的合规性。界面显示关键指标，包括保护覆盖率、访问日志以及不同法规和数据类型的合规状态。
- en: The dashboard shows how a given user got access to sensitive data. This could
    be when consuming internal applications such as a CRM or a transactional tool,
    or data sent to LLMs.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 仪表板显示了特定用户如何获取敏感数据。这可能是当使用内部应用程序，如CRM或交易工具，或将数据发送到LLM时。
- en: 'It is then possible to know in what LLM this sensitive data was used, and the
    outcome in the response: how many times the user got access to the data in full,
    how many times they got no access, or how may times they got access to protected
    data only. In this screenshot, we can also see the type of sensitive data the
    user consumed (**Name**, **Email**, **IBAN**, (free text) comments, and more).'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，可以知道在哪个LLM中使用了这些敏感数据，以及响应中的结果：用户完整访问数据的次数、没有访问数据的次数或仅访问受保护数据的次数。在此屏幕截图中，我们还可以看到用户消耗的敏感数据类型（**姓名**、**电子邮件**、**IBAN**、（自由文本）评论等）。
- en: This dashboard is made possible because RegData monitors all the requests to
    access sensitive data, as well as how RegData responds to these requests. It is
    then possible to build custom reports demonstrating sound usage of the sensitive
    data, as well as the secure use of the sensitive data in external or public LLMs.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 此仪表板之所以成为可能，是因为RegData监控了所有访问敏感数据的请求，以及RegData对这些请求的响应。然后可以构建定制的报告，展示敏感数据的合理使用，以及在外部或公共LLMs中安全使用敏感数据。
- en: Summary
  id: totrans-163
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'This chapter showed how the MongoDB, RegData, and Voyage AI alliance addresses
    the critical challenge facing financial institutions: leveraging AI capabilities
    while maintaining rigorous data protection and regulatory compliance. You were
    introduced to the concept of semantic data protection, which goes beyond traditional
    encryption and masking approaches that render data unusable for AI applications.
    Semantic data protection preserves the meaning, context, and format of information
    while removing or replacing the sensitive values themselves, enabling AI models
    to generate meaningful outputs without compromising security.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 本章展示了MongoDB、RegData和Voyage AI联盟如何应对金融机构面临的重大挑战：在保持严格的数据保护和监管合规的同时，利用人工智能的能力。您了解了语义数据保护的概念，它超越了传统的加密和掩码方法，这些方法使数据对人工智能应用不可用。语义数据保护在移除或替换敏感值的同时，保留了信息的意义、上下文和格式，使人工智能模型能够生成有意义的输出，而不会损害安全性。
- en: However, semantic protection alone is insufficient for high-quality AI outputs
    in financial applications. The chapter emphasized that contextual semantic protection
    is essential to deliver meaningful AI responses. While basic semantic protection
    simply replaces sensitive data with semantically equivalent alternatives (a phone
    number with another phone number, a city name with another city name), contextual
    semantic protection adapts based on the meaning and usage context to maintain
    analytical relevance. For example, in a relocation application, contextual semantic
    protection would replace a target city with another city where the same tax rules
    and regulations apply, enabling AI to provide accurate advice about living costs
    and local taxes while maintaining privacy. This sophisticated approach, combined
    with MongoDB’s unified data platform, RegData’s protection techniques, and Voyage
    AI’s domain-specific embeddings, creates an integrated solution that addresses
    both security and performance requirements in the demanding financial services
    environment.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，仅凭语义保护对于金融应用中的高质量人工智能输出是不够的。本章强调，上下文语义保护对于提供有意义的AI响应至关重要。虽然基本的语义保护只是用语义上等效的替代品替换敏感数据（一个电话号码用另一个电话号码，一个城市名称用另一个城市名称），但上下文语义保护会根据意义和用法上下文进行调整，以保持分析相关性。例如，在搬迁申请中，上下文语义保护会用适用相同税收规则和法规的另一个城市替换目标城市，使人工智能能够提供关于生活成本和地方税收的准确建议，同时保持隐私。这种复杂的方法，结合MongoDB的统一数据平台、RegData的保护技术和Voyage
    AI的特定领域嵌入，创建了一个综合解决方案，该解决方案在要求严格的金融服务环境中解决了安全和性能需求。
- en: In the next chapter, we will explore how GenAI copilots can transform wealth
    management by addressing the fundamental catch-22 of scaling personalized client
    relationships without compromising service quality. We’ll examine how AI-powered
    assistance can shift relationship managers from administrative tasks to high-value
    client interactions while delivering significant revenue improvements through
    intelligent automation.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何通过解决扩大个性化客户关系而不损害服务质量的基本困境，GenAI共飞行员可以改变财富管理。我们将研究人工智能辅助如何将关系经理从行政任务转移到高价值的客户互动，同时通过智能自动化带来显著的收入提升。
