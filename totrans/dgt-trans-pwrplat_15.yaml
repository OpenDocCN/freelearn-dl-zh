- en: '15'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Embracing AI-Powered Copilots and Agents in Digital Transformation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Artificial intelligence (AI) is revolutionizing digital transformation, with
    AI-powered copilots at the forefront of this change. These intelligent assistants
    leverage advanced machine learning algorithms and natural language processing
    to interpret user inputs, provide context-aware recommendations, and automate
    complex workflows. By integrating seamlessly into a variety of platforms, AI copilots
    enhance user capabilities, making advanced technology accessible to both technical
    and non-technical users. This democratization of AI tools empowers organizations
    to optimize operations, reduce manual effort, and accelerate innovation.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we explore how AI-powered copilots are reshaping digital transformation
    strategies. These assistants are not merely tools for automation; they function
    as collaborative partners, assisting users in drafting content, analyzing data,
    generating insights, and managing projects with greater efficiency. Their integration
    into platforms such as Microsoft 365 demonstrates how AI can enhance productivity
    in everyday tasks, such as writing documents, creating presentations, and managing
    email communications. Beyond individual productivity, AI copilots have a transformative
    impact on organizational efficiency by fostering collaboration, enabling data-driven
    decision-making, and streamlining workflows across teams.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following topics will be covered:'
  prefs: []
  type: TYPE_NORMAL
- en: From automation to generative intelligence with copilots
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copilots within Power Platform
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solution planning with Power Apps Plan Designer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are AI Agents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Microsoft’s answer to AI Agents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From automation to generative intelligence with copilots
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI-powered copilots are advanced assistants that leverage large language models
    (LLMs) to understand context, generate content, and provide actionable insights.
    These copilots represent a significant evolution in AI capabilities, shifting
    from rule-based systems to highly adaptive tools capable of interpreting natural
    language inputs. Unlike traditional automation tools, which require explicit programming,
    copilots make interactions more intuitive and user-friendly. By assisting in tasks
    such as drafting documents, analyzing data, generating reports, and automating
    workflows, they enhance productivity, support data-driven decision-making, and
    democratize access to technology for a broader audience.
  prefs: []
  type: TYPE_NORMAL
- en: The development of LLMs has propelled AI to unprecedented levels of sophistication.
    LLMs such as OpenAI’s GPT series are trained on vast datasets, allowing them to
    generate human-like text, answer complex questions, and adapt to a variety of
    tasks. Generative AI, a subset of LLM applications, introduced a new paradigm
    where AI systems could not only analyze and respond but also create—be it drafting
    text, generating code, or even composing music. This ability to produce coherent,
    contextually relevant outputs revolutionized user expectations and applications
    of AI.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI, a pioneer in this domain, accelerated the adoption of AI through products
    such as ChatGPT. The release of ChatGPT highlighted the power of conversational
    AI, offering users an approachable and effective way to interact with AI systems.
    Its user-friendly design and remarkable versatility sparked widespread interest,
    quickly amassing millions of users, and driving the global adoption of generative
    AI technologies. OpenAI’s success demonstrated the potential of LLMs not only
    in professional and academic settings but also in everyday tasks, from learning
    new concepts to streamlining work processes.
  prefs: []
  type: TYPE_NORMAL
- en: The growth of LLM usage has been exponential, fueled by advancements in computational
    power, the availability of massive datasets, and improved training techniques.
    AI copilots, a direct beneficiary of these developments, have become indispensable
    in platforms such as Microsoft 365, where they assist users in drafting emails,
    summarizing content, analyzing trends, and automating routine activities. Their
    integration into enterprise ecosystems bridges the gap between technical capabilities
    and user needs, making advanced technology accessible to professionals, students,
    and citizen developers alike.
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI, powered by LLMs, has shifted the role of AI from a passive tool
    to an active collaborator. By understanding context, providing recommendations,
    and automating complex workflows, AI copilots amplify human potential and enable
    individuals to focus on creative and strategic endeavors. This transformation
    is not just about doing tasks faster but about redefining the nature of work,
    empowering users to achieve more with greater ease and efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: AI-powered copilots are advanced assistants that use LLMs to improve user interactions
    and support tasks such as drafting and data analysis, enhancing productivity and
    accessibility. This evolution began with early AI efforts, progressing through
    machine learning to sophisticated LLMs. OpenAI’s ChatGPT highlights this shift,
    highlighting the potential of conversational AI. These copilots turn AI into an
    active collaborator, allowing users to focus on creative tasks and reshaping the
    nature of work.
  prefs: []
  type: TYPE_NORMAL
- en: Integration into Microsoft 365
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Microsoft 365 Copilot is a prime example of how AI-powered assistants can transform
    the way individuals and organizations approach their daily work. Seamlessly embedded
    into core applications such as Word, Excel, PowerPoint, Outlook, and Teams, Copilot
    enhances productivity and streamlines workflows by leveraging advanced AI capabilities
    directly within the tools users already know and trust. This integration eliminates
    the need to switch between applications or learn entirely new interfaces, enabling
    users to maximize efficiency without disrupting their established routines. Let’s
    take a look at some of the Microsoft tools that have been infused with Copilot
    functionality:'
  prefs: []
  type: TYPE_NORMAL
- en: In Microsoft Word, Copilot revolutionizes the writing process by generating
    content from simple user prompts. Whether drafting a proposal, summarizing a lengthy
    report, or creating a formal letter, Copilot interprets the user’s intent and
    provides a starting point, saving valuable time. Users can refine and adapt the
    suggestions, making the process both collaborative and intuitive. In*Figure 15**.1*,
    you can see Copilot in Microsoft Word being used to generate content in a document.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 15.1: Copilot being used in Microsoft Word to generate content](img/B21080_15_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.1: Copilot being used in Microsoft Word to generate content'
  prefs: []
  type: TYPE_NORMAL
- en: In Excel, Copilot acts as a data analyst, helping users uncover trends and insights
    with minimal effort. By interpreting queries in natural language, it simplifies
    tasks such as creating complex formulas, generating pivot tables, and visualizing
    data patterns. This functionality democratizes data analysis, empowering users
    with varying levels of technical expertise to extract actionable insights.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PowerPoint users benefit from Copilot’s ability to transform outlines or documents
    into polished presentations. By recommending slide layouts, adding visuals, and
    ensuring consistency in design, Copilot accelerates the creation of professional-grade
    slides. For users who may find presentation design daunting, Copilot provides
    a guiding hand, ensuring the focus remains on content and storytelling.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Outlook, Copilot reduces the burden of email management by drafting responses,
    summarizing lengthy threads, and prioritizing messages. This capability helps
    users maintain focus on high-priority tasks without getting bogged down by routine
    communication. Copilot also assists in scheduling and meeting preparation, providing
    summaries of previous discussions to ensure continuity and clarity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Microsoft Teams integrates Copilot to enhance collaboration and streamline meeting
    workflows. Copilot can prepare agendas, capture action items in real time, and
    generate meeting summaries that ensure alignment across team members. By acting
    as a virtual assistant, it reduces administrative overhead and keeps teams focused
    on achieving their objectives. In *Figure 15**.2*, we can see Copilot being used
    in Microsoft Teams to generate a meeting agenda.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 15.2: Copilot being used in Microsoft Teams](img/B21080_15_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.2: Copilot being used in Microsoft Teams'
  prefs: []
  type: TYPE_NORMAL
- en: Beyond individual applications, Copilot’s integration across the Microsoft 365
    ecosystem allows for interconnected functionality. For instance, data analyzed
    in Excel can be seamlessly incorporated into a Word document or PowerPoint presentation,
    with Copilot providing context-aware recommendations throughout the process. This
    interconnectedness fosters a cohesive and efficient work environment, where AI
    not only enhances individual productivity but also drives team collaboration and
    organizational efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft 365 Copilot’s design prioritizes accessibility and ease of use. By
    understanding natural language commands, it reduces the learning curve for unpracticed
    users while empowering seasoned professionals to work faster and smarter. The
    seamless integration of Copilot into Microsoft 365 reflects a broader vision of
    AI as a partner in productivity, enabling users to focus on strategic and creative
    endeavors while routine tasks are managed effortlessly.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft 365 Copilot exemplifies the transformative impact of AI-powered assistants
    on daily work for individuals and organizations. Integrated into familiar applications
    such as Word, Excel, PowerPoint, Outlook, and Teams, Copilot enhances productivity
    by streamlining workflows, allowing users to generate content, analyze data, create
    presentations, and manage emails with ease. This seamless functionality fosters
    collaboration and organizational efficiency, as users can leverage AI capabilities
    without needing to switch applications or learn new interfaces. By interpreting
    natural language commands, Copilot makes these tools accessible to all skill levels,
    prioritizing user experience and enabling professionals to focus on strategic
    tasks while routine functions are automated. In the next section, we will examine
    the copilot functionality available in several of the Power Platform tools.
  prefs: []
  type: TYPE_NORMAL
- en: Copilots within Power Platform
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI-powered copilots are revolutionizing the Power Platform ecosystem by enabling
    users to build, automate, and manage solutions with unprecedented ease and efficiency.
    These copilots leverage advanced AI models to interpret user inputs, provide intelligent
    suggestions, and automate complex tasks, making the development process more accessible
    for both technical and non-technical users. The integration of copilots across
    components such as Dataverse, Power Apps, Power Automate, and Power Pages demonstrates
    the Power Platform’s commitment to democratizing technology and empowering makers
    at all skill levels. These copilots perform more tasks than makers would ordinarily
    do manually, making the build time a lot shorter. In fact, copilots are so prevalent
    in the Power Platform maker experience that as soon as the user opens the maker
    portal, they are presented with the opportunity to leverage a copilot. This is
    evident in *Figure 15**.3*.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.3: Copilot in the Power Platform maker experience](img/B21080_15_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.3: Copilot in the Power Platform maker experience'
  prefs: []
  type: TYPE_NORMAL
- en: Dataverse model creation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Dataverse is the foundational data platform for Power Platform, and its integration
    with AI copilots simplifies the process of creating and managing data models.
    Traditionally, designing a relational data model required significant technical
    expertise, from defining entities/tables to establishing relationships and implementing
    data validations. Copilots in Dataverse reduce this complexity by automating much
    of the groundwork.
  prefs: []
  type: TYPE_NORMAL
- en: Using natural language, users can describe the type of application they want
    to build or the data they need to manage, and the copilot translates these descriptions
    into a structured data model. For example, a user might prompt the copilot with,
    "Create a data model for tracking customer interactions and support tickets",
    and the copilot will generate relevant tables, relationships, and attributes,
    including suggestions for data types and field validations. In *Figure 15**.4*,
    natural language has been used to request the creation of a facilities management
    data model.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.4: Using natural language to set up the start of a facilities management
    data model](img/B21080_15_004.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.4: Using natural language to set up the start of a facilities management
    data model'
  prefs: []
  type: TYPE_NORMAL
- en: Once the model is created, it can then be refined in the maker’s experience.
    In *Figure 15**.5*, the result of the prompt used in *Figure 15**.4* can be seen.
    There are four tables that have been created with some base columns. These tables
    have been linked together to form the data model.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.5: The data model that has been created because of the facilities
    management prompt](img/B21080_15_005.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.5: The data model that has been created because of the facilities
    management prompt'
  prefs: []
  type: TYPE_NORMAL
- en: The copilot also assists in refining and optimizing models by analyzing data
    patterns and usage trends. It can recommend improvements, such as adding indexes
    to frequently queried fields or normalizing data structures for better performance.
    This capability allows makers to focus on higher-level design considerations while
    ensuring that the underlying data platform is robust and efficient.
  prefs: []
  type: TYPE_NORMAL
- en: Canvas apps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Canvas apps are a cornerstone of the Power Platform, offering a highly visual,
    drag-and-drop interface for building applications. Copilots in canvas apps make
    the app-building process even more intuitive by guiding users in creating app
    layouts, adding functionality, and optimizing the user experience.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, a user can describe the purpose of the app, such as “I need an
    app to manage employee timesheets,” and the copilot will generate a preliminary
    layout with screens for time entry, approval workflows, and reporting. The copilot
    also provides intelligent suggestions for controls, such as date pickers, drop-down
    menus, or file upload fields, based on the app’s intended functionality. In *Figure
    15**.6*, canvas apps can be extended and configured by using the embedded copilot
    functionality.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.6: Copilot leveraged within canvas apps to assist with the creation
    of the app](img/B21080_15_006.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.6: Copilot leveraged within canvas apps to assist with the creation
    of the app'
  prefs: []
  type: TYPE_NORMAL
- en: Copilots in canvas apps assist with formula creation, reducing the complexity
    of Power FX, the platform’s low-code programming language. Users can describe
    their requirements in plain language – such as "Calculate the total hours worked
    this week for each employee" – and the copilot generates the corresponding Power
    FX formula. This significantly lowers the learning curve for new makers while
    enhancing the productivity of experienced developers.
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Automate copilots streamline the creation of workflows by enabling users
    to design automations through conversational inputs. Instead of manually selecting
    triggers and actions, users can describe their process in natural language, and
    the copilot builds a flow accordingly. For example, a user might say, “Set up
    a flow that sends an email to my manager whenever a new sales lead is added to
    Dataverse,” and the copilot will generate the corresponding automation.
  prefs: []
  type: TYPE_NORMAL
- en: The copilot also provides recommendations for optimizing workflows, such as
    suggesting error-handling mechanisms or identifying opportunities to consolidate
    redundant steps. Additionally, it analyzes workflow performance and offers insights
    to improve efficiency, such as using batch processing for large datasets or adjusting
    triggers to reduce unnecessary executions. In *Figure 15**.7*, the copilot functionality
    is being leveraged to understand what this flow does.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.7: Copilot being leveraged in Power Automate as a mechanism to
    understand what this cloud flow does](img/B21080_15_007.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.7: Copilot being leveraged in Power Automate as a mechanism to understand
    what this cloud flow does'
  prefs: []
  type: TYPE_NORMAL
- en: Power Automate copilots enhance accessibility by integrating with a wide range
    of connectors, enabling users to automate processes that span multiple systems.
    By simplifying flow creation and optimization, copilots empower makers to automate
    complex tasks with confidence and precision.
  prefs: []
  type: TYPE_NORMAL
- en: Power Pages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Power Pages copilots bring the power of AI to website creation and management,
    enabling users to design, build, and customize web portals with minimal effort.
    Users can start by describing their website requirements in natural language,
    such as “Create a customer portal for submitting and tracking support tickets.”
    The copilot generates a starter template with relevant pages, navigation, and
    forms pre-configured.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond layout generation, the copilot assists in content creation by drafting
    page copy, suggesting SEO keywords, and optimizing accessibility features. It
    also helps users configure backend integrations, such as connecting forms to Dataverse
    for data storage or setting up role-based access controls to secure sensitive
    information. In *Figure* *15**.8*, Copilot is being used to help with the site
    design and navigation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.8: Copilot functionality in Microsoft Power Pages](img/B21080_15_008.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.8: Copilot functionality in Microsoft Power Pages'
  prefs: []
  type: TYPE_NORMAL
- en: For developers, the copilot simplifies the customization process by providing
    code snippets or configurations for advanced functionalities, such as adding custom
    APIs or embedding Power BI dashboards. This allows users to tailor their web portals
    to specific business needs while maintaining an elevated level of usability and
    design consistency.
  prefs: []
  type: TYPE_NORMAL
- en: We are seeing the addition of copilot to more and more Power Platform products
    and the capability is being hugely enhanced. In writing this book we are aware
    of many pieces of copilot-related functionality in public preview, such as the
    utilization of copilot to generate model-driven apps. We expect this functionality
    to become more widespread and commonplace as the technology advances.
  prefs: []
  type: TYPE_NORMAL
- en: A key point to make here is that copilots help makers build solutions and enhance
    the creation experience greatly, however, we have not gone into depth about the
    ability for users to use copilots within the solutions that have been created.
    This is currently available in Power Apps and Power Pages and allows users to
    interact with the user experience and data using natural language in the copilot
    panel.
  prefs: []
  type: TYPE_NORMAL
- en: AI-powered copilots are revolutionizing the Power Platform by simplifying solution
    development and management for users of all skill levels. They automate complex
    tasks through natural language processing, allowing users to create data models
    in Dataverse, build apps in canvas apps, model-driven apps, design workflows in
    Power Automate, and develop websites in Power Pages with ease. By providing intelligent
    suggestions and optimizing processes, these copilots enhance productivity and
    promote accessibility, empowering makers to focus on higher-level design while
    efficiently leveraging technology. In the next section, we will explore how Power
    Apps Plan Designer uses AI to help you start your Power Platform projects.
  prefs: []
  type: TYPE_NORMAL
- en: Solution planning with Power Apps Plan Designer
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The PowerApps Plan Designer is a groundbreaking tool that leverages AI to guide
    makers through the initial stages of designing user-focused, intelligent solutions.
    Recognizing that planning is a critical but often challenging step in app development,
    Microsoft introduced Plan Designer to streamline and optimize this process. By
    integrating AI capabilities, it enables makers to craft effective solutions tailored
    to their unique business needs with minimal effort.
  prefs: []
  type: TYPE_NORMAL
- en: How Plan Designer works
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Plan Designer simplifies the planning process by combining natural language
    inputs with contextual AI recommendations. Makers begin by describing their business
    problems, goals, and expected outcomes. For example, a user might input, “I need
    an app to track and manage the facilities and assets within my organization.”
    Plan Designer uses this information to generate a comprehensive starting point
    for the app. In *Figure* *15**.9*, Plan Designer is being used to facilitate the
    creation of a facilities management solution.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.9: Plan Designer being leveraged to facilitate the creation of
    a facilities management solution](img/B21080_15_009.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.9: Plan Designer being leveraged to facilitate the creation of a
    facilities management solution'
  prefs: []
  type: TYPE_NORMAL
- en: The Plan Designer allows us to create these incredible, documented, bundles
    solutions that provide a great start to a useful solution. This is one of the
    most innovative sets of functionality we have seen come out in the Power Platform
    tool set and we believe that it hugely accelerates the gap to getting started
    with a strong solution.
  prefs: []
  type: TYPE_NORMAL
- en: The future of solution planning with AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Power Apps Plan Designer represents a shift toward intelligent, user-focused
    app development. By leveraging AI, it transforms a traditionally complex phase
    into an intuitive and efficient process. As the Power Platform continues to evolve,
    Plan Designer will integrate even more advanced capabilities, such as predictive
    analytics and deeper automation suggestions, further empowering makers to build
    impactful solutions with ease.
  prefs: []
  type: TYPE_NORMAL
- en: Plan Designer exemplifies how AI can enhance every stage of the app development
    lifecycle, making it an indispensable tool for organizations aiming to innovate
    quickly and effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Key functionalities
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following are some of the key functionalities of Plan Designer:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Contextual analysis**: The AI analyzes the provided input, business context,
    and any attached process diagrams or data models to understand the requirements
    fully'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Role identification**: It identifies and recommends user roles, such as HR
    managers, trainers, and new employees, based on the described solution'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data model recommendations**: Plan Designer proposes relevant data tables,
    fields, and relationships for use in Dataverse, ensuring the data structure aligns
    with the app’s purpose'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automation suggestions**: It suggests Power Automate workflows that could
    enhance the solution, such as triggering email notifications for training completion
    or onboarding progress tracking'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By automating these initial steps, Plan Designer reduces the cognitive load
    on makers, allowing them to focus on refining and personalizing their solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Advantages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now, let’s explore some of the benefits of using Plan Designer:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Streamlined planning**: By automating complex tasks such as data modeling
    and workflow design, Plan Designer eliminates much of the guesswork in solution
    planning'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User-centric approach**: Its ability to recommend user roles ensures that
    the app design aligns with the needs of its intended audience, fostering better
    adoption and usability'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consistency and best practices**: The AI incorporates established best practices
    into its recommendations, ensuring that the resulting solution is efficient and
    scalable'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Accelerated development**: By providing a sturdy foundation, Plan Designer
    shortens the development cycle, allowing makers to move quickly from concept to
    implementation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In conclusion, Power Apps Plan Designer transforms the app development process
    by using AI to streamline planning and enhance efficiency. By enabling creators
    to easily articulate their business needs, it ensures the design of user-centric
    solutions. As it continues to evolve, this tool will play a crucial role in helping
    organizations innovate quickly and effectively. Using this tool allows makers
    to truly leverage the power of AI in the power Platform to help make project planning
    and execution successful. In the next section, we will take a look at another
    form of Power-Platform-related AI infused into Copilot Studio in the form of AI
    Agents.
  prefs: []
  type: TYPE_NORMAL
- en: What are AI Agents?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We are now in the era of the “AI Agent.” Agents are AI-driven systems designed
    to perform specific tasks or functions with precision and efficiency. They operate
    based on pre-programmed rules, sophisticated learning algorithms, or advanced
    autonomous decision-making capabilities. These AI Agents serve as the cornerstone
    of AI integration, bridging the gap between human intent and actionable outcomes
    seamlessly.
  prefs: []
  type: TYPE_NORMAL
- en: AI Agents can be categorized into several types, each offering unique functionalities
    and levels of autonomy. These range from simple rule-based Agents that follow
    strict guidelines to complex fully autonomous Agents capable of making independent
    decisions and adapting to new situations. By leveraging the strengths of different
    AI Agents, organizations can enhance operational efficiency, improve customer
    service, and drive innovation in industries such as healthcare, logistics, and
    finance.
  prefs: []
  type: TYPE_NORMAL
- en: The versatility of AI Agents allows them to be deployed in diverse applications,
    from automating routine tasks to providing personalized recommendations and insights.
    As technology continues to evolve, the potential for AI Agents to transform various
    sectors and create new opportunities is boundless.
  prefs: []
  type: TYPE_NORMAL
- en: Types of AI Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s look into the following types of AI Agents.
  prefs: []
  type: TYPE_NORMAL
- en: Rule-based Agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These Agents operate strictly according to predefined rules and instructions,
    which makes them highly predictable and dependable for specific tasks. They do
    not possess the capability to learn from past experiences or adapt to new situations.
    Ideal applications for rule-based Agents include simple, repetitive tasks such
    as filtering spam emails, regulating thermostats, and managing inventory levels.
    Due to their limited scope, they are best suited for environments where the conditions
    and requirements remain stable and do not require complex decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Semi-autonomous Agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These Agents combine programmed rules with learning capabilities. They can analyze
    data and adapt their actions based on past experiences, although they still require
    human oversight. Semi-autonomous Agents are often found in applications such as
    **robotic process automation** (**RPA**), where they automate repetitive tasks
    while being able to adjust operations based on new data. Additionally, these Agents
    are used in autonomous vehicles, which can navigate and make driving decisions
    by learning from real-time traffic data and historical patterns. By blending rule-based
    actions with adaptive learning, semi-autonomous Agents offer a balanced approach
    to handling tasks that need both consistency and flexibility.
  prefs: []
  type: TYPE_NORMAL
- en: Fully autonomous Agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Fully autonomous Agents operate independently, making decisions and improving
    their actions over time without human intervention. These Agents leverage advanced
    machine learning algorithms and deep neural networks to analyze vast amounts of
    data, recognize patterns, and make informed decisions. Their ability to learn
    from experience and adapt to new situations makes them highly versatile and valuable
    in dynamic environments.
  prefs: []
  type: TYPE_NORMAL
- en: In *Figure* *15**.10*, we can see a breakdown of the three Agent types and a
    simple summary of when to select each type.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.10: A summary of the various Agent types with a simple breakdown
    of when to choose each one](img/B21080_15_010.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.10: A summary of the various Agent types with a simple breakdown
    of when to choose each one'
  prefs: []
  type: TYPE_NORMAL
- en: In healthcare, fully autonomous Agents can be used for continuous patient monitoring,
    real-time diagnosis, and personalized treatment recommendations. In logistics,
    these Agents optimize supply chain operations, manage inventory levels, and enhance
    delivery efficiencies. Additionally, they are being explored in fields such as
    autonomous driving, where they can navigate complex traffic scenarios, make split-second
    decisions, and improve overall road safety.
  prefs: []
  type: TYPE_NORMAL
- en: While still emerging, these Agents represent the future of AI, with the potential
    to revolutionize industries and create unprecedented levels of efficiency and
    innovation.
  prefs: []
  type: TYPE_NORMAL
- en: Practical uses of AI Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s find out about some of the practical uses of AI Agents:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer service**: Chatbots and virtual assistants streamline customer interactions
    by providing instant, accurate responses'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Healthcare**: AI Agents assist in diagnostics, personalized treatment plans,
    and remote monitoring of patients'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Finance**: Fraud detection systems and automated trading Agents optimize
    security and efficiency'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Education**: Intelligent tutoring systems deliver customized learning experiences
    based on student performance and needs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Home automation**: Smart devices such as thermostats and security cameras
    use AI Agents to enhance comfort and safety'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manufacturing**: AI Agents optimize production processes, predict maintenance
    needs, and ensure quality control'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Retail**: Personalized shopping experiences and inventory management are
    enhanced by AI Agents analyzing customer behavior'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Energy management**: AI Agents improve energy efficiency by controlling power
    usage and predicting energy demands'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transportation**: Route optimization and predictive maintenance for public
    transit systems are managed by AI Agents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agriculture**: AI Agents aid in precision farming by monitoring crop health,
    predicting yields, and optimizing resource use'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Entertainment**: AI Agents create personalized content recommendations and
    enhance user experiences in gaming and streaming services'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Figure* *15**.11* summarizes the various industry examples in a more cohesive
    way, showing agentic AI as the center of process optimization and transformation.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.11: A summary of various industry examples with agentic AI in the
    center](img/B21080_15_011.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.11: A summary of various industry examples with agentic AI in the
    center'
  prefs: []
  type: TYPE_NORMAL
- en: AI Agents are advanced, AI-driven systems designed to perform specific tasks
    efficiently, utilizing pre-programmed rules, learning algorithms, or autonomous
    decision-making. They vary in complexity from simple rule-based Agents to fully
    autonomous Agents that can learn and adapt independently. These Agents enhance
    operational efficiency and innovation across numerous industries, including healthcare,
    logistics, finance, and customer service, with practical applications such as
    chatbots, personalized medicine, and automated trading. As technology progresses,
    the versatility and potential of AI Agents to revolutionize various sectors continue
    to expand. In the next section, we will look at Microsoft’s answer to AI-infused
    Agents.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft’s answer to Agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Microsoft has made incredible strides in the development and integration of
    AI Agents through the Power Platform. The Power Platform enables organizations
    to build, analyze, automate, and chat with customized AI-driven solutions, thereby
    enhancing productivity and efficiency across various industries.
  prefs: []
  type: TYPE_NORMAL
- en: Copilot Studio – creating AI-powered AI Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Copilot Studio** is a tool that allows users to create intelligent Agents
    without the need for extensive coding knowledge. These Agents can engage with
    customers, answer queries, and perform tasks based on predefined rules and AI
    capabilities. For example, a retail company might deploy an Agent to assist customers
    with product recommendations, order tracking, and returns processing. The Agent
    can leverage AI to understand natural language queries and provide personalized
    responses based on customer history and preferences. Another example is a healthcare
    provider using an Agent to schedule appointments, provide medication reminders,
    and answer common health-related questions, improving patient engagement and satisfaction.'
  prefs: []
  type: TYPE_NORMAL
- en: It is important to understand that agentic behavior is not simply an AI-infused
    chatbot or copilot; it is far more than that. agentic solutions contain elevated
    levels of automation that assist in the flow of information and processes in a
    highly intelligent manner.
  prefs: []
  type: TYPE_NORMAL
- en: Consider a scenario in the customer support industry where a company is grappling
    with high volumes of customer inquiries, leading to long wait times and decreased
    customer satisfaction. By deploying Agents created using Microsoft’s Copilot Studio,
    the company can significantly enhance its customer service operations.
  prefs: []
  type: TYPE_NORMAL
- en: These intelligent Agents can handle a wide array of customer interactions, from
    answering frequently asked questions to processing returns and tracking orders.
    By understanding natural language queries, these Agents can provide instant, accurate
    responses tailored to each customer’s needs. For instance, an Agent could assist
    customers in troubleshooting technical issues by guiding them through step-by-step
    solutions, thereby reducing the need for human intervention and speeding up resolution
    times.
  prefs: []
  type: TYPE_NORMAL
- en: These Agents can learn from past interactions to continuously improve their
    performance. They can analyze patterns in customer inquiries to identify common
    issues and proactively address them, further enhancing the customer experience.
    This level of automation not only alleviates the workload on human support staff
    but also ensures that customers receive timely and efficient service, leading
    to higher satisfaction and loyalty.
  prefs: []
  type: TYPE_NORMAL
- en: The key point to make here is that these Agents learn and get better over time,
    which promotes a whole new level of intelligent automation that hugely helps organizations
    evolve in the way they view process automation and productivity.
  prefs: []
  type: TYPE_NORMAL
- en: Creating Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Makers can easily create Agents within the Power Platform. There are two primary
    methods for doing this depending on the current tools you have available to you
    in your ecosystem. Agents can be created directly through the Copilot Studio maker
    portal. This can be seen in *Figure* *15**.12* where the simple conversational
    user experience is used to create an Agent.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.12: Creating an Agent in the Copilot Studio maker portal](img/B21080_15_012.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.12: Creating an Agent in the Copilot Studio maker portal'
  prefs: []
  type: TYPE_NORMAL
- en: As you progress through the process, you will have the chance to add more content,
    such as further instructions, which act as an initial prompt to help set context
    and some guardrails, knowledge sources, deterministic topics, and actions. This
    is visible in *Figure* *15**.13* where the Agent is being further refined and
    configured.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.13: Configuring an Agent in Copilot Studio](img/B21080_15_013.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.13: Configuring an Agent in Copilot Studio'
  prefs: []
  type: TYPE_NORMAL
- en: The new Agent designer is embedded directly within the Microsoft 365 Copilot
    user interface where makers can create Agents within this experience. These Agents
    can then be initiated directly through the Microsoft 365 Copilot experience. *Figure*
    *15**.14* shows that these Agents can be built with relative ease by makers.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15.14: Creating an Agent directly from the Microsoft 365 Copilot user
    experience](img/B21080_15_014.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.14: Creating an Agent directly from the Microsoft 365 Copilot user
    experience'
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the key points to consider when creating these Agents, and what makes
    these copilots truly agentic are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: What data is this Agent grounded in? It is important to ensure that the Agent
    has the correct knowledge sources associated with it so that it is grounded in
    reliable data. The better and more refined the data, the better the responses
    will be.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Actions and automations! A standard copilot may generate content but not actually
    undertake or perform actions. Agents will perform actions leveraging automation.
    In copilot studio, one of the primary methods for performing these actions is
    by leveraging Power Automate. As shown in *Figure* *15**.15*, leveraging Power
    Automate is a fantastic way to create Copilot Studio actions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 15.15: Creating actions within Copilot Studio Agents](img/B21080_15_015.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 15.15: Creating actions within Copilot Studio Agents'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ultimately, Copilot Studio Agents are extremely powerful and allow makers to
    leverage their current Power Platform skills to create AI Agents. Understanding
    Copilot Studio, connectors, Power Automate, plugins, and Dataverse is extremely
    valuable in this process and the skills Power Platform users have learned in the
    past are extremely valuable right now. To learn more about creating Agents using
    Copilot Studio, go and take a look at Microsoft Learn for more information: [https://learn.microsoft.com/en-us/training/modules/power-virtual-agents-bots/](https://learn.microsoft.com/en-us/training/modules/power-virtual-agents-bots/).
    There are some fantastic learning paths available.'
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft’s advancements in AI Agents through Power Platform represent a significant
    leap for organizations looking to enhance productivity. The Copilot Studio tools
    empower users, regardless of their coding experience, to develop intelligent Agents
    that can interact with customers, answer questions, and automate various tasks.
    We believe these Agents have the potential to greatly improve many areas of organizations,
    such as customer service, by efficiently managing inquiries, delivering personalized
    responses, and learning from previous interactions to boost their performance.
    The creation process is user-friendly, thanks to the integrated Agent designer
    in Microsoft 365 Copilot, which ensures that these Agents are based on reliable
    data and can execute actions through Power Automate. This approach is transforming
    how organizations manage automation and drive efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Responsible AI
  prefs: []
  type: TYPE_NORMAL
- en: When developing AI-infused solutions, it is crucial to consider Microsoft’s
    Responsible AI principles, which are designed to ensure that AI technologies are
    developed and implemented in a manner that is ethical, transparent, and accountable.
    These principles include fairness, reliability and safety, privacy and security,
    inclusiveness, transparency, and accountability.
  prefs: []
  type: TYPE_NORMAL
- en: Fairness ensures that AI systems treat all individuals and groups equitably,
    preventing discrimination and bias. Reliability and safety focus on creating robust
    and secure AI systems that perform consistently and safely under a variety of
    conditions. Privacy and security emphasize safeguarding personal data and respecting
    user privacy, ensuring that AI solutions comply with data protection regulations.
  prefs: []
  type: TYPE_NORMAL
- en: Inclusiveness highlights the importance of designing AI systems that are accessible
    and beneficial to all, including marginalized and underrepresented groups. Transparency
    involves making AI systems understandable and explainable to users, allowing them
    to trust and effectively interact with these technologies. Finally, accountability
    ensures that individuals and organizations developing and deploying AI systems
    are responsible for their impact and outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: By adhering to these principles, developers and organizations can build AI-infused
    solutions that are not only innovative and efficient but also ethical and trustworthy,
    fostering greater acceptance and a positive impact on society.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The evolution of Agents within the Power Platform signifies a monumental shift
    in intelligent automation, empowering organizations to enhance productivity and
    streamline processes. This journey began with the introduction of the Copilot
    Studio maker portal and the Microsoft 365 Copilot user experience – tools that
    provide makers with the ability to effortlessly create and configure Agents. These
    Agents are meticulously grounded in reliable data, ensuring accuracy and efficiency,
    and can execute complex actions through Power Automate, thereby transforming routine
    tasks into automated processes.
  prefs: []
  type: TYPE_NORMAL
- en: One of the most remarkable features of these Agents is their ability to learn
    and improve over time through machine learning algorithms and continuous data
    inputs, allowing them to adapt to new scenarios and optimize performance. This
    capability transforms intelligent automation and alters how organizations view
    process automation. Knowledge of existing Power Platform skills is invaluable
    for creators to build AI Agents that enhance customer service and operational
    efficiency by accurately handling queries, seamlessly managing workflows, and
    providing unprecedented insights. However, the development of these AI-infused
    solutions must align with Microsoft’s Responsible AI principles, which emphasize
    fairness, reliability, safety, privacy, security, inclusiveness, transparency,
    and accountability. These principles guide ethical AI development, ensuring that
    technologies are equitable, secure, and beneficial to all segments of society
    while fostering trust through clear and accountable operations.
  prefs: []
  type: TYPE_NORMAL
- en: The journey of creating intelligent Agents within the Power Platform is a testament
    to the transformative power of AI. It promises a future where automation and efficiency
    are harmoniously integrated with ethical principles, ensuring that technological
    advancements contribute positively to societal progress. As organizations continue
    to innovate and build upon these foundations, the potential for AI to revolutionize
    industries and improve lives becomes increasingly evident.
  prefs: []
  type: TYPE_NORMAL
- en: As we wrap up these 15 chapters and think about what is possible for ourselves
    as well as our organizations, we must always keep in mind that humans are the
    most important when it comes to change and adoption. Technology is simply a catalyst
    that can be physically seen to promote change, but the people are the ones who
    really matter. As we move into this era of AI, it is important to remember that
    the Power Platform has taught us some amazing fundamentals about how to create
    a safe space for people to both use and build AI-infused solutions. Everything
    you have learned in this book today can be re-applied when driving digital transformation
    programs for your business across many types of technology.
  prefs: []
  type: TYPE_NORMAL
- en: Victor and I thank you for spending your time reading this book.
  prefs: []
  type: TYPE_NORMAL
