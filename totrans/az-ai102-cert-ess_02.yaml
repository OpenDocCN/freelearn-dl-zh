- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Getting Started with Azure AI: Studios, Pipelines, and Containerization'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will explore the different development environments available
    for building and deploying AI models within Azure. You’ll be introduced to four
    key studios—Azure AI Foundry, Azure OpenAI, Machine Learning Studio, and Copilot
    Studio—each tailored to different AI and machine learning services. Additionally,
    we’ll cover Visual Studio Code as an **Integrated Development Environment** (**IDE**)
    to help you understand how these tools support AI development. The objective is
    to help you to choose the right studio based on the specific needs of your project.
  prefs: []
  type: TYPE_NORMAL
- en: We will also briefly touch on how Azure AI services can be seamlessly integrated
    into **Continuous Integration/Continuous Delivery** (**CI/CD**) pipelines, automating
    tasks such as building, testing, and deploying models. You’ll learn how to provision
    and manage AI service resources, whether through SDKs or REST APIs. Lastly, we’ll
    cover container deployment strategies, explaining how containers enable flexible
    and secure hosting of AI services both on-premises and in the Azure cloud.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Understand various AI development studios and their use cases, including Azure
    AI Foundry, OpenAI Studio, Machine Learning Studio, and Copilot Studio.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn how to create and manage Azure AI services using REST APIs or SDKs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explore CI/CD pipelines to automate AI service deployment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gain knowledge about container deployment strategies for hosting AI services
    in different environments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Develop hands-on experience through practical exercises in creating and deploying
    Azure AI services.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dive into these foundational elements before getting into more technical
    topics!
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The code files for this chapter can be downloaded from [https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials](https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials).
    You will require the following:'
  prefs: []
  type: TYPE_NORMAL
- en: To sign up for a free Azure subscription, visit [https://azure.microsoft.com/free](https://azure.microsoft.com/free)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Visual Studio Code extension, which can be found at [https://code.visualstudio.com/download](https://code.visualstudio.com/download)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: Whether or not you intend to use an Azure account with free Azure credit, you
    are responsible for monitoring and managing your account. If you are going to
    follow along with the hands-on exercises throughout this book, you need to understand
    the potential costs and monitor your usage and budget responsibly. Consumption
    models are great, but if you create resources and leave them running 24/7, the
    costs will soon start to increase. We recommend deleting all resources after completing
    each exercise or chapter to avoid unnecessary charges. You’re welcome to only
    follow the theory instead of practical exercises if you wish, although practical
    exercises are recommended as well.
  prefs: []
  type: TYPE_NORMAL
- en: Azure’s user interfaces are constantly evolving, and I have aimed to capture
    the latest screenshots to provide you with a seamless experience. However, some
    screenshots in the exercises might be outdated. The key takeaway is to focus on
    the underlying functionality and workflow rather than the exact look and feel
    of the interface.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin our exploration of various AI studios.
  prefs: []
  type: TYPE_NORMAL
- en: Various AI studios
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are four main AI studios in Azure—**AI Foundry**, **OpenAI Studio**, **ML
    Studio**, and **Copilot Studio** (along with Visual Studio Code as an IDE)—each
    designed for different AI and machine learning services. In this section, I’ll
    explain the differences between these studios and help you decide when to use
    each one.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2.1 – Azure AI Studios and IDE](img/B31034_02_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2.1 – Azure AI Studios and IDE
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: Azure AI Studio was rebranded as **Azure AI Foundry** during Ignite 2024, with
    Azure OpenAI now integrated into the Azure AI Foundry platform.
  prefs: []
  type: TYPE_NORMAL
- en: While there won’t be any exam questions specifically about these studios, it’s
    important to familiarize yourself with the tools available to enhance your AI
    development capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s have an overview of each studio:'
  prefs: []
  type: TYPE_NORMAL
- en: '**AI Foundry** (formerly Azure AI Studio) ([https://ai.azure.com](https://ai.azure.com)):
    This is a unified platform where organizations can design, customize, and manage
    the next generation of AI applications and agents at scale. It integrates seamlessly
    with popular developer tools such as GitHub, Visual Studio, and Copilot Studio,
    consolidating foundation, open source, industry-specific, and task models alongside
    AI tooling, safety, and monitoring solutions into a single, streamlined experience.
    Azure AI Foundry provides both a pro-code SDK and a user-friendly enterprise portal
    for efficient AI development and management.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Azure AI Foundry accelerates AI development with a rich catalog of models from
    providers such as Azure OpenAI, Mistral, Meta, Cohere, NVIDIA, and Hugging Face,
    paired with robust benchmarking tools to ensure performance optimization. Developers
    can use integrated tools such as Visual Studio Code for the Web and advanced features
    such as tracing with the Prompt Flow SDK, persistent testing, and content safety
    mechanisms. The platform’s seamless integration with Azure services, such as Azure
    AI services and Azure AI Search, allows unified workflows across AI use cases
    such as natural language processing, computer vision, speech recognition, and
    data analysis. Foundry’s secure and collaborative environment enables teams to
    innovate responsibly and efficiently while managing resources and workflows with
    enterprise-grade security.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**When to use**: Use Azure AI Foundry when you need a versatile platform to
    create and manage AI solutions that use multiple Azure services in a cohesive,
    integrated environment. Its ability to support complex workflows, ensure secure
    development, and streamline resource management makes it particularly suitable
    for organizations aiming to scale their AI initiatives efficiently and responsibly.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**OpenAI Studio** ([https://oai.azure.com/](https://oai.azure.com/)): is a
    specialized environment within the broader Azure AI Foundry platform. While Azure
    AI Foundry provides a unified interface for working with a wide range of foundation
    models—including those from OpenAI, Mistral, Meta, Cohere, and others—OpenAI Studio
    focuses exclusively on models developed by OpenAI. This includes popular **Large
    Language Models** (**LLMs**) such as GPT-3, GPT-4, and image generation models
    such as DALL·E.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI Studio is designed for users who want to experiment with, fine-tune,
    and deploy OpenAI’s models for generative AI scenarios, such as building chatbots,
    content generation, or creative applications that require advanced language or
    image capabilities. The interface is tightly integrated with the Azure ecosystem,
    making it easy to manage deployments and leverage Azure’s security and scalability
    features. However, it’s important to note that OpenAI Studio supports only OpenAI
    models, not models from other providers that are available through Azure AI Foundry.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**When to use**: Choose OpenAI Studio if your solution relies specifically
    on OpenAI’s large language or image models and you want a streamlined experience
    for deploying, customizing, and managing these models within Azure.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Machine Learning Studio** ([https://ml.azure.com/](https://ml.azure.com/)):
    This is a cloud-based platform for building, training, and deploying machine learning
    models. It offers a wide range of tools for data scientists and developers, including
    automated machine learning, drag-and-drop pipelines, and powerful tools for managing
    the entire machine learning life cycle.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When to use**: Use Azure Machine Learning Studio when you are focused on
    traditional machine learning tasks, such as predictive modeling, classification,
    regression, or clustering. It’s particularly useful for data scientists who need
    to build, train, and deploy custom machine learning models using their own datasets,
    and who require robust model management and deployment features.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Copilot Studio** ([https://copilotstudio.microsoft.com/](https://copilotstudio.microsoft.com/)):
    This is a low-code conversational AI solution that empowers users to extend Copilot
    for Microsoft 365 with custom enterprise scenarios, build and manage standalone
    copilots, and create custom workflows. This platform integrates seamlessly with
    various Microsoft technologies, providing a comprehensive environment for managing
    copilot experiences and customizations. It allows users to connect to multiple
    data sources using prebuilt or custom plugins, enabling the creation of sophisticated
    and intuitive AI-powered conversational interfaces. The low-code nature of Copilot
    Studio makes it accessible to users without extensive technical backgrounds, ensuring
    that the power of AI is within reach for a broader audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Copilot Studio provides a user-friendly interface that supports the creation,
    testing, and deployment of copilots across various channels, including websites,
    mobile apps, and Microsoft Teams. It uses LLMs and additional knowledge sources
    to handle a range of requests, from simple queries to complex conversations. The
    platform also supports the customization of copilots to suit specific business
    needs, allowing organizations to integrate company data, retrieve real-time data
    from external APIs, and embed copilots within their applications. This flexibility
    ensures that organizations can tailor their AI solutions to enhance productivity
    and meet unique business requirements.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**When to use**: Use Copilot Studio when you need to customize or extend Microsoft
    365 Copilot for specific enterprise needs, or when you want to build and manage
    standalone Copilot solutions and workflows without extensive coding. This studio
    is perfect for organizations looking to enhance productivity through tailored
    conversational AI solutions within their existing Microsoft ecosystem. Whether
    you need to create a copilot that can integrate with company data, automate workflows,
    or provide real-time support across multiple channels, Copilot Studio provides
    the tools and features necessary to achieve these goals effectively.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: Copilot Studio is not used in any of the exercises in this book, but it’s important
    to note that OpenAI models can be accessed through this platform as well.
  prefs: []
  type: TYPE_NORMAL
- en: '**AI Toolkit for Visual Studio Code**: This was previously known as Windows
    AI Studio. The extension has been renamed to reflect the focus on enabling AI
    development in Visual Studio Code across platforms. It is a desktop application
    for Windows 10/11 that provides tools for fine-tuning and deploying generative
    AI models locally. It serves as a personal AI lab without cloud dependency, targeting
    developers, AI enthusiasts, and creative professionals for tasks that are specific
    to Windows applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When to use**: Use the AI Toolkit for Visual Studio Code when you need a
    local environment for developing, fine-tuning, and deploying AI models, especially
    if you prefer working without cloud dependencies. This toolkit is ideal for developers
    and AI practitioners who want to experiment with AI technologies on Windows platforms,
    providing a flexible and powerful AI development environment within the familiar
    Visual Studio Code interface.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Let’s dive into creating Azure AI services with the next exercise.
  prefs: []
  type: TYPE_NORMAL
- en: Creating and configuring Azure AI services
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Azure AI services, as discussed in [*Chapter 1*](B31034_01.xhtml#_idTextAnchor014),
    provide a variety of AI capabilities, such as language, vision, speech, and generative
    AI, helping developers build intelligent applications. These services can be provisioned
    in an Azure subscription, and accessing them requires identifying endpoints, keys,
    and locations. Developers can use REST APIs or SDKs in popular programming languages
    such as Python, C#, and JavaScript to interact with these services. REST APIs
    provide the flexibility for applications to submit requests in JSON format, while
    SDKs streamline the process by abstracting complexity, making development more
    efficient.
  prefs: []
  type: TYPE_NORMAL
- en: Important note for all exercises throughout this book
  prefs: []
  type: TYPE_NORMAL
- en: For simplicity, we will use a single Azure AI multi-service account with one
    endpoint and key for all AI services. If a specific AI service needs to be created
    for a particular exercise, it will be mentioned explicitly. Otherwise, this multi-service
    account with the same endpoint and key will be used throughout. All instructions
    are based on the Windows platform, but for Mac and Linux operating systems, the
    steps will be very similar.
  prefs: []
  type: TYPE_NORMAL
- en: To consume Azure AI services, developers need specific information, such as
    the endpoint URI, subscription keys, and resource location, which are required
    for authenticating and accessing the services. While REST interfaces are widely
    used, SDKs further simplify the development process by handling much of the underlying
    API interaction, offering a more user-friendly approach to building AI-powered
    applications. This flexibility allows the creation of robust, intelligent applications
    that can scale business needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 1: Getting started with Azure AI services'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this exercise, you will create an Azure AI services resource and use a client
    application to detect languages. The purpose is to get familiar with provisioning
