- en: '2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: 'Getting Started with Azure AI: Studios, Pipelines, and Containerization'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Azure AI入门：工作室、管道和容器化
- en: In this chapter, we will explore the different development environments available
    for building and deploying AI models within Azure. You’ll be introduced to four
    key studios—Azure AI Foundry, Azure OpenAI, Machine Learning Studio, and Copilot
    Studio—each tailored to different AI and machine learning services. Additionally,
    we’ll cover Visual Studio Code as an **Integrated Development Environment** (**IDE**)
    to help you understand how these tools support AI development. The objective is
    to help you to choose the right studio based on the specific needs of your project.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨在Azure中构建和部署AI模型的不同开发环境。您将了解四个关键工作室——Azure AI Foundry、Azure OpenAI、Machine
    Learning Studio和Copilot Studio——每个工作室都针对不同的AI和机器学习服务进行了定制。此外，我们还将介绍Visual Studio
    Code作为**集成开发环境**（**IDE**）的使用，以帮助您了解这些工具如何支持AI开发。目标是帮助您根据项目的具体需求选择合适的工作室。
- en: We will also briefly touch on how Azure AI services can be seamlessly integrated
    into **Continuous Integration/Continuous Delivery** (**CI/CD**) pipelines, automating
    tasks such as building, testing, and deploying models. You’ll learn how to provision
    and manage AI service resources, whether through SDKs or REST APIs. Lastly, we’ll
    cover container deployment strategies, explaining how containers enable flexible
    and secure hosting of AI services both on-premises and in the Azure cloud.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将简要介绍如何将Azure AI服务无缝集成到**持续集成/持续交付**（**CI/CD**）管道中，自动化构建、测试和部署模型等任务。您将学习如何通过SDK或REST
    API配置和管理AI服务资源。最后，我们将介绍容器部署策略，解释容器如何使AI服务在本地和Azure云中灵活且安全地托管。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Understand various AI development studios and their use cases, including Azure
    AI Foundry, OpenAI Studio, Machine Learning Studio, and Copilot Studio.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解各种AI开发工作室及其用例，包括Azure AI Foundry、OpenAI Studio、Machine Learning Studio和Copilot
    Studio。
- en: Learn how to create and manage Azure AI services using REST APIs or SDKs.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何使用REST API或SDK创建和管理Azure AI服务。
- en: Explore CI/CD pipelines to automate AI service deployment.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索CI/CD管道来自动化AI服务的部署。
- en: Gain knowledge about container deployment strategies for hosting AI services
    in different environments.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取关于在不同环境中托管AI服务的容器部署策略的知识。
- en: Develop hands-on experience through practical exercises in creating and deploying
    Azure AI services.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过创建和部署Azure AI服务的实际练习来获得实践经验。
- en: Let’s dive into these foundational elements before getting into more technical
    topics!
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入研究更技术性的主题之前，让我们先深入了解这些基础元素！
- en: Technical requirements
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'The code files for this chapter can be downloaded from [https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials](https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials).
    You will require the following:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码文件可以从[https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials](https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials)下载。您需要以下内容：
- en: To sign up for a free Azure subscription, visit [https://azure.microsoft.com/free](https://azure.microsoft.com/free)
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要注册免费Azure订阅，请访问[https://azure.microsoft.com/free](https://azure.microsoft.com/free)
- en: The Visual Studio Code extension, which can be found at [https://code.visualstudio.com/download](https://code.visualstudio.com/download)
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以在[https://code.visualstudio.com/download](https://code.visualstudio.com/download)找到Visual
    Studio Code扩展。
- en: Important note
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Whether or not you intend to use an Azure account with free Azure credit, you
    are responsible for monitoring and managing your account. If you are going to
    follow along with the hands-on exercises throughout this book, you need to understand
    the potential costs and monitor your usage and budget responsibly. Consumption
    models are great, but if you create resources and leave them running 24/7, the
    costs will soon start to increase. We recommend deleting all resources after completing
    each exercise or chapter to avoid unnecessary charges. You’re welcome to only
    follow the theory instead of practical exercises if you wish, although practical
    exercises are recommended as well.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是否打算使用带有免费Azure信用额的Azure账户，您都有责任监控和管理您的账户。如果您打算跟随本书中的实际练习，您需要了解潜在的成本并负责任地监控您的使用和预算。消费模式很棒，但如果您创建了资源并全天候运行，成本很快就会上升。我们建议在完成每个练习或章节后删除所有资源，以避免不必要的费用。如果您愿意，可以只跟随理论而不进行实际练习，尽管实际练习也是推荐的。
- en: Azure’s user interfaces are constantly evolving, and I have aimed to capture
    the latest screenshots to provide you with a seamless experience. However, some
    screenshots in the exercises might be outdated. The key takeaway is to focus on
    the underlying functionality and workflow rather than the exact look and feel
    of the interface.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: Azure的用户界面不断演变，我旨在捕捉最新的屏幕截图，为您提供无缝体验。然而，练习中的某些截图可能已过时。关键是要关注底层功能和流程，而不是界面的确切外观和感觉。
- en: Let’s begin our exploration of various AI studios.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始探索各种AI工作室。
- en: Various AI studios
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 各种AI工作室
- en: There are four main AI studios in Azure—**AI Foundry**, **OpenAI Studio**, **ML
    Studio**, and **Copilot Studio** (along with Visual Studio Code as an IDE)—each
    designed for different AI and machine learning services. In this section, I’ll
    explain the differences between these studios and help you decide when to use
    each one.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Azure中有四个主要的AI工作室——**AI Foundry**、**OpenAI Studio**、**ML Studio**和**Copilot
    Studio**（以及Visual Studio Code作为IDE），每个都针对不同的AI和机器学习服务而设计。在本节中，我将解释这些工作室之间的区别，并帮助您决定何时使用每个工作室。
- en: '![Figure 2.1 – Azure AI Studios and IDE](img/B31034_02_001.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图2.1 – Azure AI Studios和IDE](img/B31034_02_001.jpg)'
- en: Figure 2.1 – Azure AI Studios and IDE
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1 – Azure AI Studios和IDE
- en: Important note
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Azure AI Studio was rebranded as **Azure AI Foundry** during Ignite 2024, with
    Azure OpenAI now integrated into the Azure AI Foundry platform.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Studio在Ignite 2024期间更名为**Azure AI Foundry**，Azure OpenAI现在已集成到Azure
    AI Foundry平台中。
- en: While there won’t be any exam questions specifically about these studios, it’s
    important to familiarize yourself with the tools available to enhance your AI
    development capabilities.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然不会有任何关于这些工作室的具体考试问题，但熟悉可用的工具以增强您的AI开发能力是很重要的。
- en: 'Let’s have an overview of each studio:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们概述每个工作室：
- en: '**AI Foundry** (formerly Azure AI Studio) ([https://ai.azure.com](https://ai.azure.com)):
    This is a unified platform where organizations can design, customize, and manage
    the next generation of AI applications and agents at scale. It integrates seamlessly
    with popular developer tools such as GitHub, Visual Studio, and Copilot Studio,
    consolidating foundation, open source, industry-specific, and task models alongside
    AI tooling, safety, and monitoring solutions into a single, streamlined experience.
    Azure AI Foundry provides both a pro-code SDK and a user-friendly enterprise portal
    for efficient AI development and management.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI Foundry**（原名Azure AI Studio）([https://ai.azure.com](https://ai.azure.com))：这是一个统一平台，组织可以在其中设计、定制和管理下一代AI应用和代理。它与GitHub、Visual
    Studio和Copilot Studio等流行的开发者工具无缝集成，将基础、开源、行业特定和任务模型以及AI工具、安全性和监控解决方案整合到单一、简化的体验中。Azure
    AI Foundry提供专业代码SDK和用户友好的企业门户，以实现高效的AI开发和管理工作。'
- en: Azure AI Foundry accelerates AI development with a rich catalog of models from
    providers such as Azure OpenAI, Mistral, Meta, Cohere, NVIDIA, and Hugging Face,
    paired with robust benchmarking tools to ensure performance optimization. Developers
    can use integrated tools such as Visual Studio Code for the Web and advanced features
    such as tracing with the Prompt Flow SDK, persistent testing, and content safety
    mechanisms. The platform’s seamless integration with Azure services, such as Azure
    AI services and Azure AI Search, allows unified workflows across AI use cases
    such as natural language processing, computer vision, speech recognition, and
    data analysis. Foundry’s secure and collaborative environment enables teams to
    innovate responsibly and efficiently while managing resources and workflows with
    enterprise-grade security.
  id: totrans-28
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure AI Foundry通过提供来自Azure OpenAI、Mistral、Meta、Cohere、NVIDIA和Hugging Face等提供商的丰富模型目录，加速了AI开发。它还配备了强大的基准测试工具，以确保性能优化。开发者可以使用集成工具，如Visual
    Studio Code for the Web和高级功能，如Prompt Flow SDK的跟踪、持久测试和内容安全机制。该平台与Azure服务（如Azure
    AI服务和Azure AI Search）的无缝集成，允许在自然语言处理、计算机视觉、语音识别和数据分析等AI用例中实现统一的流程。Foundry的安全和协作环境使团队能够在管理资源和流程的同时，以企业级安全负责和高效地进行创新。
- en: '**When to use**: Use Azure AI Foundry when you need a versatile platform to
    create and manage AI solutions that use multiple Azure services in a cohesive,
    integrated environment. Its ability to support complex workflows, ensure secure
    development, and streamline resource management makes it particularly suitable
    for organizations aiming to scale their AI initiatives efficiently and responsibly.'
  id: totrans-29
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**何时使用**：当你需要一个灵活的平台来创建和管理使用多个Azure服务且在统一、集成环境中使用的AI解决方案时，请使用Azure AI Foundry。它支持复杂的流程，确保安全开发，并简化资源管理，这使得它特别适合那些希望高效且负责任地扩展其AI项目的组织。'
- en: '**OpenAI Studio** ([https://oai.azure.com/](https://oai.azure.com/)): is a
    specialized environment within the broader Azure AI Foundry platform. While Azure
    AI Foundry provides a unified interface for working with a wide range of foundation
    models—including those from OpenAI, Mistral, Meta, Cohere, and others—OpenAI Studio
    focuses exclusively on models developed by OpenAI. This includes popular **Large
    Language Models** (**LLMs**) such as GPT-3, GPT-4, and image generation models
    such as DALL·E.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI Studio** ([https://oai.azure.com/](https://oai.azure.com/))：是Azure
    AI Foundry平台内的一个专用环境。虽然Azure AI Foundry提供了一个统一的界面，用于处理广泛的基座模型——包括来自OpenAI、Mistral、Meta、Cohere和其他公司的模型——但OpenAI
    Studio专注于仅由OpenAI开发的模型。这包括流行的**大型语言模型**（**LLMs**）如GPT-3、GPT-4以及图像生成模型如DALL·E。'
- en: OpenAI Studio is designed for users who want to experiment with, fine-tune,
    and deploy OpenAI’s models for generative AI scenarios, such as building chatbots,
    content generation, or creative applications that require advanced language or
    image capabilities. The interface is tightly integrated with the Azure ecosystem,
    making it easy to manage deployments and leverage Azure’s security and scalability
    features. However, it’s important to note that OpenAI Studio supports only OpenAI
    models, not models from other providers that are available through Azure AI Foundry.
  id: totrans-31
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: OpenAI Studio是为那些想要在生成式AI场景中实验、微调和部署OpenAI模型的用户设计的，例如构建聊天机器人、内容生成或需要高级语言或图像能力的创意应用。该界面与Azure生态系统紧密集成，使得管理部署并利用Azure的安全性和可扩展性功能变得容易。然而，需要注意的是，OpenAI
    Studio仅支持OpenAI模型，不支持通过Azure AI Foundry提供的其他供应商的模型。
- en: '**When to use**: Choose OpenAI Studio if your solution relies specifically
    on OpenAI’s large language or image models and you want a streamlined experience
    for deploying, customizing, and managing these models within Azure.'
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**何时使用**：如果你的解决方案特别依赖于OpenAI的大型语言或图像模型，并且希望在Azure中部署、定制和管理这些模型时获得流畅的体验，请选择OpenAI
    Studio。'
- en: '**Machine Learning Studio** ([https://ml.azure.com/](https://ml.azure.com/)):
    This is a cloud-based platform for building, training, and deploying machine learning
    models. It offers a wide range of tools for data scientists and developers, including
    automated machine learning, drag-and-drop pipelines, and powerful tools for managing
    the entire machine learning life cycle.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Machine Learning Studio** ([https://ml.azure.com/](https://ml.azure.com/))：这是一个基于云的平台，用于构建、训练和部署机器学习模型。它为数据科学家和开发者提供了一系列工具，包括自动化机器学习、拖放式流水线和强大的机器学习生命周期管理工具。'
- en: '**When to use**: Use Azure Machine Learning Studio when you are focused on
    traditional machine learning tasks, such as predictive modeling, classification,
    regression, or clustering. It’s particularly useful for data scientists who need
    to build, train, and deploy custom machine learning models using their own datasets,
    and who require robust model management and deployment features.'
  id: totrans-34
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**何时使用**：当你专注于传统机器学习任务，如预测建模、分类、回归或聚类时，请使用Azure Machine Learning Studio。它特别适用于需要使用自己的数据集构建、训练和部署自定义机器学习模型的数据科学家，并且需要强大的模型管理和部署功能。'
- en: '**Copilot Studio** ([https://copilotstudio.microsoft.com/](https://copilotstudio.microsoft.com/)):
    This is a low-code conversational AI solution that empowers users to extend Copilot
    for Microsoft 365 with custom enterprise scenarios, build and manage standalone
    copilots, and create custom workflows. This platform integrates seamlessly with
    various Microsoft technologies, providing a comprehensive environment for managing
    copilot experiences and customizations. It allows users to connect to multiple
    data sources using prebuilt or custom plugins, enabling the creation of sophisticated
    and intuitive AI-powered conversational interfaces. The low-code nature of Copilot
    Studio makes it accessible to users without extensive technical backgrounds, ensuring
    that the power of AI is within reach for a broader audience.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Copilot Studio** ([https://copilotstudio.microsoft.com/](https://copilotstudio.microsoft.com/)):
    这是一个低代码的对话式人工智能解决方案，它使用户能够通过自定义企业场景扩展 Microsoft 365 的 Copilot，构建和管理独立的 Copilot，以及创建自定义工作流程。该平台与各种
    Microsoft 技术无缝集成，为管理 Copilot 体验和定制提供全面的环境。它允许用户使用预构建或自定义插件连接到多个数据源，从而能够创建复杂且直观的人工智能驱动的对话界面。Copilot
    Studio 的低代码特性使其对没有广泛技术背景的用户也易于访问，确保了人工智能的力量对更广泛的受众触手可及。'
- en: Copilot Studio provides a user-friendly interface that supports the creation,
    testing, and deployment of copilots across various channels, including websites,
    mobile apps, and Microsoft Teams. It uses LLMs and additional knowledge sources
    to handle a range of requests, from simple queries to complex conversations. The
    platform also supports the customization of copilots to suit specific business
    needs, allowing organizations to integrate company data, retrieve real-time data
    from external APIs, and embed copilots within their applications. This flexibility
    ensures that organizations can tailor their AI solutions to enhance productivity
    and meet unique business requirements.
  id: totrans-36
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Copilot Studio 提供了一个用户友好的界面，支持在各种渠道上创建、测试和部署 Copilot，包括网站、移动应用和 Microsoft Teams。它使用大型语言模型和额外的知识源来处理从简单查询到复杂对话的各种请求。该平台还支持定制
    Copilot 以满足特定业务需求，允许组织集成公司数据、从外部 API 获取实时数据，并在其应用程序中嵌入 Copilot。这种灵活性确保了组织可以定制其人工智能解决方案以提高生产力和满足独特的业务需求。
- en: '**When to use**: Use Copilot Studio when you need to customize or extend Microsoft
    365 Copilot for specific enterprise needs, or when you want to build and manage
    standalone Copilot solutions and workflows without extensive coding. This studio
    is perfect for organizations looking to enhance productivity through tailored
    conversational AI solutions within their existing Microsoft ecosystem. Whether
    you need to create a copilot that can integrate with company data, automate workflows,
    or provide real-time support across multiple channels, Copilot Studio provides
    the tools and features necessary to achieve these goals effectively.'
  id: totrans-37
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**何时使用**: 当您需要为特定企业需求定制或扩展 Microsoft 365 Copilot 时，或者当您想要构建和管理不需要大量编码的独立 Copilot
    解决方案和工作流程时，请使用 Copilot Studio。对于希望在其现有的 Microsoft 生态系统内通过定制的对话式人工智能解决方案来提高生产力的组织来说，这个工作室是完美的。无论您需要创建一个可以与公司数据集成的
    Copilot、自动化工作流程，还是在多个渠道上提供实时支持，Copilot Studio 都提供了实现这些目标所需的工具和功能。'
- en: Important note
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: Copilot Studio is not used in any of the exercises in this book, but it’s important
    to note that OpenAI models can be accessed through this platform as well.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot Studio 在本书的任何练习中都没有使用，但重要的是要注意，OpenAI 模型也可以通过这个平台访问。
- en: '**AI Toolkit for Visual Studio Code**: This was previously known as Windows
    AI Studio. The extension has been renamed to reflect the focus on enabling AI
    development in Visual Studio Code across platforms. It is a desktop application
    for Windows 10/11 that provides tools for fine-tuning and deploying generative
    AI models locally. It serves as a personal AI lab without cloud dependency, targeting
    developers, AI enthusiasts, and creative professionals for tasks that are specific
    to Windows applications.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI Toolkit for Visual Studio Code**: 这之前被称为 Windows AI Studio。该扩展已被重命名，以反映其在跨平台上启用
    Visual Studio Code 人工智能开发的重点。这是一个适用于 Windows 10/11 的桌面应用程序，它提供了用于本地微调和部署生成式人工智能模型的工具。它作为一个无需云依赖的个人人工智能实验室，针对开发人员、人工智能爱好者以及创意专业人士，用于特定于
    Windows 应用程序的任务。'
- en: '**When to use**: Use the AI Toolkit for Visual Studio Code when you need a
    local environment for developing, fine-tuning, and deploying AI models, especially
    if you prefer working without cloud dependencies. This toolkit is ideal for developers
    and AI practitioners who want to experiment with AI technologies on Windows platforms,
    providing a flexible and powerful AI development environment within the familiar
    Visual Studio Code interface.'
  id: totrans-41
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**何时使用**：当你需要一个本地环境来开发、微调和部署AI模型时，使用Visual Studio Code的AI工具包，尤其是如果你更喜欢在没有云依赖的情况下工作。这个工具包非常适合想要在Windows平台上实验AI技术的开发人员和AI从业者，它提供了一个灵活且强大的AI开发环境，且在熟悉的Visual
    Studio Code界面中。'
- en: Let’s dive into creating Azure AI services with the next exercise.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过下一个练习深入了解创建Azure AI服务。
- en: Creating and configuring Azure AI services
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建和配置Azure AI服务
- en: Azure AI services, as discussed in [*Chapter 1*](B31034_01.xhtml#_idTextAnchor014),
    provide a variety of AI capabilities, such as language, vision, speech, and generative
    AI, helping developers build intelligent applications. These services can be provisioned
    in an Azure subscription, and accessing them requires identifying endpoints, keys,
    and locations. Developers can use REST APIs or SDKs in popular programming languages
    such as Python, C#, and JavaScript to interact with these services. REST APIs
    provide the flexibility for applications to submit requests in JSON format, while
    SDKs streamline the process by abstracting complexity, making development more
    efficient.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如同在[*第一章*](B31034_01.xhtml#_idTextAnchor014)中讨论的，Azure AI服务提供了各种AI能力，如语言、视觉、语音和生成式AI，帮助开发者构建智能应用。这些服务可以在Azure订阅中配置，访问它们需要识别端点、密钥和位置。开发者可以使用Python、C#和JavaScript等流行编程语言中的REST
    API或SDK与这些服务交互。REST API为应用程序提供了以JSON格式提交请求的灵活性，而SDK通过抽象复杂性，使开发过程更加高效。
- en: Important note for all exercises throughout this book
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 本书所有练习的重要注意事项
- en: For simplicity, we will use a single Azure AI multi-service account with one
    endpoint and key for all AI services. If a specific AI service needs to be created
    for a particular exercise, it will be mentioned explicitly. Otherwise, this multi-service
    account with the same endpoint and key will be used throughout. All instructions
    are based on the Windows platform, but for Mac and Linux operating systems, the
    steps will be very similar.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化，我们将使用一个单一的Azure AI多服务账户，该账户包含一个端点和密钥，用于所有AI服务。如果需要为特定练习创建特定的AI服务，将会明确指出。否则，将使用具有相同端点和密钥的多服务账户贯穿始终。所有说明均基于Windows平台，但对于Mac和Linux操作系统，步骤将非常相似。
- en: To consume Azure AI services, developers need specific information, such as
    the endpoint URI, subscription keys, and resource location, which are required
    for authenticating and accessing the services. While REST interfaces are widely
    used, SDKs further simplify the development process by handling much of the underlying
    API interaction, offering a more user-friendly approach to building AI-powered
    applications. This flexibility allows the creation of robust, intelligent applications
    that can scale business needs.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用Azure AI服务，开发者需要特定的信息，例如端点URI、订阅密钥和资源位置，这些信息对于验证和访问服务是必需的。虽然REST接口被广泛使用，但SDK通过处理大部分底层API交互，进一步简化了开发过程，为构建AI驱动的应用程序提供了一个更用户友好的方法。这种灵活性允许创建强大、智能的应用程序，以满足业务需求。
- en: 'Exercise 1: Getting started with Azure AI services'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习1：Azure AI服务的入门
- en: 'In this exercise, you will create an Azure AI services resource and use a client
    application to detect languages. The purpose is to get familiar with provisioning
    Azure AI services and utilize either its REST APIs or SDKs for languages such
    as Python, Java, and Node.js. You’ll enter text for the service to analyze and
    detect its language. For instance, when you submit “How are you?”, “¿Cómo estás?”,
    or “Comment ça va?”, the service will return the corresponding detected language.
    Here are the steps:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，你将创建一个Azure AI服务资源，并使用客户端应用程序来检测语言。目的是熟悉配置Azure AI服务，并利用其REST API或SDK（如Python、Java和Node.js）进行语言处理。你将为服务输入文本以进行分析和检测其语言。例如，当你提交“你好吗？”，“¿Cómo
    estás?”或“Comment ça va?”时，服务将返回相应的检测到的语言。以下是步骤：
- en: Important note
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 重要注意事项
- en: For more details on how to use Visual Studio Code, please visit [https://code.visualstudio.com/docs](https://code.visualstudio.com/docs).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 想要了解更多关于如何使用Visual Studio Code的信息，请访问[https://code.visualstudio.com/docs](https://code.visualstudio.com/docs)。
- en: 'Cloning the GitHub repository:'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 克隆GitHub仓库：
- en: Open Visual Studio Code.
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 Visual Studio Code。
- en: 'Use the shortcut *Shift + Ctrl + P* (Window) and *Shift* + *Command* + *P (Mac)*
    to open the palette, as shown following figure:'
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用快捷键 *Shift + Ctrl + P*（Windows）和 *Shift* + *Command* + *P*（Mac）打开调色板，如下图所示：
- en: '![Figure 2.2 – Open the palette](img/B31034_02_002.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.2 – 打开调色板](img/B31034_02_002.jpg)'
- en: Figure 2.2 – Open the palette
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.2 – 打开调色板
- en: 'Run the `Git: Clone` command and enter [https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials](https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials).
    A window will pop up, prompting you to choose a destination folder for cloning
    the repository. Select an existing folder or create a new one, then click the
    **Select as Repository Destination** button. The repository will then be cloned
    into the chosen folder.'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '运行 `Git: Clone` 命令并输入 [https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials](https://github.com/PacktPublishing/Azure-AI102-Certification-Essentials)。将弹出一个窗口，提示您选择克隆仓库的目标文件夹。选择一个现有文件夹或创建一个新的文件夹，然后点击**选择为仓库目标**按钮。然后，仓库将被克隆到所选文件夹中。'
- en: Provisioning Azure AI services
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 配置 Azure AI 服务
- en: 'When setting up Azure AI services, you have two primary options: create a multi-service
    account or provision an individual AI service. A **multi-service account** provides
    access to multiple Azure AI capabilities through a single endpoint and key, offering
    the convenience of managing various AI tools under one unified resource. Alternatively,
    if your project requires a specialized service—such as Document Intelligence—you
    can create a **dedicated resource** tailored to that specific functionality.'
  id: totrans-59
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在设置 Azure AI 服务时，您有两个主要选项：创建多服务帐户或配置单个 AI 服务。一个**多服务帐户**通过单个端点和密钥提供对多个 Azure
    AI 功能的访问，提供在统一资源下管理各种 AI 工具的便利性。或者，如果您的项目需要特定的服务——例如文档智能——您可以创建一个**专用资源**，以适应该特定功能。
- en: 'In this exercise, we’ll create a multi-service Azure AI resource to take advantage
    of multiple capabilities. This same resource will be used consistently across
    all exercises throughout the book to streamline your learning experience:'
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这个练习中，我们将创建一个多服务 Azure AI 资源，以利用多种功能。此资源将在本书的所有练习中一致使用，以简化您的学习体验：
- en: Open the Azure portal and sign in.
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 Azure 门户并登录。
- en: 'In the Azure portal, use the search bar at the top to search for *Azure AI
    services multi-service account*, then select it from the results. Alternatively,
    you can directly navigate to the creation page using this link: [https://portal.azure.com/#create/Microsoft.CognitiveServicesAllInOne.](https://portal.azure.com/#create/Microsoft.CognitiveServicesAllInOne.)'
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Azure 门户中，使用顶部的搜索栏搜索 *Azure AI 服务多服务帐户*，然后从结果中选择它。或者，您可以直接通过此链接导航到创建页面：[https://portal.azure.com/#create/Microsoft.CognitiveServicesAllInOne.](https://portal.azure.com/#create/Microsoft.CognitiveServicesAllInOne.)
- en: 'Create a multi-service account with a unique name, region, and resource group:'
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个具有唯一名称、区域和资源组的**多服务帐户**：
- en: '**Subscription**: Your Azure subscription'
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**订阅**：您的 Azure 订阅'
- en: '**Resource group**: Choose or create a resource group (if you are using a restricted
    subscription, you may not have permission to create a new resource group – use
    the one provided)'
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源组**：选择或创建一个资源组（如果您使用的是受限订阅，您可能没有权限创建新的资源组 – 使用提供的资源组）'
- en: '**Region**: Choose any available region'
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**区域**：选择任何可用区域'
- en: '**Name**: Enter a unique name'
  id: totrans-67
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**名称**：输入一个唯一名称'
- en: '**Pricing tier**: Standard S0'
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定价层**：标准 S0'
- en: 'Once the Azure AI service multi-service account has been deployed, access the
    **Keys and Endpoint** page, as shown in the following screenshot:'
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦部署了 Azure AI 服务多服务帐户，访问**密钥和端点**页面，如下截图所示：
- en: '![Figure 2.3 – Accessing Keys and Endpoint in the Azure AI Service multi-service
    account](img/B31034_02_003.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.3 – 在 Azure AI 服务多服务帐户中访问密钥和端点](img/B31034_02_003.jpg)'
- en: Figure 2.3 – Accessing Keys and Endpoint in the Azure AI Service multi-service
    account
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.3 – 在 Azure AI 服务多服务帐户中访问密钥和端点
- en: Important notes for all exercises throughout this book
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 本书所有练习的重要注意事项
- en: The cloned GitHub repository and your provisioned Azure AI services **endpoint
    and key** (as shown in *Figure 2**.3*) will be used throughout all exercises in
    this book.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 克隆的 GitHub 仓库和您配置的 Azure AI 服务**端点和密钥**（如图 *图 2.3* 所示）将用于本书的所有练习中。
- en: Please make sure to copy and securely save both the endpoint and key now. While
    later exercises will reference them briefly, this section contains the full instructions,
    so you may need to return here for more details.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保现在复制并安全保存端点和密钥。虽然后续练习将简要提及它们，但本节包含完整说明，因此您可能需要返回此处以获取更多详细信息。
- en: 'To provision Azure AI services, you can choose between two primary methods:
    using REST APIs or leveraging SDKs. Let’s walk through the following steps to
    explore both approaches:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 要配置 Azure AI 服务，您可以选择两种主要方法：使用 REST API 或利用 SDK。让我们按以下步骤进行操作以探索这两种方法：
- en: Using a REST interface.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 REST 接口。
- en: 'Azure AI service APIs are REST-based, allowing you to send JSON requests over
    HTTP. In this example, you’ll see how a console application uses the Language
    REST API for language detection, but the same concept applies to all Azure AI
    services APIs:'
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Azure AI 服务 API 基于 REST，允许您通过 HTTP 发送 JSON 请求。在本例中，您将看到控制台应用程序如何使用语言 REST API
    进行语言检测，但相同的概念适用于所有 Azure AI 服务 API：
- en: In Visual Studio Code, open the `rest-client.py` file in the `/excercise1/`
    `rest-client` folder.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Visual Studio Code 中，打开 `/excercise1/` 文件夹中的 `rest-client.py` 文件。
- en: Copy the `.env-sample` file to a new file named `.env` and update it with your
    Azure AI service *endpoint* and *key*.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 `.env-sample` 文件复制到名为 `.env` 的新文件中，并使用您的 Azure AI 服务的 *端点* 和 *密钥* 更新它。
- en: Review the code, noting how the request is structured and sent.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看代码，注意请求的结构和发送方式。
- en: 'Open the **Integrated Terminal** and run the Python file:'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 **集成终端** 并运行 Python 文件：
- en: '[PRE0]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Enter text to test language detection.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入文本以测试语言检测。
- en: Using an SDK.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 SDK。
- en: 'You can use Azure AI services REST APIs directly as previously mentioned, but
    SDKs are available for popular languages such as C#, Python, Java, and Node.js.
    Using an SDK simplifies the development process significantly:'
  id: totrans-85
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如前所述，您可以直接使用 Azure AI 服务的 REST API，但 SDK 也适用于流行的语言，如 C#、Python、Java 和 Node.js。使用
    SDK 可以显著简化开发过程：
- en: Open the `sdk-client.py` file in the `/``excercise1/sdk-client` folder.
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `/excercise1/sdk-client` 文件夹中打开 `sdk-client.py` 文件。
- en: 'Install the SDK:'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 SDK：
- en: '[PRE1]'
  id: totrans-88
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Copy the `.env-sample` file to a new file named `.env` and update it with your
    Azure AI service’s *endpoint* and *key*.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 `.env-sample` 文件复制到名为 `.env` 的新文件中，并使用您的 Azure AI 服务的 *端点* 和 *密钥* 更新它。
- en: Review the code for how the SDK simplifies API interactions.
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看代码，了解 SDK 如何简化 API 交互。
- en: 'Run the SDK program:'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行 SDK 程序：
- en: '[PRE2]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Enter text to detect the language, as shown here:'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入文本以检测语言，如图所示：
- en: '![Figure 2.4 – Output of sdk-client.py](img/B31034_02_004.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图 2.4 – sdk-client.py 的输出](img/B31034_02_004.jpg)'
- en: Figure 2.4 – Output of sdk-client.py
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.4 – sdk-client.py 的输出
- en: This exercise gives an overview and will guide you through provisioning Azure
    AI services, using the REST API, and SDK approaches in Python.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 本练习提供了一个概述，并将指导您通过 Python 使用 REST API 和 SDK 方法配置 Azure AI 服务。
- en: Let’s take a moment to briefly highlight the importance of CI/CD pipelines in
    the next section. These automated workflows are essential for ensuring efficient,
    consistent, and error-free deployment of AI models and other software.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要地强调下一节中 CI/CD 管道的重要性。这些自动化工作流程对于确保 AI 模型和其他软件的部署高效、一致且无错误至关重要。
- en: Integrating CI/CD in Azure AI and machine learning development
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 Azure AI 和机器学习开发中集成 CI/CD
- en: Modern AI applications require a robust and automated approach to development,
    testing, and deployment. Unlike traditional software, AI and machine learning
    applications rely not only on code but also on dynamic datasets and evolving models,
    making CI/CD an essential practice. Integrating CI/CD ensures that AI models are
    consistently trained, validated, and deployed in a structured and efficient manner,
    reducing errors and improving reliability.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 现代人工智能应用程序需要一种强大且自动化的方法来开发、测试和部署。与传统的软件不同，人工智能和机器学习应用程序不仅依赖于代码，还依赖于动态数据集和不断发展的模型，这使得
    CI/CD 成为一种基本实践。集成 CI/CD 确保人工智能模型以结构化和高效的方式持续训练、验证和部署，减少错误并提高可靠性。
- en: Traditional versus AI-based system testing and monitoring
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 传统系统测试与基于 AI 的系统测试和监控
- en: '*Figure 2**.5* illustrates the key differences between traditional system testing
    and monitoring and machine-learning-based system testing and monitoring. Traditional
    software testing focuses primarily on validating the application code before deployment
    and monitoring system performance afterward. In contrast, systems based on AI
    and machine learning require a more complex approach that includes not only code
    validation but also rigorous data testing, model performance evaluation, and continuous
    monitoring of predictions.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '*图2.5* 展示了传统系统测试和监控与基于机器学习的系统测试和监控之间的关键区别。传统的软件测试主要关注在部署前验证应用程序代码，并在部署后监控系统性能。相比之下，基于AI和机器学习的系统需要更复杂的方法，不仅包括代码验证，还包括严格的数据测试、模型性能评估和预测的持续监控。'
- en: '![Figure 2.5 – Traditional system versus AI application](img/B31034_02_005.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图2.5 – 传统系统与AI应用程序对比](img/B31034_02_005.jpg)'
- en: Figure 2.5 – Traditional system versus AI application
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.5 – 传统系统与AI应用程序对比
- en: Let’s explore this in more detail.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更详细地探讨这个问题。
- en: Traditional system testing and monitoring
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传统系统测试和监控
- en: In traditional software development, testing and monitoring processes revolve
    around ensuring that application code functions correctly and efficiently within
    a controlled environment. The process begins with unit tests, which validate individual
    code components to detect potential issues early. After unit testing, integration
    tests assess how different parts of the application interact, ensuring seamless
    communication between modules. Once testing is complete and the application has
    been deployed, system monitoring takes over, tracking performance metrics such
    as uptime, response times, and error rates. This monitoring ensures that the deployed
    system remains stable and continues to function as expected. Since traditional
    applications operate under deterministic logic—where specific inputs always produce
    predictable outputs—the primary goal of system monitoring is to identify infrastructure
    failures, security vulnerabilities, or performance bottlenecks that could affect
    the application’s reliability.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的软件开发中，测试和监控过程围绕确保应用程序代码在受控环境中正确且高效地运行。这个过程从单元测试开始，验证单个代码组件以早期发现潜在问题。单元测试之后，集成测试评估应用程序不同部分之间的交互，确保模块之间的无缝通信。一旦测试完成并且应用程序已部署，系统监控接管，跟踪性能指标，如正常运行时间、响应时间和错误率。这种监控确保部署的系统保持稳定并继续按预期运行。由于传统应用程序在确定性逻辑下运行——具体输入总是产生可预测的输出——系统监控的主要目标是识别可能影响应用程序可靠性的基础设施故障、安全漏洞或性能瓶颈。
- en: Machine-learning-based system testing and monitoring
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于机器学习的系统测试和监控
- en: In contrast, machine-learning-based applications require a more comprehensive
    testing and monitoring approach as their behavior is not solely dictated by static
    code but also by continuously evolving data and models. Unlike traditional software,
    where testing ends once the code is deployed, AI systems demand ongoing validation.
    The process starts with data tests, which examine the quality, consistency, and
    integrity of input data before training begins, ensuring that the model learns
    from reliable sources. Additionally, skew tests detect discrepancies between training
    data and real-world production data, which, if left unaddressed, can lead to performance
    degradation over time. Given the computational demands of AI workloads, machine
    learning infrastructure tests are also conducted to validate the compatibility
    of hardware resources, software dependencies, and training environments.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 与之相反，基于机器学习的应用需要更全面的测试和监控方法，因为它们的行为不仅由静态代码决定，还由不断演变的数据和模型决定。与传统的软件不同，在代码部署后测试就结束了，AI系统需要持续验证。这个过程从数据测试开始，检查输入数据的质量、一致性和完整性，在训练开始之前确保模型从可靠的数据源学习。此外，倾斜测试可以检测训练数据与现实世界生产数据之间的差异，如果未得到解决，随着时间的推移可能会导致性能下降。鉴于AI工作负载的计算需求，还会进行机器学习基础设施测试，以验证硬件资源、软件依赖和训练环境的兼容性。
- en: Following these initial tests, model tests assess various performance metrics,
    such as accuracy, precision, recall, and fairness, before a model is approved
    for deployment. However, unlike traditional applications, where system monitoring
    primarily focuses on uptime and resource usage, machine learning systems require
    continuous prediction monitoring to evaluate how well the model performs on real-world
    data. Additionally, data monitoring ensures that incoming data distributions remain
    consistent with training data, helping to detect potential issues such as data
    drift or bias. Given that machine learning models evolve and degrade over time,
    ongoing validation and monitoring are critical to maintaining accuracy, fairness,
    and effectiveness in production.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行这些初步测试之后，模型测试评估各种性能指标，如准确率、精确度、召回率和公平性，在模型获得部署批准之前。然而，与主要关注上线时间和资源使用的传统应用程序不同，机器学习系统需要持续预测监控来评估模型在真实世界数据上的表现。此外，数据监控确保传入的数据分布与训练数据保持一致，有助于检测潜在问题，如数据漂移或偏差。鉴于机器学习模型会随时间演变和退化，持续的验证和监控对于在生产中保持准确性、公平性和有效性至关重要。
- en: Key considerations for CI/CD in AI and machine learning projects
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI和机器学习项目中CI/CD的关键考虑因素
- en: Implementing CI/CD in AI and machine learning projects presents unique challenges.
    In AI workflows, it’s not just the code that evolves—datasets, models, and even
    evaluation metrics can change over time. Azure provides a rich ecosystem of tools
    that help address these complexities and enable robust, automated deployment pipelines
    tailored to AI solutions.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能和机器学习项目中实施持续集成/持续部署（CI/CD）面临独特的挑战。在人工智能工作流程中，不仅仅是代码会演变——数据集、模型甚至评估指标都可能随时间变化。Azure提供了一套丰富的工具，帮助解决这些复杂性，并使AI解决方案能够实现强大、自动化的部署管道。
- en: 'Here are the key components and considerations when designing CI/CD workflows
    for AI/ML projects:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 设计AI/ML项目的CI/CD工作流程时，以下是一些关键组件和考虑因素：
- en: '**Data and model versioning**: In AI projects, changes in data can affect model
    behavior as much as changes in code. Therefore, it’s critical to version both:'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和模型版本控制**：在AI项目中，数据的变化可能对模型行为的影响与代码的变化一样大。因此，版本控制两者至关重要：'
- en: '**Dataset versioning**: Track and manage different versions of your training
    and evaluation datasets to ensure reproducibility and auditability'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集版本控制**：跟踪和管理您的训练和评估数据集的不同版本，以确保可重复性和可审计性'
- en: '**Model versioning**: Register and store trained models in a model registry
    (such as Azure Machine Learning Model Registry), capturing metadata, metrics,
    and lineage'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型版本控制**：在模型注册表（如Azure机器学习模型注册表）中注册和存储训练好的模型，捕获元数据、指标和血缘关系'
- en: '**Experiment tracking**: Keeping a record of experiments is essential for understanding
    what worked and why. Tools such as **Azure Machine Learning**, **MLflow**, and
    **Weights & Biases** support the following:'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实验跟踪**：记录实验对于理解哪些方法有效以及为什么有效至关重要。以下工具如**Azure机器学习**、**MLflow**和**Weights
    & Biases**支持以下功能：'
- en: Logging hyperparameters, model configurations, training duration, and evaluation
    metrics
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录超参数、模型配置、训练时长和评估指标
- en: Comparing multiple runs to identify the best-performing model
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较多个运行以确定表现最佳的模型
- en: Enabling collaboration and reproducibility across teams
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在团队间启用协作和可重复性
- en: '**Continuous training (CT)**: Unlike traditional applications, AI models can
    degrade over time due to data drift. To address this, incorporate CT pipelines:'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续训练（CT）**：与传统的应用程序不同，AI模型可能会因数据漂移而随时间退化。为了解决这个问题，纳入CT管道：'
- en: '**Automated retraining**: Trigger retraining pipelines when new data is available
    or when performance drops below a defined threshold'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动重新训练**：当有新数据可用或性能低于定义的阈值时触发重新训练管道'
- en: '**Scheduled retraining**: Periodically retrain models to keep them up to date
    with the latest data trends'
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计划性重新训练**：定期重新训练模型以保持其与最新数据趋势同步'
- en: '**Model validation and quality assurance**: Automated validation ensures that
    only high-quality models are promoted to production:'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型验证和质量保证**：自动验证确保只有高质量的模型被提升到生产环境中：'
- en: '**Performance validation**: Compare new model metrics against a baseline or
    champion model to ensure improvements'
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能验证**：将新模型指标与基线或冠军模型进行比较，以确保改进'
- en: '**Bias and fairness audits**: Use tools such as Azure Responsible AI dashboard
    or Fairlearn to identify and mitigate unintended biases before deployment'
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏差和公平性审计**：使用Azure负责任AI仪表板或Fairlearn等工具在部署前识别和减轻未预期的偏差'
- en: '**Explainability**: Integrate tools such as SHAP or LIME to understand model
    predictions, which is especially important in regulated industries'
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：整合SHAP或LIME等工具来理解模型预测，这在受监管的行业尤为重要。'
- en: '**Deployment strategies**: Robust deployment approaches minimize risk and ensure
    smooth rollouts:'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部署策略**：稳健的部署方法可以最小化风险并确保平稳推出：'
- en: '**Blue-green deployments**: Deploy new models in parallel with existing ones
    and switch traffic after validation'
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蓝绿部署**：在现有模型并行部署新模型，并在验证后切换流量。'
- en: '**Canary releases**: Gradually expose a small subset of users to new models
    to monitor impact before full rollout'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**金丝雀发布**：在全面推出之前，逐步向一小部分用户公开新模型以监控其影响。'
- en: '**Shadow deployment**: Run the new model in parallel (without affecting users)
    to evaluate predictions in real time'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**影子部署**：并行运行新模型（不影响用户）以实时评估预测。'
- en: '**Monitoring and drift detection**: Post-deployment monitoring is essential
    for maintaining performance and trust in AI systems:'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控和漂移检测**：部署后的监控对于维护AI系统的性能和信任至关重要：'
- en: '**Prediction monitoring**: Track input/output distributions and monitor for
    anomalies'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测监控**：跟踪输入/输出分布，并监控异常情况。'
- en: '**Data drift detection**: Use tools such as Azure Data Drift Monitor to detect
    shifts in input data that may affect model accuracy'
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据漂移检测**：使用Azure数据漂移监控器等工具来检测可能影响模型准确性的输入数据变化。'
- en: '**Auto-rollbacks**: Integrate alerts and rollback mechanisms in case a model
    underperforms or causes unintended behavior'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动回滚**：在模型表现不佳或导致意外行为时，集成警报和回滚机制。'
- en: '**Security, governance, and compliance**: Ensuring secure, ethical, and compliant
    AI development is non-negotiable in production environments:'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全、治理和合规性**：在生产环境中确保安全、道德和合规的AI开发是不可或缺的：'
- en: '**Access control**: Use Azure **Role-Based Access Control** (**RBAC**) and
    managed identities for secure access to resources.'
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**访问控制**：使用Azure基于角色的访问控制（**RBAC**）和管理标识以安全地访问资源。'
- en: '**Model governance**: Maintain a model catalog with version history, ownership,
    and audit trails'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型治理**：维护一个包含版本历史、所有权和审计跟踪的模型目录。'
- en: '**Data privacy**: Ensure PII and sensitive data are handled securely, following
    GDPR and other applicable regulations'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据隐私**：确保按照GDPR和其他适用法规安全地处理PII和敏感数据。'
- en: '**EULA and licensing**: Ensure appropriate license agreements are accepted
    when using proprietary or containerized services'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**EULA和许可**：在使用专有或容器化服务时，确保接受适当的许可协议。'
- en: '**Azure tools supporting CI/CD for AI/ML**: Azure provides an integrated toolchain
    for enabling CI/CD pipelines tailored to AI workloads:'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持AI/ML的Azure CI/CD工具**：Azure提供了一套集成的工具链，用于启用针对AI工作负载的CI/CD管道：'
- en: '**Azure DevOps** or **GitHub Actions** for source control, pipeline automation,
    and collaboration'
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure DevOps**或**GitHub Actions**用于源代码控制、管道自动化和协作。'
- en: '**Azure machine learning pipelines** for orchestrating training, evaluation,
    and deployment steps'
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure机器学习管道**用于编排训练、评估和部署步骤。'
- en: '**Azure Container Registry** (**ACR**) and **Azure Kubernetes Service** (**AKS**)
    for containerized model deployment and scaling'
  id: totrans-143
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure容器注册库（**ACR**）和**Azure Kubernetes服务（**AKS**）**用于容器化模型部署和扩展。'
- en: '**MLflow integration** for experiment tracking and model registry'
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MLflow集成**用于实验跟踪和模型注册。'
- en: '**Azure Monitor** and **Application Insights** for end-to-end observability'
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Azure Monitor**和**Application Insights**提供端到端可观察性。'
- en: 'Let’s explore one of the unique challenges faced when conservative, security-focused
    customers require AI services to be deployed in on-premises environments. This
    leads us to the next topic: **container deployment strategies**. In the following
    hands-on exercise, we’ll walk through how to effectively deploy AI services using
    containers. Let’s dive right in!'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨当保守、以安全为重点的客户要求在本地环境中部署AI服务时所面临的独特挑战之一。这引出了下一个主题：**容器部署策略**。在接下来的动手练习中，我们将了解如何有效地使用容器部署AI服务。让我们直接进入正题！
- en: Container deployment strategies
  id: totrans-147
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 容器部署策略
- en: Containers are like portable boxes that hold everything an app needs to run,
    such as tools, settings, and code. Imagine you have a lunchbox packed with all
    the food and utensils you need to eat lunch anywhere, depending on what’s available
    around you. Similarly, containers package all the components an app needs, making
    it easy to run on different machines, whether on your laptop, in a company data
    center, or in the cloud. This portability helps developers deploy apps quickly
    and consistently across various environments.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 容器就像便携式箱子，包含了应用程序运行所需的一切，例如工具、设置和代码。想象一下，你有一个午餐盒，里面装满了你吃午餐所需的全部食物和餐具，无论你周围有什么。同样，容器打包了应用程序需要的所有组件，使其可以在不同的机器上运行，无论是在你的笔记本电脑上、公司的数据中心里还是在云中。这种便携性有助于开发者快速且一致地在各种环境中部署应用程序。
- en: Containers provide a flexible way to host Azure AI services on-premises or in
    Azure environments, enabling organizations to control sensitive data without sending
    it to the cloud. By using containers, businesses can deploy AI services closer
    to their data, improving performance and reducing latency. Containers bundle the
    necessary runtime components, making them portable across different systems, while
    maintaining isolation for multiple applications. Azure AI services containers,
    such as those for language detection or speech-to-text, are available in the Microsoft
    Container Registry and can be deployed in environments such as Docker, **Azure
    Container Instances** (**ACIs**), or **AKS**.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 容器提供了一种灵活的方式来在本地或Azure环境中托管Azure AI服务，使组织能够在不将敏感数据发送到云的情况下控制数据。通过使用容器，企业可以将AI服务部署得更靠近其数据，从而提高性能并减少延迟。容器捆绑了必要的运行时组件，使它们可以在不同的系统之间移动，同时为多个应用程序保持隔离。Azure
    AI服务容器，如语言检测或语音到文本的容器，可在Microsoft Container Registry中找到，并可在Docker、**Azure Container
    Instances**（**ACIs**）或**AKS**等环境中部署。
- en: These containers allow organizations to manage deployment configurations, security,
    and scalability while consuming AI services locally. Although usage metrics must
    be periodically sent to Azure for billing purposes, sensitive data stays within
    the organization’s infrastructure. Containers also offer benefits such as customizable
    authentication solutions and integration with network security, enhancing flexibility
    for various deployment needs. Specific images are available for tasks such as
    sentiment analysis, speech recognition, and OCR, each requiring setup with API
    keys and billing endpoints.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这些容器允许组织在本地使用AI服务的同时管理部署配置、安全和可伸缩性。尽管必须定期将使用指标发送到Azure进行计费，但敏感数据仍保留在组织的内部基础设施中。容器还提供了可定制的身份验证解决方案和网络安全的集成，增强了各种部署需求下的灵活性。针对情感分析、语音识别和OCR等任务的具体映像可用，每个都需要使用API密钥和计费端点进行设置。
- en: By deploying Azure AI services in containers, businesses can use Microsoft’s
    powerful AI capabilities with the added control and customization required for
    secure, efficient operations.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在容器中部署Azure AI服务，企业可以使用微软强大的AI能力，同时获得安全、高效运营所需的额外控制和定制。
- en: Now, let’s move on to a hands-on exercise to understand practically how Azure
    AI services containers work. This will allow you to see firsthand how to deploy
    and manage AI services within a containerized environment, providing valuable
    insights into how these services function behind the scenes.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进行一个动手练习，以实际了解Azure AI服务容器的工作原理。这将让您亲身体验如何在容器化环境中部署和管理AI服务，从而深入了解这些服务在幕后是如何运行的。
- en: 'Exercise 2: Using an Azure AI services container'
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习2：使用Azure AI服务容器
- en: 'This exercise highlights the flexibility of Azure AI services, where developers
    can benefit from Microsoft’s managed infrastructure but also have the option to
    host services in their own environment through containerization. Organizations
    can deploy Azure AI service containers locally or on platforms such as Docker,
    ACIs, or Kubernetes, providing more control over data, security, and deployment.
    Although the containerized services still connect to Azure for billing, data remains
    within the organization’s infrastructure, allowing custom configurations and increased
    autonomy. Let’s get started:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习突出了Azure AI服务的灵活性，开发者可以享受微软管理的基础设施带来的好处，同时也有选择在自己的环境中通过容器化托管服务的选项。组织可以在本地或Docker、ACI或Kubernetes等平台上部署Azure
    AI服务容器，从而在数据、安全和部署方面拥有更多控制权。尽管容器化服务仍然连接到Azure进行计费，但数据仍然保留在组织的内部基础设施中，允许自定义配置和增加自主权。让我们开始吧：
- en: Navigate to the `/``chapter-2/excercise2/` folder.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If you haven’t yet cloned the repository or provisioned the Azure AI services,
    please refer to *Exercise 1: Getting started with Azure AI Service* in [*Chapter
    2*](B31034_02.xhtml#_idTextAnchor033), specifically the *Cloning the GitHub repository*
    section, for detailed guidance. As previously mentioned, remember to have your
    endpoint and key ready, as they may be required here.'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Deploy and run a Text Analytics container.
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Many Azure AI service APIs are also available as container images. For a complete
    list, refer to the Azure AI services documentation. In this exercise, we’ll use
    the container image for the Text Analytics Language Detection API, but the same
    principles apply to all available images:'
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'In the Azure portal, create an ACI with the Text Analytics API container image
    from the following link: [https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-container-support#containers-in-azure-ai-services](https://learn.microsoft.com/en-us/azure/ai-services/cognitive-services-container-support#containers-in-azure-ai-services).
    Ensure settings such as API key and endpoint are properly configured.'
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter the basic information as shown in the following figure by navigating
    to [https://portal.azure.com/#create/Microsoft.ContainerInstances](https://portal.azure.com/#create/Microsoft.ContainerInstances):'
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 2.6 – Creating an ACI](img/B31034_02_006.jpg)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
- en: Figure 2.6 – Creating an ACI
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: 'Copy and paste the following image name into the **Image** field in the portal:
    [mcr.microsoft.com/azure-cognitive-services/textanalytics/language:latest](http://mcr.microsoft.com/azure-cognitive-services/textanalytics/language:latest).'
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Before we deploy our Azure AI services container, it’s important to set up the
    networking correctly so that we can access the service endpoint from outside the
    container. This step is crucial because ACIs need to expose the right ports and
    DNS configuration to allow communication between your local machine (or client
    application) and the containerized AI service.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In a typical cloud deployment, networking settings define how services talk
    to each other and to the outside world. When working with containers, especially
    in Azure, you need to explicitly define whether the container should be publicly
    accessible, what DNS label it will use, and which ports will be open for requests.
    In this case, our containerized AI service will listen on port 5000, and we’ll
    assign it a public DNS name so that we can easily test it using a tool such as
    curl or from our own applications.
  id: totrans-165
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Let’s walk through the networking setup so that your container is reachable
    and ready to process language detection requests.
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Networking type: Public'
  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'DNS name label: *Enter a unique name for the* *container endpoint*'
  id: totrans-168
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Ports: *Change the TCP port from 80* *to 5000*'
  id: totrans-169
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the **Advanced** tab, configure the following settings as shown below:'
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Restart policy: On failure'
  id: totrans-171
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Environment variables: ApiKey – Either key for your Azure AI services resource;
    Billing – The endpoint URI for your Azure AI services resource, as shown in *Figure
    2.7*:'
  id: totrans-172
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境变量：ApiKey – 您的Azure AI服务资源的密钥；Billing – 您的Azure AI服务资源的端点URI，如图*图2.7*所示：
- en: '![Figure 2.7 – Environment variables setting](img/B31034_02_007.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图2.7 – 环境变量设置](img/B31034_02_007.jpg)'
- en: Figure 2.7 – Environment variables setting
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.7 – 环境变量设置
- en: Once the ACI has been deployed, verify the status and note the public IP or
    FQDN for accessing the container.
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦ACI已部署，请验证其状态并记录用于访问容器的公共IP或FQDN。
- en: 'Alternatively, run the following command if there are any issues:'
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果出现任何问题，可以运行以下命令：
- en: '[PRE3]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The EULA is a crucial configuration setting required for the operation of Azure
    AI containers. Its primary purpose is to indicate that you have accepted the license
    terms for using the container. This acceptance is mandatory; without it, the container
    will not start.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: EULA是Azure AI容器操作所需的关键配置设置。其主要目的是表明您已接受使用容器的许可条款。这种接受是强制性的；如果没有它，容器将无法启动。
- en: Important note
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: In this exercise, you deployed the Azure AI services container image for text
    translation to an ACI. You can similarly deploy it to a Docker host by running
    a single command. Replace `<yourEndpoint>` and `<yourKey>` with your Azure AI
    resource details. If the image isn’t available locally, Docker will pull it from
    the registry. Once deployed, the container will run and listen for requests on
    port `5000`, allowing you to process language detection or translation requests
    locally.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，您已将Azure AI服务的文本翻译容器镜像部署到了ACI。您可以通过运行单个命令将其部署到Docker主机。用您的Azure AI资源详情替换`<yourEndpoint>`和`<yourKey>`。如果镜像在本地不可用，Docker将从注册表中拉取它。一旦部署，容器将在端口`5000`上运行并监听请求，允许您在本地处理语言检测或翻译请求。
- en: 'Interact with the container:'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与容器交互：
- en: 'Edit `rest-test.cmd` in your code to include the container’s IP address or
    FQDN that was extracted from the **Overview** page of the container instance:'
  id: totrans-182
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的代码中编辑`rest-test.cmd`，以包含从容器实例的**概述**页面提取的容器的IP地址或FQDN：
- en: '[PRE4]'
  id: totrans-183
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This exercise helps you gain practical knowledge of deploying and using Azure
    AI services in a containerized environment.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习帮助您获得在容器化环境中部署和使用Azure AI服务的实际知识。
- en: Summary
  id: totrans-185
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter, we explored various Azure studios designed to streamline the
    development and deployment of AI models. You were introduced to four major platforms:
    Azure AI Foundry, OpenAI Studio, Machine Learning Studio, and Copilot Studio,
    each tailored to different AI tasks, such as natural language processing, machine
    learning, and generative AI applications. We also touched upon the use of Visual
    Studio Code as an IDE for AI development. Understanding when and how to use these
    studios is crucial for optimizing your AI projects, as they provide specific features
    designed to enhance development, collaboration, and security within your AI workflows.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了各种旨在简化人工智能模型开发和部署的Azure工作室。您介绍了四个主要平台：Azure AI Foundry、OpenAI Studio、Machine
    Learning Studio和Copilot Studio，每个平台都针对不同的AI任务进行了定制，例如自然语言处理、机器学习以及生成式AI应用。我们还简要介绍了Visual
    Studio Code作为AI开发的IDE的使用。了解何时以及如何使用这些工作室对于优化您的AI项目至关重要，因为它们提供了旨在增强开发、协作和AI工作流中安全性的特定功能。
- en: We also discussed how CI/CD pipelines play a vital role in automating the life
    cycle of AI models—from building and testing to deployment. Additionally, the
    chapter covered container deployment strategies, offering flexibility for hosting
    Azure AI services both on-premises and in the cloud. These insights provide the
    foundation for building efficient, scalable, and secure AI solutions.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还讨论了CI/CD管道在自动化AI模型生命周期（从构建和测试到部署）中的关键作用。此外，本章涵盖了容器部署策略，为在本地和云中托管Azure AI服务提供了灵活性。这些见解为构建高效、可扩展且安全的AI解决方案奠定了基础。
- en: In the next chapter, we will focus on managing and monitoring Azure AI resources,
    where we’ll dive into topics such as diagnostic logging, cost management, and
    security features, which are crucial for maintaining robust and cost-effective
    AI solutions.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将专注于管理和监控Azure AI资源，我们将深入探讨诊断日志、成本管理和安全功能等主题，这些对于维护稳健且成本效益高的AI解决方案至关重要。
- en: Review questions
  id: totrans-189
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 复习问题
- en: 'Answer the following questions to test your knowledge of this chapter:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 回答以下问题以测试您对本章知识的掌握：
- en: Which of the following best describes the primary advantage of using AI Foundry
    in Azure AI development?
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪项最能描述在Azure AI开发中使用AI Foundry的主要优势？
- en: It is exclusively designed for training deep learning models
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它专门设计用于训练深度学习模型
- en: It is only intended for low-code AI development
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它仅适用于低代码AI开发
- en: It replaces the need for all other Azure AI services
  id: totrans-194
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它取代了所有其他Azure AI服务的需求
- en: It provides a unified platform to design, customize, and manage AI applications
    at scale
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它提供了一个统一的平台，用于设计、定制和管理大规模的AI应用程序
- en: '**Correct** **answer**: D'
  id: totrans-196
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：D'
- en: What is one of the benefits of deploying Azure AI services in containers?
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 部署Azure AI服务到容器中的一项好处是什么？
- en: Avoids the need for an Azure subscription
  id: totrans-198
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免了需要Azure订阅的需求
- en: Enables local data processing without sending data to the cloud
  id: totrans-199
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 允许在不将数据发送到云的情况下进行本地数据处理
- en: Simplifies payment for AI services
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化了AI服务的支付
- en: Requires less computational power
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要更少的计算能力
- en: '**Correct** **answer**: B'
  id: totrans-202
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：B'
- en: In the context of CI/CD for AI projects, which key component automates the retraining
    of models when new data becomes available, ensuring that models remain accurate
    and relevant in real-world scenarios?
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在AI项目的CI/CD的背景下，哪个关键组件在新的数据可用时自动重新训练模型，确保模型在现实世界场景中保持准确和相关性？
- en: '**Continuous** **training** (**CT**)'
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**持续** **训练** （**CT**）'
- en: Data and model management
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据和模型管理
- en: Resource and model drift management
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 资源和模型漂移管理
- en: Security and compliance
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全性和合规性
- en: '**Correct** **answer**: A'
  id: totrans-208
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：A'
- en: Which of the following configuration settings must be specified when deploying
    an Azure AI services container?
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 部署Azure AI服务容器时，必须指定以下哪些配置设置？
- en: Storage account name
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 存储账户名称
- en: Virtual machine size
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 虚拟机大小
- en: Subscription key and billing endpoint
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 订阅密钥和计费端点
- en: Database connection string
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据库连接字符串
- en: '**Correct** **answer**: C'
  id: totrans-214
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：C'
- en: Why is the EULA key value required when deploying Azure AI services containers?
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 部署Azure AI服务容器时，为什么需要EULA密钥值？
- en: To accept the terms and conditions for using the container image
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接受使用容器镜像的条款和条件
- en: To encrypt data stored in the container
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对容器中存储的数据进行加密
- en: To generate billing reports for Azure services
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成Azure服务的计费报告
- en: To specify the region for container deployment
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指定容器部署的区域
- en: '**Correct** **answer**: A'
  id: totrans-220
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**正确答案**：A'
