- en: Provisioning Azure AI services
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'When setting up Azure AI services, you have two primary options: create a multi-service
    account or provision an individual AI service. A **multi-service account** provides
    access to multiple Azure AI capabilities through a single endpoint and key, offering
    the convenience of managing various AI tools under one unified resource. Alternatively,
    if your project requires a specialized service—such as Document Intelligence—you
    can create a **dedicated resource** tailored to that specific functionality.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'In this exercise, we’ll create a multi-service Azure AI resource to take advantage
    of multiple capabilities. This same resource will be used consistently across
    all exercises throughout the book to streamline your learning experience:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Open the Azure portal and sign in.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the Azure portal, use the search bar at the top to search for *Azure AI
    services multi-service account*, then select it from the results. Alternatively,
    you can directly navigate to the creation page using this link: [https://portal.azure.com/#create/Microsoft.CognitiveServicesAllInOne.](https://portal.azure.com/#create/Microsoft.CognitiveServicesAllInOne.)'
  prefs:
  - PREF_IND
