- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: IoT End Devices, the Neuron Cells of an IoT System
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Just as neurons are the basic building blocks of the human neural system, the
    fundamental component in an IoT network is the IoT end device. These devices,
    like the sensing function of neural cells, are designed to monitor the surroundings,
    report changes, and perform actions.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you will learn about the crucial role of IoT end devices in
    IoT applications. These devices detect, capture, measure, and report the status
    or data changes of target objects to backend cloud platforms. They can also execute
    operations on these objects based on commands received from the backend.
  prefs: []
  type: TYPE_NORMAL
- en: To give you a comprehensive understanding of the functions and design of IoT
    end devices, we will discuss them from various perspectives. These include the
    common categories of IoT end device types, as well as their hardware architecture,
    MCUs, peripherals, input and output interfaces, and the sensors and actuators
    commonly used in IoT applications.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you will have a well-rounded understanding of the
    fundamental knowledge required for IoT end-device design. You will also be equipped
    with the necessary skills to create a hardware prototype that fits your specific
    use case requirements, enabling you to effectively implement your first IoT solutions.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Device types
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hardware architecture
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MCUs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Peripherals and interfaces
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sensors and actuators
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Device types
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A variety of IoT devices are available in the market. Categorizing them can
    be challenging due to their diverse functions and purposes. These devices are
    designed to support different application needs and requirements. This section
    aims to classify the devices based on popular distinctions, aiding beginners in
    developing a better understanding. Recognizing these distinctions is crucial when
    crafting your own IoT innovations, as these are pervasive and should not be overlooked.
  prefs: []
  type: TYPE_NORMAL
- en: Installing indoors versus outdoors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An IoT end device is installed either indoors or outdoors. Indoor installations
    include ones in homes, buildings, public facilities, and industrial factories.
    Outdoor installations encompass ones done in open fields on campuses, city open
    spaces, outskirts, rural farm fields, forests, mountains, and barren areas. The
    deployment location of IoT end devices should be chosen carefully based on their
    application. Factors such as chipset selection, mechanical enclosure design, operational
    temperature and humidity ranges, and device mount options need to be considered.
  prefs: []
  type: TYPE_NORMAL
- en: 'When installing IoT devices in residential spaces such as homes, apartments,
    hotels, and classrooms, which are called consumer-grade devices, you do not need
    a waterproof or strict dustproof design. A lightweight, durable plastic enclosure
    is usually enough. The devices can work in temperatures ranging from 0°C to 40°C
    (32°F to 104°F) and in humidity levels ranging from 5% to 95%. There are also
    other indoor environments such as offices or warehouses, where the devices are
    known as commercial-grade products. In these places, the devices need to work
    in temperatures ranging from -20°C to 70°C (-4°F to 158°F). You can install IoT
    devices indoors in three ways: on the wall, on the ceiling, or by sticking them
    up.'
  prefs: []
  type: TYPE_NORMAL
- en: When IoT devices are designed to be used outdoors, such as in open fields, downtown
    city streets, or rural areas, they are usually called **outdoor-grade devices**.
    The hardware design requirements for these devices are stricter compared to indoor
    devices. Outdoor devices must have a much wider operational temperature range
    compared to indoor devices, typically ranging from -40°C to +85°C (-40°F to 185°F).
  prefs: []
  type: TYPE_NORMAL
- en: To withstand tough outdoor conditions, outdoor devices must consider additional
    factors such as the **Ingress Protection Grade** (**IP grade**) for their enclosures.
  prefs: []
  type: TYPE_NORMAL
- en: '| Usually the IP grade complied by a product is described by two digits as
    the given condition. We will learn more about this in the following table.**First
    digit** | **Mechanical Protection** | **Second** **digit** | **Water** **ingress
    protection** |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | No protection | 0 | No protection |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Protected against solid objects over 50mm such as hands | 1 | Protected
    against vertically falling drops of water such as condensation |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Protected against solid objects over 12mm such as fingers | 2 | Protected
    against direct sprays of water up to 15° from the vertical direction. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Protected against solid objects over 2.5mm such as tools and wires |
    3 | Protected against direct sprays of water up to 60° from the vertical direction.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Protected against solid objects over 1mm such as wires, nails, and so
    on | 4 | Protected against water splashed from all directions, limited ingress
    permitted |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Protected against limited dust ingress, not harmful deposits | 5 | Protected
    against low-pressure jets of water from all directions, limited ingress permitted
    |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Completely protected against dust | 6 | Protected against strong jets
    of water such as on the deck of the ship, limited ingress permitted |'
  prefs: []
  type: TYPE_TB
- en: '| N/a | N/a | 7 | Protected against the effects of temporary immersion between
    15cm and 1m; the duration of the test is 30 minutes |'
  prefs: []
  type: TYPE_TB
- en: '| N/a | N/a | 8 | Protected against extended periods of immersion under pressure
    |'
  prefs: []
  type: TYPE_TB
- en: Table 3.1 – IP grade definitions
  prefs: []
  type: TYPE_NORMAL
- en: In certain open-field locations, such as high-altitude areas and coastal areas,
    UV resistance and anti-salt fog enclosures are also needed in addition to the
    IP grade.
  prefs: []
  type: TYPE_NORMAL
- en: These outdoor devices also offer diverse ways to be mounted, such as mounting
    on a lighting pole, attaching to a cable, mounting on a roof, or mounting on a
    tower. When installing these devices outside, it is important to remember that
    the mount options may need to have anti-gust capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Powering via external supply versus batteries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An IoT device can operate on either an external power supply or a battery, making
    it suitable for both indoor and outdoor usage. Devices such as surveillance cameras,
    wireless speakers, and street lightbulbs typically request high power consumption
    and are often powered externally. This power can be supplied through an AC/DC
    power adapter or converter.
  prefs: []
  type: TYPE_NORMAL
- en: While these devices are more complex and costly, they offer advantages such
    as continuous service, high reliability, and low latency. They also support **edge
    computing**, which demands more power due to its robust computing capability and
    quick memory access.
  prefs: []
  type: TYPE_NORMAL
- en: As power consumption is not a significant concern for devices with an external
    power supply, they can utilize high-speed wired connectivity (Ethernet, Coax Cable,
    or Fibers) or high-throughput wireless connectivity (Wi-Fi, LTE CAT-4 or above,
    or even 5G).
  prefs: []
  type: TYPE_NORMAL
- en: Battery-operated devices are rapidly expanding and offer significant benefits
    for their intended use. They are portable and can be moved around freely, making
    them ideal for IoT applications that can tolerate low data rates, service interruptions,
    and delays.
  prefs: []
  type: TYPE_NORMAL
- en: These devices typically feature MCUs and wireless modules that are designed
    for minimal power consumption. To conserve energy, they often switch between sleep
    mode and active mode in a strategy known as **service** **on-demand mode**.
  prefs: []
  type: TYPE_NORMAL
- en: The types of batteries used in these devices vary according to the device’s
    requirements. For instance, smart tags often use button batteries and smart home
    devices may use alkaline dry batteries, while outdoor devices typically use rechargeable
    lithium batteries or 18650 batteries.
  prefs: []
  type: TYPE_NORMAL
- en: Connected by wire versus wireless
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: IoT end devices need to connect to the cloud to send or receive data. This connection
    can either be wired or wireless. In industrial IoT devices, such as those used
    in manufacturing plants or utility facilities, traditional wire connectivity such
    as fiber, ethernet, RS232/485 twisted pairs, and power cables are still commonly
    used alongside wireless connections. On the other hand, IoT end devices for home,
    campus, building, city, and rural areas widely use wireless connectivity.
  prefs: []
  type: TYPE_NORMAL
- en: The choice between wire or wireless connectivity depends on the specific application
    requirements, including factors such as mobility, roaming, reliability, latency,
    scalability, throughput, and cost.
  prefs: []
  type: TYPE_NORMAL
- en: For applications that demand high reliability, low latency, high throughput,
    and fixed installations, ethernet or fiber connections are the most cost-effective.
    These provide a stable and secure connection, ensuring uninterrupted data transmission.
    If mobility and roaming are essential, several options are currently available
    such as LTE CAT-4 or above, 5G, or Wi-Fi 6/6E/7\. These technologies enable seamless
    mobility and uninterrupted service, making them suitable for applications such
    as AMRs, **Autonomous Guided Vehicles** (**AGVs**), and vehicle fleet management,
    where continuous communication is crucial.
  prefs: []
  type: TYPE_NORMAL
- en: However, if your applications do not mandate high reliability, low latency,
    and high throughput, but prioritize the total cost, massive scalability, and easy
    deployment, there are other options to consider. BLE, LoRaWAN, NB-IoT, **LTE CAT-M**
    (**LTE-M**), and **LTE CAT-1** are smart investments. These technologies offer
    low-cost solutions with wide coverage and low power consumption, making them suitable
    for applications where budget and scalability are the primary concerns. For example,
    BLE is widely equipped in smart home devices. LoRaWAN is popularly adopted for
    smart city applications. NB-IoT and LTE CAT-M are used for smart metering, and
    LTE CAT-1 is used for remote asset tracking.
  prefs: []
  type: TYPE_NORMAL
- en: The need for edge computing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some IoT applications require their IoT end devices to support edge computing
    locally, while others do not. Edge computing is a local source of processing and
    storage for the data and computing needs of IoT devices, such as filtering the
    expected data through specific conditions, encrypting raw data payloads, executing
    protocol translations, triggering a local execution policy, and raising a prompt
    alarm.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are several significant benefits that come from edge computing at IoT
    end devices, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reducing latency**: By utilizing edge computing capabilities, IoT devices
    can process and analyze data locally. This significantly reduces the latency of
    communication between devices and enables faster response times. Real-time data
    insights can be generated at the edge, leading to increased operational efficiency
    and improved decision-making.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Increasing operational efficiency**: Edge computing allows for localized
    data processing and analysis. This means that IoT devices can perform tasks such
    as filtering and aggregating data, executing protocols, and making rapid decisions
    without relying on a centralized network. As a result, operational efficiency
    is improved, as devices can autonomously perform actions and respond to events
    in real time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Saving network bandwidth**: By leveraging edge computing, IoT devices can
    offload some of the data processing tasks from the cloud. This reduces the amount
    of data that needs to be transmitted over the network, resulting in improved network
    bandwidth utilization. It also helps alleviate network congestion and ensures
    that critical data can be transmitted efficiently.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Continuing systems operation when offline**: One of the key advantages of
    edge computing is its ability to operate offline. In case of a network connection
    loss, IoT devices can still function and perform their designated tasks. This
    is particularly crucial in scenarios where uninterrupted operation is essential,
    such as in industrial environments or remote areas with limited connectivity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Edge computing requires powerful MCU, as well as larger memory and storage sizes
    to handle local computing tasks efficiently. This, in turn, leads to an increase
    in the cost of hardware and the complexity of software at IoT end devices.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to these four popular categories, there are many other criteria
    used to classify IoT devices within the market. Regardless of their category,
    the hardware architecture of IoT devices is typically similar, usually including
    an MCU, I/O interfaces, a sensor and/or actuator, a power supply, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: Hardware architecture
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The hardware architecture of IoT end devices is usually composed of a diverse
    array of components that work together seamlessly to enable their functionality.
    These components, such as MCUs, sensors, actuators, connectivity modules, and
    power management modules, collaborate to efficiently collect data from the objects
    that they are monitoring. They then process this captured data and transmit it
    to cloud platforms for in-depth analysis and informed decision-making. This collaborative
    effort ensures the smooth operation and effectiveness of IoT end devices throughout
    their life cycles.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following figure depicts the typical hardware architecture of an IoT device:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.1 – IoT device hardware architecture](img/B22002_03_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.1 – IoT device hardware architecture
  prefs: []
  type: TYPE_NORMAL
- en: 'These components include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**MCUs**: MCUs act as the *brain* of the IoT device, orchestrating operations,
    processing data, and managing communication with peripherals and external networks.
    The integration of core processors, memory, I/O interfaces, and real-time clocks
    enables sophisticated computational capabilities and real-time operations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sensors and actuators**: Sensors serve as the device’s senses, collecting
    environmental data or monitoring various parameters. This data becomes the foundation
    for decision-making and actions taken by the device. Actuators act upon the environment
    or the device itself based on processed data or commands received, creating a
    tangible output or change in the system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Connectivity module**: This module provides the necessary interface for data
    exchange between the IoT device and external networks, including cloud platforms.
    It supports a wide range of communication protocols and technologies, ranging
    from local networks (for example, BLE, ZigBee, and Wi-Fi) to wide-area networks
    (for example, 4G/LTE, 5G, and LoRaWAN), ensuring flexibility and scalability in
    deployment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Power management module**: This module ensures the efficient and reliable
    supply of power to the device, which is crucial for sustained operation, especially
    in remote or inaccessible locations. It incorporates features to optimize energy
    consumption. This is crucial for battery-operated devices, prolonging their operational
    lifespan and reducing maintenance needs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**External flash memory**: This provides additional storage capacity for program
    code, data logs, and configuration settings, enabling more complex applications
    and data retention. It enhances the device’s capability to handle extensive data
    processing and logging, as well as to retain critical information during power
    cycles.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The effective combination of these components enables IoT devices to perform
    their tasks efficiently and effortlessly. In unison, they equip the device with
    the ability to collect, react, process, and communicate. This proves beneficial
    in various sectors such as smart homes, industrial automation, healthcare, and
    agriculture, fostering a more connected and intelligent environment.
  prefs: []
  type: TYPE_NORMAL
- en: By understanding the roles and significance of each component, developers and
    engineers can design IoT devices that function effectively, conserve energy, and
    cater to specific requirements and constraints. The upcoming section will provide
    additional details about the MCU, its peripherals and I/O interfaces, sensors,
    and actuators. [*Chapter 4*](B22002_04.xhtml#_idTextAnchor111) will specifically
    focus on the wireless connectivity utilized by IoT end devices.
  prefs: []
  type: TYPE_NORMAL
- en: MCUs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: An MCU is the foundation of embedded systems. These compact yet potent devices
    combine core processors, built-in memory, and a vast range of peripherals into
    one chip. This combination leads to highly efficient power usage, space-saving,
    and cost-effectiveness, all while maintaining robust processing capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Roles
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In embedded systems, the MCU serves as the central processing unit. It is responsible
    for executing and controlling a diverse array of tasks and functions. With its
    prowess in handling complex algorithms and interfacing with various external components,
    the MCU forms the backbone of the system, facilitating seamless communication
    and coordination among different hardware and software components. It is this
    orchestration that enhances the system’s overall functionality and reliability,
    making the MCU an indispensable component in a myriad of electronic devices and
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: Key features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: MCUs are characterized by their purpose-driven design, offering ease of programming
    and customization to meet the specific demands of varying applications and projects.
    This versatility allows developers to tailor the MCU’s behavior, optimizing its
    functionality and performance. For instance, MCUs crafted for IoT applications
    are celebrated for their low power consumption, an essential feature for battery-dependent
    or energy-sensitive applications. Moreover, the integration of multiple components
    into a single chip underscores the MCU’s popularity in the embedded systems domain.
  prefs: []
  type: TYPE_NORMAL
- en: Critical components
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: MCU usually includes multiple key components like processor, memory, peripherals,
    interfaces, etc. The upcoming sections will cover information about these.
  prefs: []
  type: TYPE_NORMAL
- en: Core processor
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Architecture**: Including ARM, AVR, MIPS, and RISC-V, each offering unique
    strengths'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Processing clock speed**: Measured in MHz or GHz, this determines the rate
    at which instructions are executed'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Built-in memory
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Random Access Memory** (**RAM**): For transient data storage during operations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Read-Only Memory** (**ROM**): Houses the bootloader and permanent software'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Peripherals and interfaces
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**General Purpose Input/Output** (**GPIO**) : Programmable pins for interfacing
    with sensors, actuators, LEDs, and so on'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Specialized I/O**: Provides input and output interfaces such as **Universal
    Asynchronous Receiver/Transmitter** (**UART**) for serial communication, **Serial
    Peripheral Interface** (**SPI**), and **Inter-Integrated Circuit** (**I2C**) for
    interfacing with other chips'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pulse Width Modulation** (**PWM**): Utilized in controlling motors, LEDs,
    and so on'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connectivity module
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Wire**: Includes Ethernet, **Universal Serial Bus** (**USB**) , RS232/485,
    and so on'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Wireless**: Spans Wi-Fi, BLE, ZigBee, Thread, LoRaWAN, 4G/LTE and 5G, and
    so on'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power management
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Voltage range**: Dictates the required power supply'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Low power modes**: Critical for conserving energy in battery-powered devices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Embedded operating system
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Real-Time Operating System** (**RTOS**): Supports complex demands requiring
    structured task management; examples include FreeRTOS, Azure RTOS, VxWorks, Zephyr,
    and so on'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bare-metal OS**: Enables direct control over the hardware for simpler systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Off-the-shelf MCU
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The following list contains the popular semi-conductor vendors’ commodity MCU
    products that are widely adopted for building IoT end devices. These products
    offer a wide range of features and capabilities, making them ideal choices for
    developers and engineers in the IoT industry. Let us take a closer look at each
    of these MCU series:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Microchip Technology PIC series**: Known for their reliability and versatility,
    the PIC series from Microchip Technology is a popular choice among IoT device
    builders.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**STMicroelectronics STM32 series**: The STM32 series from STMicroelectronics
    is highly regarded for its performance and power efficiency, making it a preferred
    option for IoT applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Texas Instruments C2000/C3000 series**: Texas Instruments’ C2000/C3000 series
    of MCUs are known for their real-time control capabilities, making them suitable
    for a wide range of IoT projects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nordic nRF51/nRF52 series**: The nRF51/nRF52 series from Nordic Semiconductor
    offers excellent wireless connectivity options, making it a top choice for IoT
    devices that require reliable communication.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Silicon Labs’ EFM32 Gecko series**: The EFM32 Gecko series from Silicon Labs
    is known for its low power consumption and energy efficiency, making it ideal
    for battery-powered IoT devices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Particle Photon series**: The Particle Photon series is a popular choice
    among IoT developers due to its simplicity and ease of use, offering seamless
    cloud connectivity for IoT applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These MCU series provide a solid foundation for building IoT end devices, enabling
    developers to create innovative and efficient solutions for the rapidly growing
    IoT market.
  prefs: []
  type: TYPE_NORMAL
- en: DIY-friendly MCU
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For beginners embarking on their first IoT project, it is highly recommended
    to explore the DIY-friendly MCU options provided by Raspberry Pi, Arduino Families,
    and ESP8266/ESP32.
  prefs: []
  type: TYPE_NORMAL
- en: These platforms offer a range of user-friendly features and robust ecosystems,
    making them ideal for beginners to immerse themselves in the exciting world of
    IoT. Raspberry Pi Pico boasts a compact size and powerful performance. Arduino
    Families provides a wealth of options, as well as intuitive interfaces and a large
    community of ecosystem developers. ESP8266/ESP32, built on RISC-V architecture,
    enables beginners to explore various aspects of IoT development.
  prefs: []
  type: TYPE_NORMAL
- en: Raspberry Pi
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Raspberry Pi is a popular open source hardware family that is widely used in
    a variety of IoT engineering projects. Its versatility, affordability, powerful
    processing capabilities, and extensive connectivity options make it a top choice
    for hobbyists, students, and professionals. Raspberry Pi has revolutionized the
    world of DIY electronics, enabling the creation of home automation systems, robotics
    projects, and more. No matter your level of experience, Raspberry Pi provides
    an accessible platform to explore electronics and programming.
  prefs: []
  type: TYPE_NORMAL
- en: The following figure depicts the product series in its family.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.2 – The Raspberry Pi family](img/B22002_03_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.2 – The Raspberry Pi family
  prefs: []
  type: TYPE_NORMAL
- en: 'These series are designed to meet diverse needs and project scales:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Raspberry Pi 5**: This is the latest iteration in the Raspberry Pi series
    of single-board computers (quad-core ARM Cortex-A76 processor), designed for both
    educational and practical applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Raspberry Pi 4 Model B**: This is equipped with a Quad-core ARM Cortex-A72
    processor, known for its balance of performance, connectivity, and affordability.
    It is ideal for those needing a full-featured computer for coding, content creation,
    or general use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Raspberry Pi Zero**: This has a a single-core ARM11 processor (BCM2835) embedded.
    It prioritizes compactness and efficiency. It is perfect for space-constrained
    projects and applications where minimal power consumption is important.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Raspberry Pi Pico**: This was built ona Dual-core ARM Cortex-M0+ processor,
    offering a cost-effective solution for embedded systems, IoT devices, and prototyping.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Raspberry Pi Pico W**: This introduces Wi-Fi and BLE connectivity on Pico.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can find more details at [https://www.raspberrypi.com/](https://www.raspberrypi.com/).
  prefs: []
  type: TYPE_NORMAL
- en: Arduino
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Arduino is a widely embraced open source hardware platform that is popular for
    IoT end-device development. Arduino has changed and grown over time, resulting
    in diverse types such as Classic, Nano, MKR, and Mega. Each type has its own specific
    features. Because of this, Arduino is now a flexible and powerful platform for
    IoT development and more. Whether you are new or experienced, there is bound to
    be an Arduino board that fits your needs and helps you bring your ideas to life.
  prefs: []
  type: TYPE_NORMAL
- en: The following figure depicts the product series in its family.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.3 – The Arduino family](img/B22002_03_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.3 – The Arduino family
  prefs: []
  type: TYPE_NORMAL
- en: 'These series are designed to accommodate diverse needs and various project
    scales:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The Arduino Classic family**: This includes the popular Arduino UNO with
    the ATmega328P core processor (Single-core 8-bit AVR), as well as other classic
    models such as the Leonardo & Micro. It is the base option of the Arduino project.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The Arduino Mega family**: This is a series of boards designed for projects
    that require significant computing power and many GPIO pins. The Arduino Mega
    2560 model is equipped with the ATmega2560 core processor, an 8-bit AVR, while
    the Arduino Due is built with the Atmel SAM3X8E ARM Cortex-M3 CPU, a 32-bit ARM
    Cortex.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The Arduino Nano family**: This is a collection of small boards suitable
    for IoT projects. The family includes the basic Nano (ATmega328P, 8-bit AVR),
    Nano Every (ATmega4809, 8-bit AVR), Nano 33 IoT (32-bit ARM Cortex), Nano 33 BLE,
    Nano 33 BLE Sense (32-bit ARM Cortex), and Nano RP2040 (Dual-core ARM Cortex M0+).
    These boards have Bluetooth and Wi-Fi modules, as well as built-in sensors such
    as temperature, humidity, pressure, gesture, and microphone sensors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Arduino MKR Family**: This is a series of boards, shields, and carriers that
    can be combined to create amazing projects without the need for additional circuitry.
    Each board is equipped with a radio module (except for MKR Zero) that enables
    Wi-Fi, Bluetooth, LoRa, SigFox, and NB-IoT communication. All boards in the MKR
    family are based on the 32-bit ARM Cortex-M0+, a low-power processor, and come
    with a crypto chip for secure communication.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can find more details at [https://www.arduino.cc/en/hardware](https://www.arduino.cc/en/hardware).
  prefs: []
  type: TYPE_NORMAL
- en: ESP8266 and ESP32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ESP8266 and ESP32 MCUs are popular MCUs based on the RISC-V architecture. They
    are known for their versatility, reliability, and wide range of features. These
    MCUs have gained significant attention and adoption in industries such as IoT,
    home automation, and robotics.
  prefs: []
  type: TYPE_NORMAL
- en: '**Reduced Instruction Set Computer-V** (**RISC-V**) is an open source **Instruction
    Set Architecture** (**ISA**) that is becoming increasingly popular in computer
    architecture. It offers a simple and modular design, which makes it easier to
    understand and implement compared to other complex architectures. Being open source,
    RISC-V provides greater flexibility and customization options, allowing developers
    to adapt the architecture to their specific needs.'
  prefs: []
  type: TYPE_NORMAL
- en: ESP8266 and ESP32 are Espressif products. You can find more details at [https://www.espressif.com/en/products/modules](https://www.espressif.com/en/products/modules).
    The following figure shows ESP8266 and ESP32 products.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.4 – The ESP8266 and ESP32 families](img/B22002_03_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.4 – The ESP8266 and ESP32 families
  prefs: []
  type: TYPE_NORMAL
- en: 'ESP8266 and ESP32 are designed to meet various needs and accommodate projects
    of different scales:'
  prefs: []
  type: TYPE_NORMAL
- en: '**ESP8266**: This product, which was introduced in 2014, brought about a momentous
    change in the world of MCU. It made Wi-Fi connectivity affordable and accessible,
    allowing developers to easily connect their devices to the internet. The ESP8266
    quickly gained popularity and became a top choice for many IoT projects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ESP32**: This product was released in 2016\. Built upon the success of the
    ESP8266, it took the capabilities of its predecessor to the next level, offering
    not only Wi-Fi connectivity but also Bluetooth, dual-core processing, and more
    GPIO pins. The ESP32 revolutionized the industry, empowering developers to create
    even more advanced and feature-rich IoT applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Developers can use the ESP8266 and ESP32 series to access a variety of development
    tools, libraries, and resources. The Espressif development ecosystem offers detailed
    documentation, sample codes, and tutorials to help developers get started and
    create their projects. They can also use Arduino IDE and Microsoft Visual Studio
    Code IDE with the PlatformIO extension for development tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a comparison table outlining the key specifications of the ESP32 and
    its variants:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Specification** | **ESP32** | **ESP32-S2** | **ESP32-S3** | **ESP32-C3**
    | **ESP32-C6** | **ESP32-H2** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| **Launch date** | 2016 | 2019 | 2020 | 2020 | 2023 | 2023 |'
  prefs: []
  type: TYPE_TB
- en: '| **Processor** | Dual-core 32-bit Xtensa LX6 | Single-core 32-bit Xtensa LX7
    | Dual-core 32-bit Xtensa LX7 | Single-core RISC-V 32-bit | Single-core RISC-V
    32-bit | Single-core RISC-V 32-bit |'
  prefs: []
  type: TYPE_TB
- en: '| **CPU frequency** | 240 MHz | 240 MHz | 240 MHz | 160 MHz | 160 MHz | 96
    MHz |'
  prefs: []
  type: TYPE_TB
- en: '| **Wi-Fi, 2.4GHz** | Wi-Fi 4 (802.11 b/g/n) | Wi-Fi 4 (802.11 b/g/n) | Wi-Fi
    4 (802.11 b/g/n) | Wi-Fi 4 (802.11 b/g/n) | Wi-Fi 6 (802.11 ax) | Not supported
    |'
  prefs: []
  type: TYPE_TB
- en: '| **Bluetooth** | Bluetooth 4.2 (LE) | Not Supported | Bluetooth 5.2 (LE),
    Bluetooth Mesh | Bluetooth 5.2 (LE), Bluetooth Mesh | Bluetooth 5.3 (LE), Bluetooth
    Mesh | Bluetooth 5.3 (LE), Bluetooth Mesh |'
  prefs: []
  type: TYPE_TB
- en: '| **802.15.4** | None | None | None | None | ZigBee 3.0, Thread 1.3 | ZigBee
    3.0, Thread 1.3 |'
  prefs: []
  type: TYPE_TB
- en: '| **On-chip RAM** | 520 KB | 320 KB | 512 KB | 400 KB | 512 KB | 320 KB |'
  prefs: []
  type: TYPE_TB
- en: '| **On-chip ROM** | 448KB | 128KB | 384 KB | 384 KB | 320 KB | 128 KB |'
  prefs: []
  type: TYPE_TB
- en: '| **Programmable** **GPIO pins** | 34 | 43 | 38 | 22 | 22 | 19 |'
  prefs: []
  type: TYPE_TB
- en: '| **SPI** | 4 | 4 | 4 | 3 | 2 | 3 |'
  prefs: []
  type: TYPE_TB
- en: '| **UART interface** | 3 | 2 | 3 | 2 | 2 | 2 |'
  prefs: []
  type: TYPE_TB
- en: '| **I2C interface** | 2 | 2 | 2 | 1 | 1 | 2 |'
  prefs: []
  type: TYPE_TB
- en: '| **I2S interface** | 2 | 1 | 2 | 1 | 1 | 2 |'
  prefs: []
  type: TYPE_TB
- en: '| **Analog-to-Digital Converter** (**ADC**) **channel** | 18 | 20 | 20 | 5
    | 7 | 5 |'
  prefs: []
  type: TYPE_TB
- en: '| **Built-in temperature** **sensor** | 1 | 1 | 1 | 1 | 1 | 1 |'
  prefs: []
  type: TYPE_TB
- en: Table 3.2 – The key specifications of the ESP32 series
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Please note that we will use the ESP32-C3 in the practice sessions starting
    from [*Chapter 11*](B22002_11.xhtml#_idTextAnchor302).
  prefs: []
  type: TYPE_NORMAL
- en: An MCU combines core processors with various peripherals and interfaces into
    a single module. The next section will discuss the common peripherals and interfaces
    typically found inside MCUs.
  prefs: []
  type: TYPE_NORMAL
- en: Peripherals and interfaces
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: MCU features various peripherals and interfaces, including GPIO, SPI, I2C, UART,
    USB, **Secure Digital Input Output** (**SDIO**), ADC, **Digital-to-Analog Converter**
    (**DAC**), PWM, and **Joint Test Action Group** (**JTAG**), among others.
  prefs: []
  type: TYPE_NORMAL
- en: GPIO
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '`ON` and `OFF` signals from switches, or digital readings from sensors, and
    transmit them to the MCU. Conversely, when configured as an output port, it can
    execute external operations according to MCU instructions. For example, it can
    blink an LED or generate drive signals for a motor.'
  prefs: []
  type: TYPE_NORMAL
- en: GPIO pins are commonly used to connect sensors and actuators.
  prefs: []
  type: TYPE_NORMAL
- en: SPI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**SPI** port is a widely used synchronous serial communication bus specifically
    designed for point-to-point, short-distance, and high-data-rate communication,
    particularly within embedded systems. Its main function is to facilitate data
    transfer between an MCU and peripheral devices, such as **Secure Digital** (**SD**)
    cards, LCD displays, sensors, and other peripherals.'
  prefs: []
  type: TYPE_NORMAL
- en: 'SPI port typically uses four wires for data communication. These wires are
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Serial Clock** (**SCLK**): This is the clock signal provided by the master
    device. It synchronizes the data transmission between the master and slave devices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Master Out Slave In** (**MOSI**): This is the data line used for sending
    data from the master to the slave device.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Master in Slave Out** (**MISO**): This is the data line for sending data
    from the slave back to the master.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Slave Select** (**SS**): This is a control line used by the master to select
    and control individual slave devices. When multiple slave devices are connected
    to an SPI bus, each one will have its own SS line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I2C
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**I2C** is a widely used communication bus in the field of electronics. It
    is a multi-master, multi-slave, packet-switched, single-ended, and serial communication
    bus. The I2C bus is primarily designed for connecting low-speed devices such as
    EEPROMs, sensors, and other MCUs. It provides a simple and efficient way for these
    devices to communicate with each other.'
  prefs: []
  type: TYPE_NORMAL
- en: The I2C bus allows multiple devices to be connected, with each device having
    a unique address. This enables easy integration and communication between different
    components in a system. The bus operates in a master-slave configuration, where
    the master device initiates communication and controls the data transfer between
    the devices.
  prefs: []
  type: TYPE_NORMAL
- en: 'I2C port typically uses two wires for data communication. These two wires are
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Serial Data Line** (**SDA**): This is used for transferring data between
    the devices on the I2C bus.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Serial Clock Line** (**SCL**): This is the clock signal used to synchronize
    data transfer between devices on the I2C bus.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: UART
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**UART** is a hardware component that facilitates asynchronous serial communication.
    Asynchronous communication is not synchronized between parties. This means that
    the sender does not have to wait for the receiver or a broker to determine when
    to send or not to send.'
  prefs: []
  type: TYPE_NORMAL
- en: UART is commonly used for communication between a PC and MCU. It is also utilized
    in RF wireless communication, sensors (such as GPS sensors), and old dial-up modems.
  prefs: []
  type: TYPE_NORMAL
- en: 'UART port typically requires a minimum of two wires for basic communication.
    These two wires are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Transmit** (**TX**): This wire is used for transmitting data from the MCU
    to another device.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Receive** (**RX**): This wire is used for receiving data from another device
    to the MCU.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For basic UART communication, only these two wires are essential. However,
    in more complex or specific applications, additional wires might be used for hardware
    flow control or signaling purposes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Clear to Send** (**CTS**): Used for flow control, indicating that the MCU
    is ready to receive data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Request to Send** (**RTS**): Also used for flow control, indicating that
    the MCU wants to send data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ground** (**GND**): A common ground connection is also typically necessary
    between communicating devices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In a simple UART setup, particularly in basic point-to-point communication scenarios,
    just the TX and RX lines, along with a common ground, are sufficient.
  prefs: []
  type: TYPE_NORMAL
- en: USB
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **USB** port is a widely used interface that facilitates data transfer and
    power supply between computers and electronic devices. It serves multiple purposes,
    including programming the MCU, enabling serial communication, and connecting peripherals
    such as keyboards and mice. The USB port provides a convenient and reliable method
    for establishing a connection between a computer and various electronic devices,
    enhancing their functionality, and enabling seamless data exchange.
  prefs: []
  type: TYPE_NORMAL
- en: SDIO
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**SDIO** is an interface used in MCU and other devices for communication with
    SD cards and other types of IO devices. It is an extension of the standard SD
    card protocol, allowing devices to not only transfer storage data but also use
    peripheral functions such as Bluetooth, GPS, and others.'
  prefs: []
  type: TYPE_NORMAL
- en: ADCs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**ADCs** are electronic devices that play a crucial role in converting analog
    signals, such as those generated by temperature sensors, into digital values that
    can be processed by the MCU.'
  prefs: []
  type: TYPE_NORMAL
- en: By doing so, ADC enables the MCU to accurately interpret and utilize the information
    provided by various analog sensors, including but not limited to thermistors and
    potentiometers. These sensors, with their ability to measure temperature and provide
    variable resistance, respectively, are widely used in a variety of applications,
    ranging from industrial control systems to consumer electronics. The conversion
    process carried out by ADC ensures that the MCU can effectively analyze and respond
    to these analog inputs, enabling precise and reliable measurements, control, and
    decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: DACs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**DACs** are electronic devices that are used to convert digital values from
    the MCU into analog signals. This conversion process is essential for various
    applications, including generating **Analog Outputs** (**AOs**) for audio and
    creating smooth waveforms.'
  prefs: []
  type: TYPE_NORMAL
- en: By utilizing DACs, the digital information stored in the MCU can be transformed
    into continuous and varying analog signals. This enables the accurate representation
    of audio signals, allowing MCUs to produce high-quality sound outputs. Additionally,
    DACs play a crucial role in synthesizers, music production, and other audio-related
    fields.
  prefs: []
  type: TYPE_NORMAL
- en: PWM outputs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**PWM outputs** are a versatile feature that allows for the generation of a
    digital signal with varying pulse width, which effectively simulates an analog
    signal. This functionality opens up a wide range of possibilities for controlling
    various components and devices.'
  prefs: []
  type: TYPE_NORMAL
- en: One of the key applications of PWM outputs is in controlling the speed of motors.
    By adjusting the pulse width of the digital signal, the rotational speed of motors
    can be finely tuned, providing precise control over their movements.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, PWM outputs are commonly used in driving servo motors. By varying
    the pulse width of the digital signal, the angular position of the servo motor’s
    shaft can be accurately controlled, enabling precise positioning in robotics and
    automation systems.
  prefs: []
  type: TYPE_NORMAL
- en: JTAG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: JTAG is a standardized interface for debugging and testing **Integrated Circuits**
    (**ICs**), including MCUs such as the ESP32\. It was originally designed for testing
    printed circuit boards but has since evolved into a widely used tool for in-circuit
    debugging.
  prefs: []
  type: TYPE_NORMAL
- en: Timers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Timers are an essential tool for keeping track of time. They operate by maintaining
    a counter that incrementally advances at a predetermined rate. This functionality
    can be utilized for various purposes, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Monitoring the duration of events or processes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Scheduling and coordinating tasks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implementing time-based actions or triggers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Measuring intervals or time lapses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating countdowns or alarms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Real-time clock
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Real-Time Clock** (**RTC**) is a peripheral component that is designed to
    operate continuously, even during low-power sleep modes, to accurately keep track
    of time.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The RTC provides two essential timing functions: the RTC and the **Periodic
    Interrupt Timer** (**PIT**). The RTC keeps track of the current time and date,
    while the PIT allows the device to be woken up from sleep modes or interrupted
    at regular intervals. With these functions, the RTC not only ensures accurate
    timekeeping but also enables the device to effectively manage power consumption
    and perform tasks at specific time intervals.'
  prefs: []
  type: TYPE_NORMAL
- en: These peripherals and interfaces, which include a diverse range of devices and
    software, are actively engaged in the interaction with various sensors and actuators.
    This interaction facilitates the collection of a wide array of data, from environmental
    factors to user inputs. Furthermore, it also enables the execution of specific
    actions based on this data. This sophisticated interplay between peripherals,
    interfaces, sensors, and actuators forms the foundation of our data-driven world,
    allowing for enhanced automation and decision-making capacities. Now, let’s look
    at another important topic.
  prefs: []
  type: TYPE_NORMAL
- en: Sensors and actuators
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the vast landscape of IoT, end devices are equipped with an array of sensors
    and actuators, forming the cornerstone for dynamic interaction with the physical
    world. These components not only perceive the nuances of their environment but
    also act upon it, paving the way for intelligent and responsive IoT applications.
  prefs: []
  type: TYPE_NORMAL
- en: Sensors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sensors in IoT devices are used to capture and send environmental data to the
    MCU. They can detect various parameters, such as temperature, humidity, light,
    and motion. Sensors provide valuable information about the environment, helping
    with decision-making and adaptive actions.
  prefs: []
  type: TYPE_NORMAL
- en: Many sensors used in IoT devices are **Micro-Electro-Mechanical Systems** (**MEMS**)
    devices. MEMS technology, which enables the miniaturization of mechanical and
    electro-mechanical elements to a small size, has had a significant impact on sensor
    technology. By combining mechanical and electro-mechanical elements with electronic
    components on a silicon substrate, MEMS sensors offer many advantages. These sensors
    are widely used in IoT devices and consumer electronics because they are small,
    consume little power, and have excellent performance. As a result, MEMS technology
    has revolutionized sensor technology, allowing for the development of smaller,
    more efficient, and higher-performance devices in the field of IoT and consumer
    electronics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples of sensors:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Temperature sensor**: Measures ambient temperature, with variants such as
    thermistors and thermocouples providing precision'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Humidity sensor**: Gauges moisture content; vital for climate control systems'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pressure sensor**: Monitors atmospheric or water pressure; essential in weather
    forecasting and industrial applications'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Proximity sensor**: Detects nearby objects sans physical contact using ultrasonic
    or infrared technologies'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Light sensor**: Measures luminosity, employing photodiodes or LDRs to adapt
    lighting or monitor environmental conditions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Motion and occupancy sensor**: Detects movement, leveraging technologies
    such as PIR for security and automation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gas sensor**: Identifies various gases; crucial for safety and environmental
    monitoring'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Air quality sensor**: Gauges air pollutants; vital for health and environmental
    quality assessments'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sound sensor**: Monitors acoustic levels, employing microphones or piezoelectric
    sensors for noise measurement or user interaction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Water quality sensor**: Assesses water parameters; pivotal in ensuring water
    safety and quality'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gyroscopes and accelerometers**: Track orientation and motion; integral in
    navigation and motion-sensitive devices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Heart rate sensor**: Monitors cardiac rhythms; essential in health and fitness
    devices'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Actuators
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Conversely, actuators translate the digital data gleaned from sensors into tangible
    actions. They are the muscles of IoT devices, enabling them to exert a physical
    influence on their surroundings. Whether by modulating light intensity, regulating
    a motor’s speed, or actuating valves, actuators respond to sensor inputs or remote
    commands, fostering a responsive and adaptive environment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples of actuators:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Motors (DC, Stepper, Servo)**: Drive mechanical systems, facilitating motion
    and precise control'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Relays**: Serve as electrically operated switches, managing larger loads,
    commonly in home automation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Solenoids**: Electromagnetic actuators, employed in locking systems and fluid
    control'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LEDs and displays**: Provide visual feedback or interfaces; used as status
    indicators or information displays'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Buzzers and speakers**: Generate audio signals for alerts or user interaction;
    integral in alarm systems'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Heaters and coolers**: Manage temperature for comfort or equipment safety'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pumps**: Propel liquids; utilized in applications such as automated irrigation
    or smart aquariums'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Servo mechanisms**: Offer meticulous control over position; essential in
    robotics and precision applications'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common pins on sensors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Integrating sensors with MCUs involves interfacing through various pins, each
    serving a specific function. Proper understanding and connection of these pins
    is vital for accurate data collection and device performance. Common pin definitions
    include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Voltage Common Collector** (**VCC**): This pin is used to supply power to
    the sensor. It is usually connected to the power source and its voltage level
    must match the sensor’s requirements (commonly 3.3V or 5V).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GND**: The ground pin provides a common reference point for the power supply
    and signal levels. It is essential for completing the circuit and stabilizing
    the sensor’s operation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Pin** (**DATA**): This pin transmits the sensor’s data to the MCU. The
    nature of data transmission can vary – it might be analog or digital and the protocol
    can be I2C, SPI, UART, or a proprietary one.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SCL and SDA**: These pins are specifically used in I2C communication. SCL
    carries the clock signal and SDA carries the data. Both lines are bidirectional,
    allowing multiple sensors to be connected to the same bus.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MISO, MOSI, and SCK**: Used in SPI communication, these pins facilitate full-duplex
    data transfer. SCK is the clock line, MOSI sends data from the MCU to the sensor,
    and MISO sends data from the sensor to the MCU.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**TX and RX**: In UART communication, TX and RX are used for serial data transfer.
    The TX of the MCU connects to the RX of the sensor and vice versa.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AO** and **Digital Output** (**DO**): Some sensors offer both analog and
    digital outputs. AO provides a variable voltage level proportional to the measured
    parameter, while DO provides a binary output, indicating whether the parameter
    is above or below a certain threshold.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**INT** (**Interrupt**): The interrupt pin allows the sensor to notify the
    MCU of certain events (such as threshold crossing or data readiness) without the
    need for continuous polling.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As an example, let us look at the DHT11 temperature and humidity sensor pinout.
    A commonly used temperature and humidity sensor, it typically has the following
    pins:'
  prefs: []
  type: TYPE_NORMAL
- en: '**VCC**: Power supply (between 3.3 and 5V)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DATA**: Outputs both temperature and humidity data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GND**: Ground'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the DHT11, a single DATA transmits both temperature and humidity readings
    in a serial digital form. It supports a one-wire protocol that uses a timing-based
    communication scheme. The MCU must use specific timing to read this data correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding sensor specifications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Datasheets are a valuable resource for understanding what sensors and actuators
    can do and what their limitations are. They might seem overwhelming at first,
    but learning how to find useful information in datasheets is an important skill.
    Many sensor and actuator modules are designed to work easily with popular development
    boards such as Arduino, Raspberry Pi, and ESP8266/ESP32\. These modules often
    come with libraries and sample code that can help beginners get started quickly.
    Some sensors might require calibration to make sure that they give accurate readings.
    Make sure that you know how to calibrate your sensors and do it in the same environment
    where you will use the sensor.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following list contains general advice for beginners to understand sensor
    specifications before building their innovation prototype:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sensitivity**: This indicates how much the sensor’s output changes when the
    measured quantity changes. A more sensitive sensor can detect smaller changes
    in the measured parameter. For example, a high-sensitivity grade temperature sensor
    can accurately detect even a slight change in temperature, making it ideal for
    applications where precise temperature monitoring is required.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Range**: The range of a sensor refers to the minimum and maximum values of
    the measured parameter that the sensor can accurately detect. For instance, a
    pressure sensor with a wide range can accurately measure both low and high pressures,
    making it suitable for various industrial applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resolution**: This defines the smallest change in the measured quantity that
    the sensor can detect. A sensor with a higher resolution can detect smaller changes.
    For instance, a high-resolution pH sensor can detect subtle changes in acidity
    levels, making it beneficial for precise pH monitoring in scientific experiments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Accuracy**: This refers to how close the sensor’s readings are to the actual
    value. It is important to consider both the accuracy and the precision (repeatability)
    of the sensor. For example, a highly accurate weight sensor can provide precise
    measurements with minimal deviation from the true weight, ensuring reliable data
    for applications such as industrial weighing scales.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Response time**: This refers to the time that a sensor takes to respond to
    a change in the measured quantity. A faster response time means that the sensor
    can accurately track rapid changes. For instance, a high-speed motion sensor can
    quickly detect and respond to fast movements, making it suitable for applications
    such as sport tracking or security systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Power consumption**: This refers to the amount of power consumed by the sensor
    during operation. Lower power consumption is desirable as it prolongs battery
    life and reduces energy costs. For example, an energy-efficient light sensor can
    effectively detect changes in ambient light levels while consuming minimal power,
    making it suitable for battery-powered devices such as smartphones or smart watches.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we learned about IoT end devices used in IoT systems. We discussed
    their types and hardware architecture, as well as the importance of MCUs. We also
    explored the important parts and connections that allow these devices to interact
    with their surroundings. Additionally, we talked about sensors and actuators that
    gather data and enable actions in the real world.
  prefs: []
  type: TYPE_NORMAL
- en: As we move on to the next chapter, we will build on this knowledge by exploring
    how wireless data communication works in the air. Wireless connectivity is what
    connects individual devices into an IoT network that can transmit data and commands
    to fully utilize the potential of IoT. We will look at different wireless connectivity
    technologies in detail, including Wi-Fi, BLE, LTE-M, and NB-IOT in the domain
    of 4G/LTE and 5G.
  prefs: []
  type: TYPE_NORMAL
