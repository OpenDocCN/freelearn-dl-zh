- en: '10'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: Generative AI – Emerging Issues at the Intersection of Ethics and Innovation
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式人工智能——伦理与创新交汇处的新兴问题
- en: Generative **artificial intelligence** (**AI**) systems represent a new era
    of AI capabilities. Unlike narrow AI, which is programmed to perform specific,
    limited tasks without general intelligence or adaptability beyond their narrow
    focus, generative AI can automatically create a wide range of new content and
    artifacts such as text, images, audio, and video based on its training data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式**人工智能**（**AI**）系统代表了人工智能能力的新时代。与专门化的人工智能不同，后者被编程执行特定、有限的任务，没有一般智能或适应性，而生成式人工智能可以根据其训练数据自动创建各种新的内容和工作成果，如文本、图像、音频和视频。
- en: Recent advances in deep learning have rapidly accelerated the sophistication
    of generative models such as GPT-4, DALL-E 3, and Stable Diffusion. While this
    unlocks new creative potential, it also introduces profound ethical challenges
    that demand urgent attention as these technologies proliferate across society.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习最近的进步迅速加速了生成模型如GPT-4、DALL-E 3和Stable Diffusion的复杂性。虽然这开启了新的创意潜力，但也引入了需要紧急关注的深刻伦理挑战，因为这些技术在社会中广泛传播。
- en: As generative AI capabilities advance, these technologies raise complex questions
    at the intersection of ethics, technological progress, and social impacts. This
    chapter explores emerging issues across multiple dimensions – from risks of bias
    and threats to labor markets to environmental sustainability challenges and deeper
    philosophical questions about the nature of machine creativity. We will examine
    key ethical concerns around transparency, accountability, and trust in generative
    AI systems. The economic impacts will be discussed, highlighting both opportunities
    and potential displacement risks for workers. Environmental sustainability issues
    such as energy usage and emissions will also be outlined. Broader societal risks
    will be explored, along with reflections on what advances in machine creativity
    reveal about the philosophy of mind. Finally, potential solutions and safeguards
    are proposed that emphasize collaborative governance and upholding humanistic
    values as we steer these transformative technologies toward beneficial ends that
    enrich society. This chapter aims to provide a comprehensive overview of the multifaceted
    ethical landscape posed by the rise of generative AI.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 随着生成式人工智能能力的提升，这些技术在伦理、技术进步和社会影响交汇处提出了复杂的问题。本章从多个维度探讨了新兴问题——从偏见风险和劳动力市场威胁到环境可持续性挑战以及关于机器创造本质的更深层次的哲学问题。我们将审视生成式人工智能系统周围的关键伦理问题，包括透明度、问责制和信任。经济影响也将被讨论，强调对工人而言的机会和潜在的失业风险。能源使用和排放等环境可持续性问题也将被概述。还将探讨更广泛的社会风险，以及关于机器创造力进步揭示的心智哲学的反思。最后，我们将提出潜在解决方案和安全措施，强调在引导这些变革性技术朝着有益于社会的目标发展时，要强调协作治理和坚持人文价值观。本章旨在提供一个关于生成式人工智能崛起带来的多方面伦理景观的全面概述。
- en: 'The following topics will be covered in this chapter:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Exploring the ethical challenges of generative AI
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索生成式人工智能的伦理挑战
- en: Economic impact considerations
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经济影响考虑
- en: Environmental sustainability issues
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境可持续性问题
- en: Societal risks and reflections
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社会风险和反思
- en: The path forward – solutions and safeguards
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前进的道路——解决方案和安全措施
- en: Exploring the ethical challenges of generative AI
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索生成式人工智能的伦理挑战
- en: Generative AI introduces two major ethical challenges that require thoughtful
    solutions.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能引入了两个主要的伦理挑战，需要深思熟虑的解决方案。
- en: First, these systems can perpetuate unfair biases if trained on data reflecting
    societal prejudices. Biased data ingrains prejudices into models, leading them
    to make discriminatory choices harmful to marginalized groups.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，如果这些系统在反映社会偏见的训练数据上训练，它们可能会持续不公平的偏见。有偏见的资料将偏见植入模型，导致它们做出对边缘化群体有害的歧视性选择。
- en: Second, the immense complexity of generative AI makes it very opaque. Even experts
    struggle to explain how these models make decisions internally. This lack of interpretability
    prevents properly auditing the systems for issues such as biases. It hinders public
    trust. In the following sub-section, we will learn more about these challenges.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，生成式人工智能的巨大复杂性使其非常不透明。即使是专家也难以解释这些模型内部是如何做出决定的。这种不可解释性阻碍了对系统进行审计以解决诸如偏见等问题。它阻碍了公众的信任。在接下来的子节中，我们将了解更多关于这些挑战的信息。
- en: Trust and accountability challenges of generative AI
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成式人工智能的信任和问责制挑战
- en: One of the most pressing concerns regarding generative AI is the lack of transparency
    in its complex inner workings. Akin to a black box whose reasoning and decision-making
    processes remain obscured from view and human understanding, this opacity surrounding
    how these systems operate and produce outputs makes it extremely difficult to
    audit algorithms for issues such as bias or establish trust in the results generated,
    since the steps taken and logic applied cannot be readily interpreted or verified.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: While trust and accountability issues pose near-term concerns, generative AI’s
    impacts on the economy raise additional challenges we must proactively address.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Bias and discrimination risks
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most generative AI models derive capabilities solely from their training data.
    If the data reflects societal biases and lacks diversity, the models will inherit
    and amplify these problematic biases.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: For example, studies have uncovered strong gender and racial biases in leading
    language models. Biased data gets encoded in subtle but pernicious ways. When
    deployed across areas such as finance and criminal justice, generative AI could
    significantly exacerbate discrimination against already marginalized groups.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: A study from Boston University and Microsoft Research, published in April 2019
    at the AAAI/ACM Conference on AI, Ethics, and Society, found substantial gender
    bias in GPT-2\. The researchers found the model would associate stereotypically
    gendered words with occupations – for instance, referring to programmers as *he*
    and homemakers as *she*.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: This bias stemmed from the texts the model was trained on, which reflected gender
    imbalances and stereotypes in society. As a result, GPT-2 would default to biased
    outputs. So, for instance, if used for resume screening or job candidate recommendations,
    the model could discriminate against women in technical fields based on these
    embedded biases.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Mitigating unfair bias requires diversity and inclusion of best practices throughout
    the AI development life cycle, from curating training data to evaluating for unwanted
    biases. Achieving fairer outcomes relies on sustained ethical vigilance.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the risks of perpetuating bias, the opaque and inscrutable inner
    workings of many cutting-edge generative AI systems severely limit transparency
    and explainability. This lack of interpretability poses additional obstacles to
    ethical governance as we cannot properly audit or establish trust in systems whose
    decision-making processes remain obscured.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Challenges of transparency and explainability
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The inner workings of most cutting-edge generative models are not easily interpretable,
    even by AI experts. While techniques such as explainable AI provide some insights,
    current methods cannot fully explain the nonlinear dynamics of large systems such
    as GPT-3\. **Explainable AI** (**XAI**) is a field of research that aims to make
    AI and machine learning models more transparent and understandable to humans.
    XAI techniques provide insights into the internal logic, reasoning, and decision-making
    processes of AI systems, with the goals of building trust, detecting bias, and
    allowing humans to properly interpret, audit, and oversee these systems.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数最前沿的生成模型的内部运作并不容易理解，即使是AI专家也难以理解。虽然可解释人工智能等技术提供了一些见解，但当前的方法无法完全解释大型系统（如GPT-3）的非线性动力学。**可解释人工智能**（**XAI**）是一个研究领域，旨在使人工智能和机器学习模型对人类更加透明和可理解。XAI技术提供了对人工智能系统内部逻辑、推理和决策过程的见解，目标在于建立信任、检测偏见，并允许人类正确地解释、审计和监督这些系统。
- en: Without interpretability, users cannot properly audit or establish trust in
    generative AI. When utilized in sensitive social domains such as healthcare, being
    able to inspect and query decisions becomes even more critical. More R&D focused
    on XAI that illuminates black boxes is urgently needed.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 没有可解释性，用户无法正确审计或建立对生成式人工智能的信任。当在敏感的社会领域，如医疗保健中应用时，能够检查和查询决策变得尤为重要。迫切需要更多关注XAI（可解释人工智能）的研究，以揭示黑盒。
- en: While trust and accountability issues pose near-term concerns, generative AI’s
    impacts on the economy raise additional challenges we must proactively address.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管信任和问责制问题带来了短期担忧，但生成式人工智能对经济的影响提出了我们必须积极应对的额外挑战。
- en: Economic impact considerations
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 经济影响考虑
- en: Automating a wide range of creative and analytical tasks with increasingly capable
    generative AI could cause major disruptions in labor markets and incomes over
    the next decade. However, projections on net employment impacts remain complex
    and uncertain.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 使用越来越强大的生成式人工智能自动化广泛的各种创造性和分析性任务，可能会在接下来的十年内对劳动力市场和收入造成重大破坏。然而，关于净就业影响的预测仍然复杂且不确定。
- en: On one hand, studies suggest generative AI could add trillions to global GDP
    through gains in productivity, personalized services, and stimulating new industries.
    But other estimates warn that automated substitution of human roles could impact
    50% of jobs and displace up to 12 million US workers alone in the next 10-15 years.
    Fields such as professional services, media, software, and transportation appear
    especially at risk.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，研究表明，生成式人工智能可以通过提高生产力、个性化服务和刺激新兴产业，为全球GDP增加数万亿美元。但其他估计警告说，自动化替代人类角色可能会影响50%的工作，仅在未来10-15年内就可能使1200万美国工人失业。专业服务、媒体、软件和交通等领域似乎特别容易受到风险。
- en: This necessitates wise governance and visionary leadership for just economic
    transitions. Targeted programs for worker retraining, educational reform, job
    creation efforts, income/social supports, and public-private partnerships can
    help impacted individuals adapt and capitalize on new opportunities.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要明智的治理和有远见的领导，以确保经济的公平过渡。针对工人再培训、教育改革、就业创造努力、收入/社会支持以及公私合作伙伴关系的针对性计划可以帮助受影响的个人适应并利用新的机会。
- en: As scholar Mariana Mazzucato has argued, we must “prepare society for AI” rather
    than just “AI for society” by focusing on human resilience, empowerment, and dignity
    alongside technological progress. Maintaining inclusive growth requires centering
    labor rights and economic justice in governance.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 正如学者玛丽亚娜·马祖卡托所论证的，我们必须“为AI准备社会”，而不仅仅是“为社会的AI”，通过关注人类韧性、赋权和尊严与科技进步并重。保持包容性增长需要在治理中重视劳工权利和经济正义。
- en: In addition to economic considerations, the environmental impacts of developing
    and deploying generative AI systems demand urgent attention.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 除了经济考虑之外，开发和部署生成式人工智能系统的环境影响需要紧急关注。
- en: Environmental sustainability issues
  id: totrans-35
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 环境可持续性问题
- en: The massive computational power required by large generative AI models results
    in substantial energy use, carbon emissions, and resource consumption. Unconstrained,
    generative AI risks significantly accelerating climate change and pollution.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 大型生成式人工智能模型所需的巨大计算能力导致大量能源消耗、碳排放和资源消耗。不受约束的生成式人工智能可能会显著加速气候变化和污染。
- en: For example, training a single natural language model can emit over 600,000
    pounds of carbon dioxide, which equals the lifetime emissions of dozens of cars.
    Analysis suggests that by 2025, computational needs for leading models could rival
    mid-sized nations in emissions.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，训练一个单一的自然语言模型可能会排放超过600,000磅的二氧化碳，这相当于几十辆汽车的终身排放量。分析表明，到2025年，领先模型的计算需求可能与中等国家在排放量上相媲美。
- en: Prudent governance is urgently required to curb these impacts through renewable
    energy requirements, efficiency innovations such as model distillation, comprehensive
    life cycle assessments, carbon accounting, and strong environmental policies and
    incentives.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 迫切需要谨慎的治理来通过可再生能源要求、效率创新（如模型蒸馏）、全面的生命周期评估、碳核算以及强有力的环境政策和激励措施来遏制这些影响。
- en: Aligning exponential AI progress and climate action will require collective
    commitment from researchers, companies, policymakers, and the public. We must
    steward these technologies toward sustainability to safeguard the future of both
    human and natural intelligence.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 将指数级人工智能进步和气候行动对齐将需要研究人员、公司、政策制定者和公众的集体承诺。我们必须引导这些技术走向可持续性，以保护人类和自然智能的未来。
- en: While ethical concerns such as bias and transparency pose clear challenges,
    the rise of increasingly capable generative systems also necessitates reflecting
    on more subtle but profound societal risks that could emerge. As these technologies
    proliferate, we must broaden the discourse to preemptively engage with how generative
    AI could impact society’s collective well-being, values, and direction over time.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然如偏见和透明度等伦理问题提出了明确的挑战，但越来越强大的生成系统的兴起也要求我们反思可能出现的更微妙但深刻的 社会风险。随着这些技术的普及，我们必须扩大讨论范围，预先考虑生成式人工智能如何随着时间的推移影响社会的集体福祉、价值观和方向。
- en: Societal risks and reflections
  id: totrans-41
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 社会风险和反思
- en: Looking beyond immediate ethical concerns, this section contemplates broader
    risks generative AI may pose to the social fabric and collective values as these
    transformative technologies advance. We will reflect on ====the impacts on culture,
    governance, human cognition, and our self-understanding.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 超越即时的伦理问题，本节思考了随着这些变革性技术的进步，生成式人工智能可能对社会的结构和社会价值观构成的更广泛风险。我们将反思对文化、治理、人类认知以及我们自我理解的影响。
- en: Broader societal impacts
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更广泛的社会影响
- en: Beyond direct harm, the proliferation of increasingly capable generative systems
    poses risks of more subtle but still concerning societal impacts. For instance,
    widespread synthetic media could erode public trust or allow state and corporate
    interests to manipulate popular narratives.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 除了直接伤害之外，越来越强大的生成系统的普及还可能带来更微妙但仍然令人担忧的社会影响。例如，广泛使用的合成媒体可能会侵蚀公众信任或允许国家和企业利益操纵流行叙事。
- en: Overuse of generative AI in creative fields may also diminish cultural richness
    and authenticity over time. Even as communication barriers are lowered, human
    understanding across diverse viewpoints could paradoxically suffer if public discourse
    is increasingly mediated by machines optimizing for engagement over wisdom.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在创意领域过度使用生成式人工智能可能会随着时间的推移减少文化丰富性和真实性。即使沟通障碍降低，如果公共话语越来越多地由优化参与度而非智慧的机器所中介，那么跨多样观点的人类理解可能会矛盾地受到损害。
- en: The complex interplay between generative AI and human values such as truth,
    creativity, and belonging remains highly uncertain. We must broaden the discourse
    on technology ethics beyond technical flaws alone to its ripple effects on democracy,
    mental health, childhood development, and more.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能与人类价值观（如真理、创造力和归属感）之间的复杂相互作用仍然高度不确定。我们必须将技术伦理的讨论扩展到技术缺陷之外，包括其对民主、心理健康、儿童发展等方面的影响。
- en: While generative AI poses risks to society’s functioning, advances in machine
    creativity also compel deeper philosophical reflection on the nature of intelligence.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管生成式人工智能对社会功能构成风险，但机器创造力的进步也促使我们更深入地反思智能的本质。
- en: What machine creativity reveals about cognition
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器创造力揭示的认知
- en: On a philosophical level, the growing creative capabilities of generative systems
    compel profound questions about the nature of creativity, consciousness, and intelligence.
    If machines can generate art, music, humor, and literature, how do we characterize
    the essence of creative cognition?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在哲学层面，生成系统日益增长的创造力引发了对创造力的本质、意识以及智能的深刻问题。如果机器可以生成艺术、音乐、幽默和文学，我们如何描述创造性认知的本质？
- en: Some perspectives hold that generative models merely reconstitute patterns from
    data rather than exhibiting “true” creativity or intentionality. In this view,
    algorithmic outputs simulate but do not replicate the subjective qualities of
    the mind, which are essential for original thinking and understanding. Skeptics
    contend that human creativity intrinsically reflects unique intentional states,
    values, and life experiences that algorithms inherently lack.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 一些观点认为，生成模型只是从数据中重新构建模式，而不是展现“真正”的创造力或意图。在这个观点中，算法输出模拟但不复制心灵的主体性品质，这些品质对于原创思考和理解至关重要。怀疑者认为，人类的创造力本质上反映了独特的意图状态、价值观和生活经验，而这些是算法本身所缺乏的。
- en: However, other perspectives argue that the capabilities of generative systems
    reveal cognition as computation alone. If generative models can mimic diverse
    creative behaviors indistinguishable from humans, perhaps subjective experience
    is epiphenomenal rather than integral to cognition. In this materialist view,
    the mind is the machine – there is no ethereal spark of consciousness beyond physical
    algorithms.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，其他观点认为，生成系统的能力揭示了认知仅仅是计算。如果生成模型可以模仿与人类无法区分的多样化创造性行为，那么主观经验可能是副现象，而不是认知的组成部分。在这个唯物主义观点中，心灵是机器——在物理算法之外没有超越的灵性意识火花。
- en: Reconciling these divergent views remains challenging. We have yet to discern
    whether AI creativity reflects real but alien forms of machine consciousness,
    is an illusion of intelligence masking mechanistic processes, or exists somewhere
    in a gray zone in between. How we ultimately judge machine creativity and cognition
    will profoundly influence societal self-conceptions and ethics in this age of
    increasingly capable AI systems.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 调和这些不同的观点仍然具有挑战性。我们尚未弄清楚人工智能的创造力是否反映了真实但异化的机器意识形式，是否是掩盖机制过程的智能错觉，或者存在于两者之间的灰色地带。我们最终如何判断机器的创造力和认知，将深刻影响这个日益强大的AI系统时代的社会自我认知和伦理。
- en: Rather than definitively resolving these debates, we must thoughtfully consider
    how integrating human and machine creativity can enhance society. With mindfulness,
    wisdom, and humanistic ethics guiding development and governance, we can positively
    shape the trajectory of these accelerating technologies.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是明确解决这些辩论，我们必须深思熟虑地考虑如何整合人类和机器的创造力来提升社会。在深思熟虑、智慧和人文伦理的指导下，我们可以积极塑造这些加速发展的技术轨迹。
- en: As we contemplate the essence of creativity and cognition, the governance of
    generative AI in sensitive domains such as healthcare and defense demands special
    prudence given the potential for misuse and harm.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们思考创造力和认知的本质时，在敏感领域如医疗保健和国防中对生成式AI的治理需要特别的谨慎，考虑到潜在的滥用和危害。
- en: Concerns in defense and healthcare
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 国防和医疗保健方面的担忧
- en: Generative AI also introduces novel challenges in sensitive domains such as
    defense and healthcare. Potential misuse for military applications, such as autonomous
    weapons, warrants careful governance, while healthcare applications demand rigorous
    validation to avoid biased or flawed treatment recommendations that could endanger
    patients.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI也在敏感领域如国防和医疗保健中引入了新的挑战。军事应用（如自主武器）的潜在滥用需要谨慎治理，而医疗保健应用则需要严格的验证，以避免可能导致患者受到危害的偏见或不完善的治疗建议。
- en: Though we face profound risks ranging from labor disruptions to threats to democracy
    as generative AI advances, we also have opportunities to purposefully shape these
    technologies for good through ethical collaboration. If anchored in humanistic
    values such as justice, human dignity, and wisdom, and guided by diverse stakeholders
    across civil society, government, and the private sector working together, we
    can steer these powerful innovations toward ends that benefit humanity as a whole
    rather than further imperil it.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管随着生成式AI的发展，我们面临着从劳动力中断到对民主的威胁的深刻风险，但我们也有机会通过道德合作有目的地塑造这些技术以造福人类。如果以人文价值观如正义、人类尊严和智慧为基础，并在民间社会、政府和私营部门的多元利益相关者的共同努力下指导，我们可以引导这些强大的创新走向造福全人类的结局，而不是进一步危害人类。
- en: The path forward – solutions and safeguards
  id: totrans-58
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前进的道路——解决方案和安全措施
- en: 'Tackling generative AI’s multi-faceted ethical challenges demands collaboration
    between stakeholders across technology, government, academia, media, and civil
    society. This is how you can move forward:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 应对生成式AI的多方面伦理挑战需要技术、政府、学术界、媒体和民间社会各利益相关者的合作。以下是你可以前进的方式：
- en: Tech firms must commit to ethics by design by implementing internal oversight
    boards, algorithmic impact assessments for new products, and bias bounty programs
    to encourage external auditing.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 科技公司必须通过实施内部监督委员会、新产品算法影响评估和偏见赏金计划来承诺通过设计实现伦理。
- en: Policymakers need to enact thoughtful regulations such as requiring transparency
    reports, prohibiting harmful uses through export control laws, and mandating rights-preserving
    data practices.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 政策制定者需要制定深思熟虑的法规，例如要求透明度报告、通过出口控制法禁止有害用途，并强制执行保护权利的数据实践。
- en: Researchers should continue advancing techniques such as adversarial testing
    for bias detection, AI safety research institutes, and proposed standards around
    transparent documentation and evaluation protocols.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究人员应继续推进诸如对抗性测试以检测偏见、人工智能安全研究所以及关于透明文档和评估协议的提案标准等技术。
- en: Workers must influence the governance of AI systems affecting their livelihoods.
    Labor power has advanced society before and is needed again amid this transition.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工人必须影响影响他们生计的人工智能系统的治理。劳动力量在过去推动了社会的进步，在这次转型中也需要再次发挥作用。
- en: Educational institutions should equip students through required ethics courses,
    multidisciplinary programs combining tech and humanities, and community outreach
    on AI literacy.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育机构应通过必修的伦理课程、结合技术和人文学科的跨学科项目以及关于人工智能素养的社区推广活动来装备学生。
- en: Philosophers, ethicists, humanists, and other deep thinkers must guide societal
    integration of rapidly advancing systems to retain our values amid this process
    of change.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哲学家、伦理学家、人文主义者和其他深刻的思想家必须引导社会对快速发展的系统的整合，以在变革过程中保持我们的价值观。
- en: Broader civil society participation can be enabled through independent auditing
    panels, participatory algorithmic impact assessment frameworks, and mechanisms
    for marginalized groups to provide input and feedback.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过独立的审计小组、参与式算法影响评估框架以及让边缘化群体提供意见和建议的机制，可以促进更广泛的民间社会参与。
- en: The path forward will not be linear as generative capabilities explode in complexity.
    But by upholding humanistic values, focusing on ethics and dignity, and working
    together, we can steer these transformative technologies toward beneficial ends
    that uplift society. The future remains unwritten – through solidarity and wisdom,
    we shall write the next great chapters purposefully.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 前进的道路不会是线性的，因为生成能力在复杂性上爆炸式增长。但通过维护人文价值观，关注伦理和尊严，并共同努力，我们可以引导这些变革性技术走向有益于社会的目标。未来尚未书写——通过团结和智慧，我们将有目的地书写下一章伟大的篇章。
- en: Summary
  id: totrans-68
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter provided an overview of the multifaceted ethical landscape posed
    by the rise of generative AI systems. As these technologies proliferate, we face
    both profound opportunities and risks that demand thoughtful governance rooted
    in human rights and democratic values.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 本章概述了生成式人工智能系统兴起所带来的多方面伦理景观。随着这些技术的普及，我们面临着深刻的机会和风险，这要求我们基于人权和民主价值观进行深思熟虑的治理。
- en: We explored numerous challenges that must be addressed, from risks of perpetuating
    bias and threatening privacy to questions of economic equality, environmental
    sustainability, philosophical identity, and more. But for each challenge, collaborative
    solutions are possible if we center ethics, empowerment, and human dignity.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们探讨了必须解决的众多挑战，从持续偏见和威胁隐私的风险到经济平等、环境可持续性、哲学身份等问题。但对于每一个挑战，如果我们以伦理、赋权和人的尊严为中心，就可能找到协作的解决方案。
- en: By ensuring transparency and accountability around how generative models operate,
    we can build public trust. With inclusive governance and just transitions for
    workers, we can share economic gains equitably. Through renewable energy investments
    and efficiency innovations, we can align AI progress with climate action and sustainability.
    By upholding our highest values amid disruption, we can steer these transformative
    technologies toward uplifting ends that enrich our shared future.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 通过确保生成模型操作的透明度和问责制，我们可以建立公众信任。通过包容性的治理和为工人提供公正的过渡，我们可以公平地分享经济收益。通过可再生能源投资和效率创新，我们可以使人工智能进步与气候行动和可持续性保持一致。在颠覆中维护我们最高的价值观，我们可以引导这些变革性技术走向提升我们共同未来的目标。
- en: As generative technologies continue proliferating, we must remain vigilant about
    risks in sensitive domains such as defense and healthcare where misuse could endanger
    human lives and rights. With ethical mindfulness guiding governance, we can realize
    the benefits while reducing the potential harms.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 随着生成技术的持续扩散，我们必须对敏感领域（如国防和医疗保健）中的风险保持警惕，这些领域的滥用可能会危及人类生命和权利。在道德意识的指导下进行治理，我们可以实现利益同时减少潜在的危害。
- en: But we have not a moment to lose. The choices we make today on the ethics and
    governance of generative AI will reverberate for generations. Will the story be
    one of cautionary tales or hope fulfilled? The time for wisdom is now – our shared
    humanity is on the line. Through solidarity, creativity, and moral courage, we
    can write the next great chapters together purposefully.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们没有时间可以浪费。我们今天在生成AI的伦理和治理方面的选择将影响几代人。这个故事会是充满警告的故事还是希望实现的传说？智慧的时刻已经到来——我们的共同人性正处于危险之中。通过团结、创造力和道德勇气，我们可以共同有目的地书写下一章伟大的篇章。
- en: The lesson here is that the path forward requires diligent, proactive efforts
    from all stakeholders. Tech firms must commit to ethics by design and ongoing
    algorithmic auditing. Policymakers need to enact thoughtful regulations that balance
    innovation and responsible governance. Researchers should continue advancing techniques
    that promote transparency, accountability, and safety. Workers must be able to
    influence how these systems affect their livelihoods. And civil society participation
    is key for marginalized voices to be heard.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的教训是，前进的道路需要所有利益相关者的勤奋和主动努力。科技公司必须通过设计伦理和持续算法审计来承诺道德。政策制定者需要制定深思熟虑的法规，以平衡创新和负责任的治理。研究人员应继续推进促进透明度、问责制和安全的技术。工人必须能够影响这些系统对其生计的影响。而且，公民社会的参与对于边缘化声音被听到至关重要。
- en: In the concluding chapter, we will synthesize the concepts we’ve explored so
    far to provide a comprehensive guide to the emerging art and science of prompt
    engineering for generative AI.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在结论章节中，我们将综合迄今为止探讨的概念，为生成AI的提示工程这一新兴艺术和科学提供全面的指南。
