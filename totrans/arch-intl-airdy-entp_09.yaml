- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI-Driven Strategies for Media and Telecommunication Industries
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In a world drowning in content but starving for relevance, the telecommunication
    and media industries face a paradoxical challenge. While global telecom spending
    continues to rise into the trillions, media leaders report alarming declines in
    social referral traffic, with platform-driven visits plummeting dramatically.
    Meanwhile, AI adoption is accelerating at a breakneck pace, with the AI market
    in telecommunications projected to grow at an astonishing rate, transforming how
    these industries operate at their core.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'This isn’t just another technology cycle; it’s a fundamental reinvention of
    how we connect, consume, and communicate. For telecom operators and media companies,
    the stakes couldn’t be higher: those who master AI-driven personalization are
    seeing billion-dollar returns (Netflix generates $1 billion annually from AI recommendations
    alone) [1], while those clinging to traditional models watch their audiences and
    revenues evaporate.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will learn about:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: The architecture of content personalization systems that use behavior analytics
    and vector search to deliver tailored recommendations and increase conversion
    rates
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The transformation of information retrieval into conversational, context-aware
    interactions through **search generative experiences** (**SGE**) to reduce bounce
    rates and boost engagement
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agentic AI Ops frameworks that automate telecom workflows, enable predictive
    maintenance, and potentially boost revenue
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI-powered fraud detection systems that process millions of events in real time,
    reducing losses through pattern recognition and risk profiling
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automation strategies that streamline content workflows through AI-driven processes,
    adaptive formatting, and conversational interfaces to cut manual work and improve
    engagement
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evolving landscape of media and telecommunication
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In recent years, the media industry has faced serious challenges, from adapting
    to digital platforms and on-demand consumption to monetizing digital content and
    competing with tech giants and new media upstarts. Adding to these challenges
    is the rise in digital content, which has saturated the media market and made
    it more difficult to capture and retain audience attention.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'As a result, media organizations are continually being pushed to reevaluate
    their strategies and explore new pathways to success. A global industry survey
    of over 326 digital leaders [2] highlighted several trends they must address in
    the coming years, including the following:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**Declining referral traffic**: Around three-quarters (74%) of survey respondents
    are concerned about a potential decline in referral traffic from search engines
    as AI overviews are implemented. Aggregate Facebook traffic to news and media
    properties has fallen by two-thirds (67%) in the last two years, while traffic
    from X (formerly Twitter) is down by half (50%). The platform owners’ intent is
    clear: to retain user traffic within their own ecosystems.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**下降的推荐流量**：大约四分之三（74%）的受访者担心随着人工智能概述的实施，搜索引擎的推荐流量可能下降。在过去两年中，新闻和媒体属性的Facebook流量下降了三分之二（67%），而来自X（前身为Twitter）的流量下降了半数（50%）。平台所有者的意图是明确的：保留用户流量在其自己的生态系统中。'
- en: '**Prioritizing platform strategies**: Publishers are focusing on platforms
    like ChatGPT and Perplexity while maintaining interest in video networks such
    as YouTube, TikTok, and Instagram.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优先考虑平台策略**：出版商正在关注ChatGPT和Perplexity等平台，同时保持对YouTube、TikTok和Instagram等视频网络的兴趣。'
- en: '**Focusing on innovation**: There is a strong emphasis on developing new products
    to engage audiences, with around four in ten (42%) planning offerings aimed at
    young people, and between a quarter and a third exploring audio (26%) or video
    (30%) products and services.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聚焦创新**：在吸引观众方面，有很强的重点放在开发新产品上，大约四分之一（42%）的计划是针对年轻人的产品，还有四分之一到三分之一在探索音频（26%）或视频（30%）产品和服务。'
- en: AI supports media organizations to overcome these changes by improving content
    research, production, and distribution. For instance, AI can summarize key points
    from multiple articles, making research more efficient. You can also leverage
    LLMs to draft new content based on specified themes, streamlining production.
    Additionally, AI enables content customization for diverse audiences, such as
    tailoring materials for young readers or foreign language speakers. It also enhances
    user experiences by personalizing content recommendations and interactions, a
    capability famously demonstrated by Netflix.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能通过提高内容研究、生产和分发来支持媒体组织克服这些变化。例如，人工智能可以从多篇文章中总结关键点，使研究更加高效。您还可以利用大型语言模型（LLMs）根据指定的主题起草新内容，简化生产流程。此外，人工智能能够为不同受众定制内容，例如为年轻读者或外语使用者量身定制材料。它还通过个性化内容推荐和互动来增强用户体验，这一点在Netflix上得到了著名的展示。
- en: In particular, AI-powered tools such as SGE and AI-driven chatbots are expected
    to provide faster, more intuitive access to information, significantly reshaping
    how users interact with content. SGE refers to the integration of GenAI into search
    engines, enabling them to produce conversational, synthesized responses to user
    queries instead of simply displaying a list of links. This approach can reduce
    the need to click through to external websites, potentially altering traditional
    traffic patterns. As a result, these innovations are not only shifting audience
    behavior and financial dynamics across the industry but also presenting publishers
    with new opportunities to diversify their revenue streams.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是AI驱动的工具，如SGE和AI驱动的聊天机器人，预计将提供更快、更直观的信息访问方式，显著改变用户与内容互动的方式。SGE指的是将GenAI集成到搜索引擎中，使其能够对用户查询产生对话式、综合性的响应，而不仅仅是显示链接列表。这种方法可以减少点击外部网站的需求，可能改变传统的流量模式。因此，这些创新不仅正在改变整个行业的观众行为和财务动态，而且也为出版商提供了多样化收入来源的新机会。
- en: Let’s now shift focus to the challenges and opportunities in the telecommunication
    industry, which operates in a landscape of tight profit margins and growing pressure
    on connectivity services. As digital transformation accelerates, telecom operators
    must continuously redefine their business models and service offerings, with AI
    emerging as a transformative force reshaping the entire industry.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将重点转向电信行业的挑战和机遇，该行业在利润率紧张和连接服务压力不断增长的环境中运营。随着数字化转型加速，电信运营商必须不断重新定义其商业模式和服务产品，人工智能作为一股变革力量正在重塑整个行业。
- en: With offerings such as voice, data, and internet access being largely homogeneous
    and low-margin, telecom companies need to differentiate and diversify their revenue
    streams to create value and stand out in the market. The industry continues to
    experience significant growth globally, with investments reaching into the trillions
    of dollars as operators expand infrastructure and develop new service capabilities.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 由于语音、数据和互联网接入等服务在很大程度上同质化和低利润，电信公司需要区分和多样化其收入来源，以创造价值并在市场中脱颖而出。该行业在全球范围内持续经历显著增长，投资额达到数万亿美元，运营商在扩展基础设施和发展新的服务能力。
- en: As digital natives disrupt traditional business models with agile and innovative
    approaches, established companies are competing not only among themselves but
    also with newcomers to deliver enhanced customer experiences and adapt to evolving
    consumer demands. For instance, Starlink’s satellite internet service bypasses
    traditional broadband infrastructure entirely, offers competitive pricing that
    undercuts traditional satellite providers while delivering superior performance,
    and is rapidly growing by serving rural and remote areas that traditional telecom
    companies have largely ignored due to high infrastructure deployment costs [3].
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数字原住民以敏捷和创新的方法颠覆传统商业模式，传统公司不仅相互竞争，还与新人竞争，以提供增强的客户体验并适应不断变化的消费者需求。例如，星链的卫星互联网服务完全绕过传统的宽带基础设施，提供具有竞争力的定价，低于传统的卫星服务提供商，同时提供卓越的性能，并通过服务于传统电信公司因高基础设施部署成本而
    largely ignored 的农村和偏远地区而迅速增长 [3]。
- en: To thrive in an environment where advanced connectivity is increasingly expected,
    telecom operators must prioritize cost efficiency in their **operations support
    systems** (**OSS**) and **business support systems** (**BSS**). OSS refers to
    systems used to manage network infrastructure, such as service provisioning and
    fault management, while BSS handles customer-facing activities like billing, order
    management, and customer relationship management. By optimizing these systems,
    operators can elevate customer service standards and enhance overall customer
    experiences—critical steps to securing market share and gaining a competitive
    edge.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个越来越期望高级连接的环境中繁荣，电信运营商必须在他们的**运营支持系统**（**OSS**）和**业务支持系统**（**BSS**）中优先考虑成本效率。OSS
    指的是用于管理网络基础设施的系统，例如服务提供和故障管理，而 BSS 处理面向客户的活动，如计费、订单管理和客户关系管理。通过优化这些系统，运营商可以提高客户服务标准并增强整体客户体验——这是确保市场份额和获得竞争优势的关键步骤。
- en: To implement these changes, AI helps telecom operators adopt innovative solutions
    to navigate the digital landscape. According to **Neuralt**, “*AI is not just
    an add-on technology but a driving force that is reshaping how telecom companies
    operate, provide services, and improve customer experiences*” [4]. For example,
    it provides automated processes for network operations, optimization mechanisms
    for network management, and prompt detection of suspicious data usage patterns
    for revenue protection and fraud prevention.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实施这些变化，人工智能帮助电信运营商采用创新解决方案来导航数字景观。根据 **Neuralt**，“*人工智能不仅仅是一种附加技术，而是一种推动力，正在重塑电信公司如何运营、提供服务以及改善客户体验的方式*”
    [4]。例如，它为网络运营提供自动化流程，为网络管理提供优化机制，并快速检测可疑的数据使用模式以保护收入和防止欺诈。
- en: Capgemini’s research highlights that “*Agentic AI is emerging as the next frontier
    in telco innovation, enabling systems that can make decisions and solve complex
    problems with minimal human oversight. This new level of autonomy is helping companies
    to dramatically increase operational efficiency and realize the promise of self-optimizing
    networks*” [5].
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 印度尼维尔的调查指出，“*代理人工智能正在成为电信创新的下一个前沿，它使系统能够在最小的人类监督下做出决策和解决复杂问题。这种新的自主水平正帮助企业大幅提高运营效率，并实现自我优化网络的承诺*”
    [5]。
- en: Altogether, leading companies in the media and telecommunication industry are
    using AI to optimize their operations, safeguard their businesses, and drive innovation.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，媒体和电信行业的领先公司正在使用人工智能来优化其运营，保护其业务并推动创新。
- en: Content discovery and personalization
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内容发现和个人化
- en: Media organizations, from streaming services to online publications, are expected
    to offer a degree of content personalization. Viewers seek personalized content
    recommendations based on their interests.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 从流媒体服务到在线出版物，媒体机构预计将提供一定程度的内容个性化。观众寻求基于其兴趣的内容推荐。
- en: Leveraging AI can significantly improve suggestions for the next best article
    to read or show to stream. The most powerful content personalization systems track
    user behavior in real time, such as the content searched, the time spent before
    the next click happened, and the categories explored by the user. These parameters
    allow personalization systems to increase engagement by presenting related content,
    or, as an alternative, display new content that helps users discover different
    media types and check their interest in consuming them.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 利用人工智能可以显著提高推荐阅读或展示的下一篇文章的建议。最强大的内容个性化系统实时跟踪用户行为，例如搜索的内容、在发生下一次点击之前花费的时间以及用户探索的类别。这些参数允许个性化系统通过展示相关内容来提高参与度，或者作为替代方案，显示帮助用户发现不同媒体类型并检查他们消费兴趣的新内容。
- en: To bring the right content to the right people at the right time, a content
    personalization system needs to maintain multiple information facets, which lay
    the foundation for proper suggestions. With modern document databases such as
    MongoDB and its flexible data model, all this information can be easily managed.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在正确的时间将正确的内容推荐给正确的人，内容个性化系统需要维护多个信息维度，这为适当的建议奠定了基础。借助现代文档数据库，如MongoDB及其灵活的数据模型，所有这些信息都可以轻松管理。
- en: Additionally, developing with a JSON-based content layer is much faster, more
    intuitive, and less error-prone compared to handling relational tables. Moreover,
    this approach combines vectorized content with operational data. Vector search
    capabilities allow for creating advanced content suggestion systems that power
    semantic searches, going beyond basic keyword or attribute matching.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，与处理关系表相比，基于JSON的内容层开发更快、更直观、更少出错。此外，这种方法将向量化内容与运营数据相结合。向量搜索功能允许创建高级内容建议系统，该系统支持语义搜索，超越了基本的关键词或属性匹配。
- en: Content suggestions and personalization platform
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内容建议和个性化平台
- en: By drawing on user data, behavior analytics, and the multi-dimensional vectorization
    of media content, modern data platforms improve end user experiences. Media organizations
    can now suggest content that aligns closely with individual preferences and past
    interactions.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用用户数据、行为分析和媒体内容的多元维度向量化，现代数据平台提升了终端用户体验。媒体组织现在可以建议与个人偏好和以往互动紧密相关的内容。
- en: 'Advanced data platforms enhance a content personalization strategy by incorporating
    advanced user experience features, as illustrated in *Figure 8.1*. These features
    include personalized recommendations, content summarization, keyword extraction,
    and automatic insight generation, making the system more dynamic and user-focused:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 高级数据平台通过整合高级用户体验功能，如图8.1所示，增强了内容个性化策略。这些功能包括个性化推荐、内容摘要、关键词提取和自动洞察生成，使系统更加动态和以用户为中心：
- en: '![](img/B34136_08_01.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_08_01.png)'
- en: 'Figure 8.1: Reference architecture for creating personalized user experiences
    in MongoDB with Atlas Vector Search'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1：在MongoDB中使用Atlas向量搜索创建个性化用户体验的参考架构
- en: This diagram illustrates a comprehensive content personalization platform where
    authors create content through a CMS that uses Voyage AI to generate vector embeddings
    and stores media documents in MongoDB with Atlas Vector Search capabilities. The
    system includes content services powered by LLMs for insights, translation, summarization,
    keyword extraction, discovery, and suggestions. All components integrate through
    MongoDB collections and vector indexes to deliver hyper-personalized content recommendations
    across multiple output channels (mobile, web, and tablet) to customers, creating
    dynamic experiences through the advanced capabilities of the MongoDB data platform.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了综合内容个性化平台，其中作者通过使用Voyage AI生成向量嵌入并通过具有Atlas向量搜索功能的MongoDB存储媒体文档的CMS创建内容。该系统包括由LLM提供的内容洞察、翻译、摘要、关键词提取、发现和建议的内容服务。所有组件通过MongoDB集合和向量索引集成，向多个输出渠道（移动、网页和平板）提供超个性化的内容推荐，通过MongoDB数据平台的先进功能创造动态体验。
- en: Content suggestions and personalization
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内容建议和个性化
- en: Media platforms can suggest content aligned with individual preferences and
    past interactions by referencing user data, behavior analytics, and vectorization
    of media items. This mechanism enhances user engagement and increases the likelihood
    of converting free users into paying subscribers. For this solution, vectors are
    sometimes embedded directly in documents.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体平台可以通过引用用户数据、行为分析和媒体项目的向量化，建议与个人偏好和以往互动一致的内容。这种机制增强了用户参与度，并增加了将免费用户转化为付费订阅者的可能性。对于此解决方案，向量有时会直接嵌入到文档中。
- en: Furthermore, built-in scalability and resilience are advantageous when handling
    vector search operations. Organizations can scale their MongoDB database vertically
    or horizontally, and even choose to scale search nodes independently from operational
    database nodes, adapting to specific load scenarios in a cost-efficient way.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在处理向量搜索操作时，内置的可扩展性和弹性具有优势。组织可以垂直或水平扩展其MongoDB数据库，甚至可以选择独立于操作数据库节点扩展搜索节点，以成本效益的方式适应特定的负载场景。
- en: Content summarization and reformatting
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内容摘要和重新格式化
- en: 'Beyond suggesting which content to show users, media platforms can also adapt
    how that content is presented using the same user data and behavioral insights.
    For example:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 除了建议向用户展示哪些内容之外，媒体平台还可以使用相同的用户数据和用户行为洞察来调整内容的展示方式。例如：
- en: '**Device-specific formatting**: A recommended article might be automatically
    reformatted as bullet points for mobile users, while desktop users see the full
    text.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设备特定格式**：推荐的文章可能会自动重新格式化为项目符号，供移动用户阅读，而桌面用户则看到全文。'
- en: '**Personalized summaries**: Users who typically read quickly receive condensed
    versions, while others get detailed explanations.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化摘要**：通常快速阅读的用户会收到简化的版本，而其他人则会获得详细的解释。'
- en: '**Format adaptation**: Based on consumption patterns, the same recommended
    content could be delivered as text for some users, audio for others, or video
    summaries.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**格式适配**：基于消费模式，相同推荐内容可以以文本形式提供给某些用户，以音频形式提供给其他用户，或以视频摘要形式提供。'
- en: '**Channel optimization**: When sharing content across different platforms,
    the system automatically creates shortened versions with key highlights for social
    media while providing comprehensive coverage through other channels.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**渠道优化**：当在不同平台之间共享内容时，系统会自动创建带有关键高亮的简短版本，供社交媒体使用，同时通过其他渠道提供全面覆盖。'
- en: This approach leverages the same user preference data and behavioral analytics
    used for content recommendations to determine the optimal format and length for
    each individual, further improving engagement by matching both what people want
    to read and how they prefer to consume it.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法利用与内容推荐相同的用户偏好数据和用户行为分析数据，以确定每个个体的最佳格式和长度，通过匹配人们想要阅读的内容和他们的偏好消费方式，进一步改善参与度。
- en: Keyword and entity extraction
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键词和实体提取
- en: Media platforms can draw essential information from content through advanced
    keyword and entity extraction, enabling users to find new content they like quickly
    and with minimum fuss. Keywords are fundamental to how content is indexed and
    found in search engines, and they significantly influence the **search engine
    optimization** (**SEO**) performance of digital content. With the help of the
    underlying LLM, media platforms can automatically extract a greater range of keywords
    with high sophistication, further improving the quality of the metadata used for
    search.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体平台可以通过高级关键词和实体提取从内容中提取关键信息，使用户能够快速且轻松地找到他们喜欢的新内容。关键词是内容在搜索引擎中索引和发现的基础，并且它们对数字内容的搜索引擎优化（SEO）性能有重大影响。借助底层LLM，媒体平台可以自动提取更广泛且复杂的关键词，从而进一步提高用于搜索的元数据质量。
- en: Automatic creation of insights and summaries
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动创建见解和摘要
- en: Media platforms such as online news or sports services can automatically generate
    comprehensive insights and summaries by analyzing multiple pieces of related content
    within their own archives or from external sources. For example, a news platform
    can create summaries that synthesize information from several related news stories
    about the same event, while sports platforms can generate comprehensive overviews
    by combining match reports, player statistics, and expert commentary.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体平台如在线新闻或体育服务可以通过分析其存档或外部来源中的相关内容的多篇相关内容，自动生成全面的见解和摘要。例如，新闻平台可以创建综合信息摘要，这些摘要综合了关于同一事件的几篇相关新闻故事，而体育平台可以通过结合比赛报告、球员统计数据和专家评论来生成全面的概述。
- en: This feature is particularly valuable for users interested in deep dives into
    specific topics or events, as it can surface related content that might otherwise
    have been hard to find, or generate a daily news summary, saving time by providing
    all the content they want in a digestible form. This is achieved using one or
    more LLMs to generate natural language output, enhancing the accessibility of
    information from multiple source materials.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对于对特定主题或事件进行深入研究感兴趣的用户来说，此功能尤其有价值，因为它可以揭示可能难以找到的相关内容，或生成每日新闻摘要，通过以可消化的形式提供他们所需的所有内容来节省时间。这是通过使用一个或多个LLMs生成自然语言输出，增强来自多个来源材料的信息的可访问性来实现的。
- en: Altogether, AI-powered personalization stands out as an important tool for publishers.
    By using AI to deliver tailored content and automate back-end processes, publishers
    can better address the decline in traditional referrals and build stronger, more
    direct relationships with their audiences.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，AI驱动的个性化成为出版商的重要工具。通过使用AI提供定制内容并自动化后台流程，出版商可以更好地应对传统推荐量的下降，并与他们的受众建立更强、更直接的关系。
- en: Search generative experiences (SGEs)
  id: totrans-52
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 搜索生成式体验（SGEs）
- en: With the rise of AI capturing the public’s attention, it is clear that a basic
    search box returning a list of plain links is no longer enough for users. SGEs
    represent a transformative shift in how media and content industries approach
    interactions with user information requests (search). SGEs utilize AI to generate
    search results that are not just links to existing content, but comprehensive,
    natural language responses tailored to actual user intent. These immediate and
    concise answers help media platforms keep users engaged longer, reduce bounce
    rates, and increase the likelihood of deeper content interaction.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI吸引公众注意力的兴起，很明显，一个仅返回普通链接列表的基本搜索框已不再满足用户需求。SGEs代表了媒体和内容产业在处理用户信息请求（搜索）方面的一次转型。SGEs利用AI生成搜索结果，这些结果不仅仅是现有内容的链接，而是针对实际用户意图的全面、自然语言响应。这些即时、简洁的答案有助于媒体平台保持用户更长时间的参与，降低跳出率，并增加更深入内容互动的可能性。
- en: Using modern data platforms with built-in vector search capabilities at the
    core of an SGE solution (see *Figure 8.2*), organizations can develop robust **retrieval-augmented
    generation** (**RAG**) systems. These systems enhance LLMs by providing extra
    information that serves as context for the prompt, generating more accurate, relevant,
    and interesting responses.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使用现代数据平台，这些平台以内置的向量搜索能力为核心构建SGE解决方案（见*图8.2*），组织可以开发出强大的**检索增强生成**（**RAG**）系统。这些系统通过提供作为提示上下文的信息来增强LLMs，生成更准确、相关和有趣的响应。
- en: The versatility of SGE systems opens up a wide range of use cases, including
    intelligent research tools, smart conversational interfaces, and gamified learning
    experiences. Tailoring these solutions to industry needs unlocks new opportunities
    for innovation, monetization, and engagement.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: SGE系统的多功能性开辟了广泛的应用场景，包括智能研究工具、智能对话界面和游戏化学习体验。将这些解决方案定制到行业需求中，为创新、货币化和参与打开了新的机会。
- en: '![](img/B34136_08_02.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_08_02.png)'
- en: 'Figure 8.2: Reference architecture for creating an SGE'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2：创建SGE的参考架构
- en: This diagram illustrates how an SGE transforms traditional search by using AI
    to generate comprehensive, natural language responses rather than just a list
    of links. The architecture shows how a user query about HSBC market news flows
    through an embedding model, such as Voyage AI, to MongoDB’s Atlas Vector Search,
    which retrieves contextual data from article text bodies and vector embeddings.
    This proprietary data enhances the LLM prompt, enabling it to generate specific,
    well-informed answers instead of generic responses and demonstrating the shift
    from simple information retrieval to intelligent, context-aware content generation.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了SGE如何通过使用AI生成全面、自然语言响应来改变传统的搜索方式，而不是仅仅列出链接。架构展示了用户关于汇丰市场新闻的查询如何通过嵌入模型，如Voyage
    AI，流向MongoDB的Atlas Vector Search，该搜索从文章正文和向量嵌入中检索上下文数据。这些专有数据增强了LLM提示，使其能够生成具体、信息丰富的答案，而不是泛泛的响应，并展示了从简单的信息检索到智能、上下文感知的内容生成的转变。
- en: Smart conversational interfaces
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能对话界面
- en: If talking to your toaster or fridge about your breakfast plans still sounds
    like science fiction, welcome to the future. Smart conversational interfaces enable
    seamless data access in everyday life through devices such as smartwatches, wearables,
    and cars. This new opportunity for interaction creates novel ways to engage users
    through intuitive experiences that feel natural and comfortable.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果与烤面包机或冰箱讨论早餐计划听起来仍然像是科幻小说，那么欢迎来到未来。智能对话界面通过智能手表、可穿戴设备和汽车等设备，使日常生活中的数据访问无缝连接。这种新的互动机会创造了通过直观体验吸引用户的新方法，这些体验感觉自然舒适。
- en: According to Bernard Marr, a world-renowned futurist, influencer, and thought
    leader in business and technology, “*2025 will bring further widespread adoption
    of generative AI across the telecom industry, and without a doubt, one of the
    most prominent use cases will be customer experience transformation*” [6]. This
    includes hyper-personalized services and AI chatbots taking on increasingly sophisticated
    customer interactions.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 根据世界著名未来学家、影响者和商业与技术领域的思想领袖Bernard Marr的说法，“*2025年将带来电信行业对生成式人工智能的进一步广泛采用，毫无疑问，最突出的用例之一将是客户体验的转型*”
    [6]。这包括超个性化服务和人工智能聊天机器人承担越来越复杂的客户互动。
- en: Gamified learning experiences
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 游戏化学习体验
- en: 'Educational technology platforms are leveraging AI to create more engaging
    learning experiences, similar to popular apps like Duolingo. These systems use
    AI algorithms to continuously monitor student performance and adapt content difficulty
    in real time, creating personalized learning paths that offer:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 教育技术平台正在利用人工智能创造更具吸引力的学习体验，类似于Duolingo等流行的应用程序。这些系统使用人工智能算法持续监控学生表现并实时调整内容难度，创建个性化的学习路径，提供以下内容：
- en: '**Adaptive content delivery**: Adjust difficulty and provide personalized explanations
    when users make mistakes, helping them understand concepts better'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自适应内容交付**：当用户犯错时调整难度并提供个性化解释，帮助他们更好地理解概念'
- en: '**Intelligent feedback systems**: Provide contextual hints and explanations
    powered by AI when users struggle with specific topics'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能反馈系统**：当用户在特定主题上遇到困难时，通过人工智能提供上下文提示和解释'
- en: '**Progress optimization**: Use behavioral data to identify optimal study schedules
    and content types for individual learners'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**进度优化**：利用行为数据识别为个别学习者提供最佳学习计划和内容类型'
- en: For media companies, this represents a significant opportunity to expand into
    the growing educational content market, with digital storytelling and interactive
    learning experiencing substantial growth.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 对于媒体公司来说，这代表着进入不断增长的教育内容市场的重大机遇，数字叙事和互动学习正经历着显著增长。
- en: Service assurance
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 服务保证
- en: Moving from media applications back to telecommunications infrastructure, providers
    need to deliver high quality network services with performance levels that meet
    customer expectations and **service-level agreements** (**SLAs**). Key aspects
    of service assurance include performance monitoring, **quality-of-service** (**QoS**)
    management, and predictive analytics to anticipate potential service degradation
    or network failures. With the increasing complexity of telecommunications networks
    and the growing expectations of customers for always-on services, a new bar has
    been set for service assurance, which is requiring companies to invest heavily
    in solutions that can automate these processes just to try and maintain a competitive
    edge.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 从媒体应用回到电信基础设施，提供商需要提供符合客户期望和**服务水平协议**（**SLAs**）的高质量网络服务。服务保证的关键方面包括性能监控、**服务质量**（**QoS**）管理和预测分析，以预测潜在的服务退化或网络故障。随着电信网络的日益复杂化和客户对始终在线服务的期望不断增长，服务保证的标准已经提高，这要求公司大量投资于能够自动化这些流程的解决方案，仅仅是为了保持竞争优势。
- en: 'Service assurance has been revolutionized by AI through several key capabilities:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 通过几个关键能力，人工智能已经彻底改变了服务保证：
- en: '**Predictive maintenance**: Machine learning analyzes patterns to predict network
    failures, enabling preemptive maintenance and reducing downtime'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测性维护**：机器学习分析模式以预测网络故障，实现预防性维护并减少停机时间'
- en: '**Root cause analysis**: AI identifies the underlying causes of network issues,
    improving troubleshooting effectiveness'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**根本原因分析**：人工智能识别网络问题的根本原因，提高故障排除的有效性'
- en: '**Network optimization**: AI evaluates log data to find improvement opportunities,
    reducing operational costs and optimizing performance in real time'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**网络优化**：AI评估日志数据以找到改进机会，降低运营成本并实时优化性能'
- en: Together, these capabilities demonstrate how AI is transforming network reliability
    and operational efficiency.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这些能力共同展示了AI如何改变网络可靠性和运营效率。
- en: Agentic AIOps for network management
  id: totrans-75
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 网络管理的Agentic AIOps
- en: Building on the AI-powered insights from service assurance systems, Agentic
    AI Ops takes automation a step further by enabling autonomous decision-making
    and actions. While traditional AI systems provide recommendations, agentic AI
    can independently execute solutions without waiting for human approval.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在服务保证系统基于AI的洞察力基础上，Agentic AI Ops通过实现自主决策和行动将自动化推进了一步。虽然传统的AI系统提供推荐，但代理AI可以独立执行解决方案，无需等待人工批准。
- en: 'Agentic AI Ops frameworks help **communication service providers** (**CSPs**)
    deploy AI-powered systems that can autonomously:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 代理AI Ops框架帮助**通信服务提供商**（**CSPs**）部署能够自主：
- en: '**Execute corrective actions**: Automatically reconfigure routers for load
    management during network congestion'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行纠正措施**：在网络拥塞期间自动重新配置路由器以进行负载管理'
- en: '**Make real-time decisions**: Determine and deploy appropriate responses to
    network issues as they occur'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时决策**：确定并部署适当的响应以应对出现的网络问题'
- en: '**Call APIs directly**: Interface with network infrastructure to implement
    changes immediately'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**直接调用API**：与网络基础设施接口以立即实施更改'
- en: '**Manage workflows**: Coordinate complex operational processes with minimal
    human intervention'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理流程**：以最小的人为干预协调复杂的运营流程'
- en: For example, when these systems detect network latency issues, they don’t just
    alert operators, they can automatically redistribute traffic loads, adjust routing
    protocols, or scale resources in real time to maintain optimal performance.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当这些系统检测到网络延迟问题时，它们不仅会通知操作员，还可以自动重新分配流量负载、调整路由协议或实时扩展资源以保持最佳性能。
- en: These autonomous capabilities enable CSPs to manage complex workflows with minimal
    human intervention, accelerating the deployment of new services and potentially
    boosting annual revenue by up to 5% [7].
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这些自主能力使CSPs能够以最小的人为干预管理复杂的流程，加速新服务的部署，并可能将年度收入提高高达5% [7]。
- en: Building AI-powered network systems for telecommunications
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为电信构建基于AI的网络系统
- en: With modern data platforms, telecommunication providers can build customized
    network management applications that integrate semantic search with generative
    text responses, as outlined in the following diagram.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 利用现代数据平台，电信提供商可以构建集成了语义搜索和生成式文本响应的定制网络管理应用程序，如下面的图所示。
- en: '![GenAI Ops Blog Pictures.png](img/B34136_08_03.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![GenAI Ops Blog Pictures.png](img/B34136_08_03.png)'
- en: 'Figure 8.3: Reference architecture to create a network chatbot with MongoDB'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3：使用MongoDB创建网络聊天机器人的参考架构
- en: 'This diagram shows how telecommunications providers can build AI-powered network
    chatbots using MongoDB as the core data platform. The architecture integrates
    three main components: data ingestion through aggregation pipelines and vector
    search capabilities; question analysis, where user queries are converted to embeddings
    to find relevant network data and generate appropriate database queries using
    embedding models and LLMs for context prompts; and natural language output generation.
    The system processes network chat interactions (questions, answers, history),
    while MongoDB handles data storage and stream processing, with outputs including
    logs, metrics, and audits for comprehensive network system management and customer
    support.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 该图展示了电信提供商如何使用MongoDB作为核心数据平台构建AI驱动的网络聊天机器人。该架构集成了三个主要组件：通过聚合管道和向量搜索能力进行数据摄取；问题分析，其中用户查询被转换为嵌入以找到相关的网络数据，并使用嵌入模型和LLM进行上下文提示生成适当的数据库查询；以及自然语言输出生成。系统处理网络聊天交互（问题、答案、历史记录），而MongoDB处理数据存储和流处理，输出包括日志、指标和审计，以实现全面的网络系统管理和客户支持。
- en: First, network managers capture log entries and telemetry events, storing details
    such as IP addresses, geographic information, request paths, timestamps, router
    logs, and sensor data. Using Atlas Stream Processing, data can be collected and
    enriched in real time, providing a complete view of network activity.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，网络管理员捕获日志条目和遥测事件，存储诸如IP地址、地理信息、请求路径、时间戳、路由器日志和传感器数据等详细信息。使用Atlas流处理，数据可以实时收集和丰富，提供网络活动的完整视图。
- en: '![](img/B34136_08_04.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_08_04.png)'
- en: 'Figure 8.4: Data ingestion with Atlas Stream Processing'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4：使用Atlas流处理进行数据摄取
- en: This diagram illustrates the RAG architecture for network chatbots, showing
    how source data can be ingested and enriched using Atlas Stream Processing.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 此图说明了网络聊天机器人的RAG架构，展示了如何使用Atlas流处理摄取和丰富源数据。
- en: '![](img/B34136_08_05.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_08_05.png)'
- en: 'Figure 8.5: Question-based data selection with the MongoDB aggregation pipeline
    and Atlas Vector Search'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5：使用MongoDB聚合管道和Atlas向量搜索进行基于问题的数据选择
- en: This diagram demonstrates how the RAG system processes natural language queries
    from network managers, for example, `"What's causing the client's video streaming
    issue in Toronto?"`.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了RAG系统如何处理网络管理员的自然语言查询，例如，“多伦多客户端的视频流问题是由什么引起的？”
- en: The LLM first creates aggregation pipelines for structured data retrieval, while
    an embedding model performs semantic vector search to find contextually relevant
    information.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: LLM首先创建聚合管道以检索结构化数据，同时嵌入模型执行语义向量搜索以找到上下文相关的信息。
- en: Once the system identifies the relevant data, a subsequent LLM translates this
    information into a natural language explanation for the user. During this process,
    the LLM analyzes the retrieved data to detect patterns and anomalies, enabling
    precise identification of root cause candidates and supporting informed decision-making.
    For example, it might uncover that an overloaded local CDN node, along with high
    requests from older routers, is causing the problem.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦系统识别出相关数据，后续的LLM将此信息翻译成用户的自然语言解释。在此过程中，LLM分析检索到的数据以检测模式和异常，从而精确识别根本原因候选者并支持明智的决策。例如，它可能会发现一个过载的本地CDN节点，以及来自较老路由器的高请求，是导致问题的原因。
- en: '![](img/B34136_08_06.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](img/B34136_08_06.png)'
- en: 'Figure 8.6: Inference and natural language output'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6：推理和自然语言输出
- en: This diagram shows the final stage of the RAG architecture. Through context
    prompting, the LLM performs statistical inference and pattern detection on the
    selected data, translating network metrics into natural language explanations
    and actionable insights.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了RAG架构的最终阶段。通过上下文提示，LLM对所选数据进行统计推理和模式检测，将网络指标转换为自然语言解释和可操作的见解。
- en: The next era of AI-powered operations
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI驱动操作的下个时代
- en: 'This use case highlights how agentic AIOps and modern data platforms complement
    each other to transform network management through the following:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 此用例突出了代理式AIOps和现代数据平台如何相互补充，通过以下方式通过以下方式转变网络管理：
- en: '**Schema flexibility**: Document-based models effortlessly store logs, performance
    metrics, and user feedback in a single, consistent environment'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式灵活性**：基于文档的模型可以轻松地将日志、性能指标和用户反馈存储在单一、一致的环境中。'
- en: '**Real-time performance**: With horizontal scaling, you can ingest the massive
    volumes of data generated by network logs and user requests at any hour of the
    day'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实时性能**：通过横向扩展，您可以在任何一天中的任何时间摄取由网络日志和用户请求生成的海量数据。'
- en: '**Vector search integration**: By embedding textual data (such as logs, user
    complaints, or FAQs) and storing those vectors in the database, you enable instant
    retrieval of semantically relevant content, making it easy for an LLM to find
    what it needs'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量搜索集成**：通过嵌入文本数据（如日志、用户投诉或常见问题解答）并将这些向量存储在数据库中，您可以使用即时检索语义相关内容，使LLM轻松找到所需内容。'
- en: '**LLMs building aggregation pipelines**: LLMs can generate aggregation pipelines
    to examine numeric data with ease, while a second pass to the LLM composes a final
    summary that merges both numeric and textual analysis'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM构建聚合管道**：LLM可以轻松生成聚合管道来检查数值数据，而第二次LLM的遍历则组成一个最终摘要，该摘要合并了数值和文本分析。'
- en: Adopting this end-to-end workflow saves time and effort while enabling scalability
    across your organization. It streamlines tasks such as analyzing traffic spikes
    in specific regions, diagnosing security incidents, and managing peak periods.
    By combining modern data platforms such as MongoDB Atlas, LLMs, and RAG architecture,
    telecommunication providers can transform network operations into conversational,
    automated, and intelligent systems.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 采用这种端到端的工作流程可以节省时间和精力，同时使组织能够实现可扩展性。它简化了诸如分析特定地区流量激增、诊断安全事件和管理高峰时段等任务。通过结合MongoDB
    Atlas、LLM和RAG架构等现代数据平台，电信提供商可以将网络运营转变为对话式、自动化和智能系统。
- en: Fraud detection and prevention
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 欺诈检测与预防
- en: Telecom providers today are utilizing an array of techniques for detecting and
    preventing fraud, constantly adjusting to the dynamic nature of fraud in this
    space. Routine activities for detecting fraud include tracking unusual call trends
    and data usage, along with safeguarding against SIM swap incidents, a method frequently
    used for identity theft. To prevent fraud, strategies are applied at various levels,
    starting with stringent verification for new customers, during SIM swaps, or for
    significant transactions, taking into account each customer’s risk profile. These
    measures are vital to mitigate fraud’s harmful effects, such as financial losses,
    reputational damage, regulatory fines, and security risks that threaten network
    integrity.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的电信提供商正在使用一系列技术来检测和预防欺诈，不断适应这个领域欺诈的动态性质。常规的欺诈检测活动包括跟踪异常的通话趋势和数据使用，以及防范SIM卡交换事件，这是一种常用于身份盗窃的方法。为了预防欺诈，策略在多个层面上得到应用，从对新客户进行严格的验证开始，到SIM卡交换或重大交易，都要考虑每位客户的风险概况。这些措施对于减轻欺诈的有害影响至关重要，例如财务损失、声誉损害、监管罚款以及威胁网络完整性的安全风险。
- en: Machine learning offers telecommunication companies a powerful tool to enhance
    their fraud detection capabilities by training models on data, such as **call
    detail records** (**CDRs**). Moreover, these algorithms can assess the individual
    risk profile of each customer, tailoring detection strategies to their specific
    patterns of use, as outlined in *Figure 8.7*.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习为电信公司提供了一种强大的工具，通过在诸如**通话详细记录**（**CDRs**）等数据上训练模型，来增强其欺诈检测能力。此外，这些算法可以评估每位客户的个人风险概况，根据他们特定的使用模式定制检测策略，如*图8.7*所示。
- en: '![](img/B34136_08_07.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![](img/B34136_08_07.png)'
- en: 'Figure 8.7: Machine learning-driven fraud detection system'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.7：由机器学习驱动的欺诈检测系统
- en: This architectural diagram illustrates a comprehensive fraud detection system
    that processes data from multiple telecommunications channels (**Channel A** and
    **Channel X**) through a unified data store such as MongoDB Atlas.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 此架构图展示了处理来自多个电信渠道（**通道A**和**通道X**）数据的全面欺诈检测系统，这些数据通过MongoDB Atlas等统一数据存储进行处理。
- en: Machine learning models can adapt over time, learning from new data and emerging
    fraud tactics, enabling real-time detection and the automation of fraud prevention
    measures, which speeds up response times.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习模型可以随着时间的推移进行适应，从新的数据和新兴的欺诈策略中学习，实现实时检测和欺诈预防措施的自动化，从而加快响应时间。
- en: To deal with fraud successfully, a multitude of data dimensions need to be considered.
    With reaction time being a critical factor in preventing the worst outcomes, the
    solution must support fast decisions. By vectorizing the data with an appropriate
    ML model, normal (healthy) business can be defined, and deviations from the norm
    identified. In addition to vector search, MongoDB’s query APIs support stream
    processing, allowing for enrichment and filtering of data in real time.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功处理欺诈，需要考虑众多数据维度。反应时间是防止最坏结果的关键因素，因此解决方案必须支持快速决策。通过使用适当的机器学习模型对数据进行矢量化，可以定义正常（健康）的商业行为，并识别出偏离正常的行为。除了矢量搜索之外，MongoDB的查询API支持流处理，允许实时丰富和过滤数据。
- en: '**Real-time fraud detection at scale with MongoDB**'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用MongoDB进行大规模实时欺诈检测**'
- en: One of the customers utilizing MongoDB for its anti-fraud strategy is a leading
    U.S. telecommunication provider. The company selected MongoDB for its ability
    to ingest and store rapidly changing data. MongoDB Atlas also exceeds the provider’s
    key requirements for performance, availability, and security. The fraud prevention
    platform now operates over 50 different AI models, utilizes more than 1,200 features,
    stores 30 TB of data, and processes up to 20 million events daily. Events are
    processed in under 200 milliseconds, enabling real-time fraud detection and prevention.
    As a result, fraud, particularly iPhone-related fraud, which was previously a
    $1 billion problem, has been reduced by over 80%.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 一家利用MongoDB进行反欺诈策略的美国电信提供商是MongoDB的客户之一。该公司选择MongoDB是因为其能够快速摄取和存储变化的数据。MongoDB
    Atlas还满足了提供商对性能、可用性和安全性的关键要求。现在，反欺诈平台运行着超过50个不同的AI模型，利用超过1200个特征，存储30 TB的数据，并每天处理高达2000万事件。事件处理时间在200毫秒以下，实现了实时欺诈检测和预防。因此，欺诈，尤其是与iPhone相关的欺诈，之前是一个价值10亿美元的难题，现在已减少了超过80%。
- en: 'This example has been anonymized for editorial clarity. To learn more, see:
    [https://www.youtube.com/watch?v=gRw5xYAsz4U](https://www.youtube.com/watch?v=gRw5xYAsz4U).'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例已被匿名化以增强编辑清晰度。了解更多信息，请参阅：[https://www.youtube.com/watch?v=gRw5xYAsz4U](https://www.youtube.com/watch?v=gRw5xYAsz4U)。
- en: '![](img/Spotlight_Icon1.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![Spotlight_Icon1](img/Spotlight_Icon1.png)'
- en: The expanding role of AI in media and telecommunication
  id: totrans-120
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能在媒体和电信中的扩展作用
- en: AI is reshaping the media and telecommunication industries by enabling smarter,
    faster, and more personalized content, while enabling operational agility and
    innovation. From AI-augmented content discovery to network automation, the integration
    of intelligent systems has become a critical business requirement. However, AI’s
    transformative potential in these industries extends far beyond these core domains.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能通过实现更智能、更快、更个性化的内容，同时使运营敏捷性和创新成为可能，正在重塑媒体和电信行业。从人工智能增强的内容发现到网络自动化，智能系统的集成已成为一项关键的商业需求。然而，人工智能在这些行业中的变革潜力远远超出了这些核心领域。
- en: AI is also driving innovation through differential pricing strategies, backend
    automation, and legacy modernization efforts. These use cases further exemplify
    how AI is enhancing operational efficiency and transforming processes for telecom
    and media providers. By leveraging emerging technologies that prioritize autonomous
    decision-making and continuous optimization, businesses are able to adapt to an
    ever-changing marketplace.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）也通过差异定价策略、后端自动化和遗产现代化努力推动创新。这些用例进一步说明了人工智能如何提高电信和媒体提供商的运营效率并转变流程。通过利用优先考虑自主决策和持续优化的新兴技术，企业能够适应不断变化的市场。
- en: Differential pricing
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 差异定价
- en: For media and telecommunication organizations, AI-powered applications can gather
    insights into what customers are willing to spend on content or a service by conducting
    A/B tests and analyzing the data with an ML algorithm.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 对于媒体和电信组织，AI驱动的应用程序可以通过进行A/B测试和用机器学习算法分析数据，来了解客户愿意在内容或服务上花费多少。
- en: With this information, organizations can adopt dynamic pricing models instead
    of sticking to a standard price list, thereby increasing the overall revenue and
    expanding the paying customer base.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 利用这些信息，组织可以采用动态定价模型，而不是坚持标准价格表，从而增加整体收入并扩大付费客户群。
- en: Video search and clipping
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视频搜索和剪辑
- en: With the new embedding models of **Voyage AI** [8], which became part of MongoDB
    in 2025, it is possible to create multimodal embeddings to deliver fundamentally
    new search experiences for videos. You can use natural language to describe which
    video sequence you want to watch (for example, `"Show me Mario Götze shooting
    the winning goal at the FIFA world cup final in 2014"`) and the system will be
    able to find the right video, including the offset within the video where the
    requested action takes place, providing a clip back to the user.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 随着**Voyage AI** [8]的新嵌入模型，该模型于2025年成为MongoDB的一部分，现在可以创建多模态嵌入，为视频提供全新的搜索体验。您可以使用自然语言描述您想观看的视频序列（例如，`“Show
    me Mario Götze shooting the winning goal at the FIFA world cup final in 2014”`），系统将能够找到正确的视频，包括视频内请求动作发生的位置偏移，并将剪辑返回给用户。
- en: '**How a global telecom leader accelerated developer velocity**'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**全球电信领导者如何加速开发者速度**'
- en: A leading telecommunication provider revolutionized its software development
    by adopting a **telco-as-a-service** (**TaaS**) model with MongoDB Atlas. This
    strategic move to serverless computing accelerated secure app delivery, reduced
    costs, and empowered developers to deploy code faster, enhancing both innovation
    and customer experience.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 一家领先的电信服务提供商通过采用MongoDB Atlas的**电信即服务**（**TaaS**）模式，对其软件开发进行了革命性的改变。这一战略性的无服务器计算转型加速了安全应用的交付，降低了成本，并使开发者能够更快地部署代码，从而提升了创新能力和客户体验。
- en: 'This example has been anonymized for editorial clarity. To learn more, see:
    [https://mdb.link/new-developer-speed-and-dexterity](https://mdb.link/new-developer-speed-and-dexterity).'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 为了编辑清晰，此示例已被匿名化。欲了解更多信息，请参阅：[https://mdb.link/new-developer-speed-and-dexterity](https://mdb.link/new-developer-speed-and-dexterity)。
- en: '![](img/Spotlight_Icon1.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![Spotlight_Icon1.png](img/Spotlight_Icon1.png)'
- en: For more information and resources, visit the *MongoDB for Media and Entertainment*
    page at [https://www.mongodb.com/solutions/industries/media-and-entertainment](https://www.mongodb.com/solutions/industries/media-and-entertainment)
    and *MongoDB for Telecommunications* page at [https://www.mongodb.com/solutions/industries/telecommunications](https://www.mongodb.com/solutions/industries/telecommunications).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如需更多信息及资源，请访问[MongoDB媒体和娱乐页面](https://www.mongodb.com/solutions/industries/media-and-entertainment)和[MongoDB电信页面](https://www.mongodb.com/solutions/industries/telecommunications)。
- en: Summary
  id: totrans-133
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we’ve explored how AI is revolutionizing the media and telecommunication
    industries through personalized content experiences, SGE, enhanced network management,
    and fraud prevention. These AI-driven strategies are improving operational efficiency
    while fundamentally transforming how these industries engage with customers and
    deliver services.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了人工智能如何通过个性化内容体验、SGE、增强的网络管理和欺诈预防，革命性地改变媒体和电信行业。这些由人工智能驱动的策略正在提高运营效率，从根本上改变这些行业与客户互动和服务交付的方式。
- en: Modern data platforms such as MongoDB provide the flexible, scalable foundation
    needed to support these AI initiatives, enabling organizations to store diverse
    data types, perform vector searches, and integrate with LLMs for natural language
    processing. The combination of AI capabilities with data infrastructure is helping
    media and telecommunication companies overcome some of the biggest industry challenges,
    from declining referral traffic to ever tightening profit margins, while creating
    amazing new opportunities for innovation.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 现代数据平台如MongoDB提供了灵活、可扩展的基础，以支持这些人工智能项目，使组织能够存储多种数据类型，执行向量搜索，并与LLMs进行自然语言处理集成。将人工智能能力与数据基础设施相结合，正帮助媒体和电信公司克服一些最大的行业挑战，从下降的推荐流量到不断缩小的利润空间，同时创造了创新的新机遇。
- en: The next chapter will explore how AI is transforming the retail industry. We’ll
    delve into how retailers are leveraging AI for personalized shopping experiences,
    inventory optimization, demand forecasting, and seamless omnichannel integration
    to meet evolving consumer expectations in an increasingly competitive marketplace.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将探讨人工智能如何改变零售行业。我们将深入探讨零售商如何利用人工智能实现个性化的购物体验、库存优化、需求预测以及无缝的多渠道集成，以满足日益竞争的市场中不断变化的消费者期望。
