- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we learned about SSE and how to build a server using it.
  prefs: []
  type: TYPE_NORMAL
- en: We also learned about the differences between STDIO and SSE when it comes to
    testing tools and how to use the Inspector tool with SSE. The difference is that
    STDIO listens to `stdin` and `stdout` while SSE listens to HTTP requests. SSE
    can also be used to stream responses from LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we built our own SSE server and tested it using the Inspector tool
    and cURL.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will look into another transport called Streamable HTTP,
    which is the preferred transport to use when exposing a server via a URL.
  prefs: []
  type: TYPE_NORMAL
