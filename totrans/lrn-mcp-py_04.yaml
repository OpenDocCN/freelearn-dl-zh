  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This will tell the server we’re ready to communicate.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这将告诉服务器我们已准备好进行通信。
