  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查工具
- en: 'Let’s try the Inspector tool using the visual interface. Start the Inspector
    tool using the command line:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试使用可视化界面使用检查工具。使用命令行启动检查工具：
