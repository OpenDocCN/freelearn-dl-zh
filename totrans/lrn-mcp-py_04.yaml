  prefs: []
  type: TYPE_NORMAL
  zh: 在运行服务器的新的终端窗口中运行以下命令。
- en: '[PRE17]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Set the following fields in the UI:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在 UI 中设置以下字段：
- en: '**Transport Type**: **SSE**'
