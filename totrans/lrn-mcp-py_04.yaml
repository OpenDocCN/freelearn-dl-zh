  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**功能请求**：以下 `curl` 命令是请求列出 MCP 服务器上的工具。'
- en: The following command should be run in the *same terminal as the previous command*.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 以下命令应在与上一个命令相同的终端中运行。
- en: '[PRE24]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'You should now see a response in the *first terminal* you used when you initialized
    the connection. It should look similar to the following:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你应该会在初始化连接时使用的第一个终端中看到响应。它应该看起来类似于以下内容：
- en: '[PRE25]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: As a recommendation, I prefer to use the Inspector tool as it provides a better
    experience and is easier to use. The `curl` command is more of a low-level approach
    and could be nice to use to get an initial session ID. It does tell you how the
    underlying protocol works, which can be helpful for debugging.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 作为建议，我更喜欢使用检查器工具，因为它提供了更好的体验并且更容易使用。`curl` 命令更像是低级方法，可以用来获取初始会话 ID。它确实告诉你底层协议是如何工作的，这对于调试可能很有帮助。
- en: Summary
  id: totrans-143
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we learned about SSE and how to build a server using it.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们学习了 SSE 以及如何使用它构建服务器。
- en: We also learned about the differences between STDIO and SSE when it comes to
    testing tools and how to use the Inspector tool with SSE. The difference is that
    STDIO listens to `stdin` and `stdout` while SSE listens to HTTP requests. SSE
    can also be used to stream responses from LLMs.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还学习了在测试工具方面 STDIO 和 SSE 的区别，以及如何使用检查器工具与 SSE 一起使用。区别在于 STDIO 监听 `stdin` 和
    `stdout`，而 SSE 监听 HTTP 请求。SSE 还可以用来从 LLMs 流式传输响应。
- en: Finally, we built our own SSE server and tested it using the Inspector tool
    and cURL.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们构建了自己的 SSE 服务器，并使用检查器工具和 cURL 进行了测试。
- en: In the next chapter, we will look into another transport called Streamable HTTP,
    which is the preferred transport to use when exposing a server via a URL.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨另一种名为可流式 HTTP 的传输方式，这是通过 URL 公开服务器时首选的传输方式。
