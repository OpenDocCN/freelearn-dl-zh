  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用应用程序的名称创建了一个 `FastMCP` 实例。特别注意 `mcp.sse_app()` 方法帮助我们挂载 SSE 握手和消息路由的端点。
- en: Add features
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 添加功能
- en: The next step is about adding features to your server. As mentioned, there’s
    no difference between STDIO and SSE when it comes to features. You can use the
    same decorators and methods to create features.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是向你的服务器添加功能。如前所述，当涉及到功能时，STDIO 和 SSE 之间没有区别。你可以使用相同的装饰器和方法来创建功能。
- en: 'In the same file, add the following code:'
