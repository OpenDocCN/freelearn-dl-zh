- en: The syntax is `uvicorn <filename>:<app>`, where `<filename>` is the name of
    your Python file and `<app>` is the name of your ASGI app.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 语法是 `uvicorn <filename>:<app>`，其中 `<filename>` 是你的 Python 文件名，而 `<app>` 是你的
    ASGI 应用程序名。
- en: 'Start the **Inspect** tool using the command line:'
