- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Building SSE Servers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So far, you’ve seen how you can build MCP servers using STDIO as transport.
    That’s a great choice of transport for servers meant to run locally. However,
    if you want to connect to servers remotely via HTTP or if you want responses from
    LLMs streamed, then there’s another transport called **Server-Sent Events** (**SSE**)
    better suited to this scenario.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ll focus on building and testing MCP servers using SSE as
    transport.
  prefs: []
  type: TYPE_NORMAL
- en: 'The chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: SSE concepts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating an SSE server as a web app
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing with SSE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating an SSE server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dive into the details of SSE and how to build a server using it.
  prefs: []
  type: TYPE_NORMAL
- en: SSE concepts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are some concepts we need to understand before we can start building our
    server. First off, a server using SSE as transport is a server that can be accessed
    via HTTP. That means, even if it can run locally, it can also be accessed remotely.
    The implications of this are that this is a server that we need to expose using
    a web server.
  prefs: []
  type: TYPE_NORMAL
- en: 'SSE is a standard for unidirectional communication from server to client over
    a single, long-lived HTTP connection. It allows servers to push real-time updates
    to clients without requiring the client to poll for changes. Here are some more
    details:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Protocol**: SSE uses standard HTTP with the MIME type text/event-stream'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Client API**: The browser uses the EventSource API to receive events'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Format**: Messages are sent as plain text with fields such as `event`, `data`,
    and `id`, each terminated by two endlines'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s typically used for dashboard-like applications where real-time updates
    are crucial.
  prefs: []
  type: TYPE_NORMAL
- en: 'In MCP, SSE is split up into two parts: the part where we connect to the server
    and perform initialization (e.g., *handshake*), and a message part where we apply
    messages to the server that ends up reading or writing data. So, we need to implement
    the following endpoints:'
  prefs: []
  type: TYPE_NORMAL
- en: '**SSE endpoint**: This endpoint is used as a way to handshake the connection
    between the client and the server. By sending a request to this endpoint, the
    client will receive a response that will keep the connection open.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Message endpoint**: This endpoint is what’s used to route messages to the
    MCP server and its features.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It should be said that, depending on the chosen runtime and SDK, you may need
    to implement these endpoints yourself, but for some runtimes, it happens under
    the hood. Regardless, it’s good to know how it works and what the endpoints are
    doing.
  prefs: []
  type: TYPE_NORMAL
- en: Creating an SSE server as a web app
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The big difference compared to using the STDIO transport is that we need to
    expose an SSE server as a web application. Depending on whether we use Python
    or TypeScript, that means we need to implement the necessary HTTP endpoints.
  prefs: []
  type: TYPE_NORMAL
- en: Specifically for Python, we need to leverage a framework supporting **Asynchronous
    Server Gateway Interface** (**ASGI**). ASGI is a specification that allows Python
    web frameworks to handle asynchronous and synchronous code, making it ideal for
    modern web applications. Let us look at Starlette.
  prefs: []
  type: TYPE_NORMAL
- en: Starlette
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Starlette** is a lightweight ASGI framework that we will use to build our
    SSE server. Previously, we mentioned endpoints that needed to be implemented,
    and Starlette will help us with that. It provides a simple way to create an ASGI
    application and handle routing, middleware, and other features.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at how Starlette works and then explain in more detail how to build
    an SSE server using it.
  prefs: []
  type: TYPE_NORMAL
- en: 'A typical application using Starlette will look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding code, we’ve done the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Imported the necessary modules from Starlette
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defined a simple `homepage` function that returns a JSON response
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The next step is to run it. We can use a server such as `uvicorn` to run our
    Starlette application:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Here, we are using `uvicorn` to run the application. The syntax is `uvicorn
    <filename>:<name of app instance>`. In this case, the filename is `main.py` and
    the app instance is `app`.
  prefs: []
  type: TYPE_NORMAL
- en: Starlette and MCP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To use Starlette with MCP, we can create the following application:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding code, we are doing the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Importing the necessary modules from Starlette and MCP.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating an instance of `FastMCP` with the name of the application. Note especially
    the `mcp.sse_app()` method. This is the method that creates the SSE server and
    mounts it to the existing ASGI server. What happens under the hood is that it
    creates the SSE endpoint and the message endpoint for you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If you’re interested in diving into the Python SDK to see how this is done,
    you can check [https://github.com/modelcontextprotocol/python-sdk/blob/e80c0150e1c2e45f66195d3cf7d209be31ce6e5d/src/mcp/server/fastmcp/server.py#L747](https://github.com/modelcontextprotocol/python-sdk/blob/e80c0150e1c2e45f66195d3cf7d209be31ce6e5d/src/mcp/server/fastmcp/server.py#L747),
    and you will see the following code as part of the `sse_app()` method:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, both the SSE endpoint and the message endpoint are created for
    you by calling the `sse_app()` method.
  prefs: []
  type: TYPE_NORMAL
- en: What about features using SSE, do they work the same way as STDIO? Yes, they
    do. You can use the same decorators and methods to create features. The only difference
    is that you need to use the `mcp.sse_app()` method to create the SSE server and
    mount it to the existing ASGI server.
  prefs: []
  type: TYPE_NORMAL
- en: Testing with SSE
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are differences, though, when it comes to how testing tools using SSE
    work. Let’s list the differences:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Inspector tool**: The **Inspector** tool is a command-line tool that allows
    you to test your server using both a visual interface and a command-line interface.
    The difference between STDIO and SSE is that you need to specify **Transport Type**
    as **SSE** and **URL** as `http://<address>:<port>/sse`. This is something you
    need to do when using the visual interface.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For the CLI mode, you need to specify a URL instead of how to run the server.
    So, the following command will work, provided you have the server running at `localhost:8000`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s see the difference in the visual interface:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.1 – Inspector tool, visual mode, SSE](img/B31121_04_01.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.1 – Inspector tool, visual mode, SSE
  prefs: []
  type: TYPE_NORMAL
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
    the next-gen Packt Reader or view it in the PDF/ePub copy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/21.png)**The next-gen Packt Reader** and a **free PDF/ePub copy** of
    this book are included with your purchase. Scan the QR code OR visit [https://packtpub.com/unlock](https://packtpub.com/unlock),
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/Unlock1.png)'
  prefs: []
  type: TYPE_IMG
- en: Note how **Transport Type** is set to `SSE` and **URL** is set to `http://localhost:8000/sse`.
    Remember with STDIO how we didn’t have a **URL** field and rather a field to specify
    how to run the server? This is the difference between STDIO and SSE when it comes
    to the Inspector tool.
  prefs: []
  type: TYPE_NORMAL
- en: '**Web client**: Because the SSE server is running on HTTP, you can use any
    HTTP client to test it. This includes tools such as Postman, cURL, or even your
    web browser. To use cURL, you can use the following command:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Get the session ID:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: 'This will produce a response like this:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE6]text'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'event: endpoint'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'data: http://localhost:5001/messages?session_id=<my session   id>'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Use the session ID to send a message to the server on the message endpoint.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure you send this in another terminal instance. The answer to this request
    will appear in the first terminal though.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Send a message to the server, such as listing tools, in a separate terminal
    from the one that you sent the initialize request to.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: So, yes, it’s possible to do this using cURL, but it’s a bit cumbersome, which
    makes the inspector tool a great choice for testing your server – also for SSE.
  prefs: []
  type: TYPE_NORMAL
- en: Creating an SSE server
