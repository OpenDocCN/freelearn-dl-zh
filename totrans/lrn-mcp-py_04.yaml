  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试它
- en: We will test our server in three different ways.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将以三种不同的方式测试我们的服务器。
- en: '**Inspector tool, as a visual interface**: This is a good way to test your
    server and see how it works'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检查工具，作为可视化界面**：这是一种测试服务器并查看其工作方式的好方法'
- en: '**Inspector tool with the CLI option**: The CLI option provides a response
    directly in the command line. This is a good way to test your servers in, for
    example, CI/CD pipelines.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**带有 CLI 选项的检查工具**：CLI 选项直接在命令行中提供响应。这是一种在例如 CI/CD 管道中测试服务器的好方法。'
- en: '**Using a client**: Here, we’ll use cURL to test that our server responds to
    requests. This is a good way to quickly test your server.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用客户端**：在这里，我们将使用 cURL 来测试我们的服务器是否能够响应请求。这是一种快速测试服务器的好方法。'
