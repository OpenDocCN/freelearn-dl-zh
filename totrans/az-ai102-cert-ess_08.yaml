- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Working on Generative AI Solutions
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 专注于生成式AI解决方案
- en: Since the release of GPT-3.5 on November 30, 2022, generative AI technologies
    have rapidly evolved, offering unprecedented capabilities in content creation,
    automation, and user interaction. With growing enterprise demand and innovation
    in foundational models, Microsoft has introduced **Azure AI Foundry**—a unified,
    production-ready platform that accelerates the development and deployment of AI
    solutions. In this chapter, we’ll build on that foundation and explore how to
    apply **Azure OpenAI** to create intelligent applications that generate text,
    code, images, and more.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 自从2022年11月30日发布GPT-3.5以来，生成式人工智能技术迅速发展，在内容创作、自动化和用户交互方面提供了前所未有的能力。随着企业需求的增长和基础模型方面的创新，微软推出了**Azure
    AI Foundry**——一个统一、生产就绪的平台，可加速AI解决方案的开发和部署。在本章中，我们将在此基础上构建，并探讨如何应用**Azure OpenAI**来创建生成文本、代码、图像等智能应用。
- en: By the end of this chapter, you will have practical knowledge of how to provision
    Azure OpenAI resources, deploy powerful generative models, and integrate them
    into end-to-end workflows. We’ll guide you through using Azure OpenAI APIs to
    send prompts and receive meaningful responses, and demonstrate capabilities such
    as DALL-E image generation and conversational AI powered by GPT-4o.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将具备如何提供Azure OpenAI资源、部署强大的生成模型以及将它们集成到端到端工作流程中的实际知识。我们将指导您使用Azure OpenAI
    API发送提示并接收有意义的响应，并展示DALL-E图像生成和由GPT-4o驱动的对话式AI等能力。
- en: Beyond basic usage, this chapter also explores how to extend model capabilities
    through techniques such as **prompt engineering**, **fine-tuning**, and **R****etrieval-Augmented
    Generation** (**RAG**). These approaches allow you to tailor AI behavior for specialized
    tasks and securely integrate your organization’s data, unlocking more precise,
    trustworthy outputs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 除了基本使用之外，本章还探讨了如何通过**提示工程**、**微调**和**检索增强生成**（**RAG**）等技术扩展模型功能。这些方法允许您针对特定任务定制AI行为，并安全地集成您组织的数据，从而解锁更精确、更可靠的输出。
- en: 'By the end of this chapter, you will be able to do the following:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将能够执行以下操作：
- en: Provision a hub and project and attach AI services using Azure AI Foundry
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Azure AI Foundry提供中心节点和项目，并附加AI服务
- en: Provision an Azure OpenAI resource and deploy models
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供Azure OpenAI资源并部署模型
- en: Utilize Azure OpenAI APIs to submit prompts and receive tailored responses
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用Azure OpenAI API提交提示并接收定制响应
- en: Configure parameters to optimize generative AI model behavior
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置参数以优化生成式AI模型行为
- en: Apply prompt engineering techniques to improve AI responses
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用提示工程技术以改进AI响应
- en: Generate images using the DALL-E model
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用DALL-E模型生成图像
- en: Integrate your data with Azure OpenAI models for customized solutions
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将您的数据与Azure OpenAI模型集成以实现定制化解决方案
- en: Fine-tune Azure OpenAI models to better suit specific business needs
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调Azure OpenAI模型以更好地满足特定业务需求
- en: Let’s get started!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Azure AI Foundry
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Azure AI Foundry
- en: Azure AI Foundry serves as a comprehensive platform that brings together AI
    infrastructure, model development, and application building under a single, enterprise-grade
    environment. It combines robust backend systems with intuitive interfaces, empowering
    organizations to confidently create, deploy, and manage generative AI applications.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Foundry作为一个综合平台，将AI基础设施、模型开发和应用程序构建整合在一个单一的企业级环境中。它结合了强大的后端系统与直观的界面，使组织能够自信地创建、部署和管理生成式AI应用。
- en: 'The platform is built specifically for developers who want to do the following:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 该平台专为希望执行以下任务的开发者构建：
- en: Design and deploy generative AI solutions within a secure, production-ready
    environment
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在安全、生产就绪的环境中设计和部署生成式AI解决方案
- en: Access a suite of advanced AI tools and machine learning models, all aligned
    with responsible AI standards
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问一系列先进的AI工具和机器学习模型，所有这些都与负责任的AI标准保持一致
- en: Collaborate seamlessly across teams throughout the entire application development
    life cycle
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在整个应用程序开发生命周期中与团队无缝协作
- en: With Azure AI Foundry, you have access to a broad ecosystem of models, services,
    and features that allow you to turn your AI ideas into production-ready solutions.
    It supports scaling from experimental prototypes to full enterprise deployments,
    with built-in monitoring and optimization tools that ensure ongoing operational
    excellence.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Azure AI Foundry，您可以访问一个广泛的模型、服务和功能生态系统，让您将AI想法转化为生产就绪的解决方案。它支持从实验原型到完整企业部署的扩展，内置监控和优化工具确保持续的操作卓越。
- en: When you first navigate to the Azure AI Foundry portal, you’ll notice that everything
    is structured around **projects**. Projects act as organized containers where
    you manage your models, prompts, agents, and data integration. Even before creating
    your first project, you can explore a wide range of available models and AI services.
    Once you’re ready to start building, Azure AI Foundry naturally guides you through
    project creation, unlocking the full breadth of AI capabilities designed for real-world
    impact.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 当您首次导航到Azure AI Foundry门户时，您会注意到一切都是围绕**项目**组织的。项目作为有组织的容器，您在其中管理模型、提示、代理和数据集成。即使在创建您的第一个项目之前，您也可以探索广泛的可用模型和AI服务。一旦准备好开始构建，Azure
    AI Foundry自然会引导您通过项目创建，解锁专为现实世界影响设计的AI能力的全部范围。
- en: Overview of Azure AI Foundry
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Azure AI Foundry概述
- en: 'Azure AI Foundry provides a structured foundation for building and managing
    generative AI solutions at scale. At the heart of the platform is a **hub-and-project
    architecture**, which allows organizations to centralize governance while empowering
    teams with flexibility and autonomy:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: Azure AI Foundry为大规模构建和管理生成式AI解决方案提供了一个结构化的基础。平台的核心是一个**中心节点与项目架构**，它允许组织集中治理，同时赋予团队灵活性和自主权：
- en: '**Hub**: This acts as the central command center for your AI ecosystem. It
    houses foundational models, reusable templates, compliance policies, and configuration
    standards. The hub ensures consistency, enforces security, and promotes reuse
    across all AI projects in the organization.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**中心节点**: 这充当您AI生态系统的中央指挥中心。它包含基础模型、可重用模板、合规政策和配置标准。中心节点确保一致性，执行安全性，并促进组织内所有AI项目之间的重用。'
- en: '**Project**: This functions as a customizable and isolated workspace where
    specific AI applications are developed. Azure AI Foundry supports two project
    types: **Foundry projects** (standalone projects for individual development or
    exploration) and **hub-based projects** (which inherit governance, policies, and
    shared assets from an organizational hub). Hub-based projects are ideal for scaling
    enterprise AI solutions with consistent governance, while Foundry projects offer
    more flexibility for experimentation. Within either project type, teams can configure
    their own prompts, agents, orchestration flows, and data connectors tailored to
    business needs. For more details, visit [https://learn.microsoft.com/en-us/azure/ai-foundry/what-is-azure-ai-foundry#project-types](https://learn.microsoft.com/en-us/azure/ai-foundry/what-is-azure-ai-foundry#project-types).'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**项目**: 这作为一个可定制的隔离工作空间，用于开发特定的AI应用。Azure AI Foundry支持两种项目类型：**Foundry项目**（用于个人开发或探索的独立项目）和**基于中心节点的项目**（从组织中心节点继承治理、政策和共享资产）。基于中心节点的项目非常适合以一致的治理扩展企业级AI解决方案，而Foundry项目则提供更多灵活性以进行实验。在任一项目类型中，团队都可以配置自己的提示、代理、编排流程和数据连接器，以满足业务需求。有关更多详细信息，请访问[https://learn.microsoft.com/en-us/azure/ai-foundry/what-is-azure-ai-foundry#project-types](https://learn.microsoft.com/en-us/azure/ai-foundry/what-is-azure-ai-foundry#project-types)。'
- en: '**Attach AI services and models**: Within a project, developers can connect
    to Azure AI services such as Azure OpenAI, Azure AI Search, or custom APIs. They
    can deploy foundational models (such as GPT-4), integrate RAG capabilities, and
    orchestrate interactions between multiple AI components to build complete end-to-end
    solutions.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**附加AI服务和模型**: 在一个项目中，开发者可以连接到Azure AI服务，例如Azure OpenAI、Azure AI Search或自定义API。他们可以部署基础模型（如GPT-4），集成RAG功能，并编排多个AI组件之间的交互以构建完整的端到端解决方案。'
- en: This separation of concerns—governance in the hub and solution-building in the
    project—enables enterprises to scale AI initiatives with confidence, ensuring
    operational control while supporting agile, innovation-driven development.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这种关注点的分离——在中心节点进行治理和在项目中构建解决方案——使企业能够有信心地扩展AI计划，确保操作控制同时支持敏捷、创新驱动的开发。
- en: 'Exercise 1: Creating a hub, project, and AI service in the Azure portal'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习1：在Azure门户中创建中心节点、项目和AI服务
- en: In this exercise, you’ll explore the **Azure AI Foundry model catalog**, after
    which you’ll deploy the Phi-3.5-mini-instruct model and evaluate its behavior
    using natural language queries. This hands-on experience will help you practice
    comparing model details, deploying a model, and interacting with it in the chat
    playground.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在本练习中，您将探索**Azure AI Foundry 模型目录**，之后您将部署 Phi-3.5-mini-instruct 模型并使用自然语言查询评估其行为。这种动手经验将帮助您练习比较模型细节、部署模型以及在聊天游乐场中与之交互。
- en: 'Step 1: Creating an Azure AI hub and project'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 1 步：创建 Azure AI 中心和项目
- en: 'With your hub and project in place, you’re now ready to deploy and interact
    with powerful AI models directly within your Azure AI Foundry project:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的中心和服务项目就绪后，您现在可以部署并直接在 Azure AI Foundry 项目中与强大的 AI 模型交互：
- en: Go to [https://ai.azure.com/](https://ai.azure.com/) to open Azure AI Foundry
    in your browser and sign in.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往 [https://ai.azure.com/](https://ai.azure.com/) 在浏览器中打开 Azure AI Foundry 并登录。
- en: On the home page, click **+ Create project**, select **Azure AI Foundry resource**
    as the recommended project type, and click **Next** to continue.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在主页上，点击**+ 创建项目**，选择**Azure AI Foundry 资源**作为推荐的项目类型，然后点击**下一步**继续。
- en: 'In the creation wizard, do the following:'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在创建向导中，执行以下操作：
- en: 'Enter `ai-data-demo` as the project name, as shown here:'
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将项目名称输入为 `ai-data-demo`，如图所示：
- en: '![Figure 8.1 – Creating a project](img/B31034_08_01.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.1 – 创建项目](img/B31034_08_01.jpg)'
- en: Figure 8.1 – Creating a project
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 – 创建项目
- en: If a hub isn’t already selected, choose to create a new hub by selecting **Advanced
    options**
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果尚未选择中心，请选择通过选择**高级选项**创建一个新的中心。
- en: Click **Create** to set up Azure AI Foundry.
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**创建**以设置 Azure AI Foundry。
- en: 'Step 2: Deploying the GPT-4o model in your Azure AI Foundry project'
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 2 步：在 Azure AI Foundry 项目中部署 GPT-4o 模型
- en: 'Next, you’ll need to deploy the GPT-4o model so it can be used later for inference
    tasks within your AI Foundry project:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要部署 GPT-4o 模型，以便以后在您的 AI Foundry 项目中进行推理任务：
- en: In your Azure AI Foundry project, navigate to the **My** **assets** section.
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的 Azure AI Foundry 项目中，导航到**我的** **资产**部分。
- en: Click on **Models +** **endpoints**.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**模型 + 端点**。
- en: Click **+ Deploy model**, then select **Deploy** **base model**.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**+ 部署模型**，然后选择**部署** **基础模型**。
- en: From the list of available models, choose **GPT-4o** and click **Confirm**.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从可用模型列表中选择**GPT-4o**并点击**确认**。
- en: 'Click **Customize**, then configure the deployment settings:'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**自定义**，然后配置部署设置：
- en: '**Model** **version**: **2024-08-06**'
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型** **版本**：**2024-08-06**'
- en: '**Tokens per Minute Rate Limit (****thousands)**: **200,000**'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每分钟令牌速率限制（****千）**：**200,000**'
- en: Click **Deploy** and wait for the model to become active.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**部署**并等待模型变得活跃。
- en: 'Step 3: Setting up your local development environment'
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 3 步：设置您的本地开发环境
- en: 'To run the following code locally, you’ll need to create a Python virtual environment,
    install dependencies, and configure environment variables:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 要在本地运行以下代码，您需要创建一个 Python 虚拟环境，安装依赖项，并配置环境变量：
- en: Open a terminal and navigate to the `firstchat-with-AIFoundry.ipynb` file in
    the `chapter-8/exercise1` project folder.
  id: totrans-53
  prefs:
