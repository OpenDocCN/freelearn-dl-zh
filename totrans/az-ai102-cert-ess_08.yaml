- en: 'Part 3: Agentic AI Solutions, Applying Real-World Use Cases, and Preparing
    for the AI-102 Certification'
  id: totrans-323
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分：代理式AI解决方案、应用实际案例和准备AI-102认证
- en: '*Part 3* explores how to design and implement agentic solutions using Azure
    AI Agent Service, along with supporting frameworks such as Semantic Kernel and
    AutoGen. It covers everything from foundational concepts to advanced multi-agent
    orchestration. You’ll also engage in practical AI applications through hands-on
    projects and proven technical patterns, including building custom copilots, enabling
    secure chat-based retrieval with proprietary data, and automating document processing
    and summarization using RAG, Document Intelligence, and AI Search with integrated
    vectorization. Finally, this part offers comprehensive preparation for the *AI-102:
    Azure AI Engineer Associate Certification* exam, including exam strategies, topic
    breakdowns, and a full-length practice test to help you assess your readiness
    and succeed with confidence.'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: '*第三部分* 探讨了如何使用 Azure AI Agent 服务以及支持框架如语义内核和 AutoGen 设计和实现代理解决方案。它涵盖了从基础概念到高级多代理编排的所有内容。你还将通过动手项目和经过验证的技术模式参与实际的人工智能应用，包括构建自定义共飞行员、启用使用专有数据的基于安全的聊天检索，以及使用
    RAG、文档智能和集成向量化的人工智能搜索自动化文档处理和摘要。最后，本部分为 *AI-102：Azure AI 工程师助理认证* 考试提供了全面的准备，包括考试策略、主题分解和全长度模拟测试，以帮助你评估你的准备情况并自信地成功。'
