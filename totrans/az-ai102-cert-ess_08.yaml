- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Working on Generative AI Solutions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Since the release of GPT-3.5 on November 30, 2022, generative AI technologies
    have rapidly evolved, offering unprecedented capabilities in content creation,
    automation, and user interaction. With growing enterprise demand and innovation
    in foundational models, Microsoft has introduced **Azure AI Foundry**—a unified,
    production-ready platform that accelerates the development and deployment of AI
    solutions. In this chapter, we’ll build on that foundation and explore how to
    apply **Azure OpenAI** to create intelligent applications that generate text,
    code, images, and more.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you will have practical knowledge of how to provision
    Azure OpenAI resources, deploy powerful generative models, and integrate them
    into end-to-end workflows. We’ll guide you through using Azure OpenAI APIs to
    send prompts and receive meaningful responses, and demonstrate capabilities such
    as DALL-E image generation and conversational AI powered by GPT-4o.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond basic usage, this chapter also explores how to extend model capabilities
    through techniques such as **prompt engineering**, **fine-tuning**, and **R****etrieval-Augmented
    Generation** (**RAG**). These approaches allow you to tailor AI behavior for specialized
    tasks and securely integrate your organization’s data, unlocking more precise,
    trustworthy outputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'By the end of this chapter, you will be able to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Provision a hub and project and attach AI services using Azure AI Foundry
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provision an Azure OpenAI resource and deploy models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Utilize Azure OpenAI APIs to submit prompts and receive tailored responses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure parameters to optimize generative AI model behavior
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apply prompt engineering techniques to improve AI responses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate images using the DALL-E model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrate your data with Azure OpenAI models for customized solutions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tune Azure OpenAI models to better suit specific business needs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: Azure AI Foundry
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Azure AI Foundry serves as a comprehensive platform that brings together AI
    infrastructure, model development, and application building under a single, enterprise-grade
    environment. It combines robust backend systems with intuitive interfaces, empowering
    organizations to confidently create, deploy, and manage generative AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'The platform is built specifically for developers who want to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Design and deploy generative AI solutions within a secure, production-ready
    environment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access a suite of advanced AI tools and machine learning models, all aligned
    with responsible AI standards
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Collaborate seamlessly across teams throughout the entire application development
    life cycle
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With Azure AI Foundry, you have access to a broad ecosystem of models, services,
    and features that allow you to turn your AI ideas into production-ready solutions.
    It supports scaling from experimental prototypes to full enterprise deployments,
    with built-in monitoring and optimization tools that ensure ongoing operational
    excellence.
  prefs: []
  type: TYPE_NORMAL
- en: When you first navigate to the Azure AI Foundry portal, you’ll notice that everything
    is structured around **projects**. Projects act as organized containers where
    you manage your models, prompts, agents, and data integration. Even before creating
    your first project, you can explore a wide range of available models and AI services.
    Once you’re ready to start building, Azure AI Foundry naturally guides you through
    project creation, unlocking the full breadth of AI capabilities designed for real-world
    impact.
  prefs: []
  type: TYPE_NORMAL
- en: Overview of Azure AI Foundry
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Azure AI Foundry provides a structured foundation for building and managing
    generative AI solutions at scale. At the heart of the platform is a **hub-and-project
    architecture**, which allows organizations to centralize governance while empowering
    teams with flexibility and autonomy:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hub**: This acts as the central command center for your AI ecosystem. It
    houses foundational models, reusable templates, compliance policies, and configuration
    standards. The hub ensures consistency, enforces security, and promotes reuse
    across all AI projects in the organization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Project**: This functions as a customizable and isolated workspace where
    specific AI applications are developed. Azure AI Foundry supports two project
    types: **Foundry projects** (standalone projects for individual development or
    exploration) and **hub-based projects** (which inherit governance, policies, and
    shared assets from an organizational hub). Hub-based projects are ideal for scaling
    enterprise AI solutions with consistent governance, while Foundry projects offer
    more flexibility for experimentation. Within either project type, teams can configure
    their own prompts, agents, orchestration flows, and data connectors tailored to
    business needs. For more details, visit [https://learn.microsoft.com/en-us/azure/ai-foundry/what-is-azure-ai-foundry#project-types](https://learn.microsoft.com/en-us/azure/ai-foundry/what-is-azure-ai-foundry#project-types).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Attach AI services and models**: Within a project, developers can connect
    to Azure AI services such as Azure OpenAI, Azure AI Search, or custom APIs. They
    can deploy foundational models (such as GPT-4), integrate RAG capabilities, and
    orchestrate interactions between multiple AI components to build complete end-to-end
    solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This separation of concerns—governance in the hub and solution-building in the
    project—enables enterprises to scale AI initiatives with confidence, ensuring
    operational control while supporting agile, innovation-driven development.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 1: Creating a hub, project, and AI service in the Azure portal'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exercise, you’ll explore the **Azure AI Foundry model catalog**, after
    which you’ll deploy the Phi-3.5-mini-instruct model and evaluate its behavior
    using natural language queries. This hands-on experience will help you practice
    comparing model details, deploying a model, and interacting with it in the chat
    playground.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Creating an Azure AI hub and project'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With your hub and project in place, you’re now ready to deploy and interact
    with powerful AI models directly within your Azure AI Foundry project:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to [https://ai.azure.com/](https://ai.azure.com/) to open Azure AI Foundry
    in your browser and sign in.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the home page, click **+ Create project**, select **Azure AI Foundry resource**
    as the recommended project type, and click **Next** to continue.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the creation wizard, do the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter `ai-data-demo` as the project name, as shown here:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.1 – Creating a project](img/B31034_08_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.1 – Creating a project
  prefs: []
  type: TYPE_NORMAL
- en: If a hub isn’t already selected, choose to create a new hub by selecting **Advanced
    options**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click **Create** to set up Azure AI Foundry.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 2: Deploying the GPT-4o model in your Azure AI Foundry project'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, you’ll need to deploy the GPT-4o model so it can be used later for inference
    tasks within your AI Foundry project:'
  prefs: []
  type: TYPE_NORMAL
- en: In your Azure AI Foundry project, navigate to the **My** **assets** section.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click on **Models +** **endpoints**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **+ Deploy model**, then select **Deploy** **base model**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From the list of available models, choose **GPT-4o** and click **Confirm**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **Customize**, then configure the deployment settings:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Model** **version**: **2024-08-06**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tokens per Minute Rate Limit (****thousands)**: **200,000**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Click **Deploy** and wait for the model to become active.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 3: Setting up your local development environment'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To run the following code locally, you’ll need to create a Python virtual environment,
    install dependencies, and configure environment variables:'
  prefs: []
  type: TYPE_NORMAL
- en: Open a terminal and navigate to the `firstchat-with-AIFoundry.ipynb` file in
    the `chapter-8/exercise1` project folder.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If you haven’t already, create and activate a virtual environment at the workspace
    level:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'If you haven’t already, install all required Python packages at the workspace
    level:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create a local environment configuration file:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '![Figure 8.2 – Project connection string and model key from Azure AI Foundry](img/B31034_08_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.2 – Project connection string and model key from Azure AI Foundry
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Sending a message to the deployed model using the AI agent feature'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this step, you’ll send a message to your deployed GPT-4o model using the
    AI agent feature in Azure AI Foundry. The model will respond with a joke as part
    of a conversational thread. Full details and explanations are available in the
    `firstchat-with-AIFoundry.ipynb` notebook file, so this section will focus on
    the key execution steps. Additional agent-related concepts and use cases will
    be covered in [*Chapter 9*](B31034_09.xhtml#_idTextAnchor183):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Load the connection details from environment variables:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Connect to your Azure AI Foundry project:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create an AI agent to handle the conversation:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Start a new conversation thread:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Send a user message to the agent:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Process the agent’s response within the thread:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Retrieve the full conversation history:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You’ve now initiated a complete conversational flow using an AI agent in Azure
    AI Foundry. Review the message list to see the model’s response. This foundational
    pattern will serve as a base for more advanced agent workflows. These will be
    discussed later.
  prefs: []
  type: TYPE_NORMAL
- en: Using Azure OpenAI to generate content
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Azure OpenAI, discussed in [*Chapter 1*](B31034_01.xhtml#_idTextAnchor014),
    is a managed platform that allows developers and data scientists to leverage advanced
    AI models such as GPT-4, GPT-3, Codex, DALL-E 3, and Whisper, all within the secure
    and reliable framework of Microsoft Azure. This service enables natural language,
    code, and image generation to be integrated seamlessly into various applications.
    By partnering with OpenAI, Microsoft ensures a smooth transition to Azure’s managed
    infrastructure, making it easier for organizations to harness these cutting-edge
    AI capabilities efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: Provisioning an Azure OpenAI resource and deploying models is the first step
    in leveraging the power of generative AI. The provisioning process involves selecting
    the appropriate subscription, region, and model version, which are crucial for
    ensuring the resource meets the specific requirements of the intended applications.
    Once provisioned, fine-tuning parameters such as temperature and max tokens in
    generative AI models can significantly enhance the quality and relevance of outputs
    by controlling randomness and response length. This can be done via either the
    playground portal or APIs; both ways will be demonstrated.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin by exploring how to deploy your first Azure OpenAI model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 2: Deploying Azure OpenAI'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This exercise will guide you through selecting a deployment model and provisioning
    an Azure OpenAI resource.
  prefs: []
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: Azure continuously improves its UIs, and a new interface is now available. While
    I’ll discuss the steps using this new UI, it’s important to focus on the underlying
    concepts and features since the UI will continue to evolve. If you understand
    the concepts, you’ll be able to navigate and adapt to any future UI changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Creating an Azure OpenAI service'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this initial step, you will explore the Azure portal by creating an Azure
    OpenAI. This will make it easier for you to understand the configuration options:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Either navigate from [https://portal.azure.com](https://portal.azure.com) to
    create a resource and select **Azure OpenAI** or use the following URL to jump
    straight to it: [https://portal.azure.com/#create/Microsoft.CognitiveServicesOpenAI](https://portal.azure.com/#create/Microsoft.CognitiveServicesOpenAI).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select your subscription from the **Subscription** dropdown and select an existing
    resource group from the **Resource Group** dropdown, if you have one that you’d
    like to use. Alternatively, select the option to create a new one.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select your region, enter the desired name for **Service name**, and select
    **Standard S0** for the pricing tier. You can view the full pricing details at
    [https://azure.microsoft.com/en-us/pricing/details/cognitive-services/openai-service/](https://azure.microsoft.com/en-us/pricing/details/cognitive-services/openai-service/).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **Next** | **Create** to create an OpenAI service and click **Go to resource**
    once your deployment is complete. At this point, the **Overview** blade window
    will appear, as shown in the following figure:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.3 – The Azure OpenAI Overview window once the deployment process
    is complete](img/B31034_08_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.3 – The Azure OpenAI Overview window once the deployment process is
    complete
  prefs: []
  type: TYPE_NORMAL
- en: Now that the setup is complete, we’ll move on to selecting a model for your
    requirements for deployment.
  prefs: []
  type: TYPE_NORMAL
- en: Key differences between Azure AI Foundry and Azure OpenAI
  prefs: []
  type: TYPE_NORMAL
- en: Azure AI Foundry and Azure OpenAI both give you access to powerful OpenAI models
    such as GPT-4o, GPT-3.5, and DALL-E, but they serve different purposes and are
    used in different ways. **Azure OpenAI** is a *standalone Azure service* that
    provides API access to OpenAI models—you can deploy models, manage them through
    Azure OpenAI Studio, and call them directly from your applications. In contrast,
    **Azure AI Foundry** is a solution development platform designed to help you build
    complete AI-powered applications and agents using a project-based architecture.
    Within Foundry, you can attach Azure AI services (including Azure OpenAI), manage
    models, orchestrate agents, integrate RAG pipelines, and enforce governance through
    hubs and projects. In short, **Azure OpenAI** focuses on model access, while **Azure
    AI Foundry** provides a broader environment for building, deploying, and managing
    full AI solutions, with OpenAI models available to use as one of the components
    in your solution architecture.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Deploying the model'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'As mentioned in [*Chapter 2*](B31034_02.xhtml#_idTextAnchor033), there are
    two different UIs for deploying a model: **Go to Azure OpenAI Studio** and **Explore
    Azure AI Studio**. To meet the exam requirements, we’ll demonstrate using Azure
    OpenAI Studio within Azure AI Foundry. The concepts and the UI’s look and feel
    are the same; the difference lies in the navigation path.'
  prefs: []
  type: TYPE_NORMAL
- en: Click **Explore Azure AI Foundry portal** at the bottom middle of the window
    (*Figure 8**.3*), or jump directly to the portal by visiting [https://oai.azure.com/](https://oai.azure.com/).
  prefs: []
  type: TYPE_NORMAL
- en: 'You will find an overview of the capabilities offered by Azure OpenAI Studio,
    as displayed in *Figure 8**.4*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.4 – Azure OpenAI Studio menu](img/B31034_08_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.4 – Azure OpenAI Studio menu
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s briefly go through each option, starting with those under the **Get started**
    and **Playgrounds** sections:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Model catalog**: Browse a comprehensive catalog of pre-trained models available
    for use in Azure AI Studio. You can review model details, capabilities, availability
    by region, and suitability for various use cases, such as chat, completions, image
    generation, and embedding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chat**: Experiment with chat-based language models in an interactive playground.
    You can configure prompts, test conversational scenarios, tune parameters (such
    as temperature and max tokens), and explore both text-only and multimodal (image
    and text) interactions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assistants** (*preview*): Build and manage *stateful AI agents* that handle
    multi-turn conversations, perform reasoning, and interact with tools and data.
    Assistants can integrate function calls, file search, code execution, and API
    orchestration, enabling advanced Copilot-like experiences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Video** (*preview*): Experiment with new *video-based AI capabilities* in
    supported preview environments. This section allows you to test models so that
    they can generate, analyze, or interact with video content (feature availability
    varies by region and subscription).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Audio** (*preview*): Enable *speech-to-speech* and *speech-to-text* scenarios
    using real-time audio models. This is useful for building voice assistants, providing
    contact center automation, and other low-latency audio applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Images**: Deploy and test *image generation models* such as DALL-E 3\. Use
    the image playground to generate images from text prompts, customize image style
    and size, and access code samples to integrate image generation into applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Completions**: Use this playground to test and tune text completion models
    (non-chat). This is ideal for single-turn text generation tasks such as summarization,
    classification, extraction, and creative writing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These are the options under the **Tools** section:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fine-tuning**: Fine-tune supported language models with your domain-specific
    data. Upload training and validation datasets, run fine-tuning jobs, monitor results,
    and deploy customized versions of base models optimized for your business needs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Azure OpenAI Evaluation** (*preview*): Evaluate the performance of **Large
    Language Models** (**LLMs**) by testing predefined input/output pairs. This is
    useful for measuring the accuracy, consistency, reliability, and performance of
    fine-tuned or base models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stored completions** (*preview*): Capture and store conversation history
    or completion outputs to create datasets. These completions can be used for evaluation,
    iterative testing, or as training data for future fine-tuning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Batch jobs**: Submit large volumes of requests asynchronously via the Azure
    OpenAI Batch API. This is useful for processing high-volume scenarios such as
    document summarization, bulk content generation, and customer data extraction,
    all while optimizing cost and quota usage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metrics**: Monitor detailed metrics for your deployed models, including usage
    patterns, performance statistics, and quota consumption. This is useful for capacity
    planning, scaling decisions, and model optimization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following are the options under the **Shared** **resources** section:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Deployments**: Manage your deployed models and endpoints. View deployment
    details, configure settings such as rate limits and content filters, and access
    API samples to integrate deployed models into production applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quota**: View and manage resource quotas such as **Tokens Per Minute** (**TPM**)
    and deployments per region. Request quota increases as needed to support larger-scale
    or higher-throughput applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Guardrails + Controls**: Configure content filtering, safety settings, and
    responsible AI controls to enforce compliance and safety standards across your
    AI applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Risks + alerts** (*preview*): Monitor risk signals and configure alerting
    for AI model usage. This helps with proactively detecting harmful content, policy
    violations, or unexpected model behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data files**: Upload and manage data files that support AI model customization.
    These can be used for fine-tuning, prompt engineering, and embedding generation,
    or even used as training/evaluation datasets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Vector stores** (*preview*): Create and manage vector stores to enable semantic
    search and RAG scenarios. Vector stores automatically parse, chunk, and embed
    content for fast, scalable semantic retrieval and are integrated with assistants
    or chat experiences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exploring each menu option will give you a hands-on understanding of Azure OpenAI
    Studio’s features, which will be helpful as you go through the rest of the topics
    in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'When selecting a model for deployment, it’s essential to consider several factors,
    including region, quota, and deployment-specific settings. These factors may evolve,
    so it’s important to double-check them before deploying your model:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Region**: Model availability can differ by region, so ensure the model you
    want to deploy is accessible in your chosen location. Additionally, consider performance
    and compliance factors, such as data residency requirements, which may affect
    your selection. For more details, visit [https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment type**: Azure OpenAI offers flexible deployment options tailored
    to different business needs and usage patterns. The primary deployment types are
    **standard** and **provisioned**. Standard deployments provide dynamic scalability,
    supporting general use cases with flexible data processing locations across Azure
    geographies and Microsoft data zones. Provisioned deployments, on the other hand,
    are optimized for workloads that require consistent, high-volume performance and
    strict regional data residency. Additionally, **global standard** deployments
    leverage Azure’s global infrastructure for higher initial throughput and dynamic
    routing, while **global batch** deployments are ideal for offline, non-latency-sensitive
    workloads, offering cost efficiency for large-scale batch processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When choosing a deployment type, consider two key factors: **data processing
    location** and **call volume**. You can align your workloads with specific Azure
    geographies, Microsoft-specified data zones, or global processing options based
    on your data residency and compliance needs. All deployment types support the
    same inference operations, but billing, scaling, and performance vary significantly.
    For instance, global batch deployments offer lower costs with a longer turnaround
    time, while standard and provisioned deployments provide real-time scoring capabilities
    with varying levels of performance consistency.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: For more details, visit [https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/deployment-types](https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/deployment-types).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Quota**: Quotas determine the maximum resources, such as TPM, that can be
    allocated to a model deployment in a specific region. For instance, you might
    have a quota allowing a single deployment with 240,000 TPM or multiple deployments
    that reach this limit collectively. You can adjust your TPM allocation post-deployment
    through Azure AI Studio, providing you with the flexibility to manage resources
    according to your needs. For more details, visit [https://learn.microsoft.com/en-us/azure/ai-services/openai/quotas-limits](https://learn.microsoft.com/en-us/azure/ai-services/openai/quotas-limits).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With this information, let’s begin the process:'
  prefs: []
  type: TYPE_NORMAL
- en: In Azure OpenAI Studio, go to the **Deployments** section. Click on the **Deploy
    base model** option from the **+ Deploy model** drop-down menu.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Choose a model from the list displayed on the left-hand side. Detailed information
    about the selected model will appear on the right-hand side of the interface.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After reviewing the model’s details, confirm your selection by clicking the
    **Confirm** button.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, configure the deployment settings, as shown in the following figure:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.5 – The Deploy model gpt-4o-mini window](img/B31034_08_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.5 – The Deploy model gpt-4o-mini window
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a closer look at the details:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Deployment name**: Enter a unique name for your deployment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model version**: Select the desired model version.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment type**: Choose the appropriate deployment type (e.g., **Global
    Standard**, **Standard**, or **Provisioned**).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tokens per Minute Rate Limit (thousands)**: Use the slider to adjust the
    rate limit. Move the slider left or right to decrease or increase the TPM rate
    limit, respectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content filter**: Select the desired content filter setting. Note that you
    can also select a custom content filter—if you’ve created one—from the **Content
    filter****s** menu on the left.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once all the settings have been configured, click the **Deploy** button to complete
    the deployment process.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After deployment, detailed information about the deployment will be displayed.
    This includes the endpoint, API key, rate limit information, and specific model
    details.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve selected your models, the next step is to create prompts and observe
    the responses that have been generated.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Submitting prompts and receiving responses (natural language and code)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To demonstrate how to submit prompts and receive responses using Azure OpenAI,
    we’ll walk through three examples: one for generating a general message, another
    for code generation, and a third for image analysis. This process involves sending
    a carefully crafted input (prompt) to the AI model and receiving a response that
    aligns with the prompt’s instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to the **Chat** section and select the deployment model you created in the
    previous task.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'You can modify the default system message so that it includes instructions
    on its behavior, personality, and response formatting. These instructions guide
    what the assistant should and shouldn’t answer. While there’s no token limit for
    this section, it will be included in every API call and count toward the overall
    token limit. Here are a few examples of the prompts I used:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter **Write a short paragraph explaining the benefits of regular exercise
    in simple language** in the chat window and click send:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.6 – Short general prompt](img/B31034_08_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.6 – Short general prompt
  prefs: []
  type: TYPE_NORMAL
- en: 'Enter **Write a Python function that takes a list of numbers and returns the
    list sorted in ascending order** in the chat window and click send:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.7 – Code generation](img/B31034_08_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.7 – Code generation
  prefs: []
  type: TYPE_NORMAL
- en: 'Upload an image and enter the prompt **can you describe this image?**. The
    system will return a detailed explanation of the image, as shown in *Figure 8.8*:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.8 – A chat about an image in the chat playground](img/B31034_08_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.8 – A chat about an image in the chat playground
  prefs: []
  type: TYPE_NORMAL
- en: 'The menu options in the chat playground interface provide various functionalities
    to enhance and manage your work. Here’s a brief explanation of each option:'
  prefs: []
  type: TYPE_NORMAL
- en: '**View Code**: This option lets you view the underlying code that powers the
    chat or prompt. It can be useful for understanding how the system operates or
    used for debugging purposes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deploy**: This option allows you to take your chat or prompt setup and deploy
    it as a web application. It’s useful for making your work accessible to a wider
    audience through a web interface.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Import**: This lets you bring existing work or data into the playground.
    You can import prompts, configurations, or other relevant files to continue your
    work.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Export**: This allows you to save or export your work. You can typically
    choose from different formats to export your prompts and responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt samples**: This provides you with examples of prompts and responses.
    It’s a good starting point for understanding how to structure your interactions
    and can serve as inspiration for creating your own prompts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, let’s talk about how you can optimize generative AI models by adjusting
    parameters to produce outputs tailored to specific needs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Configuring parameters to optimize generative AI model behavior'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Optimizing the behavior of generative AI models through parameters such as
    **Past messages included**, **Max response**, **Temperature**, **Top P**, **Stop
    sequence**, **Frequency penalty**, and **Presence penalty** is crucial for achieving
    relevant, coherent, and diverse outputs. These parameters allow users to control
    the context, length, creativity, and variability of the model’s responses, ensuring
    that the generated content aligns with specific needs and preferences:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.9 – Parameter configuration](img/B31034_08_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.9 – Parameter configuration
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s briefly discuss these fields:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Past messages included**: This parameter controls how many previous interactions
    are taken into account when generating a response. A higher number can provide
    context, leading to more coherent and relevant replies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Max response**: This setting determines the maximum length of the generated
    response. A higher value allows for more detailed answers, while a lower value
    restricts the output so that it’s more concise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`0.2`) make the output more focused and deterministic, while higher values
    (e.g., `0.8`) make it more random and creative. A value of `0.7` is a moderate
    setting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`0.9` means the model will consider only the most probable tokens that, together,
    account for 90% of the probability distribution, allowing for more varied outputs
    while maintaining relevance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stop sequence**: This defines specific sequences of text that, when generated,
    will halt further generation. It helps in controlling where a response should
    end, ensuring it does not continue unnecessarily.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Frequency penalty**: This parameter reduces the likelihood of the model repeating
    the same tokens or phrases. A higher-frequency penalty encourages the model to
    use a wider variety of words and phrases in its responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Presence penalty**: Similar to the frequency penalty, the presence penalty
    discourages the model from using certain words or phrases that have already appeared
    in the conversation. It promotes diversity in the responses by penalizing the
    reuse of previously mentioned concepts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By fine-tuning these settings, users can enhance the model’s ability to produce
    high-quality responses, whether for creative tasks, technical explanations, or
    conversational interactions, ultimately improving user satisfaction and effectiveness
    in various applications. I strongly encourage you to experiment with these parameters
    to see how they impact the model’s output and find the best configuration for
    your specific use case.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Utilizing Azure OpenAI APIs'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure OpenAI offers extensive support for multiple programming languages, making
    it accessible and versatile for a wide range of developers and applications. The
    primary programming languages that are supported include Python, C#, JavaScript,
    and Java. Each of these languages can interact with the Azure OpenAI APIs to submit
    prompts and receive generated responses, allowing developers to integrate AI capabilities
    into their applications efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how it works. The interaction with Azure OpenAI typically involves the
    following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'As outlined in *Steps 1* and *2* of *Exercise 1: Creating a hub, project, and
    AI service in the Azure portal*, start by provisioning an Azure OpenAI resource
    in the Azure portal and selecting the desired AI model.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Retrieve your API key, Azure endpoint, and API version from the Azure portal
    for API authentication. Replace these values in your code with environment variables
    such as `AZURE_OPENAI_API_KEY` and `AZURE_OPENAI_ENDPOINT`. For enhanced security,
    consider using Entra ID or Azure Key Vault as an alternative. The following are
    two sample code snippets to help you get started:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Use the provided SDKs or REST API to integrate Azure OpenAI into your application.
    The preceding example demonstrates how to do this using Python.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Once the API call is made, handle the response in your application. The response
    typically includes the generated content, which can be text, code, or an image,
    depending on the model and prompt used.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now that we have a solid grasp on how to utilize Azure OpenAI and deploy OpenAI
    models on Azure, let’s shift our focus to more advanced techniques to further
    enhance the quality and relevance of AI-generated responses.
  prefs: []
  type: TYPE_NORMAL
- en: 'Advanced techniques in generative AI: DALL-E 3, the RAG pattern, prompt engineering,
    and fine-tuning'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With a foundational understanding of how to provision Azure OpenAI, select models,
    and optimize parameters for the best outputs, we’re ready to dive into more advanced
    techniques in generative AI. In this section, we’ll explore DALL-E 3 for image
    generation, the RAG pattern, and the principles of prompt engineering. We’ll also
    discuss fine-tuning models to tailor them to specific use cases, ensuring even
    more precise and relevant results.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 3: Using DALL-E 3 to generate images'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The DALL-E 3 model, a product of Azure OpenAI, is a state-of-the-art AI model
    designed for generating images from textual descriptions. This capability allows
    for creative applications, such as designing visuals based on user input or automating
    the creation of art and graphics.
  prefs: []
  type: TYPE_NORMAL
- en: A typical use case for DALL-E 3 includes generating marketing visuals or conceptual
    art based on simple textual prompts, enabling users without artistic skills to
    create compelling images. The primary advantage of DALL-E 3 is its ability to
    generate high-quality, unique images from simple descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s explore the DALL-E 3 playground by selecting the **Images** menu from
    the blade navigator, as illustrated in *Figure 8**.4*. In this tool, you’ll see
    that the specifics of your prompt significantly impact the resulting image. For
    instance, the details you include when describing a fox will influence how the
    AI interprets and generates the image. This exercise will help you understand
    the importance of prompt precision in obtaining desired visual outputs. If you
    don’t see the DALL-E 3 model listed, navigate to the **Models + Endpoints** section
    and manually add the DALL-E 3 model. Refer to *Figure 8**.4* for guidance on how
    to access the model deployment screen:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.10 – DALL-E playground](img/B31034_08_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.10 – DALL-E playground
  prefs: []
  type: TYPE_NORMAL
- en: In the DALL-E playground, you have the option to view Python and URL code samples,
    which are automatically prefilled based on your current settings. To access this,
    simply select **View code** near the top of the page. You can use the provided
    code to develop an application that replicates the task within your own environment.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s dive into prompt engineering and learn how to craft precise and effective
    inputs for contextually appropriate outputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 4: Applying prompt engineering techniques'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt engineering is the process of crafting precise inputs to guide generative
    AI models in producing specific, desired outputs. This approach allows model behavior
    to be fine-tuned without its core structure being altered, making it flexible
    and easy to implement. It enhances the relevance and quality of generated content
    by providing clear context and details, though it may not always achieve perfect
    accuracy, especially in complex scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few example prompts:'
  prefs: []
  type: TYPE_NORMAL
- en: 'General prompt:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tell me about the benefits** **of exercise**:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.11 – General prompt response](img/B31034_08_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.11 – General prompt response
  prefs: []
  type: TYPE_NORMAL
- en: 'Specific prompt (with prompt engineering):'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Can you provide a detailed explanation of the physical and mental health
    benefits of regular aerobic exercise, including examples of exercises and their
    specific effects on the body** **and mind?**:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.12 – Specific prompt response](img/B31034_08_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.12 – Specific prompt response
  prefs: []
  type: TYPE_NORMAL
- en: Here, the AI model provided a detailed response by breaking down the topic into
    sections such as physical health benefits, mental health benefits, and examples
    of aerobic exercises. This illustrates the power of prompt engineering in guiding
    the model to generate comprehensive and relevant information. To further explore
    this, you can try out two prompts in the playground and observe how the model
    responds to different instructions, showcasing how precise prompts lead to more
    accurate and informative outputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 5: The RAG pattern (using your own data)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The RAG pattern combines generative AI models with a search-based knowledge
    source to produce contextually accurate and relevant responses. While we’ll explore
    this in depth in [*Chapter 7*](B31034_07.xhtml#_idTextAnchor140), this exercise
    offers a quick way to try it out by connecting a data source directly in the playground
    for testing purposes.
  prefs: []
  type: TYPE_NORMAL
- en: This lightweight setup lets you experiment with RAG by leveraging **Azure AI
    Search**, giving you a preview of how retrieved documents can ground the model’s
    responses. This pattern is particularly useful in scenarios such as customer support,
    where the AI needs to provide coherent, fact-based answers using real-time or
    proprietary data.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that while RAG improves response accuracy and relevance, it also
    requires maintaining a well-curated and up-to-date dataset, which may involve
    additional setup and ongoing effort.
  prefs: []
  type: TYPE_NORMAL
- en: In this exercise, we’ll walk through how to connect your data, configure retrieval,
    and start using the RAG pattern to generate informed, contextual responses.
  prefs: []
  type: TYPE_NORMAL
- en: Go to [oai.azure.com](http://oai.azure.com) and log in with an account that
    has permission to use your Azure OpenAI resource. Once logged in, choose the correct
    tenant, subscription, and OpenAI instance from the available options.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **Chat** from the blade navigator leading to the chat playground.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'From the drop-down menu, select your deployment, then navigate to the **Add
    your data** tab. Click on **+ Add a** **data source**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.13 – Adding data to the chat playground](img/B31034_08_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.13 – Adding data to the chat playground
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Add data** window, you can choose from various data sources, such
    as Azure AI Search indexes, Azure Blob Storage, Azure Cosmos DB, Elasticsearch,
    URLs, or local files. The options continue to grow. Depending on the selected
    data source, the following screens may differ. For this exercise, we’ll select
    **Azure Blob Storage**, meaning the data will be ingested, chunked, indexed, and
    vectorized in AI Search:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.14 – Adding your own data](img/B31034_08_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.14 – Adding your own data
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s understand the options:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Subscription**: Choose the Azure subscription that will be used for the data
    source.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Select Azure Blob storage resource** and **Select storage container**: If
    selected, specify the Blob Storage account and container where the data files
    will be stored.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Select Azure AI Search resource**: If using Azure Cognitive Search, select
    the search resource that will index the data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enter the index name**: Specify the name of the search index that will be
    created or used.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Embedding model**: To use a vector model as part of your data, select an
    embedding model. You need to have an existing embedding model to start.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Next, the **Data management** window allows you to configure specific settings
    related to the indexing and searching of your data. You can select one of three
    search types:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Vector**: Vector search utilizes vector embeddings to represent data points
    in a multi-dimensional space. It finds similarities between data points based
    on their proximity in this space.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hybrid (Vector + Keyword)**: Hybrid search combines both vector search and
    traditional keyword search. It leverages the strengths of both methods to provide
    more accurate and relevant search results.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hybrid + semantic**: This method enhances hybrid search by incorporating
    semantic search capabilities. It not only considers the keyword and vector similarities
    but also understands the context and meaning of the search query:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 8.15 – Selecting a search type in the Data management window](img/B31034_08_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.15 – Selecting a search type in the Data management window
  prefs: []
  type: TYPE_NORMAL
- en: Select **API Key** as the authentication type and click **Next** in the **Data
    connection** window. If you choose **System-assigned managed identity**, ensure
    that role assignments are set up correctly. For more details, please refer to
    [https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/use-your-data-securely#role-assignments](https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/use-your-data-securely#role-assignments).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Review the settings and click **Save and close** to start the data ingestion
    process from your Blob storage.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The system will then create chunks of data based on the size you defined, index
    the data, and make it searchable to support the search function. Once the indexing
    is complete, you can chat with your own data directly in the playground:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 8.16 – Chatting with your own data directly in the playground](img/B31034_08_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.16 – Chatting with your own data directly in the playground
  prefs: []
  type: TYPE_NORMAL
- en: After exploring the RAG pattern, which enhances AI’s ability to provide relevant
    and contextually accurate responses by incorporating real-time data retrieval,
    the next logical step is to delve into fine-tuning. Fine-tuning allows us to further
    refine AI models by training them on specific datasets to improve their performance
    in targeted applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 6: Fine-tuning models with your own data'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Fine-tuning involves retraining a general AI model on a specialized dataset
    to enhance its performance in a particular domain or task. Think of it as taking
    a broadly knowledgeable person and giving them a focused education in one specific
    area, such as medicine or legal terminology. For example, if general AI knows
    a little about everything, fine-tuning would be like teaching it to become an
    expert in medical diagnostics by training it on medical texts. This process makes
    the model much better at understanding and responding to specific tasks, but can
    make it less versatile for broader applications. Fine-tuning can lead to improved
    accuracy in specialized tasks but may also require more resources and time, potentially
    increasing the cost and risk of overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Practical steps for fine-tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here are the steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Define the use case**: Clearly articulate the specific use case for fine-tuning
    and identify the base model you want to fine-tune. Determine what specific output
    or behavior you expect from the model.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Prepare training data**: Collect and prepare the data necessary for fine-tuning.
    This includes gathering examples of the desired output, such as pairs of natural
    language inputs and corresponding outputs (e.g., database queries).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`training_set.jsonl`) and a validation file (e.g., `validation_set.jsonl`).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Specify the number of epochs for training. This represents the number of complete
    passes through the training dataset.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Start the fine-tuning job**: After configuring the parameters, initiate the
    fine-tuning job. The time required for completion will vary depending on the model
    size and dataset.*   **Monitor the job**: Track the status of the fine-tuning
    job in the **Models** pane, where details such as the job ID and training progress
    are displayed. Refresh the pane periodically to view updates.*   **Evaluate the
    fine-tuned model**: Upon job completion, evaluate the model’s performance to ensure
    it meets the defined use case requirements. Verify that the model handles tasks
    effectively without overfitting or merely repeating the training data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To perform fine-tuning in practice, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Navigate to the **Fine-tuning** menu in the blade and select **+ Fine-tune
    model**. You will then see the **Select a model** window, as illustrated in *Figure
    8**.17*. From here, select the desired model and click **Confirm**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Important note
  prefs: []
  type: TYPE_NORMAL
- en: Ensure that your Azure OpenAI resource is created in an available region. You
    can visit [https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models#fine-tuning-models](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/models#fine-tuning-models)
    to check which fine-tuning models are available in which regions.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.17 – Fine-tuning model selection](img/B31034_08_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.17 – Fine-tuning model selection
  prefs: []
  type: TYPE_NORMAL
- en: Next, in the **Basic settings** tab, you can choose a basic model version and
    enter the model suffix. Then, click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the `.jsonl` format and should follow the chat completion structure:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.18 – Training data uploaded from a local machine](img/B31034_08_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.18 – Training data uploaded from a local machine
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Validation data** tab, upload the validation data from your local
    machine, following the steps shown:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.19 – Uploading validation data from your local machine](img/B31034_08_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.19 – Uploading validation data from your local machine
  prefs: []
  type: TYPE_NORMAL
- en: 'Select the appropriate task parameters, but for now, stick with the default
    options. Review your job, then click **Submit**. The job’s status will be displayed:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.20 – Fine-tuning model creation (status change: Queued > Running
    > Completed)](img/B31034_08_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.20 – Fine-tuning model creation (status change: Queued > Running >
    Completed)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the fine-tuned model training process is completed, go to **Chat** from
    the left-hand side blade and select **From fine-tuned models** from the **+ Create
    new deployment** drop-down menu:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.21 – Selecting From fine-tuned models](img/B31034_08_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.21 – Selecting From fine-tuned models
  prefs: []
  type: TYPE_NORMAL
- en: Choose the fine-tuned model you just created in the previous step, then click
    **Deploy**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Your screen will display all the details about your fine-tuned model, as shown
    in the following figure. You can click on the **Metrics** tab to review how the
    training process went:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 8.22 – Reviewing the fine-tuned model](img/B31034_08_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.22 – Reviewing the fine-tuned model
  prefs: []
  type: TYPE_NORMAL
- en: 'Click **Open in playground** to start interacting with your fine-tuned model
    and the specific inquiries it was trained for. You’ll be presented with a screen
    similar to the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.23 – Chatting with your own emoji fine-tuned model](img/B31034_08_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.23 – Chatting with your own emoji fine-tuned model
  prefs: []
  type: TYPE_NORMAL
- en: This fine-tuned model has been trained to respond with emojis based on your
    prompts. For example, if you say `hello`, a waving emoji will appear, and if you
    ask `how do you feel if it rains tomorrow?`, an umbrella emoji will be shown.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you learned how to build and manage generative AI solutions
    using both **Azure AI Foundry** and **Azure OpenAI**. We began by introducing
    Azure AI Foundry—a unified platform designed to streamline the creation, deployment,
    and governance of enterprise-grade AI applications. You explored how to provision
    a hub and project, attach AI services, and deploy models such as GPT-4o directly
    within the Foundry environment. We also demonstrated how to use the AI agent feature
    to orchestrate conversational flows.
  prefs: []
  type: TYPE_NORMAL
- en: Building on that foundation, we walked through how to use Azure OpenAI to deploy
    models, submit prompts, and configure key parameters such as temperature and max
    tokens to optimize model behavior. You gained hands-on experience with prompt
    engineering, learned how to generate images using DALL-E 3, and discovered how
    to use the RAG pattern to ground generative models with your own data. Finally,
    we covered fine-tuning techniques to customize models for domain-specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: By mastering these tools and techniques, you are now equipped to develop scalable,
    secure, and highly adaptable generative AI solutions within both experimental
    and production-ready environments in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Review questions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Answer the following questions to test your knowledge of this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Which of the following best describes the role of a hub in Azure AI Foundry?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It serves as a temporary workspace for testing AI models before deployment
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: It stores project-specific prompts, agents, and data connectors
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: It centralizes governance by managing shared resources, policies, and templates
    across multiple projects
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: It provides isolated compute environments for fine-tuning foundational models
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: C'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which key values are required to use the SDK to send a prompt message and get
    a response from Azure OpenAI?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`api_key`, `api_version`, and `azure_endpoint`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '`subscription_id`, `resource_group`, and `api_version`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '`client_id`, `client_secret`, and `azure_endpoint`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '`tenant_id`, `subscription_id`, and `api_key`'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: A'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which steps should you take to configure parameters to optimize a generative
    AI model’s behavior for consistent responses from an LLM?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use untrusted data sources, enable full access to sensitive resources, and avoid
    setting strict parameters
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Provide trusted data, configure custom parameters such as “strictness” and “limit
    responses to data content,” and augment prompts with data retrieved from trusted
    sources
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Disable the logging and monitoring of LLM interactions and allow unrestricted
    input length and structure
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Restrict usage rate limits to a minimum and avoid human review of outputs before
    dissemination
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: B'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which of the following outlines the correct steps for implementing the RAG pattern
    to generate accurate answers based on user data?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Store all possible answers within the model itself, send user questions directly
    to the model, and rely on its pre-trained data for responses
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Search a data store based on user input, combine the user question with matching
    results, send the combined data and question as a prompt to the LLM, and then
    generate the desired answer
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the model to generate responses without any data retrieval, update the model
    periodically with new data, and ensure responses are based solely on updated model
    knowledge
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Retrieve data randomly, send it to the LLM without combining it with user input,
    and rely on the model to filter out irrelevant information
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: B'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Which of the following outlines the best approach to optimize the search process
    in the RAG pattern?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use a randomly ordered data store, avoid indexing, and rely solely on keyword
    searches to retrieve data
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Implement an index that includes keyword searches, semantic searches, and vector
    searches, and ensure the index is optimized for efficient retrieval
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Depend on the pre-trained knowledge of the LLM without utilizing any external
    data sources or indexes
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Use a basic text search algorithm without incorporating semantic or vector search
    capabilities
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Correct** **answer**: B'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
