- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: 'Mastering GitHub Copilot in Your IDE: Inline Suggestions, Chat, and Agent Mode'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在您的IDE中精通GitHub Copilot：内联建议、聊天和代理模式
- en: GitHub Copilot does more than provide access to different subscription plans.
    Once enabled in your IDE, Copilot becomes an active part of your daily workflow.
    It can suggest code in real time, respond to natural language comments, help explain
    complex sections of code, and even automate large-scale changes. Understanding
    how these features work inside your development environment is the key to using
    Copilot effectively and responsibly.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot不仅提供对不同的订阅计划的访问。一旦在您的IDE中启用，Copilot就成为您日常工作流程的积极部分。它可以实时建议代码，响应自然语言注释，帮助解释代码的复杂部分，甚至自动化大规模更改。了解这些功能如何在您的开发环境中工作，是有效和负责任地使用Copilot的关键。
- en: In this chapter, we will explore Copilot’s IDE functionalities step by step.
    You will learn how completions speed up routine coding, how comments can be turned
    into real implementations, and how inline suggestions adapt to the context of
    your project. We will also cover Copilot Ask Mode for conversational help, Copilot
    Edit Mode for refactoring and improvements, and Copilot Agent Mode for automating
    multi-step tasks across your repository. Along the way, you will see practical
    examples ranging from JavaScript functions to infrastructure-as-code templates,
    and we will highlight common pitfalls so you can avoid mistakes as you bring Copilot
    into your workflow.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将逐步探索Copilot的IDE功能。您将了解补全如何加快常规编码，如何将注释转换为实际实现，以及内联建议如何适应您项目的上下文。我们还将涵盖Copilot问答模式以提供对话式帮助，Copilot编辑模式以重构和改进，以及Copilot代理模式以在您的存储库中自动化多步任务。在此过程中，您将看到从JavaScript函数到基础设施即代码模板的各种实际示例，我们还将强调常见陷阱，以便您在将Copilot引入工作流程时避免错误。
- en: By the end of this chapter, you will have a clear, hands-on understanding of
    how Copilot integrates into the IDE to support your entire development process,
    from writing a single line of code to managing large-scale changes across multiple
    files. You will also have seen how to apply these features across application
    code, infrastructure templates, CI/CD workflows, and documentation.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将清楚地、亲手地了解Copilot如何集成到IDE中，以支持您的整个开发过程，从编写单行代码到管理多个文件中的大规模更改。您还将看到如何将这些功能应用于应用程序代码、基础设施模板、CI/CD工作流程和文档。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: A copilot, not an autopilot
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不是一个自动驾驶仪，而是一个辅助驾驶
- en: 'Code completions: the core experience'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码补全：核心体验
- en: 'Comments to code: turning natural language into working code'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注释到代码：将自然语言转换为工作代码
- en: 'Inline suggestions and context awareness: real-time predictions as you type'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内联建议和上下文感知：边打字边实时预测
- en: 'GitHub Copilot Ask Mode: conversational assistance in the IDE'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub Copilot 问答模式：IDE中的对话式辅助
- en: 'GitHub Copilot Edit Mode: instantly refactoring and improving code'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub Copilot 编辑模式：即时重构和改进代码
- en: 'GitHub Copilot Agent Mode: automating multi-step tasks'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub Copilot 代理模式：自动化多步任务
- en: Combining features for real workflows
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结合功能以实现实际工作流程
- en: 'GitHub Copilot in different IDEs: what’s the same, what’s unique'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同IDE中的GitHub Copilot：相同之处和独特之处
- en: Technical requirements
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: As discussed in [*Chapter 1*](Chapter_1.xhtml#_idTextAnchor007) , GitHub Copilot
    integrates seamlessly with multiple editors, such as **Visual Studio Code** (
    **VS Code** ), **Visual Studio** , **JetBrains** IDEs (such as **PyCharm** and
    **IntelliJ IDEA** ), **Neovim** , **Eclipse** , and **Xcode** . While some features
    will arrive in VS Code first, core functionalities, including code completions,
    inline suggestions, and Copilot Ask, are available across all of these environments.
    This ensures you can work with GitHub Copilot in the editor that best matches
    your workflow and programming language preferences.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如[*第1章*](Chapter_1.xhtml#_idTextAnchor007)所述，GitHub Copilot与多个编辑器无缝集成，例如**Visual
    Studio Code**（**VS Code**）、**Visual Studio**、**JetBrains** IDEs（例如**PyCharm**和**IntelliJ
    IDEA**）、**Neovim**、**Eclipse**和**Xcode**。虽然一些功能将首先在VS Code中推出，但包括代码补全、内联建议和Copilot问答在内的核心功能在所有这些环境中都可用。这确保您可以在最适合您的工作流程和编程语言偏好的编辑器中使用GitHub
    Copilot。
- en: A copilot, not an autopilot
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不是一个自动驾驶仪，而是一个辅助驾驶
- en: 'Before going any further, it’s worth reinforcing the core philosophy: you are
    always the pilot. GitHub Copilot is there to assist, accelerate, and inspire,
    but you decide what code to write, accept, or modify. Think of GitHub Copilot
    as a helpful teammate who can suggest the next step, explain a complex snippet,
    or generate a test, but the final decision always belongs to you.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，值得强调的核心哲学是：您始终是飞行员。GitHub Copilot在那里是为了协助、加速和激发灵感，但您决定要编写、接受或修改的代码。将GitHub
    Copilot视为一个有帮助的队友，他可以建议下一步，解释复杂的代码片段或生成测试，但最终的决定权始终属于您。
- en: 'After installing and activating GitHub Copilot in your IDE, you’ll notice it
    starts suggesting code almost immediately as you type. Whether you’re working
    in C#, Python, JavaScript, or dozens of other languages, GitHub Copilot can do
    the following:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的IDE中安装并激活GitHub Copilot后，您会注意到它在您输入时几乎立即开始建议代码。无论您是在使用C#、Python、JavaScript还是其他数十种语言，GitHub
    Copilot都可以做到以下几项：
- en: Predict and complete lines or blocks of code
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测并完成代码的行或块
- en: Turn natural language comments into real code
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将自然语言注释转换为真实代码
- en: Offer documentation or explanations for tricky sections
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为复杂部分提供文档或解释
- en: Refactor or improve existing functions on request
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据请求重构或改进现有函数
- en: Answer “how do I…” questions right in the editor
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在编辑器中直接回答“我该如何……”的问题
- en: Automate multi-step changes with Agent Mode
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用代理模式自动化多步更改
- en: You’ll see GitHub Copilot’s “ghost text” suggestions appear in real time, and
    you can interact with the GitHub Copilot sidebar or Chat panel for deeper assistance.
    As an example, suppose you’re starting a new Python function for data processing.
    As soon as you write a descriptive comment, GitHub Copilot proposes a relevant
    code block. If you get stuck, you can open the Chat window in the sidebar and
    ask for an explanation, a test case, or a quick refactor, without breaking your
    flow.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 您将看到GitHub Copilot的“幽灵文本”建议实时出现，并且您可以通过侧边栏的GitHub Copilot或聊天面板进行交互以获得更深入的帮助。例如，假设您正在开始一个新的Python函数用于数据处理。一旦您编写了描述性的注释，GitHub
    Copilot就会提出相关的代码块。如果您遇到困难，您可以在侧边栏中打开聊天窗口，请求解释、测试用例或快速重构，而不会打断您的流程。
- en: 'However, while using Copilot, try to avoid these common pitfalls:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在使用Copilot时，请尽量避免以下常见陷阱：
- en: '**Treating Copilot as a black box** : Accepting suggestions blindly can lead
    to subtle bugs or code that doesn’t fit your style.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将Copilot视为黑盒**：盲目接受建议可能导致微妙的错误或不符合您风格的代码。'
- en: '**Forgetting feature availability may differ by IDE** : Not every editor supports
    every GitHub Copilot feature on day one. Double-check the documentation if you’re
    missing a feature.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忘记功能可用性可能因IDE而异**：并非每个编辑器在第一天都支持GitHub Copilot的所有功能。如果您缺少一个功能，请检查文档。'
- en: '**Assuming GitHub Copilot will always “just work”** : GitHub Copilot relies
    on the context it sees. If your code is incomplete or ambiguous, suggestions may
    be less accurate. Providing clear comments and writing code in small increments
    improves results.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假设GitHub Copilot总是会“正常工作”**：GitHub Copilot依赖于它所看到的上下文。如果您的代码不完整或含糊不清，建议可能不太准确。提供清晰的注释并以小步骤编写代码可以提高结果。'
- en: As discussed earlier, Copilot works across popular IDEs. In the next section,
    we move from a general overview to a closer look at how its features work inside
    the editor. You will see how Copilot integrates with your coding environment by
    providing completions, turning comments into code, assisting with inline suggestions,
    and supporting Agent Mode.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，Copilot可以在流行的IDE中工作。在下一节中，我们将从一般概述转向更深入地了解其功能如何在编辑器内部工作。您将看到Copilot如何通过提供补全、将注释转换为代码、协助内联建议和支持代理模式来与您的编码环境集成。
- en: 'Code completions: the core experience'
  id: totrans-32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码补全：核心体验
- en: GitHub Copilot’s most foundational feature is code completion. As you type,
    it analyzes the surrounding context, such as variable names, function signatures,
    comments, and nearby code, to predict what you will likely need next. These predictions
    appear as faint, gray “ghost text” directly in your editor, offering the next
    word or line, or even an entire block of code. This seamless integration allows
    you to move more quickly through everyday development tasks while keeping your
    focus in the editor.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot最基础的功能是代码补全。随着您的输入，它分析周围的环境，例如变量名、函数签名、注释和附近的代码，以预测您可能需要的下一个内容。这些预测以淡灰色“幽灵文本”的形式直接出现在您的编辑器中，提供下一个单词或行，甚至是一个完整的代码块。这种无缝集成允许您更快地完成日常开发任务，同时保持对编辑器的关注。
- en: 'For example, if you are writing in C# and you want to loop through numbers
    and display them, you might start with a simple `for` loop like this:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您正在用C#编写代码，并且想要遍历数字并显示它们，您可能从这样一个简单的`for`循环开始：
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Based on the loop structure you began, Copilot predicts that you may want to
    output each value of `i` and suggests the `Console.WriteLine(i);` statement. This
    not only saves time but also reduces the chance of small mistakes, such as off-by-one
    errors or missed property references.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您开始的循环结构，Copilot预测您可能想要输出`i`的每个值，并建议使用`Console.WriteLine(i);`语句。这不仅节省了时间，还减少了小错误的可能性，例如偏移量错误或遗漏属性引用。
- en: You can see the result in *Figure 4.1* .
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在*图4.1*中看到结果。
- en: '![Figure 4.1: Ghost text suggestion in action; code completion suggestion in
    C# for a for-loop](img/B34107_04_1.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图4.1：实际操作中的占位文本建议；C#中的for循环代码完成建议](img/B34107_04_1.png)'
- en: 'Figure 4.1: Ghost text suggestion in action; code completion suggestion in
    C# for a for-loop'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1：实际操作中的占位文本建议；C#中的for循环代码完成建议
- en: These completions help you maintain flow, especially for repetitive structures,
    standard library calls, or code patterns you use frequently.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这些完成建议有助于您保持流程，尤其是在重复结构、标准库调用或您经常使用的代码模式中。
- en: Accepting, cycling, and rejecting suggestions
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接受、循环和拒绝建议
- en: 'Copilot provides several ways to interact with code suggestions:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot提供了几种与代码建议交互的方式：
- en: '**Accept** : Press *Tab* (or the equivalent in your editor) to accept a suggestion
    and insert it into your code'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接受**：按*Tab*键（或您编辑器中的等效键）接受建议并将其插入到您的代码中'
- en: '**Cycle** : Use keyboard shortcuts such as *Alt* + *[* or *Alt* + *]* (VS Code
    default) to scroll through multiple suggestions when available'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**循环**：使用键盘快捷键，如*Alt* + *[* 或 *Alt* + *]*（VS Code默认设置）在可用时滚动查看多个建议'
- en: '**Reject** : Press *Esc* to dismiss the current suggestion if it doesn’t fit
    your needs, or just keep on typing'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**拒绝**：如果当前建议不符合您的需求，请按*Esc*键将其忽略，或者继续键入'
- en: These options allow you to quickly test alternatives, find the most suitable
    code, or return to writing your own implementation if none are quite right.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这些选项允许您快速测试替代方案，找到最合适的代码，或者如果没有任何一个完全符合，可以返回编写自己的实现。
- en: Taking an example, type the `squareAll(nums)` stub with the three `Option` comments,
    then pause. Copilot proposes `return nums.map(n => n * n);` as the first completion,
    and when you press *Alt* + *]* to cycle, a second style appears as a ghost line,
    `return` `nums.reduce((acc, n) => { … })` , as shown in *Figure 4.2* . Press *Tab*
    to accept the version you want, press *Alt* + *[* to go back, or press *Esc* and
    keep writing if neither fits.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个例子为例，输入带有三个`Option`注释的`squareAll(nums)`存根，然后暂停。Copilot首先提出`return nums.map(n
    => n * n);`作为第一个完成建议，当您按*Alt* + *]*循环时，第二种风格作为一个幽灵行出现，`return` `nums.reduce((acc,
    n) => { … })`，如*图4.2*所示。按*Tab*键接受您想要的版本，按*Alt* + *[*返回，或者按*Esc*键并继续编写，如果都不合适。
- en: '![Figure 4.2: Cycling to a reduce alternative in VS Code](img/B34107_04_2.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图4.2：在VS Code中循环到减少替代方案](img/B34107_04_2.png)'
- en: 'Figure 4.2: Cycling to a reduce alternative in VS Code'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2：在VS Code中循环到减少替代方案
- en: Best practices for completions
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 完成建议的最佳实践
- en: 'To get the most value from Copilot’s code completions, keep the following practices
    in mind:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 要从Copilot的代码完成建议中获得最大价值，请记住以下实践：
- en: '**Review every suggestion** : GitHub Copilot’s predictions are fast but not
    always perfect. Always double-check suggested code for correctness, security,
    and suitability.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审查每个建议**：GitHub Copilot的预测速度快，但并不总是完美。始终检查建议的代码的正确性、安全性和适用性。'
- en: '**Use for routine patterns** : Code completions shine for repetitive or boilerplate
    code such as logging, data parsing, or test scaffolds.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用常规模式**：代码完成在重复或模板代码，如日志记录、数据解析或测试脚手架中表现最佳。'
- en: '**Context matters** : The more relevant your surrounding code and comments,
    the more accurate Copilot’s suggestions.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文很重要**：您周围的代码和注释越相关，Copilot的建议就越准确。'
- en: Common pitfalls to avoid
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'While Copilot completions can accelerate your workflow, there are a few common
    pitfalls to watch out for:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Copilot的完成建议可以加速您的工作流程，但有一些常见的陷阱需要注意：
- en: '**Accepting unverified suggestions** : Trusting a completion without reviewing
    it can introduce logic bugs, security vulnerabilities, or code that doesn’t match
    your team’s standards'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接受未经验证的建议**：在没有审查的情况下信任完成建议可能会引入逻辑错误、安全漏洞或不符合您团队标准的代码'
- en: '**Missing better alternatives** : Accepting the first suggestion without cycling
    through options may cause you to overlook a better or more idiomatic implementation'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺少更好的替代方案**：在未遍历选项的情况下接受第一个建议可能会导致你忽略更好的或更符合习惯的实现。'
- en: '**Overusing completions in unfamiliar code** : Relying on GitHub Copilot to
    generate code in a language or code base you don’t understand can lead to confusion
    or mismatched patterns'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过度使用不熟悉的代码中的补全**：依赖GitHub Copilot在你不理解的编程语言或代码库中生成代码可能会导致混淆或模式不匹配。'
- en: GitHub Copilot’s code completions are a productivity booster, not a replacement
    for your own judgment. Use them to keep momentum, but always take a moment to
    check the details.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot的代码补全是一个生产力提升工具，而不是你个人判断的替代品。使用它们来保持动力，但始终花点时间检查细节。
- en: By practicing how to cycle through, accept, and reject suggestions, you build
    confidence in shaping Copilot’s output to match your project’s needs. With these
    mechanics in place, we can now move beyond simple completions and see how Copilot
    can generate code directly from natural language comments.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 通过练习如何遍历、接受和拒绝建议，你可以增强塑造Copilot输出以符合项目需求的能力。有了这些机制，我们现在可以超越简单的补全，看看Copilot如何直接从自然语言注释生成代码。
- en: 'Comments to code: turning natural language into working code'
  id: totrans-62
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 注释到代码：将自然语言转换为工作代码
- en: One of GitHub Copilot’s standout features is its ability to turn natural language
    comments directly into draft implementations. By describing what you want in a
    comment, just as you would explain an idea to a colleague, you can prompt GitHub
    Copilot to generate complete code snippets, functions, or even entire classes.
    You can see this feature in action in *Figure 4.3* .
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot的一个突出特点是它能够将自然语言注释直接转换为草稿实现。通过在注释中描述你想要的内容，就像你向同事解释一个想法一样，你可以提示GitHub
    Copilot生成完整的代码片段、函数，甚至整个类。你可以在*图4.3*中看到这个功能的效果。
- en: '![Figure 4.3: A comment-to-code transformation in JavaScript](img/B34107_04_3.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图4.3：JavaScript中的注释到代码转换](img/B34107_04_3.png)'
- en: 'Figure 4.3: A comment-to-code transformation in JavaScript'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.3：JavaScript中的注释到代码转换
- en: This approach speeds up your workflow and makes it easier to implement ideas,
    even in areas where you might not recall the exact syntax or best practices.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法可以加快你的工作流程，并使实现想法变得更容易，即使在你不记得确切语法或最佳实践的情况下。
- en: Writing natural language prompts
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编写自然语言提示
- en: 'To get the most out of comments to code, keep these guidelines in mind:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分利用注释到代码的转换，请记住以下指南：
- en: '**Be clear and direct** : Be specific. Write comments such as `// Convert Celsius
    to Fahrenheit` , not vague notes such as `// Convert the temperature` .'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**清晰直接**：具体明确。编写如`// 将摄氏度转换为华氏度`这样的注释，而不是模糊的笔记，如`// 转换温度`。'
- en: '**Mention edge cases or requirements** : If you want error handling or a specific
    library, mention it in the comment. See the following example:'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提及边缘情况或要求**：如果你需要错误处理或特定的库，请在注释中提及。请参见以下示例：'
- en: '[PRE1]'
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Copilot will recognize the need for error handling and suggest a try-catch block
    in JavaScript.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot将识别到错误处理的必要性，并在JavaScript中建议使用try-catch块。
- en: '**Use context** : Surrounding variable names and function signatures help produce
    better results. See the following example:'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用上下文**：周围的变量名和函数签名有助于产生更好的结果。请参见以下示例：'
- en: '[PRE2]'
  id: totrans-74
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Here, Copilot can see the function name and parameters and is more likely to
    generate correct logic, such as clamping invalid rates or applying the formula
    properly.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，Copilot可以看到函数名和参数，更有可能生成正确的逻辑，例如限制无效的速率或正确应用公式。
- en: 'Let’s look at two quick examples to make this concrete. For example, if you
    need a function that returns the maximum number in an array, add a clear comment
    above the function, like this:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看两个快速示例来具体说明。例如，如果你需要一个返回数组中最大值的函数，可以在函数上方添加一个清晰的注释，如下所示：
- en: '[PRE3]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'GitHub Copilot uses this comment, along with surrounding code context, to suggest
    a relevant implementation:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot使用此注释以及周围的代码上下文来建议相关的实现：
- en: '[PRE4]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Here’s another example for working with dates:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是另一个处理日期的例子：
- en: '[PRE5]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The clearer and more precise your comment, the more helpful the generated code
    will be.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 你的注释越清晰、越精确，生成的代码就越有帮助。
- en: Common pitfalls to avoid
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: 'When writing natural language comments for Copilot, keep in mind that some
    approaches reduce the quality of suggestions. Watch out for these common issues:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在为Copilot编写自然语言注释时，请注意，某些方法会降低建议的质量。注意以下常见问题：
- en: '**Vague comments** : Comments such as `// process data` result in generic or
    unrelated code'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模糊的注释**：如`//处理数据`之类的注释会导致通用或不相关的代码。'
- en: '**Omitting important details** : Not mentioning input types or expected results
    can lead to incomplete suggestions'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**省略重要细节**：未提及输入类型或预期结果可能会导致建议不完整。'
- en: '**Too many requirements in one comment** : Overloading a comment with multiple
    tasks can make Copilot’s suggestions less accurate'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注释中要求过多**：在注释中包含多个任务可能会使Copilot的建议不够准确。'
- en: Always review and test GitHub Copilot’s generated code. Treat each suggestion
    as a starting point, not a finished solution. We recommend adding integration
    or unit tests that validate the correct working of the code, and executing those
    tests locally before pushing your code upstream.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 总是审查和测试GitHub Copilot生成的代码。将每个建议视为起点，而不是最终解决方案。我们建议添加集成或单元测试来验证代码的正确运行，并在将代码推送到上游之前在本地执行这些测试。
- en: By following these guidelines, your comments give Copilot the clarity and context
    it needs to generate more accurate draft implementations.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些指南，您的注释为Copilot提供了生成更准确草稿实现所需的清晰度和上下文。
- en: Now that we’ve seen how natural language prompts shape Copilot’s output, let’s
    look at how inline suggestions work in real time as you type.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了自然语言提示如何塑造Copilot的输出，让我们看看内联建议是如何在您打字时实时工作的。
- en: 'Inline suggestions and context awareness: real-time predictions as you type'
  id: totrans-91
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 内联建议和上下文感知：边打字边实时预测。
- en: GitHub Copilot doesn’t just respond to comments; it also watches what you type
    and offers real-time suggestions based on the surrounding context. This **inline
    suggestion** feature is like having a knowledgeable co-worker quietly anticipating
    your next step, saving you keystrokes and surfacing solutions you might not have
    considered.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot不仅对注释做出响应，它还会监视您的输入，并根据周围上下文提供实时建议。这个**内联建议**功能就像有一个知识渊博的同事在安静地预测您的下一步，节省您的按键，并呈现您可能没有考虑到的解决方案。
- en: Inline suggestions appear as faint, gray “ghost text” directly in your editor.
    Copilot analyzes not only what you’re typing but also nearby variables, function
    names, data structures, and even filenames, so its suggestions are tailored to
    your current task.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 内联建议会以淡灰色“幽灵文本”的形式直接出现在您的编辑器中。Copilot不仅分析您正在输入的内容，还会分析附近的变量、函数名、数据结构和甚至文件名，因此其建议是根据您当前的任务定制的。
- en: Context awareness is what makes Copilot’s inline suggestions feel relevant instead
    of random. For example, if you are working in a Dockerfile, Copilot may propose
    valid FROM and RUN instructions, while in a SQL file, it might suggest a SELECT
    query template. By grounding suggestions in context, Copilot helps you move forward
    without breaking focus to look up syntax or boilerplate code.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文感知是使Copilot的内联建议感觉相关而不是随机的因素。例如，如果您正在Dockerfile中工作，Copilot可能会提出有效的FROM和RUN指令，而在SQL文件中，它可能会建议一个SELECT查询模板。通过将建议建立在上下文中，Copilot帮助您继续前进，而无需中断注意力去查找语法或样板代码。
- en: 'What makes inline suggestions powerful is that they’re not limited to completing
    a single line. GitHub Copilot can often generate multi-line code snippets or full
    blocks, such as function bodies, configuration sections, or even chained API calls.
    See the following examples:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 内联建议之所以强大，是因为它们不仅限于完成单行。GitHub Copilot经常可以生成多行代码片段或完整的块，例如函数体、配置部分，甚至是链式API调用。以下是一些示例：
- en: In JavaScript, if you start defining a loop, Copilot may propose the entire
    loop structure, including initialization, condition, and increment logic
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在JavaScript中，如果您开始定义一个循环，Copilot可能会提出包括初始化、条件和增量逻辑在内的整个循环结构。
- en: In Terraform, typing the beginning of a resource block can prompt Copilot to
    draft the whole section with providers, arguments, and variable references pre-filled
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Terraform中，输入资源块的开始部分可以提示Copilot草拟整个部分，包括预填充提供者、参数和变量引用。
- en: In Python, beginning a function that processes a list could result in Copilot
    suggesting a complete function body with iterations, conditionals, and a return
    statement
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Python中，开始定义一个处理列表的函数可能会导致Copilot建议一个包含迭代、条件语句和返回语句的完整函数体。
- en: These suggestions accelerate repetitive or boilerplate-heavy work while nudging
    you toward best practices in the process. By blending context awareness with multi-line
    completions, GitHub Copilot acts less like an autocomplete tool and more like
    a partner who sees where your code is going and helps you get there faster.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这些建议在加速重复性或模板化工作同时，引导你遵循最佳实践。通过将上下文感知与多行补全相结合，GitHub Copilot 不再像是一个自动完成工具，而更像是一个合作伙伴，它看到你的代码走向，并帮助你更快地到达那里。
- en: 'For example, in JavaScript, if you start typing a function, GitHub Copilot
    predicts the body based on the function name and parameter:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在 JavaScript 中，如果你开始输入一个函数，GitHub Copilot 会根据函数名和参数预测函数体：
- en: '[PRE6]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Here, it inferred your intent from the function name ( `calculateAverageRange`
    ) and the parameter ( `planes` ), as we can see in *Figure 4.4* .
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，它从函数名（`calculateAverageRange`）和参数（`planes`）中推断出你的意图，正如我们在 *图 4.4* 中可以看到的。
- en: '![Figure 4.4: Inline suggestion completing the body of a function](img/B34107_04_4.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.4：内联建议完成函数体](img/B34107_04_4.png)'
- en: 'Figure 4.4: Inline suggestion completing the body of a function'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.4：内联建议完成函数体
- en: 'Alternatively, if you want to calculate the sum of an array, you could begin
    with a simple function outline like this:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，如果你想计算一个数组的总和，你可以从一个简单的函数轮廓开始，如下所示：
- en: '[PRE7]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'As you type, GitHub Copilot predicts the likely implementation and suggests
    the following code to complete it:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 当你输入时，GitHub Copilot 预测可能的实现并建议以下代码来完成它：
- en: '[PRE8]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: GitHub Copilot’s context awareness also extends beyond immediate lines – if
    you’ve declared a variable or resource previously, GitHub Copilot may reference
    or use it in a subsequent suggestion.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 的上下文感知能力不仅限于当前行 - 如果你之前已经声明了一个变量或资源，GitHub Copilot 可能会在后续建议中引用或使用它。
- en: How inline suggestions differ from comments to code
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内联建议与代码注释的区别
- en: 'It’s easy to confuse inline suggestions with comments to code, but they are
    different tools for different moments in your workflow:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 容易将内联建议与代码注释混淆，但它们是针对工作流程中不同时刻的不同工具：
- en: 'With comments to code, you explicitly describe your intent with natural language
    comments, and Copilot generates code based on your description. See the following
    example:'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过对代码添加注释，你用自然语言注释明确地描述你的意图，Copilot 根据你的描述生成代码。请看以下示例：
- en: '[PRE9]'
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'With inline suggestions, Copilot predicts your next step while you are typing
    code using function names, parameters, nearby variables, and file context. For
    example, you might type the following:'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用内联建议时，Copilot 预测你在使用函数名、参数、附近变量和文件上下文输入代码时的下一步。例如，你可能会输入以下内容：
- en: '[PRE10]'
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Copilot might suggest the following:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 可能会建议以下内容：
- en: '[PRE11]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Think of comments to code as you telling Copilot what you want in plain language,
    while inline suggestions are Copilot predicting the natural next step as you write.
    Used together, they form a powerful pair: one is explicit guidance, the other
    is predictive assistance.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 将代码注释视为你用普通语言告诉Copilot你想要什么，而内联建议是Copilot在你编写时预测自然下一步。结合使用，它们形成了一对强大的组合：一个是明确的指导，另一个是预测性帮助。
- en: Best practices
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To make the most of Copilot’s inline suggestions, consider the following practices
    when writing code:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为了充分利用 Copilot 的内联建议，当编写代码时，请考虑以下实践：
- en: '**Leverage context** : Define variables and function signatures first. GitHub
    Copilot’s suggestions become more relevant as it learns from your immediate context.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用上下文**：首先定义变量和函数签名。随着 GitHub Copilot 从你的即时上下文中学习，其建议的相关性会更高。'
- en: '**Small steps work best** : Write code incrementally. GitHub Copilot produces
    more precise suggestions when the structure and intent of the code are clearly
    expressed.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**小步骤最有效**：逐步编写代码。当代码的结构和意图表达得清楚时，GitHub Copilot生成的建议会更加精确。'
- en: '**Use for patterns** : Inline suggestions are most effective when applied to
    repetitive structures such as loops, filters, resource blocks, and configuration
    sections that follow well-established patterns.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用模式**：内联建议在应用于重复结构（如循环、过滤器、资源块和遵循良好模式的配置部分）时最为有效。'
- en: Common pitfalls to avoid
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Even though Copilot’s inline suggestions can be a big time-saver, there are
    a few limitations and risks you should watch out for:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Copilot的内联建议可以节省大量时间，但也有一些限制和风险需要注意：
- en: '**Overlooking project standards** : GitHub Copilot might suggest code that
    doesn’t fully align with your project’s naming conventions or style guides, so
    always review before accepting.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽略项目标准**：GitHub Copilot 可能会建议不符合您项目命名约定或风格指南的代码，因此在接受之前请务必进行审查。'
- en: '**Large or generic suggestions** : Multi-line suggestions are helpful, but
    may introduce extra code or assumptions that don’t fit your needs.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大或通用的建议**：多行建议很有帮助，但可能会引入不符合您需求的额外代码或假设。'
- en: '**Context confusion** : In highly complex or ambiguous files, GitHub Copilot’s
    guesses may be off. Consider simplifying code or adding comments for clarity.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文混淆**：在高度复杂或模糊的文件中，GitHub Copilot 的猜测可能不准确。考虑简化代码或添加注释以提高清晰度。'
- en: Treat GitHub Copilot’s inline suggestions as accelerators for your own ideas.
    Accept what fits, edit as needed, and discard what doesn’t feel right for your
    context. Keep on testing the new code to make sure it works as intended. Adding
    automated tests (with GitHub Copilot) can help with this.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 将 GitHub Copilot 的内联建议视为您自己想法的加速器。接受适合的部分，根据需要编辑，并丢弃不适合您上下文的部分。继续测试新代码以确保其按预期工作。添加自动化测试（使用
    GitHub Copilot）可以帮助做到这一点。
- en: By understanding how Copilot offers inline suggestions and adapts to the context
    of your code, you can take advantage of its ability to anticipate your next steps
    and accelerate everyday tasks.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 通过了解 Copilot 如何提供内联建议并适应您代码的上下文，您可以利用其预测您下一步行动的能力，从而加速日常任务。
- en: With this foundation in place, we can now look at how Copilot goes beyond silent
    predictions and provides conversational assistance through Ask Mode.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个基础上，我们现在可以看看 Copilot 如何超越无声的预测，并通过询问模式提供对话辅助。
- en: 'GitHub Copilot Ask Mode: conversational assistance in the IDE'
  id: totrans-132
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GitHub Copilot 询问模式：IDE 中的对话辅助
- en: Not every IDE implements GitHub Copilot Chat. Editors such as VS Code, JetBrains
    IDEs, and Visual Studio provide a dedicated panel for conversational interactions,
    while others, such as Neovim, do not, since they lack a user interface to display
    a chat window.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个 IDE 都实现了 GitHub Copilot 聊天功能。例如，VS Code、JetBrains IDE 和 Visual Studio 提供了用于对话交互的专用面板，而其他编辑器，如
    Neovim，则没有，因为它们缺乏显示聊天窗口的用户界面。
- en: Where it is supported, **GitHub Copilot Ask Mode** allows you to use natural
    language questions to interact with your code base. You can request explanations
    of complex logic, generate tests, draft documentation, or even get guidance on
    configuration files, all without breaking your workflow. Copilot Ask Mode is particularly
    useful when you need context-aware help, want to understand unfamiliar code, or
    need to automate repetitive documentation and test-generation activities.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 支持的位置，**GitHub Copilot 询问模式**允许您使用自然语言问题与您的代码库进行交互。您可以请求解释复杂的逻辑、生成测试、起草文档，甚至获得配置文件的指导，所有这些都不需要打断您的工作流程。Copilot
    询问模式在您需要上下文感知的帮助、想要理解不熟悉的代码或需要自动化重复的文档和测试生成活动时特别有用。
- en: How Copilot gathers context
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Copilot 如何收集上下文
- en: 'When you use GitHub Copilot Chat features, the IDE shares relevant parts of
    your workspace with the service to help generate meaningful responses. This may
    include the file you’re working on, recent edits, or references to nearby code.
    Each IDE integration handles this slightly differently, but the goal is the same:
    provide enough context so Copilot can generate answers and suggestions that align
    with your project.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 当您使用 GitHub Copilot 聊天功能时，IDE 会将与服务相关的您的工作空间的部分内容共享，以帮助生成有意义的响应。这可能包括您正在工作的文件、最近的编辑或对附近代码的引用。每个
    IDE 集成对此的处理略有不同，但目标相同：提供足够的信息，以便 Copilot 能够生成与您的项目相一致的回答和建议。
- en: For instance, in VS Code or JetBrains IDEs, Copilot Chat can use the open file
    plus selected text as a grounding point. In editors without a chat panel, such
    as Neovim, this integration is not available since there’s no interface for Copilot
    to surface conversational results.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在 VS Code 或 JetBrains IDEs 中，Copilot Chat 可以使用打开的文件加选定的文本作为基础点。在没有聊天面板的编辑器中，如
    Neovim，此集成不可用，因为没有界面供 Copilot 显示对话结果。
- en: Using GitHub Copilot Ask Mode
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 GitHub Copilot 询问模式
- en: GitHub Copilot Ask Mode brings the capabilities of conversational AI into your
    coding workflow. You simply type a question or request into the Chat panel, and
    it responds with explanations, code samples, or actionable suggestions tailored
    to your code, as you can see in *Figure 4.5* .
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 询问模式将对话式 AI 的功能带入您的编码工作流程。您只需在聊天面板中键入一个问题或请求，它就会以解释、代码示例或针对您的代码定制的可操作建议进行响应，正如您在*图
    4.5*中所见。
- en: '![Figure 4.5: Copilot Chat answering “What does this workflow do?” in a GitHub
    Actions YML file](img/B34107_04_5.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.5: Copilot Chat answering “What does this workflow do?” in a GitHub
    Actions YML file'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: 'This works for code, scripts, configuration files, and even CI/CD YAML definitions,
    making it a flexible resource for developers, DevOps engineers, and cloud professionals.
    For example, suppose you encounter a tricky regular expression and aren’t sure
    what it does. You can highlight the following code:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'You can then ask GitHub Copilot the following:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Copilot would respond with the following:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Alternatively, maybe you’re looking at the following workflow file and want
    to know what it accomplishes:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'You could ask GitHub Copilot the following:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'It might respond with the following:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: You can also request code snippets, explanations of configuration settings,
    or quick documentation in plain language. The response appears with controls such
    as **Apply in Editor** , **Copy** , and **Insert** , so you can use the suggestion
    immediately.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.6: Copilot Chat summarizing a GitHub Actions workflow and highlighting
    missing best practices, with options to copy or insert the suggested text directly
    into the editor](img/B34107_04_6.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4.6: Copilot Chat summarizing a GitHub Actions workflow and highlighting
    missing best practices, with options to copy or insert the suggested text directly
    into the editor'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: Getting the most out of GitHub Copilot Ask Mode
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To make your conversations with Copilot more productive, keep these approaches
    in mind:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: '**Be specific and contextual** : The more context you give, the better the
    answers. Reference code snippets, filenames, or even specific lines.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use follow-up questions** : Treat Copilot Ask Mode like a conversation. Clarify
    your goal, ask for alternatives, drill down on details, and remember it uses your
    recent chat and nearby code as context.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Request explanations, tests, or improvements** : Don’t hesitate to ask for
    unit/integration tests, security reviews, or suggestions to optimize code or configs.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In practice, you might ask Copilot a focused question while giving it clear
    context, as suggested in the previous list. For instance, if you have a Node.js
    project, you might ask the following:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'GitHub Copilot will propose inserting a job step that runs the project’s test
    command before the deployment step, such as the following:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Then, as a follow-up question, ask Copilot, “What important checks are we still
    missing in this workflow, for example, caching dependencies, uploading coverage,
    or adding an audit step?”
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Using slash commands and @participants
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GitHub Copilot Chat supports more than plain natural language questions. To
    make requests more precise, you can use slash commands and @participants. These
    features act as shortcuts, steering Copilot toward a specific type of response
    or narrowing its focus to a particular context in your workspace.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '**Slash commands** are keywords you type at the beginning of a message to instruct
    GitHub Copilot on how to handle your request. The following are some examples:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '**斜杠命令** 是您在消息开头键入的关键字，用于指示 GitHub Copilot 如何处理您的请求。以下是一些示例：'
- en: '`/explain` : Breaks down what a piece of code does'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`/explain` : 解释代码片段的功能'
- en: '`/fix` : Suggests a correction for an error or bug in your code'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`/fix` : 为您的代码中的错误或漏洞建议一个修正'
- en: '`/tests` : Generates unit tests for the file or function you are viewing'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`/tests` : 为您正在查看的文件或函数生成单元测试'
- en: '`/doc` : Creates documentation comments for your code'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`/doc` : 为您的代码创建文档注释'
- en: These commands save time by eliminating the need to phrase requests in full
    sentences. Instead of typing “Can you explain this function?” you can simply type
    `/explain` while the function is open.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这些命令通过消除需要用完整句子表达请求的需要来节省时间。您不需要键入“你能解释这个函数吗？”只需在函数打开时键入 `/explain` 即可。
- en: 'Meanwhile, **@participants** keywords let you direct GitHub Copilot to draw
    information from a specific context. Examples include the following:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，**@participants** 关键字让您能够指示 GitHub Copilot 从特定的上下文中获取信息。以下是一些示例：
- en: '`@workspace` : Gives Copilot access to the entire project, so it can consider
    multiple files when answering'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`@workspace` : 让 Copilot 能够访问整个项目，因此当回答问题时可以考虑到多个文件。'
- en: '`@file` : Restricts Copilot’s attention to the current file only'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`@file` : 仅将 Copilot 的注意力限制在当前文件上'
- en: '`@terminal` : Allows Copilot to generate commands suited for a terminal session'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`@terminal` : 允许 Copilot 生成适合终端会话的命令'
- en: 'By combining slash commands and @participants, you can craft highly targeted
    prompts. See the following example:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合斜杠命令和 @participants，您可以创建高度针对性的提示。以下是一个示例：
- en: '[PRE20]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Here, Copilot will both recognize that tests are requested and know to scan
    across the full workspace for relevant code paths.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，Copilot 将识别到请求了测试，并知道要扫描整个工作区以找到相关的代码路径。
- en: 'However, when using both features, keep these points in mind:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当使用这两个功能时，请注意以下这些要点：
- en: If you leave out an @participant keyword, GitHub Copilot may only consider the
    current file, leading to incomplete answers.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您省略了 @participant 关键字，GitHub Copilot 可能只会考虑当前文件，导致答案不完整。
- en: Slash commands are shortcuts, not replacements for natural language, so try
    not to rely on them. If GitHub Copilot misunderstands, try rephrasing instead
    of repeating the command.
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 斜杠命令是快捷方式，而不是自然语言的替代品，所以尽量不要依赖它们。如果 GitHub Copilot 误解了，尝试重新措辞而不是重复命令。
- en: Not all IDEs expose the chat interface where these commands are available. For
    example, Neovim has no built-in UI panel for GitHub Copilot Chat, so slash commands
    and @participants cannot be used there.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并非所有 IDE 都公开提供这些命令的聊天界面。例如，Neovim 没有内置的 GitHub Copilot Chat UI 面板，因此在那里无法使用斜杠命令和
    @participants。
- en: 'Adding context with #keywords'
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '使用 #keywords 添加上下文'
- en: 'In addition to slash commands and @participants, GitHub Copilot Chat also recognizes
    inline context handles that provide a sharper focus for your request. These begin
    with the # symbol and tell Copilot what part of your environment to consider,
    such as the following:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 除了斜杠命令和 @participants，GitHub Copilot Chat 还识别内联上下文处理程序，这些处理程序为您的请求提供了更精确的焦点。以下是一些示例：
- en: '`#file` : Refers to the entire contents of the current file'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`#file` : 指的是当前文件的全部内容'
- en: '`#symbol` : Focuses on the function, class, or symbol currently under your
    cursor'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`#symbol` : 专注于当前光标下的函数、类或符号'
- en: '`#terminalLastCommand` : Passes along the most recent command run in your integrated
    terminal'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`#terminalLastCommand` : 传递您在集成终端中最近运行的命令'
- en: 'As an example, you can use `/explain #symbol` to ask for an explanation of
    only the function or symbol under your cursor, not the entire file. This is handy
    when you want a quick read before editing.'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '例如，您可以使用 `/explain #symbol` 来请求仅对您光标下的函数或符号进行解释，而不是整个文件。在编辑前快速阅读时，这很有用。'
- en: 'Alternatively, you can use `/explain #terminalLastCommand` to ask for a plain-English
    explanation of the last command you ran in the terminal. This helps when a script
    fails or a build step is unclear.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '或者，您可以使用 `/explain #terminalLastCommand` 来请求对您在终端中运行的最后一个命令的纯英文解释。这有助于在脚本失败或构建步骤不明确时。'
- en: These context handles are especially powerful when combined with slash commands
    and @participants, giving you layered control over how GitHub Copilot interprets
    your request.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 当与斜杠命令和 @participants 结合使用时，这些上下文处理程序特别强大，让您能够对 GitHub Copilot 如何解释您的请求有分层控制。
- en: Use GitHub Copilot Ask Mode to turn confusion into momentum. If you’re ever
    stuck, ask for a summary, a test, or a best practices review. Treat GitHub Copilot
    as a knowledgeable, always available teammate.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 GitHub Copilot 询问模式将困惑转化为动力。如果你遇到困难，请请求摘要、测试或最佳实践审查。将 GitHub Copilot 视为一个知识渊博、始终可用的队友。
- en: Common pitfalls to avoid
  id: totrans-195
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Even though Copilot Ask Mode can provide quick explanations and useful suggestions,
    there are a few common mistakes that can limit its effectiveness:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Copilot询问模式可以提供快速的解释和有用的建议，但有一些常见的错误可能会限制其有效性：
- en: '**Being too vague** : Asking “Is this good?” without context will lead to generic
    responses. Always specify what you want to know or improve.'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过于模糊**：在没有上下文的情况下询问“这是否好？”将导致泛泛的回答。始终具体说明你想要了解或改进的内容。'
- en: '**Not reviewing suggestions** : GitHub Copilot’s explanations are often helpful,
    but always verify accuracy, especially for config files or scripts that impact
    deployment.'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不审查建议**：GitHub Copilot 的解释通常很有帮助，但始终要验证准确性，特别是对于影响部署的配置文件或脚本。'
- en: '**Assuming GitHub Copilot knows all context** : GitHub Copilot only sees what’s
    in your editor. For questions about related files, open them or paste relevant
    sections into the chat.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假设 GitHub Copilot 了解所有上下文**：GitHub Copilot 只能看到你编辑器中的内容。对于关于相关文件的问题，请打开它们或将相关部分粘贴到聊天中。'
- en: By using Ask Mode effectively, you can get targeted explanations, generate supporting
    tests, and improve your understanding of complex code without leaving the editor.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 通过有效地使用询问模式，你可以获得有针对性的解释、生成支持性测试，并在不离开编辑器的情况下提高你对复杂代码的理解。
- en: With this conversational support in place, the next step is to see how Copilot
    can go beyond advice and directly transform your code through Edit Mode.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种对话支持到位的情况下，下一步是看看 Copilot 如何通过编辑模式超越建议，直接通过自然语言提示修改、重构或改进你的现有代码和配置文件。
- en: 'GitHub Copilot Edit Mode: instantly refactoring and improving code'
  id: totrans-202
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GitHub Copilot 编辑模式：即时重构和改进代码
- en: '**GitHub Copilot Edit Mode** takes the concept of AI-powered coding a step
    further, allowing you to instruct GitHub Copilot to modify, refactor, or improve
    your existing code and configuration files using natural language prompts. Instead
    of manually rewriting a function, reformatting SQL, or updating infrastructure
    code, you simply tell GitHub Copilot what you want changed.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: '**GitHub Copilot 编辑模式**将人工智能驱动的编码概念进一步推进，允许你通过自然语言提示指示 GitHub Copilot 修改、重构或改进你的现有代码和配置文件。你无需手动重写函数、重新格式化
    SQL 或更新基础设施代码，只需告诉 GitHub Copilot 你想要更改的内容。'
- en: The result? Faster improvements and more time focused on logic rather than rote
    edits.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 结果？更快的改进和更多时间专注于逻辑而不是机械的编辑。
- en: Edit Mode is geared toward immediately implementing the changes you are asking
    for, in the files that are relevant to the question at hand. This makes it a lot
    easier to apply these changes compared to when in Ask Mode, where you have to
    copy and paste the changes yourself.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑模式旨在立即实施你请求的更改，这些更改与当前问题相关的文件相关。这使得与询问模式相比，应用这些更改要容易得多，在询问模式中，你必须自己复制和粘贴更改。
- en: Scenarios for edits
  id: totrans-206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编辑的情景
- en: 'Edits can be applied across programming languages, scripts, SQL, and infrastructure-as-code
    files, making this feature useful no matter what type of project you are working
    on. Here are some example scenarios:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑可以应用于编程语言、脚本、SQL 和基础设施即代码文件，这使得无论你正在处理什么类型的项目，这个功能都很有用。以下是一些示例情景：
- en: '**Refactoring functions** : Make code more modular, readable, or idiomatic.
    See the following example: `"Convert this function to async/await syntax."`'
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重构函数**：使代码更模块化、可读或符合惯例。请看以下示例：“将这个函数转换为 async/await 语法。”'
- en: '**Improving queries** : Clean up SQL or NoSQL statements. See the following
    example: `"Simplify this SQL query and ensure it uses proper JOIN syntax."`'
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**改进查询**：清理 SQL 或 NoSQL 语句。请看以下示例：“简化这个 SQL 查询并确保它使用正确的 JOIN 语法。”'
- en: '**Optimizing infrastructure code** : Parameterize, add tags, or apply best
    practices in Bicep or Terraform. See the following example: `"Update this Bicep
    template to add required tags and use parameters for region and SKU."`'
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化基础设施代码**：参数化、添加标签或在 Bicep 或 Terraform 中应用最佳实践。请看以下示例：“更新这个 Bicep 模板以添加所需的标签并使用参数来指定区域和
    SKU。”'
- en: '**Documentation updates** : Update or generate README sections or inline comments.
    See the following example: `"Update this markdown section to use a numbered list
    instead of bullets."`'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更新文档**：更新或生成 README 部分或内联注释。请看以下示例：“更新这个 markdown 部分，使用编号列表而不是项目符号。”'
- en: '**Scripting adjustments** : Add error handling or improve automation scripts.
    See the following example: `"Add error handling to this PowerShell script so it
    retries on network failure."`'
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**脚本调整**：添加错误处理或改进自动化脚本。请看以下示例：“将错误处理添加到此 PowerShell 脚本中，以便在网络故障时重试。”'
- en: Using GitHub Copilot Edit Mode
  id: totrans-213
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 GitHub Copilot 编辑模式
- en: 'GitHub Copilot Edit Mode is typically activated by selecting a block of code
    and issuing a command or prompt, either through a dedicated panel (such as “GitHub
    Copilot: Edit with prompt…” in VS Code) or by right-clicking and choosing GitHub
    Copilot options. You describe what you want changed, and the tool generates the
    refactored or transformed version, as you can see in *Figure 4.7* .'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 编辑模式通常通过选择一段代码并发出一个命令或提示来激活，无论是通过一个专用面板（例如 VS Code 中的“GitHub
    Copilot：使用提示编辑...”）还是通过右键单击并选择 GitHub Copilot 选项。你描述你想改变的内容，然后工具会生成重构或转换后的版本，正如你在
    *图 4.7* 中可以看到的那样。
- en: '![Figure 4.7: Copilot Edit Mode refactoring a function for readability](img/B34107_04_7.png)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.7：Copilot 编辑模式重构函数以提高可读性](img/B34107_04_7.png)'
- en: 'Figure 4.7: Copilot Edit Mode refactoring a function for readability'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.7：Copilot 编辑模式重构函数以提高可读性
- en: 'Let’s look at a couple of examples. Suppose you have a complex SQL query that’s
    hard to read:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看几个例子。假设你有一个难以阅读的复杂 SQL 查询：
- en: '[PRE21]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'You could prompt GitHub Copilot with the following:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以向 GitHub Copilot 提出以下提示：
- en: '[PRE22]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'It could suggest the following:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 它可能会提出以下建议：
- en: '[PRE23]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Alternatively, let’s say you want to add tags and parameterize a resource in
    a Bicep template:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，假设你想要在 Bicep 模板中添加标签并对资源进行参数化：
- en: '[PRE24]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'You could prompt GitHub Copilot with the following:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以向 GitHub Copilot 提出以下提示：
- en: '[PRE25]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'It might generate something like this:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 它可能会生成类似以下的内容：
- en: '[PRE26]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: You can use similar edit prompts for updating documentation, improving variable
    names, or optimizing Bash scripts and configuration files.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用类似的编辑提示来更新文档、改进变量名或优化 Bash 脚本和配置文件。
- en: Best practices
  id: totrans-230
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To use Copilot Edit Mode effectively and get results you can trust, keep the
    following practices in mind:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地使用 Copilot 编辑模式并获得可信赖的结果，请记住以下实践：
- en: '**Review every change** : Treat GitHub Copilot’s edits as suggestions – always
    review, test, and validate before committing.'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审查每个更改**：将 GitHub Copilot 的编辑视为建议——在提交之前始终审查、测试和验证。'
- en: '**Use specific, actionable prompts** : The clearer your request (e.g., “extract
    this logic to a new function named `getSalary` "), the better the results.'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用具体、可操作的提示**：你的请求越清晰（例如，“将此逻辑提取到名为 `getSalary` 的新函数中”），结果就越好。'
- en: '**Work iteratively with edits** : Break down large or complex changes into
    smaller steps instead of asking for one big transformation at once. For example,
    first request that Copilot extract a block of logic into its own function, then
    issue a second edit to rename variables or improve formatting. Chaining small
    edits in sequence gives you more control, reduces the risk of incomplete or incorrect
    refactors, and makes it easier to verify each step before moving on.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代性地进行编辑**：将大型或复杂的更改分解为更小的步骤，而不是一次性请求大的转换。例如，首先请求 Copilot 将逻辑块提取到其自己的函数中，然后发出第二个编辑来重命名变量或改进格式。按顺序连锁小编辑可以给你更多的控制，减少不完整或不正确重构的风险，并在继续之前更容易验证每个步骤。'
- en: Common pitfalls to avoid
  id: totrans-235
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'While Copilot Edit Mode can save significant time, there are a few risks and
    limitations to watch out for when applying changes:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Copilot 编辑模式可以节省大量时间，但在应用更改时仍有一些风险和限制需要注意：
- en: '**Unintended changes** : GitHub Copilot may adjust more than you expect. Double-check
    for subtle logic shifts, especially in SQL or infrastructure files.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**意外更改**：GitHub Copilot 可能会调整比你预期的更多。仔细检查微妙的逻辑变化，尤其是在 SQL 或基础设施文件中。'
- en: '**Incomplete refactors** : Large or complex prompts may result in partial edits.
    Break down requests for more reliable results.'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不完整的重构**：大型或复杂的提示可能会导致部分编辑。将请求分解为更可靠的成果。'
- en: '**Losing context** : If you edit code that relies on nearby definitions, make
    sure GitHub Copilot sees enough context to do the job correctly.'
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**丢失上下文**：如果你编辑依赖于附近定义的代码，确保 GitHub Copilot 看到足够多的上下文以正确完成任务。'
- en: Use Copilot Edit Mode as a “smart pair of hands” for routine improvements, saving
    you time on repetitive edits and letting you focus on what matters most.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Copilot 编辑模式用作“智能双手”，用于日常改进，节省你在重复编辑上的时间，让你专注于最重要的事情。
- en: By learning how to use Edit Mode, you can direct Copilot to make focused improvements
    and transformations right inside your editor. These edits help with everyday refactoring,
    query cleanups, infrastructure adjustments, and script improvements, keeping you
    productive without leaving your workflow.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 通过学习如何使用编辑模式，您可以指导 Copilot 在您的编辑器内直接进行专注的改进和转换。这些编辑有助于日常重构、查询清理、基础设施调整和脚本改进，让您在保持工作流程的同时保持高效。
- en: With Edit Mode as the foundation, the next step is to explore Agent Mode, where
    Copilot can coordinate multi-step changes and apply updates across multiple files
    or even your entire project.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 在编辑模式的基础上，下一步是探索代理模式，在那里 Copilot 可以协调多步骤更改并在多个文件甚至整个项目中应用更新。
- en: 'GitHub Copilot Agent Mode: automating multi-step tasks'
  id: totrans-243
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GitHub Copilot 代理模式：自动化多步骤任务
- en: As projects grow, so do the demands for automating repetitive or large-scale
    code changes across multiple files and technologies. **GitHub Copilot Agent Mode**
    takes AI-driven development to the next level, helping you orchestrate multi-step
    tasks that would otherwise require time-consuming, manual work.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 随着项目的增长，对自动化跨多个文件和技术重复或大规模代码更改的需求也在增加。**GitHub Copilot 代理模式**将人工智能驱动的开发提升到新的水平，帮助您编排那些否则需要耗时且手动操作的多步骤任务。
- en: What is Agent Mode?
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是代理模式？
- en: Agent Mode enables GitHub Copilot to reason about multi-step tasks. Instead
    of working line by line, you define a goal or describe a project-wide change.
    GitHub Copilot analyzes your code base, determines the steps, and proposes changes
    in context. You review, approve, or modify each step, retaining full control.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式使 GitHub Copilot 能够对多步骤任务进行推理。您不是逐行工作，而是定义一个目标或描述一个项目范围内的更改。GitHub Copilot
    分析您的代码库，确定步骤，并在上下文中提出更改建议。您审查、批准或修改每个步骤，保持完全控制。
- en: Agent Mode can span code, documentation, and configuration updates in a single
    workflow, making it especially useful when a change needs to touch multiple parts
    of a project. For example, it can update code references, documentation links,
    and configuration files together, ensuring consistency across the repository.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式可以在单个工作流程中跨越代码、文档和配置更新，当需要更改影响项目的多个部分时特别有用。例如，它可以一起更新代码引用、文档链接和配置文件，确保在整个存储库中的一致性。
- en: With this capability, Copilot goes beyond generating snippets and can carry
    out end-to-end tasks. It checks the changes it makes either through AI reasoning
    or by executing local scripts and tests its findings in your project. This makes
    Agent Mode especially valuable in DevOps, CI/CD, and cloud engineering scenarios.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 利用这一功能，Copilot 超越了生成代码片段的能力，可以执行端到端任务。它通过人工智能推理或执行本地脚本来检查所做的更改，并在您的项目中测试其发现。这使得代理模式在
    DevOps、CI/CD 和云工程场景中特别有价值。
- en: Common uses include updating API endpoints, renaming resources, modernizing
    scripts, and adjusting CI/CD workflows. Agent Mode is available in supported IDEs
    (with the richest experience often found in VS Code) and is best suited to complex
    refactoring, automation, and bulk updates.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 常见用途包括更新 API 端点、重命名资源、现代化脚本以及调整 CI/CD 工作流程。代理模式在支持的 IDE 中可用（通常在 VS Code 中提供最丰富的体验）且非常适合复杂的重构、自动化和批量更新。
- en: When and how to use Agent Mode
  id: totrans-250
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 何时以及如何使用代理模式
- en: 'Agent Mode is most effective when you are working on broad or repetitive changes
    that affect multiple parts of your project. Agent Mode shines in the following
    cases:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 当您在处理影响项目多个部分的大范围或重复性更改时，代理模式最为有效。代理模式在以下情况下表现出色：
- en: You need to make consistent changes across multiple files or directories
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您需要在多个文件或目录中做出一致性的更改
- en: Refactoring impacts both application code and configuration
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重构影响应用程序代码和配置
- en: Automating repetitive DevOps, CI/CD, or infrastructure updates is a priority
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化重复的 DevOps、CI/CD 或基础设施更新是优先事项
- en: 'To get started with Agent Mode, do the following:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用代理模式，请执行以下操作：
- en: In your IDE, open the **Copilot Chat** panel. From the drop-down menu at the
    top of the panel, select **Agent** .
  id: totrans-256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的 IDE 中打开 **Copilot 聊天**面板。从面板顶部的下拉菜单中选择 **代理**。
- en: '![Figure 4.8: Agent Mode in VS Code IDE Chat panel](img/B34107_04_8.png)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![图 4.8：VS Code IDE 中的代理模式聊天面板](img/B34107_04_8.png)'
- en: 'Figure 4.8: Agent Mode in VS Code IDE Chat panel'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.8：VS Code IDE 中的代理模式聊天面板
- en: Next, describe your goal. For example, you could type “Update all deployment
    pipelines to use `ubuntu, latest` instead of `ubuntu, 20.04` ,” or “Replace `Invoke
    WebRequest` with `Invoke RestMethod` in PowerShell scripts.”
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，描述你的目标。例如，你可以键入“将所有部署管道更新为使用`ubuntu, latest`而不是`ubuntu, 20.04`”，或者“在PowerShell脚本中将`Invoke
    WebRequest`替换为`Invoke RestMethod`”。
- en: GitHub Copilot will then scan your project, list proposed changes, and allow
    you to accept or adjust each one.
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: GitHub Copilot将扫描你的项目，列出提出的更改，并允许你接受或调整每个更改。
- en: Reviewing and accepting changes in Agent Mode
  id: totrans-261
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在代理模式中审查和接受更改
- en: When Agent Mode proposes edits, you stay in control by reviewing the diffs and
    deciding whether to accept, adjust, or reject each change. Let’s walk through
    a concrete example.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 当代理模式提出编辑时，你通过审查差异并决定是否接受、调整或拒绝每个更改来保持控制。让我们通过一个具体的例子来了解一下。
- en: 'Suppose your organization is standardizing on a new deployment environment
    across all CI/CD pipelines. In this example, here is the existing pipeline snippet
    that still targets the old Ubuntu 20.04 image:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你的组织正在所有CI/CD管道中标准化新的部署环境。在这个例子中，这里是一个仍然针对旧Ubuntu 20.04映像的现有管道片段：
- en: '[PRE27]'
  id: totrans-264
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'To apply the new image across your repositories with one request, ask GitHub
    Copilot Agent Mode per the following example:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 要通过一个请求将新映像应用于你的所有存储库，请按照以下示例请求GitHub Copilot代理模式：
- en: '[PRE28]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'The Agent scans your repository, finds every YAML file with this pattern, and
    proposes an update:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 代理扫描你的存储库，找到具有此模式的每个YAML文件，并提出更新：
- en: '[PRE29]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'The proposed changes appear in a diff view, where you can do the following:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 提出的更改显示在差异视图中，你可以执行以下操作：
- en: '**Keep** the changes if they look correct'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保留**看起来正确的更改'
- en: '**Adjust** your prompt (e.g., “only apply this to release pipelines”) and rerun'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调整**你的提示（例如，“仅将此应用于发布管道”）并重新运行'
- en: '**Undo** the suggestion if it does not fit your needs'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**撤销**不符合你需求的建议'
- en: Nothing is committed until you approve it, and Copilot can optionally run local
    unit or integration tests to validate the results before you merge.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你批准，否则不会提交任何内容，Copilot可以选择在合并之前运行本地单元或集成测试以验证结果。
- en: '![Figure 4.9: Reviewing proposed edits in Agent Mode using a CI/CD YAML update](img/B34107_04_9.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![图4.9：使用CI/CD YAML更新在代理模式中审查提出的编辑](img/B34107_04_9.png)'
- en: 'Figure 4.9: Reviewing proposed edits in Agent Mode using a CI/CD YAML update'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.9：使用CI/CD YAML更新在代理模式中审查提出的编辑
- en: Best practices
  id: totrans-276
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To get reliable results with Agent Mode and avoid unnecessary rework, keep
    these practices in mind:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用代理模式获得可靠的结果并避免不必要的返工，请记住以下实践：
- en: '**Start with a clear goal** : Be specific in your prompt. For instance, “update
    all pipeline files to add a code scanning step” gives better results than “improve
    my CI/CD.”'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从明确的目标开始**：在提示中要具体。例如，“更新所有管道文件以添加代码扫描步骤”比“改进我的CI/CD”给出更好的结果。'
- en: '**Review every change** : Don’t blindly accept sweeping updates. Use the review/approve
    workflow to catch errors or unnecessary modifications.'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审查每个更改**：不要盲目接受全面的更新。使用审查/批准工作流程来捕获错误或不必要的修改。'
- en: '**Test after applying** : Run builds, deployments, or scripts after Agent Mode
    changes to confirm nothing is broken.'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**应用后测试**：在代理模式更改后运行构建、部署或脚本，以确认没有出现错误。'
- en: Common pitfalls to avoid
  id: totrans-281
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'While Agent Mode can save significant time on large-scale updates, there are
    a few risks to watch out for when applying its suggestions:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然代理模式可以在大规模更新上节省大量时间，但在应用其建议时仍有一些风险需要注意：
- en: '**Over-automation** : Large, automated changes can introduce subtle bugs or
    configuration drift. Review carefully, especially in production repos.'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过度自动化**：大型自动化更改可能会引入微妙的错误或配置漂移。在生产仓库中仔细审查。'
- en: '**Unintended scope** : Vague prompts may lead GitHub Copilot Agent Mode to
    update files you didn’t intend – always check the file list.'
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**意外的范围**：含糊的提示可能导致GitHub Copilot代理模式更新你未打算更新的文件——始终检查文件列表。'
- en: '**Missed edge cases** : Complex or custom code patterns may be missed. Combine
    Agent Mode with manual reviews for the best coverage.'
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**遗漏的边缘情况**：可能遗漏复杂或自定义代码模式。将代理模式与手动审查相结合以获得最佳覆盖率。'
- en: GitHub Copilot Agent Mode is your virtual assistant for repetitive or sweeping
    project changes, but you’re always in charge. Take time to review and test before
    merging large-scale updates. Run the changed code locally if possible, and execute
    (unit) tests as well.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot代理模式是你的虚拟助手，用于重复或大规模的项目更改，但你始终掌握着控制权。在合并大规模更新之前，花时间进行审查和测试。如果可能，在本地运行更改后的代码，并执行（单元）测试。
- en: By learning how to use Agent Mode, you have a way to direct Copilot through
    larger, multi-step changes across your code base. This complements the earlier
    features, such as completions, comments to code, inline suggestions, Ask Mode,
    and Edit Mode, by giving you a tool for project-wide automation.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 通过学习如何使用代理模式，你有一种方法可以指导 Copilot 在代码库中进行更大、多步骤的更改。这通过提供项目级自动化的工具，补充了早期功能，如补全、注释到代码、内联建议、询问模式和编辑模式。
- en: With these capabilities in place, the next section will show how you can combine
    all of these features into real workflows, chaining them together to handle practical
    development tasks from start to finish.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些能力到位的情况下，下一节将展示如何将这些功能组合成实际的工作流程，将它们链接起来以处理从开始到结束的实际开发任务。
- en: Combining features for real workflows
  id: totrans-289
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为实际工作流程组合功能
- en: GitHub Copilot’s greatest value emerges when you combine its features, code
    completions, comments to code, Ask Mode, Edit Mode, and Agent Mode into seamless
    workflows that mirror how real developers and engineers work. By chaining these
    tools, you can move from idea to implementation, review, and automation with greater
    speed and confidence, regardless of the code, script, or config file you’re working
    in.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将 GitHub Copilot 的功能、代码补全、注释到代码、询问模式、编辑模式和代理模式结合成无缝的工作流程时，GitHub Copilot 的最大价值就显现出来。通过链接这些工具，你可以更快、更有信心地从想法到实现、审查和自动化，无论你正在处理的是代码、脚本还是配置文件。
- en: This section shows how GitHub Copilot’s capabilities support you through a realistic
    task, from writing new code to improving it, automating bulk changes, and documenting,
    all in a single, productive flow.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 本节展示了 GitHub Copilot 的能力如何支持你完成一个现实任务，从编写新代码到改进它，自动化大量更改，以及编写文档，所有这些都在一个单一、高效的工作流程中完成。
- en: 'Workflow example 1: from comment to complete solution (JavaScript)'
  id: totrans-292
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作流程示例 1：从注释到完整解决方案（JavaScript）
- en: 'This example shows Copilot’s core features working in sequence, starting with
    a plain comment and finishing with tests, a small refactor, and a documentation
    update:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了 Copilot 的核心功能按顺序工作，从一条普通注释开始，以测试、小重构和文档更新结束：
- en: '**Comment to code** : Start a new file named `password.js` . Add a short, specific
    comment and the empty function, then pause to let Copilot suggest the body:'
  id: totrans-294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**注释到代码**：创建一个名为 `password.js` 的新文件。添加简短、具体的注释和空函数，然后暂停以让 Copilot 提出主体：'
- en: '[PRE30]'
  id: totrans-295
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Accept the suggested implementation with *Tab* . You can use *Alt* + *]* or
    *Alt* + *[* to cycle alternatives, or press *Esc* to dismiss and keep typing.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *Tab* 接受建议的实现。你可以使用 *Alt* + *]* 或 *Alt* + *[* 来循环选择，或者按 *Esc* 来取消并继续键入。
- en: '**Inline completion** : As you type inside the function, Copilot proposes an
    inline completion that returns a random string. Review the suggestion, then accept
    it if it matches your intent:'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**内联补全**：在函数内部键入时，Copilot 提出一个内联补全，返回一个随机字符串。审查建议，如果符合你的意图，则接受它：'
- en: '[PRE31]'
  id: totrans-298
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE31]'
- en: '**Ask Mode** : Open GitHub Copilot Ask Mode in VS Code, then write the test
    in full sentences so the request is unambiguous:'
  id: totrans-299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**询问模式**：在 VS Code 中打开 GitHub Copilot 询问模式，然后用完整的句子编写测试，以确保请求明确：'
- en: '[PRE32]'
  id: totrans-300
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Here is the response:'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是响应：
- en: '[PRE33]'
  id: totrans-302
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Then run the test to confirm the basic behavior.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 然后运行测试以确认基本行为。
- en: '**Edit Mode** : Select only the `generatePassword` function, then use GitHub
    Copilot Edit Mode to request a targeted change:'
  id: totrans-304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编辑模式**：仅选择 `generatePassword` 函数，然后使用 GitHub Copilot 编辑模式请求有针对性的更改：'
- en: '[PRE34]'
  id: totrans-305
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE34]'
- en: GitHub Copilot updates the logic to filter out those characters.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 更新逻辑以过滤掉这些字符。
- en: '**Agent Mode** : Use Copilot Agent Mode to make a small repository change that
    reinforces the new feature:'
  id: totrans-307
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理模式**：使用 Copilot 代理模式进行小型的仓库更改，以强化新功能：'
- en: '[PRE35]'
  id: totrans-308
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Agent Mode proposes the edits and a summary of changes. Inspect the changes,
    then commit if they look correct.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理模式**：代理模式提出编辑和更改摘要。检查更改，如果看起来正确，则提交。'
- en: That is the full loop, starting with a clear comment, accepting or adjusting
    inline code, asking for tests, refining with an edit, then applying a small repo-wide
    update with Agent Mode.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是完整的循环，从清晰的注释开始，接受或调整内联代码，请求测试，通过编辑进行细化，然后使用代理模式应用小范围的仓库更新。
- en: 'Workflow example 2: infrastructure and CI/CD (Terraform, YAML, PowerShell)'
  id: totrans-311
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作流程示例 2：基础设施和 CI/CD（Terraform、YAML、PowerShell）
- en: 'This example shows Copilot features working across an end-to-end scenario,
    from infrastructure code to a pipeline step, a deployment script, and finally
    a small bulk change across the repository:'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了 Copilot 功能在整个端到端场景中工作，从基础设施代码到管道步骤、部署脚本，最后在仓库中进行的小批量更改：
- en: '**Comment to code** : Open a Terraform file, then write a short, specific comment
    and start the block. Pause to let Copilot complete the resource:'
  id: totrans-313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**注释到代码**：打开一个Terraform文件，然后写一个简短、具体的注释并开始代码块。暂停以让Copilot完成资源：'
- en: '[PRE36]'
  id: totrans-314
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Accept the suggestion. You will usually see a full bucket resource with a `versioning
    { enabled = true }` block and a few useful tags.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 接受建议。您通常会看到一个带有`versioning { enabled = true }`块的完整存储桶资源以及一些有用的标签。
- en: '**Inline completion** : Begin a pipeline step that will run your deployment
    script. Copilot proposes the missing fields and a sensible inline script:'
  id: totrans-316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**内联完成**：开始一个将运行您的部署脚本的管道步骤。Copilot提出缺失的字段和合理的内联脚本：'
- en: '[PRE37]'
  id: totrans-317
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Review the commands, then accept or edit to match your workflow.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 审查命令，然后接受或编辑以匹配您的流程。
- en: '**Ask Mode** : Open GitHub Copilot Ask Mode, then request a clear security
    improvement to the pipeline:'
  id: totrans-319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**询问模式**：打开GitHub Copilot询问模式，然后请求对管道进行清晰的安全改进：'
- en: '[PRE38]'
  id: totrans-320
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Copilot proposes an additional task using a tool such as Trivy or Azure Security
    Center.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot建议使用Trivy或Azure安全中心等工具执行额外任务。
- en: '**Edit Mode** : Select your deployment script, then use GitHub Copilot Edit
    Mode to request better logging and error handling:'
  id: totrans-322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编辑模式**：选择您的部署脚本，然后使用GitHub Copilot编辑模式请求更好的日志记录和错误处理：'
- en: '[PRE39]'
  id: totrans-323
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE39]'
- en: GitHub Copilot edits the script, improving robustness and traceability. Review
    the diff, then keep or tweak the pattern to match your standards.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot编辑脚本，提高鲁棒性和可追溯性。审查差异，然后保留或调整模式以符合您的标准。
- en: '**Agent Mode** : Use GitHub Copilot Agent Mode to roll out a consistent update
    across the repository with the following prompt:'
  id: totrans-325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理模式**：使用GitHub Copilot代理模式，通过以下提示在整个仓库中推出一致的更新：'
- en: '[PRE40]'
  id: totrans-326
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Agent Mode finds each pipeline, updates `vmImage` , and presents a summary so
    you can review before committing.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 代理模式找到每个管道，更新`vmImage`，并呈现摘要，以便您在提交之前进行审查。
- en: 'That is the full flow: generate a resource with a clear comment, add a pipeline
    step with inline completion, ask for a security check, tighten your script with
    an edit, and apply a safe bulk change with Agent Mode.'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是完整的流程：使用清晰的注释生成资源，添加带有内联完成的管道步骤，请求安全检查，通过编辑使脚本更紧密，然后使用代理模式应用安全的批量更改。
- en: Best practices for combining Copilot features
  id: totrans-329
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结合Copilot功能的最佳实践
- en: 'When using Copilot features together in a single workflow, a few best practices
    will help you get the most reliable results and avoid unnecessary rework:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 当在单个工作流程中使用Copilot功能时，以下最佳实践将帮助您获得最可靠的结果并避免不必要的返工：
- en: '**Move iteratively** : Start with completions and comments to generate initial
    code, then use Ask Mode to clarify or create tests, follow with Edit Mode for
    targeted refactoring, and finish with Agent Mode for repository-wide changes.'
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迭代移动**：从生成初始代码的完成和注释开始，然后使用询问模式来澄清或创建测试，接着使用编辑模式进行有针对性的重构，最后使用代理模式进行整个仓库的更改。'
- en: '**Mix code and config** : GitHub Copilot works across code, pipelines, infrastructure,
    and documentation, which means you can use the same workflow to update all of
    these together instead of treating them as separate tasks.'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合代码和配置**：GitHub Copilot跨越代码、管道、基础设施和文档工作，这意味着您可以使用相同的流程来一起更新所有这些，而不是将它们视为单独的任务。'
- en: '**Review at each step** : Don’t skip manual review between features. Each GitHub
    Copilot tool accelerates your work, but you’re the final check.'
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每步审查**：不要在功能之间跳过手动审查。每个GitHub Copilot工具都能加速您的工作，但您是最终的检查者。'
- en: Common pitfalls to avoid
  id: totrans-334
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'While combining Copilot features can streamline development, there are a few
    pitfalls to watch out for to ensure accuracy and maintain control over your code
    base:'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然结合Copilot功能可以简化开发，但有一些陷阱需要注意，以确保准确性并保持对代码库的控制：
- en: '**Skipping validation** : Chaining features can make it easy to move fast,
    but always test code, scripts, and configs after GitHub Copilot changes, especially
    after Agent Mode bulk edits.'
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跳过验证**：功能链可以快速移动，但请始终在GitHub Copilot更改后测试代码、脚本和配置，尤其是在代理模式批量编辑之后。'
- en: '**Over-automation without review** : Combining Agent Mode and Edit Mode without
    reviewing intermediate steps can introduce issues across multiple files.'
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过度自动化而未审查**：在不审查中间步骤的情况下结合代理模式和编辑模式可能会在多个文件中引入问题。'
- en: '**Losing track of changes** : Use version control tools to track GitHub Copilot’s
    multi-step changes. Review diffs before merging to main branches.'
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**丢失跟踪**：使用版本控制工具跟踪GitHub Copilot的多步更改。在合并到主分支之前审查差异。'
- en: Think of GitHub Copilot’s features as modular building blocks. Use them together
    for a streamlined, end-to-end workflow, but always steer the process and check
    the results.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 将 GitHub Copilot 的功能视为模块化构建块。将它们一起使用，以实现流畅的端到端工作流程，但始终引导过程并检查结果。
- en: By walking through these workflow examples, you have seen how Copilot’s individual
    features can be chained together to handle practical development, infrastructure,
    and automation tasks from start to finish. These scenarios demonstrate the flexibility
    of Copilot within the IDE, but the experience can vary depending on which editor
    you are using.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 通过浏览这些工作流程示例，您已经看到了 Copilot 的单个功能如何串联起来，以处理从开始到结束的实际开发、基础设施和自动化任务。这些场景展示了 Copilot
    在 IDE 中的灵活性，但体验可能会根据您使用的编辑器而有所不同。
- en: In the next section, we will explore GitHub Copilot in different IDEs, highlighting
    what remains consistent across environments and what unique capabilities each
    editor provides.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探索不同 IDE 中的 GitHub Copilot，突出显示在环境中保持一致的内容以及每个编辑器提供的独特功能。
- en: 'GitHub Copilot in different IDEs: what’s the same, what’s unique'
  id: totrans-342
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 不同 IDE 中的 GitHub Copilot：相同之处与独特之处
- en: GitHub Copilot is available across the most popular development environments,
    including VS Code, Visual Studio, and JetBrains IDEs (such as IntelliJ IDEA, PyCharm,
    and WebStorm). While the core experience is consistent, each editor has its own
    set of capabilities and nuances. Knowing what’s possible in your chosen environment
    helps you get the most from GitHub Copilot and avoids confusion when features
    differ between tools.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 可在包括 VS Code、Visual Studio 和 JetBrains IDEs（如 IntelliJ IDEA、PyCharm
    和 WebStorm）在内的最流行的开发环境中使用。虽然核心体验保持一致，但每个编辑器都有自己的功能集和细微差别。了解您所选环境中的可能性，可以帮助您充分利用
    GitHub Copilot，并避免在功能在不同工具之间有所不同时产生混淆。
- en: Differences and unique features
  id: totrans-344
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 差异和独特功能
- en: 'While the foundation is the same, each IDE offers slightly different GitHub
    Copilot experiences. Some advanced features may appear in one editor before others.
    You can see a breakdown of the main IDEs and their features in this table:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然基础相同，但每个 IDE 都提供略微不同的 GitHub Copilot 体验。一些高级功能可能在一个编辑器中先于其他编辑器出现。您可以在以下表中查看主要
    IDE 及其功能的细分：
- en: '| Feature | VS Code | Visual Studio | JetBrains IDEs |'
  id: totrans-346
  prefs: []
  type: TYPE_TB
  zh: '| 功能 | VS Code | Visual Studio | JetBrains IDEs |'
- en: '| --- | --- | --- | --- |'
  id: totrans-347
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Inline Completions | ✔ | ✔ | ✔ |'
  id: totrans-348
  prefs: []
  type: TYPE_TB
  zh: '| 内联补全 | ✔ | ✔ | ✔ |'
- en: '| Comment to Code | ✔ | ✔ | ✔ |'
  id: totrans-349
  prefs: []
  type: TYPE_TB
  zh: '| 注释到代码 | ✔ | ✔ | ✔ |'
- en: '| Copilot Ask/Chat | ✔Sidebar/Panel | ✔Panel | ✔Panel |'
  id: totrans-350
  prefs: []
  type: TYPE_TB
  zh: '| Copilot Ask/Chat | ✔侧边栏/面板 | ✔面板 | ✔面板 |'
- en: '| Copilot Edit Mode | ✔(Full) | ✔(Full) | ✔(Full) |'
  id: totrans-351
  prefs: []
  type: TYPE_TB
  zh: '| Copilot 编辑模式 | ✔(完整) | ✔(完整) | ✔(完整) |'
- en: '| Agent Mode | ✔(Richest) | ✔(Full) | ✔(Full) |'
  id: totrans-352
  prefs: []
  type: TYPE_TB
  zh: '| 代理模式 | ✔(最丰富) | ✔(完整) | ✔(完整) |'
- en: '| Multi-file/Project Refactoring | ✔(Agent Mode) | ✔(Agent Mode) | ✔(Agent
    Mode) |'
  id: totrans-353
  prefs: []
  type: TYPE_TB
  zh: '| 多文件/项目重构 | ✔(代理模式) | ✔(代理模式) | ✔(代理模式) |'
- en: '| Markdown/Config File Support | ✔ | ✔ | ✔ |'
  id: totrans-354
  prefs: []
  type: TYPE_TB
  zh: '| Markdown/配置文件支持 | ✔ | ✔ | ✔ |'
- en: '| Frequent Feature Updates | ✔(First) | ✔(After VS Code | ✔(After VS) |'
  id: totrans-355
  prefs: []
  type: TYPE_TB
  zh: '| 常规功能更新 | ✔(首次) | ✔(VS Code 之后) | ✔(VS 之后) |'
- en: 'Figure 4.10: Comparison table of Copilot features by IDE'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.10：按 IDE 对 Copilot 功能的比较表
- en: 'GitHub Copilot is available across several major IDEs, and while the core experience
    remains similar, each editor offers a slightly different set of capabilities.
    Here is an overview of what you can expect in the most commonly used environments:'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 可在多个主要 IDE 中使用，尽管核心体验保持相似，但每个编辑器都提供略微不同的功能集。以下是您在最常用环境中可以期待的内容概述：
- en: '**VS Code** : Often gets new GitHub Copilot features first, including Edit
    Mode and Agent Mode. The open ecosystem makes it a showcase for new AI-driven
    workflows and supports the widest range of file types. The Chat extension has
    been made open source so that other editors can replicate the same mechanisms
    in their environment.'
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VS Code**：通常首先获得新的 GitHub Copilot 功能，包括编辑模式和代理模式。开放的生态系统使其成为新的人工智能驱动工作流程的展示平台，并支持最广泛的文件类型。聊天扩展已被开源，以便其他编辑器可以在其环境中复制相同的机制。'
- en: '**Visual Studio** : Supports completions, comments to code, and GitHub Copilot
    Ask/Chat for .NET and other supported languages. Copilot Edit Mode is available
    but may have limitations compared to when used in VS Code, especially for bulk
    or multi-file changes.'
  id: totrans-359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Visual Studio**：支持补全、注释到代码，以及 .NET 和其他支持语言的 GitHub Copilot Ask/Chat。Copilot
    编辑模式可用，但与在 VS Code 中使用相比可能有限制，尤其是在批量或多文件更改方面。'
- en: '**JetBrains IDEs** : Provide solid inline suggestions, comment-to-code translations,
    and conversational chat within the editor. As of now, Copilot Edit Mode is available,
    enabling interactive code refactoring across multiple files. Agent Mode is also
    generally available, supporting automated multi-step updates using natural language
    tasks.'
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**JetBrains IDEs**：提供坚实的内联建议、注释到代码的翻译以及编辑器内的对话式聊天。截至目前，Copilot编辑模式可用，允许跨多个文件进行交互式代码重构。代理模式也通常可用，支持使用自然语言任务进行自动多步更新。'
- en: '**Neovim** : Offers inline code suggestions, enabling real time completions
    as you type.'
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Neovim**：提供内联代码建议，允许你在键入时实时完成。'
- en: '**Eclipse IDE** : Supports both inline suggestions and Copilot Chat (Ask Mode)
    directly within the editor.'
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Eclipse IDE**：支持在编辑器内直接提供内联建议和Copilot Chat（询问模式）。'
- en: '**Xcode** : Provides inline suggestions and includes Copilot Chat functionality,
    delivering conversational assistance within the IDE.'
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Xcode**：提供内联建议，并包含Copilot Chat功能，在IDE内提供对话式辅助。'
- en: Best practices
  id: totrans-364
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践
- en: 'To make the most of GitHub Copilot in your preferred IDE, keep the following
    practices in mind:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分利用GitHub Copilot在你的首选IDE中，请记住以下实践：
- en: '**Check the GitHub Copilot extension page for your IDE** : Features change
    quickly. Review the docs or release notes to stay current. Here are direct links:'
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检查你IDE的GitHub Copilot扩展页面**：功能变化很快。查看文档或发布说明以保持最新。以下是一些直接链接：'
- en: '**VS** Code: [https://marketplace.visualstudio.com/items?itemName=GitHub.copilot](https://marketplace.visualstudio.com/items?itemName=GitHub.copilot)'
  id: totrans-367
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VS** Code：[https://marketplace.visualstudio.com/items?itemName=GitHub.copilot](https://marketplace.visualstudio.com/items?itemName=GitHub.copilot)'
- en: '**JetBrains** : [https://plugins.jetbrains.com/plugin/17718-github-copilot](https://plugins.jetbrains.com/plugin/17718-github-copilot)'
  id: totrans-368
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**JetBrains**：[https://plugins.jetbrains.com/plugin/17718-github-copilot](https://plugins.jetbrains.com/plugin/17718-github-copilot)'
- en: '**Visual** Studio: [https://learn.microsoft.com/visualstudio/ide/visual-studio-github-copilot-install-and-states?view=vs-2022](https://learn.microsoft.com/visualstudio/ide/visual-studio-github-copilot-install-and-states?view=vs-2022)'
  id: totrans-369
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Visual** Studio：[https://learn.microsoft.com/visualstudio/ide/visual-studio-github-copilot-install-and-states?view=vs-2022](https://learn.microsoft.com/visualstudio/ide/visual-studio-github-copilot-install-and-states?view=vs-2022)'
- en: '**Leverage the right tool for the job** : If you need the newest features,
    such as Agent Mode, try VS Code for bulk refactoring or DevOps automation tasks.'
  id: totrans-370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用正确的工具完成任务**：如果你需要最新的功能，如代理模式，尝试使用VS Code进行大量重构或DevOps自动化任务。'
- en: '**Sync shortcuts** : Customize keyboard shortcuts so Copilot actions fit naturally
    into your workflow.'
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**同步快捷键**：自定义键盘快捷键，使Copilot操作自然融入你的工作流程。'
- en: Common pitfalls to avoid
  id: totrans-372
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: 'Working with GitHub Copilot across different IDEs is powerful, but there are
    a few challenges that can trip you up if you are not prepared:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在不同的IDE中使用GitHub Copilot非常强大，但如果你没有做好准备，以下是一些可能会让你绊倒的挑战：
- en: '**Expecting feature parity** : Not all editors support every GitHub Copilot
    feature at the same time. Adjust your expectations if you don’t see a feature
    available in your IDE.'
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**期望功能一致性**：并非所有编辑器同时支持每个GitHub Copilot功能。如果你的IDE中没有看到某个功能，请调整你的期望。'
- en: '**Missing updates** : Failing to update the GitHub Copilot extension may leave
    you without the latest improvements.'
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺少更新**：未能更新GitHub Copilot扩展可能会让你错过最新的改进。'
- en: '**Inconsistent UX** : Minor UI differences (such as the location of the chat
    panel or edit commands) can cause confusion. Explore your IDE to discover where
    GitHub Copilot features are accessed.'
  id: totrans-376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不一致的用户体验**：微小的UI差异（如聊天面板的位置或编辑命令）可能会导致困惑。探索你的IDE以发现GitHub Copilot功能是如何访问的。'
- en: If you’re ever in doubt about what GitHub Copilot can do in your editor, check
    the docs or the extension marketplace. Updates are frequent, and features roll
    out regularly across the ecosystem. You can find the marketplace by visiting [https://github.com/marketplace](https://github.com/marketplace)
    .
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对你的编辑器中GitHub Copilot能做什么感到怀疑，请查看文档或扩展市场。更新频繁，功能定期在整个生态系统中推出。你可以通过访问[https://github.com/marketplace](https://github.com/marketplace)来找到市场。
- en: Summary
  id: totrans-378
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned how GitHub Copilot works inside the IDE across
    core features such as code completions, comments to code, inline suggestions,
    Ask, Edit, and Agent Mode, and how to combine them into practical workflows that
    cover application code, infrastructure definitions, CI/CD files, and documentation.
    You saw why this matters for day-to-day development, since these tools can reduce
    repetitive work, surface reasonable starting points, and speed up refactoring
    while still requiring you to review, test, and keep changes aligned with project
    standards. You also learned that the core experience is consistent across major
    editors, with some differences in advanced capabilities, so checking your IDE’s
    Copilot extension for updates is worthwhile.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了GitHub Copilot如何在IDE内部工作，包括代码补全、代码注释、内联建议、询问、编辑和代理模式等核心功能，以及如何将它们组合成涵盖应用程序代码、基础设施定义、CI/CD文件和文档的实用工作流程。你看到了为什么这对于日常开发很重要，因为这些工具可以减少重复性工作，提供合理的起点，并加快重构速度，同时仍然需要你进行审查、测试，并确保更改与项目标准保持一致。你还了解到，核心体验在主要编辑器之间是一致的，尽管在高级功能方面存在一些差异，因此检查你IDE的Copilot扩展以获取更新是值得的。
- en: In the next chapter, we shift from feature mechanics to IDE integrations such
    as the terminal, command-line interface, and debugging support, so you can apply
    GitHub Copilot beyond the editor pane and streamline more of your workflow.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将从功能机制转向IDE集成，如终端、命令行界面和调试支持，这样你就可以将GitHub Copilot的应用范围扩展到编辑器面板之外，并简化你的更多工作流程。
