  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定如何加强孩子对诚实重要性的认识。
- en: You cut someone off in traffic, and they angrily gestured at you. You…
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你在交通中挡了别人的道，他们愤怒地朝你比划。你...
- en: Drive more carefully; you know the rules of the road.
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 驾驶更加小心；你知道交通规则。
- en: Drive more carefully; everyone deserves to be safe.
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 驾驶更加小心；每个人都应该感到安全。
- en: Resolve to become the best driver you can be.
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下定决心成为最好的司机。
- en: A friend worries they need an abortion and wants you there to support them.
    You…
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个朋友担心他们需要做流产，希望你在那里支持他们。你...
- en: Refuse to go on the grounds it is wrong to end a life.
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 拒绝参与，因为结束生命是错误的。
- en: Examine the situation from all sides to determine the best action.
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从各个方面审视情况，以确定最佳行动方案。
- en: Try to be the best friend possible and seek guidance from trusted friends or
    people you respect for advice.
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尽力成为最好的朋友，并从信任的朋友或你尊重的人那里寻求建议。
- en: You are offered a dream job that involves relocating. You…
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你被提供了一个涉及搬迁的梦寐以求的工作。你...
- en: Verify what expenses they will pay and what you will be paying.
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 核实他们将支付的费用以及你将支付的费用。
- en: Consider the impact on you and your partner, your friends, and your family.
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑对你和你的伴侣、你的朋友以及你的家庭的影响。
- en: Ask someone else for advice because you are unsure.
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于不确定，向他人寻求建议。
- en: 'Now that you have completed the quiz, be sure to tally up your answers so that
    you know which theories you are using when making moral decisions. This is an
    essential part of understanding your decisions, but also the decisions of those
    who disagree with you. Recognizing what matters to those you disagree with is
    even more important in negotiating and resolving moral dilemmas. Once you learn
    what drives complicated choices, material conversations become possible.Answers:
    Mostly As – Deontological Ethics, Mostly Bs – Consequentialist Ethics, Mostly
    Cs - Virtue EthicsLet’s now understand these ethical theories in the upcoming
    sections.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经完成了测验，务必统计你的答案，以便你知道在做出道德决定时使用了哪些理论。这是理解你的决定以及那些不同意你的人的决定的一个重要部分。认识到那些不同意你的人所重视的东西，在谈判和解决道德困境时更为重要。一旦你了解了驱动复杂选择的原因，深入的对话就变得可能。答案：大部分是A
    - 德性伦理学，大部分是B - 功利主义伦理学，大部分是C - 功德伦理学。现在让我们在接下来的部分中了解这些伦理理论。
- en: Understanding deontological ethics
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解德性伦理学
- en: Immanuel Kant’s **deontological theory** is a theory that hinges on rationalism.
    In other words, you must use reason to determine what is right. So, if you think
    deeply about moral choices, you will know what to do. For Kant, the correct or
    right moral choice should be constant to overcome religion's subjective challenge.
    And if moral choices are constant, we can understand them as moral truths or absolutes.
    This means that moral truths exist. This also means that the focus of a moral
    dilemma must be on the act we wish to do rather than the consequences or fallout
    of a decision. We must first understand Kant's view to consider how this might
    be possible.Imagine that you are faced with a person who is impoverished and,
    in desperation, takes food from a local grocery store. Many might claim that taking
    the food under desperate circumstances is moral. However, if you think about this
    scenario, what is actually being asked is if a person should be able to take what
    they want from others. It does not matter if the grocery store is large and can
    easily absorb the loss (expense) of taking the food or if the person is hungry
    or desperate. The accurate question we arrive at after thinking through this scenario
    is if we should all agree to live in a world where when people want something,
    they take it. The moral question was whether stealing should be permissible. Poverty,
    the grocery store size, the ability to overcome the loss of product, and other
    rationalizations are attempts to avoid the true question regarding stealing and
    speak to variable consequences.Yet, not all choices hinge on what is right; instead,
    we focus on what we want or desire. For instance, you might work late one night
    for more free time over the weekend. This decision may be the right thing to do,
    but it does not have moral weight. Kant referred to these as **hypothetical imperatives**,
    focusing on what to do when you want something. These should be considered a more
    practical choice rather than a moral one. They can also be recognized because
    the action is not required; you could choose to work on the weekend instead or
    find a third option.**Categorical imperatives** are those related to moral choices
    you must make, even when you prefer to do something else. “Categorical because
    it does not depend on anyone’s particular desires and an imperative because it
    is a command of reason.” (Cahn, 2018). This means we are all bound to follow moral
    law even if we don’t want to. To understand which imperative you are facing, rational
    thought will lead you to the correct conclusion. To explain this idea, Kant used
    formulations of the imperatives.The first formulation is that we must only follow
    the moral rules (**maxims**) that we would choose to be universal. Our earlier
    example of stealing fits this rule because determining that people may violate
    the maxim of not stealing would lead to stealing as a morally good or right thing.
    For most, that makes little sense. It would also mean that no one could be held
    accountable for stealing.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 伊曼努尔·康德的**义务论理论**是一种基于理性主义的理论。换句话说，你必须运用理性来判断什么是对的。因此，如果你深入思考道德选择，你就会知道该怎么做。在康德看来，正确的或正确的道德选择应该是恒定的，以克服宗教的主观挑战。如果道德选择是恒定的，我们可以将它们理解为道德真理或绝对真理。这意味着道德真理是存在的。这也意味着道德困境的焦点必须是我们希望做的行为，而不是决策的后果或影响。我们必须首先理解康德的观点，才能考虑这种可能性。想象一下，你面对的是一个贫穷的人，在绝望中从当地杂货店拿走了食物。许多人可能会声称，在绝望的情况下拿走食物是道德的。然而，如果你思考这个场景，实际上被问到的其实是人是否应该能够从别人那里拿走他们想要的东西。杂货店的大小、能否轻易吸收拿走食物的损失（费用）以及个人的饥饿或绝望都不重要。在思考这个场景后，我们得出的准确问题是，我们是否都应该同意生活在一个当人们想要某样东西时就可以拿走的世界。道德问题在于偷窃是否应该被允许。贫穷、杂货店的大小、克服产品损失的能力以及其他合理化都是试图避免关于偷窃的真正问题，并讨论可变后果。然而，并非所有选择都取决于什么是对的；相反，我们关注我们想要或渴望的东西。例如，你可能会为了周末有更多空闲时间而在某个晚上加班。这个决定可能是正确的事情，但它没有道德分量。康德将这些称为**假言命令**，关注的是当你想要某样东西时应该做什么。这些应该被视为更实际的选择，而不是道德选择。它们也可以通过行动不是必需的来识别；你可以选择周末工作，或者找到第三个选择。**定言命令**是与你必须做出的道德选择相关的，即使你更喜欢做其他事情。“定言，因为它不依赖于任何人的特定欲望，命令，因为它是一种理性的命令。”（Cahn，2018）。这意味着即使我们不愿意，我们都被道德法律所束缚。为了理解你面临的是哪种命令，理性思考将引导你得出正确的结论。为了解释这个想法，康德使用了命令的公式。第一个公式是我们必须只遵循我们愿意普遍化的道德规则（**格言**）。我们之前关于偷窃的例子符合这个规则，因为确定人们可能违反不偷窃的格言会导致偷窃成为一种道德上好的或正确的事情。对大多数人来说，这几乎没有意义。这也意味着没有人可以因为偷窃而受到追究。
- en: 'Categorial Imperative: Universality'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 类别命令：普遍性
- en: ''
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Act only on those maxims (rules) that you would will to be universal (Cahn,
    2018). To will something is to have the ability to make a choice. So, to will
    that a thing should be made universal is to choose whether it is right or wrong
    without contradiction (sometimes right or wrong).
  id: totrans-56
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 只按照那些你愿意使其普遍化的（规则）准则行事（Cahn, 2018）。意愿某事就是拥有做出选择的能力。因此，意愿某事物应该被普遍化就是选择它是对的还是错的，而不存在矛盾（有时是对的还是错的）。
- en: 'The second formulation is grounded by a sense of duty that Kant believes that
    we all have toward others. Through our duty to others, we must ensure that people
    are respected as having their aims, desires, and needs that they must be allowed
    to pursue for themselves. It cannot be that we use people wrongly to facilitate
    our desires and needs while ignoring theirs. This is the foundation for the second
    formulation that states that we must only use people as ends and never as a means.
    This is called the formula of the **End in Itself** and is explained by Kant as
    follows:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个公式的依据是一种责任感，康德认为我们都有对他人承担的这种责任感。通过我们对他人的责任，我们必须确保人们被视为有他们自己的目标、欲望和需求，他们必须被允许自己去追求。我们不能利用人们来实现我们的欲望和需求，同时忽视他们的需求。这是第二个公式的基石，该公式指出我们必须只把人们作为目的，而不是手段。这被称为**自身目的公式**，康德如下解释道：
- en: 'Categorical Imperative: End in Itself'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 类别命令：自身目的
- en: ''
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Act in such a way that you always treat humanity, whether in your own person
    or in the person of any other, never simply as a means but always at the same
    time as an end. (Cahn, 2018)
  id: totrans-60
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 以这样的方式行事，你总是将人性，无论是你自己的还是任何其他人的，既不单纯作为手段，同时也作为目的来对待。（Cahn, 2018）
- en: It is fair to say that we sometimes use people as a means, such as when we go
    to the bank, and the teller gives us our funds. So, some clarification is needed
    on when we may use someone to forward our ends and when it is wrong. “To use someone
    as a *mere means* is to involve them in a scheme of action *to which they could
    not in principle consent*” (Cahn, 2018). This means that when the other person
    agrees with full disclosure to assist you, you are not using them. When you omit
    details that might make them refuse to be involved in your scheme of action, you
    are using them merely as a means (wrongly). This prohibits deception, coercions,
    lies, half-truths, and so on.The sticking point for most people when introduced
    to Kant’s theory of deontology is the universality condition. Many people support
    exceptions to rules or the idea that rules are made to be broken. Kant accepts
    neither, instead demanding that we should only follow those rules we want others
    to follow. This is not the same as following the golden rule where we treat others
    as we’d want to be treated because that would mean that if you felt you deserved
    an exception, you should grant them to others, too. And Kant would have none of
    that. Instead, Kant expects everyone to be held to the same standard without aberration,
    even to claim the moral high ground.It seems right to challenge Kant on the claim
    that sometimes we must sacrifice our moral truths to bring about a greater good.
    For example, consider this version of a popular example:The police knock on your
    door and ask if you are hiding your friend. You have chosen to do so, believing
    that evidence can be found to exonerate them – you believe they are innocent.
    You reply to the police that you have no idea where your friend can be found and
    end the conversation. Unfortunately, the friend overheard what you said and attempted
    to run away but was caught two blocks from your house. (Green, 2016) If you had
    told the truth, the police might have searched where you said your friend was
    hiding (in the bedroom closet) while your friend slipped out the door. However,
    your lie changed how the situation played out, making you responsible for the
    outcome – not the police or your innocent friend – but you despite your good intentions.
    So, if your friend were harmed in their apprehension, their harm would be your
    fault. For Kant, the responsibility lies with the person who lied.The default
    objection to deontology is that ignoring extenuating circumstances (consequences)
    and focusing only on an act seems wrong. Surely, suffering or troubling situations
    lead a person to make a wrong choice. It is also possible to want a universal
    rule that others would agree to but still seem wrong. People often want wrong
    things, and the idea that the only moral rules are those where the majority rules
    seem problematic. Lastly, when focusing on duties to others, what should someone
    does when they have a duty to many people?In conclusion, Kant’s deontology is
    a rule-based moral theory that focuses on making moral choices focused on universal
    acceptance and duty to others. This theory focuses on the act or choice rather
    than the consequences. And it holds that responsibility for moral outcomes lies
    with people who violate moral rules through their actions. This view can seem
    cold or uncaring of others or dismissive of the challenges of making moral choices
    in our modern world, specifically because there are no exceptions or excuses to
    allow deviation from moral rules (*Further reading*, *Resources 1 and 3*).There
    is another view that considers the complexity of choice-making and the consequences
    that our most difficult choices bring, we will explore that next.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Looking at Consequentialist Theory
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 观察后果主义理论
- en: '**Utilitarianism**, or the theory of utility addresses the concerns regarding
    consequences that deontology avoids – while disregarding the intentions behind
    moral actions. This moral theory claims that good consequences make good moral
    choices. So, to make good choices, we must have a method of evaluating the consequences
    of our actions. And we can evaluate these consequences by determining how much
    happiness can be gained from them. Happiness, then, is the end that all our choices
    and actions are directed toward. So, the foundation of this view is to seek pleasure
    and avoid pain.This view does not focus on egoistic concerns such as doing what
    a person wants for themselves so that they end up better off. Instead, it is often
    considered a **hedonistic theory** because of the emphasis on pleasure and the
    reduction of pain equating to happiness. However, the strength of the utility
    (happiness) theory is that it focuses on the maximum happiness for as many people
    as possible. This is known as the greatest happiness principle:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**功利主义**，或效用理论，解决了德性论所避免的关于后果的担忧——同时忽略了道德行为的意图。这种道德理论声称好的后果使得道德选择是好的。因此，为了做出好的选择，我们必须有一种评估我们行为后果的方法。我们可以通过确定从这些行为中可以获得多少幸福来评估这些后果。因此，幸福是我们所有选择和行动所指向的目标。所以，这种观点的基础是寻求快乐和避免痛苦。这种观点并不关注自我中心的关切，比如一个人为了自己的利益而做的事情，以至于他们最终过得更好。相反，由于强调快乐和减少痛苦等同于幸福，它通常被认为是一种**享乐主义理论**。然而，效用（幸福）理论的优点是它关注尽可能多的人的最大幸福。这被称为最大的幸福原则：'
- en: The Greatest Happiness principle
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最大的幸福原则
- en: ''
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “We should act always so as to produce the greatest good for the greatest number.”
    ([https://legaldesire.com/benthams-utilitarianism-theory-scope-criticisms/](https://legaldesire.com/benthams-utilitarianism-theory-scope-criticisms/))
  id: totrans-66
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们应该始终采取行动，以产生对最大多数人的最大好处。” ([https://legaldesire.com/benthams-utilitarianism-theory-scope-criticisms/](https://legaldesire.com/benthams-utilitarianism-theory-scope-criticisms/))
- en: 'It is important to note that to determine how much happiness can be gained
    from a consequence, we must have a unit of measure for happiness. A **hedon**
    is a unit of pleasure, and a **dolor** measures pain. We must determine the number
    of hedons connected to a consequence to evaluate it. For instance, if you have
    not seen your family in a long time, you may consider its value 100 hedons. On
    the other hand, if seeing them is hurtful, the visit might have a value of 100
    dolors. There may also be many sub-consequences that can be similarly broken into
    hedons and dolors until we arrive at a final determination and prescribed action.
    Sometimes, this calculus leads to easily followed actions and other times, the
    answer is problematic.The challenge with providing happiness for others (and situating
    your needs as no more important than others) is that you may have to act in a
    way that is not your preference or does not suit your desires so the greater good
    will prevail. For example, imagine that you want to visit with friends. You were
    hoping for a relaxed evening with a great dinner and conversation. However, your
    friend group wanted to go to a concert. Ultimately, you decide to support the
    others in going to the concert. It wasn’t what you wanted but it would make everyone
    else happy.Still, it seems that making choices to suit everyone rather than yourself
    could be problematic. To remind us that our own desires still only get one vote,
    utilitarians accept that they must assume the role of someone who is disinterested
    and merely watching situations unfold. This vantage point will allow me to table
    my feelings and opinions on the matter and to witness events rather than consider
    myself a participant. This should help eliminate bias and truly suggest what is
    best for everyone.One challenge related to this theory is that it may result in
    choices that violate your moral views. For instance, imagine you are at a bank,
    and a gunman comes in to rob it. You can select someone to be killed if the bank
    doesn’t give them the money. You believe it’s wrong to kill, but selecting a person
    means saving twenty others. Under the utility theory, the right thing to do is
    to choose a person to sacrifice to save others – even though you disagree with
    killing.This traditional view of utilitarianism is called **act utilitarianism**.
    This is the view that we have been discussing. It can be summed up as follows:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，为了确定从后果中可以获得多少幸福，我们必须有一个幸福度的衡量单位。**享乐**是快乐的一个单位，而**痛苦**则衡量痛苦。我们必须确定与后果相关的享乐数量来评估它。例如，如果你很久没有见到你的家人，你可能会认为它的价值是100享乐。另一方面，如果你见到他们感到痛苦，这次拜访可能的价值是100痛苦。还可能有许多类似的次级后果，可以将它们分解为享乐和痛苦，直到我们得出最终的决定和规定的行动。有时，这种计算会导致容易遵循的行动，而有时，答案是有问题的。为他人提供幸福（并将你的需求视为不比他人更重要）的挑战在于，你可能不得不采取一种不是你偏好的或不符合你愿望的行动，以便更大的利益得以实现。例如，想象一下你想和朋友聚会。你希望有一个轻松的夜晚，享受一顿美餐和交谈。然而，你的朋友群想去听音乐会。最终，你决定支持其他人去听音乐会。这不是你想要的，但它会让其他人开心。尽管如此，似乎为了满足每个人而不是自己而做出的选择可能会出现问题。为了提醒我们，我们自己的愿望仍然只有一票，功利主义者接受他们必须扮演一个无私的观察者角色，仅仅观察情况的发展。这个视角将使我能够暂时放下我的感受和意见，并观察事件而不是将自己视为参与者。这应该有助于消除偏见，真正地提出对每个人都最好的建议。与这一理论相关的一个挑战是，它可能导致违反你道德观念的选择。例如，想象你在一所银行，一个持枪者闯进来抢劫。你可以选择一个人被杀，如果银行不给他们钱。你认为杀人是不对的，但选择一个人意味着可以拯救二十个人。在效用理论中，正确的事情是选择一个人牺牲以拯救其他人——即使你不同意杀人。这种传统的功利主义观点被称为**行为功利主义**。这是我们一直在讨论的观点。它可以总结如下：
- en: Act utilitarianism
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 行为功利主义
- en: ''
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “An act is right if and only if it results in as much good as any available
    alternative” (Cahn, 2018).
  id: totrans-70
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “一个行为是正确的，当且仅当它产生的善与任何可用的替代方案一样多”（Cahn, 2018）。
- en: 'There is another form of utilitarianism, rule utilitarianism. It is explained
    via the following quote:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种形式的功利主义是规则功利主义。它通过以下引言来解释：
- en: Rule utilitarianism
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 规则功利主义
- en: ''
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: An act is right if and only if required by a rule that is itself a member of
    a set of rules whose acceptance would lead to greater utility for society than
    any available alternative” (Cahn, 2018).
  id: totrans-74
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个行为是正确的，当且仅当它符合一个规则，而这个规则本身是规则集的一个成员，接受这个规则集将比任何可用的替代方案为社会带来更大的效用”（Cahn, 2018）。
- en: 'This more expansive view looks to scale happiness over the long term. (It differs
    from deontology, which deems that rules should be universal and recognize our
    duty to others.) These rules would be focused on ensuring consequences led to
    happiness for the greater society. For instance, while it might be appropriate
    to sacrifice one person to save 20 hostages, we likely would not want to give
    surgeons permission to harvest organs from healthy patients, even if they could
    save more ill patients.It is difficult to imagine anyone objecting to a view that
    promotes happiness. Especially one that can respond to any dilemma while promoting
    happiness and minimizing pain. Utilitarianism does have its detractors who have
    launched serious objections to the view. Here, we will briefly discuss five of
    the most popular mentions (Cahn, 2018):'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这种更广泛的观点着眼于长期增加幸福。（它与德性论不同，德性论认为规则应该是普遍的，并认识到我们对他人有责任。）这些规则将专注于确保后果为整个社会带来幸福。例如，虽然为了拯救20名人质而牺牲一个人可能是合适的，但我们可能不希望允许外科医生从健康患者身上摘取器官，即使他们能够拯救更多的病人。很难想象有人会反对一个促进幸福观点的看法。尤其是那种能够在促进幸福的同时最小化痛苦并应对任何困境的观点。功利主义确实有一些批评者，他们对这种观点提出了严重的反对。在这里，我们将简要讨论五种最流行的观点（Cahn，2018）：
- en: '**The no-rest objection objection**: If we must always add happiness to the
    world, no matter what we do, we could do more or something better.'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**无休息异议**：如果我们必须始终向世界增加幸福，无论我们做什么，我们都可以做更多或更好的事情。'
- en: '*Response*: Invoke a rule allowing rest or a reprieve, which would also maximize
    utility.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '*回应*：调用允许休息或缓刑的规则，这将也会最大化效用。'
- en: '**The absurd implication objection**: We may have to tackle some rather absurd
    challenges, such as having a tie between the truth and a lie.'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**荒谬含义异议**：我们可能不得不应对一些相当荒谬的挑战，例如在真相和谎言之间产生联系。'
- en: '*Response*: To be honest, sometimes a lie is called for, so perhaps this concern
    reveals an accurate look at dilemmas.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*回应*：说实话，有时需要撒谎，所以也许这个担忧揭示了困境的准确看法。'
- en: '**The integrity objection**: Sometimes, we may have to violate our moral code
    and commit acts we would rather avoid.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**完整性异议**：有时，我们可能不得不违反我们的道德准则并实施我们宁愿避免的行为。'
- en: '*Response*: This is also the case sometimes, and avoiding it is impossible.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*回应*：有时情况也是如此，避免它是无法实现的。'
- en: '**The justice objection**: Situations may call for us to have a casual view
    of justice or rights. After all, if the math reveals that violating rights will
    add the most happiness, then we must commit the rights violation.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**正义异议**：有些情况下，我们可能需要对我们对正义或权利的看法采取随意态度。毕竟，如果数学表明违反权利将带来最大的幸福，那么我们必须实施权利侵犯。'
- en: '*Response*: We may have to violate or balance rights against the greater good.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '*回应*：我们可能不得不违反或权衡权利与更大利益之间的关系。'
- en: '**The publicity objection**: You must know moral principles to follow them.
    Yet, utilitarians do not hold that everyone should follow the principles of utility
    due to the deliberation involved.'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**公开性异议**：你必须知道道德原则才能遵循它们。然而，功利主义者并不认为每个人都应该因为涉及到的深思熟虑而遵循效用原则。'
- en: '*Response*: If others are to follow this moral view, the rules or guidance
    must be known and made publicly available. And we do this through laws and legislation.
    This objection is applicable only to act utilitarianism.In closing, Utilitarianism
    is a view of the good being added to the world, and it is hard to think of that
    as problematic. Still, the challenges of the calculus (tallying hedons and dolors)
    and determining the consequences to be evaluated, only to arrive at choices that
    might have us acting in ways never imagined, complicates this theory (and our
    acceptance of it). Further, we may often be required to take actions that seem
    to violate our own deeply held beliefs in favor of the happiness of others. Such
    self-sacrifice can challenge us to accept this view as pragmatic and worthy. You
    can explore more about this from *Resource 2* in the *Further reading* section.We
    have discussed the clarity that comes with a rule-based approach (deontology)
    and now a consequence-based approach in utilitarianism. But we have said little
    about the person making the choice or how their character can influence their
    choices.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '*回应*: 如果其他人要遵循这种道德观点，规则或指导必须为人所知，并公开提供。我们通过法律和立法来实现这一点。这种反对意见仅适用于行为功利主义。在结束之前，功利主义是一种认为世界上的善被增加的观点，很难认为这有什么问题。然而，计算（总计快乐和痛苦）以及确定要评估的后果，只是为了到达可能让我们以从未想象过的方式行动的选择，这使这一理论（以及我们对它的接受）变得复杂。此外，我们可能经常需要采取似乎违反我们自身深刻信念以利于他人幸福的行为。这种自我牺牲可以挑战我们接受这一观点作为实用主义和值得的。您可以从*进一步阅读*部分的*资源
    2*中了解更多关于这方面的内容。我们已经讨论了基于规则的途径（德性论）带来的清晰性，现在讨论基于后果的途径——功利主义。但我们很少谈论做出选择的人或他们的性格如何影响他们的选择。'
- en: Exploring character through Virtue Ethics
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过美德伦理探索人物性格
- en: Aristotle’s **virtue ethics** is a third moral theory that should be considered.
    Virtue ethics holds that it is possible for someone to become a person who can
    always act from virtue through doing, saying, and acting correctly for the circumstances.
    And that a person who can do these things is considered virtuous (to act morally
    or correctly) and has good moral character. This theory does not get bogged down
    in consequences like utilitarianism or rules like deontology. Instead, this theory
    focuses on the person choosing the action and the qualities a good moral person
    should have – it is about a person’s character.From this idea of being a person
    of good character, it follows that good people make good choices and decisions.
    Still, we must learn how to be good people to make good choices, but Aristotle
    argues that this is possible and that it is what we are meant to do if humanity
    is to flourish or live well (Cahn, 2018). But to act in accordance with our nature
    and flourish, we must recognize that virtues are character traits that will assure
    good behavior once developed. These virtues sit at the midpoint between two extremes
    or vices. By acting from the middle, or golden mean, we learn to become good people
    and make good choices. In the example in *Figure 1.1*, we avoid both the extremes
    of victimhood and aggression (vices) to end up at assertiveness (**golden mean**).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 亚里士多德的**美德伦理**是应该考虑的第三种道德理论。美德伦理认为，一个人通过正确地行动、说话和根据情况行事，可以成为一个始终能从美德出发的人。这样的人被认为是有德行的（行为道德或正确），并且具有良好的道德性格。这种理论不像功利主义那样陷入后果，也不像德性论那样陷入规则。相反，这种理论关注选择行为的人以及一个有良好道德的人应该具备的品质——这是关于一个人的性格。从这个有良好性格的人的概念出发，可以得出结论，好人会做出好的选择和决定。然而，我们必须学习如何成为好人以做出好的选择，但亚里士多德认为这是可能的，如果我们想要人类繁荣或生活得更好，这就是我们注定要做的事情（Cahn，2018）。但为了按照我们的本性行事并繁荣，我们必须认识到美德是确保一旦发展就会产生良好行为的性格特征。这些美德位于两个极端或恶习之间。通过从中间，或黄金法则，我们学会成为好人并做出好的选择。在*图
    1.1*的例子中，我们避免了受害者和侵略（恶习）的两种极端，最终达到自信（**黄金法则**）。
- en: '![Figure 1.1 – The golden mean](img/file0.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.1 – 黄金法则](img/file0.png)'
- en: Figure 1.1 – The golden mean
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.1 – 黄金法则
- en: Imagine someone who is often bullied and refuses to stand up for themselves.
    They are often mistreated and suffer because they cannot establish good boundaries;
    this is not the path to human flourishing. Aggressive people will also fail to
    flourish due to ongoing conflicts and stress in their interactions. However, an
    appropriately assertive person can flourish because they are neither the victim
    nor the aggressor. In addition, Aristotle also claimed that the golden mean (the
    midpoint between two vices) would be different for different situations. For instance,
    being assertive seems correct under many circumstances. Still, when faced with
    a person who is both strong and angry, it might be that the golden mean would
    be closer to pacifism because calming the situation seems to be the better idea.
    Virtue ethics allows for this intuitive understanding of circumstances of informing
    right actions.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，有一个人经常被欺负，却拒绝为自己挺身而出。他们经常遭受虐待并遭受痛苦，因为他们无法建立良好的界限；这不是人类繁荣的道路。具有侵略性的人也会因为他们在互动中的持续冲突和压力而无法繁荣。然而，一个适度自信的人可以繁荣，因为他们既不是受害者也不是侵略者。此外，亚里士多德还声称，黄金法则（两种恶习之间的中点）在不同情况下会有所不同。例如，在许多情况下，自信似乎是正确的。然而，当面对一个既强大又愤怒的人时，黄金法则可能更接近于和平主义，因为平息局势似乎是一个更好的主意。美德伦理学允许我们对情境有这种直观的理解，从而指导正确的行动。
- en: The Golden Mean
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 黄金法则
- en: ''
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “… It is a mean between two vices, the one involving excess, the other involving
    deficiency, and it is such because its character is to aim at what is intermediate
    in passions and actions…” (Cahn, 2018).
  id: totrans-93
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “……它是一种介于两种恶习之间的中庸之道，一种涉及过度，另一种涉及不足，它之所以如此，是因为它的特性是旨在追求激情和行动中的中间状态……”（Cahn,
    2018）。
- en: This seems to mean that virtue ethics cannot be learned and is more intuitive
    since responses must be tailored to every situation. Fortunately, Aristotle assures
    us that it is possible to learn to be virtuous, but you must do so by practicing
    acting from the golden mean. In other words, this is a practical skill and wisdom.
    Aristotle would certainly subscribe to the idea that practice makes perfect when
    it comes to virtues.Before acting upon the virtues, the golden mean between two
    vices, we must remember that our mind is engaged in recognizing the vices, identifying
    the golden mean, and evaluating the circumstances before acting. So, virtue ethics
    requires both the mind and practice to be realized. Yet, the temptation to give
    in to the vices may be quite strong as we learn to act from virtue. Fortunately,
    virtue ethics allows us to identify a moral exemplar whose actions we can copy
    or mimic while still learning to be virtuous. Moral exemplars can be grandparents,
    religious figures, or even a best friend if they have learned (more than you)
    how to act from virtue. With practice, recognition, and exemplars as guides, appropriate
    responses will become part of your character, making you virtuous.But why should
    we embrace this idea of virtue? The answer is to flourish as human beings and
    to live as we should among each other and the world. **Eudaimonia**, human flourishing,
    is a life that involves lessons, effort, determination, growth (emotionally and
    psychologically), and facing the struggles and challenges of being human. Virtue
    ethics is not intended to resolve those challenges but to help humanity thrive
    despite them.Proponents of virtue ethics claim that the benefits of this theory
    are that anyone can become virtuous, that each situation is given appropriate
    attention, and that it focuses on helping people become better, leading to a changed
    world. Detractors are concerned that no recommended actions are provided and that
    the theory is too vague to be practical.It is important to remember that Aristotle’s
    virtue ethics focuses on the person making the choice in a moral dilemma rather
    than the consequence or the act itself. This theory encourages people to become
    better and learn to be moral rather than merely demanding it or providing rules
    to ensure it. It also seeks for humans to flourish and lead the lives meant for
    them through the nature of being human. That means a life with struggles, achievements,
    and challenges (including the challenge to be moral). It also expects us to do
    the work to remain distant from vices while leaning into virtue, with help from
    moral exemplars (examples) to guide us as we grow into our virtuous selves (*Resources
    4 and 5* in the *Further reading* section).It is not unreasonable for some to
    believe that ethics cannot be deduced into three moral theories, we explore these
    doubts next.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎意味着美德伦理无法通过学习获得，并且更直观，因为必须针对每种情况量身定制回应。幸运的是，亚里士多德向我们保证，学习成为有美德的人是可能的，但你必须通过实践从黄金法则出发。换句话说，这是一种实用技能和智慧。亚里士多德当然会同意，在美德方面，实践出真知。在采取美德行动之前，我们必须记住，我们的心灵正忙于识别恶习，确定黄金法则，并在行动之前评估情况。因此，美德伦理需要心灵和实践来实现。然而，当我们学习从美德出发行动时，屈服于恶习的诱惑可能相当强烈。幸运的是，美德伦理允许我们识别一个道德典范，我们可以模仿其行为，同时仍在学习成为有美德的人。道德典范可以是祖父母、宗教人物，甚至是一个最好的朋友，如果他们已经学会了（比你更多）如何从美德出发行动。通过实践、认识和典范的引导，适当的回应将成为你性格的一部分，使你成为有美德的人。但为什么我们应该接受这种美德的理念呢？答案是，为了作为人类繁荣，以及在我们彼此和世界中过上我们应该过的日子。**幸福**，人类的繁荣，是一种涉及教训、努力、决心、成长（情感和心理上）以及面对作为人类所面临的斗争和挑战的生活。美德伦理并非旨在解决这些挑战，而是帮助人类在挑战中繁荣。美德伦理的支持者声称，这一理论的好处是任何人都可以成为有美德的人，每种情况都得到了适当的关注，并且它专注于帮助人们变得更好，从而改变世界。批评者担心没有提供推荐行动，并且理论过于模糊，难以实用。重要的是要记住，亚里士多德的美德伦理关注的是在道德困境中做出选择的个人，而不是后果或行为本身。这一理论鼓励人们变得更好，学会成为有道德的人，而不仅仅是要求它或提供规则来确保它。它还寻求通过人类本性的方式，让人类繁荣，过上他们应有的生活。这意味着一种充满斗争、成就和挑战（包括道德挑战）的生活。它还期望我们通过道德典范（例子）的引导，在成长为我们有美德自我的过程中，努力远离恶习，同时依靠美德。在“进一步阅读”部分的*资源4和5*中，我们探讨了这些怀疑。
- en: Identifying challenges to ethical theories
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 识别伦理理论的挑战
- en: 'The three moral theories discussed maintain that there is a unifying theory
    of morality that can be accepted or understood, though not everyone believes this
    is the case. Those who disagree commonly fall into three categories: **cultural
    relativism**, **subjectivism**, and **skepticism**. While we will not discuss
    these in as much depth, they are worthy of consideration. After all, not everyone
    will believe that they fit into one of the three categories above. But as with
    utilitarianism, deontology, and virtue ethics, these theories can also be argued
    against.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 讨论的三个道德理论认为，存在一个可以接受或理解的统一道德理论，尽管并非所有人都相信这一点。那些不同意的人通常分为三类：**文化相对主义**、**唯心主义**和**怀疑主义**。虽然我们不会对这些进行深入的讨论，但它们值得考虑。毕竟，并非每个人都认为他们属于上述三个类别之一。但与功利主义、义务论和美德伦理学一样，这些理论也可以被反驳。
- en: Cultural relativism
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文化相对主义
- en: Cultural relativism is the belief that a person’s cultural practices should
    be evaluated through the lens of that person’s culture. These practices also occur
    when doing business in other countries. For example, midday or napping at work
    is permitted in countries such as Japan and China (also Italy, Norway, Botswana,
    and even Silicon Valley) so when evaluating napping policies (through cultural
    relativism), we should review it from the lens of those cultures – not our own
    or others (Nishat, 2019).([https://www.openaccessgovernment.org/customs-from-countries/59117/](https://www.openaccessgovernment.org/customs-from-countries/59117/)).
    This would mean that napping in cultures where napping is permitted is not problematic.
    Similarly, if regulations differ in one part of the world, it might be tempting
    to default to those regulations, even if accidents are likely or risks are high.
    This view focuses on the differences between cultures and practices rather than
    similarities. And it maintains that these practices should be respected.Those
    who oppose the cultural relativist view would direct us to focus on the similarities
    to see if the differences are as different as they seem. For example, if we recognize
    napping as providing employee breaks, we must admit that nearly all organizations
    allow this and that many governments require it. So, by looking at a broader theme,
    we can better understand that this difference represents fulfilling the need rather
    than a denial of the need.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 文化相对主义是一种信念，即一个人的文化实践应该通过那个人的文化视角来评估。这些实践在与其他国家做生意时也会发生。例如，在诸如日本和中国（以及意大利、挪威、博茨瓦纳，甚至硅谷）等国家，允许午休或在工作时打盹，因此在评估打盹政策（通过文化相对主义）时，我们应该从那些文化的视角来审视，而不是我们自己的或其他人的（Nishat，2019）。([https://www.openaccessgovernment.org/customs-from-countries/59117/](https://www.openaccessgovernment.org/customs-from-countries/59117/))
    这意味着在允许打盹的文化中打盹并不成问题。同样，如果世界某个地区的法规不同，可能会诱使我们默认采用那些法规，即使发生事故的可能性很大或风险很高。这种观点关注的是文化与实践之间的差异，而不是相似性。并且它坚持认为这些实践应该受到尊重。那些反对文化相对主义观点的人会引导我们关注相似性，看看差异是否真的像看起来那样不同。例如，如果我们认识到打盹为员工提供休息时间，我们必须承认几乎所有组织都允许这样做，而且许多政府要求这样做。因此，通过观察更广泛的主题，我们可以更好地理解这种差异代表着满足需求，而不是否认需求。
- en: Subjectivism
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 唯心主义
- en: This view is based on an individual’s view of right and wrong. Under this view,
    morality is merely any person’s view of what morality means to them. For instance,
    one person may believe it is wrong to lie, and another may believe it is wrong
    to lie about big things, but that little white lies are permitted. The strength
    of this view is that it can help people become more understanding of differences,
    beliefs, ideas, and cultures. It insists that an open mind be maintained, and
    judgment withheld.The most challenging part of this view is determining how anyone
    can be held responsible for what they have done. If a person deems something morally
    right, then who is another person to object? Yet, we have relationships and interconnections
    with others that depend on trust and accountability. Without these, imagining
    moving forward with business ventures or relationships is difficult. After all,
    if morality is subjective, it can also change. This means if a person changes
    their view of what is moral, it can significantly impact our interactions with
    them. We can also change our minds, altering the scenario for others.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这种观点基于个人对对错的认识。在这种观点下，道德仅仅是任何人对道德含义的个人看法。例如，一个人可能认为撒谎是错误的，而另一个人可能认为对大事撒谎是错误的，但认为小白的谎言是可以接受的。这种观点的强点在于它可以帮助人们更加理解差异、信仰、思想和文化。它坚持要保持开放的心态，并推迟判断。这种观点最具挑战性的部分是确定任何人如何对其所做之事负责。如果一个人认为某事在道德上是正确的，那么另一个人有什么理由反对呢？然而，我们与他人之间的关系和联系依赖于信任和责任。没有这些，想象在商业或人际关系中前进是困难的。毕竟，如果道德是主观的，它也可能改变。这意味着如果一个人改变了对道德的看法，这可能会对我们与他们之间的互动产生重大影响。我们也可以改变我们的想法，改变他人的情景。
- en: Skepticism
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 怀疑论
- en: A moral skeptic believes we cannot gain knowledge of morality (moral truths,
    principles, and values cannot be determined). This is evident in our conversations
    about moral choices. We hesitate to ascribe blame or are too quick to blame. We
    excuse some behaviors due to circumstances, but not all of them. We see things
    differently depending on who we disagree with, rendering our views meaningless.
    If we knew what morality or moral truths were, we would not need to be hesitant
    or quick to provide exceptions. If this is the case, then morality is not merely
    subjective. Instead, we have reasons to be skeptical that we can even unpack this
    topic.We have arrived at the point where there is not much to say or discuss.
    If skepticism is correct, we cannot even have this conversation and must state
    that we do not know enough to contribute to the conversation. Yet, our lives and
    relationships (personal and business) would continue but without any moral claims.
    While holding morality to a strict understanding of knowledge of morality, it
    does seem that to navigate this world, we must at least be able to have conversations
    about responsibility, integrity, fairness, bias, and ethics. But to do this would
    be to reject skepticism.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 道德怀疑论者认为我们无法获得关于道德的知识（道德真理、原则和价值观无法确定）。这在我们的道德选择对话中表现得非常明显。我们犹豫是否归咎，或者过于迅速地归咎。我们因为某些情况而原谅某些行为，但不是所有行为。我们根据与谁不同意而看到不同的事情，使得我们的观点变得毫无意义。如果我们知道道德或道德真理是什么，我们就不需要犹豫或迅速提供例外。如果是这样，那么道德不仅仅是主观的。相反，我们有理由怀疑我们甚至无法解开这个话题。我们已经到了没有什么可说或讨论的地步。如果怀疑论是正确的，我们甚至无法进行这次对话，而必须声明我们不知道足够的信息来参与对话。然而，我们的生活和关系（个人和商业）将继续，但没有任何道德主张。在严格理解道德知识的同时，似乎为了在这个世界上导航，我们至少必须能够就责任、正直、公平、偏见和道德进行对话。但这样做就是拒绝怀疑论。
- en: Understanding the importance of Ethics in AI
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解在人工智能中伦理的重要性
- en: 'Since this is an ethics book, it seems right to share how or why this information
    is needed in the work of artificial intelligence. In short, the same people who
    develop technology, choose which innovations to support, and promote the same
    are using the processes above to make and support their decisions. These ethical
    decisions are built into all technology by the nature of their developers and
    the society they engage with. Whether choosing to develop smart vehicles with
    autonomous driving capabilities, participating in airport screenings with AI-assisted
    cameras, or hoping to avoid a speeding ticket via a camera at a stoplight in a
    local city – the challenge of understanding the impact of choice is required as
    it always has been with technology.Similarly, the choices between those who use
    technology and those who develop it are on a continuous collision course with
    each other. Sometimes the impact is favorable, and the decisions and choices are
    enmeshed with great support. Other times, the collision is less favorable or even
    harmful, placing users in opposition to technology and its developers. The dividing
    line between them is in the ethical decisions and protections afforded by and
    to both sides.Due to the interwoven nature of combining ethical judgments (good
    and bad), ethical implications in technology are a nuanced conversation. While
    many people outside of ethics believe what is ethical is a mere popularity contest,
    it is instead an understanding of navigating this ethical edge between competing
    interests, wants, and needs – even when all have strong arguments in their favor.
    Ethics is no simple coffee chat or tense conversation over the holidays. It is
    instead a robust interrogation of ideas, an embrace of counterarguments, acceptance
    of the weaknesses of views held, and still arriving at a decision to be acted
    upon. It is the work of ethicists trained in philosophy, argument, logic, and
    humanity.The reason ethics must be consciously addressed in AI technology is because
    ethics can and has been easily avoided and side-stepped. For instance, an organization
    may claim to be trustworthy (this is performative speech since the speech is intended
    to perform the act of generating trust). However, that same company can say they
    are trustworthy but then make choices that fail to reflect the promise of trust.
    Saying one thing and doing another is common. Unfortunately, when it occurs with
    the speed and scale of AI, the problems with doing so are compounded. This can
    be seen through lawsuits aimed at the largest technology companies: Meta (anti-trust,
    privacy, children, copyright), Microsoft and Open-AI (copyright, intellectual
    property), Apple (treatment of developers), Alphabet (copyright, **Digital Millenium
    Copyright Act** (**DMCA**)), account suspensions), Amazon (anti-trust), Samsung
    (price-fixing). While most of these are related to AI (the exceptions being Apple
    and Samsung), all involve ethics and technology.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这是一本伦理学书籍，因此分享这些信息在人工智能工作中的应用方式和原因似乎是正确的。简而言之，那些开发技术、选择支持哪些创新以及推广这些创新的人，正在使用上述过程来做出并支持他们的决策。这些伦理决策由于开发者的本质以及他们所参与的社会的性质，被内置于所有技术中。无论是选择开发具有自动驾驶能力的智能汽车、参与机场安检的AI辅助摄像头，还是希望通过当地城市交通信号灯处的摄像头避免超速罚单——理解选择影响的问题，就像技术一直所做的那样，是一个挑战。同样，使用技术和开发技术的人之间的选择，正持续地相互碰撞。有时影响是有利的，决策和选择得到了极大的支持。有时碰撞不那么有利，甚至有害，将用户置于与技术和其开发者对立的位置。他们之间的分界线在于双方提供的伦理决策和保护。由于伦理判断（好与坏）交织在一起，技术中的伦理影响是一个微妙的对话。虽然许多非伦理学领域的人认为伦理只是一个受欢迎的竞赛，但实际上它是对在相互竞争的利益、愿望和需求之间导航这一伦理边缘的理解——即使所有这些都有强有力的论据支持。伦理学不是简单的咖啡聊天或假期时的紧张对话。相反，它是对思想的深入质询，是接受对立论点，接受所持观点的弱点，并最终做出行动决策的工作。这是哲学、论证、逻辑和人文训练有素的伦理学家的工作。在人工智能技术中必须有意识地处理伦理的原因是，伦理可以并且已经被轻易地回避和规避。例如，一个组织可能声称自己是值得信赖的（这是一种表演性言语，因为言语的目的是产生信任的行为）。然而，同一家公司可以说自己是值得信赖的，但随后做出的选择却未能反映信任的承诺。说一套做一套是常见的。不幸的是，当这种情况以AI的速度和规模发生时，这样做的问题会加剧。这可以通过针对最大技术公司的诉讼来看到：Meta（反垄断、隐私、儿童、版权）、微软和Open-AI（版权、知识产权）、苹果（对待开发者）、Alphabet（版权、**数字千年版权法**（DMCA））、账户暂停）、亚马逊（反垄断）、三星（价格操纵）。虽然其中大部分与AI有关（例外是苹果和三星），但所有都涉及伦理和技术。
- en: Summary
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we have identified how we make moral choices, explored the
    three primary moral theories, and discussed their objections. We have also discussed
    the difference between ethics and morality, the moral principles that underpin
    our choices, and the moral theories that align with them.When confronting ethics
    in AI, it is important to understand that developers, users, and even venture
    capitalists will be making judgments about products that incorporate these theories.
    A founder may be concerned about the utility (greater good and happiness of users
    or society) but may be in talks with a deontological funding representative. Or
    a product may be released by a deontological team only to learn that users were
    seeking utility. There may also be an instance where a developer may wonder if
    accepting a funding offer would still allow them to be viewed as a good company
    or organization. Any of these views and those involved can lean toward the three
    primary views or reject them completely as they make decisions. Where people are
    involved, mismatched views can lead to challenging relationships, situations,
    and products or uncomfortable scenarios for everyone.In the next chapter, technology
    will be introduced to understand its early foundations and begin understanding
    the practicalities of ethical exploration of technology and AI in later chapters
    and sections of the book.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们确定了我们如何做出道德选择，探讨了三种主要的道德理论，并讨论了它们的反对意见。我们还讨论了伦理与道德的区别，支撑我们选择的道德原则，以及与它们相符的道德理论。当面对人工智能中的伦理问题时，重要的是要理解开发者、用户甚至风险投资家将对包含这些理论的产品做出判断。创始人可能关心实用性（用户的幸福或社会的福祉），但可能与道义论的资金代表进行谈判。或者，一个产品可能由道义论团队发布，但后来发现用户寻求的是实用性。还可能出现一种情况，即开发者可能会质疑接受资金提议是否还能让他们被视为一家好公司或组织。任何这些观点和涉及到的观点在做出决策时都可能倾向于三种主要观点或完全拒绝它们。当涉及到人时，观点的不一致可能导致挑战性的关系、情境、产品或对每个人都不舒服的场景。在下一章中，将介绍技术，以了解其早期基础，并在本书的后续章节和部分中开始了解技术伦理和人工智能的实践探索。
