  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试理解发生了什么，并确定适合情况的后果。
- en: Determine how to reinforce to your child that honesty is important.
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定如何加强孩子对诚实重要性的认识。
- en: You cut someone off in traffic, and they angrily gestured at you. You…
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你在交通中挡了别人的道，他们愤怒地朝你比划。你...
- en: Drive more carefully; you know the rules of the road.
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 驾驶更加小心；你知道交通规则。
- en: Drive more carefully; everyone deserves to be safe.
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 驾驶更加小心；每个人都应该感到安全。
- en: Resolve to become the best driver you can be.
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下定决心成为最好的司机。
- en: A friend worries they need an abortion and wants you there to support them.
    You…
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个朋友担心他们需要做流产，希望你在那里支持他们。你...
- en: Refuse to go on the grounds it is wrong to end a life.
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 拒绝参与，因为结束生命是错误的。
- en: Examine the situation from all sides to determine the best action.
  id: totrans-45
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从各个方面审视情况，以确定最佳行动方案。
- en: Try to be the best friend possible and seek guidance from trusted friends or
