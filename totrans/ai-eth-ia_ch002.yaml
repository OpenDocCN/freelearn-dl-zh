- en: 1 A Brief Primer on Ethics
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Ethics and technology have always had a long and complicated history. Artificial
    Intelligence is no exception to ethical challenges or the debates surrounding
    them. Due to both the reach and speed of this technology, the call for ethics
    has intensified as harms and challenges match the speed and reach of the innovation
    itself. The calls to mediate the challenges are immense, from international to
    local regulations. At the same time, many fear that attempts to protect ourselves
    from our technology will fail as it has in the past from chatbots, social media,
    video games, and the most powerful innovation yet – generative AI. The time for
    AI ethics is now, if only we knew and understood how to *do ethics*.Ethics speaks
    to people''s decisions as they are right, good, fair, and just. To you, these
    decisions often seem subjective or impossible to fully understand by others outside
    the view of the person who made the choice. First, you will explore varying drivers
    (theories) of ethical behavior and gain an understanding of how and why people
    make ethical choices. Then, you will learn of objections to ethics that further
    complicate making good choices. Finally, you will be shown how this disagreement
    regarding theories can create more effective dialogue regarding prioritizing issues
    and challenges.In this chapter, we’re going to cover the following main topics:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: Introducing ethics and ethical theories
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding deontological ethics
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Looking at Consequentialist Theory
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exploring character through Virtue Ethics
  id: totrans-5
  prefs:
