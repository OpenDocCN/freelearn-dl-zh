  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Should you be a good person and change your name?
  id: totrans-22
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: You find money on the street outside your building. You…
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Drop it at the front desk; anything else is stealing.
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Try to find out who it belongs to or leave it at the desk – if the owner can’t
