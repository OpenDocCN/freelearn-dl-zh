- en: Understanding the importance of Ethics in AI
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Introducing ethics and ethical theories
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Ethics** is the study of the concepts, theories, systems, rules, principles,
    and values of what is morally good or bad or right or wrong. In comparison, morality
    determines the standards of what is right or wrong and good or bad. When situations
    are difficult and contain an element of good and bad, they are called **moral
    dilemmas**. Difficult questions often reveal a moral dilemma, but the answers
    reveal how we make moral judgments. These judgments then reveal the moral rules
    that underpin the decision.A moral principle or rule might be to do no harm, provide
    justice, or ensure the protection of people. Of interest, an Oxford University
    study of 60 cultures determined seven universal moral rules: “Help your family,
    help your group, return favors, be brave, defer to superiors, divide resources
    fairly, and respect others’ property…” (Seven moral rules found all around the
    world, 2019). This reveals that it is possible to find consistency or common ground
    within morality.Philosophers who study ethics and morality have determined that
    three basic moral theories sum up our moral decision-making. Each has its own
    principles and governing ideas. When we review our moral choices, we can identify
    which moral theory we are using and the principles that we value that support
    those choices.So, to begin our work in ethics, please answer the following questions,
    then tally your A, B, and C answers. Later in this chapter, you’ll learn which
    of the three moral theories you lean toward when making decisions and if your
    principles change depending on your question.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Quiz
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What kind of moral decision-maker am I?
  id: totrans-10
