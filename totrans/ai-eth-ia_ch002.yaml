- en: 1 A Brief Primer on Ethics
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1 伦理简明指南
- en: 'Ethics and technology have always had a long and complicated history. Artificial
    Intelligence is no exception to ethical challenges or the debates surrounding
    them. Due to both the reach and speed of this technology, the call for ethics
    has intensified as harms and challenges match the speed and reach of the innovation
    itself. The calls to mediate the challenges are immense, from international to
    local regulations. At the same time, many fear that attempts to protect ourselves
    from our technology will fail as it has in the past from chatbots, social media,
    video games, and the most powerful innovation yet – generative AI. The time for
    AI ethics is now, if only we knew and understood how to *do ethics*.Ethics speaks
    to people''s decisions as they are right, good, fair, and just. To you, these
    decisions often seem subjective or impossible to fully understand by others outside
    the view of the person who made the choice. First, you will explore varying drivers
    (theories) of ethical behavior and gain an understanding of how and why people
    make ethical choices. Then, you will learn of objections to ethics that further
    complicate making good choices. Finally, you will be shown how this disagreement
    regarding theories can create more effective dialogue regarding prioritizing issues
    and challenges.In this chapter, we’re going to cover the following main topics:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理与技术始终有着漫长而复杂的历史。人工智能也不例外，它面临着伦理挑战或围绕这些挑战的辩论。由于这项技术的范围和速度，随着危害和挑战与创新的步伐和范围相匹配，对伦理的呼吁变得更加紧迫。从国际到地方性法规，对调解这些挑战的呼吁声巨大。同时，许多人担心，试图保护我们免受技术侵害的努力将像过去从聊天机器人、社交媒体、视频游戏以及最强大的创新——生成式人工智能——中所做的那样失败。AI伦理的时代已经到来，如果我们知道并理解如何*实践伦理*的话。伦理关乎人们的决策，它们是正确的、好的、公平的和正义的。对你来说，这些决策往往看起来是主观的，或者其他人无法完全理解，除非他们站在做出选择的人的角度。首先，你将探索不同的伦理行为驱动因素（理论），并了解人们如何以及为什么做出伦理选择。然后，你将了解对伦理的反对意见，这些反对意见进一步复杂化了做出良好选择的过程。最后，你将看到关于理论的不同意见如何创造更有效的关于优先事项和挑战的对话。在本章中，我们将涵盖以下主要内容：
- en: Introducing ethics and ethical theories
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍伦理和伦理理论
- en: Understanding deontological ethics
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解义务论伦理
- en: Looking at Consequentialist Theory
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概述后果主义理论
- en: Exploring character through Virtue Ethics
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过美德伦理探索人格
- en: Understanding the importance of Ethics in AI
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解伦理在人工智能中的重要性
- en: Introducing ethics and ethical theories
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 介绍伦理和伦理理论
- en: '**Ethics** is the study of the concepts, theories, systems, rules, principles,
    and values of what is morally good or bad or right or wrong. In comparison, morality
    determines the standards of what is right or wrong and good or bad. When situations
    are difficult and contain an element of good and bad, they are called **moral
    dilemmas**. Difficult questions often reveal a moral dilemma, but the answers
    reveal how we make moral judgments. These judgments then reveal the moral rules
    that underpin the decision.A moral principle or rule might be to do no harm, provide
    justice, or ensure the protection of people. Of interest, an Oxford University
    study of 60 cultures determined seven universal moral rules: “Help your family,
    help your group, return favors, be brave, defer to superiors, divide resources
    fairly, and respect others’ property…” (Seven moral rules found all around the
    world, 2019). This reveals that it is possible to find consistency or common ground
    within morality.Philosophers who study ethics and morality have determined that
    three basic moral theories sum up our moral decision-making. Each has its own
    principles and governing ideas. When we review our moral choices, we can identify
    which moral theory we are using and the principles that we value that support
    those choices.So, to begin our work in ethics, please answer the following questions,
    then tally your A, B, and C answers. Later in this chapter, you’ll learn which
    of the three moral theories you lean toward when making decisions and if your
    principles change depending on your question.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**伦理学**是研究道德上好或坏、对或错的概念、理论、体系、规则、原则和价值观的学科。相比之下，道德决定了什么是对或错、好或坏的标准。当情况困难且包含善与恶的元素时，它们被称为**道德困境**。困难的问题往往揭示道德困境，但答案揭示了我们是如何做出道德判断的。这些判断随后揭示了支撑决策的道德规则。一个道德原则或规则可能是不做伤害，提供正义，或确保人们的保护。有趣的是，牛津大学对60种文化的研究确定了七条普遍的道德规则：“帮助你的家庭，帮助你的群体，回报恩惠，勇敢，尊重上级，公平分配资源，尊重他人的财产……”（全球发现的七条道德规则，2019年）。这表明在道德中找到一致性或共同点是可能的。研究伦理学和道德的哲学家们确定，三种基本的道德理论总结了我们的道德决策。每种都有其自身的原则和指导思想。当我们回顾我们的道德选择时，我们可以确定我们使用的是哪种道德理论，以及支持这些选择的我们重视的原则。因此，为了开始我们的伦理学研究，请回答以下问题，然后统计你的A、B和C答案。在本章的后面，你将了解在做出决策时，你倾向于哪三种道德理论，以及你的原则是否根据你的问题而改变。'
- en: Quiz
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测验
- en: What kind of moral decision-maker am I?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我是什么样的道德决策者？
- en: You comply with strict privacy regulations, but your clients want even more.
    What do you do?
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你遵守严格的隐私法规，但你的客户想要更多。你该怎么办？
- en: Educate your customer on how you are complying.
  id: totrans-12
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育你的客户你是如何遵守的。
- en: Look for ways to boost privacy.
  id: totrans-13
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻找提高隐私的方法。
- en: Ask yourself how a good company should respond.
  id: totrans-14
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问问自己一家好公司应该如何回应。
- en: You have an existing app, but to improve it, you need data. Do you…
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你有一个现有的应用程序，但为了改进它，你需要数据。你...
- en: Change the terms of service and gather the data.
  id: totrans-16
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更改服务条款并收集数据。
- en: Change the terms of service with notification and opt-in settings.
  id: totrans-17
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过通知和选择加入设置更改服务条款。
- en: Attempt to balance the needs of the business and clients.
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试平衡业务和客户的需求。
- en: You have a business name close to a competitor’s name. You…
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的企业名称接近竞争对手的名称。你...
- en: Don’t stress because you know legally you are in the clear.
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要紧张，因为你知道在法律上你是清白的。
- en: Consider whether you should change the name based on the situations of both
    businesses.
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑你是否应该根据两家企业的具体情况更改名称。
- en: Should you be a good person and change your name?
  id: totrans-22
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你应该做一个好人并更改你的名字吗？
- en: You find money on the street outside your building. You…
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你在建筑外面的街道上找到钱。你...
- en: Drop it at the front desk; anything else is stealing.
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 把它放在前台；其他任何东西都是偷窃。
- en: Try to find out who it belongs to or leave it at the desk – if the owner can’t
    be found, you’ll donate the money.
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试找出它属于谁，或者把它留在桌子上——如果找不到所有者，你将捐赠这笔钱。
- en: Do what a good person would do and follow that advice.
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 做一个好人会做的事，并遵循那些建议。
- en: A friend and you deeply disagree politically, and they bring up a sensitive
    topic. You…
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你和一个政治上深有分歧的朋友，他们提出了一个敏感的话题。你...
- en: Refuse to discuss it; you don’t talk about those things.
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 拒绝讨论它；你不谈论那些事情。
- en: Attempt the conversation but drop the topic if others get upset.
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试对话，但如果其他人感到不安，就放弃这个话题。
- en: Consider what a good friend would do and opt to do that.
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑一个好朋友会怎么做，并选择那样做。
- en: You don’t believe in corporal punishment, but a friend has shared they do. You…
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你不相信体罚，但一个朋友分享了他们也这样做。你...
- en: Listen as they advocate for their right to discipline their children.
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 倾听他们为自己的权利辩护。
- en: Suggest other methods of discipline where no physical punishment is involved.
  id: totrans-33
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议其他不涉及体罚的纪律方法。
- en: Work out a solution based on what a good parent would do.
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据一个合格父母的行为制定解决方案。
- en: Your child was accused of cheating. You…
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的孩子被指控作弊。你...
- en: Lay down the law – there are rules for a reason.
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定法律——有规则的原因。
- en: Try to understand what happened and determine a consequence that fits the situation.
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试理解发生了什么，并确定适合情况的后果。
- en: Determine how to reinforce to your child that honesty is important.
  id: totrans-38
