  id: totrans-12
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Look for ways to boost privacy.
  id: totrans-13
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Ask yourself how a good company should respond.
  id: totrans-14
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: You have an existing app, but to improve it, you need data. Do you…
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Change the terms of service and gather the data.
  id: totrans-16
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Change the terms of service with notification and opt-in settings.
  id: totrans-17
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Attempt to balance the needs of the business and clients.
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: You have a business name close to a competitor’s name. You…
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Don’t stress because you know legally you are in the clear.
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Consider whether you should change the name based on the situations of both
