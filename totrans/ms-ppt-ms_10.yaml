- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Adding and Modifying Multimedia Elements
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 添加和修改多媒体元素
- en: In terms of visual content creation, so far, we have learned about some of PowerPoint’s
    features that leverage AI and others that help us use visual elements instead
    of text and bullet points. It is now time to level up your presentation game even
    more by learning how to include multimedia elements.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在视觉内容创建方面，到目前为止，我们已经了解了一些PowerPoint的功能，它们利用了人工智能，以及其他帮助我们使用视觉元素而不是文本和项目符号的功能。现在是时候通过学习如何包含多媒体元素来进一步提升您的演示技巧了。
- en: Adding multimedia elements will help make your presentations more impactful
    by providing content variety while making some topics easier to learn about via
    short videos rather than long text explanations.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 添加多媒体元素将有助于使您的演示文稿更具影响力，通过提供内容多样性，同时通过简短视频而不是长篇文字说明，使某些主题更容易学习。
- en: 'In this chapter, we will discuss the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: Inserting and formatting videos
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插入和格式化视频
- en: Inserting and formatting audio
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插入和格式化音频
- en: Using the **Cameo** feature
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**Cameo**功能
- en: Inserting a screenshot or screen recording for a demo
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插入用于演示的截图或屏幕录制
- en: Creating a video file or GIF from a presentation
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从演示文稿创建视频文件或GIF
- en: Technical requirements
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: Most of the topics discussed in this chapter don’t require an M365 subscription,
    the tools and features having been introduced in previous versions of PowerPoint.
    I will identify when a feature is available in M365 only. Also, be aware that
    since the subscription version of PowerPoint is being updated on an ongoing basis,
    it is possible that some features don’t look exactly the same in your version
    of the application.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论的大部分主题不需要M365订阅，因为工具和功能已在PowerPoint的先前版本中介绍。我将标识哪些功能仅在M365中可用。此外，请注意，由于PowerPoint的订阅版本正在持续更新，因此某些功能在您应用的版本中可能看起来并不完全相同。
- en: Inserting and formatting videos
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 插入和格式化视频
- en: Inserting videos into your presentations may seem like a daunting task, the
    main reason usually being that many users feel overwhelmed by all the formats
    available and compatibility issues with the PowerPoint version they are using.
    So, let’s start by defining the supported file formats.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 将视频插入到您的演示文稿中可能看起来是一项艰巨的任务，主要原因通常是许多用户感到被所有可用的格式和与所使用PowerPoint版本兼容性问题所压倒。因此，让我们首先定义支持的文件格式。
- en: Supported video file formats
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持的视频文件格式
- en: There used to be so many variables to choose a video file format in PowerPoint!
    The supported file format was highly dependent on several factors, including the
    Microsoft Office version installed, whether we were using Windows or Mac, which
    version of the operating system was installed, and which device the presentation
    would be viewed on. The good news is that modern versions of PowerPoint (2021,
    2024, and M365) reduce the complexity of that list.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在PowerPoint中选择视频文件格式曾经有如此多的变量！支持的文件格式高度依赖于几个因素，包括安装的Microsoft Office版本、我们是否使用Windows或Mac、安装的操作系统版本以及演示文稿将在哪种设备上查看。好消息是，PowerPoint的现代版本（2021、2024和M365）简化了该列表的复杂性。
- en: '**Warning**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**警告**'
- en: If you are still using **Office 2010** (support ended in October 2020) or **Office
    2013** (support ended in April 2023), you are opening your computer to major security
    risks. With **Office 2016** and **Office 2019** , the end of support is planned
    for October 2025, and **Office 2021’s** end of support is planned for October
    2026. My best advice is to invest in an up-to-date version, such as **Office 2024**
    (one-time purchase, supported until October 2029), or an **M365** subscription,
    so that you are always using the latest version in terms of features and security.
    If you are still using **Windows 7** (support ended in January 2020) or **Windows
    8.1** (support ended in January 2023), you are also at risk. End of support for
    **Windows 10** users is planned for October 2025, which means only **Windows 11**
    will be supported.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您仍在使用**Office 2010**（支持已于2020年10月结束）或**Office 2013**（支持已于2023年4月结束），您正在使您的计算机面临重大的安全风险。对于**Office
    2016**和**Office 2019**，支持结束计划于2025年10月，而**Office 2021**的支持结束计划于2026年10月。我最好的建议是投资于一个最新的版本，例如**Office
    2024**（一次性购买，支持至2029年10月），或一个**M365**订阅，这样您就可以始终使用功能和安全性的最新版本。如果您仍在使用**Windows
    7**（支持已于2020年1月结束）或**Windows 8.1**（支持已于2023年1月结束），您也处于风险之中。计划于2025年10月结束对**Windows
    10**用户的支持，这意味着只有**Windows 11**将得到支持。
- en: 'There are still quite a few video file formats circulating—see the *Further
    reading* section for a Microsoft article on the topic—but keep in mind that we
    want to make sure the videos included in our presentations will play on most devices
    and are supported by most operating systems. Here are two formats you can look
    for:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然有相当多的视频文件格式在流传——请参阅*进一步阅读*部分中的 Microsoft 文章，但请记住，我们想要确保我们演示文稿中包含的视频能在大多数设备上播放，并且被大多数操作系统支持。以下是可以查找的两个格式：
- en: The `.mp4` format is supported on Windows, macOS, Office for iOS, and Office
    for Android
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 Windows、macOS、Office for iOS 和 Office for Android 上支持 `.mp4` 格式
- en: The `.avi` format is supported on Windows and macOS
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 Windows 和 macOS 上支持 `.avi` 格式
- en: Some people might say that I am skipping many technical details here, and they
    would be right. I am just keeping my promise to all businesspeople who need to
    keep things simple. If you insert either of the preceding video file formats in
    your presentations, you will most likely avoid running into problems.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会说我在这里跳过了很多技术细节，他们是对的。我只是遵守了对所有需要保持事情简单化的商人的承诺。如果您在演示文稿中插入上述任何一种视频文件格式，您很可能会避免遇到问题。
- en: If you do have any problems, such as your hardware not supporting video playback
    in your presentations, have a look at other Microso ft resources listed in the
    *Further reading* section for valuable information.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到任何问题，例如您的硬件不支持在演示文稿中播放视频，请查看*进一步阅读*部分中列出的其他 Microsoft 资源，以获取有价值的信息。
- en: Now that you have a little more knowledge about video file formats, we can move
    on to inserting videos into presentation s.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您对视频文件格式有了更多了解，我们可以继续学习如何在演示文稿中插入视频。
- en: Inserting video files
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 插入视频文件
- en: Using videos in y our presentations can be valuable either to help you tell
    a more powerful story or to demonstrate a manual process more quickly than a textual
    description. Either way, make sure you select a video that is relevant and short.
    People’s attention spans vary a lot in our fast-paced world, so I would recommend
    keeping your videos short. How long is that? A fast-paced video can probably keep
    your audience engaged for up to 2 minutes, but aiming for 30 to 60 seconds is
    ideal. If you are showing a process that is longer, we will see how to use the
    formatting tools to cut the file into shorter snippets in the following section.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的演示文稿中使用视频可以是很有价值的，无论是为了帮助您讲述更强大的故事，还是为了比文本描述更快地演示一个手动过程。无论如何，请确保您选择一个相关且简短的视频。在我们的快节奏世界中，人们的注意力跨度很大，所以我建议保持您的视频简短。多长才算合适？一个节奏快的视频可能能让您的观众保持专注长达
    2 分钟，但目标是 30 到 60 秒。如果您展示的是一个较长的过程，我们将在下一节中看到如何使用格式化工具将文件裁剪成更短的片段。
- en: Inserting videos in your presentation can be done from one of three PowerPoint
    placeholders or by using the **Insert** tab. We will see both methods.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的演示文稿中插入视频可以通过三个 PowerPoint 占位符之一或使用**插入**选项卡来完成。我们将看到这两种方法。
- en: Inserting from a placeholder
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从占位符插入
- en: 'I have creat ed a slide layout that includes the three types of placeholders
    from which you can insert a video file in your presentation ( *Figure 8.1* ).
    Let’s see h ow:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经创建了一个幻灯片布局，其中包含三种类型的占位符，您可以从这些占位符中插入视频文件到您的演示文稿中（*图 8.1*）。让我们看看如何：
- en: '![Figure 8.1 – Slide with content, picture, and media placeholders](img/B32063_08_01.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.1 – 包含内容、图片和媒体占位符的幻灯片](img/B32063_08_01.png)'
- en: Figure 8.1 – Slide with content, picture, and media placeholders
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 – 包含内容、图片和媒体占位符的幻灯片
- en: From the content placeholder ( **1** ), clicking on the camera icon opens a
    window to browse files from your computer. This means that if you have synchronized
    cloud storage to your File Explorer, you could also access the files from the
    same window. If you click on the image icon, it opens a list where you can access
    **Stock Images** , where there is a **Videos** tab, as discussed in [*Chapter
    7*](Chapter_07.xhtml#_idTextAnchor580) .
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从内容占位符（**1**），点击相机图标会打开一个窗口，让您从电脑中浏览文件。这意味着如果您已将云存储同步到文件资源管理器，您也可以从同一个窗口访问这些文件。如果您点击图片图标，它将打开一个列表，您可以通过它访问**库存图片**，其中有一个**视频**标签，如[*第
    7 章*](Chapter_07.xhtml#_idTextAnchor580)中所述。
- en: From the picture placeholder ( **2** ), clicking on **Insert Picture** also
    gives acces s to the **Stock Images** library.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从图片占位符（**2**），点击**插入图片**也会提供对**库存图片**库的访问。
- en: From the media placeholder ( **2** ), clicking on **Insert Media** opens the
    same window as the content placeholder to choose your file.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从媒体占位符（**2**），点击**插入媒体**会打开与内容占位符相同的窗口，以选择您的文件。
- en: '**Important note**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要提示**'
- en: Videos added from placeholder icons will not be constrained to the size of the
    placeholder, as we saw for image placeholders. They will usually be added as a
    full-slide-sized video. You will need to work with the video-formatting tools
    and do some manual work to resize them. The slide example in *Figure 8.1* would
    not be an efficient layout in real-life conditions.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 从占位符图标添加的视频不会受到占位符大小的限制，就像我们为图片占位符所看到的那样。它们通常会被添加为全幻灯片大小的视频。你需要使用视频格式化工具并做一些手动工作来调整它们的大小。*图8.1*中的幻灯片示例在现实生活中的条件下可能不是一个高效的布局。
- en: If you need a refresher on placeholders, see [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206)
    . In the next section, we will again discuss how to insert media from the **Stock
    Images** library.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要回顾占位符的相关内容，请参阅[*第3章*](Chapter_03.xhtml#_idTextAnchor206)。在下节中，我们还将再次讨论如何从**股票图片**库中插入媒体。
- en: 'When you plan your slide layouts ahead of time, including videos in your presentation
    is only two clicks away: one to select the layout, and the other to click on the
    appropriate icon. But if you are not using video often, you can simply use the
    **Insert** tab with any layout you have in your file.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 当你提前计划幻灯片布局时，将视频添加到演示文稿中只需两步：一步选择布局，另一步点击适当的图标。但如果你不经常使用视频，你可以简单地使用你文件中的任何布局的**插入**选项卡。
- en: Inserting video from your computer or stock images
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从你的电脑或股票图片中插入视频
- en: 'You might not always have slide layouts planned for videos. If that is the
    case, just use any layout and click on the **Insert** tab ( **1** ), then the
    **Video** button on the ribbon ( **2** ), to get an **Insert Video From** list
    ( *Figure 8 .2* ):'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能并不总是为视频计划幻灯片布局。如果是这种情况，只需使用任何布局，然后点击**插入**选项卡（**1**），然后点击功能区上的**视频**按钮（**2**），以获取**从以下位置插入视频**列表（*图8.2*）：
- en: '![Figure 8.2 – Using the Insert tab to add video from your device or stock
    images](img/B32063_08_02.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图8.2 – 使用插入选项卡从你的设备或股票图片中添加视频](img/B32063_08_02.png)'
- en: Figure 8.2 – Using the Insert tab to add video from your device or stock images
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 – 使用插入选项卡从你的设备或股票图片中添加视频
- en: Depending on your computer’s screen size or resolution, you might not see the
    **Video** button directly on your ribbon; look for a **Media** button and click
    on **Video** in the dropdown .
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的电脑屏幕大小或分辨率，你可能无法直接在功能区看到**视频**按钮；寻找**媒体**按钮，然后在下拉菜单中点击**视频**。
- en: You can then choose **This Device…** ( **3** ) and choose a video file from
    the **Insert Video** window that opens. Just browse locally on any network server
    or synchronized cloud files.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以选择**此设备…**（**3**）并从打开的**插入视频**窗口中选择一个视频文件。只需在任意网络服务器或同步云文件上本地浏览。
- en: When you choose **Stock Videos…** ( **4** ), it opens the **Stock Images** library
    in the **Videos** tab. Each thumbnail in the list has a small camera icon showing
    it is a video file.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 当你选择**股票视频…**（**4**）时，它将在**视频**选项卡中打开**股票图片**库。列表中的每个缩略图都有一个小的相机图标，表明它是一个视频文件。
- en: It is important to mention that when you insert a video from a placeholder or
    with the **Insert** | **Video** options, the video file becomes part of your PowerPoint
    file. You can use your presentation file on any computer knowing it includes your
    video, although you will need to test the playback to make sure your presentation
    will run smoothly. But it does mean that the size of the video is added to the
    overall presentation file size, which can become huge if you embed a large video
    file. We will discuss how to handle file size later in this chapter.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 需要指出的是，当你从占位符或使用**插入** | **视频**选项插入视频时，视频文件将成为你的PowerPoint文件的一部分。你可以在任何电脑上使用你的演示文稿文件，因为它包含了你的视频，尽管你需要测试播放以确保你的演示文稿可以顺畅运行。但这确实意味着视频的大小会被添加到整个演示文稿文件的大小中，如果你嵌入了一个大视频文件，这可能会导致文件变得非常大。我们将在本章后面讨论如何处理文件大小。
- en: Linking to a video fil e
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 链接到视频文件
- en: 'When inserting a video file from your device, the **Insert Video** window does
    have another hidden option ( *Figure 8.3* ):'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当从你的设备插入视频文件时，**插入视频**窗口确实还有一个隐藏的选项（*图8.3*）：
- en: '![Figure 8.3 – Link to File in the Insert Video window](img/B32063_08_03.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图8.3 – 在插入视频窗口中链接到文件](img/B32063_08_03.png)'
- en: Figure 8.3 – Link to File in the Insert Video window
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3 – 在插入视频窗口中链接到文件
- en: 'Inste ad of clicking on the **Insert** button, you need to click on the small
    arrow on its right ( **1** ) to open the drop-down list that includes the **Link
    to File** option ( **2** ). This option does exactly what it says—it links to
    a file, which reduces your presentation file size. But there is a caveat: if your
    video file is moved from its original place or renamed, you will get an error
    message. The safest way to use the linking feature is to always have the video
    file in the same folder as your presentation file. If you need to present on another
    computer, you need to make sure you are accessing the folder that includes the
    video file, whether you are using a USB portable device or your cloud storage.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在点击**插入**按钮而不是点击它右侧的小箭头（**1**）以打开包含**链接到文件**选项（**2**）的下拉列表之前，你需要这样做。这个选项正是它所说的那样——链接到一个文件，这可以减小你的演示文稿文件大小。但是有一个注意事项：如果你的视频文件从原始位置移动或重命名，你会收到一个错误消息。使用链接功能最安全的方法是始终将视频文件放在与你的演示文稿文件相同的文件夹中。如果你需要在另一台电脑上展示，你需要确保你正在访问包含视频文件的文件夹，无论你使用的是USB便携设备还是云存储。
- en: Inserting online videos
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 插入在线视频
- en: 'There is one fina l video insertion feature I want to show you, also available
    from the **Insert** tab and by clicking on the **Video** button ( **2** )—the
    **Online Videos…** ( **3** ) option ( *Figure 8.4* ):'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想向您展示一个最终的插入视频功能，这个功能也来自**插入**标签页，通过点击**视频**按钮（**2**）——**在线视频…**（**3**）选项（*图8.4*）：
- en: '![Figure 8.4 – Inserting an online video into your slide](img/B32063_08_04.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图8.4 – 将在线视频插入到你的幻灯片中](img/B32063_08_04.png)'
- en: Figure 8.4 – Inserting an online video into your slide
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4 – 将在线视频插入到你的幻灯片中
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)
    ** Quick tip ** : Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的内容可能不正确。](img/11.png) **快速提示**：需要查看此图像的高分辨率版本吗？在下一代Packt阅读器中打开此书或在其PDF/ePub副本中查看。'
- en: '![img](img/21.png) ** The next-gen Packt Reader ** and a ** free PDF/ePub copy
    ** of this book are included with your purchase. Scan the QR code OR visit [ https://packtpub.com/unlock
    ](https://packtpub.com/unlock) , then use the search bar to find this book by
    name. Double-check the edition shown to make sure you get the right one.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '![img](img/21.png) **新一代Packt阅读器**以及本书的**免费PDF/ePub副本**包含在您的购买中。扫描二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)，然后使用搜索栏通过名称查找此书。请仔细检查显示的版本，以确保您获得正确的版本。'
- en: '![img](img/Unlock3.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/Unlock3.png)'
- en: Choosing **Online Videos…** opens a new window with a field where you can paste
    the address of your video ( **4** ), and where you have a list of **Supported
    video providers** ( **5** ). A nice addition since writing the first edition of
    this book is having the possibility to link to videos on your SharePoint sites
    or OneDrive for Business.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 选择**在线视频…**会打开一个新窗口，其中有一个字段，你可以粘贴你的视频地址（**4**），以及一个包含**支持的视频提供商**（**5**）的列表。自从本书第一版编写以来，有一个很好的补充，那就是可以链接到SharePoint站点或OneDrive
    for Business上的视频。
- en: 'As an example, I copied the address of a video I have on my YouTube channel
    ( **6** ) to show you what is displayed. When you click on the **Insert** button
    ( **7** ), the video is made available on the slide. You will have to resize it,
    and the still image will look pixelated, but it will look perfect when shown in
    the slideshow view. There are three important things to consider if you decide
    to show an online video during your presentation:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我复制了我YouTube频道上的一段视频地址（**6**）来展示显示的内容。当你点击**插入**按钮（**7**）时，视频就会在幻灯片上可用。你需要调整其大小，静态图像看起来会有像素化，但在幻灯片放映视图中看起来会非常完美。如果你决定在演示中展示在线视频，有三个重要的事项需要考虑：
- en: The video is not included in your file. It links to its address on the internet.
    If you are presenting in an environment where you don’t have Wi-Fi or wired web
    access, it will not play.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频并未包含在你的文件中。它链接到互联网上的地址。如果你在一个没有Wi-Fi或有线网络访问的环境中展示，它将无法播放。
- en: When linking to a video on the web, you need to make sure you have the right
    to show the video. If it is not your own content, make sure to read the **Terms
    of Use** and **Privacy** policy details on the site. Have a look at the Microsoft
    Support article on the topic in the *Further reading* section or click on the
    **Learn more here** link in the window ( **8** ).
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当在网络上链接视频时，您需要确保您有权展示该视频。如果这不是您的内容，请确保阅读网站上的**使用条款**和**隐私政策**细节。在*进一步阅读*部分查看Microsoft支持文章或点击窗口中的**了解更多信息**链接（**8**）。
- en: If you made the online video a full slide, when it reaches the end, clicking
    on the video won’t take you to your next slide! When using Presenter View (see
    [*Chapter 13*](Chapter_13.xhtml#_idTextAnchor1296) ), you can access your slides
    in a grid view and click on the next slide. If you are not using Presenter View,
    plan on making the video smaller than the slide size so you can move the mouse
    cursor over the slide and click to access your next visual.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您将在线视频设置为全幻灯片，当它到达结束时，点击视频不会带您进入下一张幻灯片！当使用**演示者视图**（见[*第13章*](Chapter_13.xhtml#_idTextAnchor1296)），您可以在网格视图中访问您的幻灯片并点击下一张幻灯片。如果您不使用演示者视图，请计划将视频大小调整为小于幻灯片大小，这样您就可以将鼠标光标移到幻灯片上并点击以访问您的下一个视觉元素。
- en: It is important to keep in mind that online videos cannot be edited or formatted
    using PowerPoint’s video formatting features, which is the topic of our next sect
    ion.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 需要记住的是，在线视频无法使用PowerPoint的视频格式功能进行编辑或格式化，这是我们下一个章节的主题。
- en: Formatting video files
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 格式化视频文件
- en: 'After inserting a video file into your presentation, when you select it on
    the slide, you get access to many formatting features. Let’s start with a quick
    overview of the tools in the **Video Format** tab ( **1** ) before I give you
    a few examples ( *Figure 8.5* ):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在将视频文件插入到您的演示文稿中后，当您在幻灯片上选择它时，您将获得许多格式化功能。在我给您提供一些示例之前，让我们先快速概述一下**视频格式**选项卡中的工具（**1**）：
- en: '![Figure 8.5 – Using the formatting features in the Video Format tab](img/B32063_08_05.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图8.5 – 使用视频格式选项卡中的格式化功能](img/B32063_08_05.png)'
- en: Figure 8.5 – Using the formatting features in the Video Format tab
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5 – 使用视频格式选项卡中的格式化功能
- en: In the **Preview** group, you can use the **Play** button ( **2** ) to start
    and pause your video. You can also use the playback button available at the bottom
    of the video on the slide ( **3** ).
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**预览**组中，您可以使用**播放**按钮（**2**）来开始和暂停您的视频。您还可以使用幻灯片底部视频上的播放按钮（**3**）。
- en: In the **Adjust** group ( **4** ), you have access to tools that help you correct
    the brightness and contrast and recolor your video too. We will discuss **Poster
    Frame** and **Reset Design** in the upcoming examples.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**调整**组（**4**）中，您可以使用帮助您校正亮度和对比度以及重新着色视频的工具。我们将在接下来的示例中讨论**海报框架**和**重置设计**。
- en: The **Video Styles** group ( **5** ) gives you access to a library of predefined
    styles, and you can customize the shape and the border and apply various effects
    to your video.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视频样式**组（**5**）为您提供预定义样式的库，您可以自定义形状和边框，并应用各种效果到您的视频上。'
- en: The **Accessibility** group ( **6** ) gives you access to a button allowing
    you to quickly add Alt Text to your videos. This is a feature you should use in
    all your presentations to make sure your content is accessible to people using
    screen readers.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可访问性**组（**6**）为您提供快速添加Alt文本到视频的按钮。这是一个您应该在所有演示中使用的功能，以确保您的内容对使用屏幕阅读器的人是可访问的。'
- en: In the **Arrange** group ( **7** ), you have the same tools that are available
    for pictures, as seen in the previous chapter. They help you layer, align, and
    rotate all objects on your slides. You can also open the **Selection** pane from
    this group of functio ns.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**排列**组（**7**）中，您有与上一章中图片可用的相同工具。它们帮助您在幻灯片上分层、对齐和旋转所有对象。您还可以从该功能组打开**选择**面板。
- en: In the **Size** group ( **8** ), you can access tools that will help crop and
    resize your video.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**大小**组（**8**）中，您可以访问帮助您裁剪和调整视频大小的工具。
- en: Unless you have disabled **Designer** ( **9** ), you should also see design
    ideas after you have inserted a video if the presentation template is compatible.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除非您已禁用**设计器**（**9**），否则如果您已插入视频且演示模板兼容，您也应该看到设计想法。
- en: Many tools in this tab are easy to use; you just need to try them out on your
    own. The following are a few examples of how to use some of them to help you modify
    a video to your needs.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 此选项卡中的许多工具都易于使用；您只需要亲自尝试它们。以下是一些如何使用其中一些工具的示例，以帮助您根据需要修改视频。
- en: Choosing a poster frame for your v ideo
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为您的视频选择海报框架
- en: 'A poster frame is the still image we see before playing a video. Let’s see
    the options that help you control what that still image will show ( *Figur e 8.6*
    ):'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 海报框架是我们播放视频之前看到的静态图像。让我们看看帮助您控制该静态图像将显示什么选项（*图 8.6*）：
- en: '![Figure 8.6 – Options to change the poster frame of a video](img/B32063_08_06.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.6 – 更改视频海报框架的选项](img/B32063_08_06.png)'
- en: Figure 8.6 – Options to change the poster frame of a video
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.6 – 更改视频海报框架的选项
- en: Make sure your video is selected and open the **Video Format** tab ( **1** ).
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保您的视频已选中，并打开**视频格式**选项卡（**1**）。
- en: Click on the **Poster Frame** button ( **2** ).
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**海报框架**按钮（**2**）。
- en: The **Current Frame** option ( **3** ) allows you to pause the video on a certain
    image ( **4** ) and use it as the still image. This option can be useful when
    you have someone with an unflattering facial expression as the poster frame. You
    can also choose **Image from File…** ( **5** ) and choose an image you have in
    a corporate library.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当前帧**选项（**3**）允许您在某个图像（**4**）上暂停视频，并将其用作静态图像。当海报框架中有人面部表情不佳时，此选项可能很有用。您还可以选择**从文件中图片…**（**5**）并选择您在企业库中的图像。'
- en: The **Reset** option ( **6** ) simply erases the poster frame changes you made
    to bring back the video to its original display.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重置**选项（**6**）简单地擦除您对海报框架所做的更改，将视频恢复到其原始显示状态。'
- en: An example of when changing your poster frame can be useful is if you have a
    corporate video and would rather see a large logo or an image of your offices
    as the still image before playing it. If you don’t like what you see before playing
    your video, change it!
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 更改海报框架可能有用的情况示例是，如果您有一个企业视频，并且更愿意在播放之前看到一个大型的标志或办公室的图像作为静态图像。如果您不喜欢在播放视频之前看到的图像，请更改它！
- en: Let’s move on to changing the shape and the focus point of a video.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续更改视频的形状和焦点。
- en: Changing the shape and cropping a video
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更改视频的形状和裁剪
- en: 'When using videos in a presentation, you don’t need to keep their original
    rectangular shape. I have created an example by first inserting three vid eos
    on a slide, which results in having the videos layered one on top of the other
    and covering the whole slide. To save some time, I applied a design idea that
    resized and positioned the videos on the slide in one click ( **1** ) ( *Figur
    e 8.7* ):'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在演示中使用视频时，您不需要保持它们的原始矩形形状。我通过首先在幻灯片上插入三个视频来创建一个示例，这导致视频层层叠加并覆盖整个幻灯片。为了节省时间，我通过一键（**1**）应用设计理念来调整视频在幻灯片上的大小和位置（*图
    8.7*）：
- en: '![Figure 8.7 – Three videos on a slide layout created by applying a design
    idea](img/B32063_08_07.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.7 – 应用设计理念创建的幻灯片布局上的三个视频](img/B32063_08_07.png)'
- en: Figure 8.7 – Three videos on a slide layout created by applying a design idea
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.7 – 应用设计理念创建的幻灯片布局上的三个视频
- en: In the **Selection** pane ( **2** ), we can see that we have three videos (
    **3** ) and two straight connectors ( **4** ) added by Designer.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在**选择**面板（**2**）中，我们可以看到我们添加了三个视频（**3**）和两个直线连接器（**4**）。
- en: If you don’t remember how to show the **Selection** pane, go back to [*Chapter
    3*](Chapter_03.xhtml#_idTextAnchor206) , in the *Using the lock feature for placeholders
    or objects* section.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不记得如何显示**选择**面板，请回到[*第 3 章*](Chapter_03.xhtml#_idTextAnchor206)，在*使用锁定功能为占位符或对象*部分。
- en: Designer is an efficient way to change a layout quickly, but many times it adds
    decorative shapes that don’t fit with the presentation’s design. W hen you have
    decorative items added by Designer, such as the straight connectors in the previous
    example, if they are not required in your desi gn, you can simply select them
    in the **Selection** pane and hit the *Delete* key on your keyboard. By default,
    objects added by Designer are always locked, but you can easily unlock them in
    the **Selection** pane using the lock icon. As a reminder, Designer and its design
    ideas are only available as connected services with an M365 license.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 设计师是一个快速更改布局的有效方式，但很多时候它会添加与演示设计不匹配的装饰形状。当您添加了设计师的装饰项目，例如前一个例子中的直线连接器时，如果它们在您的设计中不是必需的，您只需在**选择**面板中选择它们，然后在键盘上按**删除**键。默认情况下，设计师添加的对象始终处于锁定状态，但您可以在**选择**面板中使用锁图标轻松解锁它们。提醒一下，设计师及其设计理念仅作为带有
    M365 许可证的连接服务提供。
- en: 'To change the shape of a video, you first need to make sure it is selected
    so that you can access the **Video Format** tab ( **1** ) ( *Figure 8.8* ):'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 要更改视频的形状，你首先需要确保它被选中，这样你才能访问**视频格式**选项卡（**1**）（*图 8.8*）：
- en: '![Figure 8.8 – Changing the shape of a video](img/B32063_08_08.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.8 – 更改视频的形状](img/B32063_08_08.png)'
- en: Figure 8.8 – Changing the shape of a video
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.8 – 更改视频的形状
- en: Click on the **Video Shape** button ( **2** ) and select any of the shapes in
    the gallery.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**视频形状**按钮（**2**）并从图库中选择任何形状。
- en: My next example has been created with a pentagon ( **3** ) and two chevron shapes
    ( **4** ).
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的下一个例子是用五边形（**3**）和两个箭头形状（**4**）创建的。
- en: If you change your mind about a shape, you can always click on the **Reset Design**
    button ( **5** )
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你关于形状改变了主意，你总是可以点击**重置设计**按钮（**5**）
- en: 'If yo u choose your videos wisely and give each of them a shape that conveys
    a process, they could show each step of the process you are explaining. An example
    of this is shown in *Figur e 8.9* :'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你明智地选择你的视频并为每个视频赋予一个传达过程的形状，它们可以展示你解释的每个步骤。这种例子在*图 8.9*中展示：
- en: '![Figure 8.9 – Three videos, shaped like a pentagon and two chevrons, to show
    a process](img/B32063_08_09.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.9 – 三个形状为五边形和两个箭头的视频，以展示一个过程](img/B32063_08_09.png)'
- en: Figure 8.9 – Three videos, shaped like a pentagon and two chevrons, to show
    a process
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.9 – 三个形状为五边形和两个箭头的视频，以展示一个过程
- en: 'Changing the shape of a video might not always suit your needs. What if you
    simply want to have a square instead of a rectangle? That is when the **Crop**
    tool can help you ( *Figure 8 .10* ):'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 更改视频的形状可能并不总是满足你的需求。如果你只想有一个正方形而不是矩形怎么办？这就是裁剪工具能帮到你的时候（*图 8.10*）：
- en: "![Figure 8.10 – Using the Crop tool on a video\uFEFF](img/B32063_08_10.png)"
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.10 – 在视频上使用裁剪工具](img/B32063_08_10.png)'
- en: Figure 8.10 – Using the Crop tool on a video
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.10 – 在视频上使用裁剪工具
- en: With the video selected, click on the **Video Format** tab ( **1** ) if it is
    not already displayed.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当视频被选中时，如果它尚未显示，请点击**视频格式**选项卡（**1**）。
- en: Click on the **Crop** button ( **2** ). Use any of the black cropping handles
    on the border to hide parts of the video while it is playing. In the example,
    the handle on the left ( **3** ) was moved to the right so that the video would
    become a square.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**裁剪**按钮（**2**）。使用边框上的任何黑色裁剪手柄在播放时隐藏视频的一部分。在示例中，左侧的手柄（**3**）被移动到右侧，这样视频就会变成一个正方形。
- en: It is important to note that if after cropping a video you change your mind,
    you need to go back to the **Crop** button and move the handles or slide other
    elements into the focus area. Using the **Reset Design** button has no effect
    on the crop. Even if the **Reset Design & Size** button removed the crop, it would
    also bring back the video’s original size, which might be larger than your slide
    size. Knowing about this behavior will help you decide what is best for you depending
    on the video.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，如果在裁剪视频后你改变了主意，你需要回到**裁剪**按钮，移动手柄或将其他元素滑动到焦点区域。使用**重置设计**按钮对裁剪没有影响。即使**重置设计
    & 大小**按钮移除了裁剪，它也会恢复视频的原始大小，这可能会比你的幻灯片大小更大。了解这种行为将帮助你根据视频决定什么最适合你。
- en: Now that we have seen some formatting options for videos, it’s time to talk
    about the playback options.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了一些视频的格式化选项，是时候讨论播放选项了。
- en: Changing some video playback settings
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更改一些视频播放设置
- en: 'When a video is selected ( **1** ), there is a second tab allowing us to make
    changes. Let’s have a quick look at the **Playback** tab ( **2** ) ribbon ( *Figure
    8.11* ):'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当视频被选中（**1**）时，有一个第二个选项卡允许我们进行更改。让我们快速看一下**播放**选项卡（**2**）的选项（*图 8.11*）：
- en: '![Figure 8.11 – Video playback tab options](img/B32063_08_11.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.11 – 视频播放选项卡选项](img/B32063_08_11.png)'
- en: Figure 8.11 – Video playback tab options
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.11 – 视频播放选项卡选项
- en: The **Preview** group ( **3** ) has a **Play** button allowing you to start
    or pause the video.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预览**组（**3**）有一个**播放**按钮，允许你开始或暂停视频。'
- en: The **Bookmarks** group ( **4** ) is used to add bookmarks that can be used
    in a dvanced animation sequences. An example will be given in [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor874)
    .
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**书签**组（**4**）用于添加可以在高级动画序列中使用的书签。一个例子将在[*第 9 章*](Chapter_09.xhtml#_idTextAnchor874)中给出。'
- en: In the **Editing** group ( **5** ), you have tools to trim video and add a simple
    fade in and fade out.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**编辑**组（**5**）中，你有修剪视频和添加简单淡入淡出效果的工具。
- en: The **Video Options** group ( **6** ) allows you to make various changes to
    volume, control when the video starts, and set how it plays. Be aware that the
    default playback for a video inserted from your device is **In Click Sequence**
    , not **Automatically** . Make sure to choose according to your desired outcome.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视频选项**组（**6**）允许您对音量、控制视频何时开始以及设置视频如何播放进行各种更改。请注意，从您的设备插入的视频的默认播放方式是**点击顺序**，而不是**自动**。请确保根据您的期望结果进行选择。'
- en: The **Caption Options** group ( **7** ) allows you to upload a captions file
    in the `.vtt` format. This step should not be overlooked if you want to make your
    presentation more accessible. It allows people to read the words spoken during
    the video. This is different from subtitles, which can be used during your live
    presentation to show your spoken words to the audience.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字幕选项**组（**7**）允许您上传`.vtt`格式的字幕文件。如果您想使您的演示文稿更具可访问性，这一步不应被忽视。它允许人们在视频播放时阅读所说的词语。这与字幕不同，字幕可以在您的现场演示中用来向观众展示您所说的词语。'
- en: In the **Save** group ( **8** ), the **Save Media as** button is a quick way
    to save the video on your slide as its own `.mp4` video. Be aware that any formatting
    or playback changes made in PowerPoint are not reflected in the media file—you
    get the original format and duration.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**保存**组（**8**）中，**另存为**按钮是一个快速将视频保存为单独`.mp4`视频的方法。请注意，在PowerPoint中进行的任何格式或播放更改都不会反映在媒体文件中——您得到的是原始格式和持续时间。
- en: From the various options listed previously, we will first have a closer look
    at the **Trim Video** feature in the **Editing** group. As its name implies, it
    helps you trim the beginning or the end of your vi deo. It does not replace professional
    video editing software, but it can be used as a quick fix when you don’t have
    any other software than PowerPoint, or support from a creative team.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 从之前列出的各种选项中，我们首先将更详细地查看**编辑**组中的**裁剪视频**功能。正如其名称所暗示的，它可以帮助您裁剪视频的开始或结束部分。它不能替代专业的视频编辑软件，但在您没有其他软件只有PowerPoint或没有创意团队支持的情况下，它可以作为一个快速修复方案。
- en: 'To access the trimming options, you need to first select a video and go to
    the **Playback** tab ( **1** ), then click on **Trim Video** ( **2** ) ( *Figure
    8.12* ). Let’s explore how we can trim our example video:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问裁剪选项，您需要首先选择一个视频并转到**播放**选项卡（**1**），然后点击**裁剪视频**（**2**）（*图8.12*）。让我们探索如何裁剪我们的示例视频：
- en: '![Figure 8.12 – Accessing and using the Trim Video feature](img/B32063_08_12.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图8.12 – 访问和使用裁剪视频功能](img/B32063_08_12.png)'
- en: Figure 8.12 – Accessing and using the Trim Video feature
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.12 – 访问和使用裁剪视频功能
- en: 'Right below the **Trim Video** dialog box’s ( **3** ) title bar, you will find
    the name of the video and its duration. In our example, we see **Video 6** and
    **Duration: 00:09,042** .'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**裁剪视频**对话框的标题栏下方，您将找到视频的名称及其持续时间。在我们的示例中，我们看到**视频6**和**持续时间：00:09,042**。
- en: You can use the playback arrow or the previous or next frame arrows ( **4**
    ) to help you find where you want to start and end your video.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用播放箭头或上一帧或下一帧箭头（**4**）来帮助您找到您想要开始和结束视频的位置。
- en: A quicker way is to click and drag the start marker on the left ( **5** ), colored
    green in the interface, and watch the preview window to stop moving it where you
    want to start. You can do the same with the end marker on the right ( **6** ),
    colored red in the interface, to choose where you want to stop the video.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个更快的方法是点击并拖动左侧的起始标记（**5**），在界面上呈绿色，并观看预览窗口以停止移动到您想要开始的位置。您也可以用相同的方法操作右侧的结束标记（**6**），在界面上呈红色，以选择您想要停止视频的位置。
- en: 'After moving both markers, you will see the new clip duration ( **1** ), along
    with the precise **Start Time** ( **2** ) and **End Time** ( **3** ) details (
    *Figure 8.13* ):'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 移动两个标记后，您将看到新的剪辑持续时间（**1**），以及精确的**开始时间**（**2**）和**结束时间**（**3**）详细信息（*图8.13*）：
- en: '![Figure 8.13 – Trimming the start and end time of a video](img/B32063_08_13.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图8.13 – 裁剪视频的开始和结束时间](img/B32063_08_13.png)'
- en: Figure 8.13 – Trimming the start and end time of a video
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.13 – 裁剪视频的开始和结束时间
- en: The only action left to do is to click on the **OK** button ( **4** ) to confirm
    the changes.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 剩下的唯一操作就是点击**确定**按钮（**4**）以确认更改。
- en: 'Finally , let’s have a closer look at the **Video Options** settings available
    in the **Playback** tab so that you have a better understanding of what you can
    change and why ( *Figure 8.14* ):'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们更仔细地看看**播放**选项卡中可用的**视频选项**设置，以便您更好地了解您可以更改的内容以及原因（*图8.14*）：
- en: '![Figure 8.14 – Overview of the Video Options settings in the Playback tab](img/B32063_08_14.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图8.14 – 播放选项卡中视频选项的概述](img/B32063_08_14.png)'
- en: Figure 8.14 – Overview of the Video Options settings in the Playback tab
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.14 – 播放选项卡中视频选项的概述
- en: The **Volume** button ( **1** ) allows you to choose a volume level for your
    clip. Using the **High** setting is probably best in most cases, giving you—or
    the audience when presenting virtually—the chance to adjust your speaker’s volume.
    If the checkmark is automatically beside the **Mute** setting, it’s usually because
    the clip does not have sound.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**音量**按钮（**1**）允许你为你的剪辑选择音量级别。在大多数情况下使用**高**设置可能是最好的，这给你或虚拟演示时的观众提供了调整演讲者音量的机会。如果自动勾选了**静音**设置旁边的复选框，通常是因为剪辑没有声音。'
- en: The **Start** option ( **2** ) is usually set to **Automatically** , meaning
    that your video starts automatically when you reach that slide during the slideshow.
    Clicking on the arrow brings up a list allowing you to choose another setting.
    **In Click Sequence** means you can start the video within your animation sequence,
    making it easy to use a presentation remote. The **When Clicked On** option requires
    you to click on the video or the player to start it. We will see an example of
    video animation settings in the next chapter.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开始**选项（**2**）通常设置为**自动**，这意味着当你在幻灯片放映过程中到达该幻灯片时，视频会自动开始。点击箭头会弹出一个列表，允许你选择另一个设置。"**点击顺序**"意味着你可以在动画序列中启动视频，这使得使用演示文稿遥控器变得容易。"**点击时**"选项需要你点击视频或播放器来启动它。我们将在下一章中看到一个视频动画设置的例子。'
- en: The **Play Full Screen** option ( **3** ), when checked, makes sure the video
    will play in full screen when in slideshow mode. If you want to display many videos
    on a slide, like a menu, you can use this option to make sure you focus on one
    full-screen video at a time.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全屏播放**选项（**3**），当勾选时，确保在幻灯片放映模式下视频将全屏播放。如果你想在幻灯片上显示多个视频，如菜单，你可以使用此选项确保一次只关注一个全屏视频。'
- en: The **Hide While Not Playing** option ( **4** ) allows you to keep a video hidden
    until you play it. Be careful! If you have chosen this option and the **When Clicked
    On** start option, you will never be able to click on the video.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不播放时隐藏**选项（**4**）允许你在播放视频之前将其隐藏。请注意！如果你选择了此选项并且**点击时**启动选项，你将永远无法点击视频。'
- en: The **Loop until Stopped** option ( **5** ) is nice if you want to make sure
    a short clip keeps playing until you click on it to pause or change to another
    slide.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**循环播放直到停止**选项（**5**）如果你想要确保一个短剪辑在你点击它暂停或切换到另一个幻灯片之前一直播放，这是一个不错的选择。'
- en: The **Rewind after Playing** option ( **6** ) can be used if you want to make
    sure the video brings back the first frame or the poster frame once it finishes
    playing.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**播放后倒带**选项（**6**）可以在你想要确保视频在播放结束后返回第一帧或海报帧时使用。'
- en: Now that we have seen the basics of inserting and formatting videos in a presentation,
    let’s move on to inserting and formatting audio clips.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了在演示文稿中插入和格式化视频的基础知识，让我们继续学习如何插入和格式化音频剪辑。
- en: Inserting and formatting audio
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 插入和格式化音频
- en: Using a udio in your presentation can be particularly useful in some circumstances,
    but I often hear about users feeling lost with all the formats and compatibility
    issues, as we discussed for videos previously. Again, let’s start by defining
    the supported file f ormats.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，在你的演示文稿中使用音频特别有用，但我经常听到用户因为所有格式和兼容性问题而感到困惑，就像我们之前讨论视频时那样。再次强调，让我们首先定义支持的文件格式。
- en: Supported audio file formats
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持的音频文件格式
- en: 'Since versions and compatibility issues are similar between audio and video,
    I won’t repeat the introduction I did in the video section. I will refer you again
    to the Microsoft article discussing video and audio formats in the *Further reading*
    section. If you want to make sure the audio files included in your presentation
    will play on most devices and are supported by most operating systems, here are
    three formats you can look for:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 由于音频和视频的版本和兼容性问题相似，我不会重复在视频部分所做的介绍。我将在*进一步阅读*部分再次引用讨论视频和音频格式的Microsoft文章。如果你想确保包含在演示文稿中的音频文件在大多数设备上播放，并且被大多数操作系统支持，以下是你可以查找的三个格式：
- en: The `.mp3` format is supported on Windows, macOS, iOS, and Android
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`.mp3`格式在Windows、macOS、iOS和Android上受支持'
- en: The `.mp4` format is supported on Windows, macOS, and iOS
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`.mp4`格式在Windows、macOS和iOS上受支持'
- en: The `.wav` format is supported on Windows, macOS, and Android
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`.wav`格式在Windows、macOS和Android上受支持'
- en: Again, I am skipping many technical details. But as Microsoft mentions in its
    own support article, knowing the names of files will be enough to look for the
    right files or use a file converter if necessary. If you insert one of the preceding
    audio file formats into your presentations, you will most likely avoid running
    into problems. If you do run into any problems, the Microsoft resources listed
    in the *Further reading* section will help you.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 再次提醒，我跳过了许多技术细节。但正如微软在其自己的支持文章中提到的，知道文件名就足够查找正确的文件或必要时使用文件转换器。如果您将上述音频文件格式之一插入到您的演示文稿中，您很可能会避免遇到问题。如果您遇到任何问题，*进一步阅读*部分中列出的微软资源将帮助您。
- en: Now that you have a little more knowledge about audio file formats, we can move
    on to inserting audio in prese ntations.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您对音频文件格式有了更多了解，我们可以继续在演示文稿中插入音频。
- en: Inserting audio fi les
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 插入音频文件
- en: Using audio in your presentation can be valuable either to help you tell a more
    powerful story or to help your audience understand better by listening to relevant
    audio. There are also instances where audio is required to add narration when
    a presentation is viewed without a presenter. Just as we mentioned for videos,
    audio should be relevant and short.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的演示文稿中使用音频可以是很有价值的，无论是帮助您讲述更强大的故事，还是帮助您的观众通过聆听相关音频更好地理解。也有时候，当演示文稿在没有演讲者观看时，需要音频来添加旁白。正如我们之前提到的视频一样，音频应该是相关且简短的。
- en: When using audio during a presentation you are delivering, I recommend keeping
    audio clips shorter than videos since the audience will only have something to
    listen to—less than 30 seconds would be a good target. If you are using PowerPoint
    to create training, you should plan to show a static slide for less than a minute
    or use sequential animations, so the content is perceived as more engaging and
    livelier.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在您进行演示时使用音频，我建议将音频剪辑的长度控制在视频长度以下，因为观众只有听的内容——少于 30 秒将是一个很好的目标。如果您使用 PowerPoint
    创建培训，您应该计划显示静态幻灯片少于一分钟或使用顺序动画，以便内容看起来更加吸引人和生动。
- en: 'You cannot insert audio into your presentation from a placeholder. You need
    to use the **Insert** tab ( **1** ) ( *Figu re 8.15* ):'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 您不能从占位符中插入音频。您需要使用 **插入**选项卡（**1**）（*图 8.15*）：
- en: '![Figure 8.15 – Inserting audio into a presentation](img/B32063_08_15.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.15 – 在演示文稿中插入音频](img/B32063_08_15.png)'
- en: Figure 8.15 – Inserting audio into a presentation
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.15 – 在演示文稿中插入音频
- en: When you click on the **Audio** button ( **2** ), you open a list of two options.
    If you don’t see the button, look for **Media** .
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您点击 **音频**按钮（**2**）时，您将打开一个包含两个选项的列表。如果您看不到按钮，请查找 **媒体**。
- en: Clicking on the **Audio on My PC…** ( **3** ) option opens a window to browse
    your computer for a file.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击 **我的电脑上的音频…**（**3**）选项将打开一个窗口，以便在您的电脑上浏览文件。
- en: Clicking on the **Record Audio…** ( **4** ) option opens the **Record Sound**
    dialog box, where you can give your recording a name ( **5** ). When ready, use
    the recording button ( **6** ) to launch it, the stop button ( **7** ) when you
    are done, and the play button ( **8** ) to listen to your recording, before clicking
    the **OK** button to insert it on your slide.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击 **录制音频…**（**4**）选项将打开 **录音声音**对话框，您可以在其中为您的录音命名（**5**）。准备好后，使用录音按钮（**6**）启动它，完成时使用停止按钮（**7**），使用播放按钮（**8**）来收听您的录音，然后点击
    **确定**按钮将其插入到您的幻灯片中。
- en: Make sure you have a microphone connected to your computer if you want to record
    audio. It will improve the quality of the recorded audio.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想录音，请确保您的电脑连接了麦克风。这将提高录音的质量。
- en: After inserting an audio file from your computer or recording a clip, you will
    see an audio icon on your slide ( **9** ) with the player underneath for playback
    options.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在从您的电脑插入音频文件或录制剪辑后，您将在您的幻灯片上看到一个音频图标（**9**），下面是播放选项的播放器。
- en: 'When your audio file has been inserted and it is selected on your slide ( **1**
    ), you have ac cess to two new tabs: **Audio Format** ( **2** ) and **Playback**
    ( **3** ) ( *Figu re 8.16* ):'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 当您的音频文件已插入并且已选中您的幻灯片（**1**）时，您将可以访问两个新的选项卡：**音频格式**（**2**）和**播放**（**3**）（*图
    8.16*）：
- en: '![Figure 8.16 – A selected audio file gives you access to the Audio Format
    and Playback tabs](img/B32063_08_16.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.16 – 选择音频文件可访问音频格式和播放选项卡](img/B32063_08_16.png)'
- en: Figure 8.16 – A selected audio file gives you access to the Audio Format and
    Playback tabs
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.16 – 选择音频文件可访问音频格式和播放选项卡
- en: Let’s see which elements in the **Audio Format** tab can b e useful.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看在 **音频格式**选项卡中哪些元素可能有用。
- en: Formatting audi o files
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 格式化音频文件
- en: In the **Audio Format** tab, you see groups of functions like the ones we saw
    in the previous chapter while discussing picture formatting. This is mainly because
    the icon for your audio file is considered a picture object. Since the icon is
    usually hidden during a presentation, you don’t have to spend any time in this
    tab. But I will show you a nice trick that might be interesting for some presentations.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在**音频格式**选项卡中，你看到的功能组与我们在上一章讨论图片格式时看到的一样。这主要是因为你的音频文件图标被视为图片对象。由于图标通常在演示过程中被隐藏，你不需要在这个选项卡上花费任何时间。但我将向你展示一个可能对某些演示有趣的技巧。
- en: 'If your topic requires you to play a few audio clips from a slide, you could
    replace the icon by using the **Change Picture** button ( **1** ), replacing the
    audio icon with an image ( **2** ) or an icon ( **3** ). Doing so would give you
    a nice visual clue to choose the audio you want to play ( *Figu re 8.17* ):'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的主题需要你在幻灯片上播放几个音频剪辑，你可以通过使用**更改图片**按钮（**1**），用图片（**2**）或图标（**3**）替换音频图标来实现。这样做会为你提供一个很好的视觉线索来选择你想要播放的音频（*图8.17*）：
- en: '![Figure 8.17 – Replacing the audio clip icon with a picture or icon](img/B32063_08_17.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图8.17 – 用图片或图标替换音频剪辑图标](img/B32063_08_17.png)'
- en: Figure 8.17 – Replacing the audio clip icon with a picture or icon
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.17 – 用图片或图标替换音频剪辑图标
- en: If the icon or image you used looks like it was cropped, you might want to use
    **Reset Picture** ( **4** ) and then **Reset Picture & Size** to bring it back
    to its original size ratio. This behavior has evolved to keep the audio icon ratio
    instead of its replacement image or icon.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的图标或图片看起来像是被裁剪过的，你可能需要使用**重置图片**（**4**）然后**重置图片和大小**（**4**）来将其恢复到原始大小比例。这种行为已经演变为保持音频图标的比例，而不是其替代图像或图标。
- en: Be aware that after replacing the original icon, you will not be able to reset
    it back to the original icon. But you can go back to the Microsoft icons library
    and search for the content for an icon similar to the original one; using the
    `audio` keyword will give you nice results.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在替换原始图标后，你将无法将其重置回原始图标。但你可以回到微软图标库并搜索与原始图标相似的图标内容；使用`audio`关键字会得到很好的结果。
- en: Most of the time, you will not need to change anything in the **Audio Format**
    tab, and you can simply open the **Playback** tab, the topic of the following
    section.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数情况下，你不需要在**音频格式**选项卡中更改任何内容，你可以直接打开**播放**选项卡，这是下一节的主题。
- en: Changing some audio playback sett ings
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更改一些音频播放设置
- en: 'When an audio clip is selected ( **1** ), there is a second tab allowing us
    to make changes. Let’s have a quick look at the **Playback** tab ( **2** ) ribbon
    ( *Figu re 8.18* ):'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 当选择音频剪辑（**1**）时，会有第二个选项卡允许我们进行更改。让我们快速查看**播放**选项卡（**2**）的界面（*图8.18*）：
- en: '![Figure 8.18 – Audio playback tab options](img/B32063_08_18.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![图8.18 – 音频播放选项卡](img/B32063_08_18.png)'
- en: Figure 8.18 – Audio playback tab options
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.18 – 音频播放选项卡
- en: The **Preview** group ( **3** ) has a **Play** button allowing you to start
    or pause the audio.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预览**组（**3**）有一个**播放**按钮，允许你开始或暂停音频。'
- en: The **Bookmarks** group ( **4** ) is used to add bookmarks that can be used
    in advanced animation sequences.
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**书签**组（**4**）用于添加可以在高级动画序列中使用的书签。'
- en: In the **Editing** group ( **5** ), you have tools to trim audio and add a simple
    fade in and fade out.
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**编辑**组（**5**）中，你有一些工具可以修剪音频并添加简单的淡入和淡出效果。
- en: 'The **Audio Options** group ( **6** ) allows you to make various changes to
    the audio volume, when it starts, and how it plays. Only two options are different
    from the ones we discussed in the previous *Formatting video files* section:'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**音频选项**组（**6**）允许你对音频音量、开始时间和播放方式进行各种更改。只有两个选项与我们在上一节*格式化视频文件*中讨论的不同：'
- en: '**Play Across Slides** is an option that allows sounds to play in the background.'
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨幻灯片播放**是一个允许声音在背景中播放的选项。'
- en: '**Hide During Show** is the option to use if you want to make sure the audio
    icon is not visible during your presentation. The icon can also be dragged outside
    the slide while in normal view but doing so might make it more difficult to see
    while you are editing the slides, depending on which zoom factor you are using
    while editing your slide.'
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在演示时隐藏**是如果你想确保音频图标在演示过程中不可见时使用的选项。在正常视图下，图标也可以被拖到幻灯片外部，但这样做可能会在编辑幻灯片时根据你使用的缩放比例而难以看到。'
- en: 'In the **Audio Styles** group ( **7** ), you have two buttons:'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**音频样式**组（**7**）中，你有两个按钮：
- en: '**No Style** : To reset audio options back to their default in one click'
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无样式**：一键将音频选项重置为默认设置'
- en: '**Play in Background** : To set the audio to play across all your slides, such
    as background music, in one click'
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**背景播放**：一键设置音频在所有幻灯片中播放，例如背景音乐'
- en: 'The **Caption Options** group ( **8** ) allows you to upload a captions file
    in the `.vtt` format. This step should not be overlooked if you want to make your
    presentation more accessible. It allows people to read the words spoken in the
    audio. *Note* : The captions will only be displayed on the slide where you added
    the audio.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字幕选项**组（**8**）允许你上传`.vtt`格式的字幕文件。如果你想使你的演示文稿更具可访问性，这一步不应被忽视。它允许人们阅读音频中说的单词。*注意*：字幕将只在你添加音频的幻灯片上显示。'
- en: In the **Save** group ( **9** ), the **Save Media as** button is a quick way
    to save the audio on your slide as its own `.mp3` file. Be aware that any formatting
    or playback changes made in PowerPoint are not reflected in the media file—you
    get the original format and duration.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**“保存”**组（**9**）中，**“另存为”**按钮是一个快速保存音频到幻灯片上作为其自己的`.mp3`文件的途径。请注意，在PowerPoint中进行的任何格式或播放更改都不会反映在媒体文件中——你将获得原始格式和时长。
- en: Let’s now see PowerPoint’s trimming tool, which will help you reduce the audio
    duration to adapt it to your needs.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看PowerPoint的修剪工具，它可以帮助你调整音频时长以适应你的需求。
- en: Using the Trim Audio tool
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用修剪音频工具
- en: The **Trim Audio** tool works mostly like the **Tri m Video** tool we discussed
    previously. Like the **Trim Video** tool, it does not replace professional audio
    editing software applications, but it can be used as a q uick fix when you don’t
    have any software other than PowerPoint, or support from a creative team.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '**修剪音频**工具的工作方式与之前讨论的**修剪视频**工具大致相同。与**修剪视频**工具一样，它并不能替代专业的音频编辑软件应用，但在没有其他软件（除了PowerPoint）或创意团队支持的情况下，它可以作为一个快速修复方案。'
- en: 'To access the trimming options, you need to first select an audio file and
    go to the **Playback** tab ( **1** ), then click on **Trim Audio** ( **2** ) (
    *Fi gure 8.19* ):'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问修剪选项，你需要首先选择一个音频文件，然后转到**“播放”**选项卡（**1**），然后点击**“修剪音频”**（**2**）（*图8.19*）：
- en: '![Figure 8.19 – Accessing and using the Trim Audio feature](img/B32063_08_19.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![图8.19 – 访问和使用修剪音频功能](img/B32063_08_19.png)'
- en: Figure 8.19 – Accessing and using the Trim Audio feature
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.19 – 访问和使用修剪音频功能
- en: 'Right below the **Trim Audio** dialog box’s ( **3** ) title bar, you will find
    the name of the audio and its duration. Let’s see how you can trim the audio:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在**“修剪音频”**对话框的标题栏（**3**）下方，你可以找到音频的名称及其时长。让我们看看如何修剪音频：
- en: You can use the playback arrow or the previous or next frame arrows ( **4**
    ) to help you find where you want to start and end your audio. Obviously, make
    sure you have a headset or that your speakers are on to hear th e audio.
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以使用播放箭头或上一个或下一个帧箭头（**4**）来帮助你找到你想要开始和结束音频的位置。显然，确保你有耳机或你的扬声器是开启的，以便听到音频。
- en: To trim the beginning of your clip, you need to click and drag the start marker
    on the left ( **5** ), colored green in the interface. Since you don’t have a
    visual preview for an audio track, you will need to use the playback buttons to
    check whether it starts when you need it to.
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要修剪剪辑的开头，你需要点击并拖动左侧的起始标记（**5**），在界面上显示为绿色。由于你没有音频轨道的视觉预览，你需要使用播放按钮来检查它是否在需要的时候开始播放。
- en: You can do the same with the end marker on the right ( **6** ), colored red
    in the interface, to choose where you want to stop the audio. Again, this is a
    trial-and-error process, especially if your audio clip is longer. You cannot zoom
    in on the audio waves on the track.
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你也可以用右侧的结束标记（**6**），在界面上显示为红色，来选择你想要停止音频的位置。这同样是一个试错过程，特别是如果你的音频剪辑较长。你不能在音频波形上放大。
- en: In this case, you might want to make micro-adjustments to the **Start Time**
    ( **7** ) and **End Time** ( **8** ) settings by using the arrows or even entering
    the time manually into the fields.
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这种情况下，你可能想要通过使用箭头或甚至手动输入时间到字段中来对**“开始时间”**（**7**）和**“结束时间”**（**8**）设置进行微调。
- en: After moving both markers, you will see the new clip duration ( **9** ). You
    just need to confirm your changes by clicking on the **OK** button ( **10** ).
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移动两个标记后，你将看到新的剪辑时长（**9**）。你只需通过点击**“确定”**按钮（**10**）来确认你的更改。
- en: Trimming audio might be more labor-intensive within PowerPoint if your file
    is longer, but it is still worth it if you don’t have any other software or a
    creative team to help you. Keep in mind that it does not change your file per
    se—it only changes the start and end times for playback.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的文件较长，在PowerPoint中剪辑音频可能需要更多劳动，但如果你没有其他软件或创意团队来帮助你，这仍然值得。请记住，这本身并不会改变你的文件——它只会改变播放的开始和结束时间。
- en: Microsoft has introduced a new way to increase engagement in presentations by
    allowing presenters to insert a live camera feed into their slides. This will
    be the topic of the n ext section.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 微软通过允许演示者将实时相机流插入幻灯片，引入了一种新的方式来提高演示文稿的互动性。这将是下一节的主题。
- en: Using the Cameo feature
  id: totrans-201
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Cameo功能
- en: We must keep finding new ways to engage our audiences, and using the **Cameo**
    feature could be interesting in some situations. The feature is available to M365
    subscribers in the desktop and web versions of PowerPoint, and in PowerPoint Live
    in Teams. In short, Cameo allows you to embed a live camera feed into your slides.
    I see the value of adding presenter visibility when presenting virtually, or in
    a large venue where some people in the audience might not see you clearly. It
    could also be used to focus a camera on a sign language interpreter, which is
    a terrific way to be more accessible and inclusive.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须不断寻找新的方法来吸引我们的观众，使用**Cameo**功能在某些情况下可能很有趣。此功能在PowerPoint的桌面和网页版本以及Teams中的PowerPoint
    Live中可供M365订阅者使用。简而言之，Cameo允许你将实时相机流嵌入到你的幻灯片中。我认为在虚拟演示或在大型场所中，当一些观众可能看不清楚你时，增加演示者可见性是有价值的。它还可以用来聚焦在手语翻译者身上，这是一个更加包容和易于接触的绝佳方式。
- en: 'To access the feature, you need to click on the **Insert** tab ( **1** ) (
    *F igure 8.20* ):'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问此功能，你需要点击**插入**选项卡（**1**）（*图8.20*）：
- en: '![Figure 8.20 – Accessing Cameo and inserting a camera object](img/B32063_08_20.png)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![图8.20 – 访问Cameo并插入相机对象](img/B32063_08_20.png)'
- en: Figure 8.20 – Accessing Cameo and inserting a camera object
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.20 – 访问Cameo并插入相机对象
- en: If you click on the **Cameo** button ( **2** ), it automatically adds a camera
    object ( **3** ) in the lower-right corner of the slide and might also open the
    **Designer** pane ( **4** ) to suggest design ideas that include a camera feed.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你点击**Cameo**按钮（**2**），它将自动在幻灯片的右下角添加一个相机对象（**3**），并可能打开**设计器**面板（**4**）以建议包含相机流的设计想法。
- en: If you click on the arrow below the **Cameo** button, you can choose to add
    the camera object to **All Slides** ( **5** ) or **This Slide** .
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你点击**Cameo**按钮下方的箭头，你可以选择将相机对象添加到**所有幻灯片**（**5**）或**此幻灯片**。
- en: 'Since it is a camera object on the slide, this means that you also get formatting
    features for it. When **Cameo** is selected on your slide ( **1** ), you get a
    **Camera Format** tab ( **2** ). Let’s review the tools you can use to format
    the camera object ( *F igure 8.21* ):'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它是一个幻灯片上的相机对象，这意味着你也会为其获得格式化功能。当你在幻灯片上选择**Cameo**（**1**）时，你会看到一个**相机格式**选项卡（**2**）。让我们回顾一下你可以用来格式化相机对象的工具（*图8.21*）：
- en: '![Figure 8.21 – Using the Cameo formatting tools](img/B32063_08_21.png)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![图8.21 – 使用Cameo格式化工具](img/B32063_08_21.png)'
- en: Figure 8.21 – Using the Cameo formatting tools
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.21 – 使用Cameo格式化工具
- en: Y ou can get a preview of your camera if you click on the **Preview** button
    in the **Camera** group or the camera icon in the bottom-left corner on Cameo
    ( **3** ). If you have more than one camera, for example, a built-in laptop camera
    and a USB one, there will be a preview drop-down menu where you can choose which
    camera you want to use.
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你点击**相机**组中的**预览**按钮或Cameo左下角的相机图标（**3**），你可以预览你的相机。如果你有多个相机，例如内置笔记本电脑摄像头和一个USB摄像头，将会有一个预览下拉菜单，你可以从中选择你想要使用的相机。
- en: In the **Camera Styles** group ( **4** ), you can access some styles that can
    be applied to your Cameo object. Hovering over each one with your mouse cursor
    gives a live preview of what it will look like. Simply click on the one you want
    to apply to your camera object.
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**相机样式**组（**4**）中，你可以访问一些可以应用于你的Cameo对象的样式。将鼠标光标悬停在每一个上，会实时预览它将看起来是什么样子。只需点击你想要应用到你的相机对象上的样式即可。
- en: If you have added Cameo to only one slide and decide you want to include it
    on all slides, simply use the **Apply to All Slides** button ( **5** ). The camera
    feed object will be added in the same position, with the same size and formatting
    on all your slides.
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你只将Cameo添加到一张幻灯片，并决定想要在所有幻灯片上包含它，只需简单地使用**应用到所有幻灯片**按钮（**5**）。摄像头流对象将以相同的位置、大小和格式添加到你的所有幻灯片上。
- en: '*Tip* : Ensure that you make any changes in the position, size, or formatting
    before you use the **Apply to All Slides** button to avoid having a lot of manual
    work to do.'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*提示*：在使用**应用到所有幻灯片**按钮之前，确保对位置、大小或格式进行任何更改，以避免进行大量手动工作。'
- en: '*Warning* : If you click more than once on the **Apply to All Slides** button,
    it will add multiple Cameo objects on top of one another.'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*警告*：如果你多次点击**应用到所有幻灯片**按钮，它将在多个Cameo对象上叠加。'
- en: You can also use **Camera Shape** , **Camera Border** , and **Camera Effects**
    ( **6** ) to change the visual aspect of Cameo. Try some options to see what they
    look like, but remember that these apply to your live camera feed, so there is
    no need to overdo it on effects.
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你还可以使用**摄像头形状**、**摄像头边框**和**摄像头效果**（**6**）来改变Cameo的视觉外观。尝试一些选项看看它们的样子，但请记住，这些应用于你的实时摄像头流，因此没有必要过度使用效果。
- en: There is also an **Alt Text** option ( **7** ) since the object is considered
    similar to videos. Make sure people using screen readers will know that it is
    the live feed of your camera or mark it as a decorative element, so screen readers
    avoid trying to describe the object.
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于对象被视为类似于视频，因此还有一个**替代文本**选项（**7**）。确保使用屏幕阅读器的人会知道这是你摄像头的实时流，或者将其标记为装饰性元素，这样屏幕阅读器就不会尝试描述该对象。
- en: The **Arrange** ( **8** ) and **Size** ( **9** ) groups have the same types
    of features available as when formatting pictures, shapes, or videos.
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**排列**（**8**）和**大小**（**9**）组具有与格式化图片、形状或视频时相同的可用功能。'
- en: If you want Cameo objects only on specific slides, start by making any desired
    formatting changes, and then copy and paste them onto other slides so that you
    don’t need to redo the formatting every time. It is also possible to be creative
    by using some slide transitions and animations that will move Cameo just where
    you want it on every slide. As you can see, in some instances, add ing Cameo will
    help improve audience engagement.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只想在特定的幻灯片上使用Cameo对象，首先进行任何所需的格式更改，然后将它们复制并粘贴到其他幻灯片上，这样你就不需要每次都重新进行格式设置。你也可以通过使用一些可以将Cameo移动到每个幻灯片上所需位置的幻灯片切换和动画来发挥创意。正如你所见，在某些情况下，添加Cameo将有助于提高观众的参与度。
- en: If there have been times when you wished you could easily use a screen capture
    or a short screen demo in your presentation, the next section is exactly what
    can help you do it right with in PowerPoint.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经希望能够在演示文稿中轻松地使用屏幕截图或简短的屏幕演示，下一节正是你可以帮助你在PowerPoint中正确完成这一点的部分。
- en: Inserting a screenshot or screen recording for a demo
  id: totrans-221
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 插入截图或屏幕录制进行演示
- en: 'Someti mes it is much easier to show an image of an application or website
    rather than trying to explain everything with words. That is when you should go
    to the **Insert** tab ( **1** ) to use the **Screenshot** feature ( **2** ) (
    *Figure 8.22* ):'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，展示一个应用程序或网站的图片比用文字解释一切要容易得多。这时，你应该转到**插入**选项卡（**1**）来使用**截图**功能（**2**）（*图8.22*）：
- en: '![Figure 8.22 – Using the Screenshot feature in PowerPoint](img/B32063_08_22.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![图8.22 – 在PowerPoint中使用截图功能](img/B32063_08_22.png)'
- en: Figure 8.22 – Using the Screenshot feature in PowerPoint
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.22 – 在PowerPoint中使用截图功能
- en: After clicking on the **Screenshot** button, the **Available Windows** section
    ( **3** ) shows you a list of all the active windows on your computer. If you
    take the time to open the exact application, document, or website you want to
    grab a capture from before you use the feature, inserting the capture is as simple
    as clicking on the preview you want to include on your slide.
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**截图**按钮后，**可用窗口**部分（**3**）会显示你电脑上所有活动的窗口。如果你在启用该功能之前花时间打开你想要抓取截图的确切应用程序、文档或网站，插入截图就像点击你想要包含在幻灯片上的预览一样简单。
- en: 'The **Screen Clipping** option ( **4** ) will allow you to grab a specific
    area with your mouse cursor. Here are the steps:'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**屏幕剪辑**选项（**4**）将允许你使用鼠标光标抓取特定区域。以下是步骤：'
- en: Open the window from where you want to grab a specific portion to include in
    PowerPoint and place the PowerPoint window on top o f it.
  id: totrans-227
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开你想要抓取特定部分以包含在PowerPoint中的窗口，并将PowerPoint窗口置于其上方。
- en: When you click on **Screen Clipping** , it reduces the PowerPoint window to
    show the next window behind it. Your mouse cursor becomes a plus sign ( **+**
    ), and the screen takes a semi-transparent white shade.
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你点击**屏幕截图**时，它将PowerPoint窗口缩小以显示其后的下一个窗口。你的鼠标光标变成一个加号（**+**），屏幕呈现半透明的白色阴影。
- en: Click and drag your mouse cursor over the area you want to select and let go.
  id: totrans-229
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击并拖动你的鼠标光标到你想要选择的区域，然后释放。
- en: The screen clipping is inserted on your slide.
  id: totrans-230
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 屏幕截图已插入到你的幻灯片中。
- en: Whether you inserted a whole window or a clipping, it then becomes easy to add
    annotations or callouts over them and even use animations to help direct the audience’s
    eyes toward the essential elements of your picture. The **Screenshot** feature
    might be lightweight compared to some screen capture applic ations, such as TechSmith’s
    Snagit, and even Windows’ Snipping Tool, but it can be a huge time saver if you
    only need to capture a few images.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你插入的是整个窗口还是截图，都很容易在上面添加注释或标注，甚至可以使用动画来帮助引导观众的视线聚焦于图片的关键元素。与一些屏幕捕获应用程序相比，如TechSmith的Snagit和Windows的截图工具，**截图**功能可能较为轻量，但如果只需要捕获几张图片，它仍然可以节省大量时间。
- en: 'When a still image is not enough, PowerPoint offers a screen recording feature
    too. When in the **Insert** tab ( **1** ), look for the **Screen Recording** button,
    or look for **Media** ( **2** ) on the far right of the ribbon ( *Figure 8.23*
    ):'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 当静态图像不足以表达时，PowerPoint也提供了屏幕录制功能。在**插入**选项卡（**1**）中，寻找**屏幕录制**按钮，或者在选项卡最右侧查找**媒体**（**2**）（*图8.23*）：
- en: "![Figure 8.23 – Finding the Screen Recording featur\uFEFFe](img/B32063_08_23.png)"
  id: totrans-233
  prefs: []
  type: TYPE_IMG
  zh: '![图8.23 – 查找屏幕录制功能](img/B32063_08_23.png)'
- en: Figure 8.23 – Finding the Screen Recording featur e
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.23 – 查找屏幕录制功能
- en: 'To prepare for your screen recording, you need to make sure the window you
    want to demo is right behind the PowerPoint window. As soon as you click on the
    **Screen Recording** button, the PowerPoint window is minimized, and a recording
    toolbar shows in the middle of the top portion of your screen ( **1** in *Figure
    8.24* ). In the example I created, you see a partial Microsoft Te ams window that
    could be used to demonstrate how to use channels:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 为了准备你的屏幕录制，你需要确保你想要演示的窗口位于PowerPoint窗口的后面。一旦你点击**屏幕录制**按钮，PowerPoint窗口将被最小化，一个录制工具栏将显示在你的屏幕顶部中央（*图8.24*中的**1**）。在我创建的示例中，你可以看到一个部分Microsoft
    Teams窗口，可以用来演示如何使用频道：
- en: "![Figure 8.24 – Using the Screen Record\uFEFFing feature](img/B32063_08_24.png)"
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![图8.24 – 使用屏幕录制功能](img/B32063_08_24.png)'
- en: Figure 8.24 – Using the Screen Record ing feature
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.24 – 使用屏幕录制功能
- en: The first thing you need to do is decide whether you want to use **Record Pointer**
    ( **2** ) and **Audio** ( **3** ). Those buttons are shaded/active by default,
    but you can click on either one to avoid recording sound or pointers.
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要做的第一件事是决定你是否想使用**记录指针**（**2**）和**音频**（**3**）。这些按钮默认情况下是阴影/激活状态，但你可以点击任何一个来避免录制声音或指针。
- en: Next, moving your mouse cursor around, you will see it looks like a plus sign
    ( **+** ), allowing you to click and drag over the area you want to capture. The
    recording area will have a dashed red outline ( **4** ). If you want to change
    your selection, click on the **Select Area** button ( **5** ) so the dashed outline
    disappears, allowing you to select a new area.
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，移动你的鼠标光标，你会看到它看起来像加号（**+**），允许你点击并拖动到你想要捕获的区域。录制区域将有一个虚线红色轮廓（**4**）。如果你想更改选择，点击**选择区域**按钮（**5**）以使虚线轮廓消失，允许你选择新的区域。
- en: 'Finally, you click on the **Record** button ( **6** ) to start recording. You
    will see a big countdown square with an important keyboard shortcut on it: *Windows
    key* + *Shift* + *Q* . This combination will allow you to stop recording without
    having to try to make the recording toolbar visible again by moving your mouse
    cursor to the top middle of your screen. There is a small pin icon ( **7** ) that
    keeps the toolbar visible for you to see the **Stop** button ( **8** ), but that
    means you will see the toolbar on your recording too; this is not a good option
    if you want to avoid editing the video. If you have two screens, prepare your
    content on your second screen so you can select it and avoid having the recording
    toolbar over it.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，你点击**记录**按钮（**6**）开始录制。你将看到一个带有重要快捷键的大倒计时方块：*Windows键* + *Shift* + *Q*。这个组合键将允许你在不需要再次尝试通过将鼠标光标移动到屏幕顶部中间来使录制工具栏可见的情况下停止录制。有一个小图钉图标（**7**）可以让你保持工具栏可见，以便看到**停止**按钮（**8**），但这意味着你也会在录制中看到工具栏；如果你不想编辑视频，这不是一个好的选项。如果你有两个屏幕，请在你的第二个屏幕上准备你的内容，这样你可以选择它并避免录制工具栏覆盖它。
- en: 'The **Record** button becomes a **Pause** button during the recording, but
    since it disappears when you have started recording, you would need to make it
    reappear and have the full toolbar in your recording too. Instead, if you want
    to pause the recording, use this keyboard shortcut: *Windows key* + *Sh ift* +
    *R* .'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在录制过程中，**记录**按钮变为**暂停**按钮，但由于它在开始录制后会消失，你需要让它重新出现，并在你的录制中也有完整的工具栏。相反，如果你想暂停录制，请使用这个快捷键：*Windows键*
    + *Shift* + *R*。
- en: As soon as you stop the recording, the video clip is inserted into your slide.
    It looks exactly like any video file with its playback options. It can also be
    formatted with the same tools discussed for v ideo formatting.
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦停止录制，视频片段就会插入到你的幻灯片中。它看起来就像任何视频文件一样，具有其播放选项。它也可以使用与视频格式相同的工具进行格式化。
- en: '**Try it yourself**'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: '**试试看**'
- en: The best way to get familiar with the **Screenshot** and **Screen Recording**
    tools is to try them out yourself, especially since showing manipulations in a
    book is not as complete as seeing a recorded demo. If you have not tried this
    while reading the steps, I suggest that you do so right now. It will make the
    steps clearer and easier to remember when you eventually need to use the features.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 要熟悉**截图**和**屏幕录制**工具的最佳方式是亲自尝试它们，尤其是由于在书中展示操作不如观看录制演示完整。如果你在阅读步骤时还没有尝试过，我建议你现在就试试。这将使步骤在你最终需要使用这些功能时更加清晰和容易记住。
- en: Now that you have learned how to insert a video into your presentation and create
    a quickly recorded demo from within PowerPoint, let’s move on to creating videos
    and GIFs in t he next section.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经学会了如何在演示文稿中插入视频并从PowerPoint内部快速录制演示，接下来让我们进入下一节，学习如何创建视频和GIF。
- en: Creating a video file or GIF from a p resentation
  id: totrans-246
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从演示文稿创建视频文件或GIF
- en: After creating your presentation, it might be a clever idea to reuse it in a
    video format that is easy to view on many platforms while helping protect your
    content against unwanted reuse by others. It could also be done so that you have
    a video clip to insert back into a presentation. As you can see, the possibilities
    are endless, and it is easy to create.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建你的演示文稿后，将其重新用于易于在许多平台上观看的视频格式，同时帮助保护你的内容免受他人不受欢迎的重复使用，这可能也是一个好主意，以便你可以有一个视频片段插入回演示文稿。正如你所看到的，可能性是无限的，而且很容易创建。
- en: Exporting a presentation as a video
  id: totrans-248
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将演示文稿导出为视频
- en: 'When you are done creating your presentat ion, or the small set of slides that
    you need to have a video for, you need to click on the **File** tab to v iew what
    is called the **Backstage** vi ew ( *Figure 8.25* ):'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 当你完成创建你的演示文稿，或者你需要视频的小幻灯片集时，你需要点击**文件**选项卡来查看所谓的**后台**视图（*图8.25*）：
- en: '![Figure 8.25 – PowerPoint’s Backstage view to create videos](img/B32063_08_25.png)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![图8.25 – PowerPoint创建视频的后台视图](img/B32063_08_25.png)'
- en: Figure 8.25 – PowerPoint’s Backstage view to create videos
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.25 – PowerPoint创建视频的后台视图
- en: First, click on the **Export** menu ( **1** ) on the left so that you have access
    to the **Export** pane ( **2** ).
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，点击左侧的**导出**菜单（**1**），以便访问**导出**面板（**2**）。
- en: Then, click on **Create a Video** ( **3** ) to access the settings. The export
    process will keep everything you have included in your presentations. If you are
    not familiar with animations and transitions, [*Chapter 9*](Chapter_09.xhtml#_idTextAnchor874)
    will be helpful.
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，点击**创建视频**（**3**）以访问设置。导出过程将保留您在演示文稿中包含的所有内容。如果您不熟悉动画和过渡，[*第9章*](Chapter_09.xhtml#_idTextAnchor874)将会有所帮助。
- en: 'Choose the video resolution ( **4** )—or in simple language, the quality of
    the video you want to produce. In the drop-down list, you will see the following:'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择视频分辨率（**4**）——用简单的话说，就是您想要生成的视频质量。在下拉列表中，您将看到以下选项：
- en: '**Ultra HD (4K)** ( **A** ): This is the highest quality and the largest file
    size. Unless you plan to play the video on a 4K device, you don’t need to export
    with this setting.'
  id: totrans-255
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超高清（4K）**（**A**）：这是最高质量和最大的文件大小。除非您计划在4K设备上播放视频，否则不需要使用此设置导出。'
- en: '**Full HD** **(1080p)** ( **B** ): This is a high-quality and large file size.
    This option meets the needs of most situations.'
  id: totrans-256
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全高清** **（1080p）**（**B**）：这是高质量和大文件大小。此选项满足大多数情况的需求。'
- en: '**HD (720p)** ( **C** ): This is of moderate quality and has a medium file
    size. It is the best setting if you want to add a video to a website. Using higher
    quality might impact the viewing experience on the web.'
  id: totrans-257
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高清（720p）**（**C**）：这是中等质量和中等文件大小。如果您想在网站上添加视频，这是最佳设置。使用更高质量可能会影响网页上的观看体验。'
- en: '**Standard (480p)** ( **D** ): This is the lowest quality and smallest file
    size. It should not be used unless file size is a maj or issue.'
  id: totrans-258
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标准（480p）**（**D**）：这是最低质量和最小的文件大小。除非文件大小是一个主要问题，否则不应使用。'
- en: If you do not have automatic transitions or narrations, the system will show
    the **Don’t Use Recorded Timings and Narrations** setting ( **5** ). If you do,
    it will be set to **Use Recorded Timings and Narrations** automatically.
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您没有自动过渡或旁白，系统将显示**不使用记录的时间和时间**设置（**5**）。如果您有，它将自动设置为**使用记录的时间和时间**。
- en: The number of **Seconds spent on each slide** ( **6** ) will be applied when
    you don’t have any recorded timings or narrations; the default is five seconds
    per slide. The time spent on a slide also depends on the number of animations
    you have on a slide, so if animations take longer than five seconds, the export
    will respect timing for animations despite this setting. When there is no animation,
    then this setting is applied.
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您没有记录任何时间或旁白时，**每张幻灯片花费的秒数**（**6**）将被应用；默认每张幻灯片为五秒。幻灯片上的时间也取决于幻灯片上的动画数量，因此如果动画超过五秒，导出将尊重动画的时间设置。如果没有动画，则应用此设置。
- en: When everything is set, click on the **Create Video** button ( **7** ) so that
    you have access to the **Export Video** window, allowing you to change the name
    and folder where the `.mp4` file will be saved.
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当一切设置就绪后，点击**创建视频**按钮（**7**），以便访问**导出视频**窗口，允许您更改保存`.mp4`文件的名称和文件夹。
- en: After the export is complete, you have a video file to share or insert back
    into your presentation. If you need a shorter media file, then you could create
    a GIF file from PowerPoint, the topic of t he following section.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 导出完成后，您将有一个视频文件可以分享或将其插入到您的演示文稿中。如果您需要一个更短的媒体文件，那么您可以从PowerPoint创建GIF文件，这是下一节的主题。
- en: Creating an animated GIF
  id: totrans-263
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建动画GIF
- en: Having short, looping v ideo clips has become a widespread practice in the content
    shared on social media. You could repurpose a few animated slides on your social
    media accounts, or as marketing material, if you export them as GIF files.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在社交媒体上共享短视频剪辑已成为一种普遍的做法。如果您将它们导出为GIF文件，您可以将一些动画幻灯片用于社交媒体账户或作为营销材料。
- en: 'To access this feature, you first need to click on the **File** tab to access
    the **Backstag e** view ( *Figure 8.26* ):'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问此功能，您首先需要点击**文件**标签以访问**后台**视图（*图8.26*）：
- en: "![Figure 8.26 – PowerPoint’s Backstage view to cre\uFEFFate GIFs](img/B32063_08_26.png)"
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![图8.26 – PowerPoint创建GIF的后台视图](img/B32063_08_26.png)'
- en: Figure 8.26 – PowerPoint’s Backstage view to cre ate GIFs
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.26 – PowerPoint创建GIF的后台视图
- en: First, click on the **Export** menu option ( **1** ) on the left so that you
    have access to the **Export** pane ( **2** ).
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，点击左侧的**导出**菜单选项（**1**），以便访问**导出**面板（**2**）。
- en: Then, click on **Create an Animated GIF** ( **3** ) to access the settings.
    The export process preserves animations, transitions, and any media included in
    the slides you choose.
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，点击**创建动画GIF**（**3**）以访问设置。导出过程保留动画、过渡以及你选择的幻灯片中的任何媒体。
- en: 'Choose the quality of the GIF file ( **4** ). The default setting is **Medium**
    , which suits the needs of many users, especially since animated GIFs are considered
    in the heavyweight category of animated files. In the drop-down list, you will
    see the following:'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择GIF文件的**质量**（**4**）。默认设置是**中等**，这适合许多用户的需求，特别是由于动画GIF被认为是动画文件的重型类别。在下拉列表中，你会看到以下选项：
- en: '**Extra Large** ( **A** ): This is the highest quality and the largest file
    size. If you absolutely need this level of quality, make sure you create the file
    with very few slides to avoid huge export times.'
  id: totrans-271
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超大**（**A**）：这是最高质量和最大文件大小的文件。如果你绝对需要这种质量级别，请确保用很少的幻灯片创建文件，以避免巨大的导出时间。'
- en: '**Large** ( **B** ): This is a high-quality and large file size.'
  id: totrans-272
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大**（**B**）：这是一个高质量和大文件大小的文件。'
- en: '**Medium** ( **C** ): This is of moderate quality and medium file size. It
    is the best setting if you want to easily use the files on most platforms.'
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**中等**（**C**）：这是中等质量和中等文件大小的文件。如果你想轻松地在大多数平台上使用文件，这是最佳设置。'
- en: '**Small** ( **D** ): This is the lowest quality and smallest file size. It
    should not be used unless file size is a major issue.'
  id: totrans-274
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**小**（**D**）：这是最低质量和最小文件大小的文件。除非文件大小是主要问题，否则不应使用。'
- en: You have a **Make background transparent** setting ( **5** ), which is valuable
    if you want only the slide content.
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你有一个**使背景透明**的设置（**5**），如果你只想保留幻灯片内容，这个设置非常有价值。
- en: The number of **Seconds spent on each slide** ( **6** ) allows you to decide
    how fast the animation will go.
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每张幻灯片上花费的**秒数**（**6**）允许你决定动画的速度。
- en: Select the number of consecutive slides you want to include in the file by entering
    their number in the first and second fields ( **7** ). Remember that the more
    slides you have, the larger the file will be. Keep in mind that GIF files are
    usually only a few seconds long, so there is no need to use many.
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过在第一和第二字段输入连续幻灯片的编号来选择你想要包含在文件中的幻灯片数量（**7**）。记住，幻灯片越多，文件就越大。记住，GIF文件通常只有几秒钟长，所以没有必要使用很多。
- en: The last thing to do is to click on the **Create GIF** button ( **8** ) so that
    you have access to the **Export Video** window, allowing you to change the name
    and folder where the `.gif` file will be saved.
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后一步是点击**创建GIF**按钮（**8**），这样你就可以访问**导出视频**窗口，允许你更改`.gif`文件保存的名称和文件夹。
- en: After the export is complete, you have an animated GIF file to share or insert
    back into your presentation. This can be a great way to share short snippets of
    your conte nt for more visibility.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 导出完成后，你将有一个动画GIF文件可以分享或将其插入到你的演示文稿中。这可以是一种分享内容片段以增加可见性的好方法。
- en: Summary
  id: totrans-280
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed how to add and modify multimedia elements such
    as videos, audio files, screenshots, and screen recordings, and export a file
    as a video or GIF that can then be inserted back into your presentation file.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了如何添加和修改多媒体元素，如视频、音频文件、屏幕截图和屏幕录制，并将文件导出为视频或GIF，然后可以将其插入到你的演示文稿文件中。
- en: You now have enough knowledge about the tools and features to start using more
    media elements in your presentations. When you think it will take a long time
    to create graphic elements to show a process or explain your idea clearly, stop
    and think about using other types of media that will help the audience understand
    your concept more quickly.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在对工具和功能有了足够的了解，可以开始在演示文稿中使用更多媒体元素。当你认为创建图形元素来展示流程或清晰地解释你的想法需要很长时间时，停下来思考使用其他类型的媒体，这将帮助观众更快地理解你的概念。
- en: We have added one more building block for more engaging and impactful presentations.
    Remember that even though there is a lot of creative content available in Microsoft’s
    **Stock Images** library, you can always create your own with your smartphone.
    But if your visuals are used in a big marketing campaign, then it might be wiser
    to hire professionals to create relevant videos.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为更吸引人和有影响力的演示文稿添加了一个新的构建块。记住，尽管在微软的**股票图片库**中有大量的创意内容，但你总是可以用你的智能手机创建自己的内容。但如果你的视觉元素用于大型营销活动，那么聘请专业人士创建相关视频可能更明智。
- en: In the next chapter, we will discuss how to use transitions and animations efficiently.
    You will learn how to create interesting visual effects that serve your message
    and how to use more advance d animation techniques.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论如何高效地使用过渡和动画。你将学习如何创建有趣的视觉效果，这些效果能够服务于你的信息，以及如何使用更高级的动画技术。
