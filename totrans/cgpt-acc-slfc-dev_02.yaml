- en: One note about the ChatGPT response – while it is correct and will work, it
    does not reflect the latest approach recommended by Salesforce. While ChatGPT
    accelerates Salesforce delivery, developers who know their way around Salesforce
    are still needed!
  prefs: []
  type: TYPE_NORMAL
- en: Setting up validation rules
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Salesforce validation rules play a crucial role in maintaining the integrity
    and accuracy of data within the Salesforce environment. These rules are set up
    to enforce specific criteria and conditions that must be met before a record can
    be saved. By defining expressions and formulas that evaluate the data being entered
    or modified, validation rules ensure that they adhere to the established business
    requirements and logic. For example, a validation rule might require that a discount
    percentage field on an opportunity record must fall within a specific range, or
    that a mandatory phone number field must follow a specific format. If the conditions
    are not met, a user-friendly error message can be displayed, guiding the user
    to correct the input. Through this mechanism, validation rules act as gatekeepers,
    promoting data quality, consistency, and compliance with organizational standards
    and processes.
  prefs: []
  type: TYPE_NORMAL
- en: Continuing with the user story that was introduced in the first example, the
    next user story requires a Relationship Manager to be selected when the contact
    is a VIP.
  prefs: []
  type: TYPE_NORMAL
- en: 'User story – *require a Relationship Manager when the contact is* *a VIP*:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal**: As a sales rep, I want contacts set as VIP to my organization to
    always have a Relationship Manager'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance criteria**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a sales rep has navigated to a Salesforce contact page'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the sales rep checks the **VIP** checkbox'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the **Relationship Manager** field can’t be blank'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ll use the same request – that is, Please provide detailed step-by-step directions
    to implement the following user story using Salesforce admin screens.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s build a ChatGPT prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Prompt** | Please provide detailed step-by-step directions to implement
    the following user story using Salesforce admin screens.User story – require a
    Relationship Manager when the contact is a VIP:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Goal**: As a sales rep, I want contacts set as VIP to my organization to
    always have a Relationship Manager'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acceptance criteria**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Given** a sales rep has navigated to a Salesforce contact page'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**When** the sales rep checks the **VIP** checkbox'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Then** the **Relationship Manager** field can’t be blank'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '|'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Response** | Certainly! Implementing the user story that requires a Relationship
    Manager to be assigned when the contact is marked as a VIP can be done through
    Salesforce validation rules. Here’s how to achieve this using Salesforce admin
    screens:1\. Log into Salesforce: Sign into the Salesforce instance with administrator
    credentials.2\. Navigate to Object Manager: Click on App Launcher (grid icon)
    and type “Object Manager.” Then, click Object Manager.3\. Select the Contact object:
    In Object Manager, find and click Contact.4\. Create a new validation rule: Click
    on Validation Rules in the left sidebar, then click the New button.5\. Define
    the validation rule:   a. Name the rule: Provide a name for the validation rule,
    such as Require_Relationship_Manager_for_VIP.   b. Enter the error condition formula:
    In the Formula text area, enter AND(ISPICKVAL(VIP__c, true), ISBLANK(Relationship_Manager__c)).
    Replace VIP__c and Relationship_Manager__c with the appropriate API names for
    your custom fields.   c. Set the error message: Define the error message that
    will be shown if the condition is met, such as the Relationship Manager must be
    selected for VIP Contacts.   d. Choose an error location: Decide where the error
    message will be displayed. You can choose the field that triggered the error or
    the top of the page. |'
  prefs: []
  type: TYPE_TB
- en: '|  | 6\. Save the validation rule: Click the Save button to save the validation
    rule.7\. Test the rule: Create or edit a Contact record, try to set it as a VIP
    without selecting a Relationship Manager, and confirm that the validation rule
    prevents the record from being saved and displays the appropriate error message.This
    step-by-step process ensures that when the VIP checkbox is checked, the Relationship
    Manager field must contain a value. If it doesn’t, the error message will be displayed,
    enforcing the required business logic within the Salesforce org. |'
  prefs: []
  type: TYPE_TB
- en: As with the custom fields example, ChatGPT can produce XML to be pasted directly
    into the Salesforce org.
  prefs: []
  type: TYPE_NORMAL
- en: Modifying page layouts
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Updating Salesforce Lightning pages involves a flexible and dynamic approach
    that enables organizations to tailor the user interface so that it meets specific
    business needs. Salesforce administrators or developers can utilize Lightning
    App Builder, a drag-and-drop tool, to add, remove, or rearrange components on
    a Lightning page. This allows for easily customizing layouts, integrating standard
    or custom components, and setting component attributes or visibility rules. Additionally,
    Lightning pages can be assigned to different apps, record types, or user profiles,
    ensuring a personalized user experience. Whether you’re creating brand new Lightning
    pages or modifying existing ones, this approach empowers teams to create engaging,
    efficient interfaces aligned with their organization’s processes and objectives.
  prefs: []
  type: TYPE_NORMAL
- en: Continuing to work with the **VIP** and **Relationship Manager** fields, let’s
    look at a user story to update the page layout used by sales reps.
  prefs: []
  type: TYPE_NORMAL
- en: 'User story – *Add VIP and Relationship Manager fields to a new tab called “VIP
    Mgmt” on the primary Salesforce Contact page layout used by* *sales reps*:'
  prefs: []
  type: TYPE_NORMAL
