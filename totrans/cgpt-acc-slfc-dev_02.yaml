- en: '| **Response** | Certainly! Here’s a step-by-step guide to creating a tabular
    report to list all VIP contacts in California for a sales rep within the Salesforce
    environment:1\. Navigate to the Reports tab: Log into Salesforce, click on App
    Launcher (grid icon), and then search for and select Reports.2\. Create a new
    report: Click on the New Report button.3\. Choose the report type: In the Choose
    Report Type dialogue box, select Contacts under the Standard Report Types section
    and then click Continue. |'
  id: totrans-171
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！以下是一个分步指南，用于在 Salesforce 环境中为销售代表创建一个列出加利福尼亚州所有 VIP 联系人的表格报告：1.
    导航到报告选项卡：登录 Salesforce，点击应用启动器（网格图标），然后搜索并选择报告。2. 创建一个新的报告：点击新建报告按钮。3. 选择报告类型：在“选择报告类型”对话框中，在标准报告类型部分下选择联系人，然后点击继续。
    |'
- en: '|  | 4\. Define the filters: You will need to add two filters to narrow down
    the results:   a. Click on Add Filter.   b. For the VIP contacts, select the VIP
    Customer field, choose the equals operator, and set the value to True.   c. Click
    on Add Filter again.   d. For the contacts in California, select the Mailing State/Province
    field, choose the equals operator, and set the value to California.5\. Select
    columns: Click on Columns and then select the specific fields you want to display
    in the report, such as First Name, Last Name, Email, VIP Customer, and Mailing
    State/Province.6\. Set the format: Since the report is tabular, ensure that the
    report format is set to Tabular.7\. Run the report: Click the Run button to view
    the report with the filtered data.8\. Save the report: If the report looks as
    expected, do the following:   a. Click on the Save button.   b. Enter the report
    name as VIP Contacts in California.   c. Choose a report folder where you want
    to save this report for future access.   d. Click Save again.9\. Share the report:
    If needed, set the appropriate sharing settings to allow access to other relevant
    users within the organization.10\. Customize further: If additional customization
    is needed, such as sorting or grouping, these options can be adjusted under the
    Outline tab.Now, the sales rep can navigate to the Reports tab and run the VIP
    Contacts in California report to see the desired information. The sales rep will
    see a report of all VIP contacts with a mailing address in California, aligning
    with the goal and acceptance criteria of the user story. |'
  id: totrans-172
  prefs: []
  type: TYPE_TB
  zh: '|  | 4. 定义筛选条件：您需要添加两个筛选条件来缩小结果范围：   a. 点击“添加筛选”。   b. 对于VIP联系人，选择“VIP客户”字段，选择等于运算符，并将值设置为True。   c.
    再次点击“添加筛选”。   d. 对于加利福尼亚州的联系人，选择“邮寄州/省”字段，选择等于运算符，并将值设置为加利福尼亚。5. 选择列：点击“列”，然后选择您想在报告中显示的具体字段，例如：名、姓、电子邮件、VIP客户和邮寄州/省。6.
    设置格式：由于报告是表格形式，请确保报告格式设置为表格格式。7. 运行报告：点击“运行”按钮查看带有筛选数据的报告。8. 保存报告：如果报告看起来符合预期，请执行以下操作：   a.
    点击“保存”按钮。   b. 输入报告名称为“加利福尼亚州的VIP联系人”。   c. 选择一个报告文件夹，以便将来访问此报告。   d. 再次点击“保存”。9.
    分享报告：如果需要，设置适当的共享设置，以便组织内其他相关用户可以访问。10. 进一步自定义：如果需要额外的自定义，例如排序或分组，这些选项可以在“大纲”选项卡下进行调整。现在，销售代表可以导航到“报告”选项卡并运行“加利福尼亚州的VIP联系人”报告，以查看所需信息。销售代表将看到所有在加利福尼亚州有邮寄地址的VIP联系人报告，符合用户故事的目标和验收标准。
