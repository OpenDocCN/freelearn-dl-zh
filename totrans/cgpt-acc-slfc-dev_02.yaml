- en: '|'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| **Response** | Certainly! Implementing the user story that requires a Relationship
    Manager to be assigned when the contact is marked as a VIP can be done through
    Salesforce validation rules. Here’s how to achieve this using Salesforce admin
    screens:1\. Log into Salesforce: Sign into the Salesforce instance with administrator
    credentials.2\. Navigate to Object Manager: Click on App Launcher (grid icon)
    and type “Object Manager.” Then, click Object Manager.3\. Select the Contact object:
    In Object Manager, find and click Contact.4\. Create a new validation rule: Click
    on Validation Rules in the left sidebar, then click the New button.5\. Define
    the validation rule:   a. Name the rule: Provide a name for the validation rule,
    such as Require_Relationship_Manager_for_VIP.   b. Enter the error condition formula:
    In the Formula text area, enter AND(ISPICKVAL(VIP__c, true), ISBLANK(Relationship_Manager__c)).
    Replace VIP__c and Relationship_Manager__c with the appropriate API names for
    your custom fields.   c. Set the error message: Define the error message that
    will be shown if the condition is met, such as the Relationship Manager must be
    selected for VIP Contacts.   d. Choose an error location: Decide where the error
    message will be displayed. You can choose the field that triggered the error or
    the top of the page. |'
  id: totrans-117
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！当联系人为 VIP 时需要分配关系经理的用户故事可以通过 Salesforce 验证规则来实现。以下是使用 Salesforce
    管理屏幕实现此功能的方法：1. 登录 Salesforce：使用管理员凭据登录 Salesforce 实例。2. 导航到对象管理器：点击应用启动器（网格图标）并输入“对象管理器”。然后，点击对象管理器。3.
    选择联系对象：在对象管理器中找到并点击联系。4. 创建一个新的验证规则：在左侧侧边栏中点击验证规则，然后点击新建按钮。5. 定义验证规则：   a. 命名规则：为验证规则提供一个名称，例如
    Require_Relationship_Manager_for_VIP。   b. 输入错误条件公式：在公式文本区域中输入 AND(ISPICKVAL(VIP__c,
    true), ISBLANK(Relationship_Manager__c))。将 VIP__c 和 Relationship_Manager__c 替换为您的自定义字段的适当
    API 名称。   c. 设置错误消息：定义当条件满足时将显示的错误消息，例如 VIP 联系人必须选择关系经理。   d. 选择错误位置：决定错误消息将显示的位置。您可以选择触发错误的字段或页面顶部。|'
- en: '|  | 6\. Save the validation rule: Click the Save button to save the validation
    rule.7\. Test the rule: Create or edit a Contact record, try to set it as a VIP
    without selecting a Relationship Manager, and confirm that the validation rule
    prevents the record from being saved and displays the appropriate error message.This
    step-by-step process ensures that when the VIP checkbox is checked, the Relationship
    Manager field must contain a value. If it doesn’t, the error message will be displayed,
    enforcing the required business logic within the Salesforce org. |'
  id: totrans-118
  prefs: []
  type: TYPE_TB
  zh: '|  | 6. 保存验证规则：点击保存按钮以保存验证规则。7. 测试规则：创建或编辑联系人记录，尝试将其设置为 VIP 而不选择关系经理，并确认验证规则阻止记录保存并显示适当的错误消息。此分步过程确保当
    VIP 复选框被选中时，关系经理字段必须包含一个值。如果没有，将显示错误消息，强制执行 Salesforce org 内的所需业务逻辑。|'
- en: As with the custom fields example, ChatGPT can produce XML to be pasted directly
    into the Salesforce org.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 与自定义字段示例类似，ChatGPT 可以生成可以直接粘贴到 Salesforce org 的 XML。
- en: Modifying page layouts
  id: totrans-120
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 修改页面布局
- en: Updating Salesforce Lightning pages involves a flexible and dynamic approach
    that enables organizations to tailor the user interface so that it meets specific
    business needs. Salesforce administrators or developers can utilize Lightning
    App Builder, a drag-and-drop tool, to add, remove, or rearrange components on
    a Lightning page. This allows for easily customizing layouts, integrating standard
    or custom components, and setting component attributes or visibility rules. Additionally,
    Lightning pages can be assigned to different apps, record types, or user profiles,
    ensuring a personalized user experience. Whether you’re creating brand new Lightning
    pages or modifying existing ones, this approach empowers teams to create engaging,
    efficient interfaces aligned with their organization’s processes and objectives.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 更新 Salesforce Lightning 页面涉及一种灵活且动态的方法，使组织能够定制用户界面，以满足特定的业务需求。Salesforce 管理员或开发者可以利用
    Lightning App Builder，一个拖放工具，在 Lightning 页面上添加、删除或重新排列组件。这允许轻松自定义布局、集成标准或自定义组件，并设置组件属性或可见性规则。此外，Lightning
    页面可以分配给不同的应用程序、记录类型或用户配置文件，确保个性化的用户体验。无论您是创建全新的 Lightning 页面还是修改现有的页面，这种方法都赋予团队创建与组织流程和目标一致的有吸引力、高效的界面的能力。
- en: Continuing to work with the **VIP** and **Relationship Manager** fields, let’s
    look at a user story to update the page layout used by sales reps.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 继续使用**VIP 管理员**和**关系经理**字段，让我们看看一个用于更新销售代表使用的页面布局的用户故事。
- en: 'User story – *Add VIP and Relationship Manager fields to a new tab called “VIP
    Mgmt” on the primary Salesforce Contact page layout used by* *sales reps*:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 用户故事——*将“VIP 管理员”字段添加到名为“VIP 管理员”的新标签页中，该标签页位于销售代表使用的 Salesforce 联系人页面布局中*：
- en: '**Goal**: As a sales rep, I want a tab called **VIP Mgmt** on the Contact page
    layout I use'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为一名销售代表，我希望在我的联系人页面布局中有一个名为**VIP 管理员**的标签页'
- en: '**Acceptance criteria**:'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验收标准**：'
- en: '**Given** a sales rep has navigated to a Salesforce contact page'
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**销售代表已导航到 Salesforce 联系人页面'
- en: '**When** the page is loaded'
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**页面加载时'
- en: '**Then** the sales rep can click on a **VIP** **Mgmt** tab'
  id: totrans-128
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后**销售代表可以点击一个**VIP 管理员**标签页'
- en: '**And** the sales rep can view **VIP**, which is a checkbox field'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并且**销售代表可以查看**VIP**，这是一个复选框字段'
- en: '**And** the sales rep can view **Relationship Manager**, which is a lookup
    to the User object'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并且**销售代表可以查看**关系经理**，这是一个指向用户对象的查找'
- en: We’ll use the same request – that is, Please provide detailed step-by-step directions
    to implement the following user story using Salesforce admin screens.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用相同的请求——即，请提供详细的分步指南，说明如何使用 Salesforce 管理员屏幕实现以下用户故事。
- en: 'Let’s build a ChatGPT prompt:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个 ChatGPT 提示：
- en: '| **Prompt** | Please provide detailed step-by-step directions to implement
    the following user story using Salesforce admin screens.User story – Add VIP and
    Relationship Manager fields to a new tab called “VIP Mgmt” on the primary Salesforce
    Contact page layout used by sales reps:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '| **提示** | 请提供详细的分步指南，说明如何使用 Salesforce 管理员屏幕实现以下用户故事。用户故事——将“VIP 管理员”字段添加到名为“VIP
    管理员”的新标签页中，该标签页位于销售代表使用的 Salesforce 联系人页面布局中：'
- en: '**Goal:** As a sales rep, I want a tab  called **VIP Mgmt** on the Contact
    page layout I use'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为一名销售代表，我希望在我的联系人页面布局中有一个名为**VIP 管理员**的标签页'
- en: '**Acceptance criteria**:'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验收标准**：'
- en: '**Given** a sales rep has navigated to a Salesforce contact page'
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**销售代表已导航到 Salesforce 联系人页面'
- en: '**When** the page is loaded'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**页面加载时'
- en: '**Then** the sales rep can click on the **VIP** **Mgmt** tab'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后**销售代表可以点击**VIP 管理员**标签页'
- en: '**And** the sales rep can view **VIP**, which is a checkbox field'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并且**销售代表可以查看**VIP**，这是一个复选框字段'
- en: '**And** the sales rep can view **Relationship Manager**, which is a lookup
    to the User object'
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并且**销售代表可以查看**关系经理**，这是一个指向用户对象的查找'
- en: '|'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| **Response** | Certainly! Here’s how you can implement the user story by
    adding the VIP and Relationship Manager fields to a new tab called VIP Mgmt on
    the primary Salesforce Contact page layout used by sales reps:1\. Log into Salesforce:
    Log into your Salesforce org with an administrator account.2\. Navigate to Object
    Manager: From the Setup area, navigate to Object Manager and then click Contact.3\.
    Go to Page Layouts: Under the Contact object, click Page Layouts.4\. Select the
    appropriate layout: Choose the page layout that’s used by the sales reps (for
    example, Contact Layout).5\. Edit the layout: Click on the Edit action for the
    selected layout.6\. Create a new section: In the page editor, create a new section
    by dragging the Section component onto the layout. You can label this section
    VIP Mgmt.7\. Add the fields:   a. Drag the VIP checkbox field into the VIP Mgmt
    section.   b. Drag the Relationship Manager lookup field (to the User object)
    into the VIP Mgmt section. |'
  id: totrans-142
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然可以！以下是您可以通过将 VIP 和关系管理字段添加到名为“VIP 管理”的新标签页来实现用户故事的步骤，该标签页用于销售代表使用的
    Salesforce 联系人主页面布局：1. 登录 Salesforce：使用管理员账户登录您的 Salesforce 组织。2. 导航到对象管理器：从设置区域导航到对象管理器，然后点击“联系人”。3.
    前往页面布局：在“联系人”对象下，点击“页面布局”。4. 选择适当的布局：选择销售代表使用的页面布局（例如，“联系人布局”）。5. 编辑布局：点击所选布局的“编辑”操作。6.
    创建一个新部分：在页面编辑器中，通过将部分组件拖动到布局上创建一个新部分。您可以为此部分命名“VIP 管理”。7. 添加字段：   a. 将 VIP 复选框字段拖动到“VIP
    管理”部分中。   b. 将关系管理者查找字段（到用户对象）拖动到“VIP 管理”部分中。 |'
- en: '|  | 8\. Create a new tab: Within the page layout editor, find the tab area
    and select New to create a new tab. Name this tab VIP Mgmt.9\. Move the section
    to the tab: Drag the VIP Mgmt section into the VIP Mgmt tab.10\. Adjust permissions:
    Ensure that the appropriate profiles or permission sets (for example, sales reps)
    have the necessary read and edit permissions for these fields.11\. Save the layout:
    Click Save to apply the changes to the layout.12\. Verify the changes: Log in
    as a sales rep (or use the Login As feature) and navigate to a contact record
    to verify that the new VIP Mgmt tab appears and that the VIP and Relationship
    Manager fields are correctly displayed within that tab.By following these steps,
    sales reps can now easily manage VIP contacts and their Relationship Managers
    within a dedicated tab on the Contact page, aligning with the user story’s requirements.
    |'
  id: totrans-143
  prefs: []
  type: TYPE_TB
  zh: '|  | 8. 创建一个新标签页：在页面布局编辑器中，找到标签区域并选择“新建”以创建一个新标签页。将此标签页命名为“VIP 管理”。9. 将部分移动到标签页：将“VIP
    管理”部分拖动到“VIP 管理”标签页中。10. 调整权限：确保适当的配置文件或权限集（例如，销售代表）拥有这些字段的必要读取和编辑权限。11. 保存布局：点击“保存”以将更改应用到布局。12.
    验证更改：以销售代表的身份登录（或使用“登录为”功能）并导航到联系记录以验证新“VIP 管理”标签页是否出现，以及 VIP 和关系管理字段是否在该标签页中正确显示。通过遵循这些步骤，销售代表现在可以轻松地在联系页面上的专用标签中管理
    VIP 联系人和他们的关系管理者，符合用户故事的要求。 |'
- en: '*Step 10* says “Ensure that the appropriate profiles or permission sets (for
    example, sales reps) have the necessary read and edit permissions for these fields.”
    ChatGPT can explain how to do this. In the same chat thread, ChatGPT is contextual
    and “remembers” the previous prompts and responses so that the whole question
    does not have to be re-asked:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '*步骤 10* 表示“确保适当的配置文件或权限集（例如，销售代表）拥有这些字段的必要读取和编辑权限。”ChatGPT 可以解释如何完成这项操作。在同一个聊天线程中，ChatGPT
    会根据上下文“记住”之前的提示和响应，这样就不必重新提出整个问题：'
- en: '| **Prompt** | Please expand “Step 10\. Adjust Permission” and provide step-by-step
    directions for giving the Sales Rep profile read and edit permissions on the VIP
    and Relationship Manager fields. |'
  id: totrans-145
  prefs: []
  type: TYPE_TB
  zh: '| **提示** | 请扩展“步骤 10. 调整权限”并提供逐步指导，说明如何为销售代表在 VIP 和关系管理字段上提供读取和编辑权限。 |'
- en: '| **Response** | Certainly! Expanding on Step 10, here’s a detailed guide to
    providing the Sales Rep profile with read and edit permissions on the VIP and
    Relationship Manager fields:10\. Adjust permissions for the Sales Rep profile:    a.
    Navigate to Profiles: From the Setup area, search for Profiles in the Quick Find
    box and click on Profiles.    b. Select the Sales Rep profile: Scroll through
    the list or search for the Sales Rep profile, then click on it to view its details.    c.
    Access the Contact object’s permissions: In the profile details page, scroll down
    to the Field-Level Security section and find the Contact object. Click on View
    next to the Contact object.    d. Edit field permissions: Click on the Edit button
    to modify the field permissions.    e. Find the VIP field: Scroll through the
    list of fields until you find the VIP custom field. |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！在步骤10的基础上扩展，以下是为销售代表配置文件提供VIP和关系经理字段读取和编辑权限的详细指南：10. 调整销售代表配置文件的权限：    a.
    导航到配置文件：从设置区域，在快速查找框中搜索配置文件，然后单击配置文件。    b. 选择销售代表配置文件：滚动列表或搜索销售代表配置文件，然后单击它以查看其详细信息。    c.
    访问联系人对象的权限：在配置文件详细信息页面上，向下滚动到字段级安全部分并找到联系人对象。单击联系人对象旁边的“查看”。    d. 编辑字段权限：单击“编辑”按钮以修改字段权限。    e.
    查找VIP字段：在字段列表中滚动，直到找到VIP自定义字段。 |'
- en: '|  |     f. Set read and edit permissions for VIP: Check the boxes in the Read
    Access and Edit Access columns next to the VIP field.    g. Find the Relationship
    Manager field: Continue scrolling to find the Relationship Manager custom field.    h.
    Set read and edit permissions for Relationship Manager: Check the boxes in the
    Read Access and Edit Access columns next to the Relationship Manager field.    i.
    Save your changes: Click on the Save button to apply the changes to the profile.By
    carefully following these steps, you will ensure that the Sales Rep profile has
    the required read and edit permissions for both the VIP and Relationship Manager
    fields, aligning the Salesforce Contact object with the specified requirements
    of the user story. This grants sales reps the ability to view and modify these
    fields as needed, facilitating the management of VIP contacts. |'
  id: totrans-147
  prefs: []
  type: TYPE_TB
  zh: '|  |   f. 为VIP设置读取和编辑权限：在VIP字段旁边的“读取访问”和“编辑访问”列中勾选复选框。    g. 查找关系经理字段：继续滚动以找到关系经理自定义字段。    h.
    为关系经理设置读取和编辑权限：在关系经理字段旁边的“读取访问”和“编辑访问”列中勾选复选框。    i. 保存您的更改：单击“保存”按钮以将更改应用到配置文件。通过仔细遵循这些步骤，您将确保销售代表配置文件对VIP和关系经理字段具有所需的读取和编辑权限，使Salesforce联系人对象与用户故事中指定的要求保持一致。这赋予销售代表查看和修改这些字段的能力，从而便于管理VIP联系人。
    |'
- en: Creating a report
  id: totrans-148
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建报告
- en: Salesforce reports provide an essential means to analyze, visualize, and share
    data within the organization. These configurable tools allow users to extract,
    filter, and present data in various formats, such as tables, charts, and dashboards,
    depending on the business requirements.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce报告提供了一种分析、可视化和在组织内共享数据的基本手段。这些可配置的工具允许用户根据业务需求以各种格式提取、筛选和展示数据，例如表格、图表和仪表板。
- en: Salesforce offers different types of reports, such as Tabular, Summary, Matrix,
    and Joined, all of which cater to different visualization needs. Users can choose
    the type that best represents the data they want to analyze. Furthermore, users
    can create custom reports by selecting specific objects, fields, filters, and
    criteria, allowing for the segmentation and aggregation of data as per unique
    business needs.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce提供不同类型的报告，如表格、摘要、矩阵和连接报告，这些报告满足不同的可视化需求。用户可以选择最能代表他们想要分析的数据类型的报告。此外，用户可以通过选择特定的对象、字段、筛选器和标准来创建自定义报告，从而根据独特的业务需求对数据进行细分和汇总。
- en: These reports can also be embedded in dashboards to provide a comprehensive
    view of key performance indicators (KPIs) and metrics at a glance. They can be
    scheduled to run at specific intervals and sent to designated stakeholders, ensuring
    timely dissemination of information. With the appropriate permissions, users can
    collaborate on reports, sharing insights and annotations. Security settings ensure
    that sensitive information is accessible only to authorized users.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 这些报告也可以嵌入到仪表板中，以提供关键绩效指标（KPIs）和度量标准的一览视图。它们可以安排在特定的时间间隔运行，并发送给指定的利益相关者，确保信息的及时传达。具有适当权限的用户可以共同协作报告，分享见解和注释。安全设置确保敏感信息只能由授权用户访问。
- en: Salesforce reports offer real-time insights, enabling decision-makers to respond
    quickly to trends, opportunities, or challenges. Different departments such as
    Sales, Marketing, Finance, and Customer Support utilize Salesforce reports to
    track progress, measure success, identify areas for improvement, and make informed
    decisions.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce 报告提供实时洞察，使决策者能够快速响应趋势、机会或挑战。不同的部门，如销售、营销、财务和客户支持，利用 Salesforce 报告来跟踪进度、衡量成功、确定改进领域并做出明智的决策。
- en: Salesforce reports translate complex data into comprehensible insights to facilitate
    the strategic alignment of business operations and goals. Whether for monitoring
    sales performance, analyzing marketing campaign effectiveness, tracking customer
    satisfaction, or other business aspects, Salesforce reports play a vital role
    in empowering organizations to leverage their data intelligently.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce 报告将复杂的数据转化为可理解的洞察，以促进业务运营和目标的战略对齐。无论用于监控销售业绩、分析营销活动效果、跟踪客户满意度，还是其他业务方面，Salesforce
    报告在帮助组织智能地利用数据方面发挥着至关重要的作用。
- en: An entire book called *Using ChatGPT for Salesforce Reports* could be written
    on this topic. For this section of this chapter, a prompt will be written to create
    a report to list the contacts who have the **VIP** checkbox checked and whose
    mailing address is in California.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
