- en: In addressing the user story, the guidance provided by ChatGPT caters to developers
    of varying skill levels, creating a bridge between the novice and the experienced.
    For those who are just getting started with Salesforce development, the response
    initially provided a clear step-by-step process that navigated the Salesforce
    admin screens. This approach was designed to make the implementation as accessible
    as possible for newcomers. Conversely, for the more seasoned developers who have
    a “hardcore gets under the covers” approach, the guidance shifted to delivering
    the Salesforce metadata XML code. This format allowed for more nuanced and customized
    control over the configuration, catering to those who prefer working directly
    with metadata and utilizing tools such as Visual Studio Code. By providing these
    different methodologies, ChatGPT demonstrates the capacity to offer solutions
    that align with both the simplicity sought by newcomers and the intricacy desired
    by seasoned professionals, nurturing growth and efficiency in the Salesforce development
    process.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决用户故事时，ChatGPT 提供的指导针对不同技能水平的开发者，在新手和经验丰富者之间架起了一座桥梁。对于刚开始接触 Salesforce 开发的用户，最初提供的响应提供了一个清晰的分步过程，导航
    Salesforce 管理屏幕。这种方法旨在使实施对新手尽可能容易。相反，对于有“硬核深入底层”方法的资深开发者，指导转向提供 Salesforce 元数据
    XML 代码。这种格式允许对配置进行更细致和定制的控制，满足那些喜欢直接与元数据工作并使用 Visual Studio Code 等工具的人。通过提供这些不同的方法，ChatGPT
    展示了提供符合新手所寻求的简单性和资深专业人士所期望的复杂性的解决方案的能力，从而在 Salesforce 开发过程中促进增长和效率。
- en: One note about the ChatGPT response – while it is correct and will work, it
    does not reflect the latest approach recommended by Salesforce. While ChatGPT
    accelerates Salesforce delivery, developers who know their way around Salesforce
    are still needed!
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 ChatGPT 响应的一个注意事项——虽然它是正确的并且可以工作，但它并不反映 Salesforce 推荐的最新方法。虽然 ChatGPT 加速了
    Salesforce 的交付，但仍然需要了解 Salesforce 的开发者！
- en: Setting up validation rules
  id: totrans-99
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设置验证规则
- en: Salesforce validation rules play a crucial role in maintaining the integrity
    and accuracy of data within the Salesforce environment. These rules are set up
    to enforce specific criteria and conditions that must be met before a record can
    be saved. By defining expressions and formulas that evaluate the data being entered
    or modified, validation rules ensure that they adhere to the established business
    requirements and logic. For example, a validation rule might require that a discount
    percentage field on an opportunity record must fall within a specific range, or
    that a mandatory phone number field must follow a specific format. If the conditions
    are not met, a user-friendly error message can be displayed, guiding the user
    to correct the input. Through this mechanism, validation rules act as gatekeepers,
    promoting data quality, consistency, and compliance with organizational standards
    and processes.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce 验证规则在维护 Salesforce 环境中的数据完整性和准确性方面发挥着关键作用。这些规则被设置为强制执行在记录可以保存之前必须满足的特定标准和条件。通过定义评估正在输入或修改的数据的表达式和公式，验证规则确保它们符合既定的业务需求和逻辑。例如，验证规则可能要求机会记录上的折扣百分比字段必须在一个特定的范围内，或者强制性的电话号码字段必须遵循特定的格式。如果条件不满足，可以显示一个用户友好的错误消息，引导用户更正输入。通过这种机制，验证规则充当守门人，促进数据质量、一致性和符合组织标准和流程。
- en: Continuing with the user story that was introduced in the first example, the
    next user story requires a Relationship Manager to be selected when the contact
    is a VIP.
  id: totrans-101
