  type: TYPE_NORMAL
  zh: '**给定**销售代表已导航到 Salesforce 联系人页面'
- en: '**When** the sales rep checks the **VIP** checkbox'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**销售代表勾选 **VIP** 复选框'
