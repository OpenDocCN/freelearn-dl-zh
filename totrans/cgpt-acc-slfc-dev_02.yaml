- en: Using ChatGPT for Salesforce Configuration
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行Salesforce配置
- en: 'Salesforce, since its inception in the late 1990s, has been guided by a unique
    vision: “clicks, not code.” This philosophy has been at the core of their business
    model and product development strategy, reflecting a conscious effort to provide
    solutions that address most business needs through configuration rather than customization.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 自20世纪90年代末Salesforce成立以来，其一直遵循一个独特的愿景：“点击而非代码”。这一理念一直是其商业模式和产品开发策略的核心，反映了有意识地提供解决方案，通过配置而不是定制来满足大多数业务需求。
- en: The underlying idea of “clicks, not code” is to empower businesses, even those
    with minimal technical expertise, to harness the power of Salesforce’s suite of
    products without having to write custom code. Through its various declarative
    tools, Salesforce allows users to define process flows, create custom objects,
    set validation rules, and manage permissions, all through a user-friendly interface.
    This approach opens up opportunities for a broader range of individuals within
    an organization, such as administrators and business analysts, to actively participate
    in the configuration and management of the system.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: “点击而非代码”这一理念的核心是赋予企业，即使是那些技术知识有限的企业，利用Salesforce产品套件的力量，而无需编写自定义代码。通过其各种声明性工具，Salesforce允许用户定义流程，创建自定义对象，设置验证规则，并管理权限，所有这些都可以通过一个用户友好的界面完成。这种方法为组织内更广泛的个人，如管理员和业务分析师，提供了积极参与系统配置和管理的机会。
- en: Over the past two and a half decades, Salesforce has heavily invested in building
    features that align with this vision. They have expanded their platform to encompass
    various aspects of customer relationship management (CRM), sales, marketing, and
    more, all while focusing on tools that enable end users to tailor the system to
    their needs without writing code. The extensive AppExchange marketplace is a testament
    to this approach, offering a wide array of plug-and-play solutions that further
    reduce the need for custom development.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去二十五年半的时间里，Salesforce大力投资于构建与这一愿景相符的功能。他们扩展了平台，涵盖了客户关系管理（CRM）、销售、营销等多个方面，同时专注于使最终用户能够通过配置而不是编写代码来定制系统。广泛的AppExchange市场证明了这一方法，提供了广泛的即插即用解决方案，进一步减少了自定义开发的需求。
- en: However, it’s essential to recognize that Salesforce’s dedication to “clicks,
    not code” doesn’t entirely negate the role of custom coding. More complex requirements
    and integrations might still necessitate the involvement of developers and the
    use of languages such as Apex and Lightning Web Components. Yet, this coexistence
    of declarative and programmatic tools within the Salesforce ecosystem speaks to
    a nuanced approach, where the primary emphasis remains on enabling users to achieve
    as much as possible through configuration.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，必须认识到Salesforce对“点击而非代码”的承诺并不完全否定自定义编码的作用。更复杂的需求和集成可能仍然需要开发者的参与和使用如Apex和Lightning
    Web Components等语言。然而，在Salesforce生态系统中声明性和程序性工具的共存反映了微妙的处理方式，其中主要重点是使用户尽可能通过配置来实现目标。
- en: By continuously nurturing this philosophy, Salesforce has created a versatile
    platform that can cater to a diverse set of business requirements, ranging from
    simple configurations to sophisticated customizations. The ongoing commitment
    to “clicks, not code” stands as a symbol of Salesforce’s dedication to user empowerment
    and innovation, paving the way for more inclusive, efficient, and flexible solutions.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 通过不断培养这一理念，Salesforce创建了一个灵活的平台，可以满足各种不同的业务需求，从简单的配置到复杂的定制。对“点击而非代码”的持续承诺是Salesforce致力于用户赋权和创新的象征，为更包容、高效和灵活的解决方案铺平了道路。
- en: The basics of Salesforce configuration
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Salesforce配置的基本知识
- en: Across the Salesforce ecosystem, there are tens of thousands of possible configuration
    changes. This chapter will not attempt to explain all of these changes. Rather,
    the intent is to show the different ways ChatGPT can be used to understand and
    make configuration changes. All configuration changes will be addressed through
    Salesforce admin screens, with a smaller number also performed by editing Salesforce
    XML.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在Salesforce生态系统中，有数以万计的可能配置更改。本章不会尝试解释所有这些更改。相反，目的是展示ChatGPT可以用来理解和进行配置更改的不同方式。所有配置更改将通过Salesforce管理员界面进行，其中一小部分也将通过编辑Salesforce
    XML来完成。
- en: 'Here is a list of five common configuration changes that administrators and
    developers often make to Salesforce to tailor the platform according to specific
    business needs:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这里列出了管理员和开发人员通常对 Salesforce 进行配置以适应特定业务需求的五个常见配置更改：
- en: '**Creating custom fields and objects**: To capture unique data requirements,
    administrators and developers create custom fields within standard objects or
    even design entirely new custom objects.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建自定义字段和对象**：为了捕捉独特的数据需求，管理员和开发人员会在标准对象内创建自定义字段，甚至设计全新的自定义对象。'
- en: '**Setting up validation rules**: Validation rules are used to ensure data integrity
    by defining specific criteria that must be met before a record can be saved.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设置验证规则**：验证规则用于通过定义在记录可以保存之前必须满足的特定标准来确保数据完整性。'
- en: '**Modifying page layouts**: Modifying page layouts helps in presenting the
    most relevant information to different user profiles in a way that aligns with
    their roles and responsibilities.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**修改页面布局**：修改页面布局有助于以符合用户角色和责任的方式向不同用户配置文件展示最相关的信息。'
- en: '**Creating a report**: Creating custom reports provides tailored insights and
    analytics that match the specific needs and KPIs of the organization.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建报告**：创建自定义报告提供了符合组织特定需求和关键绩效指标（KPIs）的定制洞察和分析。'
- en: '**Setting up approval processes**: Approval processes are used to automate
    the routing of records through various approval steps, mirroring a company’s specific
    approval hierarchy and rules.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设置审批流程**：审批流程用于自动化记录通过各种审批步骤的路线，反映了公司特定的审批层次和规则。'
- en: These common configuration changes demonstrate the flexibility of the Salesforce
    platform and its ability to be updated to meet diverse and evolving business requirements.
    The combination of these functionalities enables organizations to craft a CRM
    system that aligns closely with their unique processes and objectives.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这些常见的配置更改展示了 Salesforce 平台的灵活性及其满足多样化且不断发展的业务需求的能力。这些功能的组合使得组织能够构建一个与他们的独特流程和目标紧密一致的客户关系管理系统（CRM）。
- en: User stories serve as a critical bridge in translating business requirements
    into technical solutions, especially within the context of Salesforce configuration.
    They encapsulate the needs and desires of the end-users in a concise and understandable
    format, often structured around the perspective of a specific user role and what
    they hope to accomplish. This standardized communication tool enables a clear
    and focused dialogue between business stakeholders and developers. By defining
    the “who,” “what,” and “why” of a requirement, user stories lay the groundwork
    for creating configuration changes that align with the business’s goals. In this
    chapter, we will utilize user stories as the basis for defining and explaining
    various configuration examples, leveraging them as a practical framework that
    resonates with both the technical and non-technical audience, and ensuring that
    the configuration changes are centered on delivering real value to the users.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 用户故事在将业务需求转化为技术解决方案中扮演着至关重要的桥梁作用，尤其是在 Salesforce 配置的背景下。它们以简洁易懂的格式封装了最终用户的需要和愿望，通常围绕特定用户角色的视角以及他们希望实现的目标来构建。这个标准化的沟通工具使得业务利益相关者和开发者之间能够进行清晰和专注的对话。通过定义需求的“谁”、“什么”和“为什么”，用户故事为创建与业务目标一致的配置更改奠定了基础。在本章中，我们将利用用户故事作为定义和解释各种配置示例的基础，利用它们作为一个既与技术又与非技术受众产生共鸣的实用框架，并确保配置更改以向用户提供真实价值为中心。
- en: Creating custom fields and objects
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建自定义字段和对象
- en: 'Salesforce objects and fields are fundamental building blocks within the Salesforce
    platform, forming the core structure for storing and organizing data. Objects
    in Salesforce are akin to tables in a database; they serve as containers for data
    and are categorized into two types: standard objects and custom objects. Standard
    objects are pre-defined by Salesforce, such as Accounts, Contacts, or Opportunities,
    and are common across most Salesforce implementations, reflecting common business
    entities. Custom objects, on the other hand, are user-defined and tailored to
    specific business needs, allowing organizations to store information unique to
    their processes. Within these objects, fields represent individual data points,
    similar to columns in a database table. Fields can hold various types of data,
    such as text, numbers, dates, or even relationships to other objects (lookup or
    master-detail relationships). This structure enables users to capture a wide range
    of business-specific information, making Salesforce a highly customizable and
    flexible platform for managing diverse business processes and relationships. The
    meticulous design of objects and fields in Salesforce allows for detailed data
    modeling, which is essential for effective CRM and business process management.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce对象和字段是Salesforce平台的基本构建块，构成了存储和组织数据的核心结构。Salesforce中的对象类似于数据库中的表；它们作为数据容器，分为两种类型：标准对象和自定义对象。标准对象由Salesforce预定义，如账户、联系人和机会，在大多数Salesforce实施中都是通用的，反映了常见的业务实体。另一方面，自定义对象是由用户定义的，针对特定的业务需求定制，允许组织存储其流程的独特信息。在这些对象内，字段代表单个数据点，类似于数据库表中的列。字段可以存储各种类型的数据，例如文本、数字、日期，甚至是与其他对象的关联（查找或主/详细关系）。这种结构使用户能够捕获广泛的业务特定信息，使Salesforce成为管理各种业务流程和关系的非常可定制和灵活的平台。Salesforce中对象和字段的精心设计允许进行详细的数据建模，这对于有效的CRM和业务流程管理至关重要。
- en: Salesforce custom fields are specialized fields that are added to objects within
    the Salesforce platform to capture unique business-specific information. Unlike
    standard fields that come predefined within Salesforce objects (such as Account,
    Contact, and Opportunity), custom fields are created by administrators or developers
    to tailor the system according to specific organizational needs and processes.
    These fields can be of various data types, such as text, number, date, or even
    references to other objects (lookup fields). The addition of custom fields enables
    organizations to enhance their Salesforce environment, providing detailed, relevant
    data that standard fields may not accommodate, thus enriching the quality and
    context of the data within the system. Custom fields are central to creating a
    Salesforce setup that aligns with the unique characteristics and requirements
    of a business, facilitating more targeted actions, reporting, and decision-making.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Salesforce自定义字段是专门字段，它们被添加到Salesforce平台内的对象中，以捕获独特的业务特定信息。与Salesforce对象内预定义的标准字段（如账户、联系人和机会）不同，自定义字段是由管理员或开发者创建的，以根据特定的组织需求和流程定制系统。这些字段可以是各种数据类型，例如文本、数字、日期，甚至是其他对象的引用（查找字段）。自定义字段的添加使组织能够增强其Salesforce环境，提供详细、相关的数据，这些数据标准字段可能无法容纳，从而丰富系统内数据的质和上下文。自定义字段对于创建与业务独特特性和要求相一致的销售force设置至关重要，它促进了更有针对性的行动、报告和决策制定。
- en: Let’s consider a user story for adding two custom fields to the Salesforce Contact
    object. The first field is “VIP.” VIP stands for Very Important Person and is
    a checkbox that’s used to indicate to sales reps that their organization holds
    this contact in high regard. The second field is “Relationship Manager.” When
    populated, this indicates that before the sales rep interacts with this contact,
    they need to get permission from the Relationship Manager. The “Relationship Manager”
    field is a Salesforce Lookup field to the User object.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个用户故事，为Salesforce联系人对象添加两个自定义字段。第一个字段是“VIP”。VIP代表非常重要的人，这是一个复选框，用于向销售人员表明他们的组织高度重视此联系人。第二个字段是“关系经理”。当填写时，这表明在销售人员与该联系人互动之前，他们需要获得关系经理的许可。“关系经理”字段是Salesforce查找字段，指向用户对象。
- en: 'User story – add VIP and Relationship Manager fields to Salesforce Contacts:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 用户故事 - 向Salesforce联系人添加VIP和关系经理字段：
- en: '**Goal**: As a sales rep, I want to know if a contact is a VIP to my organization
    and if my organization has appointed a Relationship Manager for the contact.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标**：作为一个销售代表，我想知道一个联系人是否是我组织的 VIP，以及我的组织是否为该联系人指派了关系经理。'
- en: '**Acceptance criteria**:'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接受标准**：'
- en: '**Given** a sales rep has navigated to a Salesforce Contact page'
  id: totrans-24
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**一个销售代表已导航到 Salesforce 联系人页面'
- en: '**When** the page is loaded'
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**页面加载时'
- en: '**Then** the sales rep can view **VIP**, which is a checkbox field'
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后**销售代表可以查看 **VIP**，这是一个复选框字段'
- en: '**And** the sales rep can view **Relationship Manager**, which is a lookup
    to the User object'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并且**销售代表可以查看 **关系经理**，这是一个指向用户对象的查找'
- en: The first approach to using ChatGPT to address this user story is to write a
    prompt asking ChatGPT to write directions on how to create these fields using
    the Salesforce admin screens. As noted in [*Chapter 1*](B21462_01.xhtml#_idTextAnchor011),
    ChatGPT is an assistant, and writing prompts is an iterative process. Let’s look
    at the first pass at writing a request to have ChatGPT explain how to address
    the user story via admin screens.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 解决此用户故事的第一种方法是编写一个提示，要求 ChatGPT 编写使用 Salesforce 管理屏幕创建这些字段的说明。如[*第1章*](B21462_01.xhtml#_idTextAnchor011)所述，ChatGPT
    是一个助手，编写提示是一个迭代过程。让我们看看第一次尝试编写一个请求，让 ChatGPT 解释如何通过管理屏幕解决用户故事。
- en: Please provide detailed step-by-step directions to implement the following user
    story using Salesforce admin screens.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 请提供详细的逐步说明，使用 Salesforce 管理屏幕实现以下用户故事。
- en: 'Combine the two to create a ChatGPT prompt:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 将两者结合起来创建一个 ChatGPT 提示：
- en: '| **Prompt** | Please provide detailed step-by-step directions to implement
    the following user story using Salesforce admin screens.User story – Add VIP and
    Relationship Manager fields to Salesforce Contacts:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '| **提示** | 请提供详细的逐步说明，使用 Salesforce 管理屏幕实现以下用户故事。用户故事 – 将“VIP”和“关系经理”字段添加到
    Salesforce 联系人：'
- en: 'Goal: As a sales rep, I want to know if a contact is a VIP to my organization
    and if my organization has appointed a Relationship Manager for the contact.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标：作为一个销售代表，我想知道一个联系人是否是我组织的 VIP，以及我的组织是否为该联系人指派了关系经理。
- en: 'Acceptance criteria:'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接受标准：
- en: '**Given** a sales rep has navigated to a Salesforce contact page'
  id: totrans-34
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**给定**一个销售代表已导航到 Salesforce 联系人页面'
- en: '**When** the page is loaded'
  id: totrans-35
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**当**页面加载时'
- en: '**Then** the sales rep can view **VIP**, which is a checkbox field'
  id: totrans-36
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**然后**销售代表可以查看 **VIP**，这是一个复选框字段'
- en: '**And** the sales rep can view **Relationship Manager**, which is a lookup
    to the User object'
  id: totrans-37
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并且**销售代表可以查看 **关系经理**，这是一个指向用户对象的查找'
- en: '|'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| **Response** | Certainly! Here are the step-by-step instructions to implement
    the given user story by adding the “VIP” and “Relationship Manager” fields to
    Salesforce Contacts through the Salesforce admin screens:1\. Log into Salesforce:
    Navigate to your Salesforce instance and log in using the credentials that provide
    administrator access.2\. Access Object Manager:  Click on the setup gear icon
    (![](img/02.png)) in the top-right corner and then click on Object Manager. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| **响应** | 当然！以下是逐步说明，通过在 Salesforce 管理屏幕中添加“VIP”和“关系经理”字段到 Salesforce 联系人，以实现给定的用户故事：1.
    登录 Salesforce：导航到您的 Salesforce 实例并使用提供管理员访问权限的凭据登录。2. 访问对象管理器：点击右上角的设置齿轮图标 (![](img/02.png))，然后点击对象管理器。
    |'
- en: '|  | 3\. Navigate to the Contact object: In Object Manager, search for and
    click on Contact.4\. Access fields and relationships: Click on Fields & Relationships
    in the left-hand navigation pane.5\. Create the VIP checkbox field:   - Click
    New.   - Select Checkbox as the data type and click Next.   - Label the field
    VIP and provide a description if desired.   - Set Default Value to unchecked (or
    checked if you prefer).   - Click Next.   - Select the profiles that need access
    to this field, and set the visibility permissions.   - Click Next.   - Add the
    field to the appropriate page layouts by checking the boxes next to the layout
    names.   - Click Save.6\. Create the Relationship Manager lookup field:   - Click
    New.   - Select Lookup Relationship as the data type and click Next.   - Choose
    User from the Related To drop-down menu.   - Label the field Relationship Manager
    and provide a description if desired.   - Click Next.   - Select the profiles
    that need access to this field, and set the visibility permissions.   - Click
    Next.   - Add the field to the appropriate page layouts by checking the boxes
    next to the layout names.  - Click Save. |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '|  | 3. 导航到联系人对象：在对象管理器中，搜索并单击“联系人”。4. 访问字段和关系：在左侧导航窗格中单击“字段和关系”。5. 创建 VIP
    复选框字段：   - 单击“新建”。   - 选择“复选框”作为数据类型并单击“下一步”。   - 将字段标签命名为 VIP，如有需要提供描述。   - 将默认值设置为未选中（或根据需要选中）。   -
    单击“下一步”。   - 选择需要访问此字段的角色，并设置可见性权限。   - 单击“下一步”。   - 通过勾选布局名称旁边的复选框，将字段添加到适当的页面布局中。   -
    单击“保存”。6. 创建关系经理查找字段：   - 单击“新建”。   - 选择“查找关系”作为数据类型并单击“下一步”。   - 从“相关于”下拉菜单中选择“用户”。   -
    将字段标签命名为“关系经理”，如有需要提供描述。   - 单击“下一步”。   - 选择需要访问此字段的角色，并设置可见性权限。   - 单击“下一步”。   -
    通过勾选布局名称旁边的复选框，将字段添加到适当的页面布局中。   - 单击“保存”。 |'
- en: '|  | 7\. Verify the changes:   - Navigate to any Contact record within Salesforce.   -
    Verify that the VIP checkbox field and Relationship Manager lookup field are visible
    and functioning as per the acceptance criteria.By following these steps, the two
    new fields will be successfully added to the Salesforce Contact object, fulfilling
    the user story’s requirements. The sales rep can now easily identify a VIP contact
    and view the assigned Relationship Manager. |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '|  | 7. 验证更改：   - 在 Salesforce 中导航到任何联系人记录。   - 验证 VIP 复选框字段和关系经理查找字段是否可见且按验收标准正常工作。通过遵循这些步骤，这两个新字段将成功添加到
    Salesforce 联系人对象中，满足用户故事的要求。销售代表现在可以轻松识别 VIP 联系人并查看分配的关系经理。 |'
- en: The provided user story and the corresponding directions leave several essential
    details unspecified, which could lead to ambiguity during the implementation phase.
    The user story doesn’t define which specific profiles or permission sets should
    have read and update permissions for the new **VIP** and **Relationship Manager**
    fields, leaving a gap in the security and accessibility controls. Similarly, the
    details about the exact page layouts to which the fields should be added are missing,
    and this may result in inconsistency across different layouts within Salesforce.
    Furthermore, the desired placement of these fields on the page layouts is not
    described, leading to potential confusion about the intended user experience and
    layout design. These gaps highlight the importance of a more detailed specification
    in the user story, acceptance criteria, and implementation instructions to ensure
    alignment with the business needs and to facilitate a smooth and efficient configuration
    process. [*Chapter 11*](B21462_11.xhtml#_idTextAnchor166) goes into detail about
    how to use ChatGPT to groom user stories and what questions to ask the business
    analyst and product owner during the grooming process.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 提供的用户故事和相应的指示未指定几个关键细节，这可能导致在实施阶段出现歧义。用户故事没有定义哪些特定配置文件或权限集应该具有对新 **VIP** 和 **关系经理**
    字段的读取和更新权限，这留下了安全和可访问性控制方面的空白。同样，缺少有关应添加到哪些确切页面布局的字段细节，这可能导致 Salesforce 中不同布局之间的一致性不一致。此外，这些字段在页面布局中的期望位置没有描述，可能导致对预期用户体验和布局设计的混淆。这些空白突出了在用户故事、验收标准和实施说明中提供更详细规范的重要性，以确保与业务需求保持一致，并促进顺畅高效的配置过程。[*第
    11 章*](B21462_11.xhtml#_idTextAnchor166) 详细介绍了如何使用 ChatGPT 精炼用户故事以及在精炼过程中向业务分析师和产品负责人提出哪些问题。
- en: For this chapter, however, we’ll use a user story as the basis for a ChatGPT
    prompt. With this prompt, ChatGPT has responded with detailed step-by-step configuration
    directions!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于本章，我们将使用用户故事作为 ChatGPT 提示的基础。使用这个提示，ChatGPT 响应了详细的逐步配置说明！
