- en: '10'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '10'
- en: Understanding GenAI Operations
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解GenAI运营
- en: '**Large language models** ( **LLMs** ) gained popularity in 2018 with the launch
    of BERT. Even though “GPT” has existed since 2019, it was leveraged in an application
    called “ChatGPT” and launched in 2022. This is when the internet blew up, gaining
    one million users within five days of being available ( [yahoo.com/news/chatgpt-gained-1-million-followers-224523258.html](https://yahoo.com/news/chatgpt-gained-1-million-followers-224523258.html)
    ). This signals the fact that there is the right kind of excitement within the
    market. However, building something similar within an enterprise or an application
    where you expect users to commercialize is an entirely different ball game.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**大型语言模型**（**LLMs**）在2018年随着BERT的推出而受到关注。尽管“GPT”自2019年以来就已存在，但它被用于名为“ChatGPT”的应用中，并于2022年推出。这就是互联网爆炸的时候，在可用五天内就获得了100万用户（[yahoo.com/news/chatgpt-gained-1-million-followers-224523258.html](https://yahoo.com/news/chatgpt-gained-1-million-followers-224523258.html)）。这表明市场中有正确的兴奋情绪。然而，在企业和应用中构建类似的东西，其中你期望用户进行商业化，完全是另一回事。'
- en: Enterprise AI is hard. Choosing a suitable model, optimization technique, and
    evaluation metrics can be difficult. The choice can make or break your enterprise
    solution, which can affect the overall adaptation within the firm. This is where
    GenAI **operations** ( **Ops** ) come into play. Implementing GenAI Ops can help
    you make the right choice related to the model, data, evaluation metrics, and
    optimization technique, and deploy a production-ready solution. In this chapter,
    we will explore the what, why, and how of GenAI Ops.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 企业AI很困难。选择合适的模型、优化技术和评估指标可能很困难。选择可能会决定你的企业解决方案的成功与否，这可能会影响公司整体适应。这就是GenAI **运营**（**Ops**）发挥作用的地方。实施GenAI
    Ops可以帮助你做出关于模型、数据、评估指标和优化技术的正确选择，并部署一个生产就绪的解决方案。在本章中，我们将探讨GenAI Ops的什么、为什么和如何。
- en: 'We will cover the following key topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将涵盖以下关键主题：
- en: The what and why of GenAI Ops
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GenAI Ops的什么和为什么
- en: Life cycle of GenAI Ops
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GenAI Ops的生命周期
- en: Case study – behind the scenes of an enterprise LLM solution
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 案例研究 – 企业LLM解决方案背后的幕后
- en: Case study – intelligent claims processing platform
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 案例研究 – 智能索赔处理平台
- en: '**Important definitions and disclaimers**'
  id: totrans-9
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**重要定义和免责声明**'
- en: '**LLM systems** : Any application, workflow, or system powered by an LLM. This
    is important as we will highlight the LLM system’s evaluation in detail in this
    chapter, not the evaluation of the actual large language model.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM系统**：任何由LLM驱动的应用、工作流程或系统。这一点很重要，因为在本章中，我们将详细讨论LLM系统的评估，而不是实际大型语言模型的评估。'
- en: '**Mixed precision training** : A technique used in deep learning to improve
    computational efficiency by combining different numerical precisions in a single
    model. Typically, it involves using **16-bit floating-point** ( **FP16** ) precision
    for most operations to reduce memory usage and increase speed while retaining
    **32-bit floating-point** ( **FP32** ) precision for critical calculations to
    maintain accuracy.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合精度训练**：一种在深度学习中使用的技巧，通过在单个模型中结合不同的数值精度来提高计算效率。通常，它涉及使用**16位浮点**（**FP16**）精度进行大多数操作以减少内存使用并提高速度，同时保留**32位浮点**（**FP32**）精度进行关键计算以保持准确性。'
- en: '**User prompts** : Specific questions given by the user to the AI system to
    guide the AI to perform a particular task.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户提示**：用户向AI系统给出的特定问题，以指导AI执行特定任务。'
- en: '**System prompts** : A set of instructions provided by the developers to define
    an AI model’s overall behavior and role.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统提示**：开发者提供的一组指令，用于定义AI模型的整体行为和角色。'
- en: '**Knowledge distillation** : A technique in machine learning where a smaller,
    simpler model (the “student”) is trained to replicate the behavior of a larger,
    more complex model (the “teacher”). The goal is to transfer the knowledge from
    the teacher to the student model, enabling the student to achieve similar performance
    with reduced computational resources.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识蒸馏**：一种机器学习技术，其中较小的、更简单的模型（“学生”）被训练来复制较大的、更复杂的模型（“教师”）的行为。目标是把知识从教师模型转移到学生模型，使学生能够以减少的计算资源实现相似的性能。'
- en: In this chapter, we are assuming you have a background in GenAI, particularly
    LLMs and **small language models** ( **SLMs** ), as we will not deep dive into
    the architecture but share practical tips and tricks to build successful GenAI
    systems.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们假设你具备GenAI的背景，特别是LLMs和**小型语言模型**（**SLMs**），因为我们不会深入探讨架构，而是分享构建成功的GenAI系统的实用技巧和窍门。
- en: Please note that *GenAI Ops* and *LLMOps* are often used interchangeably, though
    the intent behind them is the same.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，*GenAI Ops*和*LLMOps*经常被互换使用，尽管它们背后的意图是相同的。
- en: What is GenAI Ops?
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是GenAI Ops？
- en: GenAI Ops (LLMOps) is a process meant to accelerate and optimize model creation,
    development, evaluation, and monitoring throughout its lifespan.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI Ops（LLMOps）是一个旨在加速和优化模型在整个生命周期中的创建、开发、评估和监控的过程。
- en: Why GenAI Ops?
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么需要GenAI Ops？
- en: 'Let’s explore why GenAI Ops is an important concept while building GenAI applications.
    Here are a few reasons:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨在构建GenAI应用程序时，为什么GenAI Ops是一个重要的概念。以下是一些原因：
- en: GenAI Ops is essential to optimizing the performance of your LLMs, which could
    involve fine-tuning models, adding new data points, and so on, to improve accuracy
    and achieve the required ROI
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GenAI Ops对于优化您的LLMs的性能至关重要，这可能涉及微调模型、添加新的数据点等，以提高准确性和实现所需的回报率。
- en: It helps you monitor your model actively, find potential pitfalls, and mitigate
    them immediately
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它帮助您积极监控您的模型，发现潜在的问题，并立即缓解它们
- en: It reduces risk and ensures that users get the most reliable experience
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它降低了风险，并确保用户获得最可靠的经验
- en: It helps you scale up or down, depending on your application’s usage, enabling
    you to save costs and ensure that your users get the highest level of experience
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它帮助您根据应用程序的使用情况调整规模，使您能够节省成本，并确保您的用户获得最高级别的体验。
- en: GenAI is an expensive undertaking; GenAI Ops ensures that you can reap the maximum
    benefits of GenAI through a defined process within your enterprise
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GenAI是一项昂贵的任务；GenAI Ops确保您可以通过企业内部定义的过程获得GenAI的最大收益。
- en: How is GenAI Ops different from MLOps?
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GenAI Ops与MLOps有何不同？
- en: 'AI practitioners often question the need for GenAI Ops when MLOps have existed
    in the past. Though there are similarities between LLM and ML-based applications,
    such as both being probabilistic applications, there are also underlying differences
    that lead to separate processes. The following table highlights some of the differences:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当MLOps已经存在时，AI从业者经常质疑GenAI Ops的必要性。尽管LLM和基于ML的应用程序在概率应用方面有相似之处，例如，但它们之间也存在导致分离流程的潜在差异。以下表格突出了其中的一些差异：
- en: '| **Features** | **MLOps** | **GenAI Ops** |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
  zh: '| **功能** | **MLOps** | **GenAI Ops** |'
- en: '| **Talent** | Data scientists and ML engineers | Data scientists, AI engineers,
    and application developers |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| **人才** | 数据科学家和ML工程师 | 数据科学家、AI工程师和应用开发者 |'
- en: '| **Metrics** | Model metrics such as accuracy and precision | Model metrics
    such as groundedness and coherence;operation metrics such as latency and tokens
    per minute |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| **指标** | 模型指标，如准确性和精确度 | 模型指标，如扎根性和连贯性；操作指标，如延迟和每分钟令牌数 |'
- en: '| **Training process** | Built from scratch | Fine-tuned on foundation models
    or API calling |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| **训练过程** | 从头开始构建 | 在基础模型或API调用上进行微调 |'
- en: '| **Human feedback** | Optional | Non-negotiable |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| **人类反馈** | 可选 | 不可或缺 |'
- en: 'Table 10.1: Differences between MLOps and GenAI Ops'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 表10.1：MLOps与GenAI Ops之间的差异
- en: GenAI Ops is not just about using the latest AI technology but about the confluence
    involving the right people, platform, and process. The right people include the
    business and technical folks, compliance, legal, and early adopters or business
    users. The right platform is about hosting it robustly and providing end users
    with the best-in-class experience. The process is about having a streamlined system
    to measure and monitor the performance of your LLM system so that you can be proactive
    rather than reactive as soon as you notice slight model degradation or any kind
    of performance issues.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: GenAI Ops不仅仅是使用最新的AI技术，而是关于正确的人、平台和过程的融合。正确的人包括商业和技术人员、合规性、法律和早期采用者或商业用户。正确的平台是关于稳健地托管它，并为最终用户提供最佳体验。流程是关于拥有一个简化的系统来衡量和监控您的LLM系统的性能，这样您就可以在注意到模型轻微退化或任何类型的性能问题时采取主动，而不是被动反应。
- en: In this section, we introduced the concept of GenAI Ops, why it is necessary,
    and how it is different from MLOps. In the next section, we will explore the life
    cycle of GenAI Ops in detail.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们介绍了GenAI Ops的概念，为什么它是必要的，以及它与MLOps的不同之处。在下一节中，我们将详细探讨GenAI Ops的生命周期。
- en: Life cycle of GenAI Ops
  id: totrans-36
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GenAI Ops的生命周期
- en: Organizations perceive GenAI Ops differently. No one path is a holy grail and
    is highly customizable for your organization and use case. The following subsections
    provide a high-level flow of all the steps you need to consider when building
    your AI application.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 组织对GenAI Ops的看法不同。没有一条路径是神圣的，它对你的组织和用例高度可定制。以下小节提供了一个高级流程，概述了你在构建AI应用程序时需要考虑的所有步骤。
- en: Ideation
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构思
- en: This is the first step; the process starts with ideation. Companies start exploring
    the idea of a use case where they want to leverage language models. AI practitioners
    or data scientists often explore the possibility of SLMs or LLMs in this step
    to build their application in an optimized and cost-effective way. This is the
    step where you also involve other stakeholders, such as product or project managers,
    to design the vision of your overall product. The designated team then frames
    an initial use case and also defines what success looks like for that use case.
    Once the use case has been identified, data scientists will start thinking about
    user prompts and system prompts and select a foundation model. It is highly recommended
    to seek expert advice from solutions architects, advisors, and experts within
    the company during this phase.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是第一步；过程从构思开始。公司开始探索他们想要利用语言模型的使用案例。AI实践者或数据科学家通常在这一步探索SLMs或LLMs的可能性，以优化和以成本效益的方式构建他们的应用程序。这是你也要涉及其他利益相关者，如产品或项目经理，来设计你整体产品愿景的步骤。指定的团队随后制定一个初始使用案例，并定义该使用案例的成功标准。一旦确定了使用案例，数据科学家将开始考虑用户提示和系统提示，并选择一个基础模型。在此阶段，强烈建议寻求解决方案架构师、顾问和公司内部专家的专业建议。
- en: The result is a defined use case with an execution plan and model selected for
    building the use case.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个定义了的使用案例，包括执行计划和为构建该使用案例所选定的模型。
- en: Building
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建
- en: This is the step where you refine the initial plan and evaluate whether the
    chosen model, user prompts, and meta prompts/system messages work for you. The
    best way to see whether something works is to evaluate it in action. In this stage,
    you will be leveraging the sandbox/innovation environment of your company to build
    the solution and see whether it is working as expected. There is a strong possibility
    that you will want to tweak certain elements of the solution. So, part of this
    step is to experiment with different LLM optimization techniques, such as prompt
    engineering, **retrieval-augmented generation** ( **RAG** ), or fine-tuning, to
    get the desired results. Based on the chosen method, you will also need an evaluation
    plan, which could include adding **subject matter experts** ( **SMEs** ) to evaluate
    your response, using an LLM as a judge, and so on. We will cover this in detail
    in the upcoming sections.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你细化初始计划并评估所选模型、用户提示和元提示/系统消息是否适合你的步骤。看到某件事是否有效的方法是将其付诸实践。在这个阶段，你将利用公司的沙盒/创新环境来构建解决方案，并查看它是否按预期工作。有很大可能性你将想要调整解决方案的某些元素。因此，这一步骤的部分内容是实验不同的LLM优化技术，如提示工程、**检索增强生成**（**RAG**）或微调，以获得期望的结果。根据选择的方法，你还需要一个评估计划，这可能包括添加**主题专家**（**SMEs**）来评估你的响应，使用LLM作为评判者，等等。我们将在接下来的章节中详细说明。
- en: Before we move to the third phase of GenAI Ops, let’s discuss all the optimization
    techniques in detail.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们进入GenAI Ops的第三阶段之前，让我们详细讨论所有优化技术。
- en: 'When thinking of optimizing LLM-driven solutions, there are usually three techniques:
    RAG, prompting, and fine-tuning. Usually, AI developers start with prompting and
    then move on to RAG. The important question to ask while choosing between RAG,
    prompting, and fine-tuning is what you wish to optimize. LLM optimization is not
    a linear flow, meaning that, more often than not, enterprise LLM solutions require
    either a combination of these techniques or all three at once, depending on the
    complexity of the use case. We will unpack this in the upcoming sections.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑优化由LLM驱动的解决方案时，通常有三种技术：RAG、提示和微调。通常，AI开发者从提示开始，然后转向RAG。在RAG、提示和微调之间选择时，重要的问题是你要优化什么。LLM优化不是一个线性的流程，这意味着，更常见的情况是，企业LLM解决方案需要这些技术的组合，或者根据用例的复杂性，一次同时使用所有三种技术。我们将在接下来的章节中详细说明这一点。
- en: Prompting
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示
- en: Prompting is a way for you to provide detailed instructions for your AI solution
    to achieve the desired output. Like humans, models also require meticulous instructions
    to give high-quality output.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompting can be classified into two types:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '**Crafting system messages** : These provide models with a persona or tone
    to behave accordingly. System messages are also a great way to introduce guardrails
    and reduce hallucinations. Developers configure these on the backend. For example,
    you are a coder who writes accurate Python code. If you don’t know something,
    say it.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Crafting user prompts** : These are user-driven, so they are basically how
    a user interacts in natural language with the LLM. We have all been doing this
    since the launch of ChatGPT.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Advantages of prompting are as follows:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Prompting is easy to implement and doesn’t require advanced technical skills
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is cost-effective as you are utilizing pretrained models
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompts can be quickly adjusted based on evaluation results without the need
    for retraining the model (refer to [https://medium.com/@myscale/prompt-engineering-vs-finetuning-vs-rag-cfae761c6d06](https://medium.com/@myscale/prompt-engineering-vs-finetuning-vs-rag-cfae761c6d06)
    )
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Best practices for prompting
  id: totrans-54
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Here are some best practices to craft effective prompts:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Designing accurate meta prompts is an iterative process. Creating a spreadsheet
    with different meta prompts and responses is essential to tracking how tweaking
    different meta prompts affects system performance.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Developing reusable prompt templates or patterns to help users easily and quickly
    adapt to different use cases.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chain of thought** ( **CoT** ) prompting is when the model outputs its thought
    process and answers the final question. This prompting technique is perfect for
    complex reasoning questions. Let us understand further with an example:'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![A screenshot of a computer  AI-generated content may be incorrect.](img/B34239_10_01.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: 'Figure 10.1: Illustration of a sample CoT prompt'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Here, I provided relevant examples through the prompt so that it could adapt
    my thought process and then answer the question. So, it produced the correct output.
    It didn’t just print `41` ; it also showed you how it arrived at the solution.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: 'Another essential thing to note here is that since I provided a few examples,
    it’s called **few-shot learning** . Let’s decode what few-shot learning is; it
    refers to the ability of the model to perform a new task by being given just a
    few examples in the prompt. Here is an example of a few-shot prompt:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '**Task** : Classify sentiment as Positive or Negative'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Example 1 input** : “I love this product!”'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output** : Positive'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Example 2 input** : “This is terrible.”'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Output: Negative'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The important thing to note here is that even as part of CoT prompting, you
    are doing few-shot learning as you are providing examples in the prompt, but the
    major difference is that chain of thought prompting is generally used for reasoning/logical
    use cases, such as mathematical workloads, as it encourages the model to **reason
    step by step** before giving the final answer.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这里需要注意的重要一点是，即使在CoT提示中，您也在进行少样本学习，因为您在提示中提供了示例，但主要区别在于思维链提示通常用于推理/逻辑用例，例如数学工作负载，因为它鼓励模型在给出最终答案之前**逐步推理**。
- en: RAG
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAG
- en: RAG is a way of optimizing LLMs to make them more grounded so that they can
    access the knowledge through an authoritative knowledge base. The vital part is
    to know that the authoritative knowledge base is validated to ensure that the
    information is accurate and updated. To draw an analogy, think about RAG as an
    “open-book” exam. In an open-book exam, students are allowed to bring reference
    materials, such as textbooks or notes, which they can use to look up relevant
    information to answer a question. The idea behind an open-book exam is that the
    test focuses on the students’ reasoning skills rather than their ability to memorize
    specific information. Similarly, the factual knowledge is separated from the LLM’s
    reasoning capability and stored in an external knowledge source, which can be
    easily accessed and updated.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: RAG是一种优化LLM的方法，使其更加接地，以便它们可以通过权威的知识库访问知识。关键是要知道，权威的知识库经过验证，以确保信息是准确和更新的。为了类比，想想RAG就像是一场“开卷考试”。在开卷考试中，学生被允许携带参考材料，如教科书或笔记，他们可以使用这些材料查找相关信息来回答问题。开卷考试背后的理念是，考试侧重于学生的推理技能，而不是他们记忆特定信息的能力。同样，事实性知识从LLM的推理能力中分离出来，并存储在外部知识源中，可以轻松访问和更新。
- en: 'Here are the advantages of RAG:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是RAG的优势：
- en: '**Cost-effective** : Fine-tuning a foundational model is expensive, but introducing
    new information to the RAG within LLMs is cheaper'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**经济高效**：微调基础模型是昂贵的，但在LLMs中引入新的信息到RAG中更便宜'
- en: '**Enhanced user trust** : RAG provides accurate information along with the
    sources, such as footnotes in the research papers, improving user trust in the
    retrieved information'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强用户信任**：RAG提供准确的信息以及来源，例如研究论文中的脚注，从而提高用户对检索信息的信任'
- en: '**Maintain relevance:** GenAI models are usually trained with outdated information,
    but RAG allows you to train them with the most recent and relevant information
    about your use case'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保持相关性**：GenAI模型通常使用过时的信息进行训练，但RAG允许您使用关于您用例的最新和相关信息进行训练'
- en: RAG introduces an information retrieval component that first utilizes user input
    to pull information from a new data source. The user query and the relevant information
    are given to the LLM, which uses the latest knowledge and training data to create
    better responses.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: RAG引入了一个信息检索组件，它首先利用用户输入从新的数据源中检索信息。用户查询和相关信息被提供给LLM，LLM使用最新的知识和训练数据来创建更好的响应。
- en: 'The following steps provide an overview of the process:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤概述了该过程：
- en: '**Data collection** : Pull all the relevant data needed for your application.
    For example, for an internal chatbot, it could mean all the knowledge manuals
    on internal data sources'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据收集**：收集您应用程序所需的所有相关数据。例如，对于一个内部聊天机器人，这可能意味着所有关于内部数据源的知识手册'
- en: '**Pro tip**'
  id: totrans-78
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**小贴士**'
- en: Ensure that the data used in the RAG application is relevant and updated to
    limit hallucinations and incorrect responses.
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 确保在RAG应用程序中使用的数据是相关且更新的，以限制幻觉和错误响应。
- en: '**Data chunking** : Data chunking is breaking your data into smaller, bite-sized
    pieces of information. This allows the model to retrieve relevant data chunks
    efficiently. How you perform chunking can also affect the model’s performance.
    For example, if you are dealing with a 1,000-page manual, the chunking should
    be so that each chunk talks about a particular topic. This way, the model can
    quickly retrieve the required chunk when the user asks a question. The following
    list contains a few chunking strategies you can select based on the use case.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据分块**：数据分块是将您的数据分解成更小、更易消化的信息块。这允许模型有效地检索相关数据块。您如何执行分块也会影响模型的表现。例如，如果您处理的是1000页的手册，分块应该这样进行，即每个块讨论一个特定主题。这样，当用户提问时，模型可以快速检索所需的数据块。以下列表包含了一些基于用例可以选择的分块策略。'
- en: 'The list needs to be more comprehensive, but the most relevant ones work in
    an enterprise:'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列表需要更全面，但最相关的在企业中适用：
- en: '**Fixed token overlap** : In this technique, documents are split into chunks
    to overlap information between two different chunks. This is important so that
    there is no information loss while chunking, and it ensures that all data is retained.'
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**固定标记重叠**：在此技术中，文档被分割成块以在两个不同的块之间重叠信息。这对于在分块过程中不丢失信息非常重要，并确保保留所有数据。'
- en: '**Semantic** : In this technique, documents are split based on semantic similarity.
    Documents are first divided into sentence groups of three sentences using a sliding
    window (usually the sentence, the previous sentence, and the following sentence).
    Embeddings are generated for each sentence group, and similar groups in the embedding
    space are merged to form chunks. The similarity threshold for merging is determined
    using metrics such as percentile, standard deviation, and interquartile distance.
    As a result, the chunk size can vary across chunks.'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义**：在此技术中，文档基于语义相似性进行分割。首先，使用滑动窗口（通常是句子、上一句和下一句）将文档分为三个句子的句子组。为每个句子组生成嵌入，并在嵌入空间中将相似的组合并形成块。合并的相似度阈值使用百分位数、标准差和四分位距等指标确定。因此，块的大小可以在块之间变化。'
- en: '**Hybrid chunking** : This combines multiple strategies based on content type
    and document structure. For instance, text can be chunked by sentences, while
    tables and images are handled separately. It is helpful for technical reports,
    business documents, or product manuals.'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**混合分块**：这结合了基于内容类型和文档结构的多种策略。例如，文本可以按句子分块，而表格和图像则分别处理。这对于技术报告、商业文件或产品手册很有帮助。'
- en: '**Document embedding** : Once you have performed data chunking, converting
    them into vector representations through embeddings is essential. Embeddings are
    numeric representations of text data that also retain the semantic meaning behind
    the text. While choosing a suitable embedding model, remember that the effectiveness
    of retrieval via similarity search heavily depends on the quality of the embeddings
    used to represent the documents and queries. Consequently, choosing an embedding
    model will significantly impact the retrieval precision, affecting the quality
    of the LLM responses and the overall RAG application.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**文档嵌入**：一旦完成数据分块，通过嵌入将这些数据转换为向量表示是必不可少的。嵌入是保留文本数据语义意义的数值表示。在选择合适的嵌入模型时，请记住，通过相似度搜索进行检索的有效性高度依赖于用于表示文档和查询的嵌入质量。因此，选择嵌入模型将显著影响检索精度，影响LLM响应的质量以及整体RAG应用的质量。'
- en: '**Handling user queries** : Once the user enters the query, it is also converted
    into embeddings. Then, query embeddings are compared with document embeddings
    using cosine similarity (or similar methods) to find the mo st relevant chunks
    of information.'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**处理用户查询**：一旦用户输入查询，它也会被转换为嵌入。然后，使用余弦相似度（或类似方法）将查询嵌入与文档嵌入进行比较，以找到最相关的信息块。'
- en: '**Generating responses with an LLM** : The retrieved text chunks and the initial
    user query are fed into a language model. The algorithm will use this information
    to respond coherently to the user’s questions through a chat interface.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用LLM生成响应**：检索到的文本块和初始用户查询被输入到语言模型中。算法将使用这些信息通过聊天界面对用户的问题做出连贯的响应。'
- en: 'Next, we will look at the example use cases for RAG:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探讨RAG的示例用例：
- en: Chatbots with an internal knowledge base to help employees find information
    faster and be more productive.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有内部知识库的聊天机器人，以帮助员工更快地找到信息并提高生产力。
- en: Personalized recommendation engines for external customers to improve customer
    service and user experience.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为外部客户提供个性化推荐引擎，以改善客户服务和用户体验。
- en: An intelligent companion for doing research studies and solving complex reasoning-based
    problems. For instance, it can assist doctors and researchers by quickly retrieving
    the latest research findings or clinically pertinent data for a patient’s case
    or medical condition.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为研究学习和解决复杂推理问题的智能伴侣。例如，它可以协助医生和研究人员快速检索与患者病例或医疗状况相关的最新研究成果或临床数据。
- en: Best practices for implementing RAG
  id: totrans-92
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实施RAG的最佳实践
- en: 'Now that we have understood the workings and advantages of RAG, here are a
    few best practices we have learned after building and deploying several RAG solutions:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了RAG的工作原理和优势，以下是我们构建和部署了几个RAG解决方案后学到的几点最佳实践：
- en: '**Data preprocessing** :'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据预处理**：'
- en: Ensure that you include metadata in your data for RAG. This will provide additional
    contextual information. Some examples of metadata could be date or year if the
    user can ask any time-sensitive questions.
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保你的数据中包含RAG所需的元数据。这将提供额外的上下文信息。一些元数据的例子可能是日期或年份，如果用户可以随时提出任何时间敏感的问题。
- en: Ordering the documents can help LLMs better understand the context. Let’s say
    you are retrieving several chunks from a document that only makes sense if ordered
    properly; then, inserting the chunks in that order is essential.
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对文档进行排序可以帮助大型语言模型更好地理解上下文。假设你正在从一份文档中检索几个片段，这些片段只有在正确排序的情况下才有意义；那么，按照那个顺序插入片段是至关重要的。
- en: Filter the data based on specific criteria before performing a vector search,
    such as using regular expressions or metadata to narrow the search space. If the
    use case is about getting the latest information, then it is best to filter the
    data, let’s say in 2024, before performing the vector search. This will help retrieve
    relevant information and also improve latency.
  id: totrans-97
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在执行向量搜索之前，根据特定标准过滤数据，例如使用正则表达式或元数据来缩小搜索范围。如果用例是获取最新信息，那么在执行向量搜索之前过滤数据，比如在2024年，是最好的。这将有助于检索相关信息，并提高延迟。
- en: Ensure that the data is clean and updated before feeding it to the RAG system.
    Deploy systems that can detect data drift so that practitioners know when to update
    the data or the underlined model. Chatbots fail because the old data doesn’t give
    the users the correct information, resulting in a loss of user base.
  id: totrans-98
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在将数据输入到RAG系统之前，确保数据是干净和更新的。部署能够检测数据漂移的系统，以便从业者知道何时更新数据或底层模型。聊天机器人失败是因为旧数据没有给用户提供正确的信息，导致用户群流失。
- en: Robust data pipelines are essential for adapting to changes in source data.
    This adaptability ensures that the RAG system remains efficient and effective,
    even as the nature of the input data evolves.
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强健的数据管道对于适应源数据的变化至关重要。这种适应性确保了RAG系统即使在输入数据的性质发生变化时也能保持高效和有效。
- en: Experiment with different models to ensure optimal accuracy and speed. Sometimes,
    starting with SLMs might be beneficial if your use case is more straightforward
    to save cost and increase speed.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试不同的模型以确保最佳准确性和速度。如果你的用例更简单，从SLM（序列到序列模型）开始可能有益，这样可以节省成本并提高速度。
- en: Start with a simple RAG architecture and customize it as you evaluate the performance.
    If you tweak the chunking strategy and embedding model all at once, you won’t
    be able to know the drivers behind the model’s performance.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从简单的RAG架构开始，并在评估性能时进行定制。如果你同时调整分块策略和嵌入模型，你将无法了解模型性能背后的驱动因素。
- en: Define evaluation metrics early, such as groundedness, coherence, and so on,
    and prepare baseline evaluations to compare against.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提前定义评估指标，例如基础性、连贯性等，并准备基准评估以进行比较。
- en: Scalable design in RAG systems is about anticipating and addressing potential
    latency issues in production. This will ensure that your users get a constant
    throughput, hence a great user experience.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAG系统中的可扩展设计是关于预测和解决生产中潜在延迟问题的。这将确保你的用户获得恒定的吞吐量，从而提供出色的用户体验。
- en: Always follow a phase-wise roll-out approach for your RAG system. Start with
    a limited user base and increase the users as you gain more confidence in your
    AI application.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于你的RAG系统，始终遵循分阶段推出方法。从一个有限的用户群开始，随着你对你的AI应用越来越有信心，逐渐增加用户数量。
- en: Establish strict protocols for data privacy, security, and compliance with data
    protection laws. It is essential to have a robust system to prevent against prompt
    injections and bad actors. Refer to [https://nexla.com/ai-infrastructure/retrieval-augmented-generation/](https://nexla.com/ai-infrastructure/retrieval-augmented-generation/)
    .
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立严格的数据隐私、安全和遵守数据保护法律的规定。拥有一个强大的系统来防止提示注入和恶意行为是至关重要的。请参阅[https://nexla.com/ai-infrastructure/retrieval-augmented-generation/](https://nexla.com/ai-infrastructure/retrieval-augmented-generation/)。
- en: Use hybrid search wherever possible; keyword and context-based search techniques
    combine the best of both worlds. This improves the accuracy and relevance of search
    results. Refer to [https://medium.com/@juanc.olamendy/rag-best-practices-enhancing-large-language-models-with-retrieval-augmented-generation-6961c8b834ff](https://medium.com/@juanc.olamendy/rag-best-practices-enhancing-large-language-models-with-retrieval-augmented-generation-6961c8b834ff)
    .
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽可能使用混合搜索；关键词和基于上下文的搜索技术结合了两者之长。这提高了搜索结果的准确性和相关性。请参阅[https://medium.com/@juanc.olamendy/rag-best-practices-enhancing-large-language-models-with-retrieval-augmented-generation-6961c8b834ff](https://medium.com/@juanc.olamendy/rag-best-practices-enhancing-large-language-models-with-retrieval-augmented-generation-6961c8b834ff)。
- en: 'The following figure illustrates the workings of the RAG method:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 下图说明了RAG方法的工作原理：
- en: '![img](img/B34239_10_02.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_10_02.png)'
- en: 'Figure 10.2: Steps in RAG'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.2：RAG的步骤
- en: We hope this section has given you a deeper understanding of the workings of
    RAG, when to use it, and things to keep in mind while building it. Now, let’s
    explore another powerful technique called fine-tuning.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望这一节能帮助您更深入地理解RAG的工作原理，何时使用它，以及构建时需要注意的事项。现在，让我们探索另一种强大的技术，称为微调。
- en: Fine-tuning
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微调
- en: '**Fine-tuning** involves training a pretrained model on a domain-specific dataset
    to prepare it for a specific task. Think of the pretrained model as a student
    who has learned general knowledge in school (e.g., language, math, and science).
    Fine-tuning is like giving that student specialized training for a specific profession,
    such as law or medicine, where they apply what they’ve already learned but with
    additional practice in a particular area.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '**微调**涉及在特定领域的数据集上训练预训练模型，以便为特定任务做准备。将预训练模型想象成一个在学校已经学习了一般知识的学生（例如，语言、数学和科学）。微调就像给这个学生提供特定职业的专业培训，比如法律或医学，他们在应用已经学到的知识的同时，在特定领域进行额外的实践。'
- en: 'Here are the steps for fine-tuning:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是微调的步骤：
- en: 'Prepare your dataset:'
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 准备您的数据集：
- en: '**Training examples** : These are specific instances or data points used to
    teach the model how to respond correctly.'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练示例**：这些是用于教导模型如何正确响应的具体实例或数据点。'
- en: '**Targeting undesired behavior** : Some examples should focus on situations
    where the model’s current responses are not ideal or incorrect. By identifying
    these problematic cases, you can provide better guidance.'
  id: totrans-116
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**针对不希望的行为**：一些示例应关注模型当前响应不理想或不正确的情况。通过识别这些问题案例，您可以提供更好的指导。'
- en: '**Ideal responses** : For each of these targeted examples, include the perfect
    response you want the model to produce. Comparing its current response to the
    desired one helps the model learn the correct behavior.'
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理想的响应**：对于这些有针对性的示例，包括您希望模型产生的完美响应。将其当前响应与期望值进行比较，有助于模型学习正确的行为。'
- en: You should have at least 50 demonstrations to see whether the model improves
    after fine-tuning.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 您至少需要有50个演示来查看模型在微调后是否有所改进。
- en: 'Split the data into a training and a test set:'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据分为训练集和测试集：
- en: Feed both train and test data into the fine-tuning job; this will help you get
    statistics on both datasets and calculate how much the model improves with fine-tuning.
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将训练数据和测试数据都输入到微调任务中；这将帮助您获取两个数据集的统计数据，并计算模型在微调后的改进程度。
- en: After training the model, you will use this test set to evaluate its performance.
    By comparing the model’s predictions on the test set to the actual correct responses,
    you can measure its accuracy and effectiveness.
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练模型后，您将使用这个测试集来评估其性能。通过比较模型在测试集上的预测与实际正确响应，您可以衡量其准确性和有效性。
- en: Create the new fine-tuned model. Determine the suitable model for your use case.
    Running experiments or consulting experts might help choose an appropriate model.
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建新的微调模型。确定适合您用例的合适模型。进行实验或咨询专家可能有助于选择适当的模型。
- en: Evaluate the results and go to *step 1* if necessary. This is the most crucial
    step. Determine the evaluation metrics before you start fine-tuning. OpenAI, by
    default, provides you with training loss, training token accuracy, valid loss,
    and valid token accuracy. This serves as a good benchmark, but you should also
    have a way to compare the results with prompt engineering and RAG to calculate
    the LIFT that you got after implementing the RAG or prompt engineering solution..
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估结果，并在必要时回到*步骤1*。这是最重要的步骤。在开始微调之前确定评估指标。OpenAI默认为你提供训练损失、训练令牌准确率、验证损失和验证令牌准确率。这作为一个良好的基准，但你应该也有一种方法来比较与提示工程和RAG的结果，以计算在实施RAG或提示工程解决方案后获得的LIFT。
- en: 'The reasons to fine-tune are as follows:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 微调的原因如下：
- en: If you want to own the model and ensure that data doesn’t leave the four walls
    of your infrastructure, it is best to fine-tune.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望拥有模型并确保数据不会离开你基础设施的四壁，微调是最好的选择。
- en: Fine-tuning might be the right choice when an SLM is enough for your use case.
    It is a quality versus latency trade-off.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当SLM（序列语言模型）足以满足你的用例时，微调可能是一个正确的选择。这是一个质量与延迟之间的权衡。
- en: Fine-tuning might be better if the use case or domain is highly narrow. An example
    of this is that your enterprise uses a highly complicated syntax to retrieve information
    from databases; there is a possibility that fine-tuning the model to learn your
    syntax might be an appropriate choice.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用例或领域非常狭窄，微调可能更好。一个例子是，你的企业使用高度复杂的语法从数据库中检索信息；微调模型以学习你的语法可能是一个合适的选择。
- en: If the use case is so complicated that prompt engineering is impractical, as
    you cannot teach all the workings of this specific use case and contain it in
    a prompt, fine-tuning might be the right choice.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果用例如此复杂，以至于提示工程不切实际，因为你无法教授这个特定用例的所有工作原理并将其包含在提示中，微调可能是一个正确的选择。
- en: Best practices for fine-tuning
  id: totrans-129
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 微调的最佳实践
- en: 'By now, you should have understood the why and how behind fine-tuning. Now,
    let’s explore key pointers to keep in mind while fine-tuning for your enterprise
    use case:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，你应该已经理解了微调的为什么和怎么做。现在，让我们探索在为你的企业用例微调时需要记住的关键要点：
- en: The success of fine-tuning depends on the quality of the pretrained model. When
    selecting a pretrained model, it’s essential to consider its size, the type of
    data it was trained on, and the task it was trained to perform. For example, if
    you’re fine-tuning an image recognition model, you may want to select a pre-trained
    model that was trained on a large dataset of images (refer to [https://saturncloud.io/blog/a-comprehensive-guide-to-fine-tuning/](https://saturncloud.io/blog/a-comprehensive-guide-to-fine-tuning/)
    ).
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调的成功取决于预训练模型的质量。在选择预训练模型时，考虑其大小、训练数据类型以及训练要执行的任务非常重要。例如，如果你正在微调一个图像识别模型，你可能想选择一个在大型图像数据集上训练的预训练模型（参考[https://saturncloud.io/blog/a-comprehensive-guide-to-fine-tuning/](https://saturncloud.io/blog/a-comprehensive-guide-to-fine-tuning/)）。
- en: For smaller models, more data length and breadth are needed to achieve optimized
    fine-tuning performance. It is important to iterate over different models and
    see what best suits your use case. For the data length, consider at least 100
    good examples with diverse examples, including edge cases, so the model can learn
    better.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于较小的模型，需要更多的数据长度和广度来实现优化的微调性能。重要的是要迭代不同的模型，看看哪个最适合你的用例。对于数据长度，考虑至少100个好的例子，包括边缘案例，以便模型能够更好地学习。
- en: Iteratively adjust hyperparameters to optimize the model’s performance. Hyperparameters
    such as the learning rate, the batch size, and the number of epochs can significantly
    affect the model’s performance. Note that epochs affect the training the most.
    Standard epochs are 4, the batch size is usually 256, and the recommended learning
    rate multiplier is 0.1 or 0.2.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逐步调整超参数以优化模型的表现。学习率、批大小和训练轮数等超参数可以显著影响模型的表现。请注意，训练轮数对训练的影响最大。标准的训练轮数是4，批大小通常是256，推荐的学习率乘数是0.1或0.2。
- en: 'Ensure that the fine-tuning data is of both optimal quality and quantity:'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保微调数据在质量和数量上都是最优的：
- en: The dataset should be diverse and include both correct and incorrect responses
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集应该是多样化的，包括正确和错误的响应
- en: The dataset shouldn’t have grammatical, logical, or style issues; otherwise,
    it will degrade the model’s performance
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集不应存在语法、逻辑或风格问题；否则，这会降低模型的表现
- en: Ensure that all your training examples are in the same format, as expected,
    for inference
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保所有您的训练示例都符合预期的推理格式
- en: 'Fine-tuning can be a powerful technique to explore, but it might be expensive
    for organizations to implement. Now, let’s explore another powerful technique
    to optimize your GenAI solutions: prompting.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 微调可以是一种强大的探索技术，但对于组织来说可能成本高昂。现在，让我们探索另一种强大的技术来优化您的GenAI解决方案：提示。
- en: 'Combining RAG, prompt engineering, and fine-tuning: the perfect trifecta'
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结合RAG、提示工程和微调：完美的三合一
- en: 'These three techniques are not mutually exclusive; you don’t have to choose
    one over the other. Depending on the use case, you might want to use them in pairs,
    individually, or all three together. Let’s understand this with an example. Imagine
    you are building a chatbot for customer service for XYZ company:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这三种技术不是相互排斥的；您不必选择其中之一。根据用例，您可能希望成对使用它们，单独使用，或全部一起使用。让我们用一个例子来理解这一点。假设您正在为XYZ公司构建一个客户服务聊天机器人：
- en: '**Prompt engineering/prompting** : You can use prompts to define the chatbot’s
    persona, tone of voice, and how it should handle different inquiries.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示工程/提示**：您可以使用提示来定义聊天机器人的角色、语气和如何处理不同的查询。'
- en: '**RAG** : You can integrate a knowledge base containing the company’s documentation,
    FAQs, and product information. This allows the chatbot to access and utilize relevant
    information to answer customer questions accurately.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RAG**：您可以集成包含公司文档、常见问题解答和产品信息的知识库。这使得聊天机器人能够访问并利用相关信息，准确回答客户问题。'
- en: '**Fine-tuning** : You can fine-tune the chatbot on a dataset of customer interactions,
    teaching it to understand common customer issues, provide helpful solutions, and
    maintain a positive and professional tone (refer to [https://www.linkedin.com/pulse/prompt-engineering-rag-fine-tuning-benefits-when-use-deependra-verma-7g8dc/](https://www.linkedin.com/pulse/prompt-engineering-rag-fine-tuning-benefits-when-use-deependra-verma-7g8dc/)
    ).'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微调**：您可以在客户交互数据集上微调聊天机器人，教它理解常见的客户问题，提供有用的解决方案，并保持积极和专业的语气（参考[https://www.linkedin.com/pulse/prompt-engineering-rag-fine-tuning-benefits-when-use-deependra-verma-7g8dc/](https://www.linkedin.com/pulse/prompt-engineering-rag-fine-tuning-benefits-when-use-deependra-verma-7g8dc/)）。'
- en: 'To summarize the preceding discussion, here is a table to help you choose the
    correct technique for optimization:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 总结前面的讨论，以下是一个表格，帮助您选择正确的优化技术：
- en: '| **Parameter** | **Potential scenarios** | **Optimization technique** | **Word
    of caution** |'
  id: totrans-145
  prefs: []
  type: TYPE_TB
  zh: '| **参数** | **潜在场景** | **优化技术** | **注意事项** |'
- en: '| Accuracy | Missing contextOutdated/biased information | RAGPromptingData
    preprocessing | The golden rule is to try RAG, prompting, or combining both while
    improving accuracy. Fine-tuning can’t be helpful if RAG and prompting fail to
    enhance the use case. |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| 准确性 | 缺少上下文过时/有偏见的信息 | RAG提示数据预处理 | 金规则是尝试RAG、提示或两者结合，同时提高准确性。如果RAG和提示未能增强用例，微调将无济于事。
    |'
- en: '| Consistency | Inconsistent resultsTone is not as per the expectationReasoning
    is not followed correctly | Fine-tuningPrompting | RAG might not be useful here,
    as “inconsistent results” usually mean an issue with the meta prompts. So, always
    start by tweaking meta prompts, and if it doesn’t work, then move on to fine-tuning.
    |'
  id: totrans-147
  prefs: []
  type: TYPE_TB
  zh: '| 一致性 | 结果不一致语气不符合预期推理不正确 | 微调提示 | RAG可能在这里没有用，因为“结果不一致”通常意味着元提示存在问题。因此，始终从调整元提示开始，如果不起作用，再进行微调。'
- en: '| Cost | High **tokens per minute** ( **TPM** )High model costData type processing
    | Model optimization (mixed precision training and knowledge distillation)Choosing
    an SLM over an LLM |  |'
  id: totrans-148
  prefs: []
  type: TYPE_TB
  zh: '| 成本 | 每分钟高**令牌数**（**TPM**）高模型成本数据类型处理 | 模型优化（混合精度训练和知识蒸馏）选择SLM而不是LLM |  |'
- en: '| Performance | High latencyData leakage | Choose a different modelPrompt optimization
    |  |'
  id: totrans-149
  prefs: []
  type: TYPE_TB
  zh: '| 性能 | 高延迟数据泄露 | 选择不同的模型提示优化 |  |'
- en: 'Table 10.2: Choosing the correct technique for optimization'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 表10.2：选择正确的优化技术
- en: Choosing the most suitable technique among RAG, prompting, or fine-tuning can
    be a challenging decision. More often than not, it is a combination of two or
    three techniques that creates impactful AI solutions. Now, let’s explore some
    best practices for this phase of GenAI Ops.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在RAG、提示或微调中选择最合适的技巧可能是一个具有挑战性的决定。通常情况下，两种或三种技术的组合才能创建有影响力的AI解决方案。现在，让我们探索这个GenAI
    Ops阶段的最佳实践。
- en: Best practices for the building phase
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建设阶段的最佳实践
- en: 'Here are a few best practices for the building phase:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些建设阶段的最佳实践：
- en: The rule of thumb is to avoid fine-tuning as much as possible. It is expensive
    and might not provide value for your buck.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个经验法则是尽可能避免微调。它很昂贵，可能不会为您的投资带来价值。
- en: Start with prompt engineering and evaluate your results. The results from prompt
    engineering can serve as a baseline to see whether fine-tuning improves the situation.
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从提示工程开始，并评估您的结果。提示工程的结果可以作为基线，以查看微调是否改善了情况。
- en: If the results from prompt engineering are to your satisfaction, there is a
    90% chance fine-tuning will make it better. If it doesn’t work with prompting,
    there is a 25% chance it will work with prompting.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果提示工程的结果令您满意，那么有90%的几率微调会使它变得更好。如果它不与提示一起工作，那么有25%的几率它会与提示一起工作。
- en: Fine-tuning requires extensive labeled datasets specific to the task. If this
    is scarce, then stick to RAG.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调需要针对特定任务的广泛标记数据集。如果这种数据很少，那么就坚持使用RAG。
- en: Fine-tuning can be computationally intensive, whereas RAG leverages existing
    databases to supplement the generative model, potentially reducing the need for
    extensive training.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调可能计算密集，而RAG利用现有数据库来补充生成模型，可能减少了对广泛训练的需求。
- en: The result is a strong **proof of concept** ( **POC** ) with an execution plan
    to deploy and monitor the application in production.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结果是一个强大的**概念验证**（**POC**），包含部署和监控应用程序的生产执行计划。
- en: In this section, we explored three key techniques for building GenAI solutions
    (RAG, fine-tuning, and prompting), and how they can be combined to create robust
    enterprise applications. We also covered best practices for each approach to ensure
    effective implementation. Next, we’ll dive into the operationalization phase in
    detail.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了构建GenAI解决方案的三个关键技术（RAG、微调和提示），以及它们如何结合以创建稳健的企业应用程序。我们还涵盖了每种方法的最佳实践，以确保有效实施。接下来，我们将详细探讨运营化阶段。
- en: Operationalization
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运营化
- en: 'Once you have a POC, it is time to deploy your application in production. The
    operationalization stage comprises a few main steps: build CI/CD pipelines and
    monitor your application for ethical, operational, and cost metrics. Remember,
    this is an LLM-based solution and can become costly quickly; hence, it is important
    to monitor TPM, cost usage trends, and so on. This section will focus on uncovering
    how to build a robust LLM system’s evaluation strategy and how to optimize the
    performance of the GenAI solution once it is in production.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦有了POC，就是时候在生产中部署您的应用程序了。运营化阶段包括几个主要步骤：构建CI/CD管道，并监控您的应用程序的道德、运营和成本指标。记住，这是一个基于LLM的解决方案，可能会迅速变得昂贵；因此，监控TPM、成本使用趋势等非常重要。本节将重点关注揭示如何构建一个稳健的LLM系统评估策略，以及如何在生产中优化GenAI解决方案的性能。
- en: Evaluations
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估
- en: 'Evaluations are an essential part of the GenAI Ops life cycle. Given the probabilistic
    nature of LLMs, continuously monitoring and evaluating your LLM application’s
    performance is necessary. Another thing to note here is that evaluations are performed
    at two levels: one is the LLM performance, and the other is the LLM system performance.
    We will discuss the performance of the LLM system here.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 评估是GenAI Ops生命周期的重要组成部分。鉴于LLMs的概率性质，持续监控和评估您的LLM应用程序的性能是必要的。在此需要注意的是，评估在两个层面上进行：一个是LLM性能，另一个是LLM系统性能。我们将在这里讨论LLM系统的性能。
- en: 'Let’s look at why GenAI system evaluation is hard:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看为什么GenAI系统评估很难：
- en: Different versions of system prompts and user prompts can change the model’s
    responses, making performance variable and difficult to track.
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统提示和用户提示的不同版本可能会改变模型的响应，使性能变得多变且难以跟踪。
- en: There is a lack of good benchmarks. We will discuss this in the upcoming section.
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏良好的基准。我们将在下一节中讨论这一点。
- en: The need for humans in the loop introduces unwanted bias.
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在线评估中引入人类会引入不希望的偏差。
- en: It is hard to define the right metric for a particular use case.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为特定用例定义正确的指标很困难。
- en: Let’s explore some practical techniques for evaluation.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨一些实用的评估技术。
- en: Offline and online evaluations
  id: totrans-171
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 离线和在线评估
- en: '**Offline evaluation** is where you benchmark the performance of the LLM against
    preselected datasets. It is an effective method to evaluate aspects such as groundedness
    and factuality. Here are a couple of strategies to perform offline evaluation:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**离线评估**是在您将LLM的性能与预先选择的基准数据集进行比较的地方。这是一种评估诸如扎根性和事实性等方面有效的方法。以下是一些执行离线评估的策略：'
- en: '**Golden datasets** : These are curated datasets, preferably by SMEs, that
    cover a diverse set of input and output examples, serving as a benchmark to evaluate
    LLMs’ capabilities. The golden dataset should have the “ground truth” label to
    measure the performance of the LLM evaluation template. This is a great way to
    begin your evaluation journey and prove the feasibility of your minimum viable
    product; however, this approach is not scalable and can introduce human-induced
    bias.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**黄金数据集**：这些是经过精心挑选的数据集，最好由行业专家提供，涵盖了多样化的输入和输出示例，作为评估LLM（大型语言模型）能力的基准。黄金数据集应包含“真实”标签，以衡量LLM评估模板的性能。这是开始你的评估之旅并证明你的最小可行产品可行性的好方法；然而，这种方法不可扩展，可能会引入人为偏差。'
- en: '**Model as a judge** : AI evaluating AI is a scalable evaluation method. It
    is faster and more cost-effective. But as we know, LLMs can also make mistakes;
    hence, having humans in the loop can prove beneficial when evaluating your models.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型作为评判者**：AI评估AI是一种可扩展的评估方法。它更快、更经济。但正如我们所知，LLM也可能犯错；因此，在评估你的模型时，让人类参与其中可能是有益的。'
- en: Once your solution is in production, you can leverage models as a judge along
    with humans in the loop for a few months to monitor the performance. Have a certain
    threshold in place where if the predecided metrics go below a certain threshold,
    it should be flagged to the developer so they can take action on it.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的解决方案投入生产，你可以在几个月内利用模型作为评判者，与人类一起监控性能。设定一个特定的阈值，如果预定的指标低于某个阈值，应向开发者发出警告，以便他们可以采取行动。
- en: '**Online evaluation** is another critical aspect of evaluation, where you leverage
    authentic user data to assess live performance through direct and indirect feedback.
    The **thumbs-up** and **thumbs-down** feature in ChatGPT is an online evaluation
    feature.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '**在线评估**是评估的另一个关键方面，其中你利用真实用户数据通过直接和间接反馈来评估实时性能。ChatGPT中的**点赞**和**点踩**功能就是在线评估功能。'
- en: There was a study conducted by Chatbot Arena ( [https://arxiv.org/html/2403.04132v1](https://arxiv.org/html/2403.04132v1)
    ) where users could submit questions and receive responses from two anonymous
    LLMs. Once they received the responses, they could provide thumbs up or thumbs
    down for the response. The voting process was anonymous and random to ensure fairness.
    These responses were collected into a rich dataset of user prompts and human preferences.
    This is a great example of how online evaluation can be simulated within an enterprise
    as well.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: Chatbot Arena进行了一项研究（[https://arxiv.org/html/2403.04132v1](https://arxiv.org/html/2403.04132v1)），用户可以提交问题并从两个匿名的LLM那里获得回应。一旦他们收到回应，他们可以为回应点赞或点踩。投票过程是匿名的和随机的，以确保公平性。这些回应被收集成一个丰富的用户提示和人类偏好的数据集。这是一个很好的例子，说明了如何在企业内部模拟在线评估。
- en: Best practices for evaluations
  id: totrans-178
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 评估的最佳实践
- en: 'Here are a few best practices to keep in mind for evaluations:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在评估时，请注意以下一些最佳实践：
- en: When using the model as a judge, use the most powerful model you can afford.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当使用模型作为评判者时，使用你负担得起的最高效的模型。
- en: Continuously monitor the LLM system and iterate as needed.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续监控LLM系统并根据需要迭代。
- en: Have humans in the loop to validate the information. Include use case experts
    to provide feedback. No one knows better than they what “good” looks like.
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在线验证信息，包括使用案例专家提供反馈。没有人比他们更清楚“好”是什么样的。
- en: Don’t wait until the end to evaluate the model; evaluations should be part of
    the development cycle.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要等到最后才评估模型；评估应该是开发周期的一部分。
- en: Understand the goal of the LLM-based application clearly; this will help you
    define and prioritize the metrics that make the most sense for your application.
    For example, some applications prioritize fluency and coherence in language generation,
    while others prioritize factual accuracy or domain-specific knowledge (refer to
    [https://medium.com/data-science-at-microsoft/evaluating-llm-systems-metrics-challenges-and-best-practices-664ac25be7e5](https://medium.com/data-science-at-microsoft/evaluating-llm-systems-metrics-challenges-and-best-practices-664ac25be7e5)
    ).
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确了解基于LLM的应用程序的目标；这将帮助你定义和优先考虑对应用程序最有意义的指标。例如，一些应用程序优先考虑语言生成的流畅性和连贯性，而其他应用程序则优先考虑事实准确性或特定领域的知识（参考[https://medium.com/data-science-at-microsoft/evaluating-llm-systems-metrics-challenges-and-best-practices-664ac25be7e5](https://medium.com/data-science-at-microsoft/evaluating-llm-systems-metrics-challenges-and-best-practices-664ac25be7e5)）。
- en: Building evaluations can be tricky. Start by exploring out-of-the-box evaluation
    SDKs to save time and effort. If they don’t work for you, then you can build your
    own evaluation frameworks.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are a few general guidelines on choosing the right metric for evaluation,
    given your use case:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: '**Extracting structured information** : You can look at how well the LLM extracts
    information. For example, you can look at completeness (is there information in
    the input that is not in the output?).'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Question answering** : How well does the system answer the user’s question?
    You can look at the answer’s accuracy, politeness, or brevity.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RAG** : Are the retrieved documents and final answer relevant, grounded,
    and so on?'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This section served as an introduction to evaluations and covered practical
    methods to perform them in an enterprise. In the next section, we will explore
    logging and monitoring for your LLM system.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: Logging and monitoring
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another important step within operationalization is logging and monitoring.
    This mechanism helps to capture the prompts, responses, evaluation scores, as
    well as the metadata, such as the model versions, input data, and so on. This
    data is important for debugging, maintaining an audit trail, and detecting drift
    within the data or the underlying model. This is also a great way to monitor the
    cost of your LLM system as well as the changing user needs.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: An organization doesn’t need to build a new logging and monitoring system; you
    can leverage any existing system and integrate the AI application alerts. Ensure
    that any significant deviations or anomalies are promptly flagged and sent to
    the concerned teams for remediation. You can read about this in detail in the
    book, *Generative AI Application Integration Patterns* ( [https://www.packtpub.com/en-mx/product/generative-ai-application-integration-patterns-9781835887615](https://www.packtpub.com/en-mx/product/generative-ai-application-integration-patterns-9781835887615)
    ).
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: Best practices for once the solution is deployed in production
  id: totrans-194
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The goal is to deploy the GenAI solution into production. Here are a few best
    practices to keep in mind when the solution is in production:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '**Cost threshold** : It’s best to set up thresholds once the AI solution is
    in production. For developers, it is important to receive notifications on their
    allocated budget. There should also be an IT admin continuously receiving updates
    on the cost. If the cost surpasses the threshold, it might be time to analyze
    the workings of your AI system; it could be the choice of model leading to higher
    cost, more traffic than expected, and so on.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Caching** : By storing frequently accessed data, you can improve response
    times without needing to make repeated calls to our API. Your application will
    need to be designed to use cached data whenever possible and invalidate the cache
    when new information is added. There are a few different ways you could do this.
    For example, you could store data in a database, filesystem, or in-memory cache,
    depending on what makes the most sense for your application. Refer to [https://platform.openai.com/docs/guides/production-best-practices](https://platform.openai.com/docs/guides/production-best-practices)
    .'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缓存**：通过存储频繁访问的数据，您可以在不需要重复调用我们的API的情况下提高响应时间。您的应用程序需要设计为尽可能使用缓存数据，并在添加新信息时使缓存失效。您可以通过几种不同的方式来实现这一点。例如，您可以根据应用程序的需要在数据库、文件系统或内存缓存中存储数据。请参阅[https://platform.openai.com/docs/guides/production-best-practices](https://platform.openai.com/docs/guides/production-best-practices)。'
- en: '**Load balancing** : Consider load-balancing techniques to ensure requests
    are distributed evenly across your available servers. Refer to [https://platform.openai.com/docs/guides/production-best-practices](https://platform.openai.com/docs/guides/production-best-practices)
    .'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负载均衡**：考虑负载均衡技术，以确保请求均匀地分布在您的可用服务器上。请参阅[https://platform.openai.com/docs/guides/production-best-practices](https://platform.openai.com/docs/guides/production-best-practices)。'
- en: '**Human feedback loop** : Implement a system where users can flag incorrect
    responses, helping improve the model over time.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人类反馈循环**：实施一个系统，让用户可以标记不正确的响应，帮助模型随着时间的推移不断改进。'
- en: '**Toxicity and bias mitigation** : Regularly test for biases and inappropriate
    outputs using tools such as OpenAI’s Moderation API, Perspective API, or custom
    safety classifiers.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**毒性和偏差缓解**：定期使用OpenAI的Moderation API、Perspective API或自定义安全分类器等工具测试偏差和不适当的输出。'
- en: '**Ethical compliance** : Ensure compliance with regulations (GDPR, HIPAA, etc.),
    maintaining transparency in how the model generates responses.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**道德合规**：确保符合法规（GDPR、HIPAA等），保持模型生成响应的透明度。'
- en: '**Content filtering** : Apply prompt engineering techniques, **reinforcement
    learning from human feedback** ( **RLHF** ), or fine-tuning to prevent hallucinations
    and misinformation.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内容过滤**：应用提示工程技巧、**从人类反馈中进行强化学习**（**RLHF**）或微调，以防止幻觉和错误信息。'
- en: '**Autoscaling and load management** : Implement autoscaling for cloud deployments
    and optimize inference costs by leveraging quantization, pruning, or knowledge
    distillation. We are not covering it in detail here, but attaching resources for
    anyone to review ( [https://medium.com/@sahin.samia/llm-inference-optimization-techniques-a-comprehensive-analysis-1c434e85ba7c](https://medium.com/@sahin.samia/llm-inference-optimization-techniques-a-comprehensive-analysis-1c434e85ba7c)
    ).'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动扩展和负载管理**：为云部署实现自动扩展，并通过利用量化、剪枝或知识蒸馏来优化推理成本。我们在此不详细讨论，但为任何想要审查的人提供资源（[https://medium.com/@sahin.samia/llm-inference-optimization-techniques-a-comprehensive-analysis-1c434e85ba7c](https://medium.com/@sahin.samia/llm-inference-optimization-techniques-a-comprehensive-analysis-1c434e85ba7c)）。'
- en: In this section, we explored the operationalization phase, including evaluation,
    logging, and monitoring, as well as best practices to keep in mind once the solution
    is in production. In the next section, we will explore a case study in detail
    to see how GenAI Ops comes to life in enterprises.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了实施阶段，包括评估、日志记录和监控，以及一旦解决方案投入生产应考虑的最佳实践。在下一节中，我们将详细探讨一个案例研究，以了解GenAI
    Ops在企业中的应用。
- en: Case study – behind the scenes of an enterprise LLM solution
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 案例研究 – 企业LLM解决方案背后的场景
- en: LexCorp (a fictitious company), a leading legal firm specializing in corporate
    law, recognized the potential of AI to revolutionize its operations. With a team
    of over 200 lawyers, LexCorp handles a vast array of contracts daily, ranging
    from mergers and acquisitions to intellectual property agreements. The firm’s
    commitment to innovation led it to invest in developing a domain-specific LLM
    tailored to its unique needs.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: LexCorp（一家虚构的公司），一家领先的专注于公司法的律师事务所，认识到AI革命其运营的潜力。LexCorp拥有一支超过200名律师的团队，每天处理各种合同，从并购到知识产权协议。该事务所对创新的承诺使其投资于开发一个针对其独特需求的特定领域LLM。
- en: 'Building the domain-specific chatbot involved the following steps:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 构建特定领域的聊天机器人涉及以下步骤：
- en: 'The development of LexCorp’s chatbot began with defining the business goal
    to quantify the potential impact of the chatbot. The goal was simple: provide
    tools that could help lawyers become more efficient and focus on important tasks.'
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LexCorp的聊天机器人开发始于定义业务目标，以量化聊天机器人的潜在影响。目标很简单：提供可以帮助律师提高效率并专注于重要任务的工具。
- en: The development started with extensive data collection and identifying experts
    who would validate the output, as well as provide support during the entire development
    process.
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '开发始于广泛的数据收集，以及确定将验证输出并提供整个开发过程支持的专家。 '
- en: The next step involved the identification of the method they would use to build
    the chatbot. In their case, they were confused between RAG and fine-tuning, but
    decided to start with RAG for an efficient and cheaper optimization option.
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下一步涉及确定他们将要使用的构建聊天机器人的方法。在他们的情况下，他们在RAG和微调之间感到困惑，但决定从RAG开始，以获得高效且成本更低的优化选项。
- en: They built a simple UI and grounded the chatbot with the identified data sources.
    They decided to choose the GPT-4o model as it is affordable and yet can handle
    multi-modal data.
  id: totrans-211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们构建了一个简单的用户界面，并将聊天机器人与确定的数据源联系起来。他们决定选择GPT-4o模型，因为它既经济实惠，又能处理多模态数据。
- en: Next, they identified the metrics they would like to measure the performance
    of the chatbot and did thorough testing over a few weeks to ensure that the chatbot
    was generating appropriate responses.
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，他们确定了他们想要用来衡量聊天机器人性能的指标，并在几周内进行了彻底的测试，以确保聊天机器人能够生成适当的响应。
- en: To keep the LLM up to date, the Ops team implemented a robust feedback loop.
    Lawyers using the AI provided continuous feedback on the drafts generated. This
    feedback was meticulously analyzed to identify areas for improvement. Regular
    updates were rolled out, incorporating the latest legal precedents and refining
    the model’s understanding of complex legal concepts. The Ops team also monitored
    the model’s performance, ensuring that it met the firm’s high standards for accuracy
    and reliability.
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了保持大型语言模型（LLM）的更新，运维团队实施了一个强大的反馈循环。使用AI的律师对生成的草稿提供了持续的反馈。这些反馈被仔细分析，以确定改进的领域。定期推出更新，纳入最新的法律先例，并完善模型对复杂法律概念的理解。运维团队还监控了模型的表现，确保其达到公司对准确性和可靠性的高标准。
- en: Reliability was a critical concern for LexCorp. The Ops team employed several
    strategies to ensure that the LLM’s outputs were dependable. They conducted rigorous
    testing, simulating various legal scenarios to evaluate the model’s performance.
    Additionally, they established a system for human oversight, where senior lawyers
    reviewed the AI-generated drafts before finalization. This dual-layer approach
    ensured that the LLM’s outputs were both accurate and legally sound.
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可靠性对LexCorp来说是一个关键问题。运维团队采用了多种策略来确保LLM的输出是可靠的。他们进行了严格的测试，模拟了各种法律场景来评估模型的表现。此外，他们建立了一个人类监督系统，其中资深律师在最终确定之前审查AI生成的草稿。这种双层方法确保了LLM的输出既准确又合法。
- en: LexCorp’s commitment to excellence drove the continuous improvement of its LLM.
    The Ops team leveraged advanced techniques such as transfer learning and reinforcement
    learning to enhance the model’s capabilities. They also explored integrating external
    legal databases to expand the model’s knowledge base.
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LexCorp对卓越的承诺推动了其LLM的持续改进。运维团队利用了迁移学习和强化学习等高级技术来增强模型的能力。他们还探索了整合外部法律数据库，以扩大模型的知识库。
- en: Regular training sessions were conducted for lawyers to familiarize them with
    the AI’s functionalities, fostering a collaborative environment where human expertise
    and AI innovation coexisted harmoniously.
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定期进行培训会议，让律师熟悉AI的功能，营造一个人类专业知识与AI创新和谐共存的合作环境。
- en: 'We can learn the following from LexCorp:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从LexCorp学到以下内容：
- en: Through meticulous data collection, continuous feedback, rigorous testing, and
    ongoing improvements, the firm successfully harnessed the power of GenAI to streamline
    its legal drafting process.
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过细致的数据收集、持续的反馈、严格的测试和持续的改进，该公司成功利用了通用人工智能的力量，简化了其法律起草流程。
- en: They built robust testing and evaluation frameworks from day one, which led
    them to perform incremental updates.
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们从第一天起就建立了稳健的测试和评估框架，这使他们能够进行增量更新。
- en: They started with one team and then rolled out to other teams. Performing a
    phase-wise launch is extremely beneficial when it comes to GenAI development.
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们从一个团队开始，然后扩展到其他团队。在GenAI开发中，分阶段推出极为有益。
- en: They involved business stakeholders from day one and defined what “success”
    would look like. This helped them get the required sponsorship for their product.
    With the help of stakeholders, they were also able to create a golden dataset
    for evaluation.
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们从一开始就涉及业务利益相关者，并定义了“成功”会是什么样子。这有助于他们获得产品所需的赞助。在利益相关者的帮助下，他们还创建了一个用于评估的黄金数据集。
- en: They built a process-oriented product rather than a model-focused one. What
    that means is they didn’t go for the most fancy model, but the one that was cheap
    and could also benefit them for their use case.
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们构建了一个面向流程的产品，而不是以模型为中心的产品。这意味着他们没有追求最花哨的模型，而是选择了既便宜又能满足他们用例需求的模型。
- en: They baked responsible AI practices into their product to be proactive about
    any malicious attacks.
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们将负责任的AI实践融入他们的产品中，以主动应对任何恶意攻击。
- en: They built a simple UI instead of investing tons of resources to integrate into
    their legacy applications on day one. Integration could be managed later, but
    the first step was to get users comfortable with the technology.
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们构建了一个简单的UI，而不是一开始就投入大量资源将其集成到他们的遗留应用程序中。集成可以在以后管理，但第一步是让用户熟悉这项技术。
- en: This case study highlights the importance of collaboration between AI experts
    and domain professionals in achieving reliable and impactful AI solutions.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 这个案例研究强调了AI专家和领域专业人士之间协作的重要性，以实现可靠和有影响力的AI解决方案。
- en: Case study – intelligent claims processing platform
  id: totrans-226
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 案例研究 - 智能索赔处理平台
- en: 'An insurance company wants to automate claims handling for auto accidents.
    The process involves the following:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 一家保险公司希望自动化处理汽车事故的索赔。这个过程包括以下步骤：
- en: '**Structured data** : Policy details, customer demographics, historical claims,
    and coverage limits'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化数据**：保单详情、客户人口统计信息、历史索赔和承保限额'
- en: '**Unstructured data** : Images of damaged vehicles, free-text accident descriptions,
    and repair invoices'
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非结构化数据**：损坏车辆的图片、自由文本的事故描述和维修发票'
- en: Manual review is slow and inconsistent. The goal is to build a web-based UI
    that combines ML inference and LLM reasoning to deliver fast, transparent decisions.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 人工审查既慢又不一致。目标是构建一个基于Web的UI，结合机器学习推理和大型语言模型推理，以提供快速、透明的决策。
- en: 'Let’s look at the solution overview. The platform uses the following:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看解决方案概述。该平台使用以下内容：
- en: '**Computer vision ML model** for image-based damage detection'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算机视觉机器学习模型**用于基于图像的损坏检测'
- en: '**Predictive ML model** that predicts the estimated cost for claims and fraud
    probability'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预测性机器学习模型**：预测索赔的估计成本和欺诈概率'
- en: '**LLM reasoning layer** to synthesize ML outputs and unstructured text into
    a coherent explanation for the claim decision'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**大型语言模型推理层**将机器学习输出和非结构化文本综合成一个连贯的解释，用于索赔决策'
- en: 'Through the following diagram, we can visualize the architecture workflow:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以下图表，我们可以可视化架构工作流程：
- en: '![img](img/B34239_10_03.png)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/B34239_10_03.png)'
- en: 'Figure 10.3: Solution architecture workflow'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.3：解决方案架构工作流程
- en: 'With this visualization in mind, let’s discuss the architecture workflow in
    detail:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这个可视化，让我们详细讨论架构工作流程：
- en: '**Data layer** :'
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据层**：'
- en: '**Structured data** : Policy details, coverage limits, and historical claims
    (stored in relational DB)'
  id: totrans-240
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化数据**：保单详情、承保限额和历史索赔（存储在关系型数据库中）'
- en: '**Unstructured data** : Images (stored in object storage) and accident descriptions
    (text)'
  id: totrans-241
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非结构化数据**：图像（存储在对象存储中）和事故描述（文本）'
- en: '**ML model development** :'
  id: totrans-242
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**机器学习模型开发**：'
- en: '**Vision model** : Train a convoluted neural network (CNN) based model (e.g.,
    EfficientNet or YOLO) for damage detection and severity scoring'
  id: totrans-243
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**视觉模型**：训练基于卷积神经网络（CNN）的模型（例如EfficientNet或YOLO）进行损坏检测和严重程度评分'
- en: '**Tabular model** : Train a gradient boosted tree or a neural network for claim
    cost estimation and fraud risk prediction'
  id: totrans-244
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**表格模型**：训练梯度提升树或神经网络进行索赔成本估计和欺诈风险预测'
- en: '**Output standardization** : Ensure that every model outputs data using the
    same field names and structure. For example, if one model returns `severity_score`
    and another returns `damage_severity` , the orchestration layer must perform additional
    work to interpret them. Standardizing the keys ensures all downstream components
    like the API layer can process the results reliably without additional mapping
    or transformation.'
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ML inference API** :'
  id: totrans-246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Containerize models** : Use **FastAPI** or **Flask** to build REST endpoints.'
  id: totrans-247
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Endpoint** s: Have an endpoint for accepting an image and returning damage
    analysis. Also, have an endpoint for accepting structured data, returning cost,
    and fraud risk.'
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment** : Host on **Azure App Service** or **AWS Lambda** for scalability.'
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Authentication** : Secure with OAuth or API keys.'
  id: totrans-250
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Orchestration layer** : The data fusion service combines outputs from both
    ML APIs and user inputs. Also, it creates a unified JSON payload for reasoning.'
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LLM reasoning agent** : Here’s a prompt template or example:'
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-253
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**LLM integration** : Use **Azure OpenAI** or **OpenAI GPT API** . Then, wrap
    in an agent that does the following:'
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calls ML APIs
  id: totrans-255
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Builds a reasoning prompt
  id: totrans-256
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Returns structured and natural language output
  id: totrans-257
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**UI layer** :'
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Frontend** : React or Angular dashboard; upload images, enter text, view
    ML and LLM outputs'
  id: totrans-259
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Backend gateway** : Handles API calls to ML services and LLM agent'
  id: totrans-260
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Logging, compliance, and evaluation** :'
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Store ML outputs, LLM reasoning text, and final decision for audit and regulatory
    compliance
  id: totrans-262
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Robust evaluations for measuring the performance of the agents through task
    adherence, intent resolution
  id: totrans-263
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Based on the architecture flow, let’s now discuss the core design principles:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent-centric orchestration** :'
  id: totrans-265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The LLM acts as the decision-maker, not just a text generator
  id: totrans-266
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: It decides when to call the ML tool, how to interpret outputs, and how to combine
    structured and unstructured data
  id: totrans-267
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool exposure via API** :'
  id: totrans-268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each ML model (vision and tabular) is wrapped in a REST API
  id: totrans-269
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: These APIs are registered as tools for the agent using a schema (name, description,
    and input/output format)
  id: totrans-270
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The agent can dynamically invoke these tools during reasoning
  id: totrans-271
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data fusion layer** :'
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Before reasoning, outputs from ML tools and user inputs are normalized into
    a single JSON payload
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This ensures that the LLM sees a clean, structured context for reasoning
  id: totrans-274
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt engineering for reasoning** : The agent uses a template prompt that
    includes the following:'
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ML outputs (damage area, severity, cost, and fraud risk)
  id: totrans-276
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Structured data (coverage limits)
  id: totrans-277
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Unstructured text (customer statement)
  id: totrans-278
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is an example:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-280
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**UI integration** :'
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The UI interacts only with the Agent API, not directly with ML models
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This keeps the workflow simple for the user while enabling complex orchestration
    behind the scenes
  id: totrans-283
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Why use this approach?
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
- en: '**Scalability** : Adding new tools (e.g., fraud detection and cost optimization)
    is easy'
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transparency** : LLM reasoning provides human-readable explanations'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**透明度**：LLM推理提供人类可读的解释'
- en: '**Compliance** : Logs every ML output and LLM decision for audit'
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规性**：记录每个ML输出和LLM决策以供审计'
- en: 'The following challenges emerge:'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些挑战：
- en: '**Data integration** : Combining structured (policy tables) and unstructured
    (images and text) data for coherent reasoning'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据集成**：结合结构化（政策表）和非结构化（图像和文本）数据以进行连贯推理'
- en: '**Model interoperability** : Vision and tabular models must output standardized
    formats for LLM consumption'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型互操作性**：视觉和表格模型必须输出标准化的格式以供LLM消费'
- en: '**Prompt robustness** : LLM must handle edge cases (e.g., missing data and
    conflicting signals)'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示鲁棒性**：LLM必须处理边缘情况（例如，缺失数据和冲突信号）'
- en: '**Bias and fairness** : Avoid decisions skewed by demographic data'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**偏差和公平性**：避免由人口统计数据导致的决策偏差'
- en: '**Latency** : Real-time inference and reasoning without degrading user experience'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：实时推理和推理而不降低用户体验'
- en: '**Explainability** : Regulatory compliance requires clear reasoning for every
    decision'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：合规性要求每个决策都有清晰的推理'
- en: 'Here are the added complexities:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些增加的复杂性：
- en: '**Multi-modal reasoning** : LLM interprets numeric scores, textual descriptions,
    and image-derived insights'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态推理**：LLM解释数值分数、文本描述和图像洞察'
- en: '**Dynamic prompts** : Adjust based on missing fields or anomalies'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态提示**：根据缺失字段或异常进行调整'
- en: '**Audit trail** : Store ML outputs and LLM reasoning for compliance'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**审计跟踪**：存储ML输出和LLM推理以供合规性使用'
- en: This solution demonstrates how combining structured and unstructured data with
    ML and LLM reasoning can transform traditional workflows into intelligent, transparent
    systems. By leveraging multi-modal AI, the platform not only accelerates decision-making
    but also builds trust through clear explanations. Ultimately, it sets the stage
    for scalable, compliant, and customer-centric automation in the insurance industry.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 该解决方案展示了如何结合结构化和非结构化数据以及ML和LLM推理，将传统工作流程转变为智能、透明的系统。通过利用多模态AI，该平台不仅加速了决策过程，还通过清晰的解释建立了信任。最终，它为保险行业可扩展、合规和以客户为中心的自动化奠定了基础。
- en: Summary
  id: totrans-300
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we introduced GenAI Ops, focusing on how enterprises can successfully
    build, deploy, and manage LLM systems. We explained the differences between GenAI
    Ops and traditional MLOps, emphasizing the unique challenges of operationalizing
    GenAI in business environments. The chapter covered the GenAI Ops life cycle,
    from ideation and building (including optimization techniques such as RAG, fine-tuning,
    and prompting) to operationalization, evaluation, and monitoring. It also provided
    best practices and a case study illustrating how a legal firm implemented a domain-specific
    LLM solution to streamline contract management.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了GenAI Ops，重点关注企业如何成功构建、部署和管理LLM系统。我们解释了GenAI Ops与传统MLOps之间的区别，强调了在商业环境中实现GenAI的独特挑战。本章涵盖了GenAI
    Ops的生命周期，从构思和构建（包括RAG、微调和提示等优化技术）到运营、评估和监控。它还提供了最佳实践和一个案例研究，说明了法律公司如何实施特定领域的LLM解决方案以简化合同管理。
- en: In the upcoming chapter, we will take this one step forward and discuss AI agents.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将进一步探讨并讨论AI代理。
- en: References
  id: totrans-303
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
