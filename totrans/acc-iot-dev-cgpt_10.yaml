- en: '10'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Setting Up the Development Environment for Your First Project
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In [*Chapter 8*](B22002_08.xhtml#_idTextAnchor216), we covered 10 beginner-friendly
    IoT projects with ChatGPT prompt examples. You might be excited to select one
    and start your innovative development journey. In [*Chapter 9*](B22002_09.xhtml#_idTextAnchor285),
    we went through the application diagram generation approach by using AI-driven
    tools.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we aim to empower you with the practical skills required to
    translate your innovative IoT concepts into reality. Learning how to set up a
    development environment using VS Code, PlatformIO IDE, and other coding extensions
    will provide you with the tools necessary to compile and upload software code
    effectively. Furthermore, creating your first project in PlatformIO will offer
    hands-on experience, deepening your understanding of the development process.
    These skills will not only facilitate your current learning journey, but will
    also equip you for future IoT projects, enhancing your ability to bring your creative
    visions to life.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Installing **Visual Studio Code** (**VS Code**)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Setting up PlatformIO IDE
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Installing other coding assistance extensions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating your first project under PlatformIO
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter will show you how to install VS Code, PlatformIO, and other coding
    assistance extensions on a MacBook. To get optimal results, make sure you have
    your system equipped with an ARM CPU (i.e., Apple M1) running macOS Sonoma, version
    14.3.1.
  prefs: []
  type: TYPE_NORMAL
- en: Installing Visual Studio Code (VS Code)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Visual Studio Code**, commonly referred to as **VS Code**, is a lightweight
    yet powerful source code editor developed by Microsoft. It offers built-in support
    for JavaScript, TypeScript, and Node.js, along with a rich ecosystem of extensions
    for other languages such as C++, C#, Python, PHP, and more. Furthermore, it provides
    features such as debugging, syntax highlighting, intelligent code completion,
    snippets, code refactoring, and embedded Git.'
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we are going to instruct the VS Code installation on macOS.
    You may find the installation guidance on Windows and Linux from the internet.
  prefs: []
  type: TYPE_NORMAL
- en: 'To kick off the setup for our project, let’s look at the following process
    and install VS Code on macOS:'
  prefs: []
  type: TYPE_NORMAL
- en: First and foremost, you need to download the VS Code software from [https://code.visualstudio.com/](https://code.visualstudio.com/)
    by clicking on **Download** **Mac Universal**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.1 – Downloading VS Code](img/B22002_10_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.1 – Downloading VS Code
  prefs: []
  type: TYPE_NORMAL
- en: Click on the downloaded **Visual Studio Code** software in your system’s **Downloads**
    directory.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.2 – Finding VS Code in Downloads](img/B22002_10_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.2 – Finding VS Code in Downloads
  prefs: []
  type: TYPE_NORMAL
- en: You will now see the **Welcome** page. From here, you can choose a theme according
    to your preference.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.3 – VS Code Welcome page](img/B22002_10_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.3 – VS Code Welcome page
  prefs: []
  type: TYPE_NORMAL
- en: On the left sidebar, find the *Extensions* icon (arrowed in *Figure 10**.4*).
    We will install PlatformIO and other coding assistance tools from this *Extension*
    section.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.4 – Extensions in the VS Code Welcome page](img/B22002_10_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.4 – Extensions in the VS Code Welcome page
  prefs: []
  type: TYPE_NORMAL
- en: You have now completed the initial installation of VS Code. The next step is
    to install the PlatformIO IDE extension on VS Code.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up PlatformIO IDE
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'An open source **Integrated Development Environment** (**IDE**), **PlatformIO**
    works cross-platform and cross-architecture. It supports over 30 embedded platforms,
    features a multi-platform build system, includes numerous libraries, and supports
    over 800 open source hardware boards. It also serves as a powerful extension for
    coding in VS Code. In the following steps, we will learn how to install PlatformIO:'
  prefs: []
  type: TYPE_NORMAL
- en: Continuing from *step 4* of the previous section, click on **Extensions**. You’ll
    find the search window at the upper left, as visible in *Figure 10**.5*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.5 – Extension search window](img/B22002_10_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.5 – Extension search window
  prefs: []
  type: TYPE_NORMAL
- en: Type `Platformio` into the search window to locate it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.6 – Searching “Platformio” in search window](img/B22002_10_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.6 – Searching “Platformio” in search window
  prefs: []
  type: TYPE_NORMAL
- en: Click **Install** under **PlatformIO IDE** to install this extension.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.7 – Select and install “PlatformIO IDE”](img/B22002_10_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.7 – Select and install “PlatformIO IDE”
  prefs: []
  type: TYPE_NORMAL
- en: 'After the installation, you will see the **Welcome** page of **PlatformIO**
    as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.8 – PlatformIO IDE welcome page](img/B22002_10_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.8 – PlatformIO IDE welcome page
  prefs: []
  type: TYPE_NORMAL
- en: To initiate PlatformIO for the first time, click on the icon resembling an *ant’s
    head*. This action will start the PlatformIO initialization process. This process
    includes the installation of PlatformIO Core and other required software packages
    such as Python and *clang*. Please install them as required and note that this
    might take several minutes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.9 – First launch of PlatformIO after installation](img/B22002_10_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.9 – First launch of PlatformIO after installation
  prefs: []
  type: TYPE_NORMAL
- en: Allow *clang* to be installed by clicking **Install** if it hasn’t been installed
    on your MacBook before.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.10 – Clang tools installation](img/B22002_10_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.10 – Clang tools installation
  prefs: []
  type: TYPE_NORMAL
- en: Continue the installation process on the next screen, as shown in *Figure 10**.11*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.11 – PlatformIO Core initialization process](img/B22002_10_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.11 – PlatformIO Core initialization process
  prefs: []
  type: TYPE_NORMAL
- en: Click **Reload Now** after the installation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.12 – Initialization completion and reloading PlatformIO](img/B22002_10_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.12 – Initialization completion and reloading PlatformIO
  prefs: []
  type: TYPE_NORMAL
- en: After reloading, you will see the PlatformIO interface as shown in *Figure 10**.12*.
    Ccontinue clicking on **TERMINAL** and you will be directed to the PlatformIO
    terminal window.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.13 – Open the terminal window](img/B22002_10_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.13 – Open the terminal window
  prefs: []
  type: TYPE_NORMAL
- en: Now we are going to install the open source software package manager. Linux
    systems such as Ubuntu and Debian use `/bin/bash -c “$(curl -``fsSL` [https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh](https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)`)”`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.14 – Copy the Homebrew installation link](img/B22002_10_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.14 – Copy the Homebrew installation link
  prefs: []
  type: TYPE_NORMAL
- en: Switch to your VS Code window, paste the installation link in the **TERMINAL**
    command line, and press *Enter*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.15 – Paste the Homebrew installation link in the Terminal window
    of PlatformIO](img/B22002_10_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.15 – Paste the Homebrew installation link in the Terminal window of
    PlatformIO
  prefs: []
  type: TYPE_NORMAL
- en: You may be requested to type in your root user password, which is the login
    password for your MacBook.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.16 – Type in your root user password](img/B22002_10_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.16 – Type in your root user password
  prefs: []
  type: TYPE_NORMAL
- en: The installation process of Homebrew will start. Then, press *RETURN* or *ENTER*
    to continue when required.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.17 – Start Homebrew installation on PlatformIO](img/B22002_10_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.17 – Start Homebrew installation on PlatformIO
  prefs: []
  type: TYPE_NORMAL
- en: 'After the installation process of Homebrew is complete, follow the indication
    to add Homebrew to your `PATH`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.18 – Add Homebrew to the PATH of your MacOS](img/B22002_10_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.18 – Add Homebrew to the PATH of your MacOS
  prefs: []
  type: TYPE_NORMAL
- en: Copy, paste, and run the first command.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.19 – Execute the first command](img/B22002_10_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.19 – Execute the first command
  prefs: []
  type: TYPE_NORMAL
- en: Then copy, paste, and run the second command.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.20 – Execute the second command](img/B22002_10_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.20 – Execute the second command
  prefs: []
  type: TYPE_NORMAL
- en: In the Terminal window, install PlatformIO CLI (command line) with `brew` `install
    platformio`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.21 – Use Homebrew to install PlatformIO CLI](img/B22002_10_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.21 – Use Homebrew to install PlatformIO CLI
  prefs: []
  type: TYPE_NORMAL
- en: Upon completion of the PlatformIO CLI installation, restart your VS Code to
    use the PlatformIO command line in the Terminal window.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.22 – Install the PlatformIO source through the CLI](img/B22002_10_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.22 – Install the PlatformIO source through the CLI
  prefs: []
  type: TYPE_NORMAL
- en: After restarting, install the latest stable PlatformIO packages in the Terminal
    window via the CLI using `pio platform` `install espressif32`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.23 – Install PlatformIO latest package](img/B22002_10_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.23 – Install PlatformIO latest package
  prefs: []
  type: TYPE_NORMAL
- en: The installation process should now be running as seen in the following figure.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.24 – PlatformIO package installation process](img/B22002_10_24.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.24 – PlatformIO package installation process
  prefs: []
  type: TYPE_NORMAL
- en: Once the installation process is complete, you need to restart VS Code. Congratulations!
    You have successfully set up the development environment and are ready to start
    your first project!
  prefs: []
  type: TYPE_NORMAL
- en: After installation, you can check your PlatformIO system information with the
    `pio system info` command in the Terminal window.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.25 – Check the PlatformIO package information](img/B22002_10_25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.25 – Check the PlatformIO package information
  prefs: []
  type: TYPE_NORMAL
- en: We have now successfully completed the installation of the PlatformIO IDE extension
    on Visual Studio Code. This includes its CLI and the most recent package. This
    setup forms the foundational structure for our coding environment.
  prefs: []
  type: TYPE_NORMAL
- en: To optimize our development workflow and experience, it is essential to consider
    installing additional extensions. These extensions can significantly enhance your
    coding, troubleshooting, and testing processes.
  prefs: []
  type: TYPE_NORMAL
- en: Installing other coding assistance extensions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are many coding assistance tools available as extensions in VS Code,
    such as Prettier, Indent Rainbow, and Better Comments. They can help make your
    code easier to read and debug, and enhance your coding experience:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prettier**: A popular code formatter, it supports many languages and integrates
    well with VS Code. Prettier automatically formats your code according to a set
    of predefined style guidelines. This helps to keep your code looking clean and
    consistent, making it easier to read and maintain. You can configure it to format
    your code each time you save a file, or you can run it manually. This tool is
    especially useful in team projects to ensure that everyone adheres to the same
    coding style, thereby reducing discrepancies and improving collaboration.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Indent Rainbow**: This is a visual tool that makes indentation more readable
    by coloring indent levels in a gradient-like manner. Each indentation level is
    given a distinct color, which helps in distinguishing the scopes and blocks of
    code at a glance. This can be particularly helpful in languages where indentation
    plays a crucial role, such as Python, or in any complex nested code structure,
    making it easier to follow the logical flow of the code. The colors and the number
    of spaces considered as an indentation level are customizable, allowing users
    to tailor the appearance to their liking and coding standards.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Better Comments**: This enhances the readability and functionality of comments
    within your code. This extension allows you to categorize and color-code your
    comments, making them more noticeable and organized. For instance, you can differentiate
    comments that are informational, questions, TODOs, highlights, or alerts, each
    with different colors or formats.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating your first project under PlatformIO
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'After setting up the development environment, let’s walk through the process
    of creating your first project in PlatformIO:'
  prefs: []
  type: TYPE_NORMAL
- en: Click the PlatformIO icon in the left-hand bar.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.26 – Launch PlatformIO IDE in VS Code](img/B22002_10_26.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.26 – Launch PlatformIO IDE in VS Code
  prefs: []
  type: TYPE_NORMAL
- en: Click **Open** under **PIO Home**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.27 – PlatformIO welcome page](img/B22002_10_27.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.27 – PlatformIO welcome page
  prefs: []
  type: TYPE_NORMAL
- en: Click **New Project** under **Quick Access**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.28 – Create a new project](img/B22002_10_28.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.28 – Create a new project
  prefs: []
  type: TYPE_NORMAL
- en: You will see **Project Wizard** as shown in the following figure. Give the project
    a name in the **Name** field.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.29 – Give the project a name](img/B22002_10_29.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.29 – Give the project a name
  prefs: []
  type: TYPE_NORMAL
- en: Click the **Board** dropdown to find your ESP32 board model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.30 – Find the hardware type](img/B22002_10_30.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.30 – Find the hardware type
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you want to use ESP32-C3, you can type in `esp32-c3`, and you
    will find your expected board model. Click the model name to select it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10.31 – Select the hardware you are going to use](img/B22002_10_31.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.31 – Select the hardware you are going to use
  prefs: []
  type: TYPE_NORMAL
- en: In the **Framework** dropdown, make sure to select **Arduino Framework**, and
    click **Finish**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.32 – Select “Arduino Framework” for the Framework dropdown](img/B22002_10_32.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.32 – Select “Arduino Framework” for the Framework dropdown
  prefs: []
  type: TYPE_NORMAL
- en: Then PlatformIO starts to configure your project automatically as shown in the
    following figure.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.33 – New project being created](img/B22002_10_33.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.33 – New project being created
  prefs: []
  type: TYPE_NORMAL
- en: Click **Yes, I trust the authors** to continue.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.34 – Select “Yes” to trust the authors](img/B22002_10_34.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.34 – Select “Yes” to trust the authors
  prefs: []
  type: TYPE_NORMAL
- en: Now your first project has been created correctly as seen in the following figure.
    Click **src** in the left-hand bar and you will see **main.cpp**, which is the
    place where you will program your C++ code snippets.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 10.35 – Browse the main.cpp template](img/B22002_10_35.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.35 – Browse the main.cpp template
  prefs: []
  type: TYPE_NORMAL
- en: By now, all necessary development environment settings should be correctly configured.
    You should be able to successfully create your first IoT project in PlatformIO
    IDE.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you have set up your development environment and are ready
    to create your first IoT project. Now that you have configured VS Code and PlatformIO
    IDE, you have the tools and knowledge you need to embark on this innovative journey.
    In the upcoming chapter, we will guide you through the practical implementation
    of your first project, helping you to apply what you’ve learned effectively.
  prefs: []
  type: TYPE_NORMAL
