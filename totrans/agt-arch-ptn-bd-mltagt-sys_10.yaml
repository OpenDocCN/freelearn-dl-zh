- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Human-Agent Interaction Patterns
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人机交互模式
- en: 'In the previous chapters, we established the architectural patterns for making
    agentic systems coordinated, compliant, and robust. A system that is reliable
    and transparent is the essential foundation for the most critical relationship
    of all: the one between the AI agent and its human user. For agentic systems to
    move beyond backend automation and truly augment human knowledge workers, their
    interactions with people must be intuitive, trustworthy, and effective.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在前几章中，我们建立了构建具有协调性、合规性和鲁棒性的智能体系统的架构模式。一个可靠且透明的系统是所有关键关系中最重要的基础：即人工智能代理与其人类用户之间的关系。为了使智能体系统超越后端自动化，真正增强人类知识工作者的能力，它们与人们的互动必须直观、值得信赖且有效。
- en: This chapter is dedicated to the patterns that govern this crucial interface.
    To make these patterns as actionable as possible, we will take a "map before the
    journey" approach. Before detailing each individual pattern, we will first present
    a strategic guide to implementation. This guide introduces a maturity model that
    organizes the patterns into a clear, progressive roadmap, moving from simple transactional
    bots to proactive, collaborative partners.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章致力于规范这一关键界面的模式。为了使这些模式尽可能具有可操作性，我们将采取“事前规划”的方法。在详细说明每个个别模式之前，我们首先将提供一个实施战略指南。该指南介绍了一个成熟度模型，该模型将模式组织成一个清晰、渐进的路线图，从简单的交易型机器人到主动的、协作的合作伙伴。
- en: By understanding the bigger picture first, you will have the context to appreciate
    where each specific pattern fits and why it is essential for building agentic
    systems that are not only powerful but also safe, usable, and ultimately, adopted
    by the people they are designed to serve.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 通过首先理解大局，您将拥有欣赏每个特定模式如何适应以及为什么它对于构建既强大又安全、可用，最终被设计为其服务的受众所采用的智能体系统至关重要的背景。
- en: 'In this chapter, we''ll be covering the following topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主题：
- en: Strategic guide to implementing human-agent interaction patterns
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施人机交互模式的战略指南
- en: Agent Calls Human (Human-in-the-Loop Escalation)
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理调用人类（人类在回路中的升级）
- en: Human Delegates to Agent
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类代表到代理
- en: Human Calls Agent
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人类调用代理
- en: Agent Delegates to Agent
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理代表到代理
- en: Agent Calls Proxy Agent
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理调用代理
- en: Strategic guide to implementing human-agent interaction patterns
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实施人机交互模式的战略指南
- en: Knowing the individualidx_0c175e8f patterns for human-agent interaction is the
    first step. The next step is applying them strategically to build systems that
    are both powerful and trustworthy. It's not necessary or even advisable to implement
    all patterns at once. The correct approach is to adopt them progressively as your
    system's complexity and the need for sophisticated, collaborative workflows grow.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 了解人机交互的个别模式是第一步。下一步是将它们战略性地应用于构建既强大又值得信赖的系统。一次性实施所有模式不仅不切实际，对于早期阶段的系统来说通常也不必要。正确的方法是随着您系统的复杂性和对复杂、协作工作流程的需求逐渐增长，逐步采用这些模式。
- en: Levels of human-agent interaction
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人机交互级别
- en: A common question whenidx_662fabb2 faced with a comprehensive pattern language
    is, "Where do I start?" Implementing all of these patterns at once is not only
    impractical but often unnecessary for systems in their early stages. The key to
    success is progressive adoption, building a foundation of simple, reliable interactions
    and adding more sophisticated layers of autonomy and collaboration as your agentic
    system grows in complexity and responsibility.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 面对一个全面的模式语言时，一个常见的问题是，“我从哪里开始？”一次性实施所有这些模式不仅不切实际，对于早期阶段的系统来说通常也不必要。成功的关键是逐步采用，建立一个简单、可靠的交互基础，并在您的智能体系统在复杂性和责任方面增长时，添加更复杂的自主和协作层。
- en: The following maturity model provides a strategic roadmap for this journey.
    It organizes the human-agent interaction patterns into five distinct levels, moving
    from basic transactional bots to proactive, collaborative digital assistants.
    By identifying your system's current needs and future goals, you can use this
    model to select the right set of patterns to implement at the right time.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的成熟度模型为这一旅程提供了战略路线图。它将人机交互模式组织成五个不同的级别，从基本的交易型机器人到主动的、协作的数字助手。通过确定您系统的当前需求和未来目标，您可以使用此模型选择在正确的时间实施的正确模式集。
- en: '| **Level** | **Capabilities** | **Enabled** **p****atterns** | **Summary**
    |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| **级别** | **能力** | **启用** **模式** | **摘要** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| 1\. Transactional systems | Direct, single-turn interactions | Human Calls
    Agent | The system acts as a responsive tool, handling simple, well-defined commands
    and queries with speed and accuracy |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
  zh: '| 1. 事务性系统 | 直接、单轮交互 | Human Calls Agent | 系统作为响应性工具，以速度和准确性处理简单、定义明确的命令和查询
    |'
- en: '| 2\. Assisted automation | Basic delegation and escalation | Human Delegates
    to AgentAgent Calls Human | The system can take on simple multi-step tasks but
    knows its limits, reliably escalating to a human for ambiguity or approval |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
  zh: '| 2. 辅助自动化 | 基本委派和升级 | Human Delegates to AgentAgent Calls Human | 系统可以承担简单的多步任务，但了解其局限性，在模糊或需要批准时可靠地升级到人类
    |'
- en: '| 3\. Collaborative systems | Internal multi-agent workflows | Agent Delegates
    to Agent | The system can solve complex problems by orchestrating a team of internal
    specialist agents, hidden from the user |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
  zh: '| 3. 协作系统 | 内部多代理工作流程 | Agent Delegates to Agent | 系统可以通过协调一组内部专家代理（对用户隐藏）来解决复杂问题
    |'
- en: '| 4\. Secure and interoperable ecosystems | Secure external interactions |
    Agent Calls Proxy Agent | The system can securely and reliably interact with third-party
    systems, enabling cross-enterprise collaboration |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| 4. 安全且可互操作的生态系统 | 安全的外部交互 | Agent Calls Proxy Agent | 系统可以安全可靠地与第三方系统交互，实现跨企业协作
    |'
- en: '| 5\. Proactive and personalized partners | Anticipatory, context-aware collaboration
    | All patterns, combined with long-term memory | The system evolves from a tool
    to a partner, learning user preferences and proactively assisting with complex
    goals |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| 5. 积极个性化的合作伙伴 | 预测性、上下文感知的协作 | 所有模式，结合长期记忆 | 系统从工具进化为合作伙伴，学习用户偏好，并积极协助实现复杂目标
    |'
- en: Table 8.1 – A maturity model for adopting human-agent interaction patterns
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 表 8.1 – 采用人类-代理交互模式的成熟度模型
- en: This maturity idx_81434e72model provides the *when* (a guide to the sequence
    of adoption). However, to implement these patterns effectively, we also need to
    understand the *where* (how they fit into the different functional layers of a
    production-grade system). The following architecture provides a practical blueprint
    for integrating these patterns into a cohesive whole.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 此成熟度 idx_81434e72 模型提供了 *何时*（采用顺序指南）。然而，为了有效地实施这些模式，我们还需要了解 *何地*（它们如何适应生产级系统的不同功能层）。以下架构为将这些模式集成到一个统一的整体中提供了一个实际蓝图。
- en: 'System integration architecture: how the patterns work together'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统集成架构：这些模式如何协同工作
- en: 'This architecture shows how the idx_b904c171patterns can be organized into
    functional tiers within a complete application. These layers ensure a clear separation
    of concerns, from the user-facing interface to the secure handling of external
    communications:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 此架构展示了如何将 idx_b904c171 模式组织成完整应用程序中的功能层。这些层确保了从面向用户的界面到安全处理外部通信的明确分离：
- en: '**User** **i****nterface** (**UI**)**t****ier**: This is the direct point of
    contact for the human user. All interactions are initiated here.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户** **界面** (**UI**)**层**：这是与人类用户直接接触的点。所有交互都从这里发起。'
- en: '**Patterns enabled**: ***Human Calls Agent*** (for direct commands) and ***Human
    Delegates to Agent*** (for complex goals).'
  id: totrans-29
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**启用模式**：***Human Calls Agent***（用于直接命令）和***Human Delegates to Agent***（用于复杂目标）。'
- en: '**Orchestration** **and p****rimary** **a****gent** **t****ier**: This tier
    houses the primary agent that the user interacts with (e.g., `TravelPlannerAgent`
    and `ResearchAssistantAgent`). It is responsible for high-level planning, decomposing
    user goals, and managing the overall workflow.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编排** **和** **主要** **代理** **层**：此层托管用户交互的主要代理（例如，`TravelPlannerAgent` 和 `ResearchAssistantAgent`）。它负责高级规划、分解用户目标，并管理整体工作流程。'
- en: '**Patterns enabled**: It receives delegated tasks and initiates ***Agent Delegates
    to Agent*** calls to the specialist tier. It is also responsible for handling
    escalations via the ***Agent Calls Human*** pattern.'
  id: totrans-31
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**启用模式**：它接收委派的任务，并启动对专家层的 ***Agent Delegates to Agent*** 调用。它还负责通过 ***Agent
    Calls Human*** 模式处理升级。'
- en: '**Specialist** **and w****orker** **a****gent** **t****ier**: This tier contains
    the functional, fine-grained agents that perform the core business logic (e.g.,
    `FlightBookingAgent` and `NewsSentimentAgent`).'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专家** **和** **工作者** **代理** **层**：此层包含执行核心业务逻辑的功能性、细粒度代理（例如，`FlightBookingAgent`
    和 `NewsSentimentAgent`）。'
- en: '**Patterns enabled**: It executes tasks received via the ***Agent Delegates
    to Agent*** pattern and, when necessary, initiates external requests through the
    security tier.'
  id: totrans-33
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**启用的模式**：它执行通过 ***Agent Delegates to Agent*** 模式接收到的任务，并在必要时通过安全层发起外部请求。'
- en: '**Security** **and p****roxy** **t****ier**: This is a specialized, isolated
    layer responsible for all external communications.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和代理层**：这是一个专门、隔离的层，负责所有外部通信。'
- en: '**Patterns enabled**: It idx_dbfb5cb2houses the proxy agents that act as secure
    gateways to third-party APIs or other enterprise systems via the ***Agent Calls
    Proxy Agent*** pattern. This tier is the only one with the credentials and logic
    to interact with the outside world.'
  id: totrans-35
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**启用的模式**：它通过 ***Agent Calls Proxy Agent*** 模式idx_dbfb5cb2托管代理，这些代理作为安全网关，通过第三方API或其他企业系统进行交互。这一层是唯一一个拥有与外界交互的凭证和逻辑的层。'
- en: 'To see how these patterns connect in a real-world scenario, let''s walk through
    a common enterprise task: booking corporate travel.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解这些模式如何在现实世界场景中相互连接，让我们通过一个常见的企业任务：预订企业差旅来进行分析。
- en: 'Pattern chaining in practice: a corporate travel booking example'
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实践中的模式链：企业差旅预订示例
- en: This example illustrates how theidx_62371dd6 different interaction and delegation
    patterns chain together to fulfill a complex user goal, with the system seamlessly
    escalating for human input when it reaches its operational limits.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子说明了idx_62371dd6不同的交互和委托模式如何链在一起，以满足复杂的用户目标，当系统达到其操作极限时，系统会无缝升级以获取人类输入。
- en: This example illustrates how the patterns work together in a real workflow to
    fulfill a complex user request.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子说明了这些模式如何在实际的工作流程中协同工作，以满足复杂的用户请求。
- en: 'Here is the travel booking flow:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是差旅预订流程：
- en: '***Human Delegates to Agent***: A user tells the `TravelOrchestratorAgent`
    to do the following: `Book me a trip to the New York office next week for the
    Q3 planning meeting. Get me a refundable flight and a room at our` `corporate
    preferred` `hotel.`'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***人类到代理***：用户告诉 `TravelOrchestratorAgent` 执行以下操作：`为我预订下周去纽约办公室的行程，以参加Q3规划会议。为我预订可退款的航班和一家我们`
    `公司首选` `的酒店。`'
- en: '***Agent Delegates to Agent***: The `TravelOrchestratorAgent` decomposes the
    goal and delegates sub-tasks:'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***代理委托给代理***：`TravelOrchestratorAgent` 将目标分解并委托子任务：'
- en: It sends `Find refundable flights to JFK for next week` to its specialist `FlightBookingAgent`
  id: totrans-43
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它向其专家 `FlightBookingAgent` 发送 `Find refundable flights to JFK for next week`
- en: It sends `Find rooms at corporate hotel in NYC for next week` to its specialist
    `HotelBookingAgent`
  id: totrans-44
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它向其专家 `HotelBookingAgent` 发送 `Find rooms at corporate hotel in NYC for next
    week`
- en: '***Agent Calls Proxy Agent***: The `FlightBookingAgent` must use the company''s
    secure travel portal (Concur). It calls a `ConcurProxyAgent`, passing the flight
    criteria. The proxy is the only agent with the API keys to securely interact with
    the Concur service.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***代理调用代理代理***：`FlightBookingAgent` 必须使用公司的安全旅行门户（Concur）。它调用一个 `ConcurProxyAgent`，传递航班标准。代理是唯一一个拥有API密钥，可以安全地与Concur服务交互的代理。'
- en: '***Agent Calls Human***: The `HotelBookingAgent` discovers the preferred hotel
    is sold out. It identifies two other approved hotels, but cannot decide on its
    own. It triggers an escalation: `The corporate hotel is unavailable. Would you
    prefer` `Hotel A (closer to the office) or Hotel B (better amenities)?` The orchestrator
    pauses the workflow.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***代理调用人类***：`HotelBookingAgent` 发现首选酒店已售罄。它确定了另外两家获批准的酒店，但无法自行决定。它触发了升级：`公司酒店不可用。您更倾向于`
    `酒店A（靠近办公室）还是酒店B（更好的设施）？`编排器暂停了工作流程。'
- en: '***Human Calls Agent***: The user receives the notification and replies: `"Book
    Hotel A."` This is a direct, transactional command that resolves the ambiguity.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***人类调用代理***：用户收到通知并回复：“预订酒店A。”这是一个直接、事务性的命令，解决了歧义。'
- en: The `TravelOrchestratorAgent` receives the human's decision, directs the `HotelBookingAgent`
    to proceed, collectsidx_57fd60e8 the final confirmations from all specialists,
    and presents a complete itinerary to the user.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`TravelOrchestratorAgent` 收到人类的决定，指导 `HotelBookingAgent` 继续操作，收集idx_57fd60e8所有专家的最终确认，并向用户展示完整的行程。'
- en: Consistent with our approach in *[Chapter 7](Chapter_7.xhtml#h1_269)*, we have
    included dedicated sections for pattern chaining and evaluation metrics in this
    chapter. While the foundational patterns explored in *Chapters 5 and 6* focused
    on the internal logic of agent coordination and observability, *Chapters 7 and
    8* focus on the critical points of contact where the system meets the real world.
    In human-agent interaction, "success" is often perceived as subjective. However,
    for a system to be enterprise-grade, we must move beyond anecdotal feedback and
    transform user experience into objective, measurable data. By chaining these interaction
    patterns and applying the following metrics, you can quantify the efficiency of
    your human-in-the-loop workflows and ensure that your agents are providing genuine,
    measurable value to the knowledge workers they assist.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们在*[第7章](Chapter_7.xhtml#h1_269)*中的方法一致，我们在本章中包括了针对模式链和评估指标的专用部分。虽然第5章和第6章中探索的基础模式侧重于代理协调和可观察性的内部逻辑，而第7章和第8章则侧重于系统与真实世界接触的关键点。在人类-代理交互中，“成功”通常被视为主观的。然而，对于一个企业级系统来说，我们必须超越轶事反馈，将用户体验转化为客观、可衡量的数据。通过链式这些交互模式并应用以下指标，您可以量化您的人类在环工作流程的效率，并确保您的代理为所协助的知识工作者提供了真实、可衡量的价值。
- en: 'Measuring success: evaluation metrics by pattern'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测量成功：按模式评估的评估指标
- en: In a production-grade system, useridx_d7c522f2 experience cannot be a matter
    of opinion; it must be measured. Implementing these patterns requires careful
    design and development, so teams must be able to quantify the value they provide.
    By defining clear metrics for each pattern, you can track their effectiveness,
    diagnose weaknesses, and justify continued investment in a user-centric agentic
    architecture.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个生产级系统中，useridx_d7c522f2 的体验不能是意见的问题；它必须被衡量。实施这些模式需要仔细的设计和开发，因此团队必须能够量化他们提供的价值。通过为每个模式定义清晰的指标，您可以跟踪其有效性，诊断弱点，并证明对以用户为中心的代理架构的持续投资是合理的。
- en: The following table provides sample metrics and instrumentation strategies to
    help you measure the impact of these key interaction patterns.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格提供了示例指标和仪表策略，以帮助您衡量这些关键交互模式的影响。
- en: '| **Pattern** | **Metric** | **Instrumentation** |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| **模式** | **指标** | **仪表** |'
- en: '| --- | --- | --- |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Agent Calls Human | Escalation rate/resolution time | Log every escalation
    event. Measure the time from escalation to human response and subsequent task
    resumption. |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| 代理呼叫人类 | 升级率/解决时间 | 记录每个升级事件。测量从升级到人类响应以及后续任务恢复的时间。|'
- en: '| Human Delegates to Agent | Task success rate/user satisfaction | Track the
    end-to-end completion rate of delegated goals. Follow up with a simple user survey
    (CSAT/NPS). |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
  zh: '| 人类委派给代理 | 任务成功率/用户满意度 | 跟踪委派目标的端到端完成率。通过简单的用户调查（CSAT/NPS）进行跟进。|'
- en: '| Human Calls Agent | First-contact resolution rate/average response time |
    Measure the percentage of queries solved in a single turn. Track the end-to-end
    latency from user input to final response. |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| 人类呼叫代理 | 首次接触解决率/平均响应时间 | 测量单次交互中解决问题的百分比。跟踪从用户输入到最终响应的端到端延迟。|'
- en: '| Agent Delegates to Agent | Orchestration overhead/sub-task failure rate |
    Log timestamps for each inter-agent delegation and response to measure added latency.
    Track errors returned by specialist agents. |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| 代理委派给代理 | 协调开销/子任务失败率 | 记录每个代理间委派和响应的时间戳，以衡量增加的延迟。跟踪专家代理返回的错误。|'
- en: '| Agent Calls Proxy Agent | External API error rate/security incidents | Monitor
    logs from the proxy agent for failed or timed-out API calls. Implement security
    monitoring on the proxy''s isolated environment. |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 代理呼叫代理 | 外部API错误率/安全事件 | 监控代理的日志，以监测失败的或超时的API调用。在代理的隔离环境中实施安全监控。|'
- en: Table 8.2 – Sample metrics for evaluating patterns.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 表8.2 – 评估模式的示例指标。
- en: By defining idx_09cea4e6clear metrics, we transform the abstract goal of a "good
    user experience" into a tangible, measurable quality of our agentic systems. This
    data-driven approach is essential for justifying the architectural choices these
    patterns represent and for driving continuous improvement. With a comprehensive
    language of patterns for human-agent collaboration and a clear methodology for
    evaluating their impact, we have now completed our deep dive into building systems
    that work effectively with people.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 通过定义idx_09cea4e6清晰的指标，我们将“良好用户体验”的抽象目标转化为我们代理系统可感知、可衡量的质量。这种数据驱动的方法对于证明这些模式所代表的架构选择是必要的，并且对于推动持续改进至关重要。我们现在已经完成了对构建与人类有效协作的系统的深入研究，拥有了一套全面的模式语言以及评估其影响的方法。
- en: Let's explore the ***Human-Agent*** interaction patterns in detail.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们详细探讨***人-代理***交互模式。
- en: Agent Calls Human (Human-in-the-Loop Escalation)
  id: totrans-63
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理呼叫人类（人类在回路升级）
- en: While the goal of agentic idx_c30cf1c0systems is to maximize automation, thereidx_2fa4774c
    are situations where an agent, by design or necessity, must pause and ask for
    human help. This can occur when the agent's confidence in its decision falls below
    a critical threshold, when it encounters highly ambiguous data, or when a task
    involves a high-stakes decision that company policy requires a human to approve.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然代理idx_c30cf1c0系统的目标是最大化自动化，但有些情况下，代理由于设计或必要性，必须暂停并寻求人类帮助。这可能会发生在代理对其决策的信心低于临界阈值时，当它遇到高度模糊的数据时，或者当一项任务涉及高风险决策，公司政策要求人类批准时。
- en: The ***Agent Calls Human*** pattern provides a structured mechanism for this
    critical process. It defines a formal escalation path for an agent to gracefully
    pause its operation, package the necessary context, and request a decision from
    a human expert, ensuring that automation and human oversight can work together
    seamlessly.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '***代理呼叫人类***模式为这一关键过程提供了一个结构化的机制。它定义了一个代理优雅地暂停其操作、打包必要上下文并请求人类专家决策的正式升级路径，确保自动化和人类监督可以无缝协作。'
- en: Context
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: An autonomous agent, during its idx_d89ec2baoperation, encounters a situation
    that it cannot resolve on its own. The system needs to maximize automation to
    be efficient, but it must also allow for human oversight to ensure safety and
    handle edge cases that fall outside the agent's capabilities.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在其idx_d89ec2ba操作过程中，一个自主代理遇到了它自己无法解决的问题。系统需要最大化自动化以提高效率，但它也必须允许人类监督以确保安全并处理代理能力之外的边缘情况。
- en: Problem
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: How can an agent gracefullyidx_7d022fed pause its autonomous operation and escalate
    to a human for intervention? A poorly managed escalation can be disruptive, provide
    insufficient context for a decision, or fail to capture the human's response correctly,
    undermining the entire workflow.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 代理如何优雅地idx_7d022fed暂停其自主操作并升级到人类进行干预？管理不善的升级可能会造成干扰，提供不足以做出决策的上下文，或未能正确捕捉人类的响应，从而破坏整个工作流程。
- en: Solution
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Agent Calls Human*** pattern implementsidx_094db84c a formal escalation
    mechanism, often referred to as a "human-in-the-loop" checkpoint. When an agent
    identifies a situation requiring human intervention, it packages the current state
    and all relevant context into a structured request. This request is then routed
    to a human operator through a dedicated UI or task queue. The agent's workflow
    is paused until the human provides a decision, which is then fed back into the
    system, allowing the agent to resume its task with the new, human-validated information.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '***代理呼叫人类***模式实现idx_094db84c了一种正式的升级机制，通常被称为“人类在回路”检查点。当一个代理识别出需要人类干预的情况时，它会将当前状态和所有相关上下文打包成一个结构化请求。然后，通过专门的UI或任务队列将该请求路由给人类操作员。代理的工作流程暂停，直到人类提供决策，然后该决策被反馈到系统中，使代理能够带着新的、经过人类验证的信息继续其任务。'
- en: 'Example: Resolving a loan application ambiguity'
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：解决贷款申请的模糊性
- en: 'A loan approval system idx_52d520cfuses an agent idx_340147a0to process mortgage
    applications:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 一个贷款审批系统idx_52d520cf使用代理idx_340147a0处理抵押贷款申请：
- en: The `LoanApprovalAgent` goal is to process applications autonomously unless
    confidence drops below 95%
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`LoanApprovalAgent`的目标是在信心低于95%之前自主处理申请'
- en: The **h****uman** **u****nderwriter** goal is to review ambiguous cases escalated
    by the agent and make a final judgment
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人**类**承保人**的目标是审查代理升级的模糊案例并做出最终判断'
- en: 'The human-in-the-loop workflow unfolds as follows:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在回路的工作流程如下：
- en: '**Trigger**: The `LoanApprovalAgent` successfully verifies an applicant''s
    income and credit score. However, when analyzing the property appraisal, it detects
    a significant discrepancy between the appraisal''s square footage (1,800 sq. ft)
    and the property tax records (1,500 sq. ft), causing its confidence to drop.'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**触发器**: `LoanApprovalAgent`成功验证了申请人的收入和信用评分。然而，在分析物业评估时，它检测到评估的面积（1,800平方英尺）与物业税务记录（1,500平方英尺）之间存在重大差异，导致其信心下降。'
- en: '**Package context**: The agent creates a "review package" containing the applicant
    ID, links to the conflicting documents, and a summary, `Discrepancy found in property
    square footage between appraisal and tax records. Human review required to validate
    property value.`'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**包上下文**: 代理创建了一个包含申请人ID、冲突文档链接和摘要的“审查包”，摘要内容为“评估和税务记录中发现的物业面积差异。需要人工审查以验证物业价值。”'
- en: '**Escalate**: It calls a `HumanReviewTool`, which pushes the package to a human
    underwriter''s dashboard.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**升级**: 它调用`HumanReviewTool`，将包推送到人类核保员的仪表板。'
- en: '**Pause**: The agent''s workflow for this specific application is paused, pending
    the outcome of the review.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**暂停**: 对于此特定应用程序，代理的工作流程被暂停，等待审查结果。'
- en: '**Human decision**: The underwriter reviews the documents, determines that
    it was a clerical error in the tax records, and provides a decision via the UI,
    saying `"VALIDATE_APPRAISAL"`.'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人类决策**: 核保员审查文件，确定这是税务记录中的文书错误，并通过UI提供决策，表示“VALIDATE_APPRAISAL”。'
- en: '**Resume**: The agent receives the structured decision, updates its internal
    state to reflect the human override, and proceeds with the next step in the approval
    process.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**恢复**: 代理接收到结构化的决策，更新其内部状态以反映人类的覆盖，并继续审批流程的下一步。'
- en: The idx_e234b981following diagrams illustrate how the agent pauses its workflow,
    packages context for a human, and then resumes its task based on the human's decision.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表说明了代理如何暂停其工作流程，为人类打包上下文，然后根据人类的决策继续其任务。
- en: '![Image 1](img/B33147_8_1.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图像1](img/B33147_8_1.png)'
- en: Figure 8.1 – Agent Calls Human escalation flow
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.1 – 代理呼叫人工升级流程
- en: '![Image 2](img/B33147_8_2.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图像2](img/B33147_8_2.png)'
- en: Figure 8.2 – Agent Calls Human escalation flow (cont.)
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 – 代理呼叫人工升级流程（续）
- en: Example implementation
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following code idx_e1355446snippet idx_05b223c4demonstrates how the ***Agent
    Calls Human*** pattern is structured in Python. Note how the agent evaluates its
    own confidence against a predefined threshold and uses a dedicated `HumanReviewSystem`
    to manage the "paused" state of the workflow while waiting for an external decision.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码`idx_e1355446snippet idx_05b223c4`展示了在Python中如何构建`***Agent Calls Human***`模式。注意代理如何评估其自身信心与预定义阈值，并使用专门的`HumanReviewSystem`来管理在等待外部决策时的“暂停”状态。
- en: '[PRE0]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Consequences
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**:'
- en: '**Safety** **and** **trust**: This pattern is fundamental for building safe
    and trustworthy systems. It ensures that critical or ambiguous decisions are vetted
    by a human, reducing the risk of costly automated errors.'
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和信任**: 此模式对于构建安全和值得信赖的系统至关重要。它确保关键或模糊的决策由人类审查，从而降低了昂贵自动化错误的几率。'
- en: '**Handles edge cases**: It provides a robust mechanism for handling the inevitable
    edge cases and novel situations that an agent may not have been trained for.'
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理边缘情况**: 它提供了一种强大的机制来处理代理可能未接受过培训的不可避免的边缘情况和新型情况。'
- en: '**Con**:'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**:'
- en: '**Bottleneck**: The human in the loop can become a performance bottleneck.
    The overall speed of the system is limited by the availability and responsiveness
    of the human operators.'
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**瓶颈**: 在线的人类可能成为性能瓶颈。系统的整体速度受限于人类操作员的可用性和响应能力。'
- en: Implementation guidance
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: When implementing this pattern, designidx_10809b2b the human-facing interface
    with care. It should present the context concisely and provide a structured way
    for the human to input their decision (e.g., buttons and forms) to minimize ambiguity.
    Ensure that the system has a robust mechanism for managing the "paused" state
    of the agent, includingidx_42f37560 timeouts and default actions if a human fails
    to respond within a certain period.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现此模式时，应仔细设计面向人类用户界面的设计。它应简洁地呈现上下文，并为人类提供一种结构化的方式来输入他们的决策（例如，按钮和表单），以最大限度地减少歧义。确保系统具有强大的机制来管理代理的“暂停”状态，包括超时和如果人类在一定时间内未响应的默认操作。
- en: While the ***Agent Calls Human*** pattern provides a critical safety net for
    when automation reaches its limits, the majority of interactions are initiated
    by the user. Next, we will explore the patterns that govern how a human can effectively
    offload work to an agent, starting with complex, long-running tasks.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然***代理呼叫人类***模式为自动化达到极限时提供了关键的安全网，但大多数交互都是由用户发起的。接下来，我们将探讨如何让人类有效地将工作委托给代理的模式，从复杂、长期运行的任务开始。
- en: Human Delegates to Agent
  id: totrans-100
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**人类委托给代理**'
- en: 'Agentic AI systems are defined byidx_5ff08e62 their ability to operate autonomously
    to achieve complex goals, moving beyond simple question-and-answer interactions.
    The ***Human Delegates to Agent*** pattern idx_57281474captures the essence of
    this capability. Instead of providing step-by-step instructions, the human user
    delegates a high-level, often ambiguous, objective to the agent. This pattern
    enables a fundamental shift in the human-AI relationship: from direct command-and-control
    to a partnership where the human sets the strategic direction and the agent manages
    the tactical execution.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 代理式AI系统由idx_5ff08e62其自主操作以实现复杂目标的能力定义，超越了简单的问答交互。***人类委托给代理***模式idx_57281474捕捉了这种能力的本质。人类用户不是提供逐步指令，而是将一个高级的、通常是模糊的目标委托给代理。这种模式使人类-人工智能关系发生了根本性的转变：从直接的命令和控制到一种伙伴关系，其中人类设定战略方向，代理管理战术执行。
- en: '**Note: Two** **s****ides of** **a****mbiguity** **–****d****elegation v****ersus****e****scalation**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：两种** **模糊性** **的方面——** **委派** **与** **升级**'
- en: 'At first glance, this pattern might seem to contradict ***Agent Calls Human***.
    However, they are not contradictory but complementary, defining the two sides
    of a robust partnership:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 初看起来，这种模式可能似乎与***代理呼叫人类***相矛盾。然而，它们并不矛盾，而是互补的，定义了稳健伙伴关系的两个方面：
- en: '**Human Delegates to Agent (****s****trategic** **a****mbiguity)**: Here, the
    human gives the agent a high-level, "fuzzy" strategic goal (e.g., `Generate a
    competitor report`). The agent''s primary job is to resolve this ambiguity by
    creating a concrete, step-by-step plan.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人类委托给代理（** **战略模糊性** **）**：在这里，人类给代理一个高级的、“模糊”的战略目标（例如，“生成一个竞争对手报告”）。代理的主要任务是创建一个具体的、逐步的计划来解决这个问题。'
- en: '**Agent Calls Human (****t****actical** **a****mbiguity)**: This pattern is
    the safety net. It''s triggered when the agent, while executing its plan, encounters
    a new, unforeseen tactical problem it cannot or should not solve alone (e.g.,
    `The competitor''s pricing data is password-protected, should I skip it or wait?`).'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理呼叫人类（** **战术模糊性** **）**：这种模式是安全网。当代理在执行其计划时遇到一个新出现的、无法或不应单独解决的战术问题（例如，“竞争对手的价格数据被密码保护，我应该跳过它还是等待？”）时，就会触发。'
- en: In short, a capable agent can *resolve* the user's initial strategic ambiguity.
    A safe agent knows when to *escalate* new tactical ambiguity.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，一个有能力的代理可以*解决*用户的初始战略模糊性。一个安全的代理知道何时*升级*新的战术模糊性。
- en: This is the idx_9b1f6801pattern that most closely resembles the idx_44c9d5a9popular
    vision of an AI "personal assistant" or "copilot" or "co-scientist" that can complete
    entire tasks with minimal supervision. It is particularly useful for tasks that
    are time-consuming, repetitive, or require navigating multiple systems and data
    sources.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这是idx_9b1f6801模式，它最接近于idx_44c9d5a9流行的AI“个人助理”或“副驾驶”或“共同科学家”的愿景，这种AI可以在最少监督的情况下完成整个任务。这对于耗时、重复或需要导航多个系统和数据源的任务尤其有用。
- en: Context
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**上下文**'
- en: A humanidx_dabd0f75 user has a high-level goal or a complex, multi-step task
    to accomplish, but they do not want to, or cannot, execute each step manually.
    They want to offload the entire process to a capable autonomous system.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 一个人类idx_dabd0f75用户有一个高级目标或一个复杂、多步骤的任务要完成，但他们不想或不能手动执行每个步骤。他们希望将整个流程委托给一个有能力的自主系统。
- en: Problem
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**问题**'
- en: How can a user idx_2fa4232beffectively hand off a complex goal to an AI agent?
    The system must be able to accurately capture the user's intent from a high-level
    instruction, operate autonomously over an extended period, and remain aligned
    with the original goal without requiring constant human guidance.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 用户如何有效地将一个复杂的目标委托给一个AI代理？系统必须能够从高级指令中准确捕捉用户的意图，在一段较长的时间内自主运行，并且无需持续的人类指导就能保持与原始目标的对齐。
- en: Solution
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**解决方案**'
- en: The ***Human Delegates to Agent*** pattern structuresidx_3dda5638 the interaction
    as a clear handoff. The user provides a high-level objective. The agent then enters
    an autonomous loop where it first creates a detailed plan to achieve that objective,
    breaking it down into smaller, executable sub-tasks. It then executes this plan,
    using its tools and reasoning capabilities to handle each step. The agent may
    provide periodic updates or request clarification if it runs into an unrecoverable
    ambiguity, but otherwise operates independently until the final goal is achieved.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**人类委托到代理**模式将交互结构化为一个清晰的交接。用户提供一个高级目标。然后代理进入一个自主循环，首先创建一个详细计划来实现该目标，将其分解为更小的、可执行的子任务。然后执行该计划，使用其工具和推理能力处理每个步骤。代理可能会提供定期更新或请求澄清，如果遇到无法恢复的歧义，但否则它将独立操作，直到最终目标实现。'
- en: 'Example: Delegating market research'
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：委托市场研究
- en: 'A marketing manager delegatesidx_38d8dc36 a research task to a `MarketAnalysisAgent`:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 市场经理将一项研究任务委托给`MarketAnalysisAgent`：
- en: '**User''s delegated goal**: The manager gives the command: `Generate a report
    on the top three competitors for our new ''ProWidget X'' in the European market.
    Focus on their pricing, key features, and recent customer sentiment. I need a
    draft by tomorrow.`'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用户的委托目标**：经理下达命令：“为我们在欧洲市场的新''ProWidget X''生成前三大竞争对手的报告。重点关注他们的定价、关键功能和最近的客户情感。我需要明天初稿。”'
- en: '**Agent''s generated plan:** The `MarketAnalysisAgent` receives the goal and
    breaks it down into an internal plan:'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理生成的计划**：`MarketAnalysisAgent`接收到目标并将其分解为一个内部计划：'
- en: '**Identify competitors**: Use a web search tool to find top competitors for
    `''ProWidget X''` in Europe.'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别竞争对手**：使用网络搜索工具在欧洲寻找`''ProWidget X''`的主要竞争对手。'
- en: '**Get pricing**: For each competitor, use a financial data API to find product
    pricing.'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**获取定价**：对于每个竞争对手，使用财务数据API查找产品定价。'
- en: '**Analyze sentiment**: For each, use a product review aggregator to summarize
    customer sentiment from the last 6 months.'
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析情感**：对于每个任务，使用产品评论聚合器总结过去6个月的客户情感。'
- en: '**Synthesize report**: Consolidate all collected data into a structured report
    document.'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**综合报告**：将所有收集到的数据整合到一个结构化的报告文档中。'
- en: '**Deliver**: Send the final report to the manager via email.'
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**交付**：通过电子邮件将最终报告发送给经理。'
- en: '**Autonomous execution**: The idx_0e2f0fafagent executes each sub-task sequentially,
    using its tools and storing the intermediate findings in its idx_846ecbdfmemory
    without further human input.'
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自主执行**：该代理按顺序执行每个子任务，使用其工具并在其内存中存储中间发现，而不需要进一步的人为输入。'
- en: '**Completion**: Once the report is drafted, the agent sends an email to the
    marketing manager with the document attached, fulfilling the original delegated
    objective.'
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**完成**：一旦报告起草完毕，代理会发送一封电子邮件给市场经理，附上文档，完成最初委托的目标。'
- en: '![Image 3](img/B33147_8_3.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图像 3](img/B33147_8_3.png)'
- en: Figure 8.3 – Human Delegates to Agent workflow
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3 – 人类委托到代理的工作流程
- en: Example implementation
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following sampleidx_62bb83d8 code illustrates the transition from a strategic
    goal to tactical execution. In this example, the `MarketAnalysisAgent` acts as
    an orchestrator that first invokes an LLM to generate a structured plan. It then
    iterates through that plan, dynamically invoking the necessary tools, such as
    web searching idx_c23bb0d7and sentiment analysis, to fulfill the user's broad
    objective autonomously.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例代码展示了从战略目标到战术执行的转变。在这个例子中，`MarketAnalysisAgent`充当协调者，首先调用一个LLM生成一个结构化计划。然后它遍历该计划，动态调用必要的工具，如网络搜索和情感分析，以自主地完成用户的广泛目标。
- en: '[PRE1]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Consequences
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Efficiency**: This pattern is extremely powerful for user productivity, as
    it allows humans to offload complex, time-consuming tasks to an autonomous system'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率**：这种模式对用户生产力极为强大，因为它允许人类将复杂且耗时的任务卸载到自主系统中。'
- en: '**Capability**: It enables the solving of problems that are too large or complex
    for a simple, single-prompt interaction'
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能力**：它能够解决对于简单单次提示交互来说太大或太复杂的问题。'
- en: '**Con**:'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Risk of misalignment**: The primary risk is that the agent misinterprets
    the initial high-level goal and spends significant resources executing a plan
    that is not alignedidx_57fd08f9 with the user''s true intent'
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险不匹配**：主要风险是代理误解了初始的高级目标，并投入大量资源执行与用户真实意图不一致的计划。'
- en: Implementation guidance
  id: totrans-136
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: To mitigate the risk ofidx_4b927d51 misalignment, consider implementing a *Plan
    Confirmation* step. After the agent generates its initial plan (*s**tep 2* in
    the example), it can present the plan to the user for a quick "go/no-go" approval
    beforeidx_05937a58 beginning the autonomous execution. This small checkpoint ensures
    that the agent's interpretation of the goal is correct without requiring the user
    to supervise every step.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减轻 idx_4b927d51 不匹配的风险，考虑实施一个 *计划确认* 步骤。在代理生成其初始计划（示例中的 *步骤 2*）后，它可以向用户展示该计划，以便在开始自主执行之前快速获得“进行/不进行”的批准。这个小检查点确保代理对目标的解释是正确的，而无需用户监督每一步。
- en: 'Delegating a complex goal is a powerful capability, but many interactions are
    simpler and more direct. Now that we''ve seen how an agent handles a high-level
    objective, let''s examine the foundational pattern for managing immediate, transactional
    requests: ***Human Calls Agent***.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 委托复杂目标是强大的功能，但许多交互更简单、更直接。现在我们已经看到代理如何处理高级目标，让我们来检查管理即时、交易性请求的基础模式：***人工呼叫代理***。
- en: Human Calls Agent
  id: totrans-139
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工呼叫代理
- en: Not every human-agent interactionidx_a9ba3104 is a long, complex delegation.
    Often, a user needs idx_f2b893b5a specific piece of information or wants a single,
    well-defined action performed immediately. For these transactional and direct
    queries, the user expects a fast, accurate, and concise response.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个人类-代理交互 idx_a9ba3104 都是一个漫长、复杂的委托。通常，用户需要 idx_f2b893b5a 特定的信息或希望立即执行单个、定义明确的操作。对于这些交易性和直接查询，用户期望快速、准确且简洁的响应。
- en: The ***Human Calls Agent*** pattern structures this fundamental request-response
    cycle. It is the foundation for building common applications such as chatbots
    and voice assistants, where the agent's primary role is to act as a direct interface
    to a tool or piece of information.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '***人工呼叫代理*** 模式结构化这个基本的请求-响应周期。它是构建常见应用（如聊天机器人和语音助手）的基础，在这些应用中，代理的主要角色是作为工具或信息的直接接口。'
- en: Context
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: A user needs a specific pieceidx_eba7f9e8 of information or wants a single,
    well-defined action performed immediately. The interaction is transactional, and
    the user expects a fast and accurate response without unnecessary conversational
    steps.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 用户需要特定的信息或希望立即执行单个、定义明确的操作。这种交互是交易的，用户期望快速、准确且无需不必要的对话步骤的响应。
- en: Problem
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: How can the system idx_54f89b85provide a direct, responsive, and accurate answer
    to a transactional query? The agent must quickly understand the user's direct
    command, use the appropriate tool to get the information or perform the action,
    and return the result concisely.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 如何让系统 idx_54f89b85 提供直接、响应迅速且准确的交易查询答案？代理必须快速理解用户的直接指令，使用适当的工具获取信息或执行操作，并简洁地返回结果。
- en: Solution
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Human Calls Agent*** pattern structures idx_970b20ddthe interaction as
    a direct, request-response cycle. The user's query is treated as a direct invocation.
    The agent's primary logic is to classify the user's intent, select the single
    best tool to fulfill that intent, execute the tool with the necessary parameters
    extracted from the query, and return the result to the user, often with minimal
    conversational filler. This pattern is foundational for building chatbots, voice
    idx_a982b14cassistants, and other direct interaction tools.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '***人工呼叫代理*** 模式将交互结构化为直接、请求-响应周期。用户的查询被视为直接调用。代理的主要逻辑是分类用户的意图，选择满足该意图的最佳工具，使用从查询中提取的必要参数执行该工具，并将结果返回给用户，通常带有最少的对话填充。这种模式是构建聊天机器人、语音
    idx_a982b14c 助手和其他直接交互工具的基础。'
- en: 'Example: Checking an order status'
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：检查订单状态
- en: 'A user interacts with a retailidx_6f775919 chatbot to find out where their
    package is:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 用户通过与零售idx_6f775919 聊天机器人互动来查询他们的包裹位置：
- en: '**User''s direct command**: The user types, `Where is my order #ABC-123?`'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户的直接指令**：用户输入，`我的订单号ABC-123在哪里？`'
- en: '**Agent''s logic (intent classification & tool selection)**: The agent''s LLM
    core immediately recognizes this as an "order status query" and identifies `getOrderStatusTool`
    as the appropriate tool to call.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理逻辑（意图分类与工具选择）**：代理的 LLM 内核立即将其识别为“订单状态查询”，并确定 `getOrderStatusTool` 是适当的工具来调用。'
- en: '**Parameter extraction**: The LLM extracts the order ID, `ABC-123`, as the
    necessary parameter for the tool.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参数提取**：LLM 提取订单 ID，`ABC-123`，作为工具的必要参数。'
- en: '**Tool execution**: The agent calls the tool: `getOrderStatusTool``(``order_id``="ABC-123")`.
    The tool internally queries the company''s shipping database and returns structured
    data: `{"status": "In Transit", "location": "Denver, CO", "``estimated_delivery``":
    "2025-09-22"}`.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具执行**：代理调用工具：`getOrderStatusTool`(``order_id``="ABC-123")`。工具内部查询公司的运输数据库，并返回结构化数据：`{"status":
    "In Transit", "location": "Denver, CO", "``estimated_delivery``": "2025-09-22"}`。'
- en: '**Response generation**: The agent''s LLM receives the tool''s output and formats
    it into a clear, concise, human-readable response.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应生成**：代理的LLM接收工具的输出并将其格式化为清晰、简洁、易于阅读的响应。'
- en: '**Return to user**: The chatbot replies, `Your order #ABC-123 is currently
    in transit in Denver, CO, with an estimated delivery date of September 22, 2025.`'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**返回给用户**：聊天机器人回复：“您的订单号ABC-123目前正在丹佛，科罗拉多州运输中，预计交付日期为2025年9月22日。”'
- en: '![Image 4](img/B33147_8_4.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图像 4](img/B33147_8_4.png)'
- en: Figure 8.4 – Human Calls Agent sequence
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4 – 人类呼叫代理序列
- en: Example implementation
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The sample implementationidx_5eb4c5ad below demonstrates the "Request-Response"
    cycle typical of transactional systems. In this scenario, the `RetailBotAgent`
    is optimized for speed and accuracy. It uses an LLM primarily as an intelligent
    router, identifying the user's intent, extracting the necessary parameters (like
    an Order ID), and invoking the idx_0a35c8afspecific `OrderStatusTool` to retrieve
    real-time data from a backend system.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的示例实现展示了典型的“请求-响应”周期，这在事务性系统中很常见。在这种情况下，`RetailBotAgent`针对速度和准确性进行了优化。它主要将LLM用作智能路由器，识别用户的意图，提取必要的参数（如订单ID），并调用特定的`OrderStatusTool`从后端系统检索实时数据。
- en: '[PRE2]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Consequences
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Speed and efficiency**: This pattern is optimized for speed and is ideal
    for building highly responsive, transactional assistants.'
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速度和效率**：此模式针对速度优化，非常适合构建高度响应的事务性助手。'
- en: '**Simplicity**: The logic is straightforward, making it one of the easiest
    agentic patterns to implement and debug.'
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**简单性**：逻辑简单明了，使其成为最容易实现和调试的代理模式之一。'
- en: '**Con**:'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Limited scope**: It is not well-suited for complex, multi-step tasks or long-running
    goals. It excels at well-defined, single-purpose interactions.'
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有限范围**：它不适合复杂的多步骤任务或长期目标。它擅长于定义明确、单一目的的交互。'
- en: Implementation guidance
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: The key to implementingidx_cc7bfaf9 this pattern effectively is robust **tool
    definition**. The tools available to the agent should be well-documented with
    clear descriptions, and their parameters should be strongly typed (meaning each
    parameter explicitly defines its data type, such as string, integer, or Boolean).
    This metadata is what allows the LLM to accurately select the correct tool and
    extract the necessary arguments from a user's conversational query.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 实施此模式的关键是强大的**工具定义**。代理可用的工具应附带清晰的描述，并且它们的参数应该是强类型化的（意味着每个参数都明确定义了其数据类型，例如字符串、整数或布尔值）。这些元数据允许LLM准确选择正确的工具并从用户的对话查询中提取必要的参数。
- en: These three patterns—***Agent Calls Human***, ***Human Delegates to Agent***,
    and ***Human Calls Agent***—define the primaryidx_dab77dd0 interfaces between
    the user and the system. To make these seamless experiences possible, we will
    now look at two crucial internal patterns that govern how agents collaborate behind
    the scenes to fulfill a user's request, starting with how a primary agent can
    delegate work to a team of specialists.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这三种模式——**代理呼叫人类**、**人类委托给代理**和**人类呼叫代理**——定义了用户和系统之间的主要接口。为了使这些无缝体验成为可能，我们现在将探讨两个至关重要的内部模式，这些模式决定了代理如何在幕后协作以完成用户请求，首先是主要代理如何将工作委托给一组专家。
- en: Agent Delegates to Agent
  id: totrans-170
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代理委托给代理
- en: Often, a user delegates a idx_39fa662ecomplex task to a single primary agent,
    but successfully completing it requires a set of specialized skills that the primary
    agent does not possess. For idx_238b4067a system to fulfill such a request, it
    needs a way to break down the user's high-level goal and route the resulting sub-tasks
    to the correct specialists, all while maintaining a seamless experience for the
    user.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，用户会将一个复杂的任务委托给单个主要代理，但成功完成它需要一组主要代理不具备的专业技能。为了满足这样的请求，系统需要一种方法来分解用户的高级目标，并将产生的子任务路由到正确的专家，同时保持为用户提供无缝的体验。
- en: The ***Agent Delegates to Agent*** pattern implements this hierarchical or collaborative
    structure. A primary "supervisor" agent acts as a project manager, decomposing
    a user's goal into smaller tasks and delegating each to the appropriate specialized
    "worker" agent. This allows the system to combine the skills of multiple experts
    to solve problems far more complex than any single agent could handle alone.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理委托给代理**模式实现了这种分层或协作结构。一个主要的“主管”代理充当项目经理，将用户的整体目标分解成更小的任务，并将每个任务委托给适当的专门“工人”代理。这允许系统结合多个专家的技能，解决单个代理单独无法处理的复杂问题。'
- en: Context
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: A primaryidx_e58b281c agent (e.g., an orchestrator) has received a complex task
    from a user that requires multiple specialized skills or domains of knowledge
    to complete.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 一个主要idx_e58b281c代理（例如，协调者）从用户那里接收了一个复杂的任务，该任务需要多个专业技能或知识领域来完成。
- en: Problem
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: How can an idx_2a2558a6agentic system fulfill a user's complex request without
    overwhelming a single "generalist" agent or requiring the user to interact with
    multiple, specialized agents directly?
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使一个idx_2a2558a6代理系统在没有压倒单个“通才”代理或要求用户直接与多个专门代理交互的情况下，满足用户的复杂请求？
- en: Solution
  id: totrans-177
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Agent Delegates to Agent*** patternidx_9ea23a40 implements a hierarchical
    structure, often using a supervisor (orchestrator) architecture. The user interacts
    with a single primary agent, which analyzes the user's request and acts as a "project
    manager," decomposing the overall goal into smaller sub-tasks. It then delegates
    each sub-task to the appropriate specialized "worker" agent, which has the specific
    tools and knowledge to handle it. The primary agent collects the results from
    the worker agents and synthesizes the final response for the user, making the
    internal collaboration invisible.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理委托给代理**模式idx_9ea23a40实现了一个分层结构，通常使用一个主管（协调者）架构。用户与一个单一的主要代理交互，该代理分析用户的请求并充当“项目经理”，将整体目标分解成更小的子任务。然后，它将每个子任务委托给适当的专门“工人”代理，这些代理具有处理它的特定工具和知识。主要代理收集来自工人代理的结果，并为用户综合最终的响应，使内部协作对用户不可见。'
- en: 'Example: Comprehensive financial analysis'
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：全面财务分析
- en: 'A financialidx_8e759cbb analyst delegates a task to theiridx_6ea3ab7e primary
    `ResearchAssistant` agent:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 一个金融idx_8e759cbb分析师将任务委托给他们的idx_6ea3ab7e主要`ResearchAssistant`代理：
- en: '**Human''s delegated goal**: The analyst asks, `Give me a full workup on CompanyCorp.
    I need a summary of their last earnings call, a technical analysis of their stock
    chart, and a check for any recent negative news.`'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人类的委托目标**：分析师问道，“给我一份关于CompanyCorp.的全面分析。我需要他们最近一次收益电话会议的总结、他们股票图表的技术分析，以及检查任何最近的负面新闻。”'
- en: '**Primary agent''s decomposition plan**: The `ResearchAssistant` agent plans
    the task:'
  id: totrans-182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**主要代理的分解计划**：`ResearchAssistant`代理规划任务：'
- en: '**Sub-task 1**: Summarize the Q1 earnings call transcript'
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**子任务1**：总结第一季度收益电话会议的记录'
- en: '**Sub-task 2**: Analyze the 3-month stock chart for support and resistance
    levels'
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**子任务2**：分析3个月股票图表的支持和阻力水平'
- en: '**Sub-task 3**: Scan news sources from the last 7 days for negative sentiment'
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**子任务3**：扫描过去7天的新闻来源以寻找负面情绪'
- en: '**Agent-to-****a****gent** **d****elegation**: The `ResearchAssistant` agent
    delegates these sub-tasks to its team of specialists:'
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理到代理**委托：`ResearchAssistant`代理将这些子任务委托给其专家团队：'
- en: It sends the summarization task to the `EarningsCallSummarizerAgent`
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它将总结任务发送到`EarningsCallSummarizerAgent`
- en: It sends the chart analysis task to the `TechnicalChartAgent`
  id: totrans-188
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它将图表分析任务发送到`TechnicalChartAgent`
- en: It sends the news scan task to the `NewsSentimentAgent`
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它将新闻扫描任务发送到`NewsSentimentAgent`
- en: '**Specialist execution**: Each specialist agent performs its task using its
    dedicated tools and returns the result to the orchestrator.'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**专家执行**：每个专家代理使用其专用工具执行其任务，并将结果返回给协调者。'
- en: '**Synthesis and response**: The `ResearchAssistant` agent collects all the
    pieces of the analysis, synthesizes them intoidx_f77d909f a single, coherent report,
    and presents it to the human analyst.'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**综合和响应**：`ResearchAssistant`代理收集所有分析的部分，将它们综合成一个idx_f77d909f单一、连贯的报告，并呈现给人类分析师。'
- en: '![Image 5](img/B33147_8_5.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![Image 5](img/B33147_8_5.png)'
- en: Figure 8.5 – Agent Delegates to Agent architecture
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5 – 代理委托给代理架构
- en: Example implementation
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The following idx_74f9cc5asample code demonstrates a hierarchical multi-agent
    setup using Python's `asyncio` for concurrent execution. In this implementation,
    the `ResearchAssistantAgent` acts as a supervisor. Rather than performing the
    technical work itself, it decomposes a broad financial query into specific tasks
    and delegates them to specialist agents. This modular approach allows each worker
    agent to maintain its own specialized idx_65f1d0e1tools and logic, while the supervisor
    focuses on synthesizing their collective outputs into a final, coherent report.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 以下`idx_74f9cc5a`示例代码展示了使用Python的`asyncio`进行并发执行的分层多智能体设置。在这个实现中，`ResearchAssistantAgent`充当监督者。它不是自己执行技术工作，而是将广泛的金融查询分解成具体任务，并将它们委托给专业智能体。这种模块化方法允许每个工作智能体维护自己的专业`idx_65f1d0e1`工具和逻辑，而监督者则专注于将它们的集体输出综合成一个最终、连贯的报告。
- en: '[PRE3]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Consequences
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Modularity and specialization**: This pattern allows for the creation of
    highly capable and maintainable systems. Each agent can be an expert in its domain,
    and they can be developed, tested, and updated independently.'
  id: totrans-199
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模块化和专业化**：这个模式允许创建高度能干且可维护的系统。每个智能体可以成为其领域的专家，并且它们可以独立开发、测试和更新。'
- en: '**Enhanced capability**: By combining the skills of multiple specialists, the
    system can solve problems that are far more complex than any single agent could
    handle.'
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**增强能力**：通过结合多个专家的技能，系统可以解决任何单个智能体都无法处理的更复杂问题。'
- en: '**Con**:'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Orchestration overhead**: The system''s performance and reliability depend
    heavily on the idx_aea3091aorchestrator agent. Designing the logic for task decomposition,
    delegation, and result synthesis adds complexity and can introduce latency.'
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调度开销**：系统的性能和可靠性高度依赖于`idx_aea3091a`调度智能体。设计任务分解、委托和结果综合的逻辑增加了复杂性，并可能引入延迟。'
- en: Implementation guidance
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: The orchestrator's idx_e873360dplanning capability is the most critical component
    of this pattern. For simpler, predictable workflows, the decomposition plan can
    be a static, predefined sequence of agent calls. For more complex and dynamic
    tasks, the orchestrator itself may need to use an LLM to generate a multi-step
    plan, as shown in the example.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 调度器的`idx_e873360d`规划能力是这个模式中最关键的部分。对于简单、可预测的工作流程，分解计划可以是一个静态、预定义的智能体调用序列。对于更复杂和动态的任务，调度器本身可能需要使用LLM来生成一个多步骤计划，如示例所示。
- en: Orchestrating a team of internal agents (a.k.a. an agent mesh) allows the system
    to solve complex problems. However, many enterprise workflows require interaction
    with external, third-party systems. The final pattern in this chapter, ***Agent
    Calls Proxy Agent***, provides a secure and modular blueprint for managing these
    crucial external communications.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 组织内部智能体团队（即智能体网格）允许系统解决复杂问题。然而，许多企业工作流程需要与外部、第三方系统交互。本章的最后一个模式，即***智能体调用代理智能体***，提供了一个安全和模块化的蓝图来管理这些关键的外部通信。
- en: Agent Calls Proxy Agent
  id: totrans-206
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能体调用代理智能体
- en: Often, anidx_d0b84c15 agent needs to interact with an external system that resides
    in a idx_9c78f99adifferent security context, such as a third-party partner's API
    or a sensitive internal database. Giving the primary agent direct credentials
    to every external system it might need to contact is a major security risk and
    an integration nightmare. The system needs a way to manage these interactions
    securely and reliably.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，一个`idx_d0b84c15`智能体需要与位于不同安全上下文中的外部系统交互，例如第三方合作伙伴的API或敏感的内部数据库。给主要智能体直接访问每个可能需要联系的外部系统的凭证是一个重大的安全风险，也是集成噩梦。系统需要一种安全可靠的方式来管理这些交互。
- en: The ***Agent Calls Proxy Agent*** pattern provides this by introducing a specialized
    intermediary, known as the "proxy," which acts as a secure and standardized gateway
    to an external system. This decouples the core agent logic from the complexities
    of external integrations and centralizes security enforcement.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '***智能体调用代理智能体***模式通过引入一个专门的中间件，称为“代理”，作为通向外部系统的安全且标准化的网关来实现这一点。这解耦了核心智能体逻辑与外部集成的复杂性，并集中执行安全执行。'
- en: Context
  id: totrans-209
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上下文
- en: An agent, in the process of idx_c9a908aafulfilling a user's request, needs to
    interact with an external system. Direct access from the primary agent is not
    allowed due to security policies, network boundaries, or a desire to abstract
    away the complexity of the external system.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 在满足用户请求的过程中，代理需要与外部系统交互。由于安全策略、网络边界或希望抽象化外部系统的复杂性，不允许直接从主代理访问。
- en: Problem
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: How can an agent securely and reliablyidx_fd4a2690 interact with an external
    system without being tightly coupled to it and without compromising security?
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使一个代理能够安全可靠地与外部系统交互，而不与它紧密耦合，并且不损害安全性？
- en: Solution
  id: totrans-213
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: The ***Agent Calls Proxy Agent*** patternidx_710d25cd introduces a specialized
    intermediary agent, the proxy, which acts as a secure and standardized gateway.
    The primary agent does not call the external system directly. Instead, it sends
    a simple, internal request to the proxy agent. The proxy is the only component
    that holds the credentials and logic necessary to communicate with the external
    system. It translates the primary agent's request into the specific format required
    by the external system, handles the secure interaction, and then translates the
    (often complex) response back into a simple, standardized format for the primary
    agent to use.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理调用代理**模式idx_710d25cd引入了一个专门的中间代理，即代理，它充当安全且标准化的网关。主代理不会直接调用外部系统。相反，它向代理代理发送一个简单的内部请求。代理是唯一持有与外部系统通信所需凭证和逻辑的组件。它将主代理的请求转换为外部系统所需的具体格式，处理安全交互，然后将（通常是复杂的）响应转换回主代理可以使用的一个简单、标准化的格式。'
- en: 'Example: Cross-enterprise loyalty program'
  id: totrans-215
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：跨企业忠诚度计划
- en: 'A user is booking a flightidx_b48b7222 with an `AirlineBookingAgent` and wants
    to apply a discount from a partner hotel chain''s loyalty program:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 用户正在使用`AirlineBookingAgent`预订航班，并希望从合作伙伴酒店连锁忠诚度计划中应用折扣：
- en: '**Primary agent (**`AirlineBookingAgent`**)**: Manages the flight booking workflow
    for the user'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主代理（**`AirlineBookingAgent`**）**：管理用户的航班预订工作流程'
- en: '**Proxy agent (**`HotelBonanzaProxyAgent`**)**: Securely manages all communication
    with the external `HotelBonanza` API'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理代理（**`HotelBonanzaProxyAgent`**）**：安全地管理所有与外部`HotelBonanza` API的通信'
- en: '**External system**: The `HotelBonanza` partner API'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外部系统**：`HotelBonanza`合作伙伴API'
- en: 'The interaction is handled securely and efficiently:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 交互是安全且高效处理的：
- en: '**User request**: The user tells the `AirlineBookingAgent`: `Book the flight
    to London and apply my ''``HotelBonanza``'' loyalty discount.`'
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**用户请求**：用户告诉`AirlineBookingAgent`：`预订飞往伦敦的航班并应用我的''``HotelBonanza``''忠诚度折扣。`'
- en: '**Primary agent action**: The `AirlineBookingAgent` knows it is not allowed
    to access the `HotelBonanza` system directly.'
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**主代理操作**：`AirlineBookingAgent`知道它不允许直接访问`HotelBonanza`系统。'
- en: '**Call to proxy**: It calls the `HotelBonanzaProxyAgent` with a simple, internal
    request: `{"action": "``validate_discount``", "``user_id``": "``user123``", "``loyalty_code``":
    "HB-XYZ"}`.'
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**调用代理**：它使用一个简单的内部请求调用`HotelBonanzaProxyAgent`：`{"action": "``validate_discount``",
    "``user_id``": "``user123``", "``loyalty_code``": "HB-XYZ"}`。'
- en: '**Proxy execution**: The `HotelBonanzaProxyAgent`, which is the only agent
    with the secret API keys, receives the request. It formats a specific API call
    required by the external `HotelBonanza` system and sends it securely.'
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理执行**：唯一的拥有秘密API密钥的代理`HotelBonanzaProxyAgent`接收请求。它格式化外部`HotelBonanza`系统所需的特定API调用，并安全地发送它。'
- en: '**External response**: The `HotelBonanza` API returns a complex JSON object
    confirming the discount.'
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**外部响应**：`HotelBonanza` API返回一个复杂的JSON对象，确认折扣。'
- en: '**Proxy translation**: The proxy agent parses this response, extracts the essential
    information (the one-time use discount code), and returns a simple, standardized
    response to the primary agent: `{"status": "success", "``discount_code``": "``APPLIED123``"}`.'
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理翻译**：代理代理解析此响应，提取必要的信息（一次性使用的折扣代码），并将简单的、标准化的响应返回给主代理：`{"status": "success",
    "``discount_code``": "``APPLIED123``"}`。'
- en: '**Task completion**: The `AirlineBookingAgent` receives this simple response
    and applies the code to the flight booking, completing the user''s request without
    ever handling external idx_472df84bcredentials or idx_cd84c58bcomplex API logic.'
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**任务完成**：`AirlineBookingAgent`接收此简单响应，并将代码应用于航班预订，完成用户的请求，而无需处理外部idx_472df84b凭证或idx_cd84c58b复杂API逻辑。'
- en: '![Image 6](img/B33147_8_6.png)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![图像 6](img/B33147_8_6.png)'
- en: Figure 8.6 – Agent Calls Proxy Agent pattern for secure interaction
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.6 – 代理调用代理模式以实现安全交互
- en: Example implementation
  id: totrans-230
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例实现
- en: The followingidx_565bf636 implementation highlights the separation of concerns
    between core business logic and external system integration. The `AirlineBookingAgent`
    (the primary agent) operates in a high-trust environment but lacks the credentials
    to reach outside its network. It communicates using a simple, internal vocabulary.
    The `HotelBonanzaProxyAgent`, conversely, resides in a secure, isolated context;
    it alone holds the sensitive API keys and possesses the specific logic required
    to translate internal idx_ed3787darequests into the complex formats required by
    external third-party providers.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 以下实现突出了核心业务逻辑和外部系统集成之间的关注点分离。`AirlineBookingAgent`（主代理）在高度信任的环境中运行，但缺乏访问其网络外部的凭证。它使用简单的内部词汇进行通信。《HotelBonanzaProxyAgent》相反，位于安全、隔离的上下文中；它独自持有敏感的API密钥，并拥有将内部请求转换为外部第三方提供商所需复杂格式的特定逻辑。
- en: '[PRE4]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Consequences
  id: totrans-233
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 后果
- en: '**Pros**:'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优点**：'
- en: '**Security**: This pattern significantly enhances security by centralizing
    and isolating access to external systems. Primary agents never handle sensitive
    credentials, reducing the attack surface.'
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**：此模式通过集中和隔离对外部系统的访问，显著增强了安全性。主代理永远不会处理敏感凭证，从而减少了攻击面。'
- en: '**Decoupling and maintainability**: It decouples the main agentic system from
    the complexities of external APIs. If a partner''s API changes, only the proxy
    agent needs to be updated; the primary agents remain untouched.'
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解耦和可维护性**：它将主要代理系统从外部API的复杂性中解耦。如果合作伙伴的API发生变化，只需更新代理即可；主代理保持不变。'
- en: '**Con**:'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺点**：'
- en: '**Latency**: It introduces an extra "hop" in the communication chain, which
    can add latency. This makes it less suitable for interactions that require extremely
    low-latency responses.'
  id: totrans-238
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延迟**：它在通信链中引入了额外的“跳跃”，这可能会增加延迟。这使得它不太适合需要极低延迟响应的交互。'
- en: Implementation guidance
  id: totrans-239
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实施指南
- en: Use this pattern to enforce a clear idx_058968f7security boundary between your
    internal agent system and the outside world. The proxy agent should be the only
    component with the necessary network access and credentials to reach a specific
    external service. Ensure that the internal communication protocol between the
    primary agent and the proxy is simple and standardized, effectively creating an
    internal API that abstracts away the external complexity.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此模式在您的内部代理系统和外部世界之间建立明确的**安全边界**。代理应该是有必要网络访问和凭证以访问特定外部服务的唯一组件。确保主代理和代理之间的内部通信协议简单且标准化，有效地创建一个抽象外部复杂性的内部API。
- en: These interaction patterns, from high-level delegation to secure proxy calls,
    provide a comprehensive toolkit for designing systems where humans and agents
    can collaborate effectively. Now that we have explored the individual building
    blocks, the final step is to understand how to apply them idx_de50330bstrategically.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 这些交互模式，从高级委派到安全代理调用，为设计人类和代理能够有效协作的系统提供了一个全面的工具包。现在我们已经探讨了单个构建块，下一步是了解如何策略性地应用它们。
- en: Let's now step back and consolidate the key principles we've established in
    the summary.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们退一步，总结一下我们在摘要中确立的关键原则。
- en: Summary
  id: totrans-243
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter explored the critical patterns that govern the interface between
    humans and AI agents. We have established that for agentic systems to be truly
    useful and trusted, their interactions with people must be designed with intention,
    clarity, and safety in mind. These patterns provide the architectural solutions
    for managing the spectrum of human-agent collaborations, from direct commands
    to complex, long-running delegations.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了治理人类和AI代理之间接口的关键模式。我们已经确定，为了使代理系统真正有用和可信，它们与人们的交互必须有意设计，清晰且考虑安全。这些模式为管理人类-代理协作的范围提供了架构解决方案，从直接命令到复杂、长期委派。
- en: 'The key takeaways are as follows:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点如下：
- en: '**Interactions are diverse**: The relationship between humans and agents is
    not monolithic. It ranges from quick, transactional calls (***Human Calls Agent***)
    to complex, long-term handoffs (***Human Delegates to Agent***). A robust system
    must support these different modes.'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交互多样性**：人类和代理之间的关系不是单一的。它从快速、交易性的调用（**人类调用代理**）到复杂、长期移交（**人类委派给代理**）。一个健壮的系统必须支持这些不同的模式。'
- en: '**Escalation is a core feature, not a failure**: Intelligent systems must know
    their own limits. The ***Agent Calls Human*** pattern is a fundamental mechanism
    for ensuring safety and handling ambiguity, making the human in the loop a core
    part of the architecture.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**升级是核心特性，而非失败**：智能系统必须了解自己的限制。《**代理呼叫人类**》模式是确保安全和处理模糊性的基本机制，使人类成为架构的核心部分。'
- en: '**Collaboration should be seamless**: Users should not be burdened with the
    internal complexity of a multi-agent system. The ***Agent Delegates to Agent***
    and ***Agent Calls Proxy Agent*** patterns provide the blueprints for creating
    sophisticated, multi-part workflows that remain simple and coherent from the user''s
    perspective.'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**协作应该是无缝的**：用户不应承担多代理系统内部复杂性的负担。《**代理委托给代理**》和《**代理呼叫代理代理**》模式提供了创建复杂、多部分工作流程的蓝图，从用户的角度来看，这些工作流程仍然简单且连贯。'
- en: '**Building trust is the ultimate goal**: All of these patterns, in different
    ways, are designed to build and maintain user trust. They do this by ensuring
    that the agent understands user intent, acts in alignment with goals, provides
    transparency when needed, and operates securely on the user''s behalf.'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**建立信任是最终目标**：所有这些模式，以不同的方式，都是为了建立和维护用户信任。它们通过确保代理理解用户意图、与目标保持一致、在需要时提供透明度，并在用户代表下安全操作来实现这一点。'
- en: By thoughtfully applying these interaction patterns, we move beyond creating
    mere tools and begin to design true AI collaborators. These patterns provide the
    foundation for building agentic systems that can be safely and effectively integrated
    into human workflows, unlocking the full potential of this transformative technology.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 通过深思熟虑地应用这些交互模式，我们不仅创造了工具，而且开始设计真正的AI协作伙伴。这些模式为构建可以安全有效地集成到人类工作流程中的代理系统提供了基础，释放了这一变革性技术的全部潜力。
- en: Now that we have a solid understanding of how to architect the human-agent relationship,
    we are ready to focus on the agent itself. In the next chapter, we will explore
    agent-level patterns, which deal with the internal design and capabilities of
    individual agents that enable them to perceive their environment, make decisions,
    and act with greater intelligence and autonomy.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对如何构建人机关系有了坚实的理解，我们准备专注于代理本身。在下一章中，我们将探讨代理级别的模式，这些模式涉及单个代理的内部设计和能力，使它们能够感知环境、做出决策，并以更高的智能和自主性行动。
