- en: '8'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '8'
- en: Building an Event Registration App with Identity Verification
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建具有身份验证的事件注册应用
- en: There are times when identity verification and validation are necessary to determine
    eligibility for a product or service. In this chapter, you’ll be learning about
    the AI Builder capabilities surrounding identity document content extraction.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，身份验证和验证是确定产品或服务资格所必需的。在本章中，您将学习关于 AI Builder 身份证明内容提取功能的相关内容。
- en: The AI Builder Identity Document reader is a pre-built model that recognizes
    content in identity documents such as passports, driver’s licenses, and other
    forms of identification.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: AI Builder 身份证明文档阅读器是一个预构建的模型，它可以识别护照、驾照和其他身份证明文件中的内容。
- en: Designing a solution
  id: totrans-4
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设计解决方案
- en: When thinking about how to build a solution that would process identity, I immediately
    thought of some sort of an event registration app or scenario that would require
    identity verification or validation—and it seemed like a great idea.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当思考如何构建一个处理身份的解决方案时，我立刻想到了某种事件注册应用或场景，它将需要身份验证或验证——这似乎是个不错的想法。
- en: Many organizations host events. While some event registrations may be internal
    (such as a large organization’s yearly technical or sales conferences) and likely
    have little need for identity verification, many events are industry- or topic-focused,
    drawing in attendees from a myriad of companies. This seemed like a perfect target
    scenario.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 许多组织举办活动。虽然一些活动注册可能是内部的（例如大型组织的年度技术或销售会议）并且可能不需要身份验证，但许多活动是行业或主题聚焦的，吸引了来自众多公司的参与者。这似乎是一个完美的目标场景。
- en: I had an idea in my head of how I wanted this solution to work. However, when
    working with emerging technology products, sometimes the things you want to do
    don’t exactly line up with the capabilities of the products. As a solution designer,
    it’s important to be flexible and have a mindset that allows you to be able to
    pivot when you identify roadblocks.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我心中有一个关于我希望这个解决方案如何工作的想法。然而，当与新兴技术产品合作时，有时您想要做的事情并不完全符合产品的功能。作为解决方案设计师，重要的是要灵活，并拥有一种心态，以便在您发现障碍时能够调整方向。
- en: 'When getting down to the details of the solution, I was faced with several
    challenges:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当深入到解决方案的细节时，我面临了几个挑战：
- en: '**Power Apps**-based solutions require tenant identity and licensing, neither
    of which are ideal for external users.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于 **Power Apps** 的解决方案需要租户身份和许可，这两者都不适合外部用户。
- en: '**Microsoft Forms** allows for file uploads, but only for internal (tenant)
    users—again, making it not ideal for external use cases.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Microsoft Forms** 允许文件上传，但仅限于内部（租户）用户——再次，使其不适合外部用例。'
- en: '**Power Pages** solutions can accept uploads, but a solution requires a pretty
    significant amount of permissions setup and management, in addition to designing
    an entire website interface and creating Dataverse tables. While there is a basic
    event registration app template available, it still requires a lot of customization
    and modification to apply this sort of validation logic.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Pages** 解决方案可以接受上传，但解决方案需要相当数量的权限设置和管理，此外还需要设计整个网站界面和创建 Dataverse 表格。虽然有一个基本的事件注册应用模板可用，但仍然需要大量定制和修改才能应用这种验证逻辑。'
- en: '**SharePoint Online** can accept file uploads but is typically restricted to
    authenticated users. There is a request-a-file API that does allow anonymous upload,
    but it requires enablement by a SharePoint administrator and crafting a custom
    API file link for a record.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SharePoint Online** 可以接受文件上传，但通常仅限于认证用户。有一个请求文件 API 允许匿名上传，但它需要 SharePoint
    管理员启用，并为记录创建一个定制的 API 文件链接。'
- en: As you can see from the list of options, there are a lot of hurdles to overcome—whether
    it’s licensing, coding challenges, or end-user ease of use. All of these things
    must be taken into consideration when choosing how to implement a solution—there
    may be limitations of the product in the box that you need to work around, especially
    if you’re trying to minimize investment in third-party products or limit the amount
    of overall product development time.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如您从选项列表中可以看到，有许多障碍需要克服——无论是许可、编码挑战还是最终用户的易用性。在选择如何实施解决方案时，所有这些都必须考虑在内——可能需要绕过产品中的一些限制，尤其是如果您试图最小化对第三方产品的投资或限制整体产品开发时间。
- en: In this solution, we’re going to choose a path that allows for simple form design
    (using Microsoft Forms) and leverage the SharePoint Online API (even though it
    requires a little bit of custom development work).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在此解决方案中，我们将选择一个允许简单表单设计（使用 Microsoft Forms）并利用 SharePoint Online API（尽管它需要一点自定义开发工作）的路径。
- en: '*Figure 8**.1* depicts an overall workflow of how this solution will work:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 8**.1* 展示了此解决方案将如何工作的整体工作流程：'
- en: '![Figure 8.1 – Event registration and identity validation workflow](img/B21234_08_01.jpg)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.1 – 事件注册和身份验证工作流程](img/B21234_08_01.jpg)'
- en: Figure 8.1 – Event registration and identity validation workflow
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 – 事件注册和身份验证工作流程
- en: 'Let’s break this down:'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让我们分解一下：
- en: The user fills out an event registration form using the Microsoft Forms link.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户使用 Microsoft Forms 链接填写事件注册表单。
- en: Power Automate triggers and processes the form response, requesting data upload
    from the user.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Power Automate 触发并处理表单响应，请求用户上传数据。
- en: The user receives an email with instructions to upload their identity document.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户收到一封带有上传其身份证明文件说明的电子邮件。
- en: The user clicks the link in the generated email to upload the identity document.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户点击生成的电子邮件中的链接上传身份证明文件。
- en: The identity document is stored in SharePoint Online.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 身份证明文件存储在 SharePoint Online 中。
- en: AI Builder is triggered to validate the identity document.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI Builder 被触发以验证身份证明文件。
- en: The SharePoint Online event registration list is updated to reflect whether
    document validation was successful or unsuccessful.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: SharePoint Online 事件注册列表更新以反映文档验证是否成功或失败。
- en: 'The Power Automate condition checks the identity verification status:'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Power Automate 条件检查身份验证状态：
- en: If identity validation is successful, the user receives a confirmation email.
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果身份验证成功，用户将收到确认电子邮件。
- en: If identity validation is unsuccessful, the user receives a failure notice.
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果身份验证失败，用户将收到失败通知。
- en: Next, we’ll look at the licensing prerequisites for this solution.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将查看此解决方案的许可前提条件。
- en: Licensing prerequisites
  id: totrans-30
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 许可前提条件
- en: 'Using AI models and connectors in the Power Platform has several prerequisites:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Power Platform 中使用 AI 模型和连接器有几个前提条件：
- en: A subscription that includes Microsoft Dataverse
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含 Microsoft Dataverse 的订阅
- en: AI Builder capacity (or trial capacity)
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI Builder 容量（或试用容量）
- en: Power Apps or Power Automate premium licensing
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Power Apps 或 Power Automate 高级许可
- en: A subscription that includes Microsoft Teams
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含 Microsoft Teams 的订阅
- en: A subscription that includes Exchange Online
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含 Exchange Online 的订阅
- en: Outlook desktop application
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Outlook 桌面应用程序
- en: If you haven’t already enabled Dataverse and AI Builder capacity, see [*Chapter
    2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to Support
    AI Services*, and [*Chapter 6*](B21234_06.xhtml#_idTextAnchor069), *Processing
    Data with* *Sentiment Analysis*.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您尚未启用 Dataverse 和 AI Builder 容量，请参阅[*第 2 章*](B21234_02.xhtml#_idTextAnchor027)，*配置支持
    AI 服务的环境*，以及[*第 6 章*](B21234_06.xhtml#_idTextAnchor069)，*使用* *情感分析* *处理数据*。
- en: Configuring solution prerequisites
  id: totrans-39
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配置解决方案前提条件
- en: Before you start the workflow configuration, you’ll need to create a SharePoint
    list to hold registrants’ information and a Teams meeting link that can be added
    to the confirmation email.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始工作流程配置之前，您需要创建一个 SharePoint 列表来存储注册者的信息，以及一个可以添加到确认电子邮件中的 Teams 会议链接。
- en: Configuring SharePoint Online
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置 SharePoint Online
- en: By default, SharePoint Online is restricted to authenticated users—whether they’re
    in the same tenant or an external user who has previously redeemed a guest invitation.
    SharePoint does, however, allow anonymous sharing links as well as a feature for
    users to generate a file upload request and send it to an anonymous or otherwise
    unauthenticated user. We’ll be taking advantage of the file request feature in
    a programmatic fashion to get SharePoint Online to allow anonymous uploads as
    part of a workflow.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，SharePoint Online 限制为经过身份验证的用户——无论是同一租户的用户还是之前兑换过嘉宾邀请的外部用户。然而，SharePoint
    允许匿名共享链接以及一个用户生成文件上传请求并发送给匿名或其他未经身份验证用户的功能。我们将以编程方式利用文件请求功能，使 SharePoint Online
    允许作为工作流程一部分的匿名上传。
- en: Further reading
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: For more information on the file request feature, see [https://learn.microsoft.com/en-us/sharepoint/enable-file-requests](https://learn.microsoft.com/en-us/sharepoint/enable-file-requests)
    and [https://support.microsoft.com/en-us/office/create-a-file-request-f54aa7f8-2589-4421-b351-d415fc3b83af](https://support.microsoft.com/en-us/office/create-a-file-request-f54aa7f8-2589-4421-b351-d415fc3b83af).
    There are several caveats to getting this working (such as not restricting anonymous
    external access, anonymous or **Anyone** links enabled, and the appropriate permissions
    for **Anyone** links), so be sure your environment is configured.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 有关文件请求功能的更多信息，请参阅 [https://learn.microsoft.com/en-us/sharepoint/enable-file-requests](https://learn.microsoft.com/en-us/sharepoint/enable-file-requests)
    和 [https://support.microsoft.com/en-us/office/create-a-file-request-f54aa7f8-2589-4421-b351-d415fc3b83af](https://support.microsoft.com/en-us/office/create-a-file-request-f54aa7f8-2589-4421-b351-d415fc3b83af)。要使此功能正常工作（例如，不限制匿名外部访问、启用匿名或
    **任何人** 链接，以及为 **任何人** 链接设置适当的权限），请确保您的环境已正确配置。
- en: Let’s step through the requirements for making sure SharePoint Online is correctly
    configured.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐步了解确保 SharePoint Online 正确配置的要求。
- en: Creating a SharePoint site
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 SharePoint 网站
- en: 'In order to receive file uploads, you’ll want to set up a new SharePoint site.
    To configure a new SharePoint site, follow these steps:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了接收文件上传，您需要设置一个新的 SharePoint 网站。要配置新的 SharePoint 网站，请按照以下步骤操作：
- en: Navigate to the SharePoint Online admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    click **Show all…**, and then select **SharePoint** under **Admin centers**.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 SharePoint Online 管理中心 ([https://admin.microsoft.com](https://admin.microsoft.com))，点击
    **显示全部…**，然后在 **管理中心** 下选择 **SharePoint**。
- en: Expand **Sites** and select **Active sites**.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开 **网站** 并选择 **活动网站**。
- en: Click **Create**.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **创建**。
- en: 'On the **Create a site: Select the site type** page, select **Team site**.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **创建网站：选择网站类型** 页面上，选择 **团队网站**。
- en: On the **Select a template** page, choose **Standard team**.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **选择模板** 页面上，选择 **标准团队**。
- en: On the **Preview and use ‘Standard team’ template** page, click **Use template**.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **预览并使用“标准团队”模板** 页面上，点击 **使用模板**。
- en: On the `Event Registration`.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `事件注册`。
- en: Add a **Group owner** name and click **Next**.
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加 **组所有者** 名称并点击 **下一步**。
- en: Click **Create site**.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **创建网站**。
- en: Click **Finish**.
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **完成**。
- en: 'After you’ve created the site, be sure to capture the full site URL—it will
    be needed later. The full URL will be in the format of `https://<tenant>.sharepoint.com/sites/<sitename>`.
    You can retrieve the site URL by selecting the site in the SharePoint admin setting
    to expand the site properties and copying the **View site** link, as shown in
    *Figure 8**.2*:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在您创建网站后，请确保捕获完整的网站 URL - 它将在以后需要。完整的 URL 将采用 `https://<tenant>.sharepoint.com/sites/<sitename>`
    的格式。您可以通过在 SharePoint 管理设置中选择网站以展开网站属性并复制 **查看网站** 链接来检索网站 URL，如图 *图 8**.2* 所示：
- en: '![Figure 8.2 – Copying the SharePoint site link](img/B21234_08_02.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.2 – 复制 SharePoint 网站链接](img/B21234_08_02.jpg)'
- en: Figure 8.2 – Copying the SharePoint site link
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.2 – 复制 SharePoint 网站链接
- en: Next, you’ll need to configure the **Anyone** links settings in the SharePoint
    admin center.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要在 SharePoint 管理中心配置 **任何人** 链接设置。
- en: Enabling Anyone links
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 启用任何人链接
- en: 'The first requirement is ensuring that **Anyone** links are enabled at the
    tenant level. To do that, follow these steps:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 第一项要求是确保在租户级别启用了 **任何人** 链接。为此，请按照以下步骤操作：
- en: Navigate to the SharePoint Online admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    click **Show all…**, and then select **SharePoint** under **Admin centers**.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 SharePoint Online 管理中心 ([https://admin.microsoft.com](https://admin.microsoft.com))，点击
    **显示全部…**，然后在 **管理中心** 下选择 **SharePoint**。
- en: 'Expand **Policies** and select **Sharing**. Ensure that the SharePoint access
    control slider is moved all the way to the top (**Anyone**). See *Figure 8**.3*:'
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开 **策略** 并选择 **共享**。确保 SharePoint 访问控制滑块已移动到顶部（**任何人**）。见 *图 8**.3*：
- en: '![Figure 8.3 – Configuring SharePoint external sharing access control level](img/B21234_08_03.jpg)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.3 – 配置 SharePoint 外部共享访问控制级别](img/B21234_08_03.jpg)'
- en: Figure 8.3 – Configuring SharePoint external sharing access control level
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.3 – 配置 SharePoint 外部共享访问控制级别
- en: Expand the **More external sharing** **settings** dropdown.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开 **更多外部共享** **设置** 下拉菜单。
- en: 'Ensure the **Allow only users in specific security groups to share externally**
    checkbox is cleared (not checked):'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保已清除 **仅允许特定安全组用户外部共享** 复选框（未勾选）：
- en: '![Figure 8.4 – Configuring More external sharing settings](img/B21234_08_04.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.4 – 配置更多外部共享设置](img/B21234_08_04.jpg)'
- en: Figure 8.4 – Configuring More external sharing settings
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.4 – 配置更多外部共享设置
- en: 'Under **Choose expiration and permissions options for Anyone links**, ensure
    that **Folders** is set to **View, edit,** **and upload**:'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **为任何人链接选择过期和权限选项** 下，确保 **文件夹** 设置为 **查看、编辑** 和 **上传**：
- en: '![Figure 8.5 – Configuring additional SharePoint settings](img/B21234_08_05.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.5 – 配置附加 SharePoint 设置](img/B21234_08_05.jpg)'
- en: Figure 8.5 – Configuring additional SharePoint settings
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.5 – 配置附加 SharePoint 设置
- en: Click **Save**.
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单击 **保存**。
- en: The next step is to create a document library that will hold attendees’ identity
    documents.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是创建一个文档库，用于存储与会者的身份文件。
- en: Provisioning a SharePoint document library
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置 SharePoint 文档库
- en: This solution requires a storage location to hold the uploaded identity document.
    While you can use the default document library, it tends to lead to more troubleshooting
    as the library’s display name (**Documents**) is different than its actual name
    (**Shared Documents**).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 此解决方案需要一个存储位置来保存上传的身份文件。虽然您可以使用默认的文档库，但它的显示名称（**文档**）与其实际名称（**共享文档**）不同，这往往会导致更多的故障排除。
- en: 'To create a new SharePoint document library, follow these steps:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建新的 SharePoint 文档库，请按照以下步骤操作：
- en: Navigate to the **Event Registration** SharePoint site.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 **事件注册** SharePoint 站点。
- en: Click **New** and then select **Document library**.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单击 **新建** 然后选择 **文档库**。
- en: On the **Create new document library** page, select **Blank library**.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **创建新文档库** 页面上，选择 **空白库**。
- en: Enter `Uploads` in the **Name** field and click **Create**.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **名称** 字段中输入 `Uploads` 并单击 **创建**。
- en: That’s it! Next, we’ll create a SharePoint list for attendees.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！接下来，我们将为与会者创建一个 SharePoint 列表。
- en: Provisioning a SharePoint list
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置 SharePoint 列表
- en: 'The final piece of configuring the SharePoint list. The list will be used to
    store registrant information as well as track the identity validation status.
    Follow these steps:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 配置 SharePoint 列表的最后一部分。该列表将用于存储注册者信息以及跟踪身份验证状态。按照以下步骤操作：
- en: Navigate to the **Event Registration** SharePoint site.
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 **事件注册** SharePoint 站点。
- en: 'Click **New** and then select **List**:'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单击 **新建** 然后选择 **列表**：
- en: '![Figure 8.6 – Creating a new list](img/B21234_08_06.jpg)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.6 – 创建新列表](img/B21234_08_06.jpg)'
- en: Figure 8.6 – Creating a new list
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.6 – 创建新列表
- en: On the **Create a list** page, select **Blank list**.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **创建列表** 页面上，选择 **空白列表**。
- en: Enter a `Attendees`, and click **Create**.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入 `Attendees` 并单击 **创建**。
- en: 'On the **Attendees** list, click **Add column**. Select **Text** as the type
    and click **Next**:'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **与会者** 列表中，单击 **添加列**。选择 **文本** 作为类型并单击 **下一步**：
- en: '![Figure 8.7 – Configuring a new column](img/B21234_08_07.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.7 – 配置新列](img/B21234_08_07.jpg)'
- en: Figure 8.7 – Configuring a new column
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.7 – 配置新列
- en: Name the column `First name` and click **Save**.
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将列命名为 `First name` 并单击 **保存**。
- en: 'Repeat adding a column using the column names and types in *Table 8.1*:'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 *表 8.1* 中的列名和类型重复添加列：
- en: '| **Column name** | **Column type** |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
  zh: '| **列名** | **列类型** |'
- en: '| Last name | Text |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| 姓氏 | 文本 |'
- en: '| Phone number | Text |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
  zh: '| 电话号码 | 文本 |'
- en: '| DOB | Text |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
  zh: '| 出生日期 | 文本 |'
- en: '| Email | Text |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
  zh: '| 电子邮件 | 文本 |'
- en: '| Validation status | Choice: Pending submission, Passed, Failed |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
  zh: '| 验证状态 | 选择：待提交、通过、失败 |'
- en: '| Valid through | Text |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
  zh: '| 有效期 | 文本 |'
- en: '| Identity data | Text |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| 身份数据 | 文本 |'
- en: Table 8.1 – SharePoint list column information
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 表 8.1 – SharePoint 列表列信息
- en: Updating SharePoint Online settings
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更新 SharePoint Online 设置
- en: 'Next, you’ll need to configure the SharePoint Online tenant to display the
    **Request file** action. Follow these steps:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要配置 SharePoint Online 租户以显示 **请求文件** 操作。按照以下步骤操作：
- en: Launch an elevated PowerShell prompt.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动提升的 PowerShell 提示符。
- en: 'Install the latest version of the SharePoint Online Management PowerShell module:'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 SharePoint Online 管理PowerShell 模块的最新版本：
- en: '[PRE0]'
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Connect to the SharePoint Online management interface using `<tenant>-admin`
    to reference your site. See *Figure 8**.8*, where the tenant name is `o365ninja`.
    Your tenant name was established during the Microsoft 365 setup and is in the
    form of `tenant.onmicrosoft.com`:'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `<tenant>-admin` 连接到 SharePoint Online 管理界面以引用您的站点。参见 *图 8**.8*，其中租户名称为 `o365ninja`。您的租户名称是在
    Microsoft 365 设置期间建立的，格式为 `tenant.onmicrosoft.com`：
- en: '[PRE1]'
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![Figure 8.8 – Connecting to SharePoint Online](img/B21234_08_08.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.8 – 连接到 SharePoint Online](img/B21234_08_08.jpg)'
- en: Figure 8.8 – Connecting to SharePoint Online
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.8 – 连接到 SharePoint Online
- en: 'Next, you’ll need to enable the **Request files** feature on the SharePoint
    site you created earlier. Use the following cmdlet in the SharePoint Management
    Shell:'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-117
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![Figure 8.9 – Enabling the file request feature](img/B21234_08_09.jpg)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
- en: Figure 8.9 – Enabling the file request feature
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Once the setting has been updated, navigate to the SharePoint Online site URL
    for the event registration solution. Select **Uploads** to display the document
    library created earlier.
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create a new folder called `RegistrationData`. Right-click on the new folder
    and search for the **Request files** option, as shown in *Figure 8**.10*. If it
    is visible, everything has been configured properly:'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.10 – Viewing the availability of the Request files option](img/B21234_08_10.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
- en: Figure 8.10 – Viewing the availability of the Request files option
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Next, it’s time to configure a Teams meeting.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Establishing a Teams meeting
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This optional step can be performed if your event is going to be online and
    conducted through Microsoft Teams. In this process, you’ll create a meeting and
    export it as an ICS file. While you can generate an ICS file manually, it’s far
    easier just to export one from Outlook. To create a meeting, follow these steps:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to Microsoft Teams and select **Calendar** from the left rail to open
    the Calendar app.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click the dropdown next to **New meeting** and select **Town hall**. While
    webinars do have registration, it’s integrated into the app, and there currently
    isn’t a way to inject a flow into the native webinar registration process. Live
    events are scheduled to be retired in 2024, and meeting organizers should schedule
    either webinars or **Town hall** events. See *Figure 8**.11*:'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.11 – Creating a new Town hall meeting](img/B21234_08_11.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
- en: Figure 8.11 – Creating a new Town hall meeting
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Configure the details of the meeting, including **Title**, **Start date**, **End
    date**, and **Description** values.
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Scroll to the bottom of the invitation and select **Public** under **Attendees**:'
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.12 – Configuring the meeting settings](img/B21234_08_12.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
- en: Figure 8.12 – Configuring the meeting settings
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Publish** to publish the meeting.
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Launch the Outlook desktop client.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Navigate to the calendar event that was created by the Teams meeting wizard.
    Open the meeting.
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **File** to open the **Backstage** tab, then select **Save As**.
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Navigate to a OneDrive for Business or SharePoint Online site where you can
    save the ICS file. Ensure the **Save Selected Appointment** radio button is selected
    and click **Save**:'
  id: totrans-140
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.13 – Saving the calendar file](img/B21234_08_13.jpg)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
- en: Figure 8.13 – Saving the calendar file
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: Once the registration is complete and identity validated, this calendar appointment
    will be delivered with a success confirmation email.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: Building an input form
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The final preparation step is building a Microsoft form that will be used by
    event participants to register. To configure the form, follow these steps:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: 'Navigate to Microsoft Forms ([https://forms.microsoft.com](https://forms.microsoft.com))
    and click **New Form**:'
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到Microsoft表单([https://forms.microsoft.com](https://forms.microsoft.com))并点击**新建表单**：
- en: '![Figure 8.14 – Creating a new Microsoft form](img/B21234_08_14.jpg)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![图8.14 – 创建新的Microsoft表单](img/B21234_08_14.jpg)'
- en: Figure 8.14 – Creating a new Microsoft form
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.14 – 创建新的Microsoft表单
- en: 'Name the form, and add text fields for **First name**, **Last name**, **Email**,
    and **Phone number**:'
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为表单命名，并添加**姓名**、**姓氏**、**电子邮件**和**电话号码**文本字段：
- en: '![Figure 8.15 – Adding fields](img/B21234_08_15.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![图8.15 – 添加字段](img/B21234_08_15.jpg)'
- en: Figure 8.15 – Adding fields
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.15 – 添加字段
- en: 'Expand the ellipsis and select **Settings**, as shown in *Figure 8**.16*:'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 展开省略号并选择**设置**，如图*图8**.16*所示：
- en: '![Figure 8.16 – Configuring form settings](img/B21234_08_16.jpg)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图8.16 – 配置表单设置](img/B21234_08_16.jpg)'
- en: Figure 8.16 – Configuring form settings
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.16 – 配置表单设置
- en: 'Under **Who can fill out this form**, ensure that the **Anyone can respond**
    radio button is selected:'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**谁可以填写此表单**下，确保选中**任何人都可以响应**单选按钮：
- en: '![Figure 8.17 – Updating form settings](img/B21234_08_17.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图8.17 – 更新表单设置](img/B21234_08_17.jpg)'
- en: Figure 8.17 – Updating form settings
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.17 – 更新表单设置
- en: 'Click **Collect responses** and then copy the form link to a text file for
    later use during the testing phase:'
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**收集响应**，然后将表单链接复制到文本文件中，以便在测试阶段使用：
- en: '![Figure 8.18 – Copying the form link](img/B21234_08_18.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图8.18 – 复制表单链接](img/B21234_08_18.jpg)'
- en: Figure 8.18 – Copying the form link
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.18 – 复制表单链接
- en: With the prerequisites configured, it’s time to start working on some automation!
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 配置好先决条件后，是时候开始一些自动化工作了！
- en: Creating flows
  id: totrans-162
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建流程
- en: This solution has two flows—one that is triggered on the form response and another
    that is triggered when the identity document is uploaded to SharePoint.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 此解决方案有两个流程——一个是在表单响应时触发，另一个是在身份证明文件上传到SharePoint时触发。
- en: What do I do if I’m stuck?
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我遇到困难怎么办？
- en: 'If you run into a roadblock for some reason (can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 如果由于某种原因遇到障碍（找不到功能、选项未显示或内容不明确），帮助只需点击一下！您可以从我们的GitHub网站下载本章的工件：[https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution)。
- en: Let’s get started with the first flow!
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始第一个流程！
- en: Configuring a flow to handle form submission
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置处理表单提交的流程
- en: This flow is triggered on the submission of a form. After the form has been
    processed, the registrant will receive an email prompting them to upload their
    identity document. As mentioned earlier, Forms does allow a file upload natively,
    but it requires the user to be authenticated to the Microsoft 365 tenant (which
    isn’t ideal for external users).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 此流程在表单提交时触发。表单处理完毕后，注册者将收到一封电子邮件，提示他们上传身份证明文件。如前所述，表单确实允许原生文件上传，但需要用户验证到Microsoft
    365租户（这对外部用户来说并不理想）。
- en: Processing the form
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理表单
- en: 'In this first section, you’ll start by processing the Microsoft Form data.
    Follow these steps:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将首先处理Microsoft表单数据。按照以下步骤操作：
- en: Open a browser and navigate to the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com)),
    select **Create**, and then click **Automated** **cloud flow**.
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开浏览器并导航到Power Automate制作门户([https://make.powerautomate.com](https://make.powerautomate.com))，选择**创建**，然后点击**自动****云流程**。
- en: On the **Build an automated cloud flow** page, enter a **Flow name** value and
    then select the **When a new response is submitted** trigger. Click **Create**.
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**构建自动云流程**页面，输入**流程名称**值，然后选择**当有新响应提交时**触发器。点击**创建**。
- en: 'On the canvas, click the **When a new response is submitted** trigger. If necessary,
    click **Change connection** to log in to Microsoft 365:'
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在画布上，点击**当有新响应提交时**触发器。如有必要，点击**更改连接**登录到Microsoft 365：
- en: '![Figure 8.19 – Updating the trigger with credentials](img/B21234_08_19.jpg)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![图8.19 – 使用凭据更新触发器](img/B21234_08_19.jpg)'
- en: Figure 8.19 – Updating the trigger with credentials
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
