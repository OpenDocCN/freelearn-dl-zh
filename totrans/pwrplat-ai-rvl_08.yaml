  - PREF_IND
  type: TYPE_NORMAL
  zh: 此表达式是从查看先前的流程运行中得出的，以确定从**发送HTTP请求到SharePoint**操作的输出中可用的哪些属性。见*图8**.28*：
- en: '![Figure 8.28 – Reviewing the output of a successful Send an HTTP request to
    SharePoint action](img/B21234_08_28.jpg)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![图8.28 – 查看成功的发送HTTP请求到SharePoint操作的输出](img/B21234_08_28.jpg)'
- en: Figure 8.28 – Reviewing the output of a successful Send an HTTP request to SharePoint
    action
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.28 – 查看成功的发送HTTP请求到SharePoint操作的输出
- en: 'From a JSON output perspective, the structure is the following:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 从JSON输出角度来看，结构如下：
- en: '[PRE10]'
  id: totrans-259
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The property that’s needed for the attendee to upload their identity document
    is stored in the `Url` key/value pair. Power Automate allows you to navigate levels
    of the JSON structure using a `/` character. Traversing the JSON object from the
    `Url` node reveals the hierarchy that’s needed to reference the URL:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 需要存储在`Url`键/值对中的属性，以便参会者上传他们的身份证明文件。Power Automate允许您使用`/`字符导航JSON结构的层级。从`Url`节点遍历JSON对象可以揭示引用URL所需的层次结构：
- en: '`Url` > `sharingLinkInfo` > `ShareLink` > `d` > `body`'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '`Url` > `sharingLinkInfo` > `ShareLink` > `d` > `body`'
- en: 'When translating this to the Power Automate syntax, it becomes the following:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 当将其转换为Power Automate语法时，它变为以下内容：
- en: '[PRE11]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Click **Add**.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**添加**。
- en: In the **SharePoint Online file request** scope, click **Add an action** after
    the **ComposeURL** action.
  id: totrans-265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**SharePoint Online文件请求**范围内，在**ComposeURL**操作之后点击**添加操作**。
- en: Select the **Send an email V2** Outlook action.
  id: totrans-266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**发送电子邮件V2** Outlook操作。
- en: In the **Send an email (V2)** action flyout, populate the **To** field using
    the **Email** dynamic content token from the **Get response** **details** action.
  id: totrans-267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**发送电子邮件（V2）**操作弹出窗口中，使用**获取响应** **详细信息**操作的**电子邮件**动态内容令牌填写**收件人**字段。
- en: 'Enter a **Subject** name and create a basic email message in the **Body** area.
    Be sure to include the **Outputs** dynamic content value from the **ComposeURL**
    action (since it contains the URL necessary for the attendee to upload their identity
    document), as shown in *Figure 8**.29*:'
  id: totrans-268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Subject**名称中输入，并在**Body**区域创建一个基本的电子邮件消息。务必包括来自**ComposeURL**操作的**Outputs**动态内容值（因为它包含参会者上传身份证明文件所需的URL），如图*图8.29*所示。29*：
- en: '![Figure 8.29 – Configuring the Send an email (V2) action](img/B21234_08_29.jpg)'
  id: totrans-269
  prefs: []
  type: TYPE_IMG
  zh: '![图8.29 – 配置发送电子邮件（V2）操作](img/B21234_08_29.jpg)'
- en: Figure 8.29 – Configuring the Send an email (V2) action
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.29 – 配置发送电子邮件（V2）操作
- en: Click **Save**.
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**Save**。
- en: At this point, you can test the flow by submitting a form and seeing if a message
    arrives in the registrant’s email. Otherwise, let’s get creating the second flow!
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，您可以通过提交表单并查看是否收到注册者的电子邮件来测试流程。否则，让我们开始创建第二个流程！
- en: Processing the identity document
  id: totrans-273
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理身份证明文件
- en: Up to this point, you’ve created a flow that processes a Microsoft Forms response
    and uses the data inside to generate a custom file upload link to the registrant.
    In this next flow, you’ll use the AI Builder Identity Document reader to extract
    data from the uploaded file and update the corresponding attendee registration
    row in the **Attendees** SharePoint list.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，您已创建了一个处理Microsoft Forms响应的流程，并使用其中的数据为注册者生成一个自定义文件上传链接。在下一个流程中，您将使用AI
    Builder身份证明文件读取器从上传的文件中提取数据，并更新**Attendees** SharePoint列表中相应的参会者注册行。
- en: Let’s go!
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: From the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com)),
    click **Create** and select **Automated** **cloud flow**.
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从Power Automate制作门户([https://make.powerautomate.com](https://make.powerautomate.com))，点击**Create**并选择**Automated
    Cloud Flow**。
- en: 'Enter a **Flow name** value and select the **When a file is created (properties
    only)** SharePoint trigger, as shown in *Figure 8**.30*:'
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入**Flow name**值并选择**When a file is created (properties only)** SharePoint触发器，如图*图8.30*所示：
- en: '![Figure 8.30 – Creating a new flow](img/B21234_08_30.jpg)'
  id: totrans-278
  prefs: []
  type: TYPE_IMG
  zh: '![图8.30 – 创建新的流程](img/B21234_08_30.jpg)'
- en: Figure 8.30 – Creating a new flow
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.30 – 创建新的流程
- en: Click **Create**.
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**Create**。
- en: Select the **When a file is created (properties only)** trigger to bring up
    the flyout.
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择**When a file is created (properties only)**触发器以打开弹出窗口。
- en: Under **Site Address**, select the **Event** **Registration** site.
  id: totrans-282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Site Address**下，选择**Event Registration**网站。
- en: Under **Library Name**, select **Uploads**.
  id: totrans-283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Library Name**下，选择**Uploads**。
- en: Since the **When a file is created (properties only)** action is also triggered
    upon folder creation, it’s important to exclude folder creation activities from
    the trigger. Select the **Settings** tab of the action. Under **Trigger conditions**,
    click **Add**.
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于**When a file is created (properties only)**操作在文件夹创建时也会触发，因此排除文件夹创建活动很重要。选择操作的**Settings**选项卡。在**Trigger
    conditions**下，点击**Add**。
- en: 'In the field, enter `@equals(triggerOutputs()?[''body/{IsFolder}''],false)`
    to filter out events that involve folder creation. See *Figure 8**.31*:'
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在字段中输入`@equals(triggerOutputs()?['body/{IsFolder}'],false)`以过滤掉涉及文件夹创建的事件。见图*图8.31*：
- en: '![Figure 8.31 – Adding a trigger condition](img/B21234_08_31.jpg)'
  id: totrans-286
  prefs: []
  type: TYPE_IMG
  zh: '![图8.31 – 添加触发条件](img/B21234_08_31.jpg)'
- en: Figure 8.31 – Adding a trigger condition
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.31 – 添加触发条件
- en: Next, bring the content of the uploaded file into the flow by adding a `(concat(utcNow('yyyyMMddHHMMss'),'_',body('Get_response_details')?['value'])`.
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，通过添加`(concat(utcNow('yyyyMMddHHMMss'),'_',body('Get_response_details')?['value']))`将上传文件的正文内容引入流程中。
- en: In the **Get file content using path** flyout, under **Site Address**, choose
    the **Event** **Registration** site.
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Get file content using path**弹出窗口中，在**Site Address**下选择**Event Registration**网站。
- en: In the **File path** field, select the **Full Path** dynamic content token under
    the **When a file is created (properties** **only)** action.
  id: totrans-290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**File path**字段中，选择**When a file is created (properties only)**操作下的**Full Path**动态内容令牌。
- en: Power Automate may add a **For each** or **Apply to each** control since more
    than one new document may be present when the flow runs. If one isn’t automatically
    added, click **+** and then select **Add an action**. Select the **Apply to each**
    control and drag the **Get file content** action into it.
  id: totrans-291
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当流程运行时，如果存在多个新文件，Power Automate可能会添加**For each**或**Apply to each**控件。如果没有自动添加，请点击**+**，然后选择**Add
    an action**。选择**Apply to each**控件，并将**Get file content**操作拖入其中。
- en: Note
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: If the **Dynamic content** control doesn’t show any dynamic content values,
    you may try switching to the Classic Power Automate designer and re-add the **Get
    file content using path** action. If desired, you can save and switch back to
    **New** **designer** afterward.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 如果**动态内容**控制没有显示任何动态内容值，您可以尝试切换到经典 Power Automate 设计器并重新添加**获取文件内容使用路径**操作。如果需要，您可以在之后保存并切换回**新**
    **设计器**。
- en: 'After the **Get file content using path** action, click **Add an action** and
    select the **Extract information from identity documents** AI Builder action,
    as shown in *Figure 8**.32*:'
  id: totrans-294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**获取文件内容使用路径**操作之后，点击**添加操作**并选择**从身份证明文件中提取信息** AI Builder 操作，如图*图 8.32*所示：
- en: '![Figure 8.32 – Adding the AI Builder action](img/B21234_08_32.jpg)'
  id: totrans-295
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.32 – 添加 AI Builder 操作](img/B21234_08_32.jpg)'
- en: Figure 8.32 – Adding the AI Builder action
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.32 – 添加 AI Builder 操作
- en: 'In the **Extract information from identity documents** flyout, add the **File
    Content** dynamic token from the **Get file content using** **path** action:'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**从身份证明文件中提取信息**飞出窗口中，从**获取文件内容使用** **路径**操作添加**文件内容**动态令牌：
- en: '![Figure 8.33 – Selecting the file content to use with AI Builder](img/B21234_08_33.jpg)'
  id: totrans-298
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.33 – 选择与 AI Builder 一起使用的文件内容](img/B21234_08_33.jpg)'
- en: Figure 8.33 – Selecting the file content to use with AI Builder
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.33 – 选择与 AI Builder 一起使用的文件内容
- en: After the **Extract information from identity documents** action, click **Add
    an action** and select the **Get items** SharePoint action.
  id: totrans-300
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**从身份证明文件中提取信息**操作之后，点击**添加操作**并选择**获取项目** SharePoint 操作。
- en: Under **Site Address**, select the **Event** **Registration** site.
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**网站地址**下，选择**事件** **注册**网站。
- en: Under **List Name**, select the **Attendees** list.
  id: totrans-302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**列表名称**下，选择**与会者**列表。
- en: In the **Advanced parameters** dropdown, select the **Filter** **Query** parameter.
  id: totrans-303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**高级参数**下拉菜单中，选择**过滤** **查询**参数。
- en: In the `Title eq'`.
  id: totrans-304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`Title eq'`。
- en: Click inside the **Filter Query** field and add an expression.
  id: totrans-305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Filter Query**字段内点击并添加一个表达式。
- en: 'Enter `split(triggerOutputs()?[''body/{Path}''],''/'')?[1]` in the text area
    and click `''` character to the **Filter Query** string. The completed value should
    resemble the following:'
  id: totrans-306
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在文本区域中输入`split(triggerOutputs()?['body/{Path}'],'/')?[1]`并点击**Filter Query**字符串中的`'`字符。完成的值应类似于以下内容：
- en: '[PRE12]'
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The expression manipulates the SharePoint item path, extracting the value after
    the `/` character. This path value is the same as the item name value of the corresponding
    item in the SharePoint list.
  id: totrans-308
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 该表达式操作 SharePoint 项目路径，提取 `/` 字符后面的值。此路径值与 SharePoint 列表中相应项目的项目名称值相同。
- en: 'After the **Get items** action, click **Add an action** and choose the **Get**
    **item** action:'
  id: totrans-309
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**获取项目**操作之后，点击**添加操作**并选择**获取** **项目**操作：
- en: '![Figure 8.34 – Choosing the Get item action](img/B21234_08_34.jpg)'
  id: totrans-310
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.34 – 选择获取项目操作](img/B21234_08_34.jpg)'
- en: Figure 8.34 – Choosing the Get item action
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.34 – 选择获取项目操作
- en: Be sure to get the **Get item** action (and not the **Get items** action). **Get
    items** returns a collection of items, while **Get item** returns a single item.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 确保获取的是**获取项目**操作（而不是**获取项目**操作）。**获取项目**返回项目集合，而**获取项目**返回单个项目。
- en: Under **Site Address**, select the **Event** **Registration** site.
  id: totrans-313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**网站地址**下，选择**事件** **注册**网站。
- en: Under **List Name**, select the **Attendees** list.
  id: totrans-314
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**列表名称**下，选择**与会者**列表。
- en: Click in the **Id** field area. Select the expression icon.
  id: totrans-315
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**Id**字段区域点击。选择表达式图标。
- en: 'On the `first(outputs(''Get_items'')?[''body/value''])?[''id'']`. Click **Add**:'
  id: totrans-316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在`first(outputs('Get_items')?['body/value'])?['id']`上点击**添加**：
- en: '![Figure 8.35 – Configuring the item expression](img/B21234_08_35.jpg)'
  id: totrans-317
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.35 – 配置项目表达式](img/B21234_08_35.jpg)'
- en: Figure 8.35 – Configuring the item expression
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.35 – 配置项目表达式
- en: The previous expression used a filter query to return a single item. This expression
    builds on that by looking up the `id` property of the **Get items** action using
    the output of the expression in *step 20*.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的表达式使用过滤查询返回单个项目。这个表达式在此基础上通过查找**获取项目**操作的`id`属性，使用*步骤 20*中表达式的输出。
- en: After the **Get item** action, select **Add an action** and choose the **Condition**
    control.
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在**获取项目**操作之后，选择**添加操作**并选择**条件**控制。
- en: 'Configure the **Condition** control flyout. In the **Condition expression**
    area, configure the conditions based on *Table 8.2*:'
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 配置**条件**控制飞出窗口。在**条件表达式**区域，根据*表 8.2*配置条件：
- en: '| **Condition** | **Operation** | **Condition** |'
  id: totrans-322
  prefs: []
  type: TYPE_TB
  zh: '| **条件** | **操作** | **条件** |'
- en: '| **First name** from **Extract information from identity documents** AI Builder
    action | **Contains** | **First name** from **Get item** SharePoint action |'
  id: totrans-323
  prefs: []
  type: TYPE_TB
  zh: '| **从身份证明文档中提取信息** AI Builder 操作的 **名字** | **包含** | **从获取项** SharePoint 操作中提取的
    **名字** |'
- en: '| **Last name** from **Extract information from identity documents** AI Builder
    action | **Contains** | **Last name** from **Get item** SharePoint action |'
  id: totrans-324
  prefs: []
  type: TYPE_TB
  zh: '| **从身份证明文档中提取信息** AI Builder 操作的 **姓氏** | **包含** | **从获取项** SharePoint 操作中提取的
    **姓氏** |'
- en: Table 8.2 – Configuring Condition control values
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 表 8.2 – 配置条件控制值
- en: '28. Review the **Condition** control configuration. See *Figure 8**.36*:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: '28. 检查 **条件** 控制配置。参见 *图 8**.36*:'
- en: '![Figure 8.36 – Reviewing the Condition control](img/B21234_08_36.jpg)'
  id: totrans-327
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.36 – 检查条件控制](img/B21234_08_36.jpg)'
- en: Figure 8.36 – Reviewing the Condition control
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.36 – 检查条件控制
- en: 29. In the **True** branch of the **Condition** control, click **Add an action**.
    Select the **Update item** SharePoint action.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 29. 在 **条件** 控制的 **True** 分支中，点击 **添加操作**。选择 **更新项** SharePoint 操作。
- en: 30. On the **Update item** flyout, under **Site Address**, choose the **Event**
    **Registration** site.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 30. 在 **更新项** 飞出窗口中，在 **站点地址** 下，选择 **事件** **注册** 网站。
- en: 31. Under **List Name**, select the **Attendees** list.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 31. 在 **列表名称** 下，选择 **与会者** 列表。
- en: '32. In the **Id** field, add the **ID** dynamic content token from the **Get
    item** (not **Get items**) action. See *Figure 8**.37*:'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: '32. 在 **Id** 字段中，添加来自 **获取项** (not **获取项**) 操作的 **ID** 动态内容令牌。参见 *图 8**.37*:'
- en: '![Figure 8.37 – Configuring the Update item action](img/B21234_08_37.jpg)'
  id: totrans-333
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.37 – 配置更新项操作](img/B21234_08_37.jpg)'
- en: Figure 8.37 – Configuring the Update item action
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.37 – 配置更新项操作
- en: 33. Under **Advanced parameters**, click **Show all**.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 33. 在 **高级参数** 下，点击 **显示全部**。
- en: 34. In the **DOB** field, add the **Date of Birth** dynamic content value from
    the AI Builder **Extract information from identity** **documents** action.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 34. 在 **DOB** 字段中，添加来自 AI Builder **从身份证明文档中提取信息** 操作的 **出生日期** 动态内容值。
- en: 35. In the **Validation Status Value** dropdown, select **Passed**.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 35. 在 **验证状态值** 下拉菜单中，选择 **通过**。
- en: 36. In the **Identity Document** field, select the **Document Number** dynamic
    content value from the AI Builder **Extract information from identity** **documents**
    action.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 36. 在 **身份证明文档** 字段中，选择来自 AI Builder **从身份证明文档中提取信息** 操作的 **文件编号** 动态内容值。
- en: '37. In the **Valid Through** field, select the **Date of Expiration** dynamic
    content value from the AI Builder **Extract information from identity documents**
    action. See *Figure 8**.38*:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: '37. 在 **有效期** 字段中，从 AI Builder **从身份证明文档中提取信息** 操作中选择 **到期日期** 动态内容值。参见 *图
    8**.38*:'
- en: '![Figure 8.38 – Configuring the Update item action](img/B21234_08_38.jpg)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.38 – 配置更新项操作](img/B21234_08_38.jpg)'
- en: Figure 8.38 – Configuring the Update item action
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.38 – 配置更新项操作
- en: 38. Click **Save**.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 38. 点击 **保存**。
- en: To finish up this flow, we’ll configure the notification emails.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成此流程，我们将配置通知电子邮件。
- en: Sending confirmation messages
  id: totrans-344
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发送确认消息
- en: 'Follow these steps:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤操作：
- en: In the **True** branch of the **Condition** control, click **Add an action**
    after the **Update item** action. Select the **Get file** **content** action.
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **条件** 控制的 **True** 分支中，在 **更新项** 操作后点击 **添加操作**。选择 **获取文件内容** 操作。
- en: Rename the `Get` `calendar invitation`.
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重命名 `Get` `calendar invitation`。
- en: In the **Site Address** dropdown, select the site where you saved the ICS calendar
    file from the *Establishing a Teams meeting* prerequisite step.
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **站点地址** 下拉菜单中，选择从 *建立 Teams 会议* 预先步骤中保存的 ICS 日历文件所在的站点。
- en: 'In the **File Path** field, click the folder icon and browse to the saved ICS
    file. See *Figure 8**.39*:'
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '在 **文件路径** 字段中，点击文件夹图标并浏览到保存的 ICS 文件。参见 *图 8**.39*:'
- en: '![Figure 8.39 – Getting the ICS calendar file for the meeting invitation](img/B21234_08_39.jpg)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.39 – 获取会议邀请的 ICS 日历文件](img/B21234_08_39.jpg)'
- en: Figure 8.39 – Getting the ICS calendar file for the meeting invitation
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.39 – 获取会议邀请的 ICS 日历文件
- en: In the **True** branch of the **Condition** control, click **Add an action**
    after the **Get calendar invitation** action. Select the **Send an email (****V2)**
    action.
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **条件** 控制的 **True** 分支中，在 **获取日历邀请** 操作后点击 **添加操作**。选择 **发送电子邮件（****V2）**
    操作。
- en: Select the **Send an email (****V2)** action.
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择 **发送电子邮件（****V2）** 操作。
- en: In the **To** field, select the **Email** dynamic content token from the **Get**
    **item** action.
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **收件人** 字段中，选择来自 **获取** **项** 操作的 **电子邮件** 动态内容令牌。
- en: In the `Congratulations! Your event registration` `is complete!`.
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `Congratulations! Your event registration` `is complete!`。
- en: In the **Body** area, enter a message.
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **正文** 区域，输入一条消息。
- en: Under **Advanced parameters**, select the checkbox to enable the **Attachments**
    parameter.
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **高级参数** 下，选中复选框以启用 **附件** 参数。
- en: In the `Meeting.ics`) for the attachment.
  id: totrans-358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 `Meeting.ics`) 附件中。
- en: 'In the **Content** field, add the **File Content** dynamic content token from
    the **Get calendar** **invitation** action:'
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **内容** 字段中，从 **Get calendar invitation** 操作添加 **File Content** 动态内容令牌：
- en: '![Figure 8.40 – Adding an attachment to the email message](img/B21234_08_40.jpg)'
  id: totrans-360
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.40 – 将附件添加到电子邮件消息中](img/B21234_08_40.jpg)'
- en: Figure 8.40 – Adding an attachment to the email message
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.40 – 将附件添加到电子邮件消息中
- en: In the **Attachments** area, click on the **Switch to input entire** **array**
    icon.
  id: totrans-362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **附件** 区域，点击 **切换到输入整个数组** 图标。
- en: 'Remove the quotation marks surrounding the **File Content** dynamic object.
    See *Figure 8**.41*:'
  id: totrans-363
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 移除 **File Content** 动态对象周围的引号。见 *图 8**.41*：
- en: '![Figure 8.41 – Updating the attachment area](img/B21234_08_41.jpg)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.41 – 更新附件区域](img/B21234_08_41.jpg)'
- en: Figure 8.41 – Updating the attachment area
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.41 – 更新附件区域
- en: It’s important to remove the quotation marks surrounding the dynamic content
    token here—otherwise, the attachment shows up as a `base64`-encoded file and cannot
    be added to the calendar.
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这里，重要的是要移除动态内容令牌周围的引号——否则，附件将显示为 `base64` 编码的文件，无法添加到日历中。
- en: 'Under the **True** branch of the **Condition** control, right-click the **Update
    item** action and select **Copy action**, as shown in *Figure 8**.42*:'
  id: totrans-367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **Condition** 控制的 **True** 分支下，右键单击 **Update item** 操作并选择 **复制操作**，如 *图 8**.42*
    所示：
- en: '![Figure 8.42 – Copying an action](img/B21234_08_42.jpg)'
  id: totrans-368
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.42 – 复制操作](img/B21234_08_42.jpg)'
- en: Figure 8.42 – Copying an action
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.42 – 复制操作
- en: 'In the **False** branch of the **Condition** control, click **+** and then
    select **Paste** **an action**:'
  id: totrans-370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **False** 分支的 **Condition** 控制中，点击 **+** 并选择 **粘贴操作**：
- en: '![Figure 8.43 – Pasting an action](img/B21234_08_43.jpg)'
  id: totrans-371
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.43 – 粘贴操作](img/B21234_08_43.jpg)'
- en: Figure 8.43 – Pasting an action
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.43 – 粘贴操作
- en: Rename the action to `Update item –` `Failed`.
  id: totrans-373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将操作重命名为 `Update item – Failed`。
- en: Under **Advanced parameters**, delete the dynamic content tokens for **DOB**,
    **Identity document**, and **Valid through**.
  id: totrans-374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **高级参数** 下，删除 **DOB**、**Identity document** 和 **Valid through** 的动态内容令牌。
- en: Under the **Validation Status Value** dropdown, select **Failed**.
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **Validation Status Value** 下拉菜单中，选择 **Failed**。
- en: Under the **True** branch of the **Condition** control, right-click the **Send
    an email (V2)** action and select **Copy action**.
  id: totrans-376
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **Condition** 控制的 **True** 分支下，右键单击 **Send an email (V2)** 操作并选择 **复制操作**。
- en: In the **False** branch of the **Condition** control, click the **+** sign after
    the **Update item – Failed** action and click **Paste** **an action**.
  id: totrans-377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **False** 分支的 **Condition** 控制中，点击 **Update item – Failed** 操作后面的 **+** 符号，然后点击
    **粘贴操作**。
- en: Rename the action to `Send an email (V2) –` `Failed`.
  id: totrans-378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将操作重命名为 `Send an email (V2) – Failed`。
- en: Update the **Subject** value with a message indicating an incomplete registration.
  id: totrans-379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用表示注册不完整的消息更新 **Subject** 值。
- en: Update the **Body** value with instructions for resolving the issue.
  id: totrans-380
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用解决问题的说明更新 **正文** 值。
- en: 'Under **Advanced parameters**, click the **X** sign to remove the configured
    attachment:'
  id: totrans-381
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 **高级参数** 下，点击 **X** 符号以移除配置的附件：
- en: '![Figure 8.44 – Removing the attachment](img/B21234_08_44.jpg)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.44 – 移除附件](img/B21234_08_44.jpg)'
- en: Figure 8.44 – Removing the attachment
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.44 – 移除附件
- en: Click **Save**.
  id: totrans-384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **保存**。
- en: Now for the moment of truth!
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是关键时刻！
- en: Testing the flow
  id: totrans-386
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测试流程
- en: You may have been tempted to test this flow while you were building it—and that’s
    totally fine. It’s part of the learning process and an important step to verify
    that your syntax is correct and that you have chosen the correct dynamic content
    tokens.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经想在你构建流程时测试这个流程——这是完全可以的。这是学习过程的一部分，并且是验证你的语法是否正确以及你是否选择了正确的动态内容令牌的重要步骤。
- en: 'To test the flow, you’ll need a few things:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试流程，你需要一些东西：
- en: An email account where you can receive confirmation messages
  id: totrans-389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个可以接收确认消息的电子邮件账户
- en: A driver’s license or passport (either real or samples from the internet) that
    features a full name, date of birth, expiration date, and document number
  id: totrans-390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含全名、出生日期、到期日期和文件编号的驾照或护照（可以是真实的或来自互联网的样本）
- en: A phone or tablet device with a camera (or an already digitized identity document)
  id: totrans-391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有摄像头（或已数字化身份证明文件）的手机或平板设备
- en: 'To execute the flow, follow these steps:'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行流程，请按照以下步骤操作：
- en: Navigate to the Microsoft form you created in the prerequisite section. You
    should have captured the form URL in *step 5* of the *Building an input* *form*
    section.
  id: totrans-393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到您在先决条件部分创建的 Microsoft 表单。您应该在“构建输入表单”部分的*步骤 5*中捕获表单 URL。
- en: 'Fill out the form using a name that matches the identity document you’ll be
    submitting. Make sure you use an email address that you have access to. In this
    example, we’ll be using the following sample passport card for HAPPY TRAVELER:'
  id: totrans-394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用与您将要提交的身份证明文件匹配的姓名填写表格。请确保您使用的是可以访问的电子邮件地址。在此示例中，我们将使用以下示例护照卡为HAPPY TRAVELER：
- en: '![Figure 8.45 – Reviewing the identity document data](img/B21234_08_45.jpg)'
  id: totrans-395
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.45 – 查看身份证明文件数据](img/B21234_08_45.jpg)'
- en: Figure 8.45 – Reviewing the identity document data
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: '![图 8.45 – 查看身份证明文件数据](img/B21234_08_45.jpg)'
- en: Testing tip
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 测试技巧
- en: Enter the name in mixed case (such as `Happy Traveler`) to ensure you’re also
    testing the `toUpper()` function that converts the **First name** and **Last name**
    values to uppercase.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 使用混合大小写输入姓名（例如 `Happy Traveler`）以确保您也在测试将**姓氏**和**名字**值转换为大写的`toUpper()`函数。
- en: 'Check your email for the automated response. The response should have an upload
    link:'
  id: totrans-399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查您的电子邮件以获取自动响应。响应应包含一个上传链接：
- en: '![Figure 8.46 – Reviewing the submission email](img/B21234_08_46.jpg)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.46 – 查看提交的电子邮件](img/B21234_08_46.jpg)'
- en: Figure 8.46 – Reviewing the submission email
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.46 – 查看提交的电子邮件
- en: 'Click on the link. You should be redirected to a page where you can upload
    a file:'
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击链接。您应该会被重定向到一个可以上传文件的页面：
- en: '![Figure 8.47 – Navigating to the file upload page](img/B21234_08_47.jpg)'
  id: totrans-403
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.47 – 导航到文件上传页面](img/B21234_08_47.jpg)'
- en: Figure 8.47 – Navigating to the file upload page
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: '![图 8.47 – 导航到文件上传页面](img/B21234_08_47.jpg)'
- en: Click **Select files**. Browse to a previously saved image file or take a picture
    of a new one using the photo application on your mobile device.
  id: totrans-405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**选择文件**。浏览到之前保存的图像文件或使用您的移动设备上的照片应用拍摄新照片。
- en: Click **Upload**.
  id: totrans-406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**上传**。
- en: 'Wait for a confirmation message with the ICS calendar attachment:'
  id: totrans-407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 等待包含 ICS 日历附件的确认消息：
- en: '![Figure 8.48 – Reviewing the success confirmation](img/B21234_08_48.jpg)'
  id: totrans-408
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.48 – 查看成功确认](img/B21234_08_48.jpg)'
- en: Figure 8.48 – Reviewing the success confirmation
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: '![图 8.48 – 查看成功确认](img/B21234_08_48.jpg)'
- en: 'Double-click the attachment to add it to your calendar:'
  id: totrans-410
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 双击附件将其添加到您的日历：
- en: '![Figure 8.49 – Adding the invitation to the calendar](img/B21234_08_49.jpg)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.49 – 将邀请添加到日历](img/B21234_08_49.jpg)'
- en: Figure 8.49 – Adding the invitation to the calendar
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: '![图 8.49 – 将邀请添加到日历](img/B21234_08_49.jpg)'
- en: 'View the meeting information, complete with the join link:'
  id: totrans-413
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看包含加入链接的会议信息：
- en: '![Figure 8.50 – Viewing the calendar item](img/B21234_08_50.jpg)'
  id: totrans-414
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.50 – 查看日历项目](img/B21234_08_50.jpg)'
- en: Figure 8.50 – Viewing the calendar item
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: '![图 8.50 – 查看日历项目](img/B21234_08_50.jpg)'
- en: 'Navigate to the **Event Registration** site and select the **Attendees** list.
    Click the entry to view the extracted information:'
  id: totrans-416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到**事件注册**网站并选择**参会者**列表。点击条目以查看提取的信息：
- en: '![Figure 8.51 – Viewing the attendee information](img/B21234_08_51.jpg)'
  id: totrans-417
  prefs: []
  type: TYPE_IMG
  zh: '![图 8.51 – 查看参会者信息](img/B21234_08_51.jpg)'
- en: Figure 8.51 – Viewing the attendee information
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.51 – 查看参会者信息
- en: Congratulations! You’ve successfully verified the flow!
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！您已成功验证流程！
- en: You can also try submitting different combinations of identity documents and
    names to test the failure scenarios.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以尝试提交不同组合的身份证明文件和姓名来测试失败场景。
- en: Further exploration
  id: totrans-421
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进一步探索
- en: There are quite a few different ways to take this solution. One idea might be
    using a Zoom meeting instead of a Microsoft Teams meeting. To do so, you’ll need
    the Zoom client and calendar client. Instead of generating an ICS file manually,
    you’ll be able to download an ICS file directly through the Zoom interface. See
    [https://support.zoom.com/hc/en/article?id=zm_kb&sysparm_article=KB0060791](https://support.zoom.com/hc/en/article?id=zm_kb&sysparm_article=KB0060791).
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多不同的方法来实现这个解决方案。一个想法可能是使用 Zoom 会议而不是 Microsoft Teams 会议。为此，您需要 Zoom 客户端和日历客户端。您将能够直接通过
    Zoom 界面下载 ICS 文件，而不是手动生成。请参阅[https://support.zoom.com/hc/en/article?id=zm_kb&sysparm_article=KB0060791](https://support.zoom.com/hc/en/article?id=zm_kb&sysparm_article=KB0060791)。
- en: Another idea might be implementing more robust validation mechanisms for the
    identity document, such as verifying that the document is still valid or that
    it has a document identification number associated with it.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个想法可能是实施更健壮的身份证明文件验证机制，例如验证文件是否仍然有效或是否有与文件关联的文档识别号。
- en: Summary
  id: totrans-424
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: The exercises in this chapter demonstrated a lot of advanced capabilities of
    the Power Automate and SharePoint Online tools. You were able to successfully
    accept uploads from anonymous users, process identity using the native AI Builder
    document reader, and generate emails with meeting attachments—all in less than
    an hour!
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中的练习展示了 Power Automate 和 SharePoint Online 工具的许多高级功能。您能够在不到一个小时的时间内成功接受匿名用户的上传，使用原生
    AI Builder 文档阅读器处理身份信息，并生成带有会议附件的电子邮件！
- en: With the skills gained in this chapter, you can further enhance your identity
    processing requirements.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 通过本章获得的知识，您可以进一步强化您的身份处理需求。
- en: In the next chapter, we’ll learn about using another AI Builder model for text
    extraction.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将学习如何使用另一个 AI Builder 模型进行文本提取。
