- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Building an Event Registration App with Identity Verification
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are times when identity verification and validation are necessary to determine
    eligibility for a product or service. In this chapter, you’ll be learning about
    the AI Builder capabilities surrounding identity document content extraction.
  prefs: []
  type: TYPE_NORMAL
- en: The AI Builder Identity Document reader is a pre-built model that recognizes
    content in identity documents such as passports, driver’s licenses, and other
    forms of identification.
  prefs: []
  type: TYPE_NORMAL
- en: Designing a solution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: When thinking about how to build a solution that would process identity, I immediately
    thought of some sort of an event registration app or scenario that would require
    identity verification or validation—and it seemed like a great idea.
  prefs: []
  type: TYPE_NORMAL
- en: Many organizations host events. While some event registrations may be internal
    (such as a large organization’s yearly technical or sales conferences) and likely
    have little need for identity verification, many events are industry- or topic-focused,
    drawing in attendees from a myriad of companies. This seemed like a perfect target
    scenario.
  prefs: []
  type: TYPE_NORMAL
- en: I had an idea in my head of how I wanted this solution to work. However, when
    working with emerging technology products, sometimes the things you want to do
    don’t exactly line up with the capabilities of the products. As a solution designer,
    it’s important to be flexible and have a mindset that allows you to be able to
    pivot when you identify roadblocks.
  prefs: []
  type: TYPE_NORMAL
- en: 'When getting down to the details of the solution, I was faced with several
    challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Power Apps**-based solutions require tenant identity and licensing, neither
    of which are ideal for external users.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Microsoft Forms** allows for file uploads, but only for internal (tenant)
    users—again, making it not ideal for external use cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Power Pages** solutions can accept uploads, but a solution requires a pretty
    significant amount of permissions setup and management, in addition to designing
    an entire website interface and creating Dataverse tables. While there is a basic
    event registration app template available, it still requires a lot of customization
    and modification to apply this sort of validation logic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SharePoint Online** can accept file uploads but is typically restricted to
    authenticated users. There is a request-a-file API that does allow anonymous upload,
    but it requires enablement by a SharePoint administrator and crafting a custom
    API file link for a record.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you can see from the list of options, there are a lot of hurdles to overcome—whether
    it’s licensing, coding challenges, or end-user ease of use. All of these things
    must be taken into consideration when choosing how to implement a solution—there
    may be limitations of the product in the box that you need to work around, especially
    if you’re trying to minimize investment in third-party products or limit the amount
    of overall product development time.
  prefs: []
  type: TYPE_NORMAL
- en: In this solution, we’re going to choose a path that allows for simple form design
    (using Microsoft Forms) and leverage the SharePoint Online API (even though it
    requires a little bit of custom development work).
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 8**.1* depicts an overall workflow of how this solution will work:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.1 – Event registration and identity validation workflow](img/B21234_08_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.1 – Event registration and identity validation workflow
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s break this down:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The user fills out an event registration form using the Microsoft Forms link.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Power Automate triggers and processes the form response, requesting data upload
    from the user.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The user receives an email with instructions to upload their identity document.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The user clicks the link in the generated email to upload the identity document.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The identity document is stored in SharePoint Online.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AI Builder is triggered to validate the identity document.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The SharePoint Online event registration list is updated to reflect whether
    document validation was successful or unsuccessful.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The Power Automate condition checks the identity verification status:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If identity validation is successful, the user receives a confirmation email.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: If identity validation is unsuccessful, the user receives a failure notice.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, we’ll look at the licensing prerequisites for this solution.
  prefs: []
  type: TYPE_NORMAL
- en: Licensing prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Using AI models and connectors in the Power Platform has several prerequisites:'
  prefs: []
  type: TYPE_NORMAL
- en: A subscription that includes Microsoft Dataverse
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Builder capacity (or trial capacity)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Power Apps or Power Automate premium licensing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A subscription that includes Microsoft Teams
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A subscription that includes Exchange Online
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outlook desktop application
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you haven’t already enabled Dataverse and AI Builder capacity, see [*Chapter
    2*](B21234_02.xhtml#_idTextAnchor027), *Configuring an Environment to Support
    AI Services*, and [*Chapter 6*](B21234_06.xhtml#_idTextAnchor069), *Processing
    Data with* *Sentiment Analysis*.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring solution prerequisites
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Before you start the workflow configuration, you’ll need to create a SharePoint
    list to hold registrants’ information and a Teams meeting link that can be added
    to the confirmation email.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring SharePoint Online
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: By default, SharePoint Online is restricted to authenticated users—whether they’re
    in the same tenant or an external user who has previously redeemed a guest invitation.
    SharePoint does, however, allow anonymous sharing links as well as a feature for
    users to generate a file upload request and send it to an anonymous or otherwise
    unauthenticated user. We’ll be taking advantage of the file request feature in
    a programmatic fashion to get SharePoint Online to allow anonymous uploads as
    part of a workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs: []
  type: TYPE_NORMAL
- en: For more information on the file request feature, see [https://learn.microsoft.com/en-us/sharepoint/enable-file-requests](https://learn.microsoft.com/en-us/sharepoint/enable-file-requests)
    and [https://support.microsoft.com/en-us/office/create-a-file-request-f54aa7f8-2589-4421-b351-d415fc3b83af](https://support.microsoft.com/en-us/office/create-a-file-request-f54aa7f8-2589-4421-b351-d415fc3b83af).
    There are several caveats to getting this working (such as not restricting anonymous
    external access, anonymous or **Anyone** links enabled, and the appropriate permissions
    for **Anyone** links), so be sure your environment is configured.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s step through the requirements for making sure SharePoint Online is correctly
    configured.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a SharePoint site
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In order to receive file uploads, you’ll want to set up a new SharePoint site.
    To configure a new SharePoint site, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the SharePoint Online admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    click **Show all…**, and then select **SharePoint** under **Admin centers**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Expand **Sites** and select **Active sites**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Create a site: Select the site type** page, select **Team site**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Select a template** page, choose **Standard team**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Preview and use ‘Standard team’ template** page, click **Use template**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the `Event Registration`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add a **Group owner** name and click **Next**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Create site**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Finish**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'After you’ve created the site, be sure to capture the full site URL—it will
    be needed later. The full URL will be in the format of `https://<tenant>.sharepoint.com/sites/<sitename>`.
    You can retrieve the site URL by selecting the site in the SharePoint admin setting
    to expand the site properties and copying the **View site** link, as shown in
    *Figure 8**.2*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.2 – Copying the SharePoint site link](img/B21234_08_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.2 – Copying the SharePoint site link
  prefs: []
  type: TYPE_NORMAL
- en: Next, you’ll need to configure the **Anyone** links settings in the SharePoint
    admin center.
  prefs: []
  type: TYPE_NORMAL
- en: Enabling Anyone links
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The first requirement is ensuring that **Anyone** links are enabled at the
    tenant level. To do that, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the SharePoint Online admin center ([https://admin.microsoft.com](https://admin.microsoft.com)),
    click **Show all…**, and then select **SharePoint** under **Admin centers**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Expand **Policies** and select **Sharing**. Ensure that the SharePoint access
    control slider is moved all the way to the top (**Anyone**). See *Figure 8**.3*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.3 – Configuring SharePoint external sharing access control level](img/B21234_08_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.3 – Configuring SharePoint external sharing access control level
  prefs: []
  type: TYPE_NORMAL
- en: Expand the **More external sharing** **settings** dropdown.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ensure the **Allow only users in specific security groups to share externally**
    checkbox is cleared (not checked):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.4 – Configuring More external sharing settings](img/B21234_08_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.4 – Configuring More external sharing settings
  prefs: []
  type: TYPE_NORMAL
- en: 'Under **Choose expiration and permissions options for Anyone links**, ensure
    that **Folders** is set to **View, edit,** **and upload**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.5 – Configuring additional SharePoint settings](img/B21234_08_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.5 – Configuring additional SharePoint settings
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The next step is to create a document library that will hold attendees’ identity
    documents.
  prefs: []
  type: TYPE_NORMAL
- en: Provisioning a SharePoint document library
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This solution requires a storage location to hold the uploaded identity document.
    While you can use the default document library, it tends to lead to more troubleshooting
    as the library’s display name (**Documents**) is different than its actual name
    (**Shared Documents**).
  prefs: []
  type: TYPE_NORMAL
- en: 'To create a new SharePoint document library, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the **Event Registration** SharePoint site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **New** and then select **Document library**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Create new document library** page, select **Blank library**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter `Uploads` in the **Name** field and click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: That’s it! Next, we’ll create a SharePoint list for attendees.
  prefs: []
  type: TYPE_NORMAL
- en: Provisioning a SharePoint list
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The final piece of configuring the SharePoint list. The list will be used to
    store registrant information as well as track the identity validation status.
    Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the **Event Registration** SharePoint site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click **New** and then select **List**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.6 – Creating a new list](img/B21234_08_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.6 – Creating a new list
  prefs: []
  type: TYPE_NORMAL
- en: On the **Create a list** page, select **Blank list**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Enter a `Attendees`, and click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the **Attendees** list, click **Add column**. Select **Text** as the type
    and click **Next**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.7 – Configuring a new column](img/B21234_08_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.7 – Configuring a new column
  prefs: []
  type: TYPE_NORMAL
- en: Name the column `First name` and click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Repeat adding a column using the column names and types in *Table 8.1*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '| **Column name** | **Column type** |'
  prefs: []
  type: TYPE_TB
- en: '| Last name | Text |'
  prefs: []
  type: TYPE_TB
- en: '| Phone number | Text |'
  prefs: []
  type: TYPE_TB
- en: '| DOB | Text |'
  prefs: []
  type: TYPE_TB
- en: '| Email | Text |'
  prefs: []
  type: TYPE_TB
- en: '| Validation status | Choice: Pending submission, Passed, Failed |'
  prefs: []
  type: TYPE_TB
- en: '| Valid through | Text |'
  prefs: []
  type: TYPE_TB
- en: '| Identity data | Text |'
  prefs: []
  type: TYPE_TB
- en: Table 8.1 – SharePoint list column information
  prefs: []
  type: TYPE_NORMAL
- en: Updating SharePoint Online settings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, you’ll need to configure the SharePoint Online tenant to display the
    **Request file** action. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Launch an elevated PowerShell prompt.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Install the latest version of the SharePoint Online Management PowerShell module:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Connect to the SharePoint Online management interface using `<tenant>-admin`
    to reference your site. See *Figure 8**.8*, where the tenant name is `o365ninja`.
    Your tenant name was established during the Microsoft 365 setup and is in the
    form of `tenant.onmicrosoft.com`:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '![Figure 8.8 – Connecting to SharePoint Online](img/B21234_08_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.8 – Connecting to SharePoint Online
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, you’ll need to enable the **Request files** feature on the SharePoint
    site you created earlier. Use the following cmdlet in the SharePoint Management
    Shell:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '![Figure 8.9 – Enabling the file request feature](img/B21234_08_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.9 – Enabling the file request feature
  prefs: []
  type: TYPE_NORMAL
- en: Once the setting has been updated, navigate to the SharePoint Online site URL
    for the event registration solution. Select **Uploads** to display the document
    library created earlier.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create a new folder called `RegistrationData`. Right-click on the new folder
    and search for the **Request files** option, as shown in *Figure 8**.10*. If it
    is visible, everything has been configured properly:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.10 – Viewing the availability of the Request files option](img/B21234_08_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.10 – Viewing the availability of the Request files option
  prefs: []
  type: TYPE_NORMAL
- en: Next, it’s time to configure a Teams meeting.
  prefs: []
  type: TYPE_NORMAL
- en: Establishing a Teams meeting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This optional step can be performed if your event is going to be online and
    conducted through Microsoft Teams. In this process, you’ll create a meeting and
    export it as an ICS file. While you can generate an ICS file manually, it’s far
    easier just to export one from Outlook. To create a meeting, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to Microsoft Teams and select **Calendar** from the left rail to open
    the Calendar app.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click the dropdown next to **New meeting** and select **Town hall**. While
    webinars do have registration, it’s integrated into the app, and there currently
    isn’t a way to inject a flow into the native webinar registration process. Live
    events are scheduled to be retired in 2024, and meeting organizers should schedule
    either webinars or **Town hall** events. See *Figure 8**.11*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.11 – Creating a new Town hall meeting](img/B21234_08_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.11 – Creating a new Town hall meeting
  prefs: []
  type: TYPE_NORMAL
- en: Configure the details of the meeting, including **Title**, **Start date**, **End
    date**, and **Description** values.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Scroll to the bottom of the invitation and select **Public** under **Attendees**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.12 – Configuring the meeting settings](img/B21234_08_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.12 – Configuring the meeting settings
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Publish** to publish the meeting.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Launch the Outlook desktop client.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Navigate to the calendar event that was created by the Teams meeting wizard.
    Open the meeting.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **File** to open the **Backstage** tab, then select **Save As**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Navigate to a OneDrive for Business or SharePoint Online site where you can
    save the ICS file. Ensure the **Save Selected Appointment** radio button is selected
    and click **Save**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.13 – Saving the calendar file](img/B21234_08_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.13 – Saving the calendar file
  prefs: []
  type: TYPE_NORMAL
- en: Once the registration is complete and identity validated, this calendar appointment
    will be delivered with a success confirmation email.
  prefs: []
  type: TYPE_NORMAL
- en: Building an input form
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The final preparation step is building a Microsoft form that will be used by
    event participants to register. To configure the form, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Navigate to Microsoft Forms ([https://forms.microsoft.com](https://forms.microsoft.com))
    and click **New Form**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.14 – Creating a new Microsoft form](img/B21234_08_14.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.14 – Creating a new Microsoft form
  prefs: []
  type: TYPE_NORMAL
- en: 'Name the form, and add text fields for **First name**, **Last name**, **Email**,
    and **Phone number**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.15 – Adding fields](img/B21234_08_15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.15 – Adding fields
  prefs: []
  type: TYPE_NORMAL
- en: 'Expand the ellipsis and select **Settings**, as shown in *Figure 8**.16*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.16 – Configuring form settings](img/B21234_08_16.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.16 – Configuring form settings
  prefs: []
  type: TYPE_NORMAL
- en: 'Under **Who can fill out this form**, ensure that the **Anyone can respond**
    radio button is selected:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.17 – Updating form settings](img/B21234_08_17.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.17 – Updating form settings
  prefs: []
  type: TYPE_NORMAL
- en: 'Click **Collect responses** and then copy the form link to a text file for
    later use during the testing phase:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.18 – Copying the form link](img/B21234_08_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.18 – Copying the form link
  prefs: []
  type: TYPE_NORMAL
- en: With the prerequisites configured, it’s time to start working on some automation!
  prefs: []
  type: TYPE_NORMAL
- en: Creating flows
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This solution has two flows—one that is triggered on the form response and another
    that is triggered when the identity document is uploaded to SharePoint.
  prefs: []
  type: TYPE_NORMAL
- en: What do I do if I’m stuck?
  prefs: []
  type: TYPE_NORMAL
- en: 'If you run into a roadblock for some reason (can’t find a feature, an option
    isn’t showing up, or something is unclear), help is only a click away! You can
    download this chapter’s artifacts from our GitHub site: [https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution](https://github.com/PacktPublishing/Power-Platform-and-the-AI-Revolution).'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started with the first flow!
  prefs: []
  type: TYPE_NORMAL
- en: Configuring a flow to handle form submission
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This flow is triggered on the submission of a form. After the form has been
    processed, the registrant will receive an email prompting them to upload their
    identity document. As mentioned earlier, Forms does allow a file upload natively,
    but it requires the user to be authenticated to the Microsoft 365 tenant (which
    isn’t ideal for external users).
  prefs: []
  type: TYPE_NORMAL
- en: Processing the form
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this first section, you’ll start by processing the Microsoft Form data.
    Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Open a browser and navigate to the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com)),
    select **Create**, and then click **Automated** **cloud flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: On the **Build an automated cloud flow** page, enter a **Flow name** value and
    then select the **When a new response is submitted** trigger. Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the canvas, click the **When a new response is submitted** trigger. If necessary,
    click **Change connection** to log in to Microsoft 365:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.19 – Updating the trigger with credentials](img/B21234_08_19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.19 – Updating the trigger with credentials
  prefs: []
  type: TYPE_NORMAL
- en: 'Click the **Form Id** dropdown and select the **Event** **Registration** form:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.20 – Selecting a form](img/B21234_08_20.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.20 – Selecting a form
  prefs: []
  type: TYPE_NORMAL
- en: Click the **+** sign to add an action and select the **Scope** control.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Rename the scope control to `Processing the form`. See *Figure 8**.21*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.21 – Updating the scope name](img/B21234_08_21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.21 – Updating the scope name
  prefs: []
  type: TYPE_NORMAL
- en: Inside the **Scope** control, click **Add** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Add an action** flyout, select the **Get response** **details** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Form Id**, select the **Event** **Registration** form.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Response Id**, select the dynamic content token for **List of response
    notifications Response Id**. The action will be inserted into an **Apply each**
    or a **For each** wrapper (depending on if you are using **Classic designer**
    or **New designer**):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.22 – Configuring Get response details](img/B21234_08_22.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.22 – Configuring Get response details
  prefs: []
  type: TYPE_NORMAL
- en: In the **For each** wrapper, after **Get response details**, click **Add** **an
    action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the `ComposeUnique`. The **Compose** action will be used to generate
    a unique ID that will be used to name the evidence submitted by the **Request
    files** action later.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Inputs** textbox, add an expression. On the **Function** tab, paste
    the following content:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '![Figure 8.23 – Configuring the Compose action](img/B21234_08_23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.23 – Configuring the Compose action
  prefs: []
  type: TYPE_NORMAL
- en: 'Click in the text area between the last comma (`,`) and the closing parenthesis
    (`)`). Click the **Dynamic content** tab and then add the **Email** dynamic content
    token from the **Get response details** action. See *Figure 8**.24*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.24 – Updating the Compose action with the Email token](img/B21234_08_24.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.24 – Updating the Compose action with the Email token
  prefs: []
  type: TYPE_NORMAL
- en: 'When completed, the function value should look similar to the following example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: This is used to compose a value that is comprised of the current date and time
    the flow executes plus the responder’s submitted email address to provide a unique
    value. You can’t copy and paste this whole value, as it directly corresponds to
    the specific form object in this environment.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs: []
  type: TYPE_NORMAL
- en: For more information on the `Concat` function, see [https://learn.microsoft.com/en-us/power-platform/power-fx/reference/function-concatenate](https://learn.microsoft.com/en-us/power-platform/power-fx/reference/function-concatenate).
    For more information on the `UtcNow` function, see [https://learn.microsoft.com/en-us/power-platform/power-fx/reference/function-now-today-istoday](https://learn.microsoft.com/en-us/power-platform/power-fx/reference/function-now-today-istoday).
  prefs: []
  type: TYPE_NORMAL
- en: Inside the **Apply to each** wrapper, click **Add an action** after the **ComposeUnique**
    action. Select the **Create new folder** SharePoint action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Create new folder** flyout, select the **Event Registration** site
    under **Site Address**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **List or Library**, select the **Uploads** document library you created
    earlier.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Folder Path**, add the **Outputs** dynamic content token from the **ComposeUnique**
    action, as shown in *Figure 8**.25*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.25 – Configuring the Create new folder action](img/B21234_08_25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.25 – Configuring the Create new folder action
  prefs: []
  type: TYPE_NORMAL
- en: Inside the **Apply to each** wrapper, click **Add an action** after the **Create
    new folder** action. Select the **Create item** SharePoint action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Create item** flyout, under **Site Address**, select the **Event**
    **Registration** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **List name**, select the **Attendees** list.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Advanced parameters**, under **Title**, select the **Outputs** dynamic
    content token from the **ComposeUnique** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under `toUpper()`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Place the cursor between the `(` and `)` characters. Select the **Dynamic content**
    tab and then add the **First name** dynamic content token from the **Get Response
    Details** action. The output should look similar to the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Identity documents use *UPPERCASE* formatting. Attendees may not enter their
    details in all uppercase, so conversion is necessary to ensure any compare operations
    are successful.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Under `toUpper()`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Place the cursor between the `(` and `)` characters. Select the **Dynamic content**
    tab and then add the **Last name** dynamic content token from the **Get Response
    Details** action. The output should look similar to the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Under **Phone number**, select the **Phone number** dynamic content token from
    the **Get Response** **Details** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Email**, select the **Email** dynamic content token from the **Get Response**
    **Details** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Caution
  prefs: []
  type: TYPE_NORMAL
- en: Do not select the **Responders’ Email** dynamic content token from the **Get
    response details** action. The **Responders’ Email** dynamic content token is
    linked to the authenticated user that submits the form. If the form is submitted
    by someone outside your Microsoft 365 tenant (which is the goal of this solution),
    this token value will be *anonymous*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Under **Validation Status Value**, select the **Pending submission** option.
    See *Figure 8**.26* for the completed **Create item** action configuration:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.26 – Configuring the Create item action](img/B21234_08_26.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.26 – Configuring the Create item action
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, you’ll generate a SharePoint Online file request using the SharePoint
    Online REST API.
  prefs: []
  type: TYPE_NORMAL
- en: Generating a file request link
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this section, you’ll create a new scope nested inside the **Processing the
    form** scope. This will help you group tasks related to generating the link and
    sending the email. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Click the **+** sign outside the **Apple to each** wrapper and inside the **Processing
    the form** scope control. Select **Add an action** and select the **Scope** control.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the name of the new scope to `Generating the SharePoint Online` `file
    request`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Inside the **Generating the SharePoint Online file request scope**, click **Add**
    **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Send HTTP request to** **SharePoint** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, select the **Event** **Registration** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Method**, select **POST**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under `''Uploads''` is the document library that contains the **RegistrationData**
    folder created in the prerequisites section):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This special URI path locates the `Uploads` document library and then adds in
    the unique identifier of the folder that was created in the previous section.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Under **Advanced parameters**, click **Show all** to display the **Body** area.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Paste the following data into the **Body** area:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This JSON value will be sent to SharePoint Online to trigger the file request.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Further reading
  prefs: []
  type: TYPE_NORMAL
- en: For more on the structure of the SharePoint Online REST API function for requesting
    a file, see [https://learn.microsoft.com/en-us/graph/api/driveitem-createlink?view=graph-rest-1.0&tabs=http](https://learn.microsoft.com/en-us/graph/api/driveitem-createlink?view=graph-rest-1.0&tabs=http).
  prefs: []
  type: TYPE_NORMAL
- en: 'Verify the settings in the action configuration. See *Figure 8**.27*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.27 – Configuring the Send an HTTP request to SharePoint action](img/B21234_08_27.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.27 – Configuring the Send an HTTP request to SharePoint action
  prefs: []
  type: TYPE_NORMAL
- en: In the **SharePoint Online file request** scope, click **Add an action** after
    the **Send an HTTP request to** **SharePoint** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Compose** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rename the `ComposeURL`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Inputs** field, insert an expression, and enter the following value:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This action takes the output of the **Send an HTTP request to SharePoint** action
    and extracts the dynamically created SharePoint URL.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'This expression is derived from looking at a previous flow run to determine
    what properties are available from the **Send an HTTP request to SharePoint**
    action’s output. See *Figure 8**.28*:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 8.28 – Reviewing the output of a successful Send an HTTP request to
    SharePoint action](img/B21234_08_28.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.28 – Reviewing the output of a successful Send an HTTP request to SharePoint
    action
  prefs: []
  type: TYPE_NORMAL
- en: 'From a JSON output perspective, the structure is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'The property that’s needed for the attendee to upload their identity document
    is stored in the `Url` key/value pair. Power Automate allows you to navigate levels
    of the JSON structure using a `/` character. Traversing the JSON object from the
    `Url` node reveals the hierarchy that’s needed to reference the URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '`Url` > `sharingLinkInfo` > `ShareLink` > `d` > `body`'
  prefs: []
  type: TYPE_NORMAL
- en: 'When translating this to the Power Automate syntax, it becomes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Click **Add**.
  prefs: []
  type: TYPE_NORMAL
- en: In the **SharePoint Online file request** scope, click **Add an action** after
    the **ComposeURL** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Send an email V2** Outlook action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Send an email (V2)** action flyout, populate the **To** field using
    the **Email** dynamic content token from the **Get response** **details** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter a **Subject** name and create a basic email message in the **Body** area.
    Be sure to include the **Outputs** dynamic content value from the **ComposeURL**
    action (since it contains the URL necessary for the attendee to upload their identity
    document), as shown in *Figure 8**.29*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.29 – Configuring the Send an email (V2) action](img/B21234_08_29.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.29 – Configuring the Send an email (V2) action
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: At this point, you can test the flow by submitting a form and seeing if a message
    arrives in the registrant’s email. Otherwise, let’s get creating the second flow!
  prefs: []
  type: TYPE_NORMAL
- en: Processing the identity document
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Up to this point, you’ve created a flow that processes a Microsoft Forms response
    and uses the data inside to generate a custom file upload link to the registrant.
    In this next flow, you’ll use the AI Builder Identity Document reader to extract
    data from the uploaded file and update the corresponding attendee registration
    row in the **Attendees** SharePoint list.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go!
  prefs: []
  type: TYPE_NORMAL
- en: From the Power Automate maker portal ([https://make.powerautomate.com](https://make.powerautomate.com)),
    click **Create** and select **Automated** **cloud flow**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter a **Flow name** value and select the **When a file is created (properties
    only)** SharePoint trigger, as shown in *Figure 8**.30*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.30 – Creating a new flow](img/B21234_08_30.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.30 – Creating a new flow
  prefs: []
  type: TYPE_NORMAL
- en: Click **Create**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **When a file is created (properties only)** trigger to bring up
    the flyout.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, select the **Event** **Registration** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Library Name**, select **Uploads**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Since the **When a file is created (properties only)** action is also triggered
    upon folder creation, it’s important to exclude folder creation activities from
    the trigger. Select the **Settings** tab of the action. Under **Trigger conditions**,
    click **Add**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the field, enter `@equals(triggerOutputs()?[''body/{IsFolder}''],false)`
    to filter out events that involve folder creation. See *Figure 8**.31*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.31 – Adding a trigger condition](img/B21234_08_31.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.31 – Adding a trigger condition
  prefs: []
  type: TYPE_NORMAL
- en: Next, bring the content of the uploaded file into the flow by adding a `(concat(utcNow('yyyyMMddHHMMss'),'_',body('Get_response_details')?['value'])`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Get file content using path** flyout, under **Site Address**, choose
    the **Event** **Registration** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **File path** field, select the **Full Path** dynamic content token under
    the **When a file is created (properties** **only)** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Power Automate may add a **For each** or **Apply to each** control since more
    than one new document may be present when the flow runs. If one isn’t automatically
    added, click **+** and then select **Add an action**. Select the **Apply to each**
    control and drag the **Get file content** action into it.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: If the **Dynamic content** control doesn’t show any dynamic content values,
    you may try switching to the Classic Power Automate designer and re-add the **Get
    file content using path** action. If desired, you can save and switch back to
    **New** **designer** afterward.
  prefs: []
  type: TYPE_NORMAL
- en: 'After the **Get file content using path** action, click **Add an action** and
    select the **Extract information from identity documents** AI Builder action,
    as shown in *Figure 8**.32*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.32 – Adding the AI Builder action](img/B21234_08_32.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.32 – Adding the AI Builder action
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **Extract information from identity documents** flyout, add the **File
    Content** dynamic token from the **Get file content using** **path** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.33 – Selecting the file content to use with AI Builder](img/B21234_08_33.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.33 – Selecting the file content to use with AI Builder
  prefs: []
  type: TYPE_NORMAL
- en: After the **Extract information from identity documents** action, click **Add
    an action** and select the **Get items** SharePoint action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Site Address**, select the **Event** **Registration** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **List Name**, select the **Attendees** list.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Advanced parameters** dropdown, select the **Filter** **Query** parameter.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Title eq'`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click inside the **Filter Query** field and add an expression.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Enter `split(triggerOutputs()?[''body/{Path}''],''/'')?[1]` in the text area
    and click `''` character to the **Filter Query** string. The completed value should
    resemble the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The expression manipulates the SharePoint item path, extracting the value after
    the `/` character. This path value is the same as the item name value of the corresponding
    item in the SharePoint list.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'After the **Get items** action, click **Add an action** and choose the **Get**
    **item** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.34 – Choosing the Get item action](img/B21234_08_34.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.34 – Choosing the Get item action
  prefs: []
  type: TYPE_NORMAL
- en: Be sure to get the **Get item** action (and not the **Get items** action). **Get
    items** returns a collection of items, while **Get item** returns a single item.
  prefs: []
  type: TYPE_NORMAL
- en: Under **Site Address**, select the **Event** **Registration** site.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **List Name**, select the **Attendees** list.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click in the **Id** field area. Select the expression icon.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'On the `first(outputs(''Get_items'')?[''body/value''])?[''id'']`. Click **Add**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.35 – Configuring the item expression](img/B21234_08_35.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.35 – Configuring the item expression
  prefs: []
  type: TYPE_NORMAL
- en: The previous expression used a filter query to return a single item. This expression
    builds on that by looking up the `id` property of the **Get items** action using
    the output of the expression in *step 20*.
  prefs: []
  type: TYPE_NORMAL
- en: After the **Get item** action, select **Add an action** and choose the **Condition**
    control.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Configure the **Condition** control flyout. In the **Condition expression**
    area, configure the conditions based on *Table 8.2*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '| **Condition** | **Operation** | **Condition** |'
  prefs: []
  type: TYPE_TB
- en: '| **First name** from **Extract information from identity documents** AI Builder
    action | **Contains** | **First name** from **Get item** SharePoint action |'
  prefs: []
  type: TYPE_TB
- en: '| **Last name** from **Extract information from identity documents** AI Builder
    action | **Contains** | **Last name** from **Get item** SharePoint action |'
  prefs: []
  type: TYPE_TB
- en: Table 8.2 – Configuring Condition control values
  prefs: []
  type: TYPE_NORMAL
- en: '28. Review the **Condition** control configuration. See *Figure 8**.36*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.36 – Reviewing the Condition control](img/B21234_08_36.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.36 – Reviewing the Condition control
  prefs: []
  type: TYPE_NORMAL
- en: 29. In the **True** branch of the **Condition** control, click **Add an action**.
    Select the **Update item** SharePoint action.
  prefs: []
  type: TYPE_NORMAL
- en: 30. On the **Update item** flyout, under **Site Address**, choose the **Event**
    **Registration** site.
  prefs: []
  type: TYPE_NORMAL
- en: 31. Under **List Name**, select the **Attendees** list.
  prefs: []
  type: TYPE_NORMAL
- en: '32. In the **Id** field, add the **ID** dynamic content token from the **Get
    item** (not **Get items**) action. See *Figure 8**.37*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.37 – Configuring the Update item action](img/B21234_08_37.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.37 – Configuring the Update item action
  prefs: []
  type: TYPE_NORMAL
- en: 33. Under **Advanced parameters**, click **Show all**.
  prefs: []
  type: TYPE_NORMAL
- en: 34. In the **DOB** field, add the **Date of Birth** dynamic content value from
    the AI Builder **Extract information from identity** **documents** action.
  prefs: []
  type: TYPE_NORMAL
- en: 35. In the **Validation Status Value** dropdown, select **Passed**.
  prefs: []
  type: TYPE_NORMAL
- en: 36. In the **Identity Document** field, select the **Document Number** dynamic
    content value from the AI Builder **Extract information from identity** **documents**
    action.
  prefs: []
  type: TYPE_NORMAL
- en: '37. In the **Valid Through** field, select the **Date of Expiration** dynamic
    content value from the AI Builder **Extract information from identity documents**
    action. See *Figure 8**.38*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.38 – Configuring the Update item action](img/B21234_08_38.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.38 – Configuring the Update item action
  prefs: []
  type: TYPE_NORMAL
- en: 38. Click **Save**.
  prefs: []
  type: TYPE_NORMAL
- en: To finish up this flow, we’ll configure the notification emails.
  prefs: []
  type: TYPE_NORMAL
- en: Sending confirmation messages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: In the **True** branch of the **Condition** control, click **Add an action**
    after the **Update item** action. Select the **Get file** **content** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rename the `Get` `calendar invitation`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Site Address** dropdown, select the site where you saved the ICS calendar
    file from the *Establishing a Teams meeting* prerequisite step.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **File Path** field, click the folder icon and browse to the saved ICS
    file. See *Figure 8**.39*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.39 – Getting the ICS calendar file for the meeting invitation](img/B21234_08_39.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.39 – Getting the ICS calendar file for the meeting invitation
  prefs: []
  type: TYPE_NORMAL
- en: In the **True** branch of the **Condition** control, click **Add an action**
    after the **Get calendar invitation** action. Select the **Send an email (****V2)**
    action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the **Send an email (****V2)** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **To** field, select the **Email** dynamic content token from the **Get**
    **item** action.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Congratulations! Your event registration` `is complete!`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **Body** area, enter a message.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Advanced parameters**, select the checkbox to enable the **Attachments**
    parameter.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `Meeting.ics`) for the attachment.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In the **Content** field, add the **File Content** dynamic content token from
    the **Get calendar** **invitation** action:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.40 – Adding an attachment to the email message](img/B21234_08_40.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.40 – Adding an attachment to the email message
  prefs: []
  type: TYPE_NORMAL
- en: In the **Attachments** area, click on the **Switch to input entire** **array**
    icon.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Remove the quotation marks surrounding the **File Content** dynamic object.
    See *Figure 8**.41*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.41 – Updating the attachment area](img/B21234_08_41.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.41 – Updating the attachment area
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to remove the quotation marks surrounding the dynamic content
    token here—otherwise, the attachment shows up as a `base64`-encoded file and cannot
    be added to the calendar.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under the **True** branch of the **Condition** control, right-click the **Update
    item** action and select **Copy action**, as shown in *Figure 8**.42*:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.42 – Copying an action](img/B21234_08_42.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.42 – Copying an action
  prefs: []
  type: TYPE_NORMAL
- en: 'In the **False** branch of the **Condition** control, click **+** and then
    select **Paste** **an action**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.43 – Pasting an action](img/B21234_08_43.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.43 – Pasting an action
  prefs: []
  type: TYPE_NORMAL
- en: Rename the action to `Update item –` `Failed`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under **Advanced parameters**, delete the dynamic content tokens for **DOB**,
    **Identity document**, and **Valid through**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under the **Validation Status Value** dropdown, select **Failed**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Under the **True** branch of the **Condition** control, right-click the **Send
    an email (V2)** action and select **Copy action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the **False** branch of the **Condition** control, click the **+** sign after
    the **Update item – Failed** action and click **Paste** **an action**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rename the action to `Send an email (V2) –` `Failed`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the **Subject** value with a message indicating an incomplete registration.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the **Body** value with instructions for resolving the issue.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under **Advanced parameters**, click the **X** sign to remove the configured
    attachment:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.44 – Removing the attachment](img/B21234_08_44.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.44 – Removing the attachment
  prefs: []
  type: TYPE_NORMAL
- en: Click **Save**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now for the moment of truth!
  prefs: []
  type: TYPE_NORMAL
- en: Testing the flow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: You may have been tempted to test this flow while you were building it—and that’s
    totally fine. It’s part of the learning process and an important step to verify
    that your syntax is correct and that you have chosen the correct dynamic content
    tokens.
  prefs: []
  type: TYPE_NORMAL
- en: 'To test the flow, you’ll need a few things:'
  prefs: []
  type: TYPE_NORMAL
- en: An email account where you can receive confirmation messages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A driver’s license or passport (either real or samples from the internet) that
    features a full name, date of birth, expiration date, and document number
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A phone or tablet device with a camera (or an already digitized identity document)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To execute the flow, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the Microsoft form you created in the prerequisite section. You
    should have captured the form URL in *step 5* of the *Building an input* *form*
    section.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Fill out the form using a name that matches the identity document you’ll be
    submitting. Make sure you use an email address that you have access to. In this
    example, we’ll be using the following sample passport card for HAPPY TRAVELER:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.45 – Reviewing the identity document data](img/B21234_08_45.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.45 – Reviewing the identity document data
  prefs: []
  type: TYPE_NORMAL
- en: Testing tip
  prefs: []
  type: TYPE_NORMAL
- en: Enter the name in mixed case (such as `Happy Traveler`) to ensure you’re also
    testing the `toUpper()` function that converts the **First name** and **Last name**
    values to uppercase.
  prefs: []
  type: TYPE_NORMAL
- en: 'Check your email for the automated response. The response should have an upload
    link:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.46 – Reviewing the submission email](img/B21234_08_46.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.46 – Reviewing the submission email
  prefs: []
  type: TYPE_NORMAL
- en: 'Click on the link. You should be redirected to a page where you can upload
    a file:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.47 – Navigating to the file upload page](img/B21234_08_47.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.47 – Navigating to the file upload page
  prefs: []
  type: TYPE_NORMAL
- en: Click **Select files**. Browse to a previously saved image file or take a picture
    of a new one using the photo application on your mobile device.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **Upload**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Wait for a confirmation message with the ICS calendar attachment:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.48 – Reviewing the success confirmation](img/B21234_08_48.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.48 – Reviewing the success confirmation
  prefs: []
  type: TYPE_NORMAL
- en: 'Double-click the attachment to add it to your calendar:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.49 – Adding the invitation to the calendar](img/B21234_08_49.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.49 – Adding the invitation to the calendar
  prefs: []
  type: TYPE_NORMAL
- en: 'View the meeting information, complete with the join link:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.50 – Viewing the calendar item](img/B21234_08_50.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.50 – Viewing the calendar item
  prefs: []
  type: TYPE_NORMAL
- en: 'Navigate to the **Event Registration** site and select the **Attendees** list.
    Click the entry to view the extracted information:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Figure 8.51 – Viewing the attendee information](img/B21234_08_51.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.51 – Viewing the attendee information
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! You’ve successfully verified the flow!
  prefs: []
  type: TYPE_NORMAL
- en: You can also try submitting different combinations of identity documents and
    names to test the failure scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Further exploration
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are quite a few different ways to take this solution. One idea might be
    using a Zoom meeting instead of a Microsoft Teams meeting. To do so, you’ll need
    the Zoom client and calendar client. Instead of generating an ICS file manually,
    you’ll be able to download an ICS file directly through the Zoom interface. See
    [https://support.zoom.com/hc/en/article?id=zm_kb&sysparm_article=KB0060791](https://support.zoom.com/hc/en/article?id=zm_kb&sysparm_article=KB0060791).
  prefs: []
  type: TYPE_NORMAL
- en: Another idea might be implementing more robust validation mechanisms for the
    identity document, such as verifying that the document is still valid or that
    it has a document identification number associated with it.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The exercises in this chapter demonstrated a lot of advanced capabilities of
    the Power Automate and SharePoint Online tools. You were able to successfully
    accept uploads from anonymous users, process identity using the native AI Builder
    document reader, and generate emails with meeting attachments—all in less than
    an hour!
  prefs: []
  type: TYPE_NORMAL
- en: With the skills gained in this chapter, you can further enhance your identity
    processing requirements.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll learn about using another AI Builder model for text
    extraction.
  prefs: []
  type: TYPE_NORMAL
