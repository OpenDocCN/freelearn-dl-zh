- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: 'Orchestrating Success: Key Considerations for a Digital Transformation Strategy
    Using Power Platform'
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 协调成功：使用Power Platform进行数字化转型策略的关键考虑因素
- en: 'Embarking on a digital transformation using Power Platform requires a structured
    approach, divided into three stages: envision, onboard, and scale. During the
    envision phase, several key considerations are essential.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Power Platform进行数字化转型需要一种结构化的方法，分为三个阶段：愿景、上线和扩展。在愿景阶段，有几个关键考虑因素是必不可少的。
- en: Organizations should clearly outline their goals and objectives, define a vision,
    and establish a dedicated project team. Executive sponsorship is crucial for securing
    resources and fostering a culture of adoption.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 组织应明确阐述其目标和目标，制定愿景，并建立一个专门的项目团队。高层支持对于确保资源和支持采用文化至关重要。
- en: An adoption strategy is necessary to guide efforts, including outlining the
    roadmap, setting milestones, and aligning with business objectives. Establishing
    success criteria enables measurable outcomes.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 采用策略是必要的，以指导努力，包括概述路线图、设定里程碑并与业务目标保持一致。建立成功标准可以确保可衡量的成果。
- en: Managing resistance involves identifying and addressing challenges proactively,
    ensuring a smoother transition. Assessing technical capabilities, infrastructure,
    and data governance is vital for readiness. A comprehensive training strategy
    will empower employees to leverage the platform effectively.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 管理阻力涉及积极主动地识别和解决挑战，以确保更平稳的过渡。评估技术能力、基础设施和数据治理对于准备至关重要。一个全面的培训策略将使员工能够有效地利用平台。
- en: By considering these aspects during the envision phase, organizations can lay
    a solid foundation for a successful digital transformation with Power Platform.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在愿景阶段考虑这些方面，组织可以为使用Power Platform的成功数字化转型奠定坚实的基础。
- en: 'In this chapter, we will discuss the following topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: Charting the path for Power Platform adoption
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规划Power Platform采用的路径
- en: Empowering success through executive sponsorship and buy-in
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过高层支持和承诺赋能成功
- en: Navigating IT and leadership challenges during adoption
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在采用过程中导航IT和领导力挑战
- en: Empowering teams with Power Platform skills
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过Power Platform技能赋能团队
- en: Change management
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变革管理
- en: Accelerating the adoption journey
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加速采用之旅
- en: Charting the path for Power Platform adoption
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 规划Power Platform采用的路径
- en: In [*Chapter 5*](B21080_05.xhtml#_idTextAnchor105), we spoke about “setting
    your purpose” and how a clear vision is needed and understood across the organization.
    This is important as it is a collective view of what the overall strategic vision
    is. What is also key is building out a plan that you will then need to execute.
    This plan will map to your vision and will allow you to build an amazing Power
    Platform center of enablement that provides a safe space for people to create
    amazing things.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第五章*](B21080_05.xhtml#_idTextAnchor105)中，我们讨论了“确定您的目的”以及在整个组织中需要一个清晰的愿景。这很重要，因为它是对整体战略愿景的集体看法。同样重要的是制定一个您将需要执行的计划。这个计划将与您的愿景相匹配，并允许您建立一个令人惊叹的Power
    Platform赋能中心，为人们提供一个安全的空间来创造惊人的事物。
- en: In setting up your enablement program, you will have gone through a number of
    the workstreams mentioned in [*Chapter 5*](B21080_05.xhtml#_idTextAnchor105),
    *What is your plan?* section. This creates a fantastic central ecosystem where
    you will be able to drive wider adoption of the platform across your organization.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置您的赋能计划时，您已经通过了[*第五章*](B21080_05.xhtml#_idTextAnchor105)中提到的多个工作流，即*您的计划是什么？*部分。这创造了一个出色的中央生态系统，您将能够推动整个组织对平台的更广泛采用。
- en: Setting your program’s scope of work can be tough. We will now explore how to
    define the scope of your program of work and, most importantly, how to get started.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 确定您计划的工作范围可能会有难度。我们现在将探讨如何定义您的工作计划范围，最重要的是，如何开始。
- en: Setting your adoption scope
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 确定您的采用范围
- en: In reviewing your purpose statement, it is important that this drives your adoption
    plan and acts as a “North Star,” so to speak. There are varying scopes that can
    be applied to any adoption program and what is important is to make sure that
    you are set up for success rather than failure.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在审查您的目的声明时，重要的是它能够推动您的采用计划并充当“北极星”，换句话说。可以应用于任何采用计划的多种范围，重要的是确保您为成功而不是失败做好准备。
- en: A fantastic quality of a well-thought-out adoption program is a well-defined
    scope. If the scope is set early and clearly and aligns with your purpose and
    vision, then the Power Platform rollout will be much more seamless and easier
    to manage.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心设计的采用计划的一个出色品质是明确定义的范围。如果范围设定得早且明确，并与您的目的和愿景相一致，那么Power Platform的推广将更加顺畅且易于管理。
- en: There are a number of aspects that need to be reviewed that will allow you to
    clearly define and refine the scope before your adoption program is started. We
    will discuss these aspects in the following sections.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的采用计划开始之前，需要审查一些方面，这将帮助您清楚地定义和细化范围。我们将在以下章节中讨论这些方面。
- en: Clear objectives
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 明确的目标
- en: A clear set of objectives needs to be defined and set immediately. These need
    agreement from *everyone* participating in the program as they will be one of
    the metrics used to define overall success. The clearer the objectives, the easier
    it will be to manage the program outcomes. It is an innovative idea to keep the
    goals and objectives as simple as possible and to have as many quantitative or
    binary (yes/no) outcomes as possible. This is not going to be the case every time,
    so please bear that in mind. An example of a strong objective could be to ensure
    that all people in the organization have access to the tools on Power Platform.
    This is true or false. Another example is that everyone in the IT department has
    access to the tools in Power Platform and is actively building solutions with
    these tools. The steps required for program success are visible in *Figure 6**.1*.
    Typically, these objectives are defined by the wider Power Platform stakeholder
    team with the program manager being the lead.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 需要立即定义和设定一个明确的目标集。这些目标需要所有参与项目的人同意，因为它们将是衡量整体成功的一个指标。目标越明确，管理项目成果就越容易。将目标和目标尽可能简化，并尽可能多地拥有定量或二元（是/否）的结果，这是一个创新的想法。请注意，这并不总是会发生。一个强有力的目标示例可能是确保组织中的每个人都能够访问Power
    Platform上的工具。这是正确还是错误？另一个例子是，IT部门的所有人都能够访问Power Platform中的工具，并积极使用这些工具构建解决方案。项目成功的步骤在**图6.1**中可见。通常，这些目标是由更广泛的Power
    Platform利益相关者团队定义的，项目经理是负责人。
- en: '![Figure 6.1: A process defining the clear objectives for program success](img/B21080_06_001.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图6.1：定义项目成功明确目标的过程](img/B21080_06_001.jpg)'
- en: 'Figure 6.1: A process defining the clear objectives for program success'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1：定义项目成功明确目标的过程
- en: 'Microsoft provides several fantastic resources on the Microsoft Learn site
    when talking about strategy goals and metrics. These can be found at this location:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到战略目标和指标时，Microsoft在Microsoft Learn网站上提供了几个出色的资源。这些资源可以在以下位置找到：
- en: '[https://learn.microsoft.com/en-us/power-platform/guidance/adoption/strategy-best-practices](https://learn.microsoft.com/en-us/power-platform/guidance/adoption/strategy-best-practices)'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://learn.microsoft.com/en-us/power-platform/guidance/adoption/strategy-best-practices](https://learn.microsoft.com/en-us/power-platform/guidance/adoption/strategy-best-practices)'
- en: In *all* projects, timing and milestones are extremely important. The clearer
    these are and the more focused they can be, the easier it will be to manage project
    outcomes. Typically, this adoption timeline will map to the goals that have been
    set out by the project team. As an example, you may want to roll out Power Platform
    to the HR department by the end of month X. You then work to establish *how* to
    do this and how to get the HR department engaged. The plan you set out for adoption
    will have many of these milestones attached to dates, and each milestone will
    have actions that need to be completed to achieve the milestone and the overall
    goal.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在**所有**项目中，时间和里程碑都非常重要。这些越清晰，越能聚焦，管理项目成果就越容易。通常，这个采用时间表将与项目团队设定的目标相对应。例如，您可能希望在X月底之前推出Power
    Platform到人力资源部门。然后您将努力确定如何实现这一点以及如何让人力资源部门参与进来。您为采用设定的计划将包含许多与日期相关的里程碑，每个里程碑都将有需要完成的行动，以实现里程碑和整体目标。
- en: Stakeholder management
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利益相关者管理
- en: In *any* program of work, there needs to be a sponsor. Someone who pays the
    bills. Someone who agrees that the project is running smoothly, and things are
    on track. The sponsor is one of the most important stakeholders; however, this
    extends more widely across the organization to other leaders in each area. It
    is important to maintain clear communications with all these people and to manage
    all your stakeholders’ expectations. It is a particularly good idea to conduct
    a stakeholder mapping exercise to ensure you understand how your project will
    impact people in the organization. *Figure 6**.2* shows some basic steps that
    can be taken to manage stakeholders effectively.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在*任何*工作计划中，都需要有一个赞助人。有人支付账单。有人同意项目正在顺利运行，一切都在正轨上。赞助人是最重要的利益相关者之一；然而，这还扩展到组织中的其他领域的领导者。与所有这些人保持清晰的沟通并管理所有利益相关者的期望非常重要。进行利益相关者映射练习是一个特别好的主意，以确保您了解您的项目将如何影响组织中的个人。*图6.2*显示了可以采取的一些基本步骤，以有效地管理利益相关者。
- en: '![Figure 6.2: A process defining key points in managing stakeholders successfully](img/B21080_06_002.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图6.2：一个定义成功管理利益相关者关键点的流程](img/B21080_06_002.jpg)'
- en: 'Figure 6.2: A process defining key points in managing stakeholders successfully'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2：一个定义成功管理利益相关者关键点的流程
- en: It is important to note that stakeholder management should be undertaken by
    a smaller but well-defined Power Platform ecosystem team. This is mentioned in
    the [*Chapter 2*](B21080_02.xhtml#_idTextAnchor042) section, *Driving digital
    maturity with* *the CoE*.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，利益相关者管理应由一个规模较小但定义明确的Power Platform生态系统团队来执行。这一点在[*第2章*](B21080_02.xhtml#_idTextAnchor042)的*通过CoE推动数字成熟度*部分中提到。
- en: Baselining
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Baselining
- en: This is an extremely important exercise to go through. It involves establishing
    a clear and measurable starting point, which serves as a reference for tracking
    progress and evaluating the impact of the adoption efforts. Here are some key
    reasons why baselining is important. You would want to baseline the organization
    to understand Power Platform usage and adoption and then look department by department,
    depending on how you define your impacted groups. Then, you work from there, ensuring
    each part of the organization adopts the tools and then you will need to do a
    comparative baseline review after the adoption program to check whether numbers
    have increased. This will involve an element of monitoring/auditing as one of
    the mechanisms to understand utilization and adoption.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个极其重要的练习。它涉及建立一个清晰且可衡量的起点，这作为跟踪进度和评估采用努力的影响的参考。以下是为什么基准线如此重要的几个关键原因。您可能希望对组织进行基准线分析，以了解Power
    Platform的使用和采用情况，然后根据您如何定义受影响的群体，逐部门进行评估。然后，您从那里开始工作，确保组织的每个部分都采用这些工具，然后在采用计划之后，您还需要进行一次比较基准线审查，以检查数字是否有所增加。这将涉及监控/审计作为了解利用和采用的一种机制。
- en: 'As mentioned in the *Navigating maturity levels in Power Platform adoption*
    section in [*Chapter 2*](B21080_02.xhtml#_idTextAnchor042), the Power Platform
    maturity model is a great place to start. You may want to extend this into a more
    detailed maturity and baseline assessment. This can be found at the following
    link:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如[*第2章*](B21080_02.xhtml#_idTextAnchor042)中*在Power Platform采用成熟度级别中导航*部分所述，Power
    Platform成熟度模型是一个很好的起点。您可能希望将其扩展到更详细的成熟度和基准线评估。这可以在以下链接找到：
- en: '[https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/maturity-model](https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/maturity-model)'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/maturity-model](https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/maturity-model)'
- en: 'A great mechanism for baselining an organization’s portfolio landscape is to
    leverage the Power Platform CoE Starter Kit. This tool allows the administration
    team the ability to gain the visibility they need into the portfolio and maker
    landscape and to truly understand what has been created and by whom. More information
    can be found on the Microsoft Learn site at this location:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 利用Power Platform CoE入门套件是一个为组织投资组合景观进行基准线分析的优秀机制。这个工具允许管理团队能够获得他们需要的对投资组合和制造商景观的可见性，并真正了解是谁创建了什么。更多信息可以在Microsoft
    Learn网站上找到，位置如下：
- en: '[https://learn.microsoft.com/en-gb/power-platform/guidance/coe/starter-kit](https://learn.microsoft.com/en-gb/power-platform/guidance/coe/starter-kit)'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://learn.microsoft.com/en-gb/power-platform/guidance/coe/starter-kit](https://learn.microsoft.com/en-gb/power-platform/guidance/coe/starter-kit)'
- en: Governance framework
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 管理框架
- en: 'Establishing a robust governance framework is crucial before driving Power
    Platform adoption in a business. This framework acts as the backbone, ensuring
    that the adoption process is structured, compliant, and aligned with the organization’s
    strategic goals. The governance framework should do the following:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在企业中推动 Power Platform 的采用之前，建立一个稳健的治理框架至关重要。这个框架作为骨干，确保采用过程是有结构的、合规的，并与组织的战略目标保持一致。治理框架应做到以下几点：
- en: Provide guidelines and policies for consistent and standardized Power Platform
    usage
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供一致和标准化的 Power Platform 使用指南和政策
- en: Facilitate resource allocation by defining roles, responsibilities, and access
    levels
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过定义角色、责任和访问级别来促进资源分配
- en: Identify potential risks and set up mitigation strategies in advance
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提前识别潜在风险并制定缓解策略
- en: Establish clear structures for reporting, feedback, and decision-making
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立清晰的报告、反馈和决策结构
- en: Set benchmarks and monitor performance for continuous improvement
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设定基准并监控绩效以实现持续改进
- en: Having a governance framework in place before driving Power Platform adoption
    is fundamental to achieving a seamless, secure, and successful integration that
    aligns with the organization’s broader strategic objectives. The framework is
    part of the adoption program and provides a set of rules that people follow. Implementing
    a governance framework can be quite a process; however, there are great tools
    out there such as the CoE Starter Kit, which will provide the visibility you require.
    The Power Platform governance team is responsible for ensuring this is in place
    and is required to work with the organization-wide governance team to drive the
    framework and processes forward. The team structure can be found in [*Chapter
    2*](B21080_02.xhtml#_idTextAnchor042), in the *Driving digital maturity with the*
    *CoE* section.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在推动 Power Platform 的采用之前建立治理框架是实现无缝、安全且成功的集成，并与组织的更广泛战略目标保持一致的基本要素。该框架是采用计划的一部分，并为人们遵循的一套规则。实施治理框架可能是一个相当复杂的过程；然而，有一些出色的工具，如
    CoE Starter Kit，可以提供所需的可见性。Power Platform 治理团队负责确保这一点到位，并需要与组织范围内的治理团队合作，推动框架和流程向前发展。团队结构可以在
    [*第 2 章*](B21080_02.xhtml#_idTextAnchor042) 的 *使用 CoE 提升数字成熟度* 部分找到。
- en: 'The Microsoft team has provided some fantastic governance resources, which
    can be found on the Microsoft Learn site:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 微软团队提供了一些出色的治理资源，这些资源可以在微软学习网站上找到：
- en: '[https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/admin-best-practices](https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/admin-best-practices)'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/admin-best-practices](https://learn.microsoft.com/en-gb/power-platform/guidance/adoption/admin-best-practices)'
- en: Resource allocation
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 资源分配
- en: Resource allocation is paramount during any Power Platform adoption project
    for several critical reasons. It ensures that the right resources, whether they
    be human, financial, or technical, are available at the right time. This strategic
    alignment of resources prevents bottlenecks and ensures that the project stays
    on track and within budget.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何 Power Platform 采用项目中，资源分配都是至关重要的，原因有几个。它确保了正确的人力、财务或技术资源在正确的时间可用。这种资源的战略协调避免了瓶颈，并确保项目按计划进行，并控制在预算范围内。
- en: Effective resource allocation also enhances productivity by ensuring that team
    members have the tools and support they need to accomplish their tasks efficiently,
    and by clearly defining roles and responsibilities. This will later be explored
    in the *Expanding the* *team* section.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的资源分配通过确保团队成员拥有完成任务的工具和支持，以及明确界定角色和责任，也能提高生产力。这一点将在 *扩展团队* 部分进一步探讨。
- en: Resource allocation is integral to risk management. By identifying the resources
    required for each phase of the project, potential gaps can be identified and addressed
    proactively. This foresight helps in mitigating risks associated with resource
    shortages or misallocations that could derail the project.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 资源分配对于风险管理至关重要。通过确定项目每个阶段所需的资源，可以主动识别并解决潜在差距。这种前瞻性有助于减轻与资源短缺或配置不当相关的风险，这些风险可能会破坏项目。
- en: A well-structured resource allocation plan fosters accountability and transparency.
    When team members are aware of their specific responsibilities and the resources
    at their disposal, it promotes a sense of ownership and commitment toward achieving
    the project goals. This clarity is essential for maintaining motivation and ensuring
    that all stakeholders are aligned with the project’s objectives.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一个结构良好的资源分配计划可以促进责任感和透明度。当团队成员了解他们的具体责任和可用的资源时，它促进了所有权感和对实现项目目标的承诺感。这种清晰度对于保持动力和确保所有利益相关者与项目目标保持一致至关重要。
- en: Effective resource allocation supports continuous improvement. By regularly
    reviewing and reallocating resources based on project needs and performance metrics,
    the governance framework can adapt to changing circumstances and ensure the sustained
    success of the Power Platform adoption.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的资源分配支持持续改进。通过定期根据项目需求和绩效指标审查和重新分配资源，治理框架可以适应不断变化的情况，并确保Power Platform采用持续成功。
- en: Impacted group management
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 受影响群体管理
- en: Impacted group management is often one of the tougher areas to focus on when
    thinking about adoption. This area helps define how people in the organization
    will be given access to the tools and over what period within your adoption program.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 受影响群体管理通常是考虑采用时需要关注的难点之一。这个领域有助于定义组织内人员将如何获得访问权限以及在你采用计划中的哪个时间段内。
- en: You may not want to go with a big-bang approach and release all the tools to
    everyone immediately; a better approach is to portion it out across groups or
    departments and have a more targeted adoption focus. Many refer to this approach
    as *rings of release*. The analogy is when you throw a pebble into a pond, there
    are ripples; this is how a more targeted adoption program works. You start small
    with a targeted group and grow your presence more widely as you go. This is highlighted
    in *Figure 6**.3*, showing how to start with a small core group and release more
    widely over time.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能不想采取大爆炸的方法，立即将所有工具发布给所有人；更好的方法是将其分批分部门进行，并有一个更有针对性的采用重点。许多人将这种方法称为“发布环”。这个比喻是当你把鹅卵石扔进池塘时，会有波纹；这就是更针对性的采用计划是如何工作的。您从一个目标群体开始，随着项目的进行，您的存在范围会越来越广。这在*图6**.3中得到了强调，展示了如何从一个小的核心群体开始，随着时间的推移逐步扩大发布范围。
- en: '![Figure 6.3: The release rings of a specific organization’s impacted group
    management program](img/B21080_06_003.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图6.3：特定组织受影响群体管理计划的发布环](img/B21080_06_003.jpg)'
- en: 'Figure 6.3: The release rings of a specific organization’s impacted group management
    program'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.3：特定组织受影响群体管理计划的发布环
- en: This approach also helps you localize and mitigate any risk that may arise with
    specific groups in the adoption program. Some groups of people are more difficult
    to drive adoption with, and that is just a fact, so keeping your program focused
    is important.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法也有助于您在本采用计划中针对特定群体本地化和减轻任何可能出现的风险。有些人群体更难推动采用，这是一个事实，因此保持您的计划专注是很重要的。
- en: Your impacted groups will be a large factor in defining the overall scope of
    your Power Platform adoption program.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 您受影响的群体将是定义您Power Platform采用计划整体范围的一个大因素。
- en: Risk management
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 风险管理
- en: Effective risk management in a Power Platform adoption program involves identifying,
    assessing, and mitigating risks throughout the project. Start by identifying potential
    risks such as technological challenges, resource constraints, stakeholder resistance,
    and security vulnerabilities. Engaging key stakeholders during this phase is crucial.
    Assess risks based on their impact and likelihood. Prioritize them to focus on
    the most critical ones. Use your risk register to document and track identified
    risks.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Platform采用计划中进行有效的风险管理涉及在整个项目过程中识别、评估和减轻风险。首先，识别潜在风险，如技术挑战、资源限制、利益相关者的抵制和安全漏洞。在这个阶段与关键利益相关者进行沟通至关重要。根据其影响和可能性评估风险。优先考虑它们，重点关注最关键的风险。使用您的风险登记册来记录和跟踪已识别的风险。
- en: 'Develop strategies to manage risks, which may include the following:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 制定管理风险的策略，这可能包括以下内容：
- en: '**Risk avoidance**: Altering project plans to eliminate risks'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险规避**：调整项目计划以消除风险'
- en: '**Risk transfer**: Outsourcing certain project components'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险转移**：外包某些项目组件'
- en: '**Risk mitigation**: Reducing the likelihood or impact of risks, such as through
    additional training'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险缓解**：通过额外培训等方式降低风险的可能性或影响'
- en: '**Risk acceptance**: Proceeding with the project while closely monitoring the
    risk'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险接受**：在密切监控风险的同时推进项目'
- en: Continuously monitor risks and report on their status to keep stakeholders informed.
    This fosters trust and collaborative problem-solving. Prepare contingency plans
    to address risks that materialize despite mitigation efforts. Allocate reserve
    resources for unforeseen issues. Regularly review and adapt the risk management
    process based on lessons learned, ensuring continuous improvement and resilience.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 持续监控风险并报告其状态，以保持利益相关者了解情况。这有助于建立信任和协作解决问题。准备应急计划以应对尽管采取了缓解措施但仍可能出现的风险。为意外问题分配备用资源。根据所学经验定期审查和调整风险管理流程，确保持续改进和弹性。
- en: By incorporating these practices, you can safeguard your Power Platform adoption
    program and drive its overall success.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 通过采用这些实践，您可以保护您的 Power Platform 采用计划并推动其整体成功。
- en: Communications plan
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 沟通计划
- en: Building and managing a communications program is crucial when defining the
    scope of a Power Platform adoption program. Clear communication guarantees that
    all stakeholders remain aligned, well-informed, and actively involved during the
    entire project.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义 Power Platform 采用计划的范围时，建立和管理沟通计划至关重要。清晰的沟通确保所有利益相关者在整个项目期间保持一致、充分了解并积极参与。
- en: Begin by clearly defining the objectives of your communication efforts. Identify
    the key stakeholders, including executive sponsors, project managers, IT teams,
    end users, and external partners. Understanding their needs and expectations will
    help tailor your communication strategies.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 首先明确界定您的沟通努力的目标。确定关键利益相关者，包括执行赞助商、项目经理、IT 团队、最终用户和外部合作伙伴。了解他们的需求和期望将有助于定制您的沟通策略。
- en: Develop a comprehensive communication plan that outlines the methods, frequency,
    and channels of communication. Determine the types of information to be shared,
    such as project updates, milestones, risk status, and success stories. Utilize
    various channels such as emails, meetings, newsletters, and intranet portals to
    ensure the information reaches all stakeholders effectively.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 制定一个全面的沟通计划，概述沟通的方法、频率和渠道。确定要共享的信息类型，例如项目更新、里程碑、风险状态和成功故事。利用电子邮件、会议、通讯和内部门户网站等不同渠道，确保信息有效地传达给所有利益相关者。
- en: Assign specific roles and responsibilities for communication tasks. Designate
    a communications manager or team to oversee the execution of the plan. Ensure
    that all team members understand their roles in disseminating information and
    gathering feedback.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 为沟通任务分配具体的角色和责任。指定一名沟通经理或团队来监督计划的执行。确保所有团队成员了解他们在传播信息和收集反馈中的角色。
- en: Implement feedback loops to capture stakeholder input and concerns. Frequently
    gather feedback using surveys, focus groups, and individual meetings. Apply this
    input to refine communication strategies and swiftly resolve any concerns.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 实施反馈循环以捕捉利益相关者的意见和建议。经常使用调查、焦点小组和个人会议收集反馈。将此反馈应用于完善沟通策略并迅速解决任何问题。
- en: Track the effectiveness of your communication efforts by setting **key performance
    indicators** (**KPIs**) such as stakeholder engagement levels, feedback response
    times, and information retention rates. Regularly review these metrics and adapt
    the communication plan as needed to ensure continuous improvement.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过设置**关键绩效指标**（**KPIs**），如利益相关者参与度、反馈响应时间和信息保留率，来跟踪您沟通工作的有效性。定期审查这些指标，并根据需要调整沟通计划，以确保持续改进。
- en: All the components mentioned have been summarized in *Figure 6**.4*, showing
    that a communications program is not just about sending emails but needs to be
    clearly thought out.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 所提到的所有组成部分已在*图 6.4*中总结，显示沟通计划不仅仅是发送电子邮件，而需要明确思考。
- en: '![Figure 6.4: The components of an effective communications program](img/B21080_06_004.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.4：有效沟通计划的组成部分](img/B21080_06_004.jpg)'
- en: 'Figure 6.4: The components of an effective communications program'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.4：有效沟通计划的组成部分
- en: Platforms
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平台
- en: Before embarking on the Power Platform adoption program, several foundational
    platforms must be established to ensure a seamless and successful implementation.
    These platforms serve as the bedrock upon which the entire program’s infrastructure
    and strategy are built. These platforms are typically selected when building out
    the center of enablement workstreams.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始Power Platform采用计划之前，必须建立几个基础平台以确保顺利且成功实施。这些平台构成了整个计划基础设施和策略的基石。这些平台通常在构建赋能工作流中心时被选中。
- en: An advanced collaboration platform must be implemented to enable efficient communication
    and teamwork across different departments and stakeholders. This platform should
    support various modes of interaction, such as instant messaging, video conferencing,
    and document sharing, enhancing productivity and supporting a culture of collaboration.
    People will need to be directed to a central place to interact with the various
    resources available to them and to leverage the governance and guidance materials.
    A notable example of this is to leverage Microsoft Teams or Viva Engage.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 必须实施一个高级协作平台，以实现跨不同部门和利益相关者的有效沟通和团队合作。这个平台应支持各种交互模式，如即时消息、视频会议和文档共享，提高生产率并支持协作文化。人们需要被引导到一个中心位置，以与各种可用的资源互动，并利用治理和指导材料。一个值得注意的例子是利用Microsoft
    Teams或Viva Engage。
- en: A comprehensive project management platform is crucial for tracking progress,
    managing tasks, and ensuring that timelines and milestones are met. This platform
    should include features such as Gantt charts, resource allocation tools, and real-time
    reporting to provide clear visibility into the project’s status and performance.
    A popular tool used for this type of program is Microsoft Project.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一个全面的项目管理平台对于跟踪进度、管理任务和确保时间表和里程碑得到满足至关重要。这个平台应包括甘特图、资源分配工具和实时报告等功能，以提供对项目状态和绩效的清晰可见性。用于此类计划的一种流行工具是Microsoft
    Project。
- en: A training and development platform is vital to equip all users with the necessary
    skills and knowledge to leverage Power Platform effectively. This platform should
    offer a range of learning resources, including tutorials, webinars, and hands-on
    workshops, tailored to different user roles and proficiency levels. It is a clever
    idea to surface the training and adoption platform through your collaboration
    portal (Microsoft Teams or Viva Engage).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 一个培训和开发平台对于让所有用户掌握有效利用Power Platform所需的基本技能和知识至关重要。这个平台应提供一系列学习资源，包括教程、网络研讨会和实操研讨会，针对不同的用户角色和专业水平进行定制。通过您的协作门户（如Microsoft
    Teams或Viva Engage）展示培训和采用平台是一个巧妙的想法。
- en: By focusing on all the aspects mentioned in this section and clearly defining
    your scope, you are ready to drive much wider Power Platform adoption in your
    organization.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 通过关注本节中提到的所有方面并明确界定您的范围，您就准备好在您的组织中推动更广泛的Power Platform采用。
- en: In this section, we emphasized the need for a more governed scope of work when
    building your Power Platform adoption program. It is important to ensure that
    you are as clear as possible on *what* it is you are going to be delivering and
    over which specific timeline. Getting your ecosystem ready for Power Platform
    adoption will set you up for success and ensure your people, platforms, and processes
    are ready for much wider, scaled use of the platform. In the next section, we
    will focus on managing stakeholder expectations and building a team around your
    adoption program.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们强调了在构建您的Power Platform采用计划时需要更明确的作业范围。确保您对将要交付的内容以及具体的时间表尽可能清晰是很重要的。为Power
    Platform采用做好准备将使您取得成功，并确保您的员工、平台和流程为更广泛、规模化的平台使用做好准备。在下一节中，我们将重点关注管理利益相关者的期望并围绕您的采用计划组建团队。
- en: Empowering success through executive sponsorship and buy-in
  id: totrans-89
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过高管赞助和认可来赋予成功力量
- en: In [*Chapter 2*](B21080_02.xhtml#_idTextAnchor042), in the *Assemble the team*
    section, basic team structures for a center of enablement are shared. This team
    structure is essential when preparing your digital ecosystem for Power Platform.
    In this same section, there is also a brief excerpt on stakeholder mapping and
    the importance of aligning the correct stakeholders as you prepare for your center
    of enablement.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*第二章*](B21080_02.xhtml#_idTextAnchor042)的*组建团队*部分，分享了赋能中心的基本团队结构。在为Power Platform准备您的数字生态系统时，这种团队结构至关重要。在同一部分中，还有关于利益相关者映射和正确对齐利益相关者重要性的简要摘录，这是您为准备赋能中心时需要考虑的。
- en: A critical element in the successful adoption of the Power Platform is securing
    executive sponsorship and assembling the right team. Executive sponsorship is
    vital as it provides the necessary authority and resources to drive the initiative
    forward, ensuring that organizational goals remain aligned with the project’s
    objectives. An influential sponsor can champion the cause, influence key stakeholders,
    and facilitate the removal of obstacles that may hinder progress.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: Power Platform成功采用的一个关键要素是获得高管支持并组建正确的团队。高管支持至关重要，因为它提供了推动计划向前发展的必要权限和资源，确保组织目标与项目目标保持一致。有影响力的赞助者可以倡导事业，影响关键利益相关者，并促进移除可能阻碍进展的障碍。
- en: Equally important is the composition of the team tasked with spearheading this
    transformation. The team should be a cohesive blend of skilled professionals,
    including project managers, IT specialists, and business analysts, each bringing
    a unique perspective and expertise to the table. This diversity ensures that all
    facets of the implementation are covered, from technical intricacies to strategic
    alignment and user adoption.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 同样重要的是负责引领这一变革的团队组成。这个团队应该是一个由技能娴熟的专业人士组成的紧密融合体，包括项目经理、IT专家和业务分析师，他们各自带来独特的视角和专业知识。这种多样性确保了实施的所有方面都得到覆盖，从技术复杂性到战略对齐和用户接受度。
- en: Working with stakeholders to drive buy-in
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与利益相关者合作以获得支持
- en: Engaging stakeholders and ensuring their buy-in is critical to the success of
    your Power Platform adoption program. This process begins with identifying and
    mapping out all relevant stakeholders, which may include executive leaders, department
    heads, IT staff, end users, and external partners. Each of these groups has unique
    interests, concerns, and objectives that must be addressed to secure their support.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 吸引利益相关者并确保他们的支持对于您Power Platform采用计划的成功至关重要。这个过程从识别和绘制所有相关利益相关者开始，可能包括高管、部门负责人、IT人员、最终用户和外部合作伙伴。每个群体都有独特的兴趣、关切和目标，必须解决这些问题以确保他们的支持。
- en: One of the first steps in collaborating with stakeholders is to clearly communicate
    the vision and benefits of the Power Platform adoption. This involves articulating
    how the platform will solve existing problems, enhance efficiency, and drive innovation
    within the organization. Tailoring this message to address the specific needs
    and pain points of different stakeholder groups can significantly enhance their
    engagement and willingness to support the initiative. This message should map
    to your purpose and vision statement that was defined in [*Chapter 5*](B21080_05.xhtml#_idTextAnchor105)’s
    *Getting started with your* *vision* section.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 与利益相关者合作的第一步是明确传达Power Platform采用愿景和好处。这包括阐述平台将如何解决现有问题、提高效率和推动组织内的创新。针对不同利益相关者群体的具体需求和痛点定制此信息可以显著提高他们的参与度和支持该计划的意愿。此信息应与[*第五章*](B21080_05.xhtml#_idTextAnchor105)的*开始您的愿景*部分中定义的宗旨和愿景声明相一致。
- en: It is essential to involve stakeholders in the planning and decision-making
    process. This can be achieved by conducting workshops, meetings, and focus groups
    where stakeholders can provide input and feedback on the implementation plan.
    By actively involving them, you demonstrate that their opinions are valued, which
    can foster a sense of ownership and commitment to the project’s success. Stakeholders
    need to feel part of the process.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是让利益相关者参与规划和决策过程。这可以通过举办研讨会、会议和焦点小组来实现，让利益相关者可以对实施计划提供反馈和意见。通过积极参与，您表明他们的意见受到重视，这可以培养对项目成功的感觉和承诺。利益相关者需要感觉到自己是这个过程的一部分。
- en: Creating a detailed stakeholder engagement plan is another key component. This
    plan should outline the communication strategies, frequency, and channels for
    keeping stakeholders informed and engaged throughout the project life cycle. Regular
    updates, progress reports, and success stories can help maintain momentum and
    reinforce the value of the initiative. Being as open and clear as often as possible
    is important.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 制定详细的干系人参与计划是另一个关键组成部分。此计划应概述在整个项目生命周期中保持干系人知情和参与所需的沟通策略、频率和渠道。定期的更新、进度报告和成功故事可以帮助保持势头并加强该举措的价值。尽可能保持开放和透明非常重要。
- en: It is important to address and manage any resistance that may arise. This can
    be done by identifying potential sources of resistance early on and developing
    strategies to mitigate them. Typical sources of resistance you may encounter are
    often based on a lack of understanding and support. Often, people simply fear
    something new that they need to do or learn and this can lead to high resistance
    to change. Equipping stakeholders with the needed training and resources can ease
    concerns and boost confidence in the new platform.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 处理和管理可能出现的任何阻力非常重要。这可以通过早期识别潜在的阻力来源并制定缓解策略来实现。你可能会遇到的典型阻力来源通常是基于缺乏理解和支持。通常，人们只是害怕他们需要做或学习的新事物，这可能导致对变革的高度抵制。为干系人提供所需的培训和资源可以缓解担忧并提高他们对新平台信心的提升。
- en: Building strong relationships with key influencers within the organization can
    further aid in gaining buy-in. These individuals can function as advocates for
    the project, helping to spread positive messages and encourage support from their
    peers and subordinates.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 与组织内部的关键影响者建立强大的关系可以进一步帮助获得支持。这些人可以作为项目的倡导者，帮助传播积极信息并鼓励他们的同事和下属提供支持。
- en: Recognizing and celebrating milestones and achievements is crucial in maintaining
    stakeholder engagement. Acknowledging their contributions and the progress made
    can boost morale and reinforce their commitment to the project’s success.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 认可和庆祝里程碑和成就对于维持干系人参与至关重要。认可他们的贡献和取得的进展可以提振士气并加强他们对项目成功的承诺。
- en: The steps to a successful stakeholder management program are summarized in *Figure
    6**.5*; it’s important to understand that this is a process. Each step will require
    planning and action in order to ensure stakeholders are kept in the loop and engaged.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的干系人管理计划的步骤总结在*图6.5*；重要的是要理解这是一个过程。每个步骤都需要规划和行动，以确保干系人保持参与并保持活跃。
- en: '![Figure 6.5: The process for stakeholder management consists of various steps](img/B21080_06_005.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图6.5：干系人管理的过程包括多个步骤](img/B21080_06_005.jpg)'
- en: 'Figure 6.5: The process for stakeholder management consists of various steps'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.5：干系人管理的过程包括多个步骤
- en: Expanding the team
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展团队
- en: To build, grow, and expand a Power Platform team during a Power Platform adoption
    program, it is essential to follow a structured and strategic approach. This begins
    with understanding the goals and requirements of the initiative and aligning them
    with the skills and expertise needed within the team. As an example, if one of
    your goals is to ensure that all members of the HR team are trained in creating
    solutions with Power Platform, then you will need people who are able to help
    with this, or a training team.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Platform采用计划期间，为了构建、增长和扩展Power Platform团队，遵循结构化和战略的方法至关重要。这始于理解该活动的目标和需求，并将它们与团队内所需的技能和专业知识相一致。例如，如果你的目标之一是确保HR团队的所有成员都接受过使用Power
    Platform创建解决方案的培训，那么你需要能够帮助这一过程的人，或者一个培训团队。
- en: Bearing in mind that the team focusing on adoption will be a part of the wider
    Center for Enablement team mentioned in [*Chapter 2*](B21080_02.xhtml#_idTextAnchor042),
    *Assemble* *the team* section. At this point, the center of enablement should
    be in the process of being created and these roles should already be mapped.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到专注于采用的项目团队将是提到的更广泛的**能力中心团队**的一部分，即**组建团队**部分。在这个时候，能力中心应该正处于创建过程中，这些角色应该已经确定。
- en: 'Define the key roles and responsibilities necessary for the successful adoption
    of the Power Platform. These roles may include the following:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 定义成功采用Power Platform所需的关键角色和职责。这些角色可能包括以下内容：
- en: '**Project managers**: Oversee the entire adoption process, ensuring that timelines,
    budgets, and deliverables are met.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**项目经理**：监督整个采用过程，确保时间表、预算和交付成果得到满足。'
- en: '**Program managers**: Manage the relationships with stakeholders and ensure
    that the project moves forward in a successful direction.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**项目经理**：管理与利益相关者的关系，并确保项目朝着成功的方向发展。'
- en: '**Power Platform admin team**: Manage the digital ecosystem of Power Platform
    and ensure that the technical elements of the platform are working correctly.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Power Platform管理员团队**：管理Power Platform的数字生态系统，并确保平台的技术元素运行正确。'
- en: '**Trainers and support staff**: Provide ongoing education and assistance to
    end users, ensuring smooth adoption and utilization of the platform. This should
    not be underestimated. The more people engage in the community and use the platform,
    the more support staff you will need.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**培训师和支持人员**：为最终用户提供持续的教育和帮助，确保平台顺利采用和有效利用。这一点不容忽视。参与社区和使用平台的人数越多，所需的支撑人员就越多。'
- en: '**Change managers**: Understand the wider change culture in the organization
    and manage the aspects of change across the teams.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变革经理**：了解组织中的更广泛变革文化，并管理团队间的变革方面。'
- en: Encourage a culture of collaboration and continuous learning within the team.
    This can be achieved by organizing regular team meetings, workshops, and training
    sessions where team members can share knowledge, discuss challenges, and brainstorm
    solutions. Promote open communication and provide platforms for team members to
    voice their ideas and concerns.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励团队内部的合作和持续学习文化。这可以通过组织定期的团队会议、研讨会和培训课程来实现，团队成员可以在这些活动中分享知识、讨论挑战和头脑风暴解决方案。促进开放沟通，为团队成员提供表达想法和担忧的平台。
- en: Invest in ongoing training and development programs to keep the team updated
    with the latest features, best practices, and industry trends related to Power
    Platform. This can include attending conferences, enrolling in online courses,
    and participating in webinars and community events. Encourage team members to
    pursue relevant certifications to enhance their skills and knowledge. Many organizations
    invest in creating bite-sized videos internally of people undertaking tasks or
    using Power Platform to solve problems. This is known as “nano training.”
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 投资于持续培训和开发计划，以使团队了解Power Platform的最新功能、最佳实践和行业趋势。这可能包括参加会议、报名参加在线课程、参与网络研讨会和社区活动。鼓励团队成员追求相关认证，以提升他们的技能和知识。许多组织投资于创建内部短小精悍的视频，展示人们执行任务或使用Power
    Platform解决问题。这被称为“纳米培训”。
- en: As the adoption program progresses, continuously assess the team’s capacity
    and capabilities. This may be done in the same way the baselining assessment was
    undertaken. Be prepared to scale the team by hiring additional staff or engaging
    external consultants to address any gaps or increased workload. Ensure that the
    team structure remains flexible and adaptable to meet the evolving needs of the
    project.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 随着采用计划的推进，持续评估团队的能力和技能。这可能以与基准评估相同的方式进行。准备好通过招聘额外人员或聘请外部顾问来填补任何差距或增加的工作量来扩大团队规模。确保团队结构保持灵活和适应性强，以满足项目不断变化的需求。
- en: Maintain open lines of communication with key stakeholders, including executive
    leaders, department heads, and end users. Regularly update them on the progress
    of the adoption program and seek their feedback and input. Involving stakeholders
    in the decision-making process can help build trust and ensure that the team’s
    efforts align with the organization’s overall objectives.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 与关键利益相关者保持开放的沟通渠道，包括高管、部门负责人和最终用户。定期更新他们关于采用计划的进展情况，并征求他们的反馈和建议。让利益相关者参与决策过程有助于建立信任，并确保团队的努力与组织的整体目标保持一致。
- en: Define specific metrics and KPIs to assess the team’s advancement and achievements.
    Regularly review these metrics to identify areas for improvement and celebrate
    achievements. Recognizing and rewarding the team’s hard work and accomplishments
    can boost morale and motivate them to continue delivering high-quality results.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 定义具体的指标和KPI来评估团队的进步和成就。定期审查这些指标，以确定改进领域并庆祝成就。认可和奖励团队的努力和成就可以提升士气，并激励他们继续提供高质量的结果。
- en: By following the steps highlighted in *Figure 6**.6*, you can build, grow, and
    expand a highly effective Power Platform team that is well-equipped to drive the
    successful adoption and long-term utilization of the platform within your organization.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循*图6*中突出的步骤，您可以构建、发展和扩展一个高度有效的Power Platform团队，该团队配备齐全，能够推动组织内平台的成功采用和长期利用。
- en: '![Figure 6.6: Process to drive the expansion of the team in your organization](img/B21080_06_006.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图6.6：推动组织中团队扩展的过程](img/B21080_06_006.jpg)'
- en: 'Figure 6.6: Process to drive the expansion of the team in your organization'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.6：推动组织中团队扩展的过程
- en: Assembling the right team and securing executive sponsorship for the successful
    adoption of the Power Platform is so important. The right team should include
    a mix of professionals with diverse skills and expertise to cover all aspects
    of the implementation.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 组建合适的团队并为Power Platform的成功采用获得高管支持非常重要。合适的团队应包括具有不同技能和专长的专业人士，以涵盖实施的所有方面。
- en: Engaging stakeholders and ensuring their buy-in is also crucial, involving clearly
    communicating the vision and benefits of the Power Platform adoption, involving
    them in the planning process, creating a stakeholder engagement plan, and addressing
    any resistance that may arise.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 吸引利益相关者并确保他们的支持也是至关重要的，包括清楚地传达Power Platform采用的愿景和好处，让他们参与规划过程，制定利益相关者参与计划，并解决可能出现的任何阻力。
- en: Additionally, it is essential to expand the team strategically by defining key
    roles and responsibilities, attracting top talent, promoting collaboration and
    continuous learning, investing in ongoing training and development, assessing
    the team’s capacity, and maintaining open communication with key stakeholders.
    These steps are key for building a highly effective Power Platform team and driving
    successful adoption within the organization. In the next section, we will focus
    on how to navigate IT and leadership challenges during your adoption program.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，通过定义关键角色和责任、吸引顶尖人才、促进协作和持续学习、投资于持续培训和开发、评估团队能力以及与关键利益相关者保持开放沟通，战略性地扩大团队是至关重要的。这些步骤对于构建一个高效能的Power
    Platform团队并在组织中推动成功的采用至关重要。在下一节中，我们将关注如何在采用计划期间应对IT和领导挑战。
- en: Navigating IT and leadership challenges during adoption
  id: totrans-124
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在采用过程中应对IT和领导挑战
- en: The road to successful technology adoption often exposes various challenges,
    particularly when it comes to navigating IT leadership and managing resistance
    within the organization. Adoption is not easy because it involves people and people
    are complicated at the best of times.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 成功采用技术的道路往往暴露出各种挑战，尤其是在导航IT领导和处理组织内部的阻力时。采用并不容易，因为它涉及到人，而人在最好的时候也是复杂的。
- en: Effective communication plays an important role in the success of an adoption
    program. Transparent and consistent communication with all stakeholders, from
    executive leaders to end users, ensures that everyone is aligned with the program’s
    objectives and progress. This alignment not only builds trust but also engenders
    a sense of ownership and collaboration across the organization.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的沟通在采用计划的成功中扮演着重要角色。与所有利益相关者，从高管到最终用户，进行透明和一致的沟通，确保每个人都与计划的目标和进度保持一致。这种一致性不仅建立信任，还在整个组织中培养了一种所有权和协作感。
- en: It is crucial to define clear metrics and KPIs to monitor progress and celebrate
    achievements. Regularly reviewing these metrics allows leaders to pinpoint areas
    for improvement and recognize the hard work and accomplishments of their teams,
    thereby boosting morale and motivation.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 明确定义清晰的指标和KPIs对于监控进度和庆祝成就至关重要。定期审查这些指标使领导者能够确定改进领域，并认可他们团队的努力和成就，从而提升士气和动力。
- en: Metrics and KPIs can be tracked in multiple ways. Many organizations will simply
    use spreadsheets to do this; however, tools such as Power BI are far more effective
    and expose data in a more meaningful way. It is suggested that monitoring outputs
    are fed into a central location such as Dataverse and then Power BI can be used
    to visualize the data.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 指标和KPIs可以通过多种方式跟踪。许多组织将简单地使用电子表格来完成这项工作；然而，像Power BI这样的工具则更为有效，并以更有意义的方式展示数据。建议将监控输出输入到中央位置，如Dataverse，然后可以使用Power
    BI来可视化数据。
- en: Another important aspect is the need for a clear understanding of the current
    team’s capacity and capabilities. Additional people/talent may be required, and
    this may mean bringing more people into the fold. Often, these team members come
    from other departments. Many organizations grow their Power Platform teams by
    including champions/heroes from other departments who have shown a deep interest
    in the platform and want to be part of the wider program. Investing in ongoing
    training and development programs is also highlighted as a cornerstone of successful
    adoption. Keeping the team updated with the latest features, best practices, and
    industry trends related to technology ensures that they remain proficient and
    innovative in their roles. Encouraging a culture of collaboration and continuous
    learning further enhances the team’s ability to navigate challenges and devise
    creative solutions. This can be managed by the champions who have an active interest
    in growing the Power Platform ecosystem.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要方面是清楚了解当前团队的容量和能力。可能需要额外的人员/人才，这可能意味着将更多人纳入团队。通常，这些团队成员来自其他部门。许多组织通过包括对平台有深厚兴趣并希望成为更广泛计划一部分的其他部门的倡导者/英雄来扩大Power
    Platform团队。投资于持续培训和开发计划也被视为成功采用的基础。通过让团队了解与技术和行业趋势相关的最新功能、最佳实践和行业趋势，确保他们在角色中保持熟练和创新。鼓励协作和持续学习的文化进一步增强了团队应对挑战和制定创新解决方案的能力。这可以通过对扩大Power
    Platform生态系统有积极兴趣的倡导者来管理。
- en: Defining and managing resistance
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义和管理阻力
- en: Resistance to change is a natural human response, particularly in the context
    of adopting technologies such as Power Platform. Understanding and managing this
    resistance effectively is crucial to the success of any adoption program.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 对变化的阻力是人的自然反应，尤其是在采用像Power Platform这样的技术时。有效理解和应对这种阻力对于任何采用计划的成功至关重要。
- en: The first step in managing resistance is to identify its sources. There can
    be many sources, stemming from entrenched work habits, fear of the unknown, or
    concerns about job security. Employees might worry about their ability to learn
    new skills or the potential for increased workload. By recognizing these concerns,
    IT leaders can develop targeted strategies to address them.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 管理阻力的第一步是确定其来源。可能有多个来源，包括根深蒂固的工作习惯、对未知的恐惧或对工作安全性的担忧。员工可能会担心他们学习新技能的能力或工作量增加的可能性。通过认识到这些担忧，IT领导者可以制定针对性的策略来应对这些问题。
- en: To mitigate resistance, it is essential to implement targeted approaches tailored
    to address specific concerns. For instance, if employees are worried about their
    ability to learn new skills, offering comprehensive training programs and resources
    can alleviate these fears. Regular workshops, online courses, and hands-on sessions
    can help build confidence and competence.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减轻阻力，实施针对特定问题量身定制的策略至关重要。例如，如果员工担心他们学习新技能的能力，提供全面的培训计划和资源可以缓解这些担忧。定期的研讨会、在线课程和实操环节可以帮助建立信心和技能。
- en: Building a supportive environment is another key strategy. This involves transparent
    communication about the benefits of Power Platform and how it will positively
    impact the organization and its employees. Highlighting success stories and case
    studies can help illustrate the platform’s value. Providing a clear roadmap and
    timeline for the adoption process can also reduce uncertainty and build trust.
    This is typically undertaken by the champions and with the communities of practice
    that have been set up.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个支持性的环境是另一个关键策略。这包括关于Power Platform的好处及其如何积极影响组织和员工的透明沟通。突出成功案例和案例研究可以帮助说明平台的价值。提供采用过程的明确路线图和时间表也可以减少不确定性并建立信任。这通常由倡导者和已经建立的实践社区来完成。
- en: Strong leadership involvement is critical in managing resistance. Leaders should
    actively advocate for the adoption program, demonstrating their commitment and
    support. They should also be visible and accessible, addressing any concerns and
    providing reassurance. Engaging leaders from different departments can help create
    a unified front and reinforce the message that adoption is a strategic priority
    for the entire organization.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 强有力的领导参与对于管理阻力至关重要。领导者应积极倡导采用计划，展示他们的承诺和支持。他们还应该保持可见性和可接触性，解决任何担忧并提供保证。邀请来自不同部门的领导者参与可以帮助形成统一战线，并强化采用是整个组织战略重点的信息。
- en: Promoting a culture of collaboration and continuous learning can further ease
    resistance. Encouraging knowledge sharing and teamwork can help employees feel
    more engaged and invested in the adoption process. Creating forums for feedback
    and suggestions can also give employees a sense of ownership and involvement,
    making them more likely to embrace the change. The more people are seen to be
    learning in public, the more likely others will be to join the movement and participate.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 促进协作文化和持续学习可以进一步缓解抵制。鼓励知识共享和团队合作可以帮助员工感到更加投入和参与采用过程。创建反馈和建议论坛也可以让员工有一种所有权和参与感，使他们更有可能接受变革。看到更多的人在公共场合学习，其他人加入运动和参与的可能性就越大。
- en: By following the steps highlighted in *Figure 6**.7* and promoting people to
    feel included and part of something, the less likely they are to be resistant.
    Creating a fan out of a person who is resistant is one of the most amazing things
    that can happen because that person will become a fan for life.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循*图6.7*中突出显示的步骤，并鼓励人们感到被包括和成为其中一部分，他们抵制变革的可能性就会降低。将一个抵制变革的人转变为粉丝是可能发生的最令人惊奇的事情之一，因为那个人将终身成为粉丝。
- en: '![Figure 6.7: Reducing resistance](img/B21080_06_007.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![图6.7：降低阻力](img/B21080_06_007.jpg)'
- en: 'Figure 6.7: Reducing resistance'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.7：降低阻力
- en: Understanding and navigating the challenges
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解和应对挑战
- en: Understanding the challenges inherent in adopting Power Platform is pivotal
    for ensuring a smooth transition and maximizing the potential benefits of the
    technology. Challenges can arise from various sources, each requiring a nuanced
    approach to address effectively.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 理解采用Power Platform固有的挑战对于确保平稳过渡和最大化技术潜力至关重要。挑战可能来自各种来源，每个都需要一种细致入微的方法来有效解决。
- en: One of the primary challenges is resistance to change, as mentioned in the *Defining
    and managing resistance* section. Leaders should take the time to understand the
    specific anxieties and reservations employees may have. This understanding will
    allow for a level of empathy and a more targeted approach to helping. “*What specifically
    are you worried about?*” is a useful conversation to have with a person or a team
    when engaging in an adoption program.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如*定义和管理抵制*部分所述，主要挑战之一是对变革的抵制。领导者应花时间了解员工可能有的具体焦虑和保留意见。这种理解将允许达到一定程度的同理心，并采取更有针对性的帮助方法。“*你具体担心什么？*”在与采用计划进行互动时，与个人或团队进行的有用对话。
- en: Another significant challenge is the technical preparedness of the organization.
    This involves ensuring that the existing IT infrastructure can support Power Platform
    and that there is sufficient technical expertise within the team to manage and
    maintain the new system. Conducting a thorough baseline assessment of the current
    technological landscape is crucial. This assessment should identify any gaps in
    infrastructure or skills and outline a plan to address these gaps through investment
    in technology upgrades and staff training. The baseline assessment is focused
    on in the [*Chapter 2*](B21080_02.xhtml#_idTextAnchor042) section, *The importance*
    *of baselining*.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的挑战是组织的技术准备情况。这包括确保现有的IT基础设施能够支持Power Platform，并且团队中拥有足够的技术专长来管理和维护新系统。对当前技术环境进行全面的基础评估至关重要。这项评估应识别基础设施或技能方面的任何差距，并概述通过投资技术升级和员工培训来填补这些差距的计划。基础评估在[*第二章*](B21080_02.xhtml#_idTextAnchor042)部分，*基准的重要性*
    *中进行了重点介绍*。
- en: Cultural readiness is also a vital aspect of understanding the challenges during
    adoption. Organizational culture plays a crucial role in how innovative technologies
    are received and integrated. A culture that promotes innovation, continuous learning,
    and collaboration is more likely to embrace Power Platform. Conversely, a culture
    resistant to change may pose significant barriers. Leaders should work to cultivate
    a supportive environment that values and encourages adaptability, learning, and
    open communication. This can be achieved by encouraging a culture of collaboration,
    promoting knowledge sharing, and creating forums for feedback and suggestions.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 文化准备也是理解采用过程中挑战的一个关键方面。组织文化在创新技术的接受和整合中起着至关重要的作用。一种促进创新、持续学习和协作的文化更有可能接受Power
    Platform。相反，抵制变革的文化可能会设置重大障碍。领导者应努力营造一个支持和鼓励适应、学习和公开沟通的环境。这可以通过鼓励协作文化、促进知识共享以及创建反馈和建议论坛来实现。
- en: Strong leadership involvement is critical in navigating the challenges of adopting
    Power Platform. Leaders should actively advocate for the adoption program, demonstrating
    their commitment and support. They should also be visible and accessible, addressing
    any concerns and providing reassurance. Engaging leaders from different departments
    can help create a unified front and reinforce the message that adoption is a strategic
    priority for the entire organization. By understanding and addressing these challenges,
    organizations can better navigate the complexities of adopting Power Platform
    and ensure a successful transition.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在导航Power Platform采用挑战中，强有力的领导参与至关重要。领导者应积极倡导采用计划，展示他们的承诺和支持。他们还应该保持可见性和可接触性，解决任何担忧并提供保证。从不同部门吸引领导者可以帮助创造统一战线，并加强采用是整个组织战略优先事项的信息。通过理解和解决这些挑战，组织可以更好地导航Power
    Platform采用的复杂性，并确保顺利过渡。
- en: The more unified the approach and the clearer vision, the more targeted the
    adoption program and the clearer the scope will be.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 方法越统一，愿景越清晰，采用计划就越有针对性，范围也越明确。
- en: In summary, we focused on some of the resistance that may crop up from certain
    parts of the business and some of the challenges that may be faced. It’s important
    to be empathetic to these and to understand that, sometimes, people just need
    to be given more information. Risks can be mitigated and challenges can be solved
    if there is strong leadership and an actual plan and team that support these leaders.
    In the next section, we will look at how to set up a training strategy so that
    the people using the platform are given the skills they need to be successful.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们关注了业务某些部分可能出现的阻力以及可能面临的挑战。对这些表示同情并理解，有时人们只是需要更多的信息。如果有强有力的领导和实际计划以及支持这些领导者的团队，风险可以减轻，挑战可以解决。在下一节中，我们将探讨如何制定培训策略，以便使用平台的人能够获得他们成功所需的技能。
- en: Empowering teams with Power Platform skills
  id: totrans-148
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通过Power Platform技能赋能团队
- en: Crafting a robust training strategy is a foundational step in ensuring that
    employees are not only equipped with the necessary skills but also motivated to
    embrace this transformation.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 制定稳健的培训策略是确保员工不仅具备必要的技能，而且有动力拥抱这一变革的基础性步骤。
- en: Many assume that the focus on training is about how to technically use a set
    of tools, but it is *so* much more than that and can be complex when delving into
    various areas and aspects of a training and education program. Thinking about
    technology is especially important, but what is also crucial is to help people
    understand culturally that there is a change in the way “we do things here.” What
    used to be an acceptable way of working is now changing and people should be excited
    to get on board with that.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人认为培训的重点是如何技术性地使用一系列工具，但实际情况远不止于此，当深入到培训和教育计划的各个领域和方面时，它可能会变得复杂。思考技术尤其重要，但同样关键的是帮助人们从文化上理解“我们在这里做事的方式”正在发生变化。过去可以接受的工作方式现在正在改变，人们应该对此感到兴奋，并加入其中。
- en: As mentioned in the *Defining and managing risks* section, people are often
    just so used to doing things a certain way and not thinking about how to refine
    *how* they do things. This is no fault of theirs. It is human nature to learn
    and adapt, so in this training, it will be important to ensure that anyone adopting
    the platform understands *why* they are doing this, not just *what* it is they
    are doing. As an example, in regular day-to-day working practices, people are
    used to using tools such as spreadsheets to manage data. Instead, by leveraging
    Power Platform, you may create a canvas app on top of a SharePoint list to interact
    with this data in a more refined way. Making a canvas app is easy, but *why* are
    we doing this instead of using an Excel sheet? A lot of the time, the training
    misses this extremely valuable point. If people understand why, adoption will
    be much easier for them.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如同在*定义和管理风险*章节中提到的，人们往往习惯于以某种特定方式做事，而不会去思考如何改进*他们做事的方式*。这并不是他们的错。学习与适应是人的天性，因此在本培训中，确保任何采用该平台的人都理解*为什么*要这样做，而不仅仅是*他们在做什么*，这一点将非常重要。例如，在日常工作中，人们习惯于使用诸如电子表格等工具来管理数据。相反，通过利用Power
    Platform，你可以在SharePoint列表上创建一个画布应用程序，以更精细的方式与这些数据进行交互。制作画布应用程序很简单，但*为什么*我们要这样做而不是使用Excel表格？很多时候，培训忽略了这一点极其宝贵的观点。如果人们理解了原因，那么他们接受起来会容易得多。
- en: Change management
  id: totrans-152
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 变革管理
- en: Change management is extremely important in the successful implementation of
    a Power Platform adoption program. It involves a structured approach to transitioning
    individuals, teams, and organizations from their current state to a desired future
    state. Embracing change management ensures that the adoption of new technologies
    is as smooth and effective as possible, minimizing resistance and maximizing the
    potential for success.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 变革管理在成功实施Power Platform采用计划中极为重要。它涉及一种结构化的方法，将个人、团队和组织从当前状态过渡到期望的未来状态。接受变革管理确保新技术的采用尽可能平稳和有效，最小化阻力并最大化成功潜力。
- en: One key aspect of change management is communication. Open, transparent, and
    frequent communication helps to alleviate fears and uncertainties, providing a
    clear vision of the benefits and the roadmap ahead. This communication should
    address the *why* behind the change, helping everyone understand the strategic
    importance and the positive impact it will have on their work and the organization
    as a whole.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 变革管理的一个关键方面是沟通。开放、透明和频繁的沟通有助于缓解恐惧和不确定性，提供清晰的愿景，展示利益和未来的路线图。这种沟通应解决变革背后的*原因*，帮助每个人理解战略重要性及其对工作和整个组织产生的积极影响。
- en: Involving stakeholders at all levels in the planning and implementation process
    promotes a sense of ownership and commitment. When people feel they are part of
    the movement, they are more likely to support and engage with the new systems
    and practices. This inclusive approach also helps identify potential issues early
    on and develop solutions collaboratively.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在规划和实施过程中让所有层面的利益相关者参与，可以促进所有权感和承诺感。当人们觉得自己是运动的一部分时，他们更有可能支持和参与新的系统和实践。这种包容性方法也有助于及早识别潜在问题并共同制定解决方案。
- en: Providing adequate training and resources is another critical element. Ensuring
    that employees have the skills and knowledge they need to use Power Platform effectively
    reduces frustration and enhances productivity. Continuous learning opportunities
    and support systems help maintain momentum and encourage ongoing development.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 提供充足的培训和资源是另一个关键要素。确保员工拥有有效使用Power Platform所需的技能和知识可以减少挫折感并提高生产力。持续的学习机会和支持系统有助于保持势头并鼓励持续发展。
- en: Recognizing and celebrating successes along the way reinforces positive behavior
    and motivates the team. Acknowledging the efforts and achievements of individuals
    and teams strengthens their commitment and encourages a culture of continuous
    improvement.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在过程中认可和庆祝成功可以强化积极行为并激励团队。承认个人和团队的付出和成就可以加强他们的承诺并鼓励持续改进的文化。
- en: By integrating change management principles into the Power Platform adoption
    program, organizations can navigate the complexities of digital transformation
    with greater confidence and achieve long-lasting, impactful results.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将变革管理原则融入Power Platform采用计划，组织可以更有信心地应对数字化转型中的复杂性，并实现持久、有影响力的成果。
- en: Forming a training strategy
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 制定培训策略
- en: Designing and creating a comprehensive training program that empowers teams,
    fosters a culture of continuous learning, and drives the successful adoption of
    Power Platform often becomes one of the central aspects of a business’s adoption
    program.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 设计和创建一个全面的培训计划，赋予团队权力，培养持续学习的文化，并推动Power Platform的成功采用，这通常成为企业采用计划的核心方面。
- en: The process begins with a thorough baseline assessment to understand the current
    skill levels and knowledge gaps within the organization. This assessment should
    involve surveys, interviews, and performance reviews to gather detailed insights
    into what specific areas require attention.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程从全面的基础评估开始，以了解组织内的当前技能水平和知识差距。这次评估应包括调查、访谈和绩效评估，以收集有关哪些具体领域需要关注的详细信息。
- en: Once the needs are identified and a baseline has been created, the next step
    is to develop a structured curriculum or program that covers both the basics and
    advanced functionalities of Power Platform as well as any cultural areas that
    have been identified. The curriculum should be tailored to distinct roles within
    the organization, providing role-specific training that ensures each team member
    can leverage the platform effectively in their context. Incorporating hands-on
    workshops, real-world scenarios, and interactive modules can make the learning
    experience more engaging and practical.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦确定了需求并建立了基线，下一步就是开发一个结构化的课程或项目，涵盖Power Platform的基础功能和高级功能，以及任何已确定的文化领域。课程应根据组织内的不同角色进行定制，提供针对特定角色的培训，确保每个团队成员都能在其环境中有效地利用该平台。结合实际工作坊、现实世界场景和互动模块可以使学习体验更加吸引人和实用。
- en: Another fantastic mechanism to drive adoption and training is through hackathons
    or makeathons. These events allow offer makers of all types to get together to
    build out solutions that the organization may need. Typically, they will focus
    on proof-of-concept type solutions that can be further enriched. The important
    part is that people are building together to achieve a common goal.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 通过黑客马拉松或制作马拉松也是推动采用和培训的另一个出色机制。这些活动允许各种类型的制造者聚集在一起，构建组织可能需要的解决方案。通常，他们将专注于概念验证类型的解决方案，这些解决方案可以进一步丰富。重要的是人们一起构建以实现共同目标。
- en: Establishing a support system is crucial for maintaining momentum and addressing
    any challenges that may arise during the training process. This can include creating
    a repository of learning resources, setting up a mentorship program, and providing
    access to expert guidance. Regular feedback sessions should be conducted to assess
    progress and make necessary adjustments to the training approach.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 建立支持系统对于保持动力和解决培训过程中可能出现的任何挑战至关重要。这可以包括创建学习资源库、建立导师计划以及提供专家指导的访问权限。应定期进行反馈会议，以评估进度并对培训方法进行必要的调整。
- en: Establishing a culture of continuous learning is another key aspect of the training
    strategy. Encouraging employees to participate in ongoing professional development
    and keeping them informed about the latest updates and features of Power Platform
    can help sustain their engagement and proficiency. Recognizing and rewarding those
    who demonstrate exceptional commitment and improvement can further motivate the
    team.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 建立持续学习的文化是培训策略的另一个关键方面。鼓励员工参与持续的专业发展，并让他们了解Power Platform的最新更新和功能，可以帮助维持他们的参与度和熟练度。认可并奖励那些表现出卓越承诺和改进的人可以进一步激励团队。
- en: Leadership involvement is also paramount. Leaders should actively participate
    in the training initiatives, demonstrating their commitment and setting an example
    for the rest of the organization. Their endorsement and involvement can significantly
    enhance the credibility and importance of the training program.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 领导层的参与也是至关重要的。领导者应积极参与培训活动，展示他们的承诺并为整个组织树立榜样。他们的认可和参与可以显著提高培训计划的信誉和重要性。
- en: A well-crafted training strategy not only equips teams with the necessary skills
    but also fosters an environment where continuous improvement and innovation are
    ingrained in the organizational culture. By investing in comprehensive and effective
    training, organizations can maximize the benefits of Power Platform and drive
    successful digital transformation. The steps in *Figure 6**.8* summarize the steps
    that need to be taken to start driving a well-crafted training strategy.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心设计的培训策略不仅为团队配备了必要的技能，而且营造了一个持续改进和创新根植于组织文化的环境。通过投资全面有效的培训，组织可以最大化Power Platform的益处，并推动成功的数字化转型。*图6.8*中的步骤总结了开始实施精心设计的培训策略所需采取的步骤。
- en: "![Figure 6.8: \uFEFFA comprehensive training program for Power Platform adoption](img/B21080_06_008.jpg)"
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图6.8：Power Platform采用的全面培训计划](img/B21080_06_008.jpg)'
- en: 'Figure 6.8: A comprehensive training program for Power Platform adoption'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.8：Power Platform采用的全面培训计划
- en: Driving a culture of learning
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 培养学习文化
- en: Building and nurturing a culture of learning when adopting the Power Platform
    involves several crucial steps. Firstly, organizations must create an engaging
    and comprehensive training strategy that aligns with their digital transformation
    goals. This strategy should be designed to equip teams with the necessary skills
    and encourage a mindset of continuous learning and innovation.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在采用Power Platform时，建立和培养学习文化涉及几个关键步骤。首先，组织必须创建一个引人入胜且全面的培训策略，该策略与他们的数字化转型目标相一致。这个策略应该设计用来为团队提供必要的技能，并鼓励持续学习和创新的心态。
- en: A well-developed curriculum and strong leadership support play integral roles
    in this process. Leaders are not only advocates but also active participants in
    the learning journey, demonstrating their commitment to the program. They facilitate
    an environment where learning is valued and encouraged, making resources readily
    available and accessible.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 一个发展良好的课程和强大的领导层支持在这个过程中扮演着至关重要的角色。领导者不仅是倡导者，也是学习旅程中的积极参与者，展示了他们对项目的承诺。他们营造了一个重视并鼓励学习的环境，使资源易于获取和访问。
- en: To implement the training program effectively, it should be piloted with a select
    group to gather feedback and refine the approach. Once tested and improved, the
    program can be scaled across different departments, ensuring widespread adoption
    and proficiency.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地实施培训计划，应该先在一个精选的小组中进行试点，以收集反馈并完善方法。一旦经过测试和改进，该计划就可以扩展到不同的部门，确保广泛采用和熟练度。
- en: A fantastic way to support a culture of learning in public is to ensure that
    a mentorship program is set up. Mentorship in an organization is a fantastic way
    of helping people across the business learn and grow into positions or roles that
    they aspire to be in. A key part of getting this right is through guidance and
    teaching. This is great for both mentors and mentees.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在公共领域支持学习文化的一个绝佳方式是确保建立一个导师计划。在组织中，导师制是一种帮助人们学习并成长到他们渴望的职位或角色的绝佳方式。正确实施这一计划的关键是通过指导和教学。这对导师和被指导者都有很大帮助。
- en: Encouraging ongoing professional development and keeping employees informed
    about the latest updates and features of Power Platform further sustains their
    engagement and proficiency. Recognizing and rewarding those who show exceptional
    commitment and improvement incentivizes continued participation and effort.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励持续的专业发展和让员工了解Power Platform的最新更新和功能，可以进一步维持他们的参与度和熟练度。认可并奖励那些表现出卓越承诺和进步的人，可以激励他们继续参与和努力。
- en: In conclusion, by creating a culture of continuous learning and implementing
    strategic training programs, organizations can drive the successful adoption of
    Power Platform, ensuring long-term sustainability and growth.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，通过创建持续学习的文化和实施战略培训计划，组织可以推动Power Platform的成功采用，确保长期可持续性和增长。
- en: We understand the importance of developing a robust training strategy to empower
    employees. The primary goal here is to provide people with the skills needed to
    embrace the transformation brought about by Power Platform. We discuss how training
    should not only focus on technical aspects but also on cultural change within
    the organization.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我们理解制定稳健的培训策略来赋能员工的重要性。这里的首要目标是提供人们拥抱Power Platform带来的变革所需的技能。我们讨论了培训不应仅关注技术方面，还应关注组织内部的文化变革。
- en: The process of forming a training strategy involves assessing current skill
    levels, designing a tailored curriculum, and establishing a support system to
    address challenges and maintain momentum. It also highlights the significance
    of fostering a culture of continuous learning and leadership involvement in driving
    the successful adoption of Power Platform. Overall, the article underlines the
    value of investing in comprehensive and effective training to maximize the benefits
    of Power Platform and facilitate successful digital transformation. In the next
    section, we will be exploring how to accelerate your Power Platform adoption journey
    by starting small and growing to scale.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 制定培训策略的过程包括评估当前技能水平、设计定制课程，并建立一个支持系统来应对挑战并保持动力。它还强调了培养持续学习文化和领导层参与推动Power Platform成功采用的重要性。总的来说，文章强调了投资全面有效的培训以最大化Power
    Platform的好处并促进成功数字化转型的重要性。在下一节中，我们将探讨如何通过从小规模开始并逐步扩大规模来加速您的Power Platform采用之旅。
- en: Accelerating the adoption journey
  id: totrans-179
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 加速采用之旅
- en: The journey toward full adoption and capability building is rarely straightforward.
    It necessitates a strategic approach that balances immediate needs with long-term
    objectives, and that fosters an environment conducive to continuous learning and
    innovation. It is important to understand that building capability does not just
    happen, it relies on strong, robust frameworks to be put in place and a cultural
    shift toward learning and growth.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 实现全面采用和能力建设的过程很少是直截了当的。它需要一种战略方法，在短期需求和长期目标之间取得平衡，并营造一个有利于持续学习和创新的氛围。重要的是要理解，能力建设并非自然而然发生，它依赖于建立强大、稳健的框架，以及向学习和成长的文化转变。
- en: Following the ecosystem enablement approach and ensuring and setting up the
    Center for Enablement with the right team is a great start and a step in the right
    direction toward ensuring that adoption grows across your organization.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 采用生态系统赋能方法，并确保组建正确的赋能团队，是良好的开端，也是确保采用在组织中增长的正确方向的一步。
- en: Start small
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从小处着手
- en: Starting small when building capacity to accelerate Power Platform adoption
    is not merely a tactical approach; it is a strategic necessity. This method embraces
    the principle of incremental progress, allowing organizations to implement changes
    at a manageable pace, thereby reducing resistance and enhancing the likelihood
    of success.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建加速Power Platform采用能力时从小处着手，不仅是一种战术方法，更是一种战略必要性。这种方法遵循渐进式进步的原则，允许组织以可管理的速度实施变革，从而减少阻力并提高成功的可能性。
- en: The initial phase involves identifying pilot projects that are well-suited to
    demonstrate the tangible benefits of Power Platform. These projects should be
    carefully selected based on their potential impact and the readiness of the teams
    involved. By starting with smaller, manageable projects, you can create a proof
    of concept that highlights the platform’s capabilities and value, providing a
    motivating example for the rest of the organization.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 初始阶段涉及识别适合展示Power Platform实际效益的试点项目。这些项目应根据其潜在影响和参与团队的准备情况仔细选择。通过从小型、可管理的项目开始，你可以创建一个概念验证，突出平台的功能和价值，为组织其他部分提供一个激励的例子。
- en: Getting hands-on with the platform and building smaller solutions is a fantastic
    way for people to learn as well as drive tangible outputs.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 通过平台的实际操作和构建较小的解决方案，是人们学习和产生实际成果的绝佳方式。
- en: As these pilot projects progress, it is critical to document lessons learned
    and best practices. This process of continuous evaluation and improvement ensures
    that subsequent initiatives can build on the successes and avoid the pitfalls
    of earlier efforts. This iterative method boosts the success of the adoption program
    and promotes ongoing improvement and learning.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 随着这些试点项目的进展，记录所学到的经验和最佳实践至关重要。这一持续评估和改进的过程确保后续的举措能够建立在成功的基础上，避免早期努力的陷阱。这种迭代方法提高了采用计划的成功率，并促进了持续改进和学习。
- en: Starting small allows for the development of internal champions who can advocate
    for the Power Platform and support their peers through the adoption journey. These
    champions, equipped with hands-on experience and a deep understanding of the platform,
    become invaluable resources for training and mentoring others in the organization.
    Their enthusiasm and expertise help to build momentum and drive wider adoption
    across departments.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 从小处着手可以培养出内部倡导者，他们能够为Power Platform发声，并在采用过程中支持他们的同事。这些倡导者凭借实践经验和对平台的深入理解，成为组织内部培训和指导他人的宝贵资源。他们的热情和专业知识有助于形成势头，推动跨部门的更广泛采用。
- en: As confidence in Power Platform grows and initial projects demonstrate success,
    organizations can gradually expand the scope of their adoption efforts. This may
    involve scaling the program to incorporate more complex projects and additional
    departments. Throughout this process, maintaining a focus on continuous learning
    and improvement is key, ensuring that the organization remains agile and responsive
    to new challenges and opportunities.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 随着对Power Platform的信心增强，以及初始项目展示出成功，组织可以逐步扩大采用努力的范畴。这可能包括扩大项目规模，纳入更复杂的项目和更多的部门。在整个过程中，持续学习和改进的焦点至关重要，确保组织保持敏捷并能够应对新的挑战和机遇。
- en: Starting small and building capacity incrementally provides a solid foundation
    for the successful adoption of Power Platform. By leveraging pilot projects, developing
    internal champions, establishing a **Center for Enablement** (**C4E**), and maintaining
    clear communication, organizations can create a sustainable path to digital transformation
    and long-term success. *Figure 6**.9* shows a summary of key aspects you can focus
    on to drive that capacity growth in your Power Platform team.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 从小做起，逐步建立能力为Power Platform的成功采用提供了一个坚实的基础。通过利用试点项目，培养内部倡导者，建立**赋能中心**（**C4E**），并保持清晰的沟通，组织可以创造一条可持续的数字化转型和长期成功的路径。*图6.9*展示了你可以关注的关键方面，以推动你的Power
    Platform团队中的能力增长。
- en: '![Figure 6.9: Key points to building capacity in your business](img/B21080_06_009.jpg)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![图6.9：在您的业务中建立能力的关键点](img/B21080_06_009.jpg)'
- en: 'Figure 6.9: Key points to building capacity in your business'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9：在您的业务中建立能力的关键点
- en: Understanding true adoption
  id: totrans-192
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解真正的采用
- en: Understanding true Power Platform adoption within an organization involves recognizing
    the importance of incremental capability growth. By starting with smaller projects
    and gradually increasing the complexity and scope of Power Platform initiatives,
    organizations can build a solid foundation for broader adoption. This also means
    that there is a focused approach to these smaller projects, and this makes it
    much easier to support people.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在组织中理解真正的Power Platform采用涉及认识到增量能力增长的重要性。通过从较小的项目开始，并逐渐增加Power Platform项目的复杂性和范围，组织可以建立一个广泛的采用的坚实基础。这也意味着对这些较小项目有一个专注的方法，这使得支持人们变得更加容易。
- en: True adoption is not just about making one app or automation, it’s about using
    the tools in Power Platform at scale to solve business problems.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的采用不仅仅是制作一个应用程序或自动化，而是使用Power Platform中的工具以规模解决业务问题。
- en: Capability growth plays a crucial role in this journey. It entails developing
    the necessary skills, knowledge, and resources to effectively utilize Power Platform.
    This includes investing in training programs, encouraging a culture of continuous
    learning, and providing ongoing support to employees. As individuals and teams
    become more proficient with the platform, they can tackle more sophisticated projects
    and drive innovation across the organization.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 能力增长在这个旅程中扮演着至关重要的角色。它包括开发必要的技能、知识和资源，以有效地利用Power Platform。这包括投资培训计划，鼓励持续学习的文化，并为员工提供持续的支持。随着个人和团队对平台更加熟练，他们可以处理更复杂的项目，并在整个组织中推动创新。
- en: Most of the time, the training is relatively driven by self-sufficient makers
    and users, then governed by the central Power Platform adoption and enablement
    team (or administration team). However, sometimes, the need for training is much
    higher and more formal, and in these cases, it’s important to potentially bring
    in vendors to conduct more defined training programs.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数时候，培训相对由自给自足的制作者和用户驱动，然后由中央Power Platform采用和赋能团队（或管理团队）管理。然而，有时对培训的需求要高得多，也更正式，在这些情况下，可能需要引入供应商来开展更明确的培训计划。
- en: Capability growth allows organizations to adapt to evolving business needs and
    stay ahead of the competition. By continuously enhancing their Power Platform
    capabilities, organizations can leverage new features and functionalities, streamline
    processes, and deliver greater value to customers. This iterative approach ensures
    that the organization remains agile and responsive to changing market dynamics.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 能力增长使组织能够适应不断变化的企业需求，并保持竞争优势。通过持续增强其Power Platform能力，组织可以利用新功能，简化流程，并为客户创造更大的价值。这种迭代方法确保组织保持敏捷并对市场动态的变化做出响应。
- en: Ultimately, understanding true Power Platform adoption is about recognizing
    the strategic importance of capability growth. By starting small, building capacity
    incrementally, and favoring a culture of continuous improvement, organizations
    can unlock the full potential of the Power Platform and achieve long-term success
    in their digital transformation journey.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，理解真正的Power Platform采用是认识到能力增长的战略重要性。通过从小处着手，逐步建立能力，并倾向于持续改进的文化，组织可以释放Power
    Platform的全部潜力，并在其数字化转型旅程中实现长期成功。
- en: Scaling your strategy
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩大你的策略
- en: Scaling a Power Platform adoption program as capability is built requires a
    strategic and phased approach. As organizations develop the necessary skills,
    knowledge, and resources, they can begin to undertake more ambitious projects
    and expand their Power Platform initiatives. Start by identifying and training
    internal champions who can advocate for the platform and provide support to their
    colleagues. This scale approach is all facilitated from within the **C4E** where
    the governance and the adoption program are successfully managed in a defined
    manner.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 随着能力的提升而扩展Power Platform采用计划需要战略性和分阶段的方法。随着组织发展必要的技能、知识和资源，它们可以开始承担更雄心勃勃的项目并扩展Power
    Platform的倡议。首先，识别并培训内部倡导者，他们可以为平台辩护并为同事提供支持。这种扩展方法完全由**C4E**内部促进，治理和采用计划以定义的方式成功管理。
- en: As confidence in Power Platform grows through successful pilot projects, gradually
    scale the program to encompass more complex initiatives and additional departments.
    Maintain clear and regular communication with all stakeholders to keep them informed
    and engaged, establishing an environment of continuous learning and improvement.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 随着对Power Platform的信心通过成功的试点项目增长，逐步扩大计划范围，涵盖更复杂的项目和更多部门。与所有利益相关者保持清晰和定期的沟通，让他们保持知情并参与其中，建立一个持续学习和改进的环境。
- en: This iterative approach not only builds capability but also ensures that the
    organization remains agile, responsive, and well-equipped to leverage the full
    potential of Power Platform.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 这种迭代方法不仅能够提升能力，还确保组织保持敏捷、响应迅速，并能够充分利用Power Platform的全面潜力。
- en: Potential pitfalls
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可能的陷阱
- en: Despite the vast opportunities presented by Power Platform, several common pitfalls
    can hinder the successful implementation of an adoption program. A significant
    challenge is underestimating the cultural shift required within the organization.
    Resistance to change is a natural human response, and without a concerted effort
    to uphold a culture of learning and growth, employees may be hesitant to embrace
    new tools and processes. Do not underestimate the need for well-thought-out change
    management.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Power Platform提供了巨大的机会，但一些常见的陷阱可能会阻碍采用计划的顺利实施。一个重大的挑战是低估组织内部所需的文化转变。对变化的抵制是人的自然反应，如果没有共同努力来维护学习和成长的文化，员工可能会对新工具和流程持保留态度。不要低估周到变革管理的必要性。
- en: Inadequate training and support can lead to a lack of proficiency and confidence
    in using the platform, resulting in suboptimal utilization of its features. It
    is crucial to invest in comprehensive training programs and provide continuous
    support to ensure that employees are well-equipped to leverage the platform effectively.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 不充分的培训和支援可能导致员工在使用平台时缺乏熟练度和信心，从而无法充分利用其功能。投资于全面的培训计划并提供持续的支持，确保员工能够有效地利用平台，这一点至关重要。
- en: Another common pitfall is the absence of a clear and strategic plan. Without
    a phased approach that starts with smaller projects and gradually scales up, organizations
    may find themselves overwhelmed by the complexity and scope of the initiatives.
    This can lead to project delays, budget overruns, and, ultimately, failure to
    achieve the desired outcomes.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个常见的陷阱是缺乏明确和战略性的计划。如果没有从小项目开始并逐步扩大的分阶段方法，组织可能会发现自己被倡议的复杂性和范围所淹没。这可能导致项目延误、预算超支，最终无法实现预期的成果。
- en: Insufficient governance and oversight can result in inconsistent practices and
    fragmented efforts across different departments. Establishing a C4E to provide
    governance and manage the adoption program in a structured manner is essential
    for maintaining coherence and alignment with organizational goals.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏治理和监督可能导致不同部门之间实践不一致和努力分散。建立一个C4E以提供治理并以结构化的方式管理采用计划，对于保持一致性和与组织目标保持一致至关重要。
- en: Failing to maintain regular communication with all stakeholders can lead to
    disengagement and a lack of buy-in. It is vital to keep everyone informed and
    involved throughout the process, cultivating an environment of continuous learning
    and improvement. In this section, we learn that building capability relies on
    strong frameworks and a cultural shift toward learning and growth. Starting small
    and building capacity incrementally is necessary, allowing for incremental progress
    and reducing resistance. This approach helps in developing internal champions
    and promoting a culture of continuous improvement and learning. Scaling a Power
    Platform adoption program involves a strategic and phased approach, identifying
    and training internal champions, and gradually expanding the program. Regular
    communication is essential for nurturing a culture of continuous learning and
    improvement.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 无法与所有利益相关者保持定期沟通可能导致参与度下降和缺乏承诺。在整个过程中保持每个人都被通知并参与其中，培养持续学习和改进的环境至关重要。在本节中，我们了解到建立能力依赖于强大的框架和文化向学习和成长转变的转变。从小规模开始并逐步构建能力是必要的，这允许实现渐进式进步并减少阻力。这种方法有助于培养内部倡导者并促进持续改进和学习的文化。扩展Power
    Platform采用计划涉及战略性和分阶段的方法，识别和培训内部倡导者，并逐步扩大计划。定期沟通对于培养持续学习和改进的文化至关重要。
- en: Summary
  id: totrans-209
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 总结
- en: In summary, building capability within an organization heavily relies on establishing
    robust frameworks and nurturing a culture of learning and growth. The process
    should begin on a small scale, incrementally building capacity to allow for steady
    progress and reduced resistance. This method aids in developing internal champions
    and establishing a culture of continuous improvement. A strategic and phased approach
    is essential for scaling a Power Platform adoption program, where identifying
    and training internal champions plays a crucial role. Regular and clear communication
    is vital to ensure all stakeholders are informed and engaged, fostering an environment
    of continuous learning and improvement.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，在组织内部建立能力高度依赖于建立稳健的框架和培养学习与成长的文化。这个过程应该从小规模开始，逐步构建能力，以实现稳步进步和减少阻力。这种方法有助于培养内部倡导者和建立持续改进的文化。采用战略性和分阶段的方法对于扩展Power
    Platform采用计划至关重要，其中识别和培训内部倡导者扮演着关键角色。定期和清晰的沟通对于确保所有利益相关者都得到通知并参与其中，营造持续学习和改进的环境至关重要。
- en: As organizations gain confidence in Power Platform through successful pilot
    projects, they should gradually scale the program to include more complex initiatives
    and additional departments. This incremental approach not only builds capability
    but also ensures that the organization remains agile, responsive, and well-equipped
    to leverage the full potential of the Power Platform. The C4E provides governance
    and manages the adoption program in a structured manner, facilitating this scaling
    approach from within.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 随着组织通过成功的试点项目对Power Platform建立信心，它们应逐步扩大计划，包括更复杂的倡议和更多部门。这种渐进式方法不仅构建了能力，还确保了组织保持敏捷、响应迅速，并能够充分利用Power
    Platform的潜力。C4E以结构化的方式提供治理并管理采用计划，从而促进这种扩展方法。
- en: Capability growth is critical for staying ahead of the competition and adapting
    to evolving business needs. Through continuous enhancement of Power Platform capabilities,
    organizations can leverage new features, streamline processes, and deliver greater
    value to customers. This iterative approach ensures agility and responsiveness
    to market changes. Investing in training programs, encouraging a culture of learning,
    and providing ongoing support are key to developing the necessary skills and resources
    for effective platform utilization.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 能力增长对于保持竞争优势和适应不断变化的企业需求至关重要。通过持续提升Power Platform的能力，组织可以利用新功能，简化流程，并为客户创造更大的价值。这种迭代方法确保了对市场变化的灵活性和响应性。投资于培训计划，鼓励学习文化，并提供持续支持，是发展有效平台利用所需技能和资源的关键。
- en: True Power Platform adoption is not merely about creating a single app or automation
    but involves using the tools at scale to solve business problems. By starting
    with smaller projects and gradually increasing their complexity and scope, organizations
    can build a solid foundation for broader adoption. This focused approach to incremental
    capability growth makes it easier to support and guide individuals and teams,
    leading to successful and widespread implementation of Power Platform within the
    organization.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的 Power Platform 采用不仅仅局限于创建单个应用或自动化，而是涉及大规模使用工具来解决业务问题。通过从较小的项目开始，并逐渐增加其复杂性和范围，组织可以建立一个坚实的广泛采用基础。这种专注于增量能力增长的方法使得支持和个人团队指导变得更加容易，从而在组织内成功和广泛地实施
    Power Platform。
- en: In the next chapter, we will be exploring in more detail how Power Platform
    can be positioned to various stakeholders and how aspects of change management
    are applied in a Power Platform adoption program.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将更详细地探讨如何将 Power Platform 定位给不同的利益相关者，以及如何在 Power Platform 采用计划中应用变革管理方面的各个方面。
