- en: '6'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '6'
- en: Designing AI Use Cases
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设计人工智能用例
- en: You’re now in a crucial phase of your AI journey. In the previous chapter, you
    explored how you can utilize your newly gained AI knowledge to map high-level
    AI opportunities within your organization. But getting from this high-level mapping
    to a profitable AI roadmap is still quite a way. That’s why this chapter will
    dive deeper into the elements it takes to design actionable use cases that not
    only tell you exactly what to do, but also pave the way for further prioritization
    and driving ROI along your AI implementation journey. The goal here is not just
    to identify potential applications of AI (as we did in the last chapter), but
    to deeply understand each use case’s anatomy and implications, and ensure that
    your AI initiatives are aligned with your business objectives and are primed for
    success. By the end of this chapter, you will have a detailed blueprint for evaluating
    potential AI projects, helping you make informed decisions about where to focus
    your efforts and how to achieve meaningful results.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在正处于人工智能旅程的关键阶段。在前一章中，您探讨了如何利用您新获得的人工智能知识来映射组织内部的高级人工智能机会。但从高级映射到有利可图的AI路线图还有很长的路要走。这就是为什么本章将深入探讨设计可操作用例的要素，这些用例不仅会明确告诉您该做什么，而且还会为在人工智能实施旅程中进一步优先排序和驱动回报率铺平道路。这里的目的是不仅仅识别人工智能的潜在应用（如我们在上一章中所做的那样），而是深入理解每个用例的结构和影响，并确保您的人工智能倡议与您的商业目标一致，并准备好取得成功。到本章结束时，您将拥有评估潜在人工智能项目的详细蓝图，帮助您就如何集中精力以及如何实现有意义的结果做出明智的决定。
- en: 'In this chapter, we will cover the following main topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将涵盖以下主要内容：
- en: Why design use cases?
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么需要设计用例？
- en: Use case fact sheets
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例事实表
- en: The Integration-Automation framework for AI solutions
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能解决方案的集成-自动化框架
- en: Dimensions of Use case fact sheets
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用例事实表的维度
- en: Why design use cases?
  id: totrans-8
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么需要设计用例？
- en: You might be eager to dive straight into AI implementation based on your high-level
    mapping. But be careful - the detailed analysis of each use case is essential
    to avoid costly mistakes.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能渴望直接根据您的高级映射开始人工智能实施。但请注意——对每个用例的详细分析对于避免代价高昂的错误是必不可少的。
- en: In fact, designing and conceptualizing your use cases is the bedrock of effective
    AI implementation. It serves as a safeguard against common pitfalls, such as overextending
    resources or misaligning AI projects with your strategic goals.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，设计和构思您的用例是有效实施人工智能的基础。它作为防止常见陷阱的保障，例如过度扩展资源或使人工智能项目与您的战略目标不一致。
- en: The first reason is that despite its impressive capabilities, AI is not a one-size-fits-all
    solution. Sometimes, even slight changes in the design of a use case require a
    completely different approach. For example, consider a manufacturing company that
    wants to build a support chatbot to make it easier for field service workers to
    troubleshoot problems. Your mind might say *chatbot*, but is that really what
    they want? In fact, most service workers probably don’t want to chat with a bot;
    they just want to ask a specific question (or upload a specific image) and get
    the answer they want right away, without going back and forth with the AI service
    too much. This requirement would move your use case away from the *AI chatbot*
    and more into the realm of *augmented search*, which has some very different implications
    for the technological solution dimension and also the user experience. Instead
    of a chat interface, the UI would be a simple search prompt. Considering your
    specific needs, challenges, and goals, along with a thorough analysis, will ensure
    that you clearly understand the scope, requirements, and potential hurdles before
    committing resources to a given use case.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个原因是，尽管人工智能具有令人印象深刻的性能，但它并不是万能的解决方案。有时，用例设计的微小变化可能需要完全不同的方法。例如，考虑一家希望构建支持聊天机器人以使现场服务人员更容易解决问题的制造公司。您的脑海中可能会浮现出“聊天机器人”，但这真的是他们想要的吗？事实上，大多数服务人员可能并不想与机器人聊天；他们只想提出一个具体问题（或上传一个特定图像）并立即得到他们想要的答案，而不需要与人工智能服务来回过多交流。这一需求将使您的用例远离“人工智能聊天机器人”并更多地进入“增强搜索”领域，这对技术解决方案维度和用户体验都有一些非常不同的含义。界面将不再是聊天界面，而是一个简单的搜索提示。考虑到您的具体需求、挑战和目标，以及彻底的分析，将确保在投入资源到特定用例之前，您清楚地了解范围、需求和潜在障碍。
- en: Besides getting clarity on what you actually want to build, a detailed use case
    concept will also allow you to gauge the impact and feasibility of the project
    better. Not all AI projects will deliver equal value. By analyzing use cases in
    detail, you can identify which ones align most closely with your business goals
    and have the potential to offer the greatest return on investment.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 除了明确你实际上想要构建的内容外，详细的使用案例概念还将帮助你更好地评估项目的影響力和可行性。并非所有AI项目都能带来相同的价值。通过详细分析用例，你可以确定哪些与你的业务目标最为契合，并具有提供最大投资回报的潜力。
- en: But let’s get a little more concrete here.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 但让我们在这里更具体一些。
- en: In our previous chapter, we identified various elements in the RFP process as
    a high-level AI opportunity. Now, we’ll break this down into specific use cases
    and learn how we can analyze each one thoroughly to understand its potential impact
    and feasibility.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前的章节中，我们将RFP过程中的各种元素识别为高级AI机会。现在，我们将这些分解为具体的用例，并学习如何彻底分析每个用例，以了解其潜在影响和可行性。
- en: Use case fact sheets
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用例事实表
- en: To structure your analysis, we’ll use a framework called the **Use case fact
    sheet**. This tool is designed to capture all the critical dimensions of a use
    case, enabling you to compare, prioritize, and ultimately decide which projects
    to pursue. The goal is to give you a single-page overview of what the use case
    is trying to achieve and what’s needed for it.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 为了结构化你的分析，我们将使用一个名为**用例事实表**的框架。这个工具旨在捕捉用例的所有关键维度，使你能够进行比较、优先排序，并最终决定哪些项目值得追求。目标是为你提供一个单页概览，说明用例试图实现什么，以及需要什么来实现它。
- en: 'The following figure shows an example Use case fact sheet:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了一个示例用例事实表：
- en: '![Figure 6.1: Use case fact sheet template](img/B31200_06_01.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图6.1：用例事实表模板](img/B31200_06_01.png)'
- en: 'Figure 6.1: Use case fact sheet template'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1：用例事实表模板
- en: 'You can find a template version of this fact sheet under this link ([https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch06/Use_Case_Fact_Sheet_Template.pptx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch06/Use_Case_Fact_Sheet_Template.pptx)).
    On a high level, here’s what a Use case fact sheet involves:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在以下链接中找到这份事实表的模板版本（[https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch06/Use_Case_Fact_Sheet_Template.pptx](https://github.com/PacktPublishing/The-Profitable-AI-Advantage/blob/main/ch06/Use_Case_Fact_Sheet_Template.pptx)）。在较高层次上，以下是使用案例事实表所涉及的内容：
- en: '**Problem dimension**: Summarizes the specific pain point or bottleneck that
    the AI use case aims to address.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**问题维度**：总结AI用例旨在解决的具体痛点或瓶颈。'
- en: '**Value dimension**: Articulates the intended $10K impact as well as the value
    lever (speed, cost, quality, and scale).'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**价值维度**：阐述预期的10K影响以及价值杠杆（速度、成本、质量和规模）。'
- en: '**Data dimension**: Lists the high-level data requirements for the use case.'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据维度**：列出用例的高层次数据需求。'
- en: '**Solution dimension****:** Describes the proposed AI solution, including the
    relevant AI modes.'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解决方案维度**：描述提出的AI解决方案，包括相关的AI模式。'
- en: '**Risk dimension****:** Identifies potential risks associated with the use
    case and proposes mitigation strategies.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**风险维度**：识别与用例相关的潜在风险，并提出缓解策略。'
- en: '**Stakeholders’ involvement dimension****:** Lists the key stakeholders involved
    and their roles in the project.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**利益相关者参与维度**：列出参与项目的关键利益相关者和他们在项目中的角色。'
- en: '**Type****:** Which use case type is this project according to its degree of
    automation and integration (we’ll learn more about this in a bit).'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**类型**：根据自动化和集成的程度，这个项目属于哪种用例类型（我们将在稍后了解更多）。'
- en: '**Resources****:** Outlines the resources required, including human, technological,
    and financial.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**资源**：概述所需的资源，包括人力、技术和财务资源。'
- en: '**Success factors****:** Defines the **key performance indicators** (**KPIs**)
    that will determine the success of the use case.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**成功因素**：定义将决定用例成功与否的关键绩效指标（KPIs）。'
- en: '**Expected feasibility****:** Evaluates the overall feasibility of the use
    case, considering complexity, cost, and alignment with strategic goals.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**预期可行性**：评估用例的整体可行性，考虑复杂性、成本和与战略目标的契合度。'
- en: By methodically filling out this fact sheet for each potential use case, you
    ensure that every aspect of the project is thoroughly considered, reducing the
    risk of unforeseen challenges and increasing the likelihood of successful implementation.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通过系统地填写每个潜在用例的事实表，你确保了项目的每个方面都得到了充分考虑，减少了意外挑战的风险，并增加了成功实施的可能性。
- en: Most of this chapter will explore the different dimensions of these Use case
    fact sheets, but before we come to that, it’s important to know what use cases
    you should consider in the first place.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的大部分内容将探讨这些用例事实表的不同维度，但在我们深入探讨之前，了解你首先应该考虑哪些用例是很重要的。
- en: Let’s briefly discuss two critical factors you need to consider before creating
    your Use case fact sheets.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建用例事实表之前，让我们简要讨论两个你需要考虑的关键因素。
- en: '**How many Use case fact sheets should you create?**'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你应该创建多少个用例事实表？**'
- en: The obvious answer here, of course, is, *it depends*. The size of your organization
    and the ambition of your AI roadmap really define what’s possible here. If you’re
    a mid-sized organization going with a divide-and-conquer approach for AI adoption
    ([*Chapter 3*](Chapter_03.xhtml#_idTextAnchor054)), it’s not uncommon to end up
    with a list of 100+ potential use cases, perhaps even in a single department.
    On the other hand, if you’re just starting out, you shouldn’t try to spend too
    much time thinking and planning use cases, but get to a position from which you
    can start moving quickly.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这里的明显答案是，*这取决于你*。你组织的规模和你人工智能路线图的雄心壮志实际上定义了这里可能实现的内容。如果你是一个中等规模的组织，采用分而治之的方法来采用人工智能（[*第3章*](Chapter_03.xhtml#_idTextAnchor054)），最终得到一个包含100多个潜在用例的列表，甚至可能在一个部门内，这并不罕见。另一方面，如果你是刚开始，你不应该花太多时间去思考和规划用例，而应该达到一个可以快速开始行动的位置。
- en: For most organizations that start somewhere at the beginning, let’s say identifying
    the first AI opportunities in a given process or product, I typically recommend
    looking for something like 8–10 use cases. Why this number? Because this gives
    you enough bandwidth to experiment and iterate over different projects, but at
    the same time, you’re not getting overwhelmed by *analysis paralysis*, leaving
    you with more confusion than when you started.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大多数从某个地方开始的组织，比如说在某个流程或产品中识别第一个AI机会，我通常建议寻找8-10个用例。为什么是这个数字？因为这给你足够的空间去实验和迭代不同的项目，同时，你也不会被*分析瘫痪*所淹没，这会让你比开始时更加困惑。
- en: From here, feel free to take more use cases in as you continue along your AI
    journey. But don’t stretch yourself too thin. Having a **backlog** of 10 AI use
    cases per process, department, or product is a solid start!
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里开始，在你继续人工智能之旅的过程中，你可以自由地添加更多的用例。但不要过度劳累。每个流程、部门或产品有10个AI用例的**待办事项**清单是一个坚实的开始！
- en: '**What kind of use cases should you consider?**'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**你应该考虑哪些类型的用例？**'
- en: When moving from the high-level idea of *AI can help me predict the likelihood
    of winning a proposal* to a more concrete and actionable form, people often **substitute**
    *complexity* with *automation* (usually when they can’t fully describe the solution
    yet)*.* For example, AI will *automatically* analyze incoming proposals and *automatically*
    recommend the right contact person. But the truth is, the more *automatic* use
    cases you find in your initial use case descriptions, the more likely it is that
    those use cases will never work. This is because, for most AI use cases, you need
    to tell the AI exactly what to do before it can actually do it for you at scale.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当从*AI可以帮助我预测赢得提案的可能性*这个高层次的想法转移到更具体、可操作的形式时，人们常常**用自动化代替复杂性**（通常在他们还不能完全描述解决方案时）.*例如，AI将*自动*分析收到的提案并*自动*推荐合适的联系人。但事实是，你在初始用例描述中找到的自动化用例越多，这些用例实际上永远不会工作的可能性就越大。这是因为，对于大多数AI用例，你需要在AI真正为你大规模执行之前，明确告诉AI它应该做什么。
- en: To emphasize this point, let’s look at two ways that use cases can grow in complexity
    and how to manage this complexity intentionally.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 为了强调这一点，让我们看看用例如何增长复杂度以及如何有意地管理这种复杂度。
- en: The Integration-Automation framework for AI solutions
  id: totrans-41
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能解决方案的集成-自动化框架
- en: 'The **Integration-Automation framework for AI** (**IA-AI framework**) is based
    on a simple principle: We classify AI solutions based on two criteria - how integrated
    and automated they are.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能解决方案的**集成-自动化框架**（**IA-AI框架**）基于一个简单的原则：我们根据两个标准对人工智能解决方案进行分类——它们集成和自动化的程度。
- en: '**Integration** refers to how well the AI solution blends or works in synergy
    with your existing system landscape or business workflows.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**集成**指的是人工智能解决方案与你的现有系统景观或业务工作流程融合或协同工作的程度。'
- en: '**Automation** refers to how much the AI solution can perform tasks with minimal
    human intervention.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**自动化**指的是人工智能解决方案在最小化人工干预的情况下执行任务的程度。'
- en: Think about this for a second. Most people would assume that integration drives
    automation, and vice versa. But this isn’t necessarily true. For instance, you
    can create a use case that includes some automation but is not fully integrated
    into your system environment.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 想想看。大多数人会认为集成推动自动化，反之亦然。但这并不一定正确。例如，你可以创建一个包含一些自动化但并未完全集成到你的系统环境中的用例。
- en: Following the IA-AI framework, you’ll find four high-level types of AI use cases
    – different ways an AI solution can be delivered. In practice, of course, the
    transitions between these can be fluid, but having a strong conceptual understanding
    of those four types will help you make more intentional, better-informed design
    decisions.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 IA-AI 框架，你会找到四种高级人工智能用例类型——人工智能解决方案可以交付的不同方式。在实践中，当然，这些之间的转换可以是流畅的，但深刻理解这四种类型将帮助你做出更有意图、更明智的设计决策。
- en: '*Figure 6.2* depicts these four types in the four quadrants of the IA-AI framework
    in the form of a matrix and some of the example tools that belong to each quadrant
    based on the level of integration and automation.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 6.2* 以矩阵的形式展示了 IA-AI 框架的四个象限中的这四种类型，以及根据集成和自动化程度属于每个象限的一些示例工具。'
- en: '![Figure 6.2: IA-AI matrix with some example tools](img/B31200_06_02.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.2：包含一些示例工具的 IA-AI 矩阵](img/B31200_06_02.png)'
- en: 'Figure 6.2: IA-AI matrix with some example tools'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.2：包含一些示例工具的 IA-AI 矩阵
- en: Let me show you how by walking through the different quadrants of the IA-AI
    matrix.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 让我通过遍历 IA-AI 矩阵的不同象限来展示如何做到这一点。
- en: 'Solution type 1: Assistants'
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案类型 1：助手
- en: The first type of use cases is what I call **assistants**.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 第一种用例类型是我所说的 **助手**。
- en: '![Figure 6.3: Quadrant 1 of the IA-AI framework, the AI assistants](img/B31200_06_03.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.3：IA-AI 框架的第一象限，人工智能助手](img/B31200_06_03.png)'
- en: 'Figure 6.3: Quadrant 1 of the IA-AI framework, the AI assistants'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.3：IA-AI 框架的第一象限，人工智能助手
- en: In these solutions, you typically work with an external AI application that
    requires you to handle inputs and outputs manually (such as copying/pasting text
    or uploading/downloading a file). The typical degree of integration is low, and
    so is the automation. ChatGPT is the classic example of this.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些解决方案中，你通常与一个需要你手动处理输入和输出的外部人工智能应用程序合作（例如复制/粘贴文本或上传/下载文件）。典型的集成程度较低，自动化程度也较低。ChatGPT
    是这一类型的典型例子。
- en: 'Make no mistake - these apps can be increasingly powerful. ChatGPT is probably
    the most capable external AI assistant you’ll likely encounter. Other examples
    include: Poe.com, Google’s Gemini App, and Microsoft’s AI-powered Bing search.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 不要误解——这些应用程序可以越来越强大。ChatGPT 可能是你可能会遇到的最强大的外部人工智能助手。其他例子包括：Poe.com、谷歌的 Gemini
    应用程序和微软的 AI 驱动的 Bing 搜索。
- en: Assistants are great for general-purpose, ad-hoc productivity tasks such as
    writing marketing copy, translating business texts, or just helping AI guide you
    through a process verbally.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 助手非常适合通用、临时的生产力任务，例如撰写营销文案、翻译商业文本，或者只是通过口头指导帮助你的人工智能。
- en: 'Solution type 2: Copilots'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案类型 2：副驾驶
- en: Similar to assistants, **copilots** require you to do the heavy lifting (i.e.,
    their degree of automation is low), but they are more tightly integrated into
    your system landscape or business workflow.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 与助手类似，**副驾驶**需要你承担繁重的工作（即它们的自动化程度较低），但它们更紧密地集成到你的系统景观或业务流程中。
- en: '![Figure 6.4: Quadrant 2 of the IA-AI framework, the copilots](img/B31200_06_04.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.4：IA-AI 框架的第二象限，副驾驶](img/B31200_06_04.png)'
- en: 'Figure 6.4: Quadrant 2 of the IA-AI framework, the copilots'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.4：IA-AI 框架的第二象限，副驾驶
- en: This is currently the hottest field in AI, and every software company you can
    think of is looking to include these **c****opilot** features in their product.
    Some examples are GitHub Copilot, Microsoft 365 Copilot, Gemini AI in Google Workspace,
    AI features in Slack, Notion, and so on.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这目前是人工智能领域最热门的领域，你可以想到的每家软件公司都在寻求将这 **c**opilot 功能纳入其产品。一些例子包括 GitHub Copilot、Microsoft
    365 Copilot、Google Workspace 中的 Gemini AI、Slack 中的 AI 功能、Notion 等。
- en: Copilots are great because they know what you’re doing at the moment. For instance,
    if you use Outlook Copilot to reply to an email, it will already know the previous
    conversation history from that email thread. No copy/paste necessary. It also
    eliminates the friction of signing up for a new app. However - and that’s the
    biggest difference compared to the next use case type - the AI suggestions cannot
    be implemented without your approval. So, you have the ability (and responsibility)
    to review and correct the AI outputs as needed. That’s why this use case type
    is so popular right now. It offers great value, even if the AI models aren’t 100%
    perfect (which they might never be).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 共同飞行员很棒，因为它们知道你此刻在做什么。例如，如果你使用 Outlook 共同飞行员来回复电子邮件，它将已经知道该电子邮件线程中的先前对话历史。无需复制/粘贴。它还消除了注册新应用的摩擦。然而——这是与下一个用例类型相比最大的区别——没有你的批准，AI
    建议 cannot be implemented。因此，你有能力（和责任）根据需要审查和纠正 AI 输出。这就是为什么这种用例类型现在如此受欢迎。即使 AI
    模型不是 100% 完美（它们可能永远都不会是），它也提供了巨大的价值。
- en: 'Solution type 3: Autopilots'
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案类型 3：自动驾驶仪
- en: '**Autopilots** show a high degree of automation, but a rather low degree of
    integration.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**自动驾驶仪**展示了高度自动化，但集成度相对较低。'
- en: '![Figure 6.5: Quadrant 3 of the IA-AI framework, the autopilots](img/B31200_06_05.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.5：IA-AI 框架的第三象限，自动驾驶仪](img/B31200_06_05.png)'
- en: 'Figure 6.5: Quadrant 3 of the IA-AI framework, the autopilots'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.5：IA-AI 框架的第三象限，自动驾驶仪
- en: '[PRE0]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'But before we discuss agents in more detail, let’s review some more examples
    of **autopilot** use cases, which can be found across many different domains.
    For instance, many companies use social media monitoring tools that automatically
    scan for negative sentiment and then alert a human moderator when a critical event
    occurs - without taking direct action inside the social platform itself. Another
    case is the **Task** feature in ChatGPT, where the AI can run a predefined prompt,
    such as conducting competitor research, on a regular schedule. While the system
    reliably executes the task, the results are usually just delivered back to the
    user rather than being connected to downstream workflows. Similarly, automated
    surveillance systems can analyze video streams in real time and trigger email
    alerts when specific objects or movements are detected, but they don’t automatically
    take the next steps, such as locking doors or dispatching security staff. Even
    in the physical world, robotic vacuum cleaners operate as autopilots: they can
    autonomously navigate a home and clean according to a schedule, but they are not
    integrated with broader smart-home systems that could, for example, adjust cleaning
    patterns based on household activity or coordinate with other devices.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们更详细地讨论智能体之前，让我们回顾一些更多关于**自动驾驶仪**用例的例子，这些例子可以在许多不同的领域找到。例如，许多公司使用社交媒体监控工具，这些工具会自动扫描负面情绪，并在发生关键事件时提醒人工管理员，而无需在社交平台上采取直接行动。另一个案例是
    ChatGPT 中的**任务**功能，其中 AI 可以定期运行预定义的提示，例如进行竞争对手研究。虽然系统可靠地执行任务，但结果通常只是简单地返回给用户，而不是与下游工作流程连接。同样，自动监控系统可以实时分析视频流，并在检测到特定对象或运动时触发电子邮件警报，但它们不会自动采取下一步行动，例如锁定门或派遣安保人员。即使在物理世界，机器人吸尘器也作为自动驾驶仪运行：它们可以自主导航家庭并根据日程安排清洁，但它们没有与更广泛的智能家居系统集成，例如，可以根据家庭活动调整清洁模式或与其他设备协调。
- en: 'Solution type 4: Agents'
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案类型 4：智能体
- en: Agents are the holy grail of AI projects. Everyone wants them.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体是人工智能项目的圣杯。每个人都想要它们。
- en: '![Figure 6.6: Quadrant 4 of the IA-AI framework, the agents](img/B31200_06_06.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.6：IA-AI 框架的第四象限，智能体](img/B31200_06_06.png)'
- en: 'Figure 6.6: Quadrant 4 of the IA-AI framework, the agents'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.6：IA-AI 框架的第四象限，智能体
- en: Imagine having a customer support chatbot that can answer common questions but
    also perform certain tasks, such as sending out a password reset email when a
    user can’t access their account, or even more.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下拥有一个能够回答常见问题并执行某些任务（例如，当用户无法访问其账户时发送密码重置电子邮件）的客户支持聊天机器人，甚至更多。
- en: For example, the payment provider Paddle ([https://www.paddle.com/billing/billing-support](https://www.paddle.com/billing/billing-support))
    offers an AI support chatbot that automatically handles and resolves typical customer
    queries related to their clients **Software-as-a-service (SaaS)** offerings, such
    as processing refunds without human supervision or cancelling subscriptions, cutting
    support costs, and speeding up ticket resolution to real-time. To be clear, these
    use cases do exist, but they are the hardest nuts to crack. Because at this stage,
    you’re not only dealing with the challenges inherent in AI (inaccuracies, hallucinations,
    performance issues, to name a few), but also good old-fashioned IT integration
    issues involving a bunch of legacy applications – and of course, security.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，支付服务提供商Paddle（[https://www.paddle.com/billing/billing-support](https://www.paddle.com/billing/billing-support)）提供了一种AI支持聊天机器人，它可以自动处理和解决与客户相关的典型客户查询，这些客户查询涉及他们的**软件即服务（SaaS）**产品，例如无需人工监督处理退款或取消订阅，降低支持成本，并加快票务解决速度至实时。明确地说，这些用例确实存在，但它们是最难解决的问题之一。因为在这一阶段，你不仅要应对AI固有的挑战（如不准确、幻觉、性能问题等），还要处理涉及大量遗留应用程序的传统的IT集成问题——当然，还有安全问题。
- en: 'Other examples of **agent** use cases show just how transformative this level
    of integration can be. Imagine an AI system that doesn’t just scan incoming contracts
    but actually extracts key terms, files them into your document management system,
    and kicks off the right approval workflow automatically. Or picture a shopping
    assistant on your website that doesn’t just suggest products but actively bundles
    personalized offers, applies discounts, and even completes the checkout process
    on behalf of the customer. In manufacturing, agents can go beyond flagging potential
    defects: they could halt a machine in real time, adjust parameters to prevent
    future errors, and notify engineers with a full diagnostic report - all without
    waiting for human intervention.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 其他**代理**用例的例子展示了这种集成水平可以带来多么大的变革。想象一下，一个AI系统不仅扫描传入的合同，而且实际上提取关键条款，将它们归档到你的文档管理系统，并自动启动正确的审批工作流程。或者想象一下，在你网站上的一款购物助手，它不仅建议产品，而且主动捆绑个性化优惠，应用折扣，甚至代表客户完成结账流程。在制造业中，代理可以超越标记潜在缺陷：它们可以在实时中停止机器，调整参数以防止未来的错误，并通过完整的诊断报告通知工程师——所有这些都不需要等待人工干预。
- en: While your goal as an organization should be to eventually get to this point,
    they are by no means the best way to get started. This is where companies new
    to AI get lost in years of overdue projects and millions in sunk costs. So, where
    should you start your AI journey?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然作为组织，你的目标应该是最终达到这个阶段，但这绝对不是开始的最佳方式。这就是为什么新接触AI的公司会陷入多年未完成的项目和数百万美元的沉没成本中。那么，你应该从哪里开始你的AI之旅呢？
- en: Working your way through the IA-AI framework
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 按照IA-AI框架逐步推进
- en: '*Figure 6.7* shows the two driving forces in the IA-AI framework.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*图6.7*展示了IA-AI框架中的两个驱动力。'
- en: '![Figure 6.7: Transitioning paths across the IA-AI matrix](img/B31200_06_07.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图6.7：IA-AI矩阵中的过渡路径](img/B31200_06_07.png)'
- en: 'Figure 6.7: Transitioning paths across the IA-AI matrix'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.7：IA-AI矩阵中的过渡路径
- en: In the IA-AI framework, you either proceed from **left to right** (low automation
    to high automation) and increase the complexity of use cases by automating them
    more, or you go from **bottom to top** (low integration to high integration),
    where the main challenge is to integrate what you have even further into your
    systems or workflows.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在IA-AI框架中，你可以从**左到右**（低自动化到高自动化）前进，通过更多自动化来增加用例的复杂性，或者从**底部到顶部**（低集成到高集成）前进，其中主要挑战是将你拥有的东西进一步集成到你的系统或工作流程中。
- en: It’s generally **not a good idea to do both at the same time** (i.e., moving
    diagonally and increasing the level of integration and automation at once - so
    don’t jump from Assistants to Agents.)
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，**同时进行这两件事并不是一个好主意**（即，同时进行对角移动和提升集成与自动化的水平——所以不要直接从助手跳到代理。）
- en: 'From my experience working with different AI projects across multiple domains,
    the best approach is to typically tackle use cases in the order I introduced them
    in this chapter:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我在多个领域与不同AI项目合作的经验，最佳的方法通常是按照我在本章中介绍它们的顺序来处理用例：
- en: '**Assistants** **→** **Copilots** **→** **Autopilots** **→** **Agents**'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**助手** **→** **共飞行员** **→** **自动驾驶仪** **→** **代理**'
- en: The key is really to start with so-called *augmented* use cases (assistants
    and copilots) first, because they always keep a human in the loop.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 关键真的是首先从所谓的*增强型*用例（助手和共飞行员）开始，因为它们总是将人类纳入循环中。
- en: '![Figure 6.8: Augmented AI use cases in the IA-AI framework](img/B31200_06_08.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图6.8：IA-AI框架中的增强型AI用例](img/B31200_06_08.png)'
- en: 'Figure 6.8: Augmented AI use cases in the IA-AI framework'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.8：IA-AI框架中的增强型AI用例
- en: 'This gives you two major advantages:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这给你带来了两个主要优势：
- en: You can control the AI output and ensure quality results
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以控制AI输出并确保结果质量
- en: You learn more and more about how AI works for your organizational use case
    over time
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你会随着时间的推移更多地了解AI如何适用于你的组织用例。
- en: These two factors are critical components for ensuring long-lasting AI success.
    They will increase your AI fluency over time. And the beauty of these augmented
    use cases is that they are typically the least complex, which makes them great
    candidates for fast prototyping and quick iterations.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个因素是确保长期AI成功的关键组成部分。它们将随着时间的推移提高你的AI流利度。这些增强型用例的美丽之处在于，它们通常是最简单的，这使得它们成为快速原型设计和快速迭代的绝佳候选者。
- en: Augmented AI use cases also let you apply the TRICUS principles of effective
    workflow augmentation we touched upon in [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor140).
    Building more advanced AI solutions will allow you to integrate them even more
    seamlessly into your business workflows step by step, instead of spending months
    (or years) trying to build the perfect integration.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 增强型AI用例还让你能够应用我们在[*第五章*](Chapter_05.xhtml#_idTextAnchor140)中提到的有效工作流程增强的TRICUS原则。构建更先进的AI解决方案将允许你逐步将它们更无缝地集成到你的业务流程中，而不是花费数月（或数年）时间试图构建完美的集成。
- en: This framework comes in handy while creating your Use case fact sheets. When
    filling in your Use case fact sheets, make sure to stick to the assistants and
    copilot use cases at the beginning. If you’re finding yourself in an autopilot
    or agent scenario, then do think twice. Is this really what you want, and are
    you capable of getting these use cases off the ground? What could be a good intermediary
    step?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这个框架在创建你的用例事实表时很有用。在填写你的用例事实表时，确保最初坚持助手和共飞行员用例。如果你发现自己处于自动驾驶或代理场景中，那么请三思。这真的是你想要的吗？你有能力让这些用例起飞吗？一个好的中间步骤可能是什么？
- en: With that in mind, let’s get to work on our Use case fact sheets.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，让我们开始着手我们的用例事实表。
- en: Dimensions of Use case fact sheets
  id: totrans-96
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用例事实表的维度
- en: As we discussed at the beginning of the chapter, there are ten dimensions that
    will help you create your Use case fact sheets. We’ll cover each of these dimensions
    step by step.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们在本章开头所讨论的，有十个维度将帮助你创建你的用例事实表。我们将逐步介绍这些维度。
- en: Problem dimension
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题维度
- en: 'The **problem dimension** is the cornerstone of your use case analysis. It
    defines the specific business problem that the AI solution aims to address. Since
    you’ve already thought about that dimension in the previous step, filling this
    in should come easily. Ask yourself:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题维度** 是你用例分析的基础。它定义了AI解决方案旨在解决的具体商业问题。由于你已经在之前的一步中考虑了该维度，因此填写这部分应该很容易。问问自己：'
- en: '**Which pain point or bottleneck are we solving?** Identify the specific issue
    that the AI solution is designed to address and whether it’s a current problem
    (pain point) or future issue (bottleneck) that could hinder growth.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们正在解决哪个痛点或瓶颈？** 确定AI解决方案旨在解决的具体问题，以及它是一个当前问题（痛点）还是未来问题（瓶颈），可能会阻碍增长。'
- en: '**How is it impacting our business?**Try to describe the effect of the problem.
    For example, not being able to serve more customers in first-level support could
    be a pain point. The impact would be that customer satisfaction drops and customer
    churn goes up. Other impacts might be increased cost or lower sales, for example.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这对我们的业务有何影响？** 尝试描述问题的影响。例如，无法在一级支持中服务更多客户可能是一个痛点。影响可能是客户满意度下降和客户流失增加。其他影响可能是成本增加或销售额下降，例如。'
- en: '**Is this problem validated?** How sure are you that this problem really exists?
    Have you experienced the problem yourself, or is there other evidence that this
    problem is real? Validation might come from data analysis, customer feedback,
    or benchmarking against industry standards.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这个问题是否得到验证？** 你有多确定这个问题确实存在？你自己经历过这个问题吗？还是有其他证据表明这个问题是真实的？验证可能来自数据分析、客户反馈或与行业标准进行基准测试。'
- en: '**How big is this problem?**Evaluate the impact on core business metrics -
    such as revenue, customer satisfaction, or operational efficiency - using your
    $10K threshold as a reference point. Ask yourself: does solving this consistently
    deliver value above the threshold, occasionally cross it, or exceed it by several
    multiples? Framing the impact this way helps you quickly classify problems into
    high, medium, or low priority categories.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这个问题有多大？** 使用您的$10K阈值作为参考点，评估对核心业务指标（如收入、客户满意度或运营效率）的影响。问问自己：解决这个问题是否始终能带来超过阈值的增值，偶尔超过它，还是超过它几个倍数？以这种方式界定影响有助于您快速将问题分类为高、中或低优先级类别。'
- en: Let’s return to the RFP example from the previous chapter and define the problem
    dimension (*Figure 6.9*).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到上一章中的RFP示例，并定义问题维度（*图6.9*）。
- en: '![Figure 6.9: The problem dimension of the RFP use case fact sheet](img/B31200_06_09.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图6.9：RFP用例事实表的问题维度](img/B31200_06_09.png)'
- en: 'Figure 6.9: The problem dimension of the RFP use case fact sheet'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9：RFP用例事实表的问题维度
- en: 'In the *Analyzing the RFP* process step, we identified that quickly digesting
    complex RFPs is difficult and leads to delays in decision-making. Our problem
    dimension could look as follows:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在*分析RFP*的过程步骤中，我们确定快速消化复杂的RFP很困难，这会导致决策延迟。我们的问题维度可能如下所示：
- en: Our proposal team now spends significantly more time on upfront RFP analysis,
    an increase of 20% this year alone. This extended effort slows the go/no-go decision,
    leaving less time to prepare the actual proposal. As a result, bids are either
    rushed and incomplete or abandoned altogether. The pattern is visible in past
    pursuits, where delayed decisions directly contributed to lost RFPs. With analysis
    consuming more time while success rates decline, the financial impact easily exceeds
    the $10K/year threshold and qualifies as a high-impact bottleneck.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的项目团队现在在前期RFP分析上花费的时间显著增加，仅今年就增加了20%。这种额外的努力减缓了是/否决策，留给准备实际提案的时间更少。因此，投标要么仓促且不完整，要么完全放弃。这种模式在过去的项目中很明显，延迟的决策直接导致了RFP的丢失。随着分析所需时间的增加而成功率下降，财务影响很容易超过每年$10K的阈值，并被视为一个高影响瓶颈。
- en: Value dimension
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 价值维度
- en: The **value dimension** explores the potential benefits of solving the problem
    (with the help of AI). This can be answered using the **value levers** from [*Chapter
    5*](Chapter_05.xhtml#_idTextAnchor140) – how will value be created? Will your
    process run faster (speed lever), cheaper (cost lever), with higher fidelity (quality
    lever), or will you be able to do more of something (scalability lever)? Sometimes,
    a solution pulls multiple of these levers, sometimes just one. However, if you
    can’t identify any of these, it’s a strong indicator that the value dimension
    isn’t clear. For example, if your problem is customer churn and you build a customer
    churn predictor, the predictor alone does not generate much value. Using this
    information to trigger better (more effective) retention campaigns, does indeed
    pull a quality lever.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**价值维度** 探索解决问题的潜在好处（借助AI）。这可以使用[*第五章*](Chapter_05.xhtml#_idTextAnchor140)中的**价值杠杆**来回答——价值将如何创造？您的流程将运行得更快（速度杠杆）、更便宜（成本杠杆）、更高保真度（质量杠杆），还是您将能够做更多的事情（可扩展性杠杆）？有时，一个解决方案拉动多个这些杠杆，有时只是拉动一个。然而，如果您无法识别这些中的任何一个，那么这是一个强烈的迹象，表明价值维度并不清晰。例如，如果您的问题是客户流失，并且您构建了一个客户流失预测器，那么预测器本身并不会产生太多价值。使用这些信息来触发更好的（更有效的）保留活动，确实拉动了质量杠杆。'
- en: 'When analyzing the value dimension, consider the following:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在分析价值维度时，考虑以下因素：
- en: '**Who benefits from this solution?** Identify the stakeholders who will directly
    or indirectly benefit from the AI solution, whether they are customers, employees,
    or specific business units.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**谁将从这个解决方案中受益？** 识别将直接或间接从AI解决方案中受益的利益相关者，无论他们是客户、员工还是特定的业务单元。'
- en: '**How is this value realized?** This applies especially to analytics solutions.
    How are better insights or predictions realized into business value? Who would
    make better decisions, and what must happen for this to take place?'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这个价值是如何实现的？** 这尤其适用于分析解决方案。更好的洞察力或预测是如何转化为商业价值的？谁将做出更好的决策，为了实现这一点必须发生什么？'
- en: '**How does this value align with our business objectives?** Ensure that the
    value created supports your broader strategic goals. For example, if your business
    isn’t looking for further client expansion, a use case that drives customer growth
    isn’t that attractive.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这些价值如何与我们的业务目标一致？**确保创造的价值支持你的更广泛战略目标。例如，如果你的业务不寻求进一步扩大客户群，那么推动客户增长的用例可能并不那么吸引人。'
- en: 'In the RFP analysis example, an AI-powered RFP chatbot (let’s call it **RFP
    Chatbot Analyzer**) could bring several advantages. Here is the value dimension
    factsheet for this use case:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在RFP分析示例中，一个AI驱动的RFP聊天机器人（让我们称它为**RFP聊天机器人分析器**）可以带来几个优势。以下是此用例的价值维度事实表：
- en: '![Figure 6.10: Example of the value dimension for the RFP use case](img/B31200_06_10.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图6.10：RFP用例的价值维度示例](img/B31200_06_10.png)'
- en: 'Figure 6.10: Example of the value dimension for the RFP use case'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.10：RFP用例的价值维度示例
- en: 'By accelerating the time it takes to analyze RFPs, the sales and proposal teams
    can make faster go/no-go decisions, reducing bottlenecks and ensuring more time
    is available for crafting strong proposals. The direct beneficiaries are the teams
    themselves, who not only gain efficiency but also improve their chances of winning
    by submitting higher-quality, timely responses. The real value is realized in
    throughput: instead of spending days on analysis, teams can process more proposals
    with the same resources, effectively scaling their capacity without additional
    headcount. Just as important, this improvement is strategically aligned with the
    broader business objective of increasing bid success rates and capturing more
    client deals, thus making the impact both tangible and highly relevant.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 通过加快分析RFPs所需的时间，销售和提案团队可以更快地做出是/否的决定，减少瓶颈，并确保有更多时间来制定强有力的提案。直接受益者是团队本身，他们不仅提高了效率，而且通过提交更高质量、及时的回应，提高了赢得合同的机会。真正的价值在于吞吐量：而不是花费数天进行分析，团队可以用同样的资源处理更多的提案，从而有效地扩大其容量而不需要增加人员。同样重要的是，这一改进与更广泛的企业目标战略一致，即提高投标成功率并捕获更多客户交易，因此其影响既具体又高度相关。
- en: Data dimension
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据维度
- en: Analyzing the **data dimension** is often the toughest of all. Why? Because
    very often, you don’t really know much about your data. And even if you do, there’s
    always some uncertainty involved as to how your data might look in the future.
    So instead of only describing which data you have, you should also formulate which
    data your use case needs. Some AI systems have extremely heavy data requirements,
    especially if you want to train your own models. For others, data requirements
    are comparably low because you can leverage pretrained off-the-shelf models.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 分析**数据维度**通常是所有任务中最具挑战性的。为什么？因为通常你对你的数据了解不多。即使你知道，关于你的数据未来可能的样子，总会有一些不确定性。因此，除了描述你有哪些数据外，你还应该制定出你的用例需要哪些数据。一些AI系统对数据需求非常庞大，尤其是如果你想训练自己的模型。对于其他人来说，数据需求相对较低，因为你可以利用预训练的现成模型。
- en: 'When analyzing the data dimension, consider the following:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在分析数据维度时，请考虑以下因素：
- en: '**What data should we consider for this?**Identify the types and sources of
    data required for the AI solution. This could include structured data, such as
    transaction records, or unstructured data, such as customer feedback. Keep a separate
    list of data requirements for more extensive projects.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们应该考虑哪些数据？**确定AI解决方案所需的数据类型和来源。这可能包括结构化数据，如交易记录，或非结构化数据，如客户反馈。对于更广泛的项目，请保留一个单独的数据需求清单。'
- en: '**Do we have access to all the necessary data?** Assess whether the organization
    currently has access to the required data. If yes, who is responsible for these
    data assets? If not, determine how this data can be obtained or generated.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们是否有权访问所有必要的数据？**评估组织目前是否可以访问所需数据。如果是，谁负责这些数据资产？如果不是，确定如何获取或生成这些数据。'
- en: '**What is the quality of this data?**Evaluate the quality of the available
    data, considering its accuracy, completeness, and relevance to the problem at
    hand.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这些数据的质量如何？**评估现有数据的准确性、完整性和与当前问题的相关性。'
- en: 'In the RFP analysis example, the data dimension might look as shown in *Figure
    6.11*:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在RFP分析示例中，数据维度可能看起来如图*图6.11*所示：
- en: '![Figure 6.11: Example of the data dimension for the RFP use case](img/B31200_06_11.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图6.11：RFP用例的数据维度示例](img/B31200_06_11.png)'
- en: 'Figure 6.11: Example of the data dimension for the RFP use case'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.11：RFP用例的数据维度示例
- en: The data requirements for improving RFP analysis are relatively clear. At the
    core, the solution depends on access to historical RFP documents, past proposals,
    and the corresponding win/loss outcomes that provide ground truth for what worked
    and what didn’t. Client feedback, where available, adds an additional layer of
    insight by highlighting gaps or strengths in past submissions. Much of this data
    could already be available through internal repositories such as the CRM and SharePoint,
    where proposals and client records are systematically stored. The overall quality
    might therefore be quite strong if recent records are well maintained, while some
    older RFPs may require preprocessing or normalization before they can be reliably
    used. By combining these data sources, the organization would have a solid starting
    point for developing this use case.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 提高RFP分析的数据需求相对明确。核心上，该解决方案依赖于访问历史RFP文件、过去的提案以及相应的胜负结果，这些结果为哪些有效、哪些无效提供了事实依据。如果可用，客户反馈通过突出过去提交中的差距或优势，增加了一个额外的洞察层面。大部分这些数据可能已经通过内部存储库（如CRM和SharePoint）可用，其中提案和客户记录是有系统性地存储的。因此，如果最近记录维护良好，整体质量可能相当高，而一些较旧的RFP可能在使用前需要预处理或归一化。通过结合这些数据源，组织将有一个坚实的起点来开发这个用例。
- en: Solution dimension
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案维度
- en: 'The **solution dimension** describes the proposed AI solution in detail, including
    its components, whether the technology is well-known or new, and whether your
    organization is ready to implement it. Here are some key points to consider:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**解决方案维度**详细描述了所提出的AI解决方案，包括其组成部分、技术是否为众所周知或新颖，以及您的组织是否准备好实施它。以下是一些需要考虑的关键点：'
- en: '**How does the solution work?** Describe in simple, non-technical language
    what the solution is doing and how it is going to work.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解决方案是如何工作的？**用简单、非技术性的语言描述解决方案正在做什么以及它将如何工作。'
- en: 'Tip: Use the action verbs from the AI modes to describe on a high level how
    the AI solution works.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：使用AI模式中的动作动词从高层次描述AI解决方案的工作方式。
- en: '**What does the proposed solution include?** Describe the high-level components
    of the AI solution, including any software, hardware, or integration with existing
    systems. If these components aren’t clear yet, mention that the software needs
    to be evaluated.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**所提出的解决方案包含什么？**描述AI解决方案的高层次组成部分，包括任何软件、硬件或与现有系统的集成。如果这些组件还不明确，请说明软件需要评估。'
- en: '**Is the technology well-known or new?** Assess whether the AI technology is
    established and proven or whether it is cutting-edge and potentially more risky.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这项技术是众所周知的还是新的？**评估AI技术是否已经确立并得到验证，或者是否是前沿的且可能更具风险。'
- en: '**Do we have this technology?** Determine whether your organization already
    possesses the necessary technology or whether new investments will be required.
    Is this a commodity AI service or not?'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们是否有这项技术？**确定您的组织是否已经拥有必要的这项技术，或者是否需要新的投资。这是否是一个商品AI服务？'
- en: 'For the AI-powered RFP analysis solution, the solution dimension might be described
    as follows:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 对于AI驱动的RFP分析解决方案，解决方案维度可能描述如下：
- en: '![Figure 6.12: Example of the solution dimension for the RFP use case](img/B31200_06_12.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图6.12：RFP用例的解决方案维度示例](img/B31200_06_12.png)'
- en: 'Figure 6.12: Example of the solution dimension for the RFP use case'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.12：RFP用例的解决方案维度示例
- en: The AI would take on the task of analyzing new RFP documents by reading and
    understanding proposal requirements, then applying memory and reasoning skills
    to surface insights from past proposals and outcomes. On top of this, the system
    would use communication skills to summarize key points and answer clarifying questions,
    enabling proposal teams to make faster and more confident go/no-go decisions.
    The underlying technology is based on generative AI (GenAI) and **retrieval-augmented
    generation** (**RAG**), which, while still relatively new, have already demonstrated
    strong performance in document analysis and question-answering tasks across other
    domains. At present, the organization does not operate its own RAG stack, but
    given the wide availability of vendor offerings and commodity AI services, adoption
    would not require building the capability entirely in-house.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: AI 将承担分析新 RFP 文档的任务，通过阅读和理解提案要求，然后应用记忆和推理技能从过去的提案和结果中提取见解。在此基础上，系统将使用沟通技巧总结关键点并回答澄清问题，使提案团队能够更快、更有信心地做出是/否的决定。底层技术基于生成式
    AI (GenAI) 和 **检索增强生成** (**RAG**)，尽管这些技术相对较新，但已经在其他领域的文档分析和问答任务中展示了强大的性能。目前，该组织没有运营自己的
    RAG 堆栈，但鉴于供应商产品和服务以及商品 AI 服务的广泛可用性，采用不需要完全在内部构建能力。
- en: Type dimension
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 类型维度
- en: 'Using the **type dimension**, you can classify whether your use case falls
    into the assistants, copilots, autopilots, or agents category from the IA-AI framework
    we discussed in the previous section. To define the use case type, look at the
    required **minimal** degree of automation and integration for this use case to
    cross the $10K threshold:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 **类型维度**，您可以根据我们在上一节中讨论的 IA-AI 框架将您的用例分类为助手、协同驾驶者、自动驾驶仪或代理类别。为了定义用例类型，查看此用例所需的
    **最小** 自动化和集成程度，以跨越 $10K 阈值：
- en: '**Degree of integration****:** How is this use case integrated into your system
    landscape? Does it require deep integration at all?'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成程度**：此用例如何集成到您的系统景观中？它是否需要深度集成？'
- en: '**Degree of automation****:** How is human involvement necessary in this use
    case? Does the use case run if there’s no human involved?'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化程度**：在此用例中，人类参与是必要的吗？如果没有人类参与，用例会运行吗？'
- en: '**Type****:** How would you classify this use case accordingly?'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**类型**：您将如何根据此用例进行分类？'
- en: 'Our AI-Powered RFP Chatbot Analyzer could show the following characteristics:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的 AI 驱动的 RFP 聊天机器人分析器可以展示以下特征：
- en: '![Figure 6.13: Example of the type dimension of the RFP use case](img/B31200_06_13.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.13：RFP 用例的类型维度示例](img/B31200_06_13.png)'
- en: 'Figure 6.13: Example of the type dimension of the RFP use case'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.13：RFP 用例的类型维度示例
- en: Integration-wise, the use case would at least need access to existing CRM data
    as well as historic proposals and new incoming proposal data, such as data access
    via SharePoint. Apart from this, the automation needs are rather low since the
    process would be triggered manually when someone needs ad-hoc insights or answers
    from a set of proposal documents. Without human intervention, no value would be
    created. This could make this use case work well as a copilot type. For example,
    it delivered through a custom chatbot inside SharePoint or Microsoft Teams or
    basically, any application that proposal teams already interact with every day
    to keep the workflow augmentation aligned to **TRICUS** principles.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在集成方面，该用例至少需要访问现有的 CRM 数据以及历史提案和新收到的提案数据，例如通过 SharePoint 访问数据。除此之外，自动化需求相对较低，因为当有人需要从一系列提案文档中获得即席见解或答案时，流程将手动触发。没有人为干预，就不会创造价值。这可能会使此用例作为一个协同驾驶者的类型工作得很好。例如，它可以通过
    SharePoint 或 Microsoft Teams 内的定制聊天机器人提供，或者基本上，任何提案团队每天已经与之互动的应用程序，以保持工作流程增强与
    **TRICUS** 原则的一致性。
- en: Risk dimension
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 风险维度
- en: 'The **risk dimension** looks at potential risks associated with the AI use
    case and outlines strategies for mitigating them. Understanding the risks involves
    both reasoning about doing and not doing the AI solutions, as both could be risky:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '**风险维度**考察与 AI 用例相关的潜在风险，并概述缓解策略。理解风险涉及对执行和不执行 AI 解决方案进行推理，因为两者都可能具有风险：'
- en: '**What is the risk of doing this?** Identify the risks associated with implementing
    the AI solution, such as technical challenges, data privacy concerns, potential
    disruptions to existing processes, regulatory compliance (e.g., GDPR, EU AI act,
    etc.), change management, or internal resistance.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这样做有哪些风险？** 识别实施人工智能解决方案相关的风险，例如技术挑战、数据隐私问题、可能对现有流程的干扰、合规性（例如，GDPR、欧盟人工智能法案等）、变革管理或内部阻力。'
- en: '**What is the risk of not doing this?** Consider the risks of not implementing
    the solution, such as missed opportunities, competitive disadvantage, or continued
    inefficiencies. For example, if all your competitors were to write their RFPs
    with the help of AI and you were the only one sticking to conventional methods,
    how would this impact your business?'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不这样做有哪些风险？** 考虑不实施解决方案的风险，例如错失机会、竞争劣势或持续的低效率。例如，如果所有竞争对手都使用人工智能来编写他们的RFP，而你却坚持使用传统方法，这将对你的业务产生怎样的影响？'
- en: '**How can we mitigate these risks?** What strategies would you apply to manage
    the identified risks? Are risks manageable at all?'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们如何减轻这些风险？** 你将应用哪些策略来管理已识别的风险？这些风险是否可以管理？'
- en: 'Here is the risk dimension Use case fact sheet for our RFP example:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是针对我们RFP示例的风险维度用例事实表：
- en: '![Figure 6.14: Example of the risk dimension for the RFP use case](img/B31200_06_14.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图6.14：RFP用例的风险维度示例](img/B31200_06_14.png)'
- en: 'Figure 6.14: Example of the risk dimension for the RFP use case'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.14：RFP用例的风险维度示例
- en: In the context of the AI solution for RFP analysis, the key risks of implementing
    an AI-driven RFP analysis tool are inaccuracies in interpreting requirements and
    resistance from users who may be hesitant to trust automated insights. The bigger
    risk of not implementing lies in falling behind competitors who adopt such tools
    and continue to outperform in speed and win rates. These risks can be mitigated
    through careful data sampling to ensure accuracy and by starting with a pilot
    group to build user trust and validate feasibility before scaling.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在RFP分析人工智能解决方案的背景下，实施人工智能驱动的RFP分析工具的关键风险在于对需求解释的不准确性和可能对自动化洞察持怀疑态度的用户产生的阻力。不实施的最大风险在于落后于采用此类工具的竞争对手，并继续在速度和胜率上表现优异。这些风险可以通过仔细的数据抽样来降低准确性，并通过从试点组开始建立用户信任和验证可行性，然后在扩展之前进行验证来减轻。
- en: Stakeholder involvement dimension
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利益相关者参与维度
- en: Many AI projects die, not because the technology doesn’t work, but because people
    don’t want the solution to work and build internal resistance. Imagine implementing
    a customer support chatbot system with the goal of replacing customer support
    staff, and at the same time, asking the same people to rate the accuracy of that
    chatbot. The metrics probably won’t look good, because who wants to implement
    technology that takes away their job? What might sound trivial in this simple
    scenario is actually very hard to detect in large-scale use cases. Often, there
    are many different perspectives involved, each with its unique interests. While
    it’s not always possible to cater to all, you should at least get an understanding
    of who’s involved and what their role is on this project, with regard to their
    contributions to the project’s success.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人工智能项目失败，并不是因为技术本身不工作，而是因为人们不希望解决方案有效，并产生内部阻力。想象一下，实施一个旨在取代客户支持人员的客户支持聊天机器人系统，同时要求同一批人评估该聊天机器人的准确性。这些指标可能看起来并不理想，因为谁会愿意实施夺走他们工作的技术呢？在这个简单的场景中看似微不足道的事情，实际上在大规模应用案例中很难察觉。通常，涉及许多不同的观点，每个观点都有其独特的利益。虽然不可能总是满足所有人的需求，但你至少应该了解谁参与了该项目，以及他们在项目中的角色是什么，特别是他们为项目成功做出的贡献。
- en: 'Start with these questions:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 从以下问题开始：
- en: '**Who are the key stakeholders?** Identify the individuals or groups who have
    a vested interest in the AI project, such as business unit leaders, IT teams,
    and end-users. Consider both internal and external stakeholders, depending on
    the use case.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**谁是关键的利益相关者？** 识别对人工智能项目有既得利益的个人或团体，例如业务部门领导、IT团队和最终用户。根据用例考虑内部和外部利益相关者。'
- en: '**What are their roles?** Define the specific roles and responsibilities of
    each stakeholder in the project.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**他们的角色是什么？** 定义每个利益相关者在项目中的具体角色和责任。'
- en: '**How will they be involved?** Outline how each stakeholder will be involved
    in the project, including their level of influence and decision-making authority,
    for example, using structured tools such as a Responsible, Accountable, Consulted,
    Informed RACI matrix ([https://www.cio.com/article/287088/project-management-how-to-designa-successful-raci-project-plan.html](https://www.cio.com/article/287088/project-management-how-to-designa-successful-raci-project-plan.html)).'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**他们将如何参与？** 概述每个利益相关者如何参与项目，包括他们的影响力水平和决策权，例如，使用结构化工具，如责任、问责、咨询、知情（RACI）矩阵（[https://www.cio.com/article/287088/project-management-how-to-designa-successful-raci-project-plan.html](https://www.cio.com/article/287088/project-management-how-to-designa-successful-raci-project-plan.html)）。'
- en: The Use case fact sheet for this dimension may look as shown in *Figure 6.15*.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这个维度的用例事实表可能看起来像*图6.15*所示。
- en: '![Figure 6.15: Example of the stakeholder dimension for the RFP use case](img/B31200_06_15.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![图6.15：RFP用例的利益相关者维度示例](img/B31200_06_15.png)'
- en: 'Figure 6.15: Example of the stakeholder dimension for the RFP use case'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.15：RFP用例的利益相关者维度示例
- en: For the AI RFP solution, several stakeholder groups play a critical role. Sales
    and proposal team leads are the primary users; they define requirements, validate
    outputs, and provide feedback during testing. The IT department ensures smooth
    technical implementation and integration into existing workflows, while the **AI
    Center of Excellence** (**AICoE**) oversees the deployment of models and aligns
    the use case with broader AI strategy. Legal and compliance teams safeguard data
    privacy and regulatory adherence, given the sensitivity of client information
    contained in RFPs. These groups will need to be engaged through structured involvement
    - workshops to capture requirements, testing phases to validate functionality,
    and review meetings to resolve concerns. Yet involvement alone is not enough.
    To secure real buy-in, stakeholders must see the solution as an enabler, not a
    threat. For example, proposal teams should experience firsthand how the tool saves
    them time and improves win rates, rather than fearing replacement. Transparent
    communication of project goals, early inclusion of feedback loops, and visible
    quick wins are essential strategies to ensure stakeholders are not only consulted
    but also fully onboard with the adoption.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能RFP解决方案，几个利益相关者群体发挥着关键作用。销售和提案团队负责人是主要用户；他们定义需求、验证输出并在测试期间提供反馈。IT部门确保技术实施和现有工作流程的集成顺利进行，而**卓越人工智能中心（AICoE**）则负责模型的部署并确保用例与更广泛的AI战略保持一致。法律和合规团队保护数据隐私和遵守法规，鉴于RFP中包含的客户信息的敏感性。这些群体需要通过结构化的参与来介入——通过研讨会来捕捉需求、测试阶段来验证功能，以及审查会议来解决担忧。然而，仅仅参与是不够的。为了确保真正的承诺，利益相关者必须将解决方案视为一种促进因素，而不是一种威胁。例如，提案团队应该亲身体验工具如何节省他们的时间并提高胜率，而不是担心被取代。透明地沟通项目目标、尽早纳入反馈循环以及明显的快速胜利是确保利益相关者不仅被咨询，而且完全支持采用的关键策略。
- en: Resources dimension
  id: totrans-168
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 资源维度
- en: The **resources dimension** helps you get a sense of what investments you need
    to plan for to get this use case off the ground. This is not so much about creating
    a detailed business plan, but rather getting an idea of what the main resource
    drivers of this use case will be, such as internal labor hours, external contractors,
    software licenses, and so on. Since this is often difficult to estimate in advance,
    it’s a good idea to consult either internal or external AI experts.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '**资源维度** 帮助你了解需要计划哪些投资才能使这个用例得以实施。这并不是要创建一个详细的企业计划，而是要了解这个用例的主要资源驱动因素将是什么，例如内部劳动时间、外部承包商、软件许可等。由于这通常很难提前估计，因此咨询内部或外部人工智能专家是个好主意。'
- en: 'When analyzing the resources dimension, consider the following:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在分析资源维度时，请考虑以下问题：
- en: '**What human resources are needed?** Identify the skills and expertise required
    to implement the AI solution, such as data scientists, AI specialists, and project
    managers. Which of these do you have? Which do you need to get from the market?'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**需要哪些人力资源？** 确定实施人工智能解决方案所需的技能和专业知识，例如数据科学家、人工智能专家和项目经理。你有哪些？你需要从市场上获得哪些？'
- en: '**What technology resources are needed?**Determine the technological infrastructure
    required, such as hardware, software, and integration capabilities.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**需要哪些技术资源？** 确定所需的技术基础设施，例如硬件、软件和集成能力。'
- en: '**What financial resources are needed?**Estimate the budget required for the
    project, including costs for technology, personnel, and ongoing maintenance.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**需要哪些财务资源？**估算项目所需的预算，包括技术、人员和持续维护的成本。'
- en: 'For the AI RFP analysis solution, the resources dimension might include the
    following resources:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能 RFP 分析解决方案，资源维度可能包括以下资源：
- en: '![Figure 6.16: Example of the resources dimension for the RFP use case](img/B31200_06_16.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.16：RFP 用例资源维度的示例](img/B31200_06_16.png)'
- en: 'Figure 6.16: Example of the resources dimension for the RFP use case'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.16：RFP 用例资源维度的示例
- en: The RFP analysis solution will require cross-functional resources, including
    people from AI, IT, and other departments, as well as someone from the affected
    proposal team to guide and test the system. Technology needs to center on third-party
    AI software and integration with CRM and SharePoint. Financially, the project
    must not cost more than $10K in upfront costs and $10K annually to be profitable,
    given the defined $10K per year threshold, not factoring in internal labor hours
    to support ongoing collaboration. To keep the use case viable, resources must
    either be very lean and cost-effective, or the value threshold must be corrected
    to a more ambitious target, such as $10K per quarter impact, to justify higher
    running costs.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: RFP 分析解决方案将需要跨职能资源，包括来自人工智能、IT 和其他部门的员工，以及来自受影响提案团队的某个人来指导和测试系统。技术需要以第三方人工智能软件为中心，并与
    CRM 和 SharePoint 集成。从财务角度来看，项目的前期成本不得超过 10K 美元，年度成本不得超过 10K 美元，以实现盈利，考虑到每年 10K
    美元的定义阈值，不考虑支持持续协作的内部劳动时间。为了保持用例的可行性，资源必须非常精简且具有成本效益，或者价值阈值必须调整到一个更雄心勃勃的目标，例如每季度
    10K 美元的影响，以证明更高的运营成本是合理的。
- en: Success factors dimension
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功因素维度
- en: 'The **success factors dimension** defines the KPIs that will determine the
    success of the AI use case. At the end of the day, you need to have clear acceptance
    criteria to determine whether or not your use case was successful. A lot of use
    cases die because you can never tell if they actually met their goals as those
    goals never being defined. So it’s a good idea to be clear about them up front.
    Ask yourself:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '**成功因素维度**定义了将决定人工智能用例成功的 KPIs。最终，你需要有明确的验收标准来确定你的用例是否成功。许多用例失败，因为你永远无法确定它们是否真正实现了目标，因为那些目标从未被定义。因此，一开始就明确它们是个好主意。问问自己：'
- en: '**What are the KPIs?**Identify the specific metrics that will be used to measure
    the success of the AI project, such as customer satisfaction scores, response
    times, or cost savings.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**KPIs 是什么？**确定将用于衡量人工智能项目成功的具体指标，例如客户满意度评分、响应时间或成本节约。'
- en: 'Note: These KPIs can be derived using both quantitative (direct measurement)
    and qualitative methods (surveys, observations, etc.).'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：这些关键绩效指标（KPIs）可以通过定量（直接测量）和定性方法（调查、观察等）得出。
- en: '**How will success be measured?** Determine how these KPIs will be measured,
    including the data sources and tools that will be used to track them.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如何衡量成功？**确定如何衡量这些 KPIs，包括用于跟踪它们的数据来源和工具。'
- en: '**What is the timeline for achieving success?**Define the timeline for achieving
    the desired outcomes, including any milestones or checkpoints.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实现成功的时间表是什么？**定义实现预期成果的时间表，包括任何里程碑或检查点。'
- en: '*Figure 6.17* highlights some success factors for the RFP use case.'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 6.17* 强调了 RFP 用例的一些成功因素。'
- en: '![Figure 6.17: Example of the success factors dimension for the RFP use case](img/B31200_06_17.png)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
  zh: '![图 6.17：RFP 用例成功因素维度的示例](img/B31200_06_17.png)'
- en: 'Figure 6.17: Example of the success factors dimension for the RFP use case'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.17：RFP 用例成功因素维度的示例
- en: 'For the AI RFP analysis solution, the success factors could be:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能 RFP 分析解决方案，成功因素可能包括：
- en: '**KPIs**: Reduction in time taken to analyze RFPs by 50% (primary) and, increase
    in win rate by 5% (secondary).'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**KPIs**：分析 RFP 所需时间减少 50%（主要）和胜率提高 5%（次要）。'
- en: '**Measurement tools**: A/B testing of users with and without the solution.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测量工具**：对使用和不使用解决方案的用户进行 A/B 测试。'
- en: '**Timeline**: Initial results within the first three months, with full deployment
    and achievement of KPIs within six months.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间表**：前三个月内获得初步结果，六个月内完成全面部署并实现关键绩效指标（KPIs）。'
- en: Expected feasibility dimension
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预期可行性维度
- en: Last but not least, the **expected feasibility dimension** is your summarized
    assessment of how likely you think it is to pull this use case off the ground.
    If you have no idea how to come up with a number right now, don’t worry! The next
    chapter will provide you with some simple heuristics. For now it’s best to approach
    the expected feasibility from a ranking perspective instead of trying to figure
    out a perfect score. This involves developing one-pagers for all your candidate
    use cases and then ranking them by feasibility after reviewing each one.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，**预期可行性维度**是你对实现这个用例的可能性所做的总结性评估。如果你现在不知道如何给出一个数字，不要担心！下一章将为你提供一些简单的启发式方法。现在，最好从排名的角度来考虑预期可行性，而不是试图给出一个完美的分数。这涉及到为所有候选用例开发单页文档，然后在审查每个用例后按可行性进行排名。
- en: The best way to achieve this ranking is through a head-to-head comparison. Compare
    two use cases side by side and determine which one seems more likely to succeed
    based on ease of implementation. Continue this comparison across all your use
    cases. By the end, you’ll have a ranked list from most to least feasible.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 实现这一排名的最佳方式是通过面对面比较。将两个用例并排比较，并根据实施难度判断哪一个更有可能成功。将这种比较扩展到所有用例中。最终，你将得到一个从最可行到最不可行的排名列表。
- en: '![Figure 6.18: Example of the expected feasibility dimension for the RFP use
    case](img/B31200_06_18.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![图6.18：RFP用例预期可行性维度的示例](img/B31200_06_18.png)'
- en: 'Figure 6.18: Example of the expected feasibility dimension for the RFP use
    case'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.18：RFP用例预期可行性维度的示例
- en: Given everything we know from the previous dimensions, our RFP Chatbot Analyzer
    ranks highly in feasibility. This is because it has relatively low technological
    requirements, and we anticipate minimal organizational or cultural challenges
    in adopting this use case - especially when compared to other potential AI applications
    within the same RFP process.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们从之前维度所了解的一切，我们的RFP聊天机器人分析器在可行性方面排名很高。这是因为它对技术的需求相对较低，我们预计在采用这个用例时组织或文化挑战将是最小的——尤其是在与其他同一RFP流程中的潜在人工智能应用相比时。
- en: 'For example, let’s compare this use case to another use case, which might evolve
    from our AI opportunity screening from [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor140),
    the RFP Team Matcher. The requirements of the RFP team Matcher use case are as
    follows: the Expert Finder aims to assemble the right **subject matter experts**
    (**SMEs**) more rapidly through an integrated Outlook plugin that suggests people
    to include in an email (CC) for RFP inputs. Looking at the data sources and stakeholders,
    it’s clear that this use case would involve more people and process even more
    sensitive data, so we would definitely rank it less feasible (more complex) than
    the RFP Chatbot Analyzer.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们将这个用例与另一个用例进行比较，这个用例可能源自我们的人工智能机会筛选，即[第5章](Chapter_05.xhtml#_idTextAnchor140)中的RFP
    Team Matcher。RFP Team Matcher用例的要求如下：Expert Finder旨在通过一个集成的Outlook插件快速组装合适的**主题专家**（SMEs），该插件建议在RFP输入中包含哪些人（CC）。从数据来源和利益相关者来看，很明显这个用例将涉及更多的人，并处理更多的敏感数据，因此我们肯定会将其排名为比RFP
    Chatbot Analyzer更不可行（更复杂）。
- en: 'Here is the Use case fact sheet for this use case:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这是这个用例的事实表：
- en: '![Figure 6.19: Complete Use case fact sheet for the RFP Team Matcher use case](img/B31200_06_19.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![图6.19：RFP Team Matcher用例的完整用例事实表](img/B31200_06_19.png)'
- en: 'Figure 6.19: Complete Use case fact sheet for the RFP Team Matcher use case'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.19：RFP Team Matcher用例的完整用例事实表
- en: 'For comparison, here’s how the complete Use case fact sheet could look for
    our RFP Chatbot Analyzer:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 为了比较，以下是我们的RFP聊天机器人分析器的完整用例事实表可能看起来如何：
- en: '![Figure 6.20: Complete Use case fact sheet for the RFP Chatbot Analyzer use
    case](img/B31200_06_20.png)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![图6.20：RFP Chatbot Analyzer用例的完整用例事实表](img/B31200_06_20.png)'
- en: 'Figure 6.20: Complete Use case fact sheet for the RFP Chatbot Analyzer use
    case'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.20：RFP Chatbot Analyzer用例的完整用例事实表
- en: 'When you look at these Use case fact sheets, the ten dimensions – problem,
    data, value, solution, risk, stakeholders, resources, success factors, type, and
    expected feasibility – give you a bird’s-eye overview and make it easy to scan
    use cases at a glance. This isn’t just useful for yourself or anyone managing
    the use case pipeline, but also for clearly communicating the big-picture idea
    and the *why* behind each use case. The format is flexible: it can be condensed
    to just the solution dimension when you need a quick explanation, or expanded
    with additional fields such as **Status** when more detail is required. Personally,
    I like to use it as a one-slide summary for each use case – something I can pull
    up any time we need to zoom out and align on what we’re actually trying to achieve,
    even well into the implementation phase.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 当你查看这些用例事实表时，十个维度——问题、数据、价值、解决方案、风险、利益相关者、资源、成功因素、类型和预期可行性——为你提供了一个鸟瞰图，让你可以轻松地浏览用例。这不仅对你自己或任何管理用例管道的人来说很有用，而且对于清晰地传达每个用例的大局观和背后的*原因*也很有帮助。格式是灵活的：当你需要快速解释时，它可以简化为仅包含解决方案维度；当需要更多细节时，可以扩展到包含如**状态**等额外字段。我个人喜欢将其用作每个用例的一页总结——一种我可以在任何需要放大并统一我们对实际目标看法的时候调用的东西，即使在实施阶段也是如此。
- en: Summary
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we explored a practical approach that effectively balances
    the need for thorough use case analysis with the practical realities of decision-making
    at a very early stage in your AI roadmap. Focusing on the most achievable projects
    that can deliver quick wins and build momentum for your AI initiatives is critical,
    especially in the beginning.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探索了一种实用方法，这种方法有效地平衡了在AI路线图早期决策阶段进行彻底用例分析的需求与实际现实。专注于那些可以实现的项目，这些项目可以带来快速胜利并为你的AI倡议建立势头是至关重要的，尤其是在开始阶段。
- en: By applying the Use case fact sheet template, you can ensure that each potential
    AI project is thoroughly understood, from the problem it solves to the resources
    it requires to the value it creates. Be sure to start with augmented use cases
    at the beginning and move on to advanced autopilot and agentic use cases as you
    gain experience and confidence.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 通过应用用例事实表模板，你可以确保每个潜在的人工智能项目都得到了彻底的理解，从它解决的问题到它所需的资源，再到它创造的价值。确保从增强型用例开始，随着你获得经验和信心，再逐步过渡到高级自动驾驶和代理用例。
- en: In the next chapter, we will focus on prioritizing the analyzed use cases and
    integrating them into a strategic AI roadmap. This roadmap will guide your AI
    journey, ensuring that each step is deliberate, aligned with your business goals,
    and positioned for success.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将专注于优先考虑分析过的用例并将它们整合到战略人工智能路线图中。这个路线图将指导你的AI之旅，确保每一步都是深思熟虑的，与你的商业目标一致，并定位在成功的位置。
