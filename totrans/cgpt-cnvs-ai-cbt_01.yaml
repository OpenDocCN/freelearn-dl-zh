- en: '1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '1'
- en: An Introduction to Chatbots, Conversational AI, and ChatGPT
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 聊天机器人、对话式人工智能和ChatGPT简介
- en: Welcome to the exciting world of chatbots, **conversational artificial intelligence**
    (**conversational AI**), and ChatGPT!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到聊天机器人、**对话式人工智能**（**conversational AI**）和ChatGPT的激动人心世界！
- en: In this introductory chapter, we introduce you to chatbots and conversational
    AI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的介绍部分，我们将向您介绍聊天机器人和对话式人工智能。
- en: Our journey will begin by exploring the fundamentals of chatbots and their varying
    types, tracing the evolution of these digital conversationalists, and assessing
    their impact across multiple industries, such as e-commerce, customer service,
    and healthcare.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的旅程将从探索聊天机器人的基础知识及其不同类型开始，追溯这些数字对话者的演变过程，并评估它们在多个行业（如电子商务、客户服务、医疗保健）中的影响。
- en: We’ll then look at how the conversational AI landscape has changed over time
    and the recent rapid rise of **large language model** (**LLM**) technologies,
    specifically the rise of OpenAI’s ChatGPT, **Generative Pre-trained Transformer
    3** (**GPT-3**), and GPT-4 models.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探讨对话式人工智能领域随着时间的推移而发生的变革，以及**大型语言模型**（**LLM**）技术的近期快速崛起，特别是OpenAI的ChatGPT、**生成式预训练变换器3**（**GPT-3**）和GPT-4模型的崛起。
- en: While journeying through this chapter, you’ll gain a comprehensive understanding
    of OpenAI’s ChatGPT. We’ll pull back the curtain on this marvel of technology
    to examine its development, capabilities, and limitations. You’ll see firsthand
    how ChatGPT fits into the broader conversational AI landscape and how it has revolutionized
    various sectors with its diverse applications.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读本章的过程中，您将全面了解OpenAI的ChatGPT。我们将揭开这一技术奇迹的神秘面纱，探讨其发展、功能和局限性。您将亲眼看到ChatGPT如何融入更广泛的对话式人工智能领域，以及它如何通过其多样化的应用彻底改变了各个行业。
- en: What makes this chapter valuable? Our aim is to look at the broader picture
    of conversational AI and gain a solid understanding of ChatGPT, essentially laying
    the groundwork for the practical skills that you’ll learn later in this book.
    By the end of this chapter, you’ll have a rich understanding of chatbots and conversational
    AI, particularly the real-world applications and potential of ChatGPT and the
    opportunities ChatGPT offers in comparison to earlier conversational AI technologies.
    This insight will enable you to see the potential for ChatGPT’s conversational
    AI applications to bring real benefit to your organization, enhancing user experiences
    and business processes and bringing a novel edge to your industry. Let’s embark
    on this enlightening journey together!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么本章有价值？我们的目标是审视对话式人工智能的更广泛图景，并深入理解ChatGPT，为本书后面将要学习的实用技能打下基础。到本章结束时，您将对聊天机器人和对话式人工智能有一个丰富的理解，特别是ChatGPT的现实应用和潜力，以及与早期对话式人工智能技术相比，ChatGPT提供的机遇。这种洞察力将使您能够看到ChatGPT的对话式人工智能应用如何为您的组织带来实际利益，提升用户体验和业务流程，并为您的行业带来新的优势。让我们共同踏上这段启发性的旅程吧！
- en: 'In this chapter, we’re going to cover the following main topics:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主要内容：
- en: What are chatbots and conversational AI?
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是聊天机器人和对话式人工智能？
- en: Evolution of chatbots and conversational AI
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聊天机器人和对话式人工智能的演变
- en: Understanding conversational AI applications
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解对话式人工智能应用
- en: What is OpenAI’s ChatGPT?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenAI的ChatGPT是什么？
- en: Capabilities and applications of ChatGPT
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的功能和应用
- en: Limitations of ChatGPT
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的局限性
- en: What are chatbots and conversational AI?
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是聊天机器人和对话式人工智能？
- en: When we think of conversational AI, we reference an evolving field of AI that
    equips computer systems with the ability to communicate with humans using **natural
    language** (**NL**) in an interactive manner.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们想到对话式人工智能时，我们指的是一个不断发展的AI领域，它使计算机系统能够以交互式的方式使用**自然语言**（**NL**）与人类进行交流。
- en: Over the past decade, conversational AI-powered voice- and text-based assistants
    have become embedded in our daily lives, enhancing user experience across diverse
    platforms and tackling a wide range of use cases. Revolutionizing the way businesses
    interact with their customers, they have become critical components of a modern
    digital strategy.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的十年中，由对话式人工智能驱动的基于语音和文本的助手已经融入我们的日常生活，在各种平台上提升了用户体验，并应对了广泛的使用案例。它们彻底改变了企业与客户互动的方式，已成为现代数字战略的关键组成部分。
- en: This section aims to provide a comprehensive overview of the field of conversational
    AI. It will delve into the history of chatbots and conversational AI, highlighting
    key milestones that have shaped the progression from rudimentary rule-based systems
    to sophisticated AI-driven chatbots. We will examine advancements in technology,
    such as **NL understanding** (**NLU**) and the progression from rule-based chatbots
    to AI-powered chatbots, emphasizing their capabilities and limitations. Overall,
    this section aims to provide readers with a clear understanding of the significance
    and potential of conversational AI in revolutionizing interactions between humans
    and computers.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 本节旨在提供一个关于对话式人工智能领域的全面概述。它将深入探讨聊天机器人和对话式人工智能的历史，突出塑造从基本的基于规则的系统到复杂的AI驱动聊天机器人进步的关键里程碑。我们将研究技术进步，如**自然语言理解**（NLU）以及从基于规则的聊天机器人到AI聊天机器人的转变，强调它们的能力和局限性。总的来说，本节旨在为读者提供一个关于对话式人工智能在革命性地改变人类与计算机之间互动的重要性和潜力的清晰理解。
- en: A brief history of conversational AI
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对话式人工智能的简要历史
- en: The first chatbots were created in the mid-20th century with the first recorded
    example, ELIZA, emerging from the hallowed halls of **Massachusetts Institute
    of Technology** (**MIT**) in 1966, thanks to Joseph Weizenbaum’s pioneering work.
    ELIZA was architected to **mirror** the linguistic patterns of a psychotherapist,
    capable of sustaining straightforward interactions with human users. This groundbreaking
    creation established the fundamental bedrock for the later development of more
    complex conversational AI systems.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个聊天机器人是在20世纪中叶创建的，第一个记录的例子ELIZA是在1966年从神圣的麻省理工学院（MIT）的殿堂中诞生的，这得益于约瑟夫·魏岑鲍姆的开创性工作。ELIZA被设计成**模仿**心理治疗师的语言模式，能够与人类用户进行直接的互动。这一开创性的创造为后来更复杂的对话式人工智能系统的发展奠定了基础。
- en: Originally, these elementary chatbots could execute only a restricted set of
    pre-programmed responses or decision trees. However, they have since undergone
    a remarkable evolution, broadening their capability to respond to a diverse range
    of inputs.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，这些基本的聊天机器人只能执行一组有限的预编程响应或决策树。然而，它们已经经历了显著的演变，扩展了它们对各种输入做出响应的能力。
- en: The advent of revolutionary technologies such as **machine learning** (**ML**),
    **NL processing** (**NLP**), and NLU fostered the transformation of rudimentary
    chatbots into intricate conversational AI systems. These advanced systems not
    only comprehend and reciprocate human speech in a more organic, instinctive manner
    but can also engage in more dynamic conversations. A pivotal feature of these
    modern systems is their ability to learn and adapt over time using ML, progressively
    improving their efficiency and acceptance among users and, therefore, their demand.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 革命性技术如**机器学习**（ML）、**自然语言处理**（NLP）和NLU的出现，促进了从基本的聊天机器人到复杂的对话式人工智能系统的转变。这些先进系统不仅能够以更自然、更本能的方式理解和回应人类的语言，而且还能进行更动态的对话。这些现代系统的一个关键特征是它们能够使用ML随着时间的推移进行学习和适应，从而不断提高它们的效率和用户接受度，因此也提高了它们的需求。
- en: The development and evolution of conversational AI has been marked by significant
    milestones that highlight its steady progression from rudimentary chatbots to
    advanced AI systems that can simulate human-like conversation.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能的发展和演变被一系列重要的里程碑所标记，这些里程碑突出了它从基本的聊天机器人到能够模拟类似人类对话的高级人工智能系统的稳步进步。
- en: Each of these milestones represents a significant advancement in the development
    of conversational AI, paving the way for the sophisticated intent-based systems
    we see today. However, it’s not an exaggeration to state that it wasn’t until
    November 2022 that conversational AI really took off.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这些里程碑中的每一个都代表了对话式人工智能发展中的一个重大进步，为今天我们所看到的复杂基于意图的系统铺平了道路。然而，说直到2022年11月对话式人工智能才真正起飞并不夸张。
- en: To emphasize the phenomenal growth and growth of ChatGPT, consider the fact
    that it amassed over a million users within the span of just 5 days post-launch
    in November 2022\. This growth trajectory outpaced even those of tech giants such
    as Netflix, Facebook, Instagram, and Zoom.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了强调ChatGPT的非凡增长，考虑这样一个事实：它在2022年11月发布后的短短5天内就积累了超过一百万用户。这种增长轨迹甚至超过了Netflix、Facebook、Instagram和Zoom等科技巨头。
- en: An overview of chatbots and automated assistants
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 聊天机器人和自动化助手概述
- en: What exactly do we mean when we speak of chatbots or digital assistants? The
    terminology of *chatbot* has been subject to debate, and some argue that it bears
    the brunt of past disappointments when the technology was still in its nascent
    stages. For the purpose of this book, whether we refer to them as chatbots, digital
    assistants, or any other term, we are essentially addressing a computer program
    that communicates with people, either through text or voice. This interactive
    communication can take place across various mediums, such as websites, mobile
    apps, messaging platforms, collaborative tools, smart speakers, digital human
    avatars, or **interactive voice response** (**IVR**) systems.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈论聊天机器人或数字助手时，我们究竟指的是什么？*聊天机器人*这个术语一直存在争议，有些人认为它在技术还处于萌芽阶段时，承担了过去的失望的主要责任。为了本书的目的，无论我们称它们为聊天机器人、数字助手还是其他任何术语，我们本质上都是在讨论一种与人类通过文本或语音进行交流的计算机程序。这种交互式通信可以在各种媒介上进行，例如网站、移动应用、消息平台、协作工具、智能音箱、数字人类头像或**交互式语音响应**（**IVR**）系统。
- en: 'To further delineate, we can categorize these entities into two main types
    of conversational agents that have different capabilities:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步区分，我们可以将这些实体分为两种主要类型的对话代理，它们具有不同的能力：
- en: '![Figure 1.1 – Comparison between rule-based and AI-powered chatbots](img/B21100_01_1.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.1 – 基于规则和人工智能驱动的聊天机器人的比较](img/B21100_01_1.jpg)'
- en: Figure 1.1 – Comparison between rule-based and AI-powered chatbots
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.1 – 基于规则和人工智能驱动的聊天机器人的比较
- en: Rule-based chatbots/digital assistants
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于规则的聊天机器人/数字助手
- en: 'Simple, rule-based chatbots operate based on a set of predefined rules or FAQs.
    They’re designed to answer frequently asked questions, provide information, or
    guide users through specific tasks. However, their capacity to handle interactions
    is confined to pre-programmed knowledge, and they can struggle with requests that
    deviate from their predefined scripts:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的基于规则的聊天机器人基于一组预定义的规则或常见问题解答（FAQs）。它们被设计用来回答常见问题、提供信息或引导用户完成特定任务。然而，它们处理交互的能力仅限于预编程的知识，并且它们可能会在偏离预定义脚本的要求时遇到困难：
- en: '![ Figure 1.2 – An interaction with a rule-based chatbot](img/B21100_01_2.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.2 – 与基于规则的聊天机器人的交互](img/B21100_01_2.jpg)'
- en: Figure 1.2 – An interaction with a rule-based chatbot
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.2 – 与基于规则的聊天机器人的交互
- en: In short, these chatbots can’t understand any language outside the commands
    they’re programmed to understand. These types of chatbots don’t utilize any kind
    of ML technology and are limited and brittle in their use case and functionality.
    If a user makes a request that is not within the bounds of their conversational
    capability or the decision tree, then they will often fall over, resulting in
    a poor user experience.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这些聊天机器人无法理解它们被编程去理解的任何语言之外的任何语言。这类聊天机器人不利用任何机器学习（ML）技术，在用例和功能上有限且脆弱。如果用户提出的要求超出了它们的对话能力或决策树的范围，那么它们往往会崩溃，导致用户体验不佳。
- en: Conversational AI-driven chatbots/digital assistants
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 由对话式人工智能驱动的聊天机器人/数字助手
- en: Conversational AI refers to the technology that enables computers or machines
    to engage in natural and human-like conversations with users. It combines various
    fields, such as NLP, NLU, ML, and dialogue management, to understand and respond
    to user inputs in a conversational manner. Nowadays conversational AI is the common
    term for a field that encompasses chatbots and voice assistants and the systems
    and technologies used to create them.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能是指使计算机或机器能够与用户进行自然和类似人类的对话的技术。它结合了自然语言处理（NLP）、自然语言理解（NLU）、机器学习（ML）和对话管理等多个领域，以对话的方式理解和响应用户输入。如今，对话式人工智能是涵盖聊天机器人和语音助手以及创建它们的系统和技术的领域的通用术语。
- en: As technology has advanced, conversational AI has evolved to become more sophisticated,
    capable of understanding complex queries, providing meaningful and contextually
    relevant responses, and offering a much more robust and far more dynamic and adaptable
    approach.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 随着技术的进步，对话式人工智能已经发展到更加复杂，能够理解复杂的查询，提供有意义的、上下文相关的响应，并采用更加稳健、更加动态和适应性强的方法。
- en: 'The core features of a conversational AI chatbot are made up of the following:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能聊天机器人的核心功能包括以下内容：
- en: '**Understanding of context**: One of the most significant features of NLU is
    its ability to comprehend the context of a conversation. This means it doesn’t
    just process words in isolation but also considers the context in which those
    words are used. This allows the AI to correctly interpret the meaning behind a
    user’s input, even if it’s ambiguous or complex.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对上下文的理解**：NLU最显著的特征之一是其理解对话上下文的能力。这意味着它不仅独立处理单词，还考虑这些单词被使用的上下文。这允许AI正确地解释用户输入背后的含义，即使它是模糊的或复杂的。'
- en: '**Semantic understanding**: NLU systems have a high degree of semantic understanding.
    They can grasp the meaning behind a user’s words, including synonyms, slang, regional
    dialects, and industry-specific jargon, by using entity recognition.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义理解**：NLU系统具有高度的语义理解能力。它们可以通过使用实体识别来理解用户话语背后的含义，包括同义词、俚语、地方方言和行业特定术语。'
- en: '**Handling of ambiguity**: In human communication, ambiguity is common. We
    often use vague or unclear expressions that can be interpreted in different ways.
    An NLU system can handle such ambiguity by using contextual clues to infer the
    intended meaning. For example, consider the sentence, “*I saw her duck.*” This
    sentence can be interpreted in multiple ways: it could mean that the speaker saw
    a woman dodge to avoid something, or it could mean that the speaker saw a duck
    that belongs to a woman. If the previous conversation was about avoiding flying
    objects, the system would infer the first meaning. If the conversation was about
    pets or animals, it would infer the second meaning.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理歧义**：在人类交流中，歧义是常见的。我们经常使用模糊或不清晰的表述，这些表述可以有不同的解释。一个NLU系统可以通过使用上下文线索来推断意图的含义来处理这种歧义。例如，考虑这个句子，“*我看到了她的鸭子*。”这个句子可以有多个解释：它可能意味着说话者看到了一个女性躲避某物，或者它可能意味着说话者看到了属于女性的鸭子。如果之前的对话是关于避免飞行物体，系统就会推断第一个含义。如果对话是关于宠物或动物，它就会推断第二个含义。'
- en: '**Intent recognition**: NLU systems can identify the user’s intent behind their
    words. This means they don’t just process what the user is saying but also understand
    what the user wants to achieve. This is key to providing a helpful and relevant
    response.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**意图识别**：NLU系统可以识别用户话语背后的意图。这意味着它们不仅处理用户所说的话，还理解用户想要实现的目标。这对于提供有帮助和相关的响应至关重要。'
- en: '**Entity recognition**: Entity recognition is a key technique in NLP. It’s
    the task of identifying and classifying named entities (such as persons, organizations,
    locations, product types, dates, and other variables) within the text of a provided
    input.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实体识别**：实体识别是NLP中的一个关键技术。它是识别和分类文本输入中的命名实体（如人名、组织、地点、产品类型、日期和其他变量）的任务。'
- en: '**Slot filling**: Slot filling is the functionality to extract information
    from inputs based on entity type. Relying heavily on entity recognition, it’s
    about identifying and extracting specific pieces of information from an input
    and placing them into predefined **slots** in memory for later use. For example,
    in a hotel booking dialogue system, slots might include type of room, time of
    booking, and number of people.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**槽填充**：槽填充是根据实体类型从输入中提取信息的功能。它高度依赖于实体识别，它涉及到从输入中识别和提取特定的信息片段，并将它们放入预先定义的**槽位**中供以后使用。例如，在一个酒店预订对话系统中，槽位可能包括房间类型、预订时间和人数。'
- en: '**Sentiment analysis**: Many NLU systems can analyze the sentiment behind a
    user’s words. This allows them to recognize when a user is happy, frustrated,
    angry, or sad and respond in a way that is sensitive to the user’s emotional state.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感分析**：许多NLU系统可以分析用户话语背后的情感。这使得它们能够识别用户是高兴、沮丧、愤怒还是悲伤，并以对用户情绪状态敏感的方式做出响应。'
- en: '**Conversation management**: NLU systems can manage complex conversations.
    They can keep track of a conversation’s history and use this information to inform
    their responses. They can handle interruptions, follow-up questions, and changes
    in the conversation topic, providing a more human-like interaction.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对话管理**：NLU系统可以管理复杂的对话。它们可以跟踪对话的历史并使用这些信息来指导它们的响应。它们可以处理中断、后续问题和对话主题的变化，提供更类似人类的交互。'
- en: '**Multilingual capability**: Advanced NLU systems can understand and communicate
    in multiple languages. This allows businesses to provide customer service and
    support to a global audience.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多语言能力**：高级NLU系统可以理解和用多种语言进行交流。这使得企业能够为全球受众提供客户服务和支持。'
- en: '**Integration with external systems**: NLU systems can often be integrated
    with other systems, such as **customer relationship management** (**CRM**) systems,
    databases, or other APIs. This allows the AI to retrieve and utilize real-time
    data when interacting with the user, providing more personalized and relevant
    responses.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与外部系统的集成**：NLU系统通常可以与其他系统集成，例如**客户关系管理**（CRM）系统、数据库或其他API。这使得AI在与用户交互时能够检索和利用实时数据，提供更个性化和相关的响应。'
- en: 'The following diagram shows the steps for an interaction with a modern conversational
    AI chatbot:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表展示了与现代对话式AI聊天机器人交互的步骤：
- en: '![Figure 1.3 – An interaction with an AI-powered chatbot](img/B21100_01_3.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图1.3 – 与AI聊天机器人的交互](img/B21100_01_3.jpg)'
- en: Figure 1.3 – An interaction with an AI-powered chatbot
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.3 – 与AI聊天机器人的交互
- en: Over the past 5 years, there has been a huge growth in conversational AI platforms,
    with technology vendors large and small striving to build the best low-code, no-code,
    pro-code solutions. Everyone who has worked in the field of conversational AI
    over the years has an opinion on what is the best or their favorite platform to
    build conversational experiences.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的5年里，对话式AI平台经历了巨大的增长，大小技术供应商都在努力构建最佳的低代码、无代码、专业代码解决方案。多年来在对话式AI领域工作过的每个人都对什么是最优秀或他们最喜欢的平台来构建对话体验有自己的看法。
- en: The key component of all these systems is that they are all intent-based. The
    AI technology handles the user intent based on a set of trained intents and provides
    an answer based on its understanding of the context of the conversation.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些系统的关键组成部分是它们都是基于意图的。AI技术根据一组训练好的意图处理用户意图，并根据其对对话上下文的理解提供答案。
- en: Conversational AI platforms
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对话式AI平台
- en: 'Modern conversational AI systems employ several features to manage a conversation.
    These features are commonly the following:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现代对话式AI系统采用几个功能来管理对话。这些功能通常包括以下内容：
- en: The ability to understand NL input from users via text or voice
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够通过文本或语音理解用户的NL输入
- en: The ability to generate NL output that is relevant, coherent, and engaging
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够生成相关、连贯且引人入胜的NL输出
- en: The ability to understand multiple intents, entities, and contexts in a conversation
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够理解对话中的多个意图、实体和上下文
- en: The ability to learn from user feedback and data to improve their accuracy and
    understanding over time
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够从用户反馈和数据中学习，以随着时间的推移提高它们的准确性和理解能力
- en: The ability to provide a consistent and personalized experience across multiple
    platforms and channels
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够在多个平台和渠道上提供一致和个性化的体验
- en: '![Figure 1.4 – The elements of a modern conversational AI system](img/B21100_01_4.jpg)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图1.4 – 现代对话式AI系统的元素](img/B21100_01_4.jpg)'
- en: Figure 1.4 – The elements of a modern conversational AI system
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.4 – 现代对话式AI系统的元素
- en: There are many great conversational AI systems on the market, with vendors ranging
    from the biggest tech providers to tech start-ups concentrating solely on conversational
    AI solutions.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 市场上有许多优秀的对话式AI系统，供应商从最大的技术提供商到专注于对话式AI解决方案的技术初创公司都有。
- en: In reality, it’s not always the end conversational experience created by one
    of these systems that makes for a successful implementation but the features of
    the system in place and the usability of these features that enable users to create
    conversational experiences.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，并不是这些系统之一创建的最终对话体验决定了成功的实施，而是系统中实际的功能以及这些功能的可用性，这些功能使得用户能够创建对话体验。
- en: To appreciate today’s advanced conversational AI, let’s trace the evolution
    of chatbots from their humble beginnings.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了欣赏今天先进的对话式AI，让我们回顾一下聊天机器人从其不起眼的起点的发展历程。
- en: Evolution of chatbots and conversational AI
  id: totrans-67
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 聊天机器人和对话式AI的演变
- en: When chatbots first entered the scene, they were hailed as a groundbreaking
    evolution in technology, poised to revolutionize the way businesses communicate
    with their customers.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当聊天机器人最初进入场景时，它们被誉为技术领域的突破性进化，有望彻底改变企业与其客户沟通的方式。
- en: The early versions, however, were not as impressive as many had hoped. Coupled
    with the growth of chatbot platforms and the ease with which anyone could create
    a chatbot, this led to a bad user experience and an overall lackluster performance,
    which hampered their reputation.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，早期的版本并没有像许多人所期望的那样令人印象深刻。结合聊天机器人平台的发展以及任何人都能轻松创建聊天机器人的便利性，这导致了糟糕的用户体验和整体表现不佳，从而损害了它们的声誉。
- en: One of the primary failings of early chatbots was their lack of sophistication
    and nuance in understanding and responding to human language. These rudimentary
    versions were generally rule-based, relying heavily on pre-programmed scripts.
    This meant they were only equipped to handle very specific inputs and could easily
    be thrown off by anything that deviated from their script. As a result, users
    often found themselves in frustratingly circular conversations, where the chatbot
    failed to comprehend their queries and kept providing irrelevant or nonsensical
    responses.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 早期聊天机器人的一个主要缺陷是它们在理解和回应人类语言方面缺乏复杂性和细微差别。这些基本的版本通常是基于规则的，严重依赖预先编写的脚本。这意味着它们只能处理非常具体的输入，并且很容易因为任何偏离脚本的内容而受到影响。因此，用户常常发现自己陷入令人沮丧的循环对话中，聊天机器人无法理解他们的查询，并持续提供无关或无意义的回应。
- en: The voice assistants’ journey has also been marked by highs and lows. While
    they enjoyed initial popularity, particularly with the advent of Amazon’s Alexa,
    Apple’s Siri, and Google Assistant, they have witnessed a decline over time. The
    accuracy and understanding of these voice assistants have led to some user frustration.
    Moreover, concerns around privacy and data security have played a significant
    role in this decline. The idea of a device “always listening” has made many users
    uncomfortable and unwilling to use these assistants.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 语音助手的旅程也充满了起伏。虽然它们在最初很受欢迎，尤其是在亚马逊的Alexa、苹果的Siri和谷歌助手推出后，但随着时间的推移，它们的人气有所下降。这些语音助手的准确性和理解能力导致了一些用户的不满。此外，关于隐私和数据安全的担忧在下降中发挥了重要作用。设备“始终在监听”的想法让许多用户感到不舒服，不愿意使用这些助手。
- en: The early hype around chatbots and voice assistants contrasted with the reality
    of their limitations, leading to a kind of “AI winter” for these technologies.
    The media was quick to jump on these failures, leading to a wave of bad press.
    Headlines proclaiming the “death” of chatbots, and voice assistants became commonplace,
    leading to a general skepticism about the potential of these technologies.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 早期聊天机器人和语音助手的炒作与它们局限性的现实形成了鲜明对比，导致这些技术出现了一种“AI寒冬”。媒体迅速抓住这些失败，引发了一波负面报道。宣称聊天机器人和语音助手“死亡”的标题变得司空见惯，导致人们对这些技术的潜力普遍持怀疑态度。
- en: The advent of more sophisticated AI technologies such as NLP and ML has allowed
    for the development of more advanced and capable chatbots and voice assistants.
    These newer iterations are far better at understanding and responding to human
    language and can learn and adapt over time. In the same way that intent-based
    conversational AI has superseded rule-based agents, **LLMs** look to do the same.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 更高级的AI技术，如自然语言处理（NLP）和机器学习（ML）的出现，使得更先进和强大的聊天机器人和语音助手得以开发。这些新一代的产品在理解和回应人类语言方面表现得更加出色，并且能够随着时间的推移学习和适应。正如基于意图的对话式AI超越了基于规则的代理一样，**大型语言模型（LLMs**）也寻求实现同样的目标。
- en: LLMs have been in development for several years. However, it’s only in the last
    couple of years with the emergence of GPT-3 technologies from OpenAI that the
    technology has started to get some exposure and enter into the mainstream. But
    in November 2022, all this changed with the explosion of ChatGPT. This has sparked
    a technological race, with hundreds of organizations striving to create the most
    advanced LLM. With ChatGPT and now GPT-4 leading the charge, they are arguably
    the ones to beat. In fact, it’s not just the LLM technologies that are advancing
    but also other associated technologies that make up part of the ecosystem.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）已经开发了好几年。然而，直到最近几年，随着OpenAI推出的GPT-3技术的出现，这项技术才开始获得一些曝光并进入主流。但在2022年11月，这一切都发生了变化，ChatGPT的爆炸式增长引发了技术竞赛，数百个组织都在努力创造最先进的LLMs。随着ChatGPT和现在的GPT-4的领先，它们可以说是最具挑战性的。事实上，不仅仅是LLM技术正在进步，构成生态系统的其他相关技术也在不断发展。
- en: Conversational AI professionals can see that there are opportunities with this
    huge leap in AI-powered communication. GPT models trained for chat can make conversations
    with chatbots and automated assistants seem incredibly human-like. In the next
    section, we’ll look at these applications in more detail.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式AI专业人士可以看到，随着AI驱动通信的巨大飞跃，其中存在机会。为聊天训练的GPT模型可以使聊天机器人和自动化助手之间的对话看起来极其像人类。在下一节中，我们将更详细地探讨这些应用。
- en: Understanding conversational AI applications
  id: totrans-76
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解对话式AI应用
- en: Before looking at ChatGPT, it’s important to consider use cases for conversational
    AI applications and initially consider them in the context of what’s been possible
    with traditional conversational AI systems and technology.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在查看ChatGPT之前，考虑对话式人工智能应用的使用案例，并首先在传统对话式人工智能系统和技术的可能性背景下考虑它们是很重要的。
- en: Conversational AI has emerged as a powerful tool in numerous industries, from
    customer service to healthcare, banking, insurance, retail, and human resources.
    By automating routine tasks and enabling enhanced user interactions, conversational
    AI applications have changed the landscape of many domains. Let’s look at some
    existing examples of conversational AI.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能已成为众多行业中的强大工具，从客户服务到医疗保健、银行、保险、零售和人力资源。通过自动化常规任务和增强用户交互，对话式人工智能应用已经改变了许多领域的格局。让我们看看一些现有的对话式人工智能的例子。
- en: Customer service
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户服务
- en: Conversational AI has been hugely successful in the customer support use case,
    streamlining processes and improving user experience in myriad ways. By adopting
    AI-powered chatbots and virtual assistants, businesses can handle large volumes
    of customer interactions seamlessly and efficiently.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式人工智能在客户支持用例中取得了巨大成功，以多种方式简化流程并改善用户体验。通过采用AI驱动的聊天机器人和虚拟助手，企业可以无缝且高效地处理大量客户互动。
- en: Conversational AI offers several capabilities and improvements in this use case.
    First, agents can interact with multiple customers simultaneously, resolving queries
    instantaneously. This eliminates long waiting times, a common source of customer
    dissatisfaction in traditional support systems.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个用例中，对话式人工智能提供了几个能力和改进。首先，代表可以同时与多个客户互动，即时解决查询。这消除了常见的客户不满来源——长时间的等待。
- en: Second, the round-the-clock availability of AI support greatly enhances customer
    experience. Conversational AI can cater to customer inquiries at any hour, including
    holidays, ensuring continuous support.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，AI支持的全天候可用性极大地提升了客户体验。对话式人工智能可以随时处理客户咨询，包括节假日，确保持续的支持。
- en: Third, the integration of AI with CRM systems and other databases provides personalized
    experiences. Conversational AI can use customer data to understand their preferences
    and purchasing history and deliver customized solutions or product recommendations,
    boosting customer satisfaction and potentially driving sales.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，AI与CRM系统和其他数据库的集成提供了个性化的体验。对话式人工智能可以使用客户数据来了解他们的偏好和购买历史，提供定制化的解决方案或产品推荐，从而提高客户满意度并可能推动销售。
- en: Lastly, conversational AI can help businesses save resources. AI can handle
    routine, repetitive tasks, freeing up human agents to tackle more complex and
    sensitive issues. This not only improves efficiency but also reduces operational
    costs.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，对话式人工智能可以帮助企业节省资源。AI可以处理常规、重复性的任务，让人类代表有更多时间处理更复杂和敏感的问题。这不仅提高了效率，还降低了运营成本。
- en: loveholidays, a UK-based online travel agency, implemented a chatbot named Sandy.
    Sandy was designed to respond to customer queries in real time, reducing wait
    times and enhancing the customer experience. This bot responds to a high volume
    of interactions around the clock, resolving simple issues more efficiently than
    human representatives. This is a typical example of how conversational AI is revolutionizing
    customer service, from answering routine questions to proactive customer engagement.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: loveholidays，一家位于英国的在线旅行社，实施了一个名为Sandy的聊天机器人。Sandy被设计用来实时响应客户查询，减少等待时间并提升客户体验。这个机器人全天候处理大量互动，比人工代表更高效地解决简单问题。这是一个典型的例子，说明了对话式人工智能如何正在革命性地改变客户服务，从回答常规问题到主动的客户参与。
- en: Language translation
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语言翻译
- en: Language translation systems, such as Google Translate and DeepL, use conversational
    AI to facilitate real-time translation of spoken or written communication. Consider
    a use case where a French-speaking user needs to communicate with a Chinese associate.
    Using Google Translate, they can communicate seamlessly, each in their native
    language, thus breaking language barriers and enabling smooth communication.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 语言翻译系统，如Google Translate和DeepL，使用对话式人工智能来促进实时翻译口头或书面交流。考虑一个场景，一个说法语的用户需要与一个说中文的同事沟通。使用Google
    Translate，他们可以无缝沟通，每个人都在自己的母语中，从而打破语言障碍，实现顺畅的沟通。
- en: Education
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教育
- en: AI-based educational platforms such as Carnegie Learning leverage AI to provide
    personalized learning experiences. These platforms adapt to individual student
    needs, delivering tailored instructions and feedback. By studying student habits,
    these algorithms personalize their learning experience, offering a more effective,
    personalized learning approach.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 基于AI的教育平台，如卡内基学习，利用AI提供个性化的学习体验。这些平台根据学生的个人需求进行调整，提供定制化的指导和反馈。通过研究学生的习惯，这些算法个性化他们的学习体验，提供更有效、个性化的学习方法。
- en: Healthcare
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 医疗保健
- en: In healthcare, conversational AI is employed for patient triage and preliminary
    diagnosis. Babylon Health, for example, has developed a chatbot that conducts
    an initial symptom check, recommending further medical attention or home care
    based on the findings. This bot can also schedule appointments and refill prescriptions,
    significantly enhancing patient care and satisfaction.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在医疗保健领域，对话式AI用于患者分诊和初步诊断。例如，Babylon Health开发了一个聊天机器人，可以进行初步症状检查，根据检查结果推荐进一步医疗关注或家庭护理。此机器人还可以安排预约和续方，显著提高患者护理和满意度。
- en: Other use-case examples include those created for mental health applications;
    for example, Woebot is an AI-powered personal mental health companion designed
    to support users in maintaining their emotional well-being. Utilizing conversational
    AI with NLP capabilities, it gradually learns about the user’s mental state, offering
    tailored, clinically proven strategies based on **cognitive behavioral therapy**
    (**CBT**), **interpersonal psychotherapy** (**IPT**), and **dialectical behavioral
    therapy** (**DBT**). This innovative combination of sophisticated AI and proven
    therapeutic strategies creates a uniquely accessible mental health chatbot that
    uses smart conversational abilities and a slick chat **user** **interface** (**UI**).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 其他用例示例包括为心理健康应用创建的；例如，Woebot是一个AI驱动的个人心理健康伴侣，旨在帮助用户维持他们的情绪健康。利用具有NLP能力的对话式AI，它逐渐了解用户的心理状态，提供基于**认知行为疗法**（**CBT**）、**人际心理治疗**（**IPT**）和**辩证行为疗法**（**DBT**）的定制、经临床验证的策略。这种复杂AI和经证实治疗策略的独特组合创造了一个独特的心理健康聊天机器人，它使用智能对话能力和流畅的聊天**用户界面**（**UI**）。
- en: Banking and insurance
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 银行和保险
- en: The banking and insurance sectors use conversational AI for routine inquiries,
    account management, bill payment, claims processing, and policy management. Some
    establishments, such as JPMorgan Chase, use conversational AI to provide personalized
    financial advice and recommendations, creating a more engaging customer experience.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 银行和保险行业使用对话式AI进行常规查询、账户管理、账单支付、索赔处理和政策管理。一些机构，如摩根大通，使用对话式AI提供个性化的财务建议和推荐，创造更具吸引力的客户体验。
- en: Retail
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 零售
- en: In retail, chatbots enhance customer service by recommending products, tracking
    orders, and answering routine queries. An AI-powered bot, for example, could recommend
    products based on a customer’s browsing history, creating a personalized shopping
    experience. They also aid in tailoring marketing efforts, contributing to increased
    sales and customer retention.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在零售业，聊天机器人通过推荐产品、跟踪订单和回答常规查询来提升客户服务。例如，一个AI驱动的聊天机器人可以根据客户的浏览历史推荐产品，创造个性化的购物体验。它们还帮助定制营销活动，有助于增加销售额和客户保留率。
- en: Human resources
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人力资源
- en: In human resources, AI-driven chatbots are making recruitment tasks more efficient.
    Mya, for instance, answers FAQs, screens candidates, schedules interviews, and
    manages resumes. Mya reported effective engagement with 92% of their candidates
    during the first 10,000 conversations, significantly reducing recruiters’ workload.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在人力资源领域，AI驱动的聊天机器人使招聘任务更加高效。例如，Mya可以回答常见问题、筛选候选人、安排面试和管理简历。Mya在最初的10,000次对话中与92%的候选人进行了有效互动，显著减轻了招聘人员的负担。
- en: In conclusion, the applications of conversational AI are vast and continually
    evolving. Whether it’s enabling more efficient customer service, personalizing
    education, streamlining healthcare, revolutionizing banking, insurance, and retail,
    or enhancing HR processes, conversational AI is set to continue its transformational
    role across various industries.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，对话式AI的应用范围广泛且持续发展。无论是提高客户服务的效率、个性化教育、简化医疗保健、革命化银行、保险和零售，还是提升人力资源流程，对话式AI注定将在各个行业中继续发挥其变革性作用。
- en: While the journey has been bumpy, the story of chatbots and voice assistants
    is far from over. As these technologies continue to evolve, they have the potential
    to truly transform the way we communicate with machines and with each other. As
    with any technological innovation, the key is to learn from past mistakes and
    continue moving forward.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管旅程充满坎坷，但聊天机器人和语音助手的传奇故事远未结束。随着这些技术的持续发展，它们有潜力真正改变我们与机器以及彼此沟通的方式。与任何技术创新一样，关键是从过去的错误中学习并继续前进。
- en: Conversational AI as a training tool – the emergence of digital humans
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对话式人工智能作为培训工具——数字人的出现
- en: As the capabilities of conversational AI continue to evolve, we are witnessing
    the rise of “digital humans,” which are hyper-realistic, AI-powered virtual beings
    that interact with users in human-like ways. These digital humans, coupled with
    the power of conversational AI, are creating new frontiers in health, education,
    training, and customer service for many organizations; for example, Deutsche Telekom,
    Vodafone, Kiehl, and UBS.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 随着对话式人工智能能力的不断发展，我们正在见证“数字人”的崛起，这些数字人是高度逼真的、由人工智能驱动的虚拟生物，以类似人类的方式与用户互动。这些数字人，结合对话式人工智能的力量，为许多组织在健康、教育、培训和客户服务领域开辟了新的前沿；例如，德国电信、沃达丰、契尔氏和瑞士信贷。
- en: Companies such as UneeQ and Soul Machines are at the forefront of developing
    digital humans that can express emotions, adapt their responses based on the context,
    and learn from each interaction. These types of innovative interfaces integrate
    directly with modern conversational AI systems, handling **speech-to-text** (**STT**)
    and **text-to-speech** (**TTS**) capabilities and supporting **Speech Synthesis
    Markup Language** (**SSML**) and their own action programming languages to show
    human emotions and gestures.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: UneeQ和Soul Machines等公司处于开发能够表达情感、根据情境调整反应并从每次互动中学习的数字人的前沿。这类创新界面可以直接集成到现代对话式人工智能系统中，处理**语音转文本**（**STT**）和**文本转语音**（**TTS**）功能，并支持**语音合成标记语言**（**SSML**）以及它们自己的动作编程语言，以展示人类情感和手势。
- en: In the realm of education and training, digital humans powered by conversational
    AI can be used to create immersive learning experiences that are personalized
    to each learner’s needs. For instance, a digital human can act as a tutor, providing
    one-on-one tutoring in various subjects, or as a training assistant in corporate
    settings, guiding employees through complex processes or systems.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在教育和培训领域，由对话式人工智能驱动的数字人可以用来创建满足每位学习者需求的沉浸式学习体验。例如，一个数字人可以充当导师，提供各种学科的个性化一对一辅导，或在企业环境中充当培训助理，引导员工通过复杂的过程或系统。
- en: Digital human vendors have been early adopters of LLMs and **generative AI**
    (**GenAI**). The possibilities are truly fascinating and open a wide array of
    opportunities for further exploration and development in the field of AI. Many
    companies have realized that the combination of advanced digital human and conversational
    services powered by LLMs enables unique brand experiences.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 数字人供应商是LLM和**生成式人工智能**（**GenAI**）的早期采用者。可能性真正令人着迷，并为AI领域的进一步探索和发展开辟了广泛的机会。许多公司已经意识到，结合高级数字人和由LLM驱动的对话式服务能够实现独特的品牌体验。
- en: 'Creating agents in digital human form helps to create a more personal, empathetic
    interaction and allows applications to be far wider-ranging. Some notable examples
    are the following:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数字人形态的代理有助于创造更个人化、富有同理心的互动，并使应用范围更广泛。以下是一些显著的例子：
- en: '**Mental health applications**: Ellie, a digital human developed by the University
    of Southern California’ Institute for Creative Technologies, has been used to
    conduct interviews with people to screen for signs of depression and post-traumatic
    stress disorder.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**心理健康应用**：南加州大学创意技术研究所开发的数字人Ellie被用于对人们进行访谈，以筛查抑郁症和创伤后应激障碍的迹象。'
- en: '**Medical education**: Digital patients can be used to train medical students
    in patient interaction and diagnosis.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医学教育**：可以使用数字病人来训练医学生进行病人互动和诊断。'
- en: Digital trainers, creating immersive learning experiences that are personalized
    to each learner’s needs. Think of your own personal tutor or a training assistant
    in corporate settings, guiding employees through complex processes or systems.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数字训练师，为每位学习者量身定制沉浸式学习体验。想象一下你自己的私人导师或在企业环境中的一名培训助理，他们引导员工通过复杂的过程或系统。
- en: In the past, even the most advanced intent-based conversational AI systems struggled
    to provide the breadth of conversational experience needed to support these types
    of agents, particularly when conversations involved multiple turns and complex
    contexts. LLM technology is much more capable of offering realistic dialogue.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，即使是基于意图的最先进对话式人工智能系统也难以提供支持这些类型代理所需的对话体验的广度，尤其是在涉及多个回合和复杂上下文的对话中。LLM技术能够提供更真实的对话。
- en: Conclusion
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: We’ve taken a comprehensive look at the realm of conversational AI, exploring
    its applications and acknowledging its limitations. Now, let’s shift our focus
    to the enhanced abilities of ChatGPT. This powerful tool has the potential to
    bring about a fundamental shift in the conversational AI sector, paving the way
    for the creation of more sophisticated virtual assistants, chatbots, and various
    other communication systems and devices.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 我们全面审视了对话式人工智能领域，探讨了其应用并承认了其局限性。现在，让我们将焦点转向ChatGPT的增强能力。这个强大的工具有可能在对话式人工智能领域带来根本性的转变，为更复杂的虚拟助手、聊天机器人和各种其他通信系统和设备铺平道路。
- en: What is OpenAI’s ChatGPT?
  id: totrans-113
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: OpenAI的ChatGPT是什么？
- en: ChatGPT is OpenAI’s chat-specific LLM that uses ML to generate human-like responses
    to your text inputs.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是OpenAI的特定聊天LLM，它使用机器学习来生成对您的文本输入类似人类的响应。
- en: Within just over a month of launching in November 2022, ChatGPT had over 100
    million users. By February 2023, its total website visits had skyrocketed to a
    billion. This meteoric rise has made ChatGPT the fastest-growing consumer software
    application in history.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在2022年11月推出仅一个多月后，ChatGPT的用户数量就超过了1亿。到2023年2月，其总网站访问量飙升至10亿次。这种爆炸性的增长使ChatGPT成为历史上增长最快的消费级软件应用。
- en: ChatGPT can explain scientific and technical concepts in a desired style or
    programming language, brainstorm basically anything you can think of asking...
    and yes, of course, hold complex conversations!
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以以期望的风格或编程语言解释科学和技术概念，基本上可以头脑风暴任何你可以想到的问题……当然，当然可以举行复杂的对话！
- en: Understanding the large language technology behind ChatGPT
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解ChatGPT背后的大型语言技术
- en: 'ChatGPT is built on a type of AI called an LLM. Within the domain of LLMs,
    there are two primary types: basic LLMs and instruction-optimized LLMs. Understanding
    the difference between these two types is important when examining OpenAI’s ChatGPT.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT建立在一种称为LLM的人工智能类型之上。在LLM的领域内，有两种主要类型：基本LLM和指令优化LLM。在检查OpenAI的ChatGPT时，理解这两种类型之间的区别非常重要。
- en: Exploring basic LLMs
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索基本的LLM
- en: Basic LLMs are programmed to predict the subsequent word in a string of words,
    using a vast text dataset obtained from diverse online sources. Their main function
    is to forecast the most probable word that would succeed a given sequence of words.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 基本LLM被编程为预测一串单词中的下一个单词，使用从各种在线来源获得的大量文本数据集。它们的主要功能是预测给定序列的单词之后最可能出现的单词。
- en: At this point, it’s not actually words but tokens that are being predicted;
    more on that later in this section.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，实际上预测的不是单词，而是标记；关于这一点，稍后在本节中会进一步讨论。
- en: To illustrate the context of prediction, let’s look at some examples, starting
    with a narrative generation. If we feed the phrase *Hey diddle diddle, the cat
    and the fiddle* to a basic LLM, it might continue with *the cow jumped over the
    moon*. It uses learned patterns from its vast corpus to predict an interesting
    and contextually relevant next token based on its text training data.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明预测的上下文，让我们看看一些例子，从叙事生成开始。如果我们向一个基本的LLM输入短语“Hey diddle diddle，the cat and
    the fiddle”，它可能会继续说“the cow jumped over the moon”。它使用从其庞大的语料库中学到的模式，根据其文本训练数据预测一个有趣且与上下文相关的下一个标记。
- en: 'Here’s an example of a specific query not being perfectly answered: if you
    were to ask *Who was the president of the United States in 1988?* the basic LLM,
    instead of providing the direct answer (Ronald Reagan), might return with a statement
    such as *The president of the United States is elected every 4 years during the
    general election*. This response, while related to the topic of US presidents,
    doesn’t answer the original question directly, a potential downside of the base
    LLM’s probabilistic prediction approach.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子，说明一个特定查询没有得到完美回答：如果你问“1988年美国总统是谁？”基本LLM，而不是提供直接答案（罗纳德·里根），可能会返回一个这样的声明：“美国总统在总统选举中每4年选举一次。”这个回答虽然与美国总统的主题相关，但并没有直接回答原始问题，这是基本LLM概率预测方法的一个潜在缺点。
- en: Understanding instruction-optimized LLMs and reinforcement learning from human
    feedback
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解指令优化的LLM和基于人类反馈的强化学习
- en: In contrast to base LLMs, instruction-optimized LLMs are specifically developed
    to adhere to instructions more accurately. As such, they are the main area of
    interest in current LLM research and applications.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 与基础LLM相比，指令优化的LLM是专门开发来更准确地遵循指令的。因此，它们是当前LLM研究和应用的主要兴趣领域。
- en: 'Let’s look at the process, which can be broken down into three steps:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个过程，它可以分解为三个步骤：
- en: Pretraining a **language** **model** (**LM**)
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预训练**语言模型**（**LM**）
- en: Gathering data and training a reward model
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收集数据和训练奖励模型
- en: Fine-tuning the LM with **reinforcement** **learning** (**RL**)
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用**强化学习**（**RL**）微调LM
- en: To start the process, an instruction-optimized LLM is initially trained on the
    same large text dataset as a basic LLM. OpenAI used a smaller version of GPT-3
    for its first popular **RL from human feedback** (**RLHF**) model, InstructGPT.
    This model undergoes more fine-tuning with specific instruction-following data,
    leading to more precise responses.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始这个过程，指令优化的LLM最初是在与基本LLM相同的大型文本数据集上训练的。OpenAI为其第一个流行的**基于人类反馈的强化学习**（**RLHF**）模型InstructGPT使用了GPT-3的一个较小版本。该模型通过特定的指令遵循数据进行更多的微调，从而产生更精确的响应。
- en: 'Hence, when asked the question *Who won the Pulitzer Prize for fiction in 2020?*
    an instruction-optimized LLM would likely respond directly with: *The Pulitzer
    Prize for fiction for 2020 was awarded to The Nickel Boys by* *Colson Whitehead*.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当被问及“谁在2020年赢得了普利策小说奖？”时，一个指令优化的LLM可能会直接回答：“2020年的普利策小说奖授予了科尔斯顿·怀特黑德的《镍男孩》。”
- en: To improve the quality of the LLM’s output, a common process is then to obtain
    human ratings of the quality of many different LLM outputs on certain criteria;
    for example, if the output is helpful, truthful, and harmless.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高LLM输出的质量，一个常见的做法是针对某些标准对许多不同LLM输出的质量进行人工评分；例如，如果输出是有帮助的、真实的和无害的。
- en: 'This instruction learning is further honed using a method known as RLHF, which
    essentially optimizes the LM to be more useful. RLHF is a pivotal methodology
    that fine-tunes LLMs, especially instruction-optimized models. The RLHF method
    is based on the principles of RL, a subfield of ML in which an agent acquires
    decision-making skills through interactions with its environment, receiving either
    rewards or penalties as feedback. However, defining explicit rewards for good
    or bad responses in a conversation is intensive and can be impractical at scale.
    To improve how these models respond, we get help from people. AI trainers have
    conversations with the model. When the model gives different responses, the trainers
    decide which ones are best. They rank the answers from best to worst. This ranking
    gives the model a kind of score: good answers get high scores. Then, the model
    uses these scores to learn to give better answers, a process similar to honing
    your skills in a game by analyzing the scores you earn.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这种指令学习通过一种称为RLHF的方法进一步精炼，这种方法本质上优化了LM使其更有用。RLHF是一种关键的方法，它微调LLM，尤其是指令优化的模型。RLHF方法基于强化学习的原则，强化学习是机器学习的一个子领域，其中代理通过与环境的交互获得决策技能，并作为反馈获得奖励或惩罚。然而，在对话中定义明确的奖励或惩罚以区分好或坏的回答是复杂的，并且在大规模上可能不切实际。为了改进这些模型的响应，我们得到了人们的帮助。AI训练师与模型进行对话。当模型给出不同的回答时，训练师决定哪些是最好的。他们将答案从最好到最差进行排名。这种排名给模型一种评分：好的答案得到高分。然后，模型使用这些评分来学习给出更好的答案，这个过程类似于通过分析你获得的分数来磨练你在游戏中的技能。
- en: 'The following diagram outlines the process of RLHF:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表概述了RLHF的过程：
- en: '![Figure 1.5 – The process of RLHF](img/B21100_01_5.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图1.5 – RLHF的过程](img/B21100_01_5.jpg)'
- en: Figure 1.5 – The process of RLHF
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.5 – RLHF的过程
- en: This process is often iterative, with multiple rounds of interaction, feedback
    collection, and fine-tuning to improve the model’s responses. Importantly, RLHF
    allows for more nuanced and context-sensitive feedback than traditional **supervised
    learning** (**SL**), leading to better alignment with human values and a decrease
    in harmful or inappropriate responses.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程通常是迭代的，包括多轮交互、反馈收集和微调，以提高模型的响应。重要的是，RLHF比传统的**监督学习**（**SL**）提供了更细致和上下文相关的反馈，导致与人类价值观的更好对齐，并减少了有害或不适当的响应。
- en: The challenges of RLHF
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RLHF的挑战
- en: Despite its benefits, RLHF also comes with challenges and can produce harmful
    or factually incorrect text.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管RLHF有其好处，但它也伴随着挑战，可能会产生有害或不准确的事实性文本。
- en: The process of gathering human preference data, an essential component of RLHF,
    can be costly due to the necessary inclusion of human workers. RLHF’s effectiveness
    hinges on the quality of its human annotations, which include human-generated
    text and human-preference labels between model outputs. This data gathering often
    requires hiring additional staff, making it costly and challenging for academic
    labs. Furthermore, human annotators can disagree, adding a potential variance
    to the training data.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 收集人类偏好数据的过程，RLHF（强化学习与人类反馈）的一个基本组成部分，可能因为需要包含人类工作者而变得成本高昂。RLHF的有效性取决于其人类标注的质量，这包括人类生成的文本和模型输出之间的人类偏好标签。这种数据收集通常需要雇佣额外的工作人员，这使得它对于学术实验室来说既昂贵又具有挑战性。此外，人类标注者可能存在分歧，这可能会给训练数据带来潜在的变异性。
- en: RLHF is a vital tool in creating effective, safe, and user-friendly instruction-optimized
    LLMs, but it requires careful implementation and ongoing refinement.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: RLHF是创建有效、安全和用户友好的指令优化LLMs的重要工具，但它需要谨慎实施和持续改进。
- en: 'There is still considerable scope for further research to enhance RLHF’s performance.
    There is also potential in open sourcing or crowdsourcing human assistance in
    training these models. At the time of writing, one successful example of open
    sourced RLHF is the Open Assistant model created by LAION, where contributors
    can assist with ranking, labeling, and making responses: [https://open-assistant.io/](https://open-assistant.io/).'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 对于进一步提高RLHF性能的研究仍有相当大的空间。在开源或众包人类协助训练这些模型方面也存在潜力。在撰写本文时，一个成功的开源RLHF示例是LAION创建的Open
    Assistant模型，贡献者可以协助排名、标注和制作回应：[https://open-assistant.io/](https://open-assistant.io/)。
- en: The role of tokens in LMs
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 标记在LLMs中的作用
- en: LLMs such as OpenAI’s GPT-3 do not technically predict words; instead, they
    predict tokens. To understand this concept, it’s important to recognize what tokens
    are and how tokenization works.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的GPT-3等LLMs在技术上并不预测单词；相反，它们预测标记。要理解这个概念，重要的是要认识到标记是什么以及标记化是如何工作的。
- en: Tokenization is a common process in NLP that involves breaking down text into
    smaller units, called tokens. Depending on the tokenization strategy, these tokens
    can represent a whole word, a part of a word, or even punctuation.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 标记化是NLP（自然语言处理）中的一种常见过程，涉及将文本分解成更小的单元，称为标记。根据标记化策略，这些标记可以代表整个单词、单词的一部分，甚至标点符号。
- en: 'In English, a token is often equivalent to a word, but this isn’t always the
    case. Some tokenization approaches, such as WordPiece, **Byte-Pair Encoding**
    (**BPE**), or Unigram LMs, used by models such as GPT-3, break down words into
    smaller subword units. For instance, the word “conversational ai” might be split
    into five tokens: *[“con”, “versa”, “**ational”,” a”,”i”]*.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在英语中，标记通常等同于单词，但这并不总是如此。一些标记化方法，如GPT-3等模型使用的WordPiece、**字节对编码（BPE**）或单语LM，将单词分解成更小的子单词单元。例如，“conversational
    ai”这个单词可能被分成五个标记：*[“con”, “versa”, “**ational”,” a”,”i”]*。
- en: When we say LLMs predict tokens, it means the model’s task is to predict the
    most probable next token given a sequence of previous tokens. This token-level
    prediction allows the model to handle a vast range of vocabulary, including rare
    words, names, and even neologisms. It also helps the model to handle languages
    other than English more effectively, as many languages have complex morphology
    that can’t be adequately represented at a simple word level.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们说LLMs预测标记时，这意味着模型的任务是根据先前标记序列预测最可能的下一个标记。这种标记级预测使模型能够处理广泛的词汇，包括罕见单词、人名甚至新词。它还有助于模型更有效地处理除英语以外的语言，因为许多语言具有复杂的形态学，这些形态学在简单的单词级别上无法得到充分表示。
- en: This is crucial to LLMs’ ability to generate coherent and contextually appropriate
    text. By predicting the next token in a sequence, the model can build up sentences
    and complete thoughts, giving the appearance of understanding and generating NL.
    However, it’s essential to understand that these models do not truly comprehend
    the text they generate; they are probabilistic models that generate sequences
    based on patterns learned during their training.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于LLMs（大型语言模型）生成连贯且上下文适当的文本的能力至关重要。通过预测序列中的下一个标记，模型可以构建句子并完成思想，给人一种理解和生成自然语言（NL）的假象。然而，理解这些模型并不真正理解它们生成的文本是至关重要的；它们是基于在训练期间学习到的模式进行序列生成的概率模型。
- en: Token costs serve as the foundation for determining the cost of OpenAI’s LLMs,
    including ChatGPT, which have multiple models with varying capabilities and price
    options, which we’ll cover in later chapters.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 令牌成本是确定 OpenAI 的语言模型（包括 ChatGPT）成本的基础，这些模型具有不同的能力和价格选项，我们将在后续章节中介绍。
- en: Understanding OpenAI’s LMs
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解 OpenAI 的语言模型
- en: OpenAI has emerged as a pioneer in the domain of conversational AI with its
    ground-breaking LMs, GPT.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI凭借其开创性的语言模型 GPT，已成为对话人工智能领域的先驱。
- en: The evolution of OpenAI’s LMs
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OpenAI 的语言模型演变
- en: OpenAI’s GPT-3 serves as the foundational architecture for ChatGPT and has undergone
    a number of advancements since its release in 2020.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 的 GPT-3 作为 ChatGPT 的基础架构，自 2020 年发布以来已经经历了多次改进。
- en: GPT-3
  id: totrans-154
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GPT-3
- en: 'Unveiled in June 2020, GPT-3 set a new standard for language generation capabilities
    with its different base models: Ada, Babbage, Curie, and Davinci. Each variant
    had its unique characteristics.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 2020 年 6 月发布的 GPT-3，凭借其不同的基础模型：Ada、Babbage、Curie 和 Davinci，为语言生成能力设定了新的标准。每个变体都有其独特的特点。
- en: GPT-3.5
  id: totrans-156
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GPT-3.5
- en: GPT-3.5 was introduced as an optimized version for text-completion tasks, and
    one model was exclusively designed for code-completion tasks. The latest version
    in this series, `gpt-3.5-turbo`, was launched in March 2023\. `gpt-3.5-turbo`
    is the most advanced GPT-3.5 model, specifically optimized for chat applications.
    Most importantly, it was a tenth of the cost of the `text-davinci-003` model.
    This model can handle up to 4,096 tokens, and its knowledge is up to date until
    September 2021\. Also created is the `gpt-3.5-turbo-16k` model. This has the same
    capabilities as the standard `gpt-3.5-turbo` model, but it provides four times
    the context, allowing for longer and more complex conversations.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3.5 作为文本补全任务的优化版本被引入，其中一个模型专门用于代码补全任务。这一系列中的最新版本 `gpt-3.5-turbo` 于 2023
    年 3 月推出。`gpt-3.5-turbo` 是最先进的 GPT-3.5 模型，专门针对聊天应用进行了优化。最重要的是，它的成本仅为 `text-davinci-003`
    模型的十分之一。该模型可以处理高达 4,096 个令牌，其知识更新至 2021 年 9 月。还创建了 `gpt-3.5-turbo-16k` 模型。这个模型与标准
    `gpt-3.5-turbo` 模型具有相同的性能，但提供了四倍的上下文，允许进行更长和更复杂的对话。
- en: GPT-4
  id: totrans-158
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GPT-4
- en: 'Introduced on March 14, 2023, GPT-4 has been dubbed as the most advanced of
    the OpenAI LMs. It boasts increased factual accuracy, multimodality with image
    processing capabilities, and creative outputs. It offers two model variants: `gpt-4-8k`
    and `gpt-4-32k`, distinguished by their context window sizes.'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 2023 年 3 月 14 日推出的 GPT-4 被誉为 OpenAI 语言模型中最先进的。它拥有更高的事实准确性、多模态图像处理能力和创意输出。它提供两种模型变体：`gpt-4-8k`
    和 `gpt-4-32k`，它们由其上下文窗口大小区分。
- en: Key differences between GPT-3, GPT-3.5, and GPT-4
  id: totrans-160
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GPT-3、GPT-3.5 和 GPT-4 之间的关键差异
- en: 'There are some key differences between the available models offering a range
    of capabilities, context capacity, and input types:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在提供各种能力、上下文容量和输入类型的可用模型之间有一些关键差异：
- en: '**Capabilities**: GPT-4 significantly outperforms its predecessors in reliability,
    creativity, collaboration, and handling of nuanced instructions. Test comparisons
    conducted by OpenAI on different benchmarks have proven GPT-4’s superiority in
    various domains.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能力**：GPT-4 在可靠性、创造力、协作和细微指令处理方面显著优于其前辈。OpenAI 在不同基准上进行的测试比较证明了 GPT-4 在各个领域的优越性。'
- en: '**Context length**: One of the most prominent distinctions between the GPT
    versions is the context length. While GPT-3 models could process a maximum of
    2,049 tokens, GPT-3.5 improved this to 4,096 tokens. GPT-4 took a giant leap,
    with its two models capable of handling 8,192 and 32,768 tokens respectively.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文长度**：GPT 版本之间最显著的差异之一是上下文长度。虽然 GPT-3 模型可以处理最多 2,049 个令牌，但 GPT-3.5 将此提升至
    4,096 个令牌。GPT-4 实现了巨大的飞跃，其两个模型分别可以处理 8,192 和 32,768 个令牌。'
- en: '**Input types**: GPT-4 goes beyond processing text inputs and has the capacity
    to handle images. This unique ability can revolutionize its applications across
    domains.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入类型**：GPT-4 不仅能够处理文本输入，还具有处理图像的能力。这种独特的能力可以彻底改变其在各个领域的应用。'
- en: '**Cost implications**: Greater capabilities come with a steeper price. GPT-4’s
    advanced features command higher costs per 1K tokens for prompt and completion.
    The usage cost is not just higher but also more unpredictable due to the different
    costs for input and output tokens.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本影响**：更高的能力伴随着更高的价格。GPT-4 的先进功能使得每 1K 令牌的提示和完成成本更高。由于输入和输出令牌的不同成本，使用成本不仅更高，而且也更不可预测。'
- en: While GPT-4 undoubtedly sets new benchmarks in the realm of conversational AI,
    it’s important to remember that it doesn’t make GPT-3 and GPT-3.5 obsolete. Each
    of these models offers unique capabilities and potential applications.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然GPT-4无疑在对话人工智能领域设定了新的基准，但重要的是要记住，它并没有使GPT-3和GPT-3.5过时。每个模型都提供了独特的功能和潜在的应用。
- en: Conclusion
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, the ChatGPT models are based on RLHF and the GPT series of models
    from OpenAI, which are themselves trained on extraordinarily large amounts of
    data.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，ChatGPT模型基于强化学习（RLHF）和OpenAI的GPT系列模型，这些模型本身是在大量数据上训练的。
- en: To create ChatGPT, the latest GPT-3.5 Instruct model was fine-tuned with conversation
    examples instead of the whole internet to concentrate on improving the model’s
    specialist conversation abilities. RL was then used so that the model could practice
    its conversational skills and improve its responses.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建ChatGPT，最新的GPT-3.5指令模型通过对话示例进行了微调，而不是整个互联网，以集中提高模型的专业对话能力。然后使用强化学习（RL）使模型能够练习其对话技能并改进其响应。
- en: In the next sections, we’ll explore in more detail its abilities, use cases,
    and transformative effect on the landscape of conversational AI.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将更详细地探讨其能力、用例以及对对话人工智能领域格局的变革性影响。
- en: Capabilities and applications of ChatGPT
  id: totrans-171
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT的能力和应用
- en: LLMs offer a plethora of practical uses, with ChatGPT distinguishing itself
    through its advanced NLP capabilities. In this section, we unpack the array of
    applications that this technology brings to the table and a summary of the standout
    industry areas where ChatGPT holds the most potential. While many of these use
    cases are not necessarily new for conversational AI applications, it’s true to
    say that ChatGPT can potentially take on more advanced tasks.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）提供了大量的实用用途，ChatGPT通过其先进的自然语言处理（NLP）能力脱颖而出。在本节中，我们将探讨这项技术带来的各种应用，以及ChatGPT在最具潜力的行业领域中的突出表现。虽然许多这些用例对于对话人工智能应用来说并不一定新颖，但ChatGPT确实有可能承担更高级的任务。
- en: Capabilities of ChatGPT
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT的能力
- en: In the following sections, we’ll explore the various applications of ChatGPT,
    starting with NLU and **NL generation** (**NLG**) for chatbots and virtual assistants.
    Then, we’ll move on to its capabilities in machine translation, summarization,
    sentiment analysis, and content creation. Additional topics include its use in
    spam filtering, language tutoring, and software development. Finally, we’ll discuss
    the extended features available through ChatGPT plugins.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将探讨ChatGPT的各种应用，从NLU和**自然语言生成（NLG**）用于聊天机器人和虚拟助手开始。然后，我们将继续探讨其在机器翻译、摘要、情感分析和内容创作方面的能力。其他主题包括其在垃圾邮件过滤、语言教学和软件开发中的应用。最后，我们将讨论通过ChatGPT插件提供的扩展功能。
- en: NLU and NLG for chatbots and virtual assistants
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NLU和NLG用于聊天机器人和虚拟助手
- en: Conversational capabilities are the core focus of this book, and we will look
    at these in more detail.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 对话能力是本书的核心焦点，我们将更详细地探讨这些内容。
- en: The revolutionary capabilities of ChatGPT, particularly its ability to maintain
    complex multi-turn conversations across diverse topics and styles, mark a major
    milestone in the field of conversational AI. ChatGPT can be used to carry out
    what most conversational AI systems and experiences have often struggled to achieve.
    For seasoned practitioners who have been operating with intent-based systems and
    are aware of the challenges, the advent of ChatGPT has truly been transformative.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的革命性能力，尤其是其能够在不同主题和风格中维持复杂的多轮对话的能力，标志着对话人工智能领域的重大里程碑。ChatGPT可以用来完成大多数对话人工智能系统和体验经常难以实现的事情。对于一直使用基于意图的系统并了解挑战的资深从业者来说，ChatGPT的出现确实具有变革性。
- en: It must be noted that it’s also exciting to see the coverage that conversational
    AI is now receiving across various media platforms, including TV, radio, and press.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 必须指出，看到对话人工智能现在在各种媒体平台上获得的关注，包括电视、广播和报纸，也是非常令人兴奋的。
- en: As well as powering conversations, the less obvious use case is that ChatGPT
    can also be used as a tool to create and manage conversational AI applications,
    which are still powered by intent-based systems. We’ll look in more detail at
    these applications in [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 除了支持对话之外，一个不那么明显用例是ChatGPT还可以用作创建和管理基于意图系统的对话人工智能应用的工具。我们将在[*第二章*](B21100_02.xhtml#_idTextAnchor057)中更详细地探讨这些应用。
- en: Machine translation between languages
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器翻译之间的语言
- en: ChatGPT supports 95 languages. The language translation technology in models
    such as ChatGPT bridges language barriers in sectors such as education and travel.
    By learning from past interactions, these systems deliver accurate real-time translations,
    enhancing cross-cultural communication.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: Summarization of articles, reports, or other text documents
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT models excel at condensing complex topics into concise, easily understandable
    summaries. They can rapidly process large volumes of text, providing users with
    precise, digestible information and eliminating the need for manual research.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: Sentiment analysis for market research or social media monitoring
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By understanding and generating human-like responses, tools such as ChatGPT
    provide businesses with deeper insights into customer sentiments. They can be
    integrated into systems for analyzing and flagging potentially fraudulent activities,
    particularly in sectors such as banking.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: Content generation for marketing, social media, or creative writing
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Content creators can harness ChatGPT to generate compelling content efficiently.
    From blog posts and marketing materials to social media posts, the model generates
    unique, user-tailored content. It can even offer topic suggestions, proofreading,
    and editing services.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: Spam filtering, topic categorization, or document organization
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In any industry, ChatGPT can be used to categorize customer inquiries, detect
    suspicious transactions, and analyze content.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: Personalized language learning and tutoring tools
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The language support offered by models such as ChatGPT, which understands over
    40 languages, extends to personalized language learning tools. They can handle
    inquiries and help in multiple languages, thereby enhancing accessibility and
    user experience in language learning.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: Code generation and software development assistance
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'ChatGPT can understand and produce code in multiple languages, including the
    following:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: Python
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: JavaScript
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: C++
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: C#
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Java
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ruby
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PHP
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Go
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Swift
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: TypeScript
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SQL
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Shell
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ChatGPT simplifies debugging and code refactoring tasks, offering efficient
    solutions to complex coding problems. It can quickly locate potential problems,
    automate manual tasks, and provide highly accurate results, making it a valuable
    tool for software developers.
  id: totrans-206
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'ChatGPT plugins have also extended these capabilities with the creation of
    their own code interpreter plugin aimed at handling some specific tasks:'
  id: totrans-207
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Solving mathematical problems
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Carrying out data analysis and visualization
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Converting files between formats
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Working with images
  id: totrans-211
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT can’t generate images. However, when used with GPT-4, it can analyze
    infographics and images and answer questions based on the input. For example,
    you can input a picture of food ingredients and it will come up with a recipe,
    or it can describe an infographic.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: When used with other technologies by using the new plugin capabilities, it’s
    also possible to create graphics by passing an image description to these services.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT plugins
  id: totrans-214
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT plugins were released in March and are an innovative development by
    OpenAI, aimed at expanding the real-world applications, impact, and safety of
    GPT-4 and ChatGPT.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT插件于3月份发布，是OpenAI的一项创新发展，旨在扩大GPT-4和ChatGPT的现实世界应用、影响和安全。
- en: ChatGPT plugins serve as specialized extensions, crafted to augment the features
    of LMs. They provide ChatGPT with the ability to access real-time information,
    execute computational tasks, and interface with third-party services.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT插件作为专门的扩展，旨在增强语言模型的功能。它们使ChatGPT能够访问实时信息，执行计算任务，并与第三方服务交互。
- en: Developers can architect plugins for ChatGPT, and the model is furnished with
    specific instructions on leveraging each plugin through comprehensive documentation.
    Conceptually, plugins function as sensory inputs for LMs, empowering them to fetch
    information that is too recent, personal, or context-specific to be part of the
    original training data. They also permit the model to perform secure, bounded
    actions in response to users’ explicit requests.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者可以为ChatGPT设计插件，并且模型通过全面的文档提供了如何利用每个插件的具体说明。从概念上讲，插件作为语言模型（LM）的感觉输入，使它们能够获取太新、太个人化或太特定于上下文的信息，这些信息原本不可能成为原始训练数据的一部分。它们还允许模型在用户的明确请求下执行安全、有限的操作。
- en: Plugins present a wealth of advantages. They address intrinsic challenges associated
    with LLMs, such as hallucinations (which we will cover later in this chapter),
    keeping abreast with recent developments, and accessing proprietary information
    sources with requisite permissions. By facilitating explicit access to external
    data, LMs can enrich their responses with reference-based evidence, enhancing
    the utility of the model and allowing users to cross-verify the accuracy of the
    output.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 插件提供了丰富的优势。它们解决了与LLMs相关的内在挑战，例如幻觉（我们将在本章后面讨论）、跟上最新发展以及访问需要权限的专有信息源。通过促进对外部数据的明确访问，LLMs可以使用基于证据的参考来丰富其响应，增强模型的效用，并使用户能够交叉验证输出的准确性。
- en: Plugins go beyond merely addressing current limitations; they pave the way for
    practically any use case. Collaborations between OpenAI and companies from diverse
    industries are revolutionizing our interactions with technology, from browsing
    product catalogs and making flight reservations to ordering products directly
    from organizations.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 插件不仅解决了当前的局限性，还为几乎任何用例铺平了道路。OpenAI与来自不同行业的公司之间的合作正在改变我们与技术互动的方式，从浏览产品目录和预订航班到直接从组织订购产品。
- en: As the ChatGPT plugin ecosystem continues to grow, we can expect to see even
    more innovative applications and solutions that leverage the power of ChatGPT.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 随着ChatGPT插件生态系统的持续发展，我们可以期待看到更多利用ChatGPT力量的创新应用和解决方案。
- en: OpenAI released its own plugins, a web browser, and a code interpreter, as well
    as several third-party plugins from trusted providers.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI发布了自己的插件，包括网页浏览器和代码解释器，以及来自受信任提供商的几个第三方插件。
- en: How smart is ChatGPT?
  id: totrans-222
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT有多聪明？
- en: AI, especially when it comes to LMs such as ChatGPT, isn’t necessarily “smart”
    in the traditional human sense. So, basically, it doesn’t have consciousness or
    self-awareness. Instead, it shows a high level of ability in understanding and
    generating human-like text, thereby appearing smart.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: AI，尤其是像ChatGPT这样的语言模型，在传统的人类意义上并不一定“聪明”。所以，基本上，它没有意识或自我意识。相反，它在理解和生成类似人类的文本方面表现出高水平的能力，从而显得聪明。
- en: Recent studies have attempted to quantify the smartness of AI models such as
    ChatGPT, GPT-3, and GPT-4 by putting them through their paces with IQ tests and
    real-world applications.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 最近的研究试图通过进行智商测试和现实世界应用来量化ChatGPT、GPT-3和GPT-4等AI模型的智能程度。
- en: OpenAI put GPT-3.5 and GPT-4 through several professional and academic benchmarks,
    as well as benchmarks designed for ML models.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI对GPT-3.5和GPT-4进行了多项专业和学术基准测试，以及为机器学习模型设计的基准测试。
- en: 'The results are well documented here: [https://openai.com/research/gpt-4](https://openai.com/research/gpt-4).'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 结果在此处有详细记录：[https://openai.com/research/gpt-4](https://openai.com/research/gpt-4)。
- en: The results show that these GPT models have proven proficiency levels at par
    with, and in some cases surpassing, the average human performance in various domains.
    For instance, ChatGPT achieved scores placing it in the 99.9th percentile on verbal-linguistic
    IQ and the Raven’s ability test, which measures abstract reasoning and problem-solving
    skills.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，这些GPT模型在各个领域的表现水平与平均水平相当，在某些情况下甚至超过了平均水平。例如，ChatGPT在语言智力测试和雷文测试（衡量抽象推理和解决问题的能力）中取得了分数，使其位于99.9百分位。
- en: The impressive achievements of ChatGPT don’t stop there. It has successfully
    passed a Spanish medical examination and the **United States Medical Licensing
    Examination** (**USMLE**), outperformed college students on the Raven’s Progressive
    Matrices aptitude test, and even passed an MBA degree exam at Wharton. In addition,
    GPT-3.5, a later variant of GPT-3, successfully passed the US bar exam and the
    US **Certified Public Accountant** (**CPA**) exam.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT令人印象深刻的成就不止于此。它成功通过了西班牙医学考试和**美国医学执照考试**（**USMLE**），在雷文渐进矩阵能力测试中优于大学生，甚至通过了沃顿商学院的MBA学位考试。此外，GPT-3.5，GPT-3的一个后续版本，成功通过了美国律师资格考试和美国**注册会计师**（**CPA**）考试。
- en: ChatGPT has also been used in real-world applications. It assisted a judge with
    a verdict in Colombia, wrote several bills in the US, and even made the cover
    of *TIME* magazine. The achievements of these AI models offer a remarkable testament
    to the potential of the technology.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT也已经在现实世界中得到了应用。它在哥伦比亚协助法官做出裁决，在美国撰写了几个法案，甚至登上了《*时代*》杂志的封面。这些AI模型的成就为这项技术的潜力提供了令人瞩目的证明。
- en: The achievements of ChatGPT and its variants illustrate the profound capabilities
    of these AI models. However, while these scores and successes highlight their
    proficiency in understanding and generating text, it’s crucial to remember that
    they don’t equate to human-like intelligence or consciousness. AI’s “smartness”
    lies in its programming and its ability to process and generate text based on
    that programming. The “smartness” of ChatGPT, as demonstrated by its high IQ scores
    and real-world applications, is a testament to the impressive strides made in
    the field of conversational AI.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT及其变体的成就展示了这些AI模型的强大能力。然而，尽管这些分数和成功凸显了它们在理解和生成文本方面的熟练程度，但我们必须记住，它们并不等同于人类的智能或意识。AI的“智能”在于其编程以及根据该编程处理和生成文本的能力。ChatGPT的“智能”，正如其高智商分数和现实世界应用所证明的，是对话式人工智能领域取得的令人印象深刻的进步的证明。
- en: Applications of ChatGPT
  id: totrans-231
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT的应用
- en: Moving on from the applications of traditional conversational AI approaches
    and, specifically, more intent-based approaches, let’s look at some real-world
    applications of ChatGPT.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 从传统对话式人工智能方法的运用，特别是更基于意图的方法，过渡到ChatGPT的一些实际应用，让我们来看看ChatGPT在现实世界中的应用。
- en: Business and finance
  id: totrans-233
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 商业和金融
- en: 'The adoption of AI in the business and finance sector has seen a significant
    rise in the recent past. From automating financial report generation to identifying
    potential financial risks, ChatGPT has proven to be a valuable tool in streamlining
    operations and contributing to data-driven decision-making:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，商业和金融领域对AI的采用显著增加。从自动化财务报告生成到识别潜在的金融风险，ChatGPT已被证明是简化运营和促进数据驱动决策的有价值工具：
- en: '**Customer service chatbots**: A critical application of ChatGPT, conversational
    AI can be leveraged in any role where customer support needs to be handled intelligently
    and at scale. ChatGPT provides a front-line interaction platform, creating agents
    equipped to handle customer inquiries, process transactions, and even offer personalized
    product recommendations.'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户服务聊天机器人**：ChatGPT的一个关键应用，对话式人工智能可以在任何需要智能和大规模处理客户支持的职位中得到利用。ChatGPT提供了一个前线交互平台，创建能够处理客户咨询、处理交易甚至提供个性化产品推荐的代理。'
- en: '**Market analysis and forecasting**: ChatGPT’s capabilities extend to the domain
    of market analysis and forecasting, where it can analyze vast volumes of financial
    data to identify patterns and trends and provide insights into market conditions.
    It can generate analytical summaries that offer a comprehensive understanding
    of the financial landscape.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**市场分析和预测**：ChatGPT的能力扩展到市场分析和预测领域，它可以分析大量财务数据以识别模式和趋势，并对市场状况提供见解。它可以生成分析摘要，提供对金融格局的全面理解。'
- en: '**Investment management**: ChatGPT’s data analysis capabilities also make it
    a valuable tool for investment management. It can help businesses and investors
    make informed decisions by offering personalized investment recommendations that
    consider individual risk profiles and financial goals.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资管理**：ChatGPT的数据分析能力也使其成为投资管理的宝贵工具。它可以通过提供个性化的投资建议，考虑个人风险特征和财务目标，帮助企业和投资者做出明智的决策。'
- en: '**Fraud detection**: In the realm of financial security, ChatGPT can be leveraged
    to detect fraudulent activity. By analyzing transaction data and identifying patterns
    indicative of fraudulent activities, ChatGPT can provide robust fraud detection
    mechanisms.'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欺诈检测**：在金融安全领域，ChatGPT可以用来检测欺诈活动。通过分析交易数据并识别欺诈活动的指示性模式，ChatGPT可以提供强大的欺诈检测机制。'
- en: '**Risk management**: ChatGPT is also instrumental in risk management. By analyzing
    financial data and identifying potential risks, it can help businesses and financial
    institutions devise strategies to mitigate those risks.'
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险管理**：ChatGPT在风险管理中也发挥着重要作用。通过分析财务数据并识别潜在风险，它可以帮助企业和金融机构制定减轻这些风险的策略。'
- en: '**Financial reporting**: By analyzing data and providing insights into financial
    performance, ChatGPT can be used to automate the generation of financial reports.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**财务报告**：通过分析数据和提供对财务表现的见解，ChatGPT可以用于自动化生成财务报告。'
- en: To sum up, the applications of ChatGPT in the business and finance sector are
    vast and transformative. From augmenting customer service with chatbots to identifying
    risks and fraud, this AI model offers a myriad capabilities, revolutionizing traditional
    business operations and paving the way for a future dominated by smart, data-driven
    strategies.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，ChatGPT在商业和金融领域的应用广泛且具有变革性。从通过聊天机器人增强客户服务到识别风险和欺诈，这个AI模型提供了众多功能，颠覆了传统的业务运营，并为由智能、数据驱动策略主导的未来铺平了道路。
- en: Healthcare and medical applications
  id: totrans-242
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 医疗和医学应用
- en: 'Probably an area fraught with the most ethical and regulatory challenges. In
    healthcare, ChatGPT’s robust conversational experiences can be employed in healthcare
    and medical applications. From helping in diagnoses and treatment planning to
    driving patient engagement, there are many use cases in this area:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 可能是充满最多伦理和监管挑战的领域。在医疗保健领域，ChatGPT强大的对话体验可以应用于医疗和医学应用。从帮助诊断和治疗计划到推动患者参与，这个领域有许多用例：
- en: '**Chatbot for patient triage**: ChatGPT can be an instrumental tool in the
    development of chatbots designed for patient triage. Such systems help healthcare
    providers assess the urgency of a patient’s condition and find the most appropriate
    course of action.'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**患者分诊聊天机器人**：ChatGPT可以成为开发用于患者分诊的聊天机器人的重要工具。这类系统有助于医疗保健提供者评估患者状况的紧迫性，并找到最合适的行动方案。'
- en: '**Medical diagnoses and treatment recommendations**: One of the compelling
    applications of ChatGPT lies in aiding with medical diagnoses and treatment recommendations
    to help improve the accuracy and efficacy of treatment plans. By analyzing patient
    data, symptoms, and medical histories, ChatGPT can provide medical professionals
    with valuable insights and suggestions for diagnosis and treatment.'
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医学诊断和治疗建议**：ChatGPT的一个令人信服的应用在于协助医学诊断和治疗建议，以帮助提高治疗计划的准确性和有效性。通过分析患者数据、症状和医疗史，ChatGPT可以为医疗专业人员提供有价值的见解和建议，用于诊断和治疗。'
- en: '**Medical education**: ChatGPT’s ability to supply accurate and comprehensive
    information makes it a valuable tool for medical education. It can serve as a
    resource for healthcare providers and patients alike, offering information on
    a wide array of medical conditions and treatment options.'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**医学教育**：ChatGPT提供准确和全面信息的能力使其成为医学教育的宝贵工具。它可以作为医疗保健提供者和患者的信息资源，提供关于各种医疗状况和治疗选项的信息。'
- en: 'Employing ChatGPT in the role of a trainer or interviewer is also where the
    technology can shine:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT应用于培训师或面试官的角色也是该技术可以大放异彩的领域：
- en: '**Mental health counseling**: ChatGPT can serve as a base for chatbots designed
    to provide mental health counseling. By analyzing patient data and offering personalized
    recommendations, these chatbots can aid patients in managing their mental health
    conditions. Although not a replacement for professional counseling, these AI-enabled
    platforms can give initial support and guidance.'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**心理健康咨询**: ChatGPT 可以作为设计用于提供心理健康咨询的聊天机器人的基础。通过分析患者数据并提供个性化建议，这些聊天机器人可以帮助患者管理他们的心理健康状况。尽管不能替代专业咨询，但这些人工智能平台可以提供初步的支持和指导。'
- en: We’ve seen conversational AI technology successfully implemented in this use
    case in a number of chatbot products, such as Woebot ([https://woebothealth.com](https://woebothealth.com))
    and Wysa ([https://www.wysa.com](https://www.wysa.com)).
  id: totrans-249
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们已经看到，会话式人工智能技术在多个聊天机器人产品中成功应用，例如 Woebot ([https://woebothealth.com](https://woebothealth.com))
    和 Wysa ([https://www.wysa.com](https://www.wysa.com))。
- en: '**Patient engagement and adherence**: ChatGPT can also be utilized to bolster
    patient engagement and adherence to treatment plans. It can generate personalized
    reminders and recommendations, aiding patients in adhering to their prescribed
    regimen. This form of AI-driven patient engagement is particularly beneficial
    for chronic disease management where medication compliance is key.'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**患者参与和依从性**: ChatGPT 还可以用来加强患者参与和治疗方案的依从性。它可以生成个性化的提醒和建议，帮助患者遵守他们的处方方案。这种由人工智能驱动的患者参与方式对于慢性病管理尤其有益，因为药物依从性至关重要。'
- en: The applications of ChatGPT in healthcare and medicine are multifaceted and
    impactful. By providing reliable and data-driven solutions in diagnosis, patient
    engagement, and research, ChatGPT is paving the way for a new era of AI-assisted
    healthcare.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 在医疗和医学领域的应用是多方面的，并且具有深远的影响。通过在诊断、患者参与和研究方面提供可靠和基于数据的解决方案，ChatGPT 正在为人工智能辅助医疗的新时代铺平道路。
- en: Law and legal services
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 法律和法律服务
- en: 'AI is increasingly penetrating all sectors, and the legal domain is no exception.
    ChatGPT’s applications range from summarizing legal documents and assisting in
    drafting legal briefs to providing insights for legal research and facilitating
    efficient communication among legal professionals:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在越来越多地渗透到各个领域，法律领域也不例外。ChatGPT 的应用范围从总结法律文件、协助起草法律简报到提供法律研究和促进法律专业人士之间高效沟通的见解：
- en: '**Contract review**: ChatGPT can play a crucial role in scrutinizing contracts
    to pinpoint legal concerns such as inconsistencies or vague terms that need further
    examination or amendment.'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合同审查**: ChatGPT 在审查合同时可以发挥关键作用，能够发现需要进一步审查或修改的法律问题，如不一致或含糊不清的条款。'
- en: '**Legal advice chatbots**: Again, another conversational AI-specific use case.
    ChatGPT can form the basis of legal advice chatbots capable of helping clients
    with legal inquiries. A ChatGPT-powered agent can analyze legal data and provide
    personalized recommendations to help clients understand their options.'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**法律咨询聊天机器人**: 再次，这是另一个特定于会话式人工智能的应用场景。ChatGPT 可以作为法律咨询聊天机器人的基础，能够帮助客户处理法律咨询。由
    ChatGPT 驱动的代理可以分析法律数据，并提供个性化的建议，帮助客户了解他们的选择。'
- en: '**Document drafting**: ChatGPT can be used to streamline the drafting of complex
    legal documents such as contracts and briefs by analyzing relevant legal data
    and proposing well-informed content and suggestions.'
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档起草**: ChatGPT 可以通过分析相关法律数据，提出有见地的内容和建议，从而简化复杂法律文件（如合同和简报）的起草过程。'
- en: '**Due diligence and e-discovery**: ChatGPT can be a powerful tool for conducting
    due diligence and e-discovery, capable of assessing legal documents, executing
    background verifications, and recognizing probable legal challenges, as well as
    helping to pinpoint pertinent documents and data during legal disputes by scrutinizing
    textual data and identifying prevailing trends and patterns.'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**尽职调查和电子发现**: ChatGPT 可以成为进行尽职调查和电子发现的有力工具，能够评估法律文件、执行背景调查、识别可能的法律挑战，以及通过审查文本数据、识别主导趋势和模式，帮助在法律纠纷中确定相关的文件和数据。'
- en: In conclusion, the implications of ChatGPT for law and legal services are profound.
    It offers transformative solutions that augment the capabilities of legal professionals,
    enabling them to perform their duties more efficiently and effectively. From facilitating
    legal research and contract reviews to streamlining the drafting of legal documents
    and expediting e-discovery, ChatGPT is indeed revolutionizing the field of legal
    services, shaping a future where AI and legal practice are intrinsically intertwined.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，ChatGPT对法律和法律服务的影响是深远的。它提供了变革性的解决方案，增强了法律专业人士的能力，使他们能够更高效、更有效地履行职责。从促进法律研究和合同审查，到简化法律文件的起草和加快电子发现，ChatGPT确实正在改变法律服务领域，塑造一个AI和法律实践内在交织的未来。
- en: Education and training
  id: totrans-259
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 教育和培训
- en: 'Education and training are a hot topic when it comes to ChatGPT and LLMs in
    general. As the LLMs have gotten smarter, so have their applications in education
    and training, from providing real-time feedback, generating engaging educational
    content, assisting educators, and creating adaptive learning environments:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 教育和培训是关于ChatGPT以及一般LLMs的热门话题。随着LLMs变得越来越智能，它们在教育领域的应用也变得更加广泛，从提供实时反馈、生成吸引人的教育内容、协助教育工作者和创建适应性学习环境：
- en: '**Personalized learning**: ChatGPT can play a critical role in personalizing
    learning experiences. By using data on learners’ preferences, strengths, weaknesses,
    or ability levels, ChatGPT can generate recommendations for learning materials
    and activities, adhering to a personalized program in any specific domain.'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化学习**：ChatGPT在个性化学习体验中可以发挥关键作用。通过使用关于学习者偏好的数据、优势、劣势或能力水平，ChatGPT可以生成学习材料和活动的建议，遵循任何特定领域的个性化计划。'
- en: '**Teacher support**: Similarly, ChatGPT can assist educators significantly
    by suggesting targeted recommendations for lesson plans based on specific age,
    curriculum, or level and providing different techniques for classroom management
    and teaching approaches.'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教师支持**：同样，ChatGPT可以通过根据特定年龄、课程或水平提出针对性的课程计划建议，以及提供不同的课堂管理和教学方法，显著地协助教育工作者。'
- en: '**Test preparation**: ChatGPT can be an essential tool for test preparation.
    It can offer recommendations for study materials, as well as create practice exams
    and test papers.'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**考试准备**：ChatGPT可以成为考试准备的重要工具。它可以提供学习材料的建议，以及创建练习考试和试卷。'
- en: These capabilities can also enable rich learning experiences when coupled with
    new mediums such as digital humans.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 这些能力还可以通过与新的媒介，如数字人相结合，实现丰富的学习体验。
- en: In conclusion, the intersection of AI and education opens a multitude of possibilities.
    The use of AI LMs such as ChatGPT in the educational sector is having profound
    effects on teaching and learning practices. From personalized learning and teacher
    support to language learning, test preparation, and online tutoring, ChatGPT’s
    applications are helping to reshape the educational landscape, making it more
    personalized, engaging, and effective. As we move forward, we can expect to see
    even more innovative uses of AI in education, ushering in a new era of learning
    empowered by technology.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，AI与教育的交汇点开辟了无数的可能性。在教育领域使用AI语言模型如ChatGPT对教学和学习实践产生了深远的影响。从个性化学习、教师支持到语言学习、考试准备和在线辅导，ChatGPT的应用正在帮助重塑教育格局，使其更加个性化、吸引人、有效。随着我们继续前进，我们可以期待在教育中看到更多创新的AI应用，引领一个由技术赋能的新学习时代。
- en: Many of the applications listed here are like the use cases covered in an earlier
    part of this chapter, *Understanding conversational AI applications*. It’s no
    surprise that conversational AI solutions have been developed for many of them
    in the past with varying degrees of success.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 这里列出的许多应用与本章早期部分“理解对话式AI应用”中涵盖的使用案例类似。过去，许多对话式AI解决方案已经针对它们开发，并取得了不同程度的成功，这并不令人惊讶。
- en: Limitations of ChatGPT
  id: totrans-267
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT的局限性
- en: ChatGPT, as with other LLMs, is not fallible and has several significant risks,
    limitations, and security considerations that are important to be aware of if
    you are going to use ChatGPT in production conversational AI use cases.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他LLMs一样，ChatGPT并非完美无缺，它存在一些重要的风险、局限性和安全考虑，如果你打算在生产对话式AI用例中使用ChatGPT，这些是需要注意的。
- en: Limitations
  id: totrans-269
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 局限性
- en: There is no doubt that ChatGPT has some incredible capabilities, but let’s take
    a look at where things can go wrong.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，ChatGPT拥有一些令人难以置信的能力，但让我们来看看事情可能出错的地方。
- en: Accuracy and depth
  id: totrans-271
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准确性和深度
- en: Probably the most well-known limitation and the one that has garnered the most
    effort to overcome is ChatGPT’s “*information cutoff*” date. The early GPT-4 models
    were trained on publicly available internet data, with cutoff dates as far back
    as 2021\. The latest GPT models have shown improvements. According to OpenAI,
    the newest GPT-4 Turbo (`gpt-4-turbo`) has a knowledge cutoff of December 2023\.
    However, beyond this point, it is not updated with the latest information or events.
    This limitation means that conversational AI implementations using ChatGPT cannot
    natively support data or events occurring after December 2023, at least until
    a new model is released.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 可能最著名的限制，也是人们投入最多努力去克服的，就是ChatGPT的“*信息截止日期*”。早期的GPT-4模型是在公开可用的互联网数据上训练的，截止日期可以追溯到2021年。最新的GPT模型已经显示出改进。根据OpenAI的说法，最新的GPT-4
    Turbo (`gpt-4-turbo`)的知识截止日期是2023年12月。然而，在此之后，它并没有更新最新的信息或事件。这种限制意味着，使用ChatGPT实现的对话式AI应用无法原生支持2023年12月之后发生的数据或事件，至少直到发布新的模型。
- en: The ability for ChatGPT to answer questions about private data or more recent
    information is, of course, a core requirement for many conversational AI applications,
    which we’ll look at achieving in more detail later.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT回答关于私人数据或更近期的信息的能力，当然是许多对话式AI应用的核心要求之一，我们将在稍后更详细地探讨这一点。
- en: Hallucinations and accuracy
  id: totrans-274
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 幻觉与准确性
- en: In the context of LLMs, “*hallucinations*” refer to when the model generates
    text that is not coherent, relevant, or accurate. The problem of hallucinations
    in AI systems such as ChatGPT is a complex one. This can happen because ChatGPT
    has learned certain patterns in the data that do not apply to the specific context
    of the task. In other cases, an LLM may generate text that is completely unrelated
    to the input or task, which can be described as “*hallucinating*” text. For ChatGPT,
    hallucinations are one of the most concerning issues.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLM的背景下，“*幻觉*”指的是模型生成的不连贯、不相关或不准确的文本。ChatGPT等AI系统中的幻觉问题是一个复杂的问题。这可能会发生，因为ChatGPT在数据中学习了某些模式，这些模式并不适用于任务的特定上下文。在其他情况下，LLM可能会生成与输入或任务完全不相关的文本，这可以描述为“*幻觉*”文本。对于ChatGPT来说，幻觉是其中最令人担忧的问题之一。
- en: It’s not just about the AI making things up; it’s about the AI generating information
    that could potentially be harmful or misleading. This is particularly problematic
    in scenarios where the AI’s output is used to make important decisions or to inform
    people about critical issues.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是AI编造事情的问题；这是AI生成可能有害或误导性信息的问题。在AI的输出被用于做出重要决策或向人们通报关键问题时，这个问题尤其严重。
- en: One of the main concerns is the accuracy of outputs generated by ChatGPT. OpenAI
    has acknowledged that the outputs can sometimes be inaccurate, untruthful, or
    misleading. This is a complicated issue for companies aiming to rely on production
    applications powered by ChatGPT.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 主要担忧之一是ChatGPT生成的输出的准确性。OpenAI承认，输出有时可能是不准确的、不真实的或误导性的。这对那些希望依赖由ChatGPT驱动的生产应用的公司来说是一个复杂的问题。
- en: Accuracy is not just a consideration in ChatGPT conversational AI applications.
    Anywhere generated content comes into scrutiny and needs to be factual can be
    problematic. In June 2023, two US lawyers were fined for submitting fake court
    citations from ChatGPT. The lawyers’ firm was penalized after it transpired that
    fake quotes and citations were created by ChatGPT and submitted as part of an
    aviation injury claim.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性不仅仅是ChatGPT对话式AI应用中的一个考虑因素。任何生成的内容都需要经过审查，并确保其真实性，这可能会出现问题。2023年6月，两名美国律师因提交来自ChatGPT的虚假法庭引证而被罚款。律师的事务所在虚假引证和引证是由ChatGPT创建并作为航空伤害索赔的一部分提交的事实曝光后受到了惩罚。
- en: While ChatGPT is adept at generating text that appears coherent and logical,
    its responses may not always be correct or detailed enough. Output often needs
    manual review and robust validation mechanisms. It’s crucial to address the issue
    of hallucinations and be constantly aware that ChatGPT cannot discern factual
    accuracy to ensure the reliability and safety of ChatGPT applications.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT擅长生成看似连贯和逻辑的文本，但其回答可能并不总是正确或足够详细。输出通常需要人工审查和强大的验证机制。解决幻觉问题并始终保持ChatGPT无法辨别事实准确性的认识，对于确保ChatGPT应用的可靠性和安全性至关重要。
- en: Context limitations
  id: totrans-280
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文限制
- en: ChatGPT manages conversation context by using earlier conversation information
    for each new turn of the conversation. This way, it knows what’s been said previously,
    and it can use this as part of its process of deciding what to say next.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT通过使用每次对话新回合之前的对话信息来管理对话上下文。这样，它知道之前说了什么，并可以利用这些信息作为其决定接下来说什么的过程的一部分。
- en: 'Despite improvements in context understanding, both GPT-3.5 and GPT-4 have
    context limits, with GPT-4 having a significantly larger limit. This limitation
    can lead to instances where ChatGPT only considers its most recent output and
    overlooks context from earlier in the interaction. OpenAI has also recently released
    a new chat-specific model: `gpt-3.5-turbo-16k`, which has a context four times
    larger than the earlier one. Context limitations are an area that can be improved
    with a summarization strategy and the approaches covered later in the book.'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管上下文理解能力有所提高，但GPT-3.5和GPT-4都有上下文限制，GPT-4的限制明显更大。这种限制可能导致ChatGPT只考虑其最新的输出，而忽略了互动中较早的上下文。OpenAI最近也发布了一个新的针对聊天的特定模型：`gpt-3.5-turbo-16k`，其上下文容量是早期模型的四倍。上下文限制是一个可以通过摘要策略和书中后面提到的方法进行改进的领域。
- en: Risks and security
  id: totrans-283
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 风险和安全
- en: The rapid adoption and widespread use of ChatGPT have raised significant security
    and **intellectual property** (**IP**) concerns that the technology could be misused
    by criminal enterprises.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的快速采用和广泛使用引发了重大的安全和**知识产权**（**IP**）担忧，担心这项技术可能被犯罪企业滥用。
- en: Property rights
  id: totrans-285
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 财产权
- en: Another complication is a company’s IP rights, especially when claiming rights
    to something generated by ChatGPT or partially AI-generated.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个复杂问题是公司的知识产权，尤其是在声称对ChatGPT生成的内容或部分由AI生成的内容拥有权利时。
- en: According to OpenAI’s terms of use, the user owns the input, and OpenAI assigns
    all its rights, title, and interest in and to the output. However, OpenAI cannot
    assign rights to content it did not initially own. This has led to unresolved
    questions about AI-generated IP and its ownership.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 根据OpenAI的使用条款，用户拥有输入内容，而OpenAI将所有其权利、所有权和利益转让给输出内容。然而，OpenAI无法转让其最初不拥有的内容的权利。这导致了关于AI生成知识产权及其所有权的未解决疑问。
- en: Security
  id: totrans-288
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安全性
- en: Not necessarily a security issue related to AI and ChatGPT functionality per
    se, but a very real one considering the number of users OpenAI has. ChatGPT’s
    own security was put to the test in 2023 when OpenAI confirmed a data breach caused
    by a vulnerability in the code’s open-source library. This breach allowed users
    to see the chat history of other active users, raising concerns about the security
    of user data. The breach was quickly patched, but it highlighted the potential
    risks associated with the use of AI technologies.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是与AI和ChatGPT功能本身相关的安全问题，但考虑到OpenAI的用户数量，这是一个非常现实的问题。2023年，OpenAI确认了一起由代码开源库中的漏洞引起的数据泄露事件，这测试了ChatGPT自身的安全性。这次泄露允许用户看到其他活跃用户的聊天历史，引发了关于用户数据安全性的担忧。漏洞很快被修补，但它突显了使用AI技术可能带来的潜在风险。
- en: In another incident, a deeper investigation revealed that the same vulnerability
    had likely exposed payment information for a few hours before ChatGPT was taken
    offline. This incident raised further concerns about the security of sensitive
    user data.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一起事件中，更深入的调查发现，同样的漏洞可能在ChatGPT下线之前暴露了几个小时的用户支付信息。这一事件进一步引发了关于敏感用户数据安全性的担忧。
- en: The rising popularity of ChatGPT plugins could also amplify safety hazards by
    inadvertently enabling harmful or unintended actions despite OpenAI’s best efforts.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT插件的日益流行也可能通过无意中启用有害或未预期的行为来放大安全风险，尽管OpenAI做出了最大努力。
- en: Educational concerns
  id: totrans-292
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 教育方面的担忧
- en: As covered earlier, ChatGPT can pass educational tests and carry out real-world
    applications. This has resulted in concerns among education experts and academic
    faculties, due to ethical issues, cheating, and misuse in schools.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，ChatGPT可以通过教育测试并执行现实世界的应用。这导致了教育专家和学术界对伦理问题、作弊和学校中的滥用表示担忧。
- en: Many academic institutions have banned the technology on their networks, which
    is a futile measure but shows that there is real concern that students might exploit
    ChatGPT to write papers, cheat, and sidestep the learning process. This raises
    questions about the integrity of academic institutions and the very nature of
    learning and education. As the capabilities of LLMs grow, these issues are only
    set to increase despite the growth of other LLM technologies to spot AI-generated
    content.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 许多学术机构已经在其网络上禁止了这项技术，这是一个徒劳的措施，但也表明人们确实担心学生可能会利用ChatGPT来撰写论文、作弊并规避学习过程。这引发了关于学术机构诚信以及学习和教育本质的问题。随着LLM能力的增长，这些问题只会随着其他LLM技术在识别AI生成内容方面的增长而增加。
- en: Privacy concerns
  id: totrans-295
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隐私担忧
- en: The use of AI LMs such as ChatGPT also raises privacy concerns. These models
    store vast amounts of data and use this information to generate responses.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT等AI语言模型也引发了隐私担忧。这些模型存储了大量的数据，并使用这些信息来生成回应。
- en: Content already used to train the model is a major concern, but one more pressing
    is what happens with ChatGPT conversation data.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 已用于训练模型的内容是一个主要问题，但另一个更紧迫的问题是ChatGPT对话数据会发生什么。
- en: If sensitive data, such as an organization’s IP or sensitive customer information,
    is entered into the chatbot, it enters the chatbot library and is out of the user’s
    control.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 如果将敏感数据，如组织的知识产权或敏感客户信息输入到聊天机器人中，它就会进入聊天机器人库，并超出用户的控制。
- en: In response to these concerns, some businesses and countries have tightened
    restrictions on AI use. For instance, JPMorgan Chase and Apple have restricted
    employees’ use of ChatGPT over concerns about security.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 针对这些担忧，一些企业和国家已经加强了对人工智能使用的限制。例如，摩根大通和苹果公司因安全担忧而限制了员工使用ChatGPT。
- en: Italy has temporarily blocked the application across the country due to **General
    Data Protection Regulation** (**GDPR**) compliance concerns.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 意大利因**通用数据保护条例**（**GDPR**）合规问题而暂时在全国范围内封锁了该应用程序。
- en: It’s worth noting that ChatGPT allows users to stop chat history logging, but
    it’s an important consideration if users are using internal data such as medical
    records as part of their prompt engineering.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，ChatGPT允许用户停止记录聊天历史，但如果用户将内部数据（如病历）作为其提示工程的一部分，这是一个重要的考虑因素。
- en: Malicious usage
  id: totrans-302
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 恶意使用
- en: Many of the strengths of ChatGPT, such as realistic conversational ability and
    text generation, are likely to be used for criminal intentions, from enhanced
    phishing on an industrial scale to targeted disinformation.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的许多优势，如逼真的对话能力和文本生成，很可能会被用于犯罪目的，从工业规模的增强钓鱼到有针对性的虚假信息传播。
- en: Criminals will also be empowered to use less traditional mediums such as messaging
    platforms to carry out targeted attacks.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 犯罪分子也将能够使用不太传统的媒介，如消息平台，来进行针对性攻击。
- en: In the past, phishing emails were often characterized by poor grammar and unusual
    sentence structure, making them easy to identify. Criminals will leverage ChatGPT
    to develop convincing phishing emails. These emails can now mimic native speakers
    and deliver tailored messages. ChatGPT’s ability to seamlessly translate languages
    is expected to significantly aid foreign criminals’ abilities to carry out global
    attacks.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，钓鱼邮件通常具有语法差和句子结构不寻常的特点，这使得它们很容易被识别。犯罪分子将利用ChatGPT来开发令人信服的钓鱼邮件。这些邮件现在可以模仿母语人士并传递定制信息。ChatGPT无缝翻译语言的能力预计将大大增强外国犯罪分子进行全球攻击的能力。
- en: Bias
  id: totrans-306
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 偏见
- en: ChatGPT, as with many other LLMs, has been trained on human-generated content
    from the internet. As a result of this, ChatGPT is susceptible to various biases,
    including gender, racial, cultural, language, ideological, and commercial, as
    well as several others.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 与许多其他LLM一样，ChatGPT是在互联网上的人类生成内容上训练的。因此，ChatGPT容易受到各种偏见的影响，包括性别、种族、文化、语言、意识形态和商业偏见，以及其他一些偏见。
- en: 'Bias issues are wide-ranging; here are a few examples:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见问题范围广泛；以下是一些例子：
- en: Generating content that fails to incorporate a well-rounded perspective on diverse
    personal experiences and linguistic nuances
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成内容未能融入对多样化个人经验和语言细微差别的全面视角
- en: Crafting responses that allocate roles or jobs based on gender or ethnicity,
    thereby fortifying pre-existing stereotypes
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定基于性别或种族分配角色或工作的回应，从而加强现有的刻板印象
- en: Creating text that portrays a subtle bias toward certain social philosophies
    or political ideologies
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建描述对某些社会哲学或政治意识形态有微妙偏见的文本
- en: Producing content that mirrors the dominant narratives present in the training
    data, resulting in the creation of sensationalist or attention-seeking titles
    and statements
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even with safeguards in place, these models will sometimes say sexist/racist/homophobic
    things. Be careful when using LLMs in consumer-facing applications, and care needs
    to be taken when using ChatGPT in research.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-314
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In conclusion, in this chapter, we’ve seen how conversational AI has made steady
    progress from rule-based to AI-driven intent-based systems. By looking at the
    applications of ChatGPT, we’ve seen that as the capabilities of modern conversational
    AI systems have grown, so have the breadth and depth of use cases for conversational
    experiences. There are thousands of these systems, carrying out complex tasks
    across multiple industries.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
- en: From our initial focus on ChatGPT, we have seen it’s a powerful tool that has
    the capabilities to revolutionize the field of conversational AI by taking on
    more complex tasks and use cases that until recently have been difficult to achieve
    with modern conversational AI platforms. It offers a wide range of applications
    in many industries, including customer service, healthcare, finance, law, education,
    and more.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
- en: However, the chapter has also highlighted that it’s important to be aware of
    its limitations and risks, including accuracy and depth limitations, hallucinations,
    context limitations, security concerns, privacy issues, and biases. These challenges
    require careful consideration and mitigation strategies when developing and deploying
    ChatGPT applications. As we move forward, it is crucial to address these limitations
    and ensure that ChatGPT is used responsibly, ethically, and with proper safeguards
    in place.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
- en: Before we start looking at creating conversational applications with ChatGPT,
    let’s look at how the technology can be used in traditional conversation design.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will delve deeper into the conversation design applications
    of ChatGPT. We will explore how to design effective and engaging conversations
    using ChatGPT, covering topics such as dialogue flow, user prompts, system responses,
    context management, and more. Join us as we uncover the practical skills needed
    to create powerful and meaningful conversational AI experiences using ChatGPT.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
