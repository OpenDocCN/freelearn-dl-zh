- en: '3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: Choosing the Right GitHub Copilot Plan
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择合适的GitHub Copilot计划
- en: Choosing the right GitHub Copilot plan is more than a matter of ticking boxes.
    It’s about matching powerful AI tools to your unique needs, your workflow, and,
    in many cases, your organization’s requirements around privacy, compliance, and
    cost. Whether you’re exploring GitHub Copilot for the first time, managing a small
    team, or leading a large-scale rollout for an enterprise, the licensing plan you
    select directly shapes your experience with this tool’s ever-expanding features.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的GitHub Copilot计划不仅仅是勾选框的问题。它关乎将强大的AI工具与您的独特需求、工作流程以及许多情况下您组织对隐私、合规性和成本的要求相匹配。无论您是首次探索GitHub
    Copilot，管理一个小团队，还是领导企业级的大规模推广，您选择的许可计划将直接塑造您与这个工具不断扩展的功能的体验。
- en: Over the last several years, GitHub Copilot has evolved far beyond its origins
    as a coding assistant for individuals. Today, it spans multiple subscription plans,
    each tailored to different types of users and organizations. As GitHub continues
    to add new capabilities, such as Copilot Ask, Edit Mode, Agent Mode, and premium
    model access, it’s more important than ever to understand which features are included
    with each plan, what the limitations are, and how these choices impact both your
    day-to-day work and your longer-term strategy.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，GitHub Copilot已经远远超出了其作为个人编码助手的起源。今天，它涵盖了多个订阅计划，每个计划都针对不同类型的用户和组织。随着GitHub继续添加新功能，如Copilot
    Ask、编辑模式、代理模式和高级模型访问，了解每个计划包含哪些功能、限制是什么以及这些选择如何影响您日常工作和长期战略，比以往任何时候都更加重要。
- en: In this chapter, we’ll take a practical approach to understanding GitHub Copilot’s
    licensing options as of October 2025 (for the latest updates, visit [https://docs.github.com/en/copilot/get-started/plans](https://docs.github.com/en/copilot/get-started/plans)
    ). We’ll explore each available plan in detail – from Free, Pro, and Pro+ all
    the way to Business and Enterprise offerings – explaining the feature sets, intended
    use cases, and any key limitations or restrictions. You’ll see where each plan
    excels, where there might be trade-offs, and how to avoid common pitfalls.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将以实用主义的方法来了解截至2025年10月（有关最新更新，请访问[https://docs.github.com/en/copilot/get-started/plans](https://docs.github.com/en/copilot/get-started/plans)）的GitHub
    Copilot许可选项。我们将详细探讨每个可用的计划——从免费、专业和专业+到企业级和商业级产品——解释功能集、目标用例以及任何关键限制或限制。您将看到每个计划的优点，可能存在的权衡，以及如何避免常见陷阱。
- en: We’ll also walk through real-world examples to show how the right licensing
    choice can streamline your workflow or, if mismatched, introduce unnecessary friction.
    Along the way, you’ll learn about GitHub’s current pricing and billing models,
    including the new concept of “premium requests” for accessing advanced models,
    and how to track usage across your team or organization.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将通过实际案例展示如何选择合适的许可选择可以简化您的流程，或者如果选择不当，可能会引入不必要的摩擦。在这个过程中，您将了解GitHub当前的定价和计费模式，包括访问高级模型的新概念“高级请求”，以及如何跟踪团队或组织内的使用情况。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Overview of GitHub Copilot plans
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GitHub Copilot计划概述
- en: Comparing GitHub Copilot plan features
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较GitHub Copilot计划功能
- en: Reviewing intended users and common use cases
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查目标用户和常见用例
- en: Understanding GitHub Copilot limitations and restrictions
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解GitHub Copilot的限制和限制
- en: Pricing structure and billing considerations
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定价结构和计费考虑
- en: Choosing the right plan
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择合适的计划
- en: Staying up to date with recent and upcoming changes
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解最近和即将到来的变化
- en: Upgrading, downgrading, and change management
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 升级、降级和变更管理
- en: Usage dashboards and monitoring
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用仪表板和监控
- en: By the end of this chapter, you’ll have a clear, up-to-date understanding of
    what each GitHub Copilot plan offers, and you’ll be ready to make an informed
    decision, whether you’re an independent developer, an educator, or part of a larger
    enterprise.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章结束时，您将清楚地了解GitHub Copilot每个计划提供的功能，并准备好做出明智的决定，无论您是独立开发者、教育工作者，还是大型企业的一部分。
- en: Overview of GitHub Copilot plans
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GitHub Copilot计划概述
- en: As GitHub Copilot has matured, its subscription options have grown to reflect
    the needs of everyone from solo hobbyists to global enterprises. As of October
    2025, there are five main plans, each designed to serve a specific audience and
    use case. Understanding these plans at a high level will help you quickly narrow
    your focus and make sense of the more detailed comparisons to come. You can see
    [https://github-copilot.xebia.ms](https://github-copilot.xebia.ms) for an overview,
    but this chapter will dive into more details.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 随着GitHub Copilot的成熟，其订阅选项已扩展，以满足从个人爱好者到全球企业所有人的需求。截至2025年10月，有五种主要计划，每种计划都针对特定的受众和用例而设计。从高层次上了解这些计划将帮助您快速缩小关注范围，并理解即将到来的更详细比较。您可以在[https://github-copilot.xebia.ms](https://github-copilot.xebia.ms)查看概述，但本章将深入更多细节。
- en: '![Figure 3.1: Copilot feature highlights as of October 2025](img/B34107_03_1.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图3.1：截至2025年10月的Copilot功能亮点](img/B34107_03_1.png)'
- en: 'Figure 3.1: Copilot feature highlights as of October 2025'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1：截至2025年10月的Copilot功能亮点
- en: Free plan
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 免费计划
- en: The **Free** plan is GitHub Copilot’s entry point, aimed at individuals who
    want to experiment with AI-powered coding without any financial commitment. This
    tier is available to verified students, teachers, and maintainers of popular open
    source projects, as well as anyone curious to try it in a limited capacity. The
    Free plan offers a solid foundation for getting familiar with basic suggestions
    and chat features, though with notable restrictions on advanced capabilities,
    usage limits, and supported environments.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**免费** 计划是GitHub Copilot的入门点，面向希望尝试AI驱动编码而不需要任何财务承诺的个人。此级别对经过验证的学生、教师和流行开源项目的维护者开放，以及任何希望有限尝试的人。免费计划提供了熟悉基本建议和聊天功能的基础，尽管在高级功能、使用限制和支持环境方面存在明显限制。'
- en: An example user is a university student working on class assignments or an open
    source maintainer, looking for help with project tasks.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例用户是正在处理课程作业的大学学生或寻找项目任务帮助的开源维护者。
- en: The **rate limits** , such as 2,000 code completions, 50 chat messages per month,
    and 50 premium requests per month, are the biggest restrictions for this plan.
    These are designed to ensure fair and reliable access for all Free plan users.
    They help GitHub manage system resources and prevent misuse, while still allowing
    individuals to explore GitHub Copilot’s core features. If you frequently hit these
    limits, it may be time to consider a paid plan that offers higher quotas and more
    advanced capabilities. We’ll explain these limits and terms further on in this
    chapter.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**速率限制**，例如每月2,000次代码补全、每月50条聊天消息和每月50次高级请求，是该计划的重大限制。这些限制旨在确保所有免费计划用户都能公平和可靠地访问。它们有助于GitHub管理系统资源并防止滥用，同时仍然允许个人探索GitHub
    Copilot的核心功能。如果你经常达到这些限制，可能需要考虑一个提供更高配额和更多高级功能的付费计划。我们将在本章后面进一步解释这些限制和条款。'
- en: Pro plan
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pro 计划
- en: The **Pro** plan is the most popular starting point for individual developers
    who want GitHub Copilot’s full range of capabilities for personal or professional
    use. With a Pro subscription, you unlock richer feature support – including multi-file
    context, Edit Mode, and priority access to standard models – at a predictable
    monthly or annual price. Pro users can access the tool across a wide range of
    editors and the GitHub.com web interface, making it an ideal choice for freelancers,
    indie developers, and power users.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**Pro** 计划是最受欢迎的起点，适用于希望为个人或专业用途获得GitHub Copilot全部功能的个人开发者。通过Pro订阅，您可以在可预测的月度或年度价格下解锁更丰富的功能支持——包括多文件上下文、编辑模式和标准模型的优先访问权。Pro用户可以在广泛的编辑器和GitHub.com网页界面中访问该工具，使其成为自由职业者、独立开发者和高级用户的理想选择。'
- en: An example user is a freelance developer building multiple projects for clients
    or themselves, looking to streamline their workflow.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例用户是为客户或自己构建多个项目的自由开发者，希望简化他们的工作流程。
- en: Pro+ plan
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pro+ 计划
- en: Introduced to address growing demand for advanced GitHub Copilot features, the
    **Pro+** plan sits between Pro and Business/Enterprise. It includes everything
    in Pro, plus enhanced access to premium models, such as GPT-4.1, and the latest
    previews, higher usage thresholds, and new features such as Agent Mode and advanced
    API access. In addition to a much higher monthly allowance of premium requests,
    the Pro+ plan also features increased rate limits, allowing you to work more efficiently
    without worrying about hitting daily or hourly usage caps. Pro+ is aimed at highly
    active developers and small teams who want the best this tool has to offer but
    don’t require full business-level controls or compliance.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**Pro+** 计划是为了满足对高级GitHub Copilot功能的日益增长的需求而推出的，它位于Pro和Business/Enterprise之间。它包括Pro计划中的所有内容，以及增强对高级模型（如GPT-4.1）和最新预览的访问权限，更高的使用阈值以及新的功能，如代理模式和高级API访问。除了每月更高的优质请求配额外，Pro+计划还增加了速率限制，让您可以更高效地工作，无需担心达到每日或每小时的使用上限。Pro+旨在针对高度活跃的开发者和小型团队，他们希望获得此工具的最佳功能，但不需要完整的业务级控制或合规性。'
- en: An example user is a contractor or consultant managing several active repositories
    and needing top-tier AI support for complex or multi-modal workflows.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例用户是管理多个活跃存储库的承包商或顾问，他们需要顶级AI支持以处理复杂或多模态工作流程。
- en: Premium requests are actions that use advanced AI models or special features,
    and each plan includes a monthly quota. Pro+ gives you a much higher allowance
    for these requests. We’ll cover how premium requests work in more detail later
    in this chapter.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 优质请求是使用高级AI模型或特殊功能的操作，每个计划都包含每月配额。Pro+计划为这些请求提供了更高的配额。我们将在本章后面更详细地介绍优质请求的工作方式。
- en: Business plan
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业计划
- en: The **Business** plan is built for organizations and teams that need centralized
    management, security controls, and the ability to standardize GitHub Copilot usage
    across multiple users. This plan includes robust admin tools, policy configuration
    (such as restricting specific models), usage analytics, and privacy settings.
    Subscribers can fine-tune how it’s deployed, monitor team adoption, and set boundaries
    for privacy and compliance, all while ensuring that team members have access to
    the latest productivity features.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**Business** 计划是为需要集中管理、安全控制和跨多个用户标准化GitHub Copilot使用的组织和团队设计的。此计划包括强大的管理工具、策略配置（如限制特定模型）、用量分析和隐私设置。订阅者可以微调其部署方式，监控团队采用情况，并设置隐私和合规性的界限，同时确保团队成员可以访问最新的生产力功能。'
- en: An example user is a software development team in a mid-sized company looking
    for improved oversight and the assurance of secure AI integration across their
    projects
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例用户是中型公司中的软件开发团队，他们寻求改善项目中的监督并确保安全AI集成。
- en: Enterprise plan
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 企业计划
- en: The **GitHub Copilot for Enterprise** plan is the top tier for organizations
    that need advanced administrative control and maximum flexibility for Copilot
    usage across large teams. This plan provides the highest premium request quotas,
    priority access to new and advanced AI models, and Copilot knowledge bases. Enterprise
    subscribers can set organization-wide policies for Copilot, manage licensing and
    seat allocation centrally, and access detailed usage analytics to track adoption
    and engagement. The Enterprise plan is designed to integrate seamlessly with the
    broader governance, compliance, and identity management capabilities already available
    through the **GitHub Enterprise** ( **GHE** ) platform, supporting secure and
    scalable AI adoption across even the most complex organizations.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**GitHub Copilot for Enterprise** 计划是针对需要高级管理控制和跨大型团队使用Copilot的最大灵活性的组织的顶级计划。此计划提供最高的优质请求配额、对新和高级AI模型的优先访问权限以及Copilot知识库。企业订阅者可以为Copilot设置组织范围内的策略、集中管理许可和座位分配，并访问详细的用量分析以跟踪采用率和参与度。企业计划旨在与**GitHub
    Enterprise**（**GHE**）平台提供的更广泛的治理、合规性和身份管理功能无缝集成，支持在最复杂的组织中安全且可扩展的AI采用。'
- en: An example user is a multinational corporation’s engineering division, handling
    sensitive data and requiring enterprise-grade AI adoption controls.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例用户是跨国公司工程部门，处理敏感数据并需要企业级AI采用控制。
- en: Many advanced management features – such as automated user provisioning and
    deprovisioning, centralized audit logging, and compliance controls – are part
    of the broader GHE platform. While these are not specific to GitHub Copilot itself,
    they are essential for organizations looking to manage Copilot usage, licensing,
    and security at scale. Understanding the distinction between GitHub Copilot plan
    features and the wider GHE environment will help set the right expectations as
    you plan adoption across your organization.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: These five plans are not just a difference in price; they represent distinct
    approaches to how you or your team can use GitHub Copilot. One of the most important
    differences is the premium request limit included with each plan – higher tiers
    provide greater access to advanced models and features, supporting heavier usage
    and more demanding workflows. Each plan balances access to Copilot features, use
    case support, and the level of security, privacy, and administrative control you
    need.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll dive deeper and compare what you get (and don’t get)
    with each plan, feature by feature, to help you choose the best fit for your situation.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Comparing GitHub Copilot plan features
  id: totrans-41
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'With five distinct GitHub Copilot plans available, one of the most common questions
    is: Which features do I actually get with each plan? The answer isn’t always obvious,
    especially as GitHub continues to introduce new modes, models, and admin controls.
    This section provides a detailed, up-to-date comparison so you can see, at a glance,
    what’s included at each level.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Core features
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'All GitHub Copilot plans provide access to its foundational features, but the
    level of access and supported environments vary. Here’s what you’ll find in each
    plan, as of October 2025:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '**Chat and suggestions** : All plans support AI-powered code suggestions as
    you type, along with GitHub Copilot Chat for conversational coding help. The Free
    plan may be limited to single-file suggestions and shorter chat sessions.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edit Mode** : Available in all plans, this mode lets you use natural language
    to refactor, fix, or transform code directly from the editor, with side-by-side
    previews of changes.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent Mode** : Agent Mode in the IDE is available on all Copilot plans, with
    monthly request limits on Free and unlimited usage on paid tiers, and organizations
    can allow or block Copilot features for their users through policies.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-file and project context** : All GitHub Copilot plans allow the AI
    to reference multiple files and the broader project when generating suggestions.
    Free users get limited access, meaning Copilot looks at fewer files and less code
    at once. Paid plans (Pro, Pro+, Business, and Enterprise) allow Copilot to analyze
    more files and a larger portion of your project, so suggestions are based on a
    wider code context, especially in VS Code and JetBrains.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model access** : All paid GitHub Copilot plans, Pro, Pro+, Business, and
    Enterprise, include access to models such as GPT-4.1 and GPT-4o as standard, with
    no premium request cost. However, Pro+ and Enterprise users receive access to
    higher monthly allowances of premium requests, which gives them greater capacity
    to use advanced features such as Copilot Agent Mode, Extensions, and future preview
    models.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型访问**：所有付费GitHub Copilot计划，包括Pro、Pro+、Business和Enterprise，都包括对GPT-4.1和GPT-4o等模型的标准访问，无需额外付费请求。然而，Pro+和Enterprise用户可以获得更高每月的付费请求配额，这使他们能够使用高级功能，如Copilot代理模式、扩展和未来的预览模型。'
- en: '**Premium requests** : Pro+ and Enterprise offer a greater quota for premium
    model requests, especially important for those who rely on advanced models or
    heavy daily usage.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**付费请求**：Pro+和Enterprise提供更大的付费模型请求配额，这对于依赖高级模型或每日使用量大的用户尤为重要。'
- en: '**Security features** : Business and Enterprise plans unlock features such
    as usage policies and organization-wide controls to comply with regulatory requirements.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全功能**：Business和Enterprise计划解锁了符合监管要求的功能，例如使用策略和组织范围内的控制。'
- en: '**API access** : API access (such as for reporting, usage dashboards, or automations)
    is limited to Business and Enterprise plans. Individual plans do not include API
    access at this time.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**API访问**：API访问（例如用于报告、使用仪表板或自动化）仅限于Business和Enterprise计划。目前个人计划不包括API访问。'
- en: '**Admin and usage dashboards** : Only Business and Enterprise plans provide
    full dashboards for managing seats, reviewing usage, and analyzing adoption across
    teams.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理员和使用仪表板**：只有Business和Enterprise计划提供完整的仪表板，用于管理座位、审查使用情况和分析跨团队采用情况。'
- en: '**IDE and platform support** : All paid GitHub Copilot plans support the most
    popular development environments – such as VS Code, Visual Studio, JetBrains IDEs,
    Neovim, and GitHub.com – without restrictions. Free users may face usage limits
    and reduced feature availability depending on the IDE or environment.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IDE和平台支持**：所有付费GitHub Copilot计划都支持最流行的开发环境，例如VS Code、Visual Studio、JetBrains
    IDEs、Neovim和GitHub.com，没有任何限制。免费用户可能会根据IDE或环境面临使用限制和功能可用性降低。'
- en: Feature matrix
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 功能矩阵
- en: 'To make these distinctions clear, the following table summarizes which features
    are available in each plan:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这些区别清晰，以下表格总结了每个计划中可用的功能：
- en: '| Feature | Free | Pro | Pro+ | Business | Enterprise |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| 功能 | 免费版 | Pro | Pro+ | Business | Enterprise |'
- en: '| Chat and suggestions | ✔* | ✔ | ✔ | ✔ | ✔ |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| 聊天和建议 | ✔* | ✔ | ✔ | ✔ | ✔ |'
- en: '| Edit Mode | ✔ | ✔ | ✔ | ✔ | ✔ |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 编辑模式 | ✔ | ✔ | ✔ | ✔ | ✔ |'
- en: '| Agent Mode | ✔* | ✔ | ✔ | ✔ | ✔ |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| 代理模式 | ✔* | ✔ | ✔ | ✔ | ✔ |'
- en: '| Multi-file context | ✔ | ✔ | ✔ | ✔ | ✔ |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 多文件上下文 | ✔ | ✔ | ✔ | ✔ | ✔ |'
- en: '| Model choice (standard) | ✔* | ✔ | ✔ | ✔ | ✔ |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 模型选择（标准） | ✔* | ✔ | ✔ | ✔ | ✔ |'
- en: '| Model choice (premium) | — | — | ✔ | — | ✔ |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| 模型选择（高级） | — | — | ✔ | — | ✔ |'
- en: '| Premium requests | 50/mo* | 300/mo* | 1,500/mo* | 300/mo* | 1,000/mo* |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| 付费请求 | 50/月* | 300/月* | 1,500/月* | 300/月* | 1,000/月* |'
- en: '| Security/compliance controls | — | — | — | ✔ | ✔ |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| 安全/合规性控制 | — | — | — | ✔ | ✔ |'
- en: '| API access | — | — | — | ✔ | ✔ |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| API访问 | — | — | — | ✔ | ✔ |'
- en: '| Admin/usage dashboards | — | — | — | ✔ | ✔ |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| 管理员/使用仪表板 | — | — | — | ✔ | ✔ |'
- en: '| IDE support | Partial | ✔ | ✔ | ✔ | ✔ |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| IDE支持 | 部分支持 | ✔ | ✔ | ✔ | ✔ |'
- en: 'Figure 3.2: Feature comparison matrix showing plan capabilities as of October
    2025 (* Free plan features may be limited by seat eligibility, usage caps, or
    context, e.g., single-file only)'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.2：功能比较矩阵显示了截至2025年10月的计划功能（免费计划的功能可能受座位资格、使用上限或上下文限制，例如仅限单文件）
- en: For the most current and granular feature breakdown, always refer to GitHub’s
    official GitHub Copilot feature comparison table at [https://github.com/features/copilot/plans](https://github.com/features/copilot/plans)
    , as features and availability can change frequently.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最新和最详细的功能分解，请始终参考GitHub官方的GitHub Copilot功能比较表，网址为[https://github.com/features/copilot/plans](https://github.com/features/copilot/plans)，因为功能和可用性可能会频繁变化。
- en: What’s new or in preview?
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新增功能或预览内容是什么？
- en: 'GitHub regularly introduces new features, often releasing them to Pro+ or Enterprise
    plans first as previews, as in the following examples, as of October 2025:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub定期推出新功能，通常首先将它们作为预览发布给Pro+或Enterprise计划，以下是一些示例，截至2025年10月：
- en: '**Vision input** in Copilot Chat (public preview) allows users to paste or
    attach images – such as screenshots or mockups – into prompts in VS Code and Visual
    Studio, with support powered by GPT-4o'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Copilot Chat中的视觉输入**（公开预览）允许用户将截图或原型等图像粘贴或附加到VS Code和Visual Studio中的提示中，由GPT-4o提供支持。'
- en: Expanded **Agent Mode** capabilities – such as multi-step reasoning, tool orchestration,
    and IDE support – continue to roll out first to Pro+ and Enterprise plans
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展的**代理模式**功能——如多步推理、工具编排和IDE支持——将继续首先推出到Pro+和企业版计划。
- en: '**Premium request** quotas are increased for Pro+ and Enterprise, enabling
    more frequent use of advanced features such as Agent Mode and Extensions'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级请求**配额已为Pro+和企业版提升，允许更频繁地使用高级功能，如代理模式和扩展。'
- en: When you see a feature labeled as *Preview* or *Early Access* , it often means
    it’s being evaluated and may change, be restricted, or become generally available
    over time. These features may have different license terms and are sometimes not
    available to Enterprise customers due to organizational policy or support requirements.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当你看到某个功能被标记为*预览*或*早期访问*时，通常意味着它正在评估中，可能会随时间变化、受限或成为通用功能。这些功能可能有不同的许可条款，并且由于组织政策或支持要求，有时企业客户可能无法使用。
- en: To see which Copilot features and previews are available to you, in Visual Studio
    Code, open **Settings** | **Extensions** | (search) **GitHub Copilot** | **Manage**
    (click the gear icon) | **Settings** . This is where you’ll find available options
    and any policies set by your organization.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看哪些Copilot功能和预览可供您使用，在Visual Studio Code中，打开**设置** | **扩展** | （搜索）**GitHub
    Copilot** | **管理**（点击齿轮图标） | **设置**。这里您可以找到可用的选项和您组织设置的任何策略。
- en: '![Figure 3.3: Feature comparison](img/B34107_03_3.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图3.3：功能比较](img/B34107_03_3.png)'
- en: 'Figure 3.3: Feature comparison'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3：功能比较
- en: For the latest details on features and licensing, see [https://docs.github.com/en/copilot/get-started/github-copilot-features](https://docs.github.com/en/copilot/get-started/github-copilot-features)
    .
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 关于功能和许可的最新详情，请参阅[https://docs.github.com/en/copilot/get-started/github-copilot-features](https://docs.github.com/en/copilot/get-started/github-copilot-features)。
- en: 'Best practices: picking features that matter'
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳实践：选择重要的功能
- en: It’s easy to get caught up in the latest GitHub Copilot features, but the most
    effective plan is always the one that matches your real, day-to-day needs. For
    individuals who want to explore GitHub Copilot and see how it fits into their
    personal projects, the Free plan is a solid starting point. It offers basic access
    for experimentation, learning, or contributing to open source, with the understanding
    that advanced capabilities are limited.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易陷入最新的GitHub Copilot功能的诱惑中，但最有效的计划始终是符合您真实日常需求的计划。对于想要探索GitHub Copilot并了解它如何融入个人项目的个人用户，免费计划是一个坚实的起点。它提供基本的访问权限用于实验、学习和为开源项目做出贡献，但理解高级功能是有限的。
- en: For solo developers, freelancers, or very small teams, the Pro and Pro+ plans
    offer the right mix of flexibility and power. Pro provides a strong feature set
    for most coding tasks, while Pro+ unlocks higher premium request limits and early
    access to advanced models – perfect for those who need more capability but don’t
    require large-scale administration or corporate controls.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 对于独立开发者、自由职业者或非常小的团队，Pro和Pro+计划提供了灵活性和功能性的最佳组合。Pro为大多数编码任务提供强大的功能集，而Pro+则解锁了更高的高级请求限制和高级模型的早期访问——对于那些需要更多功能但不需要大规模管理或企业控制的人来说是完美的。
- en: Business and Enterprise plans are designed for larger organizations with more
    complex requirements. These plans support centralized management, security policy
    enforcement, and advanced usage analytics. They are ideal when you need to standardize
    GitHub Copilot across multiple users, enforce compliance, or manage usage and
    licensing at scale. Enterprise, in particular, is necessary for organizations
    that require automated user provisioning, advanced audit logging, and the strictest
    security integrations.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 商业和企业计划是为具有更复杂需求的大型组织设计的。这些计划支持集中管理、安全策略执行和高级使用分析。当你需要跨多个用户标准化GitHub Copilot、执行合规性或大规模管理使用和许可时，它们是理想的。特别是，企业版对于需要自动化用户配置、高级审计日志和最严格的安全集成的组织来说是必要的。
- en: In short, match your choice to your workflow and scale. If you only use the
    tool occasionally, or for non-commercial purposes, stay with Free or Pro. If you’re
    managing development at the organizational level or working with sensitive data,
    step up to Business or Enterprise for the tools and controls you need. Always
    review which premium request limits and feature access come with each plan, so
    you aren’t paying for features you won’t use, or missing out on those you need
    as your projects grow.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，根据你的工作流程和规模来选择。如果你只是偶尔使用该工具，或用于非商业目的，请继续使用免费或专业版。如果你在组织层面管理开发或在处理敏感数据，请升级到企业版或企业版，以获得所需的工具和控制。始终查看每个计划包含的
    premium 请求限制和功能访问权限，这样你就不会为不会使用的功能付费，也不会错过随着项目增长而需要的功能。
- en: Common pitfalls
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见陷阱
- en: 'When selecting a GitHub Copilot plan, watch out for these common pitfalls that
    can catch teams and individuals off guard:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择GitHub Copilot计划时，要注意这些常见的陷阱，它们可能会让团队和个人措手不及：
- en: '**Assuming feature parity** : Not all plans have every new feature. Always
    verify feature availability before committing, especially if you need something
    specific, such as Agent Mode or API access.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假设功能一致性**：并非所有计划都包含每个新功能。在做出承诺之前，始终验证功能可用性，特别是如果你需要特定功能，如代理模式或API访问。'
- en: '**Relying on previews** : Preview features may be removed or altered with little
    notice. Don’t architect mission-critical workflows around preview capabilities
    unless you’re prepared for changes.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**依赖预览功能**：预览功能可能会在几乎没有通知的情况下被移除或更改。除非你已准备好应对变化，否则不要围绕预览功能构建关键任务的工作流程。'
- en: '**Ignoring usage limits** : Free and lower-tier plans can hit usage or “premium
    request” caps, especially when using advanced models. Monitor your usage to avoid
    unexpected interruptions.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽视使用限制**：免费和低级计划可能会达到使用量或“高级请求”上限，尤其是在使用高级模型时。监控你的使用情况以避免意外中断。'
- en: Understanding the technical details and feature differences between GitHub Copilot
    plans is only half the story. To make a truly informed choice, it helps to see
    how these plans fit real-world situations. Every developer and organization has
    unique goals, team structures, and workflows. In the next section, we will explore
    concrete scenarios and user profiles, ranging from students and freelance developers
    to enterprise engineering teams, to show how each GitHub Copilot plan meets different
    needs in practice.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 理解GitHub Copilot计划之间的技术细节和功能差异只是故事的一半。要做出真正明智的选择，了解这些计划如何适应现实世界的情况很有帮助。每个开发者和组织都有独特的目标、团队结构和工作流程。在下一节中，我们将探讨具体的场景和用户配置文件，从学生和自由职业开发者到企业工程团队，以展示每个GitHub
    Copilot计划在实际中如何满足不同的需求。
- en: Reviewing intended users and common use cases
  id: totrans-92
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 审查目标用户和常见用例
- en: With a range of GitHub Copilot plans available, it’s helpful to look beyond
    the feature tables and consider how each plan fits the real-world needs of developers,
    teams, and organizations. The right plan is not just about what’s possible – it’s
    about matching tools to goals, workflows, and levels of responsibility. Here,
    you’ll find practical profiles and scenarios illustrating how each plan aligns
    with different users. Seeing your own use case reflected in these examples can
    help you zero in on the plan that will offer the best value and experience.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot提供了多种计划，在考虑每个计划如何满足开发者、团队和组织的现实需求时，除了查看功能表之外还有帮助。合适的计划不仅关乎可能实现的功能，还关乎将工具与目标、工作流程和责任级别相匹配。在这里，你可以找到实用的配置文件和场景，说明每个计划如何与不同用户的需求相匹配。看到你的用例在这些示例中得到反映，可以帮助你锁定提供最佳价值和体验的计划。
- en: Free plan
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 免费计划
- en: 'The Free plan is ideal for students, educators, and select open source maintainers
    who want to learn, teach, or give back to the community with the help of AI, but
    who don’t need every advanced feature. Some common use cases include the following:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 免费计划非常适合学生、教育工作者和希望借助AI学习、教学或回馈社区的精选开源维护者，但他们不需要每个高级功能。一些常见的用例包括以下内容：
- en: A university student writing assignments, experimenting with new languages,
    or participating in coding bootcamps – using it for suggestions and chat to understand
    unfamiliar code faster
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一位正在撰写作业、尝试新语言或参加编码训练营的大学学生——使用它来获取建议和聊天，以便更快地理解不熟悉的代码
- en: An educator preparing example code or lab materials for a class, taking advantage
    of its chat to create clear explanations or adapt code to different levels
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一位为课程准备示例代码或实验材料的教师，利用其聊天功能创建清晰的解释或调整代码以适应不同水平
- en: An open source maintainer, using its suggestions to streamline documentation
    updates or automate simple code cleanups
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用其建议来简化文档更新或自动化简单代码清理的开源维护者
- en: The Free plan offers a chance to build your skills without cost, but with usage
    and feature limits that may make it less suitable for production work or large
    projects. For example, the Free plan restricts access to advanced models and has
    lower monthly request quotas. These limitations can slow you down on complex tasks,
    make it harder to collaborate at scale, and may prevent you from fully integrating
    GitHub Copilot into professional workflows.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 免费计划提供了免费提升技能的机会，但使用和功能限制可能使其不适合生产工作或大型项目。例如，免费计划限制了访问高级模型，并具有较低的每月请求配额。这些限制可能会在复杂任务中减慢您的速度，使大规模协作变得困难，并可能阻止您将GitHub
    Copilot完全集成到专业工作流程中。
- en: Pro plan
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pro计划
- en: 'This plan is ideal for independent developers, freelancers, or hobbyists who
    want a full-featured experience for their personal or professional projects. Some
    common use cases include the following:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 此计划非常适合希望为个人或专业项目提供全面功能体验的独立开发者、自由职业者或爱好者。一些常见的用例包括以下内容：
- en: A freelance web developer uses the tool to quickly generate component code,
    write tests, or refactor legacy scripts for multiple clients
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自由职业的网页开发者使用此工具快速生成组件代码、编写测试或为多个客户重构旧脚本
- en: An indie app creator building side projects and taking advantage of Edit Mode
    and multi-file context for more sophisticated development tasks
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 独立应用程序创建者构建副项目，并利用编辑模式和多文件上下文进行更复杂的发展任务
- en: A developer learning a new tech stack and relying on it to generate examples,
    suggest best practices, and fill in knowledge gaps
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习新技术栈并依赖它来生成示例、建议最佳实践和填补知识空白的开发者
- en: Pro is a great fit for anyone who spends significant time coding and wants a
    productivity boost, without the overhead or complexity of team management. With
    Pro, you gain generous access to GitHub Copilot features, but if you find yourself
    reaching premium request limits too quickly or frequently relying on advanced
    models, you may want to consider Pro+ for even higher limits and greater flexibility.
    Paying per request that goes over the limit is also an option in the Pro or higher
    plans, at 4 US cents per premium request.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对于花费大量时间编码并希望提高生产力的任何人来说，Pro版是一个很好的选择，它避免了团队管理的开销和复杂性。使用Pro版，您可以获得GitHub Copilot功能的慷慨访问权限，但如果您发现自己很快或频繁地达到高级请求限制或经常依赖高级模型，您可能需要考虑Pro+版以获得更高的限制和更大的灵活性。在Pro版或更高版本的计划中，超出限制的请求按请求付费，每项高级请求4美分。
- en: Pro+ plan
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pro+计划
- en: 'This plan is ideal for highly active professionals, power users, or consultants
    who need priority access to premium models, the latest features (such as Agent
    Mode), and higher request limits – but don’t need full organizational controls.
    Some common use cases include the following:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 此计划非常适合高度活跃的专业人士、高级用户或顾问，他们需要优先访问高级模型、最新功能（例如代理模式）和更高的请求限制，但不需要完整的组织控制。一些常见的用例包括以下内容：
- en: A contract developer working on multiple, concurrent projects that demand advanced
    models (such as GPT-4o) for code generation, refactoring, or multi-step workflow
    automation
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在多个、同时进行的项目上工作的合同开发者，这些项目需要高级模型（如GPT-4o）进行代码生成、重构或多步工作流程自动化
- en: A technical consultant delivering rapid prototypes for clients, leveraging Agent
    Mode to automate repetitive setup or migration tasks, and needing access to previews
    of new features
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为客户提供快速原型并利用代理模式自动化重复设置或迁移任务，并需要访问新功能预览的技术顾问
- en: A developer participating in early-access or preview programs and looking for
    the absolute latest capabilities GitHub Copilot has to offer
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与早期访问或预览计划并寻找GitHub Copilot提供的最新功能的开发者
- en: Pro+ offers the “power user” experience for individuals and small teams that
    want access to cutting-edge features and can justify the additional investment.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: Pro+版为希望访问尖端功能并能证明额外投资的个人和小团队提供“高级用户”体验。
- en: Business plan
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 商业计划
- en: 'This plan is ideal for development teams and mid-sized organizations that need
    centralized management, security, and usage analytics, but don’t require enterprise-scale
    compliance or the most advanced automation features. Some common use cases include
    the following:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 此计划非常适合需要集中管理、安全和使用分析的开发团队和中型组织，但不需要企业级合规性或最先进的自动化功能。一些常见的用例包括以下内容：
- en: A product engineering team inside a SaaS company, using it to standardize workflows,
    share best practices, and monitor usage trends
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家SaaS公司的产品工程团队使用它来标准化工作流程、分享最佳实践和监控使用趋势
- en: A DevOps team managing multiple repositories and ensuring that the tool’s usage
    aligns with internal policies and guidelines
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一支DevOps团队管理多个存储库，并确保工具的使用与内部政策和指南保持一致
- en: A digital agency rolling out the tool to all developers, with IT administrators
    managing seats, configuring policy controls, and tracking adoption through dashboards
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家数字机构将工具推广到所有开发者，由IT管理员管理座位、配置策略控制和通过仪表板跟踪采用情况
- en: Business is for groups that value control, oversight, and the ability to manage
    GitHub Copilot at the team or department level, without the governance requirements
    of large enterprises.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 商业版适用于重视控制、监督和能够在团队或部门级别管理GitHub Copilot的群体，而不需要大型企业的治理要求。
- en: Enterprise plan
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 企业计划
- en: 'This plan is ideal for large organizations, regulated industries, or companies
    that require robust governance, compliance, and advanced security, along with
    access to all premium GitHub Copilot features and automation capabilities. Some
    common use cases include the following:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 此计划非常适合大型组织、受监管行业或需要强大治理、合规性和高级安全性的公司，同时可访问所有高级GitHub Copilot功能和自动化能力。一些常见用例包括以下内容：
- en: A global bank’s engineering division deploying the tool organization-wide, enforcing
    strict policy controls, and tracking all usage for compliance with industry standards.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家全球银行的工程部门在组织范围内部署工具，执行严格的策略控制，并跟踪所有使用情况以符合行业标准。
- en: Enterprise IT teams integrating GitHub Copilot with their identity management
    systems to automate user provisioning and deprovisioning (see the previous Enterprise-grade
    capabilities). They also use audit logs and organization-wide usage dashboards
    to monitor adoption, enforce compliance, and uphold security standards across
    development teams.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 企业IT团队将GitHub Copilot与其身份管理系统集成，以自动化用户配置和取消配置（参见先前的企业级功能）。他们还使用审计日志和组织范围内的使用仪表板来监控采用情况、执行合规性并维护开发团队的安全标准。
- en: A health tech company developing sensitive software under regulatory constraints,
    needing maximum control over deployments, premium model access, and granular reporting.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家在监管约束下开发敏感软件的健康科技公司，需要最大程度地控制部署、高级模型访问和细粒度报告。
- en: GitHub Copilot Enterprise is designed for organizations with complex compliance,
    security, and scale requirements. It offers advanced features such as automated
    user provisioning, centralized license and policy management across multiple organizations,
    and detailed audit logging. These capabilities go beyond the Business plan, making
    Enterprise ideal for regulated industries, large teams, or multi-org environments.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot Enterprise旨在满足具有复杂合规性、安全性和扩展要求的组织。它提供自动化用户配置、跨多个组织的集中式许可证和政策管理以及详细的审计日志等高级功能。这些功能超越了商业计划，使企业版非常适合受监管行业、大型团队或多组织环境。
- en: Use case comparison
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用例比较
- en: 'To make these profiles easier to reference, see the following summary table:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这些配置文件更容易参考，请参阅以下摘要表：
- en: '| Plan | Intended users | Typical use cases |'
  id: totrans-126
  prefs: []
  type: TYPE_TB
  zh: '| 计划 | 目标用户 | 典型用例 |'
- en: '| Free | Students, teachers, and open source | Learning, teaching, open source
    projects, and personal projects |'
  id: totrans-127
  prefs: []
  type: TYPE_TB
  zh: '| 免费版 | 学生、教师和开源用户 | 学习、教学、开源项目和个人项目 |'
- en: '| Pro | Freelancers, hobbyists, and individuals | Freelance work, side projects,
    code refactoring, and upskilling |'
  id: totrans-128
  prefs: []
  type: TYPE_TB
  zh: '| 专业版 | 自由职业者、爱好者和个人 | 自由职业工作、副项目、代码重构和技能提升 |'
- en: '| Pro+ | Power users and consultants | Advanced modeling, Agent Mode tasks,
    and heavy/complex dev workflows |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
  zh: '| 专业版+ | 高级用户和顾问 | 高级建模、代理模式任务和重型/复杂开发工作流程 |'
- en: '| Business | Teams and small/mid-sized orgs | Team management, policy controls,
    usage tracking, organization-wide automation, and shared standards |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '| 商业版 | 团队和小型/中型组织 | 团队管理、策略控制、使用跟踪、组织自动化和共享标准 |'
- en: '| Enterprise | Large orgs and regulated industries | Compliance and premium
    features |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
  zh: '| 企业版 | 大型组织和受监管行业 | 合规性和高级功能 |'
- en: 'Figure 3.4: User and use case comparison by plan'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.4：按计划比较用户和用例
- en: By seeing these roles and workflows mapped to each plan, you can more confidently
    select the one that matches your goals, responsibilities, and work environment.
    If your needs change over time, you can switch between plans – billing is handled
    on a prorated and metered basis. Additionally, organizations with GitHub Enterprise
    can assign different Copilot plans to individual organizations under their umbrella,
    giving you flexibility to tailor licensing as your teams or business units evolve.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些角色和工作流程映射到每个计划，您可以更有信心地选择与您的目标、责任和工作环境相匹配的计划。如果您的需求随时间变化，您可以在计划之间切换——账单按比例和计量处理。此外，拥有GitHub
    Enterprise的组织可以将不同的Copilot计划分配给其伞下的各个组织，这为您提供了根据团队或业务单元的发展调整许可的灵活性。
- en: Understanding which GitHub Copilot plan fits your needs is only part of the
    decision. Each plan comes with its own boundaries, some obvious and others less
    apparent, that can affect your workflow, access to features, and even how you
    manage billing or compliance. Knowing these practical limits ahead of time can
    help you avoid surprises and set clear expectations for yourself and your team.
    In the next section, we will dig into the specific limitations, restrictions,
    and potential “gotchas” associated with each plan. This will help you recognize
    exactly where to watch for feature or usage boundaries as you deploy GitHub Copilot
    in your environment.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 理解哪种 GitHub Copilot 计划符合您的需求只是决策的一部分。每个计划都有自己的边界，有些明显，有些不明显，这些边界可能会影响您的日常工作流程、对功能的访问，甚至影响您管理账单或合规性的方式。提前了解这些实际限制可以帮助您避免意外，并为您自己和团队设定明确的期望。在下一节中，我们将深入探讨与每个计划相关的具体限制、约束和潜在的“陷阱”。这将帮助您在部署
    GitHub Copilot 到您的环境中时，准确识别需要关注的特征或使用边界。
- en: Understanding GitHub Copilot limitations and restrictions
  id: totrans-135
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解 GitHub Copilot 的限制和约束
- en: While GitHub Copilot offers powerful tools across all plans, every tier has
    its boundaries – whether related to usage, feature access, security, or how the
    tool integrates into your daily workflow. Understanding these limitations will
    help you set the right expectations, avoid surprises, and make informed decisions
    as your needs evolve.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 GitHub Copilot 在所有计划中都提供强大的工具，但每个级别都有自己的边界——无论是与使用、功能访问、安全性还是工具如何集成到您的日常工作流程相关。了解这些限制将帮助您设定正确的期望，避免意外，并在您的需求变化时做出明智的决定。
- en: Usage caps and quotas
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用上限和配额
- en: Every Copilot plan includes some form of limit on how much you can use certain
    features. These restrictions are typically defined as usage caps (such as the
    maximum number of code suggestions or chat messages you can generate within a
    day or month) and quotas for more advanced requests. Knowing what these caps look
    like and how they work is essential to avoid disruptions, especially if you’re
    relying on Copilot for important work.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 每个Copilot计划都包含某种形式的使用限制，限制您可以使用某些功能。这些限制通常定义为使用上限（例如，您每天或每月可以生成的代码建议或聊天消息的最大数量）和更高级请求的配额。了解这些上限的形态及其工作原理对于避免中断至关重要，尤其是如果您依赖Copilot进行重要工作。
- en: Free plan
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 免费计划
- en: The Free plan comes with the most noticeable restrictions. There are strict
    caps on the number of code suggestions, chat sessions, and “premium” requests
    (which grant access to more advanced AI models). Users may experience daily or
    monthly usage limits, and features such as Agent Mode or access to premium models
    may not be available at all. Once a usage cap is reached, suggestions and chat
    will temporarily become unavailable until your monthly limit resets.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 免费计划包含最明显的限制。对代码建议、聊天会话和“高级”请求（这些请求提供对更高级AI模型的访问）的数量有严格的限制。用户可能会遇到每日或每月的使用限制，并且某些功能，如Agent模式或对高级模型的访问，可能根本不可用。一旦达到使用上限，建议和聊天将暂时不可用，直到每月限制重置。
- en: Pro and Pro+ plans
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Pro 和 Pro+ 计划
- en: Pro users enjoy much higher usage thresholds, but even here, there are “fair
    use” limits to prevent excessive load on GitHub’s systems. For example, intensive,
    continuous use of GitHub Copilot Chat or Edit Mode might result in temporary rate-limiting.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: Pro用户享有更高的使用阈值，但即使在这里，也有“合理使用”限制，以防止对GitHub系统造成过度负载。例如，对GitHub Copilot Chat或Edit
    Mode的密集、连续使用可能会导致临时速率限制。
- en: Pro+ subscribers benefit from larger quotas for premium requests and are less
    likely to run into monthly restrictions, but these limits are not unlimited. It’s
    also important to note that GitHub may adjust usage thresholds dynamically in
    response to service demand or overall system health. During periods of high usage
    across the platform using Pro+, limits may be lowered temporarily to ensure reliable
    performance for all users.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: Pro+ 订阅者从更大的高级请求配额中受益，不太可能遇到每月限制，但这些限制并非没有限制。还重要的是要注意，GitHub 可能会根据服务需求或整体系统健康状况动态调整使用阈值。在平台使用量高的时期，使用
    Pro+ 的限制可能会暂时降低，以确保所有用户的可靠性能。
- en: Business and Enterprise plans
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Business 和 Enterprise 计划
- en: GitHub Copilot usage in organizations is governed by seat-based licensing and
    usage quotas. Admins can monitor and reassign seats as needed, and excessive usage,
    especially of premium features, may trigger rate limits. For enterprise customers,
    successfully rolling out GitHub Copilot at scale isn’t just about purchasing enough
    seats. It also means putting in place strong oversight and governance. Even with
    generous quotas and admin tools, organizations need clear policies for managing
    seat assignments, monitoring usage patterns, and handling access to advanced features.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在组织中，GitHub Copilot 的使用受基于座位的许可和用量配额管理。管理员可以根据需要监控和重新分配座位，过度使用，尤其是高级功能的使用，可能会触发速率限制。对于企业客户来说，成功大规模推广
    GitHub Copilot 不仅意味着购买足够的座位。这也意味着实施强有力的监督和管理。即使有慷慨的配额和管理工具，组织也需要明确的政策来管理座位分配、监控使用模式和处理对高级功能的访问。
- en: 'Both Pro+ and Enterprise plans provide even higher allowance for premium requests,
    which are needed to access the most advanced models future preview models). See
    the later section, *Premium requests: what they are and why they matter* , for
    more information.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: Pro+ 和 Enterprise 计划为高级请求提供了更高的配额，这些请求是访问最先进模型（例如未来预览模型）所必需的。有关更多信息，请参阅后续部分，“高级请求：它们是什么以及为什么很重要”。
- en: Feature availability and plan-specific restrictions
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 功能可用性和计划特定限制
- en: 'Each GitHub Copilot plan offers a different set of features and access levels.
    Here’s a breakdown of what’s available on each plan:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 每个GitHub Copilot 计划提供不同的功能集和访问级别。以下是每个计划上可用的内容的概述：
- en: '**Edit Mode** : Available to all GitHub Copilot users, including Free tier.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编辑模式**：对所有 GitHub Copilot 用户开放，包括免费层。'
- en: '**Agent Mode** : Available to all GitHub Copilot users, including Free tier.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理模式**：对所有 GitHub Copilot 用户开放，包括免费层。'
- en: '**Premium model access** : Pro+, Enterprise, and select preview programs receive
    early or priority access to the latest models (e.g., GPT-4.5 and GPT-4o). Pro
    users have access to premium models, but not necessarily the newest or preview
    ones.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级模型访问**：Pro+、Enterprise 和一些预览计划可以提前或优先访问最新的模型（例如 GPT-4.5 和 GPT-4o）。Pro 用户可以访问高级模型，但不一定是最新或预览的模型。'
- en: '**API access and admin dashboards** : Only available to Business and Enterprise
    plans. Individual users on Pro or Pro+ can view personal usage in the GitHub UI,
    but do not have access to organization-level dashboards or usage APIs.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**API 访问和管理仪表板**：仅适用于 Business 和 Enterprise 计划。Pro 或 Pro+ 计划的个人用户可以在 GitHub
    UI 中查看个人使用情况，但无法访问组织级别的仪表板或使用 API。'
- en: '**Security and policy controls** : Policy management and compliance settings
    features are only available in Business and Enterprise tiers.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全和策略控制**：策略管理和合规设置功能仅在 Business 和 Enterprise 层级可用。'
- en: Platform and environment constraints
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平台和环境限制
- en: 'GitHub Copilot’s capabilities can vary depending on your editor, environment,
    and organization’s policy settings. Here are some important constraints to keep
    in mind:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 的功能可能因您的编辑器、环境和组织的策略设置而异。以下是一些需要记住的重要限制：
- en: '**Editor support** : All paid GitHub Copilot plans support popular IDEs such
    as VS Code, Visual Studio, JetBrains, and Neovim. The Free plan is primarily supported
    in VS Code and browser-based environments.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编辑器支持**：所有付费 GitHub Copilot 计划都支持流行的 IDE，如 VS Code、Visual Studio、JetBrains
    和 Neovim。免费计划主要在 VS Code 和基于浏览器的环境中得到支持。'
- en: '**Platform restrictions** : Certain features (such as GitHub Copilot Chat on
    GitHub.com or Model Context Protocol support) might be enabled or restricted based
    on your plan and organization’s policy settings. For example, some organizations
    may block GitHub Copilot in specific environments to comply with privacy or security
    requirements.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平台限制**：某些功能（例如 GitHub Copilot Chat 在 GitHub.com 上或模型上下文协议支持）可能会根据您的计划和组织的策略设置启用或限制。例如，某些组织可能会在特定环境中阻止
    GitHub Copilot 以符合隐私或安全要求。'
- en: '**Preview features** : Preview and early access features can be withdrawn,
    limited, or changed with little notice. Relying on these for critical production
    work is risky, as their availability is not guaranteed.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预览功能**：预览和早期访问功能可能会在没有太多通知的情况下被取消、限制或更改。依赖这些功能进行关键的生产工作是有风险的，因为它们的可用性无法保证。'
- en: Seat, billing, and compliance limits
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 座位、计费和合规限制
- en: 'Each GitHub Copilot plan comes with its own rules for seats, billing, and compliance.
    Here are the key points to consider:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 每个GitHub Copilot计划都有自己的座位、计费和合规规则。以下是您需要考虑的关键点：
- en: '**Free plan** : GitHub Copilot offers a limited Free plan to individual developers,
    including verified students, teachers, and eligible open source maintainers.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**免费计划**：GitHub Copilot为个人开发者提供有限的免费计划，包括经过验证的学生、教师和符合条件的开源维护者。'
- en: '**Business and Enterprise** : Seats are billed per user, per month. Admins
    must actively manage seat allocation to avoid paying for unused licenses. Organizations
    are responsible for monitoring usage and ensuring compliance with internal and
    external policies.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商业和企业**：按用户每月计费。管理员必须积极管理座位分配，以避免为未使用的许可证付费。组织负责监控使用情况并确保符合内部和外部政策。'
- en: '**Plan changes and migration** : Downgrading to a lower plan or switching providers
    may result in immediate loss of advanced features, premium quotas, or access to
    certain models. Always plan and communicate any changes in advance.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计划变更和迁移**：降级到较低的计划或更换提供商可能会导致立即失去高级功能、高级配额或对某些模型的访问。始终提前计划和沟通任何变更。'
- en: Common pitfalls
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见陷阱
- en: 'It’s easy to run into trouble if you overlook a few key details when choosing
    or using a GitHub Copilot plan. Watch out for these common pitfalls:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在选择或使用GitHub Copilot计划时忽略了一些关键细节，很容易遇到麻烦。请注意以下常见陷阱：
- en: '**Ignoring usage quotas** : Hitting daily or monthly caps in the middle of
    a project can halt your workflow unexpectedly. To avoid this, keep an eye on your
    usage statistics, especially if you’re working on a tight deadline or using advanced
    features. Set calendar reminders to check your quota status, or ask your administrator
    to enable alerts if your organization supports them. Staying proactive helps ensure
    you’re not caught off guard.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽略使用配额**：在项目进行中达到每日或每月上限可能会意外地中断您的流程。为了避免这种情况，请密切关注您的使用统计数据，尤其是如果您正在紧迫的截止日期或使用高级功能。设置日历提醒检查配额状态，或者如果您的组织支持，请要求管理员启用警报。保持积极主动有助于确保您不会措手不及。'
- en: '**Overlooking plan differences** : Assuming that all paid plans are the same
    can lead to confusion, especially regarding usage limits, model access, and administrative
    controls. Features such as premium request quotas, model previews, and centralized
    dashboards vary significantly between GitHub Copilot Pro, Pro+, Business, and
    Enterprise. While GitHub Agent Mode in the IDE is available for all paid plans,
    the GitHub coding agent on GitHub.com is only included in Pro, Pro+, Business,
    and Enterprise. Understanding these distinctions is essential for selecting the
    plan that truly matches your requirements.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽略计划差异**：假设所有付费计划都相同可能会导致混淆，尤其是在使用限制、模型访问和管理控制方面。GitHub Copilot Pro、Pro+、Business和Enterprise之间的高级请求配额、模型预览和集中式仪表板等特性存在显著差异。虽然IDE中的GitHub
    Agent Mode对所有付费计划都可用，但GitHub.com上的GitHub编码代理仅包含在Pro、Pro+、Business和Enterprise中。了解这些区别对于选择真正符合您需求的计划至关重要。'
- en: '**Relying on preview features** : Building workflows around features marked
    as *Preview* may backfire if GitHub removes or changes access. Additionally, GitHub
    may begin billing for a preview feature once it becomes generally available, sometimes
    without explicit notice beyond release notes. While sensible defaults usually
    apply, it’s important to monitor updates and your billing statements to avoid
    unexpected charges if you continue to use a feature that transitions from free
    preview to a paid add-on.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**依赖预览功能**：围绕标记为*预览*的功能构建工作流程可能会适得其反，如果GitHub取消或更改访问权限。此外，GitHub可能在预览功能普遍可用后开始对其计费，有时除了发布说明之外没有明确的公告。虽然通常适用合理的默认设置，但监控更新和您的账单记录很重要，以避免继续使用从免费预览过渡到付费附加功能的功能时出现意外费用。'
- en: '**Underestimating compliance needs** : Teams in regulated industries should
    confirm that their plan supports all required policy controls and security integrations.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低估合规需求**：受监管行业的团队应确认其计划支持所有必需的政策控制和安全集成。'
- en: For the most current details on GitHub Copilot features and plan differences,
    refer to the Copilot feature comparison table mentioned earlier.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 GitHub Copilot 的最新功能和计划差异的详细信息，请参考前面提到的 Copilot 功能比较表。
- en: After exploring the feature sets and limitations of each GitHub Copilot plan,
    it’s just as important to understand how these options affect your budget and
    ongoing usage. Pricing isn’t always straightforward, especially as new features
    such as premium requests and model tiers have been introduced, so in the next
    section, we’ll take a practical look at how GitHub Copilot pricing and billing
    work for each plan.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索了每个 GitHub Copilot 计划的功能集和限制之后，了解这些选项如何影响您的预算和持续使用同样重要。定价并不总是直截了当，尤其是随着新功能（如付费请求和模型层级）的引入，因此在下文中，我们将从实际的角度探讨
    GitHub Copilot 的定价和计费方式，针对每个计划进行说明。
- en: Pricing structure and billing considerations
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 定价结构和计费考虑因素
- en: Selecting the right GitHub Copilot plan isn’t just about features – it’s also
    a financial decision. Understanding how each plan is priced, what’s included,
    and how usage is billed can save you from unexpected charges and help you make
    the most of your investment. This section explains how pricing works as of October
    2025, including key concepts such as premium requests and the factors that can
    influence your monthly bill.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的 GitHub Copilot 计划不仅关乎功能，也是一个财务决策。了解每个计划的定价、包含的内容以及如何计费可以避免意外费用，并帮助您充分利用投资。本节解释了截至
    2025 年 10 月的定价方式，包括如付费请求等关键概念以及可能影响您每月账单的因素。
- en: How GitHub Copilot plans are priced
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GitHub Copilot 计划的定价方式
- en: 'GitHub Copilot offers several pricing tiers to fit different needs and team
    sizes. Here’s a quick overview of how each plan is structured and billed:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot 提供了多个定价层，以满足不同的需求和团队规模。以下是对每个计划结构和计费方式的快速概述：
- en: '**Free plan** : The Free tier is available at no cost to everyone.'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**免费计划**：免费层对所有人均免费提供。'
- en: '**Pro and Pro+ plans** (10 USD/month per user and 19 USD/month per user, respectively):
    Both are billed per user, per month. The Pro plan is priced to be affordable for
    individuals and freelancers, while Pro+ carries a premium for power users who
    want higher usage caps, advanced model access, and new features such as Agent
    Mode.'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业和专业+计划**（每位用户每月 10 美元和 19 美元，分别）：两者均按用户每月计费。专业计划定价旨在为个人和自由职业者提供可负担性，而专业+计划则为希望有更高使用上限、高级模型访问和新功能（如代理模式）的强大用户提供了额外费用。'
- en: '**Business plan** (19 USD/month per user): Designed for teams and organizations,
    the Business plan is billed per seat, per month, or annually, with management
    features, security controls, and centralized billing. Seat management is handled
    through the organization’s GitHub account, and admins can add or remove seats
    as needed.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商业计划**（每位用户每月 19 美元）：专为团队和组织设计，商业计划按座位每月或年度计费，包括管理功能、安全控制和集中计费。座位管理通过组织的
    GitHub 账户处理，管理员可以根据需要添加或删除座位。'
- en: '**Enterprise plan** (39 USD/month per user): The Enterprise tier provides the
    most advanced features and administrative controls, designed to meet complex organizational,
    security, and compliance requirements. Pricing for Enterprise is typically negotiated
    based on volume, support needs, and any additional requirements your organization
    may have.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**企业计划**（每位用户每月 39 美元）：企业层提供了最先进的功能和管理控制，旨在满足复杂的组织、安全和合规要求。企业计划的定价通常基于数量、支持需求以及您的组织可能有的任何额外要求。'
- en: With Business and Enterprise plans, organizations can set monthly Copilot budgets
    to control usage and keep costs predictable. When usage gets close to the budgeted
    amount, admins receive alerts so they can review and adjust before going over.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 使用商业和企业计划，组织可以设定每月的 Copilot 预算以控制使用量并保持成本可预测。当使用量接近预算金额时，管理员会收到警报，以便在超出预算前进行审查和调整。
- en: The prices referenced here are correct as of October 2025. Always refer to [https://github.com/features/copilot](https://github.com/features/copilot)
    for the most current pricing, eligibility, and feature definitions, as these details
    can change frequently.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 这里引用的价格截至 2025 年 10 月是正确的。请始终参考 [https://github.com/features/copilot](https://github.com/features/copilot)
    以获取最新的定价、资格和功能定义，因为这些细节可能会频繁变化。
- en: 'Premium requests: what they are and why they matter'
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 付费请求：它们是什么以及为什么很重要
- en: As GitHub Copilot evolves, premium requests have become a central billing concept,
    especially for users who want access to the latest or most powerful models (future
    previews). Premium requests are a limited resource, counted separately from standard
    suggestions or chat messages. Each time you use features powered by advanced models
    or access certain preview capabilities, you consume premium requests.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 随着GitHub Copilot的发展，高级请求已成为一个核心计费概念，特别是对于想要访问最新或最强大模型（未来预览）的用户。高级请求是一种有限资源，与标准建议或聊天消息分开计数。每次你使用由高级模型提供支持的功能或访问某些预览功能时，你都会消耗高级请求。
- en: These are often capped per month, depending on your plan.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这些通常根据你的计划每月设定上限。
- en: A **premium request** is a higher-cost operation that typically involves using
    GitHub Copilot with an advanced model or accessing features that require more
    compute resources (Agent Mode). Every time you initiate a “chat turn” with a premium
    model or use certain advanced capabilities, one premium request is deducted from
    your monthly quota.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '**高级请求**是一种成本较高的操作，通常涉及使用GitHub Copilot的高级模型或访问需要更多计算资源的特性（代理模式）。每次你使用高级模型或使用某些高级功能来启动“聊天回合”，就会从你的月度配额中扣除一个高级请求。'
- en: Premium requests are included (with higher quotas) in Pro+ and Enterprise plans.
    Free, Pro, and Business users either have a very limited quota or none at all
    for these requests. When you exceed your quota, GitHub Copilot will either revert
    to a standard model or restrict access to premium features until your quota resets.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 高级请求包含在Pro+和Enterprise计划中（配额更高）。免费、Pro和Business用户对于这些请求要么有非常有限的配额，要么完全没有。当你超出配额时，GitHub
    Copilot将回退到标准模型或限制对高级功能的访问，直到配额重置。
- en: If you regularly use advanced models or features, running out of premium requests
    can mean a sudden drop in performance or feature availability. It’s important
    to monitor your usage via usage dashboards and plan accordingly. To help with
    this, see the later section, *Usage dashboards and monitoring* .
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你经常使用高级模型或功能，耗尽高级请求可能会导致性能或功能可用性的突然下降。通过使用使用仪表板进行监控并相应地规划非常重要。有关此方面的更多信息，请参阅后面的部分，*使用仪表板和监控*。
- en: Billing models and considerations
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计费模型和考虑因素
- en: 'When it comes to billing, there are a few important factors to keep in mind
    with GitHub Copilot plans. Here’s what you should know:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到计费时，在使用GitHub Copilot计划时，有几个重要因素需要记住。以下是你应该了解的内容：
- en: '**Monthly billing** : GitHub Copilot plans are billed per user, per month,
    with charges calculated on a metered and prorated basis. This means you only pay
    for active seats during the billing period, and any changes in seat count are
    reflected in your monthly invoice.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**月度计费**：GitHub Copilot计划按用户每月计费，费用按计量和比例计算。这意味着你只需在计费期间支付活跃座位的费用，任何座位数的变动都会反映在你的月度账单中。'
- en: '**Seat management** : Business and Enterprise customers must manage seats proactively.
    Removing inactive users promptly can prevent unnecessary charges. If you add or
    remove seats mid-billing cycle, charges are typically prorated.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**座位管理**：商业和企业客户必须积极管理座位。及时移除不活跃用户可以防止不必要的费用。如果你在计费周期中添加或移除座位，费用通常按比例计算。'
- en: '**Trial periods** : Some plans offer a 30-day trial, after which billing will
    begin automatically unless canceled.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**试用期**：一些计划提供30天的试用期，之后将自动开始计费，除非取消。'
- en: '**Plan upgrades and downgrades** : Upgrades take effect immediately, granting
    instant access to new features. Downgrades or cancellations may result in immediate
    loss of premium features or quotas, so always plan changes with your workflow
    in mind.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计划升级和降级**：升级立即生效，立即获得新功能的访问权限。降级或取消可能会导致立即失去高级功能或配额，因此请始终考虑你的工作流程来规划变更。'
- en: Avoiding billing surprises
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免计费惊喜
- en: 'To avoid unexpected charges or disruptions, it’s important to stay on top of
    your GitHub Copilot usage and billing details. Here are a few practical tips:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免意外费用或中断，了解你的GitHub Copilot使用情况和计费细节非常重要。以下是一些建议性的实用技巧：
- en: '**Monitor usage** : Make use of usage dashboards and billing pages to track
    both standard and premium request usage. This helps prevent unexpected rate limiting
    or overages.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控使用情况**：利用使用仪表板和计费页面来跟踪标准和高级请求的使用情况。这有助于防止意外的速率限制或超额使用。'
- en: '**Understand model changes** : GitHub occasionally updates which models are
    considered “standard” or “premium.” When in doubt, consult the official documentation
    to see which features may result in additional usage or costs.'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理解模型变化**：GitHub偶尔会更新哪些模型被认为是“标准”或“高级”。如有疑问，请查阅官方文档，以了解哪些功能可能导致额外的使用或费用。'
- en: '**Billing support** : Business and Enterprise customers have access to priority
    billing support for resolving discrepancies or addressing questions about seat
    allocation, premium request usage, or invoice details.'
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**账单支持**：商业和企业客户有权获得优先账单支持，以解决差异或解答有关座位分配、高级请求使用或发票详情的问题。'
- en: By understanding how GitHub Copilot’s plans and premium requests are billed,
    you can set expectations with your team, avoid unpleasant surprises, and ensure
    that your investment in this tool delivers maximum value.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 通过了解GitHub Copilot的计划和高级请求的计费方式，您可以向团队设定预期，避免不愉快的惊喜，并确保您对这一工具的投资带来最大价值。
- en: Up until now, you’ve seen just how many variables go into picking the right
    GitHub Copilot plan – feature sets, usage limits, premium requests, and administrative
    controls, to name just a few. With so many factors to weigh, it’s natural to wonder
    how to make the best choice for yourself, your team, or your organization. In
    the next section, we’ll break down the decision process into clear, actionable
    steps.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 迄今为止，您已经看到了选择正确的GitHub Copilot计划需要考虑多少变量——功能集、使用限制、高级请求和行政控制，仅举几个例子。在这么多因素需要权衡的情况下，自然想知道如何为自己、团队或组织做出最佳选择。在下一节中，我们将把决策过程分解为清晰、可操作的一步一步。
- en: Choosing the right plan
  id: totrans-201
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择合适的计划
- en: With several GitHub Copilot plans and a constantly evolving feature set, selecting
    the best option can feel overwhelming, especially when requirements span everything
    from solo coding projects to enterprise-scale adoption. To make this choice easier,
    this section provides a practical, scenario-driven approach for evaluating your
    needs and narrowing down your options.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 随着GitHub Copilot提供多种计划和不断发展的功能集，选择最佳选项可能会感到令人不知所措，尤其是在需求涵盖从个人编码项目到企业级采用的一切时。为了使这一选择更容易，本节提供了一个实用的、以场景驱动的评估需求并缩小选项范围的方法。
- en: Start with your primary goals
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从您的首要目标开始
- en: 'First, clarify what you want to achieve with GitHub Copilot:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，明确您想通过GitHub Copilot实现什么：
- en: Are you learning, exploring, or contributing to open source?
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您是在学习、探索或为开源做出贡献？
- en: Do you need to support freelance or side projects?
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您是否需要支持自由职业者或副业项目？
- en: Are you managing a team or responsible for organizational security and compliance?
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您是否在管理团队或负责组织安全和合规性？
- en: Is access to the latest models or advanced features (such as Agent Mode) essential
    for your work?
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果访问最新模型或高级功能（如代理模式）对您的工作至关重要？
- en: Being honest about your goals will help you quickly zero in on the plans most
    likely to deliver value.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 对您的目标保持诚实将帮助您快速聚焦于最有可能带来价值的计划。
- en: 'Decision flowchart: which plan fits your needs?'
  id: totrans-210
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 决策流程图：哪个计划适合您的需求？
- en: 'To help visualize your decision, see the following flowchart, which guides
    you through questions about usage, environment, and feature needs:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您可视化决策，请参阅以下流程图，它将引导您了解有关使用、环境和功能需求的问题：
- en: '![Figure 3.5: Plan decision flowchart](img/B34107_03_5.png)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图3.5：计划决策流程图](img/B34107_03_5.png)'
- en: 'Figure 3.5: Plan decision flowchart'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.5：计划决策流程图
- en: 'For a quick reference, see the following table:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 为了快速参考，请参阅以下表格：
- en: '| Scenario/requirement | Recommended plan |'
  id: totrans-215
  prefs: []
  type: TYPE_TB
  zh: '| 场景/需求 | 推荐计划 |'
- en: '| Learning, teaching, or open source work | Free |'
  id: totrans-216
  prefs: []
  type: TYPE_TB
  zh: '| 学习、教学或开源工作 | 免费版 |'
- en: '| Individual developer, personal/freelance use | Pro |'
  id: totrans-217
  prefs: []
  type: TYPE_TB
  zh: '| 个人开发者，个人/自由职业者使用 | Pro |'
- en: '| Need premium models or Agent Mode | Pro+ |'
  id: totrans-218
  prefs: []
  type: TYPE_TB
  zh: '| 需要高级模型或代理模式 | Pro+ |'
- en: '| Team management and policy controls | Business |'
  id: totrans-219
  prefs: []
  type: TYPE_TB
  zh: '| 团队管理和策略控制 | 商业版 |'
- en: '| Org-wide automation, compliance, and audit | Enterprise |'
  id: totrans-220
  prefs: []
  type: TYPE_TB
  zh: '| 组织范围内的自动化、合规性和审计 | 企业 |'
- en: 'Figure 3.6: Table mapping scenarios to plans.'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.6：将场景映射到计划的表格。
- en: Best practices for choosing
  id: totrans-222
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择最佳实践
- en: 'Selecting the right GitHub Copilot plan is easier when you take a thoughtful,
    flexible approach. Consider these best practices:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 选择正确的GitHub Copilot计划更容易，如果您采取深思熟虑、灵活的方法。考虑以下最佳实践：
- en: '**Review needs annually** : As GitHub Copilot evolves, your requirements may
    change. Revisit your plan choice to ensure ongoing value.'
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每年审查需求**：随着GitHub Copilot的发展，您的需求可能会发生变化。重新审视您的计划选择，以确保持续的价值。'
- en: '**Test with a pilot group** : Organizations may start with a handful of users
    to validate fit before scaling up.'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**试点组测试**：组织可能从少数用户开始，以验证适用性后再进行扩展。'
- en: '**Stay up to date** : Feature sets and plan boundaries shift over time. Regularly
    consult GitHub’s Copilot documentation ( [https://github.com/features/copilot](https://github.com/features/copilot)
    ) before renewing or expanding licenses.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保持最新状态**：功能集和计划边界会随着时间的推移而变化。在续订或扩展许可证之前，定期查阅GitHub的Copilot文档（[https://github.com/features/copilot](https://github.com/features/copilot)）。'
- en: '**Factor in future growth** : If you anticipate growth, select a plan that
    allows easy upgrades without workflow disruptions. For example, a small start-up
    might begin with a Business plan for 10 developers, but as the team expands, choosing
    a plan that supports seamless seat additions and quick upgrades ensures that everyone
    can access Copilot without delays or administrative headaches.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**考虑未来增长**：如果您预期会增长，请选择一个允许轻松升级而不会中断工作流程的计划。例如，一家小型初创公司可能从为10名开发者设计的商业计划开始，但随着团队的扩大，选择一个支持无缝座位增加和快速升级的计划可以确保每个人都能无延迟地访问Copilot，而不会出现管理上的麻烦。'
- en: By starting with your goals and working through these scenarios, you can confidently
    select the plan that fits your needs, and be ready to adjust as your usage or
    organization evolves. But selecting a GitHub Copilot plan is just the first step
    – your needs and priorities may evolve as your team grows, your projects expand,
    or your organization’s security requirements change. Switching plans or adjusting
    seat counts doesn’t have to be disruptive, but it does require a thoughtful approach
    to ensure everyone retains access to the right features and you avoid unnecessary
    costs.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 通过从您的目标开始，并处理这些场景，您可以自信地选择适合您需求的计划，并准备好根据您的使用或组织的发展进行调整。但选择GitHub Copilot计划只是第一步——随着您的团队壮大、项目扩展或组织的安全要求发生变化，您的需求和优先级可能会演变。切换计划或调整座位数量不必造成干扰，但它确实需要一种深思熟虑的方法，以确保每个人都能访问正确的功能，并避免不必要的成本。
- en: Next, we will show simple ways to handle upgrades, downgrades, and plan migrations,
    so access stays steady and costs stay in check.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将展示处理升级、降级和计划迁移的简单方法，以确保访问保持稳定，成本得到控制。
- en: Staying up to date with recent and upcoming changes
  id: totrans-230
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 保持对最新和即将到来的变化的关注
- en: GitHub Copilot is a rapidly evolving product. As new AI models, features, and
    security requirements emerge, plans and capabilities are updated frequently. What’s
    available today may expand or change tomorrow. To get the most out of your subscription
    and avoid unexpected limitations or billing changes, it’s important to stay informed
    about recent updates and what’s on the horizon. We’ll discuss how to stay connected
    to the GitHub Copilot community and keep up with new developments in a later chapter.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: GitHub Copilot是一个快速发展的产品。随着新的AI模型、功能和安全要求的出现，计划和功能会频繁更新。今天可用的内容明天可能会扩展或改变。为了充分利用您的订阅并避免意外的限制或账单变动，了解最新的更新和即将到来的变化非常重要。我们将在后面的章节中讨论如何保持与GitHub
    Copilot社区的连接，并跟上新发展的步伐。
- en: Where to find the latest information
  id: totrans-232
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何找到最新信息
- en: 'Because GitHub Copilot’s capabilities and licensing details can shift rapidly,
    the best way to stay current is to check official sources regularly:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 由于GitHub Copilot的功能和许可细节可能会迅速变化，保持最新的最佳方式是定期检查官方来源：
- en: '**GitHub Copilot feature comparison table** ( [https://github.com/features/copilot](https://github.com/features/copilot)
    ): This page is updated with each major feature or plan change, providing the
    most reliable overview of what’s included in each plan.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub Copilot功能比较表**（[https://github.com/features/copilot](https://github.com/features/copilot)）：该页面会随着每个主要功能或计划变更而更新，提供每个计划包含内容的最可靠概述。'
- en: '**Release notes and GitHub Changelog** ( [https://github.blog/changelog/](https://github.blog/changelog/)
    ): The GitHub Changelog includes updates on new features, model changes, and preview
    program announcements.'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**发布说明和GitHub变更日志**（[https://github.blog/changelog/](https://github.blog/changelog/)）：GitHub变更日志包括新功能、模型变更和预览计划公告的更新。'
- en: '**GitHub Copilot updates site by Xebia** ( [https://github-copilot.xebia.ms/](https://github-copilot.xebia.ms/)
    ): This resource offers curated updates, tips, and guides tailored for real-world
    teams.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Xebia的GitHub Copilot更新网站**（[https://github-copilot.xebia.ms/](https://github-copilot.xebia.ms/)）：此资源提供针对现实世界团队的精选更新、技巧和指南。'
- en: '**In-product notifications** ( [https://github.com/features/copilot](https://github.com/features/copilot)
    ): Watch for notifications in GitHub.com, the GitHub Copilot sidebar, or your
    IDE, as GitHub often announces new features or changes directly in the tools.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品内通知**（[https://github.com/features/copilot](https://github.com/features/copilot)）：注意
    GitHub.com、GitHub Copilot 侧边栏或您的 IDE 中的通知，因为 GitHub 经常在工具中直接宣布新功能或变更。'
- en: '**GitHub Next** ( [https://githubnext.com/](https://githubnext.com/) ): GitHub
    Next is an innovation lab within GitHub that explores and prototypes new ideas
    for the future of software development. This initiative brings together engineers,
    researchers, and designers to experiment with emerging technologies, develop cutting-edge
    tools, and share concepts that could shape the next generation of developer workflows.'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GitHub Next**（[https://githubnext.com/](https://githubnext.com/)）：GitHub
    Next 是 GitHub 内部的一个创新实验室，探索和原型化软件开发未来的新想法。这个倡议汇集了工程师、研究人员和设计师，以实验新兴技术，开发尖端工具，并分享可能塑造下一代开发者工作流程的概念。'
- en: Staying prepared for upcoming features
  id: totrans-239
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备好即将推出的新功能
- en: 'As GitHub Copilot grows, you can expect a steady flow of new capabilities,
    often accompanied by changes to plan requirements, usage limits, or billing. The
    following will help you stay prepared:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 随着 GitHub Copilot 的增长，您可以期待持续的新功能流，通常伴随着计划要求、使用限制或计费的变化。以下将帮助您做好准备：
- en: '**Opt into previews** : If your work would benefit from early access, join
    GitHub preview or beta programs, or ensure that your plan (Pro+ or Enterprise)
    is eligible'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加入预览版**：如果您的作品可以从早期访问中受益，加入 GitHub 预览或测试版程序，或者确保您的计划（Pro+ 或企业版）有资格加入。'
- en: '**Engage with admin dashboards** : For organizations, monitoring usage dashboards
    can reveal when new features roll out and help spot potential adoption blockers'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参与管理仪表板**：对于组织，监控使用情况仪表板可以揭示新功能的推出时间，并帮助发现潜在的采用障碍。'
- en: '**Communicate changes** : Assign a point of contact (or “GitHub Copilot champion”)
    to monitor changes and communicate key updates to your team, so users aren’t caught
    off guard'
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沟通变更**：指派一个联系人（或“GitHub Copilot 推广者”）来监控变更并向团队传达关键更新，以免用户措手不及'
- en: '**Review policies regularly** : Especially in enterprise and regulated environments,
    review GitHub Copilot and GitHub security/compliance policies each quarter to
    make sure your setup remains compliant as options change'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期审查政策**：特别是在企业和受监管环境中，每个季度审查 GitHub Copilot 和 GitHub 安全/合规政策，以确保您的设置在选项更改时保持合规。'
- en: Common pitfalls
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见陷阱
- en: 'It’s easy to run into issues if you’re not staying current with GitHub Copilot
    updates. Here are a few pitfalls to avoid:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您不关注 GitHub Copilot 的更新，很容易遇到问题。以下是一些需要避免的陷阱：
- en: '**Relying on outdated info** : Making decisions based on blog posts or documentation
    that’s even a few months old can lead to missing out on important new features.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**依赖过时信息**：基于甚至几个月前的博客文章或文档做出决策可能导致错过重要的新功能。'
- en: '**Assuming preview features are permanent** : Preview or early access features
    may change, move to higher tiers, or even be discontinued. Build workflows that
    are resilient to change.'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假设预览功能是永久的**：预览或早期访问功能可能会更改、转移到更高等级，甚至被取消。构建能够适应变化的流程。'
- en: '**Overlooking communication** : Not all changes are highlighted in newsletters
    or announcements. Actively monitoring official sources is the only way to be sure
    you’re up to date.'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽视沟通**：并非所有变更都在通讯或公告中突出显示。积极监控官方来源是确保您保持更新的唯一方法。'
- en: Bookmark the GitHub Copilot feature page ( [https://github.com/features/copilot](https://github.com/features/copilot)
    ) and check it before making any major purchasing, adoption, or workflow decisions.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 将 GitHub Copilot 功能页面（[https://github.com/features/copilot](https://github.com/features/copilot)）加入书签，并在做出任何重大采购、采用或工作流程决策之前查看。
- en: Staying up to date ensures that you’re making the most of this tool – maximizing
    value, minimizing risk, and taking advantage of the latest AI-driven development
    capabilities. Now, let’s take a look at the considerations when upgrading or downgrading
    your plan.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 保持最新状态确保您充分利用这个工具——最大化价值，最小化风险，并利用最新的 AI 驱动开发能力。现在，让我们看看在升级或降级您的计划时需要考虑的事项。
- en: Upgrading, downgrading, and change management
  id: totrans-252
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 升级、降级和变更管理
- en: As your needs change, whether you’re growing a team, seeking advanced features,
    or looking to control costs, you may need to adjust your GitHub Copilot plan.
    Licensing is flexible, but it’s important to manage transitions thoughtfully to
    avoid interruptions, loss of access, or confusion among users. This section explains
    how upgrades and downgrades work, outlines best practices for managing change,
    and highlights common pitfalls to help you maintain a smooth experience.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 随着您的需求变化，无论是扩大团队、寻求高级功能还是希望控制成本，您可能需要调整您的GitHub Copilot计划。许可灵活，但重要的是要深思熟虑地管理过渡，以避免中断、访问丢失或用户之间的混淆。本节解释了升级和降级的工作原理，概述了管理变化的最佳实践，并突出了常见陷阱，以帮助您保持顺畅的体验。
- en: Upgrading your GitHub plan
  id: totrans-254
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 升级您的GitHub计划
- en: 'Upgrading typically unlocks new features, increases usage quotas, or extends
    access to premium models and automation tools. Here’s how the upgrade process
    works and what you can expect when moving to a higher GitHub Copilot plan:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 升级通常可以解锁新功能、增加使用配额或扩展对高级模型和自动化工具的访问。以下是升级流程以及您在迁移到更高版本的GitHub Copilot计划时可以期待的内容：
- en: '**Instant access** : Most upgrades (e.g., moving from Pro to Pro+ or from Business
    to Enterprise) take effect immediately. As soon as the upgrade is processed, users
    gain access to new features such as higher premium request quotas and advanced
    models.'
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**即时访问**：大多数升级（例如，从专业版升级到专业版+或从商业版升级到企业版）立即生效。一旦升级处理完成，用户即可获得新的功能，例如更高的保险费请求配额和高级模型。'
- en: '**Billing adjustments** : Upgrading may trigger a prorated charge for the remainder
    of your billing cycle. If you upgrade mid-month, you’ll only be billed for the
    time remaining.'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**账单调整**：升级可能会触发对账周期剩余部分的按比例收费。如果您在月中升级，您只需为剩余时间付费。'
- en: '**Admin controls** : For organizations, admins can bulk upgrade seats through
    the GitHub organization settings. Always communicate with your team before rolling
    out new features to avoid confusion.'
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**管理员控制**：对于组织，管理员可以通过GitHub组织设置批量升级座位。在推出新功能之前，始终与您的团队沟通，以避免混淆。'
- en: Downgrading or canceling your plan
  id: totrans-259
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 降级或取消您的计划
- en: 'Downgrading to a lower-tier plan or canceling entirely is possible at any time,
    but it’s important to understand the immediate effects. Here’s what happens when
    you downgrade or cancel your GitHub Copilot plan, so you know what to expect:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 降级到较低级别的计划或完全取消在任何时候都是可能的，但了解即时影响很重要。以下是您降级或取消GitHub Copilot计划时会发生的情况，以便您知道可以期待什么：
- en: '**Feature loss** : Downgrading will result in the immediate loss of premium
    features not included in your new plan. For example, moving from Pro+ to Pro reduces
    premium request quotas and limits the availability of advanced models. These changes
    take effect right away, and users may notice the difference immediately.'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**功能丢失**：降级将导致立即丢失新计划中不包括的高级功能。例如，从专业版+降级到专业版会减少保险费请求配额并限制高级模型的可访问性。这些变化立即生效，用户可能会立即注意到差异。'
- en: '**Quota resets** : Any unused premium requests or admin dashboard features
    will no longer be available after the downgrade.'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**配额重置**：任何未使用的保险费请求或管理仪表板功能在降级后将不再可用。'
- en: '**Billing** : Downgrades often take effect at the end of your current billing
    period, but some features are removed immediately. Always check your organization’s
    billing portal for specifics.'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**账单**：降级通常在您当前的账单周期结束时生效，但某些功能会立即被移除。请始终检查您组织的账单门户以获取具体信息。'
- en: As a best practice, notify users ahead of a planned downgrade, especially if
    workflows rely on advanced features. Provide clear communication and, if possible,
    a support channel for any transition issues.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一项最佳实践，在计划降级之前通知用户，特别是如果工作流程依赖于高级功能。提供清晰的沟通，并在可能的情况下，为任何过渡问题提供支持渠道。
- en: Migrating between individual and organizational plans
  id: totrans-265
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在个人和组织计划之间迁移
- en: 'Sometimes, users start with individual licenses and later migrate to an organizational
    (Business or Enterprise) plan, or vice versa. Here are some tips on migration:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，用户开始使用个人许可证，后来迁移到组织（商业或企业）计划，反之亦然。以下是一些迁移提示：
- en: '**License transfer** : When moving users from personal to organizational plans,
    ensure that seats are allocated correctly in the GitHub organization. Personal
    licenses should be canceled to avoid double-billing.'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**许可证转移**：在将用户从个人计划迁移到组织计划时，请确保在GitHub组织中正确分配座位。应取消个人许可证以避免双重收费。'
- en: '**Data continuity** : While GitHub Copilot suggestions and settings are tied
    to your GitHub account, organizational policies and usage analytics are managed
    centrally. No user code is lost, but access to admin dashboards or compliance
    settings may change.'
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据连续性**：虽然GitHub Copilot的建议和设置与您的GitHub账户相关联，但组织政策和使用分析是集中管理的。用户代码不会丢失，但访问管理仪表板或合规设置可能会改变。'
- en: '**Seamless onboarding** : Use bulk invite and user provisioning tools to streamline
    large-scale migrations.'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无缝入职**：使用批量邀请和用户配置工具来简化大规模迁移。'
- en: Change management best practices
  id: totrans-270
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 变更管理最佳实践
- en: 'Changing plans, especially at scale, can cause confusion if not managed carefully.
    Here are some best practices:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不谨慎管理，改变计划，尤其是在规模较大的情况下，可能会导致混淆。以下是一些最佳实践：
- en: '**Plan ahead** : Schedule plan changes during periods of low activity or outside
    of critical project deadlines'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提前规划**：在低活动期或关键项目截止日期之外安排计划变更'
- en: '**Communicate clearly** : Inform all affected users of what’s changing, when
    it will happen, and what features may be gained or lost'
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**明确沟通**：通知所有受影响的用户将发生什么变化，何时发生，以及可能获得或失去的功能'
- en: '**Offer training** : If new features are being introduced, provide training
    or resources to help users make the most of them'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供培训**：如果正在引入新功能，提供培训或资源以帮助用户充分利用它们'
- en: '**Monitor usage** : After any change, keep an eye on usage dashboards to spot
    issues early and gather feedback for further adjustments'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控使用情况**：在任何变更之后，关注使用仪表板以尽早发现问题并收集反馈以进行进一步调整'
- en: Common pitfalls
  id: totrans-276
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见陷阱
- en: 'Downgrading or changing plans can introduce a few common problems if you’re
    not careful. Watch out for these pitfalls:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不谨慎，降级或更改计划可能会引入一些常见问题。请注意以下陷阱：
- en: '**Sudden feature loss** : Downgrading without warning can interrupt ongoing
    work, especially if users depend on features such as more premium requests or
    advanced models'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**突然失去功能**：未提前通知的降级可能会中断正在进行的工作，尤其是如果用户依赖于更多高级请求或高级模型等功能'
- en: '**Double-billing** : Forgetting to cancel individual plans when moving to an
    organizational license can result in paying twice for the same users'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**双重收费**：在迁移到组织许可证时忘记取消个人计划可能会导致为同一用户支付两次费用'
- en: '**Seat mismanagement** : Not reclaiming unused seats after organizational changes
    wastes budget'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**座位管理不当**：在组织变更后不回收未使用的座位会浪费预算'
- en: '**Inadequate communication** : Users caught off guard by feature or policy
    changes are more likely to experience frustration or productivity dips'
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沟通不足**：被功能或政策变化搞得措手不及的用户更有可能经历挫败感或生产力下降'
- en: Document your licensing policies internally and make sure both admins and users
    know how to request changes or report issues. GitHub’s official docs are always
    the best place to check for process updates and plan-specific details.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 在内部记录您的许可政策，并确保管理员和用户都知道如何请求更改或报告问题。GitHub的官方文档始终是检查流程更新和计划特定细节的最佳位置。
- en: Handled well, plan changes and migrations are a routine part of scaling GitHub
    Copilot use. By taking a structured approach, you can ensure a smooth transition
    and continued productivity.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 如果处理得当，计划变更和迁移是扩展GitHub Copilot使用的常规部分。通过采取结构化方法，您可以确保平稳过渡并保持持续的生产力。
- en: As you settle into your chosen GitHub Copilot plan, it is important to remember
    that both the product and its licensing options are always evolving. New features
    are introduced, model access and quotas may change, and pricing structures can
    be updated as GitHub responds to user needs and developments in AI technology.
    Keeping yourself informed is the best way to make sure your team continues to
    benefit from Copilot and avoids any surprises or disruptions.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 当您适应所选的GitHub Copilot计划时，重要的是要记住，产品和其许可选项始终在不断发展。新功能被引入，模型访问和配额可能会改变，并且价格结构可能会根据GitHub对用户需求和AI技术发展的响应而更新。保持自身信息更新是确保您的团队能够继续从Copilot中受益并避免任何意外或中断的最佳方式。
- en: In the next section, we will explore the practical dashboards and key metrics
    available for tracking usage.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨可用于跟踪使用的实际仪表板和关键指标。
- en: Usage dashboards and monitoring
  id: totrans-286
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用仪表板和监控
- en: Once GitHub Copilot is deployed, visibility into how it’s being used is essential.
    Monitoring usage helps you understand adoption, uncover opportunities for training
    or optimization, and ensure that you’re not running into quota or billing surprises.
    In this section, we introduce several dashboards and monitoring tools, explain
    what insights they provide, and show how to leverage them for better outcomes.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
- en: All of the data shown in these dashboards comes from the **GitHub Copilot Metrics
    API** , which you can query directly to build your own custom views or integrate
    usage data into internal reporting systems.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
- en: Consumption Metrics dashboard
  id: totrans-289
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Consumption Metrics dashboard is an example of Xebia-developed tooling that
    demonstrates how GitHub Copilot usage metrics can be displayed in a clear and
    actionable way. While this dashboard is especially valuable for organization administrators
    and team leads, it can also help individuals understand their own engagement with
    GitHub Copilot. Keep in mind that these metrics focus on how often and in what
    ways users interact with GitHub Copilot, not direct measures of productivity.
    The dashboard is best used to visualize adoption trends and patterns, offering
    insights into how GitHub Copilot fits into your team’s overall workflow rather
    than attempting to quantify output or performance.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you can expect to find on the Consumption Metrics dashboard and
    how to interpret the key metrics:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
- en: '**Lines not accepted versus lines accepted** : A key metric for understanding
    impact is the comparison between lines suggested and accepted versus lines suggested
    but not accepted. This data reveals not just how often GitHub Copilot is helping,
    but also where its suggestions may be missing the mark.'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lines accepted** : Shows the number of GitHub Copilot-suggested lines that
    developers chose to keep in their code. High acceptance often means its output
    is aligned with coding standards and user intent. Keep in mind that this metric
    only shows complete acceptances of suggestions, so when there are 10 lines suggested
    by GitHub Copilot and the user accepts only 3, this metric will show 0.'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lines not accepted** : Reflects suggestions that were dismissed, skipped,
    or overwritten by the developer. High numbers here can highlight opportunities
    for prompt improvement, misalignment with project patterns, or areas where it’s
    less effective.'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regularly reviewing both accepted and not accepted lines helps teams pinpoint
    where the tool excels and where there may be friction. If a particular file, project
    area, or language shows consistently low acceptance rates, it might be time to
    revisit prompt engineering strategies or provide targeted training.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.7: Lines not accepted versus lines accepted](img/B34107_03_7.png)'
  id: totrans-296
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3.7: Lines not accepted versus lines accepted'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
- en: '**To view this image in color**'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 使用随购买附赠的免费彩色PDF版。有关详细信息，请参阅[*前言*](Preface.xhtml#_idTextAnchor004)中的“*随书免费优惠*”部分。
- en: '**Lines suggested per language** : Shows which programming languages are seeing
    the most GitHub Copilot-generated suggestions. This helps teams identify where
    it’s making the biggest impact and which languages may benefit from further training.'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**按语言建议的行数**：显示哪些编程语言看到了最多的GitHub Copilot生成的建议。这有助于团队确定它产生最大影响的地方以及可能从进一步培训中受益的语言。'
- en: '**Percentage lines accepted per language** : Measures how often users accept
    GitHub Copilot’s suggestions, broken down by language. High acceptance rates may
    indicate that the tool is well-calibrated to your code base and practices, while
    lower rates might suggest a need for prompt refinement or additional training.'
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**按语言接受的行数百分比**：衡量用户接受GitHub Copilot建议的频率，按语言细分。高接受率可能表明该工具已很好地校准到您的代码库和实践，而较低的接受率可能表明需要改进提示或额外培训。'
- en: '![Figure 3.8: Lines accepted per language](img/B34107_03_8.png)'
  id: totrans-302
  prefs: []
  type: TYPE_IMG
  zh: '![图3.8：按语言接受的行数](img/B34107_03_8.png)'
- en: 'Figure 3.8: Lines accepted per language'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.8：按语言接受的行数
- en: '**IDEs used per day** : Tracks which **integrated development environments**
    ( **IDEs** ) are active each day. This data can highlight adoption trends, help
    troubleshoot onboarding issues, and reveal which environments are most popular
    among your users.'
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**按日使用的IDE**：跟踪每天哪些**集成开发环境**（**IDE**）处于活跃状态。这些数据可以突出采用趋势，帮助解决入职问题，并揭示哪些环境在您的用户中最受欢迎。'
- en: '![A graph with different colored bars  AI-generated content may be incorrect.](img/B34107_03_9.png)Figure
    3.9: IDEs used per day'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: '![包含不同颜色条形的图表 AI生成的内容可能不正确](img/B34107_03_9.png)图3.9：每天使用的IDE'
- en: '**Total engaged users for IDE ask** : Shows how many users are actively engaging
    with GitHub Copilot’s **ask** feature, providing insight into how conversational
    AI is being adopted as part of your development workflow.'
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**IDE询问的参与用户总数**：显示有多少用户正在积极与GitHub Copilot的**询问**功能互动，提供了关于对话式AI作为您开发工作流程一部分的采用情况的见解。'
- en: '![A graph of a number of people  AI-generated content may be incorrect.](img/B34107_03_10.png)Figure
    3.10: Total active versus engaged users per day'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: '![人数图表 AI生成的内容可能不正确](img/B34107_03_10.png)图3.10：每天的总活跃用户与参与用户数'
- en: '**To view this image in color**'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: '**查看此图像的彩色版本**'
- en: Use the free color PDF edition included with your purchase. Refer to the *Free
    Benefits with Your Book* section in the [*Preface*](Preface.xhtml#_idTextAnchor004)
    for details.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 使用随购买附赠的免费彩色PDF版。有关详细信息，请参阅[*前言*](Preface.xhtml#_idTextAnchor004)中的“*随书免费优惠*”部分。
- en: Regularly reviewing this dashboard can help you spot adoption gaps, optimize
    onboarding, and identify where GitHub Copilot is delivering the most value or
    where additional support or training may be needed.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 定期审查此仪表板可以帮助您发现采用差距，优化入职流程，并确定GitHub Copilot提供最大价值的地方或可能需要额外支持或培训的地方。
- en: 'It’s tempting to treat dashboard stats, such as lines suggested or acceptance
    rates, as a direct measure of developer productivity, but it’s rarely that simple.
    Writing more code does not always mean writing better code, and high Copilot usage
    does not guarantee faster or higher-quality results. These dashboards are best
    used to spot adoption trends, identify coaching opportunities, and make sure people
    are not running into limits or blockers. For meaningful productivity insights,
    look beyond the raw numbers and focus on the stories behind the data. Are developers
    shipping valuable features? Is Copilot making repetitive tasks easier? Are teams
    collaborating more effectively? For a broader framework on measuring and improving
    engineering outcomes, see the *GitHub Engineering System Success Playbook* : [https://resources.github.com/engineering-system-success-playbook](https://resources.github.com/engineering-system-success-playbook)
    . Use the dashboards as a conversation starter rather than a final verdict on
    performance.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易将仪表板统计数据，如建议的行数或接受率，视为开发者生产力的直接衡量标准，但事实很少如此简单。编写更多的代码并不总是意味着编写更好的代码，而且高Copilot使用率并不能保证更快或更高品质的结果。这些仪表板最好用于发现采用趋势、识别辅导机会并确保人们不会遇到限制或障碍。对于有意义的生产力洞察，要超越原始数字，关注数据背后的故事。开发者是否在交付有价值的特性？Copilot是否使重复性任务更容易？团队是否更有效地协作？有关衡量和改进工程成果的更广泛框架，请参阅*GitHub工程系统成功手册*：[https://resources.github.com/engineering-system-success-playbook](https://resources.github.com/engineering-system-success-playbook)。将仪表板用作对话的起点，而不是对绩效的最终评判。
- en: Premium Requests Usage Analyzer
  id: totrans-312
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级请求使用分析器
- en: As premium requests become central to GitHub Copilot’s billing and advanced
    feature access, tracking their consumption is crucial for organizations and power
    users.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 随着高级请求成为GitHub Copilot计费和高级功能访问的核心，跟踪它们的消费对于组织和高级用户至关重要。
- en: The **Premium Requests Usage Analyzer** is a dashboard developed by Xebia to
    give organizations and power users a transparent view of how premium requests
    are being consumed within GitHub Copilot. By surfacing usage data across users,
    teams, and entire organizations, this tool helps you keep track of advanced feature
    consumption, identify trends, and make informed decisions about licensing and
    workflow optimization. For more details or to try it yourself, visit the dashboard
    online at [https://xebia.github.io/github-copilot-premium-reqs-usage/](https://xebia.github.io/github-copilot-premium-reqs-usage/)
    .
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: '**高级请求使用分析器**是由Xebia开发的一个仪表板，旨在为组织和高级用户提供一个透明的视角，了解GitHub Copilot中高级请求的使用情况。通过展示用户、团队和整个组织的使用数据，这个工具帮助您跟踪高级功能的使用情况，识别趋势，并就许可和工作流程优化做出明智的决策。有关更多详情或尝试使用，请访问仪表板在线[https://xebia.github.io/github-copilot-premium-reqs-usage/](https://xebia.github.io/github-copilot-premium-reqs-usage/)。'
- en: 'Here’s what the Premium Requests Usage Analyzer tracks and how it can help
    you manage advanced Copilot features:'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 这是高级请求使用分析器跟踪的内容以及它如何帮助您管理高级Copilot功能：
- en: '**Premium requests usage by user, team, or org** : It provides detailed statistics
    on how many premium requests have been used, who’s using them, and which features
    or models are driving that consumption.'
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**按用户、团队或组织的高级请求使用情况**：它提供了关于已使用多少高级请求、谁在使用它们以及哪些功能或模型推动了这种消费的详细统计数据。'
- en: '**Chat turn analytics** : Every interaction with a premium model (a “chat turn”)
    deducts from your monthly premium request quota. The analyzer helps you understand
    usage patterns and forecast when quotas may be reached.'
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聊天轮次分析**：与高级模型（“聊天轮次”）的每次互动都会从您的月度高级请求配额中扣除。分析器帮助您了解使用模式并预测何时可能达到配额。'
- en: '**Trends and anomalies** : It spots spikes in usage that might indicate a shift
    in workflow or possible misuse, enabling proactive management of your investment.'
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**趋势和异常**：它能够发现使用量的峰值，这可能表明工作流程发生了变化或可能存在误用，从而能够主动管理您的投资。'
- en: '![A screen shot of a graph  AI-generated content may be incorrect.](img/B34107_03_11.png)Figure
    3.11: Premium Requests Usage Analyzer dashboard'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: '![图表截图 AI生成的内容可能不正确。](img/B34107_03_11.png)图3.11：高级请求使用分析仪表板'
- en: Before you can use the GitHub Copilot Premium Requests Usage Analyzer dashboard,
    you must first export your organization’s usage data to a CSV file. To do this,
    navigate to **Organization** | **Settings** | **Billing and Licensing** | **Usage**
    | **Get Usage Report** . From there, select **Copilot Premium Requests Usage Report**
    to download the required CSV. Once you have this file, upload it to the analyzer
    dashboard to visualize and track your premium request consumption. Keep in mind
    that this export only shows the current billing period, so you need to store it
    for longer-term trend analysis.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 在您可以使用GitHub Copilot高级请求使用分析仪表板之前，您必须首先将组织的使用数据导出为CSV文件。为此，导航到**组织** | **设置**
    | **计费和许可** | **使用情况** | **获取使用报告**。从那里，选择**Copilot高级请求使用报告**以下载所需的CSV文件。一旦您有了这个文件，将其上传到分析仪表板以可视化和跟踪您的高级请求消费。请注意，此导出仅显示当前计费周期，因此您需要将其存储以进行长期趋势分析。
- en: Regular monitoring helps you avoid running out of premium requests mid-cycle,
    and historical data supports better decisions around upgrading, downgrading, or
    reallocating seats.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 定期监控可以帮助您避免在周期中途耗尽高级请求，历史数据支持在升级、降级或重新分配座位方面的更好决策。
- en: Updates site by Xebia
  id: totrans-322
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网站更新由Xebia完成
- en: For organizations or admins wanting a curated view of all the latest GitHub
    Copilot features, known issues, and real-world tips, the updates site by Xebia
    ( [https://github-copilot.xebia.ms/](https://github-copilot.xebia.ms/) ) offers
    a valuable supplement to GitHub’s official dashboards.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 对于希望查看所有最新GitHub Copilot功能、已知问题和实际技巧的组织或管理员，Xebia的更新网站（[https://github-copilot.xebia.ms/](https://github-copilot.xebia.ms/)）提供了对GitHub官方仪表板的宝贵补充。
- en: This site tracks feature releases, previews, bug fixes, and practical usage
    guidance. It’s an excellent resource for “GitHub Copilot champions” who manage
    rollouts or training and want to keep teams updated without having to sift through
    changelogs. You should
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 该网站跟踪功能发布、预览、错误修复和实用使用指南。它是“GitHub Copilot的倡导者”的绝佳资源，他们管理推出或培训，并希望在不筛选更改日志的情况下保持团队更新。您应该
- en: bookmark the link as a quick reference for feature rollouts, major migrations,
    or onboarding sessions.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 将链接作为功能推出、主要迁移或入职会议的快速参考。
- en: Best practices for dashboard use
  id: totrans-326
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 仪表板使用最佳实践
- en: 'To get the most value from your usage dashboards, keep these best practices
    in mind:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 要从您的使用仪表板中获得最大价值，请记住以下最佳实践：
- en: '**Set up regular reviews** : For teams and organizations, review usage dashboards
    at least monthly to catch trends and address issues early'
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定期进行审查**：对于团队和组织，至少每月审查一次使用仪表板，以捕捉趋势和及早解决问题'
- en: '**Share insights** : Use data from the dashboards to celebrate wins (e.g.,
    high acceptance rates), identify GitHub Copilot champions, and target training
    where adoption lags'
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分享见解**：使用仪表板中的数据来庆祝胜利（例如，高接受率），识别GitHub Copilot的倡导者，并针对采用率较低的区域进行培训'
- en: '**Integrate with onboarding** : Use IDE and *ask* activity data to help new
    users get started and spot those who may need extra help'
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成到入职流程中**：使用IDE和*询问*活动数据，帮助新用户入门并发现可能需要额外帮助的人'
- en: '**Watch for bottlenecks** : Premium request dashboards can help avoid the surprise
    of running out of advanced model access during a critical sprint or demo'
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注意瓶颈**：高级模型访问请求仪表板可以帮助避免在关键冲刺或演示期间出现访问不足的惊喜'
- en: Common pitfalls
  id: totrans-332
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见陷阱
- en: 'It’s easy to overlook important signals when using dashboards. Watch out for
    these common pitfalls:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 使用仪表板时，很容易忽略重要信号。注意这些常见陷阱：
- en: '**Not monitoring at all** : Without regular dashboard reviews, it’s easy to
    miss low adoption, overuse of premium requests, or missed opportunities for workflow
    improvement'
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全不监控**：没有定期的仪表板审查，很容易错过低采用率、高级请求过度使用或错失改进工作流程的机会'
- en: '**Focusing only on totals** : Dig into the details – per language, per team,
    and per feature – to identify where it’s most and least effective'
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**只关注总数**：深入了解细节——按语言、按团队和按功能——以确定最有效和最无效的地方'
- en: '**Ignoring trends** : Sudden drops in usage or acceptance may signal an onboarding
    issue, prompt changes, or technical blockers that need immediate attention'
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽略趋势**：使用量或接受度的突然下降可能表明入职问题、需要立即注意的变更或技术障碍'
- en: Don’t wait until users complain about quotas or missing features. Use dashboards
    proactively to spot and address issues before they disrupt development.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 不要等到用户抱怨配额或缺少功能时才行动。积极使用仪表板来发现和解决问题，以免它们干扰开发。
- en: By leveraging these dashboards and monitoring tools, you can maximize the value
    of GitHub Copilot, provide targeted support to your teams, and ensure a smooth,
    cost-effective AI-powered development experience.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用这些仪表板和监控工具，你可以最大化GitHub Copilot的价值，为你的团队提供有针对性的支持，并确保流畅、成本效益的AI驱动开发体验。
- en: Summary
  id: totrans-339
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned how GitHub Copilot licensing works as of October
    2025 across Free, Pro, Pro+, Business, and Enterprise. You saw what each plan
    includes, how premium requests and model access differ by tier, where limits and
    restrictions apply, how pricing and prorated billing work, and how to choose a
    plan using real scenarios and a practical decision guide. You also reviewed upgrade
    and downgrade paths and learned how to track adoption with usage dashboards.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你了解了截至2025年10月，GitHub Copilot的许可在免费、Pro、Pro+、商务和企业之间的运作方式。你看到了每个计划包含的内容，高级请求和模型访问如何按级别不同，限制和限制在哪里适用，定价和按比例计费是如何工作的，以及如何使用实际场景和实用决策指南来选择计划。你还回顾了升级和降级路径，并学习了如何通过使用仪表板来跟踪采用情况。
- en: By understanding the licensing landscape, you can select the right plan, maximize
    your return on investment, and keep your team or organization working efficiently.
    As GitHub Copilot continues to grow, return to this chapter and the resources
    linked here to ensure that you’re always making informed, up-to-date decisions.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 通过了解许可环境，你可以选择正确的计划，最大化投资回报，并确保你的团队或组织高效工作。随着GitHub Copilot的持续发展，请返回本章和这里链接的资源，以确保你始终做出明智的、最新的决策。
- en: As you’ve seen, selecting the right plan is only the beginning. How you use
    the tool in your daily workflow is just as important. Now that you have a clear
    understanding of licensing, it’s time to explore what GitHub Copilot can actually
    do inside your favorite development environments.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所看到的，选择正确的计划只是开始。你在日常工作中如何使用这个工具同样重要。现在你已经清楚地了解了许可情况，是时候探索GitHub Copilot在你的首选开发环境中的实际功能了。
- en: In the next chapter, we’ll take a closer look at the essential features that
    make GitHub Copilot a powerful coding companion. From code completions and inline
    suggestions to natural language edits and Agent Mode, you’ll learn how these tools
    work within popular IDEs and how to make the most of them in your everyday development.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将更详细地探讨使GitHub Copilot成为强大编码伴侣的基本功能。从代码补全和内联建议到自然语言编辑和代理模式，你将了解这些工具如何在流行的IDE中工作，以及如何在日常开发中充分利用它们。
- en: Frequently asked questions
  id: totrans-344
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 常见问题
- en: '**Q: Which plan is right for me or my team?**'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: '**Q: 哪个计划适合我或我的团队？**'
- en: 'A: If you’re a student, educator, or OSS maintainer, start with the Free plan.
    For individual professional use, Pro is usually sufficient. Upgrade to Pro+ for
    premium models and a higher premium requests quota. For teams needing policy controls,
    dashboards, and centralized billing, Business is best. Enterprise is the clear
    choice for organizations requiring top-tier security, compliance, and automation.'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 如果你是一名学生、教育工作者或开源软件维护者，请从免费计划开始。对于个人专业使用，通常Pro计划就足够了。升级到Pro+以获得高级模型和更高的高级请求配额。对于需要政策控制、仪表板和集中计费团队的，商务计划是最佳选择。对于需要顶级安全、合规性和自动化的组织，企业级是明确的选择。'
- en: '**Q: What are the main trade-offs between plans?**'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: '**Q: 计划之间主要的权衡是什么？**'
- en: 'A: Higher-tier plans offer more generous premium request quotas, enhanced security
    controls, and usage monitoring tools, ideal for large teams or regulated environments.
    Lower-tier plans include core features such as Agent Mode but may have reduced
    request limits and delayed access to preview models or advanced capabilities.'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 高级计划提供更慷慨的高级请求配额、增强的安全控制和使用监控工具，非常适合大型团队或受监管的环境。低级计划包括核心功能，如代理模式，但可能具有减少的请求限制和延迟访问预览模型或高级功能。'
- en: '**Q: How do I avoid unexpected billing or quota issues?**'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: '**Q: 我如何避免意外的计费或配额问题？**'
- en: 'A: Monitor usage regularly via the Metrics dashboard and Premium Requests Usage
    Analyzer. Understand how premium requests work for your plan and review billing
    settings after any upgrades or downgrades.'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 通过指标仪表板和高级请求使用分析器定期监控使用情况。了解你的计划中高级请求是如何工作的，并在任何升级或降级后审查计费设置。'
- en: '**Q: What happens if I hit a usage or premium request cap?**'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: '**Q: 如果我达到使用量或高级请求上限会发生什么？**'
- en: 'A: If you exceed your monthly premium request quota, you may temporarily lose
    access to certain advanced features, such as Copilot Extensions, code review,
    or previews of newer models (e.g., Claude or GPT-4.5). However, you’ll still have
    access to standard models such as GPT-4.1 and GPT-4o, and core features such as
    Copilot Chat, Agent Mode, and code completions will continue to work. Your quota
    resets monthly, and higher-tier plans offer more generous limits.'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：如果您超过每月高级功能请求配额，您可能会暂时失去访问某些高级功能，例如Copilot扩展、代码审查或新模型的预览（例如，Claude或GPT-4.5）。但是，您仍然可以访问标准模型，如GPT-4.1和GPT-4o，以及核心功能，如Copilot聊天、代理模式以及代码补全将继续工作。您的配额每月重置，并且更高等级的计划提供更慷慨的限制。
- en: '**Q: Can I upgrade, downgrade, or migrate plans easily?**'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: '**问：我能否轻松升级、降级或迁移计划？**'
- en: 'A: Yes. Upgrades typically take effect immediately and add features/prorated
    charges. Downgrades often apply at the end of the billing cycle and may remove
    features right away. Communicate changes to your team and plan transitions outside
    of critical project windows.'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：是的。升级通常立即生效并添加功能/按比例收费。降级通常在账单周期结束时生效，并可能立即移除功能。请与您的团队沟通变更，并在关键项目窗口之外规划过渡。
- en: '**Q: Where do I find the latest information about GitHub Copilot features and
    plans?**'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: '**问：我在哪里可以找到有关GitHub Copilot功能和计划的最新信息？**'
- en: 'A: Always check the GitHub Copilot feature comparison table at [https://github.com/features/copilot](https://github.com/features/copilot)
    , GitHub’s official changelog at [https://github.blog/changelog/](https://github.blog/changelog/)
    , and trusted community resources. Preview features and plan details may change
    frequently.'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：请始终查看GitHub Copilot功能比较表[https://github.com/features/copilot](https://github.com/features/copilot)，GitHub的官方变更日志[https://github.blog/changelog/](https://github.blog/changelog/)以及受信任的社区资源。预览功能和计划细节可能会频繁更改。
