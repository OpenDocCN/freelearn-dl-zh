  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '9'
- en: Unlock Your Book’s Exclusive Benefits
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解锁您书籍的独家权益
- en: 'Your copy of this book comes with the following exclusive benefits:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您的这本书包含以下独家权益：
- en: '![](img/cloud-computing1.png) Next-gen Packt Reader'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/cloud-computing1.png) 新一代Packt阅读器'
- en: '![](img/sparkler2.png) AI assistant (beta)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](img/sparkler2.png) AI助手（测试版）'
- en: '![](img/pdf-file.png) DRM-free PDF/ePub downloads'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/pdf-file.png) 免版税PDF/ePub下载'
- en: Use the following guide to unlock them if you haven’t already. The process takes
    just a few minutes and needs to be done only once.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您尚未解锁，请使用以下指南进行解锁。此过程只需几分钟，并且只需完成一次。
- en: How to unlock these benefits in three easy steps
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何通过三个简单步骤解锁这些权益
- en: Step 1
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤1
- en: Have your purchase invoice for this book ready, as you’ll need it in *Step 3*.
    If you received a physical invoice, scan it on your phone and have it ready as
    either a PDF, JPG, or PNG.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好您购买此书的购买发票，因为在*步骤3*中您将需要它。如果您收到的是纸质发票，请用手机扫描它，并准备好作为PDF、JPG或PNG格式。
- en: For more help on finding your invoice, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如需更多帮助查找您的发票，请访问[https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)。
- en: '**Note**: Did you buy this book directly from Packt? You don’t need an invoice.
    After completing Step 2, you can jump straight to your exclusive content.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：您是否直接从Packt购买了这本书？您不需要发票。完成步骤2后，您可以直接跳转到您的独家内容。'
- en: '|'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Step 2
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤2
- en: Scan this QR code or go to [https://packtpub.com/unlock](https://packtpub.com/unlock).
    | ![](img/Unlock2.png) |
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 扫描此二维码或访问[https://packtpub.com/unlock](https://packtpub.com/unlock)。| ![](img/Unlock2.png)
    |
- en: '| On the page that opens (which will look similar to Figure X.1 if you’re on
    desktop), search for this book by name. Make sure you select the correct edition.![A
    screenshot of a web page  AI-generated content may be incorrect.](img/Packt_unlock_landing_page.png)Figure
    X.1: Packt unlock landing page on desktop |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| 在打开的页面（如果您在桌面端，将类似于图X.1），通过书名搜索这本书。请确保您选择了正确的版本。![网页截图 AI生成的内容可能不正确。](img/Packt_unlock_landing_page.png)图X.1：桌面端Packt解锁着陆页面
    |'
- en: Step 3
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤3
- en: Once you’ve selected your book, sign in to your Packt account or create a new
    one for free. Once you’re logged in, upload your invoice. It can be in PDF, PNG,
    or JPG format and must be no larger than 10 MB. Follow the rest of the instructions
    on the screen to complete the process.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您喜欢的书籍后，请登录您的Packt账户或免费创建一个新账户。登录后，上传您的发票。它可以以PDF、PNG或JPG格式，且大小不得超过10 MB。按照屏幕上的其余说明完成此过程。
- en: '|'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Need help?
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要帮助？
- en: 'If you get stuck and need help, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    for a detailed FAQ on how to find your invoices and more. The following QR code
    will take you to the help page directly: | ![](img/Need_help.jpg) |'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到困难需要帮助，请访问[https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)获取有关如何查找发票及其他信息的详细FAQ。以下二维码将直接带您到帮助页面：|
    ![](img/Need_help.jpg) |
- en: '**Note**: If you are still facing issues, reach out to [customercare@packt.com](Chapter_9.xhtml).'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您仍然遇到问题，请联系[customercare@packt.com](Chapter_9.xhtml)。'
- en: '![](img/Packt_Logo_New.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](img/Packt_Logo_New.png)'
- en: '[packtpub.com](#_idTextAnchor304)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[packtpub.com](#_idTextAnchor304)'
- en: Subscribe to our online digital library for full access to over 7,000 books
    and videos, as well as industry leading tools to help you plan your personal development
    and advance your career. For more information, please visit our website.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 订阅我们的在线数字图书馆，即可全面访问超过7,000本书籍和视频，以及行业领先的工具，帮助您规划个人发展并提升职业生涯。如需更多信息，请访问我们的网站。
- en: Why subscribe?
  id: totrans-25
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么订阅？
- en: Spend less time learning and more time coding with practical eBooks and Videos
    from over 4,000 industry professionals
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用来自4,000多名行业专业人士的实用电子书和视频，节省学习时间，多花时间编码
- en: Improve your learning with Skill Plans built especially for you
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过为您量身定制的Skill Plans提高学习效果
- en: Get a free eBook or video every month
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每月免费获得一本电子书或视频
- en: Fully searchable for easy access to vital information
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全可搜索，便于轻松访问关键信息
- en: Copy and paste, print, and bookmark content
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制粘贴、打印和收藏内容
- en: At [www.packtpub.com](#_idTextAnchor302), you can also read a collection of
    free technical articles, sign up for a range of free newsletters, and receive
    exclusive discounts and offers on Packt books and eBooks.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在[www.packtpub.com](#_idTextAnchor302)上，您还可以阅读一系列免费技术文章，订阅各种免费通讯，并享受Packt书籍和电子书的独家折扣和优惠。
- en: Other Books You May Enjoy
  id: totrans-32
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您可能还喜欢的其他书籍
- en: 'If you enjoyed this book, you may be interested in these other books by Packt:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢这本书，您可能对Packt的其他书籍也感兴趣：
- en: '[![](img/9781835889107.jpg)](https://www.amazon.com/Domain-Driven-Refactoring-hands-transforming-microservices/dp/1835889107)'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](img/9781835889107.jpg)](https://www.amazon.com/Domain-Driven-Refactoring-hands-transforming-microservices/dp/1835889107)'
- en: '**Domain-Driven Refactoring**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**领域驱动重构**'
- en: Alessandro Colla, Alberto Acerbis
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Alessandro Colla, Alberto Acerbis
- en: 'ISBN: 978-1-83588-910-7'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 'ISBN: 978-1-83588-910-7'
- en: Find out how to recognize the boundaries of your system’s components
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解如何识别系统组件的边界
- en: Apply strategic patterns such as bounded contexts and ubiquitous language
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用如边界上下文和通用语言的策略模式
- en: Master tactical patterns for building aggregates and entities
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精通构建聚合和实体的战术模式
- en: Discover principal refactoring patterns and learn how to implement them
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发现主要的重构模式并学习如何实现它们
- en: Identify pain points in a complex code base and address them
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别复杂代码库中的痛点并解决它们
- en: Explore event-driven architectures for component decoupling
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索事件驱动架构以实现组件解耦
- en: Get skilled at writing tests that validate and maintain architectural integrity
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 掌握编写验证和保持架构完整性的测试的技能
- en: '[![](img/9781836642893.jpg)](https://www.amazon.com/Clean-Architecture-Python-maintainable-architectural/dp/183664289X/)'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '[![](img/9781836642893.jpg)](https://www.amazon.com/Clean-Architecture-Python-maintainable-architectural/dp/183664289X/)'
- en: '**Clean Architecture with Python**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用Python的清洁架构**'
- en: Sam Keen
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Sam Keen
- en: 'ISBN: 978-1-83664-289-3'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 'ISBN: 978-1-83664-289-3'
- en: Apply Clean Architecture principles idiomatically in Python
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以Pythonic的方式应用清洁架构原则
- en: Implement domain-driven design to isolate core business logic
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实施领域驱动设计以隔离核心业务逻辑
- en: Apply SOLID principles in a Pythonic context to improve code quality
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Python环境中应用SOLID原则以提高代码质量
- en: Structure projects for maintainability and ease of modification
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构化项目以实现可维护性和易于修改
- en: Develop testing techniques for cleanly architected Python applications
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为清洁架构的Python应用程序开发测试技术
- en: Refactor legacy Python code to adhere to Clean Architecture principles
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重构遗留Python代码以符合清洁架构原则
- en: Design scalable APIs and web applications using Clean Architecture
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用清洁架构设计可扩展的API和Web应用程序
- en: Packt is searching for authors like you
  id: totrans-56
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Packt正在寻找像你这样的作者
- en: If you’re interested in becoming an author for Packt, please visit [authors.packt.com](#_idTextAnchor300)
    and apply today. We have worked with thousands of developers and tech professionals,
    just like you, to help them share their insight with the global tech community.
    You can make a general application, apply for a specific hot topic that we are
    recruiting an author for, or submit your own idea.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有兴趣成为Packt的作者，请访问[authors.packt.com](#_idTextAnchor300)并今天申请。我们已经与成千上万的开发者和技术专业人士合作，就像你一样，帮助他们与全球科技社区分享他们的见解。你可以提交一般申请，申请我们正在招聘作者的特定热门话题，或者提交你自己的想法。
- en: Share your thoughts
  id: totrans-58
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 分享你的想法
- en: Now you’ve finished *Architecting AI Software Systems*, we’d love to hear your
    thoughts! If you purchased the book from Amazon, please [click here to go straight
    to the Amazon review page](https://packt.link/r/1804615978) for this book and
    share your feedback or leave a review on the site that you purchased it from.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经完成了 *架构人工智能软件系统*，我们非常想听听你的想法！如果你从亚马逊购买了这本书，请[点击此处直接进入亚马逊评论页面](https://packt.link/r/1804615978)并分享你的反馈或在该购买网站上留下评论。
- en: Your review is important to us and the tech community and will help us make
    sure we’re delivering excellent quality content.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你的评论对我们和科技社区非常重要，并将帮助我们确保我们提供高质量的内容。
