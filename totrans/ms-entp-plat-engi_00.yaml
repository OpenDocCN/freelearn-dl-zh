- en: Preface
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: 'Platform Engineering signifies the next seismic shift in DevOps development
    by connecting ongoing improvement to long-term automation. It condenses many years
    of valuable knowledge into a unified framework to evolve how organizations construct,
    oversee, and expand their digital platforms. In today’s fast-paced business environment,
    bringing products to market quickly can make or break a company. Creating organic
    custom platforms often wastes time and misses chances. Platform Engineering offers
    a straightforward, powerful solution: concentrate on innovation and value while
    entrusting infrastructure and transformation intricacies to experts. The road
    to effective Platform Engineering is not a straight line; it is fraught with challenges
    that demand a deep understanding of technology and strategy.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 平台工程标志着DevOps开发的下一个地震性转变，通过将持续改进与长期自动化联系起来。它将多年的宝贵知识浓缩成一个统一的框架，以演进组织构建、监督和扩展其数字平台的方式。在当今快节奏的商业环境中，快速将产品推向市场可能使公司成功或失败。创建有机定制的平台通常会浪费时间并错失机会。平台工程提供了一个简单而强大的解决方案：专注于创新和价值，同时将基础设施和转型的复杂性委托给专家。有效的平台工程之路并非一条直线；它充满了需要深刻理解技术和战略的挑战。
- en: Many organizations embark on this journey with the best intentions but find
    themselves trapped in an inefficiency cycle, taking 12–18 months or longer to
    escape, if ever. The truth is that what you need already exists; the challenge
    lies in knowing how to harness, integrate, and delegate platform responsibilities.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 许多组织怀着最好的意图开始这段旅程，但发现自己陷入了低效率的循环，需要12-18个月或更长时间才能逃脱，如果能够逃脱的话。事实是，你需要的东西已经存在；挑战在于知道如何利用、整合和委派平台责任。
- en: This book is more than just a compendium of theories; it is a practical guide
    offering actionable insights, best practices, and real-world tested tools. You’ll
    learn how to configure scalable, secure, and reliable platforms with precision,
    ensuring your organization stays ahead of the curve. By the end, you’ll feel fully
    prepared to lead your organization’s Platform Engineering implementation.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书不仅仅是一本理论汇编；它是一本实用的指南，提供了可操作的见解、最佳实践和经过实战检验的工具。你将学习如何精确配置可扩展、安全和可靠的平台，确保你的组织保持领先。到结束时，你将感到完全准备好领导你所在组织的平台工程实施。
- en: 'This comprehensive guide covers everything from laying the cultural and architectural
    foundations to incorporating the latest advancements in AI-driven platforms. Through
    practical tutorials, hands-on projects, and insightful self-assessment questions,
    you will grasp Platform Engineering and be empowered to spearhead its adoption
    within your organization. Key features include the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这本全面的指南涵盖了从奠定文化和架构基础到融入AI驱动平台最新进展的各个方面。通过实用的教程、动手项目和深入的自我评估问题，你将掌握平台工程，并能够在你所在的组织中带头采用它。主要特点包括以下内容：
- en: Designing and building an effective platform.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计和构建一个有效的平台。
- en: Establishing platform infrastructure metrics and integration, including AI solutions.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立平台基础设施指标和集成，包括AI解决方案。
- en: Maximizing platform success through accelerated delivery and continuous revenue.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过加速交付和持续收入最大化平台成功。
- en: By the time you finish reading, you won’t just be ready for the future—you’ll
    be prepared to shape it. This book will be your ally on the path to creating a
    DevOps-compatible, AI-powered platform that is not only a technical marvel but
    also a strategic asset, positioning your organization at the forefront of digital
    innovation.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 到你读完这本书的时候，你不仅会为未来做好准备——你还将准备好去塑造未来。这本书将成为你在创建一个DevOps兼容、AI驱动的平台道路上的盟友，这个平台不仅是一个技术奇迹，也是一个战略资产，将你的组织置于数字创新的前沿。
- en: Who this book is for
  id: totrans-9
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这本书面向的对象
- en: This book is crafted for professionals across IT, product, and business functions
    who are at the forefront of enterprise transformation. It speaks directly to business
    leaders, transformation change agents within IT departments, software developers,
    and IT operations teams responsible for ensuring the stability, reliability, and
    overall health of platforms. Whether you’re leading the transformation, developing
    the platforms, or ensuring operational efficiency, this book is designed to equip
    you with the knowledge and tools you need to succeed.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本书专为IT、产品和企业职能领域的专业人士编写，他们是企业转型的前沿。它直接面向商业领袖、IT部门的转型变革推动者、软件开发者和负责确保平台稳定性、可靠性和整体健康的IT运维团队。无论你是领导转型、开发平台还是确保运营效率，本书旨在为你提供成功所需的知识和工具。
- en: 'This book offers a better path for software developers who are weary of the
    relentless cycle of building and maintaining their own platforms. The time spent
    on platform construction (often lasting 40–60 weeks) is time diverted from creating
    the applications that drive ROI and sharpen your competitive edge. If your goal
    is to build applications that succeed in the marketplace, the smart move is to
    leverage a platform engineered by experts, allowing you to focus on what truly
    matters: innovation and delivery. Similarly, for IT operations teams, Platform
    Engineering can reduce the burden of platform maintenance, allowing you to focus
    on strategic tasks that enhance the overall health of the platforms.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本书为那些厌倦了不断循环构建和维护自己平台的软件开发者提供了一条更好的路径。在平台构建（通常持续40-60周）上花费的时间是从创建推动投资回报率和增强竞争优势的应用程序中转移出来的时间。如果你的目标是构建在市场上取得成功的应用程序，那么明智的做法是利用由专家设计的平台，这样你可以专注于真正重要的事情：创新和交付。同样，对于IT运维团队来说，平台工程可以减轻平台维护的负担，让你能够专注于增强平台整体健康的战略任务。
- en: This book is an indispensable guide for the C-Suite, managers, and directors
    of engineering, security, platform, and operations teams, as well as the software
    developers and platform operators ready to elevate their organizations by adopting
    a strategic approach to Platform Engineering.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 本书是C级高管、经理和工程、安全、平台和运营团队总监，以及准备通过采用平台工程的战略方法提升其组织的软件开发者和平台运营商不可或缺的指南。
- en: What this book covers
  id: totrans-13
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本书涵盖内容
- en: '[*Chapter 1*](B24465_01.xhtml#_idTextAnchor015), *Introduction to Modern Platform
    Engineering*, offers a foundational explanation for why platforms are essential,
    some of the basic problems faced by platforms such as speed to market and resource
    costing, and some of the software solutions that exist. The chapter continues
    through a comparative analysis of existing tools. Understanding what DevOps is
    allows one to see the expansion of DevOps through using platforms to concentrate
    on the important aspects of flow, feedback, and delivery.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第1章*](B24465_01.xhtml#_idTextAnchor015)，*现代平台工程简介*，提供了关于平台为何至关重要的基础解释，以及平台面临的一些基本问题，如上市速度和资源成本，以及一些现有的软件解决方案。本章通过现有工具的比较分析继续进行。了解DevOps是什么，可以让人通过使用平台来集中关注流程、反馈和交付等重要方面。'
- en: '[*Chapter 2*](B24465_02.xhtml#_idTextAnchor037), *Architectural Foundations
    and Strategy*, helps you understand platform standards starting with the basic
    cloud migration, the cloud format from AWS to Azure or Google, and the cloud structure,
    as well as setting up Kubernetes clusters. The basic standards lead one to design
    and implement custom architectures within those spaces, but architectures also
    arrive with their own standards.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第2章*](B24465_02.xhtml#_idTextAnchor037)，*架构基础和策略*，帮助你从基本的云迁移开始理解平台标准，包括从AWS到Azure或Google的云格式，以及云结构，以及设置Kubernetes集群。基本标准引导人们设计和实现这些空间内的定制架构，但架构也带来了自己的标准。'
- en: '[*Chapter 3*](B24465_03.xhtml#_idTextAnchor052), *Cultural Transformation and
    Leadership*, shows that platforms aren’t just about making technical changes to
    a production system but about aligning the cultural changes that support implementation.
    Cultural change requires acknowledging what exists and building a path to organizational
    changes. As leading-edge innovation, the chapter shapes technical leadership decisions
    to reach the platform marketplace through effective changes, delivering user value.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第3章*](B24465_03.xhtml#_idTextAnchor052), *文化转型与领导力*，表明平台不仅仅是关于对生产系统进行技术变革，而是关于支持实施的变革的文化变革。文化变革需要承认现状并建立通往组织变革的道路。作为前沿创新，本章塑造了技术领导层的决策，通过有效的变革达到平台市场，提供用户价值。'
- en: '[*Chapter 4*](B24465_04.xhtml#_idTextAnchor076), *The Platform Engineering
    Ecosystem*, explores the idea that Platform Engineering is not just about installing
    a single software fix or implementing configuration as code but adjusting the
    entire delivery ecosystem. Good platforms incorporate a number of different tools
    to achieve success. Integrating those tools within different aspects of the platform
    is a key element of effective platforms. Furthermore, those tools should be incorporated
    into CI/CD outcomes through a DevOps methodology.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第4章*](B24465_04.xhtml#_idTextAnchor076), *平台工程生态系统*，探讨了平台工程不仅仅是安装单个软件修复或实现配置代码化，而是调整整个交付生态系统。优秀的平台会整合多种不同的工具以实现成功。将这些工具整合到平台的不同方面是有效平台的关键要素。此外，这些工具应通过DevOps方法融入CI/CD成果中。'
- en: '[*Chapter 5*](B24465_05.xhtml#_idTextAnchor095), *Incorporating Artificial
    Intelligence into Platform Engineering*, talks about how ingesting large amounts
    of data from different locations can be aided by using generative AI models both
    in coding and automating operations for software development. The chapter highlights
    several different off-the-shelf tools that can be integrated to support AI-based
    outcomes that enhance overall capabilities. Users must recognize their own approach
    to AI, as well as what other competitors may have done with AI and their lessons
    learned.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第5章*](B24465_05.xhtml#_idTextAnchor095), *将人工智能融入平台工程*，讨论了如何通过使用生成式AI模型在编码和自动化软件开发操作中帮助从不同位置摄取大量数据。本章突出了可以集成以支持基于AI的成果，从而增强整体能力的多种现成工具。用户必须认识到自己的AI方法，以及竞争对手可能如何使用AI及其经验教训。'
- en: '[*Chapter 6*](B24465_06.xhtml#_idTextAnchor123), *Engineering Platform Data
    Management*, shows you that platforms don’t just need the initial formation but
    require managing data throughout multiple applications. One must implement effective
    strategies, optimize those strategies, and then manage data. Data management tools
    are described along with methods to handle all data, from user input to streaming
    solutions.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第6章*](B24465_06.xhtml#_idTextAnchor123), *平台数据管理工程*，展示了平台不仅需要初始形成，还需要在多个应用程序中管理数据。必须实施有效的策略，优化这些策略，然后管理数据。介绍了数据管理工具以及处理所有数据的方法，从用户输入到流式解决方案。'
- en: '[*Chapter 7*](B24465_07.xhtml#_idTextAnchor160), *Security, Compliance, and
    Risk Management*, explores how DevOps has been recharacterized as DevSecOps, but
    any operational solution requires security. Platforms emphasize secure-by-default
    solutions for vulnerability tracking, software bills of materials, and patching
    solutions before deployment. Security goes beyond the platform itself to managing
    those who connect to the platform, especially in PaaS and SaaS-type solutions
    with AI tools.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第7章*](B24465_07.xhtml#_idTextAnchor160), *安全、合规性和风险管理*，探讨了DevOps如何被重新定义为DevSecOps，但任何运营解决方案都需要安全。平台强调在部署前提供默认安全解决方案，用于漏洞跟踪、软件物料清单和补丁解决方案。安全不仅限于平台本身，还包括管理连接到平台的人员，尤其是在具有AI工具的PaaS和SaaS类型解决方案中。'
- en: '[*Chapter 8*](B24465_08.xhtml#_idTextAnchor176), *Real-World Applications and
    Case Studies*, allows you to review case studies showcasing successful platform
    transformations and the integration of platforms with business strategies. It
    explores failed platform transformations to highlight the value of strategic planning
    and disruption in the enterprise. A DevOps success model is used to capture previous
    lessons and incorporate them to support current operations. This chapter also
    examines potential future lessons from those technologies and solutions that are
    not yet fully implemented.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第8章*](B24465_08.xhtml#_idTextAnchor176), *现实世界应用与案例研究*，让您回顾展示成功平台转型和平台与业务战略整合的案例研究。它探讨了失败的平台转型，以突出战略规划和在企业中的颠覆的价值。使用DevOps成功模型来捕捉以往的经验教训，并将它们纳入当前运营的支持。本章还考察了那些尚未完全实施的技术和解决方案可能带来的潜在未来经验教训。'
- en: '[*Chapter 9*](B24465_09.xhtml#_idTextAnchor197), *Testing, Quality Assurance,
    and Operations*, highlights that platform solutions build beyond the basics to
    offer standardized pipelines and testing processes. Successfully implementing
    these processes generates repeatable bodies of evidence, allowing all software
    to be measured against the same standard. Implementing these standards creates
    quality across the product and allows for continual success.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第9章*](B24465_09.xhtml#_idTextAnchor197), *测试、质量保证和运营*，强调平台解决方案在基础之上构建，提供标准化的管道和测试流程。成功实施这些流程会产生可重复的证据体，使所有软件都能按照相同的标准进行衡量。实施这些标准在整个产品中创造质量，并允许持续的成功。'
- en: '[*Chapter 10*](B24465_10.xhtml#_idTextAnchor215), *Building High-Performance
    Platform Teams*, shows that central to the platform is having effective platform
    teams. Using optimal buy versus build strategies allows organizations to minimize
    dedicated platform individuals while maintaining scalability and reliability.
    High-performing teams can be designed within a DevOps framework without specialized
    knowledge based on platform benefits generated from standardized tooling, generative
    AI solutions, and modernized observability.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第10章*](B24465_10.xhtml#_idTextAnchor215), *构建高性能平台团队*，表明平台的核心是拥有有效的平台团队。采用最优的购买与构建策略，组织可以在保持可扩展性和可靠性的同时，最小化专门的平台人员。在DevOps框架内，可以设计高性能团队，而不需要基于平台从标准化工具、生成式AI解决方案和现代化的可观察性产生的平台效益的专门知识。'
- en: '[*Chapter 11*](B24465_11.xhtml#_idTextAnchor252), *From Vision to Reality:
    Mastering Enterprise Platform Engineering*, emphasizes the importance of visionary
    leadership, strategic planning, and continuous improvement in driving platform
    success. It explores articulating platform initiative value to stakeholders, measuring
    and tracking progress against key performance indicators, and adapting strategies
    in response to evolving business and technological landscapes. It includes real-world
    examples and practical advice to maintain platforms as adaptable, resilient, and
    continuously evolving assets that drive business value.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第11章*](B24465_11.xhtml#_idTextAnchor252), *从愿景到现实：掌握企业平台工程*，强调愿景型领导力、战略规划和持续改进在推动平台成功中的重要性。它探讨了如何向利益相关者阐述平台倡议的价值，衡量和跟踪关键绩效指标，以及根据不断变化的企业和技术环境调整策略。它包括实际案例和实用建议，以保持平台作为适应性、弹性和持续发展的资产，从而推动业务价值。'
- en: To get the most out of this book
  id: totrans-25
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 要充分利用这本书
