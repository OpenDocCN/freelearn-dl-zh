- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Architecting a Generative AI System – A Case Study
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 构建生成式AI系统 – 一个案例研究
- en: Throughout this book, we have explored core principles of AI system architecture,
    focusing on managing complexity, ensuring scalability, and integrating AI technologies
    into enterprise software. We examined how software engineering best practices,
    such as modular design and structured data pipelines, help optimize AI-enabled
    systems. We also addressed challenges such as aligning AI applications with stakeholder
    expectations, implementing effective design patterns, and adopting iterative development
    cycles that adjust to changing data and business needs. Case studies and real-world
    examples provided a structured framework for balancing technical precision with
    flexibility.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，我们探讨了AI系统架构的核心原则，重点关注管理复杂性、确保可扩展性和将AI技术集成到企业软件中。我们研究了软件工程最佳实践，如模块化设计和结构化数据管道，如何帮助优化AI赋能系统。我们还讨论了将AI应用与利益相关者期望保持一致、实施有效设计模式和采用适应不断变化的数据和业务需求的迭代开发周期等挑战。案例研究和现实世界示例提供了一个结构化框架，以平衡技术精度和灵活性。
- en: This final chapter focuses on generative AI and **Large Language Models** (**LLMs**)
    as a case study in applying architectural best practices to real-world AI deployments.
    We will walk through the design of an LLM-powered customer support knowledge management
    system, incorporating **Retrieval-Augmented Generation** (**RAG**), search capabilities,
    and adaptive learning. By analyzing key components such as AI agents, vector databases,
    and web search integrations, we will connect these technologies to foundational
    architectural strategies, including modularity, data pipeline efficiency, and
    cloud scalability. This example provides a clear path from high-level business
    goals to a validated AI system.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章最后将重点关注生成式AI和**大型语言模型（LLMs**）作为案例研究，探讨将架构最佳实践应用于现实世界AI部署。我们将逐步介绍一个由LLM驱动的客户支持知识管理系统设计，包括**检索增强生成（RAG**）、搜索能力和自适应学习。通过分析关键组件，如AI代理、向量数据库和网页搜索集成，我们将将这些技术连接到基础架构策略，包括模块化、数据管道效率和云可扩展性。此示例提供了一个从高级业务目标到经过验证的AI系统的清晰路径。
- en: 'In this chapter, we will cover the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下主题：
- en: Framing a problem of a company designing its knowledge platform and investigating
    the potential to use generative AI
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 框架一个公司设计其知识平台并调查使用生成式AI的潜在可能性的问题
- en: How to translate the company’s requirements into data science objectives
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何将公司的需求转化为数据科学目标
- en: Explaining the possible architecture choices
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释可能的架构选择
- en: Designing an LLM-centric solution for the company’s knowledge platform
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为公司的知识平台设计以LLM为中心的解决方案
- en: How to quantify the quality of generative AI-centric design
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何量化以生成式AI为中心的设计质量
- en: By the end of this chapter, you will have a structured, practical understanding
    of how generative AI can be effectively designed and deployed in enterprise settings,
    with a focus on scalability, compliance, and long-term sustainability.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将拥有一个结构化、实用的理解，了解如何在企业环境中有效地设计和部署生成式AI，重点关注可扩展性、合规性和长期可持续性。
- en: 'The business challenge: Knowledge management crisis'
  id: totrans-11
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 商业挑战：知识管理危机
- en: 'TechSolve, our case study ERP provider, serving diverse enterprise clients
    across manufacturing, retail, and healthcare sectors, faces a significant knowledge
    management challenge that threatens both operational efficiency and client relationships:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: TechSolve，我们的案例研究ERP提供商，服务于制造、零售和医疗保健行业的多元化企业客户，面临着重大的知识管理挑战，这不仅威胁到运营效率，也威胁到客户关系：
- en: '**Fragmented knowledge ecosystem**: Critical information scattered across 12+
    siloed systems, including legacy documentation, modern wikis, support tickets,
    and communication platforms.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识生态系统碎片化**：关键信息散布在12个以上的孤岛系统中，包括遗留文档、现代维基、支持票据和通信平台。'
- en: '**Inefficient resource utilization**: Support engineers waste 60% of their
    time searching for information rather than applying expertise to solve client
    problems.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源利用效率低下**：支持工程师有60%的时间在寻找信息，而不是将专业知识应用于解决客户问题。'
- en: '**Institutional knowledge erosion**: Key insights and troubleshooting wisdom
    walk out the door as experienced staff depart, with an estimated 15% of critical
    knowledge undocumented.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机构知识侵蚀**：关键见解和故障排除智慧随着经验丰富的员工离职而流失，估计有15%的关键知识未记录。'
- en: '**Extended response times**: Customer resolution times have stretched to an
    average of three days, significantly exceeding SLAs and endangering seven-figure
    enterprise client relationships.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**延长响应时间**：客户解决方案时间已延长至平均三天，显著超过服务等级协议（SLAs），并危及七位数的企业客户关系。'
- en: '**Diminishing service quality**: A self-reinforcing cycle where exhausted engineers
    deliver declining service quality, further increasing ticket volumes and customer
    dissatisfaction'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务质量下降**：一个自我强化的循环，其中疲惫的工程师提供下降的服务质量，进一步增加工单数量和客户不满。'
- en: 'The financial implications are substantial: TechSolve estimates these inefficiencies
    cost $3.2 million annually through additional staffing requirements, lost productivity,
    and customer churn. More concerning is the competitive disadvantage as nimbler
    competitors leverage AI to provide superior support experiences.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 财务影响是显著的：TechSolve估计这些低效率每年导致320万美元的损失，包括额外的人力需求、生产力下降和客户流失。更令人担忧的是，灵活的竞争对手利用人工智能提供更优越的客户支持体验，从而产生了竞争优势。
- en: 'The vision: Transformation through generative AI'
  id: totrans-19
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 愿景：通过生成式AI实现转型
- en: 'To address these challenges, TechSolve’s executive team designs a comprehensive
    generative AI implementation leveraging LLMs to transform knowledge management
    across the organization:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对这些挑战，TechSolve的执行团队设计了一个全面的生成式AI实施计划，利用大型语言模型（LLMs）在整个组织内转型知识管理：
- en: '**Unified knowledge framework**: Consolidate information from multiple repositories
    into a single semantic index that spans formats, locations, and departments.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**统一知识框架**：将来自多个存储库的信息整合到一个跨格式、位置和部门的单一语义索引中。'
- en: '**How indexing works**: Connectors pull unstructured content from **wikis**,
    **shared drives**, **email archives**, **ticket transcripts**, **PDFs**, and **chat
    logs**. Each item goes through normalization, OCR for scanned files, de-duplication,
    and canonical URL assignment. Content is **chunked into passage-sized spans**,
    embedded, and stored in the vector database with rich metadata such as **source**,
    **author**, **product**, **version**, **creation date**, **sensitivity flags**,
    and **PII tags**. Refreshing is a nightly job, and change data capture is carried
    out where available.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引工作原理**：连接器从**维基**、**共享驱动器**、**电子邮件存档**、**工单记录**、**PDF**和**聊天记录**中提取非结构化内容。每个项目都经过标准化、扫描文件的OCR处理、去重和规范URL分配。内容被**分割成段落大小的跨度**，嵌入并存储在具有丰富元数据的向量数据库中，例如**来源**、**作者**、**产品**、**版本**、**创建日期**、**敏感性标志**和**PII标签**。刷新是每晚的工作，并在可用的情况下执行更改数据捕获。'
- en: '**Grounded AI responses**: Implement RAG to anchor answers in verified sources
    while preserving the synthesizing power of LLMs.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于事实的AI响应**：实施RAG以将答案锚定在经过验证的来源，同时保留LLMs的合成能力。'
- en: '**Contextual intelligence**: Provide a conversational interface that understands
    domain terminology, technical relationships, and implicit knowledge needs.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情境智能**：提供一个理解领域术语、技术关系和隐含知识需求的对话界面。'
- en: '**Adaptive learning system**: Create a self-improving platform that refines
    prompts, retrieval strategies, and tool selection using user feedback and usage
    patterns.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自适应学习系统**：创建一个自我改进的平台，使用用户反馈和用法模式来优化提示、检索策略和工具选择。'
- en: '**Structured knowledge connectors**: Integrate **transactional systems** to
    fetch trusted facts. Read-only adapters connect to a **CRM** (for example, **Salesforce**),
    **ERP** (for example, **SAP**), and **ITSM** (for example, **ServiceNow**) to
    retrieve entitlements, product configurations, account status, case history, and
    SLAs. Access is enforced with **row-level security**, API rate limits, and caching
    or scheduled sync. Data is exposed to the agent as **typed tool calls** or **parameterized
    SQL views** so answers can cite both documents and system facts.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化知识连接器**：整合**交易系统**以获取可信事实。只读适配器连接到**CRM**（例如，**Salesforce**）、**ERP**（例如，**SAP**）和**ITSM**（例如，**ServiceNow**）以检索权限、产品配置、账户状态、案例历史和SLAs。访问通过**行级安全**、API速率限制和缓存或计划同步来强制执行。数据以**类型化工具调用**或**参数化SQL视图**的形式暴露给代理，以便答案可以引用文档和系统事实。'
- en: 'The initial prototype utilizes a LangChain agent that orchestrates retrieval
    and generation across tools [4], with semantic search and web integration providing
    current external context [3][7]. This architecture enables multi-step reasoning
    that can navigate complex support scenarios with minimal human intervention. The
    prototype included two pipelines: an **unstructured indexer** for wikis, emails,
    PDFs, and tickets, and **structured adapters** for CRM and ERP, which let the
    agent blend referenced documents with live system facts in a single cited response.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 初始原型利用LangChain代理来协调工具之间的检索和生成[4]，语义搜索和Web集成提供当前的外部背景[3][7]。这种架构实现了多步推理，可以在最小的人为干预下导航复杂的支持场景。原型包括两个管道：一个用于维基、电子邮件、PDF和票据的无结构索引器，以及用于CRM和ERP的结构化适配器，使代理能够在单个引用响应中将引用文档与实时系统事实相融合。
- en: “This isn’t simply about implementing an AI chatbot. We’re fundamentally reimagining
    how institutional knowledge flows through our organization, breaking down silos
    that have accumulated over decades of growth,” says Sarah Chen, the CTO at TechSolve.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: “这不仅仅是实施一个AI聊天机器人。我们从根本上重新构想了机构知识在我们组织中的流动方式，打破了数十年来积累的壁垒，”TechSolve的首席技术官Sarah
    Chen说。
- en: Aligning business and technical objectives
  id: totrans-29
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 对齐业务和技术目标
- en: The successful implementation of TechSolve’s generative AI system required careful
    alignment between high-level business goals and specific technical capabilities.
    This alignment process ensured that all stakeholders – from executive leadership
    to engineering teams – shared a unified vision of success with clear performance
    indicators. By translating business imperatives into concrete data science and
    engineering objectives, TechSolve created a framework that guided decision-making
    throughout the project life cycle, from initial architecture design through deployment
    and continuous improvement.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: TechSolve的生成式AI系统的成功实施需要高级业务目标与具体技术能力之间的仔细对齐。这一对齐过程确保了所有利益相关者——从执行领导到工程团队——都共享一个统一的成功愿景，并具有明确的绩效指标。通过将业务需求转化为具体的数据科学和工程目标，TechSolve创建了一个指导项目生命周期中决策的框架，从初始架构设计到部署和持续改进。
- en: Data science objectives
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学目标
- en: 'These business goals translate into five data science objectives with auditability,
    explainability, and confidence reporting aligned with AI risk management guidance
    [2][5]. Establishing these quantifiable metrics enabled TechSolve’s data science
    team to evaluate model performance systematically and align technical implementation
    decisions with the overall business strategy. The following objectives translate
    TechSolve’s business needs into measurable technical targets, providing clear
    direction for the data science team:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这些业务目标转化为五个数据科学目标，与AI风险管理指南[2][5]中的可审计性、可解释性和置信度报告相一致。建立这些可量化指标使TechSolve的数据科学团队能够系统地评估模型性能，并将技术实施决策与整体业务战略相一致。以下目标将TechSolve的业务需求转化为可衡量的技术目标，为数据科学团队提供明确的方向：
- en: '**High-relevance retrieval**: Achieve 85% precision in identifying the most
    relevant knowledge fragments for a given query, with specialized metrics for technical
    versus procedural content.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高相关性检索**：在给定查询中识别最相关的知识片段时达到85%的精确率，对技术内容与程序内容有专门的指标。'
- en: '**Contextual understanding**: Attain 90% accuracy in identifying user intent,
    including implicit knowledge needs, technical context, and query reformulation
    requirements.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文理解**：在识别用户意图方面达到90%的准确率，包括隐含的知识需求、技术背景和查询重构要求。'
- en: '**Response generation quality**: Limit inaccuracies to under 5% in generated
    responses, with strict factuality requirements for technical specifications and
    compatibility guidance.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**响应生成质量**：在生成的响应中将不准确率限制在5%以下，对技术规范和兼容性指南有严格的事实性要求。'
- en: '**Explainability**: Ensure all system responses include clear source citations
    and confidence levels, maintaining an audit trail from query to final response.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：确保所有系统响应都包含清晰的来源引用和置信度水平，从查询到最终响应保持审计轨迹。'
- en: '**Continuous improvement**: Implement learning mechanisms that demonstrably
    improve system performance by 1–2% monthly based on usage patterns and explicit
    feedback.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**持续改进**：实施学习机制，根据使用模式和明确反馈，每月显著提高系统性能1-2%。'
- en: These objectives establish the foundation for model selection, training methodologies,
    evaluation frameworks, and system architecture, while providing clear indicators
    of progress toward broader business outcomes.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这些目标为模型选择、训练方法、评估框架和系统架构奠定了基础，同时提供了明确的发展指标，以实现更广泛的企业成果。
- en: 'The architecture: Core components and workflow'
  id: totrans-39
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 架构：核心组件和工作流程
- en: Developing an enterprise-scale generative AI system required TechSolve to integrate
    multiple specialized components into a cohesive architecture. This section examines
    the technical foundation that enabled the transformation of scattered knowledge
    repositories into a unified, responsive system capable of addressing complex support
    queries with accuracy and consistency.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 开发一个企业级生成式AI系统需要TechSolve将多个专业组件集成到一个统一的架构中。本节探讨了使分散的知识库转化为一个统一、响应迅速的系统，能够以准确和一致的方式处理复杂支持查询的技术基础。
- en: System overview
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统概述
- en: TechSolve’s generative AI architecture centers on LangChain, an orchestration
    framework that coordinates multiple AI components beyond simple LLM interactions.
    The system implements an intelligent agent that strategically manages user queries,
    determining which tools to employ and sequencing their execution for optimal results.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: TechSolve的生成式AI架构以LangChain为中心，这是一个协调多个AI组件（而不仅仅是简单的LLM交互）的编排框架。系统实现了一个智能代理，它战略性地管理用户查询，确定要使用的工具，并按顺序执行以获得最佳结果。
