- en: '13'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '13'
- en: Unlock Your Book’s Exclusive Benefits
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 解锁您书籍的独家优惠
- en: 'Your copy of this book comes with the following exclusive benefits:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您购买的这本书包含以下独家优惠：
- en: '![](img/cloud-computing.png) Next-gen Packt Reader'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/cloud-computing.png) 新一代Packt阅读器'
- en: '![](img/sparkler2.png) AI assistant (beta)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](img/sparkler2.png) AI助手（测试版）'
- en: '![](img/pdf-file.png) DRM-free PDF/ePub downloads'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '![](img/pdf-file.png) 免版税PDF/ePub下载'
- en: Use the following guide to unlock them if you haven’t already. The process takes
    just a few minutes and needs to be done only once.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您尚未解锁，请使用以下指南来解锁它们。这个过程只需几分钟，并且只需完成一次。
- en: How to unlock these benefits in three easy steps
  id: totrans-7
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何通过三个简单步骤解锁这些优惠
- en: Step 1
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步
- en: Have your purchase invoice for this book ready, as you’ll need it in *Step 3*.
    If you received a physical invoice, scan it on your phone and have it ready as
    either a PDF, JPG, or PNG.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好您的购买发票，因为在第3步中您将需要它。如果您收到的是纸质发票，请用手机扫描并准备好作为PDF、JPG或PNG格式。
- en: For more help on finding your invoice, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如需查找发票的更多帮助，请访问 [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)。
- en: '**Note**: Did you buy this book directly from Packt? You don’t need an invoice.
    After completing Step 2, you can jump straight to your exclusive content.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：您是从Packt直接购买这本书的吗？您不需要发票。完成第2步后，您可以直接跳转到您的独家内容。'
- en: '|'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Step 2
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步
- en: Scan this QR code or go to [https://packtpub.com/unlock](https://packtpub.com/unlock).
    | ![](img/Unlock2.png) |
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 扫描此二维码或访问 [https://packtpub.com/unlock](https://packtpub.com/unlock)。 | ![](img/Unlock2.png)
    |
- en: '| On the page that opens (which will look similar to *Figure 13.1* if you’re
    on desktop), search for this book by name. Make sure you select the correct edition.![A
    screenshot of a web page  AI-generated content may be incorrect.](img/B34121_13_1.png)Figure
    13.1: Packt unlock landing page on desktop |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| 在打开的页面（如果您在桌面电脑上，将类似于*图13.1*），通过书名搜索这本书。确保您选择了正确的版本。[A screenshot of a web
    page  AI-generated content may be incorrect.](img/B34121_13_1.png)图13.1：桌面上的Packt解锁着陆页面
    |'
- en: Step 3
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步
- en: Once you’ve selected your book, sign in to your Packt account or create a new
    one for free. Once you’re logged in, upload your invoice. It can be in PDF, PNG,
    or JPG format and must be no larger than 10 MB. Follow the rest of the instructions
    on the screen to complete the process.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您的书籍后，登录您的Packt账户或免费创建一个新账户。登录后，上传您的发票。它可以以PDF、PNG或JPG格式，并且大小不能超过10 MB。按照屏幕上的其余说明完成此过程。
- en: '|'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: Need help?
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要帮助？
- en: 'If you get stuck and need help, visit [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    for a detailed FAQ on how to find your invoices and more. The following QR code
    will take you to the help page directly: | ![](img/Need_help.jpg) |'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到困难并需要帮助，请访问 [https://www.packtpub.com/unlock-benefits/help](https://www.packtpub.com/unlock-benefits/help)
    以获取有关如何查找您的发票以及更多详细问题的FAQ。以下二维码将直接带您到帮助页面： | ![](img/Need_help.jpg) |
- en: '**Note**: If you are still facing issues, reach out to `customercare@packt.com`.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：如果您仍然遇到问题，请联系 `customercare@packt.com`。'
