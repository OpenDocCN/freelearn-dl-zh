- en: '1'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Understanding the Perils of AI Products
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Artificial intelligence** ( **AI** ) has rapidly become a force multiplier
    for business and technology. Global investment in AI is projected to reach $360
    billion in 2025, accounting for nearly one-third of all global venture funding
    and growing more than 60% year over year.'
  prefs: []
  type: TYPE_NORMAL
- en: However, despite massive investments pouring into AI experiments, the reality
    is that most AI projects fail to deliver meaningful business outcomes. According
    to the recent *State of AI in Business 2025* report published by MIT, fewer than
    5% of enterprise AI projects have produced measurable business returns. Adoption
    is high; most firms have pilots and prototypes, but almost all of this activity
    remains stuck in a productivity experiment, rather than a P&L-level transformation.
  prefs: []
  type: TYPE_NORMAL
- en: Why is that?
  prefs: []
  type: TYPE_NORMAL
- en: 'Over years of deploying AI systems, a consistent lesson has emerged: most failures
    are not caused by limitations in technology itself, although continuous improvements
    in the algorithm architecture, as well as storage and computing capabilities,
    could make outcomes more accurate. The failure is almost always a result of poor
    strategy, execution, and integration. Most breakdowns stem from a disconnect between
    business objectives and technical approaches, compounded by issues such as bad
    data and fragmented operational processes. The real challenge is not building
    more sophisticated algorithms but ensuring that AI solutions are designed and
    implemented to capture value for the organization that is secure, reliable, and
    scalable.'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter draws from real-world experiences and hard-learned lessons to examine
    patterns of how AI projects fail. We’ll examine the practical challenges of aligning
    AI initiatives with business goals, establishing robust data foundations, and
    building systems that can scale beyond pilot phases. Whether you’re overseeing
    your organization’s first AI implementation or working to improve existing systems,
    understanding these fundamental challenges is critical for driving successful
    outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will cover the following key topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Some key definitions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How AI products fail
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Free Benefits with Your Book
  prefs: []
  type: TYPE_NORMAL
- en: Your purchase includes a free PDF copy of this book along with other exclusive
    benefits. Check the *Free Benefits with Your Book* section in the Preface to unlock
    them instantly and maximize your learning experience.
  prefs: []
  type: TYPE_NORMAL
- en: Some key definitions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Here are some important definitions to help you navigate through this book:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Artificial intelligence** ( **AI** ): The overarching field of creating intelligent
    machines that can perform tasks typically requiring human intelligence, such as
    problem-solving, learning, and decision-making'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Machine learning** ( **ML** ): A subset of AI that enables machines to learn
    from data and improve at a task without being explicitly programmed for every
    step'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deep learning** : A subset of ML that uses artificial neural networks with
    multiple layers to identify complex patterns in data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Generative AI** : A type of deep learning model that generates new, original
    content such as text, images, or code based on the patterns it learned from its
    training data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI agents** : A software system that automatically perceives its environment,
    makes decisions, and takes actions to achieve specific goals with minimal human
    intervention'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agentic AI** : A group of AI agents that can orchestrate, plan, reason, collaborate
    and perform actions for complex problems'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How AI products fail
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the following sections, let’s dive deep into some common patterns of failure.
  prefs: []
  type: TYPE_NORMAL
- en: Misaligned goals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Too often, AI and data teams chase after accuracy scores, losing sight of the
    business goal. Does a better metric always mean better business? Not necessarily.
  prefs: []
  type: TYPE_NORMAL
- en: 'Take the banking world. An attrition warning system might define the target
    as account closure. An AI system looks for signals right before someone closes
    their account. But what about customers who quietly move most of their money out
    and keep the account open? Focusing only on account closures misses the bigger
    goal: building trust and a lasting customer relationship.'
  prefs: []
  type: TYPE_NORMAL
- en: Or consider e-commerce. Many recommendation systems are set up to maximize the
    **click-through rate** ( **CTR** ). The result? More users click, at least for
    a while. But when people see low-quality or irrelevant suggestions, they get annoyed.
    Eventually, they visit less or stop using the site entirely. In these cases, more
    clicks do not equal more loyalty.
  prefs: []
  type: TYPE_NORMAL
- en: Fraud detection models present a different twist. If you tune the model to flag
    every unusual transaction, it may stop fraud but also catch too many legitimate
    purchases. Loyal customers face declined payments and businesses lose sales. In
    the rush to maximize technical success, customer experience suffers.
  prefs: []
  type: TYPE_NORMAL
- en: Retailers and manufacturers use forecasting models to predict demand. These
    models often strive for the lowest mean squared error, a classic accuracy measure.
    But just being “accurate on average” can be misleading. If the system underestimates
    sudden spikes, such as during special promotions, stores can run out of stock
    or sit on unsold inventory. The technical metric says the model is good, yet business
    results prove otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: Hospitals encounter a similar dilemma. Triage AI tools aim for diagnostic accuracy
    to predict critical illnesses. But is accuracy alone enough? Not if patient wait
    times increase or costs grow because of too many unnecessary tests. Even a high-performing
    AI system can’t solve business challenges if it loses sight of what matters to
    patients and providers.
  prefs: []
  type: TYPE_NORMAL
- en: These challenges only deepen in the world of generative AI and autonomous AI
    agents. Imagine a customer support chatbot powered by generative AI. Management
    tracks “chats handled” and “messages sent” as indicators of success. The bot produces
    plenty of activity, but does it actually solve issues? Sometimes, it may just
    spin in circles with customers, churning out long or repetitive responses. Thus,
    satisfaction drops, even if dashboard numbers look good.
  prefs: []
  type: TYPE_NORMAL
- en: The same misalignment can appear with agentic AI in marketing workflows. An
    online retailer might use an autonomous agent to send marketing emails with the
    single goal of maximizing open rates. The agent starts crafting attention-grabbing
    subject lines and sends emails frequently. For a short time, open rates surge.
    Soon, though, customers tire of the onslaught. They begin flagging emails as spam
    and unsubscribe in large numbers. The AI seems successful at first glance, but
    it’s harming long-term trust and engagement.
  prefs: []
  type: TYPE_NORMAL
- en: So, why do these gaps between technical metrics and business goals show up so
    often?
  prefs: []
  type: TYPE_NORMAL
- en: '**Not everything that can be counted counts**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “ *Not everything that can be counted counts, and not everything that counts
    can be counted* .”
  prefs: []
  type: TYPE_NORMAL
- en: – William Bruce Cameron
  prefs: []
  type: TYPE_NORMAL
- en: 'This quote describes one of the fundamental tensions in AI development: the
    broader, more abstract aims of a business, such as increasing revenue, improving
    customer satisfaction, or reducing operational costs, rarely translate neatly
    into a single, clearly defined model target. In practice, models tend to focus
    on specific, measurable outputs (e.g., classification accuracy or mean squared
    error), called the surrogate metrics.'
  prefs: []
  type: TYPE_NORMAL
- en: '**What are surrogate metrics?**'
  prefs: []
  type: TYPE_NORMAL
- en: Surrogate metrics (also known as proxy metrics) are stand-in measurements used
    when direct business outcomes are hard to track or take too long to measure. Surrogate
    metrics provide a more immediate signal than the ultimate business outcome.
  prefs: []
  type: TYPE_NORMAL
- en: For example, CTR is often used as a surrogate proxy for revenue in online advertising,
    and email open rates may stand as a substitute for actual sales conversions in
    marketing campaigns. Because the data for surrogate metrics is readily available
    and can be collected in real time, models can be trained and evaluated rapidly.
  prefs: []
  type: TYPE_NORMAL
- en: However, they do not always capture the enduring factors behind long-term profitability,
    brand loyalty, or customer lifetime value. By contrast, these longer-term outcomes
    may not manifest for months or years, and attributing changes to a single intervention
    can be complex, requiring advanced tracking and modeling capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: The key challenge in balancing short- and long-term considerations is that business
    goals are often broader or more abstract than any single AI target. Consequently,
    teams risk delivering local model improvements without advancing the actual strategic
    objectives of the business. As such, frameworks such as **Cross-Industry Standard
    Process for Data Mining** ( **CRISP-DM** , Chapman et al., 2000) remain relevant,
    emphasizing aligning business understanding with technical work. Similarly, Provost
    and Fawcett (2013) discuss how proxy metrics can easily become ends in themselves,
    diverting attention from the more holistic measures of success that drive real
    value.
  prefs: []
  type: TYPE_NORMAL
- en: '**Correlation is not causality**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Another risk is misalignment: a surrogate that is only weakly correlated with
    the real target can yield suboptimal or even harmful outcomes. An excessive focus
    on CTR, for instance, might spur clickbait-like content, raising clicks in the
    short term while eroding user trust over time. This over-optimization of a proxy
    metric can create local maxima, that is, ideal results that look good on paper
    but do not translate into true business value. In addition, externalities arise
    when a single metric takes precedence over equally important but less quantifiable
    considerations, such as user experience or brand perception (Kleinberg et al.,
    2018).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reminder: Correlation is not causality**'
  prefs: []
  type: TYPE_NORMAL
- en: Two variables moving together does not mean one causes the other. Always investigate
    the underlying factors before making decisions or drawing business conclusions.
    Causality requires deeper analysis, experimentation, or additional data to establish
    a true cause-effect link.
  prefs: []
  type: TYPE_NORMAL
- en: Classical ML typically excels at discovering correlations, that is, predictive
    patterns that can tell you who might churn next month or how many units you’ll
    sell next quarter. In many business applications, this correlation-based approach
    is perfectly adequate, because simply knowing what’s likely to happen is enough
    to make operational decisions or allocate resources. But if your core question
    becomes *“* What action should I take to reliably change this outcome?” then correlations
    alone won’t cut it. You need to assess causality, that is, whether a specific
    factor actually *causes* the outcome you want to influence. For example, a grocery
    chain might discover that people who buy diapers also often buy beer. While fascinating
    (and frequently cited), it’s just a correlation. If you wanted to alter consumer
    behavior, say, by rearranging store aisles, you can’t be certain that the correlation
    indicates a causal relationship.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some scenarios where differentiating correlation and causality is
    critical:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Marketing campaigns** : If your ML model says “customers who see ads in the
    morning are more likely to convert,” you might interpret that as “morning ads
    cause higher sales.” But perhaps morning customers were already more committed
    or had fewer distractions, making them more likely to purchase regardless of the
    ads.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pricing strategies** : Lowering prices might correlate with increased sales,
    but is the price cut causing the higher volume, or are you simply experiencing
    an overall upswing in demand due to a competitor’s shortage?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Churn reduction** : Offering a retention discount to customers labeled “high
    churn risk” might raise retention, but you need causal evidence to ensure the
    discount itself made the difference, rather than some unrelated seasonal effect.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Despite these nuances, most everyday ML applications remain predictive in nature.
    Forecasting monthly revenue, spotting potential churners, or identifying suspicious
    transactions generally revolves around “Who or what is likely to do X?” rather
    than “Which action definitely caused Y?” As you mature your data science practice,
    keep one guiding question in mind: *Am I simply predicting what might happen,
    or do I need to prove a certain action will make it happen?*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Business priorities don’t stay the same**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Business priorities may change and adapt to market conditions. Models are often
    tuned for last quarter’s goal, but the company’s focus has already shifted. Unless
    there is active conversation, the two sides quickly drift apart. Plus, technical
    metrics are sometimes just proxies for real impact. Metrics such as CTR or number
    of chats handled are easy to track but don’t always tell the full story. Over-optimizing
    these stand-ins can actually hurt the business.
  prefs: []
  type: TYPE_NORMAL
- en: Many teams default to standard technical measures because they’re convenient,
    not because they’re right. In doing so, hidden costs and unique business needs
    get missed. And finally, technical results show up fast, while business outcomes
    take time. Naturally, attention goes to the quick feedback, even if it isn’t what
    really matters.
  prefs: []
  type: TYPE_NORMAL
- en: For these reasons, it is easier for AI products to look impressive on paper
    but still fail in the real world. The way to prevent this is by ensuring the right
    alignment of goals and metrics. This alignment may not always be achieved through
    precise math alone. If the alignment is unclear to begin with, we should start
    with a hypothesis about which measures are likely to drive the desired outcomes,
    then test and refine that hypothesis through the development and implementation
    cycle.
  prefs: []
  type: TYPE_NORMAL
- en: 'To force this alignment, the business and AI/data teams should challenge each
    other with questions such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Dimension** | **Business clarifying questions** | **AI/data team clarifying
    questions** |'
  prefs: []
  type: TYPE_TB
- en: '| True goal versus proxy metrics | What is the business outcome we care about
    (retention, trust, margin, or risk)?If the proxy metric improves, does it guarantee
    the business outcomes improve? | Is our target metric a proxy or a true representation
    of the business outcome?Is it possible that we are optimizing the metric but hurting
    the business outcome unintentionally? |'
  prefs: []
  type: TYPE_TB
- en: '| Cost of being wrong | What are the business consequences of false positives
    versus false negatives (lost revenue, churn, compliance, or customer experience
    harm)? | Do we weight errors differently based on the business cost?Should we
    incorporate asymmetric loss or constraints? |'
  prefs: []
  type: TYPE_TB
- en: '| Customer and operational impact | If the model behaves “correctly” by the
    metric, could it frustrate customers or employees (alerts, declines, privacy,
    or spam)? | Are there guardrails or human-in-the-loop checkpoints to prevent harm
    while optimizing? |'
  prefs: []
  type: TYPE_TB
- en: '| Time horizon of impact | Is the objective short-term lift (open rate, for
    example) or long-term relationship (trust, lifetime value, etc.)? | Are our metrics
    short horizon but ignoring long-horizon effects? |'
  prefs: []
  type: TYPE_TB
- en: '| Business context drift | Have priorities changed since the project started?Will
    the same metric still matter next quarter? | How often should we revisit target
    definition and KPIs?Do we need versioned KPI alignment as the product evolves?
    |'
  prefs: []
  type: TYPE_TB
- en: '| Integration with decision and workflow | If the model works, who will act
    on it? How? In what process? | Is the model embedded into an actual decision loop,
    or only delivering a score/dashboard? |'
  prefs: []
  type: TYPE_TB
- en: '| Hypothesis and validation | What is the explicit hypothesis that ties this
    metric to value? | How will we test, disprove, or refine the hypothesis during
    development cycles? |'
  prefs: []
  type: TYPE_TB
- en: 'Table 1.1: Alignment questions and considerations'
  prefs: []
  type: TYPE_NORMAL
- en: Siloed development
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another common reason why AI products struggle is siloed development. When teams
    operate separately, important context is lost, communication breaks down, and
    practical problems become much harder to solve.
  prefs: []
  type: TYPE_NORMAL
- en: When AI teams work independently from product, engineering, or business teams,
    they can easily miss the actual needs or goals of the project. This leads to models
    that may be technically sound but do not address real business problems or user
    needs.
  prefs: []
  type: TYPE_NORMAL
- en: From a business perspective, stakeholders often struggle to trust AI recommendations
    if they have not been involved in the development process. Without a clear understanding
    of how or why the model works, they may be skeptical or hesitant to use its results
    in decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Engineers face a different challenge. Integrating a model into existing systems
    is difficult if they have not been consulted along the way. This disconnect can
    result in long delays, technical mismatches, or even abandoned projects.
  prefs: []
  type: TYPE_NORMAL
- en: The reality is that AI products succeed when everyone is involved. These projects
    require close collaboration between data scientists, engineers, and business leaders.
    By working together from the beginning, teams are more likely to build solutions
    that meet real needs, gain the trust of decision-makers, and fit smoothly into
    operations.
  prefs: []
  type: TYPE_NORMAL
- en: Lack of a strong data foundation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data is your organization’s differentiator. Great AI needs a large amount of
    data. However, most organizations struggle with a strong data foundation. Data
    has missing values, biased samples, or inconsistent formats. Silos, delays, and
    messy pipelines make it even harder to get reliable input. Big data alone is not
    enough. The quality, freshness, and integration of that data are what turn models
    into meaningful solutions .
  prefs: []
  type: TYPE_NORMAL
- en: Is your data available?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the first considerations is whether you even have enough of the “right”
    data. Organizations may collect large volumes of logs, transactional records,
    or customer interactions, yet these data points might not capture the necessary
    signals for a particular use case. A churn-prediction project, for example, demands
    historical data about user interactions, subscription timelines, and user profiles.
    If these details are unavailable or incomplete, the resulting model has only a
    limited view of the factors driving user attrition. CRISP-DM (Chapman et al.,
    2000) addresses this early in its “Data Understanding” phase, emphasizing the
    importance of identifying gaps in the data and deciding how to fill or work around
    them .
  prefs: []
  type: TYPE_NORMAL
- en: Is your data consistent?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Equally important is whether your dataset is clean and consistent. Real-world
    data often includes missing values, incorrect entries, or duplicate records that
    stem from manual data entry, system migrations, or inconsistent logging processes.
    These anomalies can introduce biases, distort patterns, and, ultimately, confuse
    a learning algorithm. In many cases, extensive data-cleaning and feature-engineering
    steps can occupy the bulk of an ML practitioner’s time (Provost & Fawcett, 2013).
    High-quality data, while more laborious to obtain, lays a strong foundation for
    model reliability and interpretability .
  prefs: []
  type: TYPE_NORMAL
- en: Is your data representative?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Even if your dataset is well structured, it may fail to represent all relevant
    segments of your problem domain. For instance, a next-best-product recommendation
    model trained solely on historical purchases from a specific age group could struggle
    to generalize to users outside that demographic. Underrepresentation or overrepresentation
    of certain groups can also lead to discriminatory outcomes, which might pose not
    only ethical concerns but also legal risks in regulated industries. Documenting
    and auditing the demographic and behavioral coverage of your dataset is therefore
    essential, as emphasized in recent literature on fairness in ML (Barocas et al.,
    2019) .
  prefs: []
  type: TYPE_NORMAL
- en: Do you have ground truth?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Supervised learning tasks, whether classification, regression, or some form
    of ranking, depend heavily on labeled examples that accurately reflect the target
    concept. For image recognition, this can involve manually annotating large sets
    of images; for fraud detection, it may require extensive investigation to confirm
    which transactions were indeed fraudulent. If the labeled data is incomplete or
    incorrect, the model will learn patterns that diverge from reality. Active learning
    techniques, in which the model selectively queries which examples to label, can
    reduce the labeling burden, but obtaining a sufficiently robust ground truth remains
    a key challenge (Settles, 2009) .
  prefs: []
  type: TYPE_NORMAL
- en: Data readiness is not a one-time concern
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Business contexts, user behaviors, and external market conditions can shift
    over time, leading to “concept drift.” The patterns learned by a model trained
    on last year’s data may not apply to today’s environment, especially in fast-moving
    sectors such as e-commerce or finance. Organizations need to monitor performance
    and periodically refresh the training data or retrain models to adapt to these
    shifts, a process sometimes aided by automated model monitoring and “online learning”
    systems (Sutton & Barto, 2018 ).
  prefs: []
  type: TYPE_NORMAL
- en: Infrastructure and governance
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Lastly, data pipelines and governance structures play a pivotal role in ensuring
    that high-quality, relevant data arrives reliably for AI development. Siloed or
    inaccessible data prevents teams from gaining the full picture of the problem
    space, while a lack of versioning or lineage tracking can make it difficult to
    reproduce results or conduct thorough audits. Well-defined processes for data
    ingestion, transformation, and storage, supported by clear documentation, help
    organizations maintain the long-term viability of their ML pipelines.
  prefs: []
  type: TYPE_NORMAL
- en: Taken together, these factors show that preparing data for AI is rarely trivial.
    Before an organization can tackle any sophisticated algorithmic challenge, it
    must ensure that its data sources cover the necessary ground truth, maintain adequate
    quality standards, and remain representative of the population of intere st.
  prefs: []
  type: TYPE_NORMAL
- en: AI is not deterministic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In traditional software, developers define rules that remain consistent. For
    instance, a loan application system may calculate interest income based on a predefined
    formula, such as principal balance times interest rate. An e-commerce platform
    may apply a unique coupon code according to programmed logic. These outputs are
    predictable because they’re based on predefined instructions.
  prefs: []
  type: TYPE_NORMAL
- en: AI systems, however, work differently. For instance, a FICO credit risk rating
    model, designed to assess a borrower’s creditworthiness, doesn’t use a single
    formula. Instead, it analyzes various data points, such as debt-to-income ratio,
    income, and bankruptcy status, to predict default risk. This prediction is based
    on patterns in past data, meaning the model’s performance can change if the data
    changes or if new features are introduced.
  prefs: []
  type: TYPE_NORMAL
- en: Why iteration matters in AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The uncertainty of AI outcomes necessitates experimentation. Each model configuration
    or dataset adjustment provides insights into the model’s performance, leading
    to a cycle of adjustments and improvements. Therefore, AI development is highly
    iterative, with each cycle addressing unexpected challenges that arise as models
    evolve, as illustrated in the following figure.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram of a product model  Description automatically generated](img/B34239_01_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 1.1: Iterative AI development cy cle'
  prefs: []
  type: TYPE_NORMAL
- en: A great example of this experimental nature is hyperparameter tuning in ML,
    a subset of AI.
  prefs: []
  type: TYPE_NORMAL
- en: A **hyperparameter** in ML is a configuration variable that you set *before*
    training a model, which controls how the learning process unfolds and how the
    model is structured. Unlike model parameters, which are learned automatically
    from data during training (such as the weights in a neural network or the coefficients
    in linear regression), hyperparameters are chosen by the practitioner and remain
    fixed during the actual learning process.
  prefs: []
  type: TYPE_NORMAL
- en: '**Hyperparameter tuning** is the process of systematically searching for the
    best configuration of hyperparameters for an ML model.'
  prefs: []
  type: TYPE_NORMAL
- en: Data scientists use methods such as grid search, random search, and Bayesian
    optimization to try different hyperparameter combinations, looking for the best
    setup for a model’s performance. Adjustments to parameters, such as learning rate
    or tree depth, in models often result in varied outcomes, and each tweak provides
    new information that can potentially improve or impair the model’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: As James Bergstra and Yoshua Bengio explain in *Random Search for Hyper-Parameter
    Optimization* (2012), hyperparameter tuning can “make the difference between a
    model that performs well and one that fails to generalize.” In other words, finding
    the right settings often requires an iterative, trial-and-error approach.
  prefs: []
  type: TYPE_NORMAL
- en: Even after finding the best model configuration, models need to be re-evaluated
    as data shifts post-production, a phenomenon known as **data drift** . For instance,
    the FICO credit model may lose accuracy if consumer borrowing patterns or financial
    policy change over time. As Gama et al. discuss in *A Survey on Concept Drift*
    (2014), ML models need regular monitoring and updates to keep up with changing
    patterns in the data.
  prefs: []
  type: TYPE_NORMAL
- en: While iteration is essential, it can easily lead to scope creep if it isn’t
    managed carefully. For instance, when developing a customer service chatbot, it’s
    easy to fall into the trap of endlessly tuning the model to handle every possible
    query variation. Without clear objectives for each round of experiments and establishing
    the balance between cost and accuracy, teams can spend excessive time and resources
    fine-tuning without significant gains. In their *Cross-Industry Standard Process
    for Data Mining (CRISP-DM) Guide* (2000), Chapman et al. emphasize that “structured
    processes help teams avoid scope creep by clearly defining deliverables at each
    stage.”
  prefs: []
  type: TYPE_NORMAL
- en: Setting specific objectives and knowing when to stop is crucial to keeping ML
    projects on track. If a model aimed at predicting customer churn achieves 85%
    accuracy, this might be “good enough” to make informed business decisions without
    pushing for an extra few percentage points that might require a significant increase
    in computational resources and time spent. However, a model aimed at capturing
    fraud will require a 98% true positive capture rate at a 95% false negative rate.
  prefs: []
  type: TYPE_NORMAL
- en: The key takeaway here is that recognizing the iterative nature of AI development
    is critical because of the uncertain outcomes that define ML. Each round of experimentation
    and adjustment helps navigate the unpredictability that comes with data-driven
    predictions. Iterative experimentation should be executed in a structured process.
  prefs: []
  type: TYPE_NORMAL
- en: 'This naturally brings us to the heart of the challenge: managing and understanding
    uncertainty in AI ou tcomes.'
  prefs: []
  type: TYPE_NORMAL
- en: Uncertainty in outcomes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The iterative nature of AI development is largely a response to the unpredictable
    outcomes that characterize AI models. AI models, especially ML models, are essentially
    pattern-recognition tools, and they can only recognize the patterns present in
    the data used to train them. A model trained on historical data is limited by
    the quality and representativeness of that data. When the data changes, the model’s
    performance can change too, which means that outcomes are harder to guarantee.
  prefs: []
  type: TYPE_NORMAL
- en: As highlighted by Halevy, Norvig, and Pereira in *The Unreasonable Effectiveness
    of Data* (2009), “more data often trumps better algorithms,” showing how dependent
    ML models are on data. However, the world doesn’t stand still, and neither does
    data. As data patterns shift due to changes in customer behavior, the economy,
    or other factors, the model may no longer perform as expected.
  prefs: []
  type: TYPE_NORMAL
- en: Take stock price prediction, for example. A model trained on historical market
    data and economic indicators might initially work well, but financial markets
    are highly sensitive to unexpected events, such as economic downturns or political
    instability. When these events occur, the model’s accuracy can drop significantly,
    because it was trained on data that didn’t include those new pa tterns.
  prefs: []
  type: TYPE_NORMAL
- en: Another source of uncertainty is the complexity of many advanced AI/ML models,
    especially in deep learning. Unlike simpler algorithms that follow clear decision
    paths, deep learning models can learn highly complex patterns in large datasets,
    but this complexity makes them harder to interpret. With multiple layers of non-linear
    transformations, deep learning models often function as “black boxes,” where it’s
    almost impossible to interpret how specific inputs will translate to outputs.
  prefs: []
  type: TYPE_NORMAL
- en: James Bergstra and Yoshua Bengio’s work on hyperparameter optimization discusses
    this uncertainty. In their paper *Random Search for Hyper-Parameter Optimization*
    (2012), they argue that slight changes in model parameters can yield very different
    results, making it hard to reproduce consistent outcomes across environments or
    datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Given these sources of unpredictability, both from the nature of the data and
    the growing complexity of modern models, it’s important to consider the broader
    implications for project teams and stake holders.
  prefs: []
  type: TYPE_NORMAL
- en: What are the implications?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This iterative characteristic and uncertainty in outcomes have real implications
    for project planning and stakeholder expectations. Traditional software projects
    often come with clear timelines and milestones, but AI development is less predictable.
    From data mining to training, development is never straightforward. Instead, it
    may need reworking or extended timelines if the model performance doesn’t initially
    meet expectations.
  prefs: []
  type: TYPE_NORMAL
- en: Business leaders who are used to traditional waterfall project planning and
    timelines might question why AI models require ongoing refinement. As Davenport
    and Harris explain in *Competing on Analytics* , “data science projects often
    face skepticism from business leaders due to their experimental nature and unpredictable
    timelines.”
  prefs: []
  type: TYPE_NORMAL
- en: This is also why data science work does not cleanly fit inside traditional Agile
    assumptions. Agile expects that requirements can be defined up front, that increments
    are predictable, and that “done” can be clearly stated before building. AI breaks
    those assumptions. Success can’t be promised in advance, learning happens through
    iteration, and values emerge only after cycles of testing and refinement. As a
    result, AI may live inside an Agile delivery structure, but it can’t behave like
    a standard Agile feature build. It is critical that organizations understand AI’s
    iterative nature, and its need for fine-tuning can help manage these expectations
    and build trust.
  prefs: []
  type: TYPE_NORMAL
- en: Lack of production-readiness
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Real business value comes from putting the model into production and delivering
    insights or automation at scale, reliably, and sustainably. But for many organizations,
    this step is where AI projects fizzle out.
  prefs: []
  type: TYPE_NORMAL
- en: Being too quick to put a model into production, without an appropriate amount
    of testing, is a common problem. We need to strike a balance.
  prefs: []
  type: TYPE_NORMAL
- en: Too often, there’s no concrete plan for how models will be deployed, monitored,
    or retrained. Teams focus on building a technically impressive solution but stop
    short of operationalizing it. The result is a model that works in a development
    sandbox but never makes an impact in the real world.
  prefs: []
  type: TYPE_NORMAL
- en: Yet, bridging the gap between ML research and real-world deployment remains
    a significant challenge. Unlike traditional software, ML models degrade over time
    due to data drift and changing real-world conditions. Without automated retraining
    and monitoring, models quickly become outdated, leading to performance deterioration.
    A study by Breiter & Keane (2022) found that only 20% of companies have a mature
    AIOps pipeline, meaning most organizations lack the infrastructure to continuously
    update, monitor, and optimize their AI products. This limitation hinders AI scalability
    and can increase operational risks.
  prefs: []
  type: TYPE_NORMAL
- en: Think of developing a model in a Jupyter notebook as being in a laboratory or
    factory prototype shop. It’s a creative, flexible space where ideas can be tested
    and refined quickly. But bringing a product to market and commercializing it requires
    careful design, manufacturing, and quality control. Operationalizing AI is no
    different. The leap from experimentation to production is not trivial and demands
    as much attention as the modeling itself.
  prefs: []
  type: TYPE_NORMAL
- en: Many AI initiatives fail here, not because the science falls short but because
    the engineering and operational plans never get the focus they deserve. Building
    for production from the start, with clear paths for testing, deployment, monitoring,
    and maintenance, is essential for transforming AI from an experiment into a lasting
    source of busin ess value.
  prefs: []
  type: TYPE_NORMAL
- en: Lack of explainability and trust
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many AI models, particularly deep learning architectures, operate as black boxes,
    meaning they produce predictions without clear explanations. This lack of interpretability
    poses risks in regulated industries such as finance, healthcare, and criminal
    justice, where decision transparency is essential.
  prefs: []
  type: TYPE_NORMAL
- en: Lipton (2018) warns that misaligned interpretability expectations create misunderstandings
    between data scientists and business leaders. Regulators are now demanding greater
    transparency in AI-driven decisions. For example, the *EU AI Act* (2023) and GDPR’s
    Article 22 require that AI models affecting individuals, such as credit scoring
    or hiring algorithms, must provide explainable reasoning for their predictions.
  prefs: []
  type: TYPE_NORMAL
- en: Even the most accurate AI model is useless if people don’t trust it enough to
    use it. Nowhere is this more true than in highly regulated industries such as
    banking, finance, and healthcare. Here, black-box AI systems, whose decisions
    are hard to interpret, often meet resistance from business leaders and regulators
    alike.
  prefs: []
  type: TYPE_NORMAL
- en: Deep neural networks are a classic example. These models can deliver impressive
    predictions, but their reasoning is nearly impossible for a human to trace. There’s
    no easy way to follow the logic from a specific input to a particular output.
    This “black-box” nature mirrors the complexity of the human brain, where millions
    of small decisions combine to produce a result.
  prefs: []
  type: TYPE_NORMAL
- en: While this kind of complexity might be acceptable for tasks such as image recognition
    or recommendation systems, it becomes a critical liability in high-stakes domains.
    In criminal justice, healthcare, and finance, every decision can affect lives,
    livelihoods, or compliance with the law. Stakeholders need to know not just what
    the answer is but why the model made that choice. Without that transparency, models
    face skepticism, lack of accountability, and sometimes outright rejection.
  prefs: []
  type: TYPE_NORMAL
- en: Building trust requires more than just technical performance. It means making
    AI systems more understandable and more transparent, so business leaders, regulators,
    and customers can see and trust the reason behind each decision. Without explainability,
    even the smartest AI can end up sitting on the shelf.
  prefs: []
  type: TYPE_NORMAL
- en: Changing business conditions and model degradation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI models are built on the data available when they are developed. But the world
    is always changing. Business priorities shift. Customer behaviors evolve. Regulations
    get updated. If a model is not kept current, it quickly loses its value.
  prefs: []
  type: TYPE_NORMAL
- en: There are clear examples of this in recent history. Supply chain models trained
    before COVID-19 rapidly became inaccurate when the pandemic radically changed
    demand patterns worldwide. Time-series forecasting models built on pre-2008 data
    failed to anticipate the massive disruptions of the global financial crisis. Even
    today, AI-powered chatbots that rely on outdated product information end up frustrating
    users with incorrect or missing answers.
  prefs: []
  type: TYPE_NORMAL
- en: 'The lesson is simple: AI and ML are never finished. They are living processes
    that require ongoing investment and care. Yet, many organizations overlook the
    need for maintenance. They treat models as one-time projects rather than continuous
    programs. The result is predictable: performance slips, trust erodes, and business
    impact disappears.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Other challenges: compute, resources, and skill gaps'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Businesses also contend with challenges in computational power, infrastructure,
    resource constraints, talent shortages, and operationalization. These factors
    determine whether ML initiatives remain experimental or successfully scale in
    to production.
  prefs: []
  type: TYPE_NORMAL
- en: Compute and infrastructure challenges
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Training ML models, especially training deep learning architectures, requires
    immense computational resources. Large models demand high-performing GPUs and
    TPUs, which can be prohibitively expensive. A study by Patterson et al. (2021)
    found that training a single large transformer model can emit as much carbon as
    five cars in their lifetime, underscoring the financial and environmental costs.
  prefs: []
  type: TYPE_NORMAL
- en: Organizations could choose between cloud services and on-premises infrastructure.
    Cloud solutions offer scalability but come with recurring costs and potential
    vendor lock-in. On-premises setups provide more control but require significant
    upfront investment and maintenance. These trade-offs impact how quickly and efficiently
    companies can build and deploy ML solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Resource and budget constraints
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Organizations often underestimate post-deployment costs when budgeting for ML
    projects. Beyond training, models require ongoing monitoring, retraining, and
    infrastructure maintenance. Sculley et al. (2015) describe this as “technical
    debt in ML,” where companies focus on model accuracy but fail to plan for the
    hidden costs of operationalization.
  prefs: []
  type: TYPE_NORMAL
- en: Scaling ML across multiple business units introduces additional expenses, such
    as distributed computing and network bandwidth costs. A 2023 study from MIT AI
    Research found that 80% of ML project costs occur after deployment, emphasizing
    the need for cost-efficient model life cycle management.
  prefs: []
  type: TYPE_NORMAL
- en: Skill gaps and talent shortages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI adoption is outpacing the availability of skilled professionals. The *LinkedIn
    AI Talent Report* (2023) ( [https://economicgraph.linkedin.com/research/future-of-work-report-ai](https://economicgraph.linkedin.com/research/future-of-work-report-ai)
    ) noted a 74% year-over-year increase in demand for AI/ML engineers, but hiring
    for specialized roles takes an average of 6–9 months. The biggest shortages exist
    in MLOps, data engineering, and model deployment roles, which are essential for
    production-ready AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: Successful AI products require expertise across multiple disciplines. Data engineers
    manage large-scale data pipelines, AI engineers build and fine-tune models, and
    AIOps specialists ensure efficient deployment and monitoring. Many companies invest
    in upskilling existing employees, but the interdisciplinary nature of AI makes
    hiring the right talent a persistent challenge.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we have unpacked how so many AI initiatives have failed. Most
    AI failures are not technical; they come from a misalignment of goals, vague values,
    or poor integration into the business workflow. Optimizing for technical metrics
    alone can create solutions that “work” mathematically but hurt the business. AI
    is probabilistic and iterative; it should not be managed like a fixed-scope IT
    project.
  prefs: []
  type: TYPE_NORMAL
- en: 'Real success depends on getting the foundation right: a clear business objective
    and value hypothesis; a strong data foundation; secured, scalable, and automated
    AIOps; and shared ownership between business and AI/data teams.'
  prefs: []
  type: TYPE_NORMAL
- en: What’s next?
  prefs: []
  type: TYPE_NORMAL
- en: Now that we understand the failure patterns and the unique nature of AI work,
    we can shift from “what goes wrong” to “how to do it right.”
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapters, we will translate these lessons into a practical, repeatable
    framework for building and executing an AI strategy that aligns with business
    values, prioritizes the right opportunities, and builds for scalable and measurable
    impact.
  prefs: []
