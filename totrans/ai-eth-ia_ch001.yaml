- en: 'AI Ethics in Action: A practical guide to building modern organizations through
    purposeful, ethical AI innovation'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI伦理实践：通过有目的、道德的人工智能创新构建现代组织的实用指南
- en: '**Welcome to Packt Early Access**. We’re giving you an exclusive preview of
    this book before it goes on sale. It can take many months to write a book, but
    our authors have cutting-edge information to share with you today. Early Access
    gives you an insight into the latest developments by making chapter drafts available.
    The chapters may be a little rough around the edges right now, but our authors
    will update them over time.You can dip in and out of this book or follow along from
    start to finish; Early Access is designed to be flexible. We hope you enjoy getting
    to know more about the process of writing a Packt book.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**欢迎来到Packt早期访问**。在我们这本书上市之前，我们为您提供独家预览。写一本书可能需要好几个月的时间，但我们的作者今天有前沿信息要与您分享。早期访问通过提供章节草案，让您深入了解最新的发展。目前章节可能有些粗糙，但我们的作者会随着时间的推移进行更新。您可以随意翻阅这本书，或者从头到尾跟随；早期访问旨在灵活。我们希望您喜欢了解更多关于Packt书籍写作过程的信息。'
