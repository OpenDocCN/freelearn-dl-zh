- en: '6'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Advanced Servers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In [*Chapter 3*](Chapter_6.xhtml), you saw how you can build MCP servers. However,
    there’s another way to build these servers – namely, by using a more advanced
    approach. The reason for using this more advanced approach is that you want to
    be more in control.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will learn how to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Use context managers to manage the lifecycle of your server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Improve the architecture of your server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understand low-level access to MCP servers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Why this low-level approach?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Context managers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Context managers in MCP servers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Low-level access
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Organizing your architecture
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why this low-level approach?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'At this point, you might be thinking, *Why would I want to do that? The previous
    approach was so easy!* Well, there are a few reasons why you might want to use
    this approach. You may want to do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Use context managers to manage the lifecycle of your server**: Here, you
    can do things such as connecting to a database or other services that are connected
    to your server. By having more control over the lifecycle of your server, you
    can ensure that your server is properly initialized and cleaned up when it’s no
    longer needed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improve the architecture of your server**: Having more control over how the
    server is built allows for more freedom in how tools and resources are registered,
    but also how incoming requests are handled. This increased control allows you
    to organize your code in a way that is more maintainable and scalable. This chapter
    shows you how you can organize your code with both a low-level server and a normal
    MCP server. It’s possible to create a clean architecture in both cases. However,
    it could be argued that the low-level server approach is a bit cleaner, as you
    don’t have to pass the server instance around. You’ll see more about what’s meant
    by that last statement later in this chapter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The only way forward in some cases**: There are cases when you deal with
    certain features where there simply is no other way forward than a low-level approach.
    This is true for using [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor302), on sampling,
    and [*Chapter 10*](Chapter_10.xhtml#_idTextAnchor330), on elicitation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dive into a more low-level approach, so you know what it looks like, so
    you can choose the approach that suits your project the best.
  prefs: []
  type: TYPE_NORMAL
- en: Context managers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'So, what’s a context manager to begin with? A **context manager** is a construct
    that allows you to allocate and release resources precisely when you want to.
    The most common way to use a context manager is with the `with` statement, which
    ensures that resources are properly cleaned up after use, even if an error occurs.
    By using a context manager, your code becomes cleaner and more readable. Let’s
    look at a simple example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Using contextlib to create context managers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Another way to use context managers is to create a custom context manager using
    the `contextlib` (there’s a corresponding NPM library called `contextlib`) module.
    This allows you to create context managers without defining a class. Here’s an
    example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Here, you can see how the `DatabaseConnection` class is replaced with a `database_connection()`
    function that uses the `contextlib.contextmanager` decorator. The `yield` statement
    provides the resource to the block, and the code after the `yield` statement is
    executed when the block is exited, ensuring proper cleanup. Is this better than
    the previous example? Well, at least you type less code.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing a context manager
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you’re interested in knowing how to implement a context manager, because
    you’re curious or because you don’t want yet another dependency, here’s how you
    can do that:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding, the `DatabaseConnection` class implements the context manager
    protocol by defining the `__enter__` and `__exit__` methods. The `__enter__` method
    is called when the `with` block is entered, and it returns the resource (in this
    case, a database connection). The `__exit__` method is called when the block is
    exited, and it handles any cleanup necessary, such as closing the connection.
    Let’s call it like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Without a context manager, your code would look like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Imagine what would happen if you forgot to close the connection in the `finally`
    block? You might be a very disciplined programmer and always remember to close
    the connection, but in a larger code base, it’s easy to forget. Context managers
    help you avoid such pitfalls by ensuring that resources are always cleaned up
    properly.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at how context managers are used in the context of MCP servers next.
  prefs: []
  type: TYPE_NORMAL
- en: Context managers in MCP servers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'MCP allows you to control the lifecycle management of your resources. Let’s
    have a look at some code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, we’ve done several things:'
  prefs: []
  type: TYPE_NORMAL
- en: Defined an asynchronous context manager, `server_lifespan`, that manages the
    lifecycle of the server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Initialized resources such as a database connection and settings when the server
    starts, cleaning them up when the server shuts down
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exposed these resources to the server’s request context, allowing handlers to
    access them easily
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Speaking of handlers, let’s see how you can access these resources in your
    server’s handlers in the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding code, we’ve done the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Defined a tool, `query_db`, that accesses the resources initialized in the `server_lifespan`
    context manager.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Accessed the database connection and settings from the `lifespan_context` of
    the server’s request context using the `db = ctx.lifespan_context["db"]` and `settings
    = ctx.lifespan_context["settings"]` code.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Great – now we have an understanding of context management and why it exists.
    Let’s look more at low-level access in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Low-level access
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Let’s recap how we first build a server so we can easily compare it to how
    low-level access is different. Here’s how you build a simple MCP server with a
    high-level API:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The `FastMCP` class is what you use to instantiate a server – in this case,
    an instance called `mcp`. Then we use `@mcp` to define resources, tools, and prompts.
  prefs: []
  type: TYPE_NORMAL
- en: This is a high-level way of building a server, but what if you want more control
    over how the server is built? Here’s how you can do that using low-level access.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at how registering features is different. In the past, you would
    have been used to using decorators associated with specific tools or resources,
    and so on. What’s different in a low-level server is that you need to handle all
    requests yourself. Instead of handling one tool or resource at a time, you handle
    all requests related to tools, resources, and prompts in one place.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, the import is different. See how we import from `from mcp.server.lowlevel`
    and `Server`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'That’s followed by instantiating a server like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Instead of using `@mcp.tools()` or `@mcp.resource()`, you register using handlers
    such as `@server.list_tools()` and `@server.call_tool()`. That’s a huge difference.
    The difference lies in that, instead of there being one decorator for every feature,
    in a low-level server, you respond to all tool requests, whether to call a tool
    or list tools, resources, or prompts. That means `@server.list_tools()` is responsible
    for listing all tools, and you need to implement that logic yourself, whereas
    a high-level server does that for you. Here’s an example of how `@server.list_tools()`
    can be implemented:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding code, we’ve done the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Defined a handler, `handle_list_tools`, that responds to the `list_tools` request.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Used the `@server.list_tools()` decorator to register this handler with the
    server.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Iterated over `tools.tools.values()` to collect all tools and return them in
    the required format – in this case, a list of `types.Tool` objects. In this case,
    `tools.tools` is a dictionary that contains all the tools registered with the
    server that we’ve created, so it looks something like this:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Isn’t this more work? Well, actually, let’s explore in the next section how
    this could be a great way to organize your code.
  prefs: []
  type: TYPE_NORMAL
- en: Organizing your architecture
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A huge advantage of using a low-level server is that you can control the architecture
    of your server. You can organize your code in a way that makes sense for your
    project. For example, you can define all your tools in a folder called `tools`.
    Tools also don’t need to know about the server instance. Sounds promising, right?
    Let’s see how next.
  prefs: []
  type: TYPE_NORMAL
- en: You can organize your code well with a high-level server too, but it’s usually
    a bit messier as you need to pass the server instance around, as we said initially
    in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you have defined MCP server features so far in a high-level server:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'There’s nothing wrong with defining a server and its features like the preceding.
    However, it might be tempting to keep your entry point file relatively empty (save
    for the server definition) and define all your features in that file. So, you
    might resort to having a project structure like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'Then your `server.py` might look like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Your `tools.py` might look like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'You might even have dedicated files for each tool:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: So yes, you can organize your code in a way that makes sense for your project.
    It’s hard to get away from having to pass the server instance. It should be said
    that the high-level server does provide a `create_tool()` function that allows
    you to create tools without you having to use the `@mcp.tool()` decorator. However,
    and this is the opinion of the author, it’s just easier to use the low-level server
    for this purpose. Let’s look at how you can do this in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Constructing a list tools response in a low-level server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, let’s see whether low-level access can help improve our architecture further.
    The goal is to have a server that can register tools, resources, and prompts in
    a way that is easy to maintain and extend.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, we said the following so far about the low-level server:'
  prefs: []
  type: TYPE_NORMAL
- en: Instead of using `FastMCP`, you use the `Server` class from `mcp.server.lowlevel`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can register features using handlers such as `@server.list_tools()` and
    `@server.call_tool()` to handle listing all tools and handling all tool calls
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s study these handlers in more detail and how we can construct them, to
    see how we can leverage them:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, we observe that the return type is a list of `types.Tool` objects. This
    is reflected in the code, where we append a `types.Tool` object to `tool_list`
    like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Organizing your code and creating tools and schemas
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now that we know how to register tools, let’s see how we can organize the code
    a bit. The goal is to achieve the following:'
  prefs: []
  type: TYPE_NORMAL
- en: A file for each tool, so we can easily manage the code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Register all the tools in one place
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sounds like a great goal, right? Who doesn’t want maintainability? Let’s create
    a folder structure like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: 'What we’re seeing here is that we have a `server.py` file that will be the
    entry point of our server, and a `tools/` folder that contains all the tools.
    The `tools/init.py` file is used to register to collect all the tools, and `server.py`
    and `@mcp.list_tools()` will be used to register all the tools. Let’s look at
    `__init__.py` first:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'That looks super simple – just a dictionary that imports the `tool_add` function
    from the `add.py` file and adds it to the `tools` dictionary. Now let’s look at
    the `add.py` file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'In the preceding code, we’ve done the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Imported `AddInputModel` and added that as `input_schema`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defined an `add_handler` function that takes the arguments and returns their
    sum
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Created a `tool_add` dictionary that contains the tool’s name, description,
    input schema, and handler function
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you can see, there are no imports to anything MCP, and it therefore looks
    pretty clean.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, let’s look at the `schema.py` file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: Here we’re using the **Pydantic** library to define input models. We can extend
    this file with new types as we add more tools to our solution.
  prefs: []
  type: TYPE_NORMAL
- en: Handling a tool being called
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So far, you’ve seen how we’re able to take care of a call asking us to list
    all the tools. But there’s another case we need to handle, namely when a client
    is trying to call a tool. For that, we need to do the following with the incoming
    tool calling request:'
  prefs: []
  type: TYPE_NORMAL
- en: Identify which tool to call.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Parse out the arguments and, in doing so, also validate them. This is where
    our Pydantic schemas will come in handy to help us with this.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s start with the request on the server:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Note how we need to refer to the `@server.call_tool` decorator and that the
    return type needs to be `list[types.TextContext]`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, let’s see if we can identify the correct tool:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'Okay, let’s get ready to call a handler on the tool and construct a response
    to the calling client:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: Note how we invoke the `handler` property on the `tool` object with `arguments`
    as a parameter. What does the handler look like on the tool, though, and how does
    it work?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Here, we use a `try-catch` to pass `args` into the `AddInputModel` class. It
    takes a dictionary, and by passing it as `**args`, we’re unpacking the dictionary
    into keyword arguments. If the input is invalid, `ValueError` is raised, with
    a message indicating what went wrong. This way, you can ensure that the input
    to your tool is always valid and meets the expected schema.
  prefs: []
  type: TYPE_NORMAL
- en: Great, we’ve now managed to handle both listing all tools and calling a specific
    tool while also ensuring some validation of input arguments takes place.
  prefs: []
  type: TYPE_NORMAL
- en: I’m sure you could improve this setup further, but this is a lot better than
    what we started with.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you learned how to use the low-level server to create a more
    maintainable architecture for your MCP server. You saw how to register tools,
    handle requests, and validate input using schemas. This approach allows you to
    easily add new tools and manage existing ones, making your server more flexible
    and easier to maintain.
  prefs: []
  type: TYPE_NORMAL
- en: In our next chapter, we’ll cover how to build clients that can interact with
    our MCP servers.
  prefs: []
  type: TYPE_NORMAL
- en: Assignment
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s see if we can organize the e-commerce server that we created in [*Chapter
    3*](Chapter_6.xhtml). Here’s the code for reference. Create a tools directory
    – use Pydantic and a low-level API.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: Solution
  prefs:
