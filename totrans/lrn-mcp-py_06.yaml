    6/solutions/README.md)."
  prefs: []
  type: TYPE_NORMAL
- en: Quiz
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What are some benefits of using a low-level server?
  prefs: []
  type: TYPE_NORMAL
- en: 'A: You use less memory'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'B: You have better control over how requests are processed'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'C: You can define your own transports'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can access the solution at [https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter06/solutions/solution-quiz.md](https://github.com/PacktPublishing/Learn-Model-Context-Protocol-with-Python/blob/main/Chapter06/solutions/solution-quiz.md).
  prefs: []
  type: TYPE_NORMAL
