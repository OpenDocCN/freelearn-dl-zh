- en: Part 1:Introduction to Prompt Engineering
  id: totrans-73
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*Part 1* establishes a comprehensive foundation in the world of prompt engineering
    for language AIs. [*Chapter 1*](B21161_01.xhtml#_idTextAnchor015) offers an expansive
    exploration of AI prompts, elucidating their composition, categories, real-world
    applications, underlying concepts, and techniques to shape desired model outputs.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Equipped with insights into prompt architecture and the inner workings of language
    models, you can systematically craft precise prompts to achieve your intended
    results. Building on these core concepts, [*Chapter 2*](B21161_02.xhtml#_idTextAnchor035)
    demonstrates leveraging tools such as ChatGPT for automated content creation.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Practical use cases such as developing viral social posts or high-converting
    sales copy are examined. Additionally, personalization and engagement strategies
    are covered to ensure that your content resonates with target audiences.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: With proven prompt engineering best practices, *Part 1* empowers you to tap
    the phenomenal potential of language AIs to enhance content development workflows.
    The stage is set to apply these skills and explore innovative applications across
    manifold domains in subsequent chapters.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 通过经过验证的提示工程最佳实践，*第一部分*使您能够挖掘语言人工智能在内容开发工作流程中的巨大潜力。为应用这些技能并在后续章节中探索众多领域的创新应用奠定了基础。
