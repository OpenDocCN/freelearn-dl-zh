- en: '7'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Adding and Modifying Visual Elements
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 添加和修改视觉元素
- en: Even if we discussed how AI can help us start or improve our presentations,
    we, as content creators, need to constantly think about how we can make our presentations
    more impactful and visually appealing. PowerPoint has many features that can help
    you right from its interface.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 即使我们已经讨论了AI如何帮助我们开始或改进我们的演示文稿，我们作为内容创作者，需要不断思考如何使我们的演示文稿更具影响力和视觉吸引力。PowerPoint有许多功能可以帮助你，从其界面开始。
- en: If you have read [*Chapter 1*](Chapter_01.xhtml#_idTextAnchor022) , you probably
    remember I mentioned how important it was to start thinking about images or visuals
    that came to mind while planning content for your slides. Now is the time to start
    using some PowerPoint features to transform sentences and bullet points into relevant
    visuals that will grab people’s attention and be remembered by your audience.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经阅读了[*第1章*](Chapter_01.xhtml#_idTextAnchor022)，你可能会记得我提到在规划幻灯片内容时考虑图像或视觉的重要性。现在是时候开始使用一些PowerPoint功能，将句子和项目符号转换为相关的视觉元素，这些元素将吸引人们的注意力，并让观众记住。
- en: 'My goal is to help you discover some lesser-known tools, so I will not focus
    on adding simple shapes or inserting stock images without customizing them. In
    this chapter, we will discuss the following topics:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目的是帮助你发现一些不太为人所知的工具，因此我不会专注于添加简单的形状或插入未定制的库存图片。在本章中，我们将讨论以下主题：
- en: Inserting and modifying a map
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插入和修改地图
- en: Converting bullet points into SmartArt
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将项目符号转换为SmartArt
- en: Creating new shapes with **Edit Points**
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**编辑点**创建新形状
- en: Creating new shapes with the merging tools
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用合并工具创建新形状
- en: Using and customizing stock images and other graphics
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用和自定义库存图片和其他图形
- en: Technical requirements
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: Most topics discussed in this chapter don’t require having a **Microsoft 365
    (M365) subscription** , the tools and features having been introduced in previous
    versions of PowerPoint. I will identify when a feature is in M365 only. Also,
    be aware that since the subscription version of PowerPoint is updated on an ongoing
    basis, it is possible that some features will not look exactly the same in your
    version of the application.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论的大多数主题不需要拥有**Microsoft 365 (M365**)订阅，因为工具和功能已在PowerPoint的先前版本中介绍。我将标识仅在M365中存在的功能。此外，请注意，由于PowerPoint的订阅版本持续更新，某些功能在您的应用程序版本中可能看起来并不完全相同。
- en: Inserting and modifying a map
  id: totrans-12
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 插入和修改地图
- en: 'When I say you need to start thinking visually when creating presentations,
    it means to stop being on autopilot when creating your content. Any content you
    need to deliver needs to be examined to seek visual ways to create it. Let’s look
    at an example of content that can be greatly improved with one of PowerPoint’
    s features ( **M365** and **Office 2024** only): inserting a map. For the slide
    example in *Figure 7.1* , I created a table with data showing four Canadian provinces
    that should have more than six million people by 2043:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说你需要在创建演示文稿时开始视觉化思考，我的意思是停止在创建内容时自动导航。你需要传达的任何内容都需要被检查，以寻求创建它的视觉方式。让我们看看一个可以通过PowerPoint的一个功能（仅限**M365**和**Office
    2024**）大大改进的内容示例（**M365**和**Office 2024**仅限）：插入地图。对于*图7.1*中的幻灯片示例，我创建了一个表格，显示了到2043年将有超过六百万人口的四个加拿大省份：
- en: '![Figure 7.1 – Table listing four Canadian provinces with their population
    by 2043](img/B32063_07_01.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图7.1 – 列出四个加拿大省份及其到2043年的人口表格](img/B32063_07_01.png)'
- en: Figure 7.1 – Table listing four Canadian provinces with their population by
    2043
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1 – 列出四个加拿大省份及其到2043年的人口表格
- en: 'It is not a bad slide per se, but it does lack visual appeal. Instead, we can
    leverage PowerPoint’s map feature so that we can make each province visible within
    Canada, as in *Figure 7.2* :'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这本身不是一个糟糕的幻灯片，但它确实缺乏视觉吸引力。相反，我们可以利用PowerPoint的地图功能，使加拿大内的每个省份都可见，就像*图7.2*中所示：
- en: '![Figure 7.2 – Population information shown on a map of Canada](img/B32063_07_02.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图7.2 – 在加拿大地图上显示的人口信息](img/B32063_07_02.png)'
- en: Figure 7.2 – Population information shown on a map of Canada
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2 – 在加拿大地图上显示的人口信息
- en: As you can see, it adds interest to the data by showing where the highest populations
    will be i n the country by 2043, and we can even use varying shade s to make it
    easy to see which province will have the biggest population. So, instead of simply
    listing data, you can use a visual that will help tell the story you want to put
    forward.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，通过显示到 2043 年该国人口最多的地区，它增加了数据的趣味性，我们甚至可以使用不同的阴影来使哪个省份将拥有最多人口一目了然。因此，您不仅可以简单地列出数据，还可以使用视觉元素来帮助讲述您想要传达的故事。
- en: 'Since you cannot directly convert a table into a chart in PowerPoint, let’s
    move on to the steps you need to go through to create your own map ( *Figure 7.3*
    ):'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于您不能在 PowerPoint 中直接将表格转换为图表，让我们继续下一步骤，创建您自己的地图（*图 7.3*）：
- en: '![Figure 7.3 – Adding a chart from the content placeholder on a slide](img/B32063_07_03.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.3 – 在幻灯片的内容占位符中添加图表](img/B32063_07_03.png)'
- en: Figure 7.3 – Adding a chart from the content placeholder on a slide
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.3 – 在幻灯片的内容占位符中添加图表
- en: Select the data in your table and copy it ( *Ctrl* + *C* ).
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择表格中的数据并复制它（*Ctrl* + *C*）。
- en: Insert a new slide with the **Title and Content** layout and click on the **Chart**
    icon in the content placeholder ( **1** ). Then, select **Map** ( **2** ) in the
    **Insert Chart** window and click **OK** ( **3** ).
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插入一个具有**标题和内容**布局的新幻灯片，然后在内容占位符中点击**图表**图标（**1**）。然后，在**插入图表**窗口中选择**地图**（**2**），并点击**确定**（**3**）。
- en: 'The placehold er will now include a world map ( **1** ) ( *Figure 7.4* ) :'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 占位符现在将包括一个世界地图（**1**）（*图 7.4*）：
- en: '![Figure 7.4 – Changing the default data for an inserted map](img/B32063_07_04.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.4 – 更改插入地图的默认数据](img/B32063_07_04.png)'
- en: Figure 7.4 – Changing the default data for an inserted map
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.4 – 更改插入地图的默认数据
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/11.png)
    ** Quick tip ** : Need to see a high-resolution version of this image? Open this
    book in the next-gen Packt Reader or view it in the PDF/ePub copy.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '![黑色背景上的放大镜  AI生成的可能内容可能不正确。](img/11.png) **快速提示**：需要查看此图像的高分辨率版本？在下一代 Packt
    Reader 中打开此书或在其 PDF/ePub 复制中查看。'
- en: '![img](img/21.png) ** The next-gen Packt Reader ** and a ** free PDF/ePub copy
    ** of this book are included with your purchase. Scan the QR code OR visit [ https://packtpub.com/unlock
    ](https://packtpub.com/unlock) , then use the search bar to find this book by
    name. Double-check the edition shown to make sure you get the right one.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '![img](img/21.png) **快速提示**：需要查看此图像的高分辨率版本？在下一代 Packt Reader 中打开此书或在其 PDF/ePub
    复制中查看。'
- en: '![img](img/Unlock3.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![img](img/Unlock3.png)'
- en: An Excel window s hould appear, showing you a list of countries and data; select
    the data and delete it ( **2** ). If you don’t see the Excel data, click on the
    **Edit Data** button in the ribbon ( **3** ). You can now paste your data in the
    first cell ( *Ctrl* + *V* ) ( **4** ) and click on the **Paste Options** icon
    ( **5** ) to make sure the data uses the destination formatting. This will remove
    the table formatting ( **6** ).
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应该出现一个 Excel 窗口，显示国家列表和数据；选择数据并删除它（**2**）。如果您看不到 Excel 数据，请点击功能区中的**编辑数据**按钮（**3**）。现在您可以将数据粘贴到第一个单元格中（*Ctrl*
    + *V*）（**4**），然后点击**粘贴选项**图标（**5**）以确保数据使用目标格式。这将移除表格格式（**6**）。
- en: You can now close the Excel data window and start working on formatting your
    new map.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现在您可以关闭 Excel 数据窗口，开始格式化您的新地图。
- en: As per testing done by Fiona, one of my great technical reviewers, adding a
    map chart might be challenging outside the U.S. and Canadian geographic regions.
    PowerPoint map charts rely on Bing Maps, which might not recognize informal or
    historical regions. Instead of using the UK, try England, Scotland, Wales, and
    Northern Ireland. In Ireland, use counties instead of provinces. If you are from
    another country and struggle, you can try using the format *full country name
    – county* .
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的优秀技术审稿人 Fiona 的测试，在美加以外的地理区域添加地图图表可能具有挑战性。PowerPoint 地图图表依赖于 Bing Maps，可能无法识别非正式或历史区域。与其使用英国，不如尝试英格兰、苏格兰、威尔士和北爱尔兰。在爱尔兰，使用县而不是省份。如果您来自其他国家并且有困难，您可以尝试使用格式
    *full country name – county*。
- en: 'Ideally, we should remove at least the **Chart Title** ( **1** ) option since
    the title for the slide already gives enough information ( *Figure 7.5* ):'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，我们应该至少移除**图表标题**（**1**）选项，因为幻灯片的标题已经提供了足够的信息（*图 7.5*）：
- en: '![Figure 7.5 – Removing the chart title and legend for a map](img/B32063_07_05.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.5 – 移除地图的图表标题和图例](img/B32063_07_05.png)'
- en: Figure 7.5 – Removing the chart title and legend for a map
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.5 – 移除地图的标题和图例
- en: To do so, you must click on the plus ( **+** ) sign on the right of the chart
    ( **2** ) and uncheck **Chart Title** . In my example, I also unchecked **Legend**
    since I wanted to show the names of the provinces on the map.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要这样做，您必须点击图表右侧的加号（ **+** ）标志（ **2** ）并取消选中**图表标题**。在我的例子中，我还取消了**图例**的选中，因为我想要在地图上显示省份的名称。
- en: If you are not satisfied with the colors of your map, you can click on the **Change
    Colors** button in the ribbon ( **3** in *Figure 7.5* ) to make the changes.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您对地图的颜色不满意，可以点击工具栏上的**更改颜色**按钮（ **3** 在 *图7.5* 中）来做出更改。
- en: 'An easy way to quickly format all the information you want to show on your
    map is by opening the formatting pane ( *Figure 7.6* ):'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 快速格式化您想在地图上显示的所有信息的一种简单方法是打开格式化面板（ *图7.6* ）。
- en: '![Figure 7.6 – Opening the formatting pane to quickly format chart areas](img/B32063_07_06.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图7.6 – 打开格式化面板以快速格式化图表区域](img/B32063_07_06.png)'
- en: Figure 7.6 – Opening the formatting pane to quickly format chart areas
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.6 – 打开格式化面板以快速格式化图表区域
- en: To do so, you need to change to the **Format** tab ( **1** ) and click on the
    **Dialog launcher** icon in the ribbon ( **2** ) to display the formatting pane,
    which should display **Format Chart Area** by default. You can then use the **Chart
    Options** dropdown ( **3** ) to select the area of the chart you need to format.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 要这样做，您需要切换到**格式**选项卡（ **1** ）并点击工具栏上的**对话框启动器**图标（ **2** ）以显示格式化面板，默认情况下应显示**格式化图表区域**。然后，您可以使用**图表选项**下拉菜单（
    **3** ）选择您需要格式化的图表区域。
- en: 'When selecting **Series Options** from the **Chart Options** list, the formatting
    pane displa ys icons for three types of options you can customize ( *Figure 7.7*
    ) :'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当从**图表选项**列表中选择**系列选项**时，格式化面板显示您可以自定义的三种选项类型的图标（ *图7.7* ）：
- en: '![Figure 7.7 – Using the Series Options pane to adjust a map](img/B32063_07_07.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图7.7 – 使用系列选项面板调整地图](img/B32063_07_07.png)'
- en: Figure 7.7 – Using the Series Options pane to adjust a map
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.7 – 使用系列选项面板调整地图
- en: '**Fill & Line** ( **1** ), **Effects** ( **2** ), and **Series Options** (
    **3** ): Select **Series Options** to mak e any desired adjustments.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**填充与线条** ( **1** ), **效果** ( **2** ), 和 **系列选项** ( **3** ): 选择**系列选项**以进行任何所需的调整。'
- en: '**Map projection** ( **4** ): This allows you to change the view of the map
    according to the various existing map projection styles. Using **Automatic** will
    probably fit most uses. Research the various styles if you have specific needs.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**地图投影** ( **4** ): 这允许您根据现有的各种地图投影样式更改地图的视图。使用**自动**可能适合大多数用途。如果您有特定需求，请研究各种样式。'
- en: '**Map area** ( **5** ): This allows you to select areas of the map you want
    to display. Test the options in the drop-down list to see what fits the message
    you want to convey the most. Also, always keep in mind which representation will
    make the most sense to your audience.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**地图区域** ( **5** ): 这允许您选择要显示的地图区域。测试下拉列表中的选项，看看哪个最适合您想要传达的信息。同时，始终牢记哪种表示方式对您的观众来说最有意义。'
- en: '**Map labels** ( **6** ): This allows you to select displayed labels. In my
    example, I used **Show all** so that the name of the provinces would display on
    the map, helping whoever in an audience might not be familiar with the Canadian
    provinces. There is one caveat with this option, though: you won’t be able to
    edit the size of the map labels. We will see another option later in this section.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**地图标签** ( **6** ): 这允许您选择显示的标签。在我的例子中，我使用了**显示全部**，以便省份的名称显示在地图上，帮助那些可能不熟悉加拿大省份的观众。不过，这个选项有一个缺点：您将无法编辑地图标签的大小。我们将在本节稍后看到另一个选项。'
- en: '**Series Color** ( **7** ): This allows you to choose between a two- or three-color
    gradient. In my example, I chose **Diverging** ( **3-color** ), which allowed
    me to select a color for each of the data points.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系列颜色** ( **7** ): 这允许您在两种或三种颜色渐变之间进行选择。在我的例子中，我选择了**发散**（ **3色** ），这让我可以为每个数据点选择一种颜色。'
- en: When using the **Series Colors** options, if you cannot get the map to change
    colors adequately, have a look at the Excel data sheet to make sure the numbers
    are using the right decimal point (period or comma).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用**系列颜色**选项时，如果您无法使地图颜色改变得足够好，请查看Excel数据表，确保数字使用了正确的十进制点（点或逗号）。
- en: 'Now that we have our map customized with our colors and province labels, it
    is time to add the data ( *Figure 7 .8* ):'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经用我们的颜色和省份标签定制了地图，是时候添加数据了（ *图7.8* ）：
- en: '![Figure 7.8 – Adding data labels on a map](img/B32063_07_08.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.8 – 在地图上添加数据标签](img/B32063_07_08.png)'
- en: Figure 7.8 – Adding data labels on a map
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.8 – 在地图上添加数据标签
- en: To do so, when the map is selected on the slide, click on the **Chart Design**
    contextual tab on the ribbon ( **1** ) so that you can access the **Add Chart
    Element** button ( **2** ). Next, choose **Data Labels** ( **3** ), then **Show**
    ( **4** ). The **More Data Label Options…** ( **5** ) option opens the **Format
    Data Labels** ( **6** ) pane. We now see the data displayed below the names of
    the provinces.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要这样做，当地图在幻灯片上被选中时，点击功能区上的**图表设计**上下文标签（**1**），以便你可以访问**添加图表元素**按钮（**2**）。接下来，选择**数据标签**（**3**），然后**显示**（**4**）。**更多数据标签选项…**（**5**）选项打开**格式数据标签**（**6**）面板。我们现在可以看到显示在省份名称下面的数据。
- en: 'Two th ings you might want to consider at this point are formatting the n umbers
    to reduce the number of decimals and increasing the size of the map. This is what
    we accomplish in *Figure 7.9* :'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，你可能想要考虑的两件事是格式化数字以减少小数位数和增加地图的大小。这是我们通过*图 7.9* 实现的：
- en: '![Figure 7.9 – Formatting data labels and increasing the size of a map](img/B32063_07_09.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.9 – 格式化数据标签和增加地图大小](img/B32063_07_09.png)'
- en: Figure 7.9 – Formatting data labels and increasing the size of a map
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.9 – 格式化数据标签和增加地图大小
- en: If you want to add a **Category Name** ( **1** ) value to your labels so that
    you can format the font size and color, you need to check this checkbox. Keep
    in mind that you will probably have problems displaying the category and the data
    if the textbox is too small. If that is the case, don’t add names and values with
    the chart options. Just use regular textboxes that you can easily modify or animate
    if needed.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想为你的标签添加一个**类别名称**（**1**）的值，以便你可以格式化字体大小和颜色，你需要勾选这个复选框。记住，如果文本框太小，你可能会有显示类别和数据的问题。如果是这种情况，不要使用图表选项添加名称和值。只需使用可以轻松修改或动画化的常规文本框。
- en: Open the **Number** category ( **2** ) so that you can change it to **Number**
    ( **3** ) and reduce the number of decimals to `2` ( **4** ). This will improve
    the readability of your data i n your presentation. But we do need to make other
    chan ges to make it more readable, so continue reading!
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开**数字**类别（**2**），以便你可以将其更改为**数字**（**3**），并将小数位数减少到`2`（**4**）。这将提高你在演示文稿中数据的可读性。但我们需要进行其他更改以提高其可读性，所以请继续阅读！
- en: Increase the size of the map by selecting and dragging one of the corner handles
    ( **5** ) and making it as big as the slide can take. In my example, part of the
    Northern Territories was overlapping the title, so I used the **Send Backward**
    | **Send to Back** options ( **6** ) in the **Format** tab to make sure the title
    was still easily readable.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过选择并拖动一个角手柄（**5**）来增加地图的大小，并将其调整到幻灯片可以容纳的大小。在我的例子中，北领地的部分与标题重叠，所以我使用了**格式**标签中的**向后发送**
    | **发送到后面**选项（**6**）来确保标题仍然容易阅读。
- en: We now must take care of the font size for the labels. Since we have worked
    on the label options, your data elements should be selected on your map ( **7**
    ). You can simply go back to the **Home** tab and change the font size; space
    allowing, I would suggest you use at least **24 points** to make the data easier
    to read.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现在，我们必须注意标签的字体大小。由于我们已经处理了标签选项，你的数据元素应该在地图上被选中（**7**）。你可以简单地回到**主页**标签并更改字体大小；如果空间允许，我建议你使用至少**24
    点**来使数据更容易阅读。
- en: '**Warning**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**警告**'
- en: When you change the font size of data labels in a chart, PowerPoint will, unfortunately,
    change the color to a default gray. To bypass this problem, you need to select
    the specific data for which this color causes contrast problems and choose another
    color.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在图表中更改数据标签的字体大小时，不幸的是，PowerPoint 会将颜色更改为默认灰色。为了绕过这个问题，你需要选择这个颜色导致对比度问题的特定数据，并选择另一种颜色。
- en: If you are trying to add a map with smaller counties, provinces, or countries,
    you might have issues with map labels not showing properly. What can be done to
    avoid this limitation is not showing map labels and using text boxes overlaid
    on the map.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你尝试添加包含较小县、省或国家的地图，你可能会遇到地图标签显示不正确的问题。为了避免这种限制，可以不显示地图标签，并使用叠加在地图上的文本框。
- en: As you can see, PowerPoint offers a nice way to put data related to regions
    or countries in context. If you are using an unconnected version of PowerPoint
    older than Office 2024, you will need to seek other alternatives for maps.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，PowerPoint提供了一种很好的方式来将有关地区或国家的数据置于上下文中。如果你使用的是比Office 2024更早的未连接版本的PowerPoint，你将需要寻找其他替代方案来使用地图。
- en: In the next section, we discuss another way to make your content more visual
    by converting your bullet points into Sm artArt.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将讨论另一种将你的项目符号转换为SmartArt的方法，以使你的内容更具视觉性。
- en: Converting bullet points into SmartArt
  id: totrans-68
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将项目符号转换为SmartArt
- en: I a m among the users who feel that the **SmartArt** featu re would benefit
    from an upgrade. After all, it was introduced when Microsoft replaced the menus
    with the ribbon in **Office 2007** , and it has not been worked on much since
    then. But I also feel anyone creating presentations should not have to work hard
    to produce their content, which is why using SmartArt can be a good starting point
    to reduce the number of bullet points you use.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我也是那些觉得**SmartArt**功能需要升级的用户之一。毕竟，它是在微软在**Office 2007**中将菜单替换为功能区时引入的，并且从那时起就没有得到太多改进。但我也觉得任何创建演示文稿的人都不应该需要付出太多努力来制作他们的内容，这就是为什么使用SmartArt可以是一个好的起点，以减少你使用的项目符号数量。
- en: Of course, if you are using the subscription model of PowerPoint with M365,
    you can leverage the **Designer** feature, as discussed in [*Chapter 6*](Chapter_06.xhtml#_idTextAnchor517)
    . But even so, there are times when design ideas might not fit with what you have
    in mind for your visuals.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果你使用的是带有M365的PowerPoint订阅模式，你可以利用如[*第6章*](Chapter_06.xhtml#_idTextAnchor517)中讨论的**设计师**功能。但即便如此，有时设计想法可能不符合你对视觉效果的预期。
- en: 'That is when using the **Convert to SmartArt Graphic** function might be helpful
    ( *Figur e 7.10* ):'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是使用**转换为SmartArt图形**功能可能有所帮助的时候（*图 7.10*）：
- en: '![Figure 7.10 – Using the Convert to SmartArt Graphic function](img/B32063_07_10.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.10 – 使用“转换为SmartArt图形”功能](img/B32063_07_10.png)'
- en: Figure 7.10 – Using the Convert to SmartArt Graphic function
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.10 – 使用“转换为SmartArt图形”功能
- en: When you are on a slide with bullet points, first select the content placeholder
    – a simple click on the dotted border of the placeholder will select it. Then,
    in the **Home** tab, in the **Paragraph** group, look for the **Convert to SmartArt
    Graphic** icon ( **1** ).
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你在包含项目符号的幻灯片上时，首先选择内容占位符 – 简单点击占位符的虚线边框即可选中它。然后，在**主页**选项卡中，在**段落**组中，查找**转换为SmartArt图形**图标（**1**）。
- en: You can then select from the shortlist in the dropdown, which offers a live
    preview of your converted bulleted list, or click on **More SmartArt Graphics…**
    ( **2** ) to browse a complete list you can choose from.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以从下拉列表中的简短列表中进行选择，该列表提供了你转换后的项目符号列表的实时预览，或者点击**更多SmartArt图形…**（**2**）来浏览你可以从中选择的完整列表。
- en: 'When choosing to browse a complete list of graphics, the **Choose a SmartArt
    Graphic** window opens ( *Figu re 7.11* ):'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当选择浏览完整的图形列表时，将打开**选择SmartArt图形**窗口（*图 7.11*）：
- en: '![Figure 7.11 – Choosing a SmartArt layout](img/B32063_07_11.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.11 – 选择SmartArt布局](img/B32063_07_11.png)'
- en: Figure 7.11 – Choosing a SmartArt layout
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.11 – 选择SmartArt布局
- en: You can browse a list of all the SmartArt layouts or browse by category. Don’t
    just think about how the visual will look, but also whether any of the layouts
    will make more sense to convey your message. In my example, I used a slide titled
    **Create more impactful presentations** and a bullet list that I felt should be
    seen as a process. So, I can decide to use any of the **Process** category ( **1**
    ) layouts to help make my list more visually appealing and click **OK** ( **2**
    ) to apply it to my content.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以浏览所有SmartArt布局的列表，或者按类别浏览。不要只考虑视觉将如何看起来，还要考虑任何布局是否会使你的信息传达得更合理。在我的例子中，我使用了一个标题为**创建更具影响力的演示文稿**的幻灯片和一个我认为应该被视为过程的子弹列表。因此，我可以决定使用**过程**类别（**1**）中的任何布局来帮助使我的列表更具视觉吸引力，并点击**确定**（**2**）将其应用到我的内容上。
- en: 'Once a SmartArt layout has been applied, you get two new tabs to customize
    how it looks ( *Fig ure 7.12* ):'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦应用了SmartArt布局，你将获得两个新的选项卡来自定义其外观（*图 7.12*）：
- en: '![Figure 7.12 – Tools from the SmartArt Design tab](img/B32063_07_12.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.12 – SmartArt设计选项卡中的工具](img/B32063_07_12.png)'
- en: Figure 7.12 – Tools from the SmartArt Design tab
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.12 – SmartArt设计选项卡中的工具
- en: In the **SmartArt Design** tab ( **1** ), you get access to many tools to help
    you create an overall look and include text in your shapes.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**SmartArt设计**选项卡（**1**）中，你可以访问许多工具来帮助你创建整体外观并在形状中包含文本。
- en: In the **Create Graphic** group ( **2** ), you will find tools to help you add
    or remove shapes in your layout or promote or demote them to create subcategories.
    The active tools will depend on the layout you have chosen. Even though you can
    make the **Text Pane** box visible using the button in that group, it can also
    be opened from the small arrow on the left of the SmartArt layout ( **3** ). The
    **Text Pane** box can be used to enter new text and create new shapes at the same
    time, or you can edit the text in shapes. If you are using a hierarchy SmartArt,
    you can also promote and demote elements, meaning you are increasing or decreasing
    the level of the selected bullet or shape by using *Tab* , or *Shift* + *Tab*
    on your keyboard.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**创建图形**组（**2**）中，您将找到帮助您在布局中添加或删除形状的工具，或者将它们提升或降低以创建子类别的工具。可用的工具将取决于您选择的布局。尽管您可以使用该组中的按钮使**文本窗格**框可见，但它也可以通过SmartArt布局左边的箭头（**3**）打开。**文本窗格**框可用于同时输入新文本和创建新形状，或者编辑形状中的文本。如果您使用的是层次结构SmartArt，您还可以提升和降低元素，这意味着您可以通过键盘上的*Tab*键或*Shift*
    + *Tab*键来增加或减少所选项目符号或形状的级别。
- en: The **Layouts** group ( **4** ) gives access to a gallery of layouts that have
    a live preview when hovering over any of them and gives you access to a whole
    list of layouts if you want to change it.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**布局**组（**4**）提供了访问布局画廊的权限，当您悬停在任何一个布局上时，都会提供实时预览，如果您想更改它，还可以访问整个布局列表。'
- en: Use the functions in the **SmartArt Styles** group ( **5** ) if you want to
    change the color scheme or the effects applied to the shapes in your SmartArt.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您想更改SmartArt中形状的颜色方案或应用的效果，请使用**SmartArt样式**组（**5**）中的功能。
- en: In the **Reset** group ( **6** ), you can easily bring back your layout to its
    original look when you are not satisfied with all the changes you made. Just click
    on the **Reset Graphic** button. As for the **Convert** button, it allows you
    to go back to your bullet list or convert the SmartArt into separate shapes. An
    example of SmartArt-to-shape conversion will be shown later in this section.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**重置**组（**6**）中，如果您对所做的所有更改不满意，可以轻松地将布局恢复到其原始外观。只需单击**重置图形**按钮即可。至于**转换**按钮，它允许您返回到您的项目符号列表或将SmartArt转换为单独的形状。本节稍后将展示SmartArt到形状转换的示例。
- en: 'On the SmartArt **Format** tab, you will see many of the formatting tools that
    can also be found in the **Home** and **Shape Format** tabs ( *Fi gure 7.13* ):'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在SmartArt**格式**选项卡上，您将看到许多也可以在**开始**和**形状格式**选项卡中找到的格式化工具（*图7.13*）：
- en: '![Figure 7.13 – Tools from the SmartArt Format tab](img/B32063_07_13.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图7.13 – SmartArt格式选项卡中的工具](img/B32063_07_13.png)'
- en: Figure 7.13 – Tools from the SmartArt Format tab
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.13 – SmartArt格式选项卡中的工具
- en: The **Shapes** group ( **1** ) has some interesting tools when you want to customize
    your SmartArt even more. This is where you can change the shape of part of your
    layout ( **2** ) by choosing a new shape in the **Change Shape** gallery or decide
    to change the size of one or more shapes in your layout by using the **Larger**
    or **Smaller** tools.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**形状**组（**1**）在您想要进一步自定义SmartArt时有一些有趣的工具。这就是您可以通过在**更改形状**画廊中选择新形状或决定通过使用**更大**或**更小**工具来更改布局中一个或多个形状的大小来更改布局中部分形状的形状（**2**）的地方。'
- en: As you can see, SmartArt can be a nice way to help you reduce your design time
    while making your content more visual. Yes, there is still text, but having a
    visual layout instead of bullet points can help your audience grasp a concept
    or remember your content even more. I also refer you to Nolan Haims’ *The Better
    Deck Deck* in the *Further reading* section so that you can get more inspiration
    on how to make your bullet points more visual and maybe use a SmartArt graphic
    as a starting point afterward.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，SmartArt可以是一种帮助您减少设计时间同时使内容更视觉化的好方法。是的，仍然有文本，但使用视觉布局而不是项目符号可以帮助您的观众更好地理解概念或记住您的内容。我还推荐您阅读*进一步阅读*部分中的Nolan
    Haims的*更好的牌堆*，以便您获得更多关于如何使您的项目符号更视觉化的灵感，也许之后可以将SmartArt图形作为起点。
- en: 'You can also use SmartArt graphics as a starting point for some of your content.
    Instead of creating a layout from scratch because you don’t see a layout that
    fits your needs, I’ll show you how to leverage the **Convert to Shapes** tool.
    The following example is from a slide I created for a conference where I wanted
    to display the various challenges encountered with presentations in a structured
    layout of shapes ( *Figure 7.14* ):'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以将 SmartArt 图形作为你某些内容的起点。而不是因为看不到适合你需求的布局而从零开始创建布局，我将向你展示如何利用“**转换为形状**”工具。以下示例来自我为一个会议创建的幻灯片，我想以形状的结构化布局显示在演示中遇到的挑战（*图
    7.14*）：
- en: "![Figure 7.14 – Layout of structured hexag\uFEFFons](img/B32063_07_14.png)"
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.14 – 结构化六边形的布局](img/B32063_07_14.png)'
- en: Figure 7.14 – Layout of structured hexag ons
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.14 – 结构化六边形的布局
- en: 'There is a SmartArt layout with hexagons, but it only allows you to add shapes
    vertically. But I used it anyway as a starting point to save some time. Here are
    the steps to recreate the layout used in my previous example, but do keep in mind
    that you can use any of the SmartArt layouts to do the same and save a lot of
    design time:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个带有六边形的 SmartArt 布局，但它只允许你垂直添加形状。但无论如何，我还是用它作为起点来节省一些时间。以下是我之前示例中使用的布局的步骤，但请记住，你可以使用任何
    SmartArt 布局来完成相同的事情并节省大量设计时间：
- en: 'Add the **Alternating Hexagons** SmartArt ( **1** ) and use the **Convert to
    Shapes** tool ( **3** ) in the **SmartArt Design** tab ( **2** ) ( *Figure 7.15*
    ):'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在“SmartArt 设计”选项卡（**2**）中使用“**交替六边形**”SmartArt（**1**）和“**转换为形状**”工具（**3**）（*图
    7.15*）：
- en: "![Figure 7.15 – Using the SmartArt Convert to Shapes t\uFEFFool](img/B32063_07_15.png)"
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.15 – 使用“SmartArt 转换为形状”工具](img/B32063_07_15.png)'
- en: Figure 7.15 – Using the SmartArt Convert to Shapes t ool
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.15 – 使用“SmartArt 转换为形状”工具
- en: 'After the conversion, we are left with one rectangle on the slide, and it needs
    to be ungrouped to see all the separate shapes. To do so, go to the **Shape Format**
    tab ( **1** ) and click on **Group** | **Ungroup** ( **2** ). You will now have
    all the separate shapes on the slide ( **3** ). For my needs, I deleted the empty
    rectangles before moving on ( *Figure 7.16* ):'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转换后，我们在幻灯片上留下一个矩形，需要解散它才能看到所有单独的形状。要做到这一点，转到“**形状格式**”选项卡（**1**），然后点击“**分组**”|“**取消组合**”（**2**）。现在你将在幻灯片上拥有所有单独的形状（**3**）。对于我的需求，我在继续之前删除了空白的矩形（*图
    7.16*）：
- en: '![Figure 7.16 – Ungrouping shapes](img/B32063_07_16.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.16 – 解散形状](img/B32063_07_16.png)'
- en: Figure 7.16 – Ungrouping shapes
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.16 – 解散形状
- en: 'You can delete the rectangles, then select all the remaining shapes so you
    can duplicate them ( *Figure 7.17* ):'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以删除矩形，然后选择所有剩余的形状以便你可以复制它们（*图 7.17*）：
- en: '![Figure 7.17 – Duplicating and aligning a group of shapes with keyboard keys
    and a mouse](img/B32063_07_17.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.17 – 使用键盘键和鼠标复制并对齐一组形状](img/B32063_07_17.png)'
- en: Figure 7.17 – Duplicating and aligning a group of shapes with keyboard keys
    and a mouse
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.17 – 使用键盘键和鼠标复制并对齐一组形状
- en: Use the *Ctrl* + *Shift* keys while using the left mouse button and dragging
    the shapes to the right ( **1** ). The *Ctrl* key is used to duplicate, while
    the *Shift* key will help constrain the horizontal movement to a straight line
    while dragging the shapes. When you start seeing finely dotted lines ( **2** ),
    called **Smart Guides** , you will know where to stop when the guides show the
    same space between the two groups of shapes.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在使用左鼠标按钮拖动形状的同时按住 *Ctrl* + *Shift* 键（**1**）。*Ctrl* 键用于复制，而 *Shift* 键将帮助在拖动形状时将水平移动约束为直线。当你开始看到细点线（**2**），称为**智能向导**时，你就会知道在哪里停止，当向导显示两组形状之间相同的空间时。
- en: You probably realize that I was able to save a lot of time because I did not
    have to create every hexagon and align them manually. So, even though I mentioned
    SmartArt could use a little modernization, as you can see, the layouts can still
    be useful as a starting point to create various visual elements.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能意识到，因为我无需手动创建每个六边形并对齐它们，所以我节省了很多时间。所以，尽管我提到 SmartArt 需要一点现代化，但正如你所见，布局仍然可以作为创建各种视觉元素的起点。
- en: Drawing shapes in PowerPoint has also been a way to make your content more visual
    for decades. But what if the default shapes are not helpful? There is a way to
    modify default shapes with the **Edit Points** tool, the topic of our next section.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在 PowerPoint 中绘制形状已经是一种使你的内容更具视觉性的方法几十年了。但如果默认的形状没有帮助怎么办？有一种方法可以使用“**编辑点**”工具修改默认形状，这是我们下一节的主题。
- en: Creating new shapes with Edit Points
  id: totrans-109
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用“编辑点”创建新形状
- en: 'There are many default shapes available in PowerPoint, but that does not mean
    t hey will always fit your needs. This is when the **E dit Points** tool can come
    to your rescue! Even though it has been available for over 20 years, many users
    are still unaware it exists. There are two ways of accessing **Edit Points** :'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint 中有许多默认的形状可供选择，但这并不意味着它们总是能满足您的需求。这时，**编辑点**工具就可以帮您解决问题！尽管它已经可用超过
    20 年，但许多用户仍然不知道它的存在。访问**编辑点**有两种方法：
- en: 'The first way to access **Edit Points** is to select a shape ( **1** ), click
    on the **Shape Format** tab, and go to **Edit Shape** | **Edit Poi nts** ( *Figure
    7.18* ):'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问**编辑点**的第一种方法是选择一个形状（**1**），点击**形状格式**选项卡，然后转到**编辑形状** | **编辑点**（*图 7.18*）：
- en: "![Figure 7.18 – Accessing Edit Points through the Shape For\uFEFFmat tab](img/B32063_07_18.png)"
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.18 – 通过形状格式选项卡访问编辑点](img/B32063_07_18.png)'
- en: Figure 7.18 – Accessing Edit Points through the Shape For mat tab
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.18 – 通过形状格式选项卡访问编辑点
- en: 'The second way is by r ight-clicking on a shape and clicking on **Edit Poin
    ts** ( *Figure 7.19* ):'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二种方法是右键单击形状并点击**编辑点**（*图 7.19*）：
- en: '![Figure 7.19 – Accessing Edit Points with a right-click on the shape](img/B32063_07_19.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.19 – 通过右键单击形状访问编辑点](img/B32063_07_19.png)'
- en: Figure 7.19 – Accessing Edit Points with a right-click on the shape
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.19 – 通过右键单击形状访问编辑点
- en: 'Whichever method you choose, your shape will now show black dots where two
    line segments meet or where a curve ends, depending on the shape you have on your
    slide. Eac h of these dots is a **vertex** , and they can be dragged to change
    their position. The white squares are handles to help you add or change the curve
    of a segment. In the example I created for *Figure 7.20* , I used a rectangle,
    moved the vertex in the upper-right corner, and ad ded a curve to it:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您选择哪种方法，您的形状现在将在两个线段相交或曲线结束的地方显示黑色圆点，具体取决于您幻灯片上的形状。每个这样的圆点都是一个**顶点**，您可以拖动它们来改变它们的位置。白色方块是帮助您添加或更改段曲线的把手。在我为*图
    7.20*创建的示例中，我使用了一个矩形，将右上角的顶点移动，并给它添加了一个曲线：
- en: "![Figure 7.20 – Reshaping a rectangle with Edit Po\uFEFFints](img/B32063_07_20.png)"
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.20 – 使用编辑点重塑矩形](img/B32063_07_20.png)'
- en: Figure 7.20 – Reshaping a rectangle with Edit Po ints
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.20 – 使用编辑点重塑矩形
- en: 'Repositioning vertexes an d curving segments are not the only modifications
    you can make using **Edit Points** . If you right-click on a segment while in
    the **Edit Points** mode, you have access to a contextual menu that allows you
    to make more changes to your shape, such as adding a point or deleting a segment.
    Your mouse cursor’s shape will change to a plus ( **+** ) sign with a rectangle,
    as seen in the oversized example ( **1** ) in *Figure 7.21* :'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**编辑点**进行顶点重定位和曲线段弯曲只是您可以进行的修改之一。如果您在**编辑点**模式下右键单击一个段，您将可以访问一个上下文菜单，允许您对形状进行更多修改，例如添加一个点或删除一个段。您的鼠标光标形状将变为带有矩形的加号（**+**）符号，正如在*图
    7.21*中看到的超大规模示例（**1**）：
- en: '![Figure 7.21 – Right-clicking the menu after clicking on a segment](img/B32063_07_21.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.21 – 在点击段后右键单击菜单](img/B32063_07_21.png)'
- en: Figure 7.21 – Right-clicking the menu after clicking on a segment
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.21 – 在点击段后右键单击菜单
- en: Actions in the menu may be grayed out depending on the segment you clicked on,
    and if you right-click on a vertex point, you will get a list of actions specific
    to points. If you are a keyboard shortcut fan, I suggest that you have a look
    at the Microsoft article listed in the *Further reading* section. If you don’t
    know about the **Freeform** shape tool, the article will also help you learn more
    about it.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 菜单中的操作可能会根据您点击的段落而变为灰色，如果您在顶点点上右键单击，您将获得针对点特定的操作列表。如果您是键盘快捷键爱好者，我建议您查看“进一步阅读”部分中列出的微软文章。如果您不了解**自由形状**工具，这篇文章也会帮助您了解更多相关信息。
- en: I could continue adding static images to try and convey everything you can do
    with **Edit Points** , but the best way to learn more is by experimenting by yourself.
    If yo u have been following along with PowerPoint open, I suggest that you take
    a moment to try the basic actions I just showed you. It might give you a few ideas
    for your future presentations.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以继续添加静态图像来尝试传达您可以使用**编辑点**做的一切，但最好的学习方法是亲自实验。如果您一直开着 PowerPoint，我建议您花点时间尝试我刚刚向您展示的基本操作。这可能会给您未来的演示文稿带来一些灵感。
- en: '**Edit Points** is not the only way to create new shapes in PowerPoint, and
    this is the topic of the following sections, wi th the merging tools.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**编辑点**不是在PowerPoint中创建新形状的唯一方法，这是下一节的主题，即合并工具。'
- en: Creating new shapes with the merging tools
  id: totrans-126
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用合并工具创建新形状
- en: If you have read the book chronologically, you might now be at a point where
    you have many creative ideas to make your presentations more visually appealing.
    At the same time, you might also be feeling stuck with the same old standard shapes
    list within PowerPoint, thinking you will have to reach out to a graphic designer
    to create what you have in mind.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您是按时间顺序阅读这本书的，您现在可能已经到了一个有很多创意想法来使您的演示文稿更具视觉吸引力的地方。同时，您可能也会觉得在PowerPoint中相同的旧标准形状列表中感到困惑，认为您将不得不联系一位图形设计师来创建您心中的内容。
- en: Wait until you have read this section before reaching out for help! The **Merge
    Shapes** tool might be just what you need. I will show you how to use the tool
    with three specific examples that might be helpful for any business presentation.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在寻求帮助之前，请先阅读本节！**合并形状**工具可能正是您所需要的。我将通过三个可能对任何商业演示文稿都有帮助的特定示例向您展示如何使用此工具。
- en: 'But first, let’s explore where you will find the **Merge Shapes** tool and
    which options are available to create new shapes. As the name implies, you need
    to select at least two shapes on your slide to activate the tool ( *Figure 7.22*
    ):'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，让我们探索您可以在哪里找到**合并形状**工具以及创建新形状时有哪些选项可用。正如其名所示，您需要在您的幻灯片上选择至少两个形状来激活此工具（*图7.22*）：
- en: "![Figure 7.22 – Activating and finding the Merge\uFEFF Shapes tool](img/B32063_07_22.png)"
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图7.22 – 激活并找到合并形状工具](img/B32063_07_22.png)'
- en: Figure 7.22 – Activating and finding the Merge Shapes tool
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.22 – 激活并找到合并形状工具
- en: 'Select the shapes on your slide ( **1** ), then click on the **Shape Format**
    tab ( **2** ) to find the **Merge Shapes** tool ( **3** ). When you open the drop-down
    list, you will find the following options:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 选择您的幻灯片上的形状（**1**），然后点击**形状格式**选项卡（**2**）以找到**合并形状**工具（**3**）。当您打开下拉列表时，您将找到以下选项：
- en: '**Union** ( **4** )'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**联合**（**4**）'
- en: '**Combine** ( **5** )'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**组合**（**5**）'
- en: '**Fragment** ( **6** )'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**碎片**（**6**）'
- en: '**Intersect** ( **7** )'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相交**（**7**）'
- en: '**Subtract** ( **8** )'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减去**（**8**）'
- en: The results you get always depend on the order in which you select your shapes.
    The **Union** shape ( **4** ) in *Figure 7.22* is the result of selecting the
    lighter ellipse first, then the rectangle. For the **Subtract** option ( **8**
    ), shape **A** is the result of selecting the rectangle first, then the ellipse,
    and **B** from selecting the ellipse first, then the rectangle. When you hover
    over the list of options, you get a live preview of the result. If you realize
    the results are not what you expected, whether in terms of shape or final color,
    you can deselect the shapes and start selecting them in a different sequence.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 您得到的结果始终取决于您选择形状的顺序。*图7.22*中的**联合**形状（**4**）是先选择较浅的椭圆，然后选择矩形的组合结果。对于**减去**选项（**8**），形状**A**是先选择矩形，然后选择椭圆的结果，而**B**是先选择椭圆，然后选择矩形的组合结果。当您悬停在选项列表上时，您将获得结果的实时预览。如果您发现结果不是您预期的，无论是形状还是最终颜色，您可以取消选择形状，并按不同的顺序重新选择它们。
- en: '**Merge Shapes selection trick**'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '**合并形状选择技巧**'
- en: Predicting the results you will get when using the **Merge Shapes** tool can
    be mind-boggling. But I will share with you what I think is the best analogy I
    have heard to help you understand the concept, from my friend Mike Parkinson at
    *Billion Dollar Graphics* . You need to think of your shapes as using dough and
    a cookie cutter. Decide which shape will be the dough—the first shape you will
    select—and which shape(s) will be the cookie cutter(s). Doing so will help you
    picture in your mind what will be removed or cut out.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 预测使用**合并形状**工具将得到的结果可能会让人困惑。但我会与您分享我认为听到的最好的类比，以帮助您理解这个概念，这是我从朋友迈克·帕克森在*亿级图形*那里听到的。您需要将您的形状想象成使用面团和饼干模具。决定哪个形状将是面团——您将首先选择的形状——以及哪个形状（们）将是饼干模具。这样做将帮助您在脑海中想象出将被移除或切割的部分。
- en: Now that you know how to activate the tool, where to find it, and which options
    are available, let’s move on to exampl es of uses in presentations.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经知道了如何激活工具，在哪里找到它，以及有哪些选项可用，让我们继续探讨在演示文稿中使用示例。
- en: Breaking apa rt a Venn diagram
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分割维恩图
- en: Showing an intersecting relationship between various components has often been
    done by using a **Venn diagram** . The quickest way to create one that is perfectly
    aligned is using the **Venn diagram** layout in **SmartArt** . But what if you
    need to put emphasis on one or more intersecting parts, or even use a subtle animation
    to make intersections stand out in a specific sequence? We can try to draw the
    separate intersections by hand, but that is not the most efficient way to do it.
    Instead, use the **Convert to Shapes** and **Ungroup** tools on the **Venn diagram**
    SmartArt layout.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 显示各种组件之间的相交关系通常是通过使用 **维恩图** 来实现的。创建一个完美对齐的维恩图的最快方法是使用 **SmartArt** 中的 **维恩图**
    布局。但是，如果你需要强调一个或多个相交部分，或者甚至使用微妙的动画来使相交部分在特定顺序中突出显示呢？我们可以尝试手动绘制单独的相交部分，但这并不是最有效的方法。相反，使用
    **Venn 图** SmartArt 布局上的 **转换为形状** 和 **取消组合** 工具。
- en: If you have not read this chapter from the start, you can go back to *Figure
    7.15* to review how to convert and ungroup a SmartArt layout.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有从头开始阅读这一章，你可以回到 *图 7.15* 来回顾如何转换和取消组合 SmartArt 布局。
- en: 'In *Figure 7.23* , you can see the ungrouped Venn diagram ( **1** ) on the
    left:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *图 7.23* 中，你可以看到左侧的取消组合的维恩图（ **1** ）：
- en: '![Figure 7.23 – Converting, ungrouping, and segmenting a SmartArt layout](img/B32063_07_23.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.23 – 转换、取消组合和分割 SmartArt 布局](img/B32063_07_23.png)'
- en: Figure 7.23 – Converting, ungrouping, and segmenting a SmartArt layout
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.23 – 转换、取消组合和分割 SmartArt 布局
- en: On the right ( **2** ), you can see the resulting shapes after applying the
    **Fragment** option of the **Merge Shapes** tool. *I did increase the spacing
    between the shapes to help you see that they are all standalone pieces.* You can
    apply various colors to the shapes to help you focus on specific data. You have
    a much more flexible visual than simply using the original SmartArt layout without
    having to spend a lot of time creating it. You can use any SmartArt that has overlapping
    shapes to accomplish som ething similar.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在右侧（ **2** ），你可以看到应用了 **合并形状** 工具的 **片段** 选项后的结果形状。*我确实增加了形状之间的间距，以便你能够看到它们都是独立的部件。*
    你可以为形状应用各种颜色，以帮助你关注特定的数据。你拥有比简单地使用原始 SmartArt 布局更灵活的视觉效果，而无需花费大量时间来创建它。你可以使用任何具有重叠形状的
    SmartArt 来完成类似的事情。
- en: Now, let’s have a look at how you can create special text effects by using the
    **Merge Shapes** tool.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看如何使用 **合并形状** 工具创建特殊的文字效果。
- en: Creatin g special text
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建特殊文字
- en: If you have ever tried to create special movement effects with letters without
    knowing about the **Merge Shapes** tool, I’m quite sure that you had to spend
    a lot of time creating separate textboxes and maybe feel stuck because some shape
    effects did not show on your letters.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经尝试过在不了解 **合并形状** 工具的情况下创建带有特殊运动效果的字母，我相当确信你不得不花费大量时间创建单独的文本框，也许还会因为某些形状效果没有显示在你的字母上而感到困惑。
- en: 'Again, let’s put the **Merge Shapes** tool to work so that you don’t have to
    spend so much time creating beautiful effects. You can follow the steps shown
    in *Figure 7.24* :'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，让我们使用 **合并形状** 工具，这样你就不必花费太多时间来创建美观的效果。你可以按照 *图 7.24* 中显示的步骤进行：
- en: "![Figure 7.24 – Using Merge Shapes to cre\uFEFFate letter shapes](img/B32063_07_24.png)"
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.24 – 使用合并形状创建字母形状](img/B32063_07_24.png)'
- en: Figure 7.24 – Using Merge Shapes to cre ate letter shapes
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.24 – 使用合并形状创建字母形状
- en: Insert a shape into your slide and fill it with the color you want for your
    text, or any other color will do ( **1** ). Then, add a textbox and format the
    font, size, and color of the text ( **2** ).
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的幻灯片中插入一个形状，并用你想要的文字颜色填充，或者任何其他颜色都可以（ **1** ）。然后，添加一个文本框并格式化文字的字体、大小和颜色（ **2**
    ）。
- en: Select both shapes and go to the **Shape Format** tab ( **3** ), click on **Merge
    Shapes** ( **4** ), and select **Fragment** ( **5** ).
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择两个形状，然后转到 **形状格式** 选项卡（ **3** ），点击 **合并形状**（ **4** ），然后选择 **片段**（ **5** ）。
- en: If you select your shape first and your textbox second, you will have segments
    of the color of the shape ( **6** ).
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你首先选择形状，然后选择文本框，你将拥有形状颜色的段落（ **6** ）。
- en: If you select your textbox first and the shape second, you will have segments
    of the color of the font in your original textbox ( **7** ).
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你首先选择文本框，然后选择形状，你将拥有原始文本框中字体颜色的段落（ **7** ）。
- en: In both cases, you only need to move the letter shapes away and use the shape
    formatting tools to create the desired effect. If you are not familiar with the
    shape formatting tools, you can find them in the **Shape Format** tab by clicking
    on the **Shape Effects** button on the ribbon.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，你只需要将字母形状移开，并使用形状格式化工具来创建所需的效果。如果你不熟悉形状格式化工具，你可以通过在功能区上点击**形状效果**按钮在**形状格式**选项卡中找到它们。
- en: 'In *Figure 7.25* , you can see I applied a **Bevel** effect on the lighter
    text ( **1** ) and a **Reflec tion** effect on the darker text ( **2** ):'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图7.25*中，你可以看到我应用了**斜面**效果在较浅的文字（**1**）上，以及**反射**效果在较深的文字（**2**）上：
- en: '![Figure 7.25 – Applying shape effects to letter segments](img/B32063_07_25.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![图7.25 – 应用形状效果到字母片段](img/B32063_07_25.png)'
- en: Figure 7.25 – Applying shape effects to letter segments
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.25 – 应用形状效果到字母片段
- en: To help you understand the advantage of using this method, I also added separate
    textboxes that have the same letters, with the same font type and size ( **3**
    ). They have a reflection effect applied to them, but it does not show. You could
    create a few effects if you had used shapes to type in the separate letters, instead
    of textboxes, but it would still be less efficient than using the merging tools.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你理解使用这种方法的优势，我还添加了具有相同字母、相同字体类型和大小（**3**）的单独文本框。它们应用了反射效果，但并不明显。如果你使用形状而不是文本框来输入单独的字母，你可以创建一些效果，但这仍然不如使用合并工具高效。
- en: 'Here is an example of how you can get creative using the same pr ocess with
    an image ( *Figure 7.26* ):'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个如何使用相同的过程通过图像来创造性的例子（*图7.26*）：
- en: '![Figure 7.26 – Using the Fragment option to create text effects on images](img/B32063_07_26.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![图7.26 – 使用片段选项在图像上创建文本效果](img/B32063_07_26.png)'
- en: Figure 7.26 – Using the Fragment option to create text effects on images
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.26 – 使用片段选项在图像上创建文本效果
- en: Add a full-slide image and a textbox with your text over it – use big fonts
    to get better results. Make sure you have a second copy of the image that will
    be used in the last step.
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加一张全屏图像和覆盖其上的文本框 – 使用大字体以获得更好的效果。确保你有第二张将在最后一步使用的图像副本。
- en: Select the image first, then the textbox, and go to the **Shape Format** tab
    to use **Merge Shapes** | **Fragment** to create separate letters.
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先选择图像，然后选择文本框，转到**形状格式**选项卡，使用**合并形状** | **片段**来创建单独的字母。
- en: Delete the image with the cutout letters, add the original image, and send it
    to the background. Increase the size of the letters as needed and apply an image
    effect, such as a bevel, and voilà! You now have a beautiful slide effect that
    took only a few minutes to create.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除带有剪贴字母的图像，添加原始图像，并将其发送到背景。根据需要调整字母的大小，并应用图像效果，例如斜面，然后 voilà！你现在有一个只花了几分钟就创建的美丽幻灯片效果。
- en: I gave you examples of some specific effects with the **Fragment** option of
    the **Merge Shapes** tool so that you can easily use them in the future. But don’t
    forget that you can create many creative shapes with the other options too. The
    best way to get more familiar with the tools is to try them.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我给出了使用**合并形状**工具的**片段**选项的一些具体效果的例子，这样你就可以轻松地在将来使用它们。但不要忘记，你也可以使用其他选项创建许多创意形状。熟悉工具的最好方法是尝试它们。
- en: In the last section of this chapter, we will discuss how we can use PowerPoint’s
    Stock Images option as a starting point and how we can customi ze images and graphics
    to our needs.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的最后部分，我们将讨论如何将PowerPoint的股票图像选项作为起点，以及如何根据我们的需求自定义图像和图形。
- en: Using and customizing stock i mages and other graphics
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用和自定义股票图像和其他图形
- en: If you have been using PowerPoint for a long time, you might remember the Clipart
    gallery, a collection of graphic element s supplied by Microsoft in the Office
    suite for many years. As design expectations evolved, it be came out of date and
    most of the time was not considered profess ional in a business setting.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你长时间使用PowerPoint，你可能还记得剪贴画库，这是微软多年来在Office套件中提供的图形元素集合。随着设计预期的演变，它变得过时了，在大多数情况下在商业环境中不被认为是专业的。
- en: With the introduction of the M365 subscription model, Microsoft has brought
    back a whole new set of **stock images** , and I must say they look very good.
    It also adds new elements to it on a regular basis. If you have an Office 2021/2024
    version, you will have access to stock images, although you will not get the full
    selection, as this license does not get feature updates. If you are a user of
    PowerPoint for the web, which connects to the site with a Microsoft account, but
    no M365 license, you will get a subset of stock images that do not include elements
    considered Premium content.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 随着 M365 订阅模式的引入，Microsoft 恢复了一整套全新的**库存图片**，我必须说它们看起来非常好。它还定期添加新的元素。如果你有 Office
    2021/2024 版本，你将能够访问库存图片，尽管你不会得到完整的选项，因为此许可证不会获得功能更新。如果你是 PowerPoint for the web
    的用户，它通过 Microsoft 账户连接到网站，但没有 M365 许可证，你将获得一个不包含被认为是高级内容的元素的库存图片子集。
- en: 'You might be wondering how you are allowed to use stock images and graphics.
    Here is the good news: as long as you have an Office 2021/2024 or M365 license
    and you use them within a Word document, an Excel workbook, a SharePoint site,
    or a PowerPoint presentation, whether delivered as a slideshow or exported as
    a `.pdf` file, you can use the **Stock Images** content, even f or commercial
    use. The two things you are not allowed to do are the following:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道你如何被允许使用库存图片和图形。好消息是：只要你有 Office 2021/2024 或 M365 许可证，并且你将它们用于 Word 文档、Excel
    工作簿、SharePoint 网站或 PowerPoint 演示文稿中，无论是以幻灯片形式交付还是导出为 `.pdf` 文件，你就可以使用**库存图片**内容，甚至可以用于商业用途。你不被允许做的两件事如下：
- en: Copy and paste material into non-Microsoft applications (for example, websites)
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将材料复制并粘贴到非 Microsoft 应用程序中（例如，网站）
- en: Save the creative material as an image or video file to be used elsewhere
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将创意材料保存为图像或视频文件以在其他地方使用
- en: If you want to see the Microsoft article on the topic, have a look at the link
    provided in the *Further reading* section.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想查看有关此主题的 Microsoft 文章，请查看“进一步阅读”部分提供的链接。
- en: 'To access **Stock Images** , you need to go to the **Insert** tab ( **1** ),
    then click on **Pictures** ( **2** ) and choose **Stock Images…** ( **3** ), or
    you can click on the **Pictures** icon ( **4** ) in a content placeholder to choose
    **Stoc k Images** from the list ( *Figure 7.27* ):'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问**库存图片**，你需要转到**插入**选项卡（**1**），然后单击**图片**（**2**）并选择**库存图片…**（**3**），或者你可以单击内容占位符中的**图片**图标（**4**）从列表中选择**库存图片**（*图
    7.27*）：
- en: '![Figure 7.27 – Inserting stock images](img/B32063_07_27.png)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.27 – 插入库存图片](img/B32063_07_27.png)'
- en: Figure 7.27 – Inserting stock images
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.27 – 插入库存图片
- en: 'You then get a new window that has seven categories of content to choose from.
    For each category, the creative content is sorted into various cat egories, and
    they are also searchable by keywords . Take note that the keywords need to be
    added in the language of your application. Let’s have a look at a sa mple of each
    category ( *Figure 7.28* ):'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 你将打开一个新窗口，其中包含七个内容类别可供选择。对于每个类别，创意内容都被分类到各种类别中，并且可以通过关键词进行搜索。请注意，关键词需要添加到你的应用程序语言中。让我们看看每个类别的示例（*图
    7.28*）：
- en: '![Figure 7.28 – Seven categories of creative content in Stock Images](img/B32063_07_28.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.28 – 库存图片中的七种创意内容类别](img/B32063_07_28.png)'
- en: Figure 7.28 – Seven categories of creative content in Stock Images
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.28 – 库存图片中的七种创意内容类别
- en: '**Images** : These are high-quality photos.'
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**图片**：这些是高质量的图片。'
- en: '**Icons** : These are modern-looking icons that are easily resized and recolored.'
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**图标**：这些是看起来现代的图标，易于调整大小和重新着色。'
- en: '**Cutout People** : These are photos of people without backgrounds.'
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**剪影人物**：这些是没有背景的人物照片。'
- en: '**Stickers** : These are cartoon-like graphics, like the ones on social media.'
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**贴纸**：这些是类似社交媒体上的卡通图形。'
- en: '**Videos** : These are short video clips with varying levels of movement.'
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**视频**：这些是不同运动水平的短视频。'
- en: '**Illustrations** : These are vector graphics that can easily be resized and
    recolored.'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**插图**：这些是易于调整大小和重新着色的矢量图形。'
- en: '**Cartoon People** : These are cartoon representations of people with various
    parts.'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**卡通人物**：这些是具有各种部分的卡通人物形象。'
- en: Inserting creative content from **Sto ck Images** is easy, but your job is to
    make sure that the elements you include are aligned with your message and the
    overall look you want to give to your presentation. If you have a Copilot license,
    you might also want to try asking it to create new images.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 从**Stock Images**插入创意内容很容易，但您的任务是确保您包含的元素与您的信息以及您想要在演示文稿中呈现的整体外观相一致。如果您拥有Copilot许可证，您还可能想尝试要求它创建新的图片。
- en: Leveraging Copilot to add new images
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 利用Copilot添加新图片
- en: Even though we discussed Copilot in [*Chapter 5*](Chapter_05.xhtml#_idTextAnchor491)
    , it is useful to add here how you can leverage Copilot to create new images in
    your presentation.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们在[*第5章*](Chapter_05.xhtml#_idTextAnchor491)中讨论了Copilot，但在这里添加如何利用Copilot在您的演示文稿中创建新图片的方法是有用的。
- en: 'Starting with Copilot chat, add a prompt asking to create an image. Give details
    on context, settings and style. In my example I used: `Create an image of a computer
    on a desk in a business setting` ( **1** ) ( *Figure 7.29* ):'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 从Copilot聊天开始，添加一个创建图片的提示。提供关于上下文、设置和风格的具体细节。在我的例子中，我使用了：`创建一个商务环境中桌子上电脑的图片`（**1**）（*图7.29*）：
- en: '![Figure 7.29 - Creating an image with Copilot](img/B32063_07_29.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![图7.29 - 使用Copilot创建图片](img/B32063_07_29.png)'
- en: Figure 7.29 - Creating an image with Copilot
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.29 - 使用Copilot创建图片
- en: When the image is generated, you can click on the **+** sign ( **2** ) to insert
    it in your slide or the Copy icon ( **3** ).
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 当图片生成后，您可以通过点击**+**符号（**2**）将其插入到您的幻灯片中，或者点击复制图标（**3**）。
- en: 'Keep prompting to adjust the image to your needs by adding your requests in
    the chat box ( **1** ) ( *Figure 7.30* ):'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在聊天框中添加您的请求，持续提示以调整图片以满足您的需求（**1**）（*图7.30*）：
- en: '![Figure 7.30 – Using custom or suggested prompts to refine an image](img/B32063_07_30.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![图7.30 – 使用自定义或建议的提示来细化图片](img/B32063_07_30.png)'
- en: Figure 7.30 – Using custom or suggested prompts to refine an image
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.30 – 使用自定义或建议的提示来细化图片
- en: You can also use the suggested prompts to ask Copilot to adjust the image (
    **2** ).
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以使用建议的提示来要求Copilot调整图片（**2**）。
- en: The image added to the slide is treated the same as any Stock Images creative
    content, so this means you can customize or adapt it. Let’s start with the picture
    format ting tools you can use within PowerP oint.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 添加到幻灯片中的图片被处理得与任何Stock Images创意内容相同，这意味着您可以自定义或调整它。让我们从PowerPoint中可用的图片格式工具开始。
- en: Using Picture Format tools
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用图片格式工具
- en: 'When you insert a picture from **Stock Images** , you have access to many tools
    that can help you adapt it to your presentation needs. Let’s start with a quick
    overview of all the tools befor e I give you a few examples ( *Figure 7.31* ):'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 当您从**Stock Images**插入图片时，您将能够访问许多可以帮助您将其适应演示文稿需求的工具。在我给出一些示例之前，让我们先快速概述所有这些工具（*图7.31*）：
- en: "![Figure 7.31 – Ove\uFEFFrview of the Picture Format tools](img/B32063_07_31.png)"
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![图7.31 – 图片格式工具概览](img/B32063_07_31.png)'
- en: Figure 7.31 – Ove rview of the Picture Format tools
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.31 – 图片格式工具概览
- en: When you have a picture selected, you will see the **Picture Format** tab (
    **1** ).
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您选择了一张图片时，您将看到**图片格式**选项卡（**1**）。
- en: In the **Adjust** group of functions ( **2** ), you will find tools that will
    help you change the visual aspect of the picture. We will see some of them in
    upcoming examples.
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**调整**功能组（**2**）中，您将找到帮助您更改图片视觉外观的工具。我们将在接下来的示例中看到其中的一些。
- en: In the **Picture Styles** group ( **3** ), you have access to a library of predefined
    styles, and you can customize the border and apply various effects to your image.
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**图片样式**功能组（**3**）中，您可以访问一个预定义样式的库，并且可以自定义边框并应用各种效果到您的图片上。
- en: The **Accessibility** group ( **4** ) gives you access to a button allowing
    you to quickly add alt text to your images. This is a feature you should use in
    all your presentations to make sure your content is accessible to people using
    screen readers.
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可访问性**功能组（**4**）为您提供了一个按钮，允许您快速为您的图片添加替代文本。这是一个您应该在所有演示文稿中使用的功能，以确保您的内容对使用屏幕阅读器的人是可访问的。'
- en: The **Arrange** group ( **5** ) has tools that help you layer, align, and rotate
    all objects on your slides, and **Selection Pane** helps you see a list of all
    the objects on your slides.
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**排列**功能组（**5**）包含帮助您在幻灯片上堆叠、对齐和旋转所有对象的工具，而**选择面板**帮助您查看幻灯片上所有对象的列表。'
- en: In the **Size** group ( **6** ), you can access tools that will help crop your
    image and shape its size.
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**大小**功能组（**6**）中，您可以访问帮助您裁剪图片和调整其大小的工具。
- en: You will see the **Picture Format** tab ( **1** ) when you insert images or
    cut out people from the **Stock Images** library. Many tools in this tab ar e
    easy to use; you just need to try them out on your own. The following are a few
    examples of how to use some of them in a creative way so that you can build more
    impactful presentations.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 当您在**库中的图片**插入图像或剪除人物时，您将看到**图片格式**选项卡（**1**）。此选项卡中的许多工具都易于使用；您只需要亲自尝试它们。以下是一些如何以创意方式使用其中一些工具的示例，以便您能够构建更具影响力的演示文稿。
- en: Rem oving the background of an image
  id: totrans-215
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 移除图像的背景
- en: If you have planned your content properly, as discussed in [*Chapter 1*](Chapter_01.xhtml#_idTextAnchor022)
    , you should have ideas about the visuals you want to include in your presentation.
    Instead of wasting a lot of time searching for the perfect image, you can search
    for images that include the element you are looking for and use the **Remove Background**
    tool in PowerPoint to discard what is not required.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已经如[*第 1 章*](Chapter_01.xhtml#_idTextAnchor022)中所述正确规划了内容，您应该对您想要在演示文稿中包含的视觉元素有所想法。您不必浪费大量时间寻找完美的图像，您可以搜索包含您正在寻找的元素的图像，并使用
    PowerPoint 中的**移除背景**工具来丢弃不需要的部分。
- en: For the best results when using the **Remove Background** tool, you need a photo
    in which the element you want has a sharp contrast with the rest of the image.
    If your image is composed of too many elements, or the borders of the subject
    you want to extract are blurred by the rest of the content, you will have to work
    much harder, and the results might not be as good as you want.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用**移除背景**工具时，为了获得最佳效果，您需要一张您想要提取的元素与图像其余部分对比鲜明的照片。如果您的图像由太多元素组成，或者您想要提取的主题的边缘被其余内容模糊，您将不得不付出更多的努力，结果可能不会如您所愿。
- en: 'In the following example ( *Figure 7.32* ), I inserted a photo of a bird available
    in **Stock Images** that has a blurred background ( **1** ). Then, I went to the
    **Picture Format** tab ( **2** ) a nd clicked on the **Remove Background** tool
    ( **3** ):'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下示例（*图 7.32*）中，我插入了一张**库中的图片**中可用的带有模糊背景的鸟的图片（**1**）。然后，我转到**图片格式**选项卡（**2**），并点击了**移除背景**工具（**3**）：
- en: '![Figure 7.32 – Finding the Remove Background tool](img/B32063_07_32.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.32 – 查找“移除背景”工具](img/B32063_07_32.png)'
- en: Figure 7.32 – Finding the Remove Background tool
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.32 – 查找“移除背景”工具
- en: 'In *Figure 7.33* , you now have a new tab named **Background Removal** ( **1**
    ):'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在*图 7.33*中，您现在有一个名为**背景移除**的新选项卡（**1**）：
- en: '![Figure 7.33 – Using the Background Removal tools](img/B32063_07_33.png)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.33 – 使用背景移除工具](img/B32063_07_33.png)'
- en: Figure 7.33 – Using the Background Removal tools
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.33 – 使用背景移除工具
- en: The background determined by the tool takes a magenta or flashy pink color when
    on your computer, which signifies the area that will be removed. In my example,
    it looks like a grayed-out area in the image ( **2** ). You need to pay close
    attenti on to this step because you may have areas of your subject that are not
    included in what will be kept. In my example, there are five magenta wing-feather
    tips and missing white tail tips ( **3** ), meaning that if I don’t make adjustments,
    the bird won’t look good.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 工具确定的背景在您的计算机上呈现为洋红色或闪亮的粉色，这表示将要移除的区域。在我的例子中，它看起来像图像中的灰色区域（**2**）。您需要对此步骤给予密切的关注，因为您主题的某些区域可能没有被包含在保留的内容中。在我的例子中，有五个洋红色的翼尖和缺失的白色尾尖（**3**），这意味着如果我不进行调整，鸟儿看起来就不会很好。
- en: 'This is when you need to use the tools in the **Refine** group of the **Background
    Removal** tab ( **4** ):'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 这时您需要使用**背景移除**选项卡中的**精修**组中的工具（**4**）：
- en: '**Mark Areas to Keep** : If you click on this button, your mouse cursor takes
    on the shape of a pencil when you hover over your image. You need to left-click
    and draw over the parts you want to include—it will draw a green line that disappears
    when you release the left mouse button.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标记保留区域**：如果您点击此按钮，当您将鼠标悬停在图像上时，鼠标光标将变成铅笔形状。您需要左键单击并绘制您想要包含的部分——释放左鼠标按钮时，它将绘制一条绿色线条，该线条随后消失。'
- en: You might see the border of your subject change during the process, including
    or excluding parts of it as the system tries to find pixel colors you just included
    elsewhere in your image. Therefore, you need to start with an image where your
    subject has a sharp contrast with the background and does not include too many
    details.
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在处理过程中，您可能会看到主题的边缘发生变化，包括或排除其部分，因为系统试图找到您在图像其他地方刚刚包含的像素颜色。因此，您需要从一个主题与背景对比鲜明且不包含太多细节的图像开始。
- en: '**Mark Areas to Remove** : If there are areas you don’t want to include, or
    that were included during the previous process, this tool allows you to mark them.
    It is the same process as keeping areas, except that the line you draw is red.
    You also need to keep an eye on any other selection changes made during this step.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标记要移除的区域**：如果您有不想包含的区域，或者在前一个过程中被包含的区域，此工具允许您标记它们。这与保留区域的过程相同，只是您所画的线是红色的。您还需要注意在此步骤中进行的任何其他选择更改。'
- en: In both cases, you don’t need to precisely draw th e whole area—you just need
    to draw a line over the colors that need to be included or excluded. In the **Close**
    group ( **5** ), you can choose **Discard All Changes** if you are not satisfied
    with the results or **Keep Changes** to confirm the removal of the background.
    Pressing the *Esc* key on your keyboard will also keep the changes you made.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，您不需要精确地绘制整个区域——您只需在需要包含或排除的颜色上画一条线即可。在**关闭**组（**5**）中，如果您对结果不满意，可以选择**丢弃所有更改**，或者选择**保留更改**以确认背景的移除。按键盘上的*Esc*键也会保留您所做的更改。
- en: 'Here is the result fo r the image used in my example ( *Figure 7.34* ):'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我示例中使用的图像的结果（*图 7.34*）：
- en: '![Figure 7.34 – Image before and after using the Background Removal tool](img/B32063_07_34.png)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.34 – 使用背景移除工具前后的图像](img/B32063_07_34.png)'
- en: Figure 7.34 – Image before and after using the Background Removal tool
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.34 – 使用背景移除工具前后的图像
- en: Besides being able to use an image with no background in your presentation,
    using the **Background Removal** tool can also help you create special effects.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 除了能够在演示文稿中使用无背景的图像外，使用**背景移除**工具还可以帮助您创建特殊效果。
- en: If you need a more robust tool to remove a background from a more complex image,
    you would be better off looking for online solutions. **Photoroom** has four licensing
    leve ls, from free to enterprise-level needs.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要一个更强大的工具来从更复杂的图像中移除背景，您最好寻找在线解决方案。**Photoroom**有四个许可级别，从免费到企业级需求。
- en: There are times when you probably don’t need to remove the background of your
    image but still want a closer focus on a specific area. That is when the various
    cropping tools in the next section can come in hand y.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，您可能不需要移除图像的背景，但仍希望对特定区域进行更近距离的聚焦。这就是下一节中各种裁剪工具可以派上用场的时候。
- en: Using various image-cropping tools
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用各种图像裁剪工具
- en: 'When you want to resize an image and change its focus, the cropping tool can
    be your best friend. When you have an image selected on your slide, it is foun
    d in the **Picture Format** tab ( **1** ) ( *Figure 7.35* ):'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 当您想要调整图像大小并更改其焦点时，裁剪工具可以成为您的最佳助手。当您在幻灯片上选择图像时，它位于**图片格式**选项卡（**1**）中（*图 7.35*）：
- en: '![Figure 7.35 – Using the Crop tool on an image](img/B32063_07_35.png)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.35 – 在图像上使用裁剪工具](img/B32063_07_35.png)'
- en: Figure 7.35 – Using the Crop tool on an image
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.35 – 在图像上使用裁剪工具
- en: When you click on the **Crop** button ( **2** ), you will see black corner and
    side handles that allow you to decide which area of your image will be displayed
    ( **3** ). In my example, I removed the left and right portions of the image so
    that it would be the same size as the placeholder on the left.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 当您单击**裁剪**按钮（**2**）时，您将看到黑色角和侧边手柄，允许您决定图像的哪个区域将被显示（**3**）。在我的示例中，我移除了图像的左右部分，使其与左侧的占位符大小相同。
- en: When you hover over the image, your mouse cursor becomes a four-way arrow (
    **4** ), allowing you to position it so that an element of focus is displayed
    properly. To confirm the changes, simply click on the **Crop** button again (
    **2** ), hit the *Esc* key on your keyboard, or click outside of the selected
    image.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 当您将鼠标悬停在图像上时，您的鼠标光标变成一个四向箭头（**4**），允许您将其定位，以便正确显示焦点元素。要确认更改，只需再次单击**裁剪**按钮（**2**），按键盘上的*Esc*键，或单击所选图像之外即可。
- en: 'There are two other cropping options that might be useful when creating your
    content: **Crop to Shape** and **Aspect Ratio** ( *Figure 7.36* ):'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建内容时，还有两个可能有用的裁剪选项：**裁剪到形状**和**宽高比**（*图 7.36*）：
- en: '![Figure 7.36 – Accessing the Crop to Shape and Aspect Ratio options](img/B32063_07_36.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![图 7.36 – 访问裁剪到形状和宽高比选项](img/B32063_07_36.png)'
- en: Figure 7.36 – Accessing the Crop to Shape and Aspect Ratio options
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7.36 – 访问裁剪到形状和宽高比选项
- en: To access them, you first need to select at least one image on your slide and
    then click on the small arrow below the **Crop** button in the **Picture Format**
    tab ( **1** ).
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问它们，您首先需要在您的幻灯片上选择至少一张图片，然后点击**图片格式**选项卡下方的**裁剪**按钮旁边的**小箭头**（**1**）。
- en: When you select the **Crop to Shape** option ( **2** ), you will see a gallery
    of all the basic shapes available in PowerPoint to choose from. When selecting
    a shape, it automatically crops your image and changes its shape. This can be
    convenient if you have decided all your images need to be displayed in a special
    shape. You can also apply this cropping option to an **image placeholder** on
    layouts in your slide master so that it automates your design choice. You can
    refer to [*Chapter 3*](Chapter_03.xhtml#_idTextAnchor206) if you need a refresher
    on layouts and placeholders.
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您选择**裁剪到形状**选项（**2**）时，您将看到所有PowerPoint中可用的基本形状的画廊，以便选择。选择一个形状时，它会自动裁剪您的图像并更改其形状。如果您决定所有图像都需要以特殊形状显示，这将很方便。您还可以将此裁剪选项应用于幻灯片母版中的布局中的**图像占位符**，以便自动化您的设计选择。如果您需要复习布局和占位符，可以参考[*第3章*](Chapter_03.xhtml#_idTextAnchor206)。
- en: The **Aspect Ratio** option ( **3** ) gives you a list of common aspect ratios
    to choose from, allowing you to reduce manual cropping.
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**宽高比**选项（**3**）为您提供了一组常见的宽高比供您选择，这允许您减少手动裁剪。'
- en: An example of when this option can be useful is if you need to build a layout
    of images that all have the same aspect ratio on a slide and have more images
    than the **Designer** feature can handle. You could make all images square with
    the 1:1 aspect ratio, then use the alignment tools to quickly display them on
    the slide.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 当您需要在一个幻灯片上构建所有图像都具有相同宽高比且图像数量超过**设计器**功能所能处理的布局时，此选项非常有用。您可以制作所有图像为正方形，宽高比为1:1，然后使用对齐工具快速将它们显示在幻灯片上。
- en: Before we end this chapter, we’ll see how we can customize icons and illustrations,
    two crea tive content elements available in Stock I mages.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在结束本章之前，我们将了解如何自定义图标和插图，这是在**股票图片**中可用的两种创意内容元素。
- en: Customizing icons or illustrations
  id: totrans-250
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自定义图标或插图
- en: At the beginning of this section, we saw seven creative content types available
    in **Stock Images** . Now we will see how to customize **icons** and **illustrations**
    so that they integrate well with the overall look of your presentation.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节开始时，我们看到了**股票图片**中可用的七种创意内容类型。现在我们将了解如何自定义**图标**和**插图**，以便它们与您的演示文稿的整体外观很好地融合。
- en: 'In the following example, I inserted a computer that can be customized ( *Figure
    7.37* ):'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下示例中，我插入了一台可以自定义的计算机（*图7.37*）：
- en: '![Figure 7.37 – Accessing the graphics formatting tools](img/B32063_07_37.png)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![图7.37 – 访问图形格式化工具](img/B32063_07_37.png)'
- en: Figure 7.37 – Accessing the graphics formatting tools
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.37 – 访问图形格式化工具
- en: You can access formatting tools from the **Graphics Format** tab ( **1** ),
    click on the **Dialog launcher** icon ( **2** ) on the ribbon to open the **Format
    Graphic** pane ( **3** ), and right-click on the illustration to access the options
    in the contextual menu ( **4** ). This last action also makes the floating formatting
    tools available ( **5** ).
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从**图形格式**选项卡（**1**）访问格式化工具，点击功能区上的**对话框启动器**图标（**2**）以打开**格式图形**面板（**3**），然后右键单击插图以访问上下文菜单中的选项（**4**）。此最后操作还会使浮动格式化工具可用（**5**）。
- en: Depending on the illustration you inserted, you will be able to change the fill
    color of some elements in the graphic, give a different look by choosing a contrasting
    outline color, and apply graphic effects with the function in the **Graphics Styles**
    group ( **6** ). You just need to try changing a few options to see how the illustration
    you have inserted reacts. If doing so does not give you enough customization options
    for your needs, then you need to click on **Convert to Shape** ( **7** ) in the
    ribbon or in the contextual menu ( **8** ).
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您插入的插图，您将能够更改图形中某些元素的填充颜色，通过选择对比度高的轮廓颜色来改变外观，并使用**图形样式**组中的功能应用图形效果（**6**）。您只需尝试更改几个选项，看看您插入的插图如何反应。如果这样做不足以满足您的定制需求，那么您需要点击功能区或上下文菜单中的**转换为形状**（**7**）。
- en: 'This action results in ungrouping the shapes so that they each become availa
    ble to apply custom formatting to ( *Figure 7.38* ):'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 此操作会导致形状取消分组，以便每个形状都可以应用自定义格式（*图7.38*）：
- en: '![Figure 7.38 – Result of using Convert to Shape on an illustration](img/B32063_07_38.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![图7.38 – 在插图上使用转换为形状的结果](img/B32063_07_38.png)'
- en: Figure 7.38 – Result of using Convert to Shape on an illustration
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.38 – 使用“转换为形状”在插图上的结果
- en: After ungrouping, you can either use the sha pe formatting tools on each one
    or even delete or move some of them. As you can see, browsing the creative content
    supplied in **Stock Images** can be a great starting point to help you save some
    design time. Just use the tools you have learned about in this section to customize
    and adapt them to your needs.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 在取消组合后，您可以使用每个形状的形状格式化工具，甚至删除或移动其中一些。正如您所看到的，浏览**股票图片**中提供的创意内容可以是一个很好的起点，帮助您节省一些设计时间。只需使用本节中介绍的工具来定制和调整它们以满足您的需求。
- en: After ungrouping an illustration to get separate shapes, you can even go a step
    further and use the **Edit Points** and **Merge Shapes** tools we have discussed
    in previous sections of this chapter. The possibilities are endless if you start
    using the power of these tools!
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 在取消组合插图以获得单独的形状后，您甚至可以更进一步，使用本章前面部分讨论过的**编辑点**和**合并形状**工具。如果您开始使用这些工具的力量，可能性将是无限的！
- en: 'The steps I just described can also be used with the icons supplied in **Stock
    Images** because they are like illustrations; both categories are considered vector
    objects that are easily resized and formatted. You have an extra step to access
    individual shapes ( *Figure 7.39* ):'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 我刚才描述的步骤也可以用于**股票图片**中提供的图标，因为它们就像插图一样；这两个类别都被认为是易于调整大小和格式的矢量对象。您需要额外一步来访问单个形状（*图7.39*）：
- en: '![Figure 7.39: Ungrouping a converted icon](img/B32063_07_39.png)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![图7.39：取消组合转换后的图标](img/B32063_07_39.png)'
- en: 'Figure 7.39: Ungrouping a converted icon'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.39：取消组合转换后的图标
- en: After adding an icon from **Stock Images** , make sure it is selected ( **1**
    ) and go to the **Shape Format** tab ( **2** ) to access **Ungroup** ( **3** ).
    This will give you access to the shapes ( **4** ), allowing yo u to delete, move,
    or recolor any of them.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 在添加**股票图片**中的图标后，确保它被选中（**1**），然后转到**形状格式**选项卡（**2**）以访问**取消组合**（**3**）。这将使您能够访问形状（**4**），允许您删除、移动或更改其中任何一个的颜色。
- en: If you have not tried the tools described in this chapter, I strongly suggest
    that you put some time aside to do so. The only way to get more comfortable with
    features and tools you are not familiar with is by practicing.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您还没有尝试本章中描述的工具，我强烈建议您留出一些时间来尝试。熟悉您不熟悉的功能和工具的唯一方法是通过实践。
- en: Summary
  id: totrans-267
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed how to create more visually appealing elements
    on your slides by adding maps and using and customizing SmartArt. We also learned
    how to create our own shapes with **Edit Points** and **Merge Shapes** , and customize
    the creative content supplied by Microsoft in the **Stock Images** library.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了如何通过添加地图和使用和自定义SmartArt来在您的幻灯片上创建更具视觉吸引力的元素。我们还学习了如何使用**编辑点**和**合并形状**来创建自己的形状，并自定义Microsoft在**股票图片**库中提供的创意内容。
- en: You now have enough knowledge about the tools and features to start creating
    your own visual content or adapting any default elements supplied in PowerPoint.
    Yes, there will be times when you will feel overwhelmed by the possibilities.
    After all, our brains don’t have a creative switch that we can flip on or off!
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在已经拥有了足够关于工具和特性的知识，可以开始创建自己的视觉内容或调整PowerPoint中提供的任何默认元素。是的，您可能会在某些时候感到被可能性所淹没。毕竟，我们的大脑并没有一个可以开启或关闭的创造性开关！
- en: 'Just give yourself time to get more comfortable with the tools, and don’t feel
    as though you need to change all your visuals at once. Here is a challenge for
    your next presentation: plan more design time before your event and set the goal
    of using one technique you learned in this chapter. As you get more familiar with
    the tools and features, you can implement more visual changes in your content.'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 只需给自己一些时间来熟悉这些工具，并且不要觉得您需要一次性改变所有的视觉元素。这里有一个挑战：在您的下一次演讲之前，安排更多的时间来设计，并设定目标使用本章中学到的一种技术。随着您对工具和功能的熟悉程度提高，您可以在内容中实施更多的视觉变化。
- en: In the next chapter, we will be discussing how to add and modify multimedia
    elements. You will learn how to include video and audio in your presentations,
    use some basic editing tools, and create videos with PowerPoint.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论如何添加和修改多媒体元素。您将学习如何在演示文稿中包含视频和音频，使用一些基本的编辑工具，并使用PowerPoint创建视频。
