- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Requirements and Architecture for AI Pipelines
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Machine learning model development fundamentally differs from traditional software
    engineering in its experimental and iterative nature. While software engineers
    typically design systems based on well-defined specifications, data scientists
    must navigate the inherent uncertainties of data characteristics, feature relevance,
    and model behavior. This necessitates a systematic yet flexible approach to model
    creation, optimization, and validation that accommodates the unique challenges
    of AI development.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter examines “AI pipeline systems” – the predominant architecture in
    enterprise AI today, which consist of progressive processing stages utilizing
    interconnected AI models. These pipelines form the backbone of modern AI implementations,
    enabling organizations to systematically develop, deploy, and maintain AI capabilities
    at scale.
  prefs: []
  type: TYPE_NORMAL
- en: AI systems rarely operate as standalone modules; rather, they are typically
    embedded within larger software ecosystems and follow structured development and
    deployment workflows. This chapter thoroughly examines the architecture and requirements
    of both development and production pipelines, with particular emphasis on the
    critical process of transitioning models from experimental environments into robust
    production systems [1][2].
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter will provide comprehensive guidance on the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The major facets required for creating effective development and production
    pipelines
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to leverage modular architecture to improve AI system performance and meet
    crucial non-functional requirements
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Essential architecture tactics and patterns specifically designed for AI-enabled
    systems
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Development pipelines
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Architecture emerges from requirements, creating a recursive pattern where components
    synthesized from initial requirements themselves become requirements for subsequent
    architectural synthesis. This recursion continues until system builders can no
    longer meaningfully impact associated sub-components, at which point implementation
    details take precedence.
  prefs: []
  type: TYPE_NORMAL
- en: A robust development environment serves as the foundation for testing and validating
    pipelines before production release. Comprehensive architecture models identify
    major components, external interfaces, user involvement points, and data requirements
    throughout the system. Multiple architecture views capture process flows and operational
    threads, demonstrating how AI systems will systematically meet both explicit and
    implicit requirements [3].
  prefs: []
  type: TYPE_NORMAL
- en: Modular design significantly enhances system flexibility and maintainability,
    particularly in complex AI pipelines. Each stage in an AI pipeline should be independently
    verifiable, configurable, and scalable to accommodate changing requirements and
    technological advances. The pipeline needs to be versioned and have clear traceability
    to its data lineage. The architecture must capture both functional components
    and non-functional requirements such as scalability, reliability, and observability,
    creating a holistic blueprint for implementation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_05_01.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5.1: High-level AI pipeline overview'
  prefs: []
  type: TYPE_NORMAL
- en: In *Figure 5.1*, we see the relationship between development and production
    pipelines in an AI system illustrated. The left side depicts the development pipeline
    where model building and experimentation occur, while the right side shows the
    production pipeline where operational model deployment and inference take place.
    This visual representation highlights the parallel nature of these environments
    and their critical interconnections.
  prefs: []
  type: TYPE_NORMAL
- en: 'The development pipeline consists of several key components working in concert:'
  prefs: []
  type: TYPE_NORMAL
- en: The **Dev Data Store** serves as a repository for training and testing data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Cleansing** processes ensure data quality and consistency'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Model Build Test** environment provides infrastructure for model training
    and evaluation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Model Registry** enables versioning and tracking of models, including
    the parameters used in models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dev Results** repositories store development outcomes for analysis and comparison'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The production pipeline mirrors this structure with components designed for
    operational use:'
  prefs: []
  type: TYPE_NORMAL
- en: The **Prod Data Store** maintains operational data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Similar **Data Cleansing** processes ensure production data quality
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model Execution** provides the infrastructure where inference occurs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Production Model Store** securely houses deployed models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operations Store** components enable comprehensive monitoring and management'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The central arrow in *Figure 5.1* demonstrates how models, once thoroughly validated,
    transition from development to production environments. The two pipelines share
    similar data structures and processing approaches (shown by the top connection)
    to ensure that production deployment conditions closely resemble development environments,
    reducing the risk of unexpected behavior when models go live.
  prefs: []
  type: TYPE_NORMAL
- en: These architectural views feed directly into systems analysis activities, identifying
    which parts need detailed modeling to drive design decisions and provide initial
    evaluation of expected performance metrics. They also help identify specific metrics
    and data requirements across all AI system components, ensuring comprehensive
    coverage of both functional and non-functional requirements.
  prefs: []
  type: TYPE_NORMAL
- en: With a clearly specified architecture in place, work can be effectively allocated
    for implementation. Teams typically organize along the system architecture boundaries,
    using configuration-controlled diagrams to communicate the overarching vision,
    facilitate cross-team communication, and efficiently onboard new team members
    as the project evolves.
  prefs: []
  type: TYPE_NORMAL
- en: AI-enabled systems require holistic requirements engineering, as AI components
    never exist in isolation but rather operate within complex technological ecosystems.
    Requirements must comprehensively specify data engineering aspects, computational
    hardware needs, and precisely how the broader system will ingest and act upon
    AI-generated decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Data store requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The data store serves as the pipeline’s foundation and source of truth, typically
    incorporating minimal processing to maintain data integrity. Several key considerations
    must be addressed when designing this critical component.
  prefs: []
  type: TYPE_NORMAL
- en: Data volume and velocity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Understanding the total volume of data expected for processing is essential
    for proper infrastructure planning. This includes projections for data growth
    over time and peak processing requirements. Similarly, data velocity requirements
    into stores must be clearly specified, including patterns of data flow and expected
    variability throughout operational cycles.
  prefs: []
  type: TYPE_NORMAL
- en: Data formats and processing approaches
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Requirements must address both structured and unstructured data types, including
    specifications for standardization and compatibility. Processing-type decisions
    – whether batch processing, streaming, or hybrid approaches – significantly impact
    architecture and should be driven by system goals and performance requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Timeliness and technology selection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Processing speed requirements and acceptable delays must be explicitly defined
    based on business needs. Data store technology selection – whether relational
    databases, object stores, graph databases, or specialized AI data stores – should
    be guided by system goals and performance requirements rather than technological
    preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Non-functional requirements and governance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Storage redundancy, replication strategies, and backup frequency must be established
    based on data criticality and recovery objectives. Security protocols, governance
    frameworks, and compliance requirements play crucial roles in mitigating risks
    and ensuring regulatory adherence, particularly for sensitive data.
  prefs: []
  type: TYPE_NORMAL
- en: Support operations and specialized stores
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Status information, monitoring capabilities, and alerting systems must be built
    into the data architecture to enable proactive management. Modern AI systems increasingly
    leverage specialized data stores, including vector databases for similarity searches,
    feature stores for consistent transformations, and lakehouses that combine data
    lake flexibility with data warehouse structure.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Storage technology** | **Domain considerations** | **Compliance** |'
  prefs: []
  type: TYPE_TB
- en: '| Relational | High consistencyPerformanceStructured data | Data provenanceUp-to-date
    records |'
  prefs: []
  type: TYPE_TB
- en: '| Object | Unstructured dataSpeed of storageMinimal indexingFlexible data schemas
    | MaintenanceRecords of full data volumes |'
  prefs: []
  type: TYPE_TB
- en: '| Key-Value | Flexible schemaNeed for rapid query search | Fast recovery of
    dataRecords of full data volumes |'
  prefs: []
  type: TYPE_TB
- en: '| Graph | Speed of lookupSimple data modelCan mimic domain | Data provenanceFast
    data summaries |'
  prefs: []
  type: TYPE_TB
- en: '| Vector | Natural language processingLarge language models | Data associationsProof
    of training datasets |'
  prefs: []
  type: TYPE_TB
- en: 'Table 5.1: Comparison of data storage technologies'
  prefs: []
  type: TYPE_NORMAL
- en: Algorithmic development components
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As has been stated, the building of an AI system has as its core the building
    of components that are expected to make decisions. The decisions that are to be
    made rely heavily or almost entirely on the data that comes into the system. A
    decision is only as good and valid as the data that was used. The next sections
    describe key tasks that can be used to ensure the highest quality of data enters
    the system. These tasks can be both tedious and challenging since, for the initial
    system development, a human is needed. That said, for further system development,
    these tasks can be done in an automated manner with checking and alerting.
  prefs: []
  type: TYPE_NORMAL
- en: Data quality checks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Understanding data quality is critical for effectively training, tuning, and
    maintaining AI pipelines. Quality checks should be rigorously configuration-controlled
    and tested, with minimum requirements explicitly specified. These include comprehensive
    assessments of data completeness to ensure records have values for all required
    fields, corruption detection to identify malformed data, time-span regularity
    verification to maintain temporal consistency, format validation to confirm expected
    data structures, and range checking to verify field values remain within expected
    boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: Modern quality control approaches also incorporate automated validation for
    detecting data drift and anomalies as they emerge, along with sophisticated bias
    testing methodologies to proactively identify and mitigate potential biases before
    they affect model performance. These mechanisms form an essential foundation for
    maintaining data integrity throughout the AI pipeline lifecycle.
  prefs: []
  type: TYPE_NORMAL
- en: Data transforms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pipeline data rarely arrives in formats directly usable by machine learning
    models. Data transforms normalize and prepare data for inference, and their implementation
    must be thoroughly understood, precisely formulated, and rigorously checked. Common
    transformations include converting between different geographic data formats,
    standardizing physical units for consistent representation, applying dimensionality
    reduction techniques to improve model efficiency, and implementing feature stores
    to ensure transformation consistency across development and production environments.
  prefs: []
  type: TYPE_NORMAL
- en: Advanced transformation approaches incorporate representation learning to automatically
    discover useful data representations and data augmentation strategies to artificially
    expand training datasets. These transformations must be treated as first-class
    citizens in the pipeline architecture, with appropriate version control and monitoring
    to ensure consistency.
  prefs: []
  type: TYPE_NORMAL
- en: Data summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Data summaries serve dual purposes: verifying model consistency and supporting
    ongoing pipeline monitoring. Effective summaries include comprehensive dataset
    statistics (mean, median, variability metrics), data field association analysis
    to identify relationships, distribution fitting to understand underlying patterns,
    and visual representations through techniques such as box plots and interactive
    dashboards.'
  prefs: []
  type: TYPE_NORMAL
- en: Modern approaches incorporate anomaly detection in distributions to identify
    potential data quality issues and correlation analysis to understand feature relationships.
    These summaries provide critical visibility into data characteristics that impact
    model performance and should be maintained throughout the pipeline lifecycle.
  prefs: []
  type: TYPE_NORMAL
- en: Model building, tuning, and verification
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Model building should be conceptualized as an ongoing iterative process rather
    than a terminal task, since AI pipelines must continuously adapt to evolving data
    patterns and business requirements. The pipeline architecture must support reproducible
    training, systematic tuning, and rigorous evaluation to ensure consistent performance
    over time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_05_02.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5.2: Model building, tuning, and verification workflow'
  prefs: []
  type: TYPE_NORMAL
- en: 'In *Figure 5.2*, we see the iterative nature of model development illustrated
    from initial data sampling through deployment. The workflow begins with data sampling
    to create representative subsets, followed by data quality validation, initial
    model training, and performance evaluation against established metrics. The workflow
    then reaches a critical decision point: Is the performance acceptable based on
    predefined criteria? If not, the process loops back for refinement through feature
    engineering to optimize model inputs and hyperparameter tuning to adjust model
    configuration.'
  prefs: []
  type: TYPE_NORMAL
- en: Once performance reaches acceptable thresholds, the model proceeds through validation
    with unseen data to test generalizability, independent verification by someone
    not involved in development to reduce bias, and formal model commit procedures
    to version the final model for deployment. Throughout this process, comprehensive
    documentation metadata is maintained, including model architecture details, training
    data sources, hyperparameter settings, and performance metrics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Several key infrastructure considerations support this workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: Configuration control
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Successful AI pipelines require disciplined tracking throughout their lifecycle,
    including time-phasing and temporal tagging of datasets, comprehensive metadata
    reference and activity logging, and robust model registries for versioning. Modern
    implementations leverage experiment tracking platforms using tools such as Git,
    MLflow, or DVC to maintain complete traceability of the development process.
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning performance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Effective pipelines require a clear understanding of expected outputs and processing
    times, comprehensive performance metrics (confusion matrices, accuracy, AUC),
    visualization tools for comparing results to expectations, and multi-metric evaluation
    approaches that consider fairness and explainability alongside traditional performance
    measures. Ongoing monitoring for model drift is essential for maintaining performance
    over time.
  prefs: []
  type: TYPE_NORMAL
- en: Computation infrastructure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pipeline design must include thorough testing on the target computing infrastructure
    to ensure performance requirements are met, benchmarking storage and network impact
    to identify potential bottlenecks, and implementing model optimization techniques
    such as quantization and pruning where appropriate. Modern implementations often
    incorporate hardware acceleration and inference optimization to maximize efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: Scale processing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Enterprise-grade pipelines require infrastructure for testing models at production
    scale, comprehensive load testing with production-level traffic patterns, shadow
    deployment capabilities to run new models alongside existing systems, and chaos
    engineering approaches to verify system resilience under adverse conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Model tuning and verification
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Models typically require systematic fine-tuning to address end-to-end system
    requirements beyond initial performance metrics. Comprehensive verification should
    include second checks comparing test data to production samples to verify consistency,
    independent review by someone not involved in development to reduce bias, result
    visualization to identify potential outliers, and interface checks to ensure compatibility
    with downstream systems.
  prefs: []
  type: TYPE_NORMAL
- en: Advanced approaches incorporate hyperparameter optimization techniques to maximize
    performance, adversarial testing methodologies to identify potential weaknesses,
    red teaming processes, and explainable AI techniques to enhance model transparency.
    These verification processes ensure models will perform reliably when deployed
    to production environments.
  prefs: []
  type: TYPE_NORMAL
- en: Code committal and DevOps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The final development step involves integrating the validated model into the
    pre-production baseline. This code will be used for comprehensive testing and
    staging, with representative data samples and production data utilized to identify
    potential integration impacts before full deployment.
  prefs: []
  type: TYPE_NORMAL
- en: Modern approaches to this stage include automated CI/CD pipelines specifically
    designed for ML workflows, containerization technologies for consistent deployment
    across environments, infrastructure-as-code practices for reproducibility, feature
    flags for controlled functionality rollout, and blue-green deployment strategies
    for minimizing disruption during transitions.
  prefs: []
  type: TYPE_NORMAL
- en: Production pipeline
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The production pipeline represents the culmination of extensive development
    work and stakeholder expectations – the operational “kitchen” that must consistently
    deliver on promises made during planning and development. This section provides
    detailed guidance on production pipeline architecture and technical requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Data stores
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Many pipeline issues can be traced back to misunderstood requirements or implementation
    decisions around data stores. Engineering efforts should begin by carefully considering
    the expected output characteristics: speed requirements, quality thresholds, timing
    constraints, and intended recipients.'
  prefs: []
  type: TYPE_NORMAL
- en: Data store technology considerations include several options with distinct strengths
    and limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Relational data stores excel with stable data models and minimal scalability
    concerns, providing strong consistency guarantees and transaction support. Object
    stores handle diverse components that don’t fit standard schemas, enabling easy
    attribute modification and rapid horizontal scaling at the cost of some consistency
    guarantees. Document stores combine object store flexibility with schema structure,
    providing a middle ground for semi-structured data. Graph stores leverage mathematical
    graph structures for data relationships, delivering exceptional latency performance
    for graph-centric analytics and relationship queries.
  prefs: []
  type: TYPE_NORMAL
- en: Log stores process data as immutable event streams with minimal processing,
    shifting analytical burden to downstream pipeline components while providing strong
    auditability. Modern specialized stores such as vector databases, feature stores,
    and time-series databases offer purpose-built capabilities for specific AI workloads,
    often delivering substantial performance improvements for their target use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Data operations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data stores must consistently meet pipeline performance requirements through
    several key operational capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Comprehensive benchmarking of data rates and operations ensures infrastructure
    can handle expected workloads under various conditions. Flexible architecture
    with robust reporting enables adaptation to changing requirements while maintaining
    visibility. Data quality monitoring systems proactively identify potential issues
    before they impact downstream processes. Automated and semi-automated schema evolution
    capabilities allow systems to adapt to changing data structures without disruption.
    If using automated schema changes, it is imperative that there are architectural-level
    safeguards such as alerts, archives, and versioning to prevent data loss. Data
    lineage tracking provides complete visibility into how data flows through complex
    pipeline systems.
  prefs: []
  type: TYPE_NORMAL
- en: Data cleansing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This stage meticulously prepares data to ensure correct model execution in production
    environments. Key aspects include integrity checks to verify data isn’t garbled
    or incomplete during transmission, format checks to ensure values match expected
    encoding and format specifications, and consistency checks that implement domain-driven
    semantic validation for logical validity.
  prefs: []
  type: TYPE_NORMAL
- en: Data cleansing serves as an essential quality gate for building confidence in
    pipeline outputs, though it has inherent limitations – it’s practically impossible
    to check for all potential issues within complex data streams. Well-designed cleansing
    processes focus on high-impact validations based on domain knowledge and historical
    error patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Data transformation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This final preprocessing step before model execution normalizes data across
    various dimensions, including timestamps, geographical references, terminology
    standards, and numeric ranges. These transformations should be thoroughly tested
    and validated to prevent subtle errors from propagating through to model execution.
  prefs: []
  type: TYPE_NORMAL
- en: Modern approaches to transformation include feature stores for maintaining consistency
    across environments, transfer learning techniques for generating robust representations,
    neural network-based transformations for complex pattern extraction, and automated
    feature engineering to discover optimal representations.
  prefs: []
  type: TYPE_NORMAL
- en: Model execution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In production environments, model execution should be treated as a carefully
    managed black box without direct updates during operation. Key operational aspects
    include the following.
  prefs: []
  type: TYPE_NORMAL
- en: Operational status monitoring
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Production pipelines require comprehensive metrics collection on data flows,
    processing times, and hardware performance to maintain visibility. This status
    information should be presented through multiple complementary channels: visual
    dashboards for at-a-glance assessment, detailed graphs and plots for trend analysis,
    key performance indicators, log output summaries for troubleshooting, and real-time
    alerts for performance issues requiring immediate attention.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_05_03.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5.3: Production inference execution canary checks'
  prefs: []
  type: TYPE_NORMAL
- en: '![A magnifying glass on a black background  AI-generated content may be incorrect.](img/1.png)**Quick
    tip**: Need to see a high-resolution version of this image? Open this book in
