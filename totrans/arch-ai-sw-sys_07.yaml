    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/Unlock1.png)'
  prefs: []
  type: TYPE_IMG
- en: In *Figure 5.3*, we see how canary testing is implemented in production pipelines
    to monitor model health. The diagram illustrates the standard production pipeline
    flow from **Data Store** through **Model Execution** to **Results Store** in the
    top row, with the canary testing infrastructure shown in the bottom row. This
    infrastructure includes carefully curated canary records containing known inputs
    with expected outputs, expected output check components that compare actual model
    outputs to expected results, and monitoring alerts that trigger notifications
    when deviations exceed threshold values.
  prefs: []
  type: TYPE_NORMAL
- en: This canary data provides a continuous stream of validation, with known inputs
    and expected outputs verifying ongoing model health. Deviations from expected
    results trigger alerts, indicating potential model drift or pipeline issues requiring
    investigation. This early warning system helps maintain model reliability in production
    environments by identifying problems before they significantly impact business
    operations.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing these canary checks is essential for detecting subtle model drift
    over time, identifying infrastructure issues affecting model performance, building
    stakeholder confidence in ongoing model operations, and providing a mechanism
    for controlled testing in production environments without disrupting normal operations.
  prefs: []
  type: TYPE_NORMAL
- en: Model maintenance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Continuous monitoring processes determine when model redeployment is warranted
    based on changing datasets, performance degradation, or shifting business requirements.
    These processes should balance the need for model stability against the benefits
    of incorporating new data and refinements.
  prefs: []
  type: TYPE_NORMAL
- en: Results and end user stores
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: These components collect model outputs and associated metadata, serving as interfaces
    for downstream systems and human users. They should provide powerful querying
    mechanisms for flexible data access, enable machine-to-machine data ingestion
    through standardized APIs, support comprehensive visualization capabilities, maintain
    traceability between inputs and outputs, generate appropriate explanations for
    non-technical users, and integrate seamlessly with business intelligence platforms.
  prefs: []
  type: TYPE_NORMAL
- en: Pipeline operations store
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This component focuses on overall control and maintenance of the pipeline ecosystem,
    providing several critical capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Human operation inputs enable authorized interventions when necessary, supported
    by a robust alerting framework that prioritizes notifications based on severity
    and impact. Operations data collection centralizes pipeline telemetry for analysis,
    with pipeline logging visualization tools converting complex data into actionable
    insights. Modern implementations include sophisticated incident response systems
    for managing disruptions and comprehensive compliance documentation to satisfy
    regulatory requirements.
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B19300_05_04.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5.4: Pipeline operations store observability'
  prefs: []
  type: TYPE_NORMAL
- en: In *Figure 5.4*, we see the observability architecture for AI pipelines illustrated.
    The diagram shows the main pipeline components (**Data Store**, **Data Cleansing**,
    **Data Transforms**, **Model Execution**, and **Results Store**) in the top row,
    with each component sending telemetry data to the central **Pipeline Operations
    Store**. This centralized repository collects logs, metrics, alerts, and other
    operational data, feeding into the comprehensive **Observability Stack** shown
    on the right side.
  prefs: []
  type: TYPE_NORMAL
- en: This architecture enables sophisticated performance correlation analysis across
    pipeline components, allowing operators to identify processing bottlenecks, track
    data flow through all system components, monitor system health in real time, troubleshoot
    issues with comprehensive visibility, and analyze historical performance trends
    to guide optimization efforts.
  prefs: []
  type: TYPE_NORMAL
- en: A robust operations store serves as the nervous system of the AI pipeline, essential
    for both reactive troubleshooting when issues arise and proactive performance
    optimization to prevent problems before they impact operations.
  prefs: []
  type: TYPE_NORMAL
- en: Continuous development/integration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'DevOps methodologies enable rapid pipeline prototyping and testing without
    disrupting production operations. The “Blue and Gold” deployment concept works
    particularly well in AI contexts:'
  prefs: []
  type: TYPE_NORMAL
- en: One pipeline operates in production while another is built in parallel.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When ready, the test pipeline connects to production data for comparative evaluation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If performance is satisfactory, it seamlessly becomes the new production pipeline.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](img/B19300_05_05.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5.5: CI/CD for AI pipelines – “Blue and Gold” deployment'
  prefs: []
  type: TYPE_NORMAL
- en: In *Figure 5.5*, we see the “Blue and Gold” deployment strategy for AI pipelines
    illustrated. The diagram shows the current production pipeline (**Blue**) serving
    live users, while the test/staging pipeline (**Gold**) with new models or updates
    undergoes validation testing. Comprehensive validation checks compare metrics,
    A/B test results, and other performance indicators between the two environments.
  prefs: []
  type: TYPE_NORMAL
- en: The workflow follows a specific process where code changes trigger CI/CD pipelines,
    the “Gold” environment executes the new model version, validation checks compare
    performance between Blue and Gold implementations, and if successful, Gold transitions
    to production status while the previous production pipeline remains available
    as a fallback for immediate rollback if needed.
  prefs: []
  type: TYPE_NORMAL
- en: This approach ensures safe testing of new models without disrupting production
    operations, direct comparison between current and new implementations under identical
    conditions, controlled transition to production when quality thresholds are verified,
    and straightforward rollback mechanisms if issues are discovered after deployment.
  prefs: []
  type: TYPE_NORMAL
- en: Modern MLOps practices extend these capabilities with experiment tracking to
    maintain development history, model registries for version control, feature stores
    for transformation consistency, automated testing frameworks for quality assurance,
    and continuous training pipelines that automatically incorporate new data.
  prefs: []
  type: TYPE_NORMAL
- en: Architecture patterns and tactics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Architecture extends far beyond functional descriptions to address crucial non-functional
    requirements that determine real-world system success. Software tactics (first-order
    methods solving specific problems) and patterns (strategic combinations of tactics
    addressing complex problems) serve as foundational building blocks for complex
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'Several architectural patterns specifically support AI pipeline development:'
  prefs: []
  type: TYPE_NORMAL
- en: Pipe and filter architecture enables sequential and parallel processing where
    each stage transforms data and passes it downstream, creating a clear separation
    of concerns and facilitating independent scaling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Distributed store approaches spread data across multiple systems to improve
    performance, resilience, and scalability beyond single-node limitations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Blackboard architecture creates a shared repository for intermediate artifacts
    with pull-based components, enabling flexible processing workflows and simplified
    component interactions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Service orientation encapsulates functionality into weakly-coupled services
    communicating via well-defined APIs, improving maintainability and enabling independent
    evolution of components
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Key tactics employed within these patterns include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Ping-echo mechanisms enable components to query others for responses, verifying
    connectivity and basic functionality
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Heartbeat monitoring establishes regular signals indicating continued operation
    and pipeline health, providing early warning of component failures
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: N-party voting implements consensus mechanisms where multiple entities vote
    on actions, improving decision reliability in uncertain contexts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Canary testing systematically identifies model drift or errors before full deployment
    by comparing results against known-good references
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Versioned models and datasets enable comprehensive rollback capabilities and
    traceability throughout the system lifecycle
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Non-functional requirements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A key concept is that architecture considerations for a software system are
    driven by the non-functional requirements. There exist dozens of non-functional
    requirements. The role of the architect is to understand the client’s needs, the
    business case, and technical dimensions to formulate what are the key non-functional
    requirements for that given system. The non-functional requirements that are discussed
    next are major ones that usually surface across systems. You should not construe
    these as the only ones, that all these must be used, or that others cannot be
    identified.
  prefs: []
  type: TYPE_NORMAL
- en: Reliability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'AI pipelines must ensure system availability when needed through several mechanisms:
    error containment to prevent cascading failures, robust messaging infrastructure
    resistant to transient failures, redundancy and rollback mechanisms for quick
    recovery, chaos engineering practices to verify resilience, and automated incident
    response to minimize human intervention requirements.'
  prefs: []
  type: TYPE_NORMAL
- en: Maintainability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Support for ongoing model development and updates requires careful architectural
    decisions: technology minimization to reduce complexity, well-defined interfaces
    between components, microservices architecture for independent evolution, and
    infrastructure-as-code practices to ensure reproducibility across environments.'
  prefs: []
  type: TYPE_NORMAL
- en: Usability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Effective pipelines provide consistent configuration methods across components,
    robust logging with centralized information access, clear version control for
    all artifacts, intuitive graphical interfaces for monitoring and management, and
    self-service platforms enabling data scientists to operate independently within
    governed frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Architecting AI pipelines requires careful coordination between data management,
    model development, infrastructure design, and software integration practices.
    The comprehensive pipeline architecture involves parallel development pipelines
    (for model creation and testing) and production pipelines (for deployment and
    value delivery), connected through well-defined transition processes.
  prefs: []
  type: TYPE_NORMAL
- en: Key considerations for successful implementation include data-centric design
    focusing on stores with appropriate characteristics for specific workloads, modular
    architecture with well-defined and independently verifiable components, quality
    assurance through comprehensive data checks and transformations, monitoring and
    observability across all pipeline components, DevOps integration enabling rapid
    iteration and controlled deployment, non-functional requirements driving architectural
    decisions beyond basic functionality, and governance and compliance frameworks
    embedded throughout both pipeline environments.
  prefs: []
  type: TYPE_NORMAL
- en: A successful pipeline must satisfy not only the functional requirements of AI
    model training and inference but also the non-functional demands of scalability,
    observability, and governance that determine real-world operational success. Modern
    AI systems increasingly adopt MLOps practices that balance innovation and flexibility
    with production stability, creating sustainable frameworks for ongoing development.
  prefs: []
  type: TYPE_NORMAL
- en: The architecture must ultimately support technical excellence, business value
    delivery, user adoption, and responsible AI practices – a multifaceted challenge
    requiring both technical expertise and strategic vision to navigate successfully.
    With much of the conceptual design of the system in place, we will now shift to
    discuss the key steps to get to an implementation. In the next chapter, we will
    discuss design, integration, and testing.
  prefs: []
  type: TYPE_NORMAL
