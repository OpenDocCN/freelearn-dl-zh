- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: AI for Chatbots
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Chatbots have rapidly become a ubiquitous part of digital interfaces, and today’s
    users expect their conversational agents to be smart, natural, and highly capable.
    While chatbots used to be limited by scripted responses and basic natural language
    capabilities, **large language models** (**LLMs**) such as GPT-3 are revolutionizing
    what’s possible.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will explore how to create richer, more human-like chatbot
    experiences by integrating LLM APIs into our conversational interfaces. These
    AI-powered chatbots can deeply understand natural language, hold open-ended conversations,
    and complete complex tasks – all through natural dialogue.
  prefs: []
  type: TYPE_NORMAL
- en: We will start by looking at the advanced natural language processing abilities
    of LLMs, and how they enable chatbots that comprehend language as well as humans
    do. This allows them to interpret the intent behind varied user inputs more accurately
    and contextually. Next, we will see how LLMs can generate significantly more natural,
    conversational responses compared to traditional chatbots. The back-and-forth
    feels more human, engaging users in free-flowing dialogue.
  prefs: []
  type: TYPE_NORMAL
- en: 'Use cases such as customer support, e-commerce, and open-domain chat will demonstrate
    how these AI abilities manifest in real-world chatbots. You’ll learn how LLMs
    can power everything from highly personalized interactions to completing intricate
    workflows solely through conversation. We will also look at two in-depth case
    studies of LLM-powered chatbots: one for product ordering, and another for dynamic
    quiz generation.'
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you’ll have a strong grasp of how to build your
    next generation of smart conversational agents that provide immense value to your
    users. The versatility and capabilities that are unlocked by LLMs are opening
    up exciting new possibilities for chatbots. Let’s explore them.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following topics will be covered in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: How to use GPT-4 APIs and other LLM APIs to create chatbots
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Building conversational interfaces with LLM APIs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to use AI for customer support
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Case study – a chatbot using AI to assist users in ordering products
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Case study – creating interactive quizzes/assessments and deploying them as
    chatbot flows
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To complete this chapter, you will need access to the OpenAI APIs (GPT-3.5 Turbo
    and GPT 4), Antropic APIs (Claude and Claude Instant), and/or others.
  prefs: []
  type: TYPE_NORMAL
- en: To get access to the OpenAI APIs, go to [https://openai.com](https://openai.com).
  prefs: []
  type: TYPE_NORMAL
- en: To access Anthropic APIs, you need to go to [https://www.anthropic.com](https://www.anthropic.com).
  prefs: []
  type: TYPE_NORMAL
- en: You can also use [https://openrouter.ai/](https://openrouter.ai/) to access
    APIs from OpenAI, Anthropic, Meta (LLaMA20), Google (PaLM2 Bison), and some others.
    The list is updated periodically. It provides access to OpenAI GPT 3.5/4, and
    even supports GPT 4 with a context window of 32k before OpenAI itself has.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the API documentation for OpenAI at [https://platform.openai.com/docs/api-reference](https://platform.openai.com/docs/api-reference).
  prefs: []
  type: TYPE_NORMAL
- en: The chatbot builders mentioned in this chapter can be found at [https://twnel.com](https://twnel.com),
    [https://www.voiceflow.com/](https://www.voiceflow.com/), [https://uchat.au/](https://uchat.au/),
    [https://manychat.com/](https://manychat.com/), [https://botpress.com/](https://botpress.com/),
    and [https://landbot.io/](https://landbot.io/).
  prefs: []
  type: TYPE_NORMAL
- en: How to use GPT-4 APIs and other LLM APIs to create chatbots
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Although ChatGPT, Bard, and the Claude playground are chatbots, for the most
    interesting applications, you need to have your own chatbots that are tailored
    to help your users accomplish the tasks related to your business.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some key reasons why it is advantageous to build a chatbot while utilizing
    GPT or Claude APIs rather than just interacting directly with ChatGPT or Claude
    playground:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hide instructions/prompts**: With an API chatbot, you can hide all the prompts,
    instructions, context, and more that are fed to the LLM *behind the scenes*. The
    user only sees the final natural response, creating a smoother experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integrate with data sources**: A custom chatbot can connect to external databases,
    proprietary knowledge bases, and other internal data sources to allow the LLM
    to incorporate these in generating responses. This isn’t possible within the playground.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manage conversation state**: The chatbot can handle conversation state, context
    tracking, and follow-up questions, keeping the experience coherent for the user.
    The playground treats each prompt discretely.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deploy anywhere**: The chatbot can be deployed in your product, website,
    app, and more and then scaled to large user bases. The playground is limited to
    individual usage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Workflow automation**: Chatbots can integrate with business logic and workflows
    to not just provide information but also perform actions such as placing orders,
    filing tickets, and more.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ongoing improvements**: The chatbot’s behavior can be tweaked and improved
    over time based on user feedback. The playground models are more static.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Controlled access**: Chatbot users can be authenticated, and access can be
    controlled. The playground is freely available to anyone.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hence, creating a custom chatbot solution allows you to take full advantage
    of the LLM’s capabilities while controlling the entire end user experience. You
    can go beyond just a question-answer interaction and build intelligent assistants
    that truly understand users and workflows.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT and other LLMs can be useful for certain data analysis tasks, such as
    sentiment analysis, data classification, data cleaning, and pattern matching.
    However, using them directly in a playground interface has some major limitations.
  prefs: []
  type: TYPE_NORMAL
- en: For example, let’s say you have text data in Google Sheets and want to analyze
    the sentiment of each entry. With ChatGPT, you would need to manually copy and
    paste each entry into the interface, ask it to analyze sentiment, and then copy
    the response back into the associated cell. This is incredibly tedious and inefficient,
    especially for large datasets.
  prefs: []
  type: TYPE_NORMAL
- en: A custom chatbot powered by GPT-3.5 removes this friction. The chatbot can connect
    directly to data sources such as Sheets, ingest the data, iteratively call the
    AI to analyze each entry, maintain context, and automatically log structured results
    back to the source. This orchestration automates the busywork and provides scalable
    data analysis pipelines, which isn’t possible in the basic playground format.
  prefs: []
  type: TYPE_NORMAL
- en: The key difference is that a custom integration handles the connections and
    workflows between data and AI automatically, while the playground interface relies
    entirely on manual copy-paste operations. Building custom glue logic around LLMs
    unlocks more powerful and scalable applications of the technology.
  prefs: []
  type: TYPE_NORMAL
- en: 'The chatbot workflows for sentiment analysis, data classification, and data
    cleansing are all very similar, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.1: The sentiment analysis chatbot flow ](img/B21161_08_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.1: The sentiment analysis chatbot flow'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a closer look at this chatbot flow:'
  prefs: []
  type: TYPE_NORMAL
- en: When the chatbot starts, it asks the user to provide the Google Sheet’s ID.
    In this case, the repository of all the text for which we want to perform the
    sentiment analysis is a Google Sheet, but it could be Airtable or a database.
    Then, it asks for the Sheet name. These two pieces of information are key for
    the API, which will get the data from Google Sheets. Chatbot builders such as
    Twnel, ManyChat, UChat, and BotPress all have native integrations with Google
    Sheets and probably with Airtable. Other chatbot builders rely on integration
    platforms such as Zapier, Make, and similar to handle the integrations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then, the chatbot gets the data that we want to perform sentiment analysis on.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once the data has been loaded, the chatbot can parse the content of each row
    and column. Thus, we can instruct the LLM API with the prompt and the cell text
    we want to analyze. This is all done automatically in the background.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: GPT-3.5/4, Claude, or the LLM you use processes the text and returns a sentiment
    score between 0 and 1\. The chatbot receives this response and maps it to sentiment
    categories such as “positive,” “neutral,” and “negative” based on score thresholds.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once all the records have been processed, the chatbot calls another API to write
    the sentiment values to the column of each respective record (row) in the Google
    Sheet.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This kind of implementation can be done with many chatbot platforms, such as
    Twnel, BotPress, VoiceFlow, ManyChat, Uchat, and others. Most of these tools offer
    visual builders, so users can just drag and drop components to create their automation.
  prefs: []
  type: TYPE_NORMAL
- en: Some of these tools have native integrations with Google Sheets to allow reading
    and writing from and to a given sheet. Others need the user to use other tools
    such as Zapier or Make to make the integrations.
  prefs: []
  type: TYPE_NORMAL
- en: Building conversational interfaces with LLM APIs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this section, we will create a chatbot that allows users to take pictures
    of invoices and save the structured data to a Google Sheet. For this chatbot,
    I will use Twnel, a messaging application that allows us to create conversational
    automations to automate processes with the extended supply chain. However, a similar
    implementation can be done with other chatbot builders, such as UChat, Botpress,
    and others.
  prefs: []
  type: TYPE_NORMAL
- en: 'The chatbot workflow for the chatbot that uses AI to structure unstructured
    text extracted from an image using OCR looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.2: Structuring data from an image chatbot flow](img/B21161_08_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.2: Structuring data from an image chatbot flow'
  prefs: []
  type: TYPE_NORMAL
- en: 'This chatbot uses AI to structure unstructured text extracted from an image
    using **optical character recognition** (**OCR**). The workflow is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: The user sends an image to the chatbot through a messaging platform. This platform
    needs to allow users to either upload existing images or take new pictures directly
    within the chatbot interface.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The chatbot uses an OCR API to extract the text from the image. This API takes
    the image URL as input and outputs the extracted text.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The chatbot then uses GPT-3.5 Turbo to structure and organize the unstructured
    text from the OCR step.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, the structured data is logged to a Google Sheet or a database.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For this chatbot, the messaging platform needs to allow users to send images
    within the conversational flow. In the next section, we’ll look at how to leverage
    the OpenAI GPT-3.5 Turbo API specifically for the text structuring step. Twnel
    provides easy integration to GPT-3.5 and Google Sheets, making it a good choice
    to build this kind of AI-powered data extraction chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: When calling the OpenAI GPT-3.5-Turbo API, you want to take the JSON response
    and transform it before returning it to your chatbot flow.
  prefs: []
  type: TYPE_NORMAL
- en: 'To simplify this, I wrote a Google Apps Script program that does the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Calls the GPT-3.5 API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Parses the JSON response
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Returns a modified JSON object
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This handles the transformations you need between the raw API output and your
    chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: You need to get an OCR API to get the freeform text from the image. All bot
    builders we’ve mentioned have connectors to read and write Google Sheets. If the
    one you use to try to implement a similar solution doesn’t have one, you can use
    Zapier, Make, or any other integration tool in the market for that.
  prefs: []
  type: TYPE_NORMAL
- en: 'In our example, I am using the following invoice:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.3: Sample invoice for our example](img/B21161_08_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.3: Sample invoice for our example'
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we are going to expand on what we started in [*Chapter 5*](B21161_05.xhtml#_idTextAnchor085),
    in the *Pattern matching in* *responses* section.
  prefs: []
  type: TYPE_NORMAL
- en: 'We could extract all the information from the invoice, including the products,
    or extract all the information, excluding the products. For this example, we only
    want to save the following data to a spreadsheet:'
  prefs: []
  type: TYPE_NORMAL
- en: Invoice number
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Date
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Due date
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Invoice to name
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Invoice to company
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Subtotal
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tax
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adjustments
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Total
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Thus, the JSON model would look something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Thus, the prompt would be as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This prompt is a little bit different from the one in [*Chapter 5*](B21161_05.xhtml#_idTextAnchor085)
    – it has been rewritten so that it can be used when calling the GPT-3.5 API.
  prefs: []
  type: TYPE_NORMAL
- en: We could call the OpenAI API directly and pass the corresponding parameters.
    However, to offer more flexibility, we will use Google Apps Script to make the
    OpenAI API call. Google Apps Script allows us to write JavaScript code in the
    backend without the need to create a backend per se. Then, we can create a webhook
    that we call from the chatbot using the `call_api` block.
  prefs: []
  type: TYPE_NORMAL
- en: The advantage of this approach is that we could generalize this to any invoice
    or document. The Google Apps Script code can read the JSON model for any document.
    Suppose we store the JSON model as text in a cell in a spreadsheet. We can get
    that text dynamically from the chatbot, as well as the text produced by the OCR.
    For complex cases that need more than just the JSON model, example inputs and
    outputs can also be stored in additional cells of the same spreadsheet. These
    examples will serve to train the LLM to generate better results.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Google Apps Script code is available at: [https://github.com/PacktPublishing/Unlocking-the-Secrets-of-Prompt-Engineering/tree/main](https://github.com/PacktPublishing/Unlocking-the-Secrets-of-Prompt-Engineering/tree/main)'
  prefs: []
  type: TYPE_NORMAL
- en: To run this code, you should open Google Sheets, go to **Extensions**, and then
    select **Apps Script**. This will open a new Google Apps Script project linked
    to the currently open Google Sheet. Next, copy each file from the repository into
    a new file on the Apps Script project. That’s all. The first time you try to run
    it, you will be asked to authenticate with your Google account.
  prefs: []
  type: TYPE_NORMAL
- en: The code defines a set of functions for handling HTTP POST requests, processing
    JSON data, and making requests to the OpenAI API for generating text content based
    on input data. The comments explain the purpose of each function and the steps
    involved in handling the request and generating AI-generated content.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, each call to the GPT-3.5 API is independent of other calls. Thus,
    we don’t need to keep context or short memory of the conversation. That’s why
    the `"messages": [{"role": "user", "content": prompt}]` array has only one message.'
  prefs: []
  type: TYPE_NORMAL
- en: It is also important to note that the JSON model has to be converted into a
    string before it can be passed to the prompt. Remember that LLMs deal with text
    (strings), so JSON objects or arrays may confuse them. That’s why we have `const
    jsonString = JSON.stringify(json)` on line 59.
  prefs: []
  type: TYPE_NORMAL
- en: Once the text has been structured using GPT-3.5, we can save the data to a Google
    Sheet.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the workflow in the Twnel Visual Bot Builder:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.4: Structuring data from OCR in the Twnel Visual Bot Builder](img/B21161_08_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.4: Structuring data from OCR in the Twnel Visual Bot Builder'
  prefs: []
  type: TYPE_NORMAL
- en: '*Steps 4* and *6* are not necessary. They have been included here to show the
    text produced by OCR and the JSON object with the structured data generated by
    GPT-3.5.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following figure shows the flow in action:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.5: Structuring data from an image chatbot in action](img/B21161_08_05.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.5: Structuring data from an image chatbot in action'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Google Sheet with the added row and its information can be seen here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.6: Data extracted in Google Sheets](img/B21161_08_06.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.6: Data extracted in Google Sheets'
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see, the structured data is saved to a row in a Google Sheet. It
    has been expanded with additional metadata, including the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Timestamp – when the image was taken
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Location – where the image was taken, along with its latitude and longitude
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The name of the user who took the picture
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The URL of the image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The raw text that was extracted from the image with OCR
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The flow shown here should be a part of a complete conversational automation
    process. In a real use case, the person providing the service should do some previous
    tasks, such as checking in at the location, documenting the tasks being performed,
    and more. That’s exactly the beauty of using generative AI in automations like
    this – it allows us to improve them in ways that were not possible before.
  prefs: []
  type: TYPE_NORMAL
- en: This type of chatbot flow has many applications. For instance, truck drivers
    can save data from receipts on expenses that require reimbursements, such as tolls,
    gas, truck repairs (fixing flat tires), meals, and hotel expenses, and more, it
    can save both truck drivers and administrative personnel a lot of time. In addition,
    it allows the drivers to be paid quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Building conversational interfaces with LLMs opens up new possibilities across
    many domains. One domain that stands to benefit tremendously is customer service.
    In the next section, we’ll focus on crafting generative AI chatbots tailored to
    customer support needs.
  prefs: []
  type: TYPE_NORMAL
- en: How to use AI for customer support
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Chatbots powered by generative AI present new opportunities to transform customer
    service interactions. Unlike rule-based chatbots of the past, generative models
    can have more natural, human-like conversations. With proper training data and
    prompt engineering, they can understand nuanced customer questions and provide
    helpful answers.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples of how generative AI chatbots can be used for customer
    service:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answering common FAQs on a company website**: The chatbot could field frequently
    asked questions about products, services, account access, shipping times, returns,
    and more. This deflects simple inquiries:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generative AI can parse questions expressed in many different ways and match
    them to the appropriate stored answer. It’s more flexible than a rigid bot that
    requires precise phrasing.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can be trained on past customer service transcripts to learn common
    question variations rather than manually encoding rules.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: For uncommon questions, the bot can use its language generation capabilities
    to provide helpful fallback responses.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Providing product support and troubleshooting**: The chatbot can use product
    specs and manuals to help customers diagnose issues with appliances, electronics,
    software, and more and guide them to solutions:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generative models allow the bot to have a free-flowing diagnostic conversation
    rather than a rigid tree-based flow
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can ingest product documentation and manuals to develop a deeper understanding
    and suggest better troubleshooting
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can recommend solutions tailored to the specific product model and issue
    based on its training
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assisting with account management**: The chatbot can access a company’s CRM
    system to help customers pull up account details, check order status, update information,
    cancel subscriptions, and more:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By integrating with CRM systems, generative bots can access and understand customer
    account data to resolve a wide range of requests
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Having the full account context enables the bot to have more personalized and
    contextual conversations
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can use past account management transcripts to learn without manual
    scripting of flows
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Making restaurant reservations**: The chatbot can accept dates/times, party
    sizes, and contact information and confirm reservations at restaurants:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generative models can understand nuances in date, time, party size, and other
    booking details provided in natural language
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can integrate with a restaurant’s reservation systems rather than just
    a standalone bot flow
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Past conversations can train the bot to ask clarifying questions to complete
    bookings smoothly
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Booking travel**: A travel chatbot can suggest destinations, check availability,
    and book flights, hotels, and rental cars based on customer criteria:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can suggest personalized destinations and travel recommendations based
    on customer needs and preferences
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Generative AI can search across many travel provider systems to find optimal
    flight/hotel/rental options
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can learn to handle complex and multi-leg travel itineraries that require
    several back-and-forth exchanges
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Processing insurance claims**: An insurance chatbot can take initial claim
    information, assign a claim number, initiate processing, and answer questions
    for customers:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By integrating with insurance systems, the bot has full claim context for more
    tailored conversations
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Customers can describe claims in everyday language rather than in rigid forms
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can ask clarifying questions learned from past claim interactions to
    get all the necessary details
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Serving as an HR virtual assistant**: An HR chatbot can answer employee questions
    about benefits, time-off requests, company policies, and more:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Employees can ask a wide range of HR policy, benefits, payroll, and other questions
    naturally
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The bot can leverage HR knowledge bases and handbooks to better address questions
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: User conversations can continuously improve the bot’s capabilities over time
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The possibilities are vast when using a well-designed generative AI chatbot
    that is tailored to a specific customer service domain. The key is providing relevant
    training data so that it can handle a wide range of customer needs and requests.
  prefs: []
  type: TYPE_NORMAL
- en: In the next two sections, we will explore a couple of scenarios to show how
    generative AI-powered chatbots can improve the user experience for cases like
    the ones we just described.
  prefs: []
  type: TYPE_NORMAL
- en: To ingest content from multiple documents, we need to add some additional layers
    to our solutions. This will be covered in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Case study – a chatbot using AI to assist users in ordering products
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Chatbots have become a popular way for companies to assist with tasks such as
    placing orders. In this section, we will examine a case study of a chatbot created
    by the fictional company Herencia Inc., which produces artisanal beers, to help
    convenience store owners purchase different types of beers on Herencia’s website
    or chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: An LLM can assist buyers when ordering products, provided it has access to the
    specs, prices, and other relevant information. One limitation when using the LLM
    API (GPT-4 or Claude API) is the number of tokens that it has available to load
    the data directly into the prompt. In the next chapter, we will explore how that
    can be solved for more complex scenarios through plugins or managing embeddings
    and integrations with vector databases.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some of the tasks that such a chatbot can perform are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Product recommendations**: An LLM can analyze a buyer’s requirements, preferences,
    and budget to suggest the most suitable products for their needs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Product comparison**: An LLM can help buyers compare different products based
    on their features, specifications, and prices, enabling them to make informed
    decisions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customization options**: If a company offers customizable products, an LLM
    can guide buyers through the customization process, ensuring that they select
    the best options to meet their requirements'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Frequently asked questions**: An LLM can answer common questions about products,
    such as warranty information, return policies, and shipping options, making the
    purchasing process more convenient for buyers'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Price negotiation**: In cases where price negotiation is possible, an LLM
    can provide buyers with negotiation tips and strategies based on the product’s
    value and market trends'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Order tracking**: An LLM can be integrated with the company’s order management
    system to provide buyers with real-time updates on order status and expected delivery
    times'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Upselling and cross-selling**: An LLM can identify related or complementary
    products that buyers might be interested in'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For this example, we are not going to deal with embeddings or vector databases.
    Hence, we will use a simple scenario to show how a chatbot can be used to order
    beer. For our simple case, let’s suppose Herencia, our fictitious company, offers
    four types of beer: Lager, IPA, Stout, and Wheat. Here are the packaging options
    and prices for each:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Beer type** | **12-pack cans** | **24-pack cans** | **12-pack bottles**
    | **24-pack bottles** |'
  prefs: []
  type: TYPE_TB
- en: '| Lager | $15 | $28 | $16 | $30 |'
  prefs: []
  type: TYPE_TB
- en: '| IPA | $18 | $34 | $20 | $38 |'
  prefs: []
  type: TYPE_TB
- en: '| Stout | $20 | $38 | $22 | $42 |'
  prefs: []
  type: TYPE_TB
- en: '| Wheat |  |  | $18 | $34 |'
  prefs: []
  type: TYPE_TB
- en: 'Table 8.1: Herencia products for ordering beer – chatbot flow'
  prefs: []
  type: TYPE_NORMAL
- en: 'If we were to simulate this with ChatGPT, Bard, or Claude (in the playground),
    we would need to provide this list of products to the LLM with clear instructions
    about the goal: assisting users in buying beer.'
  prefs: []
  type: TYPE_NORMAL
- en: Thus, the prompt will be something like this.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: And here’s the response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Here’s the next prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: And here’s the response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: And here’s the next prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: And here’s the response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: This works fine, but we need to provide this kind of interaction using a chatbot
    that can be exposed to all or at least most potential customers. Otherwise, it
    does not make any sense.
  prefs: []
  type: TYPE_NORMAL
- en: When integrating an LLM into a chatbot using the LLM API, one important thing
    to remember is that the chatbot flow developer must ensure they keep the memory
    of the conversation, to manage context. When using ChatGPT or an LLM through its
    playground, the LLM vendor keeps that short memory for us.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the previous example, we saw that the GPT-3.5/ 4 API has a parameter called
    `messages`, which is an array:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: In this case, each time we call the API, after each response from the user,
    we need to pass the previous messages in the array so that GPT-3.5/4 can keep
    context and manage short-term memory.
  prefs: []
  type: TYPE_NORMAL
- en: 'The flow looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.7: Order beer chatbot flow](img/B21161_08_07.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.7: Order beer chatbot flow'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the workflow in the Twnel Visual Bot Builder:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.8: Flow in the Twnel Visual Bot Builder](img/B21161_08_08.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.8: Flow in the Twnel Visual Bot Builder'
  prefs: []
  type: TYPE_NORMAL
- en: '*Step 1* includes a greeting and asks the user what they want to order. In
    *Steps 2* and *4*, a JavaScript function is called. This function keeps the messages
    array with the whole history of the conversation. This function just adds the
    last message object: `{"role": "system", "content":system_ prompt} to the array`
    `of messages`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In *Step 3*, we call the OpenAI API directly. *Figure 8**.9* shows how to set
    up the headers:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B21161_08_09.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.9: Call API in Twnel’s Visual Bot Builder – setting the headers'
  prefs: []
  type: TYPE_NORMAL
- en: '*Figure 8**.10* shows the request URL to the OpenAI chat API and the body with
    the required parameters – that is, the model and the array of messages in the
    conversation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B21161_08_10.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.10: Request data in the call API block in Twnel’s Visual Bot Builder'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following figure shows the chat flow in action:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B21161_08_11.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.11: Ordering beer chatbot – flow in action'
  prefs: []
  type: TYPE_NORMAL
- en: In *Step 5*, the user reads the response and can answer back to refine the order.
    The user message is added to the messages array (*Step 2*) and the flow continues
    the cycle until the order is complete.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing this flow in a chatbot that anyone can access makes this approach
    very useful. We could add more steps to call an API that interacts with the inventory
    of Herencia beers to check for availability. Likewise, we could check the credit
    standing and limits for when the store owner is going to pay. Next, the user can
    be presented with options to place the order and, depending on the credit terms
    and balance, ask to pay directly from the chatbot. Finally, once the order has
    been finalized, it can be saved into an orders database and a tracking link can
    be generated so that the user can track the delivery.
  prefs: []
  type: TYPE_NORMAL
- en: With that, you’ve seen how you can ask the LLM to produce the result in JSON.
    Thus, in this case, we can ask the prompt to generate a JSON that includes a text
    element, with the full (text) response as shown in *Figure 8**.11* to be presented
    in a familiar way to the user, and an array element, with every item and quantity
    that is on the order.
  prefs: []
  type: TYPE_NORMAL
- en: Calling LLM APIs such as OpenAI directly in a chatbot has some limitations.
    The number of tokens allowed per API request is restricted, which caps the amount
    of product data a chatbot can handle in one flow. Even as token allowances increase,
    high usage still drives up costs.
  prefs: []
  type: TYPE_NORMAL
- en: A better approach involves using tools such as LangChain, which can chain prompts
    across multiple requests and create specialized agents. We’ll explore this in
    the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Shifting domains, chatbots that leverage LLMs can also enable more interactive
    and adaptive quizzes. As the next case study shows, conversational AI permits
    customizing questionnaires and analyzing free-form responses.
  prefs: []
  type: TYPE_NORMAL
- en: Case study – creating interactive quizzes/assessments and deploying them as
    chatbot flows
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Chatbots present an interesting opportunity for creating dynamic, conversational
    assessments and quizzes. Using LLMs, chatbots can be designed to guide users through
    interactive questioning, understand free-form responses, and provide personalized
    feedback.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we’ll explore a case study of a financial advisory chatbot
    that conducts a risk assessment quiz to gauge a client’s risk tolerance for investment
    purposes. The chatbot has been built to automate part of their client onboarding
    process. By administering a risk quiz through natural conversation, the chatbot
    can evaluate a client’s responses and determine their risk profile.
  prefs: []
  type: TYPE_NORMAL
- en: The designed dialogue flows to mimic a human advisor asking questions about
    the client’s feelings on investment risks. The chatbot can interpret unstructured
    answers and adapt quiz questions based on the client’s responses. After completing
    the assessment, the chatbot saves the summarized risk profile so that a human
    financial advisor can make appropriate investment recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: Examining this case study demonstrates how conversational AI can gather key
    client data through dynamic questioning.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two possible ways to use an LLM for this case:'
  prefs: []
  type: TYPE_NORMAL
- en: Use the LLM to create the same questions for all participants. This can be done
    once using ChatGPT, Bard, or other similar tools. Then, create a tree-based chatbot
    to ask the users the questions and, in the end, call an LLM API to make the assessment
    based on the responses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The chatbot uses the LLM API to ask the AI to generate the questions dynamically
    for each user and at the end makes an assessment based on the answers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Both approaches are valid.
  prefs: []
  type: TYPE_NORMAL
- en: The first approach is simpler to implement since it isn’t a conversation with
    the LLM, although there is interactivity in the conversation with the chatbot
    itself. The LLM API is called just once (when asking for the assessment), so there
    is no need to resend the previous messages whenever a new interaction happens.
    Because of that, it is also less expensive to run. Furthermore, the assessment
    is more consistent among users.
  prefs: []
  type: TYPE_NORMAL
- en: The second approach, on the other hand, can produce a better result if the following
    questions depend on the answers to the previous ones.
  prefs: []
  type: TYPE_NORMAL
- en: For this example, we will explore the second case.
  prefs: []
  type: TYPE_NORMAL
- en: Before exploring how to implement a chatbot to assist financial advisors in
    risk assessment, let’s simulate the flow directly in an LLM playground such as
    ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will ask the LLM to use the **Mutually Exclusive, Collectively Exhaustive**
    (**MECE**) framework. The MECE framework is a concept that’s commonly used in
    problem-solving and structuring information in various fields such as management
    consulting, business analysis, and project management. MECE is a structured way
    of organizing and categorizing information to ensure clarity and comprehensiveness.
    Here’s what each part of MECE means:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mutually Exclusive**: This means that the categories or elements you define
    should not overlap. In other words, each piece of information or data should fit
    into only one category and should not belong to more than one category. This ensures
    that you avoid double-counting or confusion.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Collectively Exhaustive**: This means that when you combine all the categories
    or elements, they should cover the entire spectrum of possibilities without any
    gaps. There should be no missing or unaccounted-for items. This ensures completeness
    and that you’ve considered all relevant aspects of the problem or situation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you apply the MECE framework, you create a clear and organized structure
    for analyzing and solving problems, making decisions, or presenting information.
    It helps you break down complex issues into manageable parts and ensures that
    you’re not overlooking critical factors or making redundant distinctions. MECE
    is often used in tasks such as market segmentation, process improvement, project
    planning, and problem-solving exercises.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, creating a MECE framework involves breaking down a problem or a
    set of information into categories or groups that meet the criteria of being mutually
    exclusive and collectively exhaustive. This structured approach can lead to more
    effective decision-making and problem-solving by providing a clear and comprehensive
    view of the situation.
  prefs: []
  type: TYPE_NORMAL
- en: To create an interactive quiz using a chatbot, you need to provide an initial
    prompt to an AI assistant to generate the quiz questions and response options.
    This initial prompt will instruct the AI to act as a financial advisor and suggest
    a personalized investment strategy based on your responses. You should provide
    other instructions, as shown in this example.
  prefs: []
  type: TYPE_NORMAL
- en: Here is the initial prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: And here’s the response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Here’s the next prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The bot keeps asking questions and expecting answers. After the answer to the
    last question is received by the flow, it produces a response similar to this.
  prefs: []
  type: TYPE_NORMAL
- en: 'Response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'The chatbot flow in this case is very similar to the previous case:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B21161_08_12.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.12: Financial advisor assistant chatbot flow'
  prefs: []
  type: TYPE_NORMAL
- en: The only difference between this flow and the previous one is that after the
    initial message when activating the flow, we call the OpenAI API and then we add
    the response to the `messages` array.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, the user can answer `a`, `b`, `c`, or `d`, or the `text` option.
    We can refine the chatbot flow so that the answer plus options is returned as
    a JSON object, like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: The `answers` parameter happens to be in the format accepted by Twnel to render
    buttons when the input type is `checkbox`. However, after the tenth question,
    the LLM won’t return another question in JSON; instead, it will return a text
    recommendation. Thus, we need to modify the flow to accommodate that case, checking
    whether or not `response_type` from the LLM is a question or an assessment. We
    don’t care about that for this example. What’s important to know is that these
    conversational automation tools provide options to simplify user interaction.
  prefs: []
  type: TYPE_NORMAL
- en: The OpenAI GPT-3.5 and GPT-4 APIs have a feature called function calling. This
    feature allows you to describe functions to the AI models. The models can then
    generate JSON output that contains arguments to call those functions.
  prefs: []
  type: TYPE_NORMAL
- en: This enables the models to intelligently choose the outputs of the functions
    you describe.
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to understand that the ChatCompletions model itself does not
    execute functions. Instead, it generates a JSON payload that you can use to call
    the function separately.
  prefs: []
  type: TYPE_NORMAL
- en: This topic is outside the scope of this book but suffice it to say that the
    GPT3.5/4 API allows you to chain functions and reroute them according to the output
    received. We use this in this case as we want to render buttons for the four options
    after each question but render just a message when providing the assessment.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what the flow looks like in action:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](img/B21161_08_13.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8.13 : Financial advisor assistant chatbot flow in action'
  prefs: []
  type: TYPE_NORMAL
- en: This case study demonstrates how LLMs can enable conversational AI agents such
    as chatbots to dynamically create interactive assessments, as exemplified by a
    financial chatbot administering personalized risk quizzes, bringing us to the
    end of this exploration on leveraging AI for chatbot conversations.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Chatbots powered by LLMs such as GPT-3/4 and Claude are transforming conversational
    AI and enabling more natural, human-like digital experiences. As demonstrated
    through the examples detailed in this chapter, these powerful generative models
    allow bots to truly understand natural language, hold free-flowing conversations
    with users, and complete sophisticated workflows from commerce transactions to
    personalized assessments.
  prefs: []
  type: TYPE_NORMAL
- en: The key to unlocking their capabilities is thoughtful prompt engineering. Developers
    can inject critical context, domain knowledge, business logic, data sources, and
    more into the prompts to shape the bot’s behavior. While interacting in the playground
    provides a glimpse of the potential, custom solutions built on LLM APIs open up
    many more possibilities.
  prefs: []
  type: TYPE_NORMAL
- en: These AI-powered chatbots maintain conversation state and memory, integrate
    with backend systems, optimize performance based on user interactions, and deploy
    seamlessly across platforms. They deliver immense value by automating key processes
    through natural dialogue – whether it’s customer service, e-commerce, travel booking,
    or other workflows.
  prefs: []
  type: TYPE_NORMAL
- en: While this chapter focused on core chatbot use cases, the next chapter will
    dig deeper into LangChain and other tools that augment LLMs for even more advanced
    conversational AI applications. We’ll explore chaining prompts, ingesting documents
    as embeddings, crafting purpose-built agents, and more.
  prefs: []
  type: TYPE_NORMAL
