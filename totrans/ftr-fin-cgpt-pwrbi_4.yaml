- en: '4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: John Deere’s AgTech Revolution – AI Insights and Challenges
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 约翰·迪尔农业技术革命——AI洞察与挑战
- en: '[*Chapter 3*](B21008_03.xhtml#_idTextAnchor065) delved into the exciting intersection
    of trading, AI, and data visualization. We navigated through the complexities
    of financial analysis using Tesla as a case study. By leveraging Python, we extracted
    data from diverse sources, setting the stage for Power BI’s visual storytelling
    capabilities. We demonstrated how Power BI can transform raw data into an intuitive
    scatter plot, highlighting crucial relationships in Tesla’s vehicle range and
    charging time. We also confronted the critical issue of **artificial intelligence**
    (**AI**) bias, discussing its implications in finance and AI-driven tools.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第3章*](B21008_03.xhtml#_idTextAnchor065) 深入探讨了交易、人工智能和数据可视化的激动人心的交汇点。我们以特斯拉为案例研究，通过其复杂性进行财务分析。利用Python，我们从各种来源提取数据，为Power
    BI的视觉叙事功能奠定了基础。我们展示了Power BI如何将原始数据转化为直观的散点图，突出了特斯拉车辆续航和充电时间中的关键关系。我们还面对了**人工智能**（**AI**）偏差这一关键问题，讨论了其在金融和AI驱动工具中的影响。'
- en: '[*Chapter 4*](B21008_04.xhtml#_idTextAnchor094) unfolds an exciting journey
    into the future of financial analysis, where AI, sophisticated financial metrics,
    and intuitive data visualization intertwine to unlock new levels of insights and
    efficiency. As we delve deeper into this chapter, we will explore advanced financial
    analysis techniques, discuss the transformative role of AI and ChatGPT in financial
    analysis, and see how data visualization with Power BI can bring your data to
    life. We will also introduce you to AutoGPT, an autonomous extension of ChatGPT,
    and provide Python code examples for various financial analysis tasks. Each step
    of the journey will be punctuated with real-world examples and case studies, bringing
    the concepts to life and providing you with practical tools to enhance your financial
    analysis skills.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[*第4章*](B21008_04.xhtml#_idTextAnchor094) 展开了一段激动人心的旅程，深入到财务分析的未来，在那里人工智能、复杂的财务指标和直观的数据可视化交织在一起，以解锁新的洞察力和效率水平。随着我们深入这一章节，我们将探索高级财务分析技术，讨论人工智能和ChatGPT在财务分析中的变革性作用，并了解如何使用Power
    BI进行数据可视化可以使数据生动起来。我们还将向您介绍AutoGPT，这是ChatGPT的自主扩展，并提供各种财务分析任务的Python代码示例。旅程的每一步都将由现实世界的例子和案例研究点缀，使概念生动起来，并为您提供实用的工具来提高您的财务分析技能。'
- en: 'The following key topics will be covered in this chapter:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖以下关键主题：
- en: '**Advanced financial analysis techniques**: Diving into financial ratios, metrics,
    and valuation methods'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级财务分析技术**：深入研究财务比率、指标和估值方法'
- en: '**Incorporating AI and ChatGPT into financial analysis**: Unveiling the power
    of AI in complex calculations, forecasts, and risk assessments'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将AI和ChatGPT融入财务分析**：揭示人工智能在复杂计算、预测和风险评估中的力量'
- en: '**Data visualization with Power BI**: Transforming raw financial data into
    intuitive, insightful visualizations'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用Power BI进行数据可视化**：将原始财务数据转化为直观、有洞察力的可视化'
- en: '**Introducing AutoGPT**: Exploring this autonomous AI’s applications in the
    world of financial analysis'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**介绍AutoGPT**：探索这种自主人工智能在财务分析领域的应用'
- en: '**Python code examples for financial analysis**: Providing hands-on experience
    with coding for financial tasks'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python代码示例用于财务分析**：提供实际操作经验，用于财务任务的编码'
- en: '**Dealing with hallucinations in language models**: A guide to understanding
    and minimizing AI “hallucinations”'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**处理语言模型中的幻觉**：了解和最小化AI“幻觉”的指南'
- en: This isn’t the usual suspect of Silicon Valley or Wall Street, but rather the
    vast expanses of farmlands and construction sites. Welcome to the world of John
    Deere, a pioneer who merged the physical and digital worlds to redefine the agriculture
    industry.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是硅谷或华尔街的常见嫌疑人，而是广阔的农田和建筑工地。欢迎来到约翰·迪尔的世界，他是将物理世界和数字世界融合在一起，重新定义农业行业的先驱。
- en: In this chapter, we’ll be rolling up our sleeves and taking a deep dive into
    John Deere’s sprawling operations, known for their seamless blend of machinery
    with advanced tech innovations. As we embark on this adventure, you’ll realize
    that beneath the green and yellow exterior, John Deere is more akin to a tech
    firm than a conventional agriculture company. With a lineup of advanced technologies
    including precision agriculture, autonomous equipment, data analysis, and AI-driven
    computer vision, Deere is at the forefront of the agriculture sector’s digital
    transformation.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将卷起袖子，深入探索约翰·迪尔（John Deere）庞大的运营业务，以其将机械与先进技术革新无缝融合而闻名。随着我们踏上这次冒险之旅，你会发现，在这绿色和黄色的外表之下，约翰·迪尔更像是一家科技公司，而不是传统的农业公司。凭借包括精准农业、自主设备、数据分析以及人工智能驱动的计算机视觉在内的一系列先进技术，迪尔在农业领域的数字化转型中处于领先地位。
- en: 'So, why should you tech-savvy readers care about John Deere and the agriculture
    industry? The answer is simple: the same technological trends that have disrupted
    sectors such as retail, media, and finance are now stirring up the fields of agriculture.
    A tech revolution is quietly brewing in the heartland, and companies like John
    Deere are leading the charge. If you’re intrigued by innovation and digital disruption,
    then this unlikely sector holds an untapped reservoir of opportunities and insights.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么你们这些技术娴熟的读者应该关心约翰·迪尔和农业行业呢？答案很简单：那些颠覆了零售、媒体和金融等领域的相同技术趋势，现在正在农业领域掀起波澜。一场技术革命正在内陆地区悄然酝酿，而像约翰·迪尔这样的公司正在引领这场变革。如果你对创新和数字颠覆感兴趣，那么这个看似不可能的领域蕴藏着未被开发的机遇和见解。
- en: Digitizing the fields – unleashing a tech revolution with John Deere
  id: totrans-14
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数字化田野——与约翰·迪尔一起释放技术革命
- en: John Deere’s diverse operations and its substantial presence in various sectors
    such as agriculture, construction, forestry, and turf care will give you a more
    comprehensive view of different financial ratios and metrics. Deere’s long financial
    history, consistent profitability, and varied product segments can provide ample
    data for exploring these advanced metrics and their applicability in real-world
    situations. Deere’s recent emphasis on technological advancements and sustainability
    efforts can also introduce discussions around ESG metrics, which are becoming
    increasingly relevant in financial analysis.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·迪尔多样化的运营及其在农业、建筑、林业和草坪护理等各个领域的显著存在，将为您提供一个更全面的视角，了解不同的财务比率和指标。迪尔长期稳定的财务历史、持续盈利和多样化的产品细分，可以为探索这些高级指标及其在现实世界中的应用提供充足的数据。迪尔最近对技术进步和可持续性努力的重视，还可以引发关于ESG指标（环境、社会和治理指标）的讨论，这些指标在财务分析中变得越来越相关。
- en: 'John Deere’s recent investments in AI and autonomous technologies make it a
    compelling choice for this section. The company is actively incorporating AI in
    its operations – from smart, self-driving tractors to predictive maintenance algorithms:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·迪尔在人工智能和自主技术方面的最新投资使其成为本节的一个引人注目的选择。该公司正在积极地将人工智能融入其运营中——从智能、自动驾驶的拖拉机到预测性维护算法：
- en: '**Precision agriculture**: John Deere’s technology suite allows farmers to
    use GPS data and automated steering to maximize yields and reduce wasted seed,
    fertilizer, and fuel. This is an application of AI in which algorithms process
    data to make specific recommendations and control machinery.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**精准农业**：约翰·迪尔的技术套件允许农民使用GPS数据和自动转向来最大化产量并减少浪费的种子、肥料和燃料。这是人工智能的一个应用，其中算法处理数据以提供具体建议并控制机械。'
- en: '**Autonomous equipment**: John Deere has developed and continues to refine
    autonomous tractors and other equipment. These machines can perform tasks without
    human intervention, using AI to navigate the field, avoid obstacles, and optimize
    task performance.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自主设备**：约翰·迪尔开发和持续改进自主拖拉机和其他设备。这些机器可以在没有人为干预的情况下完成任务，利用人工智能在田间导航、避开障碍物并优化任务性能。'
- en: '**Data analysis**: The John Deere Operations Center allows farmers to collect
    and analyze data about their operations. Machine learning algorithms process this
    data to provide insights into crop health, soil conditions, and equipment performance.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据分析**：约翰·迪尔运营中心允许农民收集和分析其运营数据。机器学习算法处理这些数据，以提供关于作物健康、土壤条件和设备性能的见解。'
- en: '**Computer vision**: John Deere uses AI-based computer vision technology for
    tasks such as identifying weeds for precise pesticide application, reducing the
    number of chemicals used, and increasing crop yield.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算机视觉**: 约翰·迪尔使用基于人工智能的计算机视觉技术，用于诸如识别杂草以进行精确农药应用等任务，减少使用的化学物质数量，并提高作物产量。'
- en: While John Deere is a leader in this space, it’s worth noting that there are
    other companies in the agriculture industry also making significant advancements
    in AI, such as AGCO (which owns brands such as Massey Ferguson and Fendt) and
    CNH Industrial (which owns brands such as Case IH and New Holland Agriculture).
    Startups such as Blue River Technology (acquired by John Deere), Farmers Edge,
    and Granular are also innovating in this space.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然约翰·迪尔在这一领域处于领先地位，但值得注意的是，农业行业还有其他公司也在人工智能方面取得了重大进展，例如AGCO（拥有马斯西·弗格森和芬特等品牌）和CNH工业（拥有凯斯·伊赫和纽荷兰农业等品牌）。像Blue
    River Technology（被约翰·迪尔收购）、Farmers Edge和Granular这样的初创公司也在这一领域进行创新。
- en: John Deere is a global leader in the agriculture and construction equipment
    industry, with a strong brand and a long history of innovation. But like any company,
    it has its strengths and weaknesses and faces a variety of opportunities and challenges.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·迪尔是全球农业和建筑设备行业的领导者，拥有强大的品牌和悠久的历史创新。但像任何公司一样，它也有其优势和劣势，面临着各种机遇和挑战。
- en: '| **Strengths** | **Weaknesses** |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
  zh: '| **优势** | **劣势** |'
- en: '| **Strong brand and market position**: John Deere is a trusted brand known
    for its quality, reliability, and durability. The company has a significant market
    share in many of its key product categories. | **Dependence on economic conditions**:
    As a manufacturer of heavy machinery, John Deere’s sales can be significantly
    affected by economic conditions. In particular, the health of the farming sector
    is crucial to their sales, and this can be influenced by factors outside their
    control such as weather, commodity prices, and trade policies. |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
  zh: '| **强大的品牌和市场地位**: 约翰·迪尔是一个值得信赖的品牌，以其质量、可靠性和耐用性而闻名。该公司在其许多关键产品类别中拥有显著的市场份额。
    | **对经济条件的依赖**: 作为重型机械制造商，约翰·迪尔的销售额可能会受到经济条件的重大影响。特别是，农业部门的健康状况对其销售至关重要，而这可能受到他们无法控制的因素的影响，如天气、商品价格和贸易政策。
    |'
- en: '| **Innovation and technology**: John Deere has made significant investments
    in technology and innovation. It has pioneered precision agriculture, which uses
    technology and data to help farmers improve productivity and efficiency. | **Supply
    chain challenges**: Like many manufacturers, John Deere faces challenges related
    to supply chain management. Disruptions in the supply chain can delay production
    and increase costs. |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
  zh: '| **创新与技术**: 约翰·迪尔在技术创新上投入了大量资金。它开创了精准农业，该技术利用技术和数据帮助农民提高生产力和效率。 | **供应链挑战**:
    与许多制造商一样，约翰·迪尔面临着与供应链管理相关的挑战。供应链中断可能会延误生产并增加成本。 |'
- en: '| **Diversified business**: John Deere’s business is diversified across different
    product lines and geographies. This diversification helps to mitigate risks related
    to any one particular market or product. |  |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
  zh: '| **多元化业务**: 约翰·迪尔的业务在多个产品线和地理区域上实现了多元化。这种多元化有助于减轻与任何特定市场或产品相关的风险。 |  |'
- en: Future opportunities and predictions
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来机遇和预测
- en: 'As for the future, John Deere’s focus on technology and innovation is likely
    to continue, and the following areas could be important for their growth:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 关于未来，约翰·迪尔对技术和创新的关注可能会持续下去，以下领域可能对其增长至关重要：
- en: '| **Future opportunities** | **Predictions** |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
  zh: '| **机遇** | **预测** |'
- en: '| Smart farming | The use of digital technology and data analytics in agriculture
    will increase agricultural production, and improve the efficiency and sustainability
    of farming practices. Predictive analytics, automation, IoT, and AI are some of
    the tools that will define this field. John Deere’s investments in precision agriculture
    are likely to continue. |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| **智能农业**: 在农业中使用数字技术和数据分析将提高农业生产，并改善农业实践的效率和可持续性。预测分析、自动化、物联网和人工智能是该领域的定义工具。约翰·迪尔在精准农业上的投资可能会持续下去。
    |'
- en: '| Electric and autonomous vehicles | With the growing interest in sustainable
    and efficient farming practices, the adoption of electric and autonomous tractors
    and other farming equipment will likely increase. John Deere showcased a fully
    autonomous tractor concept, indicating its capabilities in this area. |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| 电动和自动驾驶车辆 | 随着对可持续和高效农业实践的日益关注，电动和自动驾驶拖拉机以及其他农业设备的采用可能会增加。约翰·迪尔（John Deere）展示了一个完全自动驾驶的拖拉机概念，表明其在该领域的实力。|'
- en: '| Expansion in emerging markets | Emerging markets such as India, Brazil, and
    parts of Africa have large agricultural sectors and could represent significant
    growth opportunities for John Deere. |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| 在新兴市场的扩张 | 印度、巴西以及非洲部分地区等新兴市场拥有庞大的农业部门，可能为约翰·迪尔提供巨大的增长机会。|'
- en: According to a report by **Market Research Future** (**MRFR**), the smart farming
    industry is projected to grow significantly. By 2022, it’s anticipated to be worth
    approximately 2 billion dollars, showcasing a robust growth rate of 14% from 2016
    to 2022\. This statistic indicates that there is a large potential market for
    John Deere’s smart farming technology.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 根据**市场研究未来**（**MRFR**）的报告，智能农业行业预计将显著增长。到2022年，预计其价值将达到约20亿美元，从2016年到2022年显示出14%的强劲增长率。这一统计数据表明，约翰·迪尔（John
    Deere）的智能农业技术市场潜力巨大。
- en: Moreover, according to Reports and Data, the global electric agriculture equipment
    market is expected to reach USD 15.3 billion by 2027, at a CAGR of 9.8%. John
    Deere’s innovation in electric and autonomous vehicles places it in a good position
    to capitalize on this trend.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，根据报告和数据，全球电动农业设备市场预计到2027年将达到153亿美元，年复合增长率（CAGR）为9.8%。约翰·迪尔在电动和自动驾驶车辆方面的创新使其能够充分利用这一趋势。
- en: To sum up, John Deere needs to continue investing in technology and innovation
    to maintain its competitive edge and manage its supply chain to ensure it can
    meet demand efficiently. Its diversification strategy should also help it navigate
    the uncertainties and challenges of the global economic environment. It’s important
    to note that these predictions are based on the current market trends and John
    Deere’s strategic directions, and actual outcomes can vary based on various factors.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，约翰·迪尔需要继续投资于技术和创新，以保持其竞争优势并管理供应链，确保其能够高效地满足需求。其多元化战略也有助于其应对全球经济环境中的不确定性和挑战。重要的是要注意，这些预测基于当前市场趋势和约翰·迪尔的战略方向，实际结果可能因各种因素而有所不同。
- en: 'As we pivot to a bird’s-eye view of the competitive landscape, this section
    shines a light on the major players in the **agricultural technology** (**AgTech**)
    world: John Deere, Climate Corporation (owned by Bayer), and Farmers Edge.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们从宏观的角度审视竞争格局时，本节将聚焦于农业技术（**AgTech**）领域的的主要参与者：约翰·迪尔、气候公司（由拜耳公司拥有）和农民边缘公司（Farmers
    Edge）。
- en: John Deere’s prowess in blending hardware with innovative technology is unparalleled,
    while Climate Corporation and Farmers Edge are making waves with their data-driven
    platforms, using AI and **machine learning** (**ML**) to transform raw data into
    actionable farming insights.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·迪尔在将硬件与创新技术相结合方面的实力无与伦比，而气候公司和农民边缘公司则凭借其数据驱动平台掀起波澜，利用人工智能和**机器学习**（**ML**）将原始数据转化为可操作的农业见解。
- en: This comparative analysis navigates through their varied product portfolios,
    core strengths, competitive dynamics, and AI/ML utilization, offering a comprehensive
    understanding of the AgTech realm. The information distilled in this section will
    enable you to gauge the robustness of their AI and ML capabilities and help you
    understand the complexities of this rapidly evolving industry.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这项比较分析深入探讨了他们的各种产品组合、核心优势、竞争动态以及人工智能/机器学习（AI/ML）的应用，为农业科技领域提供了一个全面的理解。本节中提炼的信息将使您能够评估他们的AI和ML能力的稳健性，并帮助您理解这个快速发展的行业的复杂性。
- en: Digital seedbed – a comparative analysis of AgTech titans
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数字化苗床 – 对农业科技巨头进行比较分析
- en: 'John Deere, Climate Corporation (a subsidiary of Bayer), and Farmers Edge are
    all significant players in the AgTech space, but they have different areas of
    focus and offerings:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·迪尔、气候公司（拜耳公司的子公司）和农民边缘公司都是农业科技领域的显著参与者，但它们有不同的重点和产品提供：
- en: '**John Deere**: John Deere has a broad product range that includes tractors,
    harvesters, sprayers, and other farm equipment. They’ve also invested heavily
    in precision agriculture with their John Deere Operations Center, which offers
    farm planning, equipment monitoring, and field data analysis. They’re known for
    their high-quality, durable equipment and how they integrate technology into their
    machinery. John Deere’s main strength lies in its ability to manufacture heavy
    farm machinery integrated with sophisticated software and data analysis tools.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**约翰·迪尔**：约翰·迪尔拥有广泛的产品线，包括拖拉机、收割机、喷雾器和其它农业设备。他们还通过约翰·迪尔运营中心在精准农业方面进行了大量投资，该中心提供农场规划、设备监控和田间数据分析。他们以高质量、耐用的设备和将技术集成到机械中的能力而闻名。约翰·迪尔的主要优势在于其制造重型农业机械的能力，这些机械集成了复杂的软件和分析工具。'
- en: '**Climate Corporation (Owned by Bayer)**: Climate Corporation primarily provides
    digital agriculture services through their Climate FieldView platform. This platform
    uses data science, ML, and AI to deliver insights that help farmers improve productivity,
    sustainability, and economic profitability. Their main strength lies in their
    comprehensive and granular field and weather data analysis, which allows farmers
    to make more precise decisions about planting, fertilizing, and harvesting. However,
    they do not manufacture machinery like John Deere does.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**气候公司（拜耳公司拥有）**：气候公司主要通过他们的气候田间视图平台提供数字农业服务。该平台利用数据科学、机器学习和人工智能来提供帮助农民提高生产力、可持续性和经济效益的见解。他们的主要优势在于其全面和细致的田间和天气数据分析，这使农民能够更精确地做出关于种植、施肥和收获的决定。然而，他们并不像约翰·迪尔那样制造机械。'
- en: '**Farmers Edge**: Farmers Edge also provides comprehensive digital agriculture
    services, similar to Climate Corporation. Their FarmCommand platform offers predictive
    modeling, weather analytics, and fully integrated farm management. One of their
    unique offerings is Smart Insurance, an AI-driven crop insurance service. Their
    strengths lie in their comprehensive suite of digital tools, personalized customer
    support, and the inclusion of on-farm weather stations in their services.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**农民边缘**：农民边缘也提供全面的数字农业服务，类似于气候公司。他们的农场命令平台提供预测建模、天气分析和完全集成的农场管理。他们的一项独特服务是智能保险，这是一种由人工智能驱动的作物保险服务。他们的优势在于其全面的数字工具套件、个性化的客户支持和在服务中包含农场天气站。'
- en: In terms of competition, all three are vying for market share in the rapidly
    expanding AgTech field. John Deere competes with Climate Corporation and Farmers
    Edge in the precision farming data analytics space, but it has the added advantage
    of producing the physical machinery used on farms. However, both Climate Corporation
    and Farmers Edge offer robust, data-driven digital platforms that can provide
    farmers with insights and analyses, which is where they compete strongly with
    John Deere’s offerings.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在竞争方面，这三家公司都在激烈争夺快速发展的农业科技领域的市场份额。约翰·迪尔在精准农业数据分析领域与气候公司和农民边缘竞争，但它还拥有生产农场使用的物理机械的额外优势。然而，气候公司和农民边缘都提供稳健、数据驱动的数字平台，可以为农民提供洞察和分析，这是他们与约翰·迪尔产品竞争激烈的地方。
- en: In summary, all three companies are leveraging AI and ML in meaningful ways.
    The best platform would likely depend on the specific needs of the customer. For
    integrated machinery and software, John Deere may be preferable. For data analysis
    and field-level insights, a farmer might prefer Climate Corporation’s Climate
    FieldView or Farmers Edge’s FarmCommand. Ultimately, robustness might best be
    measured by the value and actionable insight the platform provides to its users.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这三家公司都在以有意义的方式利用人工智能和机器学习。最佳平台可能取决于客户的具体需求。对于集成机械和软件，约翰·迪尔可能更受欢迎。对于数据分析以及田间层面的洞察，农民可能会更倾向于气候公司的气候田间视图或农民边缘的农场命令。最终，平台的稳健性可能最好通过其提供给用户的价值观和可操作见解来衡量。
- en: As AI and ML continue to evolve, these companies will likely continue to develop
    their platforms and incorporate these advanced technologies in more innovative
    ways to serve their customers better. The competition in the AgTech space is fierce,
    and the robustness of AI and ML capabilities is a key differentiator.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能和机器学习的持续发展，这些公司可能会继续开发他们的平台，并以更创新的方式整合这些先进技术，以更好地服务客户。农业科技领域的竞争非常激烈，人工智能和机器学习能力的稳健性是一个关键的区别因素。
- en: In this section, we discussed the competitive landscape of the AgTech industry,
    dissecting the unique strengths and strategies of John Deere, Climate Corporation,
    and Farmers Edge. Through this lens, we explored the transformative power of AI
    and ML in modern agriculture and how these tech giants leverage such advancements
    to redefine farming.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们讨论了AgTech行业的竞争格局，分析了约翰·迪尔（John Deere）、Climate Corporation和Farmers Edge的独特优势和策略。通过这一视角，我们探讨了人工智能（AI）和机器学习（ML）在现代农业中的变革力量以及这些技术巨头如何利用这些进步来重新定义农业。
- en: The next section navigates the realm of unconventional data sources that could
    reveal intriguing insights into John Deere’s potential as an investment opportunity.
    Delving into the impact of factors such as product launches, commodity prices,
    weather patterns, policy shifts, global trade dynamics, sustainability initiatives,
    and technological advancements, we’ll illuminate how these overlooked aspects
    can shape investment strategies.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将探讨可能揭示约翰·迪尔（John Deere）作为投资机会潜力的有趣见解的非传统数据来源领域。深入分析产品发布、商品价格、天气模式、政策转变、全球贸易动态、可持续性倡议和技术进步等因素的影响，我们将阐明这些被忽视的方面如何塑造投资策略。
- en: The hidden goldmine – unearthing unconventional data for strategic investments
    in John Deere
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 隐藏的金矿——挖掘约翰·迪尔（John Deere）战略投资的非传统数据
- en: What types of unconventional information and data from John Deere could provide
    insight into a trading strategy and provide investment opportunities?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·迪尔（John Deere）哪些类型的非传统信息和数据可以为交易策略提供见解并创造投资机会？
- en: 'Here are some unconventional data sources for John Deere:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些关于约翰·迪尔（John Deere）的非传统数据来源：
- en: '**New product launches**: The launch of a new product line or significant upgrades
    to existing products can often lead to changes in the stock’s performance. These
    product announcements often indicate that the company is innovating and investing
    in its future.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**新产品发布**：新产品线的推出或现有产品的重大升级往往会导致股票表现的变化。这些产品公告通常表明公司正在创新并投资于其未来。'
- en: '**Commodity prices**: Since John Deere’s customers are largely from the agricultural
    sector, commodity prices can significantly impact the company’s financial performance.
    A rise in crop prices usually leads to higher income for farmers, which, in turn,
    can lead to more sales for John Deere.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商品价格**：由于约翰·迪尔（John Deere）的客户主要来自农业部门，商品价格可以显著影响公司的财务表现。作物价格上涨通常会导致农民收入增加，进而可能导致约翰·迪尔（John
    Deere）的销售增加。'
- en: '**Weather patterns**: Unusual weather patterns, such as droughts or floods,
    can affect the farming industry and, consequently, John Deere’s sales. Climate
    data and forecasts might offer some insight into the potential demand for John
    Deere’s products.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**天气模式**：异常的天气模式，如干旱或洪水，可能会影响农业行业，进而影响约翰·迪尔（John Deere）的销售。气候数据和预报可能为约翰·迪尔（John
    Deere）产品潜在需求提供一些见解。'
- en: '**Government policies and subsidies**: Changes in government policies related
    to agriculture or trade can impact John Deere’s sales. For example, government
    subsidies for farmers or tariffs on imported goods can influence farmers’ purchasing
    decisions.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**政府政策和补贴**：与农业或贸易相关的政府政策变化可能影响约翰·迪尔（John Deere）的销售。例如，政府对农民的补贴或对进口商品的关税可能会影响农民的购买决策。'
- en: '**Global trade dynamics**: As a global company, John Deere is affected by international
    trade dynamics. Factors such as trade tensions or agreements can influence the
    company’s export potential and impact its financial performance.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全球贸易动态**：作为一家全球公司，约翰·迪尔（John Deere）受到国际贸易动态的影响。贸易紧张或协议等因素可能会影响公司的出口潜力和财务表现。'
- en: '**Sustainability initiatives**: John Deere’s efforts in sustainability and
    environmental preservation could also be a useful indicator of their future performance.
    Increased consumer and investor interest in **environmental, social, and governance**
    (**ESG**) factors makes this a potentially impactful area.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可持续性倡议**：约翰·迪尔（John Deere）在可持续性和环境保护方面的努力也可能是衡量其未来表现的有用指标。消费者和投资者对**环境、社会和治理**（ESG）因素的日益关注使这一领域具有潜在的深远影响。'
- en: '**Technological advances**: Pay attention to John Deere’s progress in the fields
    of AI, ML, and automation. They’ve been investing significantly in these areas,
    and breakthroughs or advancements could lead to considerable growth.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术进步**：关注约翰·迪尔（John Deere）在人工智能（AI）、机器学习（ML）和自动化领域的进展。他们在这方面的投资相当大，突破或进步可能导致显著增长。'
- en: Remember, unconventional data should be used to supplement, not replace, traditional
    financial analysis. Moreover, investing involves risk, and all data, conventional
    or not, should be thoroughly analyzed to make informed decisions.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，非常规数据应用于补充而非取代传统金融分析。此外，投资涉及风险，所有数据，无论是传统数据还是非常规数据，都应进行全面分析，以便做出明智的决策。
- en: In this exhilarating exploration of unconventional data, we’ve embarked on a
    journey beyond the traditional boundaries of financial analysis, diving deep into
    the impactful world of John Deere. We’ve uncovered how factors such as weather
    patterns, global trade, and technological breakthroughs intertwine with Deere’s
    growth trajectory, broadening our understanding of its investment potential. This
    voyage into the lesser-traveled path of data insights paves the way for a more
    holistic and enlightened approach to AgTech investments. Remember, it’s in these
    overlooked corners that the most rewarding investment opportunities often lie.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次令人兴奋的非传统数据分析探索中，我们已超越了传统金融分析的边界，深入到约翰·迪尔具有影响力的世界。我们揭示了诸如天气模式、全球贸易和技术突破等因素如何与迪尔的增长轨迹交织在一起，拓宽了我们对其投资潜力的理解。这次深入数据洞察的旅程为更全面、更明智的农业技术投资方法铺平了道路。记住，在这些被忽视的角落里，往往隐藏着最值得投资的机会。
- en: Hold on tight as we delve into an electrifying journey powered by WallStreetGPT
    – an AI persona that’s breaking barriers and changing the game in financial analysis.
    In the next revolutionary section, we’ll explore how WallStreetGPT, with its unique
    blend of data analysis and strategic questioning, takes on the role of an astute
    Wall Street analyst to shed light on the strategic initiatives and potential of
    the agricultural behemoth, John Deere.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 请系好安全带，随着我们深入探索由WallStreetGPT驱动的激动人心的旅程——这是一个打破壁垒、改变金融分析游戏规则的AI角色。在下一革命性章节中，我们将探讨WallStreetGPT如何凭借其独特的数据分析和战略提问相结合的方式，扮演一位敏锐的华尔街分析师，揭示农业巨头约翰·迪尔的战略举措和潜力。
- en: We’ll see how WallStreetGPT delves into the financial impacts of John Deere’s
    investments, explores untapped markets, and unearths strategic growth opportunities.
    But this AI-driven journey is more than a technical analysis; it’s about understanding
    the underlying strategic narrative of the company.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将看到WallStreetGPT如何深入研究约翰·迪尔投资的财务影响，探索未开发的市场，并挖掘战略增长机会。但这个由AI驱动的旅程不仅仅是一个技术分析；它关乎理解公司背后的战略叙事。
- en: With the sharp acumen of an experienced analyst, WallStreetGPT prompts valuable
    discussions around John Deere’s future strategies and prospects. The AI persona
    demonstrates how technology is not here to replace analysts but to enhance their
    capabilities, enabling them to dive deeper and ask more insightful questions during
    earnings calls.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 借助经验丰富的分析师的敏锐洞察力，WallStreetGPT围绕约翰·迪尔未来的战略和前景引发有价值的讨论。这个AI角色展示了技术并非要取代分析师，而是要增强他们的能力，使他们能够在收益电话会议中深入挖掘并提出更有洞察力的问题。
- en: This isn’t just about deciphering what’s happening now; it’s about anticipating
    what could happen next, enabling investors and analysts alike to stay one step
    ahead. So, sit back and witness how WallStreetGPT is turning the tables and reshaping
    the future of earnings calls, one insightful question at a time!
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅关于解读现在正在发生的事情；这是关于预测接下来可能发生的事情，使投资者和分析师都能领先一步。所以，请放松并见证WallStreetGPT如何一步步扭转局面，重塑收益电话会议的未来，一次提出一个有洞察力的问题！
- en: John Deere’s AgTech Revolution – AI Insights and Challenges
  id: totrans-65
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 约翰·迪尔（John Deere）的农业技术革命 – 人工智能洞察与挑战
- en: WallStreetGPT is a persona that can show what ChatGPT can ask in a John Deere
    earnings call as it relates to questions and how it can extract key information
    that is needed for the investment community, customers, investors, and others
    to understand based on key prompts.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: WallStreetGPT是一个角色，可以展示ChatGPT在约翰·迪尔收益电话会议中可以提出的问题，以及它如何提取投资界、客户、投资者和其他人根据关键提示需要理解的关键信息。
- en: 'WallStreetGPT question: “John Deere has been investing heavily in precision
    agriculture and other advanced technologies, which are expected to drive efficiency
    and open up new revenue streams. However, these investments also come with significant
    upfront costs. Could you provide some color on how these investments are impacting
    your current financial performance, and what kind of **return on investment**
    (**ROI**) you expect to see in the future? Additionally, how do these investments
    align with your long-term financial goals and what impact do you expect them to
    have on your revenue and profitability over the next 5 to 10 years?”'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: WallStreetGPT问题：“约翰·迪尔在精准农业和其他先进技术上的投资力度很大，这些技术预计将提高效率并开辟新的收入来源。然而，这些投资也伴随着显著的前期成本。你能提供一些关于这些投资如何影响您当前财务表现的信息，以及您预计未来将看到什么样的**投资回报率**（**ROI**）吗？此外，这些投资如何与您的长期财务目标相一致，您预计它们将在未来5到10年内对您的收入和盈利能力产生什么影响？”
- en: This question is designed to elicit information about the financial impact of
    John Deere’s strategic investments, both in the short term and the long term.
    The answer could provide valuable insights into the company’s financial health
    and future prospects.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题旨在了解约翰·迪尔战略投资对财务的影响，无论是短期还是长期。答案可以提供关于公司财务状况和未来前景的宝贵见解。
- en: 'WallStreetGPT question: “John Deere has shown interest in expanding into new
    areas such as vertical farming, renewable energy solutions for farms, and even
    blockchain solutions for the supply chain. Can you provide some insights into
    the potential **total addressable market** (**TAM**) for these sectors? Furthermore,
    how does John Deere plan to capture market share in these new areas, and what
    kind of impact could this expansion have on your revenue growth over the next
    decade?”'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: WallStreetGPT问题：“约翰·迪尔（John Deere）对扩展到新领域，如垂直农业、农场可再生能源解决方案以及供应链的区块链解决方案表现出兴趣。你能提供一些关于这些领域潜在的总可寻址市场（**TAM**）的见解吗？此外，约翰·迪尔计划如何在这些新领域抢占市场份额，这种扩张对您未来十年的收入增长可能产生什么影响？”
- en: 'As a hypothetical world-class stock analyst, here are some recommendations
    and new ideas to ask John Deere to see whether they would entertain any of them
    to remain competitive and successful in the agriculture industry:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一位假设的世界级股票分析师，以下是一些推荐和新想法，以供约翰·迪尔考虑，以保持其在农业行业的竞争力和成功：
- en: '**Expand precision agriculture**: Build internally and hire talent. John Deere
    already has a strong presence in this area, so it would make sense to continue
    building on this internally. They should hire data scientists, software engineers,
    and agronomists to develop more advanced precision agriculture solutions.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**扩展精准农业**：内部建设和招聘人才。约翰·迪尔已经在这一领域拥有强大的影响力，因此继续内部建设是有意义的。他们应该聘请数据科学家、软件工程师和农业学家，以开发更先进的精准农业解决方案。'
- en: '**Invest in vertical farming**: Partner with companies. Vertical farming requires
    specialized knowledge and technology, so it would be beneficial to partner with
    a company that already has expertise in this area, such as AeroFarms or Plenty.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资垂直农业**：与公司合作。垂直农业需要专业的知识和技术，因此与已经在该领域拥有专业知识的公司合作将是有益的，例如AeroFarms或Plenty。'
- en: '**Develop blockchain solutions for the supply chain**: Buy a small or midsize
    company. Many startups are working on blockchain for the supply chain, such as
    Provenance and Ripe.io, which could be potential acquisition targets.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为供应链开发区块链解决方案**：收购一家小型或中型公司。许多初创公司正在研究供应链的区块链技术，如Provenance和Ripe.io，它们可能是潜在的收购目标。'
- en: '**Collaborate with biotech companies**: Partner with companies. Biotech is
    a highly specialized field, so it would make sense to partner with a company that
    already has expertise in this area, such as Monsanto or Syngenta.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与生物技术公司合作**：与公司合作。生物技术是一个高度专业化的领域，因此与已经在该领域拥有专业知识的公司合作是有意义的，例如孟山都（Monsanto）或先正达（Syngenta）。'
- en: '**Create an AgTech incubator**: Build internally and hire talent. This could
    be done internally with the right team of business development and startup mentoring
    professionals.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建农业科技孵化器**：内部建设和招聘人才。这可以通过拥有合适的商业发展和初创企业指导专业团队的内部建设来完成。'
- en: '**Develop renewable energy solutions for farms**: Partner with companies. Renewable
    energy is a highly specialized field, so it would make sense to partner with a
    company that already has expertise in this area, such as SunPower or Vestas.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**为农场开发可再生能源解决方案**：与公司合作。可再生能源是一个高度专业化的领域，因此与已经在该领域拥有专业知识的公司合作，如SunPower或Vestas，是有意义的。'
- en: '**Invest in education and training**: Build internally. John Deere could develop
    training programs, perhaps in partnership with universities or vocational schools.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资教育和培训**：内部建设。约翰·迪尔可以开发培训计划，也许可以与大学或职业学校合作。'
- en: '**Collaborate with tech giants**: Partner with companies. Tech giants such
    as Google and Amazon have vast resources and expertise that John Deere could leverage.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**与科技巨头合作**：与公司合作。像谷歌和亚马逊这样的科技巨头拥有丰富的资源和专业知识，约翰·迪尔可以利用这些资源。'
- en: These strategies would depend on John Deere’s specific capabilities, resources,
    and strategic goals, as well as the specific opportunities available in the market.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这些策略将取决于约翰·迪尔的具体能力、资源和战略目标，以及市场上具体可利用的机会。
- en: However, it’s important to make it clear that while ChatGPT could generate intelligent
    questions based on its training, it does not understand the context or implications
    of its questions in the same way a human analyst would. It can generate questions
    based on patterns it has seen in similar data, but it can’t form a strategy or
    comprehend the broader significance of the answers.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，重要的是要明确，尽管ChatGPT可以根据其训练生成智能问题，但它并不像人类分析师那样理解其问题的背景或含义。它可以基于其在类似数据中看到的模式生成问题，但它无法制定策略或理解答案的更广泛意义。
- en: That being said, showing how AI can automate certain aspects of the analyst’s
    job could lead to discussions about the future of the industry, the potential
    benefits and drawbacks of AI, and how human analysts might need to adapt to stay
    relevant.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，展示AI如何自动化分析师工作的某些方面可能会引发关于行业未来的讨论，以及AI的潜在利弊，以及人类分析师如何适应以保持相关性。
- en: In this section, we saw how WallStreetGPT, an AI persona, is revolutionizing
    earnings calls by probing strategic insights and investment opportunities at John
    Deere. As a game-changer, it’s enhancing analyst capabilities, redefining the
    future of financial analysis, and equipping stakeholders to anticipate market
    trends and corporate strategy.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们看到了WallStreetGPT这个AI角色如何通过探讨约翰·迪尔的战略见解和投资机会来革新收益电话会议。作为一个颠覆性的变革者，它正在增强分析师的能力，重新定义金融分析的未来，并使利益相关者能够预测市场趋势和企业战略。
- en: As we plunge into the captivating universe of quantitative investing, prepare
    to discover the potential this method holds for complex sectors such as agri-business,
    and particularly for companies such as John Deere.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们深入到量化投资的迷人宇宙时，准备发现这种方法对复杂行业如农业企业，特别是对像约翰·迪尔这样的公司所持有的潜力。
- en: The next section demystifies how, through the combination of vast data and advanced
    algorithms, quantitative models can uncover intricate patterns and provide extraordinary
    investment insights. These insights could revolutionize traditional methods, offering
    more comprehensive and timely analyses.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将揭示，通过结合大量数据和高级算法，量化模型可以揭示复杂的模式并提供非凡的投资见解。这些见解可能会颠覆传统方法，提供更全面和及时的分析。
- en: We’ll also illustrate a practical example of quantitative trading and a Power
    BI visualization using John Deere and its competitors. This walkthrough will reveal
    how to profit from temporary price deviations. It’s an exciting merger of financial
    acumen and data science, and it awaits you in the following pages. Stay tuned!
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将展示一个使用约翰·迪尔及其竞争对手的量化交易和Power BI可视化的实际例子。这个教程将揭示如何从暂时的价格偏差中获利。这是金融敏锐性和数据科学的激动人心的结合，在接下来的几页中等待着你。敬请期待！
- en: Unlocking the power of quantitative investing – a game-changer for agri-business
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解锁量化投资的力量——农业企业的变革者
- en: Quantitative investing is a type of investment strategy that primarily relies
    on mathematical computations, statistical models, and automated algorithms to
    identify and execute trades. Unlike fundamental and technical analysis, which
    focus on the intrinsic value of securities and the analysis of trends and patterns
    in trading data, respectively, quantitative investing seeks to profit from mathematical
    insights derived from the vast amount of financial data available.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 量化投资是一种主要依赖数学计算、统计模型和自动化算法来识别和执行交易的投资策略。与关注证券内在价值和交易数据趋势和模式分析的基本面和技术分析不同，量化投资试图从大量金融数据中获得的数学洞察力中获利。
- en: 'Let’s break down each of these investment approaches briefly:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要地分解每种投资方法：
- en: Fundamental analysis is the process of determining the inherent worth of security
    by scrutinizing various economic, financial, and other relevant factors. This
    includes examining macroeconomic trends and industry circumstances, as well as
    the specific company’s financial condition and managerial competence, including
    revenue, costs, assets, and liabilities. You might liken this process to a comprehensive
    health check-up, where a physician assesses the patient’s vital signs and conducts
    diagnostic tests to establish the patient’s overall well-being.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基本面分析是通过审查各种经济、金融和其他相关因素来确定证券内在价值的过程。这包括检查宏观经济趋势和行业环境，以及特定公司的财务状况和管理能力，包括收入、成本、资产和负债。你可以将这个过程比作全面的健康检查，其中医生评估患者的生命体征并进行诊断测试，以确定患者的整体健康状况。
- en: Technical analysis is a method that centers around studying statistical patterns
    derived from historical trading actions, encompassing factors such as fluctuations
    in price and transaction volume. It uses chart patterns, indicators, and other
    tools to predict future price movements. To use a weather metaphor, it’s like
    a meteorologist predicting future weather patterns based on past and current data.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术分析是一种以研究历史交易行为中得出的统计模式为中心的方法，包括价格波动和交易量等因素。它使用图表模式、指标和其他工具来预测未来价格走势。用天气比喻来说，就像气象学家根据过去和当前的数据预测未来的天气模式。
- en: Quantitative investing, on the other hand, utilizes advanced mathematical models
    and algorithms to analyze financial markets and identify trading opportunities.
    It leverages computational frameworks and taps into the power of big data and
    AI to make investment decisions, often at a speed and frequency beyond human capabilities.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，量化投资利用先进的数学模型和算法来分析金融市场并识别交易机会。它利用计算框架并利用大数据和人工智能的力量来做出投资决策，通常速度和频率超出人类能力。
- en: Now, why is quantitative investing important, particularly in the context of
    agriculture and a company like John Deere? The answer lies in the complexities
    of the agricultural industry and the inherent challenges it poses for traditional
    forms of analysis.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为什么量化投资在农业和像约翰·迪尔这样的公司背景下尤为重要？答案在于农业行业的复杂性及其对传统分析形式固有的挑战。
- en: The agriculture sector is affected by an array of factors such as climate change,
    weather patterns, soil quality, pest infestations, commodity prices, global trade
    policies, technological innovations, and more. Traditional fundamental and technical
    analyses may struggle to accurately capture, process, and make sense of all these
    factors at once.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 农业部门受到气候变化、天气模式、土壤质量、害虫侵染、商品价格、全球贸易政策、技术创新等因素的影响。传统的基本面和技术分析可能难以准确捕捉、处理和解释所有这些因素。
- en: Enter quantitative investing. With its ability to handle vast amounts of data,
    it can process all these factors concurrently, providing insights that might be
    missed by a human analyst. For instance, a quantitative model could incorporate
    satellite imagery data to assess crop growth, global weather data to predict potential
    impact on harvests, and real-time commodity prices to gauge market trends, all
    at once.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 进入量化投资领域。凭借其处理大量数据的能力，它能够同时处理所有这些因素，提供人类分析师可能错过的见解。例如，一个量化模型可以结合卫星图像数据来评估作物生长，全球天气数据来预测对收成的潜在影响，以及实时商品价格来衡量市场趋势，所有这些同时进行。
- en: 'Let’s consider a potential scenario involving John Deere. As a leader in the
    agricultural machinery industry, its financial performance is deeply intertwined
    with the broader agriculture sector. A quantitative investing model for John Deere
    might incorporate factors such as the following:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个涉及约翰·迪尔的潜在场景。作为农业机械行业的领导者，其财务表现与更广泛的农业部门紧密相连。约翰·迪尔的量化投资模型可能包括以下因素：
- en: '**Macro-level data**: Global agricultural trends, commodity prices, climate
    data, land usage statistics, demographic trends, economic indicators, and so on'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**宏观层面数据**：全球农业趋势、商品价格、气候数据、土地使用统计数据、人口趋势、经济指标等'
- en: '**Company-specific data**: Sales data for different categories of machinery,
    operational efficiency metrics, R&D spending, and so on'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公司特定数据**：不同类别机械的销售数据、运营效率指标、研发支出等'
- en: '**Sentiment analysis**: Mining news articles, social media posts, and other
    sources of unstructured data to gauge public sentiment toward the company and
    its products'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情绪分析**：挖掘新闻文章、社交媒体帖子和其他非结构化数据来源，以衡量公众对公司及其产品的情绪'
- en: By analyzing these data points, the model could potentially identify patterns
    and relationships that are not immediately apparent. For instance, it might identify
    a strong correlation between the company’s stock price and certain macro-level
    indicators, enabling the model to anticipate price movements based on these indicators.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分析这些数据点，模型可能能够识别出不是立即显而易见的模式和关系。例如，它可能识别出公司股价与某些宏观层面的指标之间存在强烈的关联，从而使模型能够根据这些指标预测价格变动。
- en: In conclusion, quantitative investing offers a powerful toolset for navigating
    the complex dynamics of the agricultural industry and companies like John Deere.
    By harnessing the power of data and advanced algorithms, it allows investors to
    uncover insights and investment opportunities that might be overlooked by traditional
    analysis. However, it also requires a high degree of mathematical and computational
    expertise, and like all investment strategies, it carries its own set of risks.
    As such, it should be used as part of a balanced and well-informed investment
    strategy.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，量化投资为导航农业行业和像约翰·迪尔这样的公司的复杂动态提供了一个强大的工具集。通过利用数据和高级算法的力量，它使投资者能够发现传统分析可能忽视的见解和投资机会。然而，它也要求高度数学和计算专业知识，并且像所有投资策略一样，它也带来自己的一套风险。因此，它应该作为平衡且信息丰富的投资策略的一部分来使用。
- en: In the next section, we will delve into a fascinating real-world example of
    a quantitative trading strategy using John Deere and its competitors, Caterpillar
    Inc. and CNH Industrial. Here, we will employ a mean reversion trade strategy
    banking on the premise that prices of closely correlated stocks within the same
    industry tend to move toward their average over time. Leveraging historical price
    data and simple mathematical calculations, we identify trading opportunities where
    John Deere’s stock price deviates significantly from its average, and concurrently,
    its competitors’ prices remain close to their respective averages. By demonstrating
    how to execute trades based on these signals and close the position when the price
    reverts to the mean, we offer an exciting glimpse into the practical application
    of quantitative investing.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将深入探讨一个使用约翰·迪尔及其竞争对手——卡特彼勒公司（Caterpillar Inc.）和CNH工业公司（CNH Industrial）的量化交易策略的引人入胜的真实世界示例。在这里，我们将采用均值回归交易策略，基于这样一个前提：同一行业内紧密相关股票的价格往往会随着时间的推移而趋向于其平均值。利用历史价格数据和简单的数学计算，我们识别出约翰·迪尔股价与其平均值显著偏离的交易机会，同时其竞争对手的价格保持在其各自的平均值附近。通过展示如何根据这些信号执行交易并在价格回归到平均值时平仓，我们提供了一个关于量化投资实际应用的激动人心的洞察。
- en: Quantitative trading example – John Deere
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 量化交易示例——约翰·迪尔
- en: Mean reversion trade – John Deere
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 均值回归交易——约翰·迪尔
- en: Let’s construct a quantitative investing example using John Deere and two of
    its major competitors, Caterpillar Inc. and CNH Industrial. The premise here is
    to create a mean reversion trading strategy that capitalizes on the price correlations
    between these agricultural machinery manufacturers.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过使用约翰·迪尔（John Deere）及其两大主要竞争对手——卡特彼勒公司（Caterpillar Inc.）和CNH工业公司（CNH Industrial）来构建一个量化投资示例。这里的假设是创建一个均值回归交易策略，利用这些农业机械制造商之间的价格相关性。
- en: The idea behind mean reversion is that the prices of these stocks will tend
    to move toward their mean or average price over time. If the stocks are closely
    correlated, as we would expect for companies in the same industry, we could potentially
    profit from temporary price discrepancies.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a simplified step-by-step process of how this strategy might work. Remember
    that this is a simplified example, and real quantitative investing strategies
    would require rigorous backtesting and risk management measures:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '**Data gathering**: We start by gathering historical price data for John Deere,
    Caterpillar, and CNH Industrial. This data could be obtained from any reputable
    financial data provider, such as Yahoo! Finance, Alpha Vantage, or others. We
    would want daily closing prices for a significant period, say, the last 5 years.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Calculate the mean**: Next, we calculate a moving average of the price of
    each stock. A common choice is the 30-day moving average, which provides a balance
    between responsiveness and noise reduction. The moving average represents our
    “mean” price in the mean-reversion strategy.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Identify deviations**: We look for instances where the price of John Deere
    deviates significantly from its moving average, say, by more than two standard
    deviations. This deviation might be due to some temporary market sentiment or
    news that is causing irrational price movements.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Confirm correlation**: At the same time, we check the prices of Caterpillar
    and CNH Industrial. If these prices do not deviate from their respective averages
    (that is, the market sentiment seems to be specifically affecting John Deere),
    we may have a trading opportunity.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Execution of trades**: If John Deere’s stock is trading significantly below
    its average while Caterpillar and CNH Industrial are around their averages, we
    could interpret this as a signal that John Deere’s stock is temporarily undervalued.
    In response, we could buy John Deere’s stock with the expectation that its price
    will revert to the mean. Conversely, if John Deere’s stock is significantly above
    its average, we might see this as a signal that it is temporarily overvalued,
    and we could sell the stock or short sell if the facility is available.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Close the position**: After the trade, we continue to monitor the stock prices.
    Once John Deere’s price reverts to its moving average, we would close out the
    position, thus hopefully capturing a profit from the price correction.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This example demonstrates the essence of a quantitative mean reversion strategy.
    It’s important to note that, in reality, implementing such a strategy requires
    sophisticated programming and statistical skills, as well as careful risk management.
    Price deviations can occur for valid reasons, and prices can deviate from their
    averages for extended periods.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the steps, along with the corresponding Python code, to build the
    quantitative trading strategy we’ve just described. We will be using the `yfinance`
    library to fetch data from Yahoo! Finance and pandas for data manipulation:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是构建我们刚刚描述的定量交易策略的步骤，以及相应的Python代码。我们将使用`yfinance`库从雅虎财经获取数据，并使用pandas进行数据处理：
- en: '`yfinance` library to gather historical price data for the specified stocks:'
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用`yfinance`库收集指定股票的历史价格数据：
- en: '[PRE0]'
  id: totrans-116
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Calculate the mean**: Next, we calculate a 30-day moving average for each
    stock:'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**计算平均值**：接下来，我们为每支股票计算30天的移动平均：'
- en: '[PRE1]'
  id: totrans-118
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Identify deviations**: We calculate the standard deviation and identify points
    where the price of John Deere deviates by more than two standard deviations from
    its moving average:'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别偏差**：我们计算标准差，并识别出约翰·迪尔的价格与其移动平均线偏差超过两个标准差的情况：'
- en: '[PRE2]'
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Confirm correlation**: We check that the prices of Caterpillar and CNH Industrial
    are not deviating from their averages when John Deere’s price is deviating from
    its average:'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确认相关性**：当约翰·迪尔的价格偏离其平均值时，我们检查卡特彼勒和CNH工业的价格是否没有偏离它们各自的平均值：'
- en: '[PRE3]'
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '`1` as a buy signal when John Deere’s stock is significantly below its average
    and `-1` as a sell signal when it’s significantly above its average:'
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当约翰·迪尔股票显著低于其平均值时，标记`1`作为买入信号，当它显著高于其平均值时，标记`-1`作为卖出信号：
- en: '[PRE4]'
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Close the position**: In a real-world scenario, you would close your position
    when the price reverts to the mean. However, for our simplified example, we won’t
    cover the closing of positions.'
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**平仓**：在现实世界的场景中，当价格回归到平均值时，你会平仓。然而，在我们的简化示例中，我们不会涉及平仓。'
- en: Please note that this example is a simple illustration and doesn’t take into
    account many factors you should consider in a real trading scenario, such as transaction
    costs, slippage, risk management, and more. Additionally, note that this example
    assumes the availability of the short-selling facility, which may not be available
    under all circumstances. Finally, the trading strategy is based on the assumption
    that prices will revert to the mean, which might not always hold true in real-world
    scenarios. Always perform thorough backtesting before deploying any strategy.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这个示例只是一个简单的说明，并没有考虑在真实交易场景中你应该考虑的许多因素，例如交易成本、滑点、风险管理等。此外，请注意，这个示例假设了卖空设施的可用性，这可能在所有情况下都不适用。最后，交易策略基于价格将回归平均值的假设，这在现实世界的场景中可能并不总是成立。在部署任何策略之前，请始终进行彻底的回测。
- en: Python code snippet explanation
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: Python代码片段说明
- en: '`yfinance` library.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`yfinance`库。'
- en: '`rolling().mean()` method.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`rolling().mean()`方法。'
- en: '**Identify deviations**: Deviations were identified by calculating the standard
    deviation and looking for instances where John Deere’s stock price deviated by
    more than two standard deviations from its moving average.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**识别偏差**：通过计算标准差并寻找约翰·迪尔股票价格偏离其移动平均线超过两个标准差的情况来识别偏差。'
- en: '**Confirm correlation**: We confirmed correlation by checking that Caterpillar
    and CNH Industrial’s prices were not deviating from their respective averages
    when John Deere’s price was deviating from its average.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确认相关性**：我们通过检查当约翰·迪尔的价格偏离其平均值时，卡特彼勒和CNH工业的价格没有偏离它们各自的平均值来确认相关性。'
- en: '`1` was marked as a buy signal when John Deere’s stock was significantly below
    its average, and `-1` was marked as a sell signal when it was significantly above
    its average.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当约翰·迪尔股票显著低于其平均值时，标记`1`作为买入信号，当它显著高于其平均值时，标记`-1`作为卖出信号。
- en: Power BI visualization for quantitative trading example – John Deere
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power BI可视化定量交易示例 – 约翰·迪尔
- en: Here, we’ll focus on a mean reversion trading strategy, a method that is predicated
    on the assumption that a stock’s price will tend to move to the average price
    over time. To make this concept more accessible and impactful, we’ll be creating
    a dynamic and insightful Power BI visualization. We’ll feature John Deere and
    its competitors, crafting a line chart that displays the moving averages of each
    stock and overlaying it with data points to indicate the buy/sell signals for
    John Deere.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将专注于均值回归交易策略，这是一种基于股票价格将倾向于随时间移动到平均价格的假设的方法。为了使这个概念更加易于理解和有影响力，我们将创建一个动态且富有洞察力的Power
    BI可视化。我们将展示约翰·迪尔及其竞争对手，制作一个显示每支股票移动平均值的折线图，并在其上叠加数据点以指示约翰·迪尔的买入/卖出信号。
- en: 'This graphical representation of data will not only elevate your understanding
    but also facilitate more informed decision-making. It will enable you to quickly
    discern when John Deere’s stock price significantly deviates from its moving average,
    thereby triggering a buy or sell signal. The goal is to create a line chart that
    shows the moving averages of the three stocks (John Deere, Caterpillar Inc., and
    CNH Industrial), along with buy and sell signals for John Deere:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这份数据的图形表示不仅会提高您的理解，还会促进更明智的决策。它将使您能够快速判断约翰·迪尔股票价格是否显著偏离其移动平均线，从而触发买卖信号。目标是创建一个折线图，显示三只股票（约翰·迪尔、卡特彼勒公司和
    CNH 工业公司）的移动平均线，以及约翰·迪尔的买卖信号：
- en: '`pandas`, `yfinance`, `numpy`, and `pandas-datareader` libraries in your Python
    environment. If not, you can use the following commands to install them:'
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的 Python 环境中安装 `pandas`, `yfinance`, `numpy`, 和 `pandas-datareader` 库。如果没有安装，可以使用以下命令进行安装：
- en: '`pip` `install pandas`'
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pip` `install pandas`'
- en: '`pip` `install yfinance`'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pip` `install yfinance`'
- en: '`pip` `install numpy`'
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pip` `install numpy`'
- en: '`pip` `install pandas-datareader`'
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pip` `install pandas-datareader`'
- en: 'Use the following Python script to extract all the required data for the Power
    BI visualization:'
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用以下 Python 脚本来提取 Power BI 可视化所需的所有数据：
- en: '[PRE5]'
  id: totrans-142
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Python code snippet explanation:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: Python 代码片段说明：
- en: Install the `pandas`, `yfinance`, `numpy`, and `pandas-datareader` libraries
    in your Python environment if you haven’t installed them yet.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您尚未安装，请在您的 Python 环境中安装 `pandas`, `yfinance`, `numpy`, 和 `pandas-datareader`
    库。
- en: Extract the stock prices for John Deere, Caterpillar Inc., and CNH Industrial,
    calculate their 30-day moving averages, calculate the standard deviation for John
    Deere, add a buy/sell column for John Deere stock once it meets certain criteria,
    and then save all the information in a CSV file so that it can be uploaded into
    Power BI in *Step 2*.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提取约翰·迪尔、卡特彼勒公司和 CNH 工业公司的股票价格，计算它们的 30 天移动平均线，计算约翰·迪尔的标准差，一旦满足某些标准，为约翰·迪尔股票添加买卖列，然后将所有信息保存到
    CSV 文件中，以便在 **步骤 2** 中上传到 Power BI。
- en: '**Step 2 – importing the data into** **Power BI**:'
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤 2 – 将数据导入** **Power BI**:'
- en: Open Power BI.
  id: totrans-147
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开 Power BI。
- en: Click on the **Home** tab, then click on the **Get** **Data** option.
  id: totrans-148
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击 **主页** 选项卡，然后点击 **获取** **数据** 选项。
- en: From the drop-down menu, choose **Text/CSV**.
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 **文本/CSV**。
- en: Locate the CSV file you saved and click **Open**. Power BI will display a preview
    of your data.
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定位到您保存的 CSV 文件并点击 **打开**。Power BI 将显示您的数据预览。
- en: Click **Load** to load the data into Power BI.
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击 **加载** 以将数据加载到 Power BI 中。
- en: '**Step 3 – creating the Power** **BI visualization**:'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤 3 – 创建 Power** **BI 可视化**:'
- en: 'We’ll create a line chart with three lines representing the moving averages
    of the three stocks and data points representing the buy/sell signals for John
    Deere:'
  id: totrans-153
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们将创建一个包含三条线的折线图，分别代表三只股票的移动平均线和代表约翰·迪尔（John Deere）买卖信号的点：
- en: Click on the **Line chart** visualization from the **Visualizations** pane.
    A blank chart area will appear.
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **可视化** 面板中的 **折线图** 可视化。一个空白图表区域将出现。
- en: Drag and drop the **Date** field to the **Axis** field in the **Visualizations**
    pane.
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 **日期** 字段拖放到 **可视化** 面板中的 **轴** 字段。
- en: Similarly, drag and drop the moving averages for the three companies (John Deere,
    Caterpillar Inc., and CNH Industrial) to the **Values** field.
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 类似地，将三家公司（约翰·迪尔、卡特彼勒公司（Caterpillar Inc.）和 CNH 工业公司）的移动平均线拖放到 **值** 字段。
- en: Your line chart will now show the moving averages of the three stocks over time.
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的折线图现在将显示三只股票随时间变化的移动平均线。
- en: Next, let’s add the buy/sell signals for John Deere. Click on **Scatter chart**
    from the **Visualizations** pane and place it on top of the line chart.
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，让我们添加约翰·迪尔的买卖信号。从 **可视化** 面板中选择 **散点图** 并将其放置在折线图上方。
- en: For this scatter chart, set the **Date** field as **X-Axis** and **John Deere
    Price** as **Y-Axis**.
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于此散点图，将 **日期** 字段设置为 **X 轴**，将 **约翰·迪尔价格** 设置为 **Y 轴**。
- en: Drag and drop the **Signals** field into the **Legend** field.
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 **信号** 字段拖放到 **图例** 字段。
- en: 'Overlay the scatter chart on top of the line chart so that the buy/sell signals
    can be visualized along with the moving averages for the three stocks:'
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将散点图叠加在折线图上方，以便可以可视化三只股票的移动平均线和买卖信号：
- en: '**Select the scatter chart**: Click on the scatter chart you’ve just created
    to select it.'
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**选择散点图**：点击您刚刚创建的散点图以选择它。'
- en: '**Positioning**: Using your mouse, drag the scatter chart until it is positioned
    over the line chart. Try to align the axes carefully so that the data points correspond
    accurately with the dates and values on the line chart.'
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定位**：使用鼠标，将散点图拖动到直到它位于折线图上方。尽量仔细地对齐轴，以确保数据点与折线图上的日期和值准确对应。'
- en: '**Resizing**: Once the scatter chart has been positioned over the line chart,
    you’ll notice small resizing handles (usually small squares) at the corners and
    edges of the scatter chart. Click and drag these to resize the scatter chart so
    that it matches the size of the line chart beneath it.'
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调整大小**：一旦散点图被定位在折线图上方，你会在散点图的角落和边缘注意到小的调整大小手柄（通常是小的正方形）。点击并拖动这些手柄来调整散点图的大小，使其与下方的折线图大小相匹配。'
- en: '**Tweak the transparency**: You can adjust the transparency of either the line
    chart or the scatter chart to ensure both sets of data are visible. This can usually
    be done in the **Format** section of the **Visualizations** pane.'
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**调整透明度**：您可以调整折线图或散点图的透明度，以确保两组数据都可见。这通常可以在**可视化**窗格的**格式**部分完成。'
- en: By reading this chart, users can see when the price of John Deere deviates from
    its moving average, along with the respective buy/sell signal. When the signal
    is “buy,” it means John Deere’s stock is undervalued, expecting it to increase
    toward the average. On the contrary, a “sell” signal indicates the stock is overvalued,
    and it’s expected to decrease.
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过阅读这张图表，用户可以看到约翰·迪尔（John Deere）的价格何时偏离其移动平均线，以及相应的买入/卖出信号。当信号为“买入”时，意味着约翰·迪尔股票被低估，预计其价格将向平均值回升。相反，一个“卖出”信号表明股票被高估，预计其价格将下降。
- en: Remember, creating these visualizations in Power BI is a process of exploration
    and adjustment. Feel free to adjust the type of chart, colors, labels, and other
    attributes to make the chart as clear and engaging as possible.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，在Power BI中创建这些可视化是一个探索和调整的过程。请随意调整图表类型、颜色、标签和其他属性，以使图表尽可能清晰和引人入胜。
- en: In this Power BI example, we explored how to build a dynamic and insightful
    Power BI visualization for the mean reversion trading strategy using John Deere
    and its competitors as an example. Such visualizations can elevate understanding
    and facilitate decision-making by offering a graphical representation of moving
    averages and buy/sell signals.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个Power BI示例中，我们探讨了如何使用约翰·迪尔及其竞争对手作为示例来构建动态且富有洞察力的Power BI可视化，用于均值回归交易策略。这种可视化可以通过提供移动平均线和买入/卖出信号的图形表示来提高理解并促进决策。
- en: We constructed the visualization itself, a line chart with three lines for the
    moving averages of each stock and overlaying data points indicating the buy/sell
    signals for John Deere. This visualization allows users to quickly grasp when
    John Deere’s stock price significantly deviates from its moving average, thereby
    triggering a buy or sell signal.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建了可视化本身，这是一个包含每支股票移动平均线的折线图，并叠加了表示约翰·迪尔买入/卖出信号的数据点。这种可视化使用户能够快速了解约翰·迪尔股票价格何时显著偏离其移动平均线，从而触发买入或卖出信号。
- en: In this section, we explored the realm of quantitative investing, demonstrating
    its potential to revolutionize the agricultural industry, particularly for firms
    like John Deere. By leveraging vast data and sophisticated algorithms, we showed
    how this approach could yield profound insights and investment opportunities.
    Through a practical trading example and a Power BI visualization featuring John
    Deere and its competitors, we brought the power and potential of this innovative
    trading strategy to life.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了量化投资领域，展示了其颠覆农业行业的潜力，特别是对于像约翰·迪尔这样的公司。通过利用大量数据和复杂的算法，我们展示了这种方法如何产生深刻的见解和投资机会。通过一个实际的交易示例和一个以约翰·迪尔及其竞争对手为特色的Power
    BI可视化，我们使这种创新交易策略的力量和潜力栩栩如生。
- en: Unveiling the power of advanced financial metrics and valuation methods through
    Power BI visualization
  id: totrans-171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过Power BI可视化揭示高级金融指标和估值方法的力量
- en: 'In this section, we’ll delve into the world of financial ratios and metrics.
    We’ll explore **return on invested capital** (**ROIC**), **enterprise value**
    (**EV**), EBITDA Margin, and **free cash flow** (**FCF**) yield, and how these
    metrics can provide insights into a company’s performance. We’ll also discuss
    valuation methods such as **discounted cash flow** (**DCF**) and explore a relevant
    example:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将深入探讨财务比率和指标的世界。我们将探讨**投资资本回报率（ROIC）**、**企业价值（EV）**、EBITDA利润率和**自由现金流（FCF）**收益率，以及这些指标如何为公司业绩提供洞察。我们还将讨论估值方法，如**折现现金流（DCF）**，并探讨相关示例：
- en: '**Return on invested capital (ROIC)** is a profitability ratio that measures
    how effectively a company uses its capital to generate profits. It’s calculated
    as net income divided by invested capital. For a capital-intensive industry such
    as agriculture, a high ROIC can indicate efficient use of capital and strong profitability.
    For example, if John Deere has a higher ROIC than its competitors, this could
    suggest that it’s more efficient at turning its capital investments into profits.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**投资资本回报率（ROIC）**是一个盈利比率，衡量公司使用其资本产生利润的有效性。它通过将净收入除以投资资本来计算。对于像农业这样的资本密集型行业，高ROIC可以表明资本使用效率高且盈利能力强。例如，如果约翰·迪尔（John
    Deere）的ROIC高于其竞争对手，这可能表明它在将资本投资转化为利润方面更有效率。'
- en: '**Enterprise Value (EV)** represents the complete worth of a company, taking
    into account not only its market capitalization (equity value) but also its liabilities
    and cash reserves. It provides a more holistic view of a firm’s overall financial
    standing. It’s often used in valuation ratios, such as EV/EBITDA, which can provide
    a more comprehensive view of a company’s value than just looking at its stock
    price. For example, if John Deere has a lower EV/EBITDA ratio than its competitors,
    this could suggest that it’s undervalued relative to its earnings.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**企业价值（EV）**代表公司的全部价值，不仅包括其市值（股权价值），还包括其负债和现金储备。它提供了一个更全面的视角来了解公司的整体财务状况。它常用于估值比率，如EV/EBITDA，这可以比仅查看其股价提供更全面的公司价值视角。例如，如果约翰·迪尔（John
    Deere）的EV/EBITDA比率低于其竞争对手，这可能表明其相对于其收益被低估。'
- en: '**EBITDA Margin** represents a company’s operational profitability, providing
    a percentage that shows how much of each dollar of revenue is transformed into
    EBITDA, or earnings before interest, taxes, depreciation, and amortization. It’s
    computed by dividing EBITDA by the total revenue the company generates. A high
    EBITDA margin can indicate strong operational efficiency and profitability. For
    example, if John Deere has a higher EBITDA margin than its competitors, this could
    suggest that it’s more efficient at turning revenue into operational profit.'
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**EBITDA利润率**代表公司的运营盈利能力，提供了一个百分比，表明每美元收入中有多少转化为EBITDA，即息税折旧摊销前利润。它是通过将EBITDA除以公司产生的总收入来计算的。高EBITDA利润率可以表明强大的运营效率和盈利能力。例如，如果约翰·迪尔（John
    Deere）的EBITDA利润率高于其竞争对手，这可能表明它在将收入转化为运营利润方面更有效率。'
- en: '**Free cash flow (FCF)** is a measure of the cash a company generates relative
    to its market value, calculated as free cash flow divided by market capitalization.
    A high FCF yield can indicate strong cash generation and financial stability,
    which can be particularly important for companies in the agriculture industry,
    which often require significant capital expenditure. For example, if John Deere
    has a higher FCF yield than its competitors, this could suggest that it’s generating
    more cash relative to its market value.'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自由现金流（FCF）**是衡量公司相对于其市值产生的现金量的指标，计算方法为自由现金流除以市值。高FCF收益率可以表明强大的现金流生成能力和财务稳定性，这对于经常需要大量资本支出的农业行业公司尤为重要。例如，如果约翰·迪尔（John
    Deere）的FCF收益率高于其竞争对手，这可能表明它相对于其市值产生了更多的现金。'
- en: '**Discounted Cash Flow** (**DCF**) is a technique that appraises the worth
    of an investment by considering its prospective cash flows. These anticipated
    cash flows are “discounted” to their present-day value using a specific discount
    rate, which encapsulates the potential risk associated with the cash flows and
    the principle that money today has a greater value than the same amount in the
    future (often referred to as the time value of money). The aggregation of these
    adjusted cash flows provides an estimate of the investment’s inherent value. If
    this calculated intrinsic value surpasses the prevailing market price, it could
    hint at the investment being underpriced. These are just a few of the many financial
    metrics that can be used to analyze and compare companies. Each of these metrics
    provides a different perspective on a company’s financial performance and position,
    and they can be particularly useful when used together as part of a comprehensive
    financial analysis.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '**折现现金流（DCF**）是一种通过考虑其预期现金流来评估投资价值的技术。这些预期的现金流会使用一个特定的折现率“折现”到当前价值，这个折现率包含了与现金流相关的潜在风险以及钱在今天比未来有更高价值的原理（通常称为货币的时间价值）。这些调整后的现金流的汇总提供了对投资内在价值的估计。如果计算出的内在价值超过当前市场价格，这可能表明投资被低估了。这只是许多可用于分析和比较公司的财务指标中的几个。每个指标都提供了对公司财务表现和位置的独特视角，并且当作为全面财务分析的一部分一起使用时，它们尤其有用。'
- en: Each of these metrics provides a unique lens through which to evaluate a company’s
    efficiency, profitability, value, and financial stability. For instance, a high
    ROIC may indicate effective use of capital, while a higher FCF yield can suggest
    robust cash generation relative to a company’s market value.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标中的每一个都提供了一个独特的视角，用于评估公司的效率、盈利能力、价值和财务稳定性。例如，高ROIC（投资回报率）可能表明资本的有效利用，而更高的自由现金流收益率则可能表明相对于公司的市值，现金生成能力强劲。
- en: In this section, we ventured into the realm of valuation methodologies, particularly
    the DCF method. This technique involves projecting a company’s future cash flows
    and discounting them back to present value using a discount rate reflective of
    risk and the time value of money. The sum of these discounted cash flows offers
    an estimate of the intrinsic value of an investment. If the calculated intrinsic
    value exceeds the current market price, it may suggest the investment is undervalued.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们探讨了估值方法，特别是DCF方法。这种方法涉及预测公司的未来现金流，并使用反映风险和货币时间价值的折现率将它们折现回现值。这些折现现金流的总和提供了对投资内在价值的估计。如果计算出的内在价值超过当前市场价格，这可能表明投资被低估了。
- en: Unveiling value – harnessing AI for discounted cash flow analysis
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 揭示价值——利用AI进行折现现金流分析
- en: In this section, we’ll provide a detailed example of using AI and ChatGPT to
    calculate intrinsic value based on the DCF method. We’ll walk you through the
    process of incorporating various risk factors and market conditions into the analysis.
    Utilizing AI and ChatGPT for DCF analysis allows you to evaluate potential future
    revenue streams, such as new products or services, and estimate their impact on
    John Deere’s valuation.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将提供一个使用AI和ChatGPT根据DCF方法计算内在价值的详细示例。我们将向您展示如何将各种风险因素和市场条件纳入分析过程。利用AI和ChatGPT进行DCF分析允许您评估潜在的未来收入流，如新产品或服务，并估计它们对约翰·迪尔估值的影响。
- en: 'Here’s a simplified explanation of how you might use DCF to estimate the intrinsic
    value of the three new initiatives at a high level:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是对如何使用DCF（折现现金流）来估算三个新项目内在价值的简化说明：
- en: '**Estimate future cash flows**: This is the most challenging part of the DCF
    analysis. For each initiative, you would need to estimate the net cash flows it
    would generate each year. This would include the additional revenue from the initiative,
    minus the expenses required to capture that revenue. In our previous examples,
    we estimated potential revenues for each initiative and mentioned some potential
    expenses, but a real DCF analysis would require much more detailed and accurate
    estimates.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**估算未来现金流**：这是DCF分析中最具挑战性的部分。对于每个项目，你需要估算它每年将产生的净现金流。这包括项目带来的额外收入，减去获取这些收入所需的费用。在我们之前的例子中，我们估计了每个项目的潜在收入并提到了一些潜在费用，但真正的DCF分析需要更多详细和准确的估计。'
- en: '**Set a discount rate**: The discount rate factors in the principle of the
    time value of money, the concept that the current value of a dollar outweighs
    its future value. This rate should be indicative of the risk associated with the
    anticipated cash flows. For instance, riskier initiatives may warrant a higher
    discount rate. The discount rate could be equated to John Deere’s **weighted average
    cost of capital** (**WACC**), or it could be a specially determined rate that
    mirrors the unique risks associated with the initiatives.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设定折现率**：折现率考虑了货币的时间价值原则，即一美元的当前价值高于其未来的价值。这个比率应反映出预期现金流量的风险。例如，风险较高的计划可能需要更高的折现率。折现率可以等同于约翰·迪尔的**加权平均资本成本**（WACC），或者可以是一个专门确定的比率，以反映计划特有的风险。'
- en: '**Compute the present value of anticipated cash flows**: For every year, take
    the projected cash flow and divide it by (1 + discount rate) raised to the power
    corresponding to the year. This step helps determine the present value of the
    cash flow, effectively translating the future worth into its equivalent value
    in today’s dollars.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算预期现金流量的现值**：对于每一年，将预测的现金流量除以（1 + 折现率）的相应年份的幂。这一步骤有助于确定现金流量的现值，有效地将未来的价值转换为今天的美元价值。'
- en: '**Sum the present values**: Add up the present values of all the future cash
    flows. This gives you the total present value of the future cash flows, also known
    as the intrinsic value of the initiatives.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**汇总现值**：将所有未来现金流量的现值相加。这给出了未来现金流量的总现值，也称为计划的内在价值。'
- en: '**Compare the intrinsic value to the investment cost**: If the intrinsic value
    is higher than the cost of the initiatives, this suggests that the initiatives
    could be a good investment. If it’s lower, this suggests that the initiatives
    might not be a good investment.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将内在价值与投资成本进行比较**：如果内在价值高于计划的投资成本，这表明这些计划可能是一个好的投资。如果它较低，这表明这些计划可能不是一个好的投资。'
- en: This is a very simplified explanation and a real DCF analysis would be much
    more complex and would need to account for a wide range of factors. Also, DCF
    analysis is based on many assumptions and estimates, and it’s only as accurate
    as the inputs.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常简化的解释，而实际的DCF分析将更加复杂，需要考虑众多因素。此外，DCF分析基于许多假设和估计，其准确性仅取决于输入数据的准确性。
- en: Through this case study of John Deere, we have illustrated how AI can assist
    in projecting future cash flows for each business initiative and offer a method
    to determine an appropriate discount rate. We highlighted how present value calculations
    enable the quantification of potential investments in today’s dollars. By summing
    these values, this section led you through the process of evaluating the total
    present value of future cash flows – the intrinsic value of the initiatives. The
    final, crucial step involves comparing the calculated intrinsic value to the cost
    of investment to determine its viability. While the process may seem intricate,
    it underlines the utility of AI and detailed analysis in making informed investment
    decisions. As always, professional financial advice should accompany these techniques,
    ensuring a balanced and informed decision-making process.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对约翰·迪尔的案例研究，我们展示了人工智能如何协助预测每个商业计划的未来现金流量，并提供确定适当折现率的方法。我们强调了现值计算如何使潜在投资在今天的美元价值中得到量化。通过汇总这些价值，本节引导您通过评估未来现金流量的总现值——即计划的内在价值。最后，关键的一步是将计算出的内在价值与投资成本进行比较，以确定其可行性。虽然这个过程可能看起来很复杂，但它强调了人工智能和详细分析在做出明智投资决策中的实用性。一如既往，应辅以专业财务建议，以确保决策过程的平衡和信息充分。
- en: The next section navigates the potential of three emerging markets – precision
    agriculture, vertical farming, and renewable energy solutions for farms – for
    John Deere, utilizing the compelling visual capabilities of Power BI and a comprehensive
    DCF analysis.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将探讨三个新兴市场——精准农业、垂直农业和农场可再生能源解决方案——对约翰·迪尔（John Deere）的潜在影响，利用Power BI强大的可视化能力和全面的DCF分析。
- en: Visualizing the future – leveraging Power BI to explore John Deere’s potential
    in emerging markets with DCF analysis
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化未来——利用Power BI通过DCF分析探索约翰·迪尔在新兴市场的潜力
- en: 'In this section, we will consider three potential new markets for John Deere:
    precision agriculture, vertical farming, and renewable energy solutions for farms.
    We can extract the data required and load it into Power BI to explore the data
    in more detail to understand the potential DCF impact:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将考虑约翰·迪尔（John Deere）的三个潜在新市场：精准农业、垂直农业和农场可再生能源解决方案。我们可以提取所需数据并将其加载到Power
    BI中，以更详细地探索数据，了解潜在的自由现金流（DCF）影响：
- en: '**Precision agriculture**: According to a report by MarketsandMarkets, the
    global market for precision farming is projected to reach $12.8 billion by 2025\.
    If John Deere could capture a 10% market share, that would represent $1.28 billion
    in additional annual revenue. The expenses to achieve this might include R&D,
    marketing, and possibly acquisitions, which could total several hundred million
    dollars.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**精准农业**：根据MarketsandMarkets的报告，全球精准农业市场预计到2025年将达到128亿美元。如果约翰·迪尔能占据10%的市场份额，这将代表12.8亿美元的额外年度收入。实现这一目标可能包括研发、营销以及可能的收购，总额可能达到数亿美元。'
- en: '**Vertical farming**: According to a report by Allied Market Research, the
    global vertical farming market is projected to reach $12.77 billion by 2026\.
    If John Deere could capture a 5% market share, that would represent $638.5 million
    in additional annual revenue. The expenses to achieve this might include R&D,
    building or acquiring vertical farms, and hiring specialized staff, which could
    total several hundred million dollars.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**垂直农业**：根据Allied Market Research的报告，全球垂直农业市场预计到2026年将达到127.7亿美元。如果约翰·迪尔能占据5%的市场份额，这将代表6.385亿美元的额外年度收入。实现这一目标可能包括研发、建设或收购垂直农场以及雇佣专业员工，总额可能达到数亿美元。'
- en: '**Renewable energy solutions for farms**: According to a report by Fortune
    Business Insights, the global market for renewable energy is projected to reach
    $1.512 billion by 2027\. If John Deere could capture a 1% market share in the
    segment related to farms, that would represent $15.12 million in additional annual
    revenue. The expenses to achieve this might include R&D, manufacturing or acquiring
    renewable energy equipment, and marketing, which could total several million dollars.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**农场可再生能源解决方案**：根据Fortune Business Insights的报告，全球可再生能源市场预计到2027年将达到151.2亿美元。如果约翰·迪尔能在与农场相关的领域占据1%的市场份额，这将代表1512万美元的额外年度收入。实现这一目标可能包括研发、制造或收购可再生能源设备以及营销，总额可能达到数百万美元。'
- en: These are very rough estimates, and the actual results could be significantly
    different. The expenses and net income would depend on a wide range of factors,
    including John Deere’s specific strategies and capabilities, competitive dynamics,
    regulatory conditions, and broader economic factors. As always, investment decisions
    should be made based on a thorough analysis of all available information and in
    consultation with a financial advisor.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是非常粗略的估计，实际结果可能会有很大差异。支出和净收入将取决于众多因素，包括约翰·迪尔的具体策略和能力、竞争动态、监管条件以及更广泛的经济因素。一如既往，投资决策应基于对所有可用信息的彻底分析，并在财务顾问的咨询下进行。
- en: Data extraction process for Power BI visualizations
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Power BI可视化的数据提取过程
- en: 'This will involve a combination of downloading financial data, calculating
    estimates, and manually entering data. Here’s a simplified example of how you
    might gather some of this data using Python:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 这将涉及下载财务数据、计算估计值以及手动输入数据。以下是一个简化的示例，说明您如何使用Python收集一些这些数据：
- en: '[PRE6]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Python** **code snippet**'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python** **代码片段**'
- en: This code downloads historical price data for John Deere, calculates daily returns,
    estimates future cash flows for each initiative, calculates the present value
    of these cash flows using a discount rate of 10%, and then saves this data to
    a CSV file.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码下载约翰·迪尔的历史价格数据，计算每日回报率，估算每个项目的未来现金流，使用10%的折现率计算这些现金流的现值，然后将这些数据保存到CSV文件中。
- en: You could then import this CSV file into Power BI and use it to create the visualizations.
    For example, you could create a bar chart with the initiatives on the *X*-axis
    and the present values on the *Y*-axis.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您可以导入此CSV文件到Power BI中，并使用它创建可视化。例如，您可以在X轴上创建一个条形图，显示项目，在Y轴上显示现值。
- en: Please note that this is a very simplified example and actual data gathering
    and analysis would be much more complex. Also, this example does not include all
    the data you would need for the visualizations, such as the projected growth of
    the global markets and the breakdown of expenses for each initiative. You would
    need to gather this data separately, possibly from industry reports, financial
    statements, or other sources.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这是一个非常简化的示例，实际的数据收集和分析将更加复杂。此外，此示例不包括您用于可视化的所有数据，例如全球市场的预期增长和每个项目的支出分解。您可能需要从行业报告、财务报表或其他来源单独收集这些数据。
- en: How to create Power BI visualizations
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建Power BI可视化
- en: 'Precision agriculture:'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精准农业：
- en: A bar chart showing the projected growth of the global precision farming market
    over the next few years, with a highlighted bar representing the potential revenue
    for John Deere if it captures a 10% market share.
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个柱状图，显示未来几年全球精准农业市场的预期增长，其中有一个突出显示的柱子代表约翰·迪尔如果捕捉到10%的市场份额，其潜在收入。
- en: 'Bar chart – projected growth of the global precision farming market:'
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柱状图 – 全球精准农业市场预期增长：
- en: '**Global market revenue**: Obtain this data from market research reports on
    precision agriculture, which are often available from sources such as Statista,
    Grand View Research, and others'
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全球市场收入**：从精准农业的市场研究报告中获得这些数据，这些报告通常可以从Statista、Grand View Research等来源获得'
- en: '**John Deere’s potential revenue**: Calculate this as 10% of the global market
    revenue'
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**约翰·迪尔的潜在收入**：将其计算为全球市场收入的10%'
